    # # Chapter 1


    # ## I am... Python


    As per the Google, “*Python is a general purpose, interpreted, high level programming
    language which supports procedural, functional and object oriented programming.*”
    Now this is a standard definition which, your Professor or HR or any interviewer
    would expect you to say. So, we will learn it by heart. But what do the heavy
    terms used in this definition mean? We will discuss them in the later chapters
    when they will be used. Moving on, Python was officially released in the year
    1991, although the implementation was done by 1989. Guido Van Rossum created Python,
    and it''s my personal opinion that why Python became so powerful is because he
    himself was involved in developing his own work till 2018. That''s why Python
    evolved continuously with the time.


    Python is an open source software freely available and is platform independent.
    The official website is **python.org**. You can easily download the latest version
    available from here for any platform you work on, be it Linux, Windows or Mac.
    The latest version available is version 3.11. The most popular version arguably
    was 2.7, and now version 3.8 is taking its place. I’ll be using the version 3.8
    and compare the major differences between 3.7 and 3.8. This is because the versions
    3.7 and 3.8 are the most widely used and most favored versions. 3.8 has got some
    new features which are not available in 3.7 and older versions.


    # ### Why version 3.8?


    Although version 3.11 is the latest version and some major changes have been introduced
    in the versions 3.9 and 3.10 but the version 3.8 supports other libraries such
    as OpenCV, Tensorflow etc. with more stability as compared to other recent versions.
    That’s why the version 3.8 is more popular as compared to the other versions.'
- md: "## Python Editors or Integrated Development Environment\n\nTalking about the\
    \ IDEs, there are some famous IDEs available on which you can write python codes.\
    \ IDEs are basically code editors with GUI interfaces. Some of the well-known\
    \ names are:\n\n- Pycharm\n- Sublime Text\n- Atom\n- Jupyter Notebook\n- Spyder\n\
    - IDLE\n\nI have worked on all these editors. When you install python, IDLE comes\
    \ with it in Windows. I’ll be working on the Windows platform because installation\
    \ is pretty easy in the Windows.\n\n## Python Installation\n\nNow I am a guy who\
    \ doesn’t like to exhaust my mind in installing some software.\nClick on next,\
    \ next, next and finish.\nIf I have to spend my mind in installing also, then\
    \ what will be left for coding and making logics?\nThe easiest way to install\
    \ is to go to the official website of python and download the version of your\
    \ choice.\n\n![](img/967252070c1bdd582017a9d325617e34_23_0.png)\n\nFigure 1. The\
    \ official website of Python\n\nSimply scroll down the home page and look for\
    \ the version 3.8 as shown in the figure below. Then you can click on the download.\n\
    \n![](img/967252070c1bdd582017a9d325617e34_23_1.png)\n\nI have worked on Ubuntu\
    \ also. There also it’s pretty easy to install using the command line, but the\
    \ problem starts when you want to use Python 3.x because Linux (Ubuntu) by default\
    \ has version 2.7 showing. Set environment path, bash files, set this and that…\
    \ it’s tricky.\nIn windows, if such a thing happens, setting a path is very easy.\
    \ To avoid these issues, another useful way is to download python via some packages.\
    \ The most popular package is **Anaconda Package**. You can go to the official\
    \ website of Anaconda and download the latest version from there.\n\n![](img/967252070c1bdd582017a9d325617e34_24_0.png)\n\
    \nFigure 2. Anaconda Download Page\n\nBut recently, Anaconda has stopped supporting\
    \ the Anaconda package for 32-bit Linux and Mac OS. Anaconda is a heavy software\
    \ to install because it comes with a large set of modules and packages pre-installed\
    \ with it. The alternative is Miniconda. It's a light version and will be installed\
    \ quickly. But you have to install packages individually as per your need. Another\
    \ important advantage is that the Anaconda Package also provides you two IDEs,\
    \ Jupyter Notebook and Spyder.\n\nJupyter notebook is my favorite IDE and all\
    \ my work here will be on it. It is the only **browser based IDE**. It will get\
    \ automatically installed with the Anaconda Package. When you click on the Jupyter,\
    \ first a DOS window will open as shown in the figure below.\n\n![](img/967252070c1bdd582017a9d325617e34_25_0.png)\n\
    \nFigure 3. Anaconda Jupyter Server\n\nDon’t close it. Wait for some time and\
    \ then your browser will open and the Jupyter interface will be opened as a local\
    \ host at port 8888 as shown below. Its browser based but you won’t need an active\
    \ internet connection. Do remember that as long as you are working on Jupyter,\
    \ don’t close that DOS window. If you have more than one browser on your system\
    \ and you haven’t set any default browser, then, Jupyter will ask you to select\
    \ a browser of your choice in which you want to open it. If your default browser\
    \ is set already then it will open straightaway in that browser.\n\n![](img/967252070c1bdd582017a9d325617e34_25_1.png)\n\
    \nFigure 4. Jupyter Desktop on local host 8888\n\nSublime Text is an IDE which\
    \ is available both freely and with a paid version. Pycharm is a popular IDE graded\
    \ as Industry made. Nonetheless, whichever version you want you can go through\
    \ it. Now you can understand why I don’t want to spend my energy installing software\
    \ in a tough way? Because nowadays it depends on both the OS version and the software\
    \ version. OK. So, I’ll expect you to take help from web resources in the installation\
    \ process.\nNow, let’s move on with the basics. In this chapter, we will learn\
    \ about generic terms which are almost common in any programming language.\n\n\
    ## Tokens\n\nTokens are the small units of any programming language. Python supports\
    \ 4 types of tokens: Keywords, Identifiers, Literals and Operators.\n\n## Reserved\
    \ Words (Keywords)\n\nPython reserves a set of 33 keywords that designate special\
    \ language functionality. The reserved word cannot be used as variable names,\
    \ function names or identifiers.\n\nKeywords in Python\n\n| False | class | finally\
    \ | is | return |\n| None | continue | for | lambda | try |\n| True | def | from\
    \ | nonlocal | while |\n| and | del | global | not | with |\n| as | elif | if\
    \ | or | yield |\n| assert | else | import | pass | |\n| break | except | in |\
    \ raise | |\n\n## Python Identifiers\n\nIdentifiers represent the programmable\
    \ entities such as user-defined names, variables, modules, and other objects.\
    \ An identifier can be a sequence of lower case, upper case, integers or a combination\
    \ of any. The identifier name should start with the lowercase or uppercase but\
    \ must not start with digits). The identifier name should not be a reserved word,\
    \ and only underscore (_) is allowed to be used as a special character in identifier\
    \ names.\n\nThe length of the identifier name should not be more than 79 characters.\n\
    \n## Variable & Constant\n\nAs the name suggests, **Variable** means which can\
    \ vary or which is not fixed. Variable is the first identifier which we encounter\
    \ while starting coding. When we write **a = 100**, we perform variable assignment.\
    \ A constant value 100 is assigned to a variable **a**.\n\nTechnically, it means\
    \ that a black box is created somewhere in the memory-lane, and this box is called\
    \ **Object**. It holds the value 100 (a constant). This object is accessed by\
    \ a reference, called **Variable**.\n\nA constant is a type of variable that holds\
    \ values, which are immutable (cannot be changed). Constants are declared and\
    \ assigned to a variable, like 100 above.\n\n![](img/967252070c1bdd582017a9d325617e34_28_0.png)\n\
    \nOnce created, **a** can be used in a statement or expression, and its value\
    \ will be substituted and later, if the value of **a** is changed and used again,\
    \ the new value will be substituted instead. That's why it's called a Variable.\n\
    \n## Rules for writing or assigning a variable name\n\nVariable names in Python\
    \ can be of any length (**without space**), can consist of uppercase and lowercase\
    \ letters (A-Z, a-z), digits (0-9), and the underscore character (_). Most important\
    \ rule, although a variable name can contain digits, the first character of a\
    \ variable name cannot be a digit. Special symbols such as !, @, #, $, % etc.\
    \ cannot be used. Case sensitivity matters. Python is case-sensitive. The commonly\
    \ used methods of writing a multi-word variable name are:\n\n- **Camel Case:**\
    \ Second and subsequent words are capitalized, to make word boundaries easier\
    \ to see.\n    - Example: pythonProgrammingUniverse\n- **Pascal Case:** Identical\
    \ to Camel Case, except the first word is also capitalized.\n    - Example: PythonProgrammingUniverse\n\
    - **Snake Case:** Words are separated by underscores.\n    - Example: python_programming_universe\n\
    \nSo, which case to use? No hard and fast rule. Depending on your need, you can\
    \ choose any case. OK, before moving on, let’s type our first built-in function.\
    \ Let’s assign a variable and see how to display it and check it.\n\n```\na =\
    \ 100\nprint(a)\nprint(type(a))\n\n100\n<class 'int'>\n```\n\nTo display the result\
    \ **print()** function is used. This is our first function to learn. We know that\
    \ 100 is an integer, but does Python also treat it as an integer. To check this,\
    \ **type()** is used. Just write the variable name with **type** and **print**\
    \ the result as shown. Technically, this is called passing the parameter. Here,\
    \ variable **a** is a parameter for **type** written in brackets and **type**\
    \ is a parameter for **print** command. These commands: **type()** and **print(),**\
    \ are also called built-in functions. We will learn about many built-in functions\
    \ as we move ahead. All keywords are built-in functions. Let’s check some more\
    \ types.\n\n```\na = '100'\nb = 100.11\nc = \"Python\"\nd = '''Python'''\nprint(a,b,c,d)\n\
    print(type(a))\nprint(type(b))\nprint(type(c))\nprint(type(d))\n```\n\n```\n100\
    \ 100.11 Python Python\n<class 'str'>\n<class 'float'>\n<class 'str'>\n<class\
    \ 'str'>\n```\n\nSo, if you see the outputs, you can observe that with **print**\
    \ I can pass as many parameters as I want separated by comma. With **type** only\
    \ one parameter is passed at a time. Look at the types. If anything is written\
    \ in single, double or triple quotes, Python terms the type of this data as **String**.\
    \ Decimal values are termed as Float. These are called Data Types. This indicates\
    \ the type of data, as if the data is an integer or character or anything else.\
    \ Broadly, data types in Python can be categorized as follows:\n\n1. **Numbers:**\
    \ Python supports 4 types of numeric data.\n    - int (signed integers like 10,\
    \ 2, 29, etc.)\n    - long (long integers used for a higher range of values like\
    \ 908090800L, -0x1929292L, etc.)\n    - float (float is used to store floating\
    \ point numbers like 1.9, 9.902, 15.2, etc.)\n    - complex (complex numbers like\
    \ 2.14j, 2.0 + 2.3j, etc.)\n\n**String:** The string is a sequence of characters\
    \ represented in the quotation marks.\n\n**List:** Lists are like arrays in C.\
    \ The list can contain data of different types. The items stored in the list are\
    \ separated with a comma (,) and enclosed within square brackets []."
  mdcn: "## Python 编辑器或集成开发环境\n\n谈到 IDE，有一些著名的 IDE 可以用来编写 Python 代码。IDE 基本上是带有图形用户界面的代码编辑器。一些知名的名字包括：\n\
    \n- Pycharm\n- Sublime Text\n- Atom\n- Jupyter Notebook\n- Spyder\n- IDLE\n\n\
    我使用过所有这些编辑器。在 Windows 上安装 Python 时，IDLE 会随之安装。我将在 Windows 平台上进行操作，因为在 Windows\
    \ 上安装相当简单。\n\n## Python 安装\n\n我是一个不喜欢在安装软件上费神的人。\n点击下一步、下一步、下一步，然后完成。\n如果我连安装都要费神，那还剩下什么精力来编码和构建逻辑呢？\n\
    最简单的安装方法是访问 Python 的官方网站，下载你选择的版本。\n\n![](img/967252070c1bdd582017a9d325617e34_23_0.png)\n\
    \n图 1. Python 官方网站\n\n只需向下滚动主页，找到如图所示的 3.8 版本。然后你可以点击下载。\n\n![](img/967252070c1bdd582017a9d325617e34_23_1.png)\n\
    \n我也在 Ubuntu 上工作过。在那里使用命令行安装也很容易，但当你想使用 Python 3.x 时问题就来了，因为 Linux（Ubuntu）默认显示的是\
    \ 2.7 版本。设置环境路径、bash 文件、设置这个那个……这很棘手。\n在 Windows 上，如果发生这种情况，设置路径非常容易。为了避免这些问题，另一个有用的方法是通过一些包来下载\
    \ Python。最流行的包是 **Anaconda Package**。你可以访问 Anaconda 的官方网站，从那里下载最新版本。\n\n![](img/967252070c1bdd582017a9d325617e34_24_0.png)\n\
    \n图 2. Anaconda 下载页面\n\n但最近，Anaconda 已经停止支持 32 位 Linux 和 Mac OS 的 Anaconda 包。Anaconda\
    \ 是一个安装起来比较庞大的软件，因为它预装了大量的模块和包。替代方案是 Miniconda。它是一个轻量级版本，安装速度快。但你需要根据自己的需求单独安装包。另一个重要的优势是，Anaconda\
    \ Package 还为你提供了两个 IDE：Jupyter Notebook 和 Spyder。\n\nJupyter notebook 是我最喜欢的 IDE，我在这里的所有工作都将使用它。它是唯一一个**基于浏览器的\
    \ IDE**。它会随 Anaconda Package 自动安装。当你点击 Jupyter 时，首先会打开一个 DOS 窗口，如下图所示。\n\n![](img/967252070c1bdd582017a9d325617e34_25_0.png)\n\
    \n图 3. Anaconda Jupyter 服务器\n\n不要关闭它。等待一段时间，然后你的浏览器会打开，Jupyter 界面将作为本地主机在端口 8888\
    \ 上打开，如下所示。它是基于浏览器的，但你不需要活跃的互联网连接。请记住，只要你在使用 Jupyter，就不要关闭那个 DOS 窗口。如果你的系统上有多个浏览器，并且你没有设置任何默认浏览器，那么\
    \ Jupyter 会要求你选择一个你想要打开它的浏览器。如果你的默认浏览器已经设置好了，它就会直接在该浏览器中打开。\n\n![](img/967252070c1bdd582017a9d325617e34_25_1.png)\n\
    \n图 4. 本地主机 8888 上的 Jupyter 桌面\n\nSublime Text 是一个 IDE，它有免费版和付费版。Pycharm 是一个流行的\
    \ IDE，被评为工业级产品。不过，无论你想要哪个版本，你都可以尝试一下。现在你明白为什么我不想以艰难的方式花费精力安装软件了吧？因为如今这既取决于操作系统版本，也取决于软件版本。好的。所以，我希望你在安装过程中能借助网络资源。\n\
    现在，让我们继续学习基础知识。在本章中，我们将学习一些在任何编程语言中几乎都通用的术语。\n\n## 词元\n\n词元是任何编程语言的小单元。Python\
    \ 支持 4 种类型的词元：关键字、标识符、字面量和运算符。\n\n## 保留字（关键字）\n\nPython 保留了一组 33 个关键字，用于指定特殊的语言功能。保留字不能用作变量名、函数名或标识符。\n\
    \nPython 中的关键字\n\n| False | class | finally | is | return |\n| None | continue\
    \ | for | lambda | try |\n| True | def | from | nonlocal | while |\n| and | del\
    \ | global | not | with |\n| as | elif | if | or | yield |\n| assert | else |\
    \ import | pass | |\n| break | except | in | raise | |\n\n## Python 标识符\n\n标识符代表可编程的实体，如用户定义的名称、变量、模块和其他对象。标识符可以是小写字母、大写字母、整数或任何组合的序列。标识符名称应以小写或大写字母开头，但不能以数字开头。标识符名称不应是保留字，并且只允许使用下划线（_）作为标识符名称中的特殊字符。\n\
    \n标识符名称的长度不应超过 79 个字符。\n\n## 变量与常量\n\n顾名思义，**变量**意味着可以变化或不是固定的。变量是我们开始编码时遇到的第一个标识符。当我们写\
    \ **a = 100** 时，我们执行的是变量赋值。一个常量值 100 被赋给了变量 **a**。\n\n从技术上讲，这意味着在内存通道中的某个地方创建了一个黑盒子，这个盒子被称为**对象**。它保存着值\
    \ 100（一个常量）。这个对象通过一个称为**变量**的引用来访问。\n\n常量是一种变量类型，它保存的值是不可变的（不能更改）。常量被声明并赋值给一个变量，就像上面的\
    \ 100 一样。\n\n![](img/967252070c1bdd582017a9d325617e34_28_0.png)\n\n一旦创建，**a**\
    \ 就可以在语句或表达式中使用，它的值将被替换，之后，如果 **a** 的值被更改并再次使用，将替换为新值。这就是为什么它被称为变量。\n\n## 编写或赋值变量名的规则\n\
    \nPython 中的变量名可以是任何长度（**不含空格**），可以由大写和小写字母（A-Z, a-z）、数字（0-9）和下划线字符（_）组成。最重要的规则是，尽管变量名可以包含数字，但变量名的第一个字符不能是数字。不能使用特殊符号，如\
    \ !, @, #, $, % 等。区分大小写。Python 是区分大小写的。编写多词变量名的常用方法有：\n\n- **驼峰命名法（Camel Case）：**\
    \ 第二个及后续单词首字母大写，以便更容易看清单词边界。\n    - 示例：pythonProgrammingUniverse\n- **帕斯卡命名法（Pascal\
    \ Case）：** 与驼峰命名法相同，只是第一个单词也大写。\n    - 示例：PythonProgrammingUniverse\n- **蛇形命名法（Snake\
    \ Case）：** 单词之间用下划线分隔。\n    - 示例：python_programming_universe\n\n那么，使用哪种命名法呢？没有硬性规定。根据你的需要，你可以选择任何一种命名法。好的，在继续之前，让我们输入我们的第一个内置函数。让我们赋值一个变量，看看如何显示它并检查它。\n\
    \n```\na = 100\nprint(a)\nprint(type(a))\n\n100\n<class 'int'>\n```\n\n要显示结果，使用\
    \ **print()** 函数。这是我们学习的第一个函数。我们知道 100 是一个整数，但 Python 是否也将其视为整数呢？要检查这一点，使用 **type()**。只需将变量名与\
    \ **type** 一起写在括号内，然后 **print** 结果，如图所示。从技术上讲，这称为传递参数。这里，变量 **a** 是写在括号内的 **type**\
    \ 的参数，而 **type** 是 **print** 命令的参数。这些命令：**type()** 和 **print()**，也称为内置函数。随着学习的深入，我们将了解许多内置函数。所有关键字都是内置函数。让我们再检查一些类型。\n\
    \n```\na = '100'\nb = 100.11\nc = \"Python\"\nd = '''Python'''\nprint(a,b,c,d)\n\
    print(type(a))\nprint(type(b))\nprint(type(c))\nprint(type(d))\n```\n\n```\n100\
    \ 100.11 Python Python\n<class 'str'>\n<class 'float'>\n<class 'str'>\n<class\
    \ 'str'>\n```\n\n所以，如果你看到输出，你可以观察到，使用 **print** 我可以传递任意多个用逗号分隔的参数。而 **type** 一次只能传递一个参数。看看这些类型。如果任何内容写在单引号、双引号或三引号中，Python\
