- md: '## center()


    This function will align the string to center. There are two parameters passed
    with center(). One is width and second is for padding. Padding part is optional.
    The value passed as width gives the overall width of the string after center alignment.
    Let’s check for both these functional parameters.


    ```

    ''Mark70''.center(10)

    ''  Mark70  ''

    ```


    ```

    ''Mark70''.center(10, ''-'')

    ''--Mark70--''

    ```


    Looking at the first example, Mark70 has a length of 06. The width passed as parameter
    is 10. It means that, after 2 spaces, the string will be aligned at center and
    then two spaces will be introduced making the total width of the string as 10.
    In the second example, the first 2 and last 2 spaces are filled with a dash sign.
    It’s similar to padding with zeros. Here, the padding is done with a dash sign.


    ## rjust()


    This function will align the string to right-justified. There are two parameters
    passed with rjust(). One is width and second is for padding. Padding part is optional.
    The value passed as width gives the overall width of the string after right alignment.
    Let''s check for both these functional parameters.


    ```

    ''Mark70''.rjust(10)

    ''      Mark70''

    ```


    ```

    ''Mark70''.rjust(10, ''-'')

    ''----Mark70''

    ```


    Looking at the first example, Mark70 has a length of 06. The width passed as parameter
    is 10. It means that, after 4 spaces, the string will be shifted to the right
    side. In the second example, the first 4 spaces are filled with a dash sign. It''s
    similar to padding with zeros. Here, the padding is done with a dash sign.


    ## rstrip()


    This is an extension to the **strip()** function. It will strip or remove the
    trailing characters from the string. Any whitespace characters present at the
    right will be stripped off. Any specific set of characters that are required to
    be stripped off from the right side can be passed as an argument in **rstrip()**.


    ```

    '' Tony Stark ''.rstrip()

    '' Tony Stark''

    ```


    ```

    '' Steve\t\n\f''.rstrip()

    '' Steve''

    ```


    Let''s do some selective right side stripping.


    ```

    ''Mark41''.rstrip(''14'')

    ''Mark''

    ```


    This is selective stripping from the right side. We are stripping 41 from our
    string. Reading 41 from right to left, 1 will come first and then 4, i.e., 14.
    And this is the rule to pass the parameter in rstrip(). Let''s check one more
    example.


    ```

    ''Mark41.69,''.rstrip('',96.14'')

    ''Mark''

    ```


    I think it''s quite clear now.


    ## ljust()


    This function will align the string to left-justified. There are two parameters
    passed with ljust(). One is width and second is for padding. Padding part is optional.
    The value passed as width gives the overall width of the string after left alignment.
    Let''s check for both these functional parameters. We are taking the same example
    which was used in rjust.


    ```

    ''Mark70''.ljust(10)

    ''Mark70    ''

    ```


    ```

    ''Mark70''.ljust(10, ''-'')

    ''Mark70----''

    ```


    Looking at the first example, Mark70 has a length of 06. The width passed as parameter
    is 10. It means that, after 6 characters, 4 spaces will be introduced. In the
    second example, the first 6 spaces are filled with a character, and then 4 dashes
    are used to complete the 10 widths. It''s similar to padding with zeros. Here,
    the padding is done with a dash sign.


    ## lstrip()


    This is an extension to the **strip()** function. It will strip or remove the
    trailing characters from the string. Any whitespace characters present at the
    left will be stripped off. Any specific set of characters that are required to
    be stripped off from the left side can be passed as an argument in **lstrip()**.


    ```

    ''41Mark''.lstrip(''41'')

    ''Mark''

    ```


    ```

    ''41.69,Mark''.lstrip(''41.69,'')

    ''Mark''

    ```


    This is selective stripping from the left side. We are stripping 41 from our string.
    Reading 41 from left to right, 4 will come first and then 1, i.e., 41. And this
    is the rule to pass the parameter in lstrip(). In the second example, 41.69, has
