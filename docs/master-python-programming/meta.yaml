  md: '# Chapter 9


    # Functions


    Functions are blocks of codes which execute when it is called by its name. Data
    is assigned into a function as parameters. The function then returns data as result,
    which is executed as instructed in the body. Functions are used when a set of
    instructions has to be used again and again repeatedly.


    # How to define and call a function in Python


    Function in Python is defined by the **"def"** statement followed by the **function
    name** and **parentheses (( ))**.


    There are three types of functions in Python:


    +   - Built-in functions, such as help (), min (), print (), etc..

    - User-Defined Functions (UDFs), made by users.

    - Anonymous functions, also called lambda functions which are not declared with
    the standard **def** keyword and it also does not return any value.


    # How to write a function?


    +   - Any arguments or input parameters should be placed within parentheses

    - The code is written within every function starts with a **def function_name
    (parameters)** and then a **colon (:)**. After that body starts and this body
    should be indented.

    - The statement **return**, exits a function, optionally passing back a value
    to the caller. A return statement with no arguments or parameters returns a value
    called **None**.


    # Functions vs. Methods'
