    print(angry_avenger)


    [''Dr.Bruce'', ''Banner'', ''aka'', ''The'', ''Hulk'']

    ```


    While maxsplit = -1 splits the string as normal splitting, maxsplit = 1 splits
    the string starting from right side to the left side. Here, the value is 1, hence,
    it splits after first substring.

