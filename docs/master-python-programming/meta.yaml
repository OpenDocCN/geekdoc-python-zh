- md: "# Master Python Programming\n\nLearn Python Like Never Before (Volume 1)\n\n\
    Abhishek Singh\n\n# Master Python Programming\n\n# Learn Python Like Never Before\
    \ (Volume 1)\n\nA book by\n\nAbhishek Singh (M. Tech, B.E.)\nProf., Electronics\
    \ and Communication Engineering Department,\nBaderia Global Institute of Engineering\
    \ and Management, Jabalpur\n\n© All rights strictly reserved\n\n**Imprint:** Independently\
    \ Published\n**Edition:** 1st Ed.\n**Volume:** 1st\n**ISBN:** 9798356787928\n\
    **First print:** March 2020\n\n# Statutory Warning\n\nThe purpose of this book\
    \ is educational and teaching-learning enhancement. The language used is simple\
    \ and humorous to ensure stress free environment while learning. The images and\
    \ content of this book cannot be used elsewhere neither in the form of hard copy\
    \ nor soft copy without proper permission from the author.\nImmense care has been\
    \ taken to omit any error, especially in the codes. Still if any error exists,\
    \ the author is responsible and it is admirable to bring the errors into his notice.\n\
    \n**Contact:**\n**Email ID:** [abhishek.ec@global.org.in](mailto:abhishek.ec@global.org.in)\n\
    \n# Preface\n\nWelcome everyone to the **Python Programming Universe**. Now from\
    \ the words chosen you must have understood that I am a huge fan of the Marvel\
    \ Cinematic Universe. And that's true. And I am a huge fan of Python as well.\
    \ For me, ***if Python is a religion, then Guido Van Rossum is the GOD, the official\
    \ language is Python and the universe has to be the Python Programming Universe.***\
    \ With this phrase, I welcome you all to be a part of this beautiful programming\
    \ universe.\n\n# Why did I choose to learn Python Programming?\n\n\"When I was\
    \ in 10th standard, my father brought me a computer and that was the day...\"\
    \ Actually, nothing happened like that. By education I am an Electronics Engineer,\
    \ and by profession I am an Assistant Professor in the Electronics and Communication\
    \ Engineering Department. My love is for Electronics and in fact till two years\
    \ ago, I was zero in programming. Python is my first programming language. Foremost\
    \ reason for me to start python programming is its involvement in my field of\
    \ interest, Electronics. Python is the language of Raspberry Pi. This was the\
    \ first time when I decided that OK, now is the time. Then come the first myth\
    \ of the programming world: If you have to learn programming, start with C, the\
    \ mother of modern programming languages. I thought that, for a guy like me C\
    \ is also new and Python is also new. What should I do? Should I follow the traditional\
    \ myth, or should I challenge myself to do the unthinkable? So, I decided to learn\
    \ Python.\n\n# Why should you learn Python?\n\nPython is the leading language\
    \ which has its application in every aspect of life. You think of a field and\
    \ you'll find python as a supporting pillar in that field. Instagram, YouTube,\
    \ NASA, Google, Dropbox, Machine Learning, Data Science, Big Data, Reddit, Linux,\
    \ and the list will go on. Every big name is using Python in some way or another.\
    \ Other big names are switching towards it. So no matter what academic background\
    \ you belong to, you'll find yourself in the game with Python knowledge. Python\
    \ is the future.\n\n# I don't know C. Can I learn Python?\n\nAs soon you decide\
    \ to learn any programming language, you'll hear veteran people saying, \"Hey!\
    \ Learn C man. Or you will not get the basics.\" C has been such a dominating\
    \ language that this question is obvious. It has got its own galaxy. But this\
    \ is our universe. Well, I started Python as my first language, and after reading\
    \ this book you'll feel that OK this guy has his basics quite clear. Because I\
    \ am a teacher and I know what students want. Be sure that you can start Python\
    \ as your first programming language.\n\n# I know C. Should I learn Python?\n\n\
    The question is why you should learn a modern programming language? For your question,\
    \ I have a question. Can you make a website using C? Some great graphics I want,\
    \ can you code it down using C? In terms of applications, C and Python are not\
    \ comparable. I saw the use of Python in Raspberry Pi and then I felt that OK\
    \ learning C won't help me. Definitely learning C helps you to build logic, and\
    \ in fact that can help you to grasp any logic faster. But the universe is changing.\
    \ Everyone wants multi-talented devices which can perform unimaginable applications\
    \ but written in simple programming languages. Think of Alexa or Jarvis or any\
    \ Virtual Assistant. The question is not that can you build such things, the question\
    \ is can you build such things with ease? And for this, I always feel that you\
    \ should learn one modern trending programming language. It may be JavaScript,\
    \ Java, Python, R or anything. These are comparable languages in terms of the\
    \ applications they are used in. You can learn any one of them (Hey... learn Python\
    \ only).\n\n# What is in this book?\n\nWriting a new book on one of the most popular\
    \ languages is not an easy task. It needs... courage and knowledge of course.\
    \ There are numerous good books and study material on Python in all formats possible:\
    \ soft copy, hard copy, audio, video and whatever mode exists. What makes them\
    \ interesting is the way they help you to understand things? This book is written\
    \ in such a manner in which a naïve can understand programming. If you are a beginner\
    \ then start using this book without hesitation. This book is for you. If you\
    \ have some programming background, then you’ll grasp the concepts more easily.\
    \ If you are a seasoned programmer then do give your suggestions for how to improve\
    \ the quality of my work. Quality can always be improved. So, the book is for\
    \ all of you. Just grab the book and start reading it.\n\n# How are the contents\
    \ of this book arranged?\n\nThis is the first volume in the series of two. This\
    \ volume contains following topics chapter wise:\n\n- Chapter 1 Basic Introduction\
    \ to Python\n- Chapter 2 Conditional Statements\n- Chapter 3 Loops\n- Chapter\
    \ 4 Lists\n- Chapter 5 Tuple\n- Chapter 6 Dictionary\n- Chapter 7 Sets\n- Chapter\
    \ 8 Strings\n- Chapter 9 Functions\n- Chapter 10 Iterables and Iterators\n- Chapter\
    \ 11 Generators\n- Chapter 12 Errors\n- Chapter 13 Exception Handling\n- Chapter\
    \ 14 File Handling\n- Chapter 15 Regular Expression\n\nI know these might be alien\
    \ terms if you are new and I expect you are new. For the time being, just don't\
    \ stress yourself. Read it and move on. In the second volume I'll deal with OOPS\
    \ and Advanced Data Structure. And whatever feedback I'll get that too.\n\n# Acknowledgement\n\
    \nOh yes. There are lots of guys I want to thank for sure. Starting with HIS Almighty\
    \ to give me strength and blessed me for writing this book.\nMy senior colleague\
    \ Prof. Zohaib Hasan for providing me valuable suggestions regarding book content\
    \ and criticizing me as well to write the things better (He is a C guy though).\n\
    Most importantly I want to thank some resources (and persons) I used. I read a\
    \ lot from Google, Javatpoint, RealPython, DataFlair and YouTube channels of Corey\
    \ Schafer, CS Dojo, Telusko and Joe James. I know they won't read this, but like\
    \ millions others, they help me to build my knowledge.\nI thank my wife and daughter\
    \ for their patience and love.\nI thank Amazon for all the support and resources\
    \ they provide me to bring this book to the readers.\nAnd last but the most valuable\
    \ thanks to you all, who are going to read this book now. I wish that this book\
    \ serves the sole purpose of imparting knowledge to the needed people to the fullest.\
    \ Do give your feedback, whether good or bad and let me improve my work.\n\nThank\
    \ You.\n\nDedicated to my lovely daughter Anika, and,\nTo the wonderful branch\n\
    Of\nElectronics and Communication Engineering\n\n# MASTER PYTHON PROGRAMMING\n\
    \nLearn Python Like Never Before (Volume 1)\n\n# PREFACE\n\n- Why did I choose\
    \ to learn Python Programming?\n- Why should you learn Python?\n- I don't know\
    \ C. Can I learn Python?\n- I know C. Should I learn Python?\n- What is in this\
    \ book?\n- How are the contents of this book arranged?\n\n# ACKNOWLEDGEMENT\n\n\
    # CHAPTER 1\n\n- I am... Python\n- Why version 3.8?\n- Python Editors or Integrated\
    \ Development Environment\n- Python Installation\n- Tokens\n- Reserved Words (Keywords)\n\
    - Python Identifiers\n- Variable & Constant\n  - Rules for writing or assigning\
    \ a variable name\n- Literals\n- Operators\n  - Arithmetic Operators\n  - Comparison\
    \ Operators\n  - Assignment Operator\n  - Augmented Assignment Operators\n  -\
    \ Bitwise operator\n  - Logical Operators\n  - Membership Operators\n  - Identity\
    \ Operators"
  mdcn: "# 精通Python编程\n\n前所未有的Python学习体验（第一卷）\n\nAbhishek Singh\n\n# 精通Python编程\n\n\
    # 前所未有的Python学习体验（第一卷）\n\n作者\n\nAbhishek Singh (M. Tech, B.E.)\n教授，电子与通信工程系\n\
    Baderia全球工程与管理学院，贾巴尔普尔\n\n© 保留所有权利\n\n**版权页：** 独立出版\n**版次：** 第一版\n**卷次：** 第一卷\n\
    **ISBN：** 9798356787928\n**首次印刷：** 2020年3月\n\n# 法定警告\n\n本书旨在教育和教学提升。所使用的语言简单幽默，以确保学习过程轻松无压力。未经作者适当许可，本书的图片和内容不得以任何形式（无论是纸质版还是电子版）在其他地方使用。\n\
    已尽最大努力避免任何错误，尤其是在代码方面。但如果仍存在任何错误，作者将承担责任，若能将错误告知作者，将不胜感激。\n\n**联系方式：**\n**电子邮件：**\
    \ [abhishek.ec@global.org.in](mailto:abhishek.ec@global.org.in)\n\n# 前言\n\n欢迎大家来到**Python编程宇宙**。从选词上你们一定已经明白，我是漫威电影宇宙的超级粉丝。确实如此。同时，我也是Python的超级粉丝。对我来说，***如果Python是一种宗教，那么Guido\
    \ Van Rossum就是上帝，官方语言是Python，而宇宙必须是Python编程宇宙。*** 用这句话，我欢迎大家成为这个美妙编程宇宙的一部分。\n\n\
    # 我为什么选择学习Python编程？\n\n“当我上十年级时，我父亲给我买了一台电脑，那天……”实际上，并没有发生这样的事。我的专业是电子工程师，职业是电子与通信工程系的助理教授。我热爱电子学，事实上直到两年前，我在编程方面还是零基础。Python是我的第一门编程语言。我开始学习Python编程的首要原因是它与我感兴趣的领域——电子学——密切相关。Python是树莓派的语言。这是我第一次下定决心，好吧，是时候了。然后遇到了编程世界的第一大迷思：如果你想学编程，就从C语言开始，它是现代编程语言之母。我想，对于像我这样的人来说，C语言是新的，Python也是新的。我该怎么办？是遵循传统的迷思，还是挑战自己去做看似不可能的事？所以，我决定学习Python。\n\
    \n# 为什么你应该学习Python？\n\nPython是领先的语言，其应用遍及生活的方方面面。你想到一个领域，就会发现Python是该领域的支柱。Instagram、YouTube、NASA、Google、Dropbox、机器学习、数据科学、大数据、Reddit、Linux，这个名单还会继续。每个大名鼎鼎的公司都在以某种方式使用Python。其他大公司也在转向它。所以，无论你是什么学术背景，掌握Python知识都会让你在游戏中占有一席之地。Python就是未来。\n\
    \n# 我不懂C语言。我能学Python吗？\n\n一旦你决定学习任何编程语言，你就会听到资深人士说：“嘿！学C语言吧。否则你学不会基础。”C语言一直是一门如此占主导地位的语言，这个问题是显而易见的。它有自己的星系。但这是我们的宇宙。好吧，我从Python开始作为我的第一门语言，读完这本书后，你会觉得，好吧，这家伙的基础相当扎实。因为我是一名教师，我知道学生想要什么。请放心，你可以将Python作为你的第一门编程语言。\n\
    \n# 我懂C语言。我应该学Python吗？\n\n问题是，你为什么应该学习一门现代编程语言？对于你的问题，我有一个问题。你能用C语言制作一个网站吗？我想要一些很棒的图形，你能用C语言编写代码实现吗？在应用方面，C语言和Python是无法比较的。我在树莓派上看到了Python的应用，然后我觉得，好吧，学习C语言对我没有帮助。当然，学习C语言有助于构建逻辑，事实上，这可以帮助你更快地掌握任何逻辑。但宇宙在变化。每个人都想要多才多艺的设备，能够执行难以想象的应用，但使用简单的编程语言编写。想想Alexa或Jarvis或任何虚拟助手。问题不在于你能否构建这样的东西，而在于你能否轻松地构建这样的东西？为此，我总觉得你应该学习一门现代流行的编程语言。可以是JavaScript、Java、Python、R或任何其他语言。这些语言在它们所应用的领域是可比的。你可以学习其中任何一门（嘿……就学Python吧）。\n\
    \n# 这本书里有什么？\n\n为一门最受欢迎的语言写一本新书并非易事。它需要……勇气和知识。关于Python，有无数优秀的书籍和学习资料，各种格式都有：电子版、纸质版、音频、视频以及任何存在的模式。让它们有趣的是它们帮助你理解事物的方式。这本书的写作方式，让一个新手也能理解编程。如果你是初学者，那么毫不犹豫地开始使用这本书吧。这本书就是为你准备的。如果你有一些编程背景，那么你会更容易掌握概念。如果你是一位经验丰富的程序员，那么请务必提出你的建议，告诉我如何提高我的工作质量。质量总是可以提高的。所以，这本书适合你们所有人。拿起书，开始阅读吧。\n\
    \n# 这本书的内容是如何安排的？\n\n这是两卷系列中的第一卷。本卷按章节包含以下主题：\n\n- 第1章 Python基础介绍\n- 第2章 条件语句\n\
    - 第3章 循环\n- 第4章 列表\n- 第5章 元组\n- 第6章 字典\n- 第7章 集合\n- 第8章 字符串\n- 第9章 函数\n- 第10章\
    \ 可迭代对象与迭代器\n- 第11章 生成器\n- 第12章 错误\n- 第13章 异常处理\n- 第14章 文件处理\n- 第15章 正则表达式\n\n\
    我知道如果你是新手，这些可能是陌生的术语，而我猜你就是新手。目前，不要给自己太大压力。读下去，继续前进。在第二卷中，我将讲解面向对象编程和高级数据结构。以及我收到的所有反馈。\n\
    \n# 致谢\n\n哦，是的。我肯定要感谢很多人。首先感谢全能的主赐予我力量，并祝福我写这本书。\n感谢我的高级同事Zohaib Hasan教授，他为我提供了关于书籍内容的宝贵建议，并批评我以更好地写作（尽管他是个C语言专家）。\n\
    最重要的是，我要感谢我使用的一些资源（和人物）。我从Google、Javatpoint、RealPython、DataFlair以及Corey Schafer、CS\
    \ Dojo、Telusko和Joe James的YouTube频道学到了很多。我知道他们不会读到这个，但像数百万人一样，他们帮助我建立了我的知识。\n感谢我的妻子和女儿的耐心和爱。\n\
    感谢亚马逊提供的所有支持和资源，让我能把这本书带给读者。\n最后但同样重要的是，感谢你们所有人，现在即将阅读这本书的人。我希望这本书能充分实现向需要的人传授知识的唯一目的。请务必提供你的反馈，无论好坏，让我改进我的工作。\n\
    \n谢谢。\n\n献给我可爱的女儿Anika，以及，\n献给\n电子与通信工程\n这个美妙的领域\n\n# 精通Python编程\n\n前所未有的Python学习体验（第一卷）\n\
    \n# 前言\n\n- 我为什么选择学习Python编程？\n- 为什么你应该学习Python？\n- 我不懂C语言。我能学Python吗？\n- 我懂C语言。我应该学Python吗？\n\
    - 这本书里有什么？\n- 这本书的内容是如何安排的？\n\n# 致谢\n\n# 第1章\n\n- 我是……Python\n- 为什么是3.8版本？\n-\
    \ Python编辑器或集成开发环境\n- Python安装\n- 词法单元\n- 保留字（关键字）\n- Python标识符\n- 变量与常量\n  -\
    \ 编写或赋值变量名的规则\n- 字面量\n- 运算符\n  - 算术运算符\n  - 比较运算符\n  - 赋值运算符\n  - 增强赋值运算符\n  -\
    \ 位运算符\n  - 逻辑运算符\n  - 成员运算符\n  - 身份运算符"
