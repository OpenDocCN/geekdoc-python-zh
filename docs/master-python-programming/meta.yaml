    Widow'', 0: ''Nick''}

    ```


    The syntax is very simple, **del** dictionary **name [key]**. The **pop ()** command
    is a little different compared to **del ()**. In pop (), there is an option for
    setting the default value. If the key doesn''t exist, then the default value is
    returned. If both key and default values are not set, then, Key Error will occur.


    ```

