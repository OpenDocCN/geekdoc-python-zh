- md: "There are **n** elements in the list and I want each **n** element to get squared,\
    \ i.e. **n * n**. I can say that, \"I want **n*n for** each value of **n** which\
    \ is **in** the given **list_variable**\". The words which are in bold font, let\
    \ me take these out and put it in square brackets. **[n*n for n in list_variable]**.\
    \ Assign this to a variable. Bingo!! This is list comprehension.\nLet's try for\
    \ some more examples. I'll explain in detail and I'll also try to write like English\
    \ sentences.\n\n## Write a program using List Comprehension to print the sum of\
    \ all digits from an alphanumeric string.\n\n**Solution:** What should be the\
    \ algorithm?\n\n1. There is an alphanumeric string containing both characters\
    \ and numbers.\n2. Let all these be some value say, \"i\".\n3. We want int (i)\
    \ and we have to check if this int (i) is a digit or not and if it is present\
    \ in the input string or not.\n4. Finally, we have to take the sum of all these\
    \ values of \"i\" and print the sum.\n\nLet's code it down now,\n\n```\nmy_data\
    \ = \"Hello Sir. I am 65 years old, and, \\n          my height is 5 foot 10 inches\
    \ and, \\n          my biceps are 18 inches wide.\"\nmy_list = [int(i) for i in\
    \ my_data if i.isdigit()]\nprint(my_list)\n\n[6, 5, 5, 1, 0, 1, 8]\n```\n\nSo,\
    \ this is my input string. You can also use input commands to prompt users to\
    \ enter the string at runtime. In English, it goes like, \"I want **integer**\
    \ values of **I for** each value of **I** in **my data** after checking that **if\
    \ I** is a **digit**.\" I have used the backslash to type the string into newline\
    \ (without it the string would be long and the snapshot would have become small\
    \ and faded.)\n\nWe are getting the numbers but it's more like a list. This is\
    \ not what we wanted. My list is having the value 65 and it's giving 6, 5. In\
    \ this case we need a function called **split ()**. What does this .split () do?\n\
    \n```\nmy_data = \"Hello Sir. I am 65 years old\"\nmy_data.split()\n\n['Hello',\
    \ 'Sir.', 'I', 'am', '65', 'years', 'old']\n```\n\nSo, it's separating or splitting\
    \ everything. All these values are equal to \"i\". And our requirement is to get\
    \ all those values of \"i\" which are digits. Let's incorporate this function\
    \ in our list comprehension.\n\n```\nmy_list = [int(i) for i in my_data.split()\
    \ if i.isdigit()]\nprint(my_list)\n\n[65, 5, 10, 18]\n```\n\nNow it's working\
