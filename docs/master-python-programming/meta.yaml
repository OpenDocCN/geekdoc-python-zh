  md: 'In Python strings, the backslash \ is a special character, also called the
    escape character. It is used in representing certain whitespace characters: \t
    is a tab, \n is a newline, and \r is a carriage return. Conversely, prefixing
    a special character with \ turns it into an ordinary character.

    When an ‘r’ or ‘R’ prefix is present, a character following a backslash is included
    in the string without change, and all backslashes are left in the string. We will
    use these in strings later, but here, we will have some overview of how they work.
    The valid escape characters in Python are,


    | Operator | Operation |

    | :--- | :--- |

    | \'' | **Single quote for character literals** |

    | " | **Double quote for string literals** |

    | \ | **Backslash for string literals** |

    | \0 | **Unicode character 0** |

    | \a | **Alert** |

    | \b | **Backspace** |

    | \t | **Form feed** |

    | \n | **Newline** |

    | \r | **Carriage return** |

    | \t | **Horizontal tab** |

    | \v | **Vertical tab** |

    | \xhh | **Matches an ASCII character using hexadecimal representation (exactly
    two digits)** |

    | \uhhhh | **Matches a Unicode character using hexadecimal representation (exactly
    four digits)** |


    Let’s see how to use these escape sequences.'
