    \ a number: -5\nThe number -5 is negative\n\nLet’s try writing this using the\
    \ Walrus Operator.\n\n## WAP to find if a number is an even number or an odd number\
    \ using a walrus operator?\n\nFirst I am writing it without a walrus operator.\
    \ I have already written it above as our first program, but let’s write in another\
    \ way.\n\n```\nnum = int(input('Enter the number:'))\nrem = num % 2\nif num %\
    \ 2 == 0:\n    print(num,'is an even number and the rem is',rem)\nelse:\n    print(num,'is\
    \ an odd number and the rem is',rem)\n```\n\nWhat I have done is, I have taken\
    \ a number and then I am dividing the number by 2 and I want to check the remainder,\
    \ so I am using modulus **num%2**. Then I am assigning the result of **num%2**\
    \ to another variable called rem. I am equating the result to zero. **If** it’s\
    \ zero, then it’s an even number, **else**, it is an odd number. Now let’s write\
    \ it down using the walrus operator.\n\n```\nnum = int(input('Enter the number:'))\n\
    if (rem := num % 2) == 0:\n    print(num,'is an even number and the rem is',rem)\n\
    else:\n    print(num,'is an odd number and the rem is',rem)\n```\n\nThe output\
    \ will be\n\n```\nEnter the number:5\n5 is an odd number and the rem is 1\n\n\
    Enter the number:10\n10 is an even number and the rem is 0\n```\n\nNow, we have\
    \ two programs to find an even or an odd number without using the walrus operator\
    \ and one program using the walrus operator. Can we use the walrus operator as\
    \ a replacement for our first program? If we see here, we have two lines having\
    \ the same statements written: **num%2 == 0 and rem = num%2**. So, what are we\
    \ doing? We are writing **rem = num%2** and then returning it back to rem by writing\
    \ **rem := num%2** and then checking **if** this entire operation is 0 or not.\
    \ That’s why I said in the previous chapter that what you can do with the walrus\
    \ operator, you can also do without it. Use walrus operators when there are two\
    \ statements having the same things written. We’ll use this operator in later\
    \ chapters where you’ll find it more beneficial.\n\nMoving on, we can have as\
    \ many if- else conditions as we wish. We also can have **if within if within\
    \ if** and so on. This condition is called Nested If- Else condition. There is\
    \ also another condition called If- Elif- Else. It works like **if** one condition\
    \ executes print the result, **else if** another condition executes and prints\
    \ this result, **else** the third condition executes and prints the result. The\
    \ syntax is:\n\n```\nif test expression:\n    Body of if\nelif test expression:\n\
    \    Body of elif\nelse:\n    Body of else\n```\n\nLet’s try one more program\
    \ to see the use of many if conditions and if-elif-else conditions.\n\n## WAP\
    \ to find if a number is positive or negative using nested if else condition?\n\
    \nAssignment expressions assign and return a value in the same expression. We\
    \ have seen how to assign a value and then print it out.\n\n```\na = 5\nprint(a)\n\
    ```\n\n5\n\nNow this symbol, := assigns, and returns at the same time. It is written\
    \ like this.\n\n```\nprint(a := 5)\n```\n\n5\n\nUsefulness of the walrus operator\
    \ is a subject to explore. You can feel assure that whatever you can do with the\
    \ Walrus Operator; the same can be done without it. We will see in the later chapters\
    \ that how and where we can use the walrus operator because this operator works\
    \ well with Loops.\n\nTalking about precedence, there is no official documentation\
    \ about the priority of the Walrus operator. But one important condition is that\
    \ this operator is always written inside brackets. Brackets or Parenthesis have\
    \ the highest priority. Also, this is not only assigning, it’s returning at the\
    \ same time. Hence, it’s a complete expression. Maybe that’s why there is no talk\
    \ about its precedence yet.\n\nHere, we are concluding this chapter. I haven’t\
    \ explored a lot about how all the operators work. I feel that the operators can\
    \ be best understood by its use in loops and not by simply writing **a + b or\
    \ a > b**. So, from the next chapter we’ll start to program and then we will learn\
    \ how and when to use which operator. Your job, till this point of time is to\
    \ memorize and remember the operators."
  mdcn: "## 第二章\n\n## 条件语句\n\n条件语句是指当满足特定条件时才会执行的语句。其语法如下：\n\n```\nif test expression:\n\
    \    Body of if\nelse:\n    Body of else\n```\n\n例如，我想检查一个数字是偶数还是奇数。根据数学定义，如果一个数能被2整除且余数为零，那么这个数就是偶数，否则就是奇数。这里的条件就是，**除以2余数为零**。这将是期望的条件或真条件。另一个条件是，**除以2余数不为零**。这将是不期望的条件或假条件。条件语句只会给出这两种输出中的一种。用英语我们怎么说呢？**如果**这个数能被2整除且余数为零，那么这个数是偶数，**否则**，它就是奇数。这两个英语单词**If-\
    \ else**在Python中被称为条件语句。那么，让我们把这个奇偶数讨论作为我们的第一个程序，并学习一些编程基础知识。\n\n## 编写程序，判断一个数是偶数还是奇数？\n\
    \n```\na = int(input(\"Enter a number:\"))\nif (a%2)==0:\n    print(a,\"is an\
