    # Operator Precedence


    By operator precedence it means which operator should be evaluated first. When
    two operators share an operand, the operator with the higher *precedence* will
    operate first. Python follows the standard precedence rule of **PEMDAS** (Parenthesis-
    Exponents- Multiplication- Division- Addition- Subtraction), with **Parenthesis**
    having the highest and **Subtraction** having the lowest priority. The priority
    table is as follows:


    | Operator | Operation |

    | :--- | :--- |

    | ** | **Exponent** |

    | ~, +, - | Negation, Unary plus and minus |

    | *, /, %, // | Multiply, divide, modulus, floor division |

    | +, - | Binary plus and minus |

    | >>, << | Left shift and Right shift |

    | & | Binary AND |

    | ^, | | Binary XOR, OR |

    | <=, <, >, >= | Comparison operators |

    | <, >, ==, != | Equality operators |

    | =, %=, /=, //=, -=, +=, *=, **= | Assignment operators and Augmented assignment
    operators |'
