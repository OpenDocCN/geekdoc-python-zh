    \ Let me highlight it and zoom it.\n\n![](img/967252070c1bdd582017a9d325617e34_236_1.png)\n\
    \nThis is the iter method. We can also have an iter method written as follows\n\
    \n```python\na = [4,3,2,1]\nprint(a.__iter__())\n```\n\n```\n<list_iterator object\
    \ at 0x04C0EA10>\n```\n\nIt means that lists are iterable because it has this\
    \ method. But is it an iterator? Can we use a list to do the function of a **for\
