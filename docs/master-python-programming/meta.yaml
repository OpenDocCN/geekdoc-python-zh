    # Union in Sets


    Two sets can be joined together using **union** function, or by using “|” sign.
    Let’s check.


    ```

    >>>

    >>> hero_name = {''IronMan'', ''Captain America'', ''Hulk''}

    >>> non_hero_name = {''Tony'', ''Steve'', ''Bruce''}

    >>> hero_name | non_hero_name

    {''Steve'', ''Tony'', ''IronMan'', ''Captain America'', ''Bruce'', ''Hulk''}

    >>>

    >>> hero_name.union(non_hero_name)

    {''Steve'', ''Tony'', ''IronMan'', ''Captain America'', ''Bruce'', ''Hulk''}

    >>>

    ```


    That’s good. OK. One thing again is observable. The elements are arranged unordered.
    Here, one task you can perform is to check the final set when both these sets
    have any name common, say, Nebula. A question can come in mind that are **union**
    and “ | ” the same thing? (I know this question never came to mind. But now, it
    has been). Now this is an important topic to discuss. This **union** is a method
    and “ | “ is an operator. It’s an interview question actually which asks are method
    and operator the same thing? We just checked this thing by code. Let’s do some
    more coding.'
- md: "## Intersection in Sets\n\nThis function will return those values which are\
    \ common in all sets. Similar to union, the method used here is **intersection**\
    \ and the operator is **&** operator.\n\n```\n>>> hero_name = {'IronMan', 'Captain\
    \ America', 'Hulk', 'Nebula'}\n>>> non_hero_name = {'Tony', 'Steve', 'Bruce',\
    \ 'Nebula'}\n>>> hero_name & non_hero_name\n{'Nebula'}\n>>> hero_name.intersection(non_hero_name)\n\
    {'Nebula'}\n```\n\nThe code is self-explanatory I guess. But yes, you can try\
    \ the operator vs method issue here also. Intersection allows multiple set operations.\n\
    \n## Difference in Sets\n\nThis function will return those values which are present\
    \ in one set but not present in another set. Similar to union, the method used\
    \ here is **difference** and the operator is the - operator.\n\n```\n>>> hero_name\
    \ - non_hero_name\n{'IronMan', 'Captain America', 'Hulk'}\n>>> hero_name.difference(non_hero_name)\n\
    {'IronMan', 'Captain America', 'Hulk'}\n```\n\nThe set hero_name has elements\
    \ which are not present in set non_hero_name. Difference allows multiple set operations.\n\
    \n## Symmetric Difference in Sets\n\nThis function will return those values which\
    \ are present in either the first set or second set but not in both sets. Or the\
    \ common element is not displayed. Similar to union, the method used here is **symmetric_difference**\
    \ and the operator is '^' operator.\n\n```\n>>> hero_name ^ non_hero_name\n{'Tony',\
    \ 'Steve', 'IronMan', 'Captain America', 'Bruce', 'Hulk'}\n>>> hero_name.symmetric_difference(non_hero_name)\n\
    {'Tony', 'Steve', 'IronMan', 'Captain America', 'Bruce', 'Hulk'}\n```\n\nThis\
    \ function also allows multiple set operations. But there is one interesting thing.\
    \ The ‘ ^ ‘ operator allows multiple sets, the .symmetric_difference () method\
    \ doesn't allow multiple sets.\n\n## .isdisjoint () in Sets\n\nThe function is\
    \ used to check whether or not the sets have any elements in common. If there\
    \ are no common elements then, True is returned.\n\n## .issubset () in Sets\n\n\
    The function is used to check whether one set is a subset of the other. The “\
    \ <= “ is used to check the subset.\n\n```\n>>> iron_man_1 = {'Tony', 'WarMachine'}\n\
    >>> iron_man_2 = {'Tony', 'WarMachine', 'Natasha'}\n>>> iron_man_1.isdisjoint(iron_man_2)\n\
    False\n>>> iron_man_1.issubset(iron_man_2)\nTrue\n```\n\nWe can see that both\
    \ sets have some common elements. Therefore, the disjoint value is False. And\
    \ we can say that they are a subset of each other. If both sets have no elements\
    \ in common, then they are empty sets.\n\n```\n>>> heros = {'Tony', 'Bruce', 'Dr.Strange'}\n\
    >>> villains = {'Thanos', 'Loki', 'Dormaamu'}\n>>> heros.isdisjoint(villains)\n\
    True\n>>> heros & villains\nset()\n```\n\nBoth sets have nothing in common. Thus\
    \ heroes and villains form an empty set.\n\n## Proper subset () in Sets\n\nThe\
    \ function is used to check whether one set is the proper subset of the other.\
    \ The word proper means every element of one set is in another set but both sets\
    \ are not identical. The “ < “ is used to check the proper subset.\n\n```\n>>>\
    \ heros = {'Tony', 'Steve', 'Hulk'}\n>>> avengers = {'Tony', 'Steve', 'Ant Man'}\n\
    >>> heros < avengers\nFalse\n```\n\nYou can see that every element of the first\
    \ set is not present in the second set. Therefore, the output returned is False.\n\
    \n## .issuperset () in Sets\n\nThe function is used to check whether one set is\
    \ a superset of the other. It is an opposite function of the subset. It checks\
    \ whether all elements of one set are also present in another set. The “>= “is\
    \ used to check the superset.\n\n```\n>>> heros = {'Tony', 'Steve', 'Hulk'}\n\
    >>> avengers = {'Tony', 'Steve', 'Hulk', 'Ant Man'}\n>>> heros >= avengers\nFalse\n\
    >>> avengers >= heros\nTrue\n```\n\nThe set **avengers** contain all elements\
    \ of set **heros,** therefore, heros is a superset of avengers and the output\
    \ returned is True. But set **heros** don't contain all the elements of set **avengers.**\
    \ Thus, the output returned is False.\n\n## Proper superset () in Sets\n\nThe\
    \ function is used to check whether one set is the proper subset of the other.\
    \ The word proper means every element of one set is in another set but both sets\
    \ are not identical. The “> “is used to check the proper subset.\n\n```\n>>> avengers\
    \ > heros\nTrue\n>>> heros > avengers\nFalse\n```\n\nCan you check to see whether\
    \ a set is subset, superset, proper subset and proper superset of its own?\nMoving\
    \ on to modifying a set. There are many ways to modify a set.\n\n## .add () in\
    \ Sets\n\nThe function is used to add any element (single immutable element).\n\
    \n```\n>>> heros = {'Tony', 'Steve', 'Bruce'}\n>>> heros.add('Peter')\n>>> heros\n\
    {'Bruce', 'Tony', 'Peter', 'Steve'}\n```\n\nWhat if we add more than one element?\n\
    \n```\n>>> heros.add('Thanos', 'Ronan')\nTraceback (most recent call last):\n\
    \  File \"<pyshell#21>\", line 1, in <module>\n    heros.add('Thanos', 'Ronan')\n\
    TypeError: add() takes exactly one argument (2 given)\n```\n\nLook at the error\
    \ statement in the last line. Add () takes only one element. But we are giving\
    \ it two.\nTo remove any element from the set, there are two ways to do so:\n\
    .remove () and .discard ().\n\n```\n>>> heros.remove('Peter')\n>>> heros\n{'Bruce',\
    \ 'Tony', 'Steve'}\n>>> heros.discard('Bruce')\n>>> heros\n{'Tony', 'Steve'}\n\
    ```\n\nThe difference is seen when we try to remove any element which is not present\
    \ in the set.\n\n```\n>>> heros.remove('Peter')\nTraceback (most recent call last):\n\
    \  File \"<pyshell#29>\", line 1, in <module>\n    heros.remove('Peter')\nKeyError:\
    \ 'Peter'\n>>> heros.discard('Peter')\n>>> heros\n{'Tony', 'Steve'}\n```\n\nWhen\
    \ we try to remove any non-existing element from a set using remove () method,\
    \ it will throw an error. On the other hand, using discard () will not give an\
    \ error. It will simply return the existing set. Another way to remove any element\
    \ is using the .pop () method. But this method randomly removes any element.\n\
    \n```\n>>> heros = {'Tony', 'Steve', 'Bruce', 'Peter'}\n>>> heros\n{'Bruce', 'Tony',\
    \ 'Peter', 'Steve'}\n>>> heros.pop()\n'Bruce'\n>>> heros\n{'Tony', 'Peter', 'Steve'}\n\
    >>> heros.pop()\n'Tony'\n>>> heros\n{'Peter', 'Steve'}\n>>> heros.pop()\n'Peter'\n\
    >>> heros\n{'Steve'}\n>>> heros.pop()\n'Steve'\n>>> heros\nset()\n>>> heros.pop()\n\
    Traceback (most recent call last):\n  File \"<pyshell#44>\", line 1, in <module>\n\
    \    heros.pop()\nKeyError: 'pop from an empty set'\n```\n\nOne can see how pop\
    \ () removes any random element from the set. It is also important to see the\
    \ last example. When pop () is applied on an empty set, an error is thrown back.\
    \ Another important function is .clear () function. This is used to .clear ()\
    \ the set."
  mdcn: "## 集合的交集\n\n此函数将返回所有集合中共同存在的值。与并集类似，这里使用的方法是**交集**，运算符是 **&** 运算符。\n\n```\n\
    >>> hero_name = {'IronMan', 'Captain America', 'Hulk', 'Nebula'}\n>>> non_hero_name\
    \ = {'Tony', 'Steve', 'Bruce', 'Nebula'}\n>>> hero_name & non_hero_name\n{'Nebula'}\n\
    >>> hero_name.intersection(non_hero_name)\n{'Nebula'}\n```\n\n我想这段代码不言自明。不过，你也可以在这里尝试一下运算符与方法的区别。交集允许多个集合操作。\n\
    \n## 集合的差集\n\n此函数将返回存在于一个集合中但不存在于另一个集合中的值。与并集类似，这里使用的方法是**差集**，运算符是 **-** 运算符。\n\
    \n```\n>>> hero_name - non_hero_name\n{'IronMan', 'Captain America', 'Hulk'}\n\
    >>> hero_name.difference(non_hero_name)\n{'IronMan', 'Captain America', 'Hulk'}\n\
    ```\n\n集合 `hero_name` 包含集合 `non_hero_name` 中不存在的元素。差集允许多个集合操作。\n\n## 集合的对称差集\n\
    \n此函数将返回存在于第一个集合或第二个集合中，但不同时存在于两个集合中的值。或者说，不显示共同元素。与并集类似，这里使用的方法是**对称差集**，运算符是\
    \ **^** 运算符。\n\n```\n>>> hero_name ^ non_hero_name\n{'Tony', 'Steve', 'IronMan',\
    \ 'Captain America', 'Bruce', 'Hulk'}\n>>> hero_name.symmetric_difference(non_hero_name)\n\
    {'Tony', 'Steve', 'IronMan', 'Captain America', 'Bruce', 'Hulk'}\n```\n\n此函数也允许多个集合操作。但有一个有趣的地方：`^`\
    \ 运算符允许多个集合，而 `.symmetric_difference()` 方法则不允许。\n\n## 集合的 .isdisjoint ()\n\n此函数用于检查集合是否有任何共同元素。如果没有共同元素，则返回\
    \ `True`。\n\n## 集合的 .issubset ()\n\n此函数用于检查一个集合是否是另一个集合的子集。使用 `<=` 来检查子集关系。\n\n\
    ```\n>>> iron_man_1 = {'Tony', 'WarMachine'}\n>>> iron_man_2 = {'Tony', 'WarMachine',\
    \ 'Natasha'}\n>>> iron_man_1.isdisjoint(iron_man_2)\nFalse\n>>> iron_man_1.issubset(iron_man_2)\n\
    True\n```\n\n我们可以看到两个集合有一些共同元素。因此，不相交的值为 `False`。我们可以说它们互为子集。如果两个集合没有共同元素，那么它们就是空集。\n\
    \n```\n>>> heros = {'Tony', 'Bruce', 'Dr.Strange'}\n>>> villains = {'Thanos',\
    \ 'Loki', 'Dormaamu'}\n>>> heros.isdisjoint(villains)\nTrue\n>>> heros & villains\n\
    set()\n```\n\n两个集合没有任何共同元素。因此，`heros` 和 `villains` 构成一个空集。\n\n## 集合的真子集 ()\n\n\
    此函数用于检查一个集合是否是另一个集合的真子集。真子集意味着一个集合的每个元素都在另一个集合中，但两个集合并不完全相同。使用 `<` 来检查真子集关系。\n\
    \n```\n>>> heros = {'Tony', 'Steve', 'Hulk'}\n>>> avengers = {'Tony', 'Steve',\
    \ 'Ant Man'}\n>>> heros < avengers\nFalse\n```\n\n你可以看到第一个集合的每个元素并不都在第二个集合中。因此，返回的输出是\
    \ `False`。\n\n## 集合的 .issuperset ()\n\n此函数用于检查一个集合是否是另一个集合的超集。它是子集的相反函数。它检查一个集合的所有元素是否也存在于另一个集合中。使用\
    \ `>=` 来检查超集关系。\n\n```\n>>> heros = {'Tony', 'Steve', 'Hulk'}\n>>> avengers =\
    \ {'Tony', 'Steve', 'Hulk', 'Ant Man'}\n>>> heros >= avengers\nFalse\n>>> avengers\
    \ >= heros\nTrue\n```\n\n集合 **avengers** 包含集合 **heros** 的所有元素，因此，`heros` 是 `avengers`\
    \ 的超集，返回的输出是 `True`。但集合 **heros** 并不包含集合 **avengers** 的所有元素。因此，返回的输出是 `False`。\n\
    \n## 集合的真超集 ()\n\n此函数用于检查一个集合是否是另一个集合的真超集。真超集意味着一个集合的每个元素都在另一个集合中，但两个集合并不完全相同。使用\
    \ `>` 来检查真超集关系。\n\n```\n>>> avengers > heros\nTrue\n>>> heros > avengers\nFalse\n\
    ```\n\n你能检查一下一个集合是否是其自身的子集、超集、真子集和真超集吗？\n接下来我们来修改集合。修改集合的方法有很多。\n\n## 集合的 .add\
    \ ()\n\n此函数用于添加任何元素（单个不可变元素）。\n\n```\n>>> heros = {'Tony', 'Steve', 'Bruce'}\n\
    >>> heros.add('Peter')\n>>> heros\n{'Bruce', 'Tony', 'Peter', 'Steve'}\n```\n\n\
    如果我们添加多个元素会怎样？\n\n```\n>>> heros.add('Thanos', 'Ronan')\nTraceback (most recent\
    \ call last):\n  File \"<pyshell#21>\", line 1, in <module>\n    heros.add('Thanos',\
    \ 'Ronan')\nTypeError: add() takes exactly one argument (2 given)\n```\n\n看看最后一行的错误信息。`add()`\
    \ 只接受一个元素。但我们给了它两个。\n要从集合中移除任何元素，有两种方法：\n`.remove()` 和 `.discard()`。\n\n```\n\
    >>> heros.remove('Peter')\n>>> heros\n{'Bruce', 'Tony', 'Steve'}\n>>> heros.discard('Bruce')\n\
    >>> heros\n{'Tony', 'Steve'}\n```\n\n当我们尝试移除集合中不存在的元素时，可以看到两者的区别。\n\n```\n>>>\
    \ heros.remove('Peter')\nTraceback (most recent call last):\n  File \"<pyshell#29>\"\
    , line 1, in <module>\n    heros.remove('Peter')\nKeyError: 'Peter'\n>>> heros.discard('Peter')\n\
    >>> heros\n{'Tony', 'Steve'}\n```\n\n当我们尝试使用 `remove()` 方法从集合中移除一个不存在的元素时，它会抛出一个错误。另一方面，使用\
    \ `discard()` 则不会出错。它只会简单地返回现有的集合。另一种移除元素的方法是使用 `.pop()` 方法。但这个方法会随机移除一个元素。\n\n\
    ```\n>>> heros = {'Tony', 'Steve', 'Bruce', 'Peter'}\n>>> heros\n{'Bruce', 'Tony',\
    \ 'Peter', 'Steve'}\n>>> heros.pop()\n'Bruce'\n>>> heros\n{'Tony', 'Peter', 'Steve'}\n\
    >>> heros.pop()\n'Tony'\n>>> heros\n{'Peter', 'Steve'}\n>>> heros.pop()\n'Peter'\n\
    >>> heros\n{'Steve'}\n>>> heros.pop()\n'Steve'\n>>> heros\nset()\n>>> heros.pop()\n\
    Traceback (most recent call last):\n  File \"<pyshell#44>\", line 1, in <module>\n\
    \    heros.pop()\nKeyError: 'pop from an empty set'\n```\n\n可以看到 `pop()` 如何从集合中随机移除任何元素。同样重要的是看最后一个例子。当对空集应用\
    \ `pop()` 时，会抛出一个错误。另一个重要的函数是 `.clear()` 函数。它用于清空集合。"
