    character is a string.

    How to create a string?

    Strings can be created when anything is written within single, double or triple
    quotes. The type () command can be used to verify the result. Let’s write some
    strings.


    ```

    >>> avengers = ''I am Iron Man''

    >>> type(avengers)

    <class ''str''>

    >>> avengers = "I am Iron Man"

    >>> type(avengers)

    <class ''str''>

    >>> avengers = ''''''I am Iron Man''''''

    >>> type(avengers)

    <class ''str''>

    ```


    So, we have a variable named as avengers and the string stored in it is I am Iron
    Man. One can observe how single, double and triple quotes have been used to write
    the string. Also, using the type () command we have cross verified that the type
    is string. First thing first, why so many types of quotes? Always remember that
    a pair of a particular type of quotes can be enclosed within another pair of particular
    types of quotes. By pair I mean, starting and ending quotes. But what’s the advantage?


    ```

    >>> iron_man = "I love you ''3000''"

    >>> print(iron_man)

    I love you ''3000''

    ```'
