    \ ** B = 25 |\n| // | **整除** | A = 5, B = 2 则, A // B = 2 |\n\n现在，在学习了算术运算符之后，让我们在继续之前讨论一个重要话题。我能将一种数据类型转换为另一种吗？我的意思是，我能将**i\
    \ = 5**转换为字符串，或者将**i = '5'**转换为整数或浮点数吗？答案是，可以。当我们写**i = 5**时，Python会自动理解它是一个整数。我们不必像**int\
    \ i = 5**那样提及或编写。这被称为**动态类型语言**。如果你熟悉C、C++或Java等语言，我们必须这样写，**int i = 5**，因此它们被称为**静态类型语言**。让我们将一个整数和一个字符串相加。\n\
