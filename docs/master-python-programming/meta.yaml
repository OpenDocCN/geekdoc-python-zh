    \ and read. Let’s begin with this interesting feature.\nThe task is to write a\
    \ python code to generate a square of first 10 numbers. The task is very simple.\
    \ Before using List Comprehension, let’s code it down using simple for loop, as\
    \ we have used earlier while understanding for loop structure.\n\n# Using for\
    \ loop in lists:\n\n```\nsquare_list = []\nfor i in range(10):\n    square_list.append(i*i)\n\
    print(square_list)\n\n[0, 1, 4, 9, 16, 25, 36, 49, 64, 81]\n```\n\nWhat we have\
    \ done is that first we have created an empty list to store the square of numbers.\
    \ The name of this list is square_list. There are 10 numbers which are represented\
    \ by “i”. So “i” will be having one value ranging from 0 to 9. This is written\
    \ in line two of the code. It can be read as “for the value of i which ranges\
    \ from 0 to 9”. In the third line of the code, we will multiply the value of “i”\
    \ with itself"
