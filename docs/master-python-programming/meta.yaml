  md: 'The **split ()** function returns a list where the string has been split at
    each match.


    ```

    import re


    my_str = "We are Venom"

    result = re.split("\s", my_str)

    print(result)


    [''We'', ''are'', ''Venom'']

    ```


    So, **split ()** simply creates a list. **\s** is splitting the string at each
    whitespace occurrence.

    There is a special case with split () function which allows to split **n** words.
    Suppose I want to split 1<sup>st</sup> two words of my string and not the remaining.
    Then, it goes like this:


    ```

    import re


    my_str = "The name is Cable"

    result = re.split("\s", my_str, 2)

    print(result)


    [''The'', ''name'', ''is Cable'']

    ```


    Look at the 3<sup>rd</sup> line of code. There is a number **‘2’**, which indicates
    how many words to split. What if it becomes 1?


    ```

    import re


    my_str = "The name is Cable"

    result = re.split("\s", my_str, 1)

    print(result)


    [''The'', ''name is Cable'']

    ```'
  merge: -1
