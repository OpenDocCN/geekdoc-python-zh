  md: "variable name can contain digits, the first character of a variable name cannot\
    \ be a digit. Special symbols such as !, @, #, $, % etc. cannot be used. Case\
    \ sensitivity matters. Python is case- sensitive. The commonly used methods of\
    \ writing a multi-word variable name are:\n\n+   - **Camel Case:** Second and\
    \ subsequent words are capitalized, to make word boundaries easier to see.\n \
    \   - Example: pythonProgrammingUniverse\n- **Pascal Case:** Identical to Camel\
    \ Case, except the first word is also capitalized.\n    - Example: PythonProgrammingUniverse\n\
    - **Snake Case:** Words are separated by underscores.\n    - Example: python_programming_universe\n\
    \nSo, which case to use? No hard and fast rule. Depending on your need, you can\
    \ choose any case. OK, before moving on, let’s type our first built- in function.\
    \ Let’s assign a variable and see how to display it and check it.\n\n```\na =\
    \ 100\nprint(a)\nprint(type(a))\n\n100\n<class 'int'>\n```\n\nTo display the result\
    \ **print ()** function is used. This is our first function to learn. We know\
    \ that 100 is an integer, but does Python also treat it as an integer. To check\
    \ this, **type ()** is used. Just write the variable name with **type** and **print**\
    \ the result as shown. Technically, this is called passing the parameter. Here,\
    \ variable **a** is a parameter for **type** written in brackets and **type**\
    \ is a parameter for **print** command. These commands: **type ()** and **print\
    \ (),** are also called built- in functions. We will learn about many built- in\
    \ functions as we move ahead. All keywords are built-in functions. Let’s check\
    \ some more types."
