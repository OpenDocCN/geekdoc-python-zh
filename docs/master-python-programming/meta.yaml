    10 is an even number\n\n这里，数字是10。10%2的余数是0。因此，执行的输出在**if条件**中。这里，我们还需要学习在**print\
    \ ()**命令中应该写什么。如果你想显示一条消息，就把消息写在引号里。引号内的消息不会改变。这个做法不是硬性规定；它只是让你的显示更有意义、更易读。我们之前在算术运算符之后尝试过同样的事情。让我们再试一些例子。\n\
    \n## 编写程序，找出两个数中哪个更大？\n\n这里，我们至少需要两个数字。然后我们才能比较并说，好的，一个数比另一个数大。假设有两个数：**a**和**b**。我们需要一个比较运算符来比较。\n\
    \n这里我们需要一个**大于 (>)**或**小于 (<)**运算符。然后我们需要检查**如果 a > b，那么打印 a，否则，打印 b**。让我们把它写成代码。\n\
    \n```\na = int(input(\"Enter first number: \"))\nb = int(input(\"Enter second\
    \ number: \"))\nif (a > b):\n    print(\"The greater number is\",a)\nelse:\n \
    \   print(\"The greater number is\",b)\n```\n\nEnter first number: 5\nEnter second\
    \ number: 4\nThe greater number is 5\n\n```\na = int(input(\"Enter first number:\
    \ \"))\nb = int(input(\"Enter second number: \"))\nif (a > b):\n    print(\"The\
    \ greater number is\",a)\nelse:\n    print(\"The greater number is\",b)\n```\n\
    \nEnter first number: 6\nEnter second number: 8\nThe greater number is 8\n\n##\
    \ 编写程序，判断一个数是正数还是负数？\n\n我想我们现在可以尝试这个了。如果一个数大于0，那么它是正数，否则，它是负数。\n\n```\na = int(input(\"\
    Enter a number: \"))\nif (a > 0):\n    print(\"The number\",a,\"is positive\"\
    )\nelse:\n    print(\"The number\",a,\"is negative\")\n```\n\nEnter a number:\
    \ 5\nThe number 5 is positive\n\n```\na = int(input(\"Enter a number: \"))\nif\
    \ (a > 0):\n    print(\"The number\",a,\"is positive\")\nelse:\n    print(\"The\
    \ number\",a,\"is negative\")\n```\n\nEnter a number: -5\nThe number -5 is negative\n\
    \n让我们尝试使用海象运算符来编写这个程序。\n\n## 编写程序，使用海象运算符判断一个数是偶数还是奇数？\n\n首先，我写一个不使用海象运算符的版本。我之前已经作为我们的第一个程序写过了，但让我们用另一种方式写。\n\
    \n```\nnum = int(input('Enter the number:'))\nrem = num % 2\nif num % 2 == 0:\n\
    \    print(num,'is an even number and the rem is',rem)\nelse:\n    print(num,'is\
    \ an odd number and the rem is',rem)\n```\n\n我做的是，我取一个数，然后将这个数除以2，我想检查余数，所以我使用取模运算符**num%2**。然后我将**num%2**的结果赋值给另一个叫做rem的变量。我将结果与零进行比较。**如果**它是零，那么它是一个偶数，**否则**，它是一个奇数。现在让我们使用海象运算符来写它。\n\
    \n```\nnum = int(input('Enter the number:'))\nif (rem := num % 2) == 0:\n    print(num,'is\
    \ an even number and the rem is',rem)\nelse:\n    print(num,'is an odd number\
    \ and the rem is',rem)\n```\n\n输出将是\n\n```\nEnter the number:5\n5 is an odd number\
    \ and the rem is 1\n\nEnter the number:10\n10 is an even number and the rem is\
    \ 0\n```\n\n现在，我们有两个不使用海象运算符来判断偶数或奇数的程序，以及一个使用海象运算符的程序。我们能用海象运算符来替代我们的第一个程序吗？如果我们看这里，我们有两行写着相同的语句：**num%2\
    \ == 0 和 rem = num%2**。那么，我们在做什么？我们写**rem = num%2**，然后通过写**rem := num%2**将其结果返回给rem，然后检查**如果**这个整个操作的结果是否为0。这就是为什么我在前一章说，你能用海象运算符做的事情，不用它也能做。当有两条语句写着相同的东西时，使用海象运算符。我们将在后面的章节中使用这个运算符，你会发现它更有用。\n\
    \n继续下去，我们可以根据需要拥有任意多个if- else条件。我们也可以有**if里面套if里面再套if**等等。这种条件被称为嵌套If- Else条件。还有另一种条件叫做If-\
    \ Elif- Else。它的工作方式是**如果**一个条件执行并打印结果，**否则如果**另一个条件执行并打印这个结果，**否则**第三个条件执行并打印结果。其语法如下：\n\
    \n```\nif test expression:\n    Body of if\nelif test expression:\n    Body of\
    \ elif\nelse:\n    Body of else\n```\n\n让我们再试一个程序，看看多个if条件和if-elif-else条件的用法。\n\
    \n## 编写程序，使用嵌套if else条件判断一个数是正数还是负数？\n\n赋值表达式在同一个表达式中赋值并返回一个值。我们已经看到了如何赋值然后打印出来。\n\
    \n```\na = 5\nprint(a)\n```\n\n5\n\n现在这个符号，:= 同时赋值和返回。它是这样写的。\n\n```\nprint(a\
    \ := 5)\n```\n\n5\n\n海象运算符的用处是一个值得探索的主题。你可以放心，无论你能用海象运算符做什么；不用它也能做到。我们将在后面的章节中看到如何以及在哪里可以使用海象运算符，因为这个运算符与循环配合得很好。\n\
    \n谈到优先级，关于海象运算符的优先级没有官方文档。但一个重要的条件是，这个运算符总是写在括号内。括号或圆括号具有最高优先级。而且，这不仅仅是赋值，它同时也在返回。因此，它是一个完整的表达式。也许这就是为什么目前还没有关于其优先级的讨论。\n\
    \n在这里，我们结束本章。我没有深入探讨所有运算符是如何工作的。我觉得运算符最好通过在循环中的使用来理解，而不是简单地写**a + b 或 a > b**。所以，从下一章开始，我们将开始编程，然后我们将学习如何以及何时使用哪个运算符。你目前的任务是记住并牢记这些运算符。"
