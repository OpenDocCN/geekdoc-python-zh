    print(a, b, c)

    ```


    4 5 [6, 7, 8, 9, 10]


    If there are 3 variables and an asterisk sign is written with the 3rd variable,
    then, no matter how many values are there, 1st and 2nd values are assigned to
    1st two variables, and all remaining values will be assigned to the third variable.
    Let''s check for one more example.


    ```

    *a, b, c = 4, 5, 6, 7, 8, 9, 10

    print(a, b, c)

    ```


    [4, 5, 6, 7, 8] 9 10


    Here, the asterisk is with the first variable. Hence, the first 5 values are assigned
    to the first variable, and the next two values are assigned to the first two variables
    respectively. All this is possible because of tuple packing and unpacking. Another
    important application of tuple packing and unpacking is returning multiple values
    in a function.'
