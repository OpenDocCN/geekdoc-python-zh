  mdcn: "## Linux 目录结构\n\n| 目录 | 功能 |\n| :--- | :--- |\n| / | Linux 系统的顶层目录，包含所有文件、设备信息和系统信息，这些信息被组织成目录\
    \ |\n| /home | 存放用户的主目录 |\n| /bin | 包含所有基本的命令和实用程序 |\n| /usr | 包含系统使用的命令和文件 |\n\
    | /usr/bin | 包含实用程序和用户友好的命令 |\n| /usr/sbin | 存放用于系统管理的命令 |\n| /usr/lib | 包含编程语言库\
    \ |\n| /usr/share/doc | 包含 Linux 的文档 |\n| /usr/share/man | 包含在线的 \"man\" 手册文件\
    \ |\n| /var/spool | 包含假脱机文件，例如为网络传输和打印操作生成的文件 |\n| /sbin | 包含用于启动系统的系统管理命令 |\n\
    | /var | 存放各种文件，包括邮箱文件 |\n| /dev | 存放打印机和终端等设备的文件接口 |\n| /etc | 存放所有系统文件，包括配置文件\
    \ |\n\n```\nfind myfiles -name '*.c' -ls\n```\n\n使用 **-ls** 命令，搜索并显示 \"myfiles\"\
    \ 目录中所有具有 **.c 扩展名** 的文件\n\n```\nfind / -user manju -print\n```\n\n查找用户主目录中的每个文件以及该用户在其他用户目录中拥有的每个文件\n\
    \n```\nls /usr/share/X11\n# 列出系统 X11 配置和支持文件\n\nls /etc/X11\n# 列出配置文件\n\nls /etc/gdm\n\
    # 显示 GDM 配置目录的内容\n\nls /usr/share/gdm\n# 显示 GDM 配置目录的内容，包括默认设置和主题\n```\n\n```\n\
    ls /etc/gconf\n# 列出 GConf 配置文件\n\nls /usr/share/gnome\n# 列出 GNOME 应用程序使用的文件\n\n\
    ls /usr/share/doc/gnome*\n# 显示各种 GNOME 包的文档内容，包括库\n```\n\n```\nls /usr/share/icons\n\
    # 列出 KDE 桌面和应用程序中使用的图标\n\nrpm -qa | more\n# 显示所有已安装软件包的列表\n```\n\n```\nls /etc/cron.d\n\
    # 列出包含大量 crontab 文件的目录，该目录仅 root 用户可访问\n\nls /etc/cron.hourly\n# 列出每小时执行任务的目录\n\
    \nls /etc/cron.daily\n# 列出每天执行任务的目录\n\nls /etc/cron.weekly\n# 列出每周执行任务的目录\n\n\
    ls /etc/cron.monthly\n# 列出每月执行任务的目录\n\nls /etc/mtab\n# 列出当前已挂载的文件系统\n\nls /etc/services\n\
    # 列出系统上运行的服务及其使用的端口\n```\n\n```\nls /etc/cups\n# 列出 CUPS 打印机配置文件\n\nls /proc/net\n\
    # 列出网络设备的目录\n```\n\n```\nfree -s 3\n# 按固定间隔持续显示内存的当前使用状态\n\nls -lhR /var | grep\
    \ \\- | grep [1-9]*M\n# 列出 \"/var\" 中大于 1 MB 但小于 1 GB 的文件\n```\n\n```\nwhereis\
    \ -b ls\n# 仅搜索与命令 \"ls\" 相关的二进制文件\n\nwhereis -m ls\n# 仅搜索与命令 \"ls\" 相关的手册页\n\n\
    whereis -s ls\n# 仅搜索与命令 \"ls\" 相关的源文件\n```\n\n```\n[manju@localhost ~]$ echo \"\
    Alan\" \"Mathison\" \"Turing\"\nAlan Mathison Turing\n```\n\n```\nwatch -t -n\
    \ 1 date\n# 显示日期\n```\n\n```\n[manju@localhost ~]$ echo \"Albert\" > 1.txt &&\
    \ cat 1.txt\nAlbert\n```\n\n```\ndu -sh * --time\n# 检查每个文件的大小及其最后编辑的日期和时间\n\n\
    dmidecode -s system-serial-number\n# 显示 Linux 服务器的序列号\n```\n\n```\nls -aril\n\
    # 显示所有带序列号的文件\n\nyum search mod_\n# 显示所有模块\n```\n\n```\ndu -sch *\n# 显示当前目录中所有文件和文件夹的大小总和\n\
    \ndmidecode | grep -A3 '^System Information'\n# 显示服务器硬件名称和型号\n\ndmesg | grep -i\
    \ firmware\n# 显示所有固件错误\n```\n\n```\ncat /proc/cpuinfo | grep processor | wc -l\n\
    # 显示核心数\n\nnetstat -ap | grep 80\n# 显示使用端口号 80 的进程 ID\n```\n\n```\ndmidecode --type\
    \ memory\n# 显示连接到服务器的物理内存\n\ndirs\n# 显示当前记住的目录列表\n```\n\n```\nblkid -i /dev/sda\n\
    # 显示有关可用块设备的信息\n\ncrontab -e\n```\n\n![](img/55b12efb0755f07421548d2d4f35991a_315_0.png)\n\
    \n```\n[manju@localhost ~]$ df -h /home\nFilesystem      Size  Used Avail Use%\
    \ Mounted on\n/dev/sda3        18G  5.2G   13G  29% /\n```\n\n![](img/55b12efb0755f07421548d2d4f35991a_315_1.png)\n\
    \n```\n[manju@localhost ~]$ hostname -I\n192.168.6.131 192.168.122.1\n```\n\n\
    显示主机的所有本地 IP 地址\n\n```\nbadblocks -s /dev/sda\n```\n\n# 检查磁盘 sda 上是否有不可读的块\n\n\
    ```\ntail -10 /var/log/messages\n```\n\n# 显示最后 10 条系统日志消息\n\n```\nlsof -u manju\n\
    ```\n\n# 列出用户 \"manju\" 打开的文件\n\n```\nsudo shutdown -r 2\n```\n\n# 在 2 分钟后关闭并重启机器\n\
    \n```\n[manju@localhost ~]$ cat 1.txt\nalbert\n[manju@localhost ~]$ cat 1.txt\
    \ | tr a-z A-Z > 2.txt\n[manju@localhost ~]$ cat 2.txt\nALBERT\n```\n\n```\ncat\
    \ /etc/passwd | column -t -s :\n```\n\n# 以列的形式显示 \"/etc/passwd\" 的内容\n\n```\n\
    nmcli d\n# 显示所有网络接口的状态\n\ngrep \"^[[:alnum:]]\" myfiles.txt\n# 在 \"myfiles.txt\"\
    \ 中搜索以字母数字字符开头的行\n\ngrep \"^[[:alpha:]]\" myfiles.txt\n# 在 \"myfiles.txt\" 中搜索以字母字符开头的行\n\
    \ngrep \"^[[:blank:]]\" myfiles.txt\n# 在 \"myfiles.txt\" 中搜索以空白字符开头的行\n\ngrep\
    \ \"^[[:digit:]]\" myfiles.txt\n# 在 \"myfiles.txt\" 中搜索以数字字符开头的行\n```\n\n```\n\
    grep \"^[[:lower:]]\" myfiles.txt\n# 在 \"myfiles.txt\" 中搜索以小写字母开头的行\n\ngrep \"\
    ^[[:punct:]]\" myfiles.txt\n# 在 \"myfiles.txt\" 中搜索以标点符号字符开头的行\n\ngrep \"^[[:graph:]]\"\
    \ myfiles.txt\n# 在 \"myfiles.txt\" 中搜索以图形字符开头的行\n\ngrep \"^[[:print:]]\" myfiles.txt\n\
    # 在 \"myfiles.txt\" 中搜索以可打印字符开头的行\n```\n\n```\ngrep \"^[[:space:]]\" myfiles.txt\n\
    # 在 \"myfiles.txt\" 中搜索以空格字符开头的行\n\ngrep \"^[[:upper:]]\" myfiles.txt\n# 在 \"\
    myfiles.txt\" 中搜索以大写字母开头的行\n\ngrep \"^[[:xdigit:]]\" myfiles.txt\n# 在 \"myfiles.txt\"\
    \ 中搜索以十六进制数字开头的行\n```\n\n```\nvmstat -a\n# 显示活动和非活动系统内存\n\nvmstat -s\n# 显示内存和调度统计信息\n\
    ```\n\n```\nvmstat -f\n# 显示自系统启动以来创建的 fork 数量\n\nvmstat -D\n# 显示所有磁盘活动的快速摘要统计信息\n\
    \nvmstat -d\n# 显示每个磁盘使用情况的详细统计信息\n\nvmstat 5 -S M\n```\n\n此命令用于每五秒更新一次统计信息，并将显示单位更改为兆字节\n\
    \n```\n[manju@localhost ~]$ free -h --total\n              total        used \
    \       free      shared  buff/cache   available\nMem:          976M        566M\
    \         75M        8.7M        334M        209M\nSwap:         2.0G        \
    \ 84K        2.0G\nTotal:        3.0G        566M        2.1G\n```\n\n- hostname\
    \ -s\n- hostname --short\n\n显示主机名的简短版本\n\n```\nhostname --all-ip-addresses\n#\
    \ 显示所有网络地址\n\ndate -r /etc/hosts\n# 显示日期文件的最后修改时间戳\n```\n\n```\n[manju@localhost\
    \ ~]$ cat 1.txt\nAlbert Einstein\n\n[manju@localhost ~]$ cat 2.txt\nElsa Einstein\n\
    \n[manju@localhost ~]$ cat 1.txt > 2.txt\n\n[manju@localhost ~]$ cat 2.txt\nAlbert\
    \ Einstein\n```\n\n```\n[manju@localhost ~]$ cat 12.txt\nAlbert Einstein\n\nElsa\
    \ Einstein\n\n[manju@localhost ~]$ cat -n 12.txt\n     1\tAlbert Einstein\n  \
    \   2\tElsa Einstein\n```\n\n```\n[manju@localhost ~]$ cat 1.txt\nAlbert Einstein\n\
    \n[manju@localhost ~]$ cat -e 1.txt\nAlbert Einstein$\n```\n\n```\nsudo shutdown\
    \ 08:00\n# 在早上 8 点关闭系统\n\ngrep 'but\\|is' phy.txt\n# 在 phy.txt 文件中搜索单词 \"but\"\
    \ 和 \"is\"\n```\n\n```\ngrep 'is\\|but\\|of' phy.txt\n# 在 phy.txt 文件中搜索单词 \"but\"\
    、\"is\" 和 \"of\"\n\ngrep -e but -e is -e of phy.txt\n```"
