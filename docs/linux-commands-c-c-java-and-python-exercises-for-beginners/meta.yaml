    \ and Techniques**\n  Book by Jim Gray\n- **Making Sense of NoSQL: A Guide for\
    \ Managers and the Rest of Us**\n  Book by Ann Kelly, Ann Marie Kelly and Dan\
    \ McCreary\n- **A Practical Guide to Database Design**\n  Book by Rex Hogan\n\
    - **Database Development for Dummies**\n  Book by Allen G. Taylor\n- **SQL Queries\
    \ for Mere Mortals: A Hands-on Guide to Data Manipulation in SQL**\n  Book by\
    \ John Viescas and Michael J. Hernandez\n- **Pro SQL Server 2012 Relational Database\
    \ Design and Implementation**\n  Book by Jessica Moss and Louis Davidson\n- **SQL\
    \ Performance Explained: Everything Developers Need to Know about SQL Performance**\n\
    \  Book by Markus Winand\n- **Refactoring Databases: Evolutionary Database Design**\n\
    \  Book by Scott W Ambler and Pramod J Sadalage\n- **Designing Data-Intensive\
    \ Applications**\n  Book by Martin Kleppmann\n\n**Programming** today is a race\
    \ between software engineers striving to build bigger and better **idiot-proof\
    \ programs**, and the Universe trying to produce bigger and better idiots. So\
    \ far, the Universe is winning.\n\n> — Rick Cook, The Wizardry Compiled\n\n> \"\
    In some ways, programming is like painting. You start with a blank canvas and\
    \ certain basic raw materials. You use a combination of science, art, and craft\
    \ to determine what to do with them.\"\n\n– Andrew Hunt\n\n## One final thought:\n\
    \nIf you feel that this information has been useful to you, please take a moment\
    \ to share it with your friends on LinkedIn, Facebook and Twitter. Consider writing\
    \ a brief review on **Google Play Books** if you feel that this book has helped\
    \ you in your programming career and you have learned something worthwhile.\n\n\
    Coding is both a science and creative art to me. It is both incredibly fun and\
    \ fascinating. I want to spread my passion to as many individuals as I can. I\
    \ also hope that this is not the end of your learning.\n\n**Thank you!**\n\nAN\
    \ APPROACHABLE MANUAL FOR NEW AND EXPERIENCED PROGRAMMERS THAT INTRODUCES THE\
    \ PROGRAMMING LANGUAGES C, C++, JAVA, AND PYTHON. THIS BOOK IS FOR ALL PROGRAMMERS,\
    \ WHETHER YOU ARE A NOVICE OR AN EXPERIENCED PRO. IT IS DESIGNED FOR AN INTRODUCTORY\
    \ COURSE THAT PROVIDES BEGINNING ENGINEERING AND COMPUTER SCIENCE STUDENTS WITH\
    \ A SOLID FOUNDATION IN THE FUNDAMENTAL CONCEPTS OF COMPUTER PROGRAMMING. IT ALSO\
    \ OFFERS VALUABLE PERSPECTIVES ON IMPORTANT COMPUTING CONCEPTS THROUGH THE DEVELOPMENT\
    \ OF PROGRAMMING AND PROBLEM-SOLVING SKILLS USING THE LANGUAGES C, C++, JAVA,\
    \ AND PYTHON. THE BEGINNER WILL FIND ITS CAREFULLY PACED EXERCISES ESPECIALLY\
    \ HELPFUL. OF COURSE, THOSE WHO ARE ALREADY FAMILIAR WITH PROGRAMMING ARE LIKELY\
    \ TO DERIVE MORE BENEFITS FROM THIS BOOK. AFTER READING THIS BOOK YOU WILL FIND\
    \ YOURSELF AT A MODERATE LEVEL OF EXPERTISE IN C, C++, JAVA AND PYTHON, FROM WHICH\
    \ YOU CAN TAKE YOURSELF TO THE NEXT LEVELS. THE COMMAND-LINE INTERFACE IS ONE\
    \ OF THE NEARLY ALL WELL BUILT TRADEMARKS OF LINUX. THERE EXISTS AN OCEAN OF LINUX\
    \ COMMANDS, PERMITTING YOU TO DO NEARLY EVERYTHING YOU CAN BE UNDER THE IMPRESSION\
    \ OF DOING ON YOUR LINUX OPERATING SYSTEM. HOWEVER, THIS, AT THE END OF TIME,\
    \ CREATES A PROBLEM: BECAUSE OF ALL OF SO COPIOUS COMMANDS ACCESSIBLE TO MANAGE,\
    \ YOU DON'T COMPREHEND WHERE AND AT WHICH POINT TO FLY AND LEARN THEM, ESPECIALLY\
    \ WHEN YOU ARE A LEARNER. IF YOU ARE FACING THIS PROBLEM, AND ARE PEERING FOR\
    \ A PAINLESS METHOD TO BEGIN YOUR COMMAND LINE JOURNEY IN LINUX, YOU'VE COME TO\
    \ THE RIGHT PLACE-AS IN THIS BOOK, WE WILL LAUNCH YOU TO A HOLD OF WELL LIKED\
    \ AND HELPFUL LINUX COMMANDS. THIS BOOK GIVES A THOROUGH INTRODUCTION TO THE C,\
    \ C++, JAVA, AND PYTHON PROGRAMMING LANGUAGES, COVERING EVERYTHING FROM FUNDAMENTALS\
    \ TO ADVANCED CONCEPTS. IT ALSO INCLUDES VARIOUS EXERCISES THAT LET YOU PUT WHAT\
    \ YOU LEARN TO USE IN THE REAL WORLD."
