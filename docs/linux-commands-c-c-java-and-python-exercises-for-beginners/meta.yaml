- md: "## Important features of Linux Operating System\n\n- Free and Open Source\n\
    - Portable and More secure\n- Robust and Adaptable\n\n![](img/55b12efb0755f07421548d2d4f35991a_232_0.png)\n\
    \nThe core interface between a computer's hardware and its processes\n\nManage\
    \ RAM memory.\n\nManage the processor time.\n\nManage access and use of the various\
    \ peripherals that are connected to the computer.\n\n## Swap space\n\nA space\
    \ on a hard disk that is used when the amount of **physical memory** (RAM) is\
    \ full\n\n```\n[manju@localhost ~]$ cd /etc\n[manju@localhost etc]$ pwd\n/etc\n\
    ```\n\n```\n[manju@localhost etc]$ cat /etc/hosts\n```\n\n/etc/hosts contains\
    \ hostnames with their ip address\n\n```\n127.0.0.1   localhost localhost.localdomain\
    \ localhost4 localhost4.localdomain4\n::1         localhost localhost.localdomain\
    \ localhost6 localhost6.localdomain6\n```\n\n```\nchmod u+w myfiles.txt\n# Add\
    \ user write privileges\n```\n\n```\nchmod u-w myfiles.txt\n# Remove user write\
    \ privileges\n```\n\n```\nchmod g+w myfiles.txt\n# Add group write privileges\n\
    ```\n\n```\nchmod go-r myfiles.txt\n# Remove group and others read privileges\n\
    ```\n\n```\nchmod g=r myfiles.txt\n# Allow only the group read privileges\n```\n\
    \n```\nchmod o+x myfiles.txt\n# Add execute privileges for others\n```\n\n```\n\
    chmod a+x myfiles.txt\n# Add execute privileges for everyone\n```\n\n```\nchmod\
    \ a=xr myfiles.txt\n# Allow read and execute only to everyone\n```\n\n```\nps\
    \ -L 3315\n\n# List all threads for a particular process (with process ID 3315)\n\
    \nps aux --sort pmem\n\n# Check the memory status\n\nawk '/Hello/' myfiles.txt\n\
    \n# Find \"Hello\" in myfiles.txt\n\nawk -F: '{ print $1 }' /etc/passwd | sort\n\
    \n# Display a sorted list of the login names of all users\n\nawk 'END { print\
    \ NR }' myfiles.txt\n\n# Counts lines in myfiles.txt\n```\n\n```\n[manju@localhost\
    \ ~]$ awk 'BEGIN { for (i = 1; i <= 7; i++) print int(101 * rand()) }'\n24\n29\n\
    85\n15\n59\n19\n81\n```\n\nPrints **seven random numbers** from zero to 100\n\n\
    ```\nls -lg *.txt | awk '{ x += $5 } ; END {print \"total bytes:\" x }'\n# Prints\
    \ the total number of bytes used by all .txt files\n```\n\n| Random-access memory\
    \ | Virtual memory |\n| --- | --- |\n| The internal memory of the CPU for storing\
    \ data, program and program result. | A storage area that holds the files on your\
    \ hard drive for retrieval when a computer runs out of RAM |\n\n## Process States\
    \ in Linux:\n\n- **Ready:** a new process is created and is ready to run.\n- **Running:**\
    \ The process is being executed.\n- **Wait:** The process is waiting for input\
    \ from the user.\n- **Completed:** The process has completed the execution.\n\
    - **Zombie:** The process is terminated but information regarding the process\
    \ still exists and is available in the process table.\n\n| Cron | Anacron |\n\
    | --- | --- |\n| A service that enables us to run scheduled jobs in Linux/Unix\
    \ systems every minute. | A service that only enables us to run scheduled jobs\
    \ in Linux/Unix systems on daily basis. |\n\n## Command:\n\n```\ncat /etc/crontab\n\
    ```\n\n## Description:\n\nView system defined cron jobs\n\n## Command:\n\n```\n\
    netstat --listen\n```\n\n## Description:\n\nCheck which ports are in listening\
    \ in Linux Server\n\n> **Network Interface Card teaming** is the process of combining\
    \ multiple network cards together for performance, load balancing and to increase\
    \ uptime.\n\n| Service | Default Port |\n|---|---|\n| DNS | 53 |\n| SMTP | 25\
    \ |\n| FTP | 20 (**Data transfer**), 21 (**Connection established**) |\n| SSH\
    \ | 22 |\n| DHCP | 67/UDP (**dhcp server**), 68/UDP (**dhcp client**) |\n| squid\
    \ | 3128 |\n\n![](img/55b12efb0755f07421548d2d4f35991a_236_0.png)\n\n```\nls /bin\n\
    \n# List the binaries and other executable programs\n```\n\n```\nls /boot\n\n\
    # List the files needed to boot the operating system\n```\n\n```\nls /dev\n\n\
    # List the device files - typically controlled by the operating system and the\
    \ system administrators\n```\n\n```\nls /etc\n\n# List the System configuration\
    \ files\n```\n\n```\nls /lib\n\n# List the System Libraries\n```\n\n```\nmkdir\
    \ mydir{1,2,3,4,5}\n\n**Create 5 new directories:**\n\n* mydir1\n* mydir2\n* mydir3\n\
    * mydir4\n* mydir5\n```\n\n```\nls /lib64\n\n# List the System Libraries (64 bit)\n\
    ```\n\n```\nls /proc\n\n# List the information about running processes\n```\n\n\
    ```\nls /sbin\n\n# List the System administration binaries\n```\n\n```\nls /var/log\n\
    \n# List the Log files\n```\n\n```\n[manju@localhost ~]$ ls -l myfiles.txt\n\n\
    -rw-r--r--. 1 manju nath 12 Apr 19 20:22 myfiles.txt\n```\n\nDisplay the permissions\
    \ for the file \"**myfiles.txt**\"\n\n```\nfind . -mtime +1 -mtime -3\n\n# Display\
    \ files that are more than 1 day old - but less than 3 days old in the current\
    \ directory\n```\n\n```\nfind . -name \"s*\" -ls\n\n# Find files that start with\
    \ the letter \"s\" and perform the command \"ls\" on them\n```\n\n```\nfind .\
    \ -size +3M\n\n# Find files that is larger than 3 megabytes\n```\n\n```\n[manju@localhost\
    \ ~]$ cat myfile.txt\n\nffff\nb\neee\ncc\n```\n\n```\n[manju@localhost ~]$ touch\
    \ file1; touch file2\n[manju@localhost ~]$ ls file{1,2}\nfile1  file2\n```\n\n\
    ```\n[manju@localhost ~]$ cat myfile.txt | sort\n\nb\neee\nffff\n```\n\n```\n\
    [manju@localhost ~]$ NUMLOGINS=$(who | grep $USER | wc -l)\n[manju@localhost ~]$\
    \ echo You have $NUMLOGINS login sessions\nYou have 2 login sessions\n```\n\n\
    **Command:**\n\n```\nchmod go-rwx myfiles.txt\n```\n\n**Description:**\n\nRemove\
    \ read write and execute permissions on the file \"**myfiles.txt**\" for the group\
    \ and others\n\n**Command:**\n\n```\nchmod a+rw myfiles.txt\n```\n\n**Description:**\n\
    \n**Give read and write permissions on the file \"myfiles.txt\" to all**\n\n**Command:**\n\
    \n```\n!-3\n```\n\n**Description:**\n\n**Repeats the third most recent command**\n\
    \n```\n[manju@localhost ~]$ echo $OSTYPE\nlinux-gnu\n```\n\n![](img/55b12efb0755f07421548d2d4f35991a_239_0.png)\n\
    \n**Command:**\n\n```\ndf -i /dev/sda1\n```\n\n**Description:**\n\nCheck Inodes\
    \ on File system\n\n**Command:**\n\n```\nls -il myfiles.txt\n```\n\n**Description:**\n\
