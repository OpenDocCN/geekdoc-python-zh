  mdcn: '## 什么是 Linux，它为何如此流行？


    无论你是否意识到，你每天都在使用 Linux（最著名且使用最广泛的开源操作系统）。从超级计算机到智能手机，Linux 操作系统无处不在。作为一种操作系统，Linux
    是一个基于 Linux 内核的开源类 Unix 软件家族——它位于计算机所有其他软件的底层，接收这些程序的请求并将其转发给计算机的硬件。就职业发展而言，掌握
    Linux 技能正变得越来越有价值，而不仅仅是知道如何使用 Windows。总的来说，Linux 比 Windows 更难管理，但提供了更多的灵活性和配置选项。


    每台台式计算机都使用操作系统。当今最流行的操作系统有：Windows、Mac OS 和 LINUX。Linux 是最著名的、以可靠性和高安全性著称的开源可移植操作系统——非常像
    UNIX——在过去几年中变得非常流行——最初由芬兰赫尔辛基大学的计算机科学学生 Linus Torvalds 在 1990 年代初作为一项兴趣任务创建，后来由全球数千人共同开发。


    Linux 速度快、免费且易于使用，它位于计算机所有其他软件的底层——运行你的计算机——处理你与硬件之间的所有交互，即无论你是在电脑上撰写信件、计算财务预算，还是管理食谱，Linux
    操作系统（类似于其他操作系统，如 Windows XP、Windows 7、Windows 8 和 Mac OS X）都提供了计算机运行所必需的基础支持。


    Linux 是二十一世纪最重要的技术进步，并且在 Linux 使用的通用公共许可证（GPL）下，确保该软件始终对任何人开放，其源代码开放且可供任何用户检查，这使得发现和修复漏洞变得更容易，并且它为
    Google、Facebook、Twitter、NASA 和纽约证券交易所等机构的笔记本电脑、开发机器和服务器提供动力，仅举几例。Linux 还有许多其他令人惊叹的功能，例如：Live
    CD/USB、图形用户界面（X Window System）等。


    ## 为什么选择 LINUX？


    尽管 Microsoft Windows（它最有可能成为病毒和恶意软件的受害者）近年来在可靠性方面取得了很大进步，但它被认为不如 Linux 可靠。Linux
    以可靠性和安全性著称，它免受持续对抗病毒和恶意软件的困扰（这些病毒和恶意软件可能会通过损坏文件、导致速度变慢、崩溃、昂贵的维修以及接管操作系统的基本功能来影响你的台式机、笔记本电脑和服务器）——并且它让你免于支付许可费用，即零成本入门……就像免费一样。你可以在地球上任意多台可靠的计算机生态系统上安装
    Linux，而无需为软件或服务器许可支付一分钱。而 Microsoft Windows 通常每份许可副本的费用在 99.00 美元到 199.00 美元之间，并且存在丢失数据的风险。


    以下是 Linux 当今应用的一些示例：


    - 安卓手机和平板电脑

    - 服务器

    - 电视、相机、DVD 播放器等

    - 亚马逊

    - 谷歌

    - 美国邮政服务

    - 纽约证券交易所


    ![](img/55b12efb0755f07421548d2d4f35991a_305_0.png)


    Linux 操作系统主要有三个组成部分：


    - **内核**


    内核是 Linux 操作系统的核心部分，直接与硬件交互。它负责 Linux 操作系统的所有主要活动。


    - **系统库**


    系统库是特殊程序，应用程序通过它们访问内核的功能。


    - **系统实用程序**


    系统实用程序程序负责执行专门的任务。


    ## Linux 操作系统的重要特性：


    - 可移植

    - 开源

    - 多用户

    - 多程序

    - 分层文件系统

    - 安全


    ![](img/55b12efb0755f07421548d2d4f35991a_306_0.png)


    现在，Linux（已被全球数百万用户成功使用）已经超越了几乎专用于学术系统的阶段，仅对少数具有技术背景的人有用。它提供的不仅仅是操作系统：有一个完整的基础设施支持着创建操作系统、为其制作和测试程序、将一切带给用户、提供维护、更新和支持以及定制化的整个工作链，可以在包括
    Intel 和 Alpha 平台在内的不同平台上运行。如今，Linux 已准备好接受快速变化世界的挑战，执行各种类型的操作、调用应用程序等。由于招聘重点越来越倾向于
    DevOps 类型的技能，Linux 技能组合将是让你非常具有可部署性的那类技能。


