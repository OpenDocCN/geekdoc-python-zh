- md: "## Linux 与 Unix 对比\n\n| Linux | Unix |\n| --- | --- |\n| 免费使用（**开源**） | 授权操作系统（**闭源**）\
    \ |\n| Linux 只是内核 | Unix 是完整的操作系统包 |\n| Bash（Bourne Again SHell）是 Linux 的默认 shell\
    \ | Bourne Shell 是 Unix 的默认 shell |\n| 可移植，可从 USB 启动 | 不可移植 |\n| 源代码对公众开放 | 源代码不对任何人开放\
    \ |\n| 使用图形用户界面，可选命令行界面 | 使用命令行界面 |\n\n**命令：**\n\n```\necho $SHELL\n```\n\n**描述：**\n\
    \n打印用户的默认 shell\n\n**命令：**\n\n```\necho $0\n```\n\n**描述：**\n\n> 显示当前正在运行的进程的名称（**$0\
    \ 是正在运行的进程的名称**）。如果你在 shell 中使用它，它将返回 shell 的名称。如果你在脚本中使用它，它将返回脚本的名称。\n\n**命令：**\n\
    \n```\necho *\n```\n\n**描述：**\n\n打印所有文件和文件夹——类似于 ls 命令\n\n**命令：**\n\n```\nps -p\
    \ $$\n```\n\n**输出：**\n\n```\nPID TTY TIME CMD\n3352 pts/0 00:00:00 bash\n```\n\
    \n**描述：**\n\n打印当前 shell 的进程 ID（$$ 是当前 shell 的进程 ID）\n\n```\nsudo du -a Documents/\
    \ | sort -n -r | head -n 5\n\n# 列出目录 \"Documents\" 中最大的 5 个文件\n```\n\n**命令：**\n\
    \n```\ncat /etc/shells\n```\n\n**描述：**\n\n列出可用的 shell\n\n**命令：**\n\n```\necho\
    \ m*\n```\n\n**描述：**\n\n显示当前文件夹中以字母 \"m\" 开头的文件。\n\n**命令：**\n\n```\nlast\n```\n\
    \n**描述：**\n\n列出用户的最近登录记录以及发生了什么，例如 \"shutdown\" 或 \"crash\" 等。\n\n**命令：**\n\n\
    ```\necho ~\n```\n\n**描述：**\n\n打印你的主目录路径\n\n**命令：**\n\n```\nbzip2 -k phy.txt\n\
    ```\n\n**描述：**\n\n压缩但不删除原始文件\n\n![](img/55b12efb0755f07421548d2d4f35991a_120_0.png)\n\
    \n**命令：**\n\n```\nbzip2 -d phy.txt.bz2\n```\n\n**描述：**\n\n解压缩文件 (phy.txt.bz2)\n\
    \n![](img/55b12efb0755f07421548d2d4f35991a_120_1.png)\n\n**命令：**\n\n```\nbzcat\
    \ phy.txt.bz2\n```\n\n**描述：**\n\n显示压缩文件 (phy.txt.bz2) 的内容\n\n**命令：**\n\n```\n\
    bunzip2 phy.txt.bz2\n```\n\n**描述：**\n\n解压缩文件 (phy.txt.bz2)\n\n**命令：**\n\n```\n\
    crontab -l\n```\n\n**描述：**\n\n显示当前登录用户的 crontab 条目\n\n```\ncat /dev/null > phy.txt\n\
    ```\n\n```\ncp /dev/null phy.txt\n```\n\n```\necho \"\" > phy.txt\n```\n\n```\n\
    echo > phy.txt\n```\n\n**描述：**\n\n清空文件 (phy.txt) 的内容\n\n**命令：**\n\n```\nnohup\
    \ ping google.com &\n```\n\n**描述：**\n\nPing google.com 并将进程发送到后台\n\n**命令：**\n\n\
    ```\nnohup ping google.com > log.txt &\n```\n\n**描述：**\n\n将 ping 日志保存到 log.txt\n\
    \n```\npgrep -a ping\n```\n\n**输出：**\n\n```\n3858 ping google.com\n4200 ping google.com\n\
    4236 ping google.com\n```\n\n```\nkill 3858\n```\n\n```\npgrep -a ping\n```\n\n\
    **输出：**\n\n```\n4200 ping google.com\n4236 ping google.com\n```\n\n**命令：**\n\n\
    ```\nls -la /home\n```\n\n**描述：**\n\n显示 /home 的内容\n\n**命令：**\n\n```\nsudo shutdown\
    \ 2\n```\n\n**描述：**\n\n2 分钟后关闭机器\n\n**命令：**\n\n```\nshutdown -c\n```\n\n**描述：**\n\
    \n取消关机过程\n\n**命令：**\n\n```\npr 36.txt\n```\n\n**描述：**\n\n逐页显示文件 (36.txt) 的内容\n\
    \n**命令：**\n\n```\nstty -a\n```\n\n**描述：**\n\n显示所有当前终端设置\n\n**命令：**\n\n```\nls\
    \ -1\n```\n\n**描述：**\n\n每行列出一个文件\n\n**命令：**\n\n```\nyes John\n```\n\n**描述：**\n\
    \n重复输出一个字符串 (John) 直到被终止\n\n**命令：**\n\n```\nvdir\n```\n\n**描述：**\n\n列出当前目录中的文件和目录（每行一个）并显示详细信息\n\
    \n**命令：**\n\n```\nwho -b\n```\n\n**描述：**\n\n打印系统启动时间\n\n```\n# 使用 nano 打开 phy.txt\n\
    nano phy.txt\n\n# 使用 vim 打开 phy.txt\nvim phy.txt\n```\n\n**命令：**\n\n```\nls -al\
    \ *.txt\n```\n\n**描述：**\n\n显示所有 .txt 文件，包括其个人权限。\n\n**命令：**\n\n```\nuname -i\n\
    ```\n\n**描述：**\n\n显示硬件平台\n\n**命令：**\n\n```\nuname -p\n```\n\n**描述：**\n\n显示处理器类型\n\
    \n**命令：**\n\n```\ncat /proc/interrupts\n```\n\n**描述：**\n\n显示中断信息\n\n```\nw --ip-addr\n\
    ```\n\n**描述：**\n\n显示有关当前在机器上的用户的信息，包括登录时间、空闲时间、TTY 和 CPU 时间\n\n**输出：**\n\n```\n\
    11:12:10 up 1:29, 2 users, load average: 0.02, 0.04, 0.10\nUSER TTY FROM LOGIN@\
    \ IDLE JCPU PCPU WHAT\nmanju :0 :0 02:43 ?xdm? 3:30 0.65s gdm-session-worker [pa\n\
    manju pts/0 :0 11:01 2.00s 0.10s 0.01s w --ip-addr\n```\n\n```\nw -short\n```\n\
    \n**描述：**\n\n省略 CPU 时间和登录信息\n\n**输出：**\n\n```\n11:11:46 up 1:28, 2 users, load\
    \ average: 0.02, 0.04, 0.11\nUSER TTY FROM IDLE WHAT\nmanju :0 :0 ?xdm? gdm-session-worker\
    \ [pam/gdm-password]\nmanju pts/0 :0 2.00s w --short\n```\n\n**命令：**\n\n```\n\
    findmnt\n```\n\n**描述：**\n\n显示当前已挂载文件系统的列表\n\n**命令：**\n\n```\nip addr show\n```\n\
    \n**描述：**\n\n列出 IP 地址和网络接口\n\n**命令：**\n\n```\nnetstat -pnltu\n```\n\n**描述：**\n\
    \n列出活动（监听）端口\n\n**命令：**\n\n```\njournalctl\n```\n\n**描述：**\n\n显示 systemd、内核和日志日志\n\
    \n**命令：**\n\n```\nsudo systemctl status network\n```\n\n**描述：**\n\n显示网络服务的状态\n\
    \n**命令：**\n\n```\nsudo systemctl start network\n```\n\n**描述：**\n\n启动网络服务\n\n**命令：**\n\
    \n```\nsudo systemctl stop network\n```\n\n**描述：**\n\n停止网络服务\n\n**命令：**\n\n```\n\
    sestatus -b\n```\n\n**描述：**\n\n显示布尔值的当前状态\n\n**命令：**\n\n```\ngetenforce\n```\n\
    \n**描述：**\n\n报告 SELinux 是处于强制、宽容还是禁用状态\n\n> **安全增强型 Linux** (SELinux) 是一种 Linux\
    \ 系统的安全架构，允许管理员更精确地控制谁可以访问系统。\n\n```\nsetenforce 0\n```\n\n```\ngetenforce\n```\n\
    \n**输出：**\n\n```\nPermissive\n```\n\n```\nsetenforce 1\n```\n\n```\ngetenforce\n\
    ```\n\n**输出：**\n\n```\nEnforcing\n```\n\n- **Enforcing** - SELinux 安全策略被强制执行。\n\
    - **Permissive** - SELinux 打印警告而不是强制执行。\n- **Disabled** - 未加载 SELinux 策略。\n\n\
    ```\n[manju@localhost ~]$ let a=\"36 + 5\" ; echo $a\n\n41\n\n[manju@localhost\
    \ ~]$ let a=\"20 + 50/10\" ; echo $a\n\n25\n\n[manju@localhost ~]$ let a=\"20\
    \ - 50/10\" ; echo $a\n\n15\n\n[manju@localhost ~]$ let a=\"20 * 50/10\" ; echo\
    \ $a\n\n100\n```\n\n```\n[manju@localhost ~]$ grep ^PASS /etc/login.defs\n\nPASS_MAX_DAYS\
    \    99999\n\nPASS_MIN_DAYS    0\n\nPASS_MIN_LEN     5\n\nPASS_WARN_AGE    7\n\
    ```\n\n```\n[manju@localhost ~]$ grep PASS /etc/login.defs\n\n#    PASS_MAX_DAYS\
    \    Maximum number of days a password may be used.\n\n#    PASS_MIN_DAYS    Minimum\
    \ number of days allowed between password changes.\n\n#    PASS_MIN_LEN     Minimum\
    \ acceptable password length.\n\n#    PASS_WARN_AGE    Number of days warning\
    \ given before a password expires.\n\nPASS_MAX_DAYS    99999\n\nPASS_MIN_DAYS\
    \    0\n\nPASS_MIN_LEN     5\n\nPASS_WARN_AGE    7\n```\n\n**命令：**\n\n```\ncut\
    \ -d: -f1 /etc/passwd | column\n```\n\n**描述：**\n\n以列的形式列出所有本地用户账户\n\n**命令：**\n\
    \n```\nmkdir ~/mydir1 ; touch ~/mydir1/myfiles1.txt\n```\n\n**描述：**\n\n创建一个目录\
    \ \"mydir1\" 并在其中创建一个文件 \"myfiles1.txt\"\n\n**命令：**\n\n```\necho hi > file.md\
    \ ; chmod 744 file.md\n```\n\n**描述：**\n\n创建一个文件 \"file.md\" 并仅给予其他人读取权限\n\n```\n\
    [manju@localhost ~]$ ls -l $(which sudo)\n\n---s--x--x. 1 root root 130776 Nov\
    \  5  2016 /bin/sudo\n```\n\n**命令：**\n\n```\nsestatus\n```\n\n**描述：**\n\n显示系统上运行的\
    \ SELinux 的当前状态\n\n**命令：**\n\n```\nps -aef\n```\n\n**描述：**\n\n显示系统上进程的完整列表\n\n\
    **命令：**\n\n```\nsar\n```\n\n**描述：**\n\n显示系统活动报告\n\n**命令：**\n\n```\nulimit\n```\n\
    \n**描述：**\n\n报告当前用户的资源限制\n\n| 输出： | |\n|---|---|\n| Unlimited | 当前用户可以消耗当前系统支持的所有资源\
    \ |\n\n- 两种资源限制类型：\n  * **硬资源限制：** 用户可以达到的物理限制。\n  * **软资源限制：** 用户可管理的限制（**其值最高可达硬限制**）"
