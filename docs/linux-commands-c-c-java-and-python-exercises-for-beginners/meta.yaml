  md: '| Random-access memory | Virtual memory |

    | --- | --- |

    | The internal memory of the CPU for storing data, program and program result.
    | A storage area that holds the files on your hard drive for retrieval when a
    computer runs out of RAM |


    # Process States in Linux:


    +   - **Ready:** a new process is created and is ready to run.

    - **Running:** The process is being executed.

    - **Wait:** The process is waiting for input from the user.

    - **Completed:** The process has completed the execution.

    - **Zombie:** The process is terminated but information regarding the process
    still exists and is available in the process table.


    | Cron | Anacron |

    | --- | --- |

    | A service that enables us to run scheduled jobs in Linux/Unix systems every
    minute. | A service that only enables us to run scheduled jobs in Linux/Unix systems
    on daily basis. |


