    **You have to**


    * Provide proper recognition;

    * Cite the license by including a link to it (**https://creativecommons.org/licenses/by-nc-sa/4.0/**);
    and

    * Specify whether (and if so, which) changes were made from the original.


    # Dedication


    I **dedicate this book** to every individual, programmer, teacher, educational
    institutions and enterprise corporations in every country of the world for their
    immense contributions towards the process of creating, designing, deploying and
    supporting software...


    # Acknowledgements


    Without the amazing work of some renowned programmers, their creativity, and their
    inventiveness in the field of software programming, this book would not have been
    accomplished. I would like to use this opportunity to thank my dearest friend
    and well-wisher "Lawrence" for his unwavering support during the **COVID crisis**
    and for giving me access to all the resources I needed to finish this book. I
    want to express my gratitude to my family for their support and encouragement
    as I wrote this book, especially to my **mother**, who has been a tremendous source
    of inspiration in my life. I owe a lot of gratitude to my mother for teaching
    me how to be perseverant and strong in life. Finally, I want to emphasize how
    crucial patience is when writing a book or taking on any other project in life.


    # Foreword


    I''m neither the proprietor of a well-known publishing house or a top IT firm
    with hundreds of in-house programmers who could easily produce anything I needed.
    I am a self-employed software engineer who is passionate about what I do, and
    believe me when I say that a lot of work and effort went into compiling this **comprehensive
    edition**. I''ll be overjoyed if it helps even a few others reach their ideal
    positions in their professions.


    # Thank You


    – Manjunath.R


    # An Enjoyable Introduction to Coding


    # Introduction


    Today''s devices are mostly powered by software: almost everyone uses Facebook,
    WhatsApp and Twitter to communicate, many phones have internet-connected desktops,
    and the majority of office work requires using a computer to do tasks. As a response,
    there is a huge increase in demand for programmers. **Numerous books**, interactive
    websites, and programmer training courses make the bold claim that they can turn
    ambitious novices into software engineers earning six figures. This book is for
    all programmers, whether you are a novice or an experienced pro. Its numerous
    examples and **well paced discussions** will be especially beneficial for beginners.
    Those who are already experienced with programming will probably gain more from
    this book, of course. You will be at a modest level of programming proficiency
    when you have finished this book, from where you can take yourself to next levels
    so that you can automate simple tasks such as:


    - Making a file backup

    - Get rid of the irritating emails

    - Completing online forms


    This book will make an amazing complement to any tutorial and serve as a source
    of information to your specific inquiries if you are just learning what kind of
    animals C, C++, Java, PHP, Python, and JavaScript are. Even if your career has
    nothing to do with computers, the skills you learn from programming can be valuable
    at school and at work. **Programming** is a pleasant, occasionally difficult and
    perhaps frustrating activity. Creativity, logic, and problem-solving are all enhanced
    through programming.


    - Educational institutions are teaching it

    - Corporate societies are employing it

    - Pupils need it

    - (Pedagogues desire it... ;)

    - (Coders perceive it... :))


    # Have Fun!


    As you progress through this book, keep in mind that programming can be enjoyable.
    Do not consider of this as work. Consider programming as a means to develop entertaining
    games or software applications that you can show off to others or your friends.
    Programming is a tremendous brain workout and is essential today because so much
    of our everyday world is automated. But above all, you have access to the quick-paced,
    creative world that depends on machine connections.


    > "The only way to learn a new programming language is by writing programs in
    it."


    – Dennis Ritchie


    **Note:**


    *   **Linux version used:** CentOS Linux release 7.3.1611 (Core)

    *   **Python version used:** 3.7.3


    # The Basic Programming Principles That Every Programmer Should Know:


    1. Always be aware of the purpose of your software program before beginning to
    write it.

    2. Programming is not the solution; it is merely a means to achieve a solution.

    3. Consider the problem rather than just the solution.

    4. Always try to make things simpler; anyone can come up with a complicated answer
    to a problem. To make a solution simple while remaining consistent, it requires
    extra work and consideration.

    5. Reduce Deeply Nested Ifs or Loops: When your software program is deeply nested,
    your program becomes complicated and disorganized.

    6. Delete Unnecessary Code. Make sure your software program is safe, secure, reliable,
    testable and clear to read.

    7. Give code reviews some attention so you can spot bugs early, before they cause
    serious problems in your software application.

    8. Reduce complexity. Software programs must have clear explanations.

    9. Generalize your software program. Make sure your software program is documented.
    Understanding the function of a certain component of the software application
    is greatly aided by the documentation and comments.

    10. Fancy algorithms and data structures are more difficult to implement. Use
    simple, efficient, appropriate algorithms and data structures.

    11. Refractor your software program frequently to improve its internal software
    attributes in terms of upkeep, testing and comprehension.

    12. Each time you make a change to your software program: check it, build it and
    test it.

    13. Before being released, all software codes must pass each and every unit test.

    14. Always use caution when using someone else''s code. Maintain a standardized,
    orderly and generally consistent coding style.

    15. Avoid implementing a code style that is too hard to understand.

    16. Because it makes the code more difficult to maintain, duplication is seen
    adversely in software programming.

    17. Look for bugs and flaws and fix them. Divide your software program into Brief,
    Concise Units.

    18. Avoid overdesigning. Focus your software design on the requirements of the
    clients.

    19. Program defensively. Functions should be simple and do a distinct, defined
    task.

    20. Create reusable functions and Keep the functions as simple, immutable and
    manageable as possible.

    21. When naming your variables and functions, choose names that are meaningful
    and descriptive.'
