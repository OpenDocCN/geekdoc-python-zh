- md: '## Top 10 Programming Languages and Their Applications


    | **Python** | Artificial Intelligence, Deep learning and Machine Learning |

    |---|---|

    | **JavaScript** | Rich Interactive Web Development |

    | **Java** | Enterprise Application Development |

    | **R** | Data Analysis |

    | **C/C++** | Operating Systems and System Tools |

    | **Golang** | Server-Side Programming |

    | **C#** | Application and Web Development Using .NET |

    | **PHP** | Web Development |

    | **SQL** | Database Management |

    | **Swift** | For Mobile Application Development on iOS |


    ## How much time does it take to become a good programmer?


    A skilled coder can identify the best solution to any problem and solve even the
    most challenging issues. Being a good programmer requires constant knowledge upkeep
    and the acquisition of new skills. A PhD isn''t always necessary to become a skilled
    programmer, but discipline and determination are. Being a successful programmer
    demands you to be one step ahead, while becoming a respectable coder takes years
    of hard effort.


    ## Contents


    | LINUX COMMANDS | 1 |

    |---|---|

    | C Exercises | 325 |

    | C++ Exercises | 446 |

    | Java Exercises | 575 |

    | Python Exercises | 721 |


    > "A language that doesn''t affect the way you think about programming is not
    worth knowing."


    — Alan J. Perlis


    ## LINUX COMMANDS


    **Linux** is an open-source Unix-like operating system built on the Linux kernel,
    which Linus Torvalds initially made available on September 17, 1991. People switching
    from Windows or macOS may find Linux difficult to use and comprehend, and many
    people give up using it because they are not aware of the commands and shortcuts
    that Linux offers. When using Linux, you can accomplish tasks much more quickly
    than when using other operating systems by becoming familiar with the useful commands
    and how to use them correctly. We''ll examine a few widely used Linux commands
    in this chapter.


    When working with unstructured files in Linux, whether you are a sys admin or
    a database administrator, there are a number of commands that will be very helpful
    to you in your everyday job. Working as developers requires us to use the Linux
    command line occasionally. Linux is typically considered to be dominant for public
    Internet servers, powering well over twice as many servers as Windows Server.
    Linux has a monopoly on the supercomputer market, powering all 500 of the TOP
    computers. It''s quite easy to customize Linux. Your OS can be modified. In this
    chapter, we''ll look at some fundamental Linux commands that every programmer
    should be familiar with.


    ## 17 Principles of the philosophy of UNIX


    - Principle of **Modularity**: A system should be composed of several components
    that are joined, collaborate well, and have clearly defined functions

    - Principle of **Clarity**: Clearness is better than smartness

    - Principle of **Composition**: Create software that can communicate with other
    software

    - Principle of **Separation**: Programming mechanisms and rules should be kept
    distinct. Keep front-end interfaces and back-end engines separate

    - Principle of **Simplicity**: Build for simplicity and only add complexity where
    necessary

    - Principle of **Parsimony**: Only write a large program when it is clear by demonstration
    that nothing else will work

    - Principle of **Transparency**: Design with visibility in view to simplify analysis
    and troubleshooting

    - Principle of **Robustness**: Transparency and ease of use produce robustness

    - Principle of **Representation**: Create programs easier to understand for any
    programmer involved in the project so that it can be maintained


    > > When offered the choice, programmers should choose to complicate the data
    rather than the procedural logic of the software because complex data is simpler
    for us to understand than complex logic


    - Principle of **Least Surprise**: Developers should be encouraged to create user-friendly,
    intuitive products

    - Principle of **Silence**: Allow programmers and other programs to get the data
    they require from a program''s output without having to interpret unnecessary
    extensive and detailed

    - Principle of **Repair**: Programmers should create software that fails in a
    way that is simple to identify and diagnose

    - Principle of **Economy**: Project development costs should be minimized

    - Principle of **Generation**: Programmers should develop abstract, high-level
    programs that produce code rather than writing code by hand to decrease human
    error and save time

    - Principle of **Optimization**: Before you can optimize it, get it working. Software
    should be developed and tested before being masterfully crafted by developers

    - Principle of **Diversity**: Make programs flexible, enabling their use in ways
    other than those that their creators intended

    - Principle of **Extensibility**: Increase the usefulness and lifespan of the
    developer''s written code


    ## Better skills come with increased learning.


    > Your main focus as a novice should be on becoming familiar with the ins and
    outs of operating system architecture as well as discovering shortcuts and time-saving
    techniques.


    **CentOS** is a wonderful option if you use Windows and want to learn Linux because
    it is one of the best Linux distributions for beginners. Your first few days using
    **CentOS** won''t be that odd. But you must learn how to utilize Linux''s command
    line interface if you want to experience its full capabilities. You will initially
    experience some difficulty learning several instructions. Although employing the
    instructions won''t make you a genius, it will assist you in carrying out certain
    fundamental tasks. Here are the most basic **CentOS** commands for new users to
    ensure a smooth start. Let''s get right into it!


    22. Put your software program''s structure on view by using indentation.

    23. Delete any unused variables and functions; do not comment them.

    24. If you feel that a part of the software program is excessively unorganized,
    regroup and modify it, or even split it up into different portions.

    25. Avoid using GOTO statements because they cause the software program to be
    unstructured, which makes it harder to understand and makes debugging more complex.

    26. Avoid using the same identifier more than once.

    27. The length of functions shouldn''t be excessively long.

    28. Think Twice, Code Once: Encourage yourself to consider the problem more before
    coming up with a solution.

    29. The very first step in making a software program readable by humans is to
    add comments. Comments should be detailed explanations of a software program.

    30. White space should be utilized regularly to increase code readability even
    though it has little significance to compilers.

    31. Coding standards must be followed while formatting code.

    32. Avoid security pitfalls and Keep your software code portable.

    33. All software design is redesign. Take advice from others'' experience.

    34. The writing of software program should make it simple for a future software
    developer to correct errors or modify its functionality.

    35. Never compromise clarity for a false sense of efficiency.


    > "More computing sins are committed in the name of efficiency (without necessarily
    achieving it) than for any other single reason – including blind stupidity."


    – W.A. Wulf


    36. Enhance the appearance of software program by avoiding excessively long names
    or ambiguous acronyms.

    37. Look for a method that employs a loop rather than duplicating lines. Compared
    to 100 individual blocks of code, one loop that can handle 100 repetitions is
    simpler to debug.


    > You''re not coding to amaze strangers. You''re in this profession to find ways
    to resolve problems.


    > "The computer programmer is a creator of universes for which he alone is the
    lawgiver. No playwright, no stage director, no emperor, however powerful, has
    ever exercised such absolute authority to arrange a stage or field of battle and
    to command such unswervingly dutiful actors or troops."


    – Joseph Weizenbaum'
