  md: '# LINUX COMMANDS


    ![](img/55b12efb0755f07421548d2d4f35991a_18_0.png)


    **Linux** is an open-source Unix-like operating system built on the Linux kernel,
    which Linus Torvalds initially made available on September 17, 1991. People switching
    from Windows or macOS may find Linux difficult to use and comprehend, and many
    people give up using it because they are not aware of the commands and shortcuts
    that Linux offers. When using Linux, you can accomplish tasks much more quickly
    than when using other operating systems by becoming familiar with the useful commands
    and how to use them correctly. We''ll examine a few widely used Linux commands
    in this chapter.


    When working with unstructured files in Linux, whether you are a sys admin or
    a database administrator, there are a number of commands that will be very helpful
    to you in your everyday job. Working as developers requires us to use the Linux
    command line occasionally. Linux is typically considered to be dominant for public
    Internet servers, powering well over twice as many servers as Windows Server.
    Linux has a monopoly on the supercomputer market, powering all 500 of the TOP
    computers. It''s quite easy to customize Linux. Your OS can be modified. In this
    chapter, we''ll look at some fundamental Linux commands that every programmer
    should be familiar with.'
  merge: -1
