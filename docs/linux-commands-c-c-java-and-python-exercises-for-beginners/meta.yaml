    is a little different. Maybe there is a new turret, or some walls have moved.
    Or perhaps someone has temporarily removed the floor under your bed."


    ~ Unix for Dummies, 2nd Edition


    **Description:**


    Display system date and time.


    Command:


    ```

    date

    ```


    **Description:**


    Display calendar.


    Command:


    ```

    cal

    ```


    **Description:**


    Display date, time and calendar.


    Command:


    ```

    date & cal

    ```


    **Description:**


    Display August month 2016 year calendar.


    Command:


    ```

    cal 8 2016

    ```


    **Description:**


    Used to clear the terminal window.


    Command:


    ```

    clear

    ```


    **Description:**


    Exit from the terminal window.


    Command:


    ```

    exit

    ```


    **Description:**


    Display free and used system memory.


    Command:


    ```

    free

    ```


    **Description:**


    Display free and used system memory in bytes.


    Command:


    ```

    free -b

    ```


    **Description:**


    Display free and used system memory in kilobytes.


    Command:


    ```

    free -k

    ```


    **Description:**


    Display free and used system memory in megabytes.


    Command:


    ```

    free -m

    ```


    **Description:**


    Change user password.


    Command:


    ```

    passwd

    ```


    **Description:**


    Power-off the machine.


    Command:


    ```

    shutdown

    ```


