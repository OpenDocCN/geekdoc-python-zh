    printf("\n Discount = %lf", PV* 0.2);

    printf("\n Total = %lf", PV - PV* 0.2);

    }

    else {

    printf("\n Discount = %lf", PV* 0.3);

    printf("\n Total = %lf", PV - PV* 0.3);

    }

    return 0;

    }

