    is typically between 30 centimeters and 250 centimeters. Hence, a data point (e.g.,
    a row of data in a spreadsheet) with a height of 5 centimeters or a height of
    500 centimeters is an outlier. The consequences of these outlier values are unlikely
    to involve a significant financial or physical loss (though they could adversely
    affect the accuracy of a trained model).


    Anomalies are also outside the “normal” range of values (just like outliers),
    and they are typically more problematic than outliers: anomalies can have more
    “severe” consequences than outliers. For example, consider the scenario in which
    someone who lives in California suddenly makes a credit card purchase in New York.
    If the person is on vacation (or a business trip), then the purchase is an outlier
    (it’s “outside” the typical purchasing pattern), but it’s not an issue. However,
    if that person was in California when the credit card purchase was made, then
    it’s most likely to be credit card fraud, as well as an anomaly.


    Unfortunately, there is no simple way to decide how to deal with anomalies and
    outliers in a dataset. Although you can exclude rows that contain outliers, doing
    so might deprive the dataset—and therefore the trained model—of valuable information.
    You can try modifying the data values (described as follows), but again, this
    might lead to erroneous inferences in the trained model. Another possibility is
    to train a model with the dataset that contains anomalies and outliers, and then
    train a model with a dataset from which the anomalies and outliers have been removed.
    Compare the two results and see if you can infer anything meaningful regarding
    the anomalies and outliers.


