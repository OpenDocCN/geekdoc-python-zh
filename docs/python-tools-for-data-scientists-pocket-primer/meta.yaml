    # CHAPTER 6


    # DATA VISUALIZATION


    This chapter introduces data visualization, along with a wide-ranging collection
    of Python-based code samples that use various visualization tools (including Matplotlib
    and Seaborn) to render charts and graphs. In addition, this chapter contains Python
    code samples that combine Pandas, Matplotlib, and built-in datasets.


    The first part of this chapter briefly discusses data visualization, with a short
    list of some data visualization tools, and a list of various types of visualization
    (such as bar graphs and pie charts).


    The second part of this chapter introduces you to Matplotlib, which is an open
    source Python library modeled after MatLab. This section also provides the Python
    code samples for the line graphs (horizontal, vertical, and diagonal) in the Euclidean
    plane that you saw in a previous chapter.


    The third part of the chapter introduces you to Seaborn for data visualization,
    which is a layer above Matplotlib. Although Seaborn does not have all of the features
    that are available in Matplotlib, Seaborn provides an easier set of APIs for rendering
    charts and graphs.


    The final portion of this chapter contains a very short introduction to Bokeh,
    along with a code sample that illustrates how to create a more artistic graphics
    effect with relative ease in Bokeh.


    # What is Data Visualization?


    Data visualization refers to presenting data in a graphical manner, such as bar
    charts, line graphs, heat maps, and many other specialized'
- md: "representations. As you probably know, big data comprises massive amounts of\
    \ data, which leverages data visualization tools to assist in making better decisions.\n\
    \nA key role for good data visualization is to tell a meaningful story, which\
    \ in turn focuses on useful information that resides in datasets that can contain\
    \ many data points (i.e., billions of rows of data). Another aspect of data visualization\
    \ is its effectiveness: how well does it convey the trends that might exist in\
    \ the dataset?\n\nThere are many open source data visualization tools available,\
    \ some of which are listed here (many others are available):\n\n- Matplotlib\n\
    - Seaborn\n- Bokeh\n- YellowBrick\n- Tableau\n- D3.js (JavaScript and SVG)\n\n\
    Incidentally, in case you have not already done so, it would be helpful to install\
    \ the following Python libraries (using `pip3`) on your computer so that you can\
    \ launch the code samples in this chapter:\n\n```\npip3 install matplotlib\npip3\
    \ install seaborn\npip3 install bokeh\n```\n\n## Types of Data Visualization\n\
    \nBar graphs, line graphs, and pie charts are common ways to present data, and\
    \ yet many other types exist, some of which are listed here:\n\n- 2D/3D Area Chart\n\
    - Bar Chart\n- Gantt Chart\n- Heat Map\n- Histogram\n- Polar Area\n- Scatter Plot\
    \ (2D or 3D)\n- Timeline\n\nThe Python code samples in the next several sections\
    \ illustrate how to perform visualization via rudimentary APIs from Matplotlib.\n\
    \n## What is Matplotlib?\n\nMatplotlib is a plotting library that supports NumPy,\
    \ SciPy, and toolkits such as wxPython (among others). Matplotlib supports only\
    \ version 3 of Python: support for version 2 of Python was available only through\
    \ 2020. Matplotlib is a multi-platform library that is built on NumPy arrays.\n\
    \nThe plotting-related code samples in this chapter use pyplot, which is a Matplotlib\
    \ module that provides a MATLAB-like interface. The Python code samples for visualization\
    \ in this chapter use primarily Matplotlib, along with some code samples that\
    \ use Seaborn. The code samples that plot line segments assume that you are familiar\
    \ with the equation of a (non-vertical) line in the plane: y = m*x + b, where\
    \ m is the slope and b is the y-intercept.\n\nFurthermore, some code samples use\
    \ NumPy APIs such as `np.linspace()`, `np.array()`, `np.random.rand()`, and `np.ones()`\
    \ that are discussed in Chapter 3, so you can refresh your memory regarding these\
    \ APIs.\n\n## Diagonal Lines in Matplotlib\n\nListing 6.1 displays the content\
    \ of `diagonallines.py` that illustrates how to plot lines in a grid.\n\n**Listing\
    \ 6.1: diagonallines.py**\n\n```\nimport matplotlib.pyplot as plt\nimport numpy\
    \ as np\n\nx1 = np.linspace(-5,5,num=200)\ny1 = x1\n\nx2 = np.linspace(-5,5,num=200)\n\
    y2 = -x2\n\nplt.axis([-5, 5, -5, 5])\nplt.plot(x1,y1)\nplt.plot(x2,y2)\nplt.show()\n\
    ```\n\nListing 6.1 contains some `import` statements and then initializes the\
    \ variables x1 and y1 as an array of 200 equally spaced points, where the points\
    \ in y1 equal the values in x1.\n\nSimilarly, the variables `x2` and `y2` are\
    \ defined, except that the values in `y2` are the negative of the values in `x2`.\
    \ The `Pyplot` API `plot()` uses the `points` variable to display a pair of diagonal\
    \ line segments.\n\nFigure 6.1 displays a set of “dashed” line segments whose\
    \ equations are contained in Listing 6.1.\n\n![](img/a5bd78f899e04acbdf3949ed2383b115_232_0.png)\n\
    \n**FIGURE 6.1** A pair of diagonal line segments.\n\n## A Colored Grid in Matplotlib\n\
    \nListing 6.2 displays the content of `plotgrid2.py` that illustrates how to display\
    \ a colored grid.\n\n**Listing 6.2: plotgrid2.py**\n\n```\nimport matplotlib.pyplot\
    \ as plt\nfrom matplotlib import colors\nimport numpy as np\n\ndata = np.random.rand(10,\
    \ 10) * 20\n\n# create discrete colormap\ncmap = colors.ListedColormap(['red',\
    \ 'blue'])\nbounds = [0,10,20]\nnorm = colors.BoundaryNorm(bounds, cmap.N)\n\n\
    fig, ax = plt.subplots()\nax.imshow(data, cmap=cmap, norm=norm)\n\n# draw gridlines\n\
    ax.grid(which='major', axis='both', linestyle='-', color='k',\n        linewidth=2)\n\
    ax.set_xticks(np.arange(-.5, 10, 1));\nax.set_yticks(np.arange(-.5, 10, 1));\n\
    \nplt.show()\n```\n\nListing 6.2 defines the NumPy variable `data` that defines\
    \ a 2D set of points with ten rows and ten columns. The `Pyplot` API `plot()`\
    \ uses the `data` variable to display a colored grid-like pattern.\n\nFigure 6.2\
    \ displays a colored grid whose equations are contained in Listing 6.2.\n\n![](img/a5bd78f899e04acbdf3949ed2383b115_233_0.png)\n\
    \n**FIGURE 6.2** A colored grid of line segments.\n\n## Randomized Data Points\
    \ in Matplotlib\n\nListing 6.3 displays the content of `lin_reg_plot.py` that\
    \ illustrates how to plot a graph of random points.\n\n**Listing 6.3: lin_reg_plot.py**\n\
    \n```\nimport numpy as np\nimport matplotlib.pyplot as plt\n\ntrX = np.linspace(-1,\
    \ 1, 101) # Linear space of 101 and [-1,1]\n\n#Create the y function based on\
    \ the x axis\ntrY = 2*trX + np.random.randn(*trX.shape)*0.4+0.2\n\n#create figure\
    \ and scatter plot of the random points\nplt.figure()\nplt.scatter(trX,trY)\n\
    # Draw one line with the line function\nplt.plot(trX, .2 + 2 * trX)\nplt.show()\n\
    ```\n\nListing 6.3 defines the NumPy variable `trX` that contains 101 equally\
    \ spaced numbers that are between -1 and 1 (inclusive). The variable `trY` is\
    \ defined in two parts: the first part is `2*trX` and the second part is a random\
    \ value that is partially based on the length of the one-dimensional array `trX`.\
    \ The variable `trY` is the sum of these two “parts”, which creates a “fuzzy”\
    \ line segment. The next portion of Listing 6.3 creates a scatter-plot based on\
    \ the values in `trX` and `trY`, followed by the `Pyplot` API `plot()` that renders\
    \ a line segment.\n\nFigure 6.3 displays a random set of points based on the code\
