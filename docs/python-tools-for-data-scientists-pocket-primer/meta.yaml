    END { print \"maximum line length is \" x }' < data.txt\n```\n\n输入通过 expand 工具处理，将制表符转换为空格，因此比较的宽度实际上是右边距列。\n\
    \n打印至少有一个字段的每一行：\n\n```\nawk 'NF > 0' data.txt\n```\n\n前面的代码片段展示了一种从文件中删除空行的简单方法（或者更确切地说，创建一个与旧文件类似但已删除空行的新文件）。\n\
