    \ 2.15 is shown here:\n\n```\n('a:       ', array([2, 3]))\n('asquare:', array([4,\
    \ 9]))\n('asqsum: ', 13)\n('anorm1: ', 3.605551275463989)\n('anorm2: ', 3.605551275463989)\n\
    ('anorm3: ', 3.605551275463989)\n```\n\n## NumPy and Other Operations\n\nNumPy\
    \ provides the * operator to multiply the components of two vectors to produce\
    \ a third vector whose components are the products of the corresponding components\
    \ of the initial pair of vectors. This operation is called a Hadamard product,\
    \ named after a famous mathematician. If you then add the components of the third\
    \ vector, the sum is equal to the inner product of the initial pair of vectors.\n\
    \nListing 2.16 shows the content of `otherops.py`, which illustrates how to perform\
    \ other operations on a NumPy array.\n\n**Listing 2.16: otherops.py**\n\n```\n\
