- md: "## Convert Strings to Date Values\n\nListing 5.4 displays the content of `str_to_date.sql`\
    \ that illustrates how to populate a date attribute with date values that are\
    \ determined from another string-based attribute that contains strings for dates.\n\
    \n**Listing 5.4: str_to_date.sql**\n\n```sql\nuse mytools;\nDROP TABLE IF EXISTS\
    \ mytable;\nCREATE TABLE mytable (str_date CHAR(15), state CHAR(20), reply CHAR(10));\n\
    \nINSERT INTO mytable VALUES('20210915','New York','Yes');\nINSERT INTO mytable\
    \ VALUES('20211016','New York','no');\nINSERT INTO mytable VALUES('20220117','Illinois','yes');\n\
    INSERT INTO mytable VALUES('20220218','New York','No');\n\nSELECT * FROM mytable;\n\
    \n-- 1) insert date-based feature:\nALTER TABLE mytable\nADD COLUMN (real_date\
    \ DATE);\nSELECT * FROM mytable;\n\n-- 2) populate real_date from str_date:\n\
    UPDATE mytable t1\n    INNER JOIN mytable t2\n        ON t1.str_date = t2.str_date\n\
    SET t1.real_date = DATE(t2.str_date);\nSELECT * FROM mytable;\n\n-- 3) Remove\
    \ unwanted features:\nALTER TABLE mytable\nDROP COLUMN str_date;\nSELECT * FROM\
    \ mytable;\n```\n\nListing 5.4 creates and populates the table `mytable` and displays\
    \ the contents of this table. The remainder of Listing 5.4 consists of three SQL\
    \ statements, each of which starts with a comment statement that explains its\
    \ purpose.\n\nThe first SQL statement inserts a new column `real_date` of type\
    \ `DATE`. The second SQL statement populates the `real_date` column with the values\
    \ in the `str_date` column that have been converted to a date value via the `DATE()`\
    \ function. The third SQL statement is optional: it drops the `str_date` column\
    \ if you wish to do so. Launch the code in Listing 5.4 and you will see the following\
    \ output:\n\n```\n+------------+----------+-------+\n| str_date   | state    |\
    \ reply |\n+------------+----------+-------+\n| 20210915   | New York | Yes  \
    \ |\n| 20211016   | New York | no    |\n| 20220117   | Illinois | yes   |\n| 20220218\
    \   | New York | No    |\n+------------+----------+-------+\n4 rows in set (0.000\
    \ sec)\n```\n\n```\nQuery OK, 0 rows affected (0.007 sec)\nRecords: 0  Duplicates:\
    \ 0  Warnings: 0\n```\n\n```\n+------------+----------+-------+------------+\n\
    | str_date   | state    | reply | real_date  |\n+------------+----------+-------+------------+\n\
    | 20210915   | New York | Yes   | NULL       |\n| 20211016   | New York | no \
    \   | NULL       |\n| 20220117   | Illinois | yes   | NULL       |\n| 20220218\
    \   | New York | No    | NULL       |\n+------------+----------+-------+------------+\n\
    4 rows in set (0.002 sec)\n```\n\n```\nQuery OK, 4 rows affected (0.002 sec)\n\
    Rows matched: 4  Changed: 4  Warnings: 0\n```\n\n```\n+------------+----------+-------+------------+\n\
    | str_date   | state    | reply | real_date  |\n+------------+----------+-------+------------+\n\
    | 20210915   | New York | Yes   | 2021-09-15 |\n| 20211016   | New York | no \
    \   | 2021-10-16 |\n| 20220117   | Illinois | yes   | 2022-01-17 |\n| 20220218\
    \   | New York | No    | 2022-02-18 |\n+------------+----------+-------+------------+\n\
    4 rows in set (0.000 sec)\n```\n\n```\nQuery OK, 0 rows affected (0.018 sec)\n\
    Records: 0  Duplicates: 0  Warnings: 0\n```\n\n```\n+----------+-------+------------+\n\
    | state    | reply | real_date  |\n+----------+-------+------------+\n| New York\
    \ | Yes   | 2021-09-15 |\n| New York | no    | 2021-10-16 |\n| Illinois | yes\
    \   | 2022-01-17 |\n| New York | No    | 2022-02-18 |\n+----------+-------+------------+\n\
    4 rows in set (0.000 sec)\n```\n\n## Data Cleaning from the Command Line (optional)\n\
    \nThis section is marked “optional” because the solutions to tasks involve an\
    \ understanding of some Unix-based utilities. Although this book does not contain\
    \ details about those utilities, you can find online tutorials with examples regarding\
    \ these utilities.\n\nThis section contains several subsections that perform data\
    \ cleaning tasks that involve the `sed` and `awk` utilities:\n\n- replace multiple\
    \ delimiters with a single delimiter (sed)\n- restructure a dataset so all rows\
    \ have the same column count (awk)\n\nKeep in mind the following point about these\
    \ examples: they must be performed from the command line before they can be processed\
    \ in a Pandas data frame.\n\n## Working with the sed Utility\n\nThis section contains\
    \ an example of how to use the `sed` command line utility to replace different\
    \ delimiters with a single delimiter for the fields in a text file. You can use\
    \ the same code for other file formats, such as CSV files and TSV files.\n\nThis\
    \ section does not provide any details about `sed` beyond the code sample. However,\
    \ after you read the code (it’s only one line), you will understand how to adapt\
    \ that code snippet to your own requirements (i.e., how to specify different delimiters).\n\
    \nListing 5.5 displays the content of `delimiter1.txt` and Listing 5.6 displays\
    \ the content of `delimiter1.sh` that replaces all delimiters with a comma (“,”).\n\
    \n**Listing 5.5: delimiter1.txt**\n\n```\n1000|Jane:Edwards^Sales\n2000|Tom:Smith^Development\n\
    3000|Dave:Del Ray^Marketing\n```\n\n**Listing 5.6: delimiter1.sh**\n\n```bash\n\
    cat delimiter1.txt | sed -e 's/:/,/' -e 's/|/,/' -e 's/\\^/,/'\n```\n\nListing\
    \ 5.6 starts with the `cat` command line utility, which sends the contents of\
    \ the file `delimiter1.txt` to “standard output.” However, in this example, the\
    \ output of this command becomes the input to the sed command because of the pipe\
    \ (“|”) symbol.\n\nThe `sed` command consists of three parts, all of which are\
    \ connected by the `-e` switch. You can think of `-e` as indicating “there is\
    \ more processing to be done” by the `sed` command. In this example, there are\
    \ three occurrences of `-e`, which means that the `sed` command will execute three\
    \ snippets.\n\nThe first code snippet is `'s/:/,/'`, which translates into “replace\
    \ each semi-colon with a comma.” The result of this operation is passed to the\
    \ next code snippet, which is `'s/|/,/'`. This code snippet translates into “replace\
    \ each pipe symbol with a comma.” The result of this operation is passed to the\
    \ next code snippet, which is `'s/\\^/,/'`. This code snippet translates into\
    \ “replace each caret symbol (^) with a comma.” The result of this operation is\
    \ sent to the standard output, which can be redirected to another text file. Launch\
    \ the code in Listing 5.6 and you will see the following output:\n\n```\n1000,Jane,Edwards,Sales\n\
    2000,Tom,Smith,Development\n3000,Dave,Del Ray,Marketing\n```\n\nThere are three\
    \ comments to keep in mind. First, the snippet contains a backslash because the\
    \ caret symbol (^) is a meta character, so we need to “escape” this character.\
    \ The same is true for other meta characters (such as “$” and “.”).\n\nSecond,\
    \ you can easily extend the `sed` command for each new delimiter that you encounter\
    \ as a field separator in a text file: simply follow the pattern that you see\
    \ in Listing 5.6 for each new delimiter.\n\nThird, redirect the output of `delimiter1.sh`\
    \ to the text file `delimiter2.txt` by launching the following command:\n\n```bash\n\
    ./delimiter1.sh > delimiter2.txt\n```\n\nIf an error occurs in the preceding code\
    \ snippet, make sure that `delimiter1.sh` is executable by invoking the following\
    \ command:\n\n```bash\nchmod 755 delimiter1.sh\n```\n\nThis concludes the example\
    \ involving the `sed` command line utility, which is a very powerful utility for\
    \ processing text files. Check online for articles and blog posts if you want\
    \ to learn more about the `sed` utility.\n\n## Working with Variable Column Counts\n\
    \nThis section shows you how to use the `awk` command line utility in order to\
    \ “pad” rows in a CSV file with `NaN` values so that all records have the same\
    \ number of columns.\n\nListing 5.7 displays the content `variable_columns.csv`\
    \ and Listing 5.8 displays the content of `variable_columns.sh` that uses the\
    \ `awk` utility to pad the number of columns in a CSV file.\n\n**Listing 5.7:\
    \ variable_columns.csv**\n\n```\n10,20,30\n10,20,30,40\n10,20,30,40,50,60\n```\n\
    \n**Listing 5.8: variable_columns.sh**\n\n```bash\nfilename=\"variable_columns.csv\"\
    \n\ncat $filename | awk -F\",\" '\nBEGIN { colCount = 6 }\n{\n    printf(\"%s\"\
    , $0)\n    for(i=NF; i<colCount; i++) {\n        printf(\",NaN\")\n    }\n   \
    \ print \"\"\n}\n'\n```\n\nListing 5.8 initializes the variable `filename` with\
    \ the name of the CSV file for this code sample. The next snippet is an `awk`\
    \ script that initializes `colCount` with the value 6 in the `BEGIN` block: this\
    \ value is the largest number of columns in any row of the CSV file.\n\nThe next\
    \ block of code displays the contents of the current line, followed by a loop\
    \ that prints a comma-separated list of `NaN` values to ensure that the output\
    \ line contains 6 columns. For instance, if a row has 4 columns, then `NaN` will\
    \ be printed twice. The `print` statement after the loop ensures that the next\
    \ line from the input file starts on a new line instead of the current output\
    \ line. Launch the code in Listing 5.8 and you will see the following output:\n\
    \n```\n10,20,30,NaN,NaN,NaN\n10,20,30,40,NaN,NaN\n10,20,30,40,50,60\n10,20,NaN,NaN,NaN,NaN\n\
    10,20,30,40,NaN,NaN\n```"
  mdcn: "## 将字符串转换为日期值\n\n清单 5.4 展示了 `str_to_date.sql` 的内容，该示例说明了如何使用另一个包含日期字符串的字符串属性中的值来填充日期属性。\n\
    \n**清单 5.4：str_to_date.sql**\n\n```sql\nuse mytools;\nDROP TABLE IF EXISTS mytable;\n\
    CREATE TABLE mytable (str_date CHAR(15), state CHAR(20), reply CHAR(10));\n\n\
    INSERT INTO mytable VALUES('20210915','New York','Yes');\nINSERT INTO mytable\
    \ VALUES('20211016','New York','no');\nINSERT INTO mytable VALUES('20220117','Illinois','yes');\n\
    INSERT INTO mytable VALUES('20220218','New York','No');\n\nSELECT * FROM mytable;\n\
    \n-- 1) insert date-based feature:\nALTER TABLE mytable\nADD COLUMN (real_date\
    \ DATE);\nSELECT * FROM mytable;\n\n-- 2) populate real_date from str_date:\n\
    UPDATE mytable t1\n    INNER JOIN mytable t2\n        ON t1.str_date = t2.str_date\n\
    SET t1.real_date = DATE(t2.str_date);\nSELECT * FROM mytable;\n\n-- 3) Remove\
    \ unwanted features:\nALTER TABLE mytable\nDROP COLUMN str_date;\nSELECT * FROM\
    \ mytable;\n```\n\n清单 5.4 创建并填充了表 `mytable`，并显示了该表的内容。清单 5.4 的其余部分由三个 SQL 语句组成，每个语句都以一个注释语句开头，解释其用途。\n\
    \n第一个 SQL 语句插入了一个新的 `DATE` 类型的列 `real_date`。第二个 SQL 语句使用 `DATE()` 函数将 `str_date`\
    \ 列中的值转换为日期值，并填充到 `real_date` 列中。第三个 SQL 语句是可选的：如果你希望这样做，它会删除 `str_date` 列。运行清单\
    \ 5.4 中的代码，你将看到以下输出：\n\n```\n+------------+----------+-------+\n| str_date   |\
    \ state    | reply |\n+------------+----------+-------+\n| 20210915   | New York\
    \ | Yes   |\n| 20211016   | New York | no    |\n| 20220117   | Illinois | yes\
    \   |\n| 20220218   | New York | No    |\n+------------+----------+-------+\n\
    4 rows in set (0.000 sec)\n```\n\n```\nQuery OK, 0 rows affected (0.007 sec)\n\
    Records: 0  Duplicates: 0  Warnings: 0\n```\n\n```\n+------------+----------+-------+------------+\n\
    | str_date   | state    | reply | real_date  |\n+------------+----------+-------+------------+\n\
    | 20210915   | New York | Yes   | NULL       |\n| 20211016   | New York | no \
    \   | NULL       |\n| 20220117   | Illinois | yes   | NULL       |\n| 20220218\
    \   | New York | No    | NULL       |\n+------------+----------+-------+------------+\n\
    4 rows in set (0.002 sec)\n```\n\n```\nQuery OK, 4 rows affected (0.002 sec)\n\
    Rows matched: 4  Changed: 4  Warnings: 0\n```\n\n```\n+------------+----------+-------+------------+\n\
    | str_date   | state    | reply | real_date  |\n+------------+----------+-------+------------+\n\
    | 20210915   | New York | Yes   | 2021-09-15 |\n| 20211016   | New York | no \
    \   | 2021-10-16 |\n| 20220117   | Illinois | yes   | 2022-01-17 |\n| 20220218\
    \   | New York | No    | 2022-02-18 |\n+------------+----------+-------+------------+\n\
    4 rows in set (0.000 sec)\n```\n\n```\nQuery OK, 0 rows affected (0.018 sec)\n\
    Records: 0  Duplicates: 0  Warnings: 0\n```\n\n```\n+----------+-------+------------+\n\
    | state    | reply | real_date  |\n+----------+-------+------------+\n| New York\
    \ | Yes   | 2021-09-15 |\n| New York | no    | 2021-10-16 |\n| Illinois | yes\
    \   | 2022-01-17 |\n| New York | No    | 2022-02-18 |\n+----------+-------+------------+\n\
    4 rows in set (0.000 sec)\n```\n\n## 从命令行进行数据清洗（可选）\n\n本节标记为“可选”，因为任务的解决方案需要理解一些基于\
    \ Unix 的工具。虽然本书不包含这些工具的详细信息，但你可以找到包含这些工具示例的在线教程。\n\n本节包含几个小节，执行涉及 `sed` 和 `awk`\
    \ 工具的数据清洗任务：\n\n-   用单个分隔符替换多个分隔符（sed）\n-   重构数据集，使所有行具有相同的列数（awk）\n\n请记住关于这些示例的一点：它们必须在命令行中执行，然后才能在\
    \ Pandas 数据框中进行处理。\n\n## 使用 sed 工具\n\n本节包含一个示例，说明如何使用 `sed` 命令行工具将文本文件中字段的不同分隔符替换为单个分隔符。你可以将相同的代码用于其他文件格式，例如\
    \ CSV 文件和 TSV 文件。\n\n本节除了代码示例外，不提供关于 `sed` 的任何详细信息。但是，在你阅读代码（只有一行）之后，你将了解如何调整该代码片段以满足你自己的要求（即，如何指定不同的分隔符）。\n\
    \n清单 5.5 显示了 `delimiter1.txt` 的内容，清单 5.6 显示了 `delimiter1.sh` 的内容，该脚本将所有分隔符替换为逗号（“,”）。\n\
    \n**清单 5.5：delimiter1.txt**\n\n```\n1000|Jane:Edwards^Sales\n2000|Tom:Smith^Development\n\
    3000|Dave:Del Ray^Marketing\n```\n\n**清单 5.6：delimiter1.sh**\n\n```bash\ncat delimiter1.txt\
    \ | sed -e 's/:/,/' -e 's/|/,/' -e 's/\\^/,/'\n```\n\n清单 5.6 以 `cat` 命令行工具开头，该工具将文件\
    \ `delimiter1.txt` 的内容发送到“标准输出”。但是，在此示例中，由于管道（“|”）符号，此命令的输出成为 sed 命令的输入。\n\n`sed`\
    \ 命令由三部分组成，所有部分都通过 `-e` 开关连接。你可以将 `-e` 视为表示 `sed` 命令“还有更多处理要做”。在此示例中，有三个 `-e`\
    \ 出现，这意味着 `sed` 命令将执行三个代码片段。\n\n第一个代码片段是 `'s/:/,/'`，它翻译为“将每个分号替换为逗号”。此操作的结果传递给下一个代码片段，即\
    \ `'s/|/,/'`。此代码片段翻译为“将每个管道符号替换为逗号”。此操作的结果传递给下一个代码片段，即 `'s/\\^/,/'`。此代码片段翻译为“将每个脱字符号（^）替换为逗号”。此操作的结果发送到标准输出，可以重定向到另一个文本文件。运行清单\
    \ 5.6 中的代码，你将看到以下输出：\n\n```\n1000,Jane,Edwards,Sales\n2000,Tom,Smith,Development\n\
    3000,Dave,Del Ray,Marketing\n```\n\n有三点需要注意。首先，该代码片段包含一个反斜杠，因为脱字符号（^）是一个元字符，所以我们需要“转义”这个字符。其他元字符（如“$”和“.”）也是如此。\n\
    \n其次，你可以轻松地扩展 `sed` 命令，以处理你在文本文件中遇到的每个新分隔符作为字段分隔符：只需遵循清单 5.6 中看到的模式，为每个新分隔符添加即可。\n\
    \n第三，通过运行以下命令，将 `delimiter1.sh` 的输出重定向到文本文件 `delimiter2.txt`：\n\n```bash\n./delimiter1.sh\
    \ > delimiter2.txt\n```\n\n如果前面的代码片段中发生错误，请确保 `delimiter1.sh` 是可执行的，方法是调用以下命令：\n\
    \n```bash\nchmod 755 delimiter1.sh\n```\n\n这结束了涉及 `sed` 命令行工具的示例，该工具是处理文本文件的强大工具。如果你想了解更多关于\
    \ `sed` 工具的信息，请在线查看文章和博客文章。\n\n## 处理可变列数\n\n本节向你展示如何使用 `awk` 命令行工具，以便用 `NaN` 值“填充”\
