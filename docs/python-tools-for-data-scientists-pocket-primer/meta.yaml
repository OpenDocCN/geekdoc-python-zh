    ```\n\n```\n=> Class labels: [0 1 2]\n```\n\nNow let's turn our attention to Seaborn,\
    \ which is a very nice data visualization package for Python.\n\n# Working with\
    \ Seaborn\n\nSeaborn is a Python library for data visualization that also provides\
    \ a high-level interface to Matplotlib. Seaborn is easier to work with than Matplotlib,\
    \ and actually extends Matplotlib, but Seaborn is not as powerful as Matplotlib.\n\
    \nSeaborn addresses two challenges of Matplotlib. The first involves the default\
    \ Matplotlib parameters. Seaborn works with different parameters, which provides\
    \ greater flexibility than the default rendering of Matplotlib plots. Seaborn\
    \ addresses the limitations of the Matplotlib default values for features such\
    \ as colors, tick marks on the upper and right axes, and the style (among others).\n\
    \nIn addition, Seaborn makes it easier to plot entire data frames (somewhat like\
    \ pandas) than doing so in Matplotlib. Nevertheless, since Seaborn extends Matplotlib,\
    \ knowledge of the latter is advantageous and will simplify your learning curve."
