    \ of the second parameter (the first parameter is `Hello.py`); otherwise, `name`\
    \ is assigned the value `Hello`. The `print()` statement then prints the value\
    \ of the variable `name`.\n\nThe final portion of Listing 1.14 uses conditional\
    \ logic to determine whether to execute the `main()` function.\n\n## Summary\n\
    \nThis chapter showed you how to work with numbers and perform arithmetic operations\
