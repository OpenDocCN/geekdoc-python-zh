- md: "## Managing Columns in Data Frames\n\nThis section contains various subsections\
    \ with short code blocks that illustrate how to perform column-based operations\
    \ on a data frame, which resemble the operations in a Python dictionary.\n\nFor\
    \ example, the following code snippet illustrates how to define a Pandas data\
    \ frame whose data values are from a Python dictionary:\n\n```python\ndf = pd.DataFrame.from_dict(dict([('A',[1,2,3]),\
    \ ('B',[4,5,6])]),\n           orient='index', columns=['one', 'two', 'three'])\n\
    print(df)\n```\n\nThe output from the preceding code snippet is here:\n\n```\n\
    \    one  two  three\nA    1    2      3\nB    4    5      6\n```\n\n## Switching\
    \ Columns\n\nThe following code snippet defines a Pandas data frame and then switches\
    \ the order of the columns:\n\n```python\ndf = pd.DataFrame.from_dict(dict([('A',[1,2,3]),('B',[4,5,6])]),\n\
    \           orient='index', columns=['one', 'two', 'three'])\n\nprint(\"initial\
    \ data frame:\")\nprint(df)\nprint()\n\nswitched = ['three','one','two']\ndf=df.reindex(columns=switched)\n\
    print(\"switched columns:\")\nprint(df)\nprint()\n```\n\nThe output from the preceding\
    \ code block is shown here:\n\n```\ninitial data frame:\n    one  two  three\n\
    A    1    2      3\nB    4    5      6\n\nswitched columns:\n   three  one  two\n\
    A      3    1    2\nB      6    4    5\n```\n\n## Appending Columns\n\nThe following\
    \ code snippet computes the product of two columns and appends the result as a\
    \ new column to the contents of the data frame df:\n\n```python\ndf['four'] =\
    \ df['one'] * df['two']\nprint(df)\n```\n\nThe output from the preceding code\
    \ block is as follows:\n\n```\n   one  two  three  four\nA    1    2      3  \
    \   2\nB    4    5      6    20\n```\n\nThe following operation squares the contents\
    \ of a column in the data frame df:\n\n```python\ndf['three'] = df['two'] * df['two']\n\
    print(df)\n```\n\nThe output from the preceding code block is here (notice the\
    \ numbers shown in bold):\n\n```\n    one  two  three  four\nA    1    2     \
    \ 4     2\nB    4    5     25    20\n```\n\nThe following operation appends a\
    \ new column called `flag` that contains `True` or `False`, based on whether the\
    \ numeric value in the “one” column is greater than 2:\n\n```python\nimport numpy\
    \ as np\nrand = np.random.randn(2)\ndf.insert(1, 'random', rand)\nprint(df)\n\
    ```\n\nThe output from the preceding code block is here:\n\n```\n    one    random\
    \  two  three  four  flag\nA    1  -1.703111    2      4     2  False\nB    4\
    \   1.139189    5     25    20   True\n```\n\n## Deleting Columns\n\nColumns can\
    \ be deleted, as shown in following code snippet that deletes the “two” column:\n\
    \n```python\ndel df['two']\nprint(df)\n```\n\nThe output from the preceding code\
    \ block is shown here:\n\n```\n    one    random  three  four  flag\nA    1  -0.460401\
    \      4     2  False\nB    4   1.211468     25    20   True\n```\n\nColumns can\
    \ be removed, as shown in following code snippet that deletes the “three” column:\n\
    \n```python\nthree = df.pop('three')\nprint(df)\n```\n\n```\n    one    random\
