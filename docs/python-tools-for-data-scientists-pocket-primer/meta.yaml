    # DATA CLEANING TASKS


    This chapter discusses data cleaning tasks involving datasets that contain various
    types of data, such as date formats, telephone numbers, and currency, all of which
    can have different formats. In addition, many of the code samples in this chapter
    reference techniques that are discussed in previous chapters of this book.


    The first part of this chapter briefly describes data cleaning, followed by examples
    of data cleaning tasks for data in MySQL database table. Specifically, you will
    see how to replace NULL values with 0, how to replace NULL values with an average
    value, how to replace multiple values with a single value, how to handle mismatched
    attribute values, and how to convert strings to date values.


    The second part of this chapter shows you how to use the `sed` command line utility
    to replace multiple delimiters in a CSV file with a single delimiter. You will
    also see how to use the `awk` command line utility to restructure a CSV file to
    create a file whose rows have the same number of fields.


    The third part of this chapter shows you how to use the `awk` command line utility
    to process CSV files that have a variable number of columns. The `awk` command
    is a self-contained programming language, with a truly impressive capability for
    processing text files. If you are unfamiliar with the `awk` command, please read
    the appendix that contains an assortment of code samples that use the `awk` utility.


    The fourth part of this chapter contains `awk`-based shell scripts that show you
    how to convert a list of phone numbers so that the phone numbers have the same
    format as well as a list of date formats that can be converted to a different
