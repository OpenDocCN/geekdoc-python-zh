    # Trimmed Mean and Weighted Mean


    In addition to the arithmetic mean, there are variants that are known as the weighted
    mean and a trimmed mean (also called a truncated mean).


    A *trimmed mean* is a robust estimate (i.e., a metric that is not sensitive to
    outliers). As a simple example of a trimmed mean, suppose that you have five scores
    for the evaluation of a product. Exclude the highest and lowest'
  - '[PAGE 72]


    scores and then compute the average of the remaining three scores. If you have
    multiple sets of five scores, repeat the preceding process and then compute the
    average of the set of trimmed mean values.


    A *weighted mean* is useful when sample data does not represent different groups
    in a dataset. Assigning a larger weight to groups that are under-represented yields
    a weighted mean that more accurately represents the various groups in the dataset.
    However, outliers can affect the mean as well as the weighted mean.


    The weighted mean is the same as the expected value. In case you are unfamiliar
    with the notion of an expected value, suppose that the set P = {p1, p2, ..., pn}
    is a probability distribution, which means that the numeric values in the set
    P must be non-negative and have a sum equal to 1. In addition, suppose that V
    = {v1, v2, ..., vn} is a set of numeric scores that are assigned to n features
    of a product M. The values in the set V are probably positive integers in some
    range (e.g., between 1 and 10).


    Then the *expected value* E for that product is computed as follows:

    E = p1*v1 + p2*v2 + ... + pn*vn


