    ## 前言


    ### 本书的主要价值主张是什么？


    本书包含对数据科学家可用的 Python 工具相关知识的快速介绍，这些内容是在本书篇幅内可以合理涵盖的尽可能多的信息。如果你是初学者，本书将为你提供一个起点，让你可以决定想要更深入探索哪些
    Python 技术。


    你将接触到 NumPy 和 Pandas 的特性、如何编写正则表达式以及如何执行数据清洗任务。有些主题的介绍比较简略，这主要有两个原因。首先，让你接触这些概念很重要。在某些情况下，你会发现一些可能引起你兴趣的主题，从而激励你通过自学了解更多；在其他情况下，你可能对简要介绍就感到满意。换句话说，由你决定是否深入探讨本书中的每个主题。


    其次，对本书涵盖的所有主题进行全面论述将显著增加其篇幅，而很少有人愿意阅读超过 500 页的技术巨著。


    *然而，重要的是你要判断这种方法是否适合你的需求和学习风格。如果不适合，你可以从大量可用的数据分析书籍中选择一本或多本。*


    ### 目标读者


    本书主要面向那些使用过 Python 并有兴趣了解几个重要 Python 库的读者。


    此外，本书也旨在面向具有高度多样化背景和不同年龄段的国际读者群体。因此，本书使用标准英语，而非可能让这些读者感到困惑的口语化表达。如你所知，许多人通过不同类型的模仿来学习，包括阅读、写作或听新材料。本书考虑了这些因素，为预期读者提供舒适且有意义的学习体验。


    ### 我将从本书中学到什么？


    第一章包含 Python 基础知识的快速概览，随后一章介绍 Python 数据结构。接下来，第 3 章介绍 NumPy，然后是关于 Pandas 的一章。第
    5 章提供了 Sklearn 的高级视图，这是一个极其强大的 Python 库，是许多机器学习任务的核心。


    第 6 章包含一系列通过 Python 以及 awk 编程语言解决的数据清洗任务。第 6 章深入探讨了使用 Matplotlib、Seaborn 和 Bokeh
    进行数据可视化。接下来，一个附录探讨了数据可能出现的问题，随后是关于 awk 的附录。


    ### 为什么本书包含一个关于 awk 的附录？


    虽然许多数据清洗任务可以通过 Python 完成，但有时使用 awk 执行数据清洗要容易得多。如果你没有使用过 awk，它是一个历史悠久的 Unix 工具，由
    Aho、Weinberger 和 Kernighan（后者是著名的 K&R C 语言书籍的合著者）在近 50 年前开发。


    顺便提一下，大多数 Python 代码示例都很短（通常不超过一页，有时甚至不到半页），如果需要，你可以轻松快速地将代码复制/粘贴到新的 Jupyter notebook
    中。对于引用 CSV 文件的 Python 代码示例，你不需要在相应的 Jupyter notebook 中添加任何额外代码来访问 CSV 文件。此外，代码示例执行速度快，因此你无需使用
    Google Colaboratory 提供的免费 GPU。


    如果你确实决定使用 Google Colaboratory，你可以轻松地将 Python 代码复制/粘贴到 notebook 中，也可以使用上传功能上传现有的
    Jupyter notebook。请记住以下一点：如果 Python 代码引用了 CSV 文件，请确保在 Google Colaboratory 中相应的
    Jupyter notebook 中包含适当的代码片段（如第 1 章所述）来访问该 CSV 文件。


    ### 我需要学习本书的理论部分吗？


    同样，答案取决于你计划参与数据分析的程度。例如，如果你计划学习机器学习，那么你可能需要学习如何创建和训练模型，这是在数据清洗任务之后执行的任务。通常，如果你计划成为一名机器学习工程师，你可能需要学习本书中遇到的所有内容。


    ### 为什么本书包含 Sklearn 材料？


    本书中的 Sklearn 材料很少，因为本书不是关于机器学习的。Sklearn 材料位于第 6 章，你将了解一些 Sklearn 内置数据集。如果你决定深入学习机器学习，你将已经接触过
    Sklearn 的某些方面。


    ### 充分利用本书


    有些程序员从散文中学习效果好，有些则从示例代码（以及大量代码）中学习效果好，这意味着没有一种单一的风格可以适用于所有人。


    此外，有些程序员想先运行代码，看看它的作用，然后再回到代码深入研究细节（而另一些人则使用相反的方法）。


    因此，本书中有各种类型的代码示例：有些很短，有些很长，还有一些代码示例是在早期代码示例的基础上“构建”的。


    ### 学习本书需要知道什么？


