    Then you learned some of the nuances of missing data, anomalies, and outliers,
    and techniques for handling these scenarios. You also learned about imbalanced
    data and evaluating the use of SMOTE to deal with imbalanced classes in a dataset.
    In addition, you learned about classifiers using two techniques, LIME and ANOVA.
    Finally, you learned about the bias-variance trade-off and various types of statistical
    bias.


    # APPENDIX B


    ## WORKING WITH AWK


    This chapter introduces you to the `awk` command, which is a highly versatile
    utility for manipulating data and restructuring datasets. In fact, this utility
    is so versatile that entire books have been written about the `awk` utility. Awk
    is essentially an entire programming language in a single command, which accepts
    standard input, gives standard output and uses regular expressions and metacharacters
    in the same way other Unix commands do. This lets you plug it into other expressions
    and do almost anything, at the cost of adding complexity to a command string that
    may already be doing quite a lot already. It is almost always worthwhile to add
    a comment when using awk because it is so versatile that it won''t be clear which
    of the many features you are using at a glance.


    The first part of this chapter provides a very brief introduction of the `awk`
    command. You will learn about some built-in variables for `awk`, and also how
    to manipulate string variables using `awk`. Note that some of these string-related
    examples can also be handled using other `bash` commands.


    The second part of this chapter shows you conditional logic, `while` loops, and
    `for` loops in `awk` to manipulate the rows and columns in datasets. This section
    shows you how to delete lines and merge lines in datasets, as well as how to print
    the contents of a file as a single line of text. You will see how to "join" lines
    and groups of lines in datasets.


    The third section contains code samples that involve metacharacters (introduced
    in Chapter 1) and character sets in `awk` commands. You will also see how to use
    conditional logic in `awk` commands to determine whether to print a line of text.


    The fourth section illustrates how to “split” a text string that contains multiple
    “.” characters as a delimiter, followed by examples of `awk` to perform numeric
    calculations (such as addition, subtraction, multiplication, and division) in
    files containing numeric data. This section also shows you various numeric functions
    that are available in `awk`, and also how to print text in a fixed set of columns.


    The fifth section explains how to align columns in a dataset and how to align
    and merge columns in a dataset. You will see how to delete columns, how to select
    a subset of columns from a dataset, and how to work with multi-line records in
    datasets. This section contains some one-line `awk` commands that can be useful
    for manipulating the contents of datasets.


    The final section of this chapter has a pair of use cases involving nested quotes
    and date formats in structured data sets.


    ## The awk Command


    The `awk` (Aho, Weinberger, and Kernighan) command has a C-like syntax and you
    can use this utility to perform very complex operations on numbers and text strings.


    As a side comment, there is also the `gawk` command that is GNU `awk`, as well
    as the `nawk` command, which is “new” `awk` (neither command is discussed in this
    book). One advantage of `nawk` is that it allows you to externally set the value
    of an internal variable.


    ## Built-in Variables that Control awk


    The `awk` command provides variables that you can change from their default values
    to control how `awk` performs operations. Examples of such variables (and their
    default values) include `FS` (" "), `RS` ("\n"), `OFS` (" "), `ORS` ("\n"), `SUBSEP`,
    and `IGNORECASE`. The variables `FS` and `RS` specify the field separator and
    record separator, respectively, whereas the variables `OFS` and `ORS` specify
    the output field separator and the output record separator, respectively.


    Field separators serve the same purpose as delimiters in CSV or TSV files. The
    record separators behave in a way similar to how `sed` treats individual lines;
    for example, `sed` can match or delete a range of lines instead of matching or
    deleting something that matches a regular expression. (The default `awk` record
    separator is the newline character, so by default, `awk` and `sed` have a similar
    ability to manipulate and reference lines in a text file.)


    As a simple example, you can print a blank line after each line of a file by changing
    the `ORS`, from the default of one newline to two newlines, as shown here:


    ```

    cat columns.txt | awk ''BEGIN { ORS ="\n\n" } ; { print $0 }''

    ```


    Other built-in variables include `FILENAME` (the name of the file that `awk` is
    currently reading), `FNR` (the current record number in the current file), `NF`
    (the number of fields in the current input record), and `NR` (the number of input
    records `awk` has processed since the beginning of the program''s execution).


    Consult the online documentation for additional information regarding these (and
    other) arguments for the `awk` command.


    ## How Does the awk Command Work?


    The `awk` command reads the input files one record at a time (by default, one
    record is one line). If a record matches a pattern, then an action is performed
    (otherwise, no action is performed). If the search pattern is not given, then
    `awk` performs the given actions for each record of the input. The default behavior
    if no action is given is to print all the records that match the given pattern.
    Finally, empty braces without any action does nothing; i.e., it will not perform
    the default printing operation. Note that each statement in actions should be
    delimited by a semicolon.


    To make the preceding paragraph more understandable, here are some simple examples
    involving text strings and the `awk` command (the results are displayed after
    each code snippet). The `-F` switch sets the field separator to whatever follows
    it (in this case, a space). Switches will often provide a shortcut to an action
    that normally needs a command inside a `BEGIN{}` block (shown later):


    ```

    x="a b c d e"

    echo $x |awk -F" " ''{print $1}''

    a

    echo $x |awk -F" " ''{print NF}''

    5

    echo $x |awk -F" " ''{print $0}''

    a b c d e

    echo $x |awk -F" " ''{print $3, $1}''

    c a

    ```'
