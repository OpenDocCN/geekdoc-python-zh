  md: '# Data Cleaning from the Command Line (optional)


    This section is marked “optional” because the solutions to tasks involve an understanding
    of some Unix-based utilities. Although this book does not contain details about
    those utilities, you can find online tutorials with examples regarding these utilities.


    This section contains several subsections that perform data cleaning tasks that
    involve the `sed` and `awk` utilities:


    +   - replace multiple delimiters with a single delimiter (sed)

    - restructure a dataset so all rows have the same column count (awk)


    Keep in mind the following point about these examples: they must be performed
    from the command line before they can be processed in a Pandas data frame.


    # Working with the sed Utility


    This section contains an example of how to use the `sed` command line utility
    to replace different delimiters with a single delimiter for the fields in a text
    file. You can use the same code for other file formats, such as CSV files and
    TSV files.


    This section does not provide any details about `sed` beyond the code sample.
    However, after you read the code (it’s only one line), you will understand how
    to adapt that code snippet to your own requirements (i.e., how to specify different
    delimiters).


    Listing 5.5 displays the content of `delimiter1.txt` and Listing 5.6 displays
    the content of `delimiter1.sh` that replaces all delimiters with a comma (“,”).


    **Listing 5.5: delimiter1.txt**


    ```

    1000|Jane:Edwards^Sales

    2000|Tom:Smith^Development

    3000|Dave:Del Ray^Marketing

    ```


    **Listing 5.6: delimiter1.sh**


    ```

    cat delimiter1.txt | sed -e ''s/:/,/'' -e ''s/|/,/'' -e ''s/\^/,/''

    ```


    Listing 5.6 starts with the `cat` command line utility, which sends the contents
    of the file `delimiter1.txt` to “standard output.” However, in this'
