    Mark-Aster,,Oct\nJane-Jones,NaN,Jun\n```\n\n**Listing 3.14: emp_merge_split.py**\n\
    \n```python\nimport pandas as pd\n\nemps = pd.read_csv(\"employees.csv\")\nprint(\"\
    emps:\")\nprint(emps)\nprint()\n\nemps['year']  = emps['year'].astype(str)\nemps['month']\
    \ = emps['month'].astype(str)\n\n# separate column for first name and for last\
    \ name:\nemps['fname'],emps['lname'] = emps['name'].str.split(\"-\",1).str\n\n\
    # concatenate year and month with a \"#\" symbol:\nemps['hdate1'] = emps['year'].astype(str)+\"\
    #\"+emps['month'].astype(str)\n\n# concatenate year and month with a \"-\" symbol:\n\
    emps['hdate2'] = emps[['year','month']].agg('-'.join, axis=1)\n\nprint(emps)\n\
    print()\n```\n\nListing 3.14 initializes the data frame `df` with the contents\
