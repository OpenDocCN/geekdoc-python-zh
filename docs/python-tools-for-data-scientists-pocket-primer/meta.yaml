    Another well-known technique is called SMOTE, which involves data augmentation
    (i.e., synthesizing new data samples) well before you use a classification algorithm.
    SMOTE was initially developed by means of the kNN algorithm (other options are
    available), and it can be an effective technique for handling imbalanced classes.


    Yet another option to consider is the Python package `imbalanced-learn` in the
    `scikit-learn-contrib` project. This project provides various re-sampling techniques
    for datasets that exhibit class imbalance. More details are available online:


    https://github.com/scikit-learn-contrib/imbalanced-learn.


    # What is SMOTE?


    SMOTE is a technique for synthesizing new samples for a dataset. This technique
    is based on linear interpolation:


    +   - Step 1: Select samples that are close in the feature space.

    - Step 2: Draw a line between the samples in the feature space.

    - Step 3: Draw a new sample at a point along that line.


    A more detailed explanation of the SMOTE algorithm is here:


    +   - Select a random sample “a” from the minority class.

    - Find k nearest neighbors for that example.

    - Select a random neighbor “b” from the nearest neighbors.

    - Create a line L that connects “a” and “b.”

    - Randomly select one or more points “c” on line L.


    If need be, you can repeat this process for the other (k–1) nearest neighbors
    to distribute the synthetic values more evenly among the nearest neighbors.


    # SMOTE Extensions


    The initial SMOTE algorithm is based on the kNN classification algorithm, which
    has been extended in various ways, such as replacing kNN with SVM. A list of SMOTE
    extensions is shown as follows:


    +   - selective synthetic sample generation

    - Borderline-SMOTE (kNN)

    - Borderline-SMOTE (SVM)

    - Adaptive Synthetic Sampling (ADASYN)'
