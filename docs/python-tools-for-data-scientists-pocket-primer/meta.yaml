    1. 对输入值的实际更改是特定于模型的。

    2. 该技术适用于可解释的输入。


    可解释输入的例子包括机器学习分类器（如决策树和随机森林）以及NLP技术，如BoW（词袋模型）。不可解释的输入涉及“密集”数据，例如词嵌入（它是一个浮点数向量）。


