- md: '## What is SMOTE?


    SMOTE is a technique for synthesizing new samples for a dataset. This technique
    is based on linear interpolation:


    - Step 1: Select samples that are close in the feature space.

    - Step 2: Draw a line between the samples in the feature space.

    - Step 3: Draw a new sample at a point along that line.


    A more detailed explanation of the SMOTE algorithm is here:


    - Select a random sample “a” from the minority class.

    - Find k nearest neighbors for that example.

    - Select a random neighbor “b” from the nearest neighbors.

    - Create a line L that connects “a” and “b.”

    - Randomly select one or more points “c” on line L.


    If need be, you can repeat this process for the other (k–1) nearest neighbors
    to distribute the synthetic values more evenly among the nearest neighbors.


    ## SMOTE Extensions


    The initial SMOTE algorithm is based on the kNN classification algorithm, which
    has been extended in various ways, such as replacing kNN with SVM. A list of SMOTE
    extensions is shown as follows:


    - selective synthetic sample generation

    - Borderline-SMOTE (kNN)

    - Borderline-SMOTE (SVM)

    - Adaptive Synthetic Sampling (ADASYN)


    More information can be found online:

    https://en.wikipedia.org/wiki/Oversampling_and_undersampling_in_data_analysis.


    ## Analyzing Classifiers (Optional)


    This section is marked optional because its contents pertain to machine learning
    classifiers, which are not the focus of this book. However, it''s still worthwhile
    to glance through the material, or perhaps return to this section after you have
    a basic understanding of machine learning classifiers.


    Several well-known techniques are available for analyzing the quality of machine
    learning classifiers. Two techniques are LIME and ANOVA, both of which are discussed
    in the following subsections.


    ## What is LIME?


    LIME is an acronym for Local Interpretable Model-Agnostic Explanations. LIME is
    a model-agnostic technique that can be used with machine learning models. The
    methodology of this technique is straightforward: make small random changes to
    data samples and then observe the manner in which predictions change (or not).
    The approach involves changing the output (slightly) and then observing what happens
    to the output.


    By way of analogy, consider food inspectors who test for bacteria in truckloads
    of perishable food. Clearly, it''s infeasible to test every food item in a truck
    (or a train car), so inspectors perform "spot checks" that involve testing randomly
    selected items. In an analogous fashion, LIME makes small changes to input data
    in random locations and then analyzes the changes in the associated output values.


    However, there are two caveats to keep in mind when you use LIME with input data
    for a given model:


    1. The actual changes to input values are model-specific.

    2. This technique works on input that is interpretable.


    Examples of interpretable input include machine learning classifiers (such as
    trees and random forests) and NLP techniques such as BoW (Bag of Words). Non-interpretable
    input involves "dense" data, such as a word embedding (which is a vector of floating
    point numbers).


    You could also substitute your model with another model that involves interpretable
    data, but then you need to evaluate how accurate the approximation is to the original
    model.


    ## What is ANOVA?


    ANOVA is an acronym for *analysis of variance*, which attempts to analyze the
    differences among the mean values of a sample that''s taken from a population.
    ANOVA enables you to test if multiple mean values are equal. More importantly,
    ANOVA can assist in reducing Type I (false positive) errors and Type II errors
    (false negative) errors. For example, suppose that person A is diagnosed with
    cancer and person B is diagnosed as healthy, and that both diagnoses are incorrect.
    Then the result for person A is a false positive whereas the result for person
    B is a false negative. In general, a test result of false positive is *much* preferable
    to a test result of false negative.


    ANOVA pertains to the design of experiments and hypothesis testing, which can
    produce meaningful results in various situations. For example, suppose that a
    dataset contains a feature that can be partitioned into several "reasonably" homogenous
    groups. Next, analyze the variance in each group and perform comparisons with
    the goal of determining different sources of variance for the values of a given
    feature. More information about ANOVA is available online:


    https://en.wikipedia.org/wiki/Analysis_of_variance.


    ## The Bias-Variance Trade-Off


    This section is presented from the viewpoint of machine learning, but the concepts
    of bias and variance are highly relevant outside of machine learning, so it''s
    probably still worthwhile to read this section as well as the previous section.


    *Bias* in machine learning can be due to an error from wrong assumptions in a
    learning algorithm. High bias might cause an algorithm to miss relevant relations
    between features and target outputs (underfitting). Prediction bias can occur
    because of "noisy" data, an incomplete feature set, or a biased training sample.


    Error due to bias is the difference between the expected (or average) prediction
    of your model and the correct value that you want to predict. Repeat the model
    building process multiple times, gather new data each time, and perform an analysis
    to produce a new model. The resulting models have a range of predictions because
    the underlying datasets have a degree of randomness. Bias measures the extent
    to which the predictions for these models deviate from the correct value.


    *Variance* in machine learning is the expected value of the squared deviation
    from the mean. High variance can/might cause an algorithm to model the random
    noise in the training data, rather than the intended outputs (known as *overfitting*).
    Moreover, adding parameters to a model increases its complexity, increases the
    variance, and decreases the bias.


    > *The point to remember is that dealing with bias and variance involves dealing
    with underfitting and overfitting.*


    Error due to variance is the variability of a model prediction for a given data
    point. As before, repeat the entire model building process, and the variance is
    the extent to which predictions for a given point vary among different “instances”
    of the model.


    If you have worked with datasets and performed data analysis, you already know
    that finding well-balanced samples can be difficult or highly impractical. Moreover,
    performing an analysis of the data in a dataset is vitally important, yet there
    is no guarantee that you can produce a dataset that is 100% “clean.”


    *A biased statistic* is a statistic that is systematically different from the
    entity in the population that is being estimated. In more casual terminology,
    if a data sample “favors” or “leans” toward one aspect of the population, then
    the sample has bias. For example, if you prefer movies that are comedies more
    so than any other type of movie, then clearly you are more likely to select a
    comedy instead of a dramatic movie or a science fiction movie. Thus, a frequency
    graph of the movie types in a sample of your movie selections will be more closely
    clustered around comedies.


    However, if you have a wide-ranging set of preferences for movies, then the corresponding
    frequency graph will be more varied, and therefore have a larger spread of values.


    As a simple example, suppose that you are given an assignment that involves writing
