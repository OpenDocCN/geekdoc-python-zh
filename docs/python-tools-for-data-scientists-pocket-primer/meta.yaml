    # Selecting Columns for X and y


    Selecting the correct set of columns for X and y can be difficult for datasets
    that contain many columns.


    You must decide which subset of columns of the dataset will belong to X and which
    column is designated as the y column (i.e., the target or label column).


    If you have a dataset with only four or five columns, it''s probably simple to
    determine which columns will be assigned to X and which column is designated as
    y. However, if you select a set of columns from a dataset that contains a large
    number of columns, how can you be certain that


    +   - important categorical columns are included

    - all of the included columns are required

    - the chosen columns are the best columns


    The answer to the first bullet item was discussed in Chapter 3, where you learned
    how to use the Pandas map() function to convert a categorical column into a numeric
    column, as shown here:


    ```

    # map ham/spam to 0/1 values:

    df[''type''] = df[''type''].map( {''ham'':0 , ''spam'':1} )

    ```


    If you have a gender column with the values M and F, you can modify the preceding
    code snippet, as shown here:


    ```

    # map male/female to 0/1 values:

    df[''gender''] = df[''gender''].map( {''male'':0, ''female'':1} )

    ```


    The second and third bullet items are partially addressed in the following section
    that discusses feature selection and feature extraction, which are two facets
    of feature engineering.


    # What is Feature Engineering?


    Feature engineering is an umbrella term that includes several techniques for determining
    the columns for populating the set X.


    Feature selection involves selecting a subset of columns from a dataset, which
    is the technique that was discussed earlier in this chapter.


    Feature extraction involves finding a linear combination of the columns in a dataset.
    For example, PCA (Principal Component Analysis) is one'
