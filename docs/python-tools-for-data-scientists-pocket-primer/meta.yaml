    \ left-padded with 0, because some countries have a two-digit prefix and other\
    \ countries have a three-digit prefix.\n\n**Listing 5.23: country_codes.csv**\n\
    \n```\n001,usa\n033,france\n034,spain\n039,italy\n044,uk\n049,germany\n052,mexico\n\
    081,Japan\n```\n\nListing 5.24 displays the content of `add_country_codes.sh`\
    \ that illustrates how to increment the three-digit international prefix for a\
    \ set of countries. Note that you won't need this code sample beyond this section:\
    \ it's included here to show you how easily you can manipulate the numeric values\
    \ in a CSV file with the `awk` utility. If need be, you can easily adapt this\
    \ code to work with other CSV files.\n\n**Listing 5.24: add_country_codes.sh**\n\
    \n```\nFILE=\"country_codes.csv\"\n\necho \"=> display code and country:\"\nawk\
    \ -F\",\" '\nBEGIN { code = 10000; incr = 10000 }\n{\n    printf(\"%s,%s,%d\\\
    n\", $1, $2, code)\n    code += incr\n}\n' < $FILE\necho \"-------------------\"\
    \necho\n\necho \"=> increment country code:\"\nawk -F\",\" '\nBEGIN { code = 1000;\
    \ incr = 1000 }\n{\n    printf(\"%d,%s\\n\", $1 + code, $2)\n    code += incr\n\
    }\n' < $FILE\n```\n\nListing 5.24 initializes the variable `FILE` with the name\
    \ of the CSV file that contains country codes and abbreviations for several countries.\
    \ Next, an `awk` script contains a `BEGIN` section with a loop that adds 10000\
    \ to each country code. For example, the following two code snippets display the\
    \ “before” and “after” contents of an input line:\n\n```\n001,usa,10000\n1001,usa\n\
    ```\n\nLaunch the code in Listing 5.24 and you will see the following output:\n\
    \n```\n=> display code and country:\n001,usa,10000\n033,france,20000\n034,spain,30000\n\
    039,italy,40000\n044,uk,50000\n049,germany,60000\n052,mexico,70000\n081,japan,80000\n\
    ------------------\n\n=> increment country code:\n1001,usa\n2033,france\n3034,spain\n\
    4039,italy\n5044,uk\n6049,germany\n7052,mexico\n8081,Japan\n```\n\nListing 5.25\
    \ displays the content of `countries_cities.csv` in which each row consists of\
    \ a country and a list of cities in that country.\n\n**Listing 5.25: countries_cities.csv**\n\
    \n```\nitaly,firenze,milano,roma,venezia\nfrance,antibe,nice,paris,st_jeannet\n\
    germany,berlin,frankfurt\nspain,barcelona,madrid\nengland,liverpool,london,manchester\n\
    mexico,mexico_city,tijuana\n```\n\nListing 5.26 displays the content of `split_countries_cities.sh`\
    \ that illustrates how to display a list of cities that belong to each country\
    \ in `countries_cities.csv`.\n\n**Listing 5.26: split_countries_cities.sh**\n\n\
    ```\nFILE=\"countries_cities.csv\"\n\nawk -F\",\" '\n{\n    printf(\"=> CITIES\
    \ in %s:\\n\",$1)\n    for(i=2; i<=NF; i++) {\n        printf(\"%s\\n\", $i)\n\
    \    }\n}\n' < $FILE\n```\n\nListing 5.26 initializes the variable `FILE` with\
    \ the name of the CSV file that contains country codes and abbreviations for several\
    \ countries. Next, an `awk` script contains a loop that adds displays the abbreviation\
    \ of each city that is listed in the CSV file `countries_cities.csv`. Launch the\
    \ code in Listing 5.26 and you will see the following output:\n\n```\n=> CITIES\
    \ in italy:\nfirenze\nmilano\nroma\nvenezia\n=> CITIES in france:\nantibe\nnice\n\
    paris\nst_jeannet\n=> CITIES in germany:\nberlin\nfrankfurt\n=> CITIES in spain:\n\
    barcelona\nmadrid\n=> CITIES in england:\nliverpool\nlondon\nmanchester\n=> CITIES\
    \ in mexico:\nmexico_city\ntijuana\n```\n\nListing 5.27 displays the content of\
    \ `countries_cities2.csv` in which each row consists of a country and a list of\
    \ cities in that country.\n\n**Listing 5.27: countries_cities2.csv**\n\n```\n\
    italy,firenze,milano,roma,venezia\nfrance,antibe,nice,paris,st_jeannet\ngermany,berlin,frankfurt\n\
    spain,barcelona,madrid\nengland,liverpool,london,manchester\nmexico,mexico_city,tijuana\n\
    usa,chicago,illinois,denver,colorado,seattle,washington,\n    vancouver,washington\n\
    can,vancouver,bc,edmonton,calgary,hamilton,Ontario\n```\n\nListing 5.28 displays\
    \ the content of `split_countries_cities2.sh` that illustrates how to display\
    \ a list of cities that belong to each country in `countries_cities2.csv`.\n\n\
    **Listing 5.28: split_countries_cities2.sh**\n\n```\nFILE=\"countries_cities2.csv\"\
    \n\nawk -F\",\" '\nBEGIN { incr = 1000 }\n{\n    if( $1 !~ /#/ ) {\n        printf(\"\
    => CITIES in %s:\\n\",$1)\n        for(i=2; i<=NF; i++) {\n            printf(\"\
    %s\\n\", $i)\n        }\n        print(\"-------------\\n\")\n    } else {\n \
    \       #printf(\"=> CITIES in %s:\\n\",$1)\n        printf(\"=> CITIES in %s:\\\
    n\",substr($1,2))\n        for(i=2; i<=NF; i+=2) {\n            printf(\"%s,%s\\\
    n\", $i,$(i+1))\n        }\n        print(\"-------------\\n\")\n    }\n}\n' <\
    \ $FILE\n```\n\nListing 5.28 initializes the variable `FILE` with the name of\
    \ the CSV file that contains country codes and abbreviations for several countries.\
    \ Note that this CSV file differs from a similar CSV file with countries and country\
    \ codes. Specifically, this CSV file contains rows that have either city/province\
    \ pairs (Canada) or city/state pairs (USA).\n\nNext, an `awk` script contains\
    \ a `BEGIN` section with conditional logic and two blocks of code. The first block\
    \ of code is for rows that start with a “#” symbol, which indicates that the row\
    \ contains either city/province pairs (Canada) or city/state pairs (USA). An example\
    \ of such a row is here:\n\n```\n#usa,chicago,illinois,denver,colorado,seattle,washington,\n\
    vancouver,washington\n```\n\nNote that the use of a “#” symbol is simply a convenient\
    \ way to differentiate these rows from the rows in the second code block. One\
    \ alternative is to specify one CSV file for the rows that are processed in this\
    \ code block and a different CSV file for the rows that are processed in the second\
    \ code block.\n\nListing 5.28 shows that the first field $1 of such rows contains\
    \ the abbreviation of a country, and subsequent pairs contain the location of\
    \ a city in the associated country. For example, $2 and $3 consist of a city/province\
    \ pair or a city/state pair, and this is similar for $4 and $5, for $6 and $7,\
    \ and so forth.\n\nThe second block of code processes rows whose countries do\
    \ not have a province or state designation for each city. An example of such a\
    \ row is here:\n\n```\nitaly,firenze,milano,roma,Venezia\n```\n\nThe code in this\
    \ block processes each column sequentially and displays all of them on separate\
    \ output lines. Launch the code in Listing 5.28 and you will see the following\
    \ output:\n\n```\n=> CITIES in italy:\nfirenze\nmilano\nroma\nvenezia\n--------------\n\
    \n=> CITIES in france:\nantibe\nnice\nparis\nst_jeannet\n--------------\n\n=>\
    \ CITIES in germany:\nberlin\nfrankfurt\n--------------\n\n=> CITIES in spain:\n\
    barcelona\nmadrid\n--------------\n\n=> CITIES in england:\nliverpool\nlondon\n\
    manchester\n--------------\n\n=> CITIES in mexico:\nmexico_city\ntijuana\n--------------\n\
    \n=> CITIES in usa:\nchicago,illinois\ndenver,colorado\nseattle,washington\nvancouver,washington\n\
    --------------\n\n=> CITIES in can:\nvancouver,bc\nedmonton,calgary\nhamilton,Ontario\n\
    --------------\n```\n\nThe companion files contain `date-times-padded2.sh`, which\
    \ enhances `date-times-padded.sh` to provide addition information, as shown here:\n\
    \n```\nINVALID DATES:\n8/19/24 115:05:44\n2/30/2020 15:05:44\n4/29/23 15:5:4\n\
