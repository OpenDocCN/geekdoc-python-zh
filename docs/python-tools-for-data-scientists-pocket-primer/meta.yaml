    \ requires handling exceptions, and how to process command-line arguments for\
    \ Python files.\n\n# CHAPTER 2\n\n## INTRODUCTION TO NUMPY\n\nThis chapter provides\
    \ a quick introduction to the Python NumPy library, which provides a useful functionality,\
    \ not only for “regular” Python scripts, but also for Python-based scripts with\
    \ TensorFlow. For instance, this chapter contains NumPy code samples containing\
    \ loops, arrays, and lists. We also discuss dot products, the `reshape()` method,\
    \ how to plot with Matplotlib (discussed in more detail in Chapter 6), and examples\
    \ of linear regression.\n\nThe first part of this chapter briefly discusses NumPy\
    \ and some of its useful features. The second part contains examples of working\
    \ arrays in NumPy, and contrasts some of the APIs for lists with the same APIs\
    \ for arrays. In addition, we show how to compute the exponent-related values\
    \ (such as the square or cube) of elements in an array.\n\nThe second part of\
    \ the chapter introduces sub-ranges, which are useful (and frequently used) for\
    \ extracting portions of datasets in machine learning tasks. Some of the code\
    \ samples handle negative (-1) sub-ranges for vectors as well as for arrays because\
    \ they are interpreted one way for vectors and a different way for arrays.\n\n\
    The third part of this chapter delves into other NumPy methods, including the\
