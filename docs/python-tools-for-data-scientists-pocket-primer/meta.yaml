    # What is Imbalanced Classification?


    Imbalanced classification involves datasets with imbalanced classes. For example,
    suppose that class A has 99% of the data and class B has 1%. Which classification
    algorithm would you use? Unfortunately, classification algorithms don''t work
    well with this type of imbalanced dataset. Here is a list of several well-known
    techniques for handling imbalanced datasets:


    +   - Random resampling rebalances the class distribution.

    - Random oversampling duplicates data in the minority class.

    - Random undersampling deletes examples from the majority class.

    - SMOTE


    *Random resampling* transforms the training dataset into a new dataset, which
    is effective for imbalanced classification problems.


    The *random undersampling* technique removes samples from the dataset, and involves
    the following:


    +   - randomly remove samples from the majority class

    - can be performed with or without replacement

    - alleviates imbalance in the dataset

    - may increase the variance of the classifier

    - may discard useful or important samples


    However, random undersampling does not work well with a dataset that has a 99%/1%
    split into two classes. Moreover, undersampling can result in losing information
    that is useful for a model.


    Instead of random undersampling, another approach involves generating new samples
    from a minority class. The first technique involves oversampling examples in the
    minority class and duplicate examples from the minority class.


    There is another technique that is better than the preceding technique, which
    involves the following:


    +   - synthesizing new examples from a minority class

    - a type of data augmentation for tabular data

    - generating new samples from a minority class'
