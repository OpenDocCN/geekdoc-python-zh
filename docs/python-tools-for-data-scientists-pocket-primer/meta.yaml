    \ axis='both', linestyle='-', color='k',\n        linewidth=2)\nax.set_xticks(np.arange(-.5,\
    \ 10, 1));\nax.set_yticks(np.arange(-.5, 10, 1));\n\nplt.show()\n```\n\n清单 6.2\
