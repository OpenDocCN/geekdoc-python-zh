    => iris feature names:\")\nfor feature in iris.feature_names:\n    print(feature)\n\
    print()\n\nX = iris.data[:, [2, 3]]\ny = iris.target\nprint('=> Class labels:',\
    \ np.unique(y))\nprint()\n\nprint(\"=> target:\")\nprint(iris.target)\nprint()\n\
    \nprint(\"=> all data:\")\nprint(iris.data)\n```\n\n清单 4.4 包含几个 import 语句，然后用\
