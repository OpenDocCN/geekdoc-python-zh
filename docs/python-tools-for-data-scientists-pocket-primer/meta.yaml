    # What is Method Chaining?


    Method chaining refers to combining method invocations without intermediate code.
    Method chaining is available in many languages, including Java, Scala, and JavaScript.
    Code that uses method chaining tends to be more compact, more performant, and
    easier to understand than other types of code. However, debugging such code can
    be difficult, especially in long method chains.


    As a general rule, start by invoking a sequence of methods, and after ensuring
    that the code is correct, construct method chains with, at most, five'
