    \ array_norm.py**\n\n```\nimport numpy as np\n\na = np.array([2,3])\nasquare =\
    \ np.square(a)\nasqsum = np.sum(np.square(a))\nanorm1 = np.sqrt(np.sum(a*a))\n\
    anorm2 = np.sqrt(np.sum(np.square(a)))\nanorm3 = np.linalg.norm(a)\n\nprint('a:\
    \       ',a)\nprint('asquare:',asquare)\nprint('asqsum: ',asqsum)\nprint('anorm1:\
    \ ',anorm1)\nprint('anorm2: ',anorm2)\nprint('anorm3: ',anorm3)\n```\n\nListing\
    \ 2.15 contains an initial NumPy array called a, followed by the array asquare\
    \ and the numeric values asqsum, anorm1, anorm2, and anorm3. The array asquare\
    \ contains the square of the elements in the array a, and the numeric value asqsum\
