  md: "# Lines, Indentations, and Multi-Lines\n\nUnlike other programming languages\
    \ (such as Java or Objective-C), Python uses indentations instead of curly braces\
    \ for code blocks. Indentation must be consistent in a code block, as shown here:\n\
    \n```\nif True:\n    print(\"ABC\")\n    print(\"DEF\")\nelse:\n    print(\"ABC\"\
    )\n    print(\"DEF\")\n```\n\nMulti-line statements can terminate with a new line\
    \ or the backslash (\\) character, as shown here:\n\n```\ntotal = x1 + \\n   \
    \     x2 + \\n        x3\n```\n\nYou can place x1, x2, and x3 on the same line,\
    \ so there is no reason to use three separate lines; however, this functionality\
    \ is available in case you need to add a set of variables that do not fit on a\
    \ single line.\n\nYou can specify multiple statements in one line by using a semicolon\
    \ (;) to separate each statement, as shown here:\n\n```\na=10; b=5; print(a);\
    \ print(a+b)\n```\n\nThe output of the preceding code snippet is as follows:\n\
    \n```\n10\n15\n```\n\n> The use of semi-colons and the continuation character\
    \ are discouraged in Python.\n\n# Quotation and Comments in Python\n\nPython allows\
    \ single ('), double (\") and triple (''' or \"\"\") quotes for string literals,\
    \ provided that they match at the beginning and the end of the string. You can\
    \ use triple quotes for strings that span multiple lines. The following examples\
    \ are legal Python strings:\n\n```\nword = 'word'\nline = \"This is a sentence.\"\
    \n```"
