  md: "A blank line in Python is a line containing only whitespace, a comment, or\
    \ both.\n\n# Saving Your Code in a Module\n\nEarlier, you saw how to launch the\
    \ interpreter from the command line and then enter commands. However, everything\
    \ you type into the interpreter is only valid for the current session. If you\
    \ exit the interpreter and then launch the interpreter again, your previous definitions\
    \ are no longer valid. Fortunately, Python enables you to store code in a text\
    \ file.\n\nA *module* is a text file that contains Python statements. In the previous\
    \ section, you saw how the interpreter enables you to test code snippets whose\
    \ definitions are valid for the current session. If you want to retain the code\
    \ snippets and other definitions, place them in a text file so that you can execute\
    \ that code outside of the interpreter.\n\nThe outermost statements are executed\
    \ from top to bottom when the module is imported for the first time, which will\
    \ then set up its variables and functions.\n\nA module can be run directly from\
    \ the command line, as shown here:\n\n```\npython First.py\n```\n\nAs an illustration,\
    \ place the following two statements in a text file called `First.py`:\n\n```\n\
    x = 3\nprint(x)\n```\n\nType the following command:\n\n```\npython First.py\n\
    ```\n\nThe output from the preceding command is 3, which is the same as executing\
    \ the preceding code from the interpreter.\n\nWhen a module is run directly, the\
    \ special variable `__name__` is set to `__main__`. You will often see the following\
    \ type of code in a module:\n\n```\nif __name__ == '__main__':\n    # do something\
    \ here\n    print('Running directly')\n```\n\nThe preceding code snippet enables\
    \ Python to determine if a module was launched from the command line or imported\
    \ into another module."
