    ## Mapping Categorical Data to Numeric Values


    Character data is often called *categorical data*, examples of which include people’s
    names, home or work addresses, and email addresses. Many types of categorical
    data involve short lists of values. For example, the days of the week and the
    months in a year involve seven and twelve distinct values, respectively. Notice
    that the days of the week have a relationship: each day has a previous day and
    a next day, and similarly for the months of a year.


    However, the colors of an automobile are independent of each other. The color
    red is not “better” or “worse” than the color blue. Cars of a certain color can
    have a statistically higher number of accidents, but we won’t address that issue
    here.


    There are several well-known techniques for mapping categorical values to a set
    of numeric values. A simple example where you need to perform this conversion
    involves the gender feature in the Titanic dataset. This feature is one of the
    relevant features for training a machine learning model. The gender feature has
    {M, F} as its set of possible values. As you will see later in this appendix,
    Pandas makes it very easy to convert the set of values {M,F} to the set of values
    {0,1}.


    Another mapping technique involves mapping a set of categorical values to a set
    of consecutive integer values. For example, the set {Red, Green, Blue} can be
    mapped to the set of integers {0,1,2}. The set {Male, Female} can be mapped to
    the set of integers {0,1}. The days of the week can be mapped to {0,1,2,3,4,5,6}.
    Note that the first day of the week depends on the country (in some cases it''s
    Sunday, and in other cases it''s Monday).


    Another technique is called *one-hot encoding*, which converts each value to a
    *vector*. Thus, {Male, Female} can be represented by the vectors [1, 0] and [0,
    1], and the colors {Red, Green, Blue} can be represented by the vectors [1, 0,
    0], [0, 1, 0], and [0, 0, 1]. If you vertically "line up" the two vectors for
    gender, they form a 2x2 identity matrix, and doing the same for the colors will
    form a 3x3 identity matrix, as shown here:


    ```

    [1, 0, 0]

    [0, 1, 0]

    [0, 0, 1]

    ```


    If you are familiar with matrices, you probably noticed that the preceding set
    of vectors looks like the 3x3 identity matrix. In fact, this technique generalizes
    in a straightforward manner. Specifically, if you have n distinct categorical
    values, you can map each of those values to one of the vectors in an nxn identity
    matrix.


    As another example, the set of titles {"Intern," "Junior," "Mid-Range," "Senior,"
    "Project Leader," "Dev Manager"} has a hierarchical relationship in terms of their
    salaries (which can also overlap, but we won''t address that now).


    Another set of categorical data involves the season of the year: {"Spring," "Summer,"
    "Autumn," "Winter"}, and while these values are generally independent of each
    other, there are cases in which the season is significant. For example, the values
    for the monthly rainfall, average temperature, crime rate, or foreclosure rate
    can depend on the season, month, week, or day of the year.


    If a feature has a large number of categorical values, then one-hot encoding will
    produce many additional columns for each data point. Since the majority of the
    values in the new columns equal 0, this can increase the sparsity of the dataset,
    which in turn can result in more overfitting and hence adversely affect the accuracy
    of machine learning algorithms that you adopt during the training process.


    One solution is to use a sequence-based solution in which N categories are mapped
    to the integers 1, 2, . . . , N. Another solution involves examining the row frequency
