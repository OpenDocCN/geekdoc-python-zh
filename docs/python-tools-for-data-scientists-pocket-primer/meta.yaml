    \ B.29 展示了 `mixed-data.csv` 的内容，其中包含未对齐的数据值。此外，清单 B.28 中的第一行和最后一行是空行，本节中的 shell\
    \ 脚本将移除它们。\n\n**清单 B.29: mixed-data.csv**\n\n```\nSara, Jones, 1000, CA, Sally,\
    \ Smith, 2000, IL,\nDave, Jones, 3000, FL, John, Jones,\n4000, CA,\nDave, Jones,\
    \ 5000, NY, Mike,\nJones, 6000, NY, Tony, Jones, 7000, WA\n```\n\n清单 B.30 展示了\
    \ `mixed-data.sh` 的内容，该脚本演示了如何重新对齐清单 B.29 中的数据集。\n\n**清单 B.30: mixed-data.sh**\n\
    \n```\n#-----------------------------------------------\n# 1) 移除空行\n# 2) 移除换行符\n\
    # 3) 每四个字段后打印一个换行符\n# 4) 移除每行末尾的逗号\n#-----------------------------------------------\n\
    \ninputfile=\"mixed-data.csv\"\n\ngrep -v \"^$\" $inputfile |awk -F\",\" '{printf(\"\
    %s\",$0)}' | awk '\nBEGIN { columnCount = 4 }\n{\n    for(i=1; i<=NF; i++) {\n\
    \        printf(\"%s \", $i)\n        if( i % columnCount  == 0) { print \"\"\
    \ }\n    }\n}' > temp-columns\n\n# 4) 移除输出中的末尾逗号：\ncat temp-columns | sed 's/,\
    \ $//' | sed 's/ $//' > $outputfile\n```\n\n清单 B.30 以一个 `grep` 命令开始，该命令移除空行，随后是一个\
    \ `awk` 命令，该命令将数据集的行打印为单行文本。第二个 `awk` 命令在 `BEGIN` 块中将 `columnCount` 变量初始化为 4，然后是一个\
    \ `for` 循环，遍历输入字段。在四个字段被打印到同一输出行后，会打印一个换行符，其效果是将输入数据集重新对齐为一个由包含四个字段的行组成的输出数据集。清单\
