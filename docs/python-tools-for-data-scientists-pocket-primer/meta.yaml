    ## 什么是ANOVA？


    ANOVA是“方差分析”的缩写，它试图分析从总体中抽取的样本的均值之间的差异。ANOVA使你能够检验多个均值是否相等。更重要的是，ANOVA有助于减少第一类（假阳性）错误和第二类（假阴性）错误。例如，假设A被诊断患有癌症，B被诊断为健康，而这两个诊断都是错误的。那么A的结果是假阳性，而B的结果是假阴性。通常，假阳性的测试结果比假阴性的测试结果*好得多*。


