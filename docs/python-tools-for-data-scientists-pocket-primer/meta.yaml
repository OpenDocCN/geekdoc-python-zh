    *Survivorship bias* refers to analyzing a particular subset of “positive” data
    while ignoring the “negative” data. This bias occurs in various situations, such
    as being influenced by individuals who recount their rags-to-riches success story
    (“positive” data) while ignoring the fate of the people (which is often a very
    high percentage) who did not succeed (the “negative” data) in a similar quest.
    So, while it’s certainly possible for an individual to overcome many difficult
    obstacles to succeed, is the success rate one in one thousand (or even lower)?


