    print()\n```\n\n清单 3.2 以两个标准的 `import` 语句开始，然后是变量 `myarray`，这是一个 3x3 的数字 NumPy\
    \ 数组。变量 `rownames` 和 `colnames` 分别为 Pandas 数据框 `mydf` 的行和列提供名称，`mydf` 使用指定的数据源（即\
