  md: '# The Iris Dataset in Sklearn (2)


    The Iris dataset in Sklearn consists of the lengths of three different types of
    Iris-based petals and sepals: Setosa, Versicolor, and Virginica. These numeric
    values are stored in a 150x4 NumPy.ndarray.


    Note that the rows in the Iris dataset are the sample images, and the columns
    consist of the values for the Sepal Length, Sepal Width, Petal Length, and Petal
    Width of each image. Listing 4.6 shows the content of sklearn_iris2.py that illustrates
    how to display detailed information about the Iris dataset and a chart that displays
    the distributions of the four features.


    Listing 4.6: sklearn_iris2.py


    ```

    from sklearn import datasets

    from sklearn.model_selection import train_test_split


    iris = datasets.load_iris()

    data = iris.data


    print("iris data shape:  ",data.shape)

    print("iris target shape:",iris.target.shape)

    print("first 5 rows iris:")

    print(data[0:5])

    print("keys:",iris.keys())

    print("")


    n_samples, n_features = iris.data.shape

    print(''Number of samples: '', n_samples)

    print(''Number of features:'', n_features)

    print("")


    print("sepal length/width and petal length/width:")

    print(iris.data[0])


    import numpy as np

    np.bincount(iris.target)


    print("target names:",iris.target_names)


    print("mean: %s " % data.mean(axis=0))

    print("std:  %s " % data.std(axis=0))


    #print("mean: %s " % data.mean(axis=1))

    #print("std:  %s " % data.std(axis=1))


    # load the data into train and test datasets:

    X_train, X_test, y_train, y_test = train_test_split(iris.data,

    iris.target, random_state=0)

    ```'
