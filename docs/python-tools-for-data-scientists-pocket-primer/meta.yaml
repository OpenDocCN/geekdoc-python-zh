    # Missing Data, Anomalies, and Outliers


    Although missing data is not directly related to checking for anomalies and outliers,
    in general, you will perform all three of these tasks. Each task involves a set
    of techniques to help you perform an analysis of the data in a dataset, and the
    following subsections describe some of those techniques.


    # Missing Data


    How you decide to handle missing data depends on the specific dataset. Here are
    some ways to handle missing data (the first three techniques are manual techniques,
    and the other techniques are algorithms):


    +   1) Replace missing data with the mean/median/mode value.

    2) Infer (“impute”) the value for missing data.

    3) Delete rows with missing data.

    4) Use the Isolation Forest algorithm (a tree-based algorithm).

    5) Use the minimum covariance determinant.

    6) Use the local outlier factor.

    7) Use the one-class SVM (Support Vector Machine).


    In general, replacing a missing numeric value with zero is a risky choice: this
    value is obviously incorrect if the values of a feature are between 1,000 and
    5,000. For a feature that has numeric values, replacing a missing value with the
    average value is better than the value zero (unless the average equals zero);
    also consider using the median value. For categorical data, consider using the
    mode to replace a missing value.


    If you are not confident that you can impute a “reasonable” value, consider excluding
    the row with a missing value, and then train a model with the imputed value and
    the deleted row.


    One problem that can arise after removing rows with missing values is that the
    resulting dataset is too small. In this case, consider using SMOTE, which is discussed
    later in this appendix, to generate synthetic data.


    # Anomalies and Outliers


    In simplified terms, an outlier is an abnormal data value that is outside the
    range of “normal” values. For example, a person’s height in centimeters'
