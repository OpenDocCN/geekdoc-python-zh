    \ `Pyplot` API `plot()`，它渲染一条线段。\n\n图 6.3 显示了基于清单 6.3 中代码的一组随机点。\n\n![](img/a5bd78f899e04acbdf3949ed2383b115_234_0.png)\n\
    \n**图 6.3** 一组随机点。\n\n## Matplotlib 中的直方图\n\n清单 6.4 显示了 `histogram1.py` 的内容，该示例说明了如何使用\
