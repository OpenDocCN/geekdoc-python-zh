    \    bana_count], stacked=True, color=['r','b'])\nplt.show()\n```\n\n清单 6.4 很直接：NumPy\
    \ 变量 `appl_count` 和 `bana_count` 包含一组随机值，其上限分别为 `max1` 和 `max2`。Pyplot API `hist()`\
    \ 使用点 `appl_count` 和 `bana_count` 来显示直方图。图 6.4 显示了一个直方图，其形状基于清单 6.4 中的代码。\n\n\
