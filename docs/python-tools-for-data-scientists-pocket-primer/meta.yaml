    print int(101 * rand()) }'\n```\n\n计算文件中的行数：\n\n```\nawk 'END { print NR }' <\
    \ data.txt\n```\n\n打印数据文件中的偶数行：\n\n```\nawk 'NR % 2 == 0' data.txt\n```\n\n如果你在前面的代码片段中使用表达式\
