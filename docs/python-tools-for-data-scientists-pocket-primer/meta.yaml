    ## Working with Lines in the Plane (Optional)


    This section contains a short review of lines in the Euclidean plane, so you can
    skip this section if you are comfortable with this topic. A minor point that''s
    often overlooked is that lines in the Euclidean plane have infinite length. If
    you select two distinct points of a line, then all the points between those two
    selected points is a *line segment*. A *ray* is a "half infinite" line: When you
    select one point as an endpoint, then all the points on one side of the line constitute
    a ray.


    For example, the points in the plane whose y-coordinate is 0 make a line, as is
    the x-axis, whereas the points between (0,0) and (1,0) on the x-axis form a line
    segment. In addition, the points on the x-axis that are to the right of (0,0)
    form a ray, and the points on the x-axis that are to the left of (0,0) also form
    a ray.


    For simplicity and convenience, in this book we''ll use the terms “line” and “line
    segment” interchangeably, and now let''s delve into the details of lines in the
    Euclidean plane. Here is the equation of a (non-vertical) line in the Euclidean
    plane:


    ```

    y = m*x + b

    ```


    The value of m is the slope of the line and the value of b is the y-intercept
    (i.e., the place where the non-vertical line intersects the y-axis). The following
    form for a line in the plane is a more general equation that includes vertical
    lines:


    ```

    a*x + b*y + c = 0

