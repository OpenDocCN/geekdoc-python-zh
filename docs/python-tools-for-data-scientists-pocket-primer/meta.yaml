  md: '# APPENDIX A


    # WORKING WITH DATA


    This appendix introduces you to data types, how to scale data values, and various
    techniques for handling missing data values. If most of the material in this appendix
    is new to you, be assured that it''s not necessary to understand everything here.
    Read as much material as you can absorb, and perhaps return to this appendix again
    after you have completed some of the other chapters in this book.


    The first part of this appendix contains an overview of different types of data
    and an explanation of how to normalize and standardize a set of numeric values
    by calculating the mean and standard deviation of a set of numbers. You will see
    how to map categorical data to a set of integers and how to perform one-hot encoding.


    The second part of this appendix discusses missing data, outliers, and anomalies,
    as well as some techniques for handling these scenarios. The third section discusses
    imbalanced data and the use of SMOTE (Synthetic Minority Oversampling Technique)
    to deal with imbalanced classes in a dataset.


    The fourth section discusses ways to evaluate classifiers such as LIME and ANOVA.
    This section also contains details regarding the bias-variance trade-off and various
    types of statistical bias.


    # What are Datasets?


    In simple terms, a *dataset* is a source of data (such as a text file) that contains
    rows and columns of data. Each row is typically called a *data point*,'
  merge: -1
  pgno: 259
- img_proc: true
  md: 'and each column is called a *feature*. A dataset can be in a range of formats:
    CSV (comma separated values), TSV (tab separated values), Excel spreadsheet, a
    table in an RDMBS (Relational Database Management System), a document in a NoSQL
    database, or the output from a Web service. Someone needs to analyze the dataset
    to determine which features are the most important and which features can be safely
    ignored to train a model with the given dataset.


    A dataset can vary from very small (a couple of features and 100 rows) to very
    large (more than 1,000 features and more than one million rows). If you are unfamiliar
    with the problem domain, then you might struggle to determine the most important
    features in a large dataset. In this situation, you might need a domain expert
    who understands the importance of the features, their interdependencies (if any),
    and whether the data values for the features are valid. In addition, there are
    algorithms (called dimensionality reduction algorithms) that can help you determine
    the most important features. For example, PCA (Principal Component Analysis) is
    one such algorithm, which is discussed in more detail later in this appendix.


    # Data Preprocessing


    Data preprocessing is the initial step that involves validating the contents of
    a dataset, which involves making decisions about missing and incorrect data values:


    +   - dealing with missing data values

    - cleaning “noisy” text-based data

    - removing HTML tags

    - removing emoticons

    - dealing with emojis/emoticons

    - filtering data

    - grouping data

    - handling currency and date formats (i18n)


    Cleaning data is a subset of data wrangling that involves removing unwanted data
    as well as handling missing data. In the case of text-based data, you might need
    to remove HTML tags and punctuation. In the case of numeric data, it’s less likely
    (though still possible) that alphabetic characters are mixed together with numeric
    data. However, a dataset with numeric features might have incorrect values or
    missing values (discussed later). In addition, calculating the minimum, maximum,
    mean, median, and standard deviation of the values of a feature obviously pertain
    only to numeric values.'
  merge: -1
  pgno: 260
- img_proc: true
  md: 'After the preprocessing step is completed, *data wrangling* is performed, which
    refers to transforming data into a new format. You might have to combine data
    from multiple sources into a single dataset. For example, you might need to convert
    between different units of measurement (such as date formats or currency values)
    so that the data values can be represented in a consistent manner in a dataset.


    Currency and date values are part of *i18n* (internationalization), whereas *l10n*
    (localization) targets a specific nationality, language, or region. Hard-coded
    values (such as text strings) can be stored as resource strings in a file called
    a *resource bundle*, where each string is referenced via a code. Each language
    has its own resource bundle.


    # Data Types


    Explicit data types exist in many programming languages, such as C, C++, Java,
    and TypeScript. Some programming languages, such as JavaScript and awk, do not
    require initializing variables with an explicit type: The type of a variable is
    inferred dynamically via an implicit type system (i.e., one that is not directly
    exposed to a developer).


    In machine learning, datasets can contain features that have different types of
    data, such as a combination of one or more of the following:


    +   - numeric data (integer/floating point and discrete/continuous)

    - character/categorical data (different languages)

    - date-related data (different formats)

    - currency data (different formats)

    - binary data (yes/no, 0/1, and so forth)

    - nominal data (multiple unrelated values)

    - ordinal data (multiple and related values)


    Consider a dataset that contains real estate data, which can have as many as thirty
    columns (or even more), often with the following features:


    +   - the number of bedrooms in a house: a numeric value and a discrete value

    - the number of square feet: a numeric value and (probably) a continuous value

    - the name of the city: character data

    - the construction date: a date value

    - the selling price: a currency value and probably a continuous value

    - the “for sale” status: binary data (either “yes” or “no”)'
  merge: -1
  pgno: 261
- img_proc: true
  md: 'An example of nominal data is the seasons in a year. Although many (most?)
    countries have four distinct seasons, some countries have two distinct seasons.
    However, keep in mind that seasons can be associated with different temperature
    ranges (summer versus winter). An example of ordinal data is an employee''s pay
    grade: 1=entry level, 2=one year of experience, and so forth. Another example
    of nominal data is a set of colors, such as {Red, Green, Blue}.


    An example of binary data is the pair {Male, Female}, and some datasets contain
    a feature with these two values. If such a feature is required for training a
    model, first convert {Male, Female} to a numeric counterpart, such as {0,1}. Similarly,
    if you need to include a feature whose values are the previous set of colors,
    you can replace {Red, Green, Blue} with the values {0,1,2}. Categorical data is
    discussed in more detail later in this appendix.


    # Preparing Datasets


    If you have the good fortune to inherit a dataset that is in pristine condition,
    then data cleaning tasks (discussed later) are vastly simplified: in fact, it
    might not be necessary to perform *any* data cleaning for the dataset. However,
    if you need to create a dataset that combines data from multiple datasets that
    contain different formats for dates and currency, then you need to perform a conversion
    to a common format.


    If you need to train a model that includes features that have categorical data,
    then you need to convert that categorical data to numeric data. For instance,
    the Titanic dataset contains a feature called "gender," which is either male or
    female. As you will see later in this appendix, Pandas makes it extremely simple
    to "map" male to 0 and female to 1.


    # Discrete Data vs. Continuous Data


    *Discrete data* is a set of values that can be counted, whereas *continuous data*
    must be measured. Discrete data can "reasonably" fit in a drop-down list of values,
    but there is no exact value for making such a determination. One person might
    think that a list of 500 values is discrete, whereas another person might think
    it''s continuous.


    For example, the list of provinces of Canada and the list of states of the United
    States are discrete data values, but is the same true for the number of countries
    in the world (roughly 200) or for the number of languages in the world (more than
    7,000)?'
  merge: -1
  pgno: 262
- img_proc: true
  md: 'Values for temperature, humidity, and barometric pressure are considered continuous.
    Currency is also treated as continuous, even though there is a measurable difference
    between two consecutive values. The smallest unit of currency for U.S. currency
    is one penny, which is 1/100th of a dollar (accounting-based measurements use
    the “mil,” which is 1/1,000th of a dollar).


    Continuous data types can have subtle differences. For example, someone who is
    200 centimeters tall is twice as tall as someone who is 100 centimeters tall;
    the same relationship holds for 100 kilograms versus 50 kilograms. However, temperature
    is different: 80 degrees Fahrenheit is not twice as hot as 40 degrees Fahrenheit.


    Furthermore, the meaning of the word “continuous” in mathematics is not necessarily
    the same as “continuous” in machine learning. Using the mathematical definition,
    a continuous variable (let’s say in the 2D Euclidean plane) can have an uncountably
    infinite number of values. However, a feature in a dataset that can have more
    values than can be “reasonably” displayed in a drop-down list is treated *as though*
    it’s a continuous variable.


    For instance, values for stock prices are discrete: They must differ by at least
    a penny (or some other minimal unit of currency), which is to say, it’s meaningless
    to assert that the stock price changes by one-millionth of a penny. However, since
    there are so many possible stock values, it’s treated as a continuous variable.
    The same comments apply to car mileage, ambient temperature, and barometric pressure.


    # “Binning” Continuous Data


    The concept of *binning* refers to subdividing a set of values into multiple intervals,
    and then treating all the numbers in the same interval as though they had the
    same value.


    As a simple example, suppose that a feature in a dataset contains the age of people
    in a dataset. The range of values is approximately between 0 and 120, and we could
    bin them into 12 equal intervals, where each consists of 10 values: 0 through
    9, 10 through 19, 20 through 29, and so forth.


    However, partitioning the values of people’s ages as described in the preceding
    paragraph can be problematic. Suppose that person A, person B, and person C are
    29, 30, and 39, respectively. Then person A and person B are probably more similar
    to each other than person B and person C, but because of the way in which the
    ages are partitioned, B is classified'
  merge: -1
  pgno: 263
- img_proc: true
  md: 'as closer to C than to A. In fact, binning can increase Type I errors (false
    positive) and Type II errors (false negative), as discussed in the following blog
    post (along with some alternatives to binning):


    https://medium.com/@peterflom/why-binning-continuous-data-is-almost-always-a-mistake-ad0b3a1d141f.


    As another example, using quartiles is even more coarse-grained than the earlier
    age-related binning example. The issue with binning pertains to the consequences
    of classifying people in different bins, even though they are in close proximity
    to each other. For instance, some people struggle financially because they earn
    a meager wage, and they are disqualified from financial assistance because their
    salary is higher than the cutoff point for receiving any assistance.


    # Scaling Numeric Data via Normalization


    A range of values can vary significantly, and it''s important to note that they
    often need to be scaled to a smaller range, such as values in the range [-1,1]
    or [0,1], which you can do via the `tanh()` function or the `sigmoid()` function,
    respectively.


    For example, measuring a person''s height in terms of meters involves a range
    of values between 0.50 meters and 2.5 meters (in the vast majority of cases),
    whereas measuring height in terms of centimeters ranges between 50 centimeters
    and 250 centimeters: these two units differ by a factor of 100. A person''s weight
    in kilograms generally varies between 5 kilograms and 200 kilograms, whereas measuring
    weight in grams differs by a factor of 1,000. Distances between objects can be
    measured in meters or in kilometers, which also differ by a factor of 1,000.


    In general, use units of measure so that the data values in multiple features
    belong to a similar range of values. In fact, some machine learning algorithms
    require scaled data that is often in the range of [0,1] or [-1,1]. In addition
    to the `tanh()` and `sigmoid()` functions, there are other techniques for scaling
    data, such as standardizing data (such as the Gaussian distribution) and normalizing
    data (linearly scaled so that the new range of values is in [0,1]).


    The following examples involve a floating point variable x with different ranges
    of values that will be scaled so that the new values are in the interval [0,1].'
  merge: -1
  pgno: 264
- img_proc: true
  md: '+   - Example 1: If the values of x are in the range [0,2], then x/2 is in
    the range [0,1].

    - Example 2: If the values of x are in the range [3,6], then x-3 is in the range
    [0,3], and (x-3)/3 is in the range [0,1].

    - Example 3: If the values of x are in the range [-10,20], then x+10 is in the
    range [0,30], and (x+10)/30 is in the range of [0,1].


    In general, suppose that x is a random variable whose values are in the range
    [a,b], where a < b. You can scale the data values by performing two steps:


    ```

    Step 1: X-a is in the range [0,b-a]

    Step 2: (X-a)/(b-a) is in the range [0,1]

    ```


    If X is a random variable that has the values {x1, x2, x3, . . . , xn}, then the
    formula for normalization involves mapping each xi value to (xi - min)/(max -
    min), where min is the minimum value of x and max is the maximum value of X.


    As a simple example, suppose that the random variable x has the values {-1, 0,
    1}. Then min and max are 1 and -1, respectively, and the normalization of {-1,
    0, 1} is the set of values { (-1-(-1))/2, (0-(-1))/2, (1-(-1))/2}, which equals
    {0, 1/2, 1}.


    # Scaling Numeric Data via Standardization


    The standardization technique involves finding the mean mu and the standard deviation
    sigma, and then mapping each xi value to (xi - mu)/sigma. Recall the following
    formulas:


    ```

    mu = [SUM (x) ]/n

    variance(x) = [SUM (x - xbar)*(x-xbar)]/n

    sigma = sqrt(variance)

    ```


    As a simple illustration of standardization, suppose that the random variable
    x can have values in the set {-1, 0, 1}. Then mu and sigma are calculated as follows:


    ```

    mu = (SUM xi)/n = (-1 + 0 + 1)/3 = 0


    variance = [SUM (xi- mu)^2]/n

    = [(-1-0)^2 + (0-0)^2 + (1-0)^2]/3

    = 2/3


    sigma = sqrt(2/3) = 0.816 (approximate value)

    ```'
  merge: -1
