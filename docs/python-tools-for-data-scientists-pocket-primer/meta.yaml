    \nprint(\"first three letters:\")\nshirts['sub1'] = shirts['ssize'].str[:3]\n\
    print(shirts)\nprint()\n\nprint(\"split ssize on letter 'a':\")\nshirts['sub2']\
    \ = shirts['ssize'].str.split('a')\nprint(shirts)\nprint()\n\nprint(\"Rows 3 through\
    \ 5 and column 2:\")\nprint(shirts.iloc[2:5, 2])\nprint()\n```\n\nListing 3.11\
    \ initializes the data frame `df` with the contents of the CSV file `shirts.csv`,\
    \ and then displays the contents of `df`. The next code snippet in Listing 3.11\
    \ uses the `startswith()` method to match the shirt types that start with the\
