    # Summary


    This chapter introduced the `awk` command, which is essentially an entire programming
    language packaged into a single Unix command.


    We explored some of its built-in variables as well as conditional logic, `while`
    loops, and `for` loops in `awk` in order to manipulate the rows and columns in
    datasets. You then saw how to delete lines and merge lines in datasets, and how
    to print the contents of a file as a single line of text. Next you learned how
    to use meta characters and character sets in `awk` commands. You learned how to
    perform numeric calculations (such as addition, subtraction, multiplication, and
    division) in files containing numeric data, and how to use some numeric functions
    that are available in `awk`.


    In addition, you saw how to align columns, delete columns, select a subset of
    columns, and work with multi-line records in datasets. Finally, you saw some simple
    use cases involving nested quotes and date formats in a structured dataset.


    At this point, you have all the tools necessary to do sophisticated data cleansing
    and processing, and it is strongly encouraged that you try to apply them to some
    task or problem of interest. The final step of the learning process is doing something
    real.


    “I saw something similar once, I wonder if there is a way to….” or the even more
    common “How do I do XXX in language YYY” will help you in the learning process.
    You can’t consider those issues if you don’t have a sense of what is possible.


    At this point there is one more thing to say: congratulations! You have completed
    a fast-paced yet dense book, and if you are a neophyte, the material will probably
    keep you busy for many hours. The examples in the chapters provide a solid foundation,
    and the Appendix contains additional examples and use cases to further illustrate
    how the Unix commands work together. The combined effect demonstrates that the
    universe of possibilities is larger than the examples in this book, and ultimately,
    they will spark your own ideas. Good luck!'
