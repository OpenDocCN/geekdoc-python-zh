    ## easy_install and pip


    Both `easy_install` and `pip` are easy to use when you need to install Python
    modules. Whenever you need to install a Python module, use either `easy_install`
    or `pip` with the following syntax:


    ```

    easy_install <module-name>

    pip install <module-name>

    ```


    > Python-based modules are easy to install. Modules with code written in C are
    usually faster, but more difficult in terms of installation.


    ## virtualenv


    The virtualenv tool enables you to create isolated Python environments:

    http://www.virtualenv.org/en/latest/virtualenv.html

    virtualenv addresses the problem of preserving the correct dependencies and versions
    (and indirectly permissions) for different applications. (If you are a Python
    novice, you might not need virtualenv right now). The next section shows you how
    to check whether Python is installed on your machine, and also where you can download
    Python.


    ## Python Installation


    Before you download anything, check if you have Python already installed on your
    machine (which is likely if you have a Macbook or a Linux machine) by typing the
    following command in a command shell:

    python -V

    The output for the Macbook used in this book is

    Python 3.9.1


    > Install Python 3.9.1 (or as close as possible to this version) on your machine
    so that you will have the same version of Python that was used to test the scripts
    in this book.


    If you need to install Python on your machine, navigate to the Python home page
    and select the downloads link or navigate directly to this website:

    http://www.python.org/download/

    In addition, PythonWin is available for Windows, and its home page is online:

    http://www.cgl.ucsf.edu/Outreach/pc204/pythonwin.html

    Use any text editor that can create, edit, and save Python scripts and save them
    as plain text files (don''t use Microsoft Word).

    After you have Python installed and configured on your machine, you are ready
    to work with the Python scripts in this book.


    ## Setting the PATH Environment Variable (Windows Only)


    The `PATH` environment variable specifies a list of directories that are searched
    whenever you specify an executable program from the command line. A very good
    guide to setting up your environment so that the executable is always available
    in every command shell is to follow the instructions found online:


    http://www.blog.pythonlibrary.org/2011/11/24/python-101-setting-up-python-on-windows/


    ## Launching Python on Your Machine


    There are three different ways to launch Python:


    - Use the Python Interactive Interpreter.

    - Launch Python scripts from the command line.

    - Use an IDE.


    The next section shows you how to launch the interpreter from the command line.
    Later in this chapter, we show how to launch scripts from the command line and
    discuss IDEs.


    > NOTE: The emphasis in this book is to launch scripts from the command line or
    to enter code in the interpreter.


