  md: 'This chapter assumes that you have read the data cleaning examples that are
    in previous chapters. Moreover, Chapter 7 contains a section with additional code
    samples involving data cleaning tasks.


    # What is Data Cleaning?


    Data cleaning, also called data cleansing, is the task of ensuring that the contents
    of a dataset are complete, correct, and typically without duplicates. Hence, the
    focus of data cleaning is on individual files instead of combining or transforming
    data from two or more files. Data cleaning is often performed before any data
    transformation is performed. In some cases, data cleaning must also be performed
    after a data transformation.


    For example, suppose that a CSV file contains employee-related data and a MySQL
    table also contains employee-related data, both of which have been cleansed of
    inconsistencies and duplicates have been removed. However, after exporting the
    table data to a CSV file that is merged with the first CSV file, it''s possible
    that there are duplicates that must then be removed.


    Incidentally, there are several techniques for determining the values to replace
    empty fields, and the choice of techniques can range from obvious choices to more
    subtle factors. Sometimes you can specify the mean or the median for missing values,
    but in other cases, you need a more sophisticated technique. For example, suppose
    that a dataset with 1,000 rows consists of two types of patients: those who are
    healthy (the majority) and patients who have cancer. Obviously, you want the number
    of sick patients to be as low as possible (ideally zero); realistically, there
    will be some patients who will be sick and probably the majority of patients will
    be healthy, which means that the dataset is fundamentally imbalanced.


    Unfortunately, machine learning algorithms can produce inaccurate results with
    imbalanced datasets. Moreover, generating synthetic data whose feature values
    are based on the mean or the median is probably risky. A better technique is called
    SMOTE, which generates data values that are close to values that appear in rows
    of the original dataset.


    As another example, the format for dates, currency, and decimal numbers varies
    among different countries. Examples of date formats include YYYY/MM/DD, MM/DD/YYYY,
    and DD/MM/YYYY (as well as other possible date formats). Incidentally, YYYY/MM/DD
    is an ISO standard for numeric dates.'
