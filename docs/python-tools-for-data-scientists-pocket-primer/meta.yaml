    ## 什么是LIME？


    LIME是“局部可解释模型无关解释”的缩写。LIME是一种模型无关的技术，可用于机器学习模型。该技术的方法论很简单：对数据样本进行微小的随机更改，然后观察预测如何变化（或不变化）。该方法涉及（轻微）更改输出，然后观察输出发生了什么变化。


