    \        #print \"2short day: \",day\n    } else {\n        print \"Cannot find\
    \ day\"\n        VALID_DATE=\"false\"\n    }\n}\n```\n\n```\nif(VALID_DATE ==\
    \ \"true\") {\n    # 步骤 3：提取年份：#03/15/2021 15:05:44\n    #print \"date part:\"\
    ,date_part  # 03/15/2021\n    #print \"time part:\",time_part  # 15:05:44\n\n\
