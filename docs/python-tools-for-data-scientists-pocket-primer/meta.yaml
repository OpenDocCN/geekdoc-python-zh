    Number formats involve a comma “,” for the thousands position and decimal “.”
    for decimal values in the US (ex: $1,234.56), whereas Europe uses the opposite
    order for numbers (ex: 1.234,56). Depending on the dataset in question, data cleaning
    can also involve working with an assortment of dates, currencies, and decimal
    numbers to ensure that all values have the same format.


    If two CSV files contain different date formats and you need to create a single
    CSV file that is based on the date columns, then there will be some type of conversion
    process that could be one of the following:


    +   - convert the first date format to the second date format

    - convert the second date format to the first date format

    - convert both date formats to a third date format


    In the case of financial data, you are likely to also encounter different currencies,
    which involves a conversion rate between a pair of currencies. Since currency
    conversion rates fluctuate, you need to decide the exchange rate to use for the
    data, which can be


    +   - the exchange rate during the date that the CSV files were generated

    - the current currency exchange rate

    - some other mechanism


