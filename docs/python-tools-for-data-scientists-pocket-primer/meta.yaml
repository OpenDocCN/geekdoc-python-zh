    \ family\n3   ham      Thank you for your help\n4  spam      Spring break next\
    \ week!\n-------------------------\n=> First five rows (after):\n   type     \
    \                     text\n0    0       I'm telling the truth\n1    1  What a\
    \ deal such a deal!\n2    1  Free vacation for your family\n3    0      Thank\
    \ you for your help\n4    1  Spring break next week!\n-------------------------\n\
    ```\n\nAs another example, Listing 3.9 shows the content of `shirts.csv` and Listing\
    \ 3.10 shows the content of `shirts.py`; these examples illustrate four techniques\
    \ for converting categorical data into numeric data.\n\n**Listing 3.9: shirts.csv**\n\
    \n```\ntype,ssize\nshirt,xxlarge\nshirt,xxlarge\nshirt,xlarge\nshirt,xlarge\n\
    shirt,xlarge\nshirt,large\nshirt,medium\nshirt,small\nshirt,small\nshirt,xsmall\n\
    shirt,xsmall\nshirt,xsmall\n```\n\n**Listing 3.10: shirts.py**\n\n```python\n\
    import pandas as pd\n\nshirts = pd.read_csv(\"shirts.csv\")\nprint(\"shirts before:\"\
    )\nprint(shirts)\nprint()\n\n# TECHNIQUE #1:\n#shirts.loc[shirts['ssize']=='xxlarge','size']\
    \ = 4\n#shirts.loc[shirts['ssize']=='xlarge', 'size'] = 4\n#shirts.loc[shirts['ssize']=='large',\
    \  'size'] = 3\n#shirts.loc[shirts['ssize']=='medium', 'size'] = 2\n#shirts.loc[shirts['ssize']=='small',\
    \  'size'] = 1\n#shirts.loc[shirts['ssize']=='xsmall', 'size'] = 1\n\n# TECHNIQUE\
    \ #2:\n#shirts['ssize'].replace('xxlarge', 4, inplace=True)\n#shirts['ssize'].replace('xlarge',\
    \  4, inplace=True)\n#shirts['ssize'].replace('large',   3, inplace=True)\n#shirts['ssize'].replace('medium',\
    \  2, inplace=True)\n#shirts['ssize'].replace('small', 1, inplace=True)\n#shirts['ssize'].replace('xsmall',\
    \ 1, inplace=True)\n\n# TECHNIQUE #3:\n#shirts['ssize'] = shirts['ssize'].apply({'xxlarge':4,\n\
    # 'xlarge':4, 'large':3, 'medium':2, 'small':1, 'xsmall':1}.get)\n\n# TECHNIQUE\
    \ #4:\nshirts['ssize'] = shirts['ssize'].replace(regex='xlarge', value=4)\nshirts['ssize']\
    \ = shirts['ssize'].replace(regex='large', value=3)\nshirts['ssize'] = shirts['ssize'].replace(regex='medium',\
    \ value=2)\nshirts['ssize'] = shirts['ssize'].replace(regex='small', value=1)\n\
    \nprint(\"shirts after:\")\nprint(shirts)\n```\n\nListing 3.10 starts with a code\
    \ block of six statements that uses direct comparison with strings to make numeric\
    \ replacements. For example, the following code snippet replaces all occurrences\
    \ of the string `xxlarge` with the value 4:\n\n```python\nshirts.loc[shirts['ssize']=='xxlarge','size']\
    \ = 4\n```\n\nThe second code block consists of six statements that use the `replace()`\
    \ method to perform the same updates, an example of which is shown here:\n\n```python\n\
    shirts['ssize'].replace('xxlarge', 4, inplace=True)\n```\n\nThe third code block\
    \ consists of a single statement that uses the `apply()` method to perform the\
