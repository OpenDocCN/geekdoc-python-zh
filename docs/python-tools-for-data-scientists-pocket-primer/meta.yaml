    \n```python\nimport numpy as np\nimport math\n\nx = np.linspace(0, 2*math.pi,\
    \ 101)\ns = np.sin(x)\nc = np.cos(x)\n\nimport matplotlib.pyplot as plt\nplt.plot(s)\n\
