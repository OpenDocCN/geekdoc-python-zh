    Colaboratory 特定代码。当你运行此代码时，你会看到一个标有“浏览”的小按钮，你必须点击它，然后选择代码片段中列出的 CSV 文件。完成此操作后，其余代码将执行，你将在浏览器会话中看到
    CSV 文件的内容。


    > **注意** 如果你想在 Google Colaboratory 中成功运行此 Jupyter notebook，必须提供 CSV 文件 `weather_data.csv`。


    ## 总结


    本章首先介绍了 Sklearn，这是一个用于机器学习任务的极其通用的 Python 库。


    接下来你了解了 SciPy，这是一个非常适合科学计算任务的 Python 库。你看到了简单的代码示例，展示了如何在 SciPy 中翻转和旋转图像。


    最后，你了解了 Google Colaboratory（也称为“Colab”），这是一个免费提供的在线工具，用于创建和启动 Jupyter notebook。Colab
    支持许多有用的功能，例如以各种格式下载 notebook、直接将 Github 仓库导入 notebook，以及在 Google Colaboratory
    中执行 notebook 时免费支持 GPU 和 TPU。'
