    \ Pandas 数据框都可用的 `describe()` 方法生成的。`describe()` 方法很有用：你会看到各种统计量，如均值、标准差、最小值和最大值，这些是按\
    \ `columns`（而不是行）计算的，以及第 25、50 和 75 百分位数的值。清单 3.2 的输出如下：\n\n```\ncontents of df:\n\
