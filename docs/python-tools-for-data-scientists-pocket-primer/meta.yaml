  md: '# Trigonometric Functions in Matplotlib


    You can display the graph of trigonometric functions as easily as you can render
    “regular” graphs using Matplotlib. Listing 6.7 displays the content of `sincos.py`
    that illustrates how to plot a sine function and a cosine function in Matplotlib.


    **Listing 6.7: sincos.py**


    ```

    import numpy as np

    import math


    x = np.linspace(0, 2*math.pi, 101)

    s = np.sin(x)

    c = np.cos(x)


    import matplotlib.pyplot as plt

    plt.plot (s)

    plt.plot (c)

    plt.show()

    ```


