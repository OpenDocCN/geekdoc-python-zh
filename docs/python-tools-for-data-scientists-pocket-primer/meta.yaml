    # INTRODUCTION TO PYTHON


    This chapter contains an introduction to Python, with information about useful
    tools for installing its modules, working with its basic constructs, and managing
    some data types.


    The first part of this chapter covers a Python installation, some environment
    variables, and usage of the interpreter. We include code samples and how to save
    code in text files that you can launch from the command line. The second part
    of this chapter shows you how to work with simple data types, such as numbers,
    fractions, and strings. The third part of this chapter discusses exceptions and
    how to use them in scripts.


    > NOTE: The scripts in this book are for Python 3.x.


    # Tools for Python


    The Anaconda Python distribution available for Windows, Linux, and Mac, and is
    downloadable: http://continuum.io/downloads.


    Anaconda is well-suited for modules such as NumPy and scipy, and if you are a
    Windows user, Anaconda appears to be a better alternative.


    # easy_install and pip


    Both `easy_install` and `pip` are easy to use when you need to install Python
    modules. Whenever you need to install a Python module, use either `easy_install`
    or `pip` with the following syntax:


    ```

    easy_install <module-name>

    pip install <module-name>

    ```'
