    Tony, Jones, 7000, WA\n```\n\n## 对齐数据集中的列和多行\n\n上一节向你展示了如何重新对齐数据集，使每行包含相同数量的列，并且每行代表一条单独的数据记录。本节中的代码示例演示了如何重新对齐那些内容正确的数据列，并在新数据集的每一行中放置两条记录。清单\
    \ B.31 展示了 `mixed-data2.csv` 的内容，其中包含未对齐的数据值，随后是清单 B.32，展示了格式正确的数据集 `aligned-data2.csv`\
    \ 的内容。\n\n**清单 B.31: mixed-data2.csv**\n\n```\nSara, Jones, 1000, CA, Sally, Smith,\
    \ 2000, IL,\nDave, Jones, 3000, FL, John, Jones,\n4000, CA,\nDave, Jones, 5000,\
    \ NY, Mike,\nJones, 6000, NY, Tony, Jones, 7000, WA\n```\n\n**清单 B.32: aligned-data2.csv**\n\
    \n```\nSara, Jones, 1000, CA, Sally, Smith, 2000, IL\nDave, Jones, 3000, FL, John,\
    \ Jones, 4000, CA\nDave, Jones, 5000, NY, Mike, Jones, 6000, NY\nTony, Jones,\
    \ 7000, WA\n```\n\n清单 B.33 展示了 `mixed-data2.sh` 的内容，该脚本演示了如何重新对齐清单 B.31 中的数据集。\n\
    \n**清单 B.33: mixed-data2.sh**\n\n```\n#-----------------------------------------------\n\
    # 1) 移除空行\n# 2) 移除换行符\n# 3) 每 8 个字段后打印一个换行符\n# 4) 移除每行末尾的逗号\n#-----------------------------------------------\n\
    inputfile=\"mixed-data2.txt\"\noutputfile=\"aligned-data2.txt\"\n\ngrep -v \"\
    ^$\" $inputfile |awk -F\",\" '{printf(\"%s\",$0)}' | awk '\nBEGIN { columnCount\
    \ = 4; rowCount = 2; currRow = 0 }\n{\n    for(i=1; i<=NF; i++) {\n        printf(\"\
    %s \", $i)\n        if( i % columnCount == 0) { ++currRow }\n        if(currRow\
    \ > 0 && currRow % rowCount == 0) {currRow = 0;\n            print \"\"}\n   \
    \ }\n}' > temp-columns\n\n# 4) 移除输出中的末尾逗号：\ncat temp-columns | sed 's/, $//' |\
    \ sed 's/ $//' > $outputfile\n```\n\n清单 B.33 与清单 B.30 非常相似。关键思想是在处理了一对“常规”记录后打印一个换行符，这通过清单\
    \ B.33 中以粗体显示的代码实现。\n\n现在，你可以通过将 `rowCount` 变量的初始值更改为任何其他正整数，非常容易地推广清单 B.33，代码无需任何进一步修改即可正确工作。例如，如果你将\
    \ `rowCount` 初始化为 5，那么新数据集中的每一行（最后一行输出可能除外）都将包含 5 条“常规”数据记录。\n\n## 从文本文件中移除一列\n\
    \n清单 B.34 展示了 `VariableColumns.txt` 的内容，其中包含不同列数的文本行。\n\n**清单 B.34: VariableColumns.txt**\n\
    \n```\nthis is line one\nthis is line number one\nthis is the third and final\
    \ line\n```\n\n清单 B.35 展示了 `RemoveColumn.sh` 的内容，该脚本从输出中抑制了第一列。\n\n**清单 B.35:\
    \ RemoveColumn.sh**\n\n```\nawk '{ for (i=2; i<=NF; i++) printf \"%s \", $i; printf\
    \ \"\\n\"; }' products.txt\n```\n\n循环范围是从 2 到 NF，遍历除第一个字段外的所有字段。此外，`printf` 显式添加了换行符。上述代码片段的输出如下：\n\
    \n```\n400 new\n300 new\n300 used\n200 used\n100 used\n```\n\n## 数据集中列对齐行的子集\n\
    \n清单 B.35 向你展示了如何对齐数据集的行，而本节中的代码示例演示了如何提取现有列和行的子集。清单 B.36 展示了 `sub-rows-cols.txt`\
    \ 的内容，这是所需的数据集，包含文件 `aligned-data.txt` 中每个偶数行的两列。\n\n**清单 B.36: sub-rows-cols.txt**\n\
    \n```\nSara, 1000\nDave, 3000\nDave, 5000\nTony, 7000\n```\n\n清单 B.37 展示了 `sub-rows-cols.sh`\
    \ 的内容，该脚本演示了如何生成清单 B.36 中的数据集。大部分代码与清单 B.33 相同，新代码以粗体显示。\n\n**清单 B.37: sub-rows-cols.sh**\n\
    \n```\n#----------------------------------------\n# 1) 移除空行\n# 2) 移除换行符\n# 3)\
    \ 每四个字段后打印一个换行符\n# 4) 移除每行末尾的逗号\n#----------------------------------------\ninputfile=\"\
    mixed-data.txt\"\n\ngrep -v \"^$\" $inputfile |awk -F\",\" '{printf(\"%s\",$0)}'\
    \ | awk '\nBEGIN { columnCount = 4 }\n{\n    for(i=1; i<=NF; i++) {\n        printf(\"\
    %s \", $i)\n        if( i % columnCount  == 0) { print \"\" }\n    }\n}' > temp-columns\n\
    \n# 4) 移除输出中的末尾逗号：\ncat temp-columns | sed 's/, $//' | sed 's/$//' > temp-columns2\n\
    \ncat temp-columns2 | awk '\nBEGIN { rowCount = 2; currRow = 0 }\n{\n    if(currRow\
    \ % rowCount == 0) { print $1, $3 }\n    ++currRow\n}' > temp-columns3\n\ncat\
    \ temp-columns3 | sed 's/,$//' | sed 's/ $//' > $outputfile\n```\n\n清单 B.37 包含一个新的代码块，该代码块将步骤\
    \ #4 的输出重定向到一个临时文件 `temp-columns2`，其内容由清单 B.37 最后部分的另一个 `awk` 命令处理。请注意，该 `awk`\
    \ 命令包含一个 `BEGIN` 块，该块将变量 `rowCount` 和 `currRow` 分别初始化为 2 和 0。\n\n主块在当前行号为偶数时打印当前行的第\
    \ 1 列和第 3 列，然后 `currRow` 的值递增。该 `awk` 命令的输出被重定向到另一个临时文件，该文件是最终代码片段的输入，该片段使用 `cat`\
    \ 命令和两次 `sed` 命令来移除末尾的逗号和空格，如下所示：\n\n```\ncat temp-columns3 | sed 's/,$//' | sed\
    \ 's/ $//' > $outputfile\n```\n\n还有其他方法可以实现清单 B.37 中的功能，主要目的是向你展示组合各种 bash 命令的不同技术。\n\
    \n## 统计数据集中的词频\n\n清单 B.38 展示了 `WordCounts1.sh` 的内容，该脚本演示了如何统计文件中单词的频率。"
