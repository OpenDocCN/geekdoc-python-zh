    \ two NumPy arrays called `a` and `b`, followed by five `print` statements that\
    \ display the contents of `a` and `b`, their Hadamard product, and their inner\
    \ product that's calculated in two different ways. The output from launching Listing\
    \ 2.16 is as follows:\n\n```\n('a:            ', array([1, 2]))\n('b:        \
    \    ', array([3, 4]))\n('a*b:          ', array([3, 8]))\n('np.sum(a*b):  ',\
    \ 11)\n('(a*b.sum()):  ', 11)\n```\n\n## NumPy and the reshape() Method\n\nNumPy\
    \ arrays support the `reshape` method, which enables you to restructure the dimensions\
    \ of an array of numbers. In general, if an array contains `m` elements, where\
    \ `m` is a positive integer, then that array can be restructured as an `m1 x m2`\
