    \ B.39: WordCounts2.sh\n\n```\nawk '\n{\n    # convert everything to lower case\n\
    \    $0 = tolower($0)\n\n    # remove punctuation\n    #gsub(/[^[:alnum:]_[:blank:]]/,\
    \ \"\", $0)\n\n    for(i=1; i<=NF; i++) {\n        freq[$i]++\n    }\n}\nEND {\n\
    \    for(word in freq) {\n        printf \"%s\\t%d\\n\", word, freq[word]\n  \
    \  }\n}\n' columns4.txt\n```\n\nListing B.39 contains almost identical content\
    \ to Listing B.38, with the addition of the following code snippet that converts\
    \ the text in each input line to lowercase letters, as shown here:\n\n```\n$0\
    \ = tolower($0)\n```\n\nListing B.40 displays the content of `columns4.txt`.\n\
    \n## Listing B.40: columns4.txt\n\n```\n123 ONE TWO\n456 three four\nONE TWO THREE\
    \ FOUR\nfive 123 six\none two three\nfour five\n```\n\nThe output from launching\
    \ Listing B.39 with `columns4.txt` is here:\n\n```\n456    1\ntwo    3\none  \
    \  3\nthree  3\nsix    1\n123    2\nfour   3\nfive   2\n```\n\n## Displaying Only\
    \ “Pure” Words in a Dataset\n\nFor simplicity, let’s work with a text string and\
    \ that way we can see the intermediate results as we work toward the solution.\
    \ This example will be familiar from prior chapters, but now we see how `awk`\
    \ does it.\n\nListing B.41 displays the content of `onlywords.sh` that contains\
    \ three `awk` commands for displaying the words, integers, and alphanumeric strings\
    \ in a text string.\n\n## Listing B.41: onlywords.sh\n\n```\nx=\"ghi abc Ghi 123\
    \ #def5 123z\"\n\necho \"Only words:\"\necho $x |tr -s ' ' '\\n' | awk -F\" \"\
    \ '{\n    if($0 ~ /^[a-zA-Z]+$/) { print $0 }\n}' | sort | uniq\necho\n\necho\
    \ \"Only integers:\"\necho $x |tr -s ' ' '\\n' | awk -F\" \" '{\n  if($0 ~ /^[0-9]+$/)\
    \ { print $0 }\n}' | sort | uniq\necho\n\necho \"Only alphanumeric words:\"\n\
    echo $x |tr -s ' ' '\\n' | awk -F\" \" '{\n  if($0 ~ /^[0-9a-zA-Z]+$/) { print\
    \ $0 }\n}' | sort | uniq\necho\n```\n\nListing B.41 starts by initializing the\
    \ variable x:\n\n```\nx=\"ghi abc Ghi 123 #def5 123z\"\n```\n\nThe next step is\
    \ to split x into words:\n\n```\necho $x |tr -s ' ' '\\n'\n```\n\nThe output is\
    \ here:\n\n```\nghi\nabc\nGhi\n123\n#def5\n123z\n```\n\nThe third step is to invoke\
    \ awk and check for words that match the regular expression ^[a-zA-Z]+, which\
    \ matches any string consisting of one or more uppercase and/or lowercase letters\
    \ (and nothing else):\n\n```\nif($0 ~ /^[a-zA-Z]+$/) { print $0 }\n```\n\nThe\
    \ output is here:\n\n```\nghi\nabc\nGhi\n```\n\nFinally, if you also want to sort\
    \ the output and print only the unique words, redirect the output from the awk\
    \ command to the sort command and the uniq command.\n\nThe second awk command\
    \ uses the regular expression ^[0-9]+ to check for integers and the third awk\
    \ command uses the regular expression ^[0-9a-zA-Z]+ to check for alphanumeric\
    \ words. The output from launching Listing B.41 is here:\n\n```\nOnly words:\n\
    Ghi\nabc\nghi\n\nOnly integers:\n123\n\nOnly alphanumeric words:\n123\n123z\n\
    Ghi\nabc\nghi\n```\n\nYou can replace the variable x with a dataset in order to\
    \ retrieve only alphabetic strings from that dataset.\n\n## Working with Multi-line\
    \ Records in awk\n\nListing B.42 displays the content of `employee.txt` and Listing\
    \ B.43 displays the content of `Employees.sh` that illustrates how to concatenate\
    \ text lines in a file.\n\n## Listing B.42: employees.txt\n\n```\nName: Jane Edwards\n\
    EmpId: 12345\nAddress: 123 Main Street Chicago Illinois\n\nName: John Smith\n\
    EmpId: 23456\nAddress: 432 Lombard Avenue SF California\n```\n\n## Listing B.43:\
    \ employees.sh\n\n```\ninputfile=\"employees.txt\"\noutputfile=\"employees2.txt\"\
    \n\nawk '\n{\n    if($0 ~ /^Name:/) {\n        x = substr($0,8) \",\"\n      \
    \  next\n    }\n\n    if( $0 ~ /^Empid:/) {\n        #skip the Empid data row\n\
    \        #x = x substr($0,7) \",\"\n        next\n    }\n\n    if($0 ~ /^Address:/)\
    \ {\n        x = x substr($0,9)\n        print x\n    }\n}\n' < $inputfile > $outputfile\n\
    ```\n\nThe output from launching the code in Listing B.43 is here:\n\n```\nJane\
    \ Edwards, 123 Main Street Chicago Illinois\nJohn Smith, 432 Lombard Avenue SF\
    \ California\n```\n\nNow that you have seen a plethora of awk code snippets and\
    \ shell scripts containing the awk command that illustrate various type of tasks\
    \ that you can perform on files and datasets, you are ready for some uses cases.\
    \ The next section (which is the first use case) shows you how to replace multiple\
    \ field delimiters with a single delimiter, and the second use case shows you\
    \ how to manipulate date strings.\n\n## A Simple Use Case\n\nThe code sample in\
    \ this section shows you how to use the awk command to split the comma-separated\
    \ fields in the rows of a dataset, where fields can contain nested quotes of arbitrary\
    \ depth.\n\nListing B.44 displays the content of the file quotes3.csv that contains\
    \ a \",\" delimiter and multiple quoted fields.\n\n## Listing B.44: quotes3.csv\n\
    \n```\nfield5,field4,field3,\"field2,foo,bar\",field1,field6,field7,\"fieldZ\"\
    \nfname1,\"fname2,other,stuff\",fname3,\"fname4,foo,bar\",fname5\n\"lname1,a,b\"\
    ,\"lname2,c,d\",\"lname3,e,f\",\"lname4,foo,bar\",lname5\n```\n\nListing B.45\
    \ displays the content of the file delim1.sh that illustrates how to replace the\
    \ delimiters in delim1.csv with a \",\" character.\n\n## Listing B.45: delim1.sh\n\
    \n```\n#inputfile=\"quotes1.csv\"\n#inputfile=\"quotes2.csv\"\ninputfile=\"quotes3.csv\"\
    \n\ngrep -v \"^$\" $inputfile | awk '\n{\n    print \"LINE #\" NR \": \" $0\n\
    \    printf (\"-----------------------------\\n\")\n    for (i = 0; ++i <= NF;)\n\
    \        printf \"field #%d : %s\\n\", i, $i\n    printf (\"\\n\")\n}' FPAT='([,]+)|(\"\
    [^\"]+\")' < $inputfile\n```\n\nThe output from launching the shell script in\
    \ Listing B.45 is here:\n\n```\nLINE #1:\nfield5,field4,field3,\"field2,foo,bar\"\
    ,field1,field6,field7,\"fieldZ\"\n-----------------------------\nfield #1 : field5\n\
    field #2 : field4\nfield #3 : field3\nfield #4 : \"field2,foo,bar\"\nfield #5\
    \ : field1\nfield #6 : field6\nfield #7 : field7\nfield #8 : \"fieldZ\"\n\nLINE\
    \ #2:\nfname1,\"fname2,other,stuff\",fname3,\"fname4,foo,bar\",fname5\n-----------------------------\n\
    field #1 : fname1\nfield #2 : \"fname2,other,stuff\"\nfield #3 : fname3\nfield\
    \ #4 : \"fname4,foo,bar\"\nfield #5 : fname5\n\nLINE #3:\n\"lname1,a,b\",\"lname2,c,d\"\
    ,\"lname3,e,f\",\"lname4,foo,bar\",lname5\n-----------------------------\nfield\
    \ #1 : \"lname1,a,b\"\nfield #2 : \"lname2,c,d\"\nfield #3 : \"lname3,e,f\"\n\
    field #4 : \"lname4,foo,bar\"\nfield #5 : lname5\n\nLINE #4: \"Outer1 \"Inner\
    \ \"Inner \"Inner C\" B\" A\"\nOuter1\",\"XYZ1,c,d\",\"XYZ2lname3,e,f\"\n-----------------------------\n\
    field #1 : \"Outer1 \"Inner \"Inner \"Inner C\" B\" A\" Outer1\"\nfield #2 : \"\
    XYZ1,c,d\"\nfield #3 : \"XYZ2lname3,e,f\"\n\nLINE #5:\n-----------------------------\n\
    ```\n\nAs you can see, the task in this section is very easily solved via the\
    \ awk command.\n\n## Another Use Case\n\nThe code sample in this section shows\
    \ you how to use the `awk` command to reformat the date field in a dataset and\
    \ change the order of the fields in the new dataset. For example, say we are given\
    \ the following input line in the original dataset:\n\n```\nJane,Smith,20140805234658\n\
    ```\n\nThe reformatted line in the output dataset has this format:\n\n```\n2014-08-05\
    \ 23:46:58,Jane,Smith\n```\n\nListing B.46 displays the content of the file `dates2.csv`\
    \ that contains a `,` delimiter and three fields.\n\n## Listing B.46: dates2.csv\n\
    \n```\nJane,Smith,20140805234658\nJack,Jones,20170805234652\nDave,Stone,20160805234655\n\
    John,Smith,20130805234646\nJean,Davis,20140805234649\nThad,Smith,20150805234637\n\
    Jack,Pruit,20160805234638\n```\n\nListing B.47 displays the content of `string2date2.sh`\
    \ that converts the date field to a new format and shifts the new date to the\
    \ first field.\n\n## Listing B.47: string2date2.sh\n\n```\ninputfile=\"dates2.csv\"\
    \noutputfile=\"formatteddates2.csv\"\n\nrm -f $outputfile; touch $outputfile\n\
    \nfor line in `cat $inputfile`\ndo\n  fname=`echo $line |cut -d\",\" -f1`\n  lname=`echo\
    \ $line |cut -d\",\" -f2`\n  date1=`echo $line |cut -d\",\" -f3`\n\n  # convert\
    \ to new date format\n  newdate=`echo $date1 | awk '{ print\nsubstr($0,1,4)\"\
    -\"substr($0,5,2)\"-\"substr($0,7,2)\"\n\"substr($0,9,2)\":\"substr($0,11,2)\"\
    :\"substr($0,13,2)}'`\n\n  # append newly formatted row to output file\n  echo\
    \ \"${newdate},${fname},${lname}\" >> $outputfile\ndone\n```"
