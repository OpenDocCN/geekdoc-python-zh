    \       3.6                1.4               0.2\n\n=> Class labels: [0 1 2]\n\
    ```\n\n## The Iris Dataset in Sklearn (2)\n\nThe Iris dataset in Sklearn consists\
    \ of the lengths of three different types of Iris-based petals and sepals: Setosa,\
    \ Versicolor, and Virginica. These numeric values are stored in a 150x4 NumPy.ndarray.\n\
    \nNote that the rows in the Iris dataset are the sample images, and the columns\
    \ consist of the values for the Sepal Length, Sepal Width, Petal Length, and Petal\
    \ Width of each image. Listing 4.6 shows the content of `sklearn_iris2.py` that\
    \ illustrates how to display detailed information about the Iris dataset and a\
    \ chart that displays the distributions of the four features.\n\n**Listing 4.6:\
    \ sklearn_iris2.py**\n\n```python\nfrom sklearn import datasets\nfrom sklearn.model_selection\
    \ import train_test_split\n\niris = datasets.load_iris()\ndata = iris.data\n\n\
    print(\"iris data shape:  \", data.shape)\nprint(\"iris target shape:\", iris.target.shape)\n\
    print(\"first 5 rows iris:\")\nprint(data[0:5])\nprint(\"keys:\", iris.keys())\n\
    print(\"\")\n\nn_samples, n_features = iris.data.shape\nprint('Number of samples:\
    \ ', n_samples)\nprint('Number of features:', n_features)\nprint(\"\")\n\nprint(\"\
    sepal length/width and petal length/width:\")\nprint(iris.data[0])\n\nimport numpy\
    \ as np\nnp.bincount(iris.target)\n\nprint(\"target names:\", iris.target_names)\n\
    \nprint(\"mean: %s \" % data.mean(axis=0))\nprint(\"std:  %s \" % data.std(axis=0))\n\
    \n# load the data into train and test datasets:\nX_train, X_test, y_train, y_test\
    \ = train_test_split(iris.data,\n    iris.target, random_state=0)\n\nfrom sklearn.preprocessing\
    \ import StandardScaler\nscaler = StandardScaler()\nscaler.fit(X_train)\n\n# rescale\
    \ the train datasets:\nX_train_scaled = scaler.transform(X_train)\nprint(\"X_train_scaled\
    \ shape:\", X_train_scaled.shape)\n\nprint(\"mean : %s \" % X_train_scaled.mean(axis=0))\n\
    print(\"standard deviation : %s \" % X_train_scaled.std(axis=0))\n\nimport matplotlib.pyplot\
    \ as plt\n\nx_index = 3\ncolors = ['blue', 'red', 'green']\n\nfor label, color\
    \ in zip(range(len(iris.target_names)),\n                        colors):\n  \
    \  plt.hist(iris.data[iris.target==label, x_index],\n             label=iris.target_names[label],\n\
    \             color=color)\n\nplt.xlabel(iris.feature_names[x_index])\nplt.legend(loc='upper\
    \ right')\nplt.show()\n```\n\nListing 4.6 starts with an `import` statement followed\
    \ by the variables `iris` and `data`, where the latter contains the Iris dataset.\
    \ The first half of Listing 4.6 consists of self-explanatory code, such as displaying\
    \ the number of images and the number of features in the Iris dataset.\n\nThe\
    \ second portion of Listing 4.6 imports the `StandardScaler` class in Sklearn,\
    \ which rescales each value in `X_train` by subtracting the mean and then dividing\
    \ by the standard deviation. The final block of code in Listing 4.6 generates\
    \ a histogram that displays some of the images in the Iris dataset. The output\
    \ from Listing 4.6 is as follows:\n\n```\niris data shape:   (150, 4)\niris target\
    \ shape: (150,)\nfirst 5 rows iris:\n[[5.1 3.5 1.4 0.2]\n [4.9 3.0 1.4 0.2]\n\
    \ [4.7 3.2 1.3 0.2]\n [4.6 3.1 1.5 0.2]\n [5.0 3.6 1.4 0.2]]\nkeys: dict_keys(['target',\
    \ 'target_names', 'data', 'feature_names', 'DESCR'])\n\nNumber of samples:  150\n\
    Number of features: 4\n\nsepal length/width and petal length/width:\n[5.1 3.5\
    \ 1.4 0.2]\ntarget names: ['setosa' 'versicolor' 'virginica']\nmean: [5.84333333\
    \ 3.054       3.75866667 1.19866667]\nstd:  [0.82530129 0.43214658 1.75852918\
    \ 0.76061262]\nX_train_scaled shape: (112, 4)\nmean : [ 1.21331516e-15 -4.41115398e-17\
    \  7.13714802e-17\n 2.57730345e-17]\nstandard deviation : [1. 1. 1. 1.]\n```\n\
