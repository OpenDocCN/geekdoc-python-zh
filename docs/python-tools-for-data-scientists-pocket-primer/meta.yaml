    \ from 1x6 to 6x1. The final invocation changes the shape of x from 6x1 to 1x6\
    \ again.\n\nEach invocation of the reshape() method is followed by a print() statement\
    \ so that you can see the effect of the invocation. The output from launching\
    \ Listing 2.17 is as follows:\n\n```\n(3, 2)\n(2, 3)\n('x1:', array([[2, 3, 4],\n\
    \       [5, 6, 7]]))\n(6,)\n('x2:', array([2, 3, 4, 5, 6, 7]))\n(6, 1)\n('x3:',\
    \ array([[2],\n       [3],\n       [4],\n       [5],\n       [6],\n       [7]]))\n\
