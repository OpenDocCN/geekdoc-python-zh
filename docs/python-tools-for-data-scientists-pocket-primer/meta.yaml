    \ of the `year` and `month` columns to strings.\n\nThe next code snippet in Listing\
    \ 3.14 uses the `split()` method to split the name column into the columns `fname`\
    \ and `lname` that contain the first name and last name, respectively, of each\
    \ employee's name:\n\n```python\nemps['fname'],emps['lname'] = emps['name'].str.split(\"\
    -\",1).str\n```\n\nThe next code snippet concatenates the contents of the `year`\
    \ and `month` string with a \"#\" character to create a new column called `hdate1`:\n\
    \n```python\nemps['hdate1'] = emps['year'].astype(str)+\"#\"+emps['month'].astype(str)\n\
    ```\n\nThe final code snippet concatenates the contents of the `year` and `month`\
    \ string with a \"-\" to create a new column called `hdate2`, as shown here:\n\
    \n```python\nemps['hdate2'] = emps[['year','month']].agg('-'.join, axis=1)\n```\n\
