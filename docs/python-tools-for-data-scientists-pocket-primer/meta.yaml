    \ The images in the Iris dataset based on the code in Listing 4.6.\n\n## The Faces\
    \ Dataset in Sklearn (Optional)\n\nThe Olivetti Faces dataset contains a set of\
    \ face images that were taken between April 1992 and April 1994 at AT&T Laboratories\
    \ Cambridge. As you will see in Listing 4.7, the `Sklearn.datasets.fetch_olivetti_faces`\
    \ function is the data fetching and caching function that downloads the data archive\
    \ from AT&T.\n\nListing 4.7 shows the code from `sklearn_faces.py` that displays\
    \ the contents of the Faces dataset in Sklearn.\n\n**Listing 4.7: sklearn_faces.py**\n\
    \n```python\nimport Sklearn\nfrom sklearn.datasets import fetch_olivetti_faces\n\
    \nfaces = fetch_olivetti_faces()\n\nimport matplotlib.pyplot as plt\n\n# display\
    \ figures in inches\nfig = plt.figure(figsize=(6, 6))\nfig.subplots_adjust(left=0,\
    \ right=1, bottom=0, top=1,\n                    hspace=0.05, wspace=0.05)\n\n\
    # plot the faces:\nfor i in range(64):\n    ax = fig.add_subplot(8, 8, i + 1,\
