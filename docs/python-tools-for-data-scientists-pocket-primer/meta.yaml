    \ of the random points\nplt.figure()\nplt.scatter(trX,trY)\n# Draw one line with\
    \ the line function\nplt.plot(trX, .2 + 2 * trX)\nplt.show()\n```\n\n清单 6.3 定义了\
    \ NumPy 变量 `trX`，其中包含 101 个介于 -1 和 1 之间（包含端点）的等间距数字。变量 `trY` 分两部分定义：第一部分是 `2*trX`，第二部分是一个随机值，该值部分基于一维数组\
