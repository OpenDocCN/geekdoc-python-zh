    \ array([2, 3]))\n('a*b: ', array([2, 6]))\n('dot1:', 8)\n('dot2:', 8)\n```\n\n\
    ## NumPy and Dot Products (2)\n\nNumPy arrays support a “dot” method for calculating\
    \ the inner product of an array of numbers, which uses the same formula that you\
