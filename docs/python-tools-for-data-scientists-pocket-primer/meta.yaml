- img_proc: true
  md: 'example, the output of this command becomes the input to the sed command because
    of the pipe (“|”) symbol.


    The `sed` command consists of three parts, all of which are connected by the `-e`
    switch. You can think of `-e` as indicating “there is more processing to be done”
    by the `sed` command. In this example, there are three occurrences of `-e`, which
    means that the `sed` command will execute three snippets.


    The first code snippet is `''s/:/,/''`, which translates into “replace each semi-colon
    with a comma.” The result of this operation is passed to the next code snippet,
    which is `''s/|/,/''`. This code snippet translates into “replace each pipe symbol
    with a comma.” The result of this operation is passed to the next code snippet,
    which is `''s/\^/,/''`. This code snippet translates into “replace each caret
    symbol (^) with a comma.” The result of this operation is sent to the standard
    output, which can be redirected to another text file. Launch the code in Listing
    5.6 and you will see the following output:


    ```

    1000,Jane,Edwards,Sales

    2000,Tom,Smith,Development

    3000,Dave,Del Ray,Marketing

    ```


    There are three comments to keep in mind. First, the snippet contains a backslash
    because the caret symbol (^) is a meta character, so we need to “escape” this
    character. The same is true for other meta characters (such as “$” and “.”).


    Second, you can easily extend the `sed` command for each new delimiter that you
    encounter as a field separator in a text file: simply follow the pattern that
    you see in Listing 5.6 for each new delimiter.


    Third, redirect the output of `delimiter1.sh` to the text file `delimiter2.txt`
    by launching the following command:


    ```

    ./delimiter1.sh > delimiter2.txt

    ```


    If an error occurs in the preceding code snippet, make sure that `delimiter1.sh`
    is executable by invoking the following command:


    ```

    chmod 755 delimiter1.sh

    ```


    This concludes the example involving the `sed` command line utility, which is
    a very powerful utility for processing text files. Check online for articles and
    blog posts if you want to learn more about the `sed` utility.'
