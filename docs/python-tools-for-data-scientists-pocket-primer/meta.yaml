    You also learned how to read Excel spreadsheets and perform numeric calculations
    on the data in those spreadsheets, such as the minimum, mean, and maximum values
    in numeric columns. Then, you saw how to create Pandas data frames from data stored
    in CSV files.


    We briefly introduced JSON, along with an example of converting a Python dictionary
    to JSON-based data (and vice versa).'
