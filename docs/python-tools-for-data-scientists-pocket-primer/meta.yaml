    # What is Linear Regression?


    Linear regression was created in 1805 (more than two hundred years ago), and it''s
    an important algorithm in statistical analysis and machine learning. Any decent
    statistical package supports linear regression and invariably supports polynomial
    regression. Linear regression involves lines, which are polynomials with one degree,
    whereas polynomial regression involves fitting polynomials of degrees greater
    than one to a dataset.


    In general terms, linear regression finds the equation of the best fitting hyperplane
    that approximates a dataset, where a hyperplane has a degree one less than the
    dimensionality of the dataset. In particular, if the dataset is in the Euclidean
    plane, the hyperplane is simply a line; if the dataset is in 3D, the hyperplane
    is a “regular” plane.


    Linear regression is suitable when the points in a dataset are distributed in
    such a way that they can reasonably be approximated by a hyperplane. If not, you
    can try to fit other types of multi-variable polynomial surfaces to the points
    in the dataset.'
  merge: -1
  pgno: 76
- img_proc: true
  md: 'Keep in mind two other details. First, the best fitting hyperplane does not
    necessarily intersect all (or even most of) the points in the dataset. In fact,
    the best fitting hyperplane might not intersect any points in the dataset. The
    purpose of a best fitting hyperplane is to approximate the points in dataset as
    closely as possible. Second, linear regression is not the same as curve fitting,
    which attempts to find a polynomial that passes through a set of points.


    Here are some details about curve fitting. Given n points in the plane (no two
    of which have the same x value), there is a polynomial of a degree less than or
    equal to n-1 that passes through those points. Thus, a line (which has degree
    one) passes through any pair of non-vertical points in the plane. For any triple
    of points in the plane, there is a quadratic equation or a line that passes through
    those points.


    In some cases, a lower degree polynomial is available. For instance, consider
    the set of 100 points in which the x value equals the y value. The line y = x
    (a polynomial of degree one) passes through all of those points.


    However, the extent to which a line “represents” a set of points in the plane
    depends on how closely those points can be approximated by a line.


    # What is Multivariate Analysis?


    *Multivariate analysis* generalizes the equation of a line in the Euclidean plane,
    and it has the following form:


    y = w1*x1 + w2*x2 + . . . + wn*xn + b


    As you can see, the preceding equation contains a linear combination of the variables
    x1, x2, . . ., xn. In this book, we usually work with datasets that involve lines
    in the Euclidean plane.


    # What about Non-Linear Datasets?


    Simple linear regression finds the best fitting line that fits a dataset, but
    what happens if the dataset does not fit a line in the plane? This is an excellent
    point! In such a scenario, we look for other curves to approximate the dataset,
    such a quadratic, cubic, or higher-degree polynomials. However, these alternatives
    involve trade-offs, as we’ll discuss later.


    Another possibility is to use a continuous piece-wise linear function, which is
    a function that comprises a set of line segments, where the adjacent line segments
    are connected. If one or more pairs of adjacent line segments are not connected,
    then it’s a piece-wise linear function (i.e., the function'
  merge: -1
  pgno: 77
- img_proc: true
  md: 'is discontinuous). In either case, line segments have one degree, which involves
    a lower computational complexity than higher-order polynomials.


    Thus, given a set of points in the plane, try to find the best fitting line that
    fits those points, after addressing the following questions:


    +   1) How do we know that a line fits the data?

    2) What if a different type of curve is a better fit?

    3) What does “best fit” mean?


    One way to check if a line fits the data well is through a simple visual check:
    display the data in a graph and if the data conforms to the shape of a line reasonably
    well, then a line might be a good fit. However, this is a subjective decision,
    and a sample dataset that does not fit a line is shown in Figure 2.7.


    Figure 2.7 shows a dataset containing four points that do not fit a line.


    ![](img/a5bd78f899e04acbdf3949ed2383b115_78_0.png)


    If a line does not appear to be a good fit for the data, then perhaps a quadratic
    or cubic (or even higher degree) polynomial has the potential of being a better
    fit. Let’s defer the non-linear scenario and make the assumption that a line would
    be a good fit for the data. There is a well-known technique for finding the best
    fitting line for such a dataset, and it’s called Mean Squared Error (MSE).


    # The MSE (Mean Squared Error) Formula


    Figure 2.8 shows the formula for the MSE (Mean Squared Error). The MSE is the
    sum of the squares of the difference between an *actual* y value and the *predicted*
    y value, divided by the number of points. Note that the'
  merge: -1
  pgno: 78
- img_proc: true
  md: 'predicted y value is the y value that each data point would have if that data
    point were actually on the best-fitting line.


    In general, the goal is to minimize the error, which determines the best fitting
    line in the case of linear regression. However, you might be satisfied with a
    “good enough” value when the time and/or cost for any additional reduction in
    the error is deemed prohibitive, which means that this decision is not a purely
    programmatic decision.


    Figure 2.8 shows the formula for MSE for calculating the best-fitting line for
    a set of points in the plane.


    $$\text{MSE} = \frac{1}{n} \sum_{i=1}^{n} (Y_i - \hat{Y}_i)^2$$


    **FIGURE 2.8** The MSE formula.


    # Other Error Types


    Although we only discuss the MSE for linear regression in this book, there are
    other types of formulas for errors that you can use for linear regression, some
    of which are listed here:


    +   - MSE

    - RMSE

    - RMSPROP

    - MAE


    The MSE is the basis for the preceding error types. For example, RMSE is the Root
    Mean Squared Error, which is the square root of the MSE.


    The MAE is the *Mean Absolute Error*, which is the sum of the absolute value of
    the differences of the y terms (not the square of the differences of the y terms).


    The RMSProp optimizer utilizes the magnitude of recent gradients to normalize
    the gradients. Maintain a moving average over the *Root Mean Squared* (RMS, which
    is the square root of the MSE) gradients, and then divide that term by the current
    gradient.


    Although it’s easier to compute the derivative of MSE (because it’s a differentiable
    function), it’s also true that MSE is more susceptible to outliers, more so than
    MAE. The reason is simple. A squared term can be significantly larger than adding
    the absolute value of a term. For example, if a difference term is 10, then the
    squared term 100 is added to MSE,'
  merge: -1
  pgno: 79
- img_proc: true
  md: 'whereas only 10 is added to MAE. Similarly, if a difference term is −20, then
    the squared term 400 is added to MSE, whereas only 20 (which is the absolute value
    of −20) is added to MAE.


    # Non-Linear Least Squares


    When predicting housing prices, where the dataset contains a wide range of values,
    techniques such as linear regression or random forests can cause the model to
    overfit the samples with the highest values to reduce quantities such as the mean
    absolute error.


    In this scenario, you probably want an error metric, such as the relative error,
    that reduces the importance of fitting the samples with the largest values. This
    technique is called *non-linear least squares*, which may use a log-based transformation
    of labels and predicted values.


