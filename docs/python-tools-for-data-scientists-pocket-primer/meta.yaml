    \ np.array([1,2])\nb = np.array([2,3])\n\ndot2 = 0\nfor e,f in zip(a,b):\n   \
    \ dot2 += e*f\n\nprint('a: ',a)\nprint('b: ',b)\nprint('a*b: ',a*b)\nprint('dot1:',a.dot(b))\n\
    print('dot2:',dot2)\n```\n\nListing 2.13 contains two NumPy arrays called a and\
    \ b followed by a simple loop that computes the dot product of a and b. The next\
    \ section contains five print statements that display the contents of a and b,\
