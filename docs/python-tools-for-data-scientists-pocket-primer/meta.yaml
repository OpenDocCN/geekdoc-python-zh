- md: "## Data Cleaning on a Kaggle Dataset\n\nIn this section, we perform data cleaning\
    \ on a “real” dataset using an awk script that performs data cleaning on the following\
    \ dataset:\nhttps://www.kaggle.com/fehmifratpolat/marketing-report\n\nThe awk\
    \ script follows most of the data cleaning steps that are performed in R that\
    \ are discussed in the following online article:\nhttps://towardsdatascience.com/cleaning-and-preparing-marketing-data-in-r-prior-to-machine-learning-or-analysis-ec1a12079f1\n\
    \nListing 5.29 displays the content of convert_marketing.sh that shows you how\
    \ to perform various data cleaning steps, as indicated in the comments in the\
    \ code.\n\nListing 5.29: convert_marketing.sh\n\n```\n# Kaggle dataset: https://www.kaggle.com/fehmifratpolat/marketing-report\n\
    # step 1: extract the 1st, 3rd, 4th, and 7th fields:\ncat mark1.csv |awk -F\"\
    ;\" '{print $1 \":\" $3 \":\" $4 \":\" $7}' >mark2.csv\n# step 2: replace \"Not\
    \ tracked\" with \"direct\":\n# peri-Co-od;salesChannel;platformcode;marketingInvestment\n\
    # date;channel;platformcode;;spend\ncat mark2.csv |awk -F\":\" '\n{\n    $3 =\
    \ tolower($3)\n\n    if( $3 ~ /Not tracked/ ) {\n        $3 = \"direct\"\n   \
    \ } else if( $3 ~ /unpaid/ ) {\n        $3 = \"organic\"\n    } else if( $3 ~\
    \ /Silverpop/ ) {\n        $3 = \"email\"\n    }\n\n    if( $4 ~ /,/ ) {\n   \
    \     split($4,arr1,\",\")\n        $4 = arr1[1] \".\" arr1[2]\n    }\n    print\
    \ $1 \":\" $2 \":\" $3 \":\" $4\n}\n' >mark3.csv\n```\n\n```\n# step 3: replace\
    \ YYYYDDMM with YYYY-MM-YY format:\ncat mark3.csv |awk -F\":\"\n{\n    year  =\
    \ substr($1,1,4)\n    day   = substr($1,5,2)\n    month = substr($1,7,2)\n\n \
    \   printf(\"%s-%s-%s:%s:%s:%s\\n\",year,month,day,$2,$3,$4)\n}\n' >mark4.csv\n\
    \n# step 4: calculate subtotals based on $1+$2+$3:\ncat mark4.csv |awk -F\":\"\
    \n{\n    fields=$1FS$2FS$3;subtotals[fields] += $4\n}\n# step 5: display values\
    \ of subtotals:\nEND{\n    total = 0\n    for (i in subtotals) {\n        printf(\"\
    Subtotal for %44s => %-8d\\n\", i, subtotals[i])\n        total += subtotals[i]\n\
    \    }\n    printf(\"TOTAL REVENUE: => %44d\\n\",total)\n}\n' >mark5.csv\n```\n\
    \nAlthough it's not necessary to split the code into five `awk` scripts, it's\
    \ easier to follow the code, and you will have access to the intermediate files\
    \ that you can inspect to see their contents.\n\nListing 5.29 starts with `step\
    \ 1` that extracts the 1st, 3rd, 4th, and 7th fields from the CSV file `mark1.csv`\
    \ and redirects the output to the CSV file `mark2.csv`, as shown here:\n\n```\n\
    cat mark1.csv |awk -F\";\" '{print $1 \":\" $3 \":\" $4 \":\" $7}'\n>mark2.csv\n\
    ```\n\nStep 2 in Listing 5.29 replaces occurrences of the string “Not tracked”\
    \ with “direct,” the string “unpaid” with “organic,” and the string “Silverpop”\
    \ with the email in $3. In addition, the “,” that appears in $4 is replaced by\
    \ a “.” after which a new string is printed that contains the modifications to\
    \ $3 and $4. Each output line is redirected to the CSV file `mark3.csv`.\n\nStep\
    \ 3 in Listing 5.27 replaces `YYYYDDMM` dates with a `YYYY-MM-YY` format, as shown\
    \ here, after which the output is redirected to the CSV file `mark4.csv`:\n\n\
    ```\nyear  = substr($1,1,4)\nday   = substr($1,5,2)\nmonth = substr($1,7,2)\n\
    printf(\"%s-%s-%s:%s:%s:%s\\n\",year,month,day,$2,$3,$4)\n```\n\nStep 4 in Listing\
    \ 5.29 is probably the most interesting code snippet in this code sample. The\
    \ concatenation of the first three fields, separated by the default field separator,\
    \ form an index for the array subtotals. Each time this combination appears in\
    \ mark4.csv, the corresponding entry in the subtotals array is incremented with\
    \ the value in $4, as shown here:\n\n```\nfields=$1FS$2FS$3;subtotals[fields]\
    \ += $4\n```\n\nAfter the body of this awk script has completed execution, an\
    \ END block (which is labeled step 5) displays the values in the subtotals array,\
    \ along with the grand total, as shown here:\n\n```\ntotal = 0\nfor (i in subtotals)\
    \ {\n    printf(\"Subtotal for %44s => %-8d\\n\", i, subtotals[i])\n    total\
    \ += subtotals[i]\n}\n```\n\nAfter the preceding code has completed execution,\
    \ the output is redirected to the CSV file mark5.csv.\n\nLaunch the code in Listing\
    \ 5.27 that generates a set of intermediate CSV files and a final CSV file named\
    \ mark5.csv. If you want to see the first five lines from each of the intermediate\
    \ files mark1.csv . . . mark5.csv that are generated in Listing 5.27, execute\
    \ a shell script that contains the following code:\n\n```\nfor f in `ls mark*csv`\n\
    do\n    echo \"file: $f\"\n    head -5 $f\ndone\n```\n\nThe output of the preceding\
    \ code block is shown here:\n\n```\nfile: mark1.csv\nperiodCode;reportGranularity;salesChannel;platformCode;channelCode;\n\
    tagCodes;marketingInvestment;impressions;clicks;visits;conversions;\ndeliveries;currencyCode;appliedAttributionModel;periodStartDate\n\
    20200102;Daily;online;Not tracked;\nnotset;;0;0;0;0;16;14;CZK;lastTouch;2020-01-02T00:00:00.0000000\n\
    20200103;Daily;online;Not tracked;\nnotset;;0;0;0;0;13;13;CZK;lastTouch;2020-01-03T00:00:00.0000000\n\
    20200104;Daily;online;Not tracked;\nnotset;;0;0;0;0;6;6;CZK;lastTouch;2020-01-04T00:00:00.0000000\n\
    20200105;Daily;online;Not tracked;\nnotset;;0;0;0;0;1;1;CZK;lastTouch;2020-01-05T00:00:00.0000000\n\
    \nfile: mark2.csv\nperiodCode:salesChannel:platformCode:marketingInvestment\n\
    20200102:online:Not tracked:0\n20200103:online:Not tracked:0\n20200104:online:Not\
    \ tracked:0\n20200105:online:Not tracked:0\n\nfile: mark3.csv\nperiodCode:salesChannel:platformcode:marketingInvestment\n\
    20200102:online:not tracked:0\n20200103:online:not tracked:0\n20200104:online:not\
    \ tracked:0\n20200105:online:not tracked:0\n\nfile: mark4.csv\nperi-Co-od:salesChannel:platformcode:marketingInvestment\n\
    2020-02-01:online:not tracked:0\n2020-03-01:online:not tracked:0\n2020-04-01:online:not\
    \ tracked:0\n2020-05-01:online:not tracked:0\n\nfile: mark5.csv\nSubtotal for\
    \ 2020-12-02:online:organic => 0\nSubtotal for 2020-31-01:online:not tracked =>\
    \ 0\nSubtotal for 2020-10-01:online:facebookbusinessadsmanager => 130\nSubtotal\
    \ for 2020-06-01:online:sklik => 914\nSubtotal for 2020-24-03:online:rtbhouse\
    \ => 0\nTOTAL REVENUE: => 1227857\n```\n\n## Summary\n\nThis chapter started with\
    \ a brief description of data cleaning, followed by examples of replacing NULL\
    \ values with numeric values, replacing multiple values with a single value, and\
    \ converting strings to date values.\n\nNext, you saw how to use the `sed` command\
    \ line utility to replace multiple delimiters in a CSV file with a single delimiter.\
    \ You will also see how to use the `awk` command line utility to restructure a\
    \ CSV file to create a file whose rows have the same number of fields.\n\nIn addition,\
    \ you saw how to perform various tasks in SQL, and then how to perform these tasks\
    \ in a Pandas data frame.\n\n# CHAPTER 6\n\n# DATA VISUALIZATION\n\nThis chapter\
    \ introduces data visualization, along with a wide-ranging collection of Python-based\
    \ code samples that use various visualization tools (including Matplotlib and\
    \ Seaborn) to render charts and graphs. In addition, this chapter contains Python\
    \ code samples that combine Pandas, Matplotlib, and built-in datasets.\n\nThe\
    \ first part of this chapter briefly discusses data visualization, with a short\
    \ list of some data visualization tools, and a list of various types of visualization\
    \ (such as bar graphs and pie charts).\n\nThe second part of this chapter introduces\
    \ you to Matplotlib, which is an open source Python library modeled after MatLab.\
    \ This section also provides the Python code samples for the line graphs (horizontal,\
    \ vertical, and diagonal) in the Euclidean plane that you saw in a previous chapter.\n\
    \nThe third part of the chapter introduces you to Seaborn for data visualization,\
    \ which is a layer above Matplotlib. Although Seaborn does not have all of the\
    \ features that are available in Matplotlib, Seaborn provides an easier set of\
    \ APIs for rendering charts and graphs.\n\nThe final portion of this chapter contains\
    \ a very short introduction to Bokeh, along with a code sample that illustrates\
    \ how to create a more artistic graphics effect with relative ease in Bokeh.\n\
    \n## What is Data Visualization?\n\nData visualization refers to presenting data\
    \ in a graphical manner, such as bar charts, line graphs, heat maps, and many\
    \ other specialized"
  mdcn: "## 在 Kaggle 数据集上进行数据清洗\n\n在本节中，我们将使用一个 awk 脚本对以下“真实”数据集执行数据清洗：\nhttps://www.kaggle.com/fehmifratpolat/marketing-report\n\
    \n该 awk 脚本遵循了在以下在线文章中讨论的、在 R 语言中执行的大多数数据清洗步骤：\nhttps://towardsdatascience.com/cleaning-and-preparing-marketing-data-in-r-prior-to-machine-learning-or-analysis-ec1a12079f1\n\
    \n清单 5.29 展示了 `convert_marketing.sh` 的内容，它向你展示了如何执行各种数据清洗步骤，如代码中的注释所示。\n\n清单 5.29:\
    \ convert_marketing.sh\n\n```\n# Kaggle dataset: https://www.kaggle.com/fehmifratpolat/marketing-report\n\
    # step 1: extract the 1st, 3rd, 4th, and 7th fields:\ncat mark1.csv |awk -F\"\
    ;\" '{print $1 \":\" $3 \":\" $4 \":\" $7}' >mark2.csv\n# step 2: replace \"Not\
    \ tracked\" with \"direct\":\n# peri-Co-od;salesChannel;platformcode;marketingInvestment\n\
    # date;channel;platformcode;;spend\ncat mark2.csv |awk -F\":\"\n{\n    $3 = tolower($3)\n\
    \n    if( $3 ~ /Not tracked/ ) {\n        $3 = \"direct\"\n    } else if( $3 ~\
    \ /unpaid/ ) {\n        $3 = \"organic\"\n    } else if( $3 ~ /Silverpop/ ) {\n\
    \        $3 = \"email\"\n    }\n\n    if( $4 ~ /,/ ) {\n        split($4,arr1,\"\
    ,\")\n        $4 = arr1[1] \".\" arr1[2]\n    }\n    print $1 \":\" $2 \":\" $3\
    \ \":\" $4\n}\n' >mark3.csv\n```\n\n```\n# step 3: replace YYYYDDMM with YYYY-MM-YY\
    \ format:\ncat mark3.csv |awk -F\":\"\n{\n    year  = substr($1,1,4)\n    day\
    \   = substr($1,5,2)\n    month = substr($1,7,2)\n\n    printf(\"%s-%s-%s:%s:%s:%s\\\
    n\",year,month,day,$2,$3,$4)\n}\n' >mark4.csv\n\n# step 4: calculate subtotals\
    \ based on $1+$2+$3:\ncat mark4.csv |awk -F\":\"\n{\n    fields=$1FS$2FS$3;subtotals[fields]\
    \ += $4\n}\n# step 5: display values of subtotals:\nEND{\n    total = 0\n    for\
    \ (i in subtotals) {\n        printf(\"Subtotal for %44s => %-8d\\n\", i, subtotals[i])\n\
    \        total += subtotals[i]\n    }\n    printf(\"TOTAL REVENUE: => %44d\\n\"\
    ,total)\n}\n' >mark5.csv\n```\n\n虽然没有必要将代码拆分成五个 `awk` 脚本，但这样做更容易理解代码，并且你可以访问中间文件来检查其内容。\n\
    \n清单 5.29 以 `step 1` 开始，它从 CSV 文件 `mark1.csv` 中提取第 1、3、4 和 7 个字段，并将输出重定向到 CSV\
    \ 文件 `mark2.csv`，如下所示：\n\n```\ncat mark1.csv |awk -F\";\" '{print $1 \":\" $3\
    \ \":\" $4 \":\" $7}'\n>mark2.csv\n```\n\n清单 5.29 中的步骤 2 将字符串 “Not tracked” 替换为\
    \ “direct”，将字符串 “unpaid” 替换为 “organic”，并将字符串 “Silverpop” 替换为 $3 中的 email。此外，$4\
    \ 中出现的 “,” 被替换为 “.”，然后打印出包含对 $3 和 $4 修改的新字符串。每一行输出都被重定向到 CSV 文件 `mark3.csv`。\n\
    \n清单 5.27 中的步骤 3 将 `YYYYDDMM` 格式的日期替换为 `YYYY-MM-YY` 格式，如下所示，之后输出被重定向到 CSV 文件 `mark4.csv`：\n\
    \n```\nyear  = substr($1,1,4)\nday   = substr($1,5,2)\nmonth = substr($1,7,2)\n\
