  md: '# Permutations and Combinations in SciPy


    As a reminder, the term n! represents the factorial value of non-negative integer,
    which is calculated as follows:


    n! = n*(n-1)*(n-2)* . . . 3*2*1 (and 0! = 1)


    Next, let''s use term P(n) to designate the number of ways to select n objects
    from a set of n objects, where n is a non-negative integer. The formula for P(n)
    is as follows:


    P(n) = n!


    The term C(n, k) represents the number of ways to select k objects from a set
    of n objects, where n and k are non-negative integers and k<=n. The formula for
    C(n, k) is as follows:


    C(n, k) = n! / [(n-k)! * k!]


    Listing 4.8 displays the content of scipy_perms.py that illustrates how to calculate
    the value of C(n, k) in SciPy.


    Listing 4.8: scipy_perms.py


    ```

    from scipy.special import perm


    #find permutation of 5, 2 using perm (N, k) function

    per = perm(5, 2, exact = True)

    print("Perm(5,2):",per)

    ```


