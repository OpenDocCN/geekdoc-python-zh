  md: "# Converting Categorical Data to Numeric Data\n\nOne common task in machine\
    \ learning involves converting a feature containing character data into a feature\
    \ that contains numeric data. Listing 3.8 shows the content of `cat2numeric.py`\
    \ that illustrates how to replace a text field with a corresponding numeric field.\n\
    \n**Listing 3.8: cat2numeric.py**\n\n```\nimport pandas as pd\nimport numpy as\
    \ np\n\ndf = pd.read_csv('sometext.csv', delimiter='\\t')\n\nprint(\"=> First\
    \ five rows (before):\")\nprint(df.head(5))\nprint(\"-----------------------------\"\
    )\nprint()\n\n# map ham/spam to 0/1 values:\ndf['type'] = df['type'].map( {'ham':0\
    \ , 'spam':1} )\n\nprint(\"=> First five rows (after):\")\nprint(df.head(5))\n\
    print(\"-----------------------------\")\n```\n\nListing 3.8 initializes the data\
    \ frame `df` with the contents of the CSV file `sometext.csv`, and then displays\
    \ the contents of the first five rows by invoking `df.head(5)`, which is also\
    \ the default number of rows to display.\n\nThe next code snippet in Listing 3.8\
    \ invokes the `map()` method to replace occurrences of `ham` with 0 and replace\
    \ occurrences of `spam` with 1 in the column labeled `type`, as shown here:\n\n\
    ```\ndf['type'] = df['type'].map( {'ham':0 , 'spam':1} )\n```\n\nThe last portion\
    \ of Listing 3.8 invokes the `head()` method again to display the first five rows\
    \ of the dataset after having renamed the contents of the column type. Launch\
    \ the code in Listing 3.8 to see the following output:\n\n```\n=> First five rows\
