  md: 'Hence, the standardization of {-1, 0, 1} is {-1/0.816, 0/0.816, 1/0.816}, which
    in turn equals the set of values {-1.2254, 0, 1.2254}.


    As another example, suppose that the random variable x has the values {-6, 0,
    6}. Then mu and sigma are calculated as follows:


    ```

    mu = (SUM xi)/n = (-6 + 0 + 6)/3 = 0


    variance = [SUM (xi- mu)^2]/n

    = [(-6-0)^2 + (0-0)^2 + (6-0)^2]/3

    = 72/3

    = 24


    sigma = sqrt(24) = 4.899 (approximate value)

    ```


    Hence, the standardization of {-6, 0, 6} is {-6/4.899, 0/4.899, 6/4.899}, which
    in turn equals the set of values {-1.2247, 0, 1.2247}.


    In the preceding two examples, the mean equals 0 in both cases, but the variance
    and standard deviation are significantly different. The normalization of a set
    of values *always* produces a set of numbers between 0 and 1.


    However, the standardization of a set of values can generate numbers that are
    less than -1 and greater than 1: this will occur when sigma is less than the minimum
    value of every term |mu - xi|, where the latter is the absolute value of the difference
    between mu and each xi value. In the preceding example, the minimum difference
    equals 1, whereas sigma is 0.816, and therefore the largest standardized value
    is greater than 1.


