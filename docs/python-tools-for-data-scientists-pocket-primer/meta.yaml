    # Pandas Data Frames and CSV Files


    The code samples in several earlier sections contain hard-coded data inside the
    Python scripts. However, it''s also common to read data from a CSV file. You can
    use the Python `csv.reader()` function, the NumPy `loadtxt()` function, or the
    Pandas function `read_csv()` function (shown in this section) to read the contents
    of CSV files.


