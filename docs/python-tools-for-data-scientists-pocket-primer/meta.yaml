    >>> ''a'' + ''b''

    ''ab''

    ```


    You can use + or * to concatenate identical strings, as shown here:


    ```

    >>> ''a'' + ''a'' + ''a''

    ''aaa''

    >>> ''a'' * 3

    ''aaa''

    ```


    You can assign strings to variables and print them using the print command:


    ```

    >>> print(''abc'')

    abc

    >>> x = ''abc''

    >>> print(x)

    abc

    >>> y = ''def''

    >>> print(x + y)

    Abcdef

    ```


