  md: "# Working with Variable Column Counts\n\nThis section shows you how to use\
    \ the `awk` command line utility in order to “pad” rows in a CSV file with `NaN`\
    \ values so that all records have the same number of columns.\n\nListing 5.7 displays\
    \ the content `variable_columns.csv` and Listing 5.8 displays the content of `variable_columns.sh`\
    \ that uses the `awk` utility to pad the number of columns in a CSV file.\n\n\
    Listing 5.7: variable_columns.csv\n\n```\n10,20,30\n10,20,30,40\n10,20,30,40,50,60\n\
    ```\n\nListing 5.8: variable_columns.sh\n\n```\nfilename=\"variable_columns.csv\"\
    \n\ncat $filename | awk -F\",\" '\nBEGIN { colCount = 6 }\n{\n    printf(\"%s\"\
    , $0)\n    for(i=NF; i<colCount; i++) {\n        printf(\",NaN\")\n    }\n   \
    \ print \"\"\n}\n'\n```\n\nListing 5.8 initializes the variable `filename` with\
    \ the name of the CSV file for this code sample. The next snippet is an `awk`\
    \ script that initializes `colCount` with the value 6 in the `BEGIN` block: this\
    \ value is the largest number of columns in any row of the CSV file.\n\nThe next\
    \ block of code displays the contents of the current line, followed by a loop\
    \ that prints a comma-separated list of `NaN` values to ensure that the output\
    \ line contains 6 columns. For instance, if a row has 4 columns, then `NaN` will\
    \ be printed twice. The `print` statement after the loop ensures that the next\
    \ line from the input file starts on a new line instead of the current output\
    \ line. Launch the code in Listing 5.8 and you will see the following output:\n\
    \n```\n10,20,30,NaN,NaN,NaN\n10,20,30,40,NaN,NaN\n10,20,30,40,50,60\n10,20,NaN,NaN,NaN,NaN\n\
    10,20,30,40,NaN,NaN\n```"
