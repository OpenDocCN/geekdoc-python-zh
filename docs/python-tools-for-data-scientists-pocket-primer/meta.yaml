    \ APIs require converting a 2D array of (R,G,B) color values into a corresponding\
    \ one-dimensional vector.\n\nThe fourth part of this chapter encompasses linear\
    \ regression, the mean squared error (MSE), and how to calculate MSE with the\
    \ `linspace()` API.\n\n## What is NumPy?\n\nNumPy is a Python library that contains\
    \ many convenient methods and aids with program performance. NumPy provides a\
    \ core library for scientific computing in Python, with performant multi-dimensional\
    \ arrays and vectorized math functions, along with support for linear algebra\
    \ and random numbers.\n\nNumPy is modeled after MATLAB, with support for lists,\
    \ arrays, and so forth. NumPy is easier to use than MATLAB, and it's very common\
    \ in TensorFlow code as well as Python code.\n\n## Useful NumPy Features\n\nThe\
    \ NumPy package provides the `ndarray` object that encapsulates multi-dimensional\
    \ arrays of homogeneous data types. Many `ndarray` operations are performed in\
    \ compiled code to improve performance.\n\nThere are important differences between\
    \ NumPy arrays and the standard Python sequences. First, NumPy arrays have a fixed\
    \ size, whereas Python lists can expand dynamically. Second, NumPy arrays are\
    \ homogeneous, which means that the elements in a NumPy array must have the same\
    \ data type. Third, NumPy arrays support more efficient execution (and require\
    \ less code) of various types of operations on large numbers of data.\n\n## What\
    \ are NumPy Arrays?\n\nAn *array* is a set of consecutive memory locations used\
    \ to store data. Each item in the array is called an *element*. The number of\
    \ elements in an array is called the *dimension* of the array. A typical array\
    \ declaration is as follows:\n\n```python\narr1 = np.array([1, 2, 3, 4, 5])\n\
    ```\n\nThe preceding code snippet declares `arr1` as an array of five elements,\
    \ which you can access via `arr1[0]` through `arr1[4]`. Notice that the first\
    \ element has an index value of 0, and the second element has an index value of\
    \ 1. Thus, if you declare an array of 100 elements, then the 100th element has\
    \ index value of 99.\n\n> **NOTE** *The first position in a NumPy array has an\
    \ index value of 0.*\n\nNumPy treats arrays as vectors. Mathematical operations\
    \ are performed element-by-element. Remember the following difference: “doubling”\
    \ an array multiplies each element by 2, whereas “doubling” a list appends a list\
    \ to itself."
