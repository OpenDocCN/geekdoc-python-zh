    # The awk Command


    The `awk` (Aho, Weinberger, and Kernighan) command has a C-like syntax and you
    can use this utility to perform very complex operations on numbers and text strings.


    As a side comment, there is also the `gawk` command that is GNU `awk`, as well
    as the `nawk` command, which is “new” `awk` (neither command is discussed in this
    book). One advantage of `nawk` is that it allows you to externally set the value
    of an internal variable.


    # Built-in Variables that Control awk


    The `awk` command provides variables that you can change from their default values
    to control how `awk` performs operations. Examples of such variables (and their
    default values) include `FS` (" "), `RS` ("\n"), `OFS` (" "), `ORS` ("\n"), `SUBSEP`,
    and `IGNORECASE`. The variables `FS` and `RS` specify the field separator and
    record separator, respectively, whereas the variables `OFS` and `ORS` specify
    the output field separator and the output record separator, respectively.


    Field separators serve the same purpose as as delimiters in CSV or TSV files.
    The record separators behave in a way similar to how `sed` treats individual lines;
    for example, `sed` can match or delete a range of lines instead of matching or
    deleting something that matches a regular expression. (The default `awk` record
    separator is the newline character, so by'
  merge: -1
  pgno: 282
- img_proc: true
  md: 'default, `awk` and `sed` have a similar ability to manipulate and reference
    lines in a text file.)


    As a simple example, you can print a blank line after each line of a file by changing
    the `ORS`, from the default of one newline to two newlines, as shown here:


    ```

    cat columns.txt | awk ''BEGIN { ORS ="\n\n" } ; { print $0 }''

    ```


    Other built-in variables include `FILENAME` (the name of the file that `awk` is
    currently reading), `FNR` (the current record number in the current file), `NF`
    (the number of fields in the current input record), and `NR` (the number of input
    records `awk` has processed since the beginning of the program''s execution).


    Consult the online documentation for additional information regarding these (and
    other) arguments for the `awk` command.


    # How Does the awk Command Work?


    The `awk` command reads the input files one record at a time (by default, one
    record is one line). If a record matches a pattern, then an action is performed
    (otherwise, no action is performed). If the search pattern is not given, then
    `awk` performs the given actions for each record of the input. The default behavior
    if no action is given is to print all the records that match the given pattern.
    Finally, empty braces without any action does nothing; i.e., it will not perform
    the default printing operation. Note that each statement in actions should be
    delimited by a semicolon.


    To make the preceding paragraph more understandable, here are some simple examples
    involving text strings and the `awk` command (the results are displayed after
    each code snippet). The `-F` switch sets the field separator to whatever follows
    it (in this case, a space). Switches will often provide a shortcut to an action
    that normally needs a command inside a `BEGIN{}` block (shown later):


    ```

    x="a b c d e"

    echo $x |awk -F" " ''{print $1}''

    a

    echo $x |awk -F" " ''{print NF}''

    5

    echo $x |awk -F" " ''{print $0}''

    a b c d e

    echo $x |awk -F" " ''{print $3, $1}''

    c a

    ```'
