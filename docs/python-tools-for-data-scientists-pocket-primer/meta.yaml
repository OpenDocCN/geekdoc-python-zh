  md: "One limitation of Listing 5.8 is that the maximum number of columns must be\
    \ specified in the `BEGIN` block. Listing 5.9 removes this constraint by scanning\
    \ the entire file to determine the maximum number of columns in the CSV file.\n\
    \n# Listing 5.9: variable_columns2.sh\n\n```\nfilename=\"variable_columns.csv\"\
    \n\ncat $filename | awk -F\",\" '\nBEGIN {\n    maxColCount = 0;\n\n    ###########################################\n\
    \    # maxColCount = # of fields in the longest row\n    ###########################################\n\
    \    while(getline line < ARGV[1]) {\n        colCount = split(line,data)\n  \
