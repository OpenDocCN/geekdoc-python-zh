    \ 中值的相反数。`Pyplot` API `plot()` 使用 `points` 变量来显示一对对角线段。\n\n图 6.1 显示了一组“虚线”线段，其方程包含在清单\
    \ 6.1 中。\n\n![](img/a5bd78f899e04acbdf3949ed2383b115_232_0.png)\n\n**图 6.1** 一对对角线段。\n\
    \n## Matplotlib 中的彩色网格\n\n清单 6.2 显示了 `plotgrid2.py` 的内容，该示例说明了如何显示彩色网格。\n\n**清单\
    \ 6.2: plotgrid2.py**\n\n```\nimport matplotlib.pyplot as plt\nfrom matplotlib\
