    # The train_test_split() Class in Sklearn


    This Sklearn class is an extremely useful class for machine learning because you
    can create a four-way split of a dataset with a single line code. The four subsets
    of a dataset are typically named as the following variables:


    +   - X_train

    - y_train

    - X_test

    - y_test


    Figure 4.3 displays the relationship among the preceding four subsets of data
    when you need to split a dataset for linear regression or for classification tasks.


    ![](img/a5bd78f899e04acbdf3949ed2383b115_162_0.png)


    A few details to keep in mind regarding the preceding diagram:


    +   1) usually a 70/30, 75/25, or 80/20 split for train/test data

    2) x: usually a subset of the columns in a dataset

    3) y: column can be located anywhere

    4) labeled x and y (sometimes X and Y)

    5) X = X_train + X_test

    6) y = y_train + y_test


    The code sample sklearn_iris_train.py (later in this chapter) contains the two
    lines of code that create the four required subsets of data:'
