    \ to display the first 8 records of the name column with this code snippet:\n\n\
    ```python\ndf.iloc[0:8]['name']\n```\n\n## Converting Categorical Data to Numeric\
    \ Data\n\nOne common task in machine learning involves converting a feature containing\
    \ character data into a feature that contains numeric data. Listing 3.8 shows\
    \ the content of `cat2numeric.py` that illustrates how to replace a text field\
