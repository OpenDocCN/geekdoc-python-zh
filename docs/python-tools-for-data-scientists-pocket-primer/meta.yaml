    Listing 2.17 shows the content of `numpy_reshape.py` that illustrates how to use\
    \ the `reshape()` method on a NumPy array.\n\n**Listing 2.17: numpy_reshape.py**\n\
    \n```\nimport numpy as np\n\nx = np.array([[2, 3], [4, 5], [6, 7]])\nprint(x.shape)\
    \ # (3, 2)\n\nx = x.reshape((2, 3))\nprint(x.shape) # (2, 3)\nprint('x1:',x)\n\
    \nx = x.reshape((-1))\nprint(x.shape) # (6,)\nprint('x2:',x)\n\nx = x.reshape((6,\
    \ -1))\nprint(x.shape) # (6, 1)\nprint('x3:',x)\n\nx = x.reshape((-1, 6))\nprint(x.shape)\
    \ # (1, 6)\nprint('x4:',x)\n```\n\nListing 2.17 contains a NumPy array called\
    \ x whose dimensions are 3x2, followed by a set of invocations of the reshape()\
    \ method that reshapes the contents of x. The first invocation of the reshape()\
    \ method changes the shape of x from 3x2 to 2x3. The second invocation changes\
