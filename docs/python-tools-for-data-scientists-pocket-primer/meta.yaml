    often overlooked is that lines in the Euclidean plane have infinite length. If
    you select two distinct points of a line, then all the points between those two
    selected points is a *line segment*. A *ray* is a "half infinite" line: When you
    select one point as an endpoint, then all the points on one side of the line constitute
    a ray.


    For example, the points in the plane whose y-coordinate is 0 make a line, as is
    the x-axis, whereas the points between (0,0) and (1,0) on the x-axis form a line
    segment. In addition, the points on the x-axis that are to the right of (0,0)
    form a ray, and the points on the x-axis that are to the left of (0,0) also form
    a ray.'
