- md: "## Printing a String in a Fixed Number of Columns\n\nListing B.26 displays\
    \ the content of `FixedFieldCount1.sh` that illustrates how to print the words\
    \ in a text string using the `awk` command.\n\n```\nListing B.26: FixedFieldCount1.sh\n\
    \necho \"aa bb cc dd ee ff gg hh\"| awk '\nBEGIN { colCount = 3 }\n{\n    for(i=1;\
    \ i<=NF; i++) {\n        printf(\"%s \", $i)\n        if(i % colCount == 0) {\n\
    \            print \" \"\n        }\n    }\n}\n'\n```\n\nThe output from Listing\
    \ B.26 is here:\n\n```\naa bb cc\ndd ee ff\ngg hh\n```\n\n## Printing a Dataset\
    \ in a Fixed Number of Columns\n\nListing B.27 displays the content of `VariableColumns.txt`\
    \ with lines of text that contain a different number of columns.\n\n```\nListing\
    \ B.27: VariableColumns.txt\n\nthis is line one\nthis is line number one\nthis\
    \ is the third and final line\n```\n\nListing B.28 displays the content of `Fields3.sh`\
    \ that illustrates how to print the words in a text string using the `awk` command.\n\
    \n```\nListing B.28: Fields3.sh\n\nawk '{printf(\"%s \", $0)}' | awk '\nBEGIN\
    \ { columnCount = 3 }\n{\n    for(i=1; i<=NF; i++) {\n        printf(\"%s \",\
    \ $i)\n        if( i % columnCount == 0 )\n            print \" \"\n    }\n}'\
    \ VariableColumns.txt\n```\n\nThe output from Listing B.28 is here:\n\n```\nthis\
    \ is line\none this is\nline number one\nthis is the\nthird and final\nline\n\
    ```\n\n## Aligning Columns in Datasets\n\nIf you have read the preceding two examples,\
    \ the code sample in this section is easy to understand. You will see how to realign\
    \ columns of data that are correct in terms of their content, but have been placed\
    \ in different rows (and therefore are misaligned). Listing B.29 displays the\
    \ content of mixed-data.csv with misaligned data values. In addition, the first\
    \ line and final line in Listing B.28 are empty lines, which will be removed by\
    \ the shell script in this section.\n\n**Listing B.29: mixed-data.csv**\n\n```\n\
    Sara, Jones, 1000, CA, Sally, Smith, 2000, IL,\nDave, Jones, 3000, FL, John, Jones,\n\
    4000, CA,\nDave, Jones, 5000, NY, Mike,\nJones, 6000, NY, Tony, Jones, 7000, WA\n\
    ```\n\nListing B.30 displays the content of mixed-data.sh that illustrates how\
    \ to realign the dataset in Listing B.29.\n\n**Listing B.30: mixed-data.sh**\n\
    \n```\n#-----------------------------------------------\n# 1) remove blank lines\n\
    # 2) remove line feeds\n# 3) print a LF after every fourth field\n# 4) remove\
    \ trailing ',' from each row\n#-----------------------------------------------\n\
    \ninputfile=\"mixed-data.csv\"\n\ngrep -v \"^$\" $inputfile |awk -F\",\" '{printf(\"\
    %s\",$0)}' | awk '\nBEGIN { columnCount = 4 }\n{\n    for(i=1; i<=NF; i++) {\n\
    \        printf(\"%s \", $i)\n        if( i % columnCount  == 0) { print \"\"\
    \ }\n    }\n}' > temp-columns\n\n# 4) remove trailing ',' from output:\ncat temp-columns\
    \ | sed 's/, $//' | sed 's/ $//' > $outputfile\n```\n\nListing B.30 starts with\
    \ a `grep` command that removes blank lines, followed by an `awk` command that\
    \ prints the rows of the dataset as a single line of text. The second `awk` command\
    \ initializes the `columnCount` variable with the value 4 in the `BEGIN` block,\
    \ followed by a `for` loop that iterates through the input fields. After four\
    \ fields are printed on the same output line, a linefeed is printed, which has\
    \ the effect of realigning the input dataset as an output dataset consisting of\
    \ rows that have four fields. The output from Listing B.30 is here:\n\n```\nSara,\
    \ Jones, 1000, CA\nSally, Smith, 2000, IL\nDave, Jones, 3000, FL\nJohn, Jones,\
    \ 4000, CA\nDave, Jones, 5000, NY\nMike, Jones, 6000, NY\nTony, Jones, 7000, WA\n\
    ```\n\n## Aligning Columns and Multiple Rows in Datasets\n\nThe preceding section\
    \ showed you how to re-align a dataset so that each row contains the same number\
    \ of columns and also represents a single data record. The code sample in this\
    \ section illustrates how to realign columns of data that are correct in terms\
    \ of their content and place two records in each line of the new dataset. Listing\
    \ B.31 displays the content of `mixed-data2.csv` with misaligned data values,\
    \ followed by Listing B.32 that displays the content of `aligned-data2.csv` with\
    \ the correctly formatted dataset.\n\n**Listing B.31: mixed-data2.csv**\n\n```\n\
    Sara, Jones, 1000, CA, Sally, Smith, 2000, IL,\nDave, Jones, 3000, FL, John, Jones,\n\
    4000, CA,\nDave, Jones, 5000, NY, Mike,\nJones, 6000, NY, Tony, Jones, 7000, WA\n\
    ```\n\n**Listing B.32: aligned-data2.csv**\n\n```\nSara, Jones, 1000, CA, Sally,\
    \ Smith, 2000, IL\nDave, Jones, 3000, FL, John, Jones, 4000, CA\nDave, Jones,\
    \ 5000, NY, Mike, Jones, 6000, NY\nTony, Jones, 7000, WA\n```\n\nListing B.33\
    \ displays the content of `mixed-data2.sh` that illustrates how to realign the\
    \ dataset in Listing B.31.\n\n**Listing B.33: mixed-data2.sh**\n\n```\n#-----------------------------------------------\n\
    # 1) remove blank lines\n# 2) remove line feeds\n# 3) print a LF after every 8\
    \ fields\n# 4) remove trailing ',' from each row\n#-----------------------------------------------\n\
    inputfile=\"mixed-data2.txt\"\noutputfile=\"aligned-data2.txt\"\n\ngrep -v \"\
    ^$\" $inputfile |awk -F\",\" '{printf(\"%s\",$0)}' | awk '\nBEGIN { columnCount\
    \ = 4; rowCount = 2; currRow = 0 }\n{\n    for(i=1; i<=NF; i++) {\n        printf(\"\
    %s \", $i)\n        if( i % columnCount == 0) { ++currRow }\n        if(currRow\
    \ > 0 && currRow % rowCount == 0) {currRow = 0;\n            print \"\"}\n   \
    \ }\n}' > temp-columns\n\n# 4) remove trailing ',' from output:\ncat temp-columns\
    \ | sed 's/, $//' | sed 's/ $//' > $outputfile\n```\n\nListing B.33 is very similar\
    \ to Listing B.30. The key idea is to print a linefeed character after a pair\
    \ of “normal” records have been processed, which is implemented via the code that\
    \ is shown in bold in Listing B.33.\n\nNow you can generalize Listing B.33 very\
    \ easily by changing the initial value of the `rowCount` variable to any other\
    \ positive integer, and the code will work correctly without any further modification.\
    \ For example, if you initialize `rowCount` to the value 5, then every row in\
    \ the new dataset (with the possible exception of the final output row) will contain\
    \ 5 “normal” data records.\n\n## Removing a Column from a Text File\n\nListing\
    \ B.34 displays the content of `VariableColumns.txt` with lines of text that contain\
    \ a different number of columns.\n\n**Listing B.34: VariableColumns.txt**\n\n\
    ```\nthis is line one\nthis is line number one\nthis is the third and final line\n\
    ```\n\nListing B.35 displays the content of `RemoveColumn.sh` that suppressed\
    \ the first column from the output.\n\n**Listing B.35: RemoveColumn.sh**\n\n```\n\
    awk '{ for (i=2; i<=NF; i++) printf \"%s \", $i; printf \"\\n\"; }' products.txt\n\
    ```\n\nThe loop is between 2 and NF, which iterates over all the fields except\
    \ for the first field. In addition, `printf` explicitly adds newlines. The output\
    \ of the preceding code snippet is here:\n\n```\n400 new\n300 new\n300 used\n\
    200 used\n100 used\n```\n\n## Subsets of Column-aligned Rows in Datasets\n\nListing\
    \ B.35 showed you how to align the rows of a dataset, and the code sample in this\
    \ section illustrates how to extract a subset of the existing columns and a subset\
    \ of the rows. Listing B.36 displays the content of `sub-rows-cols.txt` of the\
    \ desired dataset that contains two columns from every even row of the file `aligned-data.txt`.\n\
    \n**Listing B.36: sub-rows-cols.txt**\n\n```\nSara, 1000\nDave, 3000\nDave, 5000\n\
    Tony, 7000\n```\n\nListing B.37 displays the content of `sub-rows-cols.sh` that\
    \ illustrates how to generate the dataset in Listing B.36. Most of the code is\
    \ the same as Listing B.33, with the new code shown in bold.\n\n**Listing B.37:\
    \ sub-rows-cols.sh**\n\n```\n#----------------------------------------\n# 1) remove\
    \ blank lines\n# 2) remove line feeds\n# 3) print a LF after every fourth field\n\
    # 4) remove trailing ',' from each row\n#----------------------------------------\n\
    inputfile=\"mixed-data.txt\"\n\ngrep -v \"^$\" $inputfile |awk -F\",\" '{printf(\"\
    %s\",$0)}' | awk '\nBEGIN { columnCount = 4 }\n{\n    for(i=1; i<=NF; i++) {\n\
    \        printf(\"%s \", $i)\n        if( i % columnCount  == 0) { print \"\"\
    \ }\n    }\n}' > temp-columns\n\n# 4) remove trailing ',' from output:\ncat temp-columns\
    \ | sed 's/, $//' | sed 's/$//' > temp-columns2\n\ncat temp-columns2 | awk '\n\
    BEGIN { rowCount = 2; currRow = 0 }\n{\n    if(currRow % rowCount == 0) { print\
    \ $1, $3 }\n    ++currRow\n}' > temp-columns3\n\ncat temp-columns3 | sed 's/,$//'\
    \ | sed 's/ $//' > $outputfile\n```\n\nListing B.37 contains a new block of code\
    \ that redirects the output of Step #4 to a temporary file `temp-columns2` whose\
    \ contents are processed by another `awk` command in the last section of Listing\
    \ B.37. Notice that that `awk` command contains a `BEGIN` block that initializes\
    \ the variables `rowCount` and `currRow` with the values 2 and 0, respectively.\n\
    \nThe main block prints columns 1 and 3 of the current line if the current row\
    \ number is even, and then the value of `currRow` is then incremented. The output\
    \ of this `awk` command is redirected to yet another temporary file that is the\
    \ input to the final code snippet, which uses the `cat` command and two occurrences\
    \ of the `sed` command to remove a trailing \",\" and a trailing space, as shown\
    \ here:\n\n```\ncat temp-columns3 | sed 's/,$//' | sed 's/ $//' > $outputfile\n\
    ```\n\nThere are other ways to perform the functionality in Listing B.37, and\
    \ the main purpose is to show you different techniques for combining various bash\
    \ commands.\n\n## Counting Word Frequency in Datasets\n\nListing B.38 displays\
    \ the content of `WordCounts1.sh` that illustrates how to count the frequency\
    \ of words in a file."
  mdcn: "## 在固定列数中打印字符串\n\n清单 B.26 展示了 `FixedFieldCount1.sh` 的内容，该脚本演示了如何使用 `awk`\
