    # Handling Outliers in Pandas\n\nThe key idea involves finding the “z score” of\
    \ the values in the dataset, which involves calculating the mean `sigma` and standard\
    \ deviation `std`, and then mapping each value `x` in the dataset to the value\
    \ `(x-sigma)/std`.\n\nNext, specify a value of `z` (such as 3) and find the rows\
    \ whose `z score` is greater than 3. These are the rows that contain values that\
    \ are considered outliers. *Note that a suitable value for the z score is your\
    \ decision (not some other external factor).*\n\nListing 3.42 shows the content\
    \ of `outliers_zscores.py` that illustrates how to find rows of a dataset whose\
    \ z-score greater than (or less than) a specified value.\n\n**Listing 3.42: outliers_zscores.py**\n\
    \n```\nimport numpy as np\nimport pandas as pd\nfrom scipy import stats\nfrom\
    \ sklearn import datasets\n\ndf = datasets.load_iris()\ncolumns = df.feature_names\n\
    iris_df = pd.DataFrame(df.data)\niris_df.columns = columns\n```"
