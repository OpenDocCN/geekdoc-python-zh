    \ = 28 + 4 * np.random.randn(max1)\nbana_count = 24 + 4 * np.random.randn(max2)\n\
    plt.hist([appl_count,\n    bana_count], stacked=True, color=['r','b'])\nplt.show()\n\
    ```\n\nListing 6.4 is straightforward: the NumPy variables `appl_count` and `bana_count`\
    \ contain a random set of values whose upper bound is `max1` and `max2`, respectively.\
    \ The Pyplot API `hist()` uses the points `appl_count` and `bana_count` to display\
