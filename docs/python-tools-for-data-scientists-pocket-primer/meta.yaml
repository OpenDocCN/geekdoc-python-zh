- md: "## CHAPTER 5\n\n## DATA CLEANING TASKS\n\nThis chapter discusses data cleaning\
    \ tasks involving datasets that contain various types of data, such as date formats,\
    \ telephone numbers, and currency, all of which can have different formats. In\
    \ addition, many of the code samples in this chapter reference techniques that\
    \ are discussed in previous chapters of this book.\n\nThe first part of this chapter\
    \ briefly describes data cleaning, followed by examples of data cleaning tasks\
    \ for data in MySQL database table. Specifically, you will see how to replace\
    \ NULL values with 0, how to replace NULL values with an average value, how to\
    \ replace multiple values with a single value, how to handle mismatched attribute\
    \ values, and how to convert strings to date values.\n\nThe second part of this\
    \ chapter shows you how to use the `sed` command line utility to replace multiple\
    \ delimiters in a CSV file with a single delimiter. You will also see how to use\
    \ the `awk` command line utility to restructure a CSV file to create a file whose\
    \ rows have the same number of fields.\n\nThe third part of this chapter shows\
    \ you how to use the `awk` command line utility to process CSV files that have\
    \ a variable number of columns. The `awk` command is a self-contained programming\
    \ language, with a truly impressive capability for processing text files. If you\
    \ are unfamiliar with the `awk` command, please read the appendix that contains\
    \ an assortment of code samples that use the `awk` utility.\n\nThe fourth part\
    \ of this chapter contains `awk`-based shell scripts that show you how to convert\
    \ a list of phone numbers so that the phone numbers have the same format as well\
    \ as a list of date formats that can be converted to a different format.\n\nThis\
    \ chapter assumes that you have read the data cleaning examples that are in previous\
    \ chapters. Moreover, Chapter 7 contains a section with additional code samples\
    \ involving data cleaning tasks.\n\n## What is Data Cleaning?\n\nData cleaning,\
    \ also called data cleansing, is the task of ensuring that the contents of a dataset\
    \ are complete, correct, and typically without duplicates. Hence, the focus of\
    \ data cleaning is on individual files instead of combining or transforming data\
    \ from two or more files. Data cleaning is often performed before any data transformation\
    \ is performed. In some cases, data cleaning must also be performed after a data\
    \ transformation.\n\nFor example, suppose that a CSV file contains employee-related\
    \ data and a MySQL table also contains employee-related data, both of which have\
    \ been cleansed of inconsistencies and duplicates have been removed. However,\
    \ after exporting the table data to a CSV file that is merged with the first CSV\
    \ file, it's possible that there are duplicates that must then be removed.\n\n\
    Incidentally, there are several techniques for determining the values to replace\
    \ empty fields, and the choice of techniques can range from obvious choices to\
    \ more subtle factors. Sometimes you can specify the mean or the median for missing\
    \ values, but in other cases, you need a more sophisticated technique. For example,\
    \ suppose that a dataset with 1,000 rows consists of two types of patients: those\
    \ who are healthy (the majority) and patients who have cancer. Obviously, you\
    \ want the number of sick patients to be as low as possible (ideally zero); realistically,\
    \ there will be some patients who will be sick and probably the majority of patients\
    \ will be healthy, which means that the dataset is fundamentally imbalanced.\n\
    \nUnfortunately, machine learning algorithms can produce inaccurate results with\
    \ imbalanced datasets. Moreover, generating synthetic data whose feature values\
    \ are based on the mean or the median is probably risky. A better technique is\
    \ called SMOTE, which generates data values that are close to values that appear\
    \ in rows of the original dataset.\n\nAs another example, the format for dates,\
    \ currency, and decimal numbers varies among different countries. Examples of\
    \ date formats include YYYY/MM/DD, MM/DD/YYYY, and DD/MM/YYYY (as well as other\
    \ possible date formats). Incidentally, YYYY/MM/DD is an ISO standard for numeric\
    \ dates.\n\nNumber formats involve a comma \",\" for the thousands position and\
    \ decimal \".\" for decimal values in the US (ex: $1,234.56), whereas Europe uses\
    \ the opposite order for numbers (ex: 1.234,56). Depending on the dataset in question,\
    \ data cleaning can also involve working with an assortment of dates, currencies,\
    \ and decimal numbers to ensure that all values have the same format.\n\nIf two\
    \ CSV files contain different date formats and you need to create a single CSV\
    \ file that is based on the date columns, then there will be some type of conversion\
    \ process that could be one of the following:\n\n- convert the first date format\
    \ to the second date format\n- convert the second date format to the first date\
    \ format\n- convert both date formats to a third date format\n\nIn the case of\
    \ financial data, you are likely to also encounter different currencies, which\
    \ involves a conversion rate between a pair of currencies. Since currency conversion\
    \ rates fluctuate, you need to decide the exchange rate to use for the data, which\
    \ can be\n\n- the exchange rate during the date that the CSV files were generated\n\
    - the current currency exchange rate\n- some other mechanism\n\n## Data Cleaning\
    \ for Personal Titles\n\nSometimes a \"brute force\" solution is also the simplest\
    \ solution, particularly when strings are involved. For example, a person's title\
    \ can be misspelled in myriad ways that involves many pesky little variations,\
    \ so it's good to know how to perform this task in a manner that's simple, intuitive,\
    \ and easy to extend with additional cases. Consider how you would replace each\
    \ string in the following list with \"Mr,\" \"Ms,\" or \"Mrs\" before you look\
    \ at the following solution:\n\n```\ntitles = ['mr.','MR','MR.','mister','Mister','Ms','Ms.',\
    \ 'Mr',\n'Mr.','mr','MS','MS.','ms','ms.','Mis','miss','miss.','Mrs',\n'Mrs.','mrs','mrs.','Madam','madam','ma\"\
    am']\n```\n\nWhile it's possible to solve this task with conditional logic that\
    \ uses if/else code blocks, such an approach involves a lengthy code block. A\
    \ simpler and easier solution involves the in keyword, as shown here:\n\n```\n\
    mr_dict={}\nms_dict={}\nmrs_dict={}\ntitles = ['mr.','MR','MR.','mister','Mister','Ms','Ms.',\
    \ 'Mr',\n'Mr.','mr','MS','MS.','ms','ms.','Mis','miss','miss.','Mrs',\n'Mrs.','mrs','mrs.','Madam','madam','ma\"\
    am']\n\nfor title in ['Mr','Mr.','mr','mr.','MR','MR.','mister','Mister']:\n \
    \   mr_dict[title] = \"Mr\"\n\nfor title in ['Ms','Ms.','MS','MS.','ms','ms.','Mis','miss','miss.']:\n\
    \    ms_dict[title] = \"Ms\"\n\nfor title in ['Mrs','Mrs.','mrs','mrs.','Madam','madam','ma\"\
    am']:\n    mrs_dict[title] = \"Mrs\"\n\nprint(\"Mr dictionary: \",mr_dict)\nprint()\n\
    print(\"Ms dictionary: \",ms_dict)\nprint()\nprint(\"Mrs dictionary:\",mrs_dict)\n\
    ```\n\nLaunch the preceding code block and you will see the following output:\n\
    \n```\nMr dictionary:  {'Mr': 'Mr', 'Mr.': 'Mr', 'mr': 'Mr', 'mr.':\n'Mr', 'MR':\
    \ 'Mr', 'MR.': 'Mr', 'mister': 'Mr', 'Mister': 'Mr'}\n\nMs dictionary:  {'Ms':\
    \ 'Ms', 'Ms.': 'Ms', 'MS': 'Ms', 'MS.': 'Ms',\n'ms': 'Ms', 'ms.': 'Ms', 'Mis':\
    \ 'Ms', 'miss': 'Ms', 'miss.': 'Ms'}\n\nMrs dictionary: {'Mrs': 'Mrs', 'Mrs.':\
    \ 'Mrs', 'mrs': 'Mrs', 'mrs.':\n'Mrs', 'Madam': 'Mrs', 'madam': 'Mrs', 'ma\"am':\
    \ 'Mrs'}\n```\n\nThe solution given above makes it very easy to maintain, debug,\
    \ and extend because the only change that's required is adding a new string in\
    \ the appropriate location. Moreover, the given solution does not require any\
    \ additional loops or regular expressions. In the event that you need a new category,\
    \ such as \"Sir,\" define the Python dictionary `sir_dict` and then add a new\
    \ code snippet, as shown here:\n\n```\nif title in ['Sir','sir','Sire','sire','Yessir','yessir']:\n\
    \    sir_dict[title] = \"Sir\"\n```\n\n## Data Cleaning in SQL\n\nThis section\
    \ contains several subsections that perform data cleaning tasks in SQL. Note that\
    \ it's not mandatory to perform these tasks in SQL. Another option is to read\
    \ the contents of a database table into a Pandas data frame and then use Pandas\
    \ methods to achieve the same result.\n\nHowever, this section illustrates how\
    \ to perform the following data cleaning tasks that affect an attribute of a database\
    \ table:"
  mdcn: "## 第五章\n\n## 数据清洗任务\n\n本章讨论涉及包含多种数据类型的数据集的数据清洗任务，例如日期格式、电话号码和货币，这些数据都可能具有不同的格式。此外，本章中的许多代码示例引用了本书前面章节讨论的技术。\n\
    \n本章第一部分简要介绍了数据清洗，随后是针对 MySQL 数据库表中数据的数据清洗任务示例。具体来说，你将看到如何将 NULL 值替换为 0，如何将 NULL\
    \ 值替换为平均值，如何将多个值替换为单个值，如何处理不匹配的属性值，以及如何将字符串转换为日期值。\n\n本章第二部分向你展示如何使用 `sed` 命令行实用程序将\
    \ CSV 文件中的多个分隔符替换为单个分隔符。你还将看到如何使用 `awk` 命令行实用程序重构 CSV 文件，以创建一个行具有相同字段数的文件。\n\n\
    本章第三部分向你展示如何使用 `awk` 命令行实用程序处理具有可变列数的 CSV 文件。`awk` 命令是一种独立的编程语言，具有处理文本文件的真正令人印象深刻的能力。如果你不熟悉\
    \ `awk` 命令，请阅读包含使用 `awk` 实用程序的各种代码示例的附录。\n\n本章第四部分包含基于 `awk` 的 shell 脚本，向你展示如何转换电话号码列表，使电话号码具有相同的格式，以及如何将日期格式列表转换为不同的格式。\n\
    \n本章假设你已经阅读了前面章节中的数据清洗示例。此外，第七章包含一个涉及数据清洗任务的附加代码示例部分。\n\n## 什么是数据清洗？\n\n数据清洗，也称为数据清理，是确保数据集内容完整、正确且通常没有重复项的任务。因此，数据清洗的重点是单个文件，而不是组合或转换来自两个或多个文件的数据。数据清洗通常在执行任何数据转换之前进行。在某些情况下，数据转换后也必须执行数据清洗。\n\
    \n例如，假设一个 CSV 文件包含与员工相关的数据，一个 MySQL 表也包含与员工相关的数据，两者都已清理了不一致性并删除了重复项。但是，将表数据导出到与第一个\
    \ CSV 文件合并的 CSV 文件后，可能存在必须删除的重复项。\n\n顺便说一句，有几种技术可以确定替换空字段的值，技术的选择范围从明显的选择到更微妙的因素。有时你可以为缺失值指定平均值或中位数，但在其他情况下，你需要更复杂的技术。例如，假设一个包含\
    \ 1,000 行的数据集由两类患者组成：健康患者（占大多数）和癌症患者。显然，你希望患病患者的数量尽可能少（理想情况下为零）；实际上，会有一些患者患病，可能大多数患者是健康的，这意味着数据集从根本上是不平衡的。\n\
    \n不幸的是，机器学习算法在不平衡的数据集上可能会产生不准确的结果。此外，生成特征值基于平均值或中位数的合成数据可能是有风险的。一种更好的技术称为 SMOTE，它生成的数据值接近原始数据集中出现的值。\n\
    \n另一个例子是，日期、货币和小数的格式在不同国家之间有所不同。日期格式的示例包括 YYYY/MM/DD、MM/DD/YYYY 和 DD/MM/YYYY（以及其他可能的日期格式）。顺便说一句，YYYY/MM/DD\
    \ 是数字日期的 ISO 标准。\n\n数字格式在美国涉及千位分隔符“,”和小数点“.”（例如：$1,234.56），而欧洲使用相反的顺序（例如：1.234,56）。根据所讨论的数据集，数据清洗还可能涉及处理各种日期、货币和小数，以确保所有值具有相同的格式。\n\
    \n如果两个 CSV 文件包含不同的日期格式，并且你需要创建一个基于日期列的单个 CSV 文件，那么将存在某种类型的转换过程，可能是以下之一：\n\n- 将第一种日期格式转换为第二种日期格式\n\
    - 将第二种日期格式转换为第一种日期格式\n- 将两种日期格式都转换为第三种日期格式\n\n在金融数据的情况下，你可能还会遇到不同的货币，这涉及一对货币之间的汇率。由于货币汇率波动，你需要决定用于数据的汇率，可以是\n\
    \n- CSV 文件生成时的汇率\n- 当前货币汇率\n- 某种其他机制\n\n## 个人称谓的数据清洗\n\n有时“暴力”解决方案也是最简单的解决方案，特别是当涉及字符串时。例如，一个人的称谓可能以无数种方式拼写错误，涉及许多烦人的小变体，因此最好知道如何以简单、直观且易于扩展附加案例的方式执行此任务。在查看以下解决方案之前，请考虑如何将以下列表中的每个字符串替换为“Mr”、“Ms”或“Mrs”：\n\
    \n```\ntitles = ['mr.','MR','MR.','mister','Mister','Ms','Ms.', 'Mr',\n'Mr.','mr','MS','MS.','ms','ms.','Mis','miss','miss.','Mrs',\n\
    'Mrs.','mrs','mrs.','Madam','madam','ma\"am']\n```\n\n虽然可以使用 if/else 代码块的条件逻辑来解决此任务，但这种方法涉及一个冗长的代码块。一个更简单、更容易的解决方案涉及\
    \ `in` 关键字，如下所示：\n\n```\nmr_dict={}\nms_dict={}\nmrs_dict={}\ntitles = ['mr.','MR','MR.','mister','Mister','Ms','Ms.',\
    \ 'Mr',\n'Mr.','mr','MS','MS.','ms','ms.','Mis','miss','miss.','Mrs',\n'Mrs.','mrs','mrs.','Madam','madam','ma\"\
    am']\n\nfor title in ['Mr','Mr.','mr','mr.','MR','MR.','mister','Mister']:\n \
    \   mr_dict[title] = \"Mr\"\n\nfor title in ['Ms','Ms.','MS','MS.','ms','ms.','Mis','miss','miss.']:\n\
    \    ms_dict[title] = \"Ms\"\n\nfor title in ['Mrs','Mrs.','mrs','mrs.','Madam','madam','ma\"\
    am']:\n    mrs_dict[title] = \"Mrs\"\n\nprint(\"Mr dictionary: \",mr_dict)\nprint()\n\
    print(\"Ms dictionary: \",ms_dict)\nprint()\nprint(\"Mrs dictionary:\",mrs_dict)\n\
    ```\n\n运行前面的代码块，你将看到以下输出：\n\n```\nMr dictionary:  {'Mr': 'Mr', 'Mr.': 'Mr', 'mr':\
    \ 'Mr', 'mr.':\n'Mr', 'MR': 'Mr', 'MR.': 'Mr', 'mister': 'Mr', 'Mister': 'Mr'}\n\
    \nMs dictionary:  {'Ms': 'Ms', 'Ms.': 'Ms', 'MS': 'Ms', 'MS.': 'Ms',\n'ms': 'Ms',\
    \ 'ms.': 'Ms', 'Mis': 'Ms', 'miss': 'Ms', 'miss.': 'Ms'}\n\nMrs dictionary: {'Mrs':\
    \ 'Mrs', 'Mrs.': 'Mrs', 'mrs': 'Mrs', 'mrs.':\n'Mrs', 'Madam': 'Mrs', 'madam':\
    \ 'Mrs', 'ma\"am': 'Mrs'}\n```\n\n上面给出的解决方案使其非常易于维护、调试和扩展，因为唯一需要的更改是在适当的位置添加一个新字符串。此外，给定的解决方案不需要任何额外的循环或正则表达式。如果你需要一个新的类别，例如“Sir”，请定义\
    \ Python 字典 `sir_dict`，然后添加一个新的代码片段，如下所示：\n\n```\nif title in ['Sir','sir','Sire','sire','Yessir','yessir']:\n\
    \    sir_dict[title] = \"Sir\"\n```\n\n## SQL 中的数据清洗\n\n本节包含几个在 SQL 中执行数据清洗任务的小节。请注意，在\
