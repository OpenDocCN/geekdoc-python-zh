- md: "- The method `np.empty()` initializes an array with 0 values.\n- The method\
    \ `np.arange()` provides a range of numbers.\n- The method `np.shape()` displays\
    \ the shape of an object.\n- The method `np.reshape()`\n- The method `np.linspace()`\
    \ (Useful in regression!)\n- The method `np.mean()` computes the mean of a set\
    \ of numbers.\n- The method `np.std()` computes the standard deviation of a set\
    \ of numbers.\n\nAlthough the `np.zeros()` and `np.empty()` both initialize a\
    \ 2D array with 0, `np.zeros()` requires less execution time. You could also use\
    \ `np.full(size, 0)`, but this method is the slowest of all three methods.\n\n\
    The `reshape()` method and the `linspace()` method are useful for changing the\
    \ dimensions of an array and generating a list of numeric values, respectively.\
    \ The `reshape()` method often appears in TensorFlow code, and the `linspace()`\
    \ method is useful for generating a set of numbers in linear regression (discussed\
    \ in Chapter 4). The `mean()` and `std()` methods are useful for calculating the\
    \ mean and the standard deviation of a set of numbers. For example, you can use\
    \ these two methods to resize the values in a Gaussian distribution so that their\
    \ mean is 0 and the standard deviation is 1. This process is called *standardizing*\
    \ a Gaussian distribution.\n\n## Arrays and Vector Operations\n\nListing 2.12\
