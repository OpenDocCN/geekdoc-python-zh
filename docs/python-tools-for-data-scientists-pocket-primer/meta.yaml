- md: '## Calculating Fourier Transforms


    Listing 4.16 displays the content of `scipy_fourier.py` that illustrates how to
    calculate the inverse of an invertible nxnx matrix.


    **Listing 4.16: scipy_fourier.py**


    ```

    import numpy as np

    import matplotlib.pyplot as plt


    x = np.random.randn(15,1)

    y = 2.5*x + 5 + 0.2*np.random.randn(15,1)


    plt.scatter(x,y)

    plt.show()

    ```


    Listing 4.16 starts with two `import` statements, followed by the initialization
    of `x` as a set of random values via the NumPy `randn()` API. Next, `y` is assigned
    a set of values based on a combination of the values of `x` and randomly calculated
    numbers, as shown here (and you can experiment with the hard-coded values):


    ```

    y = 2.5*x + 5 + 0.2*np.random.randn(15,1)

    ```


    The last portion of Listing 4.16 generates and displays a scatter plot based on
    the values of `x` and `y`. Launch the code in Listing 4.16 and you will see the
    image that is displayed in Figure 4.6.


    ![](img/a5bd78f899e04acbdf3949ed2383b115_178_0.png)


    **FIGURE 4.6** Datasets with potential linear regression.


    The next several sections contain examples of performing transformations of images
    using SciPy APIs.


    ## Flipping Images in SciPy


    Listing 4.17 displays the content of `scipy_flip_image.py` that illustrates how
    to calculate the inverse of an invertible nxn matrix.


    **Listing 4.17: scipy_flip_image.py**


    ```

    import numpy as np

    import matplotlib.pyplot as plt

    from scipy import ndimage, misc


    #Flip Down using scipy misc.face image

    flip_down = np.flipud(misc.face())

    plt.imshow(flip_down)

    plt.show()

    ```


    Listing 4.17 starts with two `import` statements, followed by the initialization
    of x as a set of random values via the NumPy `randn()` API. Next, y is assigned
    a range of values that consist of two parts: a linear equation with input values
    from the x values, which is combined with a randomization factor. Figure 4.7 displays
    the output generated by the code in Listing 4.17.


    ![](img/a5bd78f899e04acbdf3949ed2383b115_179_0.png)


    **FIGURE 4.7** Datasets with potential linear regression.


    ## Rotating Images in SciPy


    Listing 4.18 displays the content of `scipy_rotate_image.py` that illustrates
    how to rotate an image in SciPy.


    **Listing 4.18: scipy_rotate_image.py**


    ```

    from scipy import ndimage, misc

    from matplotlib import pyplot as plt

    panda = misc.face()


    #rotatation function of scipy for image - image rotated 135 degree

    panda_rotate = ndimage.rotate(panda, 135)

    plt.imshow(panda_rotate)

    plt.show()

    ```


    Listing 4.18 starts with two `import` statements, followed by the initialization
    of `x` as a set of random values via the NumPy `randn()` API. Next, `y` is assigned
    a range of values that consist of two parts: a linear equation with input values
    from the `x` values, which is combined with a randomization factor. Figure 4.8
    displays the output generated by the code in Listing 4.18.


    ![](img/a5bd78f899e04acbdf3949ed2383b115_180_0.png)


    **FIGURE 4.8** A rotated image in SciPy.


    ## Google Colaboratory


    Depending on the hardware, GPU-based TF 2 code can be up to 15 times faster than
    CPU-based TF 2 code. However, the cost of a good GPU can be a significant factor.
    Although NVIDIA provides GPUs, those consumer-based GPUs are not optimized for
    multi-GPU support (which is supported by TF 2).


    Fortunately, Google Colaboratory is an affordable alternative that provides free
    GPU support, and also runs as a Jupyter notebook environment. In addition, Google
    Colaboratory executes your code in the cloud and involves zero configuration,
    and it’s available online:


    https://colab.research.google.com/notebooks/welcome.ipynb


    The Jupyter notebook is suitable for training simple models and testing ideas
    quickly. Google Colaboratory makes it easy to upload local files, install software
    in Jupyter notebooks, and even connect Google Colaboratory to a Jupyter runtime
    on your local machine.


    Some of the supported features of Colaboratory include TF 2 execution with GPUs,
    visualization using Matplotlib, and the ability to save a copy of your Google
    Colaboratory notebook to Github by using the following steps from the main menu:
    File > Save a copy to GitHub.


    Moreover, you can load any .ipynb on GitHub by just adding the path to the URL
    colab.research.google.com/github/ (see the Colaboratory website for details).


    Google Colaboratory has support for other technologies, such as HTML and SVG,
    enabling you to render SVG-based graphics in notebooks that are in Google Colaboratory.
    One point to keep in mind: any software that you install in a Google Colaboratory
    notebook is only available on a per-session basis. If you log out and log in again,
    you need to perform the same installation steps that you performed during your
    earlier Google Colaboratory session.


    As mentioned earlier, there is one other *very* nice feature of Google Colaboratory:
    you can execute code on a GPU for up to twelve hours per day for free. This free
    GPU support is extremely useful for people who don’t have a suitable GPU on their
    local machine (which is probably the majority of users), and now they launch TF
    2 code to train neural networks in less than 20 or 30 minutes that would otherwise
    require multiple hours of CPU-based execution time.


    You can also launch Tensorboard inside a Google Colaboratory notebook with the
    following command (replace the specified directory with your own location):


    ```

    %tensorboard --logdir /logs/images

    ```


    Keep in mind the following details about Google Colaboratory. First, whenever
    you connect to a server in Google Colaboratory, you start what’s known as a *session*.
    You can execute the code in a session with a CPU (the default), a GPU, or a TPU
    (which is available for free), and you can execute your code without any time
    limit for your session. However, if you select the GPU option for your session,
    *only the first 12 hours of GPU execution time are free*. Any additional GPU time
    during that same session incurs a small charge (see the website for those details).
    Any software that you install in a Jupyter notebook during a given session will
    *not* be saved when you exit that session. Incidentally, you can also run TF 2
    code and Tensorboard in Google Colaboratory. Navigate to this site for more information:


    https://www.tensorflow.org/tensorboard/r2/tensorboard_in_notebooks


    ## Uploading CSV Files in Google Colaboratory


    Listing 4.19 displays the content `upload_csv_file.ipynb` that illustrates how
    to upload a CSV file to a Google Colaboratory notebook.


    **Listing 4.19: upload_csv_file.ipynb**


    ```

    import pandas as pd


    from google.colab import files

    uploaded = files.upload()


    df = pd.read_csv("weather_data.csv")

    print("dataframe df:")

    df

    ```


    Listing 4.19 uploads the CSV file `weather_data.csv` whose contents are not shown
    because they are not important for this example. The code shown in bold is the
    Colaboratory-specific code that is required to upload the CSV file. When you launch
    this code, you will see a small button labeled “Browse,” which you must click
    and then select the CSV file that is listed in the code snippet. After doing so,
    the rest of the code is executed and you will see the contents of the CSV file
    displayed in your browser session.


    > **NOTE** You must supply the CSV file `weather_data.csv` if you want to launch
    this Jupyter notebook successfully in Google Colaboratory.


    ## Summary


    This chapter started with an introduction to Sklearn, which is an extremely versatile
    Python library for machine learning tasks.


    Next you learned about SciPy, which is a Python library that is well-suited for
    scientific computing tasks. You saw simple code samples that show how to flip
    and rotate images in SciPy.


    Finally, you learned about Google Colaboratory (also called “Colab”), which is
    a freely available online tool for creating and launching Jupyter notebooks. Colab
    supports many useful features, such as downloading notebooks in various formats,
    importing Github repositories directly into a notebook, and free support for GPU
    and TPU when you execute notebooks in Google Colaboratory.'
