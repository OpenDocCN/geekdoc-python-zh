    ## What to Look for in Categorical Data


    This section contains suggestions for handling inconsistent data values, and you
    can determine which ones to adopt based on any additional factors that are relevant
    to your particular task. For example, consider not using columns that have very
    low cardinality (equal to or close to 1), as well as numeric columns with zero
    or very low variance.


    Next, check the contents of categorical columns for inconsistent spellings or
    errors. A good example pertains to the gender category, which can consist of a
    combination of the following values:


    - male

    - Male

    - female

    - Female

    - m

    - f

    - M

    - F


