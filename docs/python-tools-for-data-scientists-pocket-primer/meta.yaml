    The `rand()` function gives you a random number. The values of `rand()` are uniformly-distributed\
    \ between 0 and 1: the value is never 0 and never 1.\n\nOften, you want random\
    \ integers instead. Here is a user-defined function you can use to obtain a random\
    \ nonnegative integer less than n:\n\n```\nfunction randint(n) {\n    return int(n\
    \ * rand())\n}\n```\n\nThe product produces a random real number greater than\
    \ 0 and less than n. We then make it an integer (using `int`) between 0 and n\
    \ – 1.\n\nHere is an example where a similar function is used to produce random\
    \ integers between 1 and n:\n\n```\nawk '\n# Function to roll a simulated die.\n\
    function roll(n) { return 1 + int(rand() * n) }\n# Roll 3 six-sided dice and print\
    \ total number of points.\n{\n    printf(\"%d points\\n\", roll(6)+roll(6)+roll(6))\n\
    }'\n```\n\nNote that `rand` starts generating numbers from the same point (or\
    \ “seed”) each time `awk` is invoked. Hence, a program will produce the same results\
    \ each time it is launched. If you want a program to do different things each\
    \ time it is used, you must change the seed to a value that will be different\
    \ in each run.\n\nUse the `srand(x)` function to set the starting point, or seed,\
    \ for generating random numbers to the value x. Each seed value leads to a particular\
    \ sequence of “random” numbers. Thus, if you set the seed to the same value a\
    \ second time, you will get the same sequence of “random” numbers again. If you\
    \ omit the argument x, as in `srand()`, then the current date and time of day\
    \ are used for a seed. This is how to obtain random numbers that are truly unpredictable.\
    \ The return value of `srand()` is the previous seed. This makes it easy to keep\
    \ track of the seeds for use in consistently reproducing sequences of random numbers.\n\
    \nThe `time()` function (not in all versions of `awk`) returns the current time\
    \ in seconds since January 1, 1970. The function `ctime` (not in all versions\
    \ of `awk`) takes a numeric argument in seconds and returns a string representing\
    \ the corresponding date, suitable for printing or further processing.\n\nThe\
