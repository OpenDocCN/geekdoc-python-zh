    \ model in machine learning, which you will see in the next section.\n\n## The\
    \ train_test_split() Class in Sklearn\n\nThis Sklearn class is an extremely useful\
    \ class for machine learning because you can create a four-way split of a dataset\
    \ with a single line code. The four subsets of a dataset are typically named as\
    \ the following variables:\n\n- X_train\n- y_train\n- X_test\n- y_test\n\nFigure\
    \ 4.3 displays the relationship among the preceding four subsets of data when\
    \ you need to split a dataset for linear regression or for classification tasks.\n\
    \n![](img/a5bd78f899e04acbdf3949ed2383b115_162_0.png)\n\nA few details to keep\
    \ in mind regarding the preceding diagram:\n\n1. usually a 70/30, 75/25, or 80/20\
    \ split for train/test data\n2. x: usually a subset of the columns in a dataset\n\
    3. y: column can be located anywhere\n4. labeled x and y (sometimes X and Y)\n\
    5. X = X_train + X_test\n6. y = y_train + y_test\n\nThe code sample sklearn_iris_train.py\
    \ (later in this chapter) contains the two lines of code that create the four\
    \ required subsets of data:\n\n```python\nfrom sklearn.model_selection import\
    \ train_test_split\nX_train, X_test, y_train, y_test = train_test_split(X, y,\n\
    test_size=0.3, random_state=1)\n```\n\n## Selecting Columns for X and y\n\nSelecting\
    \ the correct set of columns for X and y can be difficult for datasets that contain\
    \ many columns.\n\nYou must decide which subset of columns of the dataset will\
    \ belong to X and which column is designated as the y column (i.e., the target\
    \ or label column).\n\nIf you have a dataset with only four or five columns, it's\
    \ probably simple to determine which columns will be assigned to X and which column\
    \ is designated as y. However, if you select a set of columns from a dataset that\
    \ contains a large number of columns, how can you be certain that\n\n- important\
    \ categorical columns are included\n- all of the included columns are required\n\
    - the chosen columns are the best columns\n\nThe answer to the first bullet item\
