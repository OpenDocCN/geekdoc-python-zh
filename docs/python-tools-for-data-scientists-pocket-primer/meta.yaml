    \n**图 4.2** 基于清单 4.3 中的代码显示的 `Digits` 数据集中的图像。\n\n前面的代码示例向你展示了显示 Sklearn 内置数据集的内容是多么容易。此外，Sklearn\
    \ 提供了一种直接的方法，可以将数据集拆分为用于机器学习中训练模型的子集，你将在下一节中看到。\n\n## Sklearn 中的 train_test_split()\
    \ 类\n\n这个 Sklearn 类对于机器学习来说是一个极其有用的类，因为你可以用一行代码创建一个数据集的四路拆分。数据集的四个子集通常命名为以下变量：\n\
    \n- X_train\n- y_train\n- X_test\n- y_test\n\n图 4.3 显示了当你需要为线性回归或分类任务拆分数据集时，上述四个数据子集之间的关系。\n\
    \n![](img/a5bd78f899e04acbdf3949ed2383b115_162_0.png)\n\n关于上图，有几个细节需要记住：\n\n1.\
    \  通常训练/测试数据的拆分比例为 70/30、75/25 或 80/20。\n2.  x：通常是数据集中列的一个子集。\n3.  y：列可以位于任何位置。\n\
    4.  标记为 x 和 y（有时是 X 和 Y）。\n5.  X = X_train + X_test\n6.  y = y_train + y_test\n\
    \n代码示例 sklearn_iris_train.py（本章稍后）包含创建所需四个数据子集的两行代码：\n\n```python\nfrom sklearn.model_selection\
    \ import train_test_split\nX_train, X_test, y_train, y_test = train_test_split(X,\
    \ y,\ntest_size=0.3, random_state=1)\n```\n\n## 为 X 和 y 选择列\n\n对于包含许多列的数据集，为 X\
    \ 和 y 选择正确的列集可能很困难。\n\n你必须决定数据集的哪些列子集属于 X，以及哪一列被指定为 y 列（即目标或标签列）。\n\n如果你的数据集只有四列或五列，确定哪些列将分配给\
    \ X 以及哪一列被指定为 y 可能很简单。但是，如果你从一个包含大量列的数据集中选择一组列，你如何确定：\n\n-   重要的分类列是否已包含在内\n-\
    \   所有包含的列是否都是必需的\n-   所选的列是否是最佳列\n\n第一个要点的答案在第 3 章中讨论过，你在其中学习了如何使用 Pandas 的 `map()`\
    \ 函数将分类列转换为数值列，如下所示：\n\n```python\n# map ham/spam to 0/1 values:\ndf['type'] =\
    \ df['type'].map( {'ham':0 , 'spam':1} )\n```\n\n如果你有一个包含 M 和 F 值的性别列，你可以修改前面的代码片段，如下所示：\n\
    \n```python\n# map male/female to 0/1 values:\ndf['gender'] = df['gender'].map(\
    \ {'male':0, 'female':1} )\n```\n\n第二个和第三个要点在下一节中部分涉及，该节讨论了特征选择和特征提取，它们是特征工程的两个方面。\n\
    \n## 什么是特征工程？\n\n特征工程是一个总称，包括几种用于确定填充集合 X 的列的技术。\n\n特征选择涉及从数据集中选择列的子集，这是本章前面讨论过的技术。\n\
    \n特征提取涉及找到数据集中列的线性组合。例如，PCA（主成分分析）就是这样一种技术：PCA 计算特征值和特征向量（线性代数的一部分），其中后者是数据集中现有列的线性组合。\n\
    \nPCA 是 SVD（奇异值分解）的一个子集，它指的是确定数据集最重要列（或其线性组合）子集的技术。虽然 PCA 和 SVD 超出了本书的范围，但你可以找到许多在线文章和代码示例，说明如何执行\
    \ PCA，以及属于 SVD 的算法。\n\n## Sklearn 中的鸢尾花数据集 (1)\n\n除了支持机器学习算法外，Sklearn 还提供了各种内置数据集，你可以用一行代码访问它们。清单\
    \ 4.4 展示了 `sklearn_iris1.py` 的内容，该文件说明了如何轻松加载鸢尾花数据集并显示其内容。\n\n### 清单 4.4: sklearn_iris1.py\n\
