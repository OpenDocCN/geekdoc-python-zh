- md: '## Missing Data, Anomalies, and Outliers


    Although missing data is not directly related to checking for anomalies and outliers,
    in general, you will perform all three of these tasks. Each task involves a set
    of techniques to help you perform an analysis of the data in a dataset, and the
    following subsections describe some of those techniques.


    ## Missing Data


    How you decide to handle missing data depends on the specific dataset. Here are
    some ways to handle missing data (the first three techniques are manual techniques,
    and the other techniques are algorithms):


    1.  Replace missing data with the mean/median/mode value.

    2.  Infer (“impute”) the value for missing data.

    3.  Delete rows with missing data.

    4.  Use the Isolation Forest algorithm (a tree-based algorithm).

    5.  Use the minimum covariance determinant.

    6.  Use the local outlier factor.

    7.  Use the one-class SVM (Support Vector Machine).


    In general, replacing a missing numeric value with zero is a risky choice: this
    value is obviously incorrect if the values of a feature are between 1,000 and
    5,000. For a feature that has numeric values, replacing a missing value with the
    average value is better than the value zero (unless the average equals zero);
    also consider using the median value. For categorical data, consider using the
    mode to replace a missing value.


    If you are not confident that you can impute a “reasonable” value, consider excluding
    the row with a missing value, and then train a model with the imputed value and
    the deleted row.


    One problem that can arise after removing rows with missing values is that the
    resulting dataset is too small. In this case, consider using SMOTE, which is discussed
    later in this appendix, to generate synthetic data.


    ## Anomalies and Outliers


    In simplified terms, an outlier is an abnormal data value that is outside the
    range of “normal” values. For example, a person’s height in centimeters is typically
    between 30 centimeters and 250 centimeters. Hence, a data point (e.g., a row of
    data in a spreadsheet) with a height of 5 centimeters or a height of 500 centimeters
    is an outlier. The consequences of these outlier values are unlikely to involve
    a significant financial or physical loss (though they could adversely affect the
    accuracy of a trained model).


    Anomalies are also outside the “normal” range of values (just like outliers),
    and they are typically more problematic than outliers: anomalies can have more
    “severe” consequences than outliers. For example, consider the scenario in which
    someone who lives in California suddenly makes a credit card purchase in New York.
    If the person is on vacation (or a business trip), then the purchase is an outlier
    (it’s “outside” the typical purchasing pattern), but it’s not an issue. However,
    if that person was in California when the credit card purchase was made, then
    it’s most likely to be credit card fraud, as well as an anomaly.


    Unfortunately, there is no simple way to decide how to deal with anomalies and
    outliers in a dataset. Although you can exclude rows that contain outliers, doing
    so might deprive the dataset—and therefore the trained model—of valuable information.
    You can try modifying the data values (described as follows), but again, this
    might lead to erroneous inferences in the trained model. Another possibility is
    to train a model with the dataset that contains anomalies and outliers, and then
    train a model with a dataset from which the anomalies and outliers have been removed.
    Compare the two results and see if you can infer anything meaningful regarding
    the anomalies and outliers.


    ## Outlier Detection


    Although the decision to keep or drop outliers is your decision to make, there
    are some techniques available that help you detect outliers in a dataset. This
    section contains a short list of some techniques, along with a very brief description
    and links for additional information.


    Perhaps *trimming* is the simplest technique (apart from dropping outliers), which
    involves removing rows whose feature value is in the upper 5% range or the lower
    5% range. *Winsorizing* the data is an improvement over trimming. Set the values
    in the top 5% range equal to the maximum value in the 95th percentile, and set
    the values in the bottom 5% range equal to the minimum in the 5th percentile.


    The *Minimum Covariance Determinant* is a covariance-based technique, and a Python-based
    code sample that uses this technique can be found online: https://scikit-learn.org/stable/modules/outlier_detection.html.


    The *Local Outlier Factor* (LOF) technique is an unsupervised technique that calculates
    a local anomaly score via the kNN (k Nearest Neighbor) algorithm. Documentation
    and short code samples that use LOF can be found online: https://scikit-learn.org/stable/modules/generated/sklearn.neighbors.LocalOutlierFactor.html.


    Two other techniques involve the Huber and the Ridge classes, both of which are
    included as part of Sklearn. The Huber error is less sensitive to outliers because
    it’s calculated via linear loss, similar to the MAE (Mean Absolute Error). A code
    sample that compares Huber and Ridge can be found online: https://scikit-learn.org/stable/auto_examples/linear_model/plot_huber_vs_ridge.html.


    You can also explore the Theil-Sen estimator and RANSAC, which are “robust” against
    outliers, and additional information can be found online: https://scikit-learn.org/stable/auto_examples/linear_model/plot_theilsen.html
    and https://en.wikipedia.org/wiki/Random_sample_consensus.


    Four algorithms for outlier detection are discussed at the following site: https://www.kdnuggets.com/2018/12/four-techniques-outlier-detection.html.


    One other scenario involves “local” outliers. For example, suppose that you use
    kMeans (or some other clustering algorithm) and determine that a value is an outlier
    with respect to one of the clusters. While this value is not necessarily an “absolute”
    outlier, detecting such a value might be important for your use case.


    ## What is Data Drift?


    The value of data is based on its accuracy, its relevance, and its age. Data drift
    refers to data that has become less relevant over time. For example, online purchasing
    patterns in 2010 are probably not as relevant as data from 2020 because of various
    factors (such as the profile of different types of customers). There might be
    multiple factors that can influence data drift in a specific dataset.


    Two techniques are the domain classifier and the black-box shift detector, both
    of which can be found online: https://blog.dataiku.com/towards-reliable-mlops-with-drift-detectors.


    ## What is Imbalanced Classification?


    Imbalanced classification involves datasets with imbalanced classes. For example,
    suppose that class A has 99% of the data and class B has 1%. Which classification
    algorithm would you use? Unfortunately, classification algorithms don''t work
    well with this type of imbalanced dataset. Here is a list of several well-known
    techniques for handling imbalanced datasets:


    -   Random resampling rebalances the class distribution.

    -   Random oversampling duplicates data in the minority class.

    -   Random undersampling deletes examples from the majority class.

    -   SMOTE


    *Random resampling* transforms the training dataset into a new dataset, which
    is effective for imbalanced classification problems.


    The *random undersampling* technique removes samples from the dataset, and involves
    the following:


    -   randomly remove samples from the majority class

    -   can be performed with or without replacement

    -   alleviates imbalance in the dataset

    -   may increase the variance of the classifier

    -   may discard useful or important samples


    However, random undersampling does not work well with a dataset that has a 99%/1%
    split into two classes. Moreover, undersampling can result in losing information
    that is useful for a model.


    Instead of random undersampling, another approach involves generating new samples
    from a minority class. The first technique involves oversampling examples in the
    minority class and duplicate examples from the minority class.


    There is another technique that is better than the preceding technique, which
    involves the following:


    -   synthesizing new examples from a minority class

    -   a type of data augmentation for tabular data

    -   generating new samples from a minority class'
  mdcn: '## 缺失数据、异常值与离群点


    尽管缺失数据与检查异常值和离群点没有直接关系，但通常你会同时执行这三项任务。每项任务都涉及一系列技术，用于帮助你分析数据集中的数据，以下小节将描述其中一些技术。


    ## 缺失数据


    如何处理缺失数据取决于具体的数据集。以下是一些处理缺失数据的方法（前三种是手动技术，其余是算法）：


    1.  用均值/中位数/众数替换缺失数据。

    2.  推断（“插补”）缺失数据的值。

    3.  删除包含缺失数据的行。

    4.  使用孤立森林算法（一种基于树的算法）。

    5.  使用最小协方差行列式。

    6.  使用局部离群因子。

    7.  使用单类SVM（支持向量机）。


    通常，将缺失的数值替换为零是一个有风险的选择：如果某个特征的值在1,000到5,000之间，那么这个值显然是不正确的。对于具有数值的特征，将缺失值替换为平均值比替换为零更好（除非平均值等于零）；也可以考虑使用中位数。对于分类数据，考虑使用众数来替换缺失值。


    如果你不确定能否插补出一个“合理”的值，可以考虑排除包含缺失值的行，然后使用插补值和删除的行来训练模型。


    删除包含缺失值的行后可能出现的一个问题是，生成的数据集太小。在这种情况下，可以考虑使用SMOTE（本附录稍后讨论）来生成合成数据。


    ## 异常值与离群点


    简而言之，离群点是超出“正常”值范围的异常数据值。例如，一个人的身高（以厘米为单位）通常在30厘米到250厘米之间。因此，一个身高为5厘米或500厘米的数据点（例如电子表格中的一行数据）就是一个离群点。这些离群点值不太可能导致重大的财务或人身损失（尽管它们可能会影响训练模型的准确性）。


    异常值也超出了“正常”值范围（就像离群点一样），但它们通常比离群点问题更大：异常值可能比离群点具有更“严重”的后果。例如，考虑这样一种情况：一个住在加利福尼亚州的人突然在纽约进行了一笔信用卡消费。如果这个人正在度假（或出差），那么这笔消费就是一个离群点（它“超出”了典型的消费模式），但这不是问题。然而，如果这个人在进行信用卡消费时仍在加利福尼亚州，那么这很可能是信用卡欺诈，也就是一个异常值。


    不幸的是，没有简单的方法来决定如何处理数据集中的异常值和离群点。虽然你可以排除包含离群点的行，但这样做可能会剥夺数据集——以及训练模型——的有价值的信息。你可以尝试修改数据值（如下所述），但这同样可能导致训练模型出现错误的推断。另一种可能性是使用包含异常值和离群点的数据集训练一个模型，然后使用移除了异常值和离群点的数据集再训练一个模型。比较这两个结果，看看是否能推断出关于异常值和离群点的任何有意义的信息。


    ## 离群点检测


    尽管保留或删除离群点的决定权在你，但有一些技术可以帮助你检测数据集中的离群点。本节简要列出了一些技术，附带非常简要的描述和更多信息的链接。


    也许*修剪*是最简单的技术（除了删除离群点），它涉及删除特征值在上5%范围或下5%范围内的行。对数据进行*Winsorizing*处理是修剪的改进。将上5%范围内的值设置为第95百分位数的最大值，将下5%范围内的值设置为第5百分位数的最小值。


    *最小协方差行列式*是一种基于协方差的技术，可以在网上找到使用该技术的Python代码示例：https://scikit-learn.org/stable/modules/outlier_detection.html。


    *局部离群因子*（LOF）技术是一种无监督技术，它通过kNN（k近邻）算法计算局部异常分数。可以在网上找到使用LOF的文档和简短代码示例：https://scikit-learn.org/stable/modules/generated/sklearn.neighbors.LocalOutlierFactor.html。


    另外两种技术涉及Huber和Ridge类，两者都是Sklearn的一部分。Huber误差对离群点不太敏感，因为它是通过线性损失计算的，类似于MAE（平均绝对误差）。可以在网上找到比较Huber和Ridge的代码示例：https://scikit-learn.org/stable/auto_examples/linear_model/plot_huber_vs_ridge.html。


    你还可以探索Theil-Sen估计器和RANSAC，它们对离群点具有“鲁棒性”，更多信息可以在网上找到：https://scikit-learn.org/stable/auto_examples/linear_model/plot_theilsen.html
    和 https://en.wikipedia.org/wiki/Random_sample_consensus。


    以下网站讨论了四种离群点检测算法：https://www.kdnuggets.com/2018/12/four-techniques-outlier-detection.html。


    另一种情况涉及“局部”离群点。例如，假设你使用kMeans（或其他聚类算法）并确定某个值相对于某个聚类是离群点。虽然这个值不一定是“绝对”离群点，但检测这样的值可能对你的用例很重要。


    ## 什么是数据漂移？


    数据的价值基于其准确性、相关性和时效性。数据漂移指的是数据随时间推移变得不那么相关。例如，由于各种因素（例如不同类型客户的概况），2010年的在线购买模式可能不如2020年的数据相关。在特定数据集中，可能有多种因素会影响数据漂移。


    两种技术是领域分类器和黑盒偏移检测器，两者都可以在网上找到：https://blog.dataiku.com/towards-reliable-mlops-with-drift-detectors。


    ## 什么是不平衡分类？


    不平衡分类涉及类别不平衡的数据集。例如，假设类别A占数据的99%，类别B占1%。你会使用哪种分类算法？不幸的是，分类算法在这种不平衡的数据集上效果不佳。以下是处理不平衡数据集的几种知名技术列表：


    -   随机重采样重新平衡类别分布。

    -   随机过采样复制少数类中的数据。

    -   随机欠采样删除多数类中的样本。

    -   SMOTE


    *随机重采样*将训练数据集转换为新数据集，这对于不平衡分类问题很有效。


    *随机欠采样*技术从数据集中移除样本，涉及以下步骤：


    -   随机移除多数类中的样本

    -   可以有放回或无放回地进行

    -   缓解数据集中的不平衡

    -   可能增加分类器的方差

    -   可能丢弃有用或重要的样本


    然而，随机欠采样对于99%/1%分割的两个类别的数据集效果不佳。此外，欠采样可能导致丢失对模型有用的信息。


    除了随机欠采样，另一种方法涉及从少数类生成新样本。第一种技术涉及对少数类中的样本进行过采样并复制少数类中的样本。


    还有一种技术比前面的技术更好，它涉及以下步骤：


    -   从少数类合成新样本

    -   一种针对表格数据的数据增强类型

    -   从少数类生成新样本'
