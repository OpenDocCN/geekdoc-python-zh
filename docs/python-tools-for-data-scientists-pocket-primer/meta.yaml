    # Mapping Categorical Data to Numeric Values


    Character data is often called *categorical data*, examples of which include people’s
    names, home or work addresses, and email addresses. Many types of categorical
    data involve short lists of values. For example, the days of the week and the
    months in a year involve seven and twelve distinct values, respectively. Notice
    that the days of the week have a relationship: each day has a previous day and
    a next day, and similarly for the months of a year.


    However, the colors of an automobile are independent of each other. The color
    red is not “better” or “worse” than the color blue. Cars of a certain color can
    have a statistically higher number of accidents, but we won’t address that issue
    here.


    There are several well-known techniques for mapping categorical values to a set
    of numeric values. A simple example where you need to perform this conversion
    involves the gender feature in the Titanic dataset. This feature is one of the
    relevant features for training a machine learning model. The gender feature has
    {M, F} as its set of possible values. As you will see later in this appendix,
    Pandas makes it very easy to convert the set of values {M,F} to the set of values
    {0,1}.


    Another mapping technique involves mapping a set of categorical values to a set
    of consecutive integer values. For example, the set {Red, Green, Blue} can be
    mapped to the set of integers {0,1,2}. The set {Male,'
