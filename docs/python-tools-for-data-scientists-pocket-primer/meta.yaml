    \          name    year month fname  lname      hdate1      hdate2\n0  Jane-Smith\
    \  2015.0   Aug  Jane  Smith  2015.0#Aug  2015.0-Aug\n1  Dave-Smith  2020.0  \
    \ Jan  Dave  Smith  2020.0#Jan  2020.0-Jan\n2  Jane-Jones  2018.0   Dec  Jane\
    \  Jones  2018.0#Dec  2018.0-Dec\n3  Jane-Stone  2017.0   Feb  Jane  Stone  2017.0#Feb\
