    \n接下来，`tr` 命令的输出被重定向到 `sed` 命令，该命令删除连字符（-）后的任何空格，然后将剩余的任何空格替换为连字符（-）。\n\n`sed`\
    \ 命令的输出被重定向到一个 `awk` 脚本，该脚本用一年中各月份的三字母缩写初始化一个数组。此数组在代码后面被引用，用于检测任何无效的月份格式。\n\n\
    `awk` 脚本的主要部分与清单 5.18 中用于检测各种日期格式以初始化每天、月份（作为三字母值）和年份的内容相似。启动清单 5.20 中的代码，你将看到以下输出：\n\
    \n```\n04-SEP-2022 => SEP-04-2020\n04-SEP-2022 => SEP-04-2020\n04-SEP-22 => SEP-04-2022\n\
    05-OCT-2022 => OCT-05-2020\n05-OCT-2022 => OCT-05-2020\n05-OCT-22 => OCT-05-2022\n\
    06-JAN-2022 => JAN-06-2020\n06-JAN-2022 => JAN-06-2020\nInvalid month: JNN-06-2022\n\
    ```\n\n## 处理日期和时间格式\n\n既然你已经看到了 `MM:DD:YYYY` 格式的日期代码示例，本节将处理 `YYYY:MM:DD:HH:MM:SS`\
    \ 格式的日期。尽管本节中基于 `awk` 的代码示例比本书中所有其他代码示例都要长得多，但它基于你在前面与日期相关的代码示例中已经见过的技术。如果你现在不需要深入研究此代码示例的细节，可以随意跳过本节，不会影响内容的连贯性。\n\
    \n所有字段（年份除外）的单位数字值都被视为有效，处理所有可能的组合变得相当繁琐。然而，本节中的代码示例向你展示了一种捷径，它涉及动态修改输入行，以便在从左到右处理输入字符串时逐步填充。\n\
    \n为确保这一点清晰，字符串 `3/15/22 5:5:44` 是一个有效的日期，当代码检查各个日期相关字段的有效性时，前面的字符串会依次修改如下：\n\n\
    ```\n3/15/22 5:5:44\n03/15/22 5:5:44\n03/15/2022 5:5:44\n03/15/2022 5:5:44\n03/15/2022\
    \ 05:5:44\n03/15/2022 05:05:44\n```\n\n前面日期列表中的最后一行是“完全填充”的日期。这种方法显著减少了需要检查的模式数量，以确定日期是否具有有效格式。\n\
    \n清单 5.21 显示了包含日期的 `dates-times.txt` 的内容，清单 5.22 显示了 `date-times-padded.sh` 的内容，这是一个基于\
    \ `awk` 的 shell 脚本，用于处理清单 5.21 中的日期。\n\n### 清单 5.21：date-times.txt\n\n```\n2/30/2020\
    \ 15:05:44\n3/15/22 15:5:44\n4/29/23 15:5:4\n5/16/24 5:05:44\n6/17/25 5:5:44\n\
    7/18/26 5:5:4\n8/19/24 115:05:44\n```\n\n请注意，清单 5.21 中的第一行和最后一行是无效的：第一行包含二月份的值\
    \ 30，这对于任何年份都是无效的，最后一行包含无效的小时值。\n\n清单 5.22 显示了 `date-times-padded.sh` 的内容，该脚本确定清单\
    \ 5.21 中哪些日期具有 `YYYY:MM:DD:HH:MM:SS` 格式。\n\n### 清单 5.22：date-times-padded.sh\n\
    \n```\ncat date-times.txt | awk -F\"/\" '\nfunction check_leap_year(year) {\n\
    \    #####################################\n    # 一个年份是闰年，如果满足以下条件：\n    # 1)\
    \ 它能被 4 整除，并且\n    # 2) 世纪年必须能被 400 整除\n    # => 2000 年是闰年，但 1900 年不是。\n    #####################################\n\
    \n    result = 0 # 0：非闰年 1：闰年\n    if((year % 4) == 0) {\n        if((year % 100)\
