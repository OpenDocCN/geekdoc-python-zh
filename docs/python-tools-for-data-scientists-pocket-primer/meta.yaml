    ## PREFACE


    ### What is the Primary Value Proposition for this Book?


    This book contains a fast-paced introduction to as much relevant information about
    Python tools for data scientists as possible that can be reasonably included in
    a book of this size. If you are a novice, this book will give you a starting point
    from which you can decide which Python technologies that you want to explore in
    greater detail.


    You will be exposed to features of NumPy and Pandas, how to write regular expressions,
    and how to perform data cleaning tasks. Some topics are presented in a cursory
    manner, which is for two main reasons. First, it''s important that you be exposed
    to these concepts. In some cases, you will find topics that might pique your interest,
    and hence motivate you to learn more about them through self-study; in other cases,
    you will probably be satisfied with a brief introduction. In other words, you
    decide whether to delve deeply into each of the topics in this book.


    Second, a full treatment of all the topics that are covered in this book would
    significantly increase its size, and few people are interested in reading technical
    tomes with 500 or more pages.


    *However, it''s important for you to decide if this approach is suitable for your
    needs and learning style. If not, you can select one or more of the plethora of
    data analytics books that are available.*


    ### The Target Audience


    This book is intended primarily for people who have worked with Python and are
    interested in learning about several important Python libraries.


    Moreover, this book is also intended to reach an international audience of readers
    with highly diverse backgrounds in various age groups. Consequently, this book
    uses standard English rather than colloquial expressions that might be confusing
    to those readers. As you know, many people learn by different types of imitation,
    which includes reading, writing, or hearing new material. This book takes these
    points into consideration to provide a comfortable and meaningful learning experience
    for the intended readers.


    ### What Will I Learn from This Book?


    The first chapter contains a quick tour of basic Python, followed by a chapter
    that introduces you to Python data structures. Next, Chapter 3 introduces you
    to NumPy, followed by a chapter for Pandas. Chapter 5 provides a high-level view
    of Sklearn, which is an extremely powerful Python library that is central to many
    machine learning tasks.


    Chapter 6 contains an assortment of data cleaning tasks that are solved via Python
    as well as the awk programming language. Chapter 6 delves into data visualization
    with Matplotlib, Seaborn, and Bokeh. Next, one appendix explores issues that can
    arise with data, followed by an appendix for awk.


    ### Why is an Appendix for awk Included in This Book?


    While many data cleaning tasks can be performed via Python, sometimes it''s much
    easier to perform data cleaning via awk. If you have not worked with awk, it''s
    a venerable Unix utility that was developed almost 50 years ago by Aho, Weinberger,
    and Kernighan (the latter is a coauthor of the famous K&R book for C).


    Incidentally, most of the Python code samples are short (usually less than one
    page and sometimes less than half a page), and if need be, you can easily and
    quickly copy/paste the code into a new Jupyter notebook. For the Python code samples
    that reference a CSV file, you do not need any additional code in the corresponding
    Jupyter notebook to access the CSV file. Moreover, the code samples execute quickly,
    so you won''t need to avail yourself of the free GPU that is provided in Google
    Colaboratory.


    If you do decide to use Google Colaboratory, you can easily copy/paste the Python
    code into a notebook, and also use the upload feature to upload existing Jupyter
    notebooks. Keep in mind the following point: if the Python code references a CSV
    file, make sure that you include the appropriate code snippet (as explained in
    Chapter 1) to access the CSV file in the corresponding Jupyter notebook in Google
    Colaboratory.


    ### Do I Need to Learn the Theory Portions of this Book?


    Once again, the answer depends on the extent to which you plan to become involved
    in data analytics. For example, if you plan to study machine learning, then you
    will probably learn how to create and train a model, which is a task that is performed
    after data cleaning tasks. In general, you will probably need to learn everything
    that you encounter in this book if you are planning to become a machine learning
    engineer.


    ### Why Does This Book Include Sklearn Material?


    The amount of Sklearn material in this book is minimal because this book is not
    about machine learning. The Sklearn material is located in Chapter 6, where you
    will learn about some of the Sklearn built-in datasets. If you decide to delve
    into machine learning, you will have already been introduced to some aspects of
    Sklearn.


    ### Getting the Most from This Book


    Some programmers learn well from prose, others learn well from sample code (and
    lots of it), which means that there''s no single style that can be used for everyone.


    Moreover, some programmers want to run the code first, see what it does, and then
    return to the code to delve into the details (and others use the opposite approach).


    Consequently, there are various types of code samples in this book: some are short,
