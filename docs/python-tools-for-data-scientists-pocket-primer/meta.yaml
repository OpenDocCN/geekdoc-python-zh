    # Data Cleaning from the Command Line (optional)


    This section is marked “optional” because the solutions to tasks involve an understanding
    of some Unix-based utilities. Although this book does not contain details about
    those utilities, you can find online tutorials with examples regarding these utilities.


    This section contains several subsections that perform data cleaning tasks that
    involve the `sed` and `awk` utilities:


    +   - replace multiple delimiters with a single delimiter (sed)

    - restructure a dataset so all rows have the same column count (awk)


    Keep in mind the following point about these examples: they must be performed
    from the command line before they can be processed in a Pandas data frame.


    # Working with the sed Utility


    This section contains an example of how to use the `sed` command line utility
    to replace different delimiters with a single delimiter for the fields in a text
    file. You can use the same code for other file formats, such as CSV files and
    TSV files.


    This section does not provide any details about `sed` beyond the code sample.
    However, after you read the code (it’s only one line), you will understand how
    to adapt that code snippet to your own requirements (i.e., how to specify different
    delimiters).


    Listing 5.5 displays the content of `delimiter1.txt` and Listing 5.6 displays
    the content of `delimiter1.sh` that replaces all delimiters with a comma (“,”).


    **Listing 5.5: delimiter1.txt**


    ```

    1000|Jane:Edwards^Sales

    2000|Tom:Smith^Development

    3000|Dave:Del Ray^Marketing

    ```


    **Listing 5.6: delimiter1.sh**


    ```

    cat delimiter1.txt | sed -e ''s/:/,/'' -e ''s/|/,/'' -e ''s/\^/,/''

    ```


    Listing 5.6 starts with the `cat` command line utility, which sends the contents
    of the file `delimiter1.txt` to “standard output.” However, in this'
  - '[PAGE 197]


    example, the output of this command becomes the input to the sed command because
    of the pipe (“|”) symbol.


    The `sed` command consists of three parts, all of which are connected by the `-e`
    switch. You can think of `-e` as indicating “there is more processing to be done”
    by the `sed` command. In this example, there are three occurrences of `-e`, which
    means that the `sed` command will execute three snippets.


    The first code snippet is `''s/:/,/''`, which translates into “replace each semi-colon
    with a comma.” The result of this operation is passed to the next code snippet,
    which is `''s/|/,/''`. This code snippet translates into “replace each pipe symbol
    with a comma.” The result of this operation is passed to the next code snippet,
    which is `''s/\^/,/''`. This code snippet translates into “replace each caret
    symbol (^) with a comma.” The result of this operation is sent to the standard
    output, which can be redirected to another text file. Launch the code in Listing
    5.6 and you will see the following output:


    ```

    1000,Jane,Edwards,Sales

    2000,Tom,Smith,Development

    3000,Dave,Del Ray,Marketing

    ```


    There are three comments to keep in mind. First, the snippet contains a backslash
    because the caret symbol (^) is a meta character, so we need to “escape” this
    character. The same is true for other meta characters (such as “$” and “.”).


    Second, you can easily extend the `sed` command for each new delimiter that you
    encounter as a field separator in a text file: simply follow the pattern that
    you see in Listing 5.6 for each new delimiter.


    Third, redirect the output of `delimiter1.sh` to the text file `delimiter2.txt`
    by launching the following command:


    ```

    ./delimiter1.sh > delimiter2.txt

    ```


    If an error occurs in the preceding code snippet, make sure that `delimiter1.sh`
    is executable by invoking the following command:


    ```

    chmod 755 delimiter1.sh

    ```


    This concludes the example involving the `sed` command line utility, which is
    a very powerful utility for processing text files. Check online for articles and
    blog posts if you want to learn more about the `sed` utility.'
  - "[PAGE 198]\n\n# Working with Variable Column Counts\n\nThis section shows you\
    \ how to use the `awk` command line utility in order to “pad” rows in a CSV file\
    \ with `NaN` values so that all records have the same number of columns.\n\nListing\
    \ 5.7 displays the content `variable_columns.csv` and Listing 5.8 displays the\
    \ content of `variable_columns.sh` that uses the `awk` utility to pad the number\
    \ of columns in a CSV file.\n\nListing 5.7: variable_columns.csv\n\n```\n10,20,30\n\
    10,20,30,40\n10,20,30,40,50,60\n```\n\nListing 5.8: variable_columns.sh\n\n```\n\
    filename=\"variable_columns.csv\"\n\ncat $filename | awk -F\",\" '\nBEGIN { colCount\
    \ = 6 }\n{\n    printf(\"%s\", $0)\n    for(i=NF; i<colCount; i++) {\n       \
    \ printf(\",NaN\")\n    }\n    print \"\"\n}\n'\n```\n\nListing 5.8 initializes\
    \ the variable `filename` with the name of the CSV file for this code sample.\
    \ The next snippet is an `awk` script that initializes `colCount` with the value\
    \ 6 in the `BEGIN` block: this value is the largest number of columns in any row\
    \ of the CSV file.\n\nThe next block of code displays the contents of the current\
    \ line, followed by a loop that prints a comma-separated list of `NaN` values\
    \ to ensure that the output line contains 6 columns. For instance, if a row has\
    \ 4 columns, then `NaN` will be printed twice. The `print` statement after the\
    \ loop ensures that the next line from the input file starts on a new line instead\
    \ of the current output line. Launch the code in Listing 5.8 and you will see\
    \ the following output:\n\n```\n10,20,30,NaN,NaN,NaN\n10,20,30,40,NaN,NaN\n10,20,30,40,50,60\n\
    10,20,NaN,NaN,NaN,NaN\n10,20,30,40,NaN,NaN\n```"
- md: "One limitation of Listing 5.8 is that the maximum number of columns must be\
    \ specified in the `BEGIN` block. Listing 5.9 removes this constraint by scanning\
    \ the entire file to determine the maximum number of columns in the CSV file.\n\
    \n## Listing 5.9: variable_columns2.sh\n\n```\nfilename=\"variable_columns.csv\"\
    \n\ncat $filename | awk -F\",\" '\nBEGIN {\n    maxColCount = 0;\n\n    ###########################################\n\
    \    # maxColCount = # of fields in the longest row\n    ###########################################\n\
    \    while(getline line < ARGV[1]) {\n        colCount = split(line,data)\n  \
    \      if(maxColCount < length(data)) {\n            maxColCount = length(data)\n\
    \        }\n    }\n}\n{\n    # print current input line:\n    printf(\"%s\", $0)\n\
    \n    # pad with NaN (if necessary):\n    for(j=NF; j<maxColCount; j++) {\n  \
    \      printf(\",NaN\")\n    }\n    print \"\"\n}\n' $filename\n```\n\nListing\
    \ 5.9 initializes the variable `filename` with the name of the CSV file for this\
    \ code sample. The next portion of Listing 5.9 is an `awk` script that contains\
    \ a `while` loop to process the input lines from the CSV file. The variable `maxColCount`\
    \ is initialized with 0 in the `BEGIN` block, and when this loop has completed,\
    \ its value will be the maximum number of columns of the lines in the input file.\n\
    \nThe next portion of Listing 5.9 is the same as the loop in Listing 5.8, which\
    \ prints the lines of text and pads them with `NaN` whenever it's necessary to\
    \ do so.\n\nLaunch the code in Listing 5.9 and you will see the following output:\n\
    \n```\n10,20,30,NaN,NaN,NaN\n10,20,30,40,NaN,NaN\n10,20,30,40,50,60\n10,20,NaN,NaN,NaN,NaN\n\
    10,20,30,40,NaN,NaN\n```\n\n## Truncating Rows in CSV Files\n\nThe previous section\
    \ showed you how to use the `awk` command line utility to “pad” rows from a CSV\
    \ file with the string `NaN` so that all records have the same number of columns,\
    \ whereas this section shows you how to truncate the rows in a CSV file to display\
    \ only the number of columns that are in the shortest row.\n\nListing 5.10 displays\
    \ the content of `variable_columns3.sh` that uses the `awk` utility to display\
    \ a subset of columns in a CSV file.\n\n### Listing 5.10: variable_columns3.sh\n\
    \n```\nfilename=\"variable_columns.csv\"\n\ncat $filename | awk -F\",\" '\nBEGIN\
    \ {\n    colCount = 0; minColCount = 9999\n\n    ###########################################\n\
    \    # minColCount = # of fields in the shortest row\n    ###########################################\n\
    \n    while(getline line < ARGV[1]) {\n        colCount = split(line,data)\n \
    \       if(minColCount > length(data)) {\n            minColCount = length(data)\n\
    \        }\n    }\n}\n{\n    # perform for each input line:\n    for(j=1; j<=minColCount;\
    \ j++) {\n        printf(\"%s,\",$j)\n    }\n    print \"\"\n}\n' $filename\n\
    ```\n\nListing 5.10 is very similar to Listing 5.9: after initializes the variable\
    \ `filename` with the name of the CSV file for this code sample, the `awk` script\
    \ finds the number of columns in the row with the fewest columns from the CSV\
    \ file.\n\nThe variable `minColCount` is initialized with 9999 in the `BEGIN`\
    \ block, and when this loop has completed, its value will be the minimum number\
    \ of columns of the lines in the input file.\n\nThe next portion of Listing 5.10\
    \ is a loop that prints the first `minColCount` columns in each line of the input\
    \ file. Launch the code in Listing 5.10 and you will see the following output:\n\
    \n```\n10,20,\n10,20,\n10,20,\n10,20,\n10,20,\n```\n\n## Generating Rows with\
    \ Fixed Columns with the awk Utility\n\nThe code sample in this section contains\
    \ an `awk` script that processes a space-delimited input string CSV file and generates\
    \ output in which all rows have the same number of columns (with the possible\
    \ exception of the final output row). Listing 5.11 displays the content `FixedFieldCount1.sh`\
    \ that illustrates how to use the `awk` utility to split a string into rows that\
    \ contain three strings.\n\n### Listing 5.11: FixedFieldCount1.sh\n\n```\necho\
    \ \"=> pairs of letters:\"\necho \"aa bb cc dd ee ff gg hh\"\necho\n\necho \"\
    => split on multiple lines:\"\necho \"aa bb cc dd ee ff gg hh\"| awk '\nBEGIN\
    \ { colCount = 3 }\n{\n    for(i=1; i<=NF; i++) {\n        printf(\"%s \", $i)\n\
    \        if(i % colCount == 0) { print \"\" }\n    }\n    print \"\"\n}\n'\n```\n\
    \nListing 5.11 displays the contents of a string, and then provides this string\
    \ as input to the `awk` command. The main body of Listing 5.11 is a loop that\
    \ iterates from 1 to `NF`, where `NF` is the number of fields in the input line,\
    \ which in this example equals 8. The value of each field is represented by `$i`:\
    \ `$1` is the first field, `$2` is the second field, and so forth. Note that `$0`\
    \ is the content of the *entire* input line (which is used in the next code sample).\n\
    \nNext, if the value of i (which is the field *position*, not the contents of\
    \ the field) is a multiple of 3, then the code prints a linefeed. Launch the code\
    \ in Listing 5.11 and you will see the following output:\n\n```\n=> pairs of letters:\n\
    aa bb cc dd ee ff gg hh\n\n=> split on multiple lines:\naa bb cc\ndd ee ff\ngg\
    \ hh\n```\n\nListing 5.12 displays the content of `employees.txt` and Listing\
    \ 5.13 displays the content of `FixedFieldCount2.sh` that illustrates how to use\
    \ the `awk` utility to ensure that all the rows have the same number of columns.\n\
    \n### Listing 5.12: employees.txt\n\n```\njane:jones:SF:\njohn:smith:LA:\ndave:smith:NY:\n\
    sara:white:CHI:\n>>>none:none:none<<<:\njane:jones:SF:john:\nsmith:LA:\ndave:smith:NY:sara:white:\n\
    CHI:\n```\n\n### Listing 5.13: FixedFieldCount2.sh\n\n```\ncat employees.txt |\
    \ awk -F\":\" '{printf(\"%s\", $0)}' | awk -F':' '\nBEGIN { colCount = 3 }\n{\n\
    \    for(i=1; i<=NF; i++) {\n        printf(\"%s#\", $i)\n        if(i % colCount\
    \ == 0) { print \"\" }\n    }\n}\n'\n```\n\nNotice that the code in Listing 5.13\
    \ is almost identical to the code in Listing 5.11: the code snippet that is shown\
    \ in bold removes the “\\n” character from its input (which is the contents of\
    \ `employees.txt`).\n\nIn case you need to be convinced, launch the following\
    \ code snippet from the command line:\n\n```\ncat employees.txt | awk -F\":\"\
    \ '{printf(\"%s\", $0)}'\n```\n\nThe output of the preceding code snippet is shown\
    \ here:\n\n```\njane:jones:SF:john:smith:LA:dave:smith:NY:sara:white:CHI:>>>\n\
    none:none:none<<<:jane:jones:SF:john:smith:LA:dave:smith:\nNY:sara:white:CHI:\n\
    ```\n\nThe reason that the “\\n” has been removed in the preceding output is because\
    \ of this code snippet:\n\n```\nprintf(\"%s\", $0)\n```\n\nIf you want to retain\
    \ the “\\n” linefeed character after each input line, then replace the preceding\
    \ code snippet with this snippet:\n\n```\nprintf(\"%s\\n\", $0)\n```\n\nWe have\
    \ now reduced the task in Listing 5.13 to the same task as Listing 5.11, which\
    \ is why we have the same awk-based code block.\n\nLaunch the code in Listing\
    \ 5.13 and you will see the following output:\n\n```\n1000,Jane,Edwards,Sales\n\
    jane#jones#SF#\njohn#smith#LA#\ndave#smith#NY#\nsara#white#CHI#\n>>>none#none#none<<<#\n\
    jane#jones#SF#\njohn#smith#LA#\ndave#smith#NY#\nSara#white#CHI#\n```\n\n## Converting\
    \ Phone Numbers\n\nListing 5.14 displays the content of phone_numbers.txt that\
    \ contains (mostly fictitious) phone numbers with different formats.\n\n### Listing\
    \ 5.14: phone_numbers.txt\n\n```\n1234567890\n234 4560987\n234 456 0987\n212 555-1212\n\
    212-555-1212\n(123)5551212\n(456)555-1212\n(789)555 1212\n1-1234567890\n1 234\
    \ 4560987\n1-234 456 0987\n1 212 555-1212\n1-212-555-1212\n1 (123)5551212\n1-(456)555-1212\n\
    1 (789)555 1212\n011-1234567890\n033 234 4560987\n039-234 456 0987\n034 212 555-1212\n\
    081-212-555-1212\n044 (123)5551212\n049-(456)555-1212\n052 (789)555 1212\n```\n\
    \nListing 5.15 displays the content of `phone_numbers.sh` that illustrates how\
    \ to remove non-digit characters from the phone numbers in Listing 5.14 so that\
    \ they have the same format.\n\n### Listing 5.15: phone_numbers.sh\n\n```\nFILE=\"\
    country_codes.csv\"\n\n#cat phone_numbers.txt |tr -d '()' | sed -e 's/ //g' -e\
    \ 's/-//g' | awk -F\" \" '\ncat phone_numbers.txt |sed -e 's/[()]//g' -e 's/ //g'\
    \ -e 's/-//g'| awk -F\" \" '\n{\n    line_len = length($0)\n\n    if(line_len\
    \ == 10) {\n        inter = \"\"\n        area  = substr($0,0,3)\n        xchng\
    \ = substr($0,3,3)\n        subsc = substr($0,7,4)\n        printf(\"%s,%s,%s\\\
    n\",area,xchng,subsc)\n    } else if(line_len == 11) {\n        inter = substr($0,0,1)\n\
    \        area  = substr($0,1,3)\n        xchng = substr($0,4,3)\n        subsc\
    \ = substr($0,8,4)\n        printf(\"%s,%s,%s,%s\\n\",inter, area,xchng,subsc)\n\
    \    } else if(line_len == 13) {\n        inter = substr($0,0,3)\n        area\
    \  = substr($0,3,3)\n        xchng = substr($0,6,3)\n        subsc = substr($0,10,4)\n\
    \        printf(\"%s,%s,%s,%s\\n\",inter, area,xchng,subsc)\n    } else {\n  \
    \      print \"invalid format: \",$0\n    }\n}'\n```"
  mdcn: "清单5.8的一个局限性在于，必须在`BEGIN`块中指定最大列数。清单5.9通过扫描整个文件来确定CSV文件中的最大列数，从而消除了这一限制。\n\
    \n## 清单5.9: variable_columns2.sh\n\n```\nfilename=\"variable_columns.csv\"\n\n\
