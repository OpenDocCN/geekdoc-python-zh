    # What is SciPy?


    SciPy is a scientifically oriented Python library that provides many APIs that
    perform operations and calculations, some of which are listed here:


    +   - Combinatorial values

    - Permutation values

    - Matrix inversion

    - Image transformations

    - Integration (calculus)

    - Fourier transforms

    - Eigenvalues and eigenvectors


    The following list shows you some of the components of SciPy and where they are
    located:


    +   - File input/output (scipy.io)

    - Special functions (scipy.special)

    - Linear algebra (scipy.linalg)

    - Interpolation (scipy.interpolate)

    - Statistics/Random Numbers (scipy.stats)

    - Numerical integration (scipy.integrate)

    - Fast Fourier Transforms (scipy.fftpack)

    - Signal processing (scipy.signal)

    - Image manipulation (scipy.ndimage)


    Keep in mind that SciPy is designed as a collection of submodules, most of which
    rely on NumPy.


    # Installing SciPy


    Make sure that you have Python 3.x installed on your laptop, and then perform
    the following step to install SciPy:


    ```

    pip3 install scipy

    ```


    Let''s delve into some of the functionality in SciPy, starting with some combinatorial
    calculations that are discussed in the next section.'
