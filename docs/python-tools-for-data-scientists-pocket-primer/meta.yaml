    \n图 6.2 显示了一个彩色网格，其方程包含在清单 6.2 中。\n\n![](img/a5bd78f899e04acbdf3949ed2383b115_233_0.png)\n\
    \n**图 6.2** 线段的彩色网格。\n\n## Matplotlib 中的随机数据点\n\n清单 6.3 显示了 `lin_reg_plot.py`\
