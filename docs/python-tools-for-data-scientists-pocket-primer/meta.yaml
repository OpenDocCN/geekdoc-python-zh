    representations. As you probably know, big data comprises massive amounts of data,
    which leverages data visualization tools to assist in making better decisions.


    A key role for good data visualization is to tell a meaningful story, which in
    turn focuses on useful information that resides in datasets that can contain many
    data points (i.e., billions of rows of data). Another aspect of data visualization
    is its effectiveness: how well does it convey the trends that might exist in the
    dataset?


    There are many open source data visualization tools available, some of which are
    listed here (many others are available):


    +   - Matplotlib

    - Seaborn

    - Bokeh

    - YellowBrick

    - Tableau

    - D3.js (JavaScript and SVG)


    Incidentally, in case you have not already done so, it would be helpful to install
    the following Python libraries (using `pip3`) on your computer so that you can
    launch the code samples in this chapter:


    ```

    pip3 install matplotlib

    pip3 install seaborn

    pip3 install bokeh

    ```


    # Types of Data Visualization


    Bar graphs, line graphs, and pie charts are common ways to present data, and yet
    many other types exist, some of which are listed here:


    +   - 2D/3D Area Chart

    - Bar Chart

    - Gantt Chart

    - Heat Map

    - Histogram

    - Polar Area

    - Scatter Plot (2D or 3D)

    - Timeline


    The Python code samples in the next several sections illustrate how to perform
    visualization via rudimentary APIs from Matplotlib.'
