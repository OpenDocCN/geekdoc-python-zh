    \n**清单 5.23：country_codes.csv**\n\n```\n001,usa\n033,france\n034,spain\n039,italy\n\
    044,uk\n049,germany\n052,mexico\n081,Japan\n```\n\n清单 5.24 展示了 `add_country_codes.sh`\
    \ 的内容，它演示了如何为一组国家增加其三位数的国际区号。请注意，在本节之后你将不再需要此代码示例：这里包含它只是为了向你展示使用 `awk` 工具可以多么轻松地操作\
    \ CSV 文件中的数值。如有需要，你可以轻松地将此代码调整为适用于其他 CSV 文件。\n\n**清单 5.24：add_country_codes.sh**\n\
    \n```\nFILE=\"country_codes.csv\"\n\necho \"=> display code and country:\"\nawk\
