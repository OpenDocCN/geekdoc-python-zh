    # CHAPTER 2


    # INTRODUCTION TO NUMPY


    This chapter provides a quick introduction to the Python NumPy library, which
    provides a useful functionality, not only for “regular” Python scripts, but also
    for Python-based scripts with TensorFlow. For instance, this chapter contains
    NumPy code samples containing loops, arrays, and lists. We also discuss dot products,
    the `reshape()` method, how to plot with Matplotlib (discussed in more detail
    in Chapter 6), and examples of linear regression.


    The first part of this chapter briefly discusses NumPy and some of its useful
    features. The second part contains examples of working arrays in NumPy, and contrasts
    some of the APIs for lists with the same APIs for arrays. In addition, we show
    how to compute the exponent-related values (such as the square or cube) of elements
    in an array.


    The second part of the chapter introduces sub-ranges, which are useful (and frequently
    used) for extracting portions of datasets in machine learning tasks. Some of the
    code samples handle negative (-1) sub-ranges for vectors as well as for arrays
    because they are interpreted one way for vectors and a different way for arrays.


    The third part of this chapter delves into other NumPy methods, including the
    `reshape()` method, which useful when working with image files: some TensorFlow
    APIs require converting a 2D array of (R,G,B) color values into a corresponding
    one-dimensional vector.


    The fourth part of this chapter encompasses linear regression, the mean squared
    error (MSE), and how to calculate MSE with the `linspace()` API.'
