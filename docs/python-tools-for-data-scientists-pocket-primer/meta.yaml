    # What is Matplotlib?


    Matplotlib is a plotting library that supports NumPy, SciPy, and toolkits such
    as wxPython (among others). Matplotlib supports only version 3 of Python: support
    for version 2 of Python was available only through 2020. Matplotlib is a multi-platform
    library that is built on NumPy arrays.


    The plotting-related code samples in this chapter use pyplot, which is a Matplotlib
    module that provides a MATLAB-like interface. The Python code samples for visualization
    in this chapter use primarily Matplotlib, along with some code samples that use
    Seaborn. The code samples that plot line segments assume that you are familiar
    with the equation of a (non-vertical) line in the plane: y = m*x + b, where m
    is the slope and b is the y-intercept.


    Furthermore, some code samples use NumPy APIs such as `np.linspace()`, `np.array()`,
    `np.random.rand()`, and `np.ones()` that are discussed in Chapter 3, so you can
    refresh your memory regarding these APIs.


    # Diagonal Lines in Matplotlib


    Listing 6.1 displays the content of `diagonallines.py` that illustrates how to
    plot lines in a grid.


    **Listing 6.1: diagonallines.py**


    ```

    import matplotlib.pyplot as plt

    import numpy as np


    x1 = np.linspace(-5,5,num=200)

    y1 = x1


    x2 = np.linspace(-5,5,num=200)

    y2 = -x2


    plt.axis([-5, 5, -5, 5])

    plt.plot(x1,y1)

    plt.plot(x2,y2)

    plt.show()

    ```


    Listing 6.1 contains some `import` statements and then initializes the variables
    x1 and y1 as an array of 200 equally space points, where the points in y1 equal
    the values in x1.'
