    \ code block consists of four statements that use regular expressions to perform\
    \ the same updates, an example of which is shown here:\n\n```python\nshirts['ssize']\
    \ = shirts['ssize'].replace(regex='xlarge', value=4)\n```\n\nSince the preceding\
    \ code snippet matches `xxlarge` as well as `xlarge`, we only need four statements\
