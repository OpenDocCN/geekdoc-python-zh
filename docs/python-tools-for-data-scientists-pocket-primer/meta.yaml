    \ the code in Listing 5.22 and you will see the following output:\n\n```\n=> #1\
    \ PROCESSING: 2/30/2020 15:05:44\n*** Leap year day out of bounds: 2/30/2020 15:05:44\n\
    -------------------\n\n=> #2 PROCESSING: 3/15/22 15:5:44\n=> VALID DAY/TIME FORMAT:\
    \  3/15/22 15:5:44\n-------------------\n\n=> #3 PROCESSING: 4/29/23 15:5:4\n\
    *** Non-leap year day out of bounds: 4/29/23 15:5:4\n-------------------\n\n=>\
    \ #4 PROCESSING: 5/16/24 5:05:44\n=> VALID DAY/TIME FORMAT:  5/16/24 5:05:44\n\
    ------------------\n\n=> #5 PROCESSING: 6/17/25 5:5:44\n=> VALID DAY/TIME FORMAT:\
    \  6/17/25 5:5:44\n------------------\n\n=> #6 PROCESSING: 7/18/26 5:5:4\n=> VALID\
    \ DAY/TIME FORMAT:  7/18/26 5:5:4\n------------------\n\n=> #7 PROCESSING: 8/19/24\
    \ 115:05:44\nno matching hours\ninvalid day/time format:  8/19/24 115:05:44\n\
    ------------------\n```\n\n```\n#print \"short seconds: \",seconds\ntime_part\
    \ = substr(time_part,1,6) \"0\"\nsubstr(time_part,7)\n#print \"*** 5new time_part:\"\
    ,time_part\n} else {\n    print \"no matching seconds\"\n    VALID_DATE = \"false\"\
    \n}\n}\n\nif(VALID_DATE == \"true\") {\n    result = check_leap_year(year)\n \
    \   if(result == 1) {\n        #print \"found leap year:\",year\n        # is\
    \ day <= 29?\n        if( day <= 29) {\n            print \"=> VALID DAY/TIME\
    \ FORMAT: \",$0\n        } else {\n            print \"*** Leap year day out of\
    \ bounds:\",$0\n        }\n    } else {\n        #print \"found non-leap year:\"\
