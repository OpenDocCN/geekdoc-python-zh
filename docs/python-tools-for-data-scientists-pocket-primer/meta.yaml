    5            5  eddy  bower   35      m    spain\n```\n\n## Working with JSON-based\
    \ Data\n\nA JSON object consists of data represented as colon-separated name/value\
    \ pairs, and data objects are separated by commas. An object is specified inside\
    \ curly braces `{}`, and an array of objects is indicated by square brackets `[]`.\
    \ Note that character-valued data elements are inside quotes `\"\"` (no quotes\
    \ for numeric data).\n\nHere is a simple example of a JSON object:\n`{ \"fname\"\
    :\"Jane\", \"lname\":\"Smith\", \"age\":33, \"city\":\"SF\" }`\n\nHere is a simple\
    \ example of an array of JSON objects:\n```json\n[\n{ \"fname\":\"Jane\", \"lname\"\
    :\"Smith\", \"age\":33, \"city\":\"SF\" },\n{ \"fname\":\"John\", \"lname\":\"\
    Jones\", \"age\":34, \"city\":\"LA\" },\n{ \"fname\":\"Dave\", \"lname\":\"Stone\"\
    , \"age\":35, \"city\":\"NY\" }\n]\n```\n\n## Python Dictionary and JSON\n\nThe\
    \ Python JSON library enables you to work with JSON-based data in Python.\n\n\
    Listing 3.51 shows the content of `dict2json.py` that illustrates how to convert\
    \ a Python dictionary to a JSON string.\n\n**Listing 3.51: `dict2json.py`**\n\n\
    ```python\nimport json\n\ndict1 = {}\ndict1[\"fname\"] = \"Jane\"\ndict1[\"lname\"\
    ] = \"Smith\"\ndict1[\"age\"]   = 33\ndict1[\"city\"]  = \"SF\"\n\nprint(\"Python\
    \ dictionary to JSON data:\")\nprint(\"dict1:\",dict1)\njson1 = json.dumps(dict1,\
    \ ensure_ascii=False)\nprint(\"json1:\",json1)\nprint(\"\")\n\n# convert JSON\
    \ string to Python dictionary:\njson2 = '{\"fname\":\"Dave\", \"lname\":\"Stone\"\
    , \"age\":35, \"city\":\"NY\"}'\ndict2 = json.loads(json2)\nprint(\"JSON data\
    \ to Python dictionary:\")\nprint(\"json2:\",json2)\nprint(\"dict2:\",dict2)\n\
    ```\n\nListing 3.51 invokes the `json.dumps()` function to perform the conversion\
    \ from a Python dictionary to a JSON string. Launch the code in Listing 3.51 to\
    \ see the following output:\n\n```\nPython dictionary to JSON data:\ndict1: {'fname':\
    \ 'Jane', 'lname': 'Smith', 'age': 33, 'city': 'SF'}\njson1: {\"fname\": \"Jane\"\
    , \"lname\": \"Smith\", \"age\": 33, \"city\": \"SF\"}\n\nJSON data to Python\
    \ dictionary:\njson2: {\"fname\":\"Dave\", \"lname\":\"Stone\", \"age\":35, \"\
    city\":\"NY\"}\ndict2: {'fname': 'Dave', 'lname': 'Stone', 'age': 35, 'city':\
    \ 'NY'}\n```\n\n## Python, Pandas, and JSON\n\nListing 3.52 shows the content\
    \ of `pd_python_json.py` that illustrates how to convert a Python dictionary to\
    \ a Pandas data frame and then convert the data frame to a JSON string.\n\n**Listing\
    \ 3.52: `pd_python_json.py`**\n\n```python\nimport json\nimport pandas as pd\n\
    \ndict1 = {}\ndict1[\"fname\"] = \"Jane\"\ndict1[\"lname\"] = \"Smith\"\ndict1[\"\
    age\"]    = 33\ndict1[\"city\"]   = \"SF\"\n\ndf1 = pd.DataFrame.from_dict(dict1,\
    \ orient='index')\nprint(\"Pandas df1:\")\nprint(df1)\nprint()\n\njson1 = json.dumps(dict1,\
