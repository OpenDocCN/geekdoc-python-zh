    \nfield #5 : fname5\n\nLINE #3:\n\"lname1,a,b\",\"lname2,c,d\",\"lname3,e,f\"\
    ,\"lname4,foo,bar\",lname5\n-----------------------------\nfield #1 : \"lname1,a,b\"\
    \nfield #2 : \"lname2,c,d\"\nfield #3 : \"lname3,e,f\"\nfield #4 : \"lname4,foo,bar\"\
    \nfield #5 : lname5\n\nLINE #4: \"Outer1 \"Inner \"Inner \"Inner C\" B\" A\"\n\
    Outer1\",\"XYZ1,c,d\",\"XYZ2lname3,e,f\"\n-----------------------------\nfield\
    \ #1 : \"Outer1 \"Inner \"Inner \"Inner C\" B\" A\" Outer1\"\nfield #2 : \"XYZ1,c,d\"\
    \nfield #3 : \"XYZ2lname3,e,f\"\n\nLINE #5:\n-----------------------------\n```\n\
    \nAs you can see, the task in this section is very easily solved via the awk command."
  merge: -1
