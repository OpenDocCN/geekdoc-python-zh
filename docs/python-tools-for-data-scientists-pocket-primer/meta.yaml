- md: "## Working with groupby() in Pandas\n\nListing 3.37 shows the content of `groupby1.py`\
    \ that illustrates how to invoke the `groupby()` method to compute the subtotals\
    \ of the feature values.\n\nListing 3.37: groupby1.py\n\n```python\nimport pandas\
    \ as pd\n\n# colors and weights of balls:\ndata = {'color':['red','blue','blue','red','blue'],\n\
    \        'weight':[40,50,20,30,90]}\ndf1 = pd.DataFrame(data)\nprint(\"df1:\"\
    )\nprint(df1)\nprint()\nprint(df1.groupby('color').mean())\nprint()\n\nred_filter\
    \ = df1['color']=='red'\nprint(df1[red_filter])\nprint()\nblue_filter = df1['color']=='blue'\n\
    print(df1[blue_filter])\nprint()\n\nred_avg = df1[red_filter]['weight'].mean()\n\
    blue_avg = df1[blue_filter]['weight'].mean()\nprint(\"red_avg,blue_avg:\")\nprint(red_avg,blue_avg)\n\
    print()\n\ndf2 = pd.DataFrame({'color':['blue','red'],'weight':[red_avg,blue_avg]})\n\
    print(\"df2:\")\nprint(df2)\nprint()\n```\n\nListing 3.37 defines the variable\
    \ `data` containing the color and weight values, and then initializes the data\
    \ frame `df` with the contents of the variable `data`. The next two code blocks\
    \ define `red_filter` and `blue_filter` that match the rows whose colors are red\
    \ and blue, respectively, and then prints the matching rows.\n\nThe next portion\
    \ of Listing 3.37 defines the two filters `red_avg` and `blue_avg` that calculate\
    \ the average weight of the red value and the blue values, respectively. The last\
    \ code block in Listing 3.37 defines the data frame `df2` with a `color` column\
    \ and a weight column, where the latter contains the average weight of the red\
    \ values and the blue values. Launch the code in Listing 3.37 to see the following\
    \ output:\n\n```\ninitial data frame:\ndf1:\n  color  weight\n0  red      40\n\
    1  blue     50\n2  blue     20\n3  red      30\n4  blue     90\n\n          weight\n\
    color          \nblue  53.333333\nred   35.000000\n\n  color  weight\n0  red \
    \     40\n3  red      30\n\n  color  weight\n1  blue     50\n2  blue     20\n\
    4  blue     90\n\nred_avg,blue_avg:\n35.0 53.333333333333336\n\ndf2:\n  color\
    \      weight\n0  blue  35.000000\n1   red  53.333333\n```\n\n## Working with\
    \ apply() and mapapply() in Pandas\n\nEarlier in this chapter, you saw an example\
    \ of the `apply()` method for modifying the categorical values of a feature in\
    \ the CSV file `shirts.csv`. This section contains more examples of the `apply()`\
    \ method.\n\nListing 3.38 shows the content of `apply1.py` that illustrates how\
    \ to invoke the Pandas `apply()` method to compute the cube of a column of numbers.\n\
    \nListing 3.38: apply1.py\n\n```python\nimport pandas as pd\n\ndf = pd.DataFrame({'X1':\
    \ [1,2,3], 'X2': [10,20,30]})\n\ndef cube(x):\n    return x * x * x\n\ndf1 = df.apply(cube)\n\
    # same result:\n# df1 = df.apply(lambda x: x * x * x)\n\nprint(\"initial data\
    \ frame:\")\nprint(df)\nprint(\"cubed values:\")\nprint(df1)\n```\n\nListing 3.38\
    \ initializes the data frame df with columns X1 and X2, where the values for X2\
    \ are 10 times the corresponding values in X1. Next, the Python function cube()\
    \ returns the cube of its argument. Listing 3.38 then defines the variable df1\
    \ by invoking the apply() function, which specifies the user-defined Python function\
    \ cube(), and then prints the values of df as well as df1. Launch the code in\
    \ Listing 3.38 to see the following output:\n\n```\ninitial data frame:\n   X1\
    \  X2\n0   1  10\n1   2  20\n2   3  30\ncubed values:\n   X1     X2\n0   1   1000\n\
    1   8   8000\n2  27  27000\n```\n\nApply a function to a data frame that multiplies\
    \ all values in the \"height\" column of the data frame by 3:\n\n```python\ndf[\"\
