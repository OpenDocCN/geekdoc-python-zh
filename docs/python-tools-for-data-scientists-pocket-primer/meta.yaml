    \ )\n```\n\nIf you have a gender column with the values M and F, you can modify\
    \ the preceding code snippet, as shown here:\n\n```python\n# map male/female to\
    \ 0/1 values:\ndf['gender'] = df['gender'].map( {'male':0, 'female':1} )\n```\n\
    \nThe second and third bullet items are partially addressed in the following section\
    \ that discusses feature selection and feature extraction, which are two facets\
    \ of feature engineering.\n\n## What is Feature Engineering?\n\nFeature engineering\
    \ is an umbrella term that includes several techniques for determining the columns\
    \ for populating the set X.\n\nFeature selection involves selecting a subset of\
    \ columns from a dataset, which is the technique that was discussed earlier in\
    \ this chapter.\n\nFeature extraction involves finding a linear combination of\
    \ the columns in a dataset. For example, PCA (Principal Component Analysis) is\
    \ one such technique: PCA calculates eigenvalues and eigenvectors (topics that\
    \ part of linear algebra), where the latter are linear combinations of existing\
    \ columns in a dataset.\n\nPCA is a subset of SVD (Singular Value Decomposition),\
    \ which refers to techniques that determine a subset of the most important columns\
