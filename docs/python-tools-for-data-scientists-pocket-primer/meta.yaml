    \ ', array([[ 6, 8], [10, 12]]))\n('a - b: ', array([[-4, -4], [-4, -4]]))\n('a\
    \ * b: ', array([[ 5, 12], [21, 32]]))\n('a / b: ', array([[0, 0], [0, 0]]))\n\
    ('b / a: ', array([[5, 3], [2, 2]]))\n('a.dot(b):', array([[19, 22], [43, 50]]))\n\
    ```\n\n## NumPy and Dot Products (1)\n\nListing 2.13 shows the content of dotproduct1.py,\
    \ which illustrates how to perform the dot product on the elements in a NumPy\
