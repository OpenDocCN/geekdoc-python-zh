    \nListing 5.29 displays the content of convert_marketing.sh that shows you how\
    \ to perform various data cleaning steps, as indicated in the comments in the\
    \ code.\n\nListing 5.29: convert_marketing.sh\n\n```\n# Kaggle dataset: https://www.kaggle.com/fehmifratpolat/marketing-report\n\
    # step 1: extract the 1st, 3rd, 4th, and 7th fields:\ncat mark1.csv |awk -F\"\
