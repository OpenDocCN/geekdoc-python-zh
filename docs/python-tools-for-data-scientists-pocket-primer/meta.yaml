    ## Google Colaboratory


    根据硬件不同，基于 GPU 的 TF 2 代码可能比基于 CPU 的 TF 2 代码快多达 15 倍。然而，一块好的 GPU 成本可能是一个重要因素。虽然
    NVIDIA 提供 GPU，但这些消费级 GPU 并未针对多 GPU 支持（TF 2 支持此功能）进行优化。


    幸运的是，Google Colaboratory 是一个经济实惠的替代方案，它提供免费的 GPU 支持，并且作为 Jupyter notebook 环境运行。此外，Google
    Colaboratory 在云端执行你的代码，无需任何配置，并且可以在线访问：


    https://colab.research.google.com/notebooks/welcome.ipynb


    Jupyter notebook 适合快速训练简单模型和测试想法。Google Colaboratory 使得上传本地文件、在 Jupyter notebook
    中安装软件，甚至将 Google Colaboratory 连接到你本地机器上的 Jupyter 运行时变得轻而易举。


    Colaboratory 支持的一些功能包括使用 GPU 执行 TF 2、使用 Matplotlib 进行可视化，以及通过以下主菜单步骤将你的 Google
    Colaboratory notebook 副本保存到 Github：文件 > 保存副本到 GitHub。


    此外，你只需将路径添加到 URL colab.research.google.com/github/，即可加载 GitHub 上的任何 .ipynb 文件（详情请参阅
    Colaboratory 网站）。


    Google Colaboratory 支持其他技术，如 HTML 和 SVG，使你能够在 Google Colaboratory 的 notebook 中渲染基于
    SVG 的图形。有一点需要注意：你在 Google Colaboratory notebook 中安装的任何软件仅在当前会话期间可用。如果你注销后重新登录，你需要执行与之前
    Google Colaboratory 会话期间相同的安装步骤。


    如前所述，Google Colaboratory 还有一个*非常*好的功能：你可以每天免费在 GPU 上执行代码长达十二小时。这种免费的 GPU 支持对于本地机器上没有合适
    GPU 的人（这可能是大多数用户）来说极其有用，现在他们可以在不到 20 或 30 分钟内启动 TF 2 代码来训练神经网络，否则这将需要数小时的基于 CPU
    的执行时间。


    你也可以在 Google Colaboratory notebook 中使用以下命令启动 Tensorboard（将指定目录替换为你自己的位置）：


    ```

    %tensorboard --logdir /logs/images

    ```


    请记住关于 Google Colaboratory 的以下细节。首先，每当你连接到 Google Colaboratory 中的服务器时，你就会启动一个所谓的*会话*。你可以在会话中使用
    CPU（默认）、GPU 或 TPU（免费提供）执行代码，并且可以在会话中无时间限制地执行代码。但是，如果你为会话选择了 GPU 选项，*只有前 12 小时的
    GPU 执行时间是免费的*。在同一会话期间的任何额外 GPU 时间都会产生少量费用（详情请参阅网站）。你在给定会话期间在 Jupyter notebook
    中安装的任何软件在退出该会话时*不会*被保存。顺便说一句，你也可以在 Google Colaboratory 中运行 TF 2 代码和 Tensorboard。请访问此站点获取更多信息：


    https://www.tensorflow.org/tensorboard/r2/tensorboard_in_notebooks


