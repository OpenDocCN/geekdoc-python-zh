    ## Replace Multiple Values with a Single Value


    An example of coalescing multiple values in an attribute involves replacing multiple
    strings for the state of New York (such as `new_york`, `NewYork`, `NY`, and `New_York`)
    with `NY`. Listing 5.2 displays the content of `reduce_values.sql` that performs
    this pair of steps.


    ### Listing 5.2: `reduce_values.sql`


    ```sql

    use mytools;

    DROP TABLE IF EXISTS mytable;

    CREATE TABLE mytable (str_date CHAR(15), state CHAR(20), reply CHAR(10));


    INSERT INTO mytable VALUES(''20210915'',''New York'',''Yes'');

    INSERT INTO mytable VALUES(''20211016'',''New York'',''no'');

    INSERT INTO mytable VALUES(''20220117'',''Illinois'',''yes'');

    INSERT INTO mytable VALUES(''20220218'',''New York'',''No'');

    SELECT * FROM mytable;


    -- replace yes, Yes, y, Ys with Y:

    update mytable

    set reply = ''Y''

    where upper(substr(reply,1,1)) = ''Y'';

    SELECT * FROM mytable;


    -- replace all other values with

    update mytable

    set reply = ''N'' where substr(reply,1,1) != ''Y'';

    SELECT * FROM mytable;

    ```


    Listing 5.2 creates and populates the table `mytable`, and then replaces the variants
    of the word yes with the letter Y in the reply attribute. The final portion of
    Listing 5.2 replaces any string that does *not* start with the letter Y with the
    letter N. Launch the code in Listing 5.2 and you will see the following output:


    ```

