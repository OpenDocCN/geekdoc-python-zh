  md: "# Another Use Case\n\nThe code sample in this section shows you how to use\
    \ the `awk` command to reformat the date field in a dataset and change the order\
    \ of the fields in the new dataset. For example, say we are given the following\
    \ input line in the original dataset:\n\n```\nJane,Smith,20140805234658\n```\n\
    \nThe reformatted line in the output dataset has this format:\n\n```\n2014-08-05\
    \ 23:46:58,Jane,Smith\n```\n\nListing B.46 displays the content of the file `dates2.csv`\
    \ that contains a `,` delimiter and three fields.\n\n# Listing B.46: dates2.csv\n\
    \n```\nJane,Smith,20140805234658\nJack,Jones,20170805234652\nDave,Stone,20160805234655\n\
    John,Smith,20130805234646\nJean,Davis,20140805234649\nThad,Smith,20150805234637\n\
    Jack,Pruit,20160805234638\n```\n\nListing B.47 displays the content of `string2date2.sh`\
    \ that converts the date field to a new format and shifts the new date to the\
    \ first field.\n\n# Listing B.47: string2date2.sh\n\n```\ninputfile=\"dates2.csv\"\
    \noutputfile=\"formatteddates2.csv\"\n\nrm -f $outputfile; touch $outputfile\n\
    \nfor line in `cat $inputfile`\ndo\n  fname=`echo $line |cut -d\",\" -f1`\n  lname=`echo\
    \ $line |cut -d\",\" -f2`\n  date1=`echo $line |cut -d\",\" -f3`\n\n  # convert\
    \ to new date format\n  newdate=`echo $date1 | awk '{ print\nsubstr($0,1,4)\"\
    -\"substr($0,5,2)\"-\"substr($0,7,2)\"\n\"substr($0,9,2)\":\"substr($0,11,2)\"\
    :\"substr($0,13,2)}'`\n\n  # append newly formatted row to output file\n  echo\
    \ \"${newdate},${fname},${lname}\" >> $outputfile\ndone\n```"
  merge: -1
