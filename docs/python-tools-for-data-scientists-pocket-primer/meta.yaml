    The bias-variance trade-off can be stated in simple terms. In general, reducing
    the bias in samples can increase the variance, whereas reducing the variance tends
    to increase the bias.


    ## Types of Bias in Data


    In addition to the bias-variance trade-off that is discussed in the previous section,
    there are several types of bias, some of which are listed as follows:


    - availability bias

    - confirmation bias

    - false causality

    - sunk cost fallacy

    - survivorship bias


    *Availability bias* is akin to making a “rule” based on an exception. For example,
    there is a known link between smoking cigarettes and cancer, but there are exceptions.
    If you find someone who has smoked three packs of cigarettes on a daily basis
    for four decades and is still healthy, can you assert that smoking does not lead
    to cancer?


    *Confirmation bias* refers to the tendency to focus on data that confirms one’s
    beliefs and simultaneously ignore data that contradicts a belief.


    *False causality* occurs when you incorrectly assert that the occurrence of a
    particular event causes another event to occur as well. One of the most well-known
    examples involves ice cream consumption and violent crime in New York during the
    summer. Since more people eat ice cream in the summer, that “causes” more violent
    crime, which is a false causality. Other factors, such as the increase in temperature,
    may be linked to the increase in crime. However, it’s important to distinguish
    between correlation and causality. The latter is a much stronger link than the
    former, and it’s also more difficult to establish causality instead of correlation.


    *Sunk cost* refers to something (often money) that has been spent or incurred
    that cannot be recouped. A common example pertains to gambling at a casino. People
    fall into the pattern of spending more money to recoup a substantial amount of
    money that has already been lost. While there are cases in which people do recover
    their money, in many (most?) cases, people simply incur an even greater loss because
    they continue to spend their money. This idea is related to the expression “it’s
    time to cut your losses and walk away.”


    *Survivorship bias* refers to analyzing a particular subset of “positive” data
    while ignoring the “negative” data. This bias occurs in various situations, such
    as being influenced by individuals who recount their rags-to-riches success story
    (“positive” data) while ignoring the fate of the people (which is often a very
    high percentage) who did not succeed (the “negative” data) in a similar quest.
    So, while it’s certainly possible for an individual to overcome many difficult
    obstacles to succeed, is the success rate one in one thousand (or even lower)?


