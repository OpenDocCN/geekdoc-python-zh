    ## Replace NULL with 0


    This task is straightforward, and you can perform it with either of the following
    SQL statements in a MySQL database:


    ```sql

    SELECT ISNULL(column_name, 0 ) FROM table_name


    OR


    SELECT COALESCE(column_name, 0 ) FROM table_name

    ```


    ## Replace NULL Values with the Average Value


    This task involves two steps: first find the average of the non-NULL values of
    a column in a database table, and then update the NULL values in that column with
    the value that you found in the first step.


    Listing 5.1 displays the content of replace_null_values.sql that performs this
    pair of steps.


    ### Listing 5.1: replace_null_values.sql


    ```sql

    USE mytools;

    DROP TABLE IF EXISTS temperatures;

    CREATE TABLE temperatures (temper INT, city CHAR(20));


    INSERT INTO temperatures VALUES(78,''sf'');

    INSERT INTO temperatures VALUES(NULL,''sf'');

    INSERT INTO temperatures VALUES(42,NULL);

    INSERT INTO temperatures VALUES(NULL,''ny'');

    SELECT * FROM temperatures;


    SELECT @avg1 := AVG(temper) FROM temperatures;

    update temperatures

    set temper = @avg1

    where ISNULL(temper);

    SELECT * FROM temperatures;


    -- initialize city1 with the most frequent city value:

    SELECT @city1 := (SELECT city FROM temperatures GROUP BY city

    ORDER BY COUNT(*) DESC LIMIT 1);

    -- update NULL city values with the value of city1:

    update temperatures

    set city = @city1

    where ISNULL(city);

    SELECT * FROM temperatures;

    ```


    Listing 5.1 creates and populates the table `temperatures` with several rows,
