    052,278,955,1212\n```\n\n## Converting Numeric Date Formats\n\nThis section shows\
    \ you how to convert date formats to a common format of the form `MM-DD-YYYY`.\
    \ Before delving into the code, the following list contains sample formats for\
    \ the month, day, and year of a date:\n\n- `yy`: two-digit year (ex: 22)\n- `yyyy`:\
    \ four-digit year (ex: 2022)\n- `m`: one-digit month (ex: 4)\n- `mm`: two-digit\
    \ month (ex: 04)\n- `mmm`: three letters for month (ex: Apr)\n- `mmmm`: month\
    \ spelled in full (ex: April)\n- `d`: one-digit day of the month (ex: 2)\n- `dd`:\
    \ two-digit day of the month (ex: 02)\n- `ddd`: three letter day of week (ex:\
    \ Sat)\n- `dddd`: day spelled in full (ex: Saturday)\n\nListing 5.16 displays\
    \ the content of `dates.txt` that contains fictitious dates in various formats,\
    \ and the strings in bold have invalid formats.\n\n### Listing 5.16: dates.txt\n\
    \n```\n03/15/2021\n3/15/2021\n3/15/21\n03/5/2021\n3/5/2021\n3/5/21\n**3/5/212**\n\
    **3/5/21Z**\n```\n\nListing 5.17 displays the content of `dates.sh` that shows\
    \ how to remove non-digit characters from the dates in Listing 5.16 so that they\
    \ have the same format.\n\n### Listing 5.17: dates.sh\n\n```\ncat dates.txt |\
    \ awk -F\"/\" '\n{\n    DATE_FORMAT=\"valid\"\n    # step 1: extract the month\n\
    \    if($0 ~ /^[0-9]{2}/) {\n        month = substr($0,1,2)\n        #print \"\
    normal month: \",month\n    } else if($0 ~ /^[0-9]\\//) {\n        month = \"\
    0\" substr($0,1,1)\n        #print \"short month: \",month\n    } else {\n   \
    \     DATE_FORMAT=\"invalid\"\n    }\n\n    if(DATE_FORMAT==\"valid\") {\n   \
    \     # step 2: extract the day\n        if( $0 ~ /^[0-9][0-9]\\/[0-9][0-9]/ )\
    \ {\n            day = substr($0,4,2)\n            #print \"normal day: \",day\n\
    \        } else if ( $0 ~ /^[0-9][0-9]\\/[0-9]\\// ) {\n            day = \"0\"\
    \ substr($0,4,1)\n            #print \"short day: \",day\n        } else {\n \
    \           DATE_FORMAT=\"invalid\"\n        }\n    }\n\n    if(DATE_FORMAT==\"\
    valid\") {\n        # step 3: extract the year\n        if( $0 ~ /^[0-9][0-9]\\\
    /[0-9][0-9]\\/[0-9][0-9][0-9][0-9]$/ ) {\n            year = substr($0,7,4)\n\
    \            #print \"normal year: \",year\n        } else if ( $0 ~ /^[0-9][0-9]\\\
    /[0-9]\\/[0-9][0-9]\\/$/ ) {\n            year = \"20\" substr($0,7,2)\n     \
    \       #print \"short year: \",year\n        }\n    } else {\n        DATE_FORMAT=\"\
    invalid\"\n    }\n\n    if(DATE_FORMAT==\"valid\") {\n        printf(\"=> $0:\
    \ %s MM/DD/YYYY: %s-%s-%s\\n\",$0,month,day,year)\n    } else {\n        print\
    \ \"invalid format: \",$0\n    }\n}\n'\n```\n\nListing 5.17 contains code that\
    \ might seem daunting if you are unfamiliar with regular expressions. Let's try\
    \ to demystify the code by starting with the regular expression `[0-9]` that represents\
    \ any single digit. The initial caret symbol in `^[0-9]\\/` indicates that a digit\
    \ must appear in the left-most (i.e., first) position. Finally, the regular expression\
    \ `^[0-9]\\/` indicates that a \"/\" must follow the single digit. Thus, the string\
    \ `3/` matches the regular expression, but the strings `03/`, `B3/`, and `AB/`\
    \ do not match the regular expression.\n\nNow let's examine the regular expression\
    \ `^[0-9][0-9]\\/`, which represents any string that starts with two digits and\
    \ then a \"/\" character. Thus, the string `03/` matches the regular expression\
    \ but the strings `3/`, `B3/`, and `AB/` do not match the regular expression.\n\
    \nNext, the regular expression `^[0-9][0-9]\\/[0-9][0-9]` represents any string\
    \ that starts with two digits, followed by a \"/\" character, and then two more\
    \ digits. Thus, the string `03/15` matches the regular expression, but the strings\
    \ `3/5`, `03/5`, and `3/15` do not match the regular expression.\n\nFinally, the\
    \ regular expression `^[0-9][0-9]\\/[0-9][0-9]\\/[0-9][0-9][0-9][0-9]$` matches\
    \ a string that\n\n- starts with two digits\n- is followed by a \"/\"\n- has another\
    \ two digits\n- followed by \"/\"\n- has another four more digits\n- no additional\
    \ characters\n\nListing 5.17 contains regular expressions that match strings containing\
    \ “short” months, days, and years. Launch the code in Listing 5.17 and you will\
    \ see the following output:\n\n```\n=> $0: 03/15/2021 MM/DD/YYYY: 03-15-2021\n\
    => $0: 3/15/2021 MM/DD/YYYY: 03-15-2021\n=> $0: 3/15/21 MM/DD/YYYY: 03-15-2021\n\
    => $0: 03/5/2021 MM/DD/YYYY: 03-05-2021\n=> $0: 3/5/2021 MM/DD/YYYY: 03-05-2021\n\
    => $0: 3/5/21 MM/DD/YYYY: 03-05-2021\n=> $0: 3/5/212 MM/DD/YYYY: 03-05-2021\n\
    => $0: 3/5/21Z MM/DD/YYYY: 03-05-2021\n```\n\nWhy are the preceding pair of lines\
    \ (that are shown in bold) displayed as valid dates, even though the anchor meta\
    \ character “$” appears in the two regular expressions for extracting the year?\
    \ Unfortunately, the latter two regular expressions appear after the initial regular\
    \ expressions that extract the day value, and those two regular expressions do\
    \ *not* check for invalid year formats.\n\nListing 5.18 displays the content of\
    \ `dates2.sh` that detects invalid dates, uses a short-hand notation for multiple\
    \ digits, and removes extraneous print-related statements.\n\n### Listing 5.18:\
    \ dates2.sh\n\n```\ncat dates.txt | awk -F\"/\" '\n{\n    DATE_FORMAT=\"valid\"\
    \n\n    # step 1: check for invalid formats\n    if($0 ~ /[A-Za-z]/) {\n     \
    \   print \"invalid characters: \",$0\n        DATE_FORMAT=\"invalid\"\n    }\
    \ else if($0 ~ /\\/[0-9]{3}$/) {\n        print \"invalid format: \",$0\n    \
    \    DATE_FORMAT=\"invalid\"\n    }\n\n    if(DATE_FORMAT==\"valid\") {\n    \
    \    # step 2: extract the month\n        if($0 ~ /^[0-9][0-9]/) {\n         \
    \   month = substr($0,1,2)\n        } else if($0 ~ /^[0-9]\\//) {\n          \
    \  month = \"0\" substr($0,1,1)\n        } else {\n            DATE_FORMAT=\"\
    invalid\"\n        }\n    }\n\n    if(DATE_FORMAT==\"valid\") {\n        # step\
    \ 3: extract the day\n        if( $0 ~ /^[0-9]{2}\\/[0-9]{2}/ ) {\n          \
    \  day = substr($0,4,2)\n        } else if ( $0 ~ /^[0-9]{2}\\/[0-9]{2}\\// )\
    \ {\n            day = \"0\" substr($0,4,1)\n        } else {\n            DATE_FORMAT=\"\
    invalid\"\n        }\n    }\n\n    if(DATE_FORMAT==\"valid\") {\n        # step\
    \ 4: extract the year\n        if( $0 ~ /^[0-9]{2}\\/[0-9]{2}\\/[0-9]{4}$/ ) {\n\
    \            year = substr($0,7,4)\n        } else if ( $0 ~ /^[0-9]{2}\\/[0-9]\\\
    /[0-9]{2}\\/$/ ) {\n            year = \"20\" substr($0,7,2)\n        }\n    }\n\
    \n    if(DATE_FORMAT==\"valid\") {\n        printf(\"$0: %10s => %s-%s-%s\\n\"\
    ,$0,month,day,year)\n    } else {\n        print \"Date format invalid:\",$0\n\
    \    }\n}\n'\n```\n\nAlthough Listing 5.18 is very similar to Listing 5.17, there\
    \ are some differences. The first difference is that Listing 5.18 checks for phone\
    \ numbers that have alphabetic characters and reports them as having an invalid\
    \ format. The second difference is the conditional code block that identifies\
    \ any phone numbers that have three digits in the right-most position.\n\nThe\
    \ third difference is a short-hand way to specify multiple consecutive digits:\
    \ `[0-9]{2}` matches any pair of consecutive digits, `[0-9]{3}` matches any occurrence\
    \ of three consecutive digits, and so forth. Launch the code in Listing 5.18 and\
    \ you will see the following output:\n\n```\n$0: 03/15/2021 => 03-15-2021\n$0:\
    \  3/15/2021 => 03-15-2021\n$0:    3/15/21 => 03-15-2021\n$0:  03/5/2021 => 03-15-2021\n\
    $0:    3/5/2021 => 03-15-2021\n$0:    3/5/21 => 03-15-2021\ninvalid format:  3/5/212\n\
    $0:    3/5/212 => 03-15-2021\ninvalid characters:  3/5/21Z\n$0:    3/5/21Z =>\
    \ 03-15-2021\n```\n\n## Converting Alphabetic Date Formats\n\nThis section shows\
    \ you how to convert date formats to a common format of the form DD-MON-YYYY.\
    \ Listing 5.19 displays the content of dates2.txt that contains dates in various\
    \ formats, and the strings in bold have invalid formats.\n\n### Listing 5.19:\
    \ dates2.txt\n\n```\n03/15/2021\n04-SEP-2022\n04-sep- 2022\n04-sep- 22\n05-OCT\
    \ 2022\n05-oct 2022\n05-oct 22\n06 JAN 2022\n06 jan 2022\n06 jnn 22\n```\n\nListing\
    \ 5.20 displays the content of dates3.sh illustrates how to remove non-digit characters\
    \ from the dates in Listing 5.19 so that they have the same format.\n\n### Listing\
    \ 5.20: dates3.sh\n\n```\ncat dates2.txt | tr -s ' ' |sed -e 's/ - /-/g' -e 's/\
    \ /-/g' |awk -F\"-\" '\nBEGIN {\n    months[\"JAN\"] = \"JAN\"\n    months[\"\
    FEB\"] = \"FEB\"\n    months[\"MAR\"] = \"MAR\"\n    months[\"APR\"] = \"APR\"\
    \n    months[\"MAY\"] = \"MAY\"\n    months[\"JUN\"] = \"JUN\"\n    months[\"\
    JUL\"] = \"JUL\"\n    months[\"AUG\"] = \"AUG\"\n    months[\"SEP\"] = \"SEP\"\
    \n    months[\"OCT\"] = \"OCT\"\n    months[\"NOV\"] = \"NOV\"\n    months[\"\
    DEC\"] = \"DEC\"\n}'\n```"
