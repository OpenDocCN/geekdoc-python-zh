- md: "tasks, which includes code for linear regression, classification, and clustering.\n\
    \nThe next portion of this chapter introduces SciPy, which is a Python-based library\
    \ that is well-suited to scientific computing tasks.\n\n## What is SciPy?\n\n\
    SciPy is a scientifically oriented Python library that provides many APIs that\
    \ perform operations and calculations, some of which are listed here:\n\n- Combinatorial\
    \ values\n- Permutation values\n- Matrix inversion\n- Image transformations\n\
    - Integration (calculus)\n- Fourier transforms\n- Eigenvalues and eigenvectors\n\
    \nThe following list shows you some of the components of SciPy and where they\
    \ are located:\n\n- File input/output (scipy.io)\n- Special functions (scipy.special)\n\
    - Linear algebra (scipy.linalg)\n- Interpolation (scipy.interpolate)\n- Statistics/Random\
    \ Numbers (scipy.stats)\n- Numerical integration (scipy.integrate)\n- Fast Fourier\
    \ Transforms (scipy.fftpack)\n- Signal processing (scipy.signal)\n- Image manipulation\
    \ (scipy.ndimage)\n\nKeep in mind that SciPy is designed as a collection of submodules,\
    \ most of which rely on NumPy.\n\n## Installing SciPy\n\nMake sure that you have\
    \ Python 3.x installed on your laptop, and then perform the following step to\
    \ install SciPy:\n\n```\npip3 install scipy\n```\n\nLet's delve into some of the\
    \ functionality in SciPy, starting with some combinatorial calculations that are\
    \ discussed in the next section.\n\n## Permutations and Combinations in SciPy\n\
    \nAs a reminder, the term n! represents the factorial value of non-negative integer,\
    \ which is calculated as follows:\n\nn! = n*(n-1)*(n-2)* . . . 3*2*1 (and 0! =\
    \ 1)\n\nNext, let's use term P(n) to designate the number of ways to select n\
    \ objects from a set of n objects, where n is a non-negative integer. The formula\
    \ for P(n) is as follows:\n\nP(n) = n!\n\nThe term C(n, k) represents the number\
    \ of ways to select k objects from a set of n objects, where n and k are non-negative\
    \ integers and k<=n. The formula for C(n, k) is as follows:\n\nC(n, k) = n! /\
    \ [(n-k)! * k!]\n\nListing 4.8 displays the content of scipy_perms.py that illustrates\
    \ how to calculate the value of C(n, k) in SciPy.\n\n**Listing 4.8: scipy_perms.py**\n\
    \n```\nfrom scipy.special import perm\n\n#find permutation of 5, 2 using perm\
    \ (N, k) function\nper = perm(5, 2, exact = True)\nprint(\"Perm(5,2):\",per)\n\
    ```\n\nListing 4.8 starts with an import statement, followed by the initialization\
