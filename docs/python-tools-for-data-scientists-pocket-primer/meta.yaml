    Surname\",\"Height\",\"Weight\"])\n```\n\nPandas also provides the `read_table()`\
    \ method for reading the contents of CSV files, which uses the same syntax as\
    \ the `read_csv()` method.\n\n## The loc() and iloc() Methods in Pandas\n\nIf\
    \ you want to display the contents of a record in a data frame, specify the index\
