    ```\n\n## Joining Alternate Lines in a Text File\n\nListing B.10 displays the\
    \ content of `columns2.txt` and Listing B.11 displays the content of `JoinLines.sh`\
    \ that “joins” two consecutive lines of text in the file `columns2.txt`.\n\n**Listing\
    \ B.10: columns2.txt**\n\n```\none two\nthree four\none two three four\nfive six\n\
    one two three\nfour five\n```\n\n**Listing B.11: JoinLines.sh**\n\n```\nawk '\n\
    {\n    printf(\"%s\", $0)\n    if( $1 !~ /one/) { print \" \" }\n}\n' columns2.txt\n\
    ```\n\nThe output from launching Listing B.11 is here:\n\n```\none two three four\n\
    one two three four five six\none two three four five\n```\n\nNotice that the code\
    \ in Listing B.11 depends on the presence of the string “one” as the first field\
    \ in alternating lines of text; we are merging based on matching a simple pattern,\
    \ instead of tying it to record combinations.\n\nTo merge each pair of lines instead\
    \ of merging based on a pattern, use the modified code in Listing B.12.\n\n**Listing\
    \ B.12: JoinLines2.sh**\n\n```\nawk '\nBEGIN { count = 0 }\n{\n    printf(\"%s\"\
    , $0)\n    if( ++count % 2 == 0) { print \" \" }\n} columns2.txt\n```\n\nYet another\
    \ way to “join” consecutive lines is shown in Listing B.13, where the input file\
    \ and output file refer to files that you can populate with data. This is another\
    \ example of an awk command that might be a puzzle if encountered in a program\
    \ without a comment. It is doing exactly the same thing as Listing B.12, but its\
    \ purpose is less obvious because of the more compact syntax.\n\n**Listing B.13:\
    \ JoinLines2.sh**\n\n```\ninputfile=\"linepairs.csv\"\noutputfile=\"linepairsjoined.csv\"\
    \nawk ' NR%2 {printf \"%s,\", $0; next;}1' < $inputfile >\n$outputfile\n```\n\n\
    ## Matching with Meta Characters and Character Sets\n\nIf we can match a simple\
    \ pattern, you probably expect that you can also match a regular expression, just\
    \ as we did in `grep` and `sed`. Listing B.14 displays the content of `Patterns1.sh`\
    \ that uses metacharacters to match the beginning and the end of a line of text\
    \ in the file `columns2.txt`.\n\n**Listing B.14: Patterns1.sh**\n\n```\nawk '\n\
    /^f/    { print $1 }\n/two $/ { print $1 }\n' columns2.txt\n```\n\nThe output\
    \ from launching Listing B.14 is here:\n\n```\none\nfive\nfour\n```\n\nListing\
    \ B.15 displays the content of `RemoveColumns.txt` with lines that contain a different\
    \ number of columns.\n\n**Listing B.15: columns3.txt**\n\n```\n123 one two\n456\
    \ three four\none two three four\nfive 123 six\none two three\nfour five\n```\n\
    \nListing B.16 displays the content of `MatchAlpha1.sh` that matches text lines\
    \ that start with alphabetic characters as well as lines that contain numeric\
    \ strings in the second column.\n\n**Listing B.16: MatchAlpha1.sh**\n\n```\nawk\
    \ '\n{\n    if( $0 ~ /^[0-9]/) { print $0 }\n    if( $0 ~ /^[a-z]+ [0-9]/) { print\
    \ $0 }\n}\n' columns3.txt\n```\n\nThe output from Listing B.16 is here:\n\n```\n\
    123 one two\n456 three four\nfive 123 six\n```\n\n## Printing Lines Using Conditional\
    \ Logic\n\nListing B.17 displays the content of `products.txt` that contains three\
    \ columns of information.\n\n**Listing B.17: products.txt**\n\n```\nMobilePhone\
    \ 400  new\nTablet      300  new\nTablet      300  used\nMobilePhone 200  used\n\
    MobilePhone 100  used\n```\n\nThe following code snippet prints the lines of text\
    \ in `products.txt` whose second column is greater than 300:\n\n```\nawk '$2 >\
    \ 300' products.txt\n```\n\nThe output of the preceding code snippet is here:\n\
    \n```\nMobilePhone 400  new\n```\n\nThe following code snippet prints the lines\
    \ of text in `products.txt` whose product is new:\n\n```\nawk '($3 == \"new\"\
    )' products.txt\n```\n\nThe output of the preceding code snippet is here:\n\n\
    ```\nMobilePhone 400  new\nTablet      300  new\n```\n\nThe following code snippet\
    \ prints the first and third columns of the lines of text in `products.txt` whose\
    \ cost equals 300:\n\n```\nawk ' $2 == 300 { print $1, $3 }' products.txt\n```\n\
    \nThe output of the preceding code snippet is here:\n\n```\nTablet new\nTablet\
    \ used\n```\n\nThe following code snippet prints the first and third columns of\
    \ the lines of text in `products.txt` that start with the string Tablet:\n\n```\n\
    awk '/^Tablet/ { print $1, $3 }' products.txt\n```\n\nThe output of the preceding\
    \ code snippet is here:\n\n```\nTablet new\nTablet used\n```\n\n## Splitting Filenames\
    \ with awk\n\nListing B.18 displays the content of `SplitFilename2.sh` that illustrates\
    \ how to split a filename containing the \".\" character to increment the numeric\
    \ value of one of the components of the filename. Note that this code only works\
    \ for a file name with exactly the expected syntax. It is possible to write more\
    \ complex code to count the number of segments, or alternately to just say \"\
    change the field right before the .zip,\" which would only require the filename\
    \ had a format matching the final two sections (<anystructure>.number.zip).\n\n\
    **Listing B.18: SplitFilename2.sh**\n\n```\necho \"05.20.144q.az.1.zip\" | awk\
    \ -F\".\" '\n{\n    f5=$5 + 1\n    printf(\"%s.%s.%s.%s.%s.%s\",$1,$2,$3,$4,f5,$6)\n\
    }'\n```\n\nThe output from Listing B.18 is here:\n`05.20.144q.az.2.zip`\n\n##\
    \ Working with Postfix Arithmetic Operators\n\nListing B.19 displays the content\
    \ of `mixednumbers.txt` that contains postfix operators, which means numbers where\
    \ the negative (and/or positive) sign appears at the end of a column value instead\
    \ of the beginning of the number.\n\n**Listing B.19: mixednumbers.txt**\n\n```\n\
    324.000-|10|983.000-\n453.000-|30|298.000-\n783.000-|20|347.000-\n```\n\nListing\
    \ B.20 displays the content of `AddSubtract1.sh` that illustrates how to add the\
    \ rows of numbers in Listing B.19.\n\n**Listing B.20: AddSubtract1.sh**\n\n```\n\
    myFile=\"mixednumbers.txt\"\n\nawk -F\"|\" '\nBEGIN { line = 0; total = 0 }\n\
    {\n    split($1, arr, \"-\")\n    f1 = arr[1]\n    if($1 ~ /-/) { f1 = -f1 }\n\
    \    line += f1\n\n    split($2, arr, \"-\")\n    f2 = arr[1]\n    if($2 ~ /-/)\
    \ { f2 = -f2 }\n    line += f2\n\n    split($3, arr, \"-\")\n    f3 = arr[1]\n\
    \    if($3 ~ /-/) { f3 = -f3 }\n    line += f3\n\n    printf(\"f1: %d f2: %d f3:\
    \ %d line: %d\\n\",f1,f2,f3, line)\n    total += line\n    line = 0\n}\nEND {\
    \ print \"Total: \",total }\n' $myfile\n```\n\nThe output from Listing B.20 is\
    \ here. See if you can determine what the code is doing before reading the explanation\
    \ that follows:\n\n```\nf1: -324 f2: 10 f3: -983 line: -1297\nf1: -453 f2: 30\
    \ f3: -298 line: -721\nf1: -783 f2: 20 f3: -347 line: -1110\nTotal:  -3128\n```\n\
    \nThe code assumes we know the format of the file. The `split` function turns\
    \ each field record into a length two vector (first position = number, second\
    \ position either an empty value or a dash), and then captures the first position\
    \ number in a variable. The `if` statement just sees if the original field has\
    \ a dash in it. If the field has a dash, then the numeric variable is made negative,\
    \ otherwise it is left alone. Then, it adds up the values in the line.\n\n## Numeric\
    \ Functions in awk\n\nThe `int(x)` function returns the integer portion of a number.\
    \ If the number is not already an integer, it falls between two integers. Of the\
    \ two possible integers, the function will return the one closest to zero. This\
    \ is different from a rounding function, which chooses the closer integer.\n\n\
    For example, `int(3)` is 3, `int(3.9)` is 3, `int(-3.9)` is -3, and `int(-3)`\
    \ is -3, as well. An example of the `int(x)` function in an `awk` command is here:\n\
    \n```\nawk 'BEGIN {\n    print int(3.534);\n    print int(4);\n    print int(-5.223);\n\
    \    print int(-5);\n}'\n```\n\nThe output is here:\n\n```\n3\n4\n-5\n-5\n```\n\
    \nThe exp(x) function gives you the exponential of x, or reports an error if x\
    \ is out of range. The range of values x can have depends on your machine's floating\
    \ point representation.\n\n```\nawk 'BEGIN{\n    print exp(123434346);\n    print\
    \ exp(0);\n    print exp(-12);\n}'\n```\n\nThe output is here:\n\n```\ninf\n1\n\
    6.14421e-06\n```\n\nThe log(x) function gives you the natural logarithm of x,\
    \ if x is positive; otherwise, it reports an error (inf means \"infinity\" and\
    \ nan in the output means \"not a number\").\n\n```\nawk 'BEGIN{\n    print log(12);\n\
    \    print log(0);\n    print log(1);\n    print log(-1);\n}'\n```\n\nThe output\
    \ is here:\n\n```\n2.48491\n-inf\n0\nnan\n```"
  mdcn: "## 合并文本文件中的多行\n\n请注意以下注释如何帮助理解代码片段：\n\n```\n# 通过删除换行符将所有文本合并为一行\nawk '{printf(\"\
    %s\", $0)}' test4.txt\n```\n\n清单 B.8 显示了 `digits.txt` 的内容，清单 B.9 显示了 `digits.sh`\
    \ 的内容，该脚本将文件 `digits.txt` 中连续的三行文本“合并”在一起。\n\n**清单 B.8: digits.txt**\n\n```\n\
    1\n2\n3\n4\n5\n6\n7\n8\n9\n```\n\n**清单 B.9: digits.sh**\n\n```\nawk -F\" \" '{\n\
    \    printf(\"%d\",$0)\n    if(NR % 3 == 0) { printf(\"\\n\") }\n}' digits.txt\n\
    ```\n\n清单 B.9 将连续的三行文本打印在同一行，之后再打印一个换行符。这实现了将每三行连续文本“合并”的效果。运行 `digits.sh` 的输出如下：\n\
    \n```\n123\n456\n789\n```\n\n## 合并文本文件中的交替行\n\n清单 B.10 显示了 `columns2.txt` 的内容，清单\
    \ B.11 显示了 `JoinLines.sh` 的内容，该脚本将文件 `columns2.txt` 中连续的两行文本“合并”在一起。\n\n**清单 B.10:\
    \ columns2.txt**\n\n```\none two\nthree four\none two three four\nfive six\none\
    \ two three\nfour five\n```\n\n**清单 B.11: JoinLines.sh**\n\n```\nawk '\n{\n  \
    \  printf(\"%s\", $0)\n    if( $1 !~ /one/) { print \" \" }\n}\n' columns2.txt\n\
    ```\n\n运行清单 B.11 的输出如下：\n\n```\none two three four\none two three four five six\n\
    one two three four five\n```\n\n请注意，清单 B.11 中的代码依赖于交替行文本的第一个字段中存在字符串“one”；我们是基于匹配一个简单的模式进行合并，而不是将其与记录组合绑定。\n\
    \n要合并每一对行，而不是基于模式合并，请使用清单 B.12 中的修改代码。\n\n**清单 B.12: JoinLines2.sh**\n\n```\n\
    awk '\nBEGIN { count = 0 }\n{\n    printf(\"%s\", $0)\n    if( ++count % 2 ==\
    \ 0) { print \" \" }\n} columns2.txt\n```\n\n清单 B.13 展示了另一种“合并”连续行的方法，其中输入文件和输出文件指的是你可以用数据填充的文件。这是另一个\
    \ awk 命令的例子，如果在程序中遇到而没有注释，可能会让人困惑。它与清单 B.12 执行完全相同的操作，但由于语法更紧凑，其目的不那么明显。\n\n**清单\
    \ B.13: JoinLines2.sh**\n\n```\ninputfile=\"linepairs.csv\"\noutputfile=\"linepairsjoined.csv\"\
    \nawk ' NR%2 {printf \"%s,\", $0; next;}1' < $inputfile >\n$outputfile\n```\n\n\
    ## 使用元字符和字符集进行匹配\n\n如果我们能匹配一个简单的模式，你可能期望也能匹配一个正则表达式，就像我们在 `grep` 和 `sed` 中所做的那样。清单\
    \ B.14 显示了 `Patterns1.sh` 的内容，它使用元字符来匹配文件 `columns2.txt` 中文本行的开头和结尾。\n\n**清单 B.14:\
    \ Patterns1.sh**\n\n```\nawk '\n/^f/    { print $1 }\n/two $/ { print $1 }\n'\
    \ columns2.txt\n```\n\n运行清单 B.14 的输出如下：\n\n```\none\nfive\nfour\n```\n\n清单 B.15\
    \ 显示了 `RemoveColumns.txt` 的内容，其中包含不同列数的行。\n\n**清单 B.15: columns3.txt**\n\n```\n\
    123 one two\n456 three four\none two three four\nfive 123 six\none two three\n\
    four five\n```\n\n清单 B.16 显示了 `MatchAlpha1.sh` 的内容，它匹配以字母字符开头的文本行，以及第二列包含数字字符串的行。\n\
    \n**清单 B.16: MatchAlpha1.sh**\n\n```\nawk '\n{\n    if( $0 ~ /^[0-9]/) { print\
    \ $0 }\n    if( $0 ~ /^[a-z]+ [0-9]/) { print $0 }\n}\n' columns3.txt\n```\n\n\
    清单 B.16 的输出如下：\n\n```\n123 one two\n456 three four\nfive 123 six\n```\n\n## 使用条件逻辑打印行\n\
    \n清单 B.17 显示了 `products.txt` 的内容，其中包含三列信息。\n\n**清单 B.17: products.txt**\n\n```\n\
    MobilePhone 400  new\nTablet      300  new\nTablet      300  used\nMobilePhone\
    \ 200  used\nMobilePhone 100  used\n```\n\n以下代码片段打印 `products.txt` 中第二列大于 300\
    \ 的文本行：\n\n```\nawk '$2 > 300' products.txt\n```\n\n上述代码片段的输出如下：\n\n```\nMobilePhone\
    \ 400  new\n```\n\n以下代码片段打印 `products.txt` 中产品为新的文本行：\n\n```\nawk '($3 == \"new\"\
    )' products.txt\n```\n\n上述代码片段的输出如下：\n\n```\nMobilePhone 400  new\nTablet    \
    \  300  new\n```\n\n以下代码片段打印 `products.txt` 中成本等于 300 的文本行的第一列和第三列：\n\n```\nawk\
    \ ' $2 == 300 { print $1, $3 }' products.txt\n```\n\n上述代码片段的输出如下：\n\n```\nTablet\
    \ new\nTablet used\n```\n\n以下代码片段打印 `products.txt` 中以字符串 Tablet 开头的文本行的第一列和第三列：\n\
    \n```\nawk '/^Tablet/ { print $1, $3 }' products.txt\n```\n\n上述代码片段的输出如下：\n\n\
    ```\nTablet new\nTablet used\n```\n\n## 使用 awk 拆分文件名\n\n清单 B.18 显示了 `SplitFilename2.sh`\
    \ 的内容，它演示了如何拆分包含“.”字符的文件名，以增加文件名其中一个组件的数值。请注意，此代码仅适用于具有完全预期语法的文件名。可以编写更复杂的代码来计算段数，或者简单地说“更改\
    \ .zip 之前的字段”，这只需要文件名格式与最后两部分匹配（<任意结构>.数字.zip）。\n\n**清单 B.18: SplitFilename2.sh**\n\
    \n```\necho \"05.20.144q.az.1.zip\" | awk -F\".\" '\n{\n    f5=$5 + 1\n    printf(\"\
    %s.%s.%s.%s.%s.%s\",$1,$2,$3,$4,f5,$6)\n}'\n```\n\n清单 B.18 的输出如下：\n`05.20.144q.az.2.zip`\n\
    \n## 使用后缀算术运算符\n\n清单 B.19 显示了 `mixednumbers.txt` 的内容，其中包含后缀运算符，这意味着负号（和/或正号）出现在列值的末尾而不是数字的开头。\n\
    \n**清单 B.19: mixednumbers.txt**\n\n```\n324.000-|10|983.000-\n453.000-|30|298.000-\n\
    783.000-|20|347.000-\n```\n\n清单 B.20 显示了 `AddSubtract1.sh` 的内容，它演示了如何对清单 B.19\
    \ 中的数字行求和。\n\n**清单 B.20: AddSubtract1.sh**\n\n```\nmyFile=\"mixednumbers.txt\"\
    \n\nawk -F\"|\" '\nBEGIN { line = 0; total = 0 }\n{\n    split($1, arr, \"-\"\
    )\n    f1 = arr[1]\n    if($1 ~ /-/) { f1 = -f1 }\n    line += f1\n\n    split($2,\
    \ arr, \"-\")\n    f2 = arr[1]\n    if($2 ~ /-/) { f2 = -f2 }\n    line += f2\n\
    \n    split($3, arr, \"-\")\n    f3 = arr[1]\n    if($3 ~ /-/) { f3 = -f3 }\n\
    \    line += f3\n\n    printf(\"f1: %d f2: %d f3: %d line: %d\\n\",f1,f2,f3, line)\n\
    \    total += line\n    line = 0\n}\nEND { print \"Total: \",total }\n' $myfile\n\
    ```\n\n清单 B.20 的输出如下。在阅读下面的解释之前，看看你是否能确定代码在做什么：\n\n```\nf1: -324 f2: 10 f3: -983\
    \ line: -1297\nf1: -453 f2: 30 f3: -298 line: -721\nf1: -783 f2: 20 f3: -347 line:\
    \ -1110\nTotal:  -3128\n```\n\n该代码假设我们知道文件的格式。`split` 函数将每个字段记录转换为长度为二的向量（第一个位置\
    \ = 数字，第二个位置要么是空值，要么是破折号），然后将第一个位置的数字捕获到一个变量中。`if` 语句只是检查原始字段中是否有破折号。如果字段有破折号，则将数字变量设为负数，否则保持不变。然后，它将行中的值相加。\n\
    \n## awk 中的数值函数\n\n`int(x)` 函数返回一个数字的整数部分。如果该数字本身不是整数，它介于两个整数之间。在两个可能的整数中，该函数将返回最接近零的那个。这与舍入函数不同，舍入函数会选择更接近的整数。\n\
    \n例如，`int(3)` 是 3，`int(3.9)` 是 3，`int(-3.9)` 是 -3，`int(-3)` 也是 -3。`awk` 命令中 `int(x)`\
    \ 函数的一个示例如下：\n\n```\nawk 'BEGIN {\n    print int(3.534);\n    print int(4);\n\
    \    print int(-5.223);\n    print int(-5);\n}'\n```\n\n输出如下：\n\n```\n3\n4\n-5\n\
    -5\n```\n\n`exp(x)` 函数给出 x 的指数，如果 x 超出范围则报告错误。x 可以取的值范围取决于你机器的浮点表示。\n\n```\nawk\
    \ 'BEGIN{\n    print exp(123434346);\n    print exp(0);\n    print exp(-12);\n\
    }'\n```\n\n输出如下：\n\n```\ninf\n1\n6.14421e-06\n```\n\n`log(x)` 函数给出 x 的自然对数，如果\
    \ x 为正数；否则，它报告错误（输出中的 `inf` 表示“无穷大”，`nan` 表示“非数字”）。\n\n```\nawk 'BEGIN{\n    print\
    \ log(12);\n    print log(0);\n    print log(1);\n    print log(-1);\n}'\n```\n\
    \n输出如下：\n\n```\n2.48491\n-inf\n0\nnan\n```"
