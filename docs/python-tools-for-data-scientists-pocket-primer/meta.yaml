    \ snippet initializes the variable `df` as a Pandas data frame that contains data\
    \ from the `Iris` dataset.\n\nThe next block of code invokes some attributes and\
    \ methods of a Pandas `dataframe` to display the number of rows, columns, and\
    \ elements in the dataframe, as well as the details of the `Iris` dataset, the\
    \ first five rows, and the unique labels in the `Iris` dataset. Launch the code\
    \ in Listing 4.5 to see the following output:\n\n```\n=> IRIS feature names:\n\
