    \ $0}' < data.txt\n```\n\n在文本文件中插入每一行的副本并删除空行：\n\n```\nawk '{print $0, \"\\n\"\
    , $0}' < data.txt | awk 'NF > 0'\n```\n\n在文本文件中的每一行后插入一个空行：\n\n```\nawk '{print\
    \ $0, \"\\n\"}' < data.txt\n```\n\n## 在 awk 中打印文本字符串中的单词\n\n清单 B.22 显示了 `Fields2.sh`\
    \ 的内容，该示例说明了如何使用 `awk` 命令打印文本字符串中的单词。\n\n### 清单 B.22: Fields2.sh\n\n```\necho\
