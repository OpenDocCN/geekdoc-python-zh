  - '[PAGE 80]


    # 4.1.2. How to Write Comments


    In Python, the hash mark indicates a comment. Anything following a hash mark in
    your code is ignored by the Python interpreter. For example:


    ```

    1 # This is the first line of my program.


    2 print("Hello world!") # This is the second line of my program.

    ```


    Hello world!


    As you can see, the result of our program is only “Hello world!”. Python ignores
    the first line completely and executes only the part of the second line that does
    *not* follow the # mark.


    All right, now that we''ve written our first piece of Python code, I think you''re
    ready for something a bit more challenging than hello world. Ready? Let''s do
    it!'
- md: '## 4.2. How to Get Information from the User


    On the whole, for a program to be useful it needs to get at least some information
    from the user. With this data, the program can take actions that are relevant
    to the user, instead of generic actions, like printing hello world.


    Data can be provided to a computer in a bunch of different ways. For example,
    on a website you might input data by entering text into text fields or clicking
    links. If you''re using a mobile application, maybe you''ll click on buttons or
    select preferences from a drop-down menu.


    In a command line program, you might provide additional data by passing strings
    as parameters to the program, or you could have the program ask you for data interactively.
    All of these various platforms, programs, and apps process data differently.


    Some might take the contents of a file as data to be processed, others gather
    data from other sources and process it in the background. Remember our earlier
    example, when we automated the process of identifying and removing duplicate emails?


    There, the data provided to the program was the list of emails, which would usually
    be given in a file that lists the emails one per line. Whichever way your application
    gets the data, it will need to come from somewhere.


    For our first examples in this course, we''ll just have the data as its own line
    in our block of code. This is limited, but straightforward. Later in this course,
    and in upcoming courses, we''ll introduce you to better ways of feeding data into
    your code. For now though, let''s see this idea in action in a very simple example
    in the next video.


    ### Video 3 (0:28 *How to Get Information from the User*)


    Next up, we''ll learn a few other easy things that you can get Python to do for
    you.


    ## 4.3. Python Can Be Your Calculator


    There''s a ton of things that you can do with Python and you''ll learn many of
    them in this course. But before we dive into complex subjects, let''s have some
    fun with another simple task that you can do with Python. We are going to make
    Python our calculator. Watch this video:


    ### Video 4 (0:57 *Python can be your calculator*)


    Here''s more examples:


    ```

    print(10+5)


    15


    print(-1/4)


    -0.25

    ```


    Easy. Repeating or periodic numbers are printed in a longer format. Let''s try
    1 divided by 3.


    ```

    print(1/3)


    0.3333333333333333

    ```


    In math theory, when 1 is divided by 3, the digit 3 repeats forever after the
    decimal point. Of course, it''s hard to display something that repeats forever.
    So instead, we have a representation showing lots of decimal places. Not too hard,
    right?


    If you''re starting to worry that this is becoming an algebra course, relax. We''re
    not going to do anything more complex than what we''ve just seen. If you''re thinking,
    "Why would I use Python instead of just a normal calculator?" That''s a valid
    question.


    Experimenting in this way, you get familiar with the language''s math capabilities.
    In IT jobs, there are many tasks that require you to use math calculations. You
    might need to count how many times a certain word appears in a text, or work out
    the average time it takes for an operation to complete, or how much you have to
    compress an image to fit in certain size constraints.


    Whatever you need to calculate, writing a script can help you do it faster and
    with more accuracy. So you need to know what mathematical operations are available
    to you. Python actually has a lot more advanced numeric capabilities that are
    used for data analysis, statistics, machine learning, and other scientific applications.
    We won''t get into these in this course. But if you want to learn more about them
    on your own, there''s a wealth of online resources available.


    ## 4.4. Cheat Sheet 1: First Programming Concepts


    Now open and study the “First Programming Concepts Cheat Sheet” you downloaded
    to help you with programming concepts that we''ve just covered. After that, it''s
    time for another quiz. This time with a few small coding exercises. Remember,
    if something is unclear, you can re-watch the videos as many times as you need.
    Ready? You''ve got this.


    ## 4.5. Practice Quiz 3: Hello World - 5 Questions


    1. What are functions in Python? - 1 point


    - Functions let us use Python as a calculator.

    - Functions are pieces of code that perform a unit of work.

    - Functions are only used to print messages to the screen.

    - Functions are how we tell if our program is functioning or not.


    2. What are keywords in Python? - 1 point


    - Keywords are reserved words that are used to construct instructions.

    - Keywords are used to calculate mathematical operations.

    - Keywords are used to print messages like "Hello World!" to the screen.

    - Keywords are the words that we need to memorize to program in Python.


    3. What does the print function do in Python? - 1 point


    - The print function generates PDFs and sends it to the nearest printer.

    - The print function stores values provided by the user.

    - The print function outputs messages to the screen.

    - The print function calculates mathematical operations.


    4. Output a message that says "Programming in Python is fun!" to the screen. -
    1 point


    5. Replace the ___ placeholder and calculate the ratio: - 1 point


    Tip: to calculate the square root of a number x, you can use x**(1/2).


    ```

    ratio = _


    print(ratio)

    ```


    ### 4.5.1. Answers to Practice Quiz 3


    1. Python functions encapsulate a certain action, like outputting a message to
    the screen in the case of print().


    2. A. Using the reserved words provided by the language we can construct complex
    instructions that will make our scripts.


    3. C. Using the print() we can generate output for the user of our programs.


    4. print("Programming in Python is fun!")


    5.


    ```

    ratio = (1+(5**0.5))/2

    print(ratio)

    ```


    Do you now see how we can use Python to calculate complex values?


    ## 5. Module Review


    ## 5.1. First Steps Wrap Up


    Congrats! You made it to the end of the first module. Great job. You''ve taken
    the first steps to learning a new programming language, and growing your IT skillset.
    Getting there shows real determination and a will to learn.


    We''ve covered a lot of topics, and many might be new to you if you''ve never
    learned about programming before. You''ve discovered what scripting is, what the
    syntax and semantics of a programming language are all about, and how they relate
    to automation.


    We''ve got to grip some small blocks of Python code, talked about why Python is
    relevant to IT, and explored what other programming languages are available. We''ve
    had our first approach to how to input data, and write a script that puts this
    data to use, and we''ve seen how you can use Python to perform typical math calculations.
    Not bad for your first Python steps, right? This is just the beginning of an exciting
    journey, learning to code, and we hope you''re eager to learn more.


    Coming up, get ready for your **first graded** assessment. These assessments help
    you check whether you''ve understood all the concepts and that you''re ready to
