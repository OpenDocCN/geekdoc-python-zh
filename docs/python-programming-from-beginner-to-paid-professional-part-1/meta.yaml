  md: '# 1.2. Course Introduction


    If you work in IT, computer programming skills open up an incredible amount of
    opportunity. Being able to write scripts and programs that tell your computer
    to perform a task equips you with an invaluable tool. Not only does it make your
    work easier and more efficient, it can help you grow faster and advance further
    in your IT career.


