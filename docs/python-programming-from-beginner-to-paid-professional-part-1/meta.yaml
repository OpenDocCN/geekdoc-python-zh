- md: '## 1.1. Specialization Introduction


    Working in IT is more than just a job. It''s a career path. Research shows that
    the field of IT support is a launchpad for future career growth and better wages.
    In fact, a study on the subject was recently conducted by the Harvard Business
    School Accenture and Burning Glass entitled “Bridge the Gap”.


    It found that among today''s middle-skilled jobs which require training but not
    a formal college degree, IT support offers clear pathways to prosperity. I saw
    this phenomenon play out at Google, in their IT support program. Those who push
    themselves to learn how to code in Python typically saw strong career growth.


    They built skills that are critical to accessing higher level positions in the
    IT field, and after honing those skills through hard work and determination, they
    advanced into more technical IT support specialists. Some of them are systems
    administrators, technical solutions engineers, and even site reliability engineers.
    The common thread across all of these roles is knowing how to write code to solve
    problems and automate solutions.


    By expanding your toolbox to include coding skills, you open a window into the
    world of systems management that can lead you towards more advanced technical
    roles down the line. Python in particular is having a huge surge. According to
    the 2019 Stack Overflow Developer Survey, Python is the coding language most people
    want to learn. The second most loved by those who already know it and the fourth
    most popular overall.


    So why take this course to learn how to code in Python? Well, first it''s geared
    towards people who are already in or aspiring to be in the field of IT. Maybe
    you''re thinking bigger about your current IT role and want to work towards managing
    operations at scale, or maybe you''re just starting out and looking to break into
    the IT industry.


    Perhaps you''ve taken an IT Support Professional Certificate program somewhere
    already, or you have equivalent IT support knowledge with basic computing skills,
