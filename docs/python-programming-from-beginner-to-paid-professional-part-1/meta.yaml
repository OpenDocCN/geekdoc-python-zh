  md: '# 16.5. Dictionaries versus Lists


    Dictionaries and lists are both really useful and each have strengths in different
    situations. So when is it best to use a list and when is the dictionary the way
    to go? Think about **the kind of information you can represent in each data**


    If you''ve got a list of information you''d like to collect and use in your script
    then the list is probably the right approach. For example, if you want to store
    a series of IP addresses to ping, you could put them all into a list and iterate
    over them.


    Or if you had a list of host names and their corresponding IP addresses, you might
    want to pair them as key values in a dictionary. Because of the way dictionaries
    work, it''s super easy and fast to search for an element in them.


    Let''s say you have a dictionary that has usernames as keys, and the groups they
    belong to as values. It doesn''t matter if you have 10 users or 10,000 users,
    accessing the entry for a given user will take the same time. Amazing, but this
    isn''t true for lists.


    If you''ve got a list of 10 elements, and you need to check if one element is
    in the list, it''ll be a very fast check but if your list has 10,000 elements
    it''ll take significantly longer to check if the element you''re looking for is
    there. So **in general, you want to use dictionaries when you plan on searching
    for a specific**'
