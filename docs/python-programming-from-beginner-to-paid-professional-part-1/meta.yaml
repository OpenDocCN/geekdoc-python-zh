- md: "## 14.6. Basic String Methods\n\nIn Python, strings are immutable. This means\
    \ that they can't be modified. So if we wanted to fix a typo in a string, we can't\
    \ simply modify the wrong character. We would have to create a new string with\
    \ the typo corrected. We can also assign a new value to the variable holding our\
    \ string.\n\nIf we aren't sure what the index of our typo is, we can use the string\
    \ method *index* to locate it and return the index. Let's imagine we have the\
    \ string **\"lions tigers and bears\"** in the variable `animals`. We can locate\
    \ the index that contains the letter **g** using `animals.index(\"g\")`, which\
    \ will return the index; in this case 8.\n\nWe can also use substrings to locate\
    \ the index where the substring begins. `animals.index(\"bears\")` would return\
    \ 17, since that's the start of the substring. If there's more than one match\
    \ for a substring, the index method will return the first match. If we try to\
    \ locate a substring that doesn't exist in the string, we'll receive a **ValueError**\
    \ explaining that the substring was not found.\n\nWe can avoid a ValueError by\
    \ first checking if the substring exists in the string. This can be done using\
    \ the **in** keyword. We saw this keyword earlier when we covered *for* loops.\
    \ In this case, it's a conditional that will be either True or False. If the substring\
    \ is found in the string, it will be True. If the substring is not found in the\
    \ string, it will be False.\n\nUsing our previous variable we can do `\"horses\"\
    \ in animals` to check if the substring \"horses\" is found in our variable. In\
    \ this case, it would evaluate to False, since horses aren't included in our example\
    \ string. If we did `\"tigers\" in animals` we'd get True, since this substring\
    \ is contained in our string.\n\n## 14.7. More String Methods\n\nWe said earlier\
    \ that we had a lot of new exciting concepts coming up. Well, I'm not going to\
    \ “string” you along anymore. We're going to tie up our lessons on strings with\
    \ a bunch of fun methods for transforming our string text.\n\nSo far, we've seen\
    \ ways you can access portions of strings using the indexing technique, create\
    \ new strings by slicing and concatenating, find characters and strings using\
    \ the index method, and even test if one string contains another. On top of all\
    \ this string processing power, the string class provides a bunch of other methods\
    \ for working with text.\n\nNow, we'll show you how to use some of these methods.\
    \ Remember, the goal is not for you to memorize all of this. Instead, we want\
    \ to give you an idea of what you can do with strings in Python.\n\n**Video 29**\
    \ (2:38) *More String Methods*\n\nSome string methods let you perform transformations\
    \ or formatting on the string text, like `upper()` and its opposite `lower()`.\n\
    \n```\n\"Mountains\".upper()\n'MOUNTAINS'\n\"Mountains\".lower()\n'mountains'\n\
    ```\n\nThese methods are really useful when you're handling user input. Let's\
    \ say you wanted to check if the user answered yes to a question. How would you\
    \ know if the user typed it using upper or lower case? You don't need to, you\
    \ just transform the answer to the case you want. Like this example:\n\n```\n\
    answer = 'YES'\nif answer.lower() == \"yes\":\n    print(\"User said yes\")\n\
    ```\n\nUser said yes\n\nAnother useful method when dealing with user input is\
    \ the **strip** method. This method will get rid of surrounding spaces in the\
    \ string:\n\n```\n\"yes \".strip()\n\"yes\"\n```\n\nIf we ask the user for an\
    \ answer, we usually don't care about any surrounding spaces. So it's a good idea\
    \ to use the strip method to get rid of any white space. This means that **strip**\
    \ doesn't just remove spaces, it **also removes tabs and new line characters**\
    \ which are all characters we don't usually want in user-provided strings.\n\n\
    There are two more versions of this method, **lstrip** and **rstrip**, to get\
    \ rid of the whitespace characters just to the **left** or to the **right** of\
    \ the string instead of both sides.\n\n```\n\" yes \".lstrip()\n'yes '\n```\n\n\
    ```\n\" yes \".rstrip()\n' yes'\n```\n\nOther methods give you information about\
    \ the string itself. The method **count()** returns how many times a given substring\
    \ appears within a string.\n\n```\n\"The number of times e occurs in this string\
    \ is 4\".count(\"e\")\n4\n```\n\nThe method **endswith()** returns whether the\
    \ string ends with a certain substring.\n\n```\n\"Forest\".endswith(\"rest\")\n\
    True\n```\n\nThe method **isnumeric()** returns whether the string's made up of\
    \ just numbers.\n\n```\n\"Forest\".isnumeric()\nFalse\n```\n\n```\n\"12345\".isnumeric()\n\
    True\n```\n\nAdding to that, if we have a string that is numeric, we can use the\
    \ **int** function to convert it to an actual number.\n\n```\nint(\"12345\") +\
    \ int(\"54321\")\n66666\n```\n\nIn earlier videos, we showed that we can concatenate\
    \ strings using the plus sign.\n\nThe **join** method can also be used for concatenating.\
    \ To use the join method, we have to call it on the string that'll be used for\
    \ joining.\n\n```\n\" \".join([\"This\", \"is\", \"a\", \"phrase\", \"joined\"\
    , \"by\", \"spaces\"])\n'This is a phrase joined by spaces'\n```\n\nIn this case,\
    \ we're using a string with a space in it. The method receives a list of strings\
    \ and returns one string with each of the strings joined by the initial string.\
    \ Let's check out another example:\n\n```\n\"...\".join([\"This\", \"is\", \"\
    a\", \"phrase\", \"joined\", \"by\", \"triple\", \"dots\"])\n'This...is...a...phrase...joined...by...triple...dots'\n\
    ```\n\nFinally, we can also split a string into a list of strings. The **split**\
    \ method returns a list of all the words in the initial string and it automatically\
    \ splits by any whitespace.\n\n```\n\"This is another example\".split()\n['This',\
    \ 'is', 'another', 'example']\n```\n\nAre you starting to see how these string\
    \ methods could be useful in your IT job? Okay, so we've just learned a bunch\
    \ of new methods. But there are tons more that you can use on strings. We've included\
    \ a list with the ones we talked about, and some new ones in the next cheat sheet.\
    \ You'll also find a link to the full Python documentation there, which gives\
    \ you all the info on each available method.\n\nAs we've said before, don't worry\
    \ about trying to memorize everything. You'll pick these concepts up **with practice**,\
    \ and the documentation is always there if you need it. All right, last up in\
    \ our string of string tutorials, we're going to check out how to format strings\
    \ in section 14.9.\n\n## 14.8. Advanced String Methods\n\nWe've covered a bunch\
    \ of String class methods already, so let's keep building on those and run down\
    \ some more advanced methods.\n\nThe string method **lower** will return the string\
    \ with all characters changed to lowercase. The inverse of this is the **upper**\
    \ method, which will return the string all in uppercase. Just like with previous\
    \ methods, we call these on a string using dot notation, like `\"this is a\".upper()`.\
    \ This would return the string `\"THIS IS A\"`. This can be super handy when checking\
    \ user input, since someone might type in all lowercase, all uppercase, or even\
    \ a mixture of cases.\n\nYou can use the **strip** method to remove surrounding\
    \ whitespace from a string. Whitespace includes spaces, tabs, and **newlines**.\
    \ You can also use the methods **lstrip** and **rstrip** to remove whitespace\
    \ only from the left or the right side of the string, respectively.\n\nThe method\
    \ **count** can be used to return the number of times a substring appears in a\
    \ string. This can be handy for finding out how many characters appear in a string,\
    \ or counting the number of times a certain word appears in a sentence or paragraph.\n\
    \nIf you wanted to check if a string ends with a given substring, you can use\
    \ the method **endswith()**. This will return True if the substring is found at\
    \ the end of the string, and False if not.\n\nThe **isnumeric** method can check\
    \ if a string is composed of only numbers. If the string contains only numbers,\
    \ this method will return True. We can use this to check if a string contains\
    \ numbers before passing the string to the **int()** function to convert it to\
    \ an integer, avoiding an error. Useful!\n\nWe took a look at string concatenation\
    \ using the plus sign, earlier. We can also use the **join** method to concatenate\
    \ strings. This method is called on a string that will be used to join a list\
    \ of strings. The method takes a list of strings to be joined as a parameter,\
    \ and returns a new string composed of each of the strings from our list joined\
    \ using the initial string. For example, `\" \".join([\"This\",\"is\",\"a\",\"\
    sentence\"])` would return the string \"This is a sentence\".\n\nThe inverse of\
    \ the join method is the **split** method. This allows us to split a string into\
    \ a list of strings. By default, it splits by any whitespace characters. You can\
    \ also split by any other characters by passing a parameter."
  mdcn: "## 14.6. 基本字符串方法\n\n在 Python 中，字符串是不可变的。这意味着它们不能被修改。因此，如果我们想修正字符串中的一个拼写错误，我们不能简单地修改错误的字符。我们必须创建一个修正了拼写错误的新字符串。我们也可以为保存字符串的变量赋予一个新值。\n\
    \n如果我们不确定拼写错误的索引是什么，我们可以使用字符串方法 *index* 来定位它并返回索引。让我们假设变量 `animals` 中包含字符串 **\"\
    lions tigers and bears\"**。我们可以使用 `animals.index(\"g\")` 来定位包含字母 **g** 的索引，它将返回索引；在本例中是\
    \ 8。\n\n我们也可以使用子字符串来定位子字符串开始的索引。`animals.index(\"bears\")` 将返回 17，因为那是子字符串的起始位置。如果一个子字符串有多个匹配项，index\
    \ 方法将返回第一个匹配项。如果我们尝试定位一个在字符串中不存在的子字符串，我们将收到一个 **ValueError**，说明未找到该子字符串。\n\n我们可以通过首先检查子字符串是否存在于字符串中来避免\
    \ ValueError。这可以使用 **in** 关键字来完成。我们在前面讲解 *for* 循环时见过这个关键字。在这种情况下，它是一个条件，结果将是 True\
    \ 或 False。如果子字符串在字符串中找到，结果为 True。如果子字符串在字符串中未找到，结果为 False。\n\n使用我们之前的变量，我们可以执行\
    \ `\"horses\" in animals` 来检查子字符串 \"horses\" 是否在我们的变量中找到。在本例中，结果将为 False，因为马不包含在我们的示例字符串中。如果我们执行\
    \ `\"tigers\" in animals`，我们将得到 True，因为这个子字符串包含在我们的字符串中。\n\n## 14.7. 更多字符串方法\n\
    \n我们之前说过，接下来会有很多令人兴奋的新概念。好吧，我不会再“吊你胃口”了。我们将用一系列有趣的字符串文本转换方法来结束我们关于字符串的课程。\n\n\
    到目前为止，我们已经看到了使用索引技术访问字符串部分、通过切片和拼接创建新字符串、使用 index 方法查找字符和字符串，甚至测试一个字符串是否包含另一个字符串的方法。除了所有这些字符串处理能力之外，字符串类还提供了许多其他用于处理文本的方法。\n\
    \n现在，我们将向你展示如何使用其中一些方法。请记住，目标不是让你记住所有这些内容。相反，我们想让你了解在 Python 中可以用字符串做些什么。\n\n\
    **视频 29** (2:38) *更多字符串方法*\n\n一些字符串方法允许你对字符串文本执行转换或格式化，例如 `upper()` 及其相反的 `lower()`。\n\
    \n```\n\"Mountains\".upper()\n'MOUNTAINS'\n\"Mountains\".lower()\n'mountains'\n\
    ```\n\n这些方法在处理用户输入时非常有用。假设你想检查用户是否对一个问题回答了“是”。你怎么知道用户输入时使用的是大写还是小写？你不需要知道，你只需将答案转换为你想要的大小写即可。就像这个例子：\n\
    \n```\nanswer = 'YES'\nif answer.lower() == \"yes\":\n    print(\"User said yes\"\
    )\n```\n\nUser said yes\n\n处理用户输入时另一个有用的方法是 **strip** 方法。此方法将去除字符串周围的空格：\n\n```\n\
    \"yes \".strip()\n\"yes\"\n```\n\n如果我们询问用户一个答案，我们通常不关心任何周围的空格。因此，使用 strip 方法去除任何空白字符是个好主意。这意味着\
    \ **strip** 不仅去除空格，它**还去除制表符和换行符**，这些都是我们通常不希望出现在用户提供的字符串中的字符。\n\n此方法还有两个版本，**lstrip**\
    \ 和 **rstrip**，用于仅去除字符串**左侧**或**右侧**的空白字符，而不是两侧都去除。\n\n```\n\" yes \".lstrip()\n\
    'yes '\n```\n\n```\n\" yes \".rstrip()\n' yes'\n```\n\n其他方法提供有关字符串本身的信息。方法 **count()**\
    \ 返回给定子字符串在字符串中出现的次数。\n\n```\n\"The number of times e occurs in this string is\
    \ 4\".count(\"e\")\n4\n```\n\n方法 **endswith()** 返回字符串是否以某个子字符串结尾。\n\n```\n\"Forest\"\
    .endswith(\"rest\")\nTrue\n```\n\n方法 **isnumeric()** 返回字符串是否仅由数字组成。\n\n```\n\"\
    Forest\".isnumeric()\nFalse\n```\n\n```\n\"12345\".isnumeric()\nTrue\n```\n\n\
    除此之外，如果我们有一个数字字符串，我们可以使用 **int** 函数将其转换为实际的数字。\n\n```\nint(\"12345\") + int(\"\
    54321\")\n66666\n```\n\n在早期的视频中，我们展示了可以使用加号连接字符串。\n\n**join** 方法也可用于连接。要使用 join\
    \ 方法，我们必须在将用于连接的字符串上调用它。\n\n```\n\" \".join([\"This\", \"is\", \"a\", \"phrase\"\
    , \"joined\", \"by\", \"spaces\"])\n'This is a phrase joined by spaces'\n```\n\
    \n在本例中，我们使用了一个包含空格的字符串。该方法接收一个字符串列表，并返回一个字符串，其中每个字符串都由初始字符串连接而成。让我们看另一个例子：\n\n\
    ```\n\"...\".join([\"This\", \"is\", \"a\", \"phrase\", \"joined\", \"by\", \"\
    triple\", \"dots\"])\n'This...is...a...phrase...joined...by...triple...dots'\n\
    ```\n\n最后，我们还可以将字符串拆分为字符串列表。**split** 方法返回初始字符串中所有单词的列表，它会自动按任何空白字符进行拆分。\n\n```\n\
    \"This is another example\".split()\n['This', 'is', 'another', 'example']\n```\n\
    \n你是否开始看到这些字符串方法在你的 IT 工作中可能很有用？好的，我们刚刚学习了一堆新方法。但还有更多你可以用于字符串的方法。我们在接下来的速查表中包含了我们讨论过的方法列表以及一些新方法。你还会在那里找到完整\
    \ Python 文档的链接，它提供了每个可用方法的所有信息。\n\n正如我们之前所说，不要担心试图记住所有内容。你会**通过练习**掌握这些概念，而且文档始终在你需要时可用。好了，在我们这一系列字符串教程的最后，我们将在\
    \ 14.9 节中看看如何格式化字符串。\n\n## 14.8. 高级字符串方法\n\n我们已经介绍了许多字符串类方法，所以让我们在此基础上继续，介绍一些更高级的方法。\n\
    \n字符串方法 **lower** 将返回所有字符都转换为小写的字符串。其相反的方法是 **upper**，它将返回全部大写的字符串。就像之前的方法一样，我们使用点表示法在字符串上调用它们，例如\
    \ `\"this is a\".upper()`。这将返回字符串 `\"THIS IS A\"`。这在检查用户输入时非常方便，因为用户可能输入全小写、全大写，甚至是大小写混合。\n\
    \n你可以使用 **strip** 方法去除字符串周围的空白字符。空白字符包括空格、制表符和**换行符**。你也可以使用方法 **lstrip** 和 **rstrip**\
    \ 分别仅去除字符串左侧或右侧的空白字符。\n\n方法 **count** 可用于返回子字符串在字符串中出现的次数。这对于找出字符串中有多少个字符，或计算某个单词在句子或段落中出现的次数很有用。\n\
    \n如果你想检查一个字符串是否以给定的子字符串结尾，可以使用方法 **endswith()**。如果子字符串在字符串末尾找到，它将返回 True，否则返回\
    \ False。\n\n**isnumeric** 方法可以检查字符串是否仅由数字组成。如果字符串仅包含数字，此方法将返回 True。我们可以用它来检查字符串是否包含数字，然后再将字符串传递给\
    \ **int()** 函数转换为整数，从而避免错误。很有用！\n\n我们之前看过使用加号进行字符串连接。我们也可以使用 **join** 方法来连接字符串。此方法在将用于连接字符串列表的字符串上调用。该方法接受一个要连接的字符串列表作为参数，并返回一个新字符串，该字符串由列表中的每个字符串使用初始字符串连接而成。例如，`\"\
    \ \".join([\"This\",\"is\",\"a\",\"sentence\"])` 将返回字符串 \"This is a sentence\"\
    。\n\njoin 方法的反向操作是 **split** 方法。这允许我们将字符串拆分为字符串列表。默认情况下，它按任何空白字符拆分。你也可以通过传递一个参数来按任何其他字符拆分。"
