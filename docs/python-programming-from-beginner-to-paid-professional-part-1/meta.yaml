  - "[PAGE 197]\n\nyour computer “dizzy”. To avoid this, we need to think about what\
    \ needs to happen for a loop to be successful. Look at this one:\n\n```\nif x\
    \ != 0:\n    while x % 2 == 0:\n        x = x / 2\n```\n\nIn this example, we\
    \ said that X needs to be different than zero. So we could nest this while loop\
    \ inside an if statement just like this. With this approach, the while loop is\
    \ executed only when X *is not* zero.\n\nAlternatively, we could add the condition\
    \ directly to the loop using a logical operator like in this example:\n\n```\n\
    while x != 0 and x % 2 == 0:\n    x = x / 2\n```\n\nThis makes sure we only enter\
    \ the body of the loop for values of X that are both different than zero and even.\
    \ Talking about infinite loop reminds me of one of the first times I used while\
    \ loops myself.\n\nI wrote a script that emailed me as a way of verifying that\
    \ the code worked, and while some condition was true, I forgot to exit the loop.\
    \ It turned out those e-mails got sent faster than once per second. As you can\
    \ imagine, I got about 500 e-mails before I realized what was going on. I am infinitely\
    \ grateful for that little lesson!"
  - '[PAGE 198]


    When you''re done laughing at my story, remember, when you''re writing loops,
    it''s a good idea to take a moment to **consider the different values a variable
    can** This helps you make sure your loop won''t get stuck. If you see that your
    program is running forever without finishing, have a second look at your loops
    to check there''s no infinite loop hiding somewhere in the code.


    While you need to watch out for infinite loops, they are not always a bad thing.
    Sometimes you actually want your program to execute continuously until some external
    condition is met. If you''ve used the **ping** utility on Linux or macOS system,
    or **ping-t** on a Windows system, you''ve seen an infinite loop in action.


    This tool will keep sending packets of data and printing the results to the terminal
    unless you send it the interrupt signal, usually pressing Ctrl + C. If you were
    looking at the program source code, you''ll see that it uses an infinite loop
    to do this with a block of code with instructions to keep sending the packets
    forever.


    One thing to call out is **it should always be possible to break the loop** by
    sending a certain signal. In the ping example, that signal is the user pressing
    Ctrl + C. In other cases, it could be that the user pressed the button on a graphical
    application, or that another program sent a specific signal, or even that a time
    limit was reached.'
