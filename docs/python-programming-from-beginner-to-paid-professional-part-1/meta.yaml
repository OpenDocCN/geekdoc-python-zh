- md: '## 24. Course Wrap up


    ### 24.1. Congratulations!


    Congratulations! You''ve made it through the entire course. These were not easy
    concepts to learn. I want you to think all the way back to when you were just
    starting this journey. You remember what you were feeling when you watched those
    first videos. Maybe a little nervous, terrified, excited, or probably all these
    emotions at once.


    You tuned in with me, studied the whole course, watched all my videos, and kept
    going when it got complex. You should be proud of yourself! Take a moment to reflect
    on where you are now. You''ve gone from having little or no knowledge of programming,
    to being able to write all kinds of complex functions.


    You''re using conditionals, loops, strings, lists, and even dictionaries. You
    even created your own objects. You put it all together to write your very own
    program, applying a process which you might use in your day-to-day IT role, and
    hopefully you had as much fun doing it as I did teaching you.


    It''s impressive that you''ve mastered all the stuff, and I hope it''s just the
    beginning of your Python journey. Building a successful career in IT calls for
    perseverance, curiosity, and grit - three qualities you''ve proven to have heaps
    of by making it this far.


    It also requires skills and knowledge, and this basic Python is definitely a powerful
    tool in your IT toolbox. Knowing how to write scripts will set you apart from
    others as you look to advance in your career. I bet you''re now seeing tasks all
    around you which are sparking ideas on how you could automate them with a script.
    The possibilities are endless, and it''s just the start.


    Remember what I said in one of my first videos: a journey of a thousand miles
    begins with a single step. There''s still a lot of exciting things you can learn.
    I hope soon you will order my book for the next course (Part 2) where you will
    be learning all about **how Python interacts with the computer''s operating system**.


    But for now, I want to wish you best of luck. I look forward to seeing you and
    your code out there.


    ### 24.2. Discussion Forums: Share Your Learner Journey


    Thinking back on the whole course: What’s been the most interesting thing you
    learned? What’s been the most difficult thing? Share your learner journey with
    the [learner](https://example.com) community.


    ### 24.3. Sneak Peek of the Next Course (Part 2)


    You''ve made it through this Python course, which is part one. But your journey
    with Python is just heating up. In the next part, you will learn **how Python
    interacts with the operating system**. You''ll build on all the skills you learned
    here and your programming is going to get a little more sophisticated.


    Here is what you can expect from the next course. We''re going to cover how to
    set up your own developer environment in Python, and in no time, you''ll start
    feeling comfortable using codes to interact with the operating system (OS).


    We''ll also manipulate files and processes running on the OS, and dive into RegEx
    which is a super powerful tool for processing text files. You''re even going to
    write a script that might be similar to a task you''d be assigned at your job.


    But personally, my favorite part of the whole course is definitely where we talk
    about the Linux OS, but it''s not because it''s the primary OS I use in my job.
    Linux opens up a whole world of customization and configuration, and I find it
    really interesting.


    I''ve got a lot of powerful and fun concepts coming up. So don''t miss out. I''ll
    see you over in the next course! Thank you for ordering my course. Bye for now!


