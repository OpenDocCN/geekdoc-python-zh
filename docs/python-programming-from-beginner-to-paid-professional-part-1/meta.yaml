    the string contains only numbers, this method will return True. We can use this
    to check if a string contains numbers before passing the string to the **int()**
    function to convert it to an integer, avoiding an error. Useful!


    We took a look at string concatenation using the plus sign, earlier. We can also
    use the **join** method to concatenate strings. This method is called on a string
    that will be used to join a list of strings. The method takes a list of strings
    to be joined as a parameter, and returns a new string composed of each of the
    strings from our list joined using the initial string. For example, " ".join(["This","is","a","sentence"])
    would return the string "This is a


    The inverse of the join method is the **split** method. This allows us to split
    a string into a list of strings. By default, it splits by any whitespace characters.
    You can also split by any other characters by passing a parameter.'
- md: "## 14.9. Formatting Strings\n\nUp to now we've been making strings using the\
    \ plus sign (+) to just concatenate the parts of the string we wanted to create.\
    \ We've also used the str function to convert numbers into strings so that we\
    \ can concatenate them, too. This works, but it's not ideal, especially when the\
    \ operations you want to do with the string are on the tricky side. There's a\
    \ better way to do this using the **format** method. Let's see a couple of examples.\n\
    \n**Video 30** (3:23 *Formatting Strings*)\n\n```\nname = \"Manny\"\nnumber =\
    \ len(name) * 3\nprint(\"Hello {}, your lucky number is {}\".format(name, number))\n\
    Hello Manny, your lucky number is 15\n```\n\nIn this example, we have two variables,\
    \ **name** and **number**. We generate a string that has those variables in it\
    \ by using the curly brackets {} placeholder to show where the variables should\
    \ be written. We then pass the variables as a parameter to the format method.\n\
    \nSee how it doesn't matter that name is a string and number is an integer? The\
    \ format method deals with that, so we don't have to. Pretty neat, right?\n\n\
    The curly brackets aren't always empty. By using certain expressions inside those\
    \ brackets, we can take advantage of the full power of the format expression.\
    \ Heads up, this can get complex fast. If at any point, you get confused, don't\
    \ panic, you only really need to understand the basic usage of the format method\
    \ we just saw.\n\nOne of the things we can put inside the curly brackets is the\
    \ name of the variable we want in that position to make the whole string more\
    \ readable. This is particularly relevant when the text can get rewritten or translated\
    \ and the variables might switch places.\n\nIn this example, we could rewrite\
    \ the message to make the variables appear in a different order. In that case,\
    \ we'd need to pass the parameters to *format* in a slightly different way:\n\n\
    ```\nprint(\"Your lucky number is {number}, {name}\".format(name=name, number=len(name)*3))\n\
    Your lucky number is 15, Manny.\n```\n\nBecause we're using **placeholders with\
    \ variable names**, the order in which the variables are passed to the format\
    \ function doesn't matter. But for this to work, we need to set the names we're\
    \ going to use and assign a value to them inside the parameters to the format\
    \ method.\n\nThat's just the tip of the iceberg of what we can do with the format\
    \ method. Want to dive a little deeper? Great, let's keep on going. We're going\
    \ to check out a different example. Let's say you want to output the price of\
    \ an item with and without tax.\n\nDepending on what the tax rate is, the number\
    \ might be a long number with a bunch of decimals.\n\n```\nprice = 7.5\nwith_tax\
    \ = price * 1.09\nprint(price, with_tax)\n7.5, 8.175\n```\n\nSo if something costs\
    \ $7.5 without tax and the tax rate is 9%, the price with tax would be $8.175.\
    \ Since there's no such thing as half a penny anymore, that number doesn't make\
    \ sense. So to fix this we can make the format function print only two decimals,\
    \ like this:\n\n```\nprint(\"Base price: ${:.2f}. With Tax: ${:.2f}\".format(price,\
    \ with_tax))\nBase price: $7.50. With Tax: $8.18\n```\n\nIn this case between\
    \ the curly brackets we're writing a **formatting expression**. There are a bunch\
    \ of different expressions we can write. These expressions are needed when we\
    \ want to tell Python to format our values in a way that's different from the\
    \ default.\n\nThe expression starts with a **colon to separate it from the field\
    \ name** that we saw before. After the colon, we write .2f. This means we're going\
    \ to format a **float** number and that there should be **two digits** after the\
    \ decimal dot. So no matter what the price is, our function always prints two\
    \ decimals.\n\nRemember when we did the table to convert from Fahrenheit to Celsius\
    \ temperatures? Our table looked kind of ugly because it was full of float numbers\
    \ that had way too many decimal digits. Using the format function, we can make\
    \ it look a lot nicer:\n\n```\ndef to_celsius(x):\n    return (x - 32) * 5 / 9\n\
    \nfor x in range(0, 101, 10):\n    print(\"{:>3} F | {:>6.2f} C\".format(x, to_celsius(x)))\n\
    # Align text to the right with a total of 3 spaces for x\n# and 6 spaces for to_celsius\n\
    ```\n\n```\n  0 F | -17.78 C\n 10 F | -12.22 C\n 20 F |  -6.67 C\n 30 F |  -1.11\
    \ C\n 40 F |   4.44 C\n 50 F |  10.00 C\n 60 F |  15.56 C\n 70 F |  21.11 C\n\
    \ 80 F |  26.67 C\n 90 F |  32.22 C\n100 F |  37.78 C\n```\n\nIn these two expressions\
    \ we're using the greater than operator to align text to the right so that the\
    \ output is neatly aligned. In the first expression we're saying we want the numbers\
    \ to be aligned to the right for a total of three spaces. In the second expression\
    \ we're saying we want the number to always have exactly two decimal places and\
    \ we want to align it to the right at six spaces.\n\nWe can use string formatting\
    \ like this to make the output of our program look nice and also to generate useful\
    \ logging and debugging messages. Over the course of my sysadmin career, I've\
    \ grown used to formatting strings to create more informative error messages.\
    \ They help me understand what's going on with a script that's failing.\n\nThere's\
    \ a ton more formatting options you can use when you need them. But don't worry\
    \ about learning them all at once, we'll explain any others as they come along\
    \ and we'll put everything in a cheat sheet that you can refer to whenever you\
    \ need a formatting expression.\n\nWe will take a look at that in section 14.12\
    \ and then we'll have a quiz in section 14.13 to help you get more familiar with\
    \ all this new knowledge.\n\n## 14.10. String Formatting Recap\n\nYou can use\
    \ the **format** method on strings to concatenate and format strings in all kinds\
    \ of powerful ways. To do this, create a string containing curly brackets, as\
    \ a placeholder, to be replaced. Then call the format method on the string using\
    \ .format() and pass variables as parameters. The variables passed to the method\
    \ will then be used to replace the curly bracket placeholders. This method automatically\
    \ handles any conversion between data types for us.\n\nIf the curly brackets are\
    \ empty, they'll be populated with the variables passed in the order in which\
    \ they're passed. However, you can put certain expressions inside the curly brackets\
    \ to do even more powerful string formatting operations. You can put the name\
    \ of a variable into the curly brackets, then use the names in the parameters.\
    \ This allows for more easily readable code, and for more flexibility with the\
    \ order of variables.\n\nYou can also put a formatting expression inside the curly\
    \ brackets, which lets you alter the way the string is formatted. For example,\
    \ the formatting expression {:.2f} means that you'd format this as a float number,\
    \ with two digits after the decimal dot. The colon acts as a separator from the\
    \ field name, if you had specified one. You can also specify text alignment using\
    \ the greater than operator: For example, the expression {:>3.2f} would align\
    \ the text three spaces to the right, as well as specify a float number with two\
    \ decimal places. String formatting can be very handy for outputting easy-to-read\
    \ textual output.\n\n## 14.11. Cheat Sheet 4: String Reference\n\nTo locate the\
    \ *String Reference Cheat Sheet* pdf file, open the “Cheat Sheets” folder. It’s\
    \ one of the folders inside the course resources folder you downloaded earlier.\n\
    \n## 14.12. Cheat Sheet 5: Formatting Strings\n\nTo locate the *Formatting Strings\
    \ Cheat Sheet* pdf file, open the “Cheat Sheets” folder. It’s one of the folders\
    \ inside the course resources folder you downloaded earlier.\n\n## 14.13. Practice\
    \ Quiz 10: 5 Questions\n\n1. The is_palindrome function checks if a string is\
    \ a palindrome. A palindrome is a string that can be equally read from left to\
    \ right or right to left, omitting blank spaces, and ignoring capitalization.\
    \ Examples of palindromes are words like kayak and radar, and phrases like \"\
    Never Odd or Even\". Fill in the blanks in this function to return True if the\
    \ passed string is a palindrome, False if not. – 1 point\n\n```\n# We'll create\
    \ two strings, to compare them\n\n# Traverse through each letter of the input\
    \ string\n\n# Add any non-blank letters to the\n\n# end of one string, and to\
    \ the front\n\n# of the other string.\n\n# Compare the strings\n```"
  mdcn: "## 14.9. 格式化字符串\n\n到目前为止，我们一直在使用加号（+）来拼接想要创建的字符串部分。我们也使用了 `str` 函数将数字转换为字符串，以便也能将它们拼接起来。这种方法可行，但并不理想，尤其是当你想要对字符串进行的操作比较复杂时。使用\
    \ **format** 方法是更好的做法。让我们看几个例子。\n\n**视频 30**（3:23 *格式化字符串*）\n\n```\nname = \"\
    Manny\"\nnumber = len(name) * 3\nprint(\"Hello {}, your lucky number is {}\".format(name,\
    \ number))\nHello Manny, your lucky number is 15\n```\n\n在这个例子中，我们有两个变量，**name**\
    \ 和 **number**。我们通过使用花括号 `{}` 占位符来生成一个包含这些变量的字符串，以指示变量应该被写入的位置。然后我们将变量作为参数传递给\
    \ format 方法。\n\n注意到了吗？`name` 是字符串而 `number` 是整数，这并不重要？format 方法会处理这些，所以我们不必担心。非常巧妙，对吧？\n\
    \n花括号并不总是空的。通过在这些括号内使用特定的表达式，我们可以充分利用 format 表达式的全部功能。注意，这可能会很快变得复杂。如果任何时候你感到困惑，不要惊慌，你实际上只需要理解我们刚刚看到的\
    \ format 方法的基本用法即可。\n\n我们可以放在花括号内的一样东西是变量的名称，这样可以使整个字符串更具可读性。当文本可能被重写或翻译，且变量位置可能互换时，这一点尤其重要。\n\
    \n在这个例子中，我们可以重写消息，使变量以不同的顺序出现。在这种情况下，我们需要以稍微不同的方式将参数传递给 *format*：\n\n```\nprint(\"\
    Your lucky number is {number}, {name}\".format(name=name, number=len(name)*3))\n\
    Your lucky number is 15, Manny.\n```\n\n因为我们使用了**带有变量名的占位符**，所以变量传递给 format 函数的顺序并不重要。但为了使其工作，我们需要在\
    \ format 方法的参数内设置我们将要使用的名称并为其赋值。\n\n这只是我们可以用 format 方法做的事情的冰山一角。想深入一点吗？很好，让我们继续。我们将看一个不同的例子。假设你想输出一个商品的含税和不含税价格。\n\
    \n根据税率的不同，这个数字可能是一个带有许多小数位的长数字。\n\n```\nprice = 7.5\nwith_tax = price * 1.09\n\
    print(price, with_tax)\n7.5, 8.175\n```\n\n所以，如果某样东西不含税价格是 $7.5，税率是 9%，那么含税价格将是\
    \ $8.175。由于现在不存在半分钱，这个数字没有意义。所以为了修正这一点，我们可以让 format 函数只打印两位小数，像这样：\n\n```\nprint(\"\
    Base price: ${:.2f}. With Tax: ${:.2f}\".format(price, with_tax))\nBase price:\
    \ $7.50. With Tax: $8.18\n```\n\n在这种情况下，我们在花括号之间写了一个**格式化表达式**。我们可以写很多不同的表达式。当我们想告诉\
    \ Python 以不同于默认方式格式化我们的值时，就需要这些表达式。\n\n表达式以**冒号开头，用于将其与我们之前看到的字段名分隔开**。在冒号之后，我们写\
    \ `.2f`。这意味着我们将格式化一个**浮点数**，并且在小数点后应该有**两位数字**。所以无论价格是多少，我们的函数总是打印两位小数。\n\n还记得我们做那个将华氏温度转换为摄氏温度的表格吗？我们的表格看起来有点丑，因为它充满了小数位过多的浮点数。使用\
    \ format 函数，我们可以让它看起来漂亮得多：\n\n```\ndef to_celsius(x):\n    return (x - 32) * 5\
    \ / 9\n\nfor x in range(0, 101, 10):\n    print(\"{:>3} F | {:>6.2f} C\".format(x,\
    \ to_celsius(x)))\n# 将文本右对齐，x 占 3 个空格\n# to_celsius 占 6 个空格\n```\n\n```\n  0 F\
    \ | -17.78 C\n 10 F | -12.22 C\n 20 F |  -6.67 C\n 30 F |  -1.11 C\n 40 F |  \
    \ 4.44 C\n 50 F |  10.00 C\n 60 F |  15.56 C\n 70 F |  21.11 C\n 80 F |  26.67\
    \ C\n 90 F |  32.22 C\n100 F |  37.78 C\n```\n\n在这两个表达式中，我们使用大于号运算符将文本右对齐，这样输出就整齐对齐了。在第一个表达式中，我们说我们希望数字右对齐，总共占三个空格。在第二个表达式中，我们说我们希望数字总是恰好有两位小数，并且我们希望它右对齐占六个空格。\n\
    \n我们可以像这样使用字符串格式化，使我们程序的输出看起来更美观，也可以生成有用的日志和调试消息。在我的系统管理员职业生涯中，我已经习惯了格式化字符串来创建更具信息性的错误消息。它们帮助我理解一个失败的脚本出了什么问题。\n\
    \n当你需要时，还有大量的格式化选项可以使用。但不要担心一次性学会所有这些，我们会在需要时解释其他任何选项，并将所有内容放在一个速查表中，你可以在需要格式化表达式时随时参考。\n\
    \n我们将在第 14.12 节查看那个速查表，然后在第 14.13 节进行一个小测验，以帮助你更熟悉所有这些新知识。\n\n## 14.10. 字符串格式化回顾\n\
    \n你可以使用字符串上的 **format** 方法，以各种强大的方式拼接和格式化字符串。为此，创建一个包含花括号（作为占位符）的字符串，以便被替换。然后使用\
    \ `.format()` 在字符串上调用 format 方法，并将变量作为参数传递。传递给方法的变量随后将用于替换花括号占位符。此方法自动为我们处理任何数据类型之间的转换。\n\
    \n如果花括号是空的，它们将按照传入的顺序填充传入的变量。但是，你可以在花括号内放入特定的表达式，以执行更强大的字符串格式化操作。你可以将变量的名称放入花括号中，然后在参数中使用这些名称。这使得代码更易于阅读，并且在变量顺序上更灵活。\n\
    \n你也可以在花括号内放入格式化表达式，这让你可以改变字符串的格式化方式。例如，格式化表达式 `{:.2f}` 意味着你将把它格式化为一个浮点数，小数点后有两位数字。冒号充当与字段名（如果你指定了的话）的分隔符。你还可以使用大于号运算符指定文本对齐方式：例如，表达式\
    \ `{:>3.2f}` 将使文本右对齐三个空格，并指定一个带有两位小数的浮点数。字符串格式化对于输出易于阅读的文本输出非常方便。\n\n## 14.11.\
    \ 速查表 4：字符串参考\n\n要找到 *字符串参考速查表* PDF 文件，请打开“速查表”文件夹。它是你之前下载的课程资源文件夹中的一个文件夹。\n\n\
    ## 14.12. 速查表 5：格式化字符串\n\n要找到 *格式化字符串速查表* PDF 文件，请打开“速查表”文件夹。它是你之前下载的课程资源文件夹中的一个文件夹。\n\
    \n## 14.13. 练习测验 10：5 个问题\n\n1.  `is_palindrome` 函数检查一个字符串是否是回文。回文是指从左到右或从右到左读起来都一样的字符串，忽略空格和大小写。回文的例子包括像\
    \ kayak 和 radar 这样的单词，以及像 \"Never Odd or Even\" 这样的短语。填写此函数中的空白，如果传入的字符串是回文则返回\
