- md: "## 14.4. String Indexing and Slicing Recap\n\nString indexing allows you to\
    \ access individual characters in a string. You can do this by using square brackets\
    \ and the location, or index, of the character you want to access. It's important\
    \ to remember that Python starts indexes at 0.\n\nSo to access the first character\
    \ in a string, you would use the index [0]. If you try to access an index that's\
    \ larger than the length of your string, you'll get an error. This is because\
    \ you're trying to access something that doesn't exist! You can also access indexes\
    \ from the end of the string going towards the start of the string by using negative\
    \ values. The index [-1] would access the last character of the string, and the\
    \ index [-2] would access the second-to-last character.\n\nYou can also access\
    \ a portion of a string, called a **slice** or a substring. This allows you to\
    \ access multiple characters of a string. You can do this by creating a range,\
    \ using a colon as a separator between the start and end of the range, like [2:5].\n\
    \nThis range is similar to the **range()** function we saw previously. It includes\
    \ the first number, but goes to one less than the last number. For example:\n\n\
    ```python\n>>> fruit = \"Mangosteen\"\n>>> fruit[1:4]\n'ang'\n```\n\nThe slice\
    \ *includes* the character at index 1, and *excludes* the character at index 4.\
    \ You can also easily reference a substring at the start or end of the string\
    \ by only specifying one end of the range. For example, only giving the end of\
    \ the range:\n\n```python\n>>> fruit[:5]\n'Mango'\n```\n\nThis gave us the characters\
    \ from the start of the string through index 4, *excluding* index 5. On the other\
    \ hand this example gives us the characters *including* index 5, through the end\
    \ of the string:\n\n```python\n>>> fruit[5:]\n'steen'\n```\n\nYou might have noticed\
    \ that if you put both of those results together, you get the original string\
    \ back!\n\n```python\n>>> fruit[:5] + fruit[5:]\n'Mangosteen'\n```\n\nCool!\n\n\
