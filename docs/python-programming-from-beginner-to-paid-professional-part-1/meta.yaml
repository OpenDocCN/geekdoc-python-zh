- md: "## 19.2. What Is a Method?\n\nCalling methods on objects executes functions\
    \ that operate on attributes of a specific instance of the class. This means that\
    \ calling a method on a list, for example, only modifies that instance of a list,\
    \ and not all lists globally.\n\nWe can define methods within a class by creating\
    \ functions inside the class definition. These instance methods can take a parameter\
    \ called **self** which represents the instance the method is being executed on.\
    \ This will allow you to access attributes of the instance using dot notation,\
    \ like `self.name` which will access the name attribute of that specific instance\
    \ of the class object.\n\nWhen you have variables that contain different values\
    \ for different instances, these are called **instance variables**.\n\n## 19.3.\
    \ Constructors and Other Special Methods\n\nUp to now, we've been creating classes\
    \ with empty or default values and their attributes, and then setting the attribute\
    \ values after we've created the object. This works, but it's not ideal. Working\
    \ this way means we need to write a separate line for each attribute we want to\
    \ set, and that makes it really easy to forget to set an important value.\n\n\
    Us humans are pros at forgetting to do things, even important things. So when\
    \ writing code, it's a good idea to do things early to prevent from forgetting\
    \ them later on. So let's set those values as we create the instance. This way,\
    \ we know that our instance has all the important values in it from the moment\
    \ it is created and we don't have to worry about it.\n\nTo do this, we need to\
    \ use a special method called `__init__`. Let's go back to our apple example to\
    \ see this in action:\n\n**Video 41** (2:23 *Constructors and Other Special Methods*)\n\
    \n```python\nclass Apple:\n    def __init__(self, color, flavor):\n        self.color\
    \ = color\n        self.flavor = flavor\n```\n\nThe constructor of the class is\
    \ the method that's called when you call the name of the class. It's always named\
    \ `__init__`. You might remember that all methods that start and end with **two\
    \ underscores** are **special methods**.\n\nHere, we've defined a constructor,\
    \ one very important special method. This method on top of the *self* variable\
    \ that represents the instance receives two more parameters: *color* and *flavor*.\n\
    \nThen the method sets those values as the values of the current instance. Let's\
    \ see how that works with the new instance of the apple class.\n\n```python\n\
    jonagold = Apple(\"red\", \"sweet\")\n```\n\nGreat. Now, let's check that all\
    \ the attributes are set correctly.\n\n```python\nprint(jonagold.color)\n# 输出:\
    \ red\n```\n\nPerfect! So, now by adding a constructor method that sets the attributes,\
    \ we can create the class and have its values set right when it's created. Pretty\
    \ handy, right?\n\nConstructors aren't the only special methods we can write.\
    \ When we use the *str* or *print* functions to convert an object to a string,\
    \ we are using a super-useful special method. But before we go ahead and define\
    \ one, let's see what happens when we don't define it.\n\n```python\nprint(jonagold)\n\
    # 输出: <__main__.Apple object at 0x7fc4a58d5c18>\n```\n\nWe just tried to print\
    \ our apple instance, and we got a very weird message. We have the words *Apple*\
    \ and *object* in there, but what's the rest of it? Well, when we don't specify\
    \ a way to print an object, Python uses the **default method** that prints the\
    \ position where the object is stored in the computer's memory (yours will be\
    \ different). This is definitely not what we wanted.\n\nIf you ever try and print\
    \ something and Python prints a random string of numbers and letters, you'll know\
    \ that it's likely using the default representation, which is the position of\
    \ the object in the computer's memory.\n\nSo how do we tell Python to print something\
    \ that makes sense for us? We use the special `__str__` method which returns the\
    \ string that we want to print. Let's see what this looks like:\n\n```python\n\
    class Apple:\n    def __init__(self, color, flavor):\n        self.color = color\n\
    \        self.flavor = flavor\n    def __str__(self):\n        return \"This apple\
    \ is {} and its flavor is {}\".format(self.color, self.flavor)\n```\n\nBy defining\
    \ the special `__str__` we're telling Python that we want it to display when the\
    \ print function is called with an instance of our class. Check it out!\n\n```python\n\
    jonagold = Apple(\"red\", \"sweet\")\nprint(jonagold)\n# 输出: This apple is red\
    \ and its flavor is sweet\n```\n\nSo the `__str__` method lets us print a friendly\
    \ message instead of a bunch of numbers. In general, it's a good idea to think\
    \ ahead and define the `__str__` method when creating objects that you want to\
    \ print.\n\nThere are a lot of other special methods. We're not going to look\
    \ at the rest of them here, but you can find pointers to learn more about them\
    \ in the official documentation. You'll find the link to that in the next section.\
    \ These concepts are new and not too easy. So don't worry if you're still trying\
    \ to figure out the difference between a method and a function.\n\nWe've all been\
    \ there. The best way to feel confident is to keep practicing until it's clear.\
    \ You're doing great. So keep at it!\n\n## 19.4. Special Methods Recap\n\nInstead\
    \ of creating classes with empty or default values, we can set these values when\
    \ we create the instance. This ensures that we don't miss an important value and\
    \ avoids a lot of unnecessary lines of code. To do this, we use a special method\
    \ called a constructor. Below is an example of an Apple class with a constructor\
    \ method defined.\n\nWhen you call the name of a class, the constructor of that\
    \ class is called. This constructor method is always named `__init__`. You might\
    \ remember that special methods start and end with two underscore characters.\
    \ In our example above, the constructor method takes the self variable, which\
    \ represents the instance, as well as color and flavor parameters. These parameters\
    \ are then used by the constructor method to set the values for the current instance.\
    \ So we can now create a new instance of the Apple class and set the color and\
    \ flavor values all in one go:\n\n```python\njonagold = Apple(\"red\", \"sweet\"\
    )\n```\n\nIn addition to the `__init__` constructor special method, there is also\
    \ the `__str__` special method. This method allows us to define how an instance\
    \ of an object will be printed when it's passed to the print() function. If an\
    \ object doesn't have this special method defined, it will wind up using the default\
    \ representation, which will print the position of the object in memory. Not super\
    \ useful.\n\nHere is our Apple class, with the `__str__` method added:\n\n```python\n\
    class Apple:\n    def __init__(self, color, flavor):\n        self.color = color\n\
    \        self.flavor = flavor\n    def __str__(self):\n        return \"This apple\
    \ is {} and its flavor is {}\".format(self.color, self.flavor)\n```\n\nNow, when\
    \ we pass an Apple object to the print function, we get a nice formatted string:\n\
    \n```python\nprint(jonagold)\n# 输出: This apple is red and its flavor is sweet\n\
    ```\n\nIt's good practice to think about how your class might be used and to define\
    \ a `__str__` method when creating objects that you may want to print later.\n\
    \n## 19.5. Documenting Functions, Classes and Methods\n\nThe world of classes\
    \ and methods can be a little puzzling when you're still learning your way around,\
    \ and that's why the help function can come in handy. You might remember that\
    \ we can still use the Python function *help* to find documentation about classes\
    \ and methods. We can also do this on our own classes, methods, and functions.\
    \ Let's check this out.\n\n**Video 42** (2:07 *Documenting Functions Classes and\
    \ Methods*)\n\n```python\nclass Apple:\n    def __init__(self, color, flavor):\n\
    \        self.color = color\n        self.flavor = flavor\n    def __str__(self):\n\
    \        return \"This apple is {} and its flavor is {}\".format(self.color, self.flavor)\n\
    ```\n\nWe'll start with the Apple class we used before, and now we'll ask for\
    \ some help:\n\n```python\nhelp(Apple)\n```\n\n```\nclass Apple(builtins.object)\n\
    \ |  Apple(color, flavor)\n |\n |  Methods defined here:\n |\n |  __init__(self,\
    \ color, flavor)\n |      Initialize self.  See help(type(self)) for accurate\
    \ signature.\n |\n |  __str__(self)\n |      Return str(self).\n |\n |  Data descriptors\
    \ defined here:\n |\n |  __dict__\n |      dictionary for instance variables (if\
    \ defined)\n |\n |  __weakref__\n |      list of weak references to the object\
    \ (if defined)\n```\n\nSee how when we asked for help on our class we got a list\
    \ of the methods that are defined in the class? In this example, the defined methods\
    \ are the constructor and the conversion to string. But this documentation is\
    \ super short and to be honest, it doesn't explain a whole lot. So let's go back\
    \ to the interpreter by typing q.\n\nWe want our methods, classes, and functions\
    \ to give us more information when we or someone else use the help function. We\
    \ can do that by adding a docstring.\n\n**A docstring is a brief text that explains\
    \ what something does.** Let's see how this works with a simple function.\n\n\
    ```python\ndef to_seconds(hours, minutes, seconds):\n    \"\"\"Returns the amount\
    \ of seconds in a given hours, minutes and seconds\"\"\"\n    return hours*3600+minutes*60+seconds\n\
    ```\n\nFirst off, we want to define the function. We give it the parameters hours,\
    \ minutes, and seconds. After that, we add our docstring. We do this by typing\
