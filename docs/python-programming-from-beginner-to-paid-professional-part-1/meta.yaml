- md: "## 20. Code Reuse\n\n### 20.1. Inheritance\n\nWow, we've covered a bunch of\
    \ new stuff in these last few sections. You're doing great. We've learned all\
    \ about object-oriented programming, and how to define our own classes and methods,\
    \ including special methods like constructors or string conversions.\n\nWe've\
    \ also learned how to document them all. We're now going to talk about another\
    \ aspect of object-oriented programming called inheritance. Just like people have\
    \ parents, grandparents, and so on, objects have an ancestry.\n\nThe principle\
    \ of inheritance lets a programmer build relationships between concepts and group\
    \ them together. In particular, this allows us to reduce code duplication by generalizing\
    \ our code. For example, how could we develop our apple representation to include\
    \ other types of fruit, too?\n\nWell, one thing we know about an apple is that\
    \ it's a fruit. So we could define a separate fruit class. We also know that all\
    \ fruits have a color and taste. So what if we moved our color and flavor attributes\
    \ into the fruit class?\n\nVideo 44 (3:45) Inheritance\n\n```python\nclass Fruit:\n\
    \    def __init__(self, color, flavor):\n        self.color = color\n        self.flavor\
    \ = flavor\n```\n\nHere, we have a fruit class with a constructor for the color\
    \ and flavor attributes. Now, we can rewrite our apple class and easily add another\
    \ fruit into the mix, too.\n\n```python\nclass Apple(Fruit):\n    pass\n```\n\n\
    ```python\nclass Grape(Fruit):\n    pass\n```\n\nIn Python, we use parentheses\
    \ in the class declaration to show an inheritance relationship. For our new fruit\
    \ classes, we've used that syntax to tell our computer that both the apple and\
    \ the grape classes inherit from the fruit class. Because of this, they automatically\
    \ have the same constructor, which sets the color and flavor attributes.\n\nYou\
    \ can think of the fruit class as the parent class, and the apple and grape classes\
    \ as siblings. Let's see this in action. First, we create an instance of the apple\
    \ class:\n\n```python\ngranny_smith = Apple(\"sweet\", \"tart\")\ncarnelian =\
    \ Grape(\"purple\", \"sweet\")\n```\n\nThen, to check that this actually worked,\
    \ let's print the attributes values.\n\n```python\nprint(granny_smith.flavor)\n\
    # tart\nprint(carnelian.color)\n# purple\n```\n\nWith the inheritance technique,\
    \ we can use the fruit class to store information that applies to all kinds of\
    \ fruit, and keep apple or grape specific attributes in their own classes. For\
    \ example, we could have an attribute to track how much of an apple is left after\
    \ it's partially eaten.\n\nOf course, this applies to both attributes and methods.\
    \ If a class has an attribute or a method defined in it, inheriting classes will\
    \ have the same attributes and methods defined in them. But we can also get them\
    \ to behave differently depending on what we change.\n\nTo explore this, let's\
    \ go back to our piglet example and change it so that there's a base animal class.\n\
    \n```python\nclass Animal:\n    sound = \"\"\n    def __init__(self, name):\n\
    \        self.name = name\n    def speak(self):\n        print(\"{sound} I'm {name}!\
    \ {sound}\".format(name=self.name, sound=self.sound))\n```\n\n```python\nclass\
    \ Piglet(Animal):\n    sound = \"Oink!\"\n```\n\nIn this code, we've defined a\
