- md: "## Module 2\n\nProgramming is like clothing. It is an art, a way to express\
    \ yourself artistically in this world.\n\n> “You might not think that programmers\
    \ are artists, but programming is an extremely creative profession. It’s logic-based\
    \ creativity” – John Romero\n\n## 6. Expressions and Variables\n\n### 6.1. Basic\
    \ Python Syntax introduction\n\nWelcome back, and well done for completing your\
    \ first graded assessment. You're doing a great job making it this far. Chances\
    \ are some topics we've covered may have been a little tricky at times, especially\
    \ if you're completely new to programming.\n\nDon't worry if something wasn't\
    \ obvious right away. We went through a lot of new concepts and it might take\
    \ several passes until you feel comfortable with them. And that's totally normal.\
    \ We all went through when we were learning how to code.\n\nIn the previous module\
    \ we explored some basic concepts, like programming and automation. We called\
    \ out that each programming language has a specific syntax, which we need to learn\
    \ so we can tell the computer what to do. We then got a sneak preview of some\
    \ of the things we could do with Python.\n\nUp next, we'll dive deeper into some\
    \ basic building blocks of Python syntax, things like variables, expressions,\
    \ functions, and conditional blocks. At first glance these pieces may seem pretty\
    \ simple, but when we start to combine them they become a lot more powerful.\n\
    \nUnderstanding of programming languages syntax isn't too different from learning\
    \ a spoken language. For example, the best way to learn Spanish is to visit a\
    \ Spanish speaking country, immerse yourself in the culture, listen to the people.\
    \ Then figure out how to arrange the words to form a sentence that another speaker\
    \ can understand.\n\nThe same is true for programming. When you immerse yourself\
    \ in Python programming you'll learn how to formulate statements of code that\
    \ the computer can understand. This is called syntax.\n\nOkay, so as you go through\
    \ the next few sections keep in mind that our main goal is to learn the language's\
    \ syntax. So we'll focus on how to tell our computer what to do, not on how to\
    \ get it to do complicated tasks. Like before, we'll run through some simple exercises\
    \ to help you see the concepts in action.\n\nAnd as you pick up the new skills\
    \ and get to grips with different tools we'll start to write more advanced scripts\
    \ that tackle more challenging problems. Again, if at any point you feel confused\
    \ or that something just isn't clear, remember you can watch the videos and take\
    \ the practice quizzes as many times as you need.\n\nThe key to getting good at\
    \ programming is practice, practice and practice. You have to keep working your\
    \ programming muscles in order to get strong, just like building muscles in the\
    \ gym. Train hard, train regularly, and you'll be tackling more weighty coding\
    \ problems in no time.\n\nAll right, ready to jump back in? In the next section\
    \ we're going to learn all about data types. Let's get started.\n\n### 6.2. Data\
    \ Types\n\nIn earlier videos, we called out that text written between quotes in\
    \ Python is called a string. In programming terminology, a string is known as\
    \ a data type, whether it's a mobile game or a script used to automatically create\
    \ user accounts. Most programs need to manipulate some kind of data, and that\
    \ data can come in a lot of different forms, or like we call them data types.\n\
    \nA string is only one kind of data type found in Python. There's a bunch of others,\
    \ like an **integer** which represents whole numbers without a fraction, like\
    \ 1. We also have **float** which represents real numbers or in other words, a\
    \ number with a fractional part like 2.5. Other examples are **dict** (for dictionary),\
    \ **complex** (for complex numbers), **bool** (for boolean), etc.\n\nIn Python\
    \ programming, data type is an important concept. We can use variables (see section\
    \ 6.4) to store data of different types, and different data types can do different\
    \ things. The following data types and their categories are built in by default\
    \ in Python:\n\n| 类别 | 数据类型 |\n| :--- | :--- |\n| 文本类型 | str |\n| 数值类型 | int,\
    \ float, complex |\n| 序列类型 | list, tuple, range |\n| 映射类型 | dict |\n| 集合类型 | set,\
    \ frozenset |\n| 布尔类型 | bool |\n| 二进制类型 | bytes, bytearray, memoryview |\n\nGenerally,\
    \ your computer doesn't know how to mix different data types. Watch the next video\
    \ to understand data type better:\n\n**Video 5** (02:04 *Data Types*)\n\nAdding\
    \ two integers together makes perfect sense to computers.\n\n```\nprint(2+3)\n\
    ```\n\n5\n\nAdding together two strings also makes sense. We just end up with\
    \ the longer strings that contains the two.\n\n```\nprint(\"Python programming\
    \ \" + \"is fun\")\n```\n\nPython programming is fun\n\nBut your computer doesn't\
    \ know how to add an integer and a string. If you tell it to mix these two different\
    \ data types, your computer isn't going to know what to do and will raise an error\
    \ as shown in **Video 5**.\n\nErrors are a common part of programming, and you'll\
    \ probably have to deal with them a lot. The trick is to think of errors as little\
    \ clues from your computer to help you improve your programming skills. Read the\
    \ errors carefully, understand what they're telling you, and then use that new\
    \ knowledge to help you fix the mistake.\n\nIn the example shown in Video 5, the\
    \ last line of the error message in the Python interpreter shows us that we've\
    \ encountered something called a TypeError. When we get a bit of explanatory texts,\
    \ that tells us that the plus sign can't be used between an *int* type and a *str*\
    \ type, which are short names for integer and string. I tried this code in Pycharm\
    \ and got this error which is similar.\n\n```\nprint(7 + \"8\")\n```\n\n```\n\
    File \"C:\\user\\Documents\\python_programs.py\", line 1\n\n    print(7 + \"8\"\
    )\n\nTypeError: unsupported operand type(s) for +: 'int' and 'str'\n\nProcess\
    \ finished with exit code 1\n```\n\nThinking about what we've already learned\
    \ about strings, integers, and mixing data types, can you guess what the error\
    \ is trying to tell us? The message “unsupported operand type(s)” in Pycharm tells\
    \ us that we can't add the integer **7** and the string **“8”** because they're\
    \ different data types. But what if you didn't have an instructor to helpfully\
    \ point that out?\n\nHow would you know? You'd need to use your research skills\
    \ and the resources we called out earlier in the course to do some investigating.\
    \ For example, you could look for information about the error by pasting the TypeError\
    \ message into the search bar of your favorite search engine.\n\nThis is a common\
    \ trick used by almost everyone learning to code, and even by experienced developers.\
    \ You'll usually find that other people on the Internet have reported similar\
    \ errors and solved them too.\n\nBack to our example. Maybe you're thinking, aren't\
    \ we adding two numbers 7 and 8 here? Looks a bit like it. Well, look carefully\
    \ and remember that anything wrapped in **quotation marks** is considered a string\
    \ in Python.\n\nSo, “8” is a string here, while 7 is an integer. To the computer,\
    \ adding 7 plus “8” is just as strange as adding 7 plus A is to us, and seven\
    \ plus A equals no sense at all. It might be helpful to think about data types\
    \ in terms of information they can represent.\n\nFor example, the name of a file\
    \ would be represented as a string data type, while the size of that file might\
    \ be an integer data type. If you're ever not 100 percent sure what data types\
    \ a certain value is, Python gives you a handy way to find out. You can use the\
    \ “type” function, to have the computer tell you the type. This might come in\
    \ handy when dealing with code that someone else wrote and you're not sure what\
    \ data types it's using.\n\nFor example,\n\n```\nprint(type(\"8\"))\n```\n\n```\n\
    <class 'str'>\n```\n\nThis tells us that “8” belongs to *str* class, which like\
    \ we said earlier is short for string.\n\n```\nprint(type(2))\n```\n\n```\n<class\
    \ 'int'>\n```\n\nThe number 2, belongs to the int class, which is short for integer.\
    \ We'll talk more about what we mean by “class” later in the course. For now,\
    \ you can just use it as a synonym for data type. So now you know three very common\
    \ data types in Python.\n\nThere are plenty of others you'll be using soon, but\
    \ don't worry about them at the moment. As we continue through the course, we'll\
    \ come across more data types and learn how to interact with each of them.\n\n\
    For now, just remember, mixing your data types will get your computer, well, all\
    \ mixed up. So keep your strings with your strings, your integers with your integers,\
    \ and your floats with your floats, and you shouldn't get in too much of a tangle."
  mdcn: "## 模块 2\n\n编程如同穿衣。它是一门艺术，一种在这个世界上进行艺术性自我表达的方式。\n\n> “你可能不认为程序员是艺术家，但编程是一个极具创造性的职业。它是基于逻辑的创造力”\
    \ – 约翰·罗梅罗\n\n## 6. 表达式与变量\n\n### 6.1. Python 基础语法简介\n\n欢迎回来，祝贺你完成了第一次分级评估。你能坚持到现在，做得非常棒。很可能我们涵盖的一些主题有时会显得有点棘手，特别是如果你是编程新手的话。\n\
    \n如果有些东西一开始不明显，别担心。我们介绍了很多新概念，可能需要反复学习几次才能熟练掌握。这完全正常。我们所有人学习编程时都经历过这个过程。\n\n在上一个模块中，我们探讨了一些基本概念，比如编程和自动化。我们指出每种编程语言都有特定的语法，我们需要学习它才能告诉计算机该做什么。然后我们初步了解了用\
    \ Python 可以做的一些事情。\n\n接下来，我们将深入探讨 Python 语法的一些基本构建块，比如变量、表达式、函数和条件块。乍一看，这些部分可能显得相当简单，但当我们开始将它们组合起来时，它们会变得强大得多。\n\
    \n理解编程语言的语法与学习一门口语并没有太大不同。例如，学习西班牙语的最佳方式是去一个讲西班牙语的国家，沉浸在文化中，倾听人们说话。然后弄清楚如何排列词语，形成一个其他说话者能理解的句子。\n\
    \n编程也是如此。当你沉浸在 Python 编程中时，你将学会如何组织计算机能理解的代码语句。这就是所谓的语法。\n\n好的，所以在接下来的几节中，请记住我们的主要目标是学习这门语言的语法。因此，我们将专注于如何告诉计算机该做什么，而不是如何让它完成复杂的任务。和之前一样，我们将通过一些简单的练习来帮助你看到概念的实际应用。\n\
    \n随着你掌握新技能并熟悉不同的工具，我们将开始编写更高级的脚本来解决更具挑战性的问题。同样，如果你在任何时候感到困惑或不清楚，记住你可以根据需要多次观看视频和进行练习测验。\n\
    \n精通编程的关键是练习、练习再练习。你必须不断锻炼你的编程肌肉才能变得强壮，就像在健身房锻炼肌肉一样。刻苦训练，定期训练，你很快就能应对更复杂的编码问题。\n\
    \n好了，准备好重新开始了吗？在下一节中，我们将全面学习数据类型。让我们开始吧。\n\n### 6.2. 数据类型\n\n在之前的视频中，我们指出 Python\
    \ 中写在引号之间的文本被称为字符串。在编程术语中，字符串被称为一种数据类型，无论是移动游戏还是用于自动创建用户帐户的脚本。大多数程序都需要处理某种数据，而这些数据可以以多种形式存在，或者像我们所说的，数据类型。\n\
    \n字符串只是 Python 中的一种数据类型。还有很多其他的，比如**整数**，它表示没有小数部分的整数，比如 1。我们还有**浮点数**，它表示实数，或者换句话说，带有小数部分的数字，比如\
    \ 2.5。其他例子包括 **dict**（字典）、**complex**（复数）、**bool**（布尔值）等。\n\n在 Python 编程中，数据类型是一个重要的概念。我们可以使用变量（见第\
    \ 6.4 节）来存储不同类型的数据，而不同的数据类型可以做不同的事情。以下数据类型及其类别在 Python 中是默认内置的：\n\n| 类别 | 数据类型\
    \ |\n| :--- | :--- |\n| 文本类型 | str |\n| 数值类型 | int, float, complex |\n| 序列类型 |\
    \ list, tuple, range |\n| 映射类型 | dict |\n| 集合类型 | set, frozenset |\n| 布尔类型 | bool\
    \ |\n| 二进制类型 | bytes, bytearray, memoryview |\n\n通常，你的计算机不知道如何混合不同的数据类型。观看下一个视频以更好地理解数据类型：\n\
    \n**视频 5** (02:04 *数据类型*)\n\n将两个整数相加对计算机来说完全合理。\n\n```\nprint(2+3)\n```\n\n5\n\
    \n将两个字符串相加也是合理的。我们最终得到的是包含这两个字符串的更长的字符串。\n\n```\nprint(\"Python programming \"\
    \ + \"is fun\")\n```\n\nPython programming is fun\n\n但你的计算机不知道如何将一个整数和一个字符串相加。如果你告诉它混合这两种不同的数据类型，你的计算机将不知道该做什么，并会如**视频\
    \ 5** 所示引发一个错误。\n\n错误是编程中常见的一部分，你可能需要经常处理它们。诀窍是将错误视为计算机提供给你的小线索，以帮助你提高编程技能。仔细阅读错误信息，理解它们告诉你什么，然后利用这些新知识来帮助你修复错误。\n\
    \n在视频 5 所示的示例中，Python 解释器中错误消息的最后一行显示我们遇到了一个叫做 TypeError 的东西。当我们看到一些解释性文本时，它告诉我们加号不能用于\
    \ *int* 类型和 *str* 类型之间，它们是整数和字符串的简称。我在 Pycharm 中尝试了这段代码，得到了类似的错误。\n\n```\nprint(7\
    \ + \"8\")\n```\n\n```\nFile \"C:\\user\\Documents\\python_programs.py\", line\
    \ 1\n\n    print(7 + \"8\")\n\nTypeError: unsupported operand type(s) for +: 'int'\
    \ and 'str'\n\nProcess finished with exit code 1\n```\n\n思考一下我们已经学过的关于字符串、整数和混合数据类型的知识，你能猜出这个错误想告诉我们什么吗？Pycharm\
    \ 中的消息“unsupported operand type(s)”告诉我们，我们不能将整数 **7** 和字符串 **“8”** 相加，因为它们是不同的数据类型。但如果你没有老师来指出这一点呢？\n\
    \n你怎么知道？你需要运用你的研究技能和我们之前在课程中提到的资源进行一些调查。例如，你可以通过将 TypeError 消息粘贴到你喜欢的搜索引擎的搜索栏中来查找有关该错误的信息。\n\
    \n这是几乎所有学习编码的人，甚至是有经验的开发者常用的一个技巧。你通常会发现互联网上的其他人也报告过类似的错误并解决了它们。\n\n回到我们的例子。也许你在想，我们不是在将两个数字\
