    type of loop. In this video, we''re going to meet the *for* loop.


    A for loop **iterates over a sequence of**


    A very simple example of a for loop is to iterate over a sequence of numbers,
    like this:


    **Video 21** (3:03 *What is a for loop?*)


    ```

    for x in range(5):

    ```


    Notice how the structure is kind of similar to the structures we''ve already seen.
    The first line indicates the distinguishing keyword. In this case, that''s And
    it ends with a colon. The body of the loop is indented to the right, like we saw
    in the **while** loop, the **if** block, and the **function** definitions.


    The difference in this case is that we have the keyword Also, between the *for*
    keyword and *in* keyword, we have the name of a'
  - "[PAGE 211]\n\nvariable. This variable will take each of the values in the sequence\
    \ that loop iterates through. So in this example, it'll iterate through a sequence\
    \ of numbers generated using the range function.\n\nThere are two important things\
    \ I want to call out about this range function. First, in Python and a lot of\
    \ other programming languages, a range of numbers will start with the value 0\
    \ by default. Second, the list of numbers generated will be one less than the\
    \ given value.\n\nIn the simple example here, x will take the values 0, 1, 2,\
    \ 3, and 4. Let's check this out (run this program yourself):\n\n```\nfor x in\
    \ range(5):\n    print(x)\n```\n\n0\n1\n2\n3\n4\n\nSo there, we have a very basic\
    \ for loop. It iterates over a sequence of numbers generated by the range function.\
    \ When using a for loop, we point the variable defined between *for* and *in*\
