    \ The len function tells us the number of characters contained in the string,\
    \ for example, since name = Sasha,\n\n```\nlen(name)\n```\n\n```\n5\n```\n\nWe\
    \ can use strings to represent a lot of different things. They can hold a username,\
    \ the name of a machine, an email address, the name of a file, and any other text.\
    \ A lot of the data that we'll interact with will be stored in strings, so it's\
    \ important to know how to use them.\n\nThere are tons of things we could do with\
    \ strings in our scripts. For example, we can check if files are named a certain\
    \ way by looking at the filename and seeing if they match our criteria, or we\
    \ can create a list of emails by checking out the users of our system and concatenating\
    \ our domain.\n\nI recently wrote a script that worked with a bunch of files and\
    \ took different actions according to the name of each file. So the file ended\
    \ in a certain extension say, .TXT , then my script would print it. If the file\
    \ had a certain string and the name, say, test, then my script would ignore it\
    \ and move on to the next thing and so on. The contents of a text file are also\
    \ strings.\n\nA few months ago, I had to change the default values for a bunch\
    \ of configuration options from true to false. So I wrote a function that would\
    \ find the string “true” in a file and replace it with “false”.\n\nYou can probably\
    \ think of more examples where your code needs to handle strings, but to use strings\
    \ effectively, we need to know what options are available to us in Python.\n\n\
    In the next few sections, we'll cover some of the operations we can perform over\
    \ strings, including how to access parts of them and modify them.\n\n## 14.3.\
    \ The Parts of a String\n\nWhen we first came across the for loop, we called out\
    \ that we can iterate over a string character by character. But what if we want\
    \ to access just a specific character or characters? We might want to do this,\
    \ for example, if we have a text that's too long to display and we want to show\
