    \ for that letter in the dictionary.\n\nTo sum up, we've created a dictionary\
    \ where the keys are each of the letters present in the string and the values\
    \ are how many times each letter is present. Let's try out a few example strings.\n\
    \n```python\ncount_letters(\"aaaaa\")\n{'a': 5}\n```"
