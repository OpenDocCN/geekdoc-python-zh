    \ really valuable returns!\n\n## 7.4. Returning Values Using Functions\n\nSometimes\
    \ we don't want a function to simply run and finish. We may want a function to\
    \ manipulate data we passed it and then return the result to us. This is where\
    \ the concept of return values comes in handy.\n\nWe use the `return` keyword\
    \ in a function, which tells the function to pass data back. When we call the\
    \ function, we can store the returned value in a variable. Return values allow\
    \ our functions to be more flexible and powerful, so they can be reused and called\
    \ multiple times.\n\nFunctions can even return multiple values. Just don't forget\
    \ to store all returned values in variables! You could also have a function return\
    \ nothing, in which case the function simply exits.\n\n## 7.5. The Principles\
    \ of Code Reuse\n\nAs we've called out before, functions are powerful because\
    \ you can create your own. You can use them to organize the code in your scripts\
    \ into logical blocks, which makes the code you write easier to use and reuse.\
    \ Check out this example:\n\n**Video 10** (01:20) *The Principles of Code Reuse*\n\
    \n```python\nname = \"Kay\"\nnumber = len(name) * 9\nprint(\"Hello \" + name +\
    \ \". Your lucky number is \" + str(number))\n```\n\n```python\nname = \"Cameron\"\
    \nnumber = len(name) * 9\nprint(\"Hello \" + name + \". Your lucky number is \"\
    \ + str(number))\n```\n\nAs you can see, this code is written in two parts (3\
    \ lines for each). Here's our results:\n\n```\nHello Kay. Your lucky number is\
    \ 27\nHello Cameron. Your lucky number is 63\n```\n\nThis script uses the **len**\
    \ function, which returns the length of a string. In this example the script then\
    \ uses that length to calculate a number, which we're calling the lucky number\
    \ here. Finally, it prints a message with the name and the number.\n\nEach time\
    \ you want to perform the calculation, we change the values of the variables and\
    \ write the formula. Then, print a greeting followed by the lucky number.\n\n\
    See how the following line is duplicated in the first and second part of the code:\n\
    \n```python\nnumber = len(name) * 9\n```\n\nWhen you find **code duplication**\
    \ in your scripts, it's a good idea to check if you can clean things up a bit\
    \ by using a function. How about we rewrite this code creating a function to group\
    \ all the duplicated code into just one line, like this (try to write and run\
    \ this code in your Python terminal 3.9):\n\n```python\ndef lucky_number(name):\n\
    \    number = len(name) * 9\n    print(\"Hello \" + name + \". Your lucky number\
    \ is \" + str(number))\n\nlucky_number(\"Kay\")\nlucky_number(\"Cameron\")\n```\n\
    \nThe updated script gives us the exact same result as the original one, but it\
    \ looks a lot cleaner. See Fig. 7.5.1.\n\n![Fig. 7.5.1: Lucky_Number script inside\
