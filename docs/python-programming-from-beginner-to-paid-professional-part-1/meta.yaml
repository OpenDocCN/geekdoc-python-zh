    \ makes the **result of the whole expression false**.\n\nIf we use the **or**\
    \ operator instead, the expression will be true if **either** of the expressions\
    \ are true, and false only when **both** expressions are false. Let's try it out.\n\
    \n```\nprint(25 > 50 or 1 != 2)\n```\n\nTrue\n\n25 is definitely not bigger than\
    \ 50, but 1 is different than 2. So in the end the whole expression is true.\n\
    \nLast up, the **not** operator **inverts** the value of the expression that's\
