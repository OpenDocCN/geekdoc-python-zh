    \ to remember. But don't worry, you'll learn most of them very quickly just by\
    \ practicing.\n\nIn the section 8.9, we have a cheat sheet that lists all the\
    \ operators available and what each one does. It's a handy resource you're sure\
    \ to find useful when writing your own scripts.\n\n## 8.2. Comparison Operators\
    \ Recap\n\nIn Python, we can use comparison operators to compare values. When\
    \ a comparison is made, Python returns a boolean result, or simply a True or False.\n\
    \nTo check if two values are the same, we can use the equality operator: `==`\n\
    \nTo check if two values are not the same, we can use the not equals operator:\
    \ `!=`\n\nWe can also check if values are greater than or lesser than each other\
    \ using `>` and `<`. If you try to compare data types that aren’t compatible,\
    \ like checking if a string is greater than an integer, Python will throw a `TypeError`.\n\
    \nWe can make very complex comparisons by joining statements together using logical\
    \ operators with our comparison operators. These logical operators are `and`,\
    \ `or`, and `not`. When using the **and** operator, both sides of the statement\
    \ being evaluated must be true for the whole statement to be true.\n\nWhen using\
    \ the **or** operator, if either side of the comparison is true, then the whole\
    \ statement is true. Lastly, the **not** operator simply inverts the value of\
    \ the statement immediately following it. So if a statement evaluates to True,\
    \ and we put the **not** operator in front of it, it would become False.\n\n##\
    \ 8.3. Branching with IF statements\n\nNow that we're armed with knowledge of\
    \ Python's expressions, comparators, and variables, we can dive right into how\
    \ to use them in our scripts to perform different actions based on their values.\
    \ The ability of a program to alter its execution sequence is called **branching**,\
    \ and it's a key component in making your scripts useful.\n\nYou probably use\
    \ the idea of branching a bunch in your everyday life. For example, if it's before\
    \ noon, you might greet someone by saying good morning instead of good afternoon\
    \ or good evening. If it's raining outside, you might choose to take an umbrella.\
    \ If it's cold, you probably wear a jacket.\n\nIn your scripts, you can instruct\
    \ your computer to make decisions based on inputs too. Let's take a look at an\
    \ IT-focused example. In many companies, new employees can choose the username\
    \ they'll use to access the company's systems, and usually, the chosen username\
    \ needs to fit with a given set of guidelines. Companies can set different criteria\
    \ for what a valid username looks like.\n\n**Video 13** (1:14) *Branching with\
    \ if statements*\n\nFor now, let's assume that at your company, a valid username\
    \ has to have at least three characters. You've been tasked with writing a program\
    \ that will tell the user if their choice is valid or not. To do that, you could\
    \ write a function like this:\n\n```\ndef hint_username(username):\n    if len(username)\
    \ < 3:\n        print(\"Invalid username. Must be at least 3 characters long\"\
    )\n```\n\nThis function checks whether the length of the username is smaller than\
    \ 3. If it is, the function prints a message saying that the username is invalid.\
    \ Look closely at how the if statement is written. We write the keyword **if**\
    \ followed by the **condition** that we want to check for, and then followed by\
    \ a colon. After that, comes the body of the if block, which is **indented** further\
    \ to the right.\n\nYou may notice that there are some **similarities** between\
    \ how an if block and the function are defined. The keyword, either **def** or\
    \ **if**, indicates the start of a special block. At the end of the first line,\
    \ we use a colon, and then the body of the function or the if block is indented\
    \ to the right.\n\nBut there's also an important **difference** between how an\
    \ if block and a function are defined: The body of the if block will only execute\
    \ when the condition evaluates to true; otherwise, it is skipped.\n\nOf course,\
    \ you can do a lot more things inside the body of the if block than just printing\
    \ stuff. As we expand our programming abilities, we'll learn how to do things\
    \ like shorten texts that's too long, delete a file if it exists, start a service\
    \ if it's not running, and a bunch more. If your code is inside a function, you\
    \ could also choose to return a value depending on whether a certain condition\
    \ is met. Can you imagine how that would look?\n\nBy now, you know how to define\
    \ functions, and inside those functions, you can now make your program do something\
    \ only when certain conditions are met. Ready to branch out and make our branches\
    \ even more interesting with **else** statements?\n\nThen hop on over to the next\
    \ section, or else, you'll miss out!\n\n## 8.4. If Statements Recap\n\nWe can\
    \ use the concept of **branching** to have our code alter its execution sequence\
    \ depending on the values of variables. We can use an *if* statement to evaluate\
    \ a comparison. We start with the *if* keyword, followed by our comparison. We\
    \ end the line with a colon. The body of the *if* statement is then indented to\
    \ the right. If the comparison is true, the code inside the *if* body is executed.\
    \ If the comparison evaluates to false, then the code block is skipped and will\
    \ not be run.\n\n## 8.5. Else Statements\n\nThe if statement is already a pretty\
    \ useful construct, but we can extend it to make it even more powerful. Think\
    \ about the username example from section 8.3.\n\n**Video 14** (1:36) *Branching\
    \ with if statements*\n\nWhat if we also wanted to print a message when the username\
    \ was valid? We can include an **else** statement to achieve this:\n\n```\ndef\
    \ hint_username(username):\n    if len(username) < 3:\n        print(\"Invalid\
    \ username. Must be at least 3 characters long\")\n    else:\n        print(\"\
    Valid username\")\n```\n\nThe program can now go in one of two directions depending\
    \ on the length of the username. If it's not long enough, we get a message indicating\
    \ that the username is invalid. But if the program verifies that the username\
