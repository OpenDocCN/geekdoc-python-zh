  - '[PAGE 212]


    On the second iteration, it points at 2, and so on. Whatever code we put in the
    body of the loop will be executed on each of the values, one value at a time.
    As we said earlier, the loops body can do a lot of things with the values it iterates.


    For example, you could have a function to calculate the square of a number, and
    then use a for loop to sum the squares of the numbers in a range. Iterating over
    numbers looks very similar to the while loop examples we showed before. So you
