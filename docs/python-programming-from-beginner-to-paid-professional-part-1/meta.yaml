- md: "## 20.5. Python Modules\n\nSo far, we've been using the features that are baked\
    \ into the Python language. The basic statements like if, for, while, or the definition\
    \ of functions or classes, are part of the language and are ready for us to use\
    \ whenever we need them. The same goes for integers, floats, strings, lists, and\
    \ dictionaries. They're all part of the basic Python language because they're\
    \ used so often. Of course, this isn't enough to get interesting things done.\n\
    \nWe'll need a lot of additional tools like being able to send packets over the\
    \ network, read files from our machine, process images, or who knows what you\
    \ might want to do to make your work more effective. To organize the code we need\
    \ to perform tasks like these.\n\nPython provides an abstraction called a module.\
    \ **Modules can be used to organize functions, classes, and other data together\
    \ in a structured way.**\n\nVideo 46 (3:24) Python Modules\n\nInternally, modules\
    \ are set up through separate files containing the necessary classes and functions.\
    \ Python already comes with a bunch of **ready-to-use** modules. All these modules\
    \ are contained in a group called the **Python standard library**. Let's see how\
    \ we can use some of them.\n\nFirst, we'll use the **import** keyword to import\
    \ the **random** module. This module is useful for generating random numbers or\
    \ making random choices.\n\n```python\nimport random\n```\n\nNow that we've imported\
    \ the module, let's use a function provided by this module called `randint`.\n\
    \n```python\nrandom.randint(1, 10)\n```\n\n```\n1\nrandom.randint(1, 10)\n4\n\
    random.randint(1, 10)\n6\n```\n\nThis function receives two parameters and generates\
    \ a random number between the two parameters that we pass. In this case, we're\
    \ generating a random number between 1 and 10. As you can see, this function returns\
    \ *different* numbers each time it's called. Pretty fun, right?\n\nThe syntax\
    \ used for calling a function provided by a module is similar to calling a method\
    \ provided by a class. It **uses a dot to separate the name of the module and\
    \ the function provided by that module.**\n\nLet's try using a different module,\
    \ the **datetime** module. We use this for handling dates and times. Now, let's\
    \ get the current date.\n\n```python\nimport datetime\nnow = datetime.datetime.now()\n\
    type(now)\n```\n\n```\n'datetime.datetime'>\n```\n\nIf you're wondering why we\
    \ have a doubled datetime, it's because the datetime module provides a datetime\
    \ class, and the datetime class gives us a method called `now`. This `now` method\
    \ generates an instance of the datetime class for the current time.\n\nWe can\
    \ operate on this instance of datetime in a bunch of ways. Let's check out a couple\
    \ of examples.\n\n```python\nprint(now)\n```\n\n```\n2021-06-29 14:24:54.667220\n\
    ```\n\nWhen we call print with an instance of the datetime class, we see the date\
    \ printed in a specific format. Behind the scenes, the print function is calling\
    \ the `__str__` method of the datetime class which formats it in the way that\
    \ we see here.\n\nWe can also access the instance through its attributes and methods.\
    \ For example, we can look at the individual parts of the date like the year,\
    \ like this:\n\n```python\nnow.year\n```\n\n```\n2021\n```\n\nThe datetime module\
    \ provides more classes than the datetime class. For example, we can use the **timedelta**\
    \ class to calculate a date in the future or in the past. Let's try this out.\n\
    \n```python\nprint(now + datetime.timedelta(days=28))\n```\n\n```\n2021-07-27\
    \ 14:34:52.989521\n```\n\nIn this case, we're creating an instance of the timedelta\
    \ class with a value of 28 days, then we're adding it to the instance of the datetime\
