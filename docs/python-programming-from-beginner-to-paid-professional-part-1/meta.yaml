    \ or you can use the items method, which returns a tuple for each element in the\
    \ dictionary. The tuple's first element is the key. Its second element is the\
    \ value.\n\nLet's try that with our example dictionary.\n\n```python\nfor ext,\
    \ amount in file_counts.items():\n    print(\"There are {} files with the .{}\
