  - '[PAGE 63]


    # 3.2. A Note on Syntax and Code Blocks


    When writing code, using correct syntax is super important. Even a small typo,
    like a missing parentheses or an extra comma, can cause a syntax error and the
    code won''t execute at all. Yikes. If your code results in an error or an exception,
    pay close attention to syntax and watch out for minor mistakes.


    If your syntax is correct, but the script has unexpected behavior or output, this
    may be due to a semantic problem. Remember that syntax is the rules of how code
    is constructed, while semantics are the overall effect the code has. It is possible
    to have syntactically correct code that runs successfully, but doesn''t do what
    we want it to do.


    When working with the code blocks in exercises for this course, be mindful of
    syntax errors, along with the overall result of your code. Just because you fixed
    a syntax error doesn''t mean that the code will have the desired effect when it
    runs! Once you''ve fixed an error in your code, don''t forget to retry it to check
    your work again.'
  - '[PAGE 64]


    # 3.3. Why is Python Relevant to IT?


    Remember how we mentioned that Python is simple and easy to use? Python makes
    it easy to express the fundamental concepts of programming like data structures
    and algorithms with easy to read syntax. This makes Python a great language to
    use to learn programming. And there are other reasons to pick Python, too.


    Python is super popular in the IT industry, making it one of the most common programming
    languages used today. Python isn''t new. Its **first version** was released by
    **Guido van Rossum** back in Since then, the community that develops it has grown
    and the language has advanced a lot. Whenever there''s a significant change to
    the semantics or syntax of the language, a new major version is released.


    In 2000, Python 2 was released. In 2008, we got Python 3. In this course, we''ll
    use the latest Python 3.9.6, which came out in June 2021. For many years, Python
    was considered a beginner''s language and was mostly used for teaching concepts
    or writing very small simple scripts, like in this course. But in recent years,
    the adoption of Python has grown dramatically.


    One reason for this is that the language has become more powerful. It''s also
    because there''s more tools available in Python for a growing range of applications.
    You can use Python to calculate statistics, run your e-commerce site, process
    images, interact with web services, and do a whole host of other tasks.'
  - '[PAGE 65]


    Python is perfect for automation. It lets you automate everyday tasks by writing
    simple scripts that are easy to understand and easy to maintain. That''s why Python
    is the language of choice for lots of people working in IT support, system administration,
    and web development. Not only that, but it''s also used in fast-growing areas
    of IT, like **machine learning** or **data**


    Last but not least, Python is available for download on a wide variety of operating
    systems, like Windows, Linux, and Mac OS. And what''s more, Python is so popular
    in the workplace that if you are currently working in IT, you''ve most likely
    encountered it already. And if you''re planning a career in IT, chances are you''ll
    interact with Python quite a bit. So there''s a whole lot of reasons for why Python
    is relevant to today''s IT industry.


    A large part of programming is learning through trial and error and asking questions.
    So if at any point you get stuck, don''t get discouraged. Making mistakes helps
    you improve. The more you see failure or broken code as an opportunity to learn,
    the quicker you''ll master programming.


    I remember the first Python script I ever wrote. It took a lot of refactoring,
    debugging, and testing to get it to work. I relied on a lot of my teammates for
    help and mentorship and wound up spending more time on Stack Overflow than actually
    writing the code. Thankfully, you don''t have to reinvent the wheel.


    There''s almost always someone on the Internet who''s trying to do what you''re
    doing and can help point you in the right direction when you''re stuck. Sometimes
    it takes a village. It''s really'
  - '[PAGE 66]


    important to keep in mind that even experienced programmers may need to ask a
    colleague a question from time to time or look something up on the Internet.


    Whether you''re a programming novice or have some experience in software development,
    remember, the best programmers overcome challenges by seeking help or using other
    resources. Once you''ve completed this program, you''ll be well on your way to
    confidently programming in basic Python.


    There''s lots of information online that will help you continue to develop your
    programming skills. For example, there are lots of online courses for specific
    programming languages. You''ll find answers to your Python coding questions in
    the [official Python](https://www.python.org)


    You can use sites like Stack Overflow to discuss and share with other developers.
    And you can ask questions in the discussion forums mentioned in the previous chapter.
    You can even subscribe to some of the Python mailing lists to keep in the know
    on the latest updates to the language.


    You''re opening the door to the whole world of programming, and it''s super exciting
    to be joining the development community. The most important thing to remember
    is that you''re never alone. Any questions you may have, any time in your career,
    there are resources out there to help you find the answers you need.


    Wow, that was a lot of information. Feel free to take a quick break, grab something
    to drink, and then head on over to section'
- md: "## 3.4 to learn more about Python and the resources out there to help you learn.\n\
    \n## 3.4. How to Become a Pythoneer or Pythonista\n\nYou should practice using\
    \ Python on your own. Practicing on your own as much as you can is the best way\
    \ to become a Pythoneer or Pythonista. Open the “Additional Resources” folder\
    \ you downloaded earlier. You will find useful files, such as *How to Learn More\
    \ 40+ Project Ideas for Beginners, Intermediate and Advanced* and so much more!\n\
    \nIn this file, you will find links to additional resources that can help you\
    \ grow your Python language.\n\n## 3.5. Other Languages\n\nAlthough we picked\
    \ Python for this course, it's important to note that it's just one of the many\
    \ coding languages out there. Think of a given programming language as just one\
    \ of the many powerful tools in your IT toolbox. Each language has its unique\
    \ set of pros and cons. Some run faster than others. Some are better suited for\
    \ enterprise applications. Others are particularly good at crunching numbers.\n\
    \nThere are platform-specific scripting languages like *PowerShell* which is used\
    \ on Windows, and *Bash* which is used on Linux. Both are widely used by system\
    \ administrators on those platforms. There are also general-purpose scripting\
    \ languages similar to Python, like *Perl* or *Ruby* which are also widely used\
    \ for scripting and automation.\n\n*JavaScript*, which was originally developed\
    \ as a client-side scripting language for the web is increasingly used as a server-side\
    \ language for a broader set of tasks. And the list doesn't stop there.\n\nThere's\
    \ a vast array of traditional languages to explore like C, C++, Java, or Go. As\
    \ you progress in your career in IT, you'll probably encounter a number of different\
    \ languages and learn when to use each of them. But let's not get ahead of ourselves.\
    \ First, we have Python to get our heads around.\n\nA nice feature of learning\
    \ the basics of programming in one language is that you can generally apply the\
    \ same concepts you learn to other languages. This means that once you're familiar\
    \ with Python, you'll find it easier to pick up new coding languages as you'll\
    \ spot and understand similarities and differences between them.\n\nAfter all,\
    \ every language needs to do some common things like create variables, control\
    \ the flow of a program, read input, and display output, even if they do these\
    \ tasks using different approaches. As we called out earlier, learning a programming\
    \ language is somewhat similar to learning a foreign language. You'll need to\
    \ grasp the syntax and semantics for that language.\n\nLuckily for us, once you\
    \ know the fundamentals of programming, learning another language is much easier\
    \ than learning a second foreign language. There are a lot more similarities between\
    \ programming languages than differences.\n\nTo explore some of the similarities\
    \ and differences between various scripting languages, let's take a look at a\
    \ simple program that prints the words **World!** ten times in three different\
    \ languages, Python, Bash and PowerShell. See Fig. 3.5.1.\n\n![](img/c88c635de07d75379d0ec33b0acd78c5_71_0.png)\n\
    \nFig. 3.5.1: A program that prints the “hello, world” ten times in three different\
    \ languages: Python, Bash and PowerShell\n\nAs you can see, each language uses\
    \ a different approach to printing hello world. But look closer and you'll see\
    \ similarities too. Each language must somehow put text onto the screen. The command\
    \ for Python is **print** (p must be in lower case). For Bash it's **echo** and\
    \ for PowerShell it's **Write-Host**.\n\nAlso notice that each language has to\
    \ count to ten in some way. While Python does this by specifying **range(10)**,\
    \ Bash uses a sequence notation to count from 1 to 10. PowerShell has the most\
    \ complex syntax in this example, but it also boils down to starting at 1 and\
    \ counting up to 10.\n\nSo as we've just seen there's a whole lot of programming\
    \ languages out there, but don't let that scare you. In this course, you will\
    \ only need to focus on learning Python. Once you can speak Python you can go\
    \ on to learn any other language you want. Up next, we've got another quiz to\
    \ help you practice what you've just learned.\n\n## 3.6. Practice Quiz 2: Introduction\
    \ to Python - 5 Questions\n\n1. Fill in the correct Python command to put “My\
    \ first Python program” onto the screen. - 1 point\n\n```\nprint(_)\n```\n\n2.\
    \ Python is an example of what type of programming language? - 1 point\n\n- Client-side\
    \ scripting language\n- Machine language\n- Platform-specific scripting language\n\
    - General purpose scripting language\n\n3. Convert this Bash command into Python:\
    \ - 1 point\n\n```\necho Have a nice day.\n```\n\n4. Fill in the correct Python\
    \ commands to put “This is fun!” without the quotes onto the screen 5 times. -\
    \ 1 point\n\n```\nfor i in range(_):\n    print(\"_\")\n```\n\n5. Write the Python\
    \ code snippet that corresponds to the following Javascript snippet: - 1 point\n\
    \n```\nfor (let i = 0; i < 10; i++) {\n  console.log(i);\n}\n```\n\n## 3.6.1.\
    \ Answers to Practice Quiz 2\n\n1. print(\"My first Python program\")\n\n2. General\
    \ purpose scripting language\n\n3. print(\"Have a nice day.\")\n\n4.\n\n```\n\
    for i in range(5):\n    print(\"This is fun!\")\n```\n\n5.\n\n```\nfor i in range(10):\n\
    \    print(i)\n```\n\n## 4. Hello, World!\n\n## 4.1. How to Write Hello World\
    \ in Python\n\nNow that you've got an idea of what Python code looks like, let's\
    \ check out one of the most basic examples and dive deeper into what's going on.\
    \ Get ready. We're going to use the Python interpreter to make our computer say\
    \ hello to the world.\n\n**Video 2** (1:04) *Hello World program in Python*\n\n\
    Like the statement hello world for example, the **print** function is part of\
    \ the basic Python language. Whenever we use keywords or functions that are part\
    \ of the language, we're using the programming language's syntax to tell the computer\
    \ what to do. So, what are *functions* and *keywords*?\n\n**Functions** are pieces\
    \ of code that perform a unit of work. We'll talk a lot more about functions later\
    \ on, and you'll even learn how to write your own. **Keywords** are reserved words\
    \ that are used to construct instructions. These words are the core part of the\
    \ language and can only be used in specific ways.\n\nSome examples include **print**,\
    \ **if**, and **for**. We'll explain all of those and a bunch more later in the\
    \ course. As we called out, the keywords and functions used in Python are what\
    \ makes up the syntax of the language. Once we understand how they work, we can\
    \ use them to construct more complex expressions that get the computer to do what\
    \ we want it to do.\n\nLast off, notice how “Hello, world” is written between\
    \ double quotation marks. Wrapping text in quotation marks indicates that the\
    \ text is considered a string, which means it's text that will be manipulated\
    \ by our script. In programming, any text that isn't inside quotation marks is\
    \ considered part of the code.\n\nNow, for a bit of trivia, do you know why we\
    \ printed the “Hello, world” in our example? Well, printing hello world has been\
    \ the traditional way to start learning a programming language since way back\
    \ in the '70s when it was used as the first example in a famous programming book\
    \ called the C programming language.\n\nIn Python, the hello world example is\
    \ just one line, in C, it's three lines, in other languages, it can be even more.\
    \ While learning to write hello world won't teach you the whole language, it gives\
    \ you a first impression of how functions are used, and how a program written\
    \ in that language looks.\n\n## 4.1.1. Program Comments (#)\n\n*Comments* are\
    \ an extremely useful feature in most programming languages. Everything you’ve\
    \ written in your programs so far is Python code. As your programs become longer\
    \ and more complicated, you should add notes within your programs that describe\
    \ your overall approach to the problem you’re solving. A comment allows you to\
    \ write notes in English within your programs.\n\n## 4.1.2. How to Write Comments\n\
    \nIn Python, the hash mark indicates a comment. Anything following a hash mark\
    \ in your code is ignored by the Python interpreter. For example:\n\n```\n# This\
    \ is the first line of my program.\n\nprint(\"Hello world!\") # This is the second\
    \ line of my program.\n```\n\nHello world!\n\nAs you can see, the result of our\
    \ program is only “Hello world!”. Python ignores the first line completely and\
    \ executes only the part of the second line that does *not* follow the # mark.\n\
    \nAll right, now that we've written our first piece of Python code, I think you're\
    \ ready for something a bit more challenging than hello world. Ready? Let's do\
    \ it!"
  mdcn: "## 3.4 了解更多关于 Python 的信息以及可帮助你学习的资源。\n\n## 3.4. 如何成为 Pythoneer 或 Pythonista\n\
    \n你应该自己练习使用 Python。尽可能多地自行练习是成为 Pythoneer 或 Pythonista 的最佳方式。打开你之前下载的“附加资源”文件夹。你会发现有用的文件，例如*《如何深入学习：40+\
    \ 适合初学者、中级和高级学习者的项目创意》*等等！\n\n在这个文件中，你会找到指向附加资源的链接，这些资源可以帮助你提升 Python 语言能力。\n\n\
    ## 3.5. 其他语言\n\n虽然我们为本课程选择了 Python，但重要的是要记住，它只是众多编程语言中的一种。可以把一种特定的编程语言看作是你 IT\
    \ 工具箱中众多强大工具中的一种。每种语言都有其独特的优缺点。有些运行速度比其他语言快。有些更适合企业应用。另一些则特别擅长处理数字运算。\n\n还有一些平台特定的脚本语言，比如在\
    \ Windows 上使用的 *PowerShell*，以及在 Linux 上使用的 *Bash*。这两种语言在各自的平台上都被系统管理员广泛使用。还有一些类似于\
    \ Python 的通用脚本语言，比如 *Perl* 或 *Ruby*，它们也广泛用于脚本编写和自动化。\n\n*JavaScript* 最初是作为网页的客户端脚本语言开发的，现在越来越多地被用作服务器端语言来处理更广泛的任务。而且，这个列表远不止于此。\n\
    \n还有大量传统语言可供探索，如 C、C++、Java 或 Go。随着你在 IT 领域职业生涯的发展，你可能会遇到多种不同的语言，并学会何时使用它们。但让我们不要操之过急。首先，我们需要掌握\
    \ Python。\n\n学习一门语言编程基础的一个好处是，你通常可以将学到的相同概念应用到其他语言中。这意味着一旦你熟悉了 Python，你会发现学习新的编程语言会更容易，因为你能够识别并理解它们之间的异同。\n\
    \n毕竟，每种语言都需要做一些共同的事情，比如创建变量、控制程序流程、读取输入和显示输出，即使它们完成这些任务的方式不同。正如我们之前提到的，学习一门编程语言有点像学习一门外语。你需要掌握该语言的语法和语义。\n\
    \n幸运的是，一旦你掌握了编程的基础知识，学习另一门语言会比学习第二门外语容易得多。编程语言之间的相似之处远多于差异。\n\n为了探索各种脚本语言之间的一些异同，让我们来看一个简单的程序，它用三种不同的语言——Python、Bash\
    \ 和 PowerShell——打印出 **World!** 十次。参见图 3.5.1。\n\n![](img/c88c635de07d75379d0ec33b0acd78c5_71_0.png)\n\
    \n图 3.5.1：一个用三种不同语言（Python、Bash 和 PowerShell）打印“hello, world”十次的程序\n\n如你所见，每种语言使用不同的方法来打印\
    \ hello world。但仔细观察，你也会发现相似之处。每种语言都必须以某种方式将文本显示在屏幕上。Python 的命令是 **print**（p 必须小写）。Bash\
    \ 的是 **echo**，PowerShell 的是 **Write-Host**。\n\n还要注意，每种语言都必须以某种方式计数到十。Python 通过指定\
    \ **range(10)** 来实现，Bash 使用序列表示法从 1 数到 10。PowerShell 在这个例子中语法最复杂，但它也归结为从 1 开始数到\
    \ 10。\n\n所以，正如我们刚才看到的，编程语言种类繁多，但不要被吓倒。在本课程中，你只需要专注于学习 Python。一旦你能熟练使用 Python，你就可以继续学习任何其他你想学的语言。接下来，我们还有另一个测验来帮助你练习刚刚学到的内容。\n\
    \n## 3.6. 练习测验 2：Python 入门 - 5 道题\n\n1. 填写正确的 Python 命令，将“My first Python program”显示在屏幕上。-\
    \ 1 分\n\n```\nprint(_)\n```\n\n2. Python 是哪种类型编程语言的示例？- 1 分\n\n- 客户端脚本语言\n- 机器语言\n\
    - 平台特定脚本语言\n- 通用脚本语言\n\n3. 将此 Bash 命令转换为 Python：- 1 分\n\n```\necho Have a nice\
    \ day.\n```\n\n4. 填写正确的 Python 命令，将不带引号的“This is fun!”显示在屏幕上 5 次。- 1 分\n\n```\n\
    for i in range(_):\n    print(\"_\")\n```\n\n5. 编写与以下 Javascript 代码片段对应的 Python\
    \ 代码片段：- 1 分\n\n```\nfor (let i = 0; i < 10; i++) {\n  console.log(i);\n}\n```\n\
    \n## 3.6.1. 练习测验 2 答案\n\n1. print(\"My first Python program\")\n\n2. 通用脚本语言\n\n\
    3. print(\"Have a nice day.\")\n\n4.\n\n```\nfor i in range(5):\n    print(\"\
    This is fun!\")\n```\n\n5.\n\n```\nfor i in range(10):\n    print(i)\n```\n\n\
    ## 4. Hello, World!\n\n## 4.1. 如何在 Python 中编写 Hello World\n\n现在你已经对 Python 代码的样子有了概念，让我们来看一个最基本的示例，并深入了解其中的原理。准备好。我们将使用\
    \ Python 解释器让我们的计算机向世界问好。\n\n**视频 2** (1:04) *Python 中的 Hello World 程序*\n\n就像\
    \ hello world 这个语句一样，**print** 函数是 Python 基础语言的一部分。每当我们使用语言中的关键字或函数时，我们就是在使用编程语言的语法来告诉计算机该做什么。那么，什么是*函数*和*关键字*呢？\n\
    \n**函数**是执行一项工作的代码块。我们稍后会更多地讨论函数，你甚至会学习如何编写自己的函数。**关键字**是用于构建指令的保留字。这些词是语言的核心部分，只能以特定的方式使用。\n\
    \n一些例子包括 **print**、**if** 和 **for**。我们将在课程后面解释所有这些以及更多内容。正如我们之前指出的，Python 中使用的关键字和函数构成了该语言的语法。一旦我们理解了它们的工作原理，我们就可以用它们来构建更复杂的表达式，让计算机做我们想做的事情。\n\
    \n最后，注意“Hello, world”是如何写在双引号之间的。将文本包裹在引号中表示该文本被视为字符串，这意味着它是将被我们的脚本操作的文本。在编程中，任何不在引号内的文本都被视为代码的一部分。\n\
    \n现在，说点题外话，你知道为什么我们在示例中打印“Hello, world”吗？嗯，打印 hello world 自 70 年代以来一直是学习编程语言的传统方式，当时它被用作一本著名的编程书籍《C\
    \ 程序设计语言》中的第一个示例。\n\n在 Python 中，hello world 示例只有一行，在 C 中是三行，在其他语言中可能更多。虽然学习编写\
    \ hello world 不会教你整门语言，但它让你对函数的使用方式以及用该语言编写的程序是什么样子有一个初步印象。\n\n## 4.1.1. 程序注释\
    \ (#)\n\n*注释*是大多数编程语言中一个极其有用的功能。到目前为止，你在程序中编写的所有内容都是 Python 代码。随着你的程序变得更长、更复杂，你应该在程序中添加注释，描述你解决问题的整体方法。注释允许你在程序中用英语写笔记。\n\
    \n## 4.1.2. 如何编写注释\n\n在 Python 中，井号表示注释。代码中井号后面的任何内容都会被 Python 解释器忽略。例如：\n\n```\n\
