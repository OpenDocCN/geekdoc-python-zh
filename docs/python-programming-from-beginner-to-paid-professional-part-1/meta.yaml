    you recognize when to tell a computer to perform a task? And how do you then write
    a program to actually get your computer complete the task you want it to do? The
    thought of learning to write a program in Python can make you feel a whole bunch
    of emotions excitement, anticipation that feeling of wanting to dive right in
    and get going and also fear.


