- md: '## 18.3. Definition of OOP


    In object-oriented programming, concepts are modeled as classes and objects. An
    idea is defined using a class, and an instance of this class is called an object.
    Almost everything in Python is an object, including strings, lists, dictionaries,
    and numbers.


    When we create a list in Python, we''re creating an object which is an instance
    of the list class, which represents the concept of a list. Classes also have attributes
    and methods associated with them. Attributes are the characteristics of the class,
    while methods are functions that are part of the class.


    ## 18.4. Classes and Objects in Python


    Remember how we use the type function when checking what type a certain variable
    was? Let''s do that again now:


    **Video 38** (2:36 *Classes and Objects in Python*)


    ```

    type(0)

    ''int''

    type("")

    ''str''

    ```


    When we use the type function as we just did here, Python tells us which class
    the value or variable belongs to. Since this is a class, it has a bunch of attributes
    and methods associated with it. Let''s take the string class ''str'' for an example.
    In this case, the only attribute is the content of the string.


    What about the methods? Well, in earlier sections, we looked at a bunch of methods
    provided by the string class, like *upper()* to create an uppercase version of
    the string; and *isnumeric()* which checks whether or not the contents are all
    numeric.


    Each string we''ve used in Python up to now has been a different instance of the
    string class. They all had the same methods, but the contents were different.
    This meant that the result of calling those methods was different also.


    You can get your computer to list all the attributes and methods in a class. To
    do that, just use the *dir* function. This gets the interpreter to print to the
    screen a list of all the attributes and methods:


    ```

    dir("")

    ```


    ```

    [''__add__'', ''__class__'', ''__contains__'', ''__delattr__'', ''__dir__'',

    ''__doc__'', ''__eq__'', ''__format__'', ''__ge__'', ''__getattribute__'',

    ''__getitem__'', ''__getnewargs__'', ''__gt__'', ''__hash__'', ''__init__'',

    ''__init_subclass__'', ''__iter__'', ''__le__'', ''__len__'', ''__lt__'', ''__mod__'',

    ''__mul__'', ''__ne__'', ''__new__'', ''__reduce__'', ''__reduce_ex__'',

    ''__repr__'', ''__rmod__'', ''__rmul__'', ''__setattr__'', ''__sizeof__'',

    ''__str__'', ''__subclasshook__'', ''capitalize'', ''casefold'', ''center'', ''count'',

    ''encode'', ''endswith'', ''expandtabs'', ''find'', ''format'', ''format_map'',

    ''index'', ''isalnum'', ''isalpha'', ''isascii'', ''isdecimal'', ''isdigit'',
    ''isidentifier'',

    ''islower'', ''isnumeric'', ''isprintable'', ''isspace'', ''istitle'', ''isupper'',
    ''join'',

    ''ljust'', ''lower'', ''lstrip'', ''maketrans'', ''partition'', ''removeprefix'',

    ''removesuffix'', ''replace'', ''rfind'', ''rindex'', ''rjust'', ''rpartition'',
    ''rsplit'',

    ''rstrip'', ''split'', ''splitlines'', ''startswith'', ''strip'', ''swapcase'',
    ''title'',

    ''translate'', ''upper'', ''zfill'']

    ```


    Well, that''s a lot of items! Let''s break this down a little bit, so we all understand
    what''s going on.


    The first bunch, from `__add__` to `__subclasshook__`, are special methods that
    begin and end with double underscores. These methods are not usually called by
    those weird names. Instead, they''re called by some of the internal Python functions.


    For example, the `__len__` method is called by the *len* function that we''ve
    used before to find out the length of a string. The `__ge__` method is used to
    compare if one string is greater than or equal to another, when using the >= operator.


    After the special methods, we see a lot of string methods that we''ve already
    come across. This list gives the names of all the methods, but it doesn''t tell
    us how we can use them. There''s a different function to tell us that, which is
    called help. Let''s give that one a go.


    ```

    help("")

    ```


    Help on class str in module builtins:


    ```

    class str(object)


    | str(object='''') -> str


    | str(bytes_or_buffer[, encoding[, errors]]) -> str


    |


    | Create a new string object from the given object. If encoding or


    | errors is specified, then the object must expose a data buffer


    | that will be decoded using the given encoding and error handler.


    | Otherwise, returns the result of object.__str__() (if defined)


    | or repr(object).


    | encoding defaults to sys.getdefaultencoding().


    | errors defaults to ''strict''.

    ```


    When we use the help function on any variable or value, we''re showing all the
    documentation for the corresponding class. In this case, we''re looking at the
    documentation for the *str* class, the class of the string object. As before,
    it starts with the special method. If we scroll down, we reach the ones we''ve
    already seen.


    We can see the documentation for a bunch of methods, and it tells us the parameters
    that method receives and the type of return value. It also includes an explanation
    of what the method does.


    For the `count(...)` method, we can see that it receives the sub string that will
    be counted, and it has optional *start* and *end* arguments to indicate which
    slice of the string would be looked at. We know they''re optional because they''re
    written between square brackets [].


    In general, being able to read and understand a method''s documentation is super
    important when you''re writing your own code. Using the *dir* and *help* functions
    puts all the documentation right at your fingertips. This makes it so much easier
    to figure out how to use something for the first time. When you''re done looking
    at documentation, you can just type **q** to quit.


    Python comes with a lot of classes already predefined for us, which is super useful.
    But the power of object-oriented programming is that we can also **define our
    own classes** with their own attributes and methods.


    While you might not need to do this when writing a simple script, as your programs
    grow in complexity, object-oriented programming will help you get the most out
    of the language, and that includes being able to define your own classes.


    Up next, we''ll dive into how to write our own class definitions with their own
    attributes and methods. Let''s get to it!


    ## 18.5. Classes and Objects in Detail


    We can use the **type()** function to figure out what class a variable or value
    belongs to. For example, **type(" ")** tells us that this is a string class. The
    only attribute in this case is the string value, but there are a bunch of methods
    associated with the class. We''ve seen the **upper()** method, which returns the
    string in all uppercase, as well as **isnumeric()** which returns a boolean telling
    us whether or not the string is a number.


    You can use the **dir()** function to print all the attributes and methods of
    an object. Each string is an instance of the string class, having the same methods
    of the parent class. Since the content of the string is different, the methods
    will return different values. You can also use the **help()** function on an object,
    which will return the documentation for the corresponding class. This will show
    all the methods for the class, along with parameters the methods receive, types
    of return values, and a description of the methods.


    ## 18.6. Defining New Classes


    We called out earlier that the point of object-oriented programming is to help
    define a real-world concept in a way that the computer understands. Defining a
    real-world concept in code can be tricky. So let''s look at how we might go about
    representing a concept in Python code. We''ll take it step-by-step and keep it
    simple. Let''s take our apple example from earlier.


    **Video 39** (3:53 *Defining New Classes*)


    We could use this code to define a basic Apple class.


    ```

    class Apple:

    ```


    Sure, it doesn''t look like much but with these two lines we''ve defined our first
    class. Let''s check out the syntax. In Python, we use the **class** reserved keyword
    to tell the computer that we''re starting a new class. We follow this with the
    name of the class and a colon.


    The Python style guidelines recommend that **class names should start with a capital
    letter**. So we''ll be using that convention. In this case, our class is called
    Apple. Class definitions follow the same pattern of other blocks we''ve seen before
    like, functions, loops or conditional branches.'
  mdcn: '## 18.3. 面向对象编程的定义


