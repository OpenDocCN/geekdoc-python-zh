- md: "## 10.5. Why Initializing Variables Matters\n\nAs we've called out earlier,\
    \ writing loops allows us to get our computer to do repetitive work for us. So\
    \ one of the main benefits of writing scripts in IT is to save time by automating\
    \ repetitive tasks. Loops are super useful. So let's make sure you avoid some\
    \ of the most common mistakes people make when writing loops.\n\nOne of the most\
    \ common errors is **forgetting to initialize variables with the right value**.\
    \ We've all made this mistake when starting to code. Remember how in the earlier\
    \ examples we initialized our variable X to 0 in one case and to 1 in the other.\n\
    \nWhen we forget to initialize a variable, two different things can happen as\
    \ explained in this video:\n\n**Video 19** (2:10) *Why Initializing Variables\
    \ Matters*\n\nThe first possible outcome and the easiest to catch is that Python\
    \ might raise an error telling us that we're using a variable we haven't defined,\
    \ which looks like this:\n\n```\nwhile my_variable < 10:\n    my_variable += 1\n\
    ```\n\n```\nTraceback (most recent call last):\n  File \"Programming\\My_Programs\\\
    Book Jotter.py\", line 1, in\n    while my_variable < 10:\nNameError: name 'my_variable'\
    \ is not defined\n```\n\nAs we've done with other errors we've come across, we\
    \ can look at the last line to understand what's going on. This error type is\
    \ a *NameError* and the message that comes after it says we're using an undefined\
    \ variable. It's straightforward to fix, we just need to initialize the variable\
    \ before using it like this:\n\n```\nmy_variable = 5\nwhile my_variable < 10:\n\
    \    print(\"Hello\")\n    my_variable += 1\n```\n\n```\nHello\nHello\nHello\n\
    Hello\nHello\n```\n\nAs you can see, we now have our output. So the error is fixed.\n\
    \nNow, there's a second issue we might face if we forget to initialize variables\
    \ with the right value. We might have *already used* the variable in our program.\
    \ In this case, if we **reuse** the variable without setting the correct value\
    \ from the start, it will still have the value from before. This can lead to some\
    \ pretty unexpected behavior. Try this script:\n\n```\nx = 1\nsum = 0\nwhile x\
    \ < 10:\n    sum += x\n    x += 1\n\nproduct = 1\nwhile x < 10:\n    product =\
    \ product * x\n    x += 1\n\nprint(sum, product)\n```\n\nCan you spot the problem?\n\
    \nIn the first block, we correctly initialize X to 1 and *sum* to 0, and then\
    \ iterate until x equals 10, summing up all the values in between. So by the end\
    \ of that block, *sum* equals the result of adding all the numbers from 1 to 10\
    \ and X is 10.\n\nIn the second part of the code, the original intention was to\
    \ get the *product* of all the numbers from 1 to 10, but if you look closely,\
    \ you can see that we're initializing *product* but **forgetting to initialize\
    \ X**. So X is still 10.\n\nThis means that when the *while* condition gets checked,\
    \ X is **already 10** at the start of the iteration. The *while* condition is\
    \ false before it even starts and the body never executes.\n\nIf you run this\
    \ script yourself, you can confirm that this is the output:\n\n```\n45 1\n```\n\
    \nIn this case, it might be harder to catch the problem because Python doesn't\
    \ raise an error. The problem here is that our *product* variable has the wrong\
    \ value (1). If you have a loop that's gone rogue and not behaving as expected,\
    \ it's a good idea to check if all the variables are correctly initialized.\n\n\
    In this example, we need to set X back to 1 before starting the second loop, like\
    \ this:\n\n```\nx = 1\nproduct = 1\nwhile x < 10:\n    product = product * x\n\
    \    x += 1\n\nprint(sum, product)\n```\n\n```\n45 362880\n```\n\nFix this script\
    \ by yourself and confirm that the correct value of *product* is 362880.\n\nAs\
    \ always, the best way to learn is to practice it yourself. Makes sense? Remember,\
    \ if you ever feel stuck or a little unsure about something, you can always ask\
    \ for help in the discussion forums. These forums are there to let you get the\
    \ help you need when you need it, so don't forget to use them.\n\nSo, to recap,\
    \ whenever you're writing a loop, check that you're initializing all the variables\
    \ you want to use before you use them. Don't worry if you don't get it right the\
    \ first time, we've all been there when learning how to code.\n\nAs we've called\
    \ out before, the way to master programming is to practice, practice and practice.\
    \ Keep practicing until you're comfortable and even then it's still okay to make\
    \ mistakes. So don't feel like you can't loop back around to review and practice\
    \ everything we've covered so far!\n\n## 10.6. Common Pitfalls with Variable Initialization\n\
    \nYou'll want to watch out for a common mistake: **forgetting to initialize**.\
    \ If you try to use a variable without first initializing it, you'll run into\
    \ a *NameError*. This is the Python interpreter catching the mistake and telling\
    \ you that you're using an undefined variable. The fix is pretty simple: initialize\
    \ the variable by assigning the variable a value before you use it.\n\nAnother\
    \ common mistake to watch out for that can be a little trickier to spot is forgetting\
    \ to initialize variables with the correct value. If you use a variable earlier\
    \ in your code and then reuse it later in a loop without first setting the value\
    \ to something you want, your code may wind up doing something you didn't expect.\
    \ Don't forget to initialize your variables before using them!\n\n## 10.7. Infinite\
    \ Loops and How to Break Them\n\nYou may remember by now that while loops use\
    \ the condition to check when to exit. The body of the while loop needs to make\
    \ sure that the condition being checked will change. If it doesn't change, the\
    \ loop may never finish and we get what's called an **infinite loop** - a loop\
    \ that keeps executing and never stops. Check out the example in this video:\n\
    \n**Video 20** (1:21) *Infinite Loops and How to Break Them*\n\n```\nwhile x %\
    \ 2 == 0:\n    x = x / 2\n```\n\nIt uses the **modulo** operator that we saw a\
    \ while back. This cycle will finish for positive and negative values of X. But\
    \ what would happen if X was 0 (zero)? The remainder of 0 divided by 2 is 0, so\
    \ the condition would be true. The result of dividing 0 by 2 would also be zero,\
    \ so the value of X wouldn't change.\n\nThis loop would go on forever, and so\
    \ we'd get an infinite loop. If our code was called with X having the value of\
    \ zero, the computer would just waste resources doing a division that would never\
    \ lead to the loop stopping.\n\nThe program would be stuck in an infinite loop,\
    \ circling back endlessly, and we don't want that. All that looping might make\
    \ your computer \"dizzy\". To avoid this, we need to think about what needs to\
    \ happen for a loop to be successful. Look at this one:\n\n```\nif x != 0:\n \
    \   while x % 2 == 0:\n        x = x / 2\n```\n\nIn this example, we said that\
    \ X needs to be different than zero. So we could nest this while loop inside an\
    \ if statement just like this. With this approach, the while loop is executed\
    \ only when X *is not* zero.\n\nAlternatively, we could add the condition directly\
    \ to the loop using a logical operator like in this example:\n\n```\nwhile x !=\
    \ 0 and x % 2 == 0:\n    x = x / 2\n```\n\nThis makes sure we only enter the body\
    \ of the loop for values of X that are both different than zero and even. Talking\
    \ about infinite loops reminds me of one of the first times I used while loops\
    \ myself.\n\nI wrote a script that emailed me as a way of verifying that the code\
    \ worked, and while some condition was true, I forgot to exit the loop. It turned\
    \ out those e-mails got sent faster than once per second. As you can imagine,\
    \ I got about 500 e-mails before I realized what was going on. I am infinitely\
    \ grateful for that little lesson!\n\nWhen you're done laughing at my story, remember,\
    \ when you're writing loops, it's a good idea to take a moment to **consider the\
    \ different values a variable can take**. This helps you make sure your loop won't\
    \ get stuck. If you see that your program is running forever without finishing,\
    \ have a second look at your loops to check there's no infinite loop hiding somewhere\
    \ in the code.\n\nWhile you need to watch out for infinite loops, they are not\
    \ always a bad thing. Sometimes you actually want your program to execute continuously\
    \ until some external condition is met. If you've used the **ping** utility on\
    \ Linux or macOS systems, or **ping -t** on a Windows system, you've seen an infinite\
    \ loop in action.\n\nThis tool will keep sending packets of data and printing\
    \ the results to the terminal unless you send it the interrupt signal, usually\
    \ pressing Ctrl + C. If you were looking at the program source code, you'll see\
    \ that it uses an infinite loop to do this with a block of code with instructions\
    \ to keep sending the packets forever.\n\nOne thing to call out is **it should\
    \ always be possible to break the loop** by sending a certain signal. In the ping\
    \ example, that signal is the user pressing Ctrl + C. In other cases, it could\
    \ be that the user pressed the button on a graphical application, or that another\
    \ program sent a specific signal, or even that a time limit was reached."
  mdcn: "## 10.5. 为什么初始化变量很重要\n\n正如我们之前指出的，编写循环可以让计算机为我们执行重复性工作。因此，在IT领域编写脚本的主要好处之一就是通过自动化重复任务来节省时间。循环非常有用。所以，让我们确保你避免人们在编写循环时最常犯的一些错误。\n\
    \n最常见的错误之一是**忘记用正确的值初始化变量**。我们刚开始编程时都犯过这个错误。还记得在之前的例子中，我们有时将变量X初始化为0，有时初始化为1吗？\n\
    \n当我们忘记初始化变量时，可能会发生两种不同的情况，正如本视频所解释的：\n\n**视频 19** (2:10) *为什么初始化变量很重要*\n\n第一种可能的结果，也是最容易发现的，是Python可能会抛出一个错误，告诉我们正在使用一个未定义的变量，看起来像这样：\n\
    \n```\nwhile my_variable < 10:\n    my_variable += 1\n```\n\n```\nTraceback (most\
    \ recent call last):\n  File \"Programming\\My_Programs\\Book Jotter.py\", line\
    \ 1, in\n    while my_variable < 10:\nNameError: name 'my_variable' is not defined\n\
    ```\n\n就像我们处理遇到的其他错误一样，我们可以查看最后一行来理解发生了什么。这种错误类型是*NameError*，它后面的消息说我们正在使用一个未定义的变量。修复方法很简单，我们只需要在使用变量之前初始化它，像这样：\n\
    \n```\nmy_variable = 5\nwhile my_variable < 10:\n    print(\"Hello\")\n    my_variable\
    \ += 1\n```\n\n```\nHello\nHello\nHello\nHello\nHello\n```\n\n如你所见，我们现在有了输出。所以错误已修复。\n\
    \n现在，如果我们忘记用正确的值初始化变量，我们可能面临的第二个问题是，我们可能在程序中*已经使用过*该变量。在这种情况下，如果我们**重用**变量而没有从一开始就设置正确的值，它仍然会保留之前的值。这可能导致一些非常意外的行为。试试这个脚本：\n\
    \n```\nx = 1\nsum = 0\nwhile x < 10:\n    sum += x\n    x += 1\n\nproduct = 1\n\
    while x < 10:\n    product = product * x\n    x += 1\n\nprint(sum, product)\n\
    ```\n\n你能发现问题吗？\n\n在第一个代码块中，我们正确地将X初始化为1，*sum*初始化为0，然后迭代直到x等于10，将中间的所有值相加。因此，在该代码块结束时，*sum*等于从1到10所有数字相加的结果，X是10。\n\
    \n在代码的第二部分，原本的意图是获取从1到10所有数字的*乘积*，但如果你仔细看，你会发现我们初始化了*product*，但**忘记了初始化X**。所以X仍然是10。\n\
    \n这意味着当检查*while*条件时，X在迭代开始时**已经是10**了。*while*条件在开始之前就是假的，循环体从未执行。\n\n如果你自己运行这个脚本，你可以确认输出是：\n\
    \n```\n45 1\n```\n\n在这种情况下，问题可能更难发现，因为Python没有抛出错误。这里的问题是我们的*product*变量具有错误的值（1）。如果你有一个循环行为异常，不符合预期，最好检查一下所有变量是否都正确初始化了。\n\
    \n在这个例子中，我们需要在开始第二个循环之前将X重新设置为1，像这样：\n\n```\nx = 1\nproduct = 1\nwhile x < 10:\n\
    \    product = product * x\n    x += 1\n\nprint(sum, product)\n```\n\n```\n45\
    \ 362880\n```\n\n自己修复这个脚本，并确认*product*的正确值是362880。\n\n一如既往，最好的学习方法是自己动手实践。明白了吗？记住，如果你感到困惑或对某些事情不太确定，你总可以在讨论论坛中寻求帮助。这些论坛就是为了让你在需要时获得帮助，所以别忘了使用它们。\n\
    \n所以，总结一下，每当你编写循环时，检查一下你是否在使用所有想要使用的变量之前初始化了它们。如果第一次没做对也不要担心，我们在学习编程时都经历过。\n\n\
    正如我们之前所说，掌握编程的方法是练习、练习再练习。持续练习直到你感到得心应手，即使那样犯错也没关系。所以不要觉得你不能回头去复习和练习我们到目前为止涵盖的所有内容！\n\
    \n## 10.6. 变量初始化的常见陷阱\n\n你需要提防一个常见错误：**忘记初始化**。如果你试图在初始化之前使用一个变量，你会遇到*NameError*。这是Python解释器捕获错误并告诉你正在使用一个未定义的变量。修复方法很简单：在使用变量之前，通过给变量赋值来初始化它。\n\
    \n另一个需要提防的常见错误可能更难发现，那就是忘记用正确的值初始化变量。如果你在代码的早期使用了一个变量，然后在循环中重用它而没有先将其设置为你想要的值，你的代码最终可能会做一些你意想不到的事情。不要忘记在使用变量之前初始化它们！\n\
    \n## 10.7. 无限循环以及如何打破它们\n\n你可能现在还记得，while循环使用条件来检查何时退出。while循环的循环体需要确保被检查的条件会发生变化。如果它不发生变化，循环可能永远不会结束，我们就会得到所谓的**无限循环**——一个持续执行永不停止的循环。看看这个视频中的例子：\n\
    \n**视频 20** (1:21) *无限循环以及如何打破它们*\n\n```\nwhile x % 2 == 0:\n    x = x / 2\n```\n\
    \n它使用了我们之前见过的**取模**运算符。对于X的正值和负值，这个循环都会结束。但如果X是0（零）会怎样？0除以2的余数是0，所以条件为真。0除以2的结果也是零，所以X的值不会改变。\n\
    \n这个循环将永远进行下去，因此我们会得到一个无限循环。如果我们的代码在X值为零时被调用，计算机只会浪费资源进行一个永远不会导致循环停止的除法运算。\n\n\
    程序将陷入无限循环，无休止地循环，我们不希望这样。所有的循环可能会让你的计算机“头晕”。为了避免这种情况，我们需要思考循环成功需要什么条件。看看这个：\n\n\
    ```\nif x != 0:\n    while x % 2 == 0:\n        x = x / 2\n```\n\n在这个例子中，我们说X需要不等于零。所以我们可以像这样将这个while循环嵌套在一个if语句中。通过这种方法，只有当X*不*为零时，while循环才会执行。\n\
    \n或者，我们可以像这个例子一样，使用逻辑运算符将条件直接添加到循环中：\n\n```\nwhile x != 0 and x % 2 == 0:\n  \
    \  x = x / 2\n```\n\n这确保了我们只在X既不等于零又是偶数时才进入循环体。谈到无限循环，让我想起了我自己第一次使用while循环的时候。\n\
    \n我写了一个脚本，通过给我发邮件来验证代码是否有效，当某个条件为真时，我忘记了退出循环。结果那些邮件发送的速度超过了每秒一封。你可以想象，在我意识到发生了什么之前，我收到了大约500封邮件。我对那个小教训感激不尽！\n\
    \n当你笑完我的故事后，请记住，当你编写循环时，花点时间**考虑变量可能取的不同值**是个好主意。这有助于确保你的循环不会卡住。如果你发现你的程序永远运行而没有结束，再检查一下你的循环，看看代码中是否隐藏着无限循环。\n\
    \n虽然你需要提防无限循环，但它们并不总是坏事。有时你实际上希望你的程序持续执行，直到满足某个外部条件。如果你在Linux或macOS系统上使用过**ping**工具，或者在Windows系统上使用过**ping\
    \ -t**，你就见过无限循环的实际应用。\n\n这个工具会持续发送数据包并将结果打印到终端，除非你发送中断信号，通常是按Ctrl + C。如果你查看程序源代码，你会看到它使用一个无限循环来完成此操作，其中包含一段代码，指令是永远发送数据包。\n\
    \n需要指出的一点是，**应该总是可以通过发送特定信号来打破循环**。在ping的例子中，这个信号是用户按下Ctrl + C。在其他情况下，可能是用户按下了图形应用程序上的按钮，或者另一个程序发送了特定信号，甚至可能是达到了时间限制。"
