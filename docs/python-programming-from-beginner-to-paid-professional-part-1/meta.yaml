    \n## 20.4. 对象组合\n\n你可能会遇到这样一种情况：两个不同的类相关，但没有发生继承。这被称为**组合**——其中一个类利用另一个类中包含的代码。例如，想象我们有一个**Package**类，它代表一个软件包。它包含关于软件包的属性，如名称、版本和大小。我们还有一个**Repository**类，它代表所有可供安装的软件包。\n\
