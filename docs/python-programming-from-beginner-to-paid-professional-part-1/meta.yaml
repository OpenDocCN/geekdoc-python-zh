    # 14.8. Advanced String Methods


    We''ve covered a bunch of String class methods already, so let''s keep building
    on those and run down some more advanced methods.


    The string method **lower** will return the string with all characters changed
    to lowercase. The inverse of this is the **upper** method, which will return the
    string all in uppercase. Just like with previous methods, we call these on a string
    using dot notation, like "**this is a**" This would return the string "**THIS
    IS A**" This can be super handy when checking user input, since someone might
    type in all lowercase, all uppercase, or even a mixture of cases.


    You can use the **strip** method to remove surrounding whitespace from a string.
    Whitespace includes spaces, and **newline** You can also use the methods **lstrip**
    and **rstrip** to remove whitespace only from the left or the right side of the
    string, respectively.


    The method **count** can be used to return the number of times a substring appears
    in a string. This can be handy for finding out how many characters appear in a
    string, or counting the number of times a certain word appears in a sentence or
    paragraph.


    If you wanted to check if a string ends with a given substring, you can use the
    method This will return True if the substring is found at the end of the string,
    and False if not.'
