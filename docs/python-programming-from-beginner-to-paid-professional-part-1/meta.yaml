  - '[PAGE 156]


    In this function, we''re using this principle to decide whether a number is even
    or not. So how come we have these two return statements, one below the other,
    without an else statement? The trick is that when a return statement is executed,
    the function exits so that the code that follows doesn''t get executed. This means
    that if the number is even, the computer will reach the “return True” statement
    and exit the function.


    Anything that comes after that will only be executed if the condition in the if
    statement was false. In other words, once the function reaches the “return False”
    line, we know for sure that the if condition was false which means the number
    was odd.


    At first, you might feel more comfortable including the else statement, even if
    it''s not needed and that''s totally okay. It''s important to know that both ways
    of writing this are correct. Remember that this technique can only be used when
    you''re returning a value inside the if statement.


    To recap, the *if* statement allows us to branch the execution based on a specific
    condition being true. The *else* statement lets us set a piece of code to run
    only when the condition of the if statement was false. If you return a value inside
    an if block then the code after the block will only be executed if the condition
    was false. All make sense?


    If all these if''s and else''s are starting to get a little confusing, that''s
    okay. There''s a lot to soak up here and the best way to do'
