  - "[PAGE 213]\n\nThe sequence that the for loop iterates over could contain any\
    \ type of element, not just strings. For example, we could iterate over a list\
    \ of numbers to calculate the total sum and average. Here's one way of doing this:\n\
    \n```\nvalues = [23, 52, 59, 37, 48]\nsum = 0\nlength = 0\nfor value in values:\n\
    \    sum += value\n    length += 1\nprint(\"total sum: \" + str(sum) + \" - Average:\
    \ \" + str(sum/length))\n```\n\nHere, we're defining a list of values. After that,\
    \ we're initializing two variables, **sum** and that will update in the body of\
    \ the for loop. In the for loop, we're iterating over each of the values in the\
    \ list, adding the current value to the sum of values, and then also adding 1\
    \ to length, which calculates how many elements there are in the list.\n\nOnce\
    \ we've gone through the whole list, we print out the sum and the average. We'll\
    \ keep using for loops in our examples every time we want to iterate over the\
    \ elements of any sequence and operate with them.\n\nSome examples of sequences\
    \ that we can iterate are:\n\n+   - the files in a directory\n- the lines in a\
    \ file"
  - '[PAGE 214]


    the processes running on a machine.


    And there''s a bunch of others. So as an IT specialist, you''ll use for loops
    to automate tons of stuff. For example, you might use them to


    +   - copy files to machines

    - process the contents of files

    - automatically install software


    and a lot more.


    A few weeks ago, I had to update a lot of files with different values depending
    on their contents. So I used a for loop in a script to iterate over all the files.
    Then, my script took different actions based on an **if** condition and updated
    all of those files for me.


    It would have taken me forever if I had done this manually file by file. If you''re
    wondering when you should use for loops and when you should use while oops, here''s
    a way to tell:


    Use **for** loops when there''s a **sequence of elements** that you want to iterate.

    Use **while** loops when you want to **repeat an action** until a condition changes.


    And if whatever you''re trying to do can be done with either for *or* while loops,
    just use whichever one''s your favorite. I''m more of a while gal myself, but
    it''s totally your call.'
  - '[PAGE 215]


    In section 11.3, I''ve put together more examples to help get you more practice
    with for loops and discover some of the cool things you could do with them.'
  - "[PAGE 216]\n\n# 11.2. For Loops Recap\n\nFor loops allow you to iterate over\
    \ a sequence of values. Let's take the example from the beginning of video 21\
    \ (section 11.1):\n\n```\nfor x in range(5):\n    print(x)\n```\n\nSimilar to\
    \ *if* statements and *while* loops, *for* loops begin with the keyword **for**\
    \ with a colon at the end of the line. Just like in function definitions, *while*\
    \ loops and *if* statements, the body of the *for* loop begins on the next line\
    \ and is indented to the right.\n\nBut what about the stuff in between the *for*\
    \ keyword and the colon? In our example, we're using the *range()* function to\
    \ create a sequence of numbers that our *for* loop can iterate over. In this case,\
    \ our variable **x** points to the current element in the sequence as the *for*\
    \ loop iterates over the sequence of numbers.\n\nKeep in mind that in Python and\
    \ many programming languages, a range of numbers will start at 0, and the list\
    \ of numbers generated will be *one less* than the provided value. So *range(5)*\
    \ will generate a sequence of numbers from 0 to 4, for a total of 5 numbers.\n\
    \nBringing this all together, the *range(5)* function will create a sequence of\
    \ numbers from 0 to 4. Our *for* loop will iterate over"
  - '[PAGE 217]


    this sequence of numbers, one at a time, making the numbers accessible via the
    variable x and the code within our loop body will execute for each iteration through
    the sequence. So for the first loop, x will contain 0, the next loop, 1, and so
    on until it reaches 4. Once the end of the sequence comes up, the loop will exit
    and the code will continue.


    The power of *for* loops comes from the fact that it can iterate over a sequence
    of any kind of data, not just a range of numbers. You can use *for* loops to iterate
    over a list of strings, such as usernames or lines in a file.


    Not sure whether to use a *for* loop or a *while* loop? Remember that a *while*
    loop is great for performing an action over and over until a condition has changed.
    A *for* loop works well when you want to iterate over a sequence of elements.'
  - "[PAGE 218]\n\n# 11.3. More for Loop Examples\n\nIn the last section, we talked\
    \ about the range function, and how it generates a sequence of numbers starting\
    \ with zero. Sometimes, though, we don't want to start with zero. For these situations,\
    \ the range function also allows us to specify the first element of the list to\
