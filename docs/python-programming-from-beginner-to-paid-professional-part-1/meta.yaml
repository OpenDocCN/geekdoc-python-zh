- md: '## 6.3. Data Types Recap


    In Python, text in between quotes - either single or double quotes - is a string
    data type. An integer is a whole number, without a fraction, while a float is
    a real number that can contain a fractional part. For example, 1, 7, 342 are all
    integers, while 5.3, 3.14159 and 6.0 are all floats. When attempting to mix incompatible
    data types, you may encounter an error. You can always check the data type of
    something using the *type()* function.


    ## 6.4. Variables


    When we ask a computer to perform an operation for us, we usually need to store
    values and give them names so that we can refer to them later. This is where variables
    come in handy. Variables are names that we give to certain values in our programs.
    Those values can be of any data type; numbers, strings or even the results of
    operations.


    We already used variables in some of our initial examples like using them to store
    a name or a value. Now we are going to learn exactly how they work and how to
    make the most of them. Think of variables as containers for data.


    When you create a variable in your code, your computer reserves a chunk of its
    own memory to store that value. This lets the computer access the variable later
    to read or modify the value. You can see this in action in this video:


    **Video 6** (01:47 *Variables*)


    Here’s another example. Imagine a simple script that calculates the area of a
    triangle using the formula


    Area = (base x height) / 2


    Area, base and height can all be represented by variables as shown in this script:


    ```

    base = 5

    height = 3

    area = (base*height)/2

    print(area)

    ```


    7.5


    In the above script we are creating three variables and storing different values
    in each. The process of storing a value inside a variable is called assignment.
    Here we assign the base variable the value of 5. We assign the height variable
    the value of 3, and the area variable with the result of the expression (base
    x height) / 2.


    An **expression** is a combination of numbers, symbols or other variables that
    produce a result when evaluated. In this example, we are multiplying the value
    of two variables and then dividing the result by 2 to arrive at the value that
    we want. Finally, we use our old friend the **print** function to display the
    value of the area on the screen.


    All right. We have just seen how to assign values to variables, use expressions
    to calculate more complex values and then print the contents of a variable. Variables
    are important in programming because they let you perform operations on data that
    may change.


    For example, if we extended our triangle script to accept any input as the value
    of the base and height variables, we could calculate the area of a triangle of
    any size.


    To give a more IT focused example, say we have a script that performs a specific
    operation on a file. We can extend that script to perform the same operation on
    any file but only if the program used a variable to store the file name.


    You might have noticed that we assign a value to a variable by using the = sign
    in the form of


    variable = value


    Generally, you can name variables whatever you like but there are some restrictions.
    Using these **reserved terms** will make your program confusing to read and will
    result in errors.


    ### 6.4.1. Variable Name Restrictions


    - Don''t use Keywords or functions that Python reserves for its own use, like
    `if`, `for`, `print`.

    - Don''t use spaces.

    - You must start with a letter or underscore (_).

    - Variable names must be made up of only letters, numbers and underscores (_).


    Let''s check out some examples of valid and invalid variable names to understand
    this better:


    - `I_am_a_variable` is a **valid** variable name.

    - `I_am_a_variable2` is also a **valid** variable name.

    - `1_is_a_number` is an **invalid** variable name because variable names must
    start with a letter or underscore.

    - `apples_&_oranges` is **invalid** because it uses the special character & (ampersand).


    Last thing, remember that precision is important when programming. Python variables
    are case sensitive, so capitalization matters. Lowercase `name`, uppercase `NAME`
    and all caps `NAME` are all valid and *different* variable names, and that **rule
    on variables is important**.


    ## 6.5. Expressions, Numbers and Type Conversions


    Earlier, we saw how we can''t use the + operator between an integer and a string
    because they''re different data types. But what happens when we try to operate
    with an integer and a float instead, let''s find out in this video:


    **Video 7** (01:26 *Expressions Numbers and Type Conversions*)


    ```

    print(7+8.5)

    ```


    ```

    15.5

    ```


    Error-free! Python has no problem performing this operation. But what''s up with
    that, aren''t integer and a float two different data types? They sure are but
    there''s a lot happening under the hood here. Behind the scenes the computer is
    busy automatically converting our integer seven into a float 7.0.


    This lets Python then add together the values to return a result that is also
    a float. We call this process **implicit conversion**. The interpreter automatically
    converts one data type into another. We''ve called this out before, but it''s
    worth highlighting again that Python operations aren''t just restricted to numbers.
    You can also use the plus operator to add together strings. This lets you do things
    like create sentences from individual words.


    Just don''t forget to add spaces to each word. Otherwise, the computer will run
    them all together.


    ```

    print("This" + "is" + "not" + "neat") # No space after each word

    ```


    Thisisnotneat


    ```

    print("This " + "is " + "pretty " + "neat!") # Space added after each word except
    the last

    ```


    This is pretty neat!


    So what if you really want to combine a string and a number, is it possible? It
    sure is, but only with an **explicit conversion**. In Python, to convert between
    one data type and another, we call a function with the name of the type we''re
    converting to. Let''s see how this works (try writing this script in your own
    Python interpreter or IDE).


    ```

    base = 6

    height = 3

    area = (base*height)/2

    print("The area of the triangle is: " + str(area))

    ```


    Now, things are getting a little bit more complex. Let''s take a moment to unpack
    this to make sure it all makes sense. In this script, we''re first calculating
    the area of a triangle, and when printing it we''re adding it to a string. To
    do this, we need to call the **str()** function to convert a number into a string.
    Let''s execute it and check out what happens:


    The area of the triangle is: 9.0


    Our number got converted to a string and printed together with the message. We''ve
    learned a little bit about variables, values, expressions, and conversions. Once
    we finish section 6.5, we''ve got a practice quiz to help you solidify your knowledge.
    As always, take your time and review the content if you need. You''ve totally
    got this.


    ## 6.6. Implicit versus Explicit Conversion


    As we saw earlier, some data types can be mixed and matched due to implicit conversion.
    Implicit conversion is where the interpreter helps us out and automatically converts
    one data type into another, without having to explicitly tell it to do so.


    By contrast, explicit conversion is where we manually convert from one data type
    to another by calling the relevant function for the data type we want to convert
    to. We used this in our previous example when we wanted to print a number alongside
    some text.


    Before we could do that, we needed to call the `str()` function to convert the
    number into a string. Once the number was explicitly converted to a string, we
    could join it with the rest of our textual string and print the result.


    ## 6.7. Practice Quiz 4: 5 Questions


    1. In this scenario, two friends are eating dinner at a restaurant. The bill comes
    in the amount of 47.28 dollars. The friends decide to split the bill evenly between
    them, after adding 15% tip for the service. Calculate the tip by filling the blanks
    ( _ ), the total amount to pay, and each friend''s share, then output a message
    saying "Each person needs to pay: " followed by the resulting number. - 1 point


    ```

    bill = 47.28

    tip = bill * 0.15

    total = bill + tip

    share = total/2

    print("Each person needs to pay: " + str(share))

    ```


    2. This code is supposed to take two numbers, divide one by another so that the
    result is equal to 1, and display the result on the screen. Unfortunately, there
    is an error in the code. Find the error and fix it, so that the output is correct.
    - 1 point


    ```

    numerator = 10

    ```'
  mdcn: '## 6.3. 数据类型回顾


    在 Python 中，引号（单引号或双引号）之间的文本是字符串数据类型。整数是没有小数部分的整数，而浮点数是可以包含小数部分的实数。例如，1、7、342 都是整数，而
    5.3、3.14159 和 6.0 都是浮点数。当尝试混合不兼容的数据类型时，你可能会遇到错误。你可以随时使用 *type()* 函数来检查某个值的数据类型。


    ## 6.4. 变量


    当我们要求计算机为我们执行一个操作时，我们通常需要存储值并给它们命名，以便稍后引用它们。这就是变量派上用场的地方。变量是我们赋予程序中某些值的名称。这些值可以是任何数据类型：数字、字符串，甚至是操作的结果。


    我们已经在一些初始示例中使用了变量，比如用它们来存储名称或值。现在我们将学习它们具体如何工作以及如何充分利用它们。可以把变量想象成数据的容器。


    当你在代码中创建一个变量时，计算机会预留一块自己的内存来存储该值。这使得计算机稍后可以访问该变量以读取或修改该值。你可以在本视频中看到实际操作：


    **视频 6** (01:47 *变量*)


    这里还有另一个例子。想象一个简单的脚本，使用以下公式计算三角形的面积


    面积 = (底 x 高) / 2


    面积、底和高都可以用变量表示，如本脚本所示：


    ```

    base = 5

    height = 3

    area = (base*height)/2

    print(area)

    ```


    7.5


    在上面的脚本中，我们创建了三个变量，并在每个变量中存储了不同的值。将值存储在变量中的过程称为赋值。这里我们将底变量赋值为 5。我们将高变量赋值为 3，并将面积变量赋值为表达式
    (底 x 高) / 2 的结果。


    **表达式**是数字、符号或其他变量的组合，在求值时会产生一个结果。在这个例子中，我们将两个变量的值相乘，然后将结果除以 2，以得到我们想要的值。最后，我们使用我们的老朋友
    **print** 函数在屏幕上显示面积的值。


    好的。我们刚刚学习了如何给变量赋值，使用表达式计算更复杂的值，然后打印变量的内容。变量在编程中很重要，因为它们允许你对可能变化的数据执行操作。


    例如，如果我们扩展我们的三角形脚本，使其接受任何输入作为底和高变量的值，我们就可以计算任何大小三角形的面积。


    举一个更侧重于 IT 的例子，假设我们有一个脚本，对文件执行特定操作。我们可以扩展该脚本，使其对任何文件执行相同的操作，但前提是程序使用变量来存储文件名。


    你可能已经注意到，我们通过使用 = 号以如下形式为变量赋值


    变量 = 值


    通常，你可以随意命名变量，但有一些限制。使用这些**保留字**会使你的程序难以阅读，并导致错误。


    ### 6.4.1. 变量名限制


    - 不要使用 Python 为其自身使用而保留的关键字或函数，如 `if`、`for`、`print`。

    - 不要使用空格。

    - 必须以字母或下划线 (_) 开头。

    - 变量名必须仅由字母、数字和下划线 (_) 组成。


    让我们看一些有效和无效变量名的例子，以便更好地理解这一点：


    - `I_am_a_variable` 是一个**有效的**变量名。

    - `I_am_a_variable2` 也是一个**有效的**变量名。

    - `1_is_a_number` 是一个**无效的**变量名，因为变量名必须以字母或下划线开头。

    - `apples_&_oranges` 是**无效的**，因为它使用了特殊字符 &（和号）。


    最后一点，记住在编程中精确性很重要。Python 变量区分大小写，因此大写很重要。小写 `name`、大写 `NAME` 和全大写 `NAME` 都是有效的且*不同的*变量名，这个**关于变量的规则很重要**。


    ## 6.5. 表达式、数字和类型转换


    早些时候，我们看到不能在整数和字符串之间使用 + 运算符，因为它们是不同的数据类型。但是，如果我们尝试对整数和浮点数进行操作会发生什么呢？让我们在这个视频中找出答案：


    **视频 7** (01:26 *表达式、数字和类型转换*)


    ```

    print(7+8.5)

    ```


    ```

    15.5

    ```


    没有错误！Python 执行此操作没有问题。但这是怎么回事，整数和浮点数不是两种不同的数据类型吗？它们确实是，但这里底层发生了很多事情。在幕后，计算机正忙于自动将我们的整数七转换为浮点数
    7.0。


    这使得 Python 可以将这些值相加，返回一个也是浮点数的结果。我们称这个过程为**隐式转换**。解释器自动将一种数据类型转换为另一种。我们之前提到过这一点，但值得再次强调的是，Python
    操作不仅限于数字。你也可以使用加号运算符将字符串相加。这让你可以做诸如从单个单词创建句子之类的事情。


    只是不要忘记在每个单词后添加空格。否则，计算机会将它们全部连在一起。


    ```

    print("This" + "is" + "not" + "neat") # 每个单词后没有空格

    ```


    Thisisnotneat


    ```

    print("This " + "is " + "pretty " + "neat!") # 除最后一个单词外，每个单词后都添加了空格

    ```


