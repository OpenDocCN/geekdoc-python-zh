- md: "## 11.2. For Loops Recap\n\nFor loops allow you to iterate over a sequence\
    \ of values. Let's take the example from the beginning of video 21 (section 11.1):\n\
    \n```\nfor x in range(5):\n    print(x)\n```\n\nSimilar to *if* statements and\
    \ *while* loops, *for* loops begin with the keyword **for** with a colon at the\
    \ end of the line. Just like in function definitions, *while* loops and *if* statements,\
    \ the body of the *for* loop begins on the next line and is indented to the right.\n\
    \nBut what about the stuff in between the *for* keyword and the colon? In our\
    \ example, we're using the *range()* function to create a sequence of numbers\
    \ that our *for* loop can iterate over. In this case, our variable **x** points\
    \ to the current element in the sequence as the *for* loop iterates over the sequence\
    \ of numbers.\n\nKeep in mind that in Python and many programming languages, a\
    \ range of numbers will start at 0, and the list of numbers generated will be\
    \ *one less* than the provided value. So *range(5)* will generate a sequence of\
    \ numbers from 0 to 4, for a total of 5 numbers.\n\nBringing this all together,\
    \ the *range(5)* function will create a sequence of numbers from 0 to 4. Our *for*\
    \ loop will iterate over this sequence of numbers, one at a time, making the numbers\
    \ accessible via the variable x and the code within our loop body will execute\
    \ for each iteration through the sequence. So for the first loop, x will contain\
    \ 0, the next loop, 1, and so on until it reaches 4. Once the end of the sequence\
    \ comes up, the loop will exit and the code will continue.\n\nThe power of *for*\
    \ loops comes from the fact that it can iterate over a sequence of any kind of\
    \ data, not just a range of numbers. You can use *for* loops to iterate over a\
    \ list of strings, such as usernames or lines in a file.\n\nNot sure whether to\
    \ use a *for* loop or a *while* loop? Remember that a *while* loop is great for\
    \ performing an action over and over until a condition has changed. A *for* loop\
    \ works well when you want to iterate over a sequence of elements.\n\nThe sequence\
    \ that the for loop iterates over could contain any type of element, not just\
    \ strings. For example, we could iterate over a list of numbers to calculate the\
    \ total sum and average. Here's one way of doing this:\n\n```\nvalues = [23, 52,\
    \ 59, 37, 48]\nsum = 0\nlength = 0\nfor value in values:\n    sum += value\n \
    \   length += 1\nprint(\"total sum: \" + str(sum) + \" - Average: \" + str(sum/length))\n\
    ```\n\nHere, we're defining a list of values. After that, we're initializing two\
    \ variables, **sum** and **length** that will update in the body of the for loop.\
    \ In the for loop, we're iterating over each of the values in the list, adding\
    \ the current value to the sum of values, and then also adding 1 to length, which\
    \ calculates how many elements there are in the list.\n\nOnce we've gone through\
    \ the whole list, we print out the sum and the average. We'll keep using for loops\
    \ in our examples every time we want to iterate over the elements of any sequence\
    \ and operate with them.\n\nSome examples of sequences that we can iterate are:\n\
    \n- the files in a directory\n- the lines in a file\n- the processes running on\
    \ a machine.\n\nAnd there's a bunch of others. So as an IT specialist, you'll\
    \ use for loops to automate tons of stuff. For example, you might use them to\n\
    \n- copy files to machines\n- process the contents of files\n- automatically install\
    \ software\n\nand a lot more.\n\nA few weeks ago, I had to update a lot of files\
    \ with different values depending on their contents. So I used a for loop in a\
    \ script to iterate over all the files. Then, my script took different actions\
    \ based on an **if** condition and updated all of those files for me.\n\nIt would\
    \ have taken me forever if I had done this manually file by file. If you're wondering\
    \ when you should use for loops and when you should use while loops, here's a\
    \ way to tell:\n\nUse **for** loops when there's a **sequence of elements** that\
    \ you want to iterate.\nUse **while** loops when you want to **repeat an action**\
    \ until a condition changes.\n\nAnd if whatever you're trying to do can be done\
    \ with either for *or* while loops, just use whichever one's your favorite. I'm\
    \ more of a while gal myself, but it's totally your call.\n\nIn section 11.3,\
    \ I've put together more examples to help get you more practice with for loops\
    \ and discover some of the cool things you could do with them.\n\n## 11.3. More\
    \ for Loop Examples\n\nIn the last section, we talked about the range function,\
    \ and how it generates a sequence of numbers starting with zero. Sometimes, though,\
    \ we don't want to start with zero. For these situations, the range function also\
    \ allows us to specify the first element of the list to generate. We do that by\
    \ passing two parameters to the function instead of one, like in this example:\n\
    \nVideo 22 (2:01 *What is a for loop?*)\n\n```\nproduct = 1\nfor n in range(1,\
    \ 10):\n    product = product * n\nprint(product)\n362880\n```\n\nIn this example,\
    \ we're calculating the products of all numbers from 1 to 10. For this operation,\
    \ it's important that we start with 1 and not with 0. If we'd started with 0,\
    \ the whole product would be zero.\n\nAdditionally, we can specify a third parameter\
    \ to change the size of each step. This means that instead of going one by one,\
    \ we could have a larger difference between the elements. Let's check out this\
    \ example when you might want to do something like this.\n\n```\ndef to_celsius(x):\n\
    \    return (x-32)*5/9\n\nfor x in range(0,100,10):\n    print(x, to_celsius(x))\n\
    ```\n\nFirst, we're defining a function that converts a temperature value from\
    \ Fahrenheit to Celsius, and we're simply using a conversion formula to do that.\
    \ Then we have a *for* loop that starts at zero, and goes up to 100 in steps of\
    \ 10. Notice that we're using 101 for the upper limit instead of 100. We're doing\
    \ this because the range never includes the last element, and we want to include\
    \ 100 in our range.\n\nThe body of the for-loop prints the value in Fahrenheit\
    \ and the value in Celsius, creating a conversion table. Let's run the program\
    \ to see this in action:\n\n```\n0 -17.77777777777778\n10 -12.222222222222221\n\
    20 -6.666666666666667\n30 -1.1111111111111112\n40 4.444444444444445\n50 10.0\n\
    60 15.555555555555555\n70 21.11111111111111\n80 26.666666666666668\n90 32.22222222222222\n\
    100 37.77777777777778\n```\n\nThat example got you feeling the heat? Don't worry,\
    \ there's a quick rundown of what we've learned. The range function can receive\
    \ one, two or three parameters. If it receives one parameter, it will create a\
    \ sequence one by one from zero until one less than the parameter received. If\
    \ it receives two parameters, it will create a sequence one by one from the first\
    \ parameter until one less than the second parameter.\n\nFinally, if it receives\
    \ three parameters, it will create a sequence starting from the first number and\
    \ moving towards the second number. But this time, the jumps between the numbers\
    \ will be the size of the third number, and again, it will stop before the second\
    \ number.\n\nSound like a lot to remember, but don't panic. As we've said before,\
    \ you don't have to try to memorize it all, just keep practicing. It'll soon become\
    \ second nature. To help you practice, we've included all of this in a handy cheat\
    \ sheet to refer to whenever you need it. You'll find that in section 11.7.\n\n\
    ## 11.4. A Closer Look at the Range() Function\n\nPreviously we had used the *range()*\
    \ function by passing it a single parameter, and it generated a sequence of numbers\
    \ from 0 to one less than we specified. But the *range()* function can do much\
    \ more than that.\n\nWe can pass in two parameters: the first specifying our starting\
    \ point, the second specifying the end point. Don't forget that the sequence generated\
    \ won't contain the last element; it will stop one before the parameter specified.\n\
    \nThe *range()* function can take a third parameter, too. This third parameter\
    \ lets you alter the size of each step. So instead of creating a sequence of numbers\
    \ incremented by 1, you can generate a sequence of numbers that are incremented\
    \ by 5.\n\nTo quickly recap the *range()* function when passing one, two, or three\
    \ parameters:\n\nOne parameter will create a sequence, one-by-one, from zero to\
    \ one less than the parameter.\n\nTwo parameters will create a sequence, one-by-one,\
    \ from the first parameter to one less than the second parameter.\n\nThree parameters\
    \ will create a sequence starting with the first parameter and stopping before\
    \ the second parameter, but this time, the jumps between the numbers will be the\
    \ size of the third number."
  mdcn: "## 11.2. For 循环回顾\n\nFor 循环允许你遍历一系列值。让我们以视频 21 开头（第 11.1 节）的例子为例：\n\n```\n\
    for x in range(5):\n    print(x)\n```\n\n与 *if* 语句和 *while* 循环类似，*for* 循环以关键字\
    \ **for** 开头，行末有一个冒号。就像在函数定义、*while* 循环和 *if* 语句中一样，*for* 循环的主体从下一行开始，并向右缩进。\n\
    \n但是 *for* 关键字和冒号之间的内容是什么呢？在我们的例子中，我们使用 *range()* 函数创建一个数字序列，我们的 *for* 循环可以遍历这个序列。在这种情况下，当\
    \ *for* 循环遍历数字序列时，我们的变量 **x** 指向序列中的当前元素。\n\n请记住，在 Python 和许多编程语言中，数字范围从 0 开始，生成的数字列表将比提供的值*少一个*。因此\
    \ *range(5)* 将生成一个从 0 到 4 的数字序列，总共 5 个数字。\n\n综合来看，*range(5)* 函数将创建一个从 0 到 4 的数字序列。我们的\
    \ *for* 循环将一次遍历这个数字序列中的一个数字，使这些数字可以通过变量 x 访问，并且循环体内的代码将在每次遍历序列时执行。因此，对于第一次循环，x\
    \ 将包含 0，下一次循环包含 1，依此类推，直到达到 4。一旦到达序列末尾，循环将退出，代码将继续执行。\n\n*for* 循环的强大之处在于它可以遍历任何类型数据的序列，而不仅仅是数字范围。你可以使用\
    \ *for* 循环遍历字符串列表，例如用户名或文件中的行。\n\n不确定是使用 *for* 循环还是 *while* 循环？请记住，*while* 循环非常适合重复执行某个操作，直到条件发生变化。当你想遍历一系列元素时，*for*\
    \ 循环效果很好。\n\nfor 循环遍历的序列可以包含任何类型的元素，而不仅仅是字符串。例如，我们可以遍历一个数字列表来计算总和和平均值。以下是实现此目的的一种方法：\n\
    \n```\nvalues = [23, 52, 59, 37, 48]\nsum = 0\nlength = 0\nfor value in values:\n\
    \    sum += value\n    length += 1\nprint(\"total sum: \" + str(sum) + \" - Average:\
    \ \" + str(sum/length))\n```\n\n在这里，我们定义了一个值列表。之后，我们初始化了两个变量 **sum** 和 **length**，它们将在\
    \ for 循环的主体中更新。在 for 循环中，我们遍历列表中的每个值，将当前值添加到值的总和中，然后还将 length 加 1，这计算了列表中有多少个元素。\n\
    \n一旦我们遍历完整个列表，我们就打印出总和和平均值。每次我们想遍历任何序列的元素并对其进行操作时，我们都会在示例中继续使用 for 循环。\n\n我们可以遍历的一些序列示例包括：\n\
    \n-   目录中的文件\n-   文件中的行\n-   机器上运行的进程。\n\n还有很多其他例子。因此，作为 IT 专家，你将使用 for 循环来自动化大量工作。例如，你可能会使用它们来\n\
    \n-   将文件复制到机器\n-   处理文件内容\n-   自动安装软件\n\n以及更多。\n\n几周前，我需要根据文件内容更新大量文件。因此，我在脚本中使用了一个\
    \ for 循环来遍历所有文件。然后，我的脚本根据 **if** 条件采取不同的操作，并为我更新了所有这些文件。\n\n如果我手动逐个文件完成这项工作，那将花费我永远的时间。如果你想知道何时应该使用\
    \ for 循环，何时应该使用 while 循环，这里有一个判断方法：\n\n当你有一个**元素序列**想要遍历时，使用 **for** 循环。\n当你想要**重复一个操作**直到条件发生变化时，使用\
    \ **while** 循环。\n\n如果你要做的任何事情都可以用 for *或* while 循环完成，那就使用你最喜欢的任何一个。我自己更喜欢 while\
    \ 循环，但这完全由你决定。\n\n在第 11.3 节中，我整理了更多示例，以帮助你更多地练习 for 循环，并发现你可以用它们做的一些很酷的事情。\n\n\
    ## 11.3. 更多 for 循环示例\n\n在上一节中，我们讨论了 range 函数，以及它如何生成从零开始的数字序列。但有时，我们不想从零开始。对于这些情况，range\
    \ 函数也允许我们指定要生成的列表的第一个元素。我们通过向函数传递两个参数而不是一个来实现这一点，如本例所示：\n\n视频 22 (2:01 *什么是 for\
    \ 循环？*)\n\n```\nproduct = 1\nfor n in range(1, 10):\n    product = product * n\n\
    print(product)\n362880\n```\n\n在这个例子中，我们计算从 1 到 10 所有数字的乘积。对于这个操作，重要的是我们从 1 开始而不是从\
    \ 0 开始。如果我们从 0 开始，整个乘积将为零。\n\n此外，我们可以指定第三个参数来更改每个步长的大小。这意味着我们不必一个一个地进行，而是可以让元素之间的差异更大。让我们看看这个例子，你可能想做类似的事情。\n\
    \n```\ndef to_celsius(x):\n    return (x-32)*5/9\n\nfor x in range(0,100,10):\n\
    \    print(x, to_celsius(x))\n```\n\n首先，我们定义一个函数，将温度值从华氏度转换为摄氏度，我们只是使用转换公式来完成此操作。然后我们有一个\
    \ *for* 循环，从零开始，以 10 为步长增加到 100。请注意，我们使用 101 作为上限而不是 100。我们这样做是因为 range 永远不包括最后一个元素，而我们希望在范围内包括\
    \ 100。\n\nfor 循环的主体打印华氏度值和摄氏度值，创建一个转换表。让我们运行程序来看看实际效果：\n\n```\n0 -17.77777777777778\n\
    10 -12.222222222222221\n20 -6.666666666666667\n30 -1.1111111111111112\n40 4.444444444444445\n\
    50 10.0\n60 15.555555555555555\n70 21.11111111111111\n80 26.666666666666668\n\
    90 32.22222222222222\n100 37.77777777777778\n```\n\n那个例子让你感到热了吗？别担心，我们来快速回顾一下我们所学的内容。range\
    \ 函数可以接收一个、两个或三个参数。如果它接收一个参数，它将从零开始，一个一个地创建一个序列，直到比接收到的参数少一个。如果它接收两个参数，它将从第一个参数开始，一个一个地创建一个序列，直到比第二个参数少一个。\n\
    \n最后，如果它接收三个参数，它将创建一个从第一个数字开始并向第二个数字移动的序列。但这一次，数字之间的跳跃将是第三个数字的大小，并且同样，它会在第二个数字之前停止。\n\
    \n听起来要记的东西很多，但不要惊慌。正如我们之前所说，你不必试图记住所有内容，只需不断练习。它很快就会成为你的第二天性。为了帮助你练习，我们将所有这些内容都包含在一个方便的备忘单中，你可以随时参考。你会在第\
    \ 11.7 节找到它。\n\n## 11.4. 深入了解 Range() 函数\n\n之前我们通过传递单个参数使用了 *range()* 函数，它生成了一个从\
    \ 0 到比我们指定的值少一个的数字序列。但 *range()* 函数的功能远不止于此。\n\n我们可以传递两个参数：第一个指定起点，第二个指定终点。不要忘记生成的序列不会包含最后一个元素；它会在指定的参数之前停止。\n\
    \n*range()* 函数也可以接受第三个参数。这第三个参数允许你更改每个步长的大小。因此，你可以生成一个以 5 为增量的数字序列，而不是创建一个以 1\
    \ 为增量的数字序列。\n\n快速回顾一下传递一个、两个或三个参数时的 *range()* 函数：\n\n一个参数将创建一个序列，从零开始，一个一个地增加，直到比参数少一个。\n\
    \n两个参数将创建一个序列，从第一个参数开始，一个一个地增加，直到比第二个参数少一个。\n\n三个参数将创建一个从第一个参数开始并在第二个参数之前停止的序列，但这一次，数字之间的跳跃将是第三个数字的大小。"
