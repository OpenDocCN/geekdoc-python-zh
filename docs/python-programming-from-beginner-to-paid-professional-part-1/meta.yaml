- md: '## 23. Final Project


    ## 23.1. Final Project Overview


    **Video 53** *(3:21 Final Project Overview)*


    Wow, first off, a huge congrats! You''re about to start the final project of the
    course. Amazing job making it all the way here. I hope you''ve been having as
    much fun as I have on this journey.


    You''re going to be working on your final project using only Jupyter Notebooks.
    You might be starting to feel pretty confident using them. But remember if you
    have any issues you can always ask me or ask for help in the discussion forums.


    Before we dive in, I''m going to explain a little bit about what you''ll be doing
    for the project. It''s going to be really fun. The goal of the project is to create
    a **word cloud**. A word cloud is an image that''s made up of different sized
    words. An example is shown in Fig. 23.1.1.


    ![](img/c88c635de07d75379d0ec33b0acd78c5_489_0.png)


    Fig. 23.1.1: A word cloud


    Usually the sizes of the words are determined by how many times each word appears
    in a specific text. To create the image itself, we''re going to use an external
    Python module called **WordCloud**.


    Your project is to create a script that would go through the text and count how
    many times each word appears. We''ve done this a few times already. Do you have
    any ideas how we should tackle this one?


    If you''re thinking of using a dictionary to count how many times each word appears,
    then you have a good answer! You''re going to prepare a dictionary and use that
    as a parameter for the word cloud module. Not too tricky, right? I think you can
    handle a little more, so two things you have to watch out for.


    First: **punctuation**. Before counting the frequency of the words, you need to
    make sure that there are no punctuation marks in the text. If you don''t, a string
    example with a comma at the end would be different from a string example with
    a dot at the end.


    So before you put words into the dictionary, you have to clean up the text to
    remove any punctuation marks.


    The second thing is we want to keep our word cloud interesting. Certain words
    in our language crop up a lot and if we include all of these we''re going to get
    a pretty dull word cloud. Think about words like “a”, “the”, “too”, “if” and so
    on. They usually appear a whole lot in text but aren''t too relevant to the text''s
    overall message.


    We want our Cloud to show words that are relevant to the text we''re using for
    the input. So you need to find a way to exclude irrelevant or uninteresting words
    when processing the text. For the input, you''re going to upload a text file.
    You can choose any text file you like for your input.


    It could be the contents of a website, a full novel or even everything that one
    author has ever written. You just need to make sure that it''s **one text** so
    that it can be processed by the code. Okay, before jumping into the project, remember
    you can revise this section or re-watch the video if something is not clear.


    I know I''m starting to sound like a broken record, but this time it''s very important.
    This final project is the real test of how much you''ve gotten your head around
    in this course. It can highlight areas you need to brush up on. So we want you
    to be super clear on what you need to do on that point.


    You''ll find an overview of what you have to do in the next section. Can you guess
    the best way of tackling this problem? Use our step-by-step approach that we outlined
    earlier. Understand the problem statement, research available options, plan your
    approach, write your code and finally execute.


    Okay, feeling good? Ready to go? Remember, you know this stuff and you''ve totally
    got it!


    ## 23.2. Final Project Help


    ### 23.2.1 Project goal


    Create a dictionary with words and word frequencies that can be passed to the
    *generate_from_frequencies* function of the *WordCloud* class. Once you have the
    dictionary, use this code to generate the word cloud image:


    ```

    cloud = wordcloud.WordCloud()

    cloud.generate_from_frequencies(frequencies)

    cloud.to_file("myfile.jpg")

    ```


    ### Things to remember


    Before processing any text, you need to remove all the punctuation marks. To do
    this, you can go through each line of text, character-by-character, using the
    **isalpha()** method. This will check whether or not the character is a letter.


    To split a line of text into words, you can use the **split()** method.


    Before storing words in the frequency dictionary, check if they''re part of the
    "uninteresting" set of words (for example: "a", "the", "to", "if"). Make this
    set a parameter to your function so that you can change it if necessary.


    ### Input file


    For the input file, you need to provide a file that contains text only. For the
    text itself, you can copy and paste the contents of a website you like. Or you
    can use a site like [Project Gutenberg](https://www.gutenberg.org/) to find books
    that are available online. You could see what word clouds you can get from famous
    books, like a Shakespeare play or a novel by Jane Austen.


    ### Jupyter Notebooks Help


    Remember that if you need help with Jupyter Notebooks, you can check out [this
    help](https://jupyter-notebook.readthedocs.io/en/stable/)


    ## 23.3. Final Project (Challenge Lab 5)


    ### 23.3.1. Instructions


    Again, for this project, you’ll create a “word cloud” from a text by writing a
    script. This script needs to process the text, remove punctuation, count the frequencies,
    and ignore uninteresting or irrelevant words. Good luck!


    ## 23.4. Final Project Grading


    I (or any member of my team) is available to help you grade your final project.
    You can use my help link (email) at the end of chapter 25 to send your project
    work for grading. We will get back to you in 12 to 24 hours with your result.


    However, if you cannot wait, you can open the “Challenge Labs” folder you downloaded
    earlier. It contains the solution to this project. You can use it to grade your
    project by yourself. Just be honest as you grade. Here’s the file name to search:


    **Final Project Solution File Name:** *C1M6L2_Final_Project_V3.ipynb*


    The text used in the project is as follows:


    ***Text Begins***


    *I am a Control Systems engineer, Systems Integrator and a Content Creator. I
    have worked with over a thousand clients across business sectors, mostly the PLC
    automation industry. I have written numerous books, articles, and leadership classes
    for higher education institutions.*


    *I have over 15 years of experience in Control Systems Engineering. I have had
    the opportunity to work within world class organizations such as Kraft Heinz,
    Procter & Gamble, and Post Holdings.*


    *As a Control Systems Engineer, I have worked on several PLC-based systems such
    as the Allen-Bradley''s RSLogix 5, 500, 5000, Studio 5000 and PACs. I have mastered
    other great technologies such as Cognex In-Sight Vision Systems & so much more.*


    *Now I live and breathe PLCs (Programmable Logic Controllers). I''ve invested
    a lot of money and time into equipping myself with many of the latest PLC hardware
    in the world. This is because I truly believe that an investment in myself will
    pay dividends down the road and that the automation industry will only keep growing.*


    *I believe in excellence and I''m highly driven by successful people. I am dedicated
    to seeing my clients succeed and achieve their goals. I love to create PLC programs
    and help manufacturing companies grow. I''ve successfully coached over a thousand
    business owners and leaders.*


    *I''m proud to boast of extensive experience and a successful company which has
    been in business for over 15 years.*


    ***Text Ends***


    Feel free to use my own text if you like. Otherwise, you can copy and paste the
    contents of a website you like. Feel free to share your word cloud in the discussion
    forums!'
