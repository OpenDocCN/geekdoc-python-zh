  md: '# Recursion is the repeated application of the same procedure to a smaller


    Have you ever played with a Russian nesting doll? They are a great visual example
    of recursion. Each doll has a smaller doll inside it. When you open up the doll
    to find the smaller one inside, you keep going until you reach the smallest doll
    which can''t be opened.


    # Recursion let''s us tackle complex problems by reducing the problem to a simpler


    Take our Russian nesting dolls, all nested inside each other. Imagine we want
    to find out how many dolls there are in total. We would need to open each doll
    one by one until we got to the last one and then count how many dolls we''ve opened.
    That''s recursion in action.


    Here''s another example with a more complex problem. Imagine you''re in a line
    of people and you want to know how many people are in front of you. If the line
    is long, it might be hard to count the people without leaving the line and losing
    your place.


    Instead you can ask the person in front of you how many people are in front of
    them. Since this person will be in the same situation as you, they''ll have to
    ask the same question to the person in front of them and so on and so on until
    the question reaches the first person in the line. This person can confidently
    reply that there are no people in front of them. So then the'
  merge: -1
  pgno: 239
- img_proc: true
  md: "second person in line can reply one, the person behind them replies two, and\
    \ so on until the answer reaches you.\n\nOkay. I know the chances are pretty small\
    \ that all of those people would play along just so you can know where you are\
    \ in line, but it's a useful way to visualize how recursion works. How does this\
    \ translate into programming? Well, in programming, recursion is a way of doing\
    \ a repetitive task by having a function call itself.\n\nA **recursive function**\
    \ calls itself usually with a modified parameter until it reaches a specific condition.\
    \ This condition is called the **base** In our earlier examples, the base case\
    \ would be the smallest Russian doll or the person at the front of the queue.\
    \ Let's check out an example of recursive function to understand what we're talking\
    \ about.\n\n```\ndef factorial(n):\n    if n < 2:\n        return 1\n    return\
    \ n*factorial(n-1)\n```\n\nHere, we're defining a function called factorial. At\
    \ the beginning of the function, we have a conditional block defining the base\
    \ case, where n is smaller than 2. It simply returns the value 1. After the base\
    \ case, we have a line where the factorial function is calling itself with n minus\
    \ 1. This is called the **recursive** This creates a loop."
