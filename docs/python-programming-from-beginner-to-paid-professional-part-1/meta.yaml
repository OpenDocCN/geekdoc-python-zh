    any text that isn''t inside quotation marks is considered part of the code.


    Now, for a bit of trivia, do you know why we printed the “Hello, world” in our
    example? Well, printing hello world has been the traditional way to start learning
    a programming language since way back in the ''70s when it was used as the first
