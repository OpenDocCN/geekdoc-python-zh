    Let's say you have a duration of time in seconds and you want to convert that\
    \ to the equivalent number of hours, minutes, and seconds. Here's how to do that\
    \ in Python:\n\n```python\ndef convert_seconds(seconds):\n    hours = seconds\
    \ // 3600\n    minutes = (seconds - hours * 3600) // 60\n    remaining_seconds\
    \ = seconds - hours * 3600 - minutes * 60\n    return hours, minutes, remaining_seconds\n\
    ```\n\nDid you spot the new operator in this function? That `//` (double slash)\
    \ operator is called **floor division**. A floor division divides a number and\
    \ takes the **integer part** of the division as the result. For example, `5 //\
    \ 2` is `2` instead of `2.5`.\n\nIn our example, the first operation (line 1)\
    \ is calculating how many hours are in a given amount of seconds, while the second\
    \ line (line 2) works out how many minutes are left once we subtract the hours.\
    \ The third line then works out how many seconds remain after subtracting minutes.\
    \ We end up with three numbers as a result: `return hours, minutes, remaining_seconds`.\n\
    \nSo the function returns all three of them. Let's see what this looks like when\
    \ we're calling our function:\n\n```python\nhours, minutes, seconds = convert_seconds(5000)\n\
    print(hours, minutes, seconds)\n```\n```\n1 23 20\n```\n\nAs you can see from\
    \ the result above, we have 1 hour, 23 minutes, 20 seconds in 5000 seconds. Because\
    \ we know that the function returns three values, we assign the result of the\
    \ function to three different variables. There's one last thing we should call\
    \ out about returning values. It is possible to return nothing and that's perfectly\
    \ okay. Let's look at an example from section 7.1.\n\n```python\ndef greeting(name):\n\
    \    print(\"Welcome, \" + name)\n```\n\nHere the function just printed a message\
    \ and didn't return anything. What do you think would happen if we try to assign\
    \ the value of this function to a variable? Let's try it out and see.\n\n```python\n\
    result = greeting(\"John\")\n```\n```\nWelcome, John\n```\n```python\nprint(result)\n\
    ```\n```\nNone\n```\n\nHere when we call the function, it printed a message just\
    \ like we expected. We stored the return value in the `result` variable, but there\
    \ was no `return` statement in the function. So the value of `result` is `None`.\n\
    \n**None** is a very special data type in Python used to indicate that things\
    \ are empty or that they return nothing.\n\nWow! That was a lot to learn about\
    \ functions and the return values. Remember that the key to getting this right\
    \ is to practice writing the code you've just learned as many times as you need.\
    \ Functions and return values can be tricky concepts to master, but they let us\
