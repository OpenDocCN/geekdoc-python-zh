    # About the Author


    I have well over 15 years of software development experience. In the last few
    years I used my experience to develop solutions using various programming languages
    on Windows, Linux, MacOS and PLCs (programmable logic controllers). I also built
    solutions from scratch and went as far as modifying open source software to meet
    my client’s needs.


    I study hard and carry out researches constantly. I also love helping people get
    jobs or making their businesses successful. Nowadays, I work with a dedicated
    team of Python programmers who look into specific automation problems and proffer
    lasting solutions to them.


    # How this Book can Help You


    This is not just *another* Python programming book. It is an intensive and *practical*
    Python programming course. It is part 1 of a 3-part series which serves as my
    exhaustive collection of step-by-step tutorials on the latest version 3 of Python
    programming language. It is a self-paced course that is excellent for beginners
    and accomplished experts alike. If you want to have fun learning or revising your
    Python programming with ease, this is the right course for you.


    You will find this book indispensable if you are a computer programmer, an automation
    engineer or professional, a system administrator working in an IT firm, a data
    analyst/journalist, an educator, a computer science student or just anyone looking
    to acquire Python programming skills they need to succeed in their job or career.
    Yes, this course is exactly what you need to become a Pythoneer or Pythonista.


    This course has 6 modules spread out over 25 chapters of both rich text and visual
    tutorials. You’re not in this alone. I’m going to help you through it. Watching
    people coding is very different from learning how to code. So, you will not only
    be learning Python in this course, you will also be *doing*.


    As you complete the tutorials, you''re also going to get tested *a lot* on the
    materials we are covering by following Python best practices. Although this is
    a self-paced course, I strongly recommend that you complete it in not more than
    6 weeks. For example, if you can complete one module every week, you can finish
    the course in 6 weeks.


    To fully understand the basics of Python 3 programming, I strongly recommend you
    watch all the **53 in-depth HD videos** which are available in the **course resources
    folder** that you can download. The link for download is in Chapter 25 of this
    book. These video tutorials simplify everything you need to understand, and help
    you **speed up your learning**.


    Important terms and definitions discussed in this book are printed in bold texts,
    **like this**. Practice quizzes and answers are included at the end of each chapter
    to help you test how much you have improved. Go to Chapter 25 right now. You will
    find the link to the **course resources**. Once you open this link, you will be
    able to **download all the course videos, graded assessments and their solutions,
    and handy cheat sheets that give you all the information you need at a glance**.


    # How to Use the Video Tutorials, Programs & Practice Exercises


    Except for revision purposes, the videos are not intended to be watched in isolation
    without first studying the content of this book. You should watch each video when
    you reach the point where it is referenced. This will ensure you fully understand
    the concept being discussed. The serial number and title (file name) of the relevant
    video to watch is stated at the point where it is referenced.


    To have a solid foundation of Python, you must have an in-depth knowledge and
    develop Python coding skills quickly. Therefore, I strongly advise you attempt
    all the practice exercises like quizzes, graded assessments and projects in this
    book *on your own* and *before* you check the answers and solutions provided.
    Write your own program as soon as you see me write mine in each video. Then cross
    check your programs with mine. Feel free to pause or rewatch the videos any time.
    You can also use or modify any of my codes as you wish.


    Since I assume you have no knowledge of Python programming, I prepared this course
    in such a way that when you study it along with the accompanying videos you will
    not only have an in-depth knowledge of Python 3 programming, you will also gain
    a lot of job experience you need to build automation and innovation, and earn
    higher salary.


    This book begins with the fundamental knowledge you need to start writing your
    very first Python script. It goes on to teach the advanced topics you need to
    become a paid professional in the field of Python programming. So, after completing
    this course you will have a clear understanding of Object-oriented Programming
    and be able to apply it to real world industrial automation.


    The methods presented in this book and the accompanying videos are those that
    are usually employed in the real world of IT and are the important ones you really
    need to learn. So the information in this book is very valuable, not only to those
    who are just starting out, but also to other intermediate Python programmers.


    Merely reading a copious Python programming book, or referring to Python help
    contents, is far from enough for learning how to “speak” Python language fluently.
    This book, unlike many others, takes the practical approach. It is designed in
    a course format with rich practice quizzes, assessments, challenge labs and interesting
    projects (with solutions) to engage you and give you hands-on practical experience.


    First, this book will give you a big head start if you have never written a line
    of code before. Then it will teach you the techniques you need to learn, design
    and build anything from simple to complex and very useful Python programs.


    # Why Learn Python Programming?


    If you learn Python, you will go mainstream. In case you haven''t noticed, there
    are hundreds of today''s most successful technology/IT companies using Python
    programs, such as Google, Netflix, Instagram, Reddit, Lyft, Spotify and so many
    others. Python is also being used at Bloomberg, the New York Times, and even at
    many local banks.


    Python has many clear paths to finding meaningful job and work. For example, here
    is the link to [apply to top remote USA Python developer](apply to top remote
    USA Python developer).


    Although some of these potential jobs are quite obvious - such as becoming a Python
    developer - there are other careers where the knowledge of Python is an asset
    that are more unexpected.


    # Module 1


    > “If milk gets bad it becomes yoghurt. Yoghurt is more valuable than milk. If
    it gets even worse, it turns to cheese. Cheese is more valuable than yoghurt.
    You are not bad because you made mistakes. Mistakes are the experiences that make
    you more valuable as a person. Christopher Columbus made a navigational error
    that made him discover America. Alexander Fleming’s mistake led him to invent
    Penicillin. Don’t let your mistakes get you down. It is not practice that makes
    perfect. Our mistakes enable us to learn to make ourselves perfect!” - Josh Aisosa


    # 1. The Foundation: Getting Started with Python Programming


    In this module I’ll introduce you to the book’s course format. Then, we’ll dive
    into the basics of programming languages and syntax, as well as automation using
    scripting. I’ll also introduce you to the Python programming language and some
    of the benefits it offers. Last up, we’ll cover some basic functions and keywords
    of the language, along with some arithmetic operations.'
