    # 18.7. Defining Classes Recap


    We can create and define our classes in Python similar to how we define functions.
    We start with the **class** keyword, followed by the name of our class and a colon.
    Python style guidelines recommend class names to start with a capital letter.
    After the class definition line is the class body, indented to the right. Inside
    the class body, we can define attributes for the class.


    Let''s take our Apple class example:


    ...


    We can create a new instance of our new class by assigning it to a variable. This
    is done by calling the class name as if it were a function. We can set the attributes
    of our class instance by accessing them using dot notation. Dot notation can be
    used to set or retrieve object attributes, as well as call methods associated
    with the class.


    ```

    >>> jonagold = Apple()

    ```


    We created an Apple instance called jonagold, and set the color and flavor attributes
    for this Apple object. We can create another instance of an Apple and set different
    attributes to differentiate between two different varieties of apples.


    ```

    >>> golden = Apple()

    ```'
