    \ We're going to use them to write all kinds of scripts in Python. So it's a good\
    \ idea to spend some time getting to know them, and learning when to use them,\
    \ and how to make the most out of them.\n\nWe've got a lot of new and exciting\
    \ concepts to discover. So let's get right to it.\n\n## 14.2. What is a string?\n\
    \nBy now, we've used strings in a lot of examples, but we haven't spent time looking\
    \ at them in detail yet. Before we dive into the nitty-gritty though, let's go\
    \ over what we've seen so far and add a few more points. First, a quick refresher.\n\
    \n**A string is a data type in Python that's used to represent a piece of text.\
    \ It's written between quotes, either double quotes or single quotes, your**\n\
    \n**Video 26** (1:01 *What is a string?*)\n\nIt doesn't matter which type of quotes\
    \ you use as long as they match. If we mix up double and single quotes, Python\
    \ won't be too happy:\n\n```\nname = 'Sasha'\ncolor = 'gold'\nplace = \"Cambridge'\n\
    ```\n\n```\nFile \"\", line 1\n    place = \"Cambridge'\n            ^\nSyntaxError:\
    \ EOL while scanning string literal.\n```\n\nAs you can see it returns a syntax\
    \ error, telling us it couldn't find the end of the string.\n\nA string can be\
    \ as short as zero characters, usually called an **empty string** or really long.\
    \ We also learned that we can use strings to build longer strings using the plus\
    \ sign and action called like this:\n\n```\nprint(\"Name: \" + name + \", Favorite\
    \ color: \" + color)\n```\n\n```\nName: Sasha, Favorite color: gold\n```\n\nA\
