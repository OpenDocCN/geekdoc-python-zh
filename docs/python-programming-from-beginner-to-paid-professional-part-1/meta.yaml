    \n## 8.7. Elif Statements\n\nThe *if* and *else* blocks allow us to branch execution\
    \ depending on whether a condition is true or false. But what if there are more\
    \ conditions to take into account? This is where the **elif** statement, which\
    \ is short for **else if**, comes into play.\n\nBut before we jump into how to\
    \ use it, let's take a look at why we need it in the first place. Let's go back\
    \ to our trusty username validation example.\n\n**Video 15** (1:04) *Elif Statements*\n\
    \n```python\ndef hint_username(username):\n    if len(username) < 3:\n       \
    \ print(\"Invalid username. Must be at least 3 characters long\")\n    else:\n\
    \        print(\"Valid username\")\n```\n\nNow, what if your company also had\
    \ a rule that usernames longer than 15 characters aren't allowed? How could we\
    \ let the user know if their chosen username was too long? We could do it like\
    \ this:\n\n```python\ndef hint_username(username):\n    if len(username) < 3:\n\
    \        print(\"Invalid username. Must be at least 3 characters long\")\n   \
    \ else:\n        if len(username) > 15:\n            print(\"Invalid username.\
    \ Must be at most 15 characters long\")\n        else:\n            print(\"Valid\
    \ username\")\n```\n\nIn this case, we're adding an extra **if** block *inside*\
    \ the **else** block (shown in red color). This works, but the way the code is\
    \ **nested** makes it kind of hard to read. To avoid unnecessary nesting and make\
    \ the code clearer, Python gives us the *elif* keyword, which lets us handle more\
    \ than two comparison cases. Take a look.\n\n```python\ndef hint_username(username):\n\
    \    if len(username) < 3:\n        print(\"Invalid username. Must be at least\
    \ 3 characters long\")\n    elif len(username) > 15:\n        print(\"Invalid\
    \ username. Must be at most 15 characters long\")\n    else:\n        print(\"\
    Valid username\")\n```\n\nThe *elif* statement looks very similar to the if statement\
    \ (shown in blue color). It's followed by a condition and a colon, and a block\
    \ of code indented to the right that forms the body. The condition must be true\
    \ for the body of the elif block to be executed.\n\nThe main **difference between\
    \ elif and if statements** is we can only write an elif block as a companion to\
    \ an if block. That's because the condition of the elif statement will only be\
    \ checked if the condition of the if statement wasn't true.\n\nSo in this example,\
    \ the program first checks whether the username is less than 3 characters long,\
    \ and prints a message if that's the case. If the username has at least 3 characters,\
    \ the program then checks if it's longer than 15 characters. If it is, we get\
    \ a message to tell us that.\n\nFinally, if none of the above conditions were\
    \ met, the program prints a message indicating that the username is valid.\n\n\
    There's **no limit** to how many conditions we can add, and it's easy to include\
    \ new ones. For example, say the company decided that the username shouldn't include\
    \ numbers. We could easily add an extra elif condition to check for this. Cool,\
    \ right?\n\nYou now know how to compare things and use those comparisons for your\
    \ if, elif, and else statements, and you are using all of them inside functions.\
    \ Using branching to determine your program's flow opens up a whole new realm\
    \ of possibilities in your scripts. You can use comparisons to pick between executing\
    \ different pieces of code, which makes your script pretty flexible.\n\nBranching\
    \ also helps you do all kinds of practical things like only backing up files with\
    \ a certain extension, or only allowing login access to a server during certain\
    \ times of the day.\n\nAny time your program needs to make a decision, you can\
    \ specify its behavior with a branching statement. Are you starting to notice\
    \ tasks in your day-to-day that could be made more efficient with scripting? There\
    \ are so many possibilities, and we're only just getting started with all the\
    \ cool stuff Python programming can help you do.\n\nWow! we've covered a lot in\
    \ these last few sections. Remembering all these concepts can take some time,\
    \ and the best way to learn them is to use them (learn by doing). So I've put\
    \ together a cheat sheet for you:\n\n## 8.8 Cheat Sheet 2: Conditionals\n\nYou'll\
    \ find all these operators and branching blocks listed in your *Cheat Sheets*\
    \ folder in one handy resource. It's super useful when you need a quick refresher."
  mdcn: "正如我们之前提到的，这些代码块可以包含多行内容，并且不仅仅用于打印消息。它们可以进行计算、修改值、返回值等等。\n\n请记住，你可以根据需要选择使用任意数量的空格进行缩进，但你始终需要缩进，并且始终需要使用相同数量的空格。\n\
    \n`else`语句非常有用，但我们并不总是需要它。假设我们想要一个函数来检查一个值是偶数还是奇数。我们可以用这样一段代码来实现：\n\n```python\n\
    def is_even(number):\n    if number % 2 == 0:\n        return True\n    return\
    \ False\n```\n\n这里，我们使用了一个新的运算符，所以让我们先解释一下。**取模**运算符由 `%`（百分号）表示。它返回两个数整数除法的**余数**。整数除法是整数之间的一种运算，它产生两个结果，都是整数：商和余数。所以，如果我们对5和2进行整数除法，商是2，余数是1。\n\
    \n如果我们对11和3进行整数除法，商是3，余数是2。偶数都是2的倍数，这意味着一个偶数和2进行整数除法的余数总是0。\n\n在这个函数中，我们利用这个原理来判断一个数字是否为偶数。那么，为什么我们有两个`return`语句一个接一个地放着，而没有`else`语句呢？诀窍在于，当一个`return`语句被执行时，函数就会退出，因此后面的代码不会被执行。这意味着，如果这个数字是偶数，计算机将执行到\"\
    return True\"语句并退出函数。\n\n只有在`if`语句中的条件为假时，其后的任何代码才会被执行。换句话说，一旦函数执行到\"return False\"\
    这一行，我们就可以确定`if`条件为假，这意味着这个数字是奇数。\n\n起初，你可能觉得包含`else`语句会更舒服，即使它不是必需的，这完全没问题。重要的是要知道这两种写法都是正确的。请记住，这种技巧只能在`if`语句内部返回值时使用。\n\
    \n总结一下，*if*语句允许我们根据特定条件是否为真来分支执行。*else*语句让我们设置一段代码，仅在`if`语句的条件为假时运行。如果你在`if`块内部返回一个值，那么只有在条件为假时，该块之后的代码才会被执行。这一切都说得通吗？\n\
    \n如果所有这些`if`和`else`开始让你感到有点困惑，没关系。这里有很多内容需要吸收，最好的方法就是，是的，你猜对了，复习内容并根据需要尽可能多地自行练习。完成后，请进入下一节。\n\
    \n## 8.6. Else语句和取模运算符回顾\n\n我们刚刚介绍了*if*语句，它在评估结果为真时执行代码，如果为假则跳过代码。但是，如果我们希望代码在评估结果为假时执行不同的操作呢？我们可以使用*else*语句来实现。\n\
    \n*else*语句跟在*if*块之后，由关键字*else*后跟一个冒号组成。*else*语句的主体向右缩进，当上面的*if*语句没有执行时，它将被执行。\n\
    \n我们还提到了取模运算符，它由百分号表示：该运算符执行整数除法，但只返回该除法运算的余数。\n\n如果我们用5除以2，商是2，余数是1。两个2可以放入5中，剩下1。所以`5%2`会返回1。用10除以5，商是2，没有余数，因为5可以放入10两次，没有剩余。在这种情况下，`10%2`会返回0，因为没有余数。\n\
    \n## 8.7. Elif语句\n\n*if*和*else*块允许我们根据条件是真还是假来分支执行。但是，如果有更多条件需要考虑呢？这就是**elif**语句（**else\
    \ if**的缩写）发挥作用的地方。\n\n但在我们深入探讨如何使用它之前，让我们先看看为什么首先需要它。让我们回到我们可靠的用户名验证示例。\n\n**视频\
    \ 15** (1:04) *Elif语句*\n\n```python\ndef hint_username(username):\n    if len(username)\
    \ < 3:\n        print(\"Invalid username. Must be at least 3 characters long\"\
    )\n    else:\n        print(\"Valid username\")\n```\n\n现在，如果你的公司还有一条规定，用户名长度超过15个字符是不允许的，该怎么办？我们如何让用户知道他们选择的用户名太长了？我们可以这样做：\n\
    \n```python\ndef hint_username(username):\n    if len(username) < 3:\n       \
    \ print(\"Invalid username. Must be at least 3 characters long\")\n    else:\n\
    \        if len(username) > 15:\n            print(\"Invalid username. Must be\
    \ at most 15 characters long\")\n        else:\n            print(\"Valid username\"\
    )\n```\n\n在这种情况下，我们在**else**块*内部*添加了一个额外的**if**块（以红色显示）。这可以工作，但代码**嵌套**的方式使其有点难以阅读。为了避免不必要的嵌套并使代码更清晰，Python为我们提供了*elif*关键字，它让我们可以处理两个以上的比较情况。看看。\n\
    \n```python\ndef hint_username(username):\n    if len(username) < 3:\n       \
    \ print(\"Invalid username. Must be at least 3 characters long\")\n    elif len(username)\
    \ > 15:\n        print(\"Invalid username. Must be at most 15 characters long\"\
    )\n    else:\n        print(\"Valid username\")\n```\n\n*elif*语句看起来与if语句非常相似（以蓝色显示）。它后面跟着一个条件和一个冒号，以及一个向右缩进的代码块，构成其主体。条件必须为真，elif块的主体才会被执行。\n\
    \n**elif和if语句的主要区别**在于，我们只能将elif块作为if块的伴随块来编写。这是因为只有在if语句的条件不为真时，才会检查elif语句的条件。\n\
    \n所以在这个例子中，程序首先检查用户名是否少于3个字符，如果是这种情况，则打印一条消息。如果用户名至少有3个字符，程序接着检查它是否超过15个字符。如果是，我们会得到一条消息告诉我们这一点。\n\
    \n最后，如果以上条件都不满足，程序会打印一条消息，表明用户名是有效的。\n\n我们可以添加的条件数量**没有限制**，并且很容易包含新的条件。例如，假设公司决定用户名不应包含数字。我们可以轻松地添加一个额外的elif条件来检查这一点。很酷，对吧？\n\
    \n你现在知道如何比较事物，并将这些比较用于你的if、elif和else语句，并且你正在函数内部使用它们。使用分支来确定程序的流程，为你的脚本开辟了一个全新的可能性领域。你可以使用比较来选择执行不同的代码片段，这使得你的脚本非常灵活。\n\
    \n分支还可以帮助你完成各种实际任务，例如只备份具有特定扩展名的文件，或只允许在一天中的特定时间登录服务器。\n\n任何时候你的程序需要做出决策，你都可以用分支语句来指定其行为。你是否开始注意到日常任务中可以通过脚本提高效率的地方？可能性太多了，而我们才刚刚开始接触Python编程能帮助你做的所有酷炫事情。\n\
    \n哇！我们在最后几节中涵盖了很多内容。记住所有这些概念需要一些时间，最好的学习方法就是使用它们（在实践中学习）。所以我为你整理了一份速查表：\n\n##\
