    \ explain how functions are used and defined, and also demonstrated how useful\
    \ they can be. Did you notice that we're feeding information into our functions\
    \ through their parameters? This is one of the many ways that we can input data\
    \ into our code.\n\nThe values for those parameters may come from different places,\
    \ like a file on our computer or through a form on a website, but that doesn't\
    \ impact our code. The result of the function is still the same, no matter where\
    \ the parameters come from.\n\nFunctions are your friends. They can help clean\
    \ up your code and do the math so you don't have to. You'll be using them a lot\
    \ both in this course and in your programming life. So get ready to get real friendly\
    \ with functions.\n\n## 7.6. Code Style\n\nSo far, we've looked into how the Python\
    \ syntax is used for variables, expressions, and defining and using functions.\
    \ There's a lot more syntax to come but before we dive into that, let's talk a\
    \ bit about a different side of programming:\n\nOn the whole, having good or bad\
    \ style when you write code doesn't make much difference between a script succeeding\
    \ or crashing, but it can make a *big* difference for the people who use it and\
    \ contribute to it. Poor programming style can make life difficult for the IT\
    \ specialists or system administrators who have to read the script after it's\
