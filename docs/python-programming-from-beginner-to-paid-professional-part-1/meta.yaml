    programming and Python is no different. I recommend that you practice every example
    we share in this course on your own. You can practice using an [online Python](https://www.online-python.com/)


    Now I am sure you are wondering what the heck is a Python interpreter. In programming,
    an interpreter is the program that *reads* and *executes* code. Remember how we
    said a computer program is like a recipe with step-by-step instructions?


    Well, if your recipe is written in Python, the Python interpreter is the program
    that reads what is in the recipe and translates it into instructions for your
    computer to follow. Eventually, you''ll want to'
