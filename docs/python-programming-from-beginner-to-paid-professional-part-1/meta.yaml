  - '[PAGE 220]


    That example got you feeling the heat? Don''t worry, there''s a quick rundown
    of what we''ve learned. The range function can receive one, two or three parameters.
    If it receives one parameter, it will create a sequence one by one from zero until
    one less than the parameter received. If it receives two parameters, it will create
    a sequence one by one from the first parameter until one less than the second
    parameter.


    Finally, if it receives three parameters, it will create a sequence starting from
