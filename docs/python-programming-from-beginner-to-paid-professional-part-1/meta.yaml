    \ of a Dictionary)*\n\n```python\nfile_counts = {\"jpg\":10, \"txt\":14, \"csv\"\
    :2, \"py\":23}\nfor extension in file_counts:\n    print(extension)\n```\n\n```\n\
    jpg\ntxt\ncsv\npy\n```\n\nSo if you use a dictionary in a *for* loop, the iteration\
    \ variable will go through the keys in the dictionary. If you want to access the\
