  md: '# 10.2. What is a While loop?


    First off, we''re going to talk about *while* loops.


    **While Loops** instruct your computer to continuously execute your code based
    on the value of a condition.


    This works in a similar way to branching if statements. The difference here is
    that the body of the block can be executed **multiple times** instead of just
    once. Check out this video:


    **Video 17** (2:20 *What is a while loop?*)


    Type these 5 lines of code in your Pycharm IDE in the order it is written. Do
    not copy and paste:


    ```

    1  x = 0

    2  while x < 5:

    3  print("Not there yet, x = " + str(x))

    4      x = x + 1

    5  print("x=" + str(x))

    ```


    Can you guess what it does? Before we execute it to find out, let''s go through
    it together line by line.


    In the first line (1), we''re assigning the value of 0 to the variable We call
    this action which means giving an initial value to a variable. In the line two,
    we''re starting the while loop. We''re'
  merge: -1
  pgno: 182
- img_proc: true
  md: 'setting a condition for this loop that X needs to be smaller than 5. Right
    now we know that x is o since we''ve just initialized it, so this condition is
    currently true.


    On the next two lines (3 and 4), we have a block that''s indented to the right.
    Here, we can use what we learned about functions and conditionals to identify
    that this is the while loop''s


    There are two lines in the body of the loop. In the first line (3), we print a
    message followed by the current value of X. In the second line (4), we **increment**
    the value of X. We do this by adding 1 to its current value and assigning it back
    to X.


    So after the first execution of the body of the loop, X will be 1 instead of o.
    Because this is a loop, the computer doesn''t just continue executing with the
    next line in the script. Instead, it **loops back** around to re-evaluate the
    condition for the while loop.


    Because 1 here is still smaller than 5, it executes the body of the loop It then
    prints the message and, once more, increments X by 1. So the X is now 2.


    The computer will keep doing this until the condition isn''t true anymore. In
    this example, the condition will be false when X is no longer smaller than 5.
    Once the condition is false, the **loop** and the next line is executed. Finally,
    the last line of our code prints the last value of X.'
