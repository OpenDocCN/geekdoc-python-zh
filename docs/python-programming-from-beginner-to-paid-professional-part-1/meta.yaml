    当我们在Python中创建一个列表时，我们实际上是在创建一个对象，这个对象是列表类的一个实例，它代表了列表的概念。类还具有与之关联的属性和方法。属性是类的特征，而方法是类的一部分函数。


    ## 18.4. Python中的类和对象


    还记得我们之前使用`type`函数来检查某个变量是什么类型吗？我们现在再试一次：


    **视频 38** (2:36 *Python中的类和对象*)


