    \ it's obvious that they are completely different entities.\n\nOn top of the comparison\
    \ and equality operators, Python also has a set of **logical** operators. These\
    \ operators allow you to connect multiple statements together and perform more\
    \ complex comparisons. In Python, the logical operators are the words `and`, `or`,\
    \ and `not`. Let's look at some examples:\n\n```\nprint(\"Yellow\" > \"Cyan\"\
