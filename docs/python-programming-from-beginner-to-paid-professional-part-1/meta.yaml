    首先，我们定义函数。我们给它参数 hours、minutes 和 seconds。之后，我们添加我们的文档字符串。我们通过在三个引号之间输入一个字符串来实现这一点，并像函数体一样将其向右缩进。\n\
    \n接下来，我们编写函数的代码。"
