    8.  **卫星导航基础** 如何设计GPS/GNSS接收器 第1册 - 原理、应用与市场

    9.  **Excel数据透视表与图表** 分步可视化指南

    10. **如何在亚马逊上销售二手书** 学习如何通过在线采购廉价二手书并销售给亚马逊，在无需营销的情况下每月赚取超过1万美元

    11. **如何在美国获得奖学金留学** 获取经济援助、大学录取和签证批准

    12. **如何在德国免学费留学** 获得免费教育、录取和签证批准。为在德国大学学习做好准备

