    \ would have the same exact list. So if we added a worm to the list, it would\
    \ get added to the one list that's shared by all instances.\n\nTo avoid this,\
    \ we need to create the list at the time of creating the instance, instead of\
    \ when creating the class. By doing this, each instance will have its own list\
    \ independent of the others. This happens with all attributes that are mutable,\
    \ because when we modify an immutable attribute, we're not replacing a value with\
