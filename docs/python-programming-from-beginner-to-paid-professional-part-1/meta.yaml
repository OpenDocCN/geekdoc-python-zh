    \nHow are you doing so far? Is everything making sense? Are all those apple examples\
    \ making you hungry? Feel free to pause and grab a snack if that's what you need.\n\
    \nWe called out earlier that we use methods to get objects to do stuff. We've\
    \ seen several methods in our example so far like *lower()* for strings, *append()*\
    \ for lists or *values()* for dictionaries.\n\nThe key to understanding methods\
    \ is this.\n\n**Video 40** (3:41 *Instance Methods*\n\n**Methods are functions\
    \ that operate on the attributes of a specific instance of a class.**\n\nWhen\
    \ we call the append method on a list, we're adding an element to the end of that\
    \ specific list and not to any other lists. When we call the lower method on the\
    \ string, we're making the contents of that specific string lowercase. How exactly\
    \ does this happen? Let's take a closer look by defining our own methods. First,\
    \ we need to define a class and create an instance of it like we've done before.\n\
    \n```\nclass Piglet:\n    pass\nhamlet = Piglet()\n```\n\nNice. We've created\
    \ a piglet class. While our new piglet might be cute, it can't do a whole lot\
    \ now. What if we wanted to give it a voice? For objects to perform actions, they\
    \ need methods and as we called out before, a method is a function that operates\
    \ on a single instance of an object. Let's add a method to our class.\n\n```\n\
    class Piglet:\n    def speak(self):\n        print(\"oink oink\")\n```\n\nYou\
    \ can see here that we start defining a method with the *def* keyword just like\
    \ we would for a function. See how the line with the *def* keyword is indented\
    \ to the right inside the Piglet class? That's how we define a function as a **method\
    \ of the class**.\n\nThis function is receiving a parameter called **self**. This\
    \ parameter represents the instance that the method is being executed on. Let's\
    \ try this out and see what happens.\n\n```\nhamlet = Piglet()\nhamlet.speak()\n\
    oink oink\n```\n\nAs you can see, the piglet goes oink, oink! But this makes the\
    \ piglet say the same thing for all instances of the class. Boring? Let's make\
    \ the method do something different depending on the attribute of the instance:\n\
    \n```\nclass Piglet:\n    name = \"piglet\" # We introduce an attribute/variable\
    \ called name with a default value of piglet to initialize it..\n    def speak(self):\n\
    \        print(\"Oink! I'm {}! Oink!\".format(self.name))\n```\n\nThis time we've\
    \ studied the body of the class by defining an attribute called name with a default\
    \ value of **piglet**. We can change that value later but it's a good idea to\
    \ set it now to make sure our variable is initialized. If you look closely at\
    \ how we wrote the new speak method in the last line, you'll see that it's using\
    \ the value of **self.name** to know what name to print.\n\nThis means that it's\
    \ accessing the attribute name from the current instance of Piglet. Let's try\
    \ this out.\n\n```\nhamlet = Piglet()\nhamlet.name = \"Hamlet\"\n```\n\n```\n\
    hamlet.speak()\nOink! I'm Hamlet! Oink!\n```\n\nMeet Hamlet, our python pig! You\
    \ didn't know pigs could talk? Well, they can in Python!\n\nIn this example, the\
    \ speak method printed the name Hamlet which was the name attribute that we set.\
    \ What if we create a new instance of the same class but with a different name?\
    \ It should generate a different output. Let's try this out. I think Hamlet needs\
    \ a friend:\n\n```\npetunia = Piglet()\npetunia.name = \"Petunia\"\npetunia.speak()\n\
    Oink! I'm Petunia! Oink!\n```\n\nWe've now created two instances of the piglet\
    \ class each of them with their own name. When calling this speak method, each\
    \ of them prints their name and not the other.\n\n**Variables that have different\
    \ values for different instances of the same class are called instance variables**,\
    \ just like the name variable in this example.\n\nSince methods are just functions\
    \ that belong to a specific class, they can work as any other function. So they\
    \ can receive more parameters and return values if needed. Let's check out what\
    \ a method returning a value looks like:\n\n```\nclass Piglet:\n    years = 0\n\
    \    def pig_years(self):\n        return self.years * 18\n```\n\nIn this case,\
    \ we've created a method that converts the age of our piglet to pig years. So\
    \ the value that the method returns should change when we change the years attribute\
    \ of our instance. Let's create an instance and check how this method works:\n\
    \nPiggy is two years old in human years, how old is he in pig years?\n\n```\n\
    piggy = Piglet()\nprint(piggy.pig_years())\n0\n```\n\n```\npiggy.years = 2\nprint(piggy.pig_years())\n\
    36\n```\n\nSo as the value of the years attribute changes, the return value of\
    \ the pig years method changes too.\n\nIn section 19.3, we're going to learn about\
    \ a few special types of methods including one in particular called"
