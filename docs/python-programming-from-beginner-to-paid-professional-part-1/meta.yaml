  md: '# 20.5. Python Modules


    So far, we''ve been using the features that are baked into the Python language.
    The basic statements like if, for, while, or the definition of functions or classes,
    are part of the language and are ready for us to use whenever we need them. The
    same goes for integers, floats, strings, lists, and dictionaries. They''re all
    part of the basic Python language because they''re used so often. Of course, this
    isn''t enough to get interesting things done.


    We''ll need a lot of additional tools like being able to send packets over the
    network, read files from our machine, process images, or who knows what you might
    want to do to make your work more effective. To organize the code we need to perform
    tasks like these.


    Python provides an abstraction called a module. **Modules can be used to organize
    functions, classes, and other data together in a structured**


    Video 46 (3:24 Python Modules


    Internally, modules are set up through separate files containing the necessary
    classes and functions. Python already comes with a bunch of **ready-to-use** All
    these modules are contained in a group called the **Python standard** Let''s see
    how we can use some of them.'
