    # 2. Introduction to Programming'
  - '[PAGE 41]


    # 2.1. The Beginning of Your Programming Journey


    As the Chinese proverb says, a journey of a thousand miles begins with a single
    step. Today''s a big day, you''re taking your first step in your journey to learn
    how to write scripts in Python. It''s going to be a little challenging at times,
    but really it''s not that scary. We''ll go slow and give you everything you need
    to fully grasp each concept before we move along.


    In the next few sections, you''ll discover the fundamental concepts of computer
    programming. You''ll learn what a programming language is, what scripting is,
    what languages are out there other than Python, and how this all relates to IT.
    We''ll also have you coding before you know it with small coding exercises we''ve
    cooked up to give you hands-on practice with Python. This will include writing
    your very first Python script. But always keep in mind, if at any point along
    the way you feel lost or confused, don''t panic.


    You can read any section again or watch the videos as many times as you need to
    let the concept sink in, plus you can ask questions in the discussion forums,
    which is one of the best ways to find extra information and connect with other
    learners. When I was asked to participate in this program, it made me think about
    when I first started to code. If I could give that younger version of myself a
    piece of advice, this is what I would tell her: it never works the first time.'
- md: 'Seriously, as a newbie, I expected it all to work like magic. I thought that
    following the rules and getting it right the first time would prove my value as
    a coder, but that''s just not true, not even the best of the best. If you expect
    to write perfect code on the first shot you''re going to be disappointed. You
    hear that younger self? Try not to feel overwhelmed by the details. Connecting
    the dots only comes with experience, so the best way to learn is to just jump
    in.


    The truth is everyone learns at their own pace. If you already know some of these
    concepts, feel free to skip ahead to the parts that interests you the most. If
    you''re starting from scratch, take as long as you need for each concept. The
    assessments will be right there waiting for you when you''re done, and if at any
    point you start doubting yourself, remember, even the most advanced programmers
    started thinking, Python... what''s Python?


    Well, we''re about to learn all about it, so let''s dive in to do a rundown of
    what programming is.


    ## 2.2. What is Programming?


    At a basic level, a computer program is a recipe of instructions that tells your
    computer what to do. When you write a program, you create a step by step recipe
    of what needs to be done to complete a task and when your computer executes the
    program it reads what you wrote and follows your instructions to the letter. How
    nice is that? The recipe is written in a code called *programming*.


    Programming languages are actually similar to humans spoken languages since they
    have a *syntax* and *semantics*. Now if it''s been awhile since your last grammar
    class, here''s a quick refresher on syntax and semantics.


    In a human language, **syntax is the rules for how a sentence is constructed**
    while **semantics refers to the actual meaning of the sentence**. In English,
    sentences generally have both a subject, that''s a person, place, or thing, and
    a predicate usually a verb and a statement that explains what the subject is doing.


    Let''s take the sentence, *Paula loves to program in Python* as an example. In
    this sentence, Paula is the subject and loves to program in Python is the predicate.
    To form a sentence that others can understand, you need to know both the syntax
    that constructs the sentence and the semantics that gives it meaning. The same
    applies to programming languages.


    In a programming language like Python, the syntax is the rules for how each instruction
    is written and the semantics is the effects the instructions have. Much like spoken
    languages, there are lots of programming languages to choose from. Each has its
    own history, features, and applications but they all share the same fundamental
    ideas. So once you understand the basic concepts in one programming language,
    it becomes much easier to learn another.


    Lastly, computers always do exactly what they''re told. So when you write a program,
    it''s important to be super clear about what you want the computer to do. Learning
    the syntax and semantics of the programming language you choose will allow you
    to do just that. Make sense? Before we continue, let''s spend a moment on terminology.


    ### 2.2.1. Difference Between *Script* and *Program*


    In the next few sections you''ll hear the term script being used a bunch. So what''s
    the difference between a *script* and a *program*? The line between the two can
    be a bit blurry. In this course, we''ll use the terms interchangeably. In general,
    you can think of scripts as programs with a short development cycle that can be
    created and deployed rapidly.


    In other words, a script is a program that is short, simple, and can be written
    very quickly. In this course we''ll focus on a specific scripting language called
    Python which we''ll use to learn the basics of programming. We''ll learn about
    the Python syntax, the rules of how to write a Python program, and the semantics
    or meaning of the different pieces involved.


    Before we start learning how to code and having you write your first Python script,
    let''s talk more about what automation is and why it''s useful.


    ## 2.3. What is Automation?


    Although we might not realize it, we reap the benefits of automation all the time
    in our daily lives. Do you ever pay your bills with scheduled payments or use
    a self check out at the grocery store? I always set my coffee machine to start
    brewing before I''ve even gotten out of bed. The promise of fresh coffee makes
    early mornings way easier.


    Automation is the process of replacing a manual step with one that happens automatically.
    Take a traffic light for example, which continuously regulates the flow of vehicles
    at an intersection. A traffic light requires a human intervention only when it
    needs repairs or maintenance.


    The automatic regulation of traffic means that humans don''t have to stand at
    the intersection manually signaling when cars should stop or go. Instead, people
    can concentrate on more complex, creative, or difficult tasks like focusing on
    where you''re driving. What''s more, traffic lights don''t get tired, bored, or
    accidentally display a green light when they meant red. This highlights another
    benefit of automation: consistency.


    Let''s face it, us humans are flawed and sometimes we make mistakes, a human performing
    the same tasks hundreds of times will never be as consistent as a machine doing
    the same thing. But for all of its advantages automation isn''t a solution for
    every situation, some tasks just aren''t suited for automation.


    For example, they may require a degree of creativity or flexibility that automatic
    systems can''t provide or for more complicated or less frequently executed tasks
    creating the automation may actually be more effort or cost than it''s worth.
    Think about when you get a haircut. What would it take to automate the actions
    of cutting hair with a machine?


    The client''s height, the shape of their head, their current hair length, and
    desired hairstyle would all need to be taken into account when designing the automatic
    system. We need to replicate the creativity and skills of a trained specialist
    along with extensive testing to ensure the client''s safety and quality haircut.
    And if you''ve ever had a bad experience at a hair salon, you know quality can
    be subjective.


    In this case, the cost and effort of automation just isn''t worth the benefits
    an automatic haircut would provide which is why we don''t have robot hairstylists.
    Not too complex, right? Automation is a powerful tool when used in the right place
    at the right moment. It can save time, reduce errors, increase consistency, and
    provide a way to centralize solutions and mistakes making them easier to fix.


    Throughout this course, and upcoming ones we''ll be talking about when it makes
    sense to apply automation and exactly how you do it. Eventually knowing when and
    where to use automation will become automatic for you.


    ## 2.4. Getting Computers to Work for You


    Working in IT, a lot of what we do boils down to using a computer to perform a
    certain task. In your job you might create user accounts, configure the network,
    install software, backup existing data, or execute a whole range of other computer
    based tasks from day to day.


    Back in my first IT job, I realized that every day I sat at my computer to work
    I typed the same three commands to authenticate into systems. Those credentials
    timed out everyday by design, for security reasons, so I created a script that
    would automatically run these commands for me every morning to avoid having to
    type them myself.


    Funny enough, the team that monitors anomalous activity discovered my little invention
    and contacted me to remove it, oops! Tasks performed by a computer that need to
    be done multiple times with little variation are really well suited for automation,
    because when you automate a task you avoid the possibility of human errors, and
    reduce the time it takes to do it.


    Imagine this scenario, your company had a booth at a recent conference and has
    gathered a huge list of emails from people interested in learning more about your
    products. You want to send these people your monthly email newsletter, but some
    of the people on the list are already subscribed to receive it.'
  mdcn: '说真的，作为一个新手，我曾期望一切都能像魔法一样顺利。我以为只要遵循规则、一次就做对，就能证明我作为程序员的价值，但事实并非如此，即便是最顶尖的高手也做不到。如果你期望第一次就能写出完美的代码，那你注定会失望。年轻的自己，听到了吗？尽量别被细节压垮。融会贯通只能靠经验积累，所以最好的学习方法就是直接动手实践。


    事实是，每个人都有自己的学习节奏。如果你已经了解其中一些概念，可以随意跳到最感兴趣的部分。如果你是从零开始，每个概念花多少时间都行。评估测试会在你准备好时等着你，而如果你在任何时候开始怀疑自己，请记住，即使是最高级的程序员也曾有过这样的想法：Python……Python是什么？


    好了，我们即将全面学习它，那么让我们深入了解一下编程是什么。


    ## 2.2. 什么是编程？


    从基本层面来说，计算机程序是一份指令配方，告诉你的计算机该做什么。当你编写程序时，你是在创建一个完成任务所需的逐步配方，当计算机执行程序时，它会逐字逐句地阅读你写的内容并遵循你的指令。这多好啊？这份配方是用一种叫做*编程*的语言编写的。


    编程语言实际上与人类语言相似，因为它们都有*语法*和*语义*。如果你上次上语法课已经是很久以前的事了，这里快速复习一下语法和语义。


    在人类语言中，**语法是句子如何构建的规则**，而**语义指的是句子的实际含义**。在英语中，句子通常包含主语（人、地点或事物）和谓语（通常是动词和解释主语正在做什么的陈述）。


    以句子*Paula loves to program in Python*为例。在这个句子中，Paula是主语，loves to program in Python是谓语。要形成一个别人能理解的句子，你需要知道构建句子的语法和赋予其意义的语义。编程语言也是如此。


    在像Python这样的编程语言中，语法是每条指令如何书写的规则，语义是这些指令产生的效果。与口语类似，有许多编程语言可供选择。每种语言都有自己的历史、特性和应用，但它们都共享相同的基本理念。因此，一旦你理解了一种编程语言的基本概念，学习另一种就会变得容易得多。


    最后，计算机总是完全按照指令执行。因此，当你编写程序时，清晰地表达你希望计算机做什么非常重要。学习你所选编程语言的语法和语义将使你能够做到这一点。明白了吗？在我们继续之前，先花点时间了解一下术语。


    ### 2.2.1. *脚本*与*程序*的区别


    在接下来的几节中，你会经常听到“脚本”这个术语。那么*脚本*和*程序*有什么区别呢？两者之间的界限可能有点模糊。在本课程中，我们将交替使用这两个术语。一般来说，你可以将脚本视为开发周期短、可以快速创建和部署的程序。


    换句话说，脚本是一种简短、简单且可以非常快速编写的程序。在本课程中，我们将专注于一种特定的脚本语言——Python，我们将用它来学习编程的基础知识。我们将学习Python语法、编写Python程序的规则，以及涉及的不同部分的语义或含义。


    在我们开始学习如何编码并让你编写第一个Python脚本之前，让我们再谈谈什么是自动化以及它为什么有用。


    ## 2.3. 什么是自动化？


    尽管我们可能没有意识到，但我们在日常生活中一直在享受自动化带来的好处。你是否使用过定时支付账单，或者在杂货店使用自助结账？我总是把咖啡机设置在我还没起床时就开始冲泡。新鲜咖啡的承诺让清晨变得轻松多了。


    自动化是用自动发生的步骤取代手动步骤的过程。以交通灯为例，它持续调节交叉路口的车流。交通灯只有在需要维修或保养时才需要人工干预。


    交通的自动调节意味着人类不必站在路口手动示意车辆何时停止或通行。相反，人们可以专注于更复杂、更有创意或更困难的任务，比如专注于驾驶方向。此外，交通灯不会感到疲倦、无聊，也不会在想显示红灯时意外显示绿灯。这凸显了自动化的另一个好处：一致性。


    让我们面对现实吧，我们人类是有缺陷的，有时会犯错，一个人执行数百次相同任务永远不会像机器做同样的事情那样一致。但尽管自动化有诸多优势，它并非适用于所有情况的解决方案，有些任务根本不适合自动化。


    例如，它们可能需要一定程度的创造力或灵活性，而自动系统无法提供；或者对于更复杂或执行频率较低的任务，创建自动化可能比其价值付出更多的努力或成本。想想你理发的时候。用机器自动完成理发动作需要什么？


    设计自动系统时，需要考虑客户的身高、头型、当前头发长度和期望的发型。我们需要复制训练有素的专业人员的创造力和技能，并进行广泛测试以确保客户的安全和理发质量。如果你在理发店有过不愉快的经历，你就知道质量可能是主观的。


    在这种情况下，自动化的成本和努力并不值得自动理发所能带来的好处，这就是为什么我们没有机器人发型师。不太复杂，对吧？自动化在正确的时间和地点使用时是一个强大的工具。它可以节省时间、减少错误、提高一致性，并提供一种集中解决方案和错误的方法，使其更容易修复。


    在本课程及后续课程中，我们将讨论何时应用自动化以及具体如何操作。最终，知道何时何地使用自动化对你来说将变得自然而然。


    ## 2.4. 让计算机为你工作


    在IT行业工作，我们做的很多事情归根结底都是使用计算机执行特定任务。在你的工作中，你可能每天都要创建用户账户、配置网络、安装软件、备份现有数据或执行一系列其他基于计算机的任务。


    在我第一份IT工作中，我意识到每天坐在电脑前工作时，我都会输入相同的三个命令来登录系统。出于安全原因，这些凭证每天都会过期，所以我创建了一个脚本，每天早上自动为我运行这些命令，以避免自己输入。


    有趣的是，监控异常活动的团队发现了我的小发明，并联系我将其移除，哎呀！由计算机执行的、需要多次重复且变化很小的任务非常适合自动化，因为当你自动化一个任务时，你避免了人为错误的可能性，并减少了完成它所需的时间。


    想象一下这个场景：你的公司最近参加了一个会议，并收集了大量对你的产品感兴趣的人的电子邮件列表。你想给这些人发送你的每月电子邮件通讯，但列表中的一些人已经订阅了接收它。'
