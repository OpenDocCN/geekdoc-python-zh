    # 4.1. How to Write Hello World in Python


    Now that you''ve got an idea of what Python code looks like, let''s check out
    one of the most basic examples and dive deeper into what''s going on. Get ready.
    We''re going to use the Python interpreter to make our computer say hello to the
    world.


    **Video 2** (1:04 *Hello World program in Python*


    Like the statement hello world for example, the **print** function is part of
    the basic Python language. Whenever we use keywords or functions that are part
    of the language, we''re using the programming language''s syntax to tell the computer
    what to do. So, what are *functions* and


    **Functions** are pieces of code that perform a unit of work. We''ll talk a lot
    more about functions later on, and you''ll even learn how to write your own. **Keywords**
    are reserved words that are used to construct instructions. These words are the
    core part of the language and can only be used in specific ways.


    Some examples include and We''ll explain all of those and a bunch more later in
    the course. As we called out, the keywords and functions used in Python are what
    makes up the syntax of the language. Once we understand how they work, we can
    use them to construct more complex expressions that get the computer to do what
    we want it to do.'
