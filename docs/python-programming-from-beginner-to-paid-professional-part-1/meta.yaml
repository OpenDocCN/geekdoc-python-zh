- md: "It doesn't matter how complex the task is, your computer will do it as many\
    \ times as you tell it to, which leaves you time for more interesting things like\
    \ planning future hardware needs, or managing software roll out.\n\nIn the next\
    \ few sections we'll explore three techniques for automating repetitive tasks.\
    \ These are **while**, **for**, and **if**. Each of these techniques are used\
    \ to tell the computer to repeat a task, but each takes a slightly different approach.\n\
    \nWe're going to learn how to write the code for each, and how to know when to\
    \ use one technique instead of the others. So, are you ready? Let's get started!\n\
    \n## 10.2. What is a While loop?\n\nFirst off, we're going to talk about *while*\
    \ loops.\n\n**While Loops** instruct your computer to continuously execute your\
    \ code based on the value of a condition.\n\nThis works in a similar way to branching\
    \ if statements. The difference here is that the body of the block can be executed\
    \ **multiple times** instead of just once. Check out this video:\n\n**Video 17**\
    \ (2:20 *What is a while loop?*)\n\nType these 5 lines of code in your Pycharm\
    \ IDE in the order it is written. Do not copy and paste:\n\n```\n1  x = 0\n2 \
    \ while x < 5:\n3      print(\"Not there yet, x = \" + str(x))\n4      x = x +\
    \ 1\n5  print(\"x=\" + str(x))\n```\n\nCan you guess what it does? Before we execute\
    \ it to find out, let's go through it together line by line.\n\nIn the first line\
    \ (1), we're assigning the value of 0 to the variable `x`. We call this action\
    \ **initialization**, which means giving an initial value to a variable. In the\
    \ line two, we're starting the while loop. We're setting a condition for this\
    \ loop that `x` needs to be smaller than 5. Right now we know that `x` is 0 since\
    \ we've just initialized it, so this condition is currently true.\n\nOn the next\
    \ two lines (3 and 4), we have a block that's indented to the right. Here, we\
    \ can use what we learned about functions and conditionals to identify that this\
    \ is the while loop's **body**.\n\nThere are two lines in the body of the loop.\
    \ In the first line (3), we print a message followed by the current value of `x`.\
    \ In the second line (4), we **increment** the value of `x`. We do this by adding\
    \ 1 to its current value and assigning it back to `x`.\n\nSo after the first execution\
    \ of the body of the loop, `x` will be 1 instead of 0. Because this is a loop,\
    \ the computer doesn't just continue executing with the next line in the script.\
    \ Instead, it **loops back** around to re-evaluate the condition for the while\
    \ loop.\n\nBecause 1 here is still smaller than 5, it executes the body of the\
    \ loop. It then prints the message and, once more, increments `x` by 1. So the\
    \ `x` is now 2.\n\nThe computer will keep doing this until the condition isn't\
    \ true anymore. In this example, the condition will be false when `x` is no longer\
    \ smaller than 5. Once the condition is false, the **loop exits** and the next\
    \ line is executed. Finally, the last line of our code prints the last value of\
    \ `x`.\n\nNow that this code makes a bit more sense, what do you think will happen\
    \ when we execute it? Ready to find out? Let's execute the code and see what happens:\n\
    \n```\nNot there yet, x = 0\nNot there yet, x = 1\nNot there yet, x = 2\nNot there\
    \ yet, x = 3\nNot there yet, x = 4\nx=5\n```\n\nSo we had five lines with the\
    \ message, \"Not there yet\", and then at the end of the script the value of `x`\
    \ was 5. This was a simple example of how a while loop behaves.\n\nAs we've said\
    \ before, we're learning the building blocks of programming. Once you know those\
    \ building blocks, you can combine them to create more complex expressions. As\
    \ an IT specialist, while loops can be super helpful. You can use them to keep\
    \ asking for a username if the one provided isn't valid, or maybe try an operation\
    \ until it succeeds.\n\nKnowing how to construct these expressions can help you\
    \ get your computer to do a whole lot with only a little bit of code. It's pretty\
    \ powerful stuff we're learning here. Now that you've got an idea of how a while\
    \ loop works, we will spice it up with another example in section 10.4.\n\n##\
    \ 10.3. Anatomy of a While Loop\n\nA *while* loop will continuously execute code\
    \ depending on the value of a condition. It begins with the keyword *while*, followed\
    \ by a comparison to be evaluated, then a colon. On the next line is the code\
    \ block to be executed, indented to the right.\n\nSimilar to an *if* statement,\
    \ the code in the body will only be executed if the comparison is evaluated to\
    \ be true. What sets a *while* loop apart, however, is that this code block will\
    \ keep executing as long as the evaluation statement is true. Once the statement\
    \ is no longer true, the loop exits and the next line of code will be executed.\n\
    \n## 10.4. More While Loop Examples\n\nIn section 10.2, we saw a very simple example\
    \ of a while loop. We looked at a basic syntax of the loop and how it works. Let's\
    \ now apply this knowledge to a similar example, but this time with a while loop\
    \ inside a function.\n\n**Video 18** (2:04 *More while loop Examples*)\n\nType\
    \ this code in your Pycharm IDE in the order it is written. Do not copy and paste:\n\
    \n```\ndef attempts(n):\n    x = 1\n    while x <= n:\n        print(\"Attempt\
    \ \" + str(x))\n        x += 1\n    print(\"Done\")\n\nattempts(5)\n```\n\nCan\
    \ you work out what this function does? In this example, we start out by initializing\
    \ a variable called `x`. In this case, we initialize it with a value of 1. Then,\
    \ we enter our while loop which checks to see if the value inside of the `x` variable\
    \ is less than or equal to the parameter `n` that the function received.\n\nIf\
    \ that comparison evaluates to true, then the code inside the while block is executed.\
    \ Say we pass a value of 5 as a parameter to this function.\n\nIn the first pass\
    \ through the loop, `x` is always equal to 1, so the comparison 1 smaller than\
    \ or equal to 5 would be true and we then enter the body of the loop.\n\nIn the\
    \ body, we first print a message indicating the current attempt number, and then\
    \ we increase the value of `x` by 1. To increment the number we're using a slightly\
    \ different expression than before.\n\n**`x += 1`** is a **shorthand version**\
    \ of **`x = x + 1`**. You can use *either* expression since they both mean the\
    \ same thing.\n\nThe process continues until the result of the comparison isn't\
    \ true anymore, which happens when `x` is bigger than `n`. In our current example,\
    \ this would be when the value of `x` is 6. Let's run this script to see it in\
    \ action.\n\n```\nAttempt 1\nAttempt 2\nAttempt 3\nAttempt 4\nAttempt 5\nDone\n\
    ```\n\nIn these past examples, we've used the simple conditions of a number being\
    \ smaller, or smaller or equal than another number. These are common conditions,\
    \ but they're by no means the only conditions you can have in a while loop. It's\
    \ common for example to call a separate function that evaluates the condition,\
    \ like this (not complete):\n\n```\nusername = get_username()\nwhile not valid_username(username):\n\
    \    print(\"Invalid username\")\n    username = get_username()\n```\n\nIn this\
    \ case, there's a lot of code hidden behind functions and it's doing stuff we\
    \ don't see.\n\nThere's a **`get_username()`** function that asks the user for\
    \ a username and a function that validates that username. All this is happening\
    \ in just a handful of characters.\n\nAs you can see, you can pack a lot of punch\
    \ into just a short line of code. In this case, the body of the while loop will\
    \ be executed until the user enters a valid username.\n\nThe important thing to\
    \ remember is that the condition used by the while loop needs to evaluate to true\
    \ or false. It doesn't matter if this is done by using comparison operators or\
    \ calling additional functions.\n\nThe conditions used in while loops can also\
    \ become more complex if we use the logical operators that we encountered when\
    \ looking into branching, and this lets us combine the values of several expressions\
    \ to get the result we want.\n\nOkay, we've now covered what a while loop is and\
    \ learned its syntax and basic behavior. Some of this stuff can be a bit tricky\
    \ and you're doing great. Keep sticking with it.\n\nNext, we're going to do a\
    \ rundown of some of the most common pitfalls that you may come across when writing\
    \ your own loops. Head on over to the next section to get started."
  mdcn: "无论任务多么复杂，你的计算机都会按照你的指示执行任意多次，从而让你有时间去做更有趣的事情，比如规划未来的硬件需求或管理软件部署。\n\n在接下来的几节中，我们将探讨三种自动化重复任务的技术。它们是\
    \ **while**、**for** 和 **if**。每种技术都用于指示计算机重复执行任务，但各自采用的方法略有不同。\n\n我们将学习如何为每种技术编写代码，以及如何判断何时使用一种技术而非其他技术。那么，你准备好了吗？让我们开始吧！\n\
    \n## 10.2. 什么是 While 循环？\n\n首先，我们将讨论 *while* 循环。\n\n**While 循环** 指示你的计算机根据条件的值持续执行代码。\n\
    \n这与分支 if 语句的工作方式类似。不同之处在于，代码块的主体可以执行**多次**，而不仅仅是一次。请观看此视频：\n\n**视频 17** (2:20\
    \ *什么是 while 循环？*)\n\n在你的 Pycharm IDE 中，按照书写顺序输入以下 5 行代码。不要复制粘贴：\n\n```\n1  x\
    \ = 0\n2  while x < 5:\n3      print(\"Not there yet, x = \" + str(x))\n4    \
    \  x = x + 1\n5  print(\"x=\" + str(x))\n```\n\n你能猜出它的作用吗？在我们执行它来找出答案之前，让我们逐行一起分析一下。\n\
    \n在第一行 (1) 中，我们将值 0 赋给变量 `x`。我们称这个动作为**初始化**，意思是给变量一个初始值。在第二行，我们开始 while 循环。我们为这个循环设置了一个条件，即\
    \ `x` 需要小于 5。现在我们知道 `x` 是 0，因为我们刚刚初始化了它，所以这个条件目前为真。\n\n在接下来的两行 (3 和 4) 中，我们有一个向右缩进的代码块。在这里，我们可以运用关于函数和条件语句的知识来识别这是\
    \ while 循环的**主体**。\n\n循环主体中有两行代码。在第一行 (3) 中，我们打印一条消息，后跟 `x` 的当前值。在第二行 (4) 中，我们**递增**\
    \ `x` 的值。我们通过将其当前值加 1 并将结果赋回给 `x` 来实现这一点。\n\n因此，在循环主体第一次执行后，`x` 将是 1 而不是 0。因为这是一个循环，计算机不会继续执行脚本中的下一行。相反，它会**循环返回**，重新评估\
    \ while 循环的条件。\n\n因为这里的 1 仍然小于 5，所以它执行循环主体。然后它打印消息，并再次将 `x` 递增 1。所以 `x` 现在是 2。\n\
    \n计算机会一直这样做，直到条件不再为真。在这个例子中，当 `x` 不再小于 5 时，条件将为假。一旦条件为假，**循环退出**，下一行代码将被执行。最后，我们代码的最后一行打印\
    \ `x` 的最后一个值。\n\n现在这段代码更有意义了，你认为执行它时会发生什么？准备好找出答案了吗？让我们执行代码看看会发生什么：\n\n```\nNot\
    \ there yet, x = 0\nNot there yet, x = 1\nNot there yet, x = 2\nNot there yet,\
    \ x = 3\nNot there yet, x = 4\nx=5\n```\n\n所以我们有五行消息 \"Not there yet\"，然后在脚本结束时\
    \ `x` 的值是 5。这是一个展示 while 循环行为的简单例子。\n\n正如我们之前所说，我们正在学习编程的构建模块。一旦你知道了这些构建模块，你就可以将它们组合起来创建更复杂的表达式。作为一名\
    \ IT 专家，while 循环会非常有用。你可以用它们来持续请求用户名，如果提供的用户名无效，或者尝试一个操作直到成功。\n\n知道如何构建这些表达式可以帮助你用很少的代码让计算机完成很多事情。我们在这里学习的东西非常强大。既然你已经了解了\
    \ while 循环的工作原理，我们将在 10.4 节用另一个例子来丰富它。\n\n## 10.3. While 循环的剖析\n\n*while* 循环将根据条件的值持续执行代码。它以关键字\
    \ *while* 开始，后跟一个待评估的比较表达式，然后是一个冒号。下一行是要执行的代码块，向右缩进。\n\n与 *if* 语句类似，只有当比较结果为真时，主体中的代码才会执行。然而，*while*\
    \ 循环的不同之处在于，只要评估语句为真，这个代码块就会持续执行。一旦语句不再为真，循环退出，下一行代码将被执行。\n\n## 10.4. 更多 While\
    \ 循环示例\n\n在 10.2 节中，我们看到了一个非常简单的 while 循环示例。我们了解了循环的基本语法及其工作原理。现在让我们将这些知识应用到一个类似的例子中，但这次是在一个函数内部使用\
    \ while 循环。\n\n**视频 18** (2:04 *更多 while 循环示例*)\n\n在你的 Pycharm IDE 中，按照书写顺序输入以下代码。不要复制粘贴：\n\
    \n```\ndef attempts(n):\n    x = 1\n    while x <= n:\n        print(\"Attempt\
    \ \" + str(x))\n        x += 1\n    print(\"Done\")\n\nattempts(5)\n```\n\n你能弄清楚这个函数的作用吗？在这个例子中，我们首先初始化一个名为\
    \ `x` 的变量。在这个例子中，我们将其初始化为值 1。然后，我们进入 while 循环，检查变量 `x` 的值是否小于或等于函数接收的参数 `n`。\n\
    \n如果该比较结果为真，则执行 while 块内的代码。假设我们向此函数传递一个值为 5 的参数。\n\n在循环的第一次遍历中，`x` 始终等于 1，所以比较\
    \ 1 小于或等于 5 为真，然后我们进入循环主体。\n\n在主体中，我们首先打印一条消息，指示当前的尝试次数，然后我们将 `x` 的值增加 1。为了递增数字，我们使用了一个与之前略有不同的表达式。\n\
    \n**`x += 1`** 是 **`x = x + 1`** 的**简写版本**。你可以使用*任一*表达式，因为它们的意思相同。\n\n这个过程持续进行，直到比较结果不再为真，这发生在\
    \ `x` 大于 `n` 时。在我们当前的例子中，这将是当 `x` 的值为 6 时。让我们运行这个脚本看看实际效果。\n\n```\nAttempt 1\n\
    Attempt 2\nAttempt 3\nAttempt 4\nAttempt 5\nDone\n```\n\n在过去的这些例子中，我们使用了简单的条件，比如一个数字小于或小于等于另一个数字。这些是常见的条件，但它们绝不是你在\
    \ while 循环中可以使用的唯一条件。例如，调用一个单独的函数来评估条件是很常见的，像这样（不完整）：\n\n```\nusername = get_username()\n\
    while not valid_username(username):\n    print(\"Invalid username\")\n    username\
    \ = get_username()\n```\n\n在这种情况下，有很多代码隐藏在函数背后，它在做一些我们看不到的事情。\n\n有一个 **`get_username()`**\
    \ 函数用于向用户询问用户名，还有一个函数用于验证该用户名。所有这些都发生在短短几个字符中。\n\n正如你所看到的，你可以在短短一行代码中注入强大的功能。在这种情况下，while\
    \ 循环的主体将被执行，直到用户输入有效的用户名。\n\n需要记住的重要一点是，while 循环使用的条件需要评估为真或假。无论是通过使用比较运算符还是调用额外的函数来完成，这都无关紧要。\n\
    \n如果我们使用在研究分支时遇到的逻辑运算符，while 循环中使用的条件也可以变得更复杂，这使我们能够组合多个表达式的值以获得我们想要的结果。\n\n好的，我们现在已经介绍了什么是\
    \ while 循环，并学习了它的语法和基本行为。其中一些内容可能有点棘手，但你做得很好。请继续坚持下去。\n\n接下来，我们将概述在编写自己的循环时可能遇到的一些最常见的陷阱。请转到下一节开始学习。"
