    \ methods like this:\n\n```python\nfile_counts.keys()\ndict_keys(['jpg', 'txt',\
    \ 'csv', 'py'])\nfile_counts.values()\ndict_values([10, 14, 2, 23])\n```\n\nThese\
    \ methods return special data types related to the dictionary, but you don't need\
    \ to worry about what they are exactly. You just need to iterate them as you would\
