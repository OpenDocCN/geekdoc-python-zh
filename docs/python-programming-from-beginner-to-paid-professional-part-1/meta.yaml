    word cloud. Think about words like “a”, “the”, “too”, “if” and so on. They usually
    appear a whole lot in text but aren''t too relevant to the text''s overall message.


    We want our Cloud to show words that are relevant to the text we''re using for
    the input. So you need to find a way to exclude irrelevant or uninteresting words
    when processing the text. For the input, you''re going to upload a text file.
    You can choose any text file you like for your input.


    It could be the contents of a website, a full novel or even everything that one
    author has ever written. You just need to make sure that it''s **one text** so
    that it can be processed by the code. Okay, before jumping into the project, remember
    you can revise this section or re-watch the video if something is not clear.


