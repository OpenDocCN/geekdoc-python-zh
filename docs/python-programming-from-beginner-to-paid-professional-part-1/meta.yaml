  md: '# 10.3. Anatomy of a While Loop


    A *while* loop will continuously execute code depending on the value of a condition.
    It begins with the keyword *while*, followed by a comparison to be evaluated,
    then a colon. On the next line is the code block to be executed, indented to the
    right.


    Similar to an *if* statement, the code in the body will only be executed if the
    comparison is evaluated to be true. What sets a *while* loop apart, however, is
    that this code block will keep executing as long as the evaluation statement is
    true. Once the statement is no longer true, the loop exits and the next line of
    code will be executed.'
