    \ 2021.1.2](img/c88c635de07d75379d0ec33b0acd78c5_131_1.png)\n\nFirst, we've defined\
    \ a function called `lucky_number`, which carries out our calculation and prints\
    \ it for us. Then we call the function twice, once with each name. Since we've\
    \ grouped the calculation and print statements into a function, our code is not\
    \ only easier to read but it's also now reusable. We can execute the code inside\
    \ the `lucky_number` function as many times as we need it, by just calling it\
    \ with a different name. So we don't have to write it out again and again for\
