    \ which could be installed on every machine on our network. This class has a lot\
    \ of information on the software, like the name, the version, the size, and more.\
    \ We also have a *repository* class that represents all the packages that we have\
    \ available for installation internally.\n\nIn this class, we want to know how\
    \ many packages there are and what's the total size of all the packages. In this\
    \ case, the repository isn't a package and the package isn't a repository. Instead,\
    \ the repository contains packages.\n\nTo model this within our code, the repository\
    \ class will have an attribute that could be a list or a dictionary, which will\
    \ contain instances of the package class. So for this scenario, we'll make use\
    \ of the code in the other classes by calling their methods. This is what's called\
    \ composition. Let's see this in action.\n\nWe'll first create a repository class\
    \ that starts with an empty dictionary of packages when it's created. The dictionary\
    \ will have the names of the packages as keys and the package objects as values.\
    \ Watch the illustration in this video.\n\n**Video 45** (4:55 *Composition*)\n\
    \n```python\nclass Repository:\n\n    def __init__(self):\n        self.packages\
    \ = {}\n```\n\nNice. We have our class, which starts with an empty dictionary\
    \ of packages. You might be wondering why we are adding the dictionary in the\
    \ constructor instead of directly to the class. The answer to this might be a\
    \ bit tricky to understand. So let's go back to our juicy apple example to help\
    \ make sure this is clear.\n\nWe defined earlier a class called *Apple* and set\
    \ some basic attributes for it, like color and flavor. All instances of the apple\
    \ class will be initialized with the values that we preset for those attributes.\n\
    \nIf we change the color of one apple from red to golden, we substitute the old\
