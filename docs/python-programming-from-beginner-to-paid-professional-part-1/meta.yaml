  md: '# 12.3. Additional Recursion Sources


    In the past sections, we visited the basic concepts of recursive functions. A
    recursive function must include a **recursive case** and **base** The recursive
    case calls the function again, with a different value. The base case returns a
    value without calling the same function.


    A recursive function will usually have this structure:


    ```

    recursive_function(modified_parameters)

    ```


    For more information on recursion, check out this resource:


    [Wikipedia Recursion](https://en.wikipedia.org/wiki/Recursion)'
