  md: '# 20.6. Augmenting Python with Modules


    Python modules are separate files that contain classes, functions, and other data
    that allow us to import and make use of these methods and classes in our own code.
    Python comes with a lot of modules out of the box. These modules are referred
    to as the **Python Standard** You can make use of these modules by using the **import**
    keyword, followed by the module name. For example, we''ll import the **random**
    module, and then call the **randint** function within this module:


    ```

    8

    7

    1

    ```


    This function takes two integer parameters and returns a random integer between
    the values we pass it; in this case, 1 and 10. You might notice that calling functions
    in a module is very similar to calling methods in a class. We use dot notation
    here too, with a period between the module and function names.


    Let''s take a look at another module: This module is super helpful when working
    with dates and times.


    ```

    >>> now = datetime.datetime.now()

    2021-06-29 14:24:54.667220

    ```'
