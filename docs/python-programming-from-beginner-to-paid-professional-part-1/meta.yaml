    Remember, that everybody learns at different speeds. So take your time, really
    get familiar with the concepts. Once you feel ready, the assessment is right below
    waiting for you. I''ll get back to you once you''ve nailed it.


    ## 5.2. Module 1 Graded Assessment - 10 Questions


    It''s time for your first graded assessment. Open the “Graded Assessments” folder
    you downloaded earlier. It contains the pdf files of all the graded assessments
