  mdcn: "## 19.2. 什么是方法？\n\n在对象上调用方法，就是执行操作该类特定实例属性的函数。这意味着，例如，在列表上调用方法只会修改该列表的实例，而不会影响全局的所有列表。\n\
    \n我们可以通过在类定义内部创建函数来定义类中的方法。这些实例方法可以接受一个名为 **self** 的参数，它代表正在执行该方法的实例。这将允许你使用点号表示法访问实例的属性，例如\
    \ `self.name` 将访问该类对象特定实例的 name 属性。\n\n当你拥有为不同实例包含不同值的变量时，这些变量被称为 **实例变量**。\n\n\
    ## 19.3. 构造函数和其他特殊方法\n\n到目前为止，我们一直在创建具有空值或默认值及其属性的类，然后在创建对象后设置属性值。这样做是可行的，但并不理想。这种方式意味着我们需要为每个要设置的属性编写单独的代码行，这很容易让人忘记设置某个重要的值。\n\
    \n我们人类非常擅长忘记做事，即使是重要的事情。因此，在编写代码时，最好提前采取措施，以防止以后忘记。所以，让我们在创建实例时就设置这些值。这样，我们就知道从实例创建的那一刻起，它就包含了所有重要的值，我们就不必担心了。\n\
    \n为此，我们需要使用一个名为 `__init__` 的特殊方法。让我们回到我们的苹果示例来看看它的实际应用：\n\n**视频 41** (2:23 *构造函数和其他特殊方法*)\n\
    \n```python\nclass Apple:\n    def __init__(self, color, flavor):\n        self.color\
    \ = color\n        self.flavor = flavor\n```\n\n类的构造函数是在调用类名时被调用的方法。它总是被命名为 `__init__`。你可能记得，所有以\
    \ **两个下划线** 开头和结尾的方法都是 **特殊方法**。\n\n在这里，我们定义了一个构造函数，一个非常重要的特殊方法。这个方法除了代表实例的 *self*\
    \ 变量外，还接收两个额外的参数：*color* 和 *flavor*。\n\n然后，该方法将这些值设置为当前实例的值。让我们看看这在苹果类的新实例上是如何工作的。\n\
    \n```python\njonagold = Apple(\"red\", \"sweet\")\n```\n\n很好。现在，让我们检查一下所有属性是否都已正确设置。\n\
    \n```python\nprint(jonagold.color)\n# 输出: red\n```\n\n完美！所以，现在通过添加一个设置属性的构造函数方法，我们可以在创建类时就设置好它的值。非常方便，对吧？\n\
    \n构造函数并不是我们可以编写的唯一特殊方法。当我们使用 *str* 或 *print* 函数将对象转换为字符串时，我们正在使用一个超级有用的特殊方法。但在我们继续定义一个之前，让我们看看如果我们不定义它会发生什么。\n\
    \n```python\nprint(jonagold)\n# 输出: <__main__.Apple object at 0x7fc4a58d5c18>\n\
    ```\n\n我们刚刚尝试打印我们的苹果实例，结果得到了一个非常奇怪的消息。里面有 *Apple* 和 *object* 这些词，但其余部分是什么？嗯，当我们没有指定打印对象的方式时，Python\
    \ 会使用 **默认方法**，打印对象在计算机内存中的存储位置（你的位置会不同）。这绝对不是我们想要的。\n\n如果你尝试打印某些内容，而 Python 打印出一串随机的数字和字母，你就会知道它很可能使用了默认表示，即对象在计算机内存中的位置。\n\
    \n那么，我们如何告诉 Python 打印对我们有意义的内容呢？我们使用特殊的 `__str__` 方法，它返回我们想要打印的字符串。让我们看看这是什么样子：\n\
    \n```python\nclass Apple:\n    def __init__(self, color, flavor):\n        self.color\
    \ = color\n        self.flavor = flavor\n    def __str__(self):\n        return\
    \ \"This apple is {} and its flavor is {}\".format(self.color, self.flavor)\n\
    ```\n\n通过定义特殊的 `__str__`，我们告诉 Python，当 print 函数被调用并传入我们类的实例时，我们希望它显示这个内容。来看看效果！\n\
    \n```python\njonagold = Apple(\"red\", \"sweet\")\nprint(jonagold)\n# 输出: This\
    \ apple is red and its flavor is sweet\n```\n\n所以 `__str__` 方法让我们可以打印友好的消息，而不是一堆数字。总的来说，在创建你想要打印的对象时，提前考虑并定义\
    \ `__str__` 方法是一个好主意。\n\n还有很多其他特殊方法。我们不会在这里查看其余的，但你可以在官方文档中找到学习更多相关内容的指引。你将在下一节找到该链接。这些概念是新的，而且不太容易理解。所以，如果你还在试图弄清楚方法和函数之间的区别，不要担心。\n\
    \n我们都经历过。建立信心的最佳方法是持续练习，直到弄清楚为止。你做得很好。所以继续加油！\n\n## 19.4. 特殊方法回顾\n\n我们不必创建具有空值或默认值的类，而可以在创建实例时设置这些值。这确保了我们不会错过重要的值，并避免了许多不必要的代码行。为此，我们使用一个称为构造函数的特殊方法。下面是一个定义了构造函数方法的\
    \ Apple 类示例。\n\n当你调用类名时，该类的构造函数就会被调用。这个构造函数方法总是被命名为 `__init__`。你可能记得特殊方法以两个下划线字符开头和结尾。在我们上面的例子中，构造函数方法接受代表实例的\
    \ self 变量，以及 color 和 flavor 参数。然后，构造函数方法使用这些参数来设置当前实例的值。所以现在我们可以创建一个新的 Apple 类实例，并一次性设置\
    \ color 和 flavor 值：\n\n```python\njonagold = Apple(\"red\", \"sweet\")\n```\n\n\
    除了 `__init__` 构造函数特殊方法外，还有 `__str__` 特殊方法。这个方法允许我们定义当对象实例传递给 print() 函数时如何打印它。如果一个对象没有定义这个特殊方法，它最终会使用默认表示，这将打印对象在内存中的位置。这没什么大用。\n\
    \n这是我们的 Apple 类，添加了 `__str__` 方法：\n\n```python\nclass Apple:\n    def __init__(self,\
    \ color, flavor):\n        self.color = color\n        self.flavor = flavor\n\
    \    def __str__(self):\n        return \"This apple is {} and its flavor is {}\"\
    .format(self.color, self.flavor)\n```\n\n现在，当我们把一个 Apple 对象传递给 print 函数时，我们得到了一个格式良好的字符串：\n\
    \n```python\nprint(jonagold)\n# 输出: This apple is red and its flavor is sweet\n\
    ```\n\n在创建你可能想要稍后打印的对象时，考虑你的类可能如何被使用，并定义一个 `__str__` 方法，这是一个好的实践。\n\n## 19.5.\
    \ 为函数、类和方法编写文档\n\n当你还在学习时，类和方法的世界可能会有点令人困惑，这就是为什么 help 函数会派上用场。你可能记得我们仍然可以使用 Python\
    \ 函数 *help* 来查找关于类和方法的文档。我们也可以对自己的类、方法和函数这样做。让我们来看看。\n\n**视频 42** (2:07 *为函数、类和方法编写文档*)\n\
    \n```python\nclass Apple:\n    def __init__(self, color, flavor):\n        self.color\
    \ = color\n        self.flavor = flavor\n    def __str__(self):\n        return\
    \ \"This apple is {} and its flavor is {}\".format(self.color, self.flavor)\n\
    ```\n\n我们将从之前使用的 Apple 类开始，现在我们来寻求一些帮助：\n\n```python\nhelp(Apple)\n```\n\n```\n\
    class Apple(builtins.object)\n |  Apple(color, flavor)\n |\n |  Methods defined\
    \ here:\n |\n |  __init__(self, color, flavor)\n |      Initialize self.  See\
    \ help(type(self)) for accurate signature.\n |\n |  __str__(self)\n |      Return\
