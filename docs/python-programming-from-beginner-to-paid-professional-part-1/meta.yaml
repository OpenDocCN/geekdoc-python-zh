    ## 15. Lists


    ### 15.1. What is a List?


    As you know by now, Python comes with a lot of ready-to-use data types. We''ve
    seen integers, floats, Booleans, and strings in detail. But those data types can
    only take you so far. Eventually in your scripts, you want to develop code that
    manipulates collections of items like a list of strings representing all the file
    names in a directory or a list of integers representing the size of network packets.


    This is where the list data type comes in handy. You can think of lists as long
    boxes with the space inside the box divided up into different slots.


    Video 31 (3:06 *What is a List?*)


    Each slot can contain a different value. Like we mentioned earlier when we first
    came across the list, in Python, we use square brackets [] to indicate where the
    list starts and ends. Let''s check out an example:


    ```

    x = ["Now", "we", "are", "cooking!"]

    ```


    Here, we''ve created a new variable called x and set its contents to be a list
    of strings. We can check the type of x using the *type* function we saw a little
    while ago:


    ```

    type(x)

    ```


    ‘list’>


    Nice. Python tells us this is a list. In the same way, we''ve done with other
    variables, we can show the contents of the whole list using the *print* function:


    ```

    print(x)

    [‘Now’, ‘we’, ‘are’, ‘cooking!’]

    ```


    The **length** of the list is how many elements it has. To get that value, we''ll
    use the same *len* function we used for strings:


    ```

    len(x)

    4

    ```


    That''s right. Our list has four elements. When calling *len* for the list, it
    doesn''t matter how long each string is on its own. What matters is how many elements
    the list has. To check if a list contains a certain element, you can use the keyword
    *in* like in these examples:


    ```

    “are” in x

    True

    “Today” in x

    False

    ```


    Again, like when we use this with strings, the result of this check is a Boolean,
    which we can use as a condition for branching or looping. We can also use indexing
    to access individual elements depending on their position in the list. To do that,
    we use the square brackets and the index we want to access, exactly like we did
    with strings:


    ```

    print(x[0])

    Now

    print(x[3])

    cooking!

    ```


    Remember that the first element is given the index zero. This means the last index
    of the list will be the length of the list minus one. What happens if we try to
    access an element after the end of the list?


    ```

    print(x[4])

    IndexError: List index out of range

    ```


    You might have seen this coming. We get an index error. We can''t go over the
    end of the list. Remember that because list indexes start at zero, accessing the
    item at index 4 means we''re trying to access the 5th element in the list. There
    are only 4 elements. So we''re out of range if we try to access the index number
    4.


    Does this seem a bit confusing? If it does, the visualization in the video might
    help you out. As you can see in the video, index 4 doesn''t point at anything
    since there''s no slot 4 in our list.


    As with strings, we can also use indexes to create a **slice** of the list. For
    this, we use ranges of two numbers separated by a colon:


    ```

    x[1:3]

    [''we'', ''are'']

    ```


    Again, the second element is not included in the slice. So the range goes to the
    second index minus one. Here’s another example:


    ```

    x[:2]

    [''Now'', ''we'']

    ```


    Here, we start at index one and go up to 1 less than 3, which is 2. We can also
    leave out one of the range indexes empty:


    ```

    x[2:]

    [''are'', ''cooking!'']

    ```


    The first value defaults to 0 and the second value to the length of the list.
    Makes sense? If all this sounds really familiar to what we said about strings,
    then this course is working as intended. That''s because strings and lists are
    very similar data types.


    In Python, **strings** and **lists** are both **examples of** sequences. There
    are other sequences too, and they all share a bunch of operations like iterating
    over them using *for* loops, indexing using the *len* function to know the length
    of the sequence, using + to concatenate two sequences and using *in* to verify
    if the sequence contains an element. So this is great news.


    While understanding indexing is hard, once you know it for one data type, you''ve
    pretty much mastered it for every data type. So you actually know way more than
    you thought.


    Wow! Now, we''re really cooking! Next up, we''re going to look at some more list
    operations. This time, actually specific to lists.


    ### 15.2. Lists Defined


    Lists in Python are defined using square brackets, with the elements stored in
    the list separated by commas: **list = ["This", "is", "a"**, You can use the **len()**
    function to return the number of elements in a list: **len(list)** would return


    You can also use the **in** keyword to check if a list contains a certain element.
    If the element is present, it will return a True boolean. If the element is not
    found in the list, it will return False. For example, **"This" in list** would
    return True in our example.


    Similar to strings, lists can also use indexing to access specific elements in
    a list based on their position. You can access the first element in a list by
    doing which would allow you to access the string


    In Python, lists and strings are quite similar. They''re both examples of sequences
    of data. Sequences have similar properties, like (1) being able to iterate over
    them using **for** (2) support indexing; (3) using the **len** function to find
    the length of the sequence; (4) using the plus operator + in order to concatenate;
    and (5) using the **in** keyword to check if the sequence contains a value. Understanding
    these concepts allows you to apply them to other sequence types as well.'
