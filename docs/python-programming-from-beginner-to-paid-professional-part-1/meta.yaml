    # 16.1. What is a Dictionary?


    How are you feeling so far? Lists and strings are pretty cool, right? These tools
    let us do a ton of neat stuff in our code so they can be super fun to experiment
    with.


    We''re now going to learn about another data type, Like lists, dictionaries are
    used to organize elements into collections. Unlike lists, you don''t access elements
    inside dictionaries using their position. Instead, **the data inside dictionaries
    take the form of pairs of keys and**


    To get a dictionary value we use its corresponding key. Another way these two
    vary is while in a list the index must be a number, in a dictionary you can use
    a bunch of different data types as keys, like strings, integers, floats, tuples,
    and more.


    The name dictionary comes from how they work in a similar way to human language
    dictionaries. In an English language dictionary, the word comes with a definition.
    In the language of a Python dictionary, the word would be the key and the definition
    would be the value. Make sense? Let''s check out an example.


    **Video 36** (4:02 *What is a dictionary?*)


    You can create an empty dictionary in a similar way to creating an empty list,
    except instead of square brackets dictionaries use **curly brackets** to define
    their content.'
