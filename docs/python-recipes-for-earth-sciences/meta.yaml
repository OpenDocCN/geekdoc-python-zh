    of representation of the data undoubtedly has its advantages, histograms are a
    much more convenient way of displaying univariate data (Fig. 3.1). Histograms
    divide the range of the data into nbin equal intervals (also called bins or classes),
    count the number of observations n in each bin, and display the frequency distribution
    of observations as a bar plot. The bins are defined either by their edges e or
    their centers v. There is no fixed rule for the correct number of bins, and the
    most suitable number depends on the application (e.g., the statistical method)
    that is used. Ideally, the number of bins n should lie between 5 and 15; it should
    closely reflect the underlying distribution and should not result in any empty
    bins (i.e., in classes with no counts). In practice, the square root of the total
    number of'
