    # 4.11 Classical Linear Regression of Log-Transformed Data


    A common error in regression analysis occurs when bivariate data with an exponential
    relationship are log-transformed, a best-fit line is then calculated using a least-squares
    linear regression, and the result is finally transformed back. Below is a simple
    Python example that demonstrates a better fitting of a curve to bivariate data
    with an exponential relationship.


    Log-transforming the $y$-values has two important consequences that can influence
    the result: First, if the relationship between the data is of the type $y = a_0
    + a_1 \cdot e^x$, then logarithmizing $y$-values in the form $\log(y)$ does not
    provide a complete linearization of the data because the parameters $a_0$ and
    $a_1$ are not taken into account. Second, classical regression assumes that $y$
    responds to $x$ and that the entire dispersion in the data set is contained within
    the $y$-value (see Sect. 4.3).'
  merge: -1
  pgno: 158
- img_proc: true
  md: "This means that $x$ is the independent variable defined by the experimenter\
    \ and can be regarded as being free of errors. Linear regression minimizes the\
    \ deviations $\\Delta y$ between the data points $xy$ and the value $y$ predicted\
    \ by the best-fit line $y=b_0+b_1x$ using a least-squares criterion. The classic\
    \ linear regression method makes two assumptions about the data: (1) that there\
    \ is a linear relationship between $x$ and $y$ and (2) that the unknown errors\
    \ around the means have a normal (Gaussian) distribution with a similar variance\
    \ for all data points. Logarithmizing the $y$-values violates this assumption\
    \ because errors then have a log-normal distribution and the regression therefore\
    \ places less weight on the larger $y$-values.\n\nTo see the difference in the\
    \ results, we first create a synthetic data set. The $y$-values, which are stored\
    \ in data2, have an exponential relationship with the $x$-values, which are stored\
    \ in data1. After computing the $x$- and $y$-values, we add Gaussian noise to\
    \ the $y$-values in data2:\n\n```\n%reset -f\n\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\nfrom scipy.optimize import curve_fit\nfrom numpy.random import default_rng\n\
    \nrng = default_rng(10)\ndata1 = np.linspace(0.5,3.,26)\ndata1 = data1 + 0.2*rng.standard_normal(np.shape(data1))\n\
    data1 = np.sort(data1,axis=0)\ndata2 = 3 + 0.2*np.exp(data1)\ndata2 = data2 +\
    \ 0.5*rng.standard_normal(np.shape(data2))\n```\n\nBelow is the linear fit of\
    \ the logarithmized data using polyfit():\n\n```\np = np.polyfit(data1,np.log(data2),1)\n\
    ```\n\nWe then use curve_fit() to calculate the nonlinear fit without transforming\
    \ the data (see Sect. 4.10):\n\n```\ndef func(x,a,b):\n    return a*np.exp(x)+b\n\
    \npopt,pcov = curve_fit(func,data1,data2)\nprint(popt)\n```\n\nWe can also calculate\
