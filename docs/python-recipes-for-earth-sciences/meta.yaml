    # 3.6 Hypothesis Testing


    The following sections deal with methods used to draw conclusions from the statistical
    sample, which can then be applied to the larger population of interest (*hypothesis
    testing*) (Sects. 3.6 to 3.12). All hypothesis tests share the same concept and
    terminology. The *null hypothesis* is an assertion about the population that describes
    the absence of a statistically significant characteristic or effect, whereas an
    *alternative hypothesis* is a contrasting assertion. The *p-value* of a hypothesis'
  merge: -1
