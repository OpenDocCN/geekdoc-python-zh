- md: "However, we use Landsat 8 data to create an RGB composite of Bands 4, 3, and\
    \ 2 for use in fieldwork. Since the image has a relatively low level of contrast,\
    \ we use `equalize_adapthist()` to perform contrast-limited adaptive histogram\
    \ equalization (CLAHE) (Zuiderveld 1994). Unlike `equalize_hist()`, which we used\
    \ before, `equalize_adapthist()` works on small regions (or tiles) of the image\
    \ rather than on the entire image. The neighboring tiles are then combined using\
    \ bilinear interpolation in order to eliminate edge effects:\n\n```python\nI1\
    \ = exposure.equalize_adapthist(I1,\n    clip_limit=0.1, nbins=256)\nI2 = exposure.equalize_adapthist(I2,\n\
    \    clip_limit=0.1, nbins=256)\nI3 = exposure.equalize_adapthist(I3,\n    clip_limit=0.1,\
    \ nbins=256)\n```\n\nUsing `clip_limit` with a real scalar between 0 and 1 limits\
    \ the contrast enhancement. Higher numbers result in increased contrast, and the\
    \ default value is 0.01. Using a `clip_limit` of 0.1 yields good results. The\
    \ three bands are concatenated into a 24-bit RGB image using `dstack()`:\n\n```python\n\
    I = np.dstack([I1, I2, I3])\n```\n\nWe only display the section of the image that\
    \ contains the Chew Bahir basin (using axes limits), and we hide the coordinate\
    \ axes:\n\n```python\nI8 = exposure.rescale_intensity(I,\n    out_range='uint8')\n\
    \nplt.figure()\nplt.imshow(I8)\nplt.xlim([3000, 5000])\nplt.ylim([1000, 4000])\n\
    plt.show()\n```\n\nThe function `rescale_intensity()` from the `exposure` module\
    \ of the scikit-image package does two things for us: First, it returns images\
    \ after stretching or shrinking their intensity levels in order to improve the\
    \ contrast. Second, it converts the data from any type to `uint8` without rolling\
    \ the values around the value range [0, 255], as occurs when using `uint8()` from\
    \ the NumPy package (see Sect. 2.5). To export the processed image, we use the\
    \ command\n\n```python\nio.imsave('chewbahirbasin.tif',\n    I8[999:4000, 2999:5000])\n\
    ```\n\nThis command saves the RGB composite as the TIFF file *chewbahirbasin.tif*\
    \ (about 18 MB) in the working directory, which can then be processed using other\
    \ software, such as Adobe Photoshop.\n\nAccording to the USGS Landsat website,\
    \ Landsat data are among the most geometrically and radiometrically corrected\
    \ data available. Data anomalies do occasionally occur, however, and the most\
    \ common types are listed on the USGS website:\n\nhttps://www.usgs.gov/land-resources/nli/landsat/landsat-known-issues\n\
    \nWe explore one of these types of anomalies as an example: namely artifacts known\
    \ as *Single Event Upsets* (SEUs), which cause anomalously high values in the\
    \ image and are similar to *Impulse Noise* (IN), which is also described on the\
    \ same website. These anomalies occur in some – but not all – Landsat images,\
    \ and similarly anomalous high or low values can also occur in other satellite\
    \ images. We therefore use part of a Landsat 7 image that covers an area in the\
    \ southern Ethiopian Rift and that was acquired by the satellite’s Enhanced Thematic\
    \ Mapper (ETM+) instrument. We can load and display the image using\n\n```python\n\
    I1 = io.imread('ethiopianrift_blue.tif')\nI1 = exposure.rescale_intensity(I1)\n\
    \nplt.figure()\nio.imshow(I1, cmap='gray')\nplt.title('Original image')\nplt.axis('off')\n\
    io.show()\n```\n\nImage `I1` shows numerous randomly distributed anomalously high\
    \ or low values as well as a parallel track of paired anomalies in the right half.\
    \ We first apply a 10-by-10-pixel median filter to the image (see Sect. 8.8):\n\
    \n```python\nI2 = filters.median(I1,\n    np.ones((9, 9)), mode='reflect')\n\n\
    plt.figure()\nio.imshow(I2, cmap='gray')\nplt.title('Median filtered image')\n\
    plt.axis('off')\nio.show()\n```\n\nThe median-filtered version of image `I2` is,\
    \ of course, very smooth compared with the original image `I1`; however, we would\
    \ lose a lot of detail if we used this version of the image. We next subtract\
    \ median-filtered image `I2` from the original image `I1`, which yields image\
    \ `I3`:\n\n```python\nI3 = np.float64(I2) - np.float64(I1)\nI3 = np.clip(I3, 0,\
    \ 255)\nI3 = np.uint8(I3)\n\nplt.figure()\nio.imshow(I3, cmap='gray')\nplt.title('I2-I1')\n\
    plt.axis('off')\nio.show()\n```\n\nWe then subtract the original image `I1` from\
    \ the median-filtered image `I2`, which yields image `I4`:\n\n```python\nI4 =\
    \ np.float64(I1) - np.float64(I2)\nI4 = np.clip(I4, 0, 255)\nI4 = np.uint8(I4)\n\
    \nplt.figure()\nio.imshow(I4, cmap='gray')\nplt.title('I1-I2')\nplt.axis('off')\n\
    io.show()\n```\n\nWe next replace the original pixels with their median-filtered\
    \ versions if the difference between the median-filtered image `I2` and the original\
    \ image `I1` is greater than 10 in both directions (as it is in our example):\n\
    \n```python\nI5 = np.copy(I1)\nI5[(I3 > 10) | (I4 > 10)] = I2[(I3 > 10) | (I4\
    \ > 10)]\n\nplt.figure()\nio.imshow(I5, cmap='gray')\nplt.title('Despeckled image')\n\
