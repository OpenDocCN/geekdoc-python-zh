    \ 7.8）。在这种情况下，建议删除两个控制点中的一个，并将剩余控制点的 z 值替换为两个 z 值的算术平均值。\n\n`griddata()` 提供的第三种方法——除了*双线性*（线性）和*双三次*（三次）插值之外——涉及使用*最近邻*（nearest）插值方法。我们在下一个示例中比较所有这些方法。我们首先清除工作区，从\
