    \ image and convert I1 to grayscale using rgb2gray():\n\n```\nI2 = color.rgb2gray(I1)\n\
    \nplt.figure()\nio.imshow(I2)\nplt.axis('off')\nio.show()\n```\n\nWe then use\
    \ equalize_adapthist() to perform contrast-limited adaptive histogram equalization\
    \ (CLAHE) in order to enhance the contrast in the image (Zuiderveld 1994):\n\n\
    ```\nI3 = np.zeros(np.shape(I1))\nI3 = exposure.equalize_adapthist(I2,\n    clip_limit=0.1,nbins=256)\n\
    \nplt.figure()\nio.imshow(I3)\nplt.axis('off')\nio.show()\n```\n\nIn this case,\
    \ clip_limit limits the contrast enhancement using a real scalar from 0 to 1,\
    \ with higher numbers resulting in greater contrast (the default value is 0.01).\
    \ Using a clip_limit of 0.1 yields good results. Using threshold() then converts\
    \ image I3 to a binary image I4 via thresholding. We manually change the threshold\
    \ value until we get a reasonable result and find 0.55 to be a suitable threshold:\n\
    \n```\nthresh,I4 = cv2.threshold(I3,\n    0.55,1.,cv2.THRESH_BINARY)\nI4 = exposure.rescale_intensity(I4,\n\
    \    out_range='uint8')\n\nplt.figure()\nio.imshow(I4)\nplt.axis('off')\nio.show()\n\
    ```"
  - "[PAGE 378]\n\nThe function `hough_line()` implements the Hough transform in order\
    \ to return the Hough transform accumulator H, the angles theta at which the transform\
    \ was computed (in radians), and the distance values dists:\n\n```\nH,theta,dists\
    \ = transform.hough_line(I4)\n```\n\nWe then display the Hough transform accumulator\
    \ H using\n\n```\nplt.figure()\nio.imshow(exposure.equalize_adapthist(H),\n  \
    \  cmap='hot',aspect='auto')\nplt.xlabel('Theta')\nplt.ylabel('Rho')\nplt.title('Hough\
    \ transform')\nio.show()\n```\n\nWe can determine the 15 maxima of the Hough transform,\
    \ which correspond to the 15 most prominent lines in the image. We then calculate\
    \ the y-intercepts yintcs and the slopes slopes of these lines in the image:\n\
    \n```\nH,theta,dists = transform.hough_line_peaks(H,\n    theta,dists,num_peaks=15,min_distance=20)\n\
    \nyintcs = dists*np.array([np.cos(theta),\n    np.sin(theta)])\nyintcs = np.transpose(yintcs)\n\
    slopes = np.tan(theta+np.pi/2)\n```\n\nThis information can now be used to display\
    \ the lines on the image:\n\n```\ns = np.shape(I1)\n\nplt.figure()\nax = plt.axes()\n\
    io.imshow(I1)\nplt.axis('off')\nfor i in range(0,len(dists)):\n    ax.axline((yintcs[i,0],yintcs[i,1]),\n\
    \        slope=slopes[i])\nplt.axis(np.array([0,s[1],s[0],0]))\nio.show()\n```\n\
    \nThe result reveals that the clearly recognizable white layers are well detected,\
    \ whereas the less pronounced layers are not identified. The method also mistakenly\
    \ marks non-existing lines on the image due to the low quality of the image. Using"
- md: "## 8.13 The Normalized Difference Vegetation Index NDVI\n\nPlant pigments reflect\
    \ near-infrared light (700 to 1,100 nm), whereas they strongly absorb visible\
    \ light (400 to 700 nm) for use in photosynthesis. The *normalized difference\
    \ vegetation index* (NDVI) is an index used to map living green vegetation that\
    \ is calculated with the formula\n\n$$NDVI = \\frac{(NIR - R)}{(NIR + R)}$$\n\n\
    using the spectral reflectance measurements acquired in the near-infrared (NIR)\
    \ and red (R) spectral bands. The index can be measured with ground-based spectral\
    \ cameras as well as by using drones, aircraft, or satellites. The cameras that\
    \ are used are normally very expensive, but some rather inexpensive alternatives\
    \ are now available, including the AgroCam (https://www.agrocam.eu) and the MAPIR\
    \ Survey Camera (https://www.mapir.camera). These cameras are used in professional\
    \ applications, but due to their low prices, they are also suitable for student\
    \ exercises.\n\nSince the MAPIR cameras (which are manufactured by Peau Productions,\
    \ Inc., in San Diego, CA) have the same size and shape as the popular GoPro camera\
    \ system, they can make use of all the accessories of the popular GoPro action\
    \ camcorder, such as memory cards, camera mounts, and housings. We built an inexpensive\
    \ multispectral array consisting of four cameras that record NDVI Red+NIR (650\
    \ and 850 nm), Blue (450 nm), Green (550 nm), and Visible Light RGB (~370 to 650\
    \ nm).\n\nThe following example explains how to acquire images with MAPIR cameras,\
    \ how to import and process the images with Python, and how to calculate the NDVI\
    \ in order to detect vegetation in an image. When editing images from the MAPIR\
    \ Survey2 NDVI camera, we learn a lot about how cameras actually capture and store\
    \ images. This is important in order to be able to correctly import the images\
    \ into Python, to process them, and to compute the corresponding NDVI images.\
    \ Failing to correctly complete any of these three steps yields an image that\
    \ can be immediately seen to be unsatisfactory.\n\nThe following script uses information\
    \ about the camera provided on the manufacturer's website (https://www.mapir.camera).\
    \ The example does not include any calibration of the camera and uses an auto\
    \ white balance rather than a true white balance with a white reference. According\
    \ to the MAPIR website's information on *Calibrating Images in QGIS with MAPIR\
    \ Plugin*, the Survey2 cameras capture 16 bit RAW photos, which means that there\
    \ are 16 bit pixels with intensity values ranging from 0 to 65,535. When the camera\
    \ saves a JPEG file, it compresses the image, thereby leaving a range of only\
    \ 0 to 255. We first define a file name and the size of the image:\n\n```\n%reset\
    \ -f\n\nimport cv2\nimport numpy as np\nimport rasterio as rasterio\nimport matplotlib.pyplot\
    \ as plt\nfrom matplotlib.colors import ListedColormap\nfrom skimage import color\n\
    from skimage import exposure\nfrom skimage import io\nfrom skimage import feature\n\
    from skimage import transform\nfrom skimage import draw\n\nfilename = '2017_0328_110031_007.RAW';\n\
    row = 3456;\ncol = 4608;\n```\n\nAccording to the MAPIR specification page for\
    \ the Survey2 NDVI camera, the device uses a Sony Exmor IMX206 16MP (Bayer RGB),\
    \ which is important information required for correctly loading the images in\
    \ Python. However, the sensor specification page at Sony, Inc., says that the\
    \ sensor actually acquires 12 bit images, which is in agreement with information\
    \ received via email from the software engineer at Peau Productions, Inc., in\
    \ March 2017, but not with what is stated on the company's website. With the support\
    \ of this software engineer, our own research, and some support from readers of\
    \ Stack Overflow (http://stackoverflow.com), we managed to solve the problem:\
    \ If we read the data in a uint16 array in Python, reshape it to (row,col), and\
    \ display the image, we find that we have arrived at the correct solution:\n\n\
    ```\nwith open(filename) as fid:\n    I1 = np.fromfile(fid,dtype='<u2')\n\nI1\
    \ = np.reshape(I1,(row,col))\n```\n\nIn this code, the data type <u2 stands for\
    \ little-endian 2 byte (or 16 bit) unsigned integers. The MAPIR Survey2 NDVI camera\
    \ measures red (660 nm) and near-infrared (850 nm) radiances for the NDVI calculation.\
    \ However, our red and infrared data are nowhere to be found in the grayscale\
    \ image. The Sony sensor is a single-chip sensor that stores the three colors\
    \ (red, green, and blue) in a single array I1, which is displayed as a grayscale\
    \ image using the default gray colormap in Python. Most cameras have single-chip\
    \ sensors, as is even the case with single-lens reflex cameras (SLRs), which can\
    \ store images in the RAW format (in addition to in the JPEG format) by using\
    \ lossy compression. More expensive three-sensor cameras also exist that use separate\
    \ sensors for the filtered red, green, and blue color ranges.\n\nSingle-chip cameras\
    \ store RGB images on their single chips using the Bayer mosaic, which was named\
    \ after Bryce Bayer (1929–2012), a research scientist at Eastman Kodak (see http://en.wikipedia.org\
    \ for more information on Bayer mosaics) (Fig. 8.14). Bayer’s idea was to use\
    \ filters and to direct the individual colors of red, green, and blue onto individual\
    \ sensor pixels, which are usually in an RGGB arrangement because the human eye\
    \ reacts more sensitively to green than to red or blue. Due to the Bayer mosaic,\
    \ SLRs with 16 MP resolution (e.g., that of our Sony chip) do not really take\
    \ 16 MPs, but only 4 MPs each for red and blue (25 % each) and 8 MPs for green\
    \ (50 %), and they then interpolate each of the three colors to 16 MPs.\n\nThe\
    \ RAW format provided by SLRs therefore does not mean that the colors are stored\
    \ in full resolution, but rather that the images are not compressed (e.g., using\
    \ the JPEG algorithm). Using Python instead, we can import and process the image\
    \ with its original resolution (i.e., 4 MPs for red and blue and 8 MPs for green).\
    \ Alternatively, we can demosaic the image in the same way that an SLR does, for\
    \ example, by using the Python function cvtColor(). Demosaicing the image converts\
    \ a Bayer pattern encoded image to a true-color (RGB) image using gradient-corrected\
    \ linear interpolation. According to the MAPIR website, the red (660 nm) radiance\
    \ is stored in the red image channel, the near-infrared (850 nm) radiance is stored\
    \ in the blue image channel, and no information is stored in the green channel.\n\
    \nWhen using imshow() to display I2 as a true-color RGB image, we find blue hues\
    \ in areas with high reflection in the NIR spectral band (and hence also denser\
    \ living green vegetation), whereas all other areas with low NIR values are more\
    \ red in color:\n\nFig. 8.14 Bayer RGGB pattern helps to store RGB images on the\
    \ sensor of a single-chip camera. The pattern contains twice as many green pixels\
    \ as red and blue pixels because the human eye reacts more sensitively to green\
    \ than to either of the other two colors.\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_383_0.png)\n\
    \nFig. 8.13 Automated detection of pollen grains (mostly *Asteraceae*, with less\
    \ abundant *Caesalpiniaceae* and *Lamiaceae* pollen) in a microscopic image of\
    \ Argentine honey using `hough_circle()` (original image courtesy of K. Schitteke\
    \ and F. Flores): **a** original RGB image and **b** pollen grains detected using\
    \ the Hough transform.\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_379_0.png)\n\
    \na better-quality image and carefully adjusting the parameters used with the\
    \ Hough transform would yield better results.\n\nIn the second example, the Hough\
    \ transform is used to automatically count pollen grains in a microscopic image\
    \ of Argentine honey (Fig. 8.13). The quality of the image is again not perfect,\
    \ which is why we cannot expect optimum results. In particular, the image of three-dimensional\
    \ objects was taken with very high magnification and is thus slightly blurred.\
    \ We first read the pollen image and store it in the variable I1. The size of\
    \ the image is 968-by-1,060 pixels of three colors (red, green, and blue). Since\
    \ the image is relatively large, we reduce the image size by a factor of two:\n\
    \n```\nI1 = io.imread('pollen.jpg')\nI1 = I1[::2,::2,:]\n\nplt.figure()\nio.imshow(I1)\n\
    plt.axis('off')\nio.show()\n```\n\nWe can then reject the color information of\
    \ the image and use the red color only:\n\n```\nI2 = I1[:,:,1]\n\nplt.figure()\n\
    io.imshow(I2)\nplt.axis('off')\nio.show()\n```\n\nNext, we use equalize_adapthist()\
    \ to perform contrast-limited adaptive histogram equalization (CLAHE) in order\
    \ to enhance the contrast in the image (Zuiderveld 1994):\n\n```\nI3 = np.zeros(np.shape(I1))\n\
    I3 = exposure.equalize_adapthist(I2)\n\nplt.figure()\nio.imshow(I3)\nplt.axis('off')\n\
    io.show()\n```\n\nThe function hough_circle() implements the Hough transform and\
    \ extracts circles from the original image:\n\n```\nI4 = feature.canny(I3,\n \
    \   low_threshold=0.2,high_threshold=0.92)\n\nhough_radii = np.arange(12,20)\n\
    hough_res = transform.hough_circle(I4,hough_radii)\nH,cx,cy,radii = transform.hough_circle_peaks(\n\
    \    hough_res,hough_radii,\n    min_xdistance=20,min_ydistance=20,\n    total_num_peaks=1000)\n\
    nstr = 'Number of pollen grains: '+str(len(radii))\n```\n\nWe then display the\
    \ circles on the grayscale image I2:\n\n```\nm,n,p = np.shape(I1)\nplt.figure()\n\
    plt.axis('off')\nI2 = color.gray2rgb(I2)\nfor i in range(0,len(H)):\n    circy,circx\
    \ = draw.circle_perimeter(cy[i],\n        cx[i],radii[i])\n    circyn = np.delete(circy,(circy>=m)|(circx>=n))\n\
    \    circxn = np.delete(circx,(circy>=m)|(circx>=n))\n    I2[circyn,circxn] =\
    \ (255,0,0)\n    io.imshow(I2)\nio.imshow(I2,cmap='gray')\nplt.title(nstr)\nio.show()\n\
    ```\n\nThe edge color of the circles in the graphics is set to b (for blue). The\
    \ result indicates that we have counted 910 pollen grains using this method. The\
    \ algorithm identifies most of the objects, but some are not recognized, and some\
    \ of the larger objects are mistakenly identified as two or more pollen grains.\
    \ Using a better-quality image and carefully adjusting the parameters used with\
    \ the Hough transform would yield better results. Plotting the histogram of the\
    \ pollen radii using hist()\n\n```\nplt.figure()\nplt.hist(radii)\nplt.show()\n\
    ```\n\nreveals that most of the grains have a radius of around 15 pixels."
  mdcn: "## 8.13 归一化差值植被指数 NDVI\n\n植物色素反射近红外光（700至1100纳米），同时强烈吸收可见光（400至700纳米）用于光合作用。*归一化差值植被指数*（NDVI）是一种用于绘制活体绿色植被分布图的指数，其计算公式为\n\
    \n$$NDVI = \\frac{(NIR - R)}{(NIR + R)}$$\n\n其中使用了在近红外（NIR）和红光（R）光谱波段获取的光谱反射率测量值。该指数可通过地面光谱相机以及无人机、飞机或卫星进行测量。所使用的相机通常非常昂贵，但现在也有一些相当便宜的替代品，包括AgroCam（https://www.agrocam.eu）和MAPIR\
    \ Survey Camera（https://www.mapir.camera）。这些相机用于专业应用，但由于其价格低廉，也适合学生练习使用。\n\n由于MAPIR相机（由位于加州圣地亚哥的Peau\
    \ Productions, Inc.制造）与流行的GoPro相机系统尺寸和形状相同，因此可以利用所有流行的GoPro运动摄像机配件，例如存储卡、相机支架和外壳。我们构建了一个由四台相机组成的廉价多光谱阵列，用于记录NDVI红光+近红外（650和850纳米）、蓝光（450纳米）、绿光（550纳米）和可见光RGB（约370至650纳米）。\n\
    \n以下示例说明了如何使用MAPIR相机获取图像，如何使用Python导入和处理图像，以及如何计算NDVI以检测图像中的植被。在编辑来自MAPIR Survey2\
    \ NDVI相机的图像时，我们深入了解了相机实际如何捕获和存储图像。这对于能够正确地将图像导入Python、处理它们并计算相应的NDVI图像非常重要。未能正确完成这三个步骤中的任何一个，都会立即产生不令人满意的图像。\n\
    \n以下脚本使用了制造商网站（https://www.mapir.camera）上提供的相机信息。该示例不包括任何相机校准，并使用自动白平衡而非带有白色参考的真实白平衡。根据MAPIR网站上关于*在QGIS中使用MAPIR插件校准图像*的信息，Survey2相机拍摄16位RAW照片，这意味着像素为16位，强度值范围从0到65,535。当相机保存JPEG文件时，它会压缩图像，从而仅留下0到255的范围。我们首先定义文件名和图像大小：\n\
    \n```\n%reset -f\n\nimport cv2\nimport numpy as np\nimport rasterio as rasterio\n\
    import matplotlib.pyplot as plt\nfrom matplotlib.colors import ListedColormap\n\
    from skimage import color\nfrom skimage import exposure\nfrom skimage import io\n\
    from skimage import feature\nfrom skimage import transform\nfrom skimage import\
    \ draw\n\nfilename = '2017_0328_110031_007.RAW';\nrow = 3456;\ncol = 4608;\n```\n\
    \n根据MAPIR关于Survey2 NDVI相机的规格页面，该设备使用Sony Exmor IMX206 16MP（Bayer RGB），这是在Python中正确加载图像所需的重要信息。然而，Sony,\
    \ Inc.的传感器规格页面显示，该传感器实际上获取的是12位图像，这与2017年3月从Peau Productions, Inc.的软件工程师通过电子邮件收到的信息一致，但与公司网站上的声明不符。在该软件工程师的支持、我们自己的研究以及Stack\
    \ Overflow（http://stackoverflow.com）一些读者的帮助下，我们设法解决了这个问题：如果我们在Python中以uint16数组读取数据，将其重塑为（行，列）并显示图像，我们会发现我们找到了正确的解决方案：\n\
    \n```\nwith open(filename) as fid:\n    I1 = np.fromfile(fid,dtype='<u2')\n\n\
    I1 = np.reshape(I1,(row,col))\n```\n\n在此代码中，数据类型<u2代表小端序2字节（或16位）无符号整数。MAPIR Survey2\
    \ NDVI相机测量红光（660纳米）和近红外（850纳米）辐射度以进行NDVI计算。然而，我们的红光和红外数据在灰度图像中无处可寻。Sony传感器是单芯片传感器，将三种颜色（红、绿、蓝）存储在单个数组I1中，该数组使用Python中的默认灰色颜色映射显示为灰度图像。大多数相机都有单芯片传感器，即使是单镜头反光相机（SLR）也是如此，它们可以通过使用有损压缩将图像存储为RAW格式（除了JPEG格式）。也存在更昂贵的三传感器相机，它们使用单独的传感器来处理滤波后的红、绿、蓝颜色范围。\n\
    \n单芯片相机使用Bayer马赛克在其单芯片上存储RGB图像，该马赛克以Bryce Bayer（1929–2012）命名，他是伊士曼柯达公司的研究科学家（有关Bayer马赛克的更多信息，请参见http://en.wikipedia.org）（图8.14）。Bayer的想法是使用滤光片并将红、绿、蓝的各个颜色引导到各个传感器像素上，这些像素通常采用RGGB排列，因为人眼对绿色的反应比对红色或蓝色更敏感。由于Bayer马赛克，具有1600万像素分辨率（例如我们的Sony芯片）的SLR实际上并非真正拍摄1600万像素，而是红光和蓝光各400万像素（各占25%），绿光800万像素（占50%），然后将每种颜色插值到1600万像素。\n\
    \n因此，SLR提供的RAW格式并不意味着颜色以全分辨率存储，而是图像未被压缩（例如使用JPEG算法）。相反，使用Python，我们可以以原始分辨率（即红光和蓝光各400万像素，绿光800万像素）导入和处理图像。或者，我们可以像SLR一样对图像进行去马赛克处理，例如使用Python函数cvtColor()。对图像进行去马赛克处理会将Bayer模式编码的图像转换为真彩色（RGB）图像，使用梯度校正线性插值。根据MAPIR网站，红光（660纳米）辐射度存储在红色图像通道中，近红外（850纳米）辐射度存储在蓝色图像通道中，绿色通道中不存储任何信息。\n\
    \n当使用imshow()将I2显示为真彩色RGB图像时，我们发现在近红外光谱波段反射率高的区域（因此也是更密集的活体绿色植被）呈现蓝色色调，而所有其他近红外值低的区域则更偏红色：\n\
    \n图8.14 Bayer RGGB模式有助于在单芯片相机的传感器上存储RGB图像。该模式包含的绿色像素是红色和蓝色像素的两倍，因为人眼对绿色的反应比对其他两种颜色更敏感。\n\
    \n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_383_0.png)\n\n图8.13 使用`hough_circle()`在阿根廷蜂蜜的显微图像中自动检测花粉粒（主要是*菊科*，较少见的*云实科*和*唇形科*花粉）（原始图像由K.\
    \ Schitteke和F. Flores提供）：**a** 原始RGB图像和**b** 使用霍夫变换检测到的花粉粒。\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_379_0.png)\n\
    \n使用更高质量的图像并仔细调整霍夫变换的参数将产生更好的结果。\n\n在第二个示例中，霍夫变换用于自动计算阿根廷蜂蜜显微图像中的花粉粒数量（图8.13）。图像质量再次不完美，这就是为什么我们不能期望获得最佳结果。特别是，三维物体的图像是在非常高的放大倍率下拍摄的，因此略显模糊。我们首先读取花粉图像并将其存储在变量I1中。图像大小为968×1060像素，包含三种颜色（红、绿、蓝）。由于图像相对较大，我们将图像大小减半：\n\
    \n```\nI1 = io.imread('pollen.jpg')\nI1 = I1[::2,::2,:]\n\nplt.figure()\nio.imshow(I1)\n\
    plt.axis('off')\nio.show()\n```\n\n然后我们可以丢弃图像的颜色信息，仅使用红色：\n\n```\nI2 = I1[:,:,1]\n\
    \nplt.figure()\nio.imshow(I2)\nplt.axis('off')\nio.show()\n```\n\n接下来，我们使用equalize_adapthist()执行对比度受限自适应直方图均衡化（CLAHE），以增强图像中的对比度（Zuiderveld\
    \ 1994）：\n\n```\nI3 = np.zeros(np.shape(I1))\nI3 = exposure.equalize_adapthist(I2)\n\
    \nplt.figure()\nio.imshow(I3)\nplt.axis('off')\nio.show()\n```\n\n函数hough_circle()实现了霍夫变换并从原始图像中提取圆：\n\
    \n```\nI4 = feature.canny(I3,\n    low_threshold=0.2,high_threshold=0.92)\n\n\
    hough_radii = np.arange(12,20)\nhough_res = transform.hough_circle(I4,hough_radii)\n\
    H,cx,cy,radii = transform.hough_circle_peaks(\n    hough_res,hough_radii,\n  \
