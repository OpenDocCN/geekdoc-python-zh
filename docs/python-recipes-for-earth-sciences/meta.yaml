    \ value. The last line of the if statement computes the average by dividing the\
    \ sum of elements by m or n. Running the script yields\n\n3.2\n\nAfter typing\n\
    \n```\n%whos\n```\n\nwe see that the workspace now contains\n\n| Variable | Type\
    \ | Data/Info |\n|----------|------|-----------|\n| m | int | 5 |\n| n | int |\
    \ 5 |\n| np | module | <module 'numpy' from '/Us<...>kages/numpy/__init__.py'>\
    \ |\n| x | ndarray | 1x5: 5 elems, type `int64`, 40 bytes |\n\nAs expected, all\
    \ variables defined and used in the script appear in the workspace. In our example,\
    \ these are also the variables m and n. Scripts contain sequences of commands\
    \ that are applied to variables in the workspace. However, Python functions allow\
    \ inputs and outputs to be defined. They do not automatically import variables\
    \ from the workspace. To convert the script above into a function, we need to\
    \ introduce the following modifications (Fig. 2.3):\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_61_0.png)\n\
    \nFig. 2.3 Screenshot of the Spyder Editor showing the function average(). The\
