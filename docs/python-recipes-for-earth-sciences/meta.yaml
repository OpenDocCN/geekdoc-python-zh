    \ & 0 & \\dots & \\gamma(x_2, x_n) & 1 \\\\ \\nu & \\nu & \\dots & \\nu & \\nu\
    \ \\\\ \\gamma(x_n, x_1) & \\gamma(x_n, x_2) & \\dots & 0 & 1 \\\\ 1 & 1 & \\\
    dots & 1 & 0 \\end{bmatrix}$$\n\n是系数数组（即这些是观测对的建模变异函数值）。注意在数组的对角线上（分离距离为零处），γ\
