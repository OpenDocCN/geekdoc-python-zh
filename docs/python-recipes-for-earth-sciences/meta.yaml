  md: 'where ∂y/∂xⱼ is the partial derivative of y with respect to the jth variable
    xⱼ, sⱼ is the standard deviation of this variable, and s(xⱼxₖ) is the covariance
    of the uncertainties of variables xⱼ and xₖ (e.g., Taylor 1997, page 212). If
    the variables are not dependent on one another, the covariance term is zero, and
    the equation is reduced to


    $$s = \sqrt{\sum_{j=1}^{m} \left( \frac{\partial y}{\partial x_j} \cdot s_j \right)^2}$$


