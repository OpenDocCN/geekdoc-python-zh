  md: 'The object gm also contains information on the relative mixing proportions
    of the two distributions in the layer gm.weights_. We can use this information
    to scale y1 and y2 to the correct proportions relative to each other:


    ```

    y1 = gm.weights_[0]*y1/np.trapz(y1,x)

    y2 = gm.weights_[1]*y2/np.trapz(y2,x)

    ```


    We can now superimpose the two scaled probability density functions y1 and y2.
    The integral of the original data is determined by using trapz() to perform trapezoidal
    numerical integration:


    ```

    y = y1 + y2

    y = np.trapz(n,v)*y/np.trapz(y,x)

