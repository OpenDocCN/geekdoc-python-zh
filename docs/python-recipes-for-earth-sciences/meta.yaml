- img_proc: true
  md: 'Fig. 8.14 Bayer RGGB pattern helps to store RGB images on the sensor of a single-chip
    camera. The pattern contains twice as many green pixels as red and blue pixels
    because the human eye reacts more sensitively to green than to either of the other
    two colors.


    ![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_383_0.png)


    chip sensor that stores the three colors (red, green, and blue) in a single array
    I1, which is displayed as a grayscale image using the default gray colormap in
    Python. Most cameras have single-chip sensors, as is even the case with single-lens
    reflex cameras (SLRs), which can store images in the RAW format (in addition to
    in the JPEG format) by using lossy compression. More expensive three-sensor cameras
    also exist that use separate sensors for the filtered red, green, and blue color
    ranges.


    Single-chip cameras store RGB images on their single chips using the Bayer mosaic,
    which was named after Bryce Bayer (1929–2012), a research scientist at Eastman
    Kodak (see http://en.wikipedia.org for more information on Bayer mosaics) (Fig.
    8.14). Bayer’s idea was to use filters and to direct the individual colors of
    red, green, and blue onto individual sensor pixels, which are usually in an RGGB
    arrangement because the human eye reacts more sensitively to green than to red
    or blue. Due to the Bayer mosaic, SLRs with 16 MP resolution (e.g., that of our
    Sony chip) do not really take 16 MPs, but only 4 MPs each for red and blue (25
    % each) and 8 MPs for green (50 %), and they then interpolate each of the three
    colors to 16 MPs.


    The RAW format provided by SLRs therefore does not mean that the colors are stored
    in full resolution, but rather that the images are not compressed (e.g., using
    the JPEG algorithm). Using Python instead, we can import and process the image
    with its original resolution (i.e., 4 MPs for red and blue and 8 MPs for green).
    Alternatively, we can demosaic the image in the same way that an SLR does, for
    example, by using the Python function cvtColor(). Demosaicing the image converts
    a Bayer pattern encoded image to a true-color (RGB) image using gradient-corrected
    linear interpolation. According to the MAPIR website, the red (660 nm) radiance
    is stored in the red image channel, the near-infrared (850 nm) radiance is stored
    in the blue image channel, and no information is stored in the green channel.


    When using imshow() to display I2 as a true-color RGB image, we find blue hues
    in areas with high reflection in the NIR spectral band (and hence also denser
    living green vegetation), whereas all other areas with low NIR values are more
    red in color:'
