    The headers document the size of the data array (e.g., 1,801 columns and 2401
    rows in our example), the coordinates of the lower-left corner (e.g., approximately
    *x=20* and *y=-20*), and the cell size (e.g., ~0.0167 = 1/60 of a degree latitude
    and longitude, or 1 arc minute). Older versions of the ETOPO1 data set as well
    as other similar data sets may also contain the -32,768 flag for data voids. We
    comment the header out by typing # at the beginning of the first five lines:


