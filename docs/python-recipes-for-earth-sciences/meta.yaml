    \ 5.5 节）一样，双线性插值会导致数据的显著平滑以及高频变化的减少。\n\n三次样条插值在许多方面代表了另一个极端，通常用于极不均匀间距的数据和有噪声的数据：\n\
    \n```python\nx = np.linspace(420,470,201)\ny = np.linspace(70,120,201)\nXI,YI\
