    ![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_105_0.png)


    Fig. 3.14 Principles of a χ²-test. The alternative hypothesis that the two distributions
    are different can be rejected if the measured χ² is lower than the critical χ².
    The χ² depends on Φ = K – Z, where K is the number of classes and Z is the number
    of parameters that describe the theoretical distribution plus the number of variables.
    In the example, the critical χ²(Φ = 5, α = 0.05) is 11.0705. Since the measured
    χ² = 5.7602 is below the critical χ², we cannot reject the null hypothesis. In
    our example, we can conclude that the sample distribution is not significantly
    different from a Gaussian distribution.


    ```

    %reset -f


    import numpy as np

    import matplotlib.pyplot as plt

    from scipy import stats


