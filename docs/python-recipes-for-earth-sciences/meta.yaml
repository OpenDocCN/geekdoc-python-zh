  md: "# 2.8 Scripts and Functions\n\nPython is a powerful programming language. All\
    \ files that contain Python code use .py as an extension and are therefore called\
    \ .py files. These files contain ASCII text and can be edited using a standard\
    \ text editor. However, the built-in Spyder Editor color-highlights various syntax\
    \ elements: comments are highlighted in gray, keywords such as if, for, and end\
    \ are highlighted in blue, and character strings are highlighted in green. This\
    \ syntax highlighting facilitates Python coding.\n\nPython uses two types of .py\
    \ files: scripts and functions. Whereas scripts are a series of commands that\
    \ operate on data in the workspace, functions are true algorithms with input variables\
    \ (or input arguments) and output variables (or output arguments). The advantages\
    \ and disadvantages of both types of .py files are now illustrated via an example.\
    \ We first generate a simple Python script by typing a series of commands in order\
    \ to calculate the average of the elements of a data array x as follows:\n\n```\n\
    %reset -f\n\nimport numpy as np\n\nx = np.array([[3,6,2,-3,8]])\nprint(x)\n\n\
    m,n = x.shape\nif m == 1:\n    m = n\n\nprint(np.sum(x)/m)\n```\n\nThe first line\
    \ of the if statement yields the shape of the variable x using the command shape().\
    \ In our example, x should be either a column vector –that is, an array with a\
    \ single column and dimensions (m,1) – or a row vector –that is, an array with\
    \ a single row and dimensions (1,n). The if statement evaluates a logical expression\
    \ and executes a group of commands if the expression is true. In the example,\
    \ the if statement selects either m or n depending on whether m==1 is false or\
    \ true. Here, the double equal sign (==) makes element-by-element comparisons\
    \ between the variables (or numbers) to the left and right of the equal signs\
    \ and returns an array of the same size that is made of elements set to logical\
    \ 1 where the relationship is true and to logical 0 where it is not true. In our\
    \ example, m==1 returns 1 if m equals 1 and 0 if m equals any other value. The\
    \ last line of the if statement computes the average by dividing the sum of elements\
    \ by m or n. Running the script yields\n\n3.2"
