    ## 3.4 理论分布


    我们已描述了样本的经验频率分布。直方图是描绘变量$x$频率分布的便捷方式。若我们对变量进行足够多次的采样，且输出范围足够窄，就能获得非常平滑的直方图版本。无限次的测量$n
    \rightarrow \infty$和无限小的组距将产生随机变量的*概率密度函数*（PDF）。概率分布密度$f(x)$定义了变量取值等于$x$的概率。$f(x)$的积分归一化为1，即总观测数为1。*累积分布函数*（CDF）是离散PDF频率的总和或连续PDF的积分。累积分布函数$F(x)$是变量取值小于或等于$x$的概率。


    下一步，我们需要找到适合前文所述经验分布的理论分布。因此本节将介绍最重要的理论分布并描述其应用。


    ### 均匀分布


    *均匀分布*或*矩形分布*是一种具有恒定概率的分布（图3.4）。相应的概率密度函数为


    $$f(x) = 1/N = const.$$


    其中随机变量$x$可取$N$个可能值中的任何一个。累积分布函数为


    $$f(x) = x \cdot 1/N$$


    ![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_84_0.png)


    图3.4 a 概率密度函数$f(x)$和b 累积分布函数$F(x)$，展示$N=6$的均匀分布。变量$x$的6个离散值具有相同的概率1/6。


    概率密度函数归一化为1，


    $$\sum_{-\infty}^{+\infty} f(x)dx = 1$$


    即所有概率之和为1。因此累积分布函数的最大值为1：


    $$F(x)_{max} = 1$$


    一个例子是掷一个有$N=6$个面的骰子。像骰子面这样的离散变量只能取有限个可数值$x$。每个面的概率为1/6。该分布的概率密度函数为


    $$f(x) = 1/6$$


    相应的累积分布函数为


    $$F(x) = x \cdot 1/6$$


    其中$x$仅取离散值（即$x=1, 2, ..., 6$）。


    ### 二项分布


    *二项分布*给出了在$N$次试验中成功$x$次的离散概率，其中每次试验成功的概率为$p$（图3.5）。二项分布的概率密度函数为


    $$f(x) = \binom{N}{x} p^x (1-p)^{N-x}$$'
