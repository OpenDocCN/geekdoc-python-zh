    # 4.11 Classical Linear Regression of Log-Transformed Data


    A common error in regression analysis occurs when bivariate data with an exponential
    relationship are log-transformed, a best-fit line is then calculated using a least-squares
    linear regression, and the result is finally transformed back. Below is a simple
    Python example that demonstrates a better fitting of a curve to bivariate data
    with an exponential relationship.


    Log-transforming the $y$-values has two important consequences that can influence
    the result: First, if the relationship between the data is of the type $y = a_0
    + a_1 \cdot e^x$, then logarithmizing $y$-values in the form $\log(y)$ does not
    provide a complete linearization of the data because the parameters $a_0$ and
    $a_1$ are not taken into account. Second, classical regression assumes that $y$
    responds to $x$ and that the entire dispersion in the data set is contained within
    the $y$-value (see Sect. 4.3).'
