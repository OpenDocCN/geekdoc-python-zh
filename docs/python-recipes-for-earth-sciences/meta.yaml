    format. The third partner in the history of PostScript was Aldus, which developed
    the PageMaker software and is now part of Adobe Systems. The combination of Aldus
    PageMaker software, the PS format, and the Apple LaserWriter printer led to the
    creation of desktop publishing. The EPS format was then developed by Adobe Systems
    as a standard file format for importing and exporting PS files. Whereas a PS file
    is generally a single-page format that contains either an illustration or a text,
    the purpose of an EPS file is to also allow other pages to be included (i.e.,
    a file that can contain any combination of text, graphics and images) (http://www.adobe.com).

    - *Joint Photographic Experts Group* (JPEG) – In 1986, the JPEG was founded for
    the purpose of developing various standards for image compression. Although the
    name JPEG stands for the committee, it is now widely used as the name of an image
    compression format and a file format. This compression involves grouping pixel
    values into 8-by-8 blocks and transforming each block with a discrete cosine transform.
    As a result, all unnecessary high-frequency information is deleted, which makes
    this compression method irreversible. The advantage of the JPEG format is the
    availability of a three-channel 24 bit true-color version, which allows images
    with smooth color transitions to be stored. The new JPEG 2000 format uses a wavelet
    transform instead of the cosine transform (Sect. 5.8) (http://www.jpeg.org).

    - *Portable Document Format* (PDF) – The PDF, which was also designed by Adobe
    Systems, is now a true self-contained cross-platform document. PDF files contain
    different types of content, which include text as well as vector and raster graphics.
    The newer versions of PDFs can also contain interactive content, such as hyperlinks,
