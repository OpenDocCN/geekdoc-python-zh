  md: 'imum entropy method. In contrast, it is often argued that geological knowledge
    should be included in the modeling process, in which case visual fitting is therefore
    recommended. In many cases, the problem with variogram modeling is much less a
    question of whether the appropriate procedure has been used than a question of
    the quality of the experimental variogram. If the experimental variogram is good,
    both procedures will yield similar results.


    Another important question in variogram modeling is the intended use of the model.
    In our case, the linear model does not at first appear to be appropriate (Fig.
    7.22). Upon closer inspection, however, we can see that the linear model fits
    reasonably well over the first three lags. This can be sufficient if we use the
    variogram model only for kriging because in kriging, the nearby points are the
    most important points for the estimate (see discussion of kriging below). Different
    variogram models with similar fits close to the origin therefore yield similar
    kriging results if the sampling points are regularly distributed. However, if
    the objective is to describe the spatial structures, the situation is quite different.
    It then becomes important to find a model that is suitable over all lags and to
    accurately determine the sill and the range. A collection of geological case studies
    in Rendu and Readdy (1982) show how process knowledge and variography can be interlinked.
    Good guidelines for variogram modeling are provided by Gringarten and Deutsch
    (2001) and by Webster and Oliver (2007).


    ![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_322_0.png)


    **Fig. 7.22** Variogram estimator (blue circles), the population variance (red
    line), as well as spherical, exponential, and linear models (yellow, purple, and
    green lines, respectively).'
