    \ greater than the significance level) means that the chances of observing either\
    \ the same result or a more extreme result from similar experiments in which the\
    \ null hypothesis is true would be 3,998 in 10,000.\n\n## 3.10 The Kolmogorov–Smirnov\
    \ Test\n\nThe *Kolmogorov–Smirnov* (or *K–S*) *test* (introduced by Andrei N.\
    \ Kolmogorov and Nikolai W. Smirnov) is similar to the χ²-test in that it also\
    \ involves comparing distributions and thereby allows two distributions to be\
    \ tested for derivation from the same population (Kolmogorov 1933; Smirnov 1939).\
    \ This test is independent of the type of distribution that is used and can therefore\
    \ be used to test the hypothesis that the observations were drawn from a specific\
    \ theoretical distribution.\n\nLet us again assume that we have a data set that\
    \ consists of multiple chemical measurements from a sedimentary unit. We can use\
    \ the K–S test to test the null hypothesis that these measurements can be described\
    \ by a Gaussian distribution with a typical central value (the mean) and a random\
    \ dispersion around the mean (the standard deviation). The appropriate test statistic\
    \ is then\n\n$KS = max|F_n(x) - F(x)|$\n\nwhere $F_n(x)$ is the cumulative frequency\
    \ distribution of the $n$ measurements and $F(x)$ is the cumulative frequency\
    \ distribution expected from the theoretical distribution. The null hypothesis\
    \ can be rejected if the measured $KS$ value is higher than the critical $KS$\
    \ value.\n\nAs an example, we can again test the hypothesis that our organic carbon\
    \ measurements contained in *organicmatter_one.txt* follow a Gaussian distribution.\
    \ We must first load and standardize the data in order to have a mean of zero\
    \ and a standard deviation of one:"
