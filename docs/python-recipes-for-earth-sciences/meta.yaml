  mdcn: "需要一个包含未知值位置的网格。这里，我们在一个x和y方向范围均为0到200的二次区域内，使用网格单元大小为5。坐标以数组形式创建，通过以下代码：\n\
    \n```\nR = np.arange(0,200+5,5)\nXg1,Xg2 = np.meshgrid(R,R)\n```\n\n并通过以下代码转换为向量：\n\
    \n```\nXg = np.reshape(Xg1,(len(Xg1)**2,1))\nYg = np.reshape(Xg2,(len(Xg2)**2,1))\n\
    ```\n\n然后，我们通过输入以下代码为克里金估计值Zg和克里金方差s2_k分配内存：\n\n```\nZg = Xg * np.NaN\ns2_k =\
    \ Xg * np.NaN\n```\n\n现在，我们对每个网格点进行未知值的克里金插值：\n\n```\nfor k in range(1,len(Xg)):\n\
    \    DOR = ((x-Xg[k])**2+(y-Yg[k])**2)**0.5\n    G_R = (nugget+sill*(1-np.exp(-3*DOR/rang)))*(DOR>0)\n\
    \    G_R = np.append(G_R,1)\n    E = np.matmul(G_inv,G_R)\n    Zg[k] = np.sum(E[0:n]*z)\n\
    \    s2_k[k] = np.sum(E[0:n]*G_R[0:n])+E[n]\n```\n\n第一条命令计算网格点(Xg,Yg)与观测点(x,y)之间的距离。然后，我们使用变异函数模型G_R创建克里金系统的右侧向量，并在最后一行添加一个1。接下来，我们获得包含权重和拉格朗日乘子的数组E。每个点k的估计值Zg是观测值z的加权和。最后，计算网格点的克里金方差s2_k，然后我们可以绘制结果。我们首先创建克里金估计值和克里金方差的网格：\n\
    \n```\nr = len(R)\nZ = np.reshape(Zg,(r,r))\nSK = np.reshape(s2_k,(r,r))\n```\n\
    \n左侧的子图展示克里金插值结果：\n\n```\nplt.figure()\nfig,axs = plt.subplots(nrows=1,ncols=2,\n\
    \    constrained_layout=True)\nax = axs[0]\nim = axs[0].pcolor(Xg1,Xg2,Z,\n  \
    \  cmap='jet',\n    shading='auto')\nax.set_aspect('equal','box')\nplt.colorbar(im,ax=ax,orientation='horizontal')\n\
    ax.set_xlabel('x-coordinates')\nax.set_ylabel('y-coordinates')\n```\n\n右侧的子图展示克里金方差，\n\
    \n```\nax = axs[1]\naxs[1].pcolor(Xg1,Xg2,SK,\n    cmap='jet',\n    shading='auto')\n\
    ```\n\n并叠加采样位置：\n\n```\nplt.plot(x,y,\n    marker='o',\n    markerfacecolor='none',\n\
    \    markeredgecolor='k',\n    linestyle='none')\nax.set_aspect('equal','box')\n\
    plt.colorbar(im,ax=ax,orientation='horizontal')\nax.set_xlabel('x-coordinates')\n\
    ax.set_ylabel('y-coordinates')\nplt.show()\n```\n\n克里金插值结果如图7.23a所示。克里金方差仅取决于与观测点的距离，而不取决于观测值（图7.23b）。当观测点位于变异函数范围之外时，克里金插值会重现总体均值，但克里金方差也会增加（图7.23地图的右下角）。克里金方差可用作改进采样设计的标准，并且在对数正态克里金中，反向变换也需要它，其实现方式为：\n\
    \n$$y(x_0) = \\exp\\left(z(x_0) + 0.5 \\cdot \\sigma^2(x_0) - \\nu\\right)$$\n\
    \n## 克里金讨论\n\n此处介绍的*点克里金*是一种精确插值器。即使使用了带有块金效应的变异函数，它也能在观测点重现精确值。通过包含测量误差的方差（参见Kitanidis\
    \ 1997）以及通过*块段克里金*（对特定邻域或块段内的观测值进行平均）可以实现平滑。虽然克里金方差仅取决于观测点和未观测点之间的距离，但它主要是信息密度的度量（Wackernagel\
    \ 2003）。克里金的准确性最好通过使用重采样方法或替代测试的交叉验证来评估（第4.5节和第4.6节）。邻近观测值对估计的影响取决于它们的配置，正如Webster和Oliver（2007）所总结的：“近点比远点权重更大；当邻域中的点数增加时，一个点的相对权重会减小；在相同距离下，聚集的点比孤立的点各自权重更小；数据点可以被位于它们和目标点之间的点屏蔽。”克里金的采样设计不同于可能对变异函数分析最优的设计。规则网格（无论是三角形还是方形）可被视为最优。\n\
    \n此处介绍的Python代码是对上述公式的直接实现。在专业程序中，通过使用协方差而非变异函数（Kitanidis 1997; Webster and Oliver\
    \ 2007），可以限制进入数组*G_mod*的数据点数量，并避免*G_mod*的求逆。对于那些对编程或更深入理解算法感兴趣的人来说，Deutsch和Journel（1998）的出版物是必读材料。最好的互联网资源是AI-GEOSTATISTICS的主页：\n\
    \nhttps://wiki.52north.org/AI_GEOSTATS/WebHome\n\n## 推荐阅读\n\n- Amante C, Eakins\
    \ BW (2009) ETOPO1 1 Arc-Minute Global Relief Model: Procedures, Data Sources\
