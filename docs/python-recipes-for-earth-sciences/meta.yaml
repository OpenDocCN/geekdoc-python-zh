    io.show()\n```\n\n最后，我们可以定义一个任意阈值 `th`（例如 0.4），用于将植被（显示为白色像素）与其他材料（显示为灰色像素）分开。然后，我们将\
    \ NDVI > 0.4 的区域显示为绿色，将较低值的区域显示为白色（图 8.15）：\n\n```python\nth = 0.4\nndvit = np.copy(ndvi)\n\
    for i in range(0,row):\n    if ndvit[i,j] < th:\n        ndvit[i,j] = 0\n```\n\
