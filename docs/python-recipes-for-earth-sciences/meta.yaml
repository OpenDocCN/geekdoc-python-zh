    \ varved sediments exposed in the Quebrada de Cafayate in Argentina using hough_line()\
    \ (Trauth et al. 1999, 2003): **a** grayscale image, **b** enhanced image, **c**\
    \ binary image, **d** image with diatomite layers marked by red lines, and **e**\
