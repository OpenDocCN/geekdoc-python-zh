    \ defined. However, increasing the lag width can cause unnecessary smoothing and\
    \ a resulting loss of detail. The separation distance and the lag width must therefore\
    \ be chosen with care. Another option is to use a more robust variogram estimator\
    \ (Cressie 1990, 1993; Deutsch and Journel 1998).\n- *Calculating the separation\
    \ distance* – If the observations cover a large area (e.g., more than 1000 km²),\
    \ spherical distances instead of Pythagorean distances should be calculated from\
    \ a planar Cartesian coordinate system.\n\n## Kriging\n\nWe now interpolate our\
    \ observations to a regular grid using *ordinary point kriging*, which is the\
    \ most popular kriging method. Ordinary point kriging uses a weighted average\
    \ of the neighboring points to estimate the value of an unobserved point,\n\n\
    $$\\hat{z}_{x_0} = \\sum_{i}^{n} \\lambda_i \\cdot z_{x_i}$$\n\nwhere $\\lambda_i$\
