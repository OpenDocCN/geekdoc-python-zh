  md: "# 8.5 Importing and Georeferencing Terra ASTER Images\n\nThese commands generate\
    \ three 8 bit image arrays, each of which represents the intensity within a certain\
    \ infrared (IR) frequency band of a 4,200-by-4,100-pixel image. We are not using\
    \ the data for quantitative analyses and therefore do not need to convert the\
    \ digital number (DN) values to radiance and reflectance values. The *ASTER User\
    \ Handbook* provides the necessary information on these conversions (Abrams und\
    \ Hook 2002). Instead, we are processing the ASTER image in order to create a\
    \ georeferenced RGB composite of Bands 3 N, 2, and 1, which are used in fieldwork.\
    \ We first use a contrast-limited adaptive histogram equalization method to enhance\
    \ the contrast in the image by typing\n\n```\nI1 = exposure.equalize_adapthist(I1)\n\
    I2 = exposure.equalize_adapthist(I2)\nI3 = exposure.equalize_adapthist(I3)\n```\n\
    \nand then concatenate the result into a 24 bit RGB image using dstack():\n\n\
    ```\nnaivasha_rgb = np.dstack([I1,I2,I3])\n```\n\nAs with the previous examples,\
    \ the 4,200-by-4,100-by-3 array can now be displayed using\n\n```\nnaivasha_rgb\
    \ = exposure.rescale_intensity(naivasha_rgb,\n    out_range='uint8')\nplt.figure()\n\
    io.imshow(naivasha_rgb)\nio.imsave('naivasha.tif',naivasha_rgb)\nplt.axis('off')\n\
    ```\n\nThis command also saves the RGB composite as the TIFF file *naivasha.tif*\
    \ (~52 MB) in the working directory, and the file can then be processed using\
    \ other software, such as Adobe Photoshop. The processed ASTER image does not\
    \ yet have a coordinate system and therefore needs to be tied to a geographical\
    \ reference frame (*georeferencing*). The header of the HDF file can be used to\
    \ extract the geodetic coordinates of the four corners of the image contained\
