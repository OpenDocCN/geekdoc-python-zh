    \n```\n[ 1.83562317 -7.0652954  74.15255975]\n```\n\nAs shown above, the true\
    \ values of the three coefficients are +1.8, -7.1, and +74.2, which means that\
    \ there are some discrepancies between the true values and the coefficients that\
    \ were estimated using polyfit(). Let us plot the result (Fig. 4.8):\n\n```\n\
    pval = np.poly1d(p)\n\nplt.figure()\nplt.plot(meters,age,\n    marker='o',\n \
    \   linestyle='none')\nplt.plot(meters,pval(meters),\n    color=(0.8,0.5,0.3))\n\
    plt.show()\n```\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_154_0.png)\n\nFig.\
    \ 4.8 Curvilinear regression from measurements of barium content. The plot shows\
    \ the original data points (circles), the regression line for a polynomial of\
    \ degree n = 2 (solid line), and the prediction error (dashed lines) of the regression.\n\
    \nThe plot shows that the quadratic model for these data is a good one. The quality\
    \ of the result could again be tested by exploring the residuals, by employing\
    \ resampling schemes, or by using cross-validation. Combining regression analysis\
    \ with one of these methods is a powerful tool in bivariate data analysis, whereas\
    \ Pearson’s correlation coefficient should be used only as a preliminary test\
    \ for linear relationships.\n\n## 4.10 Nonlinear and Weighted Regression\n\nMany\
    \ bivariate data sets in the earth sciences follow a more complex trend than a\
    \ simple linear or curvilinear trend. Classic examples of nonlinear trends include\
    \ the exponential decay of radionuclides and the exponential growth of algae populations.\
    \ In such cases, Python provides various tools for fitting nonlinear models to\
    \ the data. An easy-to-use routine for fitting such models is nonlinear regression\
    \ using curve_fit(). To demonstrate the use of curve_fit(), we generate a bivariate\
    \ data set in which one variable is exponentially correlated with a second variable.\
    \ We first generate evenly spaced values between 0.5 and 3 at intervals of 0.1\
    \ and add some Gaussian noise with a standard deviation of 0.2 in order to make\
    \ the data unevenly spaced. The resulting 26 data points are sorted and stored\
    \ in data1:\n\n```\n%reset -f\n\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\nfrom scipy.optimize import curve_fit\nfrom numpy.random import default_rng\n\
    \nrng = default_rng(0)\ndata1 = np.linspace(0.5,3.,26)\ndata1 = data1 + 0.2*rng.standard_normal(np.shape(data1))\n\
    data1 = np.sort(data1,axis=0)\n```\n\nWe can then compute the second variable\
    \ data2, which is the exponent of the first variable data1 multiplied by 0.2 and\
    \ increased by 3. We again add Gaussian noise—this time with a standard deviation\
    \ of 0.5—to the data and display the result:\n\n```\ndata2 = 3 + 0.2*np.exp(data1)\n\
    data2 = data2 + 0.5*rng.standard_normal(np.shape(data2))\n\nplt.figure()\nplt.plot(data1,data2,\n\
    \         marker='o',\n         linestyle='none')\nplt.show()\n```\n\nNonlinear\
    \ regression is used to estimate the two coefficients of the exponential function,\
    \ that is, the multiplier 0.2 and the summand 3. The function curve_fit() returns\
    \ a vector popt of coefficient estimates for the nonlinear regression of the responses\
    \ in data2 to the predictors in data1 using the model specified by func(). The\
    \ second output pcov is the estimated covariance of popt. The diagonals of pcov\
    \ provide the variance for the parameter estimate popt. To compute errors of one\
    \ standard deviation on the parameters, we can use perr = np.sqrt(np.diag(pcov)).\
    \ We can design a function handle model func() that represents an exponential\
    \ function with an input variable x and with a and b representing the two coefficients\
    \ of the exponential function,\n\n```\ndef func(x,a,b):\n    return a*np.exp(x)+b\n\
    \npopt,pcov = curve_fit(func,data1,data2)\nprint(popt)\n```\n\nwhich yields\n\n\
    ```\n[0.22560247 2.94436195]\n```\n\nWe can now use the resulting coefficients\
    \ popt[0] and popt[1] to compare the results with the original data in a graphic:\n\
    \n```\nplt.figure()\nplt.plot(data1,data2,\n    marker='o',\n    linestyle='none')\n\
    plt.plot(data1,popt[0]*np.exp(data1)+popt[1])\nplt.show()\n```\n\nAs we can see\
    \ from the output of popt and the graphics, the fitted red curve describes the\
    \ data reasonably well. We can now also use curve_fit() to perform a weighted\
    \ regression. Let us assume that we know the one-sigma errors of the values in\
    \ data3:\n\n```\ndata3 = abs(rng.standard_normal(np.shape(data2)))\n\nplt.figure()\n\
    plt.plot(data1,data2,\n    marker='o',\n    linestyle='none')\nplt.errorbar(data1,data2,data3,\n\
    \    color= [0.3,0.5,0.8],\n    linestyle='none')\nplt.show()\n```\n\nTo make\
    \ a weighted fit, we define the model function func() and then use curve_fit()\
    \ with the optional input sigma for the errors,\n\n```\npopt2,pcov2 = curve_fit(func,data1,data2,\n\
    \    sigma=data3)\nyfit2 = func(data1,*popt2)\nprint(popt2)\n```\n\nwhich yields\n\
    \n```\n[0.25687643 2.53249989]\n```\n\nAs before, curve_fit() computes weighted\
    \ parameter estimates popt. We again compare the results with the original data:\n\
    \n```\nplt.figure()\nplt.plot(data1,data2,\n    marker='o',\n    linestyle='none')\n\
    plt.errorbar(data1,data2,data3,\n    color=[0.3,0.5,0.8],\n    linestyle='none')\n\
    plt.plot(data1,\n    popt2[0]*np.exp(data1)+popt2[1],\n    linestyle='-',\n  \
    \  color=[0.8,0.5,0.3])\nplt.legend(['Data',\n    'Unweighted',\n    'Weighted'])\n\
    plt.show()\n```\n\nComparing the coefficients p and the red curves from the weighted\
    \ regression with the previous results from the unweighted regression reveals\
    \ slightly different results (Fig. 4.9):\n\n```\nplt.figure()\nplt.plot(data1,data2,\n\
    \    marker='o',\n    linestyle='none')\nplt.errorbar(data1,data2,data3,\n   \
    \ color=[0.3,0.5,0.8],\n    linestyle='none')\nplt.plot(data1,\n    popt[0]*np.exp(data1)+popt[1],\n\
    \    linestyle=':',\n    color=[0.8,0.5,0.3])\nplt.plot(data1,\n    popt2[0]*np.exp(data1)+popt2[1],\n\
    \    linestyle='-',\n    color=[0.8,0.5,0.3])\nplt.legend(['Data',\n    'Unweighted',\n\
    \    'Weighted'])\nplt.show()\n```\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_158_0.png)\n\
    \n**Fig. 4.9** Comparison of unweighted (dashed line) and weighted (solid line)\
    \ regression results from synthetic data. The plot shows the original data points\
    \ (circles), the error bars for all data points, and the regression line for an\
    \ exponential model function. In the unweighted regression, the fitted curve is\
    \ moved toward the first two data points with a large error, while in the weighted\
    \ regression, it is moved toward the third data point with a small error.\n\n\
    As an example, in the unweighted regression, the fitted curve is moved toward\
    \ the first two data points with a large error, while in the weighted experiment,\
    \ it is moved toward the third data point with a small error.\n\n## 4.11 Classical\
    \ Linear Regression of Log-Transformed Data\n\nA common error in regression analysis\
    \ occurs when bivariate data with an exponential relationship are log-transformed,\
    \ a best-fit line is then calculated using a least-squares linear regression,\
    \ and the result is finally transformed back. Below is a simple Python example\
    \ that demonstrates a better fitting of a curve to bivariate data with an exponential\
    \ relationship.\n\nLog-transforming the $y$-values has two important consequences\
    \ that can influence the result: First, if the relationship between the data is\
    \ of the type $y = a_0 + a_1 \\cdot e^x$, then logarithmizing $y$-values in the\
    \ form $\\log(y)$ does not provide a complete linearization of the data because\
    \ the parameters $a_0$ and $a_1$ are not taken into account. Second, classical\
    \ regression assumes that $y$ responds to $x$ and that the entire dispersion in\
    \ the data set is contained within the $y$-value (see Sect. 4.3)."
  mdcn: "## 4.9 曲线回归\n\n从我们之前的分析可以明显看出，线性回归模型为描述数据的标度特性提供了一种很好的方法。然而，我们可能希望检查数据是否同样能被更高阶的多项式拟合很好地描述，例如二次多项式：\n\
    \n$$y = b_0 + b_1x + b_2x^2$$\n\n为了清空工作区并重新加载原始数据，我们输入\n\n```\n%reset -f\n\nimport\
    \ numpy as np\nimport numpy.ma as ma\nimport matplotlib.pyplot as plt\nfrom numpy.random\
    \ import default_rng\n\nagedepth = np.loadtxt('agedepth_1.txt')\n\nmeters = agedepth[0:,0]\n\
    age = agedepth[0:,1]\n```\n\n然后可以使用 polyfit() 拟合二次多项式，\n\n```\np = np.polyfit(meters,age,2)\n\
    print(p)\n```\n\n得到\n\n```\n[ 0.05890582  4.10867582 26.0381405 ]\n```\n\n第一个系数接近于零，即它对预测的影响很小。第二和第三个系数与线性回归得到的结果相似。绘制数据得到一条类似于直线的曲线：\n\
    \n```\npval = np.poly1d(p)\n\nplt.figure()\nplt.plot(meters,age,\n    marker='o',\n\
    \    linestyle='none')\nplt.plot(meters,pval(meters),\n    color=(0.8,0.5,0.3))\n\
    plt.show()\n```\n\n我们现在使用另一个合成数据集，该数据集是通过米数和年龄之间的二次关系生成的：\n\n```\nnp.random.seed(0)\n\
    meters = 20*np.random.rand(30)\nage = 1.6*meters**2 -1.1*meters + 50\nrng = default_rng(0)\n\
    age = age + 40*rng.standard_normal(np.shape(meters))\n\nplt.figure()\nplt.plot(meters,age,\n\
    \    marker='o',\n    linestyle='none')\nplt.show()\n\nagedepth = ma.hstack([meters,age])\n\
    ```\n\n也可以从文件 *agedepth_2.txt* 加载合成的双变量数据集：\n\n```\nagedepth = np.loadtxt('agedepth_2.txt')\n\
    \nmeters = agedepth[0:,0]\nage = agedepth[0:,1]\n\nplt.figure()\nplt.plot(meters,age,\n\
    \    marker='o',\n    linestyle='none')\nplt.show()\n```\n\n拟合二阶多项式产生了一个令人信服的回归结果，\n\
    \n```\np = np.polyfit(meters,age,2)\nprint(p)\n```\n\n得到\n\n```\n[ 1.83562317\
    \ -7.0652954  74.15255975]\n```\n\n如上所示，三个系数的真实值分别为 +1.8、-7.1 和 +74.2，这意味着真实值与使用\
    \ polyfit() 估计的系数之间存在一些差异。让我们绘制结果（图 4.8）：\n\n```\npval = np.poly1d(p)\n\nplt.figure()\n\
    plt.plot(meters,age,\n    marker='o',\n    linestyle='none')\nplt.plot(meters,pval(meters),\n\
    \    color=(0.8,0.5,0.3))\nplt.show()\n```\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_154_0.png)\n\
    \n**图 4.8** 基于钡含量测量的曲线回归。该图显示了原始数据点（圆圈）、n = 2 次多项式的回归线（实线）以及回归的预测误差（虚线）。\n\n该图表明，对于这些数据，二次模型是一个很好的模型。结果的质量可以通过探索残差、采用重采样方案或使用交叉验证来再次检验。将回归分析与这些方法之一结合使用是双变量数据分析中的一个强大工具，而皮尔逊相关系数应仅用作线性关系的初步检验。\n\
    \n## 4.10 非线性与加权回归\n\n地球科学中的许多双变量数据集遵循比简单线性或曲线趋势更复杂的趋势。非线性趋势的经典例子包括放射性核素的指数衰减和藻类种群的指数增长。在这种情况下，Python\
    \ 提供了各种工具来将非线性模型拟合到数据。一个易于使用的拟合此类模型的程序是使用 curve_fit() 进行非线性回归。为了演示 curve_fit()\
    \ 的使用，我们生成一个双变量数据集，其中一个变量与第二个变量呈指数相关。我们首先生成 0.5 到 3 之间间隔为 0.1 的均匀分布值，并添加一些标准差为\
    \ 0.2 的高斯噪声，以使数据分布不均匀。生成的 26 个数据点被排序并存储在 data1 中：\n\n```\n%reset -f\n\nimport\
    \ numpy as np\nimport matplotlib.pyplot as plt\nfrom scipy.optimize import curve_fit\n\
    from numpy.random import default_rng\n\nrng = default_rng(0)\ndata1 = np.linspace(0.5,3.,26)\n\
    data1 = data1 + 0.2*rng.standard_normal(np.shape(data1))\ndata1 = np.sort(data1,axis=0)\n\
    ```\n\n然后我们可以计算第二个变量 data2，它是第一个变量 data1 乘以 0.2 再加上 3 的指数。我们再次向数据添加高斯噪声——这次标准差为\
    \ 0.5——并显示结果：\n\n```\ndata2 = 3 + 0.2*np.exp(data1)\ndata2 = data2 + 0.5*rng.standard_normal(np.shape(data2))\n\
    \nplt.figure()\nplt.plot(data1,data2,\n         marker='o',\n         linestyle='none')\n\
    plt.show()\n```\n\n非线性回归用于估计指数函数的两个系数，即乘数 0.2 和加数 3。函数 curve_fit() 返回一个向量 popt，它是使用\
    \ func() 指定的模型，对 data2 中的响应变量相对于 data1 中的预测变量进行非线性回归得到的系数估计值。第二个输出 pcov 是 popt\
    \ 的估计协方差。pcov 的对角线提供了参数估计 popt 的方差。为了计算参数的一个标准差误差，我们可以使用 perr = np.sqrt(np.diag(pcov))。我们可以设计一个函数句柄模型\
    \ func()，它表示一个以输入变量 x 为自变量的指数函数，其中 a 和 b 代表指数函数的两个系数，\n\n```\ndef func(x,a,b):\n\
    \    return a*np.exp(x)+b\n\npopt,pcov = curve_fit(func,data1,data2)\nprint(popt)\n\
    ```\n\n得到\n\n```\n[0.22560247 2.94436195]\n```\n\n我们现在可以使用得到的系数 popt[0] 和 popt[1]\
    \ 在图形中将结果与原始数据进行比较：\n\n```\nplt.figure()\nplt.plot(data1,data2,\n    marker='o',\n\
    \    linestyle='none')\nplt.plot(data1,popt[0]*np.exp(data1)+popt[1])\nplt.show()\n\
    ```\n\n从 popt 的输出和图形中可以看出，拟合的红色曲线合理地描述了数据。我们现在也可以使用 curve_fit() 执行加权回归。假设我们知道\
    \ data3 中值的单西格玛误差：\n\n```\ndata3 = abs(rng.standard_normal(np.shape(data2)))\n\
    \nplt.figure()\nplt.plot(data1,data2,\n    marker='o',\n    linestyle='none')\n\
    plt.errorbar(data1,data2,data3,\n    color= [0.3,0.5,0.8],\n    linestyle='none')\n\
    plt.show()\n```\n\n为了进行加权拟合，我们定义模型函数 func()，然后使用带有可选输入 sigma（用于误差）的 curve_fit()，\n\
    \n```\npopt2,pcov2 = curve_fit(func,data1,data2,\n    sigma=data3)\nyfit2 = func(data1,*popt2)\n\
    print(popt2)\n```\n\n得到\n\n```\n[0.25687643 2.53249989]\n```\n\n与之前一样，curve_fit()\
    \ 计算加权参数估计值 popt。我们再次将结果与原始数据进行比较：\n\n```\nplt.figure()\nplt.plot(data1,data2,\n\
    \    marker='o',\n    linestyle='none')\nplt.errorbar(data1,data2,data3,\n   \
    \ color=[0.3,0.5,0.8],\n    linestyle='none')\nplt.plot(data1,\n    popt2[0]*np.exp(data1)+popt2[1],\n\
    \    linestyle='-',\n    color=[0.8,0.5,0.3])\nplt.legend(['Data',\n    'Unweighted',\n\
    \    'Weighted'])\nplt.show()\n```\n\n将加权回归的系数 p 和红色曲线与之前未加权回归的结果进行比较，显示出略有不同的结果（图\
    \ 4.9）：\n\n```\nplt.figure()\nplt.plot(data1,data2,\n    marker='o',\n    linestyle='none')\n\
    plt.errorbar(data1,data2,data3,\n    color=[0.3,0.5,0.8],\n    linestyle='none')\n\
    plt.plot(data1,\n    popt[0]*np.exp(data1)+popt[1],\n    linestyle=':',\n    color=[0.8,0.5,0.3])\n\
    plt.plot(data1,\n    popt2[0]*np.exp(data1)+popt2[1],\n    linestyle='-',\n  \
    \  color=[0.8,0.5,0.3])\nplt.legend(['Data',\n    'Unweighted',\n    'Weighted'])\n\
    plt.show()\n```\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_158_0.png)\n\n**图\
    \ 4.9** 合成数据的未加权（虚线）和加权（实线）回归结果比较。该图显示了原始数据点（圆圈）、所有数据点的误差条以及指数模型函数的回归线。在未加权回归中，拟合曲线向具有较大误差的前两个数据点移动，而在加权回归中，它向具有较小误差的第三个数据点移动。\n\
    \n例如，在未加权回归中，拟合曲线向具有较大误差的前两个数据点移动，而在加权实验中，它向具有较小误差的第三个数据点移动。\n\n## 4.11 对数变换数据的经典线性回归\n\
    \n回归分析中的一个常见错误是，当具有指数关系的双变量数据被对数变换后，然后使用最小二乘线性回归计算最佳拟合线，最后再将结果变换回来。下面是一个简单的 Python\
    \ 示例，演示了如何更好地将曲线拟合到具有指数关系的双变量数据。\n\n对 $y$ 值进行对数变换有两个重要后果，可能会影响结果：首先，如果数据之间的关系是\
    \ $y = a_0 + a_1 \\cdot e^x$ 类型，那么以 $\\log(y)$ 形式对 $y$ 值取对数并不能完全线性化数据，因为参数 $a_0$\
    \ 和 $a_1$ 未被考虑在内。其次，经典回归假设 $y$ 对 $x$ 做出响应，并且数据集中的所有离散度都包含在 $y$ 值中（见第 4.3 节）。"
