    book.


    After installing the Anaconda Individual Edition, the Anaconda Navigator is launched
    by clicking on the application''s shortcut icon. On the navigator''s graphical
    user interface, we start the Scientific PYthon Development EnviRonment (Spyder)
    by double-clicking on the Spyder icon. We can also launch the software without
