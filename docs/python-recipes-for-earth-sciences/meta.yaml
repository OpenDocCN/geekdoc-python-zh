  md: '# Spatial Data


    # 7


    # 7.1 Introduction


    Most data in the earth sciences are spatially distributed either as *vector data*
    (points, lines, polygons; e.g., river networks, coastlines) or as *raster data*
    (square grids, triangular grids; e.g., gridded topography). Vector data are generated
    by digitizing map objects, such as drainage networks or outlines of lithologic
    units. Raster data can be obtained directly from a satellite sensor output, but
    gridded data can also be interpolated from irregularly distributed field sampling
    (*gridding*).


    Section 7.2 introduces vector data using coastline data as an example. The acquisition
    and handling of raster data are then illustrated using digital topographic data
    in Sects. 7.3 to 7.5. The availability and use of digital elevation data has increased
    considerably since the early 1990s. With a resolution of 5 arc min (about 9 km),
    ETOPO5 was one of the first data sets available for topography and bathymetry.
    In October 2001, it was replaced by ETOPO2, which has a resolution of 2 arc minutes
    (about 4 km), and in March 2009, ETOPO1 – which has a resolution of 1 arc min
    (about 2 km) – became available. There is also a data set for topography called
    GTOPO30, which was completed in 1996 and has a horizontal grid spacing of 30 arc
    seconds (about 1 km). More recently, the 30 and 90 m resolution data from the
    Shuttle Radar Topography Mission (SRTM) have replaced the older data sets in most
    scientific studies.


    **Supplementary Information** The online version contains supplementary material
    available at https://doi.org/10.1007/978-3-031-07719-7_7.


    Section 7.6 can be found in the MATLAB version of this book but could not be translated
    to Python. However, they are listed here with corresponding section numbers in
    order to create identical chapter numbering (and thereby also identical figure
    numbering and computer scripts) between the two versions of the book. The reader
    can thus use both books side by side to trace the translation of the scripts from
    MATLAB to Python (and back).


    © The Author(s), under exclusive license to Springer Nature Switzerland AG 2022

    M. H. Trauth, *Python Recipes for Earth Sciences*, Springer Textbooks in Earth
    Sciences, Geography and Environment, https://doi.org/10.1007/978-3-031-07719-7_7


    251'
