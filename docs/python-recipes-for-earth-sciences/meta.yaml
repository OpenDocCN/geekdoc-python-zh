  md: '# Directional Data


    # 10


    # 10.1 Introduction


    Methods for analyzing *circular and spherical data* are widely used in the earth
    sciences. Structural geologists, for example, measure and analyze the orientation
    of striated slickensides on fault planes. Circular statistics is also common in
    paleomagnetic applications. Microstructural investigations include analyzing grain
    shapes and quartz *c*-axis orientations in thin sections, and paleoenvironmentalists
    reconstruct paleocurrent directions from the alignments of elongated fossil shells
    (Fig. 10.1). There are two types of directional data in the earth sciences: directional
    data sensu stricto and oriented data. Directional data (e.g., the paleocurrent
    direction of a river as documented by flute marks, or the flow direction of a
    glacier as indicated by glacial striae) have a true polarity, whereas oriented
    data describe axial data and lines (e.g., the orientation of joints) without any
    sense of direction.


    A number of useful publications are available on the statistical analysis of directional
    data, such as the books by Fisher (1993) and by Mardia and Jupp (1999) as well
    as chapters on the subject in the books by Swan and Sandilands (1995), by Davis
    (2002), and by Borradaile (2003). Furthermore, a chapter in the book by Middleton
    (2000), two journal articles by Jones (2006a, b), and Chap. 10 in the book by
    Marques de Sá (2007) discuss the use of Python for statistically analyzing directional
    data. Python is not the first choice for analyzing directional data since it does
    not provide the relevant functions, such as algorithms that can be used to compute
    the probability density function of a *von Mises distribution* or to run Rayleigh’s
    test for the significance of a mean direction. Earth scientists


    **Supplementary Information** The online version contains supplementary material
    available at https://doi.org/10.1007/978-3-031-07719-7_10.


    © The Author(s), under exclusive license to Springer Nature Switzerland AG 2022

    M. H. Trauth, *Python Recipes for Earth Sciences*, Springer Textbooks in Earth
    Sciences, Geography and Environment, https://doi.org/10.1007/978-3-031-07719-7_10'
