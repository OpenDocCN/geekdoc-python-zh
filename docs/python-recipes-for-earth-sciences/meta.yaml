    \ to describe the data set (Aitchison 2003, pages 65 to 66).\n\nHere is a simple\
    \ example that illustrates the closed-sum problem of a system with three variables\
    \ and the use of ratios as well as log-ratios to overcome the problem of spurious\
    \ correlations between pairs of variables. First, we clear the workspace and choose\
