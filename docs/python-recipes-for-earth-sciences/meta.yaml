  mdcn: "为了提高图像的对比度，我们可以应用自适应直方图均衡化：\n\n```python\nI3 = np.zeros(np.shape(I2))\nI3[:,:,0]\
    \ = exposure.equalize_adapthist(I2[:,:,0],\n    clip_limit=0.01, nbins=256)\n\
    I3[:,:,1] = exposure.equalize_adapthist(I2[:,:,1],\n    clip_limit=0.01, nbins=256)\n\
    I3[:,:,2] = exposure.equalize_adapthist(I2[:,:,2],\n    clip_limit=0.01, nbins=256)\n\
    \nplt.figure()\nio.imshow(I3)\nplt.axis('off')\nio.show()\n```\n\n我们现在可以显示红色和近红外波段：\n\
    \n```python\nplt.figure()\nplt.subplot(1,2,1)\nio.imshow(I3[:,:,0])\nplt.axis('off')\n\
    plt.title('Red')\nplt.subplot(1,2,2)\nio.imshow(I3[:,:,2])\nplt.axis('off')\n\
    plt.title('NIR')\nio.show()\n```\n\n然后，我们进行白平衡以校正任何不真实的色偏。为此，我们需要一个参考卡（通常是灰色），将其放置在图像中，然后用作白平衡的参考。或者，我们可以执行完全自动化的白平衡（如此处所示），方法是将每个单独通道的值除以各颜色（meanR、meanG\
    \ 和 meanB）的平均值，然后将每个通道的值乘以所有通道平均值（meanGray）的平均值：\n\n```python\nI3G = color.rgb2gray(I3)\n\
    meanR = np.mean(I3[:,:,0])\nmeanG = np.mean(I3[:,:,1])\nmeanB = np.mean(I3[:,:,2])\n\
    meanGray = np.mean(I3G)\nI3W = np.zeros(np.shape(I3))\nI3W[:,:,0] = I3[:,:,0]*meanGray/meanR\n\
    I3W[:,:,1] = I3[:,:,1]*meanGray/meanG\nI3W[:,:,2] = I3[:,:,2]*meanGray/meanB\n\
    ```\n\n接下来，我们使用以下公式计算归一化植被指数（NDVI）：\n\n```python\nI4 = np.copy(I3W)\nndvi = (I4[:,:,2]-I4[:,:,0])/(I4[:,:,2]+I4[:,:,0])\n\
    \nndvi = exposure.rescale_intensity(ndvi,\n    out_range='uint8')\n\nplt.figure()\n\
    io.imshow(ndvi,\n    cmap='gray')\nplt.axis('off')\nio.show()\n```\n\n或者，我们可以使用\
    \ `jet` 色图将 NDVI 显示为伪彩色图：\n\n```python\nndvi = exposure.rescale_intensity(ndvi,\n\
