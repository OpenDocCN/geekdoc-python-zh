    \ y(t-k)$$\n\n这是差分方程的非因果版本，但 Python 再次使用了因果索引：\n\n$$y(t) = \\sum_{k=0}^{N} b_k\
    \ \\cdot x(t-k) - \\sum_{k=1}^{M} a_k \\cdot y(t-k)$$\n\n这带来了设计零相位滤波器时已知的问题。M\
    \ 与 N_1+N_2 或 N 中较大的那个值就是滤波器的阶数。\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_237_0.png)\n\
    \n我们使用与前面示例相同的合成输入信号 x5 来说明递归滤波器的性能：\n\n```python\n%reset -f\n\nimport numpy as\
    \ np\nimport scipy.signal as signal\nimport matplotlib.pyplot as plt\nfrom numpy.random\
    \ import default_rng\n\nt = np.linspace(1,100,100)\nrng = default_rng(0)\nx5 =\
    \ rng.standard_normal((100))\n```\n\n然后使用一组权重 a5 和 b5 的递归滤波器对该输入进行滤波：\n\n```python\n\
    b5 = np.array([0.0048,0.0193,0.0289,0.0193,0.0048])\na5 = np.array([1.0000,-2.3695,2.3140,-1.0547,0.1874])\n\
    \nm5 = len(b5)\n\ny5 = signal.lfilter(b5,a5,x5)\n```\n\n并对输出 y5 进行相位校正：\n\n```python\n\
    y5[0:len(y5)-m5+1] = y5[np.arange(int((m5-1)/2),\n    len(y5)-int((m5-1)/2))]\n\
    y5[len(y5)-m5+1:len(y5)] = np.zeros((1,m5-1))\n```\n\n我们现在可以绘制结果：\n\n```python\n\
    plt.figure()\nplt.plot(t,x5,color='b')\nplt.plot(t,y5,color='r')\nplt.show()\n\
    ```\n\n这个滤波器明显改变了信号。输出仅包含低频分量，所有更高的频率都已被消除。比较输入和输出的周期图可以发现，所有高于 f=0.1（对应周期 τ=10）的频率都已被抑制：\n\
    \n```python\nf,Pxx = signal.periodogram(x5,fs=1,nfft=128)\nf,Pyy = signal.periodogram(y5,fs=1,nfft=128)\n\
    \nplt.figure()\nplt.plot(f,Pxx,color='b')\nplt.plot(f,Pyy,color='r')\nplt.grid\n\
    plt.xlabel('Frequency')\nplt.ylabel('Power')\nplt.show()\n```\n\n我们现在设计了一个频率选择性滤波器，即一个能消除某些频率而让其他频率相对不受影响的滤波器。下一节将介绍用于表征滤波器在时域和频域特性，以及预测频率选择性滤波器对任意信号影响的工具。\n\
    \n## 6.7 脉冲响应\n\n脉冲响应是描述滤波器特性的一种非常便捷的方式（图 6.3）。脉冲响应 h 在 LTI 系统中非常有用，其中输入信号 x(t)\
    \ 与 h 的卷积用于获得输出信号 y(t)：\n\n$$y(t) = \\sum_{k=-N_1}^{N_2} h_k \\cdot x(t-k)$$\n\
    \n可以证明，脉冲响应 h 的值在非递归滤波器中与滤波器权重相同，但在递归滤波器中则不同。上面的卷积方程通常写成简短形式：\n\n$$y(t) = h(t)\
    \ * x(t)$$\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_239_0.png)\n\n图 6.3 用于计算系统脉冲响应的单位脉冲变换。脉冲响应通常用于描述和预测滤波器的性能。\n\
    \n在许多示例中，时域卷积被替换为频域中傅里叶变换 $H(f)$ 和 $X(f)$ 的简单乘法：\n$$Y(f) = H(f) \\cdot X(f)$$\n\
    然后通过 $Y(f)$ 的逆傅里叶变换获得时域中的输出信号 $y(t)$。信号通常在频域而非时域进行卷积，因为乘法相对简单。然而，傅里叶变换本身会引入一些伪影和失真，因此频域卷积并非没有问题。在接下来的示例中，我们仅在时域应用卷积。\n\
    首先，我们生成一个单位脉冲：\n\n```python\n%reset -f\n\nimport numpy as np\nimport scipy.signal\
    \ as signal\nimport matplotlib.pyplot as plt\n\nt = np.linspace(0,20,21)\nx6 =\
