- md: "## 7.3 The 1 Arc-Minute Gridded Global Relief Data ETOPO1\n\nThe *1 arc-minute\
    \ global relief model of Earth's surface* (ETOPO1) is a global database of topographic\
    \ and bathymetric data on a regular 1 arc-minute grid (about 2 km) (Amante and\
    \ Eakins 2009). The ETOPO1 database supersedes the older ETOPO2 and ETOPO5 global\
    \ relief grids, which are nevertheless still available. ETOPO1 is a compilation\
    \ of data from a variety of sources. It can be downloaded from the NOAA National\
    \ Centers for Environmental Information (NCEI) website:\n\nhttps://www.ngdc.noaa.gov/mgg/global/global.html\n\
    \nWe can download either the whole-world grids or custom grids for ice surfaces\
    \ or bedrock. We create and extract a custom grid online from ETOPO1 using NCEI's\
    \ WCS client:\n\n```\nhttp://maps.ngdc.noaa.gov/viewers/wcs-client/\n```\n\nWe\
    \ first choose the *ETOPO1* (bedrock) layer. We then select *Select with Coordinates*\
    \ by clicking the *xy* icon in the upper-left corner of the map, and we specify\
    \ an area of interest, such as a latitude of *North: 20* (20°N) and *South: -20*\
    \ (20°S) and a longitude between *East: 30* (30°E) and *East: 60* (60°E), which\
    \ covers the eastern African coast. Negative latitude and longitude values are\
    \ assigned to the Southern Hemisphere and to the Western Hemisphere, respectively.\
    \ Clicking *OK* marks the area of interest as a transparent yellow rectangle on\
    \ the map. Next, we choose *ArcGIS ASCII Grid* as the *Output Format* and download\
    \ the file *etopo1_bedrock.asc*, which contains the following data:\n\n```\nncols\
    \      1801\nnrows      2401\nxllcorner  29.991666666667\nyllcorner  -20.008333333333\n\
    cellsize   0.016666666667\n294 299 293 288 285 282 ...\n237 241 245 266 264 274\
    \ ...\n259 263 267 262 263 266 ...\n310 306 300 294 296 291 ...\n348 346 352 356\
    \ 353 353 ...\n381 383 381 381 382 381 ...\n(cont'd)\n```\n\nThe headers document\
    \ the size of the data array (e.g., 1,801 columns and 2401 rows in our example),\
    \ the coordinates of the lower-left corner (e.g., approximately *x=20* and *y=-20*),\
    \ and the cell size (e.g., ~0.0167 = 1/60 of a degree latitude and longitude,\
    \ or 1 arc minute). Older versions of the ETOPO1 data set as well as other similar\
    \ data sets may also contain the -32,768 flag for data voids. We comment the header\
    \ out by typing # at the beginning of the first five lines:\n\n```\n#ncols   \
    \   1801\n#nrows      2401\n#xllcorner  29.991666666667\n#yllcorner  -20.008333333333\n\
    #cellsize   0.016666666667\n294 299 293 288 285 282 ...\n237 241 245 266 264 274\
    \ ...\n259 263 267 262 263 266 ...\n310 306 300 294 296 291 ...\n348 346 352 356\
    \ 353 353 ...\n381 383 381 381 382 381 ...\n(cont'd)\n```\n\nWe save the file\
    \ as *etopo1_data.txt*, and we then load the data into the workspace:\n\n```\n\
    %reset -f\n\nimport numpy as np\nimport pygmt as pygmt\nimport xarray as xr\n\
    from matplotlib import cm\nimport matplotlib.pyplot as plt\nfrom matplotlib.colors\
    \ import LightSource\n\nETOPO1 = np.loadtxt('etopo1_data_python.txt')\n```\n\n\
    We next flip the array up and down using `flipud()` in order to change the indexing\
    \ of the data array according to Python conventions:\n\n```\nETOPO1 = np.flipud(ETOPO1)\n\
    ```\n\nFinally, we check that the data are now correctly stored in the workspace\
    \ by printing the minimum and maximum elevations for the area:\n\n```\nprint(np.max(ETOPO1))\n\
    print(np.min(ETOPO1))\n```\n\nIn this example, the maximum elevation for the area\
    \ is 5677 m, and the minimum elevation is -5859 m. The reference level is sea\
    \ level (i.e., 0 m). We now define a coordinate system with `meshgrid()` using\
    \ the information that the lower-left corner is at latitude 20°S and longitude\
    \ 30°E. The resolution is 1 arc min, which corresponds to 1/60 of a degree:\n\n\
    ```\nlon = np.linspace(30,60,1801)\nlat = np.linspace(-20,20,2401)\nLON,LAT =\
    \ np.meshgrid(lon,lat)\n```\n\nWe now generate a colored surface from the elevation\
    \ data using `pcolormesh()`:\n\n```\nplt.figure()\nax1 = plt.axes(aspect='equal')\n\
    plt.pcolormesh(LON,LAT,ETOPO1,\n    cmap='jet',\n    shading='gouraud')\nplt.colorbar()\n\
    plt.show()\n```\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_267_0.png)\n\n**Fig.\
    \ 7.2** Surface plot of the ETOPO1 elevation data. The plot uses shading, which\
    \ is very popular in 3D computer graphics and creates a combined diffuse and specular\
    \ reflection on surfaces (data from Amante and Eakins 2009).\n\nThis script opens\
    \ a new figure window and generates a colored surface using the colormap jet and\
    \ generates Gouraud shading using gouraud. The surface is highlighted by a set\
    \ of color shades and is displayed in an overhead view. A spectacular way of plotting\
    \ digital topography is as a surface plot with angled lighting using LightSource()\
    \ from the colors module of the Matplotlib package (Fig. 7.2):\n\n```\nplt.figure()\n\
    fig,ax2 = plt.subplots(subplot_kw={\"projection\":\"3d\"})\nve = 500\nax2.set_box_aspect((1,1,ve/1850))\n\
    ls = LightSource(270,45)\nrgb = ls.shade(ETOPO1,\n    cmap=cm.jet,\n    vert_exag=ve/1850,\n\
    \    blend_mode='hsv')\nax2.plot_surface(LON,LAT,ETOPO1,\n    rstride=1,\n   \
    \ cstride=1,\n    linewidth=0,\n    facecolors=rgb,\n    antialiased=False,\n\
    \    shade=True)\nax2.tick_params(axis='both',\n    labelsize=6)\nax2.view_init(30,15-90)\n\
    ax2.grid(False)\nfig.savefig('etopo1_python.png',dpi=300)\nplt.show()\n```\n\n\
    The function `LightSource()` is used to create a light source from a specific\
    \ azimuth and elevation. We use `vert_exag` for vertical exaggeration in order\
    \ to emphasize vertical features of the surface plot, and we use `blend_mode='hsv'`\
    \ to combine the colormapped data values with the illumination intensity. The\
    \ actual surface plot is then created with `surface()` using the rgb object created\
    \ by `shade()` as `facecolors`. It is important to note that `rstride` and `cstride`\
    \ define the number of rows and columns of ETOPO1 that will be used to render\
    \ the graph. If we choose 1 (i.e., full resolution), rendering takes very long,\
    \ and we should therefore use a larger value (e.g., 5, as above) to resample the\
    \ data set vertically and horizontally by this factor in order to reduce rendering\
    \ time. We export the plot in a PNG format with a resolution of 300 dpi to the\
    \ file `etopo1_python.png`.\n\nWe can also use `makecpt()`, `Figure()`, and `grdview()`\
    \ from the *PyGMT* package, which makes use of the *xarray* package:\n\n```\n\
    ds = xr.DataArray(data=ETOPO1,\n    dims=['lat', 'lon'],\n    coords={'lat':lat,\
    \ 'lon':lon})\nframe = ['xa1f0.25', 'ya1f0.25', 'wSEnZ']\npygmt.makecpt(\n   \
    \ cmap='geo',\n    series=f'-6000/4000/10',\n    continuous=True)\n\nfig = pygmt.Figure()\n\
    fig.grdview(grid=ds,\n    perspective=[150,30],\n    frame=frame,\n    projection='M15c',\n\
    \    zsize='4c',\n    surftype='i',\n    plane='-6000+gazure',\n    shading=0)\n\
    fig.basemap(\n    perspective=True,\n    rose='jTL+w3c+l+o-2c/-1c')\nfig.colorbar(perspective=True,\n\
    \    position='JMR+o2c/0c+w10c',\n    frame=['a2000'])\nfig.show()\n```\n\nThese\
    \ script first uses `makecpt()` to choose the geo colormap from *PyGMT* that is\
    \ appropriate for elevation data since this function relates land and sea colors\
    \ to hypsometry and bathymetry, respectively. The function then uses `grdview()`\
    \ to"
  mdcn: "## 7.3 1角分网格全球地形数据 ETOPO1\n\n*1角分全球地表地形模型*（ETOPO1）是一个在规则1角分网格（约2公里）上提供地形和水深数据的全球数据库（Amante\
    \ and Eakins 2009）。ETOPO1数据库取代了较旧的ETOPO2和ETOPO5全球地形网格，但后者仍然可用。ETOPO1是多种来源数据的汇编。可以从美国国家海洋和大气管理局（NOAA）国家环境信息中心（NCEI）网站下载：\n\
    \nhttps://www.ngdc.noaa.gov/mgg/global/global.html\n\n我们可以下载全球网格，也可以下载冰面或基岩的自定义网格。我们使用NCEI的WCS客户端在线创建并提取ETOPO1的自定义网格：\n\
    \n```\nhttp://maps.ngdc.noaa.gov/viewers/wcs-client/\n```\n\n我们首先选择*ETOPO1*（基岩）图层。然后，通过点击地图左上角的*xy*图标，选择*按坐标选择*，并指定一个感兴趣的区域，例如纬度*北：20*（20°N）和*南：-20*（20°S），经度在*东：30*（30°E）和*东：60*（60°E）之间，这覆盖了东非海岸。负的纬度和经度值分别分配给南半球和西半球。点击*确定*后，感兴趣的区域在地图上标记为一个透明的黄色矩形。接下来，我们选择*ArcGIS\
    \ ASCII Grid*作为*输出格式*，并下载文件*etopo1_bedrock.asc*，其中包含以下数据：\n\n```\nncols      1801\n\
    nrows      2401\nxllcorner  29.991666666667\nyllcorner  -20.008333333333\ncellsize\
