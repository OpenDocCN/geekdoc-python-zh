    # 5.6 Evolutionary Power Spectrum


    The amplitude of spectral peaks usually varies with time. This is particularly
    true for paleoclimate time series. Paleoclimate records usually show trends not
    only in the mean and variance, but also in the relative contributions of rhythmic
    components, such as the Milankovitch cycles in marine oxygen-isotope records.
    Evolutionary power spectra have the ability to map such changes in the frequency
    domain. The *evolutionary* or *windowed power spectrum* is a modification of the
    method introduced in Sect. 5.3 that computes the spectrum of overlapping segments
    of the time series. These overlapping segments are relatively short compared with
    the windowed segments used by the Welch method (Sect. 5.3), which is used to increase
    the signal-to-noise ratio of power spectra. The evolutionary power spectrum method
    therefore uses the *Short-Time Fourier Transform* (STFT) instead of the Fast Fourier
    Transform (FFT). The output of the evolutionary power spectrum is the short-term,
    time-localized frequency content of the signal. Various methods can be used to
    display the results. For instance, time and frequency can be plotted on the $x$-
    and $y$-axes, respectively, or vice versa, with the color of the plot being dependent
    on the height of the spectral peaks.


    As an example, we use a data set that is similar to those used in Sect. 5.5. The
    data series contains three main periodicities of 100, 40, and 20 kyrs, respectively,
    as well as additive Gaussian noise. However, the amplitudes change through time,
    and this example can therefore be used to illustrate the advantage of the evolutionary
    power spectrum method. In our example, the 40 kyr cycle appears only after'
