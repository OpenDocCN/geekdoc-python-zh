  md: "I3G = color.rgb2gray(I3)\nmeanR = np.mean(I3[:,:,0])\nmeanG = np.mean(I3[:,:,1])\n\
    meanB = np.mean(I3[:,:,2])\nmeanGray = np.mean(I3G)\nI3W = np.zeros(np.shape(I3))\n\
    I3W[:,:,0] = I3[:,:,0]*meanGray/meanR\nI3W[:,:,1] = I3[:,:,1]*meanGray/meanG\n\
    I3W[:,:,2] = I3[:,:,2]*meanGray/meanB\n\nNext, we calculate the NDVI using\n\n\
    ```\nI4 = np.copy(I3W)\nndvi = (I4[:,:,2]-I4[:,:,0])/(I4[:,:,2]+I4[:,:,0])\n\n\
    ndvi = exposure.rescale_intensity(ndvi,\n    out_range='uint8')\n\nplt.figure()\n\
    io.imshow(ndvi,\n    cmap='gray')\nplt.axis('off')\nio.show()\n```\n\nAlternatively,\
