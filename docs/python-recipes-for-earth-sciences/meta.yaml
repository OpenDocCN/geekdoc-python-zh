    # 9.2 Principal Component Analysis


    Principal component analysis (PCA) detects linear dependencies between p variables
    and replaces groups of linearly correlated variables with p uncorrelated variables,
    which are referred to as the principal components (PCs) (Fig. 9.1). PCA—which
    was first introduced by Karl Pearson (1901) and was further


    ![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_393_0.png)


    Fig. 9.1 Principal component analysis (PCA) illustrated for a bivariate scatter.
    The original x₁x₂ coordinate system is replaced with a new orthogonal system in
    which the 1st axis PC₁ passes through the long axis of the data scatter and the
    new origin is the bivariate mean. We can now reduce the number of dimensions by
    dropping the 2nd axis PC₂ with little loss of information. Modified from Swan
    and Sandilands (1995).'
