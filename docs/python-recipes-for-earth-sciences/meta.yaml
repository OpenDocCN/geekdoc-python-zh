    for whatever reason, have made switch from MATLAB to Python. These users, like
    me, are familiar with MATLAB and first look for similar solutions in Python instead
    of programming Python code from scratch. This happens very often and is reflected
    in many Python packages, such as *NumPy* and *Matplotlib*, which are highly similar
    to MATLAB toolboxes, right down to their identical function names and input arguments.


    Readers who place both books side by side will notice that I have directly translated
    the code in order to make the numerical and graphical output as similar as possible.
    However, since different random generators are used in MATLAB and Python, the
    results do not always match with one another. In these cases, after generating
    synthetic data, the sample files generated with MATLAB are used in the Python
    examples in order to reproduce the results. There may also be some discrepancies
    in cases for which MATLAB produces a result of zero but for which Python produces
    a result slightly different from zero, such as -3.0552e-17. Such discrepancies
    are likely due to the less stringent floating-point error mitigation in many Python
    packages.


    The attentive reader will also notice that in some cases, there are minor discrepancies
    between the graphs generated with Python and the illustrations in the first half
    of the book. This is also due to the fact that the random generators used here
    provide different results and that not all of the used random generators can be
    reset. Therefore, some results (e.g., the bootstrapping results) are different
    between individual runs. However, the figures at least qualitatively reflect the
    results of statistics, time series analysis, and signal processing. For the second
    half of the book, the graphics were newly created to reflect the peculiarities
    in the output of graphics packages such as *Matplotlib* and *PyGMT*, which certainly
    led to some very nice results.


    I wrote the Python scripts, which are based on the MATLAB scripts, with the best
    of my knowledge and with the support of the colleagues mentioned below. However,
    I cannot offer any warranty, especially when using software such as Python and
    the Python packages, which themselves offer no warranty. For example, I have found
    a number of discrepancies between results from Python and MATLAB, which I attribute
    to minor floating-point issues with some Python packages, such as the use of very
    small values instead of (correctly) zero in the calculation. I have flagged these
    discrepancies in the text. I recommend that the reader always test the code (be
    it with Python or MATLAB) with synthetic examples before applying it to real examples
    because it is also possible that users have made their own mistakes when using
    floating-point numbers.


    This book has benefited from the comments of many people, in particular from my
    contributing authors, Robin Gebbers and Norbert Marwan, as well as from many colleagues
    and friends worldwide who have read the work, pointed out mistakes, and made suggestions
    for improvement. I wish thank Ed Manning and Ryan DeLaney for their professional
    proofreading, which has greatly improved the readability of my book. I also very
    much appreciate the expertise and patience of Elisabeth Sillmann at *blaetterwaldDesign*,
    who has supported and advised me with the graphic design. I am very grateful to
    Annett Büttner, Marion Schneider,'
