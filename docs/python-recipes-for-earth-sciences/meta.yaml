  md: '# 10.5 Test for Randomness of Circular Data


    The first test for directional data compares the data set with a uniform distribution.
    Directional data that follow a uniform distribution are purely random (i.e., there
    is no preference for any one direction). We use the $\chi^2$-test (Sect. 3.8)
    to compare the empirical frequency distribution with the theoretical uniform distribution.
    We first load our sample data:


    ```

    %reset -f


    import numpy as np

    from scipy import stats

    import matplotlib.pyplot as plt


    data_degrees_1 = np.loadtxt(''directional_1.txt'')

    ```


    We then use `histogram()` to count the number of observations within 12 classes,
    each of which has a width of 30°:


    ```

    e = np.linspace(0,360,13)

    counts, e = np.histogram(data_degrees_1,bins=e)

    ```


    The expected number of observations is 200/12, where 200 is the total number of
    observations and 12 is the number of classes:


    ```

    expect = 200/12*np.ones(12)

    ```


    The $\chi^2$-test explores the squared differences between the observed and expected
    frequencies. The quantity $\chi^2$ is defined as the sum of these squared differences
    divided by the expected frequencies,


    ```

    chi2cal = np.sum((counts-expect)**2/expect)

    print(chi2cal)

    ```


    which yields


    ```

    748.5999999999998

    ```


    The critical $\chi^2$-value can be calculated using `chi2.ppf()`. The $\chi^2$-test
    requires the degrees of freedom $\Phi$. In our example, we test the hypothesis
    that the data are uniformly distributed (i.e., we estimate one parameter). Since
    the number of classes is 12, the number of degrees of freedom is $\Phi = 12-1-1
    = 10$. We test our hypothesis at a $p=5\%$ significance level. The function `chi2.ppf()`
    computes the inverse of'
  merge: -1
  pgno: 450
- img_proc: true
  md: 'the cumulative distribution function (CDF) of the $\chi^2$-distribution, with
    numbers of parameters specified by $\Phi$ for the corresponding probabilities
    in $p$,


    ```

    chi2crit = stats.chi2.ppf(1-0.05,12-1-1)

    print(chi2crit)

    ```


    which yields


    18.307038053275146


    Since the critical $\chi^2$ of 18.3070 is well below the measured $\chi^2$ of
    748.6000, we can reject the null hypothesis and conclude that our data do not
    follow a uniform distribution (i.e., they are not randomly distributed).


    # 10.6 Test for the Significance of a Mean Direction


    Once we have measured a set of directional data in the field, we may wish to know
    whether the data document a prevailing direction. We can find out using Rayleigh''s
    test for the significance of a mean direction (Mardia 1972; Mardia and Jupp 1999).
    This test uses the mean resultant length introduced in Sect. 10.3, which increases
    as the preferred direction increases:


    $$\bar{R} = \frac{1}{n} \sqrt{\left(\sum \sin \theta_i\right)^2 + \left(\sum \cos
    \theta_i\right)^2}$$


    The data show a preferred direction if the calculated mean resultant length is
    below a critical value (Mardia 1972) (Tab. 10.1). As an example, we again load
    the data contained in the file *directional_1.txt*:


    ```

    %reset -f


    import numpy as np

    import matplotlib.pyplot as plt


    data_degrees_1 = np.loadtxt(''directional_1.txt'')

    data_radians_1 = np.pi*data_degrees_1/180;

    ```


    We then calculate the mean resultant vector Rm_1_calc by typing


    ```

    x_1 = np.sum(np.sin(data_radians_1))

    y_1 = np.sum(np.cos(data_radians_1))

    ```'
