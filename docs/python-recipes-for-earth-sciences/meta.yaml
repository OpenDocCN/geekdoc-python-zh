    age = agedepth[0:,1]\n```\n\nA second-degree polynomial can then be fitted by\
    \ using polyfit(),\n\n```\np = np.polyfit(meters,age,2)\nprint(p)\n```\n\nwhich\
    \ yields\n\n```\n[ 0.05890582  4.10867582 26.0381405 ]\n```\n\nThe first coefficient\
    \ is close to zero, that is, it has little influence on predictions. The second\
    \ and third coefficients are similar to those obtained by linear regression. Plotting\
    \ the data yields a curve that resembles a straight line:\n\n```\npval = np.poly1d(p)\n\
    \nplt.figure()\nplt.plot(meters,age,\n    marker='o',\n    linestyle='none')\n\
    plt.plot(meters,pval(meters),\n    color=(0.8,0.5,0.3))\nplt.show()\n```\n\nWe\
    \ now use another synthetic data set that we generate using a quadratic relationship\
    \ between meters and age:\n\n```\nnp.random.seed(0)\nmeters = 20*np.random.rand(30)\n\
    age = 1.6*meters**2 -1.1*meters + 50\nrng = default_rng(0)\nage = age + 40*rng.standard_normal(np.shape(meters))\n\
    \nplt.figure()\nplt.plot(meters,age,\n    marker='o',\n    linestyle='none')\n\
    plt.show()\n\nagedepth = ma.hstack([meters,age])\n```\n\nA synthetic bivariate\
    \ data set can be also loaded from the file *agedepth_2.txt*:\n\n```\nagedepth\
    \ = np.loadtxt('agedepth_2.txt')\n\nmeters = agedepth[0:,0]\nage = agedepth[0:,1]\n\
    \nplt.figure()\nplt.plot(meters,age,\n    marker='o',\n    linestyle='none')\n\
    plt.show()\n```\n\nFitting a second-order polynomial produces a convincing regression\
