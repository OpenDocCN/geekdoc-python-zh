    \        -int(floor(log10(abs(0.1*data[i,2])))))\n```\n\nThe 2D plot of our data\
    \ is generated in two steps: First, the data are displayed as empty circles using\
    \ plot(). Second, the data are labeled using text(), which adds text contained\
