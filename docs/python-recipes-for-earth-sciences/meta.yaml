    ![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_88_0.png)


    Fig. 3.8 **a** Probability density function $f(x)$ and **b** cumulative distribution
    function $F(x)$ of a logarithmic normal distribution with a mean $\mu = 0$ and
    with various values for $\Phi$.


    and the cumulative distribution function is


    ```

    $$F(x) = \frac{1}{\sigma\sqrt{2\pi}} \int_{-\infty}^{x} \frac{1}{y} exp\left(-\frac{1}{2}\left(\frac{lny
    - \mu}{\sigma}\right)^2\right) dy$$

    ```


    where $x>0$. The distribution can be described by two parameters: the mean $\mu$
    and the standard deviation $\sigma$. However, the formulas for the mean and the
    standard deviation are different from those used for normal distributions. In
    practice, the values of $x$ are logarithmized, the mean and the standard deviation
    are computed using the formulas for a normal distribution, and the empirical distribution
    is then compared with a normal distribution.


    # Student’s t-Distribution


    *Student’s t-distribution* was first introduced by William S. Gosset (1876 to
    1937), who needed a distribution for small samples (Fig. 3.9). Gosset was an employee
    of the Irish Guinness Brewery and wished to publish his research results anonymously.
    He thus published his t-distribution under the pseudonym *Student* (Student 1908).
    The probability density function is


    ```

    $$f(x) = \frac{\Gamma\left(\frac{\Phi+1}{2}\right)}{\Gamma\left(\frac{\Phi}{2}\right)}
    \frac{1}{\sqrt{\Phi\pi}} \frac{1}{\left(1+\frac{x^2}{\Phi}\right)^{\frac{\Phi+1}{2}}}$$

    ```


    where $\Gamma$ is the Gamma function


    ```

    $$\Gamma(x) = \lim_{n \to \infty} \frac{n!n^{x-1}}{x(x+1)(x+2)\dots(x+n-1)}$$

    ```'
  - '[PAGE 89]


    ![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_89_0.png)


    Fig. 3.9 a Probability density function $f(x)$ and b cumulative distribution function
    $F(x)$ of Student''s $t$-distribution with two different values for $\Phi$.


    which can be written as


    ```

    $$\Gamma(x) = \int_{0}^{\infty} e^{-y} y^{x-1} dy$$

    ```


    if $x>0$. The single parameter $\Phi$ of the $t$-distribution is the number of
    degrees of freedom. In the analysis of univariate data, this distribution has
    $n-1$ degrees of freedom, where $n$ is the sample size. As $\Phi \to \infty$,
    the $t$-distribution converges toward the standard normal distribution. Since
    the $t$-distribution approaches the normal distribution for $\Phi > 30$, it is
    rarely used for distribution fitting. However, the $t$-distribution is used for
    hypothesis testing using the $t$-test (Sect. 3.7).


    # Fisher''s $F$-Distribution


    The $F$-distribution was named after statistician Sir Ronald Fisher (1890 to 1962).
    It is used for hypothesis testing via the $F$-test (Sect. 3.8). The $F$-distribution
    has a relatively complex probability density function (Fig. 3.10),


    ```

    $$f(x) = \frac{\Gamma\left(\frac{\Phi_1+\Phi_2}{2}\right)\left(\frac{\Phi_1}{\Phi_2}\right)^{\frac{\Phi_1}{2}}}{\Gamma(\Phi_1/2)\Gamma(\Phi_2/2)}
    x^{\frac{\Phi_1-2}{2}} \left(1 + \frac{\Phi_1}{\Phi_2}x\right)^{-\frac{\Phi_1+\Phi_2}{2}}$$

    ```


    where $x>0$ and $\Gamma$ is again the Gamma function. The two parameters $\Phi_1$
    and $\Phi_2$ are the numbers of degrees of freedom.'
