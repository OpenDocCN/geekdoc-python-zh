    plt.ylabel('Number of Grains')\nplt.axis(np.array([0,0.1,0,30]))\n```\n\nIf oversegmentation\
    \ is a major problem when using segmentation to count objects in an image, it\
    \ would be wise to refer to the book by Gonzalez and Woods (2018), which describes\
    \ marker-controlled watershed segmentation as an alternative method that can be\
    \ used to avoid oversegmentation.\n\n## 8.11 Quantifying Charcoal in Microscopic\
    \ Images\n\nQuantifying the composition of substances in geosciences (e.g., the\
    \ mineral composition of a rock in thin sections or the amount of charcoal in\
    \ sieved sediment samples) is facilitated by the use of image processing methods.\
    \ *Thresholding* provides a simple solution to problems associated with segmenting\
    \ objects within an image that have different coloration or grayscale values.\
    \ During the thresholding process, pixels with an intensity value greater than\
    \ a threshold value are marked as object pixels (e.g., pixels that represent charcoal\
    \ in an image), and the rest are marked as background pixels (e.g., all other\
    \ substances). The threshold value is usually defined manually by visually inspecting\
    \ the image histogram, but numerous automated algorithms are also available.\n\
    \nAs an example, we next analyze an image of a sieved lake sediment sample from\
    \ Lake Nakuru, Kenya (Fig. 8.10). The image shows abundant light-gray oval ostracod\
    \ shells and some mineral grains as well as gray plant remains and black charcoal\
    \ fragments. We use thresholding to separate the dark charcoal particles and count\
    \ the pixels of these particles after segmentation. After determining the number\
    \ of pixels for all objects that can be distinguished from the background by thresholding,\
    \ we use a lower threshold value to determine the ratio of the number of pixels\
    \ that represent charcoal to the number of pixels that represent all particles\
    \ in the sample (i.e., to determine the percentage of charcoal in the sample).\n\
    \nWe read the image of size 1,500-by-1,500 pixels and assume that the width and\
    \ height of the square image are both one centimeter:\n\n```python\n%reset -f\n\
    \nimport cv2\nimport numpy as np\nimport matplotlib.pyplot as plt\nfrom skimage\
