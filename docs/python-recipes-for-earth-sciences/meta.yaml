    ## 3.13 分布拟合


    在第3.9节中，我们计算了样本的均值和标准差，并基于这两个参数设计了一个正态分布。然后，我们使用χ²检验来检验我们的数据确实服从高斯（或正态）分布的假设。scikit-learn包中包含的分布拟合函数提供了直接从数据估计分布的强大工具。


    用于将正态分布拟合到数据的函数是norm.fit()。为了演示此函数的使用，我们首先生成100个合成的高斯分布值集，其均值为6.4，标准差为1.4：


    ```

    %reset -f


    import numpy as np

    import numpy.ma as ma

    import matplotlib.pyplot as plt

    from numpy.random import default_rng

    from scipy import stats

    from sklearn.mixture import GaussianMixture


    rng = np.random.default_rng(0)

    data = 6.4 + 1.4*rng.standard_normal(100)

    ```


    然后，我们定义九个直方图区间的中点v，其边界为e，显示结果，并计算频率分布n：


    ```

    plt.figure()

    plt.hist(data)

    plt.show()


    n,e = np.histogram(data,bins=8)

    v = np.diff(e[0:2])*0.5+e[0:-1]

    ```


    函数norm.fit()给出了data中观测值的正态分布的均值muhat和标准差sigmahat的估计值：


    ```

    mu,std = stats.norm.fit(data)

    print(mu)

    print(std)

    ```


    输出结果为：


    ```

    6.513535370887004

    1.3469826455752003

    ```


    这些均值和标准差的值与我们最初定义的值相似。我们现在可以计算具有均值muhat和标准差sigmahat的正态分布的频率分布。然后，我们可以将得到的概率密度函数y缩放到与data中相同的总观测数，并绘制结果：


    ```

    res = 1/20

    x = np.arange(2,12,res)

    pdf = stats.norm.pdf(x,mu,std)

    pdf = len(data)*(1/res)*pdf/sum(pdf)


    plt.figure()

    plt.bar(v,n)

    plt.plot(x,pdf,color=''r'')

