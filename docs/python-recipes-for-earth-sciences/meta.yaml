    # 3.10 The Kolmogorov–Smirnov Test


    The *Kolmogorov–Smirnov* (or *K–S*) *test* (introduced by Andrei N. Kolmogorov
    and Nikolai W. Smirnov) is similar to the χ²-test in that it also involves comparing
    distributions and thereby allows two distributions to be tested for derivation
    from the same population (Kolmogorov 1933; Smirnov 1939). This test is independent
    of the type of distribution that is used and can therefore be used to test the
    hypothesis that the observations were drawn from a specific theoretical distribution.


    Let us again assume that we have a data set that consists of multiple chemical
    measurements from a sedimentary unit. We can use the K–S test to test the null
    hypothesis that these measurements can be described by a Gaussian distribution
    with a typical central value (the mean) and a random dispersion around the mean
    (the standard deviation). The appropriate test statistic is then


    $KS = max|F_n(x) - F(x)|$


    where $F_n(x)$ is the cumulative frequency distribution of the $n$ measurements
    and $F(x)$ is the cumulative frequency distribution expected from the theoretical
    distribution. The null hypothesis can be rejected if the measured $KS$ value is
    higher than the critical $KS$ value.


    As an example, we can again test the hypothesis that our organic carbon measurements
    contained in *organicmatter_one.txt* follow a Gaussian distribution. We must first
    load and standardize the data in order to have a mean of zero and a standard deviation
    of one:'
- md: "## 3.11 Mann–Whitney Test\n\nThe *Mann–Whitney test* (also known as the *Wilcoxon\
    \ rank-sum test*) was introduced by Henry B. Mann and Donald R. Whitney (1947)\
    \ and can be used to determine whether two samples come from the same population\
    \ (e.g., the same lithologic unit) (null hypothesis) or from two different populations\
    \ (alternative hypothesis). In contrast to the *t*-test, which compares the means\
    \ of Gaussian-distributed data, the Mann–Whitney test compares the medians without\
    \ requiring a normality assumption for the underlying population (i.e., it is\
    \ a non-parametric hypothesis test).\n\nThe test requires that the samples have\
    \ similar dispersions. We first combine both sets of measurements (samples 1 and\
    \ 2) and arrange them together in ascending order. We then sum the ranks of samples\
    \ 1 and 2, where the sum of all ranks is $R = n(n+1)/2$, with $n$ as the total\
    \ number of measurements. The published literature is full of different versions\
    \ of how to calculate the test statistic. Here, we use the version that can be\
    \ found in Hedderich and Sachs (2012, pp. 484),\n\n$U_1 = n_1n_2 + \\frac{n_1(n_1\
    \ + 1)}{2} - R_1$\n\n$U_2 = n_1n_2 + \\frac{n_2(n_2 + 1)}{2} - R_2$\n\nwhere $n_1$\
    \ and $n_2$ are the sizes of samples 1 and 2, respectively, and $R_1$ and $R_2$\
    \ are the sums of the ranks of samples 1 and 2, respectively. The required test\
    \ statistic $U$ is the smaller of the two variables $U_1$ and $U_2$, which we\
    \ compare with a critical $U$ value that depends on the sample sizes $n_1$ and\
    \ $n_2$, respectively, and on the significance level $\\alpha$. Alternatively,\
    \ we can use the $U$ value to calculate\n\n$\\widehat{Z} = \\frac{\\left|U - \\\
    frac{n_1n_1}{2}\\right|}{\\sqrt{\\frac{n_1n_2(n_1+n_2+1)}{12}}}$\n\nif $n_1 \\\
    geq 8$ and $n_2 \\geq 8$ (Mann and Whitney 1947; Hedderich and Sachs 2012, page\
    \ 486). The null hypothesis can be rejected if the absolute measured $z$-value\
    \ is greater than the absolute critical $z$-value, which depends on the significance\
    \ level $\\alpha$ (Sect. 3.4).\n\nIn practice, data sets often contain tied values,\
    \ that is, some of the values in sample 1 and/or sample 2 are identical. In this\
    \ case, the average ranks of the tied values are used instead of the true ranks.\
    \ That means that the equation for the $z$-value must be corrected for tied values,\n\
    \n$\\widehat{Z} = \\frac{\\left|U - \\frac{n_1n_1}{2}\\right|}{\\sqrt{\\left(\\\
    frac{n_1n_2}{S(S-1)}\\right) \\cdot \\left(\\frac{S^3-S}{12} - \\sum_{i=1}^{r}\
    \ \\frac{t_i^3-t_i}{12}\\right)}}$\n\nwhere $S=n_1+n_2$, $r$ is the number of\
    \ tied values and $t_i$ is the number of occurrences of the $i$th tied value.\
    \ Again, the null hypothesis can be rejected if the absolute measured $z$-value\
    \ is greater than the absolute critical $z$-value, which depends on the significance\
    \ level $\\alpha$.\n\nThe *SciPy* package provides `ranksums()` for performing\
    \ a Mann–Whitney test to determine whether two samples `data1` and `data2` that\
    \ each consist of eight measurements with some tied values come from the same\
    \ population (null hypothesis) or from two different populations (alternative\
    \ hypothesis). We define two samples that each consist of eight measurements:\n\
    \n```python\n%reset -f\n\nimport numpy as np\nfrom scipy import stats\n\ndata1\
    \ = np.array([5,5,8,9,13,13,13,15])\ndata2 = np.array([3,3,4,5,5,8,10,16])\n```\n\
    \nWe use `ranksums()` to perform a Mann–Whitney test on the same samples,\n\n\
    ```python\nstatistic,pvalue = stats.ranksums(data1,data2)\nprint(statistic)\n\
    print(pvalue)\n```\n\nwhich yields\n\n```\n1.6278255976825613\n0.10356187117653398\n\
    ```\n\nThe result means that we cannot reject the null hypothesis at a 5% significance\
    \ level. The *p*-value of 0.1071 (or ~11%, which is larger than the significance\
    \ level) means that the chances of observing either the same result or a more\
    \ extreme result from similar experiments in which the null hypothesis is true\
    \ would be 11 in 100.\n\nWe can also use this script to test whether the two samples\
    \ in *organicmatter_two.mat* come from the same lithological unit (null hypothesis)\
    \ or from two different units (alternative hypothesis) without requiring a normality\
    \ assumption for the underlying population. We load the data using\n\n```python\n\
    corg = np.loadtxt('organicmatter_two.txt')\ncorg1 = corg[:,0]\ncorg2 = corg[:,1]\n\
    ```\n\nWe use `ranksums()` to perform a Mann–Whitney test on the same samples,\n\
    \n```python\nstatistic,pvalue = stats.ranksums(corg1,corg2)\nprint(statistic)\n\
