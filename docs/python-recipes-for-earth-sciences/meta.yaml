    259 263 267 262 263 266 ...\n310 306 300 294 296 291 ...\n348 346 352 356 353\
    \ 353 ...\n381 383 381 381 382 381 ...\n(续)\n```\n\n文件头记录了数据数组的大小（例如，在我们的示例中为1,801列和2,401行）、左下角的坐标（例如，约*x=20*和*y=-20*）以及单元格大小（例如，~0.0167\
    \ = 1/60度纬度和经度，或1角分）。较旧版本的ETOPO1数据集以及其他类似数据集也可能包含表示数据空缺的-32,768标志。我们通过在前五行开头输入#来注释掉文件头：\n\
    \n```\n#ncols      1801\n#nrows      2401\n#xllcorner  29.991666666667\n#yllcorner\
    \  -20.008333333333\n#cellsize   0.016666666667\n294 299 293 288 285 282 ...\n\
    237 241 245 266 264 274 ...\n259 263 267 262 263 266 ...\n310 306 300 294 296\
