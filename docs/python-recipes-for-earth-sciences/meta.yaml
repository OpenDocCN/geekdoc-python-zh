    \ in range(0,8):\n        inflow[:,:,i] = np.roll(inflowsum,N[i,0],axis=0)\n \
    \       inflow[:,:,i] = np.roll(inflow[:,:,i],N[i,1],axis=1)\n    inflowsum =\
    \ np.sum(inflow*flow*grads>0,2)\n    flowac = flowac + inflowsum\n```\n\nWe display\
    \ the result as a pseudocolor map with log-scaled values (Fig. 7.16e):\n\n```\n\
    plt.figure()\nplt.axes(aspect='equal')\nplt.pcolor(np.log(1+flowac),\n    cmap=cm.jet_r)\n\
    plt.colorbar()\nplt.title('Flow accumulation')\nplt.show()\n```\n\nThe plot displays\
    \ areas with high flow accumulation in shades of blue and areas with low flow\
    \ accumulation (which usually correspond to ridges) in shades of red. We use a\
    \ logarithmic scale to map the flow accumulation in order to obtain a better representation\
    \ of the results. The simplified algorithm introduced here for calculating flow\
    \ accumulation can be used to analyze sloping terrains in DEMs. In flat terrains,\
    \ in which the slope approaches zero, no flow direction can be generated by our\
    \ algorithm, and flow accumulation thus stops. Such situations require more advanced\
    \ algorithms that can perform analyses on completely flat terrain. These more\
    \ advanced algorithms also include sink-filling routines for avoiding spurious\
    \ sinks that interrupt flow accumulation. Small depressions can be filled by smoothing,\
    \ as we did at the beginning of this section.\n\nThe first part of this section\
    \ dealt with primary relief attributes. Secondary attributes of a DEM are functions\
    \ of two or more primary attributes. Examples of these secondary attributes include\
    \ the wetness index and the stream power index. The *wetness index* for a cell\
    \ is the log of the ratio between the area of the catchment for that particular\
    \ cell and the tangent of its slope:\n\n$$weti = \\log\\left(\\frac{1+flowac}{\\\
    tan(slp)}\\right)$$"
- md: "The term 1+flowac avoids the problems associated with calculating the logarithm\
    \ of zero when flowac=0. The wetness index is used to predict the soil water content\
    \ (saturation) that results from lateral water movement. The potential for water\
    \ logging is usually highest in the lower parts of catchments, where the slopes\
    \ are gentler. Flat areas with a large upslope area have a high wetness index\
    \ compared with steep areas with small catchments. The wetness index weti is computed\
    \ and displayed by typing\n\n```\nweti = np.log((1+flowac)/np.tan(np.pi*slp/180))\n\
    \nplt.axes(aspect='equal')\nplt.pcolor(weti,\n    cmap=cm.jet_r)\nplt.colorbar()\n\
    plt.title('Wetness index')\nplt.show()\n```\n\nIn this plot, blue colors represent\
    \ high values for the wetness index, while red colors represent low values (Fig.\
    \ 7.16f). In our example, soils in the southeast are the most likely to have a\
    \ high water content due both to the runoff from the large central valley and\
    \ to the flatness of the terrain.\n\nThe stream power index is another important\
    \ secondary relief attribute that is frequently used in hillslope hydrology, geomorphology,\
    \ soil science, and related disciplines. As a measure of stream power, it provides\
    \ an indication of the potential for sediment transport and erosion by water.\
    \ The stream power index is defined as the product of the catchment area for a\
    \ specific cell and the tangent of the slope of that cell:\n\nspi = flowac · tan(slp)\n\
    \nThe potential for erosion is high when large quantities of water (calculated\
    \ via flow accumulation) are fast flowing due to an extreme slope. The following\
    \ series of commands compute and display the stream power index:\n\n```\nspi =\
