    a lower limit, such as with mean annual precipitation or the frequency of earthquakes
    (Fig. 3.8). In such cases, distributions are usually characterized by major skewness,
    which is best described by a logarithmic normal distribution. The probability
    density function of this distribution is


    $$f(x) = \frac{1}{\sigma\sqrt{2\pi}x} exp\left(-\frac{1}{2}\left(\frac{lnx - \mu}{\sigma}\right)^2\right)$$'
