    \ 方向数据\n\n### 10.1 引言\n\n分析*圆形和球形数据*的方法在地球科学中被广泛使用。例如，构造地质学家测量和分析断层面上条纹擦痕的方位。圆形统计在古地磁应用中也很常见。微观结构研究包括分析薄片中的颗粒形状和石英*c*轴方位，古环境学家则根据细长化石壳的排列重建古水流方向（图10.1）。地球科学中有两种类型的方向数据：狭义的方向数据和定向数据。方向数据（例如，由槽模记录的河流古水流方向，或由冰川擦痕指示的冰川流动方向）具有真实的极性，而定向数据描述的是没有方向感的轴向数据和线（例如，节理的方位）。\n\
