    \    [4200.*(UL[0]-LL[0])/(UL[0]-LR[0]),0.],\n    [4200.*(UL[0]-UR[0])/(UL[0]-LR[0]),4100.],\n\
    \    [4200.,4100.*(LR[1]-LL[1])/(UR[1]-LL[1])]])\n```\n\nThe four corners of the\
    \ image correspond to the pixels in the four corners of the original image, which\
    \ we store in a variable named fixedpoints:\n\n```\nfixedpoints = np.array([\n\
    \    [0.,0.],\n    [4200.,0.],\n    [0.,4100.],\n    [4200.,4100.]])\n\nfixedpoints\
    \ = np.fliplr(fixedpoints)\nmovingpoints = np.fliplr(movingpoints)\n```\n\nThe\
    \ function estimate_transform() now takes the pairs of control points (i.e., movingpoints\
    \ and fixedpoints) and uses them to infer a spatial transformation matrix tform.\
    \ We use an affine transformation using affine, which preserves points, straight\
    \ lines, and planes and also keeps parallel lines parallel after transforming\
    \ the image:\n\n```\ntform = tf.estimate_transform('affine',movingpoints,fixedpoints)\n\
    ```\n\nFinally, the affine transformation can be applied to the original RGB composite\
    \ naivasha_rgb using warp() in order to obtain a georeferenced version of the\
    \ satellite image newnaivasha_rgb with the same size as naivasha_rgb using tform:\n\
    \n```\nnewnaivasha_rgb = tf.warp(naivasha_rgb,tform)\n```\n\nThe georeferenced\
