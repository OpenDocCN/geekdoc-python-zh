    \ $x(t)$ 数据的*插值技术*旨在从非均匀间隔的 $x(t)$ 测量值中，计算出等间隔 $t$ 向量的 $x$ 值。*线性插值*通过在两个相邻测量值之间绘制一条直线，并计算直线上相应点的\
