    # 8


    # 8.1 Introduction


    Computer graphics are stored and processed as either vector or raster data. Most
    of the data encountered in the previous chapter were vector data, including points,
    lines, and polygons. Examples of vector data include drainage networks, the outlines
    of geologic units, sampling locations, and topographic contours. In Chap. 7, coastlines
    were stored in a vector format, while bathymetric and topographic data were saved
    in a raster format. Vector and raster data are often combined in a single data
    set, for instance, when displaying the course of a river on a satellite image.
    Raster data are often converted to vector data by digitizing points, lines, or
    polygons. Conversely, vector data are sometimes transformed into raster data.


    Images are generally represented as raster data, that is, as a 2D or 3D array
    of color intensities. Images are everywhere in the earth sciences. Field geologists
    use aerial photos and satellite images to identify lithologic units, tectonic
    structures, landslides, and other features within a study area. Geomorphologists
    use such images to analyze drainage networks, river catchments, and vegetation
    or soil types. Moreover, a great variety of image processing methods are used
    to analyze images from thin sections, to automatically identify objects, and to
    measure varve thicknesses.


