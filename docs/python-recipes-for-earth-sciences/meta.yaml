    \n第一个示例展示了不使用 `PCA()` 而使用 `cov()` 计算 $p=2$ 维数据集的 $p$ 乘 $p$ 协方差矩阵，然后使用 `eig()`\
    \ 计算该矩阵的 $p$ 个特征向量和 $p$ 个特征值的 PCA 方法。我们接下来假设一个数据集，它由 $n$ 个样本的 $p$ 个变量测量值组成，存储在一个名为\
    \ `data` 的 $n$ 乘 $p$ 数组中。例如，我们可以创建一个包含 2 乘 30 个数据点的双变量数据集，该数据集具有强线性相关性，并叠加了正态分布的噪声：\n\
    \n```python\n%reset -f\n\nimport numpy as np\nimport numpy.linalg as linalg\n\
