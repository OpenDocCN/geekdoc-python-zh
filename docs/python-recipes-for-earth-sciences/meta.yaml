    plt.xlabel('Real Value')\nplt.ylabel('Predicted Value')\nplt.axis('square')\n\
    plt.show()\n```\n\n# 9.7 Aitchison’s Log-Ratio Transformation\n\nAnyone who has\
    \ ever dealt with the statistical analysis of compositional data must have stumbled\
    \ across John Aitchison’s (1926–2016) log-ratio transformation. The Scottish statistician\
    \ spent much of his career dealing with the statistics of such data. Indeed, he\
    \ wrote the famous book *The Statistical Analysis of Compositional Data* (Aitchison\
    \ 1984, 1986, 1999, 2003) and published multiple papers on the topic. Aitchison’s\
    \ log-ratio transformation overcomes the closed-sum problem of closed data (i.e.,\
    \ data that are expressed as proportions and added to a fixed total, such as 100%).\
    \ The closed-sum problem causes spurious negative correlations between pairs of\
    \ variables in multivariate data sets, which are avoided by logarithmizing ratios\
    \ of these variables. As an example, multiproxy data in paleoclimate studies are\
    \ often closed data (i.e., they are very much influenced by dilution effects).\
    \ In the simplest example, this could be a mixture of three components that together\
    \ make up 100% of the sediment. Imagine that one of the components is now constant\
    \ (i.e., the same amount of this component is always delivered per unit time).\
    \ Since the total of all three components is always 100%, the other two components\
    \ are necessarily anticorrelated: If one goes up, the other two must go down by\
    \ the same total amount.\n\nUsing ratios helps to overcome the problem that the\
    \ magnitudes of compositional data are actually ratios whose denominators are\
    \ the sums of the concentrations of all constituents (see Davis 2003 for a short\
    \ summary of Aitchison’s log-ratio transformation). However, the product-moment\
    \ covariances of ratios are awkward to manipulate and result in complicated products\
    \ and quotients. John Aitchison therefore suggested taking the logarithms of these\
    \ ratios and thereby"
- md: "also taking advantage of the simple properties of the logarithmic function,\
    \ for example, log(x/y)=log(x)–log(y) and hence also log(x/y)=–log(y/x). This\
    \ process allows for reducing the number of the covariances that are necessary\
    \ to describe the data set (Aitchison 2003, pages 65 to 66).\n\nHere is a simple\
    \ example that illustrates the closed-sum problem of a system with three variables\
    \ and the use of ratios as well as log-ratios to overcome the problem of spurious\
    \ correlations between pairs of variables. First, we clear the workspace and choose\
    \ colors for the plots:\n\n```\n%reset -f\n\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\n\ncolors = np.array([\n    [0,114,189],\n    [217,83,25],\n    [237,177,32],\n\
    \    [126,47,142],\n    ])/255\n```\n\nWe are interested in element1a and element1b,\
    \ which contribute to a sediment and are diluted by element1c. We simply create\
    \ three variables with magnitudes measured in milligrams and with a sinusoidal\
    \ variation of 200 samples down-core while making sure that all absolute values\
    \ are>0:\n\n```\nt = np.linspace(0.1,20,200)\nt = np.transpose(t)\n\nelement1a\
    \ = np.sin(2*np.pi*t/2) + 5\nelement1b = np.sin(2*np.pi*t/5) + 5\nelement1c =\
    \ 2*np.sin(2*np.pi*t/20) + 5\n\nplt.figure()\nplt.plot(t,element1a,\n    color=colors[0,:])\n\
    plt.plot(t,element1b,\n    color=colors[1,:])\nplt.plot(t,element1c,\n    color=colors[3,:])\n\
    plt.legend(['1a','1b','1c'])\nplt.title('Absolute amount of 1a-c (mg)')\nplt.show()\n\
    ```\n\nWe calculate the percentages of element1a, element1b, and element1c (i.e.,\
    \ we create ratios of the concentrations of the individual elements and the sum\
    \ of the concentrations of all elements). This process creates closed data (i.e.,\
    \ the data are now expressed as proportions and add to a fixed total of 100 percent):\
    \ element1a+element1b+element1c=100%. Both element1a and element1b are now affected\
    \ by the dilution due to element1c. These elements show a major sinusoidal long-term\
    \ trend that is not real (as is shown by the first figure):\n\n```\nelement1a_perc\
    \ = element1a/(element1a+element1b+element1c)\nelement1b_perc = element1b/(element1a+element1b+element1c)\n\
    element1c_perc = element1c/(element1a+element1b+element1c)\n\nplt.figure()\nplt.plot(t,element1a_perc,\n\
    \    color=colors[0,:])\nplt.plot(t,element1b_perc,\n    color=colors[1,:])\n\
    plt.plot(t,element1c_perc,\n    color=colors[3,:])\nplt.legend(['1a','1b','1c'])\n\
    plt.title('Relative concentration 1a-c (%)')\nplt.show()\n```\n\nWe have now established\
    \ ratios of element1a/element1b and of element1b/element1a, both of which are\
    \ independent of element1c. Note the change of sign and the difference in amplitude.\
    \ The ratios of element1a/element1b and element1b/element1a do not show any evidence\
    \ of a trend caused by the dilution effect of element1c. However, the two curves\
    \ are not identical (i.e., element1a/element1b and element1b/element1a are not\
    \ symmetric) (see Weltje and Tjallingii 2008, page 426):\n\n```\nratio12 = element1a_perc/element1b_perc\n\
    ratio21 = element1b_perc/element1a_perc\n\nplt.figure()\nax1 = plt.subplot()\n\
    ax2 = ax1.twinx()\nline1, = ax1.plot(t,ratio12,\n    color=colors[0,:],\n    label='1a/1b')\n\
    line2, = ax2.plot(t,ratio21,\n    color=colors[1,:],\n    label='1b/1a')\nax2.invert_yaxis()\n\
    plt.legend(handles=[line1,line2])\nplt.title('Ratios elements 1a/1b and 1b/1a')\n\
    plt.show()\n```\n\nWe now display log-ratios according to Aitchison (1986, 2003).\
    \ The log-ratios log(element1a/element1b) and log(element1b/element1a) are identical\
    \ except for the sign. It therefore makes no difference whether we use log(element1a/element1b)\
    \ or log(element1b/element1a), for instance, when running further statistical\
    \ analyses on the data:\n\n```\nratio12log = np.log10(ratio12)\nratio21log = np.log10(ratio21)\n\
    \nplt.figure()\nax1 = plt.subplot()\nax2 = ax1.twinx()\nline1, = ax1.plot(t,ratio12log,\n\
    \    color=colors[0,:],\n    label='log(1a/1b)')\nline2, = ax2.plot(t,ratio21log,\n\
    \    color=colors[1,:],\n    linestyle='--',\n    label='log(1b/1a)')\nax2.invert_yaxis()\n\
    plt.legend(handles=[line1,line2])\nplt.title('Log-ratio elements log(1a/1b) and\
    \ log(1b/1a)')\nplt.show()\n```\n\nAitchison's log-ratio transformation must be\
    \ used in all multivariate statistical methods that analyze closed data (e.g.,\
    \ Sects. 9.2 to 9.6) (Fig. 9.10).\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_437_0.png)\n\
    \n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_437_1.png)\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_437_2.png)\n\
    \n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_437_3.png)\n\n**Fig. 9.10** Demonstration\
    \ of Aitchison’s log-ratio transformation being used to overcome the closed-sum\
    \ problem of closed data: **a** absolute values of element1a, element1b, and element1c,\
    \ **b** relative amounts of element1a, element1b, and element1c, which shows the\
    \ closed-sum problem, **c** ratios of element1a/element1b and element1b/element1a,\
    \ which are both independent of element1c, and **d** log-ratios according to Aitchison\
    \ (1986, 2003), which are identical except for their sign and thus overcome the\
    \ closed-sum problem.\n\n## Recommended Reading\n\n- Aitchison J (1984) The statistical\
