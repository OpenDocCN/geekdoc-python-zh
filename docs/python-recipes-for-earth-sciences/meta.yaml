    ```\n\n函数 `freqz()` 返回数字滤波器 `b10` 的复频率响应 `h` 以及频率 `f`。接下来，我们计算并显示频率响应的幅度：\n\n\
    ```python\nmagnitude = np.abs(h)\n\nplt.figure()\nplt.plot(f,magnitude)\nplt.xlabel('Frequency')\n\
