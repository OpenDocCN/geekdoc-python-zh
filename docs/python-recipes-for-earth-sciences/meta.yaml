- md: "## 7.8 Comparison of Methods and Potential Artifacts\n\nThe first example in\
    \ this section illustrates the use of the *bilinear interpolation* technique for\
    \ gridding unevenly spaced data (Fig. 7.8–7.9). Bilinear interpolation is an extension\
    \ of the one-dimensional technique of linear interpolation introduced in Sect.\
    \ 5.5. In the two-dimensional case, linear interpolation is first performed in\
    \ one direction, and then in the other direction. Although the bilinear method\
    \ appears to be one of the simplest interpolation techniques and might thus not\
    \ be expected to yield serious artifacts or distortions in the data, the opposite\
    \ is true because the method has a number of disadvantages. As a result, other\
    \ methods are preferred in many applications.\n\nThe sample data used in the previous\
    \ section can again be loaded to study the effects of bilinear interpolation:\n\
    \n```python\n%reset -f\n\nimport numpy as np\nfrom scipy import interpolate\n\
    from math import log10, floor\nimport matplotlib.pyplot as plt\n\ndata = np.loadtxt('normalfault.txt')\n\
    labels = np.zeros(len(data))\nfor i in range(0,len(data)):\n    labels[i] = round(data[i,2],\n\
    \        -int(floor(log10(abs(0.1*data[i,2])))))\n```\n\nWe now choose the linear\
    \ method while using griddata() to interpolate the data:\n\n```python\nx = np.linspace(420,470,201)\n\
    y = np.linspace(70,120,201)\nXI,YI = np.meshgrid(x,y)\n\nZI = interpolate.griddata(data[:,0:2],data[:,2],\n\
    \    (XI,YI),method='linear')\n```\n\nThe results are plotted as contours. The\
    \ plot also includes the locations of the control points:\n\n```python\nv = np.linspace(-40,20,7)\n\
    \nplt.figure()\nplt.contourf(XI,YI,ZI,v)\nfor i in range(0,len(data)):\n    plt.plot(data[i,0],data[i,1],\n\
    \        marker='o',\n        markeredgecolor=(0,0,0),\n        markerfacecolor='none',)\n\
    \    plt.text(data[i,0]+1,data[i,1],labels[i],\n        fontsize=8)\nplt.colorbar()\n\
    plt.show()\n```\n\nThe new surface is restricted to the area that contains control\
    \ points: By default, bilinear interpolation does not extrapolate beyond this\
    \ region. Furthermore, the contours are rather angular compared with the smooth\
    \ shape of the contours from the bicubic spline interpolation. However, the most\
    \ important character of the bilinear gridding technique is illustrated by projecting\
    \ the data into a vertical plane:\n\n```python\nplt.figure()\nplt.plot(XI,ZI,\n\
    \    linewidth=0.3,\n    color='k')\nfor i in range(0,len(data)):\n    plt.plot(data[i,0],data[i,2],\n\
    \        marker='o',\n        markeredgecolor=(0,0,0),\n        markerfacecolor='none',)\n\
    \    plt.text(data[i,0]+1,data[i,2],labels[i],\n        fontsize=8)\n```\n\nThis\
    \ plot shows the projection of the estimated surface (vertical lines) and the\
    \ labeled control points. The z-values at the grid points never exceed the z-values\
    \ of the control points. As with the linear interpolation of time series (Sect.\
    \ 5.5), bilinear interpolation causes both substantial smoothing of the data and\
    \ a reduction in high-frequency variations.\n\nCubic spline interpolations represent\
    \ the other extreme in many ways and are often used both with extremely unevenly\
    \ spaced data and with noisy data:\n\n```python\nx = np.linspace(420,470,201)\n\
    y = np.linspace(70,120,201)\nXI,YI = np.meshgrid(x,y)\n\nZI = interpolate.griddata(data[:,0:2],data[:,2],\n\
    \    (XI,YI),method='cubic')\n\nv = np.linspace(-40,20,7)\n\nplt.figure()\nplt.contourf(XI,YI,ZI)\n\
    for i in range(0,len(data)):\n    plt.plot(data[i,0],data[i,1],\n        marker='o',\n\
    \        markeredgecolor=(0,0,0),\n        markerfacecolor='none',)\n    plt.text(data[i,0]+1,data[i,1],labels[i],\n\
    \        fontsize=8)\nplt.colorbar()\nplt.show()\n```\n\nThe contours suggest\
    \ an extremely smooth surface. This solution has proven highly useful in many\
    \ applications, but the method also produces a number of artifacts. As we can\
    \ see from the next plot, the estimated values at the grid points often lie beyond\
    \ the range of the measured z-values:\n\n```python\nplt.figure()\nplt.plot(XI,ZI,\n\
    \    linewidth=0.3,\n    color='k')\nfor i in range(0,len(data)):\n    plt.plot(data[i,0],data[i,2],\n\
    \        marker='o',\n        markeredgecolor=(0,0,0),\n        markerfacecolor='none',)\n\
    \    plt.text(data[i,0]+1,data[i,2],labels[i],\n        fontsize=8)\n```\n\nThis\
    \ can sometimes be appropriate and does not smooth the data the same way that\
    \ bilinear gridding does. However, introducing very close control points with\
    \ different z-values can result in serious artifacts. As an example, we introduce\
    \ one reference point with a z-value of +5 close to a reference point with a negative\
    \ z-value of around -26:\n\n```python\ndata = np.loadtxt('normalfault.txt')\n\
    data = np.append(data,[[450,105,5]],axis=0)\n\nlabels = np.zeros(len(data))\n\
    for i in range(0,len(data)):\n    labels[i] = round(data[i,2],\n        -int(floor(log10(abs(0.1*data[i,2])))))\n\
    \nZI = interpolate.griddata(data[:,0:2],data[:,2],\n    (XI,YI),method='cubic')\n\
    \nv = np.linspace(-40,20,7)\n\nplt.figure()\nplt.contourf(XI,YI,ZI)\nfor i in\
    \ range(0,len(data)):\n    plt.plot(data[i,0],data[i,1],\n        marker='o',\n\
    \        markeredgecolor=(0,0,0),\n        markerfacecolor='none',)\n    plt.text(data[i,0]+1,data[i,1],labels[i],\n\
    \         fontsize=8)\nplt.colorbar()\nplt.show()\n```\n\nThe extreme gradient\
    \ at the location (450, 105) results in a paired *low* and *high* (Fig. 7.8).\
    \ In such cases, it is recommended that one of the two control points be deleted\
    \ and that the z-value of the remaining control point be replaced by the arithmetic\
    \ mean of both z-values.\n\nThe third method available with griddata() – in addition\
    \ to *bilinear* (linear) and *bicubic* (cubic) interpolation – involves the use\
    \ of *nearest neighbor* (nearest) interpolation methods. We compare all of these\
    \ methods in the next example. We first clear the workspace, reload the data from\
