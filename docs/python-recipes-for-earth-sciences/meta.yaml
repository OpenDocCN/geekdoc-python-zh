    # 3.9 The $\chi^2$-Test


    Karl Pearson''s $\chi^2$-test involves comparing distributions, thereby allowing
    two distributions to be tested for derivation from the same population (Pearson
    1900). This test is independent of the distribution that is used and can therefore
    be used to test the hypothesis that the observations were drawn from a specific
    theoretical distribution.


    Let us assume that we have a data set that consists of multiple chemical measurements
    from a sedimentary unit. We could use the $\chi^2$-test to test the null hypothesis
    that these measurements can be described by a Gaussian distribution with a typical
    central value and a random dispersion around it. The $n$ data are grouped into
    $K$ classes, where $n$ should be above 30. The frequencies within the classes
    $O_k$ should not be lower than four and should certainly never be zero. The appropriate
    test statistic is then


    $$\widehat{\chi}^2 = \sum_{k=1}^{K} \frac{(O_k - E_k)^2}{E_k}$$


    where $E_k$ are the frequencies expected from the theoretical distribution (Fig.
    3.14). The null hypothesis can be rejected if the measured $\chi^2$-value is higher
    than the critical $\chi^2$-value, which depends on the number of degrees of freedom
    $\Phi = K-Z$, where $K$ is the number of classes and $Z$ is the number of parameters
    that describe the theoretical distribution plus the number of variables (e.g.,
    $Z=2+1$ for the mean and the variance from a Gaussian distribution of a data set
    for a single variable and $Z=1+1$ for a Poisson distribution for a single variable).


    As an example, we can test the hypothesis that our organic carbon measurements
    contained in *organicmatter_one.txt* follow a Gaussian distribution. We must first
    load the data into the workspace and compute the frequency distribution n_obs
    for the data measurements using eight classes:'
