    # 7.4 The 30 Arc-Second Elevation Model GTOPO30


    The Global 30 Arc-Second Elevation Data (GTOPO30) is a 30 arc-second (approximately
    1 km) global digital elevation data set that contains only elevation data and
    no bathymetry. The data set was developed by the Earth Resources Observation System
    Data Center and is available from the USGS EarthExplorer website at


    https://earthexplorer.usgs.gov


    The EarthExplorer website can be used to search for, preview, and download satellite
    images, aerial photographs, and cartographic products through the U.S. Geological
    Survey (USGS). The GTOPO30 data set is located in the Digital Elevation category.
    On this website, we first select the desired map section in the Search Criteria
    either by entering the coordinates of the four corners of the map or by zooming
    into the area of interest and selecting Use Map. As an example, we enter the coordinates
    of the Suguta Valley in the northern Kenya Rift (2°8''37.58"N 36°33''47.06"E).
    We then choose GTOPO30 from the Digital Elevation collection as the Data Set and
    click Results, which produces a list of records together with a toolbar for previewing
    and downloading data. In our example, we find a single data set GT30E020N40, which
    was acquired on 1 December 1996 and that is centered at 15°N 40°E. We need to
    register with the USGS website, log in, and then download the data set as a 55.0
    MB GeoTIFF and a 24.9 MB DEM, the latter of which is provided as a 26.1 MB compressed
    zip file. After decompressing the file gt30e020n40_dem.zip, we obtain eight files
    that contain the raw data and header files in various formats. The file also provides
    a GIF image of a shaded relief display of the data.


    Importing the GTOPO30 data into the workspace is simple. We rename the files by
    removing gt30 from the file name in the unzipped collection and use


    ```

    %reset -f


    import numpy as np

    from matplotlib import cm

    from matplotlib.colors import LightSource

    import matplotlib.pyplot as plt

    from matplotlib.colors import ListedColormap

    ```'
