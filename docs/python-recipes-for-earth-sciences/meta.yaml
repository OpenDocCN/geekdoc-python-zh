  - "[PAGE 218]\n\nThe number of triangles and triples is then\n\n```\nnumTripl =\
    \ np.sum(np.matmul(A,A))\nnumTria = np.trace(np.matmul(A,np.matmul(A,A)))\n```\n\
    \nand finally, the transitivity coefficient is the ratio\n\n```\nTrans = numTria/numTripl\n\
    print(Trans)\n```\n\nwhich yields\n\n```\n0.6459486011860506\n```\n\nThis number\
    \ means that the system does not have regular dynamics (which would yield a transitivity\
    \ coefficient close to one).\nIn order to detect changes in the dynamics, the\
    \ RQA can be computed for moving windows. The RQA of moving windows can be calculated\
    \ in two ways: either (1) by calculating the RQA measures for windows that move\
    \ along a single, global RP or (2) by calculating individual RPs for windows that\
    \ move along the original time series. If nonstationarities or trends are not\
    \ part of the main focus of the analysis, approach (2) helps to find transitions\
    \ that ignore these nonstationarities. However, if detecting overall (global,\
    \ long-scale) changes is of interest (e.g., to test for nonstationarity), the\
    \ recurrence conditions should be kept constant over time (thereby allowing the\
    \ global RP of the whole time series to be considered), and approach (1) should\
    \ be selected (Marwan 2011). The selected window size needs to be small enough\
    \ to ensure a good temporal resolution but large enough to cover typical variations\
    \ (e.g., several cycles) in order to find recurrences.\nIn our example, we choose\
    \ a moving window length of 150 data points and an overlap of 20% (Fig. 5.30):\n\
    \n```\nw = 150\n```\n\nWe then calculate the recurrence rate RR and the transitivity\
    \ coefficient Trans within these moving windows (Fig. 5.31 and 5.32):\n\n```\n\
    Trans = np.zeros(len(R)-w)\nRR = np.zeros(len(R)-w)\nfor i in range(0,len(R)-w,int(w/5)):\n\
    \    subR = R[i:i+w,i:i+w]\n    RR[i] = np.mean(subR)\n    subA = A[i:i+w,i:i+w]\n\
    \    numTripl = np.sum(np.matmul(subA,subA))\n    numClosTria = np.trace(np.matmul(subA,\n\
    \        np.matmul(subA,subA)))\n    Trans[i] = numClosTria/numTripl\n```"
