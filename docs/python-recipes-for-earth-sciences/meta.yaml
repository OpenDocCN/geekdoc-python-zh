  md: 'We add this noise to the original data, that is, we generate a signal that
    contains additive noise (Fig. 5.3b). Displaying the data illustrates the effect
    of noise on a periodic signal. Since no record is entirely free of noise in reality,
    it is important to become familiar with the influence of noise on power spectra:


