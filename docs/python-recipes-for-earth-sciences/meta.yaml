  md: "For quantitative analyses, the radiance values HYPR need to be corrected for\
    \ atmospheric and topographic effects. This correction – which yields Earth surface\
    \ reflectance values (in percentages) – is beyond the scope of the present book.\
    \ The EO-1 User Guide (v. 2.3) again explains several methods of converting radiance\
    \ values to reflectance values (Beck 2003).\n\nWe instead process the Hyperion\
    \ image in order to create a georeferenced RGB composite of Bands 29, 23, and\
    \ 16 for use in fieldwork. The header file *O1H1690582013197110KF.HDR* contains\
    \ (*inter alia*) the wavelengths corresponding to the 242 spectral bands. We can\
    \ read the wavelengths from the file using `loadtxt()`:\n\n```\ndtype = np.dtype(\"\
    f8,f8,f8,f8,f8,f8,f8,f8\")\nC11 = np.loadtxt(headerfile,\n    dtype = dtype,unpack=True,\n\
    \    skiprows=257,max_rows=8,delimiter=\",\")\nC11 = np.ravel(C11)\nC11 = np.reshape(C11,(64,1))\n\
    dtype = np.dtype(\"f8,f8,f8,f8,f8,f8\")\nC12 = np.loadtxt(headerfile,\n    dtype\
    \ = dtype,unpack=True,skiprows=265,\n    max_rows=1,delimiter=\",\",comments=\"\
    }\")\nC12 = np.ravel(C12)\nC12 = np.reshape(C12,(6,1))\nC1 = np.vstack((C11,C12))\n\
    C1 = C1[C1[:,0].argsort()]\ndtype = np.dtype(\"f8,f8,f8,f8,f8,f8,f8,f8\")\nC21\
    \ = np.loadtxt(headerfile,\n    dtype = dtype,unpack=True,skiprows=265,\n    max_rows=1,delimiter=\"\
    ,\",comments=\"}\")\nC21 = np.ravel(C21)\nC21 = np.reshape(C21,(8,1))\ndtype =\
    \ np.dtype(\"f8,f8,f8,f8,f8,f8,f8,f8\")\nC22 = np.loadtxt(headerfile,\n    dtype\
    \ = dtype,unpack=True,skiprows=266,\n    max_rows=21,delimiter=\",\",comments=\"\
    }\")\nC22 = np.ravel(C22)\nC22 = np.reshape(C22,(168,1))\ndtype = np.dtype(\"\
    f8,f8\")\nC23 = np.loadtxt(headerfile,\n    dtype = dtype,unpack=True,skiprows=287,\n\
    \    max_rows=1,delimiter=\",\",comments=\"}\")\nC23 = np.ravel(C23)\nC23 = np.reshape(C23,(2,1))\n\
    C2 = np.vstack((C21[6:8],C22,C23))\nC2 = C2[C2[:,0].argsort()]\n```"
