  - "[PAGE 220]\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_220_0.png)\n\n**Fig. 5.32**\
    \ Recurrence rate and transitivity coefficient for the synthetic data in Fig.\
    \ 5.30 using a moving window of 150 data points and an overlap of 20%.\n\n```\n\
    plt.figure()\nplt.plot(t[int(w/2):int(w/2)+len(RR):int(w/5)],\n    RR[0:-1:int(w/5)],\n\
    \    label='Recurrence rate')\nplt.plot(t[int(w/2):int(w/2)+len(RR):int(w/5)],\n\
    \    Trans[0:-1:int(w/5)],\n    label='Transitivity coefficient')\nplt.xlabel('Time')\n\
    plt.legend()\n```\n\nThe RQA measures show a clear transition within the higher\
    \ autocorrelation section. At this point, the measures have higher values, which\
    \ reflects the higher density of black dots, the changing neighborhood configuration\
    \ due to the autocorrelation, and the change in the dynamics of the system. The\
    \ presence of these higher values can be used to detect such a change in autocorrelation\
    \ (e.g., as a precursor to a *tipping point*) and to ultimately predict the tipping\
    \ point itself. The two empty quadrants interfere with the moving window directly\
    \ at the change point that occurs at time 1,000, thereby leading to a sudden decrease\
    \ in the *RR* measure.\n\nIn order to reliably interpret the variations in the\
    \ recurrence measures, a statistical test should be applied (Marwan 2011). Other,\
    \ more complex measures that quantify additional aspects of the dynamics (e.g.,\
    \ predictability or laminar phases) are included in the Cross Recurrence Plot\
    \ Toolbox for MATLAB, which is available at\n\nhttp://tocsy.pik-potsdam.de/CRPtoolbox/"
  - '[PAGE 221]


    Bivariate and multivariate extensions of recurrence plots allow nonlinear correlation
    tests and synchronization analyses to be carried out. A detailed introduction
    to methods based on recurrence plots can be found on the following website:


    http://www.recurrence-plot.tk


    Recurrence plots have already been used to analyze many problems in the earth
    sciences. Comparing the dynamics of modern precipitation data with paleo-rainfall
    data inferred from annual layered lake sediments in the northwestern Argentine
    Andes serves as a good example of such analyses (Marwan et al. 2003). In this
    example, the recurrence plot method was applied to red-color intensity transects
    across varved lake sediments that were approximately 30 kyrs old (Sect. 8.7).
    Comparing the recurrence plots from the sediments with those from modern precipitation
    data revealed that the reddish layers document the more intense rainy seasons
    that occur during La Niña years. Linear techniques were unable to link the increased
    flux of reddish clays with either the El Niño or the La Niña phase of the El Niño/Southern
    Oscillation. Moreover, recurrence plots helped to support the hypothesis that
    longer rainy seasons, increased precipitation, and the stronger influence of the
    El Niño/Southern Oscillation caused an increase in the number of landslides 30
    kyrs ago (Marwan et al. 2003; Trauth et al. 2003). A second earth science example—which
    includes a comprehensive description of recurrence plots and recurrence quantification
    analysis—used the technique to classify different types of variability and transitions
    in records from lake sediment cores in order to achieve an improved understanding
    of the response of the biosphere to climate change and especially the response
    of humans in the southern Ethiopian Rift (Trauth et al. 2019).


