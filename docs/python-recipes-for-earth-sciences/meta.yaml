  md: "# Preceding Analysis\n\nBecause linear geostatistics as presented in this book\
    \ is a parametric method, its underlying assumptions need to be checked by a preceding\
    \ analysis. As with other parametric methods, linear geostatistics is sensitive\
    \ to outliers and to deviations from a normal distribution. We first open the\
    \ data file *geost_dat.mat*, which contains *xyz* data triplets, and we then plot\
    \ the sampling locations. This allows us to check the point distribution and to\
    \ detect any major errors in the data coordinates *x* and *y*:\n\n```\n%reset\
    \ -f\n\nimport numpy as np\nfrom numpy import linalg\nfrom scipy import stats\n\
    import matplotlib.pyplot as plt\n\ndata = np.loadtxt('geost_dat.txt')\nx = data[:,0]\n\
    y = data[:,1]\nz = data[:,2]\n\nplt.figure()\nplt.plot(data[:,0],data[:,1],\n\
    \    marker='o',\n    markeredgecolor=(0.3,0.5,0.8),\n    markerfacecolor='none',\n\
    \    linestyle='none')\nplt.show()\n```\n\nThe range of the observations *z* can\
    \ be checked by typing\n\n```\nprint(np.min(z))\nprint(np.max(z))\n```\n\nwhich\
    \ yields\n\n```\n3.7198573\n7.8459703\n```\n\nFor linear geostatistics, the observations\
    \ *z* should be Gaussian distributed. This is usually only tested by visually\
    \ inspecting the histogram because statistical tests are often too sensitive if\
    \ the number of samples exceeds about 100. It is also possible to calculate the\
    \ skewness and kurtosis of the data by typing"
