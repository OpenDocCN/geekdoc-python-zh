    \ is less than B')\nelse:\n    if A >= B:\n        print('A is not less than B')\n\
    ```\n\nThese for loops and if statements are extensively used in the subsequent\
    \ chapters of this book.\n\n## 2.8 Scripts and Functions\n\nPython is a powerful\
    \ programming language. All files that contain Python code use .py as an extension\
    \ and are therefore called .py files. These files contain ASCII text and can be\
    \ edited using a standard text editor. However, the built-in Spyder Editor color-highlights\
