    to deal with the frequency of zero (i.e., with an infinite period), we start at
    a frequency value that is equivalent to the spacing of the frequency vector. The
    parameter ofac is the oversampling factor that influences the resolution of the
    frequency axis about the N(frequencies)=N(datapoints) case. We also need the high-'
