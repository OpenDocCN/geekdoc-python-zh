    \ = np.zeros((1,m6-1))\n```\n\n我们获得了一个与输入数组 x6 长度和相位相同的输出数组 y6。我们现在绘制结果进行比较：\n\
    \n```python\nplt.figure()\nplt.stem(t,x6)\nplt.stem(t,y6,\n    linefmt='r-',\n\
    \    markerfmt='ro',\n    basefmt='k-')\nplt.axis(np.array([0,20,-2,2]))\nplt.show()\n\
    ```\n\n与 `plot()` 不同，`stem()` 只接受一个数据系列，因此第二个系列 y6 通过再次使用 `stem()` 叠加在同一图上。滤波器的效果在图中清晰可见：它将单位脉冲在五个元素的长度上进行了平均。此外，输出\
    \ y6 的值等于 b6 的滤波器权重。在我们的示例中，b6 和 y6 的所有元素的值均为 0.2。\n\n然而，对于递归滤波器，输出 y6 与滤波器权重不匹配。我们再次首先生成一个脉冲：\n\
    \n```python\nt = np.linspace(0,20,21)\nx7 = np.zeros(21)\nx7[10] = 1\n```\n\n\
    然后设计一个具有权重 a7 和 b7 的任意递归滤波器：\n\n```python\nb7 = np.array([0.0048,0.0193,0.0289,0.0193,0.0048])\n\
    a7 = np.array([1.0000,-2.3695,2.3140,-1.0547,0.1874])\n\nm7 = len(b7)\n\ny7 =\
    \ signal.lfilter(b7,a7,x7)\n\ny7[0:len(y7)-m7+1] = y7[np.arange(int((m7-1)/2),\n\
    \    len(y7)-int((m7-1)/2))]\ny7[len(y7)-m7+1:len(y7)] = np.zeros((1,m7-1))\n\
    ```\n\n输入 x7 和输出 y7 的茎状图显示了一个有趣的脉冲响应：\n\n```python\nplt.figure()\nplt.stem(t,x7)\n\
