    \ above (Sect. 2.4):\n\n```\nnp.random.seed(0)\nA = np.random.rand(10,3)\nB =\
    \ np.zeros(np.shape(A))\nfor i in range(0,A.shape[0]):\n    for j in range(0,A.shape[1]):\n\
    \        B[i,j] = np.round(10*A[i,j])\nprint(A)\nprint(B)\n```\n\nThe second important\
    \ statements for controlling the flow of a script (apart from for loops) are if\
    \ statements, which evaluate an expression and then execute a group of instructions\
    \ if the expression is true. As an example, we compare the value of two scalars\
    \ A and B by typing\n\n```\nA = 1\nB = 2\nif A < B:\n    print('A is less than\
    \ B')\n```\n\nwhich yields\n\nA is less than B\n\nSimilar to for loops, if statements\
    \ require indenting the block of code that is part of the statement, which is\
    \ done in our example using four spaces. The script first evaluates whether A\
    \ is less than B and, if it is, displays the message A is less than B in the Console.\
    \ We can expand the if statement by introducing else, which provides an alternative\
