  md: '# 8.10 Grain Size Analysis from Microscopic images


    Identifying, measuring, and counting particles in an image are the classic applications
    of image analysis. Examples from the geosciences include grain size analysis,
    counting pollen grains, and determining the mineral composition of rocks from
    thin sections. For grain size analysis, the task is to identify individual particles,
    to measure their sizes, and then to count the number of particles per size class.
    The reason for using image analysis lies in its ability to perform automated analyses
    of large sets of samples in a short period of time and at relatively low costs.
    Three different approaches are commonly used to identify and count objects in
    an image: (1) region-based segmentation using the watershed segmentation algorithm,
    (2) object detection using the Hough transform, and (3) thresholding using color
    differences to separate objects. Gonzalez und Woods (2018) describe these methods
    in great detail in the 3rd edition of their excellent book. We utilize two examples
    to demonstrate how image processing can be used to identify, measure, and count
    particles. In this section, we demonstrate an application of watershed segmentation
    in grain size analysis, and in Sect. 8.9, we introduce thresholding as a method
    for quantifying charcoal in microscopic images.


    The following example covers segmenting, measuring, and counting objects using
    the watershed segmentation algorithm (Fig. 8.9). We first read an image of coarse
    lithic grains of different sizes and store it in the variable I1. The size of
    the image is 284 · 367 pixels, and since the width is 3 cm, the height is 3 cm
    · 284/67 = 2.32 cm. We type


