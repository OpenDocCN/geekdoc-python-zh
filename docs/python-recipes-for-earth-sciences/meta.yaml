  md: "Plotting the histogram reveals a bimodal distribution. We can also determine\
    \ the frequency distribution n using histogram():\n\n```\ne = np.arange(-0.5,30.5+1,1)\n\
    n,e = np.histogram(data,e)\nv = np.diff(e[0:2])*0.5+e[0:-1]\n\nplt.figure()\n\
    plt.bar(v,n)\nplt.show()\n```\n\nWe use GaussianMixture() to fit a Gaussian mixture\
    \ distribution with k components to the data. The function fits the model by maximum\
    \ likelihood using the Expectation–Maximization (EM) algorithm. The EM algorithm,\
    \ which was introduced by Arthur Dempster, Nan Laird, and Donald Rubin (1977),\
    \ is an iterative method that alternates between performing an expectation step\
    \ and a maximization step. The expectation step computes an expectation of the\
    \ logarithmic likelihood with respect to the current estimate of the distribution.\
    \ The maximization step computes the parameters that maximize the expected logarithmic\
    \ likelihood computed in the expectation step. The function GaussianMixture()\
    \ creates an object gm of the GaussianMixture class. We can now determine the\
    \ Gaussian mixture distribution with two components in a single dimension. Typing\n\
    \n```\ngm = GaussianMixture(n_components=2,\n    random_state=0).fit(data.reshape(-1,\
    \ 1))\nprint(gm.weights_)\nprint(gm.means_)\n```\n\nyields\n\n```\n[0.47194769\
    \ 0.52805231]\n[[13.41685425]\n [ 6.6834305 ]]\n```\n\nThus, we obtain the means\
    \ and relative mixing proportions of both distributions. In our example, both\
    \ normal distributions with means of 13.4169 and 6.6834, respectively, contribute\
    \ ~50% (~0.47 and ~0.53, respectively) to the mixture distribution. The object\
    \ gm contains several layers of information, including the mean gm.means_ and\
    \ the covariances gm.covariances_, which we use to calculate the probability density\
    \ function y of the mixed distribution:\n\n```\nx = np.arange(0,20+1/30,1/30)\n\
    y1 = np.ravel(stats.norm.pdf(x,gm.means_[0],\n    (gm.covariances_[0])**0.5))\n\
    y2 = np.ravel(stats.norm.pdf(x,gm.means_[1],\n    (gm.covariances_[1])**0.5))\n\
    ```"
