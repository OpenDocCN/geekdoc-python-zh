    \    linewidth=0.5)\ngl.xlocator = mticker.FixedLocator([-15,0,15,30,45,60])\n\
    gl.ylocator = mticker.FixedLocator([-30,-15,0,15,30])\nplt.show()\n```\n\nWe see\
    \ that the data set in `coastline_data.txt` contains only the outline of the African\
    \ continent because the data in the original GSHHS data set are sorted by continent.\
    \ The data set provided in *CartoPy* also shows the coastlines of the area surrounding\
    \ Africa.\n\n# 7.3 The 1 Arc-Minute Gridded Global Relief Data ETOPO1\n\nThe *1\
    \ arc-minute global relief model of Earth's surface* (ETOPO1) is a global database\
    \ of topographic and bathymetric data on a regular 1 arc-minute grid (about 2\
    \ km) (Amante and Eakins 2009). The ETOPO1 database supersedes the older ETOPO2\
    \ and ETOPO5 global relief grids, which are nevertheless still available. ETOPO1\
    \ is a compilation of data from a variety of sources. It can be downloaded from\
    \ the NOAA National Centers for Environmental Information (NCEI) website:\n\n\
    https://www.ngdc.noaa.gov/mgg/global/global.html"
