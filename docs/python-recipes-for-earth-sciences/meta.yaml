  md: "In order to obtain a clearer view and prepare a variogram model, the experimental\
    \ variogram is now replaced by the variogram estimator.\n\nThe variogram estimator\
    \ is derived from the experimental variograms in order to summarize their central\
    \ tendency (similar to the descriptive statistics derived from univariate observations\
    \ in Sect. 3.2). The classic variogram estimator is the averaged empirical variogram\
    \ within certain distance classes (or bins), which are defined by multiples of\
    \ the lag interval. The classification of separation distances is illustrated\
    \ in Fig. 7.20. The variogram estimator is calculated by\n\n$$\\gamma_E(h) = \\\
    frac{1}{2 * N(h)} \\cdot \\sum_{i=1}^{N(h)} (z_{x_i} - z_{x_{i+h}})^2$$\n\nwhere\
    \ $N(h)$ is the number of pairs within the lag interval $h$.\n\nWe first need\
    \ to decide on a suitable lag interval $h$. If sampling has been carried out on\
    \ a regular grid, the length of a grid cell can be used. If the samples are unevenly\
    \ spaced (as in our case), the mean minimum separation distance of pairs is a\
    \ good starting point for the lag interval (Webster and Oliver 2007). In order\
    \ to calculate the mean minimum separation distance between pairs, we need to\
    \ replace the zeros in the diagonal of the lag array D with NaNs; otherwise, the\
    \ mean minimum separation distance will be zero. Typing\n\n```\nD2 = D*(np.diag(x*np.nan)+1)\n\
    D2m = np.zeros(len(D2))\nfor i in range(0,len(D2)):\n    D2m[i] = np.nanmin(D2[i])\n\
    lag = np.mean(D2m)\nprint(lag)\n```\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_317_0.png)\n\
    \n**Fig. 7.20** Classification of separation distances for observations that are\
    \ equally spaced. The lag interval is $h_1$, while $h_2$, $h_3$, etc. are multiples\
    \ of the lag interval."
