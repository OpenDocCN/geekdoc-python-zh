    assumption for the underlying population (i.e., it is a non-parametric measure
    of correlation) (Spearman 1904, 1910). Furthermore, since Spearman''s coefficient
    uses the ranks of the values in $x$ and $y$ rather than the actual numerical values,
    it can be used to find correlations in nonlinear data and even in non-numerical
    data, such as fossil names or rock types in stratigraphic sequences. After replacing
    the numerical values in $x$ and $y$ with their ranks (whereby multiple values
