    # 6.7 Impulse Response


    The impulse response is a very convenient way of describing the characteristics
    of a filter (Fig. 6.3). The impulse response h is useful in LTI systems, in which
    the convolution of the input signal x(t) with h is used to obtain the output signal
    y(t):


    $$y(t) = \sum_{k=-N_1}^{N_2} h_k \cdot x(t-k)$$


    The values of the impulse response h can be shown to be identical to the filter
    weights in nonrecursive filters, but not in recursive filters. The convolution
    equation above is often written in a short form:


    $$y(t) = h(t) * x(t)$$'
