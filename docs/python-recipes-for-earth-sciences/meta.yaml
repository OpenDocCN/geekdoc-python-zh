    ```


    The weighting factors (which together represent the mixing matrix in our exercise)
    reflect differences not only in the mineral compositions of the source rocks,
    but also in the weathering, mobilization, and deposition of minerals within sedimentary
    basins. Hence, if two minerals have weighting factors with different signs, one
    could be (for example) the weathering product of the other mineral, which would
    explain why their proportions in the thirty sediment samples are anti-correlated.
    Alternatively, the different signs could indicate a dilution effect: If the proportions
    of one of the minerals in the sediment samples remain constant but the proportions
    of all other minerals vary in a similar way, they will be anti-correlated with
    the proportions of the first mineral. To complete the generation of the data set,
    we add some Gaussian noise with a standard deviation of 3.8 to the proportions
    of the minerals:


    ```

    x = x + 3.8*rng.standard_normal(np.shape(x))

    ```


