    p1000 = np.zeros((1000,2))\nfor i in range(1000):\n    indices = np.random.choice(ind,\n\
    \        size=30,\n        replace=True)\n    p = np.polyfit(meters[indices],\n\
    \        age[indices],1)\n    p1000[i,:] = p\n```\n\n第一个系数（即回归线的斜率）的统计量为：\n\n\
    ```\nplt.figure()\nplt.hist(p1000[:,0],bins=30)\nplt.show()\n\nprint(np.median(p1000[:,0]))\n\
    ```\n\n其结果为：\n\n```\n5.120606217265465\n```\n\n我们使用中位数而非均值，因为我们不能期望自助法结果服从高斯分布。相比之下，第二个系数的统计量显示出显著的离散性。输入：\n\
    \n```\nplt.figure()\nplt.hist(p1000[:,1],bins=30)\nplt.show()\n\nprint(np.median(p1000[:,1]))\n\
    ```\n\n得到：\n\n```\n24.22153549031753\n```\n\n用于模拟我们数据集的真实值是斜率5.6和与y轴的截距20，而使用`polyfit()`计算的相应系数分别为5.3667和21.7607（第4.3节）。\n\
    \n## 4.6 回归系数的刀切法估计\n\n*刀切法*是一种与自助法类似的重采样技术。从一个包含$n$个数据点的样本中，取出$n$个各包含$n-1$个数据点的子样本。对每个子样本计算感兴趣的参数（例如回归系数）。然后计算系数的均值和离散度。这种方法的缺点是子样本数量$n$有限：因此，回归系数的刀切法估计不如自助法估计精确。\n\
    \n刀切法的相关代码很容易生成：\n\n```\n%reset -f\n\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\nfrom numpy.random import default_rng\n\nagedepth = np.loadtxt('agedepth_1.txt')\n\
    \nmeters = agedepth[0:,0]\nage = agedepth[0:,1]\n\np = np.polyfit(meters,age,1)\n\
    \np30 = np.zeros((30,2))\nfor i in range(30):\n    j_meters = np.copy(meters)\n\
    \    j_age = np.copy(age)\n    j_meters = np.delete(j_meters,i,0)\n    j_age =\
    \ np.delete(j_age,i,0)\n    p = np.polyfit(j_meters,j_age,1)\n    p30[i,:] = p\n\
    ```\n\n对于包含$n-1=29$个数据点的子样本的刀切法，可以使用一个简单的*for*循环来实现。在每次迭代中，删除第$i$个数据点，并为剩余的数据点计算回归系数。$i$个子样本的均值提供了回归系数的改进估计。与自助法结果一样，回归线的斜率（第一个系数）定义良好，而与$y$轴的截距（第二个系数）具有很大的不确定性，\n\
    \n```\nprint(np.median(p30[:,0]))\n```\n\n得到：\n\n5.3663093479597155\n\n与自助法计算的5.1206相比，以及\n\
    \n```\nprint(np.median(p30[:,1]))\n```\n\n得到：\n\n21.79637039186352\n\n与自助法得到的24.2215相比（第4.5节）。如前所述，真实值是5.6和20。来自30个子样本的刀切法结果的直方图（图4.7）。\n\
    \n```\nplt.figure()\nplt.subplot(1,2,1)\nplt.hist(p30[:,0])\nplt.subplot(1,2,2)\n\
    plt.hist(p30[:,1])\nplt.show()\n```\n\n并未像自助法估计的直方图那样显示出系数如此清晰的分布。因此我们已经看到，使用刀切法或自助法进行重采样是检验回归模型质量的简单而有价值的方法。下一节将介绍一种比这些重采样方法更常用的替代质量评估方法。\n\
    \n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_148_0.png)\n\n## 4.7 交叉验证\n\n检验回归分析结果质量的第三种方法涉及*交叉验证*。在交叉验证中，使用*n*−1个数据点计算回归线。预测第*n*个数据点，并计算预测值与实际值之间的差异。随后，确定实际值与预测值之间差异的均值。\n\
    \n在此示例中，对*n* = 30个数据点进行交叉验证。得到的30条回归线（每条线使用*n*−1 = 29个数据点计算）在斜率和*y*轴截距上显示出一定的离散性：\n\
    \n```\n%reset -f\n\nimport numpy as np\nimport matplotlib.pyplot as plt\n\nagedepth\
    \ = np.loadtxt('agedepth_1.txt')\n\nmeters = agedepth[0:,0]\nage = agedepth[0:,1]\n\
    \np = np.polyfit(meters,age,1)\nprint(p)\n\np_age = np.zeros((30,1))\np_error\
    \ = np.zeros((30,1))\n\nplt.figure()\nplt.plot(meters,age,\n    marker='o',\n\
    \    linestyle='none')\nfor i in range(0,30):\n    j_meters = meters;\n    j_age\
    \ = age;\n    j_meters = np.delete(j_meters,i)\n    j_age = np.delete(j_age,i)\n\
    \    p = np.polyfit(j_meters,j_age,1)\n    pval = np.poly1d(p)\n    plt.plot(meters,pval(meters),\n\
    \        color=(0.8,0.5,0.3),\n        linewidth=0.1)\n    p_age =pval(meters)\n\
    \    p_error[i,0:] = p_age[i] - age[i]\nplt.show()\n```\n\n在理想情况下，预测误差应服从均值为零的高斯分布，\n\
    \n```\nprint(np.mean(p_error))\n```\n\n得到：\n\n```\n-0.048670587295191345\n```\n\
    \n标准差是真实数据点偏离预测直线的偏差的均值，\n\n```\nprint(np.std(p_error,ddof=1))\n```\n\n得到：\n\n\
    ```\n10.975717618676232\n```\n\n交叉验证提供了关于回归结果拟合优度的有价值信息，也可用于其他领域的质量控制，例如时间和空间预测（第5章和第7章）。\n\
    \n## 4.8 约化主轴回归\n\n在某些示例中，没有一个变量是被操纵的，因此两者都可以被视为独立变量。在这种情况下，有几种方法可用于计算最佳拟合线，以最小化与x和y的距离。例如，约化主轴法最小化数据点与回归线之间的三角形面积0.5·(ΔxΔy)，其中Δx和Δy是预测值与x和y的真实值之间的距离（图4.4）。尽管这种优化看起来很复杂，但可以证明第一个回归系数b₁（斜率）就是y和x的标准差之比：\n\
    \n$$b_1 = s_y/s_x$$\n\n与经典回归一样，回归线通过数据质心，该质心由样本均值定义。因此，我们可以使用单变量样本均值和先前计算的斜率b₁来计算第二个回归系数b₀（即y轴截距）\n\
    \n$$b_0 = \\bar{y} - b_1\\bar{x}$$\n\n让我们再次从文件agedepth_1.txt加载年龄-深度数据，并定义两个变量meters和age。假设这两个变量都包含误差，并且数据的离散性可以由meters和age的离散性来解释：\n\
    \n```\n%reset -f\n\nimport numpy as np\nimport matplotlib.pyplot as plt\n\nagedepth\
    \ = np.loadtxt('agedepth_1.txt')\n\nmeters = agedepth[0:,0]\nage = agedepth[0:,1]\n\
    ```\n\n使用上述公式计算回归线的斜率$b_1$，\n\n```\np = np.zeros((2,1))\np[0] = np.std(age,ddof=1)/np.std(meters,ddof=1)\n\
    print(p)\n```\n\n得到：\n\n```\n[[5.6117361]\n [0.        ]]\n```\n\n因此，第二个系数$b_0$（即y轴截距）可以通过以下方式计算：\n\
    \n```\np[1] = np.mean(age) - p[0]*np.mean(meters)\n```\n\n得到：\n\n```\n[[ 5.6117361\
    \ ]\n [18.70366978]]\n```\n\n可以通过以下方式绘制回归线：\n\n```\nplt.figure()\nplt.plot(meters,age,\n\
    \         marker='o',\n         linestyle='none')\nplt.plot(meters,p[0]*meters+p[1],\n\
    \         color=(0.8,0.5,0.3))\nplt.show()\n```\n\n这条回归线与经典回归得到的线略有不同。请注意，来自RMA的回归线*不是*由*xy*和*yx*经典线性回归分析产生的直线的角平分线，即分别使用*x*或*y*作为独立变量计算回归线时产生的直线。"
