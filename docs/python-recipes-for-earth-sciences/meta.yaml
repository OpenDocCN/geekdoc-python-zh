    \ $n/2$ 的部分。因此，变换被限制在维度等于 2 的幂的块上。实际上，谱的计算使用接近原始信号 $x(t)$ 中数据点数量的频率数量。\n\n离散傅里叶变换是连续傅里叶变换的近似。连续傅里叶变换假设信号是无限的，但离散的实际数据在两端都是有限的，即信号振幅在时间序列的任一端之外为零。在时域中，有限信号对应于一个无限信号乘以一个矩形窗，该窗在信号范围内值为\
