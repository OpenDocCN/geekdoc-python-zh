    \                 fontsize=8)\n    plt.title(titles[j])\n    plt.colorbar()\n\
    \    plt.show()\n\n## 7.9 Statistics of Point Distributions\n\nThis section deals\
    \ with the statistical distribution of objects within an area, which may help\
    \ to explain the relationship between these objects and the properties of the\
    \ area (Fig. 7.10). For instance, the spatial concentration of hand axes in an\
    \ archaeological site may suggest that a larger population of hominins once lived\
    \ in that area. As another example, the clustered distribution of fossils may\
    \ document environmental conditions that were favorable to particular organisms\
    \ that have been preserved as fossils. Furthermore, the alignment of volcanoes\
    \ may help in mapping tectonic structures concealed beneath the Earth’s surface.\n\
    \nVarious methods for statistically analyzing point distributions are introduced\
    \ below. We first consider a test for a uniform spatial distribution of objects\
    \ followed by a test for a random spatial distribution and finally by a simple\
    \ test for a clustered distribution of objects.\n\n### Test for Uniform Distribution\n\
    \nIn order to illustrate the test for uniform distribution, we first need to compute\
    \ some synthetic data (Fig. 7.10b). The function `random.rand()` computes uniformly\
    \ distributed pseudorandom numbers drawn from a uniform distribution within the\
    \ interval [0,1]. We compute xy data using `random.rand()` and multiply the data\
    \ by ten in order to obtain data within the interval [0,10]:\n\n```\n%reset -f\n\
