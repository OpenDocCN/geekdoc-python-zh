    and translation,


    $$\psi_{a,b} = \frac{1}{a^{1/2}} \psi \left( \frac{t-b}{a} \right)$$


    where $b$ denotes the position (translation) and $a$ (>0) denotes the scale (dilation)
    of the wavelet (Lau and Weng 1995). The wavelet transform of the signal $x(t)$
    about the mother wavelet $\psi(t)$ is defined as the convolution integral'
- md: "$$W(b, a) = \\frac{1}{a^{1/2}} \\int \\psi^* \\left( \\frac{t - b}{a} \\right)\
    \ x(t) \\, \\mathrm{d}t$$\n\nwhere $\\psi^*$ is the complex conjugate of $\\psi$.\
    \ There are many mother wavelets available in the literature, such as the classic\
    \ *Haar* wavelet, the *Morlet* wavelet, and the *Daubechies* wavelet. The most\
    \ popular wavelet in the geosciences is the Morlet wavelet, which was introduced\
    \ by French geophysicist Jean Morlet (1931–2007) and is defined by\n\n$$\\psi_0(\\\
    eta) = \\pi^{-1/4} \\exp(i\\omega_0\\eta) \\exp\\left(-\\eta^2/2\\right)$$\n\n\
    where $\\eta$ is the time and $\\omega_0$ is the wave number (Torrence and Compo\
    \ 1998). The wave number is the number of oscillations within the wavelet itself.\
    \ We can easily compute a discrete version of the Morlet wavelet wave by translating\
    \ the equation above to Python code, where eta is the non-dimensional time and\
    \ w0 is the wave number. Changing w0 produces wavelets with different wave numbers.\
    \ Note that it is important not to use i for an index in for loops since it is\
    \ used here for the imaginary unit (Fig. 5.15):\n\n```\n%reset -f\n\nimport numpy\
    \ as np\nimport scipy.signal as signal\nfrom scipy import interpolate\nimport\
    \ matplotlib.pyplot as plt\n\neta = np.arange(-10,10+0.1,0.1)\nw0 = 6\nwave =\
    \ np.multiply(np.multiply(np.pi**(-1/4),\n    np.exp(1j*w0*eta)),np.exp(-eta**2/2))\n\
    \nplt.figure()\nplt.plot(eta,wave)\nplt.xlabel('Position')\nplt.ylabel('Scale')\n\
    plt.show()\n```\n\nIn order to familiarize ourselves with wavelet power spectra,\
    \ we calculate a continuous wavelet transform (CWT) of the synthetic data used\
    \ in Sect. 5.6. We first load the synthetic data contained in file *series3.txt*\
    \ while bearing in mind that the data contain periodicities of 100, 40, and 20\
    \ kyrs as well as additive Gaussian noise and that they are unevenly spaced about\
    \ the time axis:\n\n```\nseries3 = np.loadtxt('series3.txt')\n```\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_199_0.png)\n\
    \nFig. 5.15 Morlet mother wavelet with wave number 6.\n\nAs with the Fourier transform\
    \ (Sects. 5.3 to 5.6) and in contrast to the Lomb–Scargle algorithm (Sect. 5.7),\
    \ the wavelet transform requires evenly spaced data, and we therefore interpolate\
    \ the data using interp1d():\n\n```\nt = np.arange(0.,996.+3.,3.)\nfun = interpolate.interp1d(series3[0:,0],\n\
    \    series3[0:,1],kind='linear')\nseries3L = fun(t)\n```\n\nIf our time series\
    \ has a trend, we need to remove this trend before running the wavelet analysis\
    \ (see Sect. 5.4):\n\n```\nseries3L = signal.detrend(series3L)\n```\n\nWe then\
    \ use cwt() with the data series series3L and the inverse of our sampling interval\
    \ as the sampling frequency. In our example, the sampling interval is 3, and the\
    \ sampling frequency is therefore 1/3. The output of cwt() using a Morlet wavelet\
    \ is the wavelet transform cwtmatr:\n\n```\nfs = 1/3\nfreqs = np.linspace(0.001,fs/2,1000)\n\
    w0 = 6.\nwidths = w0*fs/(2.*np.pi*freqs)\ncwtmatr = signal.cwt(series3L,\n   \
    \ signal.morlet2,widths,w=w0)\n```\n\nWe now display the wavelet power spectrum.\
    \ We can change the limits of the axes, the colormap, and many other things. We\
    \ can see cycles with frequencies of 0.01/kyr (corresponding to a period of 100\
    \ kyrs), 0.025/kyr (40 kyrs), and 0.05/kyr (20 kyrs). The great thing about wavelet\
    \ power spectra is that they display an evolutionary spectrum, that is, the appearance\
    \ and disappearance of cycles through time:\n\n```\nplt.contourf(t,freqs,np.abs(cwtmatr),\n\
    \    cmap='viridis',\n    shading='gouraud')\nplt.colorbar()\nplt.xlabel('Time\
    \ (kyr)')\nplt.ylabel('Frequency (1/kyr)')\nplt.xlim([0,1000])\nplt.ylim([0.,.07])\n\
    plt.show()\n```\n\nWe now display the same plot with periods instead of frequencies\
    \ on the y-axis. We can see cycles with a period of 100 kyrs, 40 kyrs, and 20\
    \ kyrs (Fig. 5.16):\n\n```\nperiods = 1/freqs\nplt.contourf(t,periods,np.abs(cwtmatr),\n\
    \    cmap='viridis',\n    shading='gouraud')\nplt.colorbar()\nplt.xlabel('Time\
    \ (kyr)')\nplt.ylabel('Frequency (1/kyr)')\nplt.xlim([0,1000])\nplt.ylim([0.,200])\n\
    plt.show()\n```\n\nWe can also display the same plot using pcolormesh() instead\
    \ of contourf() (Fig. 5.17):\n\n```\nplt.pcolormesh(t,periods,np.abs(cwtmatr),\n\
    \    cmap='viridis',\n    shading='gouraud')\nplt.colorbar()\nplt.xlabel('Time\
    \ (kyr)')\nplt.ylabel('Period (kyr)')\nplt.xlim([0,1000])\nplt.ylim([0.,200])\n\
    plt.show()\n```\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_201_0.png)\n\n**Fig.\
    \ 5.16** Wavelet power spectrum for the synthetic data series contained in *series_3.txt*.\
    \ The plot clearly shows major periodicities at frequencies of 0.01, 0.025, and\
    \ 0.05 kyr⁻¹, which correspond to the 100, 40, and 20 kyr cycles, respectively.\
    \ The 100 kyr cycle is present throughout the entire time series, whereas the\
    \ 40 kyr cycle only appears at around 450 kyrs. The 20 kyr cycle is relatively\
    \ weak but is probably present throughout the entire time series. The wavelet\
    \ power spectrum was calculated using the continuous 1D wavelet transform cwt.\n\
    \n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_201_1.png)\n\n**Fig. 5.17** Wavelet\
    \ power spectrum for the synthetic data series contained in *series_3.txt*. The\
    \ result is similar to Fig. 5.16 except that here, pcolormesh() was used to visualize\
    \ the wavelet power spectrum.\n\nCompared with the windowed power spectrum method,\
    \ the wavelet power spectrum clearly shows a much higher resolution on both the\
    \ time and frequency axes. Instead of dividing the time series into overlapping\
    \ segments and computing the power spectrum for each segment, the wavelet transform\
    \ uses short packets of waves that better map temporal changes in the cyclicity.\
    \ However, the disadvantage of both the windowed power spectrum and the wavelet\
    \ power spectrum is that they require evenly spaced data. The Lomb–Scargle method\
    \ overcomes this problem but has limitations in its ability to map temporal changes\
    \ in the frequency domain (as is also the case with the power spectrum method).\n\
