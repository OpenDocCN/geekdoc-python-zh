    # 10.3 Empirical Distributions of Circular Data


    This section introduces the statistical measures used to describe empirical distributions
    of directional data. The characteristics of directional data are described by
    measures of central tendency and dispersion, which is similar to the statistical
    characterization of univariate data sets (Chap. 3). Assume that we have collected
    a number of angular measurements, such as fossil alignments. The collection of
    data can be written as


    $\theta_1, \theta_2, \theta_3, \ldots, \theta_n$


    which contains $n$ observations $\theta_i$. Sine and cosine values are computed
    for each direction $\theta_i$ and are then used to compute the *resultant* (or
    *mean*) direction for the set of angular data (Fisher 1993; Mardia and Jupp 1999):


    $x_r = \sum \sin \theta_i$


    $y_r = \sum \cos \theta_i$'
