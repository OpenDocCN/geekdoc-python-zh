  - '[PAGE 217]


    The RP shows two blocks of randomly distributed points, each of which marks times
    when the system randomly returns to a similar state. In random noise, similar
    states frequently recur, but without any regularity, except for the main diagonal
    line (i.e., the line of identity). The two blocks of the RP mark the transition
    at time 1,000. The states before this change point differ strongly from the states
    after the change point, as is represented by the almost empty lower-right and
    upper-left quadrants of the RP. However, the preceding increase in autocorrelation
    between times 800 and 1,000 is not clearly visible in the RP even though it appears
    slightly denser. In this situation, quantifying the structures in the RP could
    prove beneficial.


    To calculate the recurrence rate, we can simply compute the mean of the matrix
    R,


    ```

    RR = np.mean(R)

    print(RR)

    ```


    which yields


    ```

    0.10654648642636631

    ```


    The probability that the system will return to a randomly selected previous state
    is therefore about 10%.


    The transitivity coefficient is a graph-theoretical measure of the probability
    that three connected network nodes (triples) are completely interconnected (i.e.,
    that they form a closed triangle):


    $$\tau = \frac{\sum_{i,j,k}^N A_{ij}A_{ij}A_{ik}}{\sum_{i,j,k=1}^N A_{ij}A_{ik}(1
    - \delta_{ik})}$$


    This measure can be intuitively understood with respect to recurrences in the
    phase space. We identify a recurrence of states by a network link: Close points
    on the phase space trajectory are connected by a link. Three connected points
    form a triple, but only if all three points recur close to one another and thus
    form a triangle. Such a triangular configuration remains along the phase space
    trajectory if the dynamic is highly regular (i.e., recurring states remain recurring
    over a long period of time). However, if the dynamic is chaotic, then parts of
    the phase space trajectory that were initially close subsequently diverge, and
    the triangular configuration breaks down even though the corresponding triple
    nodes might remain interconnected for some time. The probability of finding triangles
    is therefore higher for regular dynamics and lower for chaotic dynamics. This
    explanation is, of course, rather simplified, but a theoretically substantiated
    explanation can be found in Donner et al. (2011).


    In order to calculate the probability that triples also form triangles, we need
    to compute the number of connected triples and the number of triangles, which
    can be achieved directly from the recurrence plot by excluding the main diagonal:


    ```

    A = R - np.eye(len(R))

    ```'
- md: "The number of triangles and triples is then\n\n```\nnumTripl = np.sum(np.matmul(A,A))\n\
    numTria = np.trace(np.matmul(A,np.matmul(A,A)))\n```\n\nand finally, the transitivity\
    \ coefficient is the ratio\n\n```\nTrans = numTria/numTripl\nprint(Trans)\n```\n\
    \nwhich yields\n\n```\n0.6459486011860506\n```\n\nThis number means that the system\
    \ does not have regular dynamics (which would yield a transitivity coefficient\
    \ close to one).\nIn order to detect changes in the dynamics, the RQA can be computed\
    \ for moving windows. The RQA of moving windows can be calculated in two ways:\
    \ either (1) by calculating the RQA measures for windows that move along a single,\
    \ global RP or (2) by calculating individual RPs for windows that move along the\
    \ original time series. If nonstationarities or trends are not part of the main\
    \ focus of the analysis, approach (2) helps to find transitions that ignore these\
    \ nonstationarities. However, if detecting overall (global, long-scale) changes\
    \ is of interest (e.g., to test for nonstationarity), the recurrence conditions\
    \ should be kept constant over time (thereby allowing the global RP of the whole\
    \ time series to be considered), and approach (1) should be selected (Marwan 2011).\
    \ The selected window size needs to be small enough to ensure a good temporal\
    \ resolution but large enough to cover typical variations (e.g., several cycles)\
    \ in order to find recurrences.\nIn our example, we choose a moving window length\
    \ of 150 data points and an overlap of 20% (Fig. 5.30):\n\n```\nw = 150\n```\n\
    \nWe then calculate the recurrence rate RR and the transitivity coefficient Trans\
    \ within these moving windows (Fig. 5.31 and 5.32):\n\n```\nTrans = np.zeros(len(R)-w)\n\
