    # 4.2 Correlation Coefficients


    *Correlation coefficients* are often used in the early stages of bivariate analysis.
    They provide only a very rough estimate of a rectilinear trend in a bivariate
    data set. Unfortunately, the literature is full of examples in which the importance
    of correlation coefficients is overestimated or in which outliers in the data
    set lead to an overestimation of the population correlation coefficient.


    The most popular correlation coefficient is *Pearson’s linear product-moment correlation
    coefficient* *ρ* (Pearson 1895) (Fig. 4.2). We estimate a population’s correlation
    coefficient *ρ* from the *n* sample data, that is, we compute the sample correlation
    coefficient *r*, which is defined as'
