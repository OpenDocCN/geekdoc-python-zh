  md: '```

    %reset -f


    import numpy as np

    import matplotlib.pyplot as plt


    t = np.linspace(1,1000,1000)

    x = 2*np.sin(2*np.pi*t/5)


    plt.figure()

    plt.plot(t,x)

    plt.axis(np.array([0,200,-4,4]))

    plt.show()

    ```


    The period of τ=5 corresponds to a frequency of f=1/5=0.2. However, natural data
    series are more complex than a simple periodic signal. The slightly more complicated
    signal can be generated by superimposing several periodic components with different
    periods. As an example, we compute such a signal by adding three sine waves with
    periods τ₁=50 (f₁=0.02), τ₂=15 (f₂≈0.07), and τ₃=5 (f₃=0.2). The corresponding
    amplitudes are A₁=2, A₂=1, and A₃=0.5:


    ```

    t = np.linspace(1,1000,1000)

    x = 2*np.sin(2*np.pi*t/50) + \n    np.sin(2*np.pi*t/15) + \n    0.5*np.sin(2*np.pi*t/5)


    plt.figure()

    plt.plot(t,x)

    plt.axis(np.array([0,200,-4,4]))

    plt.show()

    ```


    By restricting the t-axis to the interval [0, 200], only one fifth of the original
    data series is displayed (Fig. 5.3a). However, we recommended that long data series
    be generated (as in the example) in order to avoid edge effects when applying
    spectral analysis tools for the first time.


    In contrast to our synthetic time series, real data also contain various disturbances,
    such as random noise and first- or higher-order trends. In order to reproduce
    the effects of noise, a random number generator can be used to compute Gaussian
    noise with a mean of zero and a standard deviation of one. The seed of the algorithm
    should be set to zero using random.seed(0). One thousand random numbers are then
    generated using random.randn():


    ```

    np.random.seed(0)

    ns = np.random.randn(1000)

    ```'
