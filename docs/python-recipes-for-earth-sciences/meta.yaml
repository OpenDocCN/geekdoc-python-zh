    # 5.2 Generating Signals


    A time series is an ordered sequence (and not a series in a mathematically rigorous
    sense) of $n$ values of a variable $x(t)$ at certain times $t_k$:


    $$x(t_k) = x(t_1), x(t_2), \ldots, x(t_n)$$


    If the time interval between any two successive observations $x(t_k)$ and $x(t_{k+1})$
    is constant, the time series is said to be equally spaced, and the sampling interval
    is


    $$\Delta t = t_{k+1} - t_k$$'
- md: "The sampling frequency $f_s$ is the inverse of the sampling interval $\\Delta\
    \ t$. We generally try to sample at regular time intervals or constant sampling\
    \ frequencies, but in many earth science examples, this is not possible. As an\
    \ example, imagine deep-sea sediments sampled at five-centimeter intervals along\
    \ a sediment core. Radiometric age determinations at certain levels in the sediment\
    \ core have revealed substantial fluctuations in sedimentation rates. Despite\
    \ the even spacing along the sediment core of the samples, these samples are not\
    \ equally spaced on the time axis. Hence, the quantity\n\n$$\\Delta t = T/n$$\n\
    \n(where $T$ is the full length of the time series and $n$ is the number of data\
    \ points) represents only an average sampling interval. In general, a time series\
    \ $x(t_k)$ can be represented as the linear sum of a periodic component $x_p(t_k)$,\
    \ a trend $x_{tr}(t_k)$, and random noise $x_{ns}(t_k)$:\n\n$$x(t_k) = x_p(t_k)\
    \ + x_{tr}(t_k) + x_{ns}(t_k)$$\n\nThe decomposition of a climate signal into\
    \ periodic, trend, and noise components (shown above) corresponds to the definition\
    \ of climate in terms of trend and variability, which was developed at the end\
    \ of the 19th century (Brückner 1890; Hann 1901; Köppen 1931). Mudelsee (2014)\
    \ added an extremal component $x_e(t_k)$ both to facilitate the analysis and to\
    \ recognize the growing importance of climate extremes as documented, for example,\
    \ in the Fourth Assessment Report by the IPCC (Solomon et al. 2007). The long-term\
    \ component $x_{tr}(t_k)$ is a linear or higher-degree trend that can be removed\
    \ by fitting a polynomial of a certain degree and subtracting the values of this\
    \ polynomial from the data (see Chap. 4). Methods for removing noise $x_{ns}(t_k)$\
    \ are described in Chap. 6. The periodic (or, in a mathematically less rigorous\
    \ sense, cyclic) component $x_p(t_k)$ can be approximated by a linear combination\
    \ of sine (or cosine) waves that have different amplitudes $A_i$, frequencies\
    \ $f_i$, and phase angles $\\psi_i$:\n\n$$x_p(t_k) = \\sum_i A_i \\cdot \\sin(2\\\
    pi f_i t_k - \\psi_i)$$\n\nThe phase angle $\\psi$ helps in detecting temporal\
    \ shifts between signals of the same frequency. Two signals $x$ and $y$ with the\
    \ same period are out of phase unless the difference between $\\psi_x$ and $\\\
    psi_y$ is equal to zero (Fig. 5.2).\n\nThe frequency $f$ of a periodic signal\
    \ is the inverse of the period $\\tau$. The *Nyquist frequency* $f_{nyq}$ is half\
    \ the sampling frequency $f_s$ and represents the maximum frequency that the data\
    \ can produce. This frequency, which was defined by American mathematician Claude\
    \ Elwood Shannon and named after Swedish-American electrical engineer Harry Nyquist,\
    \ prevents the phenomenon of *aliasing* in time-discrete systems. Aliasing means\
    \ that ambiguities occur in digital signals if the sampling frequency is too low.\
    \ As an example, audio compact disks (CDs) are sampled at frequencies of 44,100\
    \ Hz (Hz, where 1 Hz = 1 cycle per second), but the corresponding Nyquist frequency\
    \ is 22,050 Hz, which is the highest frequency a CD player can theoretically produce.\
    \ The performance limitations of anti-alias filters used by CD players further\
    \ reduce the frequency band and result in a cutoff frequency of around 20,050\
    \ Hz, which is the true upper frequency limit of a CD player.\n\nWe can now generate\
    \ synthetic signals in order to illustrate the use of time series analysis tools.\
    \ When using synthetic data, we know in advance what features the time series\
    \ contains (e.g., periodic or random components), and we can introduce a linear\
    \ trend and/or gaps in the time series. The user will encounter plenty of examples\
    \ of the possible effects of varying the parameter settings as well as potential\
    \ artifacts and errors that can result from applying spectral analysis tools.\
    \ We begin with simple data and then apply the methods to more complex time series.\
    \ The first example illustrates how to generate a basic synthetic data series\
    \ that is characteristic of earth science data. First, we create a time axis $\\\
    tau$ that runs from 1 to 1,000 in steps of one unit (i.e., the sampling frequency\
    \ is also one). We then generate a simple periodic signal $y$ that consists of\
    \ a sine wave with a period of five and an amplitude of two:\n\n```python\n%reset\
    \ -f\n\nimport numpy as np\nimport matplotlib.pyplot as plt\n\nt = np.linspace(1,1000,1000)\n\
    x = 2*np.sin(2*np.pi*t/5)\n\nplt.figure()\nplt.plot(t,x)\nplt.axis(np.array([0,200,-4,4]))\n\
    plt.show()\n```\n\nThe period of τ=5 corresponds to a frequency of f=1/5=0.2.\
    \ However, natural data series are more complex than a simple periodic signal.\
    \ The slightly more complicated signal can be generated by superimposing several\
    \ periodic components with different periods. As an example, we compute such a\
    \ signal by adding three sine waves with periods τ₁=50 (f₁=0.02), τ₂=15 (f₂≈0.07),\
    \ and τ₃=5 (f₃=0.2). The corresponding amplitudes are A₁=2, A₂=1, and A₃=0.5:\n\
    \n```python\nt = np.linspace(1,1000,1000)\nx = 2*np.sin(2*np.pi*t/50) + \\\n \
    \   np.sin(2*np.pi*t/15) + \\\n    0.5*np.sin(2*np.pi*t/5)\n\nplt.figure()\nplt.plot(t,x)\n\
    plt.axis(np.array([0,200,-4,4]))\nplt.show()\n```\n\nBy restricting the t-axis\
    \ to the interval [0, 200], only one fifth of the original data series is displayed\
    \ (Fig. 5.3a). However, we recommended that long data series be generated (as\
    \ in the example) in order to avoid edge effects when applying spectral analysis\
    \ tools for the first time.\n\nIn contrast to our synthetic time series, real\
    \ data also contain various disturbances, such as random noise and first- or higher-order\
    \ trends. In order to reproduce the effects of noise, a random number generator\
    \ can be used to compute Gaussian noise with a mean of zero and a standard deviation\
    \ of one. The seed of the algorithm should be set to zero using random.seed(0).\
    \ One thousand random numbers are then generated using random.randn():\n\n```python\n\
    np.random.seed(0)\nns = np.random.randn(1000)\n```\n\n**Fig. 5.3** **a** Synthetic\
    \ signal with periodicities of τ₁ = 50, τ₂ = 15, and τ₃ = 5, each with different\
    \ amplitudes, and **b** the same signal superimposed with Gaussian noise. **c**\
    \ The time series shows a striking linear trend.\n\nWe add this noise to the original\
    \ data, that is, we generate a signal that contains additive noise (Fig. 5.3b).\
    \ Displaying the data illustrates the effect of noise on a periodic signal. Since\
    \ no record is entirely free of noise in reality, it is important to become familiar\
    \ with the influence of noise on power spectra:\n\n```python\nxns = x + ns\n\n\
    plt.figure()\nplt.plot(t,x,'b-',t,xns,'r-')\nplt.axis(np.array([0,200,-4,4]))\n\
    plt.show()\n```\n\nSignal processing methods are often applied to remove a major\
    \ part of the noise, although many filtering methods make arbitrary assumptions\
    \ concerning the signal-to-noise ratio (Chap. 6). Moreover, filtering introduces\
    \ artifacts and statistical dependencies to the data, which may have a profound\
    \ influence on the resulting power spectra.\n\nFinally, we introduce a linear\
    \ long-term trend to the data by adding a straight line with a slope of 0.005\
    \ and an intercept with the y-axis of zero (Fig. 5.3c). Such trends are common\
    \ in the earth sciences. As an example, consider the glacial–interglacial cycles\
    \ observed in marine oxygen-isotope records superimposed on a long-term cooling\
    \ trend over the last six million years:\n\n```python\nxt = x + 0.005 * t\n\n\
    plt.figure()\nplt.plot(t,x,'b-',t,xt,'r-')\nplt.axis(np.array([0,200,-4,4]))\n\
    plt.show()\n```\n\nIn reality, more complex trends exist, such as higher-order\
    \ trends and trends that are characterized by variations in gradient. In practice,\
    \ it is recommended that such trends be eliminated by fitting polynomials to the\
    \ data and subtracting the corresponding values. Our synthetic time series now\
    \ contains many characteristics of a typical earth science data set and can illustrate\
    \ the use of the spectral analysis tools that are introduced in the next section.\n\
    \n## 5.3 Auto-Spectral and Cross-Spectral Analysis\n\nAuto-spectral analysis aims\
    \ to describe the distribution of the variance contained in a single signal x(t)\
