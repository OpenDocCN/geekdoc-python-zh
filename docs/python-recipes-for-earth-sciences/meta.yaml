    via the geochemical fingerprinting of glass shards. Another important use lies
    in comparing species assemblages in ocean and lake sediments for reconstructing
    paleoenvironments.


    +   - *Analysis of directional data*—Methods of analyzing circular and spherical
    data are widely used in the earth sciences. Structural geologists measure and
    analyze the orientation of slickensides (or striae) on a fault plane. Moreover,
    circular statistical methods are common in paleomagnetic studies, and microstructural
    investigations include the analysis of grain shapes and quartz *c*-axis orientations
    in thin sections of rocks.


    Some of these methods of data analysis require applying numerical methods, such
    as interpolation techniques. While the following text deals mainly with statistical
    techniques, it also introduces several numerical methods that are commonly used
    in the earth sciences.


