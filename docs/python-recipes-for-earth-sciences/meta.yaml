    \ and green lines, respectively).\n\nWe now briefly discuss a number of other\
    \ aspects of variography:\n\n- *Sample size* – As in any statistical procedure,\
    \ as large a sample as possible is required in order to obtain a reliable estimate.\
    \ For variography, the number of samples should be greater than 100 (and ideally,\
    \ greater than 150) (Webster and Oliver 2007). For smaller sample numbers, a maximum\
    \ likelihood variogram should be computed (Pardo-Igúzquiza and Dowd 1997).\n-\
    \ *Sampling design* – In order to obtain a good estimation close to the origin\
    \ of the variogram, the sampling design should include observations over small\
    \ distances. This can be achieved by means of a nested design (Webster and Oliver\
    \ 2007). Other possible designs have been evaluated by Olea (1984).\n- *Anisotropy*\
    \ – Thus far, we have assumed that the structure of spatial correlation is independent\
    \ of direction. We have calculated *omnidirectional variograms* while ignoring\
    \ the direction of the separation vector *h*. In a more thorough analysis, the\
