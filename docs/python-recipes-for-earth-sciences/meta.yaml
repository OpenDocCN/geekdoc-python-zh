    To calculate the recurrence rate, we can simply compute the mean of the matrix
    R,


    ```

    RR = np.mean(R)

    print(RR)

    ```


    which yields


    ```

    0.10654648642636631

    ```


    The probability that the system will return to a randomly selected previous state
    is therefore about 10%.


    The transitivity coefficient is a graph-theoretical measure of the probability
    that three connected network nodes (triples) are completely interconnected (i.e.,
    that they form a closed triangle):


    $$\tau = \frac{\sum_{i,j,k}^N A_{ij}A_{ij}A_{ik}}{\sum_{i,j,k=1}^N A_{ij}A_{ik}(1
    - \delta_{ik})}$$


    This measure can be intuitively understood with respect to recurrences in the
    phase space. We identify a recurrence of states by a network link: Close points
    on the phase space trajectory are connected by a link. Three connected points
    form a triple, but only if all three points recur close to one another and thus
    form a triangle. Such a triangular configuration remains along the phase space
    trajectory if the dynamic is highly regular (i.e., recurring states remain recurring
    over a long period of time). However, if the dynamic is chaotic, then parts of
    the phase space trajectory that were initially close subsequently diverge, and
    the triangular configuration breaks down even though the corresponding triple
    nodes might remain interconnected for some time. The probability of finding triangles
    is therefore higher for regular dynamics and lower for chaotic dynamics. This
    explanation is, of course, rather simplified, but a theoretically substantiated
    explanation can be found in Donner et al. (2011).


    In order to calculate the probability that triples also form triangles, we need
    to compute the number of connected triples and the number of triangles, which
    can be achieved directly from the recurrence plot by excluding the main diagonal:


    ```

    A = R - np.eye(len(R))

    ```'
