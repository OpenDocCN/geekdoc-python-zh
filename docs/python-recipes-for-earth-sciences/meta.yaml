    by clicking the *xy* icon in the upper-left corner of the map, and we specify
    an area of interest, such as a latitude of *North: 20* (20°N) and *South: -20*
    (20°S) and a longitude between *East: 30* (30°E) and *East: 60* (60°E), which
    covers the eastern African coast. Negative latitude and longitude values are assigned
    to the Southern Hemisphere and to the Western Hemisphere, respectively. Clicking
    *OK* marks the area of interest as a transparent yellow rectangle on the map.
    Next, we choose *ArcGIS ASCII Grid* as the *Output Format* and download the file
    *etopo1_bedrock.asc*, which contains the following data:


    ```

    ncols      1801

    nrows      2401

    xllcorner  29.991666666667

    yllcorner  -20.008333333333

    cellsize   0.016666666667

    294 299 293 288 285 282 ...

    237 241 245 266 264 274 ...

    259 263 267 262 263 266 ...

    310 306 300 294 296 291 ...

    348 346 352 356 353 353 ...

    381 383 381 381 382 381 ...

