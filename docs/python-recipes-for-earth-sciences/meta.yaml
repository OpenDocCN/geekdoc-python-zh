    累积分布函数为


    $$F(x) = \sum_{i=1}^{x} \binom{N}{i} p^i (1-p)^{N-i}$$


    其中


    $$\binom{n}{r} = \frac{n!}{r!(n-r)!}$$


    二项分布有两个参数 N 和 p。该分布的一个应用实例可以在确定钻探石油的可能结果时找到。假设钻探成功的概率为 0.1，即 10%。在总共 N=10 口井中，有
    x=3 口井成功的概率为


    $$f(3) = \binom{10}{3} 0.1^3 (1-0.1)^{10-3} = 0.057 \approx 6\%$$


    因此，在这个例子中，10 次试验中恰好有 3 口井成功的概率约为 6%。


    ## 泊松分布


    当试验次数 n → ∞ 且成功概率 p → 0 时，二项分布趋近于具有单一参数 λ = n·p 的泊松分布（图 3.6）（Poisson 1837）。当 n
    > 100 且 p < 0.05（或 5%）时，此近似效果良好。


    因此，我们使用泊松分布来描述发生概率极低的过程，例如地震、火山喷发、风暴和洪水。其概率密度函数为


    $$f(x) = \frac{e^{-\lambda}\lambda^x}{x!}$$


    累积分布函数为


    $$F(x) = \sum_{i=0}^{x} \frac{e^{-\lambda}\lambda^i}{i!}$$


    单一参数 λ 描述了该分布的均值和方差。


    ## 正态分布或高斯分布


    当 p = 0.5（对称，无偏斜）且 n → ∞ 时，二项分布趋近于由均值 μ 和标准差 σ 定义的正态分布或高斯分布（图 3.7）。正态分布的概率密度函数为


    $$f(x) = \frac{1}{\sigma\sqrt{2\pi}} exp\left(-\frac{1}{2}\left(\frac{x-\mu}{\sigma}\right)^2\right)$$


    累积分布函数为


    $$F(x) = \frac{1}{\sigma\sqrt{2\pi}} \int_{-\infty}^{x} exp\left(-\frac{1}{2}\left(\frac{x-\mu}{\sigma}\right)^2\right)
    dy$$


    因此，当均值既是出现频率最高也是最可能的值时，使用正态分布。偏离均值的概率在两个方向上相等，并且随着与均值距离的增加而减小。


    *标准正态分布*是正态分布族的一个特殊成员，其均值为*零*，标准差为*一*。我们可以通过代入 *z* = (*x*−*μ*)/*σ* 来变换正态分布的方程。该分布的概率密度函数为


    $$f(x) = \frac{1}{\sqrt{2\pi}} exp\left(-\frac{z^2}{2}\right)$$


    这种正态分布的定义通常被称为 *z 分布*。


    ## 对数正态分布


    当数据具有下限时，例如年平均降水量或地震频率（图 3.8），使用*对数正态分布*。在这种情况下，分布通常具有显著的偏斜性，最好用对数正态分布来描述。该分布的概率密度函数为


    $$f(x) = \frac{1}{\sigma\sqrt{2\pi}x} exp\left(-\frac{1}{2}\left(\frac{lnx - \mu}{\sigma}\right)^2\right)$$


    图 3.8 **a** 均值为 $\mu = 0$ 且 $\Phi$ 取不同值的对数正态分布的概率密度函数 $f(x)$ 和 **b** 累积分布函数 $F(x)$。


    累积分布函数为


    $$F(x) = \frac{1}{\sigma\sqrt{2\pi}} \int_{-\infty}^{x} \frac{1}{y} exp\left(-\frac{1}{2}\left(\frac{lny
    - \mu}{\sigma}\right)^2\right) dy$$


    其中 $x>0$。该分布可以由两个参数描述：均值 $\mu$ 和标准差 $\sigma$。然而，其均值和标准差的计算公式与正态分布所用的不同。在实践中，对
    $x$ 值取对数，使用正态分布的公式计算均值和标准差，然后将经验分布与正态分布进行比较。


    ## 学生 t 分布


    *学生 t 分布*最初由 William S. Gosset（1876 至 1937）引入，他需要一种适用于小样本的分布（图 3.9）。Gosset 是爱尔兰吉尼斯啤酒厂的一名员工，希望匿名发表他的研究成果。因此，他以笔名
    *Student*（Student 1908）发表了他的 t 分布。其概率密度函数为


    $$f(x) = \frac{\Gamma\left(\frac{\Phi+1}{2}\right)}{\Gamma\left(\frac{\Phi}{2}\right)}
    \frac{1}{\sqrt{\Phi\pi}} \frac{1}{\left(1+\frac{x^2}{\Phi}\right)^{\frac{\Phi+1}{2}}}$$


    其中 $\Gamma$ 是 Gamma 函数


    $$\Gamma(x) = \lim_{n \to \infty} \frac{n!n^{x-1}}{x(x+1)(x+2)\dots(x+n-1)}$$


    图 3.9 a 学生 $t$ 分布在 $\Phi$ 取两个不同值时的概率密度函数 $f(x)$ 和 b 累积分布函数 $F(x)$。


    如果 $x>0$，它可以写成


    $$\Gamma(x) = \int_{0}^{\infty} e^{-y} y^{x-1} dy$$


    $t$ 分布的单一参数 $\Phi$ 是自由度。在单变量数据分析中，该分布具有 $n-1$ 个自由度，其中 $n$ 是样本量。当 $\Phi \to \infty$
    时，$t$ 分布收敛于标准正态分布。由于当 $\Phi > 30$ 时 $t$ 分布接近正态分布，因此很少用于分布拟合。然而，$t$ 分布用于通过 $t$
    检验（第 3.7 节）进行假设检验。


    ## 费希尔 $F$ 分布


    $F$ 分布以统计学家 Sir Ronald Fisher（1890 至 1962）的名字命名。它用于通过 $F$ 检验（第 3.8 节）进行假设检验。$F$
    分布具有相对复杂的概率密度函数（图 3.10），


    $$f(x) = \frac{\Gamma\left(\frac{\Phi_1+\Phi_2}{2}\right)\left(\frac{\Phi_1}{\Phi_2}\right)^{\frac{\Phi_1}{2}}}{\Gamma(\Phi_1/2)\Gamma(\Phi_2/2)}
    x^{\frac{\Phi_1-2}{2}} \left(1 + \frac{\Phi_1}{\Phi_2}x\right)^{-\frac{\Phi_1+\Phi_2}{2}}$$


    其中 $x>0$，$\Gamma$ 再次是 Gamma 函数。两个参数 $\Phi_1$ 和 $\Phi_2$ 是自由度。


    图 3.10 a 费希尔 $F$ 分布在 $\Phi_1$ 和 $\Phi_2$ 取不同值时的概率密度函数 $f(x)$ 和 b 累积分布函数 $F(x)$。


    ## $\chi^2$ 分布（或卡方分布）


    $\chi^2$ 分布由 Friedrich Helmert（1876）和 Karl Pearson（1900）引入。该分布在统计假设检验（第 3.9 节）中有重要应用。$\chi^2$
    分布的概率密度函数为


    $$f(x) = \frac{1}{2^{\Phi/2}\Gamma(\Phi/2)}x^{\frac{\Phi}{2}-1}e^{-\frac{x}{2}}$$


    其中 $x>0$；否则，$f(x)=0$。同样，$\Gamma$ 是 Gamma 函数，$\Phi$ 是自由度（图 3.11）。


    图 3.11 a $\chi^2$ 分布在 $\Phi$ 取不同值时的概率密度函数 $f(x)$ 和 b 累积分布函数 $F(x)$。


    ## 3.5 理论分布示例


    我们使用 norm.pdf() 和 norm.cdf() 来计算均值为 mu=12.3448、标准差为 sigma=1.1660 的高斯分布的概率密度函数和累积分布函数（针对
    x 中的值进行计算），并将结果与我们的样本数据集的结果进行比较：


    ```

    %reset -f


    import numpy as np

    import matplotlib.pyplot as plt

    from scipy import stats


    mu = 12.3448

    sigma = 1.166


    x = np.arange(5,20+0.001,0.001)

    pdf = stats.norm.pdf(x,mu,sigma)

    cdf = stats.norm.cdf(x,mu,sigma)


    plt.figure()

    plt.plot(x,pdf,x,cdf)

    plt.show()

    ```


    我们可以使用这些函数来熟悉分布的特性。这在后续章节进行假设检验时将非常重要。这些章节中使用的检验统计量遵循本章前面介绍的理论频率分布。特别是，理论分布在某个范围
    $a \le x \le b$ 内的积分（或在离散情况下为求和）非常重要，因为它有助于计算测量值落在该范围内的概率。


    例如，我们可以计算测量值落在 $\mu-\sigma \le x \le \mu+\sigma$ 范围内的概率，其中 $\mu$ 是高斯分布的均值，$\sigma$
    是标准差。使用 mu=12.3448 和 sigma=1.1660 的高斯分布的 PDF，我们发现


    ```

    pdf = pdf / np.sum(pdf)

    print(np.sum(pdf[np.where((x>mu-sigma) & (x<mu+sigma))]))

    ```


    结果为


    0.6826894910701773


    或者在将 PDF 归一化为单位后约为 68%。表达式 np.where(x>mu-sigma) 返回 x 中第一个大于 mu-sigma 的索引。类似地，np.where(x<mu+sigma)
    返回 x 中第一个小于 mu+sigma 的索引。'
