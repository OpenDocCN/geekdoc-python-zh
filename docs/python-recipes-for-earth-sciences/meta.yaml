    Signal processing methods are often applied to remove a major part of the noise,
    although many filtering methods make arbitrary assumptions concerning the signal-to-noise
    ratio (Chap. 6). Moreover, filtering introduces artifacts and statistical dependencies
    to the data, which may have a profound influence on the resulting power spectra.


    Finally, we introduce a linear long-term trend to the data by adding a straight
    line with a slope of 0.005 and an intercept with the y-axis of zero (Fig. 5.3c).
    Such trends are common in the earth sciences. As an example, consider the glacial–interglacial
    cycles observed in marine oxygen-isotope records superimposed on a long-term cooling
    trend over the last six million years:


    ```

    xt = x + 0.005 * t


    plt.figure()

    plt.plot(t,x,''b-'',t,xt,''r-'')

    plt.axis(np.array([0,200,-4,4]))

    plt.show()

    ```


    In reality, more complex trends exist, such as higher-order trends and trends
    that are characterized by variations in gradient. In practice, it is recommended
    that such trends be eliminated by fitting polynomials to the data and subtracting
    the corresponding values. Our synthetic time series now contains many characteristics
    of a typical earth science data set and can illustrate the use of the spectral
    analysis tools that are introduced in the next section.


    # 5.3 Auto-Spectral and Cross-Spectral Analysis


    Auto-spectral analysis aims to describe the distribution of the variance contained
    in a single signal x(t) as a function of frequency or wavelength. A simple way
    of describing the variance in a signal over a time lag k is by means of the autocovariance.
    The autocovariance cov_xx of the signal x(t) with n data points sampled at constant
    time intervals Δt is'
  merge: -1
  pgno: 168
- img_proc: true
  md: '$cov_{xx}(k) = \frac{1}{n-k-1} \sum_{t=1}^{n-k} (x_i - \bar{x})(x_{i+k} - \bar{x})$


    The autocovariance series clearly depends on the amplitude of $x(t)$. Normalizing
    the covariance by the variance $s^2$ of $x(t)$ yields the autocorrelation sequence.
    Autocorrelation involves correlating a series of data with itself as a function
    of a time lag $k$:


    $corr_{xx}(k) = \frac{cov_{xx}(k)}{cov_{xx}(0)} = \frac{cov_{xx}(k)}{s_x^2}$


    A popular method used to compute power spectra in the earth sciences is that introduced
    by Blackman and Tukey (1958). The *Blackman–Tukey method* uses the complex Fourier
    transform $X_{xx}(f)$ of the autocorrelation sequence $corr_{xx}(k)$,


    $X_{xx}(f) = \sum_{k=0}^{m} corr_{xx}(k)e^{i2\pi fk/f_s}$


    where $m$ is the maximum lag and $f_s$ is the sampling frequency. The Blackman–Tukey
    auto-spectrum is the absolute value of the Fourier transform of the autocorrelation
    series. In some fields, the *power spectral density* is used as an alternative
    way of describing the auto-spectrum. The Blackman–Tukey power spectral density
    $PSD$ is calculated by


    $PSD = \frac{X_{xx}^*(f)X_{xx}(f)}{f_s} = \frac{|X_{xx}(f)|^2}{f_s}$


    where $X_{xx}^*(f)$ is the conjugate complex of the Fourier transform of the autocorrelation
    series $X_{xx}(f)$ and $f_s$ is the sampling frequency. The actual computation
    of the power spectrum can only be performed at a finite number of different frequencies
    by employing a *Fast Fourier Transform (FFT)*. The FFT is a method of computing
    a discrete Fourier transform with reduced execution time. Most FFT algorithms
    divide the transform into two portions each of size $n/2$ at each step of the
    transformation. The transform is therefore limited to blocks with dimensions equal
    to a power of two. In practice, the spectrum is computed using a number of frequencies
    that is close to the number of data points in the original signal $x(t)$.


    The discrete Fourier transform is an approximation of the continuous Fourier transform.
    The continuous Fourier transform assumes an infinite signal, but discrete real
    data are limited at both ends, that is, the signal amplitude is zero beyond either
    end of the time series. In the time domain, a finite signal corresponds to an
    infinite signal multiplied by a rectangular window that has a value of one within
    the limits of the signal and a value of zero elsewhere. In the frequency domain,
    multiplying the time series by this window is equivalent to a convolution of the
    power spectrum of the signal with the spectrum of the rectangular window (see
    Sect. 6.4 for a definition of convolution). However, the spectrum of the window
    is'
  merge: -1
  pgno: 169
- img_proc: true
  md: 'a sin(x)/x function, which has a main lobe and numerous side lobes on either
    side of the main peak. As a result, all maxima in a power spectrum *leak*, that
    is, they lose power on either side of the peaks (Fig. 5.4).


    A popular way of overcoming the problem of *spectral leakage* is by *windowing*,
    in which the sequence of data is simply multiplied by a smooth bell-shaped curve
    with positive values. Several window shapes are available, such as *Bartlett*
    (triangular), *Hamming* (cosinusoidal), and *Hanning* (slightly different cosinusoidal)
    (Fig. 5.4). The use of these windows slightly modifies the equation for the Blackman–Tukey
    auto-spectrum to


    ```

    $$X_{xx}(f) = \sum_{k=0}^{m} corr_{xx}(k)w(k)e^{i2\pi fk/f_s}$$

    ```


    where $w(k)$ is the windowing function. The Blackman–Tukey method therefore performs
    auto-spectral analysis in three steps: 1) calculating the autocorrelation sequence
    $corr_{xx}(k)$, 2) windowing, and finally, 3) computing the discrete Fourier transform.
    Python allows power spectral analysis to be performed with a number of modifications
    to the method described above. One useful modification is the *Welch method* (Welch
    1967) (Fig. 5.5), which involves dividing the time series into overlapping segments,
    computing the power spectrum for each segment, and then averaging the power spectra.
    The advantage of averaging the spectra is obvious: It simply improves the signal-to-noise
    ratio of a spectrum. The disadvantage is the loss of resolution in the spectra.


    Cross-spectral analysis correlates two time series in the frequency domain. The
    cross-covariance is a measure of the variance between two signals over a time
    lag


    ![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_170_0.png)'
  merge: -1
  pgno: 170
- img_proc: true
  md: '![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_171_0.png)


    **Fig. 5.5** Principle of Welch''s power spectral analysis. The time series is
    first divided into overlapping segments; the power spectrum for each segment is
    then computed, and all spectra are averaged in order to improve the signal-to-noise
    ratio of the power spectrum.


    k. The cross-covariance $cov_{xy}$ of two signals $x(t)$ and $y(t)$ with $n$ data
    points sampled at constant time intervals $\Delta t$ is


    $cov_{xy}(k) = \frac{1}{n-k-1} \sum_{t=1}^{n-k} (x_i - \bar{x})(y_{i+k} - \bar{y})$


    The cross-covariance series again depends on the amplitudes of $x(t)$ and $y(t)$.
    Normalizing the covariance by the standard deviations of $x(t)$ and $y(t)$ yields
    the cross-correlation sequence:


    $corr_{xy}(k) = \frac{cov_{xy}(k)}{cov_{xy}(0)} = \frac{cov_{xy}(k)}{s_x s_y}$'
