  mdcn: "## 3.11 曼-惠特尼检验\n\n*曼-惠特尼检验*（也称为*威尔科克森秩和检验*）由亨利·B·曼和唐纳德·R·惠特尼（1947年）提出，可用于判断两个样本是来自同一总体（例如，同一岩性单元）（原假设）还是来自两个不同的总体（备择假设）。与比较高斯分布数据均值的*t*检验不同，曼-惠特尼检验比较的是中位数，且不要求底层总体满足正态性假设（即它是一种非参数假设检验）。\n\
    \n该检验要求样本具有相似的离散度。我们首先将两组测量值（样本1和样本2）合并，并按升序排列。然后，我们分别计算样本1和样本2的秩和，其中所有秩的总和为 $R\
    \ = n(n+1)/2$，$n$ 为测量总数。已发表的文献中充满了计算检验统计量的不同版本。这里，我们使用Hedderich和Sachs（2012年，第484页）中可以找到的版本：\n\
    \n$U_1 = n_1n_2 + \\frac{n_1(n_1 + 1)}{2} - R_1$\n\n$U_2 = n_1n_2 + \\frac{n_2(n_2\
    \ + 1)}{2} - R_2$\n\n其中 $n_1$ 和 $n_2$ 分别是样本1和样本2的大小，$R_1$ 和 $R_2$ 分别是样本1和样本2的秩和。所需的检验统计量\
    \ $U$ 是 $U_1$ 和 $U_2$ 中较小的那个，我们将其与一个取决于样本大小 $n_1$ 和 $n_2$ 以及显著性水平 $\\alpha$ 的临界\
    \ $U$ 值进行比较。或者，我们可以使用 $U$ 值来计算\n\n$\\widehat{Z} = \\frac{\\left|U - \\frac{n_1n_1}{2}\\\
    right|}{\\sqrt{\\frac{n_1n_2(n_1+n_2+1)}{12}}}$\n\n如果 $n_1 \\geq 8$ 且 $n_2 \\\
    geq 8$（Mann and Whitney 1947; Hedderich and Sachs 2012, page 486）。如果测量的 $z$ 值的绝对值大于取决于显著性水平\
    \ $\\alpha$ 的临界 $z$ 值的绝对值（第3.4节），则可以拒绝原假设。\n\n在实践中，数据集通常包含结值，即样本1和/或样本2中的某些值是相同的。在这种情况下，使用结值的平均秩来代替真实秩。这意味着\
    \ $z$ 值的公式必须针对结值进行修正：\n\n$\\widehat{Z} = \\frac{\\left|U - \\frac{n_1n_1}{2}\\\
    right|}{\\sqrt{\\left(\\frac{n_1n_2}{S(S-1)}\\right) \\cdot \\left(\\frac{S^3-S}{12}\
    \ - \\sum_{i=1}^{r} \\frac{t_i^3-t_i}{12}\\right)}}$\n\n其中 $S=n_1+n_2$，$r$ 是结值的数量，$t_i$\
    \ 是第 $i$ 个结值出现的次数。同样，如果测量的 $z$ 值的绝对值大于取决于显著性水平 $\\alpha$ 的临界 $z$ 值的绝对值，则可以拒绝原假设。\n\
    \n*SciPy* 包提供了 `ranksums()` 函数，用于执行曼-惠特尼检验，以判断两个样本 `data1` 和 `data2`（每个样本包含八个测量值，其中有一些结值）是来自同一总体（原假设）还是来自两个不同的总体（备择假设）。我们定义两个各包含八个测量值的样本：\n\
    \n```python\n%reset -f\n\nimport numpy as np\nfrom scipy import stats\n\ndata1\
    \ = np.array([5,5,8,9,13,13,13,15])\ndata2 = np.array([3,3,4,5,5,8,10,16])\n```\n\
    \n我们使用 `ranksums()` 对相同的样本执行曼-惠特尼检验：\n\n```python\nstatistic,pvalue = stats.ranksums(data1,data2)\n\
    print(statistic)\nprint(pvalue)\n```\n\n结果如下：\n\n```\n1.6278255976825613\n0.10356187117653398\n\
    ```\n\n该结果意味着在5%的显著性水平下，我们无法拒绝原假设。*p* 值为0.1071（或约11%，大于显著性水平）意味着，在原假设为真的情况下，从类似实验中观察到相同结果或更极端结果的概率是11%。\n\
    \n我们也可以使用此脚本来测试 *organicmatter_two.mat* 中的两个样本是来自同一岩性单元（原假设）还是来自两个不同的单元（备择假设），而无需对底层总体进行正态性假设。我们使用以下代码加载数据：\n\
    \n```python\ncorg = np.loadtxt('organicmatter_two.txt')\ncorg1 = corg[:,0]\ncorg2\
    \ = corg[:,1]\n```\n\n我们使用 `ranksums()` 对相同的样本执行曼-惠特尼检验：\n\n```python\nstatistic,pvalue\
    \ = stats.ranksums(corg1,corg2)\nprint(statistic)\nprint(pvalue)\n```\n\n结果如下：\n\
    \n```\n0.5406097975139224\n0.5887765633694566\n```\n\n结果 h==0 意味着在没有其他原因的情况下，在5%的显著性水平下，我们无法拒绝原假设。*p*\
    \ 值为0.5888（或约59%，远大于显著性水平）意味着，在原假设为真的情况下，从类似实验中观察到相同结果或更极端结果的概率是5,888/10,000。\n\
    \n```python\n%reset -f\nimport numpy as np\nimport matplotlib.pyplot as plt\n\
    from scipy import stats\n\ncorg = np.loadtxt('organicmatter_one.txt')\ncorg =\
    \ (corg-np.mean(corg))/np.std(corg,ddof=1)\n```\n\n然后我们计算 corg 的累积频率分布 cn_obs：\n\
    \n```python\ncorg = np.sort(corg)\ncn_obs = np.arange(1,len(corg)+1)/len(corg)\n\
    ```\n\n接下来，我们使用 norm.cdf() 创建理论分布（均值为零，标准差为一）的预期累积频率分布 cn_exp：\n\n```python\n\
    cn_exp = stats.norm.cdf(corg)\n```\n\n检验统计量是两个累积频率分布 cn_obs 和 cn_exp 之间的最大差值：\n\
    \n```python\nkscalc = max(cn_obs-cn_exp)\nprint(kscalc)\n```\n\n结果如下：\n\n```\n\
    0.07567749152482395\n```\n\n我们可以通过输入以下代码在图中比较这两个累积频率分布：\n\n```python\nplt.plot(corg,cn_obs)\n\
    plt.plot(corg,cn_exp)\nplt.plot([corg[np.where(cn_obs-cn_exp==max(cn_obs-cn_exp))],\n\
    \    corg[np.where(cn_obs-cn_exp==max(cn_obs-cn_exp))]],\n    [cn_exp[np.where(cn_obs-cn_exp==max(cn_obs-cn_exp))],\n\
    \    cn_obs[np.where(cn_obs-cn_exp==max(cn_obs-cn_exp))]],\n    color='k',linestyle=':')\n\
    ```\n\n垂直的黑线标记了两个累积频率分布之间最大差值的位置。临界 kscalc 值是 n 阶多项式的解，可在表 3.1（O'Connor and Kleyner\
    \ 2012）中找到。对于样本量大于40且显著性水平为0.05（或5%）的情况，我们计算：\n\n表 3.1 柯尔莫哥洛夫-斯米尔诺夫检验的 *KS* 临界值（O’Connor\
    \ and Kleyner 2012）。\n\n| *n* | 显著性水平 *α* | | | |\n|---|---|---|---|---|\n| |\
