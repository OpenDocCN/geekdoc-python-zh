    \n## 8.6 Processing and Exporting EO-1 Hyperion Images\n\nThe *Earth Observing-1*\
    \ (EO-1) mission satellite was part of the New Millennium Program of the U.S.\
    \ National Aeronautics and Space Administration (NASA) and the U.S. Geological\
    \ Survey (USGS). The mission began with the launch of the satellite on 21 November\
    \ 2000 and was deactivated on 30 March 2017. EO-1 has two sensors: the Advanced\
    \ Land Image (ALI) (which has nine multispectral bands with a 30 m spatial resolution\
    \ and a panchromatic band with a 10 m resolution) and the hyperspectral sensor\
    \ (Hyperion) (which has 220 bands between 430 and 2,400 nm) (Mandl et al. 2002;\
    \ Line 2012). General information about the EO-1 program can be obtained from\
    \ the following website:\n\nhttp://eo1.gsfc.nasa.gov\n\nHyperion data (together\
    \ with data from of other NASA satellites) are freely available from the following\
    \ website:\n\nhttps://earthexplorer.usgs.gov\n\nOn this latter website, we first\
    \ select the desired map section in the *Search Criteria* either by entering the\
    \ coordinates of the four corners of the map or by zooming into the area of interest\
    \ and selecting *Use Map*. As an example, we enter the coordinates 2°8'37.58\"\
    N 36°33'47.06\"E and arrive at the center of the Suguta Valley in the northern\
    \ Kenya Rift. We then choose *Hyperion* from the *EO-1* collection as the *Data\
    \ Set* and click *Results*, which produces a list of records together with a toolbar\
