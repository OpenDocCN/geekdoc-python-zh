    variables (e.g., nutrient supply), and the system’s properties consequently vary
    over time. In such a case, it is difficult to determine the actual input of the
    system using the output (e.g., when extracting the actual climate signal from
    a bioturbated sedimentary record).

    - *Invertibility*—An invertible system is a system in which the original input
    signal $x(t)$ can be reproduced from the system’s output $y(t)$. This is an important
    property if unwanted signal distortions are to be corrected, in which case the
    known system is inverted and the output then used to reconstruct the undisturbed
    input. For example, a core logger that measures magnetic susceptibility with a
    loop sensor integrates the signal over a specific core interval; the sensitivity
    is highest at the position of the loop and decreases both down-core and up-core.
    This system is invertible, that is, we can compute the input signal $x(t)$ from
    the output signal $y(t)$ by inverting the system. The inverse of the linear system
    above is


