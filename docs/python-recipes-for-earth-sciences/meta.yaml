    ```\nB = np.array([[4,2,6,5],[7,8,5,6],[2,1,-8,-9],[3,1,2,3]])\n```\n\nwe type\n\
    \n```\nC = A @ np.transpose(B)\nprint(C)\n```\n\nor\n\n```\nC = np.matmul(A,np.transpose(B))\n\
    print(C)\n```\n\nusing the NumPy function matmul(), in which transpose() yields\
