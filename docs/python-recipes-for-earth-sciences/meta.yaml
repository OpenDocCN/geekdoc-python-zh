    ## 3 单变量统计


    ### 3.1 引言


    单变量分析用于研究单个变量的统计特性。例如，该变量可以是深海沉积物的有机碳含量、砂岩层中颗粒的大小，或是火山灰中透长石晶体的年龄。我们从一个更大的*总体*中收集的*样本*大小，往往受到资金和后勤条件的限制。单变量统计方法帮助我们从样本中得出适用于整个总体的结论。对于单变量分析，我们使用*NumPy*
    (https://numpy.org)、*Matplotlib* (https://matplotlib.org)、*SciPy* (https://scipy.org)
    和 *scikit-learn* (https://scikit-learn.org) 包，它们包含了所有必要的例程。


    我们首先需要在第3.2和3.3节中，使用统计参数描述样本的特征，并计算*经验分布*（描述性统计）。本节将简要介绍最重要的统计参数（例如，*集中趋势和离散程度的度量*），并辅以Python示例。然后，我们在第3.4和3.5节中选择一个与经验分布具有相似特征的*理论分布*。在介绍一系列理论分布及其潜在应用之后，我们将使用Python工具来探索这些分布。接着，在第3.6至3.12节中，我们将检验理论分布是否是经验分布的合适模型（*假设检验*），然后再从样本中得出可以应用于更大目标总体的结论。第3.13节介绍了将分布拟合到我们自己数据集的方法。最后，第3.14节对误差分析的基础知识进行了非常简要的介绍。


    **补充信息** 在线版本包含补充材料，可访问 https://doi.org/10.1007/978-3-031-07719-7_3。


    ### 3.2 经验分布


    假设我们从一个特定对象收集了一系列测量值 $x_i$。作为目标总体子集的数据（或样本）集合可以写成一个向量或一维数组 $x$


    $$x = (x_1, x_2, \dots, x_n)$$


    其中包含总共 $n$ 个观测值。数组 $x$ 可能包含大量数据点，因此理解其特性可能很困难。因此，描述性统计通常用于总结数据的特征。数据集的统计特性可用于定义经验分布，然后可以将其与理论分布进行比较。


    研究样本特征最直接的方法是以图形形式显示数据。将所有数据点绘制在单个轴上并不能揭示关于数据集的大量信息。然而，点沿刻度的密度确实提供了一些关于数据特征的信息。单变量数据的一种广泛使用的图形显示是*直方图*（图3.1）。直方图是频率分布的条形图，按区间或*类别*组织。此类直方图提供了关于数据特征的有价值信息，例如*集中趋势*、*离散程度*和分布的*总体形状*。然而，定量度量提供了比图形形式更精确的数据集描述方式。例如，从纯定量的角度来看，*均值*和*中位数*定义了数据集的集中趋势，而数据的离散程度则用*范围*和*标准差*来表示。


    **图3.1** 经验频率分布的图形表示。**a** 在*直方图*中，频率被组织成 *nbin* 个类别，并绘制为条形图。**b** 频率分布的*累积分布图*显示了所有小于或等于某个值的观测值的总和。该图被归一化为观测值总数为一。


    ### 集中趋势的度量


    集中趋势（或位置）参数是表征经验分布的最重要度量（图3.2）。这些值有助于在线性刻度上定位数据，它们代表了描述数据的典型或最佳值。最流行的集中趋势指标是*算术平均值*，它是所有数据点
    $x_i$ 的总和除以观测值数量 $n$：


    $$\bar{x} = \frac{1}{n} \sum_{i=1}^{n} x_i$$


    单变量数据集的算术平均值也可以称为均值或平均值。如果基础理论分布是高斯（或正态）分布，则样本均值用作总体均值 $\mu$ 的估计。然而，算术平均值对异常值敏感，即可能与大多数数据差异很大的极端值，因此*中位数*通常被用作集中趋势的替代度量。中位数是位于数据集中间的
    $x$ 值，即50%的观测值低于中位数，50%高于中位数。按升序排序的数据集的中位数定义为


    $$\tilde{x} = x_{(n+1)/2}$$


    如果 $n$ 为奇数，以及


    $$\tilde{x} = (x_{(n/2)} + x_{(n/2)+1})/2$$


    如果 $n$ 为偶数。虽然异常值也会影响中位数，但它们的绝对值不会影响它。*分位数*是将数据样本划分为包含相等数量观测值的组的一种更通用的方法。例如，三个*四分位数*将数据分为四组，四个*五分位数*将观测值分为五组，而99个百分位数定义了一百个组。


    **图3.2** *集中趋势*的度量。**a** 在单峰对称分布中，均值、中位数和众数都相同。**b** 在偏态分布中，中位数位于均值和众数之间。均值对异常值高度敏感，而中位数和众数受极高或极低值的影响很小。中位数通常位于偏态分布中。


    集中趋势的第三个重要度量是*众数*。众数是最频繁出现的 $x$ 值，或者——如果数据被分组到类别中——则是具有最多观测值的类别的中心。如果没有值比其他任何值出现得更频繁，则数据集没有众数。具有单个众数的频率分布称为*单峰*分布，但也可能存在两个众数（*双峰*）、三个众数（*三峰*）或四个或更多众数（*多峰*）（图3.3）。


    当几个量相加产生总和时，使用均值、中位数和众数，而当这些量相乘时，通常使用*几何平均值*。假设一个生物种群在第一年增长10%，第二年增长25%，第三年增长60%。平均增长率不是算术平均值，因为原始个体数量在一年后增加了1.1倍（而不是相加），第二年后增加了1.25倍，第三年后增加了1.6倍。因此，种群的平均增长是通过几何平均值计算的：


    $$\bar{x}_G = (x_1 \cdot x_2 \cdot \ldots \cdot x_n)^{1/n}$$


    这些值的平均增长为1.3006，表明种群的年增长率约为30%。算术平均值会得出错误的值1.3167，或约32%的年增长率。几何平均值也是偏态数据（如对数正态分布数据）的有用集中趋势度量；但是，如果存在零或负值，则不适用。最后，*调和平均值*


    $$\bar{x}_H = n / \left( \frac{1}{x_1} + \frac{1}{x_2} + \cdots + \frac{1}{x_n}
    \right)$$


    也用于推导非对称数据（例如，对数正态分布数据）的平均值，就像几何平均值一样，但两者对异常值都不稳健。当数字是相对于特定单位定义时，调和平均值是更好的平均值。常被引用的例子是用于平均速度。调和平均值也用于计算样本大小的平均值。


    ### 离散程度的度量


    分布的另一个重要特性是离散程度。图3.3说明了一些可用于量化离散程度的参数。描述数据集离散程度最简单的方法是使用*范围*，它是数据集中最高值和最低值之间的差值，由下式给出


    $$\Delta x = x_{max} - x_{min}$$'
