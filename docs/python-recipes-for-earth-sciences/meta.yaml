- md: '## 9.1 Introduction


    Multivariate analysis is used to understand and describe the relationships between
    an arbitrary number of variables. Earth scientists often deal with multivariate
    data sets, such as microfossil assemblages, geochemical fingerprints of volcanic
    ash layers, or the clay mineral content of sedimentary sequences. Such multivariate
    data sets consist of measurements of $p$ variables on $n$ objects, which are usually
    stored in $n$-by-$p$ arrays:


    $$X = \begin{pmatrix} x_{11} & x_{12} & \cdots & x_{1p} \\ x_{21} & x_{22} & \cdots
    & x_{2p} \\ \vdots & \vdots & & \vdots \\ x_{n1} & x_{n2} & \cdots & x_{np} \end{pmatrix}$$


    The rows of the array represent the $n$ objects, and the columns represent the
    $p$ variables. The characteristics of the 2nd object in the suite of samples are
    described by the vector in the second row of the data array:


    $$X_2 = (x_{21} \ x_{22} \ \cdots \ x_{2p})$$


    As an example, consider a set of microprobe analyses on glass shards from volcanic
    ash layers in a tephrochronology project. The variables are the $p$ chemical elements,
    and the objects are the $n$ ash samples. The aim of the study is to correlate
    ash layers by means of their geochemical fingerprints.


    **Supplementary Information** The online version contains supplementary material
    available at https://doi.org/10.1007/978-3-031-07719-7_9.


    © The Author(s), under exclusive license to Springer Nature Switzerland AG 2022

    M. H. Trauth, *Python Recipes for Earth Sciences*, Springer Textbooks in Earth
    Sciences, Geography and Environment, https://doi.org/10.1007/978-3-031-07719-7_9


    Most multivariate methods simply try to overcome the main difficulty associated
    with such data sets, which relates to data visualization. Whereas the character
    of univariate or bivariate data sets can easily be explored by visually inspecting
    a 2D histogram or an *xy* plot (Chap. 3), the graphical display of a three-variable
    data set requires projecting the 3D distribution of data points onto a two-dimensional
    display. It is impossible to imagine or display a larger number of variables.
    One solution to the problem of visualizing high-dimensional data sets is to reduce
    the number of dimensions. Several methods exist for grouping together highly correlated
    variables contained within a data set and for exploring the reduced number of
    groups.


    The classic methods of reducing the number of dimensions are *principal component
    analysis* (PCA) and *factor analysis* (FA). These methods seek the directions
    of maximum variance in a data set and use these directions as new coordinate axes.
    The advantage of replacing existing variables with new groups of variables is
    that the groups are uncorrelated. These methods are therefore used for unmixing
    (or separating) mixed variables. Moreover, the new variables can often assist
    in interpreting a multivariate data set since they frequently contain valuable
    information on the processes responsible for the distribution of the data points.
    In a geochemical analysis of magmatic rocks, the groups defined by the method
    usually contain chemical elements with similarly sized ions in similar locations
    within the lattices of certain minerals. Examples include Si$^{4+}$ and Al$^{3+}$
    as well as Fe$^{2+}$ and Mg$^{2+}$ in silicates.


    A second important suite of multivariate methods aims at grouping objects by their
    similarity. As an example, *cluster analysis* (CA) is often used to correlate
    volcanic ash layers, such as those in the example above. Tephrochronology attempts
    to correlate tephra by means of their geochemical fingerprints. When combined
    with a few radiometric age determinations from key ash layers, this method allows
    for correlations between different sedimentary sequences that contain these ash
    layers (e.g., Westgate 1998; Hermanns et al. 2000). Cluster analysis is also used
    in the field of micropaleontology, for example, to compare different microfossil
    assemblages (e.g., Birks and Gordon 1985).


    A third group of methods is concerned with classifying observations. Humans tend
    to want to classify the things around them even though nature rarely falls into
    discrete classes. Classification (or categorization) is useful because it can,
    for example, help decision-makers to take the necessary precautions to reduce
    risks when drilling an oil well or when assigning fossils to a particular genus
    or species. Most classification methods make decisions based on Boolean logic
    with two options, true or false, as in the use of a threshold value for identifying
    charcoal in microscope images (Sect. 8.11). Alternatively, fuzzy logic (which
    is not explained in this book) is a generalization of binary Boolean logic with
    respect to many real-world problems in decision-making, in which gradual transitions
    are reasonable (Zadeh 1965).


    The following sections introduce the most important techniques of multivariate
    statistics. To begin, *principal component analysis* (PCA) and *cluster analysis*
    (CA) are introduced in Sects. 9.2 and 9.5, respectively, and *independent component
    analysis* (ICA) (which is a nonlinear extension of PCA) is outlined in Sect. 9.3.
    Section 9.4 introduces discriminant analysis (DA), which is a popular method of
    classification in the earth sciences. Section 9.6 introduces multiple linear regression,
    and Sect. 9.7 demonstrates the use of John Aitchison’s log-transformation for
    overcoming the closed-sum problem—a problem that is very common in multivariate
    data sets (Aitchison 1984, 1986, 1999, 2003). For multivariate analysis, we use
    the NumPy (https://numpy.org), Matplotlib (https://matplotlib.org), scikit-learn
    (https://scikit-learn.org), and SciPy packages (https://scipy.org), which contain
    all the necessary routines.


    ## 9.2 Principal Component Analysis


    Principal component analysis (PCA) detects linear dependencies between p variables
    and replaces groups of linearly correlated variables with p uncorrelated variables,
    which are referred to as the principal components (PCs) (Fig. 9.1). PCA—which
    was first introduced by Karl Pearson (1901) and was further developed by Harold
    Hotelling (1931)—is the standard method used in the linear unmixing (or separating)
    of mixed variables. PCA is equivalent to fitting a $p$-dimensional ellipsoid to
    a data set of $p$ variables, where the $p$ eigenvectors of the $p$-by-$p$ covariance
    matrix of the data set are the axes of the ellipsoid. PCA is therefore one of
    the eigenvector methods. The $p$ eigenvalues represent the distribution of the
    variance between each of the eigenvectors.


    The performance of PCA is best illustrated with a bivariate data set of the two
    variables $x_1$ and $x_2$ that exhibits a strong linear correlation by fitting
    a two-dimensional ellipse to the data with two eigenvectors $PC_1$ and $PC_2$
    of the 2-by-2 covariance matrix of the data set (Fig. 9.1). Since the first principal
    component $PC_1$ passes through the long axis of the data scatter and the new
    origin is the bivariate mean, $PC_1$ can be used to describe most of the variance,
    while $PC_2$ contributes only a small amount of additional information. Prior
    to this transformation, two axes $x_1$ and $x_2$ had been required to describe
    the data set, but it is now possible to reduce the dimensions of the data by dropping
    the second axis $PC_2$ without losing very much information, as shown in Fig.
    9.1.


    Since this method produces signals $PC_1$ and $PC_2$, which are linearly uncorrelated,
    the method is also called *whitening* because this property is characteristic
    of white noise. An important prerequisite for successfully applying this method
    is that the data must be Gaussian distributed. Although the separated signals
    are uncorrelated, they can still be interdependent (i.e., they can retain a nonlinear
    correlation). This phenomenon arises, for example, if the data are not Gaussian
    distributed and PCA consequently does not yield useful results. Independent component
    analysis (ICA) was developed for this type of task as it separates $p$ independent
    variables (which are then nonlinearly uncorrelated) from the $p$ dependent variables
    (Sect. 9.3).


    This process can now be expanded to an arbitrary number of variables and samples.
    Let us assume a data set that consists of measurements of $p$ variables from $n$
    samples stored in an $n$-by-$p$ array $X$:


    $$X = \begin{pmatrix} x_{11} & x_{12} & \dots & x_{1p} \\ x_{21} & x_{22} & \dots
    & x_{2p} \\ \vdots & \vdots & & \vdots \\ x_{n1} & x_{n2} & \dots & x_{np} \end{pmatrix}$$


    The columns of the array $X$ represent the $p$ variables, and the rows represent
    the $n$ samples. After rotating the axis and moving the origin, the new coordinates
    $Y_j$ can be computed by


    $$Y_1 = a_{11}X_1 + a_{12}X_2 + \dots + a_{1p}X_p$$

    $$Y_2 = a_{21}X_1 + a_{22}X_2 + \dots + a_{2p}X_p$$

    $$\vdots$$

    $$Y_p = a_{p1}X_1 + a_{p2}X_2 + \dots + a_{pp}X_p$$'
  mdcn: '## 9.1 引言


    多元分析用于理解和描述任意数量变量之间的关系。地球科学家经常处理多元数据集，例如微体化石组合、火山灰层的地球化学指纹，或沉积序列的粘土矿物含量。这类多元数据集由对
    $n$ 个对象测量 $p$ 个变量组成，通常存储在 $n$ 行 $p$ 列的数组中：


    $$X = \begin{pmatrix} x_{11} & x_{12} & \cdots & x_{1p} \\ x_{21} & x_{22} & \cdots
    & x_{2p} \\ \vdots & \vdots & & \vdots \\ x_{n1} & x_{n2} & \cdots & x_{np} \end{pmatrix}$$


    数组的行代表 $n$ 个对象，列代表 $p$ 个变量。样本集中第2个对象的特征由数据数组第二行的向量描述：


    $$X_2 = (x_{21} \ x_{22} \ \cdots \ x_{2p})$$


    举个例子，考虑一个火山灰年代学项目中对火山灰层玻璃碎片的电子探针分析数据集。变量是 $p$ 种化学元素，对象是 $n$ 个灰样。研究的目的是通过它们的地球化学指纹来关联灰层。


    **补充信息** 在线版本包含补充材料，可访问 https://doi.org/10.1007/978-3-031-07719-7_9。


    © 作者，经 Springer Nature Switzerland AG 2022 独家许可

    M. H. Trauth, *Python Recipes for Earth Sciences*, Springer Textbooks in Earth
    Sciences, Geography and Environment, https://doi.org/10.1007/978-3-031-07719-7_9


    大多数多元方法试图克服与此类数据集相关的主要困难，即数据可视化问题。单变量或双变量数据集的特征可以通过直观检查二维直方图或 *xy* 图（第3章）轻松探索，而三变量数据集的图形显示则需要将数据点的三维分布投影到二维显示上。想象或显示更多变量是不可能的。解决高维数据集可视化问题的一个方法是减少维度。有几种方法可以将数据集中高度相关的变量分组在一起，并探索减少后的组数。


    经典的降维方法是 *主成分分析*（PCA）和 *因子分析*（FA）。这些方法寻找数据集中方差最大的方向，并将这些方向用作新的坐标轴。用新的变量组替换现有变量的优势在于这些组是不相关的。因此，这些方法用于分离（或分离）混合变量。此外，新变量通常有助于解释多元数据集，因为它们经常包含关于导致数据点分布过程的有价值信息。在岩浆岩的地球化学分析中，该方法定义的组通常包含在某些矿物晶格中具有相似大小离子和相似位置的化学元素。例如硅酸盐中的
    Si$^{4+}$ 和 Al$^{3+}$，以及 Fe$^{2+}$ 和 Mg$^{2+}$。


    第二类重要的多元方法旨在根据相似性对对象进行分组。例如，*聚类分析*（CA）通常用于关联火山灰层，如上述示例中的灰层。火山灰年代学试图通过其地球化学指纹来关联火山灰。当与来自关键灰层的几个放射性年龄测定相结合时，该方法允许对包含这些灰层的不同沉积序列进行关联（例如，Westgate
    1998；Hermanns 等人 2000）。聚类分析也用于微体古生物学领域，例如，用于比较不同的微体化石组合（例如，Birks 和 Gordon 1985）。


    第三类方法涉及对观测进行分类。人类倾向于对周围的事物进行分类，尽管自然界很少能划分为离散的类别。分类（或归类）是有用的，因为它可以帮助决策者在钻探油井或将化石归入特定属或种时采取必要的预防措施以降低风险。大多数分类方法基于布尔逻辑做出决策，只有真或假两种选择，就像在显微镜图像中使用阈值识别木炭一样（第8.11节）。或者，模糊逻辑（本书未解释）是二元布尔逻辑在许多现实世界决策问题中的推广，在这些问题中，渐进的过渡是合理的（Zadeh
    1965）。


    以下章节介绍了多元统计学中最重要的技术。首先，*主成分分析*（PCA）和 *聚类分析*（CA）分别在第9.2节和第9.5节介绍，*独立成分分析*（ICA）（PCA的非线性扩展）在第9.3节概述。第9.4节介绍判别分析（DA），这是地球科学中一种流行的分类方法。第9.6节介绍多元线性回归，第9.7节演示了使用
    John Aitchison 的对数变换来克服闭合和问题——这是多元数据集中非常常见的问题（Aitchison 1984, 1986, 1999, 2003）。对于多元分析，我们使用
    NumPy (https://numpy.org)、Matplotlib (https://matplotlib.org)、scikit-learn (https://scikit-learn.org)
    和 SciPy (https://scipy.org) 包，它们包含了所有必要的例程。


    ## 9.2 主成分分析


    主成分分析（PCA）检测 $p$ 个变量之间的线性依赖关系，并用 $p$ 个不相关的变量（称为主成分，PCs）替换线性相关的变量组（图9.1）。PCA——最初由
    Karl Pearson（1901）提出，后由 Harold Hotelling（1931）进一步发展——是用于线性分离（或分离）混合变量的标准方法。PCA
    等同于将一个 $p$ 维椭球体拟合到一个包含 $p$ 个变量的数据集，其中数据集 $p$ 乘 $p$ 协方差矩阵的 $p$ 个特征向量就是椭球体的轴。因此，PCA
    是特征向量方法之一。$p$ 个特征值代表了每个特征向量之间的方差分布。


    PCA 的性能最好用一个包含两个变量 $x_1$ 和 $x_2$ 且表现出强线性相关的双变量数据集来说明，通过将数据集的 2 乘 2 协方差矩阵的两个特征向量
    $PC_1$ 和 $PC_2$ 拟合到数据上形成一个二维椭圆（图9.1）。由于第一主成分 $PC_1$ 穿过数据散点的长轴，且新原点是双变量均值，因此 $PC_1$
    可以用来描述大部分方差，而 $PC_2$ 只贡献少量额外信息。在此变换之前，需要两个轴 $x_1$ 和 $x_2$ 来描述数据集，但现在可以通过舍弃第二个轴
    $PC_2$ 来降低数据维度，而不会丢失太多信息，如图9.1所示。


    由于该方法产生的信号 $PC_1$ 和 $PC_2$ 是线性不相关的，因此该方法也称为 *白化*，因为这种特性是白噪声的特征。成功应用此方法的一个重要前提是数据必须服从高斯分布。尽管分离后的信号是不相关的，但它们仍然可能是相互依赖的（即，它们可能保留非线性相关性）。例如，如果数据不服从高斯分布，PCA
    因此无法产生有用的结果，就会出现这种现象。独立成分分析（ICA）就是为这类任务开发的，它从 $p$ 个相关变量中分离出 $p$ 个独立变量（这些变量随后是非线性不相关的）（第9.3节）。


    这个过程现在可以扩展到任意数量的变量和样本。让我们假设一个数据集，它由存储在 $n$ 行 $p$ 列数组 $X$ 中的 $n$ 个样本的 $p$ 个变量测量值组成：


    $$X = \begin{pmatrix} x_{11} & x_{12} & \dots & x_{1p} \\ x_{21} & x_{22} & \dots
    & x_{2p} \\ \vdots & \vdots & & \vdots \\ x_{n1} & x_{n2} & \dots & x_{np} \end{pmatrix}$$


    数组 $X$ 的列代表 $p$ 个变量，行代表 $n$ 个样本。在旋转轴并移动原点后，新的坐标 $Y_j$ 可以通过以下公式计算：


    $$Y_1 = a_{11}X_1 + a_{12}X_2 + \dots + a_{1p}X_p$$

    $$Y_2 = a_{21}X_1 + a_{22}X_2 + \dots + a_{2p}X_p$$

    $$\vdots$$

    $$Y_p = a_{p1}X_1 + a_{p2}X_2 + \dots + a_{pp}X_p$$'
