    # 9.6 Multiple Linear Regression


    In Chap. 4, linear regression models were introduced as a way of describing the
    relationship between a dependent variable *y* and an independent variable *x*.
    The dependent variable is also known as the *response variable*, and the independent
    variable is also known as the *predictor variable*. A multiple linear regression
    model describes the relationship between a dependent (or response) variable *y*
    and *n* independent (or predictor) variables *x<sub>i</sub>*,


    $$y = b_0 + b_1x_1 + b_2x_2 + \dots + b_px_p$$


    where *b<sub>i</sub>* are the *n*+1 regression coefficients of the linear model.
    The linearity in the term multiple linear regression refers to the fact that the
    response variable is a linear function of the predictor variables. The regression
    coefficients are estimated by minimizing the mean squared difference between the
    predicted and true values of the response variable *y*. An example that is commonly
    used in the earth sciences is the quality of crude oil, which is assumed to be
    linearly dependent on the age of the sediment, the burial depth, and the temperature.
    In practice, the plausibility of the assumption of linearity must first be examined.
    If this assumption is probably true, several methods of multiple linear regression
    are available.


    As a first example, we create a noise-free synthetic data set with three variables
    Var1, Var2, and Var3. We wish to uncover the influence of variables Var1 and Var2
    on variable Var3. Variables Var1 and Var2 are therefore the predictor variables,
    and variable Var3 is the response variable. The linear relationship between the
    response variable and the predictor variables is Var3 = 0.2 - 52.0 * Var1 + 276.0
    * Var2. The three variables Var1, Var2, and Var3 are stored as columns 1, 2, and
    3, respectively, in a single array data:'
