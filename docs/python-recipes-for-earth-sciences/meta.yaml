    ```\n\n输出结果为：\n\n```\n0.2568129442682396\n-0.4780014841875708\n```\n\n平坦顶部或多峰分布表明数据集中存在多个总体。如果这些总体可以与特定区域相关联，则应分别处理。存在多个峰的另一个原因可能是对高值和/或低值区域的优先采样。这通常是由于某些先验知识造成的，被称为聚类效应。处理聚类效应的方法在\
