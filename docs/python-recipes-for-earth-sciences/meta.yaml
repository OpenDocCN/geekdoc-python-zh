    import matplotlib.pyplot as plt

    from numpy.random import default_rng

    from scipy import stats


    samplesize = 12

    sqrtsamplesize = np.sqrt(samplesize)

    rng = np.random.default_rng(0)

    data = 3.4 + 1.5*rng.standard_normal(samplesize)

    print(data)

    ```'
