    $S = (s_1, s_2, \dots, s_n)$


    and the second record is used as the reference input $X$:


    $X = (x_1, x_2, \dots, x_n)$


    As demonstrated by Hattingh (1988), the desired noise-free signal can be extracted
    by filtering the reference input $X$ using the primary input $S$ as the desired
    response $d$. The minimum error optimization problem is solved by the least-mean-square
    norm. The mean squared error $e_i^2$ is a second-order function of the weights
    in the nonrecursive filter. The dependence of $e_i^2$ on the unknown weights $W$
    may be seen as a multidimensional paraboloid with a uniquely defined minimum point.
    The weights that correspond to the minimum point on this error surface define
    the optimal Wiener solution (Wiener 1949). The value that is computed for the
    weight array $W$ using the LMS algorithm represents an estimator whose expected
    value approaches the Wiener solution as the number of iterations approaches infinity
    (Haykin 1991). Gradient methods are used to reach the minimum point on the error
    surface. To simplify the optimization problem, Widrow and Hoff (1960) developed
    an approximation for the required gradient function that can be computed directly
    from the data. This leads to a simple relationship for updating the filter weight
    array $W$:


    $W_{i+1} = W_i + 2 \cdot u \cdot e_i \cdot X_i$


    The new set of filter weights $W_{i+1}$ is based on the previous set $W_i$ plus
    a term that is the product of a bounded step size (or convergence factor) $u$,
    a function of the input state $X_i$, and a function of the error $e_i$. In other
    words, the error $e_i$ calculated from the previous step is fed back into the
    system in order to update filter coefficients for the next step (Fig. 6.6). The
    fixed convergence factor $u$ regulates the speed and stability of adaption. A
    low value of $u$ ensures a higher level of accuracy, but more data are needed
    to enable the filter to reach the optimum solution. In the modified version of
    the LMS algorithm by Hattingh (1988), this problem is overcome by processing the
    data in a loop such that the filter can have another chance to improve its own
    coefficients and adapt to changes in the data.


    In the following example, which introduces `canc()`, each of these loop runs is
    called an iteration, and many loop runs are required if optimal results are to
    be achieved. This algorithm extracts the noise-free signal from two arrays `x`
    and `s`, which contain the correlated signals and uncorrelated noise. As an example,
    we generate two signals `yn1` and `yn2`, which contain the same sine wave but
