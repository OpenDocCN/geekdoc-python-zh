    ![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_256_0.png)


    Fig. 6.7 Output of the adaptive filter. a The duplicate records corrupted by uncorrelated
    noise are fed into the adaptive filter with 5 weights with a convergence factor
