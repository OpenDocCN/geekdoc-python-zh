    # 7.11 Geostatistics and Kriging (by R. Gebbers)


    Geostatistics describes the autocorrelation of one or more variables in 1D, 2D,
    or 3D space – or even in 4D space–time – in order to make predictions for unobserved
    locations, to obtain information on the accuracy of these predictions, or to reproduce
    spatial variability and uncertainty. The shape, range, and direction of the spatial
    autocorrelation are described by a variogram, which is the main tool used in linear
    geostatistics. The origins of geostatistics in its current form can be traced
    back to the early 1950s, when South African mining engineer Daniel G. Krige first
    published an interpolation method based on the spatial dependency of samples.
    In the 1960s and 1970s, French mathematician Georges Matheron developed the theory
    of regionalized variables, which provides the theoretical foundations for Krige’s
    more practical methods. This theory forms the basis of several procedures for
    analyzing and estimating spatially dependent variables, which Matheron called
    geostatistics. Matheron also coined the term kriging for spatial interpolation
    via geostatistical methods.


    # Theoretical Background


    A basic assumption in geostatistics is that a spatiotemporal process is composed
    of both deterministic and stochastic components (Fig. 7.17). The deterministic
    components can be global or local trends (sometimes called drifts). The stochastic
    component comprises both a purely random component and an autocorrelated component.
    The autocorrelated component suggests that on average, closer observations are
    more similar to one another than are more widely separated observations. This
    behavior is described by a variogram in which squared differences between observations
    are plotted against the separation distances of the observations. Krige’s fundamental
    idea was to use the variogram for interpolation as a means of determining the
    amount of influence that neighboring observations have when predicting values
    for unobserved locations. Basic linear geostatistics includes two main procedures:
    variography for modeling a variogram, and kriging for interpolation.'
