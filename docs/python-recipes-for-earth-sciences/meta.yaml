    of the autocorrelation matrix for the reference input) leads to reasonable results
    (Haykin 1991) (Fig. 6.7). The value of u is computed using


    ```

    python

    k = np.kron(yn1,np.transpose(yn1[None]))

    w,v = linalg.eig(k)

    u = 1/np.max(w)

    print(u)

