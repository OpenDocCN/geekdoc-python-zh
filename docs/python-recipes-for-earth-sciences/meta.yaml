    \n## 信号处理\n\n### 6.1 引言\n\n信号处理涉及一系列技术，用于操纵信号以最小化噪声影响、校正各种不必要的失真，并分离出各种感兴趣的成分。大多数信号处理算法都包括滤波器的设计与实现。*滤波器*可以描述为一个转换信号的系统。*系统理论*为滤波器的设计与实现提供了数学基础。滤波器有输入和输出，其中*输出信号\
    \ y(t)*是相对于*输入信号 x(t)*进行修改的（图6.1）。*信号转换*可以通过称为*卷积*的数学过程进行，或者如果涉及滤波器，则称为*滤波*。\n\
    \n本章讨论借助计算机进行*数字滤波器*的设计与实现。然而，许多自然过程类似于*模拟滤波器*，它们记录地质档案中的自然事件。单次降雨事件不会在湖泊沉积物中留下记录，因为该事件在沉积物中产生的短时、低振幅信号（例如沉积物化学成分的短期变化）在进入沉积物之前，在充分混合的水体中已被强烈衰减。生物扰动也会引入严重的信号失真（例如信号幅度和相位的变化），例如在深海沉积物中，它导致单个有孔虫物种的氧同位素信号出现明显的相位偏移（例如Trauth\
    \ 2013）。除了这些自然滤波器外，地质数据的野外采集和取样也会改变和平滑数据的原始形式。例如，一个有限大小的沉积物样品是在一定时间段内积分的，这平滑了自然信号。同样，使用环形传感器测量沉积岩芯的磁化率会引入显著的平滑，因为环形响应是在岩芯的某一段上积分的。\n\
    \n这些自然滤波器的特性通常难以确定，而数值滤波器则具有明确的特性。此外，人工滤波器在大多数情况下是时不变的，而自然滤波器（例如湖泊水体内的混合或水-沉积物界面的生物扰动）可能会随时间变化。描述或预测滤波器效果的一种简单方法是通过探索简单输入信号（如正弦波、方波、锯齿函数、斜坡函数或阶跃函数）的滤波器输出。尽管存在无穷多种此类输入信号，但大多数系统或滤波器是通过其脉冲响应来描述的，即单位脉冲输入所产生的输出。\n\
    \n本章接下来是第6.2节，关于生成周期信号、趋势和噪声，这承接了上一章第5.2节的内容。然后第6.3节考虑线性时不变系统，并为滤波器提供数学背景。随后的第6.4至6.9节讨论线性时不变滤波器的设计、实现和应用。第6.10节考虑自适应滤波器的使用，这些滤波器最初是为电信行业开发的。这些自适应滤波器可以从同一对象的重复测量中自动提取无噪声信号。此类滤波器可用于大量应用，例如从重复的古海洋时间序列中去除噪声，以及提高穿过纹层状湖泊沉积物的平行颜色强度剖面的信噪比（见第5章，图5.1）。自适应滤波器也广泛应用于地球物理学中的噪声消除。对于信号处理，我们使用NumPy\
    \ (https://numpy.org)、Matplotlib (https://matplotlib.org) 和 SciPy (https://scipy.org)\
    \ 包，它们包含了所有必要的例程。\n\n### 6.2 生成信号\n\nPython提供了许多生成基本信号的工具，这些信号可用于说明滤波器的效果。在第5章中，我们通过将三个不同振幅和周期的正弦波相加来生成信号。在下面的示例中，时间数组被转置以生成列数组：\n\
    \n```python\n%reset -f\n\nimport numpy as np\nimport matplotlib.pyplot as plt\n\
    \nt = np.linspace(1,100,100)\nx = 2 *np.sin(2*np.pi*t/50) + \\\n    np.sin(2*np.pi*t/10)\
