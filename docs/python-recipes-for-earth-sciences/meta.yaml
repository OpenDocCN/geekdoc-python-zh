    ```\n\nUsing clip_limit with a real scalar between 0 and 1 limits the contrast\
    \ enhancement. Higher numbers result in increased contrast, and the default value\
    \ is 0.01. Using a clip_limit of 0.1 yields good results. The three bands are\
