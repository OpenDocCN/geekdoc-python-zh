  mdcn: "## 7.8 方法比较与潜在伪影\n\n本节的第一个示例展示了使用*双线性插值*技术对不均匀间距数据进行网格化（图 7.8–7.9）。双线性插值是第\
    \ 5.5 节介绍的一维线性插值技术的扩展。在二维情况下，首先在一个方向上进行线性插值，然后在另一个方向上进行。尽管双线性方法似乎是最简单的插值技术之一，因此可能不会预期在数据中产生严重的伪影或失真，但事实恰恰相反，因为该方法存在许多缺点。因此，在许多应用中更倾向于使用其他方法。\n\
    \n上一节使用的样本数据可以再次加载以研究双线性插值的效果：\n\n```python\n%reset -f\n\nimport numpy as np\n\
    from scipy import interpolate\nfrom math import log10, floor\nimport matplotlib.pyplot\
    \ as plt\n\ndata = np.loadtxt('normalfault.txt')\nlabels = np.zeros(len(data))\n\
    for i in range(0,len(data)):\n    labels[i] = round(data[i,2],\n        -int(floor(log10(abs(0.1*data[i,2])))))\n\
    ```\n\n我们现在在使用 `griddata()` 插值数据时选择线性方法：\n\n```python\nx = np.linspace(420,470,201)\n\
    y = np.linspace(70,120,201)\nXI,YI = np.meshgrid(x,y)\n\nZI = interpolate.griddata(data[:,0:2],data[:,2],\n\
    \    (XI,YI),method='linear')\n```\n\n结果绘制为等值线图。该图还包括控制点的位置：\n\n```python\nv =\
    \ np.linspace(-40,20,7)\n\nplt.figure()\nplt.contourf(XI,YI,ZI,v)\nfor i in range(0,len(data)):\n\
    \    plt.plot(data[i,0],data[i,1],\n        marker='o',\n        markeredgecolor=(0,0,0),\n\
    \        markerfacecolor='none',)\n    plt.text(data[i,0]+1,data[i,1],labels[i],\n\
    \        fontsize=8)\nplt.colorbar()\nplt.show()\n```\n\n新表面被限制在包含控制点的区域内：默认情况下，双线性插值不会外推到该区域之外。此外，与双三次样条插值的平滑等值线形状相比，等值线相当有棱角。然而，双线性网格化技术最重要的特性通过将数据投影到垂直平面上来说明：\n\
    \n```python\nplt.figure()\nplt.plot(XI,ZI,\n    linewidth=0.3,\n    color='k')\n\
    for i in range(0,len(data)):\n    plt.plot(data[i,0],data[i,2],\n        marker='o',\n\
