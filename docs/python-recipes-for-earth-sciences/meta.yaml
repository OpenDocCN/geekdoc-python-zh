    \ = np.arange(0,1/2,1/1024)\n```\n\nWe then plot the power spectral density Pxx\
    \ in the Nyquist frequency range from 0 to Fs/2, which ranges from 0 to 1/2 in\
    \ our example. The Nyquist frequency range corresponds to the first 512 (or nfft/2)\
