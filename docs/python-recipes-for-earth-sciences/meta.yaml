    import matplotlib.pyplot as plt

    from scipy import stats


    x = np.arange(-4,4,0.001)

    pdf = stats.norm.pdf(x,0.,1.)


    plt.figure()

    plt.plot(x,pdf,color=''k'')

    xint = x[np.where(x>stats.norm.ppf(0.95,0.,1.))]

    pdfint = pdf[np.where(x>stats.norm.ppf(0.95,0.,1.))]

    plt.fill_between(xint,pdfint)

    plt.show()

    ```


    which yields a plot with one blue tail to the right in which the 5% area is shaded
    (Fig. 3.13a). Similarly, we can display the standard normal distribution for the
    two-tailed test by typing


    ```

    x = np.arange(-4,4,0.001)

    pdf = stats.norm.pdf(x,0.,1.)

    ```'
