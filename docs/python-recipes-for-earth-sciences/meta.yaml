    \n## 7.7 网格化与等高线绘制\n\n之前的数据集都存储在均匀间隔的二维数组中。然而，地球科学中的大多数数据是从不规则采样模式中获得的。因此，数据是不均匀间隔的，需要进行插值，以便能够从我们野外的测量数据中计算出平滑连续的表面。*表面估计*通常分两个主要步骤进行（图7.5）：首先，需要选择*控制点*的数量；其次，需要为*网格点*估计感兴趣变量的值。\n\
