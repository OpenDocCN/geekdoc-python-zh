    \ two types of .py files: scripts and functions. Whereas scripts are a series\
    \ of commands that operate on data in the workspace, functions are true algorithms\
    \ with input variables (or input arguments) and output variables (or output arguments).\
    \ The advantages and disadvantages of both types of .py files are now illustrated\
