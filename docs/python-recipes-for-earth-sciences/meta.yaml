    # 3.14 Error Analysis


    The previous sections on univariate statistics provided a basis for investigating
    and evaluating measurement errors. These errors cannot be avoided, but they are
    of the utmost importance when it comes to reaching statistical conclusions. Unfortunately,
    thorough error analysis still occurs—albeit rarely—in many areas of the earth
    sciences. This is surprising—if not alarming—because a statement that does not
    include associated uncertainty is of no value to the recipients of the information.
    If, for example, the gold contained within a rock is given as 6 g per ton without
    any confidence limits, an astute investor will hold back on making any commitment.
    If confidence limits are provided, then the investor will be happy to invest provided
    that these limits do not exceed ±2 g per ton. A confidence interval of ±8 g per
    ton would mean that the actual gold content could be more than twice as high or
    could be zero and would therefore a bad investment.


    Let us look briefly at the principles of error calculation without becoming too
    deeply immersed in the subject. A deeper investigation is not necessary because
    excellent books are already available on the topic (albeit without Python examples),
    including *An Introduction to Error Analysis* by John R. Taylor (1997). First
    of all, it is important to understand that there are two different types of measurement
    errors (not only in geosciences): *random errors* and *systematic errors* (Fig.
    3.16). If we try to determine the gold content of a rock using a measuring device,
    we will only achieve finite measurement precision. This becomes clear when the
    gold content of the same sample is determined several times in a row: The results
    are never identical and usually scatter around a value due to technical


    ![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_120_0.png)


    Fig. 3.16 Illustration of the difference between *random error* and *systematic
    error*. While random errors can be reduced by increasing the sample size, this
    does have any effect on systematic errors.'
