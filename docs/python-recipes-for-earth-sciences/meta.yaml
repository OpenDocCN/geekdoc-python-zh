    # 8.4 Importing, Processing, and Exporting Landsat Images


    The Landsat project is a satellite remote sensing program that is jointly managed
    by the U.S. National Aeronautics and Space Administration (NASA) and the U.S.
    Geological Survey (USGS). The project began with the launch of the Landsat 1 satellite
    (originally known as Earth Resources Technology Satellite 1) on 23 July 1972.
    According to the program’s website, the latest in a series of successors is the
    Landsat 9 satellite, which was launched on 27 September 2021. The satellite has
    two sensors: the Operational Land Imager (OLI) and the Thermal Infrared Sensor
    (TIRS). These two sensors provide coverage of the global landmass at spatial resolutions
    of 30 m (visible, NIR, SWIR), 100 m (thermal), and 15 m (panchromatic) (Ochs et
    al. 2009; Irons et al. 2011). General information concerning the Landsat program
    can be obtained from the following website:


    http://landsat.gsfc.nasa.gov/


    Landsat data – together with data from other NASA satellites – can be obtained
    from the following website:


    https://earthexplorer.usgs.gov


    On this website, we first select the desired map section in the *Search Criteria*
    either by entering the coordinates of the four corners of the map or by zooming
    into the area of interest and selecting *Use Map*. As an example, we enter the
    coordinates 4°42′40.72″N 36°51′10.47″E, which locate the center of the Chew Bahir
    basin in the southern Ethiopian Rift. We then choose *L8 OLI/TIRS* from the *Landsat
    Archive* as the *Data Set* and click *Results*, which produces a list of records
    along with a toolbar for previewing and downloading data. By clicking the *Show
    Browse Overlay* button, we can examine the images for cloud cover. We then find
    the cloud-free image


    Entity ID: LC81690572013358LGN00

    Coordinates: 4.33915,36.76225

