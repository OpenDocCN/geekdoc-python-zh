    The general mathematical representation of the filtering process is the convolution


    $$y(t) = \sum_{k=-N_1}^{N_2} b_k \cdot x(t-k)$$


    where $b_k$ is the array of *filter weights* and $N_1+N_2$ is the *filter order*,
    which is the length of the filter reduced by one. Filters with five weights (as
    in our example) have an order of four. In contrast to this format, Python uses
    the engineering standard for indexing filters, that is, filters are always defined
    as causal. The convolution used by Python is therefore


    $$y(t) = \sum_{k=0}^{N} b_k \cdot x(t-k)$$


    where $N$ is the order of the filter. Several of the frequency-domain tools provided
    by Python cannot simply be applied to non-causal filters that have been designed
    for applications in the earth sciences. Phase corrections are therefore commonly
    carried out in order to simulate non-causality. For example, frequency-selective
    filters—which are introduced in Sect. 6.9—can be applied using `filtfilt()`, which
    provides zero-phase forward and reverse filtering.


    The functions `convolve()` and `lfilter()`, which provide digital filtering in
    Python, are best illustrated in terms of a simple running mean. The $n$ elements
    of the array $x(t_1), x(t_2), x(t_3), \dots, x(t_n)$ are replaced with the arithmetic
    means of subsets of the input array. For instance, a running mean over three elements
    computes the mean of inputs $x(t_{n-1}), x(t_n), x(t_{n+1})$ in order to obtain
    the output $y(t_n)$. We can illustrate this simply by generating a random signal,


    ```

    t = np.linspace(1,100,100)

    rng = default_rng(0)

    x1 = rng.standard_normal((100))

    ```


    designing a filter that averages three data points of the input signal,


    ```

    b1 = np.array([1,1,1])/3

    print(b1)

    ```


    and convolving the input array with the filter


    ```

    y1 = np.convolve(x1,b1)

    ```


    The elements of `b1` are the weights of the filter. In our example, all filter
    weights are the same and are equal to 1/3. Note that `convolve()` yields an array
    that has a length of $n+m-1$, where $m$ is the length of the filter:'
