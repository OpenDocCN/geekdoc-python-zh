    \ (e.g., the variable CatchmentSize) rather than a single-character variable (e.g.,\
    \ a). We can now delete the contents of variable b by typing\n\n```\ndel b\n```\n\
    \nNext, we learn how specific array elements can be accessed or exchanged. In\
