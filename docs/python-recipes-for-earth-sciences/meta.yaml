    \ instead of 1 by typing\n\n```\nc = np.arange(1,10+0.5,0.5)\nprint(c)\n```\n\n\
    or\n\n```\nc = np.linspace(1,10,19)\nprint(c)\n```\n\nwhich both yield\n\n```\n\
