    grid_coords = np.append(lon.reshape(-1,1), \n    lat.reshape(-1,1),axis=1)

    zc = 256*c(grid_coords.T) / np.max(c(grid_coords.T))

    ```


    We subsequently display the data points in a geographic density plot with axes
    that

    use a Lambert projection (Fig. 10.6):


