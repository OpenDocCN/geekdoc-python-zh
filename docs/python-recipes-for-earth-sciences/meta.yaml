    The unit impulse is the most popular synthetic signal used to study the performance
    of a filter. The output of the filter (i.e., the impulse response) describes the
    characteristics of the filter very well. Moreover, the output of a linear time-invariant
    filter can be described by the superposition of impulse responses that have been
    scaled by multiplying the output of the filter by the amplitude of the input signal.


    # 6.3 Linear Time-Invariant Systems


    Filters can be described as systems with an input $x(t)$ and an output $y(t)$.
    We therefore first describe the characteristics of systems in general before subsequently
    considering filters. Important characteristics of a system include


    +   - *Continuity*—A system with continuous inputs $x(t)$ and outputs $y(t)$ is
    a continuous system. Most natural systems are continuous. However, after sampling
    natural signals, we obtain discrete data series and model these natural systems
    as discrete systems with discrete inputs and outputs.

    - *Linearity*—For linear systems, the output $y(t)$ of the linear combination
    of several input signals $x_i(t)$ where

    $$x(t) = k_1x_1(t) + k_2x_2(t)$$

    is the same as the linear combination of the outputs $y_i(t)$:

    $$y(t) = k_1y_1(t) + k_2y_2(t)$$


    Important properties of linearity are scaling and additivity (*superposition*),
    which allow the input and output to be multiplied by a constant $k_i$ either before
    or after transformation. Superposition allows additive components of the input
    to be extracted and transformed separately. Fortunately, many natural systems
    follow a linear pattern of behavior. Complex linear signals (e.g., additive harmonic
    components) can be separated out and transformed independently. Milankovitch cycles
    provide an example of linear superposition in paleoclimate records, although there
    is an ongoing debate about the validity of this theory. Numerous nonlinear systems
    that do not possess the properties of scaling and additivity also exist in nature.
    An example of a linear system is'
