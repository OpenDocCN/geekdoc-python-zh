- md: "## 4.5 Bootstrap Estimates of the Regression Coefficients\n\nIn this section,\
    \ we use the *bootstrap* method to obtain a better estimate of the regression\
    \ coefficients. As an example, we use `random.choice()` with 1,000 samples (Fig.\
    \ 4.6):\n\n```\n%reset -f\n\nimport numpy as np\nimport matplotlib.pyplot as plt\n\
    from numpy.random import default_rng\n\nagedepth = np.loadtxt('agedepth_1.txt')\n\
    \nmeters = agedepth[0:,0]\nage = agedepth[0:,1]\n\np = np.polyfit(meters,age,1)\n\
    ```\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_145_0.png)\n\n```\nind = np.linspace(0,19,30,dtype=int)\n\
    p1000 = np.zeros((1000,2))\nfor i in range(1000):\n    indices = np.random.choice(ind,\n\
    \        size=30,\n        replace=True)\n    p = np.polyfit(meters[indices],\n\
    \        age[indices],1)\n    p1000[i,:] = p\n```\n\nThe statistic of the first\
    \ coefficient, that is, the slope of the regression line, is\n\n```\nplt.figure()\n\
    plt.hist(p1000[:,0],bins=30)\nplt.show()\n\nprint(np.median(p1000[:,0]))\n```\n\
    \nwhich yields\n\n```\n5.120606217265465\n```\n\nWe use the median instead of\
    \ the mean since we cannot expect the bootstrap results to be Gaussian distributed.\
    \ In contrast, the statistic of the second coefficient shows a striking dispersion.\
    \ Typing\n\n```\nplt.figure()\nplt.hist(p1000[:,1],bins=30)\nplt.show()\n\nprint(np.median(p1000[:,1]))\n\
    ```\n\nyields\n\n```\n24.22153549031753\n```\n\nThe true values used to simulate\
    \ our data set were 5.6 for the slope and 20 for the intercept with the y-axis,\
    \ whereas the corresponding coefficients calculated using polyfit() were 5.3667\
    \ and 21.7607, respectively (Sect. 4.3).\n\n## 4.6 Jackknife Estimates of the\
    \ Regression Coefficients\n\nThe *jackknife* method is a resampling technique\
    \ that is similar to the bootstrap method. From a sample with $n$ data points,\
    \ $n$ subsamples with $n-1$ data points are taken. The parameters of interest\
    \ (e.g., the regression coefficients) are calculated for each of the subsamples.\
    \ The mean and dispersion of the coefficients are then computed. The disadvantage\
    \ of this method is the limited number of $n$ subsamples: A jackknife estimate\
    \ of the regression coefficients is therefore less precise than a bootstrap estimate.\n\
    \nThe relevant code for the jackknife is easy to generate:\n\n```\n%reset -f\n\
    \nimport numpy as np\nimport matplotlib.pyplot as plt\nfrom numpy.random import\
    \ default_rng\n\nagedepth = np.loadtxt('agedepth_1.txt')\n\nmeters = agedepth[0:,0]\n\
    age = agedepth[0:,1]\n\np = np.polyfit(meters,age,1)\n\np30 = np.zeros((30,2))\n\
    for i in range(30):\n    j_meters = np.copy(meters)\n    j_age = np.copy(age)\n\
    \    j_meters = np.delete(j_meters,i,0)\n    j_age = np.delete(j_age,i,0)\n  \
    \  p = np.polyfit(j_meters,j_age,1)\n    p30[i,:] = p\n```\n\nThe jackknife for\
    \ subsamples with $n-1=29$ data points can be obtained using a simple *for* loop.\
    \ The $i$th data point within each iteration is deleted, and regression coefficients\
    \ are calculated for the remaining data points. The mean of the $i$ subsamples\
    \ provides an improved estimate of the regression coefficients. As with the bootstrap\
    \ result, the slope of the regression line (first coefficient) is well defined,\
    \ whereas the intercept with the $y$-axis (second coefficient) has a large uncertainty,\n\
    \n```\nprint(np.median(p30[:,0]))\n```\n\nwhich yields\n\n5.3663093479597155\n\
    \ncompared with 5.1206 calculated by the bootstrap method and\n\n```\nprint(np.median(p30[:,1]))\n\
    ```\n\nwhich yields\n\n21.79637039186352\n\ncompared with 24.2215 from the bootstrap\
    \ method (Sect. 4.5). As before, the true values are 5.6 and 20. The histograms\
    \ of the jackknife results from 30 subsamples (Fig. 4.7).\n\n```\nplt.figure()\n\
    plt.subplot(1,2,1)\nplt.hist(p30[:,0])\nplt.subplot(1,2,2)\nplt.hist(p30[:,1])\n\
    plt.show()\n```\n\ndo not display such clear distributions for the coefficients\
    \ as do the histograms of the bootstrap estimates. We have therefore seen that\
    \ resampling using either the jackknife or the bootstrap method is a simple and\
    \ valuable way to test the quality of regression models. The next section introduces\
    \ an alternative approach for quality estimation that is much more commonly used\
    \ than the resampling methods.\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_148_0.png)\n\
    \n## 4.7 Cross-Validation\n\nA third method for testing the quality of the result\
    \ of a regression analysis involves *cross-validation*. With cross-validation,\
    \ the regression line is computed by using *n*−1 data points. The *n*th data point\
    \ is predicted, and the discrepancy between the prediction and the actual value\
    \ is computed. Subsequently, the mean of the discrepancies between the actual\
    \ and predicted values is determined.\n\nIn this example, the cross-validation\
    \ is computed for *n* = 30 data points. The resulting 30 regression lines, which\
    \ are each computed using *n*−1 = 29 data points, display some dispersion in their\
    \ slopes and *y*-axis intercepts:\n\n```\n%reset -f\n\nimport numpy as np\nimport\
    \ matplotlib.pyplot as plt\n\nagedepth = np.loadtxt('agedepth_1.txt')\n\nmeters\
    \ = agedepth[0:,0]\nage = agedepth[0:,1]\n\np = np.polyfit(meters,age,1)\nprint(p)\n\
    \np_age = np.zeros((30,1))\np_error = np.zeros((30,1))\n\nplt.figure()\nplt.plot(meters,age,\n\
    \    marker='o',\n    linestyle='none')\nfor i in range(0,30):\n    j_meters =\
    \ meters;\n    j_age = age;\n    j_meters = np.delete(j_meters,i)\n    j_age =\
    \ np.delete(j_age,i)\n    p = np.polyfit(j_meters,j_age,1)\n    pval = np.poly1d(p)\n\
    \    plt.plot(meters,pval(meters),\n        color=(0.8,0.5,0.3),\n        linewidth=0.1)\n\
    \    p_age =pval(meters)\n    p_error[i,0:] = p_age[i] - age[i]\nplt.show()\n\
    ```\n\nIn the ideal case, the prediction error should be Gaussian distributed\
    \ with a mean of zero,\n\n```\nprint(np.mean(p_error))\n```\n\nwhich yields\n\n\
    ```\n-0.048670587295191345\n```\n\nThe standard deviation is the mean of the deviations\
    \ of the true data points from the predicted straight line,\n\n```\nprint(np.std(p_error,ddof=1))\n\
    ```\n\nwhich yields\n\n```\n10.975717618676232\n```\n\nCross-validation provides\
    \ valuable information on the goodness-of-fit of the regression result and can\
    \ also be used for quality control in other fields, such as in temporal and spatial\
    \ prediction (Chaps. 5 and 7).\n\n## 4.8 Reduced Major Axis Regression\n\nIn some\
    \ examples, neither variable is manipulated, and both can therefore be considered\
    \ to be independent. In such cases, several methods are available for computing\
    \ a best-fit line that minimizes the distance from both x and y. As an example,\
    \ the method of reduced major axis (RMA) minimizes the triangular area 0.5·(ΔxΔy)\
    \ between the data points and the regression line, where Δx and Δy are the distances\
    \ between the predicted values and the true values of x and y (Fig. 4.4). Although\
    \ this optimization appears to be complex, it can be shown that the first regression\
    \ coefficient b₁ (the slope) is simply the ratio of the standard deviations of\
    \ y and x:\n\n$$b_1 = s_y/s_x$$\n\nAs with classical regression, the regression\
    \ line passes through the data centroid, which is defined by the sample mean.\
    \ We can therefore compute the second regression coefficient b₀ (i.e., the y-intercept)\n\
    \n$$b_0 = \\bar{y} - b_1\\bar{x}$$\n\nusing the univariate sample means and the\
    \ slope b₁ computed earlier. Let us again load the age-depth data from the file\
    \ agedepth_1.txt and define two variables, meters and age. It is assumed that\
    \ both the variables contain errors and that the scatter of the data can be explained\
    \ by dispersions of meters and age:\n\n```\n%reset -f\n\nimport numpy as np\n\
    import matplotlib.pyplot as plt\n\nagedepth = np.loadtxt('agedepth_1.txt')\n\n\
    meters = agedepth[0:,0]\nage = agedepth[0:,1]\n```\n\nThe formula above is used\
    \ for computing the slope of the regression line $b_1$,\n\n```\np = np.zeros((2,1))\n\
    p[0] = np.std(age,ddof=1)/np.std(meters,ddof=1)\nprint(p)\n```\n\nwhich yields\n\
    \n```\n[[5.6117361]\n [0.        ]]\n```\n\nThe second coefficient $b_0$ (i.e.,\
    \ the y-axis intercept) can therefore be computed by\n\n```\np[1] = np.mean(age)\
    \ - p[0]*np.mean(meters)\n```\n\nwhich yields\n\n```\n[[ 5.6117361 ]\n [18.70366978]]\n\
    ```\n\nThe regression line can be plotted by\n\n```\nplt.figure()\nplt.plot(meters,age,\n\
    \         marker='o',\n         linestyle='none')\nplt.plot(meters,p[0]*meters+p[1],\n\
    \         color=(0.8,0.5,0.3))\nplt.show()\n```\n\nThis regression line differs\
    \ slightly from the line obtained from classical regression. Note that the regression\
    \ line from RMA is *not* the bisector of the lines produced by the *xy* and *yx*\
    \ classical linear regression analyses, that is, the lines produced using either\
    \ *x* or *y* as the independent variable while computing the regression lines."
  mdcn: "## 4.5 回归系数的自助法估计\n\n在本节中，我们使用*自助法*来获得回归系数的更好估计。作为示例，我们使用`random.choice()`函数，取1,000个样本（图4.6）：\n\
    \n```\n%reset -f\n\nimport numpy as np\nimport matplotlib.pyplot as plt\nfrom\
    \ numpy.random import default_rng\n\nagedepth = np.loadtxt('agedepth_1.txt')\n\
