  md: '# 3.5 Examples of Theoretical Distributions


    We use norm.pdf() and norm.cdf() to compute the probability density function and
    the cumulative distribution function of a Gaussian distribution with mu=12.3448
    and sigma=1.1660 (evaluated for the values in x) to compare the results with those
    of our sample data set:


    ```

    %reset -f


    import numpy as np

    import matplotlib.pyplot as plt

    from scipy import stats


    mu = 12.3448

    sigma = 1.166


    x = np.arange(5,20+0.001,0.001)

    pdf = stats.norm.pdf(x,mu,sigma)

    cdf = stats.norm.cdf(x,mu,sigma)


    plt.figure()

    plt.plot(x,pdf,x,cdf)

    plt.show()

    ```


    We can use these functions to familiarize ourselves with the properties of distributions.
    This will be important when testing hypotheses in the following sections. The
    test statistics used in these sections follow the theoretical frequency distributions
    introduced in the previous sections of this chapter. In particular, the integral
    (or in the discrete case, the sum) of the theoretical distribution within a certain
    range $a \le x \le b$ is of great importance as it helps in calculating the probability
    that a measurement falls within this range.


    As an example, we can calculate the probability that a measurement falls within
    the range of $\mu-\sigma \le x \le \mu+\sigma$, where $\mu$ is the mean and $\sigma$
    is the standard deviation of a Gaussian distribution. Using the PDF of the Gaussian
    distribution with mu=12.3448 and sigma=1.1660, we find


    ```

    pdf = pdf / np.sum(pdf)

    print(np.sum(pdf[np.where((x>mu-sigma) & (x<mu+sigma))]))

    ```


    which yields


    0.6826894910701773


    or ~68% after normalizing the PDF to unity. The expression np.where(x>mu-sigma)
    returns the first index of x where x is larger than mu-sigma. Similarly, np.where(x<mu+sigma)
    returns the first index of x where x is smaller than mu+sigma.'
