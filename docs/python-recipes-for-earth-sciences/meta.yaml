    \ could quantify the other components in the sample (e.g., ostracods or mineral\
    \ grains) by choosing different threshold values.\n\n## 8.12 Shape-Based Object\
    \ Detection in Images\n\nCounting objects within images based on their shapes\
    \ is a highly time-consuming task. This is sometimes carried out for round objects,\
    \ for example, when counting planktonic foraminifera shells in order to infer\
    \ past sea surface temperatures, when counting diatom frustules in order to infer\
    \ the past chemical composition of lake water, or when counting pollen grains\
    \ in order to determine species assemblages, which can be used to reconstruct\
    \ regional air temperature and precipitation. The linear objects that are determined\
    \ include faults in aerial photos and satellite images (in order to derive the\
    \ present-day stress field of an area) and annual layers (varves) in thin sections\
    \ (in order to establish an annually resolved stratigraphy).\n\nThe *Hough transform*\
    \ – which was named after Paul VC Hough’s related 1962 patent – is a popular technique\
    \ with which to detect objects within images based on their shapes. The Hough\
    \ transform was originally used to detect linear features, but soon after being\
    \ patented, it became generalized for use in identifying objects of any shape\
    \ (Duda and Hart 1972; Ballard 1981). The book by Gonzalez and Woods (2018) contains\
    \ a comprehensive introduction to the Hough transform and to its applications\
    \ in detecting objects within images. According to the authors’ introduction to\
    \ the method, the Hough transform is performed in two steps: In the first step,\
    \ an edge detector is used to extract edge features (e.g., distinct sediment layers\
    \ or the outlines of pollen grains) from an image. In the second step, lines (or\
    \ objects of any other shape) that trace these edge features are identified. The\
    \ *scikit-image* package contains functions that use the Hough transform to detect\
    \ lines or circular objects.\n\nThe classic Hough transform is used to detect\
    \ lines in images. After applying an edge detector of any kind, we end up with\
    \ a binary image that has black pixels on the edges and white pixels in between.\
