  md: '# 8.6 Processing and Exporting EO-1 Hyperion Images


    The *Earth Observing-1* (EO-1) mission satellite was part of the New Millennium
    Program of the U.S. National Aeronautics and Space Administration (NASA) and the
    U.S. Geological Survey (USGS). The mission began with the launch of the satellite
    on 21 November 2000 and was deactivated on 30 March 2017. EO-1 has two sensors:
    the Advanced Land Image (ALI) (which has nine multispectral bands with a 30 m
    spatial resolution and a panchromatic band with a 10 m resolution) and the hyperspectral
    sensor (Hyperion) (which has 220 bands between 430 and 2,400 nm) (Mandl et al.
    2002; Line 2012). General information about the EO-1 program can be obtained from
    the following website:


    http://eo1.gsfc.nasa.gov


    Hyperion data (together with data from of other NASA satellites) are freely available
    from the following website:


    https://earthexplorer.usgs.gov


    On this latter website, we first select the desired map section in the *Search
    Criteria* either by entering the coordinates of the four corners of the map or
    by zooming into the area of interest and selecting *Use Map*. As an example, we
    enter the coordinates 2°8''37.58"N 36°33''47.06"E and arrive at the center of
    the Suguta Valley in the northern Kenya Rift. We then choose *Hyperion* from the
    *EO-1* collection as the *Data Set* and click *Results*, which produces a list
    of records together with a toolbar for previewing and downloading data. Clicking
    the *Show Browse Overlay* button allows us to examine the images for cloud cover.
    In the overlay, we can find the cloud-free image


    Entity ID: EO1H1690582013197110KF_PF2_01

    Acquisition Date: 16-JUL-13

    Target Path: 169

    Target Row: 58


    taken on 16 July 2013. As before, we need to register with the USGS website, log
    in, and then download the radiometrically (but not geometrically) corrected Level
    1R (L1R) product (215.3 MB), which is then stored in the file *LEO1H1690582013197110KF_1R.ZIP*.
    The .ZIP archive consists of a metadata file (.MET), a Federal Geographic Data
    Committee (FGDC) metadata file (.fgdc), an HDF data set file (.L1R), and multiple
    auxiliary files. The EO-1 User''s Guide provides some useful information on the
    data formats of these files (Barry 2001; Beck 2003). We can import the data from
    the file *EO1H1690582013197110KF.L1R* using


    ```

    %reset -f

    ```'
  merge: -1
  pgno: 354
- img_proc: true
  md: '```

    import numpy as np

    import matplotlib.pyplot as plt

    from skimage import io, exposure

    from pyhdf.SD import SD


    headerfile = ''EO1H1690582013197110KF.hdr''

    imagefile = ''EO1H1690582013197110KF.L1R''


    finfo = SD(imagefile)

    file = finfo.select(0)

    HYP = file.get()

    ```


    Typing


    ```

    np.who()

    ```


    shows how the hyperspectral image is stored in the workspace:


    | Name | Shape | Bytes | Type |

    |------|-------|-------|------|

    | HYP | 3189 x 242 x 256 | 395129856 | int16 |

    | Upper bound on total bytes = | | 395129856 | |


    These details indicate that the image is stored as a 3,189-by-242-by-256 array,
    which represents a 3,189-by-256 array for each of the 242 spectral bands. The
    listing of the current variables in the workspace also includes the information
    *int16* (i.e., each array element represents one pixel and contains signed 16
    bit integers). We need to permute the array in order to move the bands to the
    third dimension by typing


    ```

    HYP = HYP.transpose(0,2,1)

    ```


    We next need to determine the radiance values from the digital number (DN) values
    in HYP. The radiance is the power density scattered from the Earth in a particular
    direction and uses the units of watts per square meter per steradian (Wm$^{-2}$
    sr$^{-1}$) (Richards 2013). The EO-1 User Guide (v. 2.3) provides the necessary
    information on these conversions in its *Frequently Asked Questions (FAQ)* section
    (Beck 2003). According to this document, the radiance HYPR for the visible and
    near-infrared (VNIR) bands (Bands 1 to 70) is calculated by dividing the digital
    number in HYP by 40. The radiance for the shortwave infrared (SWIR) bands (Bands
    71 to 242) is calculated by dividing HYP by 80:


    ```

    HYPR = np.copy(HYP)

    HYPR[:,:,0:70] = HYPR[:,:,0:70]/40

    HYPR[:,:,70:242] = HYPR[:,:,70:242]/80

    ```'
