    \n```\npx = np.zeros(np.shape(f))\nfor k in range(1,len(f)):\n    wrun = 2*np.pi*f[k]\n\
    \    tau = (1/2*wrun)*math.atan2(sum(np.sin(2*wrun*t)),\n        sum(np.cos(2*wrun*t)))\n\
