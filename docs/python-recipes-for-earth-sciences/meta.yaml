  md: '# Bivariate Statistics


    # 4


    # 4.1 Introduction


    Bivariate analysis is used to obtain a better understanding of the relationship
    between two variables $x$ and $y$, such as the length and width of a fossil, the
    sodium and potassium content of volcanic glass, or the organic matter content
    along a sediment core. When the two variables are measured on the same object,
    $x$ is usually identified as the *independent variable*, and $y$ as the *dependent
    variable*. If both variables have been generated in an experiment, the variable
    manipulated by the experimenter is described as the independent variable. In some
    cases, neither variable is manipulated, and neither is independent.


    Bivariate statistics are used to describe the strength of a relationship between
    two variables either with a single measure—such as Pearson''s correlation coefficient
    for linear relationships—or with an equation obtained by regression analysis (Fig.
    4.1). The equation that describes the relationship between variables $x$ and $y$
    can be used to predict the $y$-response from any arbitrary $x$ within the range
    of the original data values used for the regression analysis. This is of particular
    importance if one of the two variables is difficult to measure. In such a case,
    the relationship between the two variables is first determined via regression
    analysis on a small training set of data. The regression equation can then be
    used to calculate the second variable.


    This chapter first introduces correlation coefficients in Sect. 4.2 and then explains
    the widely used methods of linear and nonlinear regression analysis in Sect. 4.3
    and Sects. 4.9 to 4.11. A selection of additional methods that are used to assess
    uncertainties in regression analysis are also explained in Sects. 4.4 to 4.8.
    All methods are illustrated by means of synthetic examples since such examples


    **Supplementary Information** The online version contains supplementary material
    available at https://doi.org/10.1007/978-3-031-07719-7_4.


    © The Author(s), under exclusive license to Springer Nature Switzerland AG 2022

    M. H. Trauth, *Python Recipes for Earth Sciences*, Springer Textbooks in Earth
    Sciences, Geography and Environment, https://doi.org/10.1007/978-3-031-07719-7_4'
