    \ the input argument hifac, which is defined by Press et al. (2007) as hifac=fhi/fnyq,\n\
    \n```\nintv = np.mean(np.diff(t))\nofac = 4\nhifac = 1\nf = np.arange(((2*intv)**(-1))/(len(x)*ofac),hifac*\n\
    \    (2*intv)**(-1)+((2*intv)**(-1))/\n    (len(x)*ofac),((2*intv)**(-1))/\n \
