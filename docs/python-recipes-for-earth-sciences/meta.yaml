    b Two signals $x$ and $y$ with the same period are out of phase if the difference
    between $\psi_x$ and $\psi_y$ is not equal to zero.


    CD players further reduce the frequency band and result in a cutoff frequency
    of around 20,050 Hz, which is the true upper frequency limit of a CD player.


    We can now generate synthetic signals in order to illustrate the use of time series
    analysis tools. When using synthetic data, we know in advance what features the
    time series contains (e.g., periodic or random components), and we can introduce
    a linear trend and/or gaps in the time series. The user will encounter plenty
    of examples of the possible effects of varying the parameter settings as well
    as potential artifacts and errors that can result from applying spectral analysis
    tools. We begin with simple data and then apply the methods to more complex time
    series. The first example illustrates how to generate a basic synthetic data series
    that is characteristic of earth science data. First, we create a time axis $\tau$
    that runs from 1 to 1,000 in steps of one unit (i.e., the sampling frequency is
    also one). We then generate a simple periodic signal $y$ that consists of a sine
    wave with a period of five and an amplitude of two:'
