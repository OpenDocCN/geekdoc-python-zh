  md: "The second part of this chapter deals with the computation of continuous surfaces\
    \ from unevenly spaced data and with the statistics of spatial data in Sects.\
    \ 7.7 and 7.8. In the earth sciences, most data are collected in an irregular\
    \ pattern. Access to rock samples is often restricted to natural outcrops (e.g.,\
    \ shoreline cliffs and the walls of a gorge) or to anthropogenic outcrops (e.g.,\
    \ road cuttings, quarries, or drill cores). The sections on interpolating such\
    \ unevenly spaced data illustrate the use of the most important gridding routines\
    \ and outline potential pitfalls when using these methods. Sections 7.9 to 7.11\
    \ introduce various methods for statistically analyzing spatial data, including\
    \ applying statistical tests to point distributions in Sect. 7.9, analyzing digital\
    \ elevation models in Sect. 7.10, and providing an overview of geostatistics and\
    \ kriging in Sect. 7.11. This chapter requires the NumPy (https://numpy.org),\
    \ Matplotlib (https://matplotlib.org), SciPy (https://scipy.org), Rasterio (https://rasterio.readthedocs.io),\
    \ GDAL (https://gdal.org/api/python.html), scikit-image (https://scikit-image.org),\
    \ PyGMT (https://www.pygmt.org) (which requires xarray for work with labelled\
