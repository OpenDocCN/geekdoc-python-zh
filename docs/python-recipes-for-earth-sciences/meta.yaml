    plt.show()\n```\n\n信号被扩散到更宽的区域，并且也向右移动了。因此，这种滤波器不仅影响信号的幅度，还会将信号向较低或较高的值移动。这种相移通常是滤波器不希望具有的特性，尽管在某些应用中，沿时间轴的移动可能特别有意义。\n\
