    \n## 7.11 地统计学与克里金法（作者：R. Gebbers）\n\n地统计学描述了一个或多个变量在 1D、2D 或 3D 空间——甚至在 4D 时空——中的自相关性，以便对未观测位置进行预测、获取这些预测的精度信息，或重现空间变异性与不确定性。空间自相关的形状、范围和方向由变异函数描述，这是线性地统计学中使用的主要工具。地统计学以其当前形式的起源可以追溯到\
    \ 20 世纪 50 年代初，当时南非矿业工程师 Daniel G. Krige 首次发表了一种基于样本空间依赖性的插值方法。在 20 世纪 60 年代和\
