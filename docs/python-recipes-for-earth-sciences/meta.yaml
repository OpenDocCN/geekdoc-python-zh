    ETOPO1 = np.loadtxt('etopo1_data_python.txt')\n```\n\n接下来，我们使用`flipud()`上下翻转数组，以根据Python约定更改数据数组的索引：\n\
    \n```\nETOPO1 = np.flipud(ETOPO1)\n```\n\n最后，我们通过打印该区域的最小和最大高程来检查数据是否已正确存储在工作区中：\n\
    \n```\nprint(np.max(ETOPO1))\nprint(np.min(ETOPO1))\n```\n\n在此示例中，该区域的最大高程为5677米，最小高程为-5859米。参考面是海平面（即0米）。我们现在使用`meshgrid()`定义一个坐标系，利用左下角位于南纬20°、东经30°的信息。分辨率为1角分，对应于1/60度：\n\
    \n```\nlon = np.linspace(30,60,1801)\nlat = np.linspace(-20,20,2401)\nLON,LAT\
    \ = np.meshgrid(lon,lat)\n```\n\n现在，我们使用`pcolormesh()`从高程数据生成彩色表面：\n\n```\nplt.figure()\n\
