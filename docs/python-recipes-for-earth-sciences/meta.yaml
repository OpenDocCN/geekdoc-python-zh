    # 10.7 Test for the Difference Between Two Sets of Directions


    Let us consider two sets of measurements in two files, *directional_1.txt* and
    *directional_2.txt*. We wish to compare the two sets of directions and test the
    null hypothesis that they are not significantly different. We use the Watson–Williams
    test to test the similarity between two mean directions,


    $$F = \left(1 + \frac{3}{8\kappa}\right) \frac{(n - 2)(R_A + R_B - R_T)}{n - R_A
    - R_B}$$


    where $\kappa$ is the concentration parameter, $R_A$ and $R_B$ are the resultant
    lengths of samples $A$ and $B$, respectively, and $R_T$ is the resultant length
    of the combined samples (Watson and Williams 1956; Mardia and Jupp 1999). The
    concentration parameter can be obtained from tables using $R_T$ (Batschelet 1981,
    Gumbel et al. 1953, Tab. 10.2). The calculated $F$ is compared with critical values
    from the standard $F$ tables (Sect. 3.8). The two mean directions are not significantly
    different if the calculated $F$-value is less than the critical $F$-value, which
    depends on the degrees of freedom $\Phi_a = 1$ and $\Phi_b = n-2$ as well as on
    the significance level $\alpha$. Both samples must follow a von Mises distribution
    (Sect. 10.4).


    We use two synthetic data sets of directional data to illustrate how this test
    is applied. We first load the data and convert the degrees to radians:


    ```

    %reset -f


    import numpy as np

    from scipy import stats

    import matplotlib.pyplot as plt


    data_degrees_1 = np.loadtxt(''directional_1.txt'')

    data_degrees_2 = np.loadtxt(''directional_2.txt'')


    data_radians_1 = np.pi*data_degrees_1/180;

    data_radians_2 = np.pi*data_degrees_2/180;

    ```


    We then compute the lengths of the resultant vectors,


    ```

    x_1 = np.sum(np.sin(data_radians_1))

    y_1 = np.sum(np.cos(data_radians_1))

    x_2 = np.sum(np.sin(data_radians_2))

    y_2 = np.sum(np.cos(data_radians_2))


    mean_radians_1 = np.arctan(x_1/y_1)

    mean_degrees_1 = 180*mean_radians_1/np.pi

    ```'
