    \ that we can reject the null hypothesis, and there is therefore no correlation.\n\
    \nAs alternatives to detecting outliers, *resampling schemes* and *surrogates*\
    \ (e.g., the *bootstrap* or *jackknife* methods) represent powerful tools for\
    \ assessing the statistical significance of the results. These techniques are\
    \ particularly useful when scanning large multivariate data sets for outliers\
    \ (see Chap. 9). Resampling schemes repeatedly resample the original data set\
    \ of *n* data points either by choosing *n*−1 subsamples *n* times (the jackknife)\
    \ or by choosing an arbitrary set of subsamples with *n* data points *with replacement*\
    \ (the bootstrap). The statistics of these subsamples provide better information\
    \ on the characteristics of the population than do the statistical parameters\
    \ (mean, standard deviation, correlation coefficients) computed from the full\
    \ data set. This code allows for resampling our bivariate data set, including\
    \ the outlier (*x*,*y*)=(20,20):\n\n```\nind = np.linspace(0,30,31,\n    dtype=int)\n\
