    \ the unevenly spaced data at the grid points specified by XI and YI:\n\n```\n\
    ZI = interpolate.griddata(data[:,0:2],data[:,2],(XI,YI),\n    method='bicubic')\n\
    ```\n\nThe simplest way of displaying the gridding results is as a contour plot\
    \ using contour(). By default, the number and the values of the contour levels\
