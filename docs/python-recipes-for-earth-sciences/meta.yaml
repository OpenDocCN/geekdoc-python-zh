    正如 Hattingh (1988) 所示，可以通过使用主输入 $S$ 作为期望响应 $d$ 来滤波参考输入 $X$，从而提取出所需的无噪声信号。最小误差优化问题通过最小均方范数求解。均方误差
    $e_i^2$ 是非递归滤波器中权重的二阶函数。$e_i^2$ 对未知权重 $W$ 的依赖性可以看作是一个具有唯一确定最小点的多维抛物面。对应于该误差曲面上最小点的权重定义了最优维纳解
    (Wiener 1949)。使用 LMS 算法为权重数组 $W$ 计算出的值代表一个估计器，其期望值随着迭代次数趋近于无穷大而逼近维纳解 (Haykin 1991)。梯度方法用于到达误差曲面上的最小点。为了简化优化问题，Widrow
    和 Hoff (1960) 开发了一种可以直接从数据计算所需梯度函数的近似方法。这导致了一个用于更新滤波器权重数组 $W$ 的简单关系：


    $W_{i+1} = W_i + 2 \cdot u \cdot e_i \cdot X_i$


    新的滤波器权重集 $W_{i+1}$ 基于前一个权重集 $W_i$ 加上一项，该项是有界步长（或收敛因子）$u$、输入状态 $X_i$ 的函数以及误差 $e_i$
    的函数的乘积。换句话说，从前一步计算出的误差 $e_i$ 被反馈到系统中，以便为下一步更新滤波器系数（图 6.6）。固定的收敛因子 $u$ 调节着自适应的速度和稳定性。较低的
    $u$ 值确保更高的精度，但需要更多数据才能使滤波器达到最优解。在 Hattingh (1988) 的 LMS 算法改进版本中，通过循环处理数据克服了这个问题，使得滤波器有机会再次改进其系数并适应数据的变化。


    在下面介绍 `canc()` 的示例中，每次循环运行称为一次迭代，要达到最佳结果需要多次循环运行。该算法从两个数组 `x` 和 `s` 中提取无噪声信号，这两个数组包含相关信号和不相关噪声。例如，我们生成两个信号
    `yn1` 和 `yn2`，它们包含相同的正弦波但不同的高斯噪声：


    ```

    %reset -f


    import numpy as np

    from numpy import linalg as linalg

    from canc import canc

    from matplotlib import cm

    import scipy.signal as signal

    ```


    ![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_255_0.png)


    图 6.6 自适应滤波器示意图。每次迭代都涉及基于前一组滤波器权重 $W_i$ 加上一项（该项是有界步长 $u$、滤波器输入 $X_i$ 的函数以及误差 $e_i$
    的函数的乘积）对滤波器权重 $W_{i+1}$ 的新估计。换句话说，前一步计算出的误差 $e_i$ 被反馈到系统中，以便为下一步更新滤波器系数（修改自 Trauth
    1998）。


    ```python

    import matplotlib.pyplot as plt

    from numpy.random import default_rng


    x = np.linspace(0,100,1001)

    y = np.sin(x)

    rng = default_rng(0)

    yn1 = y + 0.5*rng.standard_normal(y.shape)

    yn2 = y + 0.5*rng.standard_normal(y.shape)


    plt.figure()

    plt.plot(x,yn1,x,yn2)

    plt.show()

    ```


    算法 `canc()` 格式化两个信号，将它们馈入滤波器循环，校正信号的相位偏移，并格式化信号以供输出。所需的输入是信号 `x` 和 `s`、步长 `u`、滤波器长度
    `l` 和迭代次数 `iter`。在我们的示例中，两个带噪信号是 `yn1` 和 `yn2`。我们任意选择一个具有 `l=5` 个滤波器权重的滤波器。$0<u<1/\lambda_{max}$（其中
    $\lambda_{max}$ 是参考输入自相关矩阵的最大特征值）范围内的 `u` 值会产生合理的结果 (Haykin 1991)（图 6.7）。`u` 的值使用以下代码计算：


    ```python

    k = np.kron(yn1,np.transpose(yn1[None]))

    w,v = linalg.eig(k)

    u = 1/np.max(w)

    print(u)

    ```


    ![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_256_0.png)


    图 6.7 自适应滤波器的输出。a 被不相关噪声污染的重复记录被馈入具有 5 个权重和收敛因子 0.0019 的自适应滤波器。经过 20 次迭代后，滤波器产生
    b 学习曲线，c 无噪声记录，以及 d 从重复记录中提取的噪声。


    其中 `kron()` 返回 `yn1` 和 `yn1''` 的克罗内克张量积（这是一个通过取 `yn1` 和 `yn1''` 元素之间所有可能乘积形成的矩阵），`eig()`
    返回 `k` 的特征向量。这得出


    ```

    0.0013492697467229055

    ```


    我们现在使用上面的 `u` 值，对自适应滤波器 `canc()` 运行 20 次迭代：


    ```python

    z,e,mer,w = canc(yn1,yn2,0.0013,5,20)

    ```


    `canc()` 的输出变量是滤波后的主信号 `z`、提取的噪声 `e`、以步长 `u` 执行的迭代次数的均方误差 `mer`，以及 `yn1` 和 `yn2`
    中每个数据点的滤波器权重 `w`。均方误差 `mer` 的图


    ```python

    plt.figure()

    plt.plot(mer)

    plt.show()

    ```


    说明了自适应滤波器的性能，尽管选择的步长（`u=0.0013`）显然导致了相对较快的收敛。在大多数示例中，较小的步长会降低收敛速度，但会提高最终结果的质量。因此，我们减小
    `u` 并使用更多迭代次数再次运行滤波器：


    ```python

    z,e,mer,w = canc(yn1,yn2,0.0001,5,20)

    ```


    均方误差 `mer` 对迭代次数的图


    ```python

    plt.figure()

    plt.plot(mer)

    plt.show()

    ```


    现在在大约六次迭代后收敛。在实践中，用户应改变输入参数 `u` 和 `l` 以获得最佳结果。我们现在可以将滤波器输出与原始无噪声信号进行比较：


    ```python

    plt.figure()

    plt.plot(x,y,''b'',x,z,''r'')

    plt.show()

    ```


    该图表明信号的噪声水平已被滤波器显著降低。接下来，图


    ```python

    plt.figure()

    plt.plot(x,e,''r'')

    plt.show()

    ```


    显示从信号中提取的噪声。使用 `canc()` 的最后一个输出，我们可以计算并显示来自 `w` 的最终迭代的平均滤波器权重：


    ```python

    wmean = np.mean(w,axis=0)


    plt.figure()

    plt.plot(wmean)

    plt.show()

    ```


    滤波器的频率特性提供了滤波器效果的更直观表示，


    ```python

    f,h = signal.freqz(wmean,1,worN=1024,fs=1)


    plt.figure()

    plt.plot(f,np.abs(h))

    plt.show()

    ```


    这表明滤波器是一个具有相对平滑过渡带的低通滤波器。这意味着它不具备例如使用巴特沃斯方法设计的递归滤波器的品质。然而，滤波器权重是在优化过程中计算的，而不是任意选择的。


    自适应滤波器的优势在于其能够滤波沿时间轴具有可变信噪比的时间序列。由于滤波器权重数组 $W$ 针对每个单独的数据点进行更新，这些滤波器甚至用于实时应用，例如电信系统。我们通过一个示例来研究这种行为，其中时间序列中间（`x=500`）的信噪比从大约
    10% 降低到零：


    ```python

    x = np.linspace(0,100,1001)

    y = np.sin(x)

    rng = default_rng(0)

    yn1 = y + 0.5*rng.standard_normal(y.shape)

    yn2 = y + 0.5*rng.standard_normal(y.shape)

    yn1[501:] = y[501:]

    yn2[501:] = y[501:]


    plt.figure()

    plt.plot(x,yn1,x,yn2)

    plt.show()

    ```


    `u` 的值再次通过以下代码计算：


    ```python

    k = np.kron(yn1,np.transpose(yn1[None]))

    w,v = linalg.eig(k)

    u = 1 / np.max(w)

    print(u)

    ```


    得出


    ```

    0.0016086744408774288

    ```'
