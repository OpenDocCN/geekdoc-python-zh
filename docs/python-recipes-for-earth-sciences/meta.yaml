    plt.show()\n```\n\n频率选择性滤波器用于从数据中移除特定频带。例如，我们可以设计一个滤波器，抑制周期为 τ = 10 的信号部分，同时保持其他两个周期不受影响。此类滤波器对简单周期信号的影响也可用于预测自然滤波器的信号失真。\n\
    \n*阶跃函数*是另一种可用于探索滤波器特性的基本输入信号。阶跃函数描述了在特定时间从一个值向另一个值的过渡。函数 `stairs()` 绘制元素 x 的阶梯图。该函数需要边缘\
    \ e，我们从 t 计算得出：\n\n```python\nt = np.linspace(1,100,100)\nx = np.ones(100)\nx[51:100]\
    \ = np.zeros(49)\n\ne = np.zeros(101)\ne[0] = np.diff(t[0:2])/2\ne[1:101] = t+np.diff(t[0:2])/2\n\
    \nplt.figure()\nplt.stairs(x,e)\nplt.axis(np.array([0,100,-4,4]))\nplt.show()\n\
    ```\n\n该信号可用于研究滤波器对突然过渡的影响。突然的气候变化可以作为一个例子。大多数自然滤波器倾向于平滑这种过渡，并将其分布在更长的时间段内。\n\n\
    *单位脉冲*是我们在以下示例中使用的第三种重要信号类型。该信号在所有时间点都等于零，除了在单个数据点处等于一。函数 `stem()` 使用圆圈表示数据值，将数据序列\
    \ x 绘制为从 *t* 轴发出的茎图："
