  md: '(e.g., a normal distribution with its mean and variance). For theoretical reasons,
    only functions with certain properties should be used as variogram models. Common
    *authorized models* are the spherical model, the exponential model, and the linear
    model (more models can be found in the relevant published literature),


    Spherical model:


    ```

    $$\gamma_{sph}(h) = \begin{cases} c \cdot \left(1.5 \cdot \frac{h}{a} - 0.5 \left(\frac{h}{a}\right)^3\right),
    & \text{for } 0 \le h \le a \ c, & \text{for } h > a \end{cases}$$

    ```


    Exponential model:


    ```

    $$\gamma_{exp}(h) = c \cdot \left(1 - \exp\left(-3 \cdot \frac{h}{a}\right)\right)$$

    ```


    Linear model:


    ```

    $$\gamma_{lin}(h) = b \cdot h$$

    ```


    where $c$ is the sill, $a$ is the range, and $b$ is the slope (for a linear model).
    The parameters $c$ and either $a$ or $b$ must be modified if a variogram model
    is fitted to the variogram estimator.


    The *nugget effect* is a special type of variogram model. In practice, when extrapolating
    the variogram toward a separation distance of zero, we often observe a positive
    intercept on the $y$-axis. This is called the nugget effect and is explained by
    measurement errors as well as by small-scale fluctuations (*nuggets*) that are
    not captured due to overly large sampling intervals. We sometimes have expectations
    about the minimum nugget effect from the variance of repeated measurements in
    the laboratory or from other prior knowledge. More details concerning the nugget
    effect can be found in Cressie (1990, 1993) and in Kitanidis (1997). If there
    is a nugget effect, it can be added to the variogram model. An exponential model
    with a nugget effect looks like this:


    ```

    $$\gamma_{exp+nug}(h) = c_0 + c \cdot \left(1 - \exp\left(-3 \cdot \frac{h}{a}\right)\right)$$

    ```


    where $c_0$ is the nugget effect.


    We can even combine variogram models (e.g., two spherical models with different
    ranges and sills). These combinations are called *nested models*. During variogram
    modeling, the components of a nested model are regarded as spatial structures
    that should be interpreted as the result of geological processes. Before we discuss
    further aspects of variogram modeling, we first fit some models to our data. We
    begin with a spherical model with no nugget effect and then add an exponential
    model and a linear model, both with nugget variances:'
