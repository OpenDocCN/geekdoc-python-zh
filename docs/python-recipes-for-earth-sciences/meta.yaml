    \n## 8.4 导入、处理和导出Landsat图像\n\nLandsat项目是一个卫星遥感计划，由美国国家航空航天局（NASA）和美国地质调查局（USGS）共同管理。该项目始于1972年7月23日Landsat\
    \ 1卫星（最初称为地球资源技术卫星1号）的发射。根据该计划的网站，该系列卫星的最新成员是Landsat 9卫星，于2021年9月27日发射。该卫星有两个传感器：业务陆地成像仪（OLI）和热红外传感器（TIRS）。这两个传感器提供全球陆地的覆盖，空间分辨率为30米（可见光、近红外、短波红外）、100米（热红外）和15米（全色）（Ochs等人，2009；Irons等人，2011）。有关Landsat计划的一般信息可从以下网站获取：\n\
    \nhttp://landsat.gsfc.nasa.gov/\n\nLandsat数据——连同其他NASA卫星的数据——可从以下网站获取：\n\nhttps://earthexplorer.usgs.gov\n\
    \n在该网站上，我们首先在*搜索条件*中选择所需的地图区域，可以通过输入地图四个角的坐标，或者放大到感兴趣的区域并选择*使用地图*。例如，我们输入坐标4°42′40.72″N\
    \ 36°51′10.47″E，该坐标位于埃塞俄比亚南部裂谷的Chew Bahir盆地中心。然后，我们从*Landsat存档*中选择*L8 OLI/TIRS*作为*数据集*，并点击*结果*，这将生成一个记录列表以及用于预览和下载数据的工具栏。通过点击*显示浏览叠加层*按钮，我们可以检查图像的云量。然后我们找到无云图像\n\
    \n实体ID：LC81690572013358LGN00\n坐标：4.33915,36.76225\n获取日期：2013年12月24日\n路径：169\n\
    行：57\n\n该图像拍摄于2013年12月24日。我们需要在美国地质调查局网站上注册、登录，并下载1级GeoTIFF数据产品（897.5 MB），然后将其存储在文件*LC81690572013358LGN00.tar.gz*中。*.tar.gz*存档包含每个波段的单独文件以及一个包含数据信息的元数据文件。我们使用波段4（红色；640至670纳米）、波段3（绿色；530至590纳米）和波段2（蓝色；450至510纳米），每个波段的分辨率为30米。我们可以使用以下命令导入118.4\
    \ MB的TIFF文件\n\n```\n%reset -f\n\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\nfrom skimage import exposure\nfrom skimage import io\nfrom skimage import\
    \ filters\n\nI1 = io.imread('LC81690572013358LGN00_B2.TIF')\nI2 = io.imread('LC81690572013358LGN00_B3.TIF')\n\
    I3 = io.imread('LC81690572013358LGN00_B4.TIF')\n```\n\n输入\n\n```\nnp.who()\n```\n\
    \n显示数据为无符号16位uint16格式，即数据值的最大范围在0到2^16-1 = 65,535之间：\n\n| 名称 | 形状 | 字节数 | 类型 |\n\
    | :--- | :--- | :--- | :--- |\n| I1 | 7771 x 7611 | 118290162 | uint16 |\n| I2\
    \ | 7771 x 7611 | 118290162 | uint16 |\n| I3 | 7771 x 7611 | 118290162 | uint16\
    \ |\n| 总字节数上限 | = | 354870486 | |\n\n对于定量分析，这些数字值（DN）需要转换为辐亮度和反射率值，这超出了本书的范围。辐亮度是从地球特定方向散射的功率密度，以瓦特每平方米每球面度（Wm^-2\
    \ sr^-1）为单位表示（Richards，2013）。辐亮度值需要进行大气和地形效应校正，以获得地球表面反射率百分比。Landsat 8手册提供了有关这些转换的必要信息：\n\
    \nhttps://www.usgs.gov/media/files/landsat-8-data-users-handbook"
