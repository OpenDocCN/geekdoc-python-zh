  md: '![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_206_0.png)


    in a predictable manner. In 1963, Edward Lorenz introduced a simple three-dimensional
    model for describing the chaotic behavior exhibited by turbulence in the atmosphere.
    The variables that define the Lorenz system are the intensity of atmospheric convection,
    the temperature difference between ascending and descending currents, and the
    distortion of the vertical temperature profiles from linearity. Small variations
    in the initial conditions can cause dramatically divergent weather patterns—a
    behavior often referred to as the *butterfly effect*. The dynamics of the Lorenz
    system are described by three coupled nonlinear differential equations:


    ```

    $$\frac{dx}{dt} = s(y(t) - x(t))$$


    $$\frac{dy}{dt} = -x(t)z(t) + rx(t) - y(t)$$


    $$\frac{dz}{dt} = x(t)y(t) - bz(t)$$

    ```


    Integrating the differential equations yields a simple Python code for computing
    the *xyz* triplets of the Lorenz system. We use s=10, r=28, and b=8/3 as system
    parameters for controlling the chaotic behavior, and the time delay is dt=0.01.
    The initial values for the position vectors are x1=8, x2=9, and x3=25. However,
    these values can be changed to any other values, which of course then also changes
    the behavior of the system:


    ```

    dt = .01

    s = 10

    r = 28

    ```'
