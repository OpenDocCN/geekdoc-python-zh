    We can again apply the filter to the signal by using lfilter(). Frequency-selective
    filters such as lowpass, highpass, bandpass, and bandstop filters are designed
    to suppress certain frequency bands, but phase shifts should be avoided. The function
    filtfilt() provides zero-phase-shift forward and reverse digital filtering. After
    filtering in the forward direction, the filtered sequence is reversed and runs
    back through the filter. The magnitude of the signal is not affected by this operation
    since it is either 0% or 100% of the initial amplitude depending on the frequency.
