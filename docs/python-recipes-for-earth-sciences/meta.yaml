    \ we are sometimes able to observe different ranges (*geometric anisotropy*),\
    \ different scales (*zonal anisotropy*), and different shapes (which indicate\
    \ a trend). Treating anisotropy requires a highly interactive graphical user interface,\
    \ which lies beyond the scope of this book (see the VarioWin software by Panatier\
    \ 1996).\n- *Number of pairs and the lag interval* – When calculating the classic\
    \ variogram estimator, more than 30 pairs of points (and ideally, more than 50)\
