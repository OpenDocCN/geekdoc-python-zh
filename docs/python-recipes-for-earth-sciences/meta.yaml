  md: "where\n\n$C = data' \\cdot data$\n\nwhich is equivalent to\n\n$(C - D \\cdot\
    \ E) \\cdot V = 0$\n\nwhere $E$ is the identity matrix, which is a classic eigenvalue\
    \ problem: It is a linear system of equations, and the eigenvectors $V$ are the\
    \ solution. We must first mean center the data, which involves subtracting the\
    \ univariate means from the two columns (i.e., the two variables of data). In\
    \ the following steps, we therefore study the deviations from the mean(s) only:\n\
    \n```\ndata[:,0] = data[:,0]-np.mean(data[:,0]);\ndata[:,1] = data[:,1]-np.mean(data[:,1]);\n\
    ```\n\nWe next calculate the covariance matrix $C$ of data. The covariance matrix\
    \ contains all the information required to rotate the coordinate system,\n\n```\n\
    C = np.cov(data[:,0],data[:,1])\nprint(C)\n```\n\nwhich yields\n\n```\n[[0.92061706\
    \ 1.00801248]\n [1.00801248 1.14192816]]\n```\n\nThe rotation helps to create\
    \ new variables that are uncorrelated (i.e., the covariance is zero for all pairs\
    \ of the new variables). The decorrelation is achieved by diagonalizing the covariance\
    \ matrix $C$. The eigenvectors $V$ that belong to the diagonalized covariance\
    \ matrix are a linear combination of the old base vectors and thus express the\
    \ correlation between the old and the new time series. We find the eigenvalues\
    \ of the covariance matrix $C$ by solving the equation\n\n$det(C - D \\cdot E)\
    \ = 0$\n\nThe eigenvalues $D$ of the covariance matrix (i.e., the diagonalized\
    \ version of $C$) yield the variance within the new coordinate axes (i.e., the\
    \ principal components). We now calculate the eigenvectors $V$ and eigenvalues\
    \ $D$ of the covariance matrix $C$,\n\n```\nD,V = linalg.eig(C)\nprint(V)\nprint(D)\n\
    ```\n\nwhich yields"
