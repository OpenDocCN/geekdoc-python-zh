    # 4.8 Reduced Major Axis Regression


    In some examples, neither variable is manipulated, and both can therefore be considered
    to be independent. In such cases, several methods are available for computing
    a best-fit line that minimizes the distance from both x and y. As an example,
    the method of reduced major axis (RMA) minimizes the triangular area 0.5·(ΔxΔy)
    between the data points and the regression line, where Δx and Δy are the distances
    between the predicted values and the true values of x and y (Fig. 4.4). Although
    this optimization appears to be complex, it can be shown that the first regression
    coefficient b₁ (the slope) is simply the ratio of the standard deviations of y
    and x:


    $$b_1 = s_y/s_x$$


    As with classical regression, the regression line passes through the data centroid,
    which is defined by the sample mean. We can therefore compute the second regression
    coefficient b₀ (i.e., the y-intercept)


    $$b_0 = \bar{y} - b_1\bar{x}$$


    using the univariate sample means and the slope b₁ computed earlier. Let us again
    load the age-depth data from the file agedepth_1.txt and define two variables,
    meters and age. It is assumed that both the variables contain errors and that
    the scatter of the data can be explained by dispersions of meters and age:'
