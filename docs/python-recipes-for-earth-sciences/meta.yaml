    # 6.4 Convolution, Deconvolution, and Filtering


    Convolution is a mathematical description of a system transformation. Filtering
    is an application of the convolution process. A running mean of length five provides
    an example of such a simple filter. The output of an arbitrary input signal is


    $$y(t) = \frac{1}{5} \sum_{k=-2}^{2} x(t-k)$$


    The output $y(t)$ is simply the average of the five input values $x(t-2)$, $x(t-1)$,
    $x(t)$, $x(t+1)$, and $x(t+2)$. In other words, all five consecutive input values
    are multiplied by a factor of 1/5 and summed to form $y(t)$. In this example,
    all input values are multiplied by the same factor, that is, they are equally
    weighted. The five factors used in the operation above are therefore called filter
    weights $b_k$. The filter can be represented by the array


    ```

