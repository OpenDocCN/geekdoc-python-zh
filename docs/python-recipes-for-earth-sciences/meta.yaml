    \ 9.  1.]\n [ 1.  0.  8.]\n [ 8.  9. 10.]\n [ 8.  5.  8.]\n [ 1.  6.  1.]\n [\
    \ 9.  5.  4.]]\n```\n\nIn this embedded for loop, the second loop is indented\
    \ using four spaces, and its associated block of code is again indented, which\
    \ therefore requires double indentation (i.e., eight spaces).\n\nThis book aims\
