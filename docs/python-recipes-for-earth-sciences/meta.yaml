- md: "Using the F-statistic, we find that for 1 and 400–2=398 degrees of freedom\
    \ and α=0.05, the critical value is\n\n```\nFcrit = stats.f.ppf(1-0.05,1,n-2)\n\
    print(Fcrit)\n```\n\nwhich yields\n\n```\n3.8649292212017365\n```\n\nwhich is\
    \ well below the observed value of F=89.6054 (Sect. 3.8). We can therefore reject\
    \ the null hypothesis and conclude that the two samples could not have been drawn\
    \ from populations with the same mean direction.\n\n## 10.8 Graphical Representation\
    \ of Spherical Data\n\nThere are many ways to display spherical data. However,\
    \ since we always present data in two dimensions (i.e., either on a sheet of paper\
    \ or on a computer screen), we need to convert them to one of many available projections.\
    \ Python does not offer many functions for displaying or processing spherical\
    \ data, especially not in a form commonly used in the geosciences. The only exception\
    \ lies with functions such as those used to display geographic data on a globe,\
    \ some of which we use here.\n\nWe begin by using synthetic data for longitude\
    \ lon and latitude lat, which are calculated using vmises(). We first reset the\
    \ random number generator using random.seed(0) and define the sample size n. We\
    \ then define the mean of the lon and lat values in degrees, convert both values\
    \ to radians, define the concentration parameter kappa, and use vmises() (which\
    \ is included in the electronic supplement of this book) to calculate n=100 values\
    \ for lon and lat. Finally, we convert the lon and lat values to degrees:\n\n\
    ```\n%reset -f\n\nimport numpy as np\nfrom vmises import vmises\nimport scipy.stats\
    \ as stats\nimport matplotlib.pyplot as plt\nfrom numpy.random import default_rng\n\
    \nn = 100;\nnp.random.seed(0)\nmu_lon_degrees = 10\nmu_lat_degrees = 35\nmu_lon_radians\
    \ = np.pi*mu_lon_degrees/180\nmu_lat_radians = np.pi*mu_lat_degrees/180\nkappa_lon\
    \ = 10\nkappa_lat = 10\nlon_radians = vmises(n,mu_lon_radians,kappa_lon)\nlat_radians\
    \ = vmises(n,mu_lat_radians,kappa_lat)\nlon = 180*lon_radians/np.pi\nlat = 180*lat_radians/np.pi\n\
    ```\n\nNext, we calculate the data density c with gaussian_kde():\n\n```\nc =\
    \ stats.gaussian_kde([lon,lat])\n```\n\nWe then calculate the grid coordinates\
    \ grid_coords and a color value zc for each data point (lon,lat) according to\
    \ the kernel density c:\n\n```\ngrid_coords = np.append(lon.reshape(-1,1), lat.reshape(-1,1),axis=1)\n\
    zc = 256*c(grid_coords.T) / np.max(c(grid_coords.T))\n```\n\nWe subsequently display\
    \ the data points in a geographic density plot with axes that use a Lambert projection\
    \ (Fig. 10.6):\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_458_0.png)\n\nFig.\
    \ 10.6 Display of spherical data using the lambert map projection with subplot().\n\
    \n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_459_0.png)\n\nFig. 10.7 Display of\
    \ spherical data using the mollweide map projection with subplot().\n\n```\nplt.figure()\n\
    ax = plt.subplot(projection='lambert')\nax.scatter(lon_radians,lat_radians,c=zc)\n\
    ax.grid()\nplt.show()\n```\n\nAlternatively, we can also use a *Mollweide* projection\
    \ (Fig. 10.7):\n\n```\nplt.figure()\nax = plt.subplot(projection='mollweide')\n\
    ax.scatter(lon_radians,lat_radians,c=zc)\nax.grid()\nplt.show()\n```\n\nFinally,\
    \ we display the data in a rectilinear coordinate system (Fig. 10.8):\n\n```\n\
    plt.figure()\nplt.scatter(lon,lat,c=zc)\nplt.show()\n```\n\nThis simple method\
    \ of presentation might be the preferred option in some applications.\n\n## 10.9\
    \ Statistics of Spherical Data\n\nThe statistical analysis of spherical data is\
    \ a vast topic. Since Python offers very little support for analyzing this type\
    \ of data, we remain very brief here. More detailed articles on this topic can\
    \ be found in the books by Mardia and Jupp (1999) and by Borradaile (2003). The\
    \ following section demonstrates how to calculate the mean, the standard deviation,\
    \ and the standard distance of geographic points. It also introduces a Python\
    \ function for calculating a frequency distribution for geographic points using\
    \ equirectangular bins.\n\nFig. 10.8 Three-dimensional histogram using bar3d()\
    \ to show the frequency distribution of geographic data using colors that correspond\
