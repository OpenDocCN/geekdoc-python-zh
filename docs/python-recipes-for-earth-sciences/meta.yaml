- md: "## 5.4 Examples of Auto-Spectral and Cross-Spectral Analysis\n\nThe autocovariance\
    \ series clearly depends on the amplitude of $x(t)$. Normalizing the covariance\
    \ by the variance $s^2$ of $x(t)$ yields the autocorrelation sequence. Autocorrelation\
    \ involves correlating a series of data with itself as a function of a time lag\
    \ $k$:\n\n$$cov_{xx}(k) = \\frac{1}{n-k-1} \\sum_{t=1}^{n-k} (x_i - \\bar{x})(x_{i+k}\
    \ - \\bar{x})$$\n\n$$corr_{xx}(k) = \\frac{cov_{xx}(k)}{cov_{xx}(0)} = \\frac{cov_{xx}(k)}{s_x^2}$$\n\
    \nA popular method used to compute power spectra in the earth sciences is that\
    \ introduced by Blackman and Tukey (1958). The *Blackman–Tukey method* uses the\
    \ complex Fourier transform $X_{xx}(f)$ of the autocorrelation sequence $corr_{xx}(k)$,\n\
    \n$$X_{xx}(f) = \\sum_{k=0}^{m} corr_{xx}(k)e^{i2\\pi fk/f_s}$$\n\nwhere $m$ is\
    \ the maximum lag and $f_s$ is the sampling frequency. The Blackman–Tukey auto-spectrum\
    \ is the absolute value of the Fourier transform of the autocorrelation series.\
    \ In some fields, the *power spectral density* is used as an alternative way of\
    \ describing the auto-spectrum. The Blackman–Tukey power spectral density $PSD$\
    \ is calculated by\n\n$$PSD = \\frac{X_{xx}^*(f)X_{xx}(f)}{f_s} = \\frac{|X_{xx}(f)|^2}{f_s}$$\n\
    \nwhere $X_{xx}^*(f)$ is the conjugate complex of the Fourier transform of the\
    \ autocorrelation series $X_{xx}(f)$ and $f_s$ is the sampling frequency. The\
    \ actual computation of the power spectrum can only be performed at a finite number\
    \ of different frequencies by employing a *Fast Fourier Transform (FFT)*. The\
    \ FFT is a method of computing a discrete Fourier transform with reduced execution\
    \ time. Most FFT algorithms divide the transform into two portions each of size\
    \ $n/2$ at each step of the transformation. The transform is therefore limited\
    \ to blocks with dimensions equal to a power of two. In practice, the spectrum\
    \ is computed using a number of frequencies that is close to the number of data\
    \ points in the original signal $x(t)$.\n\nThe discrete Fourier transform is an\
    \ approximation of the continuous Fourier transform. The continuous Fourier transform\
    \ assumes an infinite signal, but discrete real data are limited at both ends,\
    \ that is, the signal amplitude is zero beyond either end of the time series.\
    \ In the time domain, a finite signal corresponds to an infinite signal multiplied\
    \ by a rectangular window that has a value of one within the limits of the signal\
    \ and a value of zero elsewhere. In the frequency domain, multiplying the time\
    \ series by this window is equivalent to a convolution of the power spectrum of\
    \ the signal with the spectrum of the rectangular window (see Sect. 6.4 for a\
    \ definition of convolution). However, the spectrum of the window is a $\\sin(x)/x$\
    \ function, which has a main lobe and numerous side lobes on either side of the\
    \ main peak. As a result, all maxima in a power spectrum *leak*, that is, they\
    \ lose power on either side of the peaks (Fig. 5.4).\n\nA popular way of overcoming\
    \ the problem of *spectral leakage* is by *windowing*, in which the sequence of\
    \ data is simply multiplied by a smooth bell-shaped curve with positive values.\
    \ Several window shapes are available, such as *Bartlett* (triangular), *Hamming*\
    \ (cosinusoidal), and *Hanning* (slightly different cosinusoidal) (Fig. 5.4).\
    \ The use of these windows slightly modifies the equation for the Blackman–Tukey\
    \ auto-spectrum to\n\n$$X_{xx}(f) = \\sum_{k=0}^{m} corr_{xx}(k)w(k)e^{i2\\pi\
    \ fk/f_s}$$\n\nwhere $w(k)$ is the windowing function. The Blackman–Tukey method\
    \ therefore performs auto-spectral analysis in three steps: 1) calculating the\
    \ autocorrelation sequence $corr_{xx}(k)$, 2) windowing, and finally, 3) computing\
    \ the discrete Fourier transform. Python allows power spectral analysis to be\
    \ performed with a number of modifications to the method described above. One\
    \ useful modification is the *Welch method* (Welch 1967) (Fig. 5.5), which involves\
    \ dividing the time series into overlapping segments, computing the power spectrum\
    \ for each segment, and then averaging the power spectra. The advantage of averaging\
    \ the spectra is obvious: It simply improves the signal-to-noise ratio of a spectrum.\
    \ The disadvantage is the loss of resolution in the spectra.\n\nCross-spectral\
    \ analysis correlates two time series in the frequency domain. The cross-covariance\
    \ is a measure of the variance between two signals over a time lag $k$. The cross-covariance\
    \ $cov_{xy}$ of two signals $x(t)$ and $y(t)$ with $n$ data points sampled at\
    \ constant time intervals $\\Delta t$ is\n\n$$cov_{xy}(k) = \\frac{1}{n-k-1} \\\
    sum_{t=1}^{n-k} (x_i - \\bar{x})(y_{i+k} - \\bar{y})$$\n\nThe cross-covariance\
    \ series again depends on the amplitudes of $x(t)$ and $y(t)$. Normalizing the\
    \ covariance by the standard deviations of $x(t)$ and $y(t)$ yields the cross-correlation\
    \ sequence:\n\n$$corr_{xy}(k) = \\frac{cov_{xy}(k)}{cov_{xy}(0)} = \\frac{cov_{xy}(k)}{s_x\
    \ s_y}$$\n\nThe Blackman–Tukey method uses the complex Fourier transform $X_{xy}(f)$\
    \ of the cross-correlation sequence $corr_{xy}(k)$,\n\n$$X_{xy}(f) = \\sum_{k=0}^{m}\
    \ corr_{xy}(k)e^{i2\\pi fk/f_s}$$\n\nwhere $m$ is the maximum lag and $f_s$ is\
    \ the sampling frequency. The absolute value of the complex Fourier transform\
    \ $X_{xy}(f)$ is the cross-spectrum, while the angle of $X_{xy}(f)$ represents\
    \ the phase spectrum. The phase difference is important in calculating leads and\
    \ lags between two signals, which is a measure often used to propose causalities\
    \ between two processes that have been documented by the signals. The correlation\
    \ between two spectra can be calculated by means of the coherence:\n\n$$C_{xy}\
    \ = \\frac{|X_{xy}(f)|^2}{X_{xx}(f)X_{yy}(f)}$$\n\nThe coherence is a real number\
    \ between 0 and 1, where 0 indicates no correlation and 1 indicates maximum correlation\
    \ between $x(t)$ and $y(t)$ at frequency $f$. A certain degree of coherence is\
    \ an important precondition for computing phase shifts between two signals.\n\n\
    The *SciPy* package provides numerous methods for spectrally analyzing time series.\
    \ As an example, `periodogram()` computes the power spectral density Pxx of a\
    \ time series x(t) using the periodogram method. This method was invented by Arthur\
    \ Schuster in 1898 and calculates the power spectrum by performing a Fourier transform\
    \ directly on a sequence without requiring prior calculation of the autocorrelation\
    \ sequence. At the time of its introduction in 1958, indirectly computing the\
    \ power spectrum via an autocorrelation sequence was faster than directly calculating\
    \ the Fourier transformation for the full data series x(t). After the introduction\
    \ both of the Fast Fourier Transform (FFT) by Cooley and Tukey (1965) and of subsequent\
    \ faster computer hardware, the higher computing speed of the Blackman–Tukey approach\
    \ compared with the periodogram method became relatively unimportant.\n\nFor this\
    \ next example, we again use the synthetic time series x, xns, and xt generated\
    \ in Sect. 5.2 as the input data:\n\n```python\n%reset -f\n\nimport numpy as np\n\
    import matplotlib.pyplot as plt\nfrom scipy import signal\n```\n\n```python\n\
    t = np.linspace(1,1000,1000)\nt = np.transpose(t)\nx = 2*np.sin(2*np.pi*t/50)\
    \ + \\\n    np.sin(2*np.pi*t/15) + \\\n    0.5*np.sin(2*np.pi*t/5)\n\nnp.random.seed(0)\n\
    ns = np.random.randn(1000)\nxns = x + ns\n\nxt = x + 0.005*t\n```\n\nWe then compute\
    \ the periodogram by calculating the Fourier transform of the sequence x. The\
    \ fastest possible Fourier transform using `fft.rfft()` computes the Fourier transform\
    \ for nfft frequencies, where nfft is the next power of two that is closest to\
    \ the number of data points n in the original signal x. Since the length of the\
    \ data series is n=1000, the Fourier transform is computed for nfft=1024 frequencies,\
    \ while the signal is padded with nfft-n=24 zeros:\n\n```python\nXxx = np.fft.rfft(x,1024)\n\
    ```\n\nIf x is real (as in our example), then Xxx is symmetric, with the first\
    \ (1+nfft/2) values in Xxx being unique and all other values being symmetrically\
    \ redundant. The power spectral density is defined as Pxx2=np.abs(Xxx)**2/Fs,\
    \ where Fs is the sampling frequency. The function `periodogram()` also scales\
    \ the power spectral density by the length of the data series, that is, it divides\
    \ by Fs=1 and len(x)=1000.\n\n```python\nPxx2 = np.abs(Xxx)**2/1000\n```\n\nWe\
    \ now drop the redundant part of the power spectrum and use only the first (1+nfft/2)\
    \ points. We also multiply the power spectral density by two in order to keep\
    \ the same energy as in the symmetric spectrum except for the first data point:\n\
    \n```python\nPxx = np.hstack((Pxx2[0],2*Pxx2[1:512]))\n```\n\nThe corresponding\
