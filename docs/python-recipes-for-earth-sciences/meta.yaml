    The variogram in Fig. 7.21 exhibits a typical pattern. Values are low at small
    separation distances (near the origin) and then increase with increasing distance
    until reaching a plateau (*sill*) that is close to the population variance. This
    indicates that the spatial process is correlated over short distances but not
    over longer distances. The extent of the spatial dependency is called the *range*
    and is defined as the separation distance at which the variogram reaches the sill.


    The *variogram model* is a parametric curve fitted to the variogram estimator.
    This is similar to frequency distribution fitting (see Sect. 3.5), in which the
