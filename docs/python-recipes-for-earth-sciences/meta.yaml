    \ (Sects. 4.5 and 4.6). The influence of the neighboring observations on the estimation\
    \ depends on their configuration, as summarized by Webster and Oliver (2007):\
    \ “Near points carry more weight than more distant ones; the relative weight of\
    \ a point decreases when the number of points in the neighborhood increases; clustered\
    \ points carry less weight individually than isolated ones at the same distance;\
    \ data points can be screened by ones lying between them and the target.” The\
    \ sampling design for kriging is different from the design that might be optimal\
    \ for variography. A regular grid (be it triangular or quadratic) can be regarded\
    \ as optimal.\n\nThe Python code presented here is a straightforward implementation\
