    **Fig. 5.29** Recurrence plot of the Lorenz system using a threshold of $\varepsilon
    = 2$. The regions with regular diagonal lines reveal unstable periodic orbits,
    which are typical of chaotic systems.


    This recurrence plot reveals many short diagonal lines (Fig. 5.29), which represent
    periods of time during which the phase space trajectory runs parallel to earlier
    or later sequences in this trajectory, that is, periods of time during which the
    states and dynamics are similar. The distances between these diagonal lines represent
    the periods of the cycles, which—in contrast to the periods of a harmonic oscillation—vary
    and are not constant (Fig. 5.24).


    # ## Recurrence Quantification


    The structure of recurrence plots can also be described by a suite of quantitative
    measures in a *recurrence quantification analysis* (RQA). Several measures are
    based on the distribution of the lengths of diagonal or vertical lines as well
    as on the *local proximity configuration*. These measures can be used to trace
    hidden transitions within a dynamical process. As an example, we next consider
    two measures: the recurrence rate and the transitivity coefficient. The *recurrence
    rate* is the density of points in the recurrence plot and corresponds to the recurrence
    probability of the system. The *transitivity coefficient* has its roots in graph
    theory and characterizes the regularity (or complexity) of the system.'
  - "[PAGE 216]\n\nFor our example, we consider a time series of normally distributed\
