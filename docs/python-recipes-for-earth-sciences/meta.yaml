    \n```\nt = np.linspace(0.1,20,200)\nt = np.transpose(t)\n\nelement1a = np.sin(2*np.pi*t/2)\
    \ + 5\nelement1b = np.sin(2*np.pi*t/5) + 5\nelement1c = 2*np.sin(2*np.pi*t/20)\
    \ + 5\n\nplt.figure()\nplt.plot(t,element1a,\n    color=colors[0,:])\nplt.plot(t,element1b,\n\
    \    color=colors[1,:])\nplt.plot(t,element1c,\n    color=colors[3,:])\nplt.legend(['1a','1b','1c'])\n\
    plt.title('Absolute amount of 1a-c (mg)')\nplt.show()\n```\n\n我们计算element1a、element1b和element1c的百分比（即，我们创建单个元素浓度与所有元素浓度总和的比率）。这个过程创建了闭合数据（即，数据现在表示为比例，并加到固定的100%总量）：element1a+element1b+element1c=100%。element1a和element1b现在都受到element1c稀释的影响。这些元素显示出一个主要的正弦长期趋势，但这并非真实情况（如第一幅图所示）：\n\
    \n```\nelement1a_perc = element1a/(element1a+element1b+element1c)\nelement1b_perc\
    \ = element1b/(element1a+element1b+element1c)\nelement1c_perc = element1c/(element1a+element1b+element1c)\n\
    \nplt.figure()\nplt.plot(t,element1a_perc,\n    color=colors[0,:])\nplt.plot(t,element1b_perc,\n\
    \    color=colors[1,:])\nplt.plot(t,element1c_perc,\n    color=colors[3,:])\n\
    plt.legend(['1a','1b','1c'])\nplt.title('Relative concentration 1a-c (%)')\nplt.show()\n\
    ```\n\n我们现在建立了element1a/element1b和element1b/element1a的比率，两者都独立于element1c。注意符号的变化和振幅的差异。element1a/element1b和element1b/element1a的比率没有显示出任何由element1c稀释效应引起的趋势证据。然而，这两条曲线并不相同（即，element1a/element1b和element1b/element1a不对称）（见Weltje\
    \ and Tjallingii 2008，第426页）：\n\n```\nratio12 = element1a_perc/element1b_perc\n\
    ratio21 = element1b_perc/element1a_perc\n\nplt.figure()\nax1 = plt.subplot()\n\
    ax2 = ax1.twinx()\nline1, = ax1.plot(t,ratio12,\n    color=colors[0,:],\n    label='1a/1b')\n\
    line2, = ax2.plot(t,ratio21,\n    color=colors[1,:],\n    label='1b/1a')\nax2.invert_yaxis()\n\
    plt.legend(handles=[line1,line2])\nplt.title('Ratios elements 1a/1b and 1b/1a')\n\
    plt.show()\n```\n\n我们现在根据Aitchison (1986, 2003)显示对数比率。对数比率log(element1a/element1b)和log(element1b/element1a)除了符号外是相同的。因此，例如，在对数据进行进一步统计分析时，使用log(element1a/element1b)还是log(element1b/element1a)没有区别：\n\
    \n```\nratio12log = np.log10(ratio12)\nratio21log = np.log10(ratio21)\n\nplt.figure()\n\
    ax1 = plt.subplot()\nax2 = ax1.twinx()\nline1, = ax1.plot(t,ratio12log,\n    color=colors[0,:],\n\
    \    label='log(1a/1b)')\nline2, = ax2.plot(t,ratio21log,\n    color=colors[1,:],\n\
    \    linestyle='--',\n    label='log(1b/1a)')\nax2.invert_yaxis()\nplt.legend(handles=[line1,line2])\n\
    plt.title('Log-ratio elements log(1a/1b) and log(1b/1a)')\nplt.show()\n```\n\n\
    在所有分析闭合数据的多元统计方法中（例如，第9.2至9.6节），都必须使用Aitchison的对数比率变换（图9.10）。\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_437_0.png)\n\
    \n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_437_1.png)\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_437_2.png)\n\
    \n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_437_3.png)\n\n**图 9.10** 演示了Aitchison的对数比率变换如何用于克服闭合数据的闭和问题：**a**\
    \ element1a、element1b和element1c的绝对值，**b** element1a、element1b和element1c的相对量，显示了闭和问题，**c**\
    \ element1a/element1b和element1b/element1a的比率，两者都独立于element1c，以及**d** 根据Aitchison\
    \ (1986, 2003)的对数比率，除了符号外相同，从而克服了闭和问题。\n\n## 推荐阅读\n\n- Aitchison J (1984) 地球化学组成的统计分析。Math\
