    print(1-fun(1/7))\n```\n\n结果为\n\n```\n0.7957488527349983\n```\n\n即降低约80%，但正如我们从图中看到的，它也改变了符号。在解释地球科学中的因果关系时，消除某些频率和翻转信号具有重要影响。因此，即使这些滤波器作为电子表格程序中的标准选项提供，也应完全避免使用。作为替代，应使用具有特定频率响应的滤波器，例如巴特沃斯低通滤波器（第6.9节）。\n\
    \n频率响应可以为各种滤波器计算。实际上，它是预测滤波器对信号影响的宝贵工具。相位响应也可以从滤波器的复频率响应 `h` 计算得出（图6.4）：\n\n```python\n\
