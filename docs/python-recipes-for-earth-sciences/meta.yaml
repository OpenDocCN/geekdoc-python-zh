  - "[PAGE 434]\n\nalso taking advantage of the simple properties of the logarithmic\
    \ function, for example, log(x/y)=log(x)–log(y) and hence also log(x/y)=–log(y/x).\
    \ This process allows for reducing the number of the covariances that are necessary\
    \ to describe the data set (Aitchison 2003, pages 65 to 66).\n\nHere is a simple\
    \ example that illustrates the closed-sum problem of a system with three variables\
    \ and the use of ratios as well as log-ratios to overcome the problem of spurious\
    \ correlations between pairs of variables. First, we clear the workspace and choose\
    \ colors for the plots:\n\n```\n%reset -f\n\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\n\ncolors = np.array([\n    [0,114,189],\n    [217,83,25],\n    [237,177,32],\n\
    \    [126,47,142],\n    ])/255\n```\n\nWe are interested in element1a and element1b,\
    \ which contribute to a sediment and are diluted by element1c. We simply create\
    \ three variables with magnitudes measured in milligrams and with a sinusoidal\
    \ variation of 200 samples down-core while making sure that all absolute values\
    \ are>0:\n\n```\nt = np.linspace(0.1,20,200)\nt = np.transpose(t)\n\nelement1a\
    \ = np.sin(2*np.pi*t/2) + 5\nelement1b = np.sin(2*np.pi*t/5) + 5\nelement1c =\
    \ 2*np.sin(2*np.pi*t/20) + 5\n\nplt.figure()\nplt.plot(t,element1a,\n    color=colors[0,:])\n\
    plt.plot(t,element1b,\n    color=colors[1,:])\nplt.plot(t,element1c,\n    color=colors[3,:])\n\
    plt.legend(['1a','1b','1c'])\nplt.title('Absolute amount of 1a-c (mg)')\nplt.show()\n\
    ```"
  - "[PAGE 435]\n\nWe calculate the percentages of element1a, element1b, and element1c\
    \ (i.e., we create ratios of the concentrations of the individual elements and\
    \ the sum of the concentrations of all elements). This process creates closed\
    \ data (i.e., the data are now expressed as proportions and add to a fixed total\
    \ of 100 percent): element1a+element1b+element1c=100%. Both element1a and element1b\
    \ are now affected by the dilution due to element1c. These elements show a major\
    \ sinusoidal long-term trend that is not real (as is shown by the first figure):\n\
    \n```\nelement1a_perc = element1a/(element1a+ \\n    element1b+element1c)\nelement1b_perc\
    \ = element1b/(element1a+ \\n    element1b+element1c)\nelement1c_perc = element1c/(element1a+\
    \ \\n    element1b+element1c)\n\nplt.figure()\nplt.plot(t,element1a_perc,\n  \
    \  color=colors[0,:])\nplt.plot(t,element1b_perc,\n    color=colors[1,:])\nplt.plot(t,element1c_perc,\n\
    \    color=colors[3,:])\nplt.legend(['1a','1b','1c'])\nplt.title('Relative concentration\
    \ 1a-c (%)')\nplt.show()\n```\n\nWe have now established ratios of element1a/element1b\
    \ and of element1b/element1a, both of which are independent of element1c. Note\
    \ the change of sign and the difference in amplitude. The ratios of element1a/element1b\
    \ and element1b/element1a do not show any evidence of a trend caused by the dilution\
    \ effect of element1c. However, the two curves are not identical (i.e., element1a/element1b\
    \ and element1b/element1a are not symmetric) (see Weltje and Tjallingii 2008,\
    \ page 426):\n\n```\nratio12 = element1a_perc/element1b_perc\nratio21 = element1b_perc/element1a_perc\n\
    \nplt.figure()\nax1 = plt.subplot()\nax2 = ax1.twinx()\nline1, = ax1.plot(t,ratio12,\n\
    \    color=colors[0,:],\n    label='1a/1b')\nline2, = ax2.plot(t,ratio21,\n```"
  - "[PAGE 436]\n\n```\ncolor=colors[1,:],\nlabel='1b/1a')\nax2.invert_yaxis()\nplt.legend(handles=[line1,line2])\n\
    plt.title('Ratios elements 1a/1b and 1b/1a')\nplt.show()\n```\n\nWe now display\
    \ log-ratios according to Aitchison (1986, 2003). The log-ratios log(element1a/element1b)\
