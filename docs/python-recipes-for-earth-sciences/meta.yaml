    ## 5.11 非线性时间序列分析（作者：N. Marwan）\n\n前面章节描述的方法用于检测数据中的线性关系。然而，地球上的自然过程通常是复杂和混沌的，因此基于线性技术的方法可能产生不令人满意的结果。近几十年来，源自混沌理论的非线性数据分析新技术越来越受欢迎。此类方法已被用于描述非线性行为，例如，通过定义自然过程的标度律和分形维数\
    \ (Turcotte 1997; Kantz and Schreiber 1997)。然而，大多数非线性数据分析方法需要长或平稳的数据序列，而这些要求在地球科学中很少得到满足。虽然大多数非线性技术在合成数据上表现良好，但这些方法无法描述真实数据的非线性行为。\n\
    \n近几十年来，*递归图*作为一种新的非线性数据分析方法，在科学和工程领域变得非常流行 (Eckmann 1987; Marwan et al. 2007)。递归是耗散动力系统的一个基本属性。尽管此类系统中的微小扰动可能导致系统状态呈指数发散，但经过一段时间后，系统会返回到接近先前状态的状态，然后再次经历类似的演化。递归图允许将动力系统的这种递归行为可视化。该方法现在被广泛接受为分析短而非平稳数据集的非线性分析的有用工具。\n\
    \n### 相空间图\n\n复杂动力系统（例如，湖泊中的沉积过程）的行为由许多变量决定，例如水体和湖底沉积物的性质、生活在湖泊及其周围环境中的生物、降水（高降雨量导致流域内风化和侵蚀加剧）、蒸发（例如，较高的蒸发导致沉积物中钾浓度升高）和风速（风速可以将更多固体颗粒输送到湖中）。分析这样一个动力系统的性质以及系统各组成部分之间随时间变化的相互作用，需要记录这些状态变量随时间的变化。由于通常没有系统状态变量（例如，降水、蒸发、风速）的古代记录可用，我们必须依赖于保存在自然档案中的间接指标（代用指标）。代用记录是通过对多维动力系统的单个变量进行采样获得的，这相当于将复杂系统的动力学投影到单个轴上。以古湖沉积物为例，采样的变量可以是沿湖沉积岩芯的钾浓度时间序列\
    \ $x(t)$，它代表了湖泊系统过去状态的自然档案。\n\n从一维时间序列 $x(t$) 展开多维系统动力学的一种方法是通过时间延迟 *嵌入*，它保留了系统的动态特性\
