    \n**图 5.24** a 洛伦兹系统的相空间图。与简单的周期系统相比，洛伦兹系统的轨迹显然不会精确地遵循之前的路径，但它们非常接近。b 仅使用第一个状态和时间延迟为\
    \ 6 重构的相空间图，揭示了与 a 相似的拓扑相图，具有两个典型的“耳朵”。\n\n与上述简单的周期系统相比，洛伦兹系统的轨迹显然不会精确地遵循之前的路径，但它们非常接近。此外，如果我们跟踪轨迹的两个非常接近的片段，我们会看到它们随着时间的推移进入相空间的不同区域。轨迹显然围绕相空间中的一个不动点盘旋，然后在随机的时间段后围绕另一个不动点盘旋。相状态围绕不动点的这种奇特轨道被称为*洛伦兹吸引子*。这些观察到的特性是混沌系统的典型特征。虽然此类系统中的微小扰动会导致其状态呈指数级发散，但系统会通过相似的路径近似地返回到先前的状态。仅使用第一个状态和时间延迟为六来重构相空间图\n\
    \n```python\ntau = 6\nplt.figure()\nax = plt.axes(projection='3d')\nax.plot(x[0:-2*tau-1,0],\n\
    \        x[0+tau:-tau-1,0],\n        x[0+2*tau:-1,0])\nax.view_init(60,100-90)\n\
    ax.set_xlabel('x_1')\nax.set_ylabel('x_2')\nax.set_zlabel('x_3')\nplt.show()\n\
    ```\n\n揭示了一个具有两个典型*耳朵*的相似相图（图 5.24）。混沌系统的特征性质也可以在这种重构中观察到。\n\n时间延迟和嵌入维数需要根据对数据的先前分析来选择。延迟可以借助自协方差（或自相关）序列来计算。对于我们这个周期性振荡的例子，\n\
    \n```python\nt = np.arange(0,3*np.pi+np.pi/10,np.pi/10)\nx = np.sin(t)\n```\n\n\
    我们计算并绘制自相关序列\n\n```python\nC = np.ones(len(x)-2)\nfor i in range(1,len(x)-2):\n\
    \    r = np.corrcoef(x[0:-i],x[i:])\n    C[i] = r[0,1]\n\nplt.figure()\nplt.plot(range(0,len(x)-2),C)\n\
    plt.xlabel('Delay')\nplt.ylabel('Autocorrelation')\nplt.grid()\n```\n\n我们现在选择一个延迟，使得第一个周期的自相关序列等于零。在我们的例子中，这个值是五，也就是我们在相空间重构示例中使用的值。合适的嵌入维数可以通过使用假近邻法或（更简单地）使用递归图来计算，递归图将在下一小节中介绍。嵌入维数逐渐增加，直到大多数对角线与恒等线平行。\n\
    \n相空间轨迹或其重构是非线性数据分析中定义的几种度量的基础，例如 *Lyapunov 指数*、*Rényi 熵* 和 *Rényi 维数*。推荐 Kantz\
    \ 和 Schreiber (1997) 关于非线性数据分析的著作，以获取有关这些方法的更详细信息。相空间轨迹或其重构也是构建递归图（图 5.25）所必需的。\n\
    \n## 递归图\n\n动力系统的一个共同特征是*递归*性。系统递归状态中的模式反映了典型的系统特征，对这些特征的描述有助于我们理解系统的动力学。在我们的例子中，降水、蒸发和风速等状态变量变化的递归可能导致湖泊中相似（尽管不完全相同）的条件（例如，湖泊的深度和大小、湖水的碱度和盐度、水体中的物种组合或沉积物中的成岩作用）。递归图（RP）是系统这种递归状态的图形显示，它是根据所有相空间向量\
    \ y(t) 对之间的距离（例如，欧几里得距离）在阈值 ε 内计算得出的（Marwan 等人，2007）：\n\n$$\nR_{i,j} = \\begin{cases}\
    \ 0, & \\| x_i - x_j \\| > \\varepsilon \\\\ 1, & \\| x_i - x_j \\| \\leq \\varepsilon\
    \ \\end{cases}\n$$\n\n如果时间 i 和 j 的两个状态之间的距离小于给定的阈值 ε，则递归矩阵 R 的值为一；否则为零。因此，这种分析是对所有状态的成对测试。对于\
    \ n 个状态，我们计算 n² 次测试。递归图是 n×n 矩阵的二维显示，其中黑色像素代表 R_{i,j}=1，白色像素表示 R_{i,j}=0，并且坐标系表示两个时间轴。这样的递归图可以帮助创建系统动力学的初步特征描述，或发现系统内的转变和相互关系（参见图\
    \ 5.26）。"
