    ```\n\nThe result suggests that we can reject the null hypothesis. The $p$-value\
    \ is extremely low and very close to zero, which suggests that the null hypothesis\
    \ is highly unlikely.\n\n## 3.9 The $\\chi^2$-Test\n\nKarl Pearson's $\\chi^2$-test\
    \ involves comparing distributions, thereby allowing two distributions to be tested\
    \ for derivation from the same population (Pearson 1900). This test is independent\
    \ of the distribution that is used and can therefore be used to test the hypothesis\
    \ that the observations were drawn from a specific theoretical distribution.\n\
    \nLet us assume that we have a data set that consists of multiple chemical measurements\
    \ from a sedimentary unit. We could use the $\\chi^2$-test to test the null hypothesis\
    \ that these measurements can be described by a Gaussian distribution with a typical\
    \ central value and a random dispersion around it. The $n$ data are grouped into\
    \ $K$ classes, where $n$ should be above 30. The frequencies within the classes\
    \ $O_k$ should not be lower than four and should certainly never be zero. The\
    \ appropriate test statistic is then\n\n$$\\widehat{\\chi}^2 = \\sum_{k=1}^{K}\
    \ \\frac{(O_k - E_k)^2}{E_k}$$\n\nwhere $E_k$ are the frequencies expected from\
    \ the theoretical distribution (Fig. 3.14). The null hypothesis can be rejected\
    \ if the measured $\\chi^2$-value is higher than the critical $\\chi^2$-value,\
    \ which depends on the number of degrees of freedom $\\Phi = K-Z$, where $K$ is\
    \ the number of classes and $Z$ is the number of parameters that describe the\
    \ theoretical distribution plus the number of variables (e.g., $Z=2+1$ for the\
    \ mean and the variance from a Gaussian distribution of a data set for a single\
    \ variable and $Z=1+1$ for a Poisson distribution for a single variable).\n\n\
    As an example, we can test the hypothesis that our organic carbon measurements\
    \ contained in *organicmatter_one.txt* follow a Gaussian distribution. We must\
    \ first load the data into the workspace and compute the frequency distribution\
    \ n_obs for the data measurements using eight classes:\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_105_0.png)\n\
    \nFig. 3.14 Principles of a χ²-test. The alternative hypothesis that the two distributions\
    \ are different can be rejected if the measured χ² is lower than the critical\
    \ χ². The χ² depends on Φ = K – Z, where K is the number of classes and Z is the\
    \ number of parameters that describe the theoretical distribution plus the number\
    \ of variables. In the example, the critical χ²(Φ = 5, α = 0.05) is 11.0705. Since\
    \ the measured χ² = 5.7602 is below the critical χ², we cannot reject the null\
    \ hypothesis. In our example, we can conclude that the sample distribution is\
    \ not significantly different from a Gaussian distribution.\n\n```python\n%reset\
    \ -f\n\nimport numpy as np\nimport matplotlib.pyplot as plt\nfrom scipy import\
    \ stats\n\ncorg = np.loadtxt('organicmatter_one.txt')\n\nn_obs,e = np.histogram(corg,bins=8)\n\
    v = np.diff(e[0:2])*0.5+e[0:-1]\n```\n\nWe then use norm.pdf() to create the expected\
    \ frequency distribution n_exp with the mean and standard deviation of the data\
    \ in corg:\n\n```python\nn_exp = stats.norm.pdf(v,np.mean(corg),np.std(corg,ddof=1))\n\
    ```\n\nThe data need to be scaled so that they are similar to the original data\
    \ set:\n\n```python\nn_exp = n_exp/np.sum(n_exp)\nn_exp = np.sum(n_obs)*n_exp\n\
    ```\n\nThe first command normalizes the observed frequencies n_exp to a total\
    \ of one. The second command scales the expected frequencies n_exp to the sum\
    \ of n_obs. We can now display both histograms for comparison:\n\n```python\n\
    plt.figure()\nplt.subplot(1,2,1)\nplt.bar(v,n_obs,color='r')\nplt.subplot(1,2,2)\n\
    plt.bar(v,n_exp,color='b')\nplt.show()\n```\n\nAn alternative way of plotting\
    \ the data in corg is to use a normal probability plot:\n\n```python\nstats.probplot(corg,dist='norm',plot=plt)\n\
    ```\n\nThe function probplot() plots the data in corg with blue circles superimposed\
    \ by a red line, which represents the normal distribution. If the data in corg\
    \ are indeed normally distributed, they will all fall on the red line. In our\
    \ example, the data seem to agree well with the line, except for the tails of\
    \ the normal distribution.\n\nVisually inspecting these plots reveals that the\
    \ empirical distribution is similar to the theoretical distribution. However,\
    \ we advise using a more quantitative approach to test the hypothesis of similarity.\
    \ The χ²-test explores the squared differences between the observed and expected\
    \ frequencies. The quantity chi2calc is the sum of the squared differences divided\
    \ by the expected frequencies. Typing\n\n```python\nchi2calc = np.sum((n_obs-n_exp)**2/n_exp)\n\
    print(chi2calc)\n```\n\nyields\n\n```\n7.285412350787187\n```\n\nThe critical\
    \ chi2crit value can be calculated using the chi2inv value. The χ²-test requires\
    \ the number of degrees of freedom Φ. In our example, we test the hypothesis that\
    \ the data have a Gaussian distribution, that is, we estimate the two parameters\
    \ μ and σ. The number of degrees of freedom is Φ=8−(2+1)=5. We can now test our\
    \ hypothesis at a 5% significance level. The function chi2.ppf() computes the\
    \ inverse of the χ² CDF with parameters specified by Φ for the corresponding probabilities.\
    \ Typing\n\n```python\nchi2crit = stats.chi2.ppf(1-0.05,5)\nprint(chi2crit)\n\
    ```\n\nyields\n\n```\n11.070497693516351\n```\n\nSince the critical chi2crit value\
    \ of 11.0705 is well above the measured chi2calc value of 7.2854, we cannot reject\
    \ the null hypothesis without another cause. We can therefore conclude that our\
    \ data follow a Gaussian distribution. Alternatively, we can apply chisqaure()\
    \ to the sample. The command\n\n```python\nchisq,p = stats.chisquare(n_obs,n_exp,ddof=0,axis=0)\n\
    print(chisq)\nprint(p)\n```\n\nyields\n\n```\n7.285412350787187\n0.39978002411496866\n\
    ```\n\nThe result means that we cannot reject the null hypothesis without another\
