    \n## 3.9 $\\chi^2$检验\n\n卡尔·皮尔逊的$\\chi^2$检验涉及比较分布，从而允许检验两个分布是否源自同一总体（Pearson 1900）。该检验与所使用的分布类型无关，因此可用于检验观测值是否来自特定理论分布的假设。\n\
    \n假设我们有一个数据集，包含来自一个沉积单元的多次化学测量。我们可以使用$\\chi^2$检验来检验原假设：这些测量值可以用一个具有典型中心值和围绕其随机离散度的高斯分布来描述。$n$个数据被分成$K$个类别，其中$n$应大于30。类别内的频率$O_k$不应低于四，并且绝对不应为零。适当的检验统计量为：\n\
    \n$$\\widehat{\\chi}^2 = \\sum_{k=1}^{K} \\frac{(O_k - E_k)^2}{E_k}$$\n\n其中$E_k$是从理论分布预期的频率（图3.14）。如果测量的$\\\
    chi^2$值高于临界$\\chi^2$值，则可以拒绝原假设，该临界值取决于自由度$\\Phi = K-Z$，其中$K$是类别数，$Z$是描述理论分布的参数数量加上变量数量（例如，对于单变量数据集的高斯分布，均值和方差对应$Z=2+1$；对于单变量的泊松分布，$Z=1+1$）。\n\
    \n例如，我们可以检验包含在*organicmatter_one.txt*中的有机碳测量值是否服从高斯分布的假设。我们必须首先将数据加载到工作区，并使用八个类别计算数据测量值的频率分布n_obs：\n\
    \n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_105_0.png)\n\n图3.14 χ²检验原理。如果测量的χ²低于临界χ²，则可以拒绝两个分布不同的备择假设。χ²取决于Φ\
    \ = K – Z，其中K是类别数，Z是描述理论分布的参数数量加上变量数量。在本例中，临界χ²(Φ = 5, α = 0.05)为11.0705。由于测量的χ²\
    \ = 5.7602低于临界χ²，我们无法拒绝原假设。在我们的例子中，我们可以得出结论，样本分布与高斯分布没有显著差异。\n\n```python\n%reset\
    \ -f\n\nimport numpy as np\nimport matplotlib.pyplot as plt\nfrom scipy import\
    \ stats\n\ncorg = np.loadtxt('organicmatter_one.txt')\n\nn_obs,e = np.histogram(corg,bins=8)\n\
    v = np.diff(e[0:2])*0.5+e[0:-1]\n```\n\n然后，我们使用`norm.pdf()`函数，根据corg中数据的均值和标准差创建预期频率分布n_exp：\n\
    \n```python\nn_exp = stats.norm.pdf(v,np.mean(corg),np.std(corg,ddof=1))\n```\n\
    \n数据需要进行缩放，以便与原始数据集相似：\n\n```python\nn_exp = n_exp/np.sum(n_exp)\nn_exp = np.sum(n_obs)*n_exp\n\
    ```\n\n第一条命令将观测频率n_exp归一化为总和为1。第二条命令将预期频率n_exp缩放为n_obs的总和。我们现在可以显示两个直方图进行比较：\n\
    \n```python\nplt.figure()\nplt.subplot(1,2,1)\nplt.bar(v,n_obs,color='r')\nplt.subplot(1,2,2)\n\
    plt.bar(v,n_exp,color='b')\nplt.show()\n```\n\n绘制corg中数据的另一种方法是使用正态概率图：\n\n```python\n\
    stats.probplot(corg,dist='norm',plot=plt)\n```\n\n`probplot()`函数用蓝色圆圈绘制corg中的数据，并叠加一条代表正态分布的红线。如果corg中的数据确实服从正态分布，它们将全部落在红线上。在我们的例子中，数据似乎与直线吻合良好，除了正态分布的尾部。\n\
    \n目视检查这些图表揭示经验分布与理论分布相似。然而，我们建议使用更定量的方法来检验相似性假设。χ²检验探讨观测频率和预期频率之间的平方差。量chi2calc是平方差除以预期频率的总和。输入：\n\
    \n```python\nchi2calc = np.sum((n_obs-n_exp)**2/n_exp)\nprint(chi2calc)\n```\n\
    \n得到：\n\n```\n7.285412350787187\n```\n\n临界chi2crit值可以使用chi2inv值计算。χ²检验需要自由度Φ。在我们的例子中，我们检验数据服从高斯分布的假设，即我们估计两个参数μ和σ。自由度为Φ=8−(2+1)=5。我们现在可以在5%的显著性水平下检验我们的假设。函数`chi2.ppf()`计算具有Φ指定参数的χ²\
    \ CDF的逆，用于相应的概率。输入：\n\n```python\nchi2crit = stats.chi2.ppf(1-0.05,5)\nprint(chi2crit)\n\
    ```\n\n得到：\n\n```\n11.070497693516351\n```\n\n由于临界chi2crit值11.0705远高于测量的chi2calc值7.2854，在没有其他原因的情况下，我们无法拒绝原假设。因此，我们可以得出结论，我们的数据服从高斯分布。或者，我们可以对样本应用`chisqaure()`函数。命令：\n\
    \n```python\nchisq,p = stats.chisquare(n_obs,n_exp,ddof=0,axis=0)\nprint(chisq)\n\
    print(p)\n```\n\n得到：\n\n```\n7.285412350787187\n0.39978002411496866\n```\n\n该结果意味着，在5%的显著性水平下，我们无法拒绝原假设。p值为0.3998（或约40%，远大于显著性水平），这表明在原假设成立的情况下，从类似实验中观察到相同结果或更极端结果的概率为10,000次中有3,998次。\n\
    \n## 3.10 柯尔莫哥洛夫-斯米尔诺夫检验\n\n*柯尔莫哥洛夫-斯米尔诺夫*（或*K–S*）*检验*（由安德烈·N·柯尔莫哥洛夫和尼古拉·W·斯米尔诺夫提出）与χ²检验类似，因为它也涉及比较分布，从而允许检验两个分布是否源自同一总体（Kolmogorov\
    \ 1933; Smirnov 1939）。该检验与所使用的分布类型无关，因此可用于检验观测值是否来自特定理论分布的假设。\n\n让我们再次假设我们有一个数据集，包含来自一个沉积单元的多次化学测量。我们可以使用K–S检验来检验原假设：这些测量值可以用一个具有典型中心值（均值）和围绕均值的随机离散度（标准差）的高斯分布来描述。适当的检验统计量为：\n\
    \n$KS = max|F_n(x) - F(x)|$\n\n其中$F_n(x)$是$n$个测量值的累积频率分布，$F(x)$是从理论分布预期的累积频率分布。如果测量的$KS$值高于临界$KS$值，则可以拒绝原假设。\n\
