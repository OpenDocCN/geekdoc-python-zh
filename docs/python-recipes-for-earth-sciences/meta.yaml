    In contrast to random errors that can be determined by evaluating repeated measurements,
    *systematic errors* ($s_s$) are much more difficult to detect and quantify. They
    are usually consistent downward or upward deviations in measured values caused
    by an incorrectly calibrated instrument. The equation


    $$s_s = \mu - \bar{x}$$


    expresses systematic errors as the difference between the (usually unknown) population
    mean (or *true* value) $\mu$ and the sample mean of the measurements (Fig. 3.16).


    As an example, when I was a student in a mapping course, a professor asked us
    perform measurements with his geological compass. Each student did their best,
    but the professor commented that each reading was *wrong*. He was obviously bored
    with the beginner''s course and had thus simply adjusted the scale on his compass
    by five degrees in order to challenge the students. None of us dared to question
    the accuracy of the professor''s compass, and all of our readings were therefore
    wrong because they included a 5-degree systematic error (apart from any random
    errors). As there was no possibility to detect this error on the device itself,
    repeated measurements with another device would have allowed the systematic error
    to be detected and eliminated. If we know the random and systematic errors of
    a measurement, we can indicate the *precision* and *accuracy* of our data. Precise
    measurements are consistent about the mean, but the *true* value may be different
    from the mean value of the measurements due to systematic errors that limit accuracy.
    Increasing the sample size $n$ increases the precision, but not the accuracy.


    We now turn to a simple Python experiment in order to gain a better understanding
    of measurement uncertainties. After clearing the workspace and resetting the random
    number generator, we generate measurement data by randomly sampling a population
    with a mean of 3.4 and a standard deviation of 1.2. This could mean that the true
    gold content of a rock is 3.4 g per ton, but this value cannot be determined more
    precisely than $\pm 1.2$ g per ton due to measurement errors. As a result of time
    and budgetary limitations, let us assume that we can only take 12 measurements,
    which are stored in data,


    ```

