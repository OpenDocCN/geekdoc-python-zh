    # 4.5 Bootstrap Estimates of the Regression Coefficients


    In this section, we use the *bootstrap* method to obtain a better estimate of
    the regression coefficients. As an example, we use `random.choice()` with 1,000
    samples (Fig. 4.6):


    ```

