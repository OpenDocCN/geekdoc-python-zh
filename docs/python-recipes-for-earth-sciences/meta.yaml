    # 5.11 Nonlinear Time Series Analysis (by N. Marwan)


    The methods described in the previous sections were used to detect linear relationships
    in data. However, natural processes on the Earth are often complex and chaotic,
    and methods based on linear techniques may therefore yield unsatisfactory results.
    New techniques for nonlinear data analysis that are derived from chaos theory
    have become increasingly popular in recent decades. Such methods have been used
    to describe nonlinear behavior, for example, by defining the scaling laws and
    fractal dimensions of natural processes (Turcotte 1997; Kantz and Schreiber 1997).
    However, most methods of nonlinear data analysis require either'
  - '[PAGE 204]


    long or stationary data series, and these requirements are rarely satisfied in
    the earth sciences. While most nonlinear techniques work well on synthetic data,
    these methods are unable to describe the nonlinear behavior of real data.


    During recent decades, *recurrence plots* have become highly popular in science
    and engineering as a new method of nonlinear data analysis (Eckmann 1987; Marwan
    et al. 2007). Recurrence is a fundamental property of dissipative dynamical systems.
    Although small disturbances in such systems can cause exponential divergence in
    the systems’ states, after some time, the systems return to a state that is close
    to a former state before again passing through a similar evolution. Recurrence
    plots allow such recurrent behavior of dynamical systems to be visually portrayed.
    The method is now widely accepted as a useful tool in the nonlinear analysis of
    short and nonstationary data sets.


    # Phase Space Portrait


    The behavior of a complex dynamical system (e.g., the process of sedimentation
    in a lake) is determined by many variables, such as the properties of the water
    body and the sediment beneath the lake, the organisms living in the lake and its
    surroundings, precipitation (with high rainfall causing increased weathering and
    erosion in the catchment area), evaporation (with higher evaporation resulting,
    e.g., in higher potassium concentrations in the sediments), and wind speed (which
    can transport more solid particles into the lake). Analyzing the properties of
    such a dynamical system and the time-varying interaction between the system’s
    components requires keeping a record of these state variables through time. Since
    there are usually no ancient records available of a system’s state variables (e.g.,
    precipitation, evaporation, wind speed), we must instead rely on indirect indicators
    (proxies) that have been preserved in natural archives. A proxy record is obtained
    by sampling a single variable of a multi-dimensional dynamical system, which is
    equivalent to projecting the dynamics of a complex system onto a single axis.
    Considering the example of sediment in a paleolake, the sampled variable could
    be a time series $x(t)$ of potassium concentrations along a lake sediment core
    that represents a natural archive of past states of the lake system.


    One way to unfold the dynamics of a multi-dimensional system from a one-dimensional
    time series $x(t)$ is through time-delay *embedding*, which preserves the dynamic
    characteristics of the system (Packard et al. 1980). Such a one-dimensional time
    series—which is based on a single variable – contains information about the system
    and its state variables from which a complete reconstruction of the entire system
    can be made. In other words, since the potassium concentration is a result of
    a complex interplay between unknown environmental variables (e.g., precipitation,
    evaporation, wind velocity), analyzing the temporal variations in this environmental
    proxy helps us to understand the properties of the paleolake and the time-varying
    interactions between its components. The embedding of the time series $x(t)$ in
    a three-dimensional ($m = 3$) *phase space*, for example, means that three successive'
- md: "values $x(t)$, $x(t + \\tau)$, and $x(t + 2\\tau)$ with a temporal separation\
    \ $\\tau$ are represented as a point in a three-dimensional coordinate system\
    \ (i.e., the phase space) (Packard et al. 1980). The *phase space portrait* displays\
    \ the embedded time series of observations as a trajectory $\\vec{y}(t) = [x(t),\
    \ x(t + \\tau), x(t + 2\\tau)]^T$ within the phase space. The phase space trajectory\
    \ represents the path over which the system's state evolves through time. The\
    \ reconstructed phase space (which is reconstructed via embedding) is not exactly\
    \ the same as the original phase space (the true variables that describe the lake),\
    \ but its topological properties are preserved provided that the *embedding dimension*\
    \ is sufficiently large (Packard et al. 1980; Takens 1981).\n\nAs an example,\
    \ we now explore the phase space portrait of a periodic process. We first create\
    \ the position vector x1 and the velocity vector x2:\n\n```python\n%reset -f\n\
    \nimport numpy as np\nfrom scipy import interpolate\nimport matplotlib.pyplot\
    \ as plt\nimport scipy.spatial.distance as distance\n\nt = np.arange(0,3*np.pi+np.pi/10,np.pi/10)\n\
    x1 = np.sin(t)\nx2 = np.cos(t)\n```\n\nThe phase space portrait\n\n```python\n\
    plt.figure()\nplt.plot(x1,x2)\nplt.xlabel('x_1')\nplt.ylabel('x_2')\nplt.show()\n\
    ```\n\nis a circle, which suggests an exact recurrence of each state after one\
    \ complete cycle (Fig. 5.22). Through time-delay embedding, we can reconstruct\
    \ this phase space portrait using only a single observation (e.g., a velocity\
    \ vector) and a time delay of five, which corresponds to one quarter of the period\
    \ of a pendulum:\n\n```python\ntau = 5\nplt.figure()\nplt.plot(x2[:-tau],x2[tau:])\n\
    plt.xlabel('x_1')\nplt.ylabel('x_2')\n```\n\nAs we can see, the reconstructed\
    \ phase space is almost the same as the original phase space. We next compare\
    \ this phase space portrait with that of a typical nonlinear system: the *Lorenz\
    \ system* (Lorenz 1963). Weather patterns often do not change in a predictable\
    \ manner. In 1963, Edward Lorenz introduced a simple three-dimensional model for\
    \ describing the chaotic behavior exhibited by turbulence in the atmosphere. The\
    \ variables that define the Lorenz system are the intensity of atmospheric convection,\
    \ the temperature difference between ascending and descending currents, and the\
    \ distortion of the vertical temperature profiles from linearity. Small variations\
    \ in the initial conditions can cause dramatically divergent weather patterns—a\
    \ behavior often referred to as the *butterfly effect*. The dynamics of the Lorenz\
    \ system are described by three coupled nonlinear differential equations:\n\n\
    $$\n\\frac{dx}{dt} = s(y(t) - x(t))\n$$\n\n$$\n\\frac{dy}{dt} = -x(t)z(t) + rx(t)\
    \ - y(t)\n$$\n\n$$\n\\frac{dz}{dt} = x(t)y(t) - bz(t)\n$$\n\nIntegrating the differential\
    \ equations yields a simple Python code for computing the *xyz* triplets of the\
    \ Lorenz system. We use s=10, r=28, and b=8/3 as system parameters for controlling\
    \ the chaotic behavior, and the time delay is dt=0.01. The initial values for\
    \ the position vectors are x1=8, x2=9, and x3=25. However, these values can be\
    \ changed to any other values, which of course then also changes the behavior\
    \ of the system:\n\n```python\ndt = .01\ns = 10\nr = 28\nb = 8/3\nx1, x2, x3 =\
    \ 8, 9, 25\nn = 5000\nx = np.zeros((n,3))\nfor i in range(0, n):\n    x1 = x1\
    \ + (-s*x1*dt) + (s*x2*dt)\n    x2 = x2 + (r*x1*dt) - (x2*dt) - (x3*x1*dt)\n \
    \   x3 = x3 + (-b*x3*dt) + (x1*x2*dt)\n    x[i,:] = [x1, x2, x3]\n```\n\nTypical\
    \ traces of a variable (e.g., the first variable) can be viewed by plotting x[:,0]\
    \ over time (Fig. 5.23):\n\n```python\nt = np.linspace(0.01,50,n)\n\nplt.figure()\n\
    plt.plot(t,x[:,0])\nplt.xlabel('Time')\nplt.ylabel('Temperature')\nplt.show()\n\
    ```\n\nWe next plot the phase space portrait for the Lorenz system (Fig. 5.24):\n\
    \n```python\nplt.figure()\nax = plt.axes(projection='3d')\nax.plot(x[:,0],x[:,1],x[:,2])\n\
    ax.view_init(30,70-90)\nax.set_xlabel('x_1')\nax.set_ylabel('x_2')\nax.set_zlabel('x_3')\n\
    plt.show()\n```\n\n**Fig. 5.23** Lorenz system. We used s=10, r=28, and b=8/3\
    \ as system parameters. The time delay is dt=0.01.\n\n**Fig. 5.24** a Phase space\
    \ portrait of the Lorenz system. In contrast to the simple periodic system, the\
    \ trajectories of the Lorenz system obviously do not precisely follow the previous\
    \ course, but they are very close to it. b The reconstruction of the phase space\
    \ portrait using only the first state and a time delay of 6 reveals a topologically\
    \ similar phase portrait to a with the two typical ears.\n\nIn contrast to the\
    \ simple periodic system described above, the trajectories of the Lorenz system\
    \ obviously do not precisely follow the previous course, but they are very close\
    \ to it. Moreover, if we follow two very close segments of the trajectory, we\
    \ see that they run into different regions of the phase space over time. The trajectory\
    \ obviously circles around one fixed point in the phase space and then circles\
    \ around another fixed point after a random time period. The curious orbit of\
    \ the phase states around fixed points is known as the *Lorenz attractor*. These\
    \ observed properties are typical of chaotic systems. While small disturbances\
    \ in such a system cause exponential divergences in its state, the system returns\
    \ approximately to a previous state through a similar course. Reconstructing the\
    \ phase space portrait using only the first state and a time delay of six\n\n\
    ```python\ntau = 6\nplt.figure()\nax = plt.axes(projection='3d')\nax.plot(x[0:-2*tau-1,0],\n\
    \        x[0+tau:-tau-1,0],\n        x[0+2*tau:-1,0])\nax.view_init(60,100-90)\n\
    ax.set_xlabel('x_1')\nax.set_ylabel('x_2')\nax.set_zlabel('x_3')\nplt.show()\n\
    ```\n\nreveals a similar phase portrait with the two typical *ears* (Fig. 5.24).\
    \ The characteristic properties of chaotic systems can also be observed in this\
    \ reconstruction.\n\nThe time delay and the embedding dimension need to be chosen\
    \ from a previous analysis of the data. The delay can be calculated with the help\
    \ of the autocovariance (or autocorrelation) sequence. For our example of a periodic\
    \ oscillation,\n\n```python\nt = np.arange(0,3*np.pi+np.pi/10,np.pi/10)\nx = np.sin(t)\n\
    ```\n\nwe compute and plot the autocorrelation sequence\n\n```python\nC = np.ones(len(x)-2)\n\
    for i in range(1,len(x)-2):\n    r = np.corrcoef(x[0:-i],x[i:])\n    C[i] = r[0,1]\n\
    \nplt.figure()\nplt.plot(range(0,len(x)-2),C)\nplt.xlabel('Delay')\nplt.ylabel('Autocorrelation')\n\
    plt.grid()\n```\n\nWe now choose a delay such that the autocorrelation sequence\
    \ for the first time period equals zero. In our case, this is five, which is the\
    \ value that we used in our example of phase space reconstruction. The appropriate\
    \ embedding dimension can be calculated by using the false nearest neighbor method\
    \ or (more simply) by using recurrence plots, which are introduced in the next\
    \ subsection. The embedding dimension is gradually increased until the majority\
    \ of the diagonal lines are parallel to the line of identity.\n\nEither the phase\
    \ space trajectory or its reconstruction serves as the basis for several measures\
    \ that are defined in nonlinear data analysis, such as *Lyapunov exponents*, *Rényi\
    \ entropies*, and *Rényi dimensions*. The book by Kantz and Schreiber (1997) on\
    \ nonlinear data analysis is recommended for gaining more detailed information\
    \ on these methods. Either phase space trajectories or their reconstructions are\
    \ also necessary for constructing recurrence plots (Fig. 5.25).\n\n## Recurrence\
    \ Plots\n\nA common feature of dynamical systems is the property of *recurrence*.\
    \ Patterns in the recurring states of a system reflect typical system characteristics\
    \ whose descriptions contribute to our understanding of the system's dynamics.\
    \ In our example, a recurrence of changes in the state variables of precipitation,\
    \ evaporation, and wind speed could lead to similar (albeit not identical) conditions\
    \ in the lake (e.g., the depth and size of the lake, the alkalinity and the salinity\
    \ of the lake water, the species assemblage in the water body, or diagenesis in\
    \ the sediment). A recurrence plot (RP) is a graphical display of such recurring\
    \ states of the system that is calculated from the distance (e.g., Euclidean)\
    \ between all pairs of phase space vectors y(t) within a threshold value ε (Marwan\
    \ et al. 2007):\n\n$$\nR_{i,j} = \\begin{cases} 0, & \\| x_i - x_j \\| > \\varepsilon\
    \ \\\\ 1, & \\| x_i - x_j \\| \\leq \\varepsilon \\end{cases}\n$$\n\nIf the distance\
    \ between two states at times i and j is smaller than a given threshold ε, the\
    \ value of the recurrence matrix R is one; otherwise, it is zero. This analysis\
    \ is therefore a pairwise test of all states. For n states, we compute n² tests.\
    \ The recurrence plot is then the two-dimensional display of the n-by-n matrix,\
    \ where black pixels represent R_{i,j}=1 and white pixels indicate R_{i,j}=0,\
    \ and with a coordinate system that represents two time axes. Such recurrence\
    \ plots can help to create a preliminary characterization of the dynamics of a\
    \ system or to find transitions and interrelationships within a system (cf. Fig.\
    \ 5.26)."
