    \ 自相关成分，以及 **f** 变异函数。变异函数应仅从自相关成分导出。\n\n### 前置分析\n\n由于本书中介绍的线性地统计学是一种参数方法，因此需要通过前置分析来检查其基本假设。与其他参数方法一样，线性地统计学对异常值和偏离正态分布的情况敏感。我们首先打开数据文件\
    \ *geost_dat.mat*，其中包含 *xyz* 数据三元组，然后绘制采样位置。这使我们能够检查点分布并检测数据坐标 *x* 和 *y* 中的任何重大错误：\n\
