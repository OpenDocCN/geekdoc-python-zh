    We now run the adaptive filter canc() for 20 iterations and use the value of u
    from above:


    ```

    z,e,mer,w = canc(yn1,yn2,0.0013,5,20)

    ```


    The plot of the mean squared error mer versus the number of performed iterations
    it with step size u


    ```

    plt.figure()

    plt.plot(mer)

    plt.show()

    ```


    illustrates the performance of the adaptive filter, although the chosen step size
    u=0.0016 clearly results in a relatively rapid convergence. Again, we can now
    compare the filter output with the original noise-free signal:


    ```

    plot(x,y,''b'',x,z,''r'')

    ```


    This plot reveals that the filter output y is almost the same as the noise-free
    signal x. The plot


    ```

    plot(x,e,''r'')

    ```


    shows the noise extracted from the signal. Here, we can observe some signal components
    that have been removed by the filter in error from within the noise-free segment
    of the time series beyond the change point in the signal-to-noise ratio. Using
    the last output of canc(), we can calculate and display the filter weights w of
    the final iteration,


    ```

    X = np.linspace(1,5,5)

    Y = np.linspace(2,999,997)

    X, Y = np.meshgrid(X, Y)

    W = w[2:999,0:]


    plt.figure()

    fig,ax = plt.subplots(subplot_kw={"projection":"3d"})

    surf = ax.plot_surface(X,Y,W,cmap=cm.coolwarm)

    ax.view_init(60,100-90)

    plt.show()

    ```


    which nicely shows the adaptation of the filter weights before and after the change
    in the signal-to-noise ratio. We plot only the middle part of w because the edges
    1:(1-1)/2 and end-(1-1)/2:end are all zero due to the filter length of 1. We can
    also use this example to demonstrate the effect that the values of u and 1 have
    on the performance of the adaptive filter. In theory, a smaller u leads to more
