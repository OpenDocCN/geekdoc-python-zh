    \ [ 6.]\n [ 4.]\n [ 9.]\n [10.]\n [ 4.]]\n```\n\nIt is important that the block\
    \ of code within the for loop, which is B[i] =np. round(10*A[i]) in our example,\
    \ be indented in order to indicate that it belongs to the loop. *Spaces* should\
    \ be used instead of *tabulators* (or *tabs*, for short) for indentation (e.g.,\
    \ four spaces for single indentation, as in our example). Please note that we\
    \ use B=np.zeros((10,1)) to pre-allocate memory prior to using the for loop. We\
    \ can expand the experiment by using a nested for loop to create a 2D array B.\n\
    \nTyping\n\n```\nnp.random.seed(0)\nA = np.random.rand(10,3)\nB = np.zeros((10,3))\n\
    for i in range(0,10):\n    for j in range(0,3):\n        B[i,j] = np.round(10*A[i,j])\n\
    print(A)\nprint(B)\n```\n\nyields\n\n```\n[[0.5488135  0.71518937 0.60276338]\n\
    \ [0.54488318 0.4236548  0.64589411]\n [0.43758721 0.891773   0.96366276]\n [0.38344152\
    \ 0.79172504 0.52889492]\n [0.56804456 0.92559664 0.07103606]\n [0.0871293  0.0202184\
