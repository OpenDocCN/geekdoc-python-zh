    \ = (np.max(data[:,0])-np.min(data[:,0])) * \\\n    (np.max(data[:,1])-np.min(data[:,1]))\n\
    expectednearest = 0.5 * np.sqrt(maparea/len(data))\nprint(expectednearest)\n```\n\
    \nwhich yields\n\n```\n0.49268341482387124\n```\n\nIn our example, the expected\
    \ mean nearest neighbor distance expectednearest is 0.4927. Finally, we compute\
