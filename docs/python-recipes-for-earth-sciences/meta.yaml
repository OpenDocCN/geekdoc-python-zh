    \ parameter space (Fig. 8.11b). The intersection point (θ', ρ') of two such sinusoidal\
    \ curves corresponds to the line that passes through two different pixels (x₁,\
    \ y₁) and (x₂, y₂) of an edge feature. Next, we search for n points (xᵢ, yᵢ) in\
    \ the Hough transform in which many lines intersect since these points define\
    \ the line that traces an edge feature. Detecting circles instead of lines works\
    \ in a similar manner by using the coordinates of the center of the circle and\
