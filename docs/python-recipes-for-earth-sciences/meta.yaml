    # 3.5 Examples of Theoretical Distributions


    We use norm.pdf() and norm.cdf() to compute the probability density function and
    the cumulative distribution function of a Gaussian distribution with mu=12.3448
    and sigma=1.1660 (evaluated for the values in x) to compare the results with those
    of our sample data set:


    ```

    %reset -f


    import numpy as np

    import matplotlib.pyplot as plt

    from scipy import stats


    mu = 12.3448

    sigma = 1.166


    x = np.arange(5,20+0.001,0.001)

    pdf = stats.norm.pdf(x,mu,sigma)

    cdf = stats.norm.cdf(x,mu,sigma)


    plt.figure()

    plt.plot(x,pdf,x,cdf)

    plt.show()

    ```


    We can use these functions to familiarize ourselves with the properties of distributions.
    This will be important when testing hypotheses in the following sections. The
    test statistics used in these sections follow the theoretical frequency distributions
    introduced in the previous sections of this chapter. In particular, the integral
    (or in the discrete case, the sum) of the theoretical distribution within a certain
    range $a \le x \le b$ is of great importance as it helps in calculating the probability
    that a measurement falls within this range.


    As an example, we can calculate the probability that a measurement falls within
    the range of $\mu-\sigma \le x \le \mu+\sigma$, where $\mu$ is the mean and $\sigma$
    is the standard deviation of a Gaussian distribution. Using the PDF of the Gaussian
    distribution with mu=12.3448 and sigma=1.1660, we find


    ```

    pdf = pdf / np.sum(pdf)

    print(np.sum(pdf[np.where((x>mu-sigma) & (x<mu+sigma))]))

    ```


    which yields


    0.6826894910701773


    or ~68% after normalizing the PDF to unity. The expression np.where(x>mu-sigma)
    returns the first index of x where x is larger than mu-sigma. Similarly, np.where(x<mu+sigma)
    returns the first index of x where x is smaller than mu+sigma.'
- md: '## 3.6 Hypothesis Testing


    The following sections deal with methods used to draw conclusions from the statistical
    sample, which can then be applied to the larger population of interest (*hypothesis
    testing*) (Sects. 3.6 to 3.12). All hypothesis tests share the same concept and
    terminology. The *null hypothesis* is an assertion about the population that describes
    the absence of a statistically significant characteristic or effect, whereas an
    *alternative hypothesis* is a contrasting assertion. The *p-value* of a hypothesis
    test is the probability (under the null hypothesis) of observing larger values
    for the test statistic than those calculated from the sample. The *significance
    level* $\alpha$ is the threshold of probability that controls the outcome of the
    tests. If the *p*-value is smaller than $\alpha$, the null hypothesis can be rejected;
    the outcome of the test is regarded as *significant* if $p<0.05$ and is regarded
    as *highly significant* if $p<0.01$.


    A hypothesis test can be performed either as a *one-tailed* (one-sided) or as
    a *two-tailed* (two-sided) test. The term *tail* stems from the concept of tailing
    off the data to the far left or far right of a probability density function, for
    instance, as in the standard normal distribution used in the Mann–Whitney and
    Ansari–Bradley tests (Sects. 3.11 and 3.12). As an example, the Mann–Whitney test
    compares the medians of two data sets. The one-tailed Mann–Whitney test is used
    to test against the alternative hypothesis that the median of the first sample
    is either smaller or larger than the median of the second sample at a significance
    level of 5% (or 0.05). The two-tailed Mann–Whitney test is used when the medians
    are not equal at a 5% significance level, that is, when it makes no difference
    which of the medians is larger. In this case, the significance level is halved,
    that is, 2.5% is used instead of 5%.


    We can display the standard normal distribution for the one-tailed test by typing


    ```python

    %reset -f


    import numpy as np

    import matplotlib.pyplot as plt

    from scipy import stats


    x = np.arange(-4,4,0.001)

    pdf = stats.norm.pdf(x,0.,1.)


    plt.figure()

    plt.plot(x,pdf,color=''k'')

    xint = x[np.where(x>stats.norm.ppf(0.95,0.,1.))]

    pdfint = pdf[np.where(x>stats.norm.ppf(0.95,0.,1.))]

    plt.fill_between(xint,pdfint)

    plt.show()

    ```


    which yields a plot with one blue tail to the right in which the 5% area is shaded
    (Fig. 3.13a). Similarly, we can display the standard normal distribution for the
    two-tailed test by typing


    ```python

    x = np.arange(-4,4,0.001)

    pdf = stats.norm.pdf(x,0.,1.)


    plt.figure()

    plt.plot(x,pdf,color=''k'')

    xint1 = x[np.where(x<stats.norm.ppf(0.05/2,0.,1.))]

    xint2 = x[np.where(x>stats.norm.ppf(1-0.05/2,0.,1.))]

    pdfint1 = pdf[np.where(x<stats.norm.ppf(0.05/2,0.,1.))]

    pdfint2 = pdf[np.where(x>stats.norm.ppf(1-0.05/2,0.,1.))]

    plt.fill_between(xint1,pdfint1,color=(0.3,0.5,0.8))

    plt.fill_between(xint2,pdfint2,color=(0.3,0.5,0.8))

    plt.show()

    ```


    which yields a plot with two blue tails (one to the left and one to the right)
    in which the 2.5% areas are shaded (Fig. 3.13b).


    Note that we cannot prove the null hypothesis: In other words *not guilty* is
    not the same as *innocent*. In practice, we design hypotheses based on our data,
    test them, and then continue to work with those we could not show to be false.
    The inherent possibility of proving a hypothesis to be false is therefore an important
    requirement of our hypotheses.


    The next sections introduce the most important hypothesis tests for earth science
    applications: the two-sample *t*-test for comparing the means of two data sets,
    the two-sample *F*-test for comparing the variances of two data sets, and both
    the $\chi^2$-test and the Kolmogorov–Smirnov test for comparing distributions
    (Sects. 3.7 to 3.10). The Mann–Whitney and Ansari–Bradley tests are alternatives
    to the *t*-test and *F*-test for comparing the medians and dispersions, respectively,
    of two data sets without requiring a normality assumption for the underlying population
    (Sects. 3.11 and 3.12).


    ## 3.7 The t-Test


    *Student''s t-test* was created by William S. Gosset (Student 1908) and compares
    the means of two distributions. The *one-sample t-test* is used to test the hypothesis
    that the mean of a Gaussian-distributed population has a value specified in the
    null hypothesis. The *two-sample t-test* is employed to test the hypothesis that
    the means of two Gaussian distributions are identical. In the following text,
    the two-sample *t*-test is introduced to demonstrate hypothesis testing. Let us
    assume that two independent sets of $n_a$ and $n_b$ measurements have been carried
    out on the same object—for instance, measurements on two sets of rock samples
    taken from two separate outcrops. The *t*-test can be used to determine whether
    both samples come from the same population—for example, the same lithologic unit
    (null hypothesis)—or from two different populations (alternative hypothesis).
    Both sample distributions must be Gaussian, and the variances for the two sets
    of measurements should be similar. The appropriate test statistic for the difference
    between the two means is then


    $$\widehat{t} = \frac{|\overline{a} - \overline{b}|}{\sqrt{\frac{n_a+n_b}{n_a
    n_b} \cdot \frac{(n_a-1) \cdot s_a^2 + (n_b-1) \cdot s_b^2}{n_a+n_b-2}}}$$


    where $n_a$ and $n_b$ are the sample sizes and $s_a^2$ and $s_b^2$ are the variances
    of the two samples $a$ and $b$, respectively. The null hypothesis can be rejected
    if the measured *t*-value is higher than the critical *t*-value, which depends
    on the number of degrees of freedom $\Phi = n_a + n_b - 2$ and the significance
    level $\alpha$. The one-tailed test is used to test against the alternative hypothesis
    that the mean of the first sample is either smaller or larger than the mean of
    the second sample at a significance level of 5% (or 0.05). The one-tailed test
    would require modifying the equation above by replacing the absolute value of
    the difference between the means with the actual difference between the means.
    The two-tailed *t*-test is used when the means are not equal at a 5% significance
    level, that is, when it makes no difference which of the means is larger. In this
    case, the significance level is halved, that is, 2.5% is used to compute the critical
    *t*-value.'
  mdcn: '## 3.6 假设检验


    以下章节将讨论从统计样本中得出结论并将其应用于更广泛目标总体的方法（*假设检验*）（第3.6至3.12节）。所有假设检验都遵循相同的概念和术语。*原假设*是关于总体的陈述，描述的是不存在统计显著特征或效应的情况，而*备择假设*则是与之对立的陈述。假设检验的*p值*是在原假设成立的前提下，观测到比样本计算值更大的检验统计量值的概率。*显著性水平*
    $\alpha$ 是控制检验结果的概率阈值。如果*p*值小于 $\alpha$，则可以拒绝原假设；如果 $p<0.05$，检验结果被视为*显著*；如果 $p<0.01$，则被视为*高度显著*。


    假设检验可以作为*单尾*（单侧）或*双尾*（双侧）检验进行。术语“尾”源于将数据尾部延伸至概率密度函数最左端或最右端的概念，例如在Mann-Whitney和Ansari-Bradley检验（第3.11和3.12节）中使用的标准正态分布。以Mann-Whitney检验为例，它比较两个数据集的中位数。单尾Mann-Whitney检验用于检验备择假设，即在5%（或0.05）的显著性水平下，第一个样本的中位数小于或大于第二个样本的中位数。双尾Mann-Whitney检验则用于在5%显著性水平下检验中位数不相等的情况，即无论哪个中位数更大都无关紧要。在这种情况下，显著性水平减半，即使用2.5%而非5%。


    我们可以通过输入以下代码来显示单尾检验的标准正态分布：


    ```python

    %reset -f


    import numpy as np

    import matplotlib.pyplot as plt

    from scipy import stats


    x = np.arange(-4,4,0.001)

    pdf = stats.norm.pdf(x,0.,1.)


    plt.figure()

    plt.plot(x,pdf,color=''k'')

    xint = x[np.where(x>stats.norm.ppf(0.95,0.,1.))]

    pdfint = pdf[np.where(x>stats.norm.ppf(0.95,0.,1.))]

    plt.fill_between(xint,pdfint)

    plt.show()

    ```


    这将生成一个右侧有一个蓝色尾部的图，其中5%的区域被阴影覆盖（图3.13a）。类似地，我们可以通过输入以下代码来显示双尾检验的标准正态分布：


    ```python

    x = np.arange(-4,4,0.001)

    pdf = stats.norm.pdf(x,0.,1.)


    plt.figure()

    plt.plot(x,pdf,color=''k'')

    xint1 = x[np.where(x<stats.norm.ppf(0.05/2,0.,1.))]

    xint2 = x[np.where(x>stats.norm.ppf(1-0.05/2,0.,1.))]

    pdfint1 = pdf[np.where(x<stats.norm.ppf(0.05/2,0.,1.))]

    pdfint2 = pdf[np.where(x>stats.norm.ppf(1-0.05/2,0.,1.))]

    plt.fill_between(xint1,pdfint1,color=(0.3,0.5,0.8))

    plt.fill_between(xint2,pdfint2,color=(0.3,0.5,0.8))

    plt.show()

    ```


    这将生成一个有两个蓝色尾部（一个在左，一个在右）的图，其中2.5%的区域被阴影覆盖（图3.13b）。


    请注意，我们无法证明原假设：换句话说，*无罪*并不等同于*清白*。在实践中，我们基于数据设计假设，进行检验，然后继续使用那些我们未能证明为假的假设。因此，假设被证明为假的内在可能性是我们假设的一个重要要求。


    接下来的章节将介绍地球科学应用中最重要的假设检验：用于比较两个数据集均值的双样本*t*检验、用于比较两个数据集方差的双样本*F*检验，以及用于比较分布的 $\chi^2$
    检验和Kolmogorov-Smirnov检验（第3.7至3.10节）。Mann-Whitney和Ansari-Bradley检验分别是*t*检验和*F*检验的替代方案，用于比较两个数据集的中位数和离散度，且不要求底层总体满足正态性假设（第3.11和3.12节）。


    ## 3.7 t检验


    *Student''s t检验*由William S. Gosset（Student 1908）创建，用于比较两个分布的均值。*单样本t检验*用于检验一个高斯分布总体的均值是否具有原假设中指定的值。*双样本t检验*用于检验两个高斯分布的均值是否相同。下文将介绍双样本*t*检验以演示假设检验。假设我们对同一对象进行了两组独立的
    $n_a$ 和 $n_b$ 次测量——例如，对来自两个不同露头的两组岩石样本进行测量。*t*检验可用于确定两个样本是否来自同一总体——例如，同一岩性单元（原假设）——还是来自两个不同的总体（备择假设）。两个样本分布都必须是高斯分布，并且两组测量的方差应相似。那么，用于检验两个均值差异的适当检验统计量为：


    $$\widehat{t} = \frac{|\overline{a} - \overline{b}|}{\sqrt{\frac{n_a+n_b}{n_a
    n_b} \cdot \frac{(n_a-1) \cdot s_a^2 + (n_b-1) \cdot s_b^2}{n_a+n_b-2}}}$$


    其中 $n_a$ 和 $n_b$ 是样本量，$s_a^2$ 和 $s_b^2$ 分别是两个样本 $a$ 和 $b$ 的方差。如果测量的*t*值高于临界*t*值，则可以拒绝原假设，临界*t*值取决于自由度
    $\Phi = n_a + n_b - 2$ 和显著性水平 $\alpha$。单尾检验用于检验备择假设，即在5%（或0.05）的显著性水平下，第一个样本的均值小于或大于第二个样本的均值。单尾检验需要修改上述方程，将均值差的绝对值替换为均值的实际差值。双尾*t*检验用于在5%显著性水平下检验均值不相等的情况，即无论哪个均值更大都无关紧要。在这种情况下，显著性水平减半，即使用2.5%来计算临界*t*值。'
