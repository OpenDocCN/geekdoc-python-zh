    \n```python\nb, a = np.shape(I1)\nX, Y = np.meshgrid(np.linspace(0, a+1, a),\n\
    \    np.linspace(0, b+1, b))\n```\n\n```python\nplt.figure()\nfig, ax1 = plt.subplots(subplot_kw={\"\
    projection\": \"3d\"})\nax1.plot_surface(X, Y, I1,\n    rstride=1,\n    cstride=1,\n\
    \    linewidth=0,\n    antialiased=False,\n    shade=True)\nax1.view_init(33,\
    \ 120-90)\nax1.set_zlim(np.min(I1), np.max(I1))\nax1.axis('off')\nplt.show()\n\
    ```\n\n```python\nplt.figure()\nfig, ax2 = plt.subplots(subplot_kw={\"projection\"\
    : \"3d\"})\nax2.plot_surface(X, Y, I5,\n    rstride=1,\n    cstride=1,\n    linewidth=0,\n\
    \    antialiased=False,\n    shade=True)\nax2.view_init(33, 120-90)\nax2.set_zlim(np.min(I1),\
    \ np.max(I1))\nax2.axis('off')\nplt.show()\n```\n\nWe need to convert the image\
    \ data to the class `double` using `im2double` in order to be able to display\
    \ the data using `surface`. Finally, we can display both images in the same figure\
    \ window\n\n```python\nplt.figure()\nplt.subplot(1, 2, 1)\nio.imshow(I1, cmap='gray')\n\
    plt.title('Original image')\nplt.axis('off')\nplt.subplot(1, 2, 2)\nio.imshow(I5,\
    \ cmap='gray')\nplt.title('Despeckled image')\nplt.axis('off')\nio.show()\n```\n\
