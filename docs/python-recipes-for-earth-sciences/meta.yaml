    Numerous formats are available for saving vector and raster data in a file, and
    each format has its own particular advantages and disadvantages. The choice of
    one format over another in an application depends on the way the images are to
    be used in a project and on whether or not the images are to be analyzed quantitatively.
    The most popular formats for storing vector and raster data are:


    - *CompuServe Graphics Interchange Format* (GIF) – This format was developed in
    1987 for raster images that use a fixed 8 bit colormap of 256 colors. The GIF
    uses compression without losing data. It was designed for fast transfer rates
    over the Internet. The limited number of colors means that it is not the right
    format for the smooth color transitions used in aerial photos or satellite images.
    However, the format is often used for line art, maps, cartoons, and logos (http://www.compuserve.com).

    - *Portable Network Graphics* (PNG) – Developed in 1994, this image format is
    used as an alternative to the GIF. It is similar to the GIF in that it also uses
    a fixed 8 bit colormap of 256 colors. Alternatively, grayscale images of 1 to
    16 bits can be stored, as can 24 bit and 48 bit color images. The PNG format uses
    compression without losing data, and the employed method is better than that used
    for GIF images.

    - *Tagged Image File Format* (TIFF) – This format was jointly designed by the
    Aldus Corporation and Microsoft in 1986 with the goal of becoming an industry
    standard for exchanging image files. A TIFF file includes an image file header,
    a directory, and the data in all available graphics and image file formats. Some
    TIFF files even contain vector and raster versions of the same picture as well
    as images at different resolutions and with different colormaps. The main advantage
    of TIFF files was originally their portability. A TIFF should be able to perform
    on all computer platforms; unfortunately, however, numerous modifications to the
    TIFF have evolved in subsequent years, resulting in incompatibilities. The TIFF
    is therefore now often referred to as the *Thousands of Incompatible File Formats*.

    - *PostScript* (PS) and *Encapsulated PostScript* (EPS) – The PS format was developed
    by John Warnock at PARC, the Xerox research institute. Warnock was also co-founder
