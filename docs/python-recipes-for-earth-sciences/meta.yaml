    \ different microfossil assemblages (Birks and Gordon 1985).\n\nNumerous methods\
    \ exist for calculating the similarity or (alternatively) the dissimilarity (or\
    \ distance) between two data vectors. Let us define two data sets consisting of\
    \ multiple measurements from the same object. These data can be described by vectors:\n\
    \n$X_1 = (x_{11}, x_{12}, \\dots, x_{1p})$\n\n$X_2 = (x_{21}, x_{22}, \\dots,\
    \ x_{2p})$\n\nThe most popular measures of dissimilarity (or distance) between\
    \ any two sample vectors are\n\n- the Euclidian distance—This is simply the shortest\
    \ distance between the two points that describe two measurements in the multivariate\
    \ space:\n\n$$\\Delta_{12} = \\sqrt{(x_{11} - x_{21})^2 + (x_{12} - x_{22})^2\
    \ + \\dots + (x_{1p} - x_{2p})^2}$$\n\nThe Euclidian distance is certainly the\
    \ most intuitive measure of similarity. However, in heterogeneous data sets consisting\
    \ of a number of different types of variables, a better alternative would be\n\
    \n- the Manhattan (or city block) distance—In the city of Manhattan, it is necessary\
    \ to follow perpendicular avenues rather than crossing blocks diagonally. The\
    \ Manhattan distance is therefore the sum of all differences:\n\n$$\\Delta_{12}\
    \ = |x_{11} - x_{21}| + |x_{12} - x_{22}| + \\dots + |x_{1p} - x_{2p}|$$\n\nMeasures\
    \ of similarity include\n\n- the *correlation similarity coefficient*—This measure\
    \ uses Pearson’s linear product-moment correlation coefficient to compute the\
    \ similarity between two objects:\n\n$$r_{X_1X_2} = \\frac{\\sum_{i=1}^{n} (x_{1i}\
    \ - \\bar{x}_1)(x_{2i} - \\bar{x}_2)}{(n - 1)s_{X_1}s_{X_2}}$$\n\nThe measure\
    \ is used if a researcher is interested in the ratios between the variables measured\
    \ on the objects. However, Pearson’s correlation coefficient is highly sensitive\
    \ to outliers and should be used with care (see also Sect. 4.2).\n\n- the *inner-product\
    \ similarity index*—Normalizing the length of the data vectors to a value of one\
