    The next sections introduce the most important hypothesis tests for earth science
    applications: the two-sample *t*-test for comparing the means of two data sets,
    the two-sample *F*-test for comparing the variances of two data sets, and both
    the $\chi^2$-test and the Kolmogorov–Smirnov test for comparing distributions
    (Sects. 3.7 to 3.10). The Mann–Whitney and Ansari–Bradley tests are alternatives
    to the *t*-test and *F*-test for comparing the medians and dispersions, respectively,
    of two data sets without requiring a normality assumption for the underlying population
    (Sects. 3.11 and 3.12).


    # 3.7 The t-Test


    *Student''s t-test* was created by William S. Gosset (Student 1908) and compares
    the means of two distributions. The *one-sample t-test* is used to test the hypothesis
    that the mean of a Gaussian-distributed population has a value specified in the
    null hypothesis. The *two-sample t-test* is employed to test the hypothesis that
    the means of two Gaussian distributions are identical. In the following text,
    the two-sample *t*-test is introduced to demonstrate hypothesis testing. Let us
    assume that two independent sets of $n_a$ and $n_b$ measurements have been carried
    out on the same object—for instance, measurements on two sets of rock samples
    taken from two separate outcrops. The *t*-test can be used to determine whether
    both samples come from the same population—for example, the same lithologic unit
    (null hypothesis)—or from two different populations (alternative hypothesis).
    Both sample distributions must be Gaussian, and the variances for the two sets
    of measurements should be similar. The appropriate test statistic for the difference
    between the two means is then


    $$\widehat{t} = \frac{|\overline{a} - \overline{b}|}{\sqrt{\frac{n_b+n_b}{n_a
    n_b} \cdot \frac{(n_a-1) \cdot s_a^2 + (n_b-1) \cdot s_b^2}{n_a+n_b-2}}}$$


    where $n_a$ and $n_b$ are the sample sizes and $s_a^2$ and $s_b^2$ are the variances
    of the two samples $a$ and $b$, respectively. The null hypothesis can be rejected
    if the measured *t*-value is higher than the critical *t*-value, which depends
    on the number of degrees of freedom $\Phi = n_a + n_b - 2$ and the significance
    level $\alpha$. The one-tailed test is used to test against the alternative hypothesis
    that the mean of the first sample is either smaller or larger than the mean of
    the second sample at a significance level of 5% (or 0.05). The one-tailed test
    would require modifying the equation above by replacing the absolute value of
    the difference between the means with the actual difference between the means.
    The two-tailed *t*-test is used when the means are not equal at a 5% significance
    level, that is, when it makes no difference which of the means is larger. In this
    case, the significance level is halved, that is, 2.5% is used to compute the critical
    *t*-value.'
