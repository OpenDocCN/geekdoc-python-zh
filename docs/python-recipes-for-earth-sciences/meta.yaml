    \n### 6.1 Introduction\n\nSignal processing involves techniques for manipulating\
    \ a signal in order to minimize the effects of noise, to correct all kinds of\
    \ unwanted distortions, and to separate out various components of interest. Most\
    \ signal processing algorithms include the design and realization of filters.\
    \ A *filter* can be described as a system that transforms signals. *System theory*\
    \ provides the mathematical background for filter design and realization. A filter\
    \ has an input and an output, with the *output signal y(t)* being modified with\
    \ respect to the *input signal x(t)* (Fig. 6.1). The *signal transformation* can\
    \ be carried out through a mathematical process known as *convolution* or, if\
    \ filters are involved, as *filtering*.\n\nThis chapter deals with the design\
    \ and realization of *digital filters* with the help of a computer. However, many\
    \ natural processes resemble *analog filters* that record natural events in geological\
    \ archives. A single rainfall event is not documented in lake sediments because\
    \ the short-duration and low-amplitude signal of the event in the sediments (e.g.,\
    \ a short-term change in the chemical composition of the sediments) is strongly\
    \ attenuated in the well-mixed water body before it is archived in the sediments.\
    \ Bioturbation also introduces serious signal distortions (e.g., changes in the\
    \ amplitude and phase of the signal), such as in deep-sea sediments, where it\
    \ leads to apparent phase shifts in the oxygen-isotope signal of individual foraminifera\
    \ species (e.g., Trauth 2013). In addition to such natural filters, the field\
    \ collection and sampling of geological data alters and smooths the data with\
    \ respect to its original form. For example, a finite-sized sediment sample is\
    \ integrated over a certain period of time, which smooths the natural signal.\
    \ Similarly, the measurement of magnetic susceptibility in a sediment core with\
    \ the help of a loop sensor introduces substantial smoothing since the loop response\
    \ is integrated over a section of the core.\n\nThe characteristics of these natural\
    \ filters are often difficult to determine, whereas numerical filters are designed\
    \ with well-defined characteristics. In addition, artificial filters are time\
    \ invariant in most cases, whereas natural filters (e.g., mixing within the water\
    \ body of a lake or bioturbation at the water–sediment interface) may vary with\
    \ time. An easy way of describing or predicting the effect of a filter is by exploring\
    \ the filter output from a simple input signal, such as a sine wave, a square\
    \ wave, a sawtooth function, a ramp function, or a step function. Although there\
    \ is an endless variety of such input signals, most systems or filters are described\
    \ by their impulse response, that is, the output resulting from the input of a\
    \ unit impulse.\n\nThis chapter proceeds with Sect. 6.2 on generating periodic\
    \ signals, trends, and noise, which takes its cue from Sect. 5.2 of the previous\
    \ chapter. Section 6.3 then considers linear time-invariant systems and provides\
    \ a mathematical background for filters. The subsequent Sects. 6.4 to 6.9 deal\
    \ with the design, realization, and application of linear time-invariant filters.\
    \ Section 6.10 then considers the use of adaptive filters, which were originally\
    \ developed for use in the telecommunication industry. These adaptive filters\
    \ automatically extract noise-free signals from duplicate measurements of the\
    \ same object. Such filters can be used in a large number of applications, such\
    \ as in removing noise from duplicate paleoceanographic time series and in improving\
    \ the signal-to-noise ratio of parallel color intensity transects across varved\
    \ lake sediments (see Chap. 5, Fig. 5.1). Adaptive filters are also widely used\
    \ in geophysics for noise canceling. For signal processing, we use the NumPy (https://numpy.org),\
    \ Matplotlib (https://matplotlib.org), and SciPy (https://scipy.org) packages,\
    \ which contain all the necessary routines.\n\n### 6.2 Generating Signals\n\n\
    Python provides numerous tools for generating basic signals that can be used to\
    \ illustrate the effects of filters. In Chap. 5, we generated a signal by adding\
    \ together three sine waves with different amplitudes and periods. In the following\
    \ example, the time array is transposed in order to generate column arrays:\n\n\
    ```python\n%reset -f\n\nimport numpy as np\nimport matplotlib.pyplot as plt\n\n\
    t = np.linspace(1,100,100)\nx = 2 *np.sin(2*np.pi*t/50) + \\\n    np.sin(2*np.pi*t/10)\
    \ + \\\n    0.5*np.sin(2*np.pi*t/5)\n\nplt.figure()\nplt.plot(t,x)\nplt.axis(np.array([0,100,-4,4]))\n\
    plt.show()\n```\n\nFrequency-selective filters are used to remove specific frequency\
    \ bands from the data. As an example, we can design a filter that suppresses the\
    \ portion of the signal with a periodicity of τ = 10 while leaving the other two\
    \ cycles unaffected. The effects of such filters on simple periodic signals can\
    \ also be used to predict signal distortions of natural filters.\n\nA *step function*\
    \ is another basic input signal that can be used to explore filter characteristics.\
    \ Step functions describe the transition from a value of one toward a value of\
    \ zero at a specific time. The function `stairs()` draws a stirstep graph of the\
    \ elements of x. The function needs edges e, which we calculate from t:\n\n```python\n\
    t = np.linspace(1,100,100)\nx = np.ones(100)\nx[51:100] = np.zeros(49)\n\ne =\
    \ np.zeros(101)\ne[0] = np.diff(t[0:2])/2\ne[1:101] = t+np.diff(t[0:2])/2\n\n\
    plt.figure()\nplt.stairs(x,e)\nplt.axis(np.array([0,100,-4,4]))\nplt.show()\n\
    ```\n\nThis signal can be used to study the effects of a filter on a sudden transition.\
    \ An abrupt climate change could be regarded as an example. Most natural filters\
    \ tend to smooth such a transition and to distribute it over a longer time period.\n\
    \nA *unit impulse* is a third important signal type that we use in the following\
    \ examples. This signal equals zero at all times except at a single data point,\
    \ where it equals one. The function `stem()` plots the data sequence x as stems\
    \ from the *t*-axis using circles for the data values:"
