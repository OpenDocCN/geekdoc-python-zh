    plt.show()\n```\n\n## 9.7 艾奇逊对数比变换\n\n任何处理过成分数据统计分析的人，都一定遇到过约翰·艾奇逊（John Aitchison，1926–2016）的对数比变换。这位苏格兰统计学家将他职业生涯的大部分时间都用于处理此类数据的统计问题。事实上，他撰写了著名的著作《成分数据分析》（*The\
    \ Statistical Analysis of Compositional Data*）（Aitchison 1984, 1986, 1999, 2003），并发表了多篇关于该主题的论文。艾奇逊的对数比变换克服了封闭数据（即表示为比例并加到固定总数（如100%）的数据）的封闭和问题。封闭和问题导致多元数据集中变量对之间出现虚假的负相关，而通过对这些变量的比值取对数可以避免这种问题。例如，古气候研究中的多指标数据通常是封闭数据（即它们受稀释效应的影响很大）。在最简单的例子中，这可能是三种成分的混合物，它们共同构成了沉积物的100%。想象一下，其中一种成分现在是恒定的（即单位时间内输送的该成分量总是相同的）。由于三种成分的总和始终是100%，因此另外两种成分必然是负相关的：如果一个增加，另外两个必须减少相同的总量。\n\
    \n使用比值有助于克服成分数据的大小实际上是比值的问题，其分母是所有成分浓度的总和（关于艾奇逊对数比变换的简要总结，请参见Davis 2003）。然而，比值的乘积矩协方差难以处理，并导致复杂的乘积和商。因此，约翰·艾奇逊建议对这些比值取对数，从而"
