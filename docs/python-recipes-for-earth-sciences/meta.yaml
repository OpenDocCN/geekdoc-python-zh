    The characteristics of these natural filters are often difficult to determine,
    whereas numerical filters are designed with well-defined characteristics. In addition,
    artificial filters are time invariant in most cases, whereas natural filters (e.g.,
    mixing within the water body of a lake or bioturbation at the water–sediment interface)
    may vary with time. An easy way of describing or predicting the effect of a filter
    is by exploring the filter output from a simple input signal, such as a sine wave,
    a square wave, a sawtooth function, a ramp function, or a step function. Although
    there is an endless variety of such input signals, most systems or filters are
    described by their impulse response, that is, the output resulting from the input
    of a unit impulse.


    This chapter proceeds with Sect. 6.2 on generating periodic signals, trends, and
    noise, which takes its cue from Sect. 5.2 of the previous chapter. Section 6.3
    then considers linear time-invariant systems and provides a mathematical background
    for filters. The subsequent Sects. 6.4 to 6.9 deal with the design, realization,
    and application of linear time-invariant filters. Section 6.10 then considers
    the use of adaptive filters, which were originally developed for use in the telecommunication
    industry. These adaptive filters automatically extract noise-free signals from
    duplicate measurements of the same object. Such filters can be used in a large
    number of applications, such as in removing noise from duplicate paleoceanographic
    time series and in improving the signal-to-noise ratio of parallel color intensity
    transects across varved lake sediments (see Chap. 5, Fig. 5.1). Adaptive filters
    are also widely used in geophysics for noise canceling. For signal processing,
    we use the NumPy (https://numpy.org), Matplotlib (https://matplotlib.org), and
    SciPy (https://scipy.org) packages, which contain all the necessary routines.


    # 6.2 Generating Signals


    Python provides numerous tools for generating basic signals that can be used to
    illustrate the effects of filters. In Chap. 5, we generated a signal by adding
    together three sine waves with different amplitudes and periods. In the following
    example, the time array is transposed in order to generate column arrays:'
