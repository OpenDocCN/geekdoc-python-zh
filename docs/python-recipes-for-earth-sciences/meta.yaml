  md: '128 64 32 16 8 4 2 1 (value of the bit)

    1 0 1 0 0 0 0 1 (binary)


    128 + 0 + 32 + 0 + 0 + 0 + 0 + 1 = 161 (decimal)


    The end members of the binary representation of grayscale are


    0 0 0 0 0 0 0 0


    which is pure black, and


    1 1 1 1 1 1 1 1


    which is pure white. In contrast to the 1 bit array above, the 1 byte array allows
    a grayscale image of 256 different levels to be stored. Alternatively, the 256
    numbers could be interpreted as 256 discrete colors. In either case, displaying
    such an image requires an additional source of information concerning how the
    256 intensity values are converted to colors. Numerous global colormaps for interpreting
    8 bit color images exist that allow raster images to be exchanged across platforms,
    whereas local colormaps are often embedded in a graphics file.


    The disadvantage of 8 bit color images is that the 256 discrete colorsteps are
    not enough to simulate smooth transitions for the human eye. A 24 bit system is
    therefore used in many applications, with 8 bits of data for each RGB channel
    creating a total of 256^3 = 16,777,216 colors. Such a 24 bit image is stored in
    three 2D arrays (or in one 3D array) of intensity values between 0 and 255:


    195 189 203 217 217 221

    218 209 187 192 204 206

    207 219 212 198 188 190

    203 205 202 202 191 201

    190 192 193 191 184 190

    186 179 178 182 180 169


    209 203 217 232 232 236

