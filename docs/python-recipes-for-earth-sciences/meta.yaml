    The SRTM subset is now analyzed for slope and aspect. When working with DEMs on
    a regular grid, the slope and aspect can be estimated using centered finite differences
    in a local 3-by-3 neighborhood. Figure 7.14 shows a local neighborhood using the
    Python indexing convention. To calculate the slope and aspect, we need two finite
    differences in the DEM elements z in the x and y directions:


    $$z_x = \frac{z_{r,c-1} - z_{r,c+1}}{2h}$$


    and


    $$z_y = \frac{z_{r-1,c} - z_{r+1,c}}{2h}$$


    where h is the cell size and has the same units as the elevation. Using the finite
    differences, the slope is then calculated by


    $$slp_{DF} = \sqrt{z_x^2 + z_y^2}$$


    Other primary relief attributes (e.g., the aspect, the plan, the profile, and
    the tangential curvature) can be derived in a similar way using finite differences
    (Wilson and Gallant 2000). The function gradient() calculates the slope and aspect
    of a data grid z in degrees above the horizontal and degrees clockwise from north.
    Since the SRTM digital elevation model is sampled on a 3 arc-second grid, 60·60/3=1,200
    elements of the DEM correspond to one degree of longitude or latitude. For simplicity,
    we ignore the actual coordinates of the SRTM subset in this example and instead
    use the indices of the DEM elements:


    ```

    x,y = np.gradient(SRTM)


    slp = np.sqrt(x**2+y**2)/90

    slp = np.arctan(slp)*180./np.pi

    asp = np.arctan2(x,y)

    asp = asp*180./np.pi

    asp[asp<0] = asp[asp<0]+360

