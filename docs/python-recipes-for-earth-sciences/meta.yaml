    \ Python 编码。\n\nPython 使用两种类型的 `.py` 文件：脚本和函数。脚本是一系列操作工作区中数据的命令，而函数是具有输入变量（或输入参数）和输出变量（或输出参数）的真正算法。现在通过一个示例来说明这两种\
