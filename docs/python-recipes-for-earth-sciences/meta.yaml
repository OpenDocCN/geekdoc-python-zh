    shows the noise extracted from the signal. Here, we can observe some signal components
    that have been removed by the filter in error from within the noise-free segment
    of the time series beyond the change point in the signal-to-noise ratio. Using
    the last output of canc(), we can calculate and display the filter weights w of
    the final iteration,


    ```

    X = np.linspace(1,5,5)

