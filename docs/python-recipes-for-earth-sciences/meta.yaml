  md: 'The Blackman–Tukey method uses the complex Fourier transform $X_{xy}(f)$ of
    the cross-correlation sequence $corr_{xy}(k)$,


    $$X_{xy}(f) = \sum_{k=0}^{m} corr_{xy}(k)e^{i2\pi fk/f_s}$$


    where $m$ is the maximum lag and $f_s$ is the sampling frequency. The absolute
    value of the complex Fourier transform $X_{xy}(f)$ is the cross-spectrum, while
    the angle of $X_{xy}(f)$ represents the phase spectrum. The phase difference is
    important in calculating leads and lags between two signals, which is a measure
    often used to propose causalities between two processes that have been documented
    by the signals. The correlation between two spectra can be calculated by means
    of the coherence:


    $$C_{xy} = \frac{|X_{xy}(f)|^2}{X_{xx}(f)X_{yy}(f)}$$


    The coherence is a real number between 0 and 1, where 0 indicates no correlation
    and 1 indicates maximum correlation between $x(t)$ and $y(t)$ at frequency $f$.
    A certain degree of coherence is an important precondition for computing phase
    shifts between two signals.


    # 5.4 Examples of Auto-Spectral and Cross-Spectral Analysis


    The *SciPy* package provides numerous methods for spectrally analyzing time series.
    As an example, `periodogram()` computes the power spectral density Pxx of a time
    series x(t) using the periodogram method. This method was invented by Arthur Schuster
    in 1898 and calculates the power spectrum by performing a Fourier transform directly
    on a sequence without requiring prior calculation of the autocorrelation sequence.
    At the time of its introduction in 1958, indirectly computing the power spectrum
    via an autocorrelation sequence was faster than directly calculating the Fourier
    transformation for the full data series x(t). After the introduction both of the
    Fast Fourier Transform (FFT) by Cooley and Tukey (1965) and of subsequent faster
    computer hardware, the higher computing speed of the Blackman–Tukey approach compared
    with the periodogram method became relatively unimportant.


    For this next example, we again use the synthetic time series x, xns, and xt generated
    in Sect. 5.2 as the input data:


    ```

    %reset -f


    import numpy as np

    import matplotlib.pyplot as plt

    from scipy import signal

    ```'
