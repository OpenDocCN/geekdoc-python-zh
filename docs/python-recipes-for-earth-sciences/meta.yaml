    ```\n\nThis command also saves the RGB composite as the TIFF file *naivasha.tif*\
    \ (~52 MB) in the working directory, and the file can then be processed using\
    \ other software, such as Adobe Photoshop. The processed ASTER image does not\
    \ yet have a coordinate system and therefore needs to be tied to a geographical\
