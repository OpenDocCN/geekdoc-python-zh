    and $\Phi_2$.


    # $\chi^2$- (or Chi-Squared-)Distribution


    The $\chi^2$-distribution was introduced by Friedrich Helmert (1876) and Karl
    Pearson (1900). This distribution has important applications in statistical hypothesis
    testing (Sect. 3.9). The probability density function of the $\chi^2$-distribution
    is


    $$f(x) = \frac{1}{2^{\Phi/2}\Gamma(\Phi/2)}x^{\frac{\Phi}{2}-1}e^{-\frac{x}{2}}$$


    where $x>0$; otherwise, $f(x)=0$. Once again, $\Gamma$ is the Gamma function,
    and $\Phi$ is the number of degrees of freedom (Fig. 3.11).


