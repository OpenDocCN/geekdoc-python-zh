    \ triplets, where *x* and *y* are spatial coordinates and *z* is the variable\
    \ of interest. In such cases, most gridding methods require continuous and unique\
    \ data. However, spatial variables in the earth sciences are often discontinuous\
    \ and not spatially unique: For example, the sandstone unit may be faulted or\
    \ folded. Furthermore, gridding requires spatial autocorrelation, that is, the\
    \ neighboring data points should be correlated with one another through a specific\
    \ relationship. There is no point in making a surface estimation if the *z* variables\
    \ are random and have no autocorrelation. After selecting the control points,\
    \ a number of different methods are available for calculating the *z*-values at\
    \ the evenly spaced grid points.\n\nVarious techniques exist for selecting the\
    \ control points. Most methods make arbitrary assumptions about the autocorrelation\
    \ of the *z*-variable. The *nearest neighbor criterion* includes all control points\
    \ within a circular neighborhood of the grid point, and the radius of the circle\
    \ is specified by the user (Fig. 7.5a). Since the degree of spatial autocorrelation\
    \ likely decreases with increasing distance from the grid point, considering too\
    \ many distant control points at once likely leads to erroneous results when computing\
    \ values for these grid points. On the other hand, using radii that are too small\
    \ may limit the total control points used in calculating the grid point values\
    \ to a very small number, thereby resulting in a highly error-prone estimate of\
    \ the modeled surface."
