    \n递归量化分析度量显示在高自相关部分内有一个明显的转变。在这一点上，度量值较高，这反映了黑点密度较高、由于自相关导致的邻域配置变化以及系统动力学的变化。这些较高值的存在可用于检测自相关性的这种变化（例如，作为*临界点*的前兆），并最终预测临界点本身。两个空象限在时间1,000处发生的转变点直接干扰移动窗口，从而导致*RR*度量突然下降。\n\
