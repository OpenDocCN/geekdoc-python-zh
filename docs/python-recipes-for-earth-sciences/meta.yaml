    plt.show()\n```\n\n# 9.7 Aitchison’s Log-Ratio Transformation\n\nAnyone who has\
    \ ever dealt with the statistical analysis of compositional data must have stumbled\
    \ across John Aitchison’s (1926–2016) log-ratio transformation. The Scottish statistician\
    \ spent much of his career dealing with the statistics of such data. Indeed, he\
    \ wrote the famous book *The Statistical Analysis of Compositional Data* (Aitchison\
    \ 1984, 1986, 1999, 2003) and published multiple papers on the topic. Aitchison’s\
    \ log-ratio transformation overcomes the closed-sum problem of closed data (i.e.,\
    \ data that are expressed as proportions and added to a fixed total, such as 100%).\
    \ The closed-sum problem causes spurious negative correlations between pairs of\
    \ variables in multivariate data sets, which are avoided by logarithmizing ratios\
    \ of these variables. As an example, multiproxy data in paleoclimate studies are\
    \ often closed data (i.e., they are very much influenced by dilution effects).\
    \ In the simplest example, this could be a mixture of three components that together\
    \ make up 100% of the sediment. Imagine that one of the components is now constant\
    \ (i.e., the same amount of this component is always delivered per unit time).\
    \ Since the total of all three components is always 100%, the other two components\
    \ are necessarily anticorrelated: If one goes up, the other two must go down by\
    \ the same total amount.\n\nUsing ratios helps to overcome the problem that the\
    \ magnitudes of compositional data are actually ratios whose denominators are\
    \ the sums of the concentrations of all constituents (see Davis 2003 for a short\
    \ summary of Aitchison’s log-ratio transformation). However, the product-moment\
    \ covariances of ratios are awkward to manipulate and result in complicated products\
    \ and quotients. John Aitchison therefore suggested taking the logarithms of these\
    \ ratios and thereby"
