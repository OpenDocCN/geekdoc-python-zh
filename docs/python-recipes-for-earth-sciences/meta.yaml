    \ 循环）和条件语句（例如，*if* 语句）。由于本书不深入探讨 Python 的编程能力，以下对控制流基础的介绍相当简略，并省略了高效编程的某些重要方面。本介绍仅限于两种最重要的控制流语句类型：前述的\
