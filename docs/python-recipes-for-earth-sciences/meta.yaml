  md: 'carefully about the most suitable way of storing the data. The default floating-point
    data type in Python is the 64 bit array, which allows for storing the sign of
    a number (bit 63), the exponent (bits 62 to 52), and roughly 16 significant decimal
    digits between approximately 10⁻³⁰⁸ and 10⁺³⁰⁸ (bits 51 to 0). However, Python
    also works with other data types (e.g., 1 bit, 8 bit, and 24 bit raster data)
    in order to save memory space.


    The amount of memory required for storing a raster image depends on the data type
    and the dimensions of the image. These image dimensions can be described by the
    number of pixels, which is the number of rows multiplied by the number of columns
    of the 2D array. Let us assume an image of 729-by-713 pixels, such as the one
    we use in the following section. If each pixel needs 8 bits to store a gray-scale
    value, the memory required by the data is 729 · 713 · 38 = 4,158,216 its (or 519,777
    bytes). This number is exactly what we obtain by typing whos in the command window.
    Common prefixes for bytes include kilo, mega, giga, and so forth:


    ```

    bit = 1 or 0 (b)

    8 bits = 1 byte (B)

    1024 bytes = 1 kilobyte (kB)

    1024 kilobytes = 1 megabyte (MB)

    1024 megabytes = 1 gigabyte (GB)

    1024 gigabytes = 1 terabyte (TB)

    ```


    Note that in data communication, 1 kilobit=1,000 bits, while in data storage,
    1 kilobyte=1,024 bytes. A 24 bit image (known as a *true-color image*) then requires
    three times the memory needed to store an 8 bit image, or 1,559,331 bytes =1,559,331/1,024
    kilobytes (kB)=1,523 kB≈1,559,331/1,024² =1.487 megabytes (MB).


    However, the dimensions of an image are often given not by the total number of
    pixels, but by the length and height of the image as well as by its resolution.
    The resolution of an image is the number of *pixels per inch* (ppi) or *dots per
    inch* (dpi) it contains. The standard resolution of a computer display remained
    at 72 dpi for a long time, but modern displays have a higher resolution, such
    as 96 dpi or even higher. In fact, the 5 K display (on which this very sentence
    is being written) has~218 dpi. Thus, a 17 inch display with a 72 dpi resolution
    displays 1,024-by-768 pixels. If the display is used for images of a different
    (lower or higher) resolution, the image is resampled to match the display’s resolution.
    For scanning and printing, a resolution of 300 or 600 dpi is enough in most applications.
    However, scanned images are often scaled for large printouts and therefore often
    have higher resolutions, such as 2,400 dpi. The image used in the next section
    has a width of 25.2 cm (or 9.92 inches) and a height of 25.7 cm (10.12 inches).
    The resolution of the image is 72 dpi. The total number of pixels is therefore
    72 · 9.92 ≈ 713 in a horizontal direction and 72 · 10.12 ≈ 729 in a vertical direction.


    Numerous formats are available for saving vector and raster data in a file, and
    each format has its own particular advantages and disadvantages. The choice of'
  merge: -1
  pgno: 335
- img_proc: true
  md: 'one format over another in an application depends on the way the images are
    to be used in a project and on whether or not the images are to be analyzed quantitatively.
    The most popular formats for storing vector and raster data are


    +   - *CompuServe Graphics Interchange Format* (GIF) – This format was developed
    in 1987 for raster images that use a fixed 8 bit colormap of 256 colors. The GIF
    uses compression without losing data. It was designed for fast transfer rates
    over the Internet. The limited number of colors means that it is not the right
    format for the smooth color transitions used in aerial photos or satellite images.
    However, the format is often used for line art, maps, cartoons, and logos (http://www.compuserve.com).

    - *Portable Network Graphics* (PNG) – Developed in 1994, this image format is
    used as an alternative to the GIF. It is similar to the GIF in that it also uses
    a fixed 8 bit colormap of 256 colors. Alternatively, grayscale images of 1 to
    16 bits can be stored, as can 24 bit and 48 bit color images. The PNG format uses
    compression without losing data, and the employed method is better than that used
    for GIF images.

    - *Tagged Image File Format* (TIFF) – This format was jointly designed by the
    Aldus Corporation and Microsoft in 1986 with the goal of becoming an industry
    standard for exchanging image files. A TIFF file includes an image file header,
    a directory, and the data in all available graphics and image file formats. Some
    TIFF files even contain vector and raster versions of the same picture as well
    as images at different resolutions and with different colormaps. The main advantage
    of TIFF files was originally their portability. A TIFF should be able to perform
    on all computer platforms; unfortunately, however, numerous modifications to the
    TIFF have evolved in subsequent years, resulting in incompatibilities. The TIFF
    is therefore now often referred to as the *Thousands of Incompatible File Formats*.

    - *PostScript* (PS) and *Encapsulated PostScript* (EPS) – The PS format was developed
    by John Warnock at PARC, the Xerox research institute. Warnock was also co-founder
    of Adobe Systems, where the EPS format was created. The PostScript vector format
    would never have become an industry standard without Apple Computers. In 1985,
    Apple needed a typesetter-quality controller for the new Apple LaserWriter printer
    and the Macintosh operating system, and the company thus adopted the PostScript
    format. The third partner in the history of PostScript was Aldus, which developed
    the PageMaker software and is now part of Adobe Systems. The combination of Aldus
    PageMaker software, the PS format, and the Apple LaserWriter printer led to the
    creation of desktop publishing. The EPS format was then developed by Adobe Systems
    as a standard file format for importing and exporting PS files. Whereas a PS file
    is generally a single-page format that contains either an illustration or a text,
    the purpose of an EPS file is to also allow other pages to be included (i.e.,
    a file that can contain any combination of text, graphics and images) (http://www.adobe.com).'
  merge: -1
