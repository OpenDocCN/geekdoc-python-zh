    plt.show()\n```\n\n函数 `stem()` 将数据序列 x6 绘制为从 x 轴出发、末端带有表示数据值的圆圈的茎状图。这比使用 `plot()`\
    \ 生成的连续线更适合绘制数字数据。我们现在将 x6 输入滤波器并探索输出 y6。脉冲响应与非递归滤波器的权重相同：\n\n```python\nb6 =\
    \ np.array([1,1,1,1,1])/5\nm6 = len(b6)\n\ny6 = signal.lfilter(b6,1,x6)\n```\n\
