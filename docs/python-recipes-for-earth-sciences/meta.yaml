    The sampling frequency $f_s$ is the inverse of the sampling interval $\Delta t$.
    We generally try to sample at regular time intervals or constant sampling frequencies,
    but in many earth science examples, this is not possible. As an example, imagine
    deep-sea sediments sampled at five-centimeter intervals along a sediment core.
    Radiometric age determinations at certain levels in the sediment core have revealed
    substantial fluctuations in sedimentation rates. Despite the even spacing along
    the sediment core of the samples, these samples are not equally spaced on the
    time axis. Hence, the quantity


    $$\Delta t = T/n$$


    (where $T$ is the full length of the time series and $n$ is the number of data
    points) represents only an average sampling interval. In general, a time series
    $x(t_k)$ can be represented as the linear sum of a periodic component $x_p(t_k)$,
    a trend $x_{tr}(t_k)$, and random noise $x_{ns}(t_k)$:


    $$x(t_k) = x_p(t_k) + x_{tr}(t_k) + x_{ns}(t_k)$$


    The decomposition of a climate signal into periodic, trend, and noise components
    (shown above) corresponds to the definition of climate in terms of trend and variability,
    which was developed at the end of the 19th century (Brückner 1890; Hann 1901;
    Köppen 1931). Mudelsee (2014) added an extremal component $x_e(t_k)$ both to facilitate
    the analysis and to recognize the growing importance of climate extremes as documented,
    for example, in the Fourth Assessment Report by the IPCC (Solomon et al. 2007).
    The long-term component $x_{tr}(t_k)$ is a linear or higher-degree trend that
    can be removed by fitting a polynomial of a certain degree and subtracting the
    values of this polynomial from the data (see Chap. 4). Methods for removing noise
    $x_{ns}(t_k)$ are described in Chap. 6. The periodic (or, in a mathematically
    less rigorous sense, cyclic) component $x_p(t_k)$ can be approximated by a linear
    combination of sine (or cosine) waves that have different amplitudes $A_i$, frequencies
    $f_i$, and phase angles $\psi_i$:


    $$x_p(t_k) = \sum_i A_i \cdot \sin(2\pi f_i t_k - \psi_i)$$


    The phase angle $\psi$ helps in detecting temporal shifts between signals of the
    same frequency. Two signals $x$ and $y$ with the same period are out of phase
    unless the difference between $\psi_x$ and $\psi_y$ is equal to zero (Fig. 5.2).


    The frequency $f$ of a periodic signal is the inverse of the period $\tau$. The
    *Nyquist frequency* $f_{nyq}$ is half the sampling frequency $f_s$ and represents
    the maximum frequency that the data can produce. This frequency, which was defined
    by American mathematician Claude Elwood Shannon and named after Swedish-American
    electrical engineer Harry Nyquist, prevents the phenomenon of *aliasing* in time-discrete
    systems. Aliasing means that ambiguities occur in digital signals if the sampling
    frequency is too low. As an example, audio compact disks (CDs) are sampled at
    frequencies of 44,100 Hz (Hz, where 1 Hz = 1 cycle per second), but the corresponding
    Nyquist frequency is 22,050 Hz, which is the highest frequency a CD player can
    theoretically produce. The performance limitations of anti-alias filters used
