    as well as Fe$^{2+}$ and Mg$^{2+}$ in silicates.


    A second important suite of multivariate methods aims at grouping objects by their
    similarity. As an example, *cluster analysis* (CA) is often used to correlate
    volcanic ash layers, such as those in the example above. Tephrochronology attempts
    to correlate tephra by means of their geochemical fingerprints. When combined
    with a few radiometric age determinations from key ash layers, this method allows
    for correlations between different sedimentary sequences that contain these ash
    layers (e.g., Westgate 1998; Hermanns et al. 2000). Cluster analysis is also used
    in the field of micropaleontology, for example, to compare different microfossil
    assemblages (e.g., Birks and Gordon 1985).


    A third group of methods is concerned with classifying observations. Humans tend
    to want to classify the things around them even though nature rarely falls into
    discrete classes. Classification (or categorization) is useful because it can,
    for example, help decision-makers to take the necessary precautions to reduce
    risks when drilling an oil well or when assigning fossils to a particular genus
    or species. Most classification methods make decisions based on Boolean logic
    with two options, true or false, as in the use of a threshold value for identifying
    charcoal in microscope images (Sect. 8.11). Alternatively, fuzzy logic (which
    is not explained in this book) is a generalization of binary Boolean logic with
    respect to many real-world problems in decision-making, in which gradual transitions
    are reasonable (Zadeh 1965).


    The following sections introduce the most important techniques of multivariate
    statistics. To begin, *principal component analysis* (PCA) and *cluster analysis*
    (CA) are introduced in Sects. 9.2 and 9.5, respectively, and *independent component*'
