    ```python\nplt.figure()\nplt.plot(series2[0::,0],series2[0::,1],\n    'ko',markersize=1)\n\
    plt.plot(t,series2L,'b-',linewidth=0.5)\nplt.plot(t,series2S,'r-',linewidth=0.5)\n\
