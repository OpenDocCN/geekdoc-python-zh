    \    cmap='jet',\n    shading='auto')\nax.set_aspect('equal','box')\nplt.colorbar(im,ax=ax,orientation='horizontal')\n\
    ax.set_xlabel('x-coordinates')\nax.set_ylabel('y-coordinates')\n```\n\nThe left-hand-side\
    \ subplot presents the kriging variance,\n\n```\nax = axs[1]\naxs[1].pcolor(Xg1,Xg2,SK,\n\
    \    cmap='jet',\n    shading='auto')\n```\n\nand we overlay the sampling positions:\n\
    \n```\nplt.plot(x,y,\n    marker='o',\n    markerfacecolor='none',\n    markeredgecolor='k',\n\
    \    linestyle='none')\nax.set_aspect('equal','box')\nplt.colorbar(im,ax=ax,orientation='horizontal')\n\
    ax.set_xlabel('x-coordinates')\nax.set_ylabel('y-coordinates')\nplt.show()\n```\n\
    \nThe kriged values are shown in Fig. 7.23a. The kriging variance depends only\
    \ on the distance from the observations and not on the observed values (Fig. 7.23b).\
    \ Kriging reproduces the population mean when observations lie beyond the range\
    \ of the variogram, but the kriging variance also increases (lower-right corner\
    \ of the maps in Fig. 7.23). The kriging variance can be used as a criterion to\
    \ improve sampling design and is needed for back-transformation in lognormal kriging,\
    \ which is achieved by\n\n$$y(x_0) = \\exp\\left(z(x_0) + 0.5 \\cdot \\sigma^2(x_0)\
    \ - \\nu\\right)$$\n\n# Discussion of Kriging\n\n*Point kriging* as presented\
    \ here is an exact interpolator. It reproduces the exact values at an observation\
    \ point even though it uses a variogram with a nugget effect. Smoothing can be\
    \ achieved by including the variance of the measurement errors"
