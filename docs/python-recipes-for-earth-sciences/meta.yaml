    \ Boston Toronto London Singapore\n\n# 空间数据\n\n## 7.1 引言\n\n地球科学中的大多数数据在空间上分布，要么是*矢量数据*（点、线、多边形；例如，河网、海岸线），要么是*栅格数据*（方形网格、三角形网格；例如，网格化地形）。矢量数据是通过数字化地图对象（如水系网络或岩性单元轮廓）生成的。栅格数据可以直接从卫星传感器输出获得，但网格化数据也可以从不规则分布的野外采样中插值得到（*网格化*）。\n\
