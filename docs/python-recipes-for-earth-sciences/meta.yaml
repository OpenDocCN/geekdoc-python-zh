    symmetric, it does not shift the signal on the time axis; rather, the only function
    of this filter is to smooth the signal. Running means of a given length are often
    used to smooth signals, mainly for cosmetic reasons. Modern spreadsheet software
    usually contains running means as a function for smoothing data series. The effectiveness
    of a smoothing filter increases with increasing filter length.


