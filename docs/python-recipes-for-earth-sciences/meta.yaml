  md: 'Fig. 7.18 Separation vector h between two points.


    ![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_315_0.png)


    vector h (Fig. 7.18). The classic experimental variogram is defined by the semi-variance


    $$\gamma(h) = 0.5 \cdot (z_x - z_{x+h})^2$$


    where $z_x$ is the observed value at location $x$ and $z_{x+h}$ is the observed
    value at another point at a distance $h$ from $x$. The length of the separation
    vector $h$ is called the lag distance (or simply the lag). The correct term for
    $\gamma(h)$ is the semivariogram (or semivariance), where semi refers to the fact
    that $\gamma(h)$ is half the variance of the differences between $z_x$ and $z_{x+h}$.
    Nevertheless, $\gamma(h)$ is the variance per point when points are considered
    in pairs (Webster and Oliver 2007). However, by convention, $\gamma(h)$ is termed
    a variogram instead of a semivariogram – a convention that we follow for the rest
    of this section. To calculate the experimental variogram, we first need to group
    pairs of observations. This is achieved by typing


    ```

    X1,X2 = np.meshgrid(x,x)

    Y1,Y2 = np.meshgrid(y,y)

    Z1,Z2 = np.meshgrid(z,z)

    ```


    The array of separation distances D between the observation points is


    ```

    D = np.sqrt((X1-X2)**2+(Y1-Y2)**2)

    ```


    We then obtain the experimental variogram G as half the squared differences between
    the observed values:


    ```

    G = 0.5*(Z1-Z2)**2

    ```


    In order to speed up the processing, we use Python''s ability to vectorize commands
    instead of using for loops. However, we compute $n^2$ pairs of observations even
    though only $n(n-1)/2$ pairs are required. For large data sets (e.g., more than
    3000 data points), the software and physical memory of the computer may become
    limiting factors. In such a case, loops should be used, and aggregated results
    should be stored in a variogram grid instead of generating an array with individual
    pairs, as is done in the SURFER software (Golden Software, Inc.). The plot of
    the'
