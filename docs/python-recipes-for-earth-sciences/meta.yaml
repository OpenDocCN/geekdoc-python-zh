    ## Introduction to Python


    ### 2.1 Introduction


    Python is an interpreted programming language that was developed by Guido van
    Rossum in the late 1980s and first publicly released in 1991 (http://www.python.org).
    Python is a free and open-source language that is promoted, projected, and advanced
    by the Python Software Foundation (PSF), which was founded in 2001 (http://www.python.org/psf).
    According to its website, the PSF is a non-profit corporation that holds the intellectual
    property rights to the Python programming language. Members of the PSF are individuals
    who have made significant contributions to language’s development, including the
    original developer and PSF President G. von Rossum. In addition, numerous companies
    are both members and sponsors of the PSF, including Google, Microsoft, Amazon,
    Meta/Facebook, Netflix, and Huawei (https://www.python.org/psf/sponsors).


    Python is used in many application domains, including in web development, in performing
    mathematical calculations, in analyzing and visualizing data, and in facilitating
    the writing of new software programs. The advantage of this software is that it
    combines comprehensive math and graphics functions with a powerful high-level
    language. Python users have developed numerous extensions (packages) during the
    past several decades (https://pypi.org). While other packages suffer from buggy
    codes and dubious authorship, these Python packages have generally been of relatively
    high quality depending on the development time, the size of the developer community,
    and the package distribution. It is important to note that neither the Python
    Software Foundation nor the developers of the packages offer a warranty and that
    there is no professional support and no claim to complete or up-to-date documentation.
    The PSF makes Python available to licensees on an *as-is* basis ([https://docs.python.org/3/license.html](https://docs.python.org/3/license.html));
    however, numerous companies offer commercial support and consulting for Python
    applications, most notably Anaconda Inc., which is also known for providing a
    free Python installation package called *Anaconda Distribution* ([https://www.anaconda.com](https://www.anaconda.com)).


    Over the last few years, Python has become an increasingly popular tool in the
    earth sciences. It has been used for finite element modeling, for processing seismic
    data, for analyzing satellite imagery, and for generating digital elevation models
    from satellite data. The continuing popularity of the software is also apparent
    in published scientific literature, with many conference presentations also having
    referenced Python. Universities and research institutions alike have recognized
    the need for Python training for their staff and students, and many earth science
    departments across the world thus now offer Python courses for undergraduates.


    The following sections contain a tutorial-style introduction to Python that covers
    its setup on the computer in Sect. 2.2, Python syntax in Sects. 2.3 and 2.4, data
    input and output in Sects. 2.5 and 2.6, programming in Sects. 2.7 and 2.8, and
    visualization in Sect. 2.9. We recommend that the reader go through the entire
    chapter in order to acquire solid foundational knowledge of the software before
    proceeding to the following chapters of the book. A more detailed introduction
    can be found in the Python Beginner''s Guide on the Python website, where we can
    also find the documentation, a list of numerous Python-based books, and access
    to the Python community. Another important resource for solving Python problems
    is Stackoverflow ([https://stackoverflow.com](https://stackoverflow.com)), where
    users of Python and other programming languages discuss problems and possible
    solutions.


    In this book, we use *Python 3.8.12* from the free *Anaconda Individual Edition*,
    which includes an installer for Python and a manager for the most popular packages.
    We also use the integrated development environment (IDE) *Spyder 5.1.5*, the web-based
    *JupyterLab 3.2.1*, and the web-based interactive computing notebook environment
    *Jupyter Notebook 6.4.6*. In the following chapters, we use Spyder as a comfortable
    development environment because it contains a graphical user interface with an
    *Editor*, a *Console*, a graphics window, and several tools, for example, for
    displaying variables in the workspace. From the large collection of available
    packages, we limit ourselves to a few very popular and sufficiently tested packages
    that are necessary to perform the data analysis applications in this book.


    Our collection of packages includes *IPython* ([https://ipython.org](https://ipython.org)).
    According to its website, *IPython* provides, inter alia, an interactive shell,
    the kernel for Jupyter, and support both for interactive data visualization and
    for the use of graphical user interface (GUI) toolkits. The second important package
    is *NumPy* for scientific computing with multidimensional arrays, which includes
    an assortment of routines for fast operations on arrays, basic linear algebra,
    basic statistical operations, random simulation, and much more ([https://numpy.org](https://numpy.org)).
    Another popular package for'
