    \ first determine the discriminant functions that separate the three groups (or\
    \ types of granite). We then use the discriminant functions to assign rock samples\
    \ (which were collected during a subsequent field campaign) to one of the three\
    \ types of granite.\n\nWe first clear the workspace\n\n```\n%reset -f\n\nimport\
    \ numpy as np\nimport numpy.ma as ma\n```"
