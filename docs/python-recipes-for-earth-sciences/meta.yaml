    used to store digital elevation models and satellite data. Newer functions in
    Python are capable of importing mixed data types (e.g., text, integers, and floating-point
    numbers) from a single file into the workspace.


    A computer generally stores data as *binary digits*, or *bits*, for short. A bit
    is analogous to a two-way switch with two states: *on* = 1 and *off* = 0. These
    bits are joined together to form larger groups, such as *bytes* (which consist
    of 8 bits) in order to store more complex types of data. These groups of bits
    are then used to encode data, such as numbers or characters. Unfortunately, different
    computer systems and software use different schemes for encoding data. Exchanging
    binary data between different computer platforms and software can therefore be
    difficult.


    Various formats for exchanging data have been developed in recent decades. The
    classic example of a data format that can be used with different computer platforms
    and software is the American Standard Code for Information Interchange (ASCII),
    which was first published in 1963 by the American Standards Association (ASA).
    As a 7 bit code, ASCII consists of 2^7 = 128 characters (codes 0 to 127). Whereas
    ASCII-1963 lacked lowercase letters, in the ASCII-1967 update, lowercase letters
    as well as various control characters (e.g., escape and line feed) and symbols
    (e.g., brackets and mathematical operators) were also included. Since then, a
    number of variants have appeared in order to facilitate the exchange of text written
    in languages other than English. Such variants include the expanded ASCII, which
    contains 255 codes, including the Latin-1 encoding.


    The simplest way to exchange data between a certain piece of software and Python
    is by using the ASCII format. Although some packages (e.g., *Pandas*) provide
    various functions for reading binary files, such as Microsoft Excel files, most
    data arrive in the form of ASCII files. Consider a simple data set stored in a
    table, such as


    ```

