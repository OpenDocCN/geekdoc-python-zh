    ```\n\nThe mixing matrix a_ica can be used to estimate the proportions of the\
    \ separated variables in our measurements. The components $a_{ij}$ of the mixing\
    \ matrix a_ica correspond to the principal component loadings, which were introduced\
    \ in Sect. 9.2.\n\n## 9.4 Discriminant Analysis\n\n*Discriminant analysis* helps\
    \ to assign objects to established categories or groups. Examples include assigning\
    \ fossil specimens to established genera or species, identifying rock types following\
    \ mineralogical (or chemical) analysis, and mapping vegetation types using satellite\
    \ images. Discriminant analysis is different from simple classification, which\
    \ does not define the number of groups or categories prior to the analysis.\n\n\
    The classic example of a discriminant analysis in petrography is the QAPF (or\
    \ Streckeisen) diagram (Streckeisen 1974, 1976). This diagram categorizes igneous\
    \ rocks (especially plutonic rocks) by their percentages of quartz (Q), alkali\
    \ feldspar (including albite) (A), plagioclase (P), and feldspathoids (F), which\
    \ are all normalized to a total of 100%. The QAPF diagram displays the percentages\
    \ of the four minerals in a double-ternary plot, with QAP percentages in the upper\
    \ half of the graphics and FAP percentages in the lower half. The QAPF diagram\
    \ is commonly used by the International Union of Geological Sciences (IUGS) to\
    \ classify plutonic rocks. As an example, a plutonic rock with 50% quartz, 30%\
    \ alkali feldspar, 20% plagioclase, and 0% feldspathoids is termed a granite.\
    \ Whereas Albert Streckeisen’s definition of plutonic rocks represents compromises\
    \ between established usages in different parts of the world (Streckeisen 1974,\
    \ 1976), discriminant analysis is based solely on mathematical constraints for\
    \ classifying objects. Furthermore, discriminant analysis assumes normality for\
    \ the measured values within a class, which is probably not a valid assumption\
    \ for the Streckeisen classification. Since normality is important to the success\
    \ of the method, the user must be careful to ensure that this condition is actually\
    \ met, especially when analyzing compositional (closed) data (see also Sect. 9.5).\n\
    \nDiscriminant analysis was first introduced by Sir Ronald A. Fisher (1936) to\
    \ discriminate between two or more populations of flowering plants. The first\
    \ step involves determining the discriminant function $Y_i$ that best separates\
    \ two groups of objects described by the normally distributed variables $X_i$:\n\
    \n$$Y = a_0 + a_1X_1 + a_2X_2 + \\dots + a_pX_p$$\n\nThe parameters $a_i$ are\
    \ determined such that they maximize the distance between the multivariate means\
    \ of the individual groups. In other words, we determine $a_i$ such that the ratio\
    \ of the distances between the means of the groups to the distances between group\
    \ members is high. In the second step, once the discriminant function has been\
    \ determined from a training set of objects, new objects can be assigned to one\
    \ group or the other. Using the Streckeisen diagram, a rock sample is assigned\
    \ to an established rock type (e.g., granite) on the basis of the percentages\
    \ of Q, A, P, and F.\n\nAs an example, we first create a synthetic data set of\
    \ granite rock samples that can be described by two variables $x_1$ and $x_2$.\
    \ These two variables could represent the percentages of two chemical elements\
