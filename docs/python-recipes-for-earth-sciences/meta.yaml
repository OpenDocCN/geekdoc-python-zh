    \ at the change point that occurs at time 1,000, thereby leading to a sudden decrease\
    \ in the *RR* measure.\n\nIn order to reliably interpret the variations in the\
    \ recurrence measures, a statistical test should be applied (Marwan 2011). Other,\
    \ more complex measures that quantify additional aspects of the dynamics (e.g.,\
    \ predictability or laminar phases) are included in the Cross Recurrence Plot\
