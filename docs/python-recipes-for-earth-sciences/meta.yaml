    import numpy as np

    import matplotlib.pyplot as plt


    t = np.linspace(1,100,100)

    x = 2 *np.sin(2*np.pi*t/50) + \n    np.sin(2*np.pi*t/10) + \n    0.5*np.sin(2*np.pi*t/5)


    plt.figure()

    plt.plot(t,x)

    plt.axis(np.array([0,100,-4,4]))

    plt.show()

    ```


    Frequency-selective filters are used to remove specific frequency bands from the
    data. As an example, we can design a filter that suppresses the portion of the
    signal with a periodicity of τ = 10 while leaving the other two cycles unaffected.
    The effects of such filters on simple periodic signals can also be used to predict
    signal distortions of natural filters.


    A *step function* is another basic input signal that can be used to explore filter
    characteristics. Step functions describe the transition from a value of one toward
    a value of zero at a specific time. The function `stairs()` draws a stirstep graph
    of the elements of x. The function needs edges e, which we calculate from t:


    ```

    t = np.linspace(1,100,100)

    x = np.ones(100)

    x[51:100] = np.zeros(49)


    e = np.zeros(101)

    e[0] = np.diff(t[0:2])/2

    e[1:101] = t+np.diff(t[0:2])/2


    plt.figure()

    plt.stairs(x,e)

    plt.axis(np.array([0,100,-4,4]))

    plt.show()

    ```


    This signal can be used to study the effects of a filter on a sudden transition.
    An abrupt climate change could be regarded as an example. Most natural filters
    tend to smooth such a transition and to distribute it over a longer time period.


    A *unit impulse* is a third important signal type that we use in the following
    examples. This signal equals zero at all times except at a single data point,
    where it equals one. The function `stem()` plots the data sequence x as stems
    from the *t*-axis using circles for the data values:'
