  - "[PAGE 326]\n\nA grid with the locations of the unknown values is needed. Here,\
    \ we use a grid cell size of five within a quadratic area that ranges from 0 to\
    \ 200 in the x and y directions. The coordinates are created in an array form\
    \ by\n\n```\nR = np.arange(0,200+5,5)\nXg1,Xg2 = np.meshgrid(R,R)\n```\n\nand\
    \ are converted to vectors by\n\n```\nXg = np.reshape(Xg1,(len(Xg1)**2,1))\nYg\
    \ = np.reshape(Xg2,(len(Xg2)**2,1))\n```\n\nWe then allocate memory for the kriging\
    \ estimates Zg and the kriging variance s2_k by typing\n\n```\nZg = Xg * np.NaN\n\
    s2_k = Xg * np.NaN\n```\n\nWe now krige the unknown values at each grid point:\n\
    \n```\nfor k in range(1,len(Xg)):\n    DOR = ((x-Xg[k])**2+(y-Yg[k])**2)**0.5\n\
    \    G_R = (nugget+sill*(1-np.exp(-3*DOR/rang)))*(DOR>0)\n    G_R = np.append(G_R,1)\n\
    \    E = np.matmul(G_inv,G_R)\n    Zg[k] = np.sum(E[0:n]*z)\n    s2_k[k] = np.sum(E[0:n]*G_R[0:n])+E[n]\n\
    ```\n\nThe first command computes the distance between the grid points (Xg,Yg)\
    \ and the observation points (x,y). We then create the right-hand-side vector\
    \ of the kriging system using the variogram model G_R and by adding one to the\
    \ last row. We next obtain the array E with the weights and the Lagrange multiplier.\
    \ The estimate Zg at each point k is the weighted sum of the observations z. Finally,\
    \ the kriging variance s2_k of the grid point is computed, and we can plot the\
    \ results. We first create a grid of the kriging estimate and the kriging variance:\n\
    \n```\nr = len(R)\nZ = np.reshape(Zg,(r,r))\nSK = np.reshape(s2_k,(r,r))\n```\n\
    \nA subplot on the left presents the kriged values:\n\n```\nplt.figure()\nfig,axs\
    \ = plt.subplots(nrows=1,ncols=2,\n```"
