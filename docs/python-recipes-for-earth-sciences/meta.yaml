    \ method to enhance the contrast in the image by typing\n\n```\nI1 = exposure.equalize_adapthist(I1)\n\
    I2 = exposure.equalize_adapthist(I2)\nI3 = exposure.equalize_adapthist(I3)\n```\n\
    \nand then concatenate the result into a 24 bit RGB image using dstack():\n\n\
    ```\nnaivasha_rgb = np.dstack([I1,I2,I3])\n```\n\nAs with the previous examples,\
