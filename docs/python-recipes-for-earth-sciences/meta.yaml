    where ravel() returns a contiguous flattened version of the 5-by-5 array H. The
    theoretical frequencies of the different classes in a uniform distribution are
    all identical. The expected number of objects in each square area is the size
    of the total area (10·10=100) divided by the 25 subareas (or classes), which equals
    four. To compare the theoretical frequency distribution with the actual spatial
    distribution of objects, we generate an array with an identical number of objects:


    ```

    n_exp = 4*np.ones(len(n_obs))

    ```


    The χ²-test explores the squared differences between the observed and expected
    frequencies (Sect. 3.9). The quantity χ² is defined as the sum of the squared
    differences divided by the expected frequencies,


    ```

    chi2_data = np.sum((n_obs-n_exp)**2/n_exp)

    print(chi2_data)

    ```


    which yields


    18.5


    The critical χ² can be calculated using chi2.ppf(). The χ²-test requires the degrees
    of freedom Φ. In our example, we test the hypothesis that the data are uniformly
    distributed, that is, we estimate only one parameter (Sect. 3.5). The number of
    degrees of freedom is therefore Φ=25−(1+1)=23. We test the hypothesis at a p=5%
    significance level. The function chi2.ppf() computes the inverse of the χ² CDF
    with parameters specified by Φ for the corresponding probabilities in p,


    ```

    chi2_theo = stats.chi2.ppf(1-0.05,25-1-1)

    print(chi2_theo)

    ```


    which yields


    35.17246162690806


    Since the critical χ² of 35.1725 is well above the measured χ² of 22.5000, we
    cannot reject the null hypothesis and must therefore conclude that our data follow
    a uniform distribution.'
