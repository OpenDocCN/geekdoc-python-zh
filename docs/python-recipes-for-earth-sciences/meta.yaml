    \n# 7.6 Exporting 3D Graphics to Create Interactive Documents\n\nThis section\
    \ from the MATLAB-based book MATLAB Recipes for Earth Sciences (Trauth 2021) could\
    \ not be translated to Python.\n\n# 7.7 Gridding and Contouring\n\nThe previous\
    \ data sets were all stored in evenly spaced two-dimensional arrays. However,\
    \ most data in the earth sciences are obtained from irregular sampling patterns.\
    \ The data are therefore unevenly spaced and need to be interpolated in order\
    \ to allow a smooth and continuous surface to be computed from our measurements\
    \ in the field. *Surface estimation* is typically carried out in two major steps"
