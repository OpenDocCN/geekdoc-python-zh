  md: 'The resultant direction of the data set is


    $$\bar{\theta} = \tan (x_r / y_r)$$


    and the resultant length is


    $$R = \sqrt{(x_r^2 + y_r^2)}$$


    The resultant length clearly depends on the dispersion of the data. Normalizing
    the resultant length to the number of observations yields the mean resultant length:


    $$\bar{R} = R/n$$


    The value of the mean resultant length decreases with increasing dispersion (Fig.
    10.4). The *circular variance* is then the difference between one and the mean
    resultant length and is therefore often used as a measure of dispersion for directional
    data:


    $$\sigma_0 = 1 - \bar{R}$$


    The following example illustrates the use of these parameters by means of synthetic
    directional data. We first load the data from the file *directional_1.txt* and
    convert all measurements to radians:


    ```

    python

    %reset -f


    import numpy as np

    import matplotlib.pyplot as plt


    data_degrees_1 = np.loadtxt(''directional_1.txt'')

    data_radians_1 = np.pi*data_degrees_1/180

    ```


    We now calculate the resultant vector R. First, we compute the x and y components
    of the resultant vector,


    ![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_444_0.png)'
  merge: -1
  pgno: 444
- img_proc: true
  md: '```

    x_1 = np.sum(np.sin(data_radians_1))

    y_1 = np.sum(np.cos(data_radians_1))

    print(x_1)

    print(y_1)

    ```


    which yields


    ```

    -146.54800998477873

    -120.34536799675672

    ```


    The mean direction is the inverse tangent arctan() of the ratio of x and y,


    ```

    mean_radians_1 = np.arctan(x_1/y_1)

    mean_degrees_1 = 180*mean_radians_1/np.pi

    print(mean_radians_1)

    print(mean_degrees_1)

    ```


    which yields


    ```

    0.883260987889874

    50.6071268146455

    ```


    This result suggests that the resultant vector R is around 0.88 radians, or~51°.
    However, since both x and y are negative, the true value of mean_degrees is located
    in the third quadrant, and we therefore add 180°,


    ```

    mean_degrees_1 = mean_degrees_1 + 180

    print(mean_degrees_1)

    ```


    which yields


    ```

