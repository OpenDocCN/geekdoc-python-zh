    \ = 'AST_L1A_003_03082003080706_03242003202838.hdf'\n```\n\nThe package `pyhdf`\
    \ contains various tools for importing and processing files stored in the *hierarchical\
    \ data format* (HDF). Information about the file can be obtained with `info()`.\n\
    \n```python\nfile = SD(filename)\nfile.info()\n```"
