    plt.show()\n```\n\n函数`LightSource()`用于从特定的方位角和仰角创建光源。我们使用`vert_exag`进行垂直夸张，以强调表面图的垂直特征，并使用`blend_mode='hsv'`将颜色映射的数据值与光照强度相结合。然后，使用`surface()`创建实际的表面图，将`shade()`创建的rgb对象作为`facecolors`。需要注意的是，`rstride`和`cstride`定义了将用于渲染图形的ETOPO1的行数和列数。如果我们选择1（即全分辨率），渲染将花费很长时间，因此我们应该使用更大的值（例如，如上所述的5）来对数据集进行垂直和水平重采样，以减少渲染时间。我们以300\
    \ dpi的分辨率将图形导出为PNG格式，文件名为`etopo1_python.png`。\n\n我们也可以使用*PyGMT*包中的`makecpt()`、`Figure()`和`grdview()`，该包利用了*xarray*包：\n\
