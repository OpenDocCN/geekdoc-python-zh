    \ has index (0,0) and not (1,1) as, for example, in MATLAB (https://de.mathworks.com)\
    \ and Julia (https://julialang.org). Furthermore, the indices in Python are written\
    \ in square brackets, that is, the element A[0,0] corresponds to A(1,1) in MATLAB\
    \ and Julia. In our example, in order to access A(3,2) in MATLAB, we need to type\n\
    \n```\nprint(A[2,1])\n```\n\nin Python together with print() in order to actually\
    \ display the array element located in the third row and second column, which\
    \ is 9. The array indexing therefore follows the rule (row-1, column-1). Python's\
    \ indexing, which starts with 0 instead of 1, has been controversial for many\
    \ years, especially among users of other languages like MATLAB and Julia, whose\
    \ indexing starts with 1. Both indexing conventions have advantages and disadvantages,\
    \ but it will become apparent throughout the present book that the indexing used\
