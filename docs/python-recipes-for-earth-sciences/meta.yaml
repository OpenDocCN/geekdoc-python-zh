    way of predicting the characteristics of a larger *population* from a much smaller
    *sample* (Fig. 1.1).


    It is important to note that depending on the population of interest in the research
    context, a sample obtained in the field (e.g., a piece of granite) is not necessarily
    identical to what is later described as a statistical sample. If the object of
    study is the chemical composition of a granite sample, then the sample is the
    collection of replicate measurements taken on subsamples of the granite. If, however,
    the researcher is more interested in the chemical composition of the entire granite
    body, then the sample consists of the chemical composition of several (preferably
    representative) rock samples from this granite body.


    In any case, an appropriate sampling strategy is the first step toward obtaining
    a good data set. Developing a successful strategy for field sampling requires
    making decisions on the *sample size* and the *spatial sampling scheme*. The sample
    size (again for the rock sample) is determined by the sample''s volume and/or
    weight or (for the statistical sample) by the number of rock samples collected
    from a granite body. If the population is heterogeneous, the sample needs to be
    large enough to represent the population''s variability; however, samples should'
  merge: -1
