    # 3.11 Mann–Whitney Test


    The *Mann–Whitney test* (also known as the *Wilcoxon rank-sum test*) was introduced
    by Henry B. Mann and Donald R. Whitney (1947) and can be used to determine whether
    two samples come from the same population (e.g., the same lithologic unit) (null
    hypothesis) or from two different populations (alternative hypothesis). In contrast
    to the *t*-test, which compares the means of Gaussian-distributed data, the Mann–Whitney
    test compares the medians without requiring a normality assumption for the underlying
    population (i.e., it is a non-parametric hypothesis test).


    The test requires that the samples have similar dispersions. We first combine
    both sets of measurements (samples 1 and 2) and arrange them together in ascending
    order. We then sum the ranks of samples 1 and 2, where the sum of all ranks is
    $R = n(n+1)/2$, with $n$ as the total number of measurements. The published literature
    is full of different versions of how to calculate the test statistic. Here, we
    use the version that can be found in Hedderich and Sachs (2012, pp. 484),'
  - '[PAGE 111]


    $U_1 = n_1n_2 + \frac{n_1(n_1 + 1)}{2} - R_1$


    $U_2 = n_1n_2 + \frac{n_2(n_2 + 1)}{2} - R_2$


    where $n_1$ and $n_2$ are the sizes of samples 1 and 2, respectively, and $R_1$
    and $R_2$ are the sums of the ranks of samples 1 and 2, respectively. The required
    test statistic $U$ is the smaller of the two variables $U_1$ and $U_2$, which
    we compare with a critical $U$ value that depends on the sample sizes $n_1$ and
    $n_2$, respectively, and on the significance level $\alpha$. Alternatively, we
    can use the $U$ value to calculate


    $\widehat{Z} = \frac{\left|U - \frac{n_1n_1}{2}\right|}{\sqrt{\frac{n_1n_2(n_1+n_2+1)}{12}}}$


    if $n_1 \geq 8$ and $n_2 \geq 8$ (Mann and Whitney 1947; Hedderich and Sachs 2012,
    page 486). The null hypothesis can be rejected if the absolute measured $z$-value
    is greater than the absolute critical $z$-value, which depends on the significance
    level $\alpha$ (Sect. 3.4).


    In practice, data sets often contain tied values, that is, some of the values
    in sample 1 and/or sample 2 are identical. In this case, the average ranks of
    the tied values are used instead of the true ranks. That means that the equation
    for the $z$-value must be corrected for tied values,


    $\widehat{Z} = \frac{\left|U - \frac{n_1n_1}{2}\right|}{\sqrt{\left(\frac{n_1n_2}{S(S-1)}\right)
    \cdot \left(\frac{S^3-S}{12} - \sum_{i=1}^{r} \frac{t_i^3-t_i}{12}\right)}}$


    where $S=n_1+n_2$, $r$ is the number of tied values and $t_i$ is the number of
    occurrences of the $i$th tied value. Again, the null hypothesis can be rejected
    if the absolute measured $z$-value is greater than the absolute critical $z$-value,
    which depends on the significance level $\alpha$.


