    \ ]\n```\n\nwhich autowraps the lines that are longer than the width of the Console,\
    \ that is, it introduces a line break after 6. in the first line. The display\
    \ of the values of a variable can be interrupted by pressing Ctrl+C (Control+C)\
    \ on the keyboard. This interruption affects only the output in the Console, whereas\
    \ the actual command is processed before displaying the result.\n\nPython provides\
