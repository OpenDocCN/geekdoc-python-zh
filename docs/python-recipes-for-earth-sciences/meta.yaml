    \ device would have allowed the systematic error to be detected and eliminated.\
    \ If we know the random and systematic errors of a measurement, we can indicate\
    \ the *precision* and *accuracy* of our data. Precise measurements are consistent\
    \ about the mean, but the *true* value may be different from the mean value of\
    \ the measurements due to systematic errors that limit accuracy. Increasing the\
