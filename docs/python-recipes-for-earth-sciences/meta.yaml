    \    cmap=cm.jet)\nplt.colorbar()\nplt.title('Stream power index')\nplt.show()\n\
    axis([1 c 1 r])\nset(gca,'TickDir','out');\n```\n\nThe wetness and stream power\
    \ indices are particularly useful in high-resolution terrain analysis, that is,\
    \ in digital elevation models sampled at intervals of less than 30 m. In our terrain\
    \ analysis example, we calculated weti and spi from a medium resolution DEM, and\
    \ we must expect a degree of scale dependency in these attributes.\n\nThis section\
    \ illustrated the use of basic tools for analyzing digital elevation models. A\
    \ more detailed introduction to digital terrain modeling is given in the book\
    \ by Wilson and Gallant (2000). Furthermore, the article by Freeman (1991) provides\
    \ a comprehensive summary of digital terrain analysis, including an introduction\
    \ to the use of advanced algorithms for flow accumulation.\n\n## 7.11 Geostatistics\
    \ and Kriging (by R. Gebbers)\n\nGeostatistics describes the autocorrelation of\
    \ one or more variables in 1D, 2D, or 3D space – or even in 4D space–time – in\
    \ order to make predictions for unobserved locations, to obtain information on\
    \ the accuracy of these predictions, or to reproduce spatial variability and uncertainty.\
    \ The shape, range, and direction of the spatial autocorrelation are described\
    \ by a variogram, which is the main tool used in linear geostatistics. The origins\
    \ of geostatistics in its current form can be traced back to the early 1950s,\
    \ when South African mining engineer Daniel G. Krige first published an interpolation\
    \ method based on the spatial dependency of samples. In the 1960s and 1970s, French\
    \ mathematician Georges Matheron developed the theory of regionalized variables,\
    \ which provides the theoretical foundations for Krige’s more practical methods.\
    \ This theory forms the basis of several procedures for analyzing and estimating\
    \ spatially dependent variables, which Matheron called geostatistics. Matheron\
    \ also coined the term kriging for spatial interpolation via geostatistical methods.\n\
    \n### Theoretical Background\n\nA basic assumption in geostatistics is that a\
    \ spatiotemporal process is composed of both deterministic and stochastic components\
    \ (Fig. 7.17). The deterministic components can be global or local trends (sometimes\
    \ called drifts). The stochastic component comprises both a purely random component\
    \ and an autocorrelated component. The autocorrelated component suggests that\
    \ on average, closer observations are more similar to one another than are more\
    \ widely separated observations. This behavior is described by a variogram in\
    \ which squared differences between observations are plotted against the separation\
    \ distances of the observations. Krige’s fundamental idea was to use the variogram\
    \ for interpolation as a means of determining the amount of influence that neighboring\
    \ observations have when predicting values for unobserved locations. Basic linear\
    \ geostatistics includes two main procedures: variography for modeling a variogram,\
    \ and kriging for interpolation.\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_312_0.png)\n\
    \n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_312_1.png)\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_312_2.png)\n\
    \n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_312_3.png)\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_312_4.png)\n\
    \n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_312_5.png)\n\n**Fig. 7.17** Components\
    \ of a spatiotemporal process and the variogram: **a** spatiotemporal process,\
    \ **b** global trend component, **c** local trend component, **d** random component,\
    \ **e** autocorrelation component, and **f** variogram. The variogram should only\
    \ be derived from the autocorrelated component.\n\n### Preceding Analysis\n\n\
    Because linear geostatistics as presented in this book is a parametric method,\
    \ its underlying assumptions need to be checked by a preceding analysis. As with\
    \ other parametric methods, linear geostatistics is sensitive to outliers and\
    \ to deviations from a normal distribution. We first open the data file *geost_dat.mat*,\
    \ which contains *xyz* data triplets, and we then plot the sampling locations.\
    \ This allows us to check the point distribution and to detect any major errors\
    \ in the data coordinates *x* and *y*:\n\n```\n%reset -f\n\nimport numpy as np\n\
    from numpy import linalg\nfrom scipy import stats\nimport matplotlib.pyplot as\
    \ plt\n\ndata = np.loadtxt('geost_dat.txt')\nx = data[:,0]\ny = data[:,1]\nz =\
    \ data[:,2]\n\nplt.figure()\nplt.plot(data[:,0],data[:,1],\n    marker='o',\n\
    \    markeredgecolor=(0.3,0.5,0.8),\n    markerfacecolor='none',\n    linestyle='none')\n\
    plt.show()\n```\n\nThe range of the observations *z* can be checked by typing\n\
    \n```\nprint(np.min(z))\nprint(np.max(z))\n```\n\nwhich yields\n\n```\n3.7198573\n\
    7.8459703\n```\n\nFor linear geostatistics, the observations *z* should be Gaussian\
    \ distributed. This is usually only tested by visually inspecting the histogram\
    \ because statistical tests are often too sensitive if the number of samples exceeds\
    \ about 100. It is also possible to calculate the skewness and kurtosis of the\
    \ data by typing\n\n```\nplt.hist(z)\nprint(stats.skew(z))\nprint(stats.kurtosis(z,fisher=True))\n\
    ```\n\nwhich yields\n\n```\n0.2568129442682396\n-0.4780014841875708\n```\n\nA\
    \ flat-topped or multiple-peaked distribution suggests that there is more than\
    \ one population present in the data set. If these populations can be related\
    \ to particular areas, they should be treated separately. Another reason for the\
    \ existence of multiple peaks can be due to the preferential sampling of areas\
    \ with high and/or low values. This usually happens as a result of some a priori\
    \ knowledge and is referred to as a cluster effect. Dealing with a cluster effect\
    \ is described in Deutsch and Journel (1998) and in Isaaks and Srivastava (1990).\n\
    \nMost problems arise from positive skewness, that is, if the distribution has\
    \ a long tail to the right. According to Webster and Oliver (2007), root transformation\
    \ should be considered if the skewness is between 0.5 and 1, and logarithmic transformation\
    \ should be considered if the skewness exceeds 1. A general transformation formula\
    \ is\n\n$$z^* = \\begin{cases} ((z+m)^k - 1)/k, & \\text{for } k \\neq 0 \\\\\
    \ \\log(z+m), & \\text{for } k = 0 \\end{cases}$$\n\nfor $\\min(z)+m>0$. This\
    \ is known as the Box–Cox transform, which has the special case $k=0$ when a logarithm\
    \ transformation is used. In the logarithm transformation, $m$ should be added\
    \ if $z$ is zero or negative. Interpolation results of power-transformed values\
    \ can be back-transformed directly after kriging. The back-transformation of log-transformed\
    \ values is slightly more complicated and is explained later. The procedure is\
    \ known as *lognormal kriging* and can be important because lognormal distributions\
    \ are not uncommon in geology. Other transformations in geostatistics are discussed\
    \ in Deutsch and Journel (1998) and in Remy et al. (2006). The transformation\
    \ of compositional data is discussed in Chapter 9.7.\n\n### Variography with the\
    \ Classic Variogram\n\nA variogram describes the spatial dependency of referenced\
    \ observations in a unidimensional or multidimensional space. Since the true variogram\
    \ of the spatial process is usually unknown, it must be estimated from observations.\
    \ This procedure is called variography and starts by calculating the *experimental\
    \ variogram* from the raw data. In the next step, the experimental variogram is\
    \ summarized by the *variogram estimator*. The variography then concludes by fitting\
    \ a variogram model to the variogram estimator. The experimental variogram is\
    \ calculated as the differences between pairs of observed values and is dependent\
    \ on the *separation*"
