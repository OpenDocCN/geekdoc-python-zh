  mdcn: "在另一种技术中，所有控制点通过三角网络连接（图7.5b）。每个网格点都位于由三个控制点构成的三角形区域内。网格点的z值由三角形顶点处控制点的z值计算得出。这种网格化形式的改进版本还会使用三个相邻三角形的顶点处的三个点。*克里金法*（在第7.11节介绍）是选择控制点的另一种方法，通常被视为网格化的终极方法。有些用户甚至将*地统计学*作为其同义词。克里金法是一种量化空间自相关的方法，因此也用于量化选择控制点所用圆形的维度。更复杂的克里金法版本使用椭圆形区域代替圆形。\n\
    \n如上所述，表面估计的第二步是实际计算网格点的z值。控制点处测量z值的*算术平均值*\n\n$$\\bar{z} = \\frac{1}{n} \\sum_{i=1}^{n}\
    \ z_i$$\n\n提供了计算网格点值的最简便方法。如果控制点数量有限，这是一种特别有用的方法。如果研究区域被控制点良好覆盖，且这些点之间的距离变化很大，则应使用*加权平均值*计算网格点的z值。这涉及通过网格点到控制点的距离$d_i$的倒数对控制点处的z值进行加权：\n\
    \n$$\\bar{z} = \\frac{\\sum_{i=1}^{n} (z_i/d_i)}{\\sum_{i=1}^{n} (1/d_i)}$$\n\n\
    根据变量$z$的空间尺度关系，可能使用距离平方根的倒数（而不仅仅是距离的倒数）来对z值进行加权。将三维*样条*拟合到控制点提供了计算网格点值的另一种方法，在地球科学中常用。表面估计中使用的大多数程序涉及*双三次多项式样条*，即将一个三次三维多项式拟合到至少六个相邻的控制点。最终表面是一个由这些样条的不同部分组成的复合体。\n\
    \n方形网格的一个优点也是其缺点：由于这些网格之间的等距性，每个区域的内存需求都是相同的（因此在控制点密度低且感兴趣变量变化小的区域也是如此）。克服这个问题的一种方法是使用三角形网格代替方形网格。这些三角形网格是通过*三角剖分*从不规则分布的控制点计算得出的。计算这种*不规则三角网*（TINs）有几种不同的方法，其中一种是*德劳内三角剖分*，在第7.6节中使用。在这种方法中，点被连接成三角形，使得没有其他点包含在三角形三个顶点所在的圆内。\n\
    \n*SciPy*包包含几种插值方法。我们首先使用双三次样条，它使用样条对二维数据进行插值，即将一个三次三维多项式拟合到至少六个相邻的控制点，从而产生一个连续的表面（及其一阶导数）。这种网格化方法特别适合从具有不均匀分布控制点的噪声数据集中生成平滑表面。作为一个例子，我们使用合成的*xyz*数据，这些数据表示一个假想地层界面的表面与参考表面之间的垂直距离，该界面一方面被正断层位移。断层的下盘显示大致水平的地层，而上盘则以两个大型沉积盆地为特征。*xyz*数据不规则分布，因此需要插值到规则网格。这些*xyz*数据以三列表格的形式存储在文件*normalfault.txt*中：\n\
    \n```\n4.3229698e+02  7.4641694e+01  9.7283620e-01\n4.4610209e+02  7.2198697e+01\
    \  6.0655065e-01\n4.5190255e+02  7.8713355e+01  1.4741054e+00\n4.6617169e+02 \
    \ 8.7182410e+01  2.2842172e+00\n4.6524362e+02  9.7361564e+01  1.1295175e-01\n\
    4.5526682e+02  1.1454397e+02  1.9007110e+00\n4.2930233e+02  7.3175896e+01  3.3647807e+00\n\
    (续)\n```\n\n第一列和第二列包含坐标*x*（在任意空间坐标系中介于420和470之间）和*y*（介于70和120之间），而第三列包含垂直*z*值。数据使用以下代码加载：\n\
    \n```\n%reset -f\n\nimport numpy as np\nfrom scipy import interpolate\nfrom math\
    \ import log10, floor\nfrom matplotlib import cm\nimport matplotlib.pyplot as\
    \ plt\nfrom matplotlib.colors import LightSource\ndata = np.loadtxt('normalfault.txt')\n\
    ```\n\n最初，我们希望创建一个控制点空间分布的概览图。为了在图中标记点，第三列的数值*z*值被转换为最多两位数字的字符串表示：\n\n```\nlabels\
    \ = np.zeros(len(data))\nfor i in range(0,78):\n    labels[i] = round(data[i,2],\n\
    \        -int(floor(log10(abs(0.1*data[i,2])))))\n```\n\n我们数据的二维图分两步生成：首先，使用plot()将数据作为空心圆显示。其次，使用text()为数据添加标签，将labels中的文本添加到xy位置。所有x坐标都加上1，以便在圆和文本之间产生一个小偏移：\n\
    \n```\nplt.figure()\nfor i in range(0,78):\n    plt.plot(data[i,0],data[i,1],\n\
    \        marker='o',\n        markeredgecolor=(0.3,0.5,0.8),\n        markerfacecolor='none',)\n\
    \    plt.text(data[i,0]+1,data[i,1],labels[i],\n        fontsize=8)\nplt.show()\n\
    ```\n\n此图有助于我们定义网格化和等值线的轴限。函数meshgrid()将向量x和y指定的域转换为数组XI和YI。输出数组XI的行是向量x的副本，输出数组YI的列是向量y的副本。我们选择1.0作为网格间隔，因此在x和y方向上各获得51个数据点：\n\
    \n```\nx = np.linspace(420,470,51)\ny = np.linspace(70,120,51)\nXI,YI = np.meshgrid(x,y)\n\
    ```\n\n使用*双三次*样条插值对XI和YI指定的网格点处的不均匀间隔数据进行插值：\n\n```\nZI = interpolate.griddata(data[:,0:2],data[:,2],(XI,YI),\n\
    \    method='bicubic')\n```\n\n显示网格化结果的最简单方法是使用contour()绘制等值线图。默认情况下，等值线的数量和值是自动选择的。等值线的选择取决于z的最小值和最大值：\n\
    \n```\nplt.figure()\nplt.contour(XI,YI,ZI)\nplt.show()\n```\n\n或者，可以手动选择等值线的数量（例如，十个等值线级别）：\n\
    \n```\nplt.figure()\nplt.contour(XI,YI,ZI,10)\nplt.show()\n```\n\n也可以在向量v中指定的值处执行等值线绘制。由于z的最大值和最小值为\n\
    \n```\nprint(np.min(data[:,2]))\nprint(np.max(data[:,2]))\n```\n\n结果为\n\n```\n\
    -27.435687\n21.301825\n```\n\n我们选择\n\n```\nv = np.linspace(-40,20,7)\n```\n\n\
    命令\n\n```\nplt.figure()\nfig,ax = plt.subplots()\nc = ax.contour(XI,YI,ZI,v)\n\
    ax.clabel(c,inline=1,fontsize=8)\nplt.show()\n```\n\n生成QuadContourSet对象c，该对象可用作clabel()的输入，clabel()会自动标记等值线。填充等值线是上述空心等值线的替代方案。此函数与colorbar()一起使用，colorbar()显示图的图例。此外，我们可以绘制真实数据点的位置（小圆圈）和z值（等值线标签）（图7.6）：\n\
    \n```\nplt.figure()\nplt.contourf(XI,YI,ZI)\nfor i in range(0,78):\n    plt.plot(data[i,0],data[i,1],\n\
    \             marker='o',\n             markeredgecolor=(0,0,0),\n           \
    \  markerfacecolor='none',)\n    plt.text(data[i,0]+1,data[i,1],labels[i],\n```"
