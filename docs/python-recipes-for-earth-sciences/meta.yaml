    \ x 和 y 指定的域转换为数组 XI 和 YI。输出数组 XI 的行是向量 x 的副本，输出数组 YI 的列是向量 y 的副本。我们选择 1.0 作为网格间隔：\n\
    \n```python\nx = np.linspace(420,470,51)\ny = np.linspace(70,120,51)\nXI,YI =\
    \ np.meshgrid(x,y)\n```\n\n然后我们使用所有可用选项的 `griddata()` 并将结果存储在三维数组 ZI 中：\n\n```python\n\
