  md: '$$\omega = \frac{\sum_{i=1}^{n} (x_i - \bar{x})^4 / n}{s^4}$$


    Kurtosis is a measure of tail weight. A normal distribution has a kurtosis of
    three, and some definitions of kurtosis therefore subtract three from the term
    above in order to set the kurtosis of the normal distribution to zero. A low kurtosis
    suggests that the distribution produces fewer and less extreme outliers than does
    the normal distribution.


