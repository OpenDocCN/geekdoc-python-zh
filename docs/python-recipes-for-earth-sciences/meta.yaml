    \ of the data is as expected.\n\n## 2.7 Control Flow\n\nControl flow in computer\
    \ science helps to control the order in which computer code is evaluated. The\
    \ most important kinds of control flow statements are count-controlled loops (e.g.,\
    \ *for* loops) and conditional statements (e.g., *if* statements). Since we do\
    \ not deal with the programming capabilities of Python in any depth in this book,\
    \ the following introduction to the basics of control flow is rather brief and\
    \ omits certain important aspects of efficient programming. This introduction\
    \ is limited to the two most important kinds of control flow statements: the aforementioned\
    \ *for* loops, and *if* statements.\n\nPython *for* loops execute a series of\
    \ commands a specified number of times. As an example, we can use such a loop\
    \ to multiply the elements of an array A by 10, round the result to the nearest\
    \ integer, and store the result in B by typing\n\n```\n%reset -f\n\nimport numpy\
    \ as np\nfrom numpy.random import default_rng\n\nnp.random.seed(0)\nA = np.random.rand(10,1)\n\
    B = np.zeros((10,1))\n```\n\n```\nfor i in range(0,10):\n    B[i] = np.round(10*A[i])\n\
    print(A)\nprint(B)\n```\n\nwhich yields\n\n```\n[[0.5488135 ]\n [0.71518937]\n\
    \ [0.60276338]\n [0.54488318]\n [0.4236548 ]\n [0.64589411]\n [0.43758721]\n [0.891773\
