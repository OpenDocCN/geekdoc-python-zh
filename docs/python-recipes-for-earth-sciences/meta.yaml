    The result looks slightly better than the result obtained using equalize_hist().
    However, all three functions for image enhancement offer numerous ways of manipulating
    the final outcome. The excellent book by Gonzalez und Woods (2018) provides a
    more detailed introduction to using the various available parameters and the corresponding
    values of the image enhancement functions.


    The scikit-image package also includes numerous functions for 2D image filtering.
    Many of the methods that we examined in Chap. 6 for one-dimensional data also
    work with two-dimensional data, as we saw in Chap. 7 when filtering digital terrain
    models. The most popular 2D filters for images are Gaussian filters and median
    filters as well as filters for image sharpening. Both Gaussian and median filters
    are used to smooth an image, mostly with the aim of reducing the amount of noise.
    In most examples, the signal-to-noise ratio is unknown, and adaptive filters (similar
    to those introduced in Sect. 6.10) are therefore used for noise reduction. A Gaussian
    filter can be designed using


    ```

    I7 = filters.gaussian(I1)

    ```


    which uses filter weights that follow the shape of a Gaussian probability density
    function. Next, we calculate I8, which is a median-filtered version of I1:


    ```

    I8 = filters.median(I1)

    ```


    The filter output pixels are the medians of the neighborhoods around the corresponding
    pixels in the input image. The third filter example demonstrates how to sharpen
    an image using unsharp_mask():


    ```

    I9 = filters.unsharp_mask(I1)

    ```


    This function calculates the Gaussian lowpass filtered version of the image, which
    is used as an unsharp mask (i.e., the sharpened version of the image is calculated
    by subtracting the blurred filtered version from the original image). Comparing
    the results of the three filtering exercises with the original image


    ```

