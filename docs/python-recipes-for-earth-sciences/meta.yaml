    \ 等人 (2006) 中有讨论。组成数据的变换在第 9.7 章中讨论。\n\n### 使用经典变异函数进行变异函数分析\n\n变异函数描述了在单维或多维空间中参考观测值的空间依赖性。由于空间过程的真实变异函数通常是未知的，因此必须从观测值中估计。这个过程被称为变异函数分析，首先从原始数据计算\
