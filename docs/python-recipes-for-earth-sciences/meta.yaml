    \n变异函数建模的另一个重要问题是模型的预期用途。在我们的案例中，线性模型乍看之下似乎并不合适（图7.22）。然而，仔细观察可以发现，线性模型在前三个滞后距离上拟合得相当好。如果我们仅将变异函数模型用于克里金插值，这可能就足够了，因为在克里金法中，邻近点对于估计值最为重要（见下文关于克里金的讨论）。因此，如果采样点分布规则，具有相似原点附近拟合度的不同变异函数模型会产生相似的克里金结果。然而，如果目标是描述空间结构，情况就大不相同了。此时，找到一个在所有滞后距离上都适用的模型，并准确确定基台值和变程就变得至关重要。Rendu\
    \ 和 Readdy (1982) 的一系列地质案例研究展示了过程知识与变异函数分析如何相互关联。Gringarten 和 Deutsch (2001) 以及\
    \ Webster 和 Oliver (2007) 为变异函数建模提供了良好的指导原则。\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_322_0.png)\n\
    \n**图 7.22** 变异函数估计量（蓝色圆圈）、总体方差（红线），以及球状、指数和线性模型（分别为黄色、紫色和绿色线）。\n\n我们现在简要讨论变异函数分析的其他几个方面：\n\
