    Since RGB images are represented by integer values between 0 and 255 for each
    color, we convert the 64 bit double-precision values to unsigned 8 bit integers
    using uint8() (Sect. 8.2):


    ```

    I = np.uint8(I)

    ```


    The function uint8() rounds the values in I to the nearest integer. Any values
    that are outside the range of [0, 255] are rolled around from 0 to 255 (i.e.,
    np.uint8(-3) is 253). This behavior is different from that of the corresponding
    MATLAB function uint8, which assigns values outside the range of [0, 255] to the
    nearest endpoint (i.e., either 0 or 255). To avoid rolling, we use rescale_intensity()
    from the exposure module of the sciki-image package instead (see Sect. 8.4). Typing


    ```

    np.who()

    ```


    yields


    | Name | Shape | Bytes | Type |

    |---|---|---|---|

    | I1 | 100 x 100 | 80000 | float64 |

    | I2 | 100 x 100 | 80000 | float64 |

    | I3 | 100 x 100 | 80000 | float64 |

    | I | 100 x 100 x 3 | 30000 | uint8 |


