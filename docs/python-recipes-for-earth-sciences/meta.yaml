    ratio12log = np.log10(ratio12)\nratio21log = np.log10(ratio21)\n\nplt.figure()\n\
    ax1 = plt.subplot()\nax2 = ax1.twinx()\nline1, = ax1.plot(t,ratio12log,\n    color=colors[0,:],\n\
    \    label='log(1a/1b)')\nline2, = ax2.plot(t,ratio21log,\n    color=colors[1,:],\n\
    \    linestyle='--',\n    label='log(1b/1a)')\nax2.invert_yaxis()\nplt.legend(handles=[line1,line2])\n\
    plt.title('Log-ratio elements log(1a/1b) and log(1b/1a)')\nplt.show()\n```\n\n\
    Aitchison's log-ratio transformation must be used in all multivariate statistical\
