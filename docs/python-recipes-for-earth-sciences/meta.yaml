    206 199 199 203 201 187


    174 168 182 199 199 203

    198 189 167 172 184 185

    188 199 193 178 168 172

    186 186 185 183 174 185

    177 177 178 176 171 177

    179 171 168 170 170 163


    Compared with the 1 bit and 8 bit representations of raster data, 24 bit storage
    certainly requires much more computer memory. In the case of very large data sets,
    such as satellite images and digital elevation models, a user should therefore
    think'
