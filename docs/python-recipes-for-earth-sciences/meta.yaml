  md: '![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_87_0.png)


    The normal distribution is therefore used when the mean is both the most frequent
    and the most likely value. The probability of deviations is equal in either direction
    and decreases with increasing distance from the mean.


    The *standard normal distribution* is a special member of the normal distribution
    family that has a mean of *zero* and a standard deviation of *one*. We can transform
    the equation for a normal distribution by substituting *z* = (*x*−*μ*)/*σ*. The
    probability density function of this distribution is


    $$f(x) = \frac{1}{\sqrt{2\pi}} exp\left(-\frac{z^2}{2}\right)$$


    This definition of the normal distribution is often called the *z-distribution*.


    # **Logarithmic Normal (or Log-Normal) Distribution**


    The *logarithmic normal (or log-normal) distribution* is used when the data have
    a lower limit, such as with mean annual precipitation or the frequency of earthquakes
    (Fig. 3.8). In such cases, distributions are usually characterized by major skewness,
    which is best described by a logarithmic normal distribution. The probability
    density function of this distribution is


    $$f(x) = \frac{1}{\sigma\sqrt{2\pi}x} exp\left(-\frac{1}{2}\left(\frac{lnx - \mu}{\sigma}\right)^2\right)$$'
