    directions (Sect. 10.6), and multimodal chemical ages in monazite that reflect
    multiple episodes of deformation and metamorphism in a mountain belt. Fitting
    Gaussian mixture distributions to the data is done to determine the means and
    variances of the individual distributions that combine to produce the mixed distributions.
    The methods described in this section help in determining the episodes of deformation
    in a mountain range or in separating the different paleocurrent directions caused
    by tidal flow in an ocean basin.


