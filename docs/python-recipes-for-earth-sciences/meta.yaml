  md: 'This chapter is concerned with analyzing and displaying image data. The various
    ways that raster data can be stored on the computer are first explained in Sect.
    8.2. The main tools for importing, manipulating, and exporting image data are
    then presented in Sect. 8.3. This knowledge is next used to process and to geo-reference
    satellite images in Sects. 8.4 to 8.6. On-screen digitization techniques are discussed
    in Sect. 8.7, while Sects. 8.8 and 8.9 deal with importing, enhancing, and analyzing
    images from laminated lake sediments, including using color intensity measurements
    on transects across laminae. Sects. 8.10 to 8.12 deal with automated grain size
    analysis, charcoal quantification in microscopic images, and the detection of
    objects in microscopic images based on their shapes. Sect. 8.13 demonstrates how
    to calculate the normalized difference vegetation index (NDVI) both from handheld
    cameras and from satellite images. This chapter requires the *NumPy* (https://numpy.org),
    *Matplotlib* (https://matplotlib.org), *scikit-image* (https://scikit-image.org),
    *OpenCV* (https://pypi.org/project/opencv-python), and *pyhdf* (https://pypi.org/project/pyhdf),
    and *SciPy* packages (https://scipy.org).


    # 8.2 Data Storage


    Vector and raster graphics are the two fundamental formats for storing pictures.
    The typical format for storing *vector data* was introduced in the previous chapter.
    In the following example, the two columns in the file *coastline.txt* represent
    the longitudes and latitudes, respectively, of the points of a polygon:


    ```

    NaN          NaN

    42.892067    0.000000

    42.893692    0.001760

    NaN          NaN

    42.891052    0.001467

    42.898093    0.007921

    42.904546    0.013201

    42.907480    0.016721

    42.910414    0.020828

    42.913054    0.024642

    (cont''d)

    ```


    The NaNs help to identify break points in the data (Sect. 7.2). *Raster data*
    are stored as 2D or 3D arrays. The elements of these arrays represent variables
    such as the altitude of a grid point above sea level, annual rainfall, or (in
    the case of an image) color intensity values:


    ```

    174 177 180 182 182 182

    165 169 170 168 168 170

    171 174 173 168 167 170

    184 186 183 177 174 176

    191 192 190 185 181 181

    189 190 190 188 186 183

    ```'
