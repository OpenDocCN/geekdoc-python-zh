    # 9.5 Cluster Analysis


    Cluster analysis creates groups of objects that are very similar to one another
    compared with other individual objects or groups of objects. This method first
    computes the similarity or (alternatively) the dissimilarity (or distance) between
    all pairs of objects, It then ranks the groups according to their similarity (or
    distance from one another) before finally creating a hierarchical tree, which
    is visualized as a dendrogram. The grouping of objects can be useful in the earth
    sciences, for example, when making correlations within volcanic ash layers (Hermanns
    et al. 2000) or comparing different microfossil assemblages (Birks and Gordon
    1985).


    Numerous methods exist for calculating the similarity or (alternatively) the dissimilarity
    (or distance) between two data vectors. Let us define two data sets consisting
    of multiple measurements from the same object. These data can be described by
    vectors:


    $X_1 = (x_{11}, x_{12}, \dots, x_{1p})$


    $X_2 = (x_{21}, x_{22}, \dots, x_{2p})$


    The most popular measures of dissimilarity (or distance) between any two sample
    vectors are


    +   - the Euclidian distance—This is simply the shortest distance between the
    two points that describe two measurements in the multivariate space:


    $$\Delta_{12} = \sqrt{(x_{11} - x_{21})^2 + (x_{12} - x_{22})^2 + \dots + (x_{1p}
    - x_{2p})^2}$$


    The Euclidian distance is certainly the most intuitive measure of similarity.
    However, in heterogeneous data sets consisting of a number of different types
    of variables, a better alternative would be


    - the Manhattan (or city block) distance—In the city of Manhattan, it is necessary
    to follow perpendicular avenues rather than crossing blocks diagonally. The Manhattan
    distance is therefore the sum of all differences:


    $$\Delta_{12} = |x_{11} - x_{21}| + |x_{12} - x_{22}| + \dots + |x_{1p} - x_{2p}|$$


    Measures of similarity include'
  merge: -1
  pgno: 421
- img_proc: true
  md: '• the *correlation similarity coefficient*—This measure uses Pearson’s linear
    product-moment correlation coefficient to compute the similarity between two objects:


    ```

    $$r_{X_1X_2} = \frac{\sum_{i=1}^{n} (x_{1i} - \bar{x}_1)(x_{2i} - \bar{x}_2)}{(n
    - 1)s_{X_1}s_{X_2}}$$

    ```


    The measure is used if a researcher is interested in the ratios between the variables
    measured on the objects. However, Pearson’s correlation coefficient is highly
    sensitive to outliers and should be used with care (see also Sect. 4.2).


    • the *inner-product similarity index*—Normalizing the length of the data vectors
    to a value of one and computing their *inner product* yields another important
    similarity index that is often used in transfer function applications. In this
    example, a set of modern flora or fauna assemblages with known environmental preferences
    is compared with a fossil sample in order to reconstruct past environmental conditions:


    ```

    $$s_{12} = \frac{1}{|X_1|} \frac{1}{|X_2|} (x_{11}x_{12} \dots x_{1p}) \begin{pmatrix}
    x_{21} \ x_{22} \ \vdots \ x_{2p} \end{pmatrix}$$

    ```


    The inner-product similarity varies between 0 and 1. A zero value suggests no
    similarity, and a value of one suggests maximum similarity.


    The second step in performing a cluster analysis is to rank the groups by their
    similarity and to build a hierarchical tree, which is visualized as a dendrogram.
    Most clustering algorithms simply link the two objects with the highest level
    of similarity or dissimilarity (or distance). In the following steps, the most
    similar pairs of objects or clusters are linked iteratively. The difference between
    clusters (each of which is made up of groups of objects) is described in different
    ways depending on the type of data and the application:


    • *K-means clustering* uses the Euclidean distance between the multivariate means
    of a number of *K* clusters as a measure of the difference between the groups
    of objects. This distance is used if the data suggest that there is a true mean
    value surrounded by random noise. Alternatively,


    • *K-nearest neighbor clustering* uses the Euclidean distance of the nearest neighbors
    as a measure of this difference. This measure is used if there is natural heterogeneity
    in the data set that cannot be attributed to random noise.


    It is important to evaluate the data properties prior to applying a clustering
    algorithm. The absolute values of the variables should first be considered. For
    example, a geochemical sample from volcanic ash might show an SiO₂ content of'
