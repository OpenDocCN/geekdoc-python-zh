    \nFig. 5.21 This figure from the MATLAB-based book MATLAB Recipes for Earth Sciences\
    \ (Trauth 2021) could not be translated to Python.\n\n## 5.11 Nonlinear Time Series\
    \ Analysis (by N. Marwan)\n\nThe methods described in the previous sections were\
    \ used to detect linear relationships in data. However, natural processes on the\
    \ Earth are often complex and chaotic, and methods based on linear techniques\
    \ may therefore yield unsatisfactory results. New techniques for nonlinear data\
    \ analysis that are derived from chaos theory have become increasingly popular\
    \ in recent decades. Such methods have been used to describe nonlinear behavior,\
    \ for example, by defining the scaling laws and fractal dimensions of natural\
    \ processes (Turcotte 1997; Kantz and Schreiber 1997). However, most methods of\
    \ nonlinear data analysis require either long or stationary data series, and these\
    \ requirements are rarely satisfied in the earth sciences. While most nonlinear\
    \ techniques work well on synthetic data, these methods are unable to describe\
    \ the nonlinear behavior of real data.\n\nDuring recent decades, *recurrence plots*\
    \ have become highly popular in science and engineering as a new method of nonlinear\
    \ data analysis (Eckmann 1987; Marwan et al. 2007). Recurrence is a fundamental\
    \ property of dissipative dynamical systems. Although small disturbances in such\
    \ systems can cause exponential divergence in the systems’ states, after some\
    \ time, the systems return to a state that is close to a former state before again\
    \ passing through a similar evolution. Recurrence plots allow such recurrent behavior\
    \ of dynamical systems to be visually portrayed. The method is now widely accepted\
    \ as a useful tool in the nonlinear analysis of short and nonstationary data sets.\n\
    \n### Phase Space Portrait\n\nThe behavior of a complex dynamical system (e.g.,\
    \ the process of sedimentation in a lake) is determined by many variables, such\
    \ as the properties of the water body and the sediment beneath the lake, the organisms\
    \ living in the lake and its surroundings, precipitation (with high rainfall causing\
    \ increased weathering and erosion in the catchment area), evaporation (with higher\
    \ evaporation resulting, e.g., in higher potassium concentrations in the sediments),\
    \ and wind speed (which can transport more solid particles into the lake). Analyzing\
    \ the properties of such a dynamical system and the time-varying interaction between\
    \ the system’s components requires keeping a record of these state variables through\
    \ time. Since there are usually no ancient records available of a system’s state\
    \ variables (e.g., precipitation, evaporation, wind speed), we must instead rely\
    \ on indirect indicators (proxies) that have been preserved in natural archives.\
    \ A proxy record is obtained by sampling a single variable of a multi-dimensional\
    \ dynamical system, which is equivalent to projecting the dynamics of a complex\
    \ system onto a single axis. Considering the example of sediment in a paleolake,\
    \ the sampled variable could be a time series $x(t)$ of potassium concentrations\
    \ along a lake sediment core that represents a natural archive of past states\
    \ of the lake system.\n\nOne way to unfold the dynamics of a multi-dimensional\
    \ system from a one-dimensional time series $x(t)$ is through time-delay *embedding*,\
    \ which preserves the dynamic characteristics of the system (Packard et al. 1980).\
    \ Such a one-dimensional time series—which is based on a single variable – contains\
    \ information about the system and its state variables from which a complete reconstruction\
    \ of the entire system can be made. In other words, since the potassium concentration\
    \ is a result of a complex interplay between unknown environmental variables (e.g.,\
    \ precipitation, evaporation, wind velocity), analyzing the temporal variations\
    \ in this environmental proxy helps us to understand the properties of the paleolake\
    \ and the time-varying interactions between its components. The embedding of the\
    \ time series $x(t)$ in a three-dimensional ($m = 3$) *phase space*, for example,\
    \ means that three successive"
  mdcn: "$$W(b, a) = \\frac{1}{a^{1/2}} \\int \\psi^* \\left( \\frac{t - b}{a} \\\
    right) x(t) \\, \\mathrm{d}t$$\n\n其中 $\\psi^*$ 是 $\\psi$ 的复共轭。文献中有许多可用的母小波，例如经典的\
    \ *Haar* 小波、*Morlet* 小波和 *Daubechies* 小波。地球科学领域最流行的小波是 Morlet 小波，它由法国地球物理学家 Jean\
    \ Morlet (1931–2007) 引入，其定义为\n\n$$\\psi_0(\\eta) = \\pi^{-1/4} \\exp(i\\omega_0\\\
    eta) \\exp\\left(-\\eta^2/2\\right)$$\n\n其中 $\\eta$ 是时间，$\\omega_0$ 是波数 (Torrence\
    \ and Compo 1998)。波数是小波本身的振荡次数。我们可以通过将上述方程转换为 Python 代码来轻松计算 Morlet 小波波的离散版本，其中\
    \ eta 是无量纲时间，w0 是波数。改变 w0 会产生具有不同波数的小波。请注意，不要在 for 循环中使用 i 作为索引，因为它在这里用于表示虚数单位（图\
    \ 5.15）：\n\n```\n%reset -f\n\nimport numpy as np\nimport scipy.signal as signal\n\
    from scipy import interpolate\nimport matplotlib.pyplot as plt\n\neta = np.arange(-10,10+0.1,0.1)\n\
    w0 = 6\nwave = np.multiply(np.multiply(np.pi**(-1/4),\n    np.exp(1j*w0*eta)),np.exp(-eta**2/2))\n\
    \nplt.figure()\nplt.plot(eta,wave)\nplt.xlabel('Position')\nplt.ylabel('Scale')\n\
    plt.show()\n```\n\n为了熟悉小波功率谱，我们计算第 5.6 节中使用的合成数据的连续小波变换 (CWT)。我们首先加载包含在文件 *series3.txt*\
    \ 中的合成数据，同时记住数据包含 100、40 和 20 kyrs 的周期性以及加性高斯噪声，并且它们在时间轴上分布不均匀：\n\n```\nseries3\
    \ = np.loadtxt('series3.txt')\n```\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_199_0.png)\n\
    \n图 5.15 波数为 6 的 Morlet 母小波。\n\n与傅里叶变换（第 5.3 至 5.6 节）类似，而与 Lomb–Scargle 算法（第 5.7\
    \ 节）相反，小波变换要求数据均匀分布，因此我们使用 interp1d() 对数据进行插值：\n\n```\nt = np.arange(0.,996.+3.,3.)\n\
    fun = interpolate.interp1d(series3[0:,0],\n    series3[0:,1],kind='linear')\n\
    series3L = fun(t)\n```\n\n如果我们的时间序列存在趋势，我们需要在运行小波分析之前去除该趋势（参见第 5.4 节）：\n\n```\n\
    series3L = signal.detrend(series3L)\n```\n\n然后我们使用 cwt()，输入数据序列 series3L 和采样间隔的倒数作为采样频率。在我们的示例中，采样间隔为\
    \ 3，因此采样频率为 1/3。使用 Morlet 小波的 cwt() 输出是小波变换 cwtmatr：\n\n```\nfs = 1/3\nfreqs =\
    \ np.linspace(0.001,fs/2,1000)\nw0 = 6.\nwidths = w0*fs/(2.*np.pi*freqs)\ncwtmatr\
    \ = signal.cwt(series3L,\n    signal.morlet2,widths,w=w0)\n```\n\n我们现在显示小波功率谱。我们可以更改坐标轴的限制、颜色映射表以及许多其他内容。我们可以看到频率为\
    \ 0.01/kyr（对应于 100 kyrs 的周期）、0.025/kyr（40 kyrs）和 0.05/kyr（20 kyrs）的周期。小波功率谱的优点在于它们显示的是演化谱，即周期随时间的出现和消失：\n\
    \n```\nplt.contourf(t,freqs,np.abs(cwtmatr),\n    cmap='viridis',\n    shading='gouraud')\n\
    plt.colorbar()\nplt.xlabel('Time (kyr)')\nplt.ylabel('Frequency (1/kyr)')\nplt.xlim([0,1000])\n\
    plt.ylim([0.,.07])\nplt.show()\n```\n\n我们现在显示相同的图，但 y 轴使用周期而不是频率。我们可以看到周期为 100\
    \ kyrs、40 kyrs 和 20 kyrs 的周期（图 5.16）：\n\n```\nperiods = 1/freqs\nplt.contourf(t,periods,np.abs(cwtmatr),\n\
    \    cmap='viridis',\n    shading='gouraud')\nplt.colorbar()\nplt.xlabel('Time\
    \ (kyr)')\nplt.ylabel('Frequency (1/kyr)')\nplt.xlim([0,1000])\nplt.ylim([0.,200])\n\
    plt.show()\n```\n\n我们也可以使用 pcolormesh() 代替 contourf() 来显示相同的图（图 5.17）：\n\n```\n\
    plt.pcolormesh(t,periods,np.abs(cwtmatr),\n    cmap='viridis',\n    shading='gouraud')\n\
    plt.colorbar()\nplt.xlabel('Time (kyr)')\nplt.ylabel('Period (kyr)')\nplt.xlim([0,1000])\n\
    plt.ylim([0.,200])\nplt.show()\n```\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_201_0.png)\n\
    \n**图 5.16** 包含在 *series_3.txt* 中的合成数据序列的小波功率谱。该图清楚地显示了频率为 0.01、0.025 和 0.05 kyr⁻¹\
    \ 的主要周期性，分别对应于 100、40 和 20 kyr 的周期。100 kyr 的周期在整个时间序列中都存在，而 40 kyr 的周期仅在约 450\
    \ kyrs 时出现。20 kyr 的周期相对较弱，但可能在整个时间序列中都存在。小波功率谱是使用连续一维小波变换 cwt 计算的。\n\n![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_201_1.png)\n\
    \n**图 5.17** 包含在 *series_3.txt* 中的合成数据序列的小波功率谱。结果与图 5.16 类似，只是这里使用了 pcolormesh()\
    \ 来可视化小波功率谱。\n\n与窗口化功率谱方法相比，小波功率谱在时间和频率轴上都显示出明显更高的分辨率。小波变换不是将时间序列分成重叠的段并计算每段的功率谱，而是使用短波包，这些波包能更好地映射周期性随时间的变化。然而，窗口化功率谱和小波功率谱的缺点是它们都需要均匀分布的数据。Lomb–Scargle\
    \ 方法克服了这个问题，但在映射频域随时间变化的能力方面存在局限性（功率谱方法也是如此）。\n\n## 5.9 检测时间序列中的突变\n\n本节来自基于 MATLAB\
