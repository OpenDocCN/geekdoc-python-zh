    tau = 5\nplt.figure()\nplt.plot(x2[:-tau],x2[tau:])\nplt.xlabel('x_1')\nplt.ylabel('x_2')\n\
    ```\n\n如我们所见，重构的相空间与原始相空间几乎相同。接下来，我们将这个相空间图与一个典型非线性系统的相空间图进行比较：*洛伦兹系统*（Lorenz，1963）。天气模式通常不会以可预测的方式变化。1963\
    \ 年，爱德华·洛伦兹提出了一个简单的三维模型，用于描述大气湍流所表现出的混沌行为。定义洛伦兹系统的变量是大气对流的强度、上升气流和下降气流之间的温差，以及垂直温度剖面偏离线性的程度。初始条件的微小变化可能导致天气模式的巨大差异——这种行为通常被称为*蝴蝶效应*。洛伦兹系统的动力学由三个耦合的非线性微分方程描述：\n\
    \n$$\n\\frac{dx}{dt} = s(y(t) - x(t))\n$$\n\n$$\n\\frac{dy}{dt} = -x(t)z(t) +\
    \ rx(t) - y(t)\n$$\n\n$$\n\\frac{dz}{dt} = x(t)y(t) - bz(t)\n$$\n\n对微分方程进行积分，可以得到一个简单的\
    \ Python 代码来计算洛伦兹系统的 *xyz* 三元组。我们使用 s=10、r=28 和 b=8/3 作为控制混沌行为的系统参数，时间延迟为 dt=0.01。位置向量的初始值为\
    \ x1=8、x2=9 和 x3=25。然而，这些值可以更改为任何其他值，当然这也会改变系统的行为：\n\n```python\ndt = .01\ns =\
    \ 10\nr = 28\nb = 8/3\nx1, x2, x3 = 8, 9, 25\nn = 5000\nx = np.zeros((n,3))\n\
    for i in range(0, n):\n    x1 = x1 + (-s*x1*dt) + (s*x2*dt)\n    x2 = x2 + (r*x1*dt)\
    \ - (x2*dt) - (x3*x1*dt)\n    x3 = x3 + (-b*x3*dt) + (x1*x2*dt)\n    x[i,:] =\
    \ [x1, x2, x3]\n```\n\n可以通过绘制 x[:,0] 随时间的变化来查看变量（例如，第一个变量）的典型轨迹（图 5.23）：\n\n```python\n\
    t = np.linspace(0.01,50,n)\n\nplt.figure()\nplt.plot(t,x[:,0])\nplt.xlabel('Time')\n\
