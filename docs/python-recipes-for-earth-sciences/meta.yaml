  md: 'Adaptive filters, which are widely used in the telecommunication industry,
    could help in overcoming these problems. An adaptive filter is an inverse modeling
    process that iteratively adjusts its own coefficients automatically without requiring
    any *a priori* knowledge of the signal or the noise. Operating an adaptive filter
    involves 1) a filtering process whose purpose is to produce an output in response
    to a sequence of data and 2) an adaptive process that provides a mechanism for
    adaptively controlling the filter weights (Haykin 2003).


    In most practical applications, the adaptive process is oriented toward minimizing
    an estimation error. The estimation error $e$ at an instant $i$ is defined as
    the difference between the desired response $d_i$ and the actual filter output
    $y_i$, which is the filtered version of a signal $x_i$, as shown by


    $$e_i = d_i - y_i$$


    where $i = 1, 2, ..., n$ and $n$ is the length of the input data array. In the
    case of a non-recursive filter that is characterized by an array of filter weights
    $W$ with $f$ elements, the filter output $y_i$ is given by the inner product of
    the transposed array $W$ and the input array $X_i$:


    $$y_i = W^T \cdot X_i$$


    The choice of desired response $d$ that is used in the adaptive process depends
    on the application. Traditionally, $d$ is a combination signal that is comprised
    of a signal $s$ and random noise $n_0$. The signal $x$ contains noise $n_1$ that
    is uncorrelated with the signal $s$ but correlated in some unknown way with the
    noise $n_0$. In noise-canceling systems, the practical objective is to produce
    a system output $y$ that is a best fit in the least-squares sense to the desired
    response $d$.


    Different approaches have been developed for solving this multivariate minimum
    error optimization problem (e.g., Widrow and Hoff 1960; Widrow et al. 1975; Haykin
    1991). The selection of one algorithm over another is influenced by various factors,
    including the rate of convergence (i.e., the number of adaptive steps required
    for the algorithm to converge close enough to an optimum solution), the misadjustment
    (i.e., the measure of the amount by which the final value of the mean squared
    error deviates from the minimum squared error of an optimal filter; e.g., Wiener
    1949; Kalman and Bucy 1961), and the tracking (i.e., the capability of the filter
    to work in a nonstationary environment and to track changing statistical characteristics
    of the input signal) (Haykin 1991).


    The simplicity of the least-mean-squares (LMS) algorithm—which was originally
    developed by Widrow and Hoff (1960)—has made it the benchmark against which other
    adaptive filtering algorithms are tested. For applications in the earth sciences,
    we use a variant of this filter to extract the noise from two signals $S$ and
    $X$, both of which contain the same signal $s$, but with uncorrelated noises $n_1$
    and $n_2$, (Hattingh 1988). As an example, consider a simple duplicate set of
    measurements of the same material, such as two parallel stable isotope records
    from the same foraminifera species. We would expect two time series, each with
    $n$ elements and that contain the same desired signal overlain by different, uncorrelated
    noise. The first record is used as the primary input $S$,'
  merge: -1
  pgno: 253
- img_proc: true
  md: '$S = (s_1, s_2, \dots, s_n)$


    and the second record is used as the reference input $X$:


    $X = (x_1, x_2, \dots, x_n)$


    As demonstrated by Hattingh (1988), the desired noise-free signal can be extracted
    by filtering the reference input $X$ using the primary input $S$ as the desired
    response $d$. The minimum error optimization problem is solved by the least-mean-square
    norm. The mean squared error $e_i^2$ is a second-order function of the weights
    in the nonrecursive filter. The dependence of $e_i^2$ on the unknown weights $W$
    may be seen as a multidimensional paraboloid with a uniquely defined minimum point.
    The weights that correspond to the minimum point on this error surface define
    the optimal Wiener solution (Wiener 1949). The value that is computed for the
    weight array $W$ using the LMS algorithm represents an estimator whose expected
    value approaches the Wiener solution as the number of iterations approaches infinity
    (Haykin 1991). Gradient methods are used to reach the minimum point on the error
    surface. To simplify the optimization problem, Widrow and Hoff (1960) developed
    an approximation for the required gradient function that can be computed directly
    from the data. This leads to a simple relationship for updating the filter weight
    array $W$:


    $W_{i+1} = W_i + 2 \cdot u \cdot e_i \cdot X_i$


    The new set of filter weights $W_{i+1}$ is based on the previous set $W_i$ plus
    a term that is the product of a bounded step size (or convergence factor) $u$,
    a function of the input state $X_i$, and a function of the error $e_i$. In other
    words, the error $e_i$ calculated from the previous step is fed back into the
    system in order to update filter coefficients for the next step (Fig. 6.6). The
    fixed convergence factor $u$ regulates the speed and stability of adaption. A
    low value of $u$ ensures a higher level of accuracy, but more data are needed
    to enable the filter to reach the optimum solution. In the modified version of
    the LMS algorithm by Hattingh (1988), this problem is overcome by processing the
    data in a loop such that the filter can have another chance to improve its own
    coefficients and adapt to changes in the data.


    In the following example, which introduces `canc()`, each of these loop runs is
    called an iteration, and many loop runs are required if optimal results are to
    be achieved. This algorithm extracts the noise-free signal from two arrays `x`
    and `s`, which contain the correlated signals and uncorrelated noise. As an example,
    we generate two signals `yn1` and `yn2`, which contain the same sine wave but
    different Gaussian noise:


    ```

    %reset -f


    import numpy as np

    from numpy import linalg as linalg

    from canc import canc

    from matplotlib import cm

    import scipy.signal as signal

    ```'
