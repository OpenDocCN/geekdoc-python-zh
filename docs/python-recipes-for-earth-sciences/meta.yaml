    # 10.8 Graphical Representation of Spherical Data


    There are many ways to display spherical data. However, since we always present
    data in two dimensions (i.e., either on a sheet of paper or on a computer screen),
    we need to convert them to one of many available projections. Python does not
    offer many functions for displaying or processing spherical data, especially not
    in a form commonly used in the geosciences. The only exception lies with functions
    such as those used to display geographic data on a globe, some of which we use
    here.


    We begin by using synthetic data for longitude lon and latitude lat, which are
    calculated using vmises(). We first reset the random number generator using random.seed(0)
    and define the sample size n. We then define the mean of the lon and lat values
    in degrees, convert both values to radians, define the concentration parameter
    kappa, and use vmises() (which is included in the electronic supplement of this
    book) to calculate n=100 values for lon and lat. Finally, we convert the lon and
    lat values to degrees:


