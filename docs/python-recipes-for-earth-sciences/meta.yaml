    # 3.2 Empirical Distributions


    Let us assume that we have collected a number of measurements $x_i$ from a specific
    object. The collection of data (or sample) as a subset of the population of interest
    can be written as a vector or a one-dimensional array $x$


    $$x = (x_1, x_2, \dots, x_n)$$


    that contains a total of $n$ observations. The array $x$ may contain a large number
    of data points, and understanding its properties may consequently prove difficult.
    Descriptive statistics are therefore often used to summarize the characteristics
    of the data. The statistical properties of the data set may be used to define
    an empirical distribution, which can then be compared with a theoretical distribution.


    The most straightforward way of investigating sample characteristics is by displaying
    the data in graphical form. Plotting all of the data points along a single axis
    does not reveal a great deal of information about the data set. However, the density
    of the points along the scale does provide some information about the characteristics
    of the data. A widely used graphical display of univariate data is the *histogram*
    (Fig. 3.1). A histogram is a bar plot of a frequency distribution that is organized
    into intervals, or *classes*. Such histogram plots provide valuable information
    on the characteristics of the data, such as the *central tendency*, the *dispersion*,
    and the *general shape* of the distribution. However, quantitative measures provide
    a more accurate way of describing the data set than does the graphical form. In
    purely quantitative terms, for example, the *mean* and the *median* define the
    central tendency of the data set, while the data dispersion is expressed in terms
    of the *range* and the *standard deviation*.


    ![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_70_0.png)


    **Fig. 3.1** Graphical representation of an empirical frequency distribution.
    **a** In a *histogram*, the frequencies are organized into *nbin* classes and
    are plotted as a bar plot. **b** The *cumulative distribution plot* of a frequency
    distribution displays the totals of all observations less than or equal to a certain
    value. This plot is normalized to a total number of observations of one.'
  - '[PAGE 71]


    # Measures of Central Tendency


    Parameters of central tendency (or location) represent the most important measures
    for characterizing an empirical distribution (Fig. 3.2). These values help locate
    the data on a linear scale, and they represent a typical or best value that describes
    the data. The most popular indicator of central tendency is the *arithmetic mean*,
    which is the sum of all data points $x_i$ divided by the number of observations
    $n$:


    $$\bar{x} = \frac{1}{n} \sum_{i=1}^{n} x_i$$


    The arithmetic mean of a univariate data set can also be referred to as the mean,
    or the average. The sample mean is used as an estimate of the population mean
    $\mu$ if the underlying theoretical distribution is a Gaussian (or normal) distribution.
    However, the arithmetic mean is sensitive to outliers, that is, extreme values
    that may be very different from the majority of the data, and the *median* is
    therefore often used as an alternative measure of central tendency. The median
    is the $x$-value that lies in the middle of the data set, that is, 50% of all
    observations lie below the median, and 50% lie above it. The median of a data
    set sorted in ascending order is defined as


    $$\tilde{x} = x_{(n+1)/2}$$


    if $n$ is odd and


    $$\tilde{x} = (x_{(n/2)} + x_{(n/2)+1})/2$$


    ![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_71_0.png)


    **Fig. 3.2** Measures of *central tendency*. **a** In a unimodal symmetric distribution,
    the mean, the median, and the mode are all identical. **b** In a skewed distribution,
    the median lies between the mean and the mode. The mean is highly sensitive to
    outliers, whereas the median and the mode are little influenced by extremely high
    or low values. The median usually lies in a skewed distribution.'
  - '[PAGE 72]


    if $n$ is even. Although outliers also affect the median, their absolute values
    do not influence it. *Quantiles* are a more general way of dividing the data sample
    into groups that contain equal numbers of observations. For example, three *quartiles*
    divide the data into four groups, four *quintiles* divide the observations into
    five groups, and 99 *percentiles* define one hundred groups.


    The third important measure of central tendency is the *mode*. The mode is the
    most frequent $x$-value or—if the data are grouped into classes—the center of
    the class with the largest number of observations. The data set has no mode if
    there are no values that appear more frequently than any of the other values.
    Frequency distributions with a single mode are called *unimodal*, but there may
    also be two modes (*bimodal*), three modes (*trimodal*), or four or more modes
    (*multimodal*) (Fig. 3.3).


    The mean, median, and mode are used when several quantities add together to produce
    a total, whereas the *geometric mean* is often used if these quantities are multiplied.
    Let us assume that the population of an organism grows by 10% in the first year,
    by 25% in the second year, and by 60% in the third year. The average rate of growth
    is not the arithmetic mean since the original number of individuals has increased
    by a factor (and not a sum) of 1.1 after one year, 1.25 after the second year,
    and 1.6 after the third year. The average growth of the population is therefore
    calculated by the geometric mean:


    ```

    $$\bar{x}_G = (x_1 \cdot x_2 \cdot \ldots \cdot x_n)^{1/n}$$

    ```


    The average growth of these values is 1.3006, which suggests an approximate per
    annum growth in the population of 30%. The arithmetic mean would result in an
    erroneous value of 1.3167, or approximately 32% annual growth. The geometric mean
    is also a useful measure of central tendency for skewed data, such log-normally
    distributed data; however, it does not apply if zeros or negative values are present.
    Finally, the *harmonic mean*


    ```

    $$\bar{x}_H = n / \left( \frac{1}{x_1} + \frac{1}{x_2} + \cdots + \frac{1}{x_n}
    \right)$$

    ```


    is also used to derive a mean value for asymmetric data (e.g., log-normally distributed
    data), as is the geometric mean, but neither is robust to outliers. The harmonic
    mean is a better average when the numbers are defined in relation to a particular
    unit. The commonly quoted example is for averaging velocities. The harmonic mean
    is also used to calculate the mean of sample sizes.


    # Measures of Dispersion


    Another important property of a distribution is dispersion. Some of the parameters
    that can be used to quantify dispersion are illustrated in Fig. 3.3. The simplest
    way to describe the dispersion of a data set is by using the *range*, which is
    the difference between the highest and lowest values in the data set and is given
    by


    ```

    $$\Delta x = x_{max} - x_{min}$$

    ```'
