    \ bytes, and their type (see Sect. 2.5 for more details). Note that Python is\
    \ case sensitive by default such that A and a define two different variables.\
    \ In this context, it has long been recommended that uppercase letters be used\
    \ for arrays (or matrices) that have two dimensions or more and that lowercase\
    \ letters be used for one-dimensional arrays (or vectors) and for scalars. However,\
    \ it is also common to use variables with mixed uppercase and lowercase letters.\
    \ This is particularly important when using descriptive variable names, that is,\
