    # 9.3 Independent Component Analysis (by N. Marwan)


    Principal component analysis (PCA) is the standard method for unmixing (or separating)
    mixed variables (Sect. 9.2). Such analyses produce signals that are linearly uncorrelated,
    and the method is therefore also called *whitening* because this property is characteristic
    of *white noise*. Although the separated signals are uncorrelated, they can still
    be interdependent (i.e., they may retain a nonlinear correlation). This phenomenon
    arises, for example, when data are not Gaussian distributed and PCA consequently
    does not yield good results. *Independent component analysis* (ICA) was developed
    for this type of task; it separates the variables $X$ into independent variables
    $S$, which are then nonlinearly uncorrelated. In order to perform an ICA (according
    to the central limit theorem), the mixture of standardized random numbers must
    be Gaussian distributed. ICA algorithms therefore use a criterion that estimates
    how Gaussian the combined distribution of the independent components is (Hyvärinen
    1999). The less Gaussian this distribution is, the more independent the individual
    components are.


    According to the linear mixing model, $p$ independent variables $X = (x_1, x_2,
    \dots, x_p)$ are linearly mixed in $n$ measurements:


    $$X = A^T \cdot S$$


    We are interested in the source variables $S$ and in the mixing matrix $A$ (see
    Sect. 9.2). This task is perhaps analogous to being at a party in which many people
    are carrying on independent conversations: We can hear a mixture of the conversations
    but cannot distinguish them individually. We could perhaps install some'
