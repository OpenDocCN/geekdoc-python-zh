    We then compute the periodogram by calculating the Fourier transform of the sequence
    x. The fastest possible Fourier transform using fft.rfft() computes the Fourier
    transform for nfft frequencies, where nfft is the next power of two that is closest
    to the number of data points n in the original signal x. Since the length of the
    data series is n=1000, the Fourier transform is computed for nfft=1024 frequencies,
    while the signal is padded with nfft-n=24 zeros:


    ```

