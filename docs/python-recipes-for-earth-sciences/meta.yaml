  - '[PAGE 323]


    We now briefly discuss a number of other aspects of variography:


    +   - *Sample size* – As in any statistical procedure, as large a sample as possible
    is required in order to obtain a reliable estimate. For variography, the number
    of samples should be greater than 100 (and ideally, greater than 150) (Webster
    and Oliver 2007). For smaller sample numbers, a maximum likelihood variogram should
    be computed (Pardo-Igúzquiza and Dowd 1997).

    - *Sampling design* – In order to obtain a good estimation close to the origin
    of the variogram, the sampling design should include observations over small distances.
    This can be achieved by means of a nested design (Webster and Oliver 2007). Other
    possible designs have been evaluated by Olea (1984).

    - *Anisotropy* – Thus far, we have assumed that the structure of spatial correlation
    is independent of direction. We have calculated *omnidirectional variograms* while
    ignoring the direction of the separation vector *h*. In a more thorough analysis,
    the variogram should be discretized not only in distance, but also in direction
    (directional bins). By plotting *directional variograms* (usually in four directions),
    we are sometimes able to observe different ranges (*geometric anisotropy*), different
    scales (*zonal anisotropy*), and different shapes (which indicate a trend). Treating
    anisotropy requires a highly interactive graphical user interface, which lies
    beyond the scope of this book (see the VarioWin software by Panatier 1996).

    - *Number of pairs and the lag interval* – When calculating the classic variogram
    estimator, more than 30 pairs of points (and ideally, more than 50) should be
    used per lag interval (Webster and Oliver 2007) due to the estimator''s sensitivity
    to outliers. If there are fewer pairs, the lag interval should be increased. The
    lag spacing does not necessarily need to be uniform and can be chosen individually
    for each distance class. It is also possible to work with overlapping classes,
    in which case the *lag width* (*lag tolerance*) must be defined. However, increasing
    the lag width can cause unnecessary smoothing and a resulting loss of detail.
    The separation distance and the lag width must therefore be chosen with care.
    Another option is to use a more robust variogram estimator (Cressie 1990, 1993;
    Deutsch and Journel 1998).

    - *Calculating the separation distance* – If the observations cover a large area
    (e.g., more than 1000 km²), spherical distances instead of Pythagorean distances
    should be calculated from a planar Cartesian coordinate system.


    # Kriging


    We now interpolate our observations to a regular grid using *ordinary point kriging*,
    which is the most popular kriging method. Ordinary point kriging uses a weighted
    average of the neighboring points to estimate the value of an unobserved point,'
  - '[PAGE 324]


    $$\hat{z}_{x_0} = \sum_{i}^{n} \lambda_i \cdot z_{x_i}$$


    where $\lambda_i$ are the weights that must be estimated. The sum of the weights
    should be equal to one in order to guarantee that the estimates are unbiased:


    $$\sum_{i}^{n} \lambda_i = 1$$


    The expected (average) error for the estimation must be zero, that is,

    $$E(\hat{z}_{x_0} - z_{x_0}) = 0$$


    where $z_{x_0}$ is the true (but unknown) value. We can use the equations above
    to algebraically compute the mean squared error in terms of the variogram,


    $$E\left(\left(\hat{z}_{x_0} - z_{x_0}\right)^2\right) = 2\sum_{i=1}^{n} \lambda_i
    \gamma(x_i, x_0) - \sum_{i=1}^{n} \sum_{j=1}^{n} \lambda_i \lambda_j \gamma(x_i,
    x_j)$$


    where $E$ is the estimation or *kriging variance* (which must be minimized), $\gamma(x_i,
    x_0)$ is the variogram (semivariance) between the data points and the unobserved
    points, $\gamma(x_i, x_j)$ is the variogram between the data points $x_i$ and
    $x_j$, and $\lambda_i$ and $\lambda_j$ are the weights of the $i$th and $j$th
    data points.


    For kriging, we must minimize this equation (a quadratic objective function) in
    order to satisfy the condition that the sum of the weights must be equal to one
    (linear constraint). This optimization problem can be solved using a Lagrange
    multiplier $\nu$, which results in a *linear kriging system* of $n+1$ equations
    and $n+1$ unknowns:


    $$\sum_{i=1}^{n} \lambda_i \gamma(x_i, x_j) + \nu = \gamma(x_i, x_0)$$


    After obtaining the weights $\lambda_i$, the kriging variance is given by

    $$\sigma^2(x_0) = \sum_{i=1}^{n} \lambda_i \gamma(x_i, x_0) + \nu(x_0)$$


    The kriging system can also be presented in array notation,

    $$G\_mod \cdot E = G\_R$$


    where

    $$G\_mod = \begin{bmatrix} 0 & \gamma(x_1, x_2) & \dots & \gamma(x_1, x_n) & 1
    \ \gamma(x_2, x_1) & 0 & \dots & \gamma(x_2, x_n) & 1 \ \nu & \nu & \dots & \nu
    & \nu \ \gamma(x_n, x_1) & \gamma(x_n, x_2) & \dots & 0 & 1 \ 1 & 1 & \dots &
    1 & 0 \end{bmatrix}$$'
