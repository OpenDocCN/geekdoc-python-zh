    # 10.4 Theoretical Distributions of Circular Data


    As in Chap. 3, the next step in a statistical analysis is to find a suitable theoretical
    distribution that we then fit to the empirical distribution that was visualized
    and described in the previous section. The classic theoretical distribution for
    describing directional data is the von Mises distribution, which is named after
    Austrian mathematician Richard Edler von Mises (1883–1953). The probability density
    function of a von Mises distribution is


    $$f(\theta) = \frac{1}{2\pi I_0(\kappa)} e^{\kappa \cos(\theta - \mu)}$$


    where μ is the mean direction and κ is the concentration parameter (Mardia and
    Jupp 1999) (Fig. 10.5). The term $I_0(\kappa)$ is the zero-order modified Bessel
    function of the first kind. Bessel functions are solutions of a second-order differential
    equation (Bessel’s differential equation) and are important in many problems involving
    wave propagation in a cylindrical waveguide or in problems involving heat conduction
    in a cylindrical object. The von Mises distribution is also known as the circular
    normal distribution since it has similar characteristics to a normal distribution
    (Sect. 3.4). This distribution is used when the mean direction is the most frequent
    direction. The probability of deviations is equal on either side of the mean direction
    and decreases with increasing distance from the mean direction.


    As an example, let us assume a mean direction of mu=0 and five different values
    for the concentration parameter kappa:'
