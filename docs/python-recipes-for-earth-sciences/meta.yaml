- md: '## 3.12 The Ansari–Bradley Test


    The *Ansari–Bradley test* was introduced by Abdur R. Ansari and Ralph A. Bradley
    (1960) and can be used to determine whether two samples come from the same distribution
    (null hypothesis) or whether they come from distributions with the same median
    and shape but different dispersions (e.g., the variances) (alternative hypothesis).
    In contrast to the *F*-test, which compares the dispersions of normally distributed
    data, the Ansari–Bradley test compares dispersions without requiring a normality
    assumption for the underlying population, that is, it is a non-parametric hypothesis
    test.


    The test requires that the samples have similar medians, which can be achieved
    by subtracting the medians from the samples. The test combines both sets of measurements
    (samples 1 and 2) and arranges them together in ascending order. There are different
    ways to calculate the test statistic $A_n$. Here, we use the method given by Hedderich
    and Sachs (2012, pp. 463),


    $$A_n = \sum_{i=1}^{n} \left( \frac{n+1}{2} - \left| i - \frac{n+1}{2} \right|
    \right) V_i$$


    where the value of the indicator function $V_i$ is 1 for values from sample 1
    and 0 for values from sample 2. The test statistic is therefore equal to the sum
    of the absolute values of the deviations from the mean value $(n+1)/2$ (Hedderich
    and Sachs 2012). The data are first concatenated and sorted (as in the Mann–Whitney
    test introduced in Sect. 3.11). Subsequently, the smallest and largest values
    are assigned rank 1, the second-smallest and second-largest values are assigned
    rank 2, and so forth. The smaller the $A_n$, the larger the dispersion of the
    values between the two samples 1 and 2. Again, the ranking of the data may also
    be corrected for tied values, as was previously carried out in the Mann–Whitney
    test. For $n \leq 20$, we can find the critical values for the test statistic
    $A_n$ in Table 3.1 in the open-access article by Ansari and Bradley (1960). For
    larger values of $n$, we use the standard normal distribution,


    $$Z = \frac{A_n - \mu_{A_n}}{\sqrt{\sigma_{A_n}^2}}$$


    with


    $$\mu_{A_n} = \begin{cases} \frac{1}{4} n_1(n+2), & \text{if } n \text{ is even}
    \\ \frac{1}{4} n_1(n+1)^2/n, & \text{if } n \text{ is odd} \end{cases}$$


    $$\sigma_{A_n} = \begin{cases} n_1 n_2(n^2-4)/(48(n-1)), & \text{if } n \text{
    is even} \\ n_1 n_2(n+1)(n^2+3)/(48n^2), & \text{if } n \text{ is odd} \end{cases}$$


    which is again from Hedderich and Sachs (2012, page 463). The null hypothesis
    can be rejected if the absolute measured z-value is higher than the absolute critical
    z-value, which depends on the significance level α.


    Our first example uses the Ansari–Bradley test to determine whether two samples
    data1 and data2 (each consisting of eight measurements) come from the same distribution
    (null hypothesis) or from distributions with the same median and shape but different
    dispersions (alternative hypothesis). We define two samples using


    ```

    %reset -f


    import numpy as np

    from numpy.random import default_rng

    from scipy import stats


    data1 = np.array([7,14,22,36,40,48,49,52])

    data2 = np.array([3,5,6,10,17,18,20,39])

    ```


    The *SciPy* package provides ansari() for performing the Ansari–Bradley test by
    typing


    ```

    statistic,pvalue = stats.ansari(data1,data2)

    print(statistic)

    print(pvalue)

    ```


    which yields


    ```

    33.0

    0.6060606060606061

    ```


    The result means that we cannot reject the null hypothesis without another cause
    at a 5% significance level. The p-value of 0.6061 (or ~61%, which is greater than
    the significance level) means that the chances of observing either the same result
    or a more extreme result from similar experiments in which the null hypothesis
    is true would be 6,061 in 10,000.


    The second example demonstrates the handling of tied values in a data set with
    a large sample size (>50 measurements). We create such a data set of 100 measurements
    by using a random number generator:


    ```

    rng = default_rng()

    data1 = 3.4 + rng.standard_normal(100)

    data2 = 4.3 + rng.standard_normal(100)

    ```


    We then replace some values in data1 and data2 in order to introduce replicate
    (or tied) values:


    ```

    data1[49:55] = 2.5

    data2[24:28] = 2.5

    ```


    Using


    ```

    statistic,pvalue = stats.ansari(data1,data2)

    print(statistic)

    print(pvalue)

    ```


    yields


    ```

    4918.0

    0.5187725818910889

    ```


    This result means that we cannot reject the null hypothesis without another cause
    at a 5% significance level. The p-value of 0.5188 (or ~52%, which is greater than
    the significance level) means that the chances of observing either the same result
    or a more extreme result from similar experiments in which the null hypothesis
    is true would be 5,188 in 10,000.


    We can use the same script to test whether the two samples in organicmatter_four.mat
    come from the same distribution (null hypothesis) or from distributions with the
    same median and shape but different dispersions (alternative hypothesis). We clear
    the workspace and load the data:


    ```

    corg = np.loadtxt(''organicmatter_four.txt'')

    corg1 = corg[0:,0]

    corg2 = corg[0:,1]

    ```


    We use ansari() to perform the Ansari–Bradley test by typing


    ```

    statistic,pvalue = stats.ansari(corg1,corg2)

    print(statistic)

    print(pvalue)

    ```


    which yields


    ```

    1861.0

    0.7448408885112794

    ```


    The result means that we cannot reject the null hypothesis without another cause
    at a 5% significance level. The p-value of 0.7448 (or ~74%, which is greater than
    the significance level) means that the chances of observing either the same result
    or a more extreme result from similar experiments in which the null hypothesis
    is true would be 7,448 in 10,000.


    ## 3.13 Distribution Fitting


    In Sect. 3.9 we computed the mean and the standard deviation of a sample and designed
    a normal distribution based on these two parameters. We then used the χ²-test
    to test the hypothesis that our data indeed follow a Gaussian (or normal) distribution.
    Distribution-fitting functions that are contained in the scikit-learn package
    provide powerful tools for estimating distributions directly from the data.


    The function for fitting normal distributions to the data is norm.fit(). To demonstrate
    the use of this function, we first generate 100 synthetic Gaussian-distributed
    sets of values with a mean of 6.4 and a standard deviation of 1.4:


    ```

    %reset -f


    import numpy as np

    import numpy.ma as ma

    import matplotlib.pyplot as plt

    from numpy.random import default_rng

    from scipy import stats

    from sklearn.mixture import GaussianMixture


    rng = np.random.default_rng(0)

    data = 6.4 + 1.4*rng.standard_normal(100)

    ```


    We then define the midpoints v of nine histogram intervals with edges e, display
    the results, and calculate the frequency distribution n:


    ```

    plt.figure()

    plt.hist(data)

    plt.show()


    n,e = np.histogram(data,bins=8)

    v = np.diff(e[0:2])*0.5+e[0:-1]

    ```


    The function norm.fit() yields estimates of the mean muhat, and the standard deviation
    sigmahat of the normal distribution for the observations in data


    ```

    mu,std = stats.norm.fit(data)

    print(mu)

    print(std)

    ```


    yields


    ```

    6.513535370887004

    1.3469826455752003

    ```


    These values for the mean and the standard deviation are similar to those that
    we defined initially. We can now calculate the frequency distribution of the normal
    distribution with the mean muhat and the standard deviation sigmahat. Then, we
    can scale the resulting probability density function y to the same total number
    of observations in data and plot the result:


    ```

    res = 1/20

    x = np.arange(2,12,res)

    pdf = stats.norm.pdf(x,mu,std)

    pdf = len(data)*(1/res)*pdf/sum(pdf)


    plt.figure()

    plt.bar(v,n)

    plt.plot(x,pdf,color=''r'')

    plt.show()

    ```


    In the earth sciences, we often encounter mixed distributions. Examples include
    multimodal grain size distributions (Sect. 8.10), multiple preferred paleocurrent
    directions (Sect. 10.6), and multimodal chemical ages in monazite that reflect
    multiple episodes of deformation and metamorphism in a mountain belt. Fitting
    Gaussian mixture distributions to the data is done to determine the means and
    variances of the individual distributions that combine to produce the mixed distributions.
    The methods described in this section help in determining the episodes of deformation
    in a mountain range or in separating the different paleocurrent directions caused
    by tidal flow in an ocean basin.


    As a synthetic example of Gaussian mixture distributions we generate two sets
    of 100 random numbers ya and yb with means of 6.4 and 13.3 and standard deviations
    of 1.4 and 1.8, respectively. We then vertically concatenate the series using
    hstack() and store the 200 data values in the variable data:


    ```

    rng = np.random.default_rng(0)

    ya = 6.4 + 1.4*rng.standard_normal(100)

    yb = 13.3 + 1.8*rng.standard_normal(100)


    data = ma.hstack([ya,yb])

    ```'
  mdcn: '## 3.12 安萨里-布拉德利检验


    *安萨里-布拉德利检验*由阿卜杜勒·R·安萨里和拉尔夫·A·布拉德利（1960年）提出，可用于判断两个样本是来自同一分布（原假设），还是来自具有相同中位数和形状但离散度（例如方差）不同的分布（备择假设）。与比较正态分布数据离散度的*F*检验不同，安萨里-布拉德利检验在比较离散度时不要求底层总体满足正态性假设，即它是一种非参数假设检验。


    该检验要求样本具有相似的中位数，这可以通过从样本中减去中位数来实现。检验将两组测量值（样本1和样本2）合并，并按升序排列。计算检验统计量$A_n$有多种方法。此处，我们使用Hedderich和Sachs（2012年，第463页）给出的方法：


    $$A_n = \sum_{i=1}^{n} \left( \frac{n+1}{2} - \left| i - \frac{n+1}{2} \right|
    \right) V_i$$


    其中，指示函数$V_i$的值对于来自样本1的值为1，对于来自样本2的值为0。因此，检验统计量等于与均值$(n+1)/2$的偏差绝对值之和（Hedderich
    and Sachs 2012）。数据首先被连接并排序（如第3.11节介绍的曼-惠特尼检验）。随后，最小值和最大值被赋予秩1，第二小值和第二大值被赋予秩2，依此类推。$A_n$越小，表示样本1和样本2之间的值离散度越大。同样，数据的秩也可以针对结值进行校正，正如之前在曼-惠特尼检验中所做的那样。对于$n
    \leq 20$，我们可以在安萨里和布拉德利（1960年）的开放获取文章中的表3.1中找到检验统计量$A_n$的临界值。对于较大的$n$值，我们使用标准正态分布：


    $$Z = \frac{A_n - \mu_{A_n}}{\sqrt{\sigma_{A_n}^2}}$$


    其中


    $$\mu_{A_n} = \begin{cases} \frac{1}{4} n_1(n+2), & \text{如果 } n \text{ 是偶数} \\
    \frac{1}{4} n_1(n+1)^2/n, & \text{如果 } n \text{ 是奇数} \end{cases}$$


    $$\sigma_{A_n} = \begin{cases} n_1 n_2(n^2-4)/(48(n-1)), & \text{如果 } n \text{
    是偶数} \\ n_1 n_2(n+1)(n^2+3)/(48n^2), & \text{如果 } n \text{ 是奇数} \end{cases}$$


    这同样来自Hedderich和Sachs（2012年，第463页）。如果测量的z值的绝对值大于临界z值的绝对值（取决于显著性水平α），则可以拒绝原假设。


    我们的第一个例子使用安萨里-布拉德利检验来判断两个样本data1和data2（各包含八个测量值）是来自同一分布（原假设），还是来自具有相同中位数和形状但离散度不同的分布（备择假设）。我们使用以下代码定义两个样本：


    ```

    %reset -f


    import numpy as np

    from numpy.random import default_rng

    from scipy import stats


    data1 = np.array([7,14,22,36,40,48,49,52])

    data2 = np.array([3,5,6,10,17,18,20,39])

    ```


    *SciPy*包提供了ansari()函数来执行安萨里-布拉德利检验，输入：


    ```

