  md: '![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_328_0.png)


    (see Kitanidis 1997) and by *block kriging*, which averages the observations within
    a certain neighborhood (or block). While the kriging variance depends only on
    the distance between the observed and unobserved locations, it is primarily a
    measure of the density of information (Wackernagel 2003). The accuracy of kriging
    is better evaluated by cross-validation using a resampling method or a surrogate
    test (Sects. 4.5 and 4.6). The influence of the neighboring observations on the
    estimation depends on their configuration, as summarized by Webster and Oliver
    (2007): “Near points carry more weight than more distant ones; the relative weight
    of a point decreases when the number of points in the neighborhood increases;
    clustered points carry less weight individually than isolated ones at the same
    distance; data points can be screened by ones lying between them and the target.”
    The sampling design for kriging is different from the design that might be optimal
    for variography. A regular grid (be it triangular or quadratic) can be regarded
    as optimal.


    The Python code presented here is a straightforward implementation of the formulas
    presented above. In professional programs, the number of data points that enter
    the array *G_mod* is restricted – and the inversion of *G_mod* is avoided – by
    working with the covariances instead of variograms (Kitanidis 1997; Webster and
    Oliver 2007). For those interested in programming or in gaining a deeper understanding
    of algorithms, the publication by Deutsch and Journel (1998) is essential reading.
    The best Internet source is the homepage for AI-GEOSTATISTICS:


    https://wiki.52north.org/AI_GEOSTATS/WebHome'
