    \ be equally well described by a polynomial fit of a higher degree, such as a\
    \ second-degree polynomial:\n\n$$y = b_0 + b_1x + b_2x^2$$\n\nTo clear the workspace\
    \ and reload the original data, we type\n\n```\n%reset -f\n\nimport numpy as np\n\
    import numpy.ma as ma\nimport matplotlib.pyplot as plt\nfrom numpy.random import\
