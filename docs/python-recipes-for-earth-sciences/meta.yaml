    \ The classic linear regression method makes two assumptions about the data: (1)\
    \ that there is a linear relationship between $x$ and $y$ and (2) that the unknown\
    \ errors around the means have a normal (Gaussian) distribution with a similar\
    \ variance for all data points. Logarithmizing the $y$-values violates this assumption\
    \ because errors then have a log-normal distribution and the regression therefore\
    \ places less weight on the larger $y$-values.\n\nTo see the difference in the\
