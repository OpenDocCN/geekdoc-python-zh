    values $x(t)$, $x(t + \tau)$, and $x(t + 2\tau)$ with a temporal separation $\tau$
    are represented as a point in a three-dimensional coordinate system (i.e., the
    phase space) (Packard et al. 1980). The *phase space portrait* displays the embedded
    time series of observations as a trajectory $\vec{y}(t) = [x(t), x(t + \tau),
    x(t + 2\tau)]^T$ within the phase space. The phase space trajectory represents
    the path over which the system''s state evolves through time. The reconstructed
    phase space (which is reconstructed via embedding) is not exactly the same as
    the original phase space (the true variables that describe the lake), but its
    topological properties are preserved provided that the *embedding dimension* is
    sufficiently large (Packard et al. 1980; Takens 1981).


    As an example, we now explore the phase space portrait of a periodic process.
    We first create the position vector x1 and the velocity vector x2:


