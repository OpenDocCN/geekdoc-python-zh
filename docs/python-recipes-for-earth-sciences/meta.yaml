    and we observe the three periods of 50, 15, and 5, as expected. Since the values
    on the x-axis of this plot are not evenly spaced (in contrast to those on the
    frequency axis), we find that the long periods are poorly resolved, and a broad
    peak appears at a period of 50 in the graphics. The code for the power spectral
    density can be rewritten to make it independent of the sampling frequency,


    ```

    Fs = 1

    t = np.arange(1/Fs,1000/Fs+1/Fs,1/Fs)

    t = np.transpose(t)

    x = 2*np.sin(2*np.pi*t/50) + \n    np.sin(2*np.pi*t/15) + \n    0.5*np.sin(2*np.pi*t/5)


