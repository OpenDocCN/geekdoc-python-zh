    A flat-topped or multiple-peaked distribution suggests that there is more than
    one population present in the data set. If these populations can be related to
    particular areas, they should be treated separately. Another reason for the existence
    of multiple peaks can be due to the preferential sampling of areas with high and/or
    low values. This usually happens as a result of some a priori knowledge and is
    referred to as a cluster effect. Dealing with a cluster effect is described in
    Deutsch and Journel (1998) and in Isaaks and Srivastava (1990).


    Most problems arise from positive skewness, that is, if the distribution has a
    long tail to the right. According to Webster and Oliver (2007), root transformation
    should be considered if the skewness is between 0.5 and 1, and logarithmic transformation
    should be considered if the skewness exceeds 1. A general transformation formula
    is


    $$z^* = \begin{cases} ((z+m)^k - 1)/k, & \text{for } k \neq 0 \ \log(z+m), & \text{for
    } k = 0 \end{cases}$$


    for $\min(z)+m>0$. This is known as the Box–Cox transform, which has the special
    case $k=0$ when a logarithm transformation is used. In the logarithm transformation,
    $m$ should be added if $z$ is zero or negative. Interpolation results of power-transformed
    values can be back-transformed directly after kriging. The back-transformation
    of log-transformed values is slightly more complicated and is explained later.
    The procedure is known as *lognormal kriging* and can be important because lognormal
    distributions are not uncommon in geology. Other transformations in geostatistics
    are discussed in Deutsch and Journel (1998) and in Remy et al. (2006). The transformation
    of compositional data is discussed in Chapter 9.7.


    # Variography with the Classic Variogram


    A variogram describes the spatial dependency of referenced observations in a unidimensional
    or multidimensional space. Since the true variogram of the spatial process is
    usually unknown, it must be estimated from observations. This procedure is called
    variography and starts by calculating the *experimental variogram* from the raw
    data. In the next step, the experimental variogram is summarized by the *variogram
    estimator*. The variography then concludes by fitting a variogram model to the
    variogram estimator. The experimental variogram is calculated as the differences
    between pairs of observed values and is dependent on the *separation*'
