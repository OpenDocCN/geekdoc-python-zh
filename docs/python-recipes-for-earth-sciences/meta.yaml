  md: '# 10.2 Graphical Representation of Circular Data


    The classic way of displaying directional data is in a rose diagram, which is
    a histogram for measurements of angles. In contrast to a bar histogram, in which
    with the height of the bars is proportional to the frequency, a rose diagram comprises
    segments of a circle in which the radius of each sector is proportional to the
    frequency. We use synthetic data to illustrate two types of rose diagrams that
    are used to display directional data. We first load a set of directional data
    from the file directional_1.txt:


    ```

    %reset -f


    import numpy as np

    import matplotlib.pyplot as plt


    data_degrees_1 = np.loadtxt(''directional_1.txt'')

    ```


    The data set contains two hundred measurements of angles (in degrees, or °, for
    short). We need to convert all measurements to radians before plotting the data.
    We then bin the data using histogram() and display the counts in a rose diagram.
    This is achieved by first selecting the polar projection in subplot() and then
    plotting a bar chart in the polar coordinate system:


    ```

    data_radians_1 = np.pi*data_degrees_1/180


    e = np.linspace(0,2*np.pi,13)

    v = np.linspace(2*np.pi/24,2*np.pi-2*np.pi/24,12)

    n,e = np.histogram(data_radians_1,bins=e)


    plt.figure()

    ax = plt.subplot(projection=''polar'')

    ax.bar(v,n,width=2*np.pi/12)

    ax.set_xticks(e[0:12])

    plt.show()

    ```


    This rose diagram counts in a counterclockwise direction, with zero degrees lying
    along the x-axis of the coordinate graph. In the geosciences, the angles increase
    in a clockwise direction, with 0° indicating due north, 90° indicating due east,
    and so on. We use set_theta_offset(np.pi/2) to rotate the rose diagram by 90°
    (or π/2) and set_theta_direction(-1) to reverse the direction of the rose diagram.
    We also select the ticks at the values of the class boundaries e (i.e., 0°, 30°,
    60°, ...) using set_xticks() (Fig. 10.2):'
  merge: -1
  pgno: 441
- img_proc: true
  md: '![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_442_0.png)


    Fig. 10.2 Rose diagram for displaying directional data. The radii of the area
    segments are proportional to the frequencies for each class. We use bar with set_theta_offset(np.pi/2)
    and set_theta_direction(-1) such that 0° points due north and 90° points due east,
    i.e., the angles increase in a clockwise direction.


    ```

    plt.figure()

    ax = plt.subplot(projection=''polar'')

    ax.bar(v,n,width=2*np.pi/12)

    ax.set_xticks(e[0:12])

    ax.set_theta_offset(np.pi/2)

    ax.set_theta_direction(-1)

    plt.show()

    ```


    The area of the arc segments increases with the increasing square of the frequency,
    and directions that are twice as frequent as others thus appear to be four times
    as prominent as the others. In a modification, the rose diagram is therefore scaled
    to the square root of the class frequency (Fig. 10.3):


    ```

    plt.figure()

    ax = plt.subplot(projection=''polar'')

    ax.bar(v,np.sqrt(n),width=2*np.pi/12)

    ax.set_xticks(e[0:12])

    ax.set_theta_offset(np.pi/2)

    ax.set_theta_direction(-1)

    plt.show()

    ```


    This plot satisfies all conventions in the geosciences.'
