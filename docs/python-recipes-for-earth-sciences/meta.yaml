    365


    ![](img/d6e7a29ae5532624dfb9e9a2e8f905ba_375_0.png)


    Fig. 8.11 Concept of the Hough transform: a parametrization of lines in the xy-plane
    and b sinusoidal curves in the (θ, ρ) parameter space, with the point of intersection
    corresponding to the line that passes through two different pixels of an edge
    feature. Modified from Gonzalez und Woods (2018).


    image package contains functions that use the Hough transform to detect lines
    or circular objects.


    The classic Hough transform is used to detect lines in images. After applying
    an edge detector of any kind, we end up with a binary image that has black pixels
    on the edges and white pixels in between. We next describe the lines through a
    given black pixel by using the Euclidean distance ρ between the line and the origin
    and by using the angle θ of the vector from the origin to the closest point on
    the line (Fig. 8.11a):


    ρ = x cos θ + y sin θ


    The family of all lines passing through this particular pixel (xᵢ, yᵢ) of an edge
    feature is displayed as a sinusoidal curve in the (θ, ρ) parameter space (Fig.
    8.11b). The intersection point (θ'', ρ'') of two such sinusoidal curves corresponds
    to the line that passes through two different pixels (x₁, y₁) and (x₂, y₂) of
    an edge feature. Next, we search for n points (xᵢ, yᵢ) in the Hough transform
    in which many lines intersect since these points define the line that traces an
    edge feature. Detecting circles instead of lines works in a similar manner by
    using the coordinates of the center of the circle and its radius instead of ρ
    and θ.


    For our first example, we use these functions to detect the thin layers of pure
    white diatomite within exposed varved sediments in the Quebrada de Cafayate in
    Argentina as these sediments were also used as examples in previous sections (Trauth
