    ```\n\n最终，传递性系数是比值\n\n```\nTrans = numTria/numTripl\nprint(Trans)\n```\n\n其结果为\n\
    \n```\n0.6459486011860506\n```\n\n这个数字意味着该系统没有规则的动力学（规则动力学会产生接近1的传递性系数）。\n为了检测动力学的变化，可以对移动窗口计算递归量化分析。移动窗口的递归量化分析可以通过两种方式计算：（1）对沿单个全局递归图移动的窗口计算递归量化分析度量，或（2）对沿原始时间序列移动的窗口计算各自的递归图。如果非平稳性或趋势不是分析的主要关注点，方法（2）有助于找到忽略这些非平稳性的转变。然而，如果检测整体（全局、大尺度）变化是关注点（例如，测试非平稳性），则应保持递归条件随时间不变（从而允许考虑整个时间序列的全局递归图），并应选择方法（1）（Marwan\
    \ 2011）。所选窗口大小需要足够小以确保良好的时间分辨率，但又要足够大以覆盖典型的变异（例如，几个周期），以便找到递归。\n\n在我们的示例中，我们选择移动窗口长度为150个数据点，重叠率为20%（图5.30）：\n\
    \n```\nw = 150\n```\n\n然后我们计算这些移动窗口内的递归率RR和传递性系数Trans（图5.31和5.32）：\n\n```\nTrans\
    \ = np.zeros(len(R)-w)\nRR = np.zeros(len(R)-w)\nfor i in range(0,len(R)-w,int(w/5)):\n\
