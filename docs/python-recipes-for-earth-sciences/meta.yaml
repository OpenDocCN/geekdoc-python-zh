    ## 8.2 数据存储


    矢量图形和栅格图形是存储图像的两种基本格式。存储*矢量数据*的典型格式在上一章已介绍。在下面的示例中，文件 *coastline.txt* 中的两列分别代表多边形点的经度和纬度：


    ```

    NaN          NaN

    42.892067    0.000000

    42.893692    0.001760

    NaN          NaN

    42.891052    0.001467

    42.898093    0.007921

    42.904546    0.013201

    42.907480    0.016721

    42.910414    0.020828

    42.913054    0.024642

    (续)

    ```


    NaN值有助于识别数据中的断点（第7.2节）。*栅格数据*存储为二维或三维数组。这些数组的元素代表变量，例如网格点高于海平面的海拔、年降雨量或（在图像情况下）颜色强度值：


    ```

    174 177 180 182 182 182

    165 169 170 168 168 170

    171 174 173 168 167 170

    184 186 183 177 174 176

    191 192 190 185 181 181

    189 190 190 188 186 183

    ```


    栅格数据可以可视化为三维图。x值和y值是二维数组或任何其他参考框架的索引，z是数组元素的数值（另见第7章）。二维数组中包含的数值可以显示为伪彩色图，这是一个由单元格组成的矩形数组，其颜色由颜色映射表决定。颜色映射表是一个m行3列的实数数组，数值在0.0到1.0之间。每一行定义一种红、绿、蓝（RGB）颜色。上面的数组就是一个例子，可以解释为从0（黑色）到255（白色）的灰度强度。


