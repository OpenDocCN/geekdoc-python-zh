    ```\n\nThis plot helps us to define the axis limits for gridding and contouring.\
    \ The function meshgrid() transforms the domain specified by vectors x and y into\
    \ arrays XI and YI. The rows of the output array XI are copies of the vector x,\
    \ and the columns of the output array YI are copies of the vector y. We choose\
    \ 1.0 as the grid interval and therefore obtain 51 data points in either direction\
    \ x and y:\n\n```\nx = np.linspace(420,470,51)\ny = np.linspace(70,120,51)\nXI,YI\
