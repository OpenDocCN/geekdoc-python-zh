    +   - *Causality*—The system response only depends on present and past inputs
    $x(0)$, $x(-1)$, ..., whereas future inputs $x(+1)$, $x(+2)$, ... have no effect
    on the output $y(0)$. All real-time systems (e.g., telecommunication systems)
    must be causal since they cannot have future inputs available to them. All systems
    and filters in Python are indexed as causal. In the earth sciences, however, numerous
    non-causal filters are used. Filtering images and signals that have been extracted
    from sediment cores is an example for which future inputs are available at the
    time of filtering. Output signals must be delayed after filtering in order to
    compensate for the differences between causal and non-causal indexing.

    - *Stability*—A system is stable if the output $y(t)$ of a finite input $x(t)$
    is also finite. Stability is critical in filter design, where filters often have
    the disadvantage of provoking divergent outputs. In such cases, the filter design
    must be revised and improved.


    *Linear time-invariant (LTI) systems* are very popular as a special type of filter.
    Such systems have all the advantages described above and are also easy to design
