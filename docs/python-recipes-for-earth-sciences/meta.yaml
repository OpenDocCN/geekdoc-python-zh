    ```\n\nTo improve the contrast of the image, we can apply adaptive histogram equalization:\n\
    \n```\nI3 = np.zeros(np.shape(I2))\nI3[:,:,0] = exposure.equalize_adapthist(I2[:,:,0],\n\
    \    clip_limit=0.01, nbins=256)\nI3[:,:,1] = exposure.equalize_adapthist(I2[:,:,1],\n\
    \    clip_limit=0.01, nbins=256)\nI3[:,:,2] = exposure.equalize_adapthist(I2[:,:,2],\n\
    \    clip_limit=0.01, nbins=256)\n\nplt.figure()\nio.imshow(I3)\nplt.axis('off')\n\
    io.show()\n```\n\nWe can now display the Red and NIR channels:\n\n```\nplt.figure()\n\
    plt.subplot(1,2,1)\nio.imshow(I3[:,:,0])\nplt.axis('off')\nplt.title('Red')\n\
    plt.subplot(1,2,2)\nio.imshow(I3[:,:,2])\nplt.axis('off')\nplt.title('NIR')\n\
    io.show()\n```\n\nWe then perform a white balance to correct any unrealistic color\
    \ casts. To do so, we need a reference card (usually gray), which is placed within\
    \ the image and then used as a reference for the white balance. Alternatively,\
    \ we can perform a fully automated white balance (as we do here) by dividing the\
    \ values of each individual channel by the mean of the values of the individual\
    \ colors of meanR, meanG, and meanB and multiplying the values of each channel\
    \ by the mean value of the values of all channels meanGray:"
