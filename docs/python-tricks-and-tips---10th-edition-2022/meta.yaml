    ## 一些常见目录


    既然你知道了如何查看硬盘驱动器的内容，你就会开始注意到许多名为 bin、sbin、var 和 dev 的目录。这些是你在 Mac 上无法接触、在 Windows
    PC 上也不会遇到的文件和目录。


    步骤 1 输入：ls -lah / 以查看硬盘驱动器根目录中的所有文件和目录，包括隐藏项目。在这里，你将看到构成你的 Raspbian 操作系统（Linux
    的一个版本）的所有项目。值得花时间了解其中一些。


    步骤 3 输入：ls /home 显示你的主目录的内容，其中包含 pi；你开始时所在的目录。因此，输入：ls /home/pi 与从默认主目录直接输入 "ls"
    相同。你应该将大多数创建的文档放在这里。不要将 home 与 "usr" 混淆；/usr 目录是你找到程序工具和库的地方。


