    # Python in Focus: Artificial Intelligence


    Artificial Intelligence (AI) and Machine Learning (ML) are the new hot topics
    of the IT industry. AI is fast becoming the working science fiction that it has
    been portrayed as in the past, and behind it is Python.


    Despite how close AI and ML are, there are distinct differences between the two
    technologies. AI refers to the study of how to train a computer to accomplish
    the things that humans can do significantly better and faster. Whereas, ML is
    the ability for a computer to learn from its experiences, so that the outcome
    and performance will eventually become more accurate and accomplished.


    While different, they are both essentially discussing the same element: training
    a system to learn and do things independently. Where AI is said to lead to wisdom,
    ML reportedly leads to knowledge and, thanks to Python, that gap is getting closer
    every day.


    ![](img/d3010096175d19bb2f1bb51316094dea_25_0.png)


    ```

    python

    import keras

    from keras.datasets import mnist

    from keras.models import Sequential

    from keras.layers import Dense, Dropout, Flatten

    from keras.layers import Conv2D, MaxPooling2D


    batch_size = 128

    num_classes = 10

    epochs = 12


    # input image dimensions

    img_rows, img_cols = 28, 28


    (x_train, y_train), (x_test, y_test) = mnist.load_data()

    ```


    # APPLICATIONS


    Both AI and ML are hugely present in today''s technology. Where, just a few years
    ago, most of us associated AI with the rise of a super-intelligent legion of killer
    robots, nowadays you''d be amazed at the numerous examples of AI in your house,
    and even being carried around with you.


    Let''s begin with the obvious use of AI and ML, the smartphone. These devices
    have infiltrated most of our modern world, with global coverage reaching 5.5 billion
    for 2019 and set to rise to over 6 billion by the end of 2020, it''s little surprise
    to discover that AI and ML are advancing in leaps and bounds.


    With nearly all of the population of humanity within reach of a smartphone, the
    coding behind these devices has been developed to take individuals into account.
    These devices are designed to learn what the user requires, or uses, the device
    for. Common numbers called are pushed to the top of the list, in-app and in-game
    advertising is moulded around our browser and search preferences, as well as other
    apps we''ve installed in the past. And even our voices, fingerprints and faces
    are stored and analysed by AI and ML in order to recognise who we are.


    # DIGITAL ASSISTANTS


    The rise of digital assistants has been one of the kick-starters of AI and ML
    programming. Siri, Cortana, Alexa and Google Assistant are all coded using Python,
    and are designed to listen, learn and respond to what we ask of them. With Python,
    this level of AI is surprisingly simple, thanks to the many libraries and customisation
    of the language. These frameworks make creating AI and ML easy for intelligent
    coders, cutting down on the development time in other languages and, thanks to
    Python''s easy to read code and complex algorithms, these developers can devote
    significant time to improving the performance and accuracy of AI.


    Every time we ask one of these digital assistants for something, the Python-driven
    AI code is reading our voice, determining what it is we''re asking by plucking
    out key words and acting on them. If we ask for a thirty second countdown, it''ll
    start the device''s stopwatch function; if we ask for dinner suggestions, it''ll
    open a specific set of web pages, and if we ask it to play some music, it''ll
    interrogate the available music apps to select what it is we wanted. All the time,
    the AI code is being trained to listen more intently, while the ML is learning
    from the AI results so that its accuracy is improved for future questions and
    requests.'
  - '[PAGE 26]


    # Python in Focus: Artificial Intelligence


    # BEYOND THE SMARTPHONE


    Consider Google, social media and the content you look up. How many times have
    you entered a search string into Google, such as car parts for a Mk1 Ford Escort
    and, when you''ve opened Facebook, you suddenly find a group suggestion of Ford
    Escort owners? That''s AI and ML injecting themselves into your everyday computing
    tasks.


    Another example of AI and ML working together is Gmail''s recent addition of suggested
    completions for sentences you are typing. If you frequently sign off with ''See
    you soon'', or ''All the best'', then typing ''See'' or ''All'' will prompt the
    ML side of the equation to autofill the remainder of the words for you. All the
    time, the ML is learning while the AI is telling it what to improve on.


    Facial recognition is another element of AI and ML that''s been the target of
    the popular press for some time. Throughout 2019, facial recognition systems on
    both smartphones and CCTV footage have improved dramatically. Agencies controlling
    this level of AI now have the ability to single out an individual from a crowded
    street and, while that''s great for law and order, it does pose a potential threat
    to our privacy. After all, who watches the watcher?


    Tesla''s work on self-driving cars means they are getting closer to being the
    norm, and it''s Python along with its controlling AI and ML work that''s, excuse
    the pun, driving it forward. In these circumstances, Python is doing a lot of
    the heavy lifting, providing the connective tissue and libraries that are designed
    to implement AI and ML. In the background, you''ll usually find C++, or some other
    language, that''s supporting the performance and overall program in which the
    AI and ML are working.


    While it''s easy to portray a bleak AI future, let''s not forget the many great
    instances of AI we currently enjoy: optical character recognition, handwriting
    recognition, image processing, helping people with visual and hearing disabilities,
    advancements in space exploration, engineering improvements, conservation, pharmaceutical
    and drug improvements and greater freedom for those limited in their ability to
    travel. It''s not all about two AI bots arguing about eliminating the human race.


    # THE FUTURE OF AI


    Whether we''ll end up creating true AI, killer robots and self-aware androids
    is up for debate. There are plenty of arguments for and against the evolution
    of AI, with many believing that AI will be the worst possible future humans can
    create – worse even than nuclear war. For the moment, however, we''re at the early
    stages of AI development, but with Python''s continual advancements and improved
    libraries, it may not be too long before we''ve got an AI system that''s getting
    better by the hour.


