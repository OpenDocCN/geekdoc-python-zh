- md: '# Editing Text Files


    A text file in Linux can be anything from a simple set of instructions on how
    to use an app, to some complex Python, C++ or other programming language code.
    Text files can be used for scripting, automated executable files, as well as configuration
    files too.


    ## THE JOY OF TEXT


    To be able to edit or create a text file, you need a good text editor. Linux has
    many but here are some in action on the Raspberry Pi.


    **STEP 1** The first text editor for the Raspberry Pi is the default desktop environment
    app: Leafpad. To use, you can either double-click an existing text file or click
    the Raspberry Pi menu icon (in the top left of the desktop) and from the Accessories
    menu, choose Text Editor.


    **STEP 2** From the Terminal there are even more options, although using the correct
    command, you can launch any of the desktop apps via the Terminal. One of the simplest,
    and a classic text editor that''s carried over from the Unix days, is vi. In the
    Terminal, enter: `vi`.


    **STEP 3** Vi is the original Unix command but in this case it launches VIM, the
    new Linux version of Vi. Although simple looking, Vi is considered, even by today''s
    standards, to be one of the most widely used text editors. There''s a lot you
    can do with it, so check out the man pages for more Vi information.


    **STEP 4** Nano is another favourite, and simple, text editor available for Linux.
    Enter: `nano` into the Terminal to launch it. You can use Nano for editing code,
    creating scripts or writing your own help files. To exit Nano, press Ctrl + X,
    followed by Y to save the file or N to exit without saving.


    **STEP 5** Emacs, or GNU Emacs, is an extensible and customisable, self-documenting,
    real-time display editor. It’s a fantastic text editor and one that’s worth getting
    used to as soon as you can. Sadly, it’s not installed on the Pi by default, so
    you’ll need to install it. In the Terminal, enter: `sudo apt-get install emacs`


    **STEP 6** The previous command contacts the Debian (Raspbian is based on a Debian
    Linux distribution) repositories and pulls down the information needed to install
    Emacs. When the Pi asks to continue with the installation, press Y. This installs
    the latest version and when it’s done, you’ll be back to the command prompt.


    **STEP 7** Once the installation is complete, enter: `emacs` into the Terminal.
    The Emacs splash screen opens in a new window, offering a tutorial (which we recommend
    you run through) and a guided tour amongst other information.


    **STEP 8** Emacs can offer an uncomplicated view of your text file or one with
    a plethora of information regarding the structure of the file in question; it’s
    up to you to work out your own preference. There’s also a hidden text adventure
    in Emacs, which we cover later in this book, why not see if you can find it without
    our help.


    **STEP 9** Gedit is another excellent text editor for Linux. Again, it’s not installed
    by default on the Raspberry Pi; however, by entering: `sudo apt-get install gedit`
    and accepting the installation, the program can be on the Pi in a matter of seconds.
    Once it’s installed, use `gedit` in the Terminal to launch it. Gedit is a great
    text editor for coding.


    **STEP 10** Finally, Jed is an Emacs-like, cross-platform text editor that’s lightweight
    and comes with a wealth of features. To install it, enter: `sudo apt-get install
    jed`. Accept the installation and when it’s complete, use: `jed` to launch.


    # Linux Tips and Tricks


    The Linux Terminal, you’ll no doubt agree, is an exceptional environment and with
    a few extra apps installed along with a smidgen of command knowledge, incredible
    and often quite strange things can be accomplished.


    ## TAKING COMMAND


    There are countless Linux tips, secrets, hacks and tricks out there. Some are
    very old, originating from Linux’s Unix heritage, while others are recent additions
    to Linux lore. Here are our ten favourite tips and tricks.


    ## EASTER EGGS


    Emacs text editor, is a great piece of software but did you know it also contains
    a hidden Easter Egg? With Emacs installed (`sudo apt-get install emacs24`), drop
    to a Terminal session and enter:


    `emacs -batch -l dunnet`


    Dunnet is a text adventure written by Ron Schnell in 1982, and hidden in Emacs
    since 1994.


    ## TERMINAL BROWSING


    Ever fancied being able to browse the Internet from the Terminal? While not particularly
    useful, it is a fascinating thing to behold. To do so, enter:


    `sudo apt-get install elinks`


    Then:


    `elinks`


    Enter the website you want to visit.


    ## MOON BUGGY


    Based on the classic 1982 arcade game, Moon Patrol, Moon Buggy appeared on home
    computers in 1985 amid much praise. It’s a cracking Atari game available in the
    Linux Terminal by entering:


    `sudo apt-get install moon-buggy`


    Then:


    `moon-buggy`


    Enjoy.


    ## LET IT SNOW


    Snowing in the Terminal console isn’t something you come across every day. If
    you’re interested, however, enter:


    `wget https://gist.githubusercontent.com/sontek/1505483/raw/7d024716ea57e69fb52632fee09f42753361c4a2/snowjob.sh`


    `chmod +x snowjob.sh`


    `./snowjob.sh`


    ## Memory Hogs


    If you need to see which apps are consuming the most memory on your Raspberry
    Pi, simply enter:


    ```

    ps aux | sort -rnk 4

    ```


    This sorts the output by system memory use.


    ## BBS


    Back in the days of dial-up connections, the online world was made up of Bulletin
    Board Systems. These remote servers provided hangouts for users to chat, swap
    code, play games and more. Using Telnet in Linux, you can still connect to some
    active BBSes:


    ```

    telnet battlestarbbs.dyndns.org

    ```


    There are countless operational BBSes available; check out www.telnetbbsguide.com/bbs/list/detail/
    for more.


    ## Secure Deletion


    When you delete a file, there''s still a chance of someone with the right software
    being able to retrieve it. However, files can be securely and permanently deleted
    using Shred:


    ```

    shred -zvu NAMEOFFILE.txt

    ```


    Replace NAMEOFFILE with the name of the file to delete.


    ## Directory Tree


    If you want to create an entire directory (or folder) tree with a single command,
    you can use:


    ```

    mkdir -p New-Dir/{subfolder1,subfolder2,subfolder3,subfolder4}

    ```


    This creates a New-Dir with four sub folders within.


    ## ASCII Art


    ASCII art can be quite striking when applied to some images. However, it''s often
    difficult to get just right. You can create some great ASCII art from the images
    you already have on the Raspberry Pi by using img2txt:


    ```

    img2txt NAMEOFIMAGEFILE.png

    ```


    Replace NAMEOFIMAGEFILE with the actual name of the image file on your system.


    ## Command Help


    It''s not easy trying to remember all the available Linux commands. Thankfully,
    you can use apropos to help. Simply use it with a description of the command:


    ```

    apropos "copy files"

    apropos "rename files"

    ```


    # A-Z of Linux Commands


    There are literally thousands of Linux commands, so while this is not a complete
    A-Z, it does contain many of the commands you will most likely need. You will
    probably find that you end up using a smaller set of commands over and over again
    but having an overall knowledge is still very useful.


    | Command | Description |

    |---|---|

    | **A** | |

    | `adduser` | Add a new user |

    | `arch` | Print machine architecture |

    | `awk` | Find and replace text within file(s) |

    | **B** | |

    | `bc` | An arbitrary precision calculator language |

    | **C** | |

    | `cat` | Concatenate files and print on the standard output |

    | `chdir` | Change working directory |

    | `chgrp` | Change the group ownership of files |

    | `chroot` | Change root directory |

    | `cksum` | Print CRC checksum and byte counts |

    | `cmp` | Compare two files |

    | `comm` | Compare two sorted files line by line |

    | `cp` | Copy one or more files to another location |

    | `crontab` | Schedule a command to run at a later time |

    | `csplit` | Split a file into context-determined pieces |

    | `cut` | Divide a file into several parts |

    | **D** | |

    | `date` | Display or change the date & time |

    | `dc` | Desk calculator |

    | `dd` | Data Dump, convert and copy a file |

    | `diff` | Display the differences between two files |

    | `dirname` | Convert a full path name to just a path |

    | `du` | Estimate file space usage |

    | **E** | |

    | `echo` | Display message on screen |

    | `ed` | A line oriented text editor (edlin) |

    | `egrep` | Search file(s) for lines that match an extended expression |

    | `env` | Display, set or remove environment variables |

    | `expand` | Convert tabs to spaces |

    | `expr` | Evaluate expressions |

    | **F** | |

    | `factor` | Print prime factors |

    | `fdisk` | Partition table manipulator for Linux |

    | `fgrep` | Search file(s) for lines that match a fixed string |

    | `find` | Search for files that meet a desired criteria |

    | `fmt` | Reformat paragraph text |

    | `fold` | Wrap text to fit a specified width |

    | `format` | Format disks or tapes |

    | `fsck` | Filesystem consistency check and repair |

    | **G** | |

    | `gawk` | Find and Replace text within file(s) |

    | `grep` | Search file(s) for lines that match a given pattern |

    | `groups` | Print group names a user is in |

    | `gzip` | Compress or decompress named file(s) |

    | **H** | |

    | `head` | Output the first part of file(s) |

    | `hostname` | Print or set system name |

    | **I** | |

    | `id` | Print user and group ids |

    | `info` | Help info |

    | `install` | Copy files and set attributes |

    | **J** | |

    | `join` | Join lines on a common field |

    | **K** | |

    | `kill` | Stop a process from running |

    | **L** | |

    | `less` | Display output one screen at a time |

    | `ln` | Make links between files |

    | `locate` | Find files |'
  mdcn: '# 编辑文本文件


    Linux 中的文本文件可以是任何内容，从简单的应用程序使用说明，到复杂的 Python、C++ 或其他编程语言代码。文本文件可用于编写脚本、创建自动可执行文件以及配置文件。


    ## 文本的乐趣


    要编辑或创建文本文件，你需要一个优秀的文本编辑器。Linux 拥有许多文本编辑器，以下是在树莓派上运行的一些示例。


    **步骤 1** 树莓派的第一个文本编辑器是默认的桌面环境应用程序：Leafpad。要使用它，你可以双击现有的文本文件，或者点击树莓派菜单图标（位于桌面左上角），然后从“附件”菜单中选择“文本编辑器”。


    **步骤 2** 从终端中，你有更多选择，尽管使用正确的命令，你可以通过终端启动任何桌面应用程序。最简单且经典的文本编辑器之一是从 Unix 时代传承下来的
    vi。在终端中，输入：`vi`。


    **步骤 3** Vi 是最初的 Unix 命令，但在这种情况下，它启动的是 VIM，即 Vi 的新版 Linux 版本。尽管看起来简单，但即使以今天的标准来看，Vi
    也被认为是最广泛使用的文本编辑器之一。你可以用它做很多事情，因此请查阅手册页以获取更多 Vi 信息。


    **步骤 4** Nano 是另一个受欢迎且简单的 Linux 文本编辑器。在终端中输入：`nano` 来启动它。你可以使用 Nano 编辑代码、创建脚本或编写自己的帮助文件。要退出
    Nano，请按 Ctrl + X，然后按 Y 保存文件，或按 N 不保存直接退出。


    **步骤 5** Emacs，或称 GNU Emacs，是一个可扩展、可定制、自文档化、实时显示的编辑器。它是一个出色的文本编辑器，值得你尽快熟悉。遗憾的是，它默认未安装在树莓派上，因此你需要安装它。在终端中，输入：`sudo
    apt-get install emacs`。


    **步骤 6** 上述命令会连接到 Debian（Raspbian 基于 Debian Linux 发行版）仓库，并下载安装 Emacs 所需的信息。当树莓派询问是否继续安装时，按
    Y。这将安装最新版本，完成后，你将返回到命令提示符。


    **步骤 7** 安装完成后，在终端中输入：`emacs`。Emacs 启动画面会在一个新窗口中打开，提供教程（我们建议你完成它）和导览以及其他信息。


    **步骤 8** Emacs 可以提供文本文件的简洁视图，或者包含大量关于文件结构的信息；这取决于你自己的偏好。Emacs 中还有一个隐藏的文字冒险游戏，我们将在本书后面介绍，何不尝试在没有我们帮助的情况下找到它呢？


    **步骤 9** Gedit 是另一个优秀的 Linux 文本编辑器。同样，它默认未安装在树莓派上；然而，通过输入：`sudo apt-get install
    gedit` 并接受安装，该程序可以在几秒钟内安装到树莓派上。安装完成后，在终端中使用 `gedit` 启动它。Gedit 是一个非常适合编码的文本编辑器。


    **步骤 10** 最后，Jed 是一个类似 Emacs 的跨平台文本编辑器，它轻量级且功能丰富。要安装它，输入：`sudo apt-get install
    jed`。接受安装，完成后，使用：`jed` 启动。


    # Linux 技巧与窍门


    毫无疑问，Linux 终端是一个卓越的环境，安装一些额外的应用程序并掌握一点命令知识，就能完成令人难以置信且常常相当奇特的事情。


    ## 掌握命令


    Linux 中有无数的技巧、秘密、黑客方法和窍门。有些非常古老，源于 Linux 的 Unix 传统，而另一些则是 Linux 传说中的新近补充。以下是我们最喜欢的十个技巧和窍门。


    ## 复活节彩蛋


    Emacs 文本编辑器是一款出色的软件，但你知道它还包含一个隐藏的复活节彩蛋吗？安装 Emacs 后（`sudo apt-get install emacs24`），进入终端会话并输入：


    `emacs -batch -l dunnet`


    Dunnet 是 Ron Schnell 在 1982 年编写的一个文字冒险游戏，自 1994 年以来一直隐藏在 Emacs 中。


    ## 终端浏览


    是否曾想过能够从终端浏览互联网？虽然不是特别有用，但这确实是一件令人着迷的事情。要这样做，输入：


    `sudo apt-get install elinks`


    然后：


    `elinks`


    输入你想访问的网站。


    ## 月球车


    基于 1982 年的经典街机游戏《月球巡逻车》，Moon Buggy 于 1985 年出现在家用电脑上，并广受好评。这是一款出色的 Atari 游戏，可以通过在
    Linux 终端中输入以下命令来玩：


    `sudo apt-get install moon-buggy`


    然后：


    `moon-buggy`


    享受吧。


    ## 下雪吧


    在终端控制台中下雪可不是你每天都能遇到的事情。然而，如果你感兴趣，请输入：


    `wget https://gist.githubusercontent.com/sontek/1505483/raw/7d024716ea57e69fb52632fee09f42753361c4a2/snowjob.sh`


    `chmod +x snowjob.sh`


    `./snowjob.sh`


    ## 内存占用大户


    如果你需要查看哪些应用程序在树莓派上占用最多内存，只需输入：


    ```

    ps aux | sort -rnk 4

    ```


    这将按系统内存使用情况对输出进行排序。


    ## BBS


    在拨号连接的时代，网络世界由电子公告板系统组成。这些远程服务器为用户提供了聊天、交换代码、玩游戏等的场所。使用 Linux 中的 Telnet，你仍然可以连接到一些活跃的
    BBS：


    ```

    telnet battlestarbbs.dyndns.org

    ```


    有无数可用的 BBS；请访问 www.telnetbbsguide.com/bbs/list/detail/ 了解更多信息。


    ## 安全删除


    当你删除一个文件时，拥有合适软件的人仍然有可能恢复它。但是，可以使用 Shred 安全且永久地删除文件：


    ```

    shred -zvu NAMEOFFILE.txt

    ```


    将 NAMEOFFILE 替换为要删除的文件名。


    ## 目录树


    如果你想用单个命令创建整个目录（或文件夹）树，可以使用：


    ```

    mkdir -p New-Dir/{subfolder1,subfolder2,subfolder3,subfolder4}

    ```


    这将创建一个包含四个子文件夹的 New-Dir。


    ## ASCII 艺术


    ASCII 艺术应用于某些图像时可能相当引人注目。然而，它通常很难做到恰到好处。你可以使用 img2txt 从树莓派上已有的图像创建一些很棒的 ASCII
    艺术：


    ```

    img2txt NAMEOFIMAGEFILE.png

    ```


    将 NAMEOFIMAGEFILE 替换为系统上图像文件的实际名称。


    ## 命令帮助


    记住所有可用的 Linux 命令并不容易。幸运的是，你可以使用 apropos 来帮助。只需将其与命令描述一起使用：


    ```

    apropos "copy files"

    apropos "rename files"

    ```


    # Linux 命令 A-Z


    Linux 命令实际上有成千上万个，因此虽然这不是一个完整的 A-Z 列表，但它确实包含了许多你最可能需要的命令。你可能会发现最终你会反复使用一小部分命令，但拥有整体知识仍然非常有用。


    | 命令 | 描述 |

    |---|---|

    | **A** | |

    | `adduser` | 添加新用户 |

    | `arch` | 打印机器架构 |

    | `awk` | 在文件中查找和替换文本 |

    | **B** | |

    | `bc` | 任意精度计算器语言 |

    | **C** | |

    | `cat` | 连接文件并打印到标准输出 |

    | `chdir` | 更改工作目录 |

    | `chgrp` | 更改文件的组所有权 |

    | `chroot` | 更改根目录 |

    | `cksum` | 打印 CRC 校验和与字节数 |

    | `cmp` | 比较两个文件 |

    | `comm` | 逐行比较两个已排序的文件 |

    | `cp` | 将一个或多个文件复制到另一个位置 |

    | `crontab` | 安排命令在稍后时间运行 |

    | `csplit` | 根据上下文将文件分割成若干部分 |

    | `cut` | 将文件分成几个部分 |

    | **D** | |

    | `date` | 显示或更改日期和时间 |

    | `dc` | 桌面计算器 |

    | `dd` | 数据转储，转换并复制文件 |

    | `diff` | 显示两个文件之间的差异 |

    | `dirname` | 将完整路径名转换为仅路径 |

    | `du` | 估算文件空间使用情况 |

    | **E** | |

    | `echo` | 在屏幕上显示消息 |

    | `ed` | 面向行的文本编辑器（edlin） |

    | `egrep` | 在文件中搜索与扩展表达式匹配的行 |

    | `env` | 显示、设置或删除环境变量 |

    | `expand` | 将制表符转换为空格 |

    | `expr` | 计算表达式 |

    | **F** | |

    | `factor` | 打印质因数 |

    | `fdisk` | Linux 的分区表操作工具 |

    | `fgrep` | 在文件中搜索与固定字符串匹配的行 |

    | `find` | 搜索满足所需条件的文件 |

    | `fmt` | 重新格式化段落文本 |

    | `fold` | 将文本换行以适应指定宽度 |

    | `format` | 格式化磁盘或磁带 |

    | `fsck` | 文件系统一致性检查和修复 |

    | **G** | |

    | `gawk` | 在文件中查找和替换文本 |

    | `grep` | 在文件中搜索与给定模式匹配的行 |

    | `groups` | 打印用户所属的组名 |

    | `gzip` | 压缩或解压缩指定文件 |

    | **H** | |

    | `head` | 输出文件的前部分 |

    | `hostname` | 打印或设置系统名称 |

    | **I** | |

    | `id` | 打印用户和组 ID |

    | `info` | 帮助信息 |

    | `install` | 复制文件并设置属性 |

    | **J** | |

    | `join` | 根据公共字段连接行 |

    | **K** | |

    | `kill` | 停止进程运行 |

    | **L** | |

    | `less` | 一次显示一屏输出 |

    | `ln` | 在文件之间创建链接 |

    | `locate` | 查找文件 |'
