    # OS Module


    The OS module allows you to interact directly with the built-in commands found
    in your operating system. Commands vary depending on the OS you’re running, as
    some will work with Windows whereas others will work with Linux and macOS.


    # INTO THE SYSTEM


    One of the primary features of the OS module is the ability to list, move, create,
    delete and otherwise interact with files stored on the system, making it the perfect
    module for backup code.


    STEP 1 You can start the OS module with some simple functions to see how it interacts
    with the operating system environment that Python is running on. If you’re using
    Linux or the Raspberry Pi, try this:


    ```

    import os

    home=os.getcwd()

    print (home)

    ```


    ![](img/d3010096175d19bb2f1bb51316094dea_9_0.png)


    STEP 3 The Windows output is different as that’s the current working directory
    of Python, as determined by the system; as you might suspect, the os.getcwd()
    function is asking Python to retrieve the Current Working Directory. Linux users
    will see something along the same lines as the Raspberry Pi, as will macOS users.


    ![](img/d3010096175d19bb2f1bb51316094dea_9_1.png)


    STEP 2 The returned result from printing the variable home is the current user’s
    home folder on the system. In our example that’s /home/pi; it will be different
    depending on the user name you log in as and the operating system you use. For
    example, Windows 10 will output: C:\Program Files (x86)\Python36-32.


    ![](img/d3010096175d19bb2f1bb51316094dea_9_2.png)


    STEP 4 Yet another interesting element to the OS module, is its ability to launch
    programs that are installed in the host system. For instance, if you wanted to
    launch the Chromium browser from within a Python program you can use the command:


    ```

    import os

    browser=os.system("/usr/bin/chromium-browser")

    ```


    ![](img/d3010096175d19bb2f1bb51316094dea_9_3.png)'
  - "[PAGE 10]\n\n# OS Module\n\nSTEP 5 The os.system() function is what allows interaction\
    \ with external programs; you can even call up previous Python programs using\
    \ this method. You will obviously need to know the full path and program file\
    \ name for it to work successfully. However, you can use the following:\n\n```\n\
    import os\nos.system('start chrome \"https://www.youtube.com/feed/music\"')\n\
    ```\n\n![](img/d3010096175d19bb2f1bb51316094dea_10_0.png)\n\nSTEP 8 The ability\
    \ to manipulate directories, or folders if you prefer, is one of the OS module's\
    \ best features. For example, to create a new directory you can use:\n\n```\n\
    import os\nos.mkdir(\"NEW\")\n```\n\nThis creates a new directory within the Current\
    \ Working Directory, named according to the object in the mkdir function.\n\n\
    ![](img/d3010096175d19bb2f1bb51316094dea_10_1.png)\n\nSTEP 6 For Step 5's example\
    \ we used Windows, to show that the OS module works roughly the same across all\
    \ platforms. In that case, we opened YouTube's music feed page, so it is therefore\
    \ possible to open specific pages:\n\n```\nimport os\nos.system('chromium-browser\
    \ \"http://bdmpublications.com/\"')\n```\n\n![](img/d3010096175d19bb2f1bb51316094dea_10_2.png)\n\
    \nSTEP 9 You can also rename any directories you've created by entering:\n\n```\n\
    import os\nos.rename(\"NEW\", \"OLD\")\n```\n\nTo delete them:\n\n```\nimport\
    \ os\nos.rmdir(\"OLD\")\n```\n\n![](img/d3010096175d19bb2f1bb51316094dea_10_3.png)\n\
    \nSTEP 7 Note in the previous step's example the use of single and double-quotes.\
    \ The single quotes encase the entire command and launching Chromium, whereas\
    \ the double quotes open the specified page. You can even use variables to call\
    \ multiple tabs in the same browser:\n\n```\nimport os\na=('chromium-browser \"\
    http://bdmpublications.com/\"')\nb=('chromium-browser \"http://www.google.co.uk\"\
    ')\nos.system(a + b)\n```\n\n![](img/d3010096175d19bb2f1bb51316094dea_10_4.png)\n\
    \nSTEP 10 Another module that goes together with OS is shutil. You can use the\
    \ Shutil module together with OS and time to create a time-stamped backup directory,\
    \ and copy files into it:\n\n```\nimport os, shutil, time\n\nroot_src_dir = r'/home/pi/Documents'\n\
    root_dst_dir = '/home/pi/backup/' + time.asctime()\n\nfor src_dir, dirs, files\
    \ in os.walk(root_src_dir):\n    dst_dir = src_dir.replace(root_src_dir, root_dst_dir,\
    \ 1)\n    if not os.path.exists(dst_dir):\n        os.makedirs(dst_dir)\n    for\
    \ file_ in files:\n        src_file = os.path.join(src_dir, file_)\n        dst_file\
    \ = os.path.join(dst_dir, file_)\n        if os.path.exists(dst_file):\n     \
    \       os.remove(dst_file)\n        shutil.copy(src_file, dst_dir)\n\nprint(\"\
    >>>>>>>>>>Backup complete<<<<<<<<<<\")\n```"
