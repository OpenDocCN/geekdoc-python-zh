- md: "## Pygame Module\n\nWe've had a brief look at the Pygame module already but\
    \ there's a lot more to it that needs exploring. Pygame was developed to help\
    \ Python programmers create either graphical or text-based games.\n\n## PYGAMING\n\
    \nPygame isn't an inherent module to Python but those using the Raspberry Pi will\
    \ already have it installed. Everyone else will need to use: `pip install pygame`\
    \ from the command prompt.\n\n**STEP 1** Naturally you need to load up the Pygame\
    \ modules into memory before you're able to utilise them. Once that's done Pygame\
    \ requires the user to initialise it prior to any of the functions being used:\n\
    \n```\nimport pygame\npygame.init()\n```\n\n**STEP 3** Sadly you can't close the\
    \ newly created Pygame window without closing the Python IDLE Shell, which isn't\
    \ very practical. For this reason, you need to work in the editor (New > File)\
    \ and create a True/False while loop:\n\n```\nimport pygame\nfrom pygame.locals\
    \ import *\npygame.init()\n\ngamewindow=pygame.display.set_mode((800,600))\npygame.display.set_caption(\"\
    Adventure Game\")\n\nrunning=True\n\nwhile running:\n    for event in pygame.event.get():\n\
    \        if event.type==QUIT:\n            running=False\n            pygame.quit()\n\
    ```\n\n**STEP 2** Let's create a simple game ready window, and give it a title:\n\
    \n```\ngamewindow=pygame.display.set_mode((800,600))\npygame.display.set_caption(\"\
    Adventure Game\")\n```\n\nYou can see that after the first line is entered, you\
    \ need to click back into the IDLE Shell to continue entering code; also, you\
    \ can change the title of the window to anything you like.\n\n## Pygame Module\n\
    \nSTEP 4 If the Pygame window still won't close don't worry, it's just a discrepancy\
    \ between the IDLE (which is written with Tkinter) and the Pygame module. If you\
    \ run your code via the command line, it closes perfectly well.\n\nSTEP 5 You're\
    \ going to shift the code around a bit now, running the main Pygame code within\
    \ a while loop; it makes it neater and easier to follow. We've downloaded a graphic\
    \ to use and we need to set some parameters for pygame:\n\n```\npython\nimport\
    \ pygame\npygame.init()\n\nrunning=True\n\nwhile running:\n    gamewindow=pygame.display.set_mode((800,600))\n\
    \    pygame.display.set_caption(\"Adventure Game\")\n    black=(0,0,0)\n    white=(255,255,255)\n\
    \    img=pygame.image.load(\"/home/pi/Downloads/sprite1.png\")\n    def sprite(x,y):\n\
    \        gamewindow.blit(img, (x,y))\n    x=(800*0.45)\n    y=(600*0.8)\n    gamewindow.fill(white)\n\
    \    sprite(x,y)\n    pygame.display.update()\n    for event in pygame.event.get():\n\
