    # SOME COMMON DIRECTORIES


    Now that you know how to view the contents of your hard drive you''ll start to
    notice a lot of directories with names like bin, sbin, var and dev. These are
    the files and directories that you are kept away from on a Mac, and won''t encounter
    on a Windows PC.


    STEP 1 Enter: ls -lah / to view all of the files and directories, including the
    hidden items, in the root directory of your hard drive. Here you will see all
    the items that make up your Raspbian OS (which is a version of Linux). It''s worth
    taking the time to know some of them.


    STEP 3 Entering: ls /home displays the contents of your home directory, which
    contains pi; the directory that you start in. So, entering: ls /home/pi is the
    same as just "ls" from the default home directory. This is where you are expected
    to place most of the documents you create. Don''t confuse home with "usr"; the
    /usr directory is where find you find program tools and libraries.


