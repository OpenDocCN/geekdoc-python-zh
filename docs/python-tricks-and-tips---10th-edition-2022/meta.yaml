  md: '# What is Linux?


    The Raspberry Pi operating system is Raspbian, which is a Linux operating system;
    but what exactly is Linux? Where did it come from and what does it do? In a world
    where Windows and macOS have supremacy of the desktop, it’s easy to overlook it,
    but there’s more to Linux than you might imagine.


    Linux is a surprisingly powerful, fast, secure and capable operating system. It’s
    used as the OS of choice for the Raspberry Pi, in the form of Raspbian OS, as
    well as in some of the most unlikely places.


    Despite only enjoying a 1.96% share (according to netmarketshare.com) of the total
    desktop operating system market, Linux has a dedicated following of enthusiasts,
    users and contributors. It was created in 1991 by University of Helsinki student,
    Linus Torvalds, who had become frustrated with the limitations and licensing of
    the popular educational system Minix, a miniature version of the Unix operating
    system, in use at the time.


    Torvalds needed a system that could mirror Unix’s performance and features, without
    the licensing cost. Thus was born Linux, the Unix-like operating system which
    used freely available code from the GNU project. This enabled users around the
    world to utilise the power of the Unix-like system, completely free of charge,
    an ethos that still holds today: Linux is free to download, install and use.


    Unix itself was released in the early ’70s, as a multi-tasking, modular-designed
    operating system originally developed for programmers who needed a stable platform
    to code on. However, its performance, power and portability meant that it soon
    became the system of choice for companies and universities where high-end computing
    tasks were needed.


    Linux is much like any other operating system, such as Windows or macOS in that
    it manages the computer hardware, provides an interface for the user to access
    that hardware and comes with programs for productivity, communications, gaming,
    science, education and more. Linux can be broken up into a number of significant
    elements:


    # BOOTLOADER


    The bootloader is the software that initialises and boots up your computer. It
    loads up the various modules the OS uses to begin to access the hardware in the
    system. You can modify a bootloader to load more than one OS installed on the
    system.


    # GRAPHICAL SERVER


    This is a module within Linux that provides a graphical output to your monitor.
    It’s referred to as the X server or simply just X. X is an application that manages
    one or more graphical displays and one or more input devices (keyboard, mouse,
    etc.) connected to the computer.


    # DAEMONS


    Daemons are background services that start as the operating system is booting.
    These can enable printing, sound, networking and so on. They run unobtrusively
    rather than under the direct control of the user, often waiting to be activated
    by an event or condition.


    # KERNEL


    The kernel is the core of the system and the single element that is actually called
    Linux. The Linux kernel manages the computer processor, memory, storage and any
    peripherals you have attached to your computer. It provides the basic services
    for all other parts of the OS.


    # DESKTOP ENVIRONMENTAL


    The Desktop Environment, or DE, is the main Graphical User Interface (GUI) that
    users interact with. It’s the desktop, that includes Internet browsers, productivity,
    games and whatever program or app you’re using. There are countless DEs available.
    Raspbian uses PIXEL.


    # PROGRAMS/APPLICATIONS


    With Linux being an open source, free operating system, it also makes use of the
    tens of thousands of freely available applications. The likes of LibreOffice,
    GIMP and Python are just the tip of the iceberg.'
