  md: "# Text Adventure Script\n\nText adventures are an excellent way to build your\
    \ Python coding skills and have some fun at the same time. This example that we\
    \ created will start you on the path to making a classic text adventure; where\
    \ it will end is up to you.\n\n# ADVENTURE.PY\n\nThe Adventure game uses just\
    \ the Time module to begin with, creating pauses between print functions. There's\
    \ a help system in place to expand upon, as well as the story itself.\n\n![](img/d3010096175d19bb2f1bb51316094dea_47_0.png)\n\
    \n```\npython\nimport time\n\nprint(\"\\n\" * 200)\nprint(\">>>>>>>>>Awesome Adventure<<<<<<<<<<\"\
    )\nprint(\"\\n\" * 3)\ntime.sleep(3)\nprint(\"\\nA long time ago, a warrior strode\
    \ forth from the frozen north.\")\ntime.sleep(1)\nprint(\"Does this warrior have\
    \ a name?\")\nname=input(\"> \")\nprint(name, \"the barbarian, sword in hand and\
    \ looking for adventure!\")\ntime.sleep(1)\nprint(\"However, evil is lurking nearby....\"\
    )\ntime.sleep(1)\nprint(\"A pair of bulbous eyes regards the hero...\")\ntime.sleep(1)\n\
    print(\"Will\", name, \"prevail, and win great fortune...\")\ntime.sleep(1)\n\
    print(\"Or die by the hands of great evil...?\")\ntime.sleep(1)\nprint(\"\\n\"\
    \ *3)\nprint(\"Only time will tell....\")\ntime.sleep(1)\nprint('...')\ntime.sleep(1)\n\
    print('...')\ntime.sleep(1)\nprint('...')\ntime.sleep(1)\nprint('...')\ntime.sleep(5)\n\
    print(\"\\n\" *200)\n\nprint('''      You find yourself at a small inn. There's\
    \ little gold in your purse but your sword is sharp, and you're ready for adventure.\n\
    \      With you are three other customers.\n      A ragged looking man, and a\
    \ pair of dangerous looking guards.''')\n\ndef start():\n    print(\"\\n -----------\"\
    )\n    print(\"Do you approach the...\")\n    print(\"\\n\")\n    print(\"1. Ragged\
    \ looking man\")\n    print(\"2. Dangerous looking guards\")\n\n    cmdlist=[\"\
    1\", \"2\"]\n    cmd=getcmd(cmdlist)\n```\n\n![](img/d3010096175d19bb2f1bb51316094dea_47_1.png)\n\
    \n![](img/d3010096175d19bb2f1bb51316094dea_47_2.png)"
