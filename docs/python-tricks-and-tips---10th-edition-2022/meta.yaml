  md: "# Mouse Controlled Turtle\n\nWe've already seen the Turtle module being controlled\
    \ by the user via the keyboard but now we thought we'd see how the user can use\
    \ their mouse as a drawing tool within Python. We have two possible code examples\
    \ here, pick which works best for you.\n\n# MOUSETURTLE.PY\n\nThe first piece\
    \ of code presents the standard Turtle window. Press Space and then click anywhere\
    \ on the screen for the Turtle to draw to the mouse pointer. The second allows\
    \ you to click the Turtle and drag it around the screen; but be warned, it can\
    \ crash Python.\n\n1st Code Example:\n\n```\nfrom turtle import Screen, Turtle\n\
