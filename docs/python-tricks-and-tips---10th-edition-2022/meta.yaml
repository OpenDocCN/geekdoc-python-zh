  md: "# Basic Animation\n\nPython's modules make it relatively easy to create shapes,\
    \ or display graphics and animate them accordingly. Animation though, can be a\
    \ tricky element to get right in code. There are many different ways of achieving\
    \ the same end result and we'll show you one such example here.\n\n# LIGHTS, CAMERA,\
    \ ACTION\n\nThe Tkinter module is an ideal starting point for learning animation\
    \ within Python. Naturally, there are better custom modules out there, but Tkinter\
    \ does the job well enough to get a grasp on what's needed.\n\nSTEP 1 Let's make\
    \ a bouncing ball animation. First, we will need to create a canvas (window) and\
    \ the ball to animate:\n\n```\nfrom tkinter import *\nimport time\n\ngui = Tk()\n\
    gui.geometry(\"800x600\")\ngui.title(\"Pi Animation\")\ncanvas = Canvas(gui,\n\
    width=800,height=600,bg='white')\ncanvas.pack()\n\nball1 = canvas.create_oval(5,5,60,60,\
    \ fill='red')\n\ngui.mainloop()\n```\n\nSTEP 3 Insert the new code between the\
    \ `ball1 = canvas.create_oval(5,5,60,60, fill='red')` line and the `gui.mainloop()`\
    \ line. Save it and Run. You will now see the ball move from the top left corner\
    \ of the animation window, down to the bottom right corner. You can alter the\
    \ speed in which the ball traverses the window by altering the `time.sleep(.01)`\
    \ line. Try (.05).\n\n![](img/d3010096175d19bb2f1bb51316094dea_21_0.png)\n\nSTEP\
    \ 2 Save and Run the code. You will see a blank window appear, with a red ball\
    \ sitting in the upper left corner of the window. While this is great, it's not\
    \ very animated. Let's add the following code:\n\n```\na = 5\nb = 5\n\nfor x in\
    \ range(0,100):\n    canvas.move(ball1,a,b)\n    gui.update()\n    time.sleep(.01)\n\
    ```\n\n![](img/d3010096175d19bb2f1bb51316094dea_21_1.png)\n\nSTEP 4 The `canvas.move(ball1,a,b)`\
    \ line is the part that moves the ball from one corner to the other; obviously\
    \ with both a and b equalling 5. We can change things around a bit already, such\
    \ as the size and colour of the ball, with the line: `ball1 = canvas.create_oval(5,5,60,60,\
    \ fill='red')` and we can change the values of a and b to something else.\n\n\
    ```\nball1 = canvas.create_oval(7,7,60,60, fill='red')\n\na = 8\nb = 3\n\nfor\
    \ x in range(0,100):\n    canvas.move(ball1,a,b)\n    gui.update()\n    time.sleep(.05)\n\
    ```"
