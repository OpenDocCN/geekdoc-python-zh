  md: '# Glossary of Python Terms


    **Integer**

    A number data type that must be a whole number and not a decimal.


    **Python**

    An awesome programming language that’s easy to learn and use, whilst still being
    powerful enough to enjoy.


    **Interactive Shell**

    The Python Shell, which is displayed whenever you launch the graphical version
    of Python.


    **Random**

    A Python module that implements a pseudo-random character generator using the
    Mersenne Twister PRNG.


    **Kernel**

    The core of an operating system, which handles data processing, memory allocation,
    input and output, and processes information between the hardware and programs.


    **Range**

    A function that used to return a list of integers, defined by the arguments passed
    through it.


    **Linux**

    An open source operating system that’s modelled on UNIX. Developed in 1991 by
    Finnish student Linus Torvalds.


    **Root**

    The bottom level user account used by the system itself. Root is the overall system
    administrator and can go anywhere, and do anything, on the system.


    **Lists**

    A Python data type that contains collections of values, which can be of any type
    and can readily be modified.


    **Sets**

    Sets are a collection of unordered but unique data types.


    **Local Variable**

    A variable that’s defined inside a function and is only useable inside that function.


    **Strings**

    Strings can store characters that can be modified. The contents of a string are
    alphanumerical and can be enclosed by either single or double quote marks.


    **Loop**

    A piece of code that repeats itself until a certain condition is met. Loops can
    encase the entire code or just sections of it.


    **Terminal**

    Also Console or Shell. The command line interface to the operating system, namely
    Linux, but also available in macOS. From there you can execute code and navigate
    the filesystem.


    **Module**

    A Python file that contains various functions that can be used within another
    program to further extend the effectiveness of the code.


    **Tkinter**

    A Python module designed to interact with the graphical environment, specifically
    the tk-GUI (Tool Kit Graphical User Interface).


    **Operating System**

    Also OS. The program that’s loaded into the computer after the initial boot sequence
    has completed. The OS manages all the other programs, graphical user interface
    (GUI), input and output and physical hardware interactions with the user.


    **Try**

    A try block allows exceptions to be raised, so any errors can be caught and handled
    according to the programmer’s instructions.


    **Output**

    Data that is sent from the program to a screen, printer or other external peripheral.


    **Tuples**

    An immutable Python data type that contains an ordered set of either letters or
    numbers.


    **PIP**

    Pip Installs Packages. A package management system used to install and manage
    modules and other software written in Python.


    **UNIX**

    A multitasking, multiuser operating system designed in the ''70s at the Bell Labs
    Research Centre. Written in C and assembly language


    **Print**

    A function used to display the output of something to the screen.


    **Variables**

    A data item that has been assigned a storage location in the computer’s memory.


    **Prompt**

    The element of Python, or the Command Line, where the user enters their commands.
    In Python it’s represented as >>> in the interactive shell.


    **X**

    Also X11 or X-windows. The graphical desktop used in Linux-based systems, combining
    visual enhancements and tools to manage the core operating system.


    **Pygame**

    A Python module that’s designed for writing games. It includes graphics and sound
    libraries and was first developed in October 2000.


    **Zen of Python**

    When you enter: `import this` into the IDLE, the Zen of Python is displayed.'
