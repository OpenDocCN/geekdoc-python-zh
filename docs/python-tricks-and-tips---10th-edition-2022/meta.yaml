  mdcn: "## 复制、移动和重命名文件\n\n**步骤 5** 文件和目录可以使用双点号（“..”）作为参数向上移动。输入：`ls -la` 查看你的 testfile\
    \ 以及单点和双点文件。单点代表当前目录，双点代表父目录。输入：`mv testfile ..` 将 testfile 移动到上一级的 newparent\
    \ 目录。输入：`cd ..` 移动到父目录。\n\n**步骤 6** 你也可以使用更长的路径来移动文件。输入：`cd ~` 返回主目录，然后输入 `mv\
    \ newparent/testfile newparent/testdir/testfile` 将 testfile 从当前位置移回 testdir 目录内。输入：`ls\
    \ newparent/testdir` 查看文件是否已回到其当前目录。\n\n```\npi@raspberrypi ~ $ cd newparent/testdir\n\
    pi@raspberrypi ~/newparent/testdir $ ls\ntestfile\npi@raspberrypi ~/newparent/testdir\
    \ $ mv testfile ..\npi@raspberrypi ~/newparent/testdir $ cd ..\n```\n\n```\npi@raspberrypi\
    \ ~/newparent $ cd ~\npi@raspberrypi ~ $ ls\nDesktop  Documents  Downloads  indiecity\
    \  newparent  python\npi@raspberrypi ~ $ mv newparent/testfile newparent/testdir/\n\
    pi@raspberrypi ~ $ ls newparent/testdir\ntestfile\npi@raspberrypi ~ $ _\n```\n\
    \n## 重命名文件和目录\n\n`mv` 命令不仅用于移动文件；它也用于重命名文件（实际上就是将其从旧名称移动到新名称）。让我们看看如何使用 `mv` 来重命名项目。\n\
    \n**步骤 1** 让我们从创建一个名为 \"names\" 的新测试文件开始。输入：`touch testfile` 然后 `ls` 确保 testfile\
    \ 存在。我们将把它变成一个包含一些人名的文件。所以让我们给它一个更合适的名字，比如 \"names\"。\n\n**步骤 2** 输入：`mv testfile\
    \ names` 和 `ls`。现在我们可以在目录中看到新的 \"names\" 文件。`mv` 命令也可用于重命名目录。我们的主目录中应该仍然有 newparent\
    \ 目录。输入：`mv newparent people` 将 newparent 目录重命名。输入：`ls` 查看它。\n\n```\npi@raspberrypi\
    \ ~ $ ls\nDesktop  Documents  Downloads  indiecity  newparent  python\npi@raspberrypi\
    \ ~ $ mv testfile names\npi@raspberrypi ~ $ ls\nDesktop  Documents  Downloads\
    \  indiecity  names  newparent\npi@raspberrypi ~ $\n```\n\n```\npi@raspberrypi\
    \ ~ $ touch testfile\npi@raspberrypi ~ $ ls\nDesktop  Documents  Downloads  indiecity\
    \  newparent  python\npi@raspberrypi ~ $ mv newparent people\npi@raspberrypi ~\
    \ $ ls\nDesktop  Documents  Downloads  indiecity  people  python\npi@raspberrypi\
    \ ~ $\n```\n\n**步骤 3** 你可以使用路径重命名其他目录内的目录。让我们重命名现在位于 people 目录内的 testdir 目录。输入：`mv\
    \ names/testdir names/friends`。然后输入：`mv names people/friends` 将 names 文件移动到 friends\
    \ 目录内。\n\n```\npi@raspberrypi ~ $ ls\nDesktop  Documents  Downloads  indiecity\
    \  names  people  python\npi@raspberrypi ~ $ mv people/testdir people/friends\n\
    ```\n\n**步骤 4** 使用 `mv` 命令很容易覆盖文件，因此如果你有同名文件，请使用 \"-n\" 选项，它代表 \"no overwrite\"\
    （不覆盖）。输入：`touch testfile` 创建一个新文件，然后 `mv -n testfile people/friends`。虽然没有错误报告，但输入：`ls`\
    \ 你会发现 testfile 仍然在那里。\n\n```\npi@raspberrypi ~ $ touch testfile\npi@raspberrypi\
    \ ~ $ mv -n testfile people/friends\npi@raspberrypi ~ $ ls\nDesktop  Documents\
    \  Downloads  indiecity  people  python\npi@raspberrypi ~ $ ls people/friends\n\
    names  testfile\npi@raspberrypi ~ $\n```\n\n## 实用的系统和磁盘命令\n\n理解这些核心 Linux 命令将使你不仅能掌握树莓派的内部工作原理，还能将这些技能转移到其他\
    \ Linux 发行版，如 Ubuntu 或 Linux Mint。\n\n## 丰富的 Linux 命令\n\nLinux 是一个庞大而多功能的命令行语言，有数百个命令可供学习和使用。这里有一些可以帮助你更好地使用树莓派的命令。\n\
    \n**步骤 1** 树莓派是一台很棒的小电脑，所以让我们从获取一些信息开始。输入：`cat /proc/cpuinfo` 查看你的树莓派处理器的一些详细信息。如果你有树莓派\
    \ 3，你将看到四个处理器，以及型号名称和其他信息。\n\n```\npi@raspberrypi ~ $ cat /proc/cpuinfo\nprocessor\t\
    : 0\nmodel name\t: ARMv7 Processor rev 5 (v7l)\nBogoMIPS\t: 38.40\nFeatures\t\
    : half thumb fastmult vfp edsp neon vfpv3 tls vfpv4 idiva idivt vfpd32 lpae evtstrm\n\
    CPU implementer\t: 0x41\nCPU architecture: 7\nCPU variant\t: 0x0\nCPU part\t:\
    \ 0xc07\nCPU revision\t: 5\n\nprocessor\t: 1\nmodel name\t: ARMv7 Processor rev\
    \ 5 (v7l)\nBogoMIPS\t: 38.40\nFeatures\t: half thumb fastmult vfp edsp neon vfpv3\
    \ tls vfpv4 idiva idivt vfpd32 lpae evtstrm\nCPU implementer\t: 0x41\nCPU architecture:\
    \ 7\nCPU variant\t: 0x0\nCPU part\t: 0xc07\nCPU revision\t: 5\n\nprocessor\t:\
    \ 2\nmodel name\t: ARMv7 Processor rev 5 (v7l)\nBogoMIPS\t: 38.40\nFeatures\t\
    : half thumb fastmult vfp edsp neon vfpv3 tls vfpv4 idiva idivt vfpd32 lpae evtstrm\n\
    CPU implementer\t: 0x41\nCPU architecture: 7\nCPU variant\t: 0x0\nCPU part\t:\
    \ 0xc07\nCPU revision\t: 5\n```\n\n**步骤 2** 记住 `cat` 用于列出文本文件的内容，cpuinfo 就是这样一个文件。还有其他包含系统信息的文本文件可用。尝试\
    \ \"cat /proc/meminfo\" 获取内存信息，\"cat /proc/partitions\" 获取 SD 卡信息，\"cat /proc/version\"\
    \ 显示你正在使用的树莓派版本。\n\n```\npi@raspberrypi ~ $ cat /proc/meminfo\nMemTotal:\t\t 885536\
    \ kB\nMemFree:\t\t 795576 kB\nMemAvailable:\t\t 831660 kB\nBuffers:\t\t  11660\
    \ kB\nCached:\t\t\t  56380 kB\nSwapCached:\t\t      0 kB\nActive:\t\t\t  49140\
    \ kB\nInactive:\t\t  27928 kB\nActive(anon):\t\t  11256 kB\nInactive(anon):\t\t\
    \   720 kB\nActive(file):\t\t  37884 kB\nInactive(file):\t\t  27208 kB\nUnevictable:\t\
    \t      0 kB\nMlocked:\t\t      0 kB\nSwapTotal:\t\t 102396 kB\nSwapFree:\t\t\
    \ 102396 kB\nDirty:\t\t\t     36 kB\nWriteback:\t\t      0 kB\nAnonPages:\t\t\
    \  11132 kB\nMapped:\t\t\t   5760 kB\nShmem:\t\t\t    260 kB\nSlab:\t\t\t   8444\
    \ kB\nSReclaimable:\t\t   4512 kB\nSUnreclaim:\t\t   3932 kB\nKernelStack:\t\t\
    \    872 kB\nPageTables:\t\t    564 kB\nNFS_Unstable:\t\t      0 kB\nBounce:\t\
    \t\t      0 kB\nWritebackTmp:\t\t      0 kB\nCommitLimit:\t\t 545164 kB\nCommitted_AS:\t\
    \t   43712 kB\nVmallocTotal:\t\t 1181080 kB\nVmallocUsed:\t\t    3880 kB\nHugePages_Total:\t\
    \       0\nHugePages_Free:\t        0\nHugePages_Rsvd:\t        0\nHugePages_Surp:\t\
    \        0\nHugepagesize:\t\t    2048 kB\nDirectMap4k:\t\t    8192 kB\nDirectMap2M:\t\
    \t  894976 kB\npi@raspberrypi ~ $ cat /proc/partitions\nmajor minor  #blocks \
    \ name\n\n 179        0    7761920 mmcblk0\n 179        1    8350721 mmcblk0p1\n\
    \ 179        2          1 mmcblk0p2\n```\n\n**步骤 3** 输入：`uname` 查看操作系统内核的名称，这是位于界面和硬件之间的组件。正如你所料，该命令的响应是\
    \ Linux，因为 Raspbian 是一个 Linux 发行版，它本身基于另一个名为 Debian 的 Linux 发行版。虽然这听起来可能很复杂，但它实际上展示了\
    \ Linux 的多功能性。\n\n```\npi@raspberrypi ~ $ uname\nLinux\npi@raspberrypi ~ $\n```\n\
    \n**步骤 4** 输入：`uname -a` 查看更详细的信息。在这里你会看到内核名称、主机名和内核版本（我们的是 3.18.7-v7+）。如果你有树莓派\
    \ 2，你会看到 SMP（对称多处理），后面是系统日期、CPU 架构和操作系统（GNU/Linux）。\n\n```\npi@raspberrypi ~ $\
    \ uname -a\nLinux raspberrypi 3.18.7-v7+ #755 SMP PREEMPT Thu Feb 12 17:14:31\
    \ GMT 2015 armv7l GNU/Linux\npi@raspberrypi ~ $ _\n```\n\n**步骤 5** 输入：`vcgencmd\
    \ measure_temp` 查看树莓派当前的操作系统温度。输入：`vcgencmd get_mem arm` 查看可用的 RAM，`vcgencmd get_mem\
    \ gpu` 查看图形芯片可用的内存。最后尝试 `lsusb` 查看连接的 USB 设备列表。\n\n```\npi@raspberrypi ~ $ vcgencmd\
    \ measure_temp\ntemp=45.0'C\npi@raspberrypi ~ $ vcgencmd get_mem arm\narm=800M\n\
    pi@raspberrypi ~ $ vcgencmd get_mem gpu\ngpu=64M\npi@raspberrypi ~ $ lsusb\nBus\
    \ 001 Device 002: ID 0424:9514 Standard Microsystems Corp.\nBus 001 Device 001:\
    \ ID 1d6b:0002 Linux Foundation 2.0 root hub\nBus 001 Device 003: ID 0424:ec00\
    \ Standard Microsystems Corp.\nBus 001 Device 004: ID 04d9:0150 Holtek Semiconductor,\
    \ Inc. Shortboard Lefty\nBus 001 Device 005: ID 1a40:0101 Terminus Technology\
    \ Inc. 4-Port HUB\nBus 001 Device 006: ID 276d:1105\npi@raspberrypi ~ $\n```\n\
    \n**步骤 6** 你可能想知道的一个命令是如何从命令行关闭或重启树莓派。不要直接按电源开关。输入：`sudo shutdown -h now` 关闭树莓派（“-h”\
    \ 选项代表 “halt”），或者输入：`sudo shutdown -r now` 重启树莓派。\n\n```\npi@raspberrypi ~ $ sudo\
    \ shutdown -r now\n\nBroadcast message from root@raspberrypi (tty1) (Thu May 14\
    \ 12:20:29 2015):\n\nThe system is going down for reboot NOW!\n-\n```\n\n## 磁盘命令\n\
    \n学习两个命令，使你能够查看磁盘空间及其上的文件：`df`（磁盘空闲空间）和 `du`（磁盘使用情况）。使用这两个命令，你可以查看 SD 卡上的文件使用情况。\n\
    \n**步骤 1** 首先在命令行中输入：`df`。它返回 SD 卡上包含的卷列表。你可能想知道什么是卷。最好将你的 SD 卡视为驱动器。它包含分区，分区是你将一个驱动器分割成像两个或更多驱动器一样使用的方式。每个分区可以包含卷，卷是存储空间。\n\
    \n```\npi@raspberrypi ~ $ df\nFilesystem     1K-blocks    Used Available Use%\
    \ Mounted on\nrootfs          6581636 3481464   2740096  56% /\n/dev/root    \
    \   6581636 3481464   2740096  56% /\ndevtmpfs         428160       0    428160\
    \   0% /dev\ntmpfs             80432     260     80172   1% /run\ntmpfs      \
    \        5120       0      5120   0% /run/lock\ntmpfs            176860      \
    \ 0    176860   0% /run/shm\n/dev/mmcblk0p5    60479   14536     45943  25% /boot\n\
    pi@raspberrypi ~ $\n```\n\n**步骤 2** 输入：`df -h` 以人类可读的形式获取列表。前两行应该显示 “rootfs” 和\
    \ “/dev/root”，并且具有匹配的 Size、Used、Avail 和 Use% 列表。这是主驱动器，它表明你的 Raspbian 操作系统已使用和可用的空间量。其他卷用于启动和初始化设备（你现在可以忽略这些）。\n\
    \n```\npi@raspberrypi ~ $ df -h\nFilesystem      Size  Used Avail Use% Mounted\
    \ on\nrootfs          6.3G  3.4G  2.7G  56% /\n/dev/root       6.3G  3.4G  2.7G\
    \  56% /\ndevtmpfs        428M     0  428M   0% /dev\ntmpfs            87M  260K\
    \   87M   1% /run\ntmpfs           5.0M     0  5.0M   0% /run/lock\ntmpfs    \
    \       173M     0  173M   0% /run/shm\n/dev/mmcblk0p5   60M   15M   45M  25%\
    \ /boot\npi@raspberrypi ~ $\n```\n\n**步骤 3** 现在输入：`du`。你应该会看到大量文本在屏幕上飞速滚动。这是你的主目录及其子目录中包含的文件的磁盘使用情况。与\
    \ df 一样，最好使用带有 “-h” 选项的 du 来使输出更人性化。如果你想减慢输出速度，你还需要通过 less 管道传输它。输入：`du -h | less`\
    \ 逐页查看文件及其各自的使用情况。\n\n```\npi@raspberrypi ~ $ du -h | less\n22M\t./.minecraft/games/com.mojang/minecraftWorlds/world\n\
    22M\t./.minecraft/games/com.mojang/minecraftWorlds\n22M\t./.minecraft/games/com.mojang\n\
    22M\t./.minecraft/games\n4.0K\t./.pulse\n16K\t./.config/gedit\n8.0K\t./.config/libfm\n\
    1.4M\t./.config/epiphany/adblock\n1.0M\t./.config/epiphany\n8.0K\t./.config/lxsession/LXDE-pi\n\
    12K\t./.config/lxsession\n8.0K\t./.config/dconf\n8.0K\t./.config/rncbc.org\n8.0K\t\
    ./.config/lxterminal\n8.0K\t./.config/uk.ac.cam.cl\n8.0K\t./.config/indiecity\n\
    ```\n\n**步骤 4** 你通常不会单独输入：`du`；大多数时候你想查看特定目录的磁盘使用情况。输入：`du -h python_games` 查看\
    \ python_games 目录（与 Raspbian 一起安装）占用多少空间。它应该是 1.8M。如果你想更全面地分解包含的文件，请使用 “-a” 选项（全部）。输入：`du\
    \ -ha python_games` 查看所有包含的文件及其磁盘使用情况。\n\n```\npi@raspberrypi ~ $ ls\ndownloads\
    \  infinity  people  python_games  Scratch  testfile\npi@raspberrypi ~ $ du -h\
    \ python_games\n1.8M\tpython_games\npi@raspberrypi ~ $ du -ha python_games\n12K\t\
    python_games/RedSelector.png\n12K\tpython_games/4row_board.png\n12K\tpython_games/Star.png\n\
    20K\tpython_games/4row_humanwinner.png\n12K\tpython_games/Wall_Block_Tall.png\n\
    8.0K\tpython_games/princess.png\n8.0K\tpython_games/4row_board.png\n8.0K\tpython_games/4row_black.png\n\
    4.0K\tpython_games/catanimation.py\n4.0K\tpython_games/4row_human.png\n36K\tpython_games/match3.wav\n\
    24K\tpython_games/starpusher.py\n```"
