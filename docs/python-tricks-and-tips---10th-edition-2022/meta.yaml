  md: '# SHELL


    The Linux shell is a command-line interface environment that a Linux user can
    use to enter commands to the OS that directly affect it. Within the shell you
    can add new users, reboot the system, create and delete files and folders, and
    much more. BASH (Bourne Again Shell) is the most popular shell used in Linux,
    although more are available. The shell is also known as the Terminal, and it''s
    where you''re going to work from through this section of the book.


    ![](img/d3010096175d19bb2f1bb51316094dea_56_0.png)


    ![](img/d3010096175d19bb2f1bb51316094dea_56_1.png)


    Linux is used throughout the world, in a number of basic and quite unique uses.
    While it may look radically different from one environment to the next, the actual
    Linux kernel, can be found in modern smart TVs, in-car entertainment systems and
    GPS, supercomputers, IoT devices and the Raspberry Pi. It''s used by NASA, both
    in the command centre and on-board the ISS. Linux servers power the backbone of
    the Internet, along with most of the websites you visit daily. Android utilises
    components of the Linux kernel, as do set top boxes, games consoles and even your
    fridge, freezer, oven and washing machine.


    Linux isn''t just a free to use operating system. It''s stable, powerful and fast,
    easily customised and requires very little maintenance. However, it''s more than
    just performance stats; Linux means freedom from the walled garden approach of
    other operating systems. It''s a lively community of like-minded individuals who
    want more from their computers without the shackles of price or conformity. Linux
    means choice.


    Raspbian on the Raspberry Pi, is the Linux distribution of choice.


    ![](img/d3010096175d19bb2f1bb51316094dea_56_2.png)'
