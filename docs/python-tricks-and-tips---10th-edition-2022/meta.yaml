    # Copying, Moving and Renaming Files


    Taking command of the Terminal is essential when learning how your Raspberry Pi’s
    operating system works. The copying, moving and renaming of files is equally important,
    as you’ll be doing a lot of this throughout your Pi projects.


    # USING THE MOVE COMMAND


    In Linux, renaming a file is simply moving it from one name to another and copying
    a file is moving it without deleting the original. Don’t panic, it’s quite easy
    to master.


    **STEP 1** Before we can move anything around, we need to have a few test items
    in our home directory. Enter: `touch testfile` and `mkdir testdir` to create a
    test file and test directory in your home directory. Enter: `ls` to check that
    they are both present.


    **STEP 3** Enter: `mv testfile testdir` and press return to move the testfile
    document into the testdir directory. Enter: `ls` to see that it’s no longer in
    the home directory, and `ls testdir` to see the testfile now sitting in the testdir
    directory. Now enter: `mkdir newparent` to create a new directory.


    ```

    pi@raspberrypi ~ $ touch testfile

    pi@raspberrypi ~ $ mkdir testdir

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scr

    pi@raspberrypi ~ $

    ```


    ```

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scr

    pi@raspberrypi ~ $ mv testfile testdir

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scr

    pi@raspberrypi ~ $ ls testdir

    testfile

    pi@raspberrypi ~ $

    ```


    **STEP 2** Files and directories are moved using the `mv` command. This is different
    to the commands we’ve looked at so far because it has two arguments (remember
    Linux command line is command, option, argument). The first argument is the source
    (the file or directory to be moved) and the second is the destination.


    **STEP 4** Directories with files are moved in the same way. Enter: `mv testdir
    newparent` to move the testdir directory inside the newparent directory. Let’s
    move into the directory to find the file. Enter: `cd /newparent/testdir` and enter:
    `ls` to view the testfile sitting inside the directory.


    ```

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scr

    pi@raspberrypi ~ $ mv testfile testdir

    ```


    ```

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scr

    pi@raspberrypi ~ $ mkdir newparent

    pi@raspberrypi ~ $ mv testdir newparent

    pi@raspberrypi ~ $ cd newparent/testdir

    pi@raspberrypi ~/newparent/testdir $ ls

    testfile

    pi@raspberrypi ~/newparent/testdir $

    ```'
- md: "## Copying, Moving and Renaming Files\n\n**STEP 5** Files and directories can\
    \ be moved up using the double dot (\"..\") as an argument. Enter: `ls -la` to\
    \ view your testfile and the single and double dot files. The single dot is the\
    \ current directory and the double dot is the parent directory. Enter: `mv testfile\
    \ ..` to move the testfile up into the newparent directory. Enter: `cd ..` to\
    \ move up to the parent directory.\n\n**STEP 6** You can also move files using\
    \ longer paths. Enter: `cd ~` to return to the home directory and `mv newparent/testfile\
    \ newparent/testdir/testfile` to move the testfile from its current location back\
    \ inside the testdir directory. Enter: `ls newparent/testdir` to view the file\
    \ back in its current directory.\n\n```\npi@raspberrypi ~ $ cd newparent/testdir\n\
    pi@raspberrypi ~/newparent/testdir $ ls\ntestfile\npi@raspberrypi ~/newparent/testdir\
    \ $ mv testfile ..\npi@raspberrypi ~/newparent/testdir $ cd ..\n```\n\n```\npi@raspberrypi\
    \ ~/newparent $ cd ~\npi@raspberrypi ~ $ ls\nDesktop  Documents  Downloads  indiecity\
    \  newparent  python\npi@raspberrypi ~ $ mv newparent/testfile newparent/testdir/\n\
    pi@raspberrypi ~ $ ls newparent/testdir\ntestfile\npi@raspberrypi ~ $ _\n```\n\
    \n## RENAME FILES AND DIRECTORIES\n\nThe `mv` command isn't used just to move\
    \ files; it also serves the purpose of renaming files (effectively it moves it\
    \ from its old name to a new name). Let's see how to use `mv` to rename items.\n\
    \n**STEP 1** Let's start by making a new test file called \"names\". Enter: `touch\
    \ testfile` and then `ls` to make sure the testfile is present. We're going to\
    \ turn this into a file that contains the names of some people. So let's call\
    \ it something more appropriate, like \"names\".\n\n**STEP 2** Enter: `mv testfile\
    \ names` and `ls`. Now we can see the new \"names\" file in our directory. The\
    \ `mv` command can also be used to rename directories. We should still have our\
    \ newparent directory in our home directory. Enter: `mv newparent people` to rename\
    \ the newparent directory. Enter: `ls` to view it.\n\n```\npi@raspberrypi ~ $\
    \ ls\nDesktop  Documents  Downloads  indiecity  newparent  python\npi@raspberrypi\
    \ ~ $ mv testfile names\npi@raspberrypi ~ $ ls\nDesktop  Documents  Downloads\
    \  indiecity  names  newparent\npi@raspberrypi ~ $\n```\n\n```\npi@raspberrypi\
    \ ~ $ touch testfile\npi@raspberrypi ~ $ ls\nDesktop  Documents  Downloads  indiecity\
    \  newparent  python\npi@raspberrypi ~ $ mv newparent people\npi@raspberrypi ~\
    \ $ ls\nDesktop  Documents  Downloads  indiecity  people  python\npi@raspberrypi\
    \ ~ $\n```\n\n**STEP 3** You can rename directories inside other directories using\
    \ paths. Let's rename the testdir directory, which is now inside the people directory.\
    \ Enter: `mv names/testdir names/friends`. Now enter: `mv names people/friends`\
    \ to move the names file inside the friends directory.\n\n```\npi@raspberrypi\
    \ ~ $ ls\nDesktop  Documents  Downloads  indiecity  names  people  python\npi@raspberrypi\
    \ ~ $ mv people/testdir people/friends\n```\n\n**STEP 4** It is easy to overwrite\
    \ files using the `mv` command, so if you have files with the same name use the\
    \ \"-n\" option, which stands for \"no overwrite\". Enter: `touch testfile` to\
    \ create a new file and `mv -n testfile people/friends`. There's no error report\
    \ though, enter: `ls` and you'll find testfile still there.\n\n```\npi@raspberrypi\
    \ ~ $ touch testfile\npi@raspberrypi ~ $ mv -n testfile people/friends\npi@raspberrypi\
    \ ~ $ ls\nDesktop  Documents  Downloads  indiecity  people  python\npi@raspberrypi\
    \ ~ $ ls people/friends\nnames  testfile\npi@raspberrypi ~ $\n```\n\n## Useful\
    \ System and Disk Commands\n\nUnderstanding these core Linux commands will enable\
    \ you to not only master the inner workings of your Raspberry Pi but also to transfer\
    \ those skills to other Linux distros, such as Ubuntu or Linux Mint.\n\n## LOTS\
    \ OF LINUX\n\nLinux is a huge and versatile command line language and there are\
    \ hundreds of commands you can learn and use. Here are a few that can help you\
    \ get more from your Raspberry Pi.\n\n**STEP 1** The Raspberry Pi is a great little\
    \ computer, so let's start by getting some information. Enter: `cat /proc/cpuinfo`\
    \ to view some details on your Raspberry Pi processors. If you have a Raspberry\
    \ Pi 3 you will see four processors, along with the model name and other info.\n\
    \n```\npi@raspberrypi ~ $ cat /proc/cpuinfo\nprocessor\t: 0\nmodel name\t: ARMv7\
    \ Processor rev 5 (v7l)\nBogoMIPS\t: 38.40\nFeatures\t: half thumb fastmult vfp\
    \ edsp neon vfpv3 tls vfpv4 idiva idivt vfpd32 lpae evtstrm\nCPU implementer\t\
    : 0x41\nCPU architecture: 7\nCPU variant\t: 0x0\nCPU part\t: 0xc07\nCPU revision\t\
    : 5\n\nprocessor\t: 1\nmodel name\t: ARMv7 Processor rev 5 (v7l)\nBogoMIPS\t:\
    \ 38.40\nFeatures\t: half thumb fastmult vfp edsp neon vfpv3 tls vfpv4 idiva idivt\
    \ vfpd32 lpae evtstrm\nCPU implementer\t: 0x41\nCPU architecture: 7\nCPU variant\t\
    : 0x0\nCPU part\t: 0xc07\nCPU revision\t: 5\n\nprocessor\t: 2\nmodel name\t: ARMv7\
    \ Processor rev 5 (v7l)\nBogoMIPS\t: 38.40\nFeatures\t: half thumb fastmult vfp\
    \ edsp neon vfpv3 tls vfpv4 idiva idivt vfpd32 lpae evtstrm\nCPU implementer\t\
    : 0x41\nCPU architecture: 7\nCPU variant\t: 0x0\nCPU part\t: 0xc07\nCPU revision\t\
    : 5\n```\n\n**STEP 2** Remember that `cat` is used to list the contents of a text\
    \ file, which is what cpuinfo is. There are other text files with system info\
    \ available. Try \"cat /proc/meminfo\" to get information about your memory, \"\
    cat /proc/partitions\" for information about your SD card, and \"cat /proc/version\"\
    \ shows which version of Raspberry Pi you are using.\n\n```\npi@raspberrypi ~\
    \ $ cat /proc/meminfo\nMemTotal:\t\t 885536 kB\nMemFree:\t\t 795576 kB\nMemAvailable:\t\
    \t 831660 kB\nBuffers:\t\t  11660 kB\nCached:\t\t\t  56380 kB\nSwapCached:\t\t\
    \      0 kB\nActive:\t\t\t  49140 kB\nInactive:\t\t  27928 kB\nActive(anon):\t\
    \t  11256 kB\nInactive(anon):\t\t   720 kB\nActive(file):\t\t  37884 kB\nInactive(file):\t\
    \t  27208 kB\nUnevictable:\t\t      0 kB\nMlocked:\t\t      0 kB\nSwapTotal:\t\
    \t 102396 kB\nSwapFree:\t\t 102396 kB\nDirty:\t\t\t     36 kB\nWriteback:\t\t\
    \      0 kB\nAnonPages:\t\t  11132 kB\nMapped:\t\t\t   5760 kB\nShmem:\t\t\t \
    \   260 kB\nSlab:\t\t\t   8444 kB\nSReclaimable:\t\t   4512 kB\nSUnreclaim:\t\t\
    \   3932 kB\nKernelStack:\t\t    872 kB\nPageTables:\t\t    564 kB\nNFS_Unstable:\t\
    \t      0 kB\nBounce:\t\t\t      0 kB\nWritebackTmp:\t\t      0 kB\nCommitLimit:\t\
    \t 545164 kB\nCommitted_AS:\t\t   43712 kB\nVmallocTotal:\t\t 1181080 kB\nVmallocUsed:\t\
    \t    3880 kB\nHugePages_Total:\t       0\nHugePages_Free:\t        0\nHugePages_Rsvd:\t\
    \        0\nHugePages_Surp:\t        0\nHugepagesize:\t\t    2048 kB\nDirectMap4k:\t\
    \t    8192 kB\nDirectMap2M:\t\t  894976 kB\npi@raspberrypi ~ $ cat /proc/partitions\n\
    major minor  #blocks  name\n\n 179        0    7761920 mmcblk0\n 179        1\
    \    8350721 mmcblk0p1\n 179        2          1 mmcblk0p2\n```\n\n**STEP 3**\
    \ Enter: `uname` to view the name of the operating system's kernel, this is the\
    \ element that sits between the interface and hardware. Just as you would suspect,\
    \ the response from the command is Linux, as Raspbian is a Linux distro, which\
    \ in itself is based on another Linux distro called Debian. While it may sound\
    \ complicated, it actually demonstrates how versatile Linux is.\n\n```\npi@raspberrypi\
    \ ~ $ uname\nLinux\npi@raspberrypi ~ $\n```\n\n**STEP 4** Enter: `uname -a` to\
    \ view some more detailed information. Here you'll see the kernel name, hostname\
    \ and kernel version (3.18.7-v7+ on ours). If you have a Raspberry Pi 2 you'll\
    \ see SMP (symmetric multiprocessing), followed by the system date, CPU architecture\
    \ and operating system (GNU/Linux).\n\n```\npi@raspberrypi ~ $ uname -a\nLinux\
    \ raspberrypi 3.18.7-v7+ #755 SMP PREEMPT Thu Feb 12 17:14:31 GMT 2015 armv7l\
    \ GNU/Linux\npi@raspberrypi ~ $ _\n```\n\n**STEP 5** Enter: `vcgencmd measure_temp`\
    \ to view the current operating system temperature of your Raspberry Pi. Enter:\
    \ `vcgencmd get_mem arm` to view the RAM available, and `vcgencmd get_mem gpu`\
    \ to view the memory available to the graphics chip. Finally try `lsusb` to view\
    \ a list of attached USB devices.\n\n```\npi@raspberrypi ~ $ vcgencmd measure_temp\n\
    temp=45.0'C\npi@raspberrypi ~ $ vcgencmd get_mem arm\narm=800M\npi@raspberrypi\
    \ ~ $ vcgencmd get_mem gpu\ngpu=64M\npi@raspberrypi ~ $ lsusb\nBus 001 Device\
    \ 002: ID 0424:9514 Standard Microsystems Corp.\nBus 001 Device 001: ID 1d6b:0002\
    \ Linux Foundation 2.0 root hub\nBus 001 Device 003: ID 0424:ec00 Standard Microsystems\
    \ Corp.\nBus 001 Device 004: ID 04d9:0150 Holtek Semiconductor, Inc. Shortboard\
    \ Lefty\nBus 001 Device 005: ID 1a40:0101 Terminus Technology Inc. 4-Port HUB\n\
    Bus 001 Device 006: ID 276d:1105\npi@raspberrypi ~ $\n```\n\n**STEP 6** One command\
    \ you might be wondering about is how to switch off or restart your Raspberry\
    \ Pi from the command line. Don't just hit the power switch. Enter: `sudo shutdown\
    \ -h now` to shut down the Raspberry Pi (the “-h” option stands for “halt”), or\
    \ enter: `sudo shutdown -r now` to restart your Raspberry Pi.\n\n```\npi@raspberrypi\
    \ ~ $ sudo shutdown -r now\n\nBroadcast message from root@raspberrypi (tty1) (Thu\
    \ May 14 12:20:29 2015):\n\nThe system is going down for reboot NOW!\n-\n```\n\
    \n## DISK COMMANDS\n\nLearn the two commands that enable you to view your disk\
    \ space and the files on it: `df` (disk free space) and `du` (disk usage). With\
    \ these two commands you can view the file usage on your SD card.\n\n**STEP 1**\
    \ Start by entering: `df` in the command line. It returns a list of the volumes\
    \ contained on your SD card. You might be wondering what a volume is. It's best\
    \ to think of your SD card as the drive. This contains partitions, which is where\
    \ you split one drive to act like two or more drives. And each partition can contain\
    \ volumes, which are storage spaces.\n\n```\npi@raspberrypi ~ $ df\nFilesystem\
    \     1K-blocks    Used Available Use% Mounted on\nrootfs          6581636 3481464\
    \   2740096  56% /\n/dev/root       6581636 3481464   2740096  56% /\ndevtmpfs\
    \         428160       0    428160   0% /dev\ntmpfs             80432     260\
    \     80172   1% /run\ntmpfs              5120       0      5120   0% /run/lock\n\
    tmpfs            176860       0    176860   0% /run/shm\n/dev/mmcblk0p5    60479\
    \   14536     45943  25% /boot\npi@raspberrypi ~ $\n```\n\n**STEP 2** Enter: `df\
    \ -h` to get the list in human readable form. The first two lines should read\
    \ “rootfs” and “/dev/root” and have matching Size, Used, Avail and Use% listings.\
    \ This is the main drive, and is an indication of how much space you have used,\
    \ and have free, on your Raspbian OS. The other volumes are for booting and initialising\
    \ devices (you can ignore these for now).\n\n```\npi@raspberrypi ~ $ df -h\nFilesystem\
    \      Size  Used Avail Use% Mounted on\nrootfs          6.3G  3.4G  2.7G  56%\
    \ /\n/dev/root       6.3G  3.4G  2.7G  56% /\ndevtmpfs        428M     0  428M\
    \   0% /dev\ntmpfs            87M  260K   87M   1% /run\ntmpfs           5.0M\
    \     0  5.0M   0% /run/lock\ntmpfs           173M     0  173M   0% /run/shm\n\
    /dev/mmcblk0p5   60M   15M   45M  25% /boot\npi@raspberrypi ~ $\n```\n\n**STEP\
    \ 3** Now enter: `du`. You should see lots of text fly up the screen. This is\
    \ the disk usage for the files contained in your home directory and their sub-directories.\
    \ As with df, it is better to use du with the “-h” option to humanise the output.\
    \ If you want to slow down the output, you'll also need to pipe it through less.\
    \ Enter: `du -h | less` to view the files and their respective usage one page\
    \ at a time.\n\n```\npi@raspberrypi ~ $ du -h | less\n22M\t./.minecraft/games/com.mojang/minecraftWorlds/world\n\
    22M\t./.minecraft/games/com.mojang/minecraftWorlds\n22M\t./.minecraft/games/com.mojang\n\
    22M\t./.minecraft/games\n4.0K\t./.pulse\n16K\t./.config/gedit\n8.0K\t./.config/libfm\n\
