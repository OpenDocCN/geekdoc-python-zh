    \ within another; and we're going to create a New File called pygametxt.py:\n\n\
    ```\nimport pygame\nimport time\nimport subprocess\npygame.init()\nscreen = pygame.display.set_mode((800,\
    \ 250))\nclock = pygame.time.Clock()\n\nfont = pygame.font.Font(None, 25)\n\n\
    pygame.time.set_timer(pygame.USEREVENT, 200)\n\ndef text_generator(text):\n  \
    \  tmp = ''\n    for letter in text:\n        tmp += letter\n        if letter\
    \ != ' ':\n            yield tmp\n\nclass DynamicText(object):\n    def __init__(self,\
    \ font, text, pos, autoreset=False):\n        self.done = False\n        self.font\
    \ = font\n        self.text = text\n        self._gen = text_generator(self.text)\n\
    \        self.pos = pos\n        self.autoreset = autoreset\n        self.update()\n\
    \n    def reset(self):\n        self._gen = text_generator(self.text)\n      \
    \  self.done = False\n        self.update()\n\n    def update(self):\n       \
    \ if not self.done:\n            try: self.rendered = self.font.render(next(self._gen),\
    \ True, (0, 128, 0))\n            except StopIteration:\n                self.done\
    \ = True\n                time.sleep(10)\n                subprocess.Popen(\"\
    python3 /home/pi/Documents/Python\\ Code/pygame1.py 1\", shell=True)\n\n    def\
    \ draw(self, screen):\n        screen.blit(self.rendered, self.pos)\n\ntext=(\"\
    A long time ago, a barbarian strode from the frozen north. Sword in hand...\"\
    )\n\nmessage = DynamicText(font, text, (65, 120), autoreset=True)\n\nwhile True:\n\
    \    for event in pygame.event.get():\n        if event.type == pygame.QUIT: break\n\
    \        if event.type == pygame.USEREVENT: message.update()\n    else:\n    \
    \    screen.fill(pygame.color.Color('black'))\n        message.draw(screen)\n\
    \        pygame.display.flip()\n        clock.tick(60)\n        continue\n   \
    \ break\n\npygame.quit()\n```\n\n![](img/d3010096175d19bb2f1bb51316094dea_20_0.png)\n\
    \nSTEP 10 When you run this code it will display a long, narrow Pygame window\
    \ with the intro text scrolling to the right. After a pause of ten seconds, it\
    \ then launches the main game Python script where you can move the warrior sprite\
    \ around. Overall the effect is quite good but there's always room for improvement.\n\
    \n![](img/d3010096175d19bb2f1bb51316094dea_20_1.png)\n\n![](img/d3010096175d19bb2f1bb51316094dea_20_2.png)"
- md: "## Basic Animation\n\nPython's modules make it relatively easy to create shapes,\
    \ or display graphics and animate them accordingly. Animation though, can be a\
    \ tricky element to get right in code. There are many different ways of achieving\
    \ the same end result and we'll show you one such example here.\n\n## LIGHTS,\
    \ CAMERA, ACTION\n\nThe Tkinter module is an ideal starting point for learning\
    \ animation within Python. Naturally, there are better custom modules out there,\
    \ but Tkinter does the job well enough to get a grasp on what's needed.\n\nSTEP\
    \ 1 Let's make a bouncing ball animation. First, we will need to create a canvas\
    \ (window) and the ball to animate:\n\n```\nfrom tkinter import *\nimport time\n\
    \ngui = Tk()\ngui.geometry(\"800x600\")\ngui.title(\"Pi Animation\")\ncanvas =\
    \ Canvas(gui,\nwidth=800,height=600,bg='white')\ncanvas.pack()\n\nball1 = canvas.create_oval(5,5,60,60,\
    \ fill='red')\n\ngui.mainloop()\n```\n\nSTEP 2 Save and Run the code. You will\
    \ see a blank window appear, with a red ball sitting in the upper left corner\
    \ of the window. While this is great, it's not very animated. Let's add the following\
    \ code:\n\n```\na = 5\nb = 5\n\nfor x in range(0,100):\n    canvas.move(ball1,a,b)\n\
    \    gui.update()\n    time.sleep(.01)\n```\n\nSTEP 3 Insert the new code between\
    \ the `ball1 = canvas.create_oval(5,5,60,60, fill='red')` line and the `gui.mainloop()`\
    \ line. Save it and Run. You will now see the ball move from the top left corner\
    \ of the animation window, down to the bottom right corner. You can alter the\
    \ speed in which the ball traverses the window by altering the `time.sleep(.01)`\
    \ line. Try (.05).\n\nSTEP 4 The `canvas.move(ball1,a,b)` line is the part that\
    \ moves the ball from one corner to the other; obviously with both a and b equalling\
    \ 5. We can change things around a bit already, such as the size and colour of\
    \ the ball, with the line: `ball1 = canvas.create_oval(5,5,60,60, fill='red')`\
    \ and we can change the values of a and b to something else.\n\n```\nball1 = canvas.create_oval(7,7,60,60,\
    \ fill='red')\n\na = 8\nb = 3\n\nfor x in range(0,100):\n    canvas.move(ball1,a,b)\n\
    \    gui.update()\n    time.sleep(.05)\n```\n\nSTEP 5 Let's see if we can animate\
    \ the ball so that it bounces around the window until you close the program.\n\
    \n```\nxa = 5\nya = 10\n\nwhile True:\n    canvas.move(ball1,xa,ya)\n    pos=canvas.coords(ball1)\n\
    \    if pos[3] >=600 or pos[1] <=0:\n        ya = -ya\n    if pos[2] >=800 or\
    \ pos[0] <=0:\n        xa = -xa\n    gui.update()\n    time.sleep(.025)\n```\n\
    \nSTEP 6 Remove the code you entered in Step 2 and insert the code from Step 5\
    \ in its place; again, between the `ball1 = canvas.create_oval(5,5,60,60, fill='red')`\
    \ and the `gui.mainloop()` lines. Save the code and Run it as normal. If you've\
    \ entered the code correctly, then you will see the red ball bounce off the edges\
    \ of the window until you close the program.\n\nSTEP 7 The bouncing animation\
    \ takes place within the While True loop. First, we have the values of xa and\
    \ ya before the loop, both of 5 and 10. The `pos=canvas.coords(ball1)` line takes\
    \ the value of the ball's location in the window. When it reaches the limits of\
    \ the window, 800 or 600, it will make the values negative; moving the ball around\
    \ the screen.\n\nSTEP 8 Pygame, however, is a much better module at producing\
    \ higher-end animations. Begin by creating a New File and entering:\n\n```\nimport\
    \ pygame\nfrom random import randrange\n\nMAX_STARS = 250\nSTAR_SPEED = 2\n\n\
    def init_stars(screen):\n    \"\"\" Create the starfield \"\"\"\n    global stars\n\
    \    stars = []\n    for i in range(MAX_STARS):\n        # A star is represented\
    \ as a list with this\nformat: [X,Y]\n        star = [randrange(0,screen.get_width()\
    \ - 1),\n                randrange(0,screen.get_height() - 1)]\n        stars.append(star)\n\
    \ndef move_and_draw_stars(screen):\n    \"\"\" Move and draw the stars \"\"\"\n\
    \    global stars\n    for star in stars:\n        star[1] += STAR_SPEED\n   \
    \     if star[1] >= screen.get_height():\n            star[1] = 0\n          \
    \  star[0] = randrange(0,639)\n\n        screen.set_at(star, (255,255,255))\n\
    ```\n\nSTEP 9 Now add the following:\n\n```\ndef main():\n    pygame.init()\n\
    \    screen = pygame.display.set_mode((640,480))\n    pygame.display.set_caption(\"\
    Starfield Simulation\")\n    clock = pygame.time.Clock()\n\n    init_stars(screen)\n\
    \n    while True:\n        # Lock the framerate at 50 FPS\n        clock.tick(50)\n\
    \n        # Handle events\n        for event in pygame.event.get():\n        \
    \    if event.type == pygame.QUIT:\n                return\n\n        screen.fill((0,0,0))\n\
    \        move_and_draw_stars(screen)\n        pygame.display.flip()\n\nif __name__\
    \ == \"__main__\":\n    main()\n```\n\nSTEP 10 Save and Run the code. You will\
    \ agree that the simulated starfield code looks quite impressive. Imagine this\
    \ as the beginning of some game code, or even the start to a presentation? Using\
    \ a combination of Pygame and Tkinter, your Python animations will look fantastic.\n\
    \n## Create Your Own Modules\n\nLarge programs can be much easier to manage if\
    \ you break them up into smaller parts and import the parts you need as modules.\
    \ Learning to build your own modules also makes it easier to understand how they\
    \ work.\n\n## BUILDING MODULES\n\nModules are Python files, containing code, that\
    \ you save using a .py extension. These are then imported into Python using the\
    \ now familiar import command.\n\n**STEP 1** Let's start by creating a set of\
    \ basic mathematics functions. Multiply a number by two, three and square or raise\
    \ a number to an exponent (power). Create a New File in the IDLE and enter:\n\n\
    ```\ndef timestwo(x) :\n    return x * 2\n\ndef timesthree(x) :\n    return x\
    \ * 3\n\ndef square(x) :\n    return x * x\n\ndef power(x,y) :\n    return x **\
    \ y\n```\n\n**STEP 2** Under the above code, enter functions to call the code:\n\
    \n```\nprint (timestwo(2))\nprint (timesthree(3))\nprint (square(4))\nprint (power(5,3))\n\
    ```\n\nSave the program as basic_math.py and execute it to get the results.\n\n\
    **STEP 3** Now you're going to take the function definitions out of the program\
    \ and into a separate file. Highlight the function definitions and choose Edit\
    \ > Cut. Choose File > New File and use Edit > Paste in the new window. You now\
    \ have two separate files, one with the function definitions, the other with the\
    \ function calls.\n\n**STEP 4** If you now try and execute the basic_math.py code\
    \ again, the error **'NameError: name 'timestwo' is not defined'** will be displayed.\
    \ This is due to the code no longer having access to the function definitions.\n\
    \n```\nTraceback (most recent call last):\n  File \"/home/pi/Documents/Python\
    \ Code/basic_math.py\", line 3, in <module>\n    print (timestwo(2))\nNameError:\
    \ name 'timestwo' is not defined\n>>> |\n```\n\n**STEP 5** Return to the newly\
    \ created window containing the function definitions, and click File > Save As.\
    \ Name this **minimath.py** and save it in the same location as the original **basic_math.py**\
    \ program. Now close the minimath.py window, so the basic_math.py window is left\
    \ open.\n\nSTEP 6 Back to the basic_math.py window: at the top of the code enter:\n\
    \n```\nfrom minimath import *\n```\n\nThis will import the function definitions\
    \ as a module. Press F5 to save and execute the program to see it in action.\n\
    \nSTEP 7 You can now use the code further to make the program a little more advanced,\
    \ utilising the newly created module to its full. Include some user interaction.\
    \ Start by creating a basic menu the user can choose from:\n\n```\nprint(\"Select\
    \ operation.\\n\")\nprint(\"1.Times by two\")\nprint(\"2.Times by Three\")\nprint(\"\
    3.Square\")\nprint(\"4.Power of\")\n\nchoice = input(\"\\nEnter choice (1/2/3/4)\
    \ :\")\n```\n\nSTEP 8 Now we can add the user input to get the number the code\
    \ will work on:\n\n```\nnum1 = int(input(\"\\nEnter number: \"))\n```\n\nThis\
    \ will save the user-entered number as the variable num1.\n\nSTEP 9 Finally, you\
    \ can now create a range of if statements to determine what to do with the number\
    \ and utilise the newly created function definitions:\n\n```\nif choice == '1':\n\
    \    print(timestwo(num1))\n\nelif choice == '2':\n    print(timesthree(num1))\n\
    \nelif choice == '3':\n    print(square(num1))\n\nelif choice == '4':\n    num2\
    \ = int(input(\"Enter second number: \"))\n    print(power(num1, num2))\nelse:\n\
    \    print(\"Invalid input\")\n```\n\nSTEP 10 Note that for the last available\
    \ options, the Power of choice, we've added a second variable, num2. This passes\
    \ a second number through the function definition called power. Save and execute\
    \ the program to see it in action."
  mdcn: "## 基础动画\n\nPython 的模块使得创建图形、显示图形并相应地制作动画变得相对容易。然而，动画在代码中可能是一个棘手的元素。实现相同最终结果的方法有很多种，我们将在此向你展示其中一种示例。\n\
    \n## 灯光、摄像机、开拍\n\nTkinter 模块是学习 Python 动画的理想起点。当然，市面上有更好的自定义模块，但 Tkinter 足以胜任，让你掌握所需知识。\n\
    \n步骤 1 让我们制作一个弹跳球动画。首先，我们需要创建一个画布（窗口）和要制作动画的球：\n\n```\nfrom tkinter import *\n\
    import time\n\ngui = Tk()\ngui.geometry(\"800x600\")\ngui.title(\"Pi Animation\"\
    )\ncanvas = Canvas(gui,\nwidth=800,height=600,bg='white')\ncanvas.pack()\n\nball1\
    \ = canvas.create_oval(5,5,60,60, fill='red')\n\ngui.mainloop()\n```\n\n步骤 2 保存并运行代码。你将看到一个空白窗口出现，窗口左上角有一个红球。虽然这很棒，但动画效果不强。让我们添加以下代码：\n\
    \n```\na = 5\nb = 5\n\nfor x in range(0,100):\n    canvas.move(ball1,a,b)\n  \
    \  gui.update()\n    time.sleep(.01)\n```\n\n步骤 3 将新代码插入到 `ball1 = canvas.create_oval(5,5,60,60,\
    \ fill='red')` 行和 `gui.mainloop()` 行之间。保存并运行。现在你将看到球从动画窗口的左上角移动到右下角。你可以通过修改 `time.sleep(.01)`\
    \ 行来改变球穿越窗口的速度。试试 (.05)。\n\n步骤 4 `canvas.move(ball1,a,b)` 这行代码负责将球从一个角落移动到另一个角落；显然\
    \ a 和 b 都等于 5。我们已经可以稍微改变一些东西，比如球的大小和颜色，使用这行代码：`ball1 = canvas.create_oval(5,5,60,60,\
    \ fill='red')`，我们还可以将 a 和 b 的值改为其他值。\n\n```\nball1 = canvas.create_oval(7,7,60,60,\
    \ fill='red')\n\na = 8\nb = 3\n\nfor x in range(0,100):\n    canvas.move(ball1,a,b)\n\
    \    gui.update()\n    time.sleep(.05)\n```\n\n步骤 5 让我们看看是否能让球在窗口中弹跳，直到你关闭程序。\n\
    \n```\nxa = 5\nya = 10\n\nwhile True:\n    canvas.move(ball1,xa,ya)\n    pos=canvas.coords(ball1)\n\
    \    if pos[3] >=600 or pos[1] <=0:\n        ya = -ya\n    if pos[2] >=800 or\
    \ pos[0] <=0:\n        xa = -xa\n    gui.update()\n    time.sleep(.025)\n```\n\
    \n步骤 6 删除你在步骤 2 中输入的代码，并将步骤 5 的代码插入到其位置；同样，位于 `ball1 = canvas.create_oval(5,5,60,60,\
    \ fill='red')` 和 `gui.mainloop()` 行之间。保存代码并正常运行。如果你正确输入了代码，那么你将看到红球在窗口边缘弹跳，直到你关闭程序。\n\
    \n步骤 7 弹跳动画发生在 While True 循环中。首先，我们在循环前设置了 xa 和 ya 的值，分别为 5 和 10。`pos=canvas.coords(ball1)`\
    \ 这行代码获取球在窗口中的位置值。当它达到窗口的极限，即 800 或 600 时，它会使值变为负数；从而让球在屏幕上移动。\n\n步骤 8 然而，Pygame\
    \ 是一个更好的模块，用于制作更高级的动画。首先创建一个新文件并输入：\n\n```\nimport pygame\nfrom random import\
    \ randrange\n\nMAX_STARS = 250\nSTAR_SPEED = 2\n\ndef init_stars(screen):\n  \
    \  \"\"\" Create the starfield \"\"\"\n    global stars\n    stars = []\n    for\
    \ i in range(MAX_STARS):\n        # A star is represented as a list with this\n\
    format: [X,Y]\n        star = [randrange(0,screen.get_width() - 1),\n        \
    \        randrange(0,screen.get_height() - 1)]\n        stars.append(star)\n\n\
    def move_and_draw_stars(screen):\n    \"\"\" Move and draw the stars \"\"\"\n\
    \    global stars\n    for star in stars:\n        star[1] += STAR_SPEED\n   \
    \     if star[1] >= screen.get_height():\n            star[1] = 0\n          \
    \  star[0] = randrange(0,639)\n\n        screen.set_at(star, (255,255,255))\n\
    ```\n\n步骤 9 现在添加以下内容：\n\n```\ndef main():\n    pygame.init()\n    screen = pygame.display.set_mode((640,480))\n\
    \    pygame.display.set_caption(\"Starfield Simulation\")\n    clock = pygame.time.Clock()\n\
    \n    init_stars(screen)\n\n    while True:\n        # Lock the framerate at 50\
    \ FPS\n        clock.tick(50)\n\n        # Handle events\n        for event in\
    \ pygame.event.get():\n            if event.type == pygame.QUIT:\n           \
    \     return\n\n        screen.fill((0,0,0))\n        move_and_draw_stars(screen)\n\
    \        pygame.display.flip()\n\nif __name__ == \"__main__\":\n    main()\n```\n\
    \n步骤 10 保存并运行代码。你会同意模拟星空的代码看起来相当令人印象深刻。想象一下，这是某个游戏代码的开始，甚至是演示文稿的开头？结合使用 Pygame\
    \ 和 Tkinter，你的 Python 动画将会非常出色。\n\n## 创建你自己的模块\n\n如果将大型程序分解成更小的部分，并将需要的部分作为模块导入，那么管理起来会容易得多。学习构建自己的模块也有助于理解它们的工作原理。\n\
    \n## 构建模块\n\n模块是包含代码的 Python 文件，使用 .py 扩展名保存。然后使用我们熟悉的 import 命令将它们导入到 Python\
    \ 中。\n\n**步骤 1** 让我们从创建一组基本的数学函数开始。将一个数字乘以二、三，求平方或将数字提升到一个指数（幂）。在 IDLE 中创建一个新文件并输入：\n\
    \n```\ndef timestwo(x) :\n    return x * 2\n\ndef timesthree(x) :\n    return\
    \ x * 3\n\ndef square(x) :\n    return x * x\n\ndef power(x,y) :\n    return x\
    \ ** y\n```\n\n**步骤 2** 在上述代码下方，输入调用代码的函数：\n\n```\nprint (timestwo(2))\nprint\
    \ (timesthree(3))\nprint (square(4))\nprint (power(5,3))\n```\n\n将程序保存为 basic_math.py\
    \ 并执行以获取结果。\n\n**步骤 3** 现在你要将函数定义从程序中取出，放入一个单独的文件中。高亮显示函数定义并选择 Edit > Cut。选择 File\
    \ > New File 并在新窗口中使用 Edit > Paste。你现在有两个独立的文件，一个包含函数定义，另一个包含函数调用。\n\n**步骤 4**\
    \ 如果你现在尝试再次执行 basic_math.py 代码，将显示错误 **'NameError: name 'timestwo' is not defined'**。这是由于代码不再有权访问函数定义。\n\
    \n```\nTraceback (most recent call last):\n  File \"/home/pi/Documents/Python\
    \ Code/basic_math.py\", line 3, in <module>\n    print (timestwo(2))\nNameError:\
    \ name 'timestwo' is not defined\n>>> |\n```\n\n**步骤 5** 返回到包含函数定义的新创建窗口，然后单击\
    \ File > Save As。将其命名为 **minimath.py** 并将其保存在与原始 **basic_math.py** 程序相同的位置。现在关闭\
    \ minimath.py 窗口，以便 basic_math.py 窗口保持打开状态。\n\n步骤 6 返回到 basic_math.py 窗口：在代码顶部输入：\n\
    \n```\nfrom minimath import *\n```\n\n这将把函数定义作为模块导入。按 F5 保存并执行程序以查看其运行效果。\n\n\
    步骤 7 你现在可以进一步使用代码，使程序更高级一些，充分利用新创建的模块。包含一些用户交互。首先创建一个用户可以选择的基本菜单：\n\n```\nprint(\"\
    Select operation.\\n\")\nprint(\"1.Times by two\")\nprint(\"2.Times by Three\"\
    )\nprint(\"3.Square\")\nprint(\"4.Power of\")\n\nchoice = input(\"\\nEnter choice\
    \ (1/2/3/4) :\")\n```\n\n步骤 8 现在我们可以添加用户输入，以获取代码将要处理的数字：\n\n```\nnum1 = int(input(\"\
    \\nEnter number: \"))\n```\n\n这将把用户输入的数字保存为变量 num1。\n\n步骤 9 最后，你现在可以创建一系列 if 语句来确定如何处理该数字，并利用新创建的函数定义：\n\
    \n```\nif choice == '1':\n    print(timestwo(num1))\n\nelif choice == '2':\n \
    \   print(timesthree(num1))\n\nelif choice == '3':\n    print(square(num1))\n\n\
    elif choice == '4':\n    num2 = int(input(\"Enter second number: \"))\n    print(power(num1,\
    \ num2))\nelse:\n    print(\"Invalid input\")\n```\n\n步骤 10 请注意，对于最后一个可用选项，即 Power\
    \ of 选择，我们添加了第二个变量 num2。这将第二个数字传递给名为 power 的函数定义。保存并执行程序以查看其运行效果。"
