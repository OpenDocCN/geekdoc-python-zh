  md: "# Tick Tock\n\nThis is a piece of code we've used many times in the past to\
    \ keep track of time while working on multiple monitors and with just a quick\
    \ glance to where we've placed it on the screen.\n\nThe Tkinter box can be moved\
    \ around without affecting the time, maximised or closed by the user at will.\
    \ We haven't given the Tkinter clock window a title, so you can add to that easily\
    \ enough by snipping the code from other examples in this book.\n\nAnother area\
    \ of improvement is to include this code when Windows or Linux starts, so it automatically\
    \ pops up on the desktop. See also, if you're able to improve its functionality\
    \ by including different time zones: Rome, Paris, London, New York, Moscow and\
    \ so on.\n\n![](img/d3010096175d19bb2f1bb51316094dea_44_0.png)\n\nAnother example,\
    \ expanding on the original code, could be a digital stopwatch. For that you could\
    \ use the following:\n\n```\npython\nimport tkinter\nimport time\n\nclass StopWatch(tkinter.Frame):\n\
    \n    @classmethod\n    def main(cls):\n        tkinter.NoDefaultRoot()\n    \
    \    root = tkinter.Tk()\n        root.title('Stop Watch')\n        root.resizable(True,\
    \ False)\n        root.grid_columnconfigure(0, weight=1)\n        padding = dict(padx=5,\
    \ pady=5)\n        widget = StopWatch(root, **padding)\n        widget.grid(sticky=tkinter.NSEW,\
    \ **padding)\n        root.mainloop()\n\n    def __init__(self, master=None, cnf={},\
    \ **kw):\n        padding = dict(padx=kw.pop('padx', 5), pady=kw.pop('pady', 5))\n\
    \        super().__init__(master, cnf, **kw)\n        self.grid_columnconfigure(1,\
    \ weight=1)\n        self.grid_rowconfigure(1, weight=1)\n        self.__total\
    \ = 0\n        self.__label = tkinter.Label(self, text='Total Time:')\n      \
    \  self.__time = tkinter.StringVar(self, '0.000000')\n        self.__display =\
    \ tkinter.Label(self, textvariable=self.__time)\n        self.__button = tkinter.Button(self,\
    \ text='Start', command=self.__click)\n        self.__label.grid(row=0, column=0,\
    \ sticky=tkinter.E, **padding)\n        self.__display.grid(row=0, column=1, sticky=tkinter.EW,\
    \ **padding)\n        self.__button.grid(row=1, column=0, columnspan=2, sticky=tkinter.NSEW,\
    \ **padding)\n\n    def __click(self):\n        if self.__button['text'] == 'Start':\n\
    \            self.__button['text'] = 'Stop'\n            self.__start = time.clock()\n\
    \            self.__counter = self.after_idle(self.__update)\n        else:\n\
    \            self.__button['text'] = 'Start'\n            self.after_cancel(self.__counter)\n\
    \n    def __update(self):\n        now = time.clock()\n        diff = now - self.__start\n\
    \        self.__start = now\n        self.__total += diff\n        self.__time.set('{:.6f}'.format(self.__total))\n\
    \        self.__counter = self.after_idle(self.__update)\n\nif __name__ == '__main__':\n\
    \    StopWatch.main()\n```"
