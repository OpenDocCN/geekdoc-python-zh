  mdcn: "## 基础图形界面文件浏览器\n\n这里有一段实用且有趣的代码。它是一个极其基础的文件浏览器，使用 Tkinter 模块以图形用户界面呈现。你可以从这段代码中学到很多东西，并将其应用到自己的程序中。\n\
    \n## FILEBROWSER.PY\n\n这里主要使用的模块是 Tkinter，但我们也用到了 idlelib，因此如果执行代码时依赖项失败，你可能需要通过\
    \ pip 安装任何额外的包。\n\n```python\nfrom tkinter import Tk\nfrom idlelib.TreeWidget\
    \ import ScrolledCanvas, FileTreeItem, TreeNode\nimport os\n\nroot = Tk()\nroot.title(\"\
    File Browser\")\n\nsc = ScrolledCanvas(root, bg=\"white\",\n                 \
    \   highlightthickness=0, takefocus=1)\nsc.frame.pack(expand=1, fill=\"both\"\
