- md: "## Text Adventure Script\n\nText adventures are an excellent way to build your\
    \ Python coding skills and have some fun at the same time. This example that we\
    \ created will start you on the path to making a classic text adventure; where\
    \ it will end is up to you.\n\n## ADVENTURE.PY\n\nThe Adventure game uses just\
    \ the Time module to begin with, creating pauses between print functions. There's\
    \ a help system in place to expand upon, as well as the story itself.\n\n```python\n\
    import time\n\nprint(\"\\n\" * 200)\nprint(\">>>>>>>>>Awesome Adventure<<<<<<<<<<\"\
    )\nprint(\"\\n\" * 3)\ntime.sleep(3)\nprint(\"\\nA long time ago, a warrior strode\
    \ forth from the frozen north.\")\ntime.sleep(1)\nprint(\"Does this warrior have\
    \ a name?\")\nname=input(\"> \")\nprint(name, \"the barbarian, sword in hand and\
    \ looking for adventure!\")\ntime.sleep(1)\nprint(\"However, evil is lurking nearby....\"\
    )\ntime.sleep(1)\nprint(\"A pair of bulbous eyes regards the hero...\")\ntime.sleep(1)\n\
    print(\"Will\", name, \"prevail, and win great fortune...\")\ntime.sleep(1)\n\
    print(\"Or die by the hands of great evil...?\")\ntime.sleep(1)\nprint(\"\\n\"\
    \ *3)\nprint(\"Only time will tell....\")\ntime.sleep(1)\nprint('...')\ntime.sleep(1)\n\
    print('...')\ntime.sleep(1)\nprint('...')\ntime.sleep(1)\nprint('...')\ntime.sleep(5)\n\
    print(\"\\n\" *200)\n\nprint('''      You find yourself at a small inn. There's\
    \ little gold in your purse but your sword is sharp, and you're ready for adventure.\n\
    \      With you are three other customers.\n      A ragged looking man, and a\
    \ pair of dangerous looking guards.''')\n\ndef start():\n    print(\"\\n -----------\"\
    )\n    print(\"Do you approach the...\")\n    print(\"\\n\")\n    print(\"1. Ragged\
    \ looking man\")\n    print(\"2. Dangerous looking guards\")\n\n    cmdlist=[\"\
    1\", \"2\"]\n    cmd=getcmd(cmdlist)\n```\n\n```python\nif cmd == \"1\":\n   \
    \ ragged()\nelif cmd == \"2\":\n    guards()\n\ndef ragged():\n    print(\"\\\
    n\" * 200)\n    print('''You walk up to the ragged looking man and greet him.\n\
    \        He smiles a toothless grin and, with a strange accent, says,\n      \
    \  \"Buy me a cup of wine, and I'll tell you of great treasure...''')\n    time.sleep(2)\n\
    \ndef guards():\n    print(\"\\n\" *200)\n    print('''You walk up to the dangerous\
    \ looking guards and greet them.\n        The guards look up from their drinks\
    \ and snarl at you.\n        \"What do you want, barbarian?\" One guard reaches\
    \ for the hilt of his sword...''')\n    time.sleep(2)\n```\n\n```python\ndef getcmd(cmdlist):\n\
    \    cmd = input(name+\">\")\n    if cmd in cmdlist:\n        return cmd\n   \
    \ elif cmd == \"help\":\n        print(\"\\nEnter your choices as detailed in\
    \ the game.\")\n        print(\"or enter 'quit' to leave the game\")\n       \
    \ return getcmd(cmdlist)\n    elif cmd == \"quit\":\n        print(\"\\n----------------\"\
    )\n        time.sleep(1)\n        print(\"Sadly you return to your homeland without\
    \ fame or fortune...\")\n        time.sleep(5)\n        exit()\n\nif __name__==\"\
    __main__\":\n    start()\n```\n\n## Adventure Time\n\nThis, as you can see, is\
    \ just the beginning of the adventure and takes up a fair few lines of code. When\
    \ you expand it, and weave the story along, you'll find that you can repeat certain\
    \ instances such as a chance meeting with an enemy or the like.\n\nWe've created\
    \ each of the two encounters as a defined set of functions, along with a list\
    \ of possible choices under the cmdlist list, and cmd variable, of which is also\
    \ a defined function. Expanding on this is quite easy, just map out each encounter\
    \ and choice and create a defined function around it. Providing the user doesn't\
    \ enter quit into the adventure, they can keep playing.\n\nThere's also room in\
    \ the adventure for a set of variables designed for combat, luck, health, endurance\
    \ and even an inventory or amount of gold earned. Each successful combat situation\
    \ can reduce the main character's health but increase their combat skills or endurance.\
    \ Plus, they could loot the body and gain gold, or earn gold through quests.\n\
    \nFinally, how about introducing the Random module. This will enable you to include\
    \ an element of chance in the game. For example, in combat, when you strike an\
    \ enemy you will do a random amount of damage as will they. You could even work\
    \ out the maths behind improving the chance of a better hit based on your or your\
    \ opponent's combat skills, current health, strength and endurance. You could\
    \ create a game of dice in the inn, to see if you win or lose gold (again, improve\
    \ the chances of winning by working out your luck factor into the equation).\n\
    \nNeedless to say, your text adventure can grow exponentially and prove to be\
    \ a work of wonder. Good luck, and have fun with your adventure.\n\n## Python\
    \ Scrolling Ticker Script\n\nYou may be surprised to hear that one of the snippets\
    \ of code we're often asked for is some form of scrolling ticker. Whilst we've\
    \ covered various forms of scrolling text previously, the ticker is something\
    \ that seems to keep cropping up. So, here it is.\n\n## Ticker Time\n\nThe obvious\
    \ improvements to the Ticker code lie in the speed of the text and what the text\
    \ will display. Otherwise you can change the background colour of the ticker window,\
    \ the font and the font colour, along with the geometry of the Tkinter window\
    \ if you want to.\n\nYet another interesting element that could be introduced\
    \ is one of the many text to Speech modules available for Python 3. You could\
    \ pip install one, import it, then as the ticker displays the text, the text to\
    \ speech function will read out the variable at the same time, since the entire\
    \ text is stored in the variable labelled 's'.\n\nThe ticker example can be used\
    \ for system warnings, perhaps something that will display across your work or\
    \ home network detailing the shutting down of a server over the weekend for maintenance;\
    \ or even just to inform everyone as to what's happening. We're sure you will\
    \ come up with some good uses for it.\n\n## TICKER.PY\n\nWe're using Tkinter here\
    \ along with the Time module to determine the speed the text is displayed across\
    \ the window.\n\n```python\nimport time\nimport tkinter as tk\n\nroot = tk.Tk()\n\
    canvas = tk.Canvas(root, root.title(\"Ticker Code\"),\n    height=80, width=600,\
    \ bg=\"yellow\")\ncanvas.pack()\nfont = ('courier', 48, 'bold')\ntext_width =\
    \ 15\n\n#Text blocks insert here....\n\ns1 = \"This is a scrolling ticker example.\
    \ As you\n    can see, it's quite long but can be a lot longer if\n    necessary...\
    \ \"\ns2 = \"We can even extend the length of the ticker\n    message by including\
    \ more variables... \"\ns3 = \"The variables are within the s-values in\n    the\
    \ code. \"\ns4 = \"Don't forget to concatenate them all before the\n    For loop,\
    \ and rename the 'spacer' s-variable too.\"\n\n# pad front and end of text with\
    \ spaces\ns5 = ' ' * text_width\n# concatenate it all\ns = s5 + s1 + s2 + s3 +\
    \ s4 + s5\nx = 1\ny = 2\ntext = canvas.create_text(x, y, anchor='nw', text=s,\n\
    \    font=font)\ndx = 1\ndy = 0  # use horizontal movement only\n\n# the pixel\
    \ value depends on dx, font and length of text\npixels = 9000\n\nfor p in range(pixels):\n\
    \    # move text object by increments dx, dy\n    # -dx --> right to left\n  \
    \  canvas.move(text, -dx, dy)\n    canvas.update()\n    # shorter delay --> faster\
    \ movement\n    time.sleep(0.005)\n    #print(k)  # test, helps with pixel value\n\
    \nroot.mainloop()\n```\n\n## Simple Python Calculator\n\nSometimes the simplest\
    \ code can be the most effective. Take for example, this Simple Python Calculator\
    \ script. It's based on the Create Your Own Modules section seen earlier but doesn't\
    \ utilise any external modules.\n\n## CALCULATOR.PY\n\nWe created some function\
    \ definitions to begin with, then lead on to the user menu and inputs. It's an\
    \ easy piece of code to follow and as such can also be expanded well too.\n\n\
    ```python\nprint(\"-----------Simple Python Calculator-----------\\n\")\n\ndef\
