  md: '# Copying, Moving and Renaming Files


    Taking command of the Terminal is essential when learning how your Raspberry Pi’s
    operating system works. The copying, moving and renaming of files is equally important,
    as you’ll be doing a lot of this throughout your Pi projects.


    # USING THE MOVE COMMAND


    In Linux, renaming a file is simply moving it from one name to another and copying
    a file is moving it without deleting the original. Don’t panic, it’s quite easy
    to master.


    **STEP 1** Before we can move anything around, we need to have a few test items
    in our home directory. Enter: `touch testfile` and `mkdir testdir` to create a
    test file and test directory in your home directory. Enter: `ls` to check that
    they are both present.


    **STEP 3** Enter: `mv testfile testdir` and press return to move the testfile
    document into the testdir directory. Enter: `ls` to see that it’s no longer in
    the home directory, and `ls testdir` to see the testfile now sitting in the testdir
    directory. Now enter: `mkdir newparent` to create a new directory.


    ```

    pi@raspberrypi ~ $ touch testfile

    pi@raspberrypi ~ $ mkdir testdir

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scr

    pi@raspberrypi ~ $

    ```


    ```

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scr

    pi@raspberrypi ~ $ mv testfile testdir

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scr

    pi@raspberrypi ~ $ ls testdir

    testfile

    pi@raspberrypi ~ $

    ```


    **STEP 2** Files and directories are moved using the `mv` command. This is different
    to the commands we’ve looked at so far because it has two arguments (remember
    Linux command line is command, option, argument). The first argument is the source
    (the file or directory to be moved) and the second is the destination.


    **STEP 4** Directories with files are moved in the same way. Enter: `mv testdir
    newparent` to move the testdir directory inside the newparent directory. Let’s
    move into the directory to find the file. Enter: `cd /newparent/testdir` and enter:
    `ls` to view the testfile sitting inside the directory.


    ```

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scr

    pi@raspberrypi ~ $ mv testfile testdir

    ```


    ```

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scr

    pi@raspberrypi ~ $ mkdir newparent

    pi@raspberrypi ~ $ mv testdir newparent

    pi@raspberrypi ~ $ cd newparent/testdir

    pi@raspberrypi ~/newparent/testdir $ ls

    testfile

    pi@raspberrypi ~/newparent/testdir $

    ```'
