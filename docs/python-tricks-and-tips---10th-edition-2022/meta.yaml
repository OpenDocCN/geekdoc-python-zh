    into your code in a different manner. What we mean by this is, the code can be
    used to retrieve a random number between a range, which in turn can give you the
    start of a character creation defined function within an adventure game.


    Imagine the start of a text adventure written in Python, where the player names
    their character. The next step is to roll the virtual random dice to decide what
    that character''s combat rating, strength, endurance and luck values are. These
    can then be carried forward into the game under a set of variables that can be
    reduced or increased depending on the circumstances the player''s character ends
    up in.


