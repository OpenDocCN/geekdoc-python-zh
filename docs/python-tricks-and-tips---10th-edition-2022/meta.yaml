    \ display all the days, weeks and months within a given year:\n\n```\nimport calendar\n\
    year=int(input(\"Enter the year to display: \"))\nprint(calendar.prcal(year))\n\
    ```\n\nWe're sure you'll agree that's quite a handy bit of code to have to hand.\n\
    \n![](img/d3010096175d19bb2f1bb51316094dea_8_0.png)\n\nSTEP 8 You're also able\
    \ to print the individual months, or days, of the week:\n\n```\nimport calendar\n\
    for name in calendar.month_name:\n    print(name)\n\nimport calendar\nfor name\
    \ in calendar.day_name:\n    print(name)\n```\n\n![](img/d3010096175d19bb2f1bb51316094dea_8_1.png)\n\
    \nSTEP 6 Interestingly we can also list the number of days in a month by using\
    \ a simple: for loop:\n\n```\nimport calendar\ncal=calendar.TextCalendar(calendar.SUNDAY)\n\
    for i in cal.itermonthdays(2019, 6):\n    print(i)\n```\n\n![](img/d3010096175d19bb2f1bb51316094dea_8_2.png)\n\
    \nSTEP 9 The Calendar module also allows us to write the functions in HTML, so\
    \ that you can display it on a website. Let's start by creating a new file:\n\n\
    ```\nimport calendar\ncal=open(\"/home/pi/Documents/cal.html\", \"w\")\nc=calendar.HTMLCalendar(calendar.SUNDAY)\n\
    cal.write(c.formatmonth(2019, 1))\ncal.close()\n```\n\nThis code will create an\
    \ HTML file called cal, open it with a browser and it displays the calendar for\
    \ January 2019.\n\n![](img/d3010096175d19bb2f1bb51316094dea_8_3.png)\n\nSTEP 7\
    \ You can see that, at the outset, the code produced some zeros. This is due to\
