    # Using the Man Pages


    Linux comes with man (manual) pages that explain each command and show you all
    the options you can use. Once you get the hang of reading the man pages, you’ll
    be able to find and do just about anything in Linux.


    # HEY, MAN!


    The man pages are one of the best features of Linux, and as a built-in tool it’s
    invaluable for both beginner and senior level Linux administrators. Let’s see
    how it works.


    **STEP 1** Linux has a built-in manual, known as man for short. Using the man
    command you can obtain information on all the Linux commands we’ve talked about.
    Simply enter: `man` and the name of the command you want to learn more about.
    Start by entering: `man ls` in the command line.


    **STEP 3** Most commands are pretty easy to figure out how to use, so what you
    spend most of the time in the man pages is looking under the Description. Here
    you will see all the options and the letters used to activate them. Most man pages
    are longer than a single page, so press any key, such as the space bar, to move
    to the next page of content.


    ```

    pi@raspberrypi ~ $ man ls

    ```


    ![](img/d3010096175d19bb2f1bb51316094dea_69_0.png)


    **STEP 2** The man pages are a bit more detailed than you might be used to. First
    you have a name, which tells you what the command is called; in this case "list
    directory contents" and then the synopsis shows you how it works. In this case:
    "ls [OPTION]... [FILE]...". So you enter: `ls` followed by options (such as `-la`)
    and the file or directory to list.


    ![](img/d3010096175d19bb2f1bb51316094dea_69_1.png)


    **STEP 4** Press the H key while looking at a man page to view the commands you
    can use to control the view. This is called the Summary of Less Commands (the
    less command is something we’ll come to when we look at editing text). For now
    realise that you can move back and forward with Z and W. Press Q to quit this
    help screen and return to the man page.


    ![](img/d3010096175d19bb2f1bb51316094dea_69_2.png)'
  - '[PAGE 70]


    # Using the Man Pages


    STEP 5 Scroll to the bottom of the man page to discover more information. Typically
    you will find the author''s name and information on reporting bugs, including
    web links that can be useful for more information. Press Q to exit the man page
    and return to the command line.


    STEP 6 The man command can be used for just about every command you use in Linux.
    You can even enter: man man to get information on using the man tool. From now
    on, whenever you come across a new command in this book, such as "nano" or "chmod",
    take time to enter: man nano or man chmod and read the instructions.


