  md: '# Editing Text Files


    A text file in Linux can be anything from a simple set of instructions on how
    to use an app, to some complex Python, C++ or other programming language code.
    Text files can be used for scripting, automated executable files, as well as configuration
    files too.


    # THE JOY OF TEXT


    To be able to edit or create a text file, you need a good text editor. Linux has
    many but here are some in action on the Raspberry Pi.


    **STEP 1** The first text editor for the Raspberry Pi is the default desktop environment
    app: Leafpad. To use, you can either double-click an existing text file or click
    the Raspberry Pi menu icon (in the top left of the desktop) and from the Accessories
    menu, choose Text Editor.


    **STEP 3** Vi is the original Unix command but in this case it launches VIM, the
    new Linux version of Vi. Although simple looking, Vi is considered, even by today''s
    standards, to be one of the most widely used text editors, There''s a lot you
    can do with it, so check out the man pages for more Vi information.


    ![](img/d3010096175d19bb2f1bb51316094dea_71_0.png)


    ![](img/d3010096175d19bb2f1bb51316094dea_71_1.png)


    **STEP 2** From the Terminal there are even more options, although using the correct
    command, you can launch any of the desktop apps via the Terminal. One of the simplest,
    and a classic text editor that''s carried over from the Unix days, is vi. In the
    Terminal, enter: `vi`.


    **STEP 4** Nano is another favourite, and simple, text editor available for Linux.
    Enter: `nano` into the Terminal to launch it. You can use Nano for editing code,
    creating scripts or writing your own help files. To exit Nano, press Ctrl + X,
    followed by Y to save the file or N to exit without saving.


    ![](img/d3010096175d19bb2f1bb51316094dea_71_2.png)


    ![](img/d3010096175d19bb2f1bb51316094dea_71_3.png)'
  merge: -1
  pgno: 71
- img_proc: true
  md: '# Editing Text Files


    STEP 5 Emacs, or GNU Emacs, is an extensible and customisable, self-documenting,
    real-time display editor. It’s a fantastic text editor and one that’s worth getting
    used to as soon as you can. Sadly, it’s not installed on the Pi by default, so
    you’ll need to install it. In the Terminal, enter: `sudo apt-get install emacs`


    STEP 8 Emacs can offer an uncomplicated view of your text file or one with a plethora
    of information regarding the structure of the file in question; it’s up to you
    to work out your own preference. There’s also a hidden text adventure in Emacs,
    which we cover later in this book, why not see if you can find it without our
    help.


    ![](img/d3010096175d19bb2f1bb51316094dea_72_0.png)


    ![](img/d3010096175d19bb2f1bb51316094dea_72_1.png)


    STEP 6 The previous command contacts the Debian (Raspbian is based on a Debian
    Linux distribution) repositories and pulls down the information needed to install
    Emacs. When the Pi asks to continue with the installation, press Y. This installs
    the latest version and when it’s done, you’ll be back to the command prompt.


    STEP 9 Gedit is another excellent text editor for Linux. Again, it’s not installed
    by default on the Raspberry Pi; however, by entering: `sudo apt-get install gedit`
    and accepting the installation, the program can be on the Pi in a matter of seconds.
    Once it’s installed, use `gedit` in the Terminal to launch it. Gedit is a great
    text editor for coding.


    ![](img/d3010096175d19bb2f1bb51316094dea_72_2.png)


    ![](img/d3010096175d19bb2f1bb51316094dea_72_3.png)


    STEP 7 Once the installation is complete, enter: `emacs` into the Terminal. The
    Emacs splash screen opens in a new window, offering a tutorial (which we recommend
    you run through) and a guided tour amongst other information.


    STEP 10 Finally, Jed is an Emacs-like, cross-platform text editor that’s lightweight
    and comes with a wealth of features. To install it, enter: `sudo apt-get install
    jed`. Accept the installation and when it’s complete, use: `jed` to launch.


    ![](img/d3010096175d19bb2f1bb51316094dea_72_4.png)


    ![](img/d3010096175d19bb2f1bb51316094dea_72_5.png)'
