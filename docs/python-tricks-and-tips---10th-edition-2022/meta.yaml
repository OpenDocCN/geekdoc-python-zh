  md: '# Text to Binary Convertor


    While it may not seem too exciting, this text to binary convertor is actually
    quite good fun. It also only uses two lines of code, so it''s extremely easy to
    insert into your own script.


    # TXT2BIN.PY


    Naturally we''re using the format function to convert the user''s entered text
    string into its binary equivalent. If you want to check its accuracy, you can
    plug the binary into an online convertor.


    ```

    text=input("Enter text to convert to Binary: ")

    print('' ''.join(format(ord(x), ''b'') for x in text))

