    \n## Python 闹钟\n\n有没有在电脑前短暂休息一下，然后突然意识到已经过了好几分钟，而你一直在刷 Facebook？介绍 Python 闹钟代码，你可以进入命令提示符，告诉代码多少分钟后闹钟响起。\n\
