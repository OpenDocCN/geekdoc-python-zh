    nChoose the option number: \\n')\n    dec=int(input('''1.Read a file\n2.Write\
    \ to a file\n3.Append text to a file\n4.Delete a file\n5.List files in a directory\n\
    6.Check file existence\n7.Move a file\n8.Copy a file\n9.Create a directory\n10.Delete\
