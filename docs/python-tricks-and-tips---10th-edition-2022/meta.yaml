  md: '# Create and Remove Directories


    STEP 5 To create a directory path you need to pass in the "p" option to mkdir
    (which stands for "parents"). Options, if you remember, come after the command
    and start with a ''-''. So enter: `mkdir -p articles/reports`. Enter: `ls` to
    view the articles directory, or "ls articles" to view the reports directory sitting
    inside.


    STEP 6 Now you''re starting to get a bit more advanced, we''re going to just reiterate
    something. In Linux the command structure is always: command, option and argument,
    in that order. The command is the function, next are the options (typically single
    letters starting with "-") and finally the argument (often a file, or directory
    structure). It''s always command, option then argument.


    ```

    pi@raspberrypi ~ $ mkdir -p articles/reports

    ```


    ```

    pi@raspberrypi ~ $ ls -l articles

    total 4

    drwxr-xr-x 2 pi pi 4096 May 13 12:36 reports

    pi@raspberrypi ~ $ _

    ```


    # GETTING RID OF DIRECTORIES


    Deleting directories is pretty easy in Linux, along with files, and this can be
    a problem. It''s too easy to delete entire directories containing files and these
    are instantly removed, not sent to a trash directory. Tread carefully.


    STEP 1 We''re going to remove one of the directories we created earlier using
    the "rmdir" command. Enter: `ls` to view the files and directories in the current
    directory. We''ll start by getting rid of one of the test directories. Enter:
    `rmdir testdir3` and `ls` again to confirm the directory has been removed.


    STEP 3 To delete a directory containing files or other directories, you return
    to the "rm" command used to remove files, only now we need to use the "-R" option
    (which stands for "recursive"). Using "rm -R" removes all the files and directories
    to whatever you point it at. Enter: `rm -R articles` to remove the articles directory.


    ```

    pi@raspberrypi ~ $ ls

    articles Desktop Documents Downloads indiecity python_g

    pi@raspberrypi ~ $ rmdir testdir3_

    ```


    ```

    pi@raspberrypi ~ $ ls

    articles Desktop Documents Downloads indiecity python_ga

    pi@raspberrypi ~ $ rm -R articles

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads indiecity python_games Scrat

    pi@raspberrypi ~ $

    ```


    STEP 2 Now we''ll try to get rid of the articles directory (containing the reports
    directory). Enter: `rmdir articles` and press return. You''ll get an error saying
    "rmdir: failed to remove ''articles'': Directory not empty". This is a puzzler;
    the rmdir command only removes directories that having nothing in them (no files
    or other directories).


    STEP 4 As with multiple files, you can delete multiple directories inside the
    same directory using the "rm" command with the wildcard character (*). This should
    be done with care though so use the `-i` option (which stands for "interactive").
    This will prompt you before each deletion. Enter: `rm -Ri test*` and press `y`
    and `return` to each prompt. It''s a good idea to use the `-i` option whenever
    using the rm command.


    ```

    pi@raspberrypi ~ $ rmdir articles

    rmdir: failed to remove ''articles'': Directory not empty

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ rm -Ri test*

    rm: remove directory ''testdir''? y

    rm: remove directory ''testdir2''? y

    rm: remove directory ''testdir3''? y_

    ```'
