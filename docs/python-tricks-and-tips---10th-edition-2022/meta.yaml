    # Creating and Deleting Files


    Being able to create and delete a file is an everyday computing skill. However,
    when using the Linux Terminal, there’s an element of care required, chiefly because
    any deleted files aren’t placed in the system recycle bin.


    # CREATING FILES


    Once you learn to recognise the files and directories that make up Raspbian OS,
    it’s time to discover how to make your own. Knowing how to make, edit and delete
    files and directories is essential if you want to make your own projects.


    **STEP 1** We’re going to create a file using a command called Touch. Touch is
    an interesting command that reaches out to a file, or directory, and updates it
    (this changes the system time as if you’d just opened the file). You can see Touch
    in access using “ls -l” and checking the time next to a directory (such as Scratch).


    **STEP 3** If you try to touch a file that doesn’t exist, you create a blank file
    with that name. Try it now. Type `touch testfile` and `ls -l` to view the files.
    You’ll now have a new file in your home directory called “testfile”. Notice that
    the size of the file is 0, because it has nothing in it.


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiocity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Apr 17 12:53 Scratch

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ touch testfile

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiocity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi     0 May 13 11:10 testfile

    pi@raspberrypi ~ $ _

    ```


    **STEP 2** Now enter: `touch Scratch` and `ls -l` again and notice that the time
    has changed. It now matches the current time. You might be wondering what this
    has to do with creating files or directories. Touch has a second, more popular,
    use, which is to create files.


    **STEP 4** A quick word about file names: remember that Linux is case sensitive,
    so if you now enter: `touch Testfile` (with a capital T), it doesn’t update ‘testfile’;
    instead, it creates a second file called ‘Testfile’. Enter: `ls -l` to see both
    files. This is confusing, so most people stick with using lowercase letters at
    all times.


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiocity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Apr 17 12:53 Scratch

    pi@raspberrypi ~ $ touch Scratch

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiocity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ touch testfile

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiocity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi     0 May 13 11:10 testfile

    pi@raspberrypi ~ $ touch Testfile

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiocity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi     0 May 13 11:08 Testfile

    -rw-r--r-- 1 pi pi     0 May 13 11:10 testfile

    pi@raspberrypi ~ $ _

    ```'
  - '[PAGE 62]


    # Creating and Deleting Files


    STEP 5 Another important thing to know is never to use a space in your file names.
    If you try to enter: `touch test file`, you create a document called "test" and
    another called "file". Technically there are ways to create files containing a
    space but you should always use an underscore character ("_") instead of a space,
    such as "touch test_file".


    STEP 6 Here are some other files names to avoid: `#%&\|<>*?/$!":@''+|=.` The full
    stop (.) is used to create an extension to a file; usually used to indicate a
    file type, such as textfile.txt or compressedfile.zip, and starting a file with
    a full stop makes it invisible. Don''t use full stop in place of a space though;
    stick to underscores.


    ```

    pi@raspberrypi ~ $ touch test file

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    -rw-r--r-- 1 pi pi    0 May 13 11:01 file

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiocity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi    0 May 13 11:15 test

    -rw-r--r-- 1 pi pi    0 May 13 11:10 testfile

    -rw-r--r-- 1 pi pi    0 May 13 11:12 Testfile

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ touch don''t.use(oddsymbols&in<filenames>or-you''ll"confu

    ```


    # REMOVING FILES


    We''ve created some files that we don''t want, so how do we go about removing
    them? It turns out that deleting files in your Raspberry Pi is really easy, which
    may be a problem, so be careful.


    STEP 1 Enter `ls -l` to view the files in your home directory. If you''ve followed
    the steps before then you should have three files: "test", "testfile", and "Testfile".
    We''re going to get rid of these items because they were created as an example.


    STEP 3 We''re going to use a wildcard (*) to delete our next two files, but again
    this is something you really need to do with care. First use "ls" to list the
    files and make sure it''s the one you want to delete. Enter `ls test*` to view
    files that match the word "test" and any other characters. The "*" character is
    called a "wildcard" and it means any characters here.


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    -rw-r--r-- 1 pi pi    0 May 13 11:01 file

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiocity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi    0 May 13 11:15 test

    -rw-r--r-- 1 pi pi    0 May 13 11:10 testfile

    -rw-r--r-- 1 pi pi    0 May 13 11:46 Testfile

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Desktop

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Documents

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Downloads

    -rw-r--r-- 1 pi pi    0 Jul  9 08:37 file

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 indiocity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Scratch

    -rw-r--r-- 1 pi pi    0 Jul  9 08:37 test

    -rw-r--r-- 1 pi pi    0 Jul  9 08:37 testfile

    pi@raspberrypi ~ $ ls test*

    test  testfile

    pi@raspberrypi ~ $ _

    ```


    STEP 2 To get rid of files you use the "rm" command. Enter `rm Testfile` to delete
    the file called "Testfile" (with the uppercase "t"). Enter: `ls -l` and you''ll
    find it''s gone. Where is it? It''s not in the Trash or Recycle Bin, like on a
    Mac or Windows PC. It''s deleted completely and cannot be recovered. Bear this
    in mind and always think before deleting files.


    STEP 4 We see that "ls test*" matches two files: "test" and "testfile", but not
    the file called "file". That''s because it didn''t match the "test" part of "test*".
    Check carefully over groups of files you want to remove (remember you can''t recover
    them) and replace the "ls" with "rm". Enter `rm test*` to remove both files. Finally
    enter `rm file` to get rid of the confusing file.


    ```

    pi@raspberrypi ~ $ rm Testfile

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 May 13 10:57 Documents

    drwx------ 2 pi pi 4096 May 13 11:01 Downloads

    -rw-r--r-- 1 pi pi    0 May 13 11:01 file

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 indiocity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 May 13 11:05 Scratch

    -rw-r--r-- 1 pi pi    0 May 13 11:15 test

    -rw-r--r-- 1 pi pi    0 May 13 11:10 testfile

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ rm test*

    pi@raspberrypi ~ $ ls -l

    total 24

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Desktop

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Documents

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Downloads

    -rw-r--r-- 1 pi pi    0 Jul  9 08:37 file

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 indiocity

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Jul  9 08:36 Scratch

    pi@raspberrypi ~ $ rm file

    pi@raspberrypi ~ $ _

    ```'
- md: '## Create and Remove Directories


    Creating, moving and deleting directories aren’t as easy in the Terminal as they
    are within a desktop interface. You need to tell Linux to move the directories
    inside other directories, a process known as recursion. Sounds complex but you
    should quickly get the hang of it.


    ## MANAGING FILES AND DIRECTORIES


    Now that you know how to create files, you’ll want to learn how to make directories,
    which are the same thing as folders, as well as move items around. If you are
    more used to working with a desktop interface, this can take a bit of getting
    used to.


    **STEP 1** Enter: `ls` to quickly view all the directories currently in the home
    location. Directories are created using the “mkdir” command (make directory).
    Enter: `mkdir testdir` to create a new directory in your home directory. Enter:
    `ls` again to see it.


    **STEP 2** The “mkdir” command is different to touch, in that it doesn’t update
    the timestamp if you use it with a directory that already exists. Enter: `mkdir
    testdir` again and you’ll get the error “mkdir: cannot create directory ‘testdir’:
    File exists”.


    **STEP 3** Like touch, you can create multiple directories at once with the mkdir
    command. Enter: `mkdir testdir2 testdir3` and enter: `ls`. You’ll now find several
    directories called testdir. Also, like files, you should know this means you can’t
    (and really shouldn’t) create directories with spaces. As with files, use an underscore
    ("_") character instead of a space.


    ```

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads indicity python_games Scr

    pi@raspberrypi ~ $ mkdir testdir

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads indicity python_games Scr

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ mkdir testdir2 testdir3

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads indicity python_games Scr

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ mkdir testdir

    mkdir: cannot create directory ‘testdir’: File exists

    pi@raspberrypi ~ $ _

    ```


    **STEP 4** You can create directories inside of each other using the directory
    path. Enter: `mkdir Documents/photos` to create a new directory called “photos”
    inside your documents directory. The directory has to already exist, though, try
    to enter: `mkdir articles/reports` and you’ll get an error because there is no
    articles directory.


    ```

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads indicity python_games Scr

    pi@raspberrypi ~ $ mkdir Documents/photos

    pi@raspberrypi ~ $ mkdir articles/reports

    mkdir: cannot create directory ‘articles/reports’: No such file or directory

    pi@raspberrypi ~ $

    ```


    **STEP 5** To create a directory path you need to pass in the "p" option to mkdir
    (which stands for "parents"). Options, if you remember, come after the command
    and start with a ''-''. So enter: `mkdir -p articles/reports`. Enter: `ls` to
    view the articles directory, or "ls articles" to view the reports directory sitting
    inside.


    ```

    pi@raspberrypi ~ $ mkdir -p articles/reports

    ```


    ```

    pi@raspberrypi ~ $ ls -l articles

    total 4

    drwxr-xr-x 2 pi pi 4096 May 13 12:36 reports

    pi@raspberrypi ~ $ _

    ```


    **STEP 6** Now you''re starting to get a bit more advanced, we''re going to just
    reiterate something. In Linux the command structure is always: command, option
    and argument, in that order. The command is the function, next are the options
    (typically single letters starting with "-") and finally the argument (often a
    file, or directory structure). It''s always command, option then argument.


    ## GETTING RID OF DIRECTORIES


    Deleting directories is pretty easy in Linux, along with files, and this can be
    a problem. It''s too easy to delete entire directories containing files and these
    are instantly removed, not sent to a trash directory. Tread carefully.


    **STEP 1** We''re going to remove one of the directories we created earlier using
    the "rmdir" command. Enter: `ls` to view the files and directories in the current
    directory. We''ll start by getting rid of one of the test directories. Enter:
    `rmdir testdir3` and `ls` again to confirm the directory has been removed.


    ```

    pi@raspberrypi ~ $ ls

    articles Desktop Downloads indiecity python_games Scr

    pi@raspberrypi ~ $ rmdir testdir3

    ```


    **STEP 2** Now we''ll try to get rid of the articles directory (containing the
    reports directory). Enter: `rmdir articles` and press return. You''ll get an error
    saying "rmdir: failed to remove ''articles'': Directory not empty". This is a
    puzzler; the rmdir command only removes directories that have nothing in them
    (no files or other directories).


    ```

    pi@raspberrypi ~ $ ls

    articles Desktop Downloads indiecity python_games Scr

    pi@raspberrypi ~ $ rmdir articles

    rmdir: failed to remove ''articles'': Directory not empty

    pi@raspberrypi ~ $ _

    ```


    **STEP 3** To delete a directory containing files or other directories, you return
    to the "rm" command used to remove files, only now we need to use the "-R" option
    (which stands for "recursive"). Using "rm -R" removes all the files and directories
    to whatever you point it at. Enter: `rm -R articles` to remove the articles directory.


    ```

    pi@raspberrypi ~ $ rm -R articles

    pi@raspberrypi ~ $ ls

    Desktop Downloads indiecity python_games Scr

    pi@raspberrypi ~ $

    ```


    **STEP 4** As with multiple files, you can delete multiple directories inside
    the same directory using the "rm" command with the wildcard character (*). This
    should be done with care though so use the `-i` option (which stands for "interactive").
    This will prompt you before each deletion. Enter: `rm -Ri test*` and press `y`
    and `return` to each prompt. It''s a good idea to use the `-i` option whenever
    using the rm command.


    ```

    pi@raspberrypi ~ $ rm -Ri test*

    rm: remove directory ''testdir''? y

    rm: remove directory ''testdir2''? y

    rm: remove directory ''testdir3''? y

    ```


    ## Copying, Moving and Renaming Files


    Taking command of the Terminal is essential when learning how your Raspberry Pi’s
    operating system works. The copying, moving and renaming of files is equally important,
    as you’ll be doing a lot of this throughout your Pi projects.


    ## USING THE MOVE COMMAND


    In Linux, renaming a file is simply moving it from one name to another and copying
    a file is moving it without deleting the original. Don’t panic, it’s quite easy
    to master.


    **STEP 1** Before we can move anything around, we need to have a few test items
    in our home directory. Enter: `touch testfile` and `mkdir testdir` to create a
    test file and test directory in your home directory. Enter: `ls` to check that
    they are both present.


    ```

    pi@raspberrypi ~ $ touch testfile

    pi@raspberrypi ~ $ mkdir testdir

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scr

    pi@raspberrypi ~ $

    ```


    **STEP 2** Files and directories are moved using the `mv` command. This is different
    to the commands we’ve looked at so far because it has two arguments (remember
    Linux command line is command, option, argument). The first argument is the source
    (the file or directory to be moved) and the second is the destination.


    **STEP 3** Enter: `mv testfile testdir` and press return to move the testfile
    document into the testdir directory. Enter: `ls` to see that it’s no longer in
    the home directory, and `ls testdir` to see the testfile now sitting in the testdir
    directory. Now enter: `mkdir newparent` to create a new directory.


    ```

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scr

    pi@raspberrypi ~ $ mv testfile testdir

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scr

    pi@raspberrypi ~ $ ls testdir

    testfile

    pi@raspberrypi ~ $

    ```


    **STEP 4** Directories with files are moved in the same way. Enter: `mv testdir
    newparent` to move the testdir directory inside the newparent directory. Let’s
    move into the directory to find the file. Enter: `cd newparent/testdir` and enter:
    `ls` to view the testfile sitting inside the directory.


    ```

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scr

    pi@raspberrypi ~ $ mkdir newparent

    pi@raspberrypi ~ $ mv testdir newparent

    pi@raspberrypi ~ $ cd newparent/testdir

    pi@raspberrypi ~/newparent/testdir $ ls

    testfile

    pi@raspberrypi ~/newparent/testdir $

    ```'
  mdcn: '## 创建与删除目录


    在终端中创建、移动和删除目录，不如在桌面界面中那样直观。你需要告诉 Linux 将目录移动到其他目录内部，这个过程称为递归。听起来复杂，但你应该很快就能掌握。


    ## 管理文件和目录


    既然你知道了如何创建文件，接下来你会想学习如何创建目录（也就是文件夹），以及如何移动项目。如果你更习惯使用桌面界面，这可能需要一点时间来适应。


    **步骤 1** 输入：`ls` 以快速查看当前主目录中的所有目录。目录使用 “mkdir” 命令（创建目录）来创建。输入：`mkdir testdir`
    在你的主目录中创建一个新目录。再次输入：`ls` 查看它。


    **步骤 2** “mkdir” 命令与 touch 不同，如果你对一个已存在的目录使用它，它不会更新时间戳。再次输入：`mkdir testdir`，你会得到错误信息
    “mkdir: cannot create directory ‘testdir’: File exists”。


    **步骤 3** 与 touch 类似，你可以使用 mkdir 命令一次创建多个目录。输入：`mkdir testdir2 testdir3` 并输入：`ls`。你现在会发现几个名为
    testdir 的目录。同样，与文件一样，你应该知道这意味着你不能（也确实不应该）创建包含空格的目录名。与文件一样，请使用下划线（“_”）字符代替空格。


    ```

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads indicity python_games Scr

    pi@raspberrypi ~ $ mkdir testdir

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads indicity python_games Scr

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ mkdir testdir2 testdir3

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads indicity python_games Scr

    pi@raspberrypi ~ $ _

    ```


    ```

    pi@raspberrypi ~ $ mkdir testdir

    mkdir: cannot create directory ‘testdir’: File exists

    pi@raspberrypi ~ $ _

    ```


    **步骤 4** 你可以使用目录路径在彼此内部创建目录。输入：`mkdir Documents/photos` 在你的文档目录内创建一个名为 “photos”
    的新目录。不过，该目录必须已存在，尝试输入：`mkdir articles/reports`，你会得到一个错误，因为没有 articles 目录。


    ```

    pi@raspberrypi ~ $ ls

    Desktop Documents Downloads indicity python_games Scr

    pi@raspberrypi ~ $ mkdir Documents/photos

    pi@raspberrypi ~ $ mkdir articles/reports

    mkdir: cannot create directory ‘articles/reports’: No such file or directory

    pi@raspberrypi ~ $

    ```


    **步骤 5** 要创建目录路径，你需要向 mkdir 传递 “p” 选项（代表 “parents”）。选项，如果你还记得的话，跟在命令后面并以 ‘-’ 开头。所以输入：`mkdir
    -p articles/reports`。输入：`ls` 查看 articles 目录，或输入 “ls articles” 查看其内部的 reports 目录。


    ```

    pi@raspberrypi ~ $ mkdir -p articles/reports

    ```


    ```

    pi@raspberrypi ~ $ ls -l articles

    total 4

    drwxr-xr-x 2 pi pi 4096 May 13 12:36 reports

    pi@raspberrypi ~ $ _

    ```


    **步骤 6** 现在你开始接触更高级的内容了，我们来重申一点。在 Linux 中，命令结构始终是：命令、选项和参数，按此顺序。命令是功能，接下来是选项（通常是单个字母，以
    “-” 开头），最后是参数（通常是文件或目录结构）。顺序永远是命令、选项，然后是参数。


    ## 删除目录


    在 Linux 中删除目录相当容易，连同文件一起，这可能是个问题。删除包含文件的整个目录太容易了，而且这些文件会被立即删除，不会被发送到回收站。请谨慎操作。


    **步骤 1** 我们将使用 “rmdir” 命令删除之前创建的一个目录。输入：`ls` 查看当前目录中的文件和目录。我们将从删除一个测试目录开始。输入：`rmdir
    testdir3` 并再次输入 `ls` 确认目录已被删除。


    ```

    pi@raspberrypi ~ $ ls

    articles Desktop Downloads indiecity python_games Scr

    pi@raspberrypi ~ $ rmdir testdir3

    ```


    **步骤 2** 现在我们尝试删除 articles 目录（包含 reports 目录）。输入：`rmdir articles` 并按回车。你会得到一个错误信息
    “rmdir: failed to remove ''articles'': Directory not empty”。这很令人困惑；rmdir 命令只删除空目录（没有文件或其他目录）。


    ```

    pi@raspberrypi ~ $ ls

    articles Desktop Downloads indiecity python_games Scr

    pi@raspberrypi ~ $ rmdir articles

    rmdir: failed to remove ''articles'': Directory not empty

    pi@raspberrypi ~ $ _

    ```


    **步骤 3** 要删除包含文件或其他目录的目录，你需要回到用于删除文件的 “rm” 命令，只是现在我们需要使用 “-R” 选项（代表 “recursive”）。使用
    “rm -R” 会删除你指向的所有文件和目录。输入：`rm -R articles` 来删除 articles 目录。


    ```

    pi@raspberrypi ~ $ rm -R articles

    pi@raspberrypi ~ $ ls

    Desktop Downloads indiecity python_games Scr

    pi@raspberrypi ~ $

    ```


    **步骤 4** 与删除多个文件一样，你可以使用带有通配符（*）的 “rm” 命令删除同一目录中的多个目录。不过，这应该谨慎操作，因此请使用 `-i` 选项（代表
    “interactive”）。这会在每次删除前提示你。输入：`rm -Ri test*` 并对每个提示按 `y` 和 `return`。在使用 rm 命令时，使用
    `-i` 选项是个好习惯。


    ```

    pi@raspberrypi ~ $ rm -Ri test*

    rm: remove directory ''testdir''? y

    rm: remove directory ''testdir2''? y

    rm: remove directory ''testdir3''? y

    ```


    ## 复制、移动和重命名文件


    掌握终端对于学习树莓派操作系统的工作原理至关重要。文件的复制、移动和重命名同样重要，因为在你的树莓派项目中会经常用到这些操作。


    ## 使用移动命令


    在 Linux 中，重命名文件就是将其从一个名称移动到另一个名称，而复制文件则是移动它而不删除原始文件。别担心，这很容易掌握。


    **步骤 1** 在我们移动任何东西之前，我们需要在主目录中有一些测试项目。输入：`touch testfile` 和 `mkdir testdir` 在你的主目录中创建一个测试文件和一个测试目录。输入：`ls`
    检查它们是否都存在。


    ```

    pi@raspberrypi ~ $ touch testfile

    pi@raspberrypi ~ $ mkdir testdir

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scr

    pi@raspberrypi ~ $

    ```


    **步骤 2** 文件和目录使用 `mv` 命令移动。这与我们之前看过的命令不同，因为它有两个参数（记住 Linux 命令行是 命令、选项、参数）。第一个参数是源（要移动的文件或目录），第二个是目标。


    **步骤 3** 输入：`mv testfile testdir` 并按回车，将 testfile 文档移动到 testdir 目录中。输入：`ls` 查看它不再在主目录中，输入
    `ls testdir` 查看 testfile 现在位于 testdir 目录中。现在输入：`mkdir newparent` 创建一个新目录。


    ```

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scr

    pi@raspberrypi ~ $ mv testfile testdir

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scr

    pi@raspberrypi ~ $ ls testdir

    testfile

    pi@raspberrypi ~ $

    ```


    **步骤 4** 包含文件的目录以相同方式移动。输入：`mv testdir newparent` 将 testdir 目录移动到 newparent 目录内。让我们进入目录查找文件。输入：`cd
    newparent/testdir` 并输入：`ls` 查看位于目录内的 testfile。


    ```

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  python_games  Scr

    pi@raspberrypi ~ $ mkdir newparent

    pi@raspberrypi ~ $ mv testdir newparent

    pi@raspberrypi ~ $ cd newparent/testdir

    pi@raspberrypi ~/newparent/testdir $ ls

    testfile

    pi@raspberrypi ~/newparent/testdir $

    ```'
