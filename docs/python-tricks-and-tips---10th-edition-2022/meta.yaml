    \    if dec==2:\n        Write()\n    if dec==3:\n        Add()\n    if dec==4:\n\
    \        Delete()\n    if dec==5:\n        Dirlist()\n    if dec==6:\n       \
    \ Check()\n    if dec==7:\n        Move()\n    if dec==8:\n        Copy()\n  \
    \  if dec==9:\n        Makedir()\n    if dec==10:\n        Removedir()\n    if\
    \ dec==11:\n        Openfile()\n    if dec==12:\n        exit()\n    run=int(input(\"\
    1.Return to menu\\n2.Exit \\n\"))\n    if run==2:\n        exit()\n```\n\n![](img/d3010096175d19bb2f1bb51316094dea_30_0.png)\n\
    \n## 导入\n\n这里需要导入三个模块：`Shutil`、`OS` 和 `Time`。前两个模块处理操作系统和文件管理与操作，而 `Time` 模块则简单地显示当前时间和日期。\n\
    \n注意我们如何包含了一个 `try` 和 `except` 块来检查用户是在 Linux 系统还是 Windows 系统上运行代码。Windows 使用\
    \ `CLS` 来清屏，而 Linux 使用 `clear`。`try` 块应该能很好地工作，但根据你自己的系统，这是一个可能改进的地方。\n\n## 猜数字游戏\n\
    \n这是一段简单的小代码，但它很好地利用了 `Random` 模块、`print` 和 `input`，以及一个 `while` 循环。猜测次数可以从 5\
    \ 次增加，随机数范围也可以轻松更改。\n\n## NUMBERGUESS.PY\n\n复制代码，看看你能否在五次猜测内击败计算机。这是一段有趣的代码，当你需要结合使用\
    \ `Random` 模块和 `while` 循环时，它会非常方便。\n\n![](img/d3010096175d19bb2f1bb51316094dea_31_0.png)\n\
    \n```python\nimport random\n\nguessesUsed = 0\nName=input('Hello! What is your\
    \ name? ')\nnumber = random.randint(1, 30)\nprint('Greetings, ' + Name + ', I\\\
    'm thinking of a number between 1 and 30.')\nwhile guessesUsed < 5:\n    guess=int(input('Guess\
    \ the number within 5 guesses...'))\n    guessesUsed = guessesUsed + 1\n    if\
    \ guess < number:\n        print('Too low, try again.')\n    if guess > number:\n\
    \        print('Too high, try again.')\n    if guess == number:\n        break\n\
    \nif guess == number:\n    guessesUsed = str(guessesUsed)\n    print('Well done,\
    \ ' + Name + '! You guessed correctly in ' + guessesUsed + ' guesses.')\n\nif\
    \ guess != number:\n    number = str(number)\n    print('Sorry, out of guesses.\
    \ The number I was thinking of is ' + number)\n```\n\n![](img/d3010096175d19bb2f1bb51316094dea_31_1.png)\n\
    \n1.  尽管这是一个相当容易理解的程序，但代码中有一些元素值得指出。首先，你需要导入 `Random` 模块，因为你在代码中使用了随机数。\n\n![](img/d3010096175d19bb2f1bb51316094dea_31_2.png)\n\
    \n2.  代码的这一部分创建了用于存储已使用猜测次数的变量，以及玩家的名字，并设置了 1 到 30 之间的随机数。如果你想扩大随机数选择范围，可以增加 **`number=random.randint(1,\
    \ 30)`** 的结束值 30；但不要设置得太高，否则玩家将永远无法猜到。如果玩家猜得太低或太高，他们会得到相应的输出并被要求重试，同时猜测次数少于五次。你也可以通过更改\
    \ **`while guessesUsed < 5:`** 的值来将猜测次数从 5 次增加。\n3.  如果玩家猜对了数字，他们会得到一个“干得好”的输出，以及他们用了多少次猜测。如果玩家用完了所有猜测次数，则会显示游戏结束的输出，并揭示计算机正在思考的数字。记住，如果你确实更改了计算机选择的随机数值或玩家可以进行的猜测次数，那么除了变量值之外，你还需要修改代码开头\
    \ `print` 语句中给出的说明。"
