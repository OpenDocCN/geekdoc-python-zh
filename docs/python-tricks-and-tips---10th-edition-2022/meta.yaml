    \ times after the duration is over.\")\n    print(\"Press Ctrl-C to terminate\
    \ the alarm clock early.\")\n    sys.exit(1)\n\ntry:\n    minutes = int(sa[1])\n\
    except ValueError:\n    print(\"Invalid numeric value (%s) for minutes\" % sa[1])\n\
    \    print(\"Should be an integer >= 0\")\n    sys.exit(1)\n\nif minutes < 0:\n\
    \    print(\"Invalid value for minutes, should be >= 0\")\n    sys.exit(1)\n\n\
    seconds = minutes * 60\n\nif minutes == 1:\n    unit_word = \" minute\"\nelse:\n\
    \    unit_word = \" minutes\"\n```\n\n## Wakey Wakey\n\nThere’s some good use\
    \ of try and except blocks here, alongside some other useful loops that can help\
    \ you get a firmer understanding of how they work in Python. The code itself can\
