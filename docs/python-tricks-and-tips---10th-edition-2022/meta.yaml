    \ amount of time or simply as a handy desktop alarm clock for your tea break.\n\
    \nLinux users, try making the alarm clock code into an alias, so you can run a\
    \ simple command to execute it. Then, why not integrate a user input at the beginning\
    \ to ask the user for the length of time they want until the alarm goes off, rather\
    \ than having to include it in the command line.\n\n![](img/d3010096175d19bb2f1bb51316094dea_40_0.png)\n\
    \nWindows users, if Python 3 is the only version installed on your system then\
    \ you will need to execute the code without adding the 3 to the end of the Python\
    \ command. For example:\n\n```\npython AlarmClock.py 10\n```\n\nAgain, you could\
    \ easily incorporate this into a Windows batch file and even set a schedule to\
    \ activate the alarm at certain times of the day.\n\n## Vertically Scrolling Text\n\
    \nWhat's not to like about vertically scrolling text? Its uses are many: the beginning\
