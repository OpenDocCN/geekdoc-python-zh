    # What is Linux?


    The Raspberry Pi operating system is Raspbian, which is a Linux operating system;
    but what exactly is Linux? Where did it come from and what does it do? In a world
    where Windows and macOS have supremacy of the desktop, it’s easy to overlook it,
    but there’s more to Linux than you might imagine.


    Linux is a surprisingly powerful, fast, secure and capable operating system. It’s
    used as the OS of choice for the Raspberry Pi, in the form of Raspbian OS, as
    well as in some of the most unlikely places.


    Despite only enjoying a 1.96% share (according to netmarketshare.com) of the total
    desktop operating system market, Linux has a dedicated following of enthusiasts,
    users and contributors. It was created in 1991 by University of Helsinki student,
    Linus Torvalds, who had become frustrated with the limitations and licensing of
    the popular educational system Minix, a miniature version of the Unix operating
    system, in use at the time.


    Torvalds needed a system that could mirror Unix’s performance and features, without
    the licensing cost. Thus was born Linux, the Unix-like operating system which
    used freely available code from the GNU project. This enabled users around the
    world to utilise the power of the Unix-like system, completely free of charge,
    an ethos that still holds today: Linux is free to download, install and use.


    Unix itself was released in the early ’70s, as a multi-tasking, modular-designed
    operating system originally developed for programmers who needed a stable platform
    to code on. However, its performance, power and portability meant that it soon
    became the system of choice for companies and universities where high-end computing
    tasks were needed.


    Linux is much like any other operating system, such as Windows or macOS in that
    it manages the computer hardware, provides an interface for the user to access
    that hardware and comes with programs for productivity, communications, gaming,
    science, education and more. Linux can be broken up into a number of significant
    elements:


    # BOOTLOADER


    The bootloader is the software that initialises and boots up your computer. It
    loads up the various modules the OS uses to begin to access the hardware in the
    system. You can modify a bootloader to load more than one OS installed on the
    system.


    # GRAPHICAL SERVER


    This is a module within Linux that provides a graphical output to your monitor.
    It’s referred to as the X server or simply just X. X is an application that manages
    one or more graphical displays and one or more input devices (keyboard, mouse,
    etc.) connected to the computer.


    # DAEMONS


    Daemons are background services that start as the operating system is booting.
    These can enable printing, sound, networking and so on. They run unobtrusively
    rather than under the direct control of the user, often waiting to be activated
    by an event or condition.


    # KERNEL


    The kernel is the core of the system and the single element that is actually called
    Linux. The Linux kernel manages the computer processor, memory, storage and any
    peripherals you have attached to your computer. It provides the basic services
    for all other parts of the OS.


    # DESKTOP ENVIRONMENTAL


    The Desktop Environment, or DE, is the main Graphical User Interface (GUI) that
    users interact with. It’s the desktop, that includes Internet browsers, productivity,
    games and whatever program or app you’re using. There are countless DEs available.
    Raspbian uses PIXEL.


    # PROGRAMS/APPLICATIONS


    With Linux being an open source, free operating system, it also makes use of the
    tens of thousands of freely available applications. The likes of LibreOffice,
    GIMP and Python are just the tip of the iceberg.'
- md: '## SHELL


    The Linux shell is a command-line interface environment that a Linux user can
    use to enter commands to the OS that directly affect it. Within the shell you
    can add new users, reboot the system, create and delete files and folders, and
    much more. BASH (Bourne Again Shell) is the most popular shell used in Linux,
    although more are available. The shell is also known as the Terminal, and it''s
    where you''re going to work from through this section of the book.


    Linux is used throughout the world, in a number of basic and quite unique uses.
    While it may look radically different from one environment to the next, the actual
    Linux kernel, can be found in modern smart TVs, in-car entertainment systems and
    GPS, supercomputers, IoT devices and the Raspberry Pi. It''s used by NASA, both
    in the command centre and on-board the ISS. Linux servers power the backbone of
    the Internet, along with most of the websites you visit daily. Android utilises
    components of the Linux kernel, as do set top boxes, games consoles and even your
    fridge, freezer, oven and washing machine.


    Linux isn''t just a free to use operating system. It''s stable, powerful and fast,
    easily customised and requires very little maintenance. However, it''s more than
    just performance stats; Linux means freedom from the walled garden approach of
    other operating systems. It''s a lively community of like-minded individuals who
    want more from their computers without the shackles of price or conformity. Linux
    means choice.


    Raspbian on the Raspberry Pi, is the Linux distribution of choice.


    ## Using the Filesystem


    To master Linux, it’s important to understand how the filesystem works. What’s
    more, it’s also important to become familiar with the Terminal, or shell. This
    command line environment may appear daunting at first, but with practise, it soon
    becomes easy to use.


    ### GETTING AROUND


    To drop into the Terminal, click on the fourth icon from the left along the top
    of the Raspberry Pi desktop, the one with a right-facing arrow and an underscore.
    This is the shell, or Terminal.


    **STEP 1** First, you’re going to look at directories and the directory path.
    A directory is the same thing as a folder, however in Linux it’s always called
    a directory. These are placed inside each other using a “/” character. So when
    you see /home/pi it means the pi directory is inside the home directory. Enter:
    `clear` and press return to clean the screen. Now enter: `pwd`. This stands for
    Print Working Directory and displays /home/pi.


    **STEP 2** When you log in to your Raspberry Pi, you don’t start at the base of
    the hard drive, known as the ‘root’ (also known as the topmost directory). Instead
    you begin inside your user directory, which is named ‘pi’ by default and is itself
    in a directory called ‘home’. Directories are indicated by the “/” symbol. So,
    “/home/pi” tells you that in the root is a directory called home, and the next
    “/” says that inside “home” is a directory called “pi”. That’s where you start.


    **STEP 3** Enter: `ls` to view the contents of the current directory. You should
    see Desktop, Documents, and Downloads and Scratch in Blue. You may also see other
    items depending on how much you have used your Raspberry Pi. The colour code is
    worth knowing: directories are blue while most files are white. As you go on you’ll
    see other colours: executable files (programs) are bright green, archived files
    are red and so on. Blue and white are the two you need to know to get started.


    **STEP 4** Now you’re going to move from the pi directory into the Documents directory.
    Enter: `cd Documents`. Note the capital “D”. Linux is case sensitive, which means
    you have to enter the exact name including correct capitalisation. The cd command
    stands for change directory. Now enter: `pwd` again to view the directory path.
    It will display /home/pi/Documents. Enter: `ls` to view the files inside the Documents
    directory.


    **STEP 5** How do you get back up to the pi directory? By using a command "cd
    ..". In Linux two dots means the directory above, also known as the parent directory.
    Incidentally, a single dot "." is used for the same directory. You never use "cd
    ." to switch to the same directory but it''s worth knowing because some commands
    need you to specify the current directory.


    **STEP 6** The "ls" and "cd" commands can also be used with more complex paths.
    Enter: `ls Documents/Pictures` to view the contents of a Pictures directory inside
    your Documents directory. You can switch to this directory using `cd Documents/Pictures`;
    use `cd ../..` to move back up two parent directories.


    ```

    pi@raspberrypi ~/Documents $ pwd

    /home/pi/Documents

    pi@raspberrypi ~/Documents $ cd ..

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    ```

    pi@raspberrypi ~ $ ls Documents/Pictures

    BDM-Web-logo-dark1.jpg  David Hayward.jpg  raspberry_pi_Z_photographs

    pi@raspberrypi ~ $ cd Documents/Pictures

    pi@raspberrypi ~/Documents/Pictures $ pwd

    /home/pi/Documents/Pictures

    pi@raspberrypi ~/Documents/Pictures $ cd ../..

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    ### ABSOLUTE VS RELATIVE PATHS


    It is important to know the difference between the working directory, root directory
    and home. There are also two types of path: Absolute and Relative. These are easier
    to understand than they sound. Let''s take a look...


    **STEP 1** By default, commands like "ls" use the working directory. This is the
    current directory that you''re looking at and is set to your home directory by
    default (/users/pi). Using "pwd" (Print Working Directory) lets you know what
    the working directory is, and using "cd" changes the working directory.


    **STEP 2** The root directory is always "/". Entering `ls /` lists the contents
    of root, and entering: `cd /` switches to the root directory. This is important
    because there is a difference between "ls Documents/Pictures" and "ls /Documents/Pictures".
    The first command lists the contents of the Pictures directory in Documents inside
    the working directory (which, if you are in the home directory, will work).


    **STEP 3** The second command ("ls /Documents/Pictures") attempts to list the
    content of Pictures in a directory called Documents inside the root directory
    (because the path started with ''/'', which is root). There is typically no Documents
    directory in root, so you will get a "No such file or directory" error. Starting
    a path with ''/'' is known as an "absolute path", while starting without the ''/''
    is known as a "relative path" because it is relative to your working directory.


    ```

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    ```

    pi@raspberrypi ~ $ ls /

    bin  boot  dev  etc  home  lib  lost+found  media  mnt  opt  proc  ...

    pi@raspberrypi ~ $ ls /Documents/Pictures

    ls: cannot access /Documents/Pictures: No such file or directory

    pi@raspberrypi ~ $

    ```


    **STEP 4** There is also an absolute path shortcut to your user directory, and
    that is the tilde "~" character. Entering: `ls ~` always lists the contents of
    your home directory, while "cd ~" moves straight to your home directory, no matter
    what your working directory is. You can also use this shortcut wherever you are:
    enter: `ls ~/Documents/Pictures` to display the contents of the Pictures.


    ```

    pi@raspberrypi:~ $ pwd

    /home/pi

    pi@raspberrypi:~ $ ls Documents/Pictures

    BDM-Web-logo-dark1.jpg  David Hayward.jpg  RPi.png

    pi@raspberrypi:~ $

    ```


    ```

    pi@raspberrypi:~ $ cd ~

    pi@raspberrypi:~ $ pwd

    /home/pi

    pi@raspberrypi:~ $ ls ~/Documents/Pictures

    BDM-Web-logo-dark1.jpg  David Hayward.jpg  RPi.png

    pi@raspberrypi:~ $

    ```


    ## Listing and Moving Files


    Admittedly, using the desktop GUI to list and move files is much easier than using
    the Terminal and keyboard. However, it’s an important skill that you will appreciate
    as you advance with the Raspberry Pi and Linux.


    ### LOOKING AT FILES


    Operating systems are built on files and folders, or directories if you prefer.
    While you’re used to viewing your own files, most operating systems keep other
    files out of sight. In Raspbian, you have access to every file in the system.


    **STEP 1** We’ve already looked at “ls”, which lists the files in the working
    directory, but you are more likely to use a command like “ls -l”. The bit after
    the command (the ‘-lah’) is known as the argument. This is an option that modifies
    the behaviour of the command.


    **STEP 2** The “-l” argument lists files and directories in long format. Each
    file and directory is now on a single line, and before each file is a lot of text.
    First you’ll see lots of letters and dashes, like ‘drwxr-xr-x’. Don’t worry about
    these for now; they are known as ‘permissions’ and we’ll come to those later.


    **STEP 3** After the permission letters come a single number. This is the number
    of files in the item. If it’s a file then it’ll be 1, but if it’s a directory
    it’ll be at least 2. This is because each directory contains two hidden files;
    one with a single dot (.) and one with two dots (..). Directories containing files
    or other directories will have a higher number.


    **STEP 4** Next you’ll see the word “pi” listed twice on each line. This refers
    to the user rather than the name of your computer (your default username is “pi”).
    The first is the owner of the file, and the second is the group. Typically these
    will both be the same and you’ll see either ‘pi’ or ‘root’. You can enter: ls
    -l / to view the files and directories in the root directory that belong to the
    root account.


    ```

    pi@raspberrypi ~ $ ls -l

    total 24

    -rw-r--r-- 1 pi pi    0 May 11 20:56 articles.txt

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 Apr 21 14:50 Documents

    drwx------ 2 pi pi 4096 Apr 21 15:23 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 Indexes

    -rw-r--r-- 1 pi pi    0 May 11 20:56 names.txt

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Apr 17 12:53 Scratch

    pi@raspberrypi ~ $

    ```


    ```

    pi@raspberrypi ~ $ ls -l

    total 28

    -rw-r--r-- 1 pi pi    0 May 11 20:56 articles.txt

    drwxr-xr-x 2 pi pi 4096 Apr 21 17:55 Desktop

    drwxr-xr-x 5 pi pi 4096 Apr 21 14:50 Documents

    drwx------ 2 pi pi 4096 Apr 21 15:23 Downloads

    drwxr-xr-x 3 pi pi 4096 Apr 17 18:48 Indexes

    -rw-r--r-- 1 pi pi    0 May 11 20:56 names.txt

    drwxrwxr-x 2 pi pi 4096 Jan  1  1970 python_games

    drwxr-xr-x 2 pi pi 4096 Apr 17 12:53 Scratch

    drwxr-xr-x 2 pi pi 4096 May 11 21:15 test

    pi@raspberrypi ~ $ ls -l /

    total 74

    drwxr-xr-x  2 root root  4096 Jan  1  1970 bin

    drwxr-xr-x  3 root root  2048 Jan  1  1970 boot

    drwxr-xr-x 12 root root  3208 May 11 09:03 dev

    drwxr-xr-x 109 root root  4096 May 11 09:03 etc

    drwxr-xr-x  3 root root  4096 Jan  1  1970 home

    drwxr-xr-x 12 root root  4096 Jan  1  1970 lib

    drwx------  2 root root 16384 Feb 15 11:21 lost+found

    drwxr-xr-x  3 root root  4096 May 11 09:03 media

    drwxr-xr-x  2 root root  4096 May 11 00:02 mnt

    drwxr-xr-x  6 root root  4096 Jan  1  1970 opt

    ```'
  mdcn: '## SHELL


    Linux Shell 是一个命令行界面环境，Linux 用户可以通过它向操作系统输入直接产生影响的命令。在 Shell 中，你可以添加新用户、重启系统、创建和删除文件与文件夹等等。BASH（Bourne
    Again Shell）是 Linux 中最流行的 Shell，尽管还有其他可用的 Shell。Shell 也被称为终端（Terminal），在本书的这一部分，你将主要在这里进行操作。


    Linux 在全球范围内被广泛使用，应用于许多基础且相当独特的场景。虽然不同环境下的 Linux 看起来可能大相径庭，但实际的 Linux 内核却无处不在，从现代智能电视、车载娱乐系统和
    GPS，到超级计算机、物联网设备和树莓派。美国宇航局（NASA）在指挥中心和国际空间站（ISS）上都使用 Linux。Linux 服务器支撑着互联网的骨干网络，以及你日常访问的大多数网站。Android
    利用了 Linux 内核的组件，机顶盒、游戏机，甚至你的冰箱、冰柜、烤箱和洗衣机也是如此。


    Linux 不仅仅是一个免费使用的操作系统。它稳定、强大、快速，易于定制，并且几乎不需要维护。然而，它的价值远不止于性能数据；Linux 意味着摆脱其他操作系统那种“围墙花园”式的束缚。它是一个充满活力的社区，由志同道合的人组成，他们希望从自己的计算机中获得更多，而不受价格或一致性的束缚。Linux
    意味着选择。


    树莓派上的 Raspbian 是首选的 Linux 发行版。


    ## 使用文件系统


    要精通 Linux，理解文件系统的工作原理至关重要。此外，熟悉终端或 Shell 也很重要。这个命令行环境起初可能看起来令人生畏，但通过练习，它很快就会变得易于使用。


    ### 导航


    要进入终端，请点击树莓派桌面顶部从左数第四个图标，即那个带有向右箭头和下划线的图标。这就是 Shell 或终端。


    **步骤 1** 首先，你将了解目录和目录路径。目录与文件夹是同一回事，但在 Linux 中它总是被称为目录。它们使用“/”字符相互嵌套。因此，当你看到 `/home/pi`
    时，意味着 `pi` 目录位于 `home` 目录内。输入：`clear` 并按回车键以清屏。现在输入：`pwd`。这代表“打印工作目录”（Print Working
    Directory），会显示 `/home/pi`。


    **步骤 2** 当你登录树莓派时，你并非从硬盘驱动器的根部（称为“root”，也称为最顶层目录）开始。相反，你从用户目录内开始，默认情况下该目录名为“pi”，而它本身又位于名为“home”的目录中。目录由“/”符号表示。因此，“/home/pi”告诉你根目录下有一个名为
    home 的目录，下一个“/”表示在“home”内部有一个名为“pi”的目录。这就是你的起点。


    **步骤 3** 输入：`ls` 以查看当前目录的内容。你应该会看到蓝色的 Desktop、Documents、Downloads 和 Scratch。根据你使用树莓派的程度，可能还会看到其他项目。颜色代码值得了解：目录是蓝色的，而大多数文件是白色的。随着学习的深入，你会看到其他颜色：可执行文件（程序）是亮绿色的，归档文件是红色的，等等。蓝色和白色是你入门时需要了解的两种颜色。


    **步骤 4** 现在你将从 `pi` 目录移动到 `Documents` 目录。输入：`cd Documents`。注意大写的“D”。Linux 区分大小写，这意味着你必须输入完全正确的名称，包括正确的大小写。`cd`
    命令代表“更改目录”（change directory）。现在再次输入：`pwd` 以查看目录路径。它将显示 `/home/pi/Documents`。输入：`ls`
    以查看 `Documents` 目录内的文件。


    **步骤 5** 如何返回到 `pi` 目录？使用命令 `cd ..`。在 Linux 中，两个点表示上一级目录，也称为父目录。顺便提一下，单个点“.”用于表示当前目录。你永远不会使用
    `cd .` 来切换到当前目录，但了解这一点很有价值，因为有些命令需要你指定当前目录。


    **步骤 6** `ls` 和 `cd` 命令也可以与更复杂的路径一起使用。输入：`ls Documents/Pictures` 以查看 `Documents`
    目录内 `Pictures` 目录的内容。你可以使用 `cd Documents/Pictures` 切换到此目录；使用 `cd ../..` 可以向上移动两级父目录。


    ```

    pi@raspberrypi ~/Documents $ pwd

    /home/pi/Documents

    pi@raspberrypi ~/Documents $ cd ..

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    ```

    pi@raspberrypi ~ $ ls Documents/Pictures

    BDM-Web-logo-dark1.jpg  David Hayward.jpg  raspberry_pi_Z_photographs

    pi@raspberrypi ~ $ cd Documents/Pictures

    pi@raspberrypi ~/Documents/Pictures $ pwd

    /home/pi/Documents/Pictures

    pi@raspberrypi ~/Documents/Pictures $ cd ../..

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    ### 绝对路径与相对路径


    了解工作目录、根目录和主目录之间的区别非常重要。路径也有两种类型：绝对路径和相对路径。它们比听起来更容易理解。让我们来看看...


    **步骤 1** 默认情况下，像 `ls` 这样的命令使用工作目录。这是你当前正在查看的目录，默认设置为你的主目录（`/users/pi`）。使用 `pwd`（打印工作目录）可以让你知道当前的工作目录是什么，而使用
    `cd` 可以更改工作目录。


    **步骤 2** 根目录始终是“/”。输入 `ls /` 会列出根目录的内容，输入 `cd /` 会切换到根目录。这很重要，因为 `ls Documents/Pictures`
    和 `ls /Documents/Pictures` 之间存在区别。第一个命令列出工作目录内 `Documents` 中 `Pictures` 目录的内容（如果你在主目录中，这将有效）。


    **步骤 3** 第二个命令（`ls /Documents/Pictures`）尝试列出根目录内名为 `Documents` 的目录中的 `Pictures`
    内容（因为路径以“/”开头，即根目录）。根目录中通常没有 `Documents` 目录，因此你会收到“没有该文件或目录”（No such file or directory）错误。以“/”开头的路径称为“绝对路径”，而不以“/”开头的路径称为“相对路径”，因为它相对于你的工作目录。


    ```

    pi@raspberrypi ~ $ pwd

    /home/pi

    pi@raspberrypi ~ $

    ```


    ```

    pi@raspberrypi ~ $ ls /

    bin  boot  dev  etc  home  lib  lost+found  media  mnt  opt  proc  ...

    pi@raspberrypi ~ $ ls /Documents/Pictures

    ls: cannot access /Documents/Pictures: No such file or directory

    pi@raspberrypi ~ $

    ```


    **步骤 4** 还有一个指向用户目录的绝对路径快捷方式，那就是波浪号“~”字符。输入：`ls ~` 总是列出你的主目录的内容，而 `cd ~` 无论你的工作目录是什么，都会直接移动到你的主目录。你也可以在任何地方使用这个快捷方式：输入：`ls
    ~/Documents/Pictures` 以显示 `Pictures` 的内容。


    ```

    pi@raspberrypi:~ $ pwd

    /home/pi

    pi@raspberrypi:~ $ ls Documents/Pictures

    BDM-Web-logo-dark1.jpg  David Hayward.jpg  RPi.png

    pi@raspberrypi:~ $

    ```


    ```

    pi@raspberrypi:~ $ cd ~

    pi@raspberrypi:~ $ pwd

    /home/pi

    pi@raspberrypi:~ $ ls ~/Documents/Pictures

    BDM-Web-logo-dark1.jpg  David Hayward.jpg  RPi.png

    pi@raspberrypi:~ $

    ```


    ## 列出和移动文件


    诚然，使用桌面图形用户界面（GUI）来列出和移动文件比使用终端和键盘要容易得多。然而，这是一项重要的技能，随着你在树莓派和 Linux 上的深入学习，你会感激这项技能。


    ### 查看文件


    操作系统建立在文件和文件夹（或者如果你愿意，也可以称为目录）之上。虽然你习惯于查看自己的文件，但大多数操作系统会将其他文件隐藏起来。在 Raspbian 中，你可以访问系统中的每个文件。


    **步骤 1** 我们已经看过了 `ls`，它列出工作目录中的文件，但你更可能使用像 `ls -l` 这样的命令。命令后面的部分（`-lah`）被称为参数。这是一个修改命令行为的选项。


    **步骤 2** `-l` 参数以长格式列出文件和目录。每个文件和目录现在各占一行，并且在每个文件之前都有很多文本。首先你会看到很多字母和破折号，比如 `drwxr-xr-x`。现在不用担心这些；它们被称为“权限”，我们稍后会讲到。


    **步骤 3** 权限字母之后是一个数字。这是该项中的文件数量。如果它是一个文件，那么数字是 1，但如果它是一个目录，那么数字至少是 2。这是因为每个目录包含两个隐藏文件；一个带有一个点（.），另一个带有两个点（..）。包含文件或其他目录的目录会有更高的数字。


    **步骤 4** 接下来你会看到每行都列出了两次“pi”。这指的是用户，而不是你的计算机名称（你的默认用户名是“pi”）。第一个是文件的所有者，第二个是所属组。通常这两者是相同的，你会看到“pi”或“root”。你可以输入：`ls
    -l /` 以查看根目录中属于 root 帐户的文件和目录。


    ```

