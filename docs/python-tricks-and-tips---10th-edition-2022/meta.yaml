    # Copying, Moving and Renaming Files


    **STEP 5** Files and directories can be moved up using the double dot ("..") as
    an argument. Enter: `ls -la` to view your testfile and the single and double dot
    files. The single dot is the current directory and the double dot is the parent
    directory. Enter: `mv testfile ..` to move the testfile up into the newparent
    directory. Enter: `cd ..` to move up to the parent directory.


    **STEP 6** You can also move files using longer paths. Enter: `cd ~` to return
    to the home directory and `mv newparent/testfile newparent/testdir/testfile` to
    move the testfile from its current location back inside the testdir directory.
    Enter: `ls newparent/testdir` to view the file back in its current directory.


    ```

    pi@raspberrypi ~ $ cd newparent/testdir

    pi@raspberrypi ~/newparent/testdir $ ls

    testfile

    pi@raspberrypi ~/newparent/testdir $ mv testfile ..

    pi@raspberrypi ~/newparent/testdir $ cd ..

    ```


    ```

    pi@raspberrypi ~/newparent $ cd ~

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  newparent  python

    pi@raspberrypi ~ $ mv newparent/testfile newparent/testdir/

    pi@raspberrypi ~ $ ls newparent/testdir

    testfile

    pi@raspberrypi ~ $ _

    ```


    # RENAME FILES AND DIRECTORIES


    The `mv` command isn''t used just to move files; it also serves the purpose of
    renaming files (effectively it moves it from its old name to a new name). Let''s
    see how to use `mv` to rename items.


    **STEP 1** Let''s start by making a new test file called "names". Enter: `touch
    testfile` and then `ls` to make sure the testfile is present. We''re going to
    turn this into a file that contains the names of some people. So let''s call it
    something more appropriate, like "names".


    **STEP 3** You can rename directories inside other directories using paths. Let''s
    rename the testdir directory, which is now inside the people directory. Enter:
    `mv names/testdir names/friends`. Now enter: `mv names people/friends` to move
    the names file inside the friends directory.


    ```

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  newparent  python

    pi@raspberrypi ~ $ mv testfile names

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  names  newparent

    pi@raspberrypi ~ $

    ```


    ```

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  names  people  pyth

    pi@raspberrypi ~ $ mv people/testdir people/friends

    ```


    **STEP 2** Enter: `mv testfile names` and `ls`. Now we can see the new "names"
    file in our directory. The `mv` command can also be used to rename directories.
    We should still have our newparent directory in our home directory. Enter: `mv
    newparent people` to rename the newparent directory. Enter: `ls` to view it.


    **STEP 4** It is easy to overwrite files using the `mv` command, so if you have
    files with the same name use the "-n" option, which stands for "no overwrite".
    Enter: `touch testfile` to create a new file and `mv -n testfile people/friends`.
    There''s no error report though, enter: `ls` and you''ll find testfile still there.


    ```

    pi@raspberrypi ~ $ touch testfile

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  newparent  python_

    pi@raspberrypi ~ $ mv newparent people

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  people  python_gam

    pi@raspberrypi ~ $

    ```


    ```

    pi@raspberrypi ~ $ touch testfile

    pi@raspberrypi ~ $ mv -n testfile people/friends

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  people  python_gam

    pi@raspberrypi ~ $ ls

    Desktop  Documents  Downloads  indiecity  people  python_gam

    pi@raspberrypi ~ $ ls people/friends

    names  testfile

    pi@raspberrypi ~ $

    ```'
