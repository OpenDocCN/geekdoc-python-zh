  md: '# Basic GUI File Browser


    Here''s a helpful and interesting piece of code. It''s an extremely basic file
    browser that''s presented in a graphical user interface using the Tkinter module.
    There''s a lot you can learn from this code and implement into your own programs.


    # FILEBROWSER.PY


    Tkinter is the main module in use here but we''re also using idlelib, so you may
    need to pip install any extras if the dependencies fail when you execute the code.


    ```

    from tkinter import Tk


    from idlelib.TreeWidget import ScrolledCanvas,

    FileTreeItem, TreeNode

    import os


    root = Tk()

    root.title("File Browser")


    sc = ScrolledCanvas(root, bg="white",

    highlightthickness=0, takefocus=1)

    sc.frame.pack(expand=1, fill="both", side="left")


    item = FileTreeItem(os.getcwd())

    node = TreeNode(sc.canvas, None, item)

    node.expand()


    root.mainloop()

    ```


    ![](img/d3010096175d19bb2f1bb51316094dea_37_0.png)


    ![](img/d3010096175d19bb2f1bb51316094dea_37_1.png)


    ![](img/d3010096175d19bb2f1bb51316094dea_37_2.png)'
