  md: '# OS Module


    The OS module allows you to interact directly with the built-in commands found
    in your operating system. Commands vary depending on the OS you’re running, as
    some will work with Windows whereas others will work with Linux and macOS.


    # INTO THE SYSTEM


    One of the primary features of the OS module is the ability to list, move, create,
    delete and otherwise interact with files stored on the system, making it the perfect
    module for backup code.


    STEP 1 You can start the OS module with some simple functions to see how it interacts
    with the operating system environment that Python is running on. If you’re using
    Linux or the Raspberry Pi, try this:


    ```

    import os

    home=os.getcwd()

    print (home)

    ```


    ![](img/d3010096175d19bb2f1bb51316094dea_9_0.png)


    STEP 3 The Windows output is different as that’s the current working directory
    of Python, as determined by the system; as you might suspect, the os.getcwd()
    function is asking Python to retrieve the Current Working Directory. Linux users
    will see something along the same lines as the Raspberry Pi, as will macOS users.


    ![](img/d3010096175d19bb2f1bb51316094dea_9_1.png)


    STEP 2 The returned result from printing the variable home is the current user’s
    home folder on the system. In our example that’s /home/pi; it will be different
    depending on the user name you log in as and the operating system you use. For
    example, Windows 10 will output: C:\Program Files (x86)\Python36-32.


    ![](img/d3010096175d19bb2f1bb51316094dea_9_2.png)


    STEP 4 Yet another interesting element to the OS module, is its ability to launch
    programs that are installed in the host system. For instance, if you wanted to
    launch the Chromium browser from within a Python program you can use the command:


    ```

    import os

    browser=os.system("/usr/bin/chromium-browser")

    ```


    ![](img/d3010096175d19bb2f1bb51316094dea_9_3.png)'
  merge: -1
