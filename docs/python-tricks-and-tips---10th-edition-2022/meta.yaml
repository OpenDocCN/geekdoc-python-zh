    ./.config/lxterminal\n8.0K\t./.config/uk.ac.cam.cl\n8.0K\t./.config/indiecity\n\
    ```\n\n**STEP 4** You don't typically enter: `du` on its own; most of the time\
    \ you want to view the disk usage of a specific directory. Enter: `du -h python_games`\
    \ to view how much space the python_games directory (installed alongside Raspbian)\
    \ takes up. It should be 1.8M. If you want a more comprehensive breakdown of the\
