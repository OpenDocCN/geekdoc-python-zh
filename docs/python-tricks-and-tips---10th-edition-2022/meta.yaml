    步骤 2 Bin 是一个存储二进制文件的目录。这是 Linux 中对程序或应用程序的称呼。Sbin 用于系统二进制文件，这些是构成你系统的程序。Dev 包含对你的设备的引用：硬盘驱动器、键盘、鼠标等。Etc
    包含你的系统配置文件。


    步骤 4 Lib 是一个包含其他程序引用的代码库的目录（不同的程序共享 Lib 中的文件）。"Var" 是 various 的缩写，主要是系统使用的文件，但你可能需要处理这里的项目。最后，有一个名为
    "tmp" 的目录，用于临时文件；放在这里的文件在你的系统上是短期的，可以从系统中删除。


