- md: '## Using the Man Pages


    Linux comes with man (manual) pages that explain each command and show you all
    the options you can use. Once you get the hang of reading the man pages, you’ll
    be able to find and do just about anything in Linux.


    ## HEY, MAN!


    The man pages are one of the best features of Linux, and as a built-in tool it’s
    invaluable for both beginner and senior level Linux administrators. Let’s see
    how it works.


    **STEP 1** Linux has a built-in manual, known as man for short. Using the man
    command you can obtain information on all the Linux commands we’ve talked about.
    Simply enter: `man` and the name of the command you want to learn more about.
    Start by entering: `man ls` in the command line.


    **STEP 2** The man pages are a bit more detailed than you might be used to. First
    you have a name, which tells you what the command is called; in this case "list
    directory contents" and then the synopsis shows you how it works. In this case:
    "ls [OPTION]... [FILE]...". So you enter: `ls` followed by options (such as `-la`)
    and the file or directory to list.


    ![](img/d3010096175d19bb2f1bb51316094dea_69_1.png)


    **STEP 3** Most commands are pretty easy to figure out how to use, so what you
    spend most of the time in the man pages is looking under the Description. Here
    you will see all the options and the letters used to activate them. Most man pages
    are longer than a single page, so press any key, such as the space bar, to move
    to the next page of content.


    ```

    pi@raspberrypi ~ $ man ls

    ```


    ![](img/d3010096175d19bb2f1bb51316094dea_69_0.png)


    **STEP 4** Press the H key while looking at a man page to view the commands you
    can use to control the view. This is called the Summary of Less Commands (the
    less command is something we’ll come to when we look at editing text). For now
    realise that you can move back and forward with Z and W. Press Q to quit this
    help screen and return to the man page.


    ![](img/d3010096175d19bb2f1bb51316094dea_69_2.png)


    **STEP 5** Scroll to the bottom of the man page to discover more information.
    Typically you will find the author''s name and information on reporting bugs,
    including web links that can be useful for more information. Press Q to exit the
    man page and return to the command line.


    **STEP 6** The man command can be used for just about every command you use in
    Linux. You can even enter: man man to get information on using the man tool. From
    now on, whenever you come across a new command in this book, such as "nano" or
    "chmod", take time to enter: man nano or man chmod and read the instructions.


    ```

    assume tab stops at each COLS instead of 8

    -u with -lt: sort by, and show, access time with -l show access time and sort
    by name otherwise

    -U do not sort; list entries in directory order

    -v natural sort of (version) numbers within text

    -W, --width=COLS

    assume screen width instead of current value

    -x list entries by lines instead of by columns

    -X sort alphabetically by entry extension

    -Z, --context

    print any SELinux security context of each file

    -l one file per line

    --help display this help and exit

    --version

    output version information and exit

    SIZE may be (or may be an integer optionally followed by) one of following: KB
    1000, K 1024, MB 1000...

    Using color to distinguish file types is disabled both by default and with --color=never.
    With --col

    next variable can change the settings. Use the dircolors command to set it.

    exit status:

    ```


    ```

    man(1) man - an interface to the on-line reference manuals

    NAME

    man - an interface to the on-line reference manuals

    SYNOPSIS

    man [-C file] [-d] [-D] [--warnings[=warnings]] [-R encoding] [-L locale] [-m
    system[,...]] [-M path] [-S list] [-e extension] [-i|-I] [--no-hyphenation] [--no-justification]
    [-p string] [-t] [-T[device]] [-H[browser]] [-X[dpi]] [-Z] [[section] page ...]
    ...

    man -k [apropos options] regexp

    man -f [whatis options] page ...

    man -l [-C file] [-d] [-D] [--warnings[=warnings]] [-R encoding] [-L locale] [-p
    string] [-t] [-T[device]] [-H[browser]] [-X[dpi]] [-Z] file ...

    man -w|-W [-C file] [-d] [-D] page ...

    man -c [-C file] [-d] [-D] page ...

    man [-tTwe] [-C file] [-d] [-D] [-p string] [-m system[,...]] [-M path] [-S list]
    [-e extension] [-i|-I] [--no-hyphenation] [--no-justification] [-H[browser]] [-X[dpi]]
    [-Z] [[section] page ...] ...

    man -g [-C file] [-d] [-D] [apropos options] regexp ...

    man -[-h] [-C file] [-d] [-D] [--warnings[=warnings]] [-R encoding] [-L locale]
    [-p string] [-t] [-T[device]] [-H[browser]] [-X[dpi]] [-Z] [[section] page ...]
    ...

    DESCRIPTION

    man is the system''s manual pager. Each page argument given to man is normally
    the name of a program, utility or function. The manual page associated with each
    of these arguments is then found and displayed. A section, if provided, will direct
    man to look in that section of the manual. The default action is to search in
    all of the available sections following a pre-defined order (see DEFAULTS), and
    to show only the first page found, even if page exists in several sections.

    The table below shows the section numbers of the manual followed by the types
    of pages they contain.

    1 Executable programs or shell commands

    2 System calls (functions provided by the kernel)

    3 Library calls (functions within program libraries)

    4 Special files (usually found in /dev)

    5 File formats and conventions eg /etc/passwd

    6 Games

    ```


    ## USING MAN OPTIONS


    Because man doesn''t change anything, like mv or mkdir, it is tempting not to
    see it as a command. But it is, and like all other commands it has options. These
    can be very handy to learn.


    **STEP 1** Entering: man man enables you to view some of the options, but sometimes
    you''ll just want a quick overview. Fortunately man has a built-in help option
    that quickly lists the options. Press Q if you''re in a man page and enter: man
    -h at the command line.


    **STEP 2** If you''re fast you may have noticed the start of the text flew up
    off the page. This is because the "man -h" option doesn''t use the less command
    by default (less is what enables you to move down text one screen at a time).
    We''ll look into pipes ("|") later on, but for now just use "man -h | less" to
    read long text one page at a time.


    **STEP 3** One of the most powerful man options is the -k option, which is for
    "apropos". This enables you to search a wider range of man pages than the exact
    command. Enter: man -k directory to view all of the man pages relating to directories
    ("man -k directory | less" to view one page at a time). Here you''ll find commands
    like "ls", "mkdir" and "cd" along with their description.


    ```

    print physical location of cat (files)

    --catman

    used by catman to reformat out of date cat pages

    --recode=ENCODING

    call iconv to process text to a different encoding

    --debug

    Define the bounds for this particular man search

    --global-apropos

    search for all pages across all manual sections.

    --sections=SECS

    use colon separated section list to search

    --extension=EXTENSION

    limit search to extension type EXTENSION

    --ignore-case

    look for pages case-insensitively (default)

    --wildcard

    look for pages containing page name wildcard

    --match-case

    look for pages case-sensitively (default)

    --names-only

    only, page, name and extension match wildcards.

    --all

    find all matching manual pages.

    --long

    find all matching manual pages and print them all.

    --verbose

    print lots of odd stuff to stderr

    --no-subpages

    don''t try subpages, e.g. "man foo bar" => "man foo"

    Compiling formatted page:

    --troff

    use groff to format HTML to troff

    --grotty

    use groff to format HTML to grotty

    --warnings=ENCODING

    use iconv to convert input to a different encoding

    --encoding=ENCODING

    use iconv to convert input to a different encoding

    --no-hyphenation, -H

    turn off hyphenation

    --no-justification

    turn off justification

    --nroff

    use groff to format HTML to nroff

    --utf8

    use iconv to convert input to UTF8

    --pinyin

    use pinyin to convert input to pinyin

    --latin1

    use iconv to convert input to latin1

    --groff

    use groff to format HTML to groff

    --help

    give this help list

    --usage

    give a short usage message

    --version

    print program version

    Mandatory or optional arguments to long options are also mandatory or optional

    for any corresponding short options.

    Report Bugs to <bug-groff@gnu.org>.

    /usr/bin/man -C /etc/manpath.config

    ```


    ```

    man (1) man - an interface to the on-line reference manuals

    NAME

    man - an interface to the on-line reference manuals

    SYNOPSIS

    man [-C file] [-d] [-D] [--warnings[=warnings]] [-R encoding] [-L locale] [-m
    system[,...]] [-M path] [-S list] [-e extension] [-i|-I] [--no-hyphenation] [--no-justification]
    [-p string] [-t] [-T[device]] [-H[browser]] [-X[dpi]] [-Z] [[section] page ...]
    ...

    man -k [apropos options] regexp

    man -f [whatis options] page ...

    man -l [-C file] [-d] [-D] [--warnings[=warnings]] [-R encoding] [-L locale] [-p
    string] [-t] [-T[device]] [-H[browser]] [-X[dpi]] [-Z] file ...

    man -w|-W [-C file] [-d] [-D] page ...

    man -c [-C file] [-d] [-D] page ...

    man [-tTwe] [-C file] [-d] [-D] [-p string] [-m system[,...]] [-M path] [-S list]
    [-e extension] [-i|-I] [--no-hyphenation] [--no-justification] [-H[browser]] [-X[dpi]]
    [-Z] [[section] page ...] ...

    man -g [-C file] [-d] [-D] [apropos options] regexp ...

    man -[-h] [-C file] [-d] [-D] [--warnings[=warnings]] [-R encoding] [-L locale]
    [-p string] [-t] [-T[device]] [-H[browser]] [-X[dpi]] [-Z] [[section] page ...]
    ...

    DESCRIPTION

    man is the system''s manual pager. Each page argument given to man is normally
    the name of a program, utility or function. The manual page associated with each
    of these arguments is then found and displayed. A section, if provided, will direct
    man to look in that section of the manual. The default action is to search in
    all of the available sections following a pre-defined order (see DEFAULTS), and
    to show only the first page found, even if page exists in several sections.

    The table below shows the section numbers of the manual followed by the types
    of pages they contain.

    1 Executable programs or shell commands

    2 System calls (functions provided by the kernel)

    3 Library calls (functions within program libraries)

    4 Special files (usually found in /dev)

    5 File formats and conventions eg /etc/passwd

    6 Games

    ```


    **STEP 4** Entering the man page for all the commands you come across can be a
    little long-winded, although ultimately productive. If you simply want to know
    what a command does you can read just the description using the "whatis" command.
    Enter: whatis pwd to read the description of the "pwd" command ("print name of
    current/working directory").


    ```

    pi@raspberrypi ~ $ man -h | less

    ```


    ```

    pi@raspberrypi ~ $ whatis pwd

    pwd (1) - print name of current/working directory

    pi@raspberrypi ~ $

    ```'
  mdcn: '## 使用手册页


    Linux 自带手册页（man pages），用于解释每个命令并展示所有可用的选项。一旦你掌握了阅读手册页的技巧，就能在 Linux 中找到并执行几乎任何操作。


    ## 嘿，手册！


    手册页是 Linux 最棒的功能之一，作为内置工具，它对初学者和资深 Linux 管理员都极具价值。让我们看看它是如何工作的。


    **步骤 1** Linux 有一个内置手册，简称 man。使用 `man` 命令，你可以获取我们讨论过的所有 Linux 命令的信息。只需输入：`man`
    加上你想了解的命令名称。首先在命令行中输入：`man ls`。


    **步骤 2** 手册页可能比你习惯的要详细一些。首先有一个名称，告诉你这个命令叫什么；在这个例子中是“列出目录内容”，然后是概要，展示它如何工作。在这个例子中：“ls
    [选项]... [文件]...”。所以你输入：`ls` 后跟选项（例如 `-la`）以及要列出的文件或目录。


    ![](img/d3010096175d19bb2f1bb51316094dea_69_1.png)


    **步骤 3** 大多数命令都很容易弄清楚如何使用，所以你在手册页中花费的大部分时间是在“描述”部分下查看。在这里你会看到所有选项以及用于激活它们的字母。大多数手册页都超过一页，所以按任意键，例如空格键，可以移动到下一页内容。


    ```

    pi@raspberrypi ~ $ man ls

    ```


    ![](img/d3010096175d19bb2f1bb51316094dea_69_0.png)


    **步骤 4** 在查看手册页时按 H 键，可以查看用于控制视图的命令。这称为 Less 命令摘要（less 命令是我们稍后在编辑文本时会讲到的）。目前要知道，你可以用
