    \ person to get their teeth into; or perhaps even as part of a game where the\
    \ main character is tasked to draw a skull and crossbones or something similar.\n\
    \n## Python Alarm Clock\n\nEver taken a quick break from working at the computer,\
    \ then suddenly realised many minutes later that you’ve spent all that time on\
    \ Facebook? Introducing the Python alarm clock code, where you can drop into the\
    \ command prompt and tell the code how many minutes until the alarm goes off.\n\
    \n```python\ntry:\n    if minutes > 0:\n        print(\"Sleeping for \" + str(minutes)\
    \ + unit_word)\n        sleep(seconds)\n    print(\"Wake up\")\n    for i in range(5):\n\
    \        print(chr(7)),\n        sleep(1)\nexcept KeyboardInterrupt:\n    print(\"\
    Interrupted by user\")\n    sys.exit(1)\n```\n\n## ALARMCLOCK.PY\n\nThis code\
    \ is designed for use in the command prompt, be that Windows, Linux or macOS.\
    \ There are some instructions on how to use it in the main print section but essentially\
    \ it’s: python3 AlarmClock.py 10 (to go off in ten minutes).\n\n```python\nimport\
    \ sys\nimport string\nfrom time import sleep\n\nsa = sys.argv\nlsa = len(sys.argv)\n\
    if lsa != 2:\n    print(\"Usage: [ python3 ] AlarmClock.py duration _ in _ minutes\"\
