    \ + string.ascii_lowercase + string.digits\n    size= 4\n    return ''.join(random.choice(chars)\
    \ for x in range(size,20))\n\nn=0\nwhile n<50:\n    print(randompassword())\n\
    \    n=n+1\n```\n\n这将基于之前随机选择的字符输出五十个随机密码。\n\n![](img/d3010096175d19bb2f1bb51316094dea_34_0.png)\n\
