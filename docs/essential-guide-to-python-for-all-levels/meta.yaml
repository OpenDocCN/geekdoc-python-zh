    Stacks: A stack is a last-in, first-out (LIFO) data structure, similar to a stack
    of plates. The last item added is the first one to be removed. Stacks support
    two main operations:


    +   1. Push: Adds an element to the top of the stack.

    2. Pop: Removes and returns the top element of the stack.


    Python does not have a built-in stack data structure, but you can use a list to
    implement a stack. Here''s an example:


    ```


    stack = []

