    c) To manage and scale containers in a distributed environment d) To provide infrastructure,
    services, and resources for hosting applications


    **Answer: a) To automate the building, testing, and deployment of applications**


    84. What is the role of version control in CI/CD? a) To automate the build process
    b) To enforce coding standards c) To track changes and maintain a code history
    d) To configure network settings for containers


    **Answer: c) To track changes and maintain a code history**'
