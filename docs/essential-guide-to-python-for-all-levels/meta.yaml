    \ Python 中的错误处理和异常：\n\n**异常的类型：** Python 有多种内置异常类型来表示不同类型的错误。一些常见的异常类型包括 `SyntaxError`、`TypeError`、`NameError`、`ValueError`、`FileNotFoundError`\
