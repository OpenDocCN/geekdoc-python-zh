    \ the virtual environment's Python and installed packages. Activation commands\
    \ differ depending on the operating system:\n\n- For Windows (Command Prompt):\n\
    \  `myenv\\Scripts\\activate`\n- For Windows (PowerShell):\n  `myenv\\Scripts\\\
    Activate.ps1`\n- For Unix/Linux:\n  ```\n  source myenv/bin/activate\n  ```\n\n\
    After activation, the command prompt or terminal will show the virtual environment's\
