  mdcn: "与现有库配合使用，或实现 Python 中不易获得的底层功能。\n\n使用上下文管理器的一个实际示例是在处理文件时。**with** 语句确保文件在使用后被正确关闭，即使发生异常也是如此。下面是一个示例：\n\
    \n```\nwith open('myfile.txt', 'r') as file:\n    for line in file:\n        print(line)\n\
