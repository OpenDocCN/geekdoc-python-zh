    # # Python Data Structures: Sets


    In Python, a set is an unordered collection of unique elements. It is a useful
    data structure when you want to store a collection of distinct items and perform
    operations such as membership testing, intersection, union, and difference. Sets
    are mutable, meaning you can add or remove elements from them. Let''s explore
    the basics of sets in Python:'
  - '[PAGE 75]


    # Creating a Set:


    To create a set in Python, you can enclose elements within curly braces {} or
    use the **set()** function. Example:


    ```

    fruits ={''apple'', ''banana'', ''orange''}

    ```


    In the above example, we create a set called **fruits** that contains three elements.


    Alternatively, you can create an empty set using the **set()** function. Example:


    ```

    empty_set =set()

    ```


    # Accessing Elements:


    Since sets are unordered, you cannot access elements of a set using indices. However,
    you can check for the presence of an element using the **in** keyword. Example:


    ```

    print(''banana'' in fruits) #True

    print(''grape'' in fruits) #False

    ```


    In the above example, we check if **"banana"** and **"grape"** exist in the **fruits**
    set.


    # Modifying Elements:


    Sets allow you to add and remove elements. The **add()** method adds a single
    element to the set. Example:'
  - '[PAGE 76]


    ```


    fruits.add("mango")

    print(fruits) # {"apple", "banana", "orange", "mango"}


    ```


    In the above example, we add the element "mango" to the fruits set using the add()
    method.


    The remove() method removes a specified element from the set. Example:


    ```


    fruits.remove("banana")

    print(fruits) # {"apple", "orange", "mango"}


    ```


    In the above example, we remove the element "banana" from the fruits set using
    the remove() method.


    Set Operations: Sets support various operations for performing set operations
    such as union, intersection, difference, and symmetric difference.


    +   - Union: The union of two sets returns a new set containing all unique elements
    from both sets. Example:


    ```


    set1 = {1, 2, 3}

    set2 = {3, 4, 5}

    union_set = set1.union(set2)

    print(union_set) # {1, 2, 3, 4, 5}


    ```'
  - '[PAGE 77]


    Intersection: The intersection of two sets returns a new set containing elements
    that are present in both sets. Example:


    ```


    set1 = {1, 2, 3}

    set2 = {3, 4, 5}

    intersection_set = set1.intersection(set2)

    print(intersection_set) #{3}


    ```


    Difference: The difference between two sets returns a new set containing elements
    that are present in the first set but not in the second set. Example:


    ```


    set1 = {1, 2, 3}

    set2 = {3, 4, 5}

    difference_set = set1.difference(set2)

    print(difference_set) #{1, 2}


    ```


    Symmetric Difference: The symmetric difference of two sets returns a new set containing
    elements that are present in either of the sets, but not both. Example:


    ```


    set1 = {1, 2, 3}

    set2 = {3, 4, 5}

    symmetric_difference_set = set1.symmetric_difference(set2)

    print(symmetric_difference_set) #{1, 2, 4, 5}


    ```'
  - '[PAGE 78]


    Sets offer efficient membership testing and set operations, making them suitable
    for tasks such as eliminating duplicates, checking for common elements, and performing
    mathematical set operations.


    # ## Python Data Structures: Dictionaries


    In Python, a dictionary is a versatile and powerful data structure that allows
    you to store and retrieve key-value pairs. It is also known as an associative
    array or a hash map in other programming languages. Dictionaries are unordered,
    mutable, and can contain elements of different data types. They are useful for
    storing and accessing data based on unique keys. Let''s explore the basics of
    dictionaries in Python:'
  - '[PAGE 79]


    Creating a Dictionary: To create a dictionary in Python, you enclose key-value
    pairs within curly braces {}, separating each pair with a colon :. Example:


    ```

    student = {''name'': ''John'', ''age'': 25, ''grade'': ''A''}

    ```


    In the above example, we create a dictionary called **student** with three key-value
    pairs.


    You can also create an empty dictionary using the **dict()** constructor. Example:


    ```

    empty_dict = dict()

    ```


    Accessing Values: To access the value associated with a specific key in a dictionary,
    you can use the key as an index. Example:


    ```

    print(student["name"])  #John

    print(student["age"])  #25

    ```


    In the above example, we access the values associated with the keys **"name"**
    and **"age"** in the **student** dictionary.


    If you try to access a key that does not exist in the dictionary, it will raise
    a **KeyError** exception. To avoid this, you can use the **get()** method, which'
  - '[PAGE 80]


    returns **None** or a default value if the key is not found. Example:


    ```

    python

    print(student.get("grade"))  #A

    print(student.get("city"))   #None

    print(student.get("city", "N/A")) #N/A


    ```


    In the above example, we use the **get()** method to retrieve the values associated
    with the keys **"grade"**, **"city"**, and provide a default value **"N/A"** for
    the key **"city"**.


    **Modifying Values:** Dictionaries are mutable, so you can modify the values associated
    with existing keys or add new key-value pairs. Example:


    ```

    python

    student["age"] = 26

    student["city"] = "New York"

    print(student) #{''name'': ''John'', ''age'': 26, ''grade'': ''A'', ''city'':
    ''New York''}


    ```


    In the above example, we update the value associated with the key **"age"** and
    add a new key-value pair **"city"**: **"New York"** to the **student** dictionary.'
  - '[PAGE 81]


    Removing Key-Value Pairs: You can remove key-value pairs from a dictionary using
    the **del** keyword or the **pop()** method. Example:


    ```

    del student["grade"]

    print(student)  #{"name": "John", "age": 26, "city": "New York"}

    ```


    ```

    age = student.pop("age")

    print(age)  #26

    print(student)  #{"name": "John", "city": "New York"}

    ```


    In the above example, we use **del** to remove the key-value pair associated with
    the key "**grade**", and then use **pop()** to remove the key-value pair associated
    with the key "**age**" and retrieve its value.


    # Common Dictionary Operations:


    +   - **len()** returns the number of key-value pairs in a dictionary.

    - **in** keyword checks if a key exists in a dictionary.

    - **keys()** returns a list of all the keys in a dictionary.'
  - '[PAGE 82]


    +   - **values()** returns a list of all the values in a dictionary.

    - **items()** returns a list of tuples containing key-value pairs.


    Dictionaries provide a flexible and efficient way to store and retrieve data based
    on unique keys. They are suitable for scenarios where you need to organize data
    in a key-value format, such as storing user information, configuring settings,
    or mapping relationships between entities.


