    ```python\n#Importing the pi constant from the math module\nfrom math import pi\n\
    #Using the pi constant\nradius = 5\ncircumference = 2 * pi * radius\n```\n\nPackages:\
    \ A package is a way of organizing related modules into a directory hierarchy.\
    \ It consists of a directory containing multiple module files and an additional\
