    \ 解释器**\n\n- 14. Python 中用于幂运算的运算符是哪个？\n    a) +\n    b) -\n    c) *\n    d) **\n\
    \n**答案：d) **\n\n- 15. 比较运算符 “!=” 代表什么？\n    a) 等于\n    b) 不等于\n    c) 大于\n   \
