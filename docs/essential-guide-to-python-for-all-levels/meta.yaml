    \ 参数的值打印一条问候消息。然后我们使用参数 \"John\" 调用了该函数。\n\n函数参数：函数可以接受一个或多个参数，这些参数是调用函数时传入的值的占位符。参数列在函数名后的括号内。你可以定义带有默认值的参数，使其成为可选参数。示例：\n\
    \n```\ndef multiply(a, b=1):\n    return a * b\n\nresult = multiply(5, 3)  #15\n\
    result = multiply(5)    #5 (b取默认值1)\n```\n\n在上面的例子中，**multiply** 函数接受两个参数 **a**\
    \ 和 **b**，其中 **b** 的默认值为1。我们可以同时提供两个参数来调用函数，也可以省略第二个参数以使用其默认值。\n\nReturn语句：函数可以使用\
    \ **return** 语句返回值。**return** 语句会终止函数并将指定的值返回给调用者。示例：\n\n```\ndef add(a, b):\n\
    \    return a + b\n\nresult = add(3, 4)  # 7\n```\n\n在上面的例子中，**add** 函数接受两个参数\
    \ **a** 和 **b**，并返回它们的和。返回的值存储在 **result** 变量中。\n\n函数文档：你可以使用文档字符串为你的函数提供文档。文档字符串是紧跟在函数定义后面指定的字符串字面量。它们描述函数的目的、其参数和预期的返回值。示例：\n\
    \n```\ndef square(number):\n    \"\"\"\n    计算一个数的平方。\n\n    参数:\n    - number:\
    \ 输入的数字\n\n    返回:\n    输入数字的平方\n    \"\"\"\n    return number ** 2\n```\n\n在上面的例子中，文档字符串提供了关于函数目的、其参数和返回值的信息。\n\
    \n函数调用：要执行一个函数，你需要使用其名称后跟括号来调用它。你可以在括号内向函数传递参数。示例：\n\n```\ndef greet(name):\n\
    \    print(\"Hello, \" + name + \"!\")\n```\n\n```\ngreet(\"John\")\n```\n\n在上面的例子中，使用参数\
    \ \"John\" 调用了 **greet** 函数。函数体被执行，问候消息被打印出来。\n\n### 变量的作用域\n\n在函数内部定义的变量具有局部作用域，只能在该函数内部访问。在任何函数外部定义的变量具有全局作用域，可以从程序中的任何地方访问。示例：\n\
    \n```\ndef add(a, b):\n    result = a + b  # 局部变量\n    return result\n\ntotal\
    \ = add(3, 4)  # 全局变量\n```\n\n在上面的例子中，**result** 变量是 **add** 函数的局部变量，而 **total**\
    \ 变量是全局变量，可以在函数外部访问。\n\n除了这些关键概念，Python还支持与函数相关的各种高级特性，例如可变长度参数、匿名函数（lambda函数）和递归。理解和有效利用函数可以极大地增强代码的组织性和可重用性。\n\
    \n## 模块和包\n\n模块和包是Python中的基本概念，它们允许你有效地组织、重用和共享代码。它们提供了一种将代码构建为逻辑单元的方法，并促进了模块化编程。让我们来探讨Python中模块和包的概念：\n\
