    \n在上例中，我们使用一个列表作为栈。我们使用 `append()` 方法将元素追加到列表末尾，使用 **pop()** 方法（不指定索引）来移除并返回最后添加的元素。\n\
    \n队列：队列是一种先进先出（FIFO）的数据结构，类似于排队的人群。最先添加的项目最先被移除。队列支持两个主要操作：\n\n1. 入队：向队列末尾添加一个元素。\n\
