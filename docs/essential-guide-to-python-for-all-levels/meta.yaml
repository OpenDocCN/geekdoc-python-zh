    \n元编程的一个常见用例是创建装饰器。装饰器允许你修改或增强函数的行为。这里有一个测量函数执行时间的装饰器示例：\n\n```python\nimport\
    \ time\n\ndef measure_time(func):\n    def wrapper(*args, **kwargs):\n       \
    \ start_time = time.time()\n        result = func(*args, **kwargs)\n        end_time\
    \ = time.time()\n        print(f\"Execution time: {end_time - start_time}seconds\"\
    )\n        return result\n    return wrapper\n\n@measure_time\ndef some_function():\n\
    \    # ... your code here ...\n    pass\n\nsome_function() #Will print the execution\
