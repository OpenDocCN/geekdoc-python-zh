    ImageNet 这样的大规模图像数据集上进行了训练。这些模型带有已经学习了广泛视觉特征的预训练权重。通过利用迁移学习，你可以将这些预训练模型作为起点来执行你的水果分类任务，从而节省时间和计算资源。


