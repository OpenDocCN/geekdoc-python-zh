    # # Data Science and Machine Learning in python


    A. Data Manipulation and Cleaning: Data manipulation and cleaning are crucial
    steps in the data science and machine learning workflow. Python provides several
    libraries such as NumPy, Pandas, and SciPy that are commonly used for data manipulation
