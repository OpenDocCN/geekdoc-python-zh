    \n堆是维护元素集合的高效数据结构，能够高效地检索最小或最大元素。它们在需要频繁访问极端值的场景中特别有用，例如优先队列实现或图算法。\n\n让我们深入探讨堆，并用日常例子来讨论它们的概念：想象一下你正在组织一个主题公园的排队。当游客到达时，你会根据他们的票类型分配优先级。为了高效地管理队列，你可以使用一个堆。在这种情况下，一个最小堆是合适的，其中优先级最低（例如，VIP票）的游客在队列前面。\n\
