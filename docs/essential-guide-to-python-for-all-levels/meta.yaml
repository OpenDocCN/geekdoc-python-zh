    \n## Python 数据结构：栈与队列\n\n在 Python 中，栈和队列是抽象数据类型，允许你按照特定顺序存储和检索元素。它们常用于各种算法和问题解决场景。让我们来探索\
    \ Python 中栈和队列的基础知识：\n\n栈：栈是一种后进先出（LIFO）的数据结构，类似于一摞盘子。最后添加的项目最先被移除。栈支持两个主要操作：\n\
    \n1. 入栈：向栈顶添加一个元素。\n2. 出栈：移除并返回栈顶元素。\n\nPython 没有内置的栈数据结构，但你可以使用列表来实现一个栈。示例如下：\n\
