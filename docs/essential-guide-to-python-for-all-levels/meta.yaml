  md: '# Reading Text Files:


    To read the contents of a text file in Python, you can use the **open()** function
    with the mode set to ''r'' (read). The **open()** function returns a file object
    that you can use to read the file''s contents. Here''s an example:


    ```

    #Open the file in read mode

    file = open(''example.txt'', ''r'')


    #Read the entire file contents

    content = file.read()


    #Close the file

    file.close()


    #Print the contents

    print(content)

    ```


    In the example above, the **open()** function is used to open the file named "example.txt"
    in read mode. The **read()** method is then called on the file object to read
    the entire contents of the file. Finally, the file is closed using the **close()**
    method. It''s important to close the file after reading to free up system resources.


