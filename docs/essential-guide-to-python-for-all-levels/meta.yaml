  md: 'server architectures. It provides a low-level interface for network communication
    and enables you to exchange data between devices over different protocols, like
    TCP or UDP. TCP (Transmission Control Protocol) and UDP (User Datagram Protocol)
    are two common transport layer protocols used in socket programming. Here''s an
    explanation of TCP and UDP and their differences:


    TCP (Transmission Control Protocol):


    +   - TCP is a reliable, connection-oriented protocol.

    - It provides guaranteed delivery of data packets, ordered delivery, and error
    detection/recovery mechanisms.

    - TCP establishes a connection between the client and server before data transfer,
    ensuring data integrity.

    - It provides flow control and congestion control mechanisms to regulate data
    transmission.'
  merge: -1
  pgno: 306
- img_proc: true
  md: '+   - TCP is commonly used for applications that require reliable and ordered
    data delivery, such as web browsing, email, file transfer (FTP), and database
    communication.


    # UDP (User Datagram Protocol):


    +   - UDP is a connectionless, unreliable protocol.

    - It does not establish a dedicated connection before data transfer, and each
    datagram (packet) is independent.

    - UDP does not guarantee delivery or order of packets, and it does not perform
    error recovery.

    - It offers lower overhead compared to TCP, making it faster and more suitable
    for real-time applications where data loss can be tolerated.'
  merge: -1
  pgno: 307
- img_proc: true
  md: '+   - UDP is commonly used for applications like streaming media, online gaming,
    DNS (Domain Name System), and IoT (Internet of Things) applications.


    When deciding between TCP and UDP for a particular application, consider the requirements
    of the application. If reliability, ordered delivery, and error recovery are critical,
    TCP is the appropriate choice. On the other hand, if low latency, speed, and real-time
    data transmission are more important, UDP is preferred.


    In socket programming, you can choose either TCP or UDP based on your application''s
    specific needs. Python''s socket module supports both TCP and UDP sockets, allowing
    you to create network communication using the desired protocol.'
