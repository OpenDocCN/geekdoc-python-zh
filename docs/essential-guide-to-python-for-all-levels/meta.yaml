    \n- 6. Python 中常用于 Web 抓取的库是哪个？\n    a) NumPy\n    b) pandas\n    c) Django\n\
    \    d) BeautifulSoup\n\n**答案：d) BeautifulSoup**\n\n- 7. Python 中“动态类型”意味着什么？\n\
    \    a) 变量需要显式声明类型。\n    b) 变量的类型是动态确定的。\n    c) Python 有一个单独的动态类型语言。\n    d)\
    \ Python 同时支持静态和动态类型。\n\n**答案：b) 变量的类型是动态确定的。**\n\n- 8. Python 如何与其他编程语言集成？\n\
    \    a) 通过将所有代码转换为 Python\n    b) 通过使用专门的 Python 解释器\n    c) 通过利用现有的代码和库\n   \
    \ d) Python 无法与其他语言集成\n\n**答案：c) 通过利用现有的代码和库**\n\n- 9. 在 Windows 上安装 Python 时，为确保易于访问，哪个步骤很重要？\n\
    \    a) 选择正确的安装程序版本\n    b) 选择“将 Python 添加到 PATH”选项\n    c) 中断安装过程\n    d) 忽略系统要求\n\
    \n**答案：b) 选择“将 Python 添加到 PATH”选项**\n\n- 10. 为确保获取最新的稳定版本，推荐从哪里下载 Python？\n  \
    \  a) 官方 Python 网站 (python.org)\n    b) 非官方的软件分享网站\n    c) 社交媒体平台\n    d) 开源代码仓库\n\
    \n**答案：a) 官方 Python 网站 (python.org)**\n\n- 11. 搭建 Python 开发环境时，步骤 2 的目的是什么？\n\
    \    a) 安装 Python\n    b) 选择一个 IDE\n    c) 安装额外的库\n    d) 开始编码\n\n**答案：b) 选择一个\
    \ IDE**\n\n- 12. 哪个 IDE 由 JetBrains 开发，既提供免费的社区版，也提供付费的专业版？\n    a) PyCharm\n\
    \    b) Visual Studio Code (VS Code)\n    c) IDLE\n    d) Jupyter Notebook\n\n\
    **答案：a) PyCharm**\n\n- 13. 如何可以立即逐行运行 Python 代码？\n    a) 使用 IDE\n    b) 运行 Python\
