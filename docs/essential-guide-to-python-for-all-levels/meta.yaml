    \ can use the **open()** function with the mode set to 'r' (read). The **open()**\
    \ function returns a file object that you can use to read the file's contents.\
    \ Here's an example:\n\n```python\n# Open the file in read mode\nfile = open('example.txt',\
    \ 'r')\n\n# Read the entire file contents\ncontent = file.read()\n\n# Close the\
    \ file\nfile.close()\n\n# Print the contents\nprint(content)\n```\n\nIn the example\
    \ above, the **open()** function is used to open the file named \"example.txt\"\
    \ in read mode. The **read()** method is then called on the file object to read\
    \ the entire contents of the file. Finally, the file is closed using the **close()**\
    \ method. It's important to close the file after reading to free up system resources.\n\
    \nYou can also read the file line by line using the **readline()** method, which\
    \ reads one line at a time, or use the **readlines()** method to read all lines\
    \ into a list.\n\n**Writing Text Files:** To write data to a text file in Python,\
    \ you need to open the file in write mode ('w') or append mode ('a'). Opening\
    \ a file in write mode will overwrite its existing contents, while opening it\
    \ in append mode will add new data to the end of the file. Here's an example:\n\
    \n```python\n# Open the file in write mode\nfile = open('example.txt', 'w')\n\n\
    # Write data to the file\nfile.write('Hello, world!\\n')\nfile.write('This is\
    \ a new line.')\n\n# Close the file\nfile.close()\n```\n\nIn the above example,\
    \ the **open()** function is used to open the file named \"example.txt\" in write\
    \ mode. The **write()** method is then called on the file object to write the\
    \ desired data. The '\\n' character is used to insert a new line. Finally, the\
    \ file is closed using the **close()** method.\n\nAppending to an existing file\
    \ is similar, but you need to open the file in append mode by passing 'a' as the\
