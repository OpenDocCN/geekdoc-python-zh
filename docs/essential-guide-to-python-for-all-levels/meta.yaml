    \    a) 它们可以将所有生成的值一次性存储在内存中\n    b) 它们可以按需生成值，节省内存\n    c) 它们只能使用 next() 函数进行迭代\n\
    \    d) 它们只能生成有限序列\n    **答案：b) 它们可以按需生成值，节省内存**\n\n53. 在 Python 中如何迭代生成器？\n \
    \   a) 使用 for 循环\n    b) 使用 yield 关键字\n    c) 使用 generate 关键字\n    d) 使用 next()\
    \ 函数\n    **答案：a) 使用 for 循环**\n\n54. 当生成器遇到 yield 语句时会发生什么？\n    a) 它像带有 return\
    \ 语句的普通函数一样终止\n    b) 它暂时挂起执行并保存其内部状态\n    c) 它引发异常并停止执行\n    d) 它从函数开头继续执行\n\
    \    **答案：b) 它暂时挂起执行并保存其内部状态**\n\n55. 以下哪项是 Python 中代码组织和项目结构的最佳实践？\n    a) 为简单起见，将所有代码放在单个文件中\n\
