    ```\n\n在这个例子中，**re.findall()** 函数用于根据正则表达式模式，在给定文本中查找所有电子邮件地址的出现。\n\n编写一个功能完备的\
    \ C 扩展需要大量知识和努力，但这里有一个简单的例子来演示这个概念。让我们创建一个计算数字阶乘的 C 扩展：\n\n```c\n#include <Python.h>\n\
    \nlong long factorial(int n) {\n    if (n == 0)\n        return 1;\n    return\
    \ n * factorial(n - 1);\n}\n\nstatic PyObject* factorial_py(PyObject* self, PyObject*\
    \ args) {\n    int n;\n    if (!PyArg_ParseTuple(args, \"i\", &n))\n        return\
    \ NULL;\n    long long result = factorial(n);\n    return PyLong_FromLongLong(result);\n\
    }\n\nstatic PyMethodDef methods[] = {\n    {\"factorial\", factorial_py, METH_VARARGS,\
    \ \"Calculate factorial.\"},\n    {NULL, NULL, 0, NULL}\n};\n\nstatic struct PyModuleDef\
    \ module = {\n    PyModuleDef_HEAD_INIT,\n    \"myextension\",\n    \"My C Extension\"\
    ,\n    -1,\n    methods\n};\n\nPyMODINIT_FUNC PyInit_myextension(void) {\n   \
    \ return PyModule_Create(&module);\n}\n```\n\n在这个例子中，我们定义了 C 函数 **factorial()**\
    \ 来计算数字的阶乘。我们使用 Python/C API 通过定义一个包装 C 函数的方法 **factorial_py()** 将此函数暴露给 Python。扩展模块使用\
    \ **PyModule_Create()** 创建。\n\n要编译和使用这个 C 扩展，你需要创建一个 C 源文件（例如 **myextension.c**）并将其编译为共享库（例如\
    \ **myextension.so**）。然后，你可以在 Python 中导入并使用它：\n\n```python\nimport myextension\n\
    \nresult = myextension.factorial(5)\nprint(result)  # Output: 120\n```\n\n这是一个简化的例子，但它展示了创建\
