    \ and the generator's state is saved. The next time the generator is iterated\
    \ or **next()** is called on it, it resumes execution from where it left off,\
    \ updating the value of **n** and yielding the next value.\n\nYou can iterate\
    \ over the generator using a **for** loop:\n\n```\n\nfor num in countdown(5):\n\
    \    print(num)\n\n```\n\nThe output will be:\n\n+   5\n4\n3\n2\n1\n\nGenerators\
    \ are memory-efficient because they only generate values as requested, rather\
    \ than storing all values in memory. This makes them"
