    元组打包指的是将多个值组合成一个元组。示例：\n\n```python\nperson = (\"John\", 25, \"USA\")\n```\n\n\
    在上面的示例中，我们通过打包三个值：姓名、年龄和国家，创建了一个名为 **person** 的元组。\n\n元组解包允许你将元组的各个元素赋值给单独的变量。示例：\n\
    \n```python\nname, age, country = person\nprint(name)    # John\nprint(age)  \
