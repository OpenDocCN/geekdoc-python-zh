    2.  遍历：\n    - 深度优先遍历：以特定顺序访问顶点，在回溯之前尽可能深入地探索每条分支。\n    - 广度优先遍历：逐层访问顶点，在移动到下一层之前探索一个顶点的所有邻居。\n\
