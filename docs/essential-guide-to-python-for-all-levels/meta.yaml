- md: "26. Which programming language is commonly used for web scraping? a) Python\
    \ b) Java c) C++ d) Ruby\n\nAnswer: a) Python\n\n27. Which library is commonly\
    \ used for parsing HTML or XML content in Python web scraping? a) BeautifulSoup\
    \ b) Scrapy c) Requests d) Selenium\n\nAnswer: a) BeautifulSoup\n\n28. What is\
    \ the purpose of analyzing the website's structure in web scraping? a) To identify\
    \ the relevant data elements b) To check the website's popularity c) To determine\
    \ the website's server location d) To verify the website's security measures\n\
    \nAnswer: a) To identify the relevant data elements\n\n29. Which library is commonly\
    \ used for sending HTTP requests in Python web scraping? a) BeautifulSoup b) Scrapy\
    \ c) Requests d) Selenium\n\n**Answer: c) Requests**\n\n30. Concurrency and Multithreading:\
    \ 6. What is a thread in Python? a) A lightweight execution unit that enables\
    \ concurrent execution within a single process b) A separate process with its\
    \ own memory space c) A synchronization mechanism used to prevent race conditions\
    \ d) An event-driven programming model for handling I/O-bound tasks\n\n**Answer:\
    \ a) A lightweight execution unit that enables concurrent execution within a single\
    \ process**\n\n31. Why is synchronization important in multithreading? a) To improve\
    \ the performance of the application b) To prevent race conditions and ensure\
    \ data integrity c) To divide the workload across multiple CPU cores d) To handle\
    \ I/O-bound tasks efficiently\n\nAnswer: b) To prevent race conditions and ensure\
    \ data integrity\n\n32. What is locking in multithreading? a) A synchronization\
    \ technique used to control access to shared resources b) A mechanism for dividing\
    \ the workload across multiple threads c) A technique for handling I/O-bound tasks\
    \ without blocking the execution flow d) A library for parsing HTML or XML content\
    \ in multithreaded applications\n\nAnswer: a) A synchronization technique used\
    \ to control access to shared resources\n\n33. What is the main difference between\
    \ threads and processes in Python? a) Threads share the same memory space, while\
    \ processes have separate memory spaces. b) Threads are faster than processes.\
    \ c) Threads are used for I/O-bound tasks, while processes are used for CPU-bound\
    \ tasks. d) Threads can only run on a single CPU core, while processes can leverage\
    \ multiple CPU cores.\n\nAnswer: a) Threads share the same memory space, while\
    \ processes have separate memory spaces.\n\n34. Which library is commonly used\
    \ for asynchronous programming in Python? a) BeautifulSoup b) Scrapy c) Requests\
    \ d) asyncio\n\nAnswer: d) asyncio\n\n35. Which of the following is NOT a technique\
    \ used for performance optimization? a) Profiling and benchmarking b) Memory management\
    \ c) Algorithm analysis d) Code refactoring\n\nAnswer: d) Code refactoring\n\n\
    36. What is the purpose of profiling in performance optimization? a) To measure\
    \ the performance of code and identify bottlenecks b) To optimize memory allocation\
    \ and deallocation c) To evaluate the efficiency of algorithms d) To choose appropriate\
    \ data structures\n\n**Answer: a) To measure the performance of code and identify\
    \ bottlenecks**\n\n37. Which module in Python provides built-in profiling tools?\
    \ a) sys b) gc c) cProfile d) itertools\n\n**Answer: c) cProfile**\n\n38. What\
    \ does memory profiling focus on? a) Analyzing the time complexity of code b)\
    \ Tracking memory allocations and identifying memory leaks c) Choosing the most\
    \ suitable data structure d) Evaluating the space complexity of algorithms\n\n\
    **Answer: b) Tracking memory allocations and identifying memory leaks**\n\n39.\
    \ Which garbage collection technique is used by Python? a) Reference counting\
    \ b) Mark and sweep c) Generational garbage collection d) Cycle detection\n\n\
    Answer: c) Generational garbage collection\n\n40. What is the purpose of algorithm\
    \ analysis in performance optimization? a) To measure execution time of code b)\
    \ To optimize memory usage c) To evaluate the efficiency and scalability of code\
    \ d) To analyze resource usage patterns\n\nAnswer: c) To evaluate the efficiency\
    \ and scalability of code\n\n41. Which notation is commonly used to express algorithmic\
    \ complexity? a) APL notation b) ASCII notation c) Big O notation d) Binary notation\n\
    \nAnswer: c) Big O notation\n\n42. What is the benefit of using efficient data\
    \ structures in performance optimization? a) Reducing the frequency of garbage\
    \ collection cycles b) Optimizing memory usage patterns c) Minimizing function\
    \ calls d) Improving execution speed and resource usage\n\nAnswer: d) Improving\
    \ execution speed and resource usage\n\n43. How can list comprehensions and generator\
    \ expressions contribute to performance optimization? a) By reducing unnecessary\
    \ function calls b) By minimizing memory usage c) By optimizing code readability\
    \ d) By providing concise and efficient ways to process lists\n\nAnswer: d) By\
    \ providing concise and efficient ways to process lists\n\n44. What is the role\
    \ of profiling tools in performance optimization? a) To measure the impact of\
    \ optimizations b) To parallelize computations c) To distribute computations across\
    \ multiple cores d) To identify performance bottlenecks and optimize critical\
    \ code sections\n\nAnswer: d) To identify performance bottlenecks and optimize\
    \ critical code sections\n\n## Advanced Python Concepts and Application Domains\n\
    \n### CHAPTER 3\n\n### Decorators\n\nDecorators in Python are a powerful feature\
    \ that allows you to modify the behavior of functions or classes without changing\
    \ their source code. Decorators are functions that take another function as input\
    \ and extend or modify its functionality. They are denoted by the @ symbol followed\
    \ by the name of the decorator function, placed just before the definition of\
    \ the decorated function or class.\n\nHere's a simple example of a decorator function:\n\
    \n```python\ndef my_decorator(func):\n    def wrapper():\n        print(\"Before\
    \ function execution\")\n        func()\n        print(\"After function execution\"\
    )\n    return wrapper\n```\n\nIn this example, **my_decorator** is a decorator\
    \ function that takes a function **func** as input. It defines an inner function\
    \ **wrapper** that adds some additional behavior before and after calling **func**.\
    \ The decorator returns the **wrapper** function.\n\nTo apply the decorator to\
    \ a function, you can use the @ symbol:\n\n```python\n@my_decorator\ndef my_function():\n\
    \    print(\"Inside my_function\")\n\nmy_function()\n```\n\nWhen you call **my_function()**,\
    \ it will be automatically wrapped by the **my_decorator** function. The output\
    \ will be:\n\n```\nBefore function execution\nInside my_function\nAfter function\
    \ execution\n```\n\nDecorators can also take arguments. In such cases, you need\
    \ to add an extra layer of wrapper functions. Here's an example:\n\n```python\n\
    def repeat(num_times):\n    def decorator(func):\n        def wrapper(*args, **kwargs):\n\
    \            for _ in range(num_times):\n                result = func(*args,\
    \ **kwargs)\n            return result\n        return wrapper\n    return decorator\n\
    ```\n\nIn this case, the **repeat** decorator takes an argument **num_times**\
    \ and returns another decorator function. The returned decorator takes a function\
    \ **func** and returns the **wrapper** function. The **wrapper** function is responsible\
    \ for executing **func** multiple times based on the **num_times** argument.\n\
    \nYou can use this decorator as follows:\n\n```python\n@repeat(num_times=3)\n\
    def greet(name):\n    print(f\"Hello, {name}!\")\n\ngreet(\"Alice\")\n```\n\n\
    The output will be:\n\n```\nHello, Alice!\nHello, Alice!\nHello, Alice!\n```\n\
    \nThis is just a basic introduction to decorators in Python. They are widely used\
    \ in Python to add functionality such as logging, timing, authentication, and\
    \ more to functions or classes without modifying their original code. Decorators\
    \ provide a flexible way to modify or extend the behavior of functions and classes,\
    \ making them a powerful tool in Python programming.\n\n### Generators\n\nGenerators\
    \ in Python are a type of iterable that can be iterated over using a **for** loop\
    \ or accessed using the **next()** function. They allow you to generate a sequence\
    \ of values dynamically, on-the-fly, without storing them all in memory at once.\
    \ Generators are defined as functions that use the **yield** keyword instead of\
    \ **return**.\n\nHere's an example of a simple generator function:\n\n```python\n\
    def countdown(n):\n    while n > 0:\n        yield n\n        n -= 1\n```"
