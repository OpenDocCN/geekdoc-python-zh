    为分类、回归和聚类等常见任务提供了预构建模型，使得更容易上手 TensorFlow。

    - 4. TensorFlow Datasets：TensorFlow Datasets (TFDS) 是一个用于机器学习的即用型数据集集合。它提供了一个简单的
    API 用于下载和管理数据集，使得访问流行的基准数据集并快速开始训练模型变得方便。

    - 5. TensorFlow Hub：TensorFlow Hub 是一个预训练机器学习模型的仓库，可用于迁移学习。它提供了适用于各种任务的广泛模型，例如图像分类、自然语言处理等。TensorFlow
    Hub 使你能够轻松地将预训练模型整合到你自己的项目中。

    - 6. TensorFlow Lite：TensorFlow Lite 是 TensorFlow 的轻量级版本，专为移动和嵌入式设备设计。它支持在资源受限的平台上高效部署机器学习模型，使其适用于移动应用、物联网设备和边缘计算等应用。

    - 7. TensorFlow Serving：TensorFlow Serving 是一个用于在生产环境中提供机器学习模型服务的框架。它提供了一个灵活的架构，用于将训练好的模型部署为可扩展且高效的
    Web 服务，允许与其他系统轻松集成。

    - 8. TensorFlow.js：TensorFlow.js 将 TensorFlow 的能力带到了 Web 浏览器和 Node.js 环境中。它允许你直接在
    JavaScript 中训练和运行机器学习模型，使得构建具有机器学习能力的基于浏览器的应用程序成为可能。


