    Queues: A queue is a first-in, first-out (FIFO) data structure, similar to a queue
    of people waiting in line. The first item added is the first one to be removed.
    Queues support two main operations:


    +   1. Enqueue: Adds an element to the end of the queue.

    2. Dequeue: Removes and returns the front element of the queue.


    Similarly to stacks, Python does not have a built-in queue data structure, but
    you can use a list to implement a queue. However, using a list for a queue can
    be inefficient for large queues because removing elements from the front of a
    list requires shifting all subsequent elements. To overcome this, you can use
    the **collections.deque** class, which provides an optimized double-ended queue.'
