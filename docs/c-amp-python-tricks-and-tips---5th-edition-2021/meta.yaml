    \    gamewindow.fill(white)\n    sprite(x,y)\n    pygame.display.update()\n\n\
    pygame.quit()\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_39_0.png)\n\nSTEP\
    \ 8 Copy the code down and using the left and right arrow keys on the keyboard\
