    # Common Coding Mistakes


    When you start something new you’re inevitably going to make mistakes, this is
    purely down to inexperience and those mistakes are great teachers in themselves.
    However, even experts make the occasional mishap. Thing is, to learn from them
    as best you can.


    # X=MISTAKE, PRINT Y


    There are many pitfalls for the programmer to be aware of, far too many to be
    listed here. Being able to recognise a mistake and fix it is when you start to
    move into more advanced territory.


    # SMALL CHUNKS


    It would be wonderful to be able to work like Neo from The Matrix movies. Simply
    ask, your operator loads it into your memory and you instantly know everything
    about the subject. Sadly though, we can’t do that. The first major pitfall is
    someone trying to learn too much, too quickly. So take coding in small pieces
    and take your time.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_67_0.png)


    # EASY VARIABLES


    Meaningful naming for variables is a must to eliminate common coding mistakes.
    Having letters of the alphabet is fine but what happens when the code states there’s
    a problem with x variable. It’s not too difficult to name variables lives, money,
    player1 and so on.


