    \ import *\npygame.init()\n\ngamewindow=pygame.display.set_mode((800,600))\npygame.display.set_caption(\"\
    Adventure Game\")\n\nrunning=True\n\nwhile running:\n    for event in pygame.event.get():\n\
    \        if event.type==QUIT:\n            running=False\n            pygame.quit()\n\
    ```\n\n**步骤 2** 让我们创建一个简单的游戏就绪窗口，并为其命名：\n\n```python\ngamewindow=pygame.display.set_mode((800,600))\n\
    pygame.display.set_caption(\"Adventure Game\")\n```\n\n你可以看到，输入第一行代码后，你需要点击回 IDLE\
    \ Shell 继续输入代码；此外，你可以将窗口标题更改为任何你喜欢的名称。\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_37_1.png)\n\
