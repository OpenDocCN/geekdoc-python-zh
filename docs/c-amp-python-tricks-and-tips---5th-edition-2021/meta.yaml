    \n步骤8 你可以将 Python 中创建的变量传递给文件。也许你想将圆周率的值写入文件。你可以从 math 模块调用圆周率，创建一个新文件，并将圆周率的输出传递到新文件中：\n\
    \n```\nimport math\nprint(\"Value of Pi is: \",math.pi)\nprint(\"\\nWriting to\
    \ a file now...\")\n```\n\n步骤9 现在让我们创建一个名为 pi 的变量，并为其赋值圆周率：\n\n```\npi=math.pi\n\
    ```\n\n你还需要创建一个新文件来写入圆周率：\n\n```\nt=open(\"/home/pi/Documents/pi.txt\",\"w\")\n\
    ```\n\n请记住将文件位置更改为适合你特定系统设置的路径。\n\n步骤10 最后，你可以使用字符串格式化来调用变量并将其写入文件，然后提交更改并关闭文件：\n\
    \n```\nt.write(\"Value of Pi is: {}\".format(pi))\nt.close()\n```\n\n从结果中你可以看到，你可以将任何变量传递给文件。\n\
    \n## 异常\n\n在编码时，你自然会遇到一些超出你控制范围的问题。假设你要求用户除以两个数字，而他们试图除以零。这将产生错误并中断你的代码。\n\n###\
    \ 异常对象\n\nPython 包含异常对象来处理代码中意外的错误，而不是停止代码的流程。你可以通过创建可能发生异常的条件来对抗错误。\n\n步骤1 你可以通过简单地尝试将一个数字除以零来创建异常错误。这将返回\
    \ ZeroDivisionError: Division by zero 消息，如截图所示。ZeroDivisionError 部分是异常类，这样的类有很多。\n\
    \n步骤2 当 Python 遇到代码中固有的错误时，大多数异常会自动引发。但是，你可以创建自己的异常，旨在包含潜在错误并对其做出反应，而不是让代码失败。\n\
    \n步骤3 你可以使用 raise exception 函数在 Python 中创建我们自己的错误处理代码。假设你的代码让你在宇宙中穿梭，但穿梭过多会导致曲速核心破裂。为了防止游戏因曲速核心超新星爆发而退出，你可以创建一个自定义异常：\n\
    \n```\nraise Exception(\"warp core breach\")\n```\n\n步骤4 要捕获代码中的任何错误，你可以将潜在错误封装在\
    \ try: 块中。此块由 try、except、else 组成，代码放在 try: 中，然后如果有异常则执行某些操作，否则执行其他操作。\n\n步骤5 例如，使用除以零的错误。你可以创建一个异常，让代码能够处理错误，而不会因为问题导致\
    \ Python 退出：\n\n```\ntry:\n    a=int(input(\"Enter the first number: \"))\n  \
    \  b=int(input(\"Enter the second number: \"))\n    print(a/b)\nexcept ZeroDivisionError:\n\
    \    print(\"You have tried to divide by zero!\")\nelse:\n    print(\"You didn't\
    \ divide by zero. Well done!\")\n```\n\n步骤6 你可以使用异常来处理各种有用的任务。使用我们之前教程中的一个例子，假设你想打开一个文件并写入内容：\n\
    \n```\ntry:\n    txt = open(\"/home/pi/Documents/textfile.txt\", \"r\")\n    txt.write(\"\
    This is a test. Normal service will shortly resume!\")\nexcept IOError:\n    print\
    \ (\"Error: unable to write the file. Check permissions\")\nelse:\n    print (\"\
    Content written to file successfully. Have a nice day.\")\n    txt.close()\n```\n\
    \n步骤7 显然，这不会起作用，因为文件 textfile.txt 是以只读方式打开的（\"r\" 部分）。因此，在这种情况下，你创建了一个使用 IOError\
    \ 类的异常来通知用户权限不正确，而不是让 Python 告诉你你做错了什么。\n\n步骤8 自然，你可以通过将 \"r\" 只读实例更改为 \"w\" 来快速解决问题。正如你已经知道的，这将创建文件、写入内容，然后将更改提交到文件。最终结果将报告不同的情况，在这种情况下，是代码的成功执行。\n\
    \n步骤9 你也可以使用 finally: 块，它的工作方式类似，但不能与 else 一起使用。使用我们步骤6中的例子：\n\n```\ntry:\n  \
    \  txt = open(\"/home/pi/Documents/textfile.txt\", \"r\")\n    try:\n        txt.write(\"\
    This is a test. Normal service will shortly resume!\")\n    finally:\n       \
    \ print (\"Content written to file successfully. Have a nice day.\")\n       \
    \ txt.close()\nexcept IOError:\n    print (\"Error: unable to write the file.\
    \ Check permissions\")\n```\n\n步骤10 和以前一样，由于你使用了 \"r\" 只读权限，会发生错误。如果你将其更改为 \"\
    w\"，那么代码将执行而不会在 IDLE Shell 中显示错误。不用说，第一次正确编写异常代码可能很棘手。但通过练习，你会掌握它的。\n\n## Python\
    \ 图形\n\n虽然在屏幕上处理文本，无论是游戏还是程序，都很棒，但有时一点图形表示也不会错。Python 3 有多种包含图形的方式，而且它们的功能强大得令人惊讶。\n\
    \n### 图形化\n\n你可以绘制简单的图形、线条、正方形等，或者你可以使用众多可用的 Python 模块之一来呈现一些壮观的效果。\n\n**步骤1**\
    \ 开始学习 Python 图形的最佳图形模块之一是 Turtle。顾名思义，Turtle 模块基于许多学校使用的海龟机器人，这些机器人可以被编程在地板上的大张纸上绘制东西。可以使用以下命令导入\
    \ Turtle 模块：`import turtle`。\n\n**步骤2** 让我们从绘制一个简单的圆开始。新建一个文件，然后输入以下代码：\n\n```\n\
    import turtle\nturtle.circle(50)\nturtle.getscreen()._root.mainloop()\n```\n\n\
    像往常一样，按 F5 保存代码并执行它。现在将打开一个新窗口，“Turtle” 将绘制一个圆。\n\n**步骤3** 命令 `turtle.circle(50)`\
    \ 是在屏幕上绘制圆的部分，其中 50 是大小。你可以随意调整大小，增加到 100、150 甚至更大；你可以通过输入：`turtle.circle(50,\
    \ 180)` 来绘制圆弧，其中大小是 50，但你告诉 Python 只绘制圆的 180°。\n\n**步骤4** 圆代码的最后一部分告诉 Python 保持绘制发生的窗口打开，以便用户可以点击关闭它。现在，让我们画一个正方形：\n\
    \n```\nimport turtle\nprint(\"Drawing a square...\")\nfor t in range(4):\n   \
    \ turtle.forward(100)\n    turtle.left(90)\nturtle.getscreen()._root.mainloop()\n\
    ```\n\n你可以看到我们插入了一个循环来绘制正方形的边。"
