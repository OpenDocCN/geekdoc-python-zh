    n\")\ny1=int(input(\"Enter the first year: \"))\ny2=int(input(\"Enter the second\
    \ year: \"))\nleaps=calendar.leapdays(y1, y2)\nprint(\"Number of leap years between\"\
    , y1, \"and\", y2, \"is:\", leaps)\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_29_2.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_29_3.png)\n\nSTEP 5 You can also create\
    \ a program that will display all the days, weeks and months within a given year:\n\
    \n```python\nimport calendar\nyear=int(input(\"Enter the year to display: \"))\n\
