    # OS Module


    The OS module allows you to interact directly with the built-in commands found
    in your operating system. Commands vary depending on the OS you’re running, as
    some will work with Windows whereas others will work with Linux and macOS.


    # INTO THE SYSTEM


    One of the primary features of the OS module is the ability to list, move, create,
    delete and otherwise interact with files stored on the system, making it the perfect
    module for backup code.


    You can start the OS module with some simple functions to see how it interacts
    with the operating system environment that Python is running on. If you’re using
    Linux or the Raspberry Pi, try this:


    ```

    import os

    home=os.getcwd()

    print(home)

    ```


    ![](img/763cdde75d55911fbf7836a707fd3c3b_31_0.png)


    The Windows output is different as that’s the current working directory of Python,
    as determined by the system; as you might suspect, the os.getcwd() function is
    asking Python to retrieve the Current Working Directory. Linux users will see
    something along the same lines as the Raspberry Pi, as will macOS users.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_31_1.png)


    The returned result from printing the variable home is the current user’s home
    folder on the system. In our example that’s /home/pi; it will be different depending
    on the user name you log in as and the operating system you use. For example,
    Windows 10 will output: C:\Program Files (x86)\Python36-32.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_31_2.png)


    Yet another interesting element to the OS module, is its ability to launch programs
    that are installed in the host system. For instance, if you wanted to launch the
    Chromium browser from within a Python program you can use the command:


    ```

    import os

    browser=os.system("/usr/bin/chromium-browser")

    ```


    ![](img/763cdde75d55911fbf7836a707fd3c3b_31_3.png)'
- md: "## OS Module\n\nSTEP 5 The os.system() function is what allows interaction\
    \ with external programs; you can even call up previous Python programs using\
    \ this method. You will obviously need to know the full path and program file\
    \ name for it to work successfully. However, you can use the following:\n\n```python\n\
    import os\nos.system('start chrome \"https://www.youtube.com/feed/music\"')\n\
    ```\n\nSTEP 6 For Step 5's example we used Windows, to show that the OS module\
    \ works roughly the same across all platforms. In that case, we opened YouTube's\
    \ music feed page, so it is therefore possible to open specific pages:\n\n```python\n\
    import os\nos.system('chromium-browser \"http://bdmpublications.com/\"')\n```\n\
    \nSTEP 7 Note in the previous step's example the use of single and double-quotes.\
    \ The single quotes encase the entire command and launching Chromium, whereas\
    \ the double quotes open the specified page. You can even use variables to call\
    \ multiple tabs in the same browser:\n\n```python\nimport os\na=('chromium-browser\
    \ \"http://bdmpublications.com/\"')\nb=('chromium-browser \"http://www.google.co.uk\"\
    ')\nos.system(a + b)\n```\n\nSTEP 8 The ability to manipulate directories, or\
    \ folders if you prefer, is one of the OS module's best features. For example,\
    \ to create a new directory you can use:\n\n```python\nimport os\nos.mkdir(\"\
    NEW\")\n```\n\nThis creates a new directory within the Current Working Directory,\
    \ named according to the object in the mkdir function.\n\nSTEP 9 You can also\
    \ rename any directories you've created by entering:\n\n```python\nimport os\n\
    os.rename(\"NEW\", \"OLD\")\n```\n\nTo delete them:\n\n```python\nimport os\n\
    os.rmdir(\"OLD\")\n```\n\nSTEP 10 Another module that goes together with OS is\
    \ shutil. You can use the shutil module together with OS and time to create a\
    \ time-stamped backup directory, and copy files into it:\n\n```python\nimport\
    \ os, shutil, time\nroot_src_dir = r'/home/pi/Documents'\nroot_dst_dir = '/home/pi/backup/'\
    \ + time.asctime()\n\nfor src_dir, dirs, files in os.walk(root_src_dir):\n   \
    \ dst_dir = src_dir.replace(root_src_dir, root_dst_dir, 1)\n    if not os.path.exists(dst_dir):\n\
    \        os.makedirs(dst_dir)\n    for file_ in files:\n        src_file = os.path.join(src_dir,\
    \ file_)\n        dst_file = os.path.join(dst_dir, file_)\n        if os.path.exists(dst_file):\n\
    \            os.remove(dst_file)\n        shutil.copy(src_file, dst_dir)\n\nprint(\"\
    >>>>>>>>>>>Backup complete<<<<<<<<<<\")\n```\n\n## Random Module\n\nThe random\
    \ module is one you will likely come across many times in your Python programming\
    \ lifetime; as the name suggests, it's designed to create random numbers or letters.\
    \ However, it's not exactly random but it will suffice for most needs.\n\n###\
    \ RANDOM NUMBERS\n\nThere are numerous functions within the random module, which\
    \ when applied can create some interesting and very useful Python programs.\n\n\
    STEP 1 Just as with other modules you need to import random before you can use\
    \ any of the functions we're going to look at in this tutorial. Let's begin by\
    \ simply printing a random number from 1 to 5:\n\n```python\nimport random\nprint(random.randint(0,5))\n\
    ```\n\nSTEP 2 In our example the number four was returned. However, enter the\
    \ print function a few more times and it will display different integer values\
    \ from the set of numbers given, zero to five. The overall effect, although pseudo-random,\
    \ is adequate for the average programmer to utilise in their code.\n\nSTEP 3 For\
    \ a bigger set of numbers, including floating point values, you can extend the\
    \ range by using the multiplication sign:\n\n```python\nimport random\nprint(random.random()\
    \ *100)\n```\n\nWill display a floating point number between 0 and 100, to the\
    \ tune of around fifteen decimal points.\n\nSTEP 4 However, the random module\
    \ isn't used exclusively for numbers. You can use it to select an entry from a\
    \ list from random, and the list can contain anything:\n\n```python\nimport random\n\
    random.choice([\"Conan\", \"Valeria\", \"Belit\"])\n```\n\nThis will display one\
    \ of the names of our adventurers at random, which is a great addition to a text\
    \ adventure game.\n\nSTEP 5 You can extend the previous example somewhat by having\
    \ random.choice() select from a list of mixed variables. For instance:\n\n```python\n\
    import random\nlst=[\"David\", 44, \"BDM Publications\", 3245.23,\n\"Pi\", True,\
    \ 3.14, \"Python\"]\nrnd=random.choice(lst)\nprint(rnd)\n```\n\nSTEP 6 Interestingly,\
    \ you can also use a function within the random module to shuffle the items in\
    \ the list, thus adding a little more randomness into the equation:\n\n```python\n\
    random.shuffle(lst)\nprint(lst)\n```\n\nThis way, you can keep shuffling the list\
    \ before displaying a random item from it.\n\nSTEP 7 Using shuffle, you can create\
    \ an entirely random list of numbers. For example, within a given range:\n\n```python\n\
    import random\nlst=[[i] for i in range(20)]\nrandom.shuffle(lst)\nprint(lst)\n\
    ```\n\nKeep shuffling the list and you can have a different selection of items\
    \ from 0 to 20 every time.\n\nSTEP 8 You can also select a random number from\
    \ a given range in steps, using the start, stop, step loop:\n\n```python\nimport\
    \ random\nfor i in range(10):\n    print(random.randrange(0, 200, 7))\n```\n\n\
    Results will vary but you get the general idea as to how it works.\n\nSTEP 9 Let's\
    \ use an example piece of code which flips a virtual coin ten thousand times and\
    \ counts how many times it will land on heads or tails:\n\n```python\nimport random\n\
    output={\"Heads\":0, \"Tails\":0}\ncoin=list(output.keys())\n\nfor i in range(10000):\n\
    \    output[random.choice(coin)]+=1\n\nprint(\"Heads:\", output[\"Heads\"])\n\
    print(\"Tails:\", output[\"Tails\"])\n```\n\nSTEP 10 Here's an interesting piece\
    \ of code. Using a text file containing 466 thousand words, you can pluck a user\
    \ generated number of words from the file (text file found at: www.github.com/dwyl/english-words):\n\
    \n```python\nimport random\n\nprint(\">>>>>>>>>>>Random Word Finder<<<<<<<<<<\"\
    )\nprint(\"\\nUsing a 466K English word text file I can pick any words at random.\\\
    n\")\n\nwds=int(input(\"\\nHow many words shall I choose? \"))\n\nwith open(\"\
    /home/pi/Downloads/words.txt\", \"rt\") as f:\n    words = f.readlines()\n   \
    \ words = [w.rstrip() for w in words]\n\nprint(\"-----------------------\")\n\n\
    for w in random.sample(words, wds):\n    print(w)\n\nprint(\"-----------------------\"\
    )\n```\n\n## Tkinter Module\n\nWhile running your code from the command line,\
    \ or even in the Shell, is perfectly fine, Python is capable of so much more.\
    \ The Tkinter module enables the programmer to set up a Graphical User Interface\
    \ to interact with the user, and it’s surprisingly powerful too.\n\n### GETTING\
    \ GUI\n\nTkinter is easy to use but there’s a lot more you can do with it. Let’s\
    \ start by seeing how it works and getting some code into it. Before long you\
    \ will discover just how powerful this module really is.\n\n**STEP 1** Tkinter\
    \ is usually built into Python 3. However, if it’s available when you enter: `import\
    \ tkinter`, then you need to `pip install tkinter` from the command prompt. We\
    \ can start to import modules differently than before, to save on typing and by\
    \ importing all their contents:\n\n```python\nimport tkinter as tk\nfrom tkinter\
    \ import *\n```\n\n**STEP 2** It’s not recommended to import everything from a\
    \ module using the asterisk but it won’t do any harm normally. Let’s begin by\
    \ creating a basic GUI window, enter:\n\n```python\nwind=Tk()\n```\n\nThis creates\
    \ a small, basic window. There’s not much else to do at this point but click the\
    \ X in the corner to close the window.\n\n**STEP 3** The ideal approach is to\
    \ add mainloop() into the code to control the Tkinter event loop, but we’ll get\
    \ to that soon. You’ve just created a Tkinter widget and there are several more\
    \ we can play around with:\n\n```python\nbtn=Button()\nbtn.pack()\nbtn[\"text\"\
    ]=\"Hello everyone!\"\n```\n\nThe first line focuses on the newly created window.\
    \ Click back into the Shell and continue the other lines.\n\n**STEP 4** You can\
    \ combine the above into a New File:\n\n```python\nimport tkinter as tk\nfrom\
    \ tkinter import *\nbtn=Button()\nbtn.pack()\nbtn[\"text\"]=\"Hello everyone!\"\
    \n```\n\nThen add some button interactions:\n\n```python\ndef click():\n    print(\"\
    You just clicked me!\")\nbtn[\"command\"]=click\n```"
