  md: "# Character Literals\n\nIn C++ a literal is an object or variable that once\
    \ defined remains the same throughout the code. However, a character literal is\
    \ defined by a backslash, such as the \\n you've been using at the end of a cout\
    \ statement to signify a new line.\n\n# ESCAPE SEQUENCE\n\nWhen used in something\
    \ like a cout statement, character literals are also called Escape Sequence Codes.\
    \ They allow you to insert a quote, an alert, new line and much more.\n\nSTEP\
    \ 1 Create a new C++ file and enter the relevant headers:\n\n```\n#include <iostream>\n\
    using namespace std;\n\nint main ()\n{\n\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_47_0.png)\n\
    \nSTEP 3 If you wanted to insert speech quotes inside a cout statement, you would\
    \ have to use a backslash as it already uses quotes:\n\n```\n#include <iostream>\n\
    using namespace std;\n\nint main ()\n{\n    cout << \"Hello, user. This is how\
    \ to use \"quotes\".\";\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_47_1.png)\n\
    \nSTEP 2 You've already experienced the \\n character literal placing a new line\
    \ wherever it's called. The line: `cout << \"Hello\\n\" << \"I'm a C++\\n\" <<\
    \ \"Program!\\n\";` outputs three lines of text, each starting after the last\
    \ \\n.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_47_2.png)\n\nSTEP 4 There's\
    \ even a character literal that can trigger an alarm. In Windows 10, it's the\
    \ notification sound that chimes when you use \\a. Try this code, and turn up\
    \ your sound.\n\n```\n#include <iostream>\nusing namespace std;\n\nint main ()\n\
    {\n    cout << \"ALARM! \\a\";\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_47_3.png)"
