    \           running=False\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_38_1.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_38_2.png)\n\nSTEP 6 Let's quickly go\
    \ through the code changes. We've defined two colours, black and white together\
