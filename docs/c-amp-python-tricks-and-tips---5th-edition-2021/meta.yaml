    months

    ```


    第3步 你可以将分组的元组创建为包含多组数据的列表。例如，这里有一个名为NPC（非玩家角色）的元组，包含冒险游戏中角色名称和他们的战斗评级：

    ```

    NPC = [("Conan", 100), ("Belit", 80), ("Valeria", 95)]

