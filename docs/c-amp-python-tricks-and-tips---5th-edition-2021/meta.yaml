    \n![](img/763cdde75d55911fbf7836a707fd3c3b_42_4.png)\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_43_0.png)\n\
    \n## C++ 输入/输出\n\n当你编写代码，要求用户输入，然后使用该输入生成用户可以看到的内容时，会有一种满足感。即使只是询问某人的名字并显示个性化的欢迎信息，这也是一个巨大的飞跃。\n\
    \n用户交互、字符字面量、定义常量以及文件输入和输出都将在接下来的页面中介绍。所有这些都有助于你更好地理解 C++ 程序的工作原理。\n\n## 用户交互\n\
    \n没有什么比创建一个能响应你的程序更令人满意的了。这种基本的用户交互是任何语言教学中最常见的方面之一，通过它，你能做的远不止简单地按名字问候用户。\n\n\
    ### 你好，戴夫\n\n你已经在我们的代码中使用了 `cout`，即标准输出流。现在你将使用 `cin`，即标准输入流，来提示用户响应。\n\n第 1 步\
    \ 你希望用户输入到程序中的任何内容都需要存储在系统内存中的某个地方，以便检索和使用。因此，任何输入都必须首先声明为一个变量，以便用户可以使用它。首先创建一个带有头文件的空白\
    \ C++ 文件。\n\n第 2 步 变量的数据类型也必须与你希望从用户那里获得的输入类型相匹配。例如，要询问用户的年龄，你可以像这样使用整数：\n\n```cpp\n\
    #include <iostream>\nusing namespace std;\n\nint main ()\n{\n    int age;\n  \
    \  cout << \"what is your age: \";\n    cin >> age;\n\n    cout <<\"\\nYou are\
    \ \" << age << \" years old.\\n\";\n}\n```\n\n第 3 步 `cin` 命令的工作方式与 `cout` 命令相反。在第一个\
    \ `cout` 行中，你正在向屏幕输出“what is your age”，如尖括号所示。`cin` 使用相反方向的尖括号，表示输入。输入被放入整数 `age`\
    \ 中，并在第二个 `cout` 命令中调用。构建并运行代码。\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_45_0.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_45_1.png)\n\n第 4 步 如果你要问一个问题，你需要将输入存储为字符串；要询问用户的名字，你可以使用：\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    string\
    \ name;\n    cout << \"what is your name: \";\n    cin >> name;\n\n    cout <<\
    \ \"\\nHello, \" << name << \". I hope you’re well today?\\n\";\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_45_2.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_45_3.png)"
