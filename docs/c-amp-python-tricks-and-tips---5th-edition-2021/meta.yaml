    \ Loop Begins\n    for( int num = 1; num < 30; num = num +1 )\n    {\n       \
    \ cout << \"Number: \" << num << endl;\n    }\n\n    return 0;\n}\n```\n\nSTEP\
    \ 5 A for loop is quite a neat package in C++, all contained within its own brackets,\
