- md: "## COUNTING LOOPS\n\nRemember that in Python a loop doesn't count the last\
    \ number you specify in a range. So if you wanted the loop to count from 1 to\
    \ 10, then you will need to use:\n\n```\nn = list(range(1, 11))\n```\n\nWhich\
    \ will return 1 to 10.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_70_0.png)\n\
    \n## CASE SENSITIVE\n\nPython is a case sensitive programming language, so you\
    \ will need to check any variables you assign. For example, `Lives=10` is a different\
    \ variable to `lives=10`, calling the wrong variable in your code can have unexpected\
    \ results.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_70_1.png)\n\n## BRACKETS\n\
    \nEveryone forgets to include that extra bracket they should have added to the\
    \ end of the statement. Python relies on the routine having an equal amount of\
    \ closed brackets to open brackets, so any errors in your code could be due to\
    \ you forgetting to count your brackets; including square brackets.\n\n```\ndef\
    \ print_game_status(self):\n    print (board[len(self.missed_letters)])\n    print\
    \ ('Word: ' + self.hide_word())\n    print ('Letters Missed: ',)\n    for letter\
    \ in self.missed_letters:\n        print (letter,)\n    print ()\n    print ('Letters\
    \ Guessed: ',)\n    for letter in self.guessed_letters:\n        print (letter,)\n\
    \    print ()\n```\n\n## COLONS\n\nIt's common for beginners to forget to add\
    \ a colon to the end of a structural statement, such as:\n\n```\nclass Hangman:\n\
    def guess(self, letter):\n```\n\nAnd so on. The colon is what separates the code,\
    \ and creates the indents to which the following code belongs to.\n\n```\nclass\
    \ Hangman:\n    def __init__(self, word):\n        self.word = word\n        self.missed_letters\
    \ = []\n        self.guessed_letters = []\n\n    def guess(self, letter):\n  \
    \      if letter in self.word and letter not in self.guessed_letters:\n      \
    \      self.guessed_letters.append(letter)\n        elif letter not in self.word\
    \ and letter not in self.missed_letters:\n            self.missed_letters.append(letter)\n\
    \        else:\n            return False\n        return True\n\n    def hangman_over(self):\n\
    \        return self.hangman_won() or (len(self.missed_letters) == 6)\n\n    def\
    \ hangman_won(self):\n        if '_' not in self.hide_word():\n            return\
    \ True\n        return False\n\n    def hide_word(self):\n        rtn = ''\n \
    \       for letter in self.word:\n            if letter not in self.guessed_letters:\n\
    \                rtn += '_'\n            else:\n                rtn += letter\n\
    \        return rtn\n```\n\n## OPERATORS\n\nUsing the wrong operator is also a\
    \ common mistake to make. When you're performing a comparison between two values,\
    \ for example, you need to use the equality operator (a double equals, `==`).\
    \ Using a single equal (`=`) is an assignment operator that places a value to\
    \ a variable (such as, `lives=10`).\n\n```\n1 b = 5\n2 c = 10\n3 d = 10\n4 b ==\
    \ c #false because 5 is not equal to 10\n5 c == d #true because 10 is equal to\
    \ 10\n```\n\n## OPERATING SYSTEMS\n\nWriting code for multiple platforms is difficult,\
    \ especially when you start to utilise the external commands of the operating\
    \ system. For example, if your code calls for the screen to be cleared, then for\
    \ Windows you would use `cls`. Whereas, for Linux you need to use `clear`. You\
    \ need to solve this by capturing the error and issuing it with an alternative\
    \ command.\n\n```\n# Code to detect error for using a different OS\nrun=1\nwhile(run==1):\n\
    \    try:\n        os.system('clear')\n    except OSError:\n        os.system('cls')\n\
    \    print('\\n>>>>>>>>>Python 3 File Manager<<<<<<<<<<\\n')\n```\n\n## Beginner\
    \ C++ Mistakes\n\nThere are many pitfalls the C++ developer can encounter, especially\
    \ as this is a more complex and often unforgiving language to master. Beginners\
    \ need to take C++ a step at a time and digest what they've learned before moving\
    \ on.\n\n## VOID(C++, MISTAKES)\n\nAdmittedly it's not just C++ beginners that\
    \ make the kinds of errors we outline on these pages, even hardened coders are\
    \ prone to the odd mishap here and there. Here are some common issues to try and\
    \ avoid.\n\n## UNDECLARED IDENTIFIERS\n\nA common C++ mistake, and to be honest\
    \ a common mistake with most programming languages, is when you try and output\
    \ a variable that doesn't exist. Displaying the value of x on-screen is fine but\
    \ not if you haven't told the compiler what the value of x is to begin with.\n\
    \n## STD NAMESPACE\n\nReferencing the Standard Library is common for beginners\
    \ throughout their code, but if you miss the std:: element of a statement, your\
    \ code errors out when compiling. You can combat this by adding:\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_71_0.png)\n\
    \n```\nusing namespace std;\n```\n\nUnder the #include part and simply using cout,\
    \ cin and so on from then on.\n\n```\n#include <iostream>\nusing namespace std;\n\
    \nint main()\n{\n    int a, b, c, d;\n    a=10;\n    b=20;\n    c=30;\n    d=40;\n\
    \n    cout << a, b, c, d;\n}\n```\n\n## SEMICOLONS\n\nRemember that each line\
    \ of a C++ program must end with a semicolon. If it doesn't then the compiler\
    \ treats the line with the missing semicolon as the same line with the next semicolon\
    \ on. This creates all manner of problems when trying to compile, so don't forget\
    \ those semicolons.\n\n## GCC OR G++\n\nIf you're compiling in Linux then you\
    \ will no doubt come across gcc and g++. In short, gcc is the Gnu Compiler Collection\
    \ (or Gnu C Compiler as it used to be called) and g++ is the Gnu ++ (the C++ version)\
    \ of the compiler. If you're compiling C++ then you need to use g++, as the incorrect\
    \ compiler drivers will be used.\n\n```\n#include <iostream>\n\nint main()\n{\n\
    \    int a, b, c, d;\n    a=10;\n    b=20;\n    c=30;\n    d=40;\n\n    std::cout\
    \ << a, b, c, d;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_71_1.png)\n\
    \n## COMMENTS (AGAIN)\n\nIndeed the mistake of never making any comments on code\
    \ is back once more. As we've previously bemoaned, the lack of readable identifiers\
    \ throughout the code makes it very difficult to look back at how it worked, for\
    \ both you and someone else. Use more comments.\n\n```\n#include <iostream>\n\
    #include <vector>\n#include <algorithm>\nusing namespace std;\n\nint main()\n\
    {\n    vector<double> v;\n\n    double d;\n    while(cin>>d) v.push_back(d); \
    \ // read elements\n    if (!cin.eof()) {              // check if input failed\n\
    \        cerr << \"format error\\n\";\n        return 1;                  // error\
    \ return\n    }\n\n    cout << \"read \" << v.size() << \" elements\\n\";\n\n\
    \    reverse(v.begin(),v.end());\n    cout << \"elements in reverse order:\\n\"\
    ;\n    for (int i = 0; i<v.size(); ++i) cout << v[i] << '\\n';\n\n    return 0;\
    \                      // success return\n}\n```\n\n## QUOTES\n\nMissing quotes\
    \ is a common mistake to make, for every level of user. Remember that quotes need\
    \ to encase strings and anything that's going to be outputted to the screen or\
    \ into a file, for example. Most compilers errors are due to missing quotes in\
    \ the code.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_72_0.png)\n\n## EXTRA\
    \ SEMICOLONS\n\nWhile it's necessary to have a semicolon at the end of every C++\
    \ line, there are some exceptions to the rule. Semicolons need to be at the end\
    \ of every complete statement but some lines of code aren't complete statements.\
    \ Such as:\n\n- #include\n- if lines\n- switch lines\n\nIf it sounds confusing\
    \ don't worry, the compiler lets you know where you went wrong.\n\n```\n// Program\
    \ to print positive number entered by the user\n// If user enters negative number,\
    \ it is skipped\n\n#include <iostream>\nusing namespace std;\n\nint main()\n{\n\
    \    int number;\n    cout << \"Enter an integer: \";\n    cin >> number;\n\n\
    \    // checks if the number is positive\n    if ( number > 0)\n    {\n      \
    \  cout << \"You entered a positive integer: \" << number << endl;\n    }\n\n\
    \    cout << \"This statement is always executed.\";\n    return 0;\n}\n```\n\n\
    ## TOO MANY BRACES\n\nThe braces, or curly brackets, are beginning and ending\
    \ markers around blocks of code. So for every { you must have a }. Often it's\
    \ easy to include or miss out one or the other facing brace when writing code;\
    \ usually when writing in a text editor, as an IDE adds them for you.\n\n```\n\
    #include <iostream>\nusing namespace std;\n\nint main()\n{\n    int x;\n    string\
    \ mystring = \"This is a string!\\n\";\n    cout << \"What's the value of x? \"\
    ;\n    cin >> x;\n    cout << x;\n    {\n        cout << \"\\n\\n\";\n       \
    \ cout << mystring;\n    }\n}\n```\n\n## INITIALISE VARIABLES\n\nIn C++ variables\
    \ aren't initialised to zero by default. This means if you create a variable called\
    \ x then, potentially, it is given a random number from 0 to 18,446,744,073,709,551,616,\
    \ which can be difficult to include in an equation. When creating a variable,\
    \ give it the value of zero to begin with: x=0.\n\n```\n#include <iostream>\n\
    using namespace std;\n\nint main()\n{\n    int x;\n    x=0;\n\n    cout << x;\n\
    }\n```\n\n## A.OUT\n\nA common mistake when compiling in Linux is forgetting to\
    \ name your C++ code post compiling. When you compile from the Terminal, you enter:\n\
    \n```\ng++ code.cpp\n```\n\nThis compiles the code in the file code.cpp and create\
    \ an a.out file that can be executed with ./a.out. However, if you already have\
    \ code in a.out then it's overwritten. Use:\n\n```\ng++ code.cpp -o nameofprogram\n\
    ```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_72_1.png)"
