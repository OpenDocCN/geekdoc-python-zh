    ```\nimport calendar\ncal=open(“/home/pi/Documents/cal.html”, “w”)\nc=calendar.HTMLCalendar(calendar.SUNDAY)\n\
    cal.write(c.formatmonth(2018, 1))\ncal.close()\n```\n\nThis code will create an\
    \ HTML file called cal, open it with a browser and it displays the calendar for\
