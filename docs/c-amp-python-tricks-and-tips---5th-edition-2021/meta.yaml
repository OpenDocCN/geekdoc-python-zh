- md: "## Pygame Module\n\nSTEP 9 You can now implement a few additions and utilise\
    \ some previous tutorial code. The new elements are the subprocess module, of\
    \ which one function allows us to launch a second Python script from within another;\
    \ and we're going to create a New File called pygametxt.py:\n\n```python\nimport\
    \ pygame\nimport time\nimport subprocess\npygame.init()\nscreen = pygame.display.set_mode((800,\
    \ 250))\nclock = pygame.time.Clock()\n\nfont = pygame.font.Font(None, 25)\n\n\
    pygame.time.set_timer(pygame.USEREVENT, 200)\n\ndef text_generator(text):\n  \
    \  tmp = ''\n    for letter in text:\n        tmp += letter\n        if letter\
    \ != ' ':\n            yield tmp\n\nclass DynamicText(object):\n    def __init__(self,\
    \ font, text, pos, autoreset=False):\n        self.done = False\n        self.font\
    \ = font\n        self.text = text\n        self._gen = text_generator(self.text)\n\
    \        self.pos = pos\n        self.autoreset = autoreset\n        self.update()\n\
    \n    def reset(self):\n        self._gen = text_generator(self.text)\n      \
    \  self.done = False\n        self.update()\n\n    def update(self):\n       \
    \ if not self.done:\n            try: self.rendered = self.font.render(next(self._gen),\
    \ True, (0, 128, 0))\n            except StopIteration:\n                self.done\
    \ = True\n                time.sleep(10)\n                subprocess.Popen(\"\
    python3 /home/pi/Documents/Python\\ Code/pygame1.py 1\", shell=True)\n\n    def\
    \ draw(self, screen):\n        screen.blit(self.rendered, self.pos)\n\ntext=(\"\
    A long time ago, a barbarian strode from the frozen north. Sword in hand...\"\
    )\n\nmessage = DynamicText(font, text, (65, 120), autoreset=True)\n\nwhile True:\n\
    \    for event in pygame.event.get():\n        if event.type == pygame.QUIT: break\n\
    \        if event.type == pygame.USEREVENT: message.update()\n    else:\n    \
    \    screen.fill(pygame.color.Color('black'))\n        message.draw(screen)\n\
    \        pygame.display.flip()\n        clock.tick(60)\n        continue\n   \
    \ break\n\npygame.quit()\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_40_0.png)\n\
    \nSTEP 10 When you run this code it will display a long, narrow Pygame window\
    \ with the intro text scrolling to the right. After a pause of ten seconds, it\
    \ then launches the main game Python script where you can move the warrior sprite\
    \ around. Overall the effect is quite good but there's always room for improvement.\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_40_1.png)\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_40_2.png)\n\
    \n## Create Your Own Modules\n\nLarge programs can be much easier to manage if\
    \ you break them up into smaller parts and import the parts you need as modules.\
    \ Learning to build your own modules also makes it easier to understand how they\
    \ work.\n\n### BUILDING MODULES\n\nModules are Python files, containing code,\
    \ that you save using a .py extension. These are then imported into Python using\
    \ the now familiar import command.\n\n**STEP 1** Let's start by creating a set\
    \ of basic mathematics functions. Multiply a number by two, three and square or\
    \ raise a number to an exponent (power). Create a New File in the IDLE and enter:\n\
    \n```python\ndef timestwo(x):\n    return x * 2\n\ndef timesthree(x):\n    return\
    \ x * 3\n\ndef square(x):\n    return x * x\n\ndef power(x,y):\n    return x **\
    \ y\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_41_0.png)\n\n**STEP 2** Under\
    \ the above code, enter functions to call the code:\n\n```python\nprint (timestwo(2))\n\
    print (timesthree(3))\nprint (square(4))\nprint (power(5,3))\n```\n\nSave the\
    \ program as basic_math.py and execute it to get the results.\n\n**STEP 3** Now\
    \ you're going to take the function definitions out of the program and into a\
    \ separate file. Highlight the function definitions and choose Edit > Cut. Choose\
    \ File > New File and use Edit > Paste in the new window. You now have two separate\
    \ files, one with the function definitions, the other with the function calls.\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_41_1.png)\n\n**STEP 4** If you now\
    \ try and execute the basic_math.py code again, the error 'NameError: name 'timestwo'\
    \ is not defined' will be displayed. This is due to the code no longer having\
    \ access to the function definitions.\n\n```\nTraceback (most recent call last):\n\
    \  File \"/home/pi/Documents/Python Code/basic_math.py\", line 3, in <module>\n\
    \    print (timestwo(2))\nNameError: name 'timestwo' is not defined\n>>> |\n```\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_41_2.png)\n\n**STEP 5** Return to the\
    \ newly created window containing the function definitions, and click File > Save\
    \ As. Name this **minimath.py** and save it in the same location as the original\
    \ **basic_math.py** program. Now close the minimath.py window, so the basic_math.py\
    \ window is left open.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_41_3.png)\n\
    \nSTEP 6 Back to the basic_math.py window: at the top of the code enter:\n\n```python\n\
    from minimath import *\n```\n\nThis will import the function definitions as a\
    \ module. Press F5 to save and execute the program to see it in action.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_42_0.png)\n\
    \nSTEP 7 You can now use the code further to make the program a little more advanced,\
    \ utilising the newly created module to its full. Include some user interaction.\
    \ Start by creating a basic menu the user can choose from:\n\n```python\nprint(\"\
    Select operation.\\n\")\nprint(\"1.Times by two\")\nprint(\"2.Times by Three\"\
    )\nprint(\"3.Square\")\nprint(\"4.Power of\")\n\nchoice = input(\"\\nEnter choice\
    \ (1/2/3/4):\")\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_42_1.png)\n\n\
    ![](img/763cdde75d55911fbf7836a707fd3c3b_42_2.png)\n\nSTEP 8 Now we can add the\
    \ user input to get the number the code will work on:\n\n```python\nnum1 = int(input(\"\
    \\nEnter number: \"))\n```\n\nThis will save the user-entered number as the variable\
    \ num1.\n\nSTEP 9 Finally, you can now create a range of if statements to determine\
    \ what to do with the number and utilise the newly created function definitions:\n\
    \n```python\nif choice == '1':\n    print(timestwo(num1))\n\nelif choice == '2':\n\
    \    print(timesthree(num1))\n\nelif choice == '3':\n    print(square(num1))\n\
    \nelif choice == '4':\n    num2 = int(input(\"Enter second number: \"))\n    print(power(num1,\
    \ num2))\nelse:\n    print(\"Invalid input\")\n```\n\nSTEP 10 Note that for the\
    \ last available options, the Power of choice, we've added a second variable,\
    \ num2. This passes a second number through the function definition called power.\
    \ Save and execute the program to see it in action.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_42_3.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_42_4.png)\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_43_0.png)\n\
    \n## C++ Input/Output\n\nThere’s a satisfying feeling when you program code that\
    \ asks the user for input, then uses that input to produce something that the\
    \ user can see. Even if it’s simply asking for someone’s name, and displaying\
    \ a personal welcome message, it’s a big leap forward.\n\nUser interaction, character\
    \ literals, defining constants and file input and output are all covered in the\
    \ following pages. All of which help you to understand how a C++ program works\
    \ better.\n\n## User Interaction\n\nThere’s nothing quite as satisfying as creating\
    \ a program that responds to you. This basic user interaction is one of the most\
    \ taught aspects of any language and with it you’re able to do much more than\
    \ simply greet the user by name.\n\n### HELLO, DAVE\n\nYou have already used cout,\
    \ the standard output stream, throughout our code. Now you’re going to be using\
    \ cin, the standard input stream, to prompt a user response.\n\nSTEP 1 Anything\
    \ that you want the user to input into the program needs to be stored somewhere\
    \ in the system memory, so it can be retrieved and used. Therefore, any input\
    \ must first be declared as a variable, so it’s ready to be used by the user.\
    \ Start by creating a blank C++ file with headers.\n\nSTEP 2 The data type of\
    \ the variable must also match the type of input you want from the user. For example,\
    \ to ask a user their age, you would use an integer like this:\n\n```cpp\n#include\
    \ <iostream>\nusing namespace std;\n\nint main ()\n{\n    int age;\n    cout <<\
    \ \"what is your age: \";\n    cin >> age;\n\n    cout <<\"\\nYou are \" << age\
    \ << \" years old.\\n\";\n}\n```\n\nSTEP 3 The cin command works in the opposite\
    \ way from the cout command. With the first cout line you’re outputting ‘What\
    \ is your age’ to the screen, as indicated with the chevrons. Cin uses opposite\
    \ facing chevrons, indicating an input. The input is put into the integer age\
    \ and called up in the second cout command. Build and run the code.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_45_0.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_45_1.png)\n\nSTEP 4 If you’re asking\
    \ a question, you need to store the input as a string; to ask the user their name,\
    \ you would use:\n\n```cpp\n#include <iostream>\nusing namespace std;\n\nint main\
    \ ()\n{\n    string name;\n    cout << \"what is your name: \";\n    cin >> name;\n\
    \n    cout << \"\\nHello, \" << name << \". I hope you’re well today?\\n\";\n\
    }\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_45_2.png)\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_45_3.png)"
