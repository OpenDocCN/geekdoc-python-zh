  md: '# Splitting and Joining Strings


    When dealing with data in Python, especially from a user’s input, you will undoubtedly
    come across long sets of strings. A useful skill to learn in Python programming
    is being able to split those long strings for better readability.


    # STRING THEORIES


    You’ve already looked at some list functions, using .insert, .remove, and .pop
    but there are also functions that can be applied to strings.


    STEP 1 The main tool in the string function arsenal is .split(). With it you’re
    able to split apart a string of data, based on the argument within the brackets.
    For example, here’s a string with three items, each separated by a space:

    text="Daniel Hannah Emma"


    STEP 3 Note that the text.split part has the brackets, quotes, then a space followed
    by closing quotes and brackets. The space is the separator, indicating that each
    list item entry is separated by a space. Likewise, CSV (Comma Separated Value)
    content has a comma, so you’d use:

    text="January,February,March,April,May,June"

    months=text.split(",")

    months


    ![](img/763cdde75d55911fbf7836a707fd3c3b_13_0.png)


    ![](img/763cdde75d55911fbf7836a707fd3c3b_13_1.png)


    STEP 2 Now let’s turn the string into a list and split the content accordingly:

    names=text.split(" ")

    Then enter the name of the new list, names, to see the three items.


    STEP 4 You’ve previously seen how you can split a string into individual letters
    as a list, using a name:

    name=list("David")

    name

    The returned value is ''D'', ''a'', ''v'', ''i'', ''d''. Whilst it may seem a
    little useless under ordinary circumstances, it could be handy for creating a
    spelling game for example.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_13_2.png)


    ![](img/763cdde75d55911fbf7836a707fd3c3b_13_3.png)'
  merge: -1
