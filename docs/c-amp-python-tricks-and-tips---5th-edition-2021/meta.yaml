    # Date and Time


    When working with data it’s often handy to have access to the time. For example,
    you may want to time-stamp an entry or see at what time a user logged into the
    system and for how long. Luckily acquiring the date and time is easy, thanks to
    the Time module.


    # TIME LORDS


    The time module contains functions that help you retrieve the current system time,
    reads the date from strings, formats the time and date and much more.


    **STEP 1** First you need to import the time module. It’s one that’s built-in
    to Python 3 so you shouldn’t need to drop into a command prompt and pip install
    it. Once it’s imported, you can call the current time and date with a simple command:


    python

    import time

    time.asctime()


    **STEP 3** You can see the structure of how time is presented by entering:


    python

    time.localtime()



    The output is displayed as such: `time.struct_time(tm_year=2017, tm_mon=9, tm_mday=7,
    tm_hour=9, tm_min=6, tm_sec=13, tm_wday=3, tm_yday=250, tm_isdst=0)`; obviously
    dependent on your current time as opposed to the time shown above.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_17_0.png)


    ![](img/763cdde75d55911fbf7836a707fd3c3b_17_1.png)


    **STEP 2** The time function is split into nine tuples, these are divided up into
    indexed items, as with any other tuple, and shown in the screen shot below.


    **STEP 4** There are numerous functions built into the time module. One of the
    most common of these is strftime(). With it, you’re able to present a wide range
    of arguments as it converts the time tuple into a string. For example, to display
    the current day of the week you can use:


    python

    time.strftime(''%A'')


    | Index | Field | Values |

    |---|---|---|

    | 0 | 4-digit year | 2016 |

    | 1 | Month | 1 to 12 |

    | 2 | Day | 1 to 31 |

    | 3 | Hour | 0 to 23 |

    | 4 | Minute | 0 to 59 |

    | 5 | Second | 0 to 61 (60 or 61 are leap-seconds) |

    | 6 | Day of Week | 0 to 6 (0 is Monday) |

    | 7 | Day of year | 1 to 366 (Julian day) |

    | 8 | Daylight savings | -1, 0, 1, -1 means library determines DST |


    ![](img/763cdde75d55911fbf7836a707fd3c3b_17_2.png)'
