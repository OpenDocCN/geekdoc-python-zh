  md: "# Create Your Own Modules\n\nSTEP 6 Back to the basic_math.py window: at the\
    \ top of the code enter:\n\n```\nfrom minimath import *\n```\n\nThis will import\
    \ the function definitions as a module. Press F5 to save and execute the program\
    \ to see it in action.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_42_0.png)\n\
    \nSTEP 9 Finally, you can now create a range of if statements to determine what\
    \ to do with the number and utilise the newly created function definitions:\n\n\
    ```\nif choice == '1':\n    print(timestwo(num1))\n\nelif choice == '2':\n   \
    \ print(timesthree(num1))\n\nelif choice == '3':\n    print(square(num1))\n\n\
    elif choice == '4':\n    num2 = int(input(\"Enter second number: \"))\n    print(power(num1,\
    \ num2))\nelse:\n    print(\"Invalid input\")\n```\n\nSTEP 7 You can now use the\
    \ code further to make the program a little more advanced, utilising the newly\
