    \ the user to initialise it prior to any of the functions being used:\n\n```python\n\
    import pygame\npygame.init()\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_37_0.png)\n\
    \n**STEP 3** Sadly you can’t close the newly created Pygame window without closing\
