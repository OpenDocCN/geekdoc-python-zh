    \ you would expect, but what if you wanted to display something if the user entered\
    \ the number 30? Try this:\n\n```\ncpp\n{\n    int num;\n\n    cout << \"Enter\
    \ a number: \";\n    cin >> num;\n\n    if ( num < 30 )\n    {\n        cout <<\
