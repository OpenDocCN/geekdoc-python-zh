- md: '## Splitting and Joining Strings


    When dealing with data in Python, especially from a user’s input, you will undoubtedly
    come across long sets of strings. A useful skill to learn in Python programming
    is being able to split those long strings for better readability.


    ## STRING THEORIES


    You’ve already looked at some list functions, using .insert, .remove, and .pop
    but there are also functions that can be applied to strings.


    STEP 1 The main tool in the string function arsenal is .split(). With it you’re
    able to split apart a string of data, based on the argument within the brackets.
    For example, here’s a string with three items, each separated by a space:

    text="Daniel Hannah Emma"


    STEP 2 Now let’s turn the string into a list and split the content accordingly:

    names=text.split(" ")

    Then enter the name of the new list, names, to see the three items.


    STEP 3 Note that the text.split part has the brackets, quotes, then a space followed
    by closing quotes and brackets. The space is the separator, indicating that each
    list item entry is separated by a space. Likewise, CSV (Comma Separated Value)
    content has a comma, so you’d use:

    text="January,February,March,April,May,June"

    months=text.split(",")

    months


    STEP 4 You’ve previously seen how you can split a string into individual letters
    as a list, using a name:

    name=list("David")

    name

    The returned value is ''D'', ''a'', ''v'', ''i'', ''d''. Whilst it may seem a
    little useless under ordinary circumstances, it could be handy for creating a
    spelling game for example.


    STEP 5 The opposite of the .split function is .join, where you will have separate
    items in a string and can join them all together to form a word or just a combination
    of items, depending on the program you''re writing. For instance:

    alphabet="".join(["a", "b", "c", "d", "e"])

    alphabet

    This will display ''abcde'' in the Shell.


    STEP 6 You can therefore apply .join to the separated name you made in Step 4,
    combining the letters again to form the name:

    name="".join(name)

    name

    We''ve joined the string back together, and retained the list called name, passing
    it through the .join function.


    STEP 7 A good example of using the .join function is when you have a list of words
    you want to combine into a sentence:

    list=["Conan", "raised", "his", "mighty", "sword", "and", "struck", "the", "demon"]

    text=" ".join(list)

    text

    Note the space between the quotes before the .join function (where there were
    no spaces in the Step 6''s join)


    STEP 8 As with the .split function, the separator doesn''t have to be a space,
    it can also be a comma, a full stop, a hyphen or whatever you like:

    colours=["Red", "Green", "Blue"]

    col=", ".join(colours)

    col


    STEP 9 There''s some interesting functions you apply to a string, such as .capitalize
    and .title. For example:

    title="conan the cimmerian"

    title.capitalize()

    title.title()


    STEP 10 You can also use logic operators on strings, with the ''in'' and ''not
    in'' functions. These enable you to check if a string contains (or does not contain)
    a sequence of characters:

    message="Have a nice day"

    "nice" in message

    "bad" not in message

    "day" not in message

    "night" in message


    ## Formatting Strings


    When you work with data, creating lists, dictionaries and objects you may often
    want to print out the results. Merging strings with data is easy especially with
    Python 3, as earlier versions of Python tended to complicate matters.


    ## STRING FORMATTING


    Since Python 3, string formatting has become a much neater process, using the
    .format function combined with curly brackets. It''s a more logical and better
    formed approach than previous versions.


    STEP 1 The basic formatting in Python is to call each variable into the string
    using the curly brackets:


    ```

    name="Conan"

    print("The barbarian hero of the Hyborian Age is: {}".format(name))

    ```


    STEP 2 Remember to close the print function with two sets of brackets, as you''ve
    encased the variable in one, and the print function in another. You can include
    multiple cases of string formatting in a single print function:


    ```

    name="Conan"

    place="Cimmeria"

    print("{} hailed from the North, in a cold land known as {}".format(name, place))

    ```


    STEP 3 You can of course also include integers into the mix:


    ```

    number=10000

    print("{} of {} was a skilled mercenary, and thief too. He once stole {} gold
    from a merchant.".format(name, place, number))

    ```


    STEP 4 There are many different ways to apply string formatting, some are quite
    simple, as we''ve shown you here; others can be significantly more complex. It
    all depends on what you want from your program. A good place to reference frequently
    regarding string formatting is the Python Docs webpage, found at www.docs.python.org/3.1/library/string.html.
    Here, you will find tons of help.


    STEP 5 Interestingly you can reference a list using the string formatting function.
    You need to place an asterisk in front of the list name:


    ```

    numbers=1, 3, 45, 567546, 3425346345

    print("Some numbers: {}, {}, {}, {}, {}".format(*numbers))

    ```


    STEP 6 With indexing in lists, the same applies to calling a list using string
    formatting. You can index each item according to its position (from 0 to however
    many are present):


    ```

    numbers=1, 4, 7, 9

    print("More numbers: {3}, {0}, {2}, {1}.".format(*numbers))

    ```


    STEP 7 And as you probably suspect, you can mix strings and integers in a single
    list to be called in the .format function:


    ```

    characters=["Conan", "Belit", "Valeria", 19, 27, 20]

    print ("{0} is {3} years old. Whereas {1} is {4} years old.".format(*characters))

    ```


    STEP 8 You can also print out the content of a user''s input in the same fashion:


    ```

    name=input("What''s your name? ")

    print("Hello {}.".format(name))

    ```


    STEP 9 You can extend this simple code example to display the first letter in
    a person''s entered name:


    ```

    name=input("What''s your name? ")

    print("Hello {}.".format(name))

    lname=list(name)

    print("The first letter of your name is a {0}".format(*lname))

    ```


    STEP 10 You can also call upon a pair of lists and reference them individually
    within the same print function. Looking back the code from Step 7, you can alter
    it with:


    ```

    names=["Conan", "Belit", "Valeria"]

    ages=[25, 21, 22]


    Creating two lists. Now you can call each list, and individual items:

    print("{0[0]} is {1[0]} years old. Whereas {0[1]} is {1[1]} years old.".format(names,
    ages))

    ```


    ## Date and Time


    When working with data it’s often handy to have access to the time. For example,
    you may want to time-stamp an entry or see at what time a user logged into the
    system and for how long. Luckily acquiring the date and time is easy, thanks to
    the Time module.


    ## TIME LORDS


    The time module contains functions that help you retrieve the current system time,
    reads the date from strings, formats the time and date and much more.


    STEP 1 First you need to import the time module. It’s one that’s built-in to Python
    3 so you shouldn’t need to drop into a command prompt and pip install it. Once
    it’s imported, you can call the current time and date with a simple command:


    ```python

    import time

    time.asctime()

    ```


    STEP 2 The time function is split into nine tuples, these are divided up into
    indexed items, as with any other tuple, and shown in the screen shot below.


    STEP 3 You can see the structure of how time is presented by entering:


    ```python

    time.localtime()

    ```


    The output is displayed as such: `time.struct_time(tm_year=2017, tm_mon=9, tm_mday=7,
    tm_hour=9, tm_min=6, tm_sec=13, tm_wday=3, tm_yday=250, tm_isdst=0)`; obviously
    dependent on your current time as opposed to the time shown above.


    STEP 4 There are numerous functions built into the time module. One of the most
    common of these is strftime(). With it, you’re able to present a wide range of
    arguments as it converts the time tuple into a string. For example, to display
    the current day of the week you can use:


    ```python

    time.strftime(''%A'')

    ```


    | Index | Field | Values |

    |---|---|---|

    | 0 | 4-digit year | 2016 |

    | 1 | Month | 1 to 12 |

    | 2 | Day | 1 to 31 |

    | 3 | Hour | 0 to 23 |

    | 4 | Minute | 0 to 59 |

    | 5 | Second | 0 to 61 (60 or 61 are leap-seconds) |

    | 6 | Day of Week | 0 to 6 (0 is Monday) |

    | 7 | Day of year | 1 to 366 (Julian day) |

    | 8 | Daylight savings | -1, 0, 1, -1 means library determines DST |'
  mdcn: '## 字符串的分割与合并


    在处理 Python 中的数据时，尤其是来自用户输入的数据，你无疑会遇到长字符串。在 Python 编程中，一个有用的技能是能够分割这些长字符串以提高可读性。


    ## 字符串理论


    你已经了解了一些列表函数，使用了 `.insert`、`.remove` 和 `.pop`，但也有可以应用于字符串的函数。


    **步骤 1** 字符串函数库中的主要工具是 `.split()`。借助它，你可以根据括号内的参数来分割一个字符串数据。例如，这里有一个包含三个项目的字符串，每个项目之间用空格分隔：

    text="Daniel Hannah Emma"


    **步骤 2** 现在让我们将字符串转换为列表并相应地分割内容：

    names=text.split(" ")

    然后输入新列表的名称 `names` 来查看这三个项目。


    **步骤 3** 注意 `text.split` 部分有括号、引号，然后是一个空格，接着是闭合引号和括号。这个空格是分隔符，表示每个列表项条目之间用空格分隔。同样，CSV（逗号分隔值）内容使用逗号，所以你会使用：

    text="January,February,March,April,May,June"

    months=text.split(",")

    months


    **步骤 4** 你之前已经见过如何使用一个名字将字符串分割成单个字母的列表：

    name=list("David")

    name

    返回的值是 ''D'', ''a'', ''v'', ''i'', ''d''。虽然在普通情况下这看起来可能没什么用，但它对于创建拼写游戏等场景可能很方便。


    **步骤 5** `.split` 函数的反向操作是 `.join`，它将字符串中的独立项目组合在一起，形成一个单词或仅仅是项目的组合，具体取决于你编写的程序。例如：

    alphabet="".join(["a", "b", "c", "d", "e"])

    alphabet

    这将在 Shell 中显示 ''abcde''。


    **步骤 6** 因此，你可以将 `.join` 应用于你在步骤 4 中创建的已分割的名字，再次组合字母以形成名字：

    name="".join(name)

    name

    我们已经将字符串重新组合在一起，并保留了名为 `name` 的列表，将其传递给 `.join` 函数。


    **步骤 7** 使用 `.join` 函数的一个好例子是当你有一个想要组合成句子的单词列表时：

    list=["Conan", "raised", "his", "mighty", "sword", "and", "struck", "the", "demon"]

    text=" ".join(list)

    text

    注意 `.join` 函数前引号之间的空格（在步骤 6 的 join 中没有空格）。


    **步骤 8** 与 `.split` 函数一样，分隔符不必是空格，也可以是逗号、句号、连字符或任何你喜欢的符号：

    colours=["Red", "Green", "Blue"]

    col=", ".join(colours)

    col


    **步骤 9** 你可以对字符串应用一些有趣的函数，例如 `.capitalize` 和 `.title`。例如：

    title="conan the cimmerian"

    title.capitalize()

    title.title()


    **步骤 10** 你还可以对字符串使用逻辑运算符，使用 ''in'' 和 ''not in'' 函数。这些函数使你能够检查字符串是否包含（或不包含）一系列字符：

    message="Have a nice day"

    "nice" in message

    "bad" not in message

    "day" not in message

    "night" in message


    ## 字符串格式化


    当你处理数据、创建列表、字典和对象时，你可能经常想要打印出结果。将字符串与数据合并很容易，尤其是在 Python 3 中，因为早期版本的 Python 往往会使事情复杂化。


    ## 字符串格式化


    自 Python 3 以来，字符串格式化变得更加简洁，使用 `.format` 函数结合花括号。与之前的版本相比，这是一种更合乎逻辑、更规范的方法。


    **步骤 1** Python 中的基本格式化是使用花括号将每个变量调用到字符串中：


    ```

    name="Conan"

    print("The barbarian hero of the Hyborian Age is: {}".format(name))

    ```


    **步骤 2** 记住用两组括号关闭 print 函数，因为你将变量放在一组括号中，而 print 函数放在另一组括号中。你可以在单个 print 函数中包含多个字符串格式化实例：


    ```

    name="Conan"

    place="Cimmeria"

    print("{} hailed from the North, in a cold land known as {}".format(name, place))

    ```


    **步骤 3** 你当然也可以将整数包含进来：


    ```

    number=10000

    print("{} of {} was a skilled mercenary, and thief too. He once stole {} gold
    from a merchant.".format(name, place, number))

    ```


    **步骤 4** 应用字符串格式化的方法有很多，有些非常简单，正如我们在这里展示的；有些则可能复杂得多。这完全取决于你希望从程序中获得什么。一个经常参考字符串格式化的好地方是
    Python 文档网页，网址是 www.docs.python.org/3.1/library/string.html。在这里，你会找到大量的帮助。


    **步骤 5** 有趣的是，你可以使用字符串格式化函数引用一个列表。你需要在列表名称前放置一个星号：


    ```

    numbers=1, 3, 45, 567546, 3425346345

    print("Some numbers: {}, {}, {}, {}, {}".format(*numbers))

    ```


    **步骤 6** 与列表中的索引一样，使用字符串格式化调用列表也适用同样的规则。你可以根据每个项目的位置（从 0 到存在的数量）对其进行索引：


    ```

    numbers=1, 4, 7, 9

    print("More numbers: {3}, {0}, {2}, {1}.".format(*numbers))

    ```


    **步骤 7** 正如你可能猜测的那样，你可以在单个列表中混合字符串和整数，以便在 `.format` 函数中调用：


    ```

    characters=["Conan", "Belit", "Valeria", 19, 27, 20]

    print ("{0} is {3} years old. Whereas {1} is {4} years old.".format(*characters))

    ```


    **步骤 8** 你也可以用同样的方式打印出用户输入的内容：


    ```

    name=input("What''s your name? ")

    print("Hello {}.".format(name))

    ```


    **步骤 9** 你可以扩展这个简单的代码示例，以显示用户输入名字的首字母：


    ```

    name=input("What''s your name? ")

    print("Hello {}.".format(name))

    lname=list(name)

    print("The first letter of your name is a {0}".format(*lname))

    ```


    **步骤 10** 你还可以调用一对列表，并在同一个 print 函数中单独引用它们。回顾步骤 7 的代码，你可以用以下方式修改它：


    ```

    names=["Conan", "Belit", "Valeria"]

    ages=[25, 21, 22]


    创建两个列表。现在你可以调用每个列表和单个项目：

    print("{0[0]} is {1[0]} years old. Whereas {0[1]} is {1[1]} years old.".format(names,
    ages))

    ```


    ## 日期和时间


    处理数据时，能够访问时间通常很方便。例如，你可能想为条目添加时间戳，或者查看用户登录系统的时间以及登录了多长时间。幸运的是，借助 Time 模块，获取日期和时间很容易。


    ## 时间领主


    time 模块包含帮助你检索当前系统时间、从字符串读取日期、格式化时间和日期等许多功能的函数。


    **步骤 1** 首先你需要导入 time 模块。它是 Python 3 的内置模块，所以你不需要进入命令提示符并使用 pip 安装它。一旦导入，你就可以用一个简单的命令调用当前时间和日期：


    ```python

    import time

    time.asctime()

    ```


    **步骤 2** time 函数被分成九个元组，这些元组被划分为索引项，就像任何其他元组一样，并在下面的屏幕截图中显示。


    **步骤 3** 你可以通过输入以下内容查看时间呈现的结构：


    ```python

    time.localtime()

    ```


    输出显示为：`time.struct_time(tm_year=2017, tm_mon=9, tm_mday=7, tm_hour=9, tm_min=6,
    tm_sec=13, tm_wday=3, tm_yday=250, tm_isdst=0)`；显然这取决于你当前的时间，而不是上面显示的时间。


    **步骤 4** time 模块中内置了众多函数。其中最常见的是 `strftime()`。借助它，你能够呈现广泛的参数，因为它将时间元组转换为字符串。例如，要显示当前是星期几，你可以使用：


    ```python

    time.strftime(''%A'')

    ```


    | 索引 | 字段 | 值 |

    |---|---|---|

    | 0 | 4位年份 | 2016 |

    | 1 | 月份 | 1 到 12 |

    | 2 | 日期 | 1 到 31 |

    | 3 | 小时 | 0 到 23 |

    | 4 | 分钟 | 0 到 59 |

    | 5 | 秒 | 0 到 61（60 或 61 是闰秒） |

    | 6 | 星期几 | 0 到 6（0 是星期一） |

    | 7 | 一年中的第几天 | 1 到 366（儒略日） |

    | 8 | 夏令时 | -1, 0, 1, -1 表示库决定夏令时 |'
