  md: "# While Loop\n\nA while loop’s function is to repeat a statement, or a group\
    \ of statements, while a certain condition remains true. When the while loop starts,\
    \ it initialises itself by testing the condition of the loop and the statements\
    \ within, before executing the rest of the loop.\n\n# TRUE OR FALSE?\n\nWhile\
    \ loops are one of the most popular form of C++ code looping. They repeatedly\
    \ run the code contained within the loop while the condition is true. Once it\
    \ proves false, the code continues as normal.\n\nSTEP 1 Clear what you’ve done\
    \ so far and create a new C++ file. There’s no need for any extra headers at the\
    \ moment, so add the standard headers as per usual:\n\n```\n#include <iostream>\n\
    using namespace std;\n\nint main ()\n{\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_55_0.png)\n\
    \nSTEP 3 First you need to create a condition, so use a variable called num and\
    \ give it the value 1. Now create the while loop, stating that as long as num\
    \ is less than 30, the loop is true. Within the loop the value of num is displayed\
    \ and adds 1 until it’s more than 30.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_55_1.png)\n\
    \nSTEP 2 Create a simple while loop. Enter the code below, build and run (we’ve\
    \ added comments to the screen shot):\n\n```\n{\n    int num = 1;\n\n    while\
    \ (num < 30 )\n    {\n        cout << “Number: “ << num << endl;\n        num\
    \ = num +1;\n    }\n\n    return 0;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_55_2.png)\n\
    \nSTEP 4 We’re introducing a few new elements here. The first are the opening\
    \ and closing braces for the while loop. This is because our loop is a compound\
    \ statement, meaning a group of statements; note also, there’s no semicolon after\
    \ the while statement. You now also have return 0, which is a clean and preferred\
    \ way of ending the code.\n\n```\n{\n    int num = 1; // Create the condition\n\
    \n    while (num < 30 ) // The condition remains true while num is less than 30\n\
    \    {\n        cout << “Number: “ << num << endl; // Displays the current value\
    \ of num\n        num = num +1; // Adds 1 to the value of num\n    }\n\n    return\
    \ 0; // Correctly closes the code and finishes the program\n}\n```\n\nSTEP 5 If\
    \ you didn’t need to see the continually increasing value of num, you could have\
    \ done away with the compound while statement and instead just added num by itself\
    \ until it reached 30, and then displayed the value:\n\n```\n{\n    int num =\
    \ 1;\n\n    while (num < 30 )\n        num++;\n    cout << “Number: “ << num <<\
    \ endl;\n\n    return 0;\n}\n```"
