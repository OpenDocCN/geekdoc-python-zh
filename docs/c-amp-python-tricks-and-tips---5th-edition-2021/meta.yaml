    #include <windows.h>\nusing namespace std;\n\nint main ()\n{\n    //For Loop Begins\n\
    \    for( int a = 10; a != 0; a = a -1 )\n    {\n        cout << a << endl;\n\
    \        Sleep(1000);\n    }\n\n    cout << \"\\nBlast Off!\" << endl;\n\n   \
    \ return 0;\n}\n```\n\nSTEP 3 Working through the process of the for loop, begin\
