    \n![](img/763cdde75d55911fbf7836a707fd3c3b_51_1.png)\n\n**步骤4** 要读取文件内容并将其输出到屏幕，你需要稍有不同的操作。首先，你需要创建一个字符串变量来存储文件内容（逐行），然后打开文件，使用`getline`逐行读取文件，并将这些行输出到屏幕。最后，关闭文件。\n\
