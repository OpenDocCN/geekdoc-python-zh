    \n```\ncpp\nint num, guess, tries = 0;\n\ncout << \"****** Two-player number guessing\
    \ game ****\" << endl;\ncout << \"\\nPlayer One, enter a number for Player Two\
    \ to guess: \" << endl;\ncin >> num;\ncout << string(50, '\\n');\n```\n\nSTEP\
    \ 9 The cout << string(50, '\\n') line clears the screen so Player Two doesn't\
