  md: '# Lists


    Lists are one of the most common types of data structures you will comes across
    in Python. A list is simply a collection of items, or data if you prefer, that
    can be accessed as a whole, or individually if wanted.


    # WORKING WITH LISTS


    Lists are extremely handy in Python. A list can be strings, integers and also
    variables. You can even include functions in lists, and lists within lists.


    **STEP 1** A list is a sequence of data values called items. You create the name
    of your list followed by an equals sign, then square brackets and the items separated
    by commas; note that strings use quotes:


    `numbers = [1, 4, 7, 21, 98, 156]`

    `mythical_creatures = ["Unicorn", "Balrog", "Vampire", "Dragon", "Minotaur"]`


    **STEP 3** You can also access, or index, the last item in a list by using the
    minus sign before the item number [-1], or the second to last item with [-2] and
    so on. Trying to reference an item that isn''t in the list, such as [10] will
    return an error:


    `numbers[-1]`

    `mythical_creatures[-4]`


    ![](img/763cdde75d55911fbf7836a707fd3c3b_7_0.png)


    ![](img/763cdde75d55911fbf7836a707fd3c3b_7_1.png)


    **STEP 2** Once you''ve defined your list you can call each by referencing its
    name, followed by a number. Lists start the first item entry as 0, followed by
    1, 2, 3 and so on.


    For example:


    `numbers`


    To call up the entire contents of the list.


    `numbers[3]`


    To call the third from zero item in the list (21 in this case).


    **STEP 4** Slicing is similar to indexing but you can retrieve multiple items
    in a list by separating item numbers with a colon. For example:


    `numbers[1:3]`


    Will output the 4 and 7, being item numbers 1 and 2. Note that the returned values
    don''t include the second index position (as you would numbers[1:3] to return
    4, 7 and 21).


    ![](img/763cdde75d55911fbf7836a707fd3c3b_7_2.png)


    ![](img/763cdde75d55911fbf7836a707fd3c3b_7_3.png)'
  merge: -1
  pgno: 7
- img_proc: true
  md: '# STEP 5


    You can update items within an existing list, remove items and even join lists
    together. For example, to join two lists you can use:


    ```

    everything = numbers + mythical_creatures

    ```


    Then view the combined list with:


    ```

    everything

    ```


    ![](img/763cdde75d55911fbf7836a707fd3c3b_8_0.png)


    # STEP 8


    You can view what can be done with lists by entering dir(list) into the Shell.
    The output is the available functions, for example, insert and pop are used to
    add and remove items at certain positions. To insert the number 62 at item index
    4:


    ```

    numbers.insert(4, 62)

    ```


    To remove it:


    ```

    numbers.pop(4)

    ```


    ![](img/763cdde75d55911fbf7836a707fd3c3b_8_1.png)


    # STEP 6


    Items can be added to a list by entering:


    ```

    numbers=numbers+[201]

    ```


    Or for strings:


    ```

    mythical_creatres=mythical_creatures+["Griffin"]

    ```


    Or by using the append function:


    ```

    mythical_creatures.append("Nessie")

    numbers.append(278)

    ```


    ![](img/763cdde75d55911fbf7836a707fd3c3b_8_2.png)


    # STEP 9


    You also use the list function to break a string down into its components. For
    example:


    ```

    list("David")

    ```


    Breaks the name David into ''D'', ''a'', ''v'', ''i'', ''d''. This can then be
    passed to a new list:


    ```

    name=list("David Hayward")

    name

    age=[44]

    user = name + age

    user

    ```


    ![](img/763cdde75d55911fbf7836a707fd3c3b_8_3.png)


    # STEP 7


    Removal of items can be done in two ways. The first is by the item number:


    ```

    del numbers[7]

    ```


    Alternatively, by item name:


    ```

    mythical_creatures.remove("Nessie")

    ```


    ![](img/763cdde75d55911fbf7836a707fd3c3b_8_4.png)


    # STEP 10


    Based on that, you can create a program to store someone''s name and age as a
    list:


    ```

    name=input("What''s your name? ")

    lname=list(name)

    age=int(input("How old are you: "))

    lage=[age]


    user = lname + lage

    ```


    The combined name and age list is called user, which can be called by entering
    user into the Shell. Experiment and see what you can do.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_8_5.png)'
  merge: -1
  pgno: 8
- img_proc: true
  md: '# Tuples


    Tuples are very much identical to lists. However, where lists can be updated,
    deleted or changed in some way, a tuple remains a constant. This is called immutable
    and they’re perfect for storing fixed data items.


    # THE IMMUTABLE TUPLE


    Reasons for having tuples vary depending on what the program is intended to do.
    Normally, a tuple is reserved for something special but they’re also used for
    example, in an adventure game, where non-playing character names are stored.


    STEP 1 A tuple is created the same way as a list but in this instance you use
    curved brackets instead of square brackets. For example:

    months=(“January”, “February”, “March”, “April”, “May”, “June”)

    months


    STEP 3 You can create grouped tuples into lists that contain multiple sets of
    data. For instance, here is a tuple called NPC (Non-Playable Characters) containing
    the character name and their combat rating for an adventure game:

    NPC=[(“Conan”, 100), (“Belit”, 80), (“Valeria”, 95)]


    ![](img/763cdde75d55911fbf7836a707fd3c3b_9_0.png)


    ![](img/763cdde75d55911fbf7836a707fd3c3b_9_1.png)


    STEP 2 Just as with lists, the items within a named tuple can be indexed according
    to their position in the data range, i.e.:

    months[0]

    months[5]

    However, any attempt at deleting or adding to the tuple will result in an error
    in the Shell.


    STEP 4 Each of these data items can be accessed as a whole by entering NPC into
    the Shell; or they can be indexed according to their position NPC[0]. You can
    also index the individual tuples within the NPC list:

    NPC[0][1]

    Will display 100.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_9_2.png)


    ![](img/763cdde75d55911fbf7836a707fd3c3b_9_3.png)'
  merge: -1
  pgno: 9
- img_proc: true
  md: '# Tuples


    STEP 5 It''s worth noting that when referencing multiple tuples within a list,
    the indexing is slightly different from the norm. You would expect the 95 combat
    rating of the character Valeria to be NPC[4][5], but it''s not. It''s actually:

    NPC[2][1]


    ![](img/763cdde75d55911fbf7836a707fd3c3b_10_0.png)


    STEP 8 Now unpack the tuple into two corresponding variables:

    (name, combat_rating)=NPC

    You can now check the values by entering name and combat_rating.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_10_1.png)


    STEP 6 This means of course that the indexing follows thus:

    0 1, 1

    0, 0 2

    0, 1 2, 0

    1 2, 1

    1, 0

    Which as you can imagine, gets a little confusing when you''ve got a lot of tuple
    data to deal with.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_10_2.png)


    STEP 9 Remember, as with lists, you can also index tuples using negative numbers
    which count backwards from the end of the data list. For our example, using the
    tuple with multiple data items, you would reference the Valeria character with:

    NPC[2][-0]


    ![](img/763cdde75d55911fbf7836a707fd3c3b_10_3.png)


    STEP 7 Tuples though utilise a feature called unpacking, where the data items
    stored within a tuple are assigned variables. First create the tuple with two
    items (name and combat rating):

    NPC=("Conan", 100)


    ![](img/763cdde75d55911fbf7836a707fd3c3b_10_4.png)


    STEP 10 You can use the max and min functions to find the highest and lowest values
    of a tuple composed of numbers. For example:

    numbers=(10.3, 23, 45.2, 109.3, 6.1, 56.7, 99)

    The numbers can be integers and floats. To output the highest and lowest, use:

    print(max(numbers))

    print(min(numbers))


    ![](img/763cdde75d55911fbf7836a707fd3c3b_10_5.png)'
  merge: -1
  pgno: 10
- img_proc: true
  md: '# Dictionaries


    Lists are extremely useful but dictionaries in Python are by far the more technical
    way of dealing with data items. They can be tricky to get to grips with at first
    but you’ll soon be able to apply them to your own code.


    # KEY PAIRS


    A dictionary is like a list but instead each data item comes as a pair, these
    are known as Key and Value. The Key part must be unique and can either be a number
    or string whereas the Value can be any data item you like.


    **STEP 1** Let’s say you want to create a phonebook in Python. You would create
    the dictionary name and enter the data in curly brackets, separating the key and
    value by a colon Key:Value. For example:

    `phonebook={“Emma”: 1234, “Daniel”: 3456, “Hannah”: 6789}`


    **STEP 3** As with lists and tuples, you can check the contents of a dictionary
    by giving the dictionary a name: phonebook, in this example. This will display
    the data items you’ve entered in a similar fashion to a list, which you’re no
    doubt familiar with by now.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_11_0.png)


    ![](img/763cdde75d55911fbf7836a707fd3c3b_11_1.png)


    **STEP 2** Just as with most lists, tuples and so on, strings need be enclosed
    in quotes (single or double), whilst integers can be left open. Remember that
    the value can be either a string or an integer, you just need to enclose the relevant
    one in quotes:

    `phonebook2={“David”: “0987 654 321”}`


    **STEP 4** The benefit of using a dictionary is that you can enter the key to
    index the value. Using the phonebook example from the previous steps, you can
    enter:

    `phonebook[“Emma”]`

    `phonebook[“Hannah”]`


    ![](img/763cdde75d55911fbf7836a707fd3c3b_11_2.png)


    ![](img/763cdde75d55911fbf7836a707fd3c3b_11_3.png)'
  merge: -1
  pgno: 11
- img_proc: true
  md: '# Dictionaries


    STEP 5 Adding to a dictionary is easy too. You can include a new data item entry
    by adding the new key and value items like:


    ```

    phonebook["David"] = "0987 654 321"

    phonebook

    ```


    ![](img/763cdde75d55911fbf7836a707fd3c3b_12_0.png)


    STEP 8 Next, you need to define the user inputs and variables: one for the person''s
    name, the other for their phone number (let''s keep it simple to avoid lengthy
    Python code):


    ```

    name=input("Enter name: ")

    number=int(input("Enter phone number: "))

    ```


    ![](img/763cdde75d55911fbf7836a707fd3c3b_12_1.png)


    STEP 6 You can also remove items from a dictionary by issuing the del command
    followed by the item''s key; the value will be removed as well, since both work
