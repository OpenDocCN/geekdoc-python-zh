  md: "# If... Else Statement\n\nThere is a much better way to use an if statement\
    \ in your code, with if... else. If... else works in much the same way as a standard\
    \ if statement. If the Boolean expression is true, the code with in the braces\
    \ is executed. Else, the code within the next set of braces is used instead.\n\
    \n# IF YES, ELSE NO\n\nThere are two sections of code that can be executed depending\
    \ on the outcome in an if... else statement. It's quite easy to visualise once\
    \ you get used to its structure.\n\n```\nSTEP 1 Begin with a new C++ file and\
    \ the standard headers:\n#include <iostream>\nusing namespace std;\nint main ()\n\
    {\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_63_0.png)\n\n```\nSTEP 3\
    \ The first line in the code creates the integer called num and gives it a value\
    \ of 1. The if statement checks to see if the value of num is less than thirty\
    \ and if it is it outputs \"The number is less than 30!\" to the console.\nif\
    \ ( num < 30 )\n{\n    cout << \"The number is less than 30!\" << endl;\n}\n```\n\
    \n```\nSTEP 2 Let's expand the code from the If Statement on the previous page:\n\
    {\n    int num = 1;\n    if ( num < 30 )\n    {\n        cout << \"The number\
    \ is less than 30!\" << endl;\n    }\n    else\n    {\n        cout << \"The number\
    \ is greater than 30!\" << endl;\n    }\n    return 0;\n}\n```\n\n```\nSTEP 4\
    \ The else companion to if checks if the number is greater than 30 and if so,\
    \ then displays \"The number is greater than 30!\" to the console; and finally,\
    \ the code is terminated satisfactorily.\ncout << \"The number is less than 30!\"\
    \ << endl;\nelse\n{\n    cout << \"The number is greater than 30!\" << endl;\n\
    }\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_63_1.png)\n\n```\nSTEP 5 You\
    \ can change the value of num in the code or you can improve the code by asking\
    \ the user to enter a value:\n{\n    int num;\n    cout << \"Enter a number: \"\
    ;\n    cin >> num;\n    if ( num < 30 )\n    {\n        cout << \"The number is\
    \ less than 30!\" << endl;\n    }\n    else\n    {\n        cout << \"The number\
    \ is greater than 30!\" << endl;\n    }\n    return 0;\n}\n```"
