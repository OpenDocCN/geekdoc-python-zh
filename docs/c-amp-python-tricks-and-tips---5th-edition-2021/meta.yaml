    \n步骤 6 有趣的是，我们也可以通过使用一个简单的 for 循环来列出一个月中的天数：\n\n```python\nimport calendar\ncal=calendar.TextCalendar(calendar.SUNDAY)\n\
    for i in cal.itermonthdays(2018, 6):\n    print(i)\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_30_2.png)\n\
    \n步骤 7 你可以看到代码在开头产生了一些零，这是由于起始星期日（本例中）以及与上个月重叠的日期造成的。因此，日期的计数将从 2018 年 6 月 1 日星期五开始，总计\
    \ 30 天，输出正确显示了这一点。\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_30_4.png)\n\n步骤\
    \ 8 你还可以打印单独的月份或星期名称：\n\n```python\nimport calendar\nfor name in calendar.month_name:\n\
    \    print(name)\n\nimport calendar\nfor name in calendar.day_name:\n    print(name)\n\
    ```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_30_1.png)\n\n步骤 9 calendar 模块还允许我们将函数写成\
    \ HTML 格式，以便你可以在网站上显示它。让我们从创建一个新文件开始：\n\n```python\nimport calendar\ncal=open(\"\
    /home/pi/Documents/cal.html\", \"w\")\nc=calendar.HTMLCalendar(calendar.SUNDAY)\n\
    cal.write(c.formatmonth(2018, 1))\ncal.close()\n```\n\n这段代码将创建一个名为 cal 的 HTML\
    \ 文件，用浏览器打开它，它将显示 2018 年 1 月的日历。\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_30_3.png)\n\
