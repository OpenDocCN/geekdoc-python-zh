    \ and up to date. There are millions of projects to choose from, so contact a\
    \ few and see where they need help. It may only be a minor code update but it's\
    \ a noble occupation for coders to get into.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_73_0.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_73_1.png)\n\n# KEEP CODING\n\nIf you've\
    \ mastered Python fairly well, then turn your attention to C++ or even C#. Still\
    \ keep your Python skills going but learning a new coding language keeps the old\
    \ brain ticking over nicely and give you a view into another community, and how\
    \ they do things differently.\n\n# SHARE SKILLS\n\nBecome more active on coding\
    \ and development knowledge sites, such as StackExchange. If you have the skills\
    \ to start and help others out, not only will you feel really good for doing so\
    \ but you can also learn a lot yourself by interacting with other members.\n\n\
    ```\ncpp\n#pragma once\n\n#define EXPAND_ME __FILE__ \": \" __LINE__\n\nconstexpr\
    \ auto pi = 314LLu;\nthread_local decltype(pi) rage = 0b10;\n\n[[deprecated(\"\
    abc\")]] char16_t *f() noexcept { return nullptr; }\n\ntemplate <typename T> struct\
    \ Foo {\n    static_assert(std::is_floating_point<T>::value,\n               \
    \   \"Foo<T>: T must be floating point\");\n};\n\nstruct A final : Foo {\n   \
    \ A() = default;\n    [[noreturn]] virtual void foo() override;\n};\n\ntemplate\
    \ <typename T> concept bool EqualityComparable = requires(T a,\n{ a == b } ->\
    \ bool;\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_73_2.png)"
  - '[PAGE 74]


    # GOING MOBILE


    The mobile market is a great place to test your coding skills and present any
    games or apps you’ve created. If your app is good, then who knows, it could be
    the next great thing to appear on the app stores. It’s a good learning experience
    nevertheless, and something worth considering.


    # PORTFOLIOS


    If you’ve learned how to code with an eye for a developer job in the future, then
    it’s worth starting to build up an online portfolio of code. Look at job postings
    and see what skills they require, then learn and code something with those skills
    and add it to the portfolio. When it comes to applying, include a link to the
    portfolio.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_74_0.png)


    ![](img/763cdde75d55911fbf7836a707fd3c3b_74_1.png)


    # ONLINE LEARNING


    Online courses are good examples of where to take your coding skills next, even
    if you start from the beginner level again. Often, an online course follows a
    strict coding convention, so if you’re self-taught then it might be worth seeing
    how other developers lay out their code, and what’s considered acceptable.


    # TEACH CODE


    Can you teach? If your coding skills are spot on, consider approaching a college
    or university to see if they have need for a programming language teacher, perhaps
    a part-time or evening course. If not teaching, then consider creating your own
    YouTube how to code channel.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_74_2.png)


    ![](img/763cdde75d55911fbf7836a707fd3c3b_74_3.png)


    # SHARE CODE


    Get sharing, even if you think your code isn’t very good. The criticism, advice
    and comments you receive back help you iron out any issues with your code, and
    you add them all to your checklist. Alternatively your code might be utterly amazing
    but you won’t know unless you share it.


    # HARDWARE PROJECTS


    Contributing to hardware projects is a great resource for proving your code with
    others and learning from other contributors. Many of the developer boards have
    postings for coders to apply to for hardware projects, using unique code to get
    the most from the hardware that’s being designed.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_74_4.png)


    ![](img/763cdde75d55911fbf7836a707fd3c3b_74_5.png)'
