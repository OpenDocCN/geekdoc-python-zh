    # Common Coding Mistakes


    # USER ERROR


    User input is often a paralysing mistake in code. For example, when the user is
    supposed to enter a number for their age and instead they enter it in letters.
    Often a user can enter so much into an input that it overflows some internal buffer,
    thus sending the code crashing. Watch those user inputs and clearly state what’s
    needed from them.


    ```

    Enter an integer number

    aswdfdsf

    You have entered wrong input

    s

    You have entered wrong input

    f"£"f£f"

    You have entered wrong input

    sdfsdf213213123

    You have entered wrong input

    123234234234234234

    You have entered wrong input

    12

    the number is: 12


    Process returned 0 (0x0)   execution time : 21.495 s

    Press any key to continue.

    ```


    # BACKUPS


    Always make a backup of your work, with a secondary backup for any changes you’ve
    made. Mistakes can be rectified if there’s a good backup in place to revert to
    for those times when something goes wrong. It’s much easier to start where you
    left off, rather than starting from the beginning again.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_68_0.png)


    # RE-INVENTING WHEELS


    You can easily spend days trying to fathom out a section of code to achieve a
    given result and it’s frustrating and often time-wasting. While it’s equally rewarding
    to solve the problem yourself, often the same code is out there on the Internet
    somewhere. Don’t try and re-invent the wheel, look to see if some else has done
    it first.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_68_1.png)


    # SECURE DATA


    If you’re writing code to deal with usernames and passwords, or other such sensitive
    data, then ensure that the data isn’t in cleartext. Learn how to create a function
    to encrypt sensitive data, prior to feeding into a routine that can transmit or
    store it where someone may be able to get to view it.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_68_2.png)


    # HELP!


    Asking for help is something most of us has struggled with in the past. Will the
    people we’re asking laugh at us? Am I wasting everyone’s time? It’s a common mistake
    for someone to suffer in silence. However, as long as you ask the in the correct
    manner, obey any forum rules and be polite, then your question isn’t silly.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_68_3.png)


    # MATHS


    If your code makes multiple calculations then you need to ensure that the maths
    behind it is sound. There are thousands of instances where programs have offered
    incorrect data based on poor mathematical coding, which can have disastrous effects
    depending on what the code is set to do. In short, double check your code equations.


