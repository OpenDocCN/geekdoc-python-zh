    cal.close()\n```\n\n这段代码会向用户询问一个年份，然后创建必要的网页。记得更改你的文件目标路径。\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_30_5.png)\n\
    \n## OS 模块\n\nOS 模块允许你直接与操作系统中的内置命令进行交互。命令因你运行的操作系统而异，因为有些命令适用于 Windows，而其他命令则适用于\
    \ Linux 和 macOS。\n\n### 进入系统\n\nOS 模块的主要功能之一是能够列出、移动、创建、删除以及以其他方式与系统上存储的文件进行交互，这使其成为备份代码的完美模块。\n\
    \n你可以从一些简单的函数开始使用 OS 模块，看看它如何与 Python 运行的操作系统环境交互。如果你使用的是 Linux 或树莓派，可以尝试这个：\n\
    \n```python\nimport os\nhome=os.getcwd()\nprint(home)\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_31_0.png)\n\
    \nWindows 的输出不同，因为那是由系统确定的 Python 当前工作目录；正如你可能猜测的那样，`os.getcwd()` 函数是要求 Python\
    \ 检索当前工作目录。Linux 用户将看到与树莓派类似的内容，macOS 用户也是如此。\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_31_1.png)\n\
    \n打印变量 home 返回的结果是系统上当前用户的主文件夹。在我们的示例中是 /home/pi；它会因你登录的用户名和使用的操作系统而异。例如，Windows\
    \ 10 将输出：C:\\Program Files (x86)\\Python36-32。\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_31_2.png)\n\
    \nOS 模块的另一个有趣之处在于它能够启动安装在主机系统中的程序。例如，如果你想从 Python 程序中启动 Chromium 浏览器，可以使用以下命令：\n\
    \n```python\nimport os\nbrowser=os.system(\"/usr/bin/chromium-browser\")\n```\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_31_3.png)"
