    \ A() = default;\n    [[noreturn]] virtual void foo() override;\n};\n\ntemplate\
    \ <typename T> concept bool EqualityComparable = requires(T a,\n{ a == b } ->\
    \ bool;\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_73_2.png)\n\n## GOING\
    \ MOBILE\n\nThe mobile market is a great place to test your coding skills and\
    \ present any games or apps you’ve created. If your app is good, then who knows,\
    \ it could be the next great thing to appear on the app stores. It’s a good learning\
    \ experience nevertheless, and something worth considering.\n\n## PORTFOLIOS\n\
    \nIf you’ve learned how to code with an eye for a developer job in the future,\
    \ then it’s worth starting to build up an online portfolio of code. Look at job\
    \ postings and see what skills they require, then learn and code something with\
    \ those skills and add it to the portfolio. When it comes to applying, include\
    \ a link to the portfolio.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_74_0.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_74_1.png)\n\n## ONLINE LEARNING\n\n\
    Online courses are good examples of where to take your coding skills next, even\
    \ if you start from the beginner level again. Often, an online course follows\
    \ a strict coding convention, so if you’re self-taught then it might be worth\
    \ seeing how other developers lay out their code, and what’s considered acceptable.\n\
    \n## TEACH CODE\n\nCan you teach? If your coding skills are spot on, consider\
    \ approaching a college or university to see if they have need for a programming\
    \ language teacher, perhaps a part-time or evening course. If not teaching, then\
    \ consider creating your own YouTube how to code channel.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_74_2.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_74_3.png)\n\n## SHARE CODE\n\nGet sharing,\
    \ even if you think your code isn’t very good. The criticism, advice and comments\
    \ you receive back help you iron out any issues with your code, and you add them\
    \ all to your checklist. Alternatively your code might be utterly amazing but\
    \ you won’t know unless you share it.\n\n## HARDWARE PROJECTS\n\nContributing\
    \ to hardware projects is a great resource for proving your code with others and\
    \ learning from other contributors. Many of the developer boards have postings\
    \ for coders to apply to for hardware projects, using unique code to get the most\
    \ from the hardware that’s being designed.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_74_4.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_74_5.png)\n\nCongratulations, we have\
    \ reached the end of your latest tech adventure. With help from our team of tech\
    \ experts, you have been able to answer all your questions, grow in confidence\
    \ and ultimately master any issues you had. You can now proudly proclaim that\
    \ you are getting the absolute best from your latest choice from the ever changing\
    \ world of consumer technology and software.\n\nSo what’s next? Do you want to\
    \ start a new hobby? Are you looking to upgrade to a new device? Or simply looking\
    \ to learn a new skill? Whatever your plans we are here to help you. Just check\
    \ our expansive range of For Beginners guidebooks and we are positive you will\
    \ find what you are looking for. This adventure with us may have ended, but that’s\
    \ not to say that your journey is over. Every new hardware or software update\
    \ brings its new features and challenges, and of course you already know we are\
    \ here to help. So we will look forward to seeing you again soon.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_75_0.png)\n\
