    \n## 创建你自己的模块\n\n如果将大型程序分解成更小的部分，并将需要的部分作为模块导入，管理起来会容易得多。学习构建自己的模块也有助于理解它们的工作原理。\n\
    \n### 构建模块\n\n模块是包含代码的 Python 文件，使用 `.py` 扩展名保存。然后使用我们熟悉的 `import` 命令将它们导入 Python。\n\
    \n**第 1 步** 让我们从创建一组基本的数学函数开始。将一个数字乘以二、三，求平方或将一个数字提升到一个指数（幂）。在 IDLE 中创建一个新文件并输入：\n\
    \n```python\ndef timestwo(x):\n    return x * 2\n\ndef timesthree(x):\n    return\
    \ x * 3\n\ndef square(x):\n    return x * x\n\ndef power(x,y):\n    return x **\
    \ y\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_41_0.png)\n\n**第 2 步** 在上述代码下方，输入调用代码的函数：\n\
    \n```python\nprint (timestwo(2))\nprint (timesthree(3))\nprint (square(4))\nprint\
    \ (power(5,3))\n```\n\n将程序保存为 `basic_math.py` 并执行以获取结果。\n\n**第 3 步** 现在你要将函数定义从程序中取出，放入一个单独的文件中。高亮显示函数定义并选择“编辑”\
    \ > “剪切”。选择“文件” > “新建文件”，并在新窗口中使用“编辑” > “粘贴”。你现在有两个独立的文件，一个包含函数定义，另一个包含函数调用。\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_41_1.png)\n\n**第 4 步** 如果你现在尝试再次执行\
    \ `basic_math.py` 代码，将显示错误“NameError: name 'timestwo' is not defined”。这是因为代码不再能访问函数定义。\n\
    \n```\nTraceback (most recent call last):\n  File \"/home/pi/Documents/Python\
    \ Code/basic_math.py\", line 3, in <module>\n    print (timestwo(2))\nNameError:\
