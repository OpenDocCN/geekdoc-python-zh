    ## 元组


    元组与列表非常相似。然而，列表可以被更新、删除或以某种方式更改，而元组则保持不变。这被称为不可变，它们非常适合存储固定的数据项。


    ### 不可变的元组


    拥有元组的原因取决于程序的用途。通常，元组是为特殊事物保留的，但它们也用于例如冒险游戏中存储非玩家角色名称。


    第1步 元组的创建方式与列表相同，但在此情况下使用圆括号而不是方括号。例如：

    ```

