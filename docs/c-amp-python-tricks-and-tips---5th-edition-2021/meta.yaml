  md: "# User Interaction\n\nThere’s nothing quite as satisfying as creating a program\
    \ that responds to you. This basic user interaction is one of the most taught\
    \ aspects of any language and with it you’re able to do much more than simply\
    \ greet the user by name.\n\n# HELLO, DAVE\n\nYou have already used cout, the\
    \ standard output stream, throughout our code. Now you’re going to be using cin,\
    \ the standard input stream, to prompt a user response.\n\nSTEP 1 Anything that\
    \ you want the user to input into the program needs to be stored somewhere in\
    \ the system memory, so it can be retrieved and used. Therefore, any input must\
    \ first be declared as a variable, so it’s ready to be used by the user. Start\
    \ by creating a blank C++ file with headers.\n\nSTEP 3 The cin command works in\
    \ the opposite way from the cout command. With the first cout line you’re outputting\
    \ ‘What is your age’ to the screen, as indicated with the chevrons. Cin uses opposite\
    \ facing chevrons, indicating an input. The input is put into the integer age\
    \ and called up in the second cout command. Build and run the code.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_45_0.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_45_1.png)\n\nSTEP 4 If you’re asking\
    \ a question, you need to store the input as a string; to ask the user their name,\
    \ you would use:\n\nSTEP 2 The data type of the variable must also match the type\
    \ of input you want from the user. For example, to ask a user their age, you would\
    \ use an integer like this:\n\n```\ncpp\n#include <iostream>\nusing namespace\
    \ std;\n\nint main ()\n{\n    int age;\n    cout << \"what is your age: \";\n\
    \    cin >> age;\n\n    cout <<\"\\nYou are \" << age << \" years old.\\n\";\n\
    }\n```\n\n```\ncpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n\
    {\n    string name;\n    cout << \"what is your name: \";\n    cin >> name;\n\n\
    \    cout << \"\\nHello, \" << name << \". I hope you’re well today?\\n\";\n}\n\
    ```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_45_2.png)\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_45_3.png)"
