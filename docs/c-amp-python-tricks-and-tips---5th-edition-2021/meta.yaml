    \ the previous month. So the counting of the days will start on Friday 1st June\
    \ 2018 and will total 30 as the output correctly displays.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_30_4.png)\n\
    \nSTEP 8 You’re also able to print the individual months or days of the week:\n\
    \n```python\nimport calendar\nfor name in calendar.month_name:\n    print(name)\n\
    \nimport calendar\nfor name in calendar.day_name:\n    print(name)\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_30_1.png)\n\
    \nSTEP 9 The calendar module also allows us to write the functions in HTML, so\
    \ that you can display it on a website. Let’s start by creating a new file:\n\n\
    ```python\nimport calendar\ncal=open(\"/home/pi/Documents/cal.html\", \"w\")\n\
    c=calendar.HTMLCalendar(calendar.SUNDAY)\ncal.write(c.formatmonth(2018, 1))\n\
    cal.close()\n```\n\nThis code will create an HTML file called cal, open it with\
    \ a browser and it displays the calendar for January 2018.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_30_3.png)\n\
    \nSTEP 10 Of course, you can modify that to display a given year as a web page\
    \ calendar:\n\n```python\nimport calendar\nyear=int(input(\"Enter the year to\
    \ display as a webpage: \"))\ncal=open(\"/home/pi/Documents/cal.html\", \"w\"\
    )\ncal.write(calendar.HTMLCalendar(calendar.MONDAY).formatyear(year))\ncal.close()\n\
    ```\n\nThis code asks the user for a year, then creates the necessary webpage.\
    \ Remember to change your file destination.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_30_5.png)\n\
    \n## OS Module\n\nThe OS module allows you to interact directly with the built-in\
    \ commands found in your operating system. Commands vary depending on the OS you’re\
    \ running, as some will work with Windows whereas others will work with Linux\
    \ and macOS.\n\n### INTO THE SYSTEM\n\nOne of the primary features of the OS module\
    \ is the ability to list, move, create, delete and otherwise interact with files\
    \ stored on the system, making it the perfect module for backup code.\n\nYou can\
    \ start the OS module with some simple functions to see how it interacts with\
    \ the operating system environment that Python is running on. If you’re using\
    \ Linux or the Raspberry Pi, try this:\n\n```python\nimport os\nhome=os.getcwd()\n\
    print(home)\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_31_0.png)\n\nThe\
    \ Windows output is different as that’s the current working directory of Python,\
    \ as determined by the system; as you might suspect, the `os.getcwd()` function\
    \ is asking Python to retrieve the Current Working Directory. Linux users will\
    \ see something along the same lines as the Raspberry Pi, as will macOS users.\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_31_1.png)\n\nThe returned result from\
    \ printing the variable home is the current user’s home folder on the system.\
    \ In our example that’s /home/pi; it will be different depending on the user name\
    \ you log in as and the operating system you use. For example, Windows 10 will\
    \ output: C:\\Program Files (x86)\\Python36-32.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_31_2.png)\n\
    \nYet another interesting element to the OS module, is its ability to launch programs\
    \ that are installed in the host system. For instance, if you wanted to launch\
    \ the Chromium browser from within a Python program you can use the command:\n\
    \n```python\nimport os\nbrowser=os.system(\"/usr/bin/chromium-browser\")\n```\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_31_3.png)"
