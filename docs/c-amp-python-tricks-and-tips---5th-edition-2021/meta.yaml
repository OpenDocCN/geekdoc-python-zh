    \ code.\n\n## Calendar Module\n\nBeyond the time module, the calendar module can\
    \ produce some interesting results when executed within your code. It does far\
    \ more than simply display the date in the time module-like format, you can actually\
    \ call up a wall calendar type display.\n\n### WORKING WITH DATES\n\nThe calendar\
    \ module is built into Python 3. However, if for some reason it’s not installed\
    \ you can add it using `pip install calendar` as a Windows administrator or `sudo\
