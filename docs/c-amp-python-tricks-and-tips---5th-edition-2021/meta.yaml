    # Formatting Strings


    When you work with data, creating lists, dictionaries and objects you may often
    want to print out the results. Merging strings with data is easy especially with
    Python 3, as earlier versions of Python tended to complicate matters.


    # STRING FORMATTING


    Since Python 3, string formatting has become a much neater process, using the
    .format function combined with curly brackets. It''s a more logical and better
    formed approach than previous versions.


    STEP 1 The basic formatting in Python is to call each variable into the string
    using the curly brackets:


    ```

    name="Conan"

    print("The barbarian hero of the Hyborian Age is: {}".format(name))

    ```


    ![](img/763cdde75d55911fbf7836a707fd3c3b_15_0.png)


    STEP 3 You can of course also include integers into the mix:


    ```

    number=10000

    print("{} of {} was a skilled mercenary, and thief too. He once stole {} gold
    from a merchant.".format(name, place, number))

    ```


    ![](img/763cdde75d55911fbf7836a707fd3c3b_15_1.png)


    STEP 2 Remember to close the print function with two sets of brackets, as you''ve
    encased the variable in one, and the print function in another. You can include
    multiple cases of string formatting in a single print function:


    ```

    name="Conan"

    place="Cimmeria"

    print("{} hailed from the North, in a cold land known as {}".format(name, place))

    ```


    ![](img/763cdde75d55911fbf7836a707fd3c3b_15_2.png)


    STEP 4 There are many different ways to apply string formatting, some are quite
    simple, as we''ve shown you here; others can be significantly more complex. It
    all depends on what you want from your program. A good place to reference frequently
    regarding string formatting is the Python Docs webpage, found at www.docs.python.org/3.1/library/string.html.
    Here, you will find tons of help.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_15_3.png)'
  - '[PAGE 16]


    # Formatting Strings


    STEP 5 Interestingly you can reference a list using the string formatting function.
    You need to place an asterisk in front of the list name:


    ```

    numbers=1, 3, 45, 567546, 3425346345

    print("Some numbers: {}, {}, {}, {}, {}".format(*numbers))

    ```


    ![](img/763cdde75d55911fbf7836a707fd3c3b_16_0.png)


    STEP 8 You can also print out the content of a user''s input in the same fashion:


    ```

    name=input("What''s your name? ")

    print("Hello {}.".format(name))

    ```


    ![](img/763cdde75d55911fbf7836a707fd3c3b_16_1.png)


    STEP 6 With indexing in lists, the same applies to calling a list using string
    formatting. You can index each item according to its position (from 0 to however
    many are present):


    ```

    numbers=1, 4, 7, 9

    print("More numbers: {3}, {0}, {2}, {1}.".format(*numbers))

    ```


    ![](img/763cdde75d55911fbf7836a707fd3c3b_16_2.png)


    STEP 9 You can extend this simple code example to display the first letter in
    a person''s entered name:


    ```

    name=input("What''s your name? ")

    print("Hello {}.".format(name))

    lname=list(name)

    print("The first letter of your name is a {0}".format(*lname))

    ```


    ![](img/763cdde75d55911fbf7836a707fd3c3b_16_3.png)


    STEP 7 And as you probably suspect, you can mix strings and integers in a single
    list to be called in the .format function:


    ```

    characters=["Conan", "Belit", "Valeria", 19, 27, 20]

    print ("{0} is {3} years old. Whereas {1} is {4} years old.".format(*characters))

    ```


    ![](img/763cdde75d55911fbf7836a707fd3c3b_16_4.png)


    STEP 10 You can also call upon a pair of lists and reference them individually
    within the same print function. Looking back the code from Step 7, you can alter
    it with:


    ```

    names=["Conan", "Belit", "Valeria"]

    ages=[25, 21, 22]


    Creating two lists. Now you can call each list, and individual items:

    print("{0[0]} is {1[0]} years old. Whereas {0[1]} is {1[1]} years old.".format(names,
    ages))

    ```


    ![](img/763cdde75d55911fbf7836a707fd3c3b_16_5.png)'
