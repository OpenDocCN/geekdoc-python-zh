  - "[PAGE 46]\n\n# User Interaction\n\nSTEP 5 The principal works the same as the\
    \ previous code. The user's input, their name, is stored in a string, because\
    \ it contains multiple characters, and retrieved in the second cout line. As long\
    \ as the variable 'name' doesn't change, then you can recall it wherever you like\
    \ in your code\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_46_0.png)\n\nSTEP 8\
    \ While cin works well for most input tasks, it does have a limitation. Cin always\
    \ considers spaces as a terminator, so it's designed for just single words not\
    \ multiple words. However, getline takes cin as the first argument and the variable\
    \ as the second:\n\n```\ncpp\n#include <iostream>\nusing namespace std;\n\nint\
    \ main ()\n{\n    string mystr;\n    cout << \"Enter a sentence: \\n\";\n    getline(cin,\
    \ mystr);\n    cout << \"Your sentence is: \" << mystr.size() << \" characters\
    \ long.\\n\";\n}\n```\n\nSTEP 6 You can chain input requests to the user but just\
    \ make sure you have a valid variable to store the input to begin with. Let's\
    \ assume you want the user to enter two whole numbers:\n\n```\ncpp\n#include <iostream>\n\
    using namespace std;\n\nint main ()\n{\n    int num1, num2;\n    cout << \"Enter\
    \ two whole numbers: \";\n    cin >> num1 >> num2;\n    cout << \"you entered\
    \ \" << num1 << \" and \" << num2 << \"\\n\";\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_46_1.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_46_2.png)\n\nSTEP 9 Build and execute\
    \ the code, then enter a sentence with spaces. When you're done the code reads\
    \ the number of characters. If you remove the getline line and replace it with\
    \ cin >> mystr and try again, the result displays the number of characters up\
    \ to the first space.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_46_3.png)\n\n\
    STEP 7 Likewise, inputted data can be manipulated once you have it stored in a\
    \ variable. For instance, ask the user for two numbers and do some maths on them:\n\
    \n```\ncpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    float\
    \ num1, num2;\n    cout << \"Enter two numbers: \\n\";\n    cin >> num1 >> num2;\n\
    \    cout << num1 << \" + \" << num2 << \" is: \" << num1 + num2 << \"\\n\";\n\
    }\n```\n\nSTEP 10 Getline is usually a command that new C++ programmers forget\
    \ to include. The terminating white space is annoying when you can't figure out\
    \ why your code isn't working. In short, it's best to use getline(cin, variable)\
    \ in future:\n\n```\ncpp\n#include <iostream>\nusing namespace std;\n\nint main\
    \ ()\n{\n    string name;\n    cout << \"Enter your full name: \\n\";\n    getline(cin,\
    \ name);\n    cout << \"\\nHello, \" << name << \"\\n\";\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_46_4.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_46_5.png)"
  - "[PAGE 47]\n\n# Character Literals\n\nIn C++ a literal is an object or variable\
    \ that once defined remains the same throughout the code. However, a character\
    \ literal is defined by a backslash, such as the \\n you've been using at the\
    \ end of a cout statement to signify a new line.\n\n# ESCAPE SEQUENCE\n\nWhen\
    \ used in something like a cout statement, character literals are also called\
    \ Escape Sequence Codes. They allow you to insert a quote, an alert, new line\
    \ and much more.\n\nSTEP 1 Create a new C++ file and enter the relevant headers:\n\
    \n```\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n\n}\n```\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_47_0.png)\n\nSTEP 3 If you wanted to\
    \ insert speech quotes inside a cout statement, you would have to use a backslash\
    \ as it already uses quotes:\n\n```\n#include <iostream>\nusing namespace std;\n\
    \nint main ()\n{\n    cout << \"Hello, user. This is how to use \"quotes\".\"\
    ;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_47_1.png)\n\nSTEP 2 You've\
    \ already experienced the \\n character literal placing a new line wherever it's\
    \ called. The line: `cout << \"Hello\\n\" << \"I'm a C++\\n\" << \"Program!\\\
    n\";` outputs three lines of text, each starting after the last \\n.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_47_2.png)\n\
    \nSTEP 4 There's even a character literal that can trigger an alarm. In Windows\
    \ 10, it's the notification sound that chimes when you use \\a. Try this code,\
    \ and turn up your sound.\n\n```\n#include <iostream>\nusing namespace std;\n\n\
    int main ()\n{\n    cout << \"ALARM! \\a\";\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_47_3.png)"
  - "[PAGE 48]\n\n# A HANDY CHART\n\nThere are numerous character literals, or escape\
    \ sequence codes, to choose from. We therefore thought it would be good for you\
    \ to have a handy chart available, for those times when you need to insert a code.\n\
    \n| ESCAPE SEQUENCE CODE | CHARACTER |\n|---|---|\n| \\ | Backslash |\n| \\' |\
    \ Single Quote |\n| \" | Double Quote (Speech Marks) |\n| \\? | Question Mark\
    \ |\n| \\a | Alert/Alarm |\n| \\b | Backspace |\n| \\f | Form Feed |\n| \\n |\
    \ New Line |\n| \\r | Carriage Return |\n| \\t | Horizontal Tab |\n| \\v | Vertical\
    \ Tab |\n| \\0 | Null Character |\n| \\uxxxx | Unicode (UTF-8) |\n| \\Uxxxxxxxx\
    \ | Unicode (UTF-16) |\n\n# UNICODE CHARACTERS (UTF-8)\n\nUnicode characters are\
    \ symbols or characters that are standard across all platforms. For example, the\
    \ copyright symbol, that can be entered via the keyboard by entering the Unicode\
    \ code, followed by ALT+X. In the case of the copyright symbol enter: 00A9 Alt+X.\
    \ In C++ code, you would enter:\n\n```\n#include <iostream>\nusing namespace std;\n\
    \nint main ()\n{\n    cout << \"\\u00A9\";\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_48_0.png)\n\
    \n# UNICODE CHARACTER TABLE\n\nA complete list of the available Unicode characters\
    \ can be found at **www.unicode-table.com/en/**. Hover your mouse over the character\
    \ to see its unique code to enter in C++.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_48_1.png)"
  - "[PAGE 49]\n\n# Defining Constants\n\nConstants are fixed values in your code.\
    \ They can be any basic data type but as the name suggests their value remains\
    \ constant throughout the entire code. There are two separate ways to define a\
    \ constant in C++, the #define pre-processor and const.\n\n# #DEFINE\n\nThe pre-processors\
    \ are instructions to the compiler to pre-process the information before it goes\
    \ ahead and compiles the code. #include is a pre-processor as is #define.\n\n\
    STEP 1 You can use the #define pre-processor to define any constants you want\
    \ in our code. Start by creating a new C++ file complete with the usual headers:\n\
    \n```\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n}\n```\n\n\
    ![](img/763cdde75d55911fbf7836a707fd3c3b_49_0.png)\n\nSTEP 3 Note the capitals\
    \ for defined constants, it's considered good programming practise to define all\
    \ constants in capitals. Here, the assigned values are 50, 40 and 60, so let's\
    \ call them up:\n\n```\n#include <iostream>\nusing namespace std;\n\n#define LENGTH\
    \ 50\n#define WIDTH 40\n#define HEIGHT 60\n\nint main ()\n{\n    cout << \"Length\
    \ is: \" << LENGTH << \"\\n\";\n    cout << \"Width is: \" << WIDTH << \"\\n\"\
    ;\n    cout << \"Height is: \" << HEIGHT << \"\\n\";\n}\n```\n\nSTEP 2 Now let's\
    \ assume your code has three different constants: length, width and height. You\
    \ can define them with:\n\n```\n#include <iostream>\nusing namespace std;\n#define\
    \ LENGTH 50\n#define WIDTH 40\n#define HEIGHT 60\n\nint main ()\n{\n}\n```\n\n\
    ![](img/763cdde75d55911fbf7836a707fd3c3b_49_1.png)\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_49_2.png)\n\
    \nSTEP 4 Build and run the code. Just as expected, it displays the values for\
    \ each of the constants created. It's worth noting that you don't need a semicolon\
    \ when you're defining a constant with the #define keyword.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_49_3.png)"
  - "[PAGE 50]\n\n# Defining Constants\n\nSTEP 5 You can also define other elements\
    \ as a constant. For example, instead of using \\n for a newline in the cout statement,\
    \ you can define it at the start of the code:\n\n```\n#include <iostream>\nusing\
    \ namespace std;\n\n#define LENGTH 50\n#define WIDTH 40\n#define HEIGHT 60\n#define\
    \ NEWLINE '\\n'\n\nint main()\n{\n    cout << \"Length is: \" << LENGTH << NEWLINE;\n\
    \    cout << \"Width is: \" << WIDTH << NEWLINE;\n    cout << \"Height is: \"\
    \ << HEIGHT << NEWLINE;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_50_0.png)\n\
    \nSTEP 6 The code, when built and executed, does exactly the same as before, using\
    \ the new constant NEWLINE to insert a newline in the cout statement. Incidentally,\
    \ creating a newline constant isn't a good idea unless you're making it smaller\
    \ than \\n or even the endl command.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_50_1.png)\n\
    \nSTEP 7 Defining a constant is a good way of initialising your base values at\
    \ the start of your code. You can define that your game has three lives, or even\
    \ the value of PI without having to call up the C++ math library:\n\n```\n#include\
    \ <iostream>\nusing namespace std;\n\n#define PI 3.14159\n\nint main()\n{\n  \
    \  cout << \"The value of Pi is: \" << PI << endl;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_50_2.png)\n\
    \nSTEP 8 Another method of defining a constant is with the const keyword. Use\
    \ const together with a data type, variable and value: const type variable = value.\
    \ Using Pi as an example:\n\n```\n#include <iostream>\nusing namespace std;\n\n\
    int main()\n{\n    const double PI = 3.14159;\n    cout << \"The value of Pi is:\
    \ \" << PI << endl;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_50_3.png)\n\
    \nSTEP 9 Because you're using const within the main block of code, you need to\
    \ finish the line with a semicolon. You can use either, as long as the names and\
    \ values don't clash, but it's worth mentioning that #define requires no memory,\
    \ so if you're coding to a set amount of memory, #define is your best bet.\n\n\
    ![](img/763cdde75d55911fbf7836a707fd3c3b_50_4.png)\n\nSTEP 10 Const works in much\
    \ the same way as #define. You can create static integers and even newlines:\n\
    \n```\n#include <iostream>\nusing namespace std;\n\nint main()\n{\n    const int\
    \ LENGTH = 50;\n    const int WIDTH = 40;\n    const char NEWLINE = '\\n';\n \
    \   int area;\n    area = LENGTH * WIDTH;\n    cout << \"Area is: \" << area <<\
    \ NEWLINE;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_50_5.png)"
- md: "## File Input/Output\n\nThe standard iostream library provides C++ coders with\
    \ the cin and cout input and output functionality. However, to be able to read\
    \ and write from a file you need to utilise another C++ library, called fstream.\n\
    \n## FSTREAMS\n\nThere are two main data types within the fstream library that\
    \ are used to open a file, read from it and write to it, ofstream and ifstream.\
    \ Here's how they work.\n\n**STEP 1** The first task is to create a new C++ file\
    \ and along with the usual headers you need to include the new fstream header:\n\
    \n```\n#include <iostream>\n#include <fstream>\nusing namespace std;\n\nint main\
    \ ()\n{\n\n}\n```\n\n**STEP 2** Begin by asking a user for their name and writing\
    \ that information to a file. You need the usual string to store the name, and\
    \ getline to accept the input from the user.\n\n```\n#include <iostream>\n#include\
    \ <fstream>\nusing namespace std;\n\nint main ()\n{\n    string name;\n    ofstream\
    \ newfile;\n    newfile.open(\"name.txt\");\n    cout << \"Enter your name: \"\
    \ << endl;\n    getline(cin, name);\n    newfile << name << endl;\n    newfile.close();\n\
    }\n```\n\n**STEP 3** We've included comments in the screenshot of step 2 to help\
    \ you understand the process. You created a string called name, to store the user's\
    \ inputted name. You also created a text file called name.txt (with the ofstream\
    \ newfile and newfile.open lines), asked the user for their name and stored it\
    \ and then written the data to the file.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_51_0.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_51_1.png)\n\n**STEP 4** To read the\
    \ contents of a file, and output it to the screen, you need to do things slightly\
    \ differently. First you need to create a string variable to store the file's\
    \ contents (line by line), then open the file, use getline to read the file line\
    \ by line and output those lines to the screen. Finally, close the file.\n\n```\n\
    string line;\nifstream newfile (\"name.txt\");\ncout << \"Contents of the file:\
    \ \" << endl;\ngetline(newfile, line);\ncout << line << endl;\nnewfile.close();\n\
    ```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_51_2.png)\n\n**STEP 5** The code\
    \ above is great for opening a file with one or two lines but what if there are\
    \ multiple lines? Here we opened a text file of the poem Cimmeria, by Robert E\
    \ Howard:\n\n```\nstring line;\nifstream newfile (\"c:\\\\users\\\\david\\\\Documents\\\
    \\Cimmeria.txt\");\ncout << \"Cimmeria, by Robert E Howard: \\n\" << endl;\nwhile\
    \ (getline(newfile, line))\n    cout << line << endl;\nnewfile.close();\n```\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_52_0.png)\n\n**STEP 6** You can no\
    \ doubt see that we've included a while loop, which we cover in a few pages time.\
    \ It means that while there are lines to be read from the text file, C++ getlines\
    \ them. Once all the lines are read, the output is displayed on the screen and\
    \ the file is closed.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_52_2.png)\n\n\
    **STEP 7** You can also see that the location of the text file Cimmeria.txt isn't\
    \ in the same folder as the C++ program. When we created the first name.txt file,\
    \ it was written to the same folder where the code was located; this is done by\
    \ default. To specify another folder, you need to use double-back slashes, as\
    \ per the character literals/escape sequence code.\n\n```\nstring line;\nifstream\
    \ newfile (\"c:\\\\users\\\\david\\\\Documents\\\\Cimmeria.txt\");\ncout << \"\
    Cimmeria, by Robert E Howard: \\n\" << endl;\n```\n\n**STEP 8** Just as you might\
    \ expect, you can write almost anything you like to a file, for reading either\
    \ in Notepad or via the console through the C++ code:\n\n```\nstring name;\nint\
    \ age;\nofstream newfile;\nnewfile.open(\"name.txt\");\ncout << \"Enter your name:\
    \ \" << endl;\ngetline(cin, name);\nnewfile << name << endl;\ncout << \"\\nHow\
    \ old are you: \" << endl;\ncin >> age;\nnewfile << age << endl;\nnewfile.close();\n\
    ```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_52_1.png)\n\n**STEP 9** The code\
    \ from step 8 differs again, but only where it comes to adding the age integer.\
    \ Notice that we used cin >> age, instead of the previous getline(cin, variable).\
    \ The reason for this is that the getline function handles strings, not integers;\
    \ so when you're using a data type other than a string, use the standard cin.\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_52_3.png)\n\n**STEP 10** Here's an\
    \ exercise: see if you can create code to write several different elements to\
    \ a text file. You can have a user's name, age, phone number etc. Maybe even the\
    \ value of Pi and various mathematical elements. It's all good practice.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_52_4.png)\n\
    \n## Loops and Decision Making\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_53_0.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_54_0.png)\n\nLoops and repetition are\
    \ one of the most important factors of any programming language. Good use of a\
    \ loop creates a program that does exactly what you want it to and delivers the\
    \ desired outcome without issues or errors.\n\nWithout loops and decision making\
    \ events within the code, your program will never be able to offer the user any\
    \ choice. It's this understanding of choice that elevates your skills as a programmer\
    \ and makes for much better code.\n\n## While Loop\n\nA while loop’s function\
    \ is to repeat a statement, or a group of statements, while a certain condition\
    \ remains true. When the while loop starts, it initialises itself by testing the\
    \ condition of the loop and the statements within, before executing the rest of\
    \ the loop.\n\n### TRUE OR FALSE?\n\nWhile loops are one of the most popular form\
    \ of C++ code looping. They repeatedly run the code contained within the loop\
    \ while the condition is true. Once it proves false, the code continues as normal.\n\
    \n**STEP 1** Clear what you’ve done so far and create a new C++ file. There’s\
    \ no need for any extra headers at the moment, so add the standard headers as\
    \ per usual:\n\n```\n#include <iostream>\nusing namespace std;\n\nint main ()\n\
    {\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_55_0.png)\n\n**STEP 2**\
    \ Create a simple while loop. Enter the code below, build and run (we’ve added\
    \ comments to the screen shot):\n\n```\n{\n    int num = 1;\n\n    while (num\
    \ < 30 )\n    {\n        cout << \"Number: \" << num << endl;\n        num = num\
    \ +1;\n    }\n\n    return 0;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_55_2.png)\n\
    \n**STEP 3** First you need to create a condition, so use a variable called num\
    \ and give it the value 1. Now create the while loop, stating that as long as\
    \ num is less than 30, the loop is true. Within the loop the value of num is displayed\
    \ and adds 1 until it’s more than 30.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_55_1.png)\n\
    \n**STEP 4** We’re introducing a few new elements here. The first are the opening\
    \ and closing braces for the while loop. This is because our loop is a compound\
    \ statement, meaning a group of statements; note also, there’s no semicolon after\
    \ the while statement. You now also have return 0, which is a clean and preferred\
    \ way of ending the code.\n\n```\n{\n    int num = 1; // Create the condition\n\
    \n    while (num < 30 ) // The condition remains true while num is less than 30\n\
    \    {\n        cout << \"Number: \" << num << endl; // Displays the current value\
    \ of num\n        num = num +1; // Adds 1 to the value of num\n    }\n\n    return\
    \ 0; // Correctly closes the code and finishes the program\n}\n```\n\n**STEP 5**\
    \ If you didn’t need to see the continually increasing value of num, you could\
    \ have done away with the compound while statement and instead just added num\
    \ by itself until it reached 30, and then displayed the value:\n\n```\n{\n   \
    \ int num = 1;\n\n    while (num < 30 )\n        num++;\n    cout << \"Number:\
    \ \" << num << endl;\n\n    return 0;\n}\n```\n\n**STEP 6** It's important to\
    \ remember not to add a semicolon at the end of a while statement. Why? Well,\
    \ as you know, the semicolon represents the end of a C++ line of code. If you\
    \ place one at the end of a while statement, your loop will be permanently stuck\
    \ until you close the program.\n\n**STEP 7** In our example, if we were to execute\
    \ the code the value of num would be 1, as set by the int statement. When the\
    \ code hits the while statement it reads that while the condition of 1 being less\
    \ than 30 is true, loop. The semicolon closes the line, so the loop repeats; but\
    \ it never adds 1 to num, as it won't continue through the compound statement.\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_56_1.png)\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_56_2.png)\n\
    \n**STEP 8** You can manipulate the while statement to display different results\
    \ depending on what code lies within the loop. For example, to read the poem,\
    \ Cimmeria, word by word, you would enter:\n\n```\n#include <iostream>\n#include\
    \ <fstream>\nusing namespace std;\n\nint main()\n{\n    string word;\n    ifstream\
    \ newfile (\"C:\\\\users\\\\david\\\\Documents\\\\Cimmeria.txt\");\n\n    cout\
    \ << \"Cimmeria, by Robert E Howard: \\n\" << endl;\n\n    while (newfile >> word)\n\
    \    {\n        cout << word << endl;\n    }\n\n    return 0;\n}\n```\n\n**STEP\
    \ 9** You can further expand the code to enable each word of the poem to appear\
    \ every second. To do so, you need to pull in a new library, <windows.h>. This\
    \ is a Windows only library and within it you can use the Sleep() function:\n\n\
    ![](img/763cdde75d55911fbf7836a707fd3c3b_56_0.png)\n\n```\n#include <iostream>\n\
    #include <fstream>\n#include <windows.h>\nusing namespace std;\n\nint main()\n\
    {\n    string word;\n    ifstream newfile (\"C:\\\\users\\\\david\\\\Documents\\\
    \\Cimmeria.txt\");\n\n    cout << \"Cimmeria, by Robert E Howard: \\n\" << endl;\n\
    \n    while (newfile >> word)\n    {\n        cout << word << endl;\n        Sleep(1000);\n\
    \    }\n\n    return 0;\n}\n```\n\n**STEP 10** Sleep() works in milliseconds,\
    \ so Sleep(1000) is one second, Sleep(10000) is ten seconds and so on. Combining\
    \ the sleep function (along with the header it needs) and a while loop enables\
    \ you to come up with some interesting countdown code.\n\n```\n#include <iostream>\n\
    #include <windows.h>\nusing namespace std;\n\nint main()\n{\n    int a = 10;\n\
    \    while (a != 0)\n    {\n        cout << a << endl;\n        a = a - 1;\n \
    \       Sleep(1000);\n    }\n\n    cout << \"\\nBlast Off!\" << endl;\n\n    return\
    \ 0;\n}\n```"
  mdcn: "## 文件输入/输出\n\n标准iostream库为C++程序员提供了`cin`和`cout`的输入输出功能。然而，要能够从文件中读取和写入数据，你需要使用另一个名为`fstream`的C++库。\n\
