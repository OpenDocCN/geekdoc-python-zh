  md: "# User Interaction\n\nSTEP 5 The principal works the same as the previous code.\
    \ The user's input, their name, is stored in a string, because it contains multiple\
    \ characters, and retrieved in the second cout line. As long as the variable 'name'\
    \ doesn't change, then you can recall it wherever you like in your code\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_46_0.png)\n\
    \nSTEP 8 While cin works well for most input tasks, it does have a limitation.\
    \ Cin always considers spaces as a terminator, so it's designed for just single\
    \ words not multiple words. However, getline takes cin as the first argument and\
    \ the variable as the second:\n\n```\ncpp\n#include <iostream>\nusing namespace\
    \ std;\n\nint main ()\n{\n    string mystr;\n    cout << \"Enter a sentence: \\\
    n\";\n    getline(cin, mystr);\n    cout << \"Your sentence is: \" << mystr.size()\
    \ << \" characters long.\\n\";\n}\n```\n\nSTEP 6 You can chain input requests\
    \ to the user but just make sure you have a valid variable to store the input\
    \ to begin with. Let's assume you want the user to enter two whole numbers:\n\n\
    ```\ncpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    int\
    \ num1, num2;\n    cout << \"Enter two whole numbers: \";\n    cin >> num1 >>\
    \ num2;\n    cout << \"you entered \" << num1 << \" and \" << num2 << \"\\n\"\
    ;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_46_1.png)\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_46_2.png)\n\
    \nSTEP 9 Build and execute the code, then enter a sentence with spaces. When you're\
    \ done the code reads the number of characters. If you remove the getline line\
    \ and replace it with cin >> mystr and try again, the result displays the number\
    \ of characters up to the first space.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_46_3.png)\n\
    \nSTEP 7 Likewise, inputted data can be manipulated once you have it stored in\
    \ a variable. For instance, ask the user for two numbers and do some maths on\
    \ them:\n\n```\ncpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n\
    {\n    float num1, num2;\n    cout << \"Enter two numbers: \\n\";\n    cin >>\
    \ num1 >> num2;\n    cout << num1 << \" + \" << num2 << \" is: \" << num1 + num2\
    \ << \"\\n\";\n}\n```\n\nSTEP 10 Getline is usually a command that new C++ programmers\
    \ forget to include. The terminating white space is annoying when you can't figure\
    \ out why your code isn't working. In short, it's best to use getline(cin, variable)\
    \ in future:\n\n```\ncpp\n#include <iostream>\nusing namespace std;\n\nint main\
    \ ()\n{\n    string name;\n    cout << \"Enter your full name: \\n\";\n    getline(cin,\
    \ name);\n    cout << \"\\nHello, \" << name << \"\\n\";\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_46_4.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_46_5.png)"
