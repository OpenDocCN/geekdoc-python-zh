    \ is usually built into Python 3. However, if it’s available when you enter: `import\
    \ tkinter`, then you need to `pip install tkinter` from the command prompt. We\
    \ can start to import modules differently than before, to save on typing and by\
    \ importing all their contents:\n\n```\nimport tkinter as tk\nfrom tkinter import\
    \ *\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_35_0.png)\n\n**STEP 3** The\
    \ ideal approach is to add mainloop() into the code to control the Tkinter event\
    \ loop, but we’ll get to that soon. You’ve just created a Tkinter widget and there\
    \ are several more we can play around with:\n\n```\nbtn=Button()\nbtn.pack()\n\
    btn[\"text\"]=\"Hello everyone!\"\n```\n\nThe first line focuses on the newly\
