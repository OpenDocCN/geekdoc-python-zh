    \ two specific years:\n\n```python\nleaps=calendar.leapdays(1900, 2018)\nprint(leaps)\n\
    ```\n\nThe result is 29, starting from 1904 onward.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_29_0.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_29_1.png)\n\n**STEP 4** You could even\
    \ fashion that particular example into a piece of working, user interactive Python\
