- md: "## Working with Code\n\nBy now you should have the essential building blocks\
    \ of how to program in both Python and C++. You can create code, store data, ask\
    \ the user questions, offer them a choice and repeat functions until they prove\
    \ true and provide the correct output. What next then?\n\nThis final section looks\
    \ at some of the more common coding mistakes that Python and C++ beginners make\
    \ and where you can turn to next to continue your programming adventure.\n\n##\
    \ Common Coding Mistakes\n\nWhen you start something new you’re inevitably going\
    \ to make mistakes, this is purely down to inexperience and those mistakes are\
    \ great teachers in themselves. However, even experts make the occasional mishap.\
    \ Thing is, to learn from them as best you can.\n\n### X=MISTAKE, PRINT Y\n\n\
    There are many pitfalls for the programmer to be aware of, far too many to be\
    \ listed here. Being able to recognise a mistake and fix it is when you start\
    \ to move into more advanced territory.\n\n### SMALL CHUNKS\n\nIt would be wonderful\
    \ to be able to work like Neo from The Matrix movies. Simply ask, your operator\
    \ loads it into your memory and you instantly know everything about the subject.\
    \ Sadly though, we can’t do that. The first major pitfall is someone trying to\
    \ learn too much, too quickly. So take coding in small pieces and take your time.\n\
    \n### EASY VARIABLES\n\nMeaningful naming for variables is a must to eliminate\
    \ common coding mistakes. Having letters of the alphabet is fine but what happens\
    \ when the code states there’s a problem with x variable. It’s not too difficult\
    \ to name variables lives, money, player1 and so on.\n\n```\nvar points = 1023;\n\
    var lives = 3;\nvar totalTime = 45;\nwrite(\"Points: \"+points);\nwrite(\"Lives:\
    \ \"+lives);\nwrite(\"Total Time: \"+totalTime+\" secs\");\nwrite(\"---------------------------\"\
    );\nvar totalScore = 0;\nwrite(\"Your total Score is: \"+totalScore);\n```\n\n\
    ### //COMMENTS\n\nUse comments. It’s a simple concept but commenting on your code\
    \ saves so many problems when you next come to look over it. Inserting comment\
    \ lines helps you quickly sift through the sections of code that are causing problems;\
    \ also useful if you need to review an older piece of code.\n\n```\norig += 2;\n\
    target += 2;\n--n;\n}\n#endif\nif (n == 0)\nreturn;\n\n//\n// Loop unrolling.\
    \ Here be dragons.\n//\n\n// (n & (~3)) is the greatest multiple of 4\n// In the\
    \ while loop ahead, orig will move ov\n// increments (4 elements of 2 bytes).\n\
    // end marks our barrier for not falling out\nchar const * const end = orig +\
    \ 2 * (n &\n\n// See if we’re aligned for writting in\n#if ACE_SIZEOF_LONG ==\
    \ 8 && \\\n!((defined( __amd64__ ) || defined( __x\n```\n\n### PLAN AHEAD\n\n\
    While it’s great to wake up one morning and decide to code a classic text adventure,\
    \ it’s not always practical without a good plan. Small snippets of code can be\
    \ written without too much thought and planning but longer and more in-depth code\
    \ requires a good working plan to stick to and help iron out the bugs.\n\n###\
    \ USER ERROR\n\nUser input is often a paralysing mistake in code. For example,\
    \ when the user is supposed to enter a number for their age and instead they enter\
    \ it in letters. Often a user can enter so much into an input that it overflows\
    \ some internal buffer, thus sending the code crashing. Watch those user inputs\
    \ and clearly state what’s needed from them.\n\n```\nEnter an integer number\n\
    aswdfdsf\nYou have entered wrong input\ns\nYou have entered wrong input\nf\"£\"\
    f£f\"\nYou have entered wrong input\nsdfsdf213213123\nYou have entered wrong input\n\
    123234234234234234\nYou have entered wrong input\n12\nthe number is: 12\n\nProcess\
    \ returned 0 (0x0)   execution time : 21.495 s\nPress any key to continue.\n```\n\
    \n### BACKUPS\n\nAlways make a backup of your work, with a secondary backup for\
    \ any changes you’ve made. Mistakes can be rectified if there’s a good backup\
    \ in place to revert to for those times when something goes wrong. It’s much easier\
    \ to start where you left off, rather than starting from the beginning again.\n\
    \n### RE-INVENTING WHEELS\n\nYou can easily spend days trying to fathom out a\
    \ section of code to achieve a given result and it’s frustrating and often time-wasting.\
    \ While it’s equally rewarding to solve the problem yourself, often the same code\
    \ is out there on the Internet somewhere. Don’t try and re-invent the wheel, look\
    \ to see if some else has done it first.\n\n### SECURE DATA\n\nIf you’re writing\
    \ code to deal with usernames and passwords, or other such sensitive data, then\
    \ ensure that the data isn’t in cleartext. Learn how to create a function to encrypt\
    \ sensitive data, prior to feeding into a routine that can transmit or store it\
    \ where someone may be able to get to view it.\n\n### HELP!\n\nAsking for help\
    \ is something most of us has struggled with in the past. Will the people we’re\
    \ asking laugh at us? Am I wasting everyone’s time? It’s a common mistake for\
    \ someone to suffer in silence. However, as long as you ask in the correct manner,\
    \ obey any forum rules and be polite, then your question isn’t silly.\n\n### MATHS\n\
    \nIf your code makes multiple calculations then you need to ensure that the maths\
    \ behind it is sound. There are thousands of instances where programs have offered\
    \ incorrect data based on poor mathematical coding, which can have disastrous\
    \ effects depending on what the code is set to do. In short, double check your\
    \ code equations.\n\n```\nset terminal x11\nset output\nrmax = 5\nnmax = 100\n\
    \ncomplex (x, y) = x * {1, 0} + y * {0, 1}\nmandel (x, y, z, n) = (abs (z) > rmax\
    \ || n == 100)? n: mandel (x, y, z * z + complex (x, y), n + 1)\n\nset xrange\
    \ [-0.5:0.5]\nset yrange [-0.5:0.5]\nset logscale z\nset isosample 200\nset samples\
    \ 200\nset isosample 200\nset hidden3d\nset size square\nset view 0,0\na= #0F\n\
    b= #0F\nsplot mandel(-a/100,-b/100,complex(x,y),0) notitle\n```\n\n## Beginner\
    \ Python Mistakes\n\nPython is a relatively easy language to get started in where\
    \ there’s plenty of room for the beginner to find their programming feet. However,\
    \ as with any other programming language, it can be easy to make common mistakes\
    \ that’ll stop your code from running.\n\n### DEF BEGINNER(MISTAKES=10)\n\nHere\
    \ are ten common Python programming mistakes most beginners find themselves making.\
    \ Being able to identify these mistakes will save you headaches in the future.\n\
    \n### VERSIONS\n\nTo add to the confusion that most beginners already face when\
    \ coming into programming, Python has two live versions of its language available\
    \ to download and use. There is Python version 2.7.x and Python 3.6.x. The 3.6.x\
    \ version is the most recent, and the one we’d recommend starting. But, version\
    \ 2.7.x code doesn’t always work with 3.6.x code and vice versa.\n\n### INDENTS,\
    \ TABS AND SPACES\n\nPython uses precise indentations when displaying its code.\
    \ The indents mean that the code in that section is a part of the previous statement,\
    \ and not something linked with another part of the code. Use four spaces to create\
    \ an indent, not the Tab key.\n\n```python\nMOVESPEED = 11\nMOVE = 1\nSHOOT =\
    \ 15\n\n# set up counting\nscore = 0\n\n# set up font\nfont = pygame.font.SysFont('calibri',\
    \ 50)\n\ndef makeplayer():\n    player = pygame.Rect(370, 635, 60, 25)\n    return\
    \ player\n\ndef makeinvaders(invaders):\n    y = 0\n    for i in invaders:\n \
    \       x = 0\n        for j in range(11):\n            invader = pygame.Rect(75+x,\
    \ 75+y, 50, 20)\n            invaders.add(invader)\n            x += 60\n    \
    \    y += 45\n    return invaders\n\ndef makewalls(walls):\n    wall1 = pygame.Rect(60,\
    \ 520, 120, 30)\n    wall2 = pygame.Rect(246, 520, 120, 30)\n    wall3 = pygame.Rect(432,\
    \ 520, 120, 30)\n    wall4 = pygame.Rect(618, 520, 120, 30)\n```\n\n### THE INTERNET\n\
    \nEvery programmer has and does at some point go on the Internet and copy some\
    \ code to insert into their own routines. There’s nothing wrong with using others’\
    \ code, but you need to know how the code works and what it does before you go\
    \ blindly running it on your own computer.\n\n### COMMENTING\n\nAgain we mention\
    \ commenting. It’s a hugely important factor in programming, even if you’re the\
    \ only one who is ever going to view the code, you need to add comments as to\
    \ what’s going on. Is this function where you lose a life? Write a comment and\
    \ help you, or anyone else, see what’s going on.\n\n```python\n# set up pygame\n\
    pygame.init()\nmainClock = pygame.time.Clock()\n\n# set up the window\nwidth =\
    \ 800\nheight = 700\nscreen = pygame.display.set_mode((width, height), 0, 32)\n\
    pygame.display.set_caption('caption')\n\n# set up movement variables\nmoveLeft\
    \ = False\nmoveRight = False\nmoveUp = False\nmoveDown = False\n\n# set up direction\
    \ variables\nDOWNLEFT = 1\nDOWNRIGHT = 3\n```"
  mdcn: "## 处理代码\n\n至此，你应该已经掌握了使用 Python 和 C++ 编程的基本构建模块。你可以创建代码、存储数据、向用户提问、提供选择，并重复执行函数直到条件为真并产生正确的输出。那么接下来呢？\n\
    \n本节最后将探讨 Python 和 C++ 初学者常犯的一些编码错误，以及你可以转向何处继续你的编程之旅。\n\n## 常见编码错误\n\n当你开始接触新事物时，不可避免地会犯错，这纯粹是由于经验不足，而这些错误本身就是很好的老师。然而，即使是专家偶尔也会出错。关键在于，要尽可能从中学习。\n\
    \n### X=MISTAKE, PRINT Y\n\n程序员需要注意的陷阱有很多，多到无法在此一一列举。能够识别错误并修复它，是你开始进入更高级领域的标志。\n\
    \n### 小块学习\n\n如果能像《黑客帝国》里的尼奥那样学习就好了。只需请求，你的操作员将其加载到你的记忆中，你立刻就掌握了关于该主题的一切。遗憾的是，我们做不到。第一个主要陷阱就是有人试图学得太多、太快。所以，将编码分解成小块，慢慢来。\n\
    \n### 简单变量\n\n为变量赋予有意义的命名是消除常见编码错误的必备条件。使用字母表中的字母作为变量名是可以的，但当代码指出变量 `x` 出现问题时会发生什么？将变量命名为\
    \ `lives`、`money`、`player1` 等并不太难。\n\n```\nvar points = 1023;\nvar lives = 3;\n\
    var totalTime = 45;\nwrite(\"Points: \"+points);\nwrite(\"Lives: \"+lives);\n\
    write(\"Total Time: \"+totalTime+\" secs\");\nwrite(\"---------------------------\"\
    );\nvar totalScore = 0;\nwrite(\"Your total Score is: \"+totalScore);\n```\n\n\
    ### //注释\n\n使用注释。这是一个简单的概念，但为你的代码添加注释在下次查看时能节省很多问题。插入注释行可以帮助你快速筛选出导致问题的代码部分；在需要回顾旧代码时也很有用。\n\
    \n```\norig += 2;\ntarget += 2;\n--n;\n}\n#endif\nif (n == 0)\nreturn;\n\n//\n\
    // Loop unrolling. Here be dragons.\n//\n\n// (n & (~3)) is the greatest multiple\
    \ of 4\n// In the while loop ahead, orig will move ov\n// increments (4 elements\
    \ of 2 bytes).\n// end marks our barrier for not falling out\nchar const * const\
    \ end = orig + 2 * (n &\n\n// See if we’re aligned for writting in\n#if ACE_SIZEOF_LONG\
    \ == 8 && \\\n!((defined( __amd64__ ) || defined( __x\n```\n\n### 提前规划\n\n虽然某天早上醒来决定编写一个经典的文本冒险游戏很棒，但如果没有一个好的计划，这并不总是可行的。小段代码可以不用太多思考和规划就能编写，但更长、更深入的代码需要一个好的工作计划来遵循，并帮助排除错误。\n\
    \n### 用户错误\n\n用户输入通常是代码中的一个致命错误。例如，当用户应该输入年龄数字时，他们却输入了字母。通常，用户可以在输入框中输入大量内容，导致某些内部缓冲区溢出，从而使代码崩溃。注意那些用户输入，并清楚地说明需要他们提供什么。\n\
    \n```\nEnter an integer number\naswdfdsf\nYou have entered wrong input\ns\nYou\
    \ have entered wrong input\nf\"£\"f£f\"\nYou have entered wrong input\nsdfsdf213213123\n\
    You have entered wrong input\n123234234234234234\nYou have entered wrong input\n\
    12\nthe number is: 12\n\nProcess returned 0 (0x0)   execution time : 21.495 s\n\
    Press any key to continue.\n```\n\n### 备份\n\n始终备份你的工作，并为所做的任何更改准备一个二级备份。当出现问题时，如果有良好的备份可以恢复，错误就可以得到纠正。从上次中断的地方继续，比从头开始要容易得多。\n\
    \n### 重新发明轮子\n\n你很容易花费数天时间试图弄明白一段代码以实现特定结果，这既令人沮丧又常常浪费时间。虽然自己解决问题同样有成就感，但通常相同的代码在互联网上某处已经存在。不要试图重新发明轮子，先看看是否有人已经做过了。\n\
    \n### 数据安全\n\n如果你正在编写处理用户名和密码或其他敏感数据的代码，请确保数据不是明文存储的。在将数据输入到可能被他人查看的传输或存储例程之前，学习如何创建一个函数来加密敏感数据。\n\
    \n### 寻求帮助！\n\n寻求帮助是我们大多数人都曾挣扎过的事情。我们询问的人会嘲笑我们吗？我是在浪费大家的时间吗？默默忍受是一个常见的错误。然而，只要你以正确的方式提问，遵守任何论坛规则并保持礼貌，那么你的问题就并不愚蠢。\n\
    \n### 数学\n\n如果你的代码进行多次计算，你需要确保背后的数学逻辑是正确的。有成千上万的实例表明，程序基于糟糕的数学编码提供了不正确的数据，这可能会根据代码的设定产生灾难性的后果。简而言之，仔细检查你的代码方程式。\n\
    \n```\nset terminal x11\nset output\nrmax = 5\nnmax = 100\n\ncomplex (x, y) =\
    \ x * {1, 0} + y * {0, 1}\nmandel (x, y, z, n) = (abs (z) > rmax || n == 100)?\
    \ n: mandel (x, y, z * z + complex (x, y), n + 1)\n\nset xrange [-0.5:0.5]\nset\
    \ yrange [-0.5:0.5]\nset logscale z\nset isosample 200\nset samples 200\nset isosample\
    \ 200\nset hidden3d\nset size square\nset view 0,0\na= #0F\nb= #0F\nsplot mandel(-a/100,-b/100,complex(x,y),0)\
    \ notitle\n```\n\n## Python 初学者错误\n\nPython 是一门相对容易上手的语言，为初学者提供了充足的空间来找到自己的编程节奏。然而，与任何其他编程语言一样，很容易犯一些常见的错误，导致你的代码无法运行。\n\
    \n### DEF BEGINNER(MISTAKES=10)\n\n以下是大多数初学者发现自己常犯的十个常见 Python 编程错误。能够识别这些错误将为你未来节省很多麻烦。\n\
    \n### 版本\n\n为了增加大多数初学者在接触编程时已经面临的困惑，Python 有两个可用的活跃版本供下载和使用。有 Python 2.7.x 版本和\
    \ Python 3.6.x 版本。3.6.x 版本是最新的，也是我们推荐开始使用的版本。但是，2.7.x 版本的代码并不总是与 3.6.x 版本兼容，反之亦然。\n\
    \n### 缩进、制表符和空格\n\nPython 在显示其代码时使用精确的缩进。缩进意味着该部分的代码是前一个语句的一部分，而不是与代码的另一部分相关联。使用四个空格来创建缩进，而不是\
    \ Tab 键。\n\n```python\nMOVESPEED = 11\nMOVE = 1\nSHOOT = 15\n\n# set up counting\n\
    score = 0\n\n# set up font\nfont = pygame.font.SysFont('calibri', 50)\n\ndef makeplayer():\n\
    \    player = pygame.Rect(370, 635, 60, 25)\n    return player\n\ndef makeinvaders(invaders):\n\
    \    y = 0\n    for i in invaders:\n        x = 0\n        for j in range(11):\n\
    \            invader = pygame.Rect(75+x, 75+y, 50, 20)\n            invaders.add(invader)\n\
    \            x += 60\n        y += 45\n    return invaders\n\ndef makewalls(walls):\n\
    \    wall1 = pygame.Rect(60, 520, 120, 30)\n    wall2 = pygame.Rect(246, 520,\
    \ 120, 30)\n    wall3 = pygame.Rect(432, 520, 120, 30)\n    wall4 = pygame.Rect(618,\
    \ 520, 120, 30)\n```\n\n### 互联网\n\n每个程序员都曾在某个时候上网复制一些代码插入到自己的例程中。使用他人的代码没有错，但你需要在盲目地在自己的计算机上运行它之前，了解代码的工作原理和作用。\n\
    \n### 注释\n\n我们再次提到注释。这是编程中一个极其重要的因素，即使你是唯一会查看代码的人，你也需要添加注释来说明发生了什么。这个函数是你失去一条生命的地方吗？写个注释，帮助你或任何其他人了解发生了什么。\n\
    \n```python\n# set up pygame\npygame.init()\nmainClock = pygame.time.Clock()\n\
    \n# set up the window\nwidth = 800\nheight = 700\nscreen = pygame.display.set_mode((width,\
    \ height), 0, 32)\npygame.display.set_caption('caption')\n\n# set up movement\
    \ variables\nmoveLeft = False\nmoveRight = False\nmoveUp = False\nmoveDown = False\n\
    \n# set up direction variables\nDOWNLEFT = 1\nDOWNRIGHT = 3\n```"
