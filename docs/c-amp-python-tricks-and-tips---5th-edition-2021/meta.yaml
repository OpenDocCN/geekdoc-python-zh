  md: "# File Input/Output\n\nSTEP 5 The code above is great for opening a file with\
    \ one or two lines but what if there are multiple lines? Here we opened a text\
    \ file of the poem Cimmeria, by Robert E Howard:\n\n```\nstring line;\nifstream\
    \ newfile (\"c:\\users\\david\\Documents\\Cimmeria.txt\");\ncout << \"Cimmeria,\
    \ by Robert E Howard: \\n\" << endl;\nwhile (getline(newfile, line))\n    cout\
    \ << line << endl;\nnewfile.close();\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_52_0.png)\n\
    \nSTEP 8 Just as you might expect, you can write almost anything you like to a\
    \ file, for reading either in Notepad or via the console through the C++ code:\n\
    \n```\nstring name;\nint age;\nofstream newfile;\nnewfile.open(\"name.txt\");\n\
    cout << \"Enter your name: \" << endl;\ngetline(cin, name);\nnewfile << name <<\
    \ endl;\ncout << \"\\nHow old are you: \" << endl;\ncin >> age;\nnewfile << age\
    \ << endl;\nnewfile.close();\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_52_1.png)\n\
    \nSTEP 6 You can no doubt see that we've included a while loop, which we cover\
    \ in a few pages time. It means that while there are lines to be read from the\
    \ text file, C++ getlines them. Once all the lines are read, the output is displayed\
    \ on the screen and the file is closed.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_52_2.png)\n\
    \nSTEP 9 The code from step 8 differs again, but only where it comes to adding\
    \ the age integer. Notice that we used cin >> age, instead of the previous getline(cin,\
    \ variable). The reason for this is that the getline function handles strings,\
    \ not integers; so when you're using a data type other than a string, use the\
    \ standard cin.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_52_3.png)\n\nSTEP\
    \ 7 You can also see that the location of the text file Cimmeria.txt isn't in\
    \ the same folder as the C++ program. When we created the first name.txt file,\
    \ it was written to the same folder where the code was located; this is done by\
    \ default. To specify another folder, you need to use double-back slashes, as\
    \ per the character literals/escape sequence code.\n\n```\nstring line;\nifstream\
    \ newfile (\"c:\\users\\david\\Documents\\Cimmeria.txt\");\ncout << \"Cimmeria,\
    \ by Robert E Howard: \\n\" << endl;\n```\n\nSTEP 10 Here's an exercise: see if\
    \ you can create code to write several different elements to a text file. You\
    \ can have a user's name, age, phone number etc. Maybe even the value of Pi and\
    \ various mathematical elements. It's all good practice.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_52_4.png)"
