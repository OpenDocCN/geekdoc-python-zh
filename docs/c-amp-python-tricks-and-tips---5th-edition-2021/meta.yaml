    \ second and third stages of the loop, it adds 1 until the condition <30 is false.\
    \ The loop then ends and the code continues, ending neatly with return 0.\n\n\
    ```\n{\n    //For Loop Begins\n    for( int num = 1; num < 30; num = num +1 )\n\
