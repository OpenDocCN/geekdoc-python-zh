  - "[PAGE 61]\n\n# If Statement\n\nThe decision making statement ‘if’ is probably\
    \ one of the most used statements in any programming language, regardless of whether\
    \ it’s C++, Python, BASIC or anything else. It represents a junction in the code,\
    \ where IF one condition is true, do this; or IF it’s false, do that.\n\n# IF\
    \ ONLY\n\nIf uses a Boolean expression within its statement. If the Boolean expression\
    \ is true, the code within the statement is executed. If not, then the code after\
    \ the statement is executed instead.\n\nSTEP 1 First, create a new C++ file and\
    \ enter the relevant standard headers, as usual:\n\n```\n#include <iostream>\n\
    using namespace std;\nint main ()\n{\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_61_0.png)\n\
    \nSTEP 2 If is best explained when you use a number-based condition:\n\n```\n\
    {\n    int num = 1;\n    if ( num < 30 )\n    {\n        cout << \"The number\
    \ is less than 30.\" << endl;\n    }\n    cout << \"Value of number is: \" <<\
    \ num << endl;\n    return 0;\n}\n```\n\nSTEP 3 What’s going on here? To begin,\
    \ an integer called num was created and assigned with the value of 1. The if statement\
    \ comes next, and in this case we’ve instructed the code that if the condition,\
    \ the value, of num is less than 1, then the code within the braces should be\
    \ executed.\n\n```\nint num = 1; // Create integer called num with value of 1\n\
    if ( num < 30 ) // IF value of num is less than 30...\n{\n    cout << \"The number\
    \ is less than 30.\" << endl; // Then this output is displayed\n}\n```\n\nSTEP\
    \ 4 The second cout statement displays the current value of num and the program\
    \ terminates safely. It’s easy to see how the if statement works if you were to\
    \ change the initial value of num from 1 to 31.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_61_1.png)\n\
    \n```\n#include <iostream>\nusing namespace std;\nint main ()\n{\n    int num\
    \ = 31; // Change the value of num\n    if ( num < 30 ) // IF value of num is\
    \ less than 30...\n    {\n```"
