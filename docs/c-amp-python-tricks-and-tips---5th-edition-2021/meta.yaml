    \ continue through the compound statement.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_56_1.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_56_2.png)\n\nSTEP 8 You can manipulate\
    \ the while statement to display different results depending on what code lies\
    \ within the loop. For example, to read the poem, Cimmeria, word by word, you\
    \ would enter:\n\nSTEP 10 Sleep() works in milliseconds, so Sleep(1000) is one\
    \ second, Sleep(10000) is ten seconds and so on. Combining the sleep function\
    \ (along with the header it needs) and a while loop enables you to come up with\
    \ some interesting countdown code.\n\n```\ncpp\n#include <iostream>\n#include\
    \ <fstream>\nusing namespace std;\n\nint main()\n{\n    string word;\n    ifstream\
    \ newfile (\"C:\\users\\david\\Documents\\Cimmeria.txt\");\n\n    cout << \"Cimmeria,\
    \ by Robert E Howard: \\n\" << endl;\n\n    while (newfile >> word)\n    {\n \
    \       cout << word << endl;\n    }\n\n    return 0;\n}\n```\n\n```\ncpp\n#include\
    \ <iostream>\n#include <windows.h>\nusing namespace std;\n\nint main()\n{\n  \
    \  int a = 10;\n    while (a != 0)\n    {\n        cout << a << endl;\n      \
    \  a = a - 1;\n        Sleep(1000);\n    }\n\n    cout << \"\\nBlast Off!\" <<\
    \ endl;\n\n    return 0;\n}\n```"
- md: "## For Loop\n\nIn some respects, a for loop works in a very similar way to\
    \ that of a while loop, although its structure is different. A for loop is split\
    \ into three stages: an initialiser, a condition and an incremental step. Once\
    \ set up, the loop repeats itself until the condition becomes false.\n\n## LOOPY\
    \ LOOPS\n\nThe initialise stage of a for loop is executed only once and this sets\
    \ the point reference for the loop. The condition is evaluated by the loop to\
    \ see if it’s true or false and then the increment is executed. The loop then\
    \ repeats the second and third stage.\n\nSTEP 1 Create a new C++ file, with the\
    \ standard headers:\n\n```\n#include <iostream>\nusing namespace std;\n\nint main\
    \ ()\n{\n\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_57_0.png)\n\nSTEP\
    \ 2 Start simple and create a for loop that counts from 1 to 30, displaying the\
    \ value to the screen with each increment:\n\n```\n{\n    //For Loop Begins\n\
    \    for( int num = 1; num < 30; num = num +1 )\n    {\n        cout << \"Number:\
    \ \" << num << endl;\n    }\n\n    return 0;\n}\n```\n\nSTEP 3 Working through\
    \ the process of the for loop, begin by creating an integer called num and assigning\
    \ it a value of 1. Next, set the condition, in this case num being less than 30.\
    \ The last stage is where you create the increments; here it’s the value of num\
    \ being added by 1.\n\n```\n{\n    //For Loop Begins\n    for( int num = 1; num\
    \ < 30; num = num +1 )\n```\n\nSTEP 4 After the loop, you created a compound statement\
    \ in braces (curly brackets), that displays the current value of the integer num.\
    \ Every time the for loop repeats itself, the second and third stages of the loop,\
    \ it adds 1 until the condition <30 is false. The loop then ends and the code\
    \ continues, ending neatly with return 0.\n\n```\n{\n    //For Loop Begins\n \
    \   for( int num = 1; num < 30; num = num +1 )\n    {\n        cout << \"Number:\
    \ \" << num << endl;\n    }\n\n    return 0;\n}\n```\n\nSTEP 5 A for loop is quite\
    \ a neat package in C++, all contained within its own brackets, while the other\
    \ elements outside of the loop are displayed below. If you want to create a 10-second\
    \ countdown, you could use:\n\n```\n#include <iostream>\n#include <windows.h>\n\
    using namespace std;\n\nint main ()\n{\n    //For Loop Begins\n    for( int a\
    \ = 10; a != 0; a = a -1 )\n    {\n        cout << a << endl;\n        Sleep(1000);\n\
    \    }\n\n    cout << \"\\nBlast Off!\" << endl;\n\n    return 0;\n}\n```\n\n\
    STEP 6 With the countdown code, don't forget to include the windows.h library,\
    \ so you can use the Sleep command. Build and run the code; in the command console\
    \ you can see the numbers 10 to 1 countdown in one second increments, until it\
    \ reaches zero and Blast Off! appears.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_58_0.png)\n\
    \nSTEP 7 Naturally you can include a lot more content into a for loop, including\
    \ some user input:\n\n```\ncpp\nint i, n, fact = 1;\ncout << \"Enter a whole number:\
    \ \";\ncin >> n;\nfor (i = 1; i <= n; ++i) {\n    fact *= i;\n}\ncout<< \"\\nFactorial\
    \ of \"<< n <<\" = \"<< fact << endl;\nreturn 0;\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_58_1.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_58_2.png)\n\nSTEP 8 The code from step\
    \ 7, when built and run, asks for a number, then displays the factorial of that\
    \ number through the for loop. The user's number is stored in the integer n, followed\
    \ by the integer i which is used to check if the condition is true or false, adding\
    \ 1 each time and comparing it to the user's number, n.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_58_3.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_58_4.png)\n\nSTEP 9 Here's an example\
    \ of a for loop displaying the multiplication tables of a user inputted number.\
    \ Handy for students:\n\n```\ncpp\n{\n    int n;\n    cout << \"Enter a number\
    \ to view its times table: \";\n    cin >> n;\n    for (int i = 1; i <= 12; ++i)\
    \ {\n        cout << n << \" x \" << i << \" = \" << n * i << endl;\n    }\n \
    \   return 0;\n}\n```\n\nSTEP 10 The value of the integer i can be expanded from\
    \ 12 to whatever number you want, displaying a very large multiplication table\
    \ in the process (or a small one). Of course the data type within a for loop doesn't\
    \ have to be an integer; as long as it's valid, it works.\n\n```\ncpp\nfor ( float\
    \ i = 0.00; i < 1.00; i += 0.01)\n{\n    cout << i << endl;\n}\nreturn 0;\n```\n\
    \n## Do... While Loop\n\nA do... while loop differs slightly from that of a for\
    \ or even a while loop. Both for and while set and examine the state of the condition\
    \ at the start of the loop, or the top of the loop if you prefer. However, a do...\
    \ while loop, is similar to a while loop but instead checks the condition at the\
    \ bottom of the loop.\n\n## DO LOOPS\n\nThe good thing about a do... while loop\
    \ is that it's guaranteed to run through at least once. Its structure is: do,\
    \ followed by statements, while condition is true. This is how it works.\n\nSTEP\
    \ 1 Begin with a new, blank C++ file and enter the standard headers:\n\n```\n\
    #include <iostream>\nusing namespace std;\n\nint main ()\n{\n\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_59_0.png)\n\
    \nSTEP 2 Begin with a simple number count:\n\n```\n{\n    int num = 1;\n\n   \
    \ do\n    {\n        cout << \"Number: \" << num << endl;\n        num = num +\
    \ 1;\n    }\n    while (num < 30 );\n\n    return 0;\n}\n```\n\nSTEP 3 Now, here's\
    \ a look at the structure of a do... while loop. First you create an integer called\
    \ num, with the value of 1. Now the do... while loops begins. The code inside\
    \ the body of the loop is executed at least once, then the condition is checked\
    \ for either true or false.\n\n```\n// Create integer with the value of 1\nint\
    \ num = 1;\n\n// Do... While loops begins\ndo\n{\n    cout << \"Number: \" <<\
    \ num << endl; // Display the current value of num\n    num = num + 1; // Adds\
    \ 1 to the value of num\n\n}\nwhile (num < 30 ); // Tests the condition of num\
    \ (true or false)\n```\n\nSTEP 4 If the condition is true, the loop is executed.\
    \ This continues until the condition is false. When the condition has been expressed\
    \ as false, the loop terminates and the code continues. This means you can create\
    \ a loop where the code continues until the user enters a certain character.\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_59_1.png)\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_59_2.png)\n\
    \nSTEP 5 If you want code to add up user inputted numbers until the user enters\
    \ zero:\n\n```\n{\n    float number, sum = 0.0;\n    cout << \"**** Program to\
    \ execute a Do... While loop continuously ****\" << endl;\n    cout << \"\\nEnter\
    \ 0 to stop and display the sum of all the numbers entered\\n\" << endl;\n   \
    \ cout << \"\\n---------------------------------------------------\\n\" << endl;\n\
    \n    do {\n        cout<<\"\\nPlease enter a number: \";\n        cin>>number;\n\
    \        sum += number;\n    }\n    while(number != 0.0);\n\n    cout<<\"Total\
    \ sum of all numbers: \"<<sum;\n\n    return 0;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_60_0.png)\n\
    \nSTEP 6 The code from Step 5 works as follows: two floating point variables are\
    \ assigned, number and sum, both with the value of 0.0. There is a brief set of\
    \ instructions for the user, then the do... while loop begins.\n\n```\n{\n   \
    \ float number, sum = 0.0;\n    cout << \"**** Program to execute a Do... While\
    \ loop continuously ****\" << endl;\n    cout << \"\\nEnter 0 to stop and display\
    \ the sum of all the numbers entered\\n\" << endl;\n    cout << \"\\n---------------------------------------------------\\\
    n\" << endl;\n```\n\nSTEP 7 The do... while loop in this instance asks the user\
    \ to input a number, which you assigned to the float variable, number. The calculation\
    \ step uses the second floating point variable, sum, which adds the value of number\
    \ every time the user enters a new value.\n\n```\ndo {\n    cout << \"\\nPlease\
    \ enter a number: \";\n    cin >> number;\n    sum += number;\n```\n\nSTEP 8 Finally,\
    \ the while statement checks the condition of the variable number. If the user\
    \ has entered zero, then the loop is terminated, if not then it continues indefinitely.\
    \ When the user finally enters zero, the value of sum, the total value of all\
    \ the user's input, is displayed. The loop, and the program, then ends.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_60_1.png)\n\
    \nSTEP 9 Using the countdown and Blast Off! code used previously, a do... while\
    \ loop would look like:\n\n```\n{\n    int a = 10;\n    do\n    {\n        cout\
    \ << a << endl;\n        a = a - 1;\n    }\n    while ( a != 0);\n\n    cout <<\
    \ \"\\nBlast Off!\" << endl;\n\n    return 0;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_60_2.png)\n\
    \nSTEP 10 The main advantage of using a do... while loop is because it's an exit-condition\
    \ loop; whereas a while loop is an entry-control loop. Therefore, if your code\
    \ requires a loop that needs to be executed at least once (for example, to check\
    \ the number of lives in a game), then a do... while loop is perfect.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_60_3.png)"
  mdcn: "## For 循环\n\n在某些方面，`for` 循环的工作方式与 `while` 循环非常相似，尽管其结构不同。`for` 循环分为三个阶段：初始化器、条件和增量步骤。一旦设置完成，循环会重复执行，直到条件变为假。\n\
    \n## 循环详解\n\n`for` 循环的初始化阶段只执行一次，它为循环设定了起始点。循环会评估条件以判断其为真或假，然后执行增量操作。接着，循环会重复执行第二和第三阶段。\n\
    \n步骤 1 创建一个新的 C++ 文件，并包含标准头文件：\n\n```\n#include <iostream>\nusing namespace std;\n\
    \nint main ()\n{\n\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_57_0.png)\n\
    \n步骤 2 从简单开始，创建一个从 1 计数到 30 的 `for` 循环，并在每次增量时将值显示到屏幕上：\n\n```\n{\n    //For Loop\
    \ Begins\n    for( int num = 1; num < 30; num = num +1 )\n    {\n        cout\
    \ << \"Number: \" << num << endl;\n    }\n\n    return 0;\n}\n```\n\n步骤 3 分析 `for`\
    \ 循环的过程：首先创建一个名为 `num` 的整数并赋值为 1。接下来，设置条件，在本例中是 `num` 小于 30。最后一步是创建增量；这里是将 `num`\
    \ 的值加 1。\n\n```\n{\n    //For Loop Begins\n    for( int num = 1; num < 30; num\
    \ = num +1 )\n```\n\n步骤 4 循环之后，你在花括号（大括号）中创建了一个复合语句，用于显示整数 `num` 的当前值。每次 `for`\
    \ 循环重复自身（即循环的第二和第三阶段）时，它都会加 1，直到条件 `<30` 为假。然后循环结束，代码继续执行，并以 `return 0` 干净地结束。\n\
    \n```\n{\n    //For Loop Begins\n    for( int num = 1; num < 30; num = num +1\
    \ )\n    {\n        cout << \"Number: \" << num << endl;\n    }\n\n    return\
    \ 0;\n}\n```\n\n步骤 5 在 C++ 中，`for` 循环是一个相当整洁的包，所有内容都包含在自己的括号内，而循环外的其他元素则显示在下方。如果你想创建一个\
    \ 10 秒倒计时，可以使用：\n\n```\n#include <iostream>\n#include <windows.h>\nusing namespace\
    \ std;\n\nint main ()\n{\n    //For Loop Begins\n    for( int a = 10; a != 0;\
    \ a = a -1 )\n    {\n        cout << a << endl;\n        Sleep(1000);\n    }\n\
    \n    cout << \"\\nBlast Off!\" << endl;\n\n    return 0;\n}\n```\n\n步骤 6 对于倒计时代码，别忘了包含\
    \ `windows.h` 库，以便使用 `Sleep` 命令。构建并运行代码；在命令控制台中，你可以看到数字从 10 到 1 以一秒为间隔倒计时，直到达到零并显示\
    \ \"Blast Off!\"。\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_58_0.png)\n\n步骤\
    \ 7 当然，你可以在 `for` 循环中包含更多内容，包括一些用户输入：\n\n```\ncpp\nint i, n, fact = 1;\ncout <<\
    \ \"Enter a whole number: \";\ncin >> n;\nfor (i = 1; i <= n; ++i) {\n    fact\
    \ *= i;\n}\ncout<< \"\\nFactorial of \"<< n <<\" = \"<< fact << endl;\nreturn\
    \ 0;\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_58_1.png)\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_58_2.png)\n\
    \n步骤 8 步骤 7 中的代码在构建并运行后，会要求输入一个数字，然后通过 `for` 循环显示该数字的阶乘。用户的数字存储在整数 `n` 中，随后是整数\
    \ `i`，用于检查条件是否为真或假，每次加 1 并与用户的数字 `n` 进行比较。\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_58_3.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_58_4.png)\n\n步骤 9 这是一个 `for` 循环显示用户输入数字的乘法表示例。对学生来说很方便：\n\
    \n```\ncpp\n{\n    int n;\n    cout << \"Enter a number to view its times table:\
    \ \";\n    cin >> n;\n    for (int i = 1; i <= 12; ++i) {\n        cout << n <<\
    \ \" x \" << i << \" = \" << n * i << endl;\n    }\n    return 0;\n}\n```\n\n\
    步骤 10 整数 `i` 的值可以从 12 扩展到你想要的任何数字，在此过程中显示一个非常大的乘法表（或一个小的）。当然，`for` 循环中的数据类型不必是整数；只要它是有效的，它就能工作。\n\
    \n```\ncpp\nfor ( float i = 0.00; i < 1.00; i += 0.01)\n{\n    cout << i << endl;\n\
    }\nreturn 0;\n```\n\n## Do... While 循环\n\n`do... while` 循环与 `for` 甚至 `while` 循环略有不同。`for`\
    \ 和 `while` 都在循环开始时（或者如果你愿意，可以说在循环顶部）设置和检查条件的状态。然而，`do... while` 循环类似于 `while`\
    \ 循环，但它在循环底部检查条件。\n\n## Do 循环\n\n`do... while` 循环的好处是它保证至少运行一次。其结构是：`do`，后跟语句，`while`\
    \ 条件为真。这就是它的工作原理。\n\n步骤 1 从一个新的、空白的 C++ 文件开始，并输入标准头文件：\n\n```\n#include <iostream>\n\
    using namespace std;\n\nint main ()\n{\n\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_59_0.png)\n\
    \n步骤 2 从一个简单的数字计数开始：\n\n```\n{\n    int num = 1;\n\n    do\n    {\n        cout\
    \ << \"Number: \" << num << endl;\n        num = num + 1;\n    }\n    while (num\
    \ < 30 );\n\n    return 0;\n}\n```\n\n步骤 3 现在，来看看 `do... while` 循环的结构。首先，你创建一个名为\
    \ `num` 的整数，值为 1。现在 `do... while` 循环开始。循环体内的代码至少执行一次，然后检查条件是真还是假。\n\n```\n// Create\
    \ integer with the value of 1\nint num = 1;\n\n// Do... While loops begins\ndo\n\
    {\n    cout << \"Number: \" << num << endl; // Display the current value of num\n\
    \    num = num + 1; // Adds 1 to the value of num\n\n}\nwhile (num < 30 ); //\
    \ Tests the condition of num (true or false)\n```\n\n步骤 4 如果条件为真，则执行循环。这会持续到条件为假。当条件被判定为假时，循环终止，代码继续执行。这意味着你可以创建一个循环，让代码持续运行，直到用户输入某个特定字符。\n\
    \n![](img/img/763cdde75d55911fbf7836a707fd3c3b_59_1.png)\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_59_2.png)\n\
    \n步骤 5 如果你想要代码累加用户输入的数字，直到用户输入零：\n\n```\n{\n    float number, sum = 0.0;\n   \
    \ cout << \"**** Program to execute a Do... While loop continuously ****\" <<\
    \ endl;\n    cout << \"\\nEnter 0 to stop and display the sum of all the numbers\
    \ entered\\n\" << endl;\n    cout << \"\\n---------------------------------------------------\\\
    n\" << endl;\n\n    do {\n        cout<<\"\\nPlease enter a number: \";\n    \
    \    cin>>number;\n        sum += number;\n    }\n    while(number != 0.0);\n\n\
    \    cout<<\"Total sum of all numbers: \"<<sum;\n\n    return 0;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_60_0.png)\n\
    \n步骤 6 步骤 5 中的代码工作原理如下：分配了两个浮点变量 `number` 和 `sum`，初始值均为 0.0。有一组简短的用户说明，然后 `do...\
    \ while` 循环开始。\n\n```\n{\n    float number, sum = 0.0;\n    cout << \"**** Program\
    \ to execute a Do... While loop continuously ****\" << endl;\n    cout << \"\\\
    nEnter 0 to stop and display the sum of all the numbers entered\\n\" << endl;\n\
    \    cout << \"\\n---------------------------------------------------\\n\" <<\
    \ endl;\n```\n\n步骤 7 在此实例中，`do... while` 循环要求用户输入一个数字，你将其赋值给浮点变量 `number`。计算步骤使用第二个浮点变量\
    \ `sum`，每次用户输入新值时，它都会加上 `number` 的值。\n\n```\ndo {\n    cout << \"\\nPlease enter\
    \ a number: \";\n    cin >> number;\n    sum += number;\n```\n\n步骤 8 最后，`while`\
    \ 语句检查变量 `number` 的条件。如果用户输入了零，则循环终止；否则，它将无限期地继续。当用户最终输入零时，将显示 `sum` 的值，即所有用户输入的总和。然后循环和程序结束。\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_60_1.png)\n\n步骤 9 使用之前使用的倒计时和 \"Blast\
    \ Off!\" 代码，`do... while` 循环看起来像这样：\n\n```\n{\n    int a = 10;\n    do\n    {\n\
    \        cout << a << endl;\n        a = a - 1;\n    }\n    while ( a != 0);\n\
    \n    cout << \"\\nBlast Off!\" << endl;\n\n    return 0;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_60_2.png)\n\
    \n步骤 10 使用 `do... while` 循环的主要优势在于它是一个退出条件循环；而 `while` 循环是一个入口控制循环。因此，如果你的代码需要一个至少执行一次的循环（例如，检查游戏中的生命数），那么\
    \ `do... while` 循环是完美的选择。\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_60_3.png)"
