  - "[PAGE 59]\n\n# Do... While Loop\n\nA do... while loop differs slightly from that\
    \ of a for or even a while loop. Both for and while set and examine the state\
    \ of the condition at the start of the loop, or the top of the loop if you prefer.\
    \ However, a do... while loop, is similar to a while loop but instead checks the\
    \ condition at the bottom of the loop.\n\n# DO LOOPS\n\nThe good thing about a\
    \ do... while loop is that it's guaranteed to run through at least once. It's\
    \ structure is: do, followed by statements, while condition is true. This is how\
    \ it works.\n\nSTEP 1 Begin with a new, blank C++ file and enter the standard\
    \ headers:\n\n```\n#include <iostream>\nusing namespace std;\n\nint main ()\n\
    {\n\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_59_0.png)\n\nSTEP 3 Now,\
    \ here's a look at the structure of a do... while loop. First you create an integer\
    \ called num, with the value of 1. Now the do... while loops begins. The code\
    \ inside the body of the loop is executed at least once, then the condition is\
    \ checked for either true or false.\n\n```\n// Create integer with the value of\
    \ 1\nint num = 1;\n\n// Do... While loops begins\ndo\n{\n    cout << \"Number:\
    \ \" << num << endl; // Display the current value of num\n    num = num + 1; //\
    \ Adds 1 to the value of num\n\n}\nwhile (num < 30 ); // Tests the condition of\
    \ num (true or false)\n```\n\nSTEP 2 Begin with a simple number count:\n\n```\n\
    {\n    int num = 1;\n\n    do\n    {\n        cout << \"Number: \" << num << endl;\n\
    \        num = num + 1;\n    }\n    while (num < 30 );\n\n    return 0;\n}\n```\n\
    \nSTEP 4 If the condition is true, the loop is executed. This continues until\
    \ the condition is false. When the condition has been expressed as false, the\
    \ loop terminates and the code continues. This means you can create a loop where\
    \ the code continues until the user enters a certain character.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_59_1.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_59_2.png)"
  - "[PAGE 60]\n\n# Do... While Loop\n\nSTEP 5 If you want code to add up user inputted\
    \ numbers until the user enters zero:\n\n```\n{\n    float number, sum = 0.0;\n\
    \    cout << \"**** Program to execute a Do... While loop continuously ****\"\
    \ << endl;\n    cout << \"\\nEnter 0 to stop and display the sum of all the numbers\
    \ entered\\n\" << endl;\n    cout << \"\\n---------------------------------------------------\\\
    n\" << endl;\n\n    do {\n        cout<<\"\\nPlease enter a number: \";\n    \
    \    cin>>number;\n        sum += number;\n    }\n    while(number != 0.0);\n\n\
    \    cout<<\"Total sum of all numbers: \"<<sum;\n\n    return 0;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_60_0.png)\n\
    \nSTEP 6 The code from Step 5 works as follows: two floating point variables are\
    \ assigned, number and sum, both with the value of 0.0. There is a brief set of\
    \ instructions for the user, then the do... while loop begins.\n\n```\n{\n   \
    \ float number, sum = 0.0;\n    cout << \"**** Program to execute a Do... While\
    \ loop continuously ****\" << endl;\n    cout << \"\\nEnter 0 to stop and display\
    \ the sum of all the numbers entered\\n\" << endl;\n    cout << \"\\n---------------------------------------------------\\\
    n\" << endl;\n```\n\nSTEP 7 The do... while loop in this instance asks the user\
    \ to input a number, which you assigned to the float variable, number. The calculation\
    \ step uses the second floating point variable, sum, which adds the value of number\
    \ every time the user enters a new value.\n\n```\ndo {\n    cout << \"\\nPlease\
    \ enter a number: \";\n    cin >> number;\n    sum += number;\n```\n\nSTEP 8 Finally,\
    \ the while statement checks the condition of the variable number. If the user\
    \ has entered zero, then the loop is terminated, if not then it continues indefinitely.\
    \ When the user finally enters zero, the value of sum, the total value of all\
    \ the user's input, is displayed. The loop, and the program, then ends.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_60_1.png)\n\
    \nSTEP 9 Using the countdown and Blast Off! code used previously, a do... while\
    \ loop would look like:\n\n```\n{\n    int a = 10;\n    do\n    {\n        cout\
    \ << a << endl;\n        a = a - 1;\n    }\n    while ( a != 0);\n\n    cout <<\
    \ \"\\nBlast Off!\" << endl;\n\n    return 0;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_60_2.png)\n\
    \nSTEP 10 The main advantage of using a do... while loop is because it's an exit-condition\
    \ loop; whereas a while loop is an entry-control loop. Therefore, if your code\
    \ requires a loop that needs to be executed at least once (for example, to check\
    \ the number of lives in a game), then a do... while loop is perfect.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_60_3.png)"
- md: "## If Statement\n\nThe decision making statement ‘if’ is probably one of the\
    \ most used statements in any programming language, regardless of whether it’s\
    \ C++, Python, BASIC or anything else. It represents a junction in the code, where\
    \ IF one condition is true, do this; or IF it’s false, do that.\n\n## IF ONLY\n\
    \nIf uses a Boolean expression within its statement. If the Boolean expression\
    \ is true, the code within the statement is executed. If not, then the code after\
    \ the statement is executed instead.\n\nSTEP 1 First, create a new C++ file and\
    \ enter the relevant standard headers, as usual:\n\n```\n#include <iostream>\n\
    using namespace std;\nint main ()\n{\n}\n```\n\nSTEP 2 If is best explained when\
    \ you use a number-based condition:\n\n```\n{\n    int num = 1;\n    if ( num\
    \ < 30 )\n    {\n        cout << \"The number is less than 30.\" << endl;\n  \
    \  }\n    cout << \"Value of number is: \" << num << endl;\n    return 0;\n}\n\
    ```\n\nSTEP 3 What’s going on here? To begin, an integer called num was created\
    \ and assigned with the value of 1. The if statement comes next, and in this case\
    \ we’ve instructed the code that if the condition, the value, of num is less than\
    \ 30, then the code within the braces should be executed.\n\n```\nint num = 1;\
    \ // Create integer called num with value of 1\nif ( num < 30 ) // IF value of\
    \ num is less than 30...\n{\n    cout << \"The number is less than 30.\" << endl;\
    \ // Then this output is displayed\n}\n```\n\nSTEP 4 The second cout statement\
    \ displays the current value of num and the program terminates safely. It’s easy\
    \ to see how the if statement works if you were to change the initial value of\
    \ num from 1 to 31.\n\n```\n#include <iostream>\nusing namespace std;\nint main\
    \ ()\n{\n    int num = 31; // Change the value of num\n    if ( num < 30 ) //\
    \ IF value of num is less than 30...\n    {\n```\n\nSTEP 5 When you change the\
    \ value to anything above 30, then build and run the code, you can see that the\
    \ only line to be outputted to the screen is the second cout statement, displaying\
    \ the current value of num. This is because the initial if statement is false,\
    \ so it ignores the code within the braces.\n\nSTEP 6 You can include an if statement\
    \ within a do... while loop. For example:\n\n```\n{\n    float temp;\n    do\n\
    \    {\n        cout << \"\\nEnter the temperature (or -10000 to exit): \" <<\
    \ endl;\n        cin >> temp;\n        if (temp <= 0 )\n        {\n          \
    \  cout << \"\\nBrrrr, it's really cold!\" << endl;\n        }\n        if (temp\
    \ > 0 )\n        {\n            cout << \"\\nAt least it's not freezing!\" <<\
    \ endl;\n        }\n    }\n    while ( temp != -10000 );\n    cout << \"\\nGood\
    \ bye\\n\" << endl;\n    return 0;\n}\n```\n\nSTEP 7 The code in Step 6 is simplistic\
    \ but effective. First we created a floating point integer called temp, then a\
    \ do... while loop that asks the user to enter the current temperature.\n\n```\n\
    {\n    float temp;\n    do\n    {\n        cout << \"\\nEnter the temperature\
    \ (or -10000 to exit): \" << endl;\n        cin >> temp;\n```\n\nSTEP 8 The first\
    \ if statement checks to see if the user's inputted value is less than or equal\
    \ to zero. If it is, then the output is 'Brrrr, it's really cold!'. Otherwise,\
    \ if the input is greater than zero, the code outputs 'At least it's not freezing!'.\n\
    \n```\ndo\n{\n    cout << \"\\nEnter the temperature (or -10000 to exit): \" <<\
    \ endl;\n    cin >> temp;\n    if (temp <= 0 )\n    {\n        cout << \"\\nBrrrr,\
    \ it's really cold!\" << endl;\n    }\n    if (temp > 0 )\n    {\n        cout\
    \ << \"\\nAt least it's not freezing!\" << endl;\n    }\n}\n```\n\nSTEP 9 Finally,\
    \ if the user enters the value -10000, which is impossibly cold so is therefore\
    \ an unrealistic value, the do... while loop is terminated and a friendly 'Good\
    \ bye' is displayed to the screen.\n\n```\n{\n    float temp;\n    do\n    {\n\
    \        cout << \"\\nEnter the temperature (or -10000 to exit): \" << endl;\n\
    \        cin >> temp;\n        if (temp <= 0 )\n        {\n            cout <<\
    \ \"\\nBrrrr, it's really cold!\" << endl;\n        }\n        if (temp > 0 )\n\
    \        {\n            cout << \"\\nAt least it's not freezing!\" << endl;\n\
    \        }\n    }\n    while ( temp != -10000 );\n    cout << \"\\nGood bye\\\
    n\" << endl;\n    return 0;\n}\n```\n\nSTEP 10 Using if is quite powerful, if\
    \ it's used correctly. Just remember that if the condition is true then the code\
    \ executes what's in the braces. If not, it continues on its merry way. See what\
    \ else you can come up with using if and a combination of loops.\n\n## If... Else\
    \ Statement\n\nThere is a much better way to use an if statement in your code,\
    \ with if... else. If... else works in much the same way as a standard if statement.\
    \ If the Boolean expression is true, the code within the braces is executed. Else,\
    \ the code within the next set of braces is used instead.\n\n## IF YES, ELSE NO\n\
    \nThere are two sections of code that can be executed depending on the outcome\
    \ in an if... else statement. It's quite easy to visualise once you get used to\
    \ its structure.\n\nSTEP 1 Begin with a new C++ file and the standard headers:\n\
    \n```\n#include <iostream>\nusing namespace std;\nint main ()\n{\n}\n```\n\nSTEP\
    \ 2 Let's expand the code from the If Statement on the previous page:\n\n```\n\
    {\n    int num = 1;\n    if ( num < 30 )\n    {\n        cout << \"The number\
    \ is less than 30!\" << endl;\n    }\n    else\n    {\n        cout << \"The number\
    \ is greater than 30!\" << endl;\n    }\n    return 0;\n}\n```\n\nSTEP 3 The first\
    \ line in the code creates the integer called num and gives it a value of 1. The\
    \ if statement checks to see if the value of num is less than thirty and if it\
    \ is it outputs \"The number is less than 30!\" to the console.\n\n```\nif ( num\
    \ < 30 )\n{\n    cout << \"The number is less than 30!\" << endl;\n}\n```\n\n\
    STEP 4 The else companion to if checks if the number is greater than 30 and if\
    \ so, then displays \"The number is greater than 30!\" to the console; and finally,\
    \ the code is terminated satisfactorily.\n\n```\ncout << \"The number is less\
    \ than 30!\" << endl;\nelse\n{\n    cout << \"The number is greater than 30!\"\
    \ << endl;\n}\n```\n\nSTEP 5 You can change the value of num in the code or you\
    \ can improve the code by asking the user to enter a value:\n\n```\n{\n    int\
    \ num;\n    cout << \"Enter a number: \";\n    cin >> num;\n    if ( num < 30\
    \ )\n    {\n        cout << \"The number is less than 30!\" << endl;\n    }\n\
    \    else\n    {\n        cout << \"The number is greater than 30!\" << endl;\n\
    \    }\n    return 0;\n}\n```\n\nSTEP 6 The code works the same way, as you would\
    \ expect, but what if you wanted to display something if the user entered the\
    \ number 30? Try this:\n\n```\n{\n    int num;\n\n    cout << \"Enter a number:\
    \ \";\n    cin >> num;\n\n    if ( num < 30 )\n    {\n        cout << \"The number\
    \ is less than 30!\" << endl;\n    }\n    else if ( num > 30 )\n    {\n      \
    \  cout << \"The number is greater than 30!\" << endl;\n    }\n    else if ( num\
    \ == 30 )\n    {\n        cout << \"The number is exactly 30!\" << endl;\n   \
    \ }\n\n    return 0;\n}\n```\n\nSTEP 7 The new addition to the code is what's\
    \ known as a nested if... else statement. This allows you to check for multiple\
    \ conditions. In this case, if the user enters a number less than 30, greater\
    \ than 30 or actually 30 itself, a different outcome is presented to them.\n\n\
    STEP 8 You can take this up a notch and create a two-player number guessing game.\
    \ Begin by creating the variables:\n\n```\nint num, guess, tries = 0;\n\ncout\
    \ << \"****** Two-player number guessing game ****\" << endl;\ncout << \"\\nPlayer\
    \ One, enter a number for Player Two to guess: \" << endl;\ncin >> num;\ncout\
    \ << string(50, '\\n');\n```\n\nSTEP 9 The cout << string(50, '\\n') line clears\
    \ the screen so Player Two doesn't see the entered number. Now you can create\
    \ a do... while loop, together with if... else:\n\n```\ndo\n{\n    cout << \"\\\
    nPlayer Two, enter your guess: \";\n    cin >> guess;\n    tries++;\n    if (guess\
    \ > num)\n    {\n        cout << \"\\nToo High!\\n\" << endl;\n    }\n    else\
    \ if (guess < num)\n    {\n        cout << \"\\nToo Low!\\n\" << endl;\n    }\n\
    \    else if (guess == num)\n    {\n        cout << \"Well done! You got it in\
    \ \" << tries << \" guesses!\" << endl;\n    }\n} while (guess != num);\n\nreturn\
    \ 0;\n```\n\nSTEP 10 Grab a second player, then build and run the code. Player\
    \ One enters the number to be guessed, then Player Two can take as many guesses\
    \ as they need to get the right number. Want to make it harder? Maybe use decimal\
    \ numbers."
  mdcn: "## If 语句\n\n决策语句 `if` 可能是任何编程语言中使用最广泛的语句之一，无论是 C++、Python、BASIC 还是其他语言。它代表了代码中的一个分支点：如果某个条件为真，则执行此操作；如果为假，则执行彼操作。\n\
    \n## IF ONLY\n\n`if` 语句在其内部使用一个布尔表达式。如果布尔表达式为真，则执行语句内的代码。否则，将执行语句之后的代码。\n\n步骤\
    \ 1 首先，像往常一样创建一个新的 C++ 文件并输入相关的标准头文件：\n\n```\n#include <iostream>\nusing namespace\
    \ std;\nint main ()\n{\n}\n```\n\n步骤 2 使用基于数字的条件时，`if` 的作用最容易解释：\n\n```\n{\n \
    \   int num = 1;\n    if ( num < 30 )\n    {\n        cout << \"The number is\
    \ less than 30.\" << endl;\n    }\n    cout << \"Value of number is: \" << num\
    \ << endl;\n    return 0;\n}\n```\n\n步骤 3 这里发生了什么？首先，创建了一个名为 `num` 的整数，并赋值为 1。接下来是\
    \ `if` 语句，在本例中，我们指示代码：如果 `num` 的值（即条件）小于 30，则执行花括号内的代码。\n\n```\nint num = 1; //\
    \ 创建一个名为 num 的整数，值为 1\nif ( num < 30 ) // 如果 num 的值小于 30...\n{\n    cout << \"\
    The number is less than 30.\" << endl; // 则显示此输出\n}\n```\n\n步骤 4 第二个 `cout` 语句显示\
    \ `num` 的当前值，然后程序安全终止。如果你将 `num` 的初始值从 1 改为 31，就能很容易地看出 `if` 语句是如何工作的。\n\n```\n\
    #include <iostream>\nusing namespace std;\nint main ()\n{\n    int num = 31; //\
    \ 更改 num 的值\n    if ( num < 30 ) // 如果 num 的值小于 30...\n    {\n```\n\n步骤 5 当你将值更改为任何大于\
    \ 30 的数，然后构建并运行代码时，你会看到唯一输出到屏幕的行是第二个 `cout` 语句，它显示了 `num` 的当前值。这是因为初始的 `if` 语句为假，因此它忽略了花括号内的代码。\n\
    \n步骤 6 你可以在 `do... while` 循环中包含一个 `if` 语句。例如：\n\n```\n{\n    float temp;\n   \
    \ do\n    {\n        cout << \"\\nEnter the temperature (or -10000 to exit): \"\
    \ << endl;\n        cin >> temp;\n        if (temp <= 0 )\n        {\n       \
    \     cout << \"\\nBrrrr, it's really cold!\" << endl;\n        }\n        if\
    \ (temp > 0 )\n        {\n            cout << \"\\nAt least it's not freezing!\"\
    \ << endl;\n        }\n    }\n    while ( temp != -10000 );\n    cout << \"\\\
    nGood bye\\n\" << endl;\n    return 0;\n}\n```\n\n步骤 7 步骤 6 中的代码虽然简单但很有效。首先我们创建了一个名为\
    \ `temp` 的浮点数，然后是一个 `do... while` 循环，它要求用户输入当前温度。\n\n```\n{\n    float temp;\n\
    \    do\n    {\n        cout << \"\\nEnter the temperature (or -10000 to exit):\
    \ \" << endl;\n        cin >> temp;\n```\n\n步骤 8 第一个 `if` 语句检查用户输入的值是否小于或等于零。如果是，则输出\
    \ 'Brrrr, it's really cold!'。否则，如果输入大于零，代码输出 'At least it's not freezing!'。\n\n\
    ```\ndo\n{\n    cout << \"\\nEnter the temperature (or -10000 to exit): \" <<\
    \ endl;\n    cin >> temp;\n    if (temp <= 0 )\n    {\n        cout << \"\\nBrrrr,\
    \ it's really cold!\" << endl;\n    }\n    if (temp > 0 )\n    {\n        cout\
    \ << \"\\nAt least it's not freezing!\" << endl;\n    }\n}\n```\n\n步骤 9 最后，如果用户输入值\
    \ -10000（这不可能是真实的温度，因此是一个不切实际的值），`do... while` 循环将终止，并在屏幕上显示友好的 'Good bye'。\n\n\
    ```\n{\n    float temp;\n    do\n    {\n        cout << \"\\nEnter the temperature\
    \ (or -10000 to exit): \" << endl;\n        cin >> temp;\n        if (temp <=\
    \ 0 )\n        {\n            cout << \"\\nBrrrr, it's really cold!\" << endl;\n\
    \        }\n        if (temp > 0 )\n        {\n            cout << \"\\nAt least\
    \ it's not freezing!\" << endl;\n        }\n    }\n    while ( temp != -10000\
    \ );\n    cout << \"\\nGood bye\\n\" << endl;\n    return 0;\n}\n```\n\n步骤 10\
    \ 如果使用得当，`if` 语句非常强大。只需记住，如果条件为真，则执行花括号内的代码。否则，它将继续执行后续代码。尝试使用 `if` 和循环的组合，看看你还能想出什么。\n\
    \n## If... Else 语句\n\n在代码中使用 `if` 语句有一个好得多的方法，那就是 `if... else`。`if... else` 的工作方式与标准\
    \ `if` 语句非常相似。如果布尔表达式为真，则执行花括号内的代码。否则，将执行下一组花括号内的代码。\n\n## IF YES, ELSE NO\n\n\
    在 `if... else` 语句中，根据结果可以执行两段代码中的一段。一旦你习惯了它的结构，就很容易想象出来。\n\n步骤 1 从一个新的 C++ 文件和标准头文件开始：\n\
    \n```\n#include <iostream>\nusing namespace std;\nint main ()\n{\n}\n```\n\n步骤\
    \ 2 让我们扩展上一页 If 语句中的代码：\n\n```\n{\n    int num = 1;\n    if ( num < 30 )\n   \
