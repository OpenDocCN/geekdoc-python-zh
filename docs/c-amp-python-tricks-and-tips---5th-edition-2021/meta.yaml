    ```\n\n这将把函数定义作为模块导入。按 F5 保存并执行程序以查看其运行效果。\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_42_0.png)\n\
    \n第 7 步 你现在可以进一步使用代码，使程序更高级一些，充分利用新创建的模块。包含一些用户交互。首先创建一个用户可以选择的基本菜单：\n\n```python\n\
    print(\"Select operation.\\n\")\nprint(\"1.Times by two\")\nprint(\"2.Times by\
    \ Three\")\nprint(\"3.Square\")\nprint(\"4.Power of\")\n\nchoice = input(\"\\\
    nEnter choice (1/2/3/4):\")\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_42_1.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_42_2.png)\n\n第 8 步 现在我们可以添加用户输入，以获取代码将要处理的数字：\n\
    \n```python\nnum1 = int(input(\"\\nEnter number: \"))\n```\n\n这将把用户输入的数字保存为变量\
    \ `num1`。\n\n第 9 步 最后，你现在可以创建一系列 `if` 语句来确定如何处理该数字，并利用新创建的函数定义：\n\n```python\n\
    if choice == '1':\n    print(timestwo(num1))\n\nelif choice == '2':\n    print(timesthree(num1))\n\
