  md: "# Tkinter Module\n\nWhile running your code from the command line, or even\
    \ in the Shell, is perfectly fine, Python is capable of so much more. The Tkinter\
    \ module enables the programmer to set up a Graphical User Interface to interact\
    \ with the user, and it’s surprisingly powerful too.\n\n# GETTING GUI\n\nTkinter\
    \ is easy to use but there’s a lot more you can do with it. Let’s start by seeing\
    \ how it works and getting some code into it. Before long you will discover just\
    \ how powerful this module really is.\n\n**STEP 1** Tkinter is usually built into\
    \ Python 3. However, if it’s available when you enter: `import tkinter`, then\
    \ you need to `pip install tkinter` from the command prompt. We can start to import\
    \ modules differently than before, to save on typing and by importing all their\
    \ contents:\n\n```\nimport tkinter as tk\nfrom tkinter import *\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_35_0.png)\n\
    \n**STEP 3** The ideal approach is to add mainloop() into the code to control\
    \ the Tkinter event loop, but we’ll get to that soon. You’ve just created a Tkinter\
    \ widget and there are several more we can play around with:\n\n```\nbtn=Button()\n\
    btn.pack()\nbtn[\"text\"]=\"Hello everyone!\"\n```\n\nThe first line focuses on\
    \ the newly created window. Click back into the Shell and continue the other lines.\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_35_1.png)\n\n**STEP 2** It’s not recommended\
    \ to import everything from a module using the asterisk but it won’t do any harm\
    \ normally. Let’s begin by creating a basic GUI window, enter:\n\n```\nwind=Tk()\n\
    ```\n\nThis creates a small, basic window. There’s not much else to do at this\
    \ point but click the X in the corner to close the window.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_35_2.png)\n\
    \n**STEP 4** You can combine the above into a New File:\n\n```\nimport tkinter\
    \ as tk\nfrom tkinter import *\nbtn=Button()\nbtn.pack()\nbtn[\"text\"]=\"Hello\
    \ everyone!\"\n```\n\nThen add some button interactions:\n\n```\ndef click():\n\
    \    print(\"You just clicked me!\")\nbtn[\"command\"]=click\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_35_3.png)"
  merge: -1
  pgno: 35
- img_proc: true
  md: "# Tkinter Module\n\nSTEP 5 Save and execute the code from Step 4 and a window\
    \ appears with 'Hello everyone!' inside. If you click the Hello everyone! button,\
    \ the Shell will output the text 'You just clicked me!'. It's simple but shows\
    \ you what can be achieved with a few lines of code.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_36_0.png)\n\
    \nSTEP 6 You can also display both text and images within a Tkinter window. However,\
    \ only GIF, PGM or PPM formats are supported. So find an image and convert it\
    \ before using the code. Here's an example using the BDM Publishing logo:\n\n\
    ```\npython\nfrom tkinter import *\n\nroot = Tk()\nlogo = PhotoImage(file=\"/home/pi/Downloads/BDM_logo.gif\"\
    )\nw1 = Label(root, root.title(\"BDM Publications\"), image=logo).pack(side=\"\
    right\")\ncontent = \"\"\" From its humble beginnings in 2004, the BDM brand quickly\
    \ grew from a single publication produced by a team of just two to one of the\
    \ biggest names in global bookazine publishing, for two simple reasons. Our passion\
    \ and commitment to deliver the very best product each and every volume. While\
    \ the company has grown with a portfolio of over 250 publications delivered by\
    \ our international staff, the foundation that it has been built upon remains\
    \ the same, which is why we believe BDM isn't just the first choice it's the only\
    \ choice for the smart consumer. \"\"\"\nw2 = Label(root,\n    justify=LEFT,\n\
    \    padx = 10,\n    text=content).pack(side=\"left\")\nroot.mainloop()\n```\n\
    \nSTEP 7 The previous code is quite weighty, mostly due to the content variable\
    \ holding a part of BDM's About page from the company website. You can obviously\
    \ change the content, the root.title and the image to suit your needs.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_36_1.png)\n\
    \nSTEP 8 You can create radio buttons too. Try:\n\n```\npython\nfrom tkinter import\
    \ *\n\nroot = Tk()\n\nv = IntVar()\n\nLabel(root, root.title(\"Options\"), text=\"\
    \"\"Choose a preferred language:\"\"\",\n    justify = LEFT, padx = 20).pack()\n\
    Radiobutton(root,\n    text=\"Python\",\n    padx = 20,\n    variable=v,\n   \
    \ value=1).pack(anchor=W)\nRadiobutton(root,\n    text=\"C++\",\n    padx = 20,\n\
    \    variable=v,\n    value=2).pack(anchor=W)\n\nmainloop()\n```\n\nSTEP 9 You\
    \ can also create check boxes, with buttons and output to the Shell:\n\n```\n\
    python\nfrom tkinter import *\nroot = Tk()\n\ndef var_states():\n    print(\"\
    Warrior: %d,\\nMage: %d\" % (var1.get(), var2.get()))\n\nLabel(root, root.title(\"\
    Adventure Game\"),\n    text=\">>>>>>>>>Your adventure role<<<<<<<<<<\").grid(row=0,\
    \ sticky=N)\nvar1 = IntVar()\nCheckbutton(root, text=\"Warrior\", variable=var1).grid(row=1,\
    \ sticky=W)\nvar2 = IntVar()\nCheckbutton(root, text=\"Mage\", variable=var2).grid(row=2,\
    \ sticky=W)\nButton(root, text='Quit', command=root.destroy).grid(row=3, sticky=W,\
    \ pady=4)\nButton(root, text='Show', command=var_states).grid(row=3, sticky=E,\
    \ pady=4)\n\nmainloop()\n```\n\nSTEP 10 The code from Step 9 introduced some new\
    \ geometry elements into Tkinter. Note the sticky=N, E and W arguments. These\
    \ describe the locations of the check boxes and buttons (North, East, South and\
    \ West). The row argument places them on separate rows. Have a play around and\
    \ see what you get.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_36_2.png)"
