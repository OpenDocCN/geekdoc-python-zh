    \n## 使用模块\n\nPython 模块就是一个由 Python 创建的源文件，其中包含类、函数和全局变量所需的代码。你可以绑定和引用模块来扩展功能，甚至创建更出色的\
    \ Python 程序。\n\n想知道如何改进这些模块，为你的代码增添一些额外的东西吗？那么请继续阅读，了解如何使用它们来打造精彩的代码。\n\n## 日历模块\n\
    \n除了 time 模块，calendar 模块在代码中执行时可以产生一些有趣的结果。它远不止像 time 模块那样简单地显示日期，你实际上可以调用一个类似挂历的显示方式。\n\
    \n### 处理日期\n\ncalendar 模块内置于 Python 3 中。但是，如果由于某种原因它没有安装，你可以使用 `pip install calendar`（以\
    \ Windows 管理员身份）或 `sudo pip install calendar`（适用于 Linux 和 macOS）来添加它。\n\n**步骤\
    \ 1** 启动 Python 3 并输入：`import calendar` 来调用该模块及其固有函数。一旦加载到内存中，首先输入：\n\n```python\n\
    sep=calendar.TextCalendar(calendar.SUNDAY)\nsep.prmonth(2017, 9)\n```\n\n**步骤\
