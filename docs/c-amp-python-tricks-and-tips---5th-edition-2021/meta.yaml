    ```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_45_2.png)\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_45_3.png)"
- md: "## User Interaction\n\nSTEP 5 The principal works the same as the previous\
    \ code. The user's input, their name, is stored in a string, because it contains\
    \ multiple characters, and retrieved in the second cout line. As long as the variable\
    \ 'name' doesn't change, then you can recall it wherever you like in your code.\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_46_0.png)\n\nSTEP 8 While cin works\
    \ well for most input tasks, it does have a limitation. Cin always considers spaces\
    \ as a terminator, so it's designed for just single words not multiple words.\
    \ However, getline takes cin as the first argument and the variable as the second:\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    string\
    \ mystr;\n    cout << \"Enter a sentence: \\n\";\n    getline(cin, mystr);\n \
    \   cout << \"Your sentence is: \" << mystr.size() << \" characters long.\\n\"\
    ;\n}\n```\n\nSTEP 6 You can chain input requests to the user but just make sure\
    \ you have a valid variable to store the input to begin with. Let's assume you\
    \ want the user to enter two whole numbers:\n\n```cpp\n#include <iostream>\nusing\
    \ namespace std;\n\nint main ()\n{\n    int num1, num2;\n    cout << \"Enter two\
    \ whole numbers: \";\n    cin >> num1 >> num2;\n    cout << \"you entered \" <<\
    \ num1 << \" and \" << num2 << \"\\n\";\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_46_1.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_46_2.png)\n\nSTEP 9 Build and execute\
    \ the code, then enter a sentence with spaces. When you're done the code reads\
    \ the number of characters. If you remove the getline line and replace it with\
    \ cin >> mystr and try again, the result displays the number of characters up\
    \ to the first space.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_46_3.png)\n\n\
    STEP 7 Likewise, inputted data can be manipulated once you have it stored in a\
    \ variable. For instance, ask the user for two numbers and do some maths on them:\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    float\
    \ num1, num2;\n    cout << \"Enter two numbers: \\n\";\n    cin >> num1 >> num2;\n\
    \    cout << num1 << \" + \" << num2 << \" is: \" << num1 + num2 << \"\\n\";\n\
    }\n```\n\nSTEP 10 Getline is usually a command that new C++ programmers forget\
    \ to include. The terminating white space is annoying when you can't figure out\
    \ why your code isn't working. In short, it's best to use getline(cin, variable)\
    \ in future:\n\n```cpp\n#include <iostream>\nusing namespace std;\n\nint main\
    \ ()\n{\n    string name;\n    cout << \"Enter your full name: \\n\";\n    getline(cin,\
    \ name);\n    cout << \"\\nHello, \" << name << \"\\n\";\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_46_4.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_46_5.png)\n\n## Character Literals\n\
    \nIn C++ a literal is an object or variable that once defined remains the same\
    \ throughout the code. However, a character literal is defined by a backslash,\
    \ such as the \\n you've been using at the end of a cout statement to signify\
    \ a new line.\n\n## ESCAPE SEQUENCE\n\nWhen used in something like a cout statement,\
    \ character literals are also called Escape Sequence Codes. They allow you to\
    \ insert a quote, an alert, new line and much more.\n\nSTEP 1 Create a new C++\
    \ file and enter the relevant headers:\n\n```cpp\n#include <iostream>\nusing namespace\
    \ std;\n\nint main ()\n{\n\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_47_0.png)\n\
    \nSTEP 3 If you wanted to insert speech quotes inside a cout statement, you would\
    \ have to use a backslash as it already uses quotes:\n\n```cpp\n#include <iostream>\n\
    using namespace std;\n\nint main ()\n{\n    cout << \"Hello, user. This is how\
    \ to use \\\"quotes\\\".\";\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_47_1.png)\n\
    \nSTEP 2 You've already experienced the \\n character literal placing a new line\
    \ wherever it's called. The line: `cout << \"Hello\\n\" << \"I'm a C++\\n\" <<\
    \ \"Program!\\n\";` outputs three lines of text, each starting after the last\
    \ \\n.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_47_2.png)\n\nSTEP 4 There's\
    \ even a character literal that can trigger an alarm. In Windows 10, it's the\
    \ notification sound that chimes when you use \\a. Try this code, and turn up\
    \ your sound.\n\n```cpp\n#include <iostream>\nusing namespace std;\n\nint main\
    \ ()\n{\n    cout << \"ALARM! \\a\";\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_47_3.png)\n\
    \n## A HANDY CHART\n\nThere are numerous character literals, or escape sequence\
    \ codes, to choose from. We therefore thought it would be good for you to have\
    \ a handy chart available, for those times when you need to insert a code.\n\n\
    | ESCAPE SEQUENCE CODE | CHARACTER |\n|---|---|\n| \\\\ | Backslash |\n| \\' |\
    \ Single Quote |\n| \\\" | Double Quote (Speech Marks) |\n| \\? | Question Mark\
    \ |\n| \\a | Alert/Alarm |\n| \\b | Backspace |\n| \\f | Form Feed |\n| \\n |\
    \ New Line |\n| \\r | Carriage Return |\n| \\t | Horizontal Tab |\n| \\v | Vertical\
    \ Tab |\n| \\0 | Null Character |\n| \\uxxxx | Unicode (UTF-8) |\n| \\Uxxxxxxxx\
    \ | Unicode (UTF-16) |\n\n## UNICODE CHARACTERS (UTF-8)\n\nUnicode characters\
    \ are symbols or characters that are standard across all platforms. For example,\
    \ the copyright symbol, that can be entered via the keyboard by entering the Unicode\
    \ code, followed by ALT+X. In the case of the copyright symbol enter: 00A9 Alt+X.\
    \ In C++ code, you would enter:\n\n```cpp\n#include <iostream>\nusing namespace\
    \ std;\n\nint main ()\n{\n    cout << \"\\u00A9\";\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_48_0.png)\n\
    \n## UNICODE CHARACTER TABLE\n\nA complete list of the available Unicode characters\
    \ can be found at **www.unicode-table.com/en/**. Hover your mouse over the character\
    \ to see its unique code to enter in C++.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_48_1.png)\n\
    \n## Defining Constants\n\nConstants are fixed values in your code. They can be\
    \ any basic data type but as the name suggests their value remains constant throughout\
    \ the entire code. There are two separate ways to define a constant in C++, the\
    \ #define pre-processor and const.\n\n## #DEFINE\n\nThe pre-processors are instructions\
    \ to the compiler to pre-process the information before it goes ahead and compiles\
    \ the code. #include is a pre-processor as is #define.\n\nSTEP 1 You can use the\
    \ #define pre-processor to define any constants you want in our code. Start by\
    \ creating a new C++ file complete with the usual headers:\n\n```cpp\n#include\
    \ <iostream>\nusing namespace std;\n\nint main ()\n{\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_49_0.png)\n\
    \nSTEP 3 Note the capitals for defined constants, it's considered good programming\
    \ practise to define all constants in capitals. Here, the assigned values are\
    \ 50, 40 and 60, so let's call them up:\n\n```cpp\n#include <iostream>\nusing\
    \ namespace std;\n\n#define LENGTH 50\n#define WIDTH 40\n#define HEIGHT 60\n\n\
    int main ()\n{\n    cout << \"Length is: \" << LENGTH << \"\\n\";\n    cout <<\
    \ \"Width is: \" << WIDTH << \"\\n\";\n    cout << \"Height is: \" << HEIGHT <<\
    \ \"\\n\";\n}\n```\n\nSTEP 2 Now let's assume your code has three different constants:\
    \ length, width and height. You can define them with:\n\n```cpp\n#include <iostream>\n\
    using namespace std;\n#define LENGTH 50\n#define WIDTH 40\n#define HEIGHT 60\n\
    \nint main ()\n{\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_49_1.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_49_2.png)\n\nSTEP 4 Build and run the\
    \ code. Just as expected, it displays the values for each of the constants created.\
    \ It's worth noting that you don't need a semicolon when you're defining a constant\
    \ with the #define keyword.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_49_3.png)\n\
    \n## Defining Constants\n\nSTEP 5 You can also define other elements as a constant.\
    \ For example, instead of using \\n for a newline in the cout statement, you can\
    \ define it at the start of the code:\n\n```cpp\n#include <iostream>\nusing namespace\
    \ std;\n\n#define LENGTH 50\n#define WIDTH 40\n#define HEIGHT 60\n#define NEWLINE\
    \ '\\n'\n\nint main()\n{\n    cout << \"Length is: \" << LENGTH << NEWLINE;\n\
    \    cout << \"Width is: \" << WIDTH << NEWLINE;\n    cout << \"Height is: \"\
    \ << HEIGHT << NEWLINE;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_50_0.png)\n\
    \nSTEP 6 The code, when built and executed, does exactly the same as before, using\
    \ the new constant NEWLINE to insert a newline in the cout statement. Incidentally,\
    \ creating a newline constant isn't a good idea unless you're making it smaller\
    \ than \\n or even the endl command.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_50_1.png)\n\
    \nSTEP 7 Defining a constant is a good way of initialising your base values at\
    \ the start of your code. You can define that your game has three lives, or even\
    \ the value of PI without having to call up the C++ math library:\n\n```cpp\n\
    #include <iostream>\nusing namespace std;\n\n#define PI 3.14159\n\nint main()\n\
    {\n    cout << \"The value of Pi is: \" << PI << endl;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_50_2.png)\n\
    \nSTEP 8 Another method of defining a constant is with the const keyword. Use\
    \ const together with a data type, variable and value: const type variable = value.\
    \ Using Pi as an example:\n\n```cpp\n#include <iostream>\nusing namespace std;\n\
    \nint main()\n{\n    const double PI = 3.14159;\n    cout << \"The value of Pi\
    \ is: \" << PI << endl;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_50_3.png)\n\
    \nSTEP 9 Because you're using const within the main block of code, you need to\
    \ finish the line with a semicolon. You can use either, as long as the names and\
    \ values don't clash, but it's worth mentioning that #define requires no memory,\
    \ so if you're coding to a set amount of memory, #define is your best bet.\n\n\
    ![](img/763cdde75d55911fbf7836a707fd3c3b_50_4.png)\n\nSTEP 10 Const works in much\
    \ the same way as #define. You can create static integers and even newlines:\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main()\n{\n    const\
    \ int LENGTH = 50;\n    const int WIDTH = 40;\n    const char NEWLINE = '\\n';\n\
    \    int area;\n    area = LENGTH * WIDTH;\n    cout << \"Area is: \" << area\
    \ << NEWLINE;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_50_5.png)"
  mdcn: "## 用户交互\n\n步骤 5 其工作原理与之前的代码相同。用户的输入（他们的名字）被存储在一个字符串中，因为它包含多个字符，并在第二个 `cout`\
    \ 行中被检索。只要变量 'name' 不改变，你就可以在代码中的任何地方调用它。\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_46_0.png)\n\
    \n步骤 8 虽然 `cin` 在大多数输入任务中表现良好，但它确实有一个局限性。`cin` 总是将空格视为终止符，因此它被设计用于单个单词而非多个单词。然而，`getline`\
    \ 以 `cin` 作为第一个参数，变量作为第二个参数：\n\n```cpp\n#include <iostream>\nusing namespace std;\n\
    \nint main ()\n{\n    string mystr;\n    cout << \"Enter a sentence: \\n\";\n\
    \    getline(cin, mystr);\n    cout << \"Your sentence is: \" << mystr.size()\
    \ << \" characters long.\\n\";\n}\n```\n\n步骤 6 你可以将输入请求链接起来，但请确保你有一个有效的变量来存储输入。假设你希望用户输入两个整数：\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    int\
    \ num1, num2;\n    cout << \"Enter two whole numbers: \";\n    cin >> num1 >>\
    \ num2;\n    cout << \"you entered \" << num1 << \" and \" << num2 << \"\\n\"\
    ;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_46_1.png)\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_46_2.png)\n\
    \n步骤 9 构建并执行代码，然后输入一个包含空格的句子。完成后，代码会读取字符数。如果你移除 `getline` 行并用 `cin >> mystr` 替换它，然后再次尝试，结果显示的是到第一个空格为止的字符数。\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_46_3.png)\n\n步骤 7 同样，一旦你将输入的数据存储在变量中，就可以对其进行操作。例如，要求用户输入两个数字并对它们进行一些数学运算：\n\
    \n```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n    float\
    \ num1, num2;\n    cout << \"Enter two numbers: \\n\";\n    cin >> num1 >> num2;\n\
    \    cout << num1 << \" + \" << num2 << \" is: \" << num1 + num2 << \"\\n\";\n\
    }\n```\n\n步骤 10 `getline` 通常是新 C++ 程序员忘记包含的命令。当你无法弄清楚代码为什么不工作时，终止的空白符会很烦人。简而言之，最好在将来使用\
    \ `getline(cin, variable)`：\n\n```cpp\n#include <iostream>\nusing namespace std;\n\
    \nint main ()\n{\n    string name;\n    cout << \"Enter your full name: \\n\"\
    ;\n    getline(cin, name);\n    cout << \"\\nHello, \" << name << \"\\n\";\n}\n\
    ```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_46_4.png)\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_46_5.png)\n\
    \n## 字符字面量\n\n在 C++ 中，字面量是一个一旦定义就在整个代码中保持不变的对象或变量。然而，字符字面量由反斜杠定义，例如你一直在 `cout`\
    \ 语句末尾使用的 `\\n`，它表示换行。\n\n## 转义序列\n\n当在 `cout` 语句之类的东西中使用时，字符字面量也称为转义序列码。它们允许你插入引号、警报、换行符等等。\n\
    \n步骤 1 创建一个新的 C++ 文件并输入相关的头文件：\n\n```cpp\n#include <iostream>\nusing namespace\
    \ std;\n\nint main ()\n{\n\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_47_0.png)\n\
    \n步骤 3 如果你想在 `cout` 语句中插入引号，你必须使用反斜杠，因为它已经使用了引号：\n\n```cpp\n#include <iostream>\n\
    using namespace std;\n\nint main ()\n{\n    cout << \"Hello, user. This is how\
    \ to use \\\"quotes\\\".\";\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_47_1.png)\n\
    \n步骤 2 你已经体验过 `\\n` 字符字面量在调用它的任何地方放置换行符。这行代码：`cout << \"Hello\\n\" << \"I'm a\
    \ C++\\n\" << \"Program!\\n\";` 输出三行文本，每行都在上一个 `\\n` 之后开始。\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_47_2.png)\n\
    \n步骤 4 甚至有一个字符字面量可以触发警报。在 Windows 10 中，当你使用 `\\a` 时，它是通知声音。尝试这段代码，并调高音量。\n\n```cpp\n\
    #include <iostream>\nusing namespace std;\n\nint main ()\n{\n    cout << \"ALARM!\
    \ \\a\";\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_47_3.png)\n\n## 便捷图表\n\
    \n有众多的字符字面量或转义序列码可供选择。因此，我们认为为你提供一个便捷图表会很好，以便在你需要插入代码时使用。\n\n| 转义序列码 | 字符 |\n\
    |---|---|\n| \\\\ | 反斜杠 |\n| \\' | 单引号 |\n| \\\" | 双引号（引号） |\n| \\? | 问号 |\n|\
    \ \\a | 警报/警报声 |\n| \\b | 退格 |\n| \\f | 换页 |\n| \\n | 换行 |\n| \\r | 回车 |\n| \\\
    t | 水平制表符 |\n| \\v | 垂直制表符 |\n| \\0 | 空字符 |\n| \\uxxxx | Unicode (UTF-8) |\n|\
    \ \\Uxxxxxxxx | Unicode (UTF-16) |\n\n## UNICODE 字符 (UTF-8)\n\nUnicode 字符是跨所有平台的标准符号或字符。例如，版权符号可以通过键盘输入\
    \ Unicode 代码，然后按 ALT+X 来输入。对于版权符号，输入：00A9 Alt+X。在 C++ 代码中，你会输入：\n\n```cpp\n#include\
    \ <iostream>\nusing namespace std;\n\nint main ()\n{\n    cout << \"\\u00A9\"\
    ;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_48_0.png)\n\n## UNICODE\
    \ 字符表\n\n完整的可用 Unicode 字符列表可以在 **www.unicode-table.com/en/** 找到。将鼠标悬停在字符上以查看其在\
    \ C++ 中输入的唯一代码。\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_48_1.png)\n\n## 定义常量\n\
    \n常量是代码中的固定值。它们可以是任何基本数据类型，但顾名思义，它们的值在整个代码中保持不变。在 C++ 中定义常量有两种不同的方式：`#define`\
    \ 预处理器和 `const`。\n\n## #DEFINE\n\n预处理器是给编译器的指令，要求在编译代码之前预处理信息。`#include` 是一个预处理器，`#define`\
    \ 也是。\n\n步骤 1 你可以使用 `#define` 预处理器来定义代码中你想要的任何常量。首先创建一个新的 C++ 文件，并包含通常的头文件：\n\n\
    ```cpp\n#include <iostream>\nusing namespace std;\n\nint main ()\n{\n}\n```\n\n\
    ![](img/763cdde75d55911fbf7836a707fd3c3b_49_0.png)\n\n步骤 3 注意定义常量时使用大写字母，将所有常量定义为大写字母被认为是良好的编程实践。这里，赋值是\
    \ 50、40 和 60，所以让我们调用它们：\n\n```cpp\n#include <iostream>\nusing namespace std;\n\
    \n#define LENGTH 50\n#define WIDTH 40\n#define HEIGHT 60\n\nint main ()\n{\n \
    \   cout << \"Length is: \" << LENGTH << \"\\n\";\n    cout << \"Width is: \"\
    \ << WIDTH << \"\\n\";\n    cout << \"Height is: \" << HEIGHT << \"\\n\";\n}\n\
    ```\n\n步骤 2 现在假设你的代码有三个不同的常量：长度、宽度和高度。你可以用以下方式定义它们：\n\n```cpp\n#include <iostream>\n\
    using namespace std;\n#define LENGTH 50\n#define WIDTH 40\n#define HEIGHT 60\n\
    \nint main ()\n{\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_49_1.png)\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_49_2.png)\n\n步骤 4 构建并运行代码。正如预期的那样，它显示了创建的每个常量的值。值得注意的是，使用\
    \ `#define` 关键字定义常量时不需要分号。\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_49_3.png)\n\
    \n## 定义常量\n\n步骤 5 你也可以将其他元素定义为常量。例如，与其在 `cout` 语句中使用 `\\n` 表示换行，不如在代码开头定义它：\n\n\
    ```cpp\n#include <iostream>\nusing namespace std;\n\n#define LENGTH 50\n#define\
    \ WIDTH 40\n#define HEIGHT 60\n#define NEWLINE '\\n'\n\nint main()\n{\n    cout\
    \ << \"Length is: \" << LENGTH << NEWLINE;\n    cout << \"Width is: \" << WIDTH\
    \ << NEWLINE;\n    cout << \"Height is: \" << HEIGHT << NEWLINE;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_50_0.png)\n\
    \n步骤 6 代码在构建和执行后，与之前完全相同，使用新的常量 `NEWLINE` 在 `cout` 语句中插入换行符。顺便说一句，创建换行常量不是一个好主意，除非你让它比\
    \ `\\n` 甚至 `endl` 命令更小。\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_50_1.png)\n\
    \n步骤 7 定义常量是在代码开头初始化基础值的好方法。你可以定义你的游戏有三条命，甚至定义 PI 的值，而无需调用 C++ 数学库：\n\n```cpp\n\
    #include <iostream>\nusing namespace std;\n\n#define PI 3.14159\n\nint main()\n\
    {\n    cout << \"The value of Pi is: \" << PI << endl;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_50_2.png)\n\
    \n步骤 8 定义常量的另一种方法是使用 `const` 关键字。将 `const` 与数据类型、变量和值一起使用：`const type variable\
    \ = value`。以 Pi 为例：\n\n```cpp\n#include <iostream>\nusing namespace std;\n\nint\
    \ main()\n{\n    const double PI = 3.14159;\n    cout << \"The value of Pi is:\
    \ \" << PI << endl;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_50_3.png)\n\
    \n步骤 9 因为你在 `main` 代码块中使用 `const`，所以你需要用分号结束这一行。你可以使用其中任何一种，只要名称和值不冲突，但值得一提的是\
    \ `#define` 不需要内存，所以如果你在内存有限的情况下编码，`#define` 是你最好的选择。\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_50_4.png)\n\
    \n步骤 10 `const` 的工作方式与 `#define` 大致相同。你可以创建静态整数甚至换行符：\n\n```cpp\n#include <iostream>\n\
    using namespace std;\n\nint main()\n{\n    const int LENGTH = 50;\n    const int\
    \ WIDTH = 40;\n    const char NEWLINE = '\\n';\n    int area;\n    area = LENGTH\
    \ * WIDTH;\n    cout << \"Area is: \" << area << NEWLINE;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_50_5.png)"
