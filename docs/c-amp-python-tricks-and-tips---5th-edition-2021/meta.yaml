  md: "# Beginner Python Mistakes\n\nPython is a relatively easy language to get started\
    \ in where there’s plenty of room for the beginner to find their programming feet.\
    \ However, as with any other programming language, it can be easy to make common\
    \ mistakes that’ll stop your code from running.\n\n# DEF BEGINNER(MISTAKES=10)\n\
    \nHere are ten common Python programming mistakes most beginners find themselves\
    \ making. Being able to identify these mistakes will save you headaches in the\
    \ future.\n\n# VERSIONS\n\nTo add to the confusion that most beginners already\
    \ face when coming into programming, Python has two live versions of its language\
    \ available to download and use. There is Python version 2.7.x and Python 3.6.x.\
    \ The 3.6.x version is the most recent, and the one we’d recommend starting. But,\
    \ version 2.7.x code doesn’t always work with 3.6.x code and vice versa.\n\n#\
    \ INDENTS, TABS AND SPACES\n\nPython uses precise indentations when displaying\
    \ its code. The indents mean that the code in that section is a part of the previous\
    \ statement, and not something linked with another part of the code. Use four\
    \ spaces to create an indent, not the Tab key.\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_69_0.png)\n\
    \n```\npython\nMOVESPEED = 11\nMOVE = 1\nSHOOT = 15\n\n# set up counting\nscore\
    \ = 0\n\n# set up font\nfont = pygame.font.SysFont('calibri', 50)\n\ndef makeplayer():\n\
    \    player = pygame.Rect(370, 635, 60, 25)\n    return player\n\ndef makeinvaders(invaders):\n\
    \    y = 0\n    for i in invaders:\n        x = 0\n        for j in range(11):\n\
    \            invader = pygame.Rect(75+x, 75+y, 50, 20)\n            invaders.add(invader)\n\
    \            x += 60\n        y += 45\n    return invaders\n\ndef makewalls(walls):\n\
    \    wall1 = pygame.Rect(60, 520, 120, 30)\n    wall2 = pygame.Rect(246, 520,\
    \ 120, 30)\n    wall3 = pygame.Rect(432, 520, 120, 30)\n    wall4 = pygame.Rect(618,\
    \ 520, 120, 30)\n```\n\n# THE INTERNET\n\nEvery programmer has and does at some\
    \ point go on the Internet and copy some code to insert into their own routines.\
    \ There’s nothing wrong with using others’ code, but you need to know how the\
    \ code works and what it does before you go blindly running it on your own computer.\n\
    \n# COMMENTING\n\nAgain we mention commenting. It’s a hugely important factor\
    \ in programming, even if you’re the only one who is ever going to view the code,\
    \ you need to add comments as to what’s going on. Is this function where you lose\
    \ a life? Write a comment and help you, or anyone else, see what’s going on.\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_69_1.png)\n\n```\npython\n# set up\
    \ pygame\npygame.init()\nmainClock = pygame.time.Clock()\n\n# set up the window\n\
    width = 800\nheight = 700\nscreen = pygame.display.set_mode((width, height), 0,\
    \ 32)\npygame.display.set_caption('caption')\n\n# set up movement variables\n\
    moveLeft = False\nmoveRight = False\nmoveUp = False\nmoveDown = False\n\n# set\
    \ up direction variables\nDOWNLEFT = 1\nDOWNRIGHT = 3\n```"
