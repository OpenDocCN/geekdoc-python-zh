    \nC++ 开发者可能会遇到许多陷阱，尤其是因为这是一门更复杂且通常难以掌握的语言。初学者需要一步一步地学习 C++，并在继续之前消化他们所学的内容。\n\n\
    ## VOID(C++, MISTAKES)\n\n诚然，犯下我们在这几页中概述的错误的不仅仅是 C++ 初学者，即使是经验丰富的程序员也难免会在这里或那里出现一些小问题。以下是一些需要尽量避免的常见问题。\n\
    \n## 未声明的标识符\n\n一个常见的 C++ 错误，老实说也是大多数编程语言的常见错误，就是当你试图输出一个不存在的变量时。在屏幕上显示 x 的值是可以的，但如果你一开始就没有告诉编译器\
    \ x 的值是多少，那就不行了。\n\n## STD 命名空间\n\n初学者在整个代码中引用标准库是很常见的，但如果你在语句中漏掉了 `std::` 部分，你的代码在编译时就会出错。你可以通过添加以下内容来解决这个问题：\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_71_0.png)\n\n```\nusing namespace std;\n\
    ```\n\n放在 `#include` 部分下面，然后就可以简单地使用 `cout`、`cin` 等等。\n\n```\n#include <iostream>\n\
    using namespace std;\n\nint main()\n{\n    int a, b, c, d;\n    a=10;\n    b=20;\n\
    \    c=30;\n    d=40;\n\n    cout << a, b, c, d;\n}\n```\n\n## 分号\n\n请记住，C++ 程序的每一行都必须以分号结尾。如果没有，编译器就会将缺少分号的那一行与下一个分号所在的行视为同一行。这会在编译时产生各种各样的问题，所以不要忘记那些分号。\n\
    \n## GCC 或 G++\n\n如果你在 Linux 中编译，那么你无疑会遇到 `gcc` 和 `g++`。简而言之，`gcc` 是 Gnu 编译器集合（或以前称为\
    \ Gnu C 编译器），而 `g++` 是编译器的 Gnu ++（C++ 版本）。如果你编译的是 C++，那么你需要使用 `g++`，因为使用错误的编译器驱动程序会导致问题。\n\
    \n```\n#include <iostream>\n\nint main()\n{\n    int a, b, c, d;\n    a=10;\n\
    \    b=20;\n    c=30;\n    d=40;\n\n    std::cout << a, b, c, d;\n}\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_71_1.png)\n\
    \n## 注释（再次强调）\n\n确实，从不在代码中添加任何注释的错误又出现了。正如我们之前所抱怨的，整个代码中缺乏可读的标识符，使得无论是对你自己还是对其他人来说，回顾代码如何工作都变得非常困难。多使用注释。\n\
    \n```\n#include <iostream>\n#include <vector>\n#include <algorithm>\nusing namespace\
    \ std;\n\nint main()\n{\n    vector<double> v;\n\n    double d;\n    while(cin>>d)\
    \ v.push_back(d);  // read elements\n    if (!cin.eof()) {              // check\
    \ if input failed\n        cerr << \"format error\\n\";\n        return 1;   \
    \               // error return\n    }\n\n    cout << \"read \" << v.size() <<\
    \ \" elements\\n\";\n\n    reverse(v.begin(),v.end());\n    cout << \"elements\
    \ in reverse order:\\n\";\n    for (int i = 0; i<v.size(); ++i) cout << v[i] <<\
    \ '\\n';\n\n    return 0;                      // success return\n}\n```\n\n##\
    \ 引号\n\n缺少引号是每个级别的用户都可能犯的常见错误。请记住，引号需要包裹字符串以及任何将要输出到屏幕或文件中的内容。大多数编译器错误都是由于代码中缺少引号造成的。\n\
    \n![](img/763cdde75d55911fbf7836a707fd3c3b_72_0.png)\n\n## 多余的分号\n\n虽然在每一行 C++\
    \ 代码的末尾都需要一个分号，但这条规则也有一些例外。分号需要放在每个完整语句的末尾，但有些代码行不是完整的语句。例如：\n\n- #include\n-\
    \ if 语句\n- switch 语句\n\n如果听起来令人困惑，别担心，编译器会告诉你哪里出错了。\n\n```\n// Program to print\
    \ positive number entered by the user\n// If user enters negative number, it is\
    \ skipped\n\n#include <iostream>\nusing namespace std;\n\nint main()\n{\n    int\
    \ number;\n    cout << \"Enter an integer: \";\n    cin >> number;\n\n    // checks\
    \ if the number is positive\n    if ( number > 0)\n    {\n        cout << \"You\
    \ entered a positive integer: \" << number << endl;\n    }\n\n    cout << \"This\
    \ statement is always executed.\";\n    return 0;\n}\n```\n\n## 花括号过多\n\n花括号，或称大括号，是代码块周围的开始和结束标记。因此，对于每一个\
    \ `{`，你必须有一个 `}`。在编写代码时，很容易包含或遗漏其中一个对应的括号；通常是在文本编辑器中编写时，因为 IDE 会为你添加它们。\n\n```\n\
    #include <iostream>\nusing namespace std;\n\nint main()\n{\n    int x;\n    string\
    \ mystring = \"This is a string!\\n\";\n    cout << \"What's the value of x? \"\
    ;\n    cin >> x;\n    cout << x;\n    {\n        cout << \"\\n\\n\";\n       \
    \ cout << mystring;\n    }\n}\n```\n\n## 初始化变量\n\n在 C++ 中，变量默认不会初始化为零。这意味着如果你创建一个名为\
    \ x 的变量，那么它可能被赋予一个从 0 到 18,446,744,073,709,551,616 的随机数，这很难在方程中使用。创建变量时，首先给它赋值为零：`x=0`。\n\
    \n```\n#include <iostream>\nusing namespace std;\n\nint main()\n{\n    int x;\n\
    \    x=0;\n\n    cout << x;\n}\n```\n\n## A.OUT\n\n在 Linux 中编译时的一个常见错误是忘记在编译后为你的\
    \ C++ 代码命名。当你从终端编译时，你会输入：\n\n```\ng++ code.cpp\n```\n\n这会编译文件 `code.cpp` 中的代码，并创建一个可以通过\
    \ `./a.out` 执行的 `a.out` 文件。但是，如果你在 `a.out` 中已经有代码，那么它会被覆盖。使用：\n\n```\ng++ code.cpp\
    \ -o nameofprogram\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_72_1.png)"
