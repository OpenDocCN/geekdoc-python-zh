    \nPygame 并非 Python 的内置模块，但使用树莓派的用户已经安装了它。其他用户需要使用命令提示符执行：`pip install pygame`。\n\
    \n**步骤 1** 自然，在能够使用 Pygame 模块之前，你需要先将它们加载到内存中。完成后，Pygame 要求用户在使用任何函数之前对其进行初始化：\n\
    \n```python\nimport pygame\npygame.init()\n```\n\n![](img/763cdde75d55911fbf7836a707fd3c3b_37_0.png)\n\
    \n**步骤 3** 遗憾的是，如果不关闭 Python IDLE Shell，就无法关闭新创建的 Pygame 窗口，这不太实用。因此，你需要在编辑器中（新建\
