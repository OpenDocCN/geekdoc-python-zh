  - '[PAGE 21]


    # Writing to Files


    The ability to read external files within Python is certainly handy but writing
    to a file is better still. Using the write() function, you’re able to output the
    results of a program to a file, that you can then read() back into Python.


    # WRITE AND CLOSE


    The write() function is slightly more complex than read(). Along with the filename
    you must also include an access mode which determines whether the file in question
    is in read or write mode.


    **STEP 1** Start by opening IDLE and enter the following:

    `t=open("/home/pi/Documents/text.txt", "w")`

    Change the destination from /home/pi/Documents to your own system. This code will
    create a text file called text.txt in write mode using the variable ‘t’. If there’s
    no file of that name in the location, it will create one. If one already exits,
    it will overwrite it, so be careful.


    **STEP 3** However, the actual text file is still blank (you can check by opening
    it up). This is because you’ve written the line of text to the file object but
    not committed it to the file itself. Part of the write() function is that you
    need to commit the changes to the file; you can do this by entering:

    `t.close()`


    ![](img/763cdde75d55911fbf7836a707fd3c3b_21_0.png)


    ![](img/763cdde75d55911fbf7836a707fd3c3b_21_1.png)


    **STEP 2** You can now write to the text file using the write() function. This
    works opposite to read(), writing lines instead of reading them. Try this:

    `t.write("You awake in a small, square room. A single table stands to one side,
    there is a locked door in front of you.")`

    Note the 109. It’s the number of characters you’ve entered.


    **STEP 4** If you now open the text file with a text editor, you can see that
    the line you created has been written to the file. This gives us the foundation
    for some interesting possibilities: perhaps the creation of your own log file
    or even the beginning of an adventure game.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_21_2.png)


    ![](img/763cdde75d55911fbf7836a707fd3c3b_21_3.png)'
- md: "## Writing to Files\n\nSTEP 5 To expand this code, you can reopen the file\
    \ using 'a', for access or append mode. This will add any text at the end of the\
    \ original line instead of wiping the file and creating a new one. For example:\n\
    \n```\nt=open(\"/home/pi/Documents/text.txt\",\"a\")\nt.write(\"\\n\")\nt.write(\"\
    \ You stand and survey your surroundings. On top of the table is some meat, and\
    \ a cup of water.\\n\")\n```\n\nSTEP 6 You can keep extending the text line by\
    \ line, ending each with a new line (\\n). When you're done, finish the code with\
    \ t.close() and open the file in a text editor to see the results:\n\n```\nt.write(\"\
    The door is made of solid oak with iron strips. It's bolted from the outside,\
    \ locking you in. You are a prisoner!.\\n\")\nt.close()\n```\n\nSTEP 7 There are\
    \ various types of file access to consider using the open() function. Each depends\
    \ on how the file is accessed and even the position of the cursor. For example,\
    \ r+ opens a file in read and write and places the cursor at the start of the\
    \ file.\n\nSTEP 8 You can pass variables to a file that you've created in Python.\
    \ Perhaps you want the value of Pi to be written to a file. You can call Pi from\
    \ the math module, create a new file and pass the output of Pi into the new file:\n\
    \n```\nimport math\nprint(\"Value of Pi is: \",math.pi)\nprint(\"\\nWriting to\
    \ a file now...\")\n```\n\nSTEP 9 Now let's create a variable called pi and assign\
    \ it the value of Pi:\n\n```\npi=math.pi\n```\n\nYou also need to create a new\
    \ file in which to write Pi to:\n\n```\nt=open(\"/home/pi/Documents/pi.txt\",\"\
    w\")\n```\n\nRemember to change your file location to your own particular system\
    \ setup.\n\nSTEP 10 To finish, you can use string formatting to call the variable\
    \ and write it to the file, then commit the changes and close the file:\n\n```\n\
    t.write(\"Value of Pi is: {}\".format(pi))\nt.close()\n```\n\nYou can see from\
    \ the results that you're able to pass any variable to a file.\n\n## Exceptions\n\
    \nWhen coding, you'll naturally come across some issues that are out of your control.\
    \ Let's assume you ask a user to divide two numbers and they try to divide by\
    \ zero. This will create an error and break your code.\n\n### EXCEPTIONAL OBJECTS\n\
    \nRather than stop the flow of your code, Python includes exception objects which\
    \ handle unexpected errors in the code. You can combat errors by creating conditions\
    \ where exceptions may occur.\n\nSTEP 1 You can create an exception error by simply\
    \ trying to divide a number by zero. This will report back with the ZeroDivisionError:\
    \ Division by zero message, as seen in the screenshot. The ZeroDivisionError part\
    \ is the exception class, of which there are many.\n\nSTEP 2 Most exceptions are\
    \ raised automatically when Python comes across something that's inherently wrong\
    \ with the code. However, you can create your own exceptions that are designed\
    \ to contain the potential error and react to it, as opposed to letting the code\
    \ fail.\n\nSTEP 3 You can use the functions raise exception to create our own\
    \ error handling code within Python. Let's assume your code has you warping around\
    \ the cosmos, too much however results in a warp core breach. To stop the game\
    \ from exiting due to the warp core going supernova, you can create a custom exception:\n\
    \n```\nraise Exception(\"warp core breach\")\n```\n\nSTEP 4 To trap any errors\
    \ in the code you can encase the potential error within a try: block. This block\
    \ consists of try, except, else, where the code is held within try:, then if there's\
    \ an exception do something, else do something else.\n\nSTEP 5 For example, use\
    \ the divide by zero error. You can create an exception where the code can handle\
    \ the error without Python quitting due to the problem:\n\n```\ntry:\n    a=int(input(\"\
    Enter the first number: \"))\n    b=int(input(\"Enter the second number: \"))\n\
    \    print(a/b)\nexcept ZeroDivisionError:\n    print(\"You have tried to divide\
    \ by zero!\")\nelse:\n    print(\"You didn't divide by zero. Well done!\")\n```\n\
    \nSTEP 6 You can use exceptions to handle a variety of useful tasks. Using an\
    \ example from our previous tutorials, let's assume you want to open a file and\
    \ write to it:\n\n```\ntry:\n    txt = open(\"/home/pi/Documents/textfile.txt\"\
    , \"r\")\n    txt.write(\"This is a test. Normal service will shortly resume!\"\
    )\nexcept IOError:\n    print (\"Error: unable to write the file. Check permissions\"\
    )\nelse:\n    print (\"Content written to file successfully. Have a nice day.\"\
    )\n    txt.close()\n```\n\nSTEP 7 Obviously this won't work due to the file textfile.txt\
    \ being opened as read only (the \"r\" part). So in this case rather than Python\
    \ telling you that you're doing something wrong, you've created an exception using\
    \ the IOError class informing the user that the permissions are incorrect.\n\n\
    STEP 8 Naturally, you can quickly fix the issue by changing the \"r\" read only\
    \ instance with a \"w\" for write. This, as you already know, will create the\
    \ file and write the content then commit the changes to the file. The end result\
    \ will report a different set of circumstances, in this case, a successful execution\
    \ of the code.\n\nSTEP 9 You can also use a finally: block, which works in a similar\
    \ fashion but you can't use else with it. To use our example from Step 6:\n\n\
    ```\ntry:\n    txt = open(\"/home/pi/Documents/textfile.txt\", \"r\")\n    try:\n\
    \        txt.write(\"This is a test. Normal service will shortly resume!\")\n\
    \    finally:\n        print (\"Content written to file successfully. Have a nice\
    \ day.\")\n        txt.close()\nexcept IOError:\n    print (\"Error: unable to\
    \ write the file. Check permissions\")\n```\n\nSTEP 10 As before an error will\
    \ occur as you've used the \"r\" read-only permission. If you change it to a \"\
    w\", then the code will execute without the error being displayed in the IDLE\
    \ Shell. Needless to say, it can be a tricky getting the exception code right\
    \ the first time. Practise though, and you will get the hang of it.\n\n## Python\
    \ Graphics\n\nWhile dealing with text on the screen, either as a game or in a\
    \ program, is great, there will come a time when a bit of graphical representation\
    \ wouldn't go amiss. Python 3 has numerous ways in which to include graphics and\
    \ they're surprisingly powerful too.\n\n### GOING GRAPHICAL\n\nYou can draw simple\
    \ graphics, lines, squares and so on, or you can use one of the many Python modules\
    \ available, to bring out some spectacular effects.\n\n**STEP 1** One of the best\
    \ graphical modules to begin learning Python graphics is Turtle. The Turtle module\
    \ is, as the name suggests, based on the turtle robots used in many schools, that\
    \ can be programmed to draw something on a large piece of paper on the floor.\
    \ The Turtle module can be imported with: `import turtle`.\n\n**STEP 2** Let's\
    \ begin by drawing a simple circle. Start a New File, then enter the following\
    \ code:\n\n```\nimport turtle\nturtle.circle(50)\nturtle.getscreen()._root.mainloop()\n\
    ```\n\nAs usual press F5 to save the code and execute it. A new window will now\
    \ open up and the 'Turtle' will draw a circle.\n\n**STEP 3** The command `turtle.circle(50)`\
    \ is what draws the circle on the screen, with 50 being the size. You can play\
    \ around with the sizes if you like, going up to 100, 150 and beyond; you can\
    \ draw an arc by entering: `turtle.circle(50, 180)`, where the size is 50, but\
    \ you're telling Python to only draw 180° of the circle.\n\n**STEP 4** The last\
    \ part of the circle code tells Python to keep the window where the drawing is\
