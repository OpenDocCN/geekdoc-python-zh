    # Opening Files


    In Python you can read text and binary files in your programs. You can also write
    to file, which is something we will look at next. Reading and writing to files
    enables you to output and store data from your programs.


    # OPEN, READ AND WRITE


    In Python you create a file object, similar to creating a variable, only pass
    in the file using the open() function. Files are usually categorised as text or
    binary.


    **STEP 1** Start by entering some text into your system''s text editor. The text
    editor is best, not a word processor, as word processors include background formatting
    and other elements. In our example, we have the poem The Cimmerian, by Robert
    E Howard. You need to save the file as poem.txt.


    **STEP 3** If you now enter poem into the Shell, you will get some information
    regarding the text file you''ve just asked to be opened. You can now use the poem
    variable to read the contents of the file:


    ![](img/763cdde75d55911fbf7836a707fd3c3b_19_0.png)


    ```

    python

    poem.read()

    ```


    Note that a /n entry in the text represents a new line, as you used previously.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_19_1.png)


    **STEP 2** You use the open() function to pass the file into a variable as an
    object. You can name the file object anything you like, but you will need to tell
    Python the name and location of the text file you''re opening:


    **STEP 4** If you enter poem.read() a second time you will notice that the text
    has been removed from the file. You will need to enter: `poem=open("/home/pi/Documents/Poem.txt")`
    again to recreate the file. This time, however, enter:


    ```

    python

    poem=open("/home/pi/Documents/Poem.txt")

    ```


    ```

    python

    print(poem.read())

    ```


    ![](img/763cdde75d55911fbf7836a707fd3c3b_19_2.png)


    This time, the /n entries are removed in favour of new lines and readable text.


    ![](img/763cdde75d55911fbf7836a707fd3c3b_19_3.png)'
