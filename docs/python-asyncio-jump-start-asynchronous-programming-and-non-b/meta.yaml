    \nThe `__exit__()` method defines what happens when the code block is exited,\
    \ such as closing a prepared resource.\n\nTypically a context manager object is\
    \ created at the beginning of the `with` expression and the `__enter__()` method\
    \ is called automatically. The body of the content makes use of the resource via\
    \ the named context manager object, then the `__exit__()` method is called automatically\
    \ when the code block is exited, normally, or via an exception.\n\nFor example:\n\
    \n```\n...\n# open a context manager\nwith ContextManager() as manager:\n    #\
    \ ...\n# closed automatically\n```\n\nThis mirrors a try-finally expression.\n\
    \nFor example:\n\n```\n...\n# create the object\nmanager = ContextManager()\n\
    try:\n    manager.__enter__()\n    # ...\nfinally:\n    manager.__exit__()\n```\n\
    \nAsynchronous context managers provide a context manager that can be suspended\
    \ when entering and exiting.\n\nThe `__aenter__()` and `__aexit__()` methods are\
    \ defined as coroutines and are awaited by the caller.\n\nThis is achieved using\
    \ the `async with` expression which we will learn more about in a moment.\n\n\
    As such, asynchronous context managers can only be used within asyncio programs,\
    \ such as within calling coroutines.\n\nNext, let’s take a closer look at how\
    \ to define an asynchronous context manager.\n\n## How to Define an Asynchronous\
    \ Context Manager\n\nWe can define an asynchronous context manager as an object\
    \ that implements the `__aenter__()` and `__aexit__()` methods.\n\nImportantly,\
    \ both methods must be defined as coroutines using the `async def` expression\
    \ and therefore must return awaitables.\n\nFor example:\n\n```\n# define an asynchronous\
