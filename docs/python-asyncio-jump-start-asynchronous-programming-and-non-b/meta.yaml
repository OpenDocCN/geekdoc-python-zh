    # Lesson 06: Subprocesses and Streams


    In this lesson, we will explore how to run commands from an asyncio program in
    subprocesses. We will also explore how we can implement socket programming, such
    as opening a TCP socket connection then read and write from it asynchronous using
    non-blocking I/O.


    After completing this lesson, you will know:


    +   - How to run commands asynchronously as subprocesses directly from coroutines.

    - How to run commands asynchronously using the shell from coroutines.

    - How to open, read, and write from non-blocking TCP socket connections.

    - How to check the status of webpages asynchronously using streams.


