- md: "## How to Use Non-Blocking I/O Streams\n\nAsyncio provides non-blocking I/O\
    \ socket programming.\n\nThis is provided via streams.\n\nSockets can be opened\
    \ that provide access to a stream writer and a stream reader.\n\nData can then\
    \ be written and read from the stream using coroutines, suspending when appropriate.\n\
    \nOnce finished, the socket can be closed.\n\nThe asyncio streams capability is\
    \ low-level meaning that any protocols required must be implemented manually.\n\
    \nThis can include common ASCII-based web protocols, such as:\n\n- HTTP or HTTPS\
    \ for interacting with web servers.\n- SMTP for interacting with email servers.\n\
    - FTP for interacting with file servers.\n\nThe streams can also be used to create\
    \ a server to handle requests using a standard protocol, or to develop our own\
    \ application-specific protocol.\n\nNow that we know what asyncio streams are,\
    \ let’s look at how to use them.\n\n## How to Open a Socket Connection\n\nAn asyncio\
    \ TCP client socket connection can be opened using the `asyncio.open_connection()`\
    \ function.\n\nThis is a coroutine that must be awaited and will return once the\
    \ socket connection is open.\n\nThe function returns a `StreamReader` and `StreamWriter`\
    \ object for interacting with the socket.\n\nFor example:\n\n```\n...\n# open\
    \ a connection\nreader, writer = await asyncio.open_connection(...)\n```\n\nThe\
    \ asyncio.open_connection() function takes many arguments in order to configure\
    \ the socket connection.\n\nThe two required arguments are the host and the port.\n\
    \nThe host is a string that specifies the server to connect to, such as a domain\
    \ name or an IP address.\n\nThe port is the socket port number, such as 80 for\
    \ HTTP servers, 443 for HTTPS servers, 23 for SMTP and so on.\n\nFor example:\n\
    \n```\n...\n# open a connection to an http server\nreader, writer = await asyncio.open_connection(\n\
    \    'www.google.com', 80)\n```\n\nEncrypted socket connections are supported\
    \ over the SSL protocol.\n\nThe most common example is HTTPS which is replacing\
    \ HTTP.\n\nThis can be achieved by setting the ssl argument to True.\n\nFor example:\n\
    \n```\n...\n# open a connection to an https server\nreader, writer = await asyncio.open_connection(\n\
    \    'www.google.com', 443, ssl=True)\n```\n\nNext, let's look at how we can start\
    \ a TCP server.\n\n## How to Start a TCP Server\n\nAn asyncio TCP server socket\
    \ can be opened using the asyncio.start_server() function.\n\nThis is a coroutine\
    \ that must be awaited.\n\nThe function returns an asyncio.Server object that\
    \ represents the running server.\n\nFor example:\n\n```\n...\n# start a tcp server\n\
    server = await asyncio.start_server(...)\n```\n\nThe three required arguments\
    \ are the callback function, the host, and the port.\n\nThe callback function\
    \ is a custom function specified by name that will be called each time a client\
    \ connects to the server.\n\nThe host is the domain name or IP address that clients\
    \ will specify to connect. The port is the socket port number on which to receive\
    \ connections, such as 21 for FTP or 80 for HTTP.\n\nFor example:\n\n```\n# handle\
    \ connections\nasync def handler(reader, writer):\n    # ...\n\n...\n# start a\
    \ server to receive http connections\nserver = await asyncio.start_server(\n \
    \   handler, '127.0.0.1', 80)\n```\n\nNext, let’s look at how we can write data\
    \ to a stream.\n\n## How to Write Data with the StreamWriter\n\nWe can write data\
    \ to the socket using an asyncio.StreamWriter.\n\nData is written as bytes.\n\n\
    Byte data can be written to the socket using the `write()` method.\n\nFor example:\n\
    \n```\n...\n# write byte data\nwriter.write(byte_data)\n```\n\nAlternatively,\
    \ multiple *lines* of byte data organized into a list or iterable can be written\
    \ using the `writelines()` method.\n\nFor example:\n\n```\n...\n# write lines\
    \ of byte data\nwriter.writelines(byte_lines)\n```\n\nNeither method for writing\
    \ data suspends the calling coroutine.\n\nAfter writing byte data it is a good\
    \ idea to drain the socket via the `drain()` method.\n\nThis is a coroutine and\
    \ will suspend the caller until the bytes have been transmitted and the socket\
    \ is ready.\n\nFor example:\n\n```\n...\n# write byte data\nwriter.write(byte_data)\n\
    # wait for data to be transmitted\nawait writer.drain()\n```\n\nString data can\
    \ be converted into byte data for transmission by encoding it. This can be achieved\
    \ using the `encode()` method on the string which will return byte data encoded\
    \ with the default UTF8 encoding, ready for transmission.\n\nFor example:\n\n\
    ```\n...\n# encode string data to byte data for transmission\nbyte_data = string_data.encode()\n\
    ```\n\nNext, let’s look at how we can read data from a stream.\n\n## How to Read\
    \ Data with the StreamReader\n\nWe can read data from the socket using an asyncio.StreamReader.\n\
    \nData is read in byte format, therefore strings may need to be encoded before\
    \ being used.\n\nAll read methods are coroutines that must be awaited.\n\nAn arbitrary\
    \ number of bytes can be read via the read() method, which will read until the\
    \ end of file (EOF).\n\n```\n...\n# read byte data\nbyte_data = await reader.read()\n\
    ```\n\nAdditionally, the number of bytes to read can be specified via the n argument.\n\
    \nThis may be helpful if we know the number of bytes expected from the next response.\n\
    \nFor example:\n\n```\n...\n# read byte data\nbyte_data = await reader.read(n=100)\n\
    ```\n\nA single line of data can be read using the readline() method.\n\nThis\
    \ will return bytes until a new line character '\\n' is encountered, or EOF.\n\
    \nThis is helpful when reading standard protocols that operate with lines of text.\n\
    \n```\n...\n# read a line data\nbyte_line = await reader.readline()\n```\n\nAdditionally,\
    \ there is a `readexactly()` method to read an exact number of bytes otherwise\
    \ raise an exception, and a `readuntil()` that will read bytes until a specified\
    \ character in byte form is read.\n\nData that is read from the stream can be\
    \ decoded from bytes into string data using the `decode()` method and the default\
    \ UTF8 encoding.\n\nFor example:\n\n```\n...\n# decode byte data into string data\n\
    string_data = byte_data.decode()\n```\n\nNext, let's look at how we can close\
    \ an open TCP socket connection.\n\n## How to Close the Socket Connection\n\n\
    The socket can be closed via the `asyncio.StreamWriter`.\n\nThe `close()` method\
    \ can be called which will close the socket. This method does not suspend.\n\n\
    For example:\n\n```\n...\n# close the socket\nwriter.close()\n```\n\nAlthough\
    \ the `close()` method does not suspend, we can wait for the socket to close completely\
    \ before continuing on.\n\nThis can be achieved via the `wait_closed()` method.\n\
    \nThis is a coroutine that can be awaited.\n\nFor example:\n\n```\n...\n# close\
    \ the socket\nwriter.close()\n# wait for the socket to close\nawait writer.wait_closed()\n\
    ```\n\nWe can check if the socket has been closed or is in the process of being\
    \ closed via the `is_closing()` method.\n\nFor example:\n\n```\n...\n# check if\
    \ the socket is closed or closing\nif writer.is_closing():\n    # ...\n```\n\n\
    Now that we know how to open and use asyncio streams, let’s look at a worked example\
    \ of checking the status of webpages asynchronously.\n\n## Example of Checking\
    \ Webpage Status\n\nWe can develop an example of checking the HTTP status of multiple\
    \ webpages concurrently using non-blocking I/O.\n\nThis can be achieved by issuing\
    \ an HTTP GET request to each webpage and reading the first line response which\
    \ will contain the status of the webpage.\n\nThis requires first opening a socket\
    \ connection to the HTTPS server on port 443 using SSL. We must then formulate\
    \ the HTTP GET request that includes the URL we desire and the host name. The\
    \ string request must then be encoded into byte data before being transmitted.\n\
    \nWe can then read the first line of the response from the server, decode it and\
    \ return it as the HTTP status of the server. The TCP socket can then be closed.\
    \ This assumes the servers exist and that we can connect to it.\n\nThis process\
    \ can be wrapped into a coroutine and executed concurrently for each website URL\
    \ that we wish to query.\n\nTying this together, the complete example is listed\
    \ below.\n\n```\n# SuperFastPython.com\n# example of checking the status of multiple\
    \ webpages\nimport asyncio\nimport urllib.parse\n\n# get the http status of a\
    \ webpage\nasync def get_status(url):\n    # split the url into components\n \
    \   url_parsed = urllib.parse.urlsplit(url)\n    # open the connection, assumes\
    \ https\n    reader, writer = await asyncio.open_connection(\n        url_parsed.hostname,\
    \ 443, ssl=True)\n    # send GET request\n    query = f'GET {url_parsed.path}\
    \ HTTP/1.1\\r\\n' \\\n            f'Host: {url_parsed.hostname}\\r\\n\\r\\n'\n\
    \    # write query to socket\n    writer.write(query.encode())\n    # wait for\
    \ the bytes to be written to the socket\n    await writer.drain()\n    # read\
    \ the single line response\n    response = await reader.readline()\n    # close\
    \ the connection\n    writer.close()\n    # decode and strip white space\n   \
    \ status = response.decode().strip()\n    # return the response\n    return status\n\
    \n# main coroutine\nasync def main():\n    # list of top 10 websites to check\n\
    \    sites = ['https://www.google.com/',\n             'https://www.youtube.com/',\n\
    \             'https://www.facebook.com/',\n             'https://twitter.com/',\n\
    \             'https://www.instagram.com/',\n             'https://www.baidu.com/',\n\
    ```"
  mdcn: "## 如何使用非阻塞 I/O 流\n\nAsyncio 提供了非阻塞的 I/O 套接字编程。\n\n这通过流来实现。\n\n可以打开套接字以提供对流写入器和流读取器的访问。\n\
    \n然后可以使用协程从流中写入和读取数据，并在适当时挂起。\n\n完成后，可以关闭套接字。\n\nasyncio 的流功能属于底层功能，这意味着任何所需的协议都必须手动实现。\n\
    \n这可以包括常见的基于 ASCII 的 Web 协议，例如：\n\n- 用于与 Web 服务器交互的 HTTP 或 HTTPS。\n- 用于与电子邮件服务器交互的\
    \ SMTP。\n- 用于与文件服务器交互的 FTP。\n\n流也可以用于创建服务器，以使用标准协议处理请求，或开发我们自己的特定于应用程序的协议。\n\n\
    既然我们知道了 asyncio 流是什么，让我们看看如何使用它们。\n\n## 如何打开套接字连接\n\n可以使用 `asyncio.open_connection()`\
    \ 函数打开一个 asyncio TCP 客户端套接字连接。\n\n这是一个必须被等待的协程，并在套接字连接打开后返回。\n\n该函数返回一个 `StreamReader`\
    \ 和一个 `StreamWriter` 对象，用于与套接字交互。\n\n例如：\n\n```\n...\n# 打开一个连接\nreader, writer\
    \ = await asyncio.open_connection(...)\n```\n\nasyncio.open_connection() 函数接受许多参数来配置套接字连接。\n\
    \n两个必需的参数是主机和端口。\n\n主机是一个字符串，指定要连接的服务器，例如域名或 IP 地址。\n\n端口是套接字端口号，例如 HTTP 服务器的\
    \ 80，HTTPS 服务器的 443，SMTP 的 23 等等。\n\n例如：\n\n```\n...\n# 打开一个到 http 服务器的连接\nreader,\
    \ writer = await asyncio.open_connection(\n    'www.google.com', 80)\n```\n\n\
    支持通过 SSL 协议建立加密的套接字连接。\n\n最常见的例子是正在取代 HTTP 的 HTTPS。\n\n这可以通过将 ssl 参数设置为 True 来实现。\n\
    \n例如：\n\n```\n...\n# 打开一个到 https 服务器的连接\nreader, writer = await asyncio.open_connection(\n\
    \    'www.google.com', 443, ssl=True)\n```\n\n接下来，让我们看看如何启动一个 TCP 服务器。\n\n## 如何启动\
    \ TCP 服务器\n\n可以使用 asyncio.start_server() 函数打开一个 asyncio TCP 服务器套接字。\n\n这是一个必须被等待的协程。\n\
    \n该函数返回一个 asyncio.Server 对象，代表正在运行的服务器。\n\n例如：\n\n```\n...\n# 启动一个 tcp 服务器\nserver\
    \ = await asyncio.start_server(...)\n```\n\n三个必需的参数是回调函数、主机和端口。\n\n回调函数是一个按名称指定的自定义函数，每当客户端连接到服务器时都会被调用。\n\
    \n主机是客户端将指定用于连接的域名或 IP 地址。端口是接收连接的套接字端口号，例如 FTP 的 21 或 HTTP 的 80。\n\n例如：\n\n```\n\
    # 处理连接\nasync def handler(reader, writer):\n    # ...\n\n...\n# 启动一个服务器来接收 http\
    \ 连接\nserver = await asyncio.start_server(\n    handler, '127.0.0.1', 80)\n```\n\
    \n接下来，让我们看看如何向流中写入数据。\n\n## 如何使用 StreamWriter 写入数据\n\n我们可以使用 asyncio.StreamWriter\
    \ 向套接字写入数据。\n\n数据以字节形式写入。\n\n可以使用 `write()` 方法将字节数据写入套接字。\n\n例如：\n\n```\n...\n\
    # 写入字节数据\nwriter.write(byte_data)\n```\n\n或者，可以使用 `writelines()` 方法将组织成列表或可迭代对象的多行字节数据写入。\n\
    \n例如：\n\n```\n...\n# 写入多行字节数据\nwriter.writelines(byte_lines)\n```\n\n这两种写入数据的方法都不会挂起调用协程。\n\
    \n写入字节数据后，最好通过 `drain()` 方法排空套接字。\n\n这是一个协程，它将挂起调用者，直到字节已传输且套接字准备就绪。\n\n例如：\n\n\
    ```\n...\n# 写入字节数据\nwriter.write(byte_data)\n# 等待数据传输\nawait writer.drain()\n\
    ```\n\n字符串数据可以通过编码转换为字节数据进行传输。这可以通过在字符串上使用 `encode()` 方法来实现，该方法将返回使用默认 UTF8 编码的字节数据，准备传输。\n\
    \n例如：\n\n```\n...\n# 将字符串数据编码为字节数据以进行传输\nbyte_data = string_data.encode()\n```\n\
    \n接下来，让我们看看如何从流中读取数据。\n\n## 如何使用 StreamReader 读取数据\n\n我们可以使用 asyncio.StreamReader\
    \ 从套接字读取数据。\n\n数据以字节格式读取，因此字符串在使用前可能需要编码。\n\n所有读取方法都是必须被等待的协程。\n\n可以通过 read()\
    \ 方法读取任意数量的字节，该方法将读取直到文件结束（EOF）。\n\n```\n...\n# 读取字节数据\nbyte_data = await reader.read()\n\
    ```\n\n此外，可以通过 n 参数指定要读取的字节数。\n\n如果我们知道下一个响应预期的字节数，这可能会有所帮助。\n\n例如：\n\n```\n...\n\
    # 读取字节数据\nbyte_data = await reader.read(n=100)\n```\n\n可以使用 readline() 方法读取单行数据。\n\
    \n这将返回字节，直到遇到换行符 '\\n' 或 EOF。\n\n这在读取使用文本行的标准协议时很有帮助。\n\n```\n...\n# 读取一行数据\n\
    byte_line = await reader.readline()\n```\n\n此外，还有一个 `readexactly()` 方法用于读取精确数量的字节，否则引发异常，以及一个\
    \ `readuntil()` 方法，它将读取字节直到读取到指定的字节形式的字符。\n\n从流中读取的数据可以使用 `decode()` 方法和默认的 UTF8\
    \ 编码从字节解码为字符串数据。\n\n例如：\n\n```\n...\n# 将字节数据解码为字符串数据\nstring_data = byte_data.decode()\n\
    ```\n\n接下来，让我们看看如何关闭一个打开的 TCP 套接字连接。\n\n## 如何关闭套接字连接\n\n可以通过 `asyncio.StreamWriter`\
    \ 关闭套接字。\n\n可以调用 `close()` 方法来关闭套接字。此方法不会挂起。\n\n例如：\n\n```\n...\n# 关闭套接字\nwriter.close()\n\
    ```\n\n虽然 `close()` 方法不会挂起，但我们可以等待套接字完全关闭后再继续。\n\n这可以通过 `wait_closed()` 方法实现。\n\
    \n这是一个可以被等待的协程。\n\n例如：\n\n```\n...\n# 关闭套接字\nwriter.close()\n# 等待套接字关闭\nawait\
    \ writer.wait_closed()\n```\n\n我们可以通过 `is_closing()` 方法检查套接字是否已关闭或正在关闭过程中。\n\n\
    例如：\n\n```\n...\n# 检查套接字是否已关闭或正在关闭\nif writer.is_closing():\n    # ...\n```\n\n\
    既然我们知道了如何打开和使用 asyncio 流，让我们看一个异步检查网页状态的实例。\n\n## 检查网页状态的示例\n\n我们可以开发一个示例，使用非阻塞\
    \ I/O 并发检查多个网页的 HTTP 状态。\n\n这可以通过向每个网页发出 HTTP GET 请求并读取包含网页状态的第一行响应来实现。\n\n这需要首先使用\
    \ SSL 在端口 443 上打开到 HTTPS 服务器的套接字连接。然后我们必须制定包含所需 URL 和主机名的 HTTP GET 请求。字符串请求必须在传输前编码为字节数据。\n\
    \n然后我们可以从服务器读取响应的第一行，解码它并将其作为服务器的 HTTP 状态返回。然后可以关闭 TCP 套接字。这假设服务器存在并且我们可以连接到它。\n\
    \n这个过程可以包装成一个协程，并为我们要查询的每个网站 URL 并发执行。\n\n将这些结合起来，完整的示例如下。\n\n```\n# SuperFastPython.com\n\
    # 检查多个网页状态的示例\nimport asyncio\nimport urllib.parse\n\n# 获取网页的 http 状态\nasync def\
    \ get_status(url):\n    # 将 url 分割成组件\n    url_parsed = urllib.parse.urlsplit(url)\n\
    \    # 打开连接，假设是 https\n    reader, writer = await asyncio.open_connection(\n \
    \       url_parsed.hostname, 443, ssl=True)\n    # 发送 GET 请求\n    query = f'GET\
    \ {url_parsed.path} HTTP/1.1\\r\\n' \\\n            f'Host: {url_parsed.hostname}\\\
    r\\n\\r\\n'\n    # 将查询写入套接字\n    writer.write(query.encode())\n    # 等待字节写入套接字\n\
    \    await writer.drain()\n    # 读取单行响应\n    response = await reader.readline()\n\
    \    # 关闭连接\n    writer.close()\n    # 解码并去除空白\n    status = response.decode().strip()\n\
    \    # 返回响应\n    return status\n\n# 主协程\nasync def main():\n    # 要检查的前 10 个网站列表\n\
    \    sites = ['https://www.google.com/',\n             'https://www.youtube.com/',\n\
    \             'https://www.facebook.com/',\n             'https://twitter.com/',\n\
    \             'https://www.instagram.com/',\n             'https://www.baidu.com/',\n\
    ```"
