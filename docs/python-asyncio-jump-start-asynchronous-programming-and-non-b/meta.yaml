    \ await task\n    except asyncio.TimeoutError:\n        # ...\n```\n\nThis is\
    \ not desirable because once the timeout has elapsed, an asyncio.TimeoutError\
    \ will be raised each time next() is called on the generator.\n\nTherefore, it\
    \ is better to wrap the entire loop in a try-except expression.\n\nFor example:\n\
    \n```\n...\n# handle a timeout\ntry:\n    # iterate over awaitables with a timeout\n\
