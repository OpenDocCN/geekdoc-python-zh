    We can think of a generator as a special type of coroutine and cooperative multitasking
    used in loops.


    Before coroutines were developed, generators were extended so that they can be
    used like coroutines in our programs.


    This required a lot of technical knowledge of generators and the development of
    custom task schedulers.


    This was made possible via changes to the generators and the introduction of the
    yield from expression.


    These were later deprecated in favor of the modern async/await expressions.


    Next, let’s look at how coroutines are different to threads.'
  - '[PAGE 24]


    # Coroutine vs Thread


    A thread refers to a thread of execution in a computer program.


    Each program is a process and has at least one thread that executes instructions
    for that process.


    When we run a script, it starts an instance of the interpreter that runs our code
    in the main thread. The main thread is the default thread of a process.


    The underlying operating system controls how new threads are created, when threads
    are executed, and which CPU core executes them.


    A coroutine is more lightweight than a thread.


    A coroutine is defined as a function, whereas a thread is an object created and
    managed by the underlying operating system and represented as a threading.Thread
    object.


    +   - **Thread:** Unit of concurrency managed by the operating system, represented
    by an object. Belongs to a process, may execute many coroutines.


    This means that coroutines are typically faster to create and start executing
    and take up less memory. Conversely, threads are slower than coroutines to create
    and start and take up more memory.


    Coroutines execute within one thread, therefore a single thread may execute many
    coroutines.


    Now that we are familiar with coroutines, let’s look at asynchronous programming.'
- md: "## What is Asynchronous Programming\n\nIn this section, we will discover asynchronous\
    \ programming and how it relates to asynchronous I/O.\n\nBefore we dive into asynchronous\
    \ programming, let’s understand what *asynchronous* means.\n\n### What is Asynchronous\n\
    \nAsynchronous means not at the same time, as opposed to synchronous or at the\
    \ same time.\n\nWhen programming, asynchronous means that the action is requested,\
    \ although not performed at the time of the request. It is performed later.\n\n\
    For example, we can make an asynchronous function call.\n\nThis will issue the\
    \ request to make the function call and will not wait around for the call to complete.\
    \ We can choose to check on the status or result of the function call later.\n\
    \n- **Asynchronous Function Call**: Request that a function is called at some\
    \ time and in some manner, allowing the caller to resume and perform other activities.\n\
    \nThe function call will happen somehow and at some time, in the background, and\
    \ the program can perform other tasks or respond to other events.\n\nThis is key.\
    \ We don’t have control over how or when the request is handled, only that we\
    \ would like it handled while the program does other things.\n\nIssuing an asynchronous\
    \ function call often results in some handle on the request that the caller can\
    \ use to check on the status of the call or get results. This is often called\
    \ a future.\n\n- **Future**: A handle on an asynchronous function call allowing\
    \ the status of the call to be checked and results to be retrieved.\n\nThe combination\
    \ of the asynchronous function call and future together is often referred to as\
    \ an asynchronous task. This is because it is more elaborate than a function call,\
    \ such as allowing the request to be canceled and more.\n\n- **Asynchronous Task**:\
    \ Used to refer to the aggregate of an asynchronous function call and resulting\
    \ future.\n\nIssuing asynchronous tasks and making asynchronous function calls\
    \ is referred to as asynchronous programming.\n\n- **Asynchronous Programming**:\
    \ The use of asynchronous techniques, such as issuing asynchronous tasks or function\
    \ calls.\n\nWe now have the building blocks to consider asynchronous I/O.\n\n\
    ## What is Asynchronous I/O\n\nAsynchronous programming is primarily used with\
    \ non-blocking I/O, such as reading and writing from socket connections with other\
    \ processes or other systems.\n\nNon-blocking I/O is a way of performing I/O where\
    \ reads and writes are requested, although performed asynchronously. The caller\
    \ does not need to wait for the operation to complete before returning.\n\nThe\
    \ read and write operations are performed somehow (e.g. by the underlying operating\
    \ system or systems built upon it), and the status of the action and/or data is\
    \ retrieved by the caller later, once available, or when the caller is ready.\n\
    \n- **Non-blocking I/O**: Performing I/O operations via asynchronous requests\
    \ and responses, rather than waiting for operations to complete.\n\nAs such, we\
    \ can see how non-blocking I/O is related to asynchronous programming. In fact,\
    \ we use non-blocking I/O via asynchronous programming.\n\nThe combination of\
    \ non-blocking I/O with asynchronous programming is so common that it is referred\
    \ to by the shorthand of asynchronous I/O.\n\n- **Asynchronous I/O**: A shorthand\
    \ that refers to combining asynchronous programming with non-blocking I/O.\n\n\
    Next, let’s consider asynchronous programming support in Python.\n\n## Asynchronous\
    \ Programming in Python\n\nBroadly, asynchronous programming in Python refers\
    \ to making requests and not blocking to wait for them to complete.\n\nWe can\
    \ implement asynchronous programming in Python in various ways.\n\nThe first and\
    \ obvious example is the asyncio module.\n\nThis module directly offers an asynchronous\
    \ programming environment using the async/await syntax and non-blocking I/O with\
    \ sockets and subprocesses.\n\nIt is implemented using coroutines that run in\
    \ an event loop that itself runs in a single thread.\n\n- **Asyncio**: An asynchronous\
    \ programming environment provided in Python via the asyncio module.\n\nWe will\
    \ learn more about this module in the next section.\n\nMore broadly, Python offers\
    \ threads and processes that can execute tasks asynchronously.\n\nFor example,\
    \ one thread can start a second thread to execute a function call and resume other\
    \ activities. The operating system will schedule and execute the second thread\
    \ at some time and the first thread may or may not check on the status of the\
    \ task, manually.\n\nMore concretely, Python provides Executor-based thread pools\
    \ and process pools in the `ThreadPoolExecutor` and `ProcessPoolExecutor` classes.\n\
    \nThese classes use the same interface and support asynchronous tasks via the\
    \ `submit()` method that returns a `Future` object.\n\nThe `multiprocessing` module\
    \ also provides pools of workers using processes and threads in the `Pool` and\
    \ `ThreadPool` classes, forerunners to the `ThreadPoolExecutor` and `ProcessPoolExecutor`\
    \ classes.\n\nThe capabilities of these classes are described in terms of worker\
    \ execution tasks asynchronously. They explicitly provide synchronous (blocking)\
    \ and asynchronous (non-blocking) versions of each method for executing tasks.\n\
    \nFor example, one may issue a one-off function call synchronously via the `apply()`\
    \ method or asynchronously via the `apply_async()` method.\n\nThis highlights\
    \ that although we are focused on asynchronous programming with coroutines and\
    \ `asyncio` module, that Python provides alternate ways to develop asynchronous\
    \ programs.\n\nNow that we are familiar with coroutines and asynchronous programming,\
    \ let’s finally look at `asyncio`.\n\n## Welcome to Asyncio\n\nPython provides\
    \ coroutines as first-class objects and the asyncio module supports asynchronous\
    \ programming.\n\nAsynchronous programming in Python using coroutines and the\
    \ asyncio module is typically referred to simply as *asyncio*.\n\nNevertheless,\
    \ it is helpful to separate these concerns, at least initially, so we can better\
    \ understand them.\n\n### Coroutines in Python\n\nPython supports coroutines directly\
    \ via additions to the language, including new expressions and types.\n\nA coroutine\
    \ can be defined via the `async def` expression.\n\nThis is an extension of the\
    \ `def` expression for defining subroutines.\n\nIt defines a coroutine that can\
    \ be created and returns a coroutine object.\n\nFor example:\n\n```\n# define\
    \ a coroutine\nasync def custom_coro():\n    # ...\n```\n\nA coroutine defined\
    \ with the `async def` expression is referred to as a *coroutine function*.\n\n\
    Calling a coroutine function will return a coroutine object, which is an instance\
    \ of the `coroutine` class, a type provided in the Python language.\n\nA coroutine\
    \ can then use coroutine-specific expressions within it, such as `await`, `async\
    \ for`, and `async with`.\n\nThe await expression will suspend the calling coroutine\
    \ and schedule the specified coroutine to execute. The caller will not resume\
    \ until the specified coroutine is done.\n\nFor example:\n\n```\n# define a coroutine\n\
    async def custom_coro():\n    # await another coroutine\n    await another_coro()\n\
    ```\n\nThis was just a taste of coroutines in Python, we will learn more about\
    \ how to define, create and run coroutines in *Lesson 02: Coroutines and Tasks*.\n\
    \nNext, let’s learn more about the asyncio module.\n\n### The asyncio Module\n\
    \nPython supports asynchronous programming directly via the asyncio module.\n\n\
    The module provides utility functions and classes to assist in creating and managing\
    \ asynchronous tasks and performing non-blocking I/O with sockets and subprocesses.\n\
    \nIt also provides utility functions to simulate non-blocking tasks with blocking\
    \ I/O and CPU-bound tasks using thread pools and process pools under the covers.\n\
    \nCritically, it provides the event loop required to execute coroutines.\n\nCoroutines\
    \ can be defined and created, but they can only be executed within an event loop.\
    \ The event loop that executes coroutines, manages the cooperative multitasking\
    \ between coroutines. It is also responsible for executing callback functions\
    \ and managing the non-blocking network I/O.\n\nIn asyncio applications, we don’t\
    \ need to interact directly with the asyncio event loop, other than starting it.\
    \ Nevertheless, there is a low-level API for getting access to the event loop\
    \ object and methods for interacting with it."
  mdcn: "## 什么是异步编程\n\n在本节中，我们将探讨异步编程及其与异步 I/O 的关系。\n\n在深入异步编程之前，让我们先理解 *异步* 的含义。\n\
    \n### 什么是异步\n\n异步意味着不是同时发生，与同步或同时发生相对。\n\n在编程中，异步意味着操作被请求，但在请求时并未执行。它会在稍后执行。\n\
    \n例如，我们可以进行一次异步函数调用。\n\n这将发出函数调用的请求，并且不会等待调用完成。我们可以选择稍后检查函数调用的状态或结果。\n\n- **异步函数调用**：请求在某个时间以某种方式调用一个函数，允许调用者恢复并执行其他活动。\n\
    \n函数调用将在后台以某种方式在某个时间发生，程序可以执行其他任务或响应其他事件。\n\n这一点很关键。我们无法控制请求如何或何时被处理，只希望它在程序执行其他任务时被处理。\n\
    \n发出异步函数调用通常会产生一个请求句柄，调用者可以使用它来检查调用状态或获取结果。这通常被称为 future。\n\n- **Future**：异步函数调用的句柄，允许检查调用状态并检索结果。\n\
    \n异步函数调用和 future 的组合通常被称为异步任务。这是因为它比函数调用更复杂，例如允许取消请求等。\n\n- **异步任务**：用于指代异步函数调用和产生的\
    \ future 的聚合。\n\n发出异步任务和进行异步函数调用被称为异步编程。\n\n- **异步编程**：使用异步技术，例如发出异步任务或函数调用。\n\
    \n我们现在有了考虑异步 I/O 的基础。\n\n## 什么是异步 I/O\n\n异步编程主要用于非阻塞 I/O，例如从与其他进程或系统的套接字连接中读写。\n\
    \n非阻塞 I/O 是一种执行 I/O 的方式，其中读写操作被请求，但异步执行。调用者无需等待操作完成即可返回。\n\n读写操作以某种方式执行（例如由底层操作系统或构建在其上的系统执行），操作的状态和/或数据由调用者稍后在可用时或调用者准备好时检索。\n\
    \n- **非阻塞 I/O**：通过异步请求和响应执行 I/O 操作，而不是等待操作完成。\n\n因此，我们可以看到非阻塞 I/O 与异步编程的关系。实际上，我们通过异步编程使用非阻塞\
    \ I/O。\n\n非阻塞 I/O 与异步编程的结合非常普遍，以至于它被简称为异步 I/O。\n\n- **异步 I/O**：一个简写，指将异步编程与非阻塞\
    \ I/O 结合起来。\n\n接下来，让我们考虑 Python 中的异步编程支持。\n\n## Python 中的异步编程\n\n广义上，Python 中的异步编程指的是发出请求并阻塞等待它们完成。\n\
    \n我们可以通过多种方式在 Python 中实现异步编程。\n\n第一个也是显而易见的例子是 asyncio 模块。\n\n该模块直接提供了一个异步编程环境，使用\
    \ async/await 语法以及与套接字和子进程的非阻塞 I/O。\n\n它使用在事件循环中运行的协程实现，事件循环本身在单个线程中运行。\n\n- **Asyncio**：通过\
    \ asyncio 模块在 Python 中提供的异步编程环境。\n\n我们将在下一节中了解更多关于此模块的内容。\n\n更广泛地说，Python 提供了可以异步执行任务的线程和进程。\n\
    \n例如，一个线程可以启动第二个线程来执行函数调用并恢复其他活动。操作系统将在某个时间调度并执行第二个线程，第一个线程可能会也可能不会手动检查任务的状态。\n\
    \n更具体地说，Python 在 `ThreadPoolExecutor` 和 `ProcessPoolExecutor` 类中提供了基于 Executor\
    \ 的线程池和进程池。\n\n这些类使用相同的接口，并通过 `submit()` 方法支持异步任务，该方法返回一个 `Future` 对象。\n\n`multiprocessing`\
    \ 模块还使用 `Pool` 和 `ThreadPool` 类中的进程和线程提供了工作池，这些是 `ThreadPoolExecutor` 和 `ProcessPoolExecutor`\
    \ 类的前身。\n\n这些类的功能描述为工作异步执行任务。它们显式地提供了每个方法的同步（阻塞）和异步（非阻塞）版本来执行任务。\n\n例如，可以通过 `apply()`\
    \ 方法同步发出一次性函数调用，或通过 `apply_async()` 方法异步发出。\n\n这突出了尽管我们专注于使用协程和 asyncio 模块进行异步编程，但\
    \ Python 提供了开发异步程序的替代方式。\n\n现在我们已经熟悉了协程和异步编程，让我们最终看看 asyncio。\n\n## 欢迎使用 Asyncio\n\
    \nPython 将协程作为一等对象提供，asyncio 模块支持异步编程。\n\n使用协程和 asyncio 模块的 Python 异步编程通常简称为 *asyncio*。\n\
    \n然而，至少在最初，将这些关注点分开是有帮助的，这样我们可以更好地理解它们。\n\n### Python 中的协程\n\nPython 通过语言扩展直接支持协程，包括新的表达式和类型。\n\
    \n协程可以通过 `async def` 表达式定义。\n\n这是定义子程序的 `def` 表达式的扩展。\n\n它定义了一个可以创建并返回协程对象的协程。\n\
    \n例如：\n\n```\n# define a coroutine\nasync def custom_coro():\n    # ...\n```\n\
    \n使用 `async def` 表达式定义的协程被称为 *协程函数*。\n\n调用协程函数将返回一个协程对象，它是 `coroutine` 类的实例，这是\
    \ Python 语言中提供的一种类型。\n\n然后协程可以在其内部使用协程特定的表达式，例如 `await`、`async for` 和 `async with`。\n\
    \nawait 表达式将挂起调用协程并调度指定的协程执行。调用者将不会恢复，直到指定的协程完成。\n\n例如：\n\n```\n# define a coroutine\n\
    async def custom_coro():\n    # await another coroutine\n    await another_coro()\n\
    ```\n\n这只是 Python 中协程的一小部分，我们将在 *第 02 课：协程和任务* 中学习更多关于如何定义、创建和运行协程的内容。\n\n接下来，让我们了解更多关于\
    \ asyncio 模块的内容。\n\n### asyncio 模块\n\nPython 通过 asyncio 模块直接支持异步编程。\n\n该模块提供实用函数和类，以协助创建和管理异步任务，以及与套接字和子进程执行非阻塞\
    \ I/O。\n\n它还提供实用函数，使用线程池和进程池在底层模拟非阻塞任务与阻塞 I/O 和 CPU 密集型任务。\n\n关键的是，它提供了执行协程所需的事件循环。\n\
    \n协程可以被定义和创建，但它们只能在事件循环中执行。执行协程的事件循环管理协程之间的协作多任务。它还负责执行回调函数和管理非阻塞网络 I/O。\n\n在\
    \ asyncio 应用程序中，我们不需要直接与 asyncio 事件循环交互，除了启动它。然而，有一个低级 API 可以访问事件循环对象以及与之交互的方法。"
