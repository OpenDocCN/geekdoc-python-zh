    如果你难以想出最近可能受益于使用 asyncio 的应用程序示例，那么可以思考你可以为当前或未来项目开发的、能够充分利用异步编程的应用程序或功能。\n\n\
    这是一个有用的练习，因为它将开始训练你的大脑，让你在实践中识别何时可以以及何时不能使用这些技术。\n\n在线分享你的结果，可以在 Twitter、LinkedIn、GitHub\
    \ 或类似平台。\n\n将你的结果链接发送给我，我很想看看你的想法。\n\n你可以通过以下方式直接给我发消息：\n\n- [Super Fast Python\
    \ - 联系页面](https://SuperFastPython.com/contact/)\n\n或者在 Twitter 上通过 [@SuperFastPython](https://twitter.com/SuperFastPython)\
    \ 与我分享。\n\n## 延伸阅读\n\n本节为你提供资源，以深入了解本课涵盖的主题。\n\n- [asyncio - 异步 I/O](https://docs.python.org/3/library/asyncio.html)\n\
