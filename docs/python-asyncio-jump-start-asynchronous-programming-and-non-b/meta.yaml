    >task 1 done with 0.9577302665040541\nAll done\n```\n\n接下来，让我们看看如何等待一个协程在固定超时时间内完成。\n\
    \n## 如何为任务设置超时等待\n\n`asyncio.wait_for()` 函数允许调用者等待一个 asyncio 任务或协程在超时时间内完成。\n\n\
    如果未指定超时时间，`wait_for()` 函数将一直等待直到任务完成。\n\n如果指定了超时时间，并且在任务完成前超时时间已到，则该任务将被取消。\n\n\
    这允许调用者既设定他们愿意等待任务完成的预期时间，又能在超时时间到达时通过取消任务来强制执行超时。\n\n现在我们了解了 `asyncio.wait_for()`\
    \ 函数是什么，接下来看看如何使用它。\n\n## 如何使用 asyncio.wait_for()\n\n`asyncio.wait_for()` 函数接受一个可等待对象和一个超时时间。\n\
    \n可等待对象可以是协程或任务。\n\n必须指定超时时间，可以是 `None`（表示无超时）、整数或浮点数（表示秒数）。\n\n`wait_for()` 函数返回一个协程，该协程在被显式等待或作为任务调度之前不会执行。\n\
    \n例如：\n\n```\n...\n# 等待任务完成\nawait asyncio.wait_for(coro, timeout=10)\n```\n\n\
    如果提供的是协程，它将在 `wait_for()` 协程执行时被转换为任务。\n\n如果在任务完成前超时时间已到，任务将被取消，并引发 `asyncio.TimeoutError`\
    \ 异常，这可能需要处理。\n\n例如：\n\n```\n...\n# 执行一个带超时的任务\ntry:\n    # 等待任务完成\n    await\
    \ asyncio.wait_for(coro, timeout=1)\nexcept asyncio.TimeoutError:\n    # ...\n\
    ```\n\n如果等待的任务因未处理的异常而失败，该异常将传播回等待 `wait_for()` 协程的调用者，在这种情况下可能需要处理。\n\n例如：\n\n\
    ```\n...\n# 执行一个可能失败的任务\ntry:\n    # 等待任务完成\n    await asyncio.wait_for(coro,\
    \ timeout=1)\nexcept asyncio.TimeoutError:\n    # ...\nexcept Exception:\n   \
    \ # ...\n```\n\n现在我们了解了 `wait_for()` 函数的工作原理，接下来看一个实际示例。\n\n## 等待任务超时的示例\n\n我们可以探索如何等待一个协程，其超时时间在任务完成前就已到期。\n\
    \n在此示例中，我们执行一个协程，但调用者等待固定的超时时间 0.2 秒或 200 毫秒。\n\n回想一下，一秒等于 1,000 毫秒。\n\n任务协程被修改为休眠超过一秒，确保超时时间总是在任务完成前到期。\n\
    \n完整示例如下。\n\n```\n# SuperFastPython.com\n# 等待协程超时的示例\nfrom random import random\n\
    import asyncio\n\n# 在新任务中执行的协程\nasync def task_coro():\n    # 生成一个 1 到 2 之间的随机值\n\
    \    value = 1 + random()\n    # 报告消息\n    print(f'>task got {value}')\n    #\
    \ 休眠片刻\n    await asyncio.sleep(value)\n    # 报告全部完成\n    print('>task done')\n\
    \n# 主协程\nasync def main():\n    # 创建一个任务\n    task = task_coro()\n    # 执行并等待任务，不设超时\n\
    \    try:\n        await asyncio.wait_for(task, timeout=0.2)\n    except asyncio.TimeoutError:\n\
    \        print('Gave up waiting, task canceled')\n\n# 启动 asyncio 程序\nasyncio.run(main())\n\
    ```\n\n运行示例首先会创建 `main()` 协程，并将其作为 asyncio 程序的入口点。\n\n`main()` 协程创建任务协程。然后调用 `wait_for()`，传递任务协程并将超时时间设置为\
    \ 0.2 秒。\n\n`main()` 协程被挂起，`task_coro()` 开始执行。它报告一条消息并休眠片刻。\n\n超时时间到期后，`main()`\
    \ 协程恢复执行。`wait_for()` 协程取消了 `task_coro()` 协程，`main()` 协程被挂起。\n\n`task_coro()`\
    \ 再次运行并响应终止请求。它引发 `TimeoutError` 异常并终止。\n\n`main()` 协程恢复执行并处理 `task_coro()` 引发的\
    \ `TimeoutError`。\n\n这重点展示了如何调用 `wait_for()` 函数并设置超时时间，以及如何在任务未在超时时间内完成时取消任务。\n\
    \n**注意：** 由于使用了随机数，每次运行程序的结果都会有所不同。\n\n```\n>task got 1.4231068884240894\nGave\
    \ up waiting, task canceled\n```\n\n接下来，让我们看看如何按完成顺序处理协程结果。\n\n## 如何按完成顺序处理任务\n\
    \n`asyncio.as_completed()` 函数将并发运行一组任务和协程。\n\n更重要的是，它返回一个可迭代对象，我们可以用它来按完成顺序检索可等待对象。\n\
    \n它允许我们并发执行许多协程或任务，并在任务完成时获取结果，而不是按照我们发出任务的顺序。\n\n现在我们了解了 `as_completed()` 是什么，接下来看看如何使用它。\n\
    \n## 如何使用 asyncio.as_completed()\n\n`asyncio.as_completed()` 函数通过一个可等待对象集合来调用。\n\
    \n这可以是列表、字典或集合，可以包含 `asyncio.Task` 对象、协程或其他可等待对象。\n\n任何提供给 `as_completed()` 的协程都将被包装在\
    \ `Task` 对象中以独立执行。\n\n它返回一个可迭代对象，遍历时将按提供列表的顺序生成可等待对象。调用者可以按顺序等待这些对象，以便按任务完成的顺序获取结果，例如从下一个完成的任务获取结果。\n\
    \n例如：\n\n```\n...\n# 遍历可等待对象\nfor task in asyncio.as_completed(tasks):\n    #\
    \ 获取下一个结果\n    result = await task\n```\n\n`as_completed()` 函数还接受一个 `timeout`\
    \ 参数。\n\n这指定了调用者愿意等待所有可等待对象完成的时间。\n\n例如：\n\n```\n...\n# 带超时遍历可等待对象\nfor task in\
    \ asyncio.as_completed(tasks, timeout=10):\n    # 获取下一个结果\n    result = await\
    \ task\n```\n\n如果在所有可等待对象完成前超时时间已到，将引发 `asyncio.TimeoutError` 异常，这可能需要处理。\n\n\
    例如，我们可以在循环内处理它：\n\n```\n...\n# 带超时遍历可等待对象\nfor task in asyncio.as_completed(tasks,\
    \ timeout=10):\n    # 处理超时\n    try:\n        # 获取下一个结果\n        result = await\
    \ task\n    except asyncio.TimeoutError:\n        # ...\n```\n\n这并不理想，因为一旦超时时间到期，每次在生成器上调用\
    \ `next()` 时都会引发 `asyncio.TimeoutError`。\n\n因此，最好将整个循环包装在 try-except 表达式中。\n\n\
    例如：\n\n```\n...\n# 处理超时\ntry:\n    # 带超时遍历可等待对象\n    for task in asyncio.as_completed(tasks,\
    \ timeout=10):\n        # 获取下一个结果\n        result = await task\n```"
