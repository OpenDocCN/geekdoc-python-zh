  md: '# # What is Asynchronous Programming


    In this section, we will discover asynchronous programming and how it relates
    to asynchronous I/O.


    Before we dive into asynchronous programming, let’s understand what *asynchronous*
    means.


    # ## What is Asynchronous


    Asynchronous means not at the same time, as opposed to synchronous or at the same
    time.


    When programming, asynchronous means that the action is requested, although not
    performed at the time of the request. It is performed later.


    For example, we can make an asynchronous function call.


    This will issue the request to make the function call and will not wait around
    for the call to complete. We can choose to check on the status or result of the
    function call later.


    +   - **Asynchronous Function Call**: Request that a function is called at some
    time and in some manner, allowing the caller to resume and perform other activities.


    The function call will happen somehow and at some time, in the background, and
    the program can perform other tasks or respond to other events.


    This is key. We don’t have control over how or when the request is handled, only
    that we would like it handled while the program does other things.


    Issuing an asynchronous function call often results in some handle on the request
    that the caller can use to check on the status of the call or get results. This
    is often called a future.


    +   - **Future**: A handle on an asynchronous function call allowing the status'
  merge: -1
  pgno: 25
- img_proc: true
  md: 'of the call to be checked and results to be retrieved.


    The combination of the asynchronous function call and future together is often
    referred to as an asynchronous task. This is because it is more elaborate than
    a function call, such as allowing the request to be canceled and more.


    +   - **Asynchronous Task**: Used to refer to the aggregate of an asynchronous
    function call and resulting future.


    Issuing asynchronous tasks and making asynchronous function calls is referred
    to as asynchronous programming.


    +   - **Asynchronous Programming**: The use of asynchronous techniques, such as
    issuing asynchronous tasks or function calls.


    We now have the building blocks to consider asynchronous I/O.


    # What is Asynchronous I/O


    Asynchronous programming is primarily used with non-blocking I/O, such as reading
    and writing from socket connections with other processes or other systems.


    Non-blocking I/O is a way of performing I/O where reads and writes are requested,
    although performed asynchronously. The caller does not need to wait for the operation
    to complete before returning.


    The read and write operations are performed somehow (e.g. by the underlying operating
    system or systems built upon it), and the status of the action and/or data is
    retrieved by the caller later, once available, or when the caller is ready.


    +   - **Non-blocking I/O**: Performing I/O operations via asynchronous requests
    and responses, rather than waiting for operations to complete.


    As such, we can see how non-blocking I/O is related to asynchronous programming.
    In fact, we use non-blocking I/O via asynchronous programming.'
