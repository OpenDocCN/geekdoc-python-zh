  - '[PAGE 146]


    # How to Run Commands in Subprocesses


    The asyncio module provides an API for running commands on the underlying system
    asynchronously.


    Commands can be called directly or executed via the user’s shell and will execute
    in a subprocess.


    Asyncio programs can then control the command running in a subprocess by asynchronously
    reading data from the subprocess, asynchronously writing data to subprocess, and
    killing the subprocess if need be.


    Before we explore how to run commands as subprocesses, let’s review a command,
    the shell, and why we want to execute commands a subprocesses.


    # What is a Command and a Shell


    A command is a program executed on the command line (terminal or command prompt).
    It is another program that is run directly.


    Common examples on Linux and macOS are:


    +   - ls to list the contents of a directory.

    - cat to report the content of a file.

    - date to report the date.

    - echo to report back a string.

    - sleep to sleep for a number of seconds.


    And so on.


    These are just programs that we can execute on the command line as a command.


    We may want to execute a command from our program for many reasons.


    For example:'
- md: "## How to Run a Command in a Subprocess\n\nWe may want to change the permissions\
    \ of a file or change a system configuration.\n- We may want to run a program\
    \ to check the status of a resource or value of a system property.\n- We may want\
    \ to start another program in the background or for the user to interact with.\n\
    \nMany actions performed by external commands may be executed directly by Python\
    \ using the standard library API or a third-party library. Sometimes it can be\
    \ easier to simply run a purpose-made command directly on the operating system.\n\
    \nWe can execute these commands using the shell.\n\nThe shell is a user interface\
    \ for the command line, called a command line interpreter.\n\nIt will interpret\
    \ and execute commands on behalf of the user.\n\nIt also offers features such\
    \ as a primitive programming language for scripting, wildcards, piping, shell\
    \ variables (e.g. PATH), and more.\n\nFor example, we can redirect the output\
    \ of one command as input to another command, such as the contents of the /etc/services\
    \ file into the word count wc command and count the number of lines:\n\n```\n\
    cat /etc/services | wc -l\n```\n\nExamples of shells on Unix-based operating systems\
    \ include:\n\n- sh\n- bash\n- zsh\n- And so on.\n\nOn Windows, the shell is probably\
    \ cmd.exe.\n\nThe shell is already running, it was probably used to start the\
    \ Python program. We don’t need to do anything special to get or have access to\
    \ the shell.\n\nNext, let’s look at how we can run commands from asyncio as subprocesses.\n\
    \nThere are two ways to execute an external program as a subprocess in asyncio,\
    \ they are:\n\n- With asyncio.create_subprocess_exec()\n- With asyncio.create_subprocess_shell()\n\
    \nBoth functions return an asyncio.subprocess.Process object that represents the\
    \ command running in a subprocess.\n\nThe Process object provides a handle on\
    \ a subprocess in asyncio programs, allowing actions to be performed on it, such\
    \ as waiting and terminating it.\n\nLet’s take a closer look at each of these\
    \ functions in turn.\n\n## How to Run a Command Directly\n\nThe asyncio.create_subprocess_exec()\
    \ function can be called to execute a command in a subprocess.\n\nIt returns a\
    \ Process object as a handle on the subprocess.\n\nThe create_subprocess_exec()\
    \ function is a coroutine and must be awaited. It will suspend the caller until\
    \ the subprocess is started (not completed).\n\nFor example:\n\n```\n...\n# run\
    \ a command in a subprocess\nprocess = await asyncio.create_subprocess_exec(\n\
    \    'echo', 'Hello World')\n```\n\nWe can configure the subprocess to receive\
    \ input from the asyncio program or send output to the asyncio program by setting\
    \ the stdin, stdout, and stderr arguments to the asyncio.subprocess.PIPE constant.\n\
    \nThis will set the stdin, stdout, and stderr arguments on the asyncio.subprocess.Process\
    \ to be a StreamReader or StreamWriter and allow coroutines to read or write from\
    \ them via the communicate() method in the Process object, which we will explore\
    \ further later.\n\nFor example:\n\n```\n...\n# run a command in a subprocess\n\
    process = await asyncio.create_subprocess_exec(\n    'echo', 'Hello World',\n\
    \    stdout=asyncio.subprocess.PIPE)\n```\n\nWe can explore how to get a Process\
    \ instance by executing a command in a subprocess with the create_subprocess_exec()\
    \ function.\n\nThe example below executes the echo command in a subprocess that\
    \ prints out the provided string.\n\nThe subprocess is started, then the details\
    \ of the subprocess are then reported.\n\nThe complete example is listed below.\n\
    \n```\n# SuperFastPython.com\n# example of running a command in a subprocess directly\n\
    import asyncio\n\n# main coroutine\nasync def main():\n    # run the command in\
    \ a subprocess\n    process = await asyncio.create_subprocess_exec(\n        'echo',\
    \ 'Hello World')\n    # report the details of the subprocess\n    print(f'subprocess:\
    \ {process}')\n\n# entry point\nasyncio.run(main())\n```\n\nRunning the example\
    \ executes the echo command in a subprocess.\n\nA asyncio.subprocess.Process instance\
    \ is returned and the details are reported, showing the unique process id (PID).\n\
    \nThe echo command then reports the provided string on stdout.\n\n```\nsubprocess:\
    \ <Process 50598>\nHello World\n```\n\nNext, let’s look at an example of creating\
    \ a subprocess via the shell.\n\n## How to Run a Command via the Shell\n\nThe\
    \ asyncio.create_subprocess_shell() function can be called to execute a command\
    \ in a subprocess.\n\nThe create_subprocess_shell() function will execute the\
    \ provided command indirectly via the shell. This is the command line interpreter\
    \ used to execute commands on the system, such as bash or zsh on Linux and macOS\
    \ or cmd.exe on Windows.\n\nExecuting a command via the shell allows the capabilities\
    \ of the shell to be used in addition to executing the command, such as wildcards\
    \ and shell variables.\n\nThe function returns a asyncio.subprocess.Process as\
    \ a handle on the subprocess.\n\nThe create_subprocess_shell() function is a coroutine\
    \ and must be awaited. It will suspend the caller until the subprocess is started\
    \ (not completed).\n\nWe can explore how to get a Process instance by executing\
    \ a command in a subprocess with the create_subprocess_shell() function.\n\nThe\
    \ example below executes the echo command in a subprocess that prints out the\
    \ provided string. Unlike the create_subprocess_exec() function, the entire command\
    \ with arguments is provided as a single string.\n\nThe subprocess is started,\
    \ then the details of the subprocess are then reported.\n\nThe complete example\
    \ is listed below.\n\n```\n# SuperFastPython.com\n# example of running a cmd in\
    \ a subprocess via the shell\nimport asyncio\n\n# main coroutine\nasync def main():\n\
    \    # run the command via shell in a subprocess\n    process = await asyncio.create_subprocess_shell(\n\
    \        'echo Hello World')\n    # report the details of the subprocess\n   \
    \ print(f'subprocess: {process}')\n\n# entry point\nasyncio.run(main())\n```\n\
    \nRunning the example executes the echo command in a subprocess.\n\nA asyncio.subprocess.Process\
    \ instance is returned and the details are reported, showing the unique process\
    \ id (PID).\n\nThe echo command then reports the provided string on stdout.\n\n\
    ```\nsubprocess: <Process 51822>\nHello World\n```\n\nNext, let’s look at how\
    \ we can wait for a subprocess to complete.\n\n## How to Wait for a Subprocess\n\
    \nWe can wait for a subprocess to complete via the `wait()` method.\n\nThis is\
    \ a coroutine that must be awaited.\n\nThe caller will be suspended until the\
    \ subprocess is terminated, normally or otherwise.\n\nIf the subprocess is expecting\
    \ input and is configured to receive input from our asyncio program via a pipe,\
    \ then calling `wait()` can cause a deadlock as the caller cannot provide input\
    \ to the subprocess if it is suspended.\n\nFor example:\n\n```\n...\n# run a command\
    \ in a subprocess\nprocess = await asyncio.create_subprocess_shell(\n    'sleep\
    \ 3')\n# wait for the subprocess to terminate\nawait process.wait()\n```\n\nNext,\
    \ let’s look at how we can read and write data from a subprocess.\n\n## How to\
    \ Read and Write Data with a Subprocess\n\nWe can read data from a subprocess\
    \ in asyncio via the `communicate()` method.\n\nReading data from the subprocess\
    \ requires that the `stdout` or `stderr` arguments of the `create_subprocess_shell()`\
    \ or `create_subprocess_exec()` functions was set to the `PIPE` constant.\n\n\
    No argument is provided and the method returns a tuple with input from `stdout`\
    \ and `stderr`. Data is read until an end-of-file (EOF) character is received.\n\
    \nThe `communicate()` method is a coroutine and must be awaited.\n\nFor example:\n\
    \n```\n...\n# run a command in a subprocess\nprocess = await asyncio.create_subprocess_shell(\n\
    \    'echo Hello World', stdout=asyncio.subprocess.PIPE)\n# read data from the\
    \ subprocess\ndata, _ = await process.communicate()\n```\n\nIf no data can be\
    \ read, the call will suspend until the subprocess has terminated.\n\nWe can write\
    \ data to the subprocess from an asyncio coroutine also via the communicate()\
    \ method. Data is provided via the input argument as bytes.\n\nWriting data to\
    \ the subprocess via the communicate() method requires that the stdin argument\
    \ in the create_subprocess_shell() or create_subprocess_exec() functions were\
    \ set to the PIPE constant.\n\nFor example:\n\n```\n...\n# run a command in a\
    \ subprocess\nprocess = await asyncio.create_subprocess_exec(\n    'cat', stdin=asyncio.subprocess.PIPE)\n\
    # write data to the subprocess\n_ = await process.communicate(b'Hello World\\\
    n')\n```\n\nNext, let’s look at how we can stop a command running in a subprocess.\n\
    \n## How to Terminate and Kill a Subprocess\n\nWe can stop a subprocess via the\
    \ terminate() method.\n\nOn most platforms, this sends a SIGTERM signal to the\
    \ subprocess and terminates it immediately.\n\nFor example:\n\n```\n...\n# terminate\
    \ the subprocess\nprocess.terminate()\n```\n\nWe can also kill a subprocess via\
    \ the kill() method.\n\nOn most platforms, this will send the SIGKILL signal to\
    \ the subprocess in order to stop it immediately.\n\nUnlike the terminate() method\
    \ that sends the SIGTERM signal, the SIGKILL signal cannot be handled by the subprocess.\
    \ This means it is assured to stop."
  mdcn: "## 如何在子进程中运行命令\n\n我们可能需要更改文件权限或系统配置。\n- 我们可能需要运行程序来检查资源状态或系统属性值。\n- 我们可能需要在后台启动另一个程序，或让用户与之交互。\n\
    \n许多由外部命令执行的操作，都可以通过Python标准库API或第三方库直接实现。但有时，直接在操作系统上运行专门设计的命令会更简单。\n\n我们可以使用shell来执行这些命令。\n\
    \nshell是命令行的用户界面，也称为命令行解释器。\n\n它将代表用户解释并执行命令。\n\n它还提供了诸如用于脚本编写的原始编程语言、通配符、管道、shell变量（例如PATH）等功能。\n\
    \n例如，我们可以将一个命令的输出重定向为另一个命令的输入，比如将`/etc/services`文件的内容输入到字数统计命令`wc`中，以统计行数：\n\n\
    ```\ncat /etc/services | wc -l\n```\n\n基于Unix操作系统的shell示例包括：\n\n- sh\n- bash\n\
    - zsh\n- 等等。\n\n在Windows上，shell可能是`cmd.exe`。\n\nshell已经在运行了，它可能就是用来启动Python程序的那个。我们不需要做任何特殊的事情来获取或访问shell。\n\
    \n接下来，让我们看看如何从asyncio中以子进程的方式运行命令。\n\n在asyncio中，有两种方式可以将外部程序作为子进程执行：\n\n- 使用`asyncio.create_subprocess_exec()`\n\
    - 使用`asyncio.create_subprocess_shell()`\n\n这两个函数都返回一个`asyncio.subprocess.Process`对象，该对象代表在子进程中运行的命令。\n\
    \n`Process`对象为asyncio程序中的子进程提供了一个句柄，允许对其执行操作，例如等待和终止它。\n\n让我们依次仔细看看这两个函数。\n\n\
    ## 如何直接运行命令\n\n可以调用`asyncio.create_subprocess_exec()`函数在子进程中执行命令。\n\n它返回一个`Process`对象作为子进程的句柄。\n\
    \n`create_subprocess_exec()`函数是一个协程，必须被await。它将挂起调用者，直到子进程启动（而不是完成）。\n\n例如：\n\n\
    ```\n...\n# 在子进程中运行一个命令\nprocess = await asyncio.create_subprocess_exec(\n   \
    \ 'echo', 'Hello World')\n```\n\n我们可以通过将`stdin`、`stdout`和`stderr`参数设置为`asyncio.subprocess.PIPE`常量，来配置子进程从asyncio程序接收输入或向asyncio程序发送输出。\n\
    \n这将把`asyncio.subprocess.Process`上的`stdin`、`stdout`和`stderr`参数设置为`StreamReader`或`StreamWriter`，并允许协程通过`Process`对象中的`communicate()`方法从中读取或写入数据，我们稍后将进一步探讨这一点。\n\
    \n例如：\n\n```\n...\n# 在子进程中运行一个命令\nprocess = await asyncio.create_subprocess_exec(\n\
    \    'echo', 'Hello World',\n    stdout=asyncio.subprocess.PIPE)\n```\n\n我们可以探索如何通过使用`create_subprocess_exec()`函数在子进程中执行命令来获取`Process`实例。\n\
    \n下面的示例在子进程中执行`echo`命令，该命令打印出提供的字符串。\n\n子进程启动后，会报告子进程的详细信息。\n\n完整示例如下：\n\n```\n\
    # SuperFastPython.com\n# 直接在子进程中运行命令的示例\nimport asyncio\n\n# 主协程\nasync def main():\n\
    \    # 在子进程中运行命令\n    process = await asyncio.create_subprocess_exec(\n      \
    \  'echo', 'Hello World')\n    # 报告子进程的详细信息\n    print(f'subprocess: {process}')\n\
    \n# 入口点\nasyncio.run(main())\n```\n\n运行该示例会在子进程中执行`echo`命令。\n\n返回一个`asyncio.subprocess.Process`实例并报告其详细信息，显示唯一的进程ID（PID）。\n\
    \n然后`echo`命令在标准输出上报告提供的字符串。\n\n```\nsubprocess: <Process 50598>\nHello World\n\
    ```\n\n接下来，让我们看看通过shell创建子进程的示例。\n\n## 如何通过Shell运行命令\n\n可以调用`asyncio.create_subprocess_shell()`函数在子进程中执行命令。\n\
    \n`create_subprocess_shell()`函数将通过shell间接执行提供的命令。这是用于在系统上执行命令的命令行解释器，例如Linux和macOS上的bash或zsh，或Windows上的cmd.exe。\n\
    \n通过shell执行命令，除了执行命令本身外，还可以利用shell的功能，例如通配符和shell变量。\n\n该函数返回一个`asyncio.subprocess.Process`作为子进程的句柄。\n\
    \n`create_subprocess_shell()`函数是一个协程，必须被await。它将挂起调用者，直到子进程启动（而不是完成）。\n\n我们可以探索如何通过使用`create_subprocess_shell()`函数在子进程中执行命令来获取`Process`实例。\n\
    \n下面的示例在子进程中执行`echo`命令，该命令打印出提供的字符串。与`create_subprocess_exec()`函数不同，整个命令及其参数作为单个字符串提供。\n\
    \n子进程启动后，会报告子进程的详细信息。\n\n完整示例如下：\n\n```\n# SuperFastPython.com\n# 通过shell在子进程中运行命令的示例\n\
    import asyncio\n\n# 主协程\nasync def main():\n    # 通过shell在子进程中运行命令\n    process\
    \ = await asyncio.create_subprocess_shell(\n        'echo Hello World')\n    #\
    \ 报告子进程的详细信息\n    print(f'subprocess: {process}')\n\n# 入口点\nasyncio.run(main())\n\
    ```\n\n运行该示例会在子进程中执行`echo`命令。\n\n返回一个`asyncio.subprocess.Process`实例并报告其详细信息，显示唯一的进程ID（PID）。\n\
    \n然后`echo`命令在标准输出上报告提供的字符串。\n\n```\nsubprocess: <Process 51822>\nHello World\n\
    ```\n\n接下来，让我们看看如何等待子进程完成。\n\n## 如何等待子进程\n\n我们可以通过`wait()`方法等待子进程完成。\n\n这是一个必须被await的协程。\n\
    \n调用者将被挂起，直到子进程终止，无论是正常终止还是其他方式。\n\n如果子进程期望输入，并且配置为通过管道从我们的asyncio程序接收输入，那么调用`wait()`可能会导致死锁，因为如果调用者被挂起，它就无法向子进程提供输入。\n\
    \n例如：\n\n```\n...\n# 在子进程中运行一个命令\nprocess = await asyncio.create_subprocess_shell(\n\
    \    'sleep 3')\n# 等待子进程终止\nawait process.wait()\n```\n\n接下来，让我们看看如何从子进程读取和写入数据。\n\
    \n## 如何与子进程进行数据读写\n\n我们可以通过`communicate()`方法从asyncio中的子进程读取数据。\n\n从子进程读取数据要求`create_subprocess_shell()`或`create_subprocess_exec()`函数的`stdout`或`stderr`参数被设置为`PIPE`常量。\n\
    \n该方法不提供参数，并返回一个包含来自`stdout`和`stderr`输入的元组。数据将被读取，直到收到文件结束符（EOF）。\n\n`communicate()`方法是一个协程，必须被await。\n\
    \n例如：\n\n```\n...\n# 在子进程中运行一个命令\nprocess = await asyncio.create_subprocess_shell(\n\
    \    'echo Hello World', stdout=asyncio.subprocess.PIPE)\n# 从子进程读取数据\ndata, _\
    \ = await process.communicate()\n```\n\n如果没有数据可读，调用将挂起，直到子进程终止。\n\n我们也可以通过`communicate()`方法从asyncio协程向子进程写入数据。数据通过`input`参数以字节形式提供。\n\
    \n通过`communicate()`方法向子进程写入数据，要求`create_subprocess_shell()`或`create_subprocess_exec()`函数中的`stdin`参数被设置为`PIPE`常量。\n\
    \n例如：\n\n```\n...\n# 在子进程中运行一个命令\nprocess = await asyncio.create_subprocess_exec(\n\
    \    'cat', stdin=asyncio.subprocess.PIPE)\n# 向子进程写入数据\n_ = await process.communicate(b'Hello\
    \ World\\n')\n```\n\n接下来，让我们看看如何停止在子进程中运行的命令。\n\n## 如何终止和杀死子进程\n\n我们可以通过`terminate()`方法停止子进程。\n\
    \n在大多数平台上，这会向子进程发送`SIGTERM`信号并立即终止它。\n\n例如：\n\n```\n...\n# 终止子进程\nprocess.terminate()\n\
    ```\n\n我们也可以通过`kill()`方法杀死子进程。\n\n在大多数平台上，这会向子进程发送`SIGKILL`信号以立即停止它。\n\n与发送`SIGTERM`信号的`terminate()`方法不同，`SIGKILL`信号不能被子进程处理。这意味着它保证能停止子进程。"
