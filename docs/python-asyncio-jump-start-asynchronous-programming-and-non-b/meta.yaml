- img_proc: true
  md: 'Modern thread pools in the concurrent.futures module support asynchronous ad
    hoc tasks using both threads and processes. This provides an alternative way of
    adding elements of asynchronous programming, without adopting coroutines.


    A mistake is to think that asyncio is going to make the program faster than thread
    or processes, or that coroutines cannot suffer race conditions or deadlocks. Both
    of these notions are false.


    Downloading webpages or querying open ports is just as fast with concurrent threads
    as concurrent coroutines in one thread.


    Code must be made coroutine-safe when using coroutine-based concurrency, just
    like it must be made thread-safe when using threads and process-safe when using
    process-based concurrency. There is no escape from these concepts when using concurrent
    programming.


    Another mistake is to think that asyncio makes concurrent programming easy.


    Concurrent programming is always hard, regardless of the unit of concurrency or
    programming paradigm.


    Coroutines can make code easier to read. The coroutine definitions look and read
    like functions. But the challenges of good design and safety in concurrent programming
    do not go just by changing the unit of concurrency, we described previously.


    In fact, the adoption of asynchronous programming may introduce new and different
    challenges.'
