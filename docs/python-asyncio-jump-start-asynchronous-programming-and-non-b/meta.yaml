  - '[PAGE 147]


    +   - We may want to change the permissions of a file or change a system configuration.

    - We may want to run a program to check the status of a resource or value of a
    system property.

    - We may want to start another program in the background or for the user to interact
    with.


    Many actions performed by external commands may be executed directly by Python
    using the standard library API or a third-party library. Sometimes it can be easier
    to simply run a purpose-made command directly on the operating system.


    We can execute these commands using the shell.


    The shell is a user interface for the command line, called a command line interpreter.


    It will interpret and execute commands on behalf of the user.


    It also offers features such as a primitive programming language for scripting,
    wildcards, piping, shell variables (e.g. PATH), and more.


    For example, we can redirect the output of one command as input to another command,
    such as the contents of the /etc/services file into the word count wc command
    and count the number of lines:


    ```

    cat /etc/services | wc -l

    ```


    Examples of shells on Unix-based operating systems include:


    +   - sh

    - bash

    - zsh

    - And so on.


    On Windows, the shell is probably cmd.exe.


    The shell is already running, it was probably used to start the Python program.
    We don’t need to do anything special to get or have access to the'
