    - [Develop an Asyncio Port Scanner](Develop an Asyncio Port Scanner)\n- [How to\
    \ Open a Socket Connection on a Port](How to Open a Socket Connection on a Port)\n\
    - [How to Scan a Range of Ports on a Server (slow)](How to Scan a Range of Ports\
    \ on a Server (slow))\n- [How to Scan Ports Concurrently (fast)](How to Scan Ports\
    \ Concurrently (fast))\n- [How to Report Scan Results Dynamically](How to Report\
    \ Scan Results Dynamically)\n- [Lesson Review](Lesson Review)\n\n## Conclusions\n\
    \n- [Look Back At How Far You’ve Come](Look Back At How Far You’ve Come)\n- [Resources\
    \ For Diving Deeper](Resources For Diving Deeper)\n- [Getting More Help](Getting\
    \ More Help)\n\n## About the Author\n\n## Python Concurrency Jump-Start Series\n\
    \n# Python Asyncio Jump-Start\n\n**Praise for *SuperFastPython***\n\n> “I’m reading\
    \ this article now, and it is really well made (simple, concise but comprehensive).\
    \ Thank you for the effort! Tech industry is going forward thanks also by people\
    \ like you that diffuse knowledge.”\n\n– **Gabriele Berselli**, Python Developer.\n\
    \n> “I enjoy your postings and intuitive writeups - keep up the good work”\n\n\
    – **Martin Gay**, Quantitative Developer at Lacima Group.\n\n> “Great work. I\
    \ always enjoy reading your knowledge based articles”\n\n– **Janath Manohararaj**,\
    \ Director of Engineering.\n\n> “Great as always!!!”\n\n– **Jadranko Belusic**,\
    \ Software Developer at Crossvallia.\n\n> “Thank you for sharing your knowledge.\
    \ Your tutorials are one of the best I’ve read in years. Unfortunately, most authors,\
    \ try to prove how clever they are and fail to educate. Yours are very much different.\
    \ I love the simplicity of the examples on which more complex scenarios can be\
    \ built on, but, the most important aspect in my opinion, they are easy to understand.\
    \ Thank you again for all the time and effort spent on creating these tutorials.”\n\
    \n– **Marius Rusu**, Python Developer.\n\n> “Thanks for putting out excellent\
    \ content Jason Brownlee, tis much appreciated”\n\n– **Bilal B.**, Senior Data\
    \ Engineer.\n\n> “Thank you for sharing. I’ve learnt a lot from your tutorials,\
    \ and, I am still doing, thank you so much again. I wish you all the best.”\n\n\
    – **Sehaba Amine**, Research Intern at LIRIS.\n\n> “Wish I had this tutorial 7\
    \ yrs ago when I did my first multithreading software. Awesome Jason”\n\n– **Leon\
    \ Marusa**, Big Data Solutions Project Leader at Elektro Celje.\n\n> “This is\
    \ awesome”\n\n– **Subhayan Ghosh**, Azure Data Engineer at Mercedes-Benz R&D.\n\
    \n# Copyright\n\n© Copyright 2022 Jason Brownlee. All Rights Reserved.\n\n# Disclaimer\n\
    \nThe information contained within this book is strictly for educational purposes.\
    \ If you wish to apply ideas contained in this book, you are taking full responsibility\
    \ for your actions.\n\nThe author has made every effort to ensure the accuracy\
    \ of the information within this book was correct at time of publication. The\
    \ author does not assume and hereby disclaims any liability to any party for any\
    \ loss, damage, or disruption caused by errors or omissions, whether such errors\
    \ or omissions result from accident, negligence, or any other cause.\n\nNo part\
    \ of this book may be reproduced or transmitted in any form or by any means, electronic\
    \ or mechanical, recording or by any information storage and retrieval system,\
    \ without written permission from the author.\n\n# Preface\n\nPython concurrency\
    \ is deeply misunderstood.\n\nOpinions vary from “*Python does not support concurrency*”\
    \ to “*Python concurrency is buggy*”.\n\nI created the website SuperFastPython.com\
    \ to directly counter these misunderstandings.\n\nAsyncio is a new, important,\
    \ and exciting addition to Python.\n\nBroadly, asyncio refers to changes to the\
    \ Python language to support coroutines, and the asyncio module that provides\
    \ an API for developing and running programs using coroutines with an asynchronous\
    \ programming style.\n\nAsyncio was added specifically to support non-blocking\
    \ I/O with socket connections. Combined with asynchronous programming, this is\
    \ typically referred to as asynchronous I/O.\n\nUsing asyncio, we can develop\
    \ programs that exceed the scalability of threads, allowing tens or hundreds of\
    \ thousands of concurrent streams. This capability can be used to develop client-side\
    \ or server-side programs that access a vast number of concurrent TCP socket connections,\
    \ perhaps to servers, websites, game servers, databases, and more.\n\nThis guide\
    \ was carefully designed to help Python developers (*like you*) to get productive\
    \ with asyncio as fast as possible. After completing all seven lessons, you will\
    \ know how to bring coroutine-based concurrency with the asyncio module API to\
    \ your own projects, super fast.\n\nTogether, we can make Python code run faster\
    \ and change the community’s opinions about Python concurrency.\n\nThank you for\
    \ letting me guide you along this path."
