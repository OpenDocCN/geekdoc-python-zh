    ## 如何将多个任务作为一组运行\n\n`asyncio.gather()` 函数允许调用者将多个可等待对象组合在一起，并让它们并发执行。\n\n在我们预先创建许多任务或协程，然后希望一次性执行它们并等待它们全部完成再继续的情况下，我们可能会使用\
