    \ 3156 - 重启异步 I/O 支持：asyncio 模块](https://peps.python.org/pep-3156/)\n- [异步 I/O，维基百科](https://en.wikipedia.org/wiki/Asynchronous_I/O)\n\
    - [Async/await，维基百科](https://en.wikipedia.org/wiki/Async/await)\n- [协程，维基百科](https://en.wikipedia.org/wiki/Coroutine)\n\
    - [协作式多任务，维基百科](https://en.wikipedia.org/wiki/Cooperative_multitasking)\n\n##\
    \ 下一课\n\n在下一课中，我们将进一步探讨如何定义协程，以及如何创建、调度和查询异步任务。\n\n# 第 02 课：协程与任务\n\n在本课中，我们将探讨如何在\
    \ asyncio 程序中创建和使用协程与任务。这些是 asyncio 程序中的主要并发单元，可以被挂起、恢复、取消等。\n\n完成本课后，你将了解：\n\n\
    - 如何使用 `async` 和 `await` 表达式定义、创建和运行协程。\n- 如何将协程创建并调度为一个独立的任务。\n- 如何查询 asyncio\
    \ 任务的状态、获取结果以及检查异常。\n- 如何取消 asyncio 任务并添加完成回调函数。\n\n让我们开始吧。\n\n## 如何创建和运行协程\n\n\
    协程是一种可以被挂起和恢复的函数。\n\nPython 为并发提供了协程。\n\n它们主要通过两种方式提供：\n\n- 通过语言的特定扩展，例如 `async`\
    \ 和 `await` 表达式。\n- 通过标准库中的特定模块，例如 `asyncio` 模块。\n\n让我们探讨如何创建和使用协程。\n\n## 如何定义协程\n\
    \n协程可以通过 `async def` 表达式来定义。\n\n这是对定义子程序的 `def` 表达式的扩展。\n\n它定义了一个可以被创建并返回协程对象的协程。\n\
    \n例如：\n\n```\n# 定义一个协程\nasync def custom_coro():\n    # ...\n```\n\n使用 `async\
    \ def` 表达式定义的协程被称为协程函数。\n\n协程函数可以像普通函数一样接受参数并返回值。\n\n另一个关键区别是它可以使用特殊的协程表达式，例如\
    \ `await`、`async for` 和 `async with`。\n\n我们将在接下来的部分中很快看到 `await` 表达式。我们将在 *第 04\
    \ 课：迭代器、生成器和上下文管理器* 中学习 `async for` 和 `async with` 表达式。\n\n接下来，让我们看看如何创建协程。\n\n\
    ## 如何创建协程\n\n一旦定义了协程，就可以创建它。\n\n这看起来像调用一个子程序。\n\n例如：\n\n```\n...\n# 创建一个协程\ncoro\
    \ = custom_coro()\n```\n\n这并不会执行协程。\n\n它返回一个协程对象。\n\n协程对象有方法，例如 `send()` 和 `close()`。它是一种类型。\n\
    \n我们可以通过创建一个协程实例并调用内置函数 `type()` 来报告其类型来演示这一点。\n\n例如：\n\n```\n# SuperFastPython.com\n\
    # 检查协程类型的示例\n\n# 定义一个协程\nasync def custom_coro():\n    # 什么都不做\n    pass\n\n#\
    \ 创建协程\ncoro = custom_coro()\n# 检查协程的类型\nprint(type(coro))\n```\n\n运行该示例会报告创建的协程是一个协程类。\n\
    \n协程对象是可等待的。\n\n这意味着它是一种实现了 `__await__()` 方法的类型。\n\n我们还会得到一个 `RuntimeError`，因为协程被创建但从未执行，我们将在下一节中探讨这一点。\n\
    \n```\n<class 'coroutine'>\nsys:1: RuntimeWarning: coroutine '...' was never awaited\n\
    ```\n\n接下来，让我们看看如何运行协程。\n\n## 如何运行协程\n\n协程可以被定义和创建，但它们只能在事件循环中执行。\n\n执行协程的事件循环管理着协程之间的协作式多任务。\n\
    \n启动协程事件循环的典型方式是通过 `asyncio.run()` 函数。\n\n该函数接受一个协程并返回协程的值。提供的协程可以用作基于协程程序的入口点。\n\
    \n例如：\n\n```\n...\n# 创建协程\ncoro = custom_coroutine()\n# 启动事件循环并执行协程\nasyncio.run(coro)\n\
    ```\n\n执行协程的这种方法通常在一行中完成。\n\n例如：\n\n```\n...\n# 启动事件循环并执行协程\nasyncio.run(custom_coroutine())\n\
    ```\n\n这将启动 asyncio 运行时（称为事件循环）并执行协程。\n\n这是启动 asyncio 应用程序的主要方式。\n\n例如：\n\n```\n\
    # SuperFastPython.com\n# 运行协程的示例\nimport asyncio\n\n# 主协程\nasync def main():\n\
    \    # 报告一条消息\n    print('Hello from a coroutine')\n\n# 启动协程程序\nasyncio.run(main())\n\
    ```\n\n运行该示例会创建 `main()` 协程并将协程对象传递给 `run()` 函数。\n\n然后 `run()` 函数启动 asyncio 事件循环并调度\
    \ `main()` 协程。\n\n`main()` 协程执行并报告一条消息。\n\n协程终止。没有更多的协程需要执行，因此事件循环终止。\n\n```\n\
    Hello from a coroutine\n```\n\n接下来，让我们看看如何等待一个协程。"
