    \ result\n        result = await task\n```"
- md: "## How Does asyncio.as_completed() Work\n\nThe function works by providing\
    \ a generator that yields coroutines, where each coroutine will return a result\
    \ of a provided awaitable.\n\nThe asyncio.as_completed() function does not suspend,\
    \ but instead returns a generator.\n\nFor example:\n\n```\n...\n# get a gen that\
    \ yields awaitables in completion order\ngenerator = asyncio.as_completed(tasks)\n\
    ```\n\nCalling the next() built-in function on the generator does not suspend,\
    \ but instead yields a coroutine.\n\nThe returned coroutine is not one of the\
    \ provided awaitables, but rather an internal coroutine from the as_completed()\
    \ function that manages and monitors which issued task will return a result next.\n\
    \nFor example:\n\n```\n...\n# get the next coroutine\ncoro = next(generator)\n\
    ```\n\nIt is not until one of the returned coroutines is awaited that the caller\
    \ will suspend.\n\nFor example:\n\n```\n...\n# get a result from the next task\
    \ to complete\nresult = await coro\n```\n\nNow that we have an idea of how to\
    \ use the as_completed() function and how it works, let’s look at a worked example.\n\
    \n## Example of Handling Task Results Dynamically\n\nWe can explore how to execute\
    \ coroutines concurrently and get coroutine results as tasks are completed with\
    \ the asyncio.as_completed() function.\n\nIn this example, we will define a simple\
    \ coroutine task that takes an integer argument, generates a random value, sleeps\
    \ for a fraction of a second then returns the integer argument multiplied by the\
    \ generated value.\n\nA list of the task coroutines is created and passed to the\
    \ as_completed() function. This returns a generator that is traversed using a\
    \ for-loop.\n\nIn each iteration of the loop a coroutine is yielded from the generator\
    \ and is then awaited in the body of the loop. A result from the next coroutine\
    \ to complete is returned and the result is reported.\n\nThe complete example\
    \ is listed below.\n\n```\n# SuperFastPython.com\n# example of getting coroutine\
    \ results as completed\nfrom random import random\nimport asyncio\n\n# coroutine\
    \ to execute in a new task\nasync def task_coro(arg):\n    # generate a random\
    \ value between 0 and 1\n    value = random()\n    # suspend for a moment\n  \
    \  await asyncio.sleep(value)\n    # return the result\n    return arg * value\n\
    \n# main coroutine\nasync def main():\n    # create many coroutines\n    coros\
    \ = [task_coro(i) for i in range(10)]\n    # get results as coroutines are completed\n\
    \    for coro in asyncio.as_completed(coros):\n        # get the result from the\
    \ next task to complete\n        result = await coro\n        # report the result\n\
    \        print(f'>got {result}')\n\n# start the asyncio program\nasyncio.run(main())\n\
    ```\n\nRunning the example first creates the `main()` coroutine and then uses\
    \ this as the entry point into the asyncio program.\n\nThe `main()` coroutine\
    \ runs and creates a list of coroutines.\n\nIt then passes this list to the `as_completed()`\
    \ function which returns a generator. The generator is traversed in a for loop\
    \ and each iteration yields a coroutine.\n\nThe coroutine is awaited. This suspends\
    \ the `main()` coroutine.\n\nThe tasks begin executing, generating a random value,\
    \ and sleeping. A task finishes and returns a value.\n\nThe `main()` coroutine\
    \ resumes, receives the return value, and reports it.\n\nThe loop repeats, another\
    \ coroutine is yielded, the `main()` coroutine awaits it and suspends, and another\
    \ result is returned.\n\nThis continues until all coroutines in the provided list\
    \ are completed.\n\nThis example highlights that we can traverse a collection\
    \ of coroutines and get and use results in the order that tasks are completed.\n\
    \n**NOTE:** Results will vary each time the program is run given the use of random\
    \ numbers.\n\n```\n>got 0.07236962530232949\n>got 0.5171864910147306\n>got 0.7153626682953872\n\
    >got 2.54812333824902\n>got 0.5960648114598495\n>got 5.051883987489034\n>got 0.0\n\
    >got 2.842043340472799\n>got 6.343694133393031\n>got 4.903128525746293\n```\n\n\
    Next, let’s look at how we can call blocking functions without blocking the asyncio\
    \ event loop.\n\n## How to Run Blocking Tasks\n\nWe can execute thread-blocking\
    \ function calls in asyncio using the asyncio.to_thread() function.\n\nIt will\
    \ take a function call and execute it in a new thread, separate from the thread\
    \ that is executing the asyncio event loop.\n\nIt allows the asyncio event loop\
    \ to treat a blocking function call as a coroutine and execute asynchronously\
    \ using thread-based concurrency instead of coroutine-based concurrency.\n\nThe\
    \ asyncio.to_thread() function is specifically designed to execute blocking I/O\
    \ functions, not CPU-bound functions that can also block the asyncio event loop.\n\
    \nThis is a useful function to use when we have an asyncio program that needs\
    \ to perform both non-blocking I/O (such as with sockets) and blocking I/O (such\
    \ as with files or a legacy API).\n\nNow that we know how to execute blocking\
    \ functions asynchronously in asyncio, let’s look at how to use the to_thread()\
    \ function.\n\n## How to Use asyncio.to_thread()\n\nThe to_thread() function takes\
    \ the name of a blocking function to execute and any arguments to the function.\n\
    \nIt then returns a coroutine that can be awaited to get the return value from\
    \ the function, if any.\n\nFor example:\n\n```\n...\n# create a coroutine for\
    \ a blocking function\nblocking_coro = asyncio.to_thread(blocking, arg1, arg2)\n\
    # await the coroutine and get return value\nresult = await blocking_coro\n```\n\
    \nThe blocking function will not be executed in a new thread until it is awaited\
    \ or executed independently.\n\nThe coroutine can be wrapped in an asyncio.Task\
    \ to execute the blocking function call independently.\n\nFor example:\n\n```\n\
    ...\n# create a coroutine for a blocking function\nblocking_coro = asyncio.to_thread(blocking)\n\
    # execute the blocking function independently\ntask = asyncio.create_task(blocking_coro)\n\
    ```\n\nThis allows the blocking function call to be used like any other asyncio\
    \ Task.\n\nNow that we know how to use the asyncio.to_thread() function, let’s\
    \ look at a worked example.\n\n## Example of Running a Blocking Function in a\
    \ Thread\n\nWe can explore how to execute the blocking call in a new thread and\
    \ not stop the event loop.\n\nIn the example below we call asyncio.to_thread()\
    \ to create a coroutine for the call to the blocking_task() function.\n\nThis\
    \ coroutine is then awaited allowing the main coroutine to suspend and for the\
    \ blocking function to execute in a new thread.\n\nThe complete example is listed\
    \ below.\n\n```\n# SuperFastPython.com\n# example of running a blocking call in\
    \ a new thread\nimport time\nimport asyncio\n\n# blocking function\ndef blocking_task():\n\
    \    # report a message\n    print('task is running')\n    # block the thread\n\
    \    time.sleep(2)\n    # report a message\n    print('task is done')\n\n# background\
    \ coroutine task\nasync def background():\n    # loop forever\n    while True:\n\
    \        # report a message\n        print('>background task running')\n     \
    \   # sleep for a moment\n        await asyncio.sleep(0.5)\n\n# main coroutine\n\
    async def main():\n    # run the background task\n    _ = asyncio.create_task(background())\n\
    \    # create a coroutine for the blocking function call\n    coro = asyncio.to_thread(blocking_task)\n\
    \    # make call in a new thread and await the result\n    await coro\n\n# start\
    \ the asyncio program\nasyncio.run(main())\n```\n\nRunning the example first creates\
    \ the `main()` coroutine and uses it as the entry point into the asyncio program.\n\
    \nThe `main()` coroutine runs. It creates the background coroutine and schedules\
    \ it for execution as soon as it can.\n\nThe `main()` coroutine then creates a\
    \ coroutine to run the background task in a new thread and then awaits this coroutine.\n\
    \nThis does a couple of things.\n\nFirstly, it suspends the `main()` coroutine,\
    \ allowing any other coroutines in the event loop to run, such as the new coroutine\
    \ for executing the blocking function in a new thread.\n\nThe new coroutine runs\
    \ and starts a new thread and executes the blocking function in the new thread.\
    \ This coroutine was also suspended.\n\nThe event loop is free and the background\
    \ coroutine gets an opportunity to run, looping and reporting its messages.\n\n\
    The blocking call in the other thread finishes, suspends the background task,\
    \ resumes the main thread, and terminates the program.\n\nThis highlights that\
    \ running a blocking call in a new thread does not block the event loop, allowing\
    \ other coroutines to run while the blocking call is being executed, suspending\
    \ some threads other than the main event loop thread.\n\n```\ntask is running\n\
    >background task running\n>background task running\n>background task running\n\
    >background task running\ntask is done\n```"
  mdcn: "## asyncio.as_completed() 的工作原理\n\n该函数通过提供一个生成器来工作，该生成器产出协程，每个协程将返回一个提供的可等待对象的结果。\n\
    \nasyncio.as_completed() 函数不会挂起，而是返回一个生成器。\n\n例如：\n\n```\n...\n# 获取一个按完成顺序产出可等待对象的生成器\n\
    generator = asyncio.as_completed(tasks)\n```\n\n对生成器调用内置函数 `next()` 不会挂起，而是产出一个协程。\n\
    \n返回的协程并非提供的可等待对象之一，而是 `as_completed()` 函数的一个内部协程，它负责管理和监控哪个已发出的任务将下一个返回结果。\n\n\
    例如：\n\n```\n...\n# 获取下一个协程\ncoro = next(generator)\n```\n\n只有当返回的协程之一被等待时，调用者才会挂起。\n\
    \n例如：\n\n```\n...\n# 从下一个完成的任务获取结果\nresult = await coro\n```\n\n现在我们已经了解了如何使用\
    \ `as_completed()` 函数及其工作原理，让我们来看一个实际示例。\n\n## 动态处理任务结果的示例\n\n我们可以探索如何使用 `asyncio.as_completed()`\
    \ 函数并发执行协程，并在任务完成时获取协程结果。\n\n在这个示例中，我们将定义一个简单的协程任务，它接受一个整数参数，生成一个随机值，休眠一小段时间，然后返回整数参数乘以生成的值。\n\
    \n任务协程的列表被创建并传递给 `as_completed()` 函数。该函数返回一个生成器，使用 for 循环遍历。\n\n在循环的每次迭代中，从生成器产出一个协程，然后在循环体中等待它。返回下一个完成的协程的结果，并报告该结果。\n\
    \n完整示例如下。\n\n```\n# SuperFastPython.com\n# 获取协程完成时结果的示例\nfrom random import random\n\
    import asyncio\n\n# 在新任务中执行的协程\nasync def task_coro(arg):\n    # 生成一个介于 0 和 1\
    \ 之间的随机值\n    value = random()\n    # 暂停片刻\n    await asyncio.sleep(value)\n \
    \   # 返回结果\n    return arg * value\n\n# 主协程\nasync def main():\n    # 创建多个协程\n\
    \    coros = [task_coro(i) for i in range(10)]\n    # 在协程完成时获取结果\n    for coro\
    \ in asyncio.as_completed(coros):\n        # 从下一个完成的任务获取结果\n        result = await\
    \ coro\n        # 报告结果\n        print(f'>got {result}')\n\n# 启动 asyncio 程序\nasyncio.run(main())\n\
    ```\n\n运行该示例首先创建 `main()` 协程，然后将其用作 asyncio 程序的入口点。\n\n`main()` 协程运行并创建一个协程列表。\n\
    \n然后将此列表传递给 `as_completed()` 函数，该函数返回一个生成器。生成器在 for 循环中遍历，每次迭代产出一个协程。\n\n协程被等待。这会挂起\
    \ `main()` 协程。\n\n任务开始执行，生成一个随机值，并休眠。一个任务完成并返回一个值。\n\n`main()` 协程恢复，接收返回值，并报告它。\n\
    \n循环重复，另一个协程被产出，`main()` 协程等待它并挂起，然后返回另一个结果。\n\n此过程持续进行，直到提供的列表中的所有协程完成。\n\n此示例突出显示，我们可以遍历协程集合，并按任务完成的顺序获取和使用结果。\n\
    \n**注意：** 由于使用了随机数，每次运行程序的结果都会有所不同。\n\n```\n>got 0.07236962530232949\n>got 0.5171864910147306\n\
    >got 0.7153626682953872\n>got 2.54812333824902\n>got 0.5960648114598495\n>got\
    \ 5.051883987489034\n>got 0.0\n>got 2.842043340472799\n>got 6.343694133393031\n\
    >got 4.903128525746293\n```\n\n接下来，让我们看看如何在不阻塞 asyncio 事件循环的情况下调用阻塞函数。\n\n## 如何运行阻塞任务\n\
    \n我们可以使用 `asyncio.to_thread()` 函数在 asyncio 中执行线程阻塞的函数调用。\n\n它将接受一个函数调用并在一个新线程中执行它，该线程与执行\
    \ asyncio 事件循环的线程分开。\n\n它允许 asyncio 事件循环将阻塞函数调用视为协程，并使用基于线程的并发性异步执行，而不是基于协程的并发性。\n\
    \n`asyncio.to_thread()` 函数专门设计用于执行阻塞 I/O 函数，而不是也可能阻塞 asyncio 事件循环的 CPU 密集型函数。\n\
    \n当我们有一个 asyncio 程序需要同时执行非阻塞 I/O（例如使用套接字）和阻塞 I/O（例如使用文件或遗留 API）时，这是一个有用的函数。\n\n\
    现在我们知道如何在 asyncio 中异步执行阻塞函数，让我们看看如何使用 `to_thread()` 函数。\n\n## 如何使用 asyncio.to_thread()\n\
    \n`to_thread()` 函数接受要执行的阻塞函数的名称以及该函数的任何参数。\n\n然后返回一个协程，可以等待它以获取函数的返回值（如果有）。\n\n\
    例如：\n\n```\n...\n# 为阻塞函数创建一个协程\nblocking_coro = asyncio.to_thread(blocking, arg1,\
    \ arg2)\n# 等待协程并获取返回值\nresult = await blocking_coro\n```\n\n阻塞函数在被等待或独立执行之前不会在新线程中执行。\n\
    \n协程可以包装在 `asyncio.Task` 中，以独立执行阻塞函数调用。\n\n例如：\n\n```\n...\n# 为阻塞函数创建一个协程\nblocking_coro\
    \ = asyncio.to_thread(blocking)\n# 独立执行阻塞函数\ntask = asyncio.create_task(blocking_coro)\n\
    ```\n\n这允许阻塞函数调用像任何其他 asyncio Task 一样使用。\n\n现在我们知道如何使用 `asyncio.to_thread()` 函数，让我们来看一个实际示例。\n\
    \n## 在线程中运行阻塞函数的示例\n\n我们可以探索如何在新线程中执行阻塞调用而不停止事件循环。\n\n在下面的示例中，我们调用 `asyncio.to_thread()`\
    \ 为调用 `blocking_task()` 函数创建一个协程。\n\n然后等待此协程，允许主协程挂起，并在新线程中执行阻塞函数。\n\n完整示例如下。\n\
    \n```\n# SuperFastPython.com\n# 在新线程中运行阻塞调用的示例\nimport time\nimport asyncio\n\n\
    # 阻塞函数\ndef blocking_task():\n    # 报告消息\n    print('task is running')\n    #\
    \ 阻塞线程\n    time.sleep(2)\n    # 报告消息\n    print('task is done')\n\n# 后台协程任务\n\
    async def background():\n    # 无限循环\n    while True:\n        # 报告消息\n       \
    \ print('>background task running')\n        # 暂停片刻\n        await asyncio.sleep(0.5)\n\
    \n# 主协程\nasync def main():\n    # 运行后台任务\n    _ = asyncio.create_task(background())\n\
    \    # 为阻塞函数调用创建一个协程\n    coro = asyncio.to_thread(blocking_task)\n    # 在新线程中进行调用并等待结果\n\
    \    await coro\n\n# 启动 asyncio 程序\nasyncio.run(main())\n```\n\n运行该示例首先创建 `main()`\
    \ 协程，并将其用作 asyncio 程序的入口点。\n\n`main()` 协程运行。它创建后台协程并安排它尽快执行。\n\n然后 `main()` 协程创建一个协程以在新线程中运行后台任务，然后等待此协程。\n\
    \n这做了几件事。\n\n首先，它挂起 `main()` 协程，允许事件循环中的任何其他协程运行，例如在新线程中执行阻塞函数的新协程。\n\n新协程运行并启动一个新线程，并在新线程中执行阻塞函数。此协程也被挂起。\n\
    \n事件循环空闲，后台协程有机会运行，循环并报告其消息。\n\n另一个线程中的阻塞调用完成，挂起后台任务，恢复主线程，并终止程序。\n\n这突出了在新线程中运行阻塞调用不会阻塞事件循环，允许其他协程在阻塞调用执行时运行，同时挂起除主事件循环线程之外的某些线程。\n\
    \n```\ntask is running\n>background task running\n>background task running\n>background\
    \ task running\n>background task running\ntask is done\n```"
