    \ Asyncio Semaphore"
- md: "We can explore how to use a asyncio.Semaphore with a worked example.\n\nIn\
    \ this example, we will start a suite of coroutines but limit the number that\
    \ can perform an action simultaneously. A semaphore will be used to limit the\
    \ number of concurrent tasks that may execute which will be less than the total\
    \ number of coroutines, allowing some coroutines to suspend, wait for access,\
    \ then be notified and acquire access.\n\nThe complete example is listed below.\n\
    \n```python\n# SuperFastPython.com\n# example of using an asyncio semaphore\n\
    from random import random\nimport asyncio\n\n# task coroutine\nasync def task(semaphore,\
    \ number):\n    # acquire the semaphore\n    async with semaphore:\n        #\
    \ generate a random value between 0 and 1\n        value = random()\n        #\
    \ suspend for a moment\n        await asyncio.sleep(value)\n        # report a\
    \ message\n        print(f'Task {number} got {value}')\n\n# main coroutine\nasync\
    \ def main():\n    # create the shared semaphore\n    semaphore = asyncio.Semaphore(2)\n\
    \    # create and schedule tasks\n    tasks = [asyncio.create_task(task(semaphore,\
    \ i))\n        for i in range(10)]\n    # wait for all tasks to complete\n   \
    \ _ = await asyncio.wait(tasks)\n\n# start the asyncio program\nasyncio.run(main())\n\
    ```\n\nRunning the example first creates the main() coroutine that is used as\
    \ the entry point into the asyncio program.\n\nThe main() coroutine runs and first\
    \ creates the shared semaphore with an initial counter value of 2, meaning that\
    \ two coroutines can hold the semaphore at once.\n\nThe main() coroutine then\
    \ creates and schedules 10 tasks to execute our task() coroutine, passing the\
    \ shared semaphore and a unique number between 0 and 9.\n\nThe main() coroutine\
    \ then suspends and waits for all tasks to complete.\n\nThe tasks run one at a\
    \ time.\n\nEach task first attempts to acquire the semaphore. If there is a position\
    \ available it proceeds, otherwise it waits for a position to become available.\n\
    \nOnce acquired, a task generates a random value, suspend for a moment, and then\
    \ reports the generated value. It then releases the semaphore and terminates.\
    \ The semaphore is not released while the task is suspended in the call to asyncio.sleep().\n\
    \nThe body of the semaphore context manager is limited to two semaphores at a\
    \ time.\n\nThis highlights how we can limit the number of coroutines to execute\
    \ a block of code concurrently.\n\n**NOTE:** Results will vary each time the program\
    \ is run given the use of random numbers.\n\n```\nTask 0 got 0.20369168197618748\n\
    Task 2 got 0.20640107131350838\nTask 1 got 0.6855263719449817\nTask 3 got 0.9396433586858612\n\
    Task 4 got 0.8039832235015294\nTask 6 got 0.12266060196253203\nTask 5 got 0.879466225105295\n\
    Task 7 got 0.6675244153844875\nTask 8 got 0.11511060306129695\nTask 9 got 0.9607702805925814\n\
    ```\n\nNext, let’s look at how to use events in asyncio programs.\n\n## How to\
    \ Signal Between Coroutines Using an Event\n\nAn event is a coroutine-safe boolean\
    \ flag that can be used to signal between two or more coroutines.\n\nIt can be\
    \ useful to coordinate the behavior of many coroutines that can check the status\
    \ of the flag, such as to begin processing, or to stop processing and exit.\n\n\
    Next, let’s look at how to create and use events.\n\n## How to Use an Asyncio\
    \ Event\n\nPython provides an event object for coroutines via the asyncio.Event\
    \ class.\n\nAn Event class wraps a boolean variable that can either be set (True)\
    \ or not set (False). Coroutines sharing the Event object can check if the event\
    \ is set, set the event, clear the event (make it not set), or wait for the event\
    \ to be set.\n\nThe Event provides an easy way to share a boolean variable between\
    \ coroutines that can act as a trigger for an action.\n\nFirst, an Event object\
    \ must be created and the event will be in the not set state.\n\n```python\n...\n\
    # create an instance of an event\nevent = asyncio.Event()\n```\n\nOnce created\
    \ we can check if the event has been set via the is_set() method which will return\
    \ True if the event is set, or False otherwise.\n\nFor example:\n\n```python\n\
    ...\n# check if the event is set\nif event.is_set():\n    # do something...\n\
    ```\n\nThe Event can be set via the set() method. Any coroutines waiting on the\
    \ event to be set will be notified.\n\nFor example:\n\n```python\n...\n# set the\
    \ event\nevent.set()\n```\n\nFinally, coroutines can wait for the event to be\
    \ set via the wait() method, which must be awaited. Calling this method will suspend\
    \ until the event is marked as set (e.g. another coroutine calling the set() method).\
    \ If the event is already set, the wait() method will return immediately.\n\n\
    ```python\n...\n# wait for the event to be set\nawait event.wait()\n```\n\nNow\
    \ that we know to use events, let’s look at a worked example.\n\n## Example of\
    \ Using an Asyncio Event\n\nWe can explore how to use an asyncio.Event object.\n\
    \nIn this example we will create a suite of coroutines that each will perform\
    \ some work and report a message. All coroutines will use an event to wait to\
    \ be set before starting their work. The main coroutine will set the event and\
    \ trigger the new coroutines to start work.\n\n```python\n# SuperFastPython.com\n\
    # example of using an asyncio event object\nfrom random import random\nimport\
    \ asyncio\n\n# task coroutine\nasync def task(event, number):\n    # wait for\
    \ the event to be set\n    await event.wait()\n    # generate a random value between\
    \ 0 and 1\n    value = random()\n    # suspend for a moment\n    await asyncio.sleep(value)\n\
    \    # report a message\n    print(f'Task {number} got {value}')\n\n# main coroutine\n\
    async def main():\n    # create a shared event object\n    event = asyncio.Event()\n\
    \    # create and run the tasks\n    tasks = [asyncio.create_task(task(event,\
    \ i))\n        for i in range(5)]\n    # allow the tasks to start\n    print('Main\
    \ suspending...')\n    await asyncio.sleep(0)\n    # start processing in all tasks\n\
    \    print('Main setting the event')\n    event.set()\n    # await for all tasks\
    \ to terminate\n    _ = await asyncio.wait(tasks)\n\n# run the asyncio program\n\
    asyncio.run(main())\n```\n\nRunning the example first creates the main() coroutine\
    \ and uses it as the entry point into the asyncio program.\n\nThe main() coroutine\
    \ runs and creates and schedules five task coroutines.\n\nIt then sleeps, suspending\
    \ and allowing the tasks to run and start waiting on the event.\n\nThe main coroutine\
    \ resumes, reports a message then sets the event to True. It then suspends and\
    \ waits for all issued tasks to complete.\n\nThis triggers all five coroutines.\
    \ They resume in turn perform their processing and report a message.\n\nThis highlights\
    \ how coroutines can wait for an event to be set and how we can notify coroutines\
    \ using an event.\n\n**NOTE:** Results will vary each time the program is run\
    \ given the use of random numbers.\n\n```\nMain suspending...\nMain setting the\
    \ event\nTask 3 got 0.36705703414223256\nTask 1 got 0.4852630342496812\nTask 0\
    \ got 0.7251916806567016\nTask 4 got 0.8104350284043036\nTask 2 got 0.9726611709531982\n\
    ```\n\nNext, let’s look at how we can use condition variables in asyncio programs.\n\
    \n## How to Coordinate Using a Condition Variable\n\nA condition variable, also\
    \ called a monitor, allows multiple coroutines to wait and be notified about some\
    \ result.\n\nA condition can be acquired by a coroutine after which it can wait\
    \ to be notified by another coroutine that something has changed. While waiting,\
    \ the coroutine is suspended and releases the lock on the condition for other\
    \ coroutines to acquire.\n\nAnother coroutine can then acquire the condition,\
    \ make a change in the program, and notify one, all, or a subset of coroutines\
    \ waiting on the condition that something has changed.\n\nThe waiting coroutine\
    \ can then resume, re-acquire the condition, perform checks on any changed state\
    \ and perform required actions.\n\nNext, let’s look at how we can create and use\
    \ condition variables.\n\n## How to Use an Asyncio Condition\n\nPython provides\
    \ a condition variable via the `asyncio.Condition` class.\n\nFor example:\n\n\
    ```python\n...\n# create a new condition variable\ncondition = asyncio.Condition()\n\
    ```\n\nIn order for a coroutine to make use of the `Condition`, it must acquire\
    \ it and release it, like a mutex lock.\n\nThis can be achieved manually with\
    \ the `acquire()` and `release()` methods. The `acquire()` method is a coroutine\
    \ and must be awaited.\n\nFor example, we can acquire the `Condition` and then\
    \ wait on the condition to be notified and finally release the condition as follows:"
  mdcn: "我们可以通过一个实际示例来探讨如何使用 `asyncio.Semaphore`。\n\n在这个示例中，我们将启动一组协程，但限制同时执行操作的数量。我们将使用信号量来限制可并发执行的任务数量，该数量将小于协程总数，从而允许一些协程挂起、等待访问权限，然后被通知并获取访问权限。\n\
    \n完整示例如下：\n\n```python\n# SuperFastPython.com\n# 使用 asyncio 信号量的示例\nfrom random\
    \ import random\nimport asyncio\n\n# 任务协程\nasync def task(semaphore, number):\n\
    \    # 获取信号量\n    async with semaphore:\n        # 生成一个 0 到 1 之间的随机值\n       \
    \ value = random()\n        # 挂起片刻\n        await asyncio.sleep(value)\n     \
    \   # 报告消息\n        print(f'Task {number} got {value}')\n\n# 主协程\nasync def main():\n\
    \    # 创建共享的信号量\n    semaphore = asyncio.Semaphore(2)\n    # 创建并调度任务\n    tasks\
    \ = [asyncio.create_task(task(semaphore, i))\n        for i in range(10)]\n  \
    \  # 等待所有任务完成\n    _ = await asyncio.wait(tasks)\n\n# 启动 asyncio 程序\nasyncio.run(main())\n\
    ```\n\n运行该示例首先会创建 `main()` 协程，它作为 asyncio 程序的入口点。\n\n`main()` 协程运行并首先创建一个初始计数器值为\
    \ 2 的共享信号量，这意味着一次可以有两个协程持有该信号量。\n\n然后，`main()` 协程创建并调度 10 个任务来执行我们的 `task()` 协程，传递共享信号量和一个\
    \ 0 到 9 之间的唯一编号。\n\n接着，`main()` 协程挂起并等待所有任务完成。\n\n任务一次运行一个。\n\n每个任务首先尝试获取信号量。如果有空位，它就继续执行；否则，它会等待空位出现。\n\
    \n一旦获取到信号量，任务会生成一个随机值，挂起片刻，然后报告生成的值。随后，它释放信号量并终止。在任务挂起于 `asyncio.sleep()` 调用期间，信号量不会被释放。\n\
    \n信号量上下文管理器的主体一次仅限于两个信号量。\n\n这突显了我们如何限制并发执行代码块的协程数量。\n\n**注意：** 由于使用了随机数，每次运行程序的结果都会有所不同。\n\
    \n```\nTask 0 got 0.20369168197618748\nTask 2 got 0.20640107131350838\nTask 1\
    \ got 0.6855263719449817\nTask 3 got 0.9396433586858612\nTask 4 got 0.8039832235015294\n\
    Task 6 got 0.12266060196253203\nTask 5 got 0.879466225105295\nTask 7 got 0.6675244153844875\n\
    Task 8 got 0.11511060306129695\nTask 9 got 0.9607702805925814\n```\n\n接下来，让我们看看如何在\
    \ asyncio 程序中使用事件。\n\n## 如何使用事件在协程之间发送信号\n\n事件是一个协程安全的布尔标志，可用于在两个或多个协程之间发送信号。\n\
    \n它对于协调许多协程的行为非常有用，这些协程可以检查标志的状态，例如开始处理，或停止处理并退出。\n\n接下来，让我们看看如何创建和使用事件。\n\n##\
    \ 如何使用 Asyncio 事件\n\nPython 通过 `asyncio.Event` 类为协程提供了事件对象。\n\n`Event` 类封装了一个布尔变量，该变量可以被设置（True）或未设置（False）。共享\
    \ `Event` 对象的协程可以检查事件是否已设置、设置事件、清除事件（使其未设置）或等待事件被设置。\n\n事件提供了一种简单的方式在协程之间共享布尔变量，该变量可以作为操作的触发器。\n\
    \n首先，必须创建一个 `Event` 对象，事件将处于未设置状态。\n\n```python\n...\n# 创建一个事件实例\nevent = asyncio.Event()\n\
    ```\n\n创建后，我们可以通过 `is_set()` 方法检查事件是否已设置，如果事件已设置则返回 `True`，否则返回 `False`。\n\n例如：\n\
    \n```python\n...\n# 检查事件是否已设置\nif event.is_set():\n    # 执行某些操作...\n```\n\n事件可以通过\
    \ `set()` 方法进行设置。任何等待事件设置的协程都将被通知。\n\n例如：\n\n```python\n...\n# 设置事件\nevent.set()\n\
    ```\n\n最后，协程可以通过 `wait()` 方法等待事件被设置，该方法必须被 `await`。调用此方法将挂起，直到事件被标记为已设置（例如，另一个协程调用\
    \ `set()` 方法）。如果事件已经设置，`wait()` 方法将立即返回。\n\n```python\n...\n# 等待事件被设置\nawait event.wait()\n\
    ```\n\n现在我们知道了如何使用事件，让我们看一个实际示例。\n\n## 使用 Asyncio 事件的示例\n\n我们可以探讨如何使用 `asyncio.Event`\
    \ 对象。\n\n在这个示例中，我们将创建一组协程，每个协程将执行一些工作并报告消息。所有协程都将使用一个事件，在开始工作前等待其被设置。主协程将设置事件并触发新协程开始工作。\n\
    \n```python\n# SuperFastPython.com\n# 使用 asyncio 事件对象的示例\nfrom random import random\n\
    import asyncio\n\n# 任务协程\nasync def task(event, number):\n    # 等待事件被设置\n    await\
    \ event.wait()\n    # 生成一个 0 到 1 之间的随机值\n    value = random()\n    # 挂起片刻\n  \
    \  await asyncio.sleep(value)\n    # 报告消息\n    print(f'Task {number} got {value}')\n\
    \n# 主协程\nasync def main():\n    # 创建一个共享的事件对象\n    event = asyncio.Event()\n \
    \   # 创建并运行任务\n    tasks = [asyncio.create_task(task(event, i))\n        for i\
    \ in range(5)]\n    # 允许任务开始\n    print('Main suspending...')\n    await asyncio.sleep(0)\n\
    \    # 在所有任务中开始处理\n    print('Main setting the event')\n    event.set()\n    #\
    \ 等待所有任务终止\n    _ = await asyncio.wait(tasks)\n\n# 运行 asyncio 程序\nasyncio.run(main())\n\
    ```\n\n运行该示例首先会创建 `main()` 协程，并将其用作 asyncio 程序的入口点。\n\n`main()` 协程运行并创建并调度五个任务协程。\n\
    \n然后它休眠，挂起并允许任务运行并开始等待事件。\n\n主协程恢复，报告消息，然后将事件设置为 `True`。接着它挂起并等待所有已发出的任务完成。\n\n\
    这触发了所有五个协程。它们依次恢复，执行处理并报告消息。\n\n这突显了协程如何等待事件被设置，以及我们如何使用事件通知协程。\n\n**注意：** 由于使用了随机数，每次运行程序的结果都会有所不同。\n\
    \n```\nMain suspending...\nMain setting the event\nTask 3 got 0.36705703414223256\n\
    Task 1 got 0.4852630342496812\nTask 0 got 0.7251916806567016\nTask 4 got 0.8104350284043036\n\
    Task 2 got 0.9726611709531982\n```\n\n接下来，让我们看看如何在 asyncio 程序中使用条件变量。\n\n## 如何使用条件变量进行协调\n\
    \n条件变量，也称为监视器，允许多个协程等待并接收关于某些结果的通知。\n\n协程可以获取条件，然后等待另一个协程通知某些内容已更改。在等待期间，协程被挂起并释放条件上的锁，以便其他协程可以获取。\n\
    \n然后，另一个协程可以获取条件，在程序中进行更改，并通知一个、所有或等待条件的协程子集某些内容已更改。\n\n等待的协程随后可以恢复，重新获取条件，对任何更改的状态进行检查并执行所需的操作。\n\
    \n接下来，让我们看看如何创建和使用条件变量。\n\n## 如何使用 Asyncio 条件\n\nPython 通过 `asyncio.Condition`\
    \ 类提供条件变量。\n\n例如：\n\n```python\n...\n# 创建一个新的条件变量\ncondition = asyncio.Condition()\n\
    ```\n\n为了使协程能够使用 `Condition`，它必须获取并释放它，就像互斥锁一样。\n\n这可以通过 `acquire()` 和 `release()`\
    \ 方法手动实现。`acquire()` 方法是一个协程，必须被 `await`。\n\n例如，我们可以获取 `Condition`，然后等待条件被通知，最后释放条件，如下所示："
