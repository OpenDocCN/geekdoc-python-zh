- img_proc: true
  md: 'The coroutines are then passed to the `asyncio.as_completed()` function.


    This wraps each in another coroutine and executes them all concurrently and independently.


    It returns immediately with an iterable of coroutines.


    Internally, it awaits and yields coroutines as they are completed.


    The return value from each coroutine is retrieved and results are reported as
    they are made available.


    The example shows the same ports and executes in about the same time as the previous
    concurrent examples, except the program is more responsive.


    Ports are shown as open almost immediately, as opposed to after all ports in the
    range have been checked and timed out.


    ```

    Scanning python.org...

    > python.org:80 [OPEN]

    > python.org:443 [OPEN]

    ```'
