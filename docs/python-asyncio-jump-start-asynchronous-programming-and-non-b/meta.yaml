- img_proc: true
  md: '# How to Scan Ports Concurrently (*fast*)


    We can scan ports concurrently using asyncio.


    Each port can be tested concurrently in a separate coroutine.


    Opening a connection will suspend the caller, allowing other coroutines to run.
    Those coroutines attempting to connect to a port that is not open will remain
    suspended until the time out elapses, allowing other coroutines to run.


    This can be implemented by creating one coroutine for each port to scan, then
    execute all coroutines concurrently and wait for them to complete. This can be
    achieved using the asyncio.gather() function.


    It requires first creating the coroutines. With one coroutine per port, this would
    be a collection of more than 1,000 coroutines. We can achieve this using a list
    comprehension.


    For example:


    ```

    ...

    # create all coroutines

    coros = [test_port_number(host, port) for port in ports]

    ```


    Next, we can execute all of these coroutines concurrently using the asyncio.gather()
    function.


    This function takes awaitables as arguments and will not return until the awaitables
    are complete. It does not take a list of awaitables, therefore we must expand
    our list into separate expressions using the star (*) operator.


    For example:


    ```

    ...

    # execute all coroutines concurrently

    results = await asyncio.gather(*coros)

    ```


    This will execute all coroutines concurrently and will return an iterable of'
  merge: -1
  pgno: 175
- img_proc: true
  md: "return values from each coroutine in the order provided.\n\nWe can then traverse\
    \ the list of return values along with the list of ports and report the results.\n\
    \nRecall that we can traverse two or more iterables together using the built-in\
    \ zip() function.\n\nFor example:\n\n```\n...\n# report results\nfor port,result\
    \ in zip(ports, results):\n    if result :\n        print(f'> {host}:{port} [OPEN]')\n\
    ```\n\nTying this together, the complete example is listed below.\n\n```\n# SuperFastPython.com\n\
    # example of a concurrent port scanner using gather\nimport asyncio\n\n# returns\
    \ True if a connection can be made\nasync def test_port_number(host, port, timeout=3):\n\
    \    # create coroutine for opening a connection\n    coro = asyncio.open_connection(host,\
    \ port)\n    # execute the coroutine with a timeout\n    try:\n        # open\
    \ the connection and wait for a moment\n        _,writer = await asyncio.wait_for(coro,\
    \ timeout)\n        # close connection once opened\n        writer.close()\n \
    \       # indicate the connection can be opened\n        return True\n    except\
    \ asyncio.TimeoutError:\n        # indicate the connection cannot be opened\n\
    \        return False\n\n# main coroutine\nasync def main(host, ports):\n    #\
    \ report a status message\n```"
  merge: -1
