    \ What is Coroutine-Safe\n\nThread-safe refers to program code that can be executed\
    \ free of concurrency errors by multiple threads concurrently.\n\nPrimarily, it\
    \ refers to the fact that the code is free of race conditions.\n\nA race condition\
    \ is a bug in concurrency programming. It is a failure case where the behavior\
    \ of the program is dependent upon the order of execution by two or more threads.\
    \ This means the behavior of the program will be unpredictable, possibly changing\
    \ each time it is run.\n\nProcess-safe refers to program code that can be executed\
    \ free of concurrency errors by multiple processes concurrently. It is the concept\
    \ of *thread-safe* applied to processes, where processes are the unit of concurrency\
    \ instead of threads.\n\nAs such, coroutine-safe is the idea of *thread-safe*\
    \ and *process-safe* applied to coroutines.\n\nAlthough two or more coroutines\
    \ cannot execute at the same time within the event loop, it is possible for program\
    \ state and resources to be corrupted or made inconsistent via concurrent execution.\n\
    \nCoroutine-safe means that code or a program can be executed concurrently with\
