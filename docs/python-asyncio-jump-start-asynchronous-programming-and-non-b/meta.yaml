    \n这可能是异步生成器最常见的使用模式。\n\n完整的示例如下所示。\n\n```\n# SuperFastPython.com\n# 使用异步 for 循环的异步生成器示例\n\
    import asyncio\n\n# 定义一个异步生成器\nasync def async_generator():\n    # 普通循环\n    for\
    \ i in range(10):\n        # 挂起以模拟执行工作\n        await asyncio.sleep(1)\n     \
    \   # yield 结果\n        yield i\n\n# 主协程\nasync def main():\n    # 使用异步 for 循环遍历异步生成器\n\
    \    async for item in async_generator():\n        print(item)\n\n# 执行 asyncio\
    \ 程序\nasyncio.run(main())\n```"
