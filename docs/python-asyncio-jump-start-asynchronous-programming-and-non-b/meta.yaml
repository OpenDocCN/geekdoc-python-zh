    - [time - 时间访问和转换](https://docs.python.org/3/library/time.html)。\n- [random -\
    \ 生成伪随机数](https://docs.python.org/3/library/random.html)。\n\n## 下一课\n\n在下一课中，我们将探讨如何定义、创建和使用异步迭代器、生成器和上下文管理器。\n\
    \n## 第 04 课：迭代器、生成器和上下文管理器\n\n在本课中，我们将探讨如何在 asyncio 程序中创建和使用异步迭代器、生成器和上下文管理器。这些是我们在常规程序中可能使用的经典迭代器、生成器和上下文管理器的异步版本。\n\
    \n完成本课后，你将了解：\n\n- 如何定义、创建和遍历异步迭代器，以及它们与经典迭代器的比较。\n- 如何创建和使用异步生成器，以及它们与经典生成器的比较。\n\
    - 如何定义和创建异步上下文管理器，以及它们与经典上下文管理器的比较。\n- 如何以及何时在协程中使用 `async for` 表达式与异步可迭代对象。\n\
    - 如何以及何时使用 `async with` 表达式与异步上下文管理器。\n\n让我们开始吧。\n\n## 如何使用异步迭代器\n\n异步迭代器是实现了\
    \ `__aiter__()` 和 `__anext__()` 方法的对象。\n\n在我们仔细研究异步迭代器之前，让我们回顾一下经典迭代器，看看它们与异步迭代器的比较。\n\
    \n## 什么是经典迭代器和异步迭代器\n\n迭代器是实现了特定接口的对象。\n\n具体来说，`__iter__()` 方法返回迭代器的实例，`__next__()`\
    \ 方法将迭代器推进一个周期并返回一个值。\n\n迭代器可以使用内置函数 `next()` 进行步进，或使用 for 循环进行遍历。\n\n许多对象是可迭代的，最著名的是容器，如列表。\n\
    \n异步迭代器是实现了特定接口的对象，具体来说是 `__aiter__()` 和 `__anext__()` 方法。\n\n`__aiter__()` 方法必须返回迭代器的实例。`__anext__()`\
    \ 方法必须返回一个可等待对象，该对象推进迭代器。\n\n异步迭代器只能在 asyncio 程序中步进或遍历，例如在协程中。\n\n异步迭代器可以使用内置函数\
    \ `anext()` 进行步进，该函数返回一个可等待对象，该对象执行迭代器的一步，例如调用一次 `__anext__()` 方法。\n\n异步迭代器可以使用\
    \ `async for` 表达式进行遍历，该表达式将在每次迭代时自动调用 `anext()` 并等待返回的可等待对象以获取返回值。我们稍后将更详细地了解\
    \ `async for` 表达式。\n\n接下来，让我们看看如何定义异步迭代器。\n\n## 如何定义异步迭代器\n\n我们可以通过定义一个实现了 `__aiter__()`\
    \ 和 `__anext__()` 方法的类来定义异步迭代器。\n\n这些方法按照常规方式在对象上定义。\n\n重要的是，因为 `__anext__()`\
    \ 函数必须返回一个可等待对象，所以它必须使用 `async def` 表达式定义。\n\n当迭代完成时，`__anext__()` 方法必须引发 `StopAsyncIteration`\
    \ 异常。\n\n例如：\n\n```python\n# 定义一个异步迭代器\nclass AsyncIterator():\n    # 构造函数，定义一些状态\n\
    \    def __init__(self):\n        self.counter = 0\n\n    # 创建迭代器的实例\n    def\
    \ __aiter__(self):\n        return self\n\n    # 返回下一个可等待对象\n    async def __anext__(self):\n\
    \        # 检查是否没有更多项\n        if self.counter >= 10:\n            raise StopAsyncIteration\n\
