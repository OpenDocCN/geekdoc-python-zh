- img_proc: true
  md: "```\nprint(f'Scanning {host}...')\n# create all coroutines\ncoros = [test_port_number(host,\
    \ port)\n    for port in ports]\n# execute all coroutines concurrently\nresults\
    \ = await asyncio.gather(*coros)\n# report results\nfor port, result in zip(ports,\
    \ results):\n    if result:\n        print(f'> {host}:{port} [OPEN]')\n\n# define\
    \ a host and ports to scan\nhost = 'python.org'\nports = range(1, 1024)\n# start\
    \ the asyncio program\nasyncio.run(main(host, ports))\n```\n\nRunning the example\
    \ executes the `main()` coroutine as the entry point into our asyncio program.\n\
    \nA list of coroutines is first created.\n\nThe coroutines are then all executed\
    \ concurrently using `asyncio.gather()`.\n\nThis suspends the `main()` coroutine\
    \ until all coroutines are completed. Each coroutine tests one port, attempting\
    \ to open a connection and suspending it until either the connection is open or\
    \ the timeout is elapsed.\n\nOnce all tasks are completed the `main()` coroutine\
    \ resumes and all results are reported.\n\nTwo open ports are reported the same\
    \ as before.\n\nThe big difference is the speed of execution. In this case, it\
    \ takes about 3.1 seconds, compared to more than 50 minutes in the previous example.\n\
    \nThat is about 3,063 seconds faster or a 989x speed-up, i.e. nearly 1000-times\
    \ faster.\n\n```\nScanning python.org...\n```"
