  md: '# How to Share Data Between Coroutines with Queues


    A queue can be used to share data between coroutines.


    A queue is a coroutine-safe data structure that can be used to share data between
    coroutines without a race condition.


    The asyncio module provides the asyncio.Queue class for general use, but also
    provides a last-in-first-out (LIFO) queue via the asyncio.LifoQueue class and
    a priority queue via the asyncio.PriorityQueue class.


    A queue is a data structure on which items can be added by a call to put() and
    from which items can be retrieved by a call to get().


    Coroutine-safe means that it can be used by multiple coroutines to put and get
    items concurrently without a race condition.


    The Queue class provides a first-in, first-out FIFO queue, which means that the
    items are retrieved from the queue in the order they were added. The first items
    added to the queue will be the first items retrieved.


    Next, let’s look at how to use queues in asyncio programs.


    # How to Use Asyncio Queues


    The asyncio.Queue can be used by first creating an instance of the class. This
    will create an unbounded queue by default, that is, a queue with no size limit.


    For example:


    ```

    ...

    # created an unbounded queue

    queue = asyncio.Queue()

    ```


    A maximum capacity can be set on a new Queue via the maxsize constructor'
