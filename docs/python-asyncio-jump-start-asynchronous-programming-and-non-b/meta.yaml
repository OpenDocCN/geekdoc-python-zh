    \  https://docs.python.org/3/reference/compound_stmts.html\n\n## 下一步\n\n在下一课中，我们将探讨如何同步和协调协程，以及如何在协程之间共享数据。\n\
    \n## 第 05 课：队列与同步原语\n\n在本课中，我们将探讨如何使用队列在协程之间共享数据，以及如何使用并发原语在我们的 asyncio 程序中同步和协调协程。\n\
    \n完成本课后，你将了解：\n\n- 如何使用协程安全的队列在协程之间共享数据。\n- 如何使用互斥锁保护临界区免受竞态条件的影响。\n- 如何使用信号量限制协程对资源的并发访问。\n\
    - 如何使用事件在协程之间发出信号。\n- 如何使用条件变量通过等待和通知来协调协程。\n\n让我们开始吧。\n\n## 什么是协程安全\n\n线程安全是指可以由多个线程并发执行而不会出现并发错误的程序代码。\n\
    \n它主要指代码没有竞态条件。\n\n竞态条件是并发编程中的一个错误。它是一种失败情况，其中程序的行为取决于两个或多个线程的执行顺序。这意味着程序的行为将是不可预测的，每次运行时可能都会发生变化。\n\
    \n进程安全是指可以由多个进程并发执行而不会出现并发错误的程序代码。它是*线程安全*概念应用于进程，其中进程是并发单元而不是线程。\n\n因此，协程安全是*线程安全*和*进程安全*概念应用于协程的思想。\n\
    \n尽管两个或多个协程不能在事件循环中同时执行，但程序状态和资源仍可能通过并发执行而被破坏或变得不一致。\n\n协程安全意味着代码或程序可以与多个协程并发执行，而不会导致诸如竞态条件之类的并发失败模式。\n\
    \nasyncio 模块提供了许多协程安全的并发原语。\n\n本课将重点介绍在协程之间安全地共享数据、保护数据和协调行为的方法。\n\n## 如何使用队列在协程之间共享数据\n\
    \n队列可用于在协程之间共享数据。\n\n队列是一种协程安全的数据结构，可用于在协程之间共享数据而不会发生竞态条件。\n\nasyncio 模块提供了用于通用目的的\
    \ asyncio.Queue 类，但也通过 asyncio.LifoQueue 类提供了后进先出（LIFO）队列，以及通过 asyncio.PriorityQueue\
    \ 类提供了优先级队列。\n\n队列是一种数据结构，可以通过调用 put() 添加项目，也可以通过调用 get() 检索项目。\n\n协程安全意味着它可以被多个协程并发地\
    \ put 和 get 项目而不会发生竞态条件。\n\nQueue 类提供了一个先进先出（FIFO）队列，这意味着项目按照它们被添加的顺序从队列中检索。首先添加到队列的项目将首先被检索。\n\
    \n接下来，让我们看看如何在 asyncio 程序中使用队列。\n\n## 如何使用 Asyncio 队列\n\nasyncio.Queue 可以通过首先创建该类的实例来使用。这将默认创建一个无界队列，即没有大小限制的队列。\n\
    \n例如：\n\n```\n...\n# 创建一个无界队列\nqueue = asyncio.Queue()\n```\n\n可以通过 maxsize 构造函数参数为新队列设置最大容量。\n\
    \n例如：\n\n```\n...\n# 创建一个具有最大容量的队列\nqueue = asyncio.Queue(maxsize=100)\n```\n\n\
    可以通过调用 put() 方法将项目添加到队列中。这是一个必须被 await 的协程，它会挂起调用者，直到项目成功放置在队列上。例如：\n\n```\n...\n\
    # 向队列添加一个项目\nawait queue.put(item)\n```\n\n如果一个大小受限的队列已满，则无法添加新项目，并且对 put() 的调用将挂起，直到有可用空间。\n\
    \n可以通过调用 get() 从队列中检索项目。这也是一个协程，必须被 await，它会挂起调用者，直到成功从队列中检索到一个项目。\n\n例如：\n\n\
    ```\n...\n# 从队列中获取一个项目\nitem = await queue.get()\n```\n\n现在我们知道了如何使用队列，让我们来看一个在协程之间共享数据的实际示例。\n\
    \n## 使用队列的生产者和消费者任务示例\n\n我们可以探讨一个使用队列在两个协程之间共享数据的示例。\n\n在这个例子中，我们将定义一个自定义任务函数，该函数接受队列作为参数，生成一些数据，并将该数据放入队列。它是一个生产者协程。\n\
    \n主协程将创建队列，将其与新协程共享，然后挂起，等待数据到达队列。主协程将是消费者协程。\n\n使用队列在协程之间共享数据的完整示例如下所示。\n\n```\n\
    # SuperFastPython.com\n# 通过队列连接的生产者/消费者示例\nfrom random import random\nimport asyncio\n\
    \n# 用于生成工作的协程\nasync def producer(queue):\n    print('Producer: Running')\n  \
    \  # 生成工作\n    for _ in range(10):\n        # 生成一个值\n        value = random()\n\
    \        # 挂起以模拟工作\n        await asyncio.sleep(value)\n        # 添加到队列\n    \
    \    await queue.put(value)\n    # 发送全部完成信号\n    await queue.put(None)\n    print('Producer:\
    \ Done')\n\n# 用于消费工作的协程\nasync def consumer(queue):\n    print('Consumer: Running')\n\
    \    # 消费工作\n    while True:\n        # 获取一个工作单元\n        item = await queue.get()\n\
    \        # 检查停止信号\n        if item is None:\n            break\n        # 报告\n\
    \        print(f'>got {item}')\n    # 全部完成\n    print('Consumer: Done')\n\n# 入口点协程\n\
    async def main():\n    # 创建共享队列\n    queue = asyncio.Queue()\n    # 运行生产者和消费者\n\
    \    await asyncio.gather(\n        producer(queue), consumer(queue))\n\n# 启动\
    \ asyncio 程序\nasyncio.run(main())\n```\n\n运行该示例首先创建 `main()` 协程，并将其用作 asyncio\
    \ 程序的入口点。\n\n`main()` 协程运行，然后创建共享的 `asyncio.Queue` 对象。\n\n接下来，创建生产者协程并传递队列实例。然后启动消费者协程，主协程挂起，直到两个协程都终止。\n\
    \n生产者协程在任务的每次迭代中生成一个新的随机值，挂起，并将其添加到队列。消费者协程在队列上等待项目到达，然后一次消费一个项目，并报告其值。\n\n最后，生产者任务完成，一个\
    \ `None` 值被放入队列，协程终止。消费者协程获取 `None` 值，中断其循环，也终止。\n\n这突出了如何使用 `asyncio.Queue` 轻松地在生产者和消费者协程之间共享数据。\n\
    \n**注意：** 由于使用了随机数，每次运行程序的结果都会有所不同。\n\n```\nProducer: Running\n```"
