    # How to Coordinate Using a Condition Variable


    A condition variable, also called a monitor, allows multiple coroutines to wait
    and be notified about some result.


    A condition can be acquired by a coroutine after which it can wait to be notified
    by another coroutine that something has changed. While waiting, the coroutine
    is suspended and releases the lock on the condition for other coroutines to acquire.


    Another coroutine can then acquire the condition, make a change in the program,
    and notify one, all, or a subset of coroutines waiting on the condition that something
    has changed.


    The waiting coroutine can then resume, re-acquire the condition, perform checks
    on any changed state and perform required actions.


    Next, let’s look at how we can create and use condition variables.


    # How to Use an Asyncio Condition


    Python provides a condition variable via the `asyncio.Condition` class.


    For example:


    ```

    ...

    # create a new condition variable

    condition = asyncio.Condition()

    ```


    In order for a coroutine to make use of the `Condition`, it must acquire it and
    release it, like a mutex lock.


    This can be achieved manually with the `acquire()` and `release()` methods. The
    `acquire()` method is a coroutine and must be awaited.


    For example, we can acquire the `Condition` and then wait on the condition to
    be notified and finally release the condition as follows:'
