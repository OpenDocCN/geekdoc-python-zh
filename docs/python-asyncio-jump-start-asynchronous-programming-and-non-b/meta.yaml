  md: '# # Lesson Review


    # ## Takeaways


    Well done, you made it to the end of the lesson.


    +   - You now know how to open a socket connection to each port sequentially and
    how slow it can be.

    - You now know how to execute coroutines concurrently to scan ports and wait for
    them to complete.

    - You now know how to scan port numbers concurrently and report results dynamically
    as soon as they are available.


    # ## Exercise


    Your task for this lesson is to extend the above example for port scanning.


    +   1. Update the example to test a different range of port numbers.

    2. Update the example to test the program on a different host that has more than
    two ports open.

    3. Update the concurrent example to use `asyncio.wait()` instead of `asyncio.gather()`.

    4. Update the example to limit the number of concurrent tasks using a fixed sized
    queue or a semaphore.

    5. Update the example so that if an HTTP or HTTPS port is open that it reports
    the HTTP status for the port.


    It is important that you know how to use the non-blocking I/O aspect of asyncio
    in conjunction with the tools provided in the asyncio module. The above example
    and these extensions will help you get comfortable with these tools in this specific
    use case.


