    # How to Create and Run Tasks


    Asyncio provides tasks that provide a way to wrap and execute coroutines independently.


    The benefit is that the task provides a handle on the coroutine that can be queried,
    from which results can be retrieved, and provides a way to cancel a running coroutine.


    In this section, we will explore how to create and run tasks in asyncio programs.


    # What is an Asyncio Task


    An `asyncio.Task` is an object that schedules and independently runs an asyncio
    coroutine.


    It provides a handle on a scheduled coroutine that an asyncio program can query
    and use to interact with the coroutine.


    A task is created from a coroutine. It requires a coroutine object, wraps the
    coroutine, schedules it for execution, and provides ways to interact with it.


    A task is executed independently. This means it is scheduled in the asyncio event
    loop and will execute regardless of what else happens in the coroutine that created
    it. This is different from executing a coroutine directly, where the caller must
    wait for it to complete.


    The `asyncio.Task` class extends the `asyncio.Future` class and an instance are
    awaitable.


    A `Future` is a lower-level class that represents a result that will eventually
    arrive.


    Classes that extend the `Future` class are often referred to as Future-like.


    Because a `Task` is awaitable it means that a coroutine can wait for a task to
    be'
