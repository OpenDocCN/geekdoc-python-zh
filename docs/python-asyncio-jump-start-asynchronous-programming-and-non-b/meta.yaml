    \n## Next\n\nIn the next lesson, we will explore how to draw upon everything we\
    \ have learned and develop an asynchronous and concurrent port scanning program\
    \ using asyncio.\n\n## Lesson 07: Port Scanner Case Study\n\nAsyncio coroutines\
    \ can be used to scan multiple ports on a server concurrently. This can dramatically\
    \ speed up the process compared to attempting to connect to each port, one by\
    \ one. In this lesson, we will explore how to develop a concurrent port scanner\
    \ with asyncio.\n\nAfter completing this tutorial, you will know:\n\n- How to\
    \ open a socket connection to each port sequentially and how slow it can be.\n\
    - How to execute coroutines concurrently to scan ports and wait for them to complete.\n\
    - How to scan port numbers concurrently and report results dynamically as soon\
    \ as they are available.\n\nLet’s get started.\n\n## Develop an Asyncio Port Scanner\n\
    \nWe can connect to other computers by opening a socket, called socket programming.\n\
    \nOpening a socket requires both the name or IP address of the server and a port\
    \ number on which to connect.\n\nFor example, when our web browser opens a web\
    \ page on python.org, it is opening a socket connection to that server on port\
    \ 80 or 443, then uses the HTTP protocol to request and download (GET) an HTML\
    \ file.\n\nSocket programming or network programming is a lot of fun.\n\nA good\
    \ first socket programming project is to develop a port scanner. This is a program\
    \ that reports all of the open sockets on a given server.\n\nA simple way to implement\
    \ a port scanner is to loop over all the ports we want to test and attempt to\
    \ make a socket connection on each. If a connection can be made, we disconnect\
    \ immediately and report that the port on the server is open.\n\nHistorically,\
    \ having many open ports on a server was a security risk, so it is common to lock\
    \ down a public-facing server and close all non-essential ports to external traffic.\
    \ This means scanning public servers will likely yield few open ports in the best\
    \ case or will deny future access in the worst case if the server thinks we’re\
    \ trying to break in.\n\nAs such, although developing a port scanner is a fun\
    \ socket programming exercise, we must be careful in how we use it and what servers\
    \ we scan.\n\nNext, let’s look at how we can open a socket connection on a single\
    \ port.\n\n## How to Open a Socket Connection on a Port\n\nWe can open a socket\
    \ connection in asyncio using the asyncio.open_connection() function.\n\nThis\
    \ takes the host and port number and returns a StreamReader and StreamWriter for\
    \ interacting with the server via the socket.\n\nThe asyncio.open_connection()\
    \ function is a coroutine and must be awaited. It will return once the connection\
    \ is open.\n\nFor example:\n\n```python\n...\n# open a socket connection\nreader,\
    \ writer = asyncio.open_connection(\n    'python.org', 80)\n```\n\nIf a connection\
    \ can be made, the port is open. Otherwise, if the connection cannot be made,\
    \ the port is not open.\n\nThe problem is, how do we know a connection cannot\
    \ be made?\n\nIf a port is not open, the call may wait for a long time before\
    \ giving up. We need a way to give up after a time limit.\n\nThis can be achieved\
    \ using the asyncio.wait_for() function.\n\nThis is a coroutine that will execute\
    \ an awaitable and wait a fixed interval in seconds before giving up and raising\
    \ an asyncio.TimeoutError exception.\n\nWe can create the coroutine for the asyncio.open_connection()\
    \ function and pass it to the wait_for() coroutine.\n\nThis will allow us to attempt\
    \ to make a socket connection on a given port for a fixed interval, such as one\
    \ or three seconds.\n\nFor example:\n\n```python\n...\n# create coroutine for\
    \ opening a connection\ncoro = asyncio.open_connection('python.org', 80)\n# execute\
    \ the coroutine with a timeout\ntry:\n    # open the connection and wait for a\
    \ moment\n    _ = await asyncio.wait_for(coro, 1.0)\n    # ...\nexcept asyncio.TimeoutError:\n\
    \    # ...\n```\n\nIf the connection can be made within the time limit we can\
    \ then close the connection.\n\nThis can be achieved by calling the close() method\
    \ on the StreamWriter object returned from asyncio.open_connection().\n\nFor example:\n\
    \n```python\n...\n# close connection once opened\nwriter.close()\n```\n\nOtherwise,\
