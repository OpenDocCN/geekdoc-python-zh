  md: 'The way to start the asyncio event loop is via the asyncio.run() function.


    This function takes one coroutine and returns the value of the coroutine. The
    provided coroutine can be used as the entry point into the coroutine-based program.
    I like to call it the *main coroutine*, similar to the main thread and main process
    in other forms of concurrency.


    For example:


    ```

    ...

    # start an asyncio program

    asyncio.run(main())

    ```


    In addition to the event loop infrastructure, the asyncio module provides many
    high-level features for using our asynchronous programs, such as:


    +   - Utility functions for creating and scheduling asynchronous tasks.

    - Functions and classes for opening and managing non-blocking TCP socket connections.

    - Functions and classes for starting and managing non-blocking subprocesses.

    - Synchronization primitives for encouraging coroutine safety.

    - Coroutines-safe queues for message passing between coroutines.


    Now that we have seen how Python supports coroutines and the asyncio module supports
    developing coroutine-based asynchronous programming, let’s look at a worked example.'
