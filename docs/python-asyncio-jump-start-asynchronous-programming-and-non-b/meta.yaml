    - How to define and create asynchronous context managers and how they compare\
    \ to classical context managers.\n- How and when to use the `async for` expression\
    \ in coroutines with asynchronous iterables.\n- How and when to use the `async\
    \ with` expression for use with asynchronous context managers.\n\nLet’s get started.\n\
    \n## How to Use Asynchronous Iterators\n\nAn asynchronous iterator is an object\
    \ that implements the `__aiter__()` and `__anext__()` methods.\n\nBefore we take\
    \ a close look at asynchronous iterators, let’s review classical iterators and\
    \ see how they compare to asynchronous iterators.\n\n## What are Classical and\
    \ Asynchronous Iterators\n\nAn iterator is an object that implements a specific\
    \ interface.\n\nSpecifically, the `__iter__()` method returns an instance of the\
    \ iterator, and the `__next__()` method steps the iterator one cycle and returns\
    \ a value.\n\nAn iterator can be stepped using the `next()` built-in function\
    \ or traversed using a for-loop.\n\nMany objects are iterable, most notable are\
    \ containers such as lists.\n\nAn asynchronous iterator is an object that implements\
    \ a specific interface, specifically the `__aiter__()` and `__anext__()` methods.\n\
    \nThe `__aiter__()` method must return an instance of the iterator. The `__anext__()`\
    \ method must return an awaitable that steps the iterator.\n\nAn asynchronous\
    \ iterator may only be stepped or traversed in an asyncio program, such as within\
    \ a coroutine.\n\nAn asynchronous iterator can be stepped using the `anext()`\
    \ built-in function that returns an awaitable that executes one step of the iterator,\
    \ e.g. one call to the `__anext__()` method.\n\nAn asynchronous iterator can be\
    \ traversed using the `async for` expression that will automatically call `anext()`\
    \ each iteration and await the returned awaitable in order to retrieve the return\
    \ value. We will learn more about the `async for` expression in a moment.\n\n\
    Next, let’s look at how to define an asynchronous iterator.\n\n## How to Define\
    \ an Asynchronous Iterator\n\nWe can define an asynchronous iterator by defining\
    \ a class that implements the `__aiter__()` and `__anext__()` methods.\n\nThese\
    \ methods are defined on an object as per normal.\n\nImportantly, because the\
    \ `__anext__()` function must return an awaitable, it must be defined using the\
    \ `async def` expression.\n\nWhen the iteration is complete, the `__anext__()`\
    \ method must raise a `StopAsyncIteration` exception.\n\nFor example:\n\n```python\n\
    # define an asynchronous iterator\nclass AsyncIterator():\n    # constructor,\
    \ define some state\n    def __init__(self):\n        self.counter = 0\n\n   \
    \ # create an instance of the iterator\n    def __aiter__(self):\n        return\
    \ self\n\n    # return the next awaitable\n    async def __anext__(self):\n  \
    \      # check for no further items\n        if self.counter >= 10:\n        \
    \    raise StopAsyncIteration\n        # increment the counter\n        self.counter\
    \ += 1\n        # return the counter value\n        return self.counter\n```\n\
    \nBecause the asynchronous iterator is a coroutine and each iterator returns an\
    \ awaitable that is scheduled and executed in the asyncio event loop, we can execute\
    \ and await awaitables within the body of the iterator.\n\nFor example:\n\n```python\n\
    ...\n# return the next awaitable\nasync def __anext__(self):\n    # check for\
