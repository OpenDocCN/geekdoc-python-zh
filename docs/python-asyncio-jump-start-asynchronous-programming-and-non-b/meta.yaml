  md: '# How to Limit Access to a Resource with a Semaphore


    A semaphore is a concurrency primitive that allows a limit on the number of coroutines
    that can acquire a lock protecting a critical section or resource.


    It is an extension of a mutual exclusion (mutex) lock that adds a count for the
    number of coroutines that can acquire the lock before additional coroutines will
    suspend. Once full, new coroutines can only acquire access on the semaphore once
    an existing coroutine holding the semaphore releases access.


    Internally, the semaphore maintains a counter protected by a mutex lock that is
    decremented each time the semaphore is acquired and incremented each time it is
    released. When a semaphore is created, the upper limit on the counter is set.
    If it is set to 1, then the semaphore will operate like a mutex lock.


    Next, let’s look at how we can create and use a semaphore.


    # How to Use an Asyncio Semaphore


    Python provides a semaphore for coroutines via the asyncio.Semaphore class.


    The Semaphore object must be configured when it is created to set the limit on
    the internal counter. This limit will match the number of concurrent coroutines
    that can hold the semaphore.


    For example, we can set it to 100:


    ```

    ...

    # create a semaphore with a limit of 100

    semaphore = asyncio.Semaphore(100)

    ```


    Each time the Semaphore is acquired, the internal counter is decremented. Each
    time the Semaphore is released, the internal counter is incremented.'
  merge: -1
  pgno: 129
- img_proc: true
  md: "The Semaphore cannot be acquired if it has no available positions (e.g. the\
    \ count is zero) in which case, threads attempting to acquire it must suspend\
    \ until a position becomes available.\n\nThe semaphore can be acquired by calling\
    \ the `acquire()` method which must be awaited.\n\nFor example:\n\n```\n...\n\
    # acquire the semaphore\nawait semaphore.acquire()\n```\n\nBy default, the calling\
    \ coroutine will suspend until access becomes available on the semaphore.\n\n\
    Once acquired, the semaphore can be released again by calling the `release()`\
    \ method.\n\nFor example:\n\n```\n...\n# release the semaphore\nsemaphore.release()\n\
    ```\n\nThe Semaphore class supports usage via the context manager, which will\
    \ automatically acquire and release the semaphore for us. As such it is the preferred\
    \ way to use semaphores in our programs.\n\nFor example:\n\n```\n...\n# acquire\
    \ the semaphore\nasync with semaphore:\n    # ...\n```\n\nNow that we know how\
    \ to use semaphores, let's look at a worked example.\n\n# Example of Using an\
    \ Asyncio Semaphore"
