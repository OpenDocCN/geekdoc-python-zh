- img_proc: true
  md: '# Develop an Asyncio Port Scanner


    We can connect to other computers by opening a socket, called socket programming.


    Opening a socket requires both the name or IP address of the server and a port
    number on which to connect.


    For example, when our web browser opens a web page on python.org, it is opening
    a socket connection to that server on port 80 or 443, then uses the HTTP protocol
    to request and download (GET) an HTML file.


    Socket programming or network programming is a lot of fun.


    A good first socket programming project is to develop a port scanner. This is
    a program that reports all of the open sockets on a given server.


    A simple way to implement a port scanner is to loop over all the ports we want
    to test and attempt to make a socket connection on each. If a connection can be
    made, we disconnect immediately and report that the port on the server is open.


    Historically, having many open ports on a server was a security risk, so it is
    common to lock down a public-facing server and close all non-essential ports to
    external traffic. This means scanning public servers will likely yield few open
    ports in the best case or will deny future access in the worst case if the server
    thinks we’re trying to break in.


    As such, although developing a port scanner is a fun socket programming exercise,
    we must be careful in how we use it and what servers we scan.


    Next, let’s look at how we can open a socket connection on a single port.'
  merge: -1
  pgno: 168
