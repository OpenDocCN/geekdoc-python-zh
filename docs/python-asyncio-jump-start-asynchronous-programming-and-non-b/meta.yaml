  md: '# Code Examples


    All code examples use Python 3.


    Python 2.7 is not supported because it reached its end of life in 2020.


    I recommend the most recent version of Python 3 available at the time you are
    reading this, although Python 3.9 or higher is sufficient to run all code examples
    in this book.


    You do not require any specific integrated development environment (IDE). I recommend
    typing code into a simple text editor like Sublime Text or Atom that run on all
    modern operating systems. I’m a Sublime user myself, but any text editor will
    do. If you are familiar with an IDE, then, by all means, use it.


    Each code example is complete and can be run as a standalone program. I recommend
    running code examples from the command line (also called the command prompt on
    Windows or terminal on macOS) to avoid any possible issues.


    To run a Python script from the command line:


    +   1. Save the code file to a directory of your choice with a .py extension.

    2. Open your command line (also called the command prompt or terminal).

    3. Change the directory to the location where you saved the Python script.

    4. Execute the script using the Python interpreter followed by the name of the
    script.


    For example:


    ```

    python my_script.py

    ```


    I recommend running scripts on the command line. It is easy, it works for everyone,
    it avoids all kinds of problems that beginners have with notebooks and IDEs, and
    scripts run fastest on the command line.


    That being said, if you know what you’re doing, you can run code examples'
