    \ 1.0)\n    # ...\nexcept asyncio.TimeoutError:\n    # ...\n```\n\n如果可以在时间限制内建立连接，我们就可以关闭连接。\n\
    \n这可以通过调用 asyncio.open_connection() 返回的 StreamWriter 对象的 close() 方法来实现。\n\n例如：\n\
    \n```python\n...\n# 连接打开后关闭连接\nwriter.close()\n```\n\n否则，如果引发 asyncio.TimeoutError\
    \ 异常，我们可以假设端口可能未打开。\n\n我们可以将所有这些整合到一个协程函数中，该函数测试一个主机上的一个端口，如果端口打开则返回 True，否则返回\
    \ False。\n\n下面的 test_port_number() 协程函数实现了这一点。\n\n```python\n# 如果可以建立连接则返回 True\n\
    async def test_port_number(host, port, timeout=3):\n    # 创建用于打开连接的协程\n    coro\
    \ = asyncio.open_connection(host, port)\n    # 使用超时执行协程\n    try:\n        # 打开连接并等待片刻\n\
    \        _, writer = await asyncio.wait_for(coro, timeout)\n        # 连接打开后关闭连接\n\
    \        writer.close()\n```"
