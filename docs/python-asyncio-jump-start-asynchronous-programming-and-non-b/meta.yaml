- md: "## How to Scan a Range of Ports on a Server (slow)\n\nWe can scan a range of\
    \ ports on a given host.\n\nMany common internet services are provided on ports\
    \ between 0 and 1,024.\n\nThe viable range of ports is 0 to 65,535, and we can\
    \ see a list of the most common port numbers and the services that use them in\
    \ the file /etc/services on POSIX systems.\n\nWe can scan a range of ports by\
    \ repeatedly calling our coroutine developed in the previous section, and report\
    \ any ports that permit a connection as *open*.\n\nThe `main()` coroutine function\
    \ below implements this reporting any open ports that are discovered.\n\n```python\n\
    # main coroutine\nasync def main(host, ports):\n    # report a status message\n\
    \    print(f'Scanning {host}...')\n    # scan ports sequentially\n    for port\
    \ in ports:\n        if await test_port_number(host, port):\n            print(f'>\
    \ {host}:{port} [OPEN]')\n```\n\nFinally, we can call this function and specify\
    \ the host and range of ports.\n\nIn this case, we will port scan python.org (out\
    \ of love for Python, not malicious intent).\n\n```python\n...\n# define a host\
    \ and ports to scan\nhost = 'python.org'\nports = range(1, 1024)\n# start the\
    \ asyncio program\nasyncio.run(main(host, ports))\n```\n\nWe would expect that\
    \ at least port 80 would be open for HTTP connections.\n\nTying this together,\
    \ the complete example of port scanning a host with asyncio is listed below.\n\
    \n```python\n# SuperFastPython.com\n# example of an asyncio sequential port scanner\n\
    import asyncio\n\n# returns True if a connection can be made\nasync def test_port_number(host,\
    \ port, timeout=3):\n    # create coroutine for opening a connection\n    coro\
    \ = asyncio.open_connection(host, port)\n    # execute the coroutine with a timeout\n\
    \    try:\n        # open the connection and wait for a moment\n        _, writer\
    \ = await asyncio.wait_for(coro, timeout)\n        # close connection once opened\n\
    \        writer.close()\n        # indicate the connection can be opened\n   \
    \     return True\n    except asyncio.TimeoutError:\n        # indicate the connection\
    \ cannot be opened\n        return False\n\n# main coroutine\nasync def main(host,\
    \ ports):\n    # report a status message\n    print(f'Scanning {host}...')\n \
    \   # scan ports sequentially\n    for port in ports:\n        if await test_port_number(host,\
    \ port):\n            print(f'> {host}:{port} [OPEN]')\n\n# define a host and\
    \ ports to scan\nhost = 'python.org'\nports = range(1, 1024)\n# start the asyncio\
    \ program\nasyncio.run(main(host, ports))\n```\n\nRunning the example attempts\
    \ to make a connection for each port number between 1 and 1,023 (one minus 1,024)\
    \ and reports all open ports.\n\nIn this case, we can see that port 80 for HTTP\
    \ is open as expected, and port 443 is also open for HTTPS.\n\nThe program works\
    \ fine, but it is painfully slow.\n\nOn my system, it took about 51 minutes. This\
    \ makes sense. If we test 1,023 ports and most ports are closed then we expect\
    \ to wait 3 seconds on each attempt or 1,023×3 which equals 3,069 seconds. Converting\
    \ this to minutes 3069/60 equals about 51.15 minutes.\n\n```\n> python.org:80\
    \ [OPEN]\n> python.org:443 [OPEN]\n```\n\nThe benefit of asyncio is that it can\
    \ execute coroutines concurrently, specifically coroutines that perform non-blocking\
    \ I/O.\n\nNext, we will look at how to run coroutines concurrently to speed up\
    \ this port scanning process.\n\n## How to Scan Ports Concurrently (*fast*)\n\n\
    We can scan ports concurrently using asyncio.\n\nEach port can be tested concurrently\
    \ in a separate coroutine.\n\nOpening a connection will suspend the caller, allowing\
    \ other coroutines to run. Those coroutines attempting to connect to a port that\
    \ is not open will remain suspended until the time out elapses, allowing other\
    \ coroutines to run.\n\nThis can be implemented by creating one coroutine for\
    \ each port to scan, then execute all coroutines concurrently and wait for them\
    \ to complete. This can be achieved using the asyncio.gather() function.\n\nIt\
    \ requires first creating the coroutines. With one coroutine per port, this would\
    \ be a collection of more than 1,000 coroutines. We can achieve this using a list\
    \ comprehension.\n\nFor example:\n\n```python\n...\n# create all coroutines\n\
    coros = [test_port_number(host, port) for port in ports]\n```\n\nNext, we can\
    \ execute all of these coroutines concurrently using the asyncio.gather() function.\n\
    \nThis function takes awaitables as arguments and will not return until the awaitables\
    \ are complete. It does not take a list of awaitables, therefore we must expand\
    \ our list into separate expressions using the star (*) operator.\n\nFor example:\n\
    \n```python\n...\n# execute all coroutines concurrently\nresults = await asyncio.gather(*coros)\n\
    ```\n\nThis will execute all coroutines concurrently and will return an iterable\
    \ of return values from each coroutine in the order provided.\n\nWe can then traverse\
    \ the list of return values along with the list of ports and report the results.\n\
    \nRecall that we can traverse two or more iterables together using the built-in\
    \ zip() function.\n\nFor example:\n\n```python\n...\n# report results\nfor port,\
    \ result in zip(ports, results):\n    if result:\n        print(f'> {host}:{port}\
    \ [OPEN]')\n```\n\nTying this together, the complete example is listed below.\n\
    \n```python\n# SuperFastPython.com\n# example of a concurrent port scanner using\
    \ gather\nimport asyncio\n\n# returns True if a connection can be made\nasync\
    \ def test_port_number(host, port, timeout=3):\n    # create coroutine for opening\
    \ a connection\n    coro = asyncio.open_connection(host, port)\n    # execute\
    \ the coroutine with a timeout\n    try:\n        # open the connection and wait\
    \ for a moment\n        _, writer = await asyncio.wait_for(coro, timeout)\n  \
    \      # close connection once opened\n        writer.close()\n        # indicate\
    \ the connection can be opened\n        return True\n    except asyncio.TimeoutError:\n\
    \        # indicate the connection cannot be opened\n        return False\n\n\
    # main coroutine\nasync def main(host, ports):\n    # report a status message\n\
    \    print(f'Scanning {host}...')\n    # create all coroutines\n    coros = [test_port_number(host,\
    \ port) for port in ports]\n    # execute all coroutines concurrently\n    results\
    \ = await asyncio.gather(*coros)\n    # report results\n    for port, result in\
    \ zip(ports, results):\n        if result:\n            print(f'> {host}:{port}\
    \ [OPEN]')\n\n# define a host and ports to scan\nhost = 'python.org'\nports =\
    \ range(1, 1024)\n# start the asyncio program\nasyncio.run(main(host, ports))\n\
    ```\n\nRunning the example executes the `main()` coroutine as the entry point\
    \ into our asyncio program.\n\nA list of coroutines is first created.\n\nThe coroutines\
    \ are then all executed concurrently using `asyncio.gather()`.\n\nThis suspends\
    \ the `main()` coroutine until all coroutines are completed. Each coroutine tests\
    \ one port, attempting to open a connection and suspending it until either the\
    \ connection is open or the timeout is elapsed.\n\nOnce all tasks are completed\
    \ the `main()` coroutine resumes and all results are reported.\n\nTwo open ports\
    \ are reported the same as before.\n\nThe big difference is the speed of execution.\
    \ In this case, it takes about 3.1 seconds, compared to more than 50 minutes in\
    \ the previous example.\n\nThat is about 3,063 seconds faster or a 989x speed-up,\
    \ i.e. nearly 1000-times faster.\n\n```\nScanning python.org...\n> python.org:80\
    \ [OPEN]\n> python.org:443 [OPEN]\n```\n\nNext, let’s look at how we can report\
    \ results as soon as they are available, rather than after all coroutines complete.\n\
    \n## How to Report Scan Results Dynamically\n\nIn the previous example, we executed\
    \ the coroutines concurrently and reported the results after all tasks had been\
    \ completed.\n\nAn alternative approach would be to report results as the tasks\
    \ are completed.\n\nThis would allow the program to be more responsive and show\
    \ results to the user as they are available.\n\nWe could achieve this by having\
    \ the `test_port_number()` coroutine report its result directly.\n\nAnother approach\
    \ is to traverse coroutines in the order they are completed, as they complete.\n\
    \nThis can be achieved using the `asyncio.as_completed()` function.\n\nThis function\
    \ takes a collection of awaitables. If they are coroutines, they are issued as\
    \ tasks.\n\nThe function then returns an iterable of the coroutines that are yielded\
    \ in the order that they are completed.\n\nWe can traverse this iterable directly,\
    \ we do not need to use the `async for` expression reserved for asynchronous iterables.\n\
    \nFor example:\n\n```python\n...\n# execute coroutines and handle results as they\
    \ complete\nfor coro in asyncio.as_completed(coros):\n    # check the return value\
    \ from the coroutine\n    # ...\n```\n\nThe downside is that we don’t have an\
    \ easy way to relate the coroutine to the port that was tested. Therefore, we\
    \ can update our `test_port_number()` coroutine to return whether the port is\
    \ open and the port number that was tested."
  mdcn: "## 如何扫描服务器上的端口范围（慢速方法）\n\n我们可以扫描给定主机上的一个端口范围。\n\n许多常见的互联网服务运行在0到1,024之间的端口上。\n\
    \n端口的有效范围是0到65,535，在POSIX系统的`/etc/services`文件中，我们可以查看最常用的端口号及其对应的服务列表。\n\n我们可以通过反复调用上一节开发的协程来扫描一个端口范围，并将任何允许连接的端口报告为*开放*状态。\n\
    \n下面的`main()`协程函数实现了这一功能，报告所有发现的开放端口。\n\n```python\n# main coroutine\nasync def\
    \ main(host, ports):\n    # report a status message\n    print(f'Scanning {host}...')\n\
    \    # scan ports sequentially\n    for port in ports:\n        if await test_port_number(host,\
    \ port):\n            print(f'> {host}:{port} [OPEN]')\n```\n\n最后，我们可以调用此函数并指定主机和端口范围。\n\
    \n在这个例子中，我们将对python.org进行端口扫描（出于对Python的热爱，而非恶意意图）。\n\n```python\n...\n# define\
    \ a host and ports to scan\nhost = 'python.org'\nports = range(1, 1024)\n# start\
    \ the asyncio program\nasyncio.run(main(host, ports))\n```\n\n我们预计至少80端口会为HTTP连接开放。\n\
    \n将以上内容整合，使用asyncio扫描主机端口的完整示例如下。\n\n```python\n# SuperFastPython.com\n# example\
    \ of an asyncio sequential port scanner\nimport asyncio\n\n# returns True if a\
    \ connection can be made\nasync def test_port_number(host, port, timeout=3):\n\
    \    # create coroutine for opening a connection\n    coro = asyncio.open_connection(host,\
    \ port)\n    # execute the coroutine with a timeout\n    try:\n        # open\
    \ the connection and wait for a moment\n        _, writer = await asyncio.wait_for(coro,\
    \ timeout)\n        # close connection once opened\n        writer.close()\n \
    \       # indicate the connection can be opened\n        return True\n    except\
    \ asyncio.TimeoutError:\n        # indicate the connection cannot be opened\n\
    \        return False\n\n# main coroutine\nasync def main(host, ports):\n    #\
