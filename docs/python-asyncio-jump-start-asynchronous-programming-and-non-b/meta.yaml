    \n## 下一步\n\n在下一课中，我们将探讨如何运用我们所学的一切，并使用 asyncio 开发一个异步并发的端口扫描程序。\n\n## 第 07 课：端口扫描器案例研究\n\
    \nAsyncio 协程可用于并发扫描服务器上的多个端口。与逐个尝试连接每个端口相比，这可以显著加快扫描过程。在本课中，我们将探讨如何使用 asyncio\
    \ 开发一个并发端口扫描器。\n\n完成本教程后，你将了解：\n\n- 如何顺序地打开到每个端口的套接字连接，以及这有多慢。\n- 如何并发执行协程来扫描端口并等待它们完成。\n\
    - 如何并发扫描端口号，并在结果可用时立即动态报告。\n\n让我们开始吧。\n\n## 开发一个 Asyncio 端口扫描器\n\n我们可以通过打开套接字来连接到其他计算机，这称为套接字编程。\n\
    \n打开套接字需要服务器的名称或 IP 地址以及要连接的端口号。\n\n例如，当我们的网络浏览器在 python.org 上打开一个网页时，它正在打开一个到该服务器端口\
    \ 80 或 443 的套接字连接，然后使用 HTTP 协议请求并下载（GET）一个 HTML 文件。\n\n套接字编程或网络编程非常有趣。\n\n一个好的入门套接字编程项目是开发一个端口扫描器。这是一个报告给定服务器上所有打开的套接字的程序。\n\
    \n实现端口扫描器的一种简单方法是循环遍历所有要测试的端口，并尝试在每个端口上建立套接字连接。如果可以建立连接，我们立即断开连接并报告服务器上的端口是打开的。\n\
    \n历史上，服务器上有很多开放端口是一种安全风险，因此通常会锁定面向公众的服务器并关闭所有非必要的端口以阻止外部流量。这意味着扫描公共服务器在最好的情况下可能只会发现很少的开放端口，或者在最坏的情况下，如果服务器认为我们试图入侵，可能会拒绝未来的访问。\n\
    \n因此，尽管开发端口扫描器是一个有趣的套接字编程练习，但我们必须小心使用它以及扫描哪些服务器。\n\n接下来，让我们看看如何在单个端口上打开套接字连接。\n\
    \n## 如何在端口上打开套接字连接\n\n我们可以使用 asyncio.open_connection() 函数在 asyncio 中打开套接字连接。\n\
    \n该函数接受主机和端口号，并返回一个 StreamReader 和 StreamWriter，用于通过套接字与服务器交互。\n\nasyncio.open_connection()\
    \ 函数是一个协程，必须被等待。它将在连接打开后返回。\n\n例如：\n\n```python\n...\n# 打开一个套接字连接\nreader, writer\
    \ = asyncio.open_connection(\n    'python.org', 80)\n```\n\n如果可以建立连接，则端口是打开的。否则，如果无法建立连接，则端口未打开。\n\
    \n问题是，我们如何知道无法建立连接？\n\n如果端口未打开，调用可能会等待很长时间才会放弃。我们需要一种在时间限制后放弃的方法。\n\n这可以使用 asyncio.wait_for()\
    \ 函数来实现。\n\n这是一个协程，它将执行一个可等待对象，并在固定间隔（以秒为单位）后放弃并引发 asyncio.TimeoutError 异常。\n\n\
    我们可以为 asyncio.open_connection() 函数创建协程，并将其传递给 wait_for() 协程。\n\n这将允许我们在给定端口上尝试建立套接字连接一段固定时间，例如一秒钟或三秒钟。\n\
    \n例如：\n\n```python\n...\n# 创建用于打开连接的协程\ncoro = asyncio.open_connection('python.org',\
