  - "[PAGE 78]\n\n# Example of Waiting for All Tasks\n\nWe can explore how to wait\
    \ for all tasks using asyncio.wait().\n\nIn this example, we will define a simple\
    \ task coroutine that generates a random value, sleeps for a fraction of a second,\
    \ then reports a message with the generated value.\n\nThe main coroutine will\
    \ then create many tasks in a list comprehension with the coroutine and then wait\
    \ for all tasks to be complete.\n\nThe complete example is listed below.\n\n```\n\
    # SuperFastPython.com\n# example of waiting for all tasks to complete\nfrom random\
    \ import random\nimport asyncio\n\n# coroutine to execute in a new task\nasync\
    \ def task_coro(arg):\n    # generate a random value between 0 and 1\n    value\
    \ = random()\n    # suspend for a moment\n    await asyncio.sleep(value)\n   \
    \ # report the value\n    print(f'>task {arg} done with {value}')\n\n# main coroutine\n\
    async def main():\n    # create many tasks\n    tasks = [asyncio.create_task(task_coro(i))\n\
    \        for i in range(10)]\n    # wait for all tasks to complete\n    _ = await\
    \ asyncio.wait(tasks)\n    # report results\n    print('All done')\n\n# start\
    \ the asyncio program\nasyncio.run(main())\n```"
