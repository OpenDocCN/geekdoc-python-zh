  md: '# Look Back At How Far You’ve Come


    Congratulations, you made it to the end of this 7-day course.


    Let’s take a look back and review what you now know.


    +   - You discovered how to define, create, and run coroutines and how to use
    the `async`/`await` expressions.

    - You discovered how to create asynchronous tasks, query their status, cancel
    them and add callback functions.

    - You discovered how to run many coroutines concurrently in a group and handle
    their results.

    - You discovered how to wait for many coroutines to complete, meet a condition,
    or timeout.

    - You discovered how to define, create and use asynchronous iterators, generators,
    and context managers.

    - You discovered how to use the `async for` and `async with` expressions in asyncio
    programs.

    - You discovered how to synchronize and coordinate coroutines with locks, semaphores,
    events and condition variables.

    - You discovered how to share data between coroutines using coroutine-safe queues.

    - You discovered how to run, read, and write from subprocesses and streams with
    coroutines.

    - You discovered how to develop a concurrent and dynamically updating port scanner
    using non-blocking I/O.


    You now know how to use the `asyncio` module and bring coroutine-based concurrency
    to your project.


