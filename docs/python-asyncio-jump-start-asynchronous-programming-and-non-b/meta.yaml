  md: '# How to Use Non-Blocking I/O Streams


    Asyncio provides non-blocking I/O socket programming.


    This is provided via streams.


    Sockets can be opened that provide access to a stream writer and a stream reader.


    Data can then be written and read from the stream using coroutines, suspending
    when appropriate.


    Once finished, the socket can be closed.


    The asyncio streams capability is low-level meaning that any protocols required
    must be implemented manually.


    This can include common ASCII-based web protocols, such as:


    +   - HTTP or HTTPS for interacting with web servers.

    - SMTP for interacting with email servers.

    - FTP for interacting with file servers.


    The streams can also be used to create a server to handle requests using a standard
    protocol, or to develop our own application-specific protocol.


    Now that we know what asyncio streams are, let’s look at how to use them.


    # How to Open a Socket Connection


    An asyncio TCP client socket connection can be opened using the `asyncio.open_connection()`
    function.


    This is a coroutine that must be awaited and will return once the socket connection
    is open.


    The function returns a `StreamReader` and `StreamWriter` object for interacting'
  merge: -1
