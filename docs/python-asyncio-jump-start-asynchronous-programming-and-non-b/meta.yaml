    ```\n\nNext, let’s look at how we can wait for a coroutine to complete with a\
    \ fixed timeout.\n\n## How to Wait For a Task With a Timeout\n\nThe `asyncio.wait_for()`\
    \ function allows the caller to wait for an asyncio task or coroutine to complete\
    \ with a timeout.\n\nIf no timeout is specified, the `wait_for()` function will\
    \ wait until the task is completed.\n\nIf a timeout is specified and elapses before\
    \ the task is complete, then the task is canceled.\n\nThis allows the caller to\
    \ both set an expectation about how long they are willing to wait for a task to\
    \ complete, and to enforce the timeout by canceling the task if the timeout elapses.\n\
    \nNow that we know what the `asyncio.wait_for()` function is, let’s look at how\
    \ to use it.\n\n## How to Use asyncio.wait_for()\n\nThe `asyncio.wait_for()` function\
    \ takes an awaitable and a timeout.\n\nThe awaitable may be a coroutine or a task.\n\
    \nA timeout must be specified and may be `None` for no timeout, an integer or\
    \ floating point number of seconds.\n\nThe `wait_for()` function returns a coroutine\
    \ that is not executed until it is explicitly awaited or scheduled as a task.\n\
    \nFor example:\n\n```\n...\n# wait for a task to complete\nawait asyncio.wait_for(coro,\
    \ timeout=10)\n```\n\nIf a coroutine is provided, it will be converted to the\
    \ task when the `wait_for()` coroutine is executed.\n\nIf the timeout elapses\
    \ before the task is completed, the task is canceled, and an `asyncio.TimeoutError`\
    \ is raised, which may need to be handled.\n\nFor example:\n\n```\n...\n# execute\
    \ a task with a timeout\ntry:\n    # wait for a task to complete\n    await asyncio.wait_for(coro,\
    \ timeout=1)\nexcept asyncio.TimeoutError:\n    # ...\n```\n\nIf the waited-for\
    \ task fails with an unhandled exception, the exception will be propagated back\
    \ to the caller that is awaiting on the `wait_for()` coroutine, in which case\
    \ it may need to be handled.\n\nFor example:\n\n```\n...\n# execute a task that\
    \ may fail\ntry:\n    # wait for a task to complete\n    await asyncio.wait_for(coro,\
    \ timeout=1)\nexcept asyncio.TimeoutError:\n    # ...\nexcept Exception:\n   \
    \ # ...\n```\n\nNow that we know how the `wait_for()` function works, let’s look\
    \ at a worked example.\n\n## Example of Waiting for a Task with a Timeout\n\n\
    We can explore how to wait for a coroutine with a timeout that elapses before\
    \ the task is completed.\n\nIn this example, we execute a coroutine except the\
    \ caller waits a fixed timeout of 0.2 seconds or 200 milliseconds.\n\nRecall that\
    \ one second is equal to 1,000 milliseconds.\n\nThe task coroutine is modified\
    \ so that it sleeps for more than one second, ensuring that the timeout always\
    \ expires before the task is complete.\n\nThe complete example is listed below.\n\
    \n```\n# SuperFastPython.com\n# example of waiting for a coroutine with a timeout\n\
    from random import random\nimport asyncio\n\n# coroutine to execute in a new task\n\
    async def task_coro():\n    # generate a random value between 1 and 2\n    value\
    \ = 1 + random()\n    # report message\n    print(f'>task got {value}')\n    #\
    \ suspend for a moment\n    await asyncio.sleep(value)\n    # report all done\n\
    \    print('>task done')\n\n# main coroutine\nasync def main():\n    # create\
    \ a task\n    task = task_coro()\n    # execute and wait for the task without\
    \ a timeout\n    try:\n        await asyncio.wait_for(task, timeout=0.2)\n   \
    \ except asyncio.TimeoutError:\n        print('Gave up waiting, task canceled')\n\
    \n# start the asyncio program\nasyncio.run(main())\n```\n\nRunning the example\
    \ first creates the `main()` coroutine and uses it as the entry point into the\
    \ asyncio program.\n\nThe `main()` coroutine creates the task coroutine. It then\
    \ calls `wait_for()` and passes the task coroutine and sets the timeout to 0.2\
    \ seconds.\n\nThe `main()` coroutine is suspended and the `task_coro()` is executed.\
    \ It reports a message and sleeps for a moment.\n\nThe `main()` coroutine resumes\
    \ after the timeout has elapsed. The `wait_for()` coroutine cancels the `task_coro()`\
    \ coroutine and the `main()` coroutine is suspended.\n\nThe `task_coro()` runs\
    \ again and responds to the request to be terminated. It raises a `TimeoutError`\
    \ exception and terminates.\n\nThe `main()` coroutine resumes and handles the\
    \ `TimeoutError` raised by the `task_coro()`.\n\nThis highlights how we can call\
    \ the `wait_for()` function with a timeout and to cancel a task if it is not completed\
    \ within a timeout.\n\n**NOTE:** Results will vary each time the program is run\
    \ given the use of random numbers.\n\n```\n>task got 1.4231068884240894\nGave\
    \ up waiting, task canceled\n```\n\nNext, let’s look at how we can handle coroutine\
    \ results in the order they are completed.\n\n## How to Handle Tasks In Completion\
    \ Order\n\nThe `asyncio.as_completed()` function will run a collection of tasks\
    \ and coroutines concurrently.\n\nMore importantly, it returns an iterable that\
    \ we can use to retrieve the awaitables in the order that they are completed.\n\
    \nIt allows us to execute many coroutines or tasks concurrently and get the results\
    \ from tasks as they are done, rather than the order we issued them.\n\nNow that\
    \ we know what `as_completed()` is, let’s look at how we can use it.\n\n## How\
    \ to Use asyncio.as_completed()\n\nThe `asyncio.as_completed()` function is called\
    \ with a collection of awaitables.\n\nThis may be a list, dict, or set, and may\
    \ contain `asyncio.Task` objects, coroutines, or other awaitables.\n\nAny coroutines\
    \ provided to `as_completed()` will be wrapped in a `Task` object for independent\
    \ execution.\n\nIt returns an iterable that when traversed will yield awaitables\
    \ in the provided list. These can be awaited by the caller in order to get results\
    \ in the order that tasks are completed, e.g. get the result from the next task\
    \ to complete.\n\nFor example:\n\n```\n...\n# iterate over awaitables\nfor task\
    \ in asyncio.as_completed(tasks):\n    # get the next result\n    result = await\
    \ task\n```\n\nThe `as_completed()` function also takes a `timeout` argument.\n\
    \nThis specifies how long the caller is willing to wait for all awaitables to\
    \ be done.\n\nFor example:\n\n```\n...\n# iterate over awaitables with a timeout\n\
    for task in asyncio.as_completed(tasks, timeout=10):\n    # get the next result\n\
    \    result = await task\n```\n\nIf the timeout elapses before all awaitables\
    \ are done, an `asyncio.TimeoutError` is raised and may need to be handled.\n\n\
    For example, we could handle it within the loop:\n\n```\n...\n# iterate over awaitables\
    \ with a timeout\nfor task in asyncio.as_completed(tasks, timeout=10):\n    #\
    \ handle a timeout\n    try:\n        # get the next result\n        result =\
    \ await task\n    except asyncio.TimeoutError:\n        # ...\n```\n\nThis is\
    \ not desirable because once the timeout has elapsed, an `asyncio.TimeoutError`\
    \ will be raised each time `next()` is called on the generator.\n\nTherefore,\
    \ it is better to wrap the entire loop in a try-except expression.\n\nFor example:\n\
    \n```\n...\n# handle a timeout\ntry:\n    # iterate over awaitables with a timeout\n\
    \    for task in asyncio.as_completed(tasks, timeout=10):\n        # get the next\
    \ result\n        result = await task\n```"
  mdcn: "运行示例首先会创建 `main()` 协程，并将其作为 asyncio 程序的入口点。\n\n`main()` 协程随后通过列表推导式创建一个包含十个任务的列表，每个任务提供一个从\
    \ 0 到 9 的唯一整数参数。\n\n接着，`main()` 协程被挂起，等待所有任务完成。\n\n任务开始执行。每个任务生成一个随机值，休眠片刻，然后报告其生成的值。\n\
    \n所有任务完成后，`main()` 协程恢复执行，并报告一条最终消息。\n\n此示例重点展示了如何使用 `wait()` 函数来等待一组任务完成。\n\n\
    这或许是该函数最常见的用法。\n\n**注意：** 由于使用了随机数，每次运行程序的结果都会有所不同。\n\n```\n>task 5 done with\
