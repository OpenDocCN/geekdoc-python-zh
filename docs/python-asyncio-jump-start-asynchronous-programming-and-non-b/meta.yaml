- img_proc: true
  md: "```\n...\n# wait for the first task to be completed\ndone, pending = await\
    \ asyncio.wait(tasks,\n    return_when=asyncio.FIRST_COMPLETED)\n```\n\nWhen the\
    \ first task is complete and returned in the done set, the remaining tasks are\
    \ not canceled and continue to execute concurrently.\n\nWe can wait for the first\
    \ task to fail with an exception by setting return_when to FIRST_EXCEPTION.\n\n\
    For example:\n\n```\n...\n# wait for the first task to fail\ndone, pending = await\
    \ asyncio.wait(tasks,\n    return_when=asyncio.FIRST_EXCEPTION)\n```\n\nIn this\
    \ case, the done set will contain the first task that failed with an exception.\
    \ If no task fails with an exception, the done set will contain all tasks and\
    \ wait() will return only after all tasks are completed.\n\nWe can specify how\
    \ long we are willing to wait for the given condition via a timeout argument in\
    \ seconds.\n\nIf the timeout expires before the condition is met, the tuple of\
    \ tasks is returned with whatever subset of tasks do meet the condition at that\
    \ time, e.g. the subset of tasks that are completed if waiting for all tasks to\
    \ complete.\n\nFor example:\n\n```\n...\n# wait for all tasks to complete with\
    \ a timeout\ndone, pending = await asyncio.wait(tasks, timeout=3)\n```\n\nIf the\
    \ timeout is reached before the condition is met, an exception is not raised and\
    \ the remaining tasks are not canceled.\n\nNow that we know how to use the asyncio.wait()\
    \ function, let's look at a worked example."
