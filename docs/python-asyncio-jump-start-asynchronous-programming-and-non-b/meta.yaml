  - '[PAGE 158]


    We can write data to the socket using an asyncio.StreamWriter.


    Data is written as bytes.


    Byte data can be written to the socket using the `write()` method.


    For example:


    ```

    ...

    # write byte data

    writer.write(byte_data)

    ```


    Alternatively, multiple *lines* of byte data organized into a list or iterable
    can be written using the `writelines()` method.


    For example:


    ```

    ...

    # write lines of byte data

    writer.writelines(byte_lines)

    ```


    Neither method for writing data suspends the calling coroutine.


    After writing byte data it is a good idea to drain the socket via the `drain()`
    method.


    This is a coroutine and will suspend the caller until the bytes have been transmitted
    and the socket is ready.


    For example:


    ```

    ...

    # write byte data

    writer.write(byte_data)

    # wait for data to be transmitted

    await writer.drain()

    ```


    String data can be converted into byte data for transmission by encoding it. This
    can be achieved using the `encode()` method on the string which will return byte
    data encoded with the default UTF8 encoding, ready for'
