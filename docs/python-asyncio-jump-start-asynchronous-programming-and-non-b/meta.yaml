  md: '# # What are Coroutines


    A coroutine is a function that can be suspended and resumed.


    It is often defined as a generalized subroutine.


    A subroutine is a function that can be executed, starting at one point and finishing
    at another point. Whereas, a coroutine can be executed then suspended, and resumed
    many times before finally terminating.


    Specifically, coroutines have control over when exactly they suspend their execution.


    This may involve the use of a specific expression, such as an await expression,
    or like a yield expression in a generator.


    A coroutine may suspend for many reasons, such as executing another coroutine,
    e.g. awaiting another task, or waiting for some external resources, such as a
    socket connection or process to return data.


    Coroutines are used for concurrency.


    Many coroutines can be created and executed at the same time. They have control
    over when they will suspend and resume, allowing them to cooperate as to when
    concurrent tasks are executed.


    This is called cooperative multitasking and is different to the multitasking typically
    used with threads called preemptive multitasking.


    Preemptive multitasking involves the operating system choosing what threads to
    suspend and resume and when to do so, as opposed to the tasks themselves deciding
    in the case of cooperative multitasking.


    Now that we have some idea of what a coroutine is, let’s deepen this understanding
    by comparing them to other familiar programming constructs.


    # ## Coroutine vs Routine and Subroutine'
  merge: -1
  pgno: 21
- img_proc: true
  md: 'A *routine* and *subroutine* often refer to the same thing in modern programming.


    Perhaps more correctly, a routine is a program, whereas a subroutine is a function
    in the program.


    A routine has subroutines.


    It is a discrete module of expressions that is assigned a name, may take arguments
    and may return a value.


    +   - **Subroutine:** A module of instructions that can be executed on demand,
    typically named, and may take arguments and return a value. Also called a function.


    A subroutine is executed, runs through the expressions, and returns somehow. Typically,
    a subroutine is called by another subroutine.


    A coroutine is an extension of a subroutine. This means that a subroutine is a
    special type of coroutine.


    A coroutine is like a subroutine in many ways, such as:


    +   - They both are discrete named modules of expressions.

    - They both can take arguments, or not.

    - They both can return a value, or not.


    The main difference is that a coroutine chooses to suspend and resume its execution
    many times before returning and exiting.


    Both coroutines and subroutines can call other examples of themselves. A subroutine
    can call other subroutines. A coroutine executes other coroutines. However, a
    coroutine can also execute other subroutines.


    When a coroutine executes another coroutine, it must suspend its execution and
    allow the other coroutine to run.'
