    \ the context manager')\n\n    # exit the async context manager\n    async def\
    \ __aexit__(self, exc_type, exc, tb):\n        # report a message\n        print('>exiting\
    \ the context manager')\n```\n\nBecause each of the methods are coroutines, they\
    \ may themselves await coroutines or tasks.\n\nFor example:\n\n```\n# define an\
    \ asynchronous context manager\nclass AsyncContextManager:\n    # enter the async\
