    \ be defined and created, but they can only be executed within an event loop.\
    \ The event loop that executes coroutines, manages the cooperative multitasking\
    \ between coroutines. It is also responsible for executing callback functions\
    \ and managing the non-blocking network I/O.\n\nIn asyncio applications, we don’t\
    \ need to interact directly with the asyncio event loop, other than starting it.\
    \ Nevertheless, there is a low-level API for getting access to the event loop\
    \ object and methods for interacting with it."
- md: "The way to start the asyncio event loop is via the asyncio.run() function.\n\
    \nThis function takes one coroutine and returns the value of the coroutine. The\
    \ provided coroutine can be used as the entry point into the coroutine-based program.\
    \ I like to call it the *main coroutine*, similar to the main thread and main\
    \ process in other forms of concurrency.\n\nFor example:\n\n```\n...\n# start\
    \ an asyncio program\nasyncio.run(main())\n```\n\nIn addition to the event loop\
    \ infrastructure, the asyncio module provides many high-level features for using\
    \ our asynchronous programs, such as:\n\n- Utility functions for creating and\
    \ scheduling asynchronous tasks.\n- Functions and classes for opening and managing\
    \ non-blocking TCP socket connections.\n- Functions and classes for starting and\
    \ managing non-blocking subprocesses.\n- Synchronization primitives for encouraging\
    \ coroutine safety.\n- Coroutines-safe queues for message passing between coroutines.\n\
    \nNow that we have seen how Python supports coroutines and the asyncio module\
    \ supports developing coroutine-based asynchronous programming, let’s look at\
    \ a worked example.\n\n## Asyncio Hello World Example\n\nThe first program we\
    \ write in a new programming language is a *hello world* program.\n\nThe asyncio\
    \ module is different from most other modules.\n\nUsing it is like writing code\
    \ in a new programming language. It’s different from *normal* programming.\n\n\
    It is the reason why so many developers are excited to use it, and why others\
    \ are afraid to get started.\n\nThe first step into asyncio is to write a hello\
    \ world. The second step is to understand what it does.\n\n### Asyncio Hello World\n\
    \nLet’s write a hello world for asyncio.\n\nThe complete example is listed below.\n\
    \nType the example and run it, or copy-paste it.\n\nThis is our first step on\
    \ the asyncio journey.\n\n```python\n# SuperFastPython.com\n# example of a hello\
    \ world program for asyncio\nimport asyncio\n\n# define a coroutine\nasync def\
    \ custom_coroutine():\n    # report a message\n    print('Hello world')\n\n# execute\
    \ the coroutine\nasyncio.run(custom_coroutine())\n```\n\nRunning the example reports\
    \ the *hello world* message.\n\n```\nHello world\n```\n\nFull of questions? Good!\n\
    \nNow, let’s slow everything down and understand what this example does.\n\n##\
    \ Asyncio Hello World in Detail\n\nWe know how to type and run a hello world for\
    \ asyncio, now let’s understand what it does (at least from a birds-eye view).\n\
    \nWhat should a hello world program for asyncio do?\n\nIf asyncio is for coroutine-based\
    \ concurrency, we should create and run a coroutine.\n\nIf we were exploring thread-based\
    \ concurrency in the threading module, we would create and run a thread. This\
    \ would be the same if we were exploring process-based concurrency in the multiprocessing\
    \ module.\n\nRecall, a subroutine is a function. For example, we can define a\
    \ function to print hello world as follows:\n\n```python\n# custom routine\ndef\
    \ custom_routine():\n    # report a message\n    print('Hello world')\n```\n\n\
    A coroutine is a function that can be suspended.\n\nWe can define a coroutine\
    \ just like a normal function, except it has the added async keyword before the\
    \ def keyword.\n\nFor example:\n\n```python\n# define a coroutine\nasync def custom_coroutine():\n\
    \    # report a message\n    print('Hello world')\n```\n\nSo far, so good.\n\n\
    We cannot execute a coroutine like a subroutine.\n\nIf we call our custom_coroutine\
    \ directly, we get warning messages that look like an error.\n\nFor example:\n\
    \n```python\n# SuperFastPython.com\n# example of calling a coroutine directly\n\
    \n# define a coroutine\nasync def custom_coroutine():\n    # report a message\n\
    \    print('Hello world')\n\n# call the coroutine directly\ncustom_coroutine()\
    \ # raises warning\n```\n\nRunning the example results in warning messages that\
    \ look scary.\n\nThe first says that we never *awaited* our coroutine.\n\nThe\
    \ second is not at all helpful.\n\n```\n...\nRuntimeWarning: coroutine '...' was\
    \ never awaited\n  custom_coroutine()\nRuntimeWarning: Enable tracemalloc to get\
    \ the object allocation traceback\n```\n\nWe cannot call a coroutine directly.\n\
    \nInstead, we must have the routine called for us by the asyncio run time, called\
    \ the event loop.\n\nThis can be achieved by calling the asyncio.run() module\
    \ function.\n\nThis function will start the asyncio event loop in the current\
    \ thread, and we can only have one of these running in a thread at a time.\n\n\
    It takes a coroutine as an argument.\n\nNot the name of the coroutine, like the\
    \ target argument of a threading.Thread or multiprocessing.Process, instead it\
    \ takes an instance of a coroutine.\n\nWe can create an instance of a coroutine\
    \ just like creating an object, and it looks like we are calling the coroutine.\n\
    \nFor example:\n\n```python\n...\n# execute the coroutine\nasyncio.run(custom_coroutine())\n\
    ```\n\nThis will start the event loop and execute the coroutine and print the\
    \ message.\n\nBut, let’s unpack this further.\n\nIf we are creating an instance\
    \ of a coroutine and passing it to the asyncio.run() module function to execute,\
    \ why not assign it first?\n\nFor example:\n\n```python\n...\n# create the coroutine\
    \ and assign it to a variable\ncoro = custom_coroutine()\n# execute the coroutine\n\
    asyncio.run(coro)\n```\n\nThis makes more sense now.\n\nWe can clearly see the\
    \ creation of the coroutine and it is passed to the asyncio.run() function for\
    \ execution.\n\nThere’s one more thing.\n\nIf we don’t execute an instance of\
    \ a coroutine, we will get a warning.\n\nThis means that if we create and assign\
    \ an instance of our custom coroutine and do not pass it to asyncio.run(), a warning\
    \ message is reported.\n\nFor example:\n\n```python\n# SuperFastPython.com\n#\
    \ example of creating but not awaiting a coroutine\n\n# define a coroutine\nasync\
    \ def custom_coroutine():\n    # report a message\n    print('Hello world')\n\n\
    # create the coroutine and assign it to a variable\ncoro = custom_coroutine()\
    \ # raises warning\n```\n\nRunning the example creates the coroutine, but does\
    \ not do anything with it.\n\nThe runtime then reports this as a warning message,\
    \ similar to what we saw when we called the coroutine directly.\n\n```\nsys:1:\
    \ RuntimeWarning: coroutine '...' was never awaited\n```\n\nSo now we know what\
    \ our hello world example does. We will go into more detail in later lessons.\n\
    \nNow that we have seen our first coroutine and asyncio program, let’s look at\
    \ when we should use asyncio, and when we shouldn’t.\n\n## When to Use Asyncio\n\
    \nThere are perhaps three top reasons to adopt asyncio in a project, they are:\n\
    \n- The non-blocking I/O with subprocesses or socket connections is required.\n\
    - The benefits of coroutines outweigh the benefits of threads and processes.\n\
    - The asynchronous programming paradigm is preferred or required.\n\n### Non-Blocking\
    \ I/O is Required\n\nAsyncio is specifically designed for non-blocking I/O with\
    \ subprocesses and TCP socket connections.\n\nIf an application requires a large\
    \ number of concurrent socket or subprocess tasks then asyncio is an obvious choice.\n\
    \nPoster-child examples include:\n\n- Executing and checking the results of many\
    \ commands on a system.\n- Making and managing many socket connections.\n- Serving\
    \ access to many client socket connections.\n\nAlthough this is the focus of the\
    \ asyncio module, it is not the only reason to adopt it in a project.\n\n### Coroutine-Based\
    \ Concurrency is Required\n\nCoroutines and asyncio offer an alternative to concurrency\
    \ with threads or processes.\n\nEach of threads, processes, and coroutines have\
    \ benefits and limitations. Coroutines and the asyncio module together provide\
    \ an alternative to concurrent programming.\n\nGenerally, coroutines are lightweight,\
    \ they are just a type of function. They use less memory and are faster to start,\
    \ suspend, and resume than threads and processes that are managed by the underlying\
    \ operating system.\n\nAn asyncio program may have orders of magnitude more concurrent\
    \ coroutines than a threading program can have concurrent threads or a multiprocessing\
    \ program can have concurrent processes.\n\nAsyncio may be required if a program\
    \ may have tens or hundreds of thousands of concurrent tasks.\n\n### Asynchronous\
    \ Programming is Required\n\nAsynchronous programming is a new or modern type\
    \ of programming.\n\nIt has proven very popular in other programming languages,\
    \ such as JavaScript.\n\nCoroutines and asyncio unlock this capability in the\
    \ Python interpreter and standard library, with no third-party libraries needed.\n\
    \nAdopting asyncio for a project may be appropriate if the asynchronous programming\
    \ paradigm is preferred. Sometimes a programming paradigm is chosen beforehand,\
    \ making it a de facto requirement.\n\nAsynchronous programming with asyncio could\
    \ be used instead of or in complement to a procedural-programming, object-oriented\
    \ programming or functional programming paradigm.\n\n## When Not to Use Asyncio\n\
    \nAsyncio should not always be used.\n\nPython provides robust and capable thread-based\
    \ concurrency and process-based concurrency. These options should be used in most\
    \ cases for concurrent programming in Python for I/O-bound tasks and CPU-bound\
    \ tasks respectively."
  mdcn: "启动 asyncio 事件循环的方式是通过 `asyncio.run()` 函数。\n\n该函数接受一个协程并返回该协程的值。提供的协程可以作为基于协程的程序的入口点。我喜欢称它为*主协程*，类似于其他并发形式中的主线程和主进程。\n\
    \n例如：\n\n```\n...\n# 启动一个 asyncio 程序\nasyncio.run(main())\n```\n\n除了事件循环基础设施外，asyncio\
    \ 模块还提供了许多用于使用我们异步程序的高级功能，例如：\n\n- 用于创建和调度异步任务的实用函数。\n- 用于打开和管理非阻塞 TCP 套接字连接的函数和类。\n\
    - 用于启动和管理非阻塞子进程的函数和类。\n- 用于促进协程安全的同步原语。\n- 用于协程间消息传递的协程安全队列。\n\n既然我们已经了解了 Python\
    \ 如何支持协程以及 asyncio 模块如何支持开发基于协程的异步编程，让我们来看一个实际的例子。\n\n## Asyncio Hello World 示例\n\
    \n我们用新编程语言编写的第一个程序是 *hello world* 程序。\n\nasyncio 模块与大多数其他模块不同。\n\n使用它就像用一种新的编程语言编写代码。它与*正常*编程不同。\n\
    \n这就是为什么许多开发者兴奋地使用它，而另一些人则害怕开始的原因。\n\n进入 asyncio 的第一步是编写一个 hello world。第二步是理解它做了什么。\n\
    \n### Asyncio Hello World\n\n让我们为 asyncio 编写一个 hello world。\n\n完整的示例如下所示。\n\n\
    输入示例并运行它，或者复制粘贴它。\n\n这是我们在 asyncio 旅程上的第一步。\n\n```python\n# SuperFastPython.com\n\
    # asyncio 的 hello world 程序示例\nimport asyncio\n\n# 定义一个协程\nasync def custom_coroutine():\n\
    \    # 报告一条消息\n    print('Hello world')\n\n# 执行协程\nasyncio.run(custom_coroutine())\n\
    ```\n\n运行该示例会报告 *hello world* 消息。\n\n```\nHello world\n```\n\n充满疑问？很好！\n\n现在，让我们放慢一切，理解这个示例做了什么。\n\
    \n## Asyncio Hello World 详解\n\n我们知道如何输入和运行 asyncio 的 hello world，现在让我们理解它做了什么（至少从鸟瞰的角度看）。\n\
    \nasyncio 的 hello world 程序应该做什么？\n\n如果 asyncio 用于基于协程的并发，我们应该创建并运行一个协程。\n\n如果我们正在探索\
    \ threading 模块中的基于线程的并发，我们将创建并运行一个线程。如果我们正在探索 multiprocessing 模块中的基于进程的并发，情况也是如此。\n\
    \n回想一下，子程序是一个函数。例如，我们可以定义一个打印 hello world 的函数，如下所示：\n\n```python\n# 自定义子程序\ndef\
    \ custom_routine():\n    # 报告一条消息\n    print('Hello world')\n```\n\n协程是一个可以被挂起的函数。\n\
    \n我们可以像定义普通函数一样定义协程，只是它在 `def` 关键字前添加了 `async` 关键字。\n\n例如：\n\n```python\n# 定义一个协程\n\
    async def custom_coroutine():\n    # 报告一条消息\n    print('Hello world')\n```\n\n\
    到目前为止，一切顺利。\n\n我们不能像执行子程序那样执行协程。\n\n如果我们直接调用我们的 `custom_coroutine`，我们会得到看起来像错误的警告消息。\n\
    \n例如：\n\n```python\n# SuperFastPython.com\n# 直接调用协程的示例\n\n# 定义一个协程\nasync def\
    \ custom_coroutine():\n    # 报告一条消息\n    print('Hello world')\n\n# 直接调用协程\ncustom_coroutine()\
    \ # 引发警告\n```\n\n运行该示例会导致看起来很吓人的警告消息。\n\n第一个说我们从未*等待*（awaited）我们的协程。\n\n第二个则完全没有帮助。\n\
    \n```\n...\nRuntimeWarning: coroutine '...' was never awaited\n  custom_coroutine()\n\
    RuntimeWarning: Enable tracemalloc to get the object allocation traceback\n```\n\
    \n我们不能直接调用协程。\n\n相反，我们必须让 asyncio 运行时（称为事件循环）为我们调用该协程。\n\n这可以通过调用 `asyncio.run()`\
    \ 模块函数来实现。\n\n该函数将在当前线程中启动 asyncio 事件循环，并且我们一次只能在一个线程中运行一个这样的事件循环。\n\n它接受一个协程作为参数。\n\
    \n不是协程的名称，就像 `threading.Thread` 或 `multiprocessing.Process` 的 `target` 参数那样，而是接受一个协程的实例。\n\
    \n我们可以像创建对象一样创建一个协程的实例，看起来就像我们在调用协程。\n\n例如：\n\n```python\n...\n# 执行协程\nasyncio.run(custom_coroutine())\n\
    ```\n\n这将启动事件循环并执行协程并打印消息。\n\n但是，让我们进一步分解。\n\n如果我们正在创建一个协程的实例并将其传递给 `asyncio.run()`\
    \ 模块函数来执行，为什么不先赋值呢？\n\n例如：\n\n```python\n...\n# 创建协程并将其赋值给一个变量\ncoro = custom_coroutine()\n\
    # 执行协程\nasyncio.run(coro)\n```\n\n现在这更有道理了。\n\n我们可以清楚地看到协程的创建，并且它被传递给 `asyncio.run()`\
    \ 函数执行。\n\n还有一件事。\n\n如果我们不执行协程的实例，我们会得到一个警告。\n\n这意味着如果我们创建并赋值了我们自定义协程的实例，但没有将其传递给\
    \ `asyncio.run()`，就会报告一条警告消息。\n\n例如：\n\n```python\n# SuperFastPython.com\n# 创建但不等待协程的示例\n\
    \n# 定义一个协程\nasync def custom_coroutine():\n    # 报告一条消息\n    print('Hello world')\n\
    \n# 创建协程并将其赋值给一个变量\ncoro = custom_coroutine() # 引发警告\n```\n\n运行该示例会创建协程，但不会对其执行任何操作。\n\
    \n然后运行时会将其报告为警告消息，类似于我们直接调用协程时看到的情况。\n\n```\nsys:1: RuntimeWarning: coroutine\
    \ '...' was never awaited\n```\n\n所以现在我们知道我们的 hello world 示例做了什么。我们将在后面的课程中更详细地介绍。\n\
    \n既然我们已经看到了我们的第一个协程和 asyncio 程序，让我们看看何时应该使用 asyncio，何时不应该。\n\n## 何时使用 Asyncio\n\
    \n在项目中采用 asyncio 可能有三个主要原因，它们是：\n\n- 需要与子进程或套接字连接进行非阻塞 I/O。\n- 协程的好处大于线程和进程的好处。\n\
    - 异步编程范式是首选或必需的。\n\n### 需要非阻塞 I/O\n\nAsyncio 专门设计用于与子进程和 TCP 套接字连接进行非阻塞 I/O。\n\
    \n如果应用程序需要大量并发的套接字或子进程任务，那么 asyncio 是一个显而易见的选择。\n\n典型的例子包括：\n\n- 在系统上执行和检查许多命令的结果。\n\
    - 建立和管理许多套接字连接。\n- 为许多客户端套接字连接提供访问服务。\n\n尽管这是 asyncio 模块的重点，但它并不是在项目中采用它的唯一原因。\n\
    \n### 需要基于协程的并发\n\n协程和 asyncio 为使用线程或进程进行并发提供了替代方案。\n\n线程、进程和协程各有其优点和局限性。协程和 asyncio\
    \ 模块共同为并发编程提供了一种替代方案。\n\n通常，协程是轻量级的，它们只是一种函数类型。与由底层操作系统管理的线程和进程相比，它们使用更少的内存，并且启动、挂起和恢复的速度更快。\n\
    \n一个 asyncio 程序可能拥有比线程程序能拥有的并发线程或 multiprocessing 程序能拥有的并发进程多出几个数量级的并发协程。\n\n\
    如果一个程序可能有成千上万的并发任务，可能就需要使用 asyncio。\n\n### 需要异步编程\n\n异步编程是一种新的或现代的编程类型。\n\n它在其他编程语言（如\
    \ JavaScript）中已被证明非常流行。\n\n协程和 asyncio 在 Python 解释器和标准库中解锁了这种能力，无需第三方库。\n\n如果异步编程范式是首选，那么为项目采用\
    \ asyncio 可能是合适的。有时编程范式是预先选择的，使其成为事实上的要求。\n\n使用 asyncio 的异步编程可以替代或补充过程式编程、面向对象编程或函数式编程范式。\n\
    \n## 何时不使用 Asyncio\n\nAsyncio 不应总是被使用。\n\nPython 提供了强大且功能齐全的基于线程的并发和基于进程的并发。对于\
    \ I/O 密集型任务和 CPU 密集型任务，这些选项应分别用于 Python 中的大多数并发编程情况。"
