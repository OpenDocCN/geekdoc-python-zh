- md: '## Learning Outcomes


    This book will transform you from a Python developer into a Python developer that
    can confidently bring concurrency to your projects with asyncio.


    After working through all of the lessons in this book, you will know:


    - How to define, create, and run coroutines and how to use the async/await expressions.

    - How to create asynchronous tasks, query their status, cancel them and add callback
    functions.

    - How to run many coroutines concurrently in a group and handle their results.

    - How to wait for many coroutines to complete, meet a condition, or timeout.

    - How to define, create and use asynchronous iterators, generators, and context
    managers.

    - How to use the async for and async with expressions in asyncio programs.

    - How to synchronize and coordinate coroutines with locks, semaphores, events
    and condition variables.

    - How to share data between coroutines using coroutine-safe queues.

    - How to run, read, and write from subprocesses and streams with coroutines.

    - How to develop a concurrent and dynamically updating port scanner using non-blocking
    I/O.


    Next, let’s discover how we can get help when working through the book.


    ## Getting Help


    The lessons in this book were designed to be easy to read and follow.


    Nevertheless, sometimes we need a little extra help.


    A list of further reading resources is provided at the end of each lesson. These
    can be helpful if you are interested in learning more about the topic covered,
    such as fine-grained details of the standard library and API functions used.


    The conclusions at the end of the book provide a complete list of websites and
    books that can help if you want to learn more about Python concurrency and the
    relevant parts of the Python standard library. It also lists places where you
    can go online and ask questions about Python concurrency.


    Finally, if you ever have questions about the lessons or code in this book, you
    can contact me any time and I will do my best to help. My contact details are
    provided at the end of the book.


    Now that we know what’s coming, let’s get started.


    ## Next


    Next up in the first lesson, we will discover coroutine-based concurrency with
    asyncio in Python.


    ## Lesson 01: Asyncio Concurrency


    In this lesson, we will explore asyncio, including coroutines, asynchronous programming
    and the asyncio module. We will develop an asyncio *hello world* program and understand
    how it works.


    After completing this lesson, you will know:


    - What is a coroutine and how it relates to subroutines, threads, and generators.

    - What is asynchronous programming and asynchronous I/O.

    - What the asyncio module is and the capabilities it provides.

    - How to develop a *hello world* asyncio program and know how it works.

    - When to use asyncio in your programs.


    Let’s get started.


    ### What are Coroutines


    A coroutine is a function that can be suspended and resumed.


    It is often defined as a generalized subroutine.


    A subroutine is a function that can be executed, starting at one point and finishing
    at another point. Whereas, a coroutine can be executed then suspended, and resumed
    many times before finally terminating.


    Specifically, coroutines have control over when exactly they suspend their execution.


    This may involve the use of a specific expression, such as an await expression,
    or like a yield expression in a generator.


    A coroutine may suspend for many reasons, such as executing another coroutine,
    e.g. awaiting another task, or waiting for some external resources, such as a
    socket connection or process to return data.


    Coroutines are used for concurrency.


    Many coroutines can be created and executed at the same time. They have control
    over when they will suspend and resume, allowing them to cooperate as to when
    concurrent tasks are executed.


    This is called cooperative multitasking and is different to the multitasking typically
    used with threads called preemptive multitasking.


    Preemptive multitasking involves the operating system choosing what threads to
    suspend and resume and when to do so, as opposed to the tasks themselves deciding
    in the case of cooperative multitasking.


    Now that we have some idea of what a coroutine is, let’s deepen this understanding
    by comparing them to other familiar programming constructs.


    ### Coroutine vs Routine and Subroutine


    A *routine* and *subroutine* often refer to the same thing in modern programming.


    Perhaps more correctly, a routine is a program, whereas a subroutine is a function
    in the program.


    A routine has subroutines.


    It is a discrete module of expressions that is assigned a name, may take arguments
    and may return a value.


    - **Subroutine:** A module of instructions that can be executed on demand, typically
    named, and may take arguments and return a value. Also called a function.


    A subroutine is executed, runs through the expressions, and returns somehow. Typically,
    a subroutine is called by another subroutine.


    A coroutine is an extension of a subroutine. This means that a subroutine is a
    special type of coroutine.


    A coroutine is like a subroutine in many ways, such as:


    - They both are discrete named modules of expressions.

    - They both can take arguments, or not.

    - They both can return a value, or not.


    The main difference is that a coroutine chooses to suspend and resume its execution
    many times before returning and exiting.


    Both coroutines and subroutines can call other examples of themselves. A subroutine
    can call other subroutines. A coroutine executes other coroutines. However, a
    coroutine can also execute other subroutines.


    When a coroutine executes another coroutine, it must suspend its execution and
    allow the other coroutine to run as well.


    This makes a coroutine calling another coroutine more powerful than a subroutine
    calling another subroutine. It is central to the cooperative multitasking facilitated
    by coroutines.


    Next, let’s look at how coroutines are related to generators.


    ### Coroutine vs Generator


    A generator is a special function that can suspend its execution.


    A generator function can be defined like a normal function although it uses a
    yield expression at the point it will suspend its execution and return a value.


    A generator function will return a generator iterator object that can be traversed,
    such as via a for-loop. Each time the generator is executed, it runs from the
    last point it was suspended to the next yield expression.


    A coroutine can suspend or yield to another coroutine using an await expression.
    It will then resume from this point once the awaited coroutine has been completed.


    We can think of a generator as a special type of coroutine and cooperative multitasking
    used in loops.


    Before coroutines were developed, generators were extended so that they can be
    used like coroutines in our programs.


    This required a lot of technical knowledge of generators and the development of
    custom task schedulers.


    This was made possible via changes to the generators and the introduction of the
    yield from expression.


    These were later deprecated in favor of the modern async/await expressions.


    Next, let’s look at how coroutines are different to threads.


    ### Coroutine vs Thread


    A thread refers to a thread of execution in a computer program.


    Each program is a process and has at least one thread that executes instructions
    for that process.


    When we run a script, it starts an instance of the interpreter that runs our code
    in the main thread. The main thread is the default thread of a process.


    The underlying operating system controls how new threads are created, when threads
    are executed, and which CPU core executes them.


    A coroutine is more lightweight than a thread.


    A coroutine is defined as a function, whereas a thread is an object created and
    managed by the underlying operating system and represented as a threading.Thread
    object.


    - **Thread:** Unit of concurrency managed by the operating system, represented
    by an object. Belongs to a process, may execute many coroutines.


    This means that coroutines are typically faster to create and start executing
    and take up less memory. Conversely, threads are slower than coroutines to create
    and start and take up more memory.


    Coroutines execute within one thread, therefore a single thread may execute many
    coroutines.


    Now that we are familiar with coroutines, let’s look at asynchronous programming.'
  mdcn: '## 学习成果


    本书将帮助你从一名Python开发者，转变为能够自信地在项目中运用asyncio实现并发的Python开发者。


    学完本书所有课程后，你将掌握：


    - 如何定义、创建和运行协程，以及如何使用async/await表达式。

    - 如何创建异步任务、查询其状态、取消任务并添加回调函数。

    - 如何在组中并发运行多个协程并处理其结果。

    - 如何等待多个协程完成、满足条件或超时。

    - 如何定义、创建和使用异步迭代器、生成器和上下文管理器。

    - 如何在asyncio程序中使用async for和async with表达式。

    - 如何使用锁、信号量、事件和条件变量同步和协调协程。

    - 如何使用协程安全队列在协程之间共享数据。

    - 如何通过协程运行、读写子进程和流。

    - 如何使用非阻塞I/O开发一个并发且动态更新的端口扫描器。


    接下来，让我们了解在学习本书时如何获取帮助。


    ## 获取帮助


    本书的课程设计得易于阅读和理解。


    然而，有时我们需要一些额外的帮助。


    每节课末尾都提供了延伸阅读资源列表。如果你对所涵盖的主题（如标准库和使用的API函数的详细细节）有更深入的兴趣，这些资源会很有帮助。


    书末的结论部分提供了一个完整的网站和书籍列表，如果你想了解更多关于Python并发以及Python标准库相关部分的内容，这些资源会有所帮助。它还列出了你可以在线提问关于Python并发问题的地方。


    最后，如果你对本书中的课程或代码有任何疑问，可以随时联系我，我会尽力提供帮助。我的联系方式在书末提供。


    现在我们已经了解了接下来的内容，让我们开始吧。


    ## 下一步


    第一课的下一步，我们将探索Python中基于asyncio的协程并发。


    ## 第01课：Asyncio并发


    在本课中，我们将探索asyncio，包括协程、异步编程和asyncio模块。我们将开发一个asyncio *hello world*程序并理解其工作原理。


    完成本课后，你将了解：


    - 什么是协程，以及它与子程序、线程和生成器的关系。

    - 什么是异步编程和异步I/O。

    - asyncio模块是什么，它提供了哪些功能。

    - 如何开发一个*hello world* asyncio程序并了解其工作原理。

    - 何时在程序中使用asyncio。


    让我们开始吧。


    ### 什么是协程


    协程是一种可以被挂起和恢复的函数。


    它通常被定义为一种广义的子程序。


    子程序是一种可以从一个点开始执行并在另一个点结束的函数。而协程可以在执行后被挂起，并在最终终止前多次恢复。


    具体来说，协程可以控制何时挂起其执行。


    这可能涉及使用特定的表达式，例如await表达式，或者像生成器中的yield表达式。


    协程可能因多种原因挂起，例如执行另一个协程（例如等待另一个任务），或等待某些外部资源，如套接字连接或进程返回数据。


    协程用于并发。


    可以同时创建和执行多个协程。它们控制何时挂起和恢复，从而允许它们协作决定何时执行并发任务。


    这被称为协作式多任务处理，与线程通常使用的抢占式多任务处理不同。


    抢占式多任务处理涉及操作系统选择挂起和恢复哪些线程以及何时执行，而协作式多任务处理则由任务本身决定。


    现在我们对协程有了一些概念，让我们通过将它们与其他熟悉的编程结构进行比较来加深理解。


    ### 协程与例程和子程序


    在现代编程中，*例程*和*子程序*通常指同一事物。


    或许更准确地说，例程是一个程序，而子程序是程序中的一个函数。


    例程包含子程序。


    它是一个离散的表达式模块，被赋予一个名称，可以接受参数并可能返回值。


    - **子程序：** 一个可以根据需要执行的指令模块，通常有名称，可以接受参数并返回值。也称为函数。


    子程序被执行，运行表达式，并以某种方式返回。通常，子程序由另一个子程序调用。


    协程是子程序的扩展。这意味着子程序是协程的一种特殊类型。


    协程在许多方面类似于子程序，例如：


    - 它们都是离散的命名表达式模块。

    - 它们都可以接受参数，或者不接受。

    - 它们都可以返回值，或者不返回。


    主要区别在于协程可以选择在返回和退出之前多次挂起和恢复其执行。


    协程和子程序都可以调用其他实例。子程序可以调用其他子程序。协程执行其他协程。然而，协程也可以执行其他子程序。


    当协程执行另一个协程时，它必须挂起其执行并允许另一个协程运行。


    这使得协程调用另一个协程比子程序调用另一个子程序更强大。这是协程促进的协作式多任务处理的核心。


    接下来，让我们看看协程与生成器的关系。


    ### 协程与生成器


    生成器是一种可以挂起其执行的特殊函数。


    生成器函数可以像普通函数一样定义，尽管它在挂起执行并返回值的点使用yield表达式。


    生成器函数将返回一个生成器迭代器对象，该对象可以被遍历，例如通过for循环。每次执行生成器时，它从上次挂起的点运行到下一个yield表达式。


    协程可以使用await表达式挂起或让出给另一个协程。一旦被等待的协程完成，它将从该点恢复。


    我们可以将生成器视为一种特殊类型的协程和用于循环的协作式多任务处理。


    在协程开发之前，生成器被扩展，以便可以在我们的程序中像协程一样使用。


    这需要大量关于生成器的技术知识和自定义任务调度器的开发。


    这通过生成器的更改和yield from表达式的引入成为可能。


    这些后来被弃用，转而使用现代的async/await表达式。


    接下来，让我们看看协程与线程的不同之处。


    ### 协程与线程


    线程是指计算机程序中的执行线程。


    每个程序都是一个进程，并且至少有一个线程执行该进程的指令。


    当我们运行脚本时，它会启动一个解释器实例，在主线程中运行我们的代码。主线程是进程的默认线程。


    底层操作系统控制如何创建新线程、何时执行线程以及哪个CPU核心执行它们。


    协程比线程更轻量级。


    协程被定义为一个函数，而线程是由底层操作系统创建和管理的对象，表示为threading.Thread对象。


    - **线程：** 由操作系统管理的并发单元，由对象表示。属于一个进程，可以执行多个协程。


    这意味着协程通常创建和开始执行更快，并且占用更少的内存。相反，线程比协程创建和开始执行更慢，并且占用更多内存。


    协程在一个线程内执行，因此单个线程可以执行多个协程。


    现在我们已经熟悉了协程，让我们看看异步编程。'
