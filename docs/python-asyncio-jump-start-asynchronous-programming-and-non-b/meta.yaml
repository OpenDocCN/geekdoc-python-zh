    \ sequentially\n    for port in ports:\n        if await test_port_number(host,\
    \ port):\n            print(f'> {host}:{port} [OPEN]')\n\n# define a host and\
    \ ports to scan\nhost = 'python.org'\nports = range(1, 1024)\n# start the asyncio\
    \ program\nasyncio.run(main(host, ports))\n```\n\n运行此示例会尝试连接1到1,023（1,024减1）之间的每个端口号，并报告所有开放的端口。\n\
    \n在这个例子中，我们可以看到80端口按预期为HTTP开放，443端口也为HTTPS开放。\n\n程序运行正常，但速度非常慢。\n\n在我的系统上，它大约花了51分钟。这是有道理的。如果我们测试1,023个端口，并且大多数端口都是关闭的，那么我们预计每次尝试需要等待3秒，即1,023×3等于3,069秒。将其转换为分钟，3069/60约等于51.15分钟。\n\
    \n```\n> python.org:80 [OPEN]\n> python.org:443 [OPEN]\n```\n\nasyncio的好处在于它可以并发执行协程，特别是那些执行非阻塞I/O的协程。\n\
    \n接下来，我们将研究如何并发运行协程以加速这个端口扫描过程。\n\n## 如何并发扫描端口（*快速方法*）\n\n我们可以使用asyncio并发扫描端口。\n\
    \n每个端口可以在一个单独的协程中并发测试。\n\n打开连接会挂起调用者，允许其他协程运行。那些尝试连接到未开放端口的协程将保持挂起状态，直到超时时间过去，从而允许其他协程运行。\n\
    \n这可以通过为每个要扫描的端口创建一个协程来实现，然后并发执行所有协程并等待它们完成。这可以使用`asyncio.gather()`函数来实现。\n\n\
    它首先需要创建协程。每个端口一个协程，这将是一个包含超过1,000个协程的集合。我们可以使用列表推导式来实现这一点。\n\n例如：\n\n```python\n\
    ...\n# create all coroutines\ncoros = [test_port_number(host, port) for port in\
    \ ports]\n```\n\n接下来，我们可以使用`asyncio.gather()`函数并发执行所有这些协程。\n\n此函数接受可等待对象作为参数，并且在可等待对象完成之前不会返回。它不接受可等待对象的列表，因此我们必须使用星号（*）运算符将列表展开为单独的表达式。\n\
    \n例如：\n\n```python\n...\n# execute all coroutines concurrently\nresults = await\
    \ asyncio.gather(*coros)\n```\n\n这将并发执行所有协程，并按提供的顺序返回每个协程返回值的可迭代对象。\n\n然后，我们可以遍历返回值列表和端口列表，并报告结果。\n\
    \n回想一下，我们可以使用内置的`zip()`函数一起遍历两个或多个可迭代对象。\n\n例如：\n\n```python\n...\n# report results\n\
    for port, result in zip(ports, results):\n    if result:\n        print(f'> {host}:{port}\
    \ [OPEN]')\n```\n\n将以上内容整合，完整示例如下。\n\n```python\n# SuperFastPython.com\n# example\
    \ of a concurrent port scanner using gather\nimport asyncio\n\n# returns True\
    \ if a connection can be made\nasync def test_port_number(host, port, timeout=3):\n\
    \    # create coroutine for opening a connection\n    coro = asyncio.open_connection(host,\
    \ port)\n    # execute the coroutine with a timeout\n    try:\n        # open\
    \ the connection and wait for a moment\n        _, writer = await asyncio.wait_for(coro,\
    \ timeout)\n        # close connection once opened\n        writer.close()\n \
    \       # indicate the connection can be opened\n        return True\n    except\
    \ asyncio.TimeoutError:\n        # indicate the connection cannot be opened\n\
    \        return False\n\n# main coroutine\nasync def main(host, ports):\n    #\
    \ report a status message\n    print(f'Scanning {host}...')\n    # create all\
    \ coroutines\n    coros = [test_port_number(host, port) for port in ports]\n \
    \   # execute all coroutines concurrently\n    results = await asyncio.gather(*coros)\n\
    \    # report results\n    for port, result in zip(ports, results):\n        if\
    \ result:\n            print(f'> {host}:{port} [OPEN]')\n\n# define a host and\
    \ ports to scan\nhost = 'python.org'\nports = range(1, 1024)\n# start the asyncio\
    \ program\nasyncio.run(main(host, ports))\n```\n\n运行此示例会执行`main()`协程作为我们asyncio程序的入口点。\n\
    \n首先创建一个协程列表。\n\n然后使用`asyncio.gather()`并发执行所有协程。\n\n这会挂起`main()`协程，直到所有协程完成。每个协程测试一个端口，尝试打开连接并挂起，直到连接打开或超时时间过去。\n\
    \n一旦所有任务完成，`main()`协程恢复执行，并报告所有结果。\n\n报告了两个开放端口，与之前相同。\n\n主要区别在于执行速度。在这种情况下，它大约需要3.1秒，而之前的示例需要超过50分钟。\n\
    \n这大约快了3,063秒，即速度提升了989倍，也就是将近1000倍。\n\n```\nScanning python.org...\n> python.org:80\
    \ [OPEN]\n> python.org:443 [OPEN]\n```\n\n接下来，让我们看看如何在结果可用时立即报告，而不是在所有协程完成后才报告。\n\
    \n## 如何动态报告扫描结果\n\n在前面的示例中，我们并发执行了协程，并在所有任务完成后报告结果。\n\n另一种方法是在任务完成时报告结果。\n\n这将使程序响应更及时，并在结果可用时向用户展示。\n\
    \n我们可以通过让`test_port_number()`协程直接报告其结果来实现这一点。\n\n另一种方法是按照协程完成的顺序遍历它们。\n\n这可以使用`asyncio.as_completed()`函数来实现。\n\
    \n此函数接受一个可等待对象的集合。如果它们是协程，它们将被作为任务发出。\n\n然后，该函数返回一个可迭代对象，其中的协程按它们完成的顺序产出。\n\n\
    我们可以直接遍历这个可迭代对象，不需要使用为异步可迭代对象保留的`async for`表达式。\n\n例如：\n\n```python\n...\n# execute\
    \ coroutines and handle results as they complete\nfor coro in asyncio.as_completed(coros):\n\
    \    # check the return value from the coroutine\n    # ...\n```\n\n缺点是我们没有简单的方法将协程与测试的端口关联起来。因此，我们可以更新我们的`test_port_number()`协程，使其返回端口是否开放以及测试的端口号。"
