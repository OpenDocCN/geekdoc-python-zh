    ```\n\nTying this together, the complete example of running a list of pre-prepared\
    \ coroutines with `gather()` is listed below.\n\n```\n# SuperFastPython.com\n\
    # example of gather for many coroutines in a list\nimport asyncio\n\n# coroutine\
    \ used for a task\nasync def task_coro(value):\n    # report a message\n    print(f'>task\
    \ {value} executing')\n    # sleep for a moment\n    await asyncio.sleep(1)\n\n\
    # coroutine used for the entry point\nasync def main():\n    # report a message\n\
    \    print('main starting')\n    # create many coroutines\n    coros = [task_coro(i)\
    \ for i in range(10)]\n    # run the tasks\n    await asyncio.gather(*coros)\n\
    \    # report a message\n    print('main done')\n\n# start the asyncio program\n\
    asyncio.run(main())\n```\n\nRunning the example executes the `main()` coroutine\
    \ as the entry point to the program.\n\nThe `main()` coroutine then creates a\
    \ list of 10 coroutine objects using a list comprehension.\n\nThis list is then\
    \ provided to the `gather()` function and unpacked into 10 separate expressions\
    \ using the star operator.\n\nThe `main()` coroutine then awaits the `Future`\
    \ object returned from the call to `gather()`, suspending and waiting for all\
    \ scheduled coroutines to complete their execution.\n\nThe coroutines run as soon\
    \ as they are able, reporting their unique messages and sleeping before terminating.\n\
    \nOnly after all coroutines in the group are complete does the `main()` coroutine\
    \ resume and report its final message.\n\nThis highlights how we can prepare a\
    \ collection of coroutines and provide them as separate expressions to the `gather()`\
    \ function.\n\n```\nmain starting\n>task 0 executing\n>task 1 executing\n>task\
    \ 2 executing\n>task 3 executing\n>task 4 executing\n>task 5 executing\n>task\
    \ 6 executing\n>task 7 executing\n>task 8 executing\n>task 9 executing\nmain done\n\
    ```\n\nNext, let's look at how we can wait for many tasks in an asyncio program.\n\
    \n## How to Wait for Many Tasks\n\nThe `asyncio.wait()` function can be used to\
    \ wait for a collection of asyncio tasks to complete.\n\nRecall that an asyncio\
    \ task is an instance of the `asyncio.Task` class that wraps a coroutine. It allows\
    \ a coroutine to be scheduled and executed independently, and the Task instance\
    \ provides a handle on the task for querying status and getting results.\n\nThe\
    \ `wait()` function allows us to wait for a collection of tasks to be done.\n\n\
    The call to wait can be configured to wait for different conditions, such as all\
    \ tasks being completed, the first task completed and the first task failing with\
    \ an error.\n\nNext, let's look at how we can use the `wait()` function.\n\n##\
    \ How to Use asyncio.wait()\n\nThe `asyncio.wait()` function takes a collection\
    \ of awaitables, typically Task objects.\n\nThis could be a `list`, `dict`, or\
    \ `set` of task objects that we have created, such as via calls to the `asyncio.create()`\
    \ task function in a list comprehension.\n\nFor example:\n\n```\n...\n# create\
    \ many tasks\ntasks = [asyncio.create_task(task(i)) for i in range(10)]\n```\n\
    \nThe `asyncio.wait()` will not return until some condition on the collection\
    \ of tasks is met.\n\nBy default, the condition is that all tasks are completed.\n\
    \nThe `wait()` function returns a tuple of two sets. The first set contains all\
    \ task objects that meet the condition, and the second contains all other task\
    \ objects that do not yet meet the condition.\n\nThese sets are referred to as\
    \ the *done* set and the *pending* set.\n\nFor example:\n\n```\n...\n# wait for\
    \ all tasks to complete\ndone, pending = await asyncio.wait(tasks)\n```\n\nTechnically,\
    \ the `asyncio.wait()` is a coroutine function that returns a coroutine.\n\nWe\
    \ can then await this coroutine which will return the tuple of sets.\n\nFor example:\n\
    \n```\n...\n# create the wait coroutine\nwait_coro = asyncio.wait(tasks)\n# await\
    \ the wait coroutine\nt = await wait_coro\n```\n\nThe condition waited for can\
    \ be specified by the `return_when` argument which is set to `asyncio.ALL_COMPLETED`\
    \ by default.\n\nFor example:\n\n```\n...\n# wait for all tasks to complete\n\
    done, pending = await asyncio.wait(tasks,\n    return_when=asyncio.ALL_COMPLETED)\n\
    ```\n\nWe can wait for the first task to be completed by setting `return_when`\
    \ to `FIRST_COMPLETED`.\n\nFor example:\n\n```\n...\n# wait for the first task\
    \ to be completed\ndone, pending = await asyncio.wait(tasks,\n    return_when=asyncio.FIRST_COMPLETED)\n\
    ```\n\nWhen the first task is complete and returned in the done set, the remaining\
    \ tasks are not canceled and continue to execute concurrently.\n\nWe can wait\
    \ for the first task to fail with an exception by setting `return_when` to `FIRST_EXCEPTION`.\n\
    \nFor example:\n\n```\n...\n# wait for the first task to fail\ndone, pending =\
    \ await asyncio.wait(tasks,\n    return_when=asyncio.FIRST_EXCEPTION)\n```\n\n\
    In this case, the done set will contain the first task that failed with an exception.\
    \ If no task fails with an exception, the done set will contain all tasks and\
    \ `wait()` will return only after all tasks are completed.\n\nWe can specify how\
    \ long we are willing to wait for the given condition via a `timeout` argument\
    \ in seconds.\n\nIf the timeout expires before the condition is met, the tuple\
    \ of tasks is returned with whatever subset of tasks do meet the condition at\
    \ that time, e.g. the subset of tasks that are completed if waiting for all tasks\
    \ to complete.\n\nFor example:\n\n```\n...\n# wait for all tasks to complete with\
    \ a timeout\ndone, pending = await asyncio.wait(tasks, timeout=3)\n```\n\nIf the\
    \ timeout is reached before the condition is met, an exception is not raised and\
    \ the remaining tasks are not canceled.\n\nNow that we know how to use the `asyncio.wait()`\
    \ function, let's look at a worked example.\n\n## Example of Waiting for All Tasks\n\
    \nWe can explore how to wait for all tasks using `asyncio.wait()`.\n\nIn this\
    \ example, we will define a simple task coroutine that generates a random value,\
    \ sleeps for a fraction of a second, then reports a message with the generated\
    \ value.\n\nThe main coroutine will then create many tasks in a list comprehension\
    \ with the coroutine and then wait for all tasks to be complete.\n\nThe complete\
    \ example is listed below.\n\n```\n# SuperFastPython.com\n# example of waiting\
    \ for all tasks to complete\nfrom random import random\nimport asyncio\n\n# coroutine\
    \ to execute in a new task\nasync def task_coro(arg):\n    # generate a random\
    \ value between 0 and 1\n    value = random()\n    # suspend for a moment\n  \
    \  await asyncio.sleep(value)\n    # report the value\n    print(f'>task {arg}\
    \ done with {value}')\n\n# main coroutine\nasync def main():\n    # create many\
    \ tasks\n    tasks = [asyncio.create_task(task_coro(i))\n        for i in range(10)]\n\
    \    # wait for all tasks to complete\n    _ = await asyncio.wait(tasks)\n   \
    \ # report results\n    print('All done')\n\n# start the asyncio program\nasyncio.run(main())\n\
    ```"
  mdcn: "这意味着，如果调用者没有执行其他操作，那么被调度的可等待对象组将会运行（假设调用者挂起）。我们可以通过 `Future` 对象与该组进行交互，就像与单个任务交互一样，例如添加完成回调函数、取消该组以及检查该组的状态。\n\
    \n然而，`asyncio.gather()` 最常见的用法是直接等待返回的 `Future`。\n\n这将收集协程和任务的返回值，并将它们作为可迭代对象返回。\n\
    \n例如：\n\n```\n...\n# 执行协程并获取返回值\nvalues = await asyncio.gather(coro1(), coro2())\n\
    ```\n\n既然我们知道了如何使用 `asyncio.gather()`，让我们来看一个实际的例子。\n\n## 在列表中运行多个协程的示例\n\n通常会预先创建多个协程，然后再将它们收集起来。\n\
    \n这允许程序准备要并发执行的任务，然后一次性触发它们的并发执行并等待它们完成。\n\n我们可以手动或使用列表推导式将多个协程收集到一个列表中。\n\n例如：\n\
    \n```\n...\n# 创建多个协程\ncoros = [task_coro(i) for i in range(10)]\n```\n\n然后我们可以用列表中的所有协程调用\
    \ `gather()`。\n\n协程列表不能直接提供给 `gather()` 函数，因为这会导致错误。\n\n相反，`gather()` 函数要求每个可等待对象作为单独的位置参数提供。\n\
    \n这可以通过将列表解包为单独的表达式并传递给 `gather()` 函数来实现。星号运算符 (`*`) 将为我们执行此操作。\n\n例如：\n\n```\n\
    ...\n# 运行任务\nawait asyncio.gather(*coros)\n```\n\n将这些内容整合在一起，使用 `gather()` 运行预先准备好的协程列表的完整示例如下所示。\n\
    \n```\n# SuperFastPython.com\n# 在列表中运行多个协程的 gather 示例\nimport asyncio\n\n# 用于任务的协程\n\
    async def task_coro(value):\n    # 报告一条消息\n    print(f'>任务 {value} 正在执行')\n  \
    \  # 休眠片刻\n    await asyncio.sleep(1)\n\n# 用作入口点的协程\nasync def main():\n    #\
    \ 报告一条消息\n    print('main 开始')\n    # 创建多个协程\n    coros = [task_coro(i) for i\
    \ in range(10)]\n    # 运行任务\n    await asyncio.gather(*coros)\n    # 报告一条消息\n\
    \    print('main 完成')\n\n# 启动 asyncio 程序\nasyncio.run(main())\n```\n\n运行该示例会将\
    \ `main()` 协程作为程序的入口点执行。\n\n然后 `main()` 协程使用列表推导式创建一个包含 10 个协程对象的列表。\n\n然后将该列表提供给\
    \ `gather()` 函数，并使用星号运算符解包为 10 个单独的表达式。\n\n然后 `main()` 协程等待从 `gather()` 调用返回的\
    \ `Future` 对象，挂起并等待所有已调度的协程完成执行。\n\n协程在能够运行时立即运行，报告其唯一的消息，休眠后终止。\n\n只有在组中的所有协程都完成后，`main()`\
    \ 协程才会恢复并报告其最终消息。\n\n这突出了我们如何准备一组协程并将它们作为单独的表达式提供给 `gather()` 函数。\n\n```\nmain\
    \ 开始\n>任务 0 正在执行\n>任务 1 正在执行\n>任务 2 正在执行\n>任务 3 正在执行\n>任务 4 正在执行\n>任务 5 正在执行\n\
    >任务 6 正在执行\n>任务 7 正在执行\n>任务 8 正在执行\n>任务 9 正在执行\nmain 完成\n```\n\n接下来，让我们看看如何在 asyncio\
    \ 程序中等待多个任务。\n\n## 如何等待多个任务\n\n`asyncio.wait()` 函数可用于等待一组 asyncio 任务完成。\n\n回想一下，asyncio\
    \ 任务是 `asyncio.Task` 类的一个实例，它包装了一个协程。它允许协程被独立调度和执行，而 Task 实例提供了一个用于查询状态和获取结果的句柄。\n\
    \n`wait()` 函数允许我们等待一组任务完成。\n\n对 `wait` 的调用可以配置为等待不同的条件，例如所有任务完成、第一个任务完成以及第一个任务因错误失败。\n\
    \n接下来，让我们看看如何使用 `wait()` 函数。\n\n## 如何使用 asyncio.wait()\n\n`asyncio.wait()` 函数接受一组可等待对象，通常是\
    \ Task 对象。\n\n这可以是我们创建的任务对象的 `list`、`dict` 或 `set`，例如通过在列表推导式中调用 `asyncio.create_task()`\
    \ 任务函数。\n\n例如：\n\n```\n...\n# 创建多个任务\ntasks = [asyncio.create_task(task(i)) for\
    \ i in range(10)]\n```\n\n`asyncio.wait()` 在满足任务集合的某些条件之前不会返回。\n\n默认情况下，条件是所有任务都已完成。\n\
    \n`wait()` 函数返回一个包含两个集合的元组。第一个集合包含满足条件的所有任务对象，第二个集合包含尚未满足条件的所有其他任务对象。\n\n这些集合被称为\
    \ *已完成* 集合和 *待处理* 集合。\n\n例如：\n\n```\n...\n# 等待所有任务完成\ndone, pending = await asyncio.wait(tasks)\n\
    ```\n\n从技术上讲，`asyncio.wait()` 是一个返回协程的协程函数。\n\n然后我们可以等待这个协程，它将返回集合的元组。\n\n例如：\n\
    \n```\n...\n# 创建等待协程\nwait_coro = asyncio.wait(tasks)\n# 等待等待协程\nt = await wait_coro\n\
    ```\n\n等待的条件可以通过 `return_when` 参数指定，默认设置为 `asyncio.ALL_COMPLETED`。\n\n例如：\n\n\
    ```\n...\n# 等待所有任务完成\ndone, pending = await asyncio.wait(tasks,\n    return_when=asyncio.ALL_COMPLETED)\n\
    ```\n\n我们可以通过将 `return_when` 设置为 `FIRST_COMPLETED` 来等待第一个任务完成。\n\n例如：\n\n```\n\
    ...\n# 等待第一个任务完成\ndone, pending = await asyncio.wait(tasks,\n    return_when=asyncio.FIRST_COMPLETED)\n\
    ```\n\n当第一个任务完成并返回到已完成集合中时，剩余的任务不会被取消，并继续并发执行。\n\n我们可以通过将 `return_when` 设置为 `FIRST_EXCEPTION`\
    \ 来等待第一个任务因异常失败。\n\n例如：\n\n```\n...\n# 等待第一个任务失败\ndone, pending = await asyncio.wait(tasks,\n\
    \    return_when=asyncio.FIRST_EXCEPTION)\n```\n\n在这种情况下，已完成集合将包含第一个因异常失败的任务。如果没有任务因异常失败，已完成集合将包含所有任务，并且\
    \ `wait()` 将在所有任务完成后才返回。\n\n我们可以通过 `timeout` 参数（以秒为单位）指定我们愿意等待给定条件多长时间。\n\n如果在满足条件之前超时，则返回任务元组，其中包含当时满足条件的任何任务子集，例如，如果等待所有任务完成，则返回已完成的任务子集。\n\
    \n例如：\n\n```\n...\n# 等待所有任务完成，设置超时\ndone, pending = await asyncio.wait(tasks,\
    \ timeout=3)\n```\n\n如果在满足条件之前达到超时，则不会引发异常，剩余的任务也不会被取消。\n\n既然我们知道了如何使用 `asyncio.wait()`\
    \ 函数，让我们来看一个实际的例子。\n\n## 等待所有任务的示例\n\n我们可以探索如何使用 `asyncio.wait()` 等待所有任务。\n\n\
    在这个例子中，我们将定义一个简单的任务协程，该协程生成一个随机值，休眠一小段时间，然后报告一条包含生成值的消息。\n\n然后主协程将在列表推导式中使用该协程创建多个任务，然后等待所有任务完成。\n\
    \n完整示例如下所示。\n\n```\n# SuperFastPython.com\n# 等待所有任务完成的示例\nfrom random import random\n\
    import asyncio\n\n# 在新任务中执行的协程\nasync def task_coro(arg):\n    # 生成一个介于 0 和 1\
    \ 之间的随机值\n    value = random()\n    # 挂起片刻\n    await asyncio.sleep(value)\n \
    \   # 报告该值\n    print(f'>任务 {arg} 完成，值为 {value}')\n\n# 主协程\nasync def main():\n\
    \    # 创建多个任务\n    tasks = [asyncio.create_task(task_coro(i))\n        for i in\
    \ range(10)]\n    # 等待所有任务完成\n    _ = await asyncio.wait(tasks)\n    # 报告结果\n\
    \    print('全部完成')\n\n# 启动 asyncio 程序\nasyncio.run(main())\n```"
