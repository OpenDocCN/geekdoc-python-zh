  md: "# How to Signal Between Coroutines Using an Event\n\nAn event is a coroutine-safe\
    \ boolean flag that can be used to signal between two or more coroutines.\n\n\
    It can be useful to coordinate the behavior of many coroutines that can check\
    \ the status of the flag, such as to begin processing, or to stop processing and\
    \ exit.\n\nNext, let’s look at how to create and use events.\n\n# How to Use an\
    \ Asyncio Event\n\nPython provides an event object for coroutines via the asyncio.Event\
    \ class.\n\nAn Event class wraps a boolean variable that can either be set (True)\
    \ or not set (False). Coroutines sharing the Event object can check if the event\
    \ is set, set the event, clear the event (make it not set), or wait for the event\
    \ to be set.\n\nThe Event provides an easy way to share a boolean variable between\
    \ coroutines that can act as a trigger for an action.\n\nFirst, an Event object\
    \ must be created and the event will be in the not set state.\n\n```\n...\n# create\
    \ an instance of an event\nevent = asyncio.Event()\n```\n\nOnce created we can\
    \ check if the event has been set via the is_set() method which will return True\
    \ if the event is set, or False otherwise.\n\nFor example:\n\n```\n...\n# check\
    \ if the event is set\nif event.is_set():\n    # do something...\n```"
  merge: -1
  pgno: 134
- img_proc: true
  md: "The Event can be set via the set() method. Any coroutines waiting on the event\
    \ to be set will be notified.\n\nFor example:\n\n```\n...\n# set the event\nevent.set()\n\
    ```\n\nFinally, coroutines can wait for the event to be set via the wait() method,\
    \ which must be awaited. Calling this method will suspend until the event is marked\
    \ as set (e.g. another coroutine calling the set() method). If the event is already\
    \ set, the wait() method will return immediately.\n\n```\n...\n# wait for the\
    \ event to be set\nawait event.wait()\n```\n\nNow that we know to use events,\
    \ let’s look at a worked example.\n\n# Example of Using an Asyncio Event\n\nWe\
    \ can explore how to use an asyncio.Event object.\n\nIn this example we will create\
    \ a suite of coroutines that each will perform some work and report a message.\
    \ All coroutines will use an event to wait to be set before starting their work.\
    \ The main coroutine will set the event and trigger the new coroutines to start\
    \ work.\n\n```\n# SuperFastPython.com\n# example of using an asyncio event object\n\
    from random import random\nimport asyncio\n\n# task coroutine\nasync def task(event,\
    \ number):\n    # wait for the event to be set\n    await event.wait()\n    #\
    \ generate a random value between 0 and 1\n    value = random()\n```"
