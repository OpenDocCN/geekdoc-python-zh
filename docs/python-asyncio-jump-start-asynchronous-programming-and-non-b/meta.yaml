    \ Concurrency)\n    - [什么是协程](What are Coroutines)\n    - [什么是异步编程](What is Asynchronous\
    \ Programming)\n    - [欢迎来到Asyncio](Welcome to Asyncio)\n    - [Asyncio Hello\
    \ World示例](Asyncio Hello World Example)\n    - [何时使用Asyncio](When to Use Asyncio)\n\
    \    - [课程回顾](Lesson Review)\n- [第02课：协程与任务](Lesson 02: Coroutines and Tasks)\n\
    \    - [如何创建和运行协程](How to Create and Run Coroutines)\n    - [如何创建和运行任务](How to\
    \ Create and Run Tasks)\n    - [如何使用Asyncio任务](How to Use Asyncio Tasks)\n   \
    \ - [课程回顾](Lesson Review)\n- [第03课：任务集合](Lesson 03: Collections of Tasks)\n  \
    \  - [如何将多个任务作为一组运行](How to Run Many Tasks as a Group)\n    - [如何等待多个任务](How to\
    \ Wait for Many Tasks)\n    - [如何为任务设置超时等待](How to Wait For a Task With a Timeout)\n\
    \    - [如何按完成顺序处理任务](How to Handle Tasks In Completion Order)\n    - [如何运行阻塞任务](How\
    \ to Run Blocking Tasks)\n    - [课程回顾](Lesson Review)\n- [第04课：迭代器、生成器和上下文管理器](Lesson\
    \ 04: Iterators, Generators, and Context Managers)\n    - [如何使用异步迭代器](How to Use\
    \ Asynchronous Iterators)\n    - [如何使用异步生成器](How to Use Asynchronous Generators)\n\
    \    - [如何使用异步上下文管理器](How to Use Asynchronous Context Managers)\n    - [课程回顾](Lesson\
    \ Review)\n\n## 第05课：队列与同步原语\n\n- [什么是协程安全](What is Coroutine-Safe)\n- [如何使用队列在协程间共享数据](How\
    \ to Share Data Between Coroutines with Queues)\n- [如何使用互斥锁保护临界区](How to Protect\
    \ Critical Sections with a Mutex Lock)\n- [如何使用信号量限制资源访问](How to Limit Access\
    \ to a Resource with a Semaphore)\n- [如何使用事件在协程间发送信号](How to Signal Between Coroutines\
    \ Using an Event)\n- [如何使用条件变量进行协调](How to Coordinate Using a Condition Variable)\n\
    - [课程回顾](Lesson Review)\n\n## 第06课：子进程与流\n\n- [如何在子进程中运行命令](How to Run Commands\
    \ in Subprocesses)\n- [如何使用非阻塞I/O流](How to Use Non-Blocking I/O Streams)\n- [课程回顾](Lesson\
    \ Review)\n\n## 第07课：端口扫描器案例研究\n\n- [开发一个Asyncio端口扫描器](Develop an Asyncio Port\
    \ Scanner)\n- [如何在端口上打开套接字连接](How to Open a Socket Connection on a Port)\n- [如何扫描服务器上的端口范围（慢速）](How\
    \ to Scan a Range of Ports on a Server (slow))\n- [如何并发扫描端口（快速）](How to Scan Ports\
    \ Concurrently (fast))\n- [如何动态报告扫描结果](How to Report Scan Results Dynamically)\n\
    - [课程回顾](Lesson Review)\n\n## 结论\n\n- [回顾你已走过的路](Look Back At How Far You’ve Come)\n\
    - [深入学习的资源](Resources For Diving Deeper)\n- [获取更多帮助](Getting More Help)\n\n##\
    \ 关于作者\n\n## Python并发快速入门系列\n\n# Python Asyncio 快速入门\n\n**对 *SuperFastPython*\
    \ 的赞誉**\n\n> “我正在阅读这篇文章，它真的做得非常好（简洁、精炼但全面）。感谢你的付出！科技行业能不断前进，也多亏了像你这样传播知识的人。”\n\
    \n– **Gabriele Berselli**，Python开发者。\n\n> “我喜欢你的帖子和直观的阐述——请继续保持出色的工作”\n\n– **Martin\
    \ Gay**，Lacima集团量化开发者。\n\n> “很棒的工作。我总是喜欢阅读你基于知识的文章”\n\n– **Janath Manohararaj**，工程总监。\n\
    \n> “一如既往地棒！！！”\n\n– **Jadranko Belusic**，Crossvallia软件开发者。\n\n> “感谢你分享你的知识。你的教程是我多年来读过的最好的教程之一。不幸的是，大多数作者试图证明自己有多聪明，却未能起到教育作用。你的教程则大不相同。我喜欢示例的简洁性，可以在此基础上构建更复杂的场景，但在我看来，最重要的方面是它们易于理解。再次感谢你为创建这些教程所花费的所有时间和精力。”\n\
    \n– **Marius Rusu**，Python开发者。\n\n> “感谢Jason Brownlee提供如此优秀的内容，非常感激”\n\n– **Bilal\
    \ B.**，高级数据工程师。\n\n> “感谢分享。我从你的教程中学到了很多，而且仍在继续学习，再次非常感谢。祝你一切顺利。”\n\n– **Sehaba\
    \ Amine**，LIRIS研究实习生。\n\n> “真希望7年前我做第一个多线程软件时就有这个教程。太棒了，Jason”\n\n– **Leon Marusa**，Elektro\
    \ Celje大数据解决方案项目负责人。\n\n> “这太棒了”\n\n– **Subhayan Ghosh**，梅赛德斯-奔驰研发中心Azure数据工程师。\n\
    \n# 版权\n\n© 版权所有 2022 Jason Brownlee。保留所有权利。\n\n# 免责声明\n\n本书所含信息仅供教育目的。如果您希望应用本书中的想法，您将对自己的行为承担全部责任。\n\
    \n作者已尽一切努力确保本书出版时信息的准确性。作者不承担且特此免除因错误或遗漏导致的任何一方的任何损失、损害或中断的责任，无论此类错误或遗漏是由于事故、疏忽还是任何其他原因造成的。\n\
    \n未经作者书面许可，不得以任何形式或任何方式（电子或机械、录音或任何信息存储和检索系统）复制或传播本书的任何部分。\n\n# 前言\n\nPython并发被严重误解。\n\
    \n观点从“*Python不支持并发*”到“*Python并发有缺陷*”不一而足。\n\n我创建了SuperFastPython.com网站，就是为了直接反驳这些误解。\n\
    \nAsyncio是Python中一个重要的、令人兴奋的新特性。\n\n广义上，asyncio指的是对Python语言的更改以支持协程，以及提供用于使用协程以异步编程风格开发和运行程序的API的asyncio模块。\n\
    \nAsyncio的添加专门是为了支持使用套接字连接的非阻塞I/O。结合异步编程，这通常被称为异步I/O。\n\n使用asyncio，我们可以开发出超越线程可扩展性的程序，允许数万或数十万的并发流。此能力可用于开发客户端或服务器端程序，以访问大量的并发TCP套接字连接，可能连接到服务器、网站、游戏服务器、数据库等。\n\
    \n本指南经过精心设计，旨在帮助Python开发者（*像你一样*）尽快掌握asyncio。完成所有七门课程后，你将知道如何将基于协程的并发与asyncio模块API快速应用到你自己的项目中。\n\
    \n我们可以共同努力，让Python代码运行得更快，并改变社区对Python并发的看法。\n\n感谢你让我引导你走上这条道路。"
