  - "[PAGE 84]\n\n# How to Handle Tasks In Completion Order\n\nThe asyncio.as_completed()\
    \ function will run a collection of tasks and coroutines concurrently.\n\nMore\
    \ importantly, it returns an iterable that we can use to retrieve the awaitables\
    \ in the order that they are completed.\n\nIt allows us to execute many coroutines\
    \ or tasks concurrently and get the results from tasks as they are done, rather\
    \ than the order we issued them.\n\nNow that we know what as_completed() is, let’s\
    \ look at how we can use it.\n\n# How to Use asyncio.as_completed()\n\nThe asyncio.as_completed()\
    \ function is called with a collection of awaitables.\n\nThis may be a list, dict,\
    \ or set, and may contain asyncio.Task objects, coroutines, or other awaitables.\n\
    \nAny coroutines provided to as_completed() will be wrapped in a Task object for\
    \ independent execution.\n\nIt returns an iterable that when traversed will yield\
    \ awaitables in the provided list. These can be awaited by the caller in order\
    \ to get results in the order that tasks are completed, e.g. get the result from\
    \ the next task to complete.\n\nFor example:\n\n```\n...\n# iterate over awaitables\n\
    for task in asyncio.as_completed(tasks):\n    # get the next result\n    result\
    \ = await task\n```\n\nThe as_completed() function also takes a timeout argument."
  - "[PAGE 85]\n\nThis specifies how long the caller is willing to wait for all awaitables\
