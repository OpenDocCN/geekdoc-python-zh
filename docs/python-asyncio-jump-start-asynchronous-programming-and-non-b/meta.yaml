- md: "## How to Use Asyncio Tasks\n\nThe asyncio.Task object provides a handle on\
    \ a scheduled coroutine.\n\nIt provides a number of methods that we can use in\
    \ our asyncio programs to query and interact with the coroutine.\n\nIn this section,\
    \ we will explore how to use asyncio.Task objects once they have been created.\n\
    \n### How to Check Task Status\n\nAfter a Task is created we can check its status.\n\
    \nThere are two statuses we can check, they are:\n\n- Whether the task is done.\n\
    - Whether the task was canceled.\n\nLet’s take a closer look at each in turn.\n\
    \n### Check if a Task is Done\n\nWe can check if a task is done via the done()\
    \ method.\n\nThe method returns True if the task is done, or False otherwise.\n\
    \nFor example:\n\n```\n...\n# check if a task is done\nif task.done():\n    #\
    \ ...\n```\n\nA task is done if it has had the opportunity to run and is now no\
    \ longer running.\n\nA task that has been scheduled is not done. Similarly, a\
    \ task that is running is not done.\n\nA task is done if:\n\n- The coroutine finishes\
    \ normally.\n- The coroutine returns explicitly.\n- An unexpected error or exception\
    \ is raised in the coroutine.\n- The task is canceled.\n\n### Check if a Task\
    \ is Canceled\n\nWe can check if a task is canceled via the `cancelled()` method.\n\
    \nThe method returns `True` if the task was canceled, or `False` otherwise.\n\n\
    For example:\n\n```\n...\n# check if a task was canceled\nif task.cancelled():\n\
    \    # ...\n```\n\nA task is canceled if the `cancel()` method was called on the\
    \ task and completed successfully, e.g `cancel()` returned `True`.\n\nA task is\
    \ not canceled if the `cancel()` method was not called, or if the `cancel()` method\
    \ was called but failed to cancel the task.\n\nNext, let's look at how we can\
    \ get the result from a task.\n\n### How to Get a Task's Result\n\nWe can get\
    \ the return value from the coroutine wrapped by the task by simply awaiting the\
    \ task.\n\nFor example:\n\n```\n...\n# get the return value from the wrapped coroutine\n\
    value = await task\n```\n\nAnother approach to get the result of a task via the\
    \ `result()` method.\n\nThis returns the return value of the coroutine wrapped\
    \ by the Task or None if the wrapped coroutine does not explicitly return a value.\n\
    \nFor example:\n\n```\n...\n# get the return value from the wrapped coroutine\n\
    value = task.result()\n```\n\nIf the coroutine raises an unhandled error or exception,\
    \ it is re-raised when calling the `result()` method and may need to be handled.\n\
    \nFor example:\n\n```\n...\ntry:\n    # get the return value from the wrapped\
    \ coroutine\n    value = task.result()\nexcept Exception:\n    # task failed and\
    \ there is no result\n```\n\nIf the task was canceled, then a `CancelledError`\
    \ exception is raised when calling the `result()` method and may need to be handled.\n\
    \nFor example:\n\n```\n...\ntry:\n    # get the return value from the wrapped\
    \ coroutine\n    value = task.result()\nexcept asyncio.CancelledError:\n    #\
    \ task was canceled\n```\n\nAs such, it is a good idea to check if the task was\
    \ canceled first.\n\nFor example:\n\n```\n...\n# check if the task was not canceled\n\
    if not task.cancelled():\n    # get the return value from the wrapped coroutine\n\
    \    value = task.result()\nelse:\n    # task was canceled\n```\n\nIf the task\
    \ is not yet done, then an InvalidStateError exception is raised when calling\
    \ the result() method and may need to be handled.\n\nFor example:\n\n```\n...\n\
    try:\n    # get the return value from the wrapped coroutine\n    value = task.result()\n\
    except asyncio.InvalidStateError:\n    # task is not yet done\n```\n\nAs such,\
    \ it is a good idea to check if the task is done first.\n\nFor example:\n\n```\n\
    ...\n# check if the task is not done\nif not task.done():\n    await task\n# get\
    \ the return value from the wrapped coroutine\nvalue = task.result()\n```\n\n\
    Next, let’s look at how we can get an unhandled exception raised by a task.\n\n\
    ### How to Get a Task's Exception\n\nA coroutine wrapped by a task may raise an\
    \ exception that is not handled.\n\nThis will cause the task to *fail*, in effect.\n\
    \nWe can retrieve an unhandled exception in the coroutine wrapped by a task via\
    \ the exception() method.\n\nFor example:\n\n```\n...\n# get the exception raised\
    \ by a task\nexception = task.exception()\n```\n\nIf an unhandled exception was\
    \ not raised in the wrapped coroutine, then a value of None is returned.\n\nIf\
    \ the task was canceled, then a `CancelledError` exception is raised when calling\
    \ the `exception()` method and may need to be handled.\n\nSimilarly, if the task\
    \ is not yet done, then an `InvalidStateError` exception is raised when calling\
    \ the `exception()` method and may need to be handled.\n\nNext, let’s look at\
    \ how we can cancel a running task.\n\n### How to Cancel a Task\n\nWe can cancel\
    \ a scheduled task via the `cancel()` method.\n\nThe cancel method returns `True`\
    \ if the task was canceled, or `False` otherwise.\n\nFor example:\n\n```\n...\n\
    # cancel the task\nwas_cancelled = task.cancel()\n```\n\nIf the task is already\
    \ done, it cannot be canceled and the `cancel()` method will return `False` and\
    \ the task will not have the status of canceled.\n\nIf cancel request was successful,\
    \ the next time the task is given an opportunity to run, it will raise a `CancelledError`\
    \ exception.\n\nIf the `CancelledError` exception is not handled within the wrapped\
    \ coroutine, the task will be canceled.\n\nOtherwise, if the `CancelledError`\
    \ exception is handled within the wrapped coroutine, the task will not be canceled.\n\
    \nThe cancel() method can also take a message argument which will be used in the\
    \ content of the CancelledError.\n\nWe can explore how to cancel a task.\n\nIn\
    \ this example, we will create and schedule a task as per normal. The caller will\
    \ then wait a moment and allow the task to begin executing.\n\nIt will then cancel\
    \ the task and check that the request to cancel was successful.\n\nThe caller\
    \ will then wait a moment more for the task to be canceled, then report the status\
    \ of the task to confirm it is marked as canceled.\n\nThe complete example is\
    \ listed below.\n\n```\n# SuperFastPython.com\n# example of canceling an asyncio\
    \ task\nimport asyncio\n\n# define a coroutine for a task\nasync def task_coroutine():\n\
    \    # report a message\n    print('executing the task')\n    # suspend for a\
    \ moment\n    await asyncio.sleep(1)\n\n# custom coroutine\nasync def main():\n\
    \    # report a message\n    print('main coroutine')\n    # create and schedule\
    \ the task\n    task = asyncio.create_task(task_coroutine())\n    # wait a moment\n\
    \    await asyncio.sleep(0.5)\n    # cancel the task\n    was_cancelled = task.cancel()\n\
    \    print(f'>was canceled: {was_cancelled}')\n    # wait a moment\n    await\
    \ asyncio.sleep(0.1)\n    # report the status\n    print(f'>canceled: {task.cancelled()}')\n\
    \n# start the asyncio program\nasyncio.run(main())\n```\n\nRunning the example\
    \ first creates the main() coroutine and uses it as the entry point to the asyncio\
    \ program.\n\nThe main() coroutine then reports a message. It then creates an\
    \ instance of the task_coroutine() coroutine and passes it to the create_task()\
    \ method in order to wrap it in a Task instance and return the instance.\n\nThe\
    \ main() coroutine then suspends execution and suspends for half a second.\n\n\
    This gives the task an opportunity to execute the task. The task reports a message\
    \ and then suspends, sleeping for one second.\n\nThe main() coroutine resumes\
    \ and cancels the new task. It then reports whether the request to cancel the\
    \ task was successful. It was because we know that the task is not yet done. The\
    \ main() coroutine then suspends for a fraction of a second.\n\nThis gives the\
    \ task another opportunity to execute, in which case the CancelledError exception\
    \ is raised in the wrapped coroutine, canceling the task.\n\nThe main() coroutine\
    \ then resumes and checks the canceled status of the task, confirming that it\
    \ indeed is done and was canceled.\n\n```\nmain coroutine\nexecuting the task\n\
    >was canceled: True\n>canceled: True\n```\n\nNext, let’s look at how we can add\
    \ a done callback function to a task.\n\n### How to Use Callback With a Task\n\
    \nWe can add a done callback function to a task via the add_done_callback() method.\n\
    \nThis method takes the name of a function to call when the task is done.\n\n\
    The callback function must take the Task instance as an argument.\n\nFor example:\n\
    \n```\n# done callback function\ndef handle(task):\n    print(task)\n\n...\n#\
    \ register a done callback function\ntask.add_done_callback(handle)\n```\n\nRecall\
    \ that a task may be done when the wrapped coroutine finishes normally when it\
    \ returns, when an unhandled exception is raised or when the task is canceled.\n\
    \nThe add_done_callback() method can be used to add or register as many done callback\
    \ functions as we like.\n\nWe can also remove or de-register a callback function\
    \ via the remove_done_callback() function.\n\nFor example:\n\n```\n...\n# remove\
    \ a done callback function\ntask.remove_done_callback(handle)\n```\n\nWe can explore\
    \ how to use a done callback function on a task.\n\nIn this example, we will define\
    \ a done callback function that will report whether a task is done or not."
  mdcn: "## 如何使用 Asyncio 任务\n\n`asyncio.Task` 对象提供了一个对已调度协程的句柄。\n\n它提供了许多方法，我们可以在\
    \ asyncio 程序中使用这些方法来查询和与协程交互。\n\n在本节中，我们将探讨一旦创建了 `asyncio.Task` 对象后如何使用它们。\n\n\
    ### 如何检查任务状态\n\n任务创建后，我们可以检查其状态。\n\n我们可以检查两种状态，它们是：\n\n-   任务是否已完成。\n-   任务是否已被取消。\n\
    \n让我们依次仔细看看每一种。\n\n### 检查任务是否完成\n\n我们可以通过 `done()` 方法检查任务是否已完成。\n\n如果任务已完成，该方法返回\
    \ `True`，否则返回 `False`。\n\n例如：\n\n```\n...\n# 检查任务是否已完成\nif task.done():\n    #\
    \ ...\n```\n\n如果任务有机会运行并且现在不再运行，则该任务已完成。\n\n已调度的任务尚未完成。同样，正在运行的任务也尚未完成。\n\n任务在以下情况下被视为已完成：\n\
    \n-   协程正常完成。\n-   协程显式返回。\n-   协程中引发意外错误或异常。\n-   任务被取消。\n\n### 检查任务是否已被取消\n\n\
    我们可以通过 `cancelled()` 方法检查任务是否已被取消。\n\n如果任务已被取消，该方法返回 `True`，否则返回 `False`。\n\n\
    例如：\n\n```\n...\n# 检查任务是否已被取消\nif task.cancelled():\n    # ...\n```\n\n如果在任务上调用了\
    \ `cancel()` 方法并成功完成（例如 `cancel()` 返回 `True`），则该任务被视为已取消。\n\n如果未调用 `cancel()`\
    \ 方法，或者调用了 `cancel()` 方法但未能取消任务，则该任务未被取消。\n\n接下来，让我们看看如何从任务中获取结果。\n\n### 如何获取任务的结果\n\
    \n我们可以通过简单地等待任务来获取由任务包装的协程的返回值。\n\n例如：\n\n```\n...\n# 从包装的协程获取返回值\nvalue = await\
    \ task\n```\n\n另一种获取任务结果的方法是通过 `result()` 方法。\n\n这将返回由任务包装的协程的返回值，如果包装的协程没有显式返回值，则返回\
    \ `None`。\n\n例如：\n\n```\n...\n# 从包装的协程获取返回值\nvalue = task.result()\n```\n\n如果协程引发未处理的错误或异常，则在调用\
    \ `result()` 方法时会重新引发该错误或异常，可能需要处理。\n\n例如：\n\n```\n...\ntry:\n    # 从包装的协程获取返回值\n\
    \    value = task.result()\nexcept Exception:\n    # 任务失败，没有结果\n```\n\n如果任务已被取消，则在调用\
    \ `result()` 方法时会引发 `CancelledError` 异常，可能需要处理。\n\n例如：\n\n```\n...\ntry:\n   \
    \ # 从包装的协程获取返回值\n    value = task.result()\nexcept asyncio.CancelledError:\n \
    \   # 任务已被取消\n```\n\n因此，最好先检查任务是否已被取消。\n\n例如：\n\n```\n...\n# 检查任务是否未被取消\nif not\
    \ task.cancelled():\n    # 从包装的协程获取返回值\n    value = task.result()\nelse:\n   \
    \ # 任务已被取消\n```\n\n如果任务尚未完成，则在调用 `result()` 方法时会引发 `InvalidStateError` 异常，可能需要处理。\n\
    \n例如：\n\n```\n...\ntry:\n    # 从包装的协程获取返回值\n    value = task.result()\nexcept\
    \ asyncio.InvalidStateError:\n    # 任务尚未完成\n```\n\n因此，最好先检查任务是否已完成。\n\n例如：\n\n\
    ```\n...\n# 检查任务是否未完成\nif not task.done():\n    await task\n# 从包装的协程获取返回值\nvalue\
    \ = task.result()\n```\n\n接下来，让我们看看如何获取任务引发的未处理异常。\n\n### 如何获取任务的异常\n\n由任务包装的协程可能引发未处理的异常。\n\
    \n这实际上会导致任务*失败*。\n\n我们可以通过 `exception()` 方法检索由任务包装的协程中的未处理异常。\n\n例如：\n\n```\n\
    ...\n# 获取任务引发的异常\nexception = task.exception()\n```\n\n如果包装的协程中未引发未处理的异常，则返回 `None`\
    \ 值。\n\n如果任务已被取消，则在调用 `exception()` 方法时会引发 `CancelledError` 异常，可能需要处理。\n\n同样，如果任务尚未完成，则在调用\
    \ `exception()` 方法时会引发 `InvalidStateError` 异常，可能需要处理。\n\n接下来，让我们看看如何取消正在运行的任务。\n\
    \n### 如何取消任务\n\n我们可以通过 `cancel()` 方法取消已调度的任务。\n\n如果任务已被取消，`cancel` 方法返回 `True`，否则返回\
    \ `False`。\n\n例如：\n\n```\n...\n# 取消任务\nwas_cancelled = task.cancel()\n```\n\n\
    如果任务已完成，则无法取消，`cancel()` 方法将返回 `False`，并且任务不会具有已取消的状态。\n\n如果取消请求成功，下次任务有机会运行时，它将引发\
    \ `CancelledError` 异常。\n\n如果包装的协程中未处理 `CancelledError` 异常，则任务将被取消。\n\n否则，如果包装的协程中处理了\
    \ `CancelledError` 异常，则任务将不会被取消。\n\n`cancel()` 方法还可以接受一个消息参数，该参数将用于 `CancelledError`\
    \ 的内容中。\n\n我们可以探讨如何取消任务。\n\n在此示例中，我们将像往常一样创建并调度一个任务。然后调用者将等待片刻，让任务开始执行。\n\n然后它将取消任务并检查取消请求是否成功。\n\
    \n调用者将再等待片刻让任务被取消，然后报告任务的状态以确认其已标记为已取消。\n\n完整示例如下。\n\n```\n# SuperFastPython.com\n\
    # 取消 asyncio 任务的示例\nimport asyncio\n\n# 定义任务的协程\nasync def task_coroutine():\n\
    \    # 报告消息\n    print('executing the task')\n    # 暂停片刻\n    await asyncio.sleep(1)\n\
    \n# 自定义协程\nasync def main():\n    # 报告消息\n    print('main coroutine')\n    # 创建并调度任务\n\
    \    task = asyncio.create_task(task_coroutine())\n    # 等待片刻\n    await asyncio.sleep(0.5)\n\
    \    # 取消任务\n    was_cancelled = task.cancel()\n    print(f'>was canceled: {was_cancelled}')\n\
    \    # 等待片刻\n    await asyncio.sleep(0.1)\n    # 报告状态\n    print(f'>canceled:\
    \ {task.cancelled()}')\n\n# 启动 asyncio 程序\nasyncio.run(main())\n```\n\n运行示例首先创建\
    \ `main()` 协程并将其用作 asyncio 程序的入口点。\n\n然后 `main()` 协程报告一条消息。它接着创建 `task_coroutine()`\
    \ 协程的一个实例，并将其传递给 `create_task()` 方法，以便将其包装在 `Task` 实例中并返回该实例。\n\n然后 `main()` 协程暂停执行并暂停半秒。\n\
    \n这给了任务执行的机会。任务报告一条消息，然后暂停，休眠一秒。\n\n`main()` 协程恢复并取消新任务。然后它报告取消任务的请求是否成功。成功是因为我们知道任务尚未完成。`main()`\
    \ 协程然后暂停一小会儿。\n\n这给了任务另一次执行的机会，在这种情况下，包装的协程中会引发 `CancelledError` 异常，从而取消任务。\n\n\
    然后 `main()` 协程恢复并检查任务的取消状态，确认它确实已完成并被取消。\n\n```\nmain coroutine\nexecuting the\
    \ task\n>was canceled: True\n>canceled: True\n```\n\n接下来，让我们看看如何向任务添加完成回调函数。\n\
    \n### 如何在任务中使用回调\n\n我们可以通过 `add_done_callback()` 方法向任务添加完成回调函数。\n\n此方法接受一个函数名，该函数在任务完成时被调用。\n\
    \n回调函数必须将 `Task` 实例作为参数。\n\n例如：\n\n```\n# 完成回调函数\ndef handle(task):\n    print(task)\n\
    \n...\n# 注册完成回调函数\ntask.add_done_callback(handle)\n```\n\n回想一下，当包装的协程正常完成、返回、引发未处理的异常或任务被取消时，任务可能已完成。\n\
    \n`add_done_callback()` 方法可用于添加或注册任意数量的完成回调函数。\n\n我们还可以通过 `remove_done_callback()`\
    \ 函数移除或取消注册回调函数。\n\n例如：\n\n```\n...\n# 移除完成回调函数\ntask.remove_done_callback(handle)\n\
    ```\n\n我们可以探讨如何在任务上使用完成回调函数。\n\n在此示例中，我们将定义一个完成回调函数，该函数将报告任务是否已完成。"
