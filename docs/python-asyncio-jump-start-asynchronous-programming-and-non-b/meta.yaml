  md: "# How to Open a Socket Connection on a Port\n\nWe can open a socket connection\
    \ in asyncio using the asyncio.open_connection() function.\n\nThis takes the host\
    \ and port number and returns a StreamReader and StreamWriter for interacting\
    \ with the server via the socket.\n\nThe asyncio.open_connection() function is\
    \ a coroutine and must be awaited. It will return once the connection is open.\n\
    \nFor example:\n\n```\n...\n# open a socket connection\nreader, writer = asyncio.open_connection(\n\
    \    'python.org', 80)\n```\n\nIf a connection can be made, the port is open.\
    \ Otherwise, if the connection cannot be made, the port is not open.\n\nThe problem\
    \ is, how do we know a connection cannot be made?\n\nIf a port is not open, the\
    \ call may wait for a long time before giving up. We need a way to give up after\
    \ a time limit.\n\nThis can be achieved using the asyncio.wait_for() function.\n\
    \nThis is a coroutine that will execute an awaitable and wait a fixed interval\
    \ in seconds before giving up and raising an asyncio.TimeoutError exception.\n\
    \nWe can create the coroutine for the asyncio.open_connection() function and pass\
    \ it to the wait_for() coroutine.\n\nThis will allow us to attempt to make a socket\
    \ connection on a given port for a fixed interval, such as one or three seconds.\n\
    \nFor example:"
  merge: -1
  pgno: 169
- img_proc: true
  md: "```\n...\n# create coroutine for opening a connection\ncoro = asyncio.open_connection('python.org',\
    \ 80)\n# execute the coroutine with a timeout\ntry:\n    # open the connection\
    \ and wait for a moment\n    _ = await asyncio.wait_for(coro, 1.0)\n    # ...\n\
    except asyncio.TimeoutError:\n    # ...\n```\n\nIf the connection can be made\
    \ within the time limit we can then close the connection.\n\nThis can be achieved\
    \ by calling the close() method on the StreamWriter object returned from asyncio.open_connection().\n\
    \nFor example:\n\n```\n...\n# close connection once opened\nwriter.close()\n```\n\
    \nOtherwise, if the asyncio.TimeoutError exception is raised, we can assume that\
    \ the port is probably not open.\n\nWe can tie all of this together into a coroutine\
    \ function that tests one port on one host and returns True if the port is open\
    \ or False otherwise.\n\nThe test_port_number() coroutine function below implements\
    \ this.\n\n```\n# returns True if a connection can be made\nasync def test_port_number(host,\
    \ port, timeout=3):\n    # create coroutine for opening a connection\n    coro\
    \ = asyncio.open_connection(host, port)\n    # execute the coroutine with a timeout\n\
    \    try:\n        # open the connection and wait for a moment\n        _,writer\
    \ = await asyncio.wait_for(coro, timeout)\n        # close connection once opened\n\
    \        writer.close()\n```"
  merge: -1
  pgno: 170
- img_proc: true
  md: "```\n# indicate the connection can be opened\n    return True\nexcept asyncio.TimeoutError:\n\
    \    # indicate the connection cannot be opened\n    return False\n```\n\nNext,\
    \ let’s look at how we can scan a large number of ports, one by one."
  merge: -1
