- md: "## How to Await a Coroutine\n\nAnother way to run a coroutine is to await it\
    \ from a running coroutine.\n\nThis requires the use of the `await` expression.\n\
    \nThe `await` expression takes an awaitable and suspends the caller. It schedules\
    \ the provided awaitable if needed. The caller will resume only once the provided\
    \ awaitable is done.\n\nFor example:\n\n```\n...\n# await an awaitable\nawait\
    \ coro\n```\n\nAn awaitable is an object that can be waited on using the `await`\
    \ expression.\n\nIt is an object that implements the `__await__()` method.\n\n\
    Coroutines are awaitables, but so too are `asyncio.Task` and `asyncio.Future`\
    \ objects.\n\nWe can execute a coroutine by awaiting it directly from within another\
    \ coroutine.\n\nFor example:\n\n```\n# defines a custom coroutine\ndef another_coroutine():\n\
    \    ...\n    # create the coroutine\n    coro = custom_coroutine()\n    # execute\
    \ and wait for the coroutine to finish\n    await coro\n```\n\nThis is typically\
    \ performed in a single line.\n\nFor example:\n\n```\n...\n# execute and wait\
    \ for the coroutine to finish\nawait custom_coroutine()\n```\n\nThe asyncio API\
    \ provides coroutine functions that return coroutine objects that can be awaited.\n\
    \nAn example is asyncio.sleep(). This function takes a number of seconds as an\
    \ integer or floating point value and returns a coroutine that can be awaited.\n\
    \nFor example:\n\n```\n...\n# execute and wait for the coroutine to finish\nawait\
    \ asyncio.sleep(1)\n```\n\nThis suspends the caller and executes a coroutine that\
    \ sleeps for a given number of seconds, e.g. is also suspended.\n\nIt is a helpful\
    \ function that we will use often to simulate a coroutine doing some work.\n\n\
    The example below executes a coroutine that in turn executes and awaits the asyncio.sleep()\
    \ coroutine.\n\n```\n# SuperFastPython.com\n# example of running a coroutine from\
    \ a coroutine\nimport asyncio\n\n# main coroutine\nasync def main():\n    # report\
    \ a message\n    print('Hello from a coroutine')\n    # sleep for a moment\n \
    \   await asyncio.sleep(1)\n\n# start the coroutine program\nasyncio.run(main())\n\
    ```\n\nRunning the example creates the main() coroutine and passes the coroutine\
    \ object to the `run()` function.\n\nThe `run()` function then starts the asyncio\
    \ event loop and schedules the `main()` coroutine.\n\nThe `main()` coroutine executes\
    \ and reports a message. It then creates the `sleep()` coroutine and schedules\
    \ it for execution, suspending it until it is done.\n\nThe `sleep()` coroutine\
    \ runs and suspends itself for a fixed number of seconds.\n\nThe `sleep()` coroutine\
    \ terminates, then the `main()` coroutine resumes and terminates.\n\nThere are\
    \ no further coroutines to execute, so the event loop terminates.\n\n```\nHello\
    \ from a coroutine\n```\n\nWe now know how to create and run coroutines in asyncio\
    \ programs.\n\nNext, let’s explore asyncio tasks.\n\n## How to Create and Run\
    \ Tasks\n\nAsyncio provides tasks that provide a way to wrap and execute coroutines\
    \ independently.\n\nThe benefit is that the task provides a handle on the coroutine\
    \ that can be queried, from which results can be retrieved, and provides a way\
    \ to cancel a running coroutine.\n\nIn this section, we will explore how to create\
    \ and run tasks in asyncio programs.\n\n### What is an Asyncio Task\n\nAn `asyncio.Task`\
    \ is an object that schedules and independently runs an asyncio coroutine.\n\n\
    It provides a handle on a scheduled coroutine that an asyncio program can query\
    \ and use to interact with the coroutine.\n\nA task is created from a coroutine.\
    \ It requires a coroutine object, wraps the coroutine, schedules it for execution,\
    \ and provides ways to interact with it.\n\nA task is executed independently.\
    \ This means it is scheduled in the asyncio event loop and will execute regardless\
    \ of what else happens in the coroutine that created it. This is different from\
    \ executing a coroutine directly, where the caller must wait for it to complete.\n\
    \nThe `asyncio.Task` class extends the `asyncio.Future` class and an instance\
    \ are awaitable.\n\nA `Future` is a lower-level class that represents a result\
    \ that will eventually arrive.\n\nClasses that extend the `Future` class are often\
    \ referred to as Future-like.\n\nBecause a `Task` is awaitable it means that a\
    \ coroutine can wait for a task to be done using the await expression.\n\nFor\
    \ example:\n\n```\n...\n# wait for a task to be done\nawait task\n```\n\nNow that\
    \ we know what an asyncio task is, let’s look at how we can create one.\n\n###\
    \ How to Create a Task\n\nA task is created using a provided coroutine instance.\n\
    \nIn fact, a task can only be created and scheduled within a coroutine.\n\nA task\
    \ can be created using the asyncio.create_task() function.\n\nThe asyncio.create_task()\
    \ function takes a coroutine instance and an optional name for the task and returns\
    \ an asyncio.Task instance.\n\nFor example:\n\n```\n...\n# create a coroutine\n\
    coro = task_coroutine()\n# create a task from a coroutine\ntask = asyncio.create_task(coro)\n\
    ```\n\nThis can be achieved with a compound statement on a single line.\n\nFor\
    \ example:\n\n```\n...\n# create a task from a coroutine\ntask = asyncio.create_task(task_coroutine())\n\
    ```\n\nThis will do a few things:\n\n1. Wrap the coroutine in a Task instance.\n\
    2. Schedule the task for execution in the event loop.\n3. Return a Task instance.\n\
    \nThe task instance can be discarded, interacted with via methods, and awaited\
    \ by a coroutine.\n\nThere are other ways to create a task using the low-level\
    \ API, but this is the preferred way to create a Task from a coroutine in an asyncio\
    \ program.\n\nNext, let’s look at when exactly the task will run.\n\n### When\
    \ Does the Task Run\n\nA common question after creating a task is when does it\
    \ run?\n\nThis is a good question.\n\nAlthough we can schedule a coroutine to\
    \ run independently as a task with the create_task() function, it may not run\
    \ immediately.\n\nIn fact, the task will not execute until the event loop has\
    \ an opportunity to execute it.\n\nThis will not happen until all other coroutines\
    \ are not running and it is the task’s turn to run.\n\nFor example, if we had\
    \ an asyncio program with one coroutine that created and scheduled a task, the\
    \ scheduled task will not run until the calling coroutine that created the task\
    \ is suspended.\n\nThis may happen if the calling coroutine chooses to sleep,\
    \ chooses to await another coroutine or task, or chooses to await the new task\
    \ that was scheduled.\n\nFor example:\n\n```\n...\n# create a task from a coroutine\n\
    task = asyncio.create_task(task_coroutine())\n# await the task, allowing it to\
    \ run\nawait task\n```\n\nNow that we know what a task is and how to create one,\
    \ let’s look at a worked example.\n\n### Example of Creating and Running a Task\n\
    \nWe can explore an example of creating a Task from a coroutine in an asyncio\
    \ program.\n\nThis is the quintessential use case of creating and using a task.\n\
    \nIn this example, we will define a coroutine that we will wrap in a task. We\
    \ will then define the main coroutine that will be the entry point of the program.\
    \ A task will be created from our task coroutine and then await the task to complete.\n\
    \nThe complete example is listed below.\n\n```\n# SuperFastPython.com\n# example\
    \ of creating and awaiting an asyncio task\nimport asyncio\n\n# define a coroutine\
    \ for a task\nasync def task_coroutine():\n    # report a message\n    print('executing\
    \ the task')\n    # suspend for a moment\n    await asyncio.sleep(1)\n\n# custom\
    \ coroutine\nasync def main():\n    # report a message\n    print('main coroutine')\n\
    \    # create and schedule the task\n    task = asyncio.create_task(task_coroutine())\n\
    \    # wait for the task to complete\n    await task\n\n# start the asyncio program\n\
    asyncio.run(main())\n```\n\nRunning the example first creates the `main()` coroutine\
    \ and uses it as the entry point to the asyncio program.\n\nThe `main()` coroutine\
    \ then reports a message. It then creates an instance of the `task_coroutine()`\
    \ coroutine and passes it to the `create_task()` function in order to wrap it\
    \ in a Task instance and return the instance.\n\nThis schedules the Task-wrapped\
    \ coroutine for execution as soon as it is able.\n\nThe `main()` coroutine then\
    \ continues on and then suspends execution and awaits the task to be completed.\n\
    \nThis gives the task an opportunity to execute. It reports a message and then\
    \ suspends, sleeping for one second.\n\nAt this time both the `main()` coroutine\
    \ and the Task are suspended.\n\nThe Task resumes and then terminates.\n\nThe\
    \ `main()` coroutine then continues on and terminates, which closes the asyncio\
    \ program.\n\n```\nmain coroutine\nexecuting the task\n```\n\nNow that we know\
    \ how to create tasks, let’s look at how we can interact with them."
  mdcn: "## 如何等待协程\n\n运行协程的另一种方式是从一个正在运行的协程中等待它。\n\n这需要使用 `await` 表达式。\n\n`await`\
    \ 表达式接受一个可等待对象并挂起调用者。如果需要，它会调度提供的可等待对象。只有当提供的可等待对象完成后，调用者才会恢复。\n\n例如：\n\n```\n\
    ...\n# 等待一个可等待对象\nawait coro\n```\n\n可等待对象是一个可以使用 `await` 表达式等待的对象。\n\n它是一个实现了\
    \ `__await__()` 方法的对象。\n\n协程是可等待对象，但 `asyncio.Task` 和 `asyncio.Future` 对象也是。\n\
    \n我们可以通过直接从另一个协程中等待它来执行一个协程。\n\n例如：\n\n```\n# 定义一个自定义协程\ndef another_coroutine():\n\
    \    ...\n    # 创建协程\n    coro = custom_coroutine()\n    # 执行并等待协程完成\n    await\
    \ coro\n```\n\n这通常在一行中完成。\n\n例如：\n\n```\n...\n# 执行并等待协程完成\nawait custom_coroutine()\n\
    ```\n\nasyncio API 提供协程函数，这些函数返回可以被等待的协程对象。\n\n一个例子是 asyncio.sleep()。这个函数接受一个以整数或浮点值表示的秒数，并返回一个可以被等待的协程。\n\
    \n例如：\n\n```\n...\n# 执行并等待协程完成\nawait asyncio.sleep(1)\n```\n\n这会挂起调用者并执行一个休眠给定秒数的协程，即它也被挂起。\n\
    \n这是一个有用的函数，我们将经常使用它来模拟协程执行一些工作。\n\n下面的例子执行一个协程，该协程又执行并等待 asyncio.sleep() 协程。\n\
    \n```\n# SuperFastPython.com\n# 从协程运行协程的示例\nimport asyncio\n\n# 主协程\nasync def\
    \ main():\n    # 报告一条消息\n    print('Hello from a coroutine')\n    # 休眠片刻\n   \
    \ await asyncio.sleep(1)\n\n# 启动协程程序\nasyncio.run(main())\n```\n\n运行该示例会创建 main()\
    \ 协程，并将协程对象传递给 `run()` 函数。\n\n然后 `run()` 函数启动 asyncio 事件循环并调度 `main()` 协程。\n\n\
    `main()` 协程执行并报告一条消息。然后它创建 `sleep()` 协程并调度其执行，将其挂起直到完成。\n\n`sleep()` 协程运行并挂起自身固定秒数。\n\
    \n`sleep()` 协程终止，然后 `main()` 协程恢复并终止。\n\n没有更多的协程需要执行，因此事件循环终止。\n\n```\nHello from\
    \ a coroutine\n```\n\n我们现在知道如何在 asyncio 程序中创建和运行协程。\n\n接下来，让我们探索 asyncio 任务。\n\
    \n## 如何创建和运行任务\n\nAsyncio 提供任务，提供了一种独立包装和执行协程的方式。\n\n好处是任务提供了对协程的句柄，可以查询该句柄以获取结果，并提供了一种取消正在运行的协程的方法。\n\
    \n在本节中，我们将探讨如何在 asyncio 程序中创建和运行任务。\n\n### 什么是 Asyncio 任务\n\n`asyncio.Task` 是一个调度并独立运行\
    \ asyncio 协程的对象。\n\n它提供了一个对已调度协程的句柄，asyncio 程序可以查询该句柄并与协程交互。\n\n任务是从协程创建的。它需要一个协程对象，包装该协程，调度其执行，并提供与之交互的方式。\n\
    \n任务是独立执行的。这意味着它被调度在 asyncio 事件循环中，并将执行，无论创建它的协程中发生什么其他事情。这与直接执行协程不同，后者调用者必须等待其完成。\n\
    \n`asyncio.Task` 类扩展了 `asyncio.Future` 类，其实例是可等待的。\n\n`Future` 是一个更底层的类，表示一个最终会到达的结果。\n\
    \n扩展 `Future` 类的类通常被称为 Future 类。\n\n因为 `Task` 是可等待的，这意味着协程可以使用 `await` 表达式等待任务完成。\n\
    \n例如：\n\n```\n...\n# 等待任务完成\nawait task\n```\n\n现在我们知道什么是 asyncio 任务了，让我们看看如何创建一个。\n\
    \n### 如何创建任务\n\n任务是使用提供的协程实例创建的。\n\n事实上，任务只能在协程内创建和调度。\n\n可以使用 asyncio.create_task()\
    \ 函数创建任务。\n\nasyncio.create_task() 函数接受一个协程实例和一个可选的任务名称，并返回一个 asyncio.Task 实例。\n\
    \n例如：\n\n```\n...\n# 创建一个协程\ncoro = task_coroutine()\n# 从协程创建一个任务\ntask = asyncio.create_task(coro)\n\
    ```\n\n这可以通过在一行中使用复合语句来实现。\n\n例如：\n\n```\n...\n# 从协程创建一个任务\ntask = asyncio.create_task(task_coroutine())\n\
    ```\n\n这将做几件事：\n\n1. 将协程包装在 Task 实例中。\n2. 在事件循环中调度任务执行。\n3. 返回一个 Task 实例。\n\n\
    任务实例可以被丢弃，通过方法交互，并由协程等待。\n\n还有其他方法可以使用低级 API 创建任务，但这是在 asyncio 程序中从协程创建 Task 的首选方式。\n\
    \n接下来，让我们看看任务究竟何时运行。\n\n### 任务何时运行\n\n创建任务后的一个常见问题是它何时运行？\n\n这是一个好问题。\n\n虽然我们可以使用\
    \ create_task() 函数将协程调度为独立运行的任务，但它可能不会立即运行。\n\n事实上，在事件循环有机会执行任务之前，任务不会执行。\n\n\
    这不会发生，直到所有其他协程都不在运行，并且轮到该任务运行。\n\n例如，如果我们有一个 asyncio 程序，其中有一个协程创建并调度了一个任务，那么调度的任务将不会运行，直到创建该任务的调用协程被挂起。\n\
    \n如果调用协程选择休眠、选择等待另一个协程或任务，或者选择等待新调度的任务，就会发生这种情况。\n\n例如：\n\n```\n...\n# 从协程创建一个任务\n\
    task = asyncio.create_task(task_coroutine())\n# 等待任务，允许其运行\nawait task\n```\n\n\
    现在我们知道什么是任务以及如何创建它，让我们看一个实际的例子。\n\n### 创建和运行任务的示例\n\n我们可以探讨一个在 asyncio 程序中从协程创建\
    \ Task 的示例。\n\n这是创建和使用任务的典型用例。\n\n在这个例子中，我们将定义一个协程，我们将把它包装在一个任务中。然后我们将定义主协程，它将作为程序的入口点。将从我们的任务协程创建一个任务，然后等待任务完成。\n\
    \n完整的例子如下所示。\n\n```\n# SuperFastPython.com\n# 创建和等待 asyncio 任务的示例\nimport asyncio\n\
    \n# 为任务定义一个协程\nasync def task_coroutine():\n    # 报告一条消息\n    print('executing\
    \ the task')\n    # 挂起片刻\n    await asyncio.sleep(1)\n\n# 自定义协程\nasync def main():\n\
    \    # 报告一条消息\n    print('main coroutine')\n    # 创建并调度任务\n    task = asyncio.create_task(task_coroutine())\n\
    \    # 等待任务完成\n    await task\n\n# 启动 asyncio 程序\nasyncio.run(main())\n```\n\n\
    运行该示例首先创建 `main()` 协程，并将其用作 asyncio 程序的入口点。\n\n然后 `main()` 协程报告一条消息。然后它创建 `task_coroutine()`\
    \ 协程的一个实例，并将其传递给 `create_task()` 函数，以便将其包装在 Task 实例中并返回该实例。\n\n这会在能够执行时立即调度 Task\
    \ 包装的协程执行。\n\n然后 `main()` 协程继续执行，然后挂起执行并等待任务完成。\n\n这给了任务执行的机会。它报告一条消息，然后挂起，休眠一秒钟。\n\
    \n此时，`main()` 协程和 Task 都被挂起。\n\nTask 恢复然后终止。\n\n然后 `main()` 协程继续执行并终止，这会关闭 asyncio\
    \ 程序。\n\n```\nmain coroutine\nexecuting the task\n```\n\n现在我们知道如何创建任务了，让我们看看如何与它们交互。"
