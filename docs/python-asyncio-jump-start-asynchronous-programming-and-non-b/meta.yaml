- img_proc: true
  md: "We can explore how to use a asyncio.Semaphore with a worked example.\n\nIn\
    \ this example, we will start a suite of coroutines but limit the number that\
    \ can perform an action simultaneously. A semaphore will be used to limit the\
    \ number of concurrent tasks that may execute which will be less than the total\
    \ number of coroutines, allowing some coroutines to suspend, wait for access,\
    \ then be notified and acquire access.\n\nThe complete example is listed below.\n\
    \n```\n# SuperFastPython.com\n# example of using an asyncio semaphore\nfrom random\
    \ import random\nimport asyncio\n\n# task coroutine\nasync def task(semaphore,\
    \ number):\n    # acquire the semaphore\n    async with semaphore:\n        #\
    \ generate a random value between 0 and 1\n        value = random()\n        #\
    \ suspend for a moment\n        await asyncio.sleep(value)\n        # report a\
    \ message\n        print(f'Task {number} got {value}')\n\n# main coroutine\nasync\
    \ def main():\n    # create the shared semaphore\n    semaphore = asyncio.Semaphore(2)\n\
    \    # create and schedule tasks\n    tasks = [asyncio.create_task(task(semaphore,\
    \ i))\n        for i in range(10)]\n    # wait for all tasks to complete\n   \
    \ _ = await asyncio.wait(tasks)\n\n# start the asyncio program\nasyncio.run(main())\n\
    ```\n\nRunning the example first creates the main() coroutine that is used as\
    \ the entry point into the asyncio program."
