  md: '# Introduction


    The asyncio module allows us to develop asynchronous I/O programs using coroutines
    in Python.


    Coroutines are a different unit of concurrency from threads and processes. The
    Python language was expanded to provide coroutines with specialized expressions
    such as async/await.


    Coroutines are suited to the asynchronous programming paradigm, and asynchronous
    programming is well suited to programs that read and write from resources in a
    non-blocking manner, called non-blocking or asynchronous I/O.


    This book provides a jump-start guide to get you productive with developing asyncio
    programs.


    It is not a dry, long-winded academic textbook. Instead, it is a crash course
    for Python developers that provides carefully designed lessons with complete and
    working code examples that you can copy-paste into your project today and get
    results.


    Before we dive into the lessons, let’s look at what is coming with a breakdown
    of this book.'
  merge: -1
  pgno: 9
- img_proc: true
  md: '# # Who Is This For


    Before we dive in, let’s make sure you’re in the right place.


    This book is designed for Python developers who want to discover how to use and
    get the most out of the asyncio module to write fast programs.


    Specifically, this book is for:


    +   - Developers that can write simple Python programs.

    - Developers that need better performance from current or future Python programs.

    - Developers that are working with I/O-based tasks.


    This book does not require that you are an expert in the Python programming language
    or concurrency.


    Specifically:


    +   - You do not need to be an expert Python developer.

    - You do not need to be an expert in concurrency.


    Next, let’s take a look at what this book will cover.'
  merge: -1
