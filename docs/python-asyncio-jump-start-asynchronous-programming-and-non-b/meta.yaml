  md: '# How to Protect Critical Sections with a Mutex Lock


    A mutual exclusion lock, or mutex lock for short, is a concurrency primitive intended
    to prevent a race condition.


    A race condition is a concurrency failure case when two coroutines run the same
    code and access or update the same resource (e.g. data variables, stream, etc.)
    leaving the resource in an unknown and inconsistent state.


    Race conditions often result in unexpected behavior of a program and/or corrupt
    data.


    These sensitive parts of code that can be executed by multiple coroutines concurrently
    and may result in race conditions are called critical sections. A critical section
    may refer to a single block of code, but it also refers to multiple accesses to
    the same data variable or resource from multiple functions.


    Next, let’s look at how we can use mutex locks.


    # How to Use an Asyncio Lock


    Python provides a mutual exclusion lock for use with coroutines via the asyncio.Lock
    class.


    An instance of the Lock class can be created and then acquired by coroutines before
    accessing a critical section, and released after exiting the critical section.


    The acquire() method is used to acquire the lock. It is a coroutine and must be
    awaited, suspending the calling coroutine. The lock can be released again later
    via the release() method.


    For example:


    ```

    ...

    # create a lock

    ```'
