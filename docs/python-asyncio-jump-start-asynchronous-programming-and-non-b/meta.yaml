    \n# Example of Using an Asyncio Condition\n\nIn this example, we will explore\
    \ using an asyncio.Condition to notify a waiting coroutine that something has\
    \ happened.\n\nWe will use a task to prepare some data and notify a waiting coroutine.\
    \ In the main coroutine, we will create and schedule the new task and use the\
    \ condition to wait for the work to be completed.\n\nThe complete example is listed\
    \ below.\n\n```\n# SuperFastPython.com\n# example of wait/notify with an asyncio\
    \ condition\nimport asyncio\n\n# task coroutine\nasync def task(condition, work_list):\n\
    \    # suspend for a moment\n    await asyncio.sleep(1)\n    # add data to the\
    \ work list\n    work_list.append(33)\n    # notify a waiting coroutine that the\
    \ work is done\n    print('Task sending notification...')\n    async with condition:\n\
    \        condition.notify()\n\n# main coroutine\nasync def main():\n    # create\
    \ a condition\n    condition = asyncio.Condition()\n    # prepare the work list\n\
    \    work_list = []\n```"
