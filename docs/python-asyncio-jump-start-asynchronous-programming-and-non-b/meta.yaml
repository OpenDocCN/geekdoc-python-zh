  md: '# Lesson Structure


    Each lesson has two main parts, they are:


    +   1. The body of the lesson.

    2. The lesson overview.


    The body of the lesson will introduce a topic with code examples, whereas the
    lesson overview will review what was learned with exercises and links for further
    information.


    Each lesson has a specific learning outcome and is designed to be completed in
    less than one hour.


    Each lesson is also designed to be self-contained so that you can read the lessons
    out of order if you choose, such as dipping into topics in the future to solve
    specific programming problems.


    The lessons were written with some intentional repetition of key concepts. These
    gentle reminders are designed to help embed the common usage patterns in your
    mind so that they become second nature.


    We Python developers learn best from real and working code examples.


    Next, let’s learn more about the code examples provided in the book.'
