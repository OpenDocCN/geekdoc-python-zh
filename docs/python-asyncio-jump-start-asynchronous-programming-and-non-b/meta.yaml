    \nNow that we know how to use asynchronous context managers, let’s look at a worked\
    \ example.\n\n## Example of Using an Asynchronous Context Manager\n\nWe can explore\
    \ how to use an asynchronous context manager via the `async with` expression.\n\
    \nIn this example, we will create and use the context manager in a normal manner.\n\
    \nWe will use an `async with` expression and on one line, create and enter the\
