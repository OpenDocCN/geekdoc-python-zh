  md: 'The combination of non-blocking I/O with asynchronous programming is so common
    that it is referred to by the shorthand of asynchronous I/O.


    +   - **Asynchronous I/O**: A shorthand that refers to combining asynchronous
    programming with non-blocking I/O.


    Next, let’s consider asynchronous programming support in Python.


    # Asynchronous Programming in Python


    Broadly, asynchronous programming in Python refers to making requests and not
    blocking to wait for them to complete.


    We can implement asynchronous programming in Python in various ways.


    The first and obvious example is the asyncio module.


    This module directly offers an asynchronous programming environment using the
    async/await syntax and non-blocking I/O with sockets and subprocesses.


    It is implemented using coroutines that run in an event loop that itself runs
    in a single thread.


    +   - **Asyncio**: An asynchronous programming environment provided in Python
    via the asyncio module.


    We will learn more about this module in the next section.


    More broadly, Python offers threads and processes that can execute tasks asynchronously.


    For example, one thread can start a second thread to execute a function call and
    resume other activities. The operating system will schedule and execute the second
    thread at some time and the first thread may or may not check on the status of
    the task, manually.


    More concretely, Python provides Executor-based thread pools and process'
