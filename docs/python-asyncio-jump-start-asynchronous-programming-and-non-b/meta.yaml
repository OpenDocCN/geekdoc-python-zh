    \ that they are completed.\n\nIt allows us to execute many coroutines or tasks\
    \ concurrently and get the results from tasks as they are done, rather than the\
    \ order we issued them.\n\nNow that we know what as_completed() is, let’s look\
    \ at how we can use it.\n\n# How to Use asyncio.as_completed()\n\nThe asyncio.as_completed()\
    \ function is called with a collection of awaitables.\n\nThis may be a list, dict,\
