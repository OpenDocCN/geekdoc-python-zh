    # What is Coroutine-Safe


    Thread-safe refers to program code that can be executed free of concurrency errors
    by multiple threads concurrently.


    Primarily, it refers to the fact that the code is free of race conditions.


    A race condition is a bug in concurrency programming. It is a failure case where
    the behavior of the program is dependent upon the order of execution by two or
    more threads. This means the behavior of the program will be unpredictable, possibly
    changing each time it is run.


    Process-safe refers to program code that can be executed free of concurrency errors
    by multiple processes concurrently. It is the concept of *thread-safe* applied
    to processes, where processes are the unit of concurrency instead of threads.


    As such, coroutine-safe is the idea of *thread-safe* and *process-safe* applied
    to coroutines.


    Although two or more coroutines cannot execute at the same time within the event
    loop, it is possible for program state and resources to be corrupted or made inconsistent
    via concurrent execution.


    Coroutine-safe means that code or a program can be executed concurrently with
    multiple coroutines and will not result in concurrency failure modes such as race
    conditions.


    The asyncio module provides a number of concurrency primitives that are coroutine-safe.


    This lesson will focus of ways to share data, protect data, and coordinate behavior
    between coroutines that is coroutine-safe.'
