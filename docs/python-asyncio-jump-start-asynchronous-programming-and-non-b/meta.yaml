  md: 'as well.


    This makes a coroutine calling another coroutine more powerful than a subroutine
    calling another subroutine. It is central to the cooperative multitasking facilitated
    by coroutines.


    Next, let’s look at how coroutines are related to generators.


    # Coroutine vs Generator


    A generator is a special function that can suspend its execution.


    A generator function can be defined like a normal function although it uses a
    yield expression at the point it will suspend its execution and return a value.


    A generator function will return a generator iterator object that can be traversed,
    such as via a for-loop. Each time the generator is executed, it runs from the
    last point it was suspended to the next yield expression.


    A coroutine can suspend or yield to another coroutine using an await expression.
    It will then resume from this point once the awaited coroutine has been completed.


    We can think of a generator as a special type of coroutine and cooperative multitasking
    used in loops.


    Before coroutines were developed, generators were extended so that they can be
    used like coroutines in our programs.


    This required a lot of technical knowledge of generators and the development of
    custom task schedulers.


    This was made possible via changes to the generators and the introduction of the
    yield from expression.


    These were later deprecated in favor of the modern async/await expressions.


    Next, let’s look at how coroutines are different to threads.'
