  md: '# How to Run Many Tasks as a Group


    The `asyncio.gather()` function allows the caller to group multiple awaitables
    together and have them executed concurrently.


    We may use the `asyncio.gather()` function in situations where we create many
    tasks or coroutines up-front and then wish to execute them all at once and wait
    for them all to complete before continuing on.


    This is a likely situation where the result is required from many similar tasks,
    e.g. same task or coroutine with different data.


    The awaitables can be executed concurrently, results returned, and the main program
    can resume by making use of the results.


    Now that we know what the `asyncio.gather()` function is, let''s look at how we
    can use it.


    # How to use asyncio.gather()


    The `asyncio.gather()` function takes one or more awaitables as arguments.


    Recall an awaitable may be a coroutine, a `Future` or a `Task`. Therefore, we
    can call the `gather()` function with multiple tasks, multiple coroutines, or
    a mixture of tasks and coroutines.


    For example:


    ```

    ...

    # execute multiple coroutines

    asyncio.gather(coro1(), coro2())

    ```


    If `Task` objects are provided to `gather()`, they will already be running because
    tasks are scheduled as part of being created.


    The `asyncio.gather()` function takes awaitables as position arguments.'
  merge: -1
  pgno: 70
- img_proc: true
  md: 'We cannot create a list or collection of awaitables and provide it to gather,
    as this will result in an error.


    For example:


    ```

    ...

    # create a list of coroutines

    coros = [coro1(), coro2()]

    # cannot provide a list of awaitables directly

    asyncio.gather(corors) # error

    ```


    A list of awaitables can be provided if it is first unpacked into separate expressions
    using the star operator (*), also called the asterisk operator.


    This operator specifically unpacks iterables, like lists, into separate expressions.
    It is often referred to as the iterable unpacking operator.


    For example:


    ```

    ...

    # create a list of coroutines

    coros = [coro1(), coro2()]

    # gather with an unpacked list of awaitables

    asyncio.gather(*coros)

    ```


    If coroutines are provided to gather(), they are wrapped in Task objects automatically.


    The gather() function does not suspend directly. Instead, it returns an asyncio.Future
    object that represents the group of awaitables.


    For example:


    ```

    ...

    # get a future that represents multiple awaitables

    group = asyncio.gather(coro1(), coro2())

    ```


    Once the Future object is created it is scheduled automatically within the event
    loop.'
