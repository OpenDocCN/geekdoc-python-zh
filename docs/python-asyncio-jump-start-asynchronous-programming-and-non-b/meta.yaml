    # How to Use Asynchronous Iterators


    An asynchronous iterator is an object that implements the `__aiter__()` and `__anext__()`
    methods.


    Before we take a close look at asynchronous iterators, let’s review classical
    iterators and see how they compare to asynchronous iterators.


    # What are Classical and Asynchronous Iterators


    An iterator is an object that implements a specific interface.


    Specifically, the `__iter__()` method returns an instance of the iterator, and
    the `__next__()` method steps the iterator one cycle and returns a value.


    An iterator can be stepped using the `next()` built-in function or traversed using
    a for-loop.


    Many objects are iterable, most notable are containers such as lists.


    An asynchronous iterator is an object that implements a specific interface, specifically
    the `__aiter__()` and `__anext__()` methods.


    The `__aiter__()` method must return an instance of the iterator. The `__anext__()`
    method must return an awaitable that steps the iterator.


    An asynchronous iterator may only be stepped or traversed in an asyncio program,
    such as within a coroutine.


    An asynchronous iterator can be stepped using the `anext()` built-in function
    that returns an awaitable that executes one step of the iterator, e.g. one call
    to the `__anext__()` method.


    An asynchronous iterator can be traversed using the `async for` expression that
    will automatically call `anext()` each iteration and await the returned awaitable
    in order to retrieve the return value. We will learn more about the `async for`
    expression in a moment.'
