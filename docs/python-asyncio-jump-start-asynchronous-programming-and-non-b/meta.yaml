- img_proc: true
  md: 'The main() coroutine runs and first creates the shared semaphore with an initial
    counter value of 2, meaning that two coroutines can hold the semaphore at once.


    The main() coroutine then creates and schedules 10 tasks to execute our task()
    coroutine, passing the shared semaphore and a unique number between 0 and 9.


    The main() coroutine then suspends and waits for all tasks to complete.


    The tasks run one at a time.


    Each task first attempts to acquire the semaphore. If there is a position available
    it proceeds, otherwise it waits for a position to become available.


    Once acquired, a task generates a random value, suspend for a moment, and then
    reports the generated value. It then releases the semaphore and terminates. The
    semaphore is not released while the task is suspended in the call to asyncio.sleep().


    The body of the semaphore context manager is limited to two semaphores at a time.


    This highlights how we can limit the number of coroutines to execute a block of
    code concurrently.


