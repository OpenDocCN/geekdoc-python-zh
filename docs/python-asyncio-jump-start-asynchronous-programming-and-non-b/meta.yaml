- img_proc: true
  md: "The complete example is listed below.\n\n```\n# SuperFastPython.com\n# example\
    \ of an asyncio mutual exclusion (mutex) lock\nfrom random import random\nimport\
    \ asyncio\n\n# task coroutine with a critical section\nasync def task(lock, num,\
    \ value):\n    # acquire the lock to protect the critical section\n    async with\
    \ lock:\n        # report a message\n        print(f'>{num} got the lock, sleep\
    \ for {value}')\n        # suspend for a moment\n        await asyncio.sleep(value)\n\
    \n# entry point\nasync def main():\n    # create a shared lock\n    lock = asyncio.Lock()\n\
    \    # create many concurrent coroutines\n    coros = [task(lock, i, random())\
    \ for i in range(10)]\n    # execute and wait for tasks to complete\n    await\
    \ asyncio.gather(*coros)\n\n# run the asyncio program\nasyncio.run(main())\n```\n\
    \nRunning the example first creates the main() coroutine and uses it as the entry\
    \ point into the asyncio program.\n\nThe main() coroutine runs, first creating\
    \ the shared lock.\n\nIt then creates a list of coroutines, each is passed the\
    \ shared lock, a unique integer, and a random floating point value.\n\nThe list\
    \ of coroutines is passed to the gather() function and the main() coroutine suspends\
    \ until all coroutines are completed.\n\nA task coroutine executes, acquires the\
    \ lock, reports a message, then awaits the sleep, suspending."
