  - '[PAGE 37]


    # When to Use Asyncio


    There are perhaps three top reasons to adopt asyncio in a project, they are:


    +   - The non-blocking I/O with subprocesses or socket connections is required.

    - The benefits of coroutines outweigh the benefits of threads and processes.

    - The asynchronous programming paradigm is preferred or required.


    # Non-Blocking I/O is Required


    Asyncio is specifically designed for non-blocking I/O with subprocesses and TCP
    socket connections.


    If an application requires a large number of concurrent socket or subprocess tasks
    then asyncio is an obvious choice.


    Poster-child examples include:


    +   - Executing and checking the results of many commands on a system.

    - Making and managing many socket connections.

    - Serving access to many client socket connections.


    Although this is the focus of the asyncio module, it is not the only reason to
    adopt it in a project.


    # Coroutine-Based Concurrency is Required


    Coroutines and asyncio offer an alternative to concurrency with threads or processes.


    Each of threads, processes, and coroutines have benefits and limitations. Coroutines
    and the asyncio module together provide an alternative to concurrent programming.'
  - '[PAGE 38]


    Generally, coroutines are lightweight, they are just a type of function. The use
    less memory and are faster to start, suspend, and resume than threads and processes
    that are managed by the underlying operating system.


    An asyncio program may have orders of magnitude more concurrent coroutines than
    a threading program can have concurrent threads or a multiprocessing program can
    have concurrent processes.


    Asyncio be may required if a program may have tens or hundreds of thousands of
    concurrent tasks.


    # Asynchronous Programming is Required


    Asynchronous programming is a new or modern type of programming.


    It has proven very popular in other programming languages, such as JavaScript.


    Coroutines and asyncio unlock this capability in the Python interpreter and standard
    library, with no third-party libraries needed.


    Adopting asyncio for a project may be appropriate if the asynchronous programming
    paradigm is preferred. Sometimes a programming paradigm is chosen beforehand,
    making it a de facto requirement.


    Asynchronous programming with asyncio could be used instead of or in complement
    to a procedural-programming, object-oriented programming or functional programming
    paradigm.


    # When Not to Use Asyncio


    Asyncio should not always be used.


    Python provides robust and capable thread-based concurrency and process-based
    concurrency. These options should be used in most cases for concurrent programming
    in Python for I/O-bound tasks and CPU-bound tasks respectively.'
