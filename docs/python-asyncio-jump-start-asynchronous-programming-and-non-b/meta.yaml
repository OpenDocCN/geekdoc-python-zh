- img_proc: true
  md: 'In this case, we can see that port 80 for HTTP is open as expected, and port
    443 is also open for HTTPS.


    The program works fine, but it is painfully slow.


    On my system, it took about 51 minutes. This makes sense. If we test 1,023 ports
    and most ports are closed then we expect to wait 3 seconds on each attempt or
    1,023×31,023 \times 3 which equals 3,069 seconds. Converting this to minutes 306960\frac{3069}{60}
    equals about 51.15 minutes.


    ```

    > python.org:80 [OPEN]

    > python.org:443 [OPEN]

    ```


    The benefit of asyncio is that it can execute coroutines concurrently, specifically
    coroutines that perform non-blocking I/O.


    Next, we will look at how to run coroutines concurrently to speed up this port
    scanning process.'
