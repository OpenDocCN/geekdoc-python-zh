  md: '# How to Wait for Many Tasks


    The `asyncio.wait()` function can be used to wait for a collection of asyncio
    tasks to complete.


    Recall that an asyncio task is an instance of the `asyncio.Task` class that wraps
    a coroutine. It allows a coroutine to be scheduled and executed independently,
    and the Task instance provides a handle on the task for querying status and getting
    results.


    The `wait()` function allows us to wait for a collection of tasks to be done.


    The call to wait can be configured to wait for different conditions, such as all
    tasks being completed, the first task completed and the first task failing with
    an error.


    Next, let’s look at how we can use the `wait()` function.


    # How to Use asyncio.wait()


    The `asyncio.wait()` function takes a collection of awaitables, typically Task
    objects.


    This could be a `list`, `dict`, or `set` of task objects that we have created,
    such as via calls to the `asyncio.create()` task function in a list comprehension.


    For example:


    ```

    ...

    # create many tasks

    tasks = [asyncio.create_task(task(i)) for i in range(10)]

    ```


    The `asyncio.wait()` will not return until some condition on the collection of
    tasks is met.


    By default, the condition is that all tasks are completed.'
  merge: -1
  pgno: 75
- img_proc: true
  md: "The wait() function returns a tuple of two sets. The first set contains all\
    \ task objects that meet the condition, and the second contains all other task\
    \ objects that do not yet meet the condition.\n\nThese sets are referred to as\
    \ the *done* set and the *pending* set.\n\nFor example:\n\n```\n...\n# wait for\
    \ all tasks to complete\ndone, pending = await asyncio.wait(tasks)\n```\n\nTechnically,\
    \ the asyncio.wait() is a coroutine function that returns a coroutine.\n\nWe can\
    \ then await this coroutine which will return the tuple of sets.\n\nFor example:\n\
    \n```\n...\n# create the wait coroutine\nwait_coro = asyncio.wait(tasks)\n# await\
    \ the wait coroutine\nt = await wait_coro\n```\n\nThe condition waited for can\
    \ be specified by the return_when argument which is set to asyncio.ALL_COMPLETED\
    \ by default.\n\nFor example:\n\n```\n...\n# wait for all tasks to complete\n\
    done, pending = await asyncio.wait(tasks,\n    return_when=asyncio.ALL_COMPLETED)\n\
    ```\n\nWe can wait for the first task to be completed by setting return_when to\
    \ FIRST_COMPLETED.\n\nFor example:"
