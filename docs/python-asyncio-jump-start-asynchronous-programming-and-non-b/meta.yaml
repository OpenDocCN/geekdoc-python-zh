  md: '# How to Wait For a Task With a Timeout


    The `asyncio.wait_for()` function allows the caller to wait for an asyncio task
    or coroutine to complete with a timeout.


    If no timeout is specified, the `wait_for()` function will wait until the task
    is completed.


    If a timeout is specified and elapses before the task is complete, then the task
    is canceled.


    This allows the caller to both set an expectation about how long they are willing
    to wait for a task to complete, and to enforce the timeout by canceling the task
    if the timeout elapses.


    Now that we know what the `asyncio.wait_for()` function is, let’s look at how
    to use it.


    # How to Use asyncio.wait_for()


    The `asyncio.wait_for()` function takes an awaitable and a timeout.


    The awaitable may be a coroutine or a task.


    A timeout must be specified and may be `None` for no timeout, an integer or floating
    point number of seconds.


    The `wait_for()` function returns a coroutine that is not executed until it is
    explicitly awaited or scheduled as a task.


    For example:


    ```

    ...

    # wait for a task to complete

    await asyncio.wait_for(coro, timeout=10)

    ```


    If a coroutine is provided, it will be converted to the task when the'
