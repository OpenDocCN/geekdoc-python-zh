    \ range(10):\n        yield i\n```\n\n生成器执行到 `yield` 表达式，然后返回一个值。这会在该点挂起生成器。下次执行生成器时，它会从挂起的点恢复，并运行到下一个\
    \ `yield` 表达式。\n\n从技术上讲，生成器函数创建并返回一个生成器迭代器。生成器迭代器执行生成器函数的内容，根据需要进行 `yield` 和恢复。\n\
    \n生成器可以使用内置函数 `next()` 来分步执行。\n\n例如：\n\n```\n# 创建生成器\ngen = generator()\n# 步进生成器\n\
    result = next(gen)\n```\n\n不过，更常见的是将生成器迭代到完成，例如使用 for 循环或列表推导式。\n\n例如：\n\n```\n\
    # 遍历生成器并收集结果\nresults = [item for item in generator()]\n```\n\n异步生成器是使用 `yield`\
    \ 表达式的协程。\n\n与函数生成器不同，协程可以调度和等待其他协程和任务。\n\n与经典生成器类似，异步生成器函数可用于创建异步生成器迭代器，该迭代器可以使用内置的\
    \ `anext()` 函数（而不是 `next()` 函数）进行遍历。\n\n这意味着异步生成器迭代器实现了 `__anext__()` 方法，可以与 `async\
    \ for` 表达式一起使用。\n\n生成器的每次迭代都被调度并作为可等待对象执行。`async for` 表达式将调度并执行生成器的每次迭代，挂起调用协程并等待结果。\n\
    \n接下来，让我们探讨如何定义异步生成器。\n\n### 如何定义异步生成器\n\n我们可以通过定义一个至少包含一个 `yield` 表达式的协程来定义异步生成器。\n\
    \n这意味着该函数是使用 `async def` 表达式定义的。\n\n例如：\n\n```\n# 定义一个异步生成器\nasync def async_generator():\n\
    \    for i in range(10):\n        yield i\n```\n\n因为异步生成器是一个协程，并且每次迭代都返回一个在 asyncio\
    \ 事件循环中调度和执行的可等待对象，所以我们可以在生成器体内执行和等待可等待对象。\n\n例如：\n\n```\n# 定义一个等待的异步生成器\nasync\
    \ def async_generator():\n    for i in range(10):\n        # 挂起并休眠片刻\n       \
    \ await asyncio.sleep(1)\n        # 向调用者 yield 一个值\n        yield i\n```\n\n接下来，让我们看看如何创建异步生成器。\n\
    \n### 如何创建异步生成器\n\n要使用异步生成器，我们必须创建生成器。\n\n这看起来像是调用生成器，但实际上创建并返回一个迭代器对象，称为可迭代对象。\n\
    \n例如：\n\n```\n# 创建迭代器\nit = async_generator()\n```\n\n这会返回一种称为异步生成器迭代器的异步迭代器。\n\
    \n接下来，让我们看看如何步进异步生成器。\n\n### 如何步进异步生成器\n\n可以使用内置函数 `anext()` 来步进生成器，就像经典生成器使用\
    \ `next()` 函数一样。\n\n结果是一个可等待对象，可以被等待。\n\n例如：\n\n```\n# 获取生成器一步的可等待对象\nawaitable\
    \ = anext(gen)\n# 执行生成器的这一步并获取结果\nresult = await awaitable\n```\n\n这可以在一步中完成。\n\
    \n例如：\n\n```\n# 步进异步生成器\nresult = await anext(gen)\n```\n\n接下来，让我们看看如何遍历异步生成器。\n\
    \n### 如何遍历异步生成器\n\n异步生成器也可以使用 `async for` 表达式在循环中遍历，该表达式将自动等待循环的每次迭代。\n\n例如：\n\
    \n```\n# 遍历异步生成器\nasync for result in async_generator():\n    print(result)\n\
    ```\n\n我们也可以将异步列表推导式与 `async for` 表达式结合使用，以收集生成器的结果。\n\n例如：\n\n```\n# 使用异步生成器的异步列表推导式\n\
    results = [item async for item in async_generator()]\n```\n\n现在我们知道了如何创建和使用异步生成器，让我们来看一个实际的例子。\n\
    \n## 使用异步生成器的示例\n\n我们可以探索如何使用 `async for` 表达式来遍历异步生成器。\n\n在这个例子中，我们将使用 `async\
