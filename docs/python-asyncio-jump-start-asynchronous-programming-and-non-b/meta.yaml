  md: '# Learning Outcomes


    This book will transform you from a Python developer into a Python developer that
    can confidently bring concurrency to your projects with asyncio.


    After working through all of the lessons in this book, you will know:


    +   - How to define, create, and run coroutines and how to use the async/await
    expressions.

    - How to create asynchronous tasks, query their status, cancel them and add callback
    functions.

    - How to run many coroutines concurrently in a group and handle their results.

    - How to wait for many coroutines to complete, meet a condition, or timeout.

    - How to define, create and use asynchronous iterators, generators, and context
    managers.

    - How to use the async for and async with expressions in asyncio programs.

    - How to synchronize and coordinate coroutines with locks, semaphores, events
    and condition variables.

    - How to share data between coroutines using coroutine-safe queues.

    - How to run, read, and write from subprocesses and streams with coroutines.

    - How to develop a concurrent and dynamically updating port scanner using non-blocking
    I/O.


