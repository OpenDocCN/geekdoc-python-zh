    # How to Run Blocking Tasks


    We can execute thread-blocking function calls in asyncio using the asyncio.to_thread()
    function.


    It will take a function call and execute it in a new thread, separate from the
    thread that is executing the asyncio event loop.


    It allows the asyncio event loop to treat a blocking function call as a coroutine
    and execute asynchronously using thread-based concurrency instead of coroutine-based
    concurrency.


    The asyncio.to_thread() function is specifically designed to execute blocking
    I/O functions, not CPU-bound functions that can also block the asyncio event loop.


    This is a useful function to use when we have an asyncio program that needs to
    perform both non-blocking I/O (such as with sockets) and blocking I/O (such as
    with files or a legacy API).


    Now that we know how to execute blocking functions asynchronously in asyncio,
    let’s look at how to use the to_thread() function.


