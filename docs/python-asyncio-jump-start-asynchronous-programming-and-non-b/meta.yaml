  mdcn: "现代 `concurrent.futures` 模块中的线程池支持使用线程和进程来执行异步临时任务。这提供了一种替代方式来引入异步编程元素，而无需采用协程。\n\
    \n一个常见的误解是认为 `asyncio` 会使程序比线程或进程更快，或者认为协程不会遭遇竞态条件或死锁。这两种观念都是错误的。\n\n使用并发线程下载网页或查询开放端口，与在一个线程中使用并发协程一样快。\n\
    \n当使用基于协程的并发时，代码必须被设计为协程安全的，就像使用线程时必须确保线程安全，使用基于进程的并发时必须确保进程安全一样。在使用并发编程时，无法回避这些概念。\n\
    \n另一个误解是认为 `asyncio` 使并发编程变得容易。\n\n无论并发单元或编程范式如何，并发编程总是困难的。\n\n协程可以使代码更易于阅读。协程的定义看起来和读起来都像函数。但是，正如我们之前所描述的，良好设计和并发编程安全性的挑战，并不会仅仅通过改变并发单元就消失。\n\
    \n事实上，采用异步编程可能会引入新的、不同的挑战。\n\n## 课程回顾\n\n### 要点总结\n\n做得好，你已经完成了本课的学习。\n\n- 你现在知道了什么是协程，以及它与例程、线程和生成器的关系。\n\
    - 你现在知道了什么是异步编程和异步 I/O。\n- 你现在知道了 Python 中的 `asyncio` 模块是什么，以及它提供的功能。\n- 你现在知道如何开发一个\
    \ \"hello world\" 的 asyncio 程序，并了解它的工作原理。\n- 你现在知道了何时在 Python 程序中使用 asyncio。\n\
    \n### 练习\n\n本课的任务是运用你所学的 asyncio 知识，思考在哪里可以使用它来提升程序性能。\n\n列出至少三个你最近参与过的、可以从协程和\
