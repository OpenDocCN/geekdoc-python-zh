    # # Preface


    Python concurrency is deeply misunderstood.


    Opinions vary from “*Python does not support concurrency*” to “*Python concurrency
    is buggy*”.


    I created the website SuperFastPython.com to directly counter these misunderstandings.


    Asyncio is a new, important, and exciting addition to Python.


    Broadly, asyncio refers to changes to the Python language to support coroutines,
    and the asyncio module that provides an API for developing and running programs
    using coroutines with an asynchronous programming style.


    Asyncio was added specifically to support non-blocking I/O with socket connections.
    Combined with asynchronous programming, this is typically referred to as asynchronous
    I/O.


    Using asyncio, we can develop programs that exceed the scalability of threads,
    allowing tens or hundreds of thousands of concurrent streams. This capability
    can be used to develop client-side or server-side programs that access a vast
    number of concurrent TCP socket connections, perhaps to servers, websites, game
    servers, databases, and more.


    This guide was carefully designed to help Python developers (*like you*) to get
    productive with asyncio as fast as possible. After completing all seven lessons,
    you will know how to bring coroutine-based concurrency with the asyncio module
    API to your own projects, super fast.


    Together, we can make Python code run faster and change the community’s opinions
    about Python concurrency.


    Thank you for letting me guide you along this path.'
