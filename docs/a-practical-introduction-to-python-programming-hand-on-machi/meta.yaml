  md: "# 14.3 Inheritance\n\nIn object-oriented programming there is a concept called\
    \ inheritance where you can create a class that builds off of another class. When\
    \ you do this, the new class gets all of the variables and methods of the class\
    \ it is inheriting from (called the base class). It can then define additional\
    \ variables and methods that are not present in the base class, and it can also\
    \ override some of the methods of the base class. That is, it can rewrite them\
    \ to suit its own purposes. Here is a simple example:\n\n```\nclass Parent:\n\
    \    def __init__(self, a):\n        self.a = a\n    def method1(self):\n    \
    \    print(self.a*2)\n    def method2(self):\n        print(self.a+'!!!')\n\n\
    class Child(Parent):\n    def __init__(self, a, b):\n        self.a = a\n    \
    \    self.b = b\n    def method1(self):\n        print(self.a*7)\n    def method3(self):\n\
    \        print(self.a + self.b)\n\np = Parent('hi')\nc = Child('hi', 'bye')\n\n\
    print('Parent method 1: ', p.method1())\nprint('Parent method 2: ', p.method2())\n\
    print()\nprint('Child method 1: ', c.method1())\nprint('Child method 2: ', c.method2())\n\
    print('Child method 3: ', c.method3())\n```\n\nParent method 1: hihi\nParent method\
    \ 2: hi!!!\n\nChild method 1: hihihihihihihi\nChild method 2: hi!!!\nChild method\
    \ 3: hibye\n\nWe see in the example above that the child has overridden the parent's\
