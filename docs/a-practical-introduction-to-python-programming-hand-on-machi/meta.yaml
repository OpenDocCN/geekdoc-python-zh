  md: '# # Chapter 14


    # # Object-Oriented Programming


    About a year or so after I started programming, I decided to make a game to play
    Wheel of Fortune. I wrote the program in the BASIC programming language and it
    got to be pretty large, a couple thousand lines. It mostly worked, but whenever
    I tried to fix something, my fix would break something in a completely different
    part of the program. I would then fix that and break something else. Eventually
    I got the program working, but after a while I was afraid to even touch it.


    The problem with the program was that each part of the program had access to the
    variables from the other parts. A change of a variable in one part would mess
    up things in the others. One solution to this type of problem is object-oriented
    programming. One of its chief benefits is encapsulation, where you divide your
    program into pieces and each piece internally operates independently of the others.
    The pieces interact with each other, but they don''t need to know exactly how
    each one accomplishes its tasks. This requires some planning and set-up time before
    you start your program, and so it is not always appropriate for short programs,
    like many of the ones that we have written so far.


    We will just cover the basics of object-oriented programming here. Object-oriented
    programming is used extensively in software design and I would recommend picking
    up another book on programming or software design to learn more about designing
    programs in an object-oriented way.


    # ## 14.1 Python is objected-oriented


    Python is an object-oriented programming language, and we have in fact been using
    many object-oriented concepts already. The key notion is that of an object. An
    object consists of two things: data and functions (called methods) that work with
    that data. As an example, strings in Python are objects. The data of the string
    object is the actual characters that make up that string. The methods are things
    like lower, replace, and split. In Python, everything is an object. That includes
    not only strings and lists, but also integers, floats, and even functions themselves.'
