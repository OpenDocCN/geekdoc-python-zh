  - "[PAGE 242]\n\n```\nL.sort(key=lambda x: x[1])\n```\n\nThe lambda keyword indicates\
    \ that what follows will be an anonymous function. We then have the arguments\
    \ to the function, followed by a colon and then the function code. The function\
    \ code cannot be longer than one line.\n\nWe used anonymous functions back when\
    \ working with GUIs to pass information about which button was clicked to the\
    \ callback function. Here is the code again:\n\n```\nfor i in range(3):\n    for\
    \ j in range(3):\n        b[i][j] = Button(command = lambda x=i,y=j: function(x,y))\n\
    ```\n\n# 23.3 Recursion\n\nRecursion is the process where a function calls itself.\
    \ One of the standard examples of recursion is the factorial function. The factorial,\
    \ n!, is the product of all the numbers from 1 up to n. For instance, 5! = 5 4\
    \ 3 2 1 = 120. Also, by convention, 0! = 1. Recursion involves defining a function\
    \ in terms of itself. Notice that, for example, 5! = 5 4!, and in general, n!\
    \ = n (n 1)!. So the factorial function can be defined in terms of itself. Here\
    \ is a recursive version of the factorial function:\n\n```\ndef fact(n):\n   \
    \ if n==0:\n        return 1\n    else:\n        return n*fact(n-1)\n```\n\nWe\
    \ must specify the n = 0 case or else the function would keep calling itself forever\
    \ (or at least until Python generates an error about too many levels of recursion).\n\
    \nNote that the math module has a function called factorial, so this version here\
    \ is just for demonstration. Note also that there is a non-recursive way to do\
    \ the factorial, using a for loop. It is about as straightforward as the recursive\
    \ way, but faster. However, for some problems the recursive solution is the more\
    \ straightforward solution. Here, for example, is a program that factors a number\
    \ into prime factors.\n\n```\ndef factor(num, L=[]):\n    for i in range(2,num//2+1):\n\
    \        if num%i==0:\n            return L+[i]+factor(num//i)\n    return L+[num]\n\
    ```\n\nThe factor function takes two arguments: a number to factor, and a list\
    \ of previously found factors. It checks for a factor, and if it finds one, it\
    \ appends it to the list. The recursive part is that it divides the number by\
    \ the factor that was found and then appends to the list all the factors of that\
    \ value. On the other hand, if the function doesn't find any factors, it appends\
    \ the number to the list, as it must be a prime, and returns the new list."
  - "[PAGE 243]\n\n# 23.4 map, filter, reduce, and list comprehensions\n\n**map and\
    \ filter** Python has a built-in functions called **map** and **filter** that\
    \ are used to apply functions to the contents of a list. They date back to before\
    \ list comprehensions were a part of Python, but now list comprehensions can accomplish\
    \ everything these functions can. Still, you may occasionally see code using these\
    \ functions, so it is good to know about them.\n\nThe **map** function takes two\
    \ arguments—a function and an iterable—and it applies the function to each element\
    \ of the iterable, generating a new iterable. Here is an example that takes a\
    \ list of strings a returns a list of the lengths of the strings. The first line\
    \ accomplishes this with **map**, while the second line uses list comprehensions:\n\
    \n```\nL = list(map(len, ['this', 'is', 'a', 'test']))\nL = [len(word) for word\
    \ in ['this', 'is', 'a', 'test']]\n```\n\nThe function **filter** takes a function\
    \ and an iterable and returns an iterable of all the elements of the list for\
    \ which the function is true. Here is an example that returns all the words in\
    \ a list that have length greater than 2. The first line uses **filter** to do\
    \ this, and the second line does it with a list comprehension:\n\n```\nL = list(filter(lambda\
    \ x: len(x)>2, ['this', 'is', 'a', 'test']))\nL = [word for word in ['this', 'is',\
    \ 'a', 'test'] if len(word)>2]\n```\n\nHere is one approach to finding the number\
    \ of items in a list L that are greater than 60:\n\n```\ncount=0\nfor i in L:\n\
    \    if i>60:\n        count = count + 1\n```\n\nHere is a second way using a\
    \ list comprehension similar to the **filter** function:\n\n```\nlen([i for i\
    \ in L if i>60])\n```\n\nThe second way is both shorter and easier to understand.\n\
    \n**reduce** There is another function, **reduce**, that applies a function to\
    \ the contents of a list. It used to be a built-in function, but in Python 3 it\
    \ has also been moved to the functools module. This function cannot be easily\
    \ replaced with list comprehensions. To understand it, first consider a simple\
    \ example that adds up the numbers from 1 to 100.\n\n```\ntotal = 0\nfor i in\
    \ range(1,101):\n    total = total + i\n```\n\nThe **reduce** function can be\
    \ used to do this in a single line:\n\n```\ntotal = reduce(lambda x,y: x+y, range(1,101))\n\
    ```\n\nIn general, **reduce** takes a function and an iterable, and applies the\
    \ function to the elements from left to right, accumulating the result. As another\
    \ simple example, the factorial function could be implemented using reduce:"
