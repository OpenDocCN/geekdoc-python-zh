    \        print(word)\n```\n\nNote that this and most of the upcoming examples\
    \ can be done with list comprehensions:\n\n```\nprint([word for word in wordlist\
    \ if len(word)==3])\n```\n\n**Example 2** Print all the words that start with\
    \ gn or kn.\n\n```\nfor word in wordlist:\n    if word[:2]=='gn' or word[:2]=='kn':\n\
    \        print(word)\n```\n\n**Example 3** Determine what percentage of words\
    \ start with a vowel.\n\n```\ncount = 0\nfor word in wordlist:\n    if word[0]\
    \ in 'aeiou':\n        count=count+1\nprint(100*count/len(wordlist))\n```\n\n\
    **Example 4** Print all 7-letter words that start with th and end in ly. Things\
    \ like this are good for cheating at crosswords.\n\n```\nfor word in wordlist:\n\
    \    if len(word)==7 and word[:2]=='th' and word[-2:]=='ly':\n        print(word)\n\
    ```\n\n**Example 5** Print the first ten words that start with q.\n\n```\ni=0\n\
    while wordlist[i]!='q':\n    i=i+1\nprint(wordlist[i:i+10])\n```\n\nNote this\
    \ is not a very efficient way of doing things since we have to scan through most\
    \ of the list. A binary search would be more efficient, but the above approach\
