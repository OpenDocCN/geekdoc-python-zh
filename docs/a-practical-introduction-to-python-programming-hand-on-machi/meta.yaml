    # # Chapter 17


    # # GUI Programming III


    This chapter contains a few more GUI odds and ends.


    # ## 17.1 Title bar


    The GUI window that Tkinter creates says Tk by default. Here is how to change
    it:


    ```

    python

    root.title(''Your title'')

    ```


    # ## 17.2 Disabling things


    Sometimes you want to disable a button so it can''t be clicked. Buttons have an
    attribute state that allows you to disable the widget. Use state=DISABLED to disable
    the button and state=NORMAL to enable it. Here is an example that creates a button
    that starts out disabled and then enables it:


    ```

    python

    button = Button(text=''Hi'', state=DISABLED, command=function)

    button.configure(state=NORMAL)

    ```


    You can use the state attribute to disable many other types of widgets, too.


    # ## 17.3 Getting the state of a widget


    Sometimes, you need to know things about a widget, like exactly what text is in
    it or what its background color is. The cget method is used for this. For example,
    the following gets the text of a label called label:


    ```

    python

    label.cget(''text'')

    ```'
  - '[PAGE 179]


    This can be used with buttons, canvases, etc., and it can be used with any of
    their properties, like bg, fg, state, etc. As a shortcut, Tkinter overrides the
    [] operators, so that label[''text''] accomplishes the same thing as the example
    above.


    # 17.4 Message boxes


    Message boxes are windows that pop up to ask you a question or say something and
    then go away. To use them, we need an import statement:


    ```

    from tkinter.messagebox import *

    ```


    There are a variety of different types of message boxes. For each of them you
    can specify the message the user will see as well as the title of the message
    box. Here are three types of message boxes, followed by the code that generates
    them:


    ![](img/b783d4b75e24755b056ee79a66b412de_179_0.png)


    ```

    showinfo(title=''Message for you'', message=''Hi There!'')

    askquestion(title=''Quit?'', message=''Do you really want to quit?'')

    showwarning(title=''Warning'', message=''Unsupported format'')

    ```


    Below is a list of all the types of message boxes. Each displays a message in
    its own way.


    | Message Box | Special properties |

    |---|---|

    | showinfo | OK button |

    | askokcancel | OK and Cancel buttons |

    | askquestion | Yes and No buttons |

    | askretrycancel | Retry and a Cancel buttons |

    | askyesnocancel | Yes, No, and Cancel buttons |

    | showerror | An error icon and an OK button |

    | showwarning | A warning icon an an OK button |


    Each of these functions returns a value indicating what the user clicked. See
    the next section for a simple example of using the return value. Here is a table
    of the return values:'
- md: "| Function | Return value (based on what user clicks) |\n| :--- | :--- |\n\
    | showinfo | Always returns 'ok' |\n| askokcancel | OK—**True** Cancel or window\
    \ closed—**False** |\n| askquestion | Yes—'yes' No—'no' |\n| askretrycancel |\
    \ Retry—**True** Cancel or window closed—**False** |\n| askyesnocancel | Yes—**True**\
    \ No—**False** anything else—**None** |\n| showerror | Always returns 'ok' |\n\
    | showwarning | Always returns 'ok' |\n\n## 17.5 Destroying things\n\nTo get rid\
    \ of a widget, use its destroy method. For instance, to get rid of a button called\
    \ button, do the following:\n\n```\nbutton.destroy()\n```\n\nTo get rid of the\
    \ entire GUI window, use the following:\n\n```\nroot.destroy()\n```\n\n**Stopping\
    \ a window from being closed** When your user tries to close the main window,\
    \ you may want to do something, like ask them if they really want to quit. Here\
    \ is a way to do that:\n\n```\nfrom tkinter import *\nfrom tkinter.messagebox\
    \ import askquestion\n\ndef quitter_function():\n    answer = askquestion(title='Quit?',\
    \ message='Really quit?')\n    if answer=='yes':\n        root.destroy()\n\nroot\
    \ = Tk()\nroot.protocol('WM_DELETE_WINDOW', quitter_function)\nmainloop()\n```\n\
    \nThe key is the following line, which cause quitter_function to be called whenever\
    \ the user tries to close the window.\n\n```\nroot.protocol('WM_DELETE_WINDOW',\
    \ quitter_function)\n```\n\n## 17.6 Updating\n\nTkinter updates the screen every\
    \ so often, but sometimes that is not often enough. For instance, in a function\
    \ triggered by a button press, Tkinter will not update the screen until the function\
    \ is done.\n\nIf, in that function, you want to change something on the screen,\
    \ pause for a short while, and then change something else, you will need to tell\
    \ Tkinter to update the screen before the pause. To do that, just use this:\n\n\
    ```\nroot.update()\n```\n\nIf you only want to update a certain widget, and nothing\
    \ else, you can use the update method of that widget. For example,\n\n```\ncanvas.update()\n\
    ```\n\nA related thing that is occasionally useful is to have something happen\
    \ after a scheduled time interval. For instance, you might have a timer in your\
    \ program. For this, you can use the after method. Its first argument is the time\
    \ in milliseconds to wait before updating and the second argument is the function\
    \ to call when the time is right. Here is an example that implements a timer:\n\
    \n```\nfrom time import time\nfrom tkinter import *\n\ndef update_timer():\n \
    \   time_left = int(90 - (time()-start))\n    minutes = time_left // 60\n    seconds\
    \ = time_left % 60\n    time_label.configure(text='{:02d}:{:02d}'.format(minutes,\
    \ seconds))\n    root.after(100, update_timer)\n\nroot = Tk()\ntime_label = Label()\n\
    time_label.grid(row=0, column=0)\n\nstart = time()\nupdate_timer()\n\nmainloop()\n\
    ```\n\nThis example uses the time module, which is covered in Section 20.2.\n\n\
    ## 17.7 Dialogs\n\nMany programs have dialog boxes that allow the user to pick\
    \ a file to open or to save a file. To use them in Tkinter, we need the following\
    \ import statement:\n\n```\nfrom tkinter.filedialog import *\n```\n\nTkinter dialogs\
    \ usually look like the ones that are native to the operating system.\n\n### 17.7.1\
    \ Dialogs\n\n![](img/b783d4b75e24755b056ee79a66b412de_182_0.png)\n\nHere are the\
    \ most useful dialogs:\n\n| Dialog | Description |\n| :--- | :--- |\n| askopenfilename\
    \ | Opens a typical file chooser dialog |\n| askopenfilenames | Like previous,\
    \ but user can pick more than one file |\n| asksaveasfilename | Opens a typical\
    \ file save dialog |\n| askdirectory | Opens a directory chooser dialog |\n\n\
    The return value of askopenfilename and asksaveasfilename is the name of the file\
    \ selected. There is no return value if the user does not pick a value. The return\
    \ value of askopenfilenames is a list of files, which is empty if no files are\
    \ selected. The askdirectory function returns the name of the directory chosen.\n\
    \nThere are some options you can pass to these functions. You can set initialdir\
    \ to the directory you want the dialog to start in. You can also specify the file\
    \ types. Here is an example:\n\n```\nfilename=askopenfilename(initialdir='c:\\\
    python31\\',\n    filetypes=[('Image files', '.jpg .png .gif'),\n            \
    \   ('All files', '*')])\n```\n\n**A short example** Here is an example that opens\
    \ a file dialog that allows you to select a text file. The program then displays\
    \ the contents of the file in a textbox.\n\n```\nfrom tkinter import *\nfrom tkinter.filedialog\
    \ import *\nfrom tkinter.scrolledtext import ScrolledText\n\nroot = Tk()\ntextbox\
    \ = ScrolledText()\ntextbox.grid()\n\nfilename=askopenfilename(initialdir='c:\\\
    python31\\', filetypes=[('Text files', '.txt'),\n('All files', '*')])\n\ns = open(filename).read()\n\
    textbox.insert(1.0, s)\n\nmainloop()\n```\n\n## 17.8 Menu bars\n\nWe can create\
    \ a menu bar, like the one below, across the top of a window.\n\n![](img/b783d4b75e24755b056ee79a66b412de_183_0.png)\n\
    \nHere is an example that uses some of the dialogs from the previous section:\n\
    \n```\nfrom tkinter import *\nfrom tkinter.filedialog import *\n\ndef open_callback():\n\
    \    filename = askopenfilename()\n    # add code here to do something with filename\n\
    \ndef saveas_callback():\n    filename = asksaveasfilename()\n    # add code here\
    \ to do something with filename\n\nroot = Tk()\nmenu = Menu()\nroot.config(menu=menu)\n\
    file_menu = Menu(menu, tearoff=0)\nfile_menu.add_command(label='Open', command=open_callback)\n\
    file_menu.add_command(label='Save as', command=saveas_callback)\nfile_menu.add_separator()\n\
    file_menu.add_command(label='Exit', command=root.destroy)\nmenu.add_cascade(label='File',\
    \ menu=file_menu)\n\nmainloop()\n```\n\n## 17.9 New windows\n\nCreating a new\
    \ window is easy. Use the Toplevel function:\n\n```\nwindow = Toplevel()\n```\n\
    \nYou can add widgets to the new window. The first argument when you create the\
    \ widget needs to be the name of the window, like below\n\n```\nnew_window = Toplevel()\n\
    label = Label(new_window, text='Hi')\nlabel.grid(row=0, column=0)\n```\n\n## 17.10\
    \ pack\n\nThere is an alternative to grid called pack. It is not as versatile\
    \ as grid, but there are some places where it is useful. It uses an argument called\
    \ side, which allows you to specify four locations for your widgets: TOP, BOTTOM,\
    \ LEFT, and RIGHT. There are two useful optional arguments, fill and expand. Here\
    \ is an example.\n\n```\nbutton1=Button(text='Hi')\nbutton1.pack(side=TOP, fill=X)\n\
    button2=Button(text='Hi')\nbutton2.pack(side=BOTTOM)\n```\n\n![](img/b783d4b75e24755b056ee79a66b412de_184_0.png)\n\
    \nThe fill option causes the widget to fill up the available space given to it.\
    \ It can be either X, Y or BOTH. The expand option is used to allow the widget\
    \ to expand when its window is resized. To enable it, use expand=YES.\n\n> **Note**\
    \ You can use pack for some frames, and grid for others; just don't mix pack and\
    \ grid within the same frame, or Tkinter won't know quite what to do.\n\n## 17.11\
    \ StringVar\n\nIn Section 16.5 we saw how to tie a Tkinter variable, called an\
    \ IntVar, to a check button or a radio button. Tkinter has another type of variable\
    \ called a StringVar that holds strings. This type of variable can be used to\
    \ change the text in a label or a button or in some other widgets. We already\
    \ know how to change text using the configure method, and a StringVar provides\
    \ another way to do it.\n\nTo tie a widget to a StringVar, use the textvariable\
    \ option of the widget. A StringVar has get and set methods, just like an IntVar,\
    \ and whenever you set the variable, any widgets that are tied to it are automatically\
    \ updated.\n\nHere is a simple example that ties two labels to the same StringVar.\
    \ There is also a button that when clicked will alternate the value of the StringVar\
    \ (and hence the text in the labels).\n\n```\nfrom tkinter import *\n\ndef callback():\n\
    \    global count\n    s.set('Goodbye' if count%2==0 else 'Hello')\n    count\
    \ +=1\n\nroot = Tk()\n\ncount = 0\ns = StringVar()\ns.set('Hello')\n\nlabel1 =\
    \ Label(textvariable = s, width=10)\nlabel2 = Label(textvariable = s, width=10)\n\
    button = Button(text = 'Click me', command = callback)\n\nlabel1.grid(row=0, column=0)\n\
    label2.grid(row=0, column=1)\nbutton.grid(row=1, column=0)\n\nmainloop()\n```\n\
    \n## 17.12 More with GUIs\n\nWe have left out quite a lot about Tkinter. See Lundh's\
    \ Introduction to Tkinter [2] for more. Tkinter is versatile and simple to work\
    \ with, but if you need something more powerful, there are other third-party GUIs\
    \ for Python."
