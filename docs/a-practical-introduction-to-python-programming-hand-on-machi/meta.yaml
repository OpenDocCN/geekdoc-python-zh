    ```\n\nSee the Python documentation [1] for information on the other distributions.\n\
    \n**A more random randint function** One way to generate cryptographically safe\
    \ random numbers is to use some fairly random physical process. Examples include\
    \ radioactive decay, atmospheric phenomena, and the behavior of certain electric\
    \ circuits. The os module has a function urandom that generates random numbers\
    \ from a physical process whose exact nature depends on your system. The urandom\
    \ function takes one argument telling it how many bytes of random data to produce.\
    \ Calling urandom(1) produces one byte of data, which we can translate to an integer\
    \ between 0 and 255. Calling urandom(2) produces two bytes of data, translating\
    \ to integers between 0 and 65535. Here is a function that behaves like randint,\
    \ but uses urandom to give us nondeterministic random numbers:\n\n```\nfrom os\
    \ import urandom\nfrom math import log\n\ndef urandint(a,b):\n    x = urandom(int(log(b-a+1)/log(256))+1)\n\
    \    total = 0\n    for (i,y) in enumerate(x):\n        total += y*(2**i)\n  \
    \  return total%(b-a+1)+a\n```\n\nThe way this works is we first have to determine\
    \ how many bytes of random data to generate. Since one byte gives 256 possible\
    \ values and two bytes give 256^2 possible values, etc., we compute the log base\
    \ 256 of the size of the range b-a+1 to determine how many bytes to generate.\
    \ We then loop through the bytes generated and convert them to an integer. Finally,\
    \ modding that integer by b-a+1 reduces that integer to a number between 0 and\
    \ b-a+1, and adding a to that produces an integer in the desired range.\n\n# 22.9\
