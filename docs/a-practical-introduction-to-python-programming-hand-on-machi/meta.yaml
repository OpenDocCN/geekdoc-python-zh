    \ radio buttons.\n\n**Commands** Both check buttons and radio buttons have a command\
    \ option, where you can set a callback function to run whenever the button is\
    \ selected or unselected.\n\n## 16.6 Text widget\n\nThe Text widget is a bigger,\
    \ more powerful version of the Entry widget. Here is an example of creating one:\n\
    \n```\ntextbox = Text(font=('Verdana', 16), height=6, width=40)\n```\n\nThe widget\
    \ will be 40 characters wide and 6 rows tall. You can still type past the sixth\
    \ row; the widget will just display only six rows at a time, and you can use the\
    \ arrow keys to scroll.\n\nIf you want a scrollbar associated with the text box\
    \ you can use the ScrolledText widget. Other than the scrollbar, ScrolledText\
    \ works more or less the same as Text. An example of what it looks like is shown\
    \ below. To use the ScrolledText widget, you will need the following import:\n\
    \n```\nfrom tkinter.scrolledtext import ScrolledText\n```\n\n![](img/b783d4b75e24755b056ee79a66b412de_170_0.png)\n\
    \nHere are a few common commands:\n\n| Statement | Description |\n| :--- | :---\
    \ |\n| textbox.get(1.0,END) | returns the contents of the text box |\n| textbox.delete(1.0,END)\
    \ | deletes everything in the text box |\n| textbox.insert(END,'Hello') | inserts\
    \ text at the end of the text box |\n\nOne nice option when declaring the Text\
    \ widget is undo=True, which allows Ctrl+Z and Ctrl+Y to undo and redo edits.\
    \ There are a ton of other things you can do with the Text widget. It is almost\
    \ like a miniature word processor.\n\n## 16.7 Scale widget\n\nA Scale is a widget\
    \ that you can slide back and forth to select different values. An example is\
    \ shown below, followed by the code that creates it.\n\n![](img/b783d4b75e24755b056ee79a66b412de_170_1.png)\n\
    \n```\nscale = Scale(from_=1, to_=100, length=300, orient='horizontal')\n```\n\
    \nHere are some of the useful options of the Scale widget:\n\n| Option | Description\
    \ |\n| :--- | :--- |\n| from_ | minimum value possible by dragging the scale |\n\
    | to_ | maximum value possible by dragging the scale |\n| length | how many pixels\
    \ long the scale is |\n| label | specify a label for the scale |\n| showvalue='NO'\
    \ | gets rid of the number that displays above the scale |\n| tickinterval=1 |\
    \ displays tickmarks at every unit (1 can be changed) |\n\nThere are several ways\
    \ for your program to interact with the scale. One way is to link it with an IntVar\
    \ just like with check buttons and radio buttons, using the variable option. Another\
    \ option is to use the scale's get and set methods. A third way is to use the\
    \ command option, which works just like with buttons.\n\n## 16.8 GUI Events\n\n\
    Often we will want our programs to do something if the user presses a certain\
    \ key, drags something on a canvas, uses the mouse wheel, etc. These things are\
    \ called events.\n\n**A simple example** The first GUI program we looked at back\
    \ in Section 15.1 was a simple temperature converter. Anytime we wanted to convert\
    \ a temperature we would type in the temperature in the entry box and click the\
    \ Calculate button. It would be nice if the user could just press the enter key\
    \ after they type the temperature instead of having to click the Calculate button.\
    \ We can accomplish this by adding one line to the program:\n\n```\nentry.bind('<Return>',\
    \ lambda dummy=0:calculate())\n```\n\nThis line should go right after you declare\
    \ the entry box. What it does is it takes the event that the enter (return) key\
    \ is pressed and binds it to the calculate function.\n\nWell, sort of. The function\
    \ you bind the event to is supposed to be able to receive a copy of an Event object,\
    \ but the calculate function that we had previously written takes no arguments.\
    \ Rather than rewrite the function, the line above uses a lambda trick to essentially\
    \ throw away the Event object.\n\n**Common events** Here is a list of some common\
    \ events:\n\n| Event | Description |\n|---|---|\n| <Button-1> | The left mouse\
    \ button is clicked. |\n| <Double-Button-1> | The left mouse button is double-clicked.\
    \ |\n| <Button-Release-1> | The left mouse button is released. |\n| <B1-Motion>\
    \ | A click-and-drag with the left mouse button. |\n| <MouseWheel> | The mouse\
    \ wheel is moved. |\n| <Motion> | The mouse is moved. |\n| <Enter> | The mouse\
    \ is now over the widget. |\n| <Leave> | The mouse has now left the widget. |\n\
    | <Key> | A key is pressed. |\n| <key name> | The key name key is pressed. |\n\
    \nFor all of the mouse button examples, the number 1 can be replaced with other\
    \ numbers. Button 2 is the middle button and button 3 is the right button.\n\n\
    The most useful attributes in the Event object are:\n\n| Attribute | Description\
    \ |\n| --- | --- |\n| keysym | The name of the key that was pressed |\n| x, y\
    \ | The coordinates of the mouse pointer |\n| delta | The value of the mouse wheel\
    \ |\n\n**Key events** For key events, you can either have specific callbacks for\
    \ different keys or catch all keypresses and deal with them in the same callback.\
    \ Here is an example of the latter:\n\n```\nfrom tkinter import *\n\ndef callback(event):\n\
    \    print(event.keysym)\n\nroot = Tk()\nroot.bind('<Key>', callback)\n\nmainloop()\n\
    ```\n\nThe above program prints out the names of the keys that were pressed. You\
    \ can use those names in if statements to handle several different keypresses\
    \ in the callback function, like below:\n\n```\nif event.keysym == 'percent':\n\
    \    # percent (shift+5) was pressed, do something about it...\nelif event.keysym\
    \ == 'a':\n    # lowercase a was pressed, do something about it...\n```\n\nUse\
    \ the single callback method if you are catching a lot of keypresses and are doing\
    \ something similar with all of them. On the other hand, if you just want to catch\
    \ a couple of specific keypresses or if certain keys have very long and specific\
    \ callbacks, you can catch keypresses separately like below:\n\n```\nfrom tkinter\
    \ import *\n\ndef callback1(event):\n    print('You pressed the enter key.')\n\
    \ndef callback2(event):\n    print('You pressed the up arrow.')\n\nroot = Tk()\n\
    root.bind('<Return>', callback1)\nroot.bind('<Up>', callback2)\nmainloop()\n```\n\
    \nThe key names are the same as the names stored in the keysym attribute. You\
    \ can use the program from earlier in this section to find the names of all the\
    \ keys. Here are the names for a few common keys:"
