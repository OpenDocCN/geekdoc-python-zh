  md: "# Chapter 15\n\n# GUI Programming with Tkinter\n\nUp until now, the only way\
    \ our programs have been able to interact with the user is through keyboard input\
    \ via the `input` statement. But most real programs use windows, buttons, scrollbars,\
    \ and various other things. These widgets are part of what is called a Graphical\
    \ User Interface or GUI. This chapter is about GUI programming in Python with\
    \ Tkinter.\n\nAll of the widgets we will be looking at have far more options than\
    \ we could possibly cover here. An excellent reference is Fredrik Lundh's Introduction\
    \ to Tkinter [2].\n\n# 15.1 Basics\n\nNearly every GUI program we will write will\
    \ contain the following three lines:\n\n```\nfrom tkinter import *\nroot = Tk()\n\
    mainloop()\n```\n\nThe first line imports all of the GUI stuff from the tkinter\
    \ module. The second line creates a window on the screen, which we call root.\
    \ The third line puts the program into what is essentially a long-running while\
    \ loop called the event loop. This loop runs, waiting for keypresses, button clicks,\
    \ etc., and it exits when the user closes the window.\n\nHere is a working GUI\
    \ program that converts temperatures from Fahrenheit to Celsius.\n\n```\nfrom\
    \ tkinter import *\n\ndef calculate():\n    temp = int(entry.get())\n    temp\
    \ = 9/5*temp+32\n    output_label.configure(text = 'Converted: {:.1f}'.format(temp))\n\
    \    entry.delete(0,END)\n```"
  merge: -1
  pgno: 152
- img_proc: true
  md: "```\nroot = Tk()\nmessage_label = Label(text='Enter a temperature',\n     \
    \                font=('Verdana', 16))\noutput_label = Label(font=('Verdana',\
    \ 16))\nentry = Entry(font=('Verdana', 16), width=4)\ncalc_button = Button(text='Ok',\
    \ font=('Verdana', 16),\n                     command=calculate)\n\nmessage_label.grid(row=0,\
    \ column=0)\nentry.grid(row=0, column=1)\ncalc_button.grid(row=0, column=2)\n\
    output_label.grid(row=1, column=0, columnspan=3)\n\nmainloop()\n```\n\nHere is\
    \ what the program looks like:\n\n![](img/b783d4b75e24755b056ee79a66b412de_153_0.png)\n\
    \nWe now will examine the components of the program separately.\n\n# 15.2 Labels\n\
    \nA label is a place for your program to place some text on the screen. The following\
    \ code creates a label and places it on the screen.\n\n```\nhello_label = Label(text='hello')\n\
    hello_label.grid(row=0, column=0)\n```\n\nWe call Label to create a new label.\
    \ The capital L is required. Our label's name is hello_label. Once created, use\
    \ the grid method to place the label on the screen. We will explain grid in the\
    \ next section.\n\n**Options** There are a number of options you can change including\
    \ font size and color. Here are some examples:\n\n```\nhello_label = Label(text='hello',\
    \ font=('Verdana', 24, 'bold'),\n                   bg='blue', fg='white')\n```\n\
    \nNote the use of keyword arguments. Here are a few common options:\n\n+   - font\
    \ — The basic structure is font= (font name, font size, style). You can leave\
    \ out the font size or the style. The choices for style are 'bold', 'italic',\
    \ 'underline', 'overstrike', 'roman', and 'normal' (which is the default). You\
    \ can combine multiple styles like this: 'bold italic'."
  merge: -1
