    \n## 16.6 文本组件\n\n`Text` 组件是 `Entry` 组件的更大、更强大的版本。下面是创建一个的示例：\n\n```\ntextbox\
    \ = Text(font=('Verdana', 16), height=6, width=40)\n```\n\n该组件将宽 40 个字符，高 6 行。你仍然可以输入超过第六行的内容；该组件一次只会显示六行，你可以使用箭头键滚动。\n\
    \n如果你想让文本框关联一个滚动条，可以使用 `ScrolledText` 组件。除了滚动条之外，`ScrolledText` 的工作方式与 `Text`\
    \ 大致相同。下面显示了其外观的示例。要使用 `ScrolledText` 组件，你需要以下导入：\n\n```\nfrom tkinter.scrolledtext\
    \ import ScrolledText\n```\n\n![](img/b783d4b75e24755b056ee79a66b412de_170_0.png)\n\
    \n以下是一些常用命令：\n\n| 语句 | 描述 |\n| :--- | :--- |\n| textbox.get(1.0,END) | 返回文本框的内容\
    \ |\n| textbox.delete(1.0,END) | 删除文本框中的所有内容 |\n| textbox.insert(END,'Hello')\
    \ | 在文本框末尾插入文本 |\n\n声明 `Text` 组件时一个不错的选项是 `undo=True`，它允许使用 Ctrl+Z 和 Ctrl+Y 撤销和重做编辑。使用\
    \ `Text` 组件还可以做很多其他事情。它几乎就像一个微型文字处理器。\n\n## 16.7 滑块组件\n\n`Scale` 是一个你可以来回滑动以选择不同值的组件。下面显示了一个示例，以及创建它的代码。\n\
    \n![](img/b783d4b75e24755b056ee79a66b412de_170_1.png)\n\n```\nscale = Scale(from_=1,\
    \ to_=100, length=300, orient='horizontal')\n```\n\n以下是 `Scale` 组件的一些有用选项：\n\n\
    | 选项 | 描述 |\n| :--- | :--- |\n| from_ | 通过拖动滑块可达到的最小值 |\n| to_ | 通过拖动滑块可达到的最大值\
    \ |\n| length | 滑块的长度（以像素为单位） |\n| label | 为滑块指定标签 |\n| showvalue='NO' | 移除滑块上方显示的数字\
    \ |\n| tickinterval=1 | 每隔一个单位显示刻度线（1 可以更改） |\n\n你的程序与滑块交互有几种方式。一种方式是像复选框和单选按钮一样，使用\
    \ `variable` 选项将其与 `IntVar` 链接。另一种选择是使用滑块的 `get` 和 `set` 方法。第三种方式是使用 `command`\
    \ 选项，其工作方式与按钮相同。\n\n## 16.8 GUI 事件\n\n通常，我们希望程序在用户按下某个键、在画布上拖动某些东西、使用鼠标滚轮等时执行某些操作。这些事情被称为事件。\n\
    \n**一个简单的例子** 我们在第 15.1 节中看到的第一个 GUI 程序是一个简单的温度转换器。每次我们想转换温度时，我们都会在输入框中输入温度并单击“计算”按钮。如果用户在输入温度后只需按回车键，而不必单击“计算”按钮，那就太好了。我们可以通过向程序添加一行代码来实现这一点：\n\
    \n```\nentry.bind('<Return>', lambda dummy=0:calculate())\n```\n\n这行代码应该放在声明输入框之后。它的作用是获取回车（Return）键被按下的事件，并将其绑定到\
    \ `calculate` 函数。\n\n嗯，算是吧。你绑定事件的函数应该能够接收一个 `Event` 对象的副本，但我们之前编写的 `calculate`\
    \ 函数不接受任何参数。上面这行代码使用了一个 lambda 技巧来本质上丢弃 `Event` 对象，而不是重写函数。\n\n**常见事件** 以下是一些常见事件的列表：\n\
    \n| 事件 | 描述 |\n|---|---|\n| <Button-1> | 单击鼠标左键。 |\n| <Double-Button-1> | 双击鼠标左键。\
    \ |\n| <Button-Release-1> | 释放鼠标左键。 |\n| <B1-Motion> | 按住鼠标左键并拖动。 |\n| <MouseWheel>\
    \ | 移动鼠标滚轮。 |\n| <Motion> | 移动鼠标。 |\n| <Enter> | 鼠标现在位于组件上方。 |\n| <Leave> | 鼠标已离开组件。\
    \ |\n| <Key> | 按下某个键。 |\n| <key name> | 按下名为 key 的键。 |\n\n对于所有鼠标按钮示例，数字 1 可以替换为其他数字。按钮\
    \ 2 是中键，按钮 3 是右键。\n\n`Event` 对象中最有用的属性是：\n\n| 属性 | 描述 |\n| --- | --- |\n| keysym\
    \ | 被按下的键的名称 |\n| x, y | 鼠标指针的坐标 |\n| delta | 鼠标滚轮的值 |\n\n**按键事件** 对于按键事件，你可以为不同的键设置特定的回调，也可以捕获所有按键并在同一个回调中处理它们。以下是后者的示例：\n\
    \n```\nfrom tkinter import *\n\ndef callback(event):\n    print(event.keysym)\n\
    \nroot = Tk()\nroot.bind('<Key>', callback)\n\nmainloop()\n```\n\n上面的程序会打印出被按下的键的名称。你可以在\
    \ `if` 语句中使用这些名称，在回调函数中处理多个不同的按键，如下所示：\n\n```\nif event.keysym == 'percent':\n\
    \    # 按下了百分号（shift+5），对此进行一些处理...\nelif event.keysym == 'a':\n    # 按下了小写字母 a，对此进行一些处理...\n\
    ```\n\n如果你捕获大量按键并且对所有按键执行类似的操作，请使用单个回调方法。另一方面，如果你只想捕获几个特定的按键，或者某些按键有非常长且特定的回调，你可以像下面这样分别捕获按键：\n\
    \n```\nfrom tkinter import *\n\ndef callback1(event):\n    print('You pressed\
    \ the enter key.')\n\ndef callback2(event):\n    print('You pressed the up arrow.')\n\
    \nroot = Tk()\nroot.bind('<Return>', callback1)\nroot.bind('<Up>', callback2)\n\
    mainloop()\n```\n\n键名与存储在 `keysym` 属性中的名称相同。你可以使用本节前面的程序来查找所有键的名称。以下是一些常见键的名称："
