    # 19.1 Mutability and References


    If L is a list and s is a string, then L[0] gives the first element of the list
    and s[0] the first element of the string. If we want to change the first element
    of the list to 3, L[0]=3 will do it. But we cannot change a string this way. The
    reason has to do with how Python treats lists and strings. Lists (and dictionaries)
    are said to be mutable, which means their contents can change. Strings, on the
    other hand, are immutable, which means they cannot be changed. The reason strings
    are immutable is partly for performance (immutable objects are faster) and partly
    because strings are thought of fundamental in the same way that numbers are. It
    makes some other aspects of the language easier as well.


    **Making copies** Another place that lists and strings differ is when we try to
    make copies. Consider the following code:


    ```

    s = ''Hello''

    copy = s

    s = s + ''!!!''

    print(''s is now:'', s, '' Copy:'', copy)

    ```


    s is now: Hello!!! Copy: Hello


    In the code above we make a copy of s and then change s. Everything works as we
    would intuitively expect. Now look at similar code with lists:


    ```

    L = [1,2,3]

    copy = L

    ```'
  - '[PAGE 195]


    ```

    L[0]=9

    print(''L is now:'', L, '' Copy:'', copy)

    L is now: [9, 2, 3] Copy: [9, 2, 3]

    ```


    We can see that the list code did not work as we might have expected. When we
    changed L, the copy got changed as well. As mentioned in Chapter 7, the proper
    way to make a copy of L is copy=L[:]. The key to understanding these examples
    is references.


    **References** Everything in Python is an object. This includes numbers, strings,
    and lists. When we do a simple variable assignment, like x=487, what actually
    happens is Python creates an integer object with the value 487, and the variable
    x acts as a reference to that object. It''s not that the value 4 is stored in
    a memory location named x, but rather that 487 is stored somewhere in memory,
    and x points to that location. If we come along and declare y=487, then y also
    points to that same memory location.


    On the other hand, if we then come along and say x=721, what happens is we create
    a new integer object with value 721 somewhere in memory and x now points at that.
    The 487 still exists in memory where it was and it will stay there at least until
    there is nothing left pointing at it, at which point its memory location will
    be free to use for something else.


    All objects are treated the same way. When we set s=''Hello'', the string object
    Hello is some-where in memory and s is a reference to it. When we then say copy=x,
    we are actually saying that copy is another reference to ''Hello''. If we then
    do s=s+''!!!'', what happens is a new object ''Hello!!!'' is created and because
    we assigned s to it, s is now a reference to that new object, ''Hello!!!''. Remember
    that strings are immutable, so there is no changing ''Hello'' into something.
    Rather, Python creates a new object and points the variable s to it.


    When we set L=[1,2,3], we create a list object [1,2,3] and a reference, L, to
    it. When we say copy=L, we are making another reference to the object [1,2,3].
    When we do L[0]=9, because lists are mutable, the list [1,2,3] is changed, in
    place, to [9,2,3]. No new object is created. The list [1,2,3] is now gone, and
    since copy is still pointing to the same location, it''s value is [9,2,3].


    On the other hand, if we instead use copy=L[:], we are actually creating a new
    list object some-where else in memory so that there are two copies of [1,2,3]
    in memory. Then when we do L[0]=9, we are only changing the thing that L points
    to, and copy still points to [1,2,3].


    Just one further note to drive the point home. If we set x=487 and then set x=721,
    we are first creating an integer object 487 and pointing x to it. When we then
    set x=721, we are creating a new integer object 721 and pointing x to it. The
    net effect is that it seems like the “value” of x is changing, but what is in
    fact changing is what x is pointing to.


    **Garbage collection** Internally Python maintains a count of how many references
    there are to each object. When the reference count of an object drops to 0, then
    the object is no longer needed, and the memory it had been using becomes available
    again.'
