  md: '# Optional arguments


    There are two optional arguments to the `print` function. They are not overly
    important at this stage of the game, so you can safely skip over this section,
    but they are useful for making your output look nice.


    **sep** Python will insert a space between each of the arguments of the print
    function. There is an optional argument called sep, short for separator, that
    you can use to change that space to some-thing else. For example, using `sep='':''`
    would separate the arguments by a colon and `sep=''##''` would separate the arguments
    by two pound signs.


    One particularly useful possibility is to have nothing inside the quotes, as in
    `sep=""`. This says to put no separation between the arguments. Here is an example
    where sep is useful for getting the output to look nice:


    ```

    print (''The value of 3+4 is'', 3+4, ''.'')

    print (''The value of 3+4 is '', 3+4, ''.'', sep="")

    ```


    ```

    The value of 3+4 is 7 .

    The value of 3+4 is 7.

    ```


    **end** The print function will automatically advance to the next line. For instance,
    the following will print on two lines:


    ```

    print(''On the first line'')

    print(''On the second line'')

    ```


    ```

    On the first line

    On the second line

    ```


    There is an optional argument called end that you can use to keep the print function
    from advancing to the next line. Here is an example:


    ```

    print(''On the first line'', end="")

    print(''On the second line'')

    ```


    ```

    On the first lineOn the second line

    ```


    Of course, this could be accomplished better with a single print, but we will
    see later that there are interesting uses for the end argument.


