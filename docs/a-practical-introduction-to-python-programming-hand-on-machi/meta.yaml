- img_proc: true
  md: "parts of blue and green create shades of turquoise. Equal parts of all three\
    \ create shades of gray. Black is when all three components have values of 0 and\
    \ white is when all three components have values of 255. Varying the values of\
    \ the components can produce up to 256³ 16 million colors. There are a number\
    \ of resources on the web that allow you to vary the amounts of the components\
    \ and see what color is produced.\n\nTo use colors in Tkinter is easy, but with\
    \ one catch—component values are given in hexadecimal. Hexadecimal is a base 16\
    \ number system, where the letters A-F are used to represent the digits 10 through\
    \ 15. It was widely used in the early days of computing, and it is still used\
    \ here and there. Here is a table comparing the two number bases:\n\n| 0 | 0 |\
    \ 8 | 8 | 16 | 10 | 80 | 50 |\n|---|---|---|---|---|---|---|---|\n| 1 | 1 | 9\
