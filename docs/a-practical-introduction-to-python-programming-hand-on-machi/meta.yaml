    # 22.7 More with lists and arrays


    **Sparse lists** A 10,000,000 10,000,000 list of integers requires several hundred
    terabytes of storage, far more than most hard drives can store. However, in many
    practical applications, most of the entries of a list are 0. This allows us to
    save a lot of memory by just storing the nonzero values along with their locations.
    We can do this using a dictionary whose keys are the locations of the nonzero
    elements and whose values are the values stored in the array at those locations.
    For example, suppose we have a two-dimensional list L whose entries are all zero
    except that L[10][12] is 47 and L[100][245] is 18. Here is a the dictionary that
    we would use:


    ```

    d = {(10,12): 47, (100,245): 18}

    ```


    **The array module** Python has a module called array that defines an array object
    that behaves a lot like a list, except that its elements must all be the same
    type. The benefit of array over lists is more efficient memory usage and faster
    performance. See the Python documentation [1] for more about arrays.


