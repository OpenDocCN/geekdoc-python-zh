    # 19.11 More with strings


    There are a few more facts about strings that we haven''t yet talked about.


    **translate** The translate method is used to translate strings, character-by-character.
    The translation is done in two steps. First, use maketrans to create a special
    kind of dictionary that defines how things will be translated. You specify an
    ordinary dictionary and it creates a new one that is used in the translation.
    Then pass that dictionary to the translate method to do the translating. Here
    is a simple example:


    ```

    d = str.maketrans({''a'':''1'', ''b'':''2''})

    print(''abaab''.translate(d))

    ```


    The result is ''12112''.


    Here is an example where we use translate to implement a simple substitution cipher.
    A sub-stitution cipher is a simple way to encrypt a message, where each letter
    is replaced by a different letter. For instance, maybe every a is replaced by
    a g, and every b by an x, etc. Here is the code:


    ```

    from random import shuffle


    # create the key

    alphabet = ''abcdefghijklmnopqrstuvwxyz''

    L = list(alphabet)

    shuffle(L)


    # create the encoding and decoding dictionaries

    encode_dict = str.maketrans(dict(zip(alphabet, L)))

    decode_dict = str.maketrans(dict(zip(L, alphabet)))


    # encode and decode ''this is a secret''

    s = ''this is a secret''.translate(encode_dict)

    t = s.translate(decode_dict)

    print(alphabet, ''''.join(L), t, s, sep=''\n'')

    ```


    abcdefghijklmnopqrstuvwxyz

    qjdpaztxghuflicornkesyvmwb

    exgk gk q kadnae

    this is a secret


    The way it works is we first create the encryption key, which says which letter
    a gets replaced with, b gets replaced with, etc. This is done by shuffling the
    alphabet. We then create a translation'
