    \ or Fahrenheit, the temperature is in. Your program should convert the temperature\
    \ to the other unit. The conversions are $F = \\frac{9}{5} C + 32$ and $C = \\\
    frac{5}{9} (F - 32)$.\n\n3. Ask the user to enter a temperature in Celsius. The\
    \ program should print a message based on the temperature:\n    * If the temperature\
    \ is less than -273.15, print that the temperature is invalid because it is below\
    \ absolute zero.\n    * If it is exactly -273.15, print that the temperature is\
    \ absolute 0.\n    * If the temperature is between -273.15 and 0, print that the\
    \ temperature is below freezing.\n    * If it is 0, print that the temperature\
    \ is at the freezing point.\n    * If it is between 0 and 100, print that the\
    \ temperature is in the normal range.\n    * If it is 100, print that the temperature\
    \ is at the boiling point.\n    * If it is above 100, print that the temperature\
    \ is above the boiling point.\n\n4. Write a program that asks the user how many\
    \ credits they have taken. If they have taken 23 or less, print that the student\
    \ is a freshman. If they have taken between 24 and 53, print that they are a sophomore.\
    \ The range for juniors is 54 to 83, and for seniors it is 84 and over.\n\n5.\
    \ Generate a random number between 1 and 10. Ask the user to guess the number\
    \ and print a message based on whether they get it right or not.\n\n6. A store\
    \ charges $12 per item if you buy less than 10 items. If you buy between 10 and\
    \ 99 items, the cost is $10 per item. If you buy 100 or more items, the cost is\
    \ $7 per item. Write a program that asks the user how many items they are buying\
    \ and prints the total cost.\n\n7. Write a program that asks the user for two\
    \ numbers and prints Close if the numbers are within .001 of each other and Not\
    \ close otherwise.\n\n8. A year is a leap year if it is divisible by 4, except\
    \ that years divisible by 100 are not leap years unless they are also divisible\
    \ by 400. Write a program that asks the user for a year and prints out whether\
    \ it is a leap year or not.\n\n9. Write a program that asks the user to enter\
    \ a number and prints out all the divisors of that number. [Hint: the % operator\
    \ is used to tell if a number is divisible by something. See Section 3.2.]\n\n\
    10. Write a multiplication game program for kids. The program should give the\
    \ player ten randomly generated multiplication questions to do. After each, the\
    \ program should tell them whether they got it right or wrong and what the correct\
    \ answer is.\n\n    ```\n    Question 1: 3 x 4 = 12\n    Right!\n    Question\
    \ 2: 8 x 6 = 44\n    Wrong.   The answer is 48.\n    ...\n    ...\n    Question\
    \ 10: 7 x 7 = 49\n    Right.\n    ```\n\n11. Write a program that asks the user\
    \ for an hour between 1 and 12, asks them to enter am or pm, and asks them how\
    \ many hours into the future they want to go. Print out what the hour will be\
    \ that many hours into the future, printing am or pm as appropriate. An example\
    \ is shown below.\n\n    ```\n    Enter hour: 8\n    am (1) or pm (2)? 1\n   \
    \ How many hours ahead? 5\n    New hour: 1 pm\n    ```\n\n12. A jar of Halloween\
    \ candy contains an unknown amount of candy and if you can guess exactly how much\
    \ candy is in the bowl, then you win all the candy. You ask the person in charge\
    \ the following: If the candy is divided evenly among 5 people, how many pieces\
    \ would be left over? The answer is 2 pieces. You then ask about dividing the\
    \ candy evenly among 6 people, and the amount left over is 3 pieces. Finally,\
    \ you ask about dividing the candy evenly among 7 people, and the amount left\
    \ over is 2 pieces. By looking at the bowl, you can tell that there are less than\
    \ 200 pieces. Write a program to determine how many pieces are in the bowl.\n\n\
    13. Write a program that lets the user play Rock-Paper-Scissors against the computer.\
    \ There should be five rounds, and after those five rounds, your program should\
    \ print out who won and lost or that there is a tie.\n\n## Chapter 5\n\n## Miscellaneous\
    \ Topics I\n\nThis chapter consists of a several common techniques and some other\
    \ useful information.\n\n### 5.1 Counting\n\nVery often we want our programs to\
    \ count how many times something happens. For instance, a video game may need\
    \ to keep track of how many turns a player has used, or a math program may want\
    \ to count how many numbers have a special property. The key to counting is to\
    \ use a variable to keep the count.\n\n**Example 1** This program gets 10 numbers\
    \ from the user and counts how many of those numbers are greater than 10.\n\n\
    ```\ncount = 0\nfor i in range(10):\n    num = eval(input('Enter a number: '))\n\
    \    if num>10:\n        count=count+1\nprint('There are', count, 'numbers greater\
    \ than 10.')\n```\n\nThink of the count variable as if we are keeping a tally\
    \ on a piece of paper. Every time we get a number larger than 10, we add 1 to\
    \ our tally. In the program, this is accomplished by the line count=count+1. The\
    \ first line of the program, count=0, is important. Without it, the Python interpreter\
    \ would get to the count=count+1 line and spit out an error saying something about\
    \ not knowing what count is. This is because the first time the program gets to\
    \ this line, it tries to do what it says: take the old value of count, add 1 to\
    \ it, and store the result in count. But the first time the program gets there,\
    \ there is no old value of count to use, so the Python interpreter doesn't know\
    \ what to do. To avoid the error, we need to define count, and that is what the\
    \ first line does. We set it to 0 to indicate that at the start of the program\
    \ no numbers greater than 10 have been found.\n\nCounting is an extremely common\
    \ thing. The two things involved are:\n\n1. count=0 — Start the count at 0.\n\
    2. count=count+1 — Increase the count by 1.\n\n**Example 2** This modification\
    \ of the previous example counts how many of the numbers the user enters are greater\
    \ than 10 and also how many are equal to 0. To count two things we use two count\
    \ variables.\n\n```\ncount1 = 0\ncount2 = 0\nfor i in range(10):\n    num = eval(input('Enter\
    \ a number: '))\n    if num>10:\n        count1=count1+1\n    if num==0:\n   \
    \     count2=count2+1\nprint('There are', count1, 'numbers greater than 10.')\n\
    print('There are', count2, 'zeroes.')\n```\n\n**Example 3** Next we have a slightly\
    \ trickier example. This program counts how many of the squares from 1² to 100²\
    \ end in a 4.\n\n```\ncount = 0\nfor i in range(1,101):\n    if (i**2)%10==4:\n\
    \        count = count + 1\nprint(count)\n```\n\nA few notes here: First, because\
    \ of the aforementioned quirk of the `range` function, we need to use `range(1,101)`\
    \ to loop through the numbers 1 through 100. The looping variable i takes on those\
    \ values, so the squares from 1² to 100² are represented by i**2. Next, to check\
    \ if a number ends in 4, a nice mathematical trick is to check if it leaves a\
    \ remainder of 4 when divided by 10. The modulo operator, %, is used to get the\
    \ remainder.\n\n### 5.2 Summing\n\nClosely related to counting is summing, where\
    \ we want to add up a bunch of numbers."
