    \ is a little tricky, and that is the loop variable. In the example below, the\
    \ loop variable is the variable i. The output of this program will be the numbers\
    \ 0, 1, . . . , 99, each printed on its own line.\n\n```\nfor i in range(100):\n\
    \    print(i)\n```\n\nWhen the loop first starts, Python sets the variable i to\
    \ 0. Each time we loop back up, Python increases the value of i by 1. The program\
    \ loops 100 times, each time increasing the value of i by 1, until we have looped\
    \ 100 times. At this point the value of i is 99.\n\nYou may be wondering why i\
    \ starts with 0 instead of 1. Well, there doesn't seem to be any really good reason\
    \ why other than that starting at 0 was useful in the early days of computing\
    \ and it has stuck with us. In fact most things in computer programming start\
