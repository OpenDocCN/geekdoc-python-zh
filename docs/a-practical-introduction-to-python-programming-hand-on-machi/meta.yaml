    # 20.1 Importing modules


    There are a couple of different ways to import modules. Here are several ways
    to import some functions from the Random module.


    ```

    from random import randint, choice

    from random import *

    import random

    ```


    +   1. The first way imports just two functions from the module.

    2. The second way imports every function from the module. You should usually avoid
    do-ing this, as the module may contain some names that will interfere with your
    own variable names. For instance if your program uses a variable called total
    and you import a module that contains a function called total, there can be problems.
    Some modules, however, like tkinter, are fairly safe to import this way.

    3. The third way imports an entire module in a way that will not interfere with
    your variable names. To use a function from the module, preface it with random
    followed by a dot. For instance: random.randint(1,10).


    **Changing module names** The **as** keyword can be used to change the name that
    your program uses to refer to a module or things from a module. Here are three
    examples:


    ```

    import numpy as np

    ```'
