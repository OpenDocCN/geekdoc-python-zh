    where you need to generate truly random numbers.


    **Seeds** For mathematical and scientific applications, you may want to reproduce
    the same random numbers each time you run your program, in order to test your
    work with the same data. You can do this by specifying the seed. Examples are
    shown below:


    ```

    random.seed(1)

    print("Seed 1:", [random.randint(1,10) for i in range(5)])

    random.seed(2)

    print("Seed 2:", [random.randint(1,10) for i in range(5)])

    random.seed(1)

    print("Seed 1:", [random.randint(1,10) for i in range(5)])

    ```


    ```

