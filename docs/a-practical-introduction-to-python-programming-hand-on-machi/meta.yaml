  md: '# Chapter 18


    # Further Graphical Programming


    # 18.1 Python 2 vs Python 3


    As of this writing, the most recent version of Python is 3.2, and all the code
    in this book is designed to run in Python 3.2. The tricky thing is that as of
    version 3.0, Python broke compatibility with older versions of Python. Code written
    in those older versions will not always work in Python 3. The problem with this
    is there were a number of useful libraries written for Python 2 that, as of this
    writing, have not yet been ported to Python 3. We want to use these libraries,
    so we will have to learn a little about Python 2. Fortunately, there are only
    a few big differences that we have to worry about.


    **Division** The division operator, `/`, in Python 2, when used with integers,
    behaves like `//`. For instance, `5/4` in Python 2 evaluates to 1, whereas `5/4`
    in Python 3 evaluates to 1.2. This is the way the division operator behaves in
    a number of other programming languages. In Python 3, the decision was made to
    make the division operator behave the way we are used from math.


    In Python 2, if you want to get 1.25 by dividing 5 and 4, you need to do `5/4.0`.
    At least one of the arguments has to be a float in order for the result to be
    a float. If you are dividing two variables, then instead of `x/y`, you may need
    to do `x/float(y)`.


    **print** The **print** function in Python 3 was actually the **print** statement
    in Python 2. So in Python 2, you would write


    ```

    print ''Hello''

    ```


    without any parentheses. This code will no longer work in Python 3 because the
    **print** statement is now the **print** function, and functions need parentheses.
    Also, the current **print** function has those useful optional arguments, `sep`
    and `end`, that are not available in Python 2.'
  merge: -1
