  md: "The code works, but it is very tedious. If we want to add more questions, we\
    \ have to copy and paste one of these blocks of code and then change a bunch of\
    \ things. If we decide to change one of the questions or the order of the questions,\
    \ then there is a fair amount of rewriting involved. If we decide to change the\
    \ design of the game, like not telling the user the correct answer, then every\
    \ single block of code has to be rewritten. Tedious code like this can often be\
    \ greatly simplified with lists and loops:\n\n```\nquestions = ['What is the capital\
    \ of France?',\n            'Which state has only one neighbor?']\nanswers = ['Paris','Maine']\n\
    \nnum_right = 0\nfor i in range(len(questions)):\n    guess = input(questions[i])\n\
    \    if guess.lower()==answers[i].lower():\n        print('Correct')\n       \
    \ num_right=num_right+1\n    else:\n        print('Wrong.        The answer is',\
    \ answers[i])\n    print('You have', num_right, 'out of', i+1, 'right.')\n```\n\
    \nIf you look carefully at this code, you will see that the code in the loop is\
    \ the nearly the same as the code of one of the blocks in the previous program,\
    \ except that in the statements where we print the questions and answers, we use\
    \ questions[i] and answers[i] in place of the actual text of the questions themselves.\n\
    \nThis illustrates the general technique: If you find yourself repeating the same\
    \ code over and over, try lists and a for loop. The few parts of your repetitious\
    \ code that are varying are where the list code will go.\n\nThe benefits of this\
    \ are that to change a question, add a question, or change the order, only the\
    \ questions and answers lists need to be changed. Also, if you want to make a\
