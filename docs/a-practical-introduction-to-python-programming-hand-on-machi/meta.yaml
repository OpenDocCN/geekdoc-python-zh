    \n```\nDecimal(.3)\n```\n\n```\nDecimal('0.299999999999999988897769753748434595763683319091796875')\n\
    ```\n\n**数学运算** 你可以使用常规的数学运算符来处理 Decimal 对象。例如：\n\n```\nDecimal(.34) + Decimal(.17)\n\
    ```\n\n```\nDecimal('0.51')\n```\n\n这是另一个例子：\n\n```\nDecimal(1) / Decimal(17)\n\
    ```\n\n```\nDecimal('0.05882352941176470588235294118')\n```\n\n数学函数 exp、ln、log10\
    \ 和 sqrt 是 Decimal 对象的方法。例如，以下代码计算 2 的平方根：\n\n```\nDecimal(2).sqrt()\n```\n\n\
    ```\nDecimal('1.414213562373095048801688724')\n```\n\nDecimal 对象也可以与内置的 **max**、**min**\
    \ 和 **sum** 函数一起使用，还可以通过 **float** 转换为浮点数，通过 **str** 转换为字符串。\n\n**精度** 默认情况下，Decimal\
    \ 对象具有 28 位精度。要将其更改为，例如，五位精度，请使用 getcontext 函数。\n\n```\nfrom decimal import getcontext\n\
    getcontext().prec = 5\n```\n\n这是一个打印 √2 的 100 位数字的示例：\n\n```\ngetcontext().prec\
    \ = 100\nDecimal(2).sqrt()\n```\n\n```\nDecimal('1.414213562373095048801688724209698078569671875376948073176679737990732478462107038850387534327641573')\n\
    ```\n\n理论上，你可以使用的精度没有限制，但精度越高，所需的内存就越多，运行速度也越慢。一般来说，即使精度较低，Decimal 对象也比浮点数慢。对于大多数问题，普通的浮点运算就足够了，但知道如果需要可以获得更高的精度也是很好的。\n\
    \ndecimal 模块还有很多其他内容。请参阅 Python 文档 [1]。\n\n## 22.6 复数\n\nPython 有一种用于复数的数据类型。\n\
    \n在数学中，我们有 $i = \\sqrt{-1}$。数字 $i$ 被称为虚数单位。复数是形如 $a + bi$ 的数，其中 $a$ 和 $b$ 是实数。值\
    \ $a$ 称为实部，$b$ 称为虚部。在电气工程中，符号 $j$ 用来代替 $i$，在 Python 中，$j$ 用于表示虚数。以下是创建复数的几个例子：\n\
    \n```\nx = 7j\nx = 1j\nx = 3.4 + .3j\nx = complex(3.4, .3)\n```\n\n如果一个数字以 j 或\
    \ J 结尾，Python 就将其视为复数。\n\n复数有 real() 和 imag() 方法，分别返回数字的实部和虚部。conjugate 方法返回复共轭（$a\
    \ + bi$ 的共轭是 $a - bi$）。\n\ncmath 模块包含许多与 math 模块相同的函数，但它们适用于复数参数。这些函数包括常规、反双曲三角函数、对数和指数函数。它还包含两个函数\
    \ polar 和 rect，用于在直角坐标和极坐标之间进行转换：\n\n```\ncmath.polar(3j)\ncmath.rect(3.0, 1.5707963267948966)\n\
    ```\n\n```\n(3.0, 1.5707963267948966)\n(1.8369701987210297e-16+3j)\n```\n\n复数很迷人，尽管在日常生活中并不那么有用。然而，一个很好的应用是分形。这是一个绘制著名的\
    \ Mandelbrot 集的程序。该程序需要 PIL 和 Python 2.6 或 2.7。\n\n```\nfrom Tkinter import *\n\
    from PIL import Image, ImageTk, ImageDraw\n\ndef color_convert(r, g, b):\n   \
    \ return '#{0:02x}{1:02x}{2:02x}'.format(int(r*2.55),int(g*2.55),\n          \
    \                                  int(b*2.55))\n\nmax_iter=75\nxtrans=-.5\nytrans=0\n\
    xzoom=150\nyzoom=-150\n\nroot = Tk()\ncanvas = Canvas(width=300, height=300)\n\
    canvas.grid()\nimage=Image.new(mode='RGB',size=(300,300))\ndraw = ImageDraw.Draw(image)\n\
    \nfor x in range(300):\n    c_x = (x-150)/float(xzoom)+xtrans\n    for y in range(300):\n\
    \        c = complex(c_x, (y-150)/float(yzoom)+ytrans)\n        count=0\n    \
    \    z=0j\n        while abs(z)<2 and count<max_iter:\n            z = z*z+c\n\
    \            count += 1\n        draw.point((x,y),\n                   fill=color_convert(count+25,count+25,count+25))\n\
    \    canvas.delete(ALL)\n    photo=ImageTk.PhotoImage(image)\n    canvas.create_image(0,0,image=photo,anchor=NW)\n\
    \    canvas.update()\n\nmainloop()\n```\n\n![](img/b783d4b75e24755b056ee79a66b412de_234_0.png)\n\
    \n这里的代码运行非常慢。有一些方法可以稍微加快速度，但不幸的是，Python 对于这类事情来说很慢。\n\n## 22.7 列表和数组的更多内容\n\n\
    **稀疏列表** 一个包含 10,000,000 个整数的列表需要几百 TB 的存储空间，远超大多数硬盘的容量。然而，在许多实际应用中，列表的大多数条目都是\
    \ 0。这使我们可以通过只存储非零值及其位置来节省大量内存。我们可以使用一个字典来实现这一点，其键是非零元素的位置，值是存储在数组中这些位置的值。例如，假设我们有一个二维列表\
    \ L，其条目全为零，除了 L[10][12] 是 47 和 L[100][245] 是 18。这是我们使用的字典：\n\n```\nd = {(10,12):\
    \ 47, (100,245): 18}\n```\n\n**array 模块** Python 有一个名为 array 的模块，它定义了一个数组对象，其行为与列表非常相似，只是其元素必须都是相同类型。数组相对于列表的优势在于更高效的内存使用和更快的性能。有关数组的更多信息，请参阅\
    \ Python 文档 [1]。\n\n**NumPy 和 SciPy 库** 如果你需要对数组进行任何严肃的数学或科学计算，你可能需要考虑 NumPy 库。它易于下载和安装。来自\
    \ NumPy 用户指南：\n\n> NumPy 是 Python 科学计算的基础包。它是一个 Python 库，提供了一个多维数组对象、各种派生对象（如掩码数组和矩阵）以及一系列用于数组快速操作的例程，包括数学、逻辑、形状操作、排序、选择、I/O、离散傅里叶变换、基本线性代数、基本统计操作、随机模拟等等。\n\
    \n还有 SciPy，它建立在 NumPy 之上。这次来自 SciPy 用户指南：\n\n> SciPy 是一组建立在 Python NumPy 扩展之上的数学算法和便利函数。它通过向用户提供用于数据操作和可视化的高级命令和类，为交互式\
    \ Python 会话增添了强大的功能。使用 SciPy，交互式 Python 会话成为一个数据处理和系统原型设计环境，可与 MATLAB、IDL、Octave、R-Lab\
