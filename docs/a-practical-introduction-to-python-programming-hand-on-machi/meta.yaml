  md: '# # Chapter 17


    # # GUI Programming III


    This chapter contains a few more GUI odds and ends.


    # ## 17.1 Title bar


    The GUI window that Tkinter creates says Tk by default. Here is how to change
    it:


    ```

    python

    root.title(''Your title'')

    ```


    # ## 17.2 Disabling things


    Sometimes you want to disable a button so it can''t be clicked. Buttons have an
    attribute state that allows you to disable the widget. Use state=DISABLED to disable
    the button and state=NORMAL to enable it. Here is an example that creates a button
    that starts out disabled and then enables it:


    ```

    python

    button = Button(text=''Hi'', state=DISABLED, command=function)

    button.configure(state=NORMAL)

    ```


    You can use the state attribute to disable many other types of widgets, too.


    # ## 17.3 Getting the state of a widget


    Sometimes, you need to know things about a widget, like exactly what text is in
    it or what its background color is. The cget method is used for this. For example,
    the following gets the text of a label called label:


    ```

    python

    label.cget(''text'')

    ```'
