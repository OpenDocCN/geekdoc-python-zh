    # # Miscellaneous Topics II


    In this chapter we will look at variety of useful things to know.


    # ## 10.1 str, int, float, and list


    The **str**, **int**, **float**, and **list** functions are used to convert one
    data type into another.


    **str** Quite often we will want to convert a number to a string to take advantage
    of string methods to break the number apart. The built-in function str is used
    to convert things into strings. Here are some examples:


    | Statement | Result |

    | --- | --- |

    | `str(37)` | ''37'' |

    | `str(3.14)` | ''3.14'' |

    | `str([1,2,3])` | ''[1,2,3]'' |


    **int and float** The **int** function converts something into an integer. The
    **float** function converts something into a floating point number. Here are some
    examples.


    | Statement | Result |

    | --- | --- |

    | `int(''37'')` | 37 |

    | `float(''3.14'')` | 3.14 |

    | `int(3.14)` | 3 |


    To convert a float to an integer, the **int** function drops everything after
    the decimal point.'
