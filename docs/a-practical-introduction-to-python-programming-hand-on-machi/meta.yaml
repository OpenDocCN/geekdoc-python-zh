- md: "## CHAPTER 19. MISCELLANEOUS TOPICS III\n\n## Chapter 20\n\n## Useful modules\n\
    \nPython comes with hundreds of modules that do all sorts of things. There are\
    \ also many third-party modules available for download from the internet. This\
    \ chapter discusses a few modules that I have found useful.\n\n## 20.1 Importing\
    \ modules\n\nThere are a couple of different ways to import modules. Here are\
    \ several ways to import some functions from the Random module.\n\n```\nfrom random\
    \ import randint, choice\nfrom random import *\nimport random\n```\n\n1. The first\
    \ way imports just two functions from the module.\n2. The second way imports every\
    \ function from the module. You should usually avoid doing this, as the module\
    \ may contain some names that will interfere with your own variable names. For\
    \ instance if your program uses a variable called total and you import a module\
    \ that contains a function called total, there can be problems. Some modules,\
    \ however, like tkinter, are fairly safe to import this way.\n3. The third way\
    \ imports an entire module in a way that will not interfere with your variable\
    \ names. To use a function from the module, preface it with random followed by\
    \ a dot. For instance: random.randint(1,10).\n\n**Changing module names** The\
    \ **as** keyword can be used to change the name that your program uses to refer\
    \ to a module or things from a module. Here are three examples:\n\n```\nimport\
    \ numpy as np\nfrom itertools import combinations_with_replacement as cwr\nfrom\
    \ math import log as ln\n```\n\n**Location** Usually, import statements go at\
    \ the beginning of the program, but there is no restriction. They can go anywhere\
    \ as long as they come before the code that uses the module.\n\n**Getting help**\
    \ To get help on a module (say the random module) at the Python shell, import\
    \ it using the third way above. Then `dir(random)` gives a list of the functions\
    \ and variables in the module, and `help(random)` will give you a rather long\
    \ description of what everything does. To get help on a specific function, like\
    \ randint, type `help(random.randint)`.\n\n## 20.2 Dates and times\n\nThe time\
    \ module has some useful functions for dealing with time.\n\n**sleep** The sleep\
    \ function pauses your program for a specified amount of time (in seconds). For\
    \ instance, to pause your program for 2 seconds or for 50 milliseconds, use the\
    \ following:\n\n```\nsleep(2)\nsleep(.05)\n```\n\n**Timing things** The time function\
    \ can be used to time things. Here is an example:\n\n```\nfrom time import time\n\
    start = time()\n# do some stuff\nprint('It took', round(time()-start, 3), 'seconds.')\n\
    ```\n\nFor another example, see Section 17.6, which shows how to put a countdown\
    \ timer into a GUI.\n\nThe resolution of the time() function is milliseconds on\
    \ Windows and microseconds on Linux. The above example uses whole seconds. If\
    \ you want millisecond resolution, use the following print statement:\n\n```\n\
    print('{:.3f} seconds'.format(time()-start))\n```\n\nYou can use a little math\
    \ on this to get minutes and hours. Here is an example:\n\n```\nt = time()-start\n\
    secs = t%60\nmins = t//60\nhours = mins//60\n```\n\nBy the way, when you call\
    \ time(), you get a rather strange value like 1306372108.045. It is the number\
    \ of seconds elapsed since January 1, 1970.\n\n## 20.2. DATES AND TIMES\n\n**Dates**\
    \ The module datetime allows us to work with dates and times together. The following\
    \ line creates a datetime object that contains the current date and time:\n\n\
    ```\nfrom datetime import datetime\nd = datetime(1,1,1).now()\n```\n\nThe datetime\
    \ object has attributes year, month, day, hour, minute, second, and microsecond.\
    \ Here is a short example:\n\n```\nd = datetime(1,1,1).now()\nprint('{:02d}/{}/{}'.format(d.hour,d.minute,d.month,d.day,d.year))\n\
    ```\n\n7:33 2/1/2011\n\nThe hour is in 24-hour format. To get 12-hour format,\
