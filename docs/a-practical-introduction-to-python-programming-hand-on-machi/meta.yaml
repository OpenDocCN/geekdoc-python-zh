    Notice that Python will store the data in a set in whatever order it wants to,
    not necessarily the order you specify. It''s the data in the set that matters,
    not the order of the data. This means that indexing has no meaning for sets. You
    can''t do s[0], for instance.


    **Working with sets** There are a few operators that work with sets.


    | Operator | Description | Example |

    | :--- | :--- | :--- |

    | | | union | {1,2,3} | {3,4} ! {1,2,3,4} |

