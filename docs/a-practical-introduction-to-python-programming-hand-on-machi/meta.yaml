    \nif grade>=90:\n    print('A')\nelif grade>=80:\n    print('B')\nelif grade>=70:\n\
    \    print('C'):\n```"
- md: "## 4.5 Exercises\n\n1. Write a program that asks the user to enter a length\
    \ in centimeters. If the user enters a negative length, the program should tell\
    \ the user that the entry is invalid. Otherwise, the program should convert the\
    \ length to inches and print out the result. There are 2.54 centimeters in an\
