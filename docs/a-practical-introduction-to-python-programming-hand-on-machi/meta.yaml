- md: '# Preface


    My goal here is for something that is partly a tutorial and partly a reference
    book. I like how tutorials get you up and running quickly, but they can often
    be a little wordy and disorganized. Reference books contain a lot of good information,
    but they are often too terse, and they don''t often give you a sense of what is
    important. My aim here is for something in the spirit of a tutorial but still
    useful as a reference. I summarize information in tables and give a lot of short
    example programs. I also like to jump right into things and fill in background
    information as I go, rather than covering the background material first.


    The style of programming in this book is geared towards the kinds of programming
    things I like to do—short programs, often of a mathematical nature, small utilities
    to make my life easier, and small computer games. In fact, the things I cover
    in the book are the things that I have found most useful or interesting in my
    programming experience, and this book serves partly to document those things for
    myself. This book is not designed as a thorough preparation for a career in software
    engineering. Interested readers should progress from this book to a book that
    has more on computer science and the design and organization of large programs.


    In terms of structuring a course around this book or learning on your own, the
    basis is most of Part I. The first four chapters are critically important. Chapter
    5 is useful, but not all of it is critical. Chapter 6 (strings) should be done
    before Chapter 7 (lists). Chapter 8 contains some more advanced list topics. Much
    of this can be skipped, though it is all interesting and useful. In particular,
    that chapter covers list comprehensions, which I use extensively later in the
    book. While you can get away without using list comprehensions, they provide an
    elegant and efficient way of doing things. Chapter 9 (while loops) is important.
    Chapter 10 contains a bunch of miscellaneous topics, all of which are useful,
    but many can be skipped if need be. The final four chapters of Part I are about
    dictionaries, text files, functions, and object-oriented programming.


    Part II is about graphics, mostly GUI programming with Tkinter. You can very quickly
    write some nice programs using Tkinter. For instance, Section 15.7 presents a
    20-line working (though not perfect) tic-tac-toe game. The final chapter of Part
    II covers a bit about the Python Imaging Library.


    Part III contains a lot of the fun and interesting things you can do with Python.
    If you are structuring a one-semester course around this book, you might want
    to pick a few topics in Part III to go over. This part of the book could also
    serve as a reference or as a place for interested and motivated students to learn
    more. All of the topics in this part of the book are things that I have found
    useful at one point or another.


    Though this book was designed to be used in an introductory programming course,
    it is also useful for those with prior programming experience looking to learn
    Python. If you are one of those people, you should be able to breeze through the
    first several chapters. You should find Part II to be a concise, but not superficial,
    treatment on GUI programming. Part III contains information on the features of
    Python that allow you to accomplish big things with surprisingly little code.


    In preparing this book the Python documentation at [www.python.org](http://www.python.org)
    was indispensable. This book was composed entirely in LATEX. There are a number
    of LATEX packages, particularly listings and hyperref, that were particularly
    helpful. LATEX code from [http://blog.miliauskas.lt/](http://blog.miliauskas.lt/)
    helped me get the listings package to nicely highlight the Python code.


    # Part I


    ## Basics


    ## Chapter 1


    ## Getting Started


    This chapter will get you up and running with Python, from downloading it to writing
    simple programs.


    ### 1.1 Installing Python


    Go to [www.python.org](http://www.python.org) and download the latest version
    of Python (version 3.5 as of this writing). It should be painless to install.
    If you have a Mac or Linux, you may already have Python on your computer, though
    it may be an older version. If it is version 2.7 or earlier, then you should install
    the latest version, as many of the programs in this book will not work correctly
    on older versions.


    ### 1.2 IDLE


    IDLE is a simple integrated development environment (IDE) that comes with Python.
    It''s a program that allows you to type in your programs and run them. There are
    other IDEs for Python, but for now I would suggest sticking with IDLE as it is
    simple to use. You can find IDLE in the Python 3.4 folder on your computer.


    When you first start IDLE, it starts up in the shell, which is an interactive
    window where you can type in Python code and see the output in the same window.
    I often use the shell in place of my calculator or to try out small pieces of
    code. But most of the time you will want to open up a new window and type the
    program in there.


    **Note** At least on Windows, if you click on a Python file on your desktop, your
    system will run the program, but not show the code, which is probably not what
    you want. Instead, if you right-click on the file, there should be an option called
    Edit with Idle. To edit an existing Python file, either do that or start up IDLE
    and open the file through the File menu.


    **Keyboard shortcuts** The following keystrokes work in IDLE and can really speed
    up your work.


    | Keystroke | Result |

    |---|---|

    | CTRL+C | Copy selected text |

    | CTRL+X | Cut selected text |

    | CTRL+V | Paste |

    | CTRL+Z | Undo the last keystroke or group of keystrokes |

    | CTRL+SHIFT+Z | Redo the last keystroke or group of keystrokes |

    | F5 | Run module |


    ### 1.3 A first program


    Start IDLE and open up a new window (choose New Window under the File Menu). Type
    in the following program.


    ```

    temp = eval(input(''Enter a temperature in Celsius: ''))

    print(''In Fahrenheit, that is'', 9/5*temp+32)

    ```


    Then, under the Run menu, choose Run Module (or press F5). IDLE will ask you to
    save the file, and you should do so. Be sure to append .py to the filename as
    IDLE will not automatically append it. This will tell IDLE to use colors to make
    your program easier to read.


    Once you’ve saved the program, it will run in the shell window. The program will
    ask you for a temperature. Type in 20 and press enter. The program’s output looks
    something like this:


    ```

    Enter a temperature in Celsius: 20

    In Fahrenheit, that is 68.0

    ```


    Let’s examine how the program does what it does. The first line asks the user
    to enter a temperature. The `input` function’s job is to ask the user to type
    something in and to capture what the user types. The part in quotes is the prompt
    that the user sees. It is called a string and it will appear to the program’s
    user exactly as it appears in the code itself. The `eval` function is something
    we use here, but it won’t be clear exactly why until later. So for now, just remember
    that we use it when we’re getting numerical input.


    We need to give a name to the value that the user enters so that the program can
    remember it and use it in the second line. The name we use is temp and we use
    the equals sign to assign the user’s value to temp.


    The second line uses the `print` function to print out the conversion. The part
    in quotes is another string and will appear to your program’s user exactly as
    it appears in quotes here. The second argument to the **print** function is the
    calculation. Python will do the calculation and print out the numerical result.


    This program may seem too short and simple to be of much use, but there are many
    websites that have little utilities that do similar conversions, and their code
    is not much more complicated than the code here.


    **A second program** Here is a program that computes the average of two numbers
    that the user enters:


    ```

    num1 = eval(input(''Enter the first number: ''))

    num2 = eval(input(''Enter the second number: ''))

    print(''The average of the numbers you entered is'', (num1+num2)/2)

    ```


    For this program we need to get two numbers from the user. There are ways to do
    that in one line, but for now we''ll keep things simple. We get the numbers one
    at a time and give each number its own name. The only other thing to note is the
    parentheses in the average calculation. This is because of the order of operations.
    All multiplications and divisions are performed before any additions and subtractions,
    so we have to use parentheses to get Python to do the addition first.


    ### 1.4 Typing things in


    **Case** Case matters. To Python, print, Print, and PRINT are all different things.
    For now, stick with lowercase as most Python statements are in lowercase.


    **Spaces** Spaces matter at the beginning of lines, but not elsewhere. For example,
    the code below will not work.


    ```

    temp = eval(input(''Enter a temperature in Celsius: ''))

    print(''In Fahrenheit, that is'', 9/5*temp+32)

    ```


    Python uses indentation of lines for things we''ll learn about soon. On the other
    hand, spaces in most other places don''t matter. For instance, the following lines
    have the same effect:


    ```

    print(''Hello world!'')

    print (''Hello world!'')

    print( ''Hello world!'' )

    ```


    Basically, computers will only do what you tell them, and they often take things
    very literally. Python itself totally relies on things like the placement of commas
    and parentheses so it knows what''s what. It is not very good at figuring out
    what you mean, so you have to be precise. It will be very frustrating at first,
    trying to get all of the parentheses and commas in the right places, but after
    a while it will become more natural. Still, even after you''ve programmed for
    a long time, you will still miss something. Fortunately, the Python interpreter
    is pretty good about helping you find your mistakes.'
  mdcn: '# 前言


    我的目标是创作一本兼具教程和参考书特点的书籍。我喜欢教程能让你快速上手，但它们往往有些冗长且缺乏条理。参考书包含大量优质信息，但通常过于简练，且无法让你把握重点。我的目标是创作一本具有教程精神，同时又可作为参考的书籍。我将信息总结在表格中，并提供大量简短的示例程序。我也喜欢直接切入主题，并在过程中补充背景信息，而不是先介绍背景材料。


    本书的编程风格倾向于我喜欢做的那类编程——短小的程序，通常是数学性质的，能简化生活的小工具，以及小型电脑游戏。事实上，我在书中涵盖的内容都是我在编程经验中发现最有用或最有趣的东西，这本书在某种程度上也是为我自己记录这些东西。本书并非旨在为软件工程职业生涯做全面准备。感兴趣的读者应从本书过渡到更侧重计算机科学以及大型程序设计与组织的书籍。


    就围绕本书构建课程或自学而言，基础是第一部分的大部分内容。前四章至关重要。第五章有用，但并非全部关键。第六章（字符串）应在第七章（列表）之前学习。第八章包含一些更高级的列表主题。其中大部分可以跳过，尽管它们都很有趣且有用。特别是，该章涵盖了列表推导式，我在本书后面会广泛使用。虽然你可以不使用列表推导式，但它们提供了一种优雅高效的方式。第九章（while
    循环）很重要。第十章包含一系列杂项主题，所有这些都很有用，但如果需要，许多可以跳过。第一部分的最后四章是关于字典、文本文件、函数和面向对象编程的。


    第二部分是关于图形的，主要是使用 Tkinter 进行 GUI 编程。你可以使用 Tkinter 非常快速地编写一些不错的程序。例如，第 15.7 节展示了一个
    20 行的井字棋游戏（虽然不完美）。第二部分的最后一章简要介绍了 Python Imaging Library。


    第三部分包含许多你可以用 Python 做的有趣且好玩的事情。如果你正在围绕本书构建一个学期的课程，你可能需要挑选第三部分的一些主题来讲解。本书的这一部分也可以作为参考，或者供有兴趣和动力的学生学习更多知识。本书这一部分的所有主题都是我在某个时候发现有用的东西。


    尽管本书是为入门编程课程设计的，但对于那些有编程经验并希望学习 Python 的人也很有用。如果你是这类人，你应该能轻松通过前几章。你会发现第二部分是对 GUI
    编程的简洁而非肤浅的处理。第三部分包含关于 Python 特性的信息，这些特性使你能够用惊人的少量代码完成大事。


    在编写本书时，[www.python.org](http://www.python.org) 上的 Python 文档是不可或缺的。本书完全用 LATEX
    编写。有许多 LATEX 包，特别是 listings 和 hyperref，非常有帮助。来自 [http://blog.miliauskas.lt/](http://blog.miliauskas.lt/)
    的 LATEX 代码帮助我让 listings 包很好地高亮显示 Python 代码。


    # 第一部分


    ## 基础


    ## 第一章


    ## 入门


    本章将带你从下载 Python 到编写简单程序，快速上手并运行。


    ### 1.1 安装 Python


    访问 [www.python.org](http://www.python.org) 并下载最新版本的 Python（截至本文撰写时为 3.5 版）。安装应该很轻松。如果你使用的是
    Mac 或 Linux，你的计算机上可能已经有 Python，尽管可能是较旧的版本。如果是 2.7 或更早版本，你应该安装最新版本，因为本书中的许多程序在旧版本上无法正确运行。


    ### 1.2 IDLE


    IDLE 是一个简单的集成开发环境（IDE），随 Python 一起提供。它是一个允许你输入程序并运行它们的程序。还有其他用于 Python 的 IDE，但现在我建议坚持使用
    IDLE，因为它简单易用。你可以在计算机上的 Python 3.4 文件夹中找到 IDLE。


    当你第一次启动 IDLE 时，它会在 shell 中启动，这是一个交互式窗口，你可以在其中输入 Python 代码并在同一窗口中查看输出。我经常使用 shell
    代替计算器或尝试小段代码。但大多数时候，你会想打开一个新窗口并在那里输入程序。


    **注意** 至少在 Windows 上，如果你双击桌面上的 Python 文件，你的系统会运行程序，但不会显示代码，这可能不是你想要的。相反，如果你右键单击该文件，应该有一个名为“使用
    IDLE 编辑”的选项。要编辑现有的 Python 文件，可以这样做，或者启动 IDLE 并通过“文件”菜单打开文件。


    **键盘快捷键** 以下按键在 IDLE 中有效，可以大大提高你的工作效率。


    | 按键 | 结果 |

    |---|---|

    | CTRL+C | 复制选定的文本 |

    | CTRL+X | 剪切选定的文本 |

    | CTRL+V | 粘贴 |

    | CTRL+Z | 撤销上一次按键或一组按键 |

    | CTRL+SHIFT+Z | 重做上一次按键或一组按键 |

    | F5 | 运行模块 |


    ### 1.3 第一个程序


    启动 IDLE 并打开一个新窗口（在“文件”菜单下选择“新建窗口”）。输入以下程序。


    ```

    temp = eval(input(''Enter a temperature in Celsius: ''))

    print(''In Fahrenheit, that is'', 9/5*temp+32)

    ```


    然后，在“运行”菜单下，选择“运行模块”（或按 F5）。IDLE 会要求你保存文件，你应该这样做。确保在文件名后附加 .py，因为 IDLE 不会自动附加它。这将告诉
    IDLE 使用颜色使你的程序更易于阅读。


    保存程序后，它将在 shell 窗口中运行。程序会要求你输入一个温度。输入 20 并按回车键。程序的输出大致如下：


    ```

    Enter a temperature in Celsius: 20

    In Fahrenheit, that is 68.0

    ```


    让我们看看程序是如何工作的。第一行要求用户输入一个温度。`input` 函数的作用是要求用户输入内容并捕获用户输入的内容。引号中的部分是用户看到的提示。它被称为字符串，它将完全按照代码中出现的样子显示给程序用户。`eval`
    函数是我们在这里使用的，但直到后面才会清楚为什么使用它。所以现在，只需记住我们在获取数值输入时使用它。


    我们需要给用户输入的值一个名称，以便程序可以记住它并在第二行使用它。我们使用的名称是 temp，我们使用等号将用户的值赋给 temp。


    第二行使用 `print` 函数打印转换结果。引号中的部分是另一个字符串，它将完全按照引号中出现的样子显示给程序用户。**print** 函数的第二个参数是计算。Python
    将进行计算并打印出数值结果。


    这个程序可能看起来太短太简单，没什么大用，但许多网站都有进行类似转换的小工具，它们的代码并不比这里的代码复杂多少。


    **第二个程序** 这是一个计算用户输入的两个数字平均值的程序：


    ```

    num1 = eval(input(''Enter the first number: ''))

    num2 = eval(input(''Enter the second number: ''))

    print(''The average of the numbers you entered is'', (num1+num2)/2)

    ```


    对于这个程序，我们需要从用户那里获取两个数字。有办法在一行中完成，但现在我们将保持简单。我们一次获取一个数字，并为每个数字命名。唯一需要注意的是平均值计算中的括号。这是因为运算顺序。所有乘法和除法都在任何加法和减法之前执行，因此我们必须使用括号让
    Python 先进行加法。


    ### 1.4 输入内容


    **大小写** 大小写很重要。对 Python 来说，print、Print 和 PRINT 都是不同的东西。现在，坚持使用小写，因为大多数 Python
    语句都是小写的。


    **空格** 空格在行首很重要，但在其他地方不重要。例如，下面的代码将无法工作。


    ```

    temp = eval(input(''Enter a temperature in Celsius: ''))

    print(''In Fahrenheit, that is'', 9/5*temp+32)

    ```


    Python 使用行的缩进来表示我们即将学习的内容。另一方面，大多数其他地方的空格并不重要。例如，以下几行具有相同的效果：


    ```

    print(''Hello world!'')

    print (''Hello world!'')

    print( ''Hello world!'' )

    ```


    基本上，计算机只会做你告诉它们的事情，而且它们通常非常字面地理解事物。Python 本身完全依赖于逗号和括号的位置来知道什么是什么。它不太擅长理解你的意思，所以你必须精确。一开始，试图把所有的括号和逗号放在正确的位置会非常令人沮丧，但过一段时间后会变得更自然。不过，即使你编程很长时间，你仍然会遗漏一些东西。幸运的是，Python
    解释器在帮助你找到错误方面做得很好。'
