  md: '# 20.2. DATES AND TIMES


    **Dates** The module datetime allows us to work with dates and times together.
    The following line creates a datetime object that contains the current date and
    time:


    ```

    from datetime import datetime

    d = datetime(1,1,1).now()

    ```


    The datetime object has attributes year, month, day, hour, minute, second, and
    microsecond. Here is a short example:


    ```

    d = datetime(1,1,1).now()

    print(''{:02d}/{}/{}''.format(d.hour,d.minute,d.month,d.day,d.year))

    ```


    7:33 2/1/2011


    The hour is in 24-hour format. To get 12-hour format, you can do the following:


    ```

    am_pm = ''am'' if d.hour<12 else ''pm''

    print(''{}:{}{}''.format(d.hour%12, d.minute, am_pm))

    ```


    An alternative way to display the date and time is to use the strftime method.
    It uses a variety of formatting codes that allow you to display the date and time,
    including information about the day of the week, am/pm, etc.


    Here are some of the formatting codes:


    | Code | Description |

    |---|---|

    | %c | date and time formatted according to local conventions |

    | %x, %X | %x is the date, and %X is the time, both formatted as with %c |

    | %d | day of the month |

    | %j | day of the year |

    | %a, %A | weekday name (%a is the abbreviated weekday name) |

    | %m | month (01-12) |

    | %b, %B | month name (%b is the abbreviated month name) |

    | %y, %Y | year (%y is 2-digit, %Y is 4-digit) |

    | %H, %I | hour (%H is 24-hour, %I is 12-hour) |

    | %p | am or pm |

