    \ line, capitalizes the first letter of the first and last name and adds the area\
    \ code 301 to the phone number. Your program should write this to a new file called\
    \ students2.txt. Here is what the first line of the new file should look like:\n\
    \n    Walter Melon\tmelon@email.msmary.edu\t301-555-3141\n\n5. You are given a\
    \ file namelist.txt that contains a bunch of names. Some of the names are a first\
    \ name and a last name separated by spaces, like George Washington, while others\
    \ have a middle name, like John Quincy Adams. There are no names consisting of\
