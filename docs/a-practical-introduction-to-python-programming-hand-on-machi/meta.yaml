    \n7.  编写一个程序，要求用户输入两个数字，如果这两个数字相差在0.001以内，则打印“接近”，否则打印“不接近”。\n\n8.  如果一个年份能被4整除，那么它就是闰年，但能被100整除的年份不是闰年，除非它也能被400整除。编写一个程序，询问用户一个年份，并打印出它是否是闰年。\n\
