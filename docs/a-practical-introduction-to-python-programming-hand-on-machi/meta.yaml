    ```\n\n这种技术可以在程序运行时创建字典。\n\n## 19.10 copy\n\ncopy 模块有几个有用的方法：copy 和 deepcopy。例如，copy\
    \ 方法可用于从用户定义的类中复制一个对象。假设我们有一个名为 Users 的类，并且我们想要复制一个特定的用户 u。我们可以这样做：\n\n```python\n\
    from copy import copy\nu_copy = copy(u)\n```\n\n但 copy 方法有某些局限性，其他复制技术也是如此，比如列表的\
    \ M=L[:]。例如，假设 L = [[1,2,3],[4,5,6]]。如果我们通过 M=L[:] 制作一个副本，然后设置 L[0][0]=100，这也会影响\
    \ M[0][0]。这是因为副本只是一个浅拷贝——构成 L 的子列表的引用被复制了，而不是这些子列表的副本。任何时候我们复制一个本身由其他对象组成的对象时，这种情况都可能成为问题。\n\
    \ndeepcopy 方法用于这种只复制值而不复制引用的情况。以下是其工作方式：\n\n```python\nfrom copy import deepcopy\n\
    M = deepcopy(L)\n```\n\n## 19.11 更多关于字符串的知识\n\n关于字符串，我们还有几个事实尚未讨论。\n\n**translate**\
    \ translate 方法用于逐字符地翻译字符串。翻译分两步完成。首先，使用 maketrans 创建一个特殊类型的字典，该字典定义了事物将如何被翻译。你指定一个普通字典，它会创建一个用于翻译的新字典。然后将该字典传递给\
    \ translate 方法以执行翻译。下面是一个简单的示例：\n\n```python\nd = str.maketrans({'a':'1', 'b':'2'})\n\
    print('abaab'.translate(d))\n```\n\n结果是 '12112'。\n\n下面是一个我们使用 translate 实现简单替换密码的示例。替换密码是一种简单的消息加密方式，其中每个字母被另一个字母替换。例如，也许每个\
    \ a 被 g 替换，每个 b 被 x 替换，等等。以下是代码：\n\n```python\nfrom random import shuffle\n\n\
    # 创建密钥\nalphabet = 'abcdefghijklmnopqrstuvwxyz'\nL = list(alphabet)\nshuffle(L)\n\
    \n# 创建编码和解码字典\nencode_dict = str.maketrans(dict(zip(alphabet, L)))\ndecode_dict\
    \ = str.maketrans(dict(zip(L, alphabet)))\n\n# 编码和解码 'this is a secret'\ns = 'this\
    \ is a secret'.translate(encode_dict)\nt = s.translate(decode_dict)\nprint(alphabet,\
    \ ''.join(L), t, s, sep='\\n')\n```\n\n```\nabcdefghijklmnopqrstuvwxyz\nqjdpaztxghuflicornkesyvmwb\n\
    exgk gk q kadnae\nthis is a secret\n```\n\n其工作原理是，我们首先创建加密密钥，该密钥指定了 a 被替换为哪个字母，b\
    \ 被替换为哪个字母，等等。这是通过打乱字母表来完成的。然后我们使用第 19.9 节中用于创建字典的 zip 技巧，为编码和解码创建翻译表。最后，我们使用\
    \ translate 方法执行实际的替换。\n\n**partition** partition 方法类似于列表的 split 方法。区别如下所示：\n\n\
    ```python\n'3.14159'.partition('.')\n'3.14159'.split('.')\n```\n\n```\n('3', '.',\
    \ '14159')\n['3', '14159']\n```\n\n区别在于，函数的参数作为输出的一部分返回。partition 方法还返回一个元组而不是一个列表。下面是一个计算作为字符串输入的简单单项式导数的示例。导数的规则是\
    \ $x^n$ 的导数是 $na x^{n-1}$。\n\n```python\ns = input('Enter a monomial: ')\ncoeff,\
    \ power = s.partition('x^')\nprint('{}x^{}'.format(int(coeff)*int(power), int(power)-1))\n\
    ```\n\n```\nEnter a monomial: 2x^12\n24x^11\n```\n\n**注意** 这些方法以及许多其他方法，都可以直接使用语言的基本工具（如\
    \ for 循环、if 语句等）来完成。然而，其理念是，那些经常完成的事情被制作为标准 Python 发布版的一部分的方法或类。这可以帮助你避免重复造轮子，并且它们还可以使你的程序更可靠、更易于阅读。\n\
    \n**比较字符串** 字符串的比较是按字母顺序进行的。例如，以下代码将打印 Yes。\n\n```python\nif 'that' < 'this':\n\
    \    print('Yes')\n```\n\n除此之外，如果字符串包含字母以外的字符，比较将基于字符的 ord 值。\n\n## 19.12 杂项技巧和窍门\n\
    \n以下是一些有用的技巧：\n\n**同一行上的语句** 你可以将 if 语句及其对应的语句写在同一行。\n\n```python\nif x==3: print('Hello')\n\
    ```\n\n你也可以通过用分号分隔，将多个语句组合在一行中。例如：\n\n```python\na=3; b=4; c=5\n```\n\n不要过度使用这两种方式，因为它们会使你的代码更难阅读。不过，有时它们可以使代码更易读。\n\
    \n**连续调用多个方法** 你可以连续调用多个方法，如下所示：\n\n```python\ns = open('file.txt').read().upper()\n\
    ```\n\n此示例读取文件的内容，然后将所有内容转换为大写，并将结果存储在 s 中。同样，要小心不要过度使用太多连续的方法，否则你的代码可能难以阅读。\n\
    \n**None** 除了 **int**、**float**、**str**、**list** 等之外，Python 还有一种名为 **None** 的数据类型。它基本上是\
    \ Python 版本的“无”。它表示在你可能期望有东西的地方没有东西，例如函数的返回值。你可能会在各处看到它出现。\n\n**文档字符串** 在定义函数时，你可以指定一个包含有关函数工作方式信息的字符串。然后，任何使用该函数的人都可以使用\
    \ Python 的 **help** 函数来获取有关你的函数的信息。下面是一个示例：\n\n```python\ndef square(x):\n   \
    \ \"\"\" Returns x squared. \"\"\"\n    return x**2\n```\n\n```\n>>> help(square)\n\
    Help on function square in module __main__:\n\nsquare(x)\n    Returns x squared.\n\
    ```\n\n你也可以在 **class** 语句之后立即使用文档字符串来提供有关你的类的信息。\n\n## 19.13 在其他计算机上运行你的 Python\
    \ 程序\n\n你的 Python 程序可以在安装了 Python 的其他计算机上运行。Mac 和 Linux 机器通常安装了 Python，尽管版本可能不是你正在使用的最新版本，并且这些机器可能没有你正在使用的额外库。\n\
    \nWindows 上的一个选项是 py2exe。这是一个第三方模块，可将 Python 程序转换为可执行文件。目前，它仅适用于 Python 2。使用起来可能有点棘手。以下是安装\
    \ py2exe 后可以使用的脚本。\n\n```python\nimport os\nprogram_name = raw_input('Enter name\
    \ of program: ')\nif program_name[-3:] != '.py':\n    program_name += '.py'\n\n\
    with open('temp_py2exe.py', 'w') as fp:\n    s = 'from distutils.core import setup\\\
    n'\n    s += \"import py2exe\\nsetup(console=['\"\n    s += program_name + \"\
    '])\"\n    fp.write(s)\n\nos.system('c:\\Python26\\python temp_py2exe.py py2exe')\n\
    ```\n\n如果一切正常，应该会弹出一个窗口，你会看到一堆东西快速发生。生成的可执行文件将出现在你的 Python 文件所在目录的一个新子目录中，名为 dist。该子目录中还会有几个其他文件，你需要将它们与可执行文件一起包含。"
