    \ print an A but then continue on and check to see if the score is a B, C, etc.,\
    \ which is a bit of a waste. Using **elif**, as soon as we find where the score\
    \ matches, we stop checking conditions and skip all the way to the end of the\
    \ whole block of statements. An added benefit of this is that the conditions we\
    \ use in the **elif** statements are simpler than in their **if** counterparts.\
    \ For instance, when using **elif**, the second part of the second if statement\
    \ condition, grade<90, becomes unnecessary because the corresponding **elif**\
    \ does not have to worry about a score of 90 or above, as such a score would have\
