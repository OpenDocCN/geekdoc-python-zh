    \ create a dictionary. One use for it is kind of like the opposite of the items\
    \ method:\n\n```\nd = dict([('A',100),('B',300)])\n```\n\nThis creates the dictionary\
    \ {'A':100,'B':300}. This way of building a dictionary is useful if your program\
    \ needs to construct a dictionary while it is running.\n\n**Dictionary comprehensions**\
    \ Dictionary comprehensions work similarly to list comprehensions. The following\
