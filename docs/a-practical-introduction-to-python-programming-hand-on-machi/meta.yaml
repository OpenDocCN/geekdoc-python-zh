  md: "**Combinations** If we want all the possible *k*-element subsets from a sequence,\
    \ where all that mat-ters is the elements, not the order in which they appear,\
    \ then what we want are combinations. For instance, the 2-element subsets that\
    \ can be made from f1, 2, 3g are f1, 2g, f1, 3g and f2, 3g. We consider f1, 2g\
    \ and f2, 1g as being the same because they contain the same elements. Here is\
    \ an example showing the combinations of two-element substrings possible from\
    \ '123':\n\n```\n[\"\".join(c) for c in combinations('123', 2)]\n```\n\n```\n\
    ['12', '13', '23']\n```\n\n**Combinations with replacement** For combinations\
    \ with repeated elements, use the function combinations_with_replacement.\n\n\
    ```\n[\"\".join(c) for c in combinations_with_replacement('123', 2)]\n```\n\n\
    ```\n['11', '12', '13', '22', '23', '33']\n```\n\n# 24.2 Cartesian product\n\n\
    The function product produces an iterator from the Cartesian product of iterables.\
    \ The Cartesian product of two sets *X* and *Y* consists of all pairs (*x*, *y*)\
    \ where *x* is in *X* and *y* is in *Y*. Here is a short example:\n\n```\n[\"\"\
    .join(p) for p in product('abc', '123')]\n```\n\n```\n['a1', 'a2', 'a3', 'b1',\
    \ 'b2', 'b3', 'c1', 'c2', 'c3']\n```\n\n**Example** To demonstrate the use of\
    \ product, here are three progressively shorter, and clearer ways to find all\
    \ one- or two-digit Pythagorean triples (values of (*x*, *y*, *z*) satisfying\
    \ *x*² + *y*² = *z*²). The first way uses nested for loops:\n\n```\nfor x in range(1,101):\n\
    \    for y in range(1,101):\n        for z in range(1,101):\n            if x**2+y**2==z**2:\n\
    \                print(x,y,z)\n```\n\nHere is the same thing rewritten with product:\n\
    \n```\nX = range(1,101)\nfor (x,y,z) in product (X,X,X):\n    if x**2+y**2==z**2:\n\
    \        print(x,y,z)\n```\n\nIt is even shorter if we use list comprehensions:\n\
    \n```\nX = range(1,101)\n[(x,y,z) for (x,y,z) in product(X,X,X) if x**2+y**2==z**2]\n\
    ```"
