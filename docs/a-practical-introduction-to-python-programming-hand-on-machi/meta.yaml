    \ 或 <Control-Shift-F1>。\n\n**注意** 这些示例都将按键绑定到 root，这是我们对主窗口的称呼。你也可以将按键绑定到特定的部件。例如，如果你只想让左方向键在一个名为\
    \ canvas 的画布上工作，可以使用以下代码：\n\n```\ncanvas.bind(<Left>, callback)\n```\n\n不过，这里有一个技巧：除非画布拥有\
    \ GUI 的焦点，否则它不会识别按键。可以通过以下方式设置焦点：\n\n```\ncanvas.focus_set()\n```\n\n**示例 1**\
    \ 这是一个用户可以使用左或右方向键移动矩形的示例。\n\n```\nfrom tkinter import *\n\ndef callback(event):\n\
    \    global move\n    if event.keysym=='Right':\n        move += 1\n    elif event.keysym=='Left':\n\
    \        move -=1\n    canvas.coords(rect,50+move,50,100+move,100)\n\nroot = Tk()\n\
    root.bind('<Key>', callback)\ncanvas = Canvas(width=200,height=200)\ncanvas.grid(row=0,column=0)\n\
    rect = canvas.create_rectangle(50,50,100,100,fill='blue')\nmove = 0\n\nmainloop()\n\
    ```\n\n**示例 2** 这是一个演示鼠标事件的示例程序。程序开始时在屏幕上绘制一个矩形。用户可以执行以下操作：\n\n- 用鼠标拖动矩形（<B1_Motion>）。\n\
    - 用鼠标滚轮调整矩形大小（<MouseWheel>）。\n- 每当用户左键单击时，矩形会改变颜色（<Button-1>）。\n- 任何时候移动鼠标，当前鼠标坐标都会显示在一个标签中（<Motion>）。\n\
    \n以下是该程序的代码：\n\n```\nfrom tkinter import *\n\ndef mouse_motion_event(event):\n\
    \    label.configure(text='{}, {}'.format(event.x, event.y))\n\ndef wheel_event(event):\n\
    \    global x1, x2, y1, y2\n    if event.delta>0:\n        diff = 1\n    elif\
    \ event.delta<0:\n        diff = -1\n    x1+=diff\n    x2-=diff\n    y1+=diff\n\
    \    y2-=diff\n    canvas.coords(rect,x1,y1,x2,y2)\n\ndef b1_event(event):\n \
    \   global color\n    if not b1_drag:\n        color = 'Red' if color=='Blue'\
    \ else 'Blue'\n        canvas.itemconfigure(rect, fill=color)\n\ndef b1_motion_event(event):\n\
    \    global b1_drag, x1, x2, y1, y2, mouse_x, mouse_y\n    x = event.x\n    y\
    \ = event.y\n    if not b1_drag:\n        mouse_x = x\n        mouse_y = y\n \
    \       b1_drag = True\n        return\n    x1+=(x-mouse_x)\n    x2+=(x-mouse_x)\n\
    \    y1+=(y-mouse_y)\n    y2+=(y-mouse_y)\n    canvas.coords(rect,x1,y1,x2,y2)\n\
    \    mouse_x = x\n    mouse_y = y\n\ndef b1_release_event(event):\n    global\
    \ b1_drag\n    b1_drag = False\n\nroot=Tk()\n\nlabel = Label()\n\ncanvas = Canvas(width=200,\
    \ height=200)\ncanvas.bind('<Motion>', mouse_motion_event)\ncanvas.bind('<ButtonPress-1>',\
    \ b1_event)\ncanvas.bind('<B1-Motion>', b1_motion_event)\ncanvas.bind('<ButtonRelease-1>',\
    \ b1_release_event)\ncanvas.bind('<MouseWheel>', wheel_event)\ncanvas.focus_set()\n\
    \ncanvas.grid(row=0, column=0)\nlabel.grid(row=1, column=0)\n\nmouse_x = 0\nmouse_y\
    \ = 0\nb1_drag = False\n\nx1 = y1 = 50\nx2 = y2 = 100\ncolor = 'blue'\nrect =\
    \ canvas.create_rectangle(x1,y1,x2,y2,fill=color)\n\nmainloop()\n```\n\n以下是关于程序工作原理的一些说明：\n\
    \n1. 首先，每次鼠标在画布上移动时，都会调用 mouse_motion_event 函数。该函数打印鼠标当前的坐标，这些坐标包含在 Event 属性 x\
    \ 和 y 中。\n2. 每当用户使用鼠标（滚动）滚轮时，都会调用 wheel_event 函数。Event 属性 delta 包含有关滚轮移动速度和方向的信息。我们只是根据滚轮是向前还是向后移动来拉伸或收缩矩形。\n\
    3. 每当用户按下鼠标左键时，都会调用 b1_event 函数。该函数在矩形被单击时改变其颜色。这里有一个名为 b1_drag 的全局变量很重要。每当用户拖动矩形时，它就被设置为\
    \ True。当拖动进行时，鼠标左键被按下，并且 b1_event 函数被持续调用。我们不想在这种情况下不断改变矩形的颜色，因此使用了 if 语句。\n4.\
    \ 拖动主要在 b1_motion_event 函数中完成，该函数在鼠标左键被按下且鼠标被移动时调用。它使用全局变量来跟踪上次调用函数时鼠标的位置，然后根据新旧位置之间的差异移动矩形。当拖动完成时，鼠标左键将被释放。当这种情况发生时，会调用\
    \ b1_release_event 函数，我们相应地设置全局 b1_drag 变量。\n5. 需要 focus_set 方法，因为除非焦点在画布上，否则画布不会识别鼠标滚轮事件。\n\
    6. 这个程序的一个问题是，用户可以通过单击画布上的任何位置来修改矩形，而不仅仅是矩形本身。如果我们只想在鼠标位于矩形上方时才发生更改，可以专门绑定矩形而不是整个画布，如下所示：\n\
    \n```\ncanvas.tag_bind(rect, '<B1-Motion>', b1_motion_event)\n```\n\n7. 最后，这里全局变量的使用有点混乱。如果这是更大项目的一部分，将所有这些封装到一个类中可能是有意义的。\n\
    \n# 第 17 章\n\n## GUI 编程 III\n\n本章包含更多 GUI 的零散内容。\n\n## 17.1 标题栏\n\nTkinter 创建的\
    \ GUI 窗口默认显示 Tk。以下是更改方法：\n\n```\nroot.title('Your title')\n```\n\n## 17.2 禁用部件\n\
    \n有时你想禁用一个按钮，使其无法被点击。按钮有一个 state 属性，允许你禁用该部件。使用 state=DISABLED 来禁用按钮，使用 state=NORMAL\
    \ 来启用它。下面是一个创建初始禁用然后启用的按钮的示例：\n\n```\nbutton = Button(text='Hi', state=DISABLED,\
