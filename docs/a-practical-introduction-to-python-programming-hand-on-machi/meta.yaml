- img_proc: true
  md: "# # Chapter 25\n\n# # Exceptions\n\nThis chapter provides a brief introduction\
    \ to exceptions.\n\n# ## 25.1 Basics\n\nIf you are writing a program that someone\
    \ else is going to use, you don't want it to crash if an error occurs. Say your\
    \ program is doing a bunch of calculations, and at some point you have the line\
    \ c=a/b. If b ever happens to be 0, you will get a division by zero error and\
    \ the program will crash. Here is an example:\n\n```\na = 3\nb = 0\nc = a/b\n\
    print('Hi there')\n```\n\n> ZeroDivisionError: int division or modulo by zero\n\
    \nOnce the error occurs, none of the code after c=a/b will get executed. In fact,\
    \ if the user is not running the program in IDLE or some other editor, they won't\
    \ even see the error. The program will just stop running and probably close.\n\
    \nWhen an error occurs, an exception is generated. You can catch this exception\
    \ and allow your program to recover from the error without crashing. Here is an\
    \ example:\n\n```\na = 3\nb = 0\ntry:\n    c=a/b\nexcept ZeroDivisionError:\n\
    \    print('Calculation error')\nprint('Hi there')\n```\n\n> Calculation error"
  merge: -1
  pgno: 254
- img_proc: true
  md: "Hi There\n\n**Different possibilities** We can have multiple statements in\
    \ the `try` block and also and multiple `except` blocks, like below:\n\n```\n\
    try:\n    a = eval(input('Enter a number: ')) print (3/a)\n\nexcept NameError:\n\
    \    print('Please enter a number.')\nexcept ZeroDivisionError:\n    print('Can't\
    \ enter 0.')\n```\n\n**Not specifying the exception** You can leave off the name\
    \ of the exception, like below:\n\n```\ntry:\n    a = eval(input('Enter a number:\
    \ ')) print (3/a)\n\nexcept:\n    print('A problem occurred.')\n```\n\nIt is generally\
    \ not recommended that you do this, however, as this will catch every exception,\
    \ including ones that maybe you aren't anticipating when you write the code. This\
    \ will make it hard to debug your program.\n\n**Using the exception** When you\
    \ catch an exception, information about the exception is stored in an Exception\
    \ object. Below is an example that passes the name of the exception to the user:\n\
    \n```\ntry:\n    c = a/0\nexcept Exception as e:\n    print(e)\n```\n\nint division\
    \ or modulo by zero\n\n# 25.2 Try/except/else\n\nYou can use an `else` clause\
    \ along with `try/except`. Here is an example:\n\n```\ntry:\n    file = open('filename.txt',\
    \ 'r')\nexcept IOError:\n    print('Could not open file')\nelse:\n    s = file.read()\n\
    \    print(s)\n```"
  merge: -1
  pgno: 255
- img_proc: true
  md: "In this example, if filename.txt does not exist, an input/output exception\
    \ called **IOError** is generated. On the other hand, if the file does exist,\
    \ there may be certain things that we want to do with it. We can put those in\
    \ the **else** block.\n\n# 25.3 try/finally and with/as\n\nThere is one more block\
    \ you can use called **finally**. Things in the **finally** block are things that\
    \ must be executed whether or not an exception occurs. So even if an exception\
    \ occurs and your program crashes, the statements in the **finally** block will\
    \ be executed. One such thing is closing a file.\n\n```\nf = open('filename.txt',\
    \ 'w') s = 'hi'\n\ntry:\n    # some code that could potentially fail goes here\
    \ finally:\n    f.close()\n```\n\nThe **finally** block can be used along with\
    \ **except** and **else** blocks. This sort of thing with files is common enough\
    \ that it is has its own syntax:\n\n```\ns = 'hi'\nwith open('filename.txt') as\
    \ f:\n    print(s, file=f)\n```\n\nThis is an example of something called a context\
    \ manager. Context managers and **try/finally** are mostly used in more complicated\
    \ applications, like network programming.\n\n# 25.4 More with exceptions\n\nThere\
    \ is a lot more that can be done with exceptions. See the Python documentation\
    \ [1] for all the different types of exceptions. In fact, not all exceptions come\
    \ from errors. There is even a statement called **raise** that you can use to\
    \ raise your own exceptions. This is useful if you are writing your own classes\
    \ to be used in other programs and you want to send messages, like error messages,\
    \ to people who are using your class."
  merge: -1
  pgno: 256
