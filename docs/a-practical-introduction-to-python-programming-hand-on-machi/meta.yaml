  md: '# # Chapter 6


    # # Strings


    Strings are a data type in Python for dealing with text. Python has a number of
    powerful features for manipulating strings.


    # ## 6.1 Basics


    **Creating a string** A string is created by enclosing text in quotes. You can
    use either single quotes, '', or double quotes, ". A triple-quote can be used
    for multi-line strings. Here are some examples:


    ```

    s = ''Hello'' t = "Hello"

    m = """This is a long string that is spread across

    two lines."""

    ```


    **Input** Recall from Chapter 1 that when getting numerical input we use an **eval**
    statement with the **input** statement, but when getting text, we do not use **eval**.
    The difference is illustrated below:


    ```

    num = eval(input(''Enter a number: ''))

    string = input(''Enter a string: '')

    ```


    **Empty string** The empty string "" is the string equivalent of the number 0.
    It is a string with nothing in it. We have seen it before, in the print statement''s
    optional argument, sep="".


    **Length** To get the length of a string (how many characters it has), use the
    built-in function **len**. For example, **len(''Hello'')** is 5.'
