- md: "## Chapter 9\n\n## While loops\n\nWe have already learned about for loops,\
    \ which allow us to repeat things a specified number of times. Sometimes, though,\
    \ we need to repeat something, but we don't know ahead of time exactly how many\
    \ times it has to be repeated. For instance, a game of Tic-tac-toe keeps going\
    \ until someone wins or there are no more moves to be made, so the number of turns\
    \ will vary from game to game. This is a situation that would call for a while\
    \ loop.\n\n## 9.1 Examples\n\n**Example 1** Let's go back to the first program\
    \ we wrote back in Section 1.3, the temperature converter. One annoying thing\
    \ about it is that the user has to restart the program for every new temperature.\
    \ A while loop will allow the user to repeatedly enter temperatures. A simple\
    \ way for the user to indicate that they are done is to have them enter a nonsense\
    \ temperature like 1000 (which is below absolute 0). This is done below:\n\n```\n\
    temp = 0\nwhile temp!=-1000:\n    temp = eval(input('Enter a temperature (-1000\
    \ to quit): '))\n    print('In Fahrenheit that is', 9/5*temp+32)\n```\n\nLook\
    \ at the **while** statement first. It says that we will keep looping, that is,\
    \ keep getting and converting temperatures, as long as the temperature entered\
    \ is not 1000. As soon as 1000 is entered, the while loop stops. Tracing through,\
    \ the program first compares temp to 1000. If temp is not 1000, then the program\
    \ asks for a temperature and converts it. The program then loops back up and again\
    \ compares temp to 1000. If temp is not 1000, the program will ask for another\
    \ temperature, convert it, and then loop back up again and do another comparison.\
    \ It continues this process until the user enters 1000.\n\nWe need the line temp=0\
    \ at the start, as without it, we would get a name error. The program would get\
    \ to the while statement, try to see if temp is not equal to 1000 and run into\
    \ a problem because temp doesn't yet exist. To take care of this, we just declare\
    \ temp equal to 0. There is nothing special about the value 0 here. We could set\
    \ it to anything except 1000. (Setting it to 1000 would cause the condition on\
    \ the while loop to be false right from the start and the loop would never run.)\n\
    \nNote that it is natural to think of the while loop as continuing looping until\
    \ the user enters -1000. However, when we construct the condition, instead of\
    \ thinking about when to stop looping, we instead need to think in terms of what\
    \ has to be true in order to keep going.\n\nA while loop is a lot like an if statement.\
    \ The difference is that the indented statements in an if block will only be executed\
    \ once, whereas the indented statements in a while loop are repeatedly executed.\n\
    \n**Example 2** One problem with the previous program is that when the user enters\
    \ in 1000 to quit, the program still converts the value 1000 and doesn't give\
    \ any message to indicate that the program has ended. A nicer way to do the program\
    \ is shown below.\n\n```\ntemp = 0\nwhile temp!=-1000:\n    temp = eval(input('Enter\
    \ a temperature (-1000 to quit): '))\n    if temp!=-1000:\n        print('In Fahrenheit\
    \ that is', 9/5*temp+32)\n    else:\n        print('Bye!')\n```\n\n**Example 3**\
    \ When we first met if statements in Section 4.1, we wrote a program that played\
    \ a simple random number guessing game. The problem with that program is that\
    \ the player only gets one guess. We can, in a sense, replace the if statement\
    \ in that program with a while loop to create a program that allows the user to\
    \ keep guessing until they get it right.\n\n```\nfrom random import randint\n\
    secret_num = randint(1,10)\nguess = 0\nwhile guess != secret_num:\n    guess =\
    \ eval(input('Guess the secret number: '))\nprint('You finally got it!')\n```\n\
    \nThe condition guess!=secret_num says that as long as the current guess is not\
    \ correct, we will keep looping. In this case, the loop consists of one statement,\
    \ the input statement, and so the program will keep asking the user for a guess\
    \ until their guess is correct. We require the line guess=0 prior to the while\
    \ loop so that the first time the program reaches the loop, there is something\
    \ in guess for the program to use in the comparison. The exact value of guess\
    \ doesn't really matter at this point. We just want something that is guaranteed\
    \ to be different than secret_num. When the user finally guesses the right answer,\
    \ the loop ends and program control moves to the print statement after the loop,\
    \ which prints a congratulatory message to the player.\n\n**Example 4** We can\
    \ use a while loop to mimic a for loop, as shown below. Both loops have the exact\
    \ same effect.\n\n```\nfor i in range(10):\n    print(i)\n\ni=0\nwhile i<10:\n\
    \    print(i)\n    i=i+1\n```\n\nRemember that the for loop starts with the loop\
    \ variable i equal to 0 and ends with it equal to 9. To use a while loop to mimic\
    \ the for loop, we have to manually create our own loop variable i. We start by\
    \ setting it to 0. In the while loop we have the same print statement as in the\
    \ for loop, but we have another statement, i=i+1, to manually increase the loop\
    \ variable, something that the for loop does automatically.\n\n**Example 5** Below\
    \ is our old friend that converts from Fahrenheit to Celsius.\n\n```\ntemp = eval(input('Enter\
    \ a temperature in Celsius: '))\nprint('In Fahrenheit, that is', 9/5*temp+32)\n\
    ```\n\nA program that gets input from a user may want to check to see that the\
    \ user has entered valid data. The smallest possible temperature is absolute zero,\
    \ -273.15 C. The program below takes absolute zero into account:\n\n```\ntemp\
    \ = eval(input('Enter a temperature in Celsius: '))\nif temp<-273.15:\n    print('That\
    \ temperature is not possible.')\nelse:\n    print('In Fahrenheit, that is', 9/5*temp+32)\n\
    ```\n\nOne way to improve this is to allow the user to keep reentering the temperature\
    \ until they enter a valid one. You may have experienced something similar using\
    \ an online form to enter a phone number or a credit card number. If you enter\
    \ an invalid number, you are told to reenter it. In the code below, the while\
    \ loop acts very similarly to the if statement in the previous example.\n\n```\n\
    temp = eval(input('Enter a temperature in Celsius: '))\nwhile temp<-273.15:\n\
    \    temp = eval(input('Impossible. Enter a valid temperature: '))\nprint('In\
    \ Fahrenheit, that is', 9/5*temp+32)\n```\n\nNote that we do not need an else\
    \ statement here, like we had with the if statement. The condition on the while\
    \ loop guarantees that we will only get to the print statement once the user enters\
    \ a valid temperature. Until that point, the program will be stuck in the loop,\
    \ continually asking the user for a new temperature.\n\n**Example 6** As mentioned\
    \ before, it is a valuable skill to be able to read code. One way to do so is\
    \ to pretend to be the Python interpreter and go through the code line by line.\
    \ Let's try it with the code below.\n\n```\ni = 0\nwhile i<50:\n    print(i)\n\
    \    i=i+2\nprint('Bye!')\n```\n\nThe variable i gets set to 0 to start. Next,\
    \ the program tests the condition on the while loop. Because i is 0, which is\
    \ less than 50, the code indented under the while statement will get executed.\
    \ This code prints the current value of i and then executes the statement i=i+2\
    \ which adds 2 to i.\n\nThe variable i is now 2 and the program loops back to\
    \ the while statement. It checks to see if i is less than 50, and since i is 2,\
    \ which is less than 50, the indented code should be executed again. So we print\
    \ i again, add 2 to it, and then loop back to check the while loop condition again.\
    \ We keep doing this until finally i gets to 50.\n\nAt this point, the while condition\
    \ will finally not be true anymore and the program jumps down to the first statement\
    \ after the while, which prints Bye!. The end result of the program is the numbers\
    \ 0, 2, 4, . . . , 48 followed by the message, Bye!.\n\n## 9.2 Infinite loops\n\
    \nWhen working with while loops, sooner or later you will accidentally send Python\
    \ into a never-ending loop. Here is an example:\n\n```\ni=0\nwhile i<10:\n   \
    \ print(i)\n```\n\nIn this program, the value of i never changes and so the condition\
    \ i<10 is always true. Python will continuously print zeroes. To stop a program\
    \ caught in a never-ending loop, use Restart Shell under the Shell menu. You can\
    \ use this to stop a Python program before it is finished executing.\n\nSometimes\
    \ a never-ending loop is what you want. A simple way to create one is shown below:\n\
    \n```\nwhile True:\n    # statements to be repeated go here\n```\n\nThe value\
    \ True is called a boolean value and is discussed further in Section 10.2.\n\n\
    ## 9.3 The break statement\n\nThe break statement can be used to break out of\
    \ a for or while loop before the loop is finished."
  mdcn: "## 第9章\n\n## while循环\n\n我们已经学习了for循环，它允许我们重复执行指定次数的操作。然而，有时我们需要重复某些操作，但事先并不知道具体需要重复多少次。例如，一局井字棋游戏会持续进行，直到有人获胜或没有更多可走的步数，因此每局游戏的回合数会有所不同。这种情况就需要使用while循环。\n\
    \n## 9.1 示例\n\n**示例1** 让我们回到第1.3节编写的第一个程序——温度转换器。它的一个烦人之处是，用户每次转换新温度都必须重启程序。while循环允许用户重复输入温度。用户表示完成的一种简单方式是输入一个无意义的温度值，例如1000（低于绝对零度）。下面的代码实现了这一点：\n\
    \n```\ntemp = 0\nwhile temp!=-1000:\n    temp = eval(input('Enter a temperature\
    \ (-1000 to quit): '))\n    print('In Fahrenheit that is', 9/5*temp+32)\n```\n\
    \n首先看**while**语句。它表示只要输入的温度不是1000，我们就会持续循环，即持续获取并转换温度。一旦输入1000，while循环就会停止。追踪程序执行过程：程序首先比较temp与1000。如果temp不是1000，程序会请求输入一个温度并进行转换。然后程序循环回到开头，再次比较temp与1000。如果temp不是1000，程序会请求另一个温度，进行转换，然后再次循环并进行比较。这个过程会持续进行，直到用户输入1000。\n\
    \n我们需要在开始时设置`temp=0`这一行，因为没有它，我们会得到一个名称错误。程序执行到while语句时，会尝试检查temp是否不等于1000，但由于temp尚未存在，就会出现问题。为了解决这个问题，我们只需将temp声明为0。这里的0值没有特殊意义。我们可以将其设置为除1000以外的任何值。（将其设置为1000会导致while循环的条件从一开始就为假，循环将永远不会执行。）\n\
    \n请注意，自然地会认为while循环会持续循环，直到用户输入-1000。然而，当我们构造条件时，我们不是考虑何时停止循环，而是需要考虑为了继续循环，什么条件必须为真。\n\
    \nwhile循环与if语句非常相似。区别在于，if块中的缩进语句只会执行一次，而while循环中的缩进语句会重复执行。\n\n**示例2** 前一个程序的一个问题是，当用户输入1000退出时，程序仍然会转换1000这个值，并且不会给出任何消息表明程序已结束。下面展示了一种更好的程序实现方式。\n\
    \n```\ntemp = 0\nwhile temp!=-1000:\n    temp = eval(input('Enter a temperature\
    \ (-1000 to quit): '))\n    if temp!=-1000:\n        print('In Fahrenheit that\
    \ is', 9/5*temp+32)\n    else:\n        print('Bye!')\n```\n\n**示例3** 当我们在第4.1节首次接触if语句时，我们编写了一个简单的随机数猜谜游戏程序。那个程序的问题是玩家只有一次猜测机会。从某种意义上说，我们可以用while循环替换该程序中的if语句，创建一个允许用户持续猜测直到猜对的程序。\n\
    \n```\nfrom random import randint\nsecret_num = randint(1,10)\nguess = 0\nwhile\
    \ guess != secret_num:\n    guess = eval(input('Guess the secret number: '))\n\
    print('You finally got it!')\n```\n\n条件`guess!=secret_num`表示只要当前猜测不正确，我们就会持续循环。在这种情况下，循环包含一条语句，即输入语句，因此程序会持续要求用户猜测，直到他们的猜测正确。我们需要在while循环之前设置`guess=0`这一行，这样当程序第一次到达循环时，guess中就有值可供程序进行比较。此时guess的确切值并不重要。我们只需要一个保证与secret_num不同的值。当用户最终猜对答案时，循环结束，程序控制权移动到循环之后的打印语句，向玩家打印祝贺信息。\n\
    \n**示例4** 我们可以使用while循环来模拟for循环，如下所示。两个循环具有完全相同的效果。\n\n```\nfor i in range(10):\n\
    \    print(i)\n\ni=0\nwhile i<10:\n    print(i)\n    i=i+1\n```\n\n记住，for循环从循环变量i等于0开始，到i等于9结束。要使用while循环模拟for循环，我们必须手动创建自己的循环变量i。我们首先将其设置为0。在while循环中，我们有与for循环相同的打印语句，但我们还有另一条语句`i=i+1`来手动增加循环变量，这是for循环自动完成的操作。\n\
    \n**示例5** 下面是我们熟悉的老朋友——将华氏温度转换为摄氏温度。\n\n```\ntemp = eval(input('Enter a temperature\
    \ in Celsius: '))\nprint('In Fahrenheit, that is', 9/5*temp+32)\n```\n\n从用户获取输入的程序可能希望检查用户是否输入了有效数据。可能的最低温度是绝对零度，-273.15摄氏度。下面的程序考虑了绝对零度：\n\
    \n```\ntemp = eval(input('Enter a temperature in Celsius: '))\nif temp<-273.15:\n\
    \    print('That temperature is not possible.')\nelse:\n    print('In Fahrenheit,\
    \ that is', 9/5*temp+32)\n```\n\n改进这一点的一种方法是允许用户持续重新输入温度，直到输入有效的温度。你可能在使用在线表单输入电话号码或信用卡号码时遇到过类似的情况。如果输入无效号码，你会被要求重新输入。在下面的代码中，while循环的作用与前一个示例中的if语句非常相似。\n\
    \n```\ntemp = eval(input('Enter a temperature in Celsius: '))\nwhile temp<-273.15:\n\
    \    temp = eval(input('Impossible. Enter a valid temperature: '))\nprint('In\
    \ Fahrenheit, that is', 9/5*temp+32)\n```\n\n请注意，我们这里不需要像if语句那样的else语句。while循环的条件保证了只有在用户输入有效温度后，我们才会到达打印语句。在此之前，程序将一直停留在循环中，持续要求用户输入新的温度。\n\
    \n**示例6** 如前所述，能够阅读代码是一项宝贵的技能。一种方法是假装自己是Python解释器，逐行执行代码。让我们尝试用下面的代码来实践。\n\n```\n\
    i = 0\nwhile i<50:\n    print(i)\n    i=i+2\nprint('Bye!')\n```\n\n变量i最初被设置为0。接下来，程序测试while循环的条件。因为i是0，小于50，所以while语句下的缩进代码将被执行。这段代码打印i的当前值，然后执行语句`i=i+2`，将i增加2。\n\
    \n现在变量i是2，程序循环回到while语句。它检查i是否小于50，由于i是2，小于50，缩进代码应该再次执行。所以我们再次打印i，将其增加2，然后循环回去再次检查while循环条件。我们持续这样做，直到最终i达到50。\n\
    \n此时，while条件最终不再为真，程序跳转到while之后的第一条语句，打印Bye!。程序的最终结果是数字0, 2, 4, . . . , 48，后跟消息Bye!。\n\
    \n## 9.2 无限循环\n\n使用while循环时，你迟早会不小心让Python进入一个永无止境的循环。下面是一个例子：\n\n```\ni=0\nwhile\
    \ i<10:\n    print(i)\n```\n\n在这个程序中，i的值从未改变，因此条件`i<10`始终为真。Python将不断打印零。要停止陷入无限循环的程序，请使用Shell菜单下的Restart\
    \ Shell。你可以在程序执行完成之前使用此功能停止Python程序。\n\n有时无限循环正是你想要的。创建无限循环的一种简单方法如下所示：\n\n```\n\
    while True:\n    # statements to be repeated go here\n```\n\n值True被称为布尔值，将在第10.2节进一步讨论。\n\
    \n## 9.3 break语句\n\nbreak语句可用于在循环完成之前跳出for或while循环。"
