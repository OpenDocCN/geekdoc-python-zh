    \n```\ns = open('c:/users/heinold/desktop/file.txt').read()\n```\n\n## 12.2 Writing\
    \ to files\n\nThere are also several ways to write to files. We will look at one\
    \ way here. We will be writing to a file called writefile.txt.\n\n```\nf = open('writefile.txt',\
    \ 'w')\nprint('This is line 1.', file=f)\nprint('This is line 2.', file=f)\nf.close()\n\
    ```\n\nWe first have to open the file. That is what the first line does, with\
    \ the 'w' indicating that we want to be able to write to the file. Python creates\
    \ what is called a file object to represent the file, and we give that object\
    \ the name f. This is what we use to refer to the file. To write to the file,\
    \ we use the print statement with the optional file argument that specifies the\
    \ file to write to. When we are done writing, we should close the file to make\
    \ sure all of our changes take. Be careful here because if writefile.txt already\
    \ exists, its contents will be overwritten.\n\n## 12.3 Examples\n\n**Example 1**\
    \ Write a program that reads a list of temperatures from a file called temps.txt,\
    \ converts those temperatures to Fahrenheit, and writes the results to a file\
    \ called ftemps.txt.\n\n```\nfile1 = open('ftemps.txt', 'w')\ntemperatures = [line.strip()\
    \ for line in open('temps.txt')]\nfor t in temperatures:\n    print(t*9/5+32,\
    \ file=file1)\nfile1.close()\n```\n\n**Example 2** In Section 7.6 we wrote a simple\
    \ quiz game. The questions and answers were both contained in lists hard-coded\
    \ into the program. Instead of that, we can store the questions and answers in\
    \ files. That way, if you decide to change the questions or answers, you just\
    \ have to change their files. Moreover, if you decide to give the program to someone\
    \ else who doesn't know Python, they can easily create their own lists of questions\
    \ and answers. To do this, we just replace the lines that create the lists with\
    \ the following:\n\n```\nquestions = [line.strip() for line in open('questions.txt')]\n\
    answers = [line.strip() for line in open('answers.txt')]\n```\n\n**Example 3**\
    \ Say you have a text file that contains the results of every 2009-10 NCAA basketball\
    \ game. (You can find such a file at www.kenpom.com.) A typical line of the file\
    \ looks like this:\n\n02/27/2010, Robert Morris, 61, Mount St. Mary's, 63\n\n\
    Below is a program that scans through the file to find the most lopsided game,\
    \ the one where the winning team had the largest margin of victory.\n\n```\nlines\
    \ = [line.strip() for line in open('scores.txt')]\ngames = [line.split(',') for\
    \ line in lines]\nprint(max([abs(int(g[2])-int(g[4])) for g in games]))\n```\n\
    \nWe use the split method to break each line into a list of its component parts.\
    \ The scores are at indices 2 and 4. To find the maximum difference, we can use\
    \ a list comprehension to create a list of all the margins of victories and use\
    \ **max** to find the maximum.\n\nThe maximum turns out to be 84. Unfortunately,\
    \ the method above does not tell us anything else about the game. In order to\
    \ do that, we resort to the longer way to find maximums, described in Section\
    \ 5.5. This allows us to store information about the game as we search for the\
    \ largest margin of victory.\n\n```\nlines = [line.strip() for line in open('scores.txt')]\n\
    games = [line.split(',') for line in lines]\n\nbiggest_diff = 0\nfor g in games:\n\
    \    diff = abs(int(g[2])-int(g[4]))\n    if diff>biggest_diff:\n        biggest_diff\
    \ = diff\n        game_info = g\nprint(game_info)\n```\n\n```\n['12/03/2009',\
    \ ' SalemInternational', '35', ' Marshall', '119']\n```\n\n## 12.4 Wordplay\n\n\
    If you like words, you can have a lot of fun with a wordlist, which is a text\
