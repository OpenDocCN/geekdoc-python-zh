    i=2\nwhile i<num and num%i!=0:\n    i=i+1\nif i==num:\n    print('Prime')\nelse:\n\
    \    print('Not prime')\n\nfor i in range(2, num):\n    if num%i==0:\n       \
    \ print('Not prime')\n        break\nelse:\n    print('Prime')\n```\n\nThe idea\
    \ behind both approaches is to scan through all the integers between 2 and num-1,\
    \ and if any of them is a divisor, then we know num is not prime. To see if a\
    \ value i is a divisor of num, we just have to check to see if num%i is 0.\n\n\
    The idea of the while loop version is we continue looping as long as we haven't\
