  md: "+   - The basic structure is\n    string name[starting location : ending location+1]\n\
    Slices have the same quirk as the range function in that they does not include\
    \ the ending location. For instance, in the example above, s[2:5] gives the characters\
    \ in indices 2, 3, and 4, but not the character in index 5.\n- We can leave either\
    \ the starting or ending locations blank. If we leave the starting location blank,\
    \ it defaults to the start of the string. So s[:5] gives the first five characters\
    \ of s. If we leave the ending location blank, it defaults to the end of the string.\
    \ So s[5:] will give all the characters from index 5 to the end. If we use negative\
    \ indices, we can get the ending characters of the string. For instance, s[-2:]\
    \ gives the last two characters.\n- There is an optional third argument, just\
    \ like in the range statement, that can specify the step. For example, s[1:7:2]\
    \ steps through the string by twos, selecting the characters at indices 1, 3,\
    \ and 5 (but not 7, because of the aforementioned quirk). The most useful step\
    \ is -1, which steps backwards through the string, reversing the order of the\
    \ characters.\n\n# 6.6 Changing individual characters of a string\n\nSuppose we\
    \ have a string called s and we want to change the character at index 4 of s to\
    \ 'X'. It is tempting to try s[4]='X', but that unfortunately will not work. Python\
    \ strings are immutable, which means we can't modify any part of them. There is\
    \ more on why this is in Section 19.1. If we want to change a character of s,\
    \ we have to instead build a new string from s and reassign it to s. Here is code\
    \ that will change the character at index 4 to 'X':\n\n```\ns = s[:4] + 'X' +\
    \ s[5:]\n```\n\nThe idea of this is we take all the characters up to index 4,\
    \ then X, and then all of the characters after index 4.\n\n# 6.7 Looping\n\nVery\
    \ often we will want to scan through a string one character at a time. A for loop\
