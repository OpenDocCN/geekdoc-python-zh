    \ | total-=5 |\n| prod=prod*2 | prod*=2 |\n\nThere are also shortcut operators\
    \ /=, %=, //=, and **=.\n\n- **An assignment shortcut**\nLook at the code below.\n\
    \n```\na = 0\nb = 0\nc = 0\n```\n\nA nice shortcut is:\n\n```\na = b = c = 0\n\
    ```\n\n- **Another assignment shortcut**\nSay we have a list L with three elements\
    \ in it, and we want to assign those elements to variable names. We could do the\
    \ following:\n\n```\nx = L[0]\ny = L[1]\nz = L[2]\n```\n\nInstead, we can do this:\n\
    \n```\nx,y,z = L\n```\n\nSimilarly, we can assign three variables at a time like\
    \ below:\n\n```\nx,y,z = 1,2,3\n```\n\nAnd, as we have seen once before, we can\
    \ swap variables using this kind of assignment.\n\n```\nx,y,z = y,z,x\n```\n\n\
    - **Shortcuts with conditions**\nHere are some handy shortcuts:\n\n| Statement\
    \ | Shortcut |\n|---|---|\n| if a==0 and b==0 and c==0: | if a==b==c==0: |\n|\
    \ if 1<a and a<b and b<5: | if 1<a<b<5: |\n\n## 10.4 Short-circuiting\n\nSay we\
    \ are writing a program that searches a list of words for those whose fifth character\
    \ is 'z'. We might try the following:\n\n```\nfor w in words:\n    if w[4]=='z':\n\
    \        print(w)\n```\n\nBut with this, we will occasionally get a string index\
    \ out of range error. The problem is that some words in the list might be less\
    \ than five characters long. The following if statement, however, will work:\n\
    \n```\nif len(w)>=5 and w[4]=='z':\n```\n\nIt might seem like we would still get\
    \ an error because we are still checking w[4], but there is no error. The key\
    \ to why this works is short-circuiting. Python starts by checking the first part\
    \ of the condition, len(w)>=5. If that condition turns out to be false, then the\
    \ whole and condition is guaranteed to be false, and so there is no point in even\
    \ looking at the second condition. So Python doesn't bother with the second condition.\
    \ You can rely on this behavior.\n\nShort-circuiting also happens with or conditions.\
    \ In this case, Python checks the first part of the or and if it is true, then\
    \ the whole or is guaranteed to be true, and so Python will not bother checking\
    \ the second part of the or.\n\n## 10.5 Continuation\n\nSometimes you'll write\
    \ a long line of code that would be more readable if it were split across two\
    \ lines. To do this, use a backslash \\ character at the end of the line to indicate\
    \ that the statement continues onto the next line. Here is an example:\n\n```\n\
    if 'a' in string or 'b' in string or 'c' in string \\ or 'd' in string or 'e'\
    \ in string:\n```\n\nMake sure there are no extra spaces after the backslash or\
