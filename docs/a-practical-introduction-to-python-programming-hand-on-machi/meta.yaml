    from itertools import combinations_with_replacement as cwr

    from math import log as ln

    ```


    **Location** Usually, import statements go at the beginning of the program, but
    there is no restriction. They can go anywhere as long as they come before the
    code that uses the module.


    **Getting help** To get help on a module (say the random module) at the Python
    shell, import it using the third way above. Then `dir(random)` gives a list of
    the functions and variables in the module, and `help(random)` will give you a
    rather long description of what everything does. To get help on a specific function,
    like randint, type `help(random.randint)`.


    # 20.2 Dates and times


    The time module has some useful functions for dealing with time.


    **sleep** The sleep function pauses your program for a specified amount of time
    (in seconds). For instance, to pause your program for 2 seconds or for 50 milliseconds,
    use the following:


    ```

    sleep(2)

    sleep(.05)

    ```


    **Timing things** The time function can be used to time things. Here is an example:


    ```

    from time import time

    start = time()

    # do some stuff

    print(''It took'', round(time()-start, 3), ''seconds.'')

    ```


    For another example, see Section 17.6, which shows how to put a countdown timer
    into a GUI.


    The resolution of the time() function is milliseconds on Windows and microseconds
    on Linux. The above example uses whole seconds. If you want millisecond resolution,
    use the following print statement:


    ```

    print(''{:.3f} seconds''.format(time()-start))

    ```


    You can use a little math on this to get minutes and hours. Here is an example:


    ```

    t = time()-start

    secs = t%60

    mins = t//60

    hours = mins//60

    ```


    By the way, when you call time(), you get a rather strange value like 1306372108.045.
    It is the number of seconds elapsed since January 1, 1970.'
