    \ label 的标签的文本：\n\n```\nlabel.cget('text')\n```\n\n这可以用于按钮、画布等，并且可以用于它们的任何属性，如\
    \ bg、fg、state 等。作为快捷方式，Tkinter 重载了 [] 运算符，因此 label['text'] 可以实现与上述示例相同的功能。\n\n\
    ## 17.4 消息框\n\n消息框是弹出窗口，用于向你提问或说些什么然后消失。要使用它们，我们需要一个导入语句：\n\n```\nfrom tkinter.messagebox\
    \ import *\n```\n\n有多种不同类型的消息框。对于每种类型，你都可以指定用户将看到的消息以及消息框的标题。以下是三种类型的消息框，以及生成它们的代码：\n\
    \n```\nshowinfo(title='Message for you', message='Hi There!')\naskquestion(title='Quit?',\
