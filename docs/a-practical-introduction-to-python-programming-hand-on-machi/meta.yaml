    print('There are', count2, 'zeroes.')\n```\n\n**Example 3** Next we have a slightly\
    \ trickier example. This program counts how many of the squares from 1² to 100²\
    \ end in a 4.\n\n```\ncount = 0\nfor i in range(1,101):\n    if (i**2)%10==4:\n\
    \        count = count + 1\nprint(count)\n```\n\nA few notes here: First, because\
    \ of the aforementioned quirk of the `range` function, we need to use `range(1,101)`\
    \ to loop through the numbers 1 through 100. The looping variable i takes on those\
    \ values, so the squares from 1² to 100² are represented by i**2. Next, to check\
    \ if a number ends in 4, a nice mathematical trick is to check if it leaves a\
    \ remainder of 4 when divided by 10. The modulo operator, %, is used to get the\
    \ remainder.\n\n# 5.2 Summing\n\nClosely related to counting is summing, where\
    \ we want to add up a bunch of numbers."
