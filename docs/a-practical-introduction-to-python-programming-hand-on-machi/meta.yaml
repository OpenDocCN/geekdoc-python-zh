- md: "## 22.9 Miscellaneous topics\n\n**Hexadecimal, octal, and binary** Python has\
    \ built-in functions `hex`, `oct`, and `bin` for converting integers to hexadecimal,\
    \ octal, and binary. The `int` function converts those bases to base 10. Here\
    \ are some examples:\n\n```\nhex(250)\noct(250)\nbin(250)\nint(0xfa)\n```\n\n\
    ```\n'0xfa'\n'0o372'\n'0b11111010'\n250\n```\n\nHexadecimal values are prefaced\
    \ with 0x, octal values are prefaced with 0o and binary values are prefaced with\
    \ 0b.\n\n**The int function** The `int` function has an optional second argument\
    \ that allows you to specify the base you are converting from. Here are a few\
    \ examples:\n\n```\nint('101101', 2)    # convert from base 2\nint('121212', 3)\
    \    # convert from base 3\nint('12A04', 11)    # convert from base 11\nint('12K04',\
    \ 23)    # convert from base 23\n```\n\n```\n45\n455\n18517\n314759\n```\n\n**The\
    \ pow function** Python has a built-in function called `pow`, which raises numbers\
    \ to powers. It behaves like the `**` operator, except that it takes an optional\
    \ third argument that specifies a modulus. Thus `pow(x,y,n)` returns `(x**y)%n`.\
    \ The reason you might want to use this is that the `pow` way is much quicker\
    \ when very large numbers are involved, which happens a lot in cryptographic applications.\n\
    \n## 22.10 Using the Python shell as a calculator\n\nI often use the Python shell\
    \ as a calculator. This section contains a few tips for working at the shell.\n\
    \n**Importing math functions** One good way to start a session at the shell is\
    \ to import some math functions:\n\n```\nfrom math import *\n```\n\n**Special\
    \ variable** There is a special variable `_` which holds the value of the previous\
    \ calculation. Here is an example:\n\n```\n>>> 23**2\n529\n>>> _+1\n530\n```\n\
    \n**Logarithms** I use the natural logarithm a lot, and it is more natural for\
    \ me to type ln instead of log. If you want to do that, just do the following:\n\
    \n```\nln = log\n```\n\n**Summing a series** Here is a way to get an approximate\
    \ sum of a series, in this case $\\sum_{n=1}^{\\infty} \\frac{1}{n^2}$ :\n\n```\n\
    >>> sum([1/(n**2-1) for n in range(2,1000)])\n0.7489994994995\n```\n\n**Another\
    \ example:** Say you need the sine of each of the angles 0, 15, 30, 45, 60, 75,\
    \ and 90. Here is a quick way to do that:\n\n```\n>>> [round(sin(radians(i)),4)\
    \ for i in range(0,91,15)]\n[0.0, 0.2588, 0.5, 0.7071, 0.866, 0.9659, 1.0]\n```\n\
    \n**Third-party modules** There are a number of other third-party modules that\
    \ you might find useful when working in the Python shell. For instance, there\
    \ is Numpy and Scipy, which we mentioned in Section 22.7. There is also Matplotlib,\
    \ a versatile library for plotting things, and there is Sympy, which does symbolic\
    \ computations.\n\n# Chapter 23\n\n# Working with functions\n\nThis chapter covers\
    \ a number of topics to do with functions, including some topics in functional\
    \ programming.\n\n## 23.1 First-class functions\n\nPython functions are said to\
    \ be first-class functions, which means they can be assigned to variables, copied,\
    \ used as arguments to other functions, etc., just like any other object.\n\n\
    **Copying functions** Here is an example where we make a copy of a function:\n\
    \n```\ndef f(x):\n    return x*x\ng = f\nprint('f(3) =', f(3), 'g(3) =', g(3),\
    \ sep = '\\n')\n```\n\n```\nf(3) = 9\ng(3) = 9\n```\n\n**Lists of functions**\
    \ Next, we have a list of functions:\n\n```\ndef f(x):\n    return x**2\ndef g(x):\n\
    \    return x**3\nfuncs = [f, g]\nprint(funcs[0](5), funcs[1](5), sep='\\n')\n\
    ```\n\n```\n25\n125\n```\n\nHere is another example. Say you have a program with\
    \ ten different functions and the program has to decide at runtime which function\
    \ to use. One solution is to use ten if statements. A shorter solution is to use\
    \ a list of functions. The example below assumes that we have already created\
    \ functions f1, f2, . . . , f10, that each take two arguments.\n\n```\nfuncs =\
    \ [f1, f2, f3, f4, f5, f6, f7, f8, f9, f10]\nnum = eval(input('Enter a number:\
    \ '))\nfuncs[i]((3,5))\n```\n\n**Functions as arguments to functions** Say we\
    \ have a list of 2-tuples. If we sort the list, the sorting is done based off\
    \ of the first entry as below:\n\n```\nL = [(5,4), (3,2), (1,7), (8,1)]\nL.sort()\n\
    ```\n\n```\n[(1, 7), (3, 2), (5, 4), (8, 1)]\n```\n\nSuppose we want the sorting\
    \ to be done based off the second entry. The sort method takes an optional argument\
    \ called key, which is a function that specifies how the sorting should be done.\
    \ Here is how to sort based off the second entry:\n\n```\ndef comp(x):\n    return\
    \ x[1]\nL = [(5,4), (3,2), (1,7), (8,1)]\nL.sort(key=comp)\n```\n\n```\n[(8, 1),\
    \ (3, 2), (5, 4), (1, 7)]\n```\n\nHere is another example, where we sort a list\
    \ of strings by length, rather than alphabetically.\n\n```\nL = ['this', 'is',\
    \ 'a', 'test', 'of', 'sorting']\nL.sort(key=len)\n```\n\n```\n['a', 'is', 'of',\
