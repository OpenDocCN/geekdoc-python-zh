  md: '# 19.2 Tuples


    A tuple is essentially an immutable list. Below is a list with three elements
    and a tuple with three elements:


    ```

    L = [1,2,3]

    t = (1,2,3)

    ```


    Tuples are enclosed in parentheses, though the parentheses are actually optional.
    Indexing and slicing work the same as with lists. As with lists, you can get the
    length of the tuple by using the `len` function, and, like lists, tuples have
    count and index methods. However, since a tuple is immutable, it does not have
    any of the other methods that lists have, like sort or reverse, as those change
    the list.


    We have seen tuples in a few places already. For instance, fonts in Tkinter are
    specified as pairs, like (''Verdana'', 14), and sometimes as triples. The dictionary
    method items returns a list of tuples. Also, when we use the following shortcut
    for exchanging the value of two or more variables, we are actually using tuples:


    ```

    a,b = b,a

    ```


    One reason why there are both lists and tuples is that in some situations, you
    might want an immutable type of list. For instance, lists cannot serve as keys
    in dictionaries because the values of lists can change and it would be a nightmare
    for Python dictionaries to have to keep track of. Tuples, however, can serve as
    keys in dictionaries. Here is an example assigning grades to teams of students:


    ```

    grades = {(''John'', ''Ann''): 95, (''Mike'', ''Tazz''): 87}

    ```


    Also, in situations where speed really matters, tuples are generally faster than
    lists. The flexibility of lists comes with a corresponding cost in speed.


    **tuple** To convert an object into a tuple, use `tuple`. The following example
    converts a list and a string into tuples:


    ```

    t1 = tuple([1,2,3])

    t2 = tuple(''abcde'')

    ```


    **Note** The empty tuple is (). The way to get a tuple with one element is like
    this: (1,). Something like (1) will not work because that just evaluates to 1
    as in an ordinary calculation. For instance, in the expression 2+(3*4), we don''t
    want the (3*4) to be a tuple, we want it to evaluate to a number.


