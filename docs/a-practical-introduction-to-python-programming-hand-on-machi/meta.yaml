- md: "## 16.9 Event examples\n\n| Tkinter name | Common name |\n| :--- | :--- |\n\
    | <Return> | Enter key |\n| <Tab> | Tab key |\n| <Space> | Spacebar |\n| <F1>,\
    \ ..., <F12> | F1, ..., F12 |\n| <Next>, <Prior> | Page up, Page down |\n| <Up>,\
    \ <Down>, <Left>, <Right> | Arrow keys |\n| <Home>, <End> | Home, End |\n| <Insert>,\
    \ <Delete> | Insert, Delete |\n| <Caps_Lock>, <Num_Lock> | Caps lock, Number lock\
    \ |\n| <Control_L>, <Control_R> | Left and right Control keys |\n| <Alt_L>, <Alt_R>\
    \ | Left and right Alt keys |\n| <Shift_L>, <Shift_R> | Left and right Shift keys\
    \ |\n\nMost printable keys can be captured with their names, like below:\n\n```\n\
    root.bind('a', callback)\nroot.bind('A', callback)\nroot.bind('-', callback)\n\
    ```\n\nThe exceptions are the spacebar (<Space>) and the less than sign (<Less>).\
    \ You can also catch key combinations, such as <Shift-F5>, <Control-Next>, <Alt-2>,\
    \ or <Control-Shift-F1>.\n\n**Note** These examples all bind keypresses to root,\
    \ which is our name for the main window. You can also bind keypresses to specific\
    \ widgets. For instance, if you only want the left arrow key to work on a Canvas\
    \ called canvas, you could use the following:\n\n```\ncanvas.bind(<Left>, callback)\n\
    ```\n\nOne trick here, though, is that the canvas won't recognize the keypress\
    \ unless it has the GUI's focus. This can be done as below:\n\n```\ncanvas.focus_set()\n\
    ```\n\n**Example 1** Here is an example where the user can move a rectangle with\
    \ the left or right arrow keys.\n\n```\nfrom tkinter import *\n\ndef callback(event):\n\
    \    global move\n    if event.keysym=='Right':\n        move += 1\n    elif event.keysym=='Left':\n\
    \        move -=1\n    canvas.coords(rect,50+move,50,100+move,100)\n\nroot = Tk()\n\
    root.bind('<Key>', callback)\ncanvas = Canvas(width=200,height=200)\ncanvas.grid(row=0,column=0)\n\
    rect = canvas.create_rectangle(50,50,100,100,fill='blue')\nmove = 0\n\nmainloop()\n\
    ```\n\n**Example 2** Here is an example program demonstrating mouse events. The\
    \ program starts by drawing a rectangle to the screen. The user can do the following:\n\
    \n- Drag the rectangle with the mouse (<B1_Motion>).\n- Resize the rectangle with\
    \ the mouse wheel (<MouseWheel>).\n- Whenever the user left-clicks, the rectangle\
    \ will change colors (<Button-1>).\n- Anytime the mouse is moved, the current\
    \ coordinates of the mouse are displayed in a label (<Motion>).\n\nHere is the\
    \ code for the program:\n\n```\nfrom tkinter import *\n\ndef mouse_motion_event(event):\n\
    \    label.configure(text='{}, {}'.format(event.x, event.y))\n\ndef wheel_event(event):\n\
    \    global x1, x2, y1, y2\n    if event.delta>0:\n        diff = 1\n    elif\
    \ event.delta<0:\n        diff = -1\n    x1+=diff\n    x2-=diff\n    y1+=diff\n\
    \    y2-=diff\n    canvas.coords(rect,x1,y1,x2,y2)\n\ndef b1_event(event):\n \
    \   global color\n    if not b1_drag:\n        color = 'Red' if color=='Blue'\
    \ else 'Blue'\n        canvas.itemconfigure(rect, fill=color)\n\ndef b1_motion_event(event):\n\
    \    global b1_drag, x1, x2, y1, y2, mouse_x, mouse_y\n    x = event.x\n    y\
    \ = event.y\n    if not b1_drag:\n        mouse_x = x\n        mouse_y = y\n \
    \       b1_drag = True\n        return\n    x1+=(x-mouse_x)\n    x2+=(x-mouse_x)\n\
    \    y1+=(y-mouse_y)\n    y2+=(y-mouse_y)\n    canvas.coords(rect,x1,y1,x2,y2)\n\
    \    mouse_x = x\n    mouse_y = y\n\ndef b1_release_event(event):\n    global\
    \ b1_drag\n    b1_drag = False\n\nroot=Tk()\n\nlabel = Label()\n\ncanvas = Canvas(width=200,\
    \ height=200)\ncanvas.bind('<Motion>', mouse_motion_event)\ncanvas.bind('<ButtonPress-1>',\
    \ b1_event)\ncanvas.bind('<B1-Motion>', b1_motion_event)\ncanvas.bind('<ButtonRelease-1>',\
    \ b1_release_event)\ncanvas.bind('<MouseWheel>', wheel_event)\ncanvas.focus_set()\n\
    \ncanvas.grid(row=0, column=0)\nlabel.grid(row=1, column=0)\n\nmouse_x = 0\nmouse_y\
    \ = 0\nb1_drag = False\n\nx1 = y1 = 50\nx2 = y2 = 100\ncolor = 'blue'\nrect =\
    \ canvas.create_rectangle(x1,y1,x2,y2,fill=color)\n\nmainloop()\n```\n\nHere are\
    \ a few notes about how the program works:\n\n1. First, every time the mouse is\
    \ moved over the canvas, the mouse_motion_event function is called. This function\
    \ prints the mouse's current coordinates which are contained in the Event attributes\
    \ x and y.\n2. The wheel_event function is called whenever the user uses the mouse\
    \ (scrolling) wheel. The Event attribute delta contains information about how\
    \ quickly and in what direction the wheel was moved. We just stretch or shrink\
    \ the rectangle based on whether the wheel was moved forward or backward.\n3.\
    \ The b1_event function is called whenever the user presses the left mouse button.\
    \ The function changes the color of the rectangle whenever the rectangle is clicked.\
    \ There is a global variable here called b1_drag that is important. It is set\
    \ to True whenever the user is dragging the rectangle. When dragging is going\
    \ on, the left mouse button is down and the b1_event function is continuously\
    \ being called. We don't want to keep changing the color of the rectangle in that\
    \ case, hence the if statement.\n4. The dragging is accomplished mostly in the\
    \ b1_motion_event function, which is called whenever the left mouse button is\
    \ down and the mouse is being moved. It uses global variables that keep track\
    \ of what the mouse's position was the last time the function was called, and\
    \ then moves the rectangle according to the difference between the new and old\
    \ position. When the dragging is done, the left mouse button will be released.\
    \ When that happens, the b1_release_event function is called, and we set the global\
    \ b1_drag variable accordingly.\n5. The focus_set method is needed because the\
    \ canvas will not recognize the mouse wheel events unless the focus is on the\
    \ canvas.\n6. One problem with this program is that the user can modify the rectangle\
    \ by clicking anywhere on the canvas, not just on rectangle itself. If we only\
    \ want the changes to happen when the mouse is over the rectangle, we could specifically\
    \ bind the rectangle instead of the whole canvas, like below:\n\n```\ncanvas.tag_bind(rect,\
    \ '<B1-Motion>', b1_motion_event)\n```\n\n7. Finally, the use of global variables\
    \ here is a little messy. If this were part of a larger project, it might make\
    \ sense to wrap all of this up into a class.\n\n# Chapter 17\n\n## GUI Programming\
    \ III\n\nThis chapter contains a few more GUI odds and ends.\n\n## 17.1 Title\
    \ bar\n\nThe GUI window that Tkinter creates says Tk by default. Here is how to\
    \ change it:\n\n```\nroot.title('Your title')\n```\n\n## 17.2 Disabling things\n\
    \nSometimes you want to disable a button so it can't be clicked. Buttons have\
    \ an attribute state that allows you to disable the widget. Use state=DISABLED\
    \ to disable the button and state=NORMAL to enable it. Here is an example that\
    \ creates a button that starts out disabled and then enables it:\n\n```\nbutton\
    \ = Button(text='Hi', state=DISABLED, command=function)\nbutton.configure(state=NORMAL)\n\
    ```\n\nYou can use the state attribute to disable many other types of widgets,\
    \ too.\n\n## 17.3 Getting the state of a widget\n\nSometimes, you need to know\
    \ things about a widget, like exactly what text is in it or what its background\
    \ color is. The cget method is used for this. For example, the following gets\
    \ the text of a label called label:\n\n```\nlabel.cget('text')\n```\n\nThis can\
    \ be used with buttons, canvases, etc., and it can be used with any of their properties,\
    \ like bg, fg, state, etc. As a shortcut, Tkinter overrides the [] operators,\
    \ so that label['text'] accomplishes the same thing as the example above.\n\n\
    ## 17.4 Message boxes\n\nMessage boxes are windows that pop up to ask you a question\
    \ or say something and then go away. To use them, we need an import statement:\n\
    \n```\nfrom tkinter.messagebox import *\n```\n\nThere are a variety of different\
    \ types of message boxes. For each of them you can specify the message the user\
    \ will see as well as the title of the message box. Here are three types of message\
    \ boxes, followed by the code that generates them:\n\n```\nshowinfo(title='Message\
    \ for you', message='Hi There!')\naskquestion(title='Quit?', message='Do you really\
    \ want to quit?')\nshowwarning(title='Warning', message='Unsupported format')\n\
    ```\n\nBelow is a list of all the types of message boxes. Each displays a message\
    \ in its own way.\n\n| Message Box | Special properties |\n|---|---|\n| showinfo\
    \ | OK button |\n| askokcancel | OK and Cancel buttons |\n| askquestion | Yes\
    \ and No buttons |\n| askretrycancel | Retry and a Cancel buttons |\n| askyesnocancel\
    \ | Yes, No, and Cancel buttons |\n| showerror | An error icon and an OK button\
    \ |\n| showwarning | A warning icon and an OK button |\n\nEach of these functions\
    \ returns a value indicating what the user clicked. See the next section for a\
    \ simple example of using the return value. Here is a table of the return values:"
