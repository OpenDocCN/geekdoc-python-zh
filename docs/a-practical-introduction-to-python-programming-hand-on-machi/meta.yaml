    \ b c)$. We need our function to return both the $x$ and $y$ solutions.\n\n```\n\
    def solve(a,b,c,d,e,f):\n    x = (d*e-b*f)/(a*d-b*c)\n    y = (a*f-c*e)/(a*d-b*c)\n\
    \    return [x,y]\n```\n\n```\nxsol, ysol = solve(2,3,4,1,2,5)\nprint('The solution\
    \ is x = ', xsol, 'and y = ', ysol)\n```\n\nThe solution is x = 1.3 and y = -0.2\n\
    \nThis method uses the shortcut for assigning to lists that was mentioned in Section\
    \ 10.3.\n\n**Example 4** A `return` statement by itself can be used to end a function\
    \ early.\n\n```\ndef multiple_print(string, n, bad_words):\n    if string in bad_words:\n\
    \        return\n    print(string * n)\n    print()\n```\n\nThe same effect can\
    \ be achieved with an if/else statement, but in some cases, using `return` can\
    \ make your code simpler and more readable.\n\n## 13.4 Default arguments and keyword\
    \ arguments\n\nYou can specify a default value for an argument. This makes it\
    \ optional, and if the caller decides not to use it, then it takes the default\
    \ value. Here is an example:\n\n```\ndef multiple_print(string, n=1):\n    print(string\
    \ * n)\n    print()\n\nmultiple_print('Hello', 5)\nmultiple_print('Hello')\n```\n\
    \nHelloHelloHelloHelloHello\nHello\n\nDefault arguments need to come at the end\
    \ of the function definition, after all of the non-default arguments.\n\n**Keyword\
    \ arguments** A related concept to default arguments is keyword arguments. Say\
    \ we have the following function definition:\n\n```\ndef fancy_print(text, color,\
    \ background, style, justify):\n```\n\nEvery time you call this function, you\
    \ have to remember the correct order of the arguments. Fortunately, Python allows\
    \ you to name the arguments when calling the function, as shown below:\n\n```\n\
    fancy_print(text='Hi', color='yellow', background='black', style='bold', justify='left')\n\
    ```\n\n```\nfancy_print(text='Hi', style='bold', justify='left', background='black',\n\
    \           color='yellow')\n```\n\nAs we can see, the order of the arguments\
    \ does not matter when you use keyword arguments.\n\nWhen defining the function,\
    \ it would be a good idea to give defaults. For instance, most of the time, the\
    \ caller would want left justification, a white background, etc. Using these values\
    \ as defaults means the caller does not have to specify every single argument\
    \ every time they call the function. Here is an example:\n\n```\ndef fancy_print(text,\
    \ color='black', background='white',\n                style='normal', justify='left'):\n\
    \    # function code goes here\n\nfancy_print('Hi', style='bold')\nfancy_print('Hi',\
    \ color='yellow', background='black')\nfancy_print('Hi')\n```\n\n**Note** We have\
    \ actually seen default and keyword arguments before—the sep, end and file arguments\
