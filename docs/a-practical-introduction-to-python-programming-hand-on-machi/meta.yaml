    \n# 17.12 More with GUIs\n\nWe have left out quite a lot about Tkinter. See Lundh's\
    \ Introduction to Tkinter [2] for more. Tkinter is versatile and simple to work\
    \ with, but if you need something more powerful, there are other third-party GUIs\
    \ for Python."
- md: "## Chapter 18\n\n## Further Graphical Programming\n\n### 18.1 Python 2 vs Python\
    \ 3\n\nAs of this writing, the most recent version of Python is 3.2, and all the\
    \ code in this book is designed to run in Python 3.2. The tricky thing is that\
    \ as of version 3.0, Python broke compatibility with older versions of Python.\
    \ Code written in those older versions will not always work in Python 3. The problem\
    \ with this is there were a number of useful libraries written for Python 2 that,\
    \ as of this writing, have not yet been ported to Python 3. We want to use these\
    \ libraries, so we will have to learn a little about Python 2. Fortunately, there\
    \ are only a few big differences that we have to worry about.\n\n**Division**\
    \ The division operator, `/`, in Python 2, when used with integers, behaves like\
    \ `//`. For instance, `5/4` in Python 2 evaluates to 1, whereas `5/4` in Python\
    \ 3 evaluates to 1.2. This is the way the division operator behaves in a number\
    \ of other programming languages. In Python 3, the decision was made to make the\
    \ division operator behave the way we are used from math.\n\nIn Python 2, if you\
    \ want to get 1.25 by dividing 5 and 4, you need to do `5/4.0`. At least one of\
    \ the arguments has to be a float in order for the result to be a float. If you\
    \ are dividing two variables, then instead of `x/y`, you may need to do `x/float(y)`.\n\
    \n**print** The **print** function in Python 3 was actually the **print** statement\
    \ in Python 2. So in Python 2, you would write\n\n```\nprint 'Hello'\n```\n\n\
    without any parentheses. This code will no longer work in Python 3 because the\
    \ **print** statement is now the **print** function, and functions need parentheses.\
    \ Also, the current **print** function has those useful optional arguments, `sep`\
    \ and `end`, that are not available in Python 2.\n\n**input** The Python 2 equivalent\
    \ of the **input** function is **raw_input**.\n\n**range** The **range** function\
    \ can be inefficient with very large ranges in Python 2. The reason is that in\
    \ Python 2, if you use **range(10000000)**, Python will create a list of 10 million\
    \ numbers. The **range** statement in Python 3 is more efficient and instead of\
    \ generating all 10 million things at once, it only generates the numbers as it\
    \ needs them. The Python 2 function that acts like the Python 3 **range** is **xrange**.\n\
    \n**String formatting** String formatting in Python 2 is a little different than\
    \ in Python 3. When using the formatting codes inside curly braces, in Python\
    \ 2, you need to specify an argument number. Compare the examples below:\n\n```\n\
    Python 2: 'x={0:3d},y={1:3d},z={2:3d}'.format(x,y,z)\nPython 3: 'x={:3d},y={:3d},z={:3d}'.format(x,y,z)\n\
    ```\n\nAs of Python 3.1, specifying the argument numbers was made optional.\n\
    There is also an older style of formatting that you may see from time to time\
    \ that uses the % operator. An example is shown below along with the corresponding\
    \ new style.\n\n```\nPython 2: 'x=%3d, y=%6.2f,z=%3s' % (x,y,z)\nPython 3: 'x={:3d},y={:6.2f},z={:3s}'.format(x,y,z)\n\
    ```\n\n**Module names** Some modules were renamed and reorganized. Here are a\
    \ few Tkinter name changes:\n\n| Python 2 | Python 3 |\n|---|---|\n| Tkinter |\
    \ tkinter |\n| ScrolledText | tkinter.scrolledtext |\n| tkMessageBox | tkinter.messagebox\
    \ |\n| tkFileDialog | tkinter.filedialog |\n\nThere are a number of other modules\
    \ we'll see later that were renamed, mostly just changed to lowercase. For instance,\
    \ Queue in Python 2 is now queue in Python 3.\n\n**Dictionary comprehensions**\
    \ Dictionary comprehensions are not present in Python 2.\n\n**Other changes**\
    \ There are quite a few other changes in the language, but most of them are with\
    \ features more advanced than we consider here.\n\n**Importing future behavior**\
    \ The following import allows us to use Python 3's division behavior in Python\
    \ 2.\n\n```\nfrom __future__ import division\n```\n\nThere are many other things\
    \ you can import from the future.\n\n### 18.2 The Python Imaging Library\n\nThe\
    \ Python Imaging Library (PIL) contains useful tools for working with images.\
    \ As of this writing, the PIL is only available for Python 2.7 or earlier. The\
    \ PIL is not part of the standard Python distribution, so you'll have to download\
    \ and install it separately. It's easy to install, though.\n\nPIL hasn't been\
    \ maintained since 2009, but there is a project called Pillow that it nearly compatible\
    \ with PIL and works in Python 3.0 and later.\n\nWe will cover just a few features\
    \ of the PIL here. A good reference is [The Python Imaging Library Handbook](https://pillow.readthedocs.io/).\n\
    \n**Using images other than GIFs with Tkinter** Tkinter, as we've seen, can't\
    \ use JPEGs and PNGs. But it can if we use it in conjunction with the PIL. Here\
    \ is a simple example:\n\n```\nfrom Tkinter import *\nfrom PIL import Image, ImageTk\n\
    \nroot = Tk()\ncheetah_image = ImageTk.PhotoImage(Image.open('cheetah.jpg'))\n\
    \nbutton = Button(image=cheetah_image)\nbutton.grid(row=0, column=0)\n\nmainloop()\n\
    ```\n\nThe first line imports Tkinter. Remember that in Python 2 it's an uppercase\
    \ Tkinter. The next line imports a few things from the PIL. Next, where we would\
    \ have used Tkinter's PhotoImage to load an image, we instead use a combination\
    \ of two PIL functions. We can then use the image like normal in our widgets.\n\
    \n**Images** PIL is the Python Imaging Library, and so it contains a lot of facilities\
    \ for working with images. We will just show a simple example here. The program\
    \ below displays a photo on a canvas and when the user clicks a button, the image\
    \ is converted to grayscale.\n\n```\nfrom Tkinter import *\nfrom PIL import Image,\
    \ ImageTk\n\ndef change():\n    global image, photo\n    pix = image.load()\n\
    \    for i in range(photo.width()):\n        for j in range(photo.height()):\n\
    \            red,green,blue = pix[i,j]\n            avg = (red+green+blue)//3\n\
    \            pix[i,j] = (avg, avg, avg)\n    photo=ImageTk.PhotoImage(image)\n\
    \    canvas.create_image(0,0,image=photo,anchor=NW)\n\ndef load_file(filename):\n\
    \    global image, photo\n    image=Image.open(filename).convert('RGB')\n    photo=ImageTk.PhotoImage(image)\n\
    \    canvas.configure(width=photo.width(), height=photo.height())\n    canvas.create_image(0,0,image=photo,anchor=NW)\n\
    \    root.title(filename)\n\nroot = Tk()\nbutton = Button(text='Change', font=('Verdana',\
    \ 18), command=change)\ncanvas = Canvas()\ncanvas.grid(row=0)\nbutton.grid(row=1)\n\
    load_file('pic.jpg')\n\nmainloop()\n```\n\nLet's first look at the load_file function.\
    \ Many of the image utilities are in the Image module. We give a name, image,\
    \ to the object created by the Image.open statement. We also use the convert method\
    \ to convert the image into RGB (Red-Green-Blue) format. We will see why in a\
    \ minute. The next line creates an ImageTk object called photo that gets drawn\
    \ to the Tkinter canvas. The photo object has methods that allow us to get its\
    \ width and height so we can size the canvas appropriately.\n\nNow look at the\
    \ change function. The image object has a method called load that gives access\
    \ to the individual pixels that make up the image. This returns a two-dimensional\
    \ array of RGB values. For instance, if the pixel in the upper left corner of\
    \ the image is pure white, then pix[0,0] will be (255,255,255). If the next pixel\
    \ to the right is pure black, pix[1,0] will be (0,0,0). To convert the image to\
    \ grayscale, for each pixel we take the average of its red, green, and blue components,\
    \ and reset the red, green, and blue components to all equal that average. Remember\
    \ that if the red, green, and blue are all the same, then the color is a shade\
    \ of gray. After modifying all the pixels, we create a new ImageTk object from\
    \ the modified pixel data and display it on the canvas.\n\nYou can have a lot\
    \ of fun with this. Try modifying the change function. For instance, if we use\
    \ the following line in the change function, we get an effect that looks like\
    \ a photo negative:\n\n```\npix[i,j] = (255-red, 255-green, 255-blue)\n```\n\n\
    Try seeing what interesting effects you can come up with.\n\nNote, though, that\
    \ this way of manipulating images is the slow, manual way. PIL has a number of\
    \ much faster functions for modifying images. You can very easily change the brightness,\
    \ hue, and contrast of images, resize them, rotate them, and much more. See the\
    \ PIL reference materials for more on this."
  mdcn: "## 第18章\n\n## 进阶图形编程\n\n### 18.1 Python 2 与 Python 3\n\n截至本文撰写时，Python的最新版本是3.2，本书中的所有代码都设计为在Python\
    \ 3.2中运行。棘手的是，从3.0版本开始，Python与旧版本不再兼容。在旧版本中编写的代码在Python 3中并不总是能运行。问题在于，当时有许多为Python\
    \ 2编写的有用库，截至本文撰写时尚未移植到Python 3。我们希望使用这些库，因此需要对Python 2有所了解。幸运的是，我们只需要关注几个主要区别。\n\
    \n**除法** 在Python 2中，除法运算符`/`在用于整数时，其行为类似于`//`。例如，`5/4`在Python 2中计算结果为1，而在Python\
    \ 3中计算结果为1.2。这是许多其他编程语言中除法运算符的行为方式。在Python 3中，决定让除法运算符的行为符合我们习惯的数学规则。\n\n在Python\
    \ 2中，如果你想通过5除以4得到1.25，你需要写成`5/4.0`。至少有一个参数必须是浮点数，结果才会是浮点数。如果你要除以两个变量，那么可能需要写成`x/float(y)`而不是`x/y`。\n\
    \n**print** Python 3中的**print**函数在Python 2中实际上是**print**语句。因此在Python 2中，你会这样写：\n\
    \n```\nprint 'Hello'\n```\n\n不需要任何括号。这段代码在Python 3中将无法工作，因为**print**语句现在变成了**print**函数，而函数需要括号。此外，当前的**print**函数具有那些有用的可选参数`sep`和`end`，这些在Python\
    \ 2中不可用。\n\n**input** Python 2中与**input**函数等价的是**raw_input**。\n\n**range** 在Python\
    \ 2中，**range**函数在处理非常大的范围时可能效率低下。原因是，在Python 2中，如果你使用**range(10000000)**，Python会创建一个包含1000万个数字的列表。Python\
    \ 3中的**range**语句更高效，它不会一次性生成所有1000万个元素，而是在需要时才生成数字。Python 2中行为类似于Python 3 **range**的函数是**xrange**。\n\
    \n**字符串格式化** Python 2中的字符串格式化与Python 3略有不同。当在花括号内使用格式化代码时，在Python 2中，你需要指定参数编号。比较以下示例：\n\
    \n```\nPython 2: 'x={0:3d},y={1:3d},z={2:3d}'.format(x,y,z)\nPython 3: 'x={:3d},y={:3d},z={:3d}'.format(x,y,z)\n\
    ```\n\n从Python 3.1开始，指定参数编号变为可选。\n还有一种较旧的格式化风格，你可能会不时看到，它使用%运算符。下面是一个示例以及相应的新风格：\n\
    \n```\nPython 2: 'x=%3d, y=%6.2f,z=%3s' % (x,y,z)\nPython 3: 'x={:3d},y={:6.2f},z={:3s}'.format(x,y,z)\n\
    ```\n\n**模块名称** 一些模块被重命名和重组。以下是几个Tkinter名称的更改：\n\n| Python 2 | Python 3 |\n|---|---|\n\
    | Tkinter | tkinter |\n| ScrolledText | tkinter.scrolledtext |\n| tkMessageBox\
    \ | tkinter.messagebox |\n| tkFileDialog | tkinter.filedialog |\n\n我们稍后会看到许多其他模块被重命名，大多数只是改为小写。例如，Python\
    \ 2中的Queue在Python 3中现在是queue。\n\n**字典推导式** Python 2中没有字典推导式。\n\n**其他更改** 语言中还有许多其他更改，但其中大多数涉及比我们这里讨论的更高级的功能。\n\
    \n**导入未来行为** 以下导入允许我们在Python 2中使用Python 3的除法行为。\n\n```\nfrom __future__ import\
    \ division\n```\n\n你还可以从未来导入许多其他东西。\n\n### 18.2 Python Imaging Library\n\nPython\
    \ Imaging Library (PIL) 包含用于处理图像的有用工具。截至本文撰写时，PIL仅适用于Python 2.7或更早版本。PIL不是标准Python发行版的一部分，因此你需要单独下载并安装它。不过安装很容易。\n\
    \nPIL自2009年以来就没有维护过，但有一个名为Pillow的项目，它与PIL几乎兼容，并且可以在Python 3.0及更高版本中工作。\n\n我们这里只介绍PIL的一些功能。一个好的参考是[Python\
    \ Imaging Library手册](https://pillow.readthedocs.io/)。\n\n**在Tkinter中使用GIF以外的图像**\
    \ 正如我们所看到的，Tkinter不能使用JPEG和PNG。但如果我们结合PIL使用，它就可以。这里有一个简单的例子：\n\n```\nfrom Tkinter\
    \ import *\nfrom PIL import Image, ImageTk\n\nroot = Tk()\ncheetah_image = ImageTk.PhotoImage(Image.open('cheetah.jpg'))\n\
    \nbutton = Button(image=cheetah_image)\nbutton.grid(row=0, column=0)\n\nmainloop()\n\
    ```\n\n第一行导入Tkinter。记住在Python 2中它是大写的Tkinter。下一行从PIL导入一些东西。接下来，在我们本应使用Tkinter的PhotoImage加载图像的地方，我们改用两个PIL函数的组合。然后我们就可以像往常一样在我们的小部件中使用该图像了。\n\
    \n**图像** PIL是Python Imaging Library，因此它包含许多用于处理图像的工具。我们这里只展示一个简单的例子。下面的程序在画布上显示一张照片，当用户点击按钮时，图像被转换为灰度。\n\
    \n```\nfrom Tkinter import *\nfrom PIL import Image, ImageTk\n\ndef change():\n\
    \    global image, photo\n    pix = image.load()\n    for i in range(photo.width()):\n\
    \        for j in range(photo.height()):\n            red,green,blue = pix[i,j]\n\
    \            avg = (red+green+blue)//3\n            pix[i,j] = (avg, avg, avg)\n\
    \    photo=ImageTk.PhotoImage(image)\n    canvas.create_image(0,0,image=photo,anchor=NW)\n\
    \ndef load_file(filename):\n    global image, photo\n    image=Image.open(filename).convert('RGB')\n\
    \    photo=ImageTk.PhotoImage(image)\n    canvas.configure(width=photo.width(),\
    \ height=photo.height())\n    canvas.create_image(0,0,image=photo,anchor=NW)\n\
    \    root.title(filename)\n\nroot = Tk()\nbutton = Button(text='Change', font=('Verdana',\
    \ 18), command=change)\ncanvas = Canvas()\ncanvas.grid(row=0)\nbutton.grid(row=1)\n\
    load_file('pic.jpg')\n\nmainloop()\n```\n\n我们先看看load_file函数。许多图像工具都在Image模块中。我们将Image.open语句创建的对象命名为image。我们还使用convert方法将图像转换为RGB（红-绿-蓝）格式。我们稍后会看到为什么。下一行创建了一个名为photo的ImageTk对象，它将被绘制到Tkinter画布上。photo对象有方法可以让我们获取其宽度和高度，以便我们可以适当地调整画布大小。\n\
    \n现在看看change函数。image对象有一个名为load的方法，可以访问构成图像的各个像素。这返回一个二维的RGB值数组。例如，如果图像左上角的像素是纯白色，那么pix[0,0]将是(255,255,255)。如果右边下一个像素是纯黑色，pix[1,0]将是(0,0,0)。要将图像转换为灰度，对于每个像素，我们取其红色、绿色和蓝色分量的平均值，然后将红色、绿色和蓝色分量重置为都等于该平均值。记住，如果红色、绿色和蓝色都相同，那么颜色就是灰色的阴影。修改完所有像素后，我们从修改后的像素数据创建一个新的ImageTk对象，并将其显示在画布上。\n\
    \n你可以从中获得很多乐趣。尝试修改change函数。例如，如果我们在change函数中使用以下行，我们会得到一个看起来像照片底片的效果：\n\n```\n\
    pix[i,j] = (255-red, 255-green, 255-blue)\n```\n\n尝试看看你能想出什么有趣的效果。\n\n但请注意，这种操作图像的方式是缓慢、手动的方式。PIL有许多更快的函数用于修改图像。你可以非常轻松地更改图像的亮度、色调和对比度，调整大小，旋转等等。有关更多信息，请参阅PIL参考资料。"
