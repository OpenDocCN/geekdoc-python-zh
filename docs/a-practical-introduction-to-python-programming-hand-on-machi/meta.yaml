    \ code everywhere you needed it, you would have to change all of them.\n\n## 13.2\
    \ Arguments\n\nWe can pass values to functions. Here is an example:\n\n```\ndef\
    \ print_hello(n):\n    print('Hello ' * n)\n    print()\n\nprint_hello(3)\nprint_hello(5)\n\
    times = 2\nprint_hello(times)\n```\n\n```\nHello Hello Hello\nHello Hello Hello\
    \ Hello Hello\nHello Hello\n```\n\nWhen we call the print_hello function with\
    \ the value 3, that value gets stored in the variable n. We can then refer to\
