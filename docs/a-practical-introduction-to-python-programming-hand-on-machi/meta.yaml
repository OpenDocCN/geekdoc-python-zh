    \ column=0)\n\nstart = time()\nupdate_timer()\n\nmainloop()\n```\n\n此示例使用了 `time`\
    \ 模块，该模块在第 20.2 节中介绍。\n\n## 17.7 对话框\n\n许多程序都有对话框，允许用户选择要打开的文件或保存文件。要在 Tkinter\
    \ 中使用它们，我们需要以下导入语句：\n\n```\nfrom tkinter.filedialog import *\n```\n\nTkinter 对话框通常看起来像操作系统原生的对话框。\n\
    \n### 17.7.1 对话框\n\n![](img/b783d4b75e24755b056ee79a66b412de_182_0.png)\n\n以下是最有用的对话框：\n\
    \n| 对话框 | 描述 |\n| :--- | :--- |\n| askopenfilename | 打开一个典型的文件选择对话框 |\n| askopenfilenames\
    \ | 与前一个类似，但用户可以选择多个文件 |\n| asksaveasfilename | 打开一个典型的文件保存对话框 |\n| askdirectory\
    \ | 打开一个目录选择对话框 |\n\n`askopenfilename` 和 `asksaveasfilename` 的返回值是所选文件的名称。如果用户没有选择任何值，则没有返回值。`askopenfilenames`\
    \ 的返回值是一个文件列表，如果没有选择文件，则为空列表。`askdirectory` 函数返回所选目录的名称。\n\n你可以向这些函数传递一些选项。你可以将\
    \ `initialdir` 设置为对话框开始时所在的目录。你还可以指定文件类型。以下是一个示例：\n\n```\nfilename=askopenfilename(initialdir='c:\\\
    python31\\',\n    filetypes=[('Image files', '.jpg .png .gif'),\n            \
    \   ('All files', '*')])\n```\n\n**一个简短的示例** 以下是一个示例，它打开一个文件对话框，允许你选择一个文本文件。然后，程序在文本框中显示文件的内容。\n\
    \n```\nfrom tkinter import *\nfrom tkinter.filedialog import *\nfrom tkinter.scrolledtext\
    \ import ScrolledText\n\nroot = Tk()\ntextbox = ScrolledText()\ntextbox.grid()\n\
    \nfilename=askopenfilename(initialdir='c:\\python31\\', filetypes=[('Text files',\
    \ '.txt'),\n('All files', '*')])\n\ns = open(filename).read()\ntextbox.insert(1.0,\
    \ s)\n\nmainloop()\n```\n\n## 17.8 菜单栏\n\n我们可以创建一个菜单栏，如下所示，位于窗口顶部。\n\n![](img/b783d4b75e24755b056ee79a66b412de_183_0.png)\n\
    \n以下是一个使用上一节中部分对话框的示例：\n\n```\nfrom tkinter import *\nfrom tkinter.filedialog\
    \ import *\n\ndef open_callback():\n    filename = askopenfilename()\n    # 在此处添加代码以对\
    \ filename 执行某些操作\n\ndef saveas_callback():\n    filename = asksaveasfilename()\n\
    \    # 在此处添加代码以对 filename 执行某些操作\n\nroot = Tk()\nmenu = Menu()\nroot.config(menu=menu)\n\
    file_menu = Menu(menu, tearoff=0)\nfile_menu.add_command(label='Open', command=open_callback)\n\
    file_menu.add_command(label='Save as', command=saveas_callback)\nfile_menu.add_separator()\n\
    file_menu.add_command(label='Exit', command=root.destroy)\nmenu.add_cascade(label='File',\
    \ menu=file_menu)\n\nmainloop()\n```\n\n## 17.9 新窗口\n\n创建一个新窗口很容易。使用 `Toplevel`\
    \ 函数：\n\n```\nwindow = Toplevel()\n```\n\n你可以向新窗口添加组件。创建组件时，第一个参数需要是窗口的名称，如下所示：\n\
    \n```\nnew_window = Toplevel()\nlabel = Label(new_window, text='Hi')\nlabel.grid(row=0,\
    \ column=0)\n```\n\n## 17.10 pack\n\n`grid` 的一个替代方案是 `pack`。它不如 `grid` 通用，但在某些地方很有用。它使用一个名为\
    \ `side` 的参数，允许你为组件指定四个位置：`TOP`、`BOTTOM`、`LEFT` 和 `RIGHT`。有两个有用的可选参数：`fill` 和\
    \ `expand`。以下是一个示例。\n\n```\nbutton1=Button(text='Hi')\nbutton1.pack(side=TOP,\
    \ fill=X)\nbutton2=Button(text='Hi')\nbutton2.pack(side=BOTTOM)\n```\n\n![](img/b783d4b75e24755b056ee79a66b412de_184_0.png)\n\
    \n`fill` 选项使组件填充分配给它的可用空间。它可以是 `X`、`Y` 或 `BOTH`。`expand` 选项用于允许组件在窗口调整大小时扩展。要启用它，请使用\
    \ `expand=YES`。\n\n> **注意** 你可以在某些框架中使用 `pack`，在其他框架中使用 `grid`；只是不要在同一个框架中混合使用\
    \ `pack` 和 `grid`，否则 Tkinter 将不知道该如何处理。\n\n## 17.11 StringVar\n\n在第 16.5 节中，我们看到了如何将一个名为\
    \ `IntVar` 的 Tkinter 变量绑定到复选按钮或单选按钮。Tkinter 还有另一种类型的变量，称为 `StringVar`，用于保存字符串。这种类型的变量可用于更改标签、按钮或其他一些组件中的文本。我们已经知道如何使用\
    \ `configure` 方法更改文本，而 `StringVar` 提供了另一种方法。\n\n要将组件绑定到 `StringVar`，请使用组件的 `textvariable`\
    \ 选项。`StringVar` 具有 `get` 和 `set` 方法，就像 `IntVar` 一样，每当你设置该变量时，所有绑定到它的组件都会自动更新。\n\
    \n以下是一个简单的示例，将两个标签绑定到同一个 `StringVar`。还有一个按钮，点击时会交替更改 `StringVar` 的值（从而更改标签中的文本）。\n\
    \n```\nfrom tkinter import *\n\ndef callback():\n    global count\n    s.set('Goodbye'\
    \ if count%2==0 else 'Hello')\n    count +=1\n\nroot = Tk()\n\ncount = 0\ns =\
    \ StringVar()\ns.set('Hello')\n\nlabel1 = Label(textvariable = s, width=10)\n\
    label2 = Label(textvariable = s, width=10)\nbutton = Button(text = 'Click me',\
    \ command = callback)\n\nlabel1.grid(row=0, column=0)\nlabel2.grid(row=0, column=1)\n\
    button.grid(row=1, column=0)\n\nmainloop()\n```\n\n## 17.12 更多 GUI 内容\n\n我们省略了很多关于\
