- md: "## 9.4 The else statement\n\nExample 1 Here is a program that allows the user\
    \ to enter up to 10 numbers. The user can stop early by entering a negative number.\n\
    \n```\nfor i in range(10):\n    num = eval(input('Enter number: '))\n    if num<0:\n\
    \        break\n```\n\nThis could also be accomplished with a while loop.\n\n\
    ```\ni=0\nnum=1\nwhile i<10 and num>0:\n    num = eval(input('Enter a number:\
    \ '))\n```\n\nEither method is ok. In many cases the break statement can help\
    \ make your code easier to understand and less clumsy.\n\nExample 2 Earlier in\
    \ the chapter, we used a while loop to allow the user to repeatedly enter temperatures\
    \ to be converted. Here is, more or less, the original version on the left compared\
    \ with a different approach using the break statement.\n\n```\ntemp = 0\nwhile\
    \ temp!=-1000:\n    temp = eval(input(': '))\n    if temp!=-1000:\n        print(9/5*temp+32)\n\
    \    else:\n        print('Bye!')\n\nwhile True:\n    temp = eval(input(': '))\n\
    \    if temp==-1000:\n        print('Bye')\n        break\n    print(9/5*temp+32)\n\
    ```\n\nThere is an optional else that you can use with break statements. The code\
    \ indented under the else gets executed only if the loop completes without a break\
    \ happening.\n\nExample 1 This is a simple example based off of Example 1 of the\
    \ previous section.\n\n```\nfor i in range(10):\n    num = eval(input('Enter number:\
    \ '))\n    if num<0:\n        print('Stopped early')\n        break\nelse:\n \
    \   print('User entered all ten values')\n```\n\nThe program allows the user to\
    \ enter up to 10 numbers. If they enter a negative, then the program prints Stopped\
    \ early and asks for no more numbers. If the user enters no negatives, then the\
    \ program prints User entered all ten values.\n\n**Example 2** Here are two ways\
    \ to check if an integer num is prime. A prime number is a number whose only divisors\
    \ are 1 and itself. The approach on the left uses a while loop, while the approach\
    \ on the right uses a for/break loop:\n\n```\ni=2\nwhile i<num and num%i!=0:\n\
    \    i=i+1\nif i==num:\n    print('Prime')\nelse:\n    print('Not prime')\n\n\
    for i in range(2, num):\n    if num%i==0:\n        print('Not prime')\n      \
    \  break\nelse:\n    print('Prime')\n```\n\nThe idea behind both approaches is\
    \ to scan through all the integers between 2 and num-1, and if any of them is\
    \ a divisor, then we know num is not prime. To see if a value i is a divisor of\
    \ num, we just have to check to see if num%i is 0.\n\nThe idea of the while loop\
    \ version is we continue looping as long as we haven't found a divisor. If we\
    \ get all the way through the loop without finding a divisor, then i will equal\
    \ num, and in that case the number must be prime.\n\nThe idea of the for/break\
    \ version is we loop through all the potential divisors, and as soon as we find\
    \ one, we know the number is not prime and we print Not prime and stop looping.\
    \ If we get all the way through the loop without breaking, then we have not found\
    \ a divisor. In that case the **else** block will execute and print that the number\
    \ is prime.\n\n## 9.5 The guessing game, more nicely done\n\nIt is worth going\
    \ through step-by-step how to develop a program. We will modify the guessing game\
    \ program from Section 9.1 to do the following:\n\n- The player only gets five\
    \ turns.\n- The program tells the player after each guess if the number is higher\
    \ or lower.\n- The program prints appropriate messages for when the player wins\
    \ and loses.\n\nBelow is what we want the program to look like:\n\n```\nEnter\
    \ your guess (1-100): 50\nLOWER. 4 guesses left.\n\nEnter your guess (1-100):\
    \ 25\nLOWER. 3 guesses left.\n\nEnter your guess (1-100): 12\nLOWER. 2 guesses\
    \ left.\n\nEnter your guess (1-100): 6\nHIGHER. 1 guesses left.\n\nEnter your\
    \ guess (1-100): 9\nLOWER. 0 guesses left.\n\nYou lose. The correct number is\
    \ 8\n```\n\nFirst, think about what we will need in the program:\n\n- We need\
    \ random numbers, so there will be an import statement at the beginning of the\
    \ program and a randint function somewhere else.\n- To allow the user to guess\
    \ until they either guess right or run out of turns, one solution is to use while\
    \ loop with a condition that takes care of both of these possibilities.\n- There\
    \ will be an input statement to get the user's guess. As this is something that\
    \ is repeatedly done, it will go inside the loop.\n- There will be an if statement\
    \ to take care of the higher/lower thing. As this comparison will be done repeatedly\
    \ and will depend on the user's guesses, it will go in the loop after the input\
    \ statement.\n- There will be a counting variable to keep track of how many turns\
    \ the player has taken. Each time the user makes a guess, the count will go up\
    \ by one, so this statement will also go inside the loop.\n\nNext start coding\
    \ those things that are easy to do:\n\n```\nfrom random import randint\n\nsecret_num\
    \ = randint(1,100)\nnum_guesses = 0\n\nwhile #some condition goes here#\n    guess\
    \ = eval(input('Enter your guess (1-100): '))\n    num_guesses = num_guesses +\
    \ 1\n    # higher/lower if statement goes here\n```\n\nFor the while loop, we\
    \ want to continue looping as long as the user has not guessed the secret number\
    \ and as long as the player has not used up all of their guesses:\n\n```\nwhile\
    \ guess != secret_num and num_guesses <= 4:\n```\n\nThe higher/lower if statement\
    \ can be done like this:\n\n```\nif guess < secret_num:\n    print('HIGHER.',\
    \ 5-num_guesses, 'guesses left.\\n')\nelif guess > secret_num:\n    print('LOWER.',\
    \ 5-num_guesses, 'guesses left.\\n')\nelse:\n    print('You got it!')\n```\n\n\
    Finally, it would be nice to have a message for the player if they run out of\
    \ turns. When they run out of turns, the while loop will stop looping and program\
    \ control will shift to whatever comes outside of the loop. At this point we can\
    \ print the message, but we only want to do so if the reason that the loop stopped\
    \ is because of the player running out of turns and not because they guessed correctly.\
    \ We can accomplish this with an if statement after the loop. This is shown below\
    \ along with the rest of the completed program.\n\n```\nfrom random import randint\n\
    \nsecret_num = randint(1,100)\nnum_guesses = 0\nguess = 0\n\nwhile guess != secret_num\
    \ and num_guesses <= 4:\n    guess = eval(input('Enter your guess (1-100): '))\n\
    \    num_guesses = num_guesses + 1\n    if guess < secret_num:\n        print('HIGHER.',\
    \ 5-num_guesses, 'guesses left.\\n')\n    elif guess > secret_num:\n        print('LOWER.',\
    \ 5-num_guesses, 'guesses left.\\n')\n    else:\n        print('You got it!')\n\
    \nif num_guesses==5 and guess != secret_num:\n    print('You lose. The correct\
    \ number is', secret_num)\n```\n\nHere is an alternative solution using a for/break\
    \ loop:\n\n```\nfrom random import randint\n\nsecret_num = randint(1,100)\n\n\
    for num_guesses in range(5):\n    guess = eval(input('Enter your guess (1-100):\
    \ '))\n    if guess < secret_num:\n        print('HIGHER.', 5-num_guesses, 'guesses\
    \ left.\\n')\n    elif guess > secret_num:\n        print('LOWER.', 5-num_guesses,\
    \ 'guesses left.\\n')\n    else:\n        print('You got it!')\n        break\n\
    else:\n    print('You lose. The correct number is', secret_num)\n```\n\n## 9.6\
    \ Exercises\n\n1. The code below prints the numbers from 1 to 50. Rewrite the\
