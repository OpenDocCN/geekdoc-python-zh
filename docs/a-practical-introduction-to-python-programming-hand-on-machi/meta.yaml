- md: "## Indentation matters\n\nA common mistake is incorrect indentation. Suppose\
    \ we take the above and indent the last line. The program will still run, but\
    \ it won't run as expected.\n\n```python\nfrom random import randint\n\ncount\
    \ = 0\nfor i in range(10000):\n    num = randint(1, 100)\n    if num%12==0:\n\
    \        count=count+1\n        print('Number of multiples of 12:', count)\n```\n\
    \nWhen we run it, it outputs a whole bunch of numbers. The reason for this is\
    \ that by indenting the print statement, we have made it a part of the for loop,\
    \ so the print statement will be executed 10,000 times.\n\nSuppose we indent the\
    \ print statement one step further, like below.\n\n```python\nfrom random import\
    \ randint\n\ncount = 0\nfor i in range(10000):\n    num = randint(1, 100)\n  \
    \  if num%12==0:\n        count=count+1\n        print('Number of multiples of\
    \ 12:', count)\n```\n\nNow, not only is it part of the for loop, but it is also\
    \ part of the if statement. What will happen is every time we find a new multiple\
    \ of 12, we will print the count. Neither this, nor the previous example, is what\
    \ we want. We just want to print the count once at the end of the program, so\
    \ we don't want the print statement indented at all.\n\n## 5.9 Exercises\n\n1.\
    \ Write a program that counts how many of the squares of the numbers from 1 to\
