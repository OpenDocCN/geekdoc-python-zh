- md: "## CHAPTER 15. GUI PROGRAMMING WITH TKINTER\n\n## Chapter 16\n\n## GUI Programming\
    \ II\n\nIn this chapter we cover more basic GUI concepts.\n\n### 16.1 Frames\n\
    \nLet's say we want 26 small buttons across the top of the screen, and a big Ok\
    \ button below them, like below:\n\n![](img/b783d4b75e24755b056ee79a66b412de_164_0.png)\n\
    \nWe try the following code:\n\n```python\nfrom tkinter import *\n\nroot = Tk()\n\
    \nalphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'\nbuttons = [0]*26\nfor i in range(26):\n\
