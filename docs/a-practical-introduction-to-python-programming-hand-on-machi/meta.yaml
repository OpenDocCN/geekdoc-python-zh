  md: '# 22.7 More with lists and arrays


    **Sparse lists** A 10,000,000 10,000,000 list of integers requires several hundred
    terabytes of storage, far more than most hard drives can store. However, in many
    practical applications, most of the entries of a list are 0. This allows us to
    save a lot of memory by just storing the nonzero values along with their locations.
    We can do this using a dictionary whose keys are the locations of the nonzero
    elements and whose values are the values stored in the array at those locations.
    For example, suppose we have a two-dimensional list L whose entries are all zero
    except that L[10][12] is 47 and L[100][245] is 18. Here is a the dictionary that
    we would use:


    ```

    d = {(10,12): 47, (100,245): 18}

    ```


    **The array module** Python has a module called array that defines an array object
    that behaves a lot like a list, except that its elements must all be the same
    type. The benefit of array over lists is more efficient memory usage and faster
    performance. See the Python documentation [1] for more about arrays.


    **The NumPy and SciPy libraries** If you have any serious mathematical or scientific
    calculations to do on arrays, you may want to consider the NumPy library. It is
    easy to download and install. From the NumPy user''s guide:


    > NumPy is the fundamental package for scientific computing in Python. It is a
    Python library that provides a multidimensional array object, various derived
    objects (such as masked arrays and matrices), and an assortment of routines for
    fast operations on arrays, including mathematical, logical, shape manipulation,
    sorting, selecting, I/O, discrete Fourier transforms, basic linear algebra, basic
    statistical operations, random simulation and much more.


    There is also SciPy, which builds off of NumPy. This time from the SciPy user''s
    guide:


    > SciPy is a collection of mathematical algorithms and convenience functions built
    on the NumPy extension for Python. It adds significant power to the interactive
    Python session by exposing the user to high-level commands and classes for the
    manipulation and visualization of data. With SciPy, an interactive Python session
    becomes a data-processing and system-prototyping environment rivaling systems
    such as MAT-LAB, IDL, Octave, R-Lab, and SciLab.


    # 22.8 Random numbers


    **How Python generates random numbers** The random number generator that Python
    uses is called the Mersenne Twister. It is reliable and well-tested. It is a deterministic
    generator, meaning'
  merge: -1
  pgno: 235
- img_proc: true
  md: 'that it uses a mathematical process to generate random numbers. The numbers
    are called pseudo-random numbers because, coming from a mathematical process,
    they are not truly random, though, for all intents and purposes, they appear random.
    Anyone who knows the process can recreate the numbers. This is good for scientific
    and mathematical applications, where you want to be able to recreate the same
    random numbers for testing purposes, but it is not suitable for cryptography,
    where you need to generate truly random numbers.


    **Seeds** For mathematical and scientific applications, you may want to reproduce
    the same random numbers each time you run your program, in order to test your
    work with the same data. You can do this by specifying the seed. Examples are
    shown below:


    ```

    random.seed(1)

    print("Seed 1:", [random.randint(1,10) for i in range(5)])

    random.seed(2)

    print("Seed 2:", [random.randint(1,10) for i in range(5)])

    random.seed(1)

    print("Seed 1:", [random.randint(1,10) for i in range(5)])

    ```


    ```

    Seed 1: [2, 9, 8, 3, 5]

    Seed 2: [10, 10, 1, 1, 9]

    Seed 1: [2, 9, 8, 3, 5]

    ```


    The seed can be any integer. If we just use random.seed(), then the seed will
    be more or less randomly selected based off of the system clock.


    **The random function** Most of the functions in the random module are based off
    of the random function, which uses the Mersenne Twister to generate random numbers
    between 0 and 1. Mathematical transformations are then used on the result of random
    to get some of the more interesting random number functions.


    **Other functions in the random module** The random module contains functions
    that return random numbers from various distributions, like the Gaussian or exponential
    distributions. For instance, to generate a Gaussian (normal) random variable,
    use the gauss function. Here are some examples:


    ```

    random.gauss(64,3.5)

    [round(random.gauss(64,3.5),1) for i in range(10)]

    ```


    ```

    61.37965975173485

    [58.4, 61.0, 67.0, 67.9, 63.2, 65.0, 64.5, 63.4, 65.5, 67.3]

    ```


    The first argument of gauss is the mean and the second is the standard deviation.
    If you''re not familiar with normal random variables, they are the standard bell
    curve. Things like heights and SAT scores and many other real-life things approximately
    fit this distribution. In the example above, the random numbers generated are
    centered around 64. Numbers closer to 64 are more likely to be generated than
    numbers farther away.'
