    \ chain:\n\n```\nL = [[1,2,3], [2,5,5], [7,8,3]]\nlist(chain(*tuple(L)))\n```\n\
    \n```\n[1, 2, 3, 2, 5, 5, 7, 8, 3]\n```\n\n**count** The function count() behaves\
    \ like range(1). It takes an optional argument so that count(x) behaves like range(x,1).\n\
