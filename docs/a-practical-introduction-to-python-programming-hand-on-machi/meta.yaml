- img_proc: true
  md: '**input** The Python 2 equivalent of the **input** function is **raw_input**.


    **range** The **range** function can be inefficient with very large ranges in
    Python 2. The reason is that in Python 2, if you use **range(10000000)**, Python
    will create a list of 10 million numbers. The **range** statement in Python 3
    is more efficient and instead of generating all 10 million things at once, it
    only generates the numbers as it needs them. The Python 2 function that acts like
    the Python 3 **range** is **xrange**.


    **String formatting** String formatting in Python 2 is a little different than
    in Python 3. When using the formatting codes inside curly braces, in Python 2,
    you need to specify an argument number. Compare the examples below:


    ```

    Python 2: ''x={0:3d},y={1:3d},z={2:3d}''.format(x,y,z)

    Python 3: ''x={:3d},y={:3d},z={:3d}''.format(x,y,z)

    ```


    As of Python 3.1, specifying the argument numbers was made optional.

    There is also an older style of formatting that you may see from time to time
    that uses the % operator. An example is shown below along with the corresponding
    new style.


    ```

    Python 2: ''x=%3d, y=%6.2f,z=%3s'' % (x,y,z)

    Python 3: ''x={:3d},y={:6.2f},z={:3s}''.format(x,y,z)

    ```


    **Module names** Some modules were renamed and reorganized. Here are a few Tkinter
    name changes:


    | Python 2 | Python 3 |

    |---|---|

    | Tkinter | tkinter |

    | ScrolledText | tkinter.scrolledtext |

    | tkMessageBox | tkinter.messagebox |

    | tkFileDialog | tkinter.filedialog |


    There are a number of other modules we''ll see later that were renamed, mostly
    just changed to lowercase. For instance, Queue in Python 2 is now queue in Python
    3.


    **Dictionary comprehensions** Dictionary comprehensions are not present in Python
    2.


    **Other changes** There are quite a few other changes in the language, but most
    of them are with features more advanced than we consider here.'
