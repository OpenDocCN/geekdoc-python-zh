    \ columns will be relative to the frame. Finally, we have to grid the frame itself.\n\
    \n# 16.2 Colors\n\nTkinter defines many common color names, like 'yellow' and\
    \ 'red'. It also provides a way to get access to millions of more colors. We first\
    \ have to understand how colors are displayed on the screen.\n\nEach color is\
    \ broken into three components—a red, a green, and a blue component. Each compo-nent\
    \ can have a value from 0 to 255, with 255 being the full amount of that color.\
    \ Equal parts of red and green create shades of yellow, equal parts of red and\
    \ blue create shades of purple, and equal"
  merge: -1
