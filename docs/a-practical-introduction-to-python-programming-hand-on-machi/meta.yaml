    ```


    The first argument of gauss is the mean and the second is the standard deviation.
    If you''re not familiar with normal random variables, they are the standard bell
    curve. Things like heights and SAT scores and many other real-life things approximately
    fit this distribution. In the example above, the random numbers generated are
    centered around 64. Numbers closer to 64 are more likely to be generated than
    numbers farther away.'
