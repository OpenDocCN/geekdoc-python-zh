    \ that we will see later."
  - '[PAGE 101]


    # 10.7 String formatting


    Suppose we are writing a program that calculates a 25% tip on a bill of $23.60.
    When we multiply, we get 5.9, but we would like to display the result as $5.90,
    not $5.9. Here is how to do it:


    ```

    a = 23.60 * .25

    print(''The tip is {:.2f}''.format(a))

    ```


    This uses the `format` method of strings. Here is another example:


    ```

    bill = 23.60

    tip = 23.60*.25

    print(''Tip: ${:.2f}, Total: ${:.2f}''.format(tip, bill+tip))

    ```


    The way the `format` method works is we put a pair of curly braces `{}` anywhere
    that we want a formatted value. The arguments to the format function are the values
    we want formatted, with the first argument matching up with the first set of braces,
    the second argument with the second set of braces, etc. Inside each set of curly
    braces you can specify a formatting code to determine how the corresponding argument
    will be formatted.


    **Formatting integers** To format integers, the formatting code is `{:d}`. Putting
    a number in front of the d allows us to right-justify integers. Here is an example:


    ```

    print(''{:3d}''.format(2))

    print(''{:3d}''.format(25))

    print(''{:3d}''.format(138))

    ```


    The number 3 in these examples says that the value is allotted three spots. The
    value is placed as far right in those three spots as possible and the rest of
    the slots will be filled by spaces. This sort of thing is useful for nicely formatting
    tables.


    To center integers instead of right-justifying, use the `^` character, and to
    left-justify, use the `<` character.


    ```

    print(''{:^5d}''.format(2))

    print(''{:^5d}''.format(222))

    print(''{:^5d}''.format(13834))

    ```


    Each of these allots five spaces for the integer and centers it within those five
    spaces.


    Putting a comma into the formatting code will format the integer with commas.
    The example below prints 1,000,000:


    ```

    print(''{:,d}''.format(1000000))

    ```'
  - "[PAGE 102]\n\n**Formatting floats** To format a floating point number, the formatting\
    \ code is `{:f}`. To only display the number to two decimal places, use `:.2f`.\
    \ The 2 can be changed to change the number of decimal places.\n\nYou can right-justify\
    \ floats. For example, `{:8.2f}` will allot eight spots for its value—one of those\
    \ is for the decimal point and two are for the part of the value after the decimal\
    \ point. If the value is 6.42, then only four spots are needed and the remaining\
    \ spots are filled by spaces, causing the value to be right-justified.\n\nThe\
    \ `^` and `<` characters center and left-justify floats.\n\n**Formatting strings**\
    \ To format strings, the formatting code is `{:s}`. Here is an example that centers\
    \ some text:\n\n```\nprint('{:^10s}'.format('Hi'))\nprint('{:^10s}'.format('there!'))\n\
    ```\n\nTo right-justify a string, use the `>` character:\n\n```\nprint('{:>6s}'.format('Hi'))\n\
    print('{:>6s}'.format('There'))\n```\n\nThere is a whole lot more that can be\
    \ done with formatting. See the Python documentation [1].\n\n# 10.8 Nested loops\n\
    \nYou can put loops inside of other loops. A loop inside of another loop is said\
    \ to be nested, and you can, more or less, nest loops as deeply as you want.\n\
    \n**Example 1** Print a 10 10 multiplication table.\n\n```\nfor i in range(1,11):\n\
    \    for j in range(1,11):\n        print('{:3d}'.format(i*j), end=' ')\n    print()\n\
    ```\n\nA multiplication table is a two-dimensional object. To work with it, we\
    \ use two for loops, one for the horizontal direction and one for the vertical\
    \ direction. The print statement right justifies the products to make them look\
    \ nice. The `end=\"\"` allows us to print several things on each row. When we\
    \ are done printing a row, we use `print()` to advance things to the next line."
  - "[PAGE 103]\n\nExample 2 A common math problem is to find the solutions to a system\
    \ of equations. Sometimes you want to find only the integer solutions, and this\
    \ can be a little tricky mathematically. However, we can write a program that\
