  md: '# Chapter 21


    # Regular expressions


    The replace method of strings is used to replace all occurrences of one string
    with another, and the index method is used to find the first occurrence of a substring
    in a string. But sometimes you need to do a more a sophisticated search or replace.
    For example, you may need to find all of the occurrences of a string instead of
    just the first one. Or maybe you want to find all occurrences of two letters followed
    by a number. Or perhaps you need to replace every ''qu'' that is at the start
    of a word with ''Qu''. This is what regular expressions are for. Utilities for
    working with regular expressions are found in the re module.


    There is some syntax to learn in order to understand regular expressions. Here
    is one example to give you an idea of how they work:


    ```

    import re

    print(re.sub(r''([LRUD])(\d+)'', ''***'', ''Locations L3 and D22 full.''))

    ```


    Locations *** and *** full.)


    This example replaces any occurrence of an L, R, U, or D followed by one or more
    digits with ''***''.


    # 21.1 Introduction


    **sub** The sub function works as follows:


    ```

    sub(pattern, replacement, string)

    ```


    This searches through string for pattern and replaces anything matching that pattern
    with the string replacement. All of the upcoming examples will be shown with sub,
    but there are other things we can do with regular expressions besides substituting.
    We will get to those after discussing the syntax of regular expressions.'
