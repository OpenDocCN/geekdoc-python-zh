    Seed 2: [10, 10, 1, 1, 9]

    Seed 1: [2, 9, 8, 3, 5]

    ```


    The seed can be any integer. If we just use random.seed(), then the seed will
    be more or less randomly selected based off of the system clock.


    **The random function** Most of the functions in the random module are based off
    of the random function, which uses the Mersenne Twister to generate random numbers
    between 0 and 1. Mathematical transformations are then used on the result of random
    to get some of the more interesting random number functions.


    **Other functions in the random module** The random module contains functions
    that return random numbers from various distributions, like the Gaussian or exponential
    distributions. For instance, to generate a Gaussian (normal) random variable,
    use the gauss function. Here are some examples:


    ```

