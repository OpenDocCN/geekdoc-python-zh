  md: "# 11.4. COUNTING WORDS\n\nIn Section 12.1, we will learn how to read from a\
    \ text file. For now, here's a line of code that reads the entire contents of\
    \ a file containing the text of Shakespeare's Romeo and Juliet and stores the\
    \ contents in a string called text:\n\n```\ntext = open('romeoandjuliet.txt').read()\n\
    ```\n\nTo get at the individual words, we will use the split method to turn the\
    \ string into a list of its individual words. Also, because some words may be\
    \ capitalized, we will convert the whole string to lowercase. We also have to\
    \ remove punctuation.\n\n```\nfrom string import punctuation\n\ntext = text.lower()\n\
    for p in punctuation:\n    text = text.replace(p, '')\nwords = text.split()\n\
    ```\n\nNext comes the dictionary code that does the counting. The dictionary keys\
    \ will be the words from the text and the values will be counts of how many time\
    \ each word appears. We start with an empty dictionary. Then for every word in\
    \ the list of words, if we have seen the word before, we add one to its count,\
    \ and otherwise we set the count for that word equal to 1. Here is the code:\n\
    \n```\nd = {}\nfor w in words:\n    if w in d:\n        d[w] = d[w] + 1\n    else:\n\
    \        d[w] = 1\n```\n\nOnce we have created the dictionary, we can use the\
    \ following code to print the items in alphabetical order:\n\n```\nitems = list(d.items())\n\
    items.sort()\nfor i in items:\n    print(i)\n```\n\nThe way this works is a little\
    \ tricky. Remember that d.items() returns a list of pairs (called tuples), which\
    \ are a lot like lists. When we sort a list of tuples, the sorting is done by\
    \ the first entry, which in this case is the word. So the sorting is done alphabetically.\n\
    \nIf we instead want to order things by frequency, we can flip the order of the\
    \ tuples and then sort:\n\n```\nitems = list(d.items())\nitems = [(i[1], i[0])\
    \ for i in items]\nitems.sort()\nfor i in items:\n    print(i)\n```\n\nHere is\
    \ the code all together:\n\n```\nfrom string import punctuation\n\n# read from\
    \ file, remove caps and punctuation, and split into words\ntext = open('romeoandjuliet.txt').read()\n\
    ```"
