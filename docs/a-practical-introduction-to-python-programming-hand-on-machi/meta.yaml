- md: "## 2.5. EXERCISES\n\n15. Write a program that prints a giant letter A like\
    \ the one below. Allow the user to specify how large the letter should be.\n\n\
    ```\n    *\n   * *\n  *****\n *     *\n*       *\n```\n\n## Chapter 3\n\n## Numbers\n\
    \nThis chapter focuses on numbers and simple mathematics in Python.\n\n### 3.1\
    \ Integers and Decimal Numbers\n\nBecause of the way computer chips are designed,\
    \ integers and decimal numbers are represented differently on computers. Decimal\
    \ numbers are represented by what are called floating point numbers. The important\
    \ thing to remember about them is you typically only get about 15 or so digits\
    \ of precision. It would be nice if there were no limit to the precision, but\
    \ calculations run a lot more quickly if you cut off the numbers at some point.\n\
    \nOn the other hand, integers in Python have no restrictions. They can be arbitrarily\
    \ large.\n\nFor decimal numbers, the last digit is sometimes slightly off due\
    \ to the fact that computers work in binary (base 2) whereas our human number\
    \ system is base 10. As an example, mathematically, we know that the decimal expansion\
    \ of 7/3 is 2.333, with the threes repeating forever. But when we type 7/3 into\
    \ the Python shell, we get 2.3333333333333335. This is called roundoff error.\
    \ For most practical purposes this is not too big of a deal, but it actually can\
    \ cause problems for some mathematical and scientific calculations. If you really\
    \ need more precision, there are ways. See Section 22.5.\n\n### 3.2 Math Operators\n\
    \nHere is a list of the common operators in Python:\n\n| Operator | Description\
    \ |\n| --- | --- |\n| + | addition |\n| - | subtraction |\n| * | multiplication\
    \ |\n| / | division |\n| ** | exponentiation |\n| // | integer division |\n| %\
    \ | modulo (remainder) |\n\n**Exponentiation** Python uses ** for exponentiation.\
    \ The caret, ^, is used for something else.\n\n**Integer division** The integer\
    \ division operator, //, requires some explanation. Basically, for positive numbers\
    \ it behaves like ordinary division except that it throws away the decimal part\
    \ of the result. For instance, while 8/5 is 1.6, we have 8//5 equal to 1. We will\
    \ see uses for this operator later. Note that in many other programming languages\
    \ and in older versions of Python, the usual division operator / actually does\
    \ integer division on integers.\n\n**Modulo** The modulo operator, %, returns\
    \ the remainder from a division. For instance, the result of 18%7 is 4 because\
    \ 4 is the remainder when 18 is divided by 7. This operation is surprisingly useful.\
    \ For instance, a number is divisible by *n* precisely when it leaves a remainder\
    \ of 0 when divided by n. Thus to check if a number, n, is even, see if n%2 is\
    \ equal to 0. To check if n is divisible by 3, see if n%3 is 0.\n\nOne use of\
    \ this is if you want to schedule something in a loop to happen only every other\
    \ time through the loop, you could check to see if the loop variable modulo 2\
    \ is equal to 0, and if it is, then do that something.\n\nThe modulo operator\
    \ shows up surprisingly often in formulas. If you need to \"wrap around\" and\
    \ come back to the start, the modulo is useful. For example, think of a clock.\
    \ If you go six hours past 8 o'clock, the result is 2 o'clock. Mathematically,\
    \ this can be accomplished by doing a modulo by 12. That is, (8+6)%12 is equal\
    \ to 2.\n\nAs another example, take a game with players 1 through 5. Say you have\
    \ a variable player that keeps track of the current player. After player 5 goes,\
    \ it's player 1's turn again. The modulo operator can be used to take care of\
    \ this:\n\n```\nplayer = player%5+1\n```\n\nWhen player is 5, player%5 will be\
    \ 0 and expression will set player to 1.\n\n### 3.3 Order of operations\n\nExponentiation\
    \ gets done first, followed by multiplication and division (including // and %),\
    \ and addition and subtraction come last. The classic math class mnemonic, PEMDAS\
    \ (Please Excuse My Dear Aunt Sally), might be helpful.\n\nThis comes into play\
    \ in calculating an average. Say you have three variables x, y, and z, and you\
    \ want to calculate the average of their values. The expression x+y+z/3 would\
    \ not work. Because division comes before addition, you would actually be calculating\
    \ $x + y + \\frac{z}{3}$ instead of $\\frac{x+y+z}{3}$. This is easily fixed by\
    \ using parentheses: (x+y+z)/3.\n\nIn general, if you're not sure about something,\
    \ adding parentheses might help and usually doesn't do any harm.\n\n### 3.4 Random\
    \ numbers\n\nTo make an interesting computer game, it's good to introduce some\
    \ randomness into it. Python comes with a module, called random, that allows us\
    \ to use random numbers in our programs.\n\nBefore we get to random numbers, we\
    \ should first explain what a module is. The core part of the Python language\
    \ consists of things like for loops, if statements, math operators, and some functions,\
    \ like `print` and `input`. Everything else is contained in modules, and if we\
    \ want to use something from a module we have to first import it—that is, tell\
    \ Python that we want to use it.\n\nAt this point, there is only one function,\
    \ called randint, that we will need from the random module. To load this function,\
    \ we use the following statement:\n\n```\nfrom random import randint\n```\n\n\
    Using randint is simple: randint(a,b) will return a random integer between a and\
    \ b including both a and b. (Note that randint includes the right endpoint b unlike\
    \ the `range` function). Here is a short example:\n\n```\nfrom random import randint\n\
    x = randint(1,10)\nprint('A random number between 1 and 10: ', x)\n```\n\nA random\
    \ number between 1 and 10: 7\n\nThe random number will be different every time\
    \ we run the program.\n\n### 3.5 Math functions\n\n**The math module** Python\
    \ has a module called math that contains familiar math functions, including sin,\
    \ cos, tan, exp, log, log10, factorial, sqrt, floor, and ceil. There are also\
    \ the inverse trig functions, hyperbolic functions, and the constants pi and e.\
    \ Here is a short example:\n\n```\nfrom math import sin, pi\nprint('Pi is roughly',\
    \ pi)\nprint('sin(0) =', sin(0))\n```\n\n```\nPi is roughly 3.14159265359\nsin(0)\
    \ = 0.0\n```\n\n**Built-in math functions** There are two built in math functions,\
    \ **abs** (absolute value) and **round** that are available without importing\
    \ the math module. Here are some examples:\n\n```\nprint(abs(-4.3))\nprint(round(3.336,\
    \ 2))\nprint(round(345.2, -1))\n```\n\n```\n4.3\n3.37\n350.0\n```\n\nThe **round**\
    \ function takes two arguments: the first is the number to be rounded and the\
    \ second is the number of decimal places to round to. The second argument can\
    \ be negative.\n\n### 3.6 Getting help from Python\n\nThere is documentation built\
    \ into Python. To get help on the math module, for example, go to the Python shell\
    \ and type the following two lines:\n\n```\n>>> import math\n>>> dir(math)\n```\n\
    \n```\n['__doc__', '__name__', '__package__', 'acos', 'acosh', 'asin',\n'asinh',\
    \ 'atan', 'atan2', 'atanh', 'ceil', 'copysign', 'cos',\n'cosh', 'degrees', 'e',\
    \ 'exp', 'fabs', 'factorial', 'floor',\n'fmod', 'frexp', 'fsum', 'hypot', 'isinf',\
    \ 'isnan', 'ldexp',\n'log', 'log10', 'log1p', 'modf', 'pi', 'pow', 'radians',\
    \ 'sin',\n'sinh', 'sqrt', 'tan', 'tanh', 'trunc']\n```\n\nThis gives a list of\
    \ all the functions and variables in the math module. You can ignore all of the\
    \ ones that start with underscores. To get help on a specific function, say the\
    \ floor function, you can type **help(math.floor)**. Typing **help(math)** will\
    \ give you help for everything in the math module.\n\n### 3.7 Using the Shell\
    \ as a Calculator\n\nThe Python shell can be used as a very handy and powerful\
    \ calculator. Here is an example session:\n\n```\n>>> 23**2\n529\n>>> s = 0\n\
    >>> for n in range(1,10001): s = s + 1/n**2\n\n>>> s\n1.6448340718480652\n>>>\
    \ from math import *\n>>> factorial(10)\n3628800\n```\n\nThe second example here\
    \ sums the numbers 1 + 1/4 + 1/9 + ... + 1/10000^2. The result is stored in the\
    \ variable s. To inspect the value of that variable, just type its name and press\
    \ enter. Inspecting variables is useful for debugging your programs. If a program\
    \ is not working properly, you can type your variable names into the shell after\
    \ the program has finished to see what their values are.\n\nThe statement `from\
    \ math import*` imports every function from the math module, which can make the\
    \ shell a lot like a scientific calculator.\n\n**Note** Under the Shell menu,\
    \ select Restart shell if you want to clear the values of all the variables.\n\
    \n### 3.8 Exercises\n\n1. Write a program that generates and prints 50 random\
    \ integers, each between 3 and 6.\n2. Write a program that generates a random\
    \ number, x, between 1 and 50, a random number y between 2 and 5, and computes\
    \ x^y.\n3. Write a program that generates a random number between 1 and 10 and\
    \ prints your name that many times.\n4. Write a program that generates a random\
    \ decimal number between 1 and 10 with two decimal places of accuracy. Examples\
    \ are 1.23, 3.45, 9.80, and 5.00.\n5. Write a program that generates 50 random\
    \ numbers such that the first number is between 1 and 2, the second is between\
    \ 1 and 3, the third is between 1 and 4, ..., and the last is between 1 and 51.\n\
    6. Write a program that asks the user to enter two numbers, x and y, and computes\
    \ x**(x+y).\n7. Write a program that asks the user to enter an angle between -180\
    \ and 180. Using an expression with the modulo operator, convert the angle to\
    \ its equivalent between 0 and 360."
  mdcn: "## 2.5. 练习\n\n15. 编写一个程序，打印出如下所示的大写字母A。允许用户指定字母的大小。\n\n```\n    *\n   * *\n\
    \  *****\n *     *\n*       *\n```\n\n## 第3章\n\n## 数字\n\n本章重点介绍Python中的数字和简单数学运算。\n\
    \n### 3.1 整数和小数\n\n由于计算机芯片的设计方式，整数和小数在计算机中的表示方式不同。小数通过所谓的浮点数来表示。关于它们需要记住的重要一点是，通常只能获得大约15位左右的精度。如果精度没有限制固然好，但如果在某个点截断数字，计算速度会快得多。\n\
    \n另一方面，Python中的整数没有限制。它们可以任意大。\n\n对于小数，由于计算机使用二进制（基数为2）工作，而我们人类的数字系统是基数为10，因此最后一位数字有时会略有偏差。例如，从数学上我们知道7/3的小数展开是2.333，其中3无限重复。但当我们在Python\
    \ shell中输入7/3时，得到的是2.3333333333333335。这被称为舍入误差。对于大多数实际目的来说，这问题不大，但它实际上可能导致一些数学和科学计算出现问题。如果你确实需要更高的精度，是有办法的。参见第22.5节。\n\
    \n### 3.2 数学运算符\n\n以下是Python中常见运算符的列表：\n\n| 运算符 | 描述 |\n| --- | --- |\n| + | 加法\
    \ |\n| - | 减法 |\n| * | 乘法 |\n| / | 除法 |\n| ** | 幂运算 |\n| // | 整数除法 |\n| % | 取模（求余）\
    \ |\n\n**幂运算** Python使用**进行幂运算。脱字符^用于其他用途。\n\n**整数除法** 整数除法运算符//需要一些解释。基本上，对于正数，它的行为类似于普通除法，只是它会丢弃结果的小数部分。例如，虽然8/5是1.6，但8//5等于1。我们稍后会看到这个运算符的用途。请注意，在许多其他编程语言和Python的旧版本中，通常的除法运算符/实际上对整数执行整数除法。\n\
    \n**取模** 取模运算符%返回除法的余数。例如，18%7的结果是4，因为18除以7的余数是4。这个操作出奇地有用。例如，一个数能被*n*整除，当且仅当它除以n的余数为0。因此，要检查一个数n是否为偶数，可以检查n%2是否等于0。要检查n是否能被3整除，可以检查n%3是否为0。\n\
    \n其中一个用途是，如果你想在循环中安排某件事只在每次循环的其他时间发生，你可以检查循环变量模2是否等于0，如果是，则执行该操作。\n\n取模运算符在公式中出现得惊人地频繁。如果你需要“环绕”并回到起点，取模很有用。例如，想想一个时钟。如果你从8点再过6小时，结果是2点。从数学上讲，这可以通过对12取模来实现。也就是说，(8+6)%12等于2。\n\
    \n再举一个例子，考虑一个有1到5号玩家的游戏。假设你有一个变量player来跟踪当前玩家。5号玩家之后，又轮到1号玩家了。取模运算符可以用来处理这个问题：\n\
    \n```\nplayer = player%5+1\n```\n\n当player为5时，player%5将为0，表达式会将player设置为1。\n\n\
    ### 3.3 运算顺序\n\n幂运算最先执行，然后是乘法和除法（包括//和%），最后是加法和减法。经典的数学课助记符PEMDAS（Please Excuse\
    \ My Dear Aunt Sally）可能会有所帮助。\n\n这在计算平均值时会起作用。假设你有三个变量x、y和z，你想计算它们值的平均值。表达式x+y+z/3将不起作用。因为除法在加法之前，你实际上是在计算$x\
    \ + y + \\frac{z}{3}$而不是$\\frac{x+y+z}{3}$。这可以通过使用括号轻松修复：(x+y+z)/3。\n\n一般来说，如果你对某事不确定，添加括号可能会有帮助，而且通常不会有任何害处。\n\
    \n### 3.4 随机数\n\n为了制作有趣的计算机游戏，最好引入一些随机性。Python附带了一个名为random的模块，允许我们在程序中使用随机数。\n\
    \n在讨论随机数之前，我们应该先解释什么是模块。Python语言的核心部分包括for循环、if语句、数学运算符和一些函数，如`print`和`input`。其他所有内容都包含在模块中，如果我们想使用模块中的某些内容，我们必须首先导入它——即告诉Python我们想使用它。\n\
    \n目前，我们只需要从random模块中获取一个名为randint的函数。要加载这个函数，我们使用以下语句：\n\n```\nfrom random import\
    \ randint\n```\n\n使用randint很简单：randint(a,b)将返回一个介于a和b之间的随机整数，包括a和b。（注意，randint包括右端点b，这与`range`函数不同）。这里有一个简短的例子：\n\
    \n```\nfrom random import randint\nx = randint(1,10)\nprint('A random number between\
    \ 1 and 10: ', x)\n```\n\nA random number between 1 and 10: 7\n\n每次运行程序时，随机数都会不同。\n\
    \n### 3.5 数学函数\n\n**math模块** Python有一个名为math的模块，包含熟悉的数学函数，包括sin、cos、tan、exp、log、log10、factorial、sqrt、floor和ceil。还有反三角函数、双曲函数以及常量pi和e。这里有一个简短的例子：\n\
    \n```\nfrom math import sin, pi\nprint('Pi is roughly', pi)\nprint('sin(0) =',\
    \ sin(0))\n```\n\n```\nPi is roughly 3.14159265359\nsin(0) = 0.0\n```\n\n**内置数学函数**\
    \ 有两个内置数学函数，**abs**（绝对值）和**round**，无需导入math模块即可使用。这里有一些例子：\n\n```\nprint(abs(-4.3))\n\
    print(round(3.336, 2))\nprint(round(345.2, -1))\n```\n\n```\n4.3\n3.37\n350.0\n\
    ```\n\n**round**函数接受两个参数：第一个是要四舍五入的数字，第二个是要四舍五入到的小数位数。第二个参数可以是负数。\n\n### 3.6 从Python获取帮助\n\
