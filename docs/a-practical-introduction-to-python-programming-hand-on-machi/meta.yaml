    \ :--- |\n| **len** | returns the number of items in the list |\n| **sum** | returns\
    \ the sum of the items in the list |\n| **min** | returns the minimum of the items\
    \ in the list |\n| **max** | returns the maximum of the items in the list |\n\n\
    For example, the following computes the average of the values in a list L:\n\n\
    ```\naverage = sum(L)/len(L)\n```\n\n### 7.4 List methods\n\nHere are some list\
    \ methods:\n\n| Method | Description |\n| :--- | :--- |\n| append(x) | adds x\
