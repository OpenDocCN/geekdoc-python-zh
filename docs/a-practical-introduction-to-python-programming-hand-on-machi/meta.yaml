    \ the configure method to set or change an image:\n\n```python\nlabel.configure(image=cheetah_image)\n\
    ```\n\n**File types** One unfortunate limitation of Tkinter is the only common\
    \ image file type it can use is GIF. If you would like to use other types of files,\
    \ one solution is to use the Python Imaging Library, which will be covered in\
    \ Section 18.2.\n\n### 16.4 Canvases\n\nA canvas is a widget on which you can\
    \ draw things like lines, circles, rectangles. You can also draw text, images,\
    \ and other widgets on it. It is a very versatile widget, though we will only\
