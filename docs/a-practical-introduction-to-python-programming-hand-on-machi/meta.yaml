    \ like the ones below that each use a variable i:\n\n```\ndef func1():\n    for\
    \ i in range(10):\n        print(i)\n\ndef func2():\n    i=100\n    func1()\n\
    \    print(i)\n```\n\nA problem that could arise here is that when we call func1,\
    \ we might mess up the value of i in func2. In a large program it would be a nightmare\
    \ trying to make sure that we don't repeat variable names in different functions,\
    \ and, fortunately, we don't have to worry about this. When a variable is defined\
    \ inside a function, it is local to that function, which means it essentially\
