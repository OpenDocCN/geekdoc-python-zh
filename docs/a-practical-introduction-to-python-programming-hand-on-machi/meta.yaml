  md: "# 23.4 map, filter, reduce, and list comprehensions\n\n**map and filter** Python\
    \ has a built-in functions called **map** and **filter** that are used to apply\
    \ functions to the contents of a list. They date back to before list comprehensions\
    \ were a part of Python, but now list comprehensions can accomplish everything\
    \ these functions can. Still, you may occasionally see code using these functions,\
    \ so it is good to know about them.\n\nThe **map** function takes two arguments—a\
    \ function and an iterable—and it applies the function to each element of the\
    \ iterable, generating a new iterable. Here is an example that takes a list of\
    \ strings a returns a list of the lengths of the strings. The first line accomplishes\
    \ this with **map**, while the second line uses list comprehensions:\n\n```\n\
    L = list(map(len, ['this', 'is', 'a', 'test']))\nL = [len(word) for word in ['this',\
    \ 'is', 'a', 'test']]\n```\n\nThe function **filter** takes a function and an\
    \ iterable and returns an iterable of all the elements of the list for which the\
    \ function is true. Here is an example that returns all the words in a list that\
    \ have length greater than 2. The first line uses **filter** to do this, and the\
    \ second line does it with a list comprehension:\n\n```\nL = list(filter(lambda\
    \ x: len(x)>2, ['this', 'is', 'a', 'test']))\nL = [word for word in ['this', 'is',\
    \ 'a', 'test'] if len(word)>2]\n```\n\nHere is one approach to finding the number\
    \ of items in a list L that are greater than 60:\n\n```\ncount=0\nfor i in L:\n\
    \    if i>60:\n        count = count + 1\n```\n\nHere is a second way using a\
    \ list comprehension similar to the **filter** function:\n\n```\nlen([i for i\
    \ in L if i>60])\n```\n\nThe second way is both shorter and easier to understand.\n\
    \n**reduce** There is another function, **reduce**, that applies a function to\
    \ the contents of a list. It used to be a built-in function, but in Python 3 it\
    \ has also been moved to the functools module. This function cannot be easily\
    \ replaced with list comprehensions. To understand it, first consider a simple\
    \ example that adds up the numbers from 1 to 100.\n\n```\ntotal = 0\nfor i in\
    \ range(1,101):\n    total = total + i\n```\n\nThe **reduce** function can be\
    \ used to do this in a single line:\n\n```\ntotal = reduce(lambda x,y: x+y, range(1,101))\n\
    ```\n\nIn general, **reduce** takes a function and an iterable, and applies the\
    \ function to the elements from left to right, accumulating the result. As another\
    \ simple example, the factorial function could be implemented using reduce:"
