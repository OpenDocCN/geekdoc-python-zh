    \ Lists can contain all kinds of things, even other lists. For example, the following\
    \ is a valid list:\n\n```\n[1, 2.718, 'abc', [5,6,7]]\n```\n\n### 7.2 Similarities\
    \ to strings\n\nThere are a number of things which work the same way for lists\
    \ as for strings.\n\n- `len` — The number of items in L is given by `len(L)`.\n\
    - `in` — The `in` operator tells you if a list contains something. Here are some\
    \ examples:\n\n```python\nif 2 in L:\n    print('Your list contains the number\
    \ 2.')\nif 0 not in L:\n    print('Your list has no zeroes.')\n```\n\n- Indexing\
    \ and slicing — These work exactly as with strings. For example, `L[0]` is the\
    \ first item of the list L and `L[:3]` gives the first three items.\n- index and\
    \ count — These methods work the same as they do for strings.\n- + and * — The\
    \ + operator adds one list to the end of another. The * operator repeats a list.\
    \ Here are some examples:\n\n| Expression | Result |\n|---|---|\n| [7,8]+[3,4,5]\
    \ | [7,8,3,4,5] |\n| [7,8]*3 | [7,8,7,8,7,8] |\n| [0]*5 | [0,0,0,0,0] |\n\nThe\
    \ last example is particularly useful for quickly creating a list of zeroes.\n\
    \n- Looping — The same two types of loops that work for strings also work for\
    \ lists. Both of the following examples print out the items of a list, one-by-one,\
    \ on separate lines.\n\n```\nfor i in range(len(L)):\n    print(L[i])\n\nfor item\
    \ in L:\n    print(item)\n```\n\nThe left loop is useful for problems where you\
    \ need to use the loop variable i to keep track of where you are in the loop.\
    \ If that is not needed, then use the right loop, as it is a little simpler.\n\
    \n### 7.3 Built-in functions\n\nThere are several built-in functions that operate\
