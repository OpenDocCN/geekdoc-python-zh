  md: "```\nelif grade>=60:\n    print('D'):\nelse:\n    print('F')\n```\n\nWith the\
    \ separate if statements, each condition is checked regardless of whether it really\
    \ needs to be. That is, if the score is a 95, the first program will print an\
    \ A but then continue on and check to see if the score is a B, C, etc., which\
    \ is a bit of a waste. Using **elif**, as soon as we find where the score matches,\
    \ we stop checking conditions and skip all the way to the end of the whole block\
    \ of statements. An added benefit of this is that the conditions we use in the\
    \ **elif** statements are simpler than in their **if** counterparts. For instance,\
    \ when using **elif**, the second part of the second if statement condition, grade<90,\
    \ becomes unnecessary because the corresponding **elif** does not have to worry\
    \ about a score of 90 or above, as such a score would have already been caught\
    \ by the first if statement.\n\nYou can get along just fine without **elif**,\
    \ but it can often make your code simpler.\n\n# 4.5 Exercises\n\n+   1. Write\
