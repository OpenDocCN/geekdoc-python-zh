    \ other functions.\n\n**Global variables** On the other hand, sometimes you actually\
    \ do want the same variable to be available to multiple functions. Such a variable\
    \ is called a global variable. You have to be careful using global variables,\
    \ especially in larger programs, but a few global variables used judiciously are\
    \ fine in smaller programs. Here is a short example:\n\n```\ndef reset():\n  \
    \  global time_left\n    time_left = 0\n\ndef print_time():\n    print(time_left)\n\
    \ntime_left=30\n```\n\nIn this program we have a variable time_left that we would\
    \ like multiple functions to have access to. If a function wants to change the\
    \ value of that variable, we need to tell the function that time_left is a global\
    \ variable. We use a **global** statement in the function to do this. On the other\
    \ hand, if we just want to use the value of the global variable, we do not need\
    \ a **global** statement.\n\n**Arguments** We finish the chapter with a bit of\
    \ a technical detail. You can skip this section for the time being if you don't\
