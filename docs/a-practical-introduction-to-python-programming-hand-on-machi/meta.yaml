    print('The tip is {:.2f}'.format(a))\n```\n\nThis uses the `format` method of\
    \ strings. Here is another example:\n\n```\nbill = 23.60\ntip = 23.60*.25\nprint('Tip:\
    \ ${:.2f}, Total: ${:.2f}'.format(tip, bill+tip))\n```\n\nThe way the `format`\
    \ method works is we put a pair of curly braces `{}` anywhere that we want a formatted\
    \ value. The arguments to the format function are the values we want formatted,\
    \ with the first argument matching up with the first set of braces, the second\
    \ argument with the second set of braces, etc. Inside each set of curly braces\
    \ you can specify a formatting code to determine how the corresponding argument\
    \ will be formatted.\n\n**Formatting integers** To format integers, the formatting\
    \ code is `{:d}`. Putting a number in front of the d allows us to right-justify\
    \ integers. Here is an example:\n\n```\nprint('{:3d}'.format(2))\nprint('{:3d}'.format(25))\n\
    print('{:3d}'.format(138))\n```\n\nThe number 3 in these examples says that the\
    \ value is allotted three spots. The value is placed as far right in those three\
    \ spots as possible and the rest of the slots will be filled by spaces. This sort\
    \ of thing is useful for nicely formatting tables.\n\nTo center integers instead\
    \ of right-justifying, use the `^` character, and to left-justify, use the `<`\
    \ character.\n\n```\nprint('{:^5d}'.format(2))\nprint('{:^5d}'.format(222))\n\
    print('{:^5d}'.format(13834))\n```\n\nEach of these allots five spaces for the\
    \ integer and centers it within those five spaces.\n\nPutting a comma into the\
    \ formatting code will format the integer with commas. The example below prints\
    \ 1,000,000:\n\n```\nprint('{:,d}'.format(1000000))\n```\n\n**Formatting floats**\
    \ To format a floating point number, the formatting code is `{:f}`. To only display\
    \ the number to two decimal places, use `:.2f`. The 2 can be changed to change\
    \ the number of decimal places.\n\nYou can right-justify floats. For example,\
    \ `{:8.2f}` will allot eight spots for its value—one of those is for the decimal\
    \ point and two are for the part of the value after the decimal point. If the\
    \ value is 6.42, then only four spots are needed and the remaining spots are filled\
    \ by spaces, causing the value to be right-justified.\n\nThe `^` and `<` characters\
    \ center and left-justify floats.\n\n**Formatting strings** To format strings,\
    \ the formatting code is `{:s}`. Here is an example that centers some text:\n\n\
    ```\nprint('{:^10s}'.format('Hi'))\nprint('{:^10s}'.format('there!'))\n```\n\n\
    To right-justify a string, use the `>` character:\n\n```\nprint('{:>6s}'.format('Hi'))\n\
    print('{:>6s}'.format('There'))\n```\n\nThere is a whole lot more that can be\
    \ done with formatting. See the Python documentation [1].\n\n## 10.8 Nested loops\n\
    \nYou can put loops inside of other loops. A loop inside of another loop is said\
    \ to be nested, and you can, more or less, nest loops as deeply as you want.\n\
    \n**Example 1** Print a 10 10 multiplication table.\n\n```\nfor i in range(1,11):\n\
    \    for j in range(1,11):\n        print('{:3d}'.format(i*j), end=' ')\n    print()\n\
    ```\n\nA multiplication table is a two-dimensional object. To work with it, we\
    \ use two for loops, one for the horizontal direction and one for the vertical\
    \ direction. The print statement right justifies the products to make them look\
    \ nice. The `end=\"\"` allows us to print several things on each row. When we\
    \ are done printing a row, we use `print()` to advance things to the next line.\n\
    \n**Example 2** A common math problem is to find the solutions to a system of\
    \ equations. Sometimes you want to find only the integer solutions, and this can\
    \ be a little tricky mathematically. However, we can write a program that does\
    \ a brute force search for solutions. Here we find all the integer solutions (x,\
    \ y) to the system 2x + 3 y = 4, x y = 7, where x and y are both between -50 and\
    \ 50.\n\n```\nfor x in range(-50,51):\n    for y in range(-50,51):\n        if\
    \ 2*x+3*y==4 and x-y==7:\n            print(x,y)\n```\n\n**Example 3** A Pythagorean\
    \ triple is a triple of numbers (x, y, z) such that x^2 + y^2 = z^2. For instance\
    \ (3, 4, 5) is a Pythagorean triple because 3^2 + 4^2 = 5^2. Pythagorean triples\
    \ correspond to triangles whose sides are all whole numbers (like a 3-4-5-triangle).\
    \ Here is a program that finds all the Pythagorean triples (x, y, z) where x,\
    \ y, and z are positive and less than 100.\n\n```\nfor x in range(1,100):\n  \
    \  for y in range(1,100):\n        for z in range(1,100):\n            if x**2+y**2==z**2:\n\
    \                print(x,y,z)\n```\n\nIf you run the program, you'll notice that\
    \ there are redundant solutions. For instance, (3, 4, 5) and (4, 3, 5) are both\
    \ listed. To get rid of these redundancies, change the second loop so that it\
    \ runs from x to 100. This way, when x is 4, for instance, the first value for\
    \ y that will be searched is 4, rather than 1, and so we won't get the redundant\
    \ (4, 3, 5). Also change the third loop so that it runs from y to 100.\n\nAs you\
    \ look through the solutions, you might also notice that there are many solutions\
    \ that are multiples of others, like (6, 8, 10), and (9, 12, 15) are multiples\
    \ of (3, 4, 5). The following program finds only primitive Pythagorean triples,\
    \ those that aren't multiples of another triple. The way it does this is every\
    \ time a new triple is found, it checks to make sure that x, y, and z are not\
    \ all divisible by the same number.\n\n```\nfor x in range(1,100):\n    for y\
    \ in range(x,100):\n        for z in range(y,100):\n            if x**2+y**2==z**2:\n\
    \                for i in range(2,x):\n                    if x%i==0 and y%i==0\
    \ and z%i==0:\n                        break\n                else:\n        \
    \            print((x,y,z), end=' ')\n```\n\n**Example 4** In Section 15.7, we\
    \ will write a game to play tic-tac-toe. The board is a 3 3 grid, and we will\
    \ use nested for loops to create it."
