  md: "# 24.3 Grouping things\n\nThe groupby function is handy for grouping things.\
    \ It breaks a list up into groups by tracing through the list and every time there\
    \ is a change in values, a new group is created. The groupby function returns\
    \ ordered pairs that consist of a list item and groupby iterator object that contains\
    \ the group of items.\n\n```\nL = [0, 0, 1, 1, 1, 2, 0, 4, 4, 4, 4, 4]\nfor key,group\
    \ in groupby(L):\n    print(key, ':', list(group))\n```\n\n```\n0 : [0, 0]\n1\
    \ : [1, 1, 1]\n2 : [2]\n0 : [0]\n4 : [4, 4, 4, 4, 4]\n```\n\nNotice that we get\
    \ two groups of zeros. This is because groupby returns a new group each time there\
    \ is a change in the list. In the above example, if we instead just wanted to\
    \ know how many of each number occur, we can first sort the list and then call\
    \ groupby.\n\n```\nL = [0, 0, 1, 1, 1, 2, 0, 4, 4, 4, 4, 4]\nL.sort()\nfor key,group\
    \ in groupby(L):\n    print(key, ':', len(list(group)))\n```\n\n```\n0 : 3\n1\
    \ : 3\n2 : 1\n4 : 5\n```\n\nMost of the time, you will want to sort your data\
    \ before calling groupby.\n\n**Optional argument** The groupby function takes\
    \ an optional argument that is a function telling it how to group things. When\
    \ using this, you usually have to first sort the list with that function as the\
    \ sorting key. Here is an example that groups a list of words by length:\n\n```\n\
    L = ['this', 'is', 'a', 'test', 'of', 'groupby'] L.sort(key = len)\n\nfor key,group\
    \ in groupby(L, len): print(key,\n    ':', list(group))\n```\n\n```\n1 : ['a']\n\
    2 : ['is', 'of']\n4 : ['test', 'this']\n7 : ['groupby']\n```\n\n**Examples** We\
    \ close this section with two examples."
