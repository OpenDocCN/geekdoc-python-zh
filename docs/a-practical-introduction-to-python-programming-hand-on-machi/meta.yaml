    \ save the value of x:\n\n```\nhold = x\nx = y\ny = hold\n```\n\nIn many programming\
    \ languages, this is the usual way to swap variables. Python, however, provides\
    \ a nice shortcut:\n\n```\nx,y = y,x\n```\n\nWe will learn later exactly why this\
