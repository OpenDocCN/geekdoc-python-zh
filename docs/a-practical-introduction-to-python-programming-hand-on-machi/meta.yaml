    \    [7,8,9]]\n```\n\n**Indexing** We use two indices to access individual items.\
    \ To get the entry in row r, column c, use the following:\n\n```\nL[r][c]\n```\n\
    \n**Printing a two-dimensional list** To print a two-dimensional list, you can\
