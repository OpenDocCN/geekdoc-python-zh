  md: "# 2.2 The loop variable\n\nThere is one part of a for loop that is a little\
    \ tricky, and that is the loop variable. In the example below, the loop variable\
    \ is the variable i. The output of this program will be the numbers 0, 1, . .\
    \ . , 99, each printed on its own line.\n\n```\nfor i in range(100):\n    print(i)\n\
    ```\n\nWhen the loop first starts, Python sets the variable i to 0. Each time\
    \ we loop back up, Python increases the value of i by 1. The program loops 100\
    \ times, each time increasing the value of i by 1, until we have looped 100 times.\
    \ At this point the value of i is 99.\n\nYou may be wondering why i starts with\
    \ 0 instead of 1. Well, there doesn't seem to be any really good reason why other\
    \ than that starting at 0 was useful in the early days of computing and it has\
    \ stuck with us. In fact most things in computer programming start at 0 instead\
    \ of 1. This does take some getting used to.\n\nSince the loop variable, i, gets\
    \ increased by 1 each time through the loop, it can be used to keep track of where\
    \ we are in the looping process. Consider the example below:\n\n```\nfor i in\
    \ range(3):\n    print(i+1, '-- Hello')\n```\n\n```\n1 -- Hello\n2 -- Hello\n\
    3 -- Hello\n```\n\n**Names** There's nothing too special about the name i for\
    \ our variable. The programs below will have the exact same result.\n\n```\nfor\
    \ i in range(100):\n    print(i)\n\nfor wacky_name in range(100):\n    print(wacky_name)\n\
    ```\n\nIt's a convention in programming to use the letters i, j, and k for loop\
    \ variables, unless there's a good reason to give the variable a more descriptive\
    \ name.\n\n# 2.3 The range function\n\nThe value we put in the `range` function\
