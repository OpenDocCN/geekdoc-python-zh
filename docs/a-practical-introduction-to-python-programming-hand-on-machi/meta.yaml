    \ going until someone wins or there are no more moves to be made, so the number\
    \ of turns will vary from game to game. This is a situation that would call for\
    \ a while loop.\n\n# 9.1 Examples\n\n**Example 1** Let's go back to the first\
    \ program we wrote back in Section 1.3, the temperature converter. One annoying\
    \ thing about it is that the user has to restart the program for every new temperature.\
    \ A while loop will allow the user to repeatedly enter temperatures. A simple\
