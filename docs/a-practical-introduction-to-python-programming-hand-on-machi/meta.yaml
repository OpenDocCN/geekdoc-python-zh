    # 24.5 Counting things


    The collections module has a useful class called Counter. You feed it an iterable
    and the Counter object that is created is something very much like a dictionary
    whose keys are items from the sequence and whose values are the number of occurrences
    of the keys. In fact, Counter is a subclass of dict, Python''s dictionary class.
    Here is an example:


    ```

    Counter(''aababcabcdabcde'')

    ```


    ```

    Counter({''a'': 5, ''b'': 4, ''c'': 3, ''d'': 2, ''e'': 1})

    ```


    Since Counter is a subclass of dict, you can access items just like in a dictionary,
    and most of the usual dictionary methods work. For example:


    ```

    c = Counter(''aababcabcdabcde'')

    c[''a'']

    list(c.keys())

    list(c.values())

    ```


    ```

    5

    [''a'', ''c'', ''b'', ''e'', ''d'']

    [5, 3, 4, 1, 2]

    ```


    **Getting the most common items** This most_common method takes an integer n and
    returns a list of the n most common items, arranged as (key, value) tuples. For
    example:


    ```

    c = Counter(''aababcabcdabcde'')

    c.most_common(2)

    ```


    ```

    [(''a'', 5), (''b'', 4)]

    ```


    If we omit the argument, it returns tuples for every item, arranged in decreasing
    order of fre-quency. To get the least common elements, we can use a slice from
    the end of the list returned by most_common. Here is some examples:


    ```

    c = Counter(''aababcabcdabcde'')

    c.most_common() c.most_common()[-2:]

    c.most_common()[:-2:-1]

    ```


    ```

    [(''a'', 5), (''b'', 4), (''c'', 3), (''d'', 2), (''e'', 1)]

    [(''d'', 2), (''e'', 1)]

    [(''e'', 1), (''d'', 2)]

    ```


    The last example uses a negative slice index to reverse the order to least to
    most common.


    **An example** Here is a really short program that will scan through a text file
    and create a Counter object of word frequencies.'
