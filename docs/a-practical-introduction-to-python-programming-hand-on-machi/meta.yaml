- img_proc: true
  md: '+   - fg and bg — These stand for foreground and background. Many common color
    names can be used, like ''blue'', ''green'', etc. Section 16.2 describes how to
    get essentially any color.

    - width — This is how many characters long the label should be. If you leave this
    out, Tkinter will base the width off of the text you put in the label. This can
    make for unpredictable results, so it is good to decide ahead of time how long
    you want your label to be and set the width accordingly.

    - height — This is how many rows high the label should be. You can use this for
    multi-line labels. Use newline characters in the text to get it to span multiple
    lines. For example, text=''hi\nthere''.


    There are dozens more options. The aforementioned Introduction to Tkinter [2]
    has a nice list of the others and what they do.


    **Changing label properties** Later in your program, after you''ve created a label,
    you may want to change something about it. To do that, use its configure method.
    Here are two examples that change the properties of a label called label:


    ```

    label.configure(text=''Bye'')

    label.configure(bg=''white'', fg=''black'')

    ```


    Setting text to something using the configure method is kind of like the GUI equivalent
    of a **print** statement. However, in calls to configure we cannot use commas
    to separate multiple things to print. We instead need to use string formatting.
    Here is a **print** statement and its equiv-alent using the configure method.


    ```

    print(''a ='', a, ''and b ='', b)

    label.configure(text=''a = {}, and b = {}''.format(a,b))

    ```


    The configure method works with most of the other widgets we will see.


