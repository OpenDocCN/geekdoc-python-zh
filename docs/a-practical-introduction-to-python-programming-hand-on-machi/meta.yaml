    # 10.3 Shortcuts


    +   - **Shortcut operators** Operations like count=count+1 occur so often that
    there is a shorthand for them. Here are a couple of examples:


    | Statement | Shorthand |

    |---|---|

    | count=count+1 | count+=1 |

    | total=total-5 | total-=5 |

    | prod=prod*2 | prod*=2 |


    There are also shortcut operators /=, %=, //=, and **=.


    +   - **An assignment shortcut**

    Look at the code below.


    ```

    a = 0

    b = 0

    c = 0

    ```


    A nice shortcut is:


    ```

    a = b = c = 0

    ```


    +   - **Another assignment shortcut**

    Say we have a list L with three elements in it, and we want to assign those elements
    to variable names. We could do the following:


    ```

    x = L[0]

    y = L[1]

    z = L[2]

    ```


    Instead, we can do this:


    ```

    x,y,z = L

    ```


    Similarly, we can assign three variables at a time like below:


    ```

    x,y,z = 1,2,3

    ```


    And, as we have seen once before, we can swap variables using this kind of assignment.


    ```

    x,y,z = y,z,x

    ```


    +   - **Shortcuts with conditions**

    Here are some handy shortcuts:


    | Statement | Shortcut |

    |---|---|

    | if a==0 and b==0 and c==0: | if a==b==c==0: |

    | if 1<a and a<b and b<5: | if 1<a<b<5: |'
  - "[PAGE 100]\n\n# 10.4 Short-circuiting\n\nSay we are writing a program that searches\
    \ a list of words for those whose fifth character is 'z'. We might try the following:\n\
    \n```\nfor w in words:\n    if w[4]=='z':\n        print(w)\n```\n\nBut with this,\
    \ we will occasionally get a string index out of range error. The problem is that\
    \ some words in the list might be less than five characters long. The following\
    \ if statement, however, will work:\n\n```\nif len(w)>=5 and w[4]=='z':\n```\n\
    \nIt might seem like we would still get an error because we are still checking\
    \ w[4], but there is no error. The key to why this works is short-circuiting.\
    \ Python starts by checking the first part of the condition, len(w)>=5. If that\
    \ condition turns out to be false, then the whole and condition is guaranteed\
    \ to be false, and so there is no point in even looking at the second condition.\
    \ So Python doesn't bother with the second condition. You can rely on this behavior.\n\
    \nShort-circuiting also happens with or conditions. In this case, Python checks\
    \ the first part of the or and if it is true, then the whole or is guaranteed\
    \ to be true, and so Python will not bother checking the second part of the or.\n\
    \n# 10.5 Continuation\n\nSometimes you'll write a long line of code that would\
    \ be more readable if it were split across two lines. To do this, use a backslash\
    \ \\ character at the end of the line to indicate that the statement continues\
    \ onto the next line. Here is an example:\n\n```\nif 'a' in string or 'b' in string\
    \ or 'c' in string \\ or 'd' in string or 'e' in string:\n```\n\nMake sure there\
    \ are no extra spaces after the backslash or you will get an error message.\n\n\
    If you are entering a list, dictionary, or the arguments of a function, the backslash\
