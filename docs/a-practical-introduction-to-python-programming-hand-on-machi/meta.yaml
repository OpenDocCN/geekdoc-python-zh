    # 20.7 Sound


    An easy way to get some simple sounds in your program is to use the winsound module.
    It only works with Windows, however. One function in winsound is Beep which can
    be used to play a tone at a given frequency for a given amount of time. Here is
    an example that plays a sound of 500 Hz for 1 second.


    ```

    from winsound import Beep

    Beep(500,1000)

    ```


    The first argument to Beep is the frequency in Hertz and the second is the duration
    in milliseconds.


    Another function in winsound is PlaySound, which can be used to play WAV files.
    Here is an example:


    ```

    from winsound import PlaySound

    Playsound(''soundfile.wav'', ''SND_ALIAS'')

    ```


    On the other hand, If you have Pygame installed, it is pretty easy to play any
    type of common sound file. This is shown below, and it works on systems other
    than Windows:


    ```

    import pygame

    pygame.mixer.init(18000,-16,2,1024)

    sound = pygame.mixer.Sound(''soundfile.wav'')

    sound.play()

    ```'
