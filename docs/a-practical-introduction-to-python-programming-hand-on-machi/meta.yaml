    \ x-y==7:\n            print(x,y)\n```\n\nExample 3 A Pythagorean triple is a\
    \ triple of numbers (x, y, z) such that x^2 + y^2 = z^2. For instance (3, 4, 5)\
    \ is a Pythagorean triple because 3^2 + 4^2 = 5^2. Pythagorean triples correspond\
    \ to triangles whose sides are all whole numbers (like a 3-4-5-triangle). Here\
    \ is a program that finds all the Pythagorean triples (x, y, z) where x, y, and\
    \ z are positive and less than 100.\n\n```\nfor x in range(1,100):\n    for y\
    \ in range(1,100):\n        for z in range(1,100):\n            if x**2+y**2==z**2:\n\
    \                print(x,y,z)\n```\n\nIf you run the program, you'll notice that\
    \ there are redundant solutions. For instance, (3, 4, 5) and (4, 3, 5) are both\
    \ listed. To get rid of these redundancies, change the second loop so that it\
    \ runs from x to 100. This way, when x is 4, for instance, the first value for\
    \ y that will be searched is 4, rather than 1, and so we won't get the redundant\
    \ (4, 3, 5). Also change the third loop so that it runs from y to 100.\n\nAs you\
    \ look through the solutions, you might also notice that there are many solutions\
    \ that are multiples of others, like (6, 8, 10), and (9, 12, 15) are multiples\
    \ of (3, 4, 5). The following program finds only primitive Pythagorean triples,\
    \ those that aren't multiples of another triple. The way it does this is every\
    \ time a new triple is found, it checks to make sure that x, y, and z are not\
    \ all divisible by the same number.\n\n```\nfor x in range(1,100):\n    for y\
    \ in range(x,100):\n        for z in range(y,100):\n            if x**2+y**2==z**2:\n\
    \                for i in range(2,x):\n                    if x%i==0 and y%i==0\
