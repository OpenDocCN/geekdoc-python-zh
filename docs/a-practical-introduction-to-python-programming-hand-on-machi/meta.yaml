  md: "# 15.5. BUTTONS\n\n```\nok_button = Button(text='Ok')\n```\n\nTo get the button\
    \ to do something when clicked, use the command argument. It is set to the name\
    \ of a function, called a callback function. When the button is clicked, the callback\
    \ function is called. Here is an example:\n\n```\nfrom tkinter import *\n\ndef\
    \ callback():\n    label.configure(text='Button clicked')\n\nroot = Tk()\nlabel\
    \ = Label(text='Not clicked')\nbutton = Button(text='Click me', command=callback)\n\
    \nlabel.grid(row=0, column=0)\nbutton.grid(row=1, column=0)\n\nmainloop()\n```\n\
    \nWhen the program starts, the label says Click me. When the button is clicked,\
    \ the callback function callback is called, which changes the label to say Button\
    \ clicked.\n\n![](img/b783d4b75e24755b056ee79a66b412de_156_0.png)\n\n**lambda\
    \ trick** Sometimes we will want to pass information to the callback function,\
    \ like if we have several buttons that use the same callback function and we want\
    \ to give the function information about which button is being clicked. Here is\
    \ an example where we create 26 buttons, one for each letter of the alphabet.\
    \ Rather than use 26 separate Button() statements and 26 different functions,\
    \ we use a list and one function.\n\n```\nfrom tkinter import *\nalphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'\n\
    \ndef callback(x):\n    label.configure(text='Button {} clicked'.format(alphabet[x]))\n\
    \nroot = Tk()\n\nlabel = Label()\nlabel.grid(row=1, column=0, columnspan=26)\n\
    \nbuttons = [0]*26 # create a list to hold 26 buttons\nfor i in range(26):\n \
    \   buttons[i] = Button(text=alphabet[i],\n                        command = lambda\
    \ x=i: callback(x))\n```"
