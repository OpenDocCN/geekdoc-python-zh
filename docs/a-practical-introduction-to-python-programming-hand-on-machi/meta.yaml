    Fraction(355, 113)


    The last example returns a pretty close fractional approximation to . It off by
    less than 0.0000003.


    **Greatest common divisor** The fractions module contains a useful function called
    gcd that returns the greatest common divisor of two numbers. Here is an example:


    ```

    from fractions import gcd

    print(''The largest factor 35 and 21 have in common is'', gcd(35, 21))

    ```


    The largest factor 35 and 21 have in common is 7


    # 22.5 The decimal module


    Python has a module called decimal for doing exact calculations with decimal numbers.
    As we''ve noted a few times now, some numbers, such as .3, cannot be represented
    exactly as a float. Here is'
