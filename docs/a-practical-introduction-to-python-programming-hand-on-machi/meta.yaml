    \   global image, photo\n    image=Image.open(filename).convert('RGB')\n    photo=ImageTk.PhotoImage(image)\n\
    \    canvas.configure(width=photo.width(), height=photo.height())\n    canvas.create_image(0,0,image=photo,anchor=NW)\n\
    \    root.title(filename)\n\nroot = Tk()\nbutton = Button(text='Change', font=('Verdana',\
    \ 18), command=change)\ncanvas = Canvas()\ncanvas.grid(row=0)\nbutton.grid(row=1)\n\
    load_file('pic.jpg')\n\nmainloop()\n```\n\nLet's first look at the load_file function.\
    \ Many of the image utilities are in the Image module. We give a name, image,\
    \ to the object created by the Image.open statement. We also use the convert method\
    \ to convert the image into RGB (Red-Green-Blue) format. We will see why in a\
    \ minute. The next line creates an ImageTk object called photo that gets drawn\
    \ to the Tkinter canvas. The photo object has methods that allow us to get its\
    \ width and height so we can size the canvas appropriately.\n\nNow look at the\
    \ change function. The image object has a method called load that gives access\
    \ to the individual pixels that make up the image. This returns a two-dimensional\
    \ array of RGB values. For instance, if the pixel in the upper left corner of\
    \ the image is pure white, then pix[0,0] will be (255,255,255). If the next pixel\
    \ to the right is pure black, pix[1,0] will be (0,0,0). To convert the image to\
    \ grayscale, for each pixel we take the average of its red, green, and blue components,\
    \ and reset the red, green, and blue components to all equal that average. Remember\
    \ that if the red, green, and blue are all the same, then the color is a shade\
    \ of gray. After modifying all the pixels, we create a new ImageTk object from\
    \ the modified pixel data and display it on the canvas.\n\nYou can have a lot\
    \ of fun with this. Try modifying the change function. For instance, if we use\
    \ the following line in the change function, we get an effect that looks like\
    \ a photo negative:\n\n```\npix[i,j] = (255-red, 255-green, 255-blue)\n```\n\n\
    Try seeing what interesting effects you can come up with.\n\nNote, though, that\
    \ this way of manipulating images is the slow, manual way. PIL has a number of\
    \ much faster functions for modifying images. You can very easily change the brightness,\
    \ hue, and contrast of images, resize them, rotate them, and much more. See the\
    \ PIL reference materials for more on this."
- md: "## 18.2 Image Processing\n\n**putdata** If you are interested in drawing mathematical\
    \ objects like fractals, plotting points pixel-by-pixel can be very slow in Python.\
    \ One way to speed things up is to use the putdata method. The way it works is\
    \ you supply it with a list of RGB pixel values, and it will copy it into your\
    \ image. Here is a program that plots a 300x300 grid of random colors.\n\n```python\n\
    from random import randint\nfrom Tkinter import *\nfrom PIL import Image, ImageTk\n\
    \nroot = Tk()\ncanvas = Canvas(width=300, height=300)\ncanvas.grid()\nimage=Image.new(mode='RGB',size=(300,300))\n\
    \nL = [(randint(0,255), randint(0,255), randint(0,255))\n    for x in range(300)\
    \ for y in range(300)]\n\nimage.putdata(L)\n\nphoto=ImageTk.PhotoImage(image)\n\
    canvas.create_image(0,0,image=photo,anchor=NW)\nmainloop()\n```\n\n![](img/b783d4b75e24755b056ee79a66b412de_190_0.png)\n\
    \n**ImageDraw** The ImageDraw module gives another way to draw onto images. It\
    \ can be used to draw rectangles, circles, points, and more, just like Tkinter\
    \ canvases, but it is faster. Here is a short example that fills the image with\
    \ a dark blue color and then 100 randomly distributed yellow points.\n\n```python\n\
    from random import randint\nfrom Tkinter import *\nfrom PIL import Image, ImageTk,\
    \ ImageDraw\n\nroot = Tk()\ncanvas = Canvas(width=300, height=300)\ncanvas.grid()\n\
    image=Image.new(mode='RGB',size=(300,300))\ndraw = ImageDraw.Draw(image)\n\ndraw.rectangle([(0,0),(300,\
    \ 300)],fill='#000030')\nL = [(randint(0,299), randint(0, 299)) for i in range(100)]\n\
    draw.point(L, fill='yellow')\n\nphoto=ImageTk.PhotoImage(image)\ncanvas.create_image(0,0,image=photo,anchor=NW)\n\
    mainloop()\n```\n\nTo use ImageDraw, we have to first create an ImageDraw object\
    \ and tie it to the Image object. The draw.rectangle method works similarly to\
    \ the create_rectangle method of canvases, except for a few differences with parentheses.\
    \ The draw.point method is used to plot individual pixels. A nice feature of it\
    \ is we can pass a list of points instead of having to plot each thing in the\
    \ list separately. Passing a list is also much faster.\n\n## 18.3 Pygame\n\nPygame\
    \ is a library for creating two-dimensional games in Python. It can be used to\
    \ make games at the level of old arcade or Nintendo games. It can be downloaded\
    \ and easily installed from www.pygame.org. There are a number of tutorials there\
    \ to help you get started. I don't know a whole lot about Pygame, so I won't cover\
    \ it here, though perhaps in a later edition I will.\n\n# Part III\n\n## Intermediate\
    \ Topics\n\n# Chapter 19\n\n## Miscellaneous topics III\n\nIn this chapter we\
    \ examine a variety of useful topics.\n\n## 19.1 Mutability and References\n\n\
    If L is a list and s is a string, then L[0] gives the first element of the list\
    \ and s[0] the first element of the string. If we want to change the first element\
    \ of the list to 3, L[0]=3 will do it. But we cannot change a string this way.\
    \ The reason has to do with how Python treats lists and strings. Lists (and dictionaries)\
    \ are said to be mutable, which means their contents can change. Strings, on the\
    \ other hand, are immutable, which means they cannot be changed. The reason strings\
    \ are immutable is partly for performance (immutable objects are faster) and partly\
    \ because strings are thought of as fundamental in the same way that numbers are.\
    \ It makes some other aspects of the language easier as well.\n\n**Making copies**\
    \ Another place that lists and strings differ is when we try to make copies. Consider\
    \ the following code:\n\n```python\ns = 'Hello'\ncopy = s\ns = s + '!!!'\nprint('s\
    \ is now:', s, ' Copy:', copy)\n```\n\ns is now: Hello!!! Copy: Hello\n\nIn the\
    \ code above we make a copy of s and then change s. Everything works as we would\
    \ intuitively expect. Now look at similar code with lists:\n\n```python\nL = [1,2,3]\n\
    copy = L\nL[0]=9\nprint('L is now:', L, ' Copy:', copy)\n```\n\nL is now: [9,\
    \ 2, 3] Copy: [9, 2, 3]\n\nWe can see that the list code did not work as we might\
    \ have expected. When we changed L, the copy got changed as well. As mentioned\
    \ in Chapter 7, the proper way to make a copy of L is copy=L[:]. The key to understanding\
    \ these examples is references.\n\n**References** Everything in Python is an object.\
    \ This includes numbers, strings, and lists. When we do a simple variable assignment,\
    \ like x=487, what actually happens is Python creates an integer object with the\
    \ value 487, and the variable x acts as a reference to that object. It's not that\
    \ the value 487 is stored in a memory location named x, but rather that 487 is\
    \ stored somewhere in memory, and x points to that location. If we come along\
    \ and declare y=487, then y also points to that same memory location.\n\nOn the\
    \ other hand, if we then come along and say x=721, what happens is we create a\
    \ new integer object with value 721 somewhere in memory and x now points at that.\
    \ The 487 still exists in memory where it was and it will stay there at least\
    \ until there is nothing left pointing at it, at which point its memory location\
    \ will be free to use for something else.\n\nAll objects are treated the same\
    \ way. When we set s='Hello', the string object Hello is somewhere in memory and\
    \ s is a reference to it. When we then say copy=s, we are actually saying that\
    \ copy is another reference to 'Hello'. If we then do s=s+'!!!', what happens\
    \ is a new object 'Hello!!!' is created and because we assigned s to it, s is\
    \ now a reference to that new object, 'Hello!!!'. Remember that strings are immutable,\
    \ so there is no changing 'Hello' into something. Rather, Python creates a new\
    \ object and points the variable s to it.\n\nWhen we set L=[1,2,3], we create\
    \ a list object [1,2,3] and a reference, L, to it. When we say copy=L, we are\
    \ making another reference to the object [1,2,3]. When we do L[0]=9, because lists\
    \ are mutable, the list [1,2,3] is changed, in place, to [9,2,3]. No new object\
    \ is created. The list [1,2,3] is now gone, and since copy is still pointing to\
    \ the same location, its value is [9,2,3].\n\nOn the other hand, if we instead\
    \ use copy=L[:], we are actually creating a new list object somewhere else in\
    \ memory so that there are two copies of [1,2,3] in memory. Then when we do L[0]=9,\
    \ we are only changing the thing that L points to, and copy still points to [1,2,3].\n\
    \nJust one further note to drive the point home. If we set x=487 and then set\
    \ x=721, we are first creating an integer object 487 and pointing x to it. When\
    \ we then set x=721, we are creating a new integer object 721 and pointing x to\
    \ it. The net effect is that it seems like the \"value\" of x is changing, but\
    \ what is in fact changing is what x is pointing to.\n\n**Garbage collection**\
    \ Internally Python maintains a count of how many references there are to each\
    \ object. When the reference count of an object drops to 0, then the object is\
    \ no longer needed, and the memory it had been using becomes available again.\n\
    \n## 19.2 Tuples\n\nA tuple is essentially an immutable list. Below is a list\
    \ with three elements and a tuple with three elements:\n\n```python\nL = [1,2,3]\n\
    t = (1,2,3)\n```\n\nTuples are enclosed in parentheses, though the parentheses\
    \ are actually optional. Indexing and slicing work the same as with lists. As\
    \ with lists, you can get the length of the tuple by using the `len` function,\
    \ and, like lists, tuples have count and index methods. However, since a tuple\
    \ is immutable, it does not have any of the other methods that lists have, like\
    \ sort or reverse, as those change the list.\n\nWe have seen tuples in a few places\
    \ already. For instance, fonts in Tkinter are specified as pairs, like ('Verdana',\
    \ 14), and sometimes as triples. The dictionary method items returns a list of\
    \ tuples. Also, when we use the following shortcut for exchanging the value of\
    \ two or more variables, we are actually using tuples:\n\n```python\na,b = b,a\n\
    ```\n\nOne reason why there are both lists and tuples is that in some situations,\
    \ you might want an immutable type of list. For instance, lists cannot serve as\
    \ keys in dictionaries because the values of lists can change and it would be\
    \ a nightmare for Python dictionaries to have to keep track of. Tuples, however,\
    \ can serve as keys in dictionaries. Here is an example assigning grades to teams\
    \ of students:\n\n```python\ngrades = {('John', 'Ann'): 95, ('Mike', 'Tazz'):\
    \ 87}\n```\n\nAlso, in situations where speed really matters, tuples are generally\
    \ faster than lists. The flexibility of lists comes with a corresponding cost\
    \ in speed.\n\n**tuple** To convert an object into a tuple, use `tuple`. The following\
    \ example converts a list and a string into tuples:\n\n```python\nt1 = tuple([1,2,3])\n\
    t2 = tuple('abcde')\n```\n\n**Note** The empty tuple is (). The way to get a tuple\
    \ with one element is like this: (1,). Something like (1) will not work because\
    \ that just evaluates to 1 as in an ordinary calculation. For instance, in the\
    \ expression 2+(3*4), we don't want the (3*4) to be a tuple, we want it to evaluate\
    \ to a number.\n\n## 19.3 Sets\n\nPython has a data type called a set. Sets work\
    \ like mathematical sets. They are a lot like lists with no repeats. Sets are\
    \ denoted by curly braces, like below:"
  mdcn: "## 18.2 图像处理\n\n**putdata** 如果你对绘制分形等数学图形感兴趣，在Python中逐像素绘制点可能会非常慢。一种加速方法是使用`putdata`方法。其工作原理是向它提供一个RGB像素值列表，它会将这些值复制到你的图像中。下面是一个绘制300x300随机颜色网格的程序。\n\
    \n```python\nfrom random import randint\nfrom Tkinter import *\nfrom PIL import\
    \ Image, ImageTk\n\nroot = Tk()\ncanvas = Canvas(width=300, height=300)\ncanvas.grid()\n\
    image=Image.new(mode='RGB',size=(300,300))\n\nL = [(randint(0,255), randint(0,255),\
    \ randint(0,255))\n    for x in range(300) for y in range(300)]\n\nimage.putdata(L)\n\
    \nphoto=ImageTk.PhotoImage(image)\ncanvas.create_image(0,0,image=photo,anchor=NW)\n\
    mainloop()\n```\n\n![](img/b783d4b75e24755b056ee79a66b412de_190_0.png)\n\n**ImageDraw**\
    \ ImageDraw模块提供了另一种在图像上绘制的方法。它可以用来绘制矩形、圆形、点等，就像Tkinter画布一样，但速度更快。下面是一个简短的例子，它用深蓝色填充图像，然后绘制100个随机分布的黄色点。\n\
    \n```python\nfrom random import randint\nfrom Tkinter import *\nfrom PIL import\
    \ Image, ImageTk, ImageDraw\n\nroot = Tk()\ncanvas = Canvas(width=300, height=300)\n\
    canvas.grid()\nimage=Image.new(mode='RGB',size=(300,300))\ndraw = ImageDraw.Draw(image)\n\
    \ndraw.rectangle([(0,0),(300, 300)],fill='#000030')\nL = [(randint(0,299), randint(0,\
    \ 299)) for i in range(100)]\ndraw.point(L, fill='yellow')\n\nphoto=ImageTk.PhotoImage(image)\n\
    canvas.create_image(0,0,image=photo,anchor=NW)\nmainloop()\n```\n\n要使用ImageDraw，我们必须首先创建一个ImageDraw对象并将其与Image对象关联。`draw.rectangle`方法的工作方式类似于画布的`create_rectangle`方法，只是括号的使用有些不同。`draw.point`方法用于绘制单个像素。它的一个优点是，我们可以传递一个点列表，而不必单独绘制列表中的每个项目。传递列表也快得多。\n\
    \n## 18.3 Pygame\n\nPygame是一个用于在Python中创建二维游戏的库。它可以用来制作老式街机或任天堂游戏级别的游戏。可以从www.pygame.org下载并轻松安装。那里有许多教程可以帮助你入门。我对Pygame了解不多，所以这里不会详细介绍，不过也许在后续版本中会涉及。\n\
    \n# 第三部分\n\n## 中级主题\n\n# 第19章\n\n## 杂项主题 III\n\n在本章中，我们将探讨各种有用的主题。\n\n## 19.1\
    \ 可变性与引用\n\n如果`L`是一个列表，`s`是一个字符串，那么`L[0]`给出列表的第一个元素，`s[0]`给出字符串的第一个元素。如果我们想将列表的第一个元素更改为3，`L[0]=3`就可以做到。但我们不能用这种方式更改字符串。原因与Python处理列表和字符串的方式有关。列表（和字典）被称为可变的，这意味着它们的内容可以更改。另一方面，字符串是不可变的，这意味着它们不能被更改。字符串不可变的原因部分是为了性能（不可变对象更快），部分是因为字符串被认为是与数字一样的基本元素。这也使得语言的其他一些方面更容易处理。\n\
    \n**制作副本** 列表和字符串的另一个不同之处在于我们尝试制作副本时。考虑以下代码：\n\n```python\ns = 'Hello'\ncopy =\
    \ s\ns = s + '!!!'\nprint('s is now:', s, ' Copy:', copy)\n```\n\ns is now: Hello!!!\
    \ Copy: Hello\n\n在上面的代码中，我们制作了`s`的一个副本，然后更改了`s`。一切都如我们直观预期的那样工作。现在看看使用列表的类似代码：\n\
    \n```python\nL = [1,2,3]\ncopy = L\nL[0]=9\nprint('L is now:', L, ' Copy:', copy)\n\
    ```\n\nL is now: [9, 2, 3] Copy: [9, 2, 3]\n\n我们可以看到，列表代码没有像我们预期的那样工作。当我们更改`L`时，副本也随之更改。正如第7章所述，制作`L`副本的正确方法是`copy=L[:]`。理解这些例子的关键在于引用。\n\
    \n**引用** Python中的一切都是对象。这包括数字、字符串和列表。当我们进行简单的变量赋值，比如`x=487`时，实际发生的是Python创建了一个值为487的整数对象，而变量`x`充当对该对象的引用。并不是值487存储在名为`x`的内存位置，而是487存储在内存中的某个地方，`x`指向那个位置。如果我们接着声明`y=487`，那么`y`也指向同一个内存位置。\n\
    \n另一方面，如果我们接着说`x=721`，发生的是我们在内存中的某个地方创建了一个值为721的新整数对象，`x`现在指向它。487仍然存在于它原来的内存位置，并且至少会一直存在，直到没有任何东西指向它，此时它的内存位置将可以被其他东西使用。\n\
    \n所有对象都以相同的方式处理。当我们设置`s='Hello'`时，字符串对象`Hello`在内存中的某个地方，`s`是它的引用。当我们接着说`copy=s`时，我们实际上是在说`copy`是`'Hello'`的另一个引用。如果我们接着做`s=s+'!!!'`，发生的是创建了一个新对象`'Hello!!!'`，并且因为我们将其赋值给`s`，所以`s`现在是那个新对象`'Hello!!!'`的引用。记住字符串是不可变的，所以不能将`'Hello'`更改为其他内容。相反，Python创建一个新对象并将变量`s`指向它。\n\
    \n当我们设置`L=[1,2,3]`时，我们创建了一个列表对象`[1,2,3]`和一个指向它的引用`L`。当我们说`copy=L`时，我们是在创建另一个指向对象`[1,2,3]`的引用。当我们做`L[0]=9`时，因为列表是可变的，列表`[1,2,3]`被就地更改为`[9,2,3]`。没有创建新对象。列表`[1,2,3]`现在消失了，由于`copy`仍然指向同一个位置，它的值是`[9,2,3]`。\n\
    \n另一方面，如果我们改用`copy=L[:]`，我们实际上是在内存中的其他地方创建了一个新的列表对象，这样内存中就有两个`[1,2,3]`的副本。然后当我们做`L[0]=9`时，我们只更改了`L`指向的东西，而`copy`仍然指向`[1,2,3]`。\n\
    \n再补充一点以强调这一点。如果我们设置`x=487`，然后设置`x=721`，我们首先创建一个整数对象487并将`x`指向它。当我们接着设置`x=721`时，我们创建了一个新的整数对象721并将`x`指向它。最终效果是`x`的“值”似乎在改变，但实际上改变的是`x`指向的东西。\n\
    \n**垃圾回收** 在内部，Python维护着每个对象的引用计数。当一个对象的引用计数降至0时，该对象就不再需要，它之前使用的内存将再次可用。\n\n##\
    \ 19.2 元组\n\n元组本质上是一个不可变的列表。下面是一个包含三个元素的列表和一个包含三个元素的元组：\n\n```python\nL = [1,2,3]\n\
    t = (1,2,3)\n```\n\n元组用括号括起来，尽管括号实际上是可选的。索引和切片的工作方式与列表相同。与列表一样，你可以使用`len`函数获取元组的长度，并且像列表一样，元组有`count`和`index`方法。然而，由于元组是不可变的，它没有列表具有的其他方法，比如`sort`或`reverse`，因为这些方法会更改列表。\n\
    \n我们已经在几个地方见过元组了。例如，Tkinter中的字体被指定为对，如`('Verdana', 14)`，有时是三元组。字典方法`items`返回一个元组列表。此外，当我们使用以下快捷方式交换两个或多个变量的值时，我们实际上是在使用元组：\n\
    \n```python\na,b = b,a\n```\n\n同时存在列表和元组的一个原因是，在某些情况下，你可能需要一个不可变的列表类型。例如，列表不能用作字典的键，因为列表的值可以更改，而Python字典必须跟踪这些变化将是一场噩梦。然而，元组可以用作字典的键。下面是一个为学生团队分配成绩的例子：\n\
    \n```python\ngrades = {('John', 'Ann'): 95, ('Mike', 'Tazz'): 87}\n```\n\n此外，在速度确实至关重要的情况下，元组通常比列表更快。列表的灵活性伴随着相应的速度成本。\n\
    \n**tuple** 要将对象转换为元组，请使用`tuple`。以下示例将一个列表和一个字符串转换为元组：\n\n```python\nt1 = tuple([1,2,3])\n\
    t2 = tuple('abcde')\n```\n\n**注意** 空元组是`()`。获取包含一个元素的元组的方法是这样的：`(1,)`。像`(1)`这样的形式将不起作用，因为它只是像普通计算一样求值为1。例如，在表达式`2+(3*4)`中，我们不希望`(3*4)`是一个元组，我们希望它求值为一个数字。\n\
    \n## 19.3 集合\n\nPython有一种称为集合的数据类型。集合的工作方式类似于数学集合。它们很像没有重复项的列表。集合用花括号表示，如下所示："
