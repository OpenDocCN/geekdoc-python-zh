    \ the code for all the object's methods.\n\n**A simple example** Here is a simple\
    \ example to demonstrate what a class looks like. It does not do anything interesting.\n\
    \n```\nclass Example:\n    def __init__(self, a, b):\n        self.a = a\n   \
    \     self.b = b\n\n    def add(self):\n        return self.a + self.b\n\ne =\
    \ Example(8, 6)\nprint(e.add())\n```\n\n+   - To create a class, we use the `class`\
    \ statement. Class names usually start with a capital.\n- Most classes will have\
    \ a method called `__init__`. The underscores indicate that it is a special kind\
    \ of method. It is called a constructor, and it is automatically called when someone\
    \ creates a new object from your class. The constructor is usually used to set\
    \ up the class's variables. In the above program, the constructor takes two values,\
    \ a and b, and assigns the class variables a and b to those values.\n- The first\
    \ argument to every method in your class is a special variable called `self`.\
    \ Every time your class refers to one of its variables or methods, it must precede\
    \ them by `self`. The purpose of `self` is to distinguish your class's variables\
    \ and methods from other variables and functions in the program.\n- To create\
    \ a new object from the class, you call the class name along with any values that\
    \ you want to send to the constructor. You will usually want to assign it to a\
    \ variable name. This is what the line e=Example(8,6) does.\n- To use the object's\
    \ methods, use the dot operator, as in e.addmod().\n\n**A more practical example**\
    \ Here is a class called Analyzer that performs some simple analysis on a string.\
    \ There are methods to return how many words are in the string, how many are of\
    \ a given length, and how many start with a given string.\n\n```\nfrom string\
    \ import punctuation\n\nclass Analyzer:\n    def __init__(self, s):\n        for\
    \ c in punctuation:\n            s = s.replace(c, '')\n```"
