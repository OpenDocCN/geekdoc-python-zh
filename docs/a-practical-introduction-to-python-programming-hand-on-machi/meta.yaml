  - "[PAGE 36]\n\n# Chapter 4\n\n# If statements\n\nQuite often in programs we only\
    \ want to do something provided something else is true. Python's **if** statement\
    \ is what we need.\n\n# 4.1 A Simple Example\n\nLet's try a guess-a-number program.\
    \ The computer picks a random number, the player tries to guess, and the program\
    \ tells them if they are correct. To see if the player's guess is correct, we\
    \ need something new, called an if statement.\n\n```\nfrom random import randint\n\
    \nnum = randint(1,10)\nguess = eval(input('Enter your guess: '))\nif guess==num:\n\
    \    print('You got it!')\n```\n\nThe syntax of the if statement is a lot like\
    \ the **for** statement in that there is a colon at the end of the if condition\
    \ and the following line or lines are indented. The lines that are indented will\
    \ be executed only if the condition is true. Once the indentation is done with,\
    \ the if block is concluded.\n\nThe guess-a-number game works, but it is pretty\
    \ simple. If the player guesses wrong, nothing happens. We can add to the if statement\
    \ as follows:\n\n```\nif guess==num:\n    print('You got it!')\nelse:\n    print('Sorry.\
    \ The number is ', num)\n```\n\nWe have added an **else** statement, which is\
    \ like an \"otherwise.\""
  - "[PAGE 37]\n\n# 4.2 Conditional operators\n\nThe comparison operators are ==,\
    \ >, <, >=, <=, and !=. That last one is for not equals. Here are a few examples:\n\
    \n| Expression | Description |\n| :--- | :--- |\n| if x>3: | if x is greater than\
    \ 3 |\n| if x>=3: | if x is greater than or equal to 3 |\n| if x==3: | if x is\
    \ 3 |\n| if x!=3: | if x is not 3 |\n\nThere are three additional operators used\
    \ to construct more complicated conditions: and, or, and not. Here are some examples:\n\
    \n```\nif grade>=80 and grade<90:\n    print('Your grade is a B.')\n\nif score>1000\
    \ or time>20:\n    print('Game over.')\n\nif not (score>1000 or time>20):\n  \
    \  print('Game continues.')\n```\n\n**Order of operations** In terms of order\
    \ of operations, and is done before or, so if you have a complicated condition\
    \ that contains both, you may need parentheses around the or condition. Think\
    \ of and as being like multiplication and or as being like addition. Here is an\
    \ example:\n\n```\nif (score<1000 or time>20) and turns_remaining==0:\n    print('Game\
    \ over.')\n```\n\n# 4.3 Common Mistakes\n\n**Mistake 1** The operator for equality\
    \ consists of two equals signs. It is a really common error to forget one of the\
    \ equals signs.\n\n| Incorrect | Correct |\n| :--- | :--- |\n| if x=1: | if x==1:\
    \ |\n\n**Mistake 2** A common mistake is to use and where or is needed or vice-versa.\
    \ Consider the following if statements:\n\n```\nif x>1 and x<100:\nif x>1 or x<100:\n\
    ```"
  - "[PAGE 38]\n\nThe first statement is the correct one. If x is any value between\
    \ 1 and 100, then the statement will be true. The idea is that x has to be both\
    \ greater than 1 and less than 100. On the other hand, the second statement is\
    \ not what we want because for it to be true, either x has to be greater than\
    \ 1 or x has to be less than 100. But every number satisfies this. The lesson\
    \ here is if your program is not working correctly, check your and's and or's.\n\
    \n**Mistake 3** Another very common mistake is to write something like below:\n\
    \n```\nif grade>=80 and <90:\n```\n\nThis will lead to a syntax error. We have\
    \ to be explicit. The correct statement is\n\n```\nif grade>=80 and grade<90:\n\
    ```\n\nOn the other hand, there is a nice shortcut that does work in Python (though\
    \ not in many other programming languages):\n\n```\nif 80<=grade<90:\n```\n\n\
    # 4.4 elif\n\nA simple use of an if statement is to assign letter grades. Suppose\
