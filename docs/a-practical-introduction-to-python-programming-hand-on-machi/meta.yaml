    # 16.9. EVENT EXAMPLES


    ![](img/b783d4b75e24755b056ee79a66b412de_176_0.png)


    Here are a few notes about how the program works:


    +   1. First, every time the mouse is moved over the canvas, the mouse_motion_event
    function is called. This function prints the mouse''s current coordinates which
    are contained in the Event attributes x and y.

    2. The wheel_event function is called whenever the user uses the mouse (scrolling)
    wheel. The Event attribute delta contains information about how quickly and in
    what direction the wheel was moved. We just stretch or shrink the rectangle based
    on whether the wheel was moved forward or backward.

    3. The b1_event function is called whenever the user presses the left mouse button.
    The function changes the color of the rectangle whenever the rectangle is clicked.
    There is a global variable here called b1_drag that is important. It is set to
    True whenever the user is dragging the rectangle. When dragging is going on, the
    left mouse button is down and the b1_event function is continuously being called.
    We don''t want to keep changing the color of the rectangle in that case, hence
    the if statement.

    4. The dragging is accomplished mostly in the b1_motion_event function, which
    is called whenever the left mouse button is down and the mouse is being moved.
    It uses global variables that keep track of what the mouse''s position was the
    last time the function was called, and then moves the rectangle according to the
    difference between the new and old position.

    When the dragging is down, the left mouse button will be released. When that happens,
    the b1_release_event function is called, and we set the global b1_drag variable
    accordingly.

    5. The focus_set method is needed because the canvas will not recognize the mouse
    wheel events unless the focus is on the canvas.

    6. One problem with this program is that the user can modify the rectangle by
    clicking anywhere on the canvas, not just on rectangle itself. If we only want
    the changes to happen when the mouse is over the rectangle, we could specifically
    bind the rectangle instead of the whole canvas, like below:


    ```

    canvas.tag_bind(rect, ''<B1-Motion>'', b1_motion_event)

    ```'
