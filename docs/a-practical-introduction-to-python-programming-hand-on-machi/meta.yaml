  - "[PAGE 23]\n\nIf we want the list of values to start at a value other than 0,\
    \ we can do that by specifying the starting value. The statement `range(1,5)`\
    \ will produce the list 1, 2, 3, 4. This brings up one quirk of the `range` function—it\
    \ stops one short of where we think it should. If we wanted the list to contain\
    \ the numbers 1 through 5 (including 5), then we would have to do `range(1,6)`.\n\
    \nAnother thing we can do is to get the list of values to go up by more than one\
    \ at a time. To do this, we can specify an optional step as the third argument.\
    \ The statement `range(1,10,2)` will step through the list by twos, producing\
    \ 1, 3, 5, 7, 9.\n\nTo get the list of values to go backwards, we can use a step\
    \ of -1. For instance, `range(5,1,-1)` will produce the values 5, 4, 3, 2, in\
    \ that order. (Note that the `range` function stops one short of the ending value\
