  md: "# Chapter 4\n\n# If statements\n\nQuite often in programs we only want to do\
    \ something provided something else is true. Python's **if** statement is what\
    \ we need.\n\n# 4.1 A Simple Example\n\nLet's try a guess-a-number program. The\
    \ computer picks a random number, the player tries to guess, and the program tells\
    \ them if they are correct. To see if the player's guess is correct, we need something\
    \ new, called an if statement.\n\n```\nfrom random import randint\n\nnum = randint(1,10)\n\
    guess = eval(input('Enter your guess: '))\nif guess==num:\n    print('You got\
    \ it!')\n```\n\nThe syntax of the if statement is a lot like the **for** statement\
    \ in that there is a colon at the end of the if condition and the following line\
    \ or lines are indented. The lines that are indented will be executed only if\
    \ the condition is true. Once the indentation is done with, the if block is concluded.\n\
    \nThe guess-a-number game works, but it is pretty simple. If the player guesses\
    \ wrong, nothing happens. We can add to the if statement as follows:\n\n```\n\
    if guess==num:\n    print('You got it!')\nelse:\n    print('Sorry. The number\
    \ is ', num)\n```\n\nWe have added an **else** statement, which is like an \"\
    otherwise.\""
  merge: -1
  pgno: 36
