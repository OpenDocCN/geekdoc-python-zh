  - "[PAGE 69]\n\n# 7.5 Miscellaneous\n\n**Making copies of lists** Making copies\
    \ of lists is a little tricky due to the way Python handles lists. Say we have\
    \ a list L and we want to make a copy of the list and call it M. The expression\
    \ M=L will not work for reasons covered in Section 19.1. For now, do the following\
    \ in place of M=L:\n\n```\nM = L[:]\n```\n\n**Changing lists** Changing a specific\
    \ item in a list is easier than with strings. To change the value in location\
    \ 2 of L to 100, we simply say L[2]=100. If we want to insert the value 100 into\
    \ location 2 without overwriting what is currently there, we can use the insert\
    \ method. To delete an entry from a list, we can use the `del` operator. Some\
    \ examples are shown below. Assume L=[6,7,8] for each operation.\n\n| Operation\
    \ | New L | Description |\n| :--- | :--- | :--- |\n| L[1]= 9 | [6,9, 8] | replace\
    \ item at index 1 with 9 |\n| L.insert(1,9) | [6,9, 7, 8] | insert a 9 at index\
    \ 1 without replacing |\n| del L[1] | [6,8] | delete second item |\n| del L[:2]\
    \ | [8] | delete first two items |\n\n# 7.6 Examples\n\n**Example 1** Write a\
    \ program that generates a list L of 50 random numbers between 1 and 100.\n\n\
    ```\nfrom random import randint\nL = []\nfor i in range(50):\n    L.append(randint(1,100))\n\
    ```\n\nWe use the append method to build up the list one item at a time starting\
    \ with the empty list, []. An alternative to append is to use the following:\n\
    \n```\nL = L + [randint(1,100)]\n```\n\n**Example 2** Replace each element in\
    \ a list L with its square.\n\n```\nfor i in range(len(L)):\n    L[i] = L[i]**2\n\
    ```\n\n**Example 3** Count how many items in a list L are greater than 50."
