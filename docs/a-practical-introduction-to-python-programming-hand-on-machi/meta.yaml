- md: "## 5.3 Swapping\n\nQuite often we will want to swap the values of two variables,\
    \ x and y. It would be tempting to try the following:\n\n```\nx = y\ny = x\n```\n\
    \nBut this will not work. Suppose x is 3 and y is 5. The first line will set x\
    \ to 5, which is good, but then the second line will set y to 5 also because x\
    \ is now 5. The trick is to use a third variable to save the value of x:\n\n```\n\
    hold = x\nx = y\ny = hold\n```\n\nIn many programming languages, this is the usual\
    \ way to swap variables. Python, however, provides a nice shortcut:\n\n```\nx,y\
    \ = y,x\n```\n\nWe will learn later exactly why this works. For now, feel free\
    \ to use whichever method you prefer. The latter method, however, has the advantage\
    \ of being shorter and easier to understand.\n\n## 5.4 Flag variables\n\nA flag\
    \ variable can be used to let one part of your program know when something happens\
    \ in another part of the program. Here is an example that determines if a number\
    \ is prime.\n\n```\nnum = eval(input('Enter number: '))\n\nflag = 0\nfor i in\
    \ range(2,num):\n    if num%i==0:\n        flag = 1\n\nif flag==1:\n    print('Not\
    \ prime')\nelse:\n    print('Prime')\n```\n\nRecall that a number is prime if\
    \ it has no divisors other than 1 and itself. The way the program above works\
    \ is flag starts off at 0. We then loop from 2 to num-1. If one of those values\
    \ turns out to be a divisor, then flag gets set to 1. Once the loop is finished,\
    \ we check to see if the flag got set or not. If it did, we know there was a divisor,\
    \ and num isn't prime. Otherwise, the number must be prime.\n\n## 5.5 Maxes and\
    \ mins\n\nA common programming task is to find the largest or smallest value in\
    \ a series of values. Here is an example where we ask the user to enter ten positive\
    \ numbers and then we print the largest one.\n\n```\nlargest = eval(input('Enter\
    \ a positive number: '))\nfor i in range(9):\n    num = eval(input('Enter a positive\
    \ number: '))\n    if num>largest:\n        largest=num\nprint('Largest number:',\
    \ largest)\n```\n\nThe key here is the variable largest that keeps track of the\
    \ largest number found so far. We start by setting it equal to the the user's\
    \ first number. Then, every time we get a new number from the user, we check to\
    \ see if the user's number is larger than the current largest value (which is\
    \ stored in largest). If it is, then we set largest equal to the user's number.\n\
    \nIf, instead, we want the smallest value, the only change necessary is that >\
    \ becomes <, though it would also be good to rename the variable largest to smallest.\n\
    \nLater on, when we get to lists, we will see a shorter way to find the largest\
    \ and smallest values, but the technique above is useful to know since you may\
    \ occasionally run into situations where the list way won't do everything you\
    \ need it to do.\n\n## 5.6 Comments\n\nA comment is a message to someone reading\
    \ your program. Comments are often used to describe what a section of code does\
    \ or how it works, especially with tricky sections of code. Comments have no effect\
    \ on your program.\n\n**Single-line comments** For a single-line comment, use\
    \ the # character.\n\n```\n# a slightly sneaky way to get two values at once\n\
    num1, num2 = eval(input('Enter two numbers separated by commas: '))\n```\n\nYou\
    \ can also put comments at the end of a line:\n\n```\ncount = count + 2      \
    \    # each divisor contributes two the count\n```\n\n**Multi-line comments**\
    \ For comments that span several lines, you can use triple quotes.\n\n```\n\"\"\
    \"\n    Program name: Hello world\n    Author: Brian Heinold\n    Date: 1/9/11\
    \ \"\"\"\n\nprint('Hello world')\n```\n\nOne nice use for the triple quotes is\
    \ to comment out parts of your code. Often you will want to modify your program\
    \ but don't want to delete your old code in case your changes don't work. You\
    \ could comment out the old code so that it is still there if you need it, and\
    \ it will be ignored when your new program is run. Here is a simple example:\n\
    \n```\n\"\"\"\nprint('This line and the next are inside a comment.')\nprint('These\
    \ lines will not get executed.')\n\"\"\"\n\nprint('This line is not in a comment\
    \ and it will be executed.')\n```\n\n## 5.7 Simple debugging\n\nHere are two simple\
    \ techniques for figuring out why a program is not working:\n\n1. Use the Python\
    \ shell. After your program has run, you can type in the names of your program's\
    \ variables to inspect their values and see which ones have the values you expect\
    \ them to have and which don't. You can also use the Shell to type in small sections\
    \ of your program and see if they are working.\n2. Add print statements to your\
    \ program. You can add these at any point in your program to see what the values\
    \ of your variables are. You can also add a print statement to see if a point\
    \ in your code is even being reached. For instance, if you think you might have\
    \ an error in a condition of an if statement, you can put a print statement into\
    \ the if block to see if the condition is being triggered.\n\nHere is an example\
    \ from the part of the primes program from earlier in this chapter. We put a print\
    \ statement into the for loop to see exactly when the flag variable is being set:\n\
    \n```\nflag = 0\nnum = eval(input('Enter number: '))\nfor i in range(2,num):\n\
    \    if num%i==0:\n        flag = 1\n    print(i, flag)\n```\n\n3. An empty input\
    \ statement, like below, can be used to pause your program at a specific point:\
    \ `input()`\n\n## 5.8 Example programs\n\nIt is a valuable skill is to be able\
    \ to read code. In this section we will look in depth at some simple programs\
    \ and try to understand how they work.\n\n**Example 1** The following program\
    \ prints Hello a random number of times between 5 and 25.\n\n```\nfrom random\
    \ import randint\n\nrand_num = randint(5,25)\nfor i in range(rand_num):\n    print('Hello')\n\
    ```\n\nThe first line in the program is the import statement. This just needs\
    \ to appear once, usually near the beginning of your program. The next line generates\
    \ a random number between 5 and 25. Then, remember that to repeat something a\
    \ specified number of times, we use a for loop. To repeat something 50 times,\
    \ we would use `range(50)` in our for loop. To repeat something 100 times, we\
    \ would use `range(100)`. To repeat something a random number of times, we can\
    \ use `range(rand_num)`, where rand_num is a variable holding a random number.\
    \ Although if we want, we can skip the variable and put the randint statement\
    \ directly in the `range` function, as shown below.\n\n```\nfrom random import\
    \ randint\n\nfor i in range(randint(5,25)):\n    print('Hello')\n```\n\n**Example\
    \ 2** Compare the following two programs.\n\n```\nfrom random import randint\n\
    \nrand_num = randint(1,5)\nfor i in range(6):\n    print('Hello'*rand_num)\n```\n\
    \n```\nfrom random import randint\n\nfor i in range(6):\n    rand_num = randint(1,5)\n\
    \    print('Hello'*rand_num)\n```\n\n```\nHello Hello\nHello Hello\nHello Hello\n\
    Hello Hello\nHello Hello\nHello Hello\n```\n\n```\nHello Hello Hello\nHello\n\
    Hello Hello Hello Hello\nHello Hello Hello\nHello Hello\nHello\n```\n\nThe only\
    \ difference between the programs is in the placement of the rand_num statement.\
    \ In the first program, it is located outside of the for loop, and this means\
    \ that rand_num is set once at the beginning of the program and retains that same\
    \ value for the life of the program. Thus every print statement will print Hello\
    \ the same number of times. In the second program, the rand_num statement is within\
    \ the loop. Right before each print statement, rand_num is assigned a new random\
    \ number, and so the number of times Hello is printed will vary from line to line.\n\
    \n**Example 3** Let us write a program that generates 10000 random numbers between\
    \ 1 and 100 and counts how many of them are multiples of 12. Here are the things\
    \ we will need:\n\n- Because we are using random numbers, the first line of the\
    \ program should import the random module.\n- We will require a for loop to run\
    \ 10000 times.\n- Inside the loop, we will need to generate a random number, check\
    \ to see if it is divisible by 12, and if so, add 1 to the count.\n- Since we\
    \ are counting, we will also need to set the count equal to 0 before we start\
    \ counting.\n- To check divisibility by 12, we use the modulo, %, operator.\n\n\
    When we put this all together, we get the following:\n\n```\nfrom random import\
    \ randint\n\ncount = 0\nfor i in range(10000):\n    num = randint(1, 100)\n  \
    \  if num%12==0:\n        count=count+1\n\nprint('Number of multiples of 12:',\
    \ count)\n```"
  mdcn: "## 5.3 变量交换\n\n我们经常需要交换两个变量 x 和 y 的值。很容易想到尝试以下方法：\n\n```\nx = y\ny = x\n\
    ```\n\n但这行不通。假设 x 是 3，y 是 5。第一行会将 x 设置为 5，这很好，但第二行会将 y 也设置为 5，因为此时 x 已经是 5 了。诀窍是使用第三个变量来保存\
    \ x 的值：\n\n```\nhold = x\nx = y\ny = hold\n```\n\n在许多编程语言中，这是交换变量的常用方法。然而，Python\
    \ 提供了一个简洁的快捷方式：\n\n```\nx,y = y,x\n```\n\n我们稍后会学习为什么这行得通。现在，你可以随意使用你喜欢的方法。不过，后一种方法更短，也更容易理解。\n\
    \n## 5.4 标志变量\n\n标志变量可用于让程序的一部分知道另一部分发生了什么。下面是一个判断数字是否为质数的例子。\n\n```\nnum = eval(input('Enter\
    \ number: '))\n\nflag = 0\nfor i in range(2,num):\n    if num%i==0:\n        flag\
    \ = 1\n\nif flag==1:\n    print('Not prime')\nelse:\n    print('Prime')\n```\n\
    \n回顾一下，质数是指除了 1 和它本身之外没有其他因数的数字。上面程序的工作原理是：标志变量 flag 初始值为 0。然后我们从 2 循环到 num-1。如果其中某个值是因数，那么\
    \ flag 就被设置为 1。循环结束后，我们检查 flag 是否被设置过。如果被设置过，我们就知道存在因数，num 不是质数。否则，这个数字一定是质数。\n\
    \n## 5.5 最大值与最小值\n\n一个常见的编程任务是在一系列值中找到最大或最小的值。下面是一个例子，我们要求用户输入十个正数，然后打印出最大的那个。\n\
    \n```\nlargest = eval(input('Enter a positive number: '))\nfor i in range(9):\n\
    \    num = eval(input('Enter a positive number: '))\n    if num>largest:\n   \
    \     largest=num\nprint('Largest number:', largest)\n```\n\n这里的关键是变量 `largest`，它用于跟踪迄今为止找到的最大数。我们首先将其设置为用户输入的第一个数字。然后，每次从用户那里获得一个新数字时，我们都会检查该数字是否大于当前的最大值（存储在\
    \ `largest` 中）。如果是，我们就将 `largest` 设置为该用户输入的数字。\n\n相反，如果我们想要最小值，唯一需要做的更改是将 `>`\
    \ 变为 `<`，不过将变量 `largest` 重命名为 `smallest` 也是个好主意。\n\n稍后，当我们学习列表时，我们会看到一种更短的方法来查找最大值和最小值，但了解上述技巧很有用，因为您偶尔可能会遇到列表方法无法满足所有需求的情况。\n\
    \n## 5.6 注释\n\n注释是给阅读你程序的人看的消息。注释通常用于描述一段代码的功能或工作原理，尤其是在处理复杂的代码段时。注释对你的程序没有影响。\n\
    \n**单行注释** 对于单行注释，使用 `#` 字符。\n\n```\n# a slightly sneaky way to get two values\
    \ at once\nnum1, num2 = eval(input('Enter two numbers separated by commas: '))\n\
    ```\n\n你也可以在行尾添加注释：\n\n```\ncount = count + 2          # each divisor contributes\
    \ two the count\n```\n\n**多行注释** 对于跨越多行的注释，你可以使用三引号。\n\n```\n\"\"\"\n    Program\
    \ name: Hello world\n    Author: Brian Heinold\n    Date: 1/9/11 \"\"\"\n\nprint('Hello\
    \ world')\n```\n\n三引号的一个很好用途是注释掉代码的一部分。通常你会想要修改程序，但又不想删除旧代码，以防更改不起作用。你可以注释掉旧代码，这样它仍然存在，以备不时之需，并且在运行新程序时会被忽略。下面是一个简单的例子：\n\
    \n```\n\"\"\"\nprint('This line and the next are inside a comment.')\nprint('These\
    \ lines will not get executed.')\n\"\"\"\n\nprint('This line is not in a comment\
    \ and it will be executed.')\n```\n\n## 5.7 简单调试\n\n以下是两种找出程序为何无法工作的简单技巧：\n\n\
    1.  使用 Python shell。程序运行后，你可以输入程序变量的名称来检查它们的值，看看哪些变量具有你期望的值，哪些没有。你也可以使用 Shell\
    \ 输入程序的小片段，看看它们是否正常工作。\n2.  在程序中添加 print 语句。你可以在程序的任何位置添加这些语句，以查看变量的值。你也可以添加 print\
    \ 语句来查看代码中的某个点是否被执行到。例如，如果你认为 if 语句的条件可能有错误，你可以在 if 块中放入一个 print 语句，看看条件是否被触发。\n\
    \n下面是一个来自本章前面质数程序部分的例子。我们在 for 循环中放入了一个 print 语句，以确切查看标志变量何时被设置：\n\n```\nflag\
    \ = 0\nnum = eval(input('Enter number: '))\nfor i in range(2,num):\n    if num%i==0:\n\
    \        flag = 1\n    print(i, flag)\n```\n\n3.  一个空的 input 语句，如下所示，可用于在特定点暂停程序：`input()`\n\
    \n## 5.8 示例程序\n\n能够阅读代码是一项宝贵的技能。在本节中，我们将深入研究一些简单的程序，并尝试理解它们是如何工作的。\n\n**示例 1**\
    \ 以下程序打印 \"Hello\" 的次数是 5 到 25 之间的一个随机数。\n\n```\nfrom random import randint\n\n\
    rand_num = randint(5,25)\nfor i in range(rand_num):\n    print('Hello')\n```\n\
    \n程序的第一行是导入语句。这只需要出现一次，通常在程序的开头附近。下一行生成一个 5 到 25 之间的随机数。然后，记住要重复某件事指定次数，我们使用 for\
    \ 循环。要重复某件事 50 次，我们会在 for 循环中使用 `range(50)`。要重复某件事 100 次，我们会使用 `range(100)`。要重复某件事随机次数，我们可以使用\
    \ `range(rand_num)`，其中 `rand_num` 是一个保存随机数的变量。当然，如果我们愿意，可以跳过变量，直接将 randint 语句放在\
    \ `range` 函数中，如下所示。\n\n```\nfrom random import randint\n\nfor i in range(randint(5,25)):\n\
    \    print('Hello')\n```\n\n**示例 2** 比较以下两个程序。\n\n```\nfrom random import randint\n\
    \nrand_num = randint(1,5)\nfor i in range(6):\n    print('Hello'*rand_num)\n```\n\
    \n```\nfrom random import randint\n\nfor i in range(6):\n    rand_num = randint(1,5)\n\
    \    print('Hello'*rand_num)\n```\n\n```\nHello Hello\nHello Hello\nHello Hello\n\
    Hello Hello\nHello Hello\nHello Hello\n```\n\n```\nHello Hello Hello\nHello\n\
    Hello Hello Hello Hello\nHello Hello Hello\nHello Hello\nHello\n```\n\n这两个程序的唯一区别在于\
    \ `rand_num` 语句的位置。在第一个程序中，它位于 for 循环之外，这意味着 `rand_num` 在程序开始时设置一次，并在程序的整个生命周期内保持相同的值。因此，每个\
    \ print 语句打印 \"Hello\" 的次数都相同。在第二个程序中，`rand_num` 语句位于循环内部。在每个 print 语句之前，`rand_num`\
    \ 都会被赋予一个新的随机数，因此打印 \"Hello\" 的次数会逐行变化。\n\n**示例 3** 让我们编写一个程序，生成 10000 个 1 到 100\
    \ 之间的随机数，并计算其中有多少个是 12 的倍数。以下是我们需要的东西：\n\n-   因为我们使用的是随机数，所以程序的第一行应该导入 random\
    \ 模块。\n-   我们需要一个 for 循环来运行 10000 次。\n-   在循环内部，我们需要生成一个随机数，检查它是否能被 12 整除，如果能，则将计数加\
    \ 1。\n-   因为我们是在计数，所以我们还需要在开始计数之前将计数设置为 0。\n-   为了检查能否被 12 整除，我们使用取模运算符 `%`。\n\
    \n将所有这些放在一起，我们得到以下代码：\n\n```\nfrom random import randint\n\ncount = 0\nfor i in\
    \ range(10000):\n    num = randint(1, 100)\n    if num%12==0:\n        count=count+1\n\
    \nprint('Number of multiples of 12:', count)\n```"
