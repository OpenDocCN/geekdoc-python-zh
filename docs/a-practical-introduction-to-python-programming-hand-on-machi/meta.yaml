  md: "# 21.4 Groups\n\nUsing parentheses around part of an expression creates a group\
    \ that contains the text that matches a pattern. You can use this to do more sophisticated\
    \ substitutions. Here is an example that converts to lowercase every capital letter\
    \ that is followed by a lowercase letter:\n\n```\ndef modify(match):\n    letter\
    \ = match.group()\n    return letter.lower()\nre.sub(r'([A-Z])[a-z]', modify,\
    \ 'PEACH Apple ApriCot')\n```\n\nPEACH apple apricot\n\nThe modify function ends\
    \ up getting called three times, one for each time a match occurs. The re.sub\
    \ function automatically sends to the modify function a Match object, which we\
    \ name match. This object contains information about the matching text. The object's\
    \ group method returns the matching text itself.\n\nIf instead of match.group,\
    \ we use match.groups, then we can further break down the match according the\
    \ groups defined by the parentheses. Here is an example that matches a capital\
    \ letter followed by a digit and converts each letter to lowercase and adds 10\
    \ to each number:\n\n```\ndef modify(match):\n    letter, number = match.groups()\n\
    \    return letter.lower() + str(int(number)+10)\nre.sub(r'([A-Z])(\\d)', modify,\
    \ 'A1 + B2 + C7')\n```\n\na11 + b12 + c17\n\nThe groups method returns the matching\
    \ text as tuples. For instance, in the above program the tuples returned are shown\
    \ below:\n\n+   - First match: ('A', '1')\n- Second match: ('B', '2')\n- Third\
    \ match: ('C', '7')\n\nNote also that we can get at this information by passing\
    \ arguments to match.group. For the first match, match.group(1) is 'A' and match.group(2)\
    \ is 1.\n\n# 21.5 Other functions\n\n+   - sub — We have seen many examples of\
    \ sub. One thing we haven't mentioned is that there is an optional argument count,\
    \ which specifies how many matches (from the left) to make. Here is an example:\n\
    \n```\nre.sub(r'a', '*', 'ababababa', count=2)\n```\n\n'*b*bababa'"
