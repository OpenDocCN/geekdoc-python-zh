  md: '# # Chapter 11


    # # Dictionaries


    A dictionary is a more general version of a list. Here is a list that contains
    the number of days in the months of the year:


    ```

    days = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31]

    ```


    If we want the the number of days in January, use days[0]. December is days[11]
    or days[-1].


    Here is a dictionary of the days in the months of the year:


    ```

    days = {''January'':31, ''February'':28, ''March'':31, ''April'':30,

    ''May'':31, ''June'':30, ''July'':31, ''August'':31,

    ''September'':30, ''October'':31, ''November'':30, ''December'':31}

    ```


    To get the number of days in January, we use days[''January'']. One benefit of
    using dictionaries here is the code is more readable, and we don''t have to figure
    out which index in the list a given month is at. Dictionaries have a number of
    other uses, as well.


    # ## 11.1 Basics


    **Creating dictionaries** Here is a simple dictionary:


    ```

    d = {''A'':100, ''B'':200}

    ```


    To declare a dictionary we enclose it in curly braces, {}. Each entry consists
    of a pair separated by a colon. The first part of the pair is called the key and
    the second is the value. The key acts like an index. So in the first pair, ''A'':100,
    the key is ''A'', the value is 100, and d[''A''] gives 100. Keys are often strings,
    but they can be integers, floats, and many other things as well. You can mix different
    types of keys in the same dictionary and different types of values, too.


    **Changing dictionaries** Let''s start with this dictionary:


    ```

    d = {''A'':100, ''B'':200}

    ```'
