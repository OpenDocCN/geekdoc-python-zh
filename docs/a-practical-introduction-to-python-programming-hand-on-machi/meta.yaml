    **The math module** Python has a module called math that contains familiar math
    functions, including sin, cos, tan, exp, log, log10, factorial, sqrt, floor, and
    ceil. There are also the inverse trig functions, hyperbolic functions, and the
    constants pi and e. Here is a short example:'
