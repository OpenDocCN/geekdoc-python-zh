  md: "# 22.3 Comparing floating point numbers\n\nIn Section 3.1 we saw that some\
    \ numbers, like .1, are not represented exactly on a computer. Mathematically,\
    \ after the code below executes, x should be 1, but because of accumulated errors,\
    \ it is actually 0.9999999999999999.\n\n```\nx = 0\nfor i in range(10):\n    x+=.1\n\
    ```\n\nThis means that the following if statement will turn out **False**:\n\n\
    ```\nif x==1:\n```\n\nA more reliable way to compare floating point numbers x\
    \ and y is to check to see if the difference between the two numbers is sufficiently\
    \ small, like below:\n\n```\nif abs(x-y)<10e-12:\n```\n\n# 22.4 Fractions\n\n\
    There is a module called fractions for working with fractions. Here is a simple\
    \ example of it in action:\n\n```\nfrom fractions import Fraction\nr = Fraction(3,\
    \ 4)\ns = Fraction(1, 4)\nprint(r+s)\n```\n\nFraction(1, 1)\n\nYou can do basic\
    \ arithmetic with Fraction objects, as well as compare them, take their absolute\
    \ values, etc. Here are some further examples:\n\n```\nr = Fraction(3, 4)\ns =\
    \ Fraction(2, 8)\nprint(s)\nprint(abs(2*r-3))\nif r>s:\n    print('r is larger')\n\
    ```\n\nFraction(1,4)\nFraction(3,2)\nr is larger\n\nNote that Fraction automatically\
    \ converts things to lowest terms. The example below shows how to get the numerator\
    \ and denominator:\n\n```\nr = Fraction(3,4)\nr.numerator\nr.denominator\n```"
