- md: "## 22.5 The decimal module\n\nPython has a module called decimal for doing\
    \ exact calculations with decimal numbers. As we've noted a few times now, some\
    \ numbers, such as .3, cannot be represented exactly as a float. Here is how to\
    \ get an exact decimal representation of .3:\n\n```\nfrom decimal import Decimal\n\
    Decimal('.3')\n```\n\n```\nDecimal('0.3')\n```\n\nThe string here is important.\
    \ If we leave it out, we get a decimal that corresponds with the inexact floating\
    \ point representation of .3:\n\n```\nDecimal(.3)\n```\n\n```\nDecimal('0.299999999999999988897769753748434595763683319091796875')\n\
    ```\n\n**Math** You can use the usual math operators to work with Decimal objects.\
    \ For example:\n\n```\nDecimal(.34) + Decimal(.17)\n```\n\n```\nDecimal('0.51')\n\
    ```\n\nHere is another example:\n\n```\nDecimal(1) / Decimal(17)\n```\n\n```\n\
    Decimal('0.05882352941176470588235294118')\n```\n\nThe mathematical functions\
    \ exp, ln, log10, and sqrt are methods of decimal objects. For instance, the following\
    \ gives the square root of 2:\n\n```\nDecimal(2).sqrt()\n```\n\n```\nDecimal('1.414213562373095048801688724')\n\
    ```\n\nDecimal objects can also be used with the built in **max**, **min**, and\
    \ **sum** functions, as well as converted to floats with **float** and strings\
    \ with **str**.\n\n**Precision** By default Decimal objects have 28-digit precision.\
    \ To change it to, say, five digit-precision, use the getcontext function.\n\n\
    ```\nfrom decimal import getcontext\ngetcontext().prec = 5\n```\n\nHere is an\
    \ example that prints out 100 digits of √2:\n\n```\ngetcontext().prec = 100\n\
    Decimal(2).sqrt()\n```\n\n```\nDecimal('1.414213562373095048801688724209698078569671875376948073176679737990732478462107038850387534327641573')\n\
    ```\n\nThere is theoretically no limit to the precision you can use, but the higher\
    \ the precision, the more memory is required and the slower things will run. In\
    \ general, even with small precisions, Decimal objects are slower than floating\
    \ point numbers. Ordinary floating point arithmetic is enough for most problems,\
    \ but it is nice to know that you can get higher precision if you ever need it.\n\
    \nThere is a lot more to the decimal module. See the Python documentation [1].\n\
    \n## 22.6 Complex numbers\n\nPython has a data type for complex numbers.\n\nIn\
    \ math, we have $i = \\sqrt{-1}$. The number $i$ is called an imaginary number.\
    \ A complex number is a number of the form $a + bi$, where $a$ and $b$ are real\
    \ numbers. The value $a$ is called the real part, and $b$ is the imaginary part.\
    \ In electrical engineering, the symbol $j$ is used in place of $i$, and in Python\
    \ $j$ is used for imaginary numbers. Here are a couple of examples of creating\
    \ complex numbers:\n\n```\nx = 7j\nx = 1j\nx = 3.4 + .3j\nx = complex(3.4, .3)\n\
    ```\n\nIf a number ends in a j or J, Python treats it as a complex number.\n\n\
    Complex numbers have methods real() and imag() which return the real and imaginary\
    \ parts of the number. The conjugate method returns the complex conjugate (the\
    \ conjugate of $a + bi$ is $a - bi$).\n\nThe cmath module contains many of the\
    \ same functions as the math module, except that they work with complex arguments.\
    \ The functions include regular, inverse, and hyperbolic trigonometric functions,\
    \ logarithms and the exponential function. It also contains two functions, polar\
    \ and rect, for converting between rectangular and polar coordinates:\n\n```\n\
    cmath.polar(3j)\ncmath.rect(3.0, 1.5707963267948966)\n```\n\n```\n(3.0, 1.5707963267948966)\n\
    (1.8369701987210297e-16+3j)\n```\n\nComplex numbers are fascinating, though not\
    \ all that useful in day-to-day life. One nice application, however, is fractals.\
    \ Here is a program that draws the famous Mandelbrot set. The program requires\
    \ the PIL and Python 2.6 or 2.7.\n\n```\nfrom Tkinter import *\nfrom PIL import\
    \ Image, ImageTk, ImageDraw\n\ndef color_convert(r, g, b):\n    return '#{0:02x}{1:02x}{2:02x}'.format(int(r*2.55),int(g*2.55),\n\
    \                                            int(b*2.55))\n\nmax_iter=75\nxtrans=-.5\n\
    ytrans=0\nxzoom=150\nyzoom=-150\n\nroot = Tk()\ncanvas = Canvas(width=300, height=300)\n\
    canvas.grid()\nimage=Image.new(mode='RGB',size=(300,300))\ndraw = ImageDraw.Draw(image)\n\
    \nfor x in range(300):\n    c_x = (x-150)/float(xzoom)+xtrans\n    for y in range(300):\n\
    \        c = complex(c_x, (y-150)/float(yzoom)+ytrans)\n        count=0\n    \
    \    z=0j\n        while abs(z)<2 and count<max_iter:\n            z = z*z+c\n\
    \            count += 1\n        draw.point((x,y),\n                   fill=color_convert(count+25,count+25,count+25))\n\
    \    canvas.delete(ALL)\n    photo=ImageTk.PhotoImage(image)\n    canvas.create_image(0,0,image=photo,anchor=NW)\n\
    \    canvas.update()\n\nmainloop()\n```\n\n![](img/b783d4b75e24755b056ee79a66b412de_234_0.png)\n\
    \nThe code here runs very slowly. There are ways to speed it up somewhat, but\
    \ Python is unfortunately slow for these kinds of things.\n\n## 22.7 More with\
    \ lists and arrays\n\n**Sparse lists** A 10,000,000 list of integers requires\
    \ several hundred terabytes of storage, far more than most hard drives can store.\
    \ However, in many practical applications, most of the entries of a list are 0.\
    \ This allows us to save a lot of memory by just storing the nonzero values along\
    \ with their locations. We can do this using a dictionary whose keys are the locations\
    \ of the nonzero elements and whose values are the values stored in the array\
    \ at those locations. For example, suppose we have a two-dimensional list L whose\
