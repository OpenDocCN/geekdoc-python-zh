    # Chapter 21


    # Regular expressions


    The replace method of strings is used to replace all occurrences of one string
    with another, and the index method is used to find the first occurrence of a substring
    in a string. But sometimes you need to do a more a sophisticated search or replace.
    For example, you may need to find all of the occurrences of a string instead of
    just the first one. Or maybe you want to find all occurrences of two letters followed
    by a number. Or perhaps you need to replace every ''qu'' that is at the start
    of a word with ''Qu''. This is what regular expressions are for. Utilities for
    working with regular expressions are found in the re module.


    There is some syntax to learn in order to understand regular expressions. Here
    is one example to give you an idea of how they work:


    ```

    import re

    print(re.sub(r''([LRUD])(\d+)'', ''***'', ''Locations L3 and D22 full.''))

    ```


    Locations *** and *** full.)


    This example replaces any occurrence of an L, R, U, or D followed by one or more
    digits with ''***''.


    # 21.1 Introduction


    **sub** The sub function works as follows:


    ```

    sub(pattern, replacement, string)

    ```


    This searches through string for pattern and replaces anything matching that pattern
    with the string replacement. All of the upcoming examples will be shown with sub,
    but there are other things we can do with regular expressions besides substituting.
    We will get to those after discussing the syntax of regular expressions.'
  - '[PAGE 217]


    **Raw strings** A lot of the patterns use backslashes. However, backslashes in
    strings are used for escape characters, like the newline, \n. To get a backslash
    in a string, we need to do \. This can quickly clutter up a regular expression.
    To avoid this, our patterns will be raw strings, where backslashes can appear
    as is and don''t do anything special. To mark a string as a raw string, preface
    it with an r like below:


    ```

    s = r''This is a raw string. Backslashes do not do anything special.''

    ```


    # 21.2 Syntax


    **Basic example** We start with a regular expression that mimics the replace method
    of strings. Here is a example of using replace to replace all occurrences of abc
    with *:


    ```

    ''abcdef abcxyz''.replace(''abc'', ''*'')

    ```


    ```

    *def *xyz

    ```


    Here is the regular expression code that does the same thing:


    ```

    re.sub(r''abc'', ''*'', ''abcdef abcxyz'')

    ```


    **Square brackets** We can use square brackets to indicate that we only want to
    match certain letters. Here is an example where we replace every a and d with
    asterisks:


    ```

    re.sub(r''[ad]'', ''*'', ''abcdef'')

    ```


    ```

    *bc*ef

    ```


    Here is another example, where an asterisk replaces all occurrences of an a, b,
    or c that is followed by a 1, 2, or 3:


    ```

    re.sub(r''[abc][123]'', ''*'', ''a1 + b2 + c5 + x2'')

    ```


    ```

    * + * + c5 + x2

    ```


    We can give ranges of values—for example, [a-j] for the letters a through j. Here
    are some further examples of ranges:


    | Range | Description |

    |---|---|

    | [A-Z] | any capital letter |

    | [0-9] | any digit |

    | [A-Za-z0-9] | any letter or digit |


    A slightly shorter way to match any digit is \d, instead of [0-9].


    **Matching any character** Use a dot to match (almost) any character. Here is
    an example:


    ```

    re.sub(r''A.B'', ''*'', ''A2B AxB AxxB A$B'')

    ```'
