  md: "# # Chapter 5\n\n# # Miscellaneous Topics I\n\nThis chapter consists of a several\
    \ common techniques and some other useful information.\n\n# ## 5.1 Counting\n\n\
    Very often we want our programs to count how many times something happens. For\
    \ instance, a video game may need to keep track of how many turns a player has\
    \ used, or a math program may want to count how many numbers have a special property.\
    \ The key to counting is to use a variable to keep the count.\n\n**Example 1**\
    \ This program gets 10 numbers from the user and counts how many of those numbers\
    \ are greater than 10.\n\n```\ncount = 0\nfor i in range(10):\n    num = eval(input('Enter\
    \ a number: '))\n    if num>10:\n        count=count+1\nprint('There are', count,\
    \ 'numbers greater than 10.')\n```\n\nThink of the count variable as if we are\
    \ keeping a tally on a piece of paper. Every time we get a number larger than\
    \ 10, we add 1 to our tally. In the program, this is accomplished by the line\
    \ count=count+1. The first line of the program, count=0, is important. Without\
    \ it, the Python interpreter would get to the count=count+1 line and spit out\
    \ an error saying something about not knowing what count is. This is because the\
    \ first time the program gets to this line, it tries to do what it says: take\
    \ the old value of count, add 1 to it, and store the result in count. But the\
    \ first time the program gets there, there is no old value of count to use, so\
    \ the Python interpreter doesn't know what to do. To avoid the error, we need\
    \ to define count, and that is what the first"
