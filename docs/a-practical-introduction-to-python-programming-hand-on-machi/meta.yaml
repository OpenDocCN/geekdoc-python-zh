    There are also shortcut operators /=, %=, //=, and **=.


    +   - **An assignment shortcut**

    Look at the code below.


    ```

    a = 0

    b = 0

    c = 0

    ```


    A nice shortcut is:


    ```

    a = b = c = 0

    ```


    +   - **Another assignment shortcut**

    Say we have a list L with three elements in it, and we want to assign those elements
    to variable names. We could do the following:


    ```

    x = L[0]

    y = L[1]

    z = L[2]

    ```


    Instead, we can do this:


    ```

