  - "[PAGE 152]\n\n# Chapter 15\n\n# GUI Programming with Tkinter\n\nUp until now,\
    \ the only way our programs have been able to interact with the user is through\
    \ keyboard input via the `input` statement. But most real programs use windows,\
    \ buttons, scrollbars, and various other things. These widgets are part of what\
    \ is called a Graphical User Interface or GUI. This chapter is about GUI programming\
    \ in Python with Tkinter.\n\nAll of the widgets we will be looking at have far\
    \ more options than we could possibly cover here. An excellent reference is Fredrik\
    \ Lundh's Introduction to Tkinter [2].\n\n# 15.1 Basics\n\nNearly every GUI program\
    \ we will write will contain the following three lines:\n\n```\nfrom tkinter import\
    \ *\nroot = Tk()\nmainloop()\n```\n\nThe first line imports all of the GUI stuff\
    \ from the tkinter module. The second line creates a window on the screen, which\
    \ we call root. The third line puts the program into what is essentially a long-running\
    \ while loop called the event loop. This loop runs, waiting for keypresses, button\
    \ clicks, etc., and it exits when the user closes the window.\n\nHere is a working\
    \ GUI program that converts temperatures from Fahrenheit to Celsius.\n\n```\n\
    from tkinter import *\n\ndef calculate():\n    temp = int(entry.get())\n    temp\
    \ = 9/5*temp+32\n    output_label.configure(text = 'Converted: {:.1f}'.format(temp))\n\
    \    entry.delete(0,END)\n```"
