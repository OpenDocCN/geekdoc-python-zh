    \ ('c', 30)]\n```\n\n就像 **enumerate** 一样，**zip** 的结果不完全是一个列表，但如果我们执行 **list(zip(s,L))**，就可以从中得到一个列表。\n\
    \n下面是一个使用 **zip** 从两个列表创建字典的示例。\n\n```python\nL = ['one', 'two', 'three']\nM =\
