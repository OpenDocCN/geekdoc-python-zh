    \n### 7.1 Basics\n\n**Creating lists** Here is a simple list:\n\n```\nL = [1,2,3]\n\
    ```\n\nUse square brackets to indicate the start and end of the list, and separate\
    \ the items by commas.\n\n**The empty list** The empty list is []. It is the list\
