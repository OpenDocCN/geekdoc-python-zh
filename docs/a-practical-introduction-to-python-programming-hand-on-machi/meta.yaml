    \ the arguments of a function, the backslash can be left out:\n\n```\nL = ['Joe',\
    \ 'Bob', 'Sue', 'Jimmy', 'Todd', 'Frank', 'Mike', 'John', 'Amy',\n     'Edgar',\
    \ 'Sam']\n```\n\n## 10.6 pass\n\nThe pass statement does nothing. Believe it or\
    \ not, such a thing does have a few uses that we will see later.\n\n## 10.7 String\
    \ formatting\n\nSuppose we are writing a program that calculates a 25% tip on\
