  md: "# 5.6 Comments\n\nA comment is a message to someone reading your program. Comments\
    \ are often used to describe what a section of code does or how it works, especially\
    \ with tricky sections of code. Comments have no effect on your program.\n\n**Single-line\
    \ comments** For a single-line comment, use the # character.\n\n```\n# a slightly\
    \ sneaky way to get two values at once\nnum1, num2 = eval(input('Enter two numbers\
    \ separated by commas: '))\n```\n\nYou can also put comments at the end of a line:\n\
    \n```\ncount = count + 2          # each divisor contributes two the count\n```\n\
    \n**Multi-line comments** For comments that span several lines, you can use triple\
    \ quotes.\n\n```\n\"\"\"\n    Program name: Hello world\n    Author: Brian Heinold\n\
    \    Date: 1/9/11 \"\"\"\n\nprint('Hello world')\n```\n\nOne nice use for the\
    \ triple quotes is to comment out parts of your code. Often you will want to modify\
    \ your program but don't want to delete your old code in case your changes don't\
    \ work. You could comment out the old code so that it is still there if you need\
    \ it, and it will be ignored when your new program is run. Here is a simple example:\n\
    \n```\n\"\"\"\nprint('This line and the next are inside a comment.')\nprint('These\
