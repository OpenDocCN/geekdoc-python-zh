    \ until the user enters -1000. However, when we construct the condition, instead\
    \ of thinking about when to stop looping, we instead need to think in terms of\
    \ what has to be true in order to keep going.\n\nA while loop is a lot like an\
    \ if statement. The difference is that the indented statements in an if block\
    \ will only be executed once, whereas the indented statements in a while loop\
    \ are repeatedly executed.\n\n**Example 2** One problem with the previous program\
    \ is that when the user enters in 1000 to quit, the program still converts the\
    \ value 1000 and doesn't give any message to indicate that the program has ended.\
    \ A nicer way to do the program is shown below.\n\n```\ntemp = 0\nwhile temp!=-1000:\n\
    \    temp = eval(input('Enter a temperature (-1000 to quit): '))\n    if temp!=-1000:\n\
    \        print('In Fahrenheit that is', 9/5*temp+32)\n    else:\n        print('Bye!')\n\
    ```\n\n**Example 3** When first met if statements in Section 4.1, we wrote a program\
    \ that played a simple random number guessing game. The problem with that program\
    \ is that the player only gets one guess. We can, in a sense, replace the if statement\
    \ in that program with a while loop to create a program that allows the user to\
    \ keep guessing until they get it right.\n\n```\nfrom random import randint\n\
    secret_num = randint(1,10)\nguess = 0\nwhile guess != secret_num:\n    guess =\
    \ eval(input('Guess the secret number: '))\nprint('You finally got it!')\n```\n\
    \nThe condition guess!=secret_num says that as long as the current guess is not\
    \ correct, we will keep looping. In this case, the loop consists of one statement,\
    \ the input statement, and so the pro-gram will keep asking the user for a guess\
    \ until their guess is correct. We require the line guess=0 prior to the while\
    \ loop so that the first time the program reaches the loop, there is something\
    \ in guess for the program to use in the comparison. The exact value of guess\
    \ doesn't really matter at this point. We just want something that is guaranteed\
    \ to be different than secret_num. When the user finally guesses the right answer,\
    \ the loop ends and program control moves to the print statement after the loop,\
    \ which prints a congratulatory message to the player."
