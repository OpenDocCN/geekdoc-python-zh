  mdcn: "## 9.4 else 语句\n\n示例 1 这是一个允许用户输入最多 10 个数字的程序。用户可以通过输入负数提前停止输入。\n\n```\n\
    for i in range(10):\n    num = eval(input('Enter number: '))\n    if num<0:\n\
    \        break\n```\n\n使用 while 循环也可以实现同样的功能。\n\n```\ni=0\nnum=1\nwhile i<10 and\
    \ num>0:\n    num = eval(input('Enter a number: '))\n```\n\n两种方法都可以。在许多情况下，`break`\
    \ 语句可以帮助你的代码更易于理解，也更简洁。\n\n示例 2 在本章前面，我们使用 while 循环让用户反复输入要转换的温度。下面是原始版本（左侧）与使用\
    \ `break` 语句的不同方法（右侧）的对比。\n\n```\ntemp = 0\nwhile temp!=-1000:\n    temp = eval(input(':\
    \ '))\n    if temp!=-1000:\n        print(9/5*temp+32)\n    else:\n        print('Bye!')\n\
    \nwhile True:\n    temp = eval(input(': '))\n    if temp==-1000:\n        print('Bye')\n\
    \        break\n    print(9/5*temp+32)\n```\n\n你可以选择性地将 `else` 与 `break` 语句一起使用。只有在循环正常完成（即没有发生\
    \ `break`）时，`else` 下缩进的代码才会执行。\n\n示例 1 这是一个基于上一节示例 1 的简单例子。\n\n```\nfor i in range(10):\n\
    \    num = eval(input('Enter number: '))\n    if num<0:\n        print('Stopped\
    \ early')\n        break\nelse:\n    print('User entered all ten values')\n```\n\
    \n该程序允许用户输入最多 10 个数字。如果用户输入了负数，程序会打印“提前停止”，并停止要求输入更多数字。如果用户没有输入负数，程序会打印“用户输入了全部十个值”。\n\
    \n**示例 2** 这里有两种检查整数 `num` 是否为质数的方法。质数是除了 1 和它本身外没有其他因数的数。左侧的方法使用 while 循环，而右侧的方法使用\
    \ for/break 循环：\n\n```\ni=2\nwhile i<num and num%i!=0:\n    i=i+1\nif i==num:\n\
    \    print('Prime')\nelse:\n    print('Not prime')\n\nfor i in range(2, num):\n\
    \    if num%i==0:\n        print('Not prime')\n        break\nelse:\n    print('Prime')\n\
    ```\n\n两种方法背后的思路都是扫描 2 到 `num-1` 之间的所有整数，如果其中任何一个能整除 `num`，那么我们就知道 `num` 不是质数。要检查一个值\
    \ `i` 是否是 `num` 的因数，我们只需检查 `num%i` 是否为 0。\n\nwhile 循环版本的思路是，只要我们还没有找到因数，就继续循环。如果我们遍历完循环都没有找到因数，那么\
    \ `i` 将等于 `num`，在这种情况下，这个数一定是质数。\n\nfor/break 版本的思路是，我们遍历所有潜在的因数，一旦找到一个，我们就知道这个数不是质数，于是打印“不是质数”并停止循环。如果我们遍历完循环都没有中断，那么我们就没找到因数。在这种情况下，**else**\
    \ 代码块将执行，并打印该数是质数。\n\n## 9.5 猜数字游戏，优化版\n\n逐步了解如何开发一个程序是值得的。我们将修改第 9.1 节的猜数字游戏程序，使其具有以下功能：\n\
    \n- 玩家只有五次机会。\n- 程序在每次猜测后告诉玩家数字是更大还是更小。\n- 程序在玩家获胜和失败时打印相应的消息。\n\n下面是程序预期的运行效果：\n\
    \n```\nEnter your guess (1-100): 50\nLOWER. 4 guesses left.\n\nEnter your guess\
    \ (1-100): 25\nLOWER. 3 guesses left.\n\nEnter your guess (1-100): 12\nLOWER.\
    \ 2 guesses left.\n\nEnter your guess (1-100): 6\nHIGHER. 1 guesses left.\n\n\
    Enter your guess (1-100): 9\nLOWER. 0 guesses left.\n\nYou lose. The correct number\
    \ is 8\n```\n\n首先，思考一下程序中需要什么：\n\n- 我们需要随机数，所以程序开头会有一个 `import` 语句，其他地方会有一个 `randint`\
    \ 函数。\n- 为了让用户可以一直猜测直到猜对或用完次数，一个解决方案是使用 while 循环，其条件同时处理这两种可能性。\n- 会有一个 `input`\
    \ 语句来获取用户的猜测。由于这是重复执行的操作，它将放在循环内部。\n- 会有一个 `if` 语句来处理“更大/更小”的判断。由于这个比较会重复进行，并且取决于用户的猜测，它将放在循环中\
    \ `input` 语句之后。\n- 会有一个计数变量来跟踪玩家已经用了多少次机会。每次用户猜测时，计数都会增加一，所以这个语句也将放在循环内部。\n\n\
    接下来开始编写那些容易实现的部分：\n\n```\nfrom random import randint\n\nsecret_num = randint(1,100)\n\
    num_guesses = 0\n\nwhile #some condition goes here#\n    guess = eval(input('Enter\
    \ your guess (1-100): '))\n    num_guesses = num_guesses + 1\n    # higher/lower\
    \ if statement goes here\n```\n\n对于 while 循环，我们希望只要用户没有猜到秘密数字并且玩家还没有用完所有猜测机会，就继续循环：\n\
    \n```\nwhile guess != secret_num and num_guesses <= 4:\n```\n\n“更大/更小”的 if 语句可以这样写：\n\
    \n```\nif guess < secret_num:\n    print('HIGHER.', 5-num_guesses, 'guesses left.\\\
    n')\nelif guess > secret_num:\n    print('LOWER.', 5-num_guesses, 'guesses left.\\\
    n')\nelse:\n    print('You got it!')\n```\n\n最后，如果玩家用完了次数，最好能有一条消息。当他们用完次数时，while\
    \ 循环将停止，程序控制权将转移到循环外部的代码。此时我们可以打印消息，但我们只想在循环停止的原因是玩家用完次数而不是猜对的情况下才这样做。我们可以通过循环后的一个\
    \ `if` 语句来实现这一点。下面展示了这一点以及完整的程序。\n\n```\nfrom random import randint\n\nsecret_num\
    \ = randint(1,100)\nnum_guesses = 0\nguess = 0\n\nwhile guess != secret_num and\
    \ num_guesses <= 4:\n    guess = eval(input('Enter your guess (1-100): '))\n \
    \   num_guesses = num_guesses + 1\n    if guess < secret_num:\n        print('HIGHER.',\
    \ 5-num_guesses, 'guesses left.\\n')\n    elif guess > secret_num:\n        print('LOWER.',\
    \ 5-num_guesses, 'guesses left.\\n')\n    else:\n        print('You got it!')\n\
    \nif num_guesses==5 and guess != secret_num:\n    print('You lose. The correct\
    \ number is', secret_num)\n```\n\n下面是使用 for/break 循环的另一种解决方案：\n\n```\nfrom random\
    \ import randint\n\nsecret_num = randint(1,100)\n\nfor num_guesses in range(5):\n\
    \    guess = eval(input('Enter your guess (1-100): '))\n    if guess < secret_num:\n\
    \        print('HIGHER.', 5-num_guesses, 'guesses left.\\n')\n    elif guess >\
    \ secret_num:\n        print('LOWER.', 5-num_guesses, 'guesses left.\\n')\n  \
    \  else:\n        print('You got it!')\n        break\nelse:\n    print('You lose.\
    \ The correct number is', secret_num)\n```\n\n## 9.6 练习\n\n1. 下面的代码打印从 1 到 50\
    \ 的数字。使用 while 循环重写代码以实现相同的功能。\n\n```\nfor i in range(1,51):\n    print(i)\n```\n\
    \n2. (a) 编写一个程序，使用 while 循环（不是 for 循环）遍历一个字符串，并将字符串的字符逐个打印在单独的行上。\n(b) 修改上面的程序，打印字符串中的每隔一个字符。\n\
    \n3. 一个好的程序会确保用户输入的数据是有效的。编写一个程序，要求用户输入一个重量，并将其从千克转换为磅。每当用户输入低于 0 的重量时，程序应告诉他们输入无效，然后再次要求他们输入重量。[提示：使用\
    \ while 循环，而不是 if 语句]。\n\n4. 编写一个程序，要求用户输入密码。如果用户输入了正确的密码，程序应告诉他们已登录系统。否则，程序应要求他们重新输入密码。用户只有五次输入密码的机会，之后程序应告诉他们已被踢出系统。\n\
    \n5. 编写一个程序，允许用户输入任意数量的测试分数。用户通过输入负数表示输入结束。打印有多少个分数是 A（90 分或以上）。同时打印平均分。\n\n6.\
    \ 修改“更大/更小”程序，使得当只剩一次猜测机会时，它说“1 guess”，而不是“1 guesses”。\n\n7. 回想一下，给定一个字符串 `s`，`s.index('x')`\
    \ 返回 `s` 中第一个 `x` 的索引，如果不存在 `x` 则报错。\n\n(a) 编写一个程序，要求用户输入一个字符串和一个字母。使用 while 循环，程序应打印该字母首次出现的索引，如果字符串不包含该字母，则打印一条消息。\n\
    (b) 使用 for/break 循环而不是 while 循环编写上述程序。\n\n8. 两个数的最大公约数（GCD）是能同时整除这两个数的最大数。例如，`gcd(18,\
    \ 42)` 是 6，因为 18 和 42 能同时整除的最大数是 6。编写一个程序，要求用户输入两个数并计算它们的最大公约数。下面展示了一种计算最大公约数的方法，称为欧几里得算法。\n\
    \n- 首先计算较大数除以较小数的余数。\n- 接下来，将较大数替换为较小数，将较小数替换为余数。\n- 重复此过程，直到较小数为 0。最大公约数就是较大数的最后一个值。"
