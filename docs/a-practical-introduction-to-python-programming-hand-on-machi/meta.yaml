    \ that converts temperatures from Celsius to Fahrenheit.\n\n```\ndef convert(t):\n\
    \    return t*9/5+32\n\nprint(convert(20))\n```\n\n68\n\nThe `return` statement\
    \ is used to send the result of a function's calculations back to the caller.\n\
    Notice that the function itself does not do any printing. The printing is done\
    \ outside of the function.\nThat way, we can do math with the result, like below.\n\
    \n```\nprint(convert(20)+5)\n```\n\nIf we had just printed the result in the function\
    \ instead of returning it, the result would have been\nprinted to the screen and\
    \ forgotten about, and we would never be able to do anything with it.\n\n**Example\
    \ 2** As another example, the Python math module contains trig functions, but\
    \ they only work\nin radians. Let us write our own sine function that works in\
    \ degrees.\n\n```\nfrom math import pi, sin\n\ndef deg_sin(x):\n    return sin(pi*x/180)\n\
    ```\n\n**Example 3** A function can return multiple values as a list.\n\nSay we\
    \ want to write a function that solves the system of equations $a x + b y = e$\
