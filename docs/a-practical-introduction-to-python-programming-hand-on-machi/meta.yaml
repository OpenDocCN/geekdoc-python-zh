    \n## Part II\n\n## Graphics\n\n## Chapter 15\n\n## GUI Programming with Tkinter\n\
    \nUp until now, the only way our programs have been able to interact with the\
    \ user is through keyboard input via the `input` statement. But most real programs\
    \ use windows, buttons, scrollbars, and various other things. These widgets are\
    \ part of what is called a Graphical User Interface or GUI. This chapter is about\
    \ GUI programming in Python with Tkinter.\n\nAll of the widgets we will be looking\
    \ at have far more options than we could possibly cover here. An excellent reference\
    \ is Fredrik Lundh's Introduction to Tkinter [2].\n\n### 15.1 Basics\n\nNearly\
    \ every GUI program we will write will contain the following three lines:\n\n\
    ```\nfrom tkinter import *\nroot = Tk()\nmainloop()\n```\n\nThe first line imports\
    \ all of the GUI stuff from the tkinter module. The second line creates a window\
    \ on the screen, which we call root. The third line puts the program into what\
    \ is essentially a long-running while loop called the event loop. This loop runs,\
    \ waiting for keypresses, button clicks, etc., and it exits when the user closes\
    \ the window.\n\nHere is a working GUI program that converts temperatures from\
    \ Fahrenheit to Celsius.\n\n```\nfrom tkinter import *\n\ndef calculate():\n \
    \   temp = int(entry.get())\n    temp = 9/5*temp+32\n    output_label.configure(text\
    \ = 'Converted: {:.1f}'.format(temp))\n    entry.delete(0,END)\n\nroot = Tk()\n\
    message_label = Label(text='Enter a temperature',\n                     font=('Verdana',\
    \ 16))\noutput_label = Label(font=('Verdana', 16))\nentry = Entry(font=('Verdana',\
    \ 16), width=4)\ncalc_button = Button(text='Ok', font=('Verdana', 16),\n     \
    \                command=calculate)\n\nmessage_label.grid(row=0, column=0)\nentry.grid(row=0,\
    \ column=1)\ncalc_button.grid(row=0, column=2)\noutput_label.grid(row=1, column=0,\
    \ columnspan=3)\n\nmainloop()\n```\n\nHere is what the program looks like:\n\n\
    ![](img/b783d4b75e24755b056ee79a66b412de_153_0.png)\n\nWe now will examine the\
    \ components of the program separately.\n\n### 15.2 Labels\n\nA label is a place\
    \ for your program to place some text on the screen. The following code creates\
    \ a label and places it on the screen.\n\n```\nhello_label = Label(text='hello')\n\
    hello_label.grid(row=0, column=0)\n```\n\nWe call Label to create a new label.\
    \ The capital L is required. Our label's name is hello_label. Once created, use\
    \ the grid method to place the label on the screen. We will explain grid in the\
    \ next section.\n\n**Options** There are a number of options you can change including\
    \ font size and color. Here are some examples:\n\n```\nhello_label = Label(text='hello',\
    \ font=('Verdana', 24, 'bold'),\n                   bg='blue', fg='white')\n```\n\
    \nNote the use of keyword arguments. Here are a few common options:\n\n- font\
    \ — The basic structure is font= (font name, font size, style). You can leave\
    \ out the font size or the style. The choices for style are 'bold', 'italic',\
    \ 'underline', 'overstrike', 'roman', and 'normal' (which is the default). You\
    \ can combine multiple styles like this: 'bold italic'.\n- fg and bg — These stand\
    \ for foreground and background. Many common color names can be used, like 'blue',\
    \ 'green', etc. Section 16.2 describes how to get essentially any color.\n- width\
    \ — This is how many characters long the label should be. If you leave this out,\
    \ Tkinter will base the width off of the text you put in the label. This can make\
    \ for unpredictable results, so it is good to decide ahead of time how long you\
    \ want your label to be and set the width accordingly.\n- height — This is how\
    \ many rows high the label should be. You can use this for multi-line labels.\
    \ Use newline characters in the text to get it to span multiple lines. For example,\
    \ text='hi\\nthere'.\n\nThere are dozens more options. The aforementioned Introduction\
    \ to Tkinter [2] has a nice list of the others and what they do.\n\n**Changing\
    \ label properties** Later in your program, after you've created a label, you\
    \ may want to change something about it. To do that, use its configure method.\
    \ Here are two examples that change the properties of a label called label:\n\n\
    ```\nlabel.configure(text='Bye')\nlabel.configure(bg='white', fg='black')\n```\n\
    \nSetting text to something using the configure method is kind of like the GUI\
    \ equivalent of a **print** statement. However, in calls to configure we cannot\
    \ use commas to separate multiple things to print. We instead need to use string\
    \ formatting. Here is a **print** statement and its equivalent using the configure\
    \ method.\n\n```\nprint('a =', a, 'and b =', b)\nlabel.configure(text='a = {},\
    \ and b = {}'.format(a,b))\n```\n\nThe configure method works with most of the\
    \ other widgets we will see.\n\n### 15.3 grid\n\nThe grid method is used to place\
    \ things on the screen. It lays out the screen as a rectangular grid of rows and\
    \ columns. The first few rows and columns are shown below.\n\n| (row=0, column=0)\
    \ | (row=0, column=1) | (row=0, column=2) |\n| :--- | :--- | :--- |\n| (row=1,\
    \ column=0) | (row=1, column=1) | (row=1, column=2) |\n| (row=2, column=0) | (row=2,\
    \ column=1) | (row=2, column=2) |\n\n**Spanning multiple rows or columns** There\
    \ are optional arguments, rowspan and colspan, that allow a widget to take up\
    \ more than one row or column. Here is an example of several grid statements followed\
    \ by what the layout will look like:\n\n```\nlabel1.grid(row=0, column=0)\nlabel2.grid(row=0,\
    \ column=1)\nlabel3.grid(row=1, column=0, columnspan=2)\nlabel4.grid(row=1, column=2)\n\
    label5.grid(row=2, column=2)\n```\n\n| label1 | label2 | |\n| --- | --- | ---\
    \ |\n| label 3 | | label4 |\n| | | label5 |\n\n**Spacing** To add extra space\
    \ between widgets, there are optional arguments padx and pady.\n\n**Important\
    \ note** Any time you create a widget, to place it on the screen you need to use\
    \ grid (or one of its cousins, like pack, which we will talk about later). Otherwise\
    \ it will not be visible.\n\n### 15.4 Entry boxes\n\nEntry boxes are a way for\
    \ your GUI to get text input. The following example creates a simple entry box\
    \ and places it on the screen.\n\n```\nentry = Entry()\nentry.grid(row=0, column=0)\n\
    ```\n\nMost of the same options that work with labels work with entry boxes (and\
    \ most of the other widgets we will talk about). The width option is particularly\
    \ helpful because the entry box will often be wider than you need.\n\n- **Getting\
    \ text** To get the text from an entry box, use its get method. This will return\
    \ a string. If you need numerical data, use **eval** (or **int** or **float**)\
    \ on the string. Here is a simple example that gets text from an entry box named\
    \ entry.\n\n  ```\n  string_value = entry.get()\n  num_value = eval(entry.get())\n\
    \  ```\n\n- **Deleting text** To clear an entry box, use the following:\n\n  ```\n\
    \  entry.delete(0,END)\n  ```\n\n- **Inserting text** To insert text into an entry\
    \ box, use the following:\n\n  ```\n  entry.insert(0, 'hello')\n  ```\n\n### 15.5\
