    \ + [1]\n\na=3\nM=[1,2,3]\na=func1(a)    # note change on this line\n```\n\n##\
    \ 13.6 Exercises\n\n1. Write a function called rectangle that takes two integers\
    \ m and n as arguments and prints out an m n box consisting of asterisks. Shown\
