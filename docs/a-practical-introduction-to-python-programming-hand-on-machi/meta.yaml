  md: '** * AxxB *


    The pattern matches an A followed by almost any single character followed by a
    B.


    Exception: The one character not matched by the dot is the newline character.
    If you need that to be matched, too, put ?s at the start of your pattern.


    **Matching multiple copies of something** Here is an example where we match an
    A followed by one or more B’s:


    ```

    re.sub(r''AB+'', ''*'', ''ABC ABBBBBBC AC)

    ```


    *C *C AC


    We use the + character to indicate that we want to match one or more B’s here.
    There are similar things we can use to specify different numbers of B’s here.
    For instance, using * in place of + will match zero or more B’s. (This means that
    AC in the example above would be replaced by *C because A counts as an A followed
    by zero B’s.) Here is a table of what you can do:


    | Code | Description |

    |---|---|

    | + | match 1 or more occurrences |

    | * | match 0 or more occurrences |

    | ? | match 0 or 1 occurrence |

    | {m} | match exactly m occurrences |

    | {m,n} | match between m and n occurrences, inclusive |


    Here is an example that matches an A followed by three to six B’s:


    ```

    re.sub(r''AB{3,6}'', ''*'', ''ABB ABBB ABBBB ABBBBBBBBB'')

    ```


    ''ABB * * *BBB''


    Here, we do not match ABB because the A is only followed by two B’s. The next
    two pieces get matched, as the A is followed by three B’s in the second term,
    and four B’s in the third. In the last piece, there is an A followed by nine B’s.
    What gets matched isthe A along with the first six B’s.


    Note that the matching in the last piece above is greedy; that is, it takes as
    many B’s as it is allowed. It is allowed to take between three and six B’s, and
    it takes all six. To get the opposite behavior, to get it take as few B’s as allowed,
    add a ?, like below:


    ```

    re.sub(r''AB{3,6}?'', ''*'', ''ABB ABBB ABBBB ABBBBBBBBBB'')

    ```


    ''ABB * * *BBBBBB''


    The ? can go after any of the numeric specifiers, like +?, -?, ??, etc.


    **The | character** The | character acts as an “or.” Here is an example:'
