  - '[PAGE 169]


    The one thing to note here is that we have to tie the check button to a variable,
    and it can’t be just any variable, it has to be a special kind of Tkinter variable,
    called an IntVar. This variable, show_totals, will be 0 when the check button
    is unchecked and 1 when it is checked. To access the value of the variable, you
    need to use its get method, like this:


    ```

    show_totals.get()

    ```


    You can also set the value of the variable using its set method. This will automatically
    check or uncheck the check button on the screen. For instance, if you want the
    above check button checked at the start of the program, do the following:


    ```

    show_totals = IntVar()

    show_totals.set(1)

    check = Checkbutton(text=''Show totals'', var=show_totals)

    ```


    **Radio buttons** Radio buttons work similarly. The code for the radio buttons
    shown at the start of the section is:


    ```

    color = IntVar()

    redbutton = Radiobutton(text=''Red'', var=color, value=1)

    greenbutton = Radiobutton(text=''Green'', var=color, value=2)

    bluebutton = Radiobutton(text=''Blue'', var=color, value=3)

    ```


    The value of the IntVar object color will be 1, 2, or 3, depending on whether
    the left, middle, or right button is selected. These values are controlled by
    the value option, specified when we create the radio buttons.


    **Commands** Both check buttons and radio buttons have a command option, where
    you can set a callback function to run whenever the button is selected or unselected.


    # 16.6 Text widget


    The Text widget is a bigger, more powerful version of the Entry widget. Here is
    an example of creating one:


    ```

    textbox = Text(font=(''Verdana'', 16), height=6, width=40)

    ```


    The widget will be 40 characters wide and 6 rows tall. You can still type past
    the sixth row; the widget will just display only six rows at a time, and you can
    use the arrow keys to scroll.


    If you want a scrollbar associated with the text box you can use the ScrolledText
    widget. Other than the scrollbar, ScrolledText works more or less the same as
    Text. An example of what it looks like is shown below. To use the ScrolledText
    widget, you will need the following import:


    ```

    from tkinter.scrolledtext import ScrolledText

    ```'
