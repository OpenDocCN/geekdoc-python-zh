    \n## 19.13 Running your Python programs on other computers\n\nYour Python programs\
    \ can be run on other computers that have Python installed. Macs and Linux machines\
    \ usually have Python installed, though the version may not be up to date with\
    \ the one you are using, and those machines may not have additional libraries\
