    \ compares temp to 1000. If temp is not 1000, the program will ask for another\
    \ temperature, convert it, and then loop back up again and do another comparison.\
    \ It continues this process until the user enters 1000.\n\nWe need the line temp=0\
    \ at the start, as without it, we would get a name error. The program would"
  - "[PAGE 85]\n\nget to the while statement, try to see if temp is not equal to 1000\
    \ and run into a problem because temp doesn't yet exist. To take care of this,\
    \ we just declare temp equal to 0. There is nothing special about the value 0\
    \ here. We could set it to anything except 1000. (Setting it to 1000 would cause\
    \ the condition on the while loop to be false right from the start and the loop\
    \ would never run.)\n\nNote that is natural to think of the while loop as continuing\
    \ looping until the user enters -1000. However, when we construct the condition,\
    \ instead of thinking about when to stop looping, we instead need to think in\
    \ terms of what has to be true in order to keep going.\n\nA while loop is a lot\
    \ like an if statement. The difference is that the indented statements in an if\
    \ block will only be executed once, whereas the indented statements in a while\
    \ loop are repeatedly executed.\n\n**Example 2** One problem with the previous\
    \ program is that when the user enters in 1000 to quit, the program still converts\
    \ the value 1000 and doesn't give any message to indicate that the program has\
    \ ended. A nicer way to do the program is shown below.\n\n```\ntemp = 0\nwhile\
    \ temp!=-1000:\n    temp = eval(input('Enter a temperature (-1000 to quit): '))\n\
    \    if temp!=-1000:\n        print('In Fahrenheit that is', 9/5*temp+32)\n  \
    \  else:\n        print('Bye!')\n```\n\n**Example 3** When first met if statements\
    \ in Section 4.1, we wrote a program that played a simple random number guessing\
    \ game. The problem with that program is that the player only gets one guess.\
    \ We can, in a sense, replace the if statement in that program with a while loop\
    \ to create a program that allows the user to keep guessing until they get it\
    \ right.\n\n```\nfrom random import randint\nsecret_num = randint(1,10)\nguess\
    \ = 0\nwhile guess != secret_num:\n    guess = eval(input('Guess the secret number:\
    \ '))\nprint('You finally got it!')\n```\n\nThe condition guess!=secret_num says\
    \ that as long as the current guess is not correct, we will keep looping. In this\
    \ case, the loop consists of one statement, the input statement, and so the pro-gram\
    \ will keep asking the user for a guess until their guess is correct. We require\
