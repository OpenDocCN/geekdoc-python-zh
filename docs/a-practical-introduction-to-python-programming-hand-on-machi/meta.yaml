- md: "## Chapter 11\n\n## Dictionaries\n\nA dictionary is a more general version\
    \ of a list. Here is a list that contains the number of days in the months of\
    \ the year:\n\n```\ndays = [31, 28, 31, 30, 31, 30, 31, 31, 30, 31, 30, 31]\n\
    ```\n\nIf we want the number of days in January, use days[0]. December is days[11]\
    \ or days[-1].\n\nHere is a dictionary of the days in the months of the year:\n\
    \n```\ndays = {'January':31, 'February':28, 'March':31, 'April':30,\n'May':31,\
    \ 'June':30, 'July':31, 'August':31,\n'September':30, 'October':31, 'November':30,\
    \ 'December':31}\n```\n\nTo get the number of days in January, we use days['January'].\
    \ One benefit of using dictionaries here is the code is more readable, and we\
    \ don't have to figure out which index in the list a given month is at. Dictionaries\
    \ have a number of other uses, as well.\n\n### 11.1 Basics\n\n**Creating dictionaries**\
    \ Here is a simple dictionary:\n\n```\nd = {'A':100, 'B':200}\n```\n\nTo declare\
    \ a dictionary we enclose it in curly braces, {}. Each entry consists of a pair\
    \ separated by a colon. The first part of the pair is called the key and the second\
    \ is the value. The key acts like an index. So in the first pair, 'A':100, the\
    \ key is 'A', the value is 100, and d['A'] gives 100. Keys are often strings,\
    \ but they can be integers, floats, and many other things as well. You can mix\
    \ different types of keys in the same dictionary and different types of values,\
    \ too.\n\n**Changing dictionaries** Let's start with this dictionary:\n\n```\n\
    d = {'A':100, 'B':200}\n```\n\n- To change d['A'] to 400, do\n    ```python\n\
    \    d['A']=400\n    ```\n\n- To add a new entry to the dictionary, we can just\
    \ assign it, like below: d['C']=500\n    ```python\n    d['C']=500\n    ```\n\
    \    Note that this sort of thing does not work with lists. Doing L[2]=500 on\
    \ a list with two elements would produce an index out of range error. But it does\
    \ work with dictionaries.\n\n- To delete an entry from a dictionary, use the del\
    \ operator:\n    ```python\n    del d['A']\n    ```\n\n**Empty dictionary** The\
    \ empty dictionary is {}, which is the dictionary equivalent of [] for lists or\
    \ \"\" for strings.\n\n**Important note** The order of items in a dictionary will\
    \ not necessarily be the order in which put them into the dictionary. Internally,\
    \ Python rearranges things in a dictionary in order to optimize performance.\n\
    \n### 11.2 Dictionary examples\n\n**Example 1** You can use a dictionary as an\
    \ actual dictionary of definitions:\n\n```python\nd = {'dog' : 'has a tail and\
    \ goes woof!', 'cat' : 'says meow',\n     'mouse' : 'chased by cats'}\n```\n\n\
    Here is an example of the dictionary in use:\n\n```python\nword = input('Enter\
    \ a word: ')\nprint('The definition is:', d[word])\n```\n\n> Enter a word: mouse\n\
    The definition is: chased by cats\n\n**Example 2** The following dictionary is\
    \ useful in a program that works with Roman numerals.\n\n```python\nnumerals =\
    \ {'I':1, 'V':5, 'X':10, 'L':50, 'C':100, 'D':500, 'M':1000}\n```\n\n**Example\
    \ 3** In the game Scrabble, each letter has a point value associated with it.\
    \ We can use the following dictionary for the letter values:\n\n```python\npoints\
    \ = {'A':1, 'B':3, 'C':3, 'D':2, 'E':1, 'F':4, 'G':2, 'H':4, 'I':1, 'J':8, 'K':5,\
    \ 'L':1, 'M':3,\n          'N':1, 'O':1, 'P':3, 'Q':10, 'R':1, 'S':1, 'T':1, 'U':1,\
    \ 'V':4, 'W':4, 'X':8, 'Y':4,\n          'Z':10}\n```\n\nTo score a word, we can\
    \ do the following:\n\n```\nscore = sum([points[c] for c in word])\n```\n\nOr,\
    \ if you prefer the long way:\n\n```\ntotal = 0\nfor c in word:\n    total +=\
    \ points[c]\n```\n\n**Example 4** A dictionary provides a nice way to represent\
    \ a deck of cards:\n\n```\ndeck = [{'value':i, 'suit':c}\n        for c in ['spades',\
    \ 'clubs', 'hearts', 'diamonds']\n        for i in range(2,15)]\n```\n\nThe deck\
    \ is actually a list of 52 dictionaries. The shuffle method can be used to shuffle\
