    \ that just prints something.\n\n```\ndef print_hello():\n    print('Hello!')\n\
    \nprint_hello()\nprint('1234567')\nprint_hello()\n```\n\n```\nHello!\n1234567\n\
    Hello!\n```\n\nThe first two lines define the function. In the last three lines\
    \ we call the function twice.\n\nOne use for functions is if you are are using\
    \ the same code over and over again in various parts of your program, you can\
    \ make your program shorter and easier to understand by putting the code in a\
    \ function. For instance, suppose for some reason you need to print a box of stars\
