    | (row=0, column=0) | (row=0, column=1) | (row=0, column=2) |

    | :--- | :--- | :--- |

    | (row=1, column=0) | (row=1, column=1) | (row=1, column=2) |

    | (row=2, column=0) | (row=2, column=1) | (row=2, column=2) |


    **Spanning multiple rows or columns** There are optional arguments, rowspan and
    colspan, that allow a widget to take up more than one row or column. Here is an
    example of several grid statements followed by what the layout will look like:'
