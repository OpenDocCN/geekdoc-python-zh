  md: '# 7.3 Built-in functions


    There are several built-in functions that operate on lists. Here are some useful
    ones:


    | Function | Description |

    | :--- | :--- |

    | **len** | returns the number of items in the list |

    | **sum** | returns the sum of the items in the list |

    | **min** | returns the minimum of the items in the list |

    | **max** | returns the maximum of the items in the list |


    For example, the following computes the average of the values in a list L:


    ```

    average = sum(L)/len(L)

    ```


    # 7.4 List methods


    Here are some list methods:


    | Method | Description |

    | :--- | :--- |

    | append(x) | adds x to the end of the list |

    | sort() | sorts the list |

    | count(x) | returns the number of times x occurs in the list |

    | index(x) | returns the location of the first occurrence of x |

    | reverse() | reverses the list |

    | remove(x) | removes first occurrence of x from the list |

    | pop(p) | removes the item at index p and returns its value |

    | insert(p,x) | inserts x at index p of the list |


    **Important note** There is a big difference between list methods and string methods:
    String methods do not change the original string, but list methods do change the
    original list. To sort a list L, just use L.sort() and not L=L.sort(). In fact,
    the latter will not work at all.


    | wrong | right |

    | :--- | :--- |

    | s.replace(''X'',''x'') | s = s.replace(''X'',''x'') |

    | L = L.sort() | L.sort() |


    **Other list methods** There are a few others list methods. Type **help(list)**
    in the Python shell to see some documentation for them.'
