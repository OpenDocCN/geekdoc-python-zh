    \n每种颜色被分解为三个分量——红色、绿色和蓝色分量。每个分量的值可以从0到255，其中255表示该颜色的全量。等量的红色和绿色混合产生黄色色调，等量的红色和蓝色混合产生紫色色调，等量的蓝色和绿色混合产生青绿色调。三个分量等量混合产生灰色色调。黑色是当所有三个分量的值都为0时，白色是当所有三个分量的值都为255时。改变分量的值可以产生多达256³（约1600万）种颜色。网上有许多资源允许你调整分量的量并查看产生的颜色。\n\
