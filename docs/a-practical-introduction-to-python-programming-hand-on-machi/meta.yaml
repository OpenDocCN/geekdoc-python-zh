    # 17.10 pack


    There is an alternative to grid called pack. It is not as versatile as grid, but
    there are some places where it is useful. It uses an argument called side, which
    allows you to specify four locations for your widgets: TOP, BOTTOM, LEFT, and
    RIGHT. There are two useful optional arguments, fill and expand. Here is an example.


    ```

    button1=Button(text=''Hi'')

    button1.pack(side=TOP, fill=X)

    button2=Button(text=''Hi'')

    button2.pack(side=BOTTOM)

    ```


    ![](img/b783d4b75e24755b056ee79a66b412de_184_0.png)


    The fill option causes the widget to fill up the available space given to it.
    It can be either X, Y or BOTH. The expand option is used to allow the widget to
    expand when its window is resized. To enable it, use expand=YES.


    > **Note** You can use pack for some frames, and grid for others; just don''t
    mix pack and grid within the same frame, or Tkinter won''t know quite what to
    do.


    # 17.11 StringVar


    In Section 16.5 we saw how to tie a Tkinter variable, called an IntVar, to a check
    button or a radio button. Tkinter has another type of variable called a StringVar
    that holds strings. This type of variable can be used to change the text in a
    label or a button or in some other widgets. We already know how to change text
    using the configure method, and a StringVar provides another way to do it.


    To tie a widget to a StringVar, use the textvariable option of the widget. A StringVar
    has get and set methods, just like an IntVar, and whenever you set the variable,
    any widgets that are tied to it are automatically updated.'
