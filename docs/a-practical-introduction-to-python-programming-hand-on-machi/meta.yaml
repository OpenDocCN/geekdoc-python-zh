    \ point numbers. Ordinary floating point arithmetic is enough for most problems,\
    \ but it is nice to know that you can get higher precision if you ever need it.\n\
    \nThere is a lot more to the decimal module. See the Python documentation [1].\n\
    \n# 22.6 Complex numbers\n\nPython has a data type for complex numbers.\n\nIn\
    \ math, we have $i = \\sqrt{-1}$. The number $i$ is called an imaginary number.\
    \ A complex number is a number of the form $a + bi$, where $a$ and $b$ are real\
    \ numbers. The value $a$ is called the real part, and $b$ is the imaginary part.\
    \ In electrical engineering, the symbol $j$ is used in place of $i$, and in Python\
    \ $j$ is used for imaginary numbers. Here are a couple of examples of creating\
    \ complex numbers:\n\n```\nx = 7j\nx = 1j\nx = 3.4 + .3j\nx = complex(3.4, .3)\n\
    ```\n\nIf a number ends in a j or J, Python treats it as a complex number.\n\n\
    Complex numbers have methods real() and imag() which return the real and imaginary\
    \ parts of the number. The conjugate method returns the complex conjugate (the\
    \ conjugate of $a + bi$ is $a - bi$).\n\nThe cmath module contains many of the\
    \ same functions as the math module, except that they work with complex arguments.\
    \ The functions include regular, inverse, and hyperbolic trigonometric functions,\
    \ logarithms and the exponential function. It also contains two functions, polar\
    \ and rect, for converting between rectangular and polar coordinates:\n\n```\n\
    cmath.polar(3j)\ncmath.rect(3.0, 1.5707963267948966)\n```\n\n```\n(3.0, 1.5707963267948966)\n\
    (1.8369701987210297e-16+3j)\n```\n\nComplex numbers are fascinating, though not\
