    # 16.8 GUI Events


    Often we will want our programs to do something if the user presses a certain
    key, drags something on a canvas, uses the mouse wheel, etc. These things are
    called events.


    **A simple example** The first GUI program we looked at back in Section 15.1 was
    a simple temperature converter. Anytime we wanted to convert a temperature we
    would type in the temperature in the entry box and click the Calculate button.
    It would be nice if the user could just press the enter key after they type the
    temperature instead of having to click to Calculate button. We can accomplish
    this by adding one line to the program:


    ```

    entry.bind(''<Return>'', lambda dummy=0:calculate())

    ```


    This line should go right after you declare the entry box. What it does is it
    takes the event that the enter (return) key is pressed and binds it to the calculate
    function.


    Well, sort of. The function you bind the event to is supposed to be able to receive
    a copy of an Event object, but the calculate function that we had previously written
    takes no arguments. Rather than rewrite the function, the line above uses lambda
    trick to essentially throw away the Event object.


    **Common events** Here is a list of some common events:


    | Event | Description |

    |---|---|

    | <Button-1> | The left mouse button is clicked. |

    | <Double-Button-1> | The left mouse button is double-clicked. |

    | <Button-Release-1> | The left mouse button is released. |

    | <B1-Motion> | A click-and-drag with the left mouse button. |

    | <MouseWheel> | The mouse wheel is moved. |

    | <Motion> | The mouse is moved. |

    | <Enter> | The mouse is now over the widget. |

    | <Leave> | The mouse has now left the widget. |

    | <Key> | A key is pressed. |

    | <key name> | The key name key is pressed. |


    For all of the mouse button examples, the number 1 can be replaced with other
    numbers. Button 2 is the middle button and button 3 is the right button.


    The most useful attributes in the Event object are:'
