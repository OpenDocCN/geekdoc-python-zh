    In the above example, every time we encounter an abc or an xyz, we replace it
    with an asterisk.


    **Matching only at the start or end** Sometimes you don''t want to match every
    occurrence of some-thing, maybe just the first or the last occurrence. To match
    just the first occurrence of something, start the pattern off with the ^ character.
    To match just the last occurrence, end the pattern with the $ character. Here
    are some examples:


    ```

    re.sub(''^abc'', ''*'', ''abcdefgabc'')

    re.sub(''abc$'', ''*'', ''abcdefgabc'')

    ```


    ```

    *defgabc

    abcdefg*

    ```


    **Escaping special characters** We have seen that + and * have special meanings.
    What if we need to match a plus sign? To do so, use the backslash to escape it,
    like \+. Here is an example:


    ```

    re.sub(r''AB\+'', ''*'', ''AB+C'')

    ```


    ```

    *C

    ```


    Also, in a pattern, \n represents a newline.


    Just a note again about raw strings—if we didn''t use them for the patterns, every
    backslash would have to be doubled. For instance, r''AB\+'' would have to be ''AB\+''.


    # Backslash sequences


    +   - \d matches any digit, and \D matches any non-digit. Here is an example:


    ```

    re.sub(r''\d'', ''*'', ''3 + 14 = 17'')

    re.sub(r''\D'', ''*'', ''3 + 14 = 17'')

    ```


    ```

    *   +   =   **

    3***14***17

    ```


    +   - \w matches any letter or number, and \W matches anything else. Here is an
    example:


    ```

    re.sub(r''\w'', ''*'', ''This is a test. Or is it?'')

    re.sub(r''\W'', ''*'', ''This is a test. Or is it?'')

    ```


    ```

    ***** *** * ***** *** *** **?''

    ''This*is*a*test***Or*is*it*''

    ```


    This is a good way to work with words.


    +   - \s matches whitespace, and \S matches non-whitespace. Here is an example:'
