- md: "## 14.5 A Tic-tac-toe example\n\nIn this section we create an object-oriented\
    \ Tic-tac-toe game. We use a class to wrap up the logic of the game. The class\
    \ contains two variables, an integer representing the current player, and a 3x3\
    \ list representing the board. The board variable consists of zeros, ones, and\
    \ twos. Zeros represent an open spot, while ones and twos represent spots marked\
    \ by players 1 and 2, respectively. There are four methods:\n\n- `get_open_spots`\
    \ — returns a list of the places on the board that have not yet been marked by\
    \ players\n- `is_valid_move` — takes a row and a column representing a potential\
    \ move, and returns True if move is allowed and False otherwise\n- `make_move`\
    \ — takes a row and a column representing a potential move, calls `is_valid_move`\
    \ to see if the move is okay, and if it is, sets the board array accordingly and\
    \ changes the player\n- `check_for_winner` — scans through the board list and\
    \ returns 1 if player 1 has won, 2 if player 2 has won, 0 if there are no moves\
    \ remaining and no winner, and -1 if the game should continue\n\nHere is the code\
    \ for the class:\n\n```python\nclass tic_tac_toe:\n    def __init__(self):\n \
    \       self.B = [[0,0,0],\n                  [0,0,0],\n                  [0,0,0]]\n\
    \        self.player = 1\n\n    def get_open_spots(self):\n        return [[r,c]\
    \ for r in range(3) for c in range(3)\n                if self.B[r][c]==0]\n\n\
    \    def is_valid_move(self,r,c):\n        if 0<=r<=2 and 0<=c<=2 and self.B[r][c]==0:\n\
    \            return True\n        return False\n\n    def make_move(self,r,c):\n\
    \        if self.is_valid_move(r,c):\n            self.B[r][c] = self.player\n\
    \            self.player = (self.player+2)%2 + 1\n\n    def check_for_winner(self):\n\
    \        for c in range(3):\n            if self.B[0][c]==self.B[1][c]==self.B[2][c]!=0:\n\
    \                return self.B[0][c]\n        for r in range(3):\n           \
    \ if self.B[r][0]==self.B[r][1]==self.B[r][2]!=0:\n                return self.B[r][0]\n\
    \        if self.B[0][0]==self.B[1][1]==self.B[2][2]!=0:\n            return self.B[0][0]\n\
    \        if self.B[2][0]==self.B[1][1]==self.B[0][2]!=0:\n            return self.B[2][0]\n\
    \        if self.get_open_spots()==[]:\n            return 0\n        return -1\n\
    ```\n\nThis class consists of the logic of the game. There is nothing in the class\
    \ that is specific to the user interface. Below we have a text-based interface\
    \ using print and input statements. If we decide to use a graphical interface,\
    \ we can use the `tic_tac_toe` class without having to change anything about it.\
    \ Note that the `get_open_spots` method is not used by this program. It is useful,\
    \ however, if you want to implement a computer player. A simple computer player\
    \ would call that method and use `random.choice` method to choose a random element\
    \ from the returned list of spots.\n\n```python\ndef print_board():\n    chars\
    \ = ['-', 'X', 'O']\n    for r in range(3):\n        for c in range(3):\n    \
    \        print(chars[game.B[r][c]], end=' ')\n        print()\n\ngame = tic_tac_toe()\n\
    while game.check_for_winner()==-1:\n    print_board()\n    r,c = eval(input('Enter\
    \ spot, player ' + str(game.player) + ': '))\n    game.make_move(r,c)\n\nprint_board()\n\
    x = game.check_for_winner()\nif x==0:\n    print(\"It's a draw.\")\nelse:\n  \
    \  print('Player', x, 'wins!')\n```\n\nHere is what the first couple of turns\
    \ look like:\n\n```\n- - -\n- - -\n- - -\nEnter spot, player 1: 1,1\n- - -\n-\
    \ X -\n- - -\nEnter spot, player 2: 0,2\n- - O\n- X -\n- - -\nEnter spot, player\
    \ 1:\n```\n\n## 14.6 Further topics\n\n- **Special methods** — We have seen two\
    \ special methods already, the constructor `__init__` and the method `__str__`\
    \ which determines what your objects look like when printed. There are many others.\
    \ For instance, there is `__add__` that allows your object to use the + operator.\
    \ There are special methods for all the Python operators. There is also a method\
    \ called `__len__` which allows your object to work with the built in `len` function.\
    \ There is even a special method, `__getitem__` that lets your program work with\
    \ list and string brackets [].\n- **Copying objects** — If you want to make a\
    \ copy of an object x, it is not enough to do the following:\n\n    ```python\n\
    \    x_copy = x\n    ```\n\n    The reason is discussed in Section 19.1. Instead,\
    \ do the following:\n\n    ```python\n    from copy import copy\n    x_copy =\
    \ copy(x)\n    ```\n- **Keeping your code in multiple files** — If you want to\
    \ reuse a class in several programs, you do not have to copy and paste the code\
    \ into each. You can save it in a file and use an import statement to import it\
    \ into your programs. The file will need to be somewhere your program can find\
    \ it, like in the same directory.\n\n    ```python\n    from analyzer import Analyzer\n\
    \    ```\n\n## 14.7 Exercises\n\n1. Write a class called `Investment` with fields\
    \ called `principal` and `interest`. The constructor should set the values of\
    \ those fields. There should be a method called `value_after` that returns the\
    \ value of the investment after $n$ years. The formula for this is $p(1 + i)^n$,\
    \ where $p$ is the principal, and $i$ is the interest rate. It should also use\
    \ the special method `__str__` so that printing the object will result in something\
    \ like below:\n\n    ```\n    Principal - $1000.00, Interest rate - 5.12%\n  \
    \  ```\n\n2. Write a class called `Product`. The class should have fields called\
    \ `name`, `amount`, and `price`, holding the product's name, the number of items\
    \ of that product in stock, and the regular price of the product. There should\
    \ be a method `get_price` that receives the number of items to be bought and returns\
    \ the cost of buying that many items, where the regular price is charged for orders\
    \ of less than 10 items, a 10% discount is applied for orders of between 10 and\
    \ 99 items, and a 20% discount is applied for orders of 100 or more items. There\
    \ should also be a method called `make_purchase` that receives the number of items\
    \ to be bought and decreases `amount` by that much.\n\n3. Write a class called\
    \ `Password_manager`. The class should have a list called `old_passwords` that\
    \ holds all of the user's past passwords. The last item of the list is the user's\
    \ current password. There should be a method called `get_password` that returns\
    \ the current password and a method called `set_password` that sets the user's\
    \ password. The `set_password` method should only change the password if the attempted\
    \ password is different from all the user's past passwords. Finally, create a\
    \ method called `is_correct` that receives a string and returns a boolean True\
    \ or False depending on whether the string is equal to the current password or\
    \ not.\n\n4. Write a class called `Time` whose only field is a time in seconds.\
    \ It should have a method called `convert_to_minutes` that returns a string of\
    \ minutes and seconds formatted as in the following example: if seconds is 230,\
    \ the method should return '5:50'. It should also have a method called `convert_to_hours`\
    \ that returns a string of hours, minutes, and seconds formatted analogously to\
    \ the previous method.\n\n5. Write a class called `Wordplay`. It should have a\
    \ field that holds a list of words. The user of the class should pass the list\
    \ of words they want to use to the class. There should be the following methods:\n\
    \n    - `words_with_length(length)` — returns a list of all the words of length\
    \ `length`\n    - `starts_with(s)` — returns a list of all the words that start\
    \ with `s`\n    - `ends_with(s)` — returns a list of all the words that end with\
    \ `s`\n    - `palindromes()` — returns a list of all the palindromes in the list\n\
    \    - `only(L)` — returns a list of the words that contain only those letters\
    \ in `L`\n    - `avoids(L)` — returns a list of the words that contain none of\
    \ the letters in `L`\n\n6. Write a class called `Converter`. The user will pass\
    \ a length and a unit when declaring an object from the class—for example, `c\
    \ = Converter(9, 'inches')`. The possible units are inches, feet, yards, miles,\
    \ kilometers, meters, centimeters, and millimeters. For each of these units there\
    \ should be a method that returns the length converted into those units. For example,\
    \ using the `Converter` object created above, the user could call `c.feet()` and\
    \ should get 0.75 as the result.\n\n7. Use the `Standard_deck` class of this section\
    \ to create a simplified version of the game War. In this game, there are two\
    \ players. Each starts with half of a deck. The players each deal the top card\
    \ from their decks and whoever has the higher card wins the other player's cards\
    \ and adds them to the bottom of his deck. If there is a tie, the two cards are\
    \ eliminated from play (this differs from the actual game, but is simpler to program).\
    \ The game ends when one player runs out of cards."
