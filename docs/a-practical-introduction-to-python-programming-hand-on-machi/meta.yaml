    # 19.4 Unicode


    It used to be computers could only display 255 different characters, called ASCII
    characters. In this system, characters are allotted one byte of memory each, which
    gives 255 possible characters, each with a corresponding numerical value. Characters
    0 through 31 include various control characters, including ''\n'' and ''\t''.
    After that came some special symbols, then numbers, capital letters, lowercase
    letters, and a few more symbols. Beyond that are a variety of other symbols, including
    some international characters.


    However, 255 characters is not nearly enough to represent all of the symbols used
    throughout the alphabets of the world. The new standard is Unicode, which uses
    more than one byte to store character data. Unicode currently supports over 65,000
    characters. “Standard” isn’t quite the right word here, as there are actually
    several standards in use, and this can cause some trouble. If you need to work
    with unicode data, do some research into it first to learn about all the craziness.


    In Unicode, characters still have have numerical equivalents. If you would like
    to go back and forth between a character and its numerical equivalent, use the
    `chr` and `ord` built-in functions. For example, use `ord(''A'')` to get the numerical
    value of ''A'', and use `chr(65)` to get the character with numerical value 65.
    Here is a short example that prints out the first 1000 Unicode characters.


    ```

    print(''''.join([chr(i) for i in range(1000)]))

    ```


    ![](img/b783d4b75e24755b056ee79a66b412de_198_0.png)


    Python supports Unicode, both in strings and in the names of variables, functions,
