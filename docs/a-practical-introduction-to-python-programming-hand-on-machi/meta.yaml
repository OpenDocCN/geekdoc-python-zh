    \n## 杂项主题 I\n\n本章包含一些常见技巧和其他有用信息。\n\n### 5.1 计数\n\n我们经常希望程序统计某件事发生的次数。例如，一个视频游戏可能需要跟踪玩家使用了多少回合，或者一个数学程序可能想统计有多少数字具有某种特殊属性。计数的关键是使用一个变量来保存计数值。\n\
    \n**示例 1** 这个程序从用户那里获取10个数字，并统计其中有多少个大于10。\n\n```\ncount = 0\nfor i in range(10):\n\
    \    num = eval(input('Enter a number: '))\n    if num>10:\n        count=count+1\n\
    print('There are', count, 'numbers greater than 10.')\n```\n\n可以将计数变量想象成我们在一张纸上记录\
    \ tally。每次得到一个大于10的数字，就在 tally 上加1。在程序中，这是通过 `count=count+1` 这一行实现的。程序的第一行 `count=0`\
    \ 很重要。没有它，Python解释器执行到 `count=count+1` 这一行时会报错，提示不知道 `count` 是什么。这是因为程序第一次执行到这一行时，它会尝试执行它所说的：取\
    \ `count` 的旧值，加1，然后将结果存回 `count`。但程序第一次执行到这里时，没有 `count` 的旧值可用，所以Python解释器不知道该怎么做。为了避免错误，我们需要定义\
    \ `count`，这就是第一行的作用。我们将其设置为0，表示在程序开始时，还没有发现任何大于10的数字。\n\n计数是非常常见的操作。涉及的两个要素是：\n\
    \n1.  `count=0` —— 将计数从0开始。\n2.  `count=count+1` —— 将计数加1。\n\n**示例 2** 这是前一个示例的修改版，它统计用户输入的数字中有多少个大于10，以及有多少个等于0。要统计两件事，我们使用两个计数变量。\n\
    \n```\ncount1 = 0\ncount2 = 0\nfor i in range(10):\n    num = eval(input('Enter\
    \ a number: '))\n    if num>10:\n        count1=count1+1\n    if num==0:\n   \
    \     count2=count2+1\nprint('There are', count1, 'numbers greater than 10.')\n\
    print('There are', count2, 'zeroes.')\n```\n\n**示例 3** 接下来是一个稍微复杂一点的例子。这个程序统计从1²到100²的平方数中，有多少个以4结尾。\n\
    \n```\ncount = 0\nfor i in range(1,101):\n    if (i**2)%10==4:\n        count\
    \ = count + 1\nprint(count)\n```\n这里需要注意几点：首先，由于前面提到的 `range` 函数的特性，我们需要使用 `range(1,101)`\
    \ 来循环遍历数字1到100。循环变量 `i` 取这些值，因此1²到100²的平方数由 `i**2` 表示。其次，要检查一个数字是否以4结尾，一个巧妙的数学技巧是检查它除以10的余数是否为4。取模运算符\
    \ `%` 用于获取余数。\n\n### 5.2 求和\n\n与计数密切相关的是求和，即我们想要将一堆数字加起来。"
