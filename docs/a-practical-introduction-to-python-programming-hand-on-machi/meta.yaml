  md: "# 5.4 Flag variables\n\nA flag variable can be used to let one part of your\
    \ program know when something happens in another part of the program. Here is\
    \ an example that determines if a number is prime.\n\n```\nnum = eval(input('Enter\
    \ number: '))\n\nflag = 0\nfor i in range(2,num):\n    if num%i==0:\n        flag\
    \ = 1\n\nif flag==1:\n    print('Not prime')\nelse:\n    print('Prime')\n```\n\
    \nRecall that a number is prime if it has no divisors other than 1 and itself.\
    \ The way the program above works is flag starts off at 0. We then loop from 2\
    \ to num-1. If one of those values turns out to be a divisor, then flag gets set\
    \ to 1. Once the loop is finished, we check to see if the flag got set or not.\
    \ If it did, we know there was a divisor, and num isn't prime. Otherwise, the\
    \ number must be prime.\n\n# 5.5 Maxes and mins\n\nA common programming task is\
    \ to find the largest or smallest value in a series of values. Here is an example\
    \ where we ask the user to enter ten positive numbers and then we print the largest\
    \ one.\n\n```\nlargest = eval(input('Enter a positive number: '))\nfor i in range(9):\n\
    \    num = eval(input('Enter a positive number: '))\n    if num>largest:\n   \
    \     largest=num\nprint('Largest number:', largest)\n```\n\nThe key here is the\
    \ variable largest that keeps track of the largest number found so far. We start\
    \ by setting it equal to the the user's first number. Then, every time we get\
    \ a new number from the user, we check to see if the user's number is larger than\
    \ the current largest value (which is stored in largest). If it is, then we set\
    \ largest equal to the user's number.\n\nIf, instead, we want the smallest value,\
    \ the only change necessary is that > becomes <, though it would also be good\
    \ to rename the variable largest to smallest.\n\nLater on, when we get to lists,\
    \ we will see a shorter way to find the largest and smallest values, but the technique\
    \ above is useful to know since you may occasionally run into situations where\
    \ the list way won't do everything you need it to do."
