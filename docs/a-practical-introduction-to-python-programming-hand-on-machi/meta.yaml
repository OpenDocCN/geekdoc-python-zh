    \ | 重试和取消按钮 |\n| askyesnocancel | 是、否和取消按钮 |\n| showerror | 错误图标和确定按钮 |\n| showwarning\
    \ | 警告图标和确定按钮 |\n\n这些函数中的每一个都返回一个值，指示用户点击了什么。有关使用返回值的简单示例，请参阅下一节。以下是返回值的表格："
