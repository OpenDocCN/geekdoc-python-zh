    \ `L`，我们想把这些元素赋值给变量名。我们可以这样做：\n\n    ```\n    x = L[0]\n    y = L[1]\n    z =\
    \ L[2]\n    ```\n\n    或者，我们可以这样做：\n\n    ```\n    x,y,z = L\n    ```\n\n    类似地，我们可以像下面这样一次给三个变量赋值：\n\
    \n    ```\n    x,y,z = 1,2,3\n    ```\n\n    并且，正如我们之前见过的，我们可以使用这种赋值方式来交换变量。\n\
    \n    ```\n    x,y,z = y,z,x\n    ```\n\n-   **条件简写**\n    这里有一些方便的简写：\n\n   \
    \ | 语句 | 简写 |\n    |---|---|\n    | if a==0 and b==0 and c==0: | if a==b==c==0:\
    \ |\n    | if 1<a and a<b and b<5: | if 1<a<b<5: |\n\n## 10.4 短路求值\n\n假设我们正在编写一个程序，从单词列表中查找第五个字符是\
    \ 'z' 的单词。我们可能会尝试以下方法：\n\n```\nfor w in words:\n    if w[4]=='z':\n        print(w)\n\
    ```\n\n但这样，我们偶尔会得到一个字符串索引超出范围的错误。问题在于列表中的一些单词可能少于五个字符。然而，下面的 `if` 语句可以正常工作：\n\n\
    ```\nif len(w)>=5 and w[4]=='z':\n```\n\n看起来我们仍然会出错，因为我们仍然在检查 `w[4]`，但实际上没有错误。这之所以能工作的关键是**短路求值**。Python\
    \ 首先检查条件的第一部分 `len(w)>=5`。如果该条件为假，那么整个 `and` 条件必然为假，因此甚至没有必要检查第二个条件。所以 Python\
    \ 不会费心去检查第二个条件。你可以依赖这种行为。\n\n短路求值也适用于 `or` 条件。在这种情况下，Python 检查 `or` 的第一部分，如果它为真，那么整个\
    \ `or` 条件必然为真，因此 Python 不会费心去检查 `or` 的第二部分。\n\n## 10.5 续行\n\n有时你会写一行很长的代码，如果将其分成两行会更具可读性。为此，请在行尾使用反斜杠\
    \ `\\` 字符来表示该语句延续到下一行。这里有一个例子：\n\n```\nif 'a' in string or 'b' in string or 'c'\
    \ in string \\ or 'd' in string or 'e' in string:\n```\n\n确保反斜杠后面没有多余的空格，否则你会收到错误消息。\n\
    \n如果你正在输入一个列表、字典或函数的参数，可以省略反斜杠：\n\n```\nL = ['Joe', 'Bob', 'Sue', 'Jimmy', 'Todd',\
    \ 'Frank', 'Mike', 'John', 'Amy',\n     'Edgar', 'Sam']\n```\n\n## 10.6 pass\n\
    \n`pass` 语句什么都不做。信不信由你，这确实有一些用途，我们稍后会看到。\n\n## 10.7 字符串格式化\n\n假设我们正在编写一个程序，计算一笔\
    \ $23.60 账单的 25% 小费。当我们相乘时，得到 5.9，但我们希望将结果显示为 $5.90，而不是 $5.9。以下是操作方法：\n\n```\n\
    a = 23.60 * .25\nprint('The tip is {:.2f}'.format(a))\n```\n\n这使用了字符串的 `format`\
    \ 方法。这里是另一个例子：\n\n```\nbill = 23.60\ntip = 23.60*.25\nprint('Tip: ${:.2f}, Total:\
    \ ${:.2f}'.format(tip, bill+tip))\n```\n\n`format` 方法的工作方式是，我们在任何想要格式化值的地方放置一对花括号\
    \ `{}`。`format` 函数的参数是我们想要格式化的值，第一个参数与第一组花括号对应，第二个参数与第二组花括号对应，依此类推。在每组花括号内，你可以指定一个格式代码来决定对应的参数将如何被格式化。\n\
    \n**格式化整数** 要格式化整数，格式代码是 `{:d}`。在 `d` 前面放一个数字可以让我们右对齐整数。这里有一个例子：\n\n```\nprint('{:3d}'.format(2))\n\
    print('{:3d}'.format(25))\nprint('{:3d}'.format(138))\n```\n\n这些例子中的数字 3 表示该值被分配了三个位置。该值被放置在这三个位置中尽可能靠右的位置，其余位置将由空格填充。这种做法对于漂亮地格式化表格很有用。\n\
    \n要居中对齐整数而不是右对齐，请使用 `^` 字符；要左对齐，请使用 `<` 字符。\n\n```\nprint('{:^5d}'.format(2))\n\
    print('{:^5d}'.format(222))\nprint('{:^5d}'.format(13834))\n```\n\n这些中的每一个都为整数分配了五个空格，并将其居中对齐在这五个空格内。\n\
    \n在格式代码中放入逗号将使用逗号格式化整数。下面的例子打印 1,000,000：\n\n```\nprint('{:,d}'.format(1000000))\n\
    ```\n\n**格式化浮点数** 要格式化浮点数，格式代码是 `{:f}`。要只显示小数点后两位，请使用 `:.2f`。数字 2 可以更改以改变小数位数。\n\
    \n你可以右对齐浮点数。例如，`{:8.2f}` 将为其值分配八个位置——其中一个用于小数点，两个用于小数点后的部分。如果值是 6.42，则只需要四个位置，其余位置由空格填充，导致该值右对齐。\n\
    \n`^` 和 `<` 字符分别用于居中对齐和左对齐浮点数。\n\n**格式化字符串** 要格式化字符串，格式代码是 `{:s}`。这里有一个居中对齐一些文本的例子：\n\
    \n```\nprint('{:^10s}'.format('Hi'))\nprint('{:^10s}'.format('there!'))\n```\n\
    \n要右对齐字符串，请使用 `>` 字符：\n\n```\nprint('{:>6s}'.format('Hi'))\nprint('{:>6s}'.format('There'))\n\
    ```\n\n格式化可以做很多事情。请参阅 Python 文档 [1]。\n\n## 10.8 嵌套循环\n\n你可以将循环放在其他循环内部。一个循环放在另一个循环内部被称为嵌套，你基本上可以随心所欲地深度嵌套循环。\n\
    \n**示例 1** 打印一个 10x10 的乘法表。\n\n```\nfor i in range(1,11):\n    for j in range(1,11):\n\
    \        print('{:3d}'.format(i*j), end=' ')\n    print()\n```\n\n乘法表是一个二维对象。为了处理它，我们使用两个\
    \ `for` 循环，一个用于水平方向，一个用于垂直方向。`print` 语句将乘积右对齐以使其看起来美观。`end=\"\"` 允许我们在每一行打印多个内容。当我们打印完一行后，我们使用\
    \ `print()` 将内容推进到下一行。\n\n**示例 2** 一个常见的数学问题是求解方程组。有时你只想找到整数解，这在数学上可能有点棘手。然而，我们可以编写一个程序来暴力搜索解。这里我们找到方程组\
    \ 2x + 3y = 4, x - y = 7 的所有整数解 (x, y)，其中 x 和 y 都在 -50 到 50 之间。\n\n```\nfor x\
    \ in range(-50,51):\n    for y in range(-50,51):\n        if 2*x+3*y==4 and x-y==7:\n\
    \            print(x,y)\n```\n\n**示例 3** 勾股数是一组三个数字 (x, y, z)，满足 x^2 + y^2 = z^2。例如\
    \ (3, 4, 5) 是一个勾股数，因为 3^2 + 4^2 = 5^2。勾股数对应于边长都是整数的三角形（如 3-4-5 三角形）。这里有一个程序，用于找出所有\
    \ x, y, z 均为正数且小于 100 的勾股数 (x, y, z)。\n\n```\nfor x in range(1,100):\n    for\
    \ y in range(1,100):\n        for z in range(1,100):\n            if x**2+y**2==z**2:\n\
    \                print(x,y,z)\n```\n\n如果你运行这个程序，你会注意到存在冗余的解。例如，(3, 4, 5) 和 (4,\
    \ 3, 5) 都被列出了。为了消除这些冗余，将第二个循环改为从 `x` 运行到 100。这样，当 `x` 为 4 时，例如，`y` 的第一个被搜索的值将是\
    \ 4，而不是 1，因此我们不会得到冗余的 (4, 3, 5)。同样，将第三个循环改为从 `y` 运行到 100。\n\n当你查看这些解时，你可能还会注意到有许多解是其他解的倍数，例如\
    \ (6, 8, 10) 和 (9, 12, 15) 是 (3, 4, 5) 的倍数。以下程序只找出**原始勾股数**，即不是其他勾股数倍数的勾股数。它的做法是每次找到一个新的勾股数时，它都会检查以确保\
    \ x, y 和 z 不都能被同一个数整除。\n\n```\nfor x in range(1,100):\n    for y in range(x,100):\n\
    \        for z in range(y,100):\n            if x**2+y**2==z**2:\n           \
    \     for i in range(2,x):\n                    if x%i==0 and y%i==0 and z%i==0:\n\
    \                        break\n                else:\n                    print((x,y,z),\
    \ end=' ')\n```\n\n**示例 4** 在第 15.7 节中，我们将编写一个玩井字棋的游戏。棋盘是一个 3x3 的网格，我们将使用嵌套的 `for`\
    \ 循环来创建它。"
