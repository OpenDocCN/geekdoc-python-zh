  md: '**Raw strings** A lot of the patterns use backslashes. However, backslashes
    in strings are used for escape characters, like the newline, \n. To get a backslash
    in a string, we need to do \. This can quickly clutter up a regular expression.
    To avoid this, our patterns will be raw strings, where backslashes can appear
    as is and don''t do anything special. To mark a string as a raw string, preface
    it with an r like below:


    ```

    s = r''This is a raw string. Backslashes do not do anything special.''

    ```


    # 21.2 Syntax


    **Basic example** We start with a regular expression that mimics the replace method
    of strings. Here is a example of using replace to replace all occurrences of abc
    with *:


    ```

    ''abcdef abcxyz''.replace(''abc'', ''*'')

    ```


    ```

    *def *xyz

    ```


    Here is the regular expression code that does the same thing:


    ```

    re.sub(r''abc'', ''*'', ''abcdef abcxyz'')

    ```


    **Square brackets** We can use square brackets to indicate that we only want to
    match certain letters. Here is an example where we replace every a and d with
    asterisks:


    ```

    re.sub(r''[ad]'', ''*'', ''abcdef'')

    ```


    ```

    *bc*ef

    ```


    Here is another example, where an asterisk replaces all occurrences of an a, b,
    or c that is followed by a 1, 2, or 3:


    ```

    re.sub(r''[abc][123]'', ''*'', ''a1 + b2 + c5 + x2'')

    ```


    ```

    * + * + c5 + x2

    ```


    We can give ranges of values—for example, [a-j] for the letters a through j. Here
    are some further examples of ranges:


    | Range | Description |

    |---|---|

    | [A-Z] | any capital letter |

    | [0-9] | any digit |

    | [A-Za-z0-9] | any letter or digit |


    A slightly shorter way to match any digit is \d, instead of [0-9].


    **Matching any character** Use a dot to match (almost) any character. Here is
    an example:


    ```

    re.sub(r''A.B'', ''*'', ''A2B AxB AxxB A$B'')

    ```'
