  - "[PAGE 251]\n\n```\nfrom collections import Counter\nimport re\ns = open('filename.txt',\
    \ read)\nwords = re.findall('\\w+', s.lower())\nc = Counter(words)\n```\n\nTo\
    \ print the ten most common words, we can do the following:\n\n```\nfor word,\
    \ freq in c.most_common(10):\n    print(word, ':', freq)\n```\n\nTo pick out only\
    \ those words that occur more than five times, we can do the following:\n\n```\n\
    [word for word in c if c[word]>5]\n```\n\n**Math with counters** You can use some\
    \ operators on Counter objects. Here is some examples:\n\n```\nc = Counter('aabbb')\
    \ d =\nCounter('abccc') c+d\n\nc-d\nc&d\nc|d\n```\n\n```\nCounter({'b': 4, 'a':\
    \ 3, 'c': 3})\nCounter({'b': 2, 'a': 1})\nCounter({'a': 1, 'b': 1})\nCounter({'c':\
    \ 3, 'b': 3, 'a': 2})\n```\n\nDoing c+d combines the counts from c and d, whereas\
    \ c-d subtracts the counts from d from the corresponding counts of c. Note that\
    \ the Counter returned by c-d does not include 0 or negative counts. The & stands\
    \ for intersection and returns the minimum of the two values for each item, and\
    \ | stands for union and returns the maximum of the two values.\n\n# 24.6 defaultdict\n\
    \nThe collections module has another dictionary-like class called defaultdict.\
    \ It is almost exactly like an ordinary dictionary except that when you create\
    \ a new key, a default value is given to the key. Here is an example that mimics\
    \ what the Counter class does.\n\n```\ns = 'aababcabcdabcd' dd =\ndefaultdict(int)\
    \ for c in s:\n    dd[c]+=1\n```\n\n```\ndefaultdict(<class 'int'>, {'a': 5, 'c':\
    \ 3, 'b': 4, 'd': 2})\n```"
  - "[PAGE 252]\n\n# 24.6. DEFAULTDICT\n\nIf we had tried this with dd just a regular\
    \ dictionary, we would have gotten an error the first time the program reached\
    \ dd[c]+=1 because dd[c] did not yet exist. But since we declared dd to be defaultdict(int),\
    \ each value is automatically assigned a value of 0 upon creation, and so we avoid\
    \ the error. Note that we could use a regular dictionary if we add an if statement\
    \ into the loop, and there is also a function of regular dictionaries that allows\
    \ you to set a default value, but defaultdict runs faster.\n\nWe can use types\
    \ other than integers. Here is an example with strings:\n\n```\ns = 'aababcabcdabcd'\
    \ dd =\ndefaultdict(str) for c in s:\n    dd[c]+='*'\n```\n\n```\ndefaultdict(<class\
    \ 'str'>, {'a': '*****', 'c': '***',\n'b': '****', 'd': '**'})\n```\n\nUse list\
    \ for lists, set for sets, dict for dictionaries, and float for floats. You can\
    \ use various other classes, too. The default value for integers is 0, for lists\
    \ is [], for sets is set(), for dictionaries is {} and for floats is 0.0. If you\
    \ would like a different default value, you can use an anonymous function like\
    \ below:\n\n```\ndd = defaultdict(lambda:100)\n```\n\nUsed with the code from\
    \ the first example, this will produce:\n\n```\ndefaultdict(<class 'int'>, {'a':\
    \ 105, 'c': 103, 'b': 104,\n'd': 102})\n```"
