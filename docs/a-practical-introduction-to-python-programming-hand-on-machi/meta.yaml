  md: '**Note** Note that the floor and **int** functions behave the same for positive
    numbers, but differ-ently for negative numbers. For instance, floor(3.57) and
    **int**(3.57) both return the inte-ger 3. However, floor(-3.57) returns -4, the
    greatest integer less than or equal to -3.57, while **int**(-3.57) returns -3,
    which is obtained by throwing away the decimal part of the number.


    **atan2** The atan2 function is useful for telling the angle between two points.
    Let *x* and *y* be the distances between the points in the *x* and *y* directions.
    The tangent of the angle in the picture below is given by *y*=*x*. Then arctan(
    *y*=*x*) gives the angle itself.


    ![](img/b783d4b75e24755b056ee79a66b412de_229_0.png)


    But if the angle were 90 , this would not work as *x* would be 0. We would also
    need special cases to handle when *x* < 0 and when *y* < 0. The atan2 function
    handles all of this. Doing atan2(y,x) will return arctan( *y*=*x*) with all of
    the cases handled properly.


    The atan2 function returns the result in radians. If you would like degrees, do
    the following:


    ```

    angle = math.degrees(atan2(y,x))

    ```


    The resulting angle from atan2 is between and ( 180 and 180 ). If you would like
    it between 0 and 360 , do the following:


    ```

    angle = math.degrees(atan2(y,x))

    angle = (angle+360) % 360

    ```


    # ## 22.2 Scientific notation


    Look at the following code:


    ```

    100.1**10

    ```


    ```

    1.0100451202102516e+20

    ```


    The resulting value is displayed in scientific notation. It is 1.0100451202102516
    10<sup>20</sup>. The e+20 stands for 10<sup>20</sup>. Here is another example:


    ```

    .15**10

    ```


    ```

    5.7665039062499975e-09

    ```


    This is 5.7665039062499975 10<sup>9</sup>.'
