    ```\nlargest = 0\nfor word in wordlist:\n    for c in word:\n        if c not\
    \ in 'abcde':\n            break\n    else:\n        if len(word)>largest:\n \
    \           largest=len(word)\n            largest_word=word\nprint(largest_word)\n\
    ```\n\nThe way this program works is for every word in the wordlist, we use a\
    \ for/else loop (Section 9.4) to scan through the word looking checking each character\
    \ to see if it is an a, b, c, d, or e. If any letter isn't one of these, then\
    \ we break out of the loop and move on to the next word. On the other hand, if\
    \ we get all the way through the loop, then we go to else block. In that block,\
    \ we use a modification of the technique from Section 5.5 for finding a maximum.\n\
