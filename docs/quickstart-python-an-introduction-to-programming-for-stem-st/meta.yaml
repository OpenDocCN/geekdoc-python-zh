    \ to Programming for STEM Students\n\n![](img/7379a847211148e7d9132e7ee297d894_0_0.png)\n\
    \nessentials\n\n# Springer essentials\n\n*Springer essentials* provide up-to-date\
    \ knowledge in a concentrated form. They aim to deliver the essence of what counts\
    \ as “state-of-the-art” in the current academic discussion or in practice. With\
    \ their quick, uncomplicated and comprehensible information, essentials provide:\n\
    \n- an introduction to a current issue within your field of expertise\n- an introduction\
    \ to a new topic of interest\n- an insight, in order to be able to join in the\
    \ discussion on a particular topic\n\nAvailable in electronic and printed format,\
    \ the books present expert knowledge from Springer specialist authors in a compact\
    \ form. They are particularly suitable for use as eBooks on tablet PCs, eBook\
    \ readers and smartphones. *Springer essentials* form modules of knowledge from\
    \ the areas economics, social sciences and humanities, technology and natural\
    \ sciences, as well as from medicine, psychology and health professions, written\
    \ by renowned Springer-authors across many disciplines.\n\nMore information about\
    \ this subseries at [https://link.springer.com/bookseries/16761](https://link.springer.com/bookseries/16761)\n\
    \nChristoph Schäfer\n\n# Quickstart Python\n\nAn Introduction to Programming for\
    \ STEM Students\n\n![](img/7379a847211148e7d9132e7ee297d894_3_0.png)\n\nChristoph\
    \ Schäfer\nInstitut für Astronomie und Astrophysik\nEberhard Karls Universität\
    \ Tübingen\nTübingen, Germany\n\nISSN 2197-6708\nessentials\nISSN 2731-3107\n\
    Springer essentials\nISBN 978-3-658-33551-9\nhttps://doi.org/10.1007/978-3-658-33552-6\n\
    \nISSN 2197-6716 (electronic)\nISSN 2731-3115 (electronic)\nISBN 978-3-658-33552-6\
    \ (eBook)\n\nThis book is a translation of the original German edition „Schnellstart\
    \ Python“ by Schäfer, Christoph, published by Springer Fachmedien Wiesbaden GmbH\
    \ in 2019. The translation was done with the help of artificial intelligence (machine\
    \ translation by the service DeepL.com). A subsequent human revision was done\
    \ primarily in terms of content, so that the book will read stylistically differently\
    \ from a conventional translation. Springer Nature works continuously to further\
    \ the development of tools for the production of books and on the related technologies\
    \ to support the authors.\n\n© Springer Fachmedien Wiesbaden GmbH, part of Springer\
