    9 10920256

    ```


    In line 4 the object `j` of class `int` is created and referenced to the variable
    `i`. Both objects point to the same memory area and therefore have the same `id`.
    They are one and the same object. By the assignment in line 7 a new object with
    the name `j` of class `int` is created, which also gets its own `id`. To check
    whether two objects are identical, the `is` operator is available. To determine
    whether two objects have the same value, the `==` operator must be used. The following
    example with the Python interpreter illustrates the difference between the two
    operators


    ```

    1 >>> i = 512

    2 >>> j = 512

    3 >>> i == j

    4 True

    5 >>> i is j

    6 False

    7 >>> id(i)

    8 140111062575088

    9 >>> id(j)

    10 140111062573456

