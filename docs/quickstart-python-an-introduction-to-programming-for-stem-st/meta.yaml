    \ = ['milky way', 'andromeda', 'm82']\n>>> ngc3109_group = ['ngc3109', 'sextans_a',\
    \ 'sextans_b', 'pgc_29194']\n>>> some_galaxies.append('m83')  # Add m82 to the\
    \ list\n>>> some_galaxies.extend(ngc3109_group) # Join the elements of list ngc3109_group\n\
    >>> print(some_galaxies)\n['milky way', 'andromeda', 'm82', 'm83', 'ngc3109',\
    \ 'sextans_a', 'sextans_b', 'pgc_29194']\n```\n\nOther useful methods are insert()\
    \ to insert an element at a specific position, clear() to remove all elements\
    \ from a list, count(e) to count the number of occurrences of element value e\
    \ in the list, index(e[, start[, end]]) to find the index of the first occurrence\
    \ of an element in a list, where the optional arguments start and end limit the\
    \ search indexes.\n\nA particularly important list object function is the copy()\
    \ function. Let us consider the following program code, which creates a reference\
    \ to a list of galaxies\n\n```\n>>> some_galaxies = ['milky way', 'andromeda',\
    \ 'm82']\n>>> sg = some_galaxies # Create a reference sg that references some_galaxies\n\
    >>> sg.remove('m82')  # Remove m82 from the list sg\n>>> print(some_galaxies)\n\
    ['milky way', 'andromeda']  # Oops! We did not mean to\n```\n\nSince the object\
    \ sg is identical to the object some_galaxies (check this with the id() function),\
    \ we have also changed the list some_galaxies with the"
  mdcn: "## 表 5.1 用于检查标识和相等性的运算符\n\n| 运算符 | 功能 |\n|---|---|\n| is | 检查对象是否相等，即对象是否引用同一内存区域\
    \ |\n| == | 检查对象的值是否相等，即存储区域中对应位置的值是否相等 |\n\n首先创建两个整数对象，它们的值都是 512。因此，使用 `==`\
    \ 运算符比较这两个值会返回 `True`。然而，由于这两个对象并非同一对象（即两个不同的对象，各自拥有自己的内存区域），使用 `is` 运算符检查对象是否相等会返回\
    \ `False`。在第 11 行，我们显式地创建了一个新的引用 `i` 指向整数对象 `j`。它们引用了内存中的同一位置，因此这两个对象是同一对象，`is`\
    \ 运算符返回 `True`。这两个运算符的特性在表 5.1 中给出。\n\n虽然 Python 3 中的整数变量可以具有无限的长度，但浮点数的值范围被限制在\
    \ 64 位。可表示的最大数字约为 1.8 × 10^308。所有大于此值的数字都称为 `inf`。\n\n```\n>>> f = 1.79e308\n\
    >>> print(f)\n1.79e+308\n>>> f = 1.8e308\n>>> print(f)\ninf\n```\n\n大于零的最小可表示数字是\
    \ 5 × 10^-324。介于 0 和此数字之间的所有数字实际上都被视为 0。\n\n```\n>>> not_zero = 5e-324\n>>> print(not_zero)\n\
    5e-324\n>>> not_zero = 5e-325\n>>> print(not_zero)\n0.0\n```\n\nPython 也允许使用复数进行计算。数据类型\
    \ `complex` 的语法为（实部 + j*虚部）。\n\n```\n>>> c = 1 + 2j\n>>> type(c)\n<class 'complex'>\n\
    >>> c2 = 2 + 3j\n>>> c + c2\n(3+5j)\n```\n\n表 5.2 数值数据类型及其值范围\n\n| 对象 | 精度和值范围\
    \ |\n| :--- | :--- |\n| int | 值范围不受限制 |\n| float | 64 位双精度，符合 IEEE 754 标准 |\n\
    | bool | true 和 false |\n| complex | 具有实部和虚部的复数 |\n\n此外，Python 提供了 `bool` 类，其值范围由\
    \ `False` 或 `True` 给出。\n\n```\n>>> var = True\n>>> type(var)\n<class 'bool'>\n\
    ```\n\n特别是在条件语句中，了解 Python 中什么是 `True` 或 `False` 很重要。以下表达式在 Python 中被解释为假：值 `False`、特殊值\
    \ `None`、空字符串、空列表、空字典、空元组以及显式的数值空值（如 0、0.0）。相反，在 Python 中，所有不是 `False` 的东西都是 `True`，特别是非空字符串\
    \ \"0\" 与数值 0 相比。\n\n```\n>>> var = '0'\n>>> type(var)\n<class 'str'>\n>>> if\
    \ (var): print(\"True value\", var)\nTrue Value 0\n```\n\n数值数据类型的值范围列在表 5.2 中。\n\
    \n## 5.2 序列数据类型\n\n序列数据类型是指包含多个元素的类型。这些包括列表、元组和字符串。NumPy 通过极其有用的 `numpy.array`\
    \ 数据类型扩展了这个列表，我们将在后面详细讨论。最通用的序列数据类型是 `list`：列表可以包含不同数据类型的数据，并且可以在创建后进行更改（`可变`）。列表的元素本身可以是一个列表。列表是最强大的序列数据类型，Python\
    \ 允许对列表进行许多操作和方法。序列数据类型最重要的运算符列在表 5.3 中。通常，列表的优势并非必需，而必须更多地关注速度或内存需求。\n\n表 5.3\
    \ 序列数据类型最重要的操作\n\n| 语法 | 操作 |\n|---|---|\n| a[i] | 返回序列 a 的第 i 个元素 |\n| a[i:j]\
    \ | 返回序列 a 中从第 i 个到第 (j-1) 个元素的范围 |\n| a[i:j:k] | 返回序列 a 中从第 i 个到第 (j-1) 个元素，步长为\
    \ k 的范围 |\n| a+b | 连接 a 和 b，返回一个新的数据序列 |\n| a+=b | 将 b 添加到 a |\n| n*a | 创建一个内容重复\
    \ n 次的新数据序列 |\n| e in a | 检查 e 是否包含在 a 中，返回值 True 或 False |\n| e not in a | 检查\
    \ e 是否不包含在 a 中，返回值 True 或 False |\n\n在这些情况下，使用元组代替列表。与列表不同，序列数据类型元组（`tuple`）在创建后是不可更改的（`不可变`）。重要的是要理解，虽然元组本身不能再被更改，但如果元组的一个元素是一个列表，那么这个列表的元素仍然可以更改。换句话说，元组的元素是不可更改的引用，但如果引用指向一个可变对象，那么该对象可以更改，因此元组中的元素也可以更改。以下示例说明了这一点。\n\
    \n```\n>>> b = []          # 创建空列表 b\n>>> a = (1,2,b)     # 创建元组 a，包含元素 1、2 和\
    \ b\n>>> type(a)\n<class 'tuple'>\n>>> type(b)\n<class 'list'>\n>>> a\n(1, 2,\
    \ [])\n>>> b.append(10) # 向列表 b 追加 10\n>>> b\n[10]\n>>> a\n(1, 2, [10])      #\
    \ a[2] 已更改\n```\n\n所谓的切片（slicing）允许你访问序列数据类型的区域，使你能够快速方便地处理列表（以及元组）。首先，我们通过将两个列表\
    \ `inner_planets` 和 `outer_planets` 相加，创建一个包含我们太阳系行星的列表。\n\n```\n>>> inner_planets\
    \ = ['Mercury', 'Venus', 'Earth', 'Mars']\n>>> outer_planets = ['Jupiter', 'Saturn',\
    \ 'Uranus', 'Neptune', 'Pluto']\n>>> solar_system = inner_planets + outer_planets\n\
    >>> print(solar_system)\n['Mercury', 'Venus', 'Earth', 'Mars', 'Jupiter', 'Saturn',\
    \ 'Uranus', 'Neptune', 'Pluto']\n>>> solar_system[0:4]    # 前四颗行星\n['Mercury',\
    \ 'Venus', 'Earth', 'Mars']\n>>> 'Pluto' in solar_system    # 冥王星是行星吗？\nTrue\n\
    ```\n\n我们可以反转列表，或者只输出每隔一个行星。\n\n```\n>>> solar_system[::-1]    # 反向打印列表\n['Neptune',\
    \ 'Uranus', 'Saturn', 'Jupiter', 'Mars', 'Earth', 'Venus', 'Mercury']\n>>> solar_system[::2]\
    \    # 只打印列表中的每隔一个元素\n['Mercury', 'Earth', 'Jupiter', 'Uranus']\n```\n\n由于我们显然犯了一个错误，冥王星不再是行星，我们创建一个不包含最后一个元素的新列表。\n\
    \n```\n>>> solar_system = solar_system[:-1] # 创建不包含最后一个元素的新列表\n>>> 'Pluto' in\
    \ solar_system    # 冥王星是行星吗？\nFalse\n```\n\n这会生成一个新列表（具有新的 id）。或者，我们可以使用列表的方法来移除一个元素。\n\
    \n```\n>>> solar_system = inner_planets + outer_planets\n>>> solar_system.remove('Pluto')\n\
    >>> print(solar_system)\n['Mercury', 'Venus', 'Earth', 'Mars', 'Jupiter', 'Saturn',\
    \ 'Uranus', 'Neptune']\n```\n\n这种方法的优点是不会创建新列表，只是从列表中移除一个元素，这比创建一个少一个元素的全新列表要快得多。如果我们为太阳系选择元组而不是列表，那么移除冥王星将是不可能的，因为元组对象不提供移除元素的方法。\n\
    \n```\n>>> solar_system = ('Mercury', 'Venus', 'Earth', 'Mars', 'Jupiter', 'Saturn',\
    \ 'Uranus', 'Neptune', 'Pluto')\n>>> print(solar_system)\n('Mercury', 'Venus',\
    \ 'Earth', 'Mars', 'Jupiter', 'Saturn', 'Uranus', 'Neptune', 'Pluto')\n>>> solar_system.remove('Pluto')\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    AttributeError: 'tuple' object has no attribute 'remove'\n```\n\nPython 解释器委婉地指出我们的元组对象没有提供\
    \ `remove` 属性。我们不能简单地更改最后一个行星的名称并将其设置为空值。\n\n```\n>>> solar_system = ('Mercury',\
    \ 'Venus', 'Earth', 'Mars', 'Jupiter', 'Saturn', 'Uranus', 'Neptune', 'Pluto')\n\
    >>> solar_system[8] = ''  # 将第 9 个元素设置为空字符串\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nTypeError: 'tuple' object does not support\
    \ item assignment\n```\n\n因为元组的元素是不可变的。\n\n除了 `remove`，列表对象还提供了许多有用的方法，使工作更轻松。我们将在以下示例中说明这一点。要向列表添加一个元素，可以使用\
    \ `append()`。\n\n```\n>>> some_galaxies = ['milky way', 'andromeda', 'm82']\n\
    >>> ngc3109_group = ['ngc3109', 'sextans_a', 'sextans_b', 'pgc_29194']\n>>> some_galaxies.append('m83')\
    \  # 将 m82 添加到列表\n>>> some_galaxies.append(ngc3109_group) # 将 ngc3109_group 添加到列表\n\
    >>> print(some_galaxies)\n['milky way', 'andromeda', 'm82', 'm83', ['ngc3109',\
    \ 'sextans_a', 'sextans_b', 'pgc_29194']]\n```\n\n不幸的是，在最后一步中，我们创建了一个列表中的列表，因为我们把列表\
    \ `ngc3109_group` 添加到了列表 `some_galaxies` 中。如果我们只想追加这个列表的元素，我们必须使用列表对象函数 `extend()`。\n\
    \n```\n>>> some_galaxies = ['milky way', 'andromeda', 'm82']\n>>> ngc3109_group\
    \ = ['ngc3109', 'sextans_a', 'sextans_b', 'pgc_29194']\n>>> some_galaxies.append('m83')\
    \  # 将 m82 添加到列表\n>>> some_galaxies.extend(ngc3109_group) # 连接列表 ngc3109_group\
    \ 的元素\n>>> print(some_galaxies)\n['milky way', 'andromeda', 'm82', 'm83', 'ngc3109',\
    \ 'sextans_a', 'sextans_b', 'pgc_29194']\n```\n\n其他有用的方法包括 `insert()` 在特定位置插入元素，`clear()`\
    \ 从列表中移除所有元素，`count(e)` 计算列表中元素值 `e` 出现的次数，`index(e[, start[, end]])` 查找列表中第一个出现元素的索引，其中可选参数\
