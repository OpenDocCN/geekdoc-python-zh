    # Overview of the Programming Language Python


    In recent years, the programming language Python has established itself alongside
    MATLAB and R as the standard for scientific workplaces in research and development.


    The great popularity of Python is based on its easy extensibility: It is very
    easy to use modules from other developers in your own scripts and programs. Especially,
    the modules NumPy, SciPy, and Matplotlib offer scientists and engineers a perfect
    development environment for scientific and technical computing, for applications
    in physics, chemistry, biology, and computer science. Python is also used in the
    latest applications in the modern fields of research Big Data Science and Machine
    Learning.


    Originally Python was developed in the early 1990s by Guido van Rossum in the
    first version during his Christmas holiday. The pure teaching language ABC served
    as a model for him. His main goals were clarity and easy comprehensibility. The
    first full version was released in 1994 and was designed by van Rossum to be easily
    extensible by modules, and the language itself could be easily embedded in other
    languages. Since Python itself uses a clear syntax and can be programmed with
    simple structures, the language is particularly suitable for beginners and is
    comparatively easy to learn.


    # Python Versions 2 and 3


    Python was recently developed in two different major versions that are incompatible
    with each other. It is very likely that you will come across older Python scripts
    of version 2 as soon as your work is built on older, existing scripts. In general,
    the number of projects with Python 2 still predominates at present, a situation
    which will, however, have reversed by 2021.


    In this Springer *essential* we focus mainly on Python version 3, but if you are
    presented with an older Python script in your scientific career, your knowledge
    of'
- md: 'version 3 will be sufficient for you to understand it and to modify it according
    to your needs.


    For new Python projects, use only the new version 3; all modules of interest for
    the natural sciences are now available for version 3, while support for older
    versions is discontinued. A particularly important example is the Matplotlib module,
    which in its latest version is only available for Python 3. If you need to convince
    someone to use the new version 3 instead of the outdated version 2.7, argue with
    the following points.


    - Support for Python 2.7 has expired on January 1, 2020. The active development
    of Python 2.7 ended in mid-2010. All new features are only included in version
    3 and only occasionally have been backported to 2.7.

    - Python 3 has better Unicode support: All text strings are Unicode by default.

    - Important modules only support version 3.


    Other new features that we will not go into detail include a different syntax
    for the print function, the use of views and iterators instead of lists, and changes
    for the integer division. The use of version 2 is only justified in individual
    cases. The most common individual case is a program already existing in version
    2 for which porting is too costly.


    ## Installation of Python


    Very few users compile Python directly from the source files from the central
    web-site of the Python project, but use precompiled packages, some of which already
    contain the important modules NumPy, SciPy, and Matplotlib. The following describes
    the installation for the most common operating systems.


    ### 2.1 Windows


    For Windows operating systems, the Anaconda Suite offers a free Python suite with
    an easy installation in the basic version with over 1400 packages. A graphical
    installer can be obtained for versions 2 and 3 from the website of Anaconda Inc.
    The standard installation includes all modules relevant for scientific applications
    and the development environment spyder.


    ### 2.2 Linux


    In almost all Linux distributions the most important Python packages for versions
    2 and 3 can be installed via the respective package manager of the distribution.
    Apart from that the Anaconda Suite for Linux is also available, but it is recommended
    to use the distribution’s own packages. The call for installation on Debian-based
    systems is


    ```

    apt install python3 python3-numpy python3-scipy python3-matplotlib python3-spyder

    ```


    Any dependencies are resolved by the package manager and all packages are installed
    accordingly.


    ### 2.3 macOS


    Under the operating system macOS, there are also several possibilities for installation.
    On the one hand you can use the Anaconda Suite mentioned above, on the other hand
    most Python packages are available through one of the better known open source
    package managers `fink`, `macports`, `homebrew`. The installation of the Python
    base package via `homebrew` is for example


    ```

    brew install python3

    ```


    With the help of Python''s own package manager `pip` (Pip Installs Packages),
    you can then install additional Python packages


    ```

    pip install numPy sciPy matplotlib

    ```


    The command `pip list` can be used to display installed packages.


    ## Execution of a Python Program


    In order to execute a program on a computer, the program code of a higher programming
    language, such as Python in our case, must either be executed directly by an interpreter,
    or it must first be translated into machine language by a compiler. Machine language
    consists of instructions that are executed directly by the processor. The difference
    between an interpreter and a compiler is that the compiler creates a new file
    from the source files, while the interpreter reads the source files and executes
    them directly at runtime. There are some intermediate stages between compiler
    and interpreter which we will not go into detail. Basically, the Python interpreter
    also generates a so-called byte code with the typical extension .pyc while the
    program is executed. This brings considerable speed advantages when using modules,
    because modules already used do not have to be reinterpreted if they are already
    available in bytecode format. The Python interpreter, therefore, first checks
    whether the source file has changed and only then generates new byte code if necessary.


    A Python program can be started in different ways. The Python interpreter is called
    directly on the command line to work interactively. In general, you will either
    write a Python script with your favorite text editor to execute it afterward,
    or you can use a development environment like spyder. In the following we will
    look at the different possibilities.


    ### 3.1 Interactive Python


    On Windows the interpreter is called with the call python.exe, on Linux and macOS
    with the command python if only version 3 is installed, otherwise possibly with
    python3. The interpreter reports directly to the terminal with the version and
    waits for further input at the so-called Python prompt >>>


    ```

    $ python3

    Python 3.6.6 (default, Jun 27 2018, 14:44:17)

    [GCC 8.1.0] on linux

    Type "help", "copyright", "credits" or "license" for more information.

    >>>

    ```


    The interactive interpreter can also be used as a practical calculator on the
    command line


    ```

    >>> 3+12-2*(3-1)

    11

    >>> 2**2

    4

    >>> 2/3+4

    4.666666666666667

    ```


    In practice, the pure interpreter is only used for short tests or as a calculator
    replacement. As soon as a script is written for repeated use, it is recommended
    to write and edit the program statements in a text editor and have them executed
    by the interpreter. A text file `calc.py` with the content


    ```

    print(3+12-2*(3-1))

    print(2**2)

    print(2/3+4)

    ```


    produces the following output when called by the interpreter on Linux


    ```

    # This $ is the shell prompt and need not be entered

    $ python calc.py

    11

    4

    4.666666666666667

    ```


    For Windows the interpreter must be called accordingly


    ```

    # Assuming that calc.py is located in the root directory of disk C:

    C:\> python.exe C:\calc.py

    11

    4

    4.666666666666667

    ```


    The only difference between the `calc.py` script and the interactive call is the
    additional `print` statement in the script. By default, return values of calls
    are only printed in the interactive interpreter on standard output. Without calling
    the `print` function we would not get any output of the results in the terminal.


    Interactive working with Python has proven to be so efficient that an extension
    called IPython (Interactive Python) has been developed in the SciPy community.
    However, IPython is more than an extended command line interpreter and is more
    like a small integrated development environment. IPython is not part of the standard
    Python installation and must be installed separately. Useful extensions to the
    standard Python command-line interpreter are:


    - IPython offers automatic *tab completion* of variables, functions, classes,
    modules.

    - IPython supports the common modules for programming graphical user interfaces
    (GUIs).

    - The output is in color and more detailed than the standard interpreter.

    - Some operating system commands (`ls`, `cp`, ...) are available on the IPython
    command line.


    In combination with NumPy, SciPy, and Matplotlib, IPython is the perfect tool
    for data processing and data visualization in the natural sciences.


    ### 3.2 Development Environments


    For larger projects and scripts it is recommended to use an integrated development
    environment (IDE). There are a variety of different IDEs and the final choice
    depends heavily on personal preferences.


    The cross-platform development environment Spyder (Scientific PYthon Development
    EnviRonment), written entirely in Python, provides both beginners and advanced
    programmers with all the tools needed for successful development: An integrated
    editor with colored syntax highlighting and auto-completion, a variable explorer,
    a Python or, if applicable, IPython interface, and a debugger.


    The popular development environment Eclipse from the Java community can also be
    used for Python programming with the PyDev extension. This IDE is recommended
    for Java developers.


    The commercial development environment PyCharm from JetBrains offers everything
    a modern development environment needs and a little bit more: PyCharm allows the
    installation of Python modules and plugins directly from the graphical interface.
    In addition, there is a graphical interface to all current version control systems
    like CVS, git, mercurial, and subversion or even the possibility to directly upload
    to Github. A helpful feature for scientific applications is the direct display
    and integration of graphics and plots. Besides the commercial version, the free
    community version is also available, but unfortunately, it offers fewer features.
    For academic users, that is, students and lecturers, the commercial version can
    be used free of charge.


    As a meanwhile adequate alternative to an IDE, many scientific users use Jupyter
    Notebook or JupyterLab. This is an open-source web application that allows to
    create and share code, equations, visualization, and text modules. For example,
    JupyterLab allows the direct export of a document to the typesetting system used
    in the natural sciences LaTeX.'
  mdcn: '版本3足以让你理解它，并根据你的需求进行修改。


    对于新的Python项目，请仅使用新版本3；自然科学相关的所有模块现在都已支持版本3，而对旧版本的支持已停止。一个特别重要的例子是Matplotlib模块，其最新版本仅适用于Python
    3。如果你需要说服某人使用新版本3而不是过时的版本2.7，请用以下论点。


    - 对Python 2.7的支持已于2020年1月1日到期。Python 2.7的活跃开发在2010年中期结束。所有新功能仅包含在版本3中，且仅偶尔向2.7版本移植。

    - Python 3具有更好的Unicode支持：所有文本字符串默认为Unicode。

    - 重要模块仅支持版本3。


    其他我们不会详细讨论的新特性包括：`print`函数的不同语法、使用视图和迭代器代替列表，以及整数除法的更改。使用版本2仅在个别情况下是合理的。最常见的个别情况是已存在版本2的程序，其移植成本过高。


    ## Python的安装


    很少有用户直接从Python项目中心网站的源文件编译Python，而是使用预编译的软件包，其中一些已包含重要的模块NumPy、SciPy和Matplotlib。以下描述了针对最常见操作系统的安装。


    ### 2.1 Windows


    对于Windows操作系统，Anaconda套件提供了一个免费的Python套件，基础版本安装简便，包含超过1400个软件包。可以从Anaconda Inc.的网站获取版本2和3的图形安装程序。标准安装包括所有与科学应用相关的模块和开发环境spyder。


    ### 2.2 Linux


    在几乎所有Linux发行版中，可以通过发行版各自的包管理器安装版本2和3最重要的Python包。除此之外，Linux版的Anaconda套件也可用，但建议使用发行版自身的包。在基于Debian的系统上安装的命令是


    ```

    apt install python3 python3-numpy python3-scipy python3-matplotlib python3-spyder

    ```


    所有依赖关系由包管理器解决，所有包将相应安装。


    ### 2.3 macOS


    在macOS操作系统下，也有多种安装可能性。一方面可以使用上述的Anaconda套件，另一方面大多数Python包可通过较知名的开源包管理器`fink`、`macports`、`homebrew`之一获得。通过`homebrew`安装Python基础包的示例如下


    ```

    brew install python3

    ```


    借助Python自身的包管理器`pip`（Pip Installs Packages），你可以安装额外的Python包


    ```

    pip install numPy sciPy matplotlib

    ```


    命令`pip list`可用于显示已安装的包。


    ## Python程序的执行


    为了在计算机上执行程序，高级编程语言（如本例中的Python）的程序代码必须由解释器直接执行，或者必须先由编译器翻译成机器语言。机器语言由处理器直接执行的指令组成。解释器和编译器的区别在于，编译器从源文件创建一个新文件，而解释器读取源文件并在运行时直接执行它们。编译器和解释器之间存在一些中间阶段，我们不会详细讨论。基本上，Python解释器在执行程序时也会生成一个具有典型扩展名`.pyc`的所谓字节码。这在使用模块时带来了显著的速度优势，因为如果模块已经以字节码格式存在，则无需重新解释已使用的模块。因此，Python解释器首先检查源文件是否已更改，然后仅在必要时生成新的字节码。


    Python程序可以通过不同的方式启动。直接在命令行调用Python解释器以进行交互式工作。通常，你会使用喜欢的文本编辑器编写Python脚本，然后执行它，或者你可以使用像spyder这样的开发环境。下面我们来看不同的可能性。


    ### 3.1 交互式Python


    在Windows上，解释器通过调用`python.exe`来调用，在Linux和macOS上，如果只安装了版本3，则使用命令`python`，否则可能使用`python3`。解释器直接向终端报告版本，并在所谓的Python提示符`>>>`处等待进一步输入


    ```

    $ python3

    Python 3.6.6 (default, Jun 27 2018, 14:44:17)

    [GCC 8.1.0] on linux

    Type "help", "copyright", "credits" or "license" for more information.

    >>>

    ```


    交互式解释器也可以在命令行上用作实用的计算器


    ```

    >>> 3+12-2*(3-1)

    11

    >>> 2**2

    4

    >>> 2/3+4

    4.666666666666667

    ```


    在实践中，纯解释器仅用于简短测试或作为计算器替代品。一旦编写了用于重复使用的脚本，建议在文本编辑器中编写和编辑程序语句，然后让解释器执行它们。一个内容如下的文本文件`calc.py`


    ```

    print(3+12-2*(3-1))

    print(2**2)

    print(2/3+4)

    ```


    在Linux上通过解释器调用时产生以下输出


    ```

    # This $ is the shell prompt and need not be entered

    $ python calc.py

    11

    4

    4.666666666666667

    ```


    对于Windows，必须相应地调用解释器


    ```

    # Assuming that calc.py is located in the root directory of disk C:

    C:\> python.exe C:\calc.py

    11

    4

    4.666666666666667

    ```


    `calc.py`脚本和交互式调用之间的唯一区别是脚本中额外的`print`语句。默认情况下，调用的返回值仅在交互式解释器中打印到标准输出。如果不调用`print`函数，我们将在终端中得不到任何结果输出。


    与Python的交互式工作已被证明非常高效，以至于SciPy社区开发了一个名为IPython（Interactive Python）的扩展。然而，IPython不仅仅是一个扩展的命令行解释器，更像是一个小型的集成开发环境。IPython不是标准Python安装的一部分，必须单独安装。标准Python命令行解释器的有用扩展包括：


    - IPython提供变量、函数、类、模块的自动*制表符补全*。

    - IPython支持用于编程图形用户界面（GUI）的常用模块。

    - 输出是彩色的，并且比标准解释器更详细。

    - 一些操作系统命令（`ls`、`cp`等）在IPython命令行上可用。


    结合NumPy、SciPy和Matplotlib，IPython是自然科学中数据处理和数据可视化的完美工具。


    ### 3.2 开发环境


    对于较大的项目和脚本，建议使用集成开发环境（IDE）。有各种不同的IDE，最终选择在很大程度上取决于个人偏好。


    跨平台开发环境Spyder（Scientific PYthon Development EnviRonment），完全用Python编写，为初学者和高级程序员提供了成功开发所需的所有工具：一个带有彩色语法高亮和自动补全的集成编辑器、一个变量浏览器、一个Python或（如果适用）IPython接口，以及一个调试器。


    来自Java社区的流行开发环境Eclipse也可以通过PyDev扩展用于Python编程。此IDE推荐给Java开发者。


    来自JetBrains的商业开发环境PyCharm提供了现代开发环境所需的一切，甚至更多：PyCharm允许直接从图形界面安装Python模块和插件。此外，它还提供了与所有当前版本控制系统（如CVS、git、mercurial和subversion）的图形界面，甚至可以直接上传到Github。对于科学应用，一个有用的功能是直接显示和集成图形和绘图。除了商业版本，还有免费的社区版本可用，但不幸的是，它提供的功能较少。对于学术用户，即学生和讲师，商业版本可以免费使用。


    作为IDE的充分替代方案，许多科学用户使用Jupyter Notebook或JupyterLab。这是一个开源的Web应用程序，允许创建和共享代码、方程、可视化和文本模块。例如，JupyterLab允许将文档直接导出到自然科学中使用的排版系统LaTeX。'
