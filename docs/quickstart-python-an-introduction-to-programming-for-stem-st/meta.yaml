    ```\n\n在迭代结束时，`next` 函数返回 `StopIteration`，例如，这会向 `for` 循环发出结束迭代的信号。\n\n生成器是允许以简单方式创建迭代器的特殊函数。一个函数计算一个或多个值并返回它们。相比之下，生成器不返回值，而是创建一个可以返回一系列数据的迭代器。生成器中与\
    \ `return` 等价的关键字是 `yield`。以下脚本实现了一个简单的生成器：\n\n```python\n#!/usr/bin/env python3\n\
    # -*- coding: utf-8 -*-\n\n# 有史以来最简单的生成器\ndef planet_generator():\n    yield \"\
    Mercury\"\n    yield \"Venus\"\n    yield \"Earth\"\n    yield \"Mars\"\n\ninner_planets\
    \ = planet_generator()\nprint(type(inner_planets))\n\nfor planet in inner_planets:\n\
    \    print(planet)\n```\n\n如果你运行该脚本，你将得到以下输出：\n\n```\n<class 'generator'>\nMercury\n\
    Venus\nEarth\nMars\n```\n\n我们的生成器 `inner_planets` 允许使用 `for` 循环进行迭代。它记住当前状态，并在再次被调用时返回新值。一旦出现\
    \ `StopIteration` 信号，循环就会自动终止。这个有些学术性的例子仅用于说明生成器的基本功能。在实践中，生成器用于优化内存消耗。在我们的例子中，行星的相应字符串仅在循环处理时才生成。或者，想象一下这里不是行星列表，而是一个无法完全加载到内存中的巨大文件。然后可以使用生成器逐行读取和编辑该文件。\n\
