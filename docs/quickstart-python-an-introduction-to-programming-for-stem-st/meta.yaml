    # 9.4 Big Data Science with Pandas


    The module `pandas` (Python Data Analysis Library) is a special extension of Python
    for the management and analysis of tabular data, which we will mention here for
    the sake of completeness. For this purpose, the module extends the standard library
    by the three objects `series`, `dataframe`, and `panel`. A `series` corresponds
    roughly to a 1D NumPy array, a `dataframe` consists'
