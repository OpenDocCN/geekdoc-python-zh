    \        rho = M_earth/volume\n    else:\n        rho = 0.0   # 确保 rho 变量存在\n\n\
    # 地球的半径和质量（国际单位制）\nR_earth = 6.371e6   # 单位：米\nM_earth = 5.972e24  # 单位：千克\n\n\
