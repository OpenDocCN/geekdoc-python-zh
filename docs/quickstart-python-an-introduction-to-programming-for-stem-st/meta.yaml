    \ function as follows\n\n```python\n#!/usr/bin/env python\n# -*- coding: utf-8\
    \ -*-\n\nimport math   # We need this to access math.pi\n\n# Our function to calculate\
    \ the density rho without functional arguments\ndef calculate_density():\n   \
    \ volume = 4./3 * math.pi * R_earth**3\n    if volume > 0:\n        rho = M_earth/volume\n\
    \    else:\n        rho = 0.0   # make sure rho exists\n    return rho\n\n# Radius\
    \ and mass of the earth in SI units\nR_earth = 6.371e6   # in m\nM_earth = 5.972e24\
    \  # in kg\n\n# Function call\nrho = calculate_density()\nprint(\"The density\
    \ of the earth is %g kg/m^3\" % rho) # Output of the density\n```\n\nWith the\
    \ keyword `global`, you can also access variables from the global context. However,\
    \ if you try to write to a global variable without the keyword global, the variable\
    \ is created locally in the function. This allows us to set up the function even\
    \ without a return value\n\n```python\n#!/usr/bin/env python\n# -*- coding: utf-8\
    \ -*-\n\nimport math   # We need this to access math.pi\n\n# Our function to calculate\
    \ the density rho without functional arguments\n# und ohne Rueckgabewert\ndef\
    \ calculate_density():\n    global rho\n    volume = 4./3 * math.pi * R_earth**3\n\
    \    if volume > 0:\n        rho = M_earth/volume\n    else:\n        rho = 0.0\
    \   # make sure rho exists\n\n# Radius and mass of the earth in SI units\nR_earth\
    \ = 6.371e6   # in m\nM_earth = 5.972e24  # in kg\n\n# Function call without arguments\
    \ and without return value\ncalculate_density()\nprint(\"The density of the earth\
    \ is %g kg/m^3\" % rho) # Output of the density\n```\n\nAs you can see when you\
    \ run it, you get the same result as with the two former versions. However, the\
    \ first version of our density calculation function should clearly be preferred\
    \ for programming. Here, the interface between the main program and the function\
    \ is clearly defined by function arguments and return values, and variables from\
    \ the global context are not inadvertently overwritten in the function. The function\
    \ arguments make it easy for other programmers to see which variables the function\
    \ requires. This automatically creates a better overview and clarifies the dependencies.\
    \ In particular, global variables should only be used for constant quantities\
    \ such as natural constants or similar.\n\n## 7.4 Iterators and Generators, Functional\
    \ Programming\n\nIterators and generators allow functional programming with Python.\
    \ Iterators are objects over whose elements it is possible to iterate. In order\
    \ to iterate over elements of an object, it must be a so-called iterable object\
    \ that has implemented the function `next()` and `iter()`. You already know the\
    \ iterable objects lists and tuples.\n\n```python\n>>> inner_planets = ['Mercury',\
    \ 'Venus', 'Earth', 'Mars']   # A list\n>>> my_iter = iter(inner_planets) # my_iter\
    \ is an iterator\n>>> type(my_iter)\n<class 'list_iterator'>\n>>> print(next(my_iter))\
    \ # Which provides the method next\nMercury\n>>> print(next(my_iter))\nVenus\n\
    >>> print(next(my_iter))\nEarth\n>>> print(next(my_iter))\nMars\n>>> print(next(my_iter))\
    \ # At the end of the list\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nStopIteration\n```\n\nAt the end of the iteration, the\
    \ `next` function returns `StopIteration`, which for example gives a `for-loop`\
    \ the signal to end the iteration.\n\nGenerators are special functions that allow\
    \ creating iterators in a simple way. A function calculates one or more values\
    \ and returns them. In contrast, a generator does not return a value but creates\
    \ an iterator that can return a chain of data. The keyword equivalent to `return`\
    \ in a generator is `yield`. The following script implements a simple generator\n\
    \n```python\n#!/usr/bin/env python3\n# -*- coding: utf-8 -*-\n\n# simplest generator\
    \ ever\ndef planet_generator():\n    yield \"Mercury\"\n    yield \"Venus\"\n\
    \    yield \"Earth\"\n    yield \"Mars\"\n\ninner_planets = planet_generator()\n\
    print(type(inner_planets))\n\nfor planet in inner_planets:\n    print(planet)\n\
    ```\n\nIf you call the script, you will get the following output\n\n```\n<class\
    \ 'generator'>\nMercury\nVenus\nEarth\nMars\n```\n\nOur generator `inner_planets`\
    \ allows iteration using the `for` loop. It remembers the current status and returns\
    \ the new value when called again. The loop automatically terminates as soon as\
    \ the `StopIteration` signal occurs. This somewhat academic example only serves\
    \ to illustrate the basic function of a generator. In practice, generators are\
    \ used to optimize memory consumption. In our example, the respective character\
    \ strings for the planets are only generated when the loop is processed. Alternatively,\
    \ imagine here not a list of planets, but a huge file that cannot be loaded completely\
    \ into memory. A generator can then be used to read and edit this file line by\
    \ line.\n\nAnother example, to explain the connection, are the following two implementations\
    \ to calculate the density of inner planets. Python allows you to create simple\
    \ generators similar to list abstraction by using normal brackets ()\n\n```python\n\
    #!/usr/bin/env python3\n# -*- coding: utf-8 -*-\n\nimport math  # for pi\n\n#\
    \ list of tupels with Radius and Mass for inner planets\nradius_mass = [ (2440e3,\
    \ 3.301e23), (6503e3, 4.867e24), (6370e3, 5.972e24),\n               (3390e3,\
    \ 6.39e23) ]\n\n# using list comprehension\ndensities = [ m/(4./3*math.pi * r**3)\
    \ for (r, m) in radius_mass ]\nprint(type(densities))\nprint(densities)\n\n# using\
    \ generator function\ndensities = ( m/(4./3*math.pi * r**3) for (r, m) in radius_mass\
    \ )\nprint(type(densities))\nfor rho in densities:\n    print(rho)\n```\n\nWhen\
    \ you run the script, you will get the following output\n\n```\n<class 'list'>\n\
    [5424.84627512545, 4225.046323416284, 5515.855657405862, 3915.7337493683085]\n\
    <class 'generator'>\n5424.84627512545\n4225.046323416284\n5515.855657405862\n\
    3915.7337493683085\n```\n\nIn the first case, a list comprehension in line 10\
    \ creates a new list of densities whose values are calculated. This list is already\
    \ in memory. The implementation using the generator function in line 15 creates\
    \ a generator that calculates the density value for the respective tuple and occupies\
    \ the memory only when called in the for loop. Now imagine that the initial list\
    \ radius_mass contained not only four tuples, but forty billion. The implementation\
    \ using a generator would then require much less memory."
