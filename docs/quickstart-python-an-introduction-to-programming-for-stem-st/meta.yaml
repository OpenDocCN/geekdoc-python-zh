  md: '# Data Types, Variables, Lists, Strings, Dictionaries, and Operators


    The programming language Python distinguishes between the different data types
    numbers, lists, tuples, strings, dictionaries, and sets. As the main feature and
    biggest difference to other programming languages such as C or C++, type assignment
    in Python takes place during the runtime of the program and variable types do
    not have to be declared. This is called dynamic typing, where the type of the
    variable is set automatically when a value is assigned. In a strict sense, there
    are no classic variable types in Python. Instead, variables are objects of a particular
    type.


    # 5.1 Numerical Data Types int and float, bool and complex


    In the Python interpreter the following statement


    ```

    >>> i = 42

    ```


    generates an object of the class int with the name i and assigns it the value
    42. In general, one speaks of an integer variable i of the data type int, but
    since in Python everything is an object, this way of speaking is wrong. The type()
    function can be used to find out the type of a variable


    ```

    >>> i = 42

    >>> type(i)

    <class ''int''>

    >>> f = 17.0

    >>> type(f)

    <class ''float''>

    ```'
