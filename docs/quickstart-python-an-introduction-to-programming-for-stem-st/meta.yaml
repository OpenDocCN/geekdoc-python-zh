- md: "## The Basic Structure of a Python Program\n\nWe start with the typical first\
    \ program for each programming language, the Hello-World program. The following\
    \ source code (for Linux or macOS) produces the output `Hello World` on the standard\
    \ output when called with the interpreter.\n\n```python\n#!/usr/bin/env python\n\
    # -*- coding: utf-8 -*-\n\nprint(\"Hello World\")\n```\n\nIn the first line the\
    \ Linux/Unix typical Shebang `#!` appears. This tells the operating system which\
    \ interpreter to use to execute the contents of the script. If you save the program\
    \ as `hw.py` and make it executable using `chmod +x hw.py`, you can execute it\
    \ directly without explicitly specifying the interpreter as required on Windows:\
    \ On Linux/macOS `./hw.py` vs. `python.exe C:\\hw.py` on Windows. The second line\
    \ in the script tells the Python interpreter what character set encoding (in this\
    \ case utf-8) the characters are encoded in. This specification is unnecessary\
    \ in the case of utf-8, as this is the default character set. Finally, in the\
    \ fourth line of the script, the only statement the interpreter executes is the\
    \ output of `Hello World` to the standard output. Here, `print` is a Python function\
    \ and `Hello World` is a string object (a string is a sequence of individual characters)\
    \ passed to the function.\n\nPython is a so-called structured programming language.\
    \ This means that the program code can be divided into blocks. In Python, indentations\
    \ are used to identify the individual blocks. This means that Python does not\
    \ need keywords or parentheses to define blocks like other languages. It also\
    \ means that the code automatically becomes clearer and easier to read. However,\
    \ it is important when writing code that the programmer does not mix spaces and\
    \ tab characters. Best practice is: One indentation depth corresponds to 4 spaces\
    \ and tabs are converted to spaces. It is recommended to use this standard also\
    \ in your own scripts.\n\nLet us look at a more complicated program, which already\
    \ contains almost all the features we will discuss in the following chapters.\
    \ Create a text file named `plot_sinc.py` with the following content\n\n```python\n\
    #!/usr/bin/env python\n# -*- coding: utf-8 -*-\n\nimport sys\n\ntry:\n    import\
    \ matplotlib.pyplot as plt\n    import numpy as np\nexcept:\n    print(\"Cannot\
    \ find necessary modules. Exiting.\", file=sys.stderr)\n    sys.exit(1)\n\n\n\
    if len(sys.argv) != 2:\n    print(\"Usage: please provide the filename of the\
    \ outputfile as \"\n          \"an argument.\")\n    sys.exit(2)\n\noutputfilename\
    \ = sys.argv[1]\n\nplt.style.use('dark_background')\n\nx = np.arange(-17, 17,\
    \ 0.01)\ny = np.sin(x)/x\n\nfig, ax = plt.subplots()\n\nax.plot(x, y, c='r')\n\
    ax.set_xlabel(r'$x$')\nax.set_ylabel(r'$f(x) = \\frac{\\sin(x)}{x}$')\n\nfig.savefig(outputfilename+'.pdf')\n\
    ```\n\nNow call the script with a command-line parameter such as `sinc`, which\
    \ is used as the name of the output file. If we take `sinc` as an example, you\
    \ will find the newly created file `sinc.pdf` in the directory whose contents\
    \ show a plot of the sinc function. This script is already much more complex than\
    \ our Hello-World script. The first two lines are identical, in line 4 the `sys`\
    \ module is loaded with the keyword `import`. This module provides important information\
    \ about system constants, functions, and methods of the Python interpreter. Next,\
    \ the keywords `try` and `except` are used to load the two modules for the Matplotlib\
    \ and NumPy. If these modules cannot be loaded, the output “Cannot find necessary\
    \ modules. Exiting.” is an output on the standard error output and the script\
    \ ends with the return value 1.\n\nLine 14 contains a conditional statement with\
    \ the keyword `if`. If the length of the list `sys.argv` is not exactly 2, a hint\
    \ is printed and the program ends with a return value of 2. The `sys.argv` list\
    \ contains as elements the command line arguments used to call the Python interpreter,\
    \ the first element containing the name of the script itself. The function `len()`\
    \ returns the number of elements of the argument and we use them to check if the\
    \ script was called with the required parameter. On line 19, we can be sure that\
    \ the `sys.argv` list has two entries and set the output file name to the second\
    \ entry of the list. In line 21 we call the function `matplotlib.pyplot.style.use`\
    \ of the module `matplotlib` with the string object `'dark_background'` as an\
    \ argument. In lines 23 and 24, functions from the NumPy module are called and\
    \ two NumPy arrays are initialized. The function `numpy.arange(<min>, <max>, <step>)`\
    \ returns a NumPy array with the values from `<min>` to `<max>` with the step\
    \ size `<step>`. The NumPy function `numpy.sin()` calculates the sine value of\
    \ the argument, in this case for all elements of the NumPy array `x` and returns\
    \ a NumPy array with these values. Line 26 initializes our plot with the function\
    \ `matplotlib.pyplot.subplots()` of the matplotlib, which returns the two objects\
    \ `matplotlib.figure.Figure` and `matplotlib.axes.Axes`. We use the latter object\
    \ in the following lines to plot the values in the two NumPy arrays `x` and `y`\
    \ with the `plot` function of the object. With the parameter `c = 'r'` we set\
    \ the line color to red. The axis labeling is done using the two functions `set_xlabel`\
    \ and accordingly `set_ylabel`. The last line ensures that the plot is saved in\
    \ the Portable Data Format (PDF) in file `sinc.pdf`. As you can see, even with\
    \ a few lines of Python code, expressive diagrams can be created.\n\n## Data Types,\
    \ Variables, Lists, Strings, Dictionaries, and Operators\n\nThe programming language\
    \ Python distinguishes between the different data types numbers, lists, tuples,\
    \ strings, dictionaries, and sets. As the main feature and biggest difference\
    \ to other programming languages such as C or C++, type assignment in Python takes\
    \ place during the runtime of the program and variable types do not have to be\
    \ declared. This is called dynamic typing, where the type of the variable is set\
    \ automatically when a value is assigned. In a strict sense, there are no classic\
    \ variable types in Python. Instead, variables are objects of a particular type.\n\
    \n### 5.1 Numerical Data Types int and float, bool and complex\n\nIn the Python\
    \ interpreter the following statement\n\n```python\n>>> i = 42\n```\n\ngenerates\
    \ an object of the class int with the name i and assigns it the value 42. In general,\
    \ one speaks of an integer variable i of the data type int, but since in Python\
    \ everything is an object, this way of speaking is wrong. The type() function\
    \ can be used to find out the type of a variable\n\n```python\n>>> i = 42\n>>>\
    \ type(i)\n<class 'int'>\n>>> f = 17.0\n>>> type(f)\n<class 'float'>\n```\n\n\
    The assignment (with the assignment operator =) in line 1 creates a new object\
    \ of the class `int` with the name `i`. If there is a floating-point number on\
    \ the right side of the assignment operator, which is characterized by the decimal\
    \ character, as in line 4, an object of the class `float` is created automatically.\
