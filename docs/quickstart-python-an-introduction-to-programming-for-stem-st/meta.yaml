  mdcn: "## 条件语句与循环\n\n我们可以在 Python 中使用循环和条件语句等控制语句来控制脚本和程序的流程。Python 中提供了 `if-else`\
    \ 分支、`for` 循环和 `while` 循环。Python 没有你可能从其他编程语言中了解到的 `switch` 语句或 `do-while` 循环。但你不会因此感到不便。\n\
    \n## 6.1 使用 if-else 的条件语句\n\n在 Python 中，`if-else` 分支用于仅在特定条件发生时执行代码。`if` 语句如下所示\n\
    \n```\nif condition:       # condition true or false\n    programmcode    # indented\
    \ program code\n    programmcode    # that is only executed\n    programmcode\
    \    # when if condition is true\n```\n\n这里，缩进块中的程序代码仅在第一行的条件为真时执行。如果你想检查多个条件，可以使用关键字\
    \ `elif` 依次查询多个条件。关键字 `else` 可用于指定在这些 `if-elif` 语句中没有其他条件适用时执行的程序代码。\n\n```\n\
    if condition1:      # condition1 True or False\n    programmcode1\nelif condition2:\
    \     # condition2 True or False\n    programmcode2   # is executed if condition1\n\
    \    programmcode2   # is False and condition2 is True\nelse:               #\n\
    \    programmcode3   # is executed if\n    programmcode3   # is executed if condition1\
    \ and\n                    # are False\n```\n\n## 6.2 使用 while 循环进行重复\n\n循环是一种控制结构，可以重复执行程序代码。while\
    \ 循环只要循环条件有效，就会迭代地重复执行一个语句块。其定义如下\n\n```\nwhile condition:  # condition True or\
    \ False\n    programcode  # indented program code\n    programcode  # which is\
    \ executed as long as\n    programcode  # condition is True\n```\n\n解释器首先检查第 1\
    \ 行的条件是否为真。如果为真，则依次执行第 2-4 行的代码。在循环结束时，解释器跳回第 1 行，检查条件是否仍然为真，并相应地重新开始执行第 2 行的程序代码。如果条件不为真，解释器跳到循环结束之后。如果这个条件始终为真，我们称之为所谓的无限循环。无限循环最简单的例子是\n\
    \n```\nwhile True:  # This expression is always true\n    programcode  # consequently,\
    \ the\n    programcode  # program code is executed\n    programcode  # endlessly\n\
    ```\n\n使用关键字 else，可以在循环条件不为真时执行程序代码\n\n```\nwhile condition:  # condition true\
    \ or false\n    programcode1\nelse:\n    programcode2  # executed if condition\
    \ is\n    programcode2  # False\n```\n\n这里，else 下缩进块中的代码仅在条件不满足（或不再满足）时执行。通常需要在循环完全运行结束并再次检查循环条件之前结束循环。关键字\
    \ break 用于此目的。\n\n```\nwhile condition1:\n    programcode1\n    if condition2:\n\
    \        break\n    programcode3\nelse:\n    programcode4\n```\n\n如果第一行的条件满足，则执行程序代码\
    \ programcode1。第三行的 if 查询检查另一个条件 condition2。如果满足此条件，则通过第 4 行的 break 语句中止循环。解释器跳出循环，不再执行\
    \ programcode3 块和 else 块。如果在循环过程中 condition2 未满足，则执行 programmcode3 块，并且只要 condition1\
    \ 为真且 condition2 为假，循环就会重复自身。如果在另一次循环开始时 condition1 为假，则执行带有 programmcode4 的 else\
    \ 块。因此，只有在 break 语句从未触发时才会执行 else 块。\n\n## 6.3 使用 for 循环进行重复\n\nPython 中的 for\
    \ 循环按照序列中元素的顺序遍历任何序列（如列表或字符串）的元素。\n\n```\nfor element in list:\n    programmcode1\n\
    ```\n\n对于每个元素，都会执行缩进的程序代码 programmcode1。如果我们想为太阳系中的每个行星执行某个程序代码，可以使用 for 循环来实现\n\
    \n```\ninner_planets = ['Mercury', 'Venus', 'Earth', 'Mars']\ndensity = {'Mercury':\
    \ 5.43, 'Venus': 5.24, 'Earth': 5.51, 'Mars': 3.93, 'units': 'g/ccm'}\nfor planet\
    \ in inner_planets:\n    print(planet, density[planet], density['units'])\n```\n\
    \n程序代码产生以下输出\n\n```\nMercury 5.43 g/ccm\nVenus 5.24 g/ccm\nEarth 5.51 g/ccm\n\
    Mars 3.93 g/ccm\n```\n\n缩进的程序代码为列表 inner_planets 中的每个元素 planet 执行。与 while 循环一样，break\
    \ 语句也可以提前终止 for 循环。\n\n```\ninner_planets = ['Mercury', 'Venus', 'Earth', 'Mars']\n\
    density = {'Mercury': 5.43, 'Venus': 5.24, 'Earth': 5.51, 'Mars': 3.93, 'units':\
    \ 'g/ccm'}\nfor planet in inner_planets:\n    print(planet, density[planet], density['units'])\n\
    \    if planet == 'Earth':\n        break\n```\n\n此程序代码的输出现在在地球之后结束，因为 for 循环被提前终止。\n\
    \n```\nMercury 5.43 g/ccm\nVenus 5.24 g/ccm\nEarth 5.51 g/ccm\n```\n\n另一个重要的指令是\
    \ `continue`。使用此语句，循环会跳到序列中的下一个元素，而不执行块中剩余的代码。以下程序代码\n\n```\nfor planet in inner_planets:\n\
    \    if planet == 'Earth':\n        continue\n    print(planet, density[planet],\
    \ density['units'])\n```\n\n跳过地球行星的输出，并移动到列表中的下一个元素。输出变为\n\n```\nMercury 5.43\
    \ g/ccm\nVenus 5.24 g/ccm\nMars 3.93 g/ccm\n```\n\n许多程序员好奇的是 `for` 循环的潜在 `else`\
    \ 块。\n\n```\nfor element in list:\n    programmcode1\nelse:\n    programmcode2\n\
    ```\n\n这里，当 `list` 为空时（记住：空列表等同于布尔值 `False`），会执行 `else` 块中的代码。由于一旦 `element` 是列表中的最后一个元素，第一行的条件也会返回\
    \ `False`，因此在循环成功完成后也会执行 `else` 块。只有潜在的 `break` 语句会阻止 `programmcode2` 块的执行。由于大多数程序员不熟悉与循环结合使用的\
    \ `else` 语句，因此在实践中很少见到它们。\n\n## 函数\n\nPython 中的函数是一种执行特定任务的例程或过程。函数可能需要函数参数，这些参数在调用函数时传递给函数。此外，函数也可以有返回值。例如，`math`\
    \ 模块中 `sin` 函数的返回值是调用该函数时所用函数参数的正弦值。\n\n## 7.1 内置函数\n\nPython 有一些内置函数，在每个 Python\
    \ 程序中都可用。我们已经了解了 `id()` 和 `type()` 函数。其他函数如 `str()` 用于不同对象之间的类型转换。内置函数的数量因 Python\
    \ 版本而异，目前（版本 3.7）为 69 个。表 7.1 列出了最重要的函数。\n\n## 7.2 函数声明\n\n函数使用关键字 `def` 声明，后跟唯一的函数名：\n\
    \n```\ndef functionname(arguments):\n    # indented code block\n    #\n    return\
    \ # optional return statement\n```\n\n函数参数在括号中给出。函数可以选择性地有一个返回值，该返回值用关键字 `return`\
    \ 指定。与其他编程语言（如 C）不同，Python 函数可以有多个返回值。\n\n表 7.1 已安装的最重要函数列表\n\n| 函数 | 参数 | 返回值\
    \ |\n| :--- | :--- | :--- |\n| `abs()` | 整数、浮点数 | 参数的绝对值 |\n| `bin()` | 整数 | 将参数转换为带前缀\
    \ '0b' 的二进制字符串 |\n| `dict()` | 可迭代对象 | 将参数转换为字典 |\n| `float()` | 数字或字符串 | 将参数转换为浮点数对象\
    \ |\n| `id()` | 对象 | 返回对象的整数值标识 |\n| `int()` | 数字或字符串 | 将参数转换为整数对象 |\n| `input()`\
    \ | 字符串 | 在标准输出上打印参数的字符串，并从标准输入读取一行，该行被转换为字符串，并移除换行符。最后，返回该字符串 |\n| `len()` |\
    \ 序列对象 | 对象中的元素数量 |\n| `max()` | 序列对象或两个数字 | 返回参数中的最大值 |\n| `min()` | 序列对象或两个数字\
    \ | 返回参数中的最小值 |\n| `open()` | 文件 | 将函数参数作为文件对象打开 |\n| `print()` | 对象 | 打印任意数量的值\
    \ |\n| `set()` | 可迭代对象 | 将参数转换为集合对象 |\n| `tuple()` | 可迭代对象 | 将参数转换为元组对象 |\n| `type()`\
    \ | 对象 | 返回函数参数的对象类型 |\n| `zip()` | 可迭代对象 | 返回一个元组的可迭代对象 |\n\n在下面的程序清单中，我们使用函数\
    \ `calculate_density` 根据球形物体的半径和质量计算其密度。我们想用它来计算地球的密度。"
