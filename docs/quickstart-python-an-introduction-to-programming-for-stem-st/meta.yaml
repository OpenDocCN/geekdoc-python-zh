    a figure and axes object that can be used to generate the graphics. In our example,
    we use the so-called `scatter` plot, where $x$-$y$ values are displayed as points
    and `plot` as a $x$-$y$ line plot. The type of plot, the size of the individual
    data points, and the line thickness are changeable parameters. The Matplotlib
    can be used to generate curves, histograms, scatter plots, contour plots, and
    even 3D plots. For text inserts in the diagrams LaTeX can be used. It is recommended
    that every Matplotlib beginner works through the basic principles and the tutorial
    on the central website of Matplotlib.


    # 9.4 Big Data Science with Pandas


    The module `pandas` (Python Data Analysis Library) is a special extension of Python
    for the management and analysis of tabular data, which we will mention here for
    the sake of completeness. For this purpose, the module extends the standard library
    by the three objects `series`, `dataframe`, and `panel`. A `series` corresponds
    roughly to a 1D NumPy array, a `dataframe` consists'
  merge: -1
  pgno: 57
- img_proc: true
  md: of 2D tables whose individual columns and rows can be processed like `series`
    objects. Finally, a `panel` is a 3D table whose individual levels are `dataframe`
    objects. The module offers special functions for working with time series data
    and their evaluation, that is, sorting functions and statistical functions. As
    soon as you come into contact with very large amounts of data, the use of this
    module could become interesting. You can find more information on the website
    of the pandas project.
