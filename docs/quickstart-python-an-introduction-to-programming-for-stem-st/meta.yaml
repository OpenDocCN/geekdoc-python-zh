    \ can return a chain of data. The keyword equivalent to `return` in a generator\
    \ is `yield`. The following script implements a simple generator\n\n```\n#!/usr/bin/env\
    \ python3\n# -*- coding: utf-8 -*-\n\n# simplest generator ever\ndef planet_generator():\n\
    \    yield \"Mercury\"\n    yield \"Venus\"\n    yield \"Earth\"\n    yield \"\
    Mars\"\n\ninner_planets = planet_generator()\nprint(type(inner_planets))\n\nfor\
    \ planet in inner_planets:\n    print(planet)\n```\n\nIf you call the script,\
    \ you will get the following output\n\n```\n<class 'generator'>\nMercury\nVenus\n\
    Earth\nMars\n```\n\nOur generator `inner_planets` allows iteration using the `for`\
    \ loop. It remembers the current status and returns the new value when called\
    \ again. The loop automatically terminates as soon as the `StopIteration` signal\
    \ occurs. This somewhat academic example only serves to illustrate the basic function\
    \ of a generator. In practice, generators are used to optimize memory consumption.\
    \ In"
  - "[PAGE 40]\n\nour example, the respective character strings for the planets are\
    \ only generated when the loop is processed. Alternatively, imagine here not a\
    \ list of planets, but a huge file that cannot be loaded completely into memory.\
    \ A generator can then be used to read and edit this file line by line.\n\nAnother\
    \ example, to explain the connection, are the following two implementations to\
    \ calculate the density of inner planets. Python allows you to create simple generators\
    \ similar to list abstraction by using normal brackets ()\n\n```\n1 #!/usr/bin/env\
    \ python3\n2 # -*- coding: utf-8 -*-\n3 \n4 import math  # for pi\n5 \n6 # list\
    \ of tupels with Radius and Mass for inner planets\n7 radius_mass = [ (2440e3,\
    \ 3.301e23), (6503e3, 4.867e24), (6370e3, 5.972e24),\n8                (3390e3,\
    \ 6.39e23) ]\n9 \n10 # using list comprehension\n11 densities = [ m/(4./3*math.pi\
    \ * r**3) for (r, m) in radius_mass ]\n12 print(type(densities))\n13 print(densities)\n\
    14 \n15 # using generator function\n16 densities = ( m/(4./3*math.pi * r**3) for\
    \ (r, m) in radius_mass )\n17 print(type(densities))\n18 for rho in densities:\n\
    19     print(rho)\n```\n\nWhen you run the script, you will get the following\
    \ output\n\n```\n1 <class 'list'>\n2 [5424.84627512545, 4225.046323416284, 5515.855657405862,\
    \ 3915.7337493683085]\n3 <class 'generator'>\n4 5424.84627512545\n5 4225.046323416284\n\
    6 5515.855657405862\n7 3915.7337493683085\n```\n\nIn the first case, a list comprehension\
    \ in line 10 creates a new list of densities whose values are calculated. This\
    \ list is already in memory. The implementation using the generator function in\
    \ line 15 creates a generator that calculates the density value for the respective\
    \ tuple and occupies the memory only when called in the for loop. Now imagine\
    \ that the initial list radius_mass contained not only four tuples, but forty\
    \ billion. The implementation using a generator would then require much less memory."
- md: "## 7.5 Anonymous Functions with the Lambda Operator\n\nAnother example for\
    \ the support of functional programming in Python is the use of the lambda operator.\
    \ You can use the lambda operator to create anonymous, nameless functions. Lambda\
    \ functions are usually very short, one-line functions with only one statement.\
    \ To declare a lambda function, use the syntax `lambda` followed by the function\
    \ arguments, a colon, and a single statement. The result of the statement is the\
    \ return value of the function. We can thus also implement the density calculation\
    \ from the last section as follows using the Lambda function\n\n```python\n>>>\
    \ rho = lambda radius, mass: mass/(4./3*math.pi*radius**3)\n```\n\nWith the values\
    \ of the Earth for radius and mass we get the desired result\n\n```python\n>>>\
    \ print(rho(6370e3, 5.972e24))\n5515.855657405862\n```\n\nAs a rule, Lambda functions\
    \ are used for small, short functions that are only needed at one point in a program\
    \ and only perform exactly one task. More complex functions, which are called\
    \ several times, should not be implemented in practice by a Lambda function but\
    \ by using `def`, function body, and, if necessary, a return value per `return`.\n\
    \n## 7.6 Functions Can be Decorated: Decorators\n\nA decorator is a Python object\
    \ that is used to modify a function, method, or class definition. Suppose we want\
    \ to make sure that our `calculate_density` function is actually called with only\
    \ numbers as function arguments. Instead of checking this in the function itself,\
    \ we implement a decorator function that can also be used for other functions.\n\
    \n```python\n# Decorator function that ensures int and floats as arguments\ndef\
    \ test_for_floating_argument(f):\n    def dekorator_function(*args):\n       \
    \ for value in args:\n            if type(value) != int and type(value) != float:\n\
    \                print(\"This function expects numbers as arguments.\")\n    \
    \            return -1\n        return f(*args)\n    return dekorator_function\n\
    ```\n\nHow the magic function argument `*args` works is explained in the next\
    \ section. We specify this decorator function in the line before the function\
    \ definition of `calculate_density` with the special decorator syntax `@`\n\n\
    ```python\n# Our function to calculate the density rho\n# Now with decorator\n\
    @test_for_floating_argument\ndef calculate_density(radius, mass):\n    volume\
    \ = 4./3 * math.pi * radius**3\n    if volume > 0:\n        rho = mass/volume\n\
    \    else:\n        rho = 0.0  # make sure rho exists\n    return rho\n```\n\n\
    If we now call the function with a function argument that is neither an integer\
    \ nor a floating-point number, we get the message\n\n```\nThis function expects\
    \ numbers as arguments.\n```\n\nWith the help of the decorator we have thus modified\
    \ the original function of our function without touching the function itself.\
    \ In addition, we can also use the decorator function `test_for_floating_argument`\
    \ for other functions.\n\n## 7.7 The Functional Arguments *args and **kwargs\n\
    \nThe two somewhat magic function arguments `*args` and `**kwargs` allow you to\
    \ pass any number of function arguments to a function. The two names of the arguments\
    \ are arbitrary, and by convention `*args` and `**kwargs` are generally used,\
    \ only the use of the asterisk `*`, or `**` is important. The argument `*args`\
    \ stands for any number of non-keyword arguments and `**kwargs` for keyword arguments.\
    \ They can be used if, when implementing the function, it is not clear how many\
    \ function arguments are passed to the function. The `*args` argument is passed\
    \ to the function as a tuple. In the example from the last section, we used `*args`\
    \ in the decorator function because it should be usable for all functions that\
    \ require integer and floating-point numbers as function arguments, regardless\
    \ of the number of arguments. Like the keyword for non-keyword arguments, `**kwargs`\
    \ can stand for any number of keyword pairs. If, for example, you want to implement\
    \ a function that is to add any number of values, the magic function argument\
    \ `*args` is used\n\n```python\n#!/usr/bin/env python\n# -*- coding: utf-8 -*-\n\
    \n# Function that adds any number of\n# summands\ndef calculate_sum(*args):\n\
    \    sum = 0\n    for i in args:\n        sum = sum + i\n    print(\"The total\
    \ is\", sum)\n\n# Call with 3 arguments\ncalculate_sum(1, 2, 3)\n# Call the same\
    \ function with 6 arguments\ncalculate_sum(1, 2, 3, 4, 5, 10)\n```\n\nWhen you\
    \ run this script, you will get the following output\n\n```\nThe total is 6\n\
    The total is 25\n```\n\n## Structuring with Modules\n\nModules in Python are basically\
    \ functions and objects that can be included and used in a program or script.\
    \ For example, if we want the sine function value of a variable, it is not necessary\
    \ to implement a function that calculates this value but we use the function `sin`\
    \ implemented in the module `math`. In the same way, it is common practice in\
    \ larger programs to structure the individual functions into modules and load\
    \ them as needed. By default, Python has extensive help for all kinds of needs\
    \ in the form of modules. The analog of Python modules are libraries in other\
    \ programming languages like C and C++. Modules are usually included at the beginning\
    \ of the program code with the following syntax\n\n```python\n#!/usr/bin/env python\n\
    # -*- coding: utf-8 -*-\n\nimport <module_name>\nimport <module_name> as <namespace_name>\
    \ # General syntax\n\nimport numpy  # Example for module numpy\nimport numpy as\
    \ np  # Example for module numpy using namespace np\n```\n\nThis call imports\
    \ the entire functionality of a module. Generally, the command `import` followed\
    \ by the name of the module is sufficient. You can also specify the namespace\
    \ using the keyword `as`. The content of the module is then accessed using `namespace_name`.\
    \ We import the math module to calculate the sine value of π/4.\n\n```python\n\
    #!/usr/bin/env python\n# -*- coding: utf-8 -*-\n\nimport math\n\nprint(math.sin(math.pi/4))\n\
    ```\n\nThe output provides the correct value 0.7071067811865475. We have, therefore,\
    \ used the function `sin` and the constant value of π from the math module. It\
    \ is precisely the large number of modules available that has made Python so popular\
    \ and successful. Before you want or have to implement a new function yourself,\
    \ it is advisable to look for a module that already offers the required functionality.\
    \ Each module implements the two functions `help()` and `dir()`. The function\
    \ `help()` generates the help and description text of an object, in this case\
    \ the module. The `dir()` function lists all attributes of an object. This way\
    \ we can list all functions of a module and get help on specific elements\n\n\
    ```python\n>>> import math\n>>> dir(math)\n['__doc__', '__file__', '__loader__',\
    \ '__name__', '__package__', '__spec__',\n 'acos', 'acosh', 'asin', 'asinh', 'atan',\
    \ 'atan2', 'atanh', 'ceil',\n 'copysign', 'cos', 'cosh', 'degrees', 'e', 'erf',\
    \ 'erfc', 'exp', 'expm1',\n 'fabs', 'factorial', 'floor', 'fmod', 'frexp', 'fsum',\
    \ 'gamma',\n 'gcd', 'hypot', 'inf', 'isclose', 'isfinite', 'isinf', 'isnan', 'ldexp',\n\
    \ 'lgamma', 'log', 'log10', 'log1p', 'log2', 'modf', 'nan', 'pi', 'pow',\n 'radians',\
    \ 'remainder', 'sin', 'sinh', 'sqrt', 'tan', 'tanh', 'tau',\n 'trunc']\n>>> help(math.sin)\n\
    Help on built-in function sin in module math:\n\nsin(x, /)\n    Return the sine\
    \ of x (measured in radians).\n```\n\nAs an alternative to including them with\
    \ the described syntax, modules can also be included in the current namespace\
    \ using the following, obsolete syntax\n\n```python\nfrom <module_name> import\
    \ <function_name>\nfrom math import sin # Import the sine function into the current\
    \ namespace\nfrom math import * # Imports all objects into the current namespace\n\
    ```\n\nThis has the tempting advantage that the respective elements of the module\
    \ can be accessed directly without having to specify the namespace\n\n```python\n\
    >>> from math import *\n>>> print(sin(pi/4)) # Instead of math.sin and math.pi\n\
    0.7071067811865475\n```\n\nand until a few years ago, it was still common practice.\
    \ I strongly advise against importing objects without a namespace, since many\
    \ objects now have functions of the same name and you will run into insoluble\
    \ difficulties when debugging, since the unique assignment to the module is no\
    \ longer obvious."
  mdcn: "## 7.5 使用 Lambda 运算符的匿名函数\n\nPython 支持函数式编程的另一个例子是使用 lambda 运算符。你可以使用 lambda\
    \ 运算符来创建匿名的、无名的函数。Lambda 函数通常非常短，是只包含一条语句的单行函数。要声明一个 lambda 函数，请使用 `lambda` 语法，后跟函数参数、冒号和一条语句。该语句的结果就是函数的返回值。因此，我们也可以使用\
    \ Lambda 函数来实现上一节中的密度计算，如下所示：\n\n```python\n>>> rho = lambda radius, mass: mass/(4./3*math.pi*radius**3)\n\
    ```\n\n使用地球的半径和质量值，我们得到预期的结果：\n\n```python\n>>> print(rho(6370e3, 5.972e24))\n\
    5515.855657405862\n```\n\n通常，Lambda 函数用于那些在程序中只在一个地方需要、且只执行单一任务的小型、简短函数。对于更复杂、需要多次调用的函数，实践中不应使用\
    \ Lambda 函数实现，而应使用 `def`、函数体，并在必要时通过 `return` 返回值。\n\n## 7.6 函数可以被装饰：装饰器\n\n装饰器是一个\
    \ Python 对象，用于修改函数、方法或类定义。假设我们想确保 `calculate_density` 函数只接收数字作为函数参数。我们不是在函数内部检查这一点，而是实现一个装饰器函数，该函数也可以用于其他函数。\n\
    \n```python\n# 确保参数为整数和浮点数的装饰器函数\ndef test_for_floating_argument(f):\n    def\
    \ dekorator_function(*args):\n        for value in args:\n            if type(value)\
    \ != int and type(value) != float:\n                print(\"This function expects\
    \ numbers as arguments.\")\n                return -1\n        return f(*args)\n\
    \    return dekorator_function\n```\n\n神奇的函数参数 `*args` 如何工作将在下一节解释。我们在 `calculate_density`\
    \ 函数定义的上一行，使用特殊的装饰器语法 `@` 来指定这个装饰器函数：\n\n```python\n# 我们用于计算密度 rho 的函数\n# 现在带有装饰器\n\
    @test_for_floating_argument\ndef calculate_density(radius, mass):\n    volume\
    \ = 4./3 * math.pi * radius**3\n    if volume > 0:\n        rho = mass/volume\n\
    \    else:\n        rho = 0.0  # 确保 rho 存在\n    return rho\n```\n\n如果我们现在用一个既不是整数也不是浮点数的函数参数调用该函数，我们会得到消息：\n\
    \n```\nThis function expects numbers as arguments.\n```\n\n借助装饰器，我们在不修改函数本身的情况下，修改了函数的原始功能。此外，我们还可以将装饰器函数\
    \ `test_for_floating_argument` 用于其他函数。\n\n## 7.7 函数参数 *args 和 **kwargs\n\n两个有些神奇的函数参数\
    \ `*args` 和 `**kwargs` 允许你向函数传递任意数量的函数参数。这两个参数的名称是任意的，按照惯例通常使用 `*args` 和 `**kwargs`，只有星号\
    \ `*` 或 `**` 的使用是重要的。参数 `*args` 代表任意数量的非关键字参数，`**kwargs` 代表关键字参数。当在实现函数时，不清楚会传递多少个函数参数给函数时，可以使用它们。`*args`\
    \ 参数作为元组传递给函数。在上一节的例子中，我们在装饰器函数中使用了 `*args`，因为它应该适用于所有需要整数和浮点数作为函数参数的函数，无论参数数量如何。与非关键字参数的关键字类似，`**kwargs`\
    \ 可以代表任意数量的关键字对。例如，如果你想实现一个要添加任意数量值的函数，可以使用神奇的函数参数 `*args`：\n\n```python\n#!/usr/bin/env\
    \ python\n# -*- coding: utf-8 -*-\n\n# 添加任意数量加数的函数\ndef calculate_sum(*args):\n\
    \    sum = 0\n    for i in args:\n        sum = sum + i\n    print(\"The total\
    \ is\", sum)\n\n# 使用 3 个参数调用\ncalculate_sum(1, 2, 3)\n# 使用 6 个参数调用同一个函数\ncalculate_sum(1,\
    \ 2, 3, 4, 5, 10)\n```\n\n运行此脚本时，你将得到以下输出：\n\n```\nThe total is 6\nThe total is\
    \ 25\n```\n\n## 使用模块进行组织\n\nPython 中的模块基本上是可以在程序或脚本中包含和使用的函数和对象。例如，如果我们想要一个变量的正弦函数值，没有必要实现一个计算该值的函数，而是使用\
    \ `math` 模块中实现的 `sin` 函数。同样，在较大的程序中，通常的做法是将各个函数组织成模块，并根据需要加载它们。默认情况下，Python 以模块的形式为各种需求提供了广泛的帮助。Python\
    \ 模块类似于其他编程语言（如 C 和 C++）中的库。模块通常在程序代码的开头使用以下语法包含：\n\n```python\n#!/usr/bin/env\
    \ python\n# -*- coding: utf-8 -*-\n\nimport <module_name>\nimport <module_name>\
    \ as <namespace_name> # 通用语法\n\nimport numpy  # 模块 numpy 的示例\nimport numpy as\
    \ np  # 使用命名空间 np 的模块 numpy 示例\n```\n\n此调用导入模块的全部功能。通常，`import` 命令后跟模块名称就足够了。你也可以使用关键字\
    \ `as` 指定命名空间。然后使用 `namespace_name` 访问模块的内容。我们导入 math 模块来计算 π/4 的正弦值。\n\n```python\n\
    #!/usr/bin/env python\n# -*- coding: utf-8 -*-\n\nimport math\n\nprint(math.sin(math.pi/4))\n\
    ```\n\n输出提供了正确的值 0.7071067811865475。因此，我们使用了 math 模块中的 `sin` 函数和 π 的常量值。正是大量可用的模块使得\
    \ Python 如此受欢迎和成功。在你想要或必须自己实现一个新函数之前，最好先查找一个已经提供所需功能的模块。每个模块都实现了 `help()` 和 `dir()`\
    \ 两个函数。`help()` 函数生成对象的帮助和描述文本，在本例中是模块。`dir()` 函数列出对象的所有属性。通过这种方式，我们可以列出模块的所有函数，并获取特定元素的帮助：\n\
    \n```python\n>>> import math\n>>> dir(math)\n['__doc__', '__file__', '__loader__',\
    \ '__name__', '__package__', '__spec__',\n 'acos', 'acosh', 'asin', 'asinh', 'atan',\
    \ 'atan2', 'atanh', 'ceil',\n 'copysign', 'cos', 'cosh', 'degrees', 'e', 'erf',\
    \ 'erfc', 'exp', 'expm1',\n 'fabs', 'factorial', 'floor', 'fmod', 'frexp', 'fsum',\
    \ 'gamma',\n 'gcd', 'hypot', 'inf', 'isclose', 'isfinite', 'isinf', 'isnan', 'ldexp',\n\
    \ 'lgamma', 'log', 'log10', 'log1p', 'log2', 'modf', 'nan', 'pi', 'pow',\n 'radians',\
    \ 'remainder', 'sin', 'sinh', 'sqrt', 'tan', 'tanh', 'tau',\n 'trunc']\n>>> help(math.sin)\n\
    Help on built-in function sin in module math:\n\nsin(x, /)\n    Return the sine\
    \ of x (measured in radians).\n```\n\n作为使用上述语法包含模块的替代方案，也可以使用以下已过时的语法将模块包含到当前命名空间中：\n\
    \n```python\nfrom <module_name> import <function_name>\nfrom math import sin #\
    \ 将正弦函数导入当前命名空间\nfrom math import * # 将所有对象导入当前命名空间\n```\n\n这样做有一个诱人的优点，即可以直接访问模块的各个元素，而无需指定命名空间：\n\
    \n```python\n>>> from math import *\n>>> print(sin(pi/4)) # 代替 math.sin 和 math.pi\n\
    0.7071067811865475\n```\n\n直到几年前，这仍然是常见的做法。我强烈建议不要在没有命名空间的情况下导入对象，因为现在许多对象都有同名的函数，你在调试时会遇到无法解决的困难，因为与模块的唯一对应关系不再明显。"
