- md: "## Conditional Statements and Loops\n\nWe can use control statements like loops\
    \ and conditional statements in Python to control the flow of our scripts and\
    \ programs. In Python, `if-else` branches, `for` and `while` loops are available.\
    \ Python does not have the `switch` statement or `do-while` loop that you might\
    \ know from other programming languages. But you will not have to miss them.\n\
    \n## 6.1 Conditional Statement with if-else\n\nAn `if-else` branch is used in\
    \ Python to execute code only under certain conditions that occur. An `if` statement\
    \ looks like this\n\n```\nif condition:       # condition true or false\n    programmcode\
    \    # indented program code\n    programmcode    # that is only executed\n  \
    \  programmcode    # when if condition is true\n```\n\nHere the program code in\
    \ the indented block is only executed if the condition in the first line is true.\
    \ If you want to check for more than one condition, several conditions can be\
    \ queried one after the other using the keyword `elif`. The keyword `else` can\
    \ be used to specify program code that is executed if none of the other conditions\
    \ in these `if-elif` statements apply.\n\n```\nif condition1:      # condition1\
    \ True or False\n    programmcode1\nelif condition2:     # condition2 True or\
    \ False\n    programmcode2   # is executed if condition1\n    programmcode2  \
    \ # is False and condition2 is True\nelse:               #\n    programmcode3\
    \   # is executed if\n    programmcode3   # is executed if condition1 and\n  \
    \                  # are False\n```\n\n## 6.2 Repetition with while Loop\n\nLoops\
    \ are control structures with which program code can be executed repeatedly. A\
    \ while loop repeats a statement block iteratively as long as the loop condition\
    \ is valid. It is defined as follows\n\n```\nwhile condition:  # condition True\
    \ or False\n    programcode  # indented program code\n    programcode  # which\
    \ is executed as long as\n    programcode  # condition is True\n```\n\nThe interpreter\
    \ first checks whether the condition in line 1 is true. If this is true, the code\
    \ in lines 2–4 is executed one after the other. At the end of the loop, the interpreter\
    \ jumps back to line 1 and checks if the condition is still true and restarts\
    \ the execution of the program code in line 2 accordingly. If the condition is\
    \ not true, the interpreter jumps behind the end of the loop. If this condition\
    \ is always true, we speak of a so-called endless loop. The simplest example of\
    \ an endless loop is\n\n```\nwhile True:  # This expression is always true\n \
    \   programcode  # consequently, the\n    programcode  # program code is executed\n\
    \    programcode  # endlessly\n```\n\nWith the keyword else, program code can\
    \ be executed if the loop condition is not true\n\n```\nwhile condition:  # condition\
    \ true or false\n    programcode1\nelse:\n    programcode2  # executed if condition\
    \ is\n    programcode2  # False\n```\n\nHere the code in the indented block under\
    \ else is only executed if the condition is not (or no longer) fulfilled. Often\
    \ it is necessary to end a loop before it has run completely to the end again\
    \ and checks the loop condition again. The keyword break is used for this purpose.\n\
    \n```\nwhile condition1:\n    programcode1\n    if condition2:\n        break\n\
    \    programcode3\nelse:\n    programcode4\n```\n\nIf the condition in the first\
    \ line is fulfilled, the program code programcode1 is executed. The if query in\
    \ the third line checks for a further condition condition2. If this condition\
    \ is met, the loop is aborted by the break statement in line 4. The interpreter\
    \ jumps out of the loop, the block programcode3 and the else block are not executed\
    \ anymore. If condition2 is not fulfilled during the loop pass, the programmcode3\
    \ block is executed and the loop repeats itself as long as condition1 is true\
    \ and condition2 is false. If condition1 is false at the beginning of another\
    \ loop pass, the else block is executed with programmcode4. Therefore, the else\
    \ block is only executed if the break statement is never triggered.\n\n## 6.3\
    \ Repetition with for Loop\n\nThe for loop in Python iterates over elements of\
    \ any sequence such as a list or string in the order of the elements in the sequence.\n\
    \n```\nfor element in list:\n    programmcode1\n```\n\nFor each element the indented\
    \ program code programmcode1 is executed. If we want to execute a certain program\
    \ code for each planet in our solar system, we can do so with the for loop\n\n\
    ```\ninner_planets = ['Mercury', 'Venus', 'Earth', 'Mars']\ndensity = {'Mercury':\
    \ 5.43, 'Venus': 5.24, 'Earth': 5.51, 'Mars': 3.93, 'units': 'g/ccm'}\nfor planet\
    \ in inner_planets:\n    print(planet, density[planet], density['units'])\n```\n\
    \nThe program code produces the following output\n\n```\nMercury 5.43 g/ccm\n\
    Venus 5.24 g/ccm\nEarth 5.51 g/ccm\nMars 3.93 g/ccm\n```\n\nThe indented program\
    \ code is executed for each element planet in the list inner_planets. As with\
    \ the while loop, a break statement can also terminate the for loop early.\n\n\
    ```\ninner_planets = ['Mercury', 'Venus', 'Earth', 'Mars']\ndensity = {'Mercury':\
    \ 5.43, 'Venus': 5.24, 'Earth': 5.51, 'Mars': 3.93, 'units': 'g/ccm'}\nfor planet\
    \ in inner_planets:\n    print(planet, density[planet], density['units'])\n  \
    \  if planet == 'Earth':\n        break\n```\n\nThe output of this program code\
    \ now ends after the Earth since the for loop is terminated prematurely.\n\n```\n\
    Mercury 5.43 g/ccm\nVenus 5.24 g/ccm\nEarth 5.51 g/ccm\n```\n\nAnother important\
    \ instruction is `continue`. With this statement, the loop jumps to the next element\
    \ in the sequence without executing the remaining code of the block. The following\
    \ program code\n\n```\nfor planet in inner_planets:\n    if planet == 'Earth':\n\
    \        continue\n    print(planet, density[planet], density['units'])\n```\n\
    \nskips the output for the planet Earth and moves to the next element in the list.\
    \ The output changes to\n\n```\nMercury 5.43 g/ccm\nVenus 5.24 g/ccm\nMars 3.93\
    \ g/ccm\n```\n\nCurious for many programmers is the potential `else` block of\
    \ a `for` loop.\n\n```\nfor element in list:\n    programmcode1\nelse:\n    programmcode2\n\
    ```\n\nHere the code in the `else` block is executed when the `list` is empty\
    \ (remember: an empty list is equivalent to the boolean value `False`). Since\
    \ the condition in the first line also returns `False` as soon as `element` was\
    \ the last element in the list, the `else` block is also executed after the loop\
    \ has been successfully completed. Only a potential `break` statement prevents\
    \ the execution of the `programmcode2` block. Since `else` statements in conjunction\
    \ with loops are unfamiliar to most programmers, you will rarely find them in\
    \ practice.\n\n## Functions\n\nA function in Python is a kind of routine or procedure\
    \ that performs a certain task. A function may need function arguments, which\
    \ are passed to the function when it is called. In addition, a function can also\
    \ have return values. For example, the return value of the `sin` function from\
    \ the `math` module is the sine of the function argument with which the function\
    \ is called.\n\n## 7.1 Built-in Functions\n\nPython has some built-in functions\
    \ that are available in every Python program. We have already learned about the\
    \ `id()` and `type()` functions. Other functions like `str()` are used for type\
    \ conversion between different objects. The number of built-in functions varies\
    \ depending on the Python version and currently (version 3.7) is 69. Table 7.1\
    \ lists the most important ones.\n\n## 7.2 Declaration of Functions\n\nFunctions\
    \ are declared with the keyword `def` followed by the unique function name:\n\n\
    ```\ndef functionname(arguments):\n    # indented code block\n    #\n    return\
    \ # optional return statement\n```\n\nThe function arguments are given in brackets.\
    \ The function can optionally have a return value, which is specified with the\
    \ keyword `return`. Unlike other programming languages such as C, a Python function\
    \ can have multiple return values.\n\nTable 7.1 A list of the most important functions\
    \ already installed\n\n| Function | Argument | Return value |\n| :--- | :--- |\
    \ :--- |\n| `abs()` | Integer, float | Absolute amount of the argument |\n| `bin()`\
    \ | Integer | Converts the argument into a binary string with prefix ‘0b’ |\n\
