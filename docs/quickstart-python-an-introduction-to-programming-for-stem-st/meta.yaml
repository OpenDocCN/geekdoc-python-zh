    \ been made. The publisher remains neutral with regard to jurisdictional claims\
    \ in published maps and institutional affiliations.\n\nResponsible Editor: Lisa\
    \ Edelhaeuser\nThis Springer imprint is published by the registered company Springer\
    \ Fachmedien Wiesbaden GmbH part of Springer Nature.\nThe registered company address\
    \ is: Abraham-Lincoln-Str. 46, 65189 Wiesbaden, Germany\n\n# What You Can Find\
    \ in This *essential*\n\nWith this *essential* we would like to introduce you\
    \ to the great world of programming with Python and give you a quick start to\
    \ develop your own scripts.\n\n- You will learn the basic ideas and principles\
    \ of the programming language Python.\n- You will develop your own Python programs.\n\
    - You will understand Python scripts written by other programmers, adapt them\
    \ to your needs and integrate them into your code.\n- You will get to know interesting\
    \ extensions of Python especially for natural scientists and data scientists.\n\
    - You can create meaningful diagrams and graphics with Matplotlib.\n\n# Contents\n\
    \n1. Overview of the Programming Language Python\n2. Installation of Python\n\
    \   2.1 Windows\n   2.2 Linux\n   2.3 macOS\n3. Execution of a Python Program\n\
    \   3.1 Interactive Python\n   3.2 Development Environments\n4. The Basic Structure\
    \ of a Python Program\n5. Data Types, Variables, Lists, Strings, Dictionaries,\
    \ and Operators\n   5.1 Numerical Data Types int and float, bool and complex\n\
    \   5.2 Sequential Data Types\n   5.3 Dictionaries\n   5.4 Quantities\n6. Conditional\
    \ Statements and Loops\n   6.1 Conditional Statement with if-else\n   6.2 Repetition\
    \ with while Loop\n   6.3 Repetition with for Loop\n7. Functions\n   7.1 Built-in\
    \ Functions\n   7.2 Declaration of Functions\n   7.3 Global and Local Variables\n\
    \   7.4 Iterators and Generators, Functional Programming\n   7.5 Anonymous Functions\
    \ with the Lambda Operator\n   7.6 Functions Can be Decorated: Decorators\n  \
    \ 7.7 The Functional Arguments *args and **kwargs\n8. Structuring with Modules\n\
    \   8.1 Structuring the Code with Own Modules\n   8.2 Some Important Modules and\
    \ What to Do with Them: Math, os, re, sys\n9. Extensions for Scientists: NumPy,\
    \ SciPy, Matplotlib, Pandas\n   9.1 Fast Numerical Calculations with Python: NumPy\n\
    \   9.2 For Scientists: SciPy\n   9.3 Creating Diagrams and Graphics with Matplotlib\n\
    \   9.4 Big Data Science with Pandas\n\n# Overview of the Programming Language\
    \ Python\n\nIn recent years, the programming language Python has established itself\
    \ alongside MATLAB and R as the standard for scientific workplaces in research\
    \ and development.\n\nThe great popularity of Python is based on its easy extensibility:\
    \ It is very easy to use modules from other developers in your own scripts and\
    \ programs. Especially, the modules NumPy, SciPy, and Matplotlib offer scientists\
    \ and engineers a perfect development environment for scientific and technical\
    \ computing, for applications in physics, chemistry, biology, and computer science.\
    \ Python is also used in the latest applications in the modern fields of research\
    \ Big Data Science and Machine Learning.\n\nOriginally Python was developed in\
    \ the early 1990s by Guido van Rossum in the first version during his Christmas\
    \ holiday. The pure teaching language ABC served as a model for him. His main\
    \ goals were clarity and easy comprehensibility. The first full version was released\
    \ in 1994 and was designed by van Rossum to be easily extensible by modules, and\
    \ the language itself could be easily embedded in other languages. Since Python\
    \ itself uses a clear syntax and can be programmed with simple structures, the\
    \ language is particularly suitable for beginners and is comparatively easy to\
    \ learn.\n\n# Python Versions 2 and 3\n\nPython was recently developed in two\
    \ different major versions that are incompatible with each other. It is very likely\
    \ that you will come across older Python scripts of version 2 as soon as your\
    \ work is built on older, existing scripts. In general, the number of projects\
    \ with Python 2 still predominates at present, a situation which will, however,\
    \ have reversed by 2021.\n\nIn this Springer *essential* we focus mainly on Python\
    \ version 3, but if you are presented with an older Python script in your scientific\
    \ career, your knowledge of"
