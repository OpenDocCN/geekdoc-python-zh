  md: "# 7.5 Anonymous Functions with the Lambda Operator\n\nAnother example for the\
    \ support of functional programming in Python is the use of the lambda operator.\
    \ You can use the lambda operator to create anonymous, nameless functions. Lambda\
    \ functions are usually very short, one-line functions with only one statement.\
    \ To declare a lambda function, use the syntax `lambda` followed by the function\
    \ arguments, a colon, and a single statement. The result of the statement is the\
    \ return value of the function. We can thus also implement the density calculation\
    \ from the last section as follows using the Lambda function\n\n```\n>>> rho =\
    \ lambda radius, mass: mass/(4./3*math.pi*radius**3)\n```\n\nWith the values of\
    \ the Earth for radius and mass we get the desired result\n\n```\n>>> print(rho(6370e3,\
    \ 5.972e24))\n5515.855657405862\n```\n\nAs a rule, Lambda functions are used for\
    \ small, short functions that are only needed at one point in a program and only\
    \ perform exactly one task. More complex functions, which are called several times,\
    \ should not be implemented in practice by a Lambda function but by using `def`,\
    \ function body, and, if necessary, a return value per `return`.\n\n# 7.6 Functions\
    \ Can be Decorated: Decorators\n\nA decorator is a Python object that is used\
    \ to modify a function, method, or class definition. Suppose we want to make sure\
    \ that our `calculate_density` function is actually called with only numbers as\
    \ function arguments. Instead of checking this in the function itself, we implement\
    \ a decorator function that can also be used for other functions.\n\n```\n# Decorator\
    \ function that ensures int and floats as arguments\ndef test_for_floating_argument(f):\n\
    \    def dekorator_function(*args):\n        for value in args:\n            if\
    \ type(value) != int and type(value) != float:\n                print(\"This function\
    \ expects numbers as arguments.\")\n                return -1\n        return\
    \ f(*args)\n    return Decorator function\n```\n\nHow the magic function argument\
    \ `*args` works is explained in the next section. We specify this decorator function\
    \ in the line before the function definition of `calculate_density` with the special\
    \ decorator syntax `@`"
