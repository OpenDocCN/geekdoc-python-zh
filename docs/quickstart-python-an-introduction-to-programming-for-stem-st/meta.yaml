    \ offer many useful methods that make work easier. We will illustrate this in\
    \ the following examples. To add an element to a list, append() can be used\n\n\
    ```\n>>> some_galaxies = ['milky way', 'andromeda', 'm82']\n>>> ngc3109_group\
    \ = ['ngc3109', 'sextans_a', 'sextans_b', 'pgc_29194']\n>>> some_galaxies.append('m83')\
    \  # Add m82 to the list\n>>> some_galaxies.append(ngc3109_group) # Add ngc3109_group\
    \ to the list\n>>> print(some_galaxies)\n['milky way', 'andromeda', 'm82', 'm83',\
    \ ['ngc3109', 'sextans_a', 'sextans_b', 'pgc_29194']]\n```\n\nUnfortunately, in\
    \ the last step we created a list within a list because we added the list ngc3109_group\
    \ to the list some_galaxies. If we only want to append the elements of this list\
