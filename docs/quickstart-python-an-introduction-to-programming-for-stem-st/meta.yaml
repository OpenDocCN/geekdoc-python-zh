  md: '# 8.1 Structuring the Code with Own Modules


    Interesting are modules to structure your own code: We can outsource functions
    into modules and thus easily reuse them in other scripts and programs. To do this,
    we have to write our function in a separate file and make sure that Python finds
    it. By default, Python searches in the current directory, in the directories of
    `sys.path` and in the directories stored in the environment variable `PYTHONPATH`.
    In the following example we outsource the function for calculating the density
    to our own module `physics_tools`: The file `physics_tools.py` contains the following
    lines


    ```

    1 """ Module with physics tools"""

    2 import math

    3

    4 # Calculation of the density of a spherical homogeneous mass

    5 # distribution of the mass mass and radius radius

    6 def calculate_density(radius, mass):

    7     volume = 4./3 * math.pi * radius**3

    8     if volume > 0:

    9         rho = mass/volume

    10    else:

    11        rho = 0

    12    return rho

    ```


    We start the interactive Python interpreter in the same directory where this file
    is located and import the module with the name `pt`. The interpreter automatically
    generates a meaningful help text


    ```

    1 >>> import physics_tools as pt  # Import of the module physics_tools

    2 >>> help(pt)

    3 Help on module physics_tools:

    4

    5 NAME

    6     physics_tools - Module with physics

    7

    8 FUNCTIONS

    9     calculate_density(radius, mass)

    10        # Calculation of the density of a spherical homogeneous mass

    11        # distribution of the mass mass and radius radius

    12        (...)

    13 >>> help(pt.calculate_density)

    14 Help on function calculate_density in module physics_tools:

    15

    16 calculate_density(radius, mass)

    17     # Calculation of the density of a spherical homogeneous mass

    18     # distribution of the mass mass and radius radius

    ```


    We can now access the density calculation function


    ```

    1 >>> R_earth = 6.371e6

    2 >>> M_earth = 5.972e24

    3 >>> print("The density of Earth is %g kg/m**3" % pt.calculate_density(

    4     R_earth, M_earth))

    5 The density of the earth is 5513.26 kg/m**3

    ```'
