    5 [''milky way'', ''andromeda'']

    6 >>> print(some_galaxies)

    7 [''milky way'', ''andromeda'', ''m82''] # some_galaxies is unchanged

    ```


    An alternative notation for a shallow copy is also the following assignment


    ```

    1 >>> sg = some_galaxies[:] # Create a new object sg with the content of some_galaxies

    ```


    Another special feature of copying objects is when these objects in turn reference
    other objects. Take a list, for example, whose elements are in turn lists. We
    generate our solar system from the two lists inner_planets and outer_planets


    ```

    1 >>> solar_system = [inner_planets, outer_planets]

    2 >>> print(solar_system)

    3 [[''Mercury'', ''Venus'', ''Earth'', ''Mars''], [''Jupiter'', ''Saturn'', ''Uranus'',
    ''Neptune'', ''Pluto'']]

    ```


    Now we create a new list with reference to this list by a shallow copy


    ```

    1 >>> old_solar_system = solar_system[:]

    2 >>> old_solar_system is solar_system

    3 False # The two objects are not identical

    ```


    Now what happens to the contents of the old_solar_system list when we remove Pluto
    from solar_system?


    ```

    1 >>> solar_system[1].remove(''Pluto'') # Remove Pluto from the list

    2 >>> print(old_solar_system)

    3 [[''Mercury'', ''Venus'', ''Earth'', ''Mars''], [''Jupiter'', ''Saturn'', ''Uranus'',
    ''Neptune'']]

    ```


    Pluto was also removed from the old_solar_system list. The reason is that the
    two list elements of solar_system are themselves lists and contain references.
    When creating old_solar_system we copied these references and not the values in
    the memory areas that are referenced. You can see this when using the id() function


    ```

    1 >>> old_solar_system is solar_system

    2 False

    3 >>> old_solar_system[1] is solar_system[1]

    4 True

    ```'
