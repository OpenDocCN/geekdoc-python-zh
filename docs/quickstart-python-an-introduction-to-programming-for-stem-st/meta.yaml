    4 >>> j = i

    5 >>> id(j)

    6 10920224

    7 >>> j = 42+1

    8 >>> id(j)

    9 10920256

    ```


    In line 4 the object `j` of class `int` is created and referenced to the variable
    `i`. Both objects point to the same memory area and therefore have the same `id`.
    They are one and the same object. By the assignment in line 7 a new object with
    the name `j` of class `int` is created, which also gets its own `id`. To check
    whether two objects are identical, the `is` operator is available. To determine
    whether two objects have the same value, the `==` operator must be used. The following
    example with the Python interpreter illustrates the difference between the two
    operators


    ```

    1 >>> i = 512

    2 >>> j = 512

    3 >>> i == j

    4 True

    5 >>> i is j

    6 False

    7 >>> id(i)

    8 140111062575088

    9 >>> id(j)

    10 140111062573456

    11 >>> i = j

    12 >>> i is j

    13 True

    14 >>> id(i)

    15 140111062573456

    ```'
- md: "## Table 5.1 The operators for checking identity and equality\n\n| Operator\
    \ | Function |\n|---|---|\n| is | Checks for equality of the objects, Objects\
    \ reference the same memory area |\n| == | Checks for equality of the values of\
    \ the objects, the values at the respective location of the storage area are equal\
    \ |\n\nFirst two int objects are created, which both have the same value 512.\
    \ Comparing the two values with the == operator, therefore, returns True. However,\
    \ since the two objects are not identical, that is, two different objects, each\
    \ with its own memory area, the test for equality of the objects with the operator\
    \ is returns False. In line 11 we now explicitly create a new reference i to the\
    \ int object j. The same location in memory is referenced and the two objects\
    \ are thus identical, the is operator returns True. The properties of the two\
    \ operators are given in Table 5.1.\n\nWhile integer variables in Python version\
    \ 3 can have an unlimited length, the value range for floating-point numbers is\
    \ limited to 64 bits. The largest representable number is approximately 1.8 ×\
    \ 10^308. All numbers greater than this value are called inf\n\n```\n>>> f = 1.79e308\n\
    >>> print(f)\n1.79e+308\n>>> f = 1.8e308\n>>> print(f)\ninf\n```\n\nThe smallest\
    \ representable number greater than zero is 5 × 10^-324. All numbers between 0\
    \ and this number are effectively considered 0.\n\n```\n>>> not_zero = 5e-324\n\
    >>> print(not_zero)\n5e-324\n>>> not_zero = 5e-325\n>>> print(not_zero)\n0.0\n\
    ```\n\nPython also allows calculating with complex numbers. The data type complex\
