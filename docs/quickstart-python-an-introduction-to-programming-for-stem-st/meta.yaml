  md: '# Overview of the Programming Language Python


    In recent years, the programming language Python has established itself alongside
    MATLAB and R as the standard for scientific workplaces in research and development.


    The great popularity of Python is based on its easy extensibility: It is very
    easy to use modules from other developers in your own scripts and programs. Especially,
    the modules NumPy, SciPy, and Matplotlib offer scientists and engineers a perfect
    development environment for scientific and technical computing, for applications
    in physics, chemistry, biology, and computer science. Python is also used in the
    latest applications in the modern fields of research Big Data Science and Machine
    Learning.


    Originally Python was developed in the early 1990s by Guido van Rossum in the
    first version during his Christmas holiday. The pure teaching language ABC served
    as a model for him. His main goals were clarity and easy comprehensibility. The
    first full version was released in 1994 and was designed by van Rossum to be easily
    extensible by modules, and the language itself could be easily embedded in other
    languages. Since Python itself uses a clear syntax and can be programmed with
    simple structures, the language is particularly suitable for beginners and is
    comparatively easy to learn.


    # Python Versions 2 and 3


    Python was recently developed in two different major versions that are incompatible
    with each other. It is very likely that you will come across older Python scripts
    of version 2 as soon as your work is built on older, existing scripts. In general,
    the number of projects with Python 2 still predominates at present, a situation
    which will, however, have reversed by 2021.


    In this Springer *essential* we focus mainly on Python version 3, but if you are
    presented with an older Python script in your scientific career, your knowledge
    of'
  merge: -1
  pgno: 8
- img_proc: true
  md: 'version 3 will be sufficient for you to understand it and to modify it according
    to your needs.


    For new Python projects, use only the new version 3; all modules of interest for
    the natural sciences are now available for version 3, while support for older
    versions is discontinued. A particularly important example is the Matplotlib module,
    which in its latest version is only available for Python 3. If you need to convince
    someone to use the new version 3 instead of the outdated version 2.7, argue with
    the following points.


    +   - Support for Python 2.7 has expired on January 1, 2020. The active development
    of Python 2.7 ended in mid-2010. All new features are only included in version
    3 and only occasionally have been backported to 2.7.

    - Python 3 has better Unicode support: All text strings are Unicode by default.

    - Important modules only support version 3.


    Other new features that we will not go into detail include a different syntax
    for the print function, the use of views and iterators instead of lists, and changes
    for the integer division. The use of version 2 is only justified in individual
    cases. The most common individual case is a program already existing in version
    2 for which porting is too costly.'
  merge: -1
  pgno: 9
