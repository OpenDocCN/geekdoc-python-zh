  md: "# Conditional Statements and Loops\n\nWe can use control statements like loops\
    \ and conditional statements in Python to control the flow of our scripts and\
    \ programs. In Python, `if-else` branches, `for` and `while` loops are available.\
    \ Python does not have the `switch` statement or `do-while` loop that you might\
    \ know from other programming languages. But you will not have to miss them.\n\
    \n# 6.1 Conditional Statement with if-else\n\nAn `if-else` branch is used in Python\
    \ to execute code only under certain conditions that occur. An `if` statement\
    \ looks like this\n\n```\n1 if condition:       # condition true or false\n2 \
    \    programmcode    # indented program code\n3     programmcode    # that is\
    \ only executed\n4     programmcode    # when if condition is true\n```\n\nHere\
    \ the program code in the indented block in lines 2–4 is only executed if the\
    \ condition in the first line is true. If you want to check for more than one\
    \ condition, several conditions can be queried one after the other using the keyword\
    \ `elif`. The keyword `else` can be used to specify program code that is executed\
    \ if none of the other conditions in these `if-elif` statements apply.\n\n```\n\
    1 if condition1:      # condition1 True or False\n2     programmcode1\n3 elif\
    \ condition2:     # condition2 True or False\n4     programmcode2   # is executed\
    \ if condition1\n5     programmcode2   # is False and condition2 is True\n6 else:\
    \               #\n7     programmcode3   # is executed if\n8     programmcode3\
    \   # is executed if condition1 and\n                     # are False\n```"
