  md: '# 9.2 For Scientists: SciPy


    The `scipy` module contains modules, functions, and methods for many different
    areas which are important in the processing of scientific data or the modelling
    of scientific processes. This includes linear algebra, numerical integration,
    signal and image processing, numerical solution of ordinary differential equations.
    Like NumPy, SciPy offers enough content for extensive books. In the following
    example, we use the `curve_fit` function from the module `scipy.optimize` to fit
    a curve to artificially generated data.


    We first generate the function arguments $x$ using the NumPy function `linspace`
    and get a NumPy array of length 50 with values from 0 to 3, calculate the function
    values $f(x)$ and add some noise to these function values to generate our test
    data for fitting. Then we use the `curve_fit` function from the `scipy.optimize`
    module to fit our function $f$ with the two free parameters `omega` and `phi`
    to this data. The module uses the least-squares method to determine the fit parameters.
    Finally, we plot both our artificial data and the fitted curve and save the output
    in the `fit.png` file. If you run this script, you will get a file with a similar
    content to Fig. 9.1. It is recommended that every SciPy beginner should work through
    the basic principles and the tutorial on the central SciPy website.


    ![](img/7379a847211148e7d9132e7ee297d894_55_0.png)


    Fig. 9.1 Data points and function fitted using `scipy.optimize`'
