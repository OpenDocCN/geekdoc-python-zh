    sin(x)}{x}$')\n\nfig.savefig(outputfilename+'.pdf')\n```\n\n现在使用一个命令行参数（例如 `sinc`）来调用该脚本，该参数将用作输出文件的名称。如果我们以\
    \ `sinc` 为例，你会在目录中找到新创建的文件 `sinc.pdf`，其内容显示了 sinc 函数的图形。这个脚本已经比我们的 Hello-World\
    \ 脚本复杂得多。前两行是相同的，第 4 行使用关键字 `import` 加载了 `sys` 模块。该模块提供了关于系统常量、函数和 Python 解释器方法的重要信息。接下来，使用关键字\
