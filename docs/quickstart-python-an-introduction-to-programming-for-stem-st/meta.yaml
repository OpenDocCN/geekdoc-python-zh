    \ radius**3\n    if volume > 0:\n        rho = mass/volume\n    else:\n      \
    \  rho = 0\n    return rho\n```\n\nWe start the interactive Python interpreter\
    \ in the same directory where this file is located and import the module with\
    \ the name `pt`. The interpreter automatically generates a meaningful help text\n\
    \n```python\n>>> import physics_tools as pt  # Import of the module physics_tools\n\
    >>> help(pt)\nHelp on module physics_tools:\n\nNAME\n    physics_tools - Module\
    \ with physics\n\nFUNCTIONS\n    calculate_density(radius, mass)\n        # Calculation\
    \ of the density of a spherical homogeneous mass\n        # distribution of the\
    \ mass mass and radius radius\n        (...)\n>>> help(pt.calculate_density)\n\
    Help on function calculate_density in module physics_tools:\n\ncalculate_density(radius,\
    \ mass)\n    # Calculation of the density of a spherical homogeneous mass\n  \
    \  # distribution of the mass mass and radius radius\n```\n\nWe can now access\
    \ the density calculation function\n\n```python\n>>> R_earth = 6.371e6\n>>> M_earth\
    \ = 5.972e24\n>>> print(\"The density of Earth is %g kg/m**3\" % pt.calculate_density(\n\
