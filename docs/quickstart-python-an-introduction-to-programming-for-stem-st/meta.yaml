    # 6.2 Repetition with while Loop


    Loops are control structures with which program code can be executed repeatedly.
    A while loop repeats a statement block iteratively as long as the loop condition
    is valid. It is defined as follows


    ```

    1 while condition:  # condition True or False

    2     programcode  # indented program code

    3     programcode  # which is executed as long as

    4     programcode  # condition is True

    ```


    The interpreter first checks whether the condition in line 1 is true. If this
    is true, the code in lines 2–4 is executed one after the other. At the end of
    the loop, the interpreter jumps back to line 1 and checks if the condition is
    still true and restarts the execution of the program code in line 2 accordingly.
    If the condition is not true, the interpreter jumps behind the end of the loop.
    If this condition is always true, we speak of a so-called endless loop. The simplest
    example of an endless loop is


    ```

    1 while True:  # This expression is always true

    2     programcode  # consequently, the

    3     programcode  # program code is executed

    4     programcode  # endlessly

    ```


    With the keyword else, program code can be executed if the loop condition is not
    true


    ```

    1 while condition:  # condition true or false

    2     programcode1

    3 else:

    4     programcode2  # executed if condition is

    5     programcode2  # False

    ```


    Here the code in the indented block under else is only executed if the condition
    is not (or no longer) fulfilled. Often it is necessary to end a loop before it
    has run completely to the end again and checks the loop condition again. The keyword
    break is used for this purpose.


    ```

    1 while condition1:

    2     programcode1

    3     if condition2:

    4         break

    5     programcode3

    6 else:

    7     programcode4

    ```


    If the condition in the first line is fulfilled, the program code programcode1
    is executed. The if query in the third line checks for a further condition condition2.
    If this condition is met, the loop is aborted by the break statement in line 4.
    The interpreter jumps out of the loop, the block programcode3'
  - '[PAGE 32]


    and the else block are not executed anymore. If condition2 is not fulfilled during
    the loop pass, the programmcode3 block is executed and the loop repeats itself
    as long as condition1 is true and condition2 is false. If condition1 is false
    at the beginning of another loop pass, the else block is executed with programmcode4.
    Therefore, the else block is only executed if the break statement is never triggered.


    # 6.3 Repetition with for Loop


    The for loop in Python iterates over elements of any sequence such as a list or
    string in the order of the elements in the sequence.


    ```

    1 for element in list:

    2     programmcode1

    ```


    For each element the indented program code programmcode1 is executed. If we want
    to execute a certain program code for each planet in our solar system, we can
    do so with the for loop


    ```

    1 inner_planets = [''Mercury'', ''Venus'', ''Earth'', ''Mars'']

    2 density = {''Mercury'': 5.43, ''Venus'': 5.24, ''Earth'': 5.51, ''Mars'': 3.93,
    ''units'': ''g/ccm''}

    3 for planet in inner_planets:

    4     print(planet, density[planet], density[''units''])

    ```


    The program code produces the following output


    ```

    1 Mercury 5.43 g/ccm

    2 Venus 5.24 g/ccm

    3 Earth 5.51 g/ccm

    4 Mars 3.93 g/ccm

    ```


    The indented program code is executed for each element planet in the list inner_planets.
    As with the while loop, a break statement can also terminate the for loop early.


    ```

    1 inner_planets = [''Mercury'', ''Venus'', ''Earth'', ''Mars'']

    2 density = {''Mercury'': 5.43, ''Venus'': 5.24, ''Earth'': 5.51, ''Mars'': 3.93,
    ''units'': ''g/ccm''}

    3 for planet in inner_planets:

    4     print(planet, density[planet], density[''units''])

    5     if planet == ''Earth'':

    6         break

    ```


    The output of this program code now ends after the Earth since the for loop is
    terminated prematurely.


    ```

    1 Mercury 5.43 g/ccm

    2 Venus 5.24 g/ccm

    3 Earth 5.51 g/ccm

    ```'
  - '[PAGE 33]


    Another important instruction is `continue`. With this statement, the loop jumps
    to the next element in the sequence without executing the remaining code of the
    block. The following program code


    ```

    1 for planet in inner_planets:

    2     if planet == ''Earth'':

    3         continue

    4     print(planet, density[planet], density[''units''])

    ```


    skips the output for the planet Earth and moves to the next element in the list.
    The output changes to


    ```

    1 Mercury 5.43 g/ccm

    2 Venus 5.24 g/ccm

    3 Mars 3.93 g/ccm

    ```


    Curious for many programmers is the potential `else` block of a `for` loop.


    ```

    1 for element in list:

    2     programmcode1

    3 else:

    4     programmcode2

    ```


    Here the code in the `else` block is executed when the `list` is empty (remember:
    an empty list is equivalent to the boolean value `False`). Since the condition
    in the first line also returns `False` as soon as `element` was the last element
    in the list, the `else` block is also executed after the loop has been successfully
    completed. Only a potential `break` statement prevents the execution of the `programmcode2`
    block. Since `else` statements in conjunction with loops are unfamiliar to most
    programmers, you will rarely find them in practice.'
