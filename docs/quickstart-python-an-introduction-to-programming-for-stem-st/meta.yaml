    7. 函数\n   7.1 内置函数\n   7.2 函数的声明\n   7.3 全局变量和局部变量\n   7.4 迭代器和生成器，函数式编程\n   7.5\
    \ 使用 Lambda 运算符的匿名函数\n   7.6 函数可以被装饰：装饰器\n   7.7 函数式参数 *args 和 **kwargs\n8. 使用模块进行结构化\n\
    \   8.1 使用自定义模块对代码进行结构化\n   8.2 一些重要模块及其用途：Math、os、re、sys\n9. 面向科学家的扩展：NumPy、SciPy、Matplotlib、Pandas\n\
    \   9.1 使用 Python 进行快速数值计算：NumPy\n   9.2 面向科学家：SciPy\n   9.3 使用 Matplotlib 创建图表和图形\n\
    \   9.4 使用 Pandas 进行大数据科学\n\n# Python 编程语言概述\n\n近年来，编程语言 Python 与 MATLAB 和 R 一起，已成为研发领域科学工作的标准工具。\n\
    \nPython 的巨大普及源于其易于扩展的特性：在自己的脚本和程序中使用其他开发者的模块非常容易。特别是 NumPy、SciPy 和 Matplotlib\
    \ 模块为科学家和工程师提供了用于科学和技术计算、物理、化学、生物学和计算机科学应用的完美开发环境。Python 也应用于现代研究领域大数据科学和机器学习的最新应用中。\n\
    \nPython 最初由 Guido van Rossum 在 1990 年代初的第一个版本中，在他的圣诞假期期间开发。纯粹的教学语言 ABC 是他的模型。他的主要目标是清晰性和易于理解。第一个完整版本于\
    \ 1994 年发布，van Rossum 设计它时使其易于通过模块扩展，并且语言本身可以轻松嵌入其他语言。由于 Python 本身使用清晰的语法，并且可以用简单的结构进行编程，因此该语言特别适合初学者，并且相对容易学习。\n\
    \n# Python 版本 2 和 3\n\nPython 最近以两个互不兼容的主要版本进行开发。一旦您的工作基于旧的、现有的脚本，您很可能会遇到版本 2\
    \ 的旧 Python 脚本。目前，使用 Python 2 的项目数量仍然占多数，但这种情况预计将在 2021 年之前发生逆转。\n\n在这本 Springer\
    \ *精要* 中，我们主要关注 Python 版本 3，但如果您在科学职业生涯中遇到较旧的 Python 脚本，您对"
