    \ gets its own `id`. To check whether two objects are identical, the `is` operator\
    \ is available. To determine whether two objects have the same value, the `==`\
    \ operator must be used. The following example with the Python interpreter illustrates\
    \ the difference between the two operators\n\n```python\n>>> i = 512\n>>> j =\
    \ 512\n>>> i == j\nTrue\n>>> i is j\nFalse\n>>> id(i)\n140111062575088\n>>> id(j)\n\
    140111062573456\n>>> i = j\n>>> i is j\nTrue\n>>> id(i)\n140111062573456\n```"
  mdcn: "## Python 程序的基本结构\n\n我们从每种编程语言典型的第一个程序——Hello-World 程序开始。以下源代码（适用于 Linux\
