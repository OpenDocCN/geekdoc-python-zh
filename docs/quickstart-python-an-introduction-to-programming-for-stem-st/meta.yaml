    Therefore, the else block is only executed if the break statement is never triggered.


    # 6.3 Repetition with for Loop


    The for loop in Python iterates over elements of any sequence such as a list or
    string in the order of the elements in the sequence.


    ```

    1 for element in list:

    2     programmcode1

    ```


    For each element the indented program code programmcode1 is executed. If we want
    to execute a certain program code for each planet in our solar system, we can
    do so with the for loop


    ```

    1 inner_planets = [''Mercury'', ''Venus'', ''Earth'', ''Mars'']

    2 density = {''Mercury'': 5.43, ''Venus'': 5.24, ''Earth'': 5.51, ''Mars'': 3.93,
    ''units'': ''g/ccm''}

    3 for planet in inner_planets:

    4     print(planet, density[planet], density[''units''])

    ```


    The program code produces the following output


    ```

    1 Mercury 5.43 g/ccm

    2 Venus 5.24 g/ccm

    3 Earth 5.51 g/ccm

    4 Mars 3.93 g/ccm

    ```


    The indented program code is executed for each element planet in the list inner_planets.
    As with the while loop, a break statement can also terminate the for loop early.


    ```

    1 inner_planets = [''Mercury'', ''Venus'', ''Earth'', ''Mars'']

    2 density = {''Mercury'': 5.43, ''Venus'': 5.24, ''Earth'': 5.51, ''Mars'': 3.93,
    ''units'': ''g/ccm''}

    3 for planet in inner_planets:

    4     print(planet, density[planet], density[''units''])

    5     if planet == ''Earth'':

    6         break

    ```


    The output of this program code now ends after the Earth since the for loop is
    terminated prematurely.


    ```

    1 Mercury 5.43 g/ccm

    2 Venus 5.24 g/ccm

    3 Earth 5.51 g/ccm

    ```'
