  md: "# 9.3 Creating Diagrams and Graphics with Matplotlib\n\nWe have already used\
    \ the `matplotlib` module in the previous sections without explaining it in detail.\
    \ It allows us to create high-quality 2D diagrams and plots with Python and to\
    \ save them in appropriate formats such as the raster format `png` (portable network\
    \ graphics) or the vector format `pdf` (portable document format). In the following,\
    \ we will load and plot the data of the file `planets.dat`. The file contains\
    \ the semi-major axes and orbital periods of the planets in our Solar System,\
    \ column by column, as floating-point numbers\n\n```\n1  # our data\n2  # planets\
    \ of solar system\n3  # semi-major axis [au] orbital period [yr]\n4  0.38709888\
    \ 0.2408467\n5  0.72333199 0.61519726\n6  1.00000011 1.0000174\n7  1.52366231\
    \ 1.8808476\n8  5.20336301 11.862615\n9  9.53707032 29.447498\n10 19.19126393\
    \ 84.016846\n11 30.06896348 164.79132\n```\n\nWe can use the NumPy function `loadtxt`\
    \ to conveniently load this data and plot it with the `scatter` function from\
    \ the `matplotlib.pyplot` module.\n\n```\n1  #!/usr/bin/env python\n2  # -*- coding:\
    \ utf-8 -*-\n3  \n4  import numpy as np\n5  import matplotlib.pyplot as plt\n\
    6  \n7  # Read semi-major axes axis and orbital periods of the planets from the\
    \ file\n8  sma, period = np.loadtxt(\"planets.dat\", unpack=True)\n9  \n10 fig,\
    \ ax = plt.subplots() # Create a plot\n11 \n12 ax.scatter(sma, period, label='Planets\
    \ of the Solar System') # Scatter plot from the data\n13 ax.set_xlabel(\"semi-major\
    \ axis in au\") # Axis labels\n14 ax.set_ylabel(\"Orbital period in years\")\n\
    15 \n16 alpha = period[0]**2/sma[0]**3 # Kepler's 3rd law\n17 \n18 ax.plot(sma,\
    \ (alpha * sma**3)**(1./2), c='r', ls='--', label='Kepler's 3rd law') # line plot\n\
    19 plt.grid(True) # Show grid\n20 plt.legend()\n21 fig.savefig(\"planets.png\"\
    ) # Save the plot to file planets.png\n```\n\nYou get the file `planets.png` with\
    \ the contents analogous to Fig. 9.2. The additional second, dashed curve, are\
    \ the orbital times for the respective semi-major axis calculated according to\
    \ Kepler's 3rd law (\"The square of a planet's"
