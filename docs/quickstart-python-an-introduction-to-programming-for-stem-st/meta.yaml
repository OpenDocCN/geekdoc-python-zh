    \nPython 是一种所谓的结构化编程语言。这意味着程序代码可以被划分为块。在 Python 中，缩进用于标识各个块。这意味着 Python 不需要像其他语言那样使用关键字或括号来定义块。这也意味着代码自动变得更清晰、更易读。然而，在编写代码时，程序员混合使用空格和制表符是很重要的。最佳实践是：一个缩进深度对应\
