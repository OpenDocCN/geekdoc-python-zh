  md: '# Installation of Python


    Very few users compile Python directly from the source files from the central
    web-site of the Python project, but use precompiled packages, some of which already
    contain the important modules NumPy, SciPy, and Matplotlib. The following describes
    the installation for the most common operating systems.


    # 2.1 Windows


    For Windows operating systems, the Anaconda Suite offers a free Python suite with
    an easy installation in the basic version with over 1400 packages. A graphical
    installer can be obtained for versions 2 and 3 from the website of Anaconda Inc.
    The standard installation includes all modules relevant for scientific applications
    and the development environment spyder.


    # 2.2 Linux


    In almost all Linux distributions the most important Python packages for versions
    2 and 3 can be installed via the respective package manager of the distribution.
    Apart from that the Anaconda Suite for Linux is also available, but it is recommended
    to use the distribution’s own packages. The call for installation on Debian-based
    systems is


    ```

    1 apt install python3 python3-numpy python3-scipy python3-matplotlib python3-spyder

    ```


    Any dependencies are resolved by the package manager and all packages are installed
    accordingly.'
  merge: -1
  pgno: 10
- img_proc: true
  md: '# 2.3 macOS


    Under the operating system macOS, there are also several possibilities for installation.
    On the one hand you can use the Anaconda Suite mentioned above, on the other hand
    most Python packages are available through one of the better known open source
    package managers `fink`, `macports`, `homebrew`. The installation of the Python
    base package via `homebrew` is for example


    ```

    1 brew install python3

    ```


    With the help of Python''s own package manager `pip` (Pip Installs Packages),
    you can then install additional Python packages


    ```

    1 pip install numPy sciPy matplotlib

    ```


    The command `pip list` can be used to display installed packages.'
  merge: -1
  pgno: 11
