    \n## 7.4 迭代器与生成器，函数式编程\n\n迭代器和生成器允许使用 Python 进行函数式编程。迭代器是其元素可以被迭代的对象。为了迭代对象的元素，它必须是一个所谓的可迭代对象，该对象实现了\
