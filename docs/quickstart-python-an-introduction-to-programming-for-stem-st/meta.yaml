  md: 'Another important instruction is `continue`. With this statement, the loop
    jumps to the next element in the sequence without executing the remaining code
    of the block. The following program code


    ```

    1 for planet in inner_planets:

    2     if planet == ''Earth'':

    3         continue

    4     print(planet, density[planet], density[''units''])

    ```


    skips the output for the planet Earth and moves to the next element in the list.
    The output changes to


    ```

    1 Mercury 5.43 g/ccm

    2 Venus 5.24 g/ccm

    3 Mars 3.93 g/ccm

    ```


    Curious for many programmers is the potential `else` block of a `for` loop.


    ```

    1 for element in list:

    2     programmcode1

    3 else:

    4     programmcode2

    ```


    Here the code in the `else` block is executed when the `list` is empty (remember:
    an empty list is equivalent to the boolean value `False`). Since the condition
    in the first line also returns `False` as soon as `element` was the last element
    in the list, the `else` block is also executed after the loop has been successfully
    completed. Only a potential `break` statement prevents the execution of the `programmcode2`
    block. Since `else` statements in conjunction with loops are unfamiliar to most
    programmers, you will rarely find them in practice.'
