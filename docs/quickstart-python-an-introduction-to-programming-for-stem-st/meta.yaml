    \ its own integer, which is guaranteed to be unique and constant for the runtime\
    \ of the program. The `id()` function returns the value of this integer.\n\n```python\n\
    >>> i = 42\n>>> id(i)\n10920224\n>>> j = i\n>>> id(j)\n10920224\n>>> j = 42+1\n\
    >>> id(j)\n10920256\n```\n\nIn line 4 the object `j` of class `int` is created\
