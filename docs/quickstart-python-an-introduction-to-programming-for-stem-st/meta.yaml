  md: '# 5.2 Sequential Data Types


    Table 5.3 The most important operations for sequential data types


    | Syntax | Operation |

    |---|---|

    | a[i] | Returns ith element of sequence a |

    | a[i:j] | Returns the range ith to (j-1)th element of sequence a |

    | a[i:j:k] | Returns the range ith to (j-1)th element in steps of k from sequence
    a |

    | a+b | Concatenation of a and b, return is a new data sequence |

    | a+=b | Add b to a |

    | n*a | Creates new data sequence with n-fold content |

    | e in a | Checks if e is contained in a, return value True or False |

    | e not in a | Checks if e is not contained in a, return value True or False |


    In these cases, tuples are used instead of lists. In contrast to lists, the sequential
    datatype tuple (tuple) is not changeable (immutable) after it has been created.
    It is important to understand that although the tuple can no longer be changed,
    if an element of a tuple is a list, the elements of this list can change again.
    In other words, the elements of a tuple are references that can no longer be changed,
    but if the reference points to a mutable object, then the object can change and
    so can the element in the tuple. The following example illustrates this


    ```

    1 >>> b = []          # Create empty list b

    2 >>> a = (1,2,b)     # Create tuple a with elements 1, 2 and b

    3 >>> type(a)

    4 <class ''tuple''>

    5 >>> type(b)

    6 <class ''list''>

    7 >>> a

    8 (1, 2, [])

    9 >>> b.append(10) # Append 10 to list b an

    10 >>> b

    11 [10]

    12 >>> a

    13 (1, 2, [10])      # a[2]has changed

    ```


