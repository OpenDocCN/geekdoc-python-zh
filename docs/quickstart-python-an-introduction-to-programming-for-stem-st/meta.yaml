  - "[PAGE 44]\n\n# Structuring with Modules\n\nModules in Python are basically functions\
    \ and objects that can be included and used in a program or script. For example,\
    \ if we want the sine function value of a variable, it is not necessary to implement\
    \ a function that calculates this value but we use the function `sin` implemented\
    \ in the module `math`. In the same way, it is common practice in larger programs\
    \ to structure the individual functions into modules and load them as needed.\
    \ By default, Python has extensive help for all kinds of needs in the form of\
    \ modules. The analog of Python modules are libraries in other programming languages\
    \ like C and C++. Modules are usually included at the beginning of the program\
    \ code with the following syntax\n\n```\n1 #!/usr/bin/env python\n2 # -*- coding:\
    \ utf-8 -*-\n3 \n4 import <module_name>\n5 import <module_name> as <namespace_name>\
    \ # General syntax\n6 \n7 import numpy  # Example for module numpy\n8 import numpy\
    \ as np  # Example for module numpy using namespace np\n```\n\nThis call imports\
    \ the entire functionality of a module. Generally, the command `import` followed\
    \ by the name of the module is sufficient. You can also specify the namespace\
    \ using the keyword `as`. The content of the module is then accessed using `namespace_name`.\
    \ We import the math module to calculate the sine value of π/4.\n\n```\n1 #!/usr/bin/env\
    \ python\n2 # -*- coding: utf-8 -*-\n3 \n4 import math\n5 \n6 print(math.sin(math.pi/4))\n\
    ```"
  - "[PAGE 45]\n\nThe output provides the correct value 0.7071067811865475. We have,\
    \ therefore, used the function `sin` and the constant value of π from the math\
    \ module. It is precisely the large number of modules available that has made\
    \ Python so popular and successful. Before you want or have to implement a new\
    \ function yourself, it is advisable to look for a module that already offers\
    \ the required functionality. Each module implements the two functions `help()`\
    \ and `dir()`. The function `help()` generates the help and description text of\
    \ an object, in this case the module. The `dir()` function lists all attributes\
    \ of an object. This way we can list all functions of a module and get help on\
    \ specific elements\n\n```\n>>> import math\n>>> dir(math)\n['__doc__', '__file__',\
    \ '__loader__', '__name__', '__package__', '__spec__',\n 'acos', 'acosh', 'asin',\
    \ 'asinh', 'atan', 'atan2', 'atanh', 'ceil',\n 'copysign', 'cos', 'cosh', 'degrees',\
