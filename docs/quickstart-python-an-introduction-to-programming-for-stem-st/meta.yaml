    \ 代码，也可以创建富有表现力的图表。\n\n## 数据类型、变量、列表、字符串、字典和运算符\n\n编程语言 Python 区分不同的数据类型：数字、列表、元组、字符串、字典和集合。作为主要特征以及与\
    \ C 或 C++ 等其他编程语言的最大区别，Python 中的类型赋值发生在程序运行时，并且变量类型不需要声明。这称为动态类型，其中变量的类型在赋值时自动设置。严格来说，Python\
    \ 中没有经典的变量类型。相反，变量是特定类型的对象。\n\n### 5.1 数值数据类型 int 和 float，bool 和 complex\n\n在\
    \ Python 解释器中，以下语句\n\n```python\n>>> i = 42\n```\n\n生成一个名为 `i` 的 `int` 类对象，并为其赋值\
    \ 42。通常，人们会说这是一个数据类型为 `int` 的整数变量 `i`，但由于在 Python 中一切都是对象，这种说法是错误的。可以使用 `type()`\
    \ 函数来找出变量的类型\n\n```python\n>>> i = 42\n>>> type(i)\n<class 'int'>\n>>> f = 17.0\n\
    >>> type(f)\n<class 'float'>\n```\n\n第 1 行的赋值（使用赋值运算符 `=`）创建了一个名为 `i` 的 `int`\
    \ 类新对象。如果赋值运算符右侧是一个浮点数（以小数字符为特征），如第 4 行所示，则会自动创建一个 `float` 类对象。虽然在 Python 版本 2\
    \ 中，可显示的最大整数仍受 64 位限制，但在 Python 版本 3 中不再受此限制\n\n```python\n>>> 2**1024\n17555597020139803786418996003799069664238056434983462624358406363059\n\
    83162163095343092856223851636093956251112108119075758386618836078287\n32903171318983861449587663958422720200465138886329341888788528401320\n\
    39551344613100652572506140768936827201252659879233448309041630687494\n8482361796597953940777665648656384\n\
    ```\n\n除了 `type` 函数外，`id()` 函数对于处理对象和变量也很重要。每个对象都有自己的整数，该整数在程序运行期间保证是唯一且恒定的。`id()`\
    \ 函数返回这个整数的值。\n\n```python\n>>> i = 42\n>>> id(i)\n10920224\n>>> j = i\n>>> id(j)\n\
    10920224\n>>> j = 42+1\n>>> id(j)\n10920256\n```\n\n在第 4 行，创建了一个名为 `j` 的 `int`\
    \ 类对象，并将其引用到变量 `i`。两个对象指向相同的内存区域，因此具有相同的 `id`。它们是同一个对象。通过第 7 行的赋值，创建了一个名为 `j`\
    \ 的 `int` 类新对象，它也获得了自己的 `id`。要检查两个对象是否相同，可以使用 `is` 运算符。要确定两个对象是否具有相同的值，必须使用 `==`\
