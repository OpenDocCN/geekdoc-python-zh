    \ * r**3) for (r, m) in radius_mass ]\nprint(type(densities))\nprint(densities)\n\
    \n# 使用生成器函数\ndensities = ( m/(4./3*math.pi * r**3) for (r, m) in radius_mass )\n\
    print(type(densities))\nfor rho in densities:\n    print(rho)\n```\n\n当你运行该脚本时，你将得到以下输出：\n\
    \n```\n<class 'list'>\n[5424.84627512545, 4225.046323416284, 5515.855657405862,\
