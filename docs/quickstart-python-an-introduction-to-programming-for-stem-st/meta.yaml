    5515.855657405862\n3915.7337493683085\n```\n\n在第一种情况下，第 10 行的列表推导式创建了一个新的密度列表，其值被计算出来。这个列表已经存在于内存中。第\
    \ 15 行使用生成器函数的实现创建了一个生成器，它为每个元组计算密度值，并且仅在 for 循环中被调用时才占用内存。现在想象一下，初始列表 radius_mass\
    \ 不仅包含四个元组，而是四百亿个。那么使用生成器的实现将需要少得多的内存。"
