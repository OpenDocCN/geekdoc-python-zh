    The `math` module, which we already got to know in the last section, provides
    the most important mathematical functions. Since these functions are essentially
    wrapper functions to the respective C-function of the operating system, the speed
    of the calculations is considerable and not much slower than in C or Fortran.
    Trigonometric functions (`sin`, `cos`, `tan`, `asin`, `acos`, `atan`, `atan2`),
    hyperbolic functions (`asinh`, `acosh`, `atanh`, `sinh`, `cosh`, `tanh`), and
    exponential and logarithmic functions (`exp`, `log`, `log2`, `log10`, `pow`, `sqrt`)
    are available. Furthermore, the usual mathematical constants such as Pi, the Euler
    number e and Tau (`pi`, `e`, `tau`) are defined in the module. Some new functions
    have been added to the math module since Python 3 and are listed in Table 8.1.


    If the function arguments are elements of complex numbers, the functions of the
    `cmath` module are used. As soon as the Python module NumPy is used, the standard
    math module is left out because the `numpy` module implements its own math functions
    that accept NumPy arrays as arguments.


    # Module os


    The `os` (operating system) module is the interface for calling operating system
    functions. This module is indispensable for projects that are to be used on more
    than one platform such as Windows and macOS. Access to files at the file system
    level is completely abstracted by this module and you can, for example, copy,
    delete, or change file names without using the respective different operating
    system commands. This module is certainly one of the most important for system
    engineers. Some of the basic functions are listed in Table 8.2. As an illustrative
    example of the module''s powerful functionality, let us look at the following
    script that is used to search for a file. As an argument of the function the top
    directory is specified (`/data`) and the script searches all subdirectories until
    the file with the name `important.data` is found. Finally, the script outputs
    the path to the found file. The script ends as soon as a file with the name you
    are looking for is found. You can modify the script as an exercise to find all
    files with that name.'
  - '[PAGE 48]


    8.2 Some Important Modules ... 43


    Table 8.1 Newer (> Python 3) functions in the math module


    | Function | Return value |

    | :--- | :--- |

    | `erf(x)` | Returns the function value of the error function. New since 3.2 |

    | `gamma(x)` | Returns the function value of the gamma function. New since 3.2
    |

    | `gcd(i, j)` | Returns the smallest common divisor of the integer numbers `i`
    and `j`. New since 3.5 |

    | `isclose(x, y, *, rel_tol = 1e-09, abs_tol = 0.0)` | Returns `True` if the two
    values `x` and `y` are close together, otherwise `False`. Where `rel_tol` is the
    maximum distance between `x` and `y` relative to the greater absolute value of
    `x` and `y`. This function is very useful when comparing floating point numbers.
    New since 3.5 |

    | `log2(x)` | Returns the function value of the binary logarithm. New since 3.3
    |

    | `remainder(x, y)` | Returns the residual value of division `x/y`. New since
    3.7 |


