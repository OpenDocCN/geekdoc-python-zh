  md: '# 6.2 Repetition with while Loop


    Loops are control structures with which program code can be executed repeatedly.
    A while loop repeats a statement block iteratively as long as the loop condition
    is valid. It is defined as follows


    ```

    1 while condition:  # condition True or False

    2     programcode  # indented program code

    3     programcode  # which is executed as long as

    4     programcode  # condition is True

    ```


    The interpreter first checks whether the condition in line 1 is true. If this
    is true, the code in lines 2–4 is executed one after the other. At the end of
    the loop, the interpreter jumps back to line 1 and checks if the condition is
    still true and restarts the execution of the program code in line 2 accordingly.
    If the condition is not true, the interpreter jumps behind the end of the loop.
    If this condition is always true, we speak of a so-called endless loop. The simplest
    example of an endless loop is


    ```

    1 while True:  # This expression is always true

    2     programcode  # consequently, the

    3     programcode  # program code is executed

    4     programcode  # endlessly

    ```


    With the keyword else, program code can be executed if the loop condition is not
    true


    ```

    1 while condition:  # condition true or false

    2     programcode1

    3 else:

    4     programcode2  # executed if condition is

    5     programcode2  # False

    ```


    Here the code in the indented block under else is only executed if the condition
    is not (or no longer) fulfilled. Often it is necessary to end a loop before it
    has run completely to the end again and checks the loop condition again. The keyword
    break is used for this purpose.


    ```

    1 while condition1:

    2     programcode1

    3     if condition2:

    4         break

    5     programcode3

    6 else:

    7     programcode4

    ```


    If the condition in the first line is fulfilled, the program code programcode1
    is executed. The if query in the third line checks for a further condition condition2.
    If this condition is met, the loop is aborted by the break statement in line 4.
    The interpreter jumps out of the loop, the block programcode3'
  merge: -1
