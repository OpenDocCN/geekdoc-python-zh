    # 5.2 Sequential Data Types


    By sequential data types, we mean types that contain several elements. These include
    lists, tuples, and strings. NumPy extends this list by the extremely useful datatype
    `numpy.array`, which we will discuss in detail later. The most versatile sequential
    data type is the `list`: A list can contain elements of different data types and
    can be changed after its creation (`mutable`). An element of a list can itself
    be a list. The list is the most powerful sequential data type, and Python allows
    many operations and methods on lists. The most important operators for sequential
    data types are listed in Table 5.3. Often the advantages of lists are not needed
    and more attention must be paid to speed or memory requirements.'
