  - '[PAGE 50]


    # Extensions for Scientists: NumPy, SciPy, Matplotlib, Pandas


    In this chapter, we want to explain the most important modules for all scientists.
    A detailed description, however, would go beyond the scope of this *essential*.
    We look at some illustrative examples and the basic ideas of the individual modules.


    # 9.1 Fast Numerical Calculations with Python: NumPy


    The `numpy` module is the most helpful extension for scientists in Python. NumPy
    was created in 2005 from the unification of two different Python modules for the
    fast calculation of numerical data. The most important innovation is the introduction
    of the data structure `numpy.array`. NumPy functions are specially optimized for
    this new data structure and enable Python scripts with runtimes in the order of
    magnitude of equivalent C and Fortran programs. You can think of a `numpy.array`
    as a Python list with elements of the same type. Because the interpreter knows
    the size of the elements, it can optimize better than compared to the more generic
    Python lists. The functions implemented in `numpy` operate on this new data structure
    and can perform vectorial operations. This leads to the far-reaching reduction
    of the runtime.


    NumPy also offers many functions that make working with arrays much easier. One
    example is the function `numpy.linspace`. It creates a NumPy array with elements
    equidistantly distributed over a certain interval. The function `np.sin` then
    calculates all function values of the elements in this NumPy array and not only
    of one element like the comparable function `math.sin` from the `math` module
    as in the following example'
  - "[PAGE 51]\n\n```\n>>> import numpy as np\n>>> x = np.linspace(0, 10, 100)\n>>>\
    \ print(x)\n[ 0.          0.1010101   0.2020202   0.3030303   0.4040404   0.50505051\n\
    \  (...)\n  9.6969697   9.7979798   9.8989899  10.        ]\n>>> print(x+1.0)\
    \ # Add 1.0 to each element\n[ 1.          1.1010101   1.2020202   1.3030303 \
    \  1.4040404   1.50505051\n  (...)\n 10.6969697  10.7979798  10.8989899  11. \
    \       ]\n>>> print(np.sin(x))\n[ 0.          0.10083842  0.20064886  0.2984138\
    \   0.39313661  0.48385164\n  (...)\n -0.26884313 -0.36459873 -0.45663749 -0.54402111]\n\
    >>> import math\n>>> print(math.sin(x))\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nTypeError: only size-1 arrays can be\
    \ converted to Python scalars\n```\n\nWe have thus saved one for loop. The handling\
    \ of multidimensional arrays is the basis for working with NumPy. The main differences\
    \ between a Python list and a NumPy array are as follows\n\n+   - The elements\
    \ of a numpy.array are all of the same type.\n- The size of a numpy.array is fixed.\n\
    - Slicing a numpy.array only creates a so-called view and still accesses the original\
    \ data, which can be accidentally changed. Slicing a list or a tuple, however,\
    \ creates a new object. See the differences between deep and shallow copy in Sect.\
    \ 5.2.\n- The memory requirement of a numpy.array is usually significantly smaller\
    \ than that of a list with the same number of elements.\n\nSince the size of a\
    \ numpy.array is determined at build time, it is often more efficient to first\
    \ create a list of the later elements from which a numpy.array is generated than\
    \ to add elements to an existing numpy.array:"
  - "[PAGE 52]\n\n# 9.1 Fast Numerical Calculations with Python: NumPy\n\n```\n>>>\
    \ import numpy as np\n>>> a = np.array([0,1])  # a is a numpy array\n>>> id(a)\n\
    4514354960\n>>> a = np.append(a, [2]) # Creates new object a\n>>> id(a)\n4391813248\n\
    >>> print(a)\n[0 1 2]\n>>> a = [0,1]  # a is a Python list\n>>> id(a)\n4515856968\n\
    >>> a.append(2)  # a remains the same object\n>>> id(a)\n4515856968\n>>> print(a)\n\
    [0, 1, 2]\n```\n\nIn the first case when using numpy.arrays, the interpreter must\
    \ create a new object and delete the old one. This is significantly slower than\
    \ using a regular list to which an element can be added.\n\nThe already mentioned\
    \ functions linspace(start, stop, num=50, endpoint=True, retstep=False, dtype=None)\
    \ can be used to create 1D numpy.arrays. Besides there are also the functions\
    \ logspace(start, stop, num=50, endpoint=True, base=10.0, dtype=None) and arange([start,]\
    \ stop[, step,], dtype=None)\n\n```\n>>> np.arange(-5,5,0.1) # Creates a numpy.array\
    \ with values from -5 to 5 (exclusive) in equal steps of 0.1\narray([-5.00000000e+00,\
    \ -4.90000000e+00, -4.80000000e+00, -4.70000000e+00,\n       (...)\n       4.60000000e+00,\
    \  4.70000000e+00,  4.80000000e+00,  4.90000000e+00])\n```\n\n```\n>>> np.linspace(-5,5,10)\
    \ # Creates a numpy.array with 10 linear increasing values between -5 and 5 (inclusive)\n\
    array([-5.        , -3.88888889, -2.77777778, -1.66666667, -0.55555556,\n    \
    \    0.55555556,  1.66666667,  2.77777778,  3.88888889,  5.        ])\n>>> np.linspace(-5,5,10,endpoint=False)\
    \ # Create a numpy.array with 10 linear increasing values between -5 and 5 (exclusive)\n\
    array([-5., -4., -3., -2., -1.,  0.,  1.,  2.,  3.,  4.])\n```\n\nMultidimensional\
    \ NumPy arrays (numpy.ndarray) can be created in NumPy in different ways. The\
    \ size, the shape, the number of elements can be requested from the object"
  - "[PAGE 53]\n\n```\n>>> x = np.array([[1., 2], [3., 4]]) # create 2x2 matrix/array\n\
    >>> type(x)\n<class 'numpy.ndarray'>\n>>> print(x)\n[[1. 2.]\n [3. 4.]]\n>>> print(x.shape)\
    \ # the shape of the array\n(2,2)\n>>> print(x.size) # Number of elements\n4\n\
    >>> print(x.T) # The transposed of the array\n[[1. 3.]\n [2. 4.]]\n>>> print(2*x)\
    \ # Double each element\n[[2. 4.]\n [6. 8.]]\n```\n\nand the shape of the numpy.arrays\
    \ can be changed\n\n```\n>>> x = np.arange(9) # Create a onedimensional array\
    \ with elements 1 to 9\n>>> x = x.reshape(3,3) # Generate 3x3 matrix from x\n\
    ```\n\nTo access the individual elements, we use the same syntax as for lists\
    \ and tuples\n\n```\n>>> print(x[1]) # Print the second line\n[3 4 5]\n>>> print(x[1][2])\
    \ # Print the last element of the second line\n5\n>>> print(x[1,2]) # print the\
    \ last element of the second line, preferred syntax\n5\n```\n\nThe last two lines\
    \ are especially interesting: Both x[1][2] and x[1,2] return the same element.\
    \ However, the latter syntax should be preferred to the first one, since the Python\
    \ interpreter creates a temporary intermediate object x[1] in the first variant,\
    \ from which the third element is then returned. Basically the following happens\n\
    \n```\n>>> tmp = x[1]\n>>> print(tmp[2])\n5\n```\n\nwhich in turn requires more\
    \ memory and computing time than referencing with x[1,2]."
  - "[PAGE 54]\n\n# 9.1 Fast Numerical Calculations with Python: NumPy\n\n```\n>>>\
    \ np.lookfor('fourier')\nSearch results for 'fourier'\n--------------------------------\n\
    numpy.fft.fft\n    Compute the one-dimensional discrete Fourier Transform.\nnumpy.fft.fft2\n\
    \    Compute the 2-dimensional discrete Fourier Transform\n(...)\nnumpy.fft.irfft\n\
    \    Compute the inverse of the n-point DFT for real input.\nnumpy.fft.rfft2\n\
    \    Compute the 2-dimensional FFT of a real array.\nnumpy.fft.irfftn\n    Compute\
    \ the inverse of the N-dimensional FFT of real input.\n```\n\nTo find more functions,\
    \ NumPy's own search function is helpful. With the function lookfor the NumPy\
    \ help can be searched. If you want to perform a Fourier transformation, you can\
    \ search for it specifically\n\n```\n#!/usr/bin/env python\n# -*- coding: utf-8\
    \ -*-\nimport numpy as np\nimport scipy.optimize\nimport matplotlib.pyplot as\
    \ plt\n\ndef f(t, omega, phi):\n    return np.cos(omega * t + phi)\n\nx = np.linspace(0,\
    \ 3, 50)\ny = f(x, 1.5, 1) + .1*np.random.normal(size=50)\n\n# curve_fit returns\
    \ the fit values for f\nfits, pcov = scipy.optimize.curve_fit(f, x, y)\n\nplt.scatter(x,\
    \ y) # Plot of the artificial data\nplt.plot(x, f(x, *fits), c='r') # Plot of\
    \ the fitted function\nplt.xlabel('x')\nplt.ylabel('y')\nplt.savefig(\"fit.png\"\
    )\n```\n\nIt is advisable for every NumPy beginner to work through the basic principles\
    \ and the tutorial on the central website for NumPy.\n\nPython alone also knows\
    \ the data type array, which is provided by the module array. However, it is no\
    \ longer used in practice. Usually, a NumPy array is meant when talking about\
    \ an array.\n\nIn the next section, we will look at the module SciPy, which extends\
    \ NumPy by many mathematical functions."
- md: "## 9.2 For Scientists: SciPy\n\nThe `scipy` module contains modules, functions,\
    \ and methods for many different areas which are important in the processing of\
    \ scientific data or the modelling of scientific processes. This includes linear\
    \ algebra, numerical integration, signal and image processing, numerical solution\
    \ of ordinary differential equations. Like NumPy, SciPy offers enough content\
    \ for extensive books. In the following example, we use the `curve_fit` function\
    \ from the module `scipy.optimize` to fit a curve to artificially generated data.\n\
    \nWe first generate the function arguments $x$ using the NumPy function `linspace`\
    \ and get a NumPy array of length 50 with values from 0 to 3, calculate the function\
    \ values $f(x)$ and add some noise to these function values to generate our test\
    \ data for fitting. Then we use the `curve_fit` function from the `scipy.optimize`\
    \ module to fit our function $f$ with the two free parameters `omega` and `phi`\
    \ to this data. The module uses the least-squares method to determine the fit\
    \ parameters. Finally, we plot both our artificial data and the fitted curve and\
    \ save the output in the `fit.png` file. If you run this script, you will get\
    \ a file with a similar content to Fig. 9.1. It is recommended that every SciPy\
    \ beginner should work through the basic principles and the tutorial on the central\
    \ SciPy website.\n\n![](img/7379a847211148e7d9132e7ee297d894_55_0.png)\n\nFig.\
    \ 9.1 Data points and function fitted using `scipy.optimize`\n\n## 9.3 Creating\
    \ Diagrams and Graphics with Matplotlib\n\nWe have already used the `matplotlib`\
    \ module in the previous sections without explaining it in detail. It allows us\
    \ to create high-quality 2D diagrams and plots with Python and to save them in\
    \ appropriate formats such as the raster format `png` (portable network graphics)\
    \ or the vector format `pdf` (portable document format). In the following, we\
    \ will load and plot the data of the file `planets.dat`. The file contains the\
    \ semi-major axes and orbital periods of the planets in our Solar System, column\
    \ by column, as floating-point numbers\n\n```\n1  # our data\n2  # planets of\
    \ solar system\n3  # semi-major axis [au] orbital period [yr]\n4  0.38709888 0.2408467\n\
    5  0.72333199 0.61519726\n6  1.00000011 1.0000174\n7  1.52366231 1.8808476\n8\
    \  5.20336301 11.862615\n9  9.53707032 29.447498\n10 19.19126393 84.016846\n11\
    \ 30.06896348 164.79132\n```\n\nWe can use the NumPy function `loadtxt` to conveniently\
    \ load this data and plot it with the `scatter` function from the `matplotlib.pyplot`\
    \ module.\n\n```\n1  #!/usr/bin/env python\n2  # -*- coding: utf-8 -*-\n3  \n\
    4  import numpy as np\n5  import matplotlib.pyplot as plt\n6  \n7  # Read semi-major\
    \ axes axis and orbital periods of the planets from the file\n8  sma, period =\
    \ np.loadtxt(\"planets.dat\", unpack=True)\n9  \n10 fig, ax = plt.subplots() #\
    \ Create a plot\n11 \n12 ax.scatter(sma, period, label='Planets of the Solar System')\
    \ # Scatter plot from the data\n13 ax.set_xlabel(\"semi-major axis in au\") #\
    \ Axis labels\n14 ax.set_ylabel(\"Orbital period in years\")\n15 \n16 alpha =\
    \ period[0]**2/sma[0]**3 # Kepler's 3rd law\n17 \n18 ax.plot(sma, (alpha * sma**3)**(1./2),\
    \ c='r', ls='--', label=\"Kepler's 3rd law\") # line plot\n19 plt.grid(True) #\
    \ Show grid\n20 plt.legend()\n21 fig.savefig(\"planets.png\") # Save the plot\
    \ to file planets.png\n```\n\nYou get the file `planets.png` with the contents\
    \ analogous to Fig. 9.2. The additional second, dashed curve, are the orbital\
    \ times for the respective semi-major axis calculated according to Kepler's 3rd\
    \ law (\"The square of a planet's orbital period is proportional to the cube of\
    \ the length of the semi-major axis of its orbit.\"). The initializing call is\
    \ `fig, ax= plt.subplots()` which generates a figure and axes object that can\
    \ be used to generate the graphics. In our example, we use the so-called `scatter`\
    \ plot, where $x$-$y$ values are displayed as points and `plot` as a $x$-$y$ line\
    \ plot. The type of plot, the size of the individual data points, and the line\
    \ thickness are changeable parameters. The Matplotlib can be used to generate\
    \ curves, histograms, scatter plots, contour plots, and even 3D plots. For text\
    \ inserts in the diagrams LaTeX can be used. It is recommended that every Matplotlib\
    \ beginner works through the basic principles and the tutorial on the central\
    \ website of Matplotlib.\n\n![](img/7379a847211148e7d9132e7ee297d894_57_0.png)\n\
    \n**Fig. 9.2** The periods of the planets in the solar system as a function of\
    \ their semi-major axes as data points and Kepler's 3rd law\n\n## 9.4 Big Data\
    \ Science with Pandas\n\nThe module `pandas` (Python Data Analysis Library) is\
    \ a special extension of Python for the management and analysis of tabular data,\
    \ which we will mention here for the sake of completeness. For this purpose, the\
    \ module extends the standard library by the three objects `series`, `dataframe`,\
    \ and `panel`. A `series` corresponds roughly to a 1D NumPy array, a `dataframe`\
    \ consists of 2D tables whose individual columns and rows can be processed like\
    \ `series` objects. Finally, a `panel` is a 3D table whose individual levels are\
    \ `dataframe` objects. The module offers special functions for working with time\
    \ series data and their evaluation, that is, sorting functions and statistical\
    \ functions. As soon as you come into contact with very large amounts of data,\
    \ the use of this module could become interesting. You can find more information\
    \ on the website of the pandas project.\n\n## What You Learned from this *essential*\n\
    \n- You know the basic ideas and principles of the programming language Python.\n\
    - You can develop your own Python programs and structure your program in functions\
    \ and modules.\n- You can understand foreign Python scripts, adapt them to your\
    \ needs and integrate them into your program code.\n- You know how to use NumPy\
    \ for fast numerical calculations with Python and can implement special functions\
    \ for scientific applications with SciPy.\n- You can use Matplotlib to create\
    \ scientific diagrams and graphics.\n\n## To Read More\n\nThere is a lot of Python\
    \ literature worth reading. Besides the online sources of the individual Python,\
    \ NumPy, SciPy, Matplotlib, and pandas projects, the following works are recommended.\n\
    \n1. Langtangen, Hans Petter. 2016. *A Primer on Scientific Programming with Python*.\
    \ Berlin, Heidelberg: Springer.\n2. Nelli, Fabio. 2018. *Python Data Analytics\
    \ with Pandas, Numpy, and Matplotlib*. New York City: Apress.\n3. Johansson, Robert.\
    \ 2018. *Numerical Python: Scientific computing and data science applications\
    \ with NumPy, SciPy and Matplotlib*. New York City: Apress.\n4. Newman, Mark.\
    \ 2012. *Computational physics*. Scotts Valley: CreateSpace Independent Publishing\
    \ Platform."
  mdcn: "## 9.2 面向科学家的 SciPy\n\n`scipy` 模块包含用于科学数据处理或科学过程建模中许多不同领域的模块、函数和方法。这包括线性代数、数值积分、信号和图像处理、常微分方程的数值解。与\
    \ NumPy 类似，SciPy 提供了足够丰富的内容，足以撰写多本详尽的书籍。在下面的示例中，我们使用 `scipy.optimize` 模块中的 `curve_fit`\
    \ 函数，将一条曲线拟合到人工生成的数据上。\n\n我们首先使用 NumPy 函数 `linspace` 生成函数参数 $x$，得到一个长度为 50、值从\
    \ 0 到 3 的 NumPy 数组，计算函数值 $f(x)$，并为这些函数值添加一些噪声，以生成用于拟合的测试数据。然后，我们使用 `scipy.optimize`\
    \ 模块中的 `curve_fit` 函数，将我们的函数 $f$（包含两个自由参数 `omega` 和 `phi`）拟合到这些数据上。该模块使用最小二乘法来确定拟合参数。最后，我们绘制出人工数据和拟合曲线，并将输出保存到\
    \ `fit.png` 文件中。如果你运行这个脚本，你将得到一个内容与图 9.1 类似的文件。建议每位 SciPy 初学者都应学习 SciPy 中心网站上的基本原理和教程。\n\
    \n![](img/7379a847211148e7d9132e7ee297d894_55_0.png)\n\n图 9.1 使用 `scipy.optimize`\
    \ 拟合的数据点和函数\n\n## 9.3 使用 Matplotlib 创建图表和图形\n\n我们在前面的章节中已经使用过 `matplotlib` 模块，但没有详细解释。它允许我们使用\
    \ Python 创建高质量的二维图表和绘图，并将其保存为合适的格式，例如光栅格式 `png`（便携式网络图形）或矢量格式 `pdf`（便携式文档格式）。接下来，我们将加载并绘制文件\
    \ `planets.dat` 中的数据。该文件逐列包含我们太阳系行星的半长轴和轨道周期，以浮点数形式存储。\n\n```\n1  # our data\n\
    2  # planets of solar system\n3  # semi-major axis [au] orbital period [yr]\n\
    4  0.38709888 0.2408467\n5  0.72333199 0.61519726\n6  1.00000011 1.0000174\n7\
    \  1.52366231 1.8808476\n8  5.20336301 11.862615\n9  9.53707032 29.447498\n10\
    \ 19.19126393 84.016846\n11 30.06896348 164.79132\n```\n\n我们可以使用 NumPy 函数 `loadtxt`\
    \ 方便地加载这些数据，并使用 `matplotlib.pyplot` 模块中的 `scatter` 函数进行绘制。\n\n```\n1  #!/usr/bin/env\
    \ python\n2  # -*- coding: utf-8 -*-\n3  \n4  import numpy as np\n5  import matplotlib.pyplot\
    \ as plt\n6  \n7  # Read semi-major axes axis and orbital periods of the planets\
    \ from the file\n8  sma, period = np.loadtxt(\"planets.dat\", unpack=True)\n9\
    \  \n10 fig, ax = plt.subplots() # Create a plot\n11 \n12 ax.scatter(sma, period,\
    \ label='Planets of the Solar System') # Scatter plot from the data\n13 ax.set_xlabel(\"\
    semi-major axis in au\") # Axis labels\n14 ax.set_ylabel(\"Orbital period in years\"\
    )\n15 \n16 alpha = period[0]**2/sma[0]**3 # Kepler's 3rd law\n17 \n18 ax.plot(sma,\
    \ (alpha * sma**3)**(1./2), c='r', ls='--', label=\"Kepler's 3rd law\") # line\
    \ plot\n19 plt.grid(True) # Show grid\n20 plt.legend()\n21 fig.savefig(\"planets.png\"\
    ) # Save the plot to file planets.png\n```\n\n你将得到文件 `planets.png`，其内容与图 9.2 类似。额外的第二条虚线曲线是根据开普勒第三定律（“行星轨道周期的平方与其轨道半长轴长度的立方成正比”）计算出的相应半长轴的轨道时间。初始化调用\
    \ `fig, ax= plt.subplots()` 会生成一个图形和坐标轴对象，可用于生成图形。在我们的示例中，我们使用所谓的 `scatter` 图，其中\
    \ $x$-$y$ 值显示为点，而 `plot` 用于绘制 $x$-$y$ 线图。图表类型、单个数据点的大小以及线条粗细都是可更改的参数。Matplotlib\
    \ 可用于生成曲线、直方图、散点图、等高线图，甚至三维图。图表中的文本插入可以使用 LaTeX。建议每位 Matplotlib 初学者都应学习 Matplotlib\
    \ 中心网站上的基本原理和教程。\n\n![](img/7379a847211148e7d9132e7ee297d894_57_0.png)\n\n**图\
    \ 9.2** 太阳系行星的周期作为其半长轴的函数，以数据点和开普勒第三定律的形式展示\n\n## 9.4 使用 Pandas 进行大数据科学\n\n`pandas`\
    \ 模块（Python 数据分析库）是 Python 在表格数据管理和分析方面的特殊扩展，我们在此提及以保证完整性。为此，该模块通过三个对象 `series`、`dataframe`\
    \ 和 `panel` 扩展了标准库。`series` 大致对应于一维 NumPy 数组，`dataframe` 由二维表格组成，其各个列和行可以像 `series`\
    \ 对象一样进行处理。最后，`panel` 是一个三维表格，其各个层级是 `dataframe` 对象。该模块提供了用于处理时间序列数据及其评估的特殊函数，即排序函数和统计函数。一旦你接触到非常大量的数据，使用该模块可能会变得有趣。你可以在\
    \ pandas 项目的网站上找到更多信息。\n\n## 你从本 *基础* 中学到了什么\n\n- 你了解了 Python 编程语言的基本思想和原理。\n\
    - 你可以开发自己的 Python 程序，并将程序组织成函数和模块。\n- 你可以理解外部的 Python 脚本，根据需要调整它们，并将其集成到你的程序代码中。\n\
    - 你知道如何使用 NumPy 进行快速的 Python 数值计算，并可以使用 SciPy 实现科学应用的特殊函数。\n- 你可以使用 Matplotlib\
    \ 创建科学图表和图形。\n\n## 延伸阅读\n\n有许多值得阅读的 Python 文献。除了各个 Python、NumPy、SciPy、Matplotlib\
    \ 和 pandas 项目的在线资源外，以下著作也值得推荐。\n\n1. Langtangen, Hans Petter. 2016. *A Primer\
    \ on Scientific Programming with Python*. Berlin, Heidelberg: Springer.\n2. Nelli,\
    \ Fabio. 2018. *Python Data Analytics with Pandas, Numpy, and Matplotlib*. New\
    \ York City: Apress.\n3. Johansson, Robert. 2018. *Numerical Python: Scientific\
    \ computing and data science applications with NumPy, SciPy and Matplotlib*. New\
    \ York City: Apress.\n4. Newman, Mark. 2012. *Computational physics*. Scotts Valley:\
    \ CreateSpace Independent Publishing Platform."
