  md: '# Functions


    A function in Python is a kind of routine or procedure that performs a certain
    task. A function may need function arguments, which are passed to the function
    when it is called. In addition, a function can also have return values. For example,
    the return value of the `sin` function from the `math` module is the sine of the
    function argument with which the function is called.


    # 7.1 Built-in Functions


    Python has some built-in functions that are available in every Python program.
    We have already learned about the `id()` and `type()` functions. Other functions
    like `str()` are used for type conversion between different objects. The number
    of built-in functions varies depending on the Python version and currently (version
    3.7) is 69. Table 7.1 lists the most important ones.


    # 7.2 Declaration of Functions


    Functions are declared with the keyword `def` followed by the unique function
    name:


    ```

    1 def functionname(arguments):

    2     # indented code block

    3     #

    4     return # optional return statement

    ```


    The function arguments are given in brackets. The function can optionally have
    a return value, which is specified with the keyword `return`. Unlike other programming
    languages such as C, a Python function can have multiple return values.'
