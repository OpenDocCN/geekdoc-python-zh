- md: "## 8.1 Structuring the Code with Own Modules\n\nInteresting are modules to\
    \ structure your own code: We can outsource functions into modules and thus easily\
    \ reuse them in other scripts and programs. To do this, we have to write our function\
    \ in a separate file and make sure that Python finds it. By default, Python searches\
    \ in the current directory, in the directories of `sys.path` and in the directories\
    \ stored in the environment variable `PYTHONPATH`. In the following example we\
    \ outsource the function for calculating the density to our own module `physics_tools`:\
    \ The file `physics_tools.py` contains the following lines\n\n```python\n\"\"\"\
    \ Module with physics tools\"\"\"\nimport math\n\n# Calculation of the density\
    \ of a spherical homogeneous mass\n# distribution of the mass mass and radius\
