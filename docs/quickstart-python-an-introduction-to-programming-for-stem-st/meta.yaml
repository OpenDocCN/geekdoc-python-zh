  - "[PAGE 49]\n\n```\n1 #!/usr/bin/env python\n2 # -*- coding: utf-8 -*-\n3 import\
    \ os\n4 \n5 def find_file(fn, path):\n6     for root, dirs, files in os.walk(path):\n\
    7         for name in files:\n8             if name == fn:\n9                \
    \ return os.path.join(root,name)\n10 \n11     return None\n12 \n13 filename =\
    \ \"important.data\"  # Requested file name\n14 rootPath = \"/data/\"  # Initial\
    \ directory at which the search starts\n15 \n16 foundfile = find_file(filename,\
    \ rootPath) # Calling the function\n17 \n18 if foundfile != None:   # Print if\
    \ found\n19     print(\"Found the file: %s\" % foundfile)\n```\n\n# Module re\n\
    \nThe re module (for regular expressions, usually abbreviated as regex) provides\
    \ the methods and functions in Python for working with regular expressions. A\
    \ regular expression is a term from theoretical computer science and in principle\
    \ a string representing several elements of a set described by certain syntactical\
    \ rules. In programming practice, regular expressions are mostly used to define\
    \ certain string patterns for searching or filtering. In connection with Big Data,\
    \ regex are used to filter data.\n\n# Module sys\n\nThe sys module provides functions\
    \ and variables related to or allowing interaction with the Python interpreter.\
    \ The default use of the module is to access the command line parameters using\
    \ sys.argv. Furthermore, information about system properties can be retrieved\
    \ via the module: For example, all loaded modules are stored in sys.modules, the\
    \ path searched for modules is stored in sys.path, and the float_info object contains\
    \ information about floating point numbers such as the largest number that can\
    \ be displayed and the machine accuracy\n\n```\n1 >>> import sys\n2 >>> print(sys.float_info)\n\
    3 sys.float_info(max=1.7976931348623157e+308, max_exp=1024, max_10_exp=308, min=2.2250738585072014e-308,\
    \ min_exp=-1021, min_10_exp=-307, dig=15, mant_dig=53, epsilon=2.220446049250313e-16,\
    \ radix=2, rounds=1)\n```"
- md: "## Extensions for Scientists: NumPy, SciPy, Matplotlib, Pandas\n\nIn this chapter,\
    \ we want to explain the most important modules for all scientists. A detailed\
    \ description, however, would go beyond the scope of this *essential*. We look\
    \ at some illustrative examples and the basic ideas of the individual modules.\n\
    \n## 9.1 Fast Numerical Calculations with Python: NumPy\n\nThe `numpy` module\
    \ is the most helpful extension for scientists in Python. NumPy was created in\
    \ 2005 from the unification of two different Python modules for the fast calculation\
    \ of numerical data. The most important innovation is the introduction of the\
    \ data structure `numpy.array`. NumPy functions are specially optimized for this\
    \ new data structure and enable Python scripts with runtimes in the order of magnitude\
    \ of equivalent C and Fortran programs. You can think of a `numpy.array` as a\
    \ Python list with elements of the same type. Because the interpreter knows the\
    \ size of the elements, it can optimize better than compared to the more generic\
    \ Python lists. The functions implemented in `numpy` operate on this new data\
    \ structure and can perform vectorial operations. This leads to the far-reaching\
    \ reduction of the runtime.\n\nNumPy also offers many functions that make working\
    \ with arrays much easier. One example is the function `numpy.linspace`. It creates\
    \ a NumPy array with elements equidistantly distributed over a certain interval.\
    \ The function `np.sin` then calculates all function values of the elements in\
    \ this NumPy array and not only of one element like the comparable function `math.sin`\
    \ from the `math` module as in the following example\n\n```\n>>> import numpy\
    \ as np\n>>> x = np.linspace(0, 10, 100)\n>>> print(x)\n[ 0.          0.1010101\
    \   0.2020202   0.3030303   0.4040404   0.50505051\n  (...)\n  9.6969697   9.7979798\
    \   9.8989899  10.        ]\n>>> print(x+1.0) # Add 1.0 to each element\n[ 1.\
    \          1.1010101   1.2020202   1.3030303   1.4040404   1.50505051\n  (...)\n\
    \ 10.6969697  10.7979798  10.8989899  11.        ]\n>>> print(np.sin(x))\n[ 0.\
    \          0.10083842  0.20064886  0.2984138   0.39313661  0.48385164\n  (...)\n\
    \ -0.26884313 -0.36459873 -0.45663749 -0.54402111]\n>>> import math\n>>> print(math.sin(x))\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    TypeError: only size-1 arrays can be converted to Python scalars\n```\n\nWe have\
    \ thus saved one for loop. The handling of multidimensional arrays is the basis\
    \ for working with NumPy. The main differences between a Python list and a NumPy\
    \ array are as follows\n\n- The elements of a numpy.array are all of the same\
    \ type.\n- The size of a numpy.array is fixed.\n- Slicing a numpy.array only creates\
    \ a so-called view and still accesses the original data, which can be accidentally\
    \ changed. Slicing a list or a tuple, however, creates a new object. See the differences\
    \ between deep and shallow copy in Sect. 5.2.\n- The memory requirement of a numpy.array\
    \ is usually significantly smaller than that of a list with the same number of\
    \ elements.\n\nSince the size of a numpy.array is determined at build time, it\
    \ is often more efficient to first create a list of the later elements from which\
    \ a numpy.array is generated than to add elements to an existing numpy.array:\n\
    \n```\n>>> import numpy as np\n>>> a = np.array([0,1])  # a is a numpy array\n\
    >>> id(a)\n4514354960\n>>> a = np.append(a, [2]) # Creates new object a\n>>> id(a)\n\
    4391813248\n>>> print(a)\n[0 1 2]\n>>> a = [0,1]  # a is a Python list\n>>> id(a)\n\
    4515856968\n>>> a.append(2)  # a remains the same object\n>>> id(a)\n4515856968\n\
    >>> print(a)\n[0, 1, 2]\n```\n\nIn the first case when using numpy.arrays, the\
    \ interpreter must create a new object and delete the old one. This is significantly\
    \ slower than using a regular list to which an element can be added.\n\nThe already\
    \ mentioned functions linspace(start, stop, num=50, endpoint=True, retstep=False,\
    \ dtype=None) can be used to create 1D numpy.arrays. Besides there are also the\
    \ functions logspace(start, stop, num=50, endpoint=True, base=10.0, dtype=None)\
    \ and arange([start,] stop[, step,], dtype=None)\n\n```\n>>> np.arange(-5,5,0.1)\
    \ # Creates a numpy.array with values from -5 to 5 (exclusive) in equal steps\
    \ of 0.1\narray([-5.00000000e+00, -4.90000000e+00, -4.80000000e+00, -4.70000000e+00,\n\
    \       (...)\n       4.60000000e+00,  4.70000000e+00,  4.80000000e+00,  4.90000000e+00])\n\
    ```\n\n```\n>>> np.linspace(-5,5,10) # Creates a numpy.array with 10 linear increasing\
    \ values between -5 and 5 (inclusive)\narray([-5.        , -3.88888889, -2.77777778,\
    \ -1.66666667, -0.55555556,\n        0.55555556,  1.66666667,  2.77777778,  3.88888889,\
    \  5.        ])\n>>> np.linspace(-5,5,10,endpoint=False) # Create a numpy.array\
    \ with 10 linear increasing values between -5 and 5 (exclusive)\narray([-5., -4.,\
    \ -3., -2., -1.,  0.,  1.,  2.,  3.,  4.])\n```\n\nMultidimensional NumPy arrays\
    \ (numpy.ndarray) can be created in NumPy in different ways. The size, the shape,\
    \ the number of elements can be requested from the object\n\n```\n>>> x = np.array([[1.,\
    \ 2], [3., 4]]) # create 2x2 matrix/array\n>>> type(x)\n<class 'numpy.ndarray'>\n\
    >>> print(x)\n[[1. 2.]\n [3. 4.]]\n>>> print(x.shape) # the shape of the array\n\
    (2,2)\n>>> print(x.size) # Number of elements\n4\n>>> print(x.T) # The transposed\
    \ of the array\n[[1. 3.]\n [2. 4.]]\n>>> print(2*x) # Double each element\n[[2.\
    \ 4.]\n [6. 8.]]\n```\n\nand the shape of the numpy.arrays can be changed\n\n\
    ```\n>>> x = np.arange(9) # Create a onedimensional array with elements 1 to 9\n\
    >>> x = x.reshape(3,3) # Generate 3x3 matrix from x\n```\n\nTo access the individual\
    \ elements, we use the same syntax as for lists and tuples\n\n```\n>>> print(x[1])\
    \ # Print the second line\n[3 4 5]\n>>> print(x[1][2]) # Print the last element\
    \ of the second line\n5\n>>> print(x[1,2]) # print the last element of the second\
    \ line, preferred syntax\n5\n```\n\nThe last two lines are especially interesting:\
    \ Both x[1][2] and x[1,2] return the same element. However, the latter syntax\
    \ should be preferred to the first one, since the Python interpreter creates a\
    \ temporary intermediate object x[1] in the first variant, from which the third\
    \ element is then returned. Basically the following happens\n\n```\n>>> tmp =\
    \ x[1]\n>>> print(tmp[2])\n5\n```\n\nwhich in turn requires more memory and computing\
    \ time than referencing with x[1,2].\n\n```\n>>> np.lookfor('fourier')\nSearch\
    \ results for 'fourier'\n--------------------------------\nnumpy.fft.fft\n   \
    \ Compute the one-dimensional discrete Fourier Transform.\nnumpy.fft.fft2\n  \
    \  Compute the 2-dimensional discrete Fourier Transform\n(...)\nnumpy.fft.irfft\n\
    \    Compute the inverse of the n-point DFT for real input.\nnumpy.fft.rfft2\n\
    \    Compute the 2-dimensional FFT of a real array.\nnumpy.fft.irfftn\n    Compute\
    \ the inverse of the N-dimensional FFT of real input.\n```\n\nTo find more functions,\
    \ NumPy's own search function is helpful. With the function lookfor the NumPy\
    \ help can be searched. If you want to perform a Fourier transformation, you can\
    \ search for it specifically\n\n```\n#!/usr/bin/env python\n# -*- coding: utf-8\
    \ -*-\nimport numpy as np\nimport scipy.optimize\nimport matplotlib.pyplot as\
    \ plt\n\ndef f(t, omega, phi):\n    return np.cos(omega * t + phi)\n\nx = np.linspace(0,\
    \ 3, 50)\ny = f(x, 1.5, 1) + .1*np.random.normal(size=50)\n\n# curve_fit returns\
    \ the fit values for f\nfits, pcov = scipy.optimize.curve_fit(f, x, y)\n\nplt.scatter(x,\
    \ y) # Plot of the artificial data\nplt.plot(x, f(x, *fits), c='r') # Plot of\
    \ the fitted function\nplt.xlabel('x')\nplt.ylabel('y')\nplt.savefig(\"fit.png\"\
    )\n```\n\nIt is advisable for every NumPy beginner to work through the basic principles\
    \ and the tutorial on the central website for NumPy.\n\nPython alone also knows\
    \ the data type array, which is provided by the module array. However, it is no\
    \ longer used in practice. Usually, a NumPy array is meant when talking about\
    \ an array.\n\nIn the next section, we will look at the module SciPy, which extends\
    \ NumPy by many mathematical functions."
  mdcn: "## 面向科学家的扩展：NumPy、SciPy、Matplotlib、Pandas\n\n在本章中，我们将为所有科学家介绍最重要的模块。然而，详细的描述将超出本*基础*的范围。我们将通过一些示例和各个模块的基本概念来进行说明。\n\
    \n## 9.1 使用Python进行快速数值计算：NumPy\n\n`numpy`模块是Python中对科学家最有用的扩展。NumPy诞生于2005年，它统一了两个用于快速计算数值数据的不同Python模块。最重要的创新是引入了`numpy.array`数据结构。NumPy函数针对这种新数据结构进行了专门优化，使得Python脚本的运行时间能够达到与等效的C和Fortran程序相当的数量级。你可以将`numpy.array`想象成一个元素类型相同的Python列表。因为解释器知道元素的大小，所以它能比更通用的Python列表进行更好的优化。`numpy`中实现的函数操作这种新数据结构，并能执行向量运算。这极大地减少了运行时间。\n\
    \nNumPy还提供了许多使数组操作更简单的函数。一个例子是`numpy.linspace`函数。它创建一个NumPy数组，其中的元素在某个区间内等距分布。然后，`np.sin`函数计算该NumPy数组中所有元素的函数值，而不仅仅是像`math`模块中类似的`math.sin`函数那样只计算一个元素的值，如下例所示：\n\
    \n```\n>>> import numpy as np\n>>> x = np.linspace(0, 10, 100)\n>>> print(x)\n\
    [ 0.          0.1010101   0.2020202   0.3030303   0.4040404   0.50505051\n  (...)\n\
    \  9.6969697   9.7979798   9.8989899  10.        ]\n>>> print(x+1.0) # 将每个元素加1.0\n\
    [ 1.          1.1010101   1.2020202   1.3030303   1.4040404   1.50505051\n  (...)\n\
    \ 10.6969697  10.7979798  10.8989899  11.        ]\n>>> print(np.sin(x))\n[ 0.\
    \          0.10083842  0.20064886  0.2984138   0.39313661  0.48385164\n  (...)\n\
    \ -0.26884313 -0.36459873 -0.45663749 -0.54402111]\n>>> import math\n>>> print(math.sin(x))\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    TypeError: only size-1 arrays can be converted to Python scalars\n```\n\n因此，我们节省了一个`for`循环。多维数组的处理是使用NumPy的基础。Python列表和NumPy数组之间的主要区别如下：\n\
    \n-   `numpy.array`的元素都是相同类型。\n-   `numpy.array`的大小是固定的。\n-   对`numpy.array`进行切片只创建一个所谓的视图，仍然访问原始数据，这可能会被意外修改。然而，对列表或元组进行切片会创建一个新对象。参见第5.2节中深拷贝和浅拷贝的区别。\n\
    -   `numpy.array`的内存需求通常比具有相同元素数量的列表小得多。\n\n由于`numpy.array`的大小在构建时确定，通常更高效的做法是先创建一个包含后续元素的列表，然后从中生成`numpy.array`，而不是向现有的`numpy.array`添加元素：\n\
    \n```\n>>> import numpy as np\n>>> a = np.array([0,1])  # a是一个numpy数组\n>>> id(a)\n\
    4514354960\n>>> a = np.append(a, [2]) # 创建新对象a\n>>> id(a)\n4391813248\n>>> print(a)\n\
    [0 1 2]\n>>> a = [0,1]  # a是一个Python列表\n>>> id(a)\n4515856968\n>>> a.append(2)\
    \  # a仍然是同一个对象\n>>> id(a)\n4515856968\n>>> print(a)\n[0, 1, 2]\n```\n\n在第一种使用`numpy.arrays`的情况下，解释器必须创建一个新对象并删除旧对象。这比使用常规列表（可以向其添加元素）要慢得多。\n\
    \n前面提到的函数`linspace(start, stop, num=50, endpoint=True, retstep=False, dtype=None)`可用于创建一维`numpy.arrays`。此外，还有函数`logspace(start,\
    \ stop, num=50, endpoint=True, base=10.0, dtype=None)`和`arange([start,] stop[,\
    \ step,], dtype=None)`\n\n```\n>>> np.arange(-5,5,0.1) # 创建一个numpy.array，值从-5到5（不包括），步长为0.1\n\
    array([-5.00000000e+00, -4.90000000e+00, -4.80000000e+00, -4.70000000e+00,\n \
    \      (...)\n       4.60000000e+00,  4.70000000e+00,  4.80000000e+00,  4.90000000e+00])\n\
    ```\n\n```\n>>> np.linspace(-5,5,10) # 创建一个numpy.array，包含10个在-5和5之间（包括）线性递增的值\n\
    array([-5.        , -3.88888889, -2.77777778, -1.66666667, -0.55555556,\n    \
    \    0.55555556,  1.66666667,  2.77777778,  3.88888889,  5.        ])\n>>> np.linspace(-5,5,10,endpoint=False)\
    \ # 创建一个numpy.array，包含10个在-5和5之间（不包括）线性递增的值\narray([-5., -4., -3., -2., -1., \
    \ 0.,  1.,  2.,  3.,  4.])\n```\n\n多维NumPy数组（`numpy.ndarray`）可以通过不同的方式在NumPy中创建。可以从对象获取大小、形状、元素数量\n\
    \n```\n>>> x = np.array([[1., 2], [3., 4]]) # 创建2x2矩阵/数组\n>>> type(x)\n<class\
    \ 'numpy.ndarray'>\n>>> print(x)\n[[1. 2.]\n [3. 4.]]\n>>> print(x.shape) # 数组的形状\n\
    (2,2)\n>>> print(x.size) # 元素数量\n4\n>>> print(x.T) # 数组的转置\n[[1. 3.]\n [2. 4.]]\n\
    >>> print(2*x) # 将每个元素乘以2\n[[2. 4.]\n [6. 8.]]\n```\n\n并且可以改变`numpy.arrays`的形状\n\
    \n```\n>>> x = np.arange(9) # 创建一个一维数组，元素为1到9\n>>> x = x.reshape(3,3) # 从x生成3x3矩阵\n\
    ```\n\n要访问单个元素，我们使用与列表和元组相同的语法\n\n```\n>>> print(x[1]) # 打印第二行\n[3 4 5]\n>>> print(x[1][2])\
    \ # 打印第二行的最后一个元素\n5\n>>> print(x[1,2]) # 打印第二行的最后一个元素，首选语法\n5\n```\n\n最后两行特别有趣：`x[1][2]`和`x[1,2]`都返回相同的元素。然而，后者语法应优先于前者，因为在第一种变体中，Python解释器会创建一个临时中间对象`x[1]`，然后从中返回第三个元素。基本上发生了以下情况：\n\
    \n```\n>>> tmp = x[1]\n>>> print(tmp[2])\n5\n```\n\n这反过来又比使用`x[1,2]`引用需要更多的内存和计算时间。\n\
    \n```\n>>> np.lookfor('fourier')\nSearch results for 'fourier'\n--------------------------------\n\
    numpy.fft.fft\n    Compute the one-dimensional discrete Fourier Transform.\nnumpy.fft.fft2\n\
    \    Compute the 2-dimensional discrete Fourier Transform\n(...)\nnumpy.fft.irfft\n\
    \    Compute the inverse of the n-point DFT for real input.\nnumpy.fft.rfft2\n\
    \    Compute the 2-dimensional FFT of a real array.\nnumpy.fft.irfftn\n    Compute\
    \ the inverse of the N-dimensional FFT of real input.\n```\n\n要查找更多函数，NumPy自身的搜索函数很有帮助。使用`lookfor`函数可以搜索NumPy帮助。如果你想执行傅里叶变换，可以专门搜索它\n\
    \n```\n#!/usr/bin/env python\n# -*- coding: utf-8 -*-\nimport numpy as np\nimport\
    \ scipy.optimize\nimport matplotlib.pyplot as plt\n\ndef f(t, omega, phi):\n \
    \   return np.cos(omega * t + phi)\n\nx = np.linspace(0, 3, 50)\ny = f(x, 1.5,\
    \ 1) + .1*np.random.normal(size=50)\n\n# curve_fit返回f的拟合值\nfits, pcov = scipy.optimize.curve_fit(f,\
    \ x, y)\n\nplt.scatter(x, y) # 绘制人工数据\nplt.plot(x, f(x, *fits), c='r') # 绘制拟合函数\n\
    plt.xlabel('x')\nplt.ylabel('y')\nplt.savefig(\"fit.png\")\n```\n\n建议每位NumPy初学者都学习NumPy中心网站上的基本原理和教程。\n\
    \nPython本身也了解由`array`模块提供的数据类型`array`。然而，它在实践中已不再使用。通常，当谈论数组时，指的是NumPy数组。\n\n\
    在下一节中，我们将介绍SciPy模块，它扩展了NumPy的许多数学函数。"
