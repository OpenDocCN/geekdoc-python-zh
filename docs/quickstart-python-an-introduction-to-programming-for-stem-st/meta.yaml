    Larger programs are always structured in modules.\n\n## 8.2 Some Important Modules\
    \ and What to Do with Them: Math os re sys\n\nIn this section we look at the most\
    \ popular modules of the Python standard library and explain their functionality.\n\
    \n### Modules math and cmath\n\nThe `math` module, which we already got to know\
    \ in the last section, provides the most important mathematical functions. Since\
    \ these functions are essentially wrapper functions to the respective C-function\
    \ of the operating system, the speed of the calculations is considerable and not\
    \ much slower than in C or Fortran. Trigonometric functions (`sin`, `cos`, `tan`,\
    \ `asin`, `acos`, `atan`, `atan2`), hyperbolic functions (`asinh`, `acosh`, `atanh`,\
    \ `sinh`, `cosh`, `tanh`), and exponential and logarithmic functions (`exp`, `log`,\
    \ `log2`, `log10`, `pow`, `sqrt`) are available. Furthermore, the usual mathematical\
    \ constants such as Pi, the Euler number e and Tau (`pi`, `e`, `tau`) are defined\
    \ in the module. Some new functions have been added to the math module since Python\
    \ 3 and are listed in Table 8.1.\n\nIf the function arguments are elements of\
    \ complex numbers, the functions of the `cmath` module are used. As soon as the\
    \ Python module NumPy is used, the standard math module is left out because the\
    \ `numpy` module implements its own math functions that accept NumPy arrays as\
    \ arguments.\n\n### Module os\n\nThe `os` (operating system) module is the interface\
    \ for calling operating system functions. This module is indispensable for projects\
    \ that are to be used on more than one platform such as Windows and macOS. Access\
    \ to files at the file system level is completely abstracted by this module and\
    \ you can, for example, copy, delete, or change file names without using the respective\
    \ different operating system commands. This module is certainly one of the most\
    \ important for system engineers. Some of the basic functions are listed in Table\
    \ 8.2. As an illustrative example of the module's powerful functionality, let\
    \ us look at the following script that is used to search for a file. As an argument\
    \ of the function the top directory is specified (`/data`) and the script searches\
    \ all subdirectories until the file with the name `important.data` is found. Finally,\
    \ the script outputs the path to the found file. The script ends as soon as a\
    \ file with the name you are looking for is found. You can modify the script as\
    \ an exercise to find all files with that name.\n\nTable 8.1 Newer (> Python 3)\
    \ functions in the math module\n\n| Function | Return value |\n| :--- | :--- |\n\
    | `erf(x)` | Returns the function value of the error function. New since 3.2 |\n\
    | `gamma(x)` | Returns the function value of the gamma function. New since 3.2\
    \ |\n| `gcd(i, j)` | Returns the smallest common divisor of the integer numbers\
    \ `i` and `j`. New since 3.5 |\n| `isclose(x, y, *, rel_tol = 1e-09, abs_tol =\
    \ 0.0)` | Returns `True` if the two values `x` and `y` are close together, otherwise\
    \ `False`. Where `rel_tol` is the maximum distance between `x` and `y` relative\
    \ to the greater absolute value of `x` and `y`. This function is very useful when\
    \ comparing floating point numbers. New since 3.5 |\n| `log2(x)` | Returns the\
    \ function value of the binary logarithm. New since 3.3 |\n| `remainder(x, y)`\
    \ | Returns the residual value of division `x/y`. New since 3.7 |\n\nTable 8.2\
    \ Objects in the `os` module\n\n| Function/Object | Return value |\n| :--- | :---\
    \ |\n| `chdir()` | Changes the current path to the function argument |\n| `getcwd()`\
    \ | Returns the current working directory |\n| `getenv(key)` | Returns the value\
    \ of the environment variable `key` |\n| `getpid()` | Returns the value of the\
    \ process ID of the running process |\n| `mkdir(path)` | Creates a directory with\
    \ the name `path` |\n| `name` | Contains the name of the operating system (Linux\
    \ and macOS supplies `posix`, Windows `nt`) |\n| `turkey(key, value)` | Sets the\
    \ value of the environment variable `key` to `value` |\n| `remove(path)` | Deletes\
    \ the file `path` |\n| `rmdir(path)` | Deletes the empty directory `path` |\n\
    | `system(string)` | Executes the command `string` in a subshell. For more information,\
    \ see the module `subprocess` |\n| `walk(dir)` | Creates a generator for filenames\
    \ from tuples of three (`dirpath`, `dirnames`, `filenames`), traversing the directory\
    \ tree that is under `dir`. See the example in the text |\n\n```python\n#!/usr/bin/env\
    \ python\n# -*- coding: utf-8 -*-\nimport os\n\ndef find_file(fn, path):\n   \
    \ for root, dirs, files in os.walk(path):\n        for name in files:\n      \
    \      if name == fn:\n                return os.path.join(root,name)\n\n    return\
    \ None\n\nfilename = \"important.data\"  # Requested file name\nrootPath = \"\
    /data/\"  # Initial directory at which the search starts\n\nfoundfile = find_file(filename,\
    \ rootPath) # Calling the function\n\nif foundfile != None:   # Print if found\n\
    \    print(\"Found the file: %s\" % foundfile)\n```\n\n### Module re\n\nThe re\
    \ module (for regular expressions, usually abbreviated as regex) provides the\
    \ methods and functions in Python for working with regular expressions. A regular\
    \ expression is a term from theoretical computer science and in principle a string\
    \ representing several elements of a set described by certain syntactical rules.\
    \ In programming practice, regular expressions are mostly used to define certain\
    \ string patterns for searching or filtering. In connection with Big Data, regex\
    \ are used to filter data.\n\n### Module sys\n\nThe sys module provides functions\
    \ and variables related to or allowing interaction with the Python interpreter.\
    \ The default use of the module is to access the command line parameters using\
    \ sys.argv. Furthermore, information about system properties can be retrieved\
    \ via the module: For example, all loaded modules are stored in sys.modules, the\
    \ path searched for modules is stored in sys.path, and the float_info object contains\
    \ information about floating point numbers such as the largest number that can\
    \ be displayed and the machine accuracy\n\n```python\n>>> import sys\n>>> print(sys.float_info)\n\
    sys.float_info(max=1.7976931348623157e+308, max_exp=1024, max_10_exp=308, min=2.2250738585072014e-308,\
    \ min_exp=-1021, min_10_exp=-307, dig=15, mant_dig=53, epsilon=2.220446049250313e-16,\
    \ radix=2, rounds=1)\n```"
  mdcn: "## 8.1 使用自定义模块组织代码\n\n模块对于组织自己的代码非常有用：我们可以将函数外包到模块中，从而轻松地在其他脚本和程序中重用它们。为此，我们需要将函数写在一个单独的文件中，并确保Python能找到它。默认情况下，Python会在当前目录、`sys.path`中的目录以及环境变量`PYTHONPATH`中存储的目录中进行搜索。在下面的例子中，我们将计算密度的函数外包到我们自己的模块`physics_tools`中：文件`physics_tools.py`包含以下几行\n\
