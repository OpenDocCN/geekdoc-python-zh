    shallow copy, which we get with the copy() function.


    ```

    1 >>> some_galaxies = [''milky way'', ''andromeda'', ''m82'']

    2 >>> sg = some_galaxies.copy() # Create a new object sg with the content of some_galaxies

    3 >>> sg.remove(''m82'') # Remove m82 from the list sg

