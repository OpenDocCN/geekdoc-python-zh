    >>> type(c)\n<class 'complex'>\n>>> c2 = 2 + 3j\n>>> c + c2\n(3+5j)\n```\n\nTable\
    \ 5.2 Numerical data types and their value range\n\n| Object | Accuracy and value\
    \ range |\n| :--- | :--- |\n| int | Value range not limited |\n| float | 64 bit\
    \ double-precision, according to IEEE 754 standard |\n| bool | true and false\
    \ |\n| complex | Complex numbers with the real and imaginary part |\n\nFurthermore,\
    \ Python provides the class `bool`, whose value range is given by False or True.\n\
    \n```\n>>> var = True\n>>> type(var)\n<class 'bool'>\n```\n\nEspecially for conditional\
    \ statements it is important to know what is `True` or `False` in Python. The\
    \ following expressions are interpreted as false in Python: The value `False`,\
    \ the special value `None`, an empty string, an empty list, an empty dictionary,\
    \ an empty tuple, and explicit numerical null values such as 0, 0.0. In contrast,\
    \ everything that is not `False` is `True` in Python, especially the non-empty\
    \ string \"0\" as opposed to the numerical value 0\n\n```\n>>> var = '0'\n>>>\
    \ type(var)\n<class 'str'>\n>>> if (var): print(\"True value\", var)\nTrue Value\
    \ 0\n```\n\nThe value ranges of the numerical data types are listed in Table 5.2.\n\
    \n## 5.2 Sequential Data Types\n\nBy sequential data types, we mean types that\
    \ contain several elements. These include lists, tuples, and strings. NumPy extends\
    \ this list by the extremely useful datatype `numpy.array`, which we will discuss\
    \ in detail later. The most versatile sequential data type is the `list`: A list\
    \ can contain elements of different data types and can be changed after its creation\
    \ (`mutable`). An element of a list can itself be a list. The list is the most\
    \ powerful sequential data type, and Python allows many operations and methods\
    \ on lists. The most important operators for sequential data types are listed\
    \ in Table 5.3. Often the advantages of lists are not needed and more attention\
    \ must be paid to speed or memory requirements.\n\nTable 5.3 The most important\
    \ operations for sequential data types\n\n| Syntax | Operation |\n|---|---|\n\
    | a[i] | Returns ith element of sequence a |\n| a[i:j] | Returns the range ith\
    \ to (j-1)th element of sequence a |\n| a[i:j:k] | Returns the range ith to (j-1)th\
    \ element in steps of k from sequence a |\n| a+b | Concatenation of a and b, return\
    \ is a new data sequence |\n| a+=b | Add b to a |\n| n*a | Creates new data sequence\
    \ with n-fold content |\n| e in a | Checks if e is contained in a, return value\
    \ True or False |\n| e not in a | Checks if e is not contained in a, return value\
    \ True or False |\n\nIn these cases, tuples are used instead of lists. In contrast\
    \ to lists, the sequential datatype tuple (tuple) is not changeable (immutable)\
    \ after it has been created. It is important to understand that although the tuple\
    \ can no longer be changed, if an element of a tuple is a list, the elements of\
    \ this list can change again. In other words, the elements of a tuple are references\
    \ that can no longer be changed, but if the reference points to a mutable object,\
    \ then the object can change and so can the element in the tuple. The following\
    \ example illustrates this\n\n```\n>>> b = []          # Create empty list b\n\
    >>> a = (1,2,b)     # Create tuple a with elements 1, 2 and b\n>>> type(a)\n<class\
    \ 'tuple'>\n>>> type(b)\n<class 'list'>\n>>> a\n(1, 2, [])\n>>> b.append(10) #\
    \ Append 10 to list b an\n>>> b\n[10]\n>>> a\n(1, 2, [10])      # a[2]has changed\n\
    ```\n\nThe so-called slicing, with which you can address areas of sequential data\
    \ types, allows you to work with lists (and also tuples) quickly and conveniently.\
    \ First, we create a list of planets in our solar system as the sum of the two\
    \ lists inner_planets and outer_planets\n\n```\n>>> inner_planets = ['Mercury',\
    \ 'Venus', 'Earth', 'Mars']\n>>> outer_planets = ['Jupiter', 'Saturn', 'Uranus',\
    \ 'Neptune', 'Pluto']\n>>> solar_system = inner_planets + outer_planets\n>>> print(solar_system)\n\
    ['Mercury', 'Venus', 'Earth', 'Mars', 'Jupiter', 'Saturn', 'Uranus', 'Neptune',\
    \ 'Pluto']\n>>> solar_system[0:4]    # The first four planets\n['Mercury', 'Venus',\
    \ 'Earth', 'Mars']\n>>> 'Pluto' in solar_system    # Is Pluto a planet?\nTrue\n\
    ```\n\nWe can invert the list or just output every other planet\n\n```\n>>> solar_system[::-1]\
    \    # Print the list backward\n['Neptune', 'Uranus', 'Saturn', 'Jupiter', 'Mars',\
    \ 'Earth', 'Venus', 'Mercury']\n>>> solar_system[::2]    # Print only every second\
    \ element of the list\n['Mercury', 'Earth', 'Jupiter', 'Uranus']\n```\n\nSince\
    \ we obviously made a mistake and Pluto is no longer a planet, we create a new\
    \ list without the last element\n\n```\n>>> solar_system = solar_system[:-1] #\
    \ Create new list without last Element\n>>> 'Pluto' in solar_system    # Is Pluto\
    \ a planet?\nFalse\n```\n\nThis generates a new list (with a new id). Alternatively,\
    \ we can use a method of the list to remove an element\n\n```\n>>> solar_system\
    \ = inner_planets + outer_planets\n>>> solar_system.remove('Pluto')\n>>> print(solar_system)\n\
    ['Mercury', 'Venus', 'Earth', 'Mars', 'Jupiter', 'Saturn', 'Uranus', 'Neptune']\n\
    ```\n\nThe advantage of this version is that no new list is created, only one\
    \ element is removed from the list, which is much faster than creating a completely\
    \ new list with one element less. If we had chosen a tuple for our solar system\
    \ instead of a list, removing Pluto would not have been possible because the tuple\
    \ object does not provide a method for removing elements\n\n```\n>>> solar_system\
    \ = ('Mercury', 'Venus', 'Earth', 'Mars', 'Jupiter', 'Saturn', 'Uranus', 'Neptune',\
    \ 'Pluto')\n>>> print(solar_system)\n('Mercury', 'Venus', 'Earth', 'Mars', 'Jupiter',\
    \ 'Saturn', 'Uranus', 'Neptune', 'Pluto')\n>>> solar_system.remove('Pluto')\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
