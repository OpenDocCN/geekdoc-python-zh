    # 5.2 Sequential Data Types


    This means that the list copied by `shallow copy` is a copy and not a reference,
    but the elements of this list are still references and no copies. To actually
    get real copies and no references in the list elements, we must perform a so-called
    `deep copy`. Python provides the `copy` module for this.


    ```

    1 >>> import copy

    2 >>> old_solar_system = copy.deepcopy(solar_system)

    3 >>> old_solar_system[1] is solar_system[1]

    4 False

    5 >>> solar_system[1].remove(''Pluto'')  # remove Pluto from outer_planets

    6 >>> print(old_solar_system)          # old_solar_system remains untouched

    7 [[''Mercury'', ''Venus'', ''Earth'', ''Mars''], [''Jupiter'', ''Saturn'', ''Uranus'',
    ''Neptune'', ''Pluto'']]

    ```


    In practice, the phenomenon of forgetting a `shallow copy` and only creating references
    on assignments is much more common than problems for which a `deep copy` is needed.
    However, when working with lists, it is recommended to always consider whether
    you want to change values or references.


    Another sequential data type besides tuple and list is the string. The string
    is a special list whose elements are individual characters. Strings are enclosed
    in Python using single and double quotation marks. If the string is longer than
    one line, three double quotation marks must be used


    ```

    1 >>> planet1 = ''Earth''          # single quotes

    2 >>> planet2 = "Mars"           # double quotes

    3 >>> # string over several lines

    4 >>> very_long_string = """

    5 ... Earth

    6 ... Mars"""

    7 >>> print(planet1, planet2, very_long_string)

    8 Earth Mars

    9 Earth

    10 Mars

    11 >>> type(planet1)

    12 <class ''str''>

    ```


    Strings in Python are like tuples not changeable (immutable), single elements
    of a string can be accessed with square brackets like lists, but slicing can also
    be used


    ```

    1 >>> planet1[0] = ''D''

    2 Traceback (most recent call last):

    3   File "<stdin>", line 1, in <module>

    4 TypeError: ''str'' object does not support item assignment

    5 >>> print(planet1[0])

    6 E

    7 >>> print(planet1[0:3])

    8 Ear

    ```


    Strings can be easily joined together and even multiplied by integer values'
