    of 2D tables whose individual columns and rows can be processed like `series`
    objects. Finally, a `panel` is a 3D table whose individual levels are `dataframe`
    objects. The module offers special functions for working with time series data
    and their evaluation, that is, sorting functions and statistical functions. As
    soon as you come into contact with very large amounts of data, the use of this
    module could become interesting. You can find more information on the website
    of the pandas project.'
