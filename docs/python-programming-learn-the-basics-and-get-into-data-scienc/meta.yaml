    crucial in related fields such as Artificial Intelligence and data science that
    stands to reason that this would be a huge factor in the rapid growth of Python.
    There are many Python tools for analytics and data science such as Scikit-Learn,
    Theano and much more.


    ## Comparison with other languages


    Python is often compared to other interpreted languages such as Java, JavaScript,
    Perl, Tcl or Smalltalk. Comparisons to C++, Common Lisp and Scheme can also be
    enlightening. In practice, the choice of a programming language is often dictated
    by other real-world constraints such as cost, availability, training and prior
    investment or even emotional attachment.


    ## Python vs. Java


    Python programs are generally expected to run slower than Java programs, but they
    also take much less time to develop. Python programs are typically 3-5 times shorter
    than equivalent Java programs. This difference can be attributed to Python''s
    built-in high-level data types and its dynamic typing.


    For example, a Python programmer wastes no time declaring the types of arguments,
    variables or libraries and Python''s powerful polymorphic list and dictionary
    types for which rich syntactic support is built straight into the language, find
    a use in almost every Python program. Because of the run-time typing, Python''s
    run time must work harder than Java''s.


    For example, when evaluating some expression, it must first inspect the objects
    to find out their type, which is not known at compile time. It invokes the appropriate
    addition operation, which may be an overloaded user-defined method. Java, on the
    other hand, can perform an efficient integer or floating point addition, but requires
    variable declarations and does not allow overloading of the operator for instances
    of user-defined classes.


    For these reasons, Python is much better suited as a "glue" language, while Java
    is better characterized as a low-level implementation language. In fact, the two
    together make an excellent combination. Components can be developed in Java and
    combined to form applications in Python.


    Python can also be used to prototype components until their design can be "hardened"
    in a Java implementation. To support this type of development, a Python implementation
    written in Java is under development, which allows calling Python code from Java
    and vice versa. In this implementation, Python source code is translated to Java
    bytecode.


    ## Python vs. JavaScript


    Python is object-based subset and roughly equivalent to JavaScript. Like JavaScript,
    Python supports a programming style that uses simple functions and variables without
    engaging in class definitions. However, for JavaScript, that is all there is.


    Python, on the other hand, supports writing much larger programs and better code
    re-use through a true object-oriented programming style, where classes and inheritance
    play an important role.


    ## Python vs. Perl


    Python and Perl come from a similar background - Unix scripting, which both have
    long outgrown and share many similar features, but have a different philosophy.
    Perl emphasizes support for common application-oriented tasks, for example by
    having built-in regular expressions, file scanning and report generating features.


    Python emphasizes support for common programming methodologies such as data structure
    design and object-oriented programming and encourages programmers to write readable
    and maintainable code by providing an elegant, but not overly cryptic notation.
    As a consequence, Python comes close to Perl but beats it in its original application
    domain. However, Python is a well applied programming language beyond Perl''s
    niche.


    ## Python vs. Tcl


    Like the Python programming language, Tcl is usable as an application extension
    language, as well as a stand-alone programming language. Tcl programming language,
    which traditionally stores all data as strings, is weak on data structures and
    executes typical code much slower than Python.


    Tcl also lacks features needed for writing large programs, such as modular namespaces.
    While a typical large application using Tcl usually contains Tcl extensions written
    in C or C++ that are specific to that application, an equivalent Python application
    can often be written in "pure" Python. Of course, pure Python development is much
    quicker than having to write and debug a C or C++ component.


    Python has adopted an interface to Tkinter as its standard GUI component library.


    Tcl 8.0 addresses the speed issues by providing a bytecode compiler with limited
    data type support and adds namespaces. However, it is still a much more weird
    programming language.


    ## Python vs. Smalltalk'
