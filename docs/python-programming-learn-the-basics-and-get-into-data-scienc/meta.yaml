- md: 'Machine learning also has intimate ties to optimization. Many learning problems
    are formulated as minimization of some loss function on a training set of examples.
    Loss functions express the discrepancy between the predictions of the model being
    trained and the actual problem instances. For example, in classification, one
    wants to assign a label to instances and models are trained to correctly predict
    the pre-assigned labels of a set of examples. The difference between the two fields
    arises from the goal of generalization. While optimization algorithms can minimize
    the loss on a training set, machine learning is concerned with minimizing the
    loss on unseen samples.


    There are a lot of ways to simulate human intelligence, and some methods are more
    intelligent than others.


    Artificial Intelligence can be a pile of if-then statements or a complex statistical
    model mapping raw sensory data to symbolic categories. The if-then statements
    are simply rules explicitly programmed by a human hand. Taken together, these
    if-then statements are sometimes called rules engines, expert systems, knowledge
    graphs or symbolic AI. Collectively, these are known as Good, Old-Fashioned AI
    (GOFAI).


    Machine learning is a subset of AI. That is, all machine learning counts as AI,
    but not all AI counts as machine learning. For example, symbolic logic rules engines,
    expert systems and knowledge graphs – could all be described as AI, and none of
    them are machine learning.


    Deep learning is a subset of machine learning. Usually, when people use the term
    deep learning, they are referring to deep artificial neural networks, and somewhat
    less frequently to deep reinforcement learning.


    Deep artificial neural networks are a set of algorithms that have set new records
    in accuracy for many important problems, such as image recognition, sound recognition,
    recommender systems, natural language processing etc. For example, deep learning
    is part of DeepMind’s well-known AlphaGo algorithm, which beat the former world
    champion Lee Sedol at Go in early 2016, and the current world champion Ke Jie
    in early 2017.


    This means that AI is changing faster than its history can be written, so predictions
    about its future quickly become obsolete as well. Are we chasing a breakthrough
    like nuclear fission or are attempts to wring intelligence from silicon more like
    trying to turn lead into gold.


    Given that the power of AI progresses hand in hand with the power of computational
    hardware, advances in computational capacity, such as better chips or quantum
    computing, will set the stage for advances in AI. On a purely algorithmic level,
    most of the astonishing results produced by labs such as DeepMind come from combining
    different approaches to AI, much as AlphaGo combines deep learning and reinforcement
    learning. Combining deep learning with symbolic reasoning, analogical reasoning
    and evolutionary methods all show promise.


    ## Machine Learning Algorithms


    Machine learning algorithms are programs that can learn from data and improve
    from experience, without human intervention. Learning tasks may include learning
    the function that maps the input to the output, learning the hidden structure
    in unlabeled data or ‘instance-based learning’, where a class label is produced
    for a new instance by comparing the new instance to instances from the training
    data, which were stored in memory. ‘Instance-based learning’ does not create an
    abstraction from specific instances.


    There are 3 types of machine learning (ML) algorithms:


    - Supervised Learning Algorithms

    - Unsupervised Learning Algorithms

    - Reinforcement learning


    Supervised learning uses labeled training data to learn the mapping function that
    turns input variables (X) into the output variable (Y). In other words, it solves
    for f in the following example: Y = f (X)


    Classification is used to predict the outcome of a given sample when the output
    variable is in the form of categories. A classification model might look at the
    input data and try to predict labels like “sick” or “healthy.”


    Regression is used to predict the outcome of a given sample when the output variable
    is in the form of real values. For example, a regression model might process input
    data to predict the amount of rainfall, the height of a person, etc.


    Ensembling is another type of supervised learning. It means combining the predictions
    of multiple machine learning models that are individually weak to produce a more
    accurate prediction on a new sample. Bagging with Random Forests, Boosting with
    XGBoost are examples of ensemble techniques.


    Unsupervised learning models are used when we only have the input variables (X)
    and no corresponding output variables. They use unlabeled training data to model
    the underlying structure of the data.


    Association is used to discover the probability of the co-occurrence of items
    in a collection. It is extensively used in market-basket analysis. For example,
    an association model might be used to discover that if a customer purchases bread,
    he/she is 80% likely to also purchase eggs.


    Clustering is used to group samples such that objects within the same cluster
    are more similar to each other than to the objects from another cluster.


    Dimensionality Reduction is used to reduce the number of variables of a data set
    while ensuring that important information is still conveyed. Dimensionality Reduction
    can be done using Feature Extraction methods and Feature Selection methods. Feature
    Selection selects a subset of the original variables. Feature Extraction performs
    data transformation from a high-dimensional space to a low-dimensional space.
    Example: PCA algorithm is a Feature Extraction approach.


    Reinforcement learning is a type of machine learning algorithm that allows an
    agent to decide the best next action based on its current state by learning behaviors
    that will maximize a reward.


    Reinforcement algorithms usually learn optimal actions through trial and error.
    Imagine, for example, a video game in which the player needs to move to certain
    places at certain times to earn points. A reinforcement algorithm playing that
    game would start by moving randomly but, over time through trial and error, it
    would learn where and when it needed to move the in-game character to maximize
    its point total.


    The top 5 Machine Learning Algorithms for beginners are:


    ### 1. Linear Regression


    In machine learning, we have a set of input variables (x) that are used to determine
    an output variable (y). A relationship exists between the input variables and
    the output variable. The goal of ML is to quantify this relationship.


    In Linear Regression, the relationship between the input variables (x) and output
    variable (y) is expressed as an equation of the form y = a + bx. The goal of linear
    regression is to find out the values of coefficients a and b. Here, a is the intercept
    and b is the slope of the line.


    ![](img/9995f15bc3f1b0a432702ca81d107469_84_0.png)


    ### 2. Logistic Regression


    Linear regression predictions are continuous values, logistic regression predictions
    are discrete values after applying a transformation function. In logistic regression,
    the output takes the form of probabilities of the default class (unlike linear
    regression, where the output is directly produced). As it is a probability, the
    output lies in the range of 0-1. So, for example, if we’re trying to predict whether
    patients are sick, we already know that sick patients are denoted as 1, so if
    our algorithm assigns the score of 0.98 to a patient, it thinks that patient is
    quite likely to be sick.


    ### 3. CART


    Classification and Regression Trees (CART) are one implementation of Decision
    Trees.


    The non-terminal nodes of Classification and Regression Trees are the root node
    and the internal node. The terminal nodes are the leaf nodes. Each non-terminal
    node represents a single input variable (x) and a splitting point on that variable;
    the leaf nodes represent the output variable (y). The model is used as follows
    to make predictions: walk the splits of the tree to arrive at a leaf node and
    output the value present at the leaf node.


