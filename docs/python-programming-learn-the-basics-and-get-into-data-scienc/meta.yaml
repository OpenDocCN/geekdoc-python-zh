  md: '# Python vs. Java


    Python programs are generally expected to run slower than Java programs, but they
    also take much less time to develop. Python programs are typically 3-5 times shorter
    than equivalent Java programs. This difference can be attributed to Python''s
    built-in high-level data types and its dynamic typing.


    For example, a Python programmer wastes no time declaring the types of arguments,
    variables or libraries and Python''s powerful polymorphic list and dictionary
    types for which rich syntactic support is built straight into the language, find
    a use in almost every Python program. Because of the run-time typing, Python''s
    run time must work harder than Java''s.


    For example, when evaluating some expression, it must first inspect the objects
    to find out their type, which is not known at compile time. It invokes the appropriate
    addition operation, which may be an overloaded user-defined method. Java, on the
    other hand, can perform an efficient integer or floating point addition, but requires
    variable declarations and does not allow overloading of the operator for instances
    of user-defined classes.


    For these reasons, Python is much better suited as a "glue" language, while Java
    is better characterized as a low-level implementation language. In fact, the two
    together make an excellent combination. Components can be developed in Java and
    combined to form applications in Python.


    Python can also be used to prototype components until their design can be "hardened"
    in a Java implementation. To support this type of development, a Python implementation
    written in Java is under development, which allows calling Python code from Java
    and vice versa. In this implementation, Python source code is translated to Java
    bytecode.


    # Python vs. Java Script


    Python is object-based subset and roughly equivalent to JavaScript. Like and JavaScript,
    Python supports a programming style that uses simple functions and variables without
    engaging in class definitions. However, for JavaScript, that is all there.'
