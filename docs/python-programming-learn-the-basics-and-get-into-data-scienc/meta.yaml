  md: 'Perhaps the biggest difference between Python and Smalltalk is Python''s more
    mainstream syntax, which gives it a leg up on programmer training. Like Smalltalk,
    Python has dynamic typing and binding, and everything in Python is an object.
    However, Python distinguishes built-in object types from user-defined classes,
    and currently doesn''t allow inheritance from built-in types. Smalltalk''s standard
    library of collection data types is more refined, while Python''s library has
    more facilities for dealing with Internet and WWW realities such as email, HTML
    and FTP.


    Python has a different philosophy regarding the development environment and distribution
    of code. Where Smalltalk traditionally has a monolithic "system image" which comprises
    both the environment and the user''s program, Python stores both standard modules
    and user modules in individual files which can easily be re-arranged or distributed
    outside of the system.


