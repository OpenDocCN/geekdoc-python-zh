- md: '## 1. iPython


    IPython or Interactive Python is a command shell for interactive computing in
    multiple programming languages, originally developed for the Python programming
    language, that offers introspection, rich media, shell syntax, tab completion,
    and history.


    IPython provides some features, for example:


    - Interactive shells

    - A browser-based notebook interface with support for code, text, mathematical
    expressions, inline plots and other media.

    - Support for interactive data visualization and use of GUI toolkits.

    - Flexible, embeddable interpreters to load into one''s own projects.

    - Tools for parallel computing.


    IPython is based on an architecture that provides parallel and distributed computing.
    IPython enables parallel applications to be developed, executed, debugged and
    monitored interactively. This architecture abstracts out parallelism, enabling
    IPython to support many different styles of parallelism including:


    - Single program, multiple data (SPMD) parallelism

    - Multiple program, multiple data (MIMD) parallelism

    - Message passing using MPI

    - Task parallelism

    - Data parallelism

    - Combinations of these approaches

    - Custom user defined approaches


    With the release of IPython 4.0, the parallel computing capabilities were made
    optional and released under the ipyparallel python package.


    IPython frequently draws from SciPy stack libraries like NumPy and SciPy, often
    installed alongside one of many Scientific Python distributions. IPython provides
    integration with some libraries of the SciPy stack, notably matplotlib, producing
    inline graphs when in used with the Jupyter notebook. Python libraries can implement
    IPython specific hooks to customize rich object display. SymPy for example implements
    rendering of mathematical expressions as rendered LaTeX when used within IPython
    context.


    IPython allows non-blocking interaction with Tkinter, PyGTK, PySide and wxPython.
    IPython can interactively manage parallel computing clusters using asynchronous
    status callbacks and MPI. IPython can also be used as a system shell replacement.
    Its default behavior is largely similar to Unix shells, but it allows customization
    and the flexibility of executing code in a live Python environment. Using IPython
    as a shell replacement is less common and it is now recommended to use Xonsh which
    provide most of the IPython feature with better shell integrations.


    In 2014, Fernando Pérez announced a spin-off project from IPython called Project
    Jupyter. IPython continued to exist as a Python shell and kernel for Jupyter,
    but the notebook interface and other language-agnostic parts of IPython were moved
    under the Jupyter name. Jupyter is language agnostic and its name is a reference
    to core programming languages supported by Jupyter, which are Julia, Python, and
    R.


    ## 2. Jupyter


    Jupyter Notebook, formerly IPython Notebooks, is a web-based interactive computational
    environment for creating Jupyter notebook documents. The "notebook" term can colloquially
    make reference to many different entities, mainly the Jupyter web application,
    Jupyter Python web server or Jupyter document format depending on context. A Jupyter
    Notebook document is a JSON document, following a versioned schema, and containing
    an ordered list of input or output cells which can contain code, text, mathematics,
    plots and rich media, usually ending with the ".ipynb" extension.


    A Jupyter Notebook can be converted to a number of open standard output formats
    through "Download As" in the web interface, via the nbconvert library or "jupyter
    nbconvert" command line interface in a shell.


    To simplify visualisation of Jupyter notebook documents on the web, the nbconvert
    library is provided as a service through NbViewer which can take a URL to any
    publicly available notebook document, convert it to HTML on the fly and display
    it to the user.


    Jupyter Notebook provides a browser-based REPL built upon a number of popular
    open-source libraries:


    - IPython

    - OMQ

    - Tornado

    - jQuery

    - Bootstrap

    - MathJax


    A Jupyter kernel is a program responsible for handling various types of request,
    like code execution, code completions, inspection and providing a reply. Kernels
    talk to the other components of Jupyter using ZeroMQ over the network, and thus
    can be on the same or remote machines.


    Unlike many other Notebook-like interfaces in Jupyter, kernels are not aware that
    they are attached to a specific document, and can be connected to many clients
    at once. Usually kernels allow execution of only a single language, but there
    are a couple of exceptions.


    JupyterHub is a multi-user server for Jupyter Notebooks. It is designed to support
    many users by spawning, managing, and proxying many singular Jupyter Notebook
    servers. While JupyterHub requires managing servers, third-party services like
    Jupyo provide an alternative to JupyterHub by hosting and managing multi-user
    Jupyter notebooks in the cloud.


    JupyterLab is the next-generation user interface for Project Jupyter. It offers
    all the familiar building blocks of the classic Jupyter Notebook in a flexible
    and powerful user interface. The first stable release was announced on February
    20, 2018.


    For learners as well as for more advanced data scientists, the Jupyter Notebook
    is one of the popular data science tools out there. The interactive environment
    is not only ideal to teach and learn with, and to share your work with peers,
    but also ensures reproducible research. Yet, as you are discovering how to work
    with this notebook, you will often bump into IPython.


    Many computational notebooks were created after the Maple and Mathematics notebooks.
    This section, however, will focus on the notebooks that have contributed to the
    rise of data science notebooks.


    The Sage notebook as a browser-based system was first released mid-2000s and then
    in 2007, a new version was released that was more powerful, that had user accounts
    and could be used to make documents public. It resembled the Google Docs UI design
    since the layout of the Sage notebook was based on the layout of Google notebooks.


    In late 2001, roughly twenty years after Guido van Rossum began to work on Python
    at the National Research Institute for Mathematics and Computer Science in the
    Netherlands, Fernando Pérez started developing IPython. The project was heavily
    influenced by the Mathematica notebooks and Maple worksheets, just like the Sage
    notebook and many other projects that followed.


    The name “Jupyter” was inspired by thinking about the leading open languages for
    science and even though it might seem like any other acronym, it never meant that
    other languages were not welcome.


    R Markdown and the Jupyter Notebook share the delivering of a reproducible


    like (So-called recommender systems: a famous example is the Netflix Prize).


    Supervised learning is further broken down into two categories, classification
    and regression. In classification, the label is discrete, while in regression,
    the label is continuous. For example, in astronomy, the task of determining whether
    an object is a star, a galaxy or a quasar is a classification problem. The label
    is from three distinct categories. On the other hand, we might wish to estimate
    the age of an object based on such observations. This would be a regression problem,
    because the label is a continuous quantity.


    Most of the machine learning algorithms will require more labeled observations
    compared to the toy datasets and the package has inbuild sample generator routines
    to generate a labeled dataset with the required number of observations. The sample
    generator make_moons take two key parameters n_samples and noise. the practitioner
    can supply the routine with a number of samples to generate and the noise added
    to the input features


    After loading the dataset it has to split into training and testing set to start
    with the algorithm training. The package has a routine to break a pandas dataframe
    or numpy array into train and test set. The method takes input features, target
    array, the size of the test set and stratification array. Stratification is a
    handy option as the target class proportions are represented the same across training
    and test set. The target distribution will be the same across training and test
    dataset


    It is mandatory to scale all continuous numeric input features so that not a single
    feature influences the model performance and input feature. A might range in millions
    and B in hundreds, and if not scaled to a standard scale the model will not learn
    the variance in feature B. The package comes with minmax scaled between 0 and
    1 and standard scaler where the scale output will include negative values.


    The model parameter tuning is a daunting task, and multiple iterations have to
    be logged in with their performance metrics until one reaches the best set of
    parameters. Parameter tuning is mostly simplified in Scikit-learn by the GridSearchCV
    routine. Given a list of model parameter combinations, the method runs all possible
    combinations and returns the best model parameter along with the best estimator.
    The method also performs cross-validation, so the best estimator does not overfit
    the training data.


    Practitioners can code their custom estimators. The custom estimator can be part
    of a pipeline. A pipeline takes multiple estimators and executes them in sequence.
    It will pass the output of the previous estimator as the input to the next estimator
    in the list. An entire model process can be designed using the pipeline, and it
    can be directly fit to a dataset. This routine is a great help in simplifying
    the model production deployment.


    Any machine learning model will require numeric input features continuous or categorical
    and text features does not integrate well. Scikit-learn has a pill for that too.
    Use label encoder or one-hot encoder.'
