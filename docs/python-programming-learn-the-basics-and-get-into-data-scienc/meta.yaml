    # Introduction to Data Science


    Data Science is not a certain or a single one the kingdom, it is like a combination
    of various disciplines that are focusing on analyzing data and finding the best
    solutions based on them. Initially, those tasks were held by math or statistics
    specialists, but then data-experts began to use machine learning and artificial
    intelligence, which added optimization and computer science as a method for analyzing
    data. This new approach turned out to be much faster and effective, and so extremely
    popular.


    So, the popularity of Data Science lies in the fact that it encompasses the collection
    of large arrays of structured and unstructured data and their conversion into
    human-readable format, including visualization, work with statistics and analytical
    methods, machine and deep learning, probability analysis and predictive models,
    neural networks and their application for solving actual problems.


    Artificial Intelligence, machine learning, deep learning and data science undoubtedly,
    are the most popular technology sectors today. Although, they are somehow related,
    they are not the same.'
- md: '## Artificial Intelligence


    Artificial Intelligence or short AI is the kingdom which is focusing on the creation
    of intelligent machines that work and react like humans. Artificial Intelligence
    as a study dates back to 1936 when Alan Turing built the first AI-powered machines.
    Despite quite a long history, today Artificial Intelligence in most areas is not
    able to completely replace a human. The competition of AI with humans in chess
    and data encryption are two sides of the same thing.


    Machine learning or short ML is a creating tool for extracting knowledge from
    data. In ML, models can be trained on data independently or in stages, like training
    with a teacher, having human-prepared data, or training without a teacher, working
    with spontaneous, noisy data and similar things.


    Deep learning is the creation of multi-layer neural networks in areas where more
    advanced or fast analysis is needed and traditional machine learning cannot cope.
    "Depth" provides more than one hidden layer of neurons in the network that conducts
    mathematical calculations.


    Big Data works with huge amounts of often unstructured data. The specifics of
    the sphere are tools and systems capable of withstanding high loads.


    Data Science is the addition of meaning to arrays of data, visualization, collection
    of insights, and making decisions based on these data. The field specialists use
    some methods of machine learning and Big Data cloud computing which represent
    the tools for creating a virtual development environment and much more.


    The data scientist is a person who is able to do different actions related to
    the data, for example, detection of anomalies like abnormal customer behavior,
    fraud and similar.


    The data scientist can also do personalized marketing, including personal e-mail
    newsletters, retargeting, and recommendation systems.


    Metric forecasts and performance indicators, quality of advertising campaigns
    and other activities are included in the data scientist''s work and abilities.


    Scoring systems, ability to process large amounts of data and help to make a decision,
    for example granting a loan and basic interaction with the client, like standard
    answers in chat rooms, voice assistants, sorting letters into folders.


    To be able to do all of these stuffs and activities, the data scientist has to
    do:


    - Collection: Search for channels to collect data.

    - Check and validation: pruning anomalies that do not affect the result and confuse
    with further analysis.

    - Analysis: The study of data, confirmation of assumptions, conclusions.

    - Visualization: Presentation in a form that will be simple and understandable
    for perception by a person in graphs, diagrams.

    - Act: Making decisions based on the analyzed data, for example about changing
    the marketing strategy, increasing the budget for any activity of the company.


    Data Scientist is a person who is better at statistics than any programmer and
    better at programming than any statistician.


    Talking in general about Data Science, for serious understanding, you need a fundamental
    course in probability theory, linear algebra and of course, mathematical statistics.
    Fundamental mathematical knowledge is important in order to be able to analyze
    the results of applying data processing algorithms. Despite the abundance of mathematical
    formulations and evidence, all methods are accompanied by practical examples and
    exercises.


    In fact, a great advantage would be to immediately get acquainted with the basics
    of programming. Start learning one language and focus on all the shades of programming
    through the syntax of that language.


    For example, Python programming language is an excellent chance for you to enter
    the data scientist''s world. Firstly, it is perfect for beginners to learn and
    it has a relatively simple syntax. Secondly, Python combines the demand for specialists
    and is multifunctional.


    Time is a precious resource, so it''s better not to disintegrate at once and not
    just waste it. After you learn the basics of Python, you need to spend time getting
    to know the main libraries.


    Machine learning allows you to train computers to act independently so that we
    do not have to write detailed instructions for performing certain tasks. For this
    reason, machine learning is of great value for almost any area, but first of all,
    it will work well where there is Data Science.


    Supervised Learning is now the most developed form of Machine Learning. The idea
    here is that you have historical data with some notion of the output variable.
    Output Variable is meant for recognizing how you can a good combination of several
    input variables and corresponding output values as historical data presented to
    you and then based on that you try to come up with a function which is able to
    predict an output given any input. So, the key idea is that historical data is
    labeled. Labeled means that you have a specific output value for every row of
    data that is presented to it.


    Unsupervised learning doesn''t have the luxury of having labeled historical data
    input-output. It allows you to identify what is known as patterns in the historical
    input data and interesting insights from the overall perspective. So, the output
    here is absent and all you need to understand is that is there a pattern being
    visible in the unsupervised set of input. The beauty of unsupervised learning
    is that it lends itself to numerous combinations of patterns, that''s why unsupervised
    algorithms are harder.


    Reinforcement learning or short RL occurs when you present the algorithm with
    examples that lack labels, as in unsupervised learning. However, you can accompany
    an example with positive or negative feedback according to the solution the algorithm
    proposes. RL is connected to applications for which the algorithm must make decisions,
    and the decisions bear consequences. It is just like learning by trial and error.
    An interesting example of RL occurs when computers learn to play video games by
    themselves.


    Data Mining is an important analytic process designed to explore data. It is the
    process of analyzing hidden patterns of data according to different perspectives
    for categorization into useful information, which is collected and assembled in
    common areas, such as data warehouses, for efficient analysis, data mining algorithms,
    facilitating business decision making and other information requirements to ultimately
    cut costs and increase revenue.


    Data Visualization is a general term that describes an effort to help people understand
    the significance of data by placing it in a visual context. After you have studied
    everything you need to analyze the data and try your hand at open tasks and contests,
    then start looking for a job. Of course, you will say only good things, but you
    have the right to doubt your words.


    Today anyone can become a Data Scientist. There is everything you need for this
    in the public domain, like: online-courses, books, competitions for gaining practical
    experience and so on. It is a good for the first glance, but you shouldn''t learn
    it just because of hype. All we hear about Data Science it is unbelievably cool
    and it is the most requested job of the 21st century. If these things are the
    main motivation for you, nothing ever will work.


    Becoming a self-taught Data Scientist is possible. However, the key to your success
    is a high motivation to regularly find time to study data analysis and its practical
    application. Most importantly, you have to learn to get satisfaction in the process
    of learning and working. Think about it.


    ## Python for Data Science


    In short, understanding Python is one of the valuable skills needed for a data
    science career. Though it hasn''t always been, Python is the programming language
    of choice for data science. Here is a brief history:


    - In 2016, it overtook R on Kaggle, the premier platform for data science competitions.

    - In 2017, it overtook R on KDNuggets''s annual poll of data scientists'' most
    used tools.

    - In 2018, 66% of data scientists reported using Python daily, making it the number
    one tool for analytics professionals.


    Data science experts expect this trend to continue with increasing development
    in the Python ecosystem. While your journey to learn Python'
  mdcn: '## 人工智能


    人工智能，简称AI，是一个专注于创造能够像人类一样工作和反应的智能机器的领域。作为一门学科，人工智能的研究可以追溯到1936年，当时艾伦·图灵制造了第一台由AI驱动的机器。尽管历史相当悠久，但如今的人工智能在大多数领域仍无法完全取代人类。AI与人类在国际象棋和数据加密方面的竞争，是同一枚硬币的两面。


    机器学习，简称ML，是一种从数据中提取知识的创建工具。在机器学习中，模型可以独立或分阶段地在数据上进行训练，例如在有教师的情况下训练，使用人工准备的数据；或在无教师的情况下训练，处理自发的、带噪声的数据等类似情况。


    深度学习是在需要更高级或快速分析、而传统机器学习无法胜任的领域中，创建多层神经网络的技术。“深度”意味着网络中存在不止一个进行数学计算的隐藏神经元层。


    大数据处理的是海量的、通常是结构化的数据。该领域的特点是拥有能够承受高负载的工具和系统。


    数据科学是为数据数组赋予意义、进行可视化、收集洞察并基于这些数据做出决策的过程。该领域的专家使用机器学习和大数据云计算的一些方法，这些方法代表了创建虚拟开发环境等工具。


    数据科学家是能够执行与数据相关的各种操作的人，例如检测异常情况，如异常的客户行为、欺诈等。


    数据科学家还可以进行个性化营销，包括个性化电子邮件通讯、重定向和推荐系统。


    指标预测和绩效指标、广告活动和其他活动的质量评估，都包含在数据科学家的工作和能力范围内。


    评分系统、处理大量数据并辅助决策的能力，例如批准贷款，以及与客户的基本互动，如聊天室中的标准答案、语音助手、将邮件分类到文件夹中。


    为了能够完成所有这些工作和活动，数据科学家必须执行以下步骤：


    -   收集：寻找收集数据的渠道。

    -   检查与验证：剔除那些不影响结果、会混淆后续分析的异常值。

    -   分析：研究数据，验证假设，得出结论。

    -   可视化：以图表、图形等简单易懂的形式呈现数据。

    -   行动：基于分析后的数据做出决策，例如关于改变营销策略、增加公司任何活动的预算。


    数据科学家是比任何程序员都更懂统计学，又比任何统计学家都更懂编程的人。


    总体而言，要真正理解数据科学，你需要学习概率论、线性代数以及数学统计的基础课程。扎实的数学知识对于能够分析应用数据处理算法的结果至关重要。尽管有大量的数学公式和证明，但所有方法都配有实际示例和练习。


    事实上，一个巨大的优势是立即熟悉编程基础。开始学习一门语言，并通过该语言的语法专注于编程的所有细微差别。


    例如，Python编程语言是你进入数据科学家世界的绝佳机会。首先，它非常适合初学者学习，语法相对简单。其次，Python结合了市场对专业人才的需求，并且功能多样。


    时间是宝贵的资源，所以最好不要分散精力，也不要浪费它。在学习了Python基础之后，你需要花时间了解主要的库。


    机器学习允许你训练计算机独立行动，这样我们就不必为执行特定任务编写详细的指令。因此，机器学习对几乎任何领域都具有巨大价值，但首先，它在数据科学领域会发挥出色作用。


    监督学习是目前发展最完善的机器学习形式。其核心思想是，你拥有带有输出变量概念的历史数据。输出变量旨在识别如何将几个输入变量和相应的输出值作为历史数据呈现给你，然后基于此，你尝试提出一个函数，该函数能够根据任何给定的输入预测输出。所以，关键思想是历史数据是带标签的。带标签意味着你为呈现给它的每一行数据都有一个特定的输出值。


    无监督学习没有带标签的历史输入-输出数据的奢侈。它允许你识别历史输入数据中已知的模式，并从整体角度获得有趣的洞察。因此，这里没有输出，你需要理解的是，在无监督的输入集中是否存在可见的模式。无监督学习的美妙之处在于它适用于众多模式的组合，这就是为什么无监督算法更难。


    强化学习，简称RL，当你向算法呈现缺乏标签的示例时（如无监督学习），就会发生这种情况。然而，你可以根据算法提出的解决方案，为示例提供正面或负面的反馈。强化学习与算法必须做出决策且决策会产生后果的应用相关。这就像通过试错来学习。强化学习的一个有趣例子是计算机通过自己玩电子游戏来学习。


    数据挖掘是一个重要的分析过程，旨在探索数据。它是根据不同的视角分析数据的隐藏模式，以便将其分类为有用的信息，这些信息被收集并组装在公共区域（如数据仓库）中，以便进行高效分析、数据挖掘算法、促进业务决策制定和其他信息需求，最终降低成本并增加收入。


    数据可视化是一个通用术语，描述了通过将数据置于视觉环境中来帮助人们理解数据重要性的努力。在你学习了所有需要分析数据的知识，并在开放任务和竞赛中尝试身手之后，然后开始寻找工作。当然，你会说些好话，但你有权利怀疑自己的话。


    如今，任何人都可以成为数据科学家。公共领域有你需要的一切，例如：在线课程、书籍、获取实践经验的比赛等等。这乍一看很好，但你不应该仅仅因为炒作而学习它。我们听到的所有关于数据科学的事情，它都酷得难以置信，是21世纪最抢手的工作。如果这些事情是你的主要动机，那么什么都不会成功。


    成为一名自学成才的数据科学家是可能的。然而，你成功的关键是拥有高度的自律，定期抽出时间学习数据分析及其实际应用。最重要的是，你必须学会在学习和工作的过程中获得满足感。好好想想吧。


    ## 数据科学的Python


    简而言之，理解Python是数据科学职业所需的宝贵技能之一。虽然并非一直如此，但Python已成为数据科学的首选编程语言。以下是简要历史：


    -   2016年，它在Kaggle（数据科学竞赛的首要平台）上超越了R。

    -   2017年，它在KDNuggets关于数据科学家最常用工具的年度调查中超越了R。

    -   2018年，66%的数据科学家报告每天使用Python，使其成为分析专业人士的首选工具。


    数据科学专家预计，随着Python生态系统的不断发展，这一趋势将持续下去。虽然你的Python学习之旅'
