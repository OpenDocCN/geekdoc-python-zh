- md: "## Data Visualization\n\nScroll through the Python Package Index and you will\
    \ find libraries for practically every data visualization need, from GazeParser\
    \ for eye movement research to pastalog for realtime visualizations of neural\
    \ network training. And while many of these libraries are intensely focused on\
    \ accomplishing a specific task, some can be used no matter what your field.\n\
    \nData visualization is the discipline of trying to understand data by placing\
    \ it in a visual context so that patterns, trends and correlations that might\
    \ not otherwise be detected can be exposed.\n\nPython offers multiple great graphing\
    \ libraries that come packed with lots of different features. No matter if you\
    \ want to create interactive, live or highly customized plots python has an excellent\
    \ library for you.\n\n## Matplotlib\n\nmatplotlib is the O.G. of Python data visualization\
    \ libraries. Despite being over a decade old, it's still the most widely used\
    \ library for plotting in the Python community. It was designed to closely resemble\
    \ MATLAB, a proprietary programming language developed in the 1980s.\n\nBecause\
    \ matplotlib was the first Python data visualization library, many other libraries\
    \ are built on top of it or designed to work in tandem with it during analysis.\
    \ Some libraries like pandas and Seaborn are “wrappers” over matplotlib. They\
    \ allow you to access a number of matplotlib’s methods with less code.\n\nWhile\
    \ matplotlib is good for getting a sense of the data, it's not very useful for\
    \ creating publication-quality charts quickly and easily. As Chris Moffitt points\
    \ out in his overview of Python visualization tools, matplotlib “is extremely\
    \ powerful but with that power comes complexity.” matplotlib has long been criticized\
    \ for its default styles, which have a distinct 1990s feel. The upcoming release\
    \ of matplotlib 2.0 promises many new style changes to address this problem.\n\
    \n## Seaborn\n\nSeaborn harnesses the power of matplotlib to create beautiful\
    \ charts in a few lines of code. The key difference is Seaborn's default styles\
    \ and color palettes, which are designed to be more aesthetically pleasing and\
    \ modern. Since Seaborn is built on top of matplotlib, you'll need to know matplotlib\
    \ to tweak Seaborn's defaults.\n\n## Ggplot\n\nggplot is based on ggplot2, an\
    \ R plotting system, and concepts from The Grammar of Graphics. ggplot operates\
    \ differently than matplotlib. It lets you layer components to create a complete\
    \ plot. For instance, you can start with axes, then add points, then a line, a\
    \ trendline, etc. Although The grammar of graphics has been praised as an “intuitive”\
    \ method for plotting, seasoned matplotlib users might need time to adjust to\
    \ this new mindset.\n\nAccording to the creator, ggplot is not designed for creating\
    \ highly customized graphics. It sacrifices complexity for a simpler method of\
    \ plotting.\n\nggplot is tightly integrated with pandas, so it is best to store\
    \ your data in a DataFrame when using ggplot.\n\nLike ggplot, Bokeh is based on\
    \ The Grammar of Graphics, but unlike ggplot, it's native to Python, not ported\
    \ over from R. Its strength lies in the ability to create interactive, web-ready\
    \ plots, which can be easily output as JSON objects, HTML documents, or interactive\
    \ web applications. Bokeh also supports streaming and real-time data.\n\n## Bokeh\n\
    \nBokeh provides three interfaces with varying levels of control to accommodate\
    \ different user types. The highest level is for creating charts quickly. It includes\
    \ methods for creating common charts such as bar plots, box plots, and histograms.\
    \ The middle level has the same specificity as matplotlib and allows you to control\
    \ the basic building blocks of each chart. The lowest level is geared toward developers\
    \ and software engineers. It has no pre-set defaults and requires you to define\
    \ every element of the chart.\n\n## Pygal\n\nLike Bokeh and Plotly, pygal offers\
    \ interactive plots that can be embedded in the web browser. Its prime differentiator\
    \ is the ability to output charts as SVGs. As long as you're working with smaller\
    \ datasets, SVGs will do you just fine. But if you're making charts with hundreds\
    \ of thousands of data points, they'll have trouble rendering and become sluggish.\
    \ Since each chart type is packaged into a method and the built-in styles are\
    \ pretty, it is easy to create a nice-looking chart in a few lines of code.\n\n\
    ## Plotly\n\nYou might know Plotly as an online platform for data visualization,\
    \ but did you also know you can access its capabilities from a Python notebook?\
    \ Like Bokeh, Plotly's forte is making interactive plots, but it offers some charts\
    \ you won't find in most libraries, like contour plots, dendograms, and 3D charts.\n\
    \n![](img/9995f15bc3f1b0a432702ca81d107469_53_0.png)\n\n## Geoplotlib\n\ngeoplotlib\
    \ is a toolbox for creating maps and plotting geographical data. You can use it\
