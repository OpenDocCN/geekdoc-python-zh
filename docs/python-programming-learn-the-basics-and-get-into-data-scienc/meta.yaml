  mdcn: '机器学习与优化也密切相关。许多学习问题被表述为在训练样本集上最小化某个损失函数。损失函数表达了正在训练的模型的预测与实际问题实例之间的差异。例如，在分类任务中，人们希望为实例分配标签，并训练模型以正确预测一组样本的预分配标签。这两个领域的区别源于泛化的目标。虽然优化算法可以最小化训练集上的损失，但机器学习关注的是最小化未见样本上的损失。


