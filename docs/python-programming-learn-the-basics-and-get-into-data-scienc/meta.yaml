  mdcn: '## 使用 Pandas 进行数据分析


    Pandas 可能是 Python 编程语言中最流行的数据分析库。这个库是对底层 NumPy 的高级抽象，而 NumPy 是用纯 C 语言编写的。它的抽象层次相当高，因此你无需处理底层细节，除非你真的想这样做。


    如果你正在处理复杂或大型的数据集，请认真考虑使用 Pandas。它基于 numpy 或 scipy，可以说是它们的超集。但它为你提供了许多强大的功能，例如直接从
    Microsoft Excel 文件读取数据、进行数据连接等，其中一些功能我们将会介绍。


    Pandas 有两种基本数据结构：Series 和 Dataframes。


    Series 类似于 numpy 的数组或字典，尽管它附带了许多额外的功能。Dataframes 是一种二维数据结构，包含列和行信息，就像 Excel 文件的字段一样。请记住，Excel
    文件有行和列，以及一个可选的标题字段。所有这些数据都可以在 Dataframe 中表示。


    Pandas 是一个 Python 库，为数据分析提供了广泛的手段。数据科学家经常处理存储在表格格式中的数据，如 .csv、.tsv 或 .xlsx。Pandas
    使得使用类似 SQL 的查询来加载、处理和分析此类表格数据变得非常方便。结合 Matplotlib 和 Seaborn，Pandas 为表格数据的可视化分析提供了广泛的机会。


    Pandas 中的主要数据结构是通过 Series 和 DataFrame 类实现的。前者是某种固定数据类型的一维索引数组。后者是一种二维数据结构“一个表”，其中每列包含相同类型的数据。你可以将其视为
    Series 实例的字典。DataFrames 非常适合表示真实数据：行对应于实例，列对应于这些实例的特征。


