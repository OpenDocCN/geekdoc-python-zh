    \nPython 提供了多个优秀的绘图库，它们集成了许多不同的功能。无论你是想创建交互式、实时还是高度定制化的图表，Python 都有一个适合你的优秀库。\n\
    \n## Matplotlib\n\nmatplotlib 是 Python 数据可视化库的鼻祖。尽管已有十多年历史，它仍然是 Python 社区中使用最广泛的绘图库。它的设计初衷是与\
    \ MATLAB（一种在 1980 年代开发的专有编程语言）高度相似。\n\n因为 matplotlib 是第一个 Python 数据可视化库，许多其他库都建立在它之上，或者设计为在分析过程中与之协同工作。一些库，如\
    \ pandas 和 Seaborn，是 matplotlib 的“封装器”。它们允许你用更少的代码访问 matplotlib 的许多方法。\n\n虽然 matplotlib\
