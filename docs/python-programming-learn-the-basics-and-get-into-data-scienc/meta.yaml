  - '[PAGE 11]


    Perhaps the biggest difference between Python and Smalltalk is Python''s more
    mainstream syntax, which gives it a leg up on programmer training. Like Smalltalk,
    Python has dynamic typing and binding, and everything in Python is an object.
    However, Python distinguishes built-in object types from user-defined classes,
    and currently doesn''t allow inheritance from built-in types. Smalltalk''s standard
    library of collection data types is more refined, while Python''s library has
    more facilities for dealing with Internet and WWW realities such as email, HTML
    and FTP.


    Python has a different philosophy regarding the development environment and distribution
    of code. Where Smalltalk traditionally has a monolithic "system image" which comprises
    both the environment and the user''s program, Python stores both standard modules
    and user modules in individual files which can easily be re-arranged or distributed
    outside of the system.


    # Python vs. C++


    Almost everything said for Java also applies for C++, where Python code is typically
    3-5 times shorter than equivalent Java code, it is often 5-10 times shorter than
    equivalent C++ code. Anecdotal evidence suggests that one Python programmer can
    finish in two months what two C++ programmers can''t complete in a year. Python
    shines as a glue language, used to combine components written in C++.


    # Python vs. Lisp and Scheme


    These languages are close to Python in their dynamic semantics, but so different
    in their approach to syntax that a comparison becomes almost a religious argument.
    It should be noted that Python has introspective capabilities similar to those
    of Lisp and Python programs can construct and execute program fragments on the
    fly. Usually, real-world properties are decisive where Common Lisp is big in every
    sense and the Scheme world is fragmented between many incompatible versions, where
    Python has a single, free, compact implementation.


    # Python vs. PHP


    From the development point of view, PHP is a web-oriented language. A PHP application
    is more like a set of individual scripts maybe even with a single semantic entry
    point.'
