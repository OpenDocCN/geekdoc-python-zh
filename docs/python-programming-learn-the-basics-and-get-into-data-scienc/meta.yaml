    # Data Visualization


    Scroll through the Python Package Index and you will find libraries for practically
    every data visualization need, from GazeParser for eye movement research to pastalog
    for realtime visualizations of neural network training. And while many of these
    libraries are intensely focused on accomplishing a specific task, some can be
    used no matter what your field.


    Data visualization is the discipline of trying to understand data by placing it
    in a visual context so that patterns, trends and correlations that might not otherwise
    be detected can be exposed.


    Python offers multiple great graphing libraries that come packed with lots of
    different features. No matter if you want to create interactive, live or highly
    customized plots python has an excellent library for you.


    # Matplotlib


    matplotlib is the O.G. of Python data visualization libraries. Despite being over
    a decade old, it''s still the most widely used library for plotting in the Python
    community. It was designed to closely resemble MATLAB, a proprietary programming
    language developed in the 1980s.


    Because matplotlib was the first Python data visualization library, many other
    libraries are built on top of it or designed to work in tandem with it during
    analysis. Some libraries like pandas and Seaborn are “wrappers” over matplotlib.
    They allow you to access a number of matplotlib’s methods with less code.


    While matplotlib is good for getting a sense of the data, it''s not very useful
    for creating publication-quality charts quickly and easily. As Chris Moffitt points
    out in his overview of Python visualization tools, matplotlib “is extremely powerful
    but with that power comes complexity.” matplotlib has long been criticized for
    its default styles, which have a distinct 1990s feel. The upcoming release of
    matplotlib 2.0 promises many new style changes to address this problem.


    # Seaborn


    Seaborn harnesses the power of matplotlib to create beautiful charts in a few'
