    # Learn from Data


    Machine learning gives computers the ability to learn without being explicitly
    programmed. It is a subfield of computer science.


    The idea came from work in artificial intelligence. Machine learning explores
    the study and construction of algorithms which can learn and make predictions
    on data. Such algorithms follow programmed instructions, but can also make predictions
    or decisions based on data.


    Machine learning is done where designing and programming explicit algorithms cannot
    be done. Examples include spam filtering, detection of network intruders or malicious
    insiders working towards a data breach, optical character recognition (OCR), search
    engines and computer vision.


    Machine learning, the application and science of algorithms that make sense of
    data, is the most exciting field of all the computer sciences. We are living in
    an age where data comes in abundance, using self-learning algorithms from the
    field of machine learning, we can turn this data into knowledge. Thanks to the
    many powerful open source libraries that have been developed in recent years,
    there has probably never been a better time to break into the machine learning
    field and learn how to utilize powerful algorithms to spot patterns in data.


    ML is being used increasingly and there are many reasons for this...


    +   - The machine will eventually improve itself from its own mistakes.

    - Faster than people, so it saves time.

    - This took several years by working on it until it gets it right by many parameters.

    - It is widely used in face recognition and also captioning photos. It is used
    to capture thieves, or anyone involved in a crime scene from the camera.


    Machine learning is a field of computer science. It is also a type of Artificial'
  merge: -1
  pgno: 77
- img_proc: true
  md: 'Intelligence that enables the programmers to write programs in a more simple
    way. It focuses more on developing programs that teach computers to change when
    exposed to new data and to grow. Its goal is to understand and follow the methods
    by using algorithms to do that task automatically without any human assistance.
    In 1959, Arthur Samuel defined machine learning as a "Field of study that gives
    computers the ability to learn without being explicitly programmed".


    ML algorithms are increasingly being used, and there are many reasons for this.
    The main reason is because machine learnign has a system that is trained on some
    datasets that will eventually learn and improve if given a certain task. Machine
    Learnign is so faster than human beings, it invests time and teaches itself from
    the data that is given to the machine or from the mistakes it does. This took
    several years of working on it until it gets it right by many parameters. In present,
    ML is used to discover the features of relevant data in disordered datasets.


    Machine learning is closely related to computational statistics, which focuses
    on making predictions using computers. The study of mathematical optimization
    delivers methods, theory and application domains to the field of machine learning.
    Data mining is a field of study within machine learning, and focuses on exploratory
    data analysis through unsupervised learning. In its application across business
    problems, machine learning is also referred to as predictive analytics.


    Machine learning tasks are classified into several broad categories. In supervised
    learning, the algorithm builds a mathematical model from a set of data that contains
    both the inputs and the desired outputs. For example, if the task were determining
    whether an image contained a certain object, the training data for a supervised
    learning algorithm would include images with and without that object, and each
    image would have a label designating whether it contained the object. In special
    cases, the input may be only partially available or restricted to special feedback.
    Semi-supervised learning algorithms develop mathematical models from incomplete
    training data, where a portion of the sample input doesn''t have labels.


    Classification algorithms and regression algorithms are types of supervised learning.
    Classification algorithms are used when the outputs are restricted to a limited
    set of values. For a classification algorithm that filters emails, the'
  merge: -1
  pgno: 78
- img_proc: true
  md: 'input would be an incoming email, and the output would be the name of the folder
    in which to file the email. For an algorithm that identifies spam emails, the
    output would be the prediction of either "spam" or "not spam", represented by
    the Boolean values true and false. Regression algorithms are named for their continuous
    outputs, meaning they may have any value within a range. Examples of a continuous
    value are the temperature, length, or price of an object.


    ![](img/9995f15bc3f1b0a432702ca81d107469_79_0.png)


    Active learning algorithms access the desired outputs for a limited set of inputs
    based on a budget, and optimize the choice of inputs for which it will acquire
    training labels. When used interactively, these can be presented to a human user
    for labeling.


    Machine learning and data mining often employ the same methods and overlap significantly,
    but while machine learning focuses on prediction, based on known properties learned
    from the training data, data mining focuses on the discovery of (previously) unknown
    properties in the data


    Data mining uses many machine learning methods, but with different goals. On the
    other hand, machine learning also employs data mining methods as "unsupervised
    learning" or as a preprocessing step to improve learner accuracy.


    Much of the confusion between these two research communities comes from the basic
    assumptions they work with: in machine learning, performance is usually evaluated
    with respect to the ability to reproduce known knowledge, while in knowledge discovery
    and data mining (KDD) the key task is the discovery of previously unknown knowledge.
    Evaluated with respect to'
  merge: -1
  pgno: 79
- img_proc: true
  md: 'known knowledge, an uninformed method will easily be outperformed by other
    supervised methods, while in a typical KDD task, supervised methods cannot be
    used due to the unavailability of training data.


    Machine learning also has intimate ties to optimization. Many learning problems
    are formulated as minimization of some loss function on a training set of examples.
    Loss functions express the discrepancy between the predictions of the model being
    trained and the actual problem instances. For example, in classification, one
    wants to assign a label to instances and models are trained to correctly predict
    the pre-assigned labels of a set of examples. The difference between the two fields
    arises from the goal of generalization. While optimization algorithms can minimize
    the loss on a training set, machine learning is concerned with minimizing the
    loss on unseen samples.


    There are a lot of ways to simulate human intelligence, and some methods are more
    intelligent than others.


    Artificial Intelligence can be a pile of if-then statements or a complex statistical
    model mapping raw sensory data to symbolic categories. The if-then statements
    are simply rules explicitly programmed by a human hand. Taken together, these
    if-then statements are sometimes called rules engines, expert systems, knowledge
    graphs or symbolic AI. Collectively, these are known as Good, Old-Fashioned AI
    (GOFAI).


    Machine learning is a subset of AI. That is, all machine learning counts as AI,
    but not all AI counts as machine learning. For example, symbolic logic rules engines,
    expert systems and knowledge graphs – could all be described as AI, and none of
    them are machine learning.


    Deep learning is a subset of machine learning. Usually, when people use the term
    deep learning, they are referring to deep artificial neural networks, and somewhat
    less frequently to deep reinforcement learning.


    Deep artificial neural networks are a set of algorithms that have set new records
    in accuracy for many important problems, such as image recognition, sound recognition,
    recommender systems, natural language processing etc. For example, deep learning
    is part of DeepMind’s well-known AlphaGo'
  merge: -1
  pgno: 80
- img_proc: true
  md: 'algorithm, which beat the former world champion Lee Sedol at Go in early 2016,
    and the current world champion Ke Jie in early 2017.


    This means that AI is changing faster than its history can be written, so predictions
    about its future quickly become obsolete as well. Are we chasing a breakthrough
    like nuclear fission or are attempts to wring intelligence from silicon more like
    trying to turn lead into gold.


    Given that the power of AI progresses hand in hand with the power of computational
    hardware, advances in computational capacity, such as better chips or quantum
    computing, will set the stage for advances in AI. On a purely algorithmic level,
    most of the astonishing results produced by labs such as DeepMind come from combining
    different approaches to AI, much as AlphaGo combines deep learning and reinforcement
    learning. Combining deep learning with symbolic reasoning, analogical reasoning
    and evolutionary methods all show promise.'
  merge: -1
  pgno: 81
- img_proc: true
  md: '# Machine Learning Algorithms


    Machine learning algorithms are programs that can learn from data and improve
    from experience, without human intervention. Learning tasks may include learning
    the function that maps the input to the output, learning the hidden structure
    in unlabeled data or ‘instance-based learning’, where a class label is produced
    for a new instance by comparing the new instance to instances from the training
    data, which were stored in memory. ‘Instance-based learning’ does not create an
    abstraction from specific instances.


    There are 3 types of machine learning (ML) algorithms:


    +   - Supervised Learning Algorithms

    - Unsupervised Learning Algorithms

    - Reinforcement learning


    Supervised learning uses labeled training data to learn the mapping function that
    turns input variables (X) into the output variable (Y). In other words, it solves
    for f in the following example: Y = f (X)


    Classification is used to predict the outcome of a given sample when the output
    variable is in the form of categories. A classification model might look at the
    input data and try to predict labels like “sick” or “healthy.”


    Regression is used to predict the outcome of a given sample when the output variable
    is in the form of real values. For example, a regression model might process input
    data to predict the amount of rainfall, the height of a person, etc.


    Ensembling is another type of supervised learning. It means combining the predictions
    of multiple machine learning models that are individually weak to produce a more
    accurate prediction on a new sample. Bagging with Random Forests, Boosting with
    XGBoost are examples of ensemble techniques.


    Unsupervised learning models are used when we only have the input variables (X)
    and no corresponding output variables. They use unlabeled training data to model
    the underlying structure of the data.


    Association is used to discover the probability of the co-occurrence of items
    in a collection. It is extensively used in market-basket analysis. For example,
    an association model might be used to discover that if a customer purchases'
  merge: -1
  pgno: 82
- img_proc: true
  md: 'bread, he.she is 80% likely to also purchase eggs.


    Clustering is used to group samples such that objects within the same cluster
    are more similar to each other than to the objects from another cluster.


    Dimensionality Reduction is used to reduce the number of variables of a data set
    while ensuring that important information is still conveyed. Dimensionality Reduction
    can be done using Feature Extraction methods and Feature Selection methods. Feature
    Selection selects a subset of the original variables. Feature Extraction performs
    data transformation from a high-dimensional space to a low-dimensional space.
    Example: PCA algorithm is a Feature Extraction approach.


    Reinforcement learning is a type of machine learning algorithm that allows an
    agent to decide the best next action based on its current state by learning behaviors
    that will maximize a reward.


    Reinforcement algorithms usually learn optimal actions through trial and error.
    Imagine, for example, a video game in which the player needs to move to certain
    places at certain times to earn points. A reinforcement algorithm playing that
    game would start by moving randomly but, over time through trial and error, it
    would learn where and when it needed to move the in-game character to maximize
    its point total.


    The top 5 Machine Learning Algorithms for beginners are:


    # 1. Linear Regression


    In machine learning, we have a set of input variables (x) that are used to determine
    an output variable (y). A relationship exists between the input variables and
    the output variable. The goal of ML is to quantify this relationship.


    In Linear Regression, the relationship between the input variables (x) and output
    variable (y) is expressed as an equation of the form y = a + bx. The goal of linear
    regression is to find out the values of coefficients a and b. Here, a is the intercept
    and b is the slope of the line.'
  merge: -1
  pgno: 83
- img_proc: true
  md: '![](img/9995f15bc3f1b0a432702ca81d107469_84_0.png)


    # 2. Logistic Regression


    Linear regression predictions are continuous values, logistic regression predictions
    are discrete values after applying a transformation function. In logistic regression,
    the output takes the form of probabilities of the default class (unlike linear
    regression, where the output is directly produced). As it is a probability, the
    output lies in the range of 0-1. So, for example, if we’re trying to predict whether
    patients are sick, we already know that sick patients are denoted as 1, so if
    our algorithm assigns the score of 0.98 to a patient, it thinks that patient is
    quite likely to be sick.


    # 3. CART


    Classification and Regression Trees (CART) are one implementation of Decision
    Trees.


    The non-terminal nodes of Classification and Regression Trees are the root node
    and the internal node. The terminal nodes are the leaf nodes. Each non-terminal
    node represents a single input variable (x) and a splitting point on that variable;
    the leaf nodes represent the output variable (y). The model is used as follows
    to make predictions: walk the splits of the tree to arrive at a leaf node and
    output the value present at the leaf node.


    The decision tree in Figure 3 below classifies whether a person will buy a'
  merge: -1
  pgno: 84
- img_proc: true
  md: 'sports car or a minivan depending on their age and marital status. If the person
    is over 30 years and is not married, we walk the tree as follows : ‘over 30 years?’
    -> yes -> ’married?’ -> no.


    ![](img/9995f15bc3f1b0a432702ca81d107469_85_0.png)


    # 4. Naïve Bayes


    To calculate the probability that an event will occur, given that another event
    has already occurred, we use Bayes’s Theorem. To calculate the probability of
    hypothesis(h) being true, given our prior knowledge(d), we use Bayes’s Theorem
    as follows:


    P(h|d)= (P(d|h) P(h)) / P(d)


    where:'
  merge: -1
  pgno: 85
- img_proc: true
  md: '+   - P(h|d) = Posterior probability. The probability of hypothesis h being
    true, given the data d, where P(h|d)= P(d1| h) P(d2| h) ....P(dn| h) P(d)

    - P(d|h) = Likelihood. The probability of data d given that the hypothesis h was
    true.

    - P(h) = Class prior probability. The probability of hypothesis h being true (irrespective
    of the data)

    - P(d) = Predictor prior probability. Probability of the data (irrespective of
    the hypothesis)


    This algorithm is called ‘naive’ because it assumes that all the variables are
    independent of each other, which is a naive assumption to make in real-world examples.


    | Weather | Play |

    | :--- | :--- |

    | Sunny | No |

    | Overcast | Yes |

    | Rainy | Yes |

    | Sunny | Yes |

    | Sunny | Yes |

    | Overcast | Yes |

    | Rainy | No |

    | Rainy | No |

    | Sunny | Yes |

    | Rainy | Yes |

    | Sunny | No |

    | Overcast | Yes |

    | Overcast | Yes |

    | Rainy | No |'
  merge: -1
  pgno: 86
- img_proc: true
  md: '# 5. KNN


    The K-Nearest Neighbors algorithm uses the entire data set as the training set,
    rather than splitting the data set into a training set and test set.


    When an outcome is required for a new data instance, the KNN algorithm goes through
    the entire data set to find the k-nearest instances to the new instance, or the
    k number of instances most similar to the new record, and then outputs the mean
    of the outcomes (for a regression problem) or the mode (most frequent class) for
    a classification problem. The value of k is user-specified.


    The similarity between instances is calculated using measures such as Euclidean
    distance and Hamming distance.


    We have covered some of the the most important machine learning algorithms for
    data science:


    +   - 5 supervised learning techniques- Linear Regression, Logistic Regression,
    CART, Naïve Bayes, KNN.

    - 3 unsupervised learning techniques- Apriori, K-means, PCA.

    - 2 ensembling techniques- Bagging with Random Forests, Boosting with XGBoost.'
  merge: -1
  pgno: 87
