  md: '![](img/9995f15bc3f1b0a432702ca81d107469_58_0.png)


    # Data Mining


    Data mining is the process of discovering predictive information from the analysis
    of large databases. For a data scientist, data mining can be a vague and daunting
    task and it requires a diverse set of skills and knowledge of many data mining
    techniques to take raw data and successfully get insights from it. You will want
    to understand the foundations of statistics and different programming languages
    that can help you with data mining at scale.


    The desired outcome from data mining is to create a model from a given data set
    that can have its insights generalized to similar data sets. A real-world example
    of a successful data mining application can be seen in automatic fraud detection
    from banks and credit institutions.


    Your bank likely has a policy to alert you if they detect any suspicious'
  merge: -1
  pgno: 58
- img_proc: true
  md: 'activity on your account, such as repeated ATM withdrawals or large purchases
    in a state outside of your registered residence. How does this relate to data
    mining? Data scientists created this system by applying algorithms to classify
    and predict whether a transaction is fraudulent by comparing it against a historical
    pattern of fraudulent and non-fraudulent charges.


    That is just one of a number of the powerful applications of data mining. Other
    applications of data mining include genomic sequencing, social network analysis
    or crime imaging, but the most common use case is for analyzing aspects of the
    consumer life cycle. Companies use data mining to discover consumer preferences,
    classify different consumers based on their purchasing activity and determine
    what makes for a well-paying customer and also information that can have profound
    effects on improving revenue streams and cutting costs.


    There are multiple ways to build predictive models from data sets and a data scientist
    should understand the concepts behind these techniques, as well as how to use
    code to produce similar models and visualizations. These techniques include:


    +   - Regression

    - Classification

    - Cluster Analysis

    - Association and Correlation Analysis

    - Outlier analysis


    Regression represents the estimating of the relationships between variables by
    optimizing the reduction of error.


    Classification represents the identifying what category an object belongs to.
    An example is classifying email as spam or legitimate or looking at a person’s
    credit score and approving or denying a loan request.


    Cluster Analysis is finding natural groupings of data objects based upon the known
    characteristics of that data. An example could be seen in marketing, where analysis
    can reveal customer groupings with unique behavior which could be applied in business
    strategy decisions.'
  merge: -1
  pgno: 59
- img_proc: true
  md: 'Association and Correlation Analysis represent the looking to see if there
    are unique relationships between variables that are not immediately obvious. An
    example would be the famous case of beer and diapers. Men who bought diapers at
    the end of the week were much more likely to buy beer, so stores placed them close
    to each other to increase sales.


    Outlier analysis is examining outliers to examine potential causes and reasons
    for said outliers. An example of which is the use of outlier analysis in fraud
    detection and trying to determine if a pattern of behavior outside the norm is
    fraud or not.


    Data mining for business is often performed with a transactional and live database
    that allows easy use of data mining tools for analysis. One example of which would
    be an Online Analytical Processing server or OLAP, which allows users to produce
    multi-dimensional analysis within the data server. OLAPs allow for business to
    query and analyze data without having to download static data files, which is
    helpful in situations where your database is growing on a daily basis. However,
    for someone looking to learn data mining and practicing on their own, an iPython
    notebook will be perfectly suited to handle most data mining tasks.


    Let’s walk through how to use Python to perform data mining using two of the data
    mining algorithms described above regression and clustering.


