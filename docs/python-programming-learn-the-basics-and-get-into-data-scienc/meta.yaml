- md: '## Data Analysis with Pandas


    Pandas, probably is the most popular library for data analysis in Python programming
    language. This library is a high-level abstraction over low-level NumPy which
    is written in pure C. It is quite high level, so you don’t have to muck about
    with low level details, unless you really want to.


    If you are dealing with complicated or large datasets, seriously consider Pandas.
    It is based on numpy or scipy, sort of a superset of it. But it gives you a lot
    of powerful features, like read directly from a Microsoft Excel file, do data
    joins and some of which features we will go over.


    Pandas has two basic data structures: Series and Dataframes.


    Series is like numpy’s array or dictionary, though it comes with a lot of extra
    features. Dataframes is a two dimensional data structure that contains both column
    and row information, like the fields of an Excel file. Remember an Excel file
    has rows and columns, and an optional header field. All of this data can be represented
    in a Dataframe.


    Pandas is a Python library that provides extensive means for data analysis. Data
    scientists often work with data stored in table formats like .csv, .tsv, or .xlsx.
    Pandas makes it very convenient to load, process, and analyze such tabular data
    using SQL-like queries. In conjunction with Matplotlib and Seaborn, Pandas provides
    a wide range of opportunities for visual analysis of tabular data.


    The main data structures in Pandas are implemented with Series and DataFrame classes.
    The former is a one-dimensional indexed array of some fixed data type. The latter
    is a two dimensional data structure “a table” where each column contains data
    of the same type. You can see it as a dictionary of Series instances. DataFrames
    are great for representing real data: rows correspond to instances and columns
    correspond to features of these instances.


    Data can be:


    - Scalar value which can be integer value, string

    - Python Dictionary which can be Key, Value pair

    - Ndarray


    Python is a great language for doing data analysis, primarily because of the fantastic
    ecosystem of data centric Python packages. Pandas is one of those packages, and
    makes importing and analyzing data much easier.


    The most important thing in Data Analysis is comparing values and selecting data
    accordingly. The “==” operator works for multiple values in a Pandas Data frame
    too.


    In the following example, a data frame is made from a csv file. In the Gender
    Column, there are only 3 types of values (“Male”, “Female” or NaN). Every row
    of Gender column is compared to “Male” and a boolean series is returned after
    that.


    ```python

    # importing pandas package

    import pandas as pd

    # making data frame from csv file

    data = pd.read_csv("employees.csv")

    # storing boolean series in new

    new = data["Gender"] == "Male"

    # inserting new series in data frame

    data["New"]= new

    # display

    data

    ```


