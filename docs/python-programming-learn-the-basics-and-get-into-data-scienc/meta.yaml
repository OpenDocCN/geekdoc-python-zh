    Leather的创建者Christopher Groskopf说得好：“Leather是为那些需要图表且不在乎它们是否完美的Python用户设计的图表库。”它旨在处理所有数据类型，并以SVG格式生成图表，因此你可以缩放它们而不会损失图像质量。由于这个库相对较新，部分文档仍在编写中。你可以制作的图表相当基础，但这正是其设计意图。


