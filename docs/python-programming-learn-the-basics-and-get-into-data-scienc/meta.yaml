    past e-mails, which you have labeled as spam or not spam. You want to use that
    classifier to determine whether your next email is spam, without needing to classify
    it yourself. Data mining encompasses a number of predictive modeling techniques
    and you can use a variety of data mining software. To learn to apply these techniques
    using Python is difficult and it will take practice and diligence to apply these
