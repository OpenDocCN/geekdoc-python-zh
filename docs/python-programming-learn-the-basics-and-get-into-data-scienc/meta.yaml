    | day_1 | 2017-12-01 | 1000022 | sent_a_super_tree |


    ## 7. PyBrain


    PyBrain is another powerful modular machine learning library available in Python.
    PyBrain stands for Python Based Reinforcement Learning, Artificial Intelligence,
    and Neural Network Library. For entry-level data scientists, it offers flexible
    modules and algorithms for advanced research. It has varieties for algorithms
    for evolution, neural networks, supervised and unsupervised learning. For real-life
    tasks, it has emerged as the best tool which is developed across the neural network
    in the kernel.


    ## 8. SciKit-Learn


    Scikit-Learn is a simple tool for data analysis and mining-related tasks. It is
    open-source and licensed under the BSD. Anyone can access or reuse it in various
    contexts. SciKit is developed over the NumPy, SciPy, and Matplotlib. It is being
    used for classification, regression and clustering to manage spam, image recognition,
    drug response, stock pricing, customer segmentation etc. It also allows dimensionality
    reduction, model selection and pre-processing.


    ## 9. Matplotlib


    This 2D plotting library of Python is very famous among data scientists for designing
    varieties of figures in multiple formats which is compatible across their respected
    platforms. One can easily use it in their Python code, IPython shells or Jupyter
    notebook, application servers. With Matplotlib, you can make histograms, plots,
    bar charts, scatter plots etc.


    ## 10. Bokeh


    Bokeh is one more visualization library for designing interactive plots. Just
    like the last one, it is also developed on Matplotlib. Due to the used data-driven
    documents support, it presents interactive designs in the web browser.


    ## 11. TensorFlow


    This open source library was designed by Google to compute data flow graphs with
    the empowered machine learning algorithms. It was designed to fulfill high demand
    for the training neural networks work. It is not just limited to the scientific
    computations performed by Google rather it is widely being used in the popular
    real-world application.


    Due to its high performance and flexible architecture the deployment for all CPUs,
    GPUs or TPUs becomes easy task performing PC server clustering to the edge devices.


    ## 12. Seaborn


    Seaborn was designed to visualize the complex statistical models. It has the potential
    to deliver accurate graphs such as heat maps. Seaborn was created on the concept
    of Matplotlib and somehow it is highly dependent on that. Minor to minor data
    distributions can be easily visualized through this library which is why it has
    become familiar among data scientists and developers.


    ## 13. Plotly


    Let’s talk about the Plotly which is one of the most famous web-based frameworks
    for data scientists. This toolbox offers designing of visualization models with
    varieties of APIs supported by multiple programming languages including Python.
    You can easily use interactive graphics and numerous robust accessible through
    its main website plot.ly. For using Plotly in your working model you need to set
    up available API keys properly.'
  mdcn: '## 数据分析与库


    Python语言已经在协助开发者创建PC游戏、移动应用和其他企业应用程序。拥有超过137,000个库的Python以多种方式提供帮助。在这个以数据为中心的世界里，消费者在购买过程中要求获得相关信息，公司也需要数据科学家通过处理海量数据集来获取有价值的洞察。


    这些信息引导他们进行关键决策、简化业务运营以及完成成千上万项需要有价值信息才能高效完成的任务。随着对数据科学家需求的增加，初学者和专业人士都在寻找资源来学习这门分析和呈现数据的艺术。有一些Python库在与数据科学相关的整个操作中非常有帮助...


    ## 1. NumPy


    NumPy是那些了解处理数据相关技术的开发者和数据科学家的首选。它是一个可用于执行科学计算的Python包，注册在BSD许可证下。通过NumPy，你可以利用n维数组对象、基于C、C++、Fortran程序的集成工具，以及执行复杂数学运算（如傅里叶变换、线性代数、随机数等）的函数。


    你也可以将NumPy用作多维容器来处理通用数据。因此，你可以通过选择多种操作来有效地集成你的数据库。NumPy安装在TensorFlow和其他复杂的机器学习平台之下，为其内部操作提供支持。


    由于它是一个数组接口，它允许我们有多种选择来重塑大型数据集。它可以用于处理图像、声波表示和其他二进制操作。


    如果你刚刚踏入数据科学或机器学习领域，你必须对NumPy有深入的理解，以便处理你的现实世界数据集。


    ## 2. Theano


    Theano是另一个有用的Python库，它帮助数据科学家执行与大型多维数组相关的计算操作。它更像TensorFlow，但唯一的区别是，它效率没那么高。


    它被用于基于分布式和并行计算的任务。通过它，你可以优化、表达或评估你的数组支持的数学运算。它与NumPy紧密耦合，由实现的numpy.ndarray函数提供支持。


    由于基于GPU的基础设施，它能够以比CPU更快的方式处理操作。它适合速度和稳定性优化，为我们提供预期的结果。


    为了更快的评估，其动态C代码生成器在数据科学家中很受欢迎。在这里，他们可以执行单元测试以识别整个模型中的缺陷。


    ## 3. Keras


    Keras是最强大的Python库之一，它允许用于集成的高级神经网络API。这些API在TensorFlow、Theano和CNTK之上执行。Keras的创建是为了减少复杂研究中面临的挑战，允许它们更快地计算。对于那些使用深度学习库进行工作的人来说，Keras是最佳选择。


    它允许快速原型设计，单独支持循环网络和卷积网络，也支持它们的组合，可以在GPU和CPU上执行。


    Keras提供了一个用户友好的环境，通过简单的API减少你在认知负荷上的努力，为我们提供所需的结果。由于其模块化特性，你可以使用来自神经层、优化器、激活函数等各种模块来开发新模型。


    它是一个用Python编写的开源库。对于在添加新模块方面有困难的数据科学家来说，Keras是一个不错的选择，他们可以简单地将新模块作为类和函数添加。


    ## 4. PyTorch


    PyTorch被认为是数据科学家和研究人员最大的机器学习库之一。它帮助他们设计动态计算图、通过GPU加速的快速张量计算以及其他各种复杂任务。在神经网络算法中，PyTorch
    API发挥着有效的作用。


    混合前端PyTorch平台非常易于使用，允许我们转换到图模式进行优化。为了在异步集合操作中获得准确结果并建立点对点通信，它为用户提供了原生支持。


    通过原生的Open Neural Network Exchange（简称ONNX）支持，可以导出模型以利用可视化工具、平台、运行时和各种其他资源。PyTorch最好的部分是它启用了基于云的环境，便于扩展部署或测试中使用的资源。


    它是在另一个名为Torch的机器学习库的概念上开发的。在过去几年里，由于以数据为中心的需求趋势，PyTorch在数据科学家中越来越受欢迎。


    ## 5. SciPy


    SciPy是另一个面向研究人员、开发者和数据科学家的Python库。不要将SciPy堆栈和库混淆。它提供统计、优化、积分和线性代数包用于计算。它基于NumPy概念来处理复杂数学问题。


    它提供用于优化和积分的数值例程。它继承了多种子模块可供选择。如果你刚刚开始你的数据科学生涯，SciPy可以在整个数值计算过程中为你提供很大帮助。


    我们可以看到Python编程如何帮助数据科学家处理和分析大型非结构化数据集。其他库如TensorFlow、SciKit-Learn、Eli5也可在整个过程中为他们提供帮助。


    ## 6. Pandas


    Pandas被称为Python数据分析库。这个库是另一个开源Python库，用于提供高性能数据结构和分析工具。它是在NumPy包上开发的。它包含DataFrame作为其主要数据结构。


    通过DataFrame，你可以通过操作行和列来存储和管理来自表格的数据。像方括号符号这样的方法减少了人们在数据分析任务中的工作量。在这里，你将获得用于访问内存中数据结构的工具，即使它们是CSV、SQL、HDFS或Excel等多种格式，也能执行读写任务。


