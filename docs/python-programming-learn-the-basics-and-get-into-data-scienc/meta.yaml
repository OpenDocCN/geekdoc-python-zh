  md: '# Data Analysis with Pandas


    Pandas, probably is the most popular library for data analysis in Python programming
    language. This library is a high-level abstraction over low-level NumPy which
    is written in pure C. It is quite high level, so you don’t have to muck about
    with low level details, unless you really want to.


    If you are dealing with complicated or large datasets, seriously consider Pandas.
    It is based on numpy or scipy, sort of a superset of it. But it gives you a lot
    of powerful features, like read directly from a Microsoft Excel file, do data
    joins and some of which features we will go over.


    Pandas has two basic data structures: Series and Dataframes.


    Series is like numpy’s array or dictionary, though it comes with a lot of extra
    features. Dataframes is a two dimensional data structure that contains both column
