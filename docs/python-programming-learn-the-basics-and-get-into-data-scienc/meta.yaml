    to new data and to grow. Its goal is to understand and follow the methods by using
    algorithms to do that task automatically without any human assistance. In 1959,
    Arthur Samuel defined machine learning as a "Field of study that gives computers
    the ability to learn without being explicitly programmed".


    ML algorithms are increasingly being used, and there are many reasons for this.
    The main reason is because machine learning has a system that is trained on some
