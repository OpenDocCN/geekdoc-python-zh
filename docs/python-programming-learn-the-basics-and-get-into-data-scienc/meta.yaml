    ## The history of Python and programming languages


    Do you know that you can “communicate” with your computer and it can understand
    you really clearly? Do you ever imagine what kind of language can you use to give
    an order to your computer?


    That type of language that you can use to communicate mechanically to your computer
    and give him orders, is called programming language or computer language…


    A programming language is a formal language, which is built of set of instructions
    that produce various kinds of output. Programming languages are used in computer
    programming to implement algorithms, in software engineering for building various
    softwares and programs, in digital development for creating websites, web applications,
    mobile applications and similar things.


    There are programmable machines that use a set of specific instructions, rather
    than general programming languages. Since the early 1800s, programs have been
    used to direct the behavior of machines such as Jacquard looms, music boxes and
    player pianos. The programs for these machines did not produce different behavior
    in response to different inputs or conditions.


    Thousands of different programming languages have been created till today and
    more are being created every year. Many programming languages are written in an
    imperative form while others languages use the declarative form.


    At the University of Manchester, Alick Glennie developed Autocode in the early
    1950s. As a programming language, it was powered with compiler to automatically
    convert the language into machine code. The first code and compiler was developed
    in 1952 for the Mark 1 computer that will be located at the University of Manchester
    and it is considered to be the first compiled high-level programming language.


    In 1954, FORTRAN was invented at IBM by John Backus. It was the first worldwide
    high-level general purpose programming language which had a functional implementation
    as opposed to just paper design. It is still a popular language for high-performance
    computing and it is used for programs that benchmark and rank the world''s fastest
    supercomputers with extremely high prices and large memory in petabytes.


    As the programming and computer’s world started with the huge rise, the programming
    languages started to be intended more and more in various development sectors
    and industries around the world. So, one of these well-known and popular programming
    languages is Python.


    Python is a high-level, general-purpose programming language. Created by Guido
    van Rossum in 1991, Python is designed with philosophy emphasizes code readability
    with its notable use of significant whitespace. Python construction and object-oriented
    approach aim to help programmers write clear, logical code for small and large-scale
    projects. It supports multiple programming paradigms, including procedural, object-oriented,
    and functional programming. Python is often described as a "batteries included"
    language due to its comprehensive standard library.


    Python 2.0 was released on 16th of October 2000 with many new features, including
    a cycle-detecting garbage collector and support for Unicode.


    Python 3.0 was released on 3rd of December 2008. It was a major revision of the
    language that is not completely backward-compatible.


    Due to concern about the amount of code written for Python 2, support for Python
    2.7 was extended to 2020. Language developer Guido van Rossum sold the responsibility
    for the project until July 2018, but now shares his leadership as a member of
    a five-person steering council.


    Python interpreters are available for many operating systems. A global community
    of programmers develops and maintains CPython, an open source reference implementation.
    A non-profit organization named as the Python Software Foundation, manages and
    directs resources for Python, CPython and IPython development.


    ## Introduction


    Today we have a lot of programming languages that can realize our needs, but the
    most important question is how to teach programming to beginner students. In this
    eBook we suggest using Python for this purpose, because it is a programming language
    that has neatly organized syntax and powerful tools to solve any task. Moreover
    it is very close to simple math thinking.


    Python is chosen as a primary programming language for freshmen in most of leading
    universities. Writing code in python is easy. In this paper we give some examples
    of program codes written in Java, C++ and Python language, and we make a comparison
    between them. Firstly, this paper proposes advantages of Python language in relation
    to C++ and JAVA. Then it shows the results of a comparison of short program codes
    written in three different languages, followed by a discussion on how students
    understand programming.


    Finally experimental results of students’ success in programming courses are shown
    before starting with Python programming, you need to pick an interpreter to interpret
    and run the programs properly. There are many interpreters available for free
    to run Python scripts like Integrated Development Environment or in short IDLE,
    which is installed when you install the Python software on your computer.


    If you are a Linux operating system user, Python programming language and its
    interpreter comes bundled with the operating system package and its distribution.


    There are no separate compilation and execution steps in Python programming, like
    C and C++. This programming language is directly run the program from the source
    code. Python converts the source code into an intermediate form called “bytecodes”
    which is then translated into native language of specific computer to run it.
    You don’t need to initialize the libraries before you start with coding because
    they are managed and linked by themselves.


    Python programs can be developed and executed on multiple operating system platforms
    like Linux, Windows, Mac, Solaris and so on. It is free and open source programming
    language and that means that you can manage and organized for your needs and wishes.'
