- md: 'Perhaps the biggest difference between Python and Smalltalk is Python''s more
    mainstream syntax, which gives it a leg up on programmer training. Like Smalltalk,
    Python has dynamic typing and binding, and everything in Python is an object.
    However, Python distinguishes built-in object types from user-defined classes,
    and currently doesn''t allow inheritance from built-in types. Smalltalk''s standard
    library of collection data types is more refined, while Python''s library has
    more facilities for dealing with Internet and WWW realities such as email, HTML
    and FTP.


    Python has a different philosophy regarding the development environment and distribution
    of code. Where Smalltalk traditionally has a monolithic "system image" which comprises
    both the environment and the user''s program, Python stores both standard modules
    and user modules in individual files which can easily be re-arranged or distributed
    outside of the system.


    ## Python vs. C++


    Almost everything said for Java also applies for C++, where Python code is typically
    3-5 times shorter than equivalent Java code, it is often 5-10 times shorter than
    equivalent C++ code. Anecdotal evidence suggests that one Python programmer can
    finish in two months what two C++ programmers can''t complete in a year. Python
    shines as a glue language, used to combine components written in C++.


    ## Python vs. Lisp and Scheme


    These languages are close to Python in their dynamic semantics, but so different
    in their approach to syntax that a comparison becomes almost a religious argument.
    It should be noted that Python has introspective capabilities similar to those
    of Lisp and Python programs can construct and execute program fragments on the
    fly. Usually, real-world properties are decisive where Common Lisp is big in every
    sense and the Scheme world is fragmented between many incompatible versions, where
    Python has a single, free, compact implementation.


    ## Python vs. PHP


    From the development point of view, PHP is a web-oriented language. A PHP application
    is more like a set of individual scripts maybe even with a single semantic entry
    point.


    Python, on the other hand, is a versatile language which can be also applied for
    web development. A web application based on Python is a full-fledged application
    loaded into memory with its internal state, saved from the query to the request.


    Choosing between Python or PHP for web applications pay attention to these characteristics:


    - Popularity

    - Frameworks

    - Learning


    Trends and popularity mean a lot in today’s IT business. Some customers and product
    owners want to use only the most popular and hyped technologies for their projects.
    In such a case you can be a very skilled developer with no customers and jobs
    at all. That is why before learning anything make sure that the subject you want
    to know will be famous and not forgotten in 1, 5 or 10 years.


    However, PHP and Python are among the most popular programming languages in the
    world and you have nothing to worry about.


    PHP was used to build such giant websites as Wikipedia, Yahoo, WordPress, Friendster,
    MailChimp, Flickr and many others. But don''t think that Python is less used.
    The Python technology was used to build YouTube, Instagram, a desktop version
    of Dropbox, Reddit, Bitbucket, Quora, Spotify, Pinterest, internal services of
    Facebook and a part of PayPal system.


    The variety of tools is also extremely important while you are choosing your technology.
    It defines the simplicity and convenience of your work. If a technology offers
    multiple instruments for different tasks a programmer can be sure that he won''t
    have to do everything from scratch. The most popular frameworks for PHP are Laravel,
    Symfony, CodeIgniter, Yii 1 and 2, Phalcon and many others.


    These tools can help you create powerful and good looking applications. Python,
    on the other hand, can''t boast of such a number of frameworks. The most usable
    are Django and Flask but, assuring that it will change soon due to the growing
    community of Python programming language. It is usually the first question which
    a student wants to find out. The easier education process is, the faster he can
    start working and making money.


    The Python syntax is easier and simple to learn. Unfortunately, there is not the
    same about PHP. PHP programming language requires much more time and efforts to
    master. Python lets you make minor mistakes without code breakages. It gives newbies
    some confidence to move on with studying.


    From the beginners’ perspective, you may want to choose something easier, something
    more flexible and it is Python. Python allows you to create secure applications
    while PHP requires additional tools for these purposes. But don''t forget that
    PHP was created specifically for web development and it is used here more often.


    ## Python vs. C#


    In terms of simplicity, Python was originally made to look like English speech,
    so many expressions in it are very easy to read, especially if you use suitable
    variable names. In addition, due to simple syntax, there are no complicated constructions
    such as syntactic brackets, a huge number of word-modifiers, various C-like constructions
    and different ways to initialize variables. It all makes the code written in Python
    easy for understanding and for learning.


    At the same time, C#, due to the language heredity, has lots of things from C++
    and Java, which is initially expressed in C-like syntax.


    What is more, C# syntax makes it necessary to follow certain rules when writing
    your own methods or inheriting classes, which are accompanied by another stream
    of word-modifiers.


    One doesn’t need to forget about blocks of code which should be ''wrapped'' in
    braces. Python doesn''t have it everything, but it uses shifts which also make
    the code look neat.


    As for the script writing, it is probably worth to mention that programs which
    Python calls scripts are actually scripts, they are just files with code that
    can be easily executed by the interpreter. One can open them in any editor, work
    with them and then immediately run again. It is a huge advantage if there is no
    IDE or a compiler at hand. Moreover, with Python it is much easier to write cross-platform
    scripts which do not even need to be recompiled.


    As a cons of Python, can be highlight the need for an installed interpreter on
    the machine with scripts. Well, or at least an interpreter packed together with
    the script in one package or executable file. As a result, it will increase the
    size of the script from a couple of kilobytes to a dozen megabytes.


    In return, C# requires IDE for normal programming. As a plus of C#, it has a very
    strong support for various components of the Windows system when you are writing
    scripts for Windows. For example, there are built-in tools for working with the
    registry, WMI, the network and so on. C# allows you to use Win Forms, which makes
    it very easy to create a graphical interface if it is suddenly needed after all.


    Python is easier to learn, it has many more open source libraries compared to
    C#. So, the standard library of C# is better than Python''s. On the other hand,
    C# has more features and its performance is higher and it evolves really fast.


    ## Introduction to Data Science


    Data Science is not a certain or a single one the kingdom, it is like a combination
    of various disciplines that are focusing on analyzing data and finding the best
    solutions based on them. Initially, those tasks were held by math or statistics
    specialists, but then data-experts began to use machine learning and artificial
    intelligence, which added optimization and computer science as a method for analyzing
    data. This new approach turned out to be much faster and effective, and so extremely
    popular.


    So, the popularity of Data Science lies in the fact that it encompasses the collection
    of large arrays of structured and unstructured data and their conversion into
    human-readable format, including visualization, work with statistics and analytical
    methods, machine and deep learning, probability analysis and predictive models,
    neural networks and their application for solving actual problems.


    Artificial Intelligence, machine learning, deep learning and data science undoubtedly,
    are the most popular technology sectors today. Although, they are somehow related,
    they are not the same.'
