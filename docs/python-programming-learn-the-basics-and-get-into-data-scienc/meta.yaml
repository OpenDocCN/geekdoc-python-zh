    - Open Jupyter Notebook and load the library.

    - See how the library works, using the instructions for working with the library.

    - Allocate 30 minutes for the study of reference information.


    Using this learning path, you will master the library enough to start using it
    in your work.


    First, start learning NumPy as it is the fundamental package for scientific computing
    with Python. A good understanding of Numpy will help you use tools like Pandas
    more effectively.


    The things you should learn about Numpy:


    +   - basic concepts of Numpy

    - The most frequently performed operations in Numpy

    - Indexing and slicing of arrays

    - Indexing using integer arrays

    - Transposing an array

    - Universal functions,

    - Data processing using arrays

    - Frequently used statistical methods


    Pandas contain high-level data structures and manipulation tools to make data
    analysis fast and easy in Python. Work with this library is built on top of NumPy.


    Things you shoul learn about Pandas:


    +   - Series

    - Data frames

    - Dropping entries from an axis'
  - '[PAGE 28]


    +   - Working with missing values


    For two-dimensional or three-dimensional data visualization, you can learn more
    about Matplotlib. It is cumbersome yet powerful tool. With Matplotlib you can
    quickly generate line graphs, histograms, pie charts, and much more.


    Things you should learn about Matplotlib are creating different types of visualizations
    depending on the message you want to convey and learning how to build complex
    and customized plots based on real data.


    There are so many additional Python libraries, here are the most used:


    Scipy is a Python module for linear algebra, integration, optimization, statistics
    and other frequently used tasks in data science. It is highly user-friendly and
    provides for fast and convenient N-dimensional array manipulation.


    PyTorch is based on Torch, is an open-source Machine Learning library that was
    primarily built for Facebook’s artificial intelligence research group. While it
    is a great tool for natural language processing and deep learning, it can also
    be leveraged effectively for data science.


    Scikit-learn is a module focused on Machine Learning that is built on top of SciPy.
    The library provides a common set of ML algorithms through its consistent interface
    and helps users quickly implement popular algorithms on data sets. It also has
    all the standard tools for common ML tasks like classification, clustering, and
    regression.


    Practice makes perfect and especially when it comes to data science.


    Now the ball is in the court of practice and starts analytic work with Python.
    For me personally, the most effective solutions at this stage is to participate
    in Kaggle contests, to invent and solve a problem yourself, to complete a practical
    course on data analysis in Python.


    Kaggle often holds data analysis contests. The first one need to participate in
