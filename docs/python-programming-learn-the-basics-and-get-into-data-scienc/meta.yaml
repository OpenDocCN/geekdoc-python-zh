    learning is so faster than human beings, it invests time and teaches itself from
    the data that is given to the machine or from the mistakes it does. This took
    several years of working on it until it gets it right by many parameters. In present,
    ML is used to discover the features of relevant data in disordered datasets.


    Machine learning is closely related to computational statistics, which focuses
    on making predictions using computers. The study of mathematical optimization
    delivers methods, theory and application domains to the field of machine learning.
    Data mining is a field of study within machine learning, and focuses on exploratory
    data analysis through unsupervised learning. In its application across business
    problems, machine learning is also referred to as predictive analytics.


    Machine learning tasks are classified into several broad categories. In supervised
    learning, the algorithm builds a mathematical model from a set of data that contains
    both the inputs and the desired outputs. For example, if the task were determining
    whether an image contained a certain object, the training data for a supervised
    learning algorithm would include images with and without that object, and each
    image would have a label designating whether it contained the object. In special
    cases, the input may be only partially available or restricted to special feedback.
    Semi-supervised learning algorithms develop mathematical models from incomplete
    training data, where a portion of the sample input doesn''t have labels.


    Classification algorithms and regression algorithms are types of supervised learning.
    Classification algorithms are used when the outputs are restricted to a limited
    set of values. For a classification algorithm that filters emails, the input would
    be an incoming email, and the output would be the name of the folder in which
    to file the email. For an algorithm that identifies spam emails, the output would
    be the prediction of either "spam" or "not spam", represented by the Boolean values
    true and false. Regression algorithms are named for their continuous outputs,
    meaning they may have any value within a range. Examples of a continuous value
    are the temperature, length, or price of an object.


