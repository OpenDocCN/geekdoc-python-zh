    This section will introduce three popular classification techniques: Logistic
    Regression, Discriminant Analysis, and Nearest Neighbor. We will investigate what
    their strengths and weaknesses are by looking at the decision boundaries they
    can model.


    Logistic regression can be viewed as an extension of linear regression to classification
    problems. One of the limitations of linear regression is that it cannot provide
    class probability estimates. This is often useful, for example, when we want to
    inspect manually the most fraudulent cases.


    Linear discriminant Analysis or in short LDA is another popular technique which
    shares some similarities with LogisticRegression. LDA too finds linear boundary
    between the two classes where points on side are classified as one class and those
    on the other as classified as the other class.


    The major difference between LDA and LogisticRegression is the way each picks
    the linear decision boundary: Linear Discriminant Analysis models the decision
    boundary by making distributional assumptions about the data generating process
    while Logistic Regression models the probability of a sample being member of a
    class given its feature values.


    The Nearest Neighbor differs fundamentally from the above models in that it is
    a so-called non-parametric technique. The number of parameters of the model can
    grow infinitely as the size of the training data grows. Furthermore, it can model
    non-linear decision boundaries, something that is important for the first two
    datasets, moons and circles.


    In Supervised Learning, we have a dataset consisting of both features and labels.
