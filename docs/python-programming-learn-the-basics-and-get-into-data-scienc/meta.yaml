    Python and Perl come from a similar background - Unix scripting, which both have
    long outgrown and spot many similar features, but have a different philosophy.
    Perl emphasizes support common application-oriented tasks, for example by having
    built-in regular expressions, file scanning and report generating features.


    Python emphasizes support common programming methodologies such as data structure
    design and object-oriented programming and encourages programmers to write readable
    and maintainable code by providing an elegant, but not overly cryptic notation.
    As a consequence, Python comes close to Perl but beats it in its original application
    domain. However, Python is a well applied programming language beyond Perl''s
    niche.


    # Python vs. Tcl


    Like the Python programming language, Tcl is usable as an application extension
    language, as well as a stand-alone programming language. Tcl programming language,
    which traditionally stores all data as strings, is weak on data structures and
    executes typical code much slower than Python.


    Tcl also lacks features needed for writing large programs, such as modular namespaces.
    While a typical large application using Tcl usually contains Tcl extensions written
    in C or C++ that are specific to that application, an equivalent Python application
    can often be written in "pure" Python. Of course, pure Python development is much
    quicker than having to write and debug a C or C++ component.


    Python has adopted an interface to Toolkit as its standard GUI component library.


    Tcl 8.0 locates the speed issues by providing a bytecode compiler with limited
    data type support and adds namespaces. However, it is still a much more weird
    programming language.


