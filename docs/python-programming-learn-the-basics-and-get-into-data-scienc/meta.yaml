    OneR is a simple algorithm that simply predicts the class of a sample by finding
    the most frequent class for the feature values. OneR is a short hand for One Rule,
    indicating we only use a single rule for this classification by choosing the feature
    with the best performance. While some of the later algorithms are significantly
    more complex, this simple algorithm has been shown to have good performance in
    a number of real-world datasets.


    The algorithm starts by iterating over every value of every feature. For that
    value, count the number of samples from each class that have that feature value.
    Record the most frequent class for the feature value, and the error of that prediction.
    For example, if a feature has two values, 0 and 1, we first check all samples
    that have the value 0. For that value, we may have 20 in class A, 60 in class
    B, and a further 20 in class C. The most frequent class for this value is B, and
    there are 40 instances that have difference classes.


    The prediction for this feature value is B with an error of 40, as there are 40
    samples that have a different class from the prediction. We then do the same procedure
    for the value 1 for this feature, and then for all other feature value combinations.


    Overfitting is the problem of creating a model that classifies our training dataset
    very well, but performs poorly on new samples. The solution is quite simple. Never
    use training data to test your algorithm.'
