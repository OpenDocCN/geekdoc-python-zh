    # 2. Jupyter


    Jupyter Notebook, formerly IPython Notebooks, is a web-based interactive computational
    environment for creating Jupyter notebook documents. The "notebook" term can colloquially
    make reference to many different entities, mainly the Jupyter web application,
    Jupyter Python web server or Jupyter document format depending on context. A Jupyter
    Notebook document is a JSON document, following a versioned schema, and containing
    an ordered list of input or output cells which can contain code, text, mathematics,
    plots and rich media, usually ending with the ".ipynb" extension.


    A Jupyter Notebook can be converted to a number of open standard output formats
    through "Download As" in the web interface, via the nbconvert library or "jupyter
    nbconvert" command line interface in a shell.


    To simplify visualisation of Jupyter notebook documents on the web, the nbconvert
    library is provided as a service through NbViewer which can take a URL to any
    publicly available notebook document, convert it to HTML on the fly and display
    it to the user.


    Jupyter Notebook provides a browser-based REPL built upon a number of popular
    open-source libraries:


    +   - IPython

    - OMQ

    - Tornado

    - jQuery

    - Bootstrap

    - MathJax


    A Jupyter kernel is a program responsible for handling various types of request,
    like code execution, code completions, inspection and providing a reply. Kernels
    talk to the other components of Jupyter using ZeroMQ over the network, and thus
    can be on the same or remote machines.


    Unlike many other Notebook-like interfaces in Jupyter, kernels are not aware that
    they are attached to a specific document, and can be connected to many clients
    at once. Usually kernels allow execution of only a single language, but there
    are a couple of exceptions.'
  - '[PAGE 71]


    JupyterHub is a multi-user server for Jupyter Notebooks. It is designed to support
    many users by spawning, managing, and proxying many singular Jupyter Notebook
    servers. While JupyterHub requires managing servers, third-party services like
    Jupyo provide an alternative to JupyterHub by hosting and managing multi-user
    Jupyter notebooks in the cloud.


    JupyterLab is the next-generation user interface for Project Jupyter. It offers
    all the familiar building blocks of the classic Jupyter Notebook in a flexible
    and powerful user interface. The first stable release was announced on February
    20, 2018.


    For learners as well as for more advanced data scientists, the Jupyter Notebook
    is one of the popular data science tools out there. The interactive environment
    is not only ideal to teach and learn with, and to share your work with peers,
    but also ensures reproducible research. Yet, as you are discovering how to work
    with this notebook, you will often bump into IPython.


    Many computational notebooks were created after the Maple and Mathematics notebooks.
    This section, however, will focus on the notebooks that have contributed to the
    rise of data science notebooks.


    The Sage notebook as a browser-based system was first released mid-2000s and then
    in 2007, a new version was released that was more powerful, that had user accounts
    and could be used to make documents public. It resembled the Google Docs UI design
    since the layout of the Sage notebook was based on the layout of Google notebooks.


    In late 2001, roughly twenty years after Guido van Rossum began to work on Python
    at the National Research Institute for Mathematics and Computer Science in the
    Netherlands, Fernando Pérez started developing IPython. The project was heavily
    influenced by the Mathematica notebooks and Maple worksheets, just like the Sage
    notebook and many other projects that followed.


    The name “Jupyter” was inspired by thinking about the leading open languages for
    science and even though it might seem like any other acronym, it never meant that
    other languages were not welcome.


    R Markdown and the Jupyter Notebook share the delivering of a reproducible'
- md: 'workflow, the weaving of code, output, and text together in a single document,
    supporting interactive widgets and outputting to multiple formats.


    However, the two also differ, like the former focuses on reproducible batch execution,
    plain text representation, version control, production output and offers the same
    editor and tools that you use for R scripts. Notebooks have an emphasis on an
    interactive execution model. They don’t use a plain text representation, but a
    structured data representation, such as JSON.


    Of course, there are even more notebooks that you can consider when you are getting
    into data science. In recent years, a lot of new alternatives have found their
    way to data scientists and data science enthusiasts. Think not only of Beaker
    Notebook, Apache Zeppelin, Spark Notebook, DataBricks Cloud, etc., but also of
    other tools such as the Rodeo IDE or nteract which also make your data science
    analyses interactive and reproducible. A good thing to note here is that nteract
    differs from the other tools that are mentioned here because it makes use of the
    Jupyter architecture, such as the protocols and the formats.


    And notebooks seem to be here to stay. Recently, the next generation of the Jupyter
    Notebook has been introduced to the community: JupyterLab. The Notebook application
    includes not only support for Notebooks but also a file manager, a text editor,
    a terminal emulator, a monitor for running Jupyter processes, an IPython cluster
    manager and a pager to display help.


    You might think now that this is nothing new. The Jupyter Notebook also has all
    these things. JupyterLab, however, enables you to make use of all these building
    blocks of interactive computing in novel ways.


    It is possible to adapt IPython for system shell usage with the shell escape.
    Lines that start with ‘!’ are passed directly to the system shell. For example,
    ‘!ls ‘ will run ls in the current directory. You can assign the result of a system
    command to a Python variable with the syntax myfiles=!ls. However, if you want
    to get the result of an ls function explicitly printed out as a list with strings,
    without assigning it to a variable, use two exclamation marks (!!ls) or the %sx
    magic command without an assignment.


    Note that !! commands cannot be assigned to a variable, but that the result of
    a magic (as long as it returns a value) can be assigned to a variable.


    IPython also allows you to expand the value of Python variables when making system
    calls: just wrap your variables or expressions in braces ({}). Also, in a shell
    command with ! or !!, any Python variable prefixed with $ is expanded. In the
    code chunk below, you’ll see that you echo the argv attribute of the sys variable.
    Note that you can also use the $/$$ syntaxes to Python variables from system output,
    which you can later use for further scripting.


    To pass a literal $ to the shell, use a double $$. You’ll need this literal $
    if you want to access the shell and environment variables like $PATH.


    Note that besides IPython, there are also other kernels that have special syntax
    to make sure that lines are executed as shell commands. These aren’t really “magics”
    in the strictest sense of the word because they may implement it with any name
    they want and it can be completely different than the IPython magics.


    The IPython kernel uses, as you might already know, the % syntax element because
    it’s not a valid unary operator in Python. However, lines that begin with %% signal
    a cell magic: they take as arguments not only the rest of the current line, but
    all lines below them as well, in the current execution block. Cell magics can
    in fact make arbitrary modifications to the input they receive, which need not
    even be valid Python code at all. They receive the whole block as a single string.


    Magics are specific to and provided by kernels and are designed to make your work
    and experience within Jupyter Notebook a lot more interactive. Whether magic commands
    are available in a certain kernel depends on the kernel developer and on kernel
    per kernel.


    One major feature of the IPython kernel is the ability to display plots that are
    the output of running code cells. The kernel is designed to work seamlessly with
    the matplotlib data visualization library to provide this functionality. To make
    use of it, use the magic command %matplotlib.


    As such, your plot will be displayed in a separate window by default. Additionally,
    you can also specify a backend, such as inline or qt, the output of the plotting
    commands will be shown inline or through a different GUI backend.


    Next, you can also use magics to call up a Python debugger %pdb every time there
    is an uncaught exception. This will direct you through the part of the code that
    triggered the exception, which will make it possible rapidly find the source of
    a bug.


    You can also use the %run magic command with the ‘d’ option to run scripts under
    the Python debugger’s control. It will automatically set up initial breakpoints
    for you. Lastly, you can also use the %debug magic for even easier debugger access.


    You can use the %load_ext magic to load an IPython extension by its module name.
    IPython extensions are Python modules that modify the behaviour of the shell.
    Extensions can register magics, define variables, and generally modify the user
    namespace to provide new features for use within code cells. Here are some examples:


    - Use %load_ext oct2py.ipython to seamlessly call M-files and Octave functions
    from Python,

    - Use %load_ext rpy2.ipython to use an interface to R running embedded in a Python
    process,

    - Use %load_ext Cython to use a Python to C compiler,

    - Use sympy.init_printing() to pretty print Sympy Basic objects automatically


    If you are working with another kernel and you wonder if you can make use of magic
    commands, it might be handy to know that there are some kernels that build on
    the metakernel project and that will use, in most cases, the same magics that
    you will also find in the IPython kernel. You can find a list of the metakernel
    magics here. The metakernel is a Jupyter or IPython kernel template which includes
    core magic functions.


    Some examples:


    - The MATLAB kernel matlab_kernel,

    - The Octave kernel octave_kernel,

    - The Java9 kernel java9_kernel,

    - The Wolfram kernel wolfram_kernel,

    - The SAS kernel sas_kernel. … And many more!


    Converting and formatting notebooks are features that you will find in the Jupyter
    ecosystem. Two tools that you’ll typically find for these tasks are nbconvert
    and nbformat.


    You can use the former to convert notebooks to various other formats to present
    information in familiar formats, to publish research and to embed notebooks in
    papers, to collaborate with others and to share content with a larger audience.


    The latter basically contains the Jupyter Notebook format and is the key to understanding
    that notebook files are simple JSON documents that contain metadata the version
    of the notebook format and the cells in which all text, code is stored.


    Saving and loading notebooks is a feature of the Jupyter Notebook Application.
    You can load notebooks, saved as files with an .ipynb filename extension, which
    other people have created by downloading and opening up the file in the Jupyter
    application. More specifically, you can create a new notebook and then choose
    to open the file by clicking on the “File” tab, clicking “Open” and selecting
    your downloaded notebook.


    The parallel computing network was part of the IPython project, but as of 4.0,
    it is a standalone package called ipyparallel. The package is basically a collection
    of CLI scripts for controlling clusters for Jupyter.


    Even though it is split off, it is still a powerful component of the IPython ecosystem
    that is generally overlooked. It is so powerful because instead of running a single
    Python kernel and it allows you to start many distributed kernels over many machines.


    Typical use cases for ipyparallel are, for example, cases in which you need to
    run models many different times to estimate the distributions of its outputs or
    how they vary with input parameters. When the runs of the model are independent,
    you can speed up the process by running them in parallel across multiple computers
    in a cluster.


    This feature is one that is part of the Jupyter ecosystem. You have the Jupyter
    Console and a Jupyter terminal application. However, IPython has been used to
    indicate the original, interactive command-line terminal for Python. It offers
