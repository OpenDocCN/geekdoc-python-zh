    一旦变量被声明，它们就可以通过将它们设置为等于你计划存储的值来轻松定义，使用与赋值运算符相同的等号。因此，单个等号使程序能够将指定的变量放在右侧或左侧的任何一侧。设置变量后，即为每个变量赋值后，测试特定值以确定是否适合程序或直接使用它。


    例如，你可以使用某些代码检查inputVariable2是否小于50，然后根据它设置一个延迟时间，最小值为50。因此，该实例测试变量''if (inputVariable2
    <50)''，如果它在''inputVariable2 = 50''中，则设置一个给定变量，并使用操作''delay(inputVariable2)''延迟结果。使用变量时，确保它们具有更具描述性的名称以提高可读性。它还允许你和其他人理解变量的含义，以及在编程过程中的识别。


    ## 删除变量


    另一方面，如果你犯了错误，删除当前项目或只是删除所有内容，Python提供了一个有用的功能来删除任何变量并为存储其他值腾出空间。同样，有一些不需要的变量，你想删除，因此删除变量是你的选择。删除变量时，你必须小心避免删除变量内的必要值。因此，确保你了解要删除的变量的名称。


    如果你删除的文件与变量名不匹配，Python解释器通常会抛出错误消息；''NameError: name (filename) isn''t known.''。要有效删除变量，程序中存在一个命令；''del
    variable name''，变量将立即移除。在运行命令之前确保输入正确的名称。要确保文件是否已删除，你可以尝试打印，如果看到错误消息，则表明变量已成功删除。


    ## Python变量中的函数和集合


    在理解变量以及创建Python程序的一般操作之前，初学者掌握变量和集合以及函数的可能性很小。当提到集合、对象和函数时，它意味着计算机编程中的一个特殊因素。变量中函数的主要定义之一是，一组相关的语句、值和代码被排序并保存在一起以执行特定任务。


    另一方面，集合是一个集体术语，用于指代Python数据类型，具有可变、无重复、以无序方式组织。由于你正在学习Python变量，理解函数和集合有助于熟悉这些术语；因此，你可以轻松地与Python编程语言交互。请记住，集合提供了数据的特定索引顺序，而函数可能不需要任何输入，但完全在需要时执行。


    集合的一些标准特性包括每个值、数字、代码和项目没有特定顺序，项目是唯一的，集合是不可变的，并且它们提供修改，如添加和删除。在Python变量中使用集合的主要优点是，它优化了检查元素是否包含在正确集合中的策略。此外，它允许你添加或删除一些元素，但应该只是唯一的和不可变的。


    函数使程序更易于管理和组织，主要针对从事复杂任务的程序员。此类任务由较小且标准的代码块组成，从而提高可读性和可重用性。因此，Python提供三种类型的函数；Python内置函数、用户定义函数和匿名函数。函数只能最初命名、编写和执行，以执行特定类型的输入并构建所需的程序，这对初学者和程序员都至关重要。


    ## 第5章


    ## 数据结构


    在本章中，我们将探讨Python中的不同数据结构。


    ## 序列


    序列是Python中一个非常基本的术语，用于表示有序的值集合。Python中有多种序列数据类型：str、unicode、list、tuple、buffer和xrange。


    ## 元组


    元组由一些用逗号分隔的值组成。元组是Python中的一种序列数据类型，类似于字符串和列表。我们需要记住元组是不可变的。这意味着它们不能被修改。


    元组包含用逗号分隔的多个值。元组用括号括起来，而列表用方括号括起来。


    现在让我们看一个例子：


    ```

    >>> m = (14, 34, 56)

    >>> m

    (14, 34, 56)

    >>> m[0]

    14

    >>> m[ 0:2 ]

    (14, 34)

    ```


    元组还具有类似集合和切片的属性。元组可以嵌套。元组中的元素用()排序。


    现在让我们看一个例子：


    ```

    i = 1

    j = 2

    t1 = i, j # 是一个包含元素i和j的元组

    t2 = (3, 4, 5) # 是一个包含元素3,4和5的元组

    t3 = 0, t1, t2 # 是一个包含元素0, t1和t2的元组

    print t3 # 结果是 (0, (1, 2), (3, 4, 5))

    ```


    ## 列表


    列表由一些用逗号分隔的异构值组成，用[和]括起来，并从索引零开始。列表可用于分组其他值。与元组不同，列表是可变的。'
