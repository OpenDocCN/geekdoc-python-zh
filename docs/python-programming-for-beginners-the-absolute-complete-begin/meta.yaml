    ## 变量命名


    变量的命名仍然很简单，初学者和经验丰富的程序员都可以轻松执行此方法。但是，为这些变量提供标题需要遵循特定规则，以确保提供正确的名称。一致性、风格和遵守变量命名规则可确保你创建一个优秀且可靠的名称，供今天和将来使用。原则是：


