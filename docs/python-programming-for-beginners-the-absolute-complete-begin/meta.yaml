    - 保留字绝不能用作变量名


    在命名变量时，你应该记住系统区分大小写，因此避免在一个程序中创建相同的名称以防止混淆。命名时的另一个重要组成部分是考虑风格。它涉及以小写字母开始符号，同时在应用的单词或短语之间使用下划线。此外，程序通常禁止以大写字母开头。以小写字母开头，并混合或一致地使用它们。


