    ## 全局变量


    Python中使用的全局变量是一种多用途变量，可以在程序的任何部分、任何地方使用。所使用的变量可以在你的程序或模块中运行，无论身在何处，因此作为程序员，你可以在旅行时使用这些值。全局变量对于程序员在从一个地方移动到另一个地方时编写程序很有用。一些优点包括跨函数或模块使用的变量，以及无需重新声明即可执行。


    与局部变量相比，全局变量具有''f''作用域和详细值101，表示为''f=101''，作为输出发布。例如，当你在给定函数中重新声明一个变量为全局变量，在函数内修改它并在函数外打印它。该变量将提供一个全局有用的第三方结果。因此，全局变量位于函数外部，这意味着并非所有变量都可以从任何地方全局访问。作为初学者，了解全局变量和局部变量之间的区别对于开发适合你程序的必要变量至关重要。


    ## 局部变量


    与全局变量不同，局部变量在本地使用，在Python函数或模块内声明，并仅在特定程序或Python模块中使用。当在特定模块或任务之外实现时，Python解释器将无法识别这些单元，从而为未声明的值抛出错误消息。与全局变量类似，局部变量使用''f''变量，在声明处假定局部作用域并赋值''I
    am learning Python''，然后被识别为局部变量。


    例如，当你第二次声明变量''f''时，它会更改为一个新函数并导致一个局部变量。因此，当你在内部函数中接受该变量时，该方法将无问题地运行。执行之所以可能，是因为第二个print(f)产生了一个赋值给''f''的值，即Intellipaat。然而，当你在函数''f''外部打印该值时，它会导致一个赋值给它的值，该值在函数外部，即第三个print(f)。在这种情况下，局部变量仅在Python编程的两个周围环境中使用，函数外部的变量会导致操作失败，除非声明。


