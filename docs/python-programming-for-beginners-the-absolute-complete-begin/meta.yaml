- md: "## Compiler\n\nIn its operative function, a compiler translates the whole source\
    \ file into the readable machine language in one swoop. The machine language is\
    \ subsequently executed.\n\n## Interpreter\n\nOn the opposite hand, an interpreter\
    \ employs a line by line approach to translate a high-level language into machine\
    \ language, which is subsequently executed. The Python interpreter bags are the\
    \ highest of the file, translates the start line into machine language, and subsequently\
    \ executes it.\n\nIt is crucial to differentiate between high-level and compiled\
    \ languages. For instance, the compiled languages like C, and C++ use a compiler\
    \ to translate and interpret (high-level to machine language.) On the opposite\
    \ hand, an interpreted language like Python employs an interpreter to conduct\
    \ this approach of translation and subsequent execution. The important distinction\
    \ here between interpreted and compiled language is that the widely compiled language\
    \ operates and performs better compared to written programs that employ interpreted\
    \ languages. However Python doesn't suffer from this disadvantage.\n\nIn synthesis,\
    \ Python is an interpreted language because the program executes directly from\
    \ the source file. Whenever Python programs are run the source file is required.\
    \ What Python does is to convert the source file written by the developer into\
    \ an intermediate code which is then further converted into the machine language\
    \ able to be executed. Python is therefore an Interpreted language because it\
    \ is processed in real time by the interpreter. The source file doesn't got to\
    \ be compiled before its execution. Compiled means the code must be converted\
    \ to machine language before runtime.\n\n## Python is Dynamically Typed\n\nAnother\
    \ characteristic of Python is to be dynamically typed which suggests that data\
    \ types are checked on the fly, during execution vs statically typed when data\
    \ type are checked before run-time.\n\n## Python is Strongly Typed\n\nThe primary\
    \ feature of a strongly typed language is that it lacks the capacity to convert\
    \ one form (type) of knowledge to a different automatically. On the opposite hand,\
    \ languages like PHP and JavaScript, which are loosely typed, have the capacity\
    \ to convert data from one type to a different freely and automatically.\n\nIn\
    \ this regard, before adding 12 to the strong, the JavaScript language seeks to\
    \ convert the amount 12 to a robust “12”, which is subsequently appended to the\
    \ top of the strong.\n\nThe language (Python) would occasion a mistake because\
    \ it doesn't have the capacity to convert the number 12 into a robust.\n\nIn synthesis\
    \ Python may be a strongly typed language i.e. the sort of variables must be known.\
    \ This suggests that the sort of a worth doesn't change in unexpected ways. For\
    \ instance a string containing only number doesn't automatically become a variety,\
    \ as may happen in Perl. In Python, every data type change needs a particular\
    \ conversion.\n\n## Huge set of libraries\n\nPython provides users with a broad\
    \ range of libraries, which make it easy to feature new capacities and capabilities\
    \ without necessarily reinventing new approaches.\n\n## What sort of application\
    \ I can create using Python?\n\nSome of the most applications that Python is employed\
    \ include:\n\n- Games\n- Machine Learning and AI\n- Data Science and Data Visualization\n\
    - Web Development\n- Game Development\n- Desktop GUI\n- Web Scraping Applications\n\
    - Business Applications\n- Audio and Video Applications\n- CAD Applications\n\
    - Embedded Applications\n- System administration applications\n- GUI applications.\n\
    - Console applications\n- Scientific applications\n- Android applications\n\n\
