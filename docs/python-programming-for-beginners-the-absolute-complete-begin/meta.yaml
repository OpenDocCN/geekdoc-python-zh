- md: '## Chapter 2


    ## IDLE and Python Shell


    As we''ve seen, Python can be used in 2 main modes:


    1. Interactive mode, also referred to as via Python Shell

    2. Via Python IDLE


    As a reminder, the Python Shell, referred to as the prompt string, is prepared
    to simply accept commands. The Python shell allows typing Python code and getting
    the result immediately. The Python Shell is good for testing small chunks of code.
    The Python IDLE (IDLE or IDE stands for Integrated Development Environment) instead
    allows to do that also but gives far more functionalities. Therefore, we advise
    you to go straight for the Python IDLE. In order to start using Python IDLE, we
    recommend also to make a new directory, for instance “PythonPractice”, where you
    would like; in there you''ll save future Python files.


    ## Installing the Interpreter


    As a reminder, if not done yet before we can write our first Python program, we
    have to download the appropriate interpreter for our computers.


    We’ll be using Python 3 in this book because, as stated on the official Python
    site, “Python 2.x is legacy; Python 3.x is the present and future of the language”.
    “Python 3 excludes many quirks which can accidentally trip up new programmers”.
    Yet, note that Python 2 is currently still rather generally used. Python 2 and
    3 are about 90% similar. Hence, if you learn Python 3, you will likely have no
    problems understanding codes written in Python 2.


    To install the interpreter for Python 3, head over to


    https://www.python.org/downloads/ .


    The correct version should be indicated at the top of the webpage. We’ll be using
    version 3.6.1 in this book. Click on


    "Download Python 3.6.1" and the software will start downloading.


    Alternatively, if you would like to install a different version, scroll down the
    page and you will see a list of other versions. Click on the release version that
    you want. You will be redirected to the download page for that version.


    Scroll down towards the bottom of the page and you will see a table listing various
    installers for that version. Choose the right installer for your computer. The
    installer to use depends on two factors:


    1. The OS (Windows, Mac OS, or Linux) and

    2. The processor (32-bit vs 64-bit) that you are using.


