  mdcn: "## Python 类继承\n\n继承是面向对象编程中的一个特性，它允许一个类从父类（也称为基类）继承方法和属性。这是编程中一个非常便捷的特性，因为它允许程序员为一个类创建一组功能，然后将它们传递给子类。因此，程序将能够在子类中创建新的甚至覆盖现有的功能，而不影响父类的功能。\n\
    \n继承创建的子类将具有父类的特化。Python 中有四种继承类型：单继承、多级继承、层次继承和多重继承。\n\n## 单继承\n\n没有继承特性的编程类可以准确地称为基于对象的编程。程序运行时，应创建新的抽象数据类型，每个类型都有自己的操作。然而，面向对象编程与基于对象编程的区别在于继承。单继承是指一个类或子类从一个父类继承方法和属性。\n\
    \n## 多重继承\n\n在多重继承中，子类或子类从多个类继承方法和属性。例如，一个类 C 可以同时继承类 A 和类 B 的特性，就像孩子同时继承父母的特征一样。在某些情况下，子类可以继承两个以上父类的特性和功能。\n\
    \n子类可以继承方法和属性的父类数量没有限制。请注意，虽然多重继承以减少程序冗余而闻名，但它也可能给程序带来更高程度的复杂性和模糊性，因此在实现之前必须在程序设计中充分考虑。\n\
    \n## 多级继承\n\n我们已经确定 Python 中的一个类可以继承多个父类的特性。当一个类继承其他类的方法和函数，而这些类又从其他类继承这些方法和函数时，这种方法称为多级继承。与\
    \ C++ 和其他面向对象编程语言一样，Python 允许在任意深度实现多级继承。\n\n## 层次继承\n\n当多个类源自一个父类或基类时，就会发生层次继承。子类或子类继承的特性包含在父类中。层次继承与多级继承的区别在于建立类之间关系的顺序。在多级继承中，顺序可能是随意的，父类可以从先前的子类继承特性。\n\
    \n## 为什么继承在 Python 编程中有用？\n\n继承是面向对象编程的一个非常便捷的特性，因为它允许程序员轻松遵守软件开发最重要的原则之一——不要重复自己（DRY）。简单来说，在程序中实现类继承是用更少的代码行和更少的重复来获得更多功能的最有效方式。\n\
    \n继承还将迫使您更加关注编程的规划阶段，以确保您编写的程序代码清晰、简洁且有效。\n\n继承的另一个用途是为程序的不同部分添加功能。\n\n## 继承示例\n\
    \n在 Python 中，这是通过派生类来完成的。假设我们有一个名为 SportsCar 的类。\n\n```python\nclass Vehicle(object):\n\
    \    def __init__(self, makeAndModel, prodYear, airConditioning):\n        self.makeAndModel\
    \ = makeAndModel\n        self.prodYear = prodYear\n        self.airConditioning\
    \ = airConditioning\n        self.doors = 4\n    def honk(self):\n        print\
    \ \"%s says: Honk! Honk!\" % self.makeAndModel\n```\n\n现在，在它下面，创建一个名为 SportsCar\
    \ 的新类，但不是派生 object，而是从 Vehicle 派生。\n\n```python\nclass SportsCar(Vehicle):\n \
    \   def __init__(self, makeAndModel, prodYear, airConditioning):\n        self.makeAndModel\
    \ = makeAndModel\n        self.prodYear = prodYear\n        self.airConditioning\
    \ = airConditioning\n        self.doors = 4\n```\n\n省略 honk 函数，我们这里只需要构造函数。\n\n\
    现在声明一辆跑车。我打算用法拉利。\n\n```python\nferrari = SportsCar(\"Ferrari LaFerrari\", 2016,\
    \ True)\n```\n\n现在通过调用来测试这个\n\n```python\nferrari.honk()\n```\n\n然后保存并运行。它应该毫无问题地运行。为什么？这是因为继承的概念表明，子类从父类派生函数和类变量。这个概念很容易理解。下一个可能有点难。\n\
    \n## 类多态性和抽象\n\n在计算中，多态性和抽象是高级编程特性，它们扩展了继承的应用和实用性。\n\n多态性意味着如果一个类 Y 从类 X 继承，它不一定需要继承该类的所有内容。它可以以不同的方式实现一些继承的方法和属性。Python\
    \ 作为隐式多态语言，可以重载运算符以根据单个上下文赋予它们所需的行为。多态性的概念是，根据情况的需要，相同的过程可以以多种方式执行。这在 Python 中可以通过两种方式完成：方法重载和方法重写。\n\
    \n方法重载是用不同的参数两次定义相同的函数。例如，我们可以为 Vehicle 类提供两个不同的初始化函数。目前，它只假设有 4 个门。如果我们想具体说明汽车有多少个门，我们可以在当前初始化函数下面创建一个新的初始化函数，带有另一个\
    \ doors 参数，如下所示（较新的在底部）：\n\n```python\ndef __init__(self, makeAndModel, prodYear,\
    \ airConditioning):\n    self.makeAndModel = makeAndModel\n    self.prodYear =\
    \ prodYear\n    self.airConditioning = airConditioning\n    self.doors = 4\n\n\
    def __init__(self, makeAndModel, prodYear, airConditioning, doors):\n    self.makeAndModel\
    \ = makeAndModel\n    self.prodYear = prodYear\n    self.airConditioning = airConditioning\n\
    \    self.doors = doors\n```\n\n现在，当创建 Vehicle 类的实例时，可以选择是否定义门的数量。如果不定义，则假定门的数量为\
    \ 4。方法重写是子类用自己的代码覆盖父类的函数。例如，创建另一个扩展 Vehicle 的类 Moped。将门设置为 0，因为这很荒谬，并将空调设置为 false。唯一相关的参数是型号/品牌和生产年份。它应该看起来像这样：\n\
    \n```python\nclass Moped(Vehicle):\n    def __init__(self, makeAndModel, prodYear):\n\
    \        self.makeAndModel = makeAndModel\n        self.prodYear = prodYear\n\
    \        self.airConditioning = False\n        self.doors = 0\n```\n\n现在，如果我们创建一个\
    \ Moped 类的实例并调用 honk() 方法，它会鸣笛。但众所周知，轻便摩托车不鸣笛，它们发出哔哔声。所以让我们用自己的代码覆盖父类的 honk 方法。这非常简单。我们只需在子类中重新定义函数：\n\
    \n```python\ndef honk(self):\n    print \"%s says: Beep! Beep!\" % self.makeAndModel\n\
    ```\n\n我是 2.99 亿美国人中的一员，如果他们的生命依赖于此，他们也说不出轻便摩托车的品牌和型号，但你可以通过声明一个 Moped 类的实例并尝试一下来测试这是否有效。\n\
    \n## 抽象\n\n抽象对于当今正在编写的大量应用程序来说通常是一个净积极因素，这也是 Python 和其他面向对象编程语言如此受欢迎的原因。抽象是通过建模类来处理特定问题，从而简化复杂现实的过程。抽象类不能被实例化，您既不能为它们创建类实例，也不能创建对象。抽象类旨在从基类继承所有或仅特定特性。抽象本质上使语言更容易理解、阅读和学习。虽然它通过移除用户对整个计算机架构的一些控制权而使语言稍微不那么强大，但这被换取了在语言中快速高效编程的能力，而无需浪费时间处理内存地址或类似事物的琐事。这些在\
    \ Python 中适用，因为，嗯，它非常简单。您无法深入了解计算机的细节，也无法轻松地进行内存分配或甚至专门分配数组大小，但这是为了出色的可读性、在高度安全环境中的高度安全语言以及与编程的简单使用而进行的权衡。比较以下内容：\n\
    \nC 语言的代码片段：\n\n```c\n#include\nint main(void) {\n    printf(\"hello world\");\n\
    ```"
