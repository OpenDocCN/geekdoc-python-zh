  mdcn: "## 如果条件判断表达式不为真（False，或由0表示），则else程序块内的程序语句将不会执行。如果存在多个判断，通常会使用elif指令。\n\n\
    if条件语句的语法如下：\n\n```\n# 如果条件判断表达式成立，则执行此程序块内的程序语句\nElse :\n```\n\n# 如果条件不成立，则执行此程序块内的程序语句。如果我们希望判断变量a的值是否大于或等于变量b的值，条件判断表达式可以写成如下形式：\n\
    \n```\nIf a >= b:\n```\n\n# 如果A大于或等于B，则执行此程序块内的程序语句\n\n```\nElse :\n```\n\n# 如果a不大于或等于b，则if...else条件语句中的此程序块内的程序语句将不会执行。\n\
    \n在使用if...else条件语句时，如果条件不满足，无需执行任何程序语句，此时else部分可以省略。\n\n# if条件判断表达式\n\n# 如果条件满足，则执行此程序块内的程序语句。此外，如果if...else条件语句使用了如“and”之类的逻辑运算符，建议添加括号以区分执行顺序，从而提高程序的可读性。\n\
    \n例如：if (a==c) and (a>b):\n\n# 如果A等于C且A大于B，则执行此程序块内的程序语句\n\n```\nElse :\n```\n\
    \n# 如果上述条件不成立，则此程序块内的程序语句将不会执行。\n\n此外，Python语言提供了更多if...else的省略条件表达式，格式如下：X if\
    \ C else Y，它根据条件判断表达式返回两个表达式中的一个。在上述表达式中，如果C为真，则返回X；否则返回Y。\n\n例如，要判断数字x是奇数还是偶数，最初的程序可以写成如下形式：\n\
    \n```\nIf (first % 2)==0:\n    second= \"even number\"\nElse:\n    second= \"\
    odd number\"\n```\n\n如果将print(\".format(second))修改为省略形式，则只需一行程序语句即可实现相同目的。\n\n\
    语句如下：\n\n```\nprint(\".format (\"even\" if (first% 2)==0 else \"odd\"))\n```\n\
    \n如果if条件判断表达式为真，则返回\"even\"；否则返回\"odd\"。在下面的示例程序中，我们将学习if...else语句的使用。该示例程序的目的是创建一个简单的闰年判断程序。\n\
    \n让用户输入年份（4位数字年份），程序将确认它是否是闰年。满足以下两个条件之一即为闰年：\n\n- (1) 每四年一闰（能被4整除）但每百年不闰（不能被100整除）。\n\
    - (2) 每四百年一闰（能被400整除）。\n\n[示例程序：leapYear.py]\n\n判断输入的年份是否是闰年\n\n```\n01 # -*-\
    \ coding: utf-8 -*-\n02 \"\"\"\n03 程序名称：闰年判断程序\n04 题目要求：\n05 输入年份（4位数字年份）以判断其是否为闰年\n\
    06 条件一：每四年一闰（能被4整除）且每百年不闰（不能被100整除）\n07 条件二：每四百年一闰（能被400整除）\n08 满足两个条件之一即为闰年。\n\
    09 \"\"\"\n10 year = int(input (\"请输入年份：\"))\n12 if (year % 4 == 0 and year %\
    \ 100 != 0) or (year % 400 == 0):\n13 print(\" {0} 是闰年。\".format(year))\n14 Else:\n\
    ```\n\n程序代码解析：\n\n第10行：输入一个年份，但请记住调用int()函数将其转换为整数类型。\n\n第12-15行：判断是否为闰年。\n\n\
    条件1：每四年一闰（能被4整除）且每百年不闰（不能被100整除）。\n\n条件2：每四百年一闰（能被400整除）。满足两个条件之一即为闰年。请读者判断以下年份是否为闰年：1900（平年）、1996（闰年）、2004（闰年）、2017（平年）、2400（闰年）。\n\
    \n## 多重判断\n\n如果存在多个条件判断表达式，可以添加elif条件语句。elif就像是“else if”的缩写。虽然使用多个if条件语句可以解决在不同条件下执行不同程序块的问题，但这仍然不够简洁。此时，可以使用elif条件语句，从而提高程序的可读性。\n\
    \n请注意，if语句在我们的程序中是逻辑上的“必需品”。elif和else不一定总是跟随出现，因此有三种情况：if、if/else、if/elif/else。\n\
    \n格式如下：\n\n```\nIf 条件判断\n表达式1:\n# 如果条件判断表达式1成立，则执行此程序块内的程序语句\nElif 条件判断\n表达式2:\n\
    # 如果条件判断表达式2成立，则执行此程序块内的程序语句\nElse :\n# 如果上述条件均不成立，则执行此程序块内的程序语句\n```\n\n例如：\n\
    \n```\nIf first==second:\n# 如果first等于second，则执行此程序块内的程序语句\nElif first>second :\n\
    # 如果first大于second，则执行此程序块内的程序语句\nElse :\n```\n\n# 如果first不大于second且first小于second，则执行此程序块内的程序语句。\n\
    \n以下示例程序用于学习if多重选择的使用。该示例程序的目的是获取当前时间以决定使用哪种问候语。\n\n[示例程序：currentTime.py]\n\n\
    获取当前时间以决定使用哪种问候语\n\n```\n01 # -*- coding: utf-8 -*-\n02 \"\"\"\n03 程序名称：获取当前时间以决定使用哪种问候语\n\
    04 题目要求：\n05 根据当前时间（24小时制）做出判断\n06 5~10:59，输出\"早上好\"\n07 11~17:59，输出\"下午好\"\n\
    08 18~4:59，输出\"晚上好\"\n09 \"\"\"\n11 import time\n13 print (\"当前时间： \" format (time.strftime\
    \ (\"%H:%M:%S\")))\n14 h = int( time.strftime(\"%H\") )\n16 if h>5 and h < 11:\n\
    17 print (\"早上好！\" )\n18 elif h >= 11 and h<18:\n19 print (\"下午好！\" )\n20 else:\n\
    21 print (\"晚上好！\")\n```\n\n程序的执行结果显示在屏幕上。\n输出显示了示例程序中的当前时间，以判断是早上、下午还是晚上，从而显示相应的问候语。Python的time模块提供了许多与时间相关的函数。time模块是Python标准模块库中的一个模块。\n\
    \n在使用它之前，你需要使用import指令导入，然后调用strftime函数将时间格式化为我们想要的格式。例如，以下程序语句用于获取当前时间。\n\n```\n\
    Import time\nTime.strftime (\"%H:%M:%S\")\n# 18:36:16 (下午6:36:16，24小时制)\nTime.\
    \ strftime (\"%I:%M:%S\")\n# 06:36:16 (上午6:36:16，12小时制) 格式参数需用括号括起来。\n```\n\n\
    请注意格式符号的大小写。以下程序语句用于显示星期、月份、日期、小时、分钟和秒。\n\n```\nPrint (time.strftime (\"%a, %b\
    \ %d %H:%M:%S\")) 执行结果如下：Mon, Sep 17 15:49:29 4.2.3 嵌套if 通常if条件语句内部还有另一层if条件语句。这种多层选择结构称为嵌套if条件语句。\n\
