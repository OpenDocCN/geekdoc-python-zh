  md: '# # Chapter 10: Custom User Model


    Django''s built-in [User model](User model) allows us to start working with users
    right away, as we just did with our *Blog app* in the previous chapters. However,
    most large projects need a way to add information related to users, such as age
    or any number of additional fields. There are two popular approaches.


    The first–and older approach–is called the "User Profile" approach and [extends
    the existing User model](extends the existing User model) by creating a [OneToOneField](OneToOneField)
    to a separate model containing fields with additional information. The idea is
    to keep authentication reserved for `User` and not bundled with non-authentication-related
    user information.


    The second approach, to create a custom user model, is recommended in the [official
    Django documentation](official Django documentation). We can extend [AbstractUser](AbstractUser)
    to create a custom user model that behaves identically to the default `User` model
    but provides the option for customization in the future.


    A third and more advanced approach is to create a custom user model with [AbstractBaseUser](AbstractBaseUser)
    that provides total control. This should only be done if you are an advanced user
    of Django.


    This chapter will use `AbstractUser` to create a custom user model for a new *Newspaper*
    website project. The choice of a newspaper app pays homage to Django''s roots
    as a web framework built for editors and journalists at the Lawrence Journal-World.


    # ## Initial Set Up'
