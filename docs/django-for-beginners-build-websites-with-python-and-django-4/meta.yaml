    # ALLOWED_HOSTS and CSRF_TRUSTED_ORIGINS


    In previous examples, we were somewhat lax with security, but now we will tighten
    things up properly using environment variables. There are four big settings that
    need to be toggled for production: `DEBUG`, `SECRET_KEY`, `ALLOWED_HOSTS` and
    `CSRF_TRUSTED_ORIGINS`.


    Let''s start with `ALLOWED_HOSTS` and `CSRF_TRUSTED_ORIGINS`, which we loosely
    set in the Chapter 5 Message Board deployment chapter to the following:


    ```

    python

    # django_project/settings.py

    ALLOWED_HOSTS = ["*"]

    CSRF_TRUSTED_ORIGINS = ["https://*.fly.dev"]

    ```


    These settings are insecure. A better approach is to restrict `ALLOWED_HOSTS`
    access to either a local port (`localhost` and `127.0.0.1`) or our actual production
    URL. The `CSRF_TRUSTED_ORIGINS` setting should only be set to the production URL.
    Since we won''t know that URL until after running `fly launch`, let''s put in
    a placeholder for now.


    ```

    python

    # django_project/settings.py

    ALLOWED_HOSTS = [".fly.dev", "localhost", "127.0.0.1"]  # new

    CSRF_TRUSTED_ORIGINS = ["https://*.fly.dev"]  # new

    ```


    # Fly Launch


    Fly allows us to deploy our Django website once it''s packaged in a Docker image.
    If we were to do this ourselves, we''d need to manually create three files:'
  - '[PAGE 202]


    +   - `Dockerfile` with commands to build the image

    - `fly.toml` with configuration specific to Fly.io

    - `.dockerignore` with files and directories Docker should ignore


    The `fly launch` command detects our Django project and automatically generates
    all three files needed for deployment. Since we already created a `.dockerignore`
    file earlier, we will tell Fly not to create one for us.


    Make sure you''re logged into your Fly account. You can use `flyctl auth login`
    from the command line. Then run the `fly launch` command to configure our website
    for deployment.


    +   - **Choose an app name**: this will be your dedicated `fly.dev` subdomain

    - **Choose the region for deployment**: select the one closest to you or [another
    region](another region) if you prefer

    - **Decline overwriting our .dockerignore file**: our choices are already optimized
    for the project

    - **Setup a Postgres database cluster**: the "Development" option is appropriate
    for this project. [Fly Postgres is a regular app deployed to Fly.io, not a managed
    database.](Fly Postgres is a regular app deployed to Fly.io, not a managed database.)

    - **Select "Yes" to scale a single node pg to zero after one hour**: this will
    save money for toy projects

    - **Decline to setup a Redis database**: we don''t need one for this project


