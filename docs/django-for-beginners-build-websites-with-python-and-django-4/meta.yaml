    # ## Detail/Edit/Delete


    The next step is to add detail, edit, and delete options for the articles. That
    means new URLs, views, and templates. Let''s start with the URLs. The Django ORM
    automatically adds a primary key to each database entry, meaning that the first
    article has a `pk` value of `1`, the second of `2`, and so on. We can use this
    to craft our URL paths.


    For our detail page, we want the route to be at `articles/<int:pk>`. The `int`
    here is a [path converter](https://docs.djangoproject.com/en/4.2/topics/http/urls/#path-converters)
    and essentially tells Django that we want this value to be treated'
  - "[PAGE 274]\n\nas an integer and not another data type like a string. Therefore\
