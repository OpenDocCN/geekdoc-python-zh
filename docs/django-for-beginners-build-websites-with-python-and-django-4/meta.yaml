    # ## Primary Keys and Foreign Keys


    We could now hop over to the Django admin and add data to our blog post model.
    But there are two more important concepts to cover before we build out the rest
    of the Blog app: primary and foreign keys.


    Because relational databases have relationships between tables, there needs to
    be an easy way for them to communicate. The solution is adding a column-known
    as a *primary key* that contains unique values. When there is a relationship between
    two tables, the primary key is the link maintaining a consistent relationship.
    If we look back at our'
