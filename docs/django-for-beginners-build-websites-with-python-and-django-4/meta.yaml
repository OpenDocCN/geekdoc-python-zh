  - '[PAGE 16]


    The good news is that whatever error you are having, it is likely that you are
    not the first! Copy and paste your error into a search engine like Google or DuckDuckGo;
    it will typically bring up something from StackOverflow or a personal blog detailing
    the same issue. Experienced programmers often joke that their ability to Google
    more quickly towards an answer is the only thing that separates them from junior
    programmers. There is some truth to this.


    You can only trust some of what you read online, of course, and with experience,
    you will develop the context to see how the pieces of Django and code fit together.


    What do you do if you are stuck on something in this book? First, carefully check
    your code against what is in the book. If you''re still stuck, you can look at
    the official source code, which is [available on GitHub](https://github.com).
    A common error is subtle white spacing differences that are almost impossible
    to detect to the naked eye. You can try copying and pasting the official source
    code if you suspect this might be the issue.


    The next step is to walk away from the computer or even sleep on the problem.
    It''s incredible what a small amount of rest and distance will do to your mind
    when solving problems.


    There are two fantastic online resources where the Django community gathers to
    ask and answer questions. The first is the [official Django Forum](https://forum.djangoproject.com),
    and the second is the [Django Users Google Group](https://groups.google.com/g/django-users).
    Each is an excellent next step if you need additional help.


    # ## Community


    The success of Django owes as much to its community as it does the technological
    achievement of the framework itself.'
  - '[PAGE 17]


    "Come for the framework, stay for the community" is a common saying among Django
    developers. It extends to the technical development of Django, which happens online
    via the [django-developers](https://groups.google.com/g/django-developers), the
    non-profit [Django Software Foundation](https://www.djangoproject.com/foundation/)
    that oversees Django, annual DjangoCon conferences, and local meetups where developers
    gather to share knowledge and insights.


    Regardless of your level of technical expertise, becoming involved in Django is
    a great way to learn, meet other developers, and enhance your reputation.


    # ## Conclusion


    In the next chapter, you''ll learn how to properly set up your computer and create
    your first Django project. Let''s begin!'
  - '[PAGE 18]


    # # Chapter 1: Initial Set Up


    This chapter focuses on configuring your Windows or macOS computer to work on
    Django projects. You are probably eager to dive right in, but setting up your
    computer now is a one-time pain that will pay dividends.


    Before installing Django, we must look at the *Command Line*, a powerful text-only
    interface developers use extensively. Next, we will install the latest version
    of Python, learn how to create dedicated virtual environments, and install Django.
    As a final step, we will explore using Git for version control and working with
    a text editor. By the end of this chapter, you will have created your first Django
    project from scratch and be able to create and modify new Django projects with
    just a few keystrokes.


    # ## The Command Line


    The command line is a text-only interface that harkens back to the original days
    of computing. If you have ever seen a television show or movie where a hacker
    is furiously typing into a black window: that''s the command line. It is an alternative
    to the mouse or finger-based graphical user interface familiar to most computer
    users. Regular computer users will never need to use the command line. Still,
    for software developers, it is a vital and regularly-used tool necessary to execute
    programs, install software, use Git for version control, and connect to servers
    in the cloud. With practice, most developers find that the command line is a faster
    and more powerful way to navigate and control a computer.'
  - '[PAGE 19]


    Given its minimal user interface–just a blank screen and a blinking cursor–the
    command line is intimidating to newcomers. There is often no feedback after a
    command has run, and it is possible to wipe the contents of an entire computer
    with a single command if you''re not careful: no warning will pop up! As a result,
    use the command line with caution. Do not blindly copy and paste commands you
    find online blindly; rely only on trusted resources.


    In everyday usage, multiple terms are used to refer to the command line: Command
    Line Interface (CLI), console, terminal, shell, or prompt. Technically speaking,
    the *terminal* is the program that opens up a new window to access the command
    line, a *console* is a text-based application, and the *shell* is the program
    that runs commands on the underlying operating system. The *prompt* is where commands
    are typed and run. It is easy to be confused by these terms initially, but they
    all essentially mean the same thing: the command line is where we run and execute
    text-only commands on our computer.


    The built-in terminal and shell on Windows are both called *PowerShell*. To access
    it, locate the taskbar next to the Windows button on the bottom of the screen
    and type in "PowerShell" to launch the app. It will open a new window with a dark
    blue background and a blinking cursor after the > prompt. Here is how it looks
    on my computer.


    ```


    Shell

    PS C:\Users\wsv>

    ```


    Before the prompt is `PS`, which refers to PowerShell, the initial `C` directory
    of the Windows operating system, followed by the `Users` directory and the current
    user, which on my personal computer, is `wsv`. Your username will be different.
    Don''t worry about what comes to *the left* of the `>` prompt at'
  - '[PAGE 20]


    this point: it varies depending on each computer and can be customized later.
    The shorter prompt of `>` will be used going forward for Windows.


    On macOS, the built-in terminal is called, appropriately enough, *Terminal*. Open
    it via the Spotlight app: simultaneously press the `Command` and `space bar` keys
    and then type in "terminal." Alternatively, open a new Finder window, navigate
    to the *Applications* directory, scroll down to open the *Utilities* directory,
    and double-click the Terminal application, which opens a new screen with a white
    background by default and a blinking cursor after the `%` prompt. Don''t worry
    about what comes *to the left* of the `%` prompt. It varies by computer and can
    be customized later on.


    ```


    Shell

    Wills-Macbook-Pro:~ wsv%

    ```


    The default shell for macOS since 2019 is [zsh](https://www.zsh.org), which uses
    the `%` prompt. If you see `$` as your prompt, then you are using the previous
    default macOS shell, [Bash](https://www.gnu.org/software/bash/). While most of
    the commands in this book will work interchangeably, it is recommended to look
    online at how to change to `zsh` via `System Preferences` if your computer still
    uses Bash.


    **Note**: In this book, we will use the universal `$` Unix prompt for all shell
    commands rather than alternating between `>` on Windows and `%` on macOS.


    # ## Shell Commands


    There are many available shell commands, but developers generally rely on half
    a dozen commands for day-to-day use and look up more complicated commands as needed.'
  - '[PAGE 21]


    In most cases, Windows (PowerShell) and macOS commands are similar. For example,
    the command `whoami` returns the computer name/username on Windows and the username
    on macOS. As with all shell commands, type the command itself followed by the
    return key. Note that the `#` symbol represents a comment; these are not executed
    on the command line.


    ```

    shell

    # Windows

    $ whoami

    wsv2023/wsv


    # macOS

    $ whoami

    wsv

    ```


    Sometimes, however, the shell commands on Windows and macOS are entirely different.
    A good example is the command for outputting a basic "Hello, World" message to
    the console. On Windows, the command is `Write-Host`, while on macOS, it is `echo`.


    ```

    shell

    # Windows

    $ Write-Host "Hello, World"

    Hello, World


    # macOS

    $ echo "Hello, World"

    Hello, World

    ```


    A frequent task on the command line is navigating within the computer filesystem.
    On Windows and macOS, the command `pwd` (print working directory) outputs the
    current location within the file system.


    ```

    shell

    # Windows

    $ pwd


    Path

    ----

    ```'
