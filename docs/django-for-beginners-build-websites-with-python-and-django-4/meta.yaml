  - "[PAGE 170]\n\n```\npython\nclass BlogUpdateView(UpdateView):\n    model = Post\n\
    \    template_name = \"post_edit.html\"\n    fields = [\"title\", \"body\"]\n\n\
    \nclass BlogDeleteView(DeleteView):  # new\n    model = Post\n    template_name\
    \ = \"post_delete.html\"\n    success_url = reverse_lazy(\"home\")\n```\n\nThe\
    \ DeleteView specifies a model which is Post, a template which is post_delete.html,\
    \ and a third field called success_url. What does this do? Well, after a blog\
    \ post is deleted, we want to *redirect* the user to another page which is, in\
    \ our case, the homepage at home.\n\nYou may have noticed we are using `reverse_lazy`\
    \ here and not `reverse`. Why is that? Both `reverse` and `reverse_lazy` perform\
    \ the same task: generating a URL based on an input like the URL name. The difference\
    \ is when they are evaluated. `reverse` executes right away, so when `BlogDeleteView`\
    \ is executed, immediately the `model`, `template_name`, and `success_url` methods\
    \ are loaded. But the `success_url` needs to find out what the resulting URL path\
    \ is associated with the URL name \"home.\" It can't always do that in time. That's\
    \ why we use `reverse_lazy` in this example: it delays the actual call to the\
    \ URLConf until the moment it is needed, not when our class `BlogDeleteView` is\
    \ being evaluated.\n\nThe moment `BlogDeleteView` is called, `reverse` needs to\
    \ have the information from the URLconf about what the proper route is for the\
    \ URL name \"home.\" But it might not have that information in time for the `success_url`.\
    \ If we use `reverse_lazy` instead,"
  - "[PAGE 171]\n\nAn astute reader might notice that both CreateView and UpdateView\
