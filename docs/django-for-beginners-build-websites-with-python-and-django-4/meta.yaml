    \ HTTP 请求/响应周期，而且它们是很好的起点，这也是我们在本书中所做的。基于类的视图稍微难理解一些，因为它们的继承结构意味着你必须深入代码才能看到所有发生的事情；而基于函数的视图，一切都在那里。而基于类的通用视图则是最难理解的。一整个网站\
    \ [Classy Class-Based Views](https://ccbv.co.uk/) 专门致力于帮助开发者解读它们。\n\n那么为什么要费心使用基于类的通用视图呢？一旦你使用了一段时间，它们就会成为编写代码的优雅而高效的方式。你通常只需修改其中一个方法的单个方法来实现自定义行为，而不必从头重写所有内容，这使得理解别人的代码更容易。然而，这确实以复杂性为代价，并且需要一种信念上的飞跃，因为理解它们在底层的工作原理需要很长时间。\n\
    \n也就是说，大多数 Django 开发者在尝试解决问题时首先会选择基于类的通用视图。令人难以置信的是，有多少问题可以通过现成的 GCVB（如 `TemplateView`、`ListView`\
