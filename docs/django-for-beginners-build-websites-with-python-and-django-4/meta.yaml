    # Static Files


    We need to add some CSS to our project to improve the styling. CSS, JavaScript,
    and images are a core piece of any modern web application and within the Django
    world, are referred to as "static files." Django provides tremendous flexibility
    around *how* these files are used, but this can lead to quite a lot of confusion
    for newcomers.


    By default, Django will look within each app for a folder called "static"; in
    other words, a folder called `blog/static/`. If you recall, this is similar to
    how `templates` are treated.


    As Django projects grow in complexity over time and have multiple apps, it is
    often simpler to reason about static files if they are stored in a single, project-level
    directory instead. That is the approach we will take here.


    Quit the local server with `Control+c` and create a new `static` directory in
    the same folder as the `manage.py` file.


    ```


