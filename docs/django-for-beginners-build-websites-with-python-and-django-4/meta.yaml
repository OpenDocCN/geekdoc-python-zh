    # Mixins


    We want to set some authorizations so only logged-in users can access specific
    URLs. To do this, we can use a *mixin*, a special kind of multiple inheritance
    that Django uses to avoid duplicate code and still allow customization. For example,
    the built-in generic [ListView](link) needs a way to return a template. But so
    does [DetailView](link) and almost every other view. Rather than repeat the same
    code in each big generic view, Django breaks out this functionality into a mixin
    known as [TemplateResponseMixin](link). Both `ListView` and `DetailView` use this
    mixin to render the proper template.


    If you read the Django source code, which is freely available [on Github](link),
    you''ll see mixins used everywhere. To restrict view access to only logged-in
    users, Django has a'
