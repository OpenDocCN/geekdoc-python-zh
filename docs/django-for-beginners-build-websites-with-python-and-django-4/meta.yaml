  md: '# # Chapter 18: Conclusion


    Congratulations on finishing *Django for Beginners*! After starting from absolute
    zero, we''ve built five different web applications from scratch and covered Django''s
    major features: templates, views, URLs, users, models, security, testing, and
    deployment. You now have the knowledge to go off and build modern websites with
    Django.


    As with any new skill, practicing and applying what you''ve just learned is important.
    The CRUD (Create-Read-Update-Delete) functionality in our *Blog* and *Newspaper*
    sites is commonplace in many other web applications. For example, can you make
    a Todo List web application? A Twitter or Facebook clone? You already have all
    the tools you need. When starting out, the best approach is to build as many small
    projects as possible, incrementally add complexity, and research new things.


    # ## Next Steps


    We explored a lot of Django material in this book, but there is still much more
    to learn, especially if you want to build large websites that simultaneously handle
    thousands or millions of visitors. Django is more than capable of this, and I''ve
    written a follow-up book called [Django for Professionals](https://djangoforprofessionals.com)
    that tackles many of the challenges around building truly *production-ready* websites
    such as using Docker, using a production database like PostgreSQL locally, incorporating
    advanced user registration, including additional security, improving performance,
    and much more.


    Django is also frequently used to create back-end APIs consumable by mobile apps
    (iOS/Android) or websites that'
  merge: -1
