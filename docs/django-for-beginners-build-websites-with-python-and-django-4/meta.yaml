    # ## Tests


    Every time we make code changes that alter core functionality, it is a good idea
    to add tests. While all our manual actions trying out the custom user worked just
    now, we may break something in the future. Adding tests for new code and regularly
    running the entire test suite helps spot errors early.


    At a high level, we want to ensure that both a regular user and a superuser can
    be created and have the proper field permissions. Suppose you look at the [official
    documentation](https://docs.djangoproject.com/en/4.0/ref/contrib/auth/#django.contrib.auth.models.User)
    on `models.User`, which our custom user model inherits from. In that case, it
    comes with a number of built-in fields: `username`, `first_name`, `last_name`,
    `email`, `password`, `groups`, `user_permissions`, `is_staff`, `is_active`, `is_superuser`,
    `last_login`, and `date_joined`. It is also possible to add any number of custom
    fields, as we have seen by adding the `age` field.'
