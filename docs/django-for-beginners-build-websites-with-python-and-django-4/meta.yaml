    \    template_name = \"about.html\"\n```\n\n最后，导入视图名称并将其连接到 `about/` 的 URL。\n\n\
    ```python\n# pages/urls.py\nfrom django.urls import path\nfrom .views import HomePageView,\
    \ AboutPageView  # new\n\nurlpatterns = [\n    path(\"about/\", AboutPageView.as_view(),\
    \ name=\"about\"),  # new\n    path(\"\", HomePageView.as_view(), name=\"home\"\
    ),\n]\n```\n\n使用 `runserver` 启动 Web 服务器，然后导航到 `http://127.0.0.1:8000/about/`。新的\
    \ About 页面就可见了。\n\n## Extending Templates\n\n模板的真正强大之处在于它们可以被扩展。如果你想想大多数网站，相同的内容会出现在每个页面上（页眉、页脚等）。如果我们作为开发者，能有一个*唯一规范的地方*来存放我们的页眉代码，而所有其他模板都继承它，那不是很好吗？\n\
