    # ## Web Servers


    The local server provided by Django and run via `runserver` is not intended for
    use in production. As a quick recap, here is our current visual diagram of Django:'
  - '[PAGE 117]


    ![](img/8898b60f655bfc3510e72493f7e0548e_117_0.png)


    **Django request/response cycle with static files**


    A *web server* is the software that sits in front of our Django application to
    process HTTP requests and responses. It *also* manages static file requests. Before
    Platforms-as-a-Service became available, it was up to the web developer to install,
    configure, and maintain a dedicated web server like [Nginx](https://www.nginx.com/)
    or [Apache](https://httpd.apache.org/): no small task and requiring a completely
    different skill set than web development. Fortunately, Fly.io knows we are deploying
    a website and automatically bundles in Nginx, so we don''t have to install or
    manage it ourselves.


    # ## WSGI


    The other role that `runserver` has provided us is acting as an application server
    to help Django generate dynamic content. When a request comes in, it is `runserver`
    that powers that request through URLs, views, models, the database, templates
    and then generates an HTTP response. In other words, `runserver` really acts like
    two separate things: a web server *and* an application server.


    In the early days of web development, web frameworks didn''t always work easily
    with web servers. For Python web'
  - '[PAGE 118]


    frameworks, this led to the creation of the *Web Server Gateway Interface (WSGI)*
    in 2003. WSGI is not a server or framework but a set of rules that standardizes
    how web servers should connect to *any* Python web app. By abstracting away this
    headache, it opened the door to newer Python web frameworks–like Django, which
    was first released in 2005–that could work on any web server and did not have
    to worry about this step in the process.


    Application servers are colloquially referred to as a "WSGI server" because they
    use WSGI to connect Python web apps to a server. We have already installed Gunicorn
    because it acts as our production WSGI server, replacing `runserver`.


    Here is what the updated production diagram looks like adding a web server and
    replacing `runserver` with the more general WSGI server.


    ![](img/8898b60f655bfc3510e72493f7e0548e_118_0.png)


    # ## ASGI


    Traditionally, Python was a *synchronous* programming language: code executed
    sequentially, meaning each piece of code had to complete before another piece
    of code could begin. As a result, complex tasks might take a while. Starting in
    2012 with Python 3.3, *asynchronous*'
  - '[PAGE 119]


    programming was added to Python via the [asyncio](https://docs.python.org/3/library/asyncio.html)
    module. While synchronous processing is done sequentially in a specific order,
    asynchronous processing occurs in parallel. Tasks that are not dependent on others
    can be offloaded and executed at the same time as the main operation and then
    report back the result when complete.


    Starting in 2019 with Django 3.0, [asynchronous support](https://docs.djangoproject.com/en/4.0/topics/async/)
    has been gradually added to Django as well. One layer is the introduction of the
    *Asynchronous Server Gateway Interface (ASGI)*, which, as the name suggests, standardizes
    how servers should connect to Python web apps that support both synchronous and
    asynchronous communication. ASGI is intended as the eventual successor to WSGI.


    ASGI and WSGI are both included in new Django projects now. When you run the `startproject`
    command, Django generates a `wsgi.py` file and an `asgi.py` file in the project-level
    directory, `django_project`.


    As of Django 4.1, you can write async views, and full async support for the entire
    Django stack is still in the works. Given that this book is for beginners, it
    is important to recognize asynchronous developments rather than dwell on them.
    While they are exciting from a technical perspective, they are also challenging
    to reason about and are still in the early stages of development.


