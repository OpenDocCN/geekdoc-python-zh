    \ 的基础组成部分，但对它们的深入讨论超出了本书的范围。如果你需要入门或复习，我建议查看 [官方 Python 文档](https://docs.python.org/3/tutorial/classes.html)，其中有一个关于类及其用法的优秀教程。\n\
