    Primary keys are a standard part of relational database design. As a result, Django
    automatically adds an [auto-incrementing primary key](auto-incrementing_primary_key)
    to our database models. Its value starts at `1` and increases sequentially to
    `2`, `3`, and so on. The naming convention is `<table_id>`, meaning that for a
    model called Post the primary key column is named `post_id`.


    | Post Schema |

    |:---|

    | Post |

    | -------- |

    | post_id |

    | title |

    | author |

    | body |


    As a result, under the hood, our existing Post database table has four columns/fields.


    | Post Database Table |

    |:---|

    | Post |

    | -------- |

    | POST_ID | TITLE | AUTHOR | BODY |

    | 1 | Hello, World! | wsv | My first blog post. Woohoo! |

    | 2 | Goals Today | wsv | Learn Django and build a blog application. |

    | 3 | 3rd Post | wsv | This is my 3rd entry. |


    Now that we know about primary keys, it''s time to see how they are used to link
    tables. When you have more than one table, each will contain a column of primary
