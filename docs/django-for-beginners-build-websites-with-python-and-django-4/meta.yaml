    The `SECRET_KEY` is a randomly generated string that provides cryptographic signing
    throughout our project. It needs to be secure. On the command line, generate a
    new string for us to use since the existing one that starts with `django-insecure-...`
    has already been committed to Git and is, therefore, insecure.


    ```

    shell

    (.venv) $ python -c "import secrets; print(secrets.token_urlsafe())"

    4Dx5f3TRmyGGQJ5U19eozyMy8s1hRoDh7d5DUSfc8ZU

    ```


    Update the `.env` file with this new value.


    ```


    .env

    DEBUG=True

    SECRET_KEY=4Dx5f3TRmyGGQJ5U19eozyMy8s1hRoDh7d5DUSfc8ZU  # new

    ```


    Then update the existing `SECRET_KEY` configuration in `django_project/settings.py`
    to point to this new environment variable.


    ```

    python

    # django_project/settings.py

    SECRET_KEY = env.str("SECRET_KEY")

    ```


