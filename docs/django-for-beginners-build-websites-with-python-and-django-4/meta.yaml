    Underpinning the world wide web is the [client-server model](https://example.com).
    A "client" refers to any internet-connected device making service requests, such
    as a computer, a phone, a dishwasher, etc.; the "server" is computer hardware
    or software that responds to service requests. In other words, the client makes
    a request and the server returns a response.


    The computers powering the internet are often referred to as servers, but really
    they''re just computers connected to the internet all the time running special
    software that lets them "serve" information to other computers. Your own computer
    can be a server, but in practice most servers exist in large data centers (aka
    "the cloud").


    Since we are using the HTTP protocol for all of this, we can be more specific
    and say that a client makes an HTTP request and a server responds with an HTTP
    response.


    ![](img/8898b60f655bfc3510e72493f7e0548e_41_0.png)


    The full domain name for a website like LearnDjango.com is actually `https://learndjango.com`.
    The `https://` at the beginning specifies that we are using HTTP as our protocol:
    HTTPS is the encrypted version of HTTP and now accounts for the majority of web
    traffic. Modern web browsers will automatically add this on for you so most regular
    users simply type the domain name and are unaware of the HTTP underpinnings.'
