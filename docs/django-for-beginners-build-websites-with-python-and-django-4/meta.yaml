  md: '# ## Environment Variables


    An environment variable is a variable whose value is set outside the current program
    and can be loaded in at runtime. In other words, we can store these variables
    in a secure location but load them into our Django project, which helps us in
    two major ways. First, it keeps information secure such as our passwords, API
    keys, and so on. Second, it allows us to rely on a single `settings.py` file to
    load in either local or production environment variables. An older Django technique
    was to have multiple `settings.py` files for each configuration, but with environment
    variables we only need one.


    Let''s see this in action. There are multiple third-party packages that provide
    environment variables, but we will use [environs](https://github.com/sloria/environs)
    because it is well-maintained and comes with additional Django support. Go ahead
    and install it now: include the double quotes, `""`, to install the Django extension.


    ```

    shell

    (.venv) $ python -m pip install "environs[django]"==9.5.0

    ```


    Then add three new lines to the top of our `django_project/settings.py` file.


    ```

    python

    # django_project/settings.py

    from pathlib import Path

    from environs import Env  # new


    env = Env()  # new

    env.read_env()  # new

    ```


