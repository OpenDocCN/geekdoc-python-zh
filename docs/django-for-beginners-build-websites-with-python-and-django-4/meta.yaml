    \ that most PaaS, including Fly, will automatically set a `DATABASE_URL` environment\
    \ variable inspired by the [Twelve-Factor App](https://12factor.net/) approach\
    \ that contains all the parameters needed to connect to a database in the format.\
    \ In raw form, for PostgreSQL, it looks something like this:\n\n```\npostgres://USER:PASSWORD@HOST:PORT/NAME\n\
    ```\n\nIn other words, use `postgres` and here are custom values for `USER`, `PASSWORD`,\
    \ `HOST`, `PORT/NAME`.\n\nWhile we *could* manage this manually ourselves, this\
    \ pattern is so well established in the Django community that a dedicated third-party\
    \ package, [dj-database-url](https://github.com/jazzband/dj-database-url), exists\
    \ to manage this for us. `dj-database-url` is already installed since it is one\
