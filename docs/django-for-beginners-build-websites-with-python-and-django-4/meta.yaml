  md: 'macOS.


    # Virtual Environments


    Installing the latest version of Python and Django is the correct approach for
    any new project. But in the real world, it is common that existing projects rely
    on older versions of each. Consider the following situation: *Project A* uses
    Django 3.2, but *Project B* uses Django 4.2. By default, Python and Django are
    installed *globally* on a computer: installing and reinstalling different versions
    every time you want to switch between projects is quite a pain.


    Fortunately, there is a straightforward solution. *Virtual environments* allow
    you to create and manage separate environments for each Python project on the
    same computer. Many areas of software development are hotly debated, but using
    virtual environments for Python development is not. You should use a dedicated
    virtual environment for each new Python and Django project.


    There are several ways to implement virtual environments, but the simplest is
    with the [venv](https://docs.python.org/3/library/venv.html) module already installed
    as part of the Python 3 standard library. To try it out, navigate to your desktop''s
    existing `ch1-setup` directory.


    ```

    Shell

    # Windows

    $ cd onedrive\desktop\code\ch1-setup


    # macOS

    $ cd ~/desktop/code/ch1-setup

    ```


    To create a virtual environment within this new directory, use the format `python
    -m venv <name_of_env>` on Windows or `python3 -m venv <name_of_env>` on macOS.
    The `-m` part of this command is known as a *flag*, which is a convention to indicate
    the user is requesting non-default behavior. The'
  merge: -1
  pgno: 26
- img_proc: true
  md: 'format is usually - and then a letter or combination of letters. The [-m flag](https://docs.python.org/3/using/cmdline.html#cmdoption-m)
    is necessary since `venv` is a module name. It is up to the developer to choose
    a proper environment name, but a common choice is to call it `.venv`, as we do
    here.


    ```

    shell

    # Windows

    $ python -m venv .venv


    # macOS

    $ python3 -m venv .venv

    ```


    On Windows, the command `ls` will display the `.venv` directory in our directory.
    However, on macOS using `ls` it will appear empty. The `.venv` directory *is*
    there; it''s just that it is "hidden" due to the period `.` that precedes the
    name. Hidden files and directories are a way for developers to indicate that the
    contents are important and should be treated differently than regular files. To
    view it, try `ls -la`, which shows all directories and files, even hidden ones.


    ```

    shell

    $ ls -la

    total 0

    drwxr-xr-x  3 wsv  staff   96 Dec 12 11:10 .

    drwxr-xr-x  3 wsv  staff   96 Dec 12 11:10 ..

    drwxr-xr-x  6 wsv  staff  192 Dec 12 11:10 .venv

    ```


    You will see that `.venv` is there and can be accessed via `cd` if desired. In
    the directory is a copy of the Python interpreter and a few management scripts,
    but you will not need to use it directly in this book.


    Once created, a virtual environment must be *activated*. On Windows, an *Execution
    Policy* must be set to enable running scripts. You only have to do this once to
    tell Windows that, I know what I''m doing here. The Python docs recommend allowing
    scripts for the `CurrentUser` only, which is what we'
  merge: -1
  pgno: 27
- img_proc: true
  md: 'will do. On macOS, there are no similar restrictions on scripts, so it is possible
    to run `source .venv/bin/activate` directly.


    Here is what the complete commands look like to create and activate a new virtual
    environment called `.venv`:


    ```

    shell

    # Windows

    $ python -m venv .venv

    $ Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser

    $ .venv\Scripts\Activate.ps1

    (.venv) $


    # macOS

    $ python3 -m venv .venv

    $ source .venv/bin/activate

    (.venv) $

    ```


    The shell prompt now has the environment name `(.venv)` prefixed, which indicates
    that the virtual environment is active. Any future Python packages installed or
    updated within this location will be confined to the active virtual environment.


    To deactivate and leave a virtual environment, type `deactivate`.


    ```

    shell

    (.venv) $ deactivate

    $

    ```


    The shell prompt no longer has the virtual environment name prefixed, which means
    the session is now back to normal.


    # ## PyPI (Python Package Index)


    [PyPI (Python Package Index)](https://pypi.org/) is the central location for all
    Python projects. You can see [Django is there](https://pypi.org/project/Django/)
    along with'
