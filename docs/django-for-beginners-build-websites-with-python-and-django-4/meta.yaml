    private keys, you''ll need to generate them. GitHub, again, has [a guide on doing
    this](https://docs.github.com/en/authentication/connecting-to-github-with-ssh/generating-a-new-ssh-key-and-adding-it-to-the-ssh-agent).


    Once complete you should be able to execute the `git push -u origin main` command
    successfully!


