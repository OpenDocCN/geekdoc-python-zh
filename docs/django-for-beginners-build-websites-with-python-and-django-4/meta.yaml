- img_proc: true
  md: "Being \"staff\" means a user can access the admin site and view models for\
    \ which they are given permission; a \"superuser\" has full access to the admin\
    \ and all its models. A regular user should have `is_active` set to `True`, `is_staff`\
    \ set to `False`, and `is_superuser` to `False`. A superuser should have everything\
    \ set to `True`.\n\nHere is one way to add tests to our custom user model:\n\n\
    ```\n# accounts/tests.py\nfrom django.contrib.auth import get_user_model\nfrom\
    \ django.test import TestCase\n\nclass UsersManagersTests(TestCase):\n    def\
    \ test_create_user(self):\n        User = get_user_model()\n        user = User.objects.create_user(\n\
    \            username=\"testuser\",\n            email=\"testuser@example.com\"\
    ,\n            password=\"testpass1234\",\n        )\n        self.assertEqual(user.username,\
