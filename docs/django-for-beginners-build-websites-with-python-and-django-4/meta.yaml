    # # Chapter 16: Comments


    We could add comments to our *newspaper* site in two ways. The first is to create
    a dedicated *comments* app and link it to *articles*; however, that seems like
    over-engineering. Instead, we can add a model called `Comment` to our *articles*
    app and link it to the `Article` model through a foreign key. We will take the
    more straightforward approach since adding more complexity later is always possible.


    The whole Django structure of one project containing multiple smaller apps is
    designed to help the developer reason about the website. The computer doesn''t
    care how the code is structured. Breaking functionality into smaller pieces helps
    us–and future teammates–understand the logic in a web application. But you don''t
    need to optimize prematurely. If your eventual comments logic becomes lengthy,
    then yes, by all means, spin it off into its own comments app. But the first thing
    to do is make the code work, make sure it is performant, and structure it, so
    it''s understandable to you or someone else months later.


    What do we need to add comments functionality to our website? We already know
    it will involve models, URLs, views, templates, and in this case, also, forms.
    We need all four for the final solution, but the order in which we tackle them
    is largely up to us. That said, many Django developers find that going in this
    order–models -> URLs -> views -> templates/forms–works best, so that is what we
    will use here. By the end of this chapter, users will be able to add comments
    to any existing article on our website.


    # ## Model'
  - "[PAGE 300]\n\nLet's begin by adding another table to our existing database called\
    \ `Comment`. This model will have a many-to-one foreign key relationship to `Article`:\
    \ one article can have many comments, but not the other way around. Traditionally\
    \ the name of the foreign key field is simply the model it links to, so this field\
    \ will be called `article`. The other two fields will be `comment` and `author`.\n\
    \nOpen up the file `articles/models.py` and underneath the existing code, add\
    \ the following. Note that we include `__str__` and `get_absolute_url` methods\
    \ as best practices.\n\n```\npython\n# articles/models.py\n...\nclass Comment(models.Model):\
    \  # new\n    article = models.ForeignKey(Article, on_delete=models.CASCADE)\n\
    \    comment = models.CharField(max_length=140)\n    author = models.ForeignKey(\n\
    \        settings.AUTH_USER_MODEL,\n        on_delete=models.CASCADE,\n    )\n\
    \n    def __str__(self):\n        return self.comment\n\n    def get_absolute_url(self):\n\
    \        return reverse(\"article_list\")\n```\n\nSince we've updated our models,\
    \ it's time to make a new migration file and apply it. Note that by adding `articles`\
    \ at the end of the `makemigrations` command—which is optional—we are specifying\
    \ we want to use just the `articles` app here. This is a good habit to use. For\
    \ example, what if we changed models in two different apps? If we **did not**\
    \ specify an app, then both apps' changes would be incorporated in the same migrations\
    \ file, making it harder to debug errors in the future. Keep each migration as\
    \ small and contained as possible.\n\nShell"
