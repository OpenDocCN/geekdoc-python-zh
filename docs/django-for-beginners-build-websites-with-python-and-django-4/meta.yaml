    # ## How Web Frameworks Work


    There are two broad categories of websites: static and dynamic. A *static* website
    consists of individual HTML documents that are sent as-is over HTTP to your web
    browser. If your website has ten pages then there must be ten corresponding HTML
    files. This approach can work for very small websites but quickly falls apart
    when a website needs hundreds or thousands of pages. A *dynamic* website consists
    of a database, HTML templates, and an application server that can update the files
    before sending them to your browser via HTTP. Most large websites adopt this approach
    since it means millions of webpages can be composed of only a few HTML templates,
    a small amount of logic, and a big database.


    Django is designed for dynamic websites and abstracts away much of the difficulty
    inherent in creating a website from scratch. If you think about it, most websites
    require the same fundamental tools:


    +   - a way to process URL requests

    - a way to connect to a database

    - a way to generate dynamic content by filtering data from the database

    - a way to create templates for styling HTML and adding CSS, images, etc as needed


    # ## Model-View-Controller vs Model-View-Template


    If you have built websites before you might be familiar with the **Model-View-Controller
    (MVC)** pattern. It is used by web frameworks including Ruby on Rails, Spring
    (Java),'
  - '[PAGE 44]


    Laravel (PHP), and ASP.NET (C#). This is a popular way to *internally* separate
    the data, logic, and display of an application into separate components that are
    easier for a developer to reason about.


    In the traditional MVC pattern there are three major components:


    +   - Model: Manages data and core business logic

    - View: Renders data from the model in a particular format

    - Controller: Accepts user input and performs application-specific logic


    Django''s approach is sometimes called **Model-View-Template (MVT)** but it is
    really a 4-part pattern that also incorporates URL configuration. Something like
    **Model-View-Template-URL (MVTU)** would be a more accurate description:


    +   - Model: Manages data and core business logic

    - View: Describes *which* data is sent to the user but not its presentation

    - Template: Presents the data as HTML with optional CSS, JavaScript, and static
    assets

    - URL Configuration: Regular expression components configured to a View


    The "View" in MVC is analogous to a "Template" in Django while the "Controller"
    in MVC is divided into a Django "View" and "URL config." This is understandably
    quite confusing to newcomers. To help, let''s map out the order of a given HTTP
    request/response cycle for Django.


    When you type in a URL, such as `https://djangoproject.com`, the first thing that
    happens within our Django project is that runserver kicks into gear and helps
    Django look for a'
  - '[PAGE 45]


    matching URL pattern (contained in `urls.py`). The URL pattern is linked to a
    single view (contained in `views.py`) which combines the data from the model (stored
    in `models.py`) and the styling from a template (any file ending in `.html`).
    The view then returns a HTTP response to the user.


    A simplified version of this complete Django flow looks like this:


    ![](img/8898b60f655bfc3510e72493f7e0548e_45_0.png)


    **Django request/response cycle**


    If you are new to web development the distinction between MVC and MVT will not
    matter much. This book demonstrates the Django way of doing things so there won''t
    be confusion. However if you are a web developer with previous MVC experience,
    it can take a little while to shift your thinking to the "Django way" of doing
    things which is more loosely coupled and allows for easier modifications than
    the MVC approach.


