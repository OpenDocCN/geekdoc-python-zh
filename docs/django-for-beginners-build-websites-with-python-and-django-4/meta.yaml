    but a bit of a hassle to be honest. *The Secure Shell Protocol (SSH)* is a protocol
    used to ensure private connections with a remote server. The process involves
    generating unique SSH keys and storing them on your computer so only GitHub can
    access them. For regular websites authentication is done via username/password
    powered by *Hypertext Transfer Protocol Secure (HTTPS)*, essentially encrypted
    HTTP. But for very important websites–and your GitHub repos which store all your
    code count as such–SSH is a more secure approach.


    First, check whether you have existing SSH keys. Github has [a guide to this](https://docs.github.com/en/authentication/connecting-to-github-with-ssh/checking-for-existing-ssh-keys)
