  - '[PAGE 28]


    will do. On macOS, there are no similar restrictions on scripts, so it is possible
    to run `source .venv/bin/activate` directly.


    Here is what the complete commands look like to create and activate a new virtual
    environment called `.venv`:


    ```

    shell

    # Windows

    $ python -m venv .venv

    $ Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser

    $ .venv\Scripts\Activate.ps1

    (.venv) $


    # macOS

    $ python3 -m venv .venv

    $ source .venv/bin/activate

    (.venv) $

    ```


    The shell prompt now has the environment name `(.venv)` prefixed, which indicates
    that the virtual environment is active. Any future Python packages installed or
    updated within this location will be confined to the active virtual environment.


    To deactivate and leave a virtual environment, type `deactivate`.


    ```

    shell

    (.venv) $ deactivate

    $

    ```


    The shell prompt no longer has the virtual environment name prefixed, which means
    the session is now back to normal.


    # ## PyPI (Python Package Index)


    [PyPI (Python Package Index)](https://pypi.org/) is the central location for all
    Python projects. You can see [Django is there](https://pypi.org/project/Django/)
    along with'
  - '[PAGE 29]


    every other Python package we will use in this book.


    We will use [pip](https://pip.pypa.io/), the most popular package installer, to
    install Python packages. It already comes included with Python 3, but to ensure
    we are on the latest version of `pip`, let''s take a moment to update it. Here
    is the command to run:


    ```

    shell

    $ python -m pip install --upgrade pip

    ```


    This command will install and upgrade (if needed) the latest version of `pip`.
    Notice that we are not in a virtual environment, so this version of `pip` will
    be installed globally on our local computer.


    Why do we use `python -m pip` instead of just `pip` for this command? The latter
    does work, but it can cause some issues. Using `python` with the `-m` flag ensures
    that the intended version of Python is in use, *even if* you have multiple versions
    of Python installed on your computer. For example, if you have Python 2.7 and
    3.7 installed on your computer, it is possible for `pip install` to use Python
    2.7 at one point but Python 3.7 later: not desired behavior. [Brett Cannon](https://snarky.ca/why-you-should-use-python-m-pip/)
    has a much fuller explanation if you are curious about the underlying reasons
    why this is the case.


    Python is now installed, we know how to use virtual environments, and we''ve updated
    our version of `pip`. It is time to install Django itself for the first time.


    # ## Install Django


    In the `ch1-setup` directory, reactivate the existing virtual environment and
    install Django.


    ```

    shell

    Shell

    ```'
  - '[PAGE 30]


    ```

    # Windows

    $ .venv\Scripts\Activate.ps1

    (.venv) $ python -m pip install django~=4.2.0


    # macOS

    $ source .venv/bin/activate

    (.venv) $ python3 -m pip install django~=4.2.0

    ```


    This command uses the comparison operator, ~=, to install the latest version of
    Django 4.2.x. As I type these words, the newest version is 4.2.0, but soon it
    will be 4.2.1 and then a month later 4.2.2. By using ~=4.2.0, we ensure that the
    latest version of 4.2.x will be installed when the user executes the command.


    If we did not "pin" our version number in this way–if we just installed Django
    using the command `python -m pip install django`–then the latest version of Django
    will be installed even if, in the future, it is 5.0 or 5.1 or even 6.0. There
    is no guarantee that all the code in this book will work perfectly on a later
    version of Django. By specifying the version number for each software package
    installed, you can update them one at a time to ensure compatibility.


    **Note**: I will provide Windows and macOS commands throughout this book if they
    differ. However, when it comes to using python on Windows vs. python3 on macOS,
    the default will be `python` for conciseness.


    # First Django Project


    To create a new Django project, use the command `django-admin startproject django_project
    .`. A Django project can have almost any name, but we will use `django_project`
    in this book.


    ```

    Shell

    (.venv) $ django-admin startproject django_project .

    ```'
  - '[PAGE 31]


    It''s worth pausing here to explain why you should add a period (.) to the end
    of the previous command. If you just run `django-admin startproject django_project`,
    then by default Django will create this directory structure:


    ```

    Layout


    django_project/

    ├── django_project

    │   ├── __init__.py

    │   ├── asgi.py

    │   ├── settings.py

    │   ├── urls.py

    │   └── wsgi.py

    ├── manage.py

    └── .venv/

    ```


    Do you see the multiple `django_project` directories? First, a top-level `django_project`
    directory is created, and then *another* one within it that contains the files
    we need for our Django project. Opinions differ on the "best" approach within
    the Django community, but it feels redundant to me to have these two directories
    with the same name and makes deployment easier later on, so I prefer adding a
    period to the end that installs Django in the current directory.


    ```

    Layout


    ├── django_project

    │   ├── __init__.py

    │   ├── asgi.py

    │   ├── settings.py

    │   ├── urls.py

    │   └── wsgi.py

    ├── manage.py

    └── .venv/

    ```


    As you progress in your journey learning Django, you will bump up against more
    and more situations like this where there are different opinions within the Django
    community on the correct best practice. Django is eminently customizable, which
    is a great strength; however, the tradeoff is that this flexibility comes at the
    cost of seeming complexity.'
  - '[PAGE 32]


    Generally speaking, it''s a good idea to research any such issues, make a decision,
    and then stick with it!


    # The Development Server


    Django includes a built-in, lightweight Web server for local development that
    is accessible via the [runserver](https://docs.djangoproject.com/en/4.2/ref/django-admin/#django-admin-runserver)
    command. The development server automatically reloads Python code for each request
    so you don''t need to restart the server for code changes to take effect. Be aware,
    however, that some actions like adding files will not automatically trigger a
    restart so if your code is not working as expected, doing a manual restart is
    always a good first step.


    By default, the server runs on port 8000 on the IP address 127.0.0.1, which is
    known as the "loopback address" because no data is actually sent from our computer
    (host) to the local network or internet; instead, it is "looped back" on itself
    so the computer sending the data becomes the recipient.


    Let''s confirm everything is working correctly by starting up the development
    server now. We''ll use `manage.py` to execute the `runserver` command.


    ```


    Shell

    (.venv) $ python manage.py runserver


    Watching for file changes with StatReloader

    Performing system checks...


    System check identified no issues (0 silenced).


    You have 18 unapplied migration(s). Your project may not work properly until

    you apply the migrations for app(s): admin, auth, contenttypes, sessions.

    Run ''python manage.py migrate'' to apply them.

    April 13, 2023 - 13:15:03

    Django version 4.2, using settings ''django_project.settings''

    Starting development server at http://127.0.0.1:8000/

    Quit the server with CONTROL-BREAK.

    ```'
  - '[PAGE 33]


    Don''t worry about the text in red about 18 unapplied migrations. We''ll get to
    that shortly. The important part, for now, is to visit `http://127.0.0.1:8000/`
    in your web browser and make sure the following image is visible:


    ![](img/8898b60f655bfc3510e72493f7e0548e_33_0.png)


    # Django welcome page


    If you are on Windows, you will see the final line says to use `CONTROL-BREAK`
    to quit, whereas on macOS, it is `CONTROL-C`. Newer Windows keyboards often do
    not have a Pause/Break key so using the `c` key usually works.


    Resist the temptation to use the development server for production. It can handle
    only a single request at a time reliably and has not undergone any security audits
    or performance tests. There are dedicated web servers for that sort of thing that
    we will use in later chapters.'
  - '[PAGE 34]


    If you want to change the port number you can do so by passing in a command-line
    argument. For example, you could stop the server and then restart it on port 8080.


    ```

    shell

    (.venv) $ python manage.py runserver 8080

    ```


    Generally speaking, Django developers don''t need to do this but as will become
    a running theme in this book, Django provides ultimately flexibility if needed.


    For readers new to web development, be aware that is it also possible to visit
    `http://localhost:8000/` to see the running Django website. `localhost` is a common
    shortand for `127.0.0.1`. In this book we will default to `127.0.0.1:8000` because
    that is what Django outputs in the terminal but either option is fine.


    Go ahead and stop the local server with the appropriate command and then exit
    the virtual environment by typing `deactivate` and hit Return.


    ```

    shell

    # Windows or macOS

    (.venv) $ deactivate

    ```


    We''ll get lots of practice with virtual environments in this book, so don''t
    worry if it''s a little confusing. The basic pattern for any new Django project
    is to make and activate a virtual environment, install Django, and then run `startproject`.


    It''s worth noting that only one virtual environment can be active in a command
    line tab. In future chapters, we will create a new virtual environment for each
    new project, so either make sure to `deactivate` your current environment or open
    up a new tab for new projects.'
- md: '## Text Editors


    The command line is where we execute commands for our programs, but a text editor
    is where the code is actually written. The computer doesn''t care what text editor
    you use–the result is just code–but a good text editor can provide helpful hints
    and catch typos for you.


    Many modern text editors are available that come with helpful extensions to make
    Python and Django development more accessible. [PyCharm](https://www.jetbrains.com/pycharm/)
    is a very popular option that has both a paid Professional and free Community
    version. [Visual Studio Code](https://code.visualstudio.com/) is also free, easy
    to install, and enjoys widespread popularity. It does not matter what text editor
    you decide to use: the result is just code.


    ## VSCode Configurations


    If you''re not already using a text editor, download and install VSCode from the
    official website. There are three recommended configurations you can add to improve
    your developer productivity.


    The first is to add the official Python extension to VSCode. On Windows, navigate
    to `File -> Settings -> Extensions`; on macOS, `Code -> Settings -> Extensions`
    to launch a search bar for the extensions marketplace. Enter "python" to bring
    up the Microsoft extension as the first result. Install it.


    The second is adding [Black](https://github.com/psf/black), a Python code formatter
    that has quickly become the default within the Python community. In the terminal
    run the command `python -m pip install black` on Windows or `python3 -m pip install
    black` on macOS.


    ```

    (.venv) $ python -m pip install black

    ```


    Next, within VSCode open up the settings by navigating to `File -> Preferences
    -> Settings` on Windows or `Code -> Preferences -> Settings` on macOS. Search
    for "python formatting provider" and select `black` from the dropdown options.
    Then search for "format on save" and enable "Editor: Format on Save". Black will
    automatically format your code whenever a `*.py` file is saved.


    To confirm this is working, use your text editor to create and save a new file
    called `hello.py` within the `ch1-setup` directory located on your desktop and
    type in the following using single quotes:


    ```python

    # hello.py

    print(''Hello, World!'')

    ```


    On save, it should update automatically to using double quotes, which is [Black''s
    default preference](https://black.readthedocs.io/en/stable/the_black_code_style/current_style.html#strings):
    `print("Hello, World!")`. That means everything is working correctly.


    The third configuration makes it possible to open VSCode from your terminal. This
    is quite useful since a standard workflow will be to open up the terminal, navigate
    to a directory you want to work on, and then open it with VSCode.


    Within VSCode simultaneously press `Command + Shift + P` to open the command palette,
    which allows us to customize our VS Code settings. In the command palette type
    `shell`: the top result will be "Shell Command: Install `code` command in PATH."
    Then hit enter to install this shortcut. There will be a success message saying
    "Shell command ''code'' successfully installed in PATH." The [PATH variable](https://en.wikipedia.org/wiki/PATH_(variable)),
    by the way, is often used to customize terminal prompts.


    Now go back to your terminal and navigate to the `ch1-setup` directory. If you
    type `code .` it will open up in VS Code.


    ```

    (.venv) $ code .

    ```


    ## Install Git


    The final step is to install *Git*, a version control system indispensable to
    modern software development. With Git, you can collaborate with other developers,
    track all your work via commits, and revert to any previous version of your code
    even if you accidentally delete something important! This is not a book on Git,
    so all necessary commands are given and briefly explained, but there are numerous
    resources available for free on the internet if you''d like to learn [more about
    Git itself](https://git-scm.com/).


    On Windows, navigate to the official website at `https://git-scm.com/` and click
    on the "Download" link, which should install the proper version for your computer.
    Save the file, open your Downloads folder, and double-click on the file to launch
    the Git for Windows installer. Click the "Next" button through most early defaults
    as they are fine and can always be updated later. Make sure that under "Choosing
    the default editor used by Git", the selection is for "Use Visual Studio Code
    as Git''s default editor." And in the section on "Adjusting the name of the initial
    branch in new repositories," make sure the option to "Override the default branch
    name for new repositories" is selected so that "main" is used.


    To confirm Git is installed on Windows, close all current shell windows and then
    open a new one which will load the changes to our PATH variable. Type in `git
    --version` to display the installed version of Git.


    ```shell

    # Windows

    $ git --version

    git version 2.39.1.windows.1

    ```


    On macOS, [Xcode](https://developer.apple.com/xcode/) is primarily designed for
    building iOS apps but includes many developer features needed on macOS. Currently,
    installing Git via Xcode is the easiest option. To check if Git is installed on
    your computer, type `git --version` in a new terminal window.


    ```shell

    # macOS

    $ git --version

    ```


    If you do not have Git installed, a popup message will ask if you want to install
    it as part of "command line developer tools." Select "Install" which will load
    Xcode and its command line tools package. Or if you do not see the message, type
    `xcode-select --install` instead to install Xcode directly.


    Be aware that Xcode is a very large package, so the initial download may take
    some time. Xcode is primarily designed for building iOS apps and also includes
    many developer features needed on macOS. Once the download is complete, close
    all existing terminal shells, open a new window, and type in `git --version` to
    confirm the install worked.


    ```shell

    # macOS

    $ git --version

    git version 2.37.1 (Apple Git-137.1)

    ```


    Once Git installs on your local machine, we need to do a one-time *system* configuration
    by declaring the name and email address associated with all your Git commits.
    We will also set the default branch name to `main`. Within the command line shell,
    type the following two lines. Make sure to update them with your name and email
    address, not the defaults of "Your Name" and "yourname@email.com"!


    ```shell

    $ git config --global user.name "Your Name"

    $ git config --global user.email "yourname@email.com"

    $ git config --global init.defaultBranch main

    ```


    If you desire, you can always change these configs later by retyping the same
    commands with a new name or email address.


    ## Conclusion


    It is a challenging task to configure a software development environment from
    scratch. Even experienced programmers have difficulty with the job, but it is
    a one-time pain that is more than worth it. We now have the ability to start up
    new Django projects quickly and have learned about the command line, Python interactive
    mode, how to install the latest version of Python and Django, configured our text
    editor, and installed Git. Everything is ready for our first proper Django website
    in the next chapter.


    # Chapter 2: Hello World App


    In this chapter, we will build a Django project that says "Hello, World" on the
    homepage, the traditional way to start a new web framework. We''ll also work with
    Git for the first time and deploy our code to GitHub. The complete source code
    for this and all future chapters is available online at [the official GitHub repo](https://github.com/wsvincent/djangoforbeginners)
    for the book.


    ## How Websites Work


    If you are new to programming and building websites, it is worth quickly reviewing
    the fundamentals behind the Internet and the World Wide Web. The Internet is a
    broad global system of interconnected computers; the World Wide Web is a subset
    of the Internet that refers to hypertext documents linked together via hyperlinks
    (in other words, webpages).


    The internet relies on various "communication protocols," which are like human
    languages in that they allow computers all over the world to communicate with
    one another via agreed-upon conventions. For example, file sharing uses the *File
    Transfer Protocol (FTP)*, sending email uses the *Simple Mail Transfer Protocol
    (SMTP)*, communicating through voice uses the *Voice over Internet Protocol (VoIP)*,
    and viewing webpages–our area of particular interest in this book–uses the *Hypertext
    Transfer Protocol (HTTP)*.


    In common conversation, the terms "Internet" and "World Wide Web" are frequently
    used interchangeably, but as web developers it is important to realize that they
    refer to quite different things.'
