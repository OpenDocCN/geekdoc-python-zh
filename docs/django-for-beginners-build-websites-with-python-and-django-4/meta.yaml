    # Extending Templates


    The real power of templates is that they can be extended. If you think about most
    websites, the same content appears on every page (header, footer, etc.). Wouldn''t
    it be nice if we, as developers, could have *one canonical place* for our header
    code that all other templates would inherit?


    Well, we can! Let''s create a `base.html` file containing a header with links
    to our two pages. We could name this file anything, but using `base.html` is a
    standard convention. In your text editor, make this new file called `templates/base.html`.


    Django has a minimal templating language for adding links and basic logic in our
    templates. You can see the complete list of built-in template tags [here in the
    official docs](https://docs.djangoproject.com/en/4.0/ref/templates/builtins/).
    Template tags take the form of `{% something %}` where the "something" is the
    template tag itself. You can even create custom template tags, though we won''t
    do that in this book.


    To add URL links in our project, we can use the [built-in URL template tag](https://docs.djangoproject.com/en/4.0/ref/templates/builtins/#url)
    which takes the URL pattern name as an argument. Remember how we added optional
    URL names to our two routes in `pages/urls.py`? The `url` tag uses these names
    to create links for us automatically.


    The URL route for our homepage is called `home`. To configure a link to it, we
    use the following syntax: `{% url ''home'' %}`.'
  - "[PAGE 73]\n\n```\nhtml\n<!-- templates/base.html -->\n<header>\n  <a href=\"\
    {% url 'home' %}\">Home</a> |\n  <a href=\"{% url 'about' %}\">About</a>\n</header>\n\
    \n{% block content %} {% endblock content %}\n```\n\nAt the bottom, we've added\
    \ a `block` tag called `content`. While it's optional to name our closing `endblock`—you\
    \ can write `{% endblock %}` if you prefer—doing so helps with readability, especially\
    \ in larger template files.\n\nLet's update our `home.html` and `about.html` files\
    \ to extend the `base.html` template. That means we can reuse the same code from\
    \ one template in another. The Django templating language comes with an [extends](extends)\
    \ method that we can use for this.\n\n```\nhtml\n<!-- templates/home.html -->\n\
    {% extends \"base.html\" %}\n\n{% block content %}\n<h1>Homepage</h1>\n{% endblock\
    \ content %}\n```\n\n```\nhtml\n<!-- templates/about.html -->\n{% extends \"base.html\"\
    \ %}\n\n{% block content %}\n<h1>About page</h1>\n{% endblock content %}\n```\n\
    \nNow if you start up the server with `python manage.py runserver` and open up\
    \ our webpages again at `http://127.0.0.1:8000/`, the header is included."
