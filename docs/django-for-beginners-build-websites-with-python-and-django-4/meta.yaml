- img_proc: true
  md: '+   - generate a `requirements.txt` file

    - update `ALLOWED_HOSTS` in `django_project/settings.py`

    - add a `.dockerignore` file


    The first step is to install [Gunicorn](https://gunicorn.org/), a production-ready
    WSGI server for our project. Gunicorn replaces the Django local development server
    and–as with all Python packages–is installable via Pip.


    ```

    shell

    (.venv) $ python -m pip install gunicorn==20.1.0

    ```


    Step two is to create a `requirements.txt` file containing every Python package
    currently installed in our virtual environment. This file is necessary so that
    the project can be recreated on production servers and other team members (if
    any) can recreate the repository from scratch in the future.


    We can use the command `python -m pip freeze` to output all the installed packages
    to the terminal. Then we *could* create a root project-level `requirements.txt`
    file and copy/paste the output over. Or we can take a more elegant approach by
    redirecting the output of `pip freeze` over to the `requirements.txt` file automatically.
    The greater-than symbol (`>`) lets us redirect the output to a file. Here is what
    the full command looks like. Run it.


    ```

    shell

    (.venv) $ python -m pip freeze > requirements.txt

    ```


    If you look in your text editor, a new `requirements.txt` file has been created
    listing each package in our virtual environment. You do not need to focus too
    much on the contents of this file, just remember that whenever you install a new
    Python package in your virtual environment,'
  merge: -1
