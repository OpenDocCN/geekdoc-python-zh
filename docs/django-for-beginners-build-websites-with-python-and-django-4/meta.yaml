    # ## Tests


    It''s important to add automated tests and run them whenever a codebase changes.
    Tests require a small amount of upfront time to write but more than pay off later
    on. In the words of Django co-creator [Jacob Kaplan-Moss](https://jacobian.org/),
    "Code without tests is broken as designed."


    Testing can be divided into two main categories: unit and integration. *Unit tests*
    check a piece of functionality in'
  merge: -1
  pgno: 74
- img_proc: true
  md: 'isolation, while *Integration tests* check multiple linked pieces. Unit tests
    run faster and are easier to maintain since they focus on only a tiny amount of
    code. Integration tests are slower and harder to maintain since a failure doesn''t
    point you in the specific direction of the cause. Most developers focus on writing
    many unit tests and a small number of integration tests.


    The next question is, What to test? Anytime you have created new functionality,
    a test is necessary to confirm that it works as intended. For example, in our
    project, we have a home page and an about page, and we should test that both exist
    at the expected URLs.It may seem unnecessary now but as a project grows in size,
    tests make sure that you don''t inadvertently break something you did previously.
    By writing tests and regularly running them, you can ensure this doesn''t happen.


    The Python standard library contains a built-in testing framework called [unittest](unittest)
    that uses [TestCase](TestCase) instances and a long list of [assert methods](assert
    methods) to check for and report failures. Django''s testing framework provides
    several extensions on top of Python''s `unittest.TestCase` base class. These include
    a [test client](test client) for making dummy Web browser requests, several Django-specific
    [additional assertions](additional assertions), and four test case classes: [SimpleTestCase](SimpleTestCase),
    [TestCase](TestCase), [TransactionTestCase](TransactionTestCase), and [LiveServerTestCase](LiveServerTestCase).


    Generally speaking, `SimpleTestCase` is used when a database is unnecessary while
    `TestCase` is used when you want to test the database. `TransactionTestCase` is
    helpful to directly test [database transactions](database transactions) while
    `LiveServerTestCase` launches a live server thread for testing with browser-based
    tools like Selenium.'
