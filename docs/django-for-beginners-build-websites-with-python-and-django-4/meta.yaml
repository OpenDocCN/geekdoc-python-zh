    Xcode 及其命令行工具包。或者如果你没有看到该消息，请改为输入 `xcode-select --install` 直接安装 Xcode。


    请注意，Xcode 是一个非常大的软件包，因此初始下载可能需要一些时间。Xcode 主要用于构建 iOS 应用程序，也包含了 macOS 所需的许多开发者功能。下载完成后，关闭所有现有的终端
    shell，打开一个新窗口，然后输入 `git --version` 以确认安装成功。


    ```shell

    # macOS

    $ git --version

    git version 2.37.1 (Apple Git-137.1)

    ```


    一旦 Git 安装在你的本地机器上，我们需要通过声明与所有 Git 提交关联的姓名和电子邮件地址来进行一次性的*系统*配置。我们还将把默认分支名称设置为 `main`。在命令行
    shell 中，输入以下两行。请务必将其更新为你的姓名和电子邮件地址，而不是默认的 "Your Name" 和 "yourname@email.com"！


    ```shell

    $ git config --global user.name "Your Name"

    $ git config --global user.email "yourname@email.com"

    $ git config --global init.defaultBranch main

    ```


    如果你愿意，以后可以随时通过使用新的姓名或电子邮件地址重新输入相同的命令来更改这些配置。


    ## 结论


    从零开始配置软件开发环境是一项具有挑战性的任务。即使是有经验的程序员也会觉得这项工作很困难，但这是一次性的痛苦，而且非常值得。我们现在能够快速启动新的 Django
    项目，并且已经了解了命令行、Python 交互模式、如何安装最新版本的 Python 和 Django、配置了我们的文本编辑器，以及安装了 Git。一切准备就绪，下一章我们将创建第一个正式的
    Django 网站。


    # 第 2 章：Hello World 应用


    在本章中，我们将构建一个 Django 项目，在主页上显示 "Hello, World"，这是开始新 Web 框架的传统方式。我们还将首次使用 Git，并将代码部署到
    GitHub。本章及未来所有章节的完整源代码可在本书的[官方 GitHub 仓库](https://github.com/wsvincent/djangoforbeginners)中获取。


    ## 网站的工作原理


    如果你是编程和构建网站的新手，快速回顾一下互联网和万维网背后的基础知识是值得的。互联网是一个广泛的全球互联计算机系统；万维网是互联网的一个子集，指的是通过超链接相互连接的超文本文档（换句话说，就是网页）。


    互联网依赖于各种"通信协议"，它们就像人类语言一样，允许世界各地的计算机通过约定的规范相互通信。例如，文件共享使用*文件传输协议（FTP）*，发送电子邮件使用*简单邮件传输协议（SMTP）*，语音通信使用*互联网语音协议（VoIP）*，而查看网页——本书特别关注的领域——使用*超文本传输协议（HTTP）*。


    在日常对话中，"互联网"和"万维网"这两个术语经常被互换使用，但作为 Web 开发者，重要的是要认识到它们指的是相当不同的东西。'
