    # ## DEBUG


    The [DEBUG](link) setting is a boolean that turns debug mood on and off. The official
    documentation notes that you should **never deploy a site into production with
    DEBUG turned on**. To understand why, start up the local server with `python manage.py
    runserver` and navigate to a page that does not exist, like `http://127.0.0.1:8000/debug`.
    You will see the following:'
  - '[PAGE 197]


    ![](img/8898b60f655bfc3510e72493f7e0548e_197_0.png)


    # Page not found


    This page lists all the URLs tried and apps loaded, which is a treasure map for
    any hacker attempting to break into your site. You''ll even see that on the bottom
    of the error page, it says that Django will display a standard 404 page if `DEBUG=False`.
    This is no good, so let''s fix that. Within the `django_project/settings.py` file,
    change `DEBUG` to `False`.


    # Code


    ```

    # django_project/settings.py

    DEBUG = False

    ```


    If you look in the terminal, the local web server has automatically been stopped
    and there is an error message: `CommandError: You must set settings.ALLOWED_HOSTS
    if DEBUG is False`. You can''t even run the local web server when `DEBUG` is set
    to `False`!


    Our goal is for `DEBUG` to be `True` for local development but set to `False`
    in production. The two-step process for adding any environment variable is first
    adding it to the `.env` file and then to `django_project/settings.py`. Within
    the `.env` file, create a new environment variable called `DEBUG`; we will set
    its value to `True`. It is important *not to have* any spaces here.'
  - '[PAGE 198]


    ```


    .env

    DEBUG=True

    ```


    Then in `django_project/settings.py`, change the `DEBUG` setting to read the variable
    `"DEBUG"` from the `.env` file.


    ```

    python

    # django_project/settings.py

    DEBUG = env.bool("DEBUG")

    ```


    Try to run the local web server again with `runserver` and it will work as before.


    ```

    shell

    (.venv) $ python manage.py runserver

    ```


    It''s easy to be confused here! Our environment variable is named `DEBUG`, the
    same as the setting it replaces. But we could have named our environment variable
    `ANYTHING` instead, and that would have looked like this:


    ```


    .env

    ANYTHING=True

    ```


    ```

    python

    # django_project/settings.py

    DEBUG = env.bool("ANYTHING")

    ```


    `ANYTHING` is a variable, so it can have almost any name we desire. In practice,
    however, most developers will name the environment variable to match the name
    of the setting it replaces, and we will do the same so `DEBUG=True`.


    One more best practice we will adopt is to set a default value, in this case,
    `False`, meaning that if an environment variable can''t be found, our production
    setting will be used. It''s a best practice to default to production settings
    since'
  - '[PAGE 199]


    they are more secure, and if something goes wrong in our code, we won''t default
    to exposing all our secrets out in the open.


    The final `django_project/settings.py` line, therefore, looks as follows:


    ```

    # django_project/settings.py

    DEBUG = env.bool("DEBUG", default=False)

    ```


    If you refresh the webpage at `http://127.0.0.1:8000/debug`, you''ll see the full
    error page is back again, which means `DEBUG=TRUE` because the local environment
    has looked for a `.env` file, found `DEBUG` and imported its value into `django_project/settings.py`.


    When we deploy into production, the `.env` is ignored by both Docker and Git,
    so it won''t be present. That means our project will default to `False`, the secure
    choice.


    # SECRET_KEY


    The [SECRET_KEY](https://docs.djangoproject.com/en/4.0/ref/settings/#std:setting-SECRET_KEY)
    is a random 50-character string generated each time `startproject` is run. It
    provides [cryptographic signing](https://docs.djangoproject.com/en/4.0/topics/signing/)
    in our project and is very important to keep secure. If you look at the value
    in `django_project/settings.py`, the comment clearly shows that the existing key
    is not secret.


    ```

    # django_project/settings.py

    # SECURITY WARNING: keep the secret key used in production secret!

    SECRET_KEY = "django-insecure-^qi19+(oo-ere5b&$@275chw)k@7ob1)74aol5d$(k*)5kk5)"

    ```


    Copy and paste this value into the `.env` file.


    ```

    .env

    ```'
  - '[PAGE 200]


    ```


    DEBUG=True

    SECRET_KEY=django-insecure-^qi19(+(oo-ere5b&$@275chw)k@7ob1)74aol5d$(k*)5kk5)

    ```


    Then update `django_project/settings.py` so that `SECRET_KEY` points to this new
    environment variable.


    ```

    python

    # django_project/settings.py

    SECRET_KEY = env.str("SECRET_KEY")

    ```


    Our `SECRET_KEY` is now out of the `settings.py` file and is safe, right? Actually
    *no*! Because we made an earlier Git commit, the `SECRET_KEY` value is stored
    in our Git history no matter what we do. Anyone who can access our source code
    and Git history can see it. Uh oh.


    The solution is to create a new `SECRET_KEY` and add it to the `.env` file. Remember
    that we added `.env` to our `.gitignore` file, so Git will not track it. Even
    if someone malicious has access to our codebase, they cannot see the `.env` file
    and the `SECRET_KEY` within.


    One way to generate a new one is by invoking Python''s built-in [secrets](https://docs.python.org/3/library/secrets.html)
    module by running `python -c ''import secrets; print(secrets.token_urlsafe())''`
    on the command line.


    ```

    shell

    (.venv) $ python -c "import secrets; print(secrets.token_urlsafe())"

    imDnfLXy-8Y-YozfJmP2Rw_81YA_qxlXKl5FeY0mXyY

    ```


    Check that there are no quotations (`"` or `''`) around strings nor spaces around
    the `=`. If there are, update them to a different value. Copy and paste this new
    value into the `.env` file.


    ```


    DEBUG=True

    SECRET_KEY=imDnfLXy-8Y-YozfJmP2Rw_81YA_qxlXKl5FeY0mXyY

    ```'
