  md: 'every other Python package we will use in this book.


    We will use [pip](https://pip.pypa.io/), the most popular package installer, to
    install Python packages. It already comes included with Python 3, but to ensure
    we are on the latest version of `pip`, let''s take a moment to update it. Here
    is the command to run:


    ```

    shell

    $ python -m pip install --upgrade pip

    ```


    This command will install and upgrade (if needed) the latest version of `pip`.
    Notice that we are not in a virtual environment, so this version of `pip` will
    be installed globally on our local computer.


    Why do we use `python -m pip` instead of just `pip` for this command? The latter
    does work, but it can cause some issues. Using `python` with the `-m` flag ensures
    that the intended version of Python is in use, *even if* you have multiple versions
    of Python installed on your computer. For example, if you have Python 2.7 and
    3.7 installed on your computer, it is possible for `pip install` to use Python
    2.7 at one point but Python 3.7 later: not desired behavior. [Brett Cannon](https://snarky.ca/why-you-should-use-python-m-pip/)
    has a much fuller explanation if you are curious about the underlying reasons
    why this is the case.


    Python is now installed, we know how to use virtual environments, and we''ve updated
    our version of `pip`. It is time to install Django itself for the first time.


    # ## Install Django


    In the `ch1-setup` directory, reactivate the existing virtual environment and
    install Django.


    ```

    shell

    Shell

    ```'
