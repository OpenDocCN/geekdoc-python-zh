    The `SECRET_KEY` is a randomly generated string that provides cryptographic signing
    throughout our project. It needs to be secure. On the command line, generate a
    new string for us to use since the existing one that starts with `django-insecure-...`
    has already been committed to Git and is, therefore, insecure.


    ```

    shell

    (.venv) $ python -c "import secrets; print(secrets.token_urlsafe())"

    4Dx5f3TRmyGGQJ5U19eozyMy8s1hRoDh7d5DUSfc8ZU

    ```


    Update the `.env` file with this new value.


    ```


    .env

    DEBUG=True

    SECRET_KEY=4Dx5f3TRmyGGQJ5U19eozyMy8s1hRoDh7d5DUSfc8ZU  # new

    ```


    Then update the existing `SECRET_KEY` configuration in `django_project/settings.py`
    to point to this new environment variable.


    ```

    python

    # django_project/settings.py

    SECRET_KEY = env.str("SECRET_KEY")

    ```


    # # ALLOWED_HOSTS and CSRF_TRUSTED_ORIGINS


    `ALLOWED_HOSTS` lists all of the host/domain names our Django website can serve,
    while `CSRF_TRUSTED_ORIGINS` is a list of trusted origins for unsafe requests
    like POSTs. Both need to'
  - '[PAGE 330]


    be explicitly set now and once we have our production URLs from Fly, we can lock
    them down properly.


    ```

    python

    # django_project/settings.py

    ALLOWED_HOSTS = [".fly.dev", "localhost", "127.0.0.1"]  # new

    CSRF_TRUSTED_ORIGINS = ["https://*.fly.dev"]  # new

    ```


    # ## Fly Deployment


    Log into your Fly account using `flyctl auth login` from the command line.


    ```

    shell

    (.venv) $ flyctl auth login

    ```


    We''ll run `fly launch` to see our production URL and then immediately add it
    to the `ALLOWED_HOSTS` and `CSRF_TRUSTED_ORIGINS` settings before deployment.
    In the wizard, we will respond to the questions as follows:


    +   - **Choose an app name**: this will be your dedicated `fly.dev` subdomain

    - **Choose the region for deployment**: select the one closest to you or [another
    region](another-region) if you prefer

    - **Decline overwriting our .dockerignore file**: our choices are already optimized
    for the project

    - **Setup a Postgres database cluster**: the "Development" option is appropriate
    for this project. [Fly Postgres is a regular app deployed to Fly.io, not a managed
    database.](fly-postgres)

    - **Select "Yes" to scale a single node pg to zero after one hour**: this will
    save money for toy projects

    - **Decline to setup a Redis database**: we don''t need one for this project


    ```

    shell

    ```'
  - '[PAGE 331]


    ```


    (.venv) $ fly launch

    Creating app in ~/desktop/code/news

    Scanning source code

    Detected a Django app

    ? Choose an app name (leave blank to generate one): dfb-ch17-news

    automatically selected personal organization: Will Vincent

    Some regions require a paid plan (fra, maa).

    See https://fly.io/plans to set up a plan.

    ? Choose a region for deployment: Boston, Massachusetts (US) (bos)

    App will use ''bos'' region as primary

    Created app ''dfb-ch17-news'' in organization ''personal''

    Admin URL: https://fly.io/apps/dfb-ch17-news

    Hostname: dfb-ch17-news.fly.dev

    ? Overwrite "/Users/wsv/Desktop/dfb_ch8/.dockerignore"? No

    Set secrets on dfb-ch17-news: SECRET_KEY

    ? Would you like to set up a Postgresql database now? Yes

    ? Select configuration: Development - Single node, 1x shared CPU, 256MB RAM,

    1GB

    ? Scale single node pg to zero after one hour? Yes

    Creating postgres cluster in organization personal

    Creating app...

    ...

    ? Would you like to set up an Upstash Redis database now? No

    Wrote config file fly.toml

    Your app is ready! Deploy with `flyctl deploy`

    ```


    My hostname here is `dfb-ch17-news.fly.dev`, but your hostname will naturally
    differ. Add your hostname to the `ALLOWED_HOSTS` and `CSRF_TRUSTED_ORIGINS` settings.


    # Code


    ```

    python

    # django_project/settings.py

    ALLOWED_HOSTS = ["dfb-ch17-news.fly.dev", "localhost", "127.0.0.1"]  # new

    CSRF_TRUSTED_ORIGINS = ["https://dfb-ch17-news.fly.dev"]  # new

    ```


    We should be all set. Before deploying our project to Fly servers, add another
    Git commit with all the changes that have occurred.


    # Shell


    ```


    (.venv) $ git status

    (.venv) $ git add -A

    (.venv) $ git commit -m "Fly deployment"

    (.venv) $ git push origin main

    ```


    Run the command `flyctl deploy` to deploy the project on Fly servers and open
    up the website in a web browser via the'
  - '[PAGE 332]


    fly open command.


    ```

    Shell

    (.venv) $ flyctl deploy

    (.venv) $ fly open

    ```


    If there are any issues with your deployment, you can use `fly logs` to see recent
    log file entries or go to `fly.io` to see the full dashboard.


    # ## Production Database


    Remember that we now have a production PostgreSQL database that is empty. It does
    not contain any newspaper articles or users we''ve added to our local version.
    SSH into the production database and create a superuser account.


    ```

    Shell

    (.venv) $ fly ssh console --pty -C "python /code/manage.py createsuperuser"

    ```


    Then visit the `/admin` page, create some new articles, and refresh the main homepage;
    they should appear. You can also create user accounts and confirm that the user
    authentication flow works correctly by resetting your password.


    For future updates to Fly.io, you should first save the changes to GitHub and
    then use the command `flyctl deploy` to update the code on your production website.


    # ## Deployment Conclusion


    Phew! We just covered *a ton* of material so you likely feel overwhelmed right
    now. That''s normal. There are many steps involved in configuring a website for
    proper deployment, and the good news is that this same list of'
  - '[PAGE 333]


    production settings will hold true for almost every Django project. Don''t worry
    about memorizing all the steps.


    After you''ve built and deployed several Django websites, these steps will soon
    feel very familiar. And in fact, we''ve only scratched the surface of additional
    security measures that can be configured. Django has its own [deployment checklist](https://docs.djangoproject.com/en/4.0/howto/deployment/checklist/)
    that can be run via the command line to highlight additional security issues.


    The other big stumbling block for newcomers is becoming comfortable with the difference
    between local and production environments. You will likely forget to push code
    changes into production and spend minutes or hours wondering why the change isn''t
    live on your site. Or even worse, you''ll change your local SQLite database and
    expect them to magically appear in the production PostgreSQL database. It''s part
    of the learning process. But Django really does make it much smoother than it
    otherwise would be. And now you know enough to deploy any Django project online
    confidently.'
  - '[PAGE 334]


    # # Chapter 18: Conclusion


    Congratulations on finishing *Django for Beginners*! After starting from absolute
    zero, we''ve built five different web applications from scratch and covered Django''s
    major features: templates, views, URLs, users, models, security, testing, and
    deployment. You now have the knowledge to go off and build modern websites with
    Django.


    As with any new skill, practicing and applying what you''ve just learned is important.
    The CRUD (Create-Read-Update-Delete) functionality in our *Blog* and *Newspaper*
    sites is commonplace in many other web applications. For example, can you make
    a Todo List web application? A Twitter or Facebook clone? You already have all
    the tools you need. When starting out, the best approach is to build as many small
    projects as possible, incrementally add complexity, and research new things.


    # ## Next Steps


    We explored a lot of Django material in this book, but there is still much more
    to learn, especially if you want to build large websites that simultaneously handle
    thousands or millions of visitors. Django is more than capable of this, and I''ve
    written a follow-up book called [Django for Professionals](https://djangoforprofessionals.com)
    that tackles many of the challenges around building truly *production-ready* websites
    such as using Docker, using a production database like PostgreSQL locally, incorporating
    advanced user registration, including additional security, improving performance,
    and much more.


    Django is also frequently used to create back-end APIs consumable by mobile apps
    (iOS/Android) or websites that'
- md: ''
  mdcn: ''
  merge: -1
  raw:
  - '[PAGE 335]


    use a dedicated JavaScript front-end framework such as Vue, React, or Angular.
    Thanks to the power of [Django REST Framework](https://www.django-rest-framework.org/),
    a third-party package tightly coupled with Django itself, it is possible to transform
    any existing Django website into an API with a minimal amount of code. If you''d
    like to learn more, I''ve written a book called [Django for APIs](https://djangoforapis.com/).


    # ## 3rd Party Packages


    As we''ve seen in this book, third-party packages are a vital part of the Django
    ecosystem, especially regarding deployment or improvements around user registration.
    It''s common for a professional Django website to rely on dozens of such packages.


    However, a word of caution is in order: don''t blindly install and use third-party
    packages because it saves a small amount of time. Every additional package introduces
    another dependency, another risk that its maintainer won''t fix every bug or keep
    up to date with the latest version of Django. Take the time to understand what
    it is doing.


    If you''d like to view more packages, the [Django Packages](https://djangopackages.org/)
    website is a comprehensive resource of all available third-party packages. A more
    curated option, the [awesome-django](https://github.com/wsvincent/awesome-django)
    repo, which I run with the current maintainer of Django Packages, is also worth
    a look.


    # ## Learning Resources


    As you become more comfortable with Django and web development in general, you''ll
    find the [official Django documentation](https://docs.djangoproject.com/) and
    [source code](https://github.com/django/django) increasingly valuable. I refer
    to both on an almost daily basis. There is also the [official Django forum](https://forum.djangoproject.com/),
    a great albeit underutilized resource for Django-specific questions.'
  - '[PAGE 336]


    I run a dedicated website called [LearnDjango.com](https://learndjango.com) that
    contains free and (soon) premium tutorials on Django. It is worth a look for additional
    information on how to use Django in the real world.


    If you need help starting a new project quickly, take a look at my two free starter
    projects: [DjangoX](https://github.com/wsvincent/djangox) for Django and [DRFX](https://github.com/wsvincent/drfx)
    for a Django API.


    If you''re interested in a podcast on Django, I co-host [Django Chat](https://djangochat.com),
    which features interviews with leading developers and topic deep-dives. And I
    co-write a weekly newsletter, [Django News](https://django-news.com), filled with
    news, articles, tutorials, and more about Django.


    # ## Python Books


    Django is, ultimately, just Python, so if your Python skills could improve, I
    recommend Eric Matthes''s [Python Crash Course](https://nostarch.com/pythoncrashcourse2e).
    For intermediate to advanced developers, [Fluent Python](https://www.oreilly.com/library/view/fluent-python/9781491946237/)
    and [Effective Python](https://effectivepython.com/) are worthy of additional
    study.


    # ## Feedback


    If you purchased this book on Amazon, please leave an honest review. It makes
    an enormous impact on book sales and helps me continue to teach Django full-time.


    As a final note, I''d love to hear your thoughts about the book. It is a constant
    work in progress, and the detailed feedback I receive from readers helps me continue
    to improve it. I try to respond to every email at `will@wsvincent.com`.


    Thank you for reading the book. Good luck on your journey with Django!'
