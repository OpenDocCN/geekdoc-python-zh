  md: '# ## Testing Philosophy


    There''s really no limit to what you can test in an application. For example,
    we *could* also add tests now based on logged-in or logged-out behavior and whether
    the template displays the proper content. But the 80/20 rule of 80% of consequences
    coming from 20% of causes applies to testing and most other things in life. There''s
    no sense in making as many unit tests as possible to test things that will likely
    never fail, at least for a web application. If we were working on a nuclear reactor,
    having as many tests as possible would make sense, but the stakes are a bit lower
    for most websites.


    So while you always want to add tests around new features, it''s ok to only have
    partial test coverage from the beginning. As errors inevitably arise on new Git
    branches and features, add a test for each so they don''t fail again. This approach
    is known as *regression testing*, where tests are re-run each time there''s a
    new change to ensure that previously developed and tested software performs as
    expected.


    Django''s testing suite is well set up for many unit tests and automatic regression
    tests, so developers have confidence in the consistency of their projects.


