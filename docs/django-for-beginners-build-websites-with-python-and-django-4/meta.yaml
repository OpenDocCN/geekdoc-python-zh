    With a small amount of code, we''ve built a blog application that allows for creating,
    reading, updating, and deleting blog posts. This core functionality is known by
    the acronym *CRUD: Create-Read-Update-Delete*. The majority of websites in the
    world consist of this core functionality. While there are multiple ways to achieve
    this same functionality–we could have used function-based views or written our
    own class-based views–we''ve demonstrated how little code it takes in Django to
    make this happen.


    Note, however, a potential security concern: currently *any* user can update or
    delete blog entries, not just the creator! Fortunately, Django has built-in features
    to restrict access based on permissions, which we''ll cover later in the book.


    But for now, our blog application is working, and in the next chapter, we''ll
    add user accounts so users can sign up, log in, and log out of the web app.'
