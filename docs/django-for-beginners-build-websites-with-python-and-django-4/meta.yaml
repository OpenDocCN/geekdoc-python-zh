    # ## Hosting Options


    To make our site available online where everyone can see it, we need to deploy
    our code to an external server and database. Local code lives only on our computer;
    production code lives on an external server available to everyone. Therefore,
    deploying code online is also called, *putting our code into production*.


    There are three main ways to host a website:


    +   - **1. Dedicated Server:** a physical server sitting in a data center that
    belongs exclusively to you. Generally, only the largest companies adopt this approach
    since it'
  - '[PAGE 82]


    requires a lot of technical expertise to configure and maintain.


    +   - **2. Virtual Private Server (VPS):** a server can be divided into multiple
    virtual machines that use the same hardware, which is much more affordable than
    a dedicated server. This approach also means you don''t have to worry about maintaining
    the hardware yourself.


    +   - **3. Platform as a Service (PaaS):** a managed VPS solution that is pre-configured
    and maintained, making it the fastest option to deploy and scale a website. The
    downside is that a developer does not have access to the same degree of customization
    that a VPS or a dedicated server provides.


    These days most individual developers and small companies rely on PaaS''s for
    their hosting needs since it abstracts away a challenging part of website development.
    That is the approach we will use in this book, too.


    # ## Deployment Checklist


    Django defaults to a local development configuration with the `startproject` command,
    which makes it easier to start building apps locally, but many settings are a
    security risk in production.


    Since deployment requires many discrete steps, it is common to have a "checklist"
    for these since there quickly become too many to remember. At this stage, we are
    intentionally keeping things basic however, this list will grow in future projects
    as we add additional security and performance features.


    Here is the current deployment checklist:


    +   - install Gunicorn as a WSGI server'
  - '[PAGE 83]


    +   - generate a `requirements.txt` file

    - update `ALLOWED_HOSTS` in `django_project/settings.py`

    - add a `.dockerignore` file


    The first step is to install [Gunicorn](https://gunicorn.org/), a production-ready
    WSGI server for our project. Gunicorn replaces the Django local development server
    and–as with all Python packages–is installable via Pip.


    ```

    shell

    (.venv) $ python -m pip install gunicorn==20.1.0

    ```


    Step two is to create a `requirements.txt` file containing every Python package
    currently installed in our virtual environment. This file is necessary so that
    the project can be recreated on production servers and other team members (if
    any) can recreate the repository from scratch in the future.


    We can use the command `python -m pip freeze` to output all the installed packages
    to the terminal. Then we *could* create a root project-level `requirements.txt`
    file and copy/paste the output over. Or we can take a more elegant approach by
    redirecting the output of `pip freeze` over to the `requirements.txt` file automatically.
    The greater-than symbol (`>`) lets us redirect the output to a file. Here is what
    the full command looks like. Run it.


    ```

    shell

    (.venv) $ python -m pip freeze > requirements.txt

    ```


    If you look in your text editor, a new `requirements.txt` file has been created
    listing each package in our virtual environment. You do not need to focus too
    much on the contents of this file, just remember that whenever you install a new
    Python package in your virtual environment,'
  - '[PAGE 84]


    you should update the `requirements.txt` file to reflect it. There are more complicated
    tools that automate this process, but since we are using `venv` and keeping things
    as simple as possible, it must be done manually.


    The third step is to look within `django_project/settings.py` for the [ALLOWED_HOSTS](https://docs.djangoproject.com/en/4.0/ref/settings/#allowed-hosts)
    setting, representing which host/domain names our Django site can serve. This
    is a security measure to prevent HTTP Host header attacks. For now, we''ll use
    the wildcard asterisk, `*`, so that *all* domains are acceptable. Later in the
    book, we''ll adopt a more secure approach of explicitly listing allowed domains.


    ```

    python

    # django_project/settings.py

    ALLOWED_HOSTS = ["*"]

    ```


    The fourth and final step is to create a `.dockerignore` file in the project root
    directory, next to the existing `.gitignore` file. [Docker](https://www.docker.com/)
    is used by most modern hosting companies–more on this shortly–and it is essential
    to tell it what to ignore. The `.dockerignore` file does this for us. At a minimum,
    we want to ignore our local virtual environment, SQLite database, and Git repo.


    ```


    .dockerignore

    .venv/

    *.sqlite3

    .git

    ```


    That''s it! Remember that we''ve taken several security shortcuts here, but the
    goal is to push our project into production in as few steps as possible. In future
    chapters, we will cover proper security around deployments in depth.


    Use `git status` to check our changes, add the new files, and then commit them:'
  - '[PAGE 85]


    ```

    shell

    (.venv) $ git status

    (.venv) $ git add -A

    (.venv) $ git commit -m "New updates for deployment"

    ```


    Push the code to GitHub to have an online backup of all our code changes.


    ```

    shell

    (.venv) $ git push -u origin main

    ```


    # ## Fly.io


    Until recently, Heroku was the default choice for simple Django deployments because
    it was free for small projects and widely used. Unfortunately, Heroku announced
    that as of November 2022, it would cease offering free tiers. Running a hosting
    company requires actual costs and efforts to prevent fraud, and it is not unreasonable
    to expect to pay something to host a website.


    For this book, we will use [Fly.io](https://fly.io). Sign up for an account on
    their website using your email address or GitHub account. Adding a payment method
    is now required.


    # ## Deploy to Fly.io


