    # Databases


    Before we dive into implementing our Blog post models, it is worth taking a step
    back to review how databases, ORMs, and Django work together. A database is a
    place to store and access different types of data, and there are two main types
    of databases: relational and non-relational.


    A relational database stores information in tables containing columns and rows,
    roughly analogous to an Excel'
  - '[PAGE 131]


    spreadsheet. The columns define what information can be stored; the rows contain
    the actual data. Frequently, data in separate tables have some relation to each
    other, hence the term "relational database" to describe databases with this structure
    of tables, columns, and rows.


    SQL (Structured Query Language) is typically used to interact with relational
    databases to perform basic CRUD (Create, Read, Update, Delete) operations and
    define the type of relationship (like a *many-to-one* relationship, for example.
    We''ll learn more about these shortly.).


    A non-relational database is any database that doesn''t use the tables, fields,
    rows, and columns inherent in relational databases to structure its data: examples
    include document-oriented, key-value, graph, and wide-column.


    Relational databases are best when data is consistent, structured, and relationships
    between entities are essential. Non-relational databases have advantages when
    data is not structured, needs to be flexible in size or shape, and must be open
    to change in the future. Relational databases have been around far longer and
    are more widely used, while many non-relational databases were designed recently
    for specific use in the cloud.


    Database design and implementation is an entire field of computer engineering
    that is very deep and quite interesting but far beyond the scope of this book.
    The important takeaway for our purposes is that these two types of databases exist.
    Still, Django only has built-in support for relational databases, so that is what
    we will focus on going forward.


    # ## Django''s ORM'
  - '[PAGE 132]


    An ORM (Object-Relational Mapper) is a powerful programming technique that makes
    working with data and relational databases much easier. In the case of Django,
    its ORM means we can write Python code to define database models; we don''t have
    to write raw SQL ourselves. And we don''t have to worry about subtle differences
    in how each database interprets SQL. Instead, the Django ORM supports five relational
    databases: SQLite, PostgreSQL, MySQL, MariaDB, and Oracle. It also comes with
    support for migrations which provides a way to track and sync database changes
    over time. In sum, the Django ORM saves developers a tremendous amount of time
    and is one of the major reasons why Django is so efficient.


    While the ORM abstracts much of the work, we still need a basic understanding
    of relational databases if we want to implement them correctly. For example, before
    writing any actual code, let''s look at structuring the data in our Blog database.


    Recall that we create a table by adding columns to define different "fields" of
    data. So, for example, we could start with a table called "Post" with columns
    for the title, author, and body text. If we drew this out as a simple schema,
    it would look something like this:


    | Post Schema |

    |:---|

    | Post |

    | --------- |

    | TITLE | AUTHOR | BODY |


    And the actual database table with columns and rows would look like this:


    | Post Database Table |

    |:---|

    | Post |

    | --------- |

    | TITLE | AUTHOR | BODY |'
