    \ won't be pushed up to GitHub. One solution is to add a `.keep` file to an otherwise\
    \ empty directory. Add an empty `.keep` file to the three subfolders in your text\
    \ editor: `static/css/.keep`, `static/js/.keep`, and `static/img/.keep`.\n\nIn\
    \ production, it is desirable to have one single location for all static files\
