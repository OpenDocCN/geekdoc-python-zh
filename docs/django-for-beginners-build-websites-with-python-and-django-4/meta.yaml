    \ we can solve all these problems with a single line of code. Here is the brief\
    \ update to make to `django_project/settings.py` so that our project will try\
    \ to access a `DATABASE_URL` environment variable but, in its absence (aka when\
    \ we are working locally), default to SQLite."
