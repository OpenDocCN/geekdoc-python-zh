  md: "The only environment variable we'll use right now is for the `DATABASES` configuration\
    \ in the `django_project/settings.py` file. Remember, we want a way to use SQLite\
    \ locally but PostgreSQL in production. This is what currently exists: the `ENGINE`\
    \ says to use SQLite, and the `NAME` points to its location.\n\n```\n# django_project/settings.py\n\
    DATABASES = {\n    \"default\": {\n        \"ENGINE\": \"django.db.backends.sqlite3\"\
