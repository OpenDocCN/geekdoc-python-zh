- img_proc: true
  md: "But what are these default fields? It turns out there [are many](https://docs.djangoproject.com/en/4.0/ref/contrib/auth/#django.contrib.auth.models.User)\
    \ including `username`, `first_name`, `last_name`, `email`, `password`, `groups`,\
    \ and more. Yet when a user signs up for a new account on Django, the default\
    \ form only asks for a `username`, `email`, and `password`, which tells us that\
    \ the default setting for fields on `UserCreationForm` is just `username`, `email`,\
    \ and `password` even though many more fields are available.\n\nUnderstanding\
    \ how forms and models interact in Django takes time and repetition. Don't be\
    \ discouraged if you are slightly confused right now! In the next chapter, we\
    \ will create our signup, login, and logout pages to tie together our `CustomUser`\
    \ model and forms more clearly.\n\nThe final step is to update our `admin.py`\
    \ file since the admin is tightly coupled to the default User model. We will extend\
    \ the existing [UserAdmin](https://docs.djangoproject.com/en/4.0/ref/contrib/auth/#django.contrib.auth.admin.UserAdmin)\
    \ class to use our new `CustomUser` model. To control which fields are listed,\
    \ we use [list_display](https://docs.djangoproject.com/en/4.0/ref/contrib/admin/#django.contrib.admin.ModelAdmin.list_display).\
    \ But to actually edit new custom fields, like `age`, we must add [fieldsets](https://docs.djangoproject.com/en/4.0/ref/contrib/admin/#django.contrib.admin.ModelAdmin.fieldsets).\
    \ And to include a new custom field in the section for creating a new user we\
    \ rely on `add_fieldsets`.\n\nHere is what the complete code looks like:\n\n```\n\
    python\n# accounts/admin.py\nfrom django.contrib import admin\nfrom django.contrib.auth.admin\
    \ import UserAdmin\n\nfrom .forms import CustomUserCreationForm, CustomUserChangeForm\n\
    from .models import CustomUser\n\n\nclass CustomUserAdmin(UserAdmin):\n    add_form\
    \ = CustomUserCreationForm\n    form = CustomUserChangeForm\n    model = CustomUser\n\
    \    list_display = [\n        \"email\",\n        \"username\",\n        \"age\"\
    ,\n        \"is_staff\",\n    ]\n```"
