    # ## Templates


    Every web framework needs a convenient way to generate HTML files, and in Django,
    the approach is to use *templates*: individual HTML files that can be linked together
    and include basic logic.


    Recall that our "Hello, World" site had the phrase hardcoded into a `views.py`
    file in the previous chapter. That technically works but does not scale well!
    A better approach is to link a view to a template, thereby separating the information
    contained in each.'
  - "[PAGE 66]\n\nIn this chapter, we'll learn how to use templates to create our\
    \ desired homepage and about page. And in future chapters, the use of templates\
    \ will support building websites that can support hundreds, thousands, or even\
    \ millions of webpages with a minimal amount of code.\n\nThe first consideration\
    \ is where to place templates within the structure of a Django project. There\
    \ are two options. By default, Django's template loader will look within each\
    \ app for related templates. However, the structure is somewhat confusing: each\
    \ app needs a new `templates` directory, another directory with the same name\
    \ as the app, and then the template file.\n\nTherefore, in our `pages` app, Django\
    \ would expect the following layout:\n\n```\nLayout\n└── pages\n    ├── templates\n\
    \        ├── pages\n            ├── home.html\n```\n\nWhy this seemingly repetitive\
    \ approach? The short answer is that the Django template loader wants to be sure\
    \ it finds the correct template! What happens if there are `home.html` files within\
    \ two separate apps? This structure makes sure there are no such conflicts.\n\n\
    However, another approach is to instead create a single project-level `templates`\
    \ directory and place *all* templates within it. By tweaking our `django_project/settings.py`\
    \ file, we can tell Django to *also* look in this directory for templates. That\
    \ is the approach we'll use.\n\nFirst, quit the running server with the `Control+c`\
    \ command. Then create a directory called `templates`."
  - "[PAGE 67]\n\n```\nshell\n(.venv) $ mkdir templates\n```\n\nNext, we need to update\
    \ `django_project/settings.py` to tell Django the location of our new `templates`\
    \ directory. Doing so requires a one-line change to the setting `\"DIRS\"` under\
    \ `TEMPLATES`.\n\n```\npython\n# django_project/settings.py\nTEMPLATES = [\n \
    \   {\n        ...\n        \"DIRS\": [BASE_DIR / \"templates\"],  # new\n   \
    \     ...\n    },\n]\n```\n\nCreate a new file called `home.html` within the `templates`\
    \ directory. You can do this within your text editor: in Visual Studio Code, go\
    \ to the top left of your screen, click \"File,\" and then \"New File.\" Make\
    \ sure to name and save the file in the correct location.\n\nThe `home.html` file\
    \ will have a simple headline for now.\n\n```\nhtml\n<!-- templates/home.html\
    \ -->\n<h1>Homepage</h1>\n```\n\nOur template is complete! The next step is to\
    \ configure our URL and view files.\n\n# ## Class-Based Views\n\nEarly versions\
    \ of Django only shipped with function-based views, but developers soon found\
    \ themselves repeating the same patterns over and over. Write a view that lists\
    \ all objects in a model. Write a view that displays only one"
- md: "detailed item from a model. And so on. Generic function-based views were introduced\
    \ to abstract these patterns and streamline the development of common patterns.\
    \ The problem with generic function-based views was that there was [no easy way\
    \ to extend or customize them](https://docs.djangoproject.com/en/4.0/topics/http/shortcuts/).\
    \ As projects grow in size, this became more and more of an issue and, as a result,\
    \ generic function-based views were [deprecated in Django 1.3](https://docs.djangoproject.com/en/1.3/topics/generic-views-migration/)\
    \ and removed completely in version 1.5.\n\nTo help with code reusability, Django\
    \ added class-based views and generic class-based views while still retaining\
    \ function-based views. Classes are a fundamental part of Python, but a thorough\
    \ discussion of them is beyond the scope of this book. If you need an introduction\
    \ or refresher, I suggest reviewing the [official Python docs](https://docs.python.org/3/tutorial/classes.html),\
    \ which have an excellent tutorial on classes and their usage.\n\nThere are, therefore,\
    \ three different ways to write a view in Django–function-based, class-based,\
    \ or generic class-based–which is very confusing to beginners. Function-based\
    \ views are simpler to understand because they mimic the HTTP request/response\
    \ cycle, and they are a good place to start which is what we've done in this book.\
    \ Class-based views are a little harder to understand because their inheritance\
    \ structure means you have to dive into the code to see everything happening;\
    \ with a function-based view, it is all there. And generic class-based views are\
    \ the hardest yet to understand. An entire website, [Classy Class-Based Views](https://ccbv.co.uk/),\
    \ is dedicated to helping developers decipher them.\n\nSo why bother with generic\
    \ class-based views? Once you have used them for a while, they become elegant\
    \ and efficient ways to write code. You can often modify a single method on one\
    \ to do custom behavior rather than rewriting everything from scratch, which makes\
    \ it easier to understand someone else's code. This does, however, come at the\
    \ cost of complexity and requires a leap of faith because it takes a long time\
    \ to understand how they work under the hood.\n\nThat said, most Django developers\
    \ first reach for generic class-based views when trying to solve a problem. It\
    \ is incredible how many issues can be solved by off-the-shelf GCVBs like `TemplateView`,\
    \ `ListView`, or `DetailView`. When a generic class-based view is not enough,\
    \ modify it to suit your needs. And if that still isn't enough, revert to a function-based\
    \ or class-based view. That is the recommended approach for handling the three\
    \ different ways to write views in Django.\n\nIn our specific use case, we will\
    \ use [TemplateView](TemplateView) to display our template. Replace the default\
    \ text in the `pages/views.py` file with the following:\n\n```python\n# pages/views.py\n\
    from django.views.generic import TemplateView\n\nclass HomePageView(TemplateView):\n\
    \    template_name = \"home.html\"\n```\n\nNote that we've used Pascal Case to\
    \ name our view, `HomePageView`, meaning the first letter of each word is capitalized.\
    \ This is used for [class names in Python](class names in Python). The `TemplateView`\
    \ already contains all the logic needed to display our template; we just need\
    \ to specify the template's name.\n\n## URLs\n\nThe last step is to update our\
    \ URLs. Recall from Chapter 2 that we need to make updates in two locations. First,\
    \ we update the `django_project/urls.py` file to point at our `pages` app, and\
    \ then within `pages`, we match views to URL routes.\n\nLet's start with the `django_project/urls.py`\
    \ file.\n\n```python\n# django_project/urls.py\nfrom django.contrib import admin\n\
    from django.urls import path, include  # new\n\nurlpatterns = [\n    path(\"admin/\"\
    , admin.site.urls),\n    path(\"\", include(\"pages.urls\")),  # new\n]\n```\n\
    \nThe code here should look familiar at this point. We add `include` on the second\
    \ line to point the existing URL to the pages app. Next, create a `pages/urls.py`\
    \ file and add the code below. This pattern is almost identical to what we did\
    \ in the last chapter with one significant difference: when using Class-Based\
    \ Views, you always add `as_view()` at the end of the view name.\n\n```python\n\
    # pages/urls.py\nfrom django.urls import path\nfrom .views import HomePageView\n\
    \nurlpatterns = [\n    path(\"\", HomePageView.as_view(), name=\"home\"),\n]\n\
    ```\n\nAnd we're done! Start the local web server with the command `python manage.py\
    \ runserver` and navigate to `http://127.0.0.1:8000/` to see our new homepage.\n\
    \n![](img/8898b60f655bfc3510e72493f7e0548e_70_0.png)\n\n## About Page\n\nThe process\
    \ for adding an About page is very similar to what we just did. We'll create a\
    \ new template file, a new view, and a new URL route. Start by making a new template\
    \ file called `templates/about.html` and populate it with a short HTML headline.\n\
    \n```html\n<!-- templates/about.html -->\n<h1>About page</h1>\n```\n\nThen add\
    \ a new view for the page.\n\n```python\n# pages/views.py\nfrom django.views.generic\
    \ import TemplateView\n\nclass HomePageView(TemplateView):\n    template_name\
    \ = \"home.html\"\n\nclass AboutPageView(TemplateView):  # new\n    template_name\
    \ = \"about.html\"\n```\n\nAnd finally, import the view name and connect it to\
    \ a URL at `about/`.\n\n```python\n# pages/urls.py\nfrom django.urls import path\n\
    from .views import HomePageView, AboutPageView  # new\n\nurlpatterns = [\n   \
    \ path(\"about/\", AboutPageView.as_view(), name=\"about\"),  # new\n    path(\"\
    \", HomePageView.as_view(), name=\"home\"),\n]\n```\n\nStart the web server with\
    \ `runserver` and navigate to `http://127.0.0.1:8000/about/`. The new About page\
    \ is visible.\n\n## Extending Templates\n\nThe real power of templates is that\
    \ they can be extended. If you think about most websites, the same content appears\
    \ on every page (header, footer, etc.). Wouldn't it be nice if we, as developers,\
    \ could have *one canonical place* for our header code that all other templates\
    \ would inherit?\n\nWell, we can! Let's create a `base.html` file containing a\
    \ header with links to our two pages. We could name this file anything, but using\
    \ `base.html` is a standard convention. In your text editor, make this new file\
    \ called `templates/base.html`.\n\nDjango has a minimal templating language for\
    \ adding links and basic logic in our templates. You can see the complete list\
    \ of built-in template tags [here in the official docs](https://docs.djangoproject.com/en/4.0/ref/templates/builtins/).\
    \ Template tags take the form of `{% something %}` where the \"something\" is\
    \ the template tag itself. You can even create custom template tags, though we\
    \ won't do that in this book.\n\nTo add URL links in our project, we can use the\
    \ [built-in URL template tag](https://docs.djangoproject.com/en/4.0/ref/templates/builtins/#url)\
    \ which takes the URL pattern name as an argument. Remember how we added optional\
    \ URL names to our two routes in `pages/urls.py`? The `url` tag uses these names\
    \ to create links for us automatically.\n\nThe URL route for our homepage is called\
    \ `home`. To configure a link to it, we use the following syntax: `{% url 'home'\
    \ %}`.\n\n```html\n<!-- templates/base.html -->\n<header>\n  <a href=\"{% url\
    \ 'home' %}\">Home</a> |\n  <a href=\"{% url 'about' %}\">About</a>\n</header>\n\
    \n{% block content %} {% endblock content %}\n```\n\nAt the bottom, we've added\
    \ a `block` tag called `content`. While it's optional to name our closing `endblock`—you\
    \ can write `{% endblock %}` if you prefer—doing so helps with readability, especially\
    \ in larger template files.\n\nLet's update our `home.html` and `about.html` files\
    \ to extend the `base.html` template. That means we can reuse the same code from\
    \ one template in another. The Django templating language comes with an [extends](extends)\
    \ method that we can use for this.\n\n```html\n<!-- templates/home.html -->\n\
    {% extends \"base.html\" %}\n\n{% block content %}\n<h1>Homepage</h1>\n{% endblock\
    \ content %}\n```\n\n```html\n<!-- templates/about.html -->\n{% extends \"base.html\"\
    \ %}\n\n{% block content %}\n<h1>About page</h1>\n{% endblock content %}\n```\n\
    \nNow if you start up the server with `python manage.py runserver` and open up\
    \ our webpages again at `http://127.0.0.1:8000/`, the header is included."
  mdcn: "来自模型的详细条目。以此类推。基于函数的通用视图被引入，用于抽象这些模式并简化常见模式的开发。基于函数的通用视图的问题在于，[没有简单的方法来扩展或自定义它们](https://docs.djangoproject.com/en/4.0/topics/http/shortcuts/)。随着项目规模的增长，这变得越来越成问题，因此，基于函数的通用视图在\
