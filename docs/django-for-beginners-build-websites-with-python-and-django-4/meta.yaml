  - '[PAGE 11]


    This approach allows web developers to focus on what makes a web application unique
    rather than reinventing the wheel every time.


    In contrast, some web frameworks like [Flask](https://flask.palletsprojects.com/)
    adopt a *microframework* approach of providing only the bare minimum required
    for a simple webpage. Flask is far more lightweight than Django and allows maximum
    flexibility; however, this comes at a cost to the developer. Building a simple
    website requires adding a dozen or more third-party packages, which may or may
    not be up-to-date, secure, or reliable. The lack of guardrails also means Flask''s
    project structure varies widely, which makes it difficult to maintain best practices
    when moving between different projects.


    Django remains [under active development](https://www.djangoproject.com/download/)
    with a regular release schedule of monthly security/bug fixes and a major new
    release every eight months. Millions of programmers have already used Django to
    build their websites. It doesn''t make sense to repeat the same code–and mistakes–when
    a large community of brilliant developers has already solved these problems for
    us.


    And best of all, Django is written in the wonderfully readable yet still powerful
    Python programming language. In short, if you''re building a website from scratch,
    Django is a fantastic choice.


    # ## Why This Book


    I wrote this book because while Django has incredible documentation, there need
    to be more beginner-friendly tutorials. The documentation assumes you already
    know what you want to do and provides relatively terse explanations aimed at intermediate-to-advanced
    developers; tutorials are typically more geared towards'
  - '[PAGE 12]


    beginners and hold your hand through all the steps required. When I first learned
    Django years ago, I struggled to complete the [official polls tutorial](https://docs.djangoproject.com/en/4.2/intro/tutorial01/).
    I remember thinking, Why was this so hard?


    With more experience, I now recognize that the writers of the Django docs faced
    a difficult choice: they could emphasize Django''s ease of use or depth, but not
    both. They choose the latter, and as a professional developer, I appreciate the
    decision, but as a beginner, I found it so frustrating! My goal with this book
    is to fill in the gaps and showcase how beginner-friendly Django can be.


    # ## What''s New in Django 4.2


    The most recent version of Django, 4.2, was released in April 2023. It has official
    support for Python 3.8, 3.9, 3.10, and 3.11. The official Django website contains
    information on all prior releases and [detailed 4.2 release notes](https://docs.djangoproject.com/en/4.2/releases/4.2/).


    One of the significant efforts for Django since 3.0 has been adding asynchronous
    support. Django 3.0 added ASGI (Asynchronous Server Gateway Interface), while
    Django 3.1 included asynchronous views, middleware, tests, and test client. Django
    4.0 began making cache backends async-compatible, and Django 4.1 added both asynchronous
    handlers for class-based views and an asynchronous ORM interface. Django 4.2 supports
    Psycopg 3, a PostgreSQL database adapter for Python that includes async support.
    These iterative improvements are bringing Django closer and closer to full asynchronous
    functionality.


    Django 4.2 is an LTS (Long Term Support) release meaning it will receive security
    updates for at least three years after its release. The previous LTS was Django
    3.2, which ends support in April 2024. As with all major releases, there are'
  - '[PAGE 13]


    many new improvements for the 4.2 release, including a light or dark color theme
    for the admin.


    Django is a mature web framework that strives to remain stable yet advance alongside
    the modern web. If you find yourself on a project with an older version of Django,
    there are [detailed instructions](https://docs.djangoproject.com/en/4.2/howto/upgrade-version/)
    for updating to the latest version.


    # ## Book Structure


    The book begins by demonstrating how to configure a local development environment
    for Windows and macOS in **Chapter 1**. We learn about the powerful command line,
    Git, text editors, and how to install the latest versions of Python and Django.


    In **Chapter 2**, we build our first project, a minimal *Hello, World* app demonstrating
    how to set up new Django projects. Because establishing good software practices
    is vital, we''ll save our work with Git and upload a copy to a remote code repository
    on GitHub.


    In **Chapter 3**, we make, test, and deploy a *Pages* app that introduces templates
    and class-based views. Templates are how Django allows for DRY (Don''t Repeat
    Yourself) development with HTML and CSS, while class-based views are quite powerful
    yet require minimal code. We also add our first tests and deploy the website to
    Fly.io. Using platform-as-a-service providers like Fly transforms deployment from
    a painful, time-consuming process into something that takes just a few mouse clicks.


    We build our first database-backed project in **Chapter 4**, a *Message Board*
    app, and then deploy it in **Chapter 5**. Django provides a powerful ORM (Object-Relational
    Mapper) that abstracts away the need to write raw SQL ourselves.'
  - '[PAGE 14]


    Instead, we can write Python in a `models.py` file that the ORM automatically
    translates into the correct SQL for multiple database backends (PostgreSQL, MySQL,
    SQLite, MariaDB, and Oracle). We''ll explore the built-in admin app, which provides
    a graphical way to interact with data. Of course, we also write tests for all
    our code, store a remote copy on GitHub, and deploy our website using a production
    database.


    In **Chapters 6-9**, we''re ready for a *Blog* app that implements CRUD (Create-Read-Update-Delete)
    functionality. Using Django''s generic class-based views, we only have to write
    a small amount of actual code for this. Then we''ll add forms and integrate Django''s
    built-in user authentication system for signup, login, and logout functionality.
    Our deployment checklist will also grow longer as we add enhanced security to
    the process.


    The remainder of the book is dedicated to building and deploying a robust *Newspaper*
    site. **Chapter 10** demonstrates how to use a custom user model, a Django best
    practice rarely addressed in tutorials. **Chapter 11** covers user authentication:
    login, logout, and signup. **Chapter 12** adds Bootstrap for enhanced CSS styling,
    and **Chapter 13** implements password reset and change via email. In **Chapters
    14-16**, we add articles, comments, proper permissions, and authorizations. Finally,
    in **Chapter 17** production-ready deployment is covered.


    The **Conclusion** provides an overview of the central concepts introduced in
    the book and a list of recommended resources for further learning.


    While it may be tempting to skip around in this book, I highly recommend reading
    the chapters in order. Each'
