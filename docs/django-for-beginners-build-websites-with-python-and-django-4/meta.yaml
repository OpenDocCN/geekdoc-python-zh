    # ## Static Files


    [Static files](https://docs.djangoproject.com/en/4.0/howto/static-files/) are
    the Django community''s term for additional files commonly served on websites
    such as CSS, fonts, images, and JavaScript. Even though we haven''t added any
    yet to our project, we are already relying on core Django static files–custom
    CSS, fonts, images, and JavaScript–to power the look and feel of the Django admin.


    We don''t have to worry about static files for local development because the web
    server–run via the `runserver` command–will *automatically* find and serve them
    for us. Here is what static files look like in visual form added to our existing
    Django diagram:'
  - '[PAGE 104]


    ![](img/8898b60f655bfc3510e72493f7e0548e_104_0.png)


    # Django request/response cycle with static files


    In production, things are more complex, something that we will cover in the next
    chapter when we deploy this project. The central concept to understand right now
    is that it is far more efficient to combine all static files across a Django project
    into a single location in production. If you look near the bottom of the existing
    `django_project/settings.py` file, there is already a configuration for [STATIC_URL](STATIC_URL),
    which refers to the *URL location* of all static files in production. In other
    words, if our website had the URL `example.com`, all static files would be available
    in `example.com/static`.


    ```

    # django_project/settings.py

    STATIC_URL = "static/"

    ```


    The built-in management command, [collectstatic](collectstatic), performs this
    task of compiling all static files into one location on our file system. The location
    of the static files in our file system is set via [STATIC_ROOT](STATIC_ROOT).
    While we have the flexibility to name this new directory anything we want, traditionally,
    it is called `staticfiles`. Here''s how to set things up in our project:


    ```

    # django_project/settings.py

    STATIC_URL = "static/"

    ```'
