    the official instructions](https://fly.io/docs/hands-on/install-flyctl/) to install
    it. Then from the command line [sign in](https://fly.io/docs/getting-started/log-in-to-fly/)
    with the command `flyctl auth login`, which will likely open up a web browser
    window for you to sign into Fly.


