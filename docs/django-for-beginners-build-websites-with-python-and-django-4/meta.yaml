    \ `http://127.0.0.1:8000/` 查看我们的新主页。\n\n![](img/8898b60f655bfc3510e72493f7e0548e_70_0.png)\n\
    \n## About Page\n\n添加 About 页面的过程与我们刚才所做的非常相似。我们将创建一个新的模板文件、一个新的视图和一个新的 URL 路由。首先创建一个名为\
