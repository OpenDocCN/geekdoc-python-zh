    \ %}\n<h1>Delete post</h1>\n<form action=\"\" method=\"post\">{% csrf_token %}\n\
    \  <p>Are you sure you want to delete \"{{ post.title }}\"?</p>\n  <input type=\"\
    submit\" value=\"Confirm\">\n</form>\n{% endblock content %}\n```\n\nNote we are\
    \ using `post.title` here to display the title of our blog post. We could also\
    \ just use `object.title` as it too is provided by `DetailView`.\n\nNow update\
    \ the `blog/views.py` file by importing `DeleteView` and [reverse_lazy](https://docs.djangoproject.com/en/4.0/ref/urlresolvers/#reverse-lazy)\
    \ at the top and then create a new view that subclasses `DeleteView`.\n\n```\n\
    # blog/views.py\nfrom django.views.generic import ListView, DetailView\nfrom django.views.generic.edit\
    \ import CreateView, UpdateView, DeleteView  # new\nfrom django.urls import reverse_lazy\
    \  # new\n\nfrom .models import Post\n\n\nclass BlogListView(ListView):\n    model\
    \ = Post\n    template_name = \"home.html\"\n\n\nclass BlogDetailView(DetailView):\n\
    \    model = Post\n    template_name = \"post_detail.html\"\n\n\nclass BlogCreateView(CreateView):\n\
    \    model = Post\n    template_name = \"post_new.html\"\n    fields = [\"title\"\
