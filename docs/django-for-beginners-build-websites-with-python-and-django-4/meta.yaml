    # macOS

    $ cd ~/desktop/code/ch1-setup

    ```


    To create a virtual environment within this new directory, use the format `python
    -m venv <name_of_env>` on Windows or `python3 -m venv <name_of_env>` on macOS.
    The `-m` part of this command is known as a *flag*, which is a convention to indicate
    the user is requesting non-default behavior. The'
  - '[PAGE 27]


    format is usually - and then a letter or combination of letters. The [-m flag](https://docs.python.org/3/using/cmdline.html#cmdoption-m)
    is necessary since `venv` is a module name. It is up to the developer to choose
    a proper environment name, but a common choice is to call it `.venv`, as we do
    here.


    ```

    shell

    # Windows

    $ python -m venv .venv


    # macOS

    $ python3 -m venv .venv

    ```


    On Windows, the command `ls` will display the `.venv` directory in our directory.
    However, on macOS using `ls` it will appear empty. The `.venv` directory *is*
    there; it''s just that it is "hidden" due to the period `.` that precedes the
    name. Hidden files and directories are a way for developers to indicate that the
    contents are important and should be treated differently than regular files. To
    view it, try `ls -la`, which shows all directories and files, even hidden ones.


