    \ need to be set so the `collectstatic` management command works correctly and\
    \ compiles them all as expected.\n\n+   - `STATIC_URL` is the URL location of\
    \ all static files in production\n- `STATICFILES_DIRS` refers to any additional\
    \ locations for static files beyond an app's `static` folder\n- `STATIC_ROOT`\
    \ is the directory location of all static files compiled when `collectstatic`\
    \ is run\n- `STORAGES` is a dictionary containing the settings for all storages\
    \ to be used by Django\n\nIn the `django_project/settings.py` file, scroll down\
