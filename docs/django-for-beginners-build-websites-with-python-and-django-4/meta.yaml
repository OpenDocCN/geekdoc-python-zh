    # ## Hosting Options


    To make our site available online where everyone can see it, we need to deploy
    our code to an external server and database. Local code lives only on our computer;
    production code lives on an external server available to everyone. Therefore,
    deploying code online is also called, *putting our code into production*.


    There are three main ways to host a website:


    +   - **1. Dedicated Server:** a physical server sitting in a data center that
    belongs exclusively to you. Generally, only the largest companies adopt this approach
    since it'
  merge: -1
  pgno: 81
- img_proc: true
  md: 'requires a lot of technical expertise to configure and maintain.


    +   - **2. Virtual Private Server (VPS):** a server can be divided into multiple
    virtual machines that use the same hardware, which is much more affordable than
    a dedicated server. This approach also means you don''t have to worry about maintaining
    the hardware yourself.


    +   - **3. Platform as a Service (PaaS):** a managed VPS solution that is pre-configured
    and maintained, making it the fastest option to deploy and scale a website. The
    downside is that a developer does not have access to the same degree of customization
    that a VPS or a dedicated server provides.


    These days most individual developers and small companies rely on PaaS''s for
    their hosting needs since it abstracts away a challenging part of website development.
    That is the approach we will use in this book, too.


    # ## Deployment Checklist


    Django defaults to a local development configuration with the `startproject` command,
    which makes it easier to start building apps locally, but many settings are a
    security risk in production.


    Since deployment requires many discrete steps, it is common to have a "checklist"
    for these since there quickly become too many to remember. At this stage, we are
    intentionally keeping things basic however, this list will grow in future projects
    as we add additional security and performance features.


    Here is the current deployment checklist:


    +   - install Gunicorn as a WSGI server'
  merge: -1
