  md: '# # Chapter 8: User Accounts


    So far, we''ve built a working *Blog* application with forms but still need a
    major piece of most web applications: user authentication.


    Implementing proper user authentication is famously hard; there are many security
    gotchas along the way, so you don''t want to implement this yourself. Fortunately,
    Django has a powerful, built-in [user authentication system](user-authentication-system)
    that we can use and customize as needed.


    Whenever you create a new project, by default, Django installs the `auth` app,
    which provides us with a [User object](User-object) containing:


    +   - username

    - password

    - email

    - first_name

    - last_name


    We will use this User object to implement login, logout, and signup in our blog
    application.


    # ## Log In


    Django provides us with a default view for a login page via [LoginView](LoginView).
    All we need to add are a URL pattern for the auth system, a login template, and
    a minor update to our `django_project/settings.py` file.


    First, update the `django_project/urls.py` file. We''ll place our login and logout
    pages at the `accounts/` URL: a one-line addition to the next-to-last line.'
