    \ of how this process works under-the-hood.\n\nHere is what the updated code looks\
    \ like:\n\n```python\n# django_project/urls.py\nfrom django.contrib import admin\n\
    from django.urls import path, include  # new\n\nurlpatterns = [\n    path(\"admin/\"\
    , admin.site.urls),\n    path(\"\", include(\"pages.urls\")),  # new\n]\n```\n\
    \nWe've imported [django.urls.include](https://docs.djangoproject.com/en/4.0/ref/urls/#django.urls.include)\
    \ on the second line next to `path` and then created a new URL pattern for our\
    \ `pages` app. Now whenever a user visits the homepage–represented by the empty\
    \ string here, \"\", they will be routed to the URLs file in the `pages` app.\
    \ The empty string in that one is linked to the `home_page_view` view.\n\nThis\
    \ need for two separate `urls.py` files is often confusing to beginners. Think\
    \ of the top-level `django_project/urls.py` as the gateway to various URL patterns\
    \ distinct to each app.\n\nWe have all the code we need now. To confirm everything\
    \ works as expected, restart our Django server:\n\n```shell\n(.venv) $ python\
    \ manage.py runserver\n```\n\nIf you refresh the browser for `http://127.0.0.1:8000/`\
    \ it now displays the text \"Hello, World!\"\n\n![](img/8898b60f655bfc3510e72493f7e0548e_56_0.png)\n\
    \n**Hello World homepage**\n\n## Git\n\nIn the previous chapter, we installed\
    \ the version control system Git. Let's use it here. The first step is to initialize\
    \ (or add) Git to our repository. Make sure you've stopped the local server with\
    \ `Control+c`, then run the command `git init`.\n\n```shell\n(.venv) $ git init\n\
    ```\n\nIf you then type `git status` you'll see a list of changes since the last\
    \ Git commit. Since this is our first commit, this list is all of our changes\
    \ so far.\n\n```shell\n(.venv) $ git status\nOn branch main\n\nNo commits yet\n\
    \nUntracked files:\n  (use \"git add <file>...\" to include in what will be committed)\n\
    \n\t.venv\n\tdjango_project/\n\tdb.sqlite3\n\tmanage.py\n\tpages/\n```\n\nnothing\
    \ added to commit but untracked files present (use \"git add\" to track)\n\nNote\
    \ that our virtual environment `.venv` is included which is *not* a best practice.\
    \ It should be kept out of Git source control since secret information such as\
    \ API keys and the like are often included in it. The solution is to create a\
    \ new file in the project-level directory called `.gitignore` which tells Git\
    \ what to ignore. The period at the beginning indicates this is a \"hidden\" file.\
    \ The file still exists but it is a way to communicate to developers that the\
    \ contents are probably meant for configuration and not source control.\n\nHere\
    \ is how your project structure should look now:\n\n```\nLayout\n├── django_project\n\
    │   ├── __init__.py\n│   ├── asgi.py\n│   ├── settings.py\n│   ├── urls.py\n│\
    \   └── wsgi.py\n├── pages\n│   ├── migrations\n│   │   └── __init__.py\n│   ├──\
    \ __init__.py\n│   ├── admin.py\n│   ├── apps.py\n│   ├── models.py\n│   ├── tests.py\n\
    │   ├── urls.py\n│   └── views.py\n├── .gitignore  # new\n├── db.sqlite3\n├──\
    \ manage.py\n└── .venv/\n```\n\nIn this new `.gitignore` file, add a single line\
    \ for `.venv`.\n\n```\n.gitignore\n.venv/\n```\n\nIf you run `git status` again\
    \ you will see that `.venv` is no longer there. It has been \"ignored\" by Git.\n\
    \nAt the same time, we *do* want a record of packages installed in our virtual\
    \ environment. The current best practice is to create a `requirements.txt` file\
    \ with this information. The command `pip freeze` will output the contents of\
    \ your current virtual environment and by using the `>` operator we can do all\
    \ this in one step: output the contents into a new file called `requirements.txt`.\
    \ If your server is still running enter `Ctrl+c` and `Enter` to exit before entering\
    \ this command.\n\n```shell\n(.venv) $ pip freeze > requirements.txt\n```\n\n\
    A new `requirements.txt` file will appear with all our installed packages and\
    \ their dependencies. If you look *inside* this file you'll see there are actually\
    \ nine packages even though we have installed only two: Django and Black. That's\
    \ because Django and Black depend on *other* packages, too. It is often the case\
    \ that when you install one Python package you're also installing multiple dependent\
    \ packages, too. Since it is difficult to keep track of all the packages a `requirements.txt`\
    \ file is very important.\n\n```\nrequirements.txt\nasgiref==3.6.0\nblack==23.3.0\n\
    click==8.1.3\nDjango==4.2\nmypy-extensions==1.0.0\npackaging==23.1\npathspec==0.11.1\n\
    platformdirs==3.2.0\nsqlparse==0.4.3\n```\n\nNext we want to perform our first\
    \ Git commit to store all the recent changes. Git comes with a [lengthy list](...)\
    \ of options/flags that can be used. For example, to add *all* recent changes\
    \ we can use `git add -A`. And then to commit the changes we will use a `-m` flag\
    \ (this one stands for \"message\") to describe what has changed. It is **very**\
    \ important to always add a message to your commits since most projects will easily\
    \ have hundreds if not thousands of commits. Adding a descriptive message each\
    \ time helps with debugging efforts later on since you can search through your\
    \ commit history.\n\n```shell\n(.venv) $ git add -A\n(.venv) $ git commit -m \"\
    initial commit\"\n```\n\nIn professional projects a `.gitignore` file is typically\
    \ quite lengthy. For efficiency and security reasons, there are often quite a\
    \ few directories and files that should be removed from source control.\n\n##\
    \ GitHub\n\nIt's a good habit to create a remote repository of your code for each\
    \ project. This way you have a backup in case anything happens to your computer\
    \ and more importantly, it allows for collaboration with other software developers.\
    \ Popular choices include GitHub, Bitbucket, and GitLab. When you're learning\
    \ web development, it is **highly recommended** to use private rather than public\
    \ repositories so you don't inadvertently post critical information such as passwords\
    \ online.\n\nWe will use GitHub in this book but all three services offer similar\
    \ functionality for newcomers. Sign up for a free account on GitHub's homepage\
    \ and verify your email address. It is also now required to add 2FA (two-factor\
    \ authentication) for increased security. Once fully signed up navigate to the\
    \ \"Create a new repository\" page located at [https://github.com/new](https://github.com/new).\n\
    \nEnter the repository name `hello-world` and click on the radio button next to\
    \ \"Private\" rather than \"Public.\" Then click on the button at the bottom for\
    \ \"Create Repository.\"\n\nYour first repository is now created! However there\
    \ is no code in it yet. Scroll down on the page to where it says \"...or push\
    \ an existing repository from the command line.\" That's what we want. Copy the\
    \ text immediately under this headline and paste it into your command line. Here\
    \ is what it looks like for me with my GitHub username of `wsvincent`. Your username\
    \ will be different.\n\n```shell\n$ git remote add origin https://github.com/wsvincent/hello-world.git\n\
    $ git branch -M main\n$ git push -u origin main\n```\n\nThe first line adds the\
    \ remote repo on GitHub to our local Git configuration, the next line establishes\
    \ the default branch as `main`, and the third line \"pushes\" the code up to GitHub's\
    \ servers. The `-u` flag creates a tracking reference for every new branch that\
    \ you successfully push onto the remote repository. The next time we push commits\
    \ we will only need the command `git push origin main`.\n\nAssuming everything\
    \ worked properly, you can now go back to your GitHub webpage and refresh it.\
    \ Your local code is now hosted online!\n\n## SSH Keys\n\nUnfortunately, there\
    \ is a good chance that the last command yielded an error if you are a new developer\
    \ and do not have SSH keys already configured."
