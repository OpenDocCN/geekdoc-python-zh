    # # Chapter 17: Deployment


    There is a fundamental tension between the ease of use desired in a local Django
    development environment and the security and performance necessary in a production
    environment. Django is designed to make web developers'' lives easier and defaults
    to a local configuration when the `startproject` command is first run: SQLite
    as the file-based local database and various configurations in `settings.py` that
    all optimize local web development. In this final chapter, we will configure static
    files, review our deployment checklist, and deploy the *newspaper* website in
    a manner suitable for a professional website.


    # ## Static Files


    The *newspaper* project has no static files like CSS, JavaScript, or images. We''ve
    relied entirely on hosted Bootstrap rather than our own CSS and JavaScript as
    we did in the *Blog* app. That is likely to change as the site grows, and we''ve
    seen that the Django admin has its own static files that must be collected properly
    for production, so let''s set up static files now.


    Since we already walked through static files in some depth previously, we can
    move quicker now. We will need to create a dedicated `static` folder and within
    it folders for `css`, `js`, and `img` for images. This can all be done on the
    command line.


    ```

    shell

    (.venv) $ mkdir static

    (.venv) $ mkdir static/css

    (.venv) $ mkdir static/js

    (.venv) $ mkdir static/img

    ```'
