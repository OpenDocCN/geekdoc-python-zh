    \ to sign up. We'll also build a basic homepage with links to all three features\
    \ so users don't have to type in the URLs by hand every time.\n\n# ## Templates\n\
    \nBy default, the Django template loader looks for templates in a nested structure\
    \ within each app. The structure `accounts/templates/accounts/home.html` would\
    \ be needed for a `home.html` template within the `accounts` app. But a single\
    \ project-level `templates` directory approach is cleaner and scales better, so\
    \ that's what we'll use.\n\nLet's create a new `templates` directory and, within\
    \ it, a `registration` directory, as that's where Django will look for templates\
    \ related to logging in and signing up.\n\n```\nshell\n(.venv) $ mkdir templates\n\
    (.venv) $ mkdir templates/registration\n```\n\nWe need to tell Django about this\
    \ new directory by updating the configuration for `\"DIRS\"` in `django_project/settings.py`.\n\
    \n```\npython\n# django_project/settings.py\nTEMPLATES = [\n    {\n        ...\n\
    \        \"DIRS\": [BASE_DIR / \"templates\"],  # new\n```"
