  md: "[ModelForm](https://docs.djangoproject.com/en/4.0/topics/forms/modelforms/)\
    \ is a helper class designed to translate database models into forms. We can use\
    \ it to create a form called, appropriately enough, `CommentForm`. We *could*\
    \ put this form in our existing `articles/models.py` file, but generally, the\
    \ best practice is to put all forms in a dedicated `forms.py` file within your\
    \ app. That's the approach we'll use here.\n\nWith your text editor, create a\
    \ new file called `articles/forms.py`. At the top, import `forms`, which has `ModelForm`\
    \ as a module. Then import our model, `Comment`, since we'll need to add that,\
    \ too. And finally, create the class `CommentForm` specifying both the underlying\
    \ model and specific field to expose, `comment`. When we create the corresponding\
    \ view, we will automatically set the `author` to the currently logged-in user.\n\
    \n```\npython\n# articles/forms.py\nfrom django import forms\n\nfrom .models import\
    \ Comment\n\nclass CommentForm(forms.ModelForm):\n    class Meta:\n        model\
    \ = Comment\n        fields = (\"comment\",)\n```\n\nWeb forms can be incredibly\
    \ complex, but Django has thankfully abstracted away much of the complexity for\
    \ us.\n\n# ## Comment View\n\nCurrently, we rely on the generic class-based `DetailView`\
    \ to power our `ArticleDetailView`. It displays individual entries, but it needs\
    \ to be configured to add additional information like a form. Class-based views\
    \ are powerful because their inheritance structure means that if we know where\
    \ to look,"
