    # ## get_absolute_url()\n\nAlthough this approach works well, there is actually\
    \ a better option available. Earlier in the chapter, we defined a `get_absolute_url()`\
    \ method in our model that defined a canonical (meaning official) URL for the\
    \ model. So we can take the simpler step of using `<a href=\"{{ post.get_absolute_url\
    \ }}\">{{ post.title }}</a></h2>` in the template instead.\n\n```\nhtml\n<!--\
    \ templates/home.html -->\n{% extends \"base.html\" %}\n\n{% block content %}\n\
    {% for post in post_list %}\n<div class=\"post-entry\">\n  <h2><a href=\"{{ post.get_absolute_url\
    \ }}\">{{ post.title }}</a></h2> <!-- new -->\n  <p>{{ post.body }}</p>\n</div>\n\
    {% endfor %}\n{% endblock content %}\n```\n\nURL paths can and do change over\
    \ the lifetime of a project. With the previous method, if we changed the post\
    \ detail view and URL path, we'd have to go through all our HTML and templates\
    \ to update the code, a very error-prone and hard-to-maintain process. By using\
    \ `get_absolute_url()` instead, we have one single place, the `models.py` file,\
    \ where the canonical URL is set, so our templates don't have to change.\n\nRefresh\
    \ the main page at http://127.0.0.1:8000/ and click on the title of each blog\
    \ post to confirm the links still work as expected."
