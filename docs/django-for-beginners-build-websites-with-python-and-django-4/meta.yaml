    Next up is the password reset functionality.


    # # Password Reset


    Password reset handles the common case of users forgetting their passwords. The
    steps are very similar to configuring password change, as we just did. Django
    already provides a default implementation that we will use and then customize
    the templates to match the look and feel of the rest of our site.


    The only configuration required is telling Django *how* to send emails. After
    all, a user can only reset a password if they can access the email linked to the
    account. For testing purposes, we can rely on Django''s [console backend](link)
    setting, which outputs the email text to our command line console instead.


    Add the following one-line change at the bottom of the `django_project/settings.py`
    file.


    ```

    python

    # django_project/settings.py

    EMAIL_BACKEND = "django.core.mail.backends.console.EmailBackend"  # new

    ```'
