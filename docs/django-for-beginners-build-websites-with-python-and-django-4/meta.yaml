  md: 'use a dedicated JavaScript front-end framework such as Vue, React, or Angular.
    Thanks to the power of [Django REST Framework](https://www.django-rest-framework.org/),
    a third-party package tightly coupled with Django itself, it is possible to transform
    any existing Django website into an API with a minimal amount of code. If you''d
    like to learn more, I''ve written a book called [Django for APIs](https://djangoforapis.com/).


    # ## 3rd Party Packages


    As we''ve seen in this book, third-party packages are a vital part of the Django
    ecosystem, especially regarding deployment or improvements around user registration.
    It''s common for a professional Django website to rely on dozens of such packages.


    However, a word of caution is in order: don''t blindly install and use third-party
    packages because it saves a small amount of time. Every additional package introduces
    another dependency, another risk that its maintainer won''t fix every bug or keep
    up to date with the latest version of Django. Take the time to understand what
    it is doing.


    If you''d like to view more packages, the [Django Packages](https://djangopackages.org/)
    website is a comprehensive resource of all available third-party packages. A more
    curated option, the [awesome-django](https://github.com/wsvincent/awesome-django)
    repo, which I run with the current maintainer of Django Packages, is also worth
    a look.


    # ## Learning Resources


