    # ## Production Database


    Remember that we now have a production PostgreSQL database that is empty. It does
    not contain any newspaper articles or users we''ve added to our local version.
    SSH into the production database and create a superuser account.


    ```

    Shell

    (.venv) $ fly ssh console --pty -C "python /code/manage.py createsuperuser"

    ```


    Then visit the `/admin` page, create some new articles, and refresh the main homepage;
    they should appear. You can also create user accounts and confirm that the user
    authentication flow works correctly by resetting your password.


    For future updates to Fly.io, you should first save the changes to GitHub and
    then use the command `flyctl deploy` to update the code on your production website.


    # ## Deployment Conclusion


    Phew! We just covered *a ton* of material so you likely feel overwhelmed right
    now. That''s normal. There are many steps involved in configuring a website for
    proper deployment, and the good news is that this same list of'
  merge: -1
  pgno: 332
- img_proc: true
  md: 'production settings will hold true for almost every Django project. Don''t
    worry about memorizing all the steps.


    After you''ve built and deployed several Django websites, these steps will soon
    feel very familiar. And in fact, we''ve only scratched the surface of additional
    security measures that can be configured. Django has its own [deployment checklist](https://docs.djangoproject.com/en/4.0/howto/deployment/checklist/)
    that can be run via the command line to highlight additional security issues.


    The other big stumbling block for newcomers is becoming comfortable with the difference
    between local and production environments. You will likely forget to push code
    changes into production and spend minutes or hours wondering why the change isn''t
    live on your site. Or even worse, you''ll change your local SQLite database and
    expect them to magically appear in the production PostgreSQL database. It''s part
    of the learning process. But Django really does make it much smoother than it
    otherwise would be. And now you know enough to deploy any Django project online
    confidently.'
