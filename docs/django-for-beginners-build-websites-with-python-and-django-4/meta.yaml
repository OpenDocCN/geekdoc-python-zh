    \n- `admin.py` is a configuration file for the built-in Django Admin app\n- `apps.py`\
    \ is a configuration file for the app itself\n- `migrations/` keeps track of any\
    \ changes to our models.py file so it stays in sync with our database\n- `models.py`\
    \ is where we define our database models which Django automatically translates\
    \ into database tables\n- `tests.py` is for app-specific tests\n- `views.py` is\
    \ where we handle the request/response logic for our web app\n\nNotice that the\
    \ model, view, and url from the MVT pattern are present from the beginning. The\
    \ only thing missing is a template which we'll add shortly.\n\nEven though our\
    \ new app exists within the Django project, Django doesn't \"know\" about it until\
    \ we explicitly add it to the django_project/settings.py file. In your text editor\
    \ open the file up and scroll down to INSTALLED_APPS where you'll see six built-in\
    \ Django apps already there. Add pages at the bottom.\n\n```python\n# django_project/settings.py\n\
    INSTALLED_APPS = [\n    \"django.contrib.admin\",\n    \"django.contrib.auth\"\
    ,\n    \"django.contrib.contenttypes\",\n    \"django.contrib.sessions\",\n  \
    \  \"django.contrib.messages\",\n    \"django.contrib.staticfiles\",\n    \"pages\"\
    ,  # new\n]\n```\n\n## Your First View\n\nFor our first website we'll create a\
    \ Web page that outputs the text \"Hello, World!\" This is a static page that\
    \ does not involve a database or even a templates file. Instead, it is a good\
    \ introduction to how views and URLs work within Django.\n\nA view is a Python\
    \ function that accepts a Web request and returns a Web response. The response\
    \ can be the HTML contents of a Web page, a redirect, a 404 error, an image, or\
    \ really anything.\n\nWhen a Web page is requested, Django automatically creates\
    \ an `HttpRequest` object that contains metadata about the request. Then Django\
    \ loads the appropriate view, passing the `HttpRequest` in as the first argument\
    \ to the view function. The view is ultimately responsible for returning an `HttpResponse`\
    \ object.\n\nIn our `pages` app there is already a file called `views.py` which\
    \ comes with the following default text:\n\n```python\n# pages/views.py\nfrom\
    \ django.shortcuts import render\n\n# Create your views here.\n```\n\n[render()](https://docs.djangoproject.com/en/4.0/topics/http/shortcuts/#django.shortcuts.render)\
    \ is a Django shortcut function that *can* be used to create views, however there\
    \ is an even simpler approach possible which is to instead use the built-in [HttpResponse](https://docs.djangoproject.com/en/4.0/ref/request-response/#django.http.HttpResponse)\
    \ method. That's what we'll do here.\n\nUpdate the `pages/views.py` file with\
    \ the following code:\n\n```python\n# pages/views.py\nfrom django.http import\
    \ HttpResponse\n\ndef home_page_view(request):\n    return HttpResponse(\"Hello,\
    \ World!\")\n```\n\nLet's step through it line-by-line:\n\n- First, we import\
    \ `HttpResponse` from the `django.http` module.\n- Then we define a function called\
    \ `home_page_view`. The name can be almost anything you like, for example `some_other_view`,\
    \ but it is best to use something descriptive. Note as well that we are using\
    \ `snake_case` here for our naming style–all lowercase words separated by underscores–which\
    \ is traditional in Python for function and variable names.\n- Finally, the view\
    \ returns an `HttpResponse` object with the string of text \"Hello, World!\"\n\
    \n## URLconfs\n\nMoving along we need to configure our URLs. In your text editor,\
    \ create a new file called `urls.py` within the `pages` app. Then update it with\
    \ the following code:\n\n```python\n# pages/urls.py\nfrom django.urls import path\n\
    \nfrom .views import home_page_view\n\nurlpatterns = [\n    path(\"\", home_page_view,\
    \ name=\"home\"),\n]\n```\n\nOn the top line we import `path` from Django to power\
    \ our URL pattern and on the next line we import our views. By referring to the\
    \ `views.py` file as `.views` we are telling Django to look within the current\
    \ directory for a `views.py` file and import the view `home_page_view` from there.\n\
    \nOur URL pattern here has three parts:"
