    We need to add some CSS to our project to improve the styling. CSS, JavaScript,
    and images are a core piece of any modern web application and within the Django
    world, are referred to as "static files." Django provides tremendous flexibility
    around *how* these files are used, but this can lead to quite a lot of confusion
    for newcomers.


