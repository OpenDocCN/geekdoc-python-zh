    \n```\npython\n# articles/views.py\n...\nfrom .models import Article\nfrom .forms\
    \ import CommentForm  # new\n\nclass ArticleDetailView(LoginRequiredMixin, DetailView):\n\
    \    model = Article\n    template_name = \"article_detail.html\"\n\n    def get_context_data(self,\
