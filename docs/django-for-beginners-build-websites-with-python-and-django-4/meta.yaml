  - "[PAGE 209]\n\nCreating our custom user model requires four steps:\n\n+   - update\
    \ `django_project/settings.py`\n- create a new `CustomUser` model\n- create new\
    \ forms for `UserCreationForm` and `UserChangeForm`\n- update `accounts/admin.py`\n\
    \nIn `django_project/settings.py`, we'll add the `accounts` app to our `INSTALLED_APPS`.\
    \ Then at the bottom of the file, use the `AUTH_USER_MODEL` config to tell Django\
    \ to use our new custom user model instead of the built-in User model. We'll call\
    \ our custom user model `CustomUser`. Since it will exist within our `accounts`\
    \ app, we should refer to it as `accounts.CustomUser`.\n\n```\npython\n# django_project/settings.py\n\
    INSTALLED_APPS = [\n    \"django.contrib.admin\",\n    \"django.contrib.auth\"\
    ,\n    \"django.contrib.contenttypes\",\n    \"django.contrib.sessions\",\n  \
    \  \"django.contrib.messages\",\n    \"django.contrib.staticfiles\",\n    \"accounts\"\
    ,  # new\n]\n...\nAUTH_USER_MODEL = \"accounts.CustomUser\"  # new\n```\n\nNow\
    \ update `accounts/models.py` with a new User model called `CustomUser` that extends\
    \ the existing `AbstractUser`. We also include a custom field for age here.\n\n\
    ```\npython\n# accounts/models.py\nfrom django.contrib.auth.models import AbstractUser\n\
    from django.db import models\n\n\nclass CustomUser(AbstractUser):\n    age = models.PositiveIntegerField(null=True,\
    \ blank=True)\n```\n\nIf you read the [documentation on custom user models](https://docs.djangoproject.com/en/4.0/topics/auth/customizing/#using-a-custom-user-model-when-starting-a-project),\
    \ it recommends using `AbstractBaseUser`, not `AbstractUser`, which"
  - '[PAGE 210]


    complicates things for beginners. Working with Django is far simpler and remains
    customizable if we use `AbstractUser` instead.


    So why use `AbstractBaseUser` at all? If you want a fine level of control and
    customization, `AbstractBaseUser` *can* be justified. But it requires rewriting
    a core part of Django. If we want a custom user model that can be updated with
    additional fields, the better choice is `AbstractUser`, which subclasses `AbstractBaseUser`.
    In other words, we write much less code and have less opportunity to mess things
    up. It''s the better choice unless you really know what you''re doing with Django!


    Note that we use both [null](#) and [blank](#) with our age field. These two terms
    are easy to confuse but quite distinct:


    +   - `null` is **database-related**. When a field has `null=True`, it can store
    a database entry as `NULL`, meaning no value.

    - `blank` is **validation-related**. If `blank=True`, then a form will allow an
    empty value, whereas if `blank=False` then a value is required.


    In practice, `null` and `blank` are commonly used together in this fashion so
    that a form allows an empty value, and the database stores that value as `NULL`.


    A common gotcha to be aware of is that the **field type** dictates how to use
    these values. Whenever you have a string-based field like `CharField` or `TextField`,
    setting both `null` and `blank` as we''ve done will result in two possible values
    for "no data" in the database, which is a bad idea. Instead, the Django convention
    is to use the empty string `""`, not `NULL`.


    # ## Forms'
  - "[PAGE 211]\n\nIf we step back for a moment, how would we typically interact with\
    \ our new `CustomUser` model? One case is when a user signs up for a new account\
    \ on our website. The other is within the `admin` app, which allows us, as superusers,\
    \ to modify existing users. So we'll need to update the two built-in forms for\
    \ this functionality: [UserCreationForm](https://docs.djangoproject.com/en/4.0/topics/auth/default/#django.contrib.auth.forms.UserCreationForm)\
    \ and [UserChangeForm](https://docs.djangoproject.com/en/4.0/topics/auth/default/#django.contrib.auth.forms.UserChangeForm).\n\
    \nCreate a new file called `accounts/forms.py` and update it with the following\
    \ code to extend the existing `UserCreationForm` and `UserChangeForm` forms.\n\
    \n```\n# accounts/forms.py\nfrom django.contrib.auth.forms import UserCreationForm,\
    \ UserChangeForm\nfrom .models import CustomUser\n\n\nclass CustomUserCreationForm(UserCreationForm):\n\
    \    class Meta:\n        model = CustomUser\n        fields = UserCreationForm.Meta.fields\
    \ + (\"age\",)\n\n\nclass CustomUserChangeForm(UserChangeForm):\n    class Meta:\n\
    \        model = CustomUser\n        fields = UserChangeForm.Meta.fields\n```\n\
    \nFor both new forms, we are using the [Meta class](https://docs.djangoproject.com/en/4.0/topics/forms/modelforms/#django.forms.ModelForm.Meta)\
    \ to override the default fields by setting the model to our `CustomUser` and\
    \ using the default fields via `Meta.fields` which includes *all* default fields.\
    \ To add our custom `age` field, we simply tack it on at the end, and it will\
    \ display automatically on our future signup page. Pretty slick, no?\n\nThe concept\
    \ of fields on a form can be confusing at first, so let's take a moment to explore\
    \ it further. Our `CustomUser` model contains all the fields of the default `User`\
    \ model **and** our additional `age` field, which we set."
  - "[PAGE 212]\n\nBut what are these default fields? It turns out there [are many](https://docs.djangoproject.com/en/4.0/ref/contrib/auth/#django.contrib.auth.models.User)\
    \ including `username`, `first_name`, `last_name`, `email`, `password`, `groups`,\
    \ and more. Yet when a user signs up for a new account on Django, the default\
    \ form only asks for a `username`, `email`, and `password`, which tells us that\
    \ the default setting for fields on `UserCreationForm` is just `username`, `email`,\
    \ and `password` even though many more fields are available.\n\nUnderstanding\
    \ how forms and models interact in Django takes time and repetition. Don't be\
    \ discouraged if you are slightly confused right now! In the next chapter, we\
    \ will create our signup, login, and logout pages to tie together our `CustomUser`\
    \ model and forms more clearly.\n\nThe final step is to update our `admin.py`\
    \ file since the admin is tightly coupled to the default User model. We will extend\
    \ the existing [UserAdmin](https://docs.djangoproject.com/en/4.0/ref/contrib/auth/#django.contrib.auth.admin.UserAdmin)\
    \ class to use our new `CustomUser` model. To control which fields are listed,\
    \ we use [list_display](https://docs.djangoproject.com/en/4.0/ref/contrib/admin/#django.contrib.admin.ModelAdmin.list_display).\
    \ But to actually edit new custom fields, like `age`, we must add [fieldsets](https://docs.djangoproject.com/en/4.0/ref/contrib/admin/#django.contrib.admin.ModelAdmin.fieldsets).\
    \ And to include a new custom field in the section for creating a new user we\
    \ rely on `add_fieldsets`.\n\nHere is what the complete code looks like:\n\n```\n\
    python\n# accounts/admin.py\nfrom django.contrib import admin\nfrom django.contrib.auth.admin\
    \ import UserAdmin\n\nfrom .forms import CustomUserCreationForm, CustomUserChangeForm\n\
    from .models import CustomUser\n\n\nclass CustomUserAdmin(UserAdmin):\n    add_form\
    \ = CustomUserCreationForm\n    form = CustomUserChangeForm\n    model = CustomUser\n\
    \    list_display = [\n        \"email\",\n        \"username\",\n        \"age\"\
    ,\n        \"is_staff\",\n    ]\n```"
