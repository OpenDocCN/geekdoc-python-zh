    \        self.age = age\n    def say_hello(self):\n        print(f\"Hello, my\
    \ name is {self.name} and I'm {self.age} years old.\")\n\n# Creating objects from\
    \ the class\nperson1 = Person(\"Alice\", 25)\nperson2 = Person(\"Bob\", 30)\n\n\
    # Accessing attributes\nprint(person1.name) # Output: Alice\nprint(person2.age)\
