    \ 2, 10, 4, 5]\n```\n\n在这段代码中，索引为 2 的元素通过赋值被更改为 10。\n\n**常见列表操作：** 列表支持多种常见操作，例如：\n\
    \n- 连接：使用 + 运算符组合两个列表。\n- 重复：使用 * 运算符重复一个列表。\n- 长度：使用 len() 函数获取列表中的元素数量。\n- 追加：使用\
    \ append() 方法将元素添加到列表末尾。\n- 移除：使用 remove() 方法移除元素的第一次出现。\n- 排序：使用 sort() 方法对列表元素进行排序。\n\
    \n```\nmy_list = [1, 2, 3]\nother_list = [4, 5, 6]\nconcatenated_list = my_list\
