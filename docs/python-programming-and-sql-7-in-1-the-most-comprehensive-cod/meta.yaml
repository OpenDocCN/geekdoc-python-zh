    \ extracts the substring \"World\" from the original string.\n\n**Common Operations:**\
    \ Sequences support various common operations, such as:\n\n```\nfruits1 = [\"\
    apple\", \"banana\"]\nfruits2 = [\"cherry\", \"date\"]\nall_fruits = fruits1 +\
    \ fruits2  # Concatenation\nrepeated_fruits = fruits1 * 3  # Repetition\nprint(len(all_fruits))\
    \  # Output: 4\nprint(\"banana\" in all_fruits)  # Output: True\n```\n\n- Concatenation:\
    \ Combining two sequences using the + operator.\n- Repetition: Repeating a sequence\
    \ using the * operator.\n- Length: Getting the number of elements in a sequence\
    \ using the len() function.\n- Membership: Checking if an element exists in a\
    \ sequence using the in keyword.\n\n## Sequence Check\n\nSequence checks allow\
    \ you to verify certain properties or conditions related to sequences, such as\
    \ whether a value exists in a sequence or if a sequence is empty.\n\n**Membership\
    \ Check:** You can check if a value exists in a sequence using the in keyword.\
    \ It returns True if the value is present in the sequence, and False otherwise.\
    \ For example:\n\n```\nfruits = [\"apple\", \"banana\", \"cherry\"]\nprint(\"\
    banana\" in fruits)  # Output: True\nprint(\"orange\" in fruits)  # Output: False\n\
    ```\n\nIn this code, \"banana\" in fruits checks if the value \"banana\" exists\
    \ in the fruits list.\n\n**Non-membership Check:** Similarly, you can check if\
