    Typically, it will keep track of the current year, month, and day. There are many
    uses for dates, including birthday reminders, project due dates, and appointment
    scheduling.


    **TIME:** The TIME data type stands in for a given time without the associated
    date. The times in hours, minutes, and seconds are saved there. Time values can
    be recorded as timestamps, used to schedule actions, or kept track of events.


    The DATETIME data type incorporates both the date and time into a single value.
    A record of the current date, time, and date is kept. DATETIME excels in situations
    when you need to keep track of the date and the time, such as when you''re recording
    the creation or modification of a record.


    The TIMESTAMP data type is analogous to DATETIME in that it likewise keeps track
    of dates and times. However, it often indicates a specific time, such as when
    a row was added or modified. To differentiate itself from DATETIME, a database
    system would often generate TIMESTAMP values on its own, based on the current
    date and time.


