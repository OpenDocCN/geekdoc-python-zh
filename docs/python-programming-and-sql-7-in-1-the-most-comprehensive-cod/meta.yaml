    \ easily, they can also significantly impact the organization and readability\
    \ of your code as a whole.\n\n## Scopes\n\nA variable's \"scope\" in Python refers\
    \ to the section of code in which it is declared and can be accessed. The visibility\
    \ and persistence of variables can be controlled by setting their scopes. Learning\
    \ about scopes is crucial if you want to learn about the structure and accessibility\
    \ of variables in your code.\n\nPython's primary scopes are either global or local.\n\
    \nAll variables declared outside of a function or a class are considered global.\
    \ They are available throughout your code, including within your functions. Program-wide\
    \ access is provided by global variables, which are declared at the very start\
    \ of your code.\n\nVariables placed inside a function are only visible to other\
    \ members. They can only be accessed while performing that specific task. Function\
    \ calls generate new instances of local variables, and function exits remove those\
    \ variables. Local variables are created anew for each function call and are completely\
    \ isolated from one another.\n\nAs an illustration of scopes, consider the following:\n\
    \n```\nglobal_var = 10 # Global variable\ndef my_function():\n    local_var =\
    \ 20 # Local variable\n    print(global_var) # Access global variable\n    print(local_var)\
    \ # Access local variable\nmy_function()\nprint(global_var) # Access global variable\n\
    print(local_var) # Error! local_var is not accessible here\n```\n\nIn the code\
    \ above, the global variable global_var can be accessed in multiple places, including\
    \ within the my_function(). The local variable local_var is only accessible inside\
    \ my_function(), where it was initially declared. An exception will pop up if\
    \ you try to use local_var outside of the function.\n\nRemember that local variables\
    \ have priority over global ones. The local one will be used if a function calls\
    \ for a variable with the same name but different scopes. When doing so, the global\
    \ keyword might be used to indicate that you intend to use the global variable\
    \ explicitly.\n\nWhen it comes to handling variables and avoiding name collisions,\
    \ scopes are crucial. Scopes are a powerful tool for organizing your code and\
    \ making variables available only when they are needed.\n\n## Dealing with Global\
    \ Variables\n\nYou can access variables you declare outside any specific function\
    \ or class with global variables in Python. While global variables can be useful,\
    \ they must be handled carefully to prevent errors and unexpected behavior.\n\n\
    The global keyword must be used to declare a variable as global before it may\
    \ be used within a function. In this way, you may avoid having Python create a\
    \ new local variable reusing the name, and instead access and alter the global\
    \ variable.\n\nThis code snippet shows how to manage global variables in Python:\n\
    \n```\nglobal_var = 10 # Global variable\ndef my_function():\n    global global_var\
    \ # Declare global_var as a global variable\n    global_var += 5 # Modify the\
    \ global variable\n    print(global_var) # Access the modified global variable\n\
    my_function()\nprint(global_var) # Access the modified global variable outside\
    \ the function\n```\n\nIn the code mentioned above, we declare an unscoped global\
    \ variable named global_var. The global keyword is used inside the my_function()\
    \ function to access the global variable global_var. The value of the global variable\
    \ may be modified accordingly.\n\nIt's necessary to exercise caution while making\
    \ changes to global variables. Since global variables can be altered in several\
    \ places throughout your code, utilizing them excessively can make your program\
    \ less readable and easier to break. Global variables should be minimized in favor\
    \ of passing values to functions as arguments and returning the functions' outcomes.\n\
    \nThe ability to successfully use and alter variables specified outside of functions\
    \ requires familiarity with the global keyword and how to declare and manage global\
    \ variables. Try to avoid utilizing global variables if at all possible, and aim\
    \ for clear, modular code.\n\n## Reading the Global Variables\n\nYou can access\
    \ variables you declare outside any specific function or class with global variables\
    \ in Python. The value of a global variable may be read without the need for any\
    \ special keywords.\n\nAnywhere in your code where you require access to a global\
    \ variable, just use the variable's name as the reference. Python will seek out\
    \ the variable in the context of the entire program and retrieve its value from\
    \ there.\n\nTo see how to access a global variable in Python, consider this sample\
    \ code:\n\n```\nglobal_var = 10 # Global variable\ndef my_function():\n    print(global_var)\
    \ # Access the global variable\nmy_function()\nprint(global_var) # Access the\
    \ global variable outside the function\n```\n\nThe preceding code snippet demonstrates\
    \ the use of an externally defined global variable, global_var. The value of global_var\
    \ can be accessed directly from within the my_function() function. Accessing the\
    \ global variable from outside the function is the same.\n\nTo use the value of\
    \ the variable global_var for printing or any other purpose, Python first locates\
    \ it in the global scope, where it was defined.\n\nNote that the global keyword\
    \ is not required for reading global variables. Within a function, the global\
    \ keyword is needed only when the value of a global variable is to be changed.\n\
    \nYou may simply retrieve the values of global variables and put them to use in\
    \ your code if you know how to read them directly by name. However, keep in mind\
    \ the importance of properly scoping variables and designing in modules to make\
    \ your code more readable and maintainable.\n\n## Shadowing Global Variables\n\
    \nWhen a Python function or code block uses a local variable sharing the name\
    \ as a global variable, this is known as \"shadowing.\" This local variable \"\
    shadows\" the corresponding global variable within the current context.\n\nWhen\
    \ a global variable is \"shadowed\" by a local one, all references to the global\
    \ one inside the scope are resolved to the local one. If you're not careful, this\
    \ could cause some strange actions.\n\nTo illustrate Python's support for global\
    \ variable shadowing, consider the following code snippet:\n\n```\nglobal_var\
    \ = 10 # Global variable\ndef my_function():\n    global_var = 5 # Local variable\
    \ with the same name as global_var\n    print(global_var) # Access the local variable\n\
    my_function()\nprint(global_var) # Access the global variable outside the function\n\
    ```\n\nA global variable by the name of global_var is used in the preceding example.\
    \ We create a local variable named global_var inside the my_function() function.\
    \ When we print global_var within the function's body, we are referencing the\
    \ local variable. This means that instead of producing 10, we will get 5.\n\n\
    However, when we print global_var outside of the function, it will refer to the\
    \ global variable, and the result will be 10.\n\nWhen working with variables that\
    \ share the same name but have different values in different scopes, shadowing\
    \ can cause confusion and unexpected behavior. It is best practice to provide\
    \ local and global variables with unique names to avoid this and make your code\
    \ more understandable.\n\nBeing aware of potential naming conflicts and making\
    \ well-informed decisions about variable names in code is greatly aided by familiarity\
    \ with shadowing global variables. Always keep in mind that the variables' accessibility\
    \ and visibility are affected by the scope in which they are defined.\n\n## Changing\
    \ Global Variables\n\nWithin a Python function, you can use the global keyword\
    \ to alter the value of a global variable. If you use the global keyword, Python\
    \ will know that you are modifying the global variable rather than a local one\
    \ with the same name.\n\nTo see how Python's global variables can be modified,\
    \ consider this code snippet:"
  mdcn: "倾向于使用其他函数间通信方法，例如参数传递或返回值，而非全局变量。\n\n请务必记住，虽然全局变量能让你轻松地在代码的不同部分之间传递数据，但它们也可能对代码整体的组织结构和可读性产生重大影响。\n\
    \n## 作用域\n\nPython 中变量的“作用域”指的是其被声明和可被访问的代码区域。通过设置变量的作用域，可以控制其可见性和持久性。如果你想了解代码中变量的结构和可访问性，学习作用域至关重要。\n\
    \nPython 的主要作用域分为全局作用域和局部作用域。\n\n所有在函数或类外部声明的变量都被视为全局变量。它们在整个代码中都可用，包括在你的函数内部。全局变量在代码的最开始处声明，提供了程序范围内的访问能力。\n\
    \n放置在函数内部的变量仅对其他成员可见。它们只能在执行该特定任务时被访问。函数调用会生成局部变量的新实例，而函数退出则会移除这些变量。局部变量为每次函数调用重新创建，并且彼此完全隔离。\n\
    \n为了说明作用域，考虑以下示例：\n\n```\nglobal_var = 10 # 全局变量\ndef my_function():\n    local_var\
    \ = 20 # 局部变量\n    print(global_var) # 访问全局变量\n    print(local_var) # 访问局部变量\n\
    my_function()\nprint(global_var) # 访问全局变量\nprint(local_var) # 错误！local_var 在此处不可访问\n\
    ```\n\n在上面的代码中，全局变量 `global_var` 可以在多个地方被访问，包括在 `my_function()` 内部。局部变量 `local_var`\
    \ 只能在其最初声明的 `my_function()` 内部访问。如果你尝试在函数外部使用 `local_var`，将会引发异常。\n\n请记住，局部变量的优先级高于全局变量。如果一个函数调用了一个同名但作用域不同的变量，将使用局部变量。在这种情况下，可以使用\
    \ `global` 关键字来明确表示你打算使用全局变量。\n\n在处理变量和避免命名冲突时，作用域至关重要。作用域是组织代码并仅在需要时使变量可用的强大工具。\n\
    \n## 处理全局变量\n\n在 Python 中，你可以通过全局变量访问在任何特定函数或类外部声明的变量。虽然全局变量很有用，但必须小心处理以防止错误和意外行为。\n\
    \n必须在函数内部使用 `global` 关键字将变量声明为全局变量后，才能在函数内使用它。这样，你可以避免 Python 创建一个同名的新局部变量，而是访问和修改全局变量。\n\
    \n此代码片段展示了如何在 Python 中管理全局变量：\n\n```\nglobal_var = 10 # 全局变量\ndef my_function():\n\
    \    global global_var # 将 global_var 声明为全局变量\n    global_var += 5 # 修改全局变量\n\
    \    print(global_var) # 访问修改后的全局变量\nmy_function()\nprint(global_var) # 在函数外部访问修改后的全局变量\n\
    ```\n\n在上面提到的代码中，我们声明了一个无作用域的全局变量 `global_var`。在 `my_function()` 函数内部，使用 `global`\
    \ 关键字来访问全局变量 `global_var`。全局变量的值可以相应地被修改。\n\n在修改全局变量时需要谨慎。由于全局变量可以在代码的多个地方被更改，过度使用它们会降低程序的可读性并使其更容易出错。应尽量减少全局变量的使用，转而通过参数向函数传递值并返回函数的结果。\n\
    \n要成功使用和修改在函数外部指定的变量，需要熟悉 `global` 关键字以及如何声明和管理全局变量。尽可能避免使用全局变量，并致力于编写清晰、模块化的代码。\n\
    \n## 读取全局变量\n\n在 Python 中，你可以通过全局变量访问在任何特定函数或类外部声明的变量。读取全局变量的值不需要任何特殊关键字。\n\n\
    在代码中任何需要访问全局变量的地方，只需使用变量名作为引用即可。Python 将在整个程序的上下文中查找该变量并从中检索其值。\n\n要查看如何在 Python\
    \ 中访问全局变量，请参考以下示例代码：\n\n```\nglobal_var = 10 # 全局变量\ndef my_function():\n    print(global_var)\
    \ # 访问全局变量\nmy_function()\nprint(global_var) # 在函数外部访问全局变量\n```\n\n前面的代码片段演示了使用外部定义的全局变量\
    \ `global_var`。可以直接从 `my_function()` 函数内部访问 `global_var` 的值。从函数外部访问全局变量的方式是相同的。\n\
    \n要使用变量 `global_var` 的值进行打印或任何其他用途，Python 首先会在其定义的全局作用域中查找它。\n\n请注意，读取全局变量不需要\
    \ `global` 关键字。在函数内部，只有当要更改全局变量的值时才需要 `global` 关键字。\n\n如果你知道如何直接通过名称读取全局变量，你就可以轻松地检索它们的值并在代码中使用它们。但是，请记住正确设置变量作用域和进行模块化设计的重要性，这将使你的代码更具可读性和可维护性。\n\
    \n## 遮蔽全局变量\n\n当一个 Python 函数或代码块使用一个与全局变量同名的局部变量时，这被称为“遮蔽”。这个局部变量在当前上下文中“遮蔽”了相应的全局变量。\n\
    \n当一个全局变量被一个局部变量“遮蔽”时，作用域内所有对该全局变量的引用都将解析为该局部变量。如果不小心，这可能会导致一些奇怪的行为。\n\n为了说明 Python\
    \ 对全局变量遮蔽的支持，请考虑以下代码片段：\n\n```\nglobal_var = 10 # 全局变量\ndef my_function():\n \
    \   global_var = 5 # 与 global_var 同名的局部变量\n    print(global_var) # 访问局部变量\nmy_function()\n\
    print(global_var) # 在函数外部访问全局变量\n```\n\n在前面的示例中，使用了一个名为 `global_var` 的全局变量。我们在\
    \ `my_function()` 函数内部创建了一个名为 `global_var` 的局部变量。当我们在函数体内打印 `global_var` 时，我们引用的是局部变量。这意味着输出将是\
    \ 5 而不是 10。\n\n然而，当我们在函数外部打印 `global_var` 时，它将引用全局变量，结果将是 10。\n\n当处理在不同作用域中具有相同名称但不同值的变量时，遮蔽可能会导致混淆和意外行为。最佳实践是为局部变量和全局变量提供唯一的名称，以避免这种情况并使你的代码更易于理解。\n\
    \n熟悉全局变量遮蔽有助于意识到潜在的命名冲突，并对代码中的变量名称做出明智的决定。请始终记住，变量的可访问性和可见性受其定义所在作用域的影响。\n\n##\
    \ 更改全局变量\n\n在 Python 函数内部，你可以使用 `global` 关键字来更改全局变量的值。如果你使用 `global` 关键字，Python\
    \ 将知道你正在修改的是全局变量，而不是同名的局部变量。\n\n要查看如何修改 Python 的全局变量，请考虑以下代码片段："
