    \ 你可以通过将逗号分隔的值放在方括号 [ ] 中来创建一个列表。例如：\n\n```\nmy_list = [1, 2, 3, 4, 5]\n```\n\n\
    在这段代码中，my_list 是一个包含值 1、2、3、4 和 5 的列表。\n\n**访问列表元素：** 你可以使用索引来访问列表的各个元素。索引从 0\
