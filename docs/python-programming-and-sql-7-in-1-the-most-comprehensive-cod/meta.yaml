    \nI love apple\n\n## 组织的艺术：掌握 Python 的数据结构\n\n## 序列\n\n序列是按顺序排列的一系列事物。Python 的内置序列类型提供了灵活的数据存储和操作工具。如果你在理解序列方面有困难，这里有一个快速入门指南：\n\
    \n**列表：** 它们是有序的、可变的（可更改的），并且可以包含不同数据类型的元素。列表通过将逗号分隔的值括在方括号 `[ ]` 中来定义。例如：\n\n\
    ```\nfruits = [\"apple\", \"banana\", \"cherry\"]\n```\n\n在这段代码中，`fruits` 是一个包含三个元素的列表：\"\
    apple\"、\"banana\" 和 \"cherry\"。\n\n**字符串：** 字符串是 Python 中另一种重要的序列类型。它们是有序的、不可变的（不能更改），并表示字符序列。字符串通过将文本括在单引号\
    \ `' '` 或双引号 `\" \"` 中来定义。例如：\n\n```\nmessage = \"Hello, World!\"\n```\n\n在这段代码中，`message`\
    \ 是一个包含文本 \"Hello, World!\" 的字符串。\n\n**元组：** 一旦定义，其元素就不能更改。元组通过将逗号分隔的值括在圆括号 `(\
    \ )` 中来定义。例如：\n\n```\ncoordinates = (3, 4)\n```\n\n在这段代码中，`coordinates` 是一个包含两个元素的元组：3\
    \ 和 4。\n\n**访问元素：** 索引从第一个元素的 0 开始，最后一个元素的 -1 开始，依此类推。例如：\n\n```\nfruits = [\"\
    apple\", \"banana\", \"cherry\"]\nprint(fruits[0])  # 输出：\"apple\"\n```\n\n在这段代码中，`fruits[0]`\
    \ 检索列表的第一个元素，即 \"apple\"。\n\n**切片：** 你可以使用切片提取序列的一部分。切片允许你指定索引范围以提取元素的子集。例如：\n\
    \n```\nmessage = \"Hello, World!\"\nprint(message[7:12])  # 输出：\"World\"\n```\n\
    \n在这段代码中，`message[7:12]` 从原始字符串中提取子字符串 \"World\"。\n\n**常见操作：** 序列支持各种常见操作，例如：\n\
    \n```\nfruits1 = [\"apple\", \"banana\"]\nfruits2 = [\"cherry\", \"date\"]\nall_fruits\
    \ = fruits1 + fruits2  # 连接\nrepeated_fruits = fruits1 * 3  # 重复\nprint(len(all_fruits))\
    \  # 输出：4\nprint(\"banana\" in all_fruits)  # 输出：True\n```\n\n- 连接：使用 `+` 运算符组合两个序列。\n\
    - 重复：使用 `*` 运算符重复一个序列。\n- 长度：使用 `len()` 函数获取序列中的元素数量。\n- 成员资格：使用 `in` 关键字检查元素是否存在于序列中。\n\
    \n## 序列检查\n\n序列检查允许你验证与序列相关的某些属性或条件，例如值是否存在于序列中或序列是否为空。\n\n**成员资格检查：** 你可以使用 `in`\
    \ 关键字检查值是否存在于序列中。如果值存在于序列中，它返回 `True`，否则返回 `False`。例如：\n\n```\nfruits = [\"apple\"\
    , \"banana\", \"cherry\"]\nprint(\"banana\" in fruits)  # 输出：True\nprint(\"orange\"\
    \ in fruits)  # 输出：False\n```\n\n在这段代码中，`\"banana\" in fruits` 检查值 \"banana\"\
    \ 是否存在于 `fruits` 列表中。\n\n**非成员资格检查：** 类似地，你可以使用 `not in` 关键字检查值是否不存在于序列中。如果值不在序列中，它显示\
    \ `True`，否则显示 `False`。例如：\n\n```\nfruits = [\"apple\", \"banana\", \"cherry\"\
    ]\nprint(\"orange\" not in fruits)  # 输出：True\nprint(\"banana\" not in fruits)\
    \  # 输出：False\n```\n\n在这段代码中，`\"orange\" not in fruits` 检查值 \"orange\" 是否不存在于水果列表中。\n\
    \n**空检查：** 你可以通过使用 `len()` 函数评估其长度来检查序列是否为空。如果序列的长度为 0，则表示序列为空。例如：\n\n```\nfruits\
    \ = [\"apple\", \"banana\", \"cherry\"]\nempty_list = []\nprint(len(fruits) ==\
    \ 0)  # 输出：False\nprint(len(empty_list) == 0)  # 输出：True\n```\n\n在这段代码中，`len(fruits)\
    \ == 0` 检查 `fruits` 列表是否为空。\n\n## 元组\n\n元组是 Python 中一种类似于列表的序列类型。然而，与列表不同，元组是不可变的，这意味着一旦定义，它们的元素就不能更改。\n\
    \n**创建元组：** 你可以通过将逗号分隔的值括在圆括号 `( )` 中来创建元组。例如：\n\n```\nmy_tuple = (1, 2, 3)\n\
    ```\n\n在这段代码中，`my_tuple` 是一个包含值 1、2 和 3 的元组。\n\n**访问元组元素：** 你可以使用索引访问元组的各个元素，就像列表和字符串一样。索引从第一个元素的\
    \ 0 开始，最后一个元素的 -1 开始，依此类推。例如：\n\n```\nmy_tuple = (1, 2, 3)\nprint(my_tuple[0])\
    \  # 输出：1\n```\n\n在这段代码中，`my_tuple[0]` 检索元组的第一个元素，即 1。\n\n**元组打包和解包：** 元组打包是指通过将值赋给由逗号分隔的变量或变量集来创建元组的过程。元组解包允许你将元组的各个元素赋给单独的变量。例如：\n\
    \n```\n# 元组打包\nmy_tuple = 1, 2, 3\n# 元组解包\na, b, c = my_tuple\nprint(a, b, c)\
    \  # 输出：1 2 3\n```\n\n在这段代码中，`my_tuple` 是通过赋值 1、2 和 3 创建的。然后，元组解包将 `my_tuple`\
    \ 的每个元素分别赋给变量 `a`、`b` 和 `c`。\n\n**不可变性：** 元组是不可变的，这意味着定义后你不能修改它们的元素。但是，你可以创建具有修改值的新元组或连接元组以创建新元组。例如：\n\
    \n```\nmy_tuple = (1, 2, 3)\nnew_tuple = my_tuple + (4, 5)\nprint(new_tuple) \
    \ # 输出：(1, 2, 3, 4, 5)\n```\n\n**常见操作：** 元组支持索引、切片和 `len()` 函数等常见操作。"
