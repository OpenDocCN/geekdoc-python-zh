    **Empty Check:** You can check if a sequence is empty by evaluating its length
    using the len() function. If the length of the sequence is 0, it means the sequence
    is empty. For example:


    ```

    fruits = ["apple", "banana", "cherry"]

    empty_list = []

    print(len(fruits) == 0)  # Output: False

    print(len(empty_list) == 0)  # Output: True

    ```


    In this code, len(fruits) == 0 checks if the fruits list is empty.


    # Tuples


    Tuples are a type of sequence in Python that is similar to lists. However, unlike
    lists, tuples are immutable, which means their elements cannot be changed once
    defined.


    **Creating a Tuple:** You can make a tuple by enclosing comma-separated values
    in parentheses ( ). For example:


    ```

    my_tuple = (1, 2, 3)

    ```


    In this code, my_tuple is a tuple that has the values 1, 2, and 3.


    **Accessing Tuple Elements:** You can access individual elements of a tuple using
    indexing, just like lists and strings. Indexing starts at 0 for the first element,
    -1 for the last element, and so on. For example:


    ```

    my_tuple = (1, 2, 3)

    print(my_tuple[0])  # Output: 1

    ```


    In this code, my_tuple[0] retrieves the first element of the tuple, which is 1.


    **Tuple Packing and Unpacking:** Tuple packing refers to the process of creating
    a tuple by assigning values to a variable or set of variables separated by commas.
    Tuple unpacking allows you to assign individual elements of a tuple to separate
    variables. For example:


    ```

    # Tuple packing

    my_tuple = 1, 2, 3

    # Tuple unpacking

    a, b, c = my_tuple

    print(a, b, c)  # Output: 1 2 3

    ```


    In this code, my_tuple is created by assigning the values 1, 2, and 3. Then, tuple
    unpacking assigns each element of my_tuple to variables a, b, and c respectively.


    **Immutable Nature:** Tuples are immutable, which means you cannot modify their
    elements after they are defined. However, you can create a new tuple with modified
    values or concatenate tuples to create a new tuple. For example:


    ```

    my_tuple = (1, 2, 3)

    new_tuple = my_tuple + (4, 5)

    print(new_tuple)  # Output: (1, 2, 3, 4, 5)

    ```


    **Common Operations:** Tuples support common operations such as indexing, slicing,
    and the len() function.'
- md: "## Lists\n\nThe ability to create and work with lists makes lists a fundamental\
    \ data structure. They can store information of various formats and are highly\
    \ flexible.\n\n**Creating a List:** You can develop a list by enclosing comma-separated\
    \ values in square brackets [ ]. For example:\n\n```\nmy_list = [1, 2, 3, 4, 5]\n\
    ```\n\nIn this code, my_list is a list that has the values 1, 2, 3, 4, and 5.\n\
    \n**Accessing List Elements:** You can access individual elements of a list using\
    \ indexing. Indexing starts at 0 for the first element, -1 for the last element,\
    \ and so on. For example:\n\n```\nmy_list = [1, 2, 3, 4, 5]\nprint(my_list[0])\
    \  # Output: 1\n```\n\nIn this code, my_list[0] retrieves the first component\
    \ of the list, which is 1.\n\n**Modifying List Elements:** Lists are mutable,\
    \ which means you can modify their elements after they are defined. You can assign\
    \ new values to specific indices or use list methods to modify elements. For example:\n\
    \n```\nmy_list = [1, 2, 3, 4, 5]\nmy_list[2] = 10\nprint(my_list)  # Output: [1,\
    \ 2, 10, 4, 5]\n```\n\nIn this code, the element at index 2 is changed to 10 using\
    \ assignment.\n\n**Common List Operations:** Lists support various common operations,\
    \ such as:\n\n- Concatenation: Combining two lists using the + operator.\n- Repetition:\
    \ Repeating a list using the * operator.\n- Length: Getting the number of elements\
    \ in a list using the len() function.\n- Append: Incorporating an element to the\
    \ end of a list using the append() method.\n- Remove: Removing the first occurrence\
    \ of an element using the remove() method.\n- Sort: Sorting the elements of a\
    \ list using the sort() method.\n\n```\nmy_list = [1, 2, 3]\nother_list = [4,\
    \ 5, 6]\nconcatenated_list = my_list + other_list  # Concatenation\nrepeated_list\
    \ = my_list * 3              # Repetition\nprint(len(concatenated_list))     \
    \       # Output: 6\nmy_list.append(4)            # Appending\nmy_list.remove(2)\
    \            # Removing\nmy_list.sort()               # Sorting\nprint(my_list)\
    \               # Output: [1, 3, 4]\n```\n\n**Iterating Over a List:** You can\
    \ utilize a \"for\" loop to iterate over the components of a list and perform\
    \ actions on each element. For example:\n\n```\nfruits = [\"apple\", \"banana\"\
    , \"cherry\"]\nfor fruit in fruits:\n    print(\"I love\", fruit)\n```\n\nIn this\
    \ code, the \"for\" loop iterates over each element in the fruits list, and the\
    \ code block inside the loop is executed for each element.\n\n## Matrix\n\nA matrix\
    \ is a row-and-column data structure with two dimensions. Grids, tables, and mathematical\
    \ matrices are all popular targets for this notation.\n\n**Creating a Matrix:**\
    \ In Python, you can represent a matrix using nested lists, where each inner list\
    \ represents a row of the matrix. For example:\n\n```\nmatrix = [[1, 2, 3],\n\
    \          [4, 5, 6],\n          [7, 8, 9]]\n```\n\nIn this code, matrix is a\
    \ 3x3 matrix with three rows and three columns.\n\n**Accessing Matrix Elements:**\
    \ You can access individual elements of a matrix using indexing on both the rows\
    \ and columns. Indexing starts at 0 for both rows and columns. For example:\n\n\
    ```\nmatrix = [[1, 2, 3],\n          [4, 5, 6],\n          [7, 8, 9]]\nprint(matrix[0][1])\
    \  # Output: 2\n```\n\nIn this code, matrix[0][1] retrieves the element at the\
    \ first row (index 0) and second column (index 1) of the matrix, which is 2.\n\
    \n**Modifying Matrix Elements:** Since matrices are represented using lists, you\
    \ can modify their elements using indexing and assignment. For example:\n\n```\n\
    matrix = [[1, 2, 3],\n          [4, 5, 6],\n          [7, 8, 9]]\nmatrix[1][2]\
    \ = 10\nprint(matrix)  # Output: [[1, 2, 3], [4, 5, 10], [7, 8, 9]]\n```\n\nIn\
    \ this code, the element at the second row (index 1) and third column (index 2)\
    \ of the matrix is changed to 10 using assignment.\n\n**Matrix Operations:** You\
    \ can perform various operations on matrices, such as addition, subtraction, multiplication,\
    \ and transposition. These operations involve performing operations element-wise\
    \ or following specific mathematical rules. For example:\n\n```\nmatrix1 = [[1,\
    \ 2, 3],\n           [4, 5, 6]]\nmatrix2 = [[7, 8, 9],\n           [10, 11, 12]]\n\
    result = [[0, 0, 0],\n          [0, 0, 0]]\nfor i in range(len(matrix1)):\n  \
    \  for j in range(len(matrix1[0])):\n        result[i][j] = matrix1[i][j] + matrix2[i][j]\n\
    print(result)  # Output: [[8, 10, 12], [14, 16, 18]]\n```\n\nIn this code, two\
    \ matrices matrix1 and matrix2 are added together element-wise, and the result\
    \ is stored in the result matrix.\n\n## Dictionaries\n\nThe dictionary is a flexible\
    \ data structure for storing and retrieving information in key-value pairs. You\
    \ can use them to link values to certain names or numbers.\n\n**Creating a Dictionary:**\
    \ You can make a dictionary by enclosing key-value pairs in curly braces { }.\
    \ Each key-value pair is set apart by a colon :. For example:\n\n```\nstudent\
    \ = {\"name\": \"John\", \"age\": 20, \"grade\": \"A\"}\n```\n\nIn this code,\
    \ student is a dictionary that contains three key-value pairs: \"name\" mapped\
    \ to \"John\", \"age\" mapped to 20, and \"grade\" mapped to \"A\".\n\n**Accessing\
    \ Dictionary Values:** You can access the value associated with a specific key\
    \ in a dictionary by using the key inside square brackets [ ]. For example:\n\n\
    ```\nstudent = {\"name\": \"John\", \"age\": 20, \"grade\": \"A\"}\nprint(student[\"\
    name\"])  # Output: \"John\"\n```\n\nIn this code, student[\"name\"] retrieves\
    \ the value associated with the key \"name\", which is \"John\".\n\n**Modifying\
    \ Dictionary Values:** Dictionaries are mutable, which means you can modify the\
    \ values associated with keys. You can assign new values to specific keys or incorporate\
    \ new key-value pairs to the dictionary. For example:\n\n```\nstudent = {\"name\"\
    : \"John\", \"age\": 20, \"grade\": \"A\"}\nstudent[\"age\"] = 21\nstudent[\"\
    major\"] = \"Computer Science\"\nprint(student)  # Output: {\"name\": \"John\"\
    , \"age\": 21, \"grade\": \"A\", \"major\": \"Computer Science\"}\n```\n\nIn this\
    \ code, the value associated with the key \"age\" is changed to 21, and a new\
    \ key-value pair \"major\" mapped to \"Computer Science\" is added to the dictionary.\n\
    \n**Dictionary Operations:** Dictionaries support various operations, such as:\n\
    \n- Getting the number of key-value pairs in a dictionary using the len() function.\n\
    - Checking if a key is located in a dictionary using the in keyword.\n- Removing\
    \ a key-value pair from a dictionary using the del keyword.\n\n```\nstudent =\
    \ {\"name\": \"John\", \"age\": 20, \"grade\": \"A\"}\nprint(len(student))   \
    \     # Output: 3\nprint(\"age\" in student)    # Output: True\ndel student[\"\
    grade\"]\nprint(student)             # Output: {\"name\": \"John\", \"age\": 20}\n\
    ```\n\n**Iterating Over a Dictionary:** You can use a \"for\" loop to iterate\
    \ over the keys or key-value pairs of a dictionary. For example:\n\n```\nstudent\
    \ = {\"name\": \"John\", \"age\": 20, \"grade\": \"A\"}\nfor key in student:\n\
    \    print(key, \":\", student[key])\n```\n\nIn this code, the \"for\" loop iterates\
    \ over the keys of the student dictionary, and the code block inside the loop\
    \ prints each key-value pair.\n\n## Guess the Number\n\nIn this game, the program\
    \ will generate a random number between 1 and 100. The player's task is to guess\
    \ the number within a certain number of attempts.\n\nAfter each guess, the program\
    \ will provide feedback to help the player narrow down their guess.\n\nInstructions:\n\
    \n1. Generate a random number between 1 and 100 using the random module.\n2. Ask\
