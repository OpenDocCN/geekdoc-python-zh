    \ improves the efficiency of searches. To make use of a column in a table as an\
    \ index, use the CREATE INDEX command."
- md: 'A view is a type of virtual table that may be created using the CREATE VIEW
    command. It allows for data to be presented in a manner of your choosing without
    requiring any changes to the underlying tables. Using the CREATE VIEW command,
    a view and its associated query can be created.


    Using the CREATE PROCEDURE command, you may create a SQL script that will carry
    out a series of operations. To create a stored procedure in the database, you
    use the CREATE PROCEDURE statement.


    In the same way that a stored procedure accepts parameters and returns a value,
    a function is a named sequence of SQL statements. To create a user-defined function
    in a database, you use the CREATE FUNCTION statement.


    When issuing DDL commands, be sure to utilize the correct syntax and supply all
    required information. You should also be careful with DDL operations because they
    can alter the database''s structure.


    Creating and maintaining the database objects required to store and retrieve data
    relies heavily on proficient use of DDL commands. You can get more familiar using
    DDL statements by practicing composing and running them.


    ## Using ALTER to Insert New Foreign Keys


    Relationships between tables are a common component of database design. Foreign
    keys are used to create these associations, guaranteeing the continued accuracy
    of data and the consistency of table references. Using the ALTER TABLE statement
    in SQL, you can modify an existing table to include foreign keys.


    The procedure for using ALTER to insert a foreign key is as follows:


    - Pick out the intended data sources: Find out which tables are connected. Both
    tables will have a primary key, but the one that includes the foreign key will
    be considered the "child" table.

    - Take note of the connection: Find out if the parent-child relationship is one
    of one, one of many, or many-to-many. As a result, you''ll be able to more precisely
    define the foreign key constraint.

    - Foreign key constraints can be defined by using the ALTER TABLE statement''s
    ADD CONSTRAINT keyword. Child table foreign key column, parent table and column
    to which it refers, and any additional parameters like ON DELETE and ON UPDATE
    should be specified.

    - Once the foreign key constraint has been defined, the ALTER TABLE command must
    be run in order for the foreign key to be added to the table.


    By ensuring referential integrity, which is strengthened by the use of foreign
    keys, data consistency is kept. It verifies that the values in the foreign key
    column of the child table are consistent with the values in the main key column
    of the parent table. In addition to helping optimize queries and speed up data
    retrieval, foreign keys can be useful in other ways as well.


    Foreign keys can effect database performance and place limits on data modification,
    so be sure to think about the repercussions before adding any. Make sure your
    queries work as expected and that your database relationships are well thought
    out.


    Building reliable and well-organized databases is as simple as learning how to
    use the ALTER command to add foreign keys. Gain experience with database relationships
    by practicing the addition of foreign keys in a variety of contexts.


    ## Making a DDL with a Foreign Key


    Foreign keys are used in database design to provide connections between tables
    and enforce referential integrity and data consistency. To define the database''s
    structure and schema, DDL statements in SQL allow for the creation of foreign
    keys.


    Here are the DDL steps for making a foreign key:


    - Find the related tables, or parents and children: Find out which tables are
    connected. The primary key that the child table will use is stored in the parent
    table.

    - The column in the child table that will hold the foreign key values must be
    defined. It''s important that this column''s data type corresponds to that of
    the primary key column it refers to in the parent database.

    - Add a foreign key constraint to the child table by using the ALTER TABLE statement
    and providing the constraint''s details. Values in the foreign key column must
    match those in the primary key column of the parent table, as enforced by this
    constraint.

    - Foreign key relationship configuration: Foreign key columns must include the
    primary key column that the parent table uses. This defines the connection between
    the two tables.

    - Explain what happens during an ON DELETE or ON UPDATE: Optionally, you can tell
    the system what to do whenever a record in the parent table that the child table
    refers to is deleted or altered. CASCADE (delete or update the child rows as well),
    SET NULL (set the foreign key values to NULL), and SET DEFAULT (use the default
    value for the foreign key) are common operations.

    - Create the foreign key by executing the DDL statement after the foreign key
    constraint has been defined.


    Using DDL to generate foreign keys guarantees accurate data and keeps tables linked
    together. It aids in avoiding inconsistencies and bolsters both fast data retrieval
    and optimized queries.


    Always think about the cardinality (one-to-one, many-to-many, or many-to-many)
    and the actions to execute on deletion or update when planning your database connections.
    To make sure your foreign key constraints work as expected and don''t cause any
    problems, you must first test them.


    ## Special Constraints


    When designing databases, unique constraints ensure that each column''s values
    are distinct from one another. This guarantees that data integrity is preserved
    and inconsistencies are avoided by prohibiting the entry of duplicate entries.


    Either the CREATE TABLE or the ALTER TABLE statement can be used to add or change
    a unique constraint on a table. Here are the most important takeaways:


    - Using the UNIQUE keyword after defining a column allows you to set a unique
    constraint on just that column. This constraint guarantees that every column contains
    only unique values.

    - Uniqueness but also let NULL values.

    - The database system will automatically validate the uniqueness of values when
    a unique constraint is applied. The database will throw an error and refuse the
    operation if a value with the same key is attempted to be inserted or changed.

    - Primary keys and unique constraints: the former often implies the latter. Each
    entry in a table can only be located by its main key, which is a special kind
    of unique constraint. The requirement for uniqueness is built into the process
    of creating a primary key.

    - Using the ALTER TABLE statement, unique constraints can be added, changed, or
    dropped. Unique restrictions on preexisting tables can be modified or removed
    in this way.


    When it comes to preventing duplicate values and keeping your database accurate,
    unique constraints are a must-have. They provide a mechanism for enforcing uniqueness
    at the table level and guarantee that each entry may be uniquely identified.


    Think about which columns, or which combinations of columns, need special restrictions
    for your application.


    ## Removal of Databases and Tables


    Knowing how to remove unnecessary tables and databases is a vital skill for every
    database administrator. Some essentials to remember are as follows:


    - Using the DROP TABLE statement and the table name, you can delete a table. A
    table and its data will be deleted from the database permanently when this statement
    is executed. Avoid table deletion at all costs, as it is irreversible and will
    result in the loss of all associated data.

    - When you delete a database, all of its associated tables, views, stored procedures,
    and other objects are also removed. Depending on the DBMS you''re working with,
    the precise procedure for erasing a database may be different. Database management
    systems typically offer delete commands or user interfaces for erasing data.

    - Create a backup of the data in the table or database you intend to delete before
    doing so. By creating backups, you can be assured that you always have access
    to your data.

    - In order to delete tables and databases, you may need to have administrative
    access to the database system or the requisite permissions. Before attempting
    to remove anything, check that you have the appropriate permissions to do so.

    - Be cautious while erasing data from tables or databases. Check that you are
    erasing the right things and that you don''t need the information anymore before
    you do so. The information can never be restored after deletion.

    - It is recommended that deletions be carried out in a development or test environment
    before being implemented in a live system. In this way, you may test the delete
    operation and make sure it''s producing the desired results.


    You should be absolutely sure that you don''t need the data before removing any
    tables or databases, as doing so will permanently delete the data. To avoid any
    unforeseen results, be sure to take the appropriate safety measures, back up your
    data, and double-check your work.


    You can better manage your database if you know how to delete tables and databases
    from within it. Gain competence with these processes in a safe setting through
    practice.


    ## How to Make Your Own Views'
