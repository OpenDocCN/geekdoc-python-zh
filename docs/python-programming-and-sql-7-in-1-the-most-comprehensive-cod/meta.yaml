    \ the corresponding global variable within the current context.\n\nWhen a global\
    \ variable is \"shadowed\" by a local one, all references to the global one inside\
    \ the scope are resolved to the local one. If you're not careful, this could cause\
    \ some strange actions.\n\nTo illustrate Python's support for global variable\
    \ shadowing, consider the following code snippet:\n\n```\nglobal_var = 10 # Global\
    \ variable\ndef my_function():\n    global_var = 5 # Local variable with the same\
    \ name as global_var\n    print(global_var) # Access the local variable\nmy_function()\n\
    print(global_var) # Access the global variable outside the function\n```\n\nA\
    \ global variable by the name of global_var is used in the preceding example.\
    \ We create a local variable named global_var inside the my_function() function.\
