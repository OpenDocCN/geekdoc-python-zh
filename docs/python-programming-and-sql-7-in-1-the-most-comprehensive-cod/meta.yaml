- md: "## Functions\n\nPython functions are a great way to break up your code into\
    \ manageable chunks that may be reused for various purposes. Modularity, readability,\
    \ and maintainability are all improved as a result. To extend Python, you can\
    \ do the following:\n\nThe def keyword, followed by the function name, and closing\
    \ parentheses are used to define a new function. For instance:\n\n```\ndef greet():\n\
    \    print(\"Hello, world!\")\n```\n\nIn this case, we'll create a greet() function\
    \ that, when invoked, will simply output \"Hello, world!\"\n\nAfter a function\
    \ has been defined, it can be called by specifying the function's name inside\
    \ parentheses. For instance:\n\n```\ngreet()\n```\n\nThis line of code invokes\
    \ the greet() method, which in turn runs the code within it (in this case, printing\
    \ \"Hello, world!\").\n\nParameters are a type of input value that functions can\
    \ take. Using parameters, you can tell a function what values to operate on when\
    \ it's called. For instance:\n\n```\ndef greet(name):\n    print(\"Hello,\", name)\n\
    ```\n\nWe changed the greet() function to take a name argument. The function's\
    \ name parameter requires a value when it is invoked.\n\n```\ngreet(\"Alice\"\
    )\n```\n\nThe console will now display \"Hello, Alice\" when you enter this.\n\
    \nThe return statement allows functions to return values. The result can be utilized\
    \ as-is or saved in a variable later. For instance:\n\n```\ndef add_numbers(a,\
    \ b):\n    return a + b\n```\n\nThis add_numbers() function takes in a pair of\
    \ numbers, a and b, and returns that number multiplied together. The result can\
    \ be used in the following ways:\n\n```\nresult = add_numbers(5, 3)\nprint(result)\
    \ # Output: 8\n```\n\nIn this case, we pass 5 and 3 as parameters to the function\
    \ and then use the result(8) that is returned to fill the value of the result\
    \ variable before printing it to the terminal.\n\n## Setup and Exercise\n\nLet's\
    \ set up a scenario and practice using Python functions. This is it:\n\nSetup:\n\
    \n1. Open IDLE or an online Python editor, or your favorite Python development\
    \ environment.\n2. A new Python file with the name \"function_exercise.py\" should\
    \ be created and saved.\n\nExercise:\n\n1. Create a function named calculate_area()\
    \ that determines a rectangle's area. The function should return the estimated\
    \ area and accept the two arguments, length and width.\n2. Use the equation area\
    \ = length * width inside the calculate_area() function to determine the area.\n\
    3. Use alternative length and width numbers when calling the calculate_area()\
    \ function, then report the outcome.\n4. Create a new function named greet_person()\
    \ that outputs a greeting and accepts a person's name as a parameter. For instance,\
    \ if \"John\" is the name passed, it should output \"Hello, John!\"\n5. To test\
    \ it, call the greet_person() function with various names.\n6. Make a third function\
    \ named find_maximum() that receives three parameters and returns the highest\
    \ value among the three.\n7. Use an if statement inside the find_maximum() method\
    \ to compare the three numbers, and then use the return statement to return the\
    \ highest number.\n8. Use various sets of numbers when calling the find_maximum()\
    \ function, then report the outcome.\n\nAn example of code to get you started\
    \ is provided below:\n\n```\n# Function to calculate the area of a rectangle\n\
    def calculate_area(length, width):\n    area = length * width\n    return area\n\
    \n# Function to greet a person\ndef greet_person(name):\n    print(\"Hello,\"\
    , name, \"!\")\n\n# Function to find the maximum of three numbers\ndef find_maximum(a,\
    \ b, c):\n    if a >= b and a >= c:\n        return a\n    elif b >= a and b >=\
    \ c:\n        return b\n    else:\n        return c\n\n# Testing the functions\n\
    rectangle_area = calculate_area(5, 3)\nprint(\"Area of rectangle:\", rectangle_area)\n\
    greet_person(\"Alice\")\ngreet_person(\"Bob\")\nmaximum_number = find_maximum(10,\
    \ 5, 8)\nprint(\"Maximum number:\", maximum_number)\n```\n\n## The OOP Odyssey:\
    \ Embark on a Pythonic Journey to Object-Oriented Programming\n\n### The meaning\
    \ of OOP\n\nOOP, or object-oriented programming, is a paradigm for arranging code\
    \ into objects that are instances of classes. It allows developers to organize\
    \ and create code based on actual objects and their interactions.\n\nOOP in Python\
    \ enables you to design classes that serve as a guide for building objects. A\
    \ class specifies the characteristics (properties) and methods (behaviors) that\
    \ an object of that class will possess.\n\nHere are some crucial OOP ideas:\n\n\
    **Classes:** A class is an outline or model that specifies the composition and\
    \ behavior of objects. The characteristics and methods that objects of that class\
    \ will possess are specified.\n\nAn instance of a class is what an object is.\
    \ Based on the class definition, it represents a certain object or entity. Using\
    \ the methods specified in the class, objects can perform actions and have distinct\
    \ properties.\n\nThe qualities or characteristics of an object are its attributes.\
    \ They can be variables defined inside a class representing an object's state.\n\
    \nMethods are functions specified within a class and specify how an object behaves.\
    \ They can interact with another object and conduct operations on the characteristics\
    \ of the object.\n\nThe idea of grouping data and methods within a class is called\
    \ encapsulation. It permits data concealing and safeguards an object's internal\
    \ workings.\n\nUsing the inheritance technique, a class can take on traits and\
    \ functions from another class. It encourages code reuse and permits the building\
    \ of specialized classes off of a base class used by everybody.\n\nObjects of\
    \ various classes can be utilized interchangeably thanks to polymorphism. It enables\
    \ using a single interface to represent numerous types and flexibility in the\
    \ code's architecture.\n\nPython's OOP allows you to write modular, reusable code,\
    \ enhance readability and organization, and better simulate real-world principles.\
    \ You can build more organized and maintainable code with this potent programming\
    \ paradigm.\n\n### Guidelines for Making Classes\n\nIn Python, defining an object's\
    \ structure and behavior entails creating a class. A step-by-step tutorial for\
    \ creating a class is provided below:\n\n- Step 1: Begin by putting the class\
    \ keyword in front of your class name. Use descriptive names that accurately describe\
    \ the subject matter of the class and start with an uppercase letter.\n- Step\
    \ 2: You can provide the attributes (variables) and methods (functions) that the\
    \ class's objects will have inside the class. These specify the attributes and\
    \ actions of the objects.\n- Step 3: Declare attributes outside of any methods\
    \ and inside the class to define them. You have the option of initializing them\
    \ with default settings or later assigning values when constructing objects.\n\
    - Step 4: Develop functions inside the class to define methods. The characteristics\
    \ of the class can be accessed by and actions can be taken on by methods. Self,\
    \ which denotes the object calling the method, is often the first parameter in\
    \ a method.\n- Step 5: At this point, you can produce your class's objects (instances).\
    \ Use parenthesis after the class name to do this. This invokes the unique method\
    \ __init__(), which acts as the class's constructor. To initialize the characteristics\
    \ of the object, you can supply arguments to the constructor.\n\nHere is an illustration\
    \ of how to create a basic class called Person:\n\n```\nclass Person:\n    def\
    \ __init__(self, name, age):\n        self.name = name\n        self.age = age\n\
    \n    def say_hello(self):\n        print(f\"Hello, my name is {self.name} and\
    \ I am {self.age} years old.\")\n\n# Create an object of the Person class\nperson1\
    \ = Person(\"Alice\", 25)\n\n# Access object attributes\nprint(person1.name) #\
    \ Output: Alice\n```"
  mdcn: "## 函数\n\nPython 函数是将代码分解为可管理块的好方法，这些块可以出于各种目的重复使用。这提高了模块化、可读性和可维护性。要扩展 Python，你可以执行以下操作：\n\
    \n使用 `def` 关键字，后跟函数名和闭合括号来定义一个新函数。例如：\n\n```\ndef greet():\n    print(\"Hello,\
    \ world!\")\n```\n\n在这种情况下，我们将创建一个 `greet()` 函数，当调用时，它将简单地输出 \"Hello, world!\"\
    。\n\n函数定义后，可以通过在括号内指定函数名来调用它。例如：\n\n```\ngreet()\n```\n\n这行代码调用了 `greet()` 方法，该方法进而运行其内部的代码（在这种情况下，打印\
    \ \"Hello, world!\"）。\n\n参数是函数可以接受的一种输入值。使用参数，你可以在调用函数时告诉它要操作哪些值。例如：\n\n```\n\
    def greet(name):\n    print(\"Hello,\", name)\n```\n\n我们修改了 `greet()` 函数以接受一个\
    \ `name` 参数。函数的 `name` 参数在调用时需要一个值。\n\n```\ngreet(\"Alice\")\n```\n\n当你输入这个时，控制台现在将显示\
    \ \"Hello, Alice\"。\n\n`return` 语句允许函数返回值。结果可以直接使用，也可以稍后保存在变量中。例如：\n\n```\ndef\
    \ add_numbers(a, b):\n    return a + b\n```\n\n这个 `add_numbers()` 函数接受一对数字 `a`\
    \ 和 `b`，并返回它们的乘积。结果可以按以下方式使用：\n\n```\nresult = add_numbers(5, 3)\nprint(result)\
    \ # 输出：8\n```\n\n在这种情况下，我们将 5 和 3 作为参数传递给函数，然后使用返回的结果 (8) 来填充 `result` 变量的值，然后将其打印到终端。\n\
    \n## 设置与练习\n\n让我们设置一个场景并练习使用 Python 函数。如下所示：\n\n设置：\n\n1.  打开 IDLE 或在线 Python\
    \ 编辑器，或者你最喜欢的 Python 开发环境。\n2.  创建一个名为 \"function_exercise.py\" 的新 Python 文件并保存。\n\
    \n练习：\n\n1.  创建一个名为 `calculate_area()` 的函数，用于计算矩形的面积。该函数应接受两个参数 `length` 和 `width`，并返回计算出的面积。\n\
    2.  在 `calculate_area()` 函数内部使用公式 `area = length * width` 来计算面积。\n3.  使用不同的 `length`\
    \ 和 `width` 数值调用 `calculate_area()` 函数，然后报告结果。\n4.  创建一个名为 `greet_person()` 的新函数，该函数输出问候语并接受一个人的名字作为参数。例如，如果传递的名字是\
    \ \"John\"，它应该输出 \"Hello, John!\"。\n5.  使用不同的名字调用 `greet_person()` 函数来测试它。\n6.\
    \  创建第三个名为 `find_maximum()` 的函数，该函数接收三个参数并返回这三个值中的最大值。\n7.  在 `find_maximum()`\
    \ 方法内部使用 `if` 语句比较这三个数字，然后使用 `return` 语句返回最大的数字。\n8.  使用不同的数字组合调用 `find_maximum()`\
    \ 函数，然后报告结果。\n\n以下是一个示例代码供你开始：\n\n```\n# 计算矩形面积的函数\ndef calculate_area(length,\
    \ width):\n    area = length * width\n    return area\n\n# 问候某人的函数\ndef greet_person(name):\n\
    \    print(\"Hello,\", name, \"!\")\n\n# 查找三个数中最大值的函数\ndef find_maximum(a, b,\
    \ c):\n    if a >= b and a >= c:\n        return a\n    elif b >= a and b >= c:\n\
    \        return b\n    else:\n        return c\n\n# 测试这些函数\nrectangle_area = calculate_area(5,\
    \ 3)\nprint(\"矩形面积：\", rectangle_area)\ngreet_person(\"Alice\")\ngreet_person(\"\
    Bob\")\nmaximum_number = find_maximum(10, 5, 8)\nprint(\"最大数字：\", maximum_number)\n\
    ```\n\n## OOP 之旅：开启 Python 面向对象编程的旅程\n\n### OOP 的含义\n\nOOP，即面向对象编程，是一种将代码组织成类的实例（对象）的范式。它允许开发者基于实际对象及其交互来组织和创建代码。\n\
    \nPython 中的 OOP 使你能够设计作为构建对象蓝图的类。一个类指定了该类对象将具有的特征（属性）和方法（行为）。\n\n以下是一些关键的 OOP\
    \ 概念：\n\n**类：** 类是一个蓝图或模型，它指定了对象的组成和行为。它规定了该类对象将具有的属性和方法。\n\n对象是类的一个实例。它基于类定义，代表一个特定的对象或实体。对象可以使用类中指定的方法来执行操作并拥有独特的属性。\n\
    \n属性是对象的品质或特征。它们可以是在类内部定义的变量，代表对象的状态。\n\n方法是在类内部定义的函数，它指定了对象的行为。它们可以与其他对象交互，并对对象的属性执行操作。\n\
    \n将数据和方法分组在类中的思想称为封装。它允许数据隐藏并保护对象的内部工作。\n\n继承技术允许一个类从另一个类继承特征和功能。它促进了代码重用，并允许在每个人使用的基础类之上构建专门的类。\n\
    \n多态性使得不同类的对象可以互换使用。它允许使用单一接口来表示多种类型，并提供了代码架构的灵活性。\n\nPython 的 OOP 允许你编写模块化、可重用的代码，增强可读性和组织性，并更好地模拟现实世界的原则。通过这种强大的编程范式，你可以构建更有组织且易于维护的代码。\n\
    \n### 创建类的指南\n\n在 Python 中，定义对象的结构和行为需要创建一个类。以下是创建类的分步指南：\n\n-   步骤 1：首先在类名前加上\
    \ `class` 关键字。使用描述性名称，准确描述类的主题，并以大写字母开头。\n-   步骤 2：你可以在类内部提供类对象将具有的属性（变量）和方法（函数）。这些指定了对象的属性和行为。\n\
    -   步骤 3：在类内部、任何方法外部声明属性来定义它们。你可以选择用默认值初始化它们，或者在构造对象时稍后赋值。\n-   步骤 4：在类内部开发函数来定义方法。方法可以访问类的特征并对其执行操作。`self`\
    \ 是方法的第一个参数，它表示调用该方法的对象。\n-   步骤 5：此时，你可以创建你的类的对象（实例）。为此，在类名后使用括号。这会调用特殊的方法 `__init__()`，它充当类的构造函数。你可以向构造函数提供参数来初始化对象的特征。\n\
    \n下面是一个如何创建名为 `Person` 的基本类的示例：\n\n```\nclass Person:\n    def __init__(self,\
    \ name, age):\n        self.name = name\n        self.age = age\n\n    def say_hello(self):\n\
    \        print(f\"Hello, my name is {self.name} and I am {self.age} years old.\"\
    )\n\n# 创建 Person 类的一个对象\nperson1 = Person(\"Alice\", 25)\n\n# 访问对象属性\nprint(person1.name)\
    \ # 输出：Alice\n```"
