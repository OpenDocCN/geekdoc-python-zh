  md: '# Making a DDL with a Foreign Key


    Foreign keys are used in database design to provide connections between tables
    and enforce referential integrity and data consistency. To define the database''s
    structure and schema, DDL statements in SQL allow for the creation of foreign
    keys.


    Here are the DDL steps for making a foreign key:


    Find the related tables, or parents and children: Find out which tables are connected.
    The primary key that the child table will use is stored in the parent table.


    The column in the child table that will hold the foreign key values must be defined.
    It''s important that this column''s data type corresponds to that of the primary
    key column it refers to in the parent database.


    Add a foreign key constraint to the child table by using the ALTER TABLE statement
    and providing the constraint''s details. Values in the foreign key column must
    match those in the primary key column of the parent table, as enforced by this
    constraint.


    Foreign key relationship configuration: Foreign key columns must include the primary
    key column that the parent table uses. This defines the connection between the
    two tables.


    Explain what happens during an ON DELETE or ON UPDATE: Optionally, you can tell
    the system what to do whenever a record in the parent table that the child table
    refers to is deleted or altered. CASCADE (delete or update the child rows as well),
    SET NULL (set the foreign key values to NULL), and SET DEFAULT (use the default
    value for the foreign key) are common operations.


    Create the foreign key by executing the DDL statement after the foreign key constraint
    has been defined.


    Using DDL to generate foreign keys guarantees accurate data and keeps tables linked
    together. It aids in avoiding inconsistencies and bolsters both fast data retrieval
    and optimized queries.


    Always think about the cardinality (one-to-one, many-to-many, or many-to-many)
    and the actions to execute on deletion or update when planning your database connections.
    To make sure your foreign key constraints work as expected and don''t cause any
    problems, you must first test them.


