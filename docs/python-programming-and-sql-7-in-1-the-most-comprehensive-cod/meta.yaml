    \ # 输出：The animal makes a sound.\ndog.speak() # 输出：The dog barks.\n```\n\n上面的代码展示了`Animal`类的`speak`方法使用通用的声音输出。`Dog`类通过用自己的实现覆盖`Animal`的`speak`方法，打印出“The\
    \ dog barks”。当我们从这些类创建对象然后调用`speak`方法时，会调用每个对象的相关过程。\n\n使用继承，你可以创建专门的类，这些类共享父类的共同特性和行为，同时也有自由根据需要修改这些特性。它通过鼓励重用现有代码和减少不必要的重复，使你能够构建更精简和有组织的代码库。\n\
    \n## 多态\n\n多态是面向对象编程的一个关键概念，因为它允许不同类的对象被视为属于同一个超类。换句话说，它让你能够设计出足够一致和灵活的代码来处理不同类型的对象。\n\
    \n在Python中，多态可以通过方法重写和方法重载来实现。\n\n子类通过提供其超类中定义的方法的替代实现来“重写”该方法。这样，子类可以在不改变原始方法签名的情况下改变继承方法的行为。Python会自动使用正确的"
