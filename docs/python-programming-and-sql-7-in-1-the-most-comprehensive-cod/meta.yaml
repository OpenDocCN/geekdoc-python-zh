    ability to easily store, retrieve, and modify data is like having a toolbox full
    of magic at your disposal.


    There are many kinds of databases, and you''ll learn about them as you progress
    in your programming career. The most common type is called a relational database,
    which stores information in tables connected by relationships, and MySQL and PostgreSQL
    are two examples of widely used relational databases.


