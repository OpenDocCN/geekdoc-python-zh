    \  # Output: \"apple\"\n```\n\nIn this code, fruits[0] retrieves the first element\
    \ of the list, which is \"apple\".\n\n**Slicing:** You can extract a portion of\
    \ a sequence using slicing. Slicing allows you to specify a range of indices to\
    \ extract a subset of elements. For example:\n\n```\nmessage = \"Hello, World!\"\
