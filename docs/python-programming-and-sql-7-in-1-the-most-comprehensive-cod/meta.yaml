  - "[PAGE 38]\n\n# Decision Making in Python\n\n# Conditional Statements\n\nYou can\
    \ modify the flow of your program based on specific criteria using conditional\
    \ statements. They allow your program to decide what to do and run various blocks\
    \ of code in response to whether a condition is true or false. The following is\
    \ a short tutorial for understanding conditional statements:\n\n**If Condition:**\
    \ The simplest conditional statement is the if one. If a certain condition is\
    \ true, a block of code is executed. The following generic syntax is used:\n\n\
    ```\nif condition:\n    # Code to execute if the condition is true\n```\n\nFor\
    \ example:\n\n```\nage = 18\nif age >= 18:\n    print(\"You are an adult!\")\n\
    ```\n\nThis code prints the phrase \"You are an adult!\" if the condition age\
    \ >= 18 is true.\n\n**If-Else Statement:** If a condition is true, the if-else\
    \ statement allows you to run one block of code; if it is false, it runs a different\
    \ block of code. The following generic syntax is used:\n\n```\nif condition:\n\
    \    # Code to execute if the condition is true\nelse:\n    # Code to execute\
    \ if the condition is false\n```\n\nFor example:\n\n```\nage = 16\nif age >= 18:\n\
    \    print(\"You are an adult!\")\nelse:\n    print(\"You are a minor.\")\n```\n\
    \nThis code prints the phrase \"You are an adult!\" if the condition age >= 18\
    \ is true. If not, \"You are a minor.\" will be displayed on the screen.\n\nThe\
    \ if-elif-else statement enables you to evaluate numerous assumptions and execute\
    \ various code blocks in accordance. The \"else if\" symbol, abbreviated as \"\
    elif,\" enables you to verify extra conditions. The following generic syntax is\
    \ used:\n\n```\nif condition1:\n    # Code to execute if condition1 is true\n\
    elif condition2:\n    # Code to execute if condition2 is true\n```"
- md: "## Control Flow\n\nControl flow makes references to the order in which the\
    \ statements in a program are executed. It permits you to control the flow of\
    \ execution based on conditions, loops, and function calls. Here's an easy help\
    \ to guide you in understanding control flow:\n\n**Sequential Execution:** By\
    \ default, statements in a program are executed sequentially from top to bottom.\
    \ Each statement is executed one after another unless there is a control flow\
    \ statement that alters the normal flow.\n\n**Conditional Statements:** Conditional\
    \ statements, such as if, elif, and else, allow you to make decisions and execute\
    \ different blocks of code based on conditions. They enable your program to take\
    \ different paths depending on the outcome of the conditions.\n\n**Loops:** Loops\
    \ allow you to repeat a block of code multiple times. Python provides two types\
    \ of loops: for and while.\n\nfor loop: Executes a block of code for each element\
    \ in an iterable or a specified range of values.\n\nwhile loop: Repeatedly runs\
    \ a block of code as long as a condition remains true.\n\n**Control Flow Statements:**\
    \ Control flow statements help you control the flow to execute your program. Some\
    \ commonly used control flow statements include:\n\nbreak: Terminates the loop\
    \ prematurely.\n\ncontinue: Skips the rest of the current iteration and keeps\
    \ to the next iteration of the loop.\n\npass: Acts as a placeholder and does nothing.\
    \ It is commonly used when you need a statement syntactically but don't want it\
    \ to do anything.\n\n**Function Calls:** Functions allow you to group a set of\
    \ statements together and execute them as a unit. You can define your own functions\
    \ or use built-in functions provided by Python or external libraries. Function\
    \ calls enable you to reuse code and improve the organization and readability\
    \ of your program.\n\n**Exception Handling:** Exception handling allows you to\
    \ catch and handle errors that may occur during the execution of your program.\
    \ With try and except blocks, you can catch specific exceptions and gracefully\
    \ handle them, preventing your program from crashing.\n\nCombining these control\
    \ flow mechanisms allows you to create programs that make decisions, repeat actions,\
    \ handle errors, and perform complex tasks.\n\n## Handling Errors\n\nError handling\
    \ allows you to anticipate and handle errors that may occur during the execution\
    \ of your program. By handling errors gracefully, you can prevent your program\
    \ from crashing and provide meaningful feedback to users. Here's a simple guidance\
    \ to help you understand error handling:\n\n**Types of Errors:** In Python, errors\
    \ are classified into different types, known as exceptions. Some common types\
    \ of exceptions include:\n\n- SyntaxError: This occurs when there is a syntax\
    \ error in your code.\n- NameError: Occurs when you use a variable or function\
    \ name that has not been defined.\n- TypeError: Occurs when you operate on an\
    \ object of an inappropriate type.\n- ZeroDivisionError: This occurs when you\
    \ attempt to divide a number by zero.\n- FileNotFoundError: This occurs when you\
    \ try to access a file that does not exist.\n\n**Try-Except Block:** The try-except\
    \ block allows you to catch and handle exceptions. You put the code that may raise\
    \ an exception inside the try block and provide the code to handle the exception\
    \ in the except block. The syntax is as follows:\n\n```\ntry:\n    # Code that\
    \ may raise an exception\nexcept ExceptionType:\n    # Code to handle the exception\n\
    ```\n\nFor example:\n\n```\ntry:\n    num1 = int(input(\"Enter a number: \"))\n\
    \    num2 = int(input(\"Enter another number: \"))\n    result = num1 / num2\n\
    \    print(\"Result:\", result)\nexcept ZeroDivisionError:\n    print(\"Error:\
    \ Division by zero is not allowed.\")\nexcept ValueError:\n    print(\"Error:\
    \ Invalid input. Please enter a valid number.\")\n```\n\nIn this code, if a ZeroDivisionError\
    \ or a ValueError occurs, the appropriate error message will be displayed instead\
    \ of the program crashing.\n\n**Handling Multiple Exceptions:** You can handle\
    \ multiple exceptions in a single except block by specifying the exception types\
    \ separated by commas. For example:\n\n```\ntry:\n    # Code that may raise exceptions\n\
    except (ExceptionType1, ExceptionType2):\n    # Code to handle the exceptions\n\
    ```\n\n**Finally Block:** You can include a finally block after the except block\
    \ to specify code that should always execute, regardless of whether an exception\
    \ occurred or not. The finally block is optional. For example:\n\n```\ntry:\n\
    \    # Code that may raise an exception\nexcept ExceptionType:\n    # Code to\
    \ handle the exception\nfinally:\n    # Code that always executes\n```\n\n**Raising\
    \ Exceptions:** In addition to handling exceptions, you can also raise exceptions\
    \ using the raise keyword. This allows you to create custom exceptions or raise\
    \ built-in exceptions in specific situations.\n\n## Adding the Conditionals\n\n\
    Conditionals, such as if, elif, and else, allow you to add decision-making capabilities\
    \ to your code. They enable your program to execute different blocks of code based\
    \ on certain conditions. Here's an easy walk through to help you understand adding\
    \ conditionals:\n\n**If Statement:** The if statement is the most simple conditional\
    \ statement. It helps you to execute a block of code if a given condition is true.\
    \ The general syntax is as follows:\n\n```\nif condition:\n    # Code to execute\
    \ if the condition is true\n```\n\nFor example:\n\n```\nage = 18\nif age >= 18:\n\
    \    print(\"You are an adult!\")\n```\n\nIn this code, if the condition age >=\
    \ 18 is true, the message \"You are an adult!\" will be printed.\n\n**If-Else\
    \ Statement:** The if-else statement allows you to execute one block of code if\
    \ a condition is true, and another block of code if the condition is false. The\
    \ general syntax is as follows:\n\n```\nif condition:\n    # Code to execute if\
    \ the condition is true\nelse:\n    # Code to execute if the condition is false\n\
    ```\n\nFor example:\n\n```\nage = 16\nif age >= 18:\n    print(\"You are an adult!\"\
    )\nelse:\n    print(\"You are a minor.\")\n```\n\nIn this code, if the condition\
    \ age >= 18 is true, the message \"You are an adult!\" will be printed. Otherwise,\
    \ the message \"You are a minor.\" will be printed.\n\n**If-Elif-Else Statement:**\
    \ The if-elif-else statement allows you to test multiple conditions and execute\
    \ different blocks of code accordingly. The elif stands for \"else if\" and allows\
    \ you to check additional conditions. The general syntax is as follows:\n\n```\n\
    if condition1:\n    # Code to execute if condition1 is true\nelif condition2:\n\
    \    # Code to execute if condition2 is true\nelse:\n    # Code to execute if\
    \ all conditions are false\n```\n\nFor example:\n\n```\nscore = 75\nif score >=\
    \ 90:\n    print(\"You got an A!\")\nelif score >= 80:\n    print(\"You got a\
    \ B.\")\nelif score >= 70:\n    print(\"You got a C.\")\nelse:\n    print(\"You\
    \ need to improve your score.\")\n```\n\nIn this code, the appropriate message\
    \ will be printed based on the value of score.\n\n**Nesting Conditionals:** You\
    \ can also nest conditionals within one another to create more complex decision-making\
    \ logic. This allows you to handle multiple conditions and execute different blocks\
    \ of code based on various scenarios.\n\n```\nx = 5\ny = 10\nif x > 0:\n    if\
    \ y > 0:\n        print(\"Both x and y are positive.\")\n    else:\n        print(\"\
    x is positive, but y is not.\")\nelse:\n    print(\"x is not positive.\")\n```\n\
    \nIn this code, the messages will be printed based on the values of x and y.\n\
    \n## \"While\" Loops\n\nA \"while\" loop allows you to repeatedly run a block\
    \ of code while a given condition remains true. It's useful when you want to repeat\
    \ an action until a certain condition is met.\n\n**Basic Syntax:** The general\
    \ syntax of a \"while\" loop is as follows:\n\n```\nwhile condition:\n    # Code\
    \ to execute while the condition is true\n```\n\nThe loop will continue executing\
    \ the code block as long as the condition remains true.\n\n**Loop Execution:**\
    \ When a \"while\" loop starts, it first evaluates the condition. If this condition\
    \ is true, the code block inside the loop is executed. Afterward, the condition\
    \ is checked again. If it's still true, the code block is executed again. This\
    \ process repeats until the condition becomes false. At the moment the condition\
    \ is false, the loop terminates, and the program keeps with the next statement\
    \ after the loop.\n\nExample: Let's see an example to illustrate the usage of\
    \ a \"while\" loop:\n\n```\ncount = 1\nwhile count <= 5:\n    print(\"Count:\"\
    , count)\n    count += 1\n```\n\nIn this code, the initial value of count is 1.\
    \ The loop continues executing as long as count is less than or equal to 5. Inside\
    \ the loop, the value of count is printed, and then count is incremented by 1\
    \ using the += operator. The loop will repeat this process until count becomes\
    \ 6, at which point the condition becomes false, and the loop terminates.\n\n\
    The output will be:\n\n```\nCount: 1\nCount: 2\nCount: 3\nCount: 4\nCount: 5\n\
    ```\n\n**Infinite Loops:** Be cautious when using \"while\" loops to ensure that\
    \ the condition eventually becomes false; otherwise, you could end up with an\
    \ infinite loop, which continuously executes the code block without termination.\
    \ To avoid this, ensure that the condition is updated within the loop, so there\
    \ is a possibility for it to become false.\n\n**Control Flow Statements:** Inside\
    \ a \"while\" loop, you can use control flow statements like break and continue\
    \ to modify the flow of execution. break allows you to exit the loop prematurely\
    \ while continue skips the rest of the current iteration and transports on to\
    \ the next iteration.\n\n```\ncount = 1\n```"
  mdcn: "## 控制流\n\n控制流指的是程序中语句执行的顺序。它允许你根据条件、循环和函数调用来控制执行流程。以下是一份简明指南，帮助你理解控制流：\n\n\
    **顺序执行：** 默认情况下，程序中的语句从上到下依次执行。除非有控制流语句改变正常流程，否则每个语句都会按顺序执行。\n\n**条件语句：** 条件语句（如\
    \ `if`、`elif` 和 `else`）允许你根据条件做出决策并执行不同的代码块。它们使你的程序能够根据条件的结果选择不同的执行路径。\n\n**循环：**\
    \ 循环允许你重复执行一段代码多次。Python 提供了两种循环类型：`for` 循环和 `while` 循环。\n\n`for` 循环：对可迭代对象中的每个元素或指定范围内的值执行一段代码块。\n\
    \n`while` 循环：只要条件保持为真，就重复执行一段代码块。\n\n**控制流语句：** 控制流语句帮助你控制程序的执行流程。一些常用的控制流语句包括：\n\
    \n`break`：提前终止循环。\n\n`continue`：跳过当前迭代的剩余部分，继续下一次迭代。\n\n`pass`：充当占位符，不执行任何操作。通常在语法上需要一条语句但不想让它做任何事情时使用。\n\
    \n**函数调用：** 函数允许你将一组语句组合在一起作为一个单元执行。你可以定义自己的函数，也可以使用 Python 或外部库提供的内置函数。函数调用使你能够重用代码，并提高程序的组织性和可读性。\n\
    \n**异常处理：** 异常处理允许你捕获和处理程序执行过程中可能发生的错误。通过 `try` 和 `except` 块，你可以捕获特定的异常并优雅地处理它们，防止程序崩溃。\n\
    \n结合这些控制流机制，你可以创建能够做出决策、重复操作、处理错误并执行复杂任务的程序。\n\n## 处理错误\n\n错误处理允许你预见并处理程序执行过程中可能发生的错误。通过优雅地处理错误，你可以防止程序崩溃并向用户提供有意义的反馈。以下是一份简单指南，帮助你理解错误处理：\n\
    \n**错误类型：** 在 Python 中，错误被分为不同的类型，称为异常。一些常见的异常类型包括：\n\n- `SyntaxError`：当代码中存在语法错误时发生。\n\
    - `NameError`：当你使用未定义的变量或函数名时发生。\n- `TypeError`：当你对不适当类型的对象进行操作时发生。\n- `ZeroDivisionError`：当你尝试将一个数除以零时发生。\n\
    - `FileNotFoundError`：当你尝试访问不存在的文件时发生。\n\n**Try-Except 块：** `try-except` 块允许你捕获和处理异常。你将可能引发异常的代码放在\
    \ `try` 块中，并在 `except` 块中提供处理异常的代码。语法如下：\n\n```\ntry:\n    # 可能引发异常的代码\nexcept\
    \ ExceptionType:\n    # 处理异常的代码\n```\n\n例如：\n\n```\ntry:\n    num1 = int(input(\"\
    Enter a number: \"))\n    num2 = int(input(\"Enter another number: \"))\n    result\
    \ = num1 / num2\n    print(\"Result:\", result)\nexcept ZeroDivisionError:\n \
    \   print(\"Error: Division by zero is not allowed.\")\nexcept ValueError:\n \
    \   print(\"Error: Invalid input. Please enter a valid number.\")\n```\n\n在此代码中，如果发生\
    \ `ZeroDivisionError` 或 `ValueError`，将显示相应的错误消息，而不是程序崩溃。\n\n**处理多个异常：** 你可以在单个\
    \ `except` 块中通过指定用逗号分隔的异常类型来处理多个异常。例如：\n\n```\ntry:\n    # 可能引发异常的代码\nexcept (ExceptionType1,\
    \ ExceptionType2):\n    # 处理异常的代码\n```\n\n**Finally 块：** 你可以在 `except` 块之后包含一个\
    \ `finally` 块，以指定无论是否发生异常都应始终执行的代码。`finally` 块是可选的。例如：\n\n```\ntry:\n    # 可能引发异常的代码\n\
    except ExceptionType:\n    # 处理异常的代码\nfinally:\n    # 始终执行的代码\n```\n\n**引发异常：**\
    \ 除了处理异常，你还可以使用 `raise` 关键字引发异常。这允许你在特定情况下创建自定义异常或引发内置异常。\n\n## 添加条件语句\n\n条件语句（如\
    \ `if`、`elif` 和 `else`）允许你为代码添加决策能力。它们使你的程序能够根据特定条件执行不同的代码块。以下是一份简明指南，帮助你理解如何添加条件语句：\n\
    \n**If 语句：** `if` 语句是最简单的条件语句。它帮助你在给定条件为真时执行一段代码块。一般语法如下：\n\n```\nif condition:\n\
    \    # 条件为真时执行的代码\n```\n\n例如：\n\n```\nage = 18\nif age >= 18:\n    print(\"You\
    \ are an adult!\")\n```\n\n在此代码中，如果条件 `age >= 18` 为真，将打印消息 \"You are an adult!\"\
    。\n\n**If-Else 语句：** `if-else` 语句允许你在条件为真时执行一段代码块，在条件为假时执行另一段代码块。一般语法如下：\n\n```\n\
    if condition:\n    # 条件为真时执行的代码\nelse:\n    # 条件为假时执行的代码\n```\n\n例如：\n\n```\n\
    age = 16\nif age >= 18:\n    print(\"You are an adult!\")\nelse:\n    print(\"\
    You are a minor.\")\n```\n\n在此代码中，如果条件 `age >= 18` 为真，将打印消息 \"You are an adult!\"\
    。否则，将打印消息 \"You are a minor.\"。\n\n**If-Elif-Else 语句：** `if-elif-else` 语句允许你测试多个条件并相应地执行不同的代码块。`elif`\
    \ 代表 \"else if\"，允许你检查额外的条件。一般语法如下：\n\n```\nif condition1:\n    # condition1 为真时执行的代码\n\
    elif condition2:\n    # condition2 为真时执行的代码\nelse:\n    # 所有条件都为假时执行的代码\n```\n\
    \n例如：\n\n```\nscore = 75\nif score >= 90:\n    print(\"You got an A!\")\nelif\
    \ score >= 80:\n    print(\"You got a B.\")\nelif score >= 70:\n    print(\"You\
    \ got a C.\")\nelse:\n    print(\"You need to improve your score.\")\n```\n\n\
    在此代码中，将根据 `score` 的值打印相应的消息。\n\n**嵌套条件语句：** 你还可以将条件语句相互嵌套，以创建更复杂的决策逻辑。这允许你处理多个条件，并根据各种场景执行不同的代码块。\n\
    \n```\nx = 5\ny = 10\nif x > 0:\n    if y > 0:\n        print(\"Both x and y are\
    \ positive.\")\n    else:\n        print(\"x is positive, but y is not.\")\nelse:\n\
    \    print(\"x is not positive.\")\n```\n\n在此代码中，将根据 `x` 和 `y` 的值打印相应的消息。\n\n\
    ## \"While\" 循环\n\n\"while\" 循环允许你在给定条件保持为真时重复运行一段代码块。当你想重复一个操作直到满足某个条件时，它非常有用。\n\
    \n**基本语法：** \"while\" 循环的一般语法如下：\n\n```\nwhile condition:\n    # 条件为真时执行的代码\n\
    ```\n\n只要条件保持为真，循环就会继续执行代码块。\n\n**循环执行：** 当 \"while\" 循环开始时，它首先评估条件。如果条件为真，则执行循环内的代码块。之后，再次检查条件。如果仍然为真，则再次执行代码块。此过程重复进行，直到条件变为假。当条件为假时，循环终止，程序继续执行循环之后的下一条语句。\n\
    \n示例：让我们看一个例子来说明 \"while\" 循环的用法：\n\n```\ncount = 1\nwhile count <= 5:\n    print(\"\
