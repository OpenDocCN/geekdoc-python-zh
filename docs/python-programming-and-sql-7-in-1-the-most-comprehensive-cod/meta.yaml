    # Exceptions


    Exceptions are a fundamental concept in programming that help handle and manage
    errors or exceptional situations that may occur during the execution of a program.
    They provide a structured way to deal with unexpected events and ensure the program
    continues to run smoothly.


    **Exception Handling:** Exception handling is the process of catching and handling
    exceptions in a program. When an exception occurs, it interrupts the normal flow
    of the program and transfers control to a special block of code called an exception
    handler.


    The exception handler can take appropriate actions to address the exception and
    prevent the program from crashing. Types of Exceptions: Exceptions can be of different
    types, such as runtime exceptions, checked exceptions, and custom exceptions.
    Runtime exceptions are unexpected errors that occur during the execution of the
    program, such as divide-by-zero or null pointer exceptions. Checked exceptions
    are anticipated errors that must be explicitly handled by the programmer.


    Custom exceptions are exceptions defined by the programmer to handle specific
    scenarios in their code. Throwing Exceptions: Exceptions are thrown when an error
    or exceptional condition is encountered in the code. To throw an exception, the
    program uses the throw keyword followed by an instance of an exception class.
    This transfers control to the nearest exception handler that can handle the thrown
    exception. Catching Exceptions: To catch and handle exceptions, the program uses
    a try-catch block.


    The code that may throw an exception is enclosed within the try block, and one
    or more catch blocks follow to handle specific types of exceptions. When an exception
    occurs within the try block, control is transferred to the appropriate catch block
    based on the type of exception thrown. Exception Propagation: If an exception
    is not caught within a method, it is propagated up the call'
