    security to your database.


    Improved performance and less time spent on development are two potential benefits
    of their centralization of database operations and encouragement of code reuse.


    To construct sophisticated database processes, stored procedures can be invoked
    from other stored procedures, triggers, or application code.


    Since the stored procedures deal with the data modification and processing, they
    allow for the separation of business logic and presentation logic.


    Stored procedures can be updated and modified apart from the rest of the application''s
