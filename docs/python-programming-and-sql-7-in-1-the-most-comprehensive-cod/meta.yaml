    - Membership: Checking if an element exists in a sequence using the in keyword.


    # Sequence Check


    Sequence checks allow you to verify certain properties or conditions related to
    sequences, such as whether a value exists in a sequence or if a sequence is empty.


    **Membership Check:** You can check if a value exists in a sequence using the
    in keyword. It returns True if the value is present in the sequence, and False
    otherwise. For example:


    ```

    fruits = ["apple", "banana", "cherry"]

    print("banana" in fruits)  # Output: True

    print("orange" in fruits)  # Output: False

    ```


    In this code, "banana" in fruits checks if the value "banana" exists in the fruits
    list.


    **Non-membership Check:** Similarly, you can check if a value does not exist in
    a sequence using the not in keyword. It shows True if the value is not located
    in the sequence, and False otherwise. For example:


    ```

    fruits = ["apple", "banana", "cherry"]

    print("orange" not in fruits)  # Output: True

    print("banana" not in fruits)  # Output: False

    ```


    In this code, "orange" not in fruits checks if the value "orange" does not exist
    in the list of fruits.'
