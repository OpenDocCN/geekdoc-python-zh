    queries against it or examine it via the DBMS''s list of databases.


    ### Taking a Database Away:


    - Get Everything Ready: Make sure nobody else is using the database and you have
    access privileges to disconnect it.

    - Database detachment can be accomplished with the use of DBMS administration
    tools or standard SQL commands. Simply identify the database that has to be detached
    by name. The database is deleted from the DBMS, but the corresponding data and
    schema files remain intact because of this action.

    - Make sure that the database was correctly detached by double-checking the DBMS''s
    database list. The DBMS will no longer recognize or make use of the detached database.


    Database attachment and detachment allow for greater versatility and ease of use
    when working with several databases or moving a database between environments.
