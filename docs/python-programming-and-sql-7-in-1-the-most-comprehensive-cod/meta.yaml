    \n你需要一个数据库来快速轻松地存储、检索和操作大量数据。作为一个数据仓库，它以表格形式存储信息，可靠且可扩展。\n\n数据库最基本的构建块是其**表**，它是一种使用行和列来清晰一致地显示信息的方式。每一行代表一个条目，有时称为记录，每一列（也称为字段）存储关于该条目的特定类型的信息。\n\
    \n用于与数据库交互和修改数据库的语言称为 **SQL**（结构化查询语言）。你可以使用它来存储、检索、编辑和删除信息。了解 SQL 至关重要，因为它提供了一种与数据库通信的标准化方式。\n\
    \n**查询**是发送到数据库以检索或修改特定信息的请求。基于 SQL 的查询允许你根据特定条件获取数据，排列和过滤记录，运行复杂计算等等。数据库主要通过用户查询进行交互。\n\
    \n**主键**的工作是唯一标识数据库中的每条记录，它确保每个条目都可以轻松找到，并提供了一个用于比较相关表的标准。主键极大地有助于数据完整性和快速数据检索。\n\
    \n**外键**是用于将两个表链接在一起的唯一标识符，外键是对另一个表的主键的引用。使用外键连接和获取不同表中的相关信息时，数据一致性和完整性得到极大提高。\n\
    \n**索引**是一种数据结构，可大大提高检索信息的速度。它为数据库引擎提供了一个参考点，使查找特定信息更容易。首先在经常访问的列上建立索引可以大大提高查询性能。\n\
    \n**连接**允许你通过匹配列值将来自多个表的记录合并为一个。你可以指定表之间的连接以从多个源检索信息。内连接最常见，其次是左连接、右连接和完全外连接。\n\
    \n**表中的数据**受约束定义的规则和限制，这些保障措施维护数据完整性并确保满足预定标准。常见的约束类型包括主键约束、唯一键约束、外键约束和检查约束。\n\
    \n**视图**是由一个或多个物理表构建的逻辑表。它为你提供了底层表中信息的专门视图。视图允许简化复杂查询、提高安全性和组织数据访问。\n\n恭喜你，你已经迈出了掌握\
