    \ was developed to facilitate the manipulation of tabular data.\n\nWhen working\
    \ with XML data that needs to be saved, queried, or altered inside of a relational\
    \ database, the relationship between XML and SQL comes into play. XML data can\
    \ be stored and queried with SQL extensions in several databases like Oracle,\
    \ SQL Server, and MySQL.\n\nWhat you can do with SQL:\n\n- The XML data type can\
