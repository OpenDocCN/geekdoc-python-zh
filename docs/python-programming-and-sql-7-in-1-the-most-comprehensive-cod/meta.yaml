    To further understand cross-tabulations, consider the following:


    Cross tabulations lay forth information in a grid format, with each row standing
    in for one variable and each column standing in for another. Data summaries (such
    as totals, averages, and percentages) can be found at the intersections of rows
    and columns.


    To generate a cross-tabulation, select the variables of interest and fill the
