    \n```\nfruits = [\"apple\", \"banana\", \"cherry\"]\nfor fruit in fruits:\n  \
    \  print(\"I love\", fruit)\n```\n\n在这段代码中，\"for\" 循环遍历 fruits 列表中的每个元素，并为每个元素执行循环内的代码块。\n\
    \n## 矩阵\n\n矩阵是一种具有两个维度的行列数据结构。网格、表格和数学矩阵都是这种表示法的常见应用对象。\n\n**创建矩阵：** 在 Python\
    \ 中，你可以使用嵌套列表来表示矩阵，其中每个内部列表代表矩阵的一行。例如：\n\n```\nmatrix = [[1, 2, 3],\n        \
    \  [4, 5, 6],\n          [7, 8, 9]]\n```\n\n在这段代码中，matrix 是一个 3x3 的矩阵，有三行三列。\n\
    \n**访问矩阵元素：** 你可以使用行和列的索引来访问矩阵的各个元素。行和列的索引都从 0 开始。例如：\n\n```\nmatrix = [[1, 2,\
    \ 3],\n          [4, 5, 6],\n          [7, 8, 9]]\nprint(matrix[0][1])  # Output:\
    \ 2\n```\n\n在这段代码中，matrix[0][1] 检索矩阵第一行（索引 0）和第二列（索引 1）的元素，即 2。\n\n**修改矩阵元素：**\
    \ 由于矩阵是用列表表示的，你可以使用索引和赋值来修改它们的元素。例如：\n\n```\nmatrix = [[1, 2, 3],\n          [4,\
    \ 5, 6],\n          [7, 8, 9]]\nmatrix[1][2] = 10\nprint(matrix)  # Output: [[1,\
    \ 2, 3], [4, 5, 10], [7, 8, 9]]\n```\n\n在这段代码中，矩阵第二行（索引 1）和第三列（索引 2）的元素通过赋值被更改为\
    \ 10。\n\n**矩阵操作：** 你可以对矩阵执行各种操作，例如加法、减法、乘法和转置。这些操作涉及逐元素执行或遵循特定的数学规则。例如：\n\n```\n\
    matrix1 = [[1, 2, 3],\n           [4, 5, 6]]\nmatrix2 = [[7, 8, 9],\n        \
    \   [10, 11, 12]]\nresult = [[0, 0, 0],\n          [0, 0, 0]]\nfor i in range(len(matrix1)):\n\
    \    for j in range(len(matrix1[0])):\n        result[i][j] = matrix1[i][j] +\
    \ matrix2[i][j]\nprint(result)  # Output: [[8, 10, 12], [14, 16, 18]]\n```\n\n\
    在这段代码中，两个矩阵 matrix1 和 matrix2 逐元素相加，结果存储在 result 矩阵中。\n\n## 字典\n\n字典是一种灵活的数据结构，用于以键值对的形式存储和检索信息。你可以用它们将值与特定的名称或数字关联起来。\n\
    \n**创建字典：** 你可以通过将键值对放在花括号 { } 中来创建一个字典。每个键值对由冒号 : 分隔。例如：\n\n```\nstudent = {\"\
    name\": \"John\", \"age\": 20, \"grade\": \"A\"}\n```\n\n在这段代码中，student 是一个包含三个键值对的字典：\"\
    name\" 映射到 \"John\"，\"age\" 映射到 20，\"grade\" 映射到 \"A\"。\n\n**访问字典值：** 你可以通过在方括号\
    \ [ ] 中使用键来访问字典中与特定键关联的值。例如：\n\n```\nstudent = {\"name\": \"John\", \"age\": 20,\
    \ \"grade\": \"A\"}\nprint(student[\"name\"])  # Output: \"John\"\n```\n\n在这段代码中，student[\"\
    name\"] 检索与键 \"name\" 关联的值，即 \"John\"。\n\n**修改字典值：** 字典是可变的，这意味着你可以修改与键关联的值。你可以为特定键分配新值，或向字典添加新的键值对。例如：\n\
    \n```\nstudent = {\"name\": \"John\", \"age\": 20, \"grade\": \"A\"}\nstudent[\"\
    age\"] = 21\nstudent[\"major\"] = \"Computer Science\"\nprint(student)  # Output:\
    \ {\"name\": \"John\", \"age\": 21, \"grade\": \"A\", \"major\": \"Computer Science\"\
    }\n```\n\n在这段代码中，与键 \"age\" 关联的值被更改为 21，并且一个新的键值对 \"major\" 映射到 \"Computer Science\"\
    \ 被添加到字典中。\n\n**字典操作：** 字典支持多种操作，例如：\n\n- 使用 len() 函数获取字典中键值对的数量。\n- 使用 in 关键字检查某个键是否存在于字典中。\n\
    - 使用 del 关键字从字典中移除一个键值对。\n\n```\nstudent = {\"name\": \"John\", \"age\": 20, \"\
    grade\": \"A\"}\nprint(len(student))        # Output: 3\nprint(\"age\" in student)\
    \    # Output: True\ndel student[\"grade\"]\nprint(student)             # Output:\
    \ {\"name\": \"John\", \"age\": 20}\n```\n\n**遍历字典：** 你可以使用 \"for\" 循环来遍历字典的键或键值对。例如：\n\
    \n```\nstudent = {\"name\": \"John\", \"age\": 20, \"grade\": \"A\"}\nfor key\
    \ in student:\n    print(key, \":\", student[key])\n```\n\n在这段代码中，\"for\" 循环遍历\
    \ student 字典的键，循环内的代码块打印每个键值对。\n\n## 猜数字\n\n在这个游戏中，程序将生成一个 1 到 100 之间的随机数。玩家的任务是在一定次数的尝试内猜出这个数字。\n\
    \n每次猜测后，程序将提供反馈，以帮助玩家缩小猜测范围。\n\n说明：\n\n1. 使用 random 模块生成一个 1 到 100 之间的随机数。\n2.\
    \ 要求玩家输入他们的第一次猜测。\n3. 将玩家的猜测与生成的数字进行比较：\n   a. 如果猜测正确，显示一条消息并结束游戏。\n   b. 如果猜测太高，显示一条消息表明它太高了。\n\
    \   c. 如果猜测太低，显示一条消息表明它太低了。\n4. 允许玩家进行多次猜测，直到他们猜对或达到指定的尝试次数。\n5. 每次猜测后提供反馈以指导玩家。\n\
    6. 在玩家猜对或达到最大尝试次数后结束游戏。\n7. 游戏结束后，询问玩家是否想再玩一次。\n\n提示：\n\n- 使用 random.randint()\
    \ 函数生成一个随机数。\n- 使用 while 循环允许玩家进行多次猜测。\n- 使用 if-elif-else 语句将玩家的猜测与生成的数字进行比较。"
