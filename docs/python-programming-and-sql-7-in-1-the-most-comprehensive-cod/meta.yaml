    \ pass\n```\n\n前面的代码片段展示了如何在`MyClass`类中创建一个名为`my_method`的方法。当在对象上调用方法时，该对象的实例（属于该类）被称为`self`参数。它允许方法读取和更改对象的属性。\n\
