    \ Me”按钮时，它将更改为显示从下拉列表中选中的人物的照片。\n\n创建此窗口的所有代码都可以使用我们在上一节中介绍过的代码以及你将在本章中查看的示例代码来创建。\n\
    \n在程序中使用图片时，如果它们与程序存储在同一文件夹中，会更容易处理。否则，你需要包含文件的完整目录位置，如下所示：\n\n```python\nlogo\
    \ = PhotoImage(file=\"c:\\Python34\\images\\logo.gif\")\n```\n\n如果你将图片与程序存储在同一文件夹中，你只需包含文件名，如下所示：\n\
    \n```python\nlogo = PhotoImage(file=\"logo.gif\")\n```\n\n**请注意：** Tkinter 仅支持使用\
    \ GIF 或 PGM/PPM 文件类型作为图像，不支持其他文件类型。如果可能，确保在开始创建程序之前，以合适的格式、合适的名称将图像保存在正确的位置，以使你的工作更简单。\n\
    \n## 示例代码\n\n```python\nwindow.wm_iconbitmap(\"MyIcon.ico\")\n```\n更改窗口标题中显示的图标。\n\
    \n```python\nwindow.configure(background = \"light green\")\n```\n更改窗口的背景颜色，此例中改为浅绿色。\n\
    \n```python\nlogo = PhotoImage(file = \"logo.gif\")\nlogoimage = Label(image =\
    \ logo)\nlogoimage.place(x = 30, y = 20, width = 200, height = 120)\n```\n在标签控件中显示一张图像。在程序运行期间，此图像不会改变。\n\
    \n```python\nphoto = PhotoImage(file = \"logo.gif\")\nphotobox = Label(window,\
    \ image = photo)\nphotobox.image = photo\nphotobox.place(x = 30, y = 20, width\
    \ = 200, height = 120)\n```\n这与上面的代码块类似，但因为我们希望在更新数据时图像也随之改变，所以需要添加代码 **photobox.image\
    \ = photo**，这使其可更新。\n\n```python\nselectName = StringVar(window)\nselectName.set(\"\
    Select Name\")\nnamesList = OptionMenu(window, selectName, \"Bob\", \"Sue\", \"\
    Tim\")\nnamesList.place(x = 30, y = 250)\n```\n创建一个名为 **selectName** 的变量，它将存储一个字符串，该变量的初始值为“Select\
    \ Name”。然后它将创建一个下拉选项菜单，将用户选择的值存储在 selectName 变量中，并显示列表中的值：Bob、Sue 和 Tim。\n\n```python\n\
    def clicked():\n    sel = selectName.get()\n    mesg = \"Hello \" + sel\n    mlabel[\"\
    text\"] = mesg\n    if sel == \"Bob\":\n        photo = PhotoImage(file = \"Bob.gif\"\
    )\n        photobox.image = photo\n    elif sel == \"Sue\":\n        photo = PhotoImage(file\
    \ = \"Sue.gif\")\n        photobox.image = photo\n    elif sel == \"Tim\":\n \
    \       photo = PhotoImage(file = \"Tim.gif\")\n        photobox.image = photo\n\
    \    else:\n        photo = PhotoImage(file = \"logo.gif\")\n        photobox.image\
    \ = photo\n    photobox[\"image\"] = photo\n    photobox.update()\n```\n\n在这个示例中，当按钮被点击时，它将运行“clicked”子程序。这将从\
    \ selectName 变量获取值，并创建一个将在标签中显示的消息。然后它将检查选择了哪个选项，并将图片更改为正确的图像（存储在 photo 变量中）。如果没有选择名字，它将只显示Logo。"
