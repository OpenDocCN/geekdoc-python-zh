  md: '# 2D Lists and Dictionaries


    # Explanation


    Technically it is possible to create a two-dimensional array in Python, but as
    Python arrays are limited to storing numbers and most Python programmers feel
    more comfortable with working with lists, 2D arrays are rarely used and **2D lists**
    are far more common.


    Imagine, for one terrifying moment, you are a teacher. Scary I know! Also imagine
    you have four students and you teach those same students across three different
    subjects. You may, if you are a conscientious teacher, need to keep records of
    those students'' grades for each of their subjects. It is possible to create a
    simple chart on paper to do this as follows:


    ![](img/aa0de6941c73766c7e64e4280511b158_80_0.png)


    ![](img/aa0de6941c73766c7e64e4280511b158_80_1.png)


    | | Maths | English | French |

    |---|---|---|---|

    | Susan | 45 | 37 | 54 |

    | Peter | 62 | 58 | 59 |

    | Mark | 49 | 47 | 60 |

    | Andy | 78 | 83 | 62 |'
