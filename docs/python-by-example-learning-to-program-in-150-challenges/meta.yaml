    # Example Code


    ```

    fruit_tuple = ("apple", "banana", "strawberry", "orange")

    Creates a variable name called "fruit_tuple" which stores four pieces of fruit
    within it. The round brackets define this group as a tuple and therefore the contents
    of this collection of data cannot be altered while the program is running.

    ```


    ```

    print(fruit_tuple.index("strawberry"))

    Displays the index (i.e. the numeric key) of the item "strawberry". In this example
    it will return the number 2 as Python starts counting the items from 0, not 1.

    ```


    ```

    print(fruit_tuple[2])

    Displays item 2 from "fruit_tuple", in this case "strawberry".

    ```


    ```

    names_list = ["John", "Tim", "Sam"]

    Creates a list of the names and stores them in the variable "names_list". The
    square brackets define this group of data as a list and therefore the contents
    can be altered while the program is running.

    ```


    ```

    del names_list[1]

    Deletes item 1 from "names_list". Remember it starts counting from 0 and not 1.
    In this case it will delete "Tim" from the list.

    ```


    ```

    names_list.append(input("Add a name: "))

    Asks the user to enter a name and will add that to the end of "names_list".

    ```


    ```

    names_list.sort()

    Sorts name_list into alphabetical order and saves the list in the new order. This
    does not work if the list is storing data of different types, such as strings
    and numeric data in the same list.

    ```


    ```

    print(sorted(names_list))

    Displays names_list in alphabetical order but does not change the order of the
    original list, which is still saved in the original order. This does not work
    if the list is storing data of different types, such as strings and numeric data
    in the same list.

    ```


    ```

    colours = {1:"red", 2:"blue", 3:"green"}

    Creates a dictionary called "colours", where each item is assigned an index of
    your choosing. The first item in each block is the index, separated by a colon
    and then the colour.

    ```


    ```

    colours[2] = "yellow"

    Makes a change to the data stored in position 2 of the colours dictionary. In
    this case it will change "blue" to "yellow".

    ```'
