    ## What Next?


    ![](img/aa0de6941c73766c7e64e4280511b158_170_0.png)


    If you have worked through all the examples in this book you should have a good
    understanding of the basics of programming with Python. You will have become familiar
    with the syntax of the language and started to think like a programmer by breaking
    down larger problems into small, manageable chunks you know how to solve. You
    should look back on all you have learnt and can justifiably feel a smirk of satisfaction
    at what you have achieved. Learning to program takes dedication and you have shown
    you can persevere, and you now have the basic skills to continue on your journey
    into Python.


    The skills you have learnt in this book will allow you to create powerful programs,
    but now is not the time to sit back and relax. You need to go out into the big
    programming world and find out how other programmers work. Search the internet,
    find new challenges. As you explore you will see code that is unfamiliar to you
    as there are several variations that can be used. For instance, with Tkinter there
    is another method called "pack" which many programmers prefer. It allows you to
    use a grid method for designing your screens but does not allow you to fine-tune
    the position of an object the way the place method we have been using allows.
    Try it out, you may prefer it, but do be careful as some techniques do not work
    well with others. If you want to use the pack method then please don''t try to
    mix it with the place method in the same program. Python doesn''t like working
    with two different systems simultaneously and will crash.


    ![](img/aa0de6941c73766c7e64e4280511b158_170_1.png)


    The best way to learn more advanced programming techniques is to try them out.
    Look at other people''s code and visit some chat forums. Programmers are very
    helpful and as long as you are not asking a question that has already been answered
    on the forum they are generally willing to help you out. If you are stuck on a
    piece of code, then ask for help in a forum; programmers like nothing more than
    to solve a problem. You may not necessarily agree with their solution, it may
    not be the method you are looking to use, but it will give you an idea of how
    to look at it with fresh eyes and can show you a route to a possible solution
    you had not considered before.


    ![](img/aa0de6941c73766c7e64e4280511b158_170_2.png)


    Whether you feel satisfied with your knowledge or want to explore further, I hope
    you have enjoyed your venture into programming and this book has proved useful.


    ## Glossary


    | Term | Description |

    |------|-------------|

    | 2D list | Creates a multi-dimensional list. For instance, to create the following
    table of data: 0 1 2 0 23 16 34 1 45 29 48 enter the following code: `number_list
    = [[23,16,34],[45,29,48]]` |

    | addition | Adds two values together if they are numbers `total = num1 + num2`
    or joins them if they contain text (see concatenation). `name = firstname + surname`
    |

    | and | Used to specify that both conditions must be met to return a true value.
    `if num > 10 and num < 20: print("In range") else: print("Out of range")` |

    | append | Adds a single item to the end of a list, tuple, dictionary, string
    or an array. `names_list.append("Timothy")` |

    | append to a file | Opens an existing text or .csv file and allows data to be
    added to the end of the existing contents. `file = open("Countries.txt", "a")
    file.write("France\n") file.close` See also write to a file, write to non-existing
    file, read a file |

    | argument | A value passed to a subprogram. In this example UserAns is the argument
    and would have been defined outside of the subprogram. `def CheckAnswer(UserAns):
    if UserAns == 20: print("Correct") else: print("Wrong")` |

    | array | In Python arrays are similar to lists but they are only used to store
    numbers. The user defines the specific number type, i.e. integer, long, double
    or floating-point. `nums = array(''i'',[45,324,654,45,264]) print(nums)` If the
    array needs to store strings a list is required. |

    | blob | A data type that is stored exactly as it was input. See SQL and database.
    |

    | button | Used in a GUI with Tkinter. The code below creates a button that will
    run the subprogram "click". <br> `button1 = Button(text = "Click here", command
    = click)` <br> See Tkinter. |

    | capitalize | Changes the case so the first letter is uppercase and all other
    letters are lower case. <br> `print(name.capitalize())` |

    | choice | Selects a random choice from a list of options. <br> `selection = random.choice([''a'',''b'',''c''])`
    |

    | comma-separated values | A common textual representation for tables in which
    the values in each row are separated by commas. See csv. |

    | comments | Used to explain how a program works or to block out pieces of code
    for testing other sections. Starts with the # symbol. <br> `if salary > 50000:
    #This is a comment` <br> `    print("Too high")` <br> `#This is another comment`
    |

    | compiler | Translates a program written in a high-level language such as Python
    into a low-level language such as machine code. |

    | concatenation | Joins two strings together to form one string (see addition).
    <br> `name = firstname + surname` |

    | conditional statement | Statement used to test out a condition. Commonly used
    in if statements, while and for loops. <br> `if guess == num:` |

    | count | Counts the number of times a piece of data appears in a list, tuple,
    dictionary, string or an array. <br> `print(names_list.count("Sue"))` |

    | csv | A file type, similar to a spreadsheet or database, where data is stored
    in rows and columns. See comma-separated values. |

    | curly brackets | Defines the values inside a dictionary. <br> `scores = {"Tim":20,"Sue":35,"Bob":29}`
    |

    | database | A structured set of data. The data is held in tables and these are
    made up of fields and records. See SQL, tables, fields and records. |

    | debugging | The process of finding and removing programming errors. |

    | decimal point | See floating-point number. |

    | def | Defines a subprogram. <br> `def menu():` <br> `    print("1) Open")` <br>
    `    print("2) Close")` <br> `    selection = int(input("Selection: "))` |

    | defining a subprogram | Creates a subprogram so that it can be used in other
    parts of the program. See def. |

    | del | Deletes an item from a list. For example: <br> `del names_list[2]` <br>
    Deletes item 2 from the "names_list". |

    | dictionary | A type of list in which user-defined indexes are mapped to values.
    <br> `scores = {"Tim":20,"Sue":35,"Bob":29}` |

    | division | Divides one value by another and displays the answer as a floating-point
    number. <br> `>>> 5/2` <br> `2.5` |'
