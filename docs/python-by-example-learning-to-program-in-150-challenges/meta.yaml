  - "[PAGE 111]\n\n# # Tkinter GUI\n\n# ## Graphical User Interface\n\n# ## Explanation\n\
    \nA GUI (graphical user interface) makes the program easier to use. It allows\
    \ you, as the programmer, to create screens, text boxes and buttons to help the\
    \ user navigate through the program in a more user-friendly way. **Tkinter** is\
    \ a library of features in Python that allows you to do this.\n\nLook at the code\
    \ below and in particular the measurements that are used in the **window.geometry**\
    \ and **button.place** lines.\n\n```\nfrom tkinter import *\n\ndef Call():\n \
    \   msg = Label(window, text = \"You pressed the button\")\n    msg.place(x =\
    \ 30, y = 50)\n    button[\"bg\"] = \"blue\"\n    button[\"fg\"] = \"white\"\n\
    \nwindow = Tk()\nwindow.geometry(\"200x110\")\nbutton = Button(text = \"Press\
    \ me\", command = Call)\nbutton.place(x = 30, y = 20, width=120, height=25)\n\
    window.mainloop()\n```\n\nNow look at the window that this code will produce:\n\
    \n![](img/aa0de6941c73766c7e64e4280511b158_111_0.png)\n\n![](img/aa0de6941c73766c7e64e4280511b158_111_1.png)\n\
    \nThe **geometry** line in the code determines the size of the window and the\
    \ **place** line in the code determines the position of the individual item on\
    \ the window."
