    \n## Explanation\n\nIt is all very well being able to define a list, make changes\
    \ and add new data, but if the next time the program is run it returns to the\
    \ original data and your changes are lost then it is not a lot of use. Therefore,\
    \ it is sometimes necessary to save data outside of the program and this way the\
    \ data can be stored, along with any changes that are made.\n\nThe easiest place\
    \ to start learning about writing and reading from an external file is with a\
    \ **text** file.\n\nWhen opening an external file you must specify how that file\
    \ will be used within the program. The options are below.\n\n| Code | Description\
    \ |\n| :--- | :--- |\n| **w** | **Write mode:** used to create a new file. Any\
    \ existing files with the same name will be erased and a new one created in its\
    \ place. |\n| **r** | **Read mode:** used when an existing file is only being\
    \ read and not being written to. |\n| **a** | **Append mode:** used to add new\
    \ data to the end of the file. |\n\nText files are only used to write, read and\
    \ append data. By the very nature of how they work it is not easy to remove or\
    \ alter individual elements of data once it is written to the file, unless you\
    \ want to overwrite the entire file or create a new file to store the new data.\
    \ If you want to be able to alter the individual elements once the file has been\
    \ created it is better to use a .csv file (see page 91) or an SQL database (see\
    \ page 134).\n\n## Example Code\n\n```\nfile = open(\"Countries.txt\", \"w\")\n\
    file.write(\"Italy\\n\")\nfile.write(\"Germany\\n\")\nfile.write(\"Spain\\n\"\
    )\nfile.close()\n```\n\nCreates a file called \"Countries.txt\". If one already\
    \ exists then it will be overwritten with a new blank file. It will add three\
    \ lines of data to the file (the \\n forces a new line after each entry). It will\
    \ then close the file, allowing the changes to the text file to be saved.\n\n\
    ```\nfile = open(\"Countries.txt\", \"r\")\nprint(file.read())\n```\n\nThis will\
    \ open the Countries.txt file in \"read\" mode and display the entire file.\n\n\
    ```\nfile = open(\"Countries.txt\", \"a\")\nfile.write(\"France\\n\")\nfile.close()\n\
    ```\n\nThis will open the Countries.txt file in \"append\" mode, add another line\
    \ and then close the file. If the **file.close()** line is not included, the changes\
    \ will not be saved to the text file.\n\n![](img/aa0de6941c73766c7e64e4280511b158_88_0.png)\n\
    \n![](img/aa0de6941c73766c7e64e4280511b158_88_1.png)\n\n![](img/aa0de6941c73766c7e64e4280511b158_88_2.png)\n\
