  md: "# 138 Challenges 139 - 145: SQLite\n\n```\ncursor.execute(\"SELECT * FROM employees\"\
    )\nfor x in cursor.fetchall():\n    print(x)\nDisplays all the data from the employees\
    \ table and displays each record on a separate line.\n```\n\n```\ncursor.execute(\"\
    SELECT * FROM employees ORDER BY name\")\nfor x in cursor.fetchall():\n    print(x)\n\
    Selects all the data from the employees table, sorted by name, and displays each\
    \ record on a separate line.\n```\n\n```\ncursor.execute(\"SELECT * FROM employees\
    \ WHERE salary>20000\")\nSelects all the data from the employees table where the\
    \ salary is over 20,000.\n```\n\n```\ncursor.execute(\"SELECT * FROM employees\
    \ WHERE dept='Sales'\")\nSelects all the data from the employees table where the\
    \ department is \"Sales\".\n```\n\n```\ncursor.execute(\"\"\"SELECT employees.id,employees.name,dept.manager\n\
    FROM employees,dept WHERE employees.dept=dept.dept\nAND employees.salary >20000\"\
    \"\")\nSelects the ID and name fields from the employees table and the manager\
    \ field from the department table if the salary is over 20,000.\n```\n\n```\n\
    cursor.execute(\"SELECT id,name,salary FROM employees\")\nSelects the ID, name\
    \ and salary fields from the employees table.\n```\n\n![](img/aa0de6941c73766c7e64e4280511b158_139_0.png)"
