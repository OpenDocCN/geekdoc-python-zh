  md: "# Example Code\n\n```\nimport sqlite3\n```\n\nThis must be the first line of\
    \ the program to allow Python to use the SQLite3 library.\n\n```\nwith sqlite3.connect(\"\
    company.db\") as db:\n    cursor=db.cursor()\n```\n\nConnects to the company database.\
    \ If no such database exists, it will create one. The file will be stored in the\
    \ same folder as the program.\n\n```\ncursor.execute(\"\"\"CREATE TABLE IF NOT\
    \ EXISTS employees(\n    id integer PRIMARY KEY,\n    name text NOT NULL,\n  \
    \  dept text NOT NULL,\n    salary integer);\"\"\")\n```\n\nCreates a table called\
    \ employees which has four fields (id, name, dept and salary). It specifies the\
    \ data type for each field, defines which field is the primary key and which fields\
    \ cannot be left blank. The triple speech marks allow the code to be split over\
    \ several lines to make it easier to read rather than having it all displayed\
    \ in one line.\n\n```\ncursor.execute(\"\"\"INSERT INTO employees(id,name,dept,salary)\n\
    \    VALUES(\"1\",\"Bob\",\"Sales\",\"25000\")\"\"\")\ndb.commit()\n```\n\nInserts\
    \ data into the employees table. The `db.commit()` line saves the changes.\n\n\
    ```\nnewID = input(\"Enter ID number: \")\nnewname = input(\"Enter name: \")\n\
    newDept = input(\"Enter department: \")\nnewSalary = input(\"Enter salary: \"\
    )\ncursor.execute(\"\"\"INSERT INTO employees(id,name,dept,salary)\n    VALUES(?,?,?,?)\"\
    \"\", (newID,newName,newDept,newSalary))\ndb.commit()\n```\n\nAllows a user to\
    \ enter new data which is then inserted into the table.\n\n```\ncursor.execute(\"\
    SELECT * FROM employees\")\nprint(cursor.fetchall())\n```\n\nDisplays all the\
    \ data from the employees table.\n\n```\ndb.close()\n```\n\nThis must be the last\
    \ line in the program to close the database.\n\n![](img/aa0de6941c73766c7e64e4280511b158_138_0.png)"
