  md: "# # Turtle Graphics\n\n# ## Explanation\n\nIt is possible to draw using a **turtle**\
    \ in Python. By typing in commands and using loops, you can create intricate patterns.\
    \ Here is how it works.\n\nA turtle will travel along a path that you define,\
    \ leaving a pen mark behind it. As you control the turtle, the pattern that is\
    \ left is revealed. To draw the pentagon shown below you would type in the following\
    \ code.\n\n![](img/aa0de6941c73766c7e64e4280511b158_52_0.png)\n\n```\npython\n\
    import turtle\n\nturtle.shape(\"turtle\")\n\nfor i in range(0,5):\n    turtle.forward(100)\n\
    \    turtle.right(72)\n\nturtle.exitonclick()\n```\n\nBy combining these simple\
    \ shapes and using **nested** loops (i.e. loops inside other loops) it is possible\
    \ to create beautiful patterns very easily.\n\n![](img/aa0de6941c73766c7e64e4280511b158_52_1.png)\n\
    \n```\npython\nimport turtle\n\nfor i in range(0,10):\n    turtle.right(36)\n\
    \    for i in range(0,5):\n        turtle.forward(100)\n        turtle.right(72)\n\
    \nturtle.exitonclick()\n```\n\nIn the above pattern, one pentagon has been repeatedly\
    \ drawn 10 times, rotating 36 degrees around a central point. **Please note:**\
    \ we have highlighted one of the pentagons to help you identify it within the\
    \ pattern, but it would not usually be highlighted."
