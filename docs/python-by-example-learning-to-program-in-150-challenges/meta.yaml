- md: "# SQLite\n\n![](img/aa0de6941c73766c7e64e4280511b158_135_0.png)\n\n# Explanation\n\
    \nSQL stands for \"Structured Query Language\" and is the main language that the\
    \ large database packages use. SQLite is free software that can be used as an\
    \ SQL database. You can download the latest version of the software from www.sqlite.org.\n\
    \n![](img/aa0de6941c73766c7e64e4280511b158_135_1.png)\n\nFrom the download page\
    \ you need to select one of the \"Precompiled Binaries\" options for either Mac\
    \ OS or Windows that includes the \"command-line-shell\".\n\n![](img/aa0de6941c73766c7e64e4280511b158_135_2.png)\n\
    \nTo use SQL you need to load the \"DB Browser for SQLite\" which you can download\
    \ from https://sqlitebrowser.org.\n\n![](img/aa0de6941c73766c7e64e4280511b158_135_3.png)\n\
    \n![](img/aa0de6941c73766c7e64e4280511b158_135_4.png)\n\n# Understanding a Relational\
    \ Database\n\nWe will use the example of a small manufacturing company that stores\
    \ the details of their employees in an **SQL** database.\n\nBelow is an example\
    \ of the Employees table, which contains the details of all the employees in the\
    \ company. The contents of a table can be viewed by clicking on the Browse Data\
    \ tab.\n\n| ID | Name | Dept | Salary |\n|---|---|---|---|\n| 1 | Bob | Sales\
    \ | 25000 |\n| 2 | Sue | IT | 28500 |\n| 3 | Tim | Sales | 25000 |\n| 4 | Anne\
    \ | Admin | 18500 |\n| 5 | Paul | IT | 28500 |\n| 6 | Simon | Sales | 22000 |\n\
    | 7 | Karen | Manufacturing | 18500 |\n| 8 | Mark | Manufacturing | 19000 |\n\
    | 9 | George | Manufacturing | 18500 |\n| 10 | Keith | Manufacturing | 15000 |\n\
    \n![](img/aa0de6941c73766c7e64e4280511b158_136_0.png)\n\nIt has four fields (ID,\
    \ Name, Dept and Salary) and 10 records in it (one for each employee). Take a\
    \ look at the employees list and you will notice that more than one employee is\
    \ listed in the same department. In most databases you would find repetitive data\
    \ such as this. To make the database work more efficiently the repeated data are\
    \ often stored in a separate table. In this case there is a department table which\
    \ would store all the information about each department to save having to repeat\
    \ all the department details for each employee.\n\n# L36 Challenges 139 - 145:\
    \ SQLite\n\n| Dept | Manager |\n|---|---|\n| Manufacturing | Kenith |\n| Sales\
    \ | James |\n| IT | Connor |\n| Admin | Sally |\n\nHere we can see the Departments\
    \ table holding the details about each department. We have simplified it and only\
    \ include one piece of data for each department (in this case the manager's name)\
    \ but it will still save having to input the manager's name on every record, which\
    \ we would have to do if the data were all being saved in one large table.\n\n\
    By splitting the data into two tables like this, if we need to update the manager\
    \ it only needs to be updated in one place rather than updating it several times,\
    \ which we would need to do if it was all stored in a single table.\n\nThis is\
    \ known as a **one-to-many** relationship as one department can have many employees\
    \ in it.\n\nA **primary key** is the field (usually the first one) in each table\
    \ that stores the unique identifier for that record. Therefore, in the Employees\
    \ table the primary key will be the ID column and in the Department table the\
    \ primary key will be Dept.\n\nWhen creating a table, you need to identify the\
    \ following for each field:\n\n- the name of the field (field names cannot contain\
    \ spaces and must follow the same rules as variable names);\n- if it is a primary\
    \ key;\n- the data type for that field.\n\nThe data types you can use are as follows:\n\
    \n- **integer**: the value is an integer value;\n- **real**: the value is a floating-point\
    \ value;\n- **text**: the value is a text string;\n- **blob**: the value is stored\
    \ exactly as it was input.\n\nYou can also specify if the field cannot be left\
    \ blank by adding **NOT NULL** to the end of the field when you create it.\n\n\
    # Example Code\n\n```\nimport sqlite3\n```\n\nThis must be the first line of the\
    \ program to allow Python to use the SQLite3 library.\n\n```\nwith sqlite3.connect(\"\
    company.db\") as db:\n    cursor=db.cursor()\n```\n\nConnects to the company database.\
    \ If no such database exists, it will create one. The file will be stored in the\
    \ same folder as the program.\n\n```\ncursor.execute(\"\"\"CREATE TABLE IF NOT\
    \ EXISTS employees(\n    id integer PRIMARY KEY,\n    name text NOT NULL,\n  \
    \  dept text NOT NULL,\n    salary integer);\"\"\")\n```\n\nCreates a table called\
    \ employees which has four fields (id, name, dept and salary). It specifies the\
    \ data type for each field, defines which field is the primary key and which fields\
    \ cannot be left blank. The triple speech marks allow the code to be split over\
    \ several lines to make it easier to read rather than having it all displayed\
    \ in one line.\n\n```\ncursor.execute(\"\"\"INSERT INTO employees(id,name,dept,salary)\n\
    \    VALUES(\"1\",\"Bob\",\"Sales\",\"25000\")\"\"\")\ndb.commit()\n```\n\nInserts\
    \ data into the employees table. The `db.commit()` line saves the changes.\n\n\
    ```\nnewID = input(\"Enter ID number: \")\nnewname = input(\"Enter name: \")\n\
    newDept = input(\"Enter department: \")\nnewSalary = input(\"Enter salary: \"\
    )\ncursor.execute(\"\"\"INSERT INTO employees(id,name,dept,salary)\n    VALUES(?,?,?,?)\"\
    \"\", (newID,newName,newDept,newSalary))\ndb.commit()\n```\n\nAllows a user to\
    \ enter new data which is then inserted into the table.\n\n```\ncursor.execute(\"\
    SELECT * FROM employees\")\nprint(cursor.fetchall())\n```\n\nDisplays all the\
    \ data from the employees table.\n\n```\ndb.close()\n```\n\nThis must be the last\
    \ line in the program to close the database.\n\n![](img/aa0de6941c73766c7e64e4280511b158_138_0.png)\n\
    \n# 138 Challenges 139 - 145: SQLite\n\n```\ncursor.execute(\"SELECT * FROM employees\"\
    )\nfor x in cursor.fetchall():\n    print(x)\n```\n\nDisplays all the data from\
    \ the employees table and displays each record on a separate line.\n\n```\ncursor.execute(\"\
    SELECT * FROM employees ORDER BY name\")\nfor x in cursor.fetchall():\n    print(x)\n\
    ```\n\nSelects all the data from the employees table, sorted by name, and displays\
    \ each record on a separate line.\n\n```\ncursor.execute(\"SELECT * FROM employees\
    \ WHERE salary>20000\")\n```\n\nSelects all the data from the employees table\
    \ where the salary is over 20,000.\n\n```\ncursor.execute(\"SELECT * FROM employees\
    \ WHERE dept='Sales'\")\n```\n\nSelects all the data from the employees table\
    \ where the department is \"Sales\".\n\n```\ncursor.execute(\"\"\"SELECT employees.id,employees.name,dept.manager\n\
    FROM employees,dept WHERE employees.dept=dept.dept\nAND employees.salary >20000\"\
    \"\")\n```\n\nSelects the ID and name fields from the employees table and the\
    \ manager field from the department table if the salary is over 20,000.\n\n```\n\
    cursor.execute(\"SELECT id,name,salary FROM employees\")\n```\n\nSelects the ID,\
    \ name and salary fields from the employees table.\n\n![](img/aa0de6941c73766c7e64e4280511b158_139_0.png)\n\
    \n```\nwhichDept = input(\"Enter a department: \")\ncursor.execute(\"SELECT *\
    \ FROM employees WHERE dept=?\",[whichDept])\nfor x in cursor.fetchall():\n  \
    \  print(x)\n```\n\nAllows the user to type in a department and displays the records\
    \ of all the employees in that department.\n\n```\ncursor.execute(\"\"\"SELECT\
    \ employees.id,employees.name,dept.manager\nFROM employees,dept WHERE employees.dept=dept.dept\"\
    \"\")\n```\n\nSelects the ID and name fields from the employees table and the\
    \ manager field from the department table, using the dept fields to link the data.\
    \ If you do not specify how the tables are linked, Python will assume every employee\
    \ works in every department and you will not get the results you are expecting.\n\
    \n```\ncursor.execute(\"UPDATE employees SET name = 'Tony' WHERE id=1\")\ndb.commit()\n\
    ```\n\nUpdates the data in the table (overwriting the original data) to change\
    \ the name to \"Tony\" for employee ID 1.\n\n```\ncursor.execute(\"DELETE employees\
    \ WHERE id=1\")\n```\n\n![](img/aa0de6941c73766c7e64e4280511b158_140_0.png)\n\n\
    # Challenges\n\n## 139\n\nCreate an SQL database called PhoneBook that contains\
    \ a table called Names with the following data:\n\n| ID | First Name | Surname\
    \ | Phone Number |\n|---|---|---|---|\n| 1 | Simon | Howells | 01223 349752 |\n\
    | 2 | Karen | Phillips | 01954 295773 |\n| 3 | Darren | Smith | 01583 749012 |\n\
    | 4 | Anne | Jones | 01323 567322 |\n| 5 | Mark | Smith | 01223 855534 |\n\n##\
    \ 140\n\nUsing the PhoneBook database from program 139, write a program that will\
    \ display the following menu.\n\nMain Menu\n1) View phone book\n2) Add to phone\
    \ book\n3) Search for surname\n4) Delete person from phone book\n5) Quit\nEnter\
    \ your selection:\n\nIf the user selects 1, they should be able to view the entire\
    \ phonebook. If they select 2, it should allow them to add a new person to the\
    \ phonebook. If they select 3, it should ask them for a surname and then display\
    \ only the records of people with the same surname. If they select 4, it should\
    \ ask for an ID and then delete that record from the table. If they select 5,\
    \ it should end the program. Finally, it should display a suitable message if\
    \ they enter an incorrect selection from the menu. They should return to the menu\
    \ after each action, until they select 5.\n\n## 141\n\nCreate a new SQL database\
    \ called BookInfo that will store a list of authors and the books they wrote.\
    \ It will have two tables. The first one should be called Authors and contain\
    \ the following data:\n\n| Name | Place of Birth |\n|---|---|\n| Agatha Christie\
    \ | Torquay |\n| Cecelia Ahern | Dublin |\n| J.K. Rowling | Bristol |\n| Oscar\
    \ Wilde | Dublin |\n\nThe second should be called Books and contain the following\
    \ data:\n\n| ID | Title | Author | Date Published |\n|---|---|---|---|\n| 1 |\
    \ De Profundis | Oscar Wilde | 1905 |\n| 2 | Harry Potter and the chamber of secrets\
    \ | J.K. Rowling | 1998 |\n| 3 | Harry Potter and the prisoner of Azkaban | J.K.\
    \ Rowling | 1999 |\n| 4 | Lyrebird | Cecelia Ahern | 2017 |\n| 5 | Murder on the\
    \ Orient Express | Agatha Christie | 1934 |\n| 6 | P.S. I Love You | Cecelia Ahern\
    \ | 2003 |\n| 7 | The marble collector | Cecelia Ahern | 2016 |\n| 8 | The murder\
    \ on the links | Agatha Christie | 1923 |\n| 9 | The picture of Dorian Gray |\
    \ Oscar Wilde | 1890 |\n| 10 | The secret adversary | Agatha Christie | 1922 |\n\
    | 11 | The seven dials mystery | Agatha Christie | 1929 |\n| 12 | The year I met\
    \ you | Cecelia Ahern | 2014 |\n\n## 142\n\nUsing the BookInfo database from program\
    \ 141, display the list of authors and their place of birth. Ask the user to enter\
    \ a place of birth and then show the title, date published and author's name for\
    \ all the books by authors who were born in the location they selected.\n\n![](img/aa0de6941c73766c7e64e4280511b158_141_0.png)\n\
    \n## 143\n\nUsing the BookInfo database, ask the user to enter a year and display\
    \ all the books published after that year, sorted by the year they were published."
  mdcn: "# SQLite\n\n![](img/aa0de6941c73766c7e64e4280511b158_135_0.png)\n\n# 解释\n\
    \nSQL 代表“结构化查询语言”，是主要的大型数据库包所使用的语言。SQLite 是一个免费的软件，可用作 SQL 数据库。你可以从 www.sqlite.org\
    \ 下载该软件的最新版本。\n\n![](img/aa0de6941c73766c7e64e4280511b158_135_1.png)\n\n从下载页面，你需要选择适用于\
    \ Mac OS 或 Windows 的“预编译二进制文件”选项之一，该选项需包含“命令行 shell”。\n\n![](img/aa0de6941c73766c7e64e4280511b158_135_2.png)\n\
    \n要使用 SQL，你需要加载“DB Browser for SQLite”，可以从 https://sqlitebrowser.org 下载。\n\n![](img/aa0de6941c73766c7e64e4280511b158_135_3.png)\n\
    \n![](img/aa0de6941c73766c7e64e4280511b158_135_4.png)\n\n# 理解关系型数据库\n\n我们将以一个小型制造公司为例，该公司将其员工详情存储在一个\
    \ **SQL** 数据库中。\n\n下面是员工表的一个示例，其中包含公司所有员工的详细信息。通过单击“浏览数据”选项卡可以查看表的内容。\n\n| ID\
    \ | 姓名 | 部门 | 薪水 |\n|---|---|---|---|\n| 1 | Bob | Sales | 25000 |\n| 2 | Sue\
    \ | IT | 28500 |\n| 3 | Tim | Sales | 25000 |\n| 4 | Anne | Admin | 18500 |\n\
    | 5 | Paul | IT | 28500 |\n| 6 | Simon | Sales | 22000 |\n| 7 | Karen | Manufacturing\
    \ | 18500 |\n| 8 | Mark | Manufacturing | 19000 |\n| 9 | George | Manufacturing\
    \ | 18500 |\n| 10 | Keith | Manufacturing | 15000 |\n\n![](img/aa0de6941c73766c7e64e4280511b158_136_0.png)\n\
    \n该表有四个字段（ID、姓名、部门和薪水）以及 10 条记录（每个员工一条）。查看员工列表，你会发现同一部门中列出了多名员工。在大多数数据库中，你会找到此类重复数据。为了使数据库更高效地工作，重复的数据通常存储在单独的表中。在这种情况下，有一个部门表，用于存储每个部门的所有信息，以避免为每个员工重复所有部门详情。\n\
    \n# L36 挑战 139 - 145：SQLite\n\n| 部门 | 经理 |\n|---|---|\n| Manufacturing | Kenith\
    \ |\n| Sales | James |\n| IT | Connor |\n| Admin | Sally |\n\n这里我们可以看到包含每个部门详细信息的部门表。我们对其进行了简化，仅包含每个部门的一项数据（在这种情况下是经理的姓名），但这仍然可以节省为每条记录输入经理姓名的麻烦，如果数据全部保存在一个大表中，我们就必须这样做。\n\
    \n通过像这样将数据分成两个表，如果我们需要更新经理，只需要在一个地方更新，而不是更新多次，如果所有数据都存储在一个表中，我们就需要更新多次。\n\n这被称为\
    \ **一对多** 关系，因为一个部门可以有多个员工。\n\n**主键** 是每个表中存储该记录唯一标识符的字段（通常是第一个字段）。因此，在员工表中，主键将是\
    \ ID 列，而在部门表中，主键将是部门（Dept）。\n\n创建表时，你需要为每个字段确定以下内容：\n\n-   字段的名称（字段名不能包含空格，并且必须遵循与变量名相同的规则）；\n\
    -   是否为主键；\n-   该字段的数据类型。\n\n你可以使用的数据类型如下：\n\n-   **整数**：值为整数值；\n-   **实数**：值为浮点值；\n\
    -   **文本**：值为文本字符串；\n-   **二进制大对象**：值按输入原样存储。\n\n你还可以通过在创建字段时在其末尾添加 **NOT NULL**\
    \ 来指定该字段不能为空。\n\n# 示例代码\n\n```\nimport sqlite3\n```\n\n这必须是程序的第一行，以便允许 Python\
    \ 使用 SQLite3 库。\n\n```\nwith sqlite3.connect(\"company.db\") as db:\n    cursor=db.cursor()\n\
    ```\n\n连接到公司数据库。如果不存在这样的数据库，它将创建一个。该文件将存储在与程序相同的文件夹中。\n\n```\ncursor.execute(\"\
    \"\"CREATE TABLE IF NOT EXISTS employees(\n    id integer PRIMARY KEY,\n    name\
    \ text NOT NULL,\n    dept text NOT NULL,\n    salary integer);\"\"\")\n```\n\n\
    创建一个名为 employees 的表，该表有四个字段（id、name、dept 和 salary）。它指定了每个字段的数据类型，定义了哪个字段是主键以及哪些字段不能为空。三引号允许将代码分成多行以使其更易于阅读，而不是全部显示在一行中。\n\
    \n```\ncursor.execute(\"\"\"INSERT INTO employees(id,name,dept,salary)\n    VALUES(\"\
    1\",\"Bob\",\"Sales\",\"25000\")\"\"\")\ndb.commit()\n```\n\n向 employees 表插入数据。`db.commit()`\
    \ 这行代码保存更改。\n\n```\nnewID = input(\"Enter ID number: \")\nnewname = input(\"Enter\
    \ name: \")\nnewDept = input(\"Enter department: \")\nnewSalary = input(\"Enter\
    \ salary: \")\ncursor.execute(\"\"\"INSERT INTO employees(id,name,dept,salary)\n\
    \    VALUES(?,?,?,?)\"\"\", (newID,newName,newDept,newSalary))\ndb.commit()\n\
    ```\n\n允许用户输入新数据，然后将其插入表中。\n\n```\ncursor.execute(\"SELECT * FROM employees\"\
    )\nprint(cursor.fetchall())\n```\n\n显示 employees 表中的所有数据。\n\n```\ndb.close()\n\
    ```\n\n这必须是程序的最后一行，用于关闭数据库。\n\n![](img/aa0de6941c73766c7e64e4280511b158_138_0.png)\n\
