  - '[PAGE 136]


    # Understanding a Relational Database


    We will use the example of a small manufacturing company that stores the details
    of their employees in an **SQL** database.


    Below is an example of the Employees table, which contains the details of all
    the employees in the company. The contents of a table can be viewed by clicking
    on the Browse Data tab.


    | ID | Name | Dept | Salary |

    |---|---|---|---|

    | 1 | Bob | Sales | 25000 |

    | 2 | Sue | IT | 28500 |

    | 3 | Tim | Sales | 25000 |

    | 4 | Anne | Admin | 18500 |

    | 5 | Paul | IT | 28500 |

    | 6 | Simon | Sales | 22000 |

    | 7 | Karen | Manufacturing | 18500 |

    | 8 | Mark | Manufacturing | 19000 |

    | 9 | George | Manufacturing | 18500 |

    | 10 | Keith | Manufacturing | 15000 |


    ![](img/aa0de6941c73766c7e64e4280511b158_136_0.png)


    It has four fields (ID, Name, Dept and Salary) and 10 records in it (one for each
    employee). Take a look at the employees list and you will notice that more than
    one employee is listed in the same department. In most databases you would find
    repetitive data such as this. To make the database work more efficiently the repeated
    data are often stored in a separate table. In this case there is a department
    table which would store all the information about each department to save having
    to repeat all the department details for each employee.'
  - '[PAGE 137]


    # L36 Challenges 139 - 145: SQLite


    | Dept | Manager |

    |---|---|

    | Manufacturing | Kenith |

    | Sales | James |

    | IT | Connor |

    | Admin | Sally |


    Here we can see the Departments table holding the details about each department.
    We have simplified it and only include one piece of data for each department (in
    this case the manager''s name) but it will still save having to input the manager''s
    name on every record, which we would have to do if the data were all being saved
    in one large table.


    By splitting the data into two tables like this, if we need to update the manager
    it only needs to be updated in one place rather than updating it several times,
    which we would need to do if it was all stored in a single table.


    This is known as a **one-to-many** relationship as one department can have many
    employees in it.


    A **primary key** is the field (usually the first one) in each table that stores
    the unique identifier for that record. Therefore, in the Employees table the primary
    key will be the ID column and in the Department table the primary key will be
    Dept.


    When creating a table, you need to identify the following for each field:


    +   - the name of the field (field names cannot contain spaces and must follow
    the same rules as variable names);

    - if it is a primary key;

    - the data type for that field.


    The data types you can use are as follows:


    +   - **integer**: the value is an integer value;

    - **real**: the value is a floating-point value;

    - **text**: the value is a text string;

    - **blob**: the value is stored exactly as it was input.


    You can also specify if the field cannot be left blank by adding **NOT NULL**
    to the end of the field when you create it.'
