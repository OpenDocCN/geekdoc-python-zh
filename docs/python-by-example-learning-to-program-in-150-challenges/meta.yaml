    | :--- |

    | Gives you pi (π) to 15 decimal places, but you must have the line **import math**
    at the top of your program for this to work. |


    ![](img/aa0de6941c73766c7e64e4280511b158_32_1.png)


    | **x // y** |

    | :--- |

    | Whole number division (e.g. 15//2 gives the answer 7). |


    | **x % y** |

    | :--- |

    | Finds the remainder (e.g. 15%2 gives the answer 1). |'
