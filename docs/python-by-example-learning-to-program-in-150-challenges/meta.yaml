  md: "# 26 Challenges 20 - 26: Strings\n\nThe same can happen with strings.\n\n```\n\
    name = input(\"Enter a name: \")\nnum = int(input(\"Enter a number: \"))\nID =\
    \ name + num\nprint(ID)\n```\n\nIn this program, the user is asked to enter their\
    \ name and a number. They want it joined together and with strings the addition\
    \ symbol is used as **concatenation**. When this code is run you will get a similar\
    \ error message to before:\n\n```\nEnter a name: Bob\nEnter a number: 23\nTraceback\
    \ (most recent call last):\n  File \"C:/Python34/CHALLENGES/String/example.py\"\
    , line 3, in <module>\n    ID = name + num\nTypeError: Can't convert 'int' object\
    \ to str implicitly\n>>>\n```\n\nTo get around this, either don't define the variable\
    \ as a number in the first place or convert it to a string afterwards using the\
    \ line:\n\n```\nnum = str(num)\n```\n\n![](img/aa0de6941c73766c7e64e4280511b158_27_0.png)\n\
    \n# Multiple-Line Strings\n\nIf you want to input a string across multiple lines\
    \ you can either use the line break (\\n) or you can enclose the entire thing\
    \ in triple quotes. This will preserve the formatting of the text.\n\n```\naddress=\"\
    \"\"123 Long Lane\nOldtown\nAB1 23CD\"\"\"\nprint(address)\n```\n\n![](img/aa0de6941c73766c7e64e4280511b158_27_1.png)"
