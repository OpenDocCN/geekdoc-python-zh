  md: '# 80 Challenges 96 - 103: 2D Lists and Dictionaries


    Two-dimensional lists work in a similar way.


    |   | 0 | 1 | 2 |

    |---|---|---|---|

    | 0 | 45 | 37 | 54 |

    | 1 | 62 | 58 | 59 |

    | 2 | 49 | 47 | 60 |

    | 3 | 78 | 83 | 62 |


    In Python, this two-dimensional list would be coded as follows:


    ```

    grades = [[45,37,54], [62,58,59], [49,47,60], [78,83,62]]

    ```


    Alternatively, if you do not want to use the standard Python column index numbers
    you can use a dictionary as follows:


    ```

    grades = [{"Ma":45,"En":37,"Fr":54}, {"Ma":62,"En":58,"Fr":59}, {"Ma":49,"En":47,"Fr":60}]

    print(grades[0]["En"])

    ```


    This program will produce the output 37 (the English grade for the pupil with
    the index number 0) and can make the data easier to understand.


    You can even go further and add a row index as follows:


    ```

    grades = {"Susan": {"Ma":45,"En":37,"Fr":54}, "Peter": {"Ma":62,"En":58,"Fr":59}}

    print(grades["Peter"]["En"])

    ```


    This will give the output 58, the grade for Peter''s English exam.


    ![](img/aa0de6941c73766c7e64e4280511b158_81_0.png)'
