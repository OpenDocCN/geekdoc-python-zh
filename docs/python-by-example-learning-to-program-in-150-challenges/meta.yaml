  md: "# Strings and Numbers as Variables\n\nIf you define a variable as a string,\
    \ even if it only contains numbers, you cannot later use that string as part of\
    \ a calculation. If you want to use a variable that has been defined as a string\
    \ in a calculation, you will have to convert the string to a number before it\
    \ can be used.\n\n```\nnum = input(\"Enter a number: \")\ntotal = num + 10\nprint(total)\n\
    ```\n\nIn this example, the author has asked for a number, but has not defined\
    \ it as a numeric value and when the program is run they will get the following\
    \ error:\n\n```\nEnter a number: 45\nTraceback (most recent call last):\n  File\
    \ \"C:/Python34/CHALLENGES/String/example.py\", line 2, in <module>\n    total\
    \ = num + 10\nTypeError: Can't convert 'int' object to str implicitly\n>>>\n```\n\
    \nAlthough this error message looks scary, it is simply saying that the line **total\
    \ = num + 10** isn't working as the variable num is defined as a string.\n\n![](img/aa0de6941c73766c7e64e4280511b158_26_0.png)\n\
    \nThis problem can be solved in one of two ways. You can either define it as a\
    \ number when the variable is being originally created, using this line:\n\n```\n\
    num = int(input(\"Enter a number: \"))\n```\n\nor you can convert it to a number\
    \ after it has been created using this line:\n\n```\nnum = int(num)\n```"
