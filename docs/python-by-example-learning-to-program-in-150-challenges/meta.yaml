    # Example Code


    ```

    from tkinter import *

    This line must go at the beginning of the program to import the Tkinter library.

    ```


    ```

    window = Tk()

    window.title("Window Title")

    window.geometry("450x100")

    Creates a window that will act as the display, referred to as "window", adds a
    title and defines the size of the window.

    ```


    ![](img/aa0de6941c73766c7e64e4280511b158_113_0.png)


    ![](img/aa0de6941c73766c7e64e4280511b158_113_1.png)


    ```

    label = Label(text = "Enter number:")

    Adds text to the screen displaying the message shown.

    ```


    ```

    entry_box = Entry (text = 0)

    Creates a blank entry box. Entry boxes can be used by the user to input data or
    used to display output.

    ```


    ```

    output_box = Message(text = 0)

    Creates a message box which is used to display an output.

    ```


    ```

    output_box ["bg"] = "red"

    Specifies the background colour of the object.

    ```


    ```

    output_box ["fg"] = "white"

    Specifies the font colour of the object.

    ```


    ```

    output_box ["relief"] = "sunken"

    Specifies the style of the box. This can be flat, raised, sunken, grooved and
    ridged.

    ```


    ```

    list_box = Listbox()

    Creates a drop-down list box which can only contain strings.

    ```


    ![](img/aa0de6941c73766c7e64e4280511b158_113_2.png)


    ```

    entry_box ["justify"] = "center"

    Specifies the justification of the text in an entry box, but this does not work
    for message boxes.

    ```


    ```

    button1 = Button(text = "Click here", command = click)

    Creates a button that will run the subprogram "click".

    ```'
