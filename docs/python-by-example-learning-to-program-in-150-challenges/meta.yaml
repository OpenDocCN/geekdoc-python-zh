  md: "# # Subprograms\n\n# ## Explanation\n\n**Subprograms** are blocks of code which\
    \ perform specific tasks and can be called upon at any time in the program to\
    \ run that code.\n\n# ### Advantages\n\n+   - You can write a block of code and\
    \ it can be used and re-used at different times during the program.\n- It makes\
    \ the program simpler to understand as the code is grouped together into chunks.\n\
    \n# ### Defining a subprogram and passing variables between subprograms\n\nBelow\
    \ is a simple program that we would normally create without subprograms but have\
    \ written it with subprograms so you can see how they work:\n\n```\ndef get_name():\n\
    \    user_name = input(\"Enter your name: \")\n    return user_name\n\ndef print_Msg(user_name):\n\
    \    print(\"Hello\", user_name)\n\ndef main():\n    user_name = get_name()\n\
    \    print_Msg(user_name)\n\nmain()\n```\n\nThis program uses three subprograms\
    \ **get_name()**, **print_Msg()** and **main()**.\n\nThe **get_name()** subprogram\
    \ will ask the user to input their name and then it will return the value of the\
    \ variable \"user_name\" so that it can be used in another subprogram. This is\
    \ very important. If you do not return the values, then the values of any variables\
    \ that were created or altered in that subprogram cannot be used elsewhere in\
    \ your program.\n\n![](img/aa0de6941c73766c7e64e4280511b158_100_0.png)"
  merge: -1
  pgno: 100
- img_proc: true
  md: '# 100 Challenges 118 - 123: Subprograms


    The **print_Msg()** subprogram will display the message "Hello" and then the user
    name. The variable "user_name" appears in the brackets as the current value of
    the variable is being imported into the subprogram so it can be used.


    The **main()** subprogram will get the user_name from the **get_name()** subprogram
    (using the variable user_name) as this was returned from the **get_name()** subprogram.
    It will then use that user_name variable in the **print_Msg()** subprogram.


    The last line "**main()**" is the actual program itself. All this will do is start
    the **main()** subprogram running.


    Obviously, there is no need to create such a convoluted way of performing what
    is in fact a very simple program, but this is only used as an example of how subprograms
    are laid out and variables can be used and passed between the subprograms.


    > **Please note:** Python does not like surprises, so if you are going to use
    a subprogram in a program, Python must have read the "**def subprogram_name()**"
    line before so it knows where to go to find it. If you try to refer to a subprogram
    before Python has read about it, it panics and will crash. When calling a subprogram,
    the subprogram must be written **above** the section of code you use to call it.
    Python will read from the top down and **run** the first line it comes across
    that has not been indented and does not start with the word def. In the program
    above this would be **main()**.


    ![](img/aa0de6941c73766c7e64e4280511b158_101_0.png)


    ![](img/aa0de6941c73766c7e64e4280511b158_101_1.png)


    **Remember:** never surprise Python as it will not like it - good advice for life
    generally.


    ![](img/aa0de6941c73766c7e64e4280511b158_101_2.png)


    ![](img/aa0de6941c73766c7e64e4280511b158_101_3.png)'
