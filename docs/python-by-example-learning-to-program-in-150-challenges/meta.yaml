  md: '# Challenges


    133

    Create your own icon that consists of several vertical multi-coloured lines. Create
    a logo which measures 200 x 150, using Paint or another graphics package. Create
    the following window using your own icon and logo.


    ![](img/aa0de6941c73766c7e64e4280511b158_129_0.png)


    When the user enters their name and clicks on the Press Me button it should display
    "Hello" and their name in the second text box.


    134

    Create a new program that will generate two random whole numbers between 10 and
    50. It should ask the user to add the numbers together and type in the answer.
    If they get the question correct, display a suitable image such as a tick; if
    they get the answer wrong, display another suitable image such as a cross. They
    should click on a Next button to get another question.


    135

    Create a simple program that shows a drop-down list containing several colours
    and a Click Me button. When the user selects a colour from the list and clicks
    the button it should change the background of the window to that colour. For an
    extra challenge, try to avoid using an if statement to do this.


    136

    Create a program that will ask the user to enter a name and then select the gender
    for that person from a drop-down list. It should then add the name and the gender
    (separated by a comma) to a list box when the user clicks on a button.


    137

    Change program 136 so that when a new name and gender is added to the list box
    it is also written to a text file. Add another button that will display the entire
    text file in the main Python shell window.


    ![](img/aa0de6941c73766c7e64e4280511b158_129_1.png)


    138

    Save several images in the same folder as your program and call them 1.gif, 2.gif,
    3.gif, etc. Make sure they are all .gif files. Display one in a window and ask
    the user to enter a number. It should then use that number to choose the correct
    file name and display the correct image.'
