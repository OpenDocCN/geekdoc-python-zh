    通过组合这些简单的形状并使用**嵌套**循环（即循环内部的其他循环），可以非常容易地创建出美丽的图案。\n\n![](img/aa0de6941c73766c7e64e4280511b158_52_1.png)\n\
    \n```python\nimport turtle\n\nfor i in range(0,10):\n    turtle.right(36)\n  \
