    ```\n\n## Tuples, Lists and Dictionaries\n\n### Explanation\n\nSo far, we have\
    \ used variables that can store a single item of data in them. When you used the\
    \ `random.choice([\"red\", \"blue\", \"green\"])` line of code you are picking\
    \ a random item from a list of possible options. This demonstrates that one item\
    \ can hold several pieces of separate data, in this case a collection of colours.\n\
    \nThere are several ways that collections of data can be stored as a single item.\
    \ Three of the simpler ones are:\n\n- tuples\n- lists\n- dictionaries\n\n![](img/aa0de6941c73766c7e64e4280511b158_59_0.png)\n\
    \n### Tuples\n\nOnce a **tuple** is defined you cannot change what is stored in\
    \ it. This means that when you write the program you must state what the data\
    \ is that is being stored in the tuple and the data cannot be altered while the\
    \ program is running. Tuples are usually used for menu items that would not need\
    \ to be changed.\n\n### Lists\n\nThe contents of a **list** can be changed while\
    \ the program is running and lists are one of the most common ways to store a\
    \ collection of data under one variable name in Python. The data in a list does\
    \ not all have to be of the same data type. For example, the same list can store\
    \ both strings and integers; however, this can cause problems later and is therefore\
    \ not recommended.\n\n> **Please note:** In other programming languages the term\
    \ **array** is often used to describe a variable that contains a collection of\
    \ data, and these work in a similar way to lists in Python. There is a data type\
    \ called an array in Python, but this is only used to store numbers and we will\
    \ look at Python numeric arrays on page 72.\n\n### Dictionaries\n\nThe contents\
    \ of a **dictionary** can also be changed while the program is running. Each value\
    \ is given an index or key you can define to help identify each piece of data.\
    \ This index will not change if other rows of data are added or deleted, unlike\
    \ lists where the position of the items can change and therefore their index number\
    \ will also change.\n\n![](img/aa0de6941c73766c7e64e4280511b158_60_0.png)\n\n\
    > Don't get yourself in a tangle, take each program and break it into the parts\
    \ you already know from previous programs and build in the new skills you are\
    \ learning.\n\n![](img/aa0de6941c73766c7e64e4280511b158_60_1.png)\n\n## Example\
    \ Code\n\n```\nfruit_tuple = (\"apple\", \"banana\", \"strawberry\", \"orange\"\
    )\nCreates a variable name called \"fruit_tuple\" which stores four pieces of\
    \ fruit within it. The round brackets define this group as a tuple and therefore\
    \ the contents of this collection of data cannot be altered while the program\
    \ is running.\n```\n\n```\nprint(fruit_tuple.index(\"strawberry\"))\nDisplays\
    \ the index (i.e. the numeric key) of the item \"strawberry\". In this example\
    \ it will return the number 2 as Python starts counting the items from 0, not\
    \ 1.\n```\n\n```\nprint(fruit_tuple[2])\nDisplays item 2 from \"fruit_tuple\"\
    , in this case \"strawberry\".\n```\n\n```\nnames_list = [\"John\", \"Tim\", \"\
    Sam\"]\nCreates a list of the names and stores them in the variable \"names_list\"\
    . The square brackets define this group of data as a list and therefore the contents\
    \ can be altered while the program is running.\n```\n\n```\ndel names_list[1]\n\
    Deletes item 1 from \"names_list\". Remember it starts counting from 0 and not\
    \ 1. In this case it will delete \"Tim\" from the list.\n```\n\n```\nnames_list.append(input(\"\
    Add a name: \"))\nAsks the user to enter a name and will add that to the end of\
    \ \"names_list\".\n```\n\n```\nnames_list.sort()\nSorts name_list into alphabetical\
    \ order and saves the list in the new order. This does not work if the list is\
    \ storing data of different types, such as strings and numeric data in the same\
    \ list.\n```\n\n```\nprint(sorted(names_list))\nDisplays names_list in alphabetical\
    \ order but does not change the order of the original list, which is still saved\
    \ in the original order. This does not work if the list is storing data of different\
    \ types, such as strings and numeric data in the same list.\n```\n\n```\ncolours\
    \ = {1:\"red\", 2:\"blue\", 3:\"green\"}\nCreates a dictionary called \"colours\"\
    , where each item is assigned an index of your choosing. The first item in each\
    \ block is the index, separated by a colon and then the colour.\n```\n\n```\n\
    colours[2] = \"yellow\"\nMakes a change to the data stored in position 2 of the\
    \ colours dictionary. In this case it will change \"blue\" to \"yellow\".\n```\n\
    \nAs lists are one of the most common data structures we include more example\
    \ code just for lists.\n\n```\nx = [154, 634, 892, 345, 341, 43]\nHere we have\
    \ created a list that contains numbers. **Please note:** as it contains numeric\
    \ data, no speech marks are required.\n```\n\n```\nprint(len(x))\nDisplays the\
    \ length of the list (i.e. how many items are in the list).\n```\n\n```\nprint(x[1:4])\n\
    This will display data in positions 1, 2 and 3. In this case 634, 892 and 345.\
    \ Remember, Python starts counting from 0 and will stop when it gets to the last\
    \ position, without showing the final value.\n```\n\n```\nfor i in x:\n    print(i)\n\
    Uses the items in the list in a for loop, useful if you want to print the items\
    \ in a list on separate lines.\n```\n\n```\nnum = int(input(\"Enter number: \"\
    ))\nif num in x:\n    print(num, \"is in the list\")\nelse:\n    print(\"Not in\
    \ the list\")\nAsks the user to enter a number and checks whether the number is\
    \ in the list and displays an appropriate message.\n```\n\n![](img/aa0de6941c73766c7e64e4280511b158_62_0.png)\n\
    \n```\nx.insert(2, 420)\nInserts the number 420 into position 2 and pushes everything\
    \ else along to make space. This will change the index numbers of the items in\
    \ the list.\n```\n\n```\nx.remove(892)\nDeletes an item from the list. This is\
    \ useful if you do not know the index of that item. If there is more than one\
    \ instance of the data it will only delete the first instance.\n```\n\n```\nx.append(993)\n\
    Adds the number 993 to the end of the list.\n```"
