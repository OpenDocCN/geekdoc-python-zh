    \ Windows 系统上查看新文本文件内容的最简单方法是使用记事本读取它。\n\n**106**\n创建一个名为 \"Names.txt\" 的新文件。向文档中添加五个名字，这些名字存储在单独的行中。运行程序后，查看程序存储的位置并检查文件是否已正确创建。\n\
