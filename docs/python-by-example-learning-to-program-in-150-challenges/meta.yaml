    \n**049**\n创建一个名为 `compnum` 的变量，并将其值设为50。要求用户输入一个数字。当他们的猜测与 `compnum` 的值不同时，告诉他们猜测是太低还是太高，并要求他们再猜一次。如果他们输入的值与\
