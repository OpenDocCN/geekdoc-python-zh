    # Numeric Arrays


    ![](img/aa0de6941c73766c7e64e4280511b158_73_0.png)


    # Explanation


    Earlier in the book we looked at lists (see page 58). Lists can store a jumble
    of different types of data at the same time, including strings and numbers. Python
    **arrays** are similar to lists, but they are **only used to store numbers**.
    Numbers can have varying ranges, but in an array all pieces of data in that array
    **must have the same data type**, as outlined in the table below.


    | Type code | Common name | Description | Size in bytes |

    | :--- | :--- | :--- | :--- |

    | ''i'' | Integer | Whole number between -32,768 and 32,767 | 2 |

    | ''l'' | Long | Whole number between -2,147,483,648 and 2,147,483,647 | 4 |

    | ''f'' | Floating-point | Allows decimal places with numbers ranging from -10^38
    to 10^38 (i.e. allows up to 38 numeric characters including a single decimal point
    anywhere in that number and can be negative or positive value) | 4 |

    | ''d'' | Double | Allows decimal places with numbers ranging from -10^308 to
    10^308 | 8 |


    When you create your array you need to define the type of data it will contain.
    You cannot alter or change this while the program is running. Therefore, if you
    define an array as an ''i'' type (this allows whole numbers between the values
    -32,768 and 32,767) you cannot add a decimal point to a number in that array later
    as it will cause an error message and crash the program.


    ![](img/aa0de6941c73766c7e64e4280511b158_73_1.png)


    **Please note:** Other programming languages use the term array to allow the storage
    of any data type, but in Python arrays only store numbers whereas lists allow
    the storage of any data type. If you want to create a variable that stores multiple
    strings, in Python you need to create a list rather than an array.


    ![](img/aa0de6941c73766c7e64e4280511b158_73_2.png)'
