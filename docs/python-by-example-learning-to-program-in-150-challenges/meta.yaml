  md: '```

    label.place(x = 50, y = 20, width = 100, height = 25)

    Specifies the position in which the object will appear in the window. If the position
    is not specified the item will not appear in the window.

    ```


    ```

    entry_box.delete(0, END)

    Deletes the contents of an entry or list box.

    ```


    ```

    num = entry_box.get()

    Saves the contents of an entry box and stores it in a variable called num. This
    does not work with message boxes.

    ```


    ```

    answer = output_txt["text"]

    Obtains the contents of a message box and stores it in a variable called answer.
    This does not work with an entry box.

    ```


    ```

    output_txt["text"] = total

    Changes the content of a message box to display the value of the variable total.

    ```


    ```

    window.mainloop()

    This must be at the end of the program to make sure it keeps working.

    ```


