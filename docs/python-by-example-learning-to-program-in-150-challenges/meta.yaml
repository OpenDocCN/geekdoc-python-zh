    # What Next?


    ![](img/aa0de6941c73766c7e64e4280511b158_170_0.png)


    If you have worked through all the examples in this book you should have a good
    understanding of the basics of programming with Python. You will have become familiar
    with the syntax of the language and started to think like a programmer by breaking
    down larger problems into small, manageable chunks you know how to solve. You
    should look back on all you have learnt and can justifiably feel a smirk of satisfaction
    at what you have achieved. Learning to program takes dedication and you have shown
    you can persevere, and you now have the basic skills to continue on your journey
    into Python.


    The skills you have learnt in this book will allow you to create powerful programs,
    but now is not the time to sit back and relax. You need to go out into the big
    programming world and find out how other programmers work. Search the internet,
    find new challenges. As you explore you will see code that is unfamiliar to you
    as there are several variations that can be used. For instance, with Tkinter there
    is another method called "pack" which many programmers prefer. It allows you to
    use a grid method for designing your screens but does not allow you to fine-tune
    the position of an object the way the place method we have been using allows.
    Try it out, you may prefer it, but do be careful as some techniques do not work
    well with others. If you want to use the pack method then please don''t try to
    mix it with the place method in the same program. Python doesn''t like working
    with two different systems simultaneously and will crash.


    ![](img/aa0de6941c73766c7e64e4280511b158_170_1.png)


    The best way to learn more advanced programming techniques is to try them out.
    Look at other people''s code and visit some chat forums. Programmers are very
    helpful and as long as you are not asking a question that has already been answered
    on the forum they are generally willing to help you out. If you are stuck on a
    piece of code, then ask for help in a forum; programmers like nothing more than
    to solve a problem. You may not necessarily agree with their solution, it may
    not be the method you are looking to use, but it will give you an idea of how
    to look at it with fresh eyes and can show you a route to a possible solution
    you had not considered before.


    ![](img/aa0de6941c73766c7e64e4280511b158_170_2.png)


    Whether you feel satisfied with your knowledge or want to explore further, I hope
    you have enjoyed your venture into programming and this book has proved useful.'
