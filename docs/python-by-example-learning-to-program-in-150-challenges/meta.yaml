  md: '# 146: Shift Code


    In this challenge you will need to use the following skills:


    +   - input and display data;

    - lists;

    - splitting and joining strings;

    - if statements;

    - loops (while and for);

    - subprograms.


    ![](img/aa0de6941c73766c7e64e4280511b158_151_0.png)


    # The Challenge


    A shift code is where a message can be easily encoded and is one of the simplest
    codes to use. Each letter is moved forwards through the alphabet a set number
    of letters to be represented by a new letter. For instance, "abc" becomes "bcd"
    when the code is shifted by one (i.e. each letter in the alphabet is moved forward
    one character).


    You need to create a program which will display the following menu:


    ```

    1) Make a code

    2) Decode a message

    3) Quit


    Enter your selection:

    ```


    If the user selects 1, they should be able to type in a message (including spaces)
    and then enter a number. Python should then display the encoded message once the
    shift code has been applied.


    ![](img/aa0de6941c73766c7e64e4280511b158_151_1.png)


    If the user selects 2, they should enter an encoded message and the correct number
    and it should display the decoded message (i.e. move the correct number of letters
    backwards through the alphabet).


    If they select 3 it should stop the program from running.


    After they have encoded or decoded a message the menu should be displayed to them
    again until they select quit.'
