- md: "## Part II\n\nChunky Challenges\n\n## Introduction to Part II\n\nIn this section,\
    \ you are given some large programming challenges to work through. These will\
    \ take longer than the previous challenges and you are likely to have to refer\
    \ to earlier sections of the book to remind yourself of some of the key skills\
    \ you have covered. Don't feel bad if you need to look up key lines of code in\
    \ previous sections; even experienced programmers get help when they come across\
    \ a tricky piece of code with which they are not familiar. It is all part of the\
    \ learning process and is exactly how this book was written to be used.\n\nEach\
    \ challenge contains a list of the skills that will be needed so you can decide\
    \ if you feel ready to attempt the challenge. It also includes a description of\
    \ the challenge and a section outlining problems you will have to overcome. The\
    \ solutions in this section are much larger and some are split over several pages,\
    \ but should be read as a continuous single program for that challenge. If a program\
    \ does need to be split across separate pages we try to split it between the subprograms\
    \ or in a natural break if possible.\n\nRead each challenge all the way through\
    \ before attempting it so you are aware of the pitfalls. Once you have read through\
    \ the challenge, sit back and have a think about how you are going to approach\
    \ it. You may want to scribble some notes, or if you are feeling very keen and\
    \ know how, you may even venture into writing a flow chart. There is no point\
    \ in diving straight into tapping out lines of code with no idea where you are\
    \ heading, as you are likely to get into a muddle and may lose faith in your abilities.\
    \ Make a plan, split the large problem into small, manageable chunks, and then\
    \ tackle each chunk, testing each section as you go. Now, make yourself a drink,\
    \ grab a notebook and pencil, take a deep breath, turn the page and have a go\
    \ at the first one.\n\n## 146: Shift Code\n\nIn this challenge you will need to\
    \ use the following skills:\n\n- input and display data;\n- lists;\n- splitting\
    \ and joining strings;\n- if statements;\n- loops (while and for);\n- subprograms.\n\
    \n## The Challenge\n\nA shift code is where a message can be easily encoded and\
    \ is one of the simplest codes to use. Each letter is moved forwards through the\
    \ alphabet a set number of letters to be represented by a new letter. For instance,\
    \ \"abc\" becomes \"bcd\" when the code is shifted by one (i.e. each letter in\
    \ the alphabet is moved forward one character).\n\nYou need to create a program\
    \ which will display the following menu:\n\n```\n1) Make a code\n2) Decode a message\n\
    3) Quit\n\nEnter your selection:\n```\n\nIf the user selects 1, they should be\
    \ able to type in a message (including spaces) and then enter a number. Python\
    \ should then display the encoded message once the shift code has been applied.\n\
    \nIf the user selects 2, they should enter an encoded message and the correct\
    \ number and it should display the decoded message (i.e. move the correct number\
    \ of letters backwards through the alphabet).\n\nIf they select 3 it should stop\
    \ the program from running.\n\nAfter they have encoded or decoded a message the\
    \ menu should be displayed to them again until they select quit.\n\n## Problems\
    \ You Will Have to Overcome\n\nDecide if you want to allow both upper and lower\
    \ case letters or if you want to convert all the data into one case.\n\nDecide\
    \ if you are allowing punctuation.\n\nIf the shift makes the letter go past the\
    \ end of the alphabet it should start again; i.e. if the user enters \"xyz\" and\
    \ 5 is entered as the shift number, it should display \"bcd\". This should work\
    \ the opposite way for decoding a message, so if the value gets to \"a\" it will\
    \ go back to \"w\".\n\nMake sure that suitable messages are displayed if the user\
    \ selects an inappropriate option on the menu or selects an inappropriate number\
    \ to make the shift code.\n\nTest out your decode option by decoding the message\
    \ \"we ovugjohsslunl\", which was created with the number 7 when the code only\
    \ uses \"abcdefghijklmnopqrstuvwxyz \" (note the space at the end).\n\n## Challenge\
    \ 146: Shift Code\n\n## Answer\n\n```python\nalphabet = [\"a\",\"b\",\"c\",\"\
    d\",\"e\",\"f\",\"g\",\"h\",\"i\",\"j\",\n            \"k\",\"l\",\"m\",\"n\"\
    ,\"o\",\"p\",\"q\",\"r\",\"s\",\"t\",\n            \"u\",\"v\",\"w\",\"x\",\"\
    y\",\"z\",\" \"]\n```\n\n```python\ndef get_data():\n    word = input(\"Enter\
    \ your message: \")\n    word = word.lower()\n    num = int(input(\"Enter a number\
    \ (1-26): \"))\n    if num > 26 or num == 0:\n        while num > 26 or num ==\
    \ 0:\n            num = int(input(\"Out of range, please enter a number (1-26):\
    \ \"))\n    data = (word,num)\n    return(data)\n```\n\n```python\ndef make_code(word,num):\n\
    \    new_word = \"\"\n    for x in word:\n        y = alphabet.index(x)\n    \
    \    y = y + num\n        if y > 26:\n            y = y - 27\n        char = alphabet[y]\n\
    \        new_word = new_word + char\n    print(new_word)\n    print()\n```\n\n\
    ```python\ndef decode(word,num):\n    new_word = \"\"\n    for x in word:\n  \
    \      y = alphabet.index(x)\n        y = y - num\n        if y < 0:\n       \
    \     y = y + 27\n        char = alphabet[y]\n        new_word = new_word+char\n\
    \    print(new_word)\n    print()\n```\n\n```python\ndef main():\n    again =\
    \ True\n    while again == True:\n        print(\"1) Make a code\")\n        print(\"\
    2) Decode a message\")\n        print(\"3) Quit\")\n        print()\n        selection\
    \ = int(input(\"Enter your selection: \"))\n        if selection == 1:\n     \
    \       (word,num) = get_data()\n            make_code(word,num)\n        elif\
    \ selection == 2:\n            (word,num) = get_data()\n            decode(word,num)\n\
    \        elif selection == 3:\n            again = False\n        else:\n    \
    \        print(\"Incorrect selection\")\n\nmain()\n```\n\n## 147: Mastermind\n\
    \nIn this challenge you will need to use the following skills:\n\n- input and\
    \ display data;\n- lists;\n- random choice from a list;\n- if statements;\n- loops\
    \ (while and for);\n- subprograms.\n\n## The Challenge\n\nYou are going to make\
    \ an on-screen version of the board game “Mastermind”. The computer will automatically\
    \ generate four colours from a list of possible colours (it should be possible\
    \ for the computer to randomly select the same colour more than once). For instance,\
    \ the computer may choose “red”, “blue”, “red”, “green”. This sequence should\
    \ **not** be displayed to the user.\n\nAfter this is done the user should enter\
    \ their choice of four colours from the same list the computer used. For instance,\
    \ they may choose “pink”, “blue”, “yellow” and “red”.\n\nAfter the user has made\
    \ their selection, the program should display how many colours they got right\
    \ in the correct position and how many colours they got right but in the wrong\
    \ position. In the example above, it should display the message “Correct colour\
    \ in the correct place: 1” and “Correct colour but in the wrong place: 1”.\n\n\
    The user continues guessing until they correctly enter the four colours in the\
    \ order they should be in. At the end of the game it should display a suitable\
    \ message and tell them how many guesses they took.\n\n## Problems You Will Have\
    \ to Overcome\n\nThe hardest part of this game is working out the logic for checking\
    \ how many the user has correct and how many are in the wrong place. Using the\
    \ example above, if the user enters \"blue\", \"blue\", \"blue\", \"blue\" they\
    \ should see the messages, \"Correct colour in the correct place: 1\" and \"Correct\
    \ colour but in the wrong place: 0\".\n\nDecide if there is an easier way of allowing\
    \ the user to enter their selection (e.g. using a code or a single letter to represent\
    \ the colour). If using the first letter, make sure you only use colours that\
    \ have a unique first letter (i.e. avoid using blue, black and brown as options\
    \ and select just one of these as a possibility). Make your instructions clear\
    \ to the user.\n\nDecide if you want to allow upper and lower case or if it is\
    \ easier to convert everything to the same case.\n\nMake sure you build in validation\
    \ checks to make sure the user is only entering valid data and display a suitable\
    \ message if they make an incorrect selection. If they do make an incorrect selection\
    \ you may want to allow them to enter the data again, rather than class it as\
    \ an incorrect guess."
  mdcn: "## 第二部分\n\n大型挑战\n\n## 第二部分简介\n\n在这一部分中，你将面临一些需要投入较多时间的大型编程挑战。这些挑战将比之前的挑战耗时更长，并且你可能需要参考本书前面的章节，以回顾你已经掌握的一些关键技能。如果你需要查阅前面章节中的关键代码行，不必感到难为情；即使是经验丰富的程序员，在遇到不熟悉的棘手代码时也会寻求帮助。这都是学习过程的一部分，也正是本书设计的使用方式。\n\
    \n每个挑战都包含一个所需技能清单，以便你判断自己是否准备好尝试该挑战。它还包括挑战描述和一个问题概述部分，列出你将必须克服的困难。本节中的解决方案要大得多，有些被分在多个页面上，但对于该挑战而言，它们应被视为一个连续的完整程序。如果程序确实需要跨页面分割，我们会在子程序处或尽可能在自然断点处分割。\n\
    \n在尝试每个挑战之前，请先通读全部内容，这样你就能意识到可能的陷阱。通读挑战后，向后靠一靠，思考一下你打算如何着手。你可能想要草拟一些笔记，或者如果你非常积极并且知道怎么做，你甚至可能冒险去编写一个流程图。毫无头绪地直接投入编写代码行是没有意义的，因为你很可能会陷入混乱，并可能对自己的能力失去信心。制定一个计划，将大问题分解成小的、可管理的部分，然后逐个攻克这些部分，并在进行过程中测试每个部分。现在，为自己倒杯饮料，拿起笔记本和铅笔，深吸一口气，翻到下一页，开始尝试第一个挑战吧。\n\
    \n## 146：移位码\n\n在本挑战中，你将需要运用以下技能：\n\n-   输入与显示数据；\n-   列表；\n-   分割与连接字符串；\n- \
    \  条件语句（if语句）；\n-   循环（while 和 for）；\n-   子程序。\n\n## 挑战描述\n\n移位码是一种可以轻松编码信息的简单密码。每个字母在字母表中向前移动固定的位数，由一个新字母代表。例如，当移位数为1时（即字母表中的每个字母向前移动一个字符），“abc”会变成“bcd”。\n\
    \n你需要创建一个程序，显示以下菜单：\n\n```\n1) 生成编码\n2) 解码信息\n3) 退出\n\n请输入您的选择：\n```\n\n如果用户选择1，他们应该能够输入一条消息（包括空格），然后输入一个数字。Python随后应在应用移位码后显示编码后的消息。\n\
    \n如果用户选择2，他们应该输入一条编码过的消息和正确的数字，程序应显示解码后的消息（即，在字母表中向后移动正确的位数）。\n\n如果他们选择3，程序应停止运行。\n\
    \n在用户编码或解码一条消息后，应再次向他们显示菜单，直到他们选择退出。\n\n## 需要克服的问题\n\n决定是允许大小写字母，还是将所有数据转换为同一种大小写。\n\
    \n决定是否允许标点符号。\n\n如果移位导致字母超出字母表末尾，它应该从头开始；例如，如果用户输入“xyz”并输入5作为移位数字，它应该显示“bcd”。解码消息时也应反向工作，因此如果值达到“a”，它应该返回到“w”。\n\
    \n确保在用户在菜单上选择不当选项或选择不当的数字来生成移位码时，显示合适的提示信息。\n\n通过解码消息“we ovugjohsslunl”来测试你的解码选项，该消息是用数字7创建的，并且密码只使用“abcdefghijklmnopqrstuvwxyz\
    \ ”（注意末尾的空格）。\n\n## 挑战146：移位码\n\n## 答案\n\n```python\nalphabet = [\"a\",\"b\",\"\
    c\",\"d\",\"e\",\"f\",\"g\",\"h\",\"i\",\"j\",\n            \"k\",\"l\",\"m\"\
    ,\"n\",\"o\",\"p\",\"q\",\"r\",\"s\",\"t\",\n            \"u\",\"v\",\"w\",\"\
    x\",\"y\",\"z\",\" \"]\n```\n\n```python\ndef get_data():\n    word = input(\"\
    输入您的消息： \")\n    word = word.lower()\n    num = int(input(\"输入一个数字（1-26）： \"))\n\
    \    if num > 26 or num == 0:\n        while num > 26 or num == 0:\n         \
    \   num = int(input(\"超出范围，请输入一个数字（1-26）： \"))\n    data = (word,num)\n    return(data)\n\
    ```\n\n```python\ndef make_code(word,num):\n    new_word = \"\"\n    for x in\
    \ word:\n        y = alphabet.index(x)\n        y = y + num\n        if y > 26:\n\
    \            y = y - 27\n        char = alphabet[y]\n        new_word = new_word\
    \ + char\n    print(new_word)\n    print()\n```\n\n```python\ndef decode(word,num):\n\
    \    new_word = \"\"\n    for x in word:\n        y = alphabet.index(x)\n    \
    \    y = y - num\n        if y < 0:\n            y = y + 27\n        char = alphabet[y]\n\
    \        new_word = new_word+char\n    print(new_word)\n    print()\n```\n\n```python\n\
    def main():\n    again = True\n    while again == True:\n        print(\"1) 生成编码\"\
    )\n        print(\"2) 解码信息\")\n        print(\"3) 退出\")\n        print()\n   \
    \     selection = int(input(\"请输入您的选择： \"))\n        if selection == 1:\n    \
    \        (word,num) = get_data()\n            make_code(word,num)\n        elif\
    \ selection == 2:\n            (word,num) = get_data()\n            decode(word,num)\n\
    \        elif selection == 3:\n            again = False\n        else:\n    \
    \        print(\"选择不正确\")\n\nmain()\n```\n\n## 147：珠玑妙算\n\n在本挑战中，你将需要运用以下技能：\n\
    \n-   输入与显示数据；\n-   列表；\n-   从列表中随机选择；\n-   条件语句（if语句）；\n-   循环（while 和 for）；\n\
    -   子程序。\n\n## 挑战描述\n\n你将制作一个屏幕版的棋盘游戏“珠玑妙算”。计算机将从一组可能的颜色中自动生成四种颜色（计算机应该能够随机选择相同的颜色）。例如，计算机可能选择“红色”、“蓝色”、“红色”、“绿色”。这个序列**不应**向用户显示。\n\
    \n完成后，用户应从计算机使用的同一列表中输入他们选择的四种颜色。例如，他们可能选择“粉色”、“蓝色”、“黄色”和“红色”。\n\n用户做出选择后，程序应显示他们有多少种颜色位置正确，以及有多少种颜色正确但位置错误。在上面的例子中，它应该显示消息“正确位置的正确颜色：1”和“正确颜色但位置错误：1”。\n\
    \n用户继续猜测，直到他们正确输入四种颜色的正确顺序。游戏结束时，应显示一条合适的消息，并告诉他们猜了多少次。\n\n## 需要克服的问题\n\n这个游戏最难的部分是弄清楚检查用户猜对了多少以及有多少位置错误的逻辑。使用上面的例子，如果用户输入“蓝色”、“蓝色”、“蓝色”、“蓝色”，他们应该看到消息“正确位置的正确颜色：1”和“正确颜色但位置错误：0”。\n\
    \n决定是否有更简单的方法允许用户输入他们的选择（例如，使用代码或单个字母代表颜色）。如果使用首字母，请确保你只使用首字母唯一的颜色（即避免同时使用蓝色、黑色和棕色作为选项，只选择其中一种作为可能性）。让你的说明对用户清晰明了。\n\
    \n决定是允许大小写，还是将所有内容转换为同一种大小写更容易。\n\n确保你建立了验证检查，以确保用户只输入有效数据，并在他们做出错误选择时显示合适的提示信息。如果他们确实做出了错误选择，你可能希望允许他们再次输入数据，而不是将其视为一次错误的猜测。"
