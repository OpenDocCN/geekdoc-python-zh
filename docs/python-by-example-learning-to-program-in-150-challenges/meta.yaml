  md: '# Challenges


    **001**

    Ask for the user''s first name and display the output message

    **Hello [First Name]**


    **002**

    Ask for the user''s first name and then ask for their surname and display the
    output message

    **Hello [First Name] [Surname].**


    **003**

    Write code that will display the joke "What do you call a bear with no teeth?"
    and on the next line display the answer "A gummy bear!" Try to create it using
    only one line of code.


    **004**

    Ask the user to enter two numbers. Add them together and display the answer as

    **The total is [answer]**


    **005**

    Ask the user to enter three numbers. Add together the first two numbers and then
    multiply this total by the third. Display the answer as **The answer is [answer].**


    **006**

    Ask how many slices of pizza the user started with and ask how many slices they
    have eaten. Work out how many slices they have left and display the answer in
    a user-friendly format.


    **007**

    Ask the user for their name and their age. Add 1 to their age and display the
    output **[Name] next birthday you will be [new age].**


    **008**

    Ask for the total price of the bill, then ask how many diners there are. Divide
    the total bill by the number of diners and show how much each person must pay.


    **009**

