  md: '# More Tkinter


    # Explanation


    Here we will look at creating a GUI which includes more features and builds on
    the knowledge from the previous chapter.


    ![](img/aa0de6941c73766c7e64e4280511b158_125_0.png)


    On this screen we have:


    +   - changed the icon on the title bar;

    - changed the background colour of the main window;

    - added a static image of the logo to the top left, which will not change;

    - created a label which, at the moment, displays "Hello";

    - added a Click Me button;

    - added a drop-down option entitled Select Name, which will display three names:
    "Bob", "Sue" and "Tim" to the user;

    - added a second image in the lower half of the window which will change to show
    the photograph of the person selected from the drop-down list when the user clicks
    on the Click Me button.


    ![](img/aa0de6941c73766c7e64e4280511b158_125_1.png)'
