  md: "# # Strings\n\n# ## Explanation\n\n**String** is the technical name for text.\
    \ To define a block of code as a string, you need to include it in either double\
    \ quotes (\") or single quotes ('). It doesn't matter which you use so long as\
    \ you are consistent.\n\nThere are some characters you need to be particularly\
    \ careful with when inputting them into strings. These include:\n\n\" ' \",\n\
    \            \"bbox\": [0.50\n\nThat is because these symbols have special meanings\
    \ in Python and it can get confusing if you use them in a string.\n\nIf you want\
    \ to use one of these symbols you need to precede it with a backslash symbol and\
    \ then Python will know to ignore the symbol and will treat it as normal text\
    \ that is to be displayed.\n\n| Symbol | How to type this into a Python string\
    \ |\n| :--- | :--- |\n| \" | \" |\n| ' | \\' |\n| \\ | \\ |\n\n![](img/aa0de6941c73766c7e64e4280511b158_25_0.png)\n\
    \n![](img/aa0de6941c73766c7e64e4280511b158_25_1.png)"
  merge: -1
