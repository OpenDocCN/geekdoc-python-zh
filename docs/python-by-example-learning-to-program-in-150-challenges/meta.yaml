  md: '# # The Basics


    # ## Explanation


    This is the **shell** window and is the first screen you see when you launch Python.


    ![](img/aa0de6941c73766c7e64e4280511b158_12_0.png)


    It is possible to write Python code straight into the shell, but as soon as you
    hit [Return] at the end of a line, it will run that line of code. This may be
    suitable for using Python as a quick calculator; for instance, you can type in
    **3*5** at the prompt and Python will show the answer **15** on the next line;
    however, this style of inputting is not useful for more complex programs.


    ![](img/aa0de6941c73766c7e64e4280511b158_12_1.png)


    It is much better to start a new window, create all the code in the new window,
    save your code and run it.


    ![](img/aa0de6941c73766c7e64e4280511b158_12_2.png)


    To create a new window in which to write your code, select **File** and **New**.
    Once you enter your code in this new window you can save it and run it all in
    one go. This will then run the code in the shell window.


    Alternatively, Python programs can be written using any text editor and must be
    saved with the file name extension .py in order to work. These programs can then
    be run from the command prompt by typing in the full directory root and file name.


    ![](img/aa0de6941c73766c7e64e4280511b158_12_3.png)


    ![](img/aa0de6941c73766c7e64e4280511b158_12_4.png)'
