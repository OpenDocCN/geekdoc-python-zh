    # # Tuples, Lists and Dictionaries


    # ## Explanation


    So far, we have used variables that can store a single item of data in them. When
    you used the `random.choice(["red", "blue", "green"])` line of code you are picking
    a random item from a list of possible options. This demonstrates that one item
    can hold several pieces of separate data, in this case a collection of colours.


    There are several ways that collections of data can be stored as a single item.
    Three of the simpler ones are:


    +   - tuples

    - lists

    - dictionaries


    ![](img/aa0de6941c73766c7e64e4280511b158_59_0.png)


    # ### Tuples


    Once a **tuple** is defined you cannot change what is stored in it. This means
    that when you write the program you must state what the data is that is being
    stored in the tuple and the data cannot be altered while the program is running.
    Tuples are usually used for menu items that would not need to be changed.


    # ### Lists


    The contents of a **list** can be changed while the program is running and lists
    are one of the most common ways to store a collection of data under one variable
    name in Python. The data in a list does not all have to be of the same data type.
    For example, the same list can store both strings and integers; however, this
    can cause problems later and is therefore not recommended.


    > > **Please note:** In other programming languages the term **array** is often
    used to describe a variable that contains a collection of data, and these work
    in a similar way to'
  - '[PAGE 60]


    lists in Python. There is a data type called an array in Python, but this is only
    used to store numbers and we will look at Python numeric arrays on page 72.


    # Dictionaries


    The contents of a **dictionary** can also be changed while the program is running.
    Each value is given an index or key you can define to help identify each piece
    of data. This index will not change if other rows of data are added or deleted,
    unlike lists where the position of the items can change and therefore their index
    number will also change.


    ![](img/aa0de6941c73766c7e64e4280511b158_60_0.png)


    > Don''t get yourself in a tangle, take each program and break it into the parts
    you already know from previous programs and build in the new skills you are learning.


    ![](img/aa0de6941c73766c7e64e4280511b158_60_1.png)'
