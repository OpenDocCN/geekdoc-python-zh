    # Explanation


    Python can perform several mathematical functions, but these are only available
    when the data is treated as either an **integer** (a whole number) or a **floating-point**
    (a number with a decimal place). If data is stored as a string, even if it only
    contains numeric characters, Python is unable to perform calculations with it
    (see page 24 for a fuller explanation).


