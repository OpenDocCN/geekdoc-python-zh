    Decide if you are allowing punctuation.


    If the shift makes the letter go past the end of the alphabet it should start
    again; i.e. if the user enters "xyz" and 5 is entered as the shift number, it
    should display "bcd". This should work the opposite way for decoding a message,
    so if the value gets to "a" it will go back to "w".


    Make sure that suitable messages are displayed if the user selects an inappropriate
