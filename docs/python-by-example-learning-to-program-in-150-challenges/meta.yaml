    num_list.place(x = 120, y = 50, width = 100, height = 200)\n\nbutton2 = Button(text\
    \ = \"Clear\", command = clear_list)\nbutton2.place(x = 250, y = 50, width = 120,\
    \ height = 25)\n\nwindow.mainloop()\n```\n\n## 150: Art Gallery\n\nIn this challenge\
