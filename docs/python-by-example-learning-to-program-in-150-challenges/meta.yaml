    # # Glossary


    | Term | Description |

    |---|---|

    | sort | Sorts a list into alphabetical order and saves the list in the new order.
    This does not work if the list is storing data of different types, such as strings
    and numeric data in the same list. `names_list.sort()` |

    | sorted | Prints a list in alphabetical order. This does not alter the order
    of the original list and it is still kept in the original order. This does not
    work if the list is storing data of different types, such as strings and numeric
    data in the same list. `print(sorted(names_list))` |

    | space (removal) | See strip. |

    | speech marks | Used to define a block of code as a string. You can use either
    double quotes (") or single quotes ('') but whatever you use to start your string
    you must use the same style to define the end of the string. `print("This is a
    string")` You can use triple speech marks to preserve the formatting such as line
    breaks. `address="""123 Long Lane Oldtown AB1 23CD""" print(address)` |

    | SQL | Stands for Structured Query Language, which is used to communicate with
    a database. A database can contain several tables joined together, which is known
    as a relation database. Each table is made up of fields that contain similar data
    such as ID, Name, Address, etc. Each row in the table is known as a record. See
    database, field, record, table and query. |

    | SQLite | A simple database that is free to download and works well with Python.
    |

    | sqrt | Works out the square root of a number. You need to import the math library
    at the start of your program for this to work. `import math num = math.sqrt(100)
    print(num)` |

    | square brackets | Defines the values inside the brackets as a list. See list.
    `list=[''a'',''b'',''c''] for i in list: print(i)` |

    | square root | See sqrt. |

    | str | A data type as string. See string. `year = str(year)` |

    | string | Can include letters, numbers and various symbols and be enclosed by
    either double or single quotes. They cannot be used in a calculation, even if
    they only contain numbers. They can, however, be used in concatenation and joined
    onto other strings to make a larger string. See concatenation. |

    | strip | Removes additional characters from the start and end of a string. `text
    = "   This is some text.   " print(text.strip())` |

    | Structured Query Language | See SQL. |'
