- md: '## Part II


    In Part II, you are given some larger challenges which utilize the programming
    skills you learnt in Part I and allow you to consolidate and reinforce the techniques
    you have been practising. In this section, you are not given the help and example
    code that is given in Part I and it will take longer to solve each challenge.
    After each challenge, you are given one possible answer that you may find useful
    if you are stuck. However, you may have found another solution that works just
    as well.


    ![](img/aa0de6941c73766c7e64e4280511b158_4_0.png)


    ## Who Is This Book For?


    ![](img/aa0de6941c73766c7e64e4280511b158_4_1.png)


    This book is suitable for anyone who wants to learn how to program with Python.
    It is an essential tool for teachers and students in Key Stage 3 or those studying
    computer science who need help and ready-made examples to practise programming
    techniques and build confidence. It can also be used to help with a computer science
    programming project resource bank, to help pupils needing additional support or
    just a quick reminder of the syntax when creating programs.


    ## Downloading Python


    You can download Python for free from the official Python website:


    www.python.org/downloads/


    ![](img/aa0de6941c73766c7e64e4280511b158_5_0.png)


    Click on the latest version (in the example above, click on the **Download Python
    3.6.2** button) to start the installation.


    The program will download an executable (.exe) file. When you run this program,
    you will see an install window like the one shown below.


    ![](img/aa0de6941c73766c7e64e4280511b158_5_1.png)


    Click the **Install Now** option and the program will start installing Python
    onto your system.


    ## Running Python


    To start Python on a Windows system, click on the **Windows** icon or **Start**
    menu and select the IDLE (Python version number) option as highlighted below.


    ![](img/aa0de6941c73766c7e64e4280511b158_6_0.png)


    ![](img/aa0de6941c73766c7e64e4280511b158_6_1.png)


    ![](img/aa0de6941c73766c7e64e4280511b158_6_2.png)


    ## Some Tips


    ### File Location


    On a Windows system, the Python folder is usually found in the C:\ drive and will
    be named **Python36** (or similar) and the files will automatically be saved in
    the same location, unless you save them specifically in another location.


    ![](img/aa0de6941c73766c7e64e4280511b158_7_0.png)


    ### Using Comments


    Comments are a very useful tool for programmers. They serve two purposes:


    - adding an explanation of how the program works;

    - stopping parts of the program from working temporarily so you can run and test
    other parts of the program.


    The first, and original, purpose of explaining how a program works is so other
    programmers can make sense of your programs in case your code needs to be altered
    and updated in the future and to remind you about why you wrote particular lines
    of code.


    ```

    print("This is a simple program")

    print() #Outputs a blank line to help with layout

    name = input("Please input your name: ")#Asks for an input

    print("Hello", name) #Joins "Hello" and their name together

    ```


    In this example, comments have been added at the end of the last three lines.
    They are shown in red and start with the # symbol.


    In reality, you would not add comments on lines which contain obvious code as
    it would clutter the screen; you would only add comments where necessary.


    As Python knows to ignore anything after a # symbol, programmers soon started
    to use # at the start of lines of their code to block out sections they do not
    want to run so they can focus on and test others.


    ```

    #print("This is a simple program")

    print()

    name = input("Please input your name: ")

    print("Hello", name)

    ```


    In this example, the # has been added to the first line of the program to temporarily
    stop it from running. To bring it back into the running order simply delete the
    # and the code will be reactivated.


    In this guide, we have not included any comments to the programs so you have to
    read the code to make sense of it. That way you will really learn how to code!
    If you are creating programs as part of your coursework you should add comments
    to explain your programming to the examiner.


    ## Formatting Python


    In most versions of Python IDLE it is possible to quickly add comments and indent
    code using the menus. This way, if you need to block out entire areas using a
    comment you simply highlight the lines and then select the **Format** menu and
    select **Comment Out Region**. Similarly, if you need to indent a region (we will
    look at the reason for indenting code later) then you can also easily do this
    with the menu.


    ![](img/aa0de6941c73766c7e64e4280511b158_8_0.png)


    Okay, that is all the "housekeeping" out of the way. No more procrastinating;
    take a deep breath and away we go...


    ## Part I


    Learning Python


    ![](img/aa0de6941c73766c7e64e4280511b158_10_0.png)


    ## The Basics


    ### Explanation


    This is the **shell** window and is the first screen you see when you launch Python.


    ![](img/aa0de6941c73766c7e64e4280511b158_12_0.png)


    It is possible to write Python code straight into the shell, but as soon as you
    hit [Return] at the end of a line, it will run that line of code. This may be
    suitable for using Python as a quick calculator; for instance, you can type in
    **3*5** at the prompt and Python will show the answer **15** on the next line;
    however, this style of inputting is not useful for more complex programs.


    ![](img/aa0de6941c73766c7e64e4280511b158_12_1.png)


    It is much better to start a new window, create all the code in the new window,
    save your code and run it.


    ![](img/aa0de6941c73766c7e64e4280511b158_12_2.png)


    To create a new window in which to write your code, select **File** and **New**.
    Once you enter your code in this new window you can save it and run it all in
    one go. This will then run the code in the shell window.


    Alternatively, Python programs can be written using any text editor and must be
    saved with the file name extension .py in order to work. These programs can then
    be run from the command prompt by typing in the full directory root and file name.


    ![](img/aa0de6941c73766c7e64e4280511b158_12_3.png)


    ![](img/aa0de6941c73766c7e64e4280511b158_12_4.png)


    Challenges 1 - 11: The Basics


    ## Running Your Program


    Every time you run the code your program will need to be saved afresh in case
    there have been any changes to it.


    In this version of Python, you can run the program by selecting the **Run** menu
    and selecting **Run Module**. Alternatively, you can press the **[F5]** key. If
    this is the first time the program is saved, Python will prompt you to name and
    save the file before it will allow the program to run.


    ![](img/aa0de6941c73766c7e64e4280511b158_13_0.png)


    ## Important Things to Note When Writing Your Programs


    **Python is case sensitive** so it is important that you use the correct case,
    otherwise your code will not work.


    ![](img/aa0de6941c73766c7e64e4280511b158_13_1.png)


    Text values need to appear in speech marks ("") but numbers do not.


    When naming **variables** (i.e. values that you want to store data in) you cannot
    use any dedicated words such as print, input, etc. otherwise your code will not
    work.


    When saving your files **do not save them with any dedicated words** that Python
    already uses, such as print, input, etc. If you do this it will not run and you
    will need to rename the file before it works.


    To edit a program you have saved and closed, right-click on the file and select
    **Edit with IDLE**. If you just double-click on the file it will only try to run
    it and you will not be able to edit it.


    ## Example Code


    ```

    num1 = 93

    Set the value of a variable, if there is not a variable already created, it will
    create one. A variable is a container for a value (in this case the variable will
    be called "num1" and store the value 93). The value stored in the variable can
    change while the program is running. The variable can be called whatever you want
    (except Python dedicated words such as print, save, etc.) and it must start with
    a letter rather than a number or symbol and have no spaces.

    ```


    ```

    answer = num1 + num2

    Adds together num1 and num2 and stores the answer in a variable called answer.

    ```


    ```

    answer = num1 - num2

    Subtracts num2 from num1 and stores the answer in a variable called answer.

    ```


    ```

    answer = num1 * num2

    Multiplies num1 by num2 and stores the answer in a variable called answer.

    ```


    ```

    answer = num1 / num2

    Divides num1 by num2 and stores the answer in a variable called answer.

    ```


    ```

    answer = num1 // num2

    A whole number division (i.e. 9//4 = 2) and stores the answer in a variable called
    answer.

    ```


    ![](img/aa0de6941c73766c7e64e4280511b158_14_0.png)


    ```

    print ("This is a message")

    Displays the message in the brackets. As the value we want displayed is a text
    value it has the speech marks, which will not be displayed in the output. If you
    wanted to display a numerical value or the contents of a variable, the speech
    marks are not needed.

    ```


    ```

    print ("First line\nSecond line")

    "\n" is used as a line break.

    ```


    ```

    print ("The answer is", answer)

    Displays the text "The answer is" and the value of the variable answer.

    ```


    ```

    textValue = input("Enter a text value: ")

    Displays the question "Enter a text value: " and stores the value the user enters
    in a variable called textValue. The space after the colon allows a space to be
    added before the user enters their answer, otherwise they appear squashed unattractively
    together.

    ```


    ```

    numValue = int(input("Enter a number: "))

    Displays the question "Enter a number: " and stores the value as an integer (a
    whole number) in a variable called numValue Integers can be used in calculations
    but variables stored as text cannot.

    ```


    ![](img/aa0de6941c73766c7e64e4280511b158_14_1.png)'
  mdcn: '## 第二部分


    在第二部分中，你将面对一些更大的挑战，这些挑战将运用你在第一部分学到的编程技能，并帮助你巩固和强化一直在练习的技术。在本节中，你不会得到第一部分中提供的帮助和示例代码，解决每个挑战将需要更长时间。每个挑战之后，你会得到一个可能的答案，如果你遇到困难，可能会觉得有用。不过，你也可能找到了另一个同样有效的解决方案。


    ![](img/aa0de6941c73766c7e64e4280511b158_4_0.png)


    ## 这本书适合谁？


    ![](img/aa0de6941c73766c7e64e4280511b158_4_1.png)


    本书适合任何想学习如何用 Python 编程的人。对于需要帮助和现成示例来练习编程技术并建立信心的初中教师和学生，或学习计算机科学的人来说，它是一个必备工具。它也可以用于帮助建立计算机科学编程项目资源库，为需要额外支持的学生提供帮助，或者在创建程序时快速回顾语法。


    ## 下载 Python


    你可以从 Python 官方网站免费下载 Python：


    www.python.org/downloads/


    ![](img/aa0de6941c73766c7e64e4280511b158_5_0.png)


    点击最新版本（在上面的示例中，点击 **Download Python 3.6.2** 按钮）开始安装。


    程序将下载一个可执行文件（.exe）。当你运行这个程序时，你会看到一个如下所示的安装窗口。


    ![](img/aa0de6941c73766c7e64e4280511b158_5_1.png)


    点击 **Install Now** 选项，程序将开始将 Python 安装到你的系统上。


    ## 运行 Python


    要在 Windows 系统上启动 Python，请点击 **Windows** 图标或 **开始** 菜单，然后选择 IDLE（Python 版本号）选项，如下所示。


    ![](img/aa0de6941c73766c7e64e4280511b158_6_0.png)


    ![](img/aa0de6941c73766c7e64e4280511b158_6_1.png)


    ![](img/aa0de6941c73766c7e64e4280511b158_6_2.png)


    ## 一些提示


    ### 文件位置


    在 Windows 系统上，Python 文件夹通常位于 C:\ 驱动器中，名称为 **Python36**（或类似名称），除非你特别将文件保存到其他位置，否则文件将自动保存在同一位置。


    ![](img/aa0de6941c73766c7e64e4280511b158_7_0.png)


    ### 使用注释


    注释是程序员非常有用的工具。它们有两个目的：


    -   添加对程序工作方式的解释；

    -   临时停止程序的某些部分运行，以便你可以运行和测试程序的其他部分。


    第一个也是最初的目的，即解释程序的工作方式，是为了让其他程序员能够理解你的程序，以防将来需要修改和更新你的代码，并提醒你为什么编写特定的代码行。


    ```

    print("This is a simple program")

    print() #Outputs a blank line to help with layout

    name = input("Please input your name: ")#Asks for an input

    print("Hello", name) #Joins "Hello" and their name together

    ```


    在这个例子中，注释被添加在最后三行的末尾。它们以红色显示，并以 # 符号开头。


    实际上，你不会在包含明显代码的行上添加注释，因为这会使屏幕变得杂乱；你只会在必要时添加注释。


    由于 Python 知道忽略 # 符号之后的任何内容，程序员很快就开始在代码行的开头使用 # 来屏蔽他们不想运行的部分，以便专注于测试其他部分。


    ```

    #print("This is a simple program")

    print()

    name = input("Please input your name: ")

    print("Hello", name)

    ```


    在这个例子中，# 被添加到程序的第一行，以临时停止其运行。要使其恢复运行，只需删除 #，代码就会重新激活。


    在本指南中，我们没有在程序中添加任何注释，因此你必须阅读代码才能理解它。这样你才能真正学会如何编码！如果你正在创建作为课程作业一部分的程序，你应该添加注释来向考官解释你的编程。


    ## 格式化 Python


    在大多数版本的 Python IDLE 中，可以使用菜单快速添加注释和缩进代码。这样，如果你需要用注释屏蔽整个区域，只需高亮显示这些行，然后选择 **Format**
    菜单并选择 **Comment Out Region**。同样，如果你需要缩进一个区域（我们稍后会讨论缩进代码的原因），你也可以通过菜单轻松完成。


    ![](img/aa0de6941c73766c7e64e4280511b158_8_0.png)


    好了，所有的“内务处理”都完成了。别再拖延了；深吸一口气，我们开始吧...


    ## 第一部分


    学习 Python


    ![](img/aa0de6941c73766c7e64e4280511b158_10_0.png)


    ## 基础知识


    ### 解释


    这是 **shell** 窗口，是你启动 Python 时看到的第一个屏幕。


    ![](img/aa0de6941c73766c7e64e4280511b158_12_0.png)


    你可以直接在 shell 中编写 Python 代码，但一旦你在行尾按下 [Return]，它就会运行该行代码。这可能适合将 Python 用作快速计算器；例如，你可以在提示符下输入
    **3*5**，Python 将在下一行显示答案 **15**；然而，这种输入方式对于更复杂的程序并不实用。


    ![](img/aa0de6941c73766c7e64e4280511b158_12_1.png)


    最好启动一个新窗口，在新窗口中创建所有代码，保存代码并运行它。


    ![](img/aa0de6941c73766c7e64e4280511b158_12_2.png)


    要创建一个新窗口来编写代码，请选择 **File** 和 **New**。一旦你在这个新窗口中输入代码，你就可以一次性保存并运行它。这将在 shell 窗口中运行代码。


    或者，Python 程序可以使用任何文本编辑器编写，并且必须以文件扩展名 .py 保存才能运行。然后可以通过在命令提示符下输入完整的目录路径和文件名来运行这些程序。


    ![](img/aa0de6941c73766c7e64e4280511b158_12_3.png)


    ![](img/aa0de6941c73766c7e64e4280511b158_12_4.png)


    挑战 1 - 11：基础知识


    ## 运行你的程序


    每次运行代码时，你的程序都需要重新保存，以防有任何更改。


    在这个版本的 Python 中，你可以通过选择 **Run** 菜单并选择 **Run Module** 来运行程序。或者，你可以按 **[F5]** 键。如果这是程序第一次保存，Python
    会提示你命名并保存文件，然后才允许程序运行。


    ![](img/aa0de6941c73766c7e64e4280511b158_13_0.png)


    ## 编写程序时需要注意的重要事项


    **Python 区分大小写**，因此使用正确的大小写非常重要，否则你的代码将无法工作。


    ![](img/aa0de6941c73766c7e64e4280511b158_13_1.png)


    文本值需要出现在引号（""）中，但数字不需要。


    在命名 **变量**（即你想要存储数据的值）时，你不能使用任何专用词，如 print、input 等，否则你的代码将无法工作。


    保存文件时，**不要使用 Python 已经使用的任何专用词**（如 print、input 等）来保存它们。如果你这样做，它将无法运行，你需要重命名文件才能使其工作。


    要编辑已保存并关闭的程序，请右键单击该文件并选择 **Edit with IDLE**。如果你只是双击该文件，它只会尝试运行它，你将无法编辑它。


    ## 示例代码


    ```

    num1 = 93

    设置一个变量的值，如果尚未创建变量，它将创建一个。变量是值的容器（在这种情况下，变量将被称为 "num1" 并存储值 93）。存储在变量中的值可以在程序运行时更改。变量可以是你想要的任何名称（除了
    Python 专用词，如 print、save 等），它必须以字母而不是数字或符号开头，并且不能有空格。

    ```


    ```

    answer = num1 + num2

    将 num1 和 num2 相加，并将答案存储在名为 answer 的变量中。

    ```


    ```

    answer = num1 - num2

    从 num1 中减去 num2，并将答案存储在名为 answer 的变量中。

    ```


    ```

    answer = num1 * num2

    将 num1 乘以 num2，并将答案存储在名为 answer 的变量中。

    ```


    ```

    answer = num1 / num2

    将 num1 除以 num2，并将答案存储在名为 answer 的变量中。

    ```


    ```

    answer = num1 // num2

    整数除法（即 9//4 = 2），并将答案存储在名为 answer 的变量中。

    ```


    ![](img/aa0de6941c73766c7e64e4280511b158_14_0.png)


    ```

    print ("This is a message")

    显示括号中的消息。由于我们想要显示的值是文本值，它带有引号，这些引号不会在输出中显示。如果你想显示一个数值或变量的内容，则不需要引号。

    ```


    ```

    print ("First line\nSecond line")

    "\n" 用作换行符。

    ```


    ```

    print ("The answer is", answer)

    显示文本 "The answer is" 和变量 answer 的值。

    ```


    ```

    textValue = input("Enter a text value: ")

    显示问题 "Enter a text value: " 并将用户输入的值存储在名为 textValue 的变量中。冒号后的空格允许在用户输入答案之前添加一个空格，否则它们会难看地挤在一起。

    ```


    ```

    numValue = int(input("Enter a number: "))

    显示问题 "Enter a number: " 并将值作为整数（一个整数）存储在名为 numValue 的变量中。整数可用于计算，但存储为文本的变量则不能。

    ```


