  md: '# Reading and Writing to a .csv File


    # Explanation


    CSV stands for Comma Separated Values and is a format usually associated with
    importing and exporting from spreadsheets and databases. It allows greater control
    over the data than a simple text file, as each row is split up into identifiable
    columns. Below is an example of data you may want to store.


    | Name | Age | Star sign |

    |---|---|---|

    | Brian | 73 | Taurus |

    | Sandra | 48 | Virgo |

    | Zoe | 25 | Scorpio |

    | Keith | 43 | Leo |


    ![](img/aa0de6941c73766c7e64e4280511b158_92_0.png)


    A .csv file would store the above data as follows:


    ![](img/aa0de6941c73766c7e64e4280511b158_92_1.png)


    ```

    Brian, 73, Taurus

    Sandra, 48, Virgo

    Zoe, 25, Scorpio

    Keith, 43, Leo

    ```


    However, it may be easier to think of it as being separated into columns and rows
    that use an index number to identify them.


    | | 0 | 1 | 2 |

    |---|---|---|---|

    | 0 | Brian | 73 | Taurus |

    | 1 | Sandra | 48 | Virgo |

    | 2 | Zoe | 25 | Scorpio |

    | 3 | Keith | 43 | Leo |'
  merge: -1
  pgno: 92
- img_proc: true
  md: '# 92 Challenges 111 - 117: Reading and Writing to a .csv File


    When opening a .csv file to use, you must specify how that file will be used.
    The options are:


    | Code | Description |

    |---|---|

    | w | Creates a new file and writes to that file. If the file already exists,
    a new file will be created, overwriting the existing file. |

    | x | Creates a new file and writes to that file. If the file already exists,
    the program will crash rather than overwrite it. |

    | r | Opens for reading only and will not allow you to make changes. |

    | a | Opens for writing, appending to the end of the file. |


