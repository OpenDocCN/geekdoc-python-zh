    \ be repeated an unknown number of times as long as a condition is being met.\
    \ This may be 100 times, just the once or even never. In a while loop the condition\
    \ is checked before the code is run, which means it could skip the loop altogether\
    \ if the condition is not being met to start with. It is important, therefore,\
    \ to make sure the correct conditions are in place to run the loop before it starts.\n\
    \n![](img/aa0de6941c73766c7e64e4280511b158_41_0.png)\n\nIn Python the example\
    \ for the flow chart above would look as follows:\n\n```\npython\nagain = \"yes\"\
    \nwhile again == \"yes\":\n    print (\"Hello\")\n    again=input(\"Do you want\
    \ to loop again? \")\n```\n\nIt will keep repeating this code until the user enters\
    \ anything other than \"yes\"."
