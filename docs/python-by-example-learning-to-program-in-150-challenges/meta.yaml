  md: "# Example Code\n\nThe following examples are all part of the same program and\
    \ would be displayed in the order shown here.\n\n```\ndef get_data():\n    user_name\
    \ = input(\"Enter your name: \")\n    user_age = int(input(\"Enter your age: \"\
    ))\n    data_tuple = (user_name, user_age)\n    return data_tuple\n\nDefines a\
    \ subprogram called \"get_data()\" which will ask the user for their name and\
    \ age. As we want to send more than one piece of data back to the main program\
    \ for other parts of the program to use, we have combined them together. The return\
    \ line can only return a single value, which is why we combined the user_name\
    \ and user_age variables into a tuple (see page 58) called data_tuple.\n```\n\n\
    ```\ndef message(user_name, user_age):\n    if user_age <= 10:\n        print(\"\
    Hi\", user_name)\n    else:\n        print(\"Hello\", user_name)\n\nDefines a\
    \ subprogram called message() which uses two variables that have previously been\
    \ defined (user_name and user_age).\n```\n\n![](img/aa0de6941c73766c7e64e4280511b158_102_0.png)\n\
    \n```\ndef main():\n    user_name, user_age = get_data()\n    message(user_name,\
    \ user_age)\n\nDefines a subprogram called main() which obtains the two variables\
    \ from the get_data() subprogram. These must be labelled in the same order as\
    \ they were defined in the tuple. It then calls the message() subprogram to run\
    \ with the two variables.\n```\n\n```\nmain()\n\nRuns the main() subprogram.\n\
    ```\n\n![](img/aa0de6941c73766c7e64e4280511b158_102_1.png)\n\n![](img/aa0de6941c73766c7e64e4280511b158_102_2.png)"
