    ```\n\n## 2D Lists and Dictionaries\n\n### Explanation\n\nTechnically it is possible\
    \ to create a two-dimensional array in Python, but as Python arrays are limited\
    \ to storing numbers and most Python programmers feel more comfortable with working\
    \ with lists, 2D arrays are rarely used and **2D lists** are far more common.\n\
    \nImagine, for one terrifying moment, you are a teacher. Scary I know! Also imagine\
