    )\n```\n\n![](img/aa0de6941c73766c7e64e4280511b158_17_0.png)\n\n## # If 语句\n\n\
    ## ## 解释\n\n**If 语句**允许你的程序做出决策，并改变程序执行的路径。\n\n![](img/aa0de6941c73766c7e64e4280511b158_18_0.png)\n\
    \n下面是此流程图的 if 语句在 Python 中的写法。\n\n```\npython\nif num1 > 10:\n    print(\"This\
    \ is over 10\")\nelif num1 == 10:\n    print(\"This is equal to 10\")\nelse:\n\
    \    print(\"This is under 10\")\n```\n\n## 代码行缩进\n\n缩进在 Python 中非常重要，因为它显示了哪些行依赖于其他行，如前一页的示例所示。要缩进文本，你可以使用\
    \ [Tab] 键，或者按 [空格键] 五次。[退格] 键将删除缩进。\n\nif 语句的第一行测试一个条件，如果该条件满足（即第一个条件为真），则直接在其下方的代码行将运行。如果不满足（即第一个条件为假），它将测试第二个条件（如果有的话），依此类推。下面是你可以在\
    \ if 语句的条件行中使用的不同比较和逻辑运算符的示例。\n\n## 比较运算符\n\n## 逻辑运算符\n\n| 运算符 | 描述 |\n| --- |\
    \ --- |\n| == | 等于 |\n| != | 不等于 |\n| > | 大于 |\n| < | 小于 |\n| >= | 大于或等于 |\n|\
    \ <= | 小于或等于 |\n\n| 运算符 | 描述 |\n| --- | --- |\n| and | 两个条件都必须满足 |\n| or | 任一条件必须满足\
    \ |\n\n![](img/aa0de6941c73766c7e64e4280511b158_19_0.png)\n\n## 示例代码\n\n请注意：在所示示例中，`num`\
    \ 是用户输入并存储为整数的变量。\n\n```\nif num > 10:\n    print(\"This is over 10\")\nelse:\n\
    \    print(\"This is not over 10\")\n```\n\n如果 `num1` 大于 10，它将显示消息 \"This is over\
    \ 10\"，否则它将显示消息 \"This is under 10\"。\n\n![](img/aa0de6941c73766c7e64e4280511b158_20_0.png)\n\
    \n```\nif num > 10:\n    print(\"This is over 10\")\nelif num == 10:\n    print(\"\
    This is equal to 10\")\nelse:\n    print(\"This is under 10\")\n```\n\n如果 `num1`\
    \ 大于 10，它将显示消息 \"This is over 10\"，否则它将检查下一个条件。如果 `num1` 等于 10，它将显示消息 \"This is\
    \ equal to 10\"。否则，如果前两个条件都不满足，它将显示消息 \"This is under 10\"。\n\n![](img/aa0de6941c73766c7e64e4280511b158_20_1.png)\n\
    \n```\nif num >= 10:\n    if num <= 20:\n        print(\"This is between 10 and\
    \ 20\")\n    else:\n        print(\"This is over 20\")\nelse:\n    print(\"This\
    \ is under 10\")\n```\n\n如果 `num1` 大于或等于 10，那么它将测试另一个 if 语句，以查看 `num1` 是否小于或等于\
    \ 20。如果是，它将显示消息 \"This is between 10 and 20\"。如果 `num1` 不小于或等于 20，那么它将显示消息 \"\
    This is over 20\"。如果 `num1` 不大于 10，它将显示消息 \"This is under 10\"。\n\n![](img/aa0de6941c73766c7e64e4280511b158_20_2.png)\n\
    \n```\ntext = str.lower(text)\n```\n\n将文本转换为小写。由于 Python 区分大小写，这会将用户输入的数据转换为小写，以便更容易检查。\n\
    \n## 20 挑战 12 - 19：If 语句\n\n```\nnum = int(input(\"Enter a number between 10 and\
    \ 20: \"))\nif num >= 10 and num <= 20:\n    print(\"Thank you\")\nelse:\n   \
    \ print(\"Out of range\")\n```\n\n这使用 **and** 来测试 if 语句中的多个条件。两个条件都必须满足才能产生输出\
    \ \"Thank you\"。\n\n```\nnum = int(input(\"Enter an EVEN number between 1 and\
    \ 5: \"))\nif num == 2 or num == 4:\n    print(\"Thank you\")\nelse:\n    print(\"\
    Incorrect\")\n```\n\n这使用 **or** 来测试 if 语句中的条件。只需满足一个条件即可显示输出 \"Thank you\"。\n\n\
    ![](img/aa0de6941c73766c7e64e4280511b158_21_0.png)\n\n## 挑战\n\n**012**\n要求输入两个数字。如果第一个数字大于第二个，则先显示第二个数字，然后显示第一个数字，否则先显示第一个数字，然后显示第二个。\n\
    \n**013**\n要求用户输入一个小于 20 的数字。如果他们输入的数字是 20 或更大，则显示消息 \"Too high\"，否则显示 \"Thank\
    \ you\"。\n\n**014**\n要求用户输入一个介于 10 和 20 之间（包括 10 和 20）的数字。如果他们输入的数字在此范围内，则显示消息\
