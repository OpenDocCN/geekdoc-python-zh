  md: '# Introduction to Part II


    In this section, you are given some large programming challenges to work through.
    These will take longer than the previous challenges and you are likely to have
    to refer to earlier sections of the book to remind yourself of some of the key
    skills you have covered. Don''t feel bad if you need to look up key lines of code
    in previous sections; even experienced programmers get help when they come across
    a tricky piece of code with which they are not familiar. It is all part of the
    learning process and is exactly how this book was written to be used.


    Each challenge contains a list of the skills that will be needed so you can decide
    if you feel ready to attempt the challenge. It also includes a description of
    the challenge and a section outlining problems you will have to overcome. The
    solutions in this section are much larger and some are split over several pages,
    but should be read as a continuous single program for that challenge. If a program
    does need to be split across separate pages we try to split it between the subprograms
    or in a natural break if possible.


    Read each challenge all the way through before attempting it so you are aware
    of the pitfalls. Once you have read through the challenge, sit back and have a
    think about how you are going to approach it. You may want to scribble some notes,
    or if you are feeling very keen and know how, you may even venture into writing
    a flow chart. There is no point in diving straight into tapping out lines of code
    with no idea where you are heading, as you are likely to get into a muddle and
    may lose faith in your abilities. Make a plan, split the large problem into small,
    manageable chunks, and then tackle each chunk, testing each section as you go.
    Now, make yourself a drink, grab a notebook and pencil, take a deep breath, turn
    the page and have a go at the first one.


