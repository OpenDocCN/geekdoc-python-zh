    ![](img/aa0de6941c73766c7e64e4280511b158_73_1.png)\n\n**请注意：** 其他编程语言使用术语“数组”来允许存储任何数据类型，但在\
    \ Python 中数组仅存储数字，而列表允许存储任何数据类型。如果你想创建一个存储多个字符串的变量，在 Python 中你需要创建一个列表而不是数组。\n\
    \n![](img/aa0de6941c73766c7e64e4280511b158_73_2.png)\n\n## 示例代码\n\n```python\n\
