- md: '## Glossary


    | Term | Description |

    |---|---|

    | penup | Removes the pen from the page so that as the turtle moves it does not
    leave a trail behind it. `turtle.penup()` |

    | pi | Gives pi (π) to 15 decimal places. ```python import math radius = int(input("Enter
    the radius: ")) r2 = radius**2 area = math.pi*r2 print(area) ``` |

    | pop | Removes the last item from a list, tuple, dictionary, string or an array.
    `names_list.pop()` |

    | power of | See indices. |

    | primary key | A primary key in a database is a unique identifying field for
    each record. ```python cursor.execute("""CREATE TABLE IF NOT EXISTS employees(
    id integer PRIMARY KEY, name text NOT NULL, dept text NOT NULL, salary integer)""")
    ``` See SQL, database, table, record and field. |

    | print | Displays the contents between the brackets on screen. `print("Hello",
    name)` |

    | prompt | Shown as >>> in the Python shell window and allows the user to input
    directly into the shell. |

    | query | A query is used to extract data from the database. ```python cursor.execute("""SELECT
    employees.id,employees.name,dept.manager FROM employees INNER JOIN dept ON employees.dept=dept.dept
    AND employees.dept=''Sales''""") for x in cursor.fetchall(): print(x) ``` See
    SQL, database, table and field. |

    | quote mark | See speech mark. |

    | randint | Generates a random number. `num = random.randint(1,10)` |

    | random | Generates a random floating point number between 0 and 1. `num = random.random()`
    |

    | random library | To use the random library in Python you must have the line
    "import random" at the start of your program. See also randint, choice, random
    and randrange. ```python import random num = random.randint(1,10) correct = False
    while correct == False: guess = int(input("Enter a number: ")) if guess == num:
    correct = True elif guess > num: print("Too high") else: print("Too low") ```
    |

    | randrange | Picks a number from within a range of numbers. It is possible to
    even select the steps that range can take, for instance: `num = random.randrange(0,100,5)`
    This will pick a random number between the numbers 0 and 100 in steps of 5, e.g.
    it will only pick from 0, 5, 10, 15, 20, etc. |

    | range | Used to define a starting and end number in a range and can include
    the step (the difference between each number in the sequence). Usually used as
    part of a for loop. ```python for i in range(1,10,2): print(i) ``` Would produce
    the output: ``` 1 3 5 7 9 ``` |

    | read a file | Opens an existing text or .csv file so the data can be read. ```python
    file = open("Countries.txt", "r") print(file.read()) ``` See also write to a file,
    write to non-existing file, append to a file |

    | real | A data type used in SQL databases that can store a decimal place. See
    floating-point number, SQL and database. |

    | record | In a database a record is one complete set of fields; for example one
    employee''s set of data would be stored in a single row of a table. See SQL, database,
    table and field. |

    | remainder | Finds the remainder after a whole number division. ``` >>> 5%2 1
    ``` |

    | remove | Deletes an item from the list. This is useful if you do not know the
    index of that item. If there is more than one instance of the data it will only
    delete the first instance of that data. `names_list.remove("Tom")` |

    | reverse | Reverses the order of a list, tuple, dictionary, string or an array.
    `names_list.reverse()` |

    | right | Turns the turtle clockwise. `turtle.right(90)` In the above example
    it will turn 90°. |

    | round | Rounds a variable to a specified number of decimal places. `newnum =
    round(num, 2)` |

    | round brackets | Defines the values inside the brackets as a tuple. See tuple.
    ```python tuple = (''a'',''b'',''c'') for i in tuple: print(i) ``` |

    | run time error | These errors only crop up when you try to run the program.
    For instance, it may not be able to work with a variable as it is saved as a string
    when it is expecting an integer. Run time errors will crash the program and display
    an error message such as the following. ``` Traceback (most recent call last):
    File "C:/python3/CHALLENGES/testingagain.py", line 2, in <module> total = num
    + 100 TypeError: Can''t convert ''int'' object to str implicitly ``` |

    | running a program | Select the Run menu and select Run Module, alternatively
    use the F5 key. The program must be saved before it can run. |

    | shell | The first screen you see when you launch Python. |

    | sort | Sorts a list into alphabetical order and saves the list in the new order.
    This does not work if the list is storing data of different types, such as strings
    and numeric data in the same list. `names_list.sort()` |

    | sorted | Prints a list in alphabetical order. This does not alter the order
    of the original list and it is still kept in the original order. This does not
    work if the list is storing data of different types, such as strings and numeric
    data in the same list. `print(sorted(names_list))` |

    | space (removal) | See strip. |

    | speech marks | Used to define a block of code as a string. You can use either
    double quotes (") or single quotes ('') but whatever you use to start your string
    you must use the same style to define the end of the string. `print("This is a
    string")` You can use triple speech marks to preserve the formatting such as line
    breaks. ```python address = """123 Long Lane Oldtown AB1 23CD""" print(address)
    ``` |

    | SQL | Stands for Structured Query Language, which is used to communicate with
    a database. A database can contain several tables joined together, which is known
    as a relation database. Each table is made up of fields that contain similar data
    such as ID, Name, Address, etc. Each row in the table is known as a record. See
    database, field, record, table and query. |

    | SQLite | A simple database that is free to download and works well with Python.
    |

    | sqrt | Works out the square root of a number. You need to import the math library
    at the start of your program for this to work. ```python import math num = math.sqrt(100)
    print(num) ``` |

    | square brackets | Defines the values inside the brackets as a list. See list.
    ```python list = [''a'',''b'',''c''] for i in list: print(i) ``` |

    | square root | See sqrt. |

    | str | A data type as string. See string. `year = str(year)` |

    | string | Can include letters, numbers and various symbols and be enclosed by
    either double or single quotes. They cannot be used in a calculation, even if
    they only contain numbers. They can, however, be used in concatenation and joined
    onto other strings to make a larger string. See concatenation. |

    | strip | Removes additional characters from the start and end of a string. `text
    = "   This is some text.   "` `print(text.strip())` |

    | Structured Query Language | See SQL. |

    | subprogram | A block of code that can be called to run from another section
    of the program and can return a value. |

    | subtraction | Subtracts one value from another. |

    | syntax error | A programming error that occurs when statements are in the wrong
    order or contain typographical errors. |

    | table | A container for the data. A database may contain more than one table
    and these can be linked together. Below is an example of a table to store employees''
    data. ```python def get_data(): user_name = input("Enter your name: ") user_age
    = int(input("Enter age: ")) data_tuple = (user_name, user_age) return data_tuple
    def message(user_name, user_age): if user_age <= 10: print("Hi", user_name) else:
    print("Hello", user_name) def main(): user_name, user_age = get_data() message(user_name,
    user_age) main() ``` ``` >>> 5-2 3 ``` See SQL, database, field and record. |

    | ID | Name | Dept | Salary |

    |---|---|---|---|

    | 1 | Bob | Sales | 25000 |

    | 2 | Sue | IT | 28500 |

    | 3 | Tim | Sales | 25000 |

    | 4 | Anne | Admin | 18500 |

    | 5 | Paul | IT | 28500 |

    | 6 | Simon | Sales | 22000 |

    | 7 | Karen | Manufacturing | 18500 |

    | 8 | Mark | Manufacturing | 19000 |

    | 9 | George | Manufacturing | 18500 |

    | 10 | Keith | Manufacturing | 15000 |'
