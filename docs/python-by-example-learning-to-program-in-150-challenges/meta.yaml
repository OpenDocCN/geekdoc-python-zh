    # 92 Challenges 111 - 117: Reading and Writing to a .csv File


    When opening a .csv file to use, you must specify how that file will be used.
    The options are:


    | Code | Description |

    |---|---|

    | w | Creates a new file and writes to that file. If the file already exists,
    a new file will be created, overwriting the existing file. |

    | x | Creates a new file and writes to that file. If the file already exists,
    the program will crash rather than overwrite it. |

    | r | Opens for reading only and will not allow you to make changes. |

    | a | Opens for writing, appending to the end of the file. |


