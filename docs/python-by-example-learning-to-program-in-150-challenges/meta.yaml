    q1_num2 = random.randint(10,50)\nquestion1 = str(q1_num1) + \" + \" + str(q1_num2)\
    \ + \" = \"\nans1 = int(input(question1))\nrealans1 = q1_num1+q1_num2\nif ans1\
    \ == realans1:\n    score = score + 1\nq2_num1 = random.randint(10,50)\nq2_num2\
    \ = random.randint(10,50)\nquestion2 = str(q2_num1) + \" + \" + str(q2_num2) +\
    \ \" = \"\nans2 = int(input(question2))\nrealans2 = q2_num1+q2_num2\nif ans2 ==\
    \ realans2:\n    score = score + 1\n\nfile = open(\"QuizScores.csv\",\"a\")\n\
    newrecord = name+\",\"+question1+\",\"+str(ans1)+\",\"+question2+\",\"+str(ans2)+\"\
    ,\"+str(score)+\"\\n\"\nfile.write(str(newrecord))\n\nfile.close()\n```"
- md: "## Subprograms\n\n## Explanation\n\n**Subprograms** are blocks of code which\
    \ perform specific tasks and can be called upon at any time in the program to\
    \ run that code.\n\n### Advantages\n\n- You can write a block of code and it can\
    \ be used and re-used at different times during the program.\n- It makes the program\
    \ simpler to understand as the code is grouped together into chunks.\n\n### Defining\
    \ a subprogram and passing variables between subprograms\n\nBelow is a simple\
    \ program that we would normally create without subprograms but have written it\
    \ with subprograms so you can see how they work:\n\n```\ndef get_name():\n   \
    \ user_name = input(\"Enter your name: \")\n    return user_name\n\ndef print_Msg(user_name):\n\
    \    print(\"Hello\", user_name)\n\ndef main():\n    user_name = get_name()\n\
    \    print_Msg(user_name)\n\nmain()\n```\n\nThis program uses three subprograms\
    \ **get_name()**, **print_Msg()** and **main()**.\n\nThe **get_name()** subprogram\
    \ will ask the user to input their name and then it will return the value of the\
    \ variable \"user_name\" so that it can be used in another subprogram. This is\
    \ very important. If you do not return the values, then the values of any variables\
    \ that were created or altered in that subprogram cannot be used elsewhere in\
    \ your program.\n\n![](img/aa0de6941c73766c7e64e4280511b158_100_0.png)\n\nThe\
    \ **print_Msg()** subprogram will display the message \"Hello\" and then the user\
    \ name. The variable \"user_name\" appears in the brackets as the current value\
    \ of the variable is being imported into the subprogram so it can be used.\n\n\
    The **main()** subprogram will get the user_name from the **get_name()** subprogram\
    \ (using the variable user_name) as this was returned from the **get_name()**\
    \ subprogram. It will then use that user_name variable in the **print_Msg()**\
    \ subprogram.\n\nThe last line \"**main()**\" is the actual program itself. All\
    \ this will do is start the **main()** subprogram running.\n\nObviously, there\
    \ is no need to create such a convoluted way of performing what is in fact a very\
    \ simple program, but this is only used as an example of how subprograms are laid\
    \ out and variables can be used and passed between the subprograms.\n\n> **Please\
    \ note:** Python does not like surprises, so if you are going to use a subprogram\
    \ in a program, Python must have read the \"**def subprogram_name()**\" line before\
    \ so it knows where to go to find it. If you try to refer to a subprogram before\
    \ Python has read about it, it panics and will crash. When calling a subprogram,\
    \ the subprogram must be written **above** the section of code you use to call\
    \ it. Python will read from the top down and **run** the first line it comes across\
    \ that has not been indented and does not start with the word def. In the program\
    \ above this would be **main()**.\n\n![](img/aa0de6941c73766c7e64e4280511b158_101_0.png)\n\
    \n![](img/aa0de6941c73766c7e64e4280511b158_101_1.png)\n\n**Remember:** never surprise\
    \ Python as it will not like it - good advice for life generally.\n\n![](img/aa0de6941c73766c7e64e4280511b158_101_2.png)\n\
    \n![](img/aa0de6941c73766c7e64e4280511b158_101_3.png)\n\n### Example Code\n\n\
    The following examples are all part of the same program and would be displayed\
    \ in the order shown here.\n\n```\ndef get_data():\n    user_name = input(\"Enter\
    \ your name: \")\n    user_age = int(input(\"Enter your age: \"))\n    data_tuple\
    \ = (user_name, user_age)\n    return data_tuple\n\nDefines a subprogram called\
    \ \"get_data()\" which will ask the user for their name and age. As we want to\
    \ send more than one piece of data back to the main program for other parts of\
    \ the program to use, we have combined them together. The return line can only\
    \ return a single value, which is why we combined the user_name and user_age variables\
    \ into a tuple (see page 58) called data_tuple.\n```\n\n```\ndef message(user_name,\
    \ user_age):\n    if user_age <= 10:\n        print(\"Hi\", user_name)\n    else:\n\
    \        print(\"Hello\", user_name)\n\nDefines a subprogram called message()\
    \ which uses two variables that have previously been defined (user_name and user_age).\n\
    ```\n\n![](img/aa0de6941c73766c7e64e4280511b158_102_0.png)\n\n```\ndef main():\n\
    \    user_name, user_age = get_data()\n    message(user_name, user_age)\n\nDefines\
    \ a subprogram called main() which obtains the two variables from the get_data()\
    \ subprogram. These must be labelled in the same order as they were defined in\
    \ the tuple. It then calls the message() subprogram to run with the two variables.\n\
    ```\n\n```\nmain()\n\nRuns the main() subprogram.\n```\n\n![](img/aa0de6941c73766c7e64e4280511b158_102_1.png)\n\
    \n![](img/aa0de6941c73766c7e64e4280511b158_102_2.png)\n\n### Challenges\n\n**118**\n\
    Define a subprogram that will ask the user to enter a number and save it as the\
    \ variable \"num\". Define another subprogram that will use \"num\" and count\
    \ from 1 to that number.\n\n**119**\nDefine a subprogram that will ask the user\
    \ to pick a low and a high number, and then generate a random number between those\
    \ two values and store it in a variable called \"comp_num\".\n\nDefine another\
    \ subprogram that will give the instruction \"I am thinking of a number...\" and\
    \ then ask the user to guess the number they are thinking of.\n\nDefine a third\
    \ subprogram that will check to see if the comp_num is the same as the user's\
    \ guess. If it is, it should display the message \"Correct, you win\", otherwise\
    \ it should keep looping, telling the user if they are too low or too high and\
    \ asking them to guess again until they guess correctly.\n\n**120**\nDisplay the\
    \ following menu to the user:\n1) Addition\n2) Subtraction\nEnter 1 or 2:\n\n\
    If they enter a 1, it should run a subprogram that will generate two random numbers\
    \ between 5 and 20, and ask the user to add them together. Work out the correct\
    \ answer and return both the user's answer and the correct answer.\n\nIf they\
    \ entered 2 as their selection on the menu, it should run a subprogram that will\
    \ generate one number between 25 and 50 and another number between 1 and 25 and\
    \ ask them to work out num1 minus num2. This way they will not have to worry about\
    \ negative answers. Return both the user's answer and the correct answer.\n\n\
    Create another subprogram that will check if the user's answer matches the actual\
    \ answer. If it does, display \"Correct\", otherwise display a message that will\
    \ say \"Incorrect, the answer is\" and display the real answer.\n\nIf they do\
    \ not select a relevant option on the first menu you should display a suitable\
    \ message.\n\n**121**\nCreate a program that will allow the user to easily manage\
    \ a list of names. You should display a menu that will allow them to add a name\
    \ to the list, change a name in the list, delete a name from the list or view\
    \ all the names in the list. There should also be a menu option to allow the user\
    \ to end the program. If they select an option that is not relevant, then it should\
    \ display a suitable message. After they have made a selection to either add a\
    \ name, change a name, delete a name or view all the names, they should see the\
    \ menu again without having to restart the program. The program should be made\
    \ as easy to use as possible.\n\n**122**\n\nCreate the following menu:\n1) Add\
    \ to file\n2) View all records\n3) Quit program\n\nEnter the number of your selection:\n\
    \nIf the user selects 1, allow them to add to a file called Salaries.csv which\
    \ will store their name and salary. If they select 2 it should display all records\
    \ in the Salaries.csv file. If they select 3 it should stop the program. If they\
    \ select an incorrect option they should see an error message. They should keep\
    \ returning to the menu until they select option 3.\n\n![](img/aa0de6941c73766c7e64e4280511b158_104_0.png)\n\
    \n![](img/aa0de6941c73766c7e64e4280511b158_104_1.png)\n\n**123**\n\nIn Python,\
    \ it is not technically possible to directly delete a record from a .csv file.\
    \ Instead you need to save the file to a temporary list in Python, make the changes\
    \ to the list and then overwrite the original file with the temporary list.\n\n\
    Change the previous program to allow you to do this. Your menu should now look\
    \ like this:\n\n1) Add to file\n2) View all records\n3) Delete a record\n4) Quit\
    \ program\n\nEnter the number of your selection:\n\n![](img/aa0de6941c73766c7e64e4280511b158_104_2.png)"
  mdcn: "## 子程序\n\n## 解释\n\n**子程序** 是执行特定任务的代码块，可以在程序中的任何时候被调用以运行该代码。\n\n### 优点\n\n\
    -   你可以编写一段代码，它可以在程序的不同时间被使用和重复使用。\n-   它使程序更容易理解，因为代码被分组成了块。\n\n### 定义子程序以及在子程序之间传递变量\n\
    \n下面是一个我们通常会在不使用子程序的情况下创建的简单程序，但这里使用子程序编写，以便你能看到它们是如何工作的：\n\n```\ndef get_name():\n\
    \    user_name = input(\"Enter your name: \")\n    return user_name\n\ndef print_Msg(user_name):\n\
    \    print(\"Hello\", user_name)\n\ndef main():\n    user_name = get_name()\n\
    \    print_Msg(user_name)\n\nmain()\n```\n\n这个程序使用了三个子程序 **get_name()**、**print_Msg()**\
    \ 和 **main()**。\n\n**get_name()** 子程序会要求用户输入他们的名字，然后返回变量 \"user_name\" 的值，以便它可以在另一个子程序中使用。这一点非常重要。如果你不返回值，那么在该子程序中创建或修改的任何变量的值都不能在程序的其他地方使用。\n\
    \n![](img/aa0de6941c73766c7e64e4280511b158_100_0.png)\n\n**print_Msg()** 子程序将显示消息\
    \ \"Hello\"，然后是用户名。变量 \"user_name\" 出现在括号中，因为变量的当前值被导入到子程序中以便使用。\n\n**main()**\
    \ 子程序将从 **get_name()** 子程序获取 user_name（使用变量 user_name），因为这是从 **get_name()** 子程序返回的。然后它将在\
    \ **print_Msg()** 子程序中使用该 user_name 变量。\n\n最后一行 \"**main()**\" 是实际的程序本身。它所做的就是启动\
    \ **main()** 子程序运行。\n\n显然，没有必要用如此复杂的方式来执行一个实际上非常简单的程序，但这仅用作示例，展示子程序的布局以及变量如何在子程序之间使用和传递。\n\
    \n> **请注意：** Python 不喜欢意外情况，因此如果你打算在程序中使用子程序，Python 必须在之前读取过 \"**def subprogram_name()**\"\
    \ 这一行，以便知道去哪里找到它。如果你试图在 Python 读取过子程序定义之前引用它，Python 会出错并崩溃。调用子程序时，子程序必须写在 **调用它的代码部分的上方**。Python\
    \ 将从上到下读取，并 **运行** 它遇到的第一个没有缩进且不以单词 def 开头的行。在上面的程序中，这就是 **main()**。\n\n![](img/aa0de6941c73766c7e64e4280511b158_101_0.png)\n\
    \n![](img/aa0de6941c73766c7e64e4280511b158_101_1.png)\n\n**记住：** 永远不要让 Python\
    \ 惊讶，因为它会不喜欢的——这通常是生活中很好的建议。\n\n![](img/aa0de6941c73766c7e64e4280511b158_101_2.png)\n\
    \n![](img/aa0de6941c73766c7e64e4280511b158_101_3.png)\n\n### 示例代码\n\n以下示例都是同一程序的一部分，并将按此处显示的顺序展示。\n\
    \n```\ndef get_data():\n    user_name = input(\"Enter your name: \")\n    user_age\
    \ = int(input(\"Enter your age: \"))\n    data_tuple = (user_name, user_age)\n\
    \    return data_tuple\n\nDefines a subprogram called \"get_data()\" which will\
    \ ask the user for their name and age. As we want to send more than one piece\
    \ of data back to the main program for other parts of the program to use, we have\
    \ combined them together. The return line can only return a single value, which\
    \ is why we combined the user_name and user_age variables into a tuple (see page\
    \ 58) called data_tuple.\n```\n\n```\ndef message(user_name, user_age):\n    if\
    \ user_age <= 10:\n        print(\"Hi\", user_name)\n    else:\n        print(\"\
    Hello\", user_name)\n\nDefines a subprogram called message() which uses two variables\
    \ that have previously been defined (user_name and user_age).\n```\n\n![](img/aa0de6941c73766c7e64e4280511b158_102_0.png)\n\
    \n```\ndef main():\n    user_name, user_age = get_data()\n    message(user_name,\
    \ user_age)\n\nDefines a subprogram called main() which obtains the two variables\
    \ from the get_data() subprogram. These must be labelled in the same order as\
    \ they were defined in the tuple. It then calls the message() subprogram to run\
    \ with the two variables.\n```\n\n```\nmain()\n\nRuns the main() sub程序。\n```\n\
    \n![](img/aa0de6941c73766c7e64e4280511b158_102_1.png)\n\n![](img/aa0de6941c73766c7e64e4280511b158_102_2.png)\n\
    \n### 挑战题\n\n**118**\n定义一个子程序，该子程序会要求用户输入一个数字并将其保存为变量 \"num\"。定义另一个子程序，该子程序将使用\
    \ \"num\" 并从 1 数到该数字。\n\n**119**\n定义一个子程序，该子程序会要求用户选择一个较小的数字和一个较大的数字，然后生成这两个值之间的随机数并将其存储在名为\
    \ \"comp_num\" 的变量中。\n\n定义另一个子程序，该子程序将给出指令 \"I am thinking of a number...\"，然后要求用户猜出他们正在想的数字。\n\
    \n定义第三个子程序，该子程序将检查 comp_num 是否与用户猜测的数字相同。如果相同，它应该显示消息 \"Correct, you win\"，否则它应该持续循环，告诉用户他们猜得太低或太高，并要求他们再次猜测，直到猜对为止。\n\
    \n**120**\n向用户显示以下菜单：\n1) 加法\n2) 减法\n请输入 1 或 2：\n\n如果他们输入 1，它应该运行一个子程序，该子程序生成两个\
    \ 5 到 20 之间的随机数，并要求用户将它们相加。计算出正确答案，并返回用户的答案和正确答案。\n\n如果他们在菜单上选择 2，它应该运行一个子程序，该子程序生成一个\
    \ 25 到 50 之间的数字和另一个 1 到 25 之间的数字，并要求他们计算 num1 减去 num2。这样他们就不必担心负数结果。返回用户的答案和正确答案。\n\
    \n创建另一个子程序，该子程序将检查用户的答案是否与实际答案匹配。如果匹配，显示 \"Correct\"，否则显示一条消息 \"Incorrect, the\
    \ answer is\" 并显示正确答案。\n\n如果他们在第一个菜单上没有选择相关选项，你应该显示一条合适的消息。\n\n**121**\n创建一个程序，允许用户轻松管理姓名列表。你应该显示一个菜单，允许他们向列表添加姓名、更改列表中的姓名、从列表中删除姓名或查看列表中的所有姓名。还应该有一个菜单选项允许用户结束程序。如果他们选择了不相关的选项，则应显示一条合适的消息。在他们做出选择（添加姓名、更改姓名、删除姓名或查看所有姓名）之后，应该再次看到菜单，而无需重新启动程序。该程序应该尽可能易于使用。\n\
    \n**122**\n\n创建以下菜单：\n1) 添加到文件\n2) 查看所有记录\n3) 退出程序\n\n请输入选择的编号：\n\n如果用户选择 1，允许他们添加到名为\
    \ Salaries.csv 的文件中，该文件将存储他们的姓名和工资。如果他们选择 2，则应显示 Salaries.csv 文件中的所有记录。如果他们选择\
    \ 3，则应停止程序。如果他们选择了错误的选项，应看到一条错误消息。他们应该一直返回菜单，直到选择选项 3。\n\n![](img/aa0de6941c73766c7e64e4280511b158_104_0.png)\n\
    \n![](img/aa0de6941c73766c7e64e4280511b158_104_1.png)\n\n**123**\n\n在 Python 中，技术上不可能直接从\
    \ .csv 文件中删除记录。相反，你需要将文件保存到 Python 中的一个临时列表中，对列表进行更改，然后用临时列表覆盖原始文件。\n\n修改前面的程序以允许你这样做。你的菜单现在应该如下所示：\n\
    \n1) 添加到文件\n2) 查看所有记录\n3) 删除记录\n4) 退出程序\n\n请输入选择的编号：\n\n![](img/aa0de6941c73766c7e64e4280511b158_104_2.png)"
