    Glossary


    | Term | Description |

    |---|---|

    | button | Used in a GUI with Tkinter. The code below creates a button that will
    run the subprogram "click". <br> `button1 = Button(text = "Click here", command
    = click)` <br> See Tkinter. |

    | capitalize | Changes the case so the first letter is uppercase and all other
    letters are lower case. <br> `print(name.capitalize())` |

    | choice | Selects a random choice from a list of options. <br> `selection = random.choice([''a'',''b'',''c''])`
    |

    | comma-separated values | A common textual representation for tables in which
    the values in each row are separated by commas. See csv. |

    | comments | Used to explain how a program works or to block out pieces of code
    for testing other sections. Starts with the # symbol. <br> `if salary > 50000:
    #This is a comment` <br> `    print("Too high")` <br> `#This is another comment`
    |

    | compiler | Translates a program written in a high-level language such as Python
    into a low-level language such as machine code. |

    | concatenation | Joins two strings together to form one string (see addition).
    <br> `name = firstname + surname` |

    | conditional statement | Statement used to test out a condition. Commonly used
    in if statements, while and for loops. <br> `if guess == num:` |

    | count | Counts the number of times a piece of data appears in a list, tuple,
    dictionary, string or an array. <br> `print(names_list.count("Sue"))` |

    | csv | A file type, similar to a spreadsheet or database, where data is stored
    in rows and columns. See comma-separated values. |

    | curly brackets | Defines the values inside a dictionary. <br> `scores = {"Tim":20,"Sue":35,"Bob":29}`
    |

    | database | A structured set of data. The data is held in tables and these are
    made up of fields and records. See SQL, tables, fields and records. |

    | debugging | The process of finding and removing programming errors. |

    | decimal point | See floating-point number. |

    | def | Defines a subprogram. <br> `def menu():` <br> `    print("1) Open")` <br>
    `    print("2) Close")` <br> `    selection = int(input("Selection: "))` |

    | defining a subprogram | Creates a subprogram so that it can be used in other
    parts of the program. See def. |

    | del | Deletes an item from a list. For example: <br> `del names_list[2]` <br>
    Deletes item 2 from the "names_list". |

    | dictionary | A type of list in which user-defined indexes are mapped to values.
    <br> `scores = {"Tim":20,"Sue":35,"Bob":29}` |

    | division | Divides one value by another and displays the answer as a floating-point
    number. <br> `>>> 5/2` <br> `2.5` |'
- md: '# Glossary


    | Term | Description |

    |---|---|

    | double | Allows decimal places with numbers ranging from minus 10,308 to 10,308.
    |

    | drop-down menu | See option menu and Tkinter. |

    | elif | Used in an if statement to check a new condition if previous conditions
    have not been met. |

    | else | Used in an if statement to define what happens if the previous conditions
    have not been met. |

    | else...if | See elif. |

    | entry box | Used in a GUI with Tkinter to allow the user to input data or used
    to display output. The code below creates a blank entry box. |

    | equal to | The double equal symbol is used to compare values. |

    | extend | Adds multiple items to the end of a list, tuple, dictionary, string
    or an array. |

    | field | In a database a field is a single piece of data such as a name, date
    of birth or telephone number that is stored in a table. See SQL, database, table
    and record. |

    | floating-point number | Allows decimal places with numbers ranging from minus
    1,038 to 1,038 (i.e. allows up to 38 numeric characters including a single decimal
    point anywhere in that number and can be negative or positive value). |

    | for loop | A type of loop which will repeat the block of code a set number of
    times. |

    | forward | Moves the turtle forward; if the pen is down this will leave a trail
    behind it as it moves, drawing a straight line on the screen. |

    | greater than | To check if one value is larger than another. |

    | greater than or equal to | To check if one value is larger than or equal to
    another. |

    | GUI | GUI stands for graphical user interface and uses windows, entry boxes
    and menus, which can be manipulated by a mouse. See Tkinter. |

    | hash | See comments. |

    | IDLE | Stands for "integrated development environment" and is a basic editor
    and interpreter environment for Python. |

    | if statement | Checks to see if a condition is met; if it is it will perform
    the subsequent lines of code. |

    | images | Images can be displayed using GUI. There are two ways images can be
    seen. In this first block of code the logo will be shown and this will not change
    as the program is running. In this second block of code the image will change
    depending on the value selected in an option menu. See Tkinter and option menu.
    |

    | immutable | Unchangeable. The value of immutable data cannot be altered after
    it has been created, e.g. the data in a tuple is immutable and therefore once
    a program starts running it cannot be changed. |

    | in | Can be used to check a character is in a string. This is useful in both
    for and if statements. |

    | indent | Used in Python to denote lines that belong to another statement. For
    instance, in a for loop the lines beneath it are indented as they are within the
    loop, the lines that are not indented are outside the loop. To indent a line,
    you can hit either the tab key or use the space bar. |

    | index | A number that specifies the location of a single value in a list, tuple,
    dictionary or string. Python starts counting from 0, not 1, so if the index is
    automatically generated the first item would have the index value of 0. |

    | indices | The double * is used to represent "to the power of" i.e. 4**2 is 42.
    |

    | input | Allows the user to input a value. This is usually assigned to a variable
    name. |

    | insert | Inserts an item into a set position in the list and pushes everything
    else along to make space. This will change their index numbers according to their
    new position in the list. |

    | int | Used to define a number as an integer. |

    | integer | A whole number between minus 32,768 and 32,767. |

    | interpret | To execute a program by translating it one line at a time. |

    | islower | Used to check if a string contains only lower case letters. |

    | isupper | Used to check if a string contains only upper case letters. |

    | iteration | Repeating code, for instance in a for or a while loop. |

    | label | Used in a GUI with Tkinter to display text of an image. The code below
    creates a label on the screen displaying the message shown. See Tkinter. |

    | left | Turns the turtle counter clockwise. |

    | len | Determines the length of the variable. |

    | less than | To check if one value is smaller than another. |

    | less than or equal to | To check if one value is smaller than or equal to another.
    |

    | library | A collection of code that can be used to perform a specific function.
    This is code that is not in Python standard blocks of code but can be imported
    as needed. To do this, import the library at the beginning of the program. |

    | line break | Forces the text onto a new line. |

    | list | Used like an array in other programming languages. Lists allow a group
    of data to be stored under a single variable name and can be altered while the
    program is running. |

    | list box | Used in a GUI with Tkinter. The code below creates a list box that
    is only used for output. See Tkinter. |

    | logic errors | An error that is tricky to spot. The program may look like it
    works (i.e. no error message appears) but the theory behind the program is incorrect
    so it is not working correctly. For instance, when the wrong comparison symbol
    is used. |

    | long | Whole number between minus 2,147,483,648 and 2,147,483,647. |

    | loop | See for loop and while loop. |

    | lower case | Changes a string to lower case. |

    | multiplication | Multiplies two values together. |

    | nested | A sequence inside another sequence, for instance a for loop may be
    inside an if statement and therefore the for loop is known as a nested statement
    inside the if statement. |

    | not equal to | Used to check if two values are not equal. |

    | not null | When creating an SQL table, you can specify if a field is not allowed
    to be left blank when a new record is created. See SQL, database, table and field.
    |

    | option menu | Creates a drop-down menu in a GUI. See Tkinter. |

    | or | Used to specify that only one condition needs to be met. |

    | output box | Used in a GUI with Tkinter and creates a message box which is used
    to display output. See Tkinter. |

    | passing variables | Creating or altering a variable in one subprogram and allowing
    it to be used in another section of the program. See subprogram. |

    | pendown | Places the pen on the page so that when the turtle moves it will leave
    a trail behind it. By default, the pen is down. |'
  mdcn: '# 术语表


    | 术语 | 描述 |

    |---|---|

    | double | 允许小数位，数值范围从负 10,308 到 10,308。 |

    | 下拉菜单 | 参见选项菜单和 Tkinter。 |

    | elif | 在 if 语句中使用，用于在先前条件未满足时检查新条件。 |

    | else | 在 if 语句中使用，用于定义当先前条件未满足时执行的操作。 |

    | else...if | 参见 elif。 |

    | 输入框 | 在 Tkinter 的 GUI 中使用，允许用户输入数据或用于显示输出。下面的代码创建一个空白输入框。 |

    | 等于 | 双等号用于比较值。 |

    | extend | 将多个项目添加到列表、元组、字典、字符串或数组的末尾。 |

    | 字段 | 在数据库中，字段是存储在表中的单个数据项，例如姓名、出生日期或电话号码。参见 SQL、数据库、表和记录。 |

    | 浮点数 | 允许小数位，数值范围从负 1,038 到 1,038（即允许最多 38 个数字字符，包括小数点可位于数字中的任意位置，且可以是负值或正值）。
    |

    | for 循环 | 一种循环类型，将重复执行代码块设定的次数。 |

    | forward | 移动海龟向前；如果画笔放下，移动时会在其后留下轨迹，在屏幕上绘制一条直线。 |

    | 大于 | 检查一个值是否大于另一个值。 |

    | 大于或等于 | 检查一个值是否大于或等于另一个值。 |

    | GUI | GUI 代表图形用户界面，使用窗口、输入框和菜单，可通过鼠标操作。参见 Tkinter。 |

    | hash | 参见注释。 |

    | IDLE | 代表“集成开发环境”，是 Python 的基本编辑器和解释器环境。 |

    | if 语句 | 检查条件是否满足；如果满足，将执行后续代码行。 |

    | 图像 | 可以使用 GUI 显示图像。图像有两种显示方式。在第一个代码块中，徽标将显示，并且在程序运行时不会改变。在第二个代码块中，图像将根据选项菜单中选择的值而变化。参见
    Tkinter 和选项菜单。 |

    | 不可变 | 不可更改。不可变数据的值在创建后无法更改，例如，元组中的数据是不可变的，因此一旦程序开始运行，就无法更改。 |

    | in | 可用于检查字符是否在字符串中。这在 for 和 if 语句中都很有用。 |

    | 缩进 | 在 Python 中用于表示属于另一语句的行。例如，在 for 循环中，其下方的行被缩进，因为它们在循环内，未缩进的行在循环外。要缩进一行，可以按
    Tab 键或使用空格键。 |

    | 索引 | 指定列表、元组、字典或字符串中单个值位置的数字。Python 从 0 开始计数，而不是 1，因此如果索引是自动生成的，第一个项目的索引值将为
    0。 |

    | indices | 双星号 ** 用于表示“幂运算”，即 4**2 等于 42。 |

    | input | 允许用户输入一个值。这通常赋值给一个变量名。 |

    | insert | 将项目插入列表中的指定位置，并将其他所有项目向后推以腾出空间。这将根据它们在列表中的新位置更改其索引号。 |

    | int | 用于将数字定义为整数。 |

    | 整数 | 介于负 32,768 和 32,767 之间的整数。 |

    | 解释 | 通过逐行翻译来执行程序。 |

    | islower | 用于检查字符串是否仅包含小写字母。 |

    | isupper | 用于检查字符串是否仅包含大写字母。 |

    | 迭代 | 重复代码，例如在 for 或 while 循环中。 |

    | 标签 | 在 Tkinter 的 GUI 中用于显示文本或图像。下面的代码在屏幕上创建一个标签，显示所示消息。参见 Tkinter。 |

    | left | 逆时针转动海龟。 |

    | len | 确定变量的长度。 |

    | 小于 | 检查一个值是否小于另一个值。 |

    | 小于或等于 | 检查一个值是否小于或等于另一个值。 |

    | 库 | 可用于执行特定功能的代码集合。这是不在 Python 标准代码块中的代码，但可以根据需要导入。为此，请在程序开头导入库。 |

    | 换行 | 强制文本换到新行。 |

    | 列表 | 类似于其他编程语言中的数组。列表允许将一组数据存储在单个变量名下，并且可以在程序运行时进行更改。 |

    | 列表框 | 在 Tkinter 的 GUI 中使用。下面的代码创建一个仅用于输出的列表框。参见 Tkinter。 |

    | 逻辑错误 | 一种难以发现的错误。程序可能看起来可以运行（即没有错误消息出现），但程序背后的理论不正确，因此无法正常工作。例如，使用了错误的比较符号。
    |

    | long | 介于负 2,147,483,648 和 2,147,483,647 之间的整数。 |

    | 循环 | 参见 for 循环和 while 循环。 |

    | 小写 | 将字符串转换为小写。 |

    | 乘法 | 将两个值相乘。 |

