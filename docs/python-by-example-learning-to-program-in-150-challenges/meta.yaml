    ## Explanation\n\nHere we will look at creating a GUI which includes more features\
    \ and builds on the knowledge from the previous chapter.\n\nOn this screen we\
    \ have:\n\n- changed the icon on the title bar;\n- changed the background colour\
    \ of the main window;\n- added a static image of the logo to the top left, which\
    \ will not change;\n- created a label which, at the moment, displays \"Hello\"\
    ;\n- added a Click Me button;\n- added a drop-down option entitled Select Name,\
    \ which will display three names: \"Bob\", \"Sue\" and \"Tim\" to the user;\n\
    - added a second image in the lower half of the window which will change to show\
    \ the photograph of the person selected from the drop-down list when the user\
    \ clicks on the Click Me button.\n\nAll the code to create this window can be\
    \ created using the code we looked at in the previous section and the example\
    \ code you will be looking at in this chapter.\n\nWhen using images in your program,\
    \ it is easier if they are stored in the same folder as the program. Otherwise\
    \ you need to include the entire dictionary location of the file as follows:\n\
    \n```python\nlogo = PhotoImage(file=\"c:\\Python34\\images\\logo.gif\")\n```\n\
    \nIf you store the image in the same folder as the program you only need to include\
    \ the file name as shown below:\n\n```python\nlogo = PhotoImage(file=\"logo.gif\"\
    )\n```\n\n**Please note:** it is only possible to use GIF or PGM/PPM file types\
    \ for images in Tkinter as other file types are not supported. Make sure your\
