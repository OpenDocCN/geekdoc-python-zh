  md: '# SQLite


    ![](img/aa0de6941c73766c7e64e4280511b158_135_0.png)


    # Explanation


    SQL stands for "Structured Query Language" and is the main language that the large
    database packages use. SQLite is free software that can be used as an SQL database.
    You can download the latest version of the software from www.sqlite.org.


    ![](img/aa0de6941c73766c7e64e4280511b158_135_1.png)


    From the download page you need to select one of the "Precompiled Binaries" options
    for either Mac OS or Windows that includes the "command-line-shell".


    ![](img/aa0de6941c73766c7e64e4280511b158_135_2.png)


    To use SQL you need to load the "DB Browser for SQLite" which you can download
    from https://sqlitebrowser.org.


    ![](img/aa0de6941c73766c7e64e4280511b158_135_3.png)


    ![](img/aa0de6941c73766c7e64e4280511b158_135_4.png)'
