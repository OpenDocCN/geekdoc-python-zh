    ```\n\n将笔从页面上抬起，这样当海龟移动时，它不会留下痕迹。\n\n```python\nturtle.pendown()\n```\n\n将笔放在页面上，这样当海龟移动时，它会留下痕迹。除非另有说明，笔默认是放下的。\n\
    \n```python\nturtle.pensize(3)\n```\n\n将海龟笔的大小（绘制线条的粗细）更改为3。除非更改，否则默认值为1。\n\n\
    ```python\nturtle.left(120)\n```\n\n将海龟向左转120°（逆时针）。\n\n```python\nturtle.right(90)\n\
    ```\n\n将海龟向右转90°（顺时针）。\n\n```python\nturtle.forward(50)\n```\n\n将海龟向前移动50步。\n\n\
    ![](img/aa0de6941c73766c7e64e4280511b158_53_1.png)\n\n```python\nturtle.shape(\"\
    turtle\")\n```\n\n将海龟的形状更改为看起来像一只海龟。默认情况下，海龟看起来像一个小箭头。\n\n```python\nturtle.hideturtle()\n\
    ```\n\n隐藏海龟，使其不在屏幕上显示。\n\n```python\nturtle.begin_fill()\n```\n\n在绘制形状的代码之前输入，以便它知道要填充正在绘制的形状。\n\
    \n```python\nturtle.showturtle()\n```\n\n在屏幕上显示海龟。除非另有说明，否则海龟默认是显示的。\n\n```python\n\
    turtle.end_fill()\n```\n\n在绘制形状的代码之后输入，告诉Python停止填充形状。\n\n```python\nturtle.color(\"\
    black\", \"red\")\n```\n\n定义填充形状的颜色。此示例将使形状具有黑色轮廓和红色填充。这需要在绘制形状之前输入。\n\n```python\n\
    turtle.exitonclick()\n```\n\n当用户单击海龟窗口时，它将自动关闭。"
