- md: "## Reading and Writing to a .csv File\n\n### Explanation\n\nCSV stands for\
    \ Comma Separated Values and is a format usually associated with importing and\
    \ exporting from spreadsheets and databases. It allows greater control over the\
    \ data than a simple text file, as each row is split up into identifiable columns.\
    \ Below is an example of data you may want to store.\n\n| Name | Age | Star sign\
    \ |\n|---|---|---|\n| Brian | 73 | Taurus |\n| Sandra | 48 | Virgo |\n| Zoe |\
    \ 25 | Scorpio |\n| Keith | 43 | Leo |\n\n![](img/aa0de6941c73766c7e64e4280511b158_92_0.png)\n\
    \nA .csv file would store the above data as follows:\n\n![](img/aa0de6941c73766c7e64e4280511b158_92_1.png)\n\
    \n```\nBrian, 73, Taurus\nSandra, 48, Virgo\nZoe, 25, Scorpio\nKeith, 43, Leo\n\
    ```\n\nHowever, it may be easier to think of it as being separated into columns\
    \ and rows that use an index number to identify them.\n\n| | 0 | 1 | 2 |\n|---|---|---|---|\n\
    | 0 | Brian | 73 | Taurus |\n| 1 | Sandra | 48 | Virgo |\n| 2 | Zoe | 25 | Scorpio\
    \ |\n| 3 | Keith | 43 | Leo |\n\n### 92 Challenges 111 - 117: Reading and Writing\
    \ to a .csv File\n\nWhen opening a .csv file to use, you must specify how that\
    \ file will be used. The options are:\n\n| Code | Description |\n|---|---|\n|\
    \ w | Creates a new file and writes to that file. If the file already exists,\
    \ a new file will be created, overwriting the existing file. |\n| x | Creates\
    \ a new file and writes to that file. If the file already exists, the program\
    \ will crash rather than overwrite it. |\n| r | Opens for reading only and will\
    \ not allow you to make changes. |\n| a | Opens for writing, appending to the\
    \ end of the file. |\n\n![](img/aa0de6941c73766c7e64e4280511b158_93_0.png)\n\n\
    ### Example Code\n\n```\nimport csv\nThis must be at the top of your program to\
    \ allow Python to use the .csv library of commands.\n```\n\n```\nfile = open (\"\
    Stars.csv\",\"w\")\nnewRecord = \"Brian,73,Taurus\\n\"\nfile.write(str(newRecord))\n\
    file.close()\nThis will create a new file called \"Stars.csv\", overwriting any\
    \ previous files of the same name. It will add a new record and then close and\
    \ save the changes to the file.\n```\n\n```\nfile = open (\"Stars.csv\",\"a\"\
    )\nname = input(\"Enter name: \")\nage = input(\"Enter age: \")\nstar = input(\"\
    Enter star sign: \")\nnewRecord = name + \",\" + age + \",\" + star + \"\\n\"\n\
    file.write(str(newRecord))\nfile.close()\nThis will open the Stars.csv file, ask\
    \ the user to enter the name, age and star sign, and will append this to the end\
    \ of the file.\n```\n\n![](img/aa0de6941c73766c7e64e4280511b158_94_0.png)\n\n\
    ```\nfile = open(\"Stars.csv\",\"r\")\nfor row in file:\n    print(row)\nThis\
    \ will open the Stars.csv file in read mode and display the records one row at\
    \ a time.\n```\n\n```\nfile = open(\"Stars.csv\",\"r\")\nreader = csv.reader(file)\n\
    rows = list(reader)\nprint(rows[1])\nThis will open the Stars.csv file and display\
    \ only row 1. Remember, Python starts counting from 0.\n```\n\n```\nfile = open\
    \ (\"Stars.csv\",\"r\")\nsearch = input(\"Enter the data you are searching for:\
    \ \")\nreader = csv.reader(file)\nfor row in file:\n    if search in str(row):\n\
    \        print(row)\nAsks the user to enter the data they are searching for. It\
    \ will display all rows that contain that data anywhere in that row.\n```\n\n\
    ![](img/aa0de6941c73766c7e64e4280511b158_95_0.png)\n\n```\npython\nimport csv\n\
    file = list(csv.reader(open(\"Stars.csv\")))\ntmp = []\nfor row in file:\n   \
    \ tmp.append(row)\n\nA .csv file cannot be altered, only added to. If you need\
    \ to alter the file you need to write it to a temporary list. This block of code\
    \ will read the original .csv file and write it to a list called \"tmp\". This\
    \ can then be used and altered as a list (see page 58).\n```\n\n```\npython\n\
    file = open(\"NewStars.csv\", \"w\")\nx = 0\nfor row in tmp:\n    newRec = tmp[x][0]\
