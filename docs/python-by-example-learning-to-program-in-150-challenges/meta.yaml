    # Indenting Lines of Code


    Indenting is very important in Python as it shows the lines that are dependent
    on others, as shown in the example on the previous page. In order to indent text
    you can use your [Tab] key or you can press your [space key] five times. The [backspace]
    key will remove indents.


    The first line of the if statement tests a condition, and if that condition is
    met (i.e. the first condition is true) then the lines of code directly below it
    are run. If it is not met (i.e. the first condition is false) it will test the
    second condition, if there is one, and so on. Below are examples of the different
    comparison and logical operators you can use in the condition line of your if
    statement.


    # Comparison Operators


    # Logical Operators


    | Operator | Description |

    | --- | --- |

    | == | Equal to |

    | != | Not equal to |

    | > | Greater than |

    | < | Less than |

    | >= | Greater than or equal to |

    | <= | Less than or equal to |


    | Operator | Description |

    | --- | --- |

    | and | Both conditions must be met |

    | or | Either condition must be met |


