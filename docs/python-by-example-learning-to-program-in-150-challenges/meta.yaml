    # # Random


    # ## Explanation


    Python can generate **random** values. In reality, the values are not completely
    random as no computer can cope with that; instead it uses an incredibly complex
    algorithm that makes it virtually impossible to accurately predict its outcome
    so, in effect, it acts like a random function.


    There are two types of random value that we will be looking at:


    +   - Random numbers within a specified range;

    - A random choice from a range of items that are input.


    To use these two options, you will need to import the random library. You do this
    by typing `import random` at the start of your program.


    ![](img/aa0de6941c73766c7e64e4280511b158_46_0.png)


    ![](img/aa0de6941c73766c7e64e4280511b158_46_1.png)


