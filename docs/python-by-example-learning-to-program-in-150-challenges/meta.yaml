  md: 'Glossary


    | Term | Description |

    |---|---|

    | button | Used in a GUI with Tkinter. The code below creates a button that will
    run the subprogram "click". <br> `button1 = Button(text = "Click here", command
    = click)` <br> See Tkinter. |

    | capitalize | Changes the case so the first letter is uppercase and all other
    letters are lower case. <br> `print(name.capitalize())` |

    | choice | Selects a random choice from a list of options. <br> `selection = random.choice([''a'',''b'',''c''])`
    |

    | comma-separated values | A common textual representation for tables in which
    the values in each row are separated by commas. See csv. |

    | comments | Used to explain how a program works or to block out pieces of code
    for testing other sections. Starts with the # symbol. <br> `if salary > 50000:
    #This is a comment` <br> `    print("Too high")` <br> `#This is another comment`
    |

    | compiler | Translates a program written in a high-level language such as Python
    into a low-level language such as machine code. |

    | concatenation | Joins two strings together to form one string (see addition).
    <br> `name = firstname + surname` |

    | conditional statement | Statement used to test out a condition. Commonly used
    in if statements, while and for loops. <br> `if guess == num:` |

    | count | Counts the number of times a piece of data appears in a list, tuple,
    dictionary, string or an array. <br> `print(names_list.count("Sue"))` |

    | csv | A file type, similar to a spreadsheet or database, where data is stored
    in rows and columns. See comma-separated values. |

    | curly brackets | Defines the values inside a dictionary. <br> `scores = {"Tim":20,"Sue":35,"Bob":29}`
    |

    | database | A structured set of data. The data is held in tables and these are
    made up of fields and records. See SQL, tables, fields and records. |

    | debugging | The process of finding and removing programming errors. |

    | decimal point | See floating-point number. |

    | def | Defines a subprogram. <br> `def menu():` <br> `    print("1) Open")` <br>
    `    print("2) Close")` <br> `    selection = int(input("Selection: "))` |

    | defining a subprogram | Creates a subprogram so that it can be used in other
    parts of the program. See def. |

    | del | Deletes an item from a list. For example: <br> `del names_list[2]` <br>
    Deletes item 2 from the "names_list". |

    | dictionary | A type of list in which user-defined indexes are mapped to values.
    <br> `scores = {"Tim":20,"Sue":35,"Bob":29}` |

    | division | Divides one value by another and displays the answer as a floating-point
    number. <br> `>>> 5/2` <br> `2.5` |'
