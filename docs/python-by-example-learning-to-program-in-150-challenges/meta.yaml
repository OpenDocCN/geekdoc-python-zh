  md: '# Example Code


    ![](img/aa0de6941c73766c7e64e4280511b158_127_0.png)


    ```

    window.wm_iconbitmap("MyIcon.ico")

    Changes the icon displayed in the title of the window.

    ```


    ```

    window.configure(background = "light green")

    Changes the background colour of the window, in this case to light green.

    ```


    ```

    logo = PhotoImage(file = "logo.gif")

    logoimage = Label(image = logo)

    logoimage.place(x = 30, y = 20, width = 200, height = 120)

    Displays an image in a label widget. This image will not change while the program
    is running.

    ```


    ```

    photo = PhotoImage(file = "logo.gif")

    photobox = Label(window, image = photo)

    photobox.image = photo

    photobox.place(x = 30, y = 20, width = 200, height = 120)

    This is similar to the block above but as we want the image to change as we update
    the data we need to add the code **photobox.image = photo**. which makes it updatable.

    ```


    ```

    selectName = StringVar(window)

    selectName.set("Select Name")

    namesList = OptionMenu(window, selectName, "Bob", "Sue", "Tim")

    namesList.place(x = 30, y = 250)

    Creates a variable called **selectName** which will store a string where the original
    value of the variable is "Select Name". It will then create a drop-down option
    menu which stores the value the user selects in the selectName variable and displays
    the values in the list: Bob, Sue and Tim.

    ```


    ![](img/aa0de6941c73766c7e64e4280511b158_127_1.png)'
