  md: 'All the code to create this window can be created using the code we looked
    at in the previous section and the example code you will be looking at in this
    chapter.


    When using images in your program, it is easier if they are stored in the same
    folder as the program. Otherwise you need to include the entire dictionary location
    of the file as follows:


    ```

    logo = PhotoImage(file="c:\Python34\images\logo.gif")

    ```


    If you store the image in the same folder as the program you only need to include
    the file name as shown below:


    ```

    logo = PhotoImage(file="logo.gif")

    ```


    **Please note:** it is only possible to use GIF or PGM/PPM file types for images
    in Tkinter as other file types are not supported. Make sure your images are saved
    in a suitable format and with a suitable name in the correct location before you
    start creating the programs, if at all possible, to make your life simpler.


