    ## 接下来做什么？


    ![](img/aa0de6941c73766c7e64e4280511b158_170_0.png)


    如果你已经完成了本书中的所有示例，你应该对 Python 编程的基础有了很好的理解。你已经熟悉了这门语言的语法，并开始像程序员一样思考，将较大的问题分解成你知道如何解决的小的、可管理的部分。你应该回顾一下你所学的一切，并且可以理直气壮地为你所取得的成就感到一丝满足。学习编程需要专注，而你已经证明了自己能够坚持下去，现在你已经具备了继续
    Python 之旅的基本技能。


    你在本书中学到的技能将使你能够创建强大的程序，但现在还不是坐下来放松的时候。你需要走进广阔的编程世界，了解其他程序员是如何工作的。搜索互联网，寻找新的挑战。在探索过程中，你会看到一些你不熟悉的代码，因为有多种变体可以使用。例如，对于
    Tkinter，还有另一种叫做 "pack" 的方法，许多程序员更喜欢它。它允许你使用网格方法来设计屏幕，但不允许你像我们一直使用的 place 方法那样微调对象的位置。尝试一下，你可能会更喜欢它，但要小心，因为有些技术与其他技术配合得不好。如果你想使用
    pack 方法，请不要尝试在同一个程序中将其与 place 方法混合使用。Python 不喜欢同时使用两个不同的系统，它会崩溃。


    ![](img/aa0de6941c73766c7e64e4280511b158_170_1.png)


    学习更高级编程技巧的最佳方法是尝试它们。查看其他人的代码并访问一些聊天论坛。程序员非常乐于助人，只要你的问题不是论坛上已经回答过的，他们通常都愿意帮助你。如果你在某段代码上遇到困难，那么就在论坛上寻求帮助；程序员最喜欢解决问题。你可能不一定同意他们的解决方案，它可能不是你想使用的方法，但它会让你知道如何用新的眼光看待问题，并可能向你展示一条你之前未曾考虑过的可能的解决路径。


    ![](img/aa0de6941c73766c7e64e4280511b158_170_2.png)


    无论你对自己的知识感到满意还是想进一步探索，我希望你喜欢你的编程之旅，并且这本书被证明是有用的。


    ## 术语表


    | 术语 | 描述 |

    |------|-------------|

    | 二维列表 | 创建一个多维列表。例如，要创建以下数据表：0 1 2 0 23 16 34 1 45 29 48，请输入以下代码：`number_list
    = [[23,16,34],[45,29,48]]` |

    | 加法 | 如果两个值是数字，则将它们相加 `total = num1 + num2`，如果它们包含文本，则将它们连接起来（参见连接）。`name = firstname
    + surname` |

    | 与 | 用于指定必须同时满足两个条件才能返回真值。`if num > 10 and num < 20: print("In range") else:
    print("Out of range")` |

    | 追加 | 将单个项目添加到列表、元组、字典、字符串或数组的末尾。`names_list.append("Timothy")` |

    | 追加到文件 | 打开一个现有的文本或 .csv 文件，并允许将数据添加到现有内容的末尾。`file = open("Countries.txt", "a")
    file.write("France\n") file.close` 另请参阅写入文件、写入不存在的文件、读取文件 |

    | 参数 | 传递给子程序的值。在此示例中，UserAns 是参数，并且应该在子程序外部定义。`def CheckAnswer(UserAns): if UserAns
    == 20: print("Correct") else: print("Wrong")` |

    | 数组 | 在 Python 中，数组类似于列表，但它们仅用于存储数字。用户定义具体的数字类型，即整数、长整型、双精度浮点数或浮点数。`nums = array(''i'',[45,324,654,45,264])
    print(nums)` 如果数组需要存储字符串，则需要使用列表。 |

    | 二进制大对象 | 一种完全按照输入方式存储的数据类型。参见 SQL 和数据库。 |

    | 按钮 | 在 Tkinter 的 GUI 中使用。下面的代码创建一个按钮，该按钮将运行子程序 "click"。 <br> `button1 = Button(text
    = "Click here", command = click)` <br> 参见 Tkinter。 |

    | 首字母大写 | 更改大小写，使第一个字母大写，所有其他字母小写。 <br> `print(name.capitalize())` |

    | 选择 | 从选项列表中随机选择一个。 <br> `selection = random.choice([''a'',''b'',''c''])` |

