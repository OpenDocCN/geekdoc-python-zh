    \ as Completed\n3. View Tasks\n4. Exit\nEnter your choice (1-4): 3\nCurrent Task\
    \ List:\n1. Write Python Book - Pending\n\nOptions:\n1. Add Task\n2. Mark Task\
    \ as Completed\n3. View Tasks\n4. Exit\nEnter your choice (1-4): 4\nExiting program.\n\
