    logging.getLogger().setLevel(logging.DEBUG)\n```"
  merge: -1
  pgno: 226
- img_proc: true
  md: "Exception Handling—properly implement try-except blocks to catch and handle\
    \ exceptions effectively. Logging or printing informative messages within except\
    \ blocks helps in identifying issues with greater efficiency.\n\nExample\n\n```\n\
    try:\n    # Code that might raise an exception\n    result = 10 / 0\nexcept Exception\
    \ as e:\n    # Handle the exception\n    print(f'An error occurred: {e}')\n```\n\
    \nAssertions—use assert statements to enforce assumptions about your code. When\
    \ an assertion fails, it indicates a potential issue that needs investigation.\n\
    \nExample\n\n```\ndef divide(a, b):\n    assert b != 0, \"Cannot divide by zero\"\
    \n    return a / b\n\n# Example 1: Valid division\nresult1 = divide(10, 2)\nprint(result1)\
    \ # Output: 5.0\n\n# Example 2: Division by zero (assertion fails)\nresult2 =\
    \ divide(10, 0)\n# Raises AssertionError with the message \"Cannot divide by zero\"\
    \n```\n\n# Debugging Best Practices"
  merge: -1
  pgno: 227
- img_proc: true
  md: 'Debugging is the unsung hero when it comes to programming. No programmer is
    perfect, and I have personally had conversations with some of the industry greats
    who have said, “Narry, we spend 95% of our day debugging and Googling an issue.
    The rest of the 5% is coffee and coding!”


    Bugs happen, it’s just an inevitable part of the coding process and while you
    do have the tools to debug your coding, you’ll also need to know debugging best
    practices. The universal truth when it comes to programming is that bugs are here
    to stay, but how we approach these bugs can make all the difference.


    So the first thing I’d like you to know is that debugging is not just about fixing
    errors; it''s about understanding what went wrong with your code. This allows
    you to identify patterns, and craft proper solutions. This also means that you
    need to tap into your strategic mindset. It’s this way of thinking that will encourage
    you to approach bugs with a structured plan rather than failing frustratingly.


    # Tips for Effective Debugging


    +   1. Isolate the problem—identify the specific part of the code causing issues.
    Narrow down the problem to make debugging more focused and time-efficient.


    2. Read error messages—Python is a simple language which means it’s easy to understand
    error messages and tracebacks. These often provide valuable information about
    the nature of the problem.'
  merge: -1
  pgno: 228
- img_proc: true
  md: '+   3. Step through code—use debugging tools to step through your code one
    line at a time. This allows you to examine variable values at each step to pinpoint
    errors.


    4. Consult documentation—refer to documentation for libraries and modules you''re
    using. This helps you to understand expected behaviors and can uncover misunderstandings.


    +   • Collaborate—one of the greatest selling factors when it comes to Python
    is its huge, engaging, and friendly community. When in doubt, make sure to seek
    out help from these online communities. Another perspective can often help you
    identify problems you may have overlooked.


    # Final Exercise


    We’ve reached your final exercise using Python. In this exercise, you’re going
    to a simple contact management system using Python. Your program should have the
    following features:'
  merge: -1
