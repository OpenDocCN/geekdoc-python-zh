- md: '## Labels


    When you write code, you’re naming variables and objects appropriately so that
    others can understand what you are looking at and so you know what *you’re* looking
    at immediately. Labels, or identifiers, are words that represent something in
    a way that makes the code far easier to read. Here’s an example. Let’s say you’re
    talking about a can of soda in code. Instead of naming this can of soda “variable1,”
    which would require you to go through your notes to identify it, you could name
    it “soda.”


    This saves you a whole lot of time!


    There are some dos and don’ts when it comes to labels. For example, you wouldn’t
    use variations of the same name over and over again as this would be confusing
    for you and possibly Python. Another rule is that you cannot use words that are
    part of Python’s own library of keywords. These words are reserved for different
    commands within the program itself. These include words like *True, False, import,
    print, result*, and so on.


    ## Applying Variables


    When using Python, a variable definition is handled in two separate steps. The
    first of these steps is called initialization. This refers to assigning, or determining
    the container that is identified via a label.


    The second step involves assignment. This means you attach a value to your variable
    and this determines the type of data it holds. While these two steps are defined
    separately, they actually happen at the same time and with the same process. As
    such, you probably won’t even notice it.


    You take the two steps mentioned above with the equal (=) operator. This is called
    a statement—more specifically, an assignment statement—but you already knew that
    if you were paying attention in Chapter 3!


    > Pro Tip: When coding, you should always keep your statements in proper order.


    Always remember that Python processes code by analyzing it from the top down before
    starting over. Also, keep in mind that Python has a feature called dynamic typing.
    This means it can automatically determine the kind of variable being dealt with.
    In other words, if you apply an integer to a variable, Python knows it’s an integer
    data type.


    This is great, but there is one disadvantage to dynamic typing—you may accidentally
    create a variable when you don’t need it, or assign the wrong data type to your
    variable. You need to pay attention to all the variables you have created which
    can be a lot.


    An easy way around this is to declare all of your variables at the beginning of
    your programming project. The beauty of Python is that the program isn’t affected
    by simple assignments. The reason for this is that is because you’re not instructing
    the interpreter to perform an operation. In other words, if you say ‘a is equal
    to 5’ then there’s nothing else to input.


    This, of course, doesn’t mean you have to have all your variables figured out
    before you begin programming. It just means you can start your program by declaring
    whatever you need to and then add more later, should you have to.


    Have you got the hang of applying variables? If not, I’d suggest going back and
    recapping Chapter 3. If you’ve got it, let’s move on to our next section.


    ## Strings


    Along with numbers, strings are the most basic data type when it comes to Python.
    In the examples throughout the previous chapters, you’ve already used strings—the
    line of text you input and print is this string. To put it simply, strings are
    the sets of characters that you type and which are defined between quotation marks.


    Strings contain numbers and punctuation marks, even if these are considered text,
    but numbers alone, and when defined by quotation marks, are classified under their
    own data types, like integers and floats.


    Here’s an example to simplify this concept, open up Python and type in the following,


    - charRace=‘human’

    - charGender=‘male’

    - print(charRace, charGender)


    In the code above, there are two variables, and these two variables contain their
    own string. By separating the variables with commas when writing your print statement,
    both are printed. There are multiple ways you can do this, but using commas is
    the easiest way because it ensures you have a clear separator and can find mistakes
    in your code.


    Another issue with not using commas as separators is that if you don’t want to
    use variables but you do need to concatenate strings, your text could change.
    For example, if you were to input print(“school”“teacher”) and wanted the outcome
    schoolteacher that would be fine. However, if you were looking to print, school
    teacher, the only way to achieve your desired outcome would be to separate your
    variables.


    There is one other way to separate variables when they contain their own string,
    and you’ve already practiced this as well. This is by separating your code along
    different lines.


    For example,


    ```

    x=‘human’


    y=‘male’


    x+y

    ```


    Here you’ve used a mathematical operator combined with string variables but again,
    your output is not going to be exactly what you want. Right? Unless your desired
    outcome was humanmale without a white space. Besides this undesired outcome, using
    mathematical operations requires processing power. In essence, you’re telling
    Python to use more power from your computer to perform an operation that probably
    won’t produce the exact outcome you’re after.


    As such, it’s a good idea to stick with tried and true, power-saving coding techniques
    that help keep your code simple and easy to read.


    Let’s test your string knowledge. Write a program that has an outcome of men aged
    25 to 35 for yyy’s social media demographic and women aged 19 to 24 for yyy social
    media demographic.


    Print the full string to display only men and a separate print of the full string
    to display only women demographics.


    Finally, print yyy social media’s full demographic of both women and men.


    I’ll give you a minute… The solution is on the next page.


    ## Numbers


    While numbers are fundamental to programming, they can sometimes feel complicated.
    Python, however, makes it really easy to work with them. Assigning a number to
    a variable is pretty straightforward and follows exactly the same process as other
    data types.


    Python allows you to create a variable that holds a whole number (integer) or
    a decimal number (floating-point/float).


    What this does is allow you to perform a whole variety of mathematical operations
    and calculations using Python. In the same way, words are stored in string variables,
    numbers can be stored as numeric variables and used in pretty much the same way
    as you would with words.


    We can experiment with numbers and text in a whole lot of different ways. Open
    Python and try this,


    - age=43

    - print(‘my age is’, age)


    Next, let’s play with integers using the same text string.


    - age=43

    - future_age=+7

    - print(''I will be'', age+future_age, ''in 7 years time'')


    Let’s try one more with floats or floating points. We’re going to convert Celsius
    to Fahrenheit now, using Python.


    Enter the following,


    - temperature_celsius = 25.5

    - temperature_fahrenheit = (temperature_celsius * 9/5) + 32

    - print(''The temperature in Celsius is'', temperature_celsius, ''degrees.'')

    - The temperature in Celsius is 25.5 degrees.

    - print(''The temperature in Fahrenheit is approximately'', temperature_fahrenheit,
    ''degrees.'')


    ## A Word on Operators


    I know we’re skipping back nearly an entire chapter, but since you’ve now graduated
    to more complex data inputs, there’s something I’d like to draw your attention
    to.'
  mdcn: '## 标签


    编写代码时，你需要恰当地命名变量和对象，以便他人能理解你正在查看的内容，同时也能让你立即明白*自己*在看什么。标签，或称标识符，是以一种使代码更易于阅读的方式代表某些事物的词语。举个例子，假设你在代码中谈论一罐苏打水。与其将这罐苏打水命名为“variable1”（这需要你查阅笔记才能识别），你可以将其命名为“soda”。


    这能为你节省大量时间！


    关于标签，有一些注意事项。例如，你不应该反复使用同一名称的变体，因为这会对你甚至可能对Python造成混淆。另一个规则是，你不能使用Python自身关键字库中的词语。这些词语是为程序内部的不同命令保留的。这些词包括*True、False、import、print、result*等等。


    ## 应用变量


    使用Python时，变量定义通过两个独立的步骤处理。第一步称为初始化。这指的是分配或确定通过标签标识的容器。


    第二步涉及赋值。这意味着你将一个值附加到你的变量上，这决定了它所持有的数据类型。虽然这两个步骤是分开定义的，但它们实际上同时发生且过程相同。因此，你可能甚至不会注意到它。


    你使用等号（=）运算符执行上述两个步骤。这被称为语句——更具体地说，是赋值语句——但如果你在第三章认真听讲，你已经知道这一点了！


    > 专业提示：编写代码时，你应始终按正确的顺序组织语句。


    始终记住，Python通过从上到下分析代码来处理代码，然后重新开始。另外，请记住Python有一个称为动态类型的功能。这意味着它可以自动确定正在处理的变量类型。换句话说，如果你将一个整数赋给一个变量，Python就知道它是一个整数数据类型。


    这很好，但动态类型有一个缺点——你可能在不需要时意外创建了一个变量，或者为变量分配了错误的数据类型。你需要关注你创建的所有变量，这可能有很多。


    一个简单的解决方法是在编程项目开始时声明所有变量。Python的美妙之处在于程序不会受到简单赋值的影响。原因在于你没有指示解释器执行操作。换句话说，如果你说‘a等于5’，那么就没有其他需要输入的了。


    当然，这并不意味着你必须在开始编程之前就确定所有变量。它只是意味着你可以通过声明你需要的任何内容来启动程序，然后在必要时稍后添加更多内容。


    你掌握应用变量的方法了吗？如果没有，我建议你回去回顾一下第三章。如果你已经掌握了，让我们继续下一节。


    ## 字符串


    与数字一样，字符串是Python中最基本的数据类型。在前面章节的示例中，你已经使用了字符串——你输入并打印的那行文本就是字符串。简单来说，字符串是你输入的、定义在引号之间的字符集合。


    字符串包含数字和标点符号，即使这些被视为文本，但单独的数字，当用引号定义时，会被归类为它们自己的数据类型，如整数和浮点数。


    这里有一个例子来简化这个概念，打开Python并输入以下内容，


    - charRace=‘human’

    - charGender=‘male’

    - print(charRace, charGender)


    在上面的代码中，有两个变量，这两个变量各自包含一个字符串。在编写print语句时用逗号分隔变量，两者都会被打印出来。有多种方法可以实现这一点，但使用逗号是最简单的方法，因为它确保你有一个清晰的分隔符，并且可以在代码中找到错误。


    不使用逗号作为分隔符的另一个问题是，如果你不想使用变量但需要连接字符串，你的文本可能会改变。例如，如果你输入print(“school”“teacher”)并希望结果是schoolteacher，那没问题。但是，如果你想打印school
    teacher，实现预期结果的唯一方法是分隔你的变量。


    还有另一种方法可以在变量包含自己的字符串时分隔它们，你也已经练习过了。这就是将代码分隔在不同的行上。


    例如，


    ```

    x=‘human’


    y=‘male’


    x+y

    ```


    这里你使用了数学运算符与字符串变量结合，但同样，你的输出不会完全是你想要的。对吧？除非你期望的结果是humanmale，没有空格。除了这个不理想的结果，使用数学运算需要处理能力。本质上，你是在告诉Python使用更多计算机资源来执行一个可能不会产生你想要的确切结果的操作。


    因此，坚持使用经过验证的、省电的编码技术是一个好主意，这有助于保持代码简单易读。


    让我们测试一下你的字符串知识。编写一个程序，其输出结果为：yyy社交媒体人口统计中25至35岁的男性，以及yyy社交媒体人口统计中19至24岁的女性。


    打印完整字符串以仅显示男性，并单独打印完整字符串以仅显示女性人口统计。


    最后，打印yyy社交媒体中女性和男性的完整人口统计。


    我给你一分钟时间……答案在下一页。


    ## 数字


    虽然数字是编程的基础，但有时可能会让人感觉复杂。然而，Python使得处理数字变得非常容易。将数字赋给变量非常直接，与其他数据类型遵循完全相同的过程。


    Python允许你创建一个变量来保存整数（整型）或小数（浮点数/浮点型）。


    这样做的目的是允许你使用Python执行各种数学运算和计算。同样地，单词存储在字符串变量中，数字可以存储为数值变量，并且使用方式与单词几乎相同。


    我们可以用很多不同的方式来实验数字和文本。打开Python并尝试这个，


    - age=43

    - print(‘my age is’, age)


    接下来，让我们使用相同的文本字符串来玩转整数。


    - age=43

    - future_age=+7

    - print(''I will be'', age+future_age, ''in 7 years time'')


    让我们再试一个使用浮点数或浮点数的例子。我们现在将使用Python将摄氏度转换为华氏度。


    输入以下内容，


    - temperature_celsius = 25.5

    - temperature_fahrenheit = (temperature_celsius * 9/5) + 32

    - print(''The temperature in Celsius is'', temperature_celsius, ''degrees.'')

    - The temperature in Celsius is 25.5 degrees.

    - print(''The temperature in Fahrenheit is approximately'', temperature_fahrenheit,
    ''degrees.'')


    ## 关于运算符


    我知道我们几乎跳回了一整章，但既然你现在已经升级到更复杂的数据输入，我想提醒你注意一些事情。'
