    libraries that make it a top go-to for developers building websites and web services.


    When it comes to Python’s capabilities, the programming language is used across
    multiple applications including,


    +   - Web applications on a server to create web applications from simple to sophisticated.
    Making use of frameworks like Django means developers can build feature-rich,
    scalable web solutions with ease and efficiency.'
  - '[PAGE 16]


    +   - Python can be integrated into current software to create workflows and ensure
    repetitive tasks are automated. The program is brilliant at connecting the various
    components of software systems, helping to enhance efficiency and productivity.

    - From a database connectivity point of view, Python seamlessly connects to a
    number of different database systems. These include MySQL, PostgreSQL, MongoDB,
    and so on. Python can read and modify data in databases, making it a vital tool
    for data-driven applications.

    - Python is adept at working with files because it can easily read, write, and
    manipulate data stored in files of various formats. This is absolutely essential
    for data extraction and report generation.

    - Python is a data processing master and when combined with libraries like Pandas
    and NumPy it handles big data like a champ. The language is an absolute powerhouse
    for data analysis and machine learning, ensuring it keeps its eyes on the future
    of computing and coding.

    - The clear syntax and extensive libraries that are Python’s language make it
    really great for rapid prototyping. This means being able to turn your ideas into
    functional prototypes, encourages you to iterate and experiment and learn and
    grow before committing to a large or full-scale project.

    - Finally, Python is not just a prototyping software. It’s more than capable of
    producing straight-to-production software because of its scalability and robust
    nature.'
- md: '## Why Python is Preferred


    We’re almost ready to have you dive into the world of Python, but first, let’s
    look at why Python is useful outside of the obvious employment opportunities.


    1.  Python is platform-agnostic. This means it’s compatible across various operating
    systems including Windows, macOS, Linux, and even Raspberry Pi.

    2.  Its syntax is famously clear and it''s this simplicity that enables developers
    to write code that is maintainable and understandable.

    3.  The elegant syntax that is synonymous with Python allows developers to achieve
    far more with far less code actually being written.

    4.  Python’s interpreter system executes code the moment it’s written. This means
    the language promotes rapid prototyping so that you can test and refine your ideas
    quickly.

    5.  Python embraces multiple programming paradigms and this means it doesn’t matter
    what you prefer when it comes to coding. From procedural to object-oriented and
    functional programming, Python prides itself on accommodating your coding style.


    Now that you have the *what* and *why* of Python, we can get into the how so that
    you can begin to code with ease and creativity.


    ## CHAPTER 2


    ## Getting Ready To Program With Python


    Part of the solid foundation you need to begin programming with Python includes
    what version of Python to use as well as how to install the interpreter, and a
    couple of other crucial factors. This will help you to become comfortable in your
    Python environment while you explore Python Shell and IDLE.


    ## Python 2.x Versus Python 3.x


    So, before you install Python you may be thinking, “What’s the difference between
    Python 2.x and Python 3.x?”


    The latest version of Python is 3.12.0 (as of publication). You can still download
    Python 2.7.17 but it’s important that you note that this version is no longer
    supported. This means that no new bug reports, fixes, or changes are available
    for Python 2.x and haven’t been since the 1st of January 2020.


    *For the purposes of this book, we will be using Python 3.x.*


    So why does version 2.x even exist? Well, the simple answer is code migration.
    The difference between version 2.x and version 3.x means that programs and scripts
    that were used in the earlier version now need to be recoded so that they’re compatible
    with the new version of Python.


    When dealing with smaller programs that use version 2.x, code migration is pretty
    simple and easy. Having said that, more complex programs that contain thousands
    of lines of coding can become a much bigger headache. The obstacle between these
    two program versions comes with the changes to the behavior and the syntax of
    the programming languages.


    For example, if you divide 3 and 2 using the ‘/’ operator in Python 2.x, you will
    receive an output of 1. If you divide the same numbers with the same operator
    in Python 3.x, you will receive an output of 1.5.


    Version 3.x is undeniably more efficient but the old versions of Python are still
    needed purely because of the issues mentioned above. Larger programs that were
    written in version 2’s runtime environment are just too tedious to migrate over
    and so developers haven’t bothered to make the transition. If you plan on working
    on existing programs, then we would suggest version 2.x but a friendly reminder
    that this book and the exercises in it will focus on version 3.x.


    ## Installing the Interpreter


    Python requires a runtime environment and command line interpreter. When you download
    Python from the official Python site your program will contain both of these.
    Installing the program on Mac and Windows is particularly easy.


    All you need to do is head to the website, [www.python.org](https://www.python.org)
    (Python), and select downloads from the menu bar.


    ![](img/c6e7035425ed07882c2e19c628d5a823_21_0.png)


    Here, you’ll find a list of platforms as well as the latest version of Python,
    free to download.


    | Version | Operating System | Description | MD5 Sum | File Size | GPG | Sigstore
    |

    |---|---|---|---|---|---|---|

    | Gzipped source tarball | Source release | | d6eda3e1399cef5dfde7c4f319b0596c
    | 27195214 | SIG | .sigstore |

    | XZ compressed source tarball | Source release | | f6f4616584b23254d165f4db90c247d6
    | 20575020 | SIG | .sigstore |

    | macOS 64-bit universal2 installer | macOS | for macOS 10.9 and later | edd96f35a3cbab9bf2f83b2875c5fc27
    | 45371285 | SIG | .sigstore |

    | Windows embeddable package (32-bit) | Windows | | c2047dc270c49369c64619bb193b721
    | 9824586 | SIG | .sigstore |

    | Windows embeddable package (64-bit) | Windows | | 8e24d2b26a8dfb1da0694b9da1a08b2c
    | 11030264 | SIG | .sigstore |

    | Windows embeddable package (ARM64) | Windows | | 3da1fe1a86a8210a32ea99c709dd93
    | 10277538 | SIG | .sigstore |

    | Windows installer (32-bit) | Windows | | de59862985bf7a1a639f2e4f9e2a722c |
    25173976 | SIG | .sigstore |

    | Windows installer (64-bit) | Windows | Recommended | 32ab6a1058dfbde76951b7aa7c2335a6
    | 26507904 | SIG | .sigstore |

    | Windows installer (ARM64) | Windows | Experimental | 230c703e3b8b3d92765d118afa7b2f78
    | 25742528 | SIG | .sigstore |


    You will need to follow a few simple step-by-step instructions as you install
    your program. These have been screenshotted for you using a Windows operating
    system.


    If you choose a custom installation, you will need to select the packages and
    features you want installed in your system so make sure you check the following.
    Alternatively, you can choose to install by selecting the “Recommended” option.


    ![](img/c6e7035425ed07882c2e19c628d5a823_22_0.png)


    Tcl/tk installs TkInter. This is the Graphic User Interface (GUI) toolkit you
    need if you plan to create windows for your programs. The Integrated Development
    and Learning Environment (IDLE) both require and depend on TkInter since it is
    a Python program with a GUI.


    Next, check the Python test suite feature. You will need it later.


    Finally, PIP is an optional feature that allows you to download Python packages
    later on in your journey.


    ![](img/c6e7035425ed07882c2e19c628d5a823_23_0.png)


    ## Using Python Shell and IDLE


    There are two ways to run a Python program. These are by using its runtime environment
    or using the command line interpreter.


    The command line interpreter has two forms. The first one is the regular Python
    shell and the second one is IDLE or Integrated Development and Learning Environment.


    The regular Python shell uses the familiar command line interface (CLI) or terminal
    look.


    ![](img/c6e7035425ed07882c2e19c628d5a823_24_0.png)


    IDLE is a Python program encased in a regular graphical user interface (GUI) window.
    IDLE is full of easy-to-access menu, customization options, and GUI functions
    while the Python shell is devoid of those and only offers a command prompt (i.e.
    the input field in a text-based user interface screen).


    One of the beneficial functions of IDLE is its syntax highlighting. The syntax
    highlighting function makes it easier for programmers or scripters to identify
    between keywords, operators, variables, and numeric literals.


    ![](img/c6e7035425ed07882c2e19c628d5a823_25_0.png)


    Also, you can customize the highlight color and the font properties displayed
    on IDLE. With the shell, you only get a monospaced font, white font color, and
    black background.


    All of the examples in this book are written in the Python shell. However, it
    is okay for you to write using IDLE. It is suited for beginners since they do
    not need to worry about indentation and code management. Not to mention that the
    syntax highlighting is truly beneficial.


    ## Writing Your First Program


    Okay, so to get started, it’s a tradition for new programmers to begin with the
    “Hello World” program.


    - Open Python by finding it in your “Start” menu.

    - Create a new file by navigating to “File,” and then “New File.”

    - Save this file as “Hello World.”

    - Write this line.

    - Type print(“Hello World!”)

    - Run the module by selecting “Run” or pressing F5.


    ```

    print ("Hello World!")

    ```


    - Hit Enter on your keyboard.

    - Python will respond with: Hello World!'
  mdcn: '## 为何选择 Python


    我们几乎已经准备好让你深入 Python 的世界了，但首先，让我们看看除了显而易见的就业机会外，Python 为何如此有用。


    1.  Python 是平台无关的。这意味着它兼容各种操作系统，包括 Windows、macOS、Linux，甚至树莓派。

    2.  其语法以清晰著称，正是这种简洁性使得开发者能够编写出易于维护和理解的代码。

    3.  与 Python 同义的优雅语法，允许开发者用更少的实际代码实现更多功能。

    4.  Python 的解释器系统在代码编写的瞬间就执行它。这意味着该语言促进了快速原型开发，使你能够快速测试和完善你的想法。

    5.  Python 支持多种编程范式，这意味着在编码方面，无论你偏好哪种方式都无关紧要。从过程式到面向对象和函数式编程，Python 以其能够适应你的编码风格而自豪。


    既然你已经了解了 Python 的*内容*和*原因*，我们可以开始探讨*如何*做，以便你能够轻松且富有创造力地开始编码。


    ## 第 2 章


    ## 准备用 Python 编程


    你需要为开始 Python 编程打下坚实基础的一部分，包括使用哪个版本的 Python、如何安装解释器，以及其他几个关键因素。这将帮助你在探索 Python
    Shell 和 IDLE 时，能够适应你的 Python 环境。


    ## Python 2.x 与 Python 3.x


    那么，在安装 Python 之前，你可能会想，“Python 2.x 和 Python 3.x 有什么区别？”


    Python 的最新版本是 3.12.0（截至出版时）。你仍然可以下载 Python 2.7.17，但重要的是你要注意，这个版本已不再受支持。这意味着自 2020
    年 1 月 1 日起，Python 2.x 就不再有新的错误报告、修复或更改了。


    *本书将使用 Python 3.x。*


    那么为什么版本 2.x 还存在呢？嗯，简单的答案是代码迁移。版本 2.x 和版本 3.x 之间的差异意味着，早期版本中使用的程序和脚本现在需要重新编码，以使其与新版本的
    Python 兼容。


    在处理使用版本 2.x 的较小程序时，代码迁移相当简单且容易。话虽如此，包含数千行代码的更复杂的程序可能会带来更大的麻烦。这两个程序版本之间的障碍来自于编程语言行为和语法的变化。


    例如，如果你在 Python 2.x 中使用‘/’运算符除以 3 和 2，你将得到输出 1。如果你在 Python 3.x 中使用相同的运算符除以相同的数字，你将得到输出
    1.5。


    版本 3.x 无疑更高效，但由于上述问题，旧版本的 Python 仍然需要。在版本 2 的运行时环境中编写的大型程序迁移起来太繁琐，因此开发者没有费心进行过渡。如果你计划处理现有程序，那么我们建议使用版本
    2.x，但友好提醒一下，本书及其练习将专注于版本 3.x。


    ## 安装解释器


    Python 需要一个运行时环境和命令行解释器。当你从官方 Python 网站下载 Python 时，你的程序将包含这两者。在 Mac 和 Windows
    上安装程序特别容易。


    你只需访问网站 [www.python.org](https://www.python.org) (Python)，并从菜单栏中选择下载。


    ![](img/c6e7035425ed07882c2e19c628d5a823_21_0.png)


    在这里，你会找到一个平台列表以及最新版本的 Python，可免费下载。


    | 版本 | 操作系统 | 描述 | MD5 校验和 | 文件大小 | GPG | Sigstore |

    |---|---|---|---|---|---|---|

    | Gzipped source tarball | 源代码发布 | | d6eda3e1399cef5dfde7c4f319b0596c | 27195214
    | SIG | .sigstore |

    | XZ compressed source tarball | 源代码发布 | | f6f4616584b23254d165f4db90c247d6 |
    20575020 | SIG | .sigstore |

    | macOS 64-bit universal2 installer | macOS | 适用于 macOS 10.9 及更高版本 | edd96f35a3cbab9bf2f83b2875c5fc27
    | 45371285 | SIG | .sigstore |

    | Windows embeddable package (32-bit) | Windows | | c2047dc270c49369c64619bb193b721
    | 9824586 | SIG | .sigstore |

    | Windows embeddable package (64-bit) | Windows | | 8e24d2b26a8dfb1da0694b9da1a08b2c
    | 11030264 | SIG | .sigstore |

    | Windows embeddable package (ARM64) | Windows | | 3da1fe1a86a8210a32ea99c709dd93
    | 10277538 | SIG | .sigstore |

    | Windows installer (32-bit) | Windows | | de59862985bf7a1a639f2e4f9e2a722c |
    25173976 | SIG | .sigstore |

    | Windows installer (64-bit) | Windows | 推荐 | 32ab6a1058dfbde76951b7aa7c2335a6
    | 26507904 | SIG | .sigstore |

    | Windows installer (ARM64) | Windows | 实验性 | 230c703e3b8b3d92765d118afa7b2f78
    | 25742528 | SIG | .sigstore |


    在安装程序时，你需要遵循一些简单的分步说明。这些说明已使用 Windows 操作系统为你截图。


    如果你选择自定义安装，你需要选择要安装在系统中的包和功能，因此请确保你勾选以下内容。或者，你可以选择通过选择“推荐”选项进行安装。


    ![](img/c6e7035425ed07882c2e19c628d5a823_22_0.png)


    Tcl/tk 安装 TkInter。如果你计划为你的程序创建窗口，这是你需要的图形用户界面（GUI）工具包。集成开发和学习环境（IDLE）既需要也依赖于 TkInter，因为它是一个带有
    GUI 的 Python 程序。


    接下来，勾选 Python 测试套件功能。你稍后会需要它。


    最后，PIP 是一个可选功能，允许你在后续学习过程中下载 Python 包。


    ![](img/c6e7035425ed07882c2e19c628d5a823_23_0.png)


    ## 使用 Python Shell 和 IDLE


    运行 Python 程序有两种方式。一种是使用其运行时环境，另一种是使用命令行解释器。


    命令行解释器有两种形式。第一种是常规的 Python shell，第二种是 IDLE 或集成开发和学习环境。


    常规的 Python shell 使用熟悉的命令行界面（CLI）或终端外观。


    ![](img/c6e7035425ed07882c2e19c628d5a823_24_0.png)


    IDLE 是一个封装在常规图形用户界面（GUI）窗口中的 Python 程序。IDLE 充满了易于访问的菜单、自定义选项和 GUI 功能，而 Python
    shell 则没有这些，只提供一个命令提示符（即基于文本的用户界面屏幕中的输入字段）。


    IDLE 的一个有益功能是其语法高亮。语法高亮功能使程序员或脚本编写者更容易区分关键字、运算符、变量和数字字面量。


    ![](img/c6e7035425ed07882c2e19c628d5a823_25_0.png)


    此外，你可以自定义 IDLE 上显示的高亮颜色和字体属性。对于 shell，你只能得到等宽字体、白色字体颜色和黑色背景。


    本书中的所有示例都是在 Python shell 中编写的。但是，你使用 IDLE 编写也是可以的。它适合初学者，因为他们不需要担心缩进和代码管理。更不用说语法高亮确实很有益。


    ## 编写你的第一个程序


    好的，那么开始吧，新程序员以“Hello World”程序开始是一个传统。


    - 通过在“开始”菜单中找到它来打开 Python。

    - 导航到“文件”，然后选择“新建文件”来创建一个新文件。

    - 将此文件保存为“Hello World”。

    - 写下这一行。

    - 输入 print(“Hello World!”)

    - 通过选择“运行”或按 F5 来运行模块。


    ```

    print ("Hello World!")

    ```


    - 按下键盘上的 Enter 键。

    - Python 将响应：Hello World!'
