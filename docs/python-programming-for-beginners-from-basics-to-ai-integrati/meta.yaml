    \ task, \"completed\": False})\n        print(f\"Task '{task}' added.\")\n\n \
    \   def mark_completed(self, task_index):\n        if 0 <= task_index < len(self.tasks):\n\
    \            self.tasks[task_index][\"completed\"] = True\n            print(f\"\
    Task '{self.tasks[task_index]['task']}' marked as completed.\")\n        else:\n\
    \            print(\"Invalid task index.\")\n\n    def view_tasks(self):\n   \
    \     if self.tasks:\n            print(\"Current Task List:\")\n            for\
    \ index, task_info in enumerate(self.tasks):\n                status = \"Completed\"\
    \ if task_info[\"completed\"] else \"Pending\"\n                print(f\"{index\
    \ + 1}. {task_info['task']} - {status}\")\n        else:\n            print(\"\
    Task list is empty.\")\n```\n\n### Building of Interactive Program\n\n```python\n\
    if __name__ == \"__main__\":\n    task_manager = TaskManager()\n    while True:\n\
    \        print(\"\\nOptions:\")\n        print(\"1. Add Task\")\n        print(\"\
    2. Mark Task as Completed\")\n        print(\"3. View Tasks\")\n        print(\"\
    4. Exit\")\n        choice = input(\"Enter your choice (1-4): \")\n        if\
    \ choice == \"1\":\n            task = input(\"Enter the task: \")\n         \
    \   task_manager.add_task(task)\n        elif choice == \"2\":\n            task_index\
    \ = int(input(\"Enter the task index to mark as completed: \")) - 1\n        \
    \    task_manager.mark_completed(task_index)\n        elif choice == \"3\":\n\
    \            task_manager.view_tasks()\n        elif choice == \"4\":\n      \
    \      print(\"Exiting program.\")\n            break\n        else:\n       \
    \     print(\"Invalid choice. Please enter a number between 1 and 4.\")\n```\n\
    \n**Example Output:**\n\n```\nOptions:\n1. Add Task\n2. Mark Task as Completed\n\
    3. View Tasks\n4. Exit\nEnter your choice (1-4): 1\nEnter the task: Write Python\
