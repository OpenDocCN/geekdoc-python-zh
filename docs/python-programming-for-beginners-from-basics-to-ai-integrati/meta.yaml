  md: '+   11. Document processing which includes the rationale for specific decisions
    with the aim of reproducibility and collaboration.

    12. Iteration so that additional preprocessing steps can be taken if need be.

    13. Quality assurance and checks on the processed data to ensure the utmost integrity.


    Always keep in mind that these steps can change based on the characteristics of
    the data as well as the objective of the data analysis. When addressing the unique
    challenges that come with each dataset, it’s important to note that flexibility
    and adaptability (agile) practices are best.


    # Handling Missing Data


    Handling missing data is an important step in data preprocessing. Python provides
    its users with a number of libraries that offer tools for managing missing data.
    The two most common of these are NumPy and Panda.


    # Using NumPy


    NumPy provides users with functions that create arrays with missing values and
    perform operations that handle missing data.'
