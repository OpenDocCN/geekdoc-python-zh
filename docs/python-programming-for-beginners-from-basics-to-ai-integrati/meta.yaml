  md: '# CHAPTER 1


    # The Fundamentals of Python Programming


    Python is a programming language that is built on a robust foundation while still
    offering users simplicity and ease of use. For you to become a Python programming
    aficionado, it’s absolutely critical that you understand the inner workings of
    Python as a language. It’s these fundamentals that we’ll be covering in Chapter
    1, introducing you to the fundamentals and core concepts that will serve as your
    base for your skills.


    Python is an interpreted language. This means that the code is executed line by
    line by Python’s interpreter. This happens in a process and specific order that
    includes,


    +   - **Writing Code**—The programmer creates the Python code using a text editor
    or integrated development environment (IDE). These instructions are written in
    plain text but follow Python''s syntax rules.

    - **Compiling vs. Interpreting:** Unlike other programming languages like C++
    or Java, Python doesn''t require a separate compilation step.'
  merge: -1
  pgno: 10
- img_proc: true
  md: 'Instead, your code is saved as a .py file. The Python interpreter reads and
    executes this directly.


    +   - **Running the Interpreter:** Next, you’ll run your Python code by calling
    the Python interpreter from the command line or by using an IDE that handles the
    execution for you. The interpreter reads your code, line by line, and performs
    the specified actions.

    - **Immediate Feedback:** Python then offers you immediate feedback. If there''s
    an error in your code, the interpreter will stop and display an error message.
    This process allows for quick debugging and learning so that you don’t have to
    read through pages and pages of code.


