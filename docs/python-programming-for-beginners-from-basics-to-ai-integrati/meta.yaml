    \n### 数据预处理步骤\n\n数据预处理需要一些关键步骤，这些步骤将组织、清理和转换原始数据为适合分析的格式。现在，并非所有这些步骤都适用，数据的性质以及分析目标将决定将采取哪些步骤。\n\
    \n让我们看看这些步骤可能是什么的一般指南。\n\n## 任务管理器项目\n\n任务，创建多行语句，这些语句组合成一个功能完整的程序。\n\n那么你的程序应该做什么？\n\
