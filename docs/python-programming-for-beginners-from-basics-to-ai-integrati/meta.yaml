  md: 'To identify missing values, you''d need to use `np.isnan(array)`. This identifies
    missing values in the NumPy array.


    To replace missing values, you use `np.nan_to_num(array)`. This replaces Nan values
    with zeros.


    Alternatively you''d use, `np.nanmean(array)` or `np.nanmedian(array)` to replace
    NaN values with mean or median respectively.


    # Using Pandas


    Pandas that are built on top on NumPy provide a Dataframe structure with powerful
    tools that can be used to handle missing data.


    These include


    +   - identifying missing values

    - Use `df.isnull()` or `df.isna()` to identify missing values in a DataFrame.

    - removing missing values

    - Use `df.dropna()` to remove rows containing any missing values.

    - Use `df.dropna(axis=1)` to remove columns containing any missing values.'
