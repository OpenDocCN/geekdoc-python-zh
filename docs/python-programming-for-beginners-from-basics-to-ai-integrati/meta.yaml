- md: '## Dictionaries


    Finally, we’re going to take a look at dictionaries. This versatile data structure
    is used to store key-value pairs. Sometimes called an associative array or hash
    map (not in Python though), dictionaries are defined by curly brackets {} and
    contain keys and their associated values.


    You would therefore create a dictionary by providing a set of key-value pairs
    that are contained within your curly brackets. Here’s an example,


    - my_dict = {"name": "John", "age": 30, "city": "New York"}


    Go ahead and input this into Python, as we will be using this dictionary to build
    on throughout this section.


    You can now access values in a dictionary by referencing the relevant keys.


    - name = my_dict["name"]


    Because dictionaries are mutable, you can change their values and add new key-value
    pairs to your dictionary as well as remove existing ones.


    Here’s an example of changing the values,


    - my_dict["age"] = 31


    This will update the value associated with the key "age" and by entering


    - my_dict["country"] = "USA"


    you add a new key-value pair, while


    - del my_dict["city"]


    removes the key “city” as well as its associated value.


    Finally, you loop through dictionaries by using the *for* loop.


    - for key, value in my_dict.items():

    - print(key, value)


    ## Exercise


    For this exercise, you’re going to create a dictionary to store contact information.
    Your example should contain space for a name, email address, and telephone number.


    Then, you''re going to print the name, email, address, and telephone number. Remember,
    when using dictionaries you need to use the dictionary *and* corresponding key
    to access the value.


    Give it a go and then look at the solution.


    > **Pro Tip:** *When creating this dictionary you should open your curly brackets
    before you add your data and close the curly brackets after.*


    ```

    Python 3.12.0 (tags/v3.12.0:0fb18b0, Oct  2 2023, 13:03:39) [MSC v.1935 64 bit
    (AMD64)] on win32

    Type "help", "copyright", "credits" or "license()" for more information.

    >>> contact={

    ...     ''name'':''John Doe'',

    ...     ''email'':''john@example.com'',

    ...     ''phone'':''+123456789''

    ...     }

    >>> print(contact[''name''])

    John Doe

    >>> print(contact[''email''])

    john@example.com

    >>> print(contact[''phone''])

    +123456789

    >>> |

    ```


    ## Foundational Exercise for Lists, Tuples, Sets, and Dictionaries


    Right! You’ve reached the end of this chapter and are well on your way to creating
    your first programming with Python. Let’s test your knowledge of this chapter
    before moving on to intermediate programming knowledge.


    In this exercise, you’re going to create a Python program that incorporates all
    of the elements you’ve learned in Chapter 5.


    You’ll need to


    1. Create a list of numbers (integers or floats).

    2. Create a tuple with a few items (strings or numbers).

    3. Create a set with unique items (names or cities).

