- md: "## 4. A child class is another term used for a derived class.\n\nThere are\
    \ a couple of reasons that inheritance is great. It allows for code reusability\
    \ and leveraging the functionality of the base class. Derived classes can provide\
    \ a specific implementation for a method that has already been defined in an existing\
    \ base class. This allows for customization. Finally, inheritance supports the\
    \ creation of abstract classes that have common features that can be shared among\
    \ multiple subclasses.\n\nLet’s take a look at the syntax and an example.\n\n\
    ```python\n# Base class attributes and methods\nclass BaseClass:\n\n# Derived\
    \ class attributes and methods\nclass DerivedClass(BaseClass):\n```\n\n## Example\n\
    \n```python\nclass Animal:\n    def speak(self):\n        print(\"Animal speaks\"\
    )\n\nclass Dog(Animal):\n    def bark(self):\n        print(\"Dog barks\")\n\n\
    my_dog = Dog()\n\nmy_dog.speak()  # Output: Animal speaks\nmy_dog.bark()   # Output:\
    \ Dog barks\n```\n\nIn the example above, *Dog* is a derived class that inherits\
    \ from the *Animal* base class. The *speak* method is inherited from the base\
    \ class and the derived class introduces its own method, *bark*. This example\
    \ clearly shows how inheritance fosters a modular and hierarchical approach to\
    \ building software, enhancing both code organization and maintainability.\n\n\
    ## How to Implement Inheritance in Code\n\nIn experimenting with the example above,\
    \ you’ll have picked up a couple of key points when it comes to inheritance—it\
    \ needs to be implemented by specifying the base class in the definition of the\
    \ derived class. In this section we’re going to look at another example, to solidify\
    \ not only the syntax but also how to input this syntax.\n\nFor this example,\
    \ we’ll use *Vehicle* as the base class with a method *start_engine*.\n\n*Car*\
    \ will be the derived class that inherits from *Vehicle* and we will introduce\
    \ its own method *honk*. The constructor of the base class is called in the constructor\
    \ of the derived class. We’ll be using *super()* for this constructor. Our objective\
    \ is to demonstrate how the derived class inherits attributes and methods from\
    \ the base class while also having its own specialized behavior. Let’s get to\
    \ it.\n\n```python\nclass Vehicle:\n    def __init__(self, brand, model):\n  \
    \      self.brand = brand\n        self.model = model\n\n    def start_engine(self):\n\
