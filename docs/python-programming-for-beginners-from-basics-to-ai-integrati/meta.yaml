    \ CHAPTER 7\n\n# Object-Oriented Programming Made Easy\n\nObject-oriented programming\
    \ (OOP) is a programming paradigm. These paradigms include functional, procedural,\
    \ declarative programming, and so on. OOP organizes code based on objects. These\
    \ objects represent real-world units or entities and condense the functions that\
    \ operate on the data.\n\nHere are some of the key concepts of OOP.\n\n### 1.\
    \ Classes and Objects\n\n- Classes are a blueprint or template that is used for\
    \ creating objects. It defines the attributes (properties) as well as the methods\
    \ (behaviors) that the objects of the class will have.\n- Objects are an instance\
    \ of a class—the solid entity created based on the definition of a class.\n\n\
    ### 1. Encapsulation\n\n- Encapsulation includes attributes (the bundling of your\
    \ data) and functions (methods). These operate on the data you’ve captured within\
    \ a single unit.\n- Encapsulation also restricts access to some of the object’s\
    \ components for data hiding.\n\n### 1. Inheritance\n\n- This is a mechanism in\
    \ which a new class, subclass, or derived class inherits the properties and behaviors\
    \ of an existing class—sometimes called a parent or base class.\n- It allows for\
