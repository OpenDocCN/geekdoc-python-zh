    \nAttributes on the other hand are the names that have been assigned to a value.\
    \ These are considered of a higher level on a module file and that do not belong\
    \ to a function or a class.\n\nA function that has been defined will only set\
    \ the parameters and then give it a name. In other words, you have to set the\
    \ structure for the block of codes if you’re going to execute it by creating another\
    \ function.\n\n## Files In Python\n\nA collection of data that is stored on a\
