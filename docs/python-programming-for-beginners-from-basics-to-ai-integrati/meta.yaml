- md: '## Assignment Operators


    An assignment operator is used to assign values to variables by combining the
    assignment operation with another operation like addition, subtraction, multiplication,
    and so on. This updates the value of a variable to the result of the combined
    operation.


    = assigns a value to a variable.


    - Example: x = 3 — x now equals to 3


    += adds a value to the current value of a variable and assigns the result to the
    variable.


    - Example: x = 3

    - x += 5 — adds 5 to x and assigns the result to x. Therefore, x is now 8.


    -= subtracts a value from the current value of a variable and assigns the result
    to the variable.


    - Example: x = 3

    - x -= 1 — subtracts 1 from x and assigns the result to x. Therefore, x is now
    2.


    *= multiplies a value to the current value of a variable and assigns the result
    to the variable.


    - Example: x = 3

    - x *= 5 — multiples 5 by x and assigns the result to x. Therefore, x is now 15.


    /= divides a value of the current value of a variable and assigns the result to
    the variable.


    - Example: x = 6

    - x /= 2 — divides 6 by 2 and assigns the result to x. Therefore, x is now 3.


    %= calculates the remainder of dividing a variable by a specific value and assigns
    the remainder to the variable.


    - Example: x = 6

    - x %= 4 — calculates the remainder as 2 and assigns the result to x. Therefore,
    x is now 2.


    Remember that %= requires non-perfect division. Perfection division will result
    in 0 being assigned.


    Check out the picture below for a full list of the equations above.


    ## Logical Operators


    In Python, logical operators are used to perform logical operations on Boolean
    values. These allow you to combine multiple conditions that make decisions based
    on the results of these combinations.


    This is a mouthful, I know, so let’s look at a real-life example. Let’s say you
    are sitting at home and someone calls to ask you, “Are you at home?” You have
    a choice based on logical true or false data and this is “Yes, I am home,” or
    “No, I am not home.” Now logical data always only has two choices, true or false.
    Because of this, you can’t input complex conditions that could have various outputs.
    You can only use logical operators to evaluate the expressions and obtain a *specific*
    decision.


    As such, logical operators are helpful when writing any logic reasonably but only
    if that logic is *reasonable*. Look at the list of logical operators below, along
    with a brief description for a better understanding.


    ### The And Operator


    The And operator returns True if both conditions on its left and right sides are
    True. Conversely, if either or both conditions are *False*, the result is *False*.


    ```

    >>> x = True

    >>> y = True

    >>> result = x and y

    >>> result

    True

    >>>

    ```


    ### The Or Operator


    The *Or* operator returns true if at least one of the conditions on the left or
    right sides are *True*. If, however, both conditions are *False*, the result will
    be *False*.


    ### The Not Operator


    The *Not* operator works on a single condition. This means it is a unary operator
    and it reverses the condition. In other words, if the condition is *True*, *Not*
    makes it *False* and vice versa.


    ### The Identity Operator


    We’re almost nearing the end of this chapter, hang tight future programmer extraordinaire!


    Our next operators are Identity operators. These are used to determine if two
    variables or objects are referring to the same memory location. Alternatively,
    it may be used to determine if two variables or objects have the same identity.
    There are two primary identity operators, these being *is* and *is not*.


    #### is Operator


    The *is* operator checks if two variables or objects are referencing the same
    memory location. If they do, Python returns *True* and if they don''t, it returns
    *False*.


    #### is not Operator


    The *is not* operator checks if two variables or objects do not reference the
    same memory location. If these do not reference the same memory, Python returns
    *True*. If they do reference the same memory, it returns *False*.


    ### Membership Operators


    Membership operators are used to test if a specific value is present in a sequence.
    This could be a string, list, tuple, or dictionary (don’t worry, we’ll get to
    this later in this book). In Python, there are two main membership operators,
    the in operator and the not operator.


    #### in Operator


    The *in* operator checks if a specified value exists in a particular sequence.
    If the value is found, Python returns *True* and if it is not found, it returns
    *False*.


    #### not in Operator


    The *not in* operator checks if a specified value does not exist in a sequence.
    If the value is not found, Python returns with *True* and if it is found, it returns
    *False*.


    ### Bitwise Operators


    The final operator you’ll learn about is the Bitwise operator. These operators
    are used to perform operations on individual bits of binary numbers. We won’t
    go into too much detail here as bitwise operators are typically used in very low-level
    programming like when you’re working with hardware, or optimizing algorithms.


    There are six bitwise operators, namely


    - AND ‘&’ — Performs a bitwise AND operation on each pair of corresponding bits
    in two binary numbers.

    - OR ‘|’ — Performs a bitwise OR operation on each pair of corresponding bits
    in two binary numbers.

    - XOR ‘^’ — Performs a bitwise XOR (exclusive OR) operation on each pair of corresponding
    bits in two binary numbers.

    - NOT ‘~’ — Performs a bitwise NOT operation on each bit in a binary number.

    - Left shift ‘<<’ — Shifts the bits of a binary number to the left by a specified
    number of positions.

    - Right shift ‘>>’ — Shifts the bits of a binary number to the right by a specified
    number of positions.


    Because you’ll probably not be using bitwise operators for general Python programming,
    it’s best to take a separate course that focuses on programming hardware.


    And, you’ve reached the end of this chapter! Before moving on to the next chapter,
    let’s put everything you’ve learned into action.


    ### Foundational Exercise for Operators


    It’s time to test your knowledge for Chapter 3, here is your exercise!


    **Create a Python program that calculates and prints the area of an equilateral
    triangle.**


    Exercise hints:


    - The formula to calculate the area of a triangle is Area = (1/2) * Base * Height

    - Enter the base of the triangle at 4 inches (4.0).

    - Enter the height of the triangle at 4 inches (4.0).

    - Calculate the area using the formula above.

    - Don’t forget to display (print) your result!


    Open Python and give it a try.


    The solution is on the next page.


    ```

    >>> base = 4.0

    >>> height = 4.0

    >>> area = (1/2) * base * height

    >>> print(''The area of the triangle with base'', base, ''inches and height'',
    height, ''inches is'', area, ''square inches.'')

    The area of the triangle with base 4.0 inches and height 4.0 inches is 8.0 square
    inches.

    >>>

    ```


    ## CHAPTER 4


    ## Python Data Types


    When it comes to dealing with programming and technology, data is at the core
    of everything you’re doing. The definition of data is pretty broad and can be
    something as simple as a number or text message to something far more complex
    like databases and lists of items.


    If you’re going to work effectively in Python, you’re going to need to understand
    each of these common data types—these are classifications that specify which type
    of value a variable can hold. Because Python is typed dynamically, you don’t need
    to declare the data type of a variable explicitly. Python does this for you, figuring
    out the data type of a variable based on the value assigned to it.


    How does Python do this?


    Well, it provides users with a variety of built-in data types that can handle
    different types of data. These include Integers (int), Floating-point numbers
    (float), Strings (str).'
  mdcn: '## 赋值运算符


    赋值运算符用于通过将赋值操作与加法、减法、乘法等其他操作结合，将值赋给变量。这会将变量的值更新为组合操作的结果。


    = 将值赋给变量。


    - 示例：x = 3 — x 现在等于 3


    += 将值加到变量的当前值，并将结果赋给变量。


    - 示例：x = 3

    - x += 5 — 将 5 加到 x，并将结果赋给 x。因此，x 现在是 8。


    -= 从变量的当前值中减去一个值，并将结果赋给变量。


    - 示例：x = 3

    - x -= 1 — 从 x 中减去 1，并将结果赋给 x。因此，x 现在是 2。


    *= 将一个值乘以变量的当前值，并将结果赋给变量。


    - 示例：x = 3

    - x *= 5 — 将 5 乘以 x，并将结果赋给 x。因此，x 现在是 15。


    /= 将变量的当前值除以一个值，并将结果赋给变量。


    - 示例：x = 6

    - x /= 2 — 将 6 除以 2，并将结果赋给 x。因此，x 现在是 3。


    %= 计算变量除以特定值的余数，并将余数赋给变量。


    - 示例：x = 6

    - x %= 4 — 计算余数为 2，并将结果赋给 x。因此，x 现在是 2。


    请记住，%= 要求非整除。整除将导致结果为 0。


    请查看下图，了解上述所有等式的完整列表。


    ## 逻辑运算符


    在 Python 中，逻辑运算符用于对布尔值执行逻辑操作。这些运算符允许你组合多个条件，并根据这些组合的结果做出决策。


    我知道这听起来有点绕，所以让我们看一个现实生活中的例子。假设你正坐在家里，有人打电话问你：“你在家吗？”你基于逻辑真或假的数据有一个选择，即“是的，我在家”或“不，我不在家。”现在，逻辑数据总是只有两个选择，真或假。因此，你不能输入可能有各种输出的复杂条件。你只能使用逻辑运算符来评估表达式并获得一个*特定的*决策。


    因此，逻辑运算符在编写任何合理的逻辑时都很有帮助，但前提是该逻辑是*合理的*。请查看下面的逻辑运算符列表及其简要描述，以便更好地理解。


    ### 与运算符


    与运算符在其左右两侧的条件都为真时返回真。相反，如果任一或两个条件为*假*，则结果为*假*。


    ```

    >>> x = True

    >>> y = True

    >>> result = x and y

    >>> result

    True

    >>>

    ```


    ### 或运算符


    *或*运算符在其左侧或右侧的条件至少有一个为*真*时返回真。但是，如果两个条件都为*假*，则结果将为*假*。


    ### 非运算符


    *非*运算符作用于单个条件。这意味着它是一元运算符，它会反转条件。换句话说，如果条件为*真*，*非*运算符会使其变为*假*，反之亦然。


    ### 同一性运算符


    我们几乎要结束本章了，坚持住，未来的编程高手！


    我们接下来的运算符是同一性运算符。这些运算符用于确定两个变量或对象是否引用相同的内存位置。或者，它可用于确定两个变量或对象是否具有相同的身份。有两个主要的同一性运算符，即
    *is* 和 *is not*。


    #### is 运算符


    *is* 运算符检查两个变量或对象是否引用相同的内存位置。如果它们引用相同的位置，Python 返回 *True*；如果不引用相同的位置，则返回 *False*。


    #### is not 运算符


    *is not* 运算符检查两个变量或对象是否不引用相同的内存位置。如果它们不引用相同的内存，Python 返回 *True*。如果它们引用相同的内存，则返回
    *False*。


    ### 成员运算符


    成员运算符用于测试特定值是否存在于序列中。这可以是字符串、列表、元组或字典（别担心，我们将在本书后面介绍这些）。在 Python 中，有两个主要的成员运算符：in
    运算符和 not in 运算符。


    #### in 运算符


    *in* 运算符检查指定值是否存在于特定序列中。如果找到该值，Python 返回 *True*；如果未找到，则返回 *False*。


    #### not in 运算符


    *not in* 运算符检查指定值是否不存在于序列中。如果未找到该值，Python 返回 *True*；如果找到，则返回 *False*。


    ### 位运算符


    你将学习的最后一个运算符是位运算符。这些运算符用于对二进制数的各个位执行操作。我们不会在这里详细介绍，因为位运算符通常用于非常底层的编程，例如处理硬件或优化算法时。


    有六种位运算符，分别是


    - AND ‘&’ — 对两个二进制数中每对对应的位执行按位与操作。

    - OR ‘|’ — 对两个二进制数中每对对应的位执行按位或操作。

    - XOR ‘^’ — 对两个二进制数中每对对应的位执行按位异或（异或）操作。

    - NOT ‘~’ — 对二进制数中的每一位执行按位非操作。

    - 左移 ‘<<’ — 将二进制数的位向左移动指定的位数。

    - 右移 ‘>>’ — 将二进制数的位向右移动指定的位数。


    因为你可能不会在一般的 Python 编程中使用位运算符，所以最好参加一门专注于硬件编程的单独课程。


    好了，你已经到达本章的末尾！在进入下一章之前，让我们将你所学的一切付诸实践。


    ### 运算符基础练习


    是时候测试你对第 3 章的知识了，这是你的练习！


    **创建一个 Python 程序，计算并打印等边三角形的面积。**


    练习提示：


    - 计算三角形面积的公式是 面积 = (1/2) * 底 * 高

    - 输入三角形的底为 4 英寸（4.0）。

    - 输入三角形的高为 4 英寸（4.0）。

    - 使用上述公式计算面积。

    - 别忘了显示（打印）你的结果！


    打开 Python 并尝试一下。


    答案在下一页。


    ```

    >>> base = 4.0

    >>> height = 4.0

    >>> area = (1/2) * base * height

    >>> print(''The area of the triangle with base'', base, ''inches and height'',
    height, ''inches is'', area, ''square inches.'')

    The area of the triangle with base 4.0 inches and height 4.0 inches is 8.0 square
    inches.

    >>>

    ```


    ## 第 4 章


    ## Python 数据类型


    当涉及到编程和技术时，数据是你所做一切的核心。数据的定义相当广泛，可以是像数字或文本消息这样简单的东西，也可以是像数据库和项目列表这样复杂得多的东西。


    如果你想在 Python 中高效工作，你需要理解每种常见的数据类型——这些是分类，指定了变量可以持有的值的类型。因为 Python 是动态类型的，所以你不需要显式声明变量的数据类型。Python
    会为你做这件事，根据分配给变量的值来确定变量的数据类型。


    Python 是如何做到这一点的？


    嗯，它为用户提供了多种内置数据类型，可以处理不同类型的数据。这些包括整数（int）、浮点数（float）、字符串（str）。'
