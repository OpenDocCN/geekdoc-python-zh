    # Inheritance in Python to Clean Your Code


    When it comes to object-oriented programming (OOP), inheritance is a fundamental
    concept. It allows a new class (subclass) or derived class to inherit attributes
    and methods from an existing class (parent or base class). This relationship facilitates
    code reuse as well as abstraction and the creation of hierarchical classes.


    Before we continue with inheritance, we need to understand some basic terminology.


    +   1. A base class or parent class is the existing class whose attributes and
    methods are to be inherited.

    2. A derived class or subclass is the new class that will inherit the attributes
    and methods from a parent class.

    3. A superclass is just another term for a base class.'
  merge: -1
  pgno: 177
- img_proc: true
  md: "4. A child class is another term used for a derived class.\n\nThere are a couple\
    \ of reasons that inheritance is great. It allows for code reusability and leveraging\
    \ the functionality of the base class. Derived classes can provide a specific\
    \ implementation for a method that has already been defined in an existing base\
    \ class. This allows for customization. Finally, inheritance supports the creation\
    \ of abstract classes that have common features that can be shared among multiple\
    \ subclasses.\n\nLet’s take a look at the syntax and an example.\n\n```\n# Base\
    \ class attributes and methods\nclass BaseClass:\n\n# Derived class attributes\
    \ and methods\nclass DerivedClass(BaseClass):\n```\n\n# Example\n\n```\nclass\
    \ Animal:\n    def speak(self):\n        print(\"Animal speaks\")\n\nclass Dog(Animal):\n\
    \    def bark(self):\n        print(\"Dog barks\")\n\nmy_dog = Dog()\n\nmy_dog.speak()\
    \  # Output: Animal speaks\nmy_dog.bark()   # Output: Dog barks\n```"
  merge: -1
