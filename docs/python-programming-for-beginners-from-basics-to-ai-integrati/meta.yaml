    \ you have all of your instructions and hints you need. Enjoy your coding experience\
    \ and when you’re ready, check my “bare bones” program below.\n\n### Basic Program\
    \ Example\n\n```python\nclass TaskManager:\n    def __init__(self):\n        self.tasks\
