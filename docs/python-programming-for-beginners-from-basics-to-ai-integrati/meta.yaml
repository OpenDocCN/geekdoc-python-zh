    # Magic Methods


    In Python, structural methods are referred to as “Special methods,” or “Magic
    methods.” These are double underscore (dunder) methods and are denoted by a double
    underscore before and after a name. They are used to define how objects of a class
    behave with respect to certain operations in our previous exercise, we used the
    special method __init__(self) but there are other special methods that you can
    use. These are,


    +   - The constructor method—when an object is created to initialize its attributes
    denoted by__init__(self).

    - String representation of an object when str() is called. This is most often
    used for the print function and is denoted by __str__(self).

    - The string representation of an object usually used by the repr() function can
    be defined as an official string representation of an object by using __repr__(self).

    - To return the length of an object when len() is called, __len(self) can be used.

    - Finally, to define the behavior of the + operator when it is applied to objects
    of a specific class __add__(self, other): is used.


    Each of these special/magic methods allows you to customize how your class behaves
    in terms of different contexts. This makes your classes more versatile. Let’s
    take a look at an example.'
