- img_proc: true
  md: 'The latest version of Python 3.12.0 (as of publication). You can still download
    Python 2.7.17 but it’s important that you note that this version is no longer
    supported. This means that no new bug reports, fixes, or changes are available
    for Python 2.x and haven’t been since the 1st of January 2020.


    *For the purposes of this book, we will be using Python 3.x.*


    So why does version 2.x even exist? Well, the simple answer is code migration.
    The difference between version 2.x and version 3.x means that programs and scripts
    that were used in the earlier version now need to be recoded so that they’re compatible
    with the new version of Python.


    When dealing with smaller programs that use version 2.x, code migration is pretty
    simple and easy. Having said that, more complex programs that contain thousands
    of lines of coding can become a much bigger headache. The obstacle between these
    two program versions comes with the changes to the behavior and the syntax of
    the programming languages.


    For example, if you divide 3 and 2 using the ‘/’ operator in Python 2.x, you will
    receive an output of 1. If you divide the same numbers with the same operator
    in Python 3.x, you will receive an output of 1.5.


    Version 3.x is undeniably more efficient but the old versions of Python are still
    needed purely because of the issues mentioned above. Larger programs that were
    written in version 2’s runtime environment are just too tedious to migrate over
    and so developers haven’t bothered to make the transition. If you plan on working
    on existing programs, then we would suggest version 2.x but a friendly reminder
    that this book and the exercises in it will focus on version 3.x.


    # Installing the Interpreter'
