  md: '![](img/c6e7035425ed07882c2e19c628d5a823_24_0.png)


    IDLE is a Python program encased in a regular graphical user interface (GUI) window.
    IDLE is full of easy-to-access menu, customization options, and GUI functions
    while the Python shell is devoid of those and only offers a command prompt (i.e.
    the input field in a text-based user interface screen).


