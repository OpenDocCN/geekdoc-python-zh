    # Key Concepts


    +   - Centroids—K-Means identifies ''k'' centroids, initially placed randomly
    or determined by a specific initialization method. A centroid represents the mean
    of data points within its cluster.

    - Assigning data points—each data point is assigned to the cluster whose centroid
    is closest in terms of Euclidean distance.

    - Updating centroids—after all data points are assigned, the centroids are recalculated
    as the mean of the data points within each cluster.

    - Iterations—assigning points and updating centroids is repeated until convergence.

    - Convergence—occurs when centroids no longer change significantly or after a
    predetermined number of iterations.


