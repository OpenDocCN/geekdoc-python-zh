- img_proc: true
  md: 'In the example above, *Dog* is a derived class that inherits from the *Animal*
    base class. The *speak* method is inherited from the base class and the derived
    class introduces its own method, *bark*. This example clearly shows how inheritance
    fosters a modular and hierarchical approach to building software, enhancing both
    code organization and maintainability.


    # **How to Implement Inheritance in Code**


    In experimenting with the example above, you’ll have picked up a couple of key
    points when it comes to inheritance—it needs to be implemented by specifying the
    base class in the definition of the derived class. In this section we’re going
    to look at another example, to solidify not only the syntax but also how to input
    this syntax.


    For this example, we’ll use *Vehicle* as the base class with a method *start_engine*.


    *Car* will be the derived class that inherits from *Vehicle* and we will introduce
    its own method *honk*. The constructor of the bass class is called in the constructor
    of the derived class. We’ll be using *super()* for this constructor. Our objective
    is to demonstrate how the derived class inherits attributes and methods from the
    base class while also having its own specialized behavior. Let’s get to it.'
