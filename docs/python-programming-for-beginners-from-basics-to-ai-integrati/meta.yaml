  md: '# CHAPTER 9


    # Python for Data Analysis


    Data analysis is the use of data analytics tools and different methods to achieve
    a specific objective or goal. Through close scrutiny, data analysis allows for
    the transformation and sorting of unprocessed data so that useful, usable information
    can be obtained.


    During the data analytics process, data is collected and inspected for the purposes
    of investigation, purification, and the removal of NaN values as well as other
    outliers in the data. This transforms the data being used into a useful product.
    While there are a number of programs that can be used to perform data analysis,
    like SAS and Excel, we will be focusing on Python’s role in data analysis.


    The two basic principles of analyzing data are interpolation and extrapolation.
    Let’s take a look at these two principles in a little bit more detail.


    Interpolation is used to estimate the values that fall between the known, measured,
    and observed data points. It’s very useful in filling in any gaps or missing values
    in a dataset and allows for the estimation of missing values based on the information
    gained. In a data analysis context, interpolation'
  merge: -1
  pgno: 150
- img_proc: true
  md: 'helps to smooth out data curves and creates a continuous representation of
    discrete data by filling in any missing values.


    Extrapolation is used to predict the estimating values beyond the range of known
    data. It extends the trend or pattern being observed in the current and existing
    data to make predictions for values outside of what is currently being observed.
    Extrapolation assumes that the established trend will continue.


    # Why Use Python For Data Analysis


    When it comes to programming languages, Python has become a go-to, the world over.
    There are a couple of reasons for this, but it’s Python’s versatility that attracts
    most users. Its clear, readable syntax makes it accessible to most users. Aside
    from this, its rich ecosystem of libraries and frameworks that are specifically
    designed for data analysis provides tools to users who may otherwise not be able
    to use the complex systems of other programs. These include Pandas, NumPy, Matplotlib,
    Seaborn, and Scikit-learn—we’ll discuss some of these in later chapters.


    Python truly is a program that encourages easy learning, and the community that
    uses the program is diverse and extremely active. This, of course, allows for
    much easier troubleshooting and community support. This support is further solidified
    by the fact that Python is an open-source language. This means users can use it
    freely, modify, and distribute the software. This open nature allows for collaborative
    innovation, especially in the realm of data analysis.


    Because data processing is a crucial step in the data analysis pipeline, Python
    is often the preferred program. The cleaning, organizing, and transforming of
    raw data allows for it to be formatted in a way that is suitable for analysis.
    Data analysis is a fundamental part of the data'
