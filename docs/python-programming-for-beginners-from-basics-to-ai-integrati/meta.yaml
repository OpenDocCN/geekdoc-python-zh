    \nmy_vehicle.start_engine()\nmy_car.start_engine()\n\nmy_car.honk()\n```\n\n##\
    \ Super 方法\n\nsuper 方法通过 *super()* 执行，用于在子类的方法中调用父类的方法。这允许子类调用在父类中定义的方法。这在重写方法时特别有用。\n\
    \n这可能是一个难以理解的概念，所以让我们看一个例子。在下面的示例中，*Car* 类从 *Vehicle* 类继承并重写了 *start_engine* 方法。在重写的方法内部，*super().start_engine()*\
    \ 用于调用父类的 *start_engine* 方法。这允许子类扩展或自定义父类方法的行为，而无需完全替换该行为。\n\n## 语法\n\n```python\n\
    class ChildClass(ParentClass):\n    def some_method(self):\n        super().parent_method()\n\
    ```\n\n## 示例\n\n```python\nclass Vehicle:\n    def start_engine(self):\n     \
