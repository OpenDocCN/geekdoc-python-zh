    because they are a set of operations.


    For variables to work, they require a letter or an underscore to initialize. We
    suggest using lower-case letters as variable names. We’ll dive into operators
    a little later in this chapter, for now, let’s take a deeper look at Python variables.


    # Creating Variables'
  - '[PAGE 41]


    The first thing you need to know is that Python has no command for declaring a
    variable. This is because a variable is created from the moment you first assign
    a value to it.


    This means you do not need to declare your variable with any particular type,
    and can even change the type after it has been set. Neat, right?


    Let’s try it out.


    Open Python and type in the following code.


    ```

    x = 5

    y = ''John''

    print(x)

    print(y)

    ```


    Remember to press enter after each line of code!'
