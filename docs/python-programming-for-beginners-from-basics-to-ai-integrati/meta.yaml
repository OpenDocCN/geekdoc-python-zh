    # CHAPTER 6


    ## Functions, Modules, and Files in Python


    Before we begin with this chapter, I’d like to congratulate you on graduating
    to intermediate Python programming. You’ve stuck around, dealt with the errors,
    and experimented your way to success; Well done!


    In this chapter, you’re going to learn about functions, modules, and files when
    using Python. These critical elements will help you in a number of ways when it
    comes to programming.


    Firstly, functions, modules, and files allow you to break down your code into
    smaller, reusable components that ensure your code is organized and manageable.
    You will be able to write functions for specific tasks and then call those functions
    whenever you need a task performed.


    Added to this, learning about files specifically, enables you to work with external
    data sources so that you can read, write, and manipulate data in a whole lot of
    different formats. This is, of course, essential for processing and analyzing
    data in real-world applications.


    Most importantly, functions, modules, and file handling elevate your proficiency
    in functions and are pretty fundamental skills when developing software. These
    three Python functions will ensure you’re prepared for work in the real world
    where you will need to collaborate with other developers on Python-based projects.
    So, let’s get into it!


    ## Functions


    A function is a block of named code that performs a specific set of tasks or a
    singular task. Coding requires smaller, manageable chunks you can work with and
    functions provide you with the modularized code. Using functions comes with a
    number of benefits that include


    - readability—your code is far more readable and organized into logical components.

    - modularity—code is divided into reusable blocks so that you can write a function
    or task and call it whenever you need to.

    - reusability—once a function is defined it can be called on multiple times within
    your code and saves you from having to duplicate work.

    - testing—functions allow you to test your code and debug only specific parts
    so that you can isolate and troubleshoot function issues efficiently.


    Functions are created using the *def* keyword which is then followed by the function
    name and a pair of parenthesis. For example,


    - def greet(name):

    - print("Hello, " + name + "!")


    Here, *greet* is the function name while (name) is the parameter the function
    will take.


    To use this function you would need to call it by its name so that you pass the
    required arguments within the parentheses. If we expand upon the example above,
    this would be,


    - greet(“Jane”)


    This is a call to the greet function with the argument now being “Jane” and the
    goal would be to bring “Hello, Jane!” to the console. But enough of this theoretical
    stuff, let’s open Python and try a real-world example using Python’s built-in
    function for common math operations.


    ## Modules


    Modules are files that contain Python code. This code within a module can define
    anything from functions to classes and variables and can even execute code. Modules
    provide you with a way to organize and structure your Python code into separate
    files. This makes your code more manageable.


    In other words, modules allow you to organize the elements and components inside
    your code, providing you with an auto contained package of variables. Modules
    also allow you to reuse code, using data services, and linking individual files
    so that you can broaden your program.


    For programs that are more complex (and what you are going to be doing from here
    on out in this book), modules assist in being able to add old, simple codes to
    more complex applications and tasks.


    Modules also allow you a way to divide your code into smaller chunks so that you
    have smaller “puzzle” pieces that can be added to create a bigger, more cohesive
    picture. Creating modules is fairly simple and can be done by saving a file with
    the .py extension. Your file will be stored in the folder of your preference that
    can later be imported.


    ### Creating Your Own Modules


    Let’s create your own module now, by saving your Python code in a .py file. For
    the purposes of this section, you’ll also be taught how to import your module
    to your program.


    Go ahead and open Python, and let’s begin creating an interactable program.'
