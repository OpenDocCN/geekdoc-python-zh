  md: '# A Word on Remainder Operators


    The remainder operator is denoted by the % sign and calculates what is left over
    when you divide one number by another. If your division is perfect and there is
    no remainder, the output result will be 0 (zero). If, however, there is a remainder,
    the result will be reflected as only the remainder.


    If we look at the following example,


    +   - a,b=6,3

    - a%b


    This will return a result of 0 (zero) as 6 is divisible by 3 perfectly.


    If, however, your code were,


    +   - a,b=6,4

    - a%b


    The result would be 2.'
