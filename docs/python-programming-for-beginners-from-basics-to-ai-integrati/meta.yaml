- img_proc: true
  md: '# Add a Contact


    +   - Allow users to add a new contact with details such as name, phone number,
    and email.'
  merge: -1
  pgno: 230
- img_proc: true
  md: '# View Contacts


    +   - Display a list of all contacts with their details.'
  merge: -1
