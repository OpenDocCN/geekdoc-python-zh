- md: '## The Naming of Variables or Identifiers


    Factors are the characteristics of names and a variable is used to store the actual
    numbers and whole numbers being used in your program. To make this easier to understand,
    let’s look at some Python standards when naming a variable.


    - The essential character of any identifier must be a letter “altogether,” or
    an underscore.

    - Each of the characters besides the essential characters may contain lowercase
    letters, capital letters, underscores, or digits from 0 to 9.

    - A variable name cannot contain an empty zone or any special character. This
    includes !, @, #, %, $, and so on.

    - Variable names cannot resemble any of Python’s own syntax catchphrases.

    - Variables are case-sensitive. Inputting variable, Variable, and VARIABLE are
    all considered different variables in Python.


    ## Multiple Assignments


    When using Python, you have the ability to assign values to multiple variables
    in a single statement. This is commonly referred to as multiple assignments. What
    this feature does is allow you to assign the same value to multiple variables
    at once. Alternatively, you can assign different values to multiple variables
    at different times.


    Let’s take a look at this in action.


    Open Python and enter the following code:


    - x=y=z=10

    - Hit Enter


    In this example, x, y, and z have all been assigned the value 10. This means entering


    - print(x)


    Will return the same value of 10 as if you entered print y, or print z.


    Now let’s try the following code.


    - a=5

    - b=7

    - c=''hello''


    Here, we’re assigning the values 5 to letter a, 7 to letter b, and the string
    ‘hello’ to variable c.


    This allows for flexibility in how you assign value to variables when using Python.


    ## Operators in Python


    Python operators are symbols that allow you to perform certain actions or calculations.
    An easy way to think of operators is as tools that have been borrowed from other
    sciences. For example, + is an operator in Python that is used to add two or more
    numbers and would be borrowed from mathematics.


    Each of Python’s operators is similar to function shortcuts that are represented
    by symbols. They help your program to perform different functions with numbers
    or values. These operators are the building blocks of your program and are needed
    to perform tasks within the Python language.


    Python has various operators, including


    - Arithmetic operators

    - Assignment operators

    - Comparison operators

    - Logical operators

    - Identity operators

    - Membership operators

    - Bitwise operators


    Let’s break each of these down with an example. Your final exercise in this chapter
    will revolve around arithmetic operators, so pay attention and experiment until
    you get it right.


    ## Arithmetic Operators


    With arithmetic operators you have two things called operands that you’re going
    to work with. You can use an operator to perform an action on these operands and
    the action you’ve taken will result in a specific and definite value. In other
    words, your operator helps you to combine or manipulate the operands to produce
    a clear and expected outcome.


    Let’s break it down further. Let’s say you have the operands of 3 and 6 and you
    use the operator +. The action performed in addition and the specific value or
    outcome you’ll get is 9.


    The operator + helped you combine and manipulate your operands 3 and 6 to produce
    an outcome that is clear and specific.


    Arithmetic operators include


    - Addition— +

    - Subtraction— -

    - Division— /

    - Multiplication— *

    - Remainder— %


    Let’s give it a try using your Python coding skills.


    Open Python and enter the following code.


    - result=6+3

    - print(result)


    We’ll try something a little more complex.


    - n,v=25,69

    - n+v


    Remember to hit enter!


    What did your console print after entering n+v?


    If it returned 94; Well done!


    You can use any mathematical operator in this way with as many operands as you
    like. For example,


    - a,b,c,d=25,25,50,50

    - a+b+c-d


    ## A Word on Remainder Operators


    The remainder operator is denoted by the % sign and calculates what is left over
    when you divide one number by another. If your division is perfect and there is
    no remainder, the output result will be 0 (zero). If, however, there is a remainder,
    the result will be reflected as only the remainder.


    If we look at the following example,


    - a,b=6,3

    - a%b


    This will return a result of 0 (zero) as 6 is divisible by 3 perfectly.


    If, however, your code were,


    - a,b=6,4

    - a%b


    The result would be 2.


    ## Assignment Operators


    Assignment operators are used to assign values to variables when using Python.
    They essentially combine the assignment operation with another operation like
    addition, subtraction, multiplication, and so on, and update the value of the
    variable.


    Using assignment operators makes it far more convenient to perform calculations
    and update variables in a single step.


    The = sign is the simplest assignment operator. It assigns the value on the right
    to the variable on the left.


    - x = 5— Assigns the value 5 to the variable x


    Add and assign += adds the value on the right to the variable on the left.


    - x = 5

    - x += 3— Adds 3 to x and assigns the result to x.

    - x is now 8


    Subtract and assign -= subtracts the value on the right from the variable on the
    left.


    - x = 10

    - x -= 2— Subtracts 2 from x and assigns the result to x.

    - x is now 8


    Multiply and assign *= multiplies the variable on the left by the value on the
    right.


    - x = 4

    - x *= 3— Multiplies x by 3 and assigns the result to x.

    - x is now 12


    Divide and assign /= divides the variable on the left by the value on the right.


    - x = 20

    - x /= 4— Divides x by 4 and assigns the result to x

    - x is now 5.0 (floating-point result)


    Floor division and assign //= performs floor division on the variable on the left
    by the value on the right.


    - x = 21

    - x //= 4— Floor divides x by 4 and assigns the result to x

    - x is now 5


    Modulus and assign %= calculates the remainder when the variable on the left is
    divided by the value on the right.


    - x = 17

    - x %= 5— Calculates the remainder of x divided by 5 and assigns it to x

    - x is now 2


    What makes assignment operators so handy is that they update variables with the
    results of various calculations. This makes your code more readable and concise.


    ## Comparison Operators


    In Python, comparison operators are used to compare two operands and return a
    TRUE or FALSE outcome. This is called a Boolean type.


    Comparison operators can be


    - == (true: this operator is used if the values are logically equal and true).

    - != (true: used when values are true but unequal).

    - <= (true: used when the first operand is smaller than or equal to the second
    operand).

    - >= (true: used when the first operand is greater than or equal to the second
    operand).

    - <>(true: this operator is used if the values are not equal).

    - > (true: used when the first operand is greater than the second).

    - < (true: used when the first operand is less than the second).


    Let’s take a look at some practical examples of comparison operators. Open up
    Python and enter the following code,


    - 5 == 5

    - Enter


    Python will return with True


    Now enter


    - 5==3

    - Enter


    Python will return with False


    Let’s try another one. Enter the code,


    - 5 >= 5

    - Enter


    Python returns with True.


    Now enter,


    - 8>=11

    - Enter


    Python returns with False.'
  mdcn: '## 变量或标识符的命名


    因素是名称的特征，变量用于存储程序中使用的实际数字和整数。为了更容易理解，让我们看看命名变量时的一些Python标准。


    - 任何标识符的基本字符必须是字母“整体”或下划线。

    - 除了基本字符外，每个字符可以包含小写字母、大写字母、下划线或0到9的数字。

    - 变量名不能包含空格或任何特殊字符。这包括!、@、#、%、$等。

    - 变量名不能类似于Python自身的任何语法关键字。

    - 变量区分大小写。输入variable、Variable和VARIABLE在Python中都被视为不同的变量。


    ## 多重赋值


    使用Python时，你可以在单个语句中为多个变量赋值。这通常被称为多重赋值。此功能允许你一次为多个变量分配相同的值。或者，你可以在不同时间为多个变量分配不同的值。


    让我们看看实际操作。


    打开Python并输入以下代码：


    - x=y=z=10

    - 按Enter键


    在这个例子中，x、y和z都被赋值为10。这意味着输入


    - print(x)


    将返回与输入print y或print z相同的值10。


    现在让我们尝试以下代码。


    - a=5

    - b=7

    - c=''hello''


    这里，我们将值5赋给字母a，7赋给字母b，字符串''hello''赋给变量c。


    这使得在使用Python时为变量赋值具有灵活性。


    ## Python中的运算符


    Python运算符是允许你执行特定操作或计算的符号。理解运算符的一个简单方法是将其视为从其他科学中借用的工具。例如，+是Python中的一个运算符，用于将两个或多个数字相加，它借用于数学。


    Python的每个运算符都类似于由符号表示的函数快捷方式。它们帮助你的程序对数字或值执行不同的功能。这些运算符是程序的构建块，是在Python语言中执行任务所必需的。


    Python有各种运算符，包括


    - 算术运算符

    - 赋值运算符

    - 比较运算符

    - 逻辑运算符

    - 身份运算符

    - 成员运算符

    - 位运算符


    让我们用例子来分解每一个。本章的最终练习将围绕算术运算符展开，所以请注意并尝试，直到掌握为止。


    ## 算术运算符


    使用算术运算符时，你有两个称为操作数的东西。你可以使用运算符对这些操作数执行操作，你所采取的操作将产生一个特定且确定的值。换句话说，你的运算符帮助你组合或操作操作数以产生清晰且预期的结果。


    让我们进一步分解。假设你有操作数3和6，你使用运算符+。执行的操作是加法，你将得到的特定值或结果是9。


    运算符+帮助你组合和操作操作数3和6，以产生清晰且特定的结果。


    算术运算符包括


    - 加法— +

    - 减法— -

    - 除法— /

    - 乘法— *

    - 余数— %


    让我们使用你的Python编码技能来尝试一下。


    打开Python并输入以下代码。


    - result=6+3

    - print(result)


    我们将尝试一些更复杂的内容。


    - n,v=25,69

    - n+v


    记得按Enter键！


    输入n+v后，你的控制台打印了什么？


    如果返回94；做得好！


    你可以使用任何数学运算符以这种方式处理任意数量的操作数。例如，


    - a,b,c,d=25,25,50,50

    - a+b+c-d


    ## 关于余数运算符的说明


    余数运算符由%符号表示，用于计算一个数除以另一个数后剩余的部分。如果你的除法是完美的，没有余数，输出结果将是0（零）。然而，如果有余数，结果将仅反映余数。


    如果我们看下面的例子，


    - a,b=6,3

    - a%b


    这将返回结果0（零），因为6能被3整除。


    然而，如果你的代码是，


    - a,b=6,4

    - a%b


    结果将是2。


    ## 赋值运算符


    赋值运算符用于在使用Python时为变量赋值。它们本质上将赋值操作与另一个操作（如加法、减法、乘法等）结合起来，并更新变量的值。


    使用赋值运算符使得在单步中执行计算和更新变量更加方便。


    =号是最简单的赋值运算符。它将右边的值赋给左边的变量。


    - x = 5— 将值5赋给变量x


    加并赋值+=将右边的值加到左边的变量上。


    - x = 5

    - x += 3— 将3加到x上，并将结果赋给x。

    - x现在是8


    减并赋值-=从左边的变量中减去右边的值。


    - x = 10

    - x -= 2— 从x中减去2，并将结果赋给x。

    - x现在是8


    乘并赋值*=将左边的变量乘以右边的值。


    - x = 4

    - x *= 3— 将x乘以3，并将结果赋给x。

    - x现在是12


    除并赋值/=将左边的变量除以右边的值。


    - x = 20

    - x /= 4— 将x除以4，并将结果赋给x

    - x现在是5.0（浮点结果）


    地板除并赋值//=对左边的变量执行地板除以右边的值。


    - x = 21

    - x //= 4— 将x地板除以4，并将结果赋给x

    - x现在是5


    取模并赋值%=计算左边的变量除以右边的值时的余数。


    - x = 17

    - x %= 5— 计算x除以5的余数，并将其赋给x

    - x现在是2


    赋值运算符之所以如此方便，是因为它们用各种计算的结果更新变量。这使得你的代码更具可读性和简洁性。


    ## 比较运算符


    在Python中，比较运算符用于比较两个操作数并返回TRUE或FALSE结果。这称为布尔类型。


    比较运算符可以是


    - ==（true：如果值在逻辑上相等且为真，则使用此运算符）。

    - !=（true：当值为真但不相等时使用）。

    - <=（true：当第一个操作数小于或等于第二个操作数时使用）。

    - >=（true：当第一个操作数大于或等于第二个操作数时使用）。

    - <>(true：如果值不相等，则使用此运算符）。

    - >（true：当第一个操作数大于第二个操作数时使用）。

    - <（true：当第一个操作数小于第二个操作数时使用）。


    让我们看一些比较运算符的实际例子。打开Python并输入以下代码，


    - 5 == 5

    - 按Enter键


    Python将返回True


    现在输入


    - 5==3

    - 按Enter键


    Python将返回False


    让我们再试一个。输入代码，


    - 5 >= 5

    - 按Enter键


    Python返回True。


    现在输入，


    - 8>=11

    - 按Enter键


    Python返回False。'
