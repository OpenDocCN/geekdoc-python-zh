    # K-Nearest Neighbors


    K-Nearest Neighbors (KNN) is a versatile and simple machine learning algorithm
    used for both classification and regression tasks. It makes predictions based
    on the majority class or average of neighboring data points.


    # Key Concepts


    +   - Distance metric—KNN relies on a distance metric to measure the similarity
    between data points. Common distance metrics include Euclidean, Manhattan, Minkowski,
    and Hamming.

    - K-Neighbors—KNN considers the ''k'' nearest neighbors to a data point to make
    predictions. The choice of ''k'' impacts the model''s sensitivity to noise and
    overall performance.

    - Majority voting—for classification, the class that appears most frequently among
    the ''k'' neighbors is assigned to the new data point.

    - Mean (regression)—for regression, the average of the ''k'' nearest neighbors''
    target values is assigned to the new data point.'
