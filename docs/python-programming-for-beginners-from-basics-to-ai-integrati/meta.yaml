    There are two ways to run a Python program. These are by using its runtime environment
    or using the command line interpreter.


    The command line interpreter has two forms. The first one is the regular Python
    shell and the second one is IDLE or Integrated Development and Learning Environment.


    The regular Python shell uses the familiar command line interface (CLI) or terminal
    look.'
