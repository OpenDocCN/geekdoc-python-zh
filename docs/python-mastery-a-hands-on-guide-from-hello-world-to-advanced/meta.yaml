    \n## 第4章：函数与模块\n\n函数是Python程序的核心构建块之一。随着你的代码长度和复杂度增加，明智地使用函数可以让你将代码组织成可重用和抽象化的逻辑块。函数是组织在一起执行连贯操作的语句块。它们通常接收输入，处理它们，然后返回输出或结果。例如，一个简单的函数可以接收一个名字作为输入，并通过将首字母大写并添加“先生”或“女士”等称谓来格式化它。\n\
    \n与文件中松散、无组织的语句集合相比，函数使你的代码在高级别上模块化、可重用且可读。在Python中定义函数是通过 `def` 关键字完成的，后跟函数名和用于参数的括号。在其下方，缩进的代码块包含该函数体的语句。这是最简单的Python函数，只打印一条硬编码的消息：\n\
