    \n因此，变量存储数据，而列表/元组/字典组织更复杂的信息——但是如何包装有用的逻辑本身以便重用呢？Python函数正是为此目的而生，它们允许程序员定义可重用的逻辑块，可以通过清晰的接口调用。把它们想象成小机器，接受"
