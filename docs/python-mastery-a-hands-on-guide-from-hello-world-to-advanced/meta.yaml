    \ text manipulation challenges. Up next we'll look at reading and writing different\
    \ file formats with Python. The skills you have around strings will come in handy\
    \ as we process data streams and encode output...\n\n## Chapter 8\n\n## File I/O\
    \ and Exception Handling\n\nOpening a file in Python is as simple as calling the\
    \ open() function with two arguments – the file path and mode. The mode defaults\
    \ to 'r' for reading if not specified. You can call the file object's .read()\
    \ method to read the entire contents at once. This returns the contents as one\
    \ big string. You could print this out or assign it to a variable for processing.\n\
    \nFor example, say we had a text file called story.txt in the same folder as our\
    \ Python script. We could open and read it like this:\n\n```\nfile = open('story.txt')\n\
    text = file.read()\nprint(text)\n```\n\nNow, what if we wanted to process this\
    \ line-by-line instead of all at once? For that, we could iterate over the file\
    \ object with a for loop. The file itself acts as an iterable that will yield\
    \ each line, including the newline characters. We can clean those up with .strip()\
    \ if needed.\n\nHere's an example printing each line:\n\n```\nwith open('story.txt')\
    \ as file:\n    for line in file:\n        print(line.strip())\n```\n\nNotice\
    \ I used a with statement here – this neatly wraps opening and closing the file\
    \ to ensure it gets closed properly after the block inside finishes.\n\nNow, while\
    \ reading files is useful, we'll often want to write data out as well. By passing\
    \ 'w' or 'a' as the second argument to open(), we can get a writeable file object.\
    \ 'w' overwrites any existing file with the same name while 'a' appends to it,\
    \ preserving previous contents. Then, we can call .write() to output strings just\
    \ like print but to disk:\n\n```\nwith open('output.txt', 'w') as out:\n    out.write('Hello\
    \ world!')\n```\n\nThe above would write Hello world! to output.txt, deleting\
    \ anything already there. If we did 'a' instead, our greeting would be added below.\n\
    \nWe can also open in append mode and treat the file object as iterable to write\
    \ multiple lines:\n\n```\nwith open('output.txt', 'a') as out:\n    for line in\
    \ some_list:\n        out.write(line + '\\n')\n```\n\nThis loops through some\
    \ list data, writing each item on its own line. The \\n adds a newline after each\
    \ one.\n\nSo, reading and writing files in Python is quite straightforward - open\
    \ the file, read/process/write data, and let the with statement handle closing\
    \ it cleanly. But what about potential errors? Sadly, your code won't always find\
    \ files in the right spot or have permission to access them. Exceptions could\
    \ be raised not only for missing files but also for bad extensions, full disks,\
    \ network timeouts, and more. How you handle these situations is important. Python\
    \ groups file and I/O-related errors into built-in exception classes. For missing\
    \ files, there's FileNotFoundError, while permission issues trigger PermissionError.\
    \ By catching specific exceptions, you can program appropriate error-handling\
    \ logic.\n\nHere's a common pattern:\n\n```\ntry:\n    open('does_not_exist.bad')\n\
    except FileNotFoundError:\n    print(\"Couldn't find your file sorry!\")\nexcept\
    \ PermissionError:\n    print(\"This file is off limits unfortunately.\")\n```\n\
    \nWe try to open a bogus file and gracefully print custom error messages based\
    \ on the exact failure that occurs. The code then moves on rather than crashing\
    \ outright.\n\nYou might log errors, prompt the user to fix problems, or provide\
    \ alternate data when exceptions pop up – depending on your use case. The key\
    \ is thinking through what could go wrong and providing a good experience. Now,\
    \ while that snippet had the try/except right next to the risky operation, you\
    \ can wrap entire functions or complex logic in try/except as well. Where exactly\
    \ you set up error handling depends on the flow of your program.\n\nOf course,\
    \ manually writing try/except blocks everywhere leads to messy code. We can abstract\
    \ bits like error-prone file operations into their own helper functions instead:\n\
    \n```\ndef load_cache():\n    try:\n        with open('cache.json') as f:\n  \
    \          return json.load(f)\n    except FileNotFoundError:\n        # Cache\
    \ missing, start a new one\n        return {}\n```\n\nHere, loading the cache\
    \ tries to open and parse a local JSON file, but if it is missing, it assumes\
    \ the cache doesn't exist yet. By handling errors in the function itself, we simplify\
    \ the workflow. Later on, to use this cache, we just call load_cache() without\
    \ try/except noise every time. The failures are neatly tucked away. This keeps\
    \ application logic clean and error handling consolidated.\n\nSpeaking of keeping\
    \ clean, with open() calls lend themselves nicely to the with statement, as we've\
    \ seen earlier, but you can also bind the file object to a separate name if desired\
    \ through another construct called context managers:\n\n```python\nimport json\n\
    from contextlib import contextmanager\n\n@contextmanager\ndef open_cache():\n\
    \    cache = None\n    try:\n        cache = open('cache.json')\n        yield\
    \ cache\n    finally:\n        if cache:\n            cache.close()\n\nwith open_cache()\
    \ as f:\n    data = json.load(f)\n```\n\nHere, open_cache() handles file setup/teardown\
    \ behind the scenes, freeing callers up from repeating that each time. This pattern\
    \ comes in handy when working with expensive resources like database connections\
    \ as well. Wrapping resources ensures they are released regardless of downstream\
    \ issues. The try/finally, coupled with the context manager, handles that for\
