    \ to these methods:\n\n```\nwith open('chart.png', 'rb') as image:\n    data =\
    \ image.readbytes()\n\nwith open('clone.png', 'wb') as dupe:\n    dupe.writebytes(data)\n\
    ```\n\nHere, we read the binary contents of chart.png into a bytes object, then\
