    \ is {0}'.format(name))\n# My name is Ada\n\nprint('Hello {0}. You are {1} years\
    \ old.'.format(name, age))\n# Hello Ada. You are 19 years old.\n```\n\nThe numbers\
    \ inside the braces reference the arguments passed to `format()` by position.\n\
    \nWe can also use named arguments:\n\n```python\nprint('Hello {name}. You are\
