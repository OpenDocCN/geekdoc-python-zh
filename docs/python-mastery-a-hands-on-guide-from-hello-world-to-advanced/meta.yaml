    \ `vprof` 和 `pyan` 可以输出性能分析数据和调用栈的交互式可视化。能够查看导入树和嵌套函数执行情况提供了宝贵的洞察。虽然存在像 Python\
    \ Visual Studio 这样出色的图形化调试器，但不要低估命令行工具在快速评估复杂代码库方面的威力！\n\n最后，值得一提的是那些可以评估你的依赖是否存在安全漏洞的工具。存在已知问题的库会带来重大风险。\n\
    \nSafety 会根据一个精心维护的 CVE（常见漏洞和暴露）数据库来检查你已安装的包。只需运行：\n\n```\nsafety check\n```\n\
    \n这会基于你的 `requirements.txt` 进行扫描，检测需要升级或移除的问题包。然后，Safety 可以锁定你的 `requirements.txt`\
