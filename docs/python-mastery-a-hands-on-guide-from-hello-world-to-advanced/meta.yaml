    \ size. So flush or close files after writing mission-critical data to guarantee\
    \ it appears in case of crashes right after writing.\n\nThe best practice for\
    \ opening files is using context managers via the with statement. This handles\
    \ both opening and automatically closing the file for you:\n\n```\nwith open('data.txt',\
    \ 'r') as file:\n    data = file.read()\n    print(data)\n```\n\nThe context manager\
    \ opens the file to use inside the indented with block. When execution leaves\
