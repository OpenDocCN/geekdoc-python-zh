    \ for app runtime\n\n`requirements-dev.txt` for tests, debugging, etc\n\nOverall,\
    \ some thought on project structure goes a long way! Place dependencies in an\
    \ obvious location near the code but still decoupled.\n\nBeyond text-based lists,\
    \ several tools exist to visualize dependencies and inheritance in Python codebases.\
    \ These provide graphical representations of the hierarchies and relationships\
    \ between modules and packages. For example, running `pydeps` on a Python project\
    \ generates an abstract diagram of how source files depend on one another through\
