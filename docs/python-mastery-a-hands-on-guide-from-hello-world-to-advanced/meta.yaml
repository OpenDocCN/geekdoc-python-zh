  md: 'Virtual environments fix this problem by isolating the packages needed for
    each project. By default, Python stores all installed packages globally on your
    system. With virtual environments, Python keeps libraries separate in folders
    tied to each project. Now, if you need to update a package for one project, it
    won’t mess up the libraries for your other code! It’s like keeping your work,
    personal life, and hobbies separated rather than jumbled together. Virtual environments
    help you avoid dependency conflicts so each project has what it needs without
    version headaches.


    Under the hood, virtual environments work by hooking into Python’s site directory.
    When you run Python or a Python script, the interpreter looks to the site directory
    to find installed packages and namespaces. By default, there is one system-wide
    site directory, which lives outside of your project folders. This is why when
    you run pip install pytest, you can then import pytest from any script – it’s
    globally available to all Python projects. Virtual environments create isolated
    site directories tied to a single project. By activating a virtual environment,
    you make Python and pip point to a project-specific site directory rather than
    the global one.'
