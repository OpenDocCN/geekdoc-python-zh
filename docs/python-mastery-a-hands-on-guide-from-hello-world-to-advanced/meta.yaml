    \n慢慢来，尝试不同的切片和转换操作。遇到困难时，可以参考书后的答案。\n\n至此，你应该已经能够熟练地进行字符串的分割、切片、清理、替换和格式化，以应对各种文本处理需求。让我们用一些技巧来收尾吧……\n\
    \n我们对Python字符串处理能力的探索，传授了几项关键经验，助你 masterfully 应对数据清洗和解析挑战。我们将诸如去除空白、类型转换、切片和替换等关键技术，连同用于输出格式化的说明符，一并添加到了我们的工具箱中。现在，我们可以熟练地按分隔符分割字符串，以访问CSV和文本文件中的日志信息。正则表达式在处理复杂情况时便于进行高级替换，而专用库则能处理棘手的文件格式。由于字符串是不可变的，我们必须将转换后的版本赋值给新变量。通过了解可用工具、利用关键方法，并认识到复杂辅助工具的必要性，我们现在可以灵活地处理字符串数据，为后续的分析和报告做好准备。\n\
    \n字符串基础就讲到这里！你现在已准备好应对各种文本处理挑战。接下来，我们将探讨如何使用Python读写不同的文件格式。你掌握的字符串技能将在我们处理数据流和编码输出时派上用场……\n\
    \n## 第8章\n\n## 文件I/O与异常处理\n\n在Python中打开文件很简单，只需调用`open()`函数并传入两个参数——文件路径和模式。如果未指定模式，默认为`'r'`（读取）。你可以调用文件对象的`.read()`方法一次性读取全部内容。这会将内容作为一个大字符串返回。你可以将其打印出来或赋值给一个变量进行处理。\n\
    \n例如，假设我们有一个名为`story.txt`的文本文件，与Python脚本位于同一文件夹。我们可以这样打开并读取它：\n\n```\nfile = open('story.txt')\n\
    text = file.read()\nprint(text)\n```\n\n那么，如果我们想逐行处理而不是一次性全部读取呢？为此，我们可以使用`for`循环遍历文件对象。文件本身就是一个可迭代对象，它会逐行生成内容，包括换行符。如果需要，我们可以用`.strip()`来清理这些换行符。\n\
    \n这是一个打印每一行的示例：\n\n```\nwith open('story.txt') as file:\n    for line in file:\n\
    \        print(line.strip())\n```\n\n注意我这里使用了`with`语句——它能很好地封装文件的打开和关闭操作，确保在内部代码块执行完毕后文件被正确关闭。\n\
    \n现在，虽然读取文件很有用，但我们通常也需要将数据写入文件。通过向`open()`传递`'w'`或`'a'`作为第二个参数，我们可以获得一个可写的文件对象。`'w'`会覆盖任何同名的现有文件，而`'a'`则会追加内容，保留之前的内容。然后，我们可以调用`.write()`来输出字符串，就像`print`一样，只不过是写入磁盘：\n\
    \n```\nwith open('output.txt', 'w') as out:\n    out.write('Hello world!')\n```\n\
    \n上面的代码会将`Hello world!`写入`output.txt`，删除其中已有的任何内容。如果我们使用`'a'`，我们的问候语则会被添加到文件末尾。\n\
    \n我们也可以以追加模式打开文件，并将文件对象视为可迭代对象来写入多行：\n\n```\nwith open('output.txt', 'a') as out:\n\
    \    for line in some_list:\n        out.write(line + '\\n')\n```\n\n这会遍历`some_list`数据，将每个项目写入单独的一行。`\\\
    n`在每个项目后添加一个换行符。\n\n因此，在Python中读写文件相当直接——打开文件，读取/处理/写入数据，然后让`with`语句负责干净地关闭它。但是潜在的错误呢？遗憾的是，你的代码并不总能找到位置正确的文件，或者拥有访问权限。异常可能不仅因为文件缺失而引发，还可能因为扩展名错误、磁盘已满、网络超时等原因。如何处理这些情况很重要。Python将文件和I/O相关的错误归入内置异常类。对于缺失的文件，有`FileNotFoundError`，而权限问题则会触发`PermissionError`。通过捕获特定的异常，你可以编写适当的错误处理逻辑。\n\
    \n这是一个常见的模式：\n\n```\ntry:\n    open('does_not_exist.bad')\nexcept FileNotFoundError:\n\
    \    print(\"Couldn't find your file sorry!\")\nexcept PermissionError:\n    print(\"\
    This file is off limits unfortunately.\")\n```\n\n我们尝试打开一个不存在的文件，并根据发生的具体错误优雅地打印自定义错误消息。然后代码会继续执行，而不是直接崩溃。\n\
    \n当异常出现时，你可能会记录错误、提示用户解决问题，或者提供备用数据——这取决于你的使用场景。关键在于思考可能出现的问题并提供良好的体验。现在，虽然上面的代码片段将`try/except`紧挨着有风险的操作，但你也可以将整个函数或复杂逻辑包裹在`try/except`中。具体在哪里设置错误处理取决于你程序的流程。\n\
    \n当然，到处手动编写`try/except`块会导致代码混乱。我们可以将容易出错的文件操作等部分抽象成自己的辅助函数：\n\n```\ndef load_cache():\n\
    \    try:\n        with open('cache.json') as f:\n            return json.load(f)\n\
    \    except FileNotFoundError:\n        # 缓存缺失，创建一个新的\n        return {}\n```\n\
    \n这里，加载缓存尝试打开并解析一个本地JSON文件，但如果文件缺失，它就假设缓存尚不存在。通过在函数内部处理错误，我们简化了工作流程。之后，要使用这个缓存，我们只需调用`load_cache()`，而无需每次都写`try/except`的冗余代码。失败情况被妥善隐藏。这使得应用逻辑保持清晰，错误处理得以集中。\n\
    \n说到保持清晰，正如我们之前所见，`with open()`调用非常适合与`with`语句一起使用，但如果你愿意，也可以通过另一种称为上下文管理器的构造将文件对象绑定到一个单独的名称：\n\
    \n```python\nimport json\nfrom contextlib import contextmanager\n\n@contextmanager\n\
    def open_cache():\n    cache = None\n    try:\n        cache = open('cache.json')\n\
    \        yield cache\n    finally:\n        if cache:\n            cache.close()\n\
    \nwith open_cache() as f:\n    data = json.load(f)\n```\n\n这里，`open_cache()`在幕后处理文件的设置/清理工作，让调用者无需每次都重复这些操作。这种模式在处理数据库连接等昂贵资源时也很有用。封装资源可以确保无论下游出现什么问题，资源都能被释放。`try/finally`与上下文管理器结合，为你处理了这一切。\n\
    \n现在，尽管Python的文件处理总体上很简单，但处理二进制数据却有点麻烦。既然`.read()`返回的是文本字符串，那么如何加载图像、Excel电子表格、zip压缩包等呢？嗯，有一个单独的`.readbytes()`方法以及与之匹配的`.writebytes()`方法，正是为此目的而设。它们操作的是原始字节字符串，而不是文本。\n\
    \n因此，要处理二进制格式，你可以切换到这些方法：\n\n```\nwith open('chart.png', 'rb') as image:\n   \
    \ data = image.readbytes()\n\nwith open('clone.png', 'wb') as dupe:\n    dupe.writebytes(data)\n\
    ```\n\n这里，我们将`chart.png`的二进制内容读入一个`bytes`对象，然后将这些原始字节写入一个副本图像文件`clone.png`，没有任何文本格式的编码/解码。\n\
    \n这对于镜像图像或文档等简单情况效果很好。然而，在处理二进制格式时，拥有编码器/解码器库来理解数据会很有帮助。调整图像大小、修改Excel工作表等，最好留给专用工具来处理。幸运的是，Python拥有丰富的二进制处理库生态系统，例如用于图像的PIL，用于Excel数据的pandas等等。因此，虽然`.readbytes()`让你能访问原始数据，但特定领域的包有助于解释它。"
