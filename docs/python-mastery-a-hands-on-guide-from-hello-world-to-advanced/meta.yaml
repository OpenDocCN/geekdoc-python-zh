    \ 找上你之前先发现它们！\n\n通过我们对 Python 虚拟环境的探索，我们已经掌握了一套管理依赖的强大技能。我们现在可以生成 `requirements.txt`\
    \ 文件来精确记录环境中使用的版本，并在之后轻松重现它们。像 Pipenv 这样的工具使我们能够锁定特定的依赖版本以实现可重复构建。我们还获得了关于如何组织源代码与依赖声明，以及可视化内部模块之间关系的最佳实践。最后，我们掌握了负责任地检查安全漏洞的方法。通过这种涵盖输出、锁定、组织、可视化和安全的多方面依赖管理方法，我们的\
    \ Python 项目已准备好顺利扩展，同时避免问题。\n\n将这些技能应用到你自己的工作流程中，你会注意到在依赖管理方面的组织性和团队协作性有了巨大提升。在引入新开发者或评估生产问题时，再也不用浪费数小时调试“在我机器上能运行”的配置不匹配问题了。通过声明式地管理你的\
    \ Python 环境依赖，你提供了即时的清晰度。在最后一节，我们将介绍一些虚拟环境的高级使用模式，比如为数据科学笔记本预装环境、运行图形界面应用，甚至构建\
    \ Docker 容器。我们将在另一边会合，共同完成对 Python 虚拟环境的掌握！\n\n现在，我们已经广泛探讨了为什么虚拟环境能在 Python 中实现更顺畅的依赖管理。你现在掌握了所有核心技能，可以在新旧项目中重现一致的开发环境。随着你的\
    \ Python 技能提升，会出现更复杂的应用场景，将虚拟环境应用于超越基本脚本执行的领域，例如为 Jupyter Notebook 服务器环境预装依赖以保持隔离，安全地配置图形用户界面应用而无需全局安装库，以及为生产部署构建优化的\
    \ Docker 镜像。这些实际场景——笔记本、GUI 和容器——展示了虚拟环境的灵活性，能够适应从简单脚本到中间服务器再到部署就绪包的各种需求。虚拟环境无缝地处理从开发到生产的多种角色，适用于各种\
    \ Python 工作流，如一次性分析、交互式计算以及作为容器分发的独立应用。\n\n这些例子展示了虚拟环境如何同样适用于（甚至更适用于！）复杂的 Python\
    \ 工作流。让我们提升你的技能，以应对更具挑战性的依赖隔离难题。数据科学家们——这是为你们准备的！在分析 Jupyter Notebook 时，管理依赖可能会变得棘手。将笔记本复制到不同项目意味着你最终会运行依赖于不同环境的单元格。幸运的是，通过将\
    \ virtualenv 与 Jupyter 集成，你现在可以针对一个预加载的、隔离的环境来执行单元格！\n\n关键是在笔记本本身内激活你的虚拟环境：\n\n\
    ```python\nimport os\nimport sys\n\nif \"my_venv\" not in sys.prefix:\n    os.system(\"\
    pip3 install virtualenv\")\n    os.system(\"python3 -m venv my_venv\")\n    os.system(\"\
    source my_venv/bin/activate\")\n```\n\n现在，当你导入 pandas、matplotlib 等库时，笔记本使用的是虚拟环境中的副本。在笔记本中工作时，首先运行这个单元格以避免全局导入。接下来，将笔记本与从\
    \ `my_venv` 生成的 `requirements.txt` 一起分享。任何加载该笔记本的人都会获得一个与你原始环境匹配的预装环境——零不匹配问题。这个工作流使分析过程端到端地保持封装和可重现。前面介绍的技术都可以直接与计算笔记本集成——因此将它们应用于研究和实验吧！\n\
    \n有时，在 Python 中，你想要构建图形桌面应用和小部件。虽然不如 Web 后端和脚本常见，但它是一个完全支持的工作负载。GUI 应用不仅依赖 Python\
    \ 本身，还依赖于与窗口系统接口、OpenGL、系统字体、音频 API 等的绑定。这些原生共享库可能有非常挑剔的版本要求！那么，我们如何在虚拟环境中隔离 GUI\
    \ 应用的依赖呢？\n\n关键是在创建虚拟环境时使用 `--system-site-packages` 标志：\n\n```\nvirtualenv --system-site-packages\
    \ gui_venv\n```\n\n现在，当激活环境时，操作系统级别的依赖（如 GUI 框架）仍然可以访问。这允许集成了 Tkinter、Kivy、PyGame\
    \ 等的应用正常运行。请记住，应用可能会动态加载虚拟环境之外的库。因此，虽然纯 Python 依赖可以隔离，但为了真正的操作系统级别一致性，请考虑使用 Docker\
    \ 容器（接下来介绍）。\n\n那么，让我们来谈谈 Docker！容器通过打包整个运行时——不仅仅是 Python 本身——来提供操作系统级别的一致性。这使它们成为虚拟环境的完美伴侣。关键优势在于，容器不仅隔离了\
    \ Python 的环境差异，还隔离了系统包、编译器、共享库、配置以及运行主机本身的差异！这意味着你可以构建一个 Docker 镜像，将你的虚拟环境烘焙其中，然后可靠地将其部署到任何地方，而不会出现底层环境的意外。\n\
    \n一个示例 Dockerfile 如下所示：\n\n```dockerfile\nFROM python:3.8\nCOPY . /app\nRUN python3\
    \ -m venv /app/venv\nRUN /app/venv/bin/pip install -r /app/requirements.txt\n\
    ENV PATH=\"/app/venv/bin:$PATH\"\nCMD [ \"python\", \"/app/src/main.py\" ]\n```\n\
    \n现在，通过首先构建虚拟环境，容器将所有 Python 依赖直接冻结到镜像中。任何人都可以运行该容器，并在任何地方获得相同的运行时行为，这要归功于完全的环境隔离！因此，虽然虚拟环境专注于\
    \ Python 本身，但 Docker 在基础设施层面革新了环境一致性。这些工具协同工作效果极佳——将它们结合起来，构建真正万无一失的运行时！\n\n掌握了虚拟环境隔离技术，我们现在已准备好拥抱更高级的工作流。我们可以利用这些技能来预装笔记本环境，从而安全地将数据科学工作所需的库和配置与其他项目隔离开来。此外，我们还获得了从虚拟环境中启动图形桌面应用的能力，以便将其依赖也分离开来。凭借我们新掌握的技能，我们可以将虚拟环境扩展到超越传统用例的复杂场景中。"
