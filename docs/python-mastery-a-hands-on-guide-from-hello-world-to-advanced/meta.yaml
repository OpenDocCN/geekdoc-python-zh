- md: '## CPython and Anaconda


    CPython is lightweight and fast by nature. However, out of the box, CPython itself
    won''t give you much beyond the raw Python syntax and standard libraries. You
    must install third-party libraries separately for tasks like data analysis or
    machine learning. Popular integrated development environments (IDEs) like PyCharm
    are built on CPython under the hood. CPython is a great choice if you want a minimalist
    base Python environment to customize over time.


    Anaconda, offered by the data science company Anaconda Inc., takes the opposite
    approach. It''s a gigantic bundle aimed at data professionals, packing in over
    250 of today''s most essential Python data libraries right from the start: NumPy,
    Pandas, Matplotlib, and many more. That makes getting up and running with Python
    for math/science workloads much faster. However, it also consumes way more storage
    space. For the general purpose of Python coding, CPython may be the more flexible
    option.


    ## Architecture Decision: 32-bit or 64-bit


    When installing either flavor of Python, you must make an important architecture
    decision upfront: 32-bit or 64-bit. Modern computers almost universally run 64-bit
    CPUs and operating systems these days. So, you generally want to match the "bitness"
    of your Python interpreter to the native bitness of your hardware. 64-bit Python
    can access more RAM and perform better for math/ML tasks. Just be cautious when
    installing certain Python package dependencies later, as they may only be available
    pre-built for specific architectures. Once you''ve settled on CPython or Anaconda
    and 64-bit or 32-bit, the next choice is how you want to install your chosen distribution.


    ## Installation Methods


    Both CPython and Anaconda provide super easy graphical installers for Windows,
    Mac, and Linux. Just download the executable, double-click to launch, and follow
    the prompts! The graphical installers handle all the complex environment configurations
    automatically. Within minutes, you''ll have Python ready to go from a terminal
    and also installed directly into supported IDEs like Visual Studio Code. This
    works very nicely out of the box, but the trade-off is less visibility into how
    Python gets installed and set up.


    Seasoned Python developers often choose to install CPython or Anaconda manually
    from scratch instead. While more complex, this allows finer-grained control over
    configuration details. You can dictate the install location, library versions,
    and environment variables registered. Virtual environments (covered later in Chapter
    11) also come into play to segregate Python interpreters and dependencies across
    different apps/projects. The manual approach takes more effort upfront, but the
    long-run result is a highly personalized Python environment catered to your needs.


    For this introductory chapter, stick with the graphical installers for simplicity.
    But as you advance through more complex Python projects later, don''t hesitate
    to step up to manual configuration and virtual environments for optimal control!


    ## Your First Python Program


    With a 64-bit CPython 3.x distribution installed via the graphical method, you''re
    now ready to write your first Python program! Open up a plain text editor – either
    a basic option like Notepad on Windows or a more full-featured IDE like VSCode.
    Go ahead and type out this code snippet:


    ```python

    print("Hello World!")

    ```


    Save the file as `hello_world.py` somewhere that is easy to access from a terminal.
    The ".py" file extension marks this as a Python script.


    Next, launch a terminal by opening Command Prompt (Windows) or Terminal (Mac).
    Use the change directory (cd) command to navigate to the location you saved `hello_world.py`.


    Finally, execute the script with Python followed by the filename:


    ```

    python hello_world.py

    ```


    You should see "Hello World!" immediately printed out upon hitting enter. Congratulations,
    you just ran your first Python program!


    ## How Python Execution Works


    Now, let''s break down exactly what happened here from start to finish. Python
    is considered an interpreted language rather than a compiled language. Languages
    like C/C++ require first translating source code into machine code (0s and 1s)
    before anything can run. This compiled executable then executes natively on the
    given hardware. Python, however, skips the compilation step. Instead, an interpreter
    parses and directly executes each line of Python source code on the fly. This
    allows for much faster code-test iterations without any compile steps disrupting
    the flow.


    Behind the scenes, several steps execute in sequence when you type "python hello_world.py"
    at the command line to run your simple print statement script. First, the Python
    executable launches and initializes the CPython interpreter. CPython then progressively
    loads and parses each line of `hello_world.py`, including interpreting the print
    function call to output the text string "Hello World!" to standard output (your
    terminal screen). With no other lines left, CPython reaches the end-of-file, gracefully
    exits the Python interpreter, and returns you back to the command prompt. So,
    while only two words visibly print from your script, invoking the Python command
    and runtime kicks off quite a complex sequence - loading the interpreter, parsing
    syntax, mapping print to terminal output, and exiting execution. Understanding
    this hidden choreography can demystify what processes execute your code behind
    the cursory terminal interface. This interpretation step is key to unlocking Python''s
    accessibility and versatility. It allows coders to test ideas without formal compilation
    rapidly, and it lets Python scale anything from one-liner scripts up to huge,
    complex systems with the same codebase.


    ## Python as a "Glue" Language and Version Management


    You may also hear Python referred to as a "glue" language - this dynamic execution
    model is a major reason why. The next time you use Python to stitch together different
    services, databases, or interfaces, remember the interpretation magic happening
    behind the terminal! It''s also important to point out that multiple major versions
    of Python can co-exist on the same system. Backward incompatible syntax and API
    changes do occur between releases like Python 2.x vs 3.x. Your system''s default
    "Python" may currently point to a certain version (say Python 2.7), but that can
    be configured to reference newer ones like Python 3.8 instead. Virtual environments
    touched on earlier also help create independent Python environments across versions.


    So, don''t be afraid to install different versions of Python interpreters side-by-side.
    Tools like pyenv and poetry help toggle between them cleanly from the terminal
    or config files. We''ll revisit virtual environments in-depth later in Chapter
    11. For now, be comfortable knowing that Python allows for both the isolation
    of environments per project and the harmonious co-existence of legacy vs modern
    versions per system. This flexibility is another reason Python is built to scale
    across everything, from small scripts to long-standing applications!


    ## Looking Ahead


    With Python installed and "hello world" under your belt, you''re all set for serious
    learning! For the rest of this chapter, we will dive deeper into Python''s basic
    syntax, variables, and data structures for storing information. Get ready to start
    coding more complex logic as we level up key building blocks - ifs, loops, functions,
    and more. The journey continues, my friend! Before long, you''ll be leveraging
    Python''s extensive libraries to analyze data, train machine learning models,
    and automate everyday workflows. Stick with me through these beginning steps,
    and soon, you''ll unlock a world of programming potential with Python.


    Just as a pilot trains for their first day behind the cockpit controls of a Cessna,
    beginner Python coders should also start simple. Small, straightforward scripts
    allow new developers to grasp basic syntax, flow, and output before advancing
    to more complex logic. You must walk before you try running across launch pads!
    In my college days, I fondly remember my roommate, Philipp. As a physics major,
    he often puzzled for hours over lengthy formulas and confounding quantum mechanics
    concepts. Yet, when I showed Philipp a simple Python script on my computer one
    late night, his eyes lit up with child-like awe:'
  mdcn: '## CPython 与 Anaconda


    CPython 本质上轻量且快速。然而，开箱即用的 CPython 本身除了提供原始的 Python 语法和标准库外，并不会给你太多其他东西。对于数据分析或机器学习等任务，你必须单独安装第三方库。像
    PyCharm 这样流行的集成开发环境（IDE）底层就是基于 CPython 构建的。如果你想拥有一个极简的、可随时间推移进行定制的基础 Python 环境，CPython
    是一个绝佳的选择。


    由数据科学公司 Anaconda Inc. 提供的 Anaconda 则采取了相反的策略。它是一个面向数据专业人士的巨大软件包，一开始就包含了当今最重要的
    250 多个 Python 数据库：NumPy、Pandas、Matplotlib 等等。这使得为数学/科学工作负载启动并运行 Python 变得快得多。然而，它也消耗了更多的存储空间。对于通用的
    Python 编码目的，CPython 可能是更灵活的选择。


    ## 架构决策：32 位还是 64 位


    在安装任一版本的 Python 时，你必须预先做出一个重要的架构决策：32 位还是 64 位。如今，现代计算机几乎普遍运行 64 位 CPU 和操作系统。因此，你通常希望将
    Python 解释器的“位数”与硬件的原生位数相匹配。64 位 Python 可以访问更多 RAM，并且在数学/机器学习任务中表现更好。只是在后续安装某些
    Python 包依赖时要小心，因为它们可能只提供针对特定架构的预编译版本。一旦你确定了使用 CPython 还是 Anaconda，以及 64 位还是 32
    位，下一个选择就是如何安装你选择的发行版。


    ## 安装方法


    CPython 和 Anaconda 都为 Windows、Mac 和 Linux 提供了超级简单的图形化安装程序。只需下载可执行文件，双击启动，然后按照提示操作即可！图形化安装程序会自动处理所有复杂的环境配置。几分钟之内，你就可以从终端使用
    Python，并且它也会直接安装到像 Visual Studio Code 这样受支持的 IDE 中。这开箱即用效果很好，但代价是对于 Python 如何安装和设置的可见性较低。


    经验丰富的 Python 开发者通常选择从头手动安装 CPython 或 Anaconda。虽然更复杂，但这允许对配置细节进行更细粒度的控制。你可以指定安装位置、库版本和注册的环境变量。虚拟环境（稍后在第
    11 章介绍）也发挥作用，用于在不同应用/项目之间隔离 Python 解释器和依赖项。手动方法前期需要更多努力，但长期结果是获得一个高度个性化、满足你需求的
    Python 环境。


    对于这个入门章节，为简单起见，请坚持使用图形化安装程序。但随着你后续处理更复杂的 Python 项目时，请毫不犹豫地升级到手动配置和虚拟环境，以获得最佳控制！


    ## 你的第一个 Python 程序


    通过图形化方法安装了 64 位 CPython 3.x 发行版后，你现在准备好编写你的第一个 Python 程序了！打开一个纯文本编辑器——可以是像 Windows
    上的记事本这样的基本选项，也可以是像 VSCode 这样功能更全面的 IDE。请继续输入这段代码片段：


    ```python

    print("Hello World!")

    ```


    将文件保存为 `hello_world.py`，放在一个容易从终端访问的位置。".py" 文件扩展名将其标记为 Python 脚本。


    接下来，通过打开命令提示符（Windows）或终端（Mac）来启动终端。使用更改目录（cd）命令导航到你保存 `hello_world.py` 的位置。


    最后，使用 Python 命令后跟文件名来执行脚本：


    ```

    python hello_world.py

    ```


    按下回车键后，你应该会立即看到打印出 "Hello World!"。恭喜，你刚刚运行了你的第一个 Python 程序！


    ## Python 执行原理


    现在，让我们从头到尾分解一下这里到底发生了什么。Python 被认为是一种解释型语言，而不是编译型语言。像 C/C++ 这样的语言需要先将源代码翻译成机器码（0
    和 1），然后才能运行。这个编译后的可执行文件随后在给定的硬件上原生执行。然而，Python 跳过了编译步骤。相反，解释器会动态解析并直接执行每一行 Python
    源代码。这使得代码测试迭代快得多，没有任何编译步骤打断流程。


    在幕后，当你在命令行输入 "python hello_world.py" 来运行你的简单打印语句脚本时，会按顺序执行几个步骤。首先，Python 可执行文件启动并初始化
    CPython 解释器。然后，CPython 逐步加载并解析 `hello_world.py` 的每一行，包括解释 print 函数调用，将文本字符串 "Hello
    World!" 输出到标准输出（你的终端屏幕）。没有其他行剩下后，CPython 到达文件末尾，优雅地退出 Python 解释器，并将你返回到命令提示符。因此，虽然你的脚本只明显打印了两个单词，但调用
    Python 命令和运行时会启动一个相当复杂的序列——加载解释器、解析语法、将 print 映射到终端输出以及退出执行。理解这个隐藏的编排过程可以揭开在简单的终端界面背后执行你代码的进程的神秘面纱。这个解释步骤是解锁
    Python 易用性和多功能性的关键。它允许编码者无需正式编译即可快速测试想法，并且让 Python 能够使用相同的代码库从单行脚本扩展到庞大、复杂的系统。


    ## Python 作为“胶水”语言和版本管理


    你可能也听说过 Python 被称为“胶水”语言——这种动态执行模型是主要原因之一。下次你使用 Python 将不同的服务、数据库或接口拼接在一起时，请记住终端背后发生的解释魔法！同样重要的是要指出，多个主要版本的
    Python 可以在同一系统上共存。在像 Python 2.x 与 3.x 这样的版本之间，确实会发生向后不兼容的语法和 API 变更。你系统的默认“Python”可能当前指向某个版本（比如
    Python 2.7），但可以配置为引用更新的版本，如 Python 3.8。前面提到的虚拟环境也有助于在不同版本之间创建独立的 Python 环境。


    所以，不要害怕并排安装不同版本的 Python 解释器。像 pyenv 和 poetry 这样的工具可以帮助你从终端或配置文件中干净地切换它们。我们将在第
    11 章深入探讨虚拟环境。现在，请放心，Python 允许按项目隔离环境，也允许按系统和谐共存遗留版本与现代版本。这种灵活性是 Python 能够扩展应用于从小型脚本到长期运行的应用程序等一切场景的另一个原因！


    ## 展望未来


    Python 已经安装好，“hello world”也已完成，你已经准备好开始认真学习了！在本章的剩余部分，我们将深入探讨 Python 的基本语法、变量和用于存储信息的数据结构。准备好开始编写更复杂的逻辑，我们将提升关键构建模块——条件判断、循环、函数等等。旅程继续，我的朋友！不久之后，你将利用
    Python 广泛的库来分析数据、训练机器学习模型并自动化日常工作流程。请坚持跟我走过这些起步阶段，很快，你将用 Python 解锁一个充满编程潜力的世界。


    就像飞行员在第一次驾驶塞斯纳飞机的驾驶舱控制之前需要训练一样，初学 Python 的编码者也应该从简单开始。小型、直接的脚本让新开发者在进入更复杂逻辑之前，能够掌握基本语法、流程和输出。你必须先学会走，然后才能尝试在发射台上奔跑！在我大学时代，我清楚地记得我的室友菲利普。作为物理专业的学生，他经常为冗长的公式和令人困惑的量子力学概念苦思冥想数小时。然而，一天深夜，当我向菲利普展示我电脑上的一个简单
    Python 脚本时，他的眼睛闪烁着孩子般的敬畏：'
