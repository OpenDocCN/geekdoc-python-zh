    \ = names[i].upper()\n```\n\n类似地，`enumerate` 添加了计数器功能：\n\n```\nfor i, name in\
    \ enumerate(names):\n    names[i] += \" Jr.\"\n```\n\n因此，本质上，`while` 循环以及像 `range`\
    \ 和 `enumerate` 这样的额外工具有助于在处理复杂的可变序列时弥补标准 `for` 循环的局限性。\n\n在我们结束对循环数据结构的探索之前，让我添加一个有趣的例子，展示\
    \ Python 提供的灵活性。考虑这段用于交换逗号分隔名称的代码：\n\n```\nnames = \"John, Kate, Mary\"\n\nnames\
    \ = names.split(\",\")\n\nnames = \", \".join(reversed(names))\n\nprint(names)\n\
    ```\n\n我们处理了一个多步骤的字符串操作工作流。从一个 `names` 字符串开始，我们首先使用逗号分隔符将其拆分为列表，以访问各个组件。接下来，我们利用\
    \ Python 内置的 `reversed()` 函数反转了这个列表的顺序。最后，我们使用指定的分隔符将现在反转的列表成员重新连接成一个字符串。通过将列表的可变性与字符串的拆分和连接相结合，我们实现了对字符串数据的精确序列转换。因此，通过巧妙地使用函数结合循环能力，我们能够高效地交换名称顺序。这些类型的创新实现真正揭示了\
    \ Python 循环的强大之处！\n\n通过这个例子，我们现在结束了关于利用 Python 循环与常见数据结构（如列表、元组、字典等）进行交互的讨论。我们进行了一次富有洞察力的旅程，理解了序列遍历、解包元素、在迭代过程中安全地修改可变序列，以及一些混合循环和其他概念的创新实现。我希望这些实际的编码示例有助于巩固你对\
    \ Python 中数据结构循环的理解。请自己尝试一些，看看你是否能像我们刚才看到的名称示例那样展示循环的灵活性！\n\n## 第 7 章：字符串和文本处理\n\
    \n字符串是 Python 中表示和处理文本的基本数据类型。无论你是在抓取网页、解析日志文件、清理用户输入，还是格式化输出以进行显示，你都很可能一直在处理字符串。尽早掌握字符串可以让你立即创建更有用的程序。在本章中，我们将从字符串基础开始，然后逐步提升。首先，我们将创建、打印、索引和切片字符串以访问子字符串。然后，我们将使用许多内置方法来转换和操作字符串。我们将使用占位符和说明符格式化字符串以进行输出，并以实际示例（如解析文本文件和从网页提取数据）作为结束。到本章结束时，你将掌握处理大小文本处理任务所需的所有字符串技能。让我们开始吧！\n\
    \n创建字符串最简单的方法是将字符括在单引号或双引号内。例如，`'hello'` 和 `\"hello\"` 都是有效的字符串。通常，除非你需要包含撇号，否则首选单引号。你可以使用三引号在多行上创建多行字符串。字符串在\
    \ Python 中是不可变的，这意味着一旦创建字符串，其字符就无法更改。但是，你可以通过将字符串赋值给新值来修改它们。\n\n这是一个赋值给变量的简单字符串。`print`\
    \ 函数显示它：\n\n```python\nname = 'Ada'\n\nprint(name) # Ada\n```\n\n`len` 函数返回字符串中的字符数：\n\
    \n```python\nlen(name) # 3\n```\n\n方括号允许你访问单个字符：\n\n```python\nname[0] # A\nname[1]\
    \ # d\nname[2] # a\n```\n\n索引从 0 开始而不是 1，因此第一个字符的索引为 0。尝试访问超出长度的索引处的字符会引发 `IndexError`。\n\
    \n字符串可以从任何可以转换为 `str` 的内容创建，包括数字和其他对象。`str` 函数处理显式转换：\n\n```python\nstr(5) # '5'\n\
    str(3.14159) # '3.14159'\n```\n\n以下是一些隐式转换的示例：\n\n```python\nprint('Age: ' + str(20))\
    \ # Age: 20\n\nprint('Math constants: ' + str(3.14159)) # Math constants: 3.14159\n\
    ```\n\n如果没有 `str` 转换，尝试连接字符串和数字会出错。\n\nPython 中另一个方便的功能是字符串切片——通过使用方括号指定切片范围来提取子字符串。一般语法是：\n\
    \n```\n[start:stop:step]\n```\n\n就像索引一样，`start` 和 `stop` 是相对于字符串开头和结尾的偏移量。默认情况下，`step`\
    \ 为 1，意味着一次移动一个字符。\n\n让我们切片我们的 `name` 字符串：\n\n```python\nname = 'Ada'\nname[0:1]\
    \ # 'A' (字符 0 到 1)\nname[1:3] # 'da' (字符 1 到 3)\nname[1:] # 'da' (字符 1 到末尾)\n\
    name[:2] # 'Ad' (字符开头到 2)\nname[::2] # 'Ad' (从开头到末尾每隔 2 个字符)\nname[::-1] # 'adA'\
    \ (整个字符串反转)\n```\n\n省略 `start` 默认为开头，省略 `stop` 默认为末尾。我们也可以使用负索引相对于字符串末尾而不是开头进行切片。一些示例：\n\
    \n```python\ntext = 'Hello World!'\n\ntext[-6:-1] # 'World'\n\ntext[::-1] # '!dlroW\
    \ olleH'\n```\n\n切片在 Python 中常用于提取子字符串。它节省了显式跟踪字符串索引的麻烦。\n\n为了转换和处理字符串，Python\
    \ 提供了许多内置字符串方法，如 `lower()`、`upper()`、`replace()` 等。字符串方法遵循通用的命名约定——它们以字母 `str`\
    \ 开头，后跟执行的操作。以下是一些有用方法的总结：\n\n- `str.lower()` # 小写字符串\n- `str.upper()` # 大写字符串\n\
    - `str.title()` # 标题大小写\n- `str.strip()` # 移除空白\n- `str.lstrip()` # 左侧移除空白\n-\
    \ `str.rstrip()` # 右侧移除空白\n- `str.count(sub)` # 计数子字符串\n- `str.replace(old, new)`\
    \ # 替换子字符串\n- `str.split()` # 按空白分割\n- `str.startswith(prefix)` # 测试前缀\n- `str.endswith(suffix)`\
    \ # 测试后缀\n\n方法不会修改原始字符串，因为字符串是不可变的。相反，它们执行操作并返回一个包含结果的新字符串。例如：\n\n```python\n\
    text = \"  Hello World!  \"\n\nprint(text.lower()) # hello world!\n\nprint(text.upper())\
    \ # HELLO WORLD!\n\nprint(text.title()) #  Hello World!\n\nprint(text.strip())\
    \ # Hello World!\n\nprint(text.lstrip()) # Hello World!\n```"
