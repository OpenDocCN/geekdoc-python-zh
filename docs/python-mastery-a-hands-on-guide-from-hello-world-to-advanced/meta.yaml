    \n- 顺序很重要——传递的实参必须与参数顺序匹配。\n- 多个参数用逗号分隔。\n- 常见陷阱——具有默认值的参数放在最后。\n\n文档字符串通过描述函数的功能来提供文档。只需在函数第一行下方放置一个多行注释：\n\
