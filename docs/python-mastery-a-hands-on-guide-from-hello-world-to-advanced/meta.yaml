  - '[PAGE 255]


    dedicated Python runtimes for each of your projects to avoid dependencies messing
    up other code. The venv workflow keeps it simple but gets the job done. Now, let’s
    talk about extensions with virtualenv and integrated dependency management using
    Pipenv.


    The virtualenv tool builds on Python''s built-in venv module to provide expanded
    capabilities for virtual environments. virtualenv maintains cross-compatibility
    between Python 2 and 3, works on legacy Python versions lacking venv back to 2.4,
    and facilitates easily cloning existing environments using helpful tools like
    virtualenvwrapper. It also enables flexible naming conventions to keep environments
    self-documenting, like postfixing the Python version to directory names. Whereas
    venv covers basic environment needs on modern Python versions, virtualenv offers
    nicer usability extending across older runtimes, flashy features like cloning,
    and clarity via naming schemes. So, while venv suits simpler needs, virtualenv
    delivers premium quality-of-life improvements for managing many complex environment
    workflows.


    Using virtualenv is nearly the same workflow as venv, you just run virtualenv
    my_project_env instead of python3 -m venv to generate environments. One helpful
    feature is virtualenvwrapper, which adds shortcuts for'
  - '[PAGE 256]


    managing multiple virtualenvs across projects by name rather than full paths.


    Say you use:


    ```

    mkvirtualenv project1

    ```


    ```

    workon project1

    ```


    This creates and activates environments just using preset names. Plus, it integrates
    with shell startup scripts to auto-activate a virtualenv when you cd into a preset
    project directory. Pretty handy!


    Now, let’s talk about dependency management. virtualenv adds nice bonuses for
    creating and managing virtualenvs. Still, what about tracking the actual package
    dependencies inside each one? This is where Pipenv comes into play – it combines
    virtual environment management with dependency tracking using Pipfile and Pipfiles.lock
    to store what packages a project needs.


    The basic workflow looks like the following:'
  - '[PAGE 257]


    The pipenv tool streamlines initializing a virtualenv for a project, installing
    packages to it, and capturing specific pinned versions for reuse. We navigate
    a project directory and run pipenv install to instantiate the virtualenv automatically,
    and then request packages like normal with pipenv acting as a virtualenv-aware
    pip wrapper. Behind the scenes, pipenv generates a Pipfile capturing our packages
    alongside a Pipfile.lock pinning exact versions. These lockfiles act as snapshots
    to replicate the environment later, enabling seamless sharing between developers
    to recreate identical library dependency sets. The workflow of navigate, pipenv
    install, and pipenv add handles creating, populating, and capturing the details
    of virtualenvs automatically uses pipenv as the toolchain.


    Pipenv automates several key dependency management workflows that previously required
    manual effort including: creating virtual environments per project so global site-packages
    stay clean; cleanly installing packages into each virtualenv sans conflicts; tracking
    installed packages in a Pipfile so environments are reproducible; and locking
    down exact dependency versions in a Pipfile.lock for air-gapped production redeployments.
    Taken together, Pipenv programmatically handles making virtualenvs, populating
    with packages, capturing metadata, and'
  - '[PAGE 258]


    locking versions without developer effort. This enforces dependency best practices
    by default that may otherwise be neglected in manual workflows. By using Pipenv,
    teams can benefit from automated isolation, tracking, and pinned dependencies
    in a simplified all-in-one tool.


    Now, to be transparent, Pipenv has had hiccups in its usage and development as
    a project. The dependency resolving can act funky at times. Still, when it works,
    Pipenv delivers a super streamlined workflow for combining vital environment best
    practices that we Pythonistas should have in our toolbox!


    One last note - by default, virtual environments inherit the Python version you
    run python3 -m venv or virtualenv with. You can configure a different major/minor
    release by passing -p or—python:


    ```

    virtualenv -p /usr/bin/python3.8 my_project_env

    ```


    This lets you easily test across Python versions, like if you need to support
    Python 3.7 and 3.8 codebases.


    venv - Inherits Python that ran python3.'
  - '[PAGE 259]


    virtualenv – Defaults to system Python but can configure with -p.


    Pipenv – Specifies in Pipfile, defaults to latest Python3.


    And there you have it – an in-depth walkthrough on why you need virtual environments
    in Python, plus how to create and manage them! Our comprehensive exploration of
    Python virtual environments equipped us to tackle key challenges: we uncovered
    the critical problems virtual environments solve, including dependency conflicts
    and configuration intricacies; we learned how they encapsulate dependencies and
    configurations to address these issues; we studied their considerable benefits
    for both streamlining development and deploying applications; we gained practical
    experience leveraging Python''s built-in venv module before extending functionality
    with the virtualenv tool; and, finally, we implemented bundled dependency management
    using Pipenv. With this progression spanning motivations, utilities, benefits,
    and applied techniques, we can now adeptly wield virtual environments to untangle
    Python projects.


    You’re now equipped with best practices to improve your Python project dependency
    game! Next, we’ll explore'
  - '[PAGE 260]


    essential debugging techniques in Python, covering using pdb, breakpoints, logging,
    and more to squash bugs in your code quickly. Now that you can isolate dependencies
    smoothly, tracking down exactly what code causes issues gets much easier! Let’s
    move on and level up your debugging skills to build resilience and confidence
    in your coding abilities.


    As developers, we now understand the immense value of virtual environments for
    isolating project dependencies. Yet, what about managing those packages within
    the virtualenvs themselves? Tracking which versions of libraries your code depends
    on is critical for recreation and avoiding the "but it works on my machine!" excuse.
    In this section, we''ll explore essential techniques for declaratively managing
    dependencies in your Python projects. You''ll learn about the key role of requirements.txt
    and Pipfile lock files for pinned reproducible environments. We''ll also cover
    best practices for structuring file layouts to locate dependencies. Finally, we''ll
    touch on additional visualization and security auditing tools. You''ll level up
    your skills for smooth dependency management workflows by the end. Let''s dive
    in!'
  - '[PAGE 261]


    Now that you can make isolated virtual environments, the next step is tracking
    the specific packages inside them. For this, requirements.txt files are the tried
    and true standard. A requirements file simply lists the packages installed in
    an environment in a text-based format. By checking this file into source control,
    you provide a declarative manifest for stakeholders to recreate the environment
    conveniently.


    For example, say your virtualenv contains numpy, pandas, and matplotlib. The requirements.txt
    would simply contain:


    ```

    numpy==1.23.4

    pandas==1.4.2

    matplotlib==3.6.2

    ```


    The names and pinned versions declare exactly what''s needed to recreate this
    virtualenv from scratch. No'
  - '[PAGE 262]


