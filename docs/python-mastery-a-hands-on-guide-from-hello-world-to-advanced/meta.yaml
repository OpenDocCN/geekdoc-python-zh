    ## Chapter 11


    ## Virtual Environments


    Virtual environments are a critical tool for Python developers to isolate project
    dependencies and create reproducible runtimes for applications. When starting
    out, understanding why virtual environments matter can be confusing. In this chapter,
    we’ll walk through when and how to use virtual environments to improve your workflow.


    As a beginner, you may have installed Python and some libraries to start coding
    right away. Over time, though, as you work on more projects, you add more packages
    with pip install. Before long, it gets hard to track what libraries each project
    needs! Upgrading a package for one application might break another. Soon, it feels
    like you have a messy hard drive and no way to organize it. That’s where virtual
    environments come in – they create isolated Python runtimes for each project.
    It’s like putting your packages and libraries into clean folders rather than scattering
    them across your computer. Virtual environments are the best way to avoid “dependency
    hell”.


    Firstly, we’ll cover the basics of creating virtual environments. You’ll learn
    the standard venv module and third-party tools like Virtualenv and Pipenv. By
    the end, you’ll know when and how to set up virtual environments to improve your
    coding workflow. Let’s get started with an example:


    Imagine you start building a web scraper script to pull data from an e-commerce
    site. You install Requests, Beautiful Soup, and lxml to parse the HTML. The script
    works well, so you move on to your next coding project. This time, you’re building
    a simple web app with Flask and need to install a few packages for that. A couple
    of months later, though, you want to revisit your scraper script and realize it’s
    broken! The Flask packages you installed appear to have updated or broken some
    of the parser libraries you need for the scraper. Now, you need to debug what
    went wrong just to get your old script working again. This is what’s known as
    “dependency hell” – when packages you install impact or break other packages that
    depend on different versions. Over time, as you work on more coding projects,
    keeping all your libraries organized becomes a nightmare!


    Virtual environments fix this problem by isolating the packages needed for each
    project. By default, Python stores all installed packages globally on your system.
    With virtual environments, Python keeps libraries separate in folders tied to
    each project. Now, if you need to update a package for one project, it won’t mess
    up the libraries for your other code! It’s like keeping your work, personal life,
    and hobbies separated rather than jumbled together. Virtual environments help
    you avoid dependency conflicts so each project has what it needs without version
    headaches.


    Under the hood, virtual environments work by hooking into Python’s site directory.
    When you run Python or a Python script, the interpreter looks to the site directory
    to find installed packages and namespaces. By default, there is one system-wide
    site directory, which lives outside of your project folders. This is why when
    you run pip install pytest, you can then import pytest from any script – it’s
    globally available to all Python projects. Virtual environments create isolated
    site directories tied to a single project. By activating a virtual environment,
    you make Python and pip point to a project-specific site directory rather than
    the global one.


    Now, when you pip install packages within an activated virtual environment, Python
    will only find those packages when running scripts inside that environment. So,
    each project can have its own independent set of dependencies. Once you deactivate
    the virtual environment, the global site-packages come back into effect as normal.
    So, virtual environments provide a way to toggle which set of libraries Python
    should use for a particular workflow or coding session.


    Virtual environments can unlock immense project benefits by isolating dependencies
    and configurations. We gain precision control to install packages per-project,
    eliminating conflicts from global upgrades. These encapsulated dev environments
    seamlessly recreate across machines through shared requirement manifests, powering
    portability. What runs locally is then reliably deployed to test and production
    for robust consistency. Finally, quickly onboarding new team members becomes trivial
    by sharing the ready-to-code environment. With per-project dependencies, build/deploy
    harmony, streamlined onboarding, and enhanced portability, virtual environments
    prove invaluable for streamlining workflows.


    As you can see, virtual environments bring huge advantages for organizing dependencies
    across projects, new and old. They make dependency management much smoother, letting
    you use the right library versions for each project rather than one-size-fits-all.
    Now that you know why virtual environments help, let’s cover how to make one:


    Python provides a few options for managing virtual environments. At the core lies
    the built-in venv module, offering a simple standard library solution. Building
    on this, virtualenv extends venv''s capabilities with more advanced features.
    Finally, Pipenv combines virtual environment management with bundled dependency
    management through its Pipfile/Pipfiles.lock to integrate these functionalities
    fully. With options spanning the simple yet limited venv, feature-rich virtualenv,
    and all-in-one Pipenv, one can choose the virtual environment manager aligned
    with their needs for isolation, flexibility, and dependency control. As the lightest-weight
    option, venv provides basic virtual environment handling in Python itself without
    any other tools needed. To install venv, just upgrade to Python 3.3 or newer –
    it’s included by default, with no other steps needed!


    Virtual environments enable isolating dependencies on a per-project basis, avoiding
    conflicts from global package installations. They provide consistent, portable
    environments across different machines by allowing you to recreate the same libraries
    and versions defined in a requirements.txt snapshot. This facilitates the smooth
    onboarding of new team members and parity from development through production
    deployment. Ultimately, virtualenvs allow personalized dependency management for
    each project rather than a one-size-fits-all global state. This prevents version
    conflicts, enables portability across different computers, maintains consistency
    across pipeline stages, and streamlines onboarding. By encapsulating project dependencies,
    virtual environments provide a huge boost in organization and stability.


    ```python

    python3 -m venv my_project_env

    ```


    ```bash

    source my_project_env/bin/activate

    ```


    This demonstrates creating a virtual environment for a Python project. A few key
    points:


    - `python3 -m venv` creates the virtual environment using the venv module.

    - We specify the name we want for the environment – `my_project_env`.

    - This creates a folder with that name containing the virtual environment.

    - `source my_project_env/bin/activate` activates the virtual environment.

    - This modifies the shell to use the Python interpreter and packages inside the
    virtual env instead of global ones.


    Once activated, any packages installed via pip will be installed locally inside
    the `my_project_env` folder. This keeps them isolated from any global Python packages.
    It allows having a different set of packages for each project rather than one
    global set. This prevents version conflicts across projects and allows reproducibility
    by locking in specific dependency versions. When done working on the project,
    running `deactivate` exits the virtual environment and restores using the global
    Python state.


    So, in summary, this shows using Python virtual environments to encapsulate project
    dependencies and manage them locally per project. This facilitates consistency
    and portability for the project across different environments. And there you have
    it – a basic crash course on using Python’s built-in venv! It creates'
  mdcn: '集合的行为类似于数学集合——它们包含唯一的无序元素，并提供并集或交集等通用集合操作。它们的唯一性使其非常适合用于去除重复项。例如，将文章标签放入`set()`中，而不是单独跟踪它们，从而在博客上获得不同的标签。


    元组是不可变的列表，用于向他人表明在传递过程中不要修改数据。函数可以通过返回元组来返回多个值。它们也非常适合作为字典中的键，因为不可变性在这里很重要。


    ## 第11章


    ## 虚拟环境


    虚拟环境是Python开发者隔离项目依赖项并为应用程序创建可重现运行时的关键工具。刚开始时，理解虚拟环境为何重要可能会令人困惑。在本章中，我们将逐步介绍何时以及如何使用虚拟环境来改进你的工作流程。


    作为初学者，你可能已经安装了Python和一些库，以便立即开始编码。然而，随着时间的推移，当你处理更多项目时，你会通过`pip install`添加更多的包。不久之后，就很难跟踪每个项目需要哪些库了！为一个应用程序升级一个包可能会破坏另一个应用程序。很快，你会感觉自己的硬盘一团糟，无法整理。这就是虚拟环境的用武之地——它们为每个项目创建隔离的Python运行时。这就像把你的包和库放进干净的文件夹里，而不是散落在你的电脑各处。虚拟环境是避免“依赖地狱”的最佳方式。


    首先，我们将介绍创建虚拟环境的基础知识。你将学习标准的`venv`模块以及第三方工具，如Virtualenv和Pipenv。最后，你将知道何时以及如何设置虚拟环境来改进你的编码工作流程。让我们从一个例子开始：


    想象一下，你开始构建一个网络爬虫脚本，从一个电子商务网站抓取数据。你安装了Requests、Beautiful Soup和lxml来解析HTML。脚本运行良好，于是你转向下一个编码项目。这一次，你正在用Flask构建一个简单的Web应用程序，需要为此安装一些包。然而，几个月后，你想重新查看你的爬虫脚本，却发现它坏了！你安装的Flask包似乎更新或破坏了爬虫所需的一些解析器库。现在，你需要调试出了什么问题，才能让你的旧脚本重新运行。这就是所谓的“依赖地狱”——当你安装的包影响或破坏了依赖于不同版本的其他包时。随着时间的推移，当你处理更多编码项目时，保持所有库的有序组织将成为一场噩梦！


    虚拟环境通过隔离每个项目所需的包来解决这个问题。默认情况下，Python将所有安装的包全局存储在你的系统上。使用虚拟环境，Python将库分别保存在与每个项目关联的文件夹中。现在，如果你需要为一个项目更新一个包，它不会搞乱你其他代码的库！这就像把你的工作、个人生活和爱好分开，而不是混在一起。虚拟环境帮助你避免依赖冲突，这样每个项目都能获得所需的库，而无需为版本问题烦恼。


    在底层，虚拟环境通过挂钩到Python的`site`目录来工作。当你运行Python或Python脚本时，解释器会查找`site`目录以找到已安装的包和命名空间。默认情况下，有一个系统范围的`site`目录，它位于你的项目文件夹之外。这就是为什么当你运行`pip
    install pytest`时，你可以从任何脚本中导入`pytest`——它对所有Python项目都是全局可用的。虚拟环境创建与单个项目关联的隔离`site`目录。通过激活虚拟环境，你使Python和`pip`指向特定于项目的`site`目录，而不是全局目录。


    现在，当你在已激活的虚拟环境中`pip install`包时，Python在该环境中运行脚本时只会找到这些包。因此，每个项目都可以拥有自己独立的依赖项集。一旦你停用虚拟环境，全局的`site-packages`就会恢复正常。因此，虚拟环境提供了一种切换Python在特定工作流或编码会话中应使用哪组库的方式。


    虚拟环境通过隔离依赖项和配置，可以为项目带来巨大的好处。我们获得了精确控制，可以按项目安装包，消除了全局升级带来的冲突。这些封装的开发环境通过共享的需求清单在不同机器上无缝重现，从而支持可移植性。本地运行的内容随后可以可靠地部署到测试和生产环境，以实现强大的一致性。最后，通过共享现成的编码环境，快速引导新团队成员变得轻而易举。凭借按项目管理的依赖项、构建/部署的协调、简化的入职流程以及增强的可移植性，虚拟环境在简化工作流程方面被证明是无价的。


    如你所见，虚拟环境在组织新旧项目的依赖项方面带来了巨大的优势。它们使依赖项管理变得更加顺畅，让你可以为每个项目使用正确的库版本，而不是一刀切。既然你知道了虚拟环境为何有帮助，让我们来介绍如何创建一个：


    Python提供了几种管理虚拟环境的选项。核心是内置的`venv`模块，提供了一个简单的标准库解决方案。在此基础上，`virtualenv`扩展了`venv`的功能，提供了更高级的特性。最后，`Pipenv`通过其`Pipfile`/`Pipfile.lock`将虚拟环境管理与捆绑的依赖项管理结合起来，完全集成了这些功能。从简单但有限的`venv`、功能丰富的`virtualenv`到一体化的`Pipenv`，你可以选择与你的隔离、灵活性和依赖项控制需求相匹配的虚拟环境管理器。作为最轻量级的选项，`venv`在Python本身中提供基本的虚拟环境处理，无需任何其他工具。要安装`venv`，只需升级到Python
    3.3或更新版本——它默认包含在内，无需其他步骤！


    虚拟环境能够按项目隔离依赖项，避免全局包安装带来的冲突。它们通过允许你重现`requirements.txt`快照中定义的相同库和版本，提供跨不同机器的一致、可移植的环境。这有助于新团队成员的顺利入职，并保持从开发到生产部署的一致性。最终，虚拟环境允许为每个项目进行个性化的依赖项管理，而不是一刀切的全局状态。这可以防止版本冲突，支持跨不同计算机的可移植性，保持跨流水线阶段的一致性，并简化入职流程。通过封装项目依赖项，虚拟环境在组织性和稳定性方面提供了巨大的提升。


    ```python

    python3 -m venv my_project_env

    ```


    ```bash

    source my_project_env/bin/activate

    ```


    这演示了为Python项目创建虚拟环境。几个关键点：


    - `python3 -m venv`使用`venv`模块创建虚拟环境。

    - 我们指定了想要的环境名称——`my_project_env`。

    - 这会创建一个包含该名称的文件夹，其中包含虚拟环境。

    - `source my_project_env/bin/activate`激活虚拟环境。

    - 这会修改shell，使其使用虚拟环境内的Python解释器和包，而不是全局的。


    一旦激活，通过`pip`安装的任何包都将本地安装在`my_project_env`文件夹内。这使它们与任何全局Python包隔离。它允许每个项目拥有不同的包集，而不是一个全局集。这可以防止跨项目的版本冲突，并通过锁定特定的依赖项版本来实现可重现性。当完成项目工作后，运行`deactivate`会退出虚拟环境并恢复使用全局Python状态。


    所以，总而言之，这展示了使用Python虚拟环境来封装项目依赖项并在本地按项目进行管理。这有助于项目在不同环境中的一致性和可移植性。就是这样——一个关于使用Python内置`venv`的基础速成课程！它创建'
