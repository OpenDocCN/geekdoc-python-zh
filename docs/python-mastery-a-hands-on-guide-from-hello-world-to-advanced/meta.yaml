- md: "## Chapter 5\n\n### Lists, Tuples and Dictionaries\n\nLists, tuples, and dictionaries\
    \ are powerful built-in Python data structures that allow you to organize and\
    \ access data efficiently. As your programs become more complex, you’ll want to\
    \ leverage these versatile collections to represent real-world relationships cleanly.\
    \ When I first learned about lists, tuples, and dicts (as dictionaries are affectionately\
    \ called), I wasn’t sure how I would use them. Coming from a background in spreadsheets\
    \ and basic scripts, the idea of nesting data structures felt abstract. However,\
    \ I realized how invaluable they are after using them in projects. In this chapter,\
    \ we’ll cover the basics of these “container” data types. You’ll learn clever\
    \ ways to manipulate list, tuple, and dict elements. We’ll also explore common\
    \ operations like sorting, looping, and more. By the end, you’ll have a solid\
    \ grasp of when and why to use each structure. Let’s start our tour by distinguishing\
    \ what makes lists, tuples, and dicts unique.\n\nLists are defined with square\
    \ brackets [] and can store any Python object. They are mutable, meaning the elements\
    \ can be changed after creation. Tuples use parentheses () instead and are immutable,\
    \ so their values can’t be modified once set. Finally, dictionaries use curly\
    \ braces {} to associate keys with values. When would you want immutable tuples\
    \ versus changeable lists? Why does a dictionary connect keys to values? The best\
    \ way is to see them in action! I remember when these distinctions clicked for\
    \ me: my teammate Pablo and I parsed log files from different web servers. The\
    \ access timestamp strings were tuples since those couldn’t change. The visitor\
    \ IP addresses went into lists because we needed to group and sort them. Finally,\
    \ we associated IP addresses with timestamps using a dictionary. By matching immutable\
    \ tuples and changeable lists to the use case, our code conveyed what could and\
    \ couldn’t change. The dictionary acted like an index to tie related data points\
    \ together.\n\nYou’ll also come to appreciate the unique roles these data structures\
    \ play as we work through examples. Keep Pablo and I’s log parsing challenge in\
    \ mind as motivation for why mastering lists, tuples, and dicts is essential!\
    \ Let’s start with the most common collection type: the list. Simply put, lists\
    \ store an ordered collection of objects that can be accessed by index.\n\nUnlike\
    \ arrays in other languages, Python lists can hold different variable types in\
    \ one list.\n\nFor example, here’s a simple list containing integers, strings,\
    \ and booleans:\n\n```python\npy_list = [10, \"Hello\", True]\n```\n\nWe can access\
    \ elements by their index using square brackets:\n\n```python\nprint(py_list[1])\n\
    ```\n\n```\n> \"Hello\"\n```\n\nLists have many useful methods available as well,\
    \ such as .append() to add elements to the end:\n\n```python\npy_list.append(\"\
    World\")\n```\n\n```python\npy_list\n```\n\n```\n> [10, \"Hello\", True, \"World\"\
    ]\n```\n\nThey can grow quite large, with millions of elements possible. The elements\
    \ can also be changed:\n\n```python\npy_list[1] = \"Hi\"\n```\n\n```python\npy_list\n\
    ```\n\n```\n> [10, \"Hi\", True, \"World\"]\n```\n\nBe aware that lists should\
    \ not be used as keys in dictionaries, which we’ll explain more later.\n\nFirst,\
    \ let’s contrast them with immutable tuples. Where lists are changeable, tuples\
    \ cannot be modified at all after creation. Defined with parentheses instead of\
    \ square brackets, they have the same indexing and access characteristics. Tuples\
    \ are better suited to data that should not be edited:\n\n```python\npy_tuple\
    \ = (\"Unchanging\", \"Data\", 2022)\n```\n\n```python\nprint(py_tuple[0])\n```\n\
    \n```\n> \"Unchanging\"\n```\n\nTrying to alter a tuple throws an error:\n\n```python\n\
    py_tuple[2] = 2023\n```\n\n```\n> TypeError: 'tuple' object does not support item\
    \ assignment\n```\n\nFor truly fixed data or constants, tuples ensure nothing\
    \ can be overwritten accidentally. That peace of mind makes them ideal for financial\
    \ transactions, mathematical vectors, and dates. In our server log example, the\
    \ timestamp strings were parsed into tuples. That prevented accidentally modifying\
    \ any access times, which kept our data integrity high. Tuples can also be used\
    \ as keys in dictionaries, which brings us to our last container type.\n\nWhile\
    \ lists and tuples store values sequentially by index, dictionaries are unordered\
    \ mappings of unique keys to values. Like hash tables or maps in other languages,\
    \ they can make finding and associating data faster than searching a list. Dictionaries\
    \ are defined using curly braces {} instead of square or regular brackets. You\
    \ insert key/value pairs separated by colons:\n\n```python\npy_dict = {\n    \"\
    model\": \"Tesla Model S\",\n    \"year\": 2022,\n    \"range\": 405\n}\n```\n\
    \nWe can access values through their key:\n\n```python\nprint(py_dict[\"model\"\
    ])\n```\n\n```\n> \"Tesla Model S\"\n```\n\nThe keys() and values() methods return\
    \ those property collections:\n\n```python\nprint(py_dict.keys())\n```\n\n```\n\
    > [\"model\", \"year\", \"range\"]\n```\n\n```python\nprint(py_dict.values())\n\
    ```\n\n```\n> [\"Tesla Model S\", 2022, 405]\n```\n\nDictionaries have high-performance\
    \ lookups via the key since Python hashes and indexes them. Adding new key/value\
    \ pairs is easy:\n\n```python\npy_dict['color'] = 'Midnight Silver'\n```\n\nDicts\
    \ can start empty and grow to millions of elements dynamically. Entries can also\
    \ be removed with .pop() or set to None.\n\nIn our server log challenge, we used\
    \ a dictionary to associate IP addresses (keys) with access timestamps (values).\
    \ That allowed quick lookups to aggregate visits by IP address. Retrieving all\
    \ timestamps for an IP was fast without searching row by row. Returning to Pablo,\
    \ relating data through dictionaries became more useful as our dataset grew. When\
    \ performance slowed when scanning lists of tuples linearly for IP addresses,\
    \ switching to a dictionary sped up 200x! Between lists to store ordered, changeable\
    \ data, tuples to secure immutable sequences, and dictionaries to map objects\
    \ to values, you have a versatile toolkit for modeling real-world data.\n\nNow,\
    \ let’s discuss some best practices for using files in Python. Robust file handling\
    \ requires mastering core open, close, read, and write operations while implementing\
    \ vital best practices. Leverage context managers with statements to automate\
    \ the clean opening and closing of files, avoiding manual resource management.\
    \ Iterate through text files line-by-line instead of loading all contents at once\
    \ to lower memory overhead; manually append newline characters when writing strings,\
    \ as print itself does not; enable output buffering when making many small writes;\
    \ flush frequently, sync files explicitly, and close soon after the final write\
    \ to avoid data loss; employ specific exception handling like FileNotFoundError\
    \ to make error handling robust; restrict access through file permissions properly;\
    \ and, finally, utilize r+ instead of w mode to read and write without erasing\
    \ existing contents accidentally.\n\nFollowing these file-handling guidelines\
    \ results in reliable, resilient external data pipelines. Robust file handling\
    \ will enable gathering, parsing, and processing data from various sources. Many\
    \ formats like CSV, JSON, and Excel store data in plain text files readily accessible\
    \ from Python. Databases also rely heavily on file systems for storage and recovery.\
    \ In the next chapter, we will explore Python's power for string manipulation\
    \ and text data tasks.\n\nFile system permissions control access to read, write,\
    \ or execute operations on files, enabling greater security through restricted\
    \ access. The r permission bit allows opening files for reading, w enables writing\
    \ or overwriting contents, while x permits executing scripts and programs. These\
    \ bits apply to access classes including the file owner, users belonging to the\
    \ file's designated group, and all system users globally. Permission notations\
    \ concatenate the bits in the order owner-group-all users. For instance, notation\
    \ 644 grants the owner read and write, the group read-only, and global users read-only\
    \ abilities, selectively restricting write and execute privileges. Managing these\
    \ Unix-style permissions facilitates appropriately securing files. Set permissions\
    \ numerically via a file mode argument in open() or through system commands like\
    \ chmod. Proper permissions can isolate access and prevent unwanted changes across\
    \ users."
  mdcn: "## 第五章\n\n### 列表、元组和字典\n\n列表、元组和字典是强大的 Python 内置数据结构，能让你高效地组织和访问数据。随着程序变得越来越复杂，你会希望利用这些多功能的集合来清晰地表示现实世界的关系。当我第一次接触列表、元组和字典（字典常被亲切地称为\
    \ dict）时，我并不确定该如何使用它们。由于我之前主要使用电子表格和基础脚本，嵌套数据结构的概念让我觉得有些抽象。然而，在项目中实际使用后，我意识到它们是多么宝贵。在本章中，我们将涵盖这些“容器”数据类型的基础知识。你将学习操作列表、元组和字典元素的巧妙方法。我们还将探讨排序、循环等常见操作。学完本章，你将牢固掌握何时以及为何使用每种结构。让我们开始这次探索之旅，首先区分列表、元组和字典的独特之处。\n\
    \n列表使用方括号 `[]` 定义，可以存储任何 Python 对象。它们是可变的，这意味着元素在创建后可以更改。元组则使用圆括号 `()`，是不可变的，因此一旦设置，其值就无法修改。最后，字典使用花括号\
    \ `{}` 将键与值关联起来。什么时候应该使用不可变的元组而不是可变的列表？为什么字典要将键与值连接起来？最好的方法就是看它们的实际应用！我记得这些区别对我来说变得清晰的那一刻：我和队友帕布罗（Pablo）一起解析来自不同\
    \ Web 服务器的日志文件。访问时间戳字符串是元组，因为它们不能改变。访问者的 IP 地址被放入列表，因为我们需要对它们进行分组和排序。最后，我们使用字典将\
    \ IP 地址与时间戳关联起来。通过将不可变的元组和可变的列表与用例相匹配，我们的代码清晰地表达了哪些数据可以更改，哪些不能。字典就像一个索引，将相关的数据点联系在一起。\n\
    \n随着我们通过示例进行学习，你也会逐渐欣赏这些数据结构所扮演的独特角色。请记住我和帕布罗的日志解析挑战，以此作为掌握列表、元组和字典为何至关重要的动力！让我们从最常见的集合类型——列表开始。简单来说，列表存储一个有序的对象集合，可以通过索引进行访问。\n\
    \n与其他语言中的数组不同，Python 列表可以在一个列表中容纳不同的变量类型。\n\n例如，这是一个包含整数、字符串和布尔值的简单列表：\n\n```python\n\
    py_list = [10, \"Hello\", True]\n```\n\n我们可以使用方括号通过索引访问元素：\n\n```python\nprint(py_list[1])\n\
    ```\n\n```\n> \"Hello\"\n```\n\n列表还有许多有用的方法，例如 `.append()` 用于在末尾添加元素：\n\n```python\n\
    py_list.append(\"World\")\n```\n\n```python\npy_list\n```\n\n```\n> [10, \"Hello\"\
    , True, \"World\"]\n```\n\n它们可以变得很大，最多可容纳数百万个元素。元素也可以被更改：\n\n```python\npy_list[1]\
    \ = \"Hi\"\n```\n\n```python\npy_list\n```\n\n```\n> [10, \"Hi\", True, \"World\"\
    ]\n```\n\n请注意，列表不应用作字典中的键，我们稍后会详细解释。\n\n首先，让我们将它们与不可变的元组进行对比。列表是可变的，而元组在创建后完全不能修改。元组使用圆括号而不是方括号定义，具有相同的索引和访问特性。元组更适合不应被编辑的数据：\n\
    \n```python\npy_tuple = (\"Unchanging\", \"Data\", 2022)\n```\n\n```python\nprint(py_tuple[0])\n\
    ```\n\n```\n> \"Unchanging\"\n```\n\n尝试更改元组会抛出错误：\n\n```python\npy_tuple[2] =\
    \ 2023\n```\n\n```\n> TypeError: 'tuple' object does not support item assignment\n\
    ```\n\n对于真正固定的数据或常量，元组确保不会意外覆盖任何内容。这种安心感使它们成为金融交易、数学向量和日期的理想选择。在我们的服务器日志示例中，时间戳字符串被解析为元组。这防止了意外修改任何访问时间，从而保持了较高的数据完整性。元组也可以用作字典中的键，这引出了我们的最后一种容器类型。\n\
    \n虽然列表和元组按索引顺序存储值，但字典是唯一键到值的无序映射。就像其他语言中的哈希表或映射一样，它们可以使查找和关联数据比搜索列表更快。字典使用花括号\
    \ `{}` 而不是方括号或圆括号定义。你插入用冒号分隔的键/值对：\n\n```python\npy_dict = {\n    \"model\": \"\
    Tesla Model S\",\n    \"year\": 2022,\n    \"range\": 405\n}\n```\n\n我们可以通过键访问值：\n\
    \n```python\nprint(py_dict[\"model\"])\n```\n\n```\n> \"Tesla Model S\"\n```\n\
    \n`keys()` 和 `values()` 方法返回这些属性的集合：\n\n```python\nprint(py_dict.keys())\n```\n\
    \n```\n> [\"model\", \"year\", \"range\"]\n```\n\n```python\nprint(py_dict.values())\n\
    ```\n\n```\n> [\"Tesla Model S\", 2022, 405]\n```\n\n字典通过键进行高性能查找，因为 Python 会对其进行哈希和索引。添加新的键/值对很容易：\n\
    \n```python\npy_dict['color'] = 'Midnight Silver'\n```\n\n字典可以从空开始，并动态增长到数百万个元素。条目也可以使用\
    \ `.pop()` 移除或设置为 `None`。\n\n在我们的服务器日志挑战中，我们使用字典将 IP 地址（键）与访问时间戳（值）关联起来。这允许快速查找以按\
    \ IP 地址聚合访问量。无需逐行搜索即可快速检索某个 IP 的所有时间戳。回到帕布罗，随着数据集的增长，通过字典关联数据变得更加有用。当线性扫描元组列表以查找\
    \ IP 地址导致性能下降时，切换到字典使速度提升了 200 倍！在列表用于存储有序、可变的数据，元组用于保护不可变的序列，以及字典用于将对象映射到值之间，你拥有了一套用于建模现实世界数据的多功能工具包。\n\
    \n现在，让我们讨论一些在 Python 中使用文件的最佳实践。健壮的文件处理需要掌握核心的打开、关闭、读取和写入操作，同时实施至关重要的最佳实践。利用 `with`\
    \ 语句的上下文管理器来自动完成文件的干净打开和关闭，避免手动资源管理。逐行迭代文本文件，而不是一次加载所有内容，以降低内存开销；在写入字符串时手动附加换行符，因为\
    \ `print` 本身不会这样做；在进行多次小写入时启用输出缓冲；频繁刷新、显式同步文件，并在最后一次写入后尽快关闭文件以避免数据丢失；采用特定的异常处理（如\
    \ `FileNotFoundError`）使错误处理更健壮；通过文件权限正确限制访问；最后，使用 `r+` 模式而不是 `w` 模式来读取和写入，而不会意外擦除现有内容。\n\
    \n遵循这些文件处理准则可确保可靠、有弹性的外部数据管道。健壮的文件处理将能够从各种来源收集、解析和处理数据。许多格式（如 CSV、JSON 和 Excel）将数据存储在纯文本文件中，这些文件很容易从\
    \ Python 访问。数据库也严重依赖文件系统进行存储和恢复。在下一章中，我们将探索 Python 在字符串操作和文本数据任务方面的强大功能。\n\n文件系统权限控制对文件的读取、写入或执行操作的访问，通过限制访问来实现更高的安全性。`r`\
    \ 权限位允许打开文件进行读取，`w` 允许写入或覆盖内容，而 `x` 允许执行脚本和程序。这些位适用于访问类别，包括文件所有者、属于文件指定组的用户以及所有系统用户。权限表示法按所有者-组-所有用户的顺序连接这些位。例如，表示法\
    \ `644` 授予所有者读写权限，组只读权限，全局用户只读权限，有选择地限制写入和执行权限。管理这些 Unix 风格的权限有助于适当保护文件。通过 `open()`\
    \ 中的文件模式参数或通过系统命令（如 `chmod`）以数字方式设置权限。适当的权限可以隔离访问并防止跨用户的意外更改。"
