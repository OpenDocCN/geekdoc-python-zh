  md: '# Chapter 1


    # Setup and First Steps


    ![](img/7180c55e920af55f88bc95f7ea2acf06_12_0.png)


    The Python language specification is managed by the non-profit Python Software
    Foundation. Yet, people generally don''t install "Core" Python directly. Rather,
    they tend to use a Python distribution, which packages up the bare language with
    a whole suite of tools for development, debugging, and deployment. The two most
    common mainstream distributions are CPython and Anaconda. Let''s start by exploring
    the pros and cons of each.


    CPython refers to the default, C language-based interpreter used to execute Python
    code. It''s very'
  merge: -1
  pgno: 12
- img_proc: true
  md: 'lightweight and fast by nature. However, out of the box, CPython itself won''t
    give you much beyond the raw Python syntax and standard libraries. You must install
    third-party libraries separately for tasks like data analysis or machine learning.
    Popular integrated development environments (IDEs) like PyCharm are built on CPython
    under the hood. CPython is a great choice if you want a minimalist base Python
    environment to customize over time.


    Anaconda, offered by the data science company Anaconda Inc., takes the opposite
    approach. It''s a gigantic bundle aimed at data professionals, packing in over
    250 of today''s most essential Python data libraries right from the start: NumPy,
    Pandas, Matplotlib, and many more. That makes getting up and running with Python
    for math/science workloads much faster. However, it also consumes way more storage
    space. For the general purpose of Python coding, CPython may be the more flexible
    option.


    When installing either flavor of Python, you must make an important architecture
    decision upfront: 32-bit or 64-bit. Modern computers almost universally run 64-bit
    CPUs and operating systems these days. So, you generally want to match the "bitness"
    of your Python'
  merge: -1
  pgno: 13
- img_proc: true
  md: 'interpreter to the native bitness of your hardware. 64-bit Python can access
    more RAM and perform better for math/ML tasks. Just be cautious when installing
    certain Python package dependencies later, as they may only be available pre-built
    for specific architectures. Once you''ve settled on CPython or Anaconda and 64-bit
    or 32-bit, the next choice is how you want to install your chosen distribution.


    Both CPython and Anaconda provide super easy graphical installers for Windows,
    Mac, and Linux. Just download the executable, double-click to launch, and follow
    the prompts! The graphical installers handle all the complex environment configurations
    automatically. Within minutes, you''ll have Python ready to go from a terminal
    and also installed directly into supported IDEs like Visual Studio Code. This
    works very nicely out of the box, but the trade-off is less visibility into how
    Python gets installed and set up. Seasoned Python developers often choose to install
    CPython or Anaconda manually from scratch instead. While more complex, this allows
    finer-grained control over configuration details. You can dictate the install
    location, library versions, and environment variables registered. Virtual environments
    (covered later in Chapter 11) also come into play to segregate Python interpreters
    and dependencies across different apps/projects. The manual approach takes'
  merge: -1
  pgno: 14
- img_proc: true
  md: 'more effort upfront, but the long-run result is a highly personalized Python
    environment catered to your needs.


    For this introductory chapter, stick with the graphical installers for simplicity.
    But as you advance through more complex Python projects later, don''t hesitate
    to step up to manual configuration and virtual environments for optimal control!


    With a 64-bit CPython 3.x distribution installed via the graphical method, you''re
    now ready to write your first Python program! Open up a plain text editor – either
    a basic option like Notepad on Windows or a more full-featured IDE like VSCode.
    Go ahead and type out this code snippet:


    ```

    python

    print("Hello World!")

    ```


    Save the file as hello_world.py somewhere that is easy to access from a terminal.
    The ".py" file extension marks this as a Python script.'
  merge: -1
  pgno: 15
- img_proc: true
  md: 'Next, launch a terminal by opening Command Prompt (Windows) or Terminal (Mac).
    Use the change directory (cd) command to navigate to the location you saved hello_world.py.


    Finally, execute the script with Python followed by the filename:


    ```

    python hello_world.py

    ```


    You should see "Hello World!" immediately printed out upon hitting enter. Congratulations,
    you just ran your first Python program!


    Now, let''s break down exactly what happened here from start to finish. Python
    is considered an interpreted language rather than a compiled language. Languages
    like C/C++ require first translating source code into machine code (0s and 1s)
    before anything can run. This compiled executable then executes natively on the
    given hardware. Python, however, skips the compilation'
  merge: -1
  pgno: 16
- img_proc: true
  md: 'step. Instead, an interpreter parses and directly executes each line of Python
    source code on the fly. This allows for much faster code-test iterations without
    any compile steps disrupting the flow.


    Behind the scenes, several steps execute in sequence when you type "python hello_world.py"
    at the command line to run your simple print statement script. First, the Python
    executable launches and initializes the CPython interpreter. CPython then progressively
    loads and parses each line of hello_world.py, including interpreting the print
    function call to output the text string "Hello World!" to standard output (your
    terminal screen). With no other lines left, CPython reaches the end-of-file, gracefully
    exits the Python interpreter, and returns you back to the command prompt. So,
    while only two words visibly print from your script, invoking the Python command
    and runtime kicks off quite a complex sequence - loading the interpreter, parsing
    syntax, mapping print to terminal output, and exiting execution. Understanding
    this hidden choreography can demystify what processes execute your code behind
    the cursory terminal interface. This interpretation step is key to unlocking Python''s
    accessibility and versatility. It allows coders to test ideas without formal compilation
    rapidly, and it lets Python scale anything from one-liner scripts up to huge,
    complex systems with the same codebase.'
  merge: -1
  pgno: 17
- img_proc: true
  md: 'You may also hear Python referred to as a "glue" language - this dynamic execution
    model is a major reason why. The next time you use Python to stitch together different
    services, databases, or interfaces, remember the interpretation magic happening
    behind the terminal! It''s also important to point out that multiple major versions
    of Python can co-exist on the same system. Backward incompatible syntax and API
    changes do occur between releases like Python 2.x vs 3.x. Your system''s default
    "Python" may currently point to a certain version (say Python 2.7), but that can
    be configured to reference newer ones like Python 3.8 instead. Virtual environments
    touched on earlier also help create independent Python environments across versions.


    So, don''t be afraid to install different versions of Python interpreters side-by-side.
    Tools like pyenv and poetry help toggle between them cleanly from the terminal
    or config files. We''ll revisit virtual environments in-depth later in Chapter
    11. For now, be comfortable knowing that Python allows for both the isolation
    of environments per project and the harmonious co-existence of legacy vs modern
    versions per system. This flexibility is another reason Python is built to scale
    across everything, from small scripts to long-standing applications!'
  merge: -1
  pgno: 18
- img_proc: true
  md: 'With Python installed and "hello world" under your belt, you''re all set for
    serious learning! For the rest of this chapter, we will dive deeper into Python''s
    basic syntax, variables, and data structures for storing information. Get ready
    to start coding more complex logic as we level up key building blocks - ifs, loops,
    functions, and more. The journey continues, my friend! Before long, you''ll be
    leveraging Python''s extensive libraries to analyze data, train machine learning
    models, and automate everyday workflows. Stick with me through these beginning
    steps, and soon, you''ll unlock a world of programming potential with Python.


    Just as a pilot trains for their first day behind the cockpit controls of a Cessna,
    beginner Python coders should also start simple. Small, straightforward scripts
    allow new developers to grasp basic syntax, flow, and output before advancing
    to more complex logic. You must walk before you try running across launch pads!
    In my college days, I fondly remember my roommate, Philipp. As a physics major,
    he often puzzled for hours over lengthy formulas and confounding quantum mechanics
    concepts. Yet, when I showed Philipp a simple Python script on my computer one
    late night, his eyes lit up with child-like awe:'
  merge: -1
  pgno: 19
- img_proc: true
  md: '"Wait, it just...works?" he asked incredulously. Sure enough, 15 lines of basic
    print statements and variables were enough to enter my pal. After years of struggling
    with rigid university coding curriculums, here was a language Philipp could play
    with, thanks to Python''s flexibility. After tinkering late into the evening,
    Philipp did, in fact, take flight. He became obsessed with Python for his last
    semester, re-implementing physics models from class at a lightning pace. Meanwhile,
    I dabbled more and more in data analytics and automation tasks. Once filled with
    textbooks and course packets, our rooms now overflow with printouts of Python
    experiments! This accessibility and versatility are what make Python a joy to
    teach beginners. So, let''s continue our coding journey with several fundamental
    concepts, starting with variables.


    Think of variables in Python as simple boxes in which you can store any object
    or data structure. They provide a symbolic way to access information by a descriptive
    name instead of typing out the full value each time. For instance, say I wanted
    to track the number of coffee cups I drink daily. Rather than write out "5" everywhere,
    I can create a simple variable like:'
  merge: -1
  pgno: 20
- img_proc: true
  md: '```

    daily_cups = 5

    ```


    Now my scripts can reference the symbolic daily_cups variable multiple times instead
    of the raw number 5. Even better, I can easily update all references everywhere
    just by changing my one variable at the start:


    ```

    daily_cups = 3

    ```


    The core concepts to remember about variables in Python are that they allow you
    to store data by a symbolic name, update that value in a single place, and ideally
    name the variable in a way that describes the underlying data well. For example,
    daily_cups communicates what it means. Some key variable naming rules in Python
    are: names cannot start with numbers like “1cup”, they cannot contain spaces like
    “daily cups”, and the recommended style is all lowercase with underscores between
    words like “daily_cups”. Following these variable naming conventions makes your
    code more readable and avoids unintended errors. The power of variables lies in
    the ability to update a value in one place, like daily_cups = 2, rather than needing
    to replace every individual reference scattered throughout a program. Descriptively'
  merge: -1
  pgno: 21
- img_proc: true
  md: 'naming variables helps communicate code intention. So, remember that variables
    store data by a symbolic name that you can update easily. Name them wisely using
    Python’s style guides.


    Regarding variables, this is where Python differs from lower-level languages like
    C/C++. Variables in Python do NOT have strict types attached, which allows for
    much more flexibility:


    ```


    cups = 5


    cups = "Five"


    cups = 5.5

    ```


    The same cups variable can shift between containing an integer, string, float
    decimal, or even complex custom objects! This means that you do not need to define
    strict types upfront manually. Just assign any value to a variable and let Python
    understand the underlying datatype on the fly. Such dynamic typing makes Python'
  merge: -1
  pgno: 22
- img_proc: true
  md: 'very beginner-friendly. Go ahead and experiment with representing different
    kinds of data in variables without worrying about type declarations or conversions.
    Python''s flexibility will handle that complexity under the hood!


    Now that you understand basic variables, it''s time to explore more complex data
    structures for organizing related data together:


    Lists: Ordered arrays of values.


    Tuples: Immutable variants useful for protecting data.


    Dictionaries: Unordered key-value stores, like a map or hash.


    Mastering these foundational structures will give you unlimited power to handle
    real-world data in Python. They combine like LEGO blocks to model anything from
    weather sensor readings to social media feeds. Let''s discover them one brick
    at a time!


    If variables let you store single values, think of lists as their "super-sized"
    cousins. Lists allow storing ordered'
  merge: -1
  pgno: 23
- img_proc: true
  md: 'collections of data in a single variable.


    Where a single-value int variable just holds one number:


    ```

    profit = 50

    ```


    Lists can pack entire sets of values:


    ```

    quarterly_profits = [50, 130, -30, 75]

    ```


    Lists in Python allow you to store multiple values together as an ordered sequence
    that can be accessed by indexing numerically. Conceptually, you can think of a
    list as containing slots like an array but with the flexibility to add and remove
    items. Each value in a Python list has an indexed order, so you can retrieve specific
    elements by referring to their 0-based position'
  merge: -1
  pgno: 24
- img_proc: true
  md: 'in the list. The benefit of a list over separate variables is consolidating
    related data together while retaining order and direct index access. By understanding
    these core list properties in Python - ordered slots accessed by numeric index
    - you gain data storage and retrieval flexibility.


    Thus, in quarterly_profits above, we have four profit amounts stored. We can ask
    for the Q2 value by asking for index 1 (Python lists start at 0).


    ```

    print(quarterly_profits[1])

    ```


    ```

    > 130

    ```


    We can even slice ranges out, change specific indexes, and append new values -
    lists are incredibly useful Python workhorse structures!


    Now, what if you have a collection of data that should NOT change? For instance,
    maybe you want to store latitude and longitude coordinates from a GPS sensor.
    We wouldn''t want any code accidentally altering sensor readings after the fact!
    For such cases, Python offers tuples, which are immutable ordered sequences of
    data'
  merge: -1
  pgno: 25
- img_proc: true
  md: 'like locked-down lists. Once values within a tuple are set, they cannot be
    updated or swapped later on.


    Our GPS coordinate pair would be easy to pre-present as a tuple:


    ```

    python

    location = (39.2904, -76.6122)

    ```


    Like lists, tuples retain an ordered sequence you can index and slice, but any
    attempts to reassign their values will result in errors, preventing the corrosion
    of key data. Tuples are great for fixed config data, sensor readings, and mathematical
    vector constants – anything that conveys meaning but should not vary later. Protect
    such artifacts by packing them into immutable Python tuples!


    So, now we know that lists retain ordered indexes while tuples trade changeability
    for immutability. Still, what if you don''t care about ordering and just want
    to map keys to values blazingly fast? Enter Python''s dictionary – a'
  merge: -1
  pgno: 26
