    While not as common'
  - '[PAGE 271]


    as web backends and scripts, it''s a fully supported workload. GUI apps rely not
    just on Python itself but also on bindings to windowing system interfaces, OpenGL,
    system fonts, audio APIs, and more. These native shared libraries can have really
    finicky version requirements! So, how do we isolate GUI app dependencies in virtualenvs?


    The key is using virtualenv''s—system-site-packages flag on creation:


    ```

    virtualenv—system-site-packages gui_venv

    ```


    Now, when activating the environment, OS-level dependencies like GUI frameworks
    remain accessible. This permits apps that integrate Tkinter, Kivy, PyGame, etc.,
    to still run properly. Keep in mind that apps may dynamically load libraries outside
    the virtualenv. So, while pure Python dependencies isolate, consider Docker containers
    (covered next) for true OS-level consistency.'
  - '[PAGE 272]


    So, let''s talk about Docker! Containers provide OS-level consistency by packaging
    up entire runtimes – not just Python itself. This makes them perfect companions
    with virtualenvs. The key advantage is that containers isolate environment differences
    across not just Python but also system packages, compilers, shared libs, configs,
    and the running host machine itself! This means you can build a Docker image once
    with your virtualenv baked inside, then reliably deploy it anywhere without underlying
    environment surprises.


    A sample Dockerfile would look like:


    ```


    FROM python:3.8


    COPY . /app


    RUN python3 -m venv /app/venv


    RUN /app/venv/bin/pip install -r /app/requirements.txt


    ENV PATH="/app/venv/bin:$PATH"

    ```'
  - '[PAGE 273]


    ```

    CMD [ "python", "/app/src/main.py" ]

    ```


    Now, by constructing the virtualenv first, the container freezes all Python dependencies
    right into the image. Anyone can run that container and get identical runtime
    behavior anywhere, thanks to full env isolation! So, while virtualenvs focus on
    Python specifically, Docker revolutionizes environment consistency at the infrastructure
    level. These tools work phenomenally together - combine them to build truly bulletproof
    runtimes!


    Having grasped virtual environment isolation techniques, we now stand ready to
    embrace more advanced workflows. We can leverage these skills to seed notebooks,
    thereby encapsulating libraries and configurations for data science work safely
    separate from other projects. Additionally, we have gained the ability to launch
    graphical desktop applications from within virtual environments in order to compartmentalize
    their dependencies as well. With our newfound mastery, we can stretch virtual
    environments across complex use cases beyond conventional'
