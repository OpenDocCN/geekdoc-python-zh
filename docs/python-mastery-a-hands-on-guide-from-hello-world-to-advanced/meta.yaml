- md: '## Python虚拟环境与依赖管理


    为每个项目使用专用的Python运行时，可以避免依赖关系干扰其他代码。venv工作流保持简单但能完成任务。现在，让我们来讨论使用virtualenv进行扩展以及使用Pipenv进行集成依赖管理。


    virtualenv工具建立在Python内置的venv模块之上，为虚拟环境提供了扩展功能。virtualenv在Python 2和3之间保持交叉兼容性，适用于缺少venv的旧版Python（最早可追溯到2.4），并便于使用virtualenvwrapper等工具轻松克隆现有环境。它还支持灵活的命名约定，使环境具有自描述性，例如在目录名后附加Python版本号。虽然venv在现代Python版本上涵盖了基本的环境需求，但virtualenv提供了更好的可用性，可跨旧版运行时使用，具有克隆等炫酷功能，并通过命名方案提供清晰度。因此，虽然venv适用于更简单的需求，但virtualenv为管理许多复杂的工作流提供了更高质量的生活改进。


    使用virtualenv的工作流与venv几乎相同，只需运行`virtualenv my_project_env`而不是`python3 -m venv`来生成环境。一个有用的功能是virtualenvwrapper，它通过名称而不是完整路径来管理多个virtualenv，从而添加了快捷方式。


    例如，你可以使用：


    ```

    mkvirtualenv project1

    ```


    ```

    workon project1

    ```


    这仅使用预设名称来创建和激活环境。此外，它还与shell启动脚本集成，当你`cd`进入预设项目目录时，会自动激活virtualenv。非常方便！


    现在，让我们来讨论依赖管理。virtualenv为创建和管理virtualenv添加了不错的附加功能。但是，如何跟踪每个环境中的实际包依赖关系呢？这就是Pipenv发挥作用的地方——它将虚拟环境管理与依赖跟踪相结合，使用Pipfile和Pipfiles.lock来存储项目所需的包。


    基本工作流如下所示：


    pipenv工具简化了为项目初始化virtualenv、向其安装包以及捕获特定固定版本以供重用的过程。我们导航到项目目录并运行`pipenv install`以自动实例化virtualenv，然后像平常一样请求包，此时pipenv充当virtualenv感知的pip包装器。在幕后，pipenv生成一个Pipfile来捕获我们的包，以及一个Pipfile.lock来固定确切版本。这些锁文件充当快照，以便稍后复制环境，使开发人员之间能够无缝共享以重新创建相同的库依赖集。导航、`pipenv
    install`和`pipenv add`的工作流自动处理创建、填充和捕获virtualenv的详细信息，使用pipenv作为工具链。


