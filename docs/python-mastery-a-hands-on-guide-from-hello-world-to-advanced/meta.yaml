    \n现在，让我们深入探讨定义函数、参数和实参、文档字符串、按值传递与按引用传递、变量作用域等问题。\n\n`def` 语句在Python中定义并命名一个新函数。惯例规定名称应为小写，如果需要清晰，单词之间用下划线分隔。函数名应简洁地描述该工作单元的功能：\n\
