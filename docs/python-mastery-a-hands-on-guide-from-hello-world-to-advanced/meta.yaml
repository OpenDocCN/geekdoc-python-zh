    \ We will explore their capabilities and look at use cases for unlocking their\
    \ full potential.\n\nThe standard library saves the developer time and effort.\
    \ Instead of building all fundamental tools and utilities yourself, you can leverage\
    \ this extensive library designed specifically for Python. The top-level packages\
    \ and modules span many domains, including math operations, data structures, algorithms,\
    \ text processing, networking, web frameworks, and wrappers for OS operations.\
    \ Rather than exhaustively listing everything the standard library contains, this\
    \ chapter focuses on some highlights – essential modules that you will likely\
    \ interact with regularly. We group them into sets by domain and illustrate their\
    \ typical use with examples. Consider this a taster before you dive deeper into\
    \ the full documentation. By the end, you will have a solid grasp of the standard\
    \ library's most popular and useful parts.\n\nThe Python standard library contains\
    \ several built-in data types and data structures hugely useful for any Python\
    \ programmer. Getting familiar with these will allow you to store, access, and\
    \ manipulate data efficiently without building custom data structures from scratch.\
    \ In this chapter, we will look at some of the most essential and commonly used\
    \ options – lists, dictionaries, sets, tuples, and arrays. Each serve a different\
    \ purpose and have their own strengths and limitations. Learning when to use which\
    \ will let you model your data appropriately and write optimized code.\n\nLists\
    \ are the workhorse data type – flexible, versatile, and ubiquitous in Python\
    \ code. Think of them as stretchy containers that can hold objects of any type,\
    \ from strings to integers and even to other lists. You can append, insert, and\
    \ delete elements with ease. Lists grow and shrink dynamically as you make changes.\
    \ This makes them ideal for representing mutable ordered collections. For example,\
    \ you may use a list to store the song playlist for a music app, with the order\
    \ mattering. As users add or remove songs, your list updates seamlessly behind\
    \ the scenes. You don't have to determine the size upfront or reallocate memory\
    \ like you would in a statically typed language like C. Lists abstract away these\
    \ details.\n\nBehind the scenes, Python stores list elements next to each other\
    \ in memory. This means accessing any element takes the same time, unlike data\
    \ structures like linked lists. However, as lists grow bigger, appending new elements\
    \ gets slower since it may require Python to find a new contiguous block of free\
    \ memory and copy elements over. If retaining order but fast insertion/deletion\
    \ from the front matters, consider collections.deque instead, which implements\
    \ a double-ended queue. If order doesn't matter and uniqueness is important, sets\
    \ come in handy.\n\nDictionaries map unique keys to values, like an address book\
    \ mapping names to phone numbers or a username to email – if designing a game,\
    \ mapping a player ID to their high score; retrieve values quickly by key; or\
    \ add and remove key-value pairs easily. Dicts store data as hash tables under\
    \ the hood, providing average O(1) lookup time.\n\nHere, `car` is an instance\
    \ of the `Vehicle` class. We pass the construction parameters like max speed 100\
    \ and color blue when initializing it. This binds 100 and \"blue\" to that specific\
    \ `Vehicle` object. Print shows it can access the `color` attribute from its parent\
    \ `Vehicle` class.\n\nThis pattern demonstrates the basic mechanics – definitions\
    \ in the parent `Vehicle` class handle common elements. The `car` object inherits\
    \ those attributes and behaviors defined by the `Vehicle` while having its own\
    \ distinct state. We can create many such vehicle objects with varying speeds,\
    \ colors, etc., but all share that same core template. While simple, this establishes\
    \ the differentiation between classes and objects that makes object-oriented code\
    \ so powerful. A class provides structure, and an object provides state. This\
    \ coupling enables the elegant modeling of real-world entities like vehicles in\
    \ code.\n\nMoving forward, we will build on this foundation to unlock more advanced\
    \ object-oriented capabilities in Python. But first, we must solidify our understanding\
    \ of how classes capture abstract attributes and behaviors while objects manifest\
    \ them in practice. With the basics covered, let's dig deeper into more complex\
    \ class mechanics. Up next, we will explore inheritance – how classes can extend\
    \ other classes. For instance, a `PickupTruck` class could inherit from our `Vehicle`\
    \ parent to represent trucks specifically. This allows `PickupTruck`s to share\
    \ core `Vehicle` attributes like speed while adding unique truck features like\
    \ towing capacity on top. We will implement inheritance firsthand to illustrate\
    \ the relationships between parent and child classes clearly.\n\nInheritance allows\
    \ classes to inherit attributes and behaviors from parent classes. This models\
    \ hierarchical relationships found in the real world. For example, a `Truck` and\
    \ `SUV` classes may inherit shared functionality from a `Vehicle` parent class.\
    \ At the same time, `Truck` and `SUV` can define unique attributes tailored to\
    \ each vehicle type, such as hauling capacity or ground clearance. Inheritance\
    \ passes down variables, properties, and methods from the parent. Child classes\
    \ can leverage these without having to rewrite existing code.\n\nYou define inheritance\
    \ in Python using parentheses after the child class name. For example:\n\n```python\n\
    class Vehicle:\n    def description(self):\n        return \"A vehicle that moves\
    \ people\"\n\nclass Truck(Vehicle):\n    def usage(self):\n        return \"Transporting\
    \ heavy loads\"\n```\n\nHere, `Truck` inherits from the `Vehicle` class by specifying\
    \ `(Vehicle)`. Now, any `Truck` instance gets access to the `description` method\
    \ from `Vehicle` in addition to its own `usage` method. This allows specializing\
    \ functionality while reusing what already exists in the parent.\n\nYou can overwrite\
    \ inherited attributes by redefining them in the child class. For example, we\
    \ may want a unique description for `Truck` instances:\n\n```python\nclass Truck(Vehicle):\n\
    \    def description(self):\n        return \"A heavy duty vehicle for hauling\"\
    \n```\n\nThe `Truck` description overrides the parent version. This lets child\
    \ classes further customize behavior from parents to better match their specialties.\n\
    \nNow let's examine a hierarchy in code:\n\n```python\nclass Vehicle:\n    def\
    \ __init__(self, price, speed):\n        self.price = price\n        self.speed\
    \ = speed\n\n    def drive(self):\n        print(\"Driving at {} mph\".format(self.speed))\n\
    \nclass Truck(Vehicle):\n    def __init__(self, price, speed, capacity):\n   \
    \     super().__init__(price, speed)\n        self.capacity = capacity\n\n   \
    \ def load_cargo(self, cargo):\n        print(\"Loading {} tons of cargo\".format(cargo))\n\
    \nram = Truck(24000, 55, 3000)\nram.drive()\nram.load_cargo(1200)\n```\n\nWe define\
    \ `Vehicles` to track price and speed, with a `drive` method to print the speed.\
    \ `Truck` subclasses `Vehicle`, expanding the constructor to accept capacity and\
    \ override methods as needed. Finally, the `ram` instantiates the `Truck` with\
    \ parameters passed to the inherited `Vehicle` constructor via `super()`. We can\
    \ then invoke truck-specific methods like `load_cargo()` or reused methods like\
    \ `drive()`.\n\nThis demonstrates the primary goal of inheritance – reducing code\
    \ duplication by extending parent functionality in subclasses. The parent `Vehicle`\
    \ class encapsulates core logic related to all vehicles, thereby centralizing\
    \ this in one place. The `Truck` subclass inherits those elements and customizes\
    \ them as needed to represent a specific type of vehicle. Changes to `Vehicle`\
    \ propagate down automatically. This saves coding effort while improving the maintainability\
    \ of classes over time.\n\nThe flexibility of inheritance does introduce some\
    \ risks, however. Overuse can lead to brittle base classes that break easily when\
    \ changed. There are also scenarios where inheritance communicates the wrong semantic\
    \ meaning between classes. As a result, inheritance should be applied judiciously\
    \ based on sound modeling of concepts and their relationships. Alternatives like\
    \ composition may be better suited in some cases. We will explore those options\
    \ later, but when applied appropriately, inheritance remains a powerful technique\
    \ for reusable code."
  mdcn: "## 第10章\n\n### 标准库亮点\n\nPython的标准库是所有Python发行版预装的内置模块和包的集合。本章概述了标准库中每位Python开发者都应了解的一些常用模块和包。我们将探索它们的功能，并通过用例来释放其全部潜力。\n\
    \n标准库为开发者节省了时间和精力。无需自行构建所有基础工具和实用程序，你可以利用这个专为Python设计的庞大库。顶层包和模块涵盖多个领域，包括数学运算、数据结构、算法、文本处理、网络、Web框架以及操作系统操作的封装器。本章并非详尽列出标准库包含的所有内容，而是聚焦于一些亮点——你可能会经常交互的核心模块。我们按领域将它们分组，并通过示例说明其典型用法。在你深入阅读完整文档之前，可以将此视为一个入门介绍。读完本章，你将对标准库中最流行和实用的部分有扎实的掌握。\n\
    \nPython标准库包含几个对任何Python程序员都极为有用的内置数据类型和数据结构。熟悉这些内容将使你能够高效地存储、访问和操作数据，而无需从头构建自定义数据结构。在本章中，我们将探讨一些最基本和最常用的选项——列表、字典、集合、元组和数组。它们各有不同的用途，也各有其优势和局限。了解何时使用哪种数据结构，将帮助你恰当地建模数据并编写优化的代码。\n\
    \n列表是主力数据类型——灵活、多用途，在Python代码中无处不在。可以将它们想象成可伸缩的容器，可以容纳任何类型的对象，从字符串到整数，甚至其他列表。你可以轻松地追加、插入和删除元素。列表会随着你的更改而动态增长和收缩。这使得它们非常适合表示可变的有序集合。例如，你可能使用列表来存储音乐应用的歌曲播放列表，其中顺序很重要。当用户添加或删除歌曲时，你的列表会在后台无缝更新。你不必像在C等静态类型语言中那样预先确定大小或重新分配内存。列表抽象了这些细节。\n\
    \n在底层，Python将列表元素在内存中相邻存储。这意味着访问任何元素所需的时间相同，不像链表等数据结构。然而，随着列表变大，追加新元素会变慢，因为这可能需要Python找到一个新的连续空闲内存块并复制元素。如果保持顺序但从前端快速插入/删除很重要，可以考虑使用`collections.deque`，它实现了一个双端队列。如果顺序不重要且唯一性很重要，集合就派上用场了。\n\
    \n字典将唯一的键映射到值，就像通讯录将姓名映射到电话号码，或者将用户名映射到电子邮件——如果设计游戏，可以将玩家ID映射到他们的最高分；通过键快速检索值；或者轻松添加和删除键值对。字典在底层以哈希表存储数据，提供平均O(1)的查找时间。\n\
    \n这里，`car`是`Vehicle`类的一个实例。在初始化时，我们传递了构造参数，如最高速度100和颜色蓝色。这将100和\"blue\"绑定到该特定的`Vehicle`对象。打印显示它可以访问其父类`Vehicle`的`color`属性。\n\
    \n这个模式展示了基本机制——父类`Vehicle`中的定义处理通用元素。`car`对象继承了`Vehicle`定义的那些属性和行为，同时拥有自己独特的状态。我们可以创建许多这样的车辆对象，具有不同的速度、颜色等，但它们都共享相同的核心模板。虽然简单，但这确立了类和对象之间的区别，使得面向对象的代码如此强大。类提供结构，对象提供状态。这种耦合使得在代码中优雅地建模现实世界实体（如车辆）成为可能。\n\
    \n接下来，我们将在此基础上解锁Python中更高级的面向对象功能。但首先，我们必须巩固对类如何捕获抽象属性和行为，而对象如何在实践中体现它们的理解。在掌握了基础知识之后，让我们深入探讨更复杂的类机制。接下来，我们将探索继承——类如何扩展其他类。例如，一个`PickupTruck`类可以从我们的`Vehicle`父类继承，以专门表示卡车。这允许`PickupTruck`共享核心的`Vehicle`属性（如速度），同时在此基础上添加独特的卡车功能（如牵引能力）。我们将亲手实现继承，以清晰地说明父类和子类之间的关系。\n\
    \n继承允许类从父类继承属性和行为。这模拟了现实世界中发现的层次关系。例如，`Truck`和`SUV`类可以从`Vehicle`父类继承共享功能。同时，`Truck`和`SUV`可以定义针对每种车辆类型的独特属性，例如载重能力或离地间隙。继承将变量、属性和方法从父类传递下来。子类可以利用这些，而无需重写现有代码。\n\
    \n在Python中，你在子类名后使用括号来定义继承。例如：\n\n```python\nclass Vehicle:\n    def description(self):\n\
    \        return \"A vehicle that moves people\"\n\nclass Truck(Vehicle):\n   \
    \ def usage(self):\n        return \"Transporting heavy loads\"\n```\n\n这里，`Truck`通过指定`(Vehicle)`从`Vehicle`类继承。现在，任何`Truck`实例除了自己的`usage`方法外，还可以访问`Vehicle`的`description`方法。这允许在重用父类现有功能的同时，对功能进行特化。\n\
    \n你可以通过在子类中重新定义来覆盖继承的属性。例如，我们可能希望为`Truck`实例提供一个独特的描述：\n\n```python\nclass Truck(Vehicle):\n\
    \    def description(self):\n        return \"A heavy duty vehicle for hauling\"\
    \n```\n\n`Truck`的描述覆盖了父类的版本。这使得子类可以进一步定制来自父类的行为，以更好地匹配其专长。\n\n现在让我们在代码中检查一个层次结构：\n\
    \n```python\nclass Vehicle:\n    def __init__(self, price, speed):\n        self.price\
    \ = price\n        self.speed = speed\n\n    def drive(self):\n        print(\"\
    Driving at {} mph\".format(self.speed))\n\nclass Truck(Vehicle):\n    def __init__(self,\
    \ price, speed, capacity):\n        super().__init__(price, speed)\n        self.capacity\
    \ = capacity\n\n    def load_cargo(self, cargo):\n        print(\"Loading {} tons\
    \ of cargo\".format(cargo))\n\nram = Truck(24000, 55, 3000)\nram.drive()\nram.load_cargo(1200)\n\
    ```\n\n我们定义`Vehicles`来跟踪价格和速度，并有一个`drive`方法来打印速度。`Truck`是`Vehicle`的子类，扩展了构造函数以接受容量，并根据需要覆盖方法。最后，`ram`实例化了`Truck`，通过`super()`将参数传递给继承的`Vehicle`构造函数。然后我们可以调用卡车特定的方法，如`load_cargo()`，或重用的方法，如`drive()`。\n\
    \n这展示了继承的主要目标——通过在子类中扩展父类功能来减少代码重复。父类`Vehicle`封装了与所有车辆相关的核心逻辑，从而将其集中在一个地方。`Truck`子类继承这些元素，并根据需要进行自定义，以表示特定类型的车辆。对`Vehicle`的更改会自动向下传播。这节省了编码工作量，同时提高了类随时间推移的可维护性。\n\
    \n然而，继承的灵活性确实引入了一些风险。过度使用可能导致脆弱的基类，在更改时容易出错。还有一些场景下，继承会在类之间传达错误的语义含义。因此，应基于对概念及其关系的合理建模，审慎地应用继承。在某些情况下，组合等替代方案可能更合适。我们将在后面探讨这些选项，但当应用得当时，继承仍然是实现可重用代码的强大技术。"
