    \ version of *test/unit/data/test_explorer.py*.\n\n## Review\n\nThis chapter presented\
    \ a simple data-handling layer, with a few trips up and down the layer stack as\
    \ needed. [Chapter 12](#) contains unit tests for each layer, as well as cross-layer\
    \ integration and full end-to-end tests. [Chapter 14](#) goes into more database\
    \ depth and detailed examples.\n\n# CHAPTER 11\n\n## Authentication and Authorization\n\
    \n> Respect mah authoritay!\n—Eric Cartman, *South Park*\n\n## Preview\n\nSometimes\
    \ a website is wide open, and any visitor can visit any page. But if any of the\
    \ site's content may be modified, some endpoints will be restricted to certain\
    \ people or groups. If anyone could alter pages on Amazon, imagine the odd items\
    \ that would show up, and the amazing sales some people would suddenly get. Unfortunately,\
    \ it's human nature—for some humans—to take advantage of the rest, who pay a hidden\
    \ tax for their activities.\n\nShould we leave our cryptid site open for any users\
    \ to access any endpoint? No! Almost any sizable web service eventually needs\
    \ to deal with the following:\n\n+   *Authentication (authn)*\n    Who are you?\n\
    \n*Authorization (authz)*\n    What do you want?\n\nShould the authentication\
    \ and authorization (auth) code have its own new layer, say between Web and Service?\
    \ Or should everything be handled by the Web or Service layer itself? This chapter\
    \ dips into auth techniques and where to put them.\n\nOften descriptions of web\
    \ security seem more confusing than they need to be. Attackers can be really,\
    \ really sneaky, and countermeasures may not be simple.\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_161_0.png)\n\
    \nAs I've mentioned more than once, the official FastAPI documentation is excellent.\
    \ Try the [Security section](https://example.com) if this chapter doesn't provide\
    \ as many details as you'd like.\n\nSo, let's take this walk-through in steps.\
    \ I'll start with simple techniques that are intended to only hook auth into a\
    \ web endpoint for testing, but would not stand up in a public website.\n\n##\
    \ Interlude 1: Do You Need Authentication?\n\nAgain, *authentication* is concerned\
    \ with *identity*: who are you? To implement authentication, we need a mapping\
    \ of secret information to a unique identity. There are many ways to do this,\
    \ with *many* variations of complexity. Let's start small and work up.\n\nOften\
    \ books and articles on web development jump right away into the details of authentication\
    \ and authorization, sometimes muddling them. They sometimes skip the first question:\
    \ do you really need either?\n\nYou could allow completely anonymous access to\
    \ all your website's pages. But that would leave you open to exploits like denial-of-service\
    \ attacks. Although some protections like rate limits can be implemented outside\
    \ the web server (see [Chapter 13](https://example.com)), almost all public API\
    \ providers require at least some authentication.\n\nBeyond security, we want\
    \ to know how effective websites are:\n\n+   - How many unique visitors?\n- What\
    \ are the most popular pages?\n- Do some changes increase views?\n- What page\
    \ sequences are common?\n\nThe answers to these questions require authentication\
    \ of specific visitors. Otherwise, you can get only total counts.\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_161_1.png)\n\
    \nIf your site needs authentication or authorization, access to it should be encrypted\
    \ (using HTTPS instead of HTTP), to prevent attackers from extracting secret data\
    \ from plain text. See [Chapter 13](https://example.com) for details on setting\
    \ up HTTPS.\n\n## Authentication Methods\n\nThere are many web authentication\
    \ methods and tools:\n\n+   - *Username/email and password*\n    Using classic\
    \ HTTP Basic and Digest Authentication\n- *API key*\n    An opaque long string\
    \ with an accompanying *secret*\n- *OAuth2*\n    A set of standards for authentication\
    \ and authorization\n- *JavaScript Web Tokens (JWT)*\n    An encoding format containing\
    \ cryptographically signed user information\n\nIn this section, I'll review the\
    \ first two methods and show you how to traditionally implement them. But I'll\
    \ stop before filling out the API and database code. Instead, we'll fully implement\
    \ a more modern scheme with OAuth2 and JWT.\n\n## Global Authentication: Shared\
    \ Secret\n\nThe very simplest authentication method is to pass a secret that's\
    \ normally known only by the web server. If it matches, you're in. This isn't\
    \ safe if your API site is exposed to the public with HTTP instead of HTTPS. If\
    \ it's hidden behind a frontend site that is itself open, the frontends and backends\
    \ could communicate using a shared constant secret. But if your frontend site\
    \ is hacked, then darn. Let's see how FastAPI handles simple authentication.\n\
    \nMake a new top-level file called *auth.py*. Check that you don't have another\
    \ FastAPI server still running from one of those ever-changing *main.py* files\
    \ from previous chapters. Example 11-1 implements a server that just returns whatever\
    \ username and password were sent to it using HTTP Basic Authentication—a method\
    \ from the original days of the web.\n\nExample 11-1. Use HTTP Basic Auth to get\
    \ user info: auth.py\n\n```\nimport uvicorn\nfrom fastapi import Depends, FastAPI\n\
    from fastapi.security import HTTPBasic, HTTPBasicCredentials\n\napp = FastAPI()\n\
    \nbasic = HTTPBasic()\n\n@app.get(\"/who\")\ndef get_user(\n    creds: HTTPBasicCredentials\
    \ = Depends(basic)):\n    return {\"username\": creds.username, \"password\":\
    \ creds.password}\n\nif __name__ == \"__main__\":\n    uvicorn.run(\"auth:app\"\
    , reload=True)\n```\n\nIn Example 11-2, tell HTTPie to make this Basic Auth request\
    \ (this requires the arguments -a name:password). Here, let's use the name me\
    \ and the password secret.\n\nExample 11-2. Test with HTTPie\n\n```\n$ http -q\
    \ -a me:secret localhost:8000/who\n{\n    \"password\": \"secret\",\n    \"username\"\
    : \"me\"\n}\n```\n\nTesting with the Requests package in Example 11-3 is similar,\
    \ using the auth parameter.\n\nExample 11-3. Test with Requests\n\n```\n>>> import\
    \ requests\n>>> r = requests.get(\"http://localhost:8000/who\",\n    auth=(\"\
    me\", \"secret\"))\n>>> r.json()\n{'username': 'me', 'password': 'secret'}\n```\n\
    \nYou can also test Example 11-1 with the automatic docs page (http://localhost:8000/docs),\
    \ shown in Figure 11-1.\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_163_0.png)\n\
    \nFigure 11-1. Docs page for simple authentication"
