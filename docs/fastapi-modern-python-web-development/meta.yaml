  md: "Autogenerated documentation and test pages\nMuch easier than hand-editing OpenAPI\
    \ descriptions.\n\nFastAPI uses the following:\n\n+   - Python type hints\n- Starlette\
    \ for the web machinery, including async support\n- Pydantic for data definitions\
    \ and validation\n- Special integration to leverage and extend the others\n\n\
    This combination makes a pleasing development environment for web applications,\
    \ especially RESTful web services.\n\n# A FastAPI Application\n\nLet’s write a\
    \ teeny FastAPI application—a web service with a single endpoint. For now, we’re\
    \ in what I’ve called the Web layer, handling only web requests and responses.\
    \ First, install the basic Python packages that we’ll be using:\n\n+   - The `FastAPI`\
