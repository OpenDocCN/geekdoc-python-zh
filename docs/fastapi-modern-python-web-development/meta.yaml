  md: "Example 15-9. Download a small file with HTTPie, with byte count\n\n```\n$\
    \ http -b http://localhost:8000/small/1KB.bin | wc -c\n1000\n```\n\n# StreamingResponse\n\
    \nSimilar to FileUpload, it's better to download large files with StreamingResponse,\
    \ which returns the file in chunks. Example 15-10 shows this, with an async def\
    \ path function to avoid blocking when the CPU isn't being used. I'm skipping\
    \ error checking for now; if the file path doesn't exist, the open() call will\
    \ raise an exception.\n\nExample 15-10. Return a big file with StreamingResponse\
    \ (add to main.py)\n\n```\nfrom pathlib import path\nfrom typing import Generator\n\
    from fastapi.responses import StreamingResponse\n\ndef gen_file(path: str) ->\
    \ Generator:\n    with open(file=path, mode=\"rb\") as file:\n        yield file.read()\n\
    \n@app.get(\"/download_big/{name}\")\nasync def download_big_file(name:str):\n\
    \    gen_expr = gen_file(file_path=path)\n    response = StreamingResponse(\n\
    \        content=gen_expr,\n        status_code=200,\n    )\n    return response\n\
    ```\n\ngen_expr is the generator expression returned by the generator function\
    \ gen_file(). StreamingResponse uses it for its iterable content argument, so\
    \ it can download the file in chunks.\n\nExample 15-11 is the accompanying test.\
    \ (This first needs the file 1GB.bin alongside main.py, and will take a little\
    \ longer.)\n\nExample 15-11. Download a big file with HTTPie\n\n```\n$ http -b\
    \ http://localhost:8000/big/1GB.bin | wc -c\n1000000000\n```\n\n# Serving Static\
    \ Files\n\nTraditional web servers can treat server files as though they were\
    \ on a normal filesystem. FastAPI lets you do this with StaticFiles."
