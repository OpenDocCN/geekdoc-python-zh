  md: 'Finally, in Chapter 10, we''ll drop the faking and store real data in real
    databases, for a full end-to-end (Web → Service → Data) website.


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_111_0.png)


    Allowing any anonymous visitor to perform all these actions will be an object
    lesson in “why we can’t have nice things.” Chapter 11 discusses the auth (authentication
    and authorization) needed to define roles and limit who can do what. For the rest
    of the current chapter, we’ll sidestep auth and just show how to handle the raw
    web functions.


    # Interlude: Top-Down, Bottom-Up, Middle-Out?


    When designing a website, you could start from one of the following:


    +   - The Web layer and work down

    - The Data layer and work up

    - The Service layer and work out in both directions


    Do you already have a database, installed and loaded with data, and are just pining
    for a way to share it with the world? If so, you may want to tackle the Data layer’s
    code and tests first, then the Service layer, and write the Web layer last.


    If you’re following domain-driven design, you might start in the middle Service
    layer, defining your core entities and data models. Or you may want to evolve
    the web interface first, and fake calls to the lower layers until you know what
    you’ll expect of them.


    You’ll find very good design discussions and recommendations in these books:


    +   - *Clean Architectures in Python* by Leonardo Giordani (Digital Cat Books)

    - *Architecture Patterns with Python* by Harry J.W. Percival and Bob Gregory (O’Reilly)

    - *Microservice APIs* by José Haro Peralta (Manning)


    In these and other sources, you’ll see terms like hexagonal architecture, ports,
    and adapters. Your choices on how to proceed largely depend on what data you have
    already and how you want to approach the work of building a site.


    I’m guessing that many of you are mainly interested in trying out FastAPI and
    its related technologies, and don’t necessarily have a predefined mature data
    domain that you want to instrument right away.'
