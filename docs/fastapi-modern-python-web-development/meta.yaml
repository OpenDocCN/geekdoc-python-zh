    \n## Z\n\nZeroMQ，4\n\n## 关于作者\n\n**Bill Lubanovic** 是一位拥有超过 40 年经验的开发者，专注于 Linux、Web\
    \ 和 Python。他合著了 O'Reilly 出版的《Linux 系统管理》，并撰写了《Python 入门》的两个版本。几年前他发现了 FastAPI，并与团队一起使用它重写了一个大型生物医学研究\
    \ API。这次经历非常成功，以至于他们已将 FastAPI 用于所有新项目。Bill 与家人和猫咪居住在明尼苏达州的 Sangre de Sasquatch\
    \ 山区。\n\n## 版权页\n\n*FastAPI* 封面上的动物是棘尾鬣蜥（*Ctenosaura* 属）。Ctenosaura 这个名字来源于两个希腊词：ctenos（意为梳子，指其背部和尾巴上梳子状的棘刺）和\
    \ saura（蜥蜴）。目前已知的棘尾鬣蜥有 15 种，包括五脊、黑胸、莫塔瓜、瓦哈卡、罗阿坦和乌蒂拉等。\n\n棘尾鬣蜥的体长范围从 4.9 英寸到 39\
    \ 英寸不等。每个物种都有不同的颜色，这些颜色会根据它们的体温、情绪、健康状况和栖息地温度而变化。一些颜色包括棕色、黑色、灰色、粉色、绿色和黄色。总的来说，棘尾鬣蜥是杂食动物，以各种水果、花朵、叶子和小动物为食。\n\
    \n虽然鬣蜥可以在多种栖息地找到，但棘尾鬣蜥原产于墨西哥和中美洲。它们可以在热带和亚热带干旱森林、灌木丛中找到，偶尔也出现在人类改造的栖息地和城市地区。一些物种，如罗阿坦（仅在洪都拉斯的罗阿坦湾岛发现）、乌蒂拉（仅在乌蒂拉发现，乌蒂拉是洪都拉斯加勒比海岸外的一个群岛，在沼泽和红树林生态系统中）和莫塔瓜（仅在危地马拉发现），是特定地区的特有种。\n\
    \n几种棘尾鬣蜥被列为濒危或极度濒危物种。其中一些在美国也被认为是入侵物种（西部和黑棘尾鬣蜥）。它们面临许多威胁，包括农业和畜牧业导致的栖息地丧失、非法宠物贸易和偷猎、栖息地碎片化、引入的捕食者以及基于恐惧的捕杀。O'Reilly\
    \ 封面上的许多动物都濒临灭绝；它们对世界都很重要。\n\n封面插图由 Karen Montgomery 创作，基于《Museum of Animated\
    \ Nature》中的一幅古老版画。封面字体为 Gilroy Semibold 和 Guardian Sans。正文字体为 Adobe Minion Pro；标题字体为\
