    In this chapter, you''ll fiddle with files in the *service* directory.


    # Protection


    One nice thing about layers is that you don''t have to worry about everything.
    The Service layer cares only about what goes into and out of the data. As you''ll
    see in Chapter 11, a higher layer (in this book, *Web*) can handle the authentication
    and authorization messiness. The functions to create, modify, and delete should
    not be wide open, and even the get functions might eventually need some limits.


    # Functions


    Let''s start with *creature.py*. At this point, the needs of *explorer.py* will
    be almost the same, and we can borrow almost everything. It''s so tempting to
    write a single service file that handles both, but, almost inevitably, at some
    point we''ll need to handle them differently.


    Also at this point, the service file is pretty much a pass-through layer. This
    is a case in which a little extra structure at the start will pay off later. Much
    as you did for *web/creature.py* and *web/explorer.py* in Chapter 8, you''ll define
    service modules for both,'
