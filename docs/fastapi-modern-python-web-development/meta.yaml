  - "[PAGE 74]\n\n# Using Starlette Directly\n\nFastAPI doesn't expose Starlette as\
    \ much as it does Pydantic. Starlette is largely the machinery humming in the\
    \ engine room, keeping the ship running smoothly.\n\nBut if you're curious, you\
    \ could use Starlette directly to write a web application. Example 3-1 in the\
    \ previous chapter might look like Example 4-7.\n\nExample 4-7. Using Starlette:\
    \ starlette_hello.py\n\n```\nfrom starlette.applications import Starlette\nfrom\
    \ starlette.responses import JSONResponse\nfrom starlette.routing import Route\n\
    \nasync def greeting(request):\n    return JSONResponse('Hello? World?')\n\napp\
    \ = Starlette(debug=True, routes=[\n    Route('/hi', greeting),\n])\n```\n\nRun\
    \ this web application with this:\n\n```\n$ uvicorn starlette_hello:app\n```\n\
    \nIn my opinion, the FastAPI additions make web API development much easier.\n\
    \n# Interlude: Cleaning the Clue House\n\nYou own a small (very small: just you)\
