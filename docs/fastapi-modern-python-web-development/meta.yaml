  md: "# Example 17-1. Read PSV file with csv (load_csv.py)\n\n```\nimport csv\nimport\
    \ sys\n\ndef read_csv(fname: str) -> list[tuple]:\n    with open(fname) as file:\n\
    \        data = [row for row in csv.reader(file, delimiter=\"|\")]\n    return\
    \ data\n\nif __name__ == \"__main__\":\n    data = read_csv(sys.argv[1])\n   \
    \ for row in data[0:5]:\n        print(row)\n```\n\nNow run the test in Example\
    \ 17-2.\n\n# Example 17-2. Test CSV database loading\n\n```\n$ python load_csv.py\
    \ cryptid.psv\n['name', 'country', 'area', 'description', 'aka']\n['Abaia', 'FJ',\
