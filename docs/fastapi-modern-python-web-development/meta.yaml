    \        _ = creature.delete(sample.name)\n```\n\n提示：你可以创建自己的 *test/unit/data/test_explorer.py*\
    \ 版本。\n\n## 回顾\n\n本章介绍了一个简单的数据处理层，并根据需要在层栈之间进行了几次上下穿梭。[第 12 章](#) 包含了每一层的单元测试，以及跨层集成和完整的端到端测试。[第\
    \ 14 章](#) 则深入探讨了更多数据库细节和详细示例。\n\n# 第 11 章\n\n## 认证与授权\n\n> 尊重我的权威！\n—埃里克·卡特曼，《南方公园》\n\
    \n## 预览\n\n有时网站是完全开放的，任何访问者都可以访问任何页面。但是，如果网站的任何内容可能被修改，某些端点将仅限于特定人员或群体访问。如果任何人都可以修改亚马逊上的页面，想象一下会出现多么奇怪的商品，以及某些人会突然获得多么惊人的销量。不幸的是，这是人性——对某些人来说——会利用其他人，而其他人则为他们的活动支付隐性成本。\n\
    \n我们应该让我们的神秘生物网站对任何用户开放，允许他们访问任何端点吗？不！几乎任何规模可观的 Web 服务最终都需要处理以下问题：\n\n+   *认证\
    \ (authn)*\n    你是谁？\n\n*授权 (authz)*\n    你想做什么？\n\n认证和授权（auth）代码是否应该拥有自己的新层，比如说位于\
    \ Web 层和 Service 层之间？还是应该由 Web 层或 Service 层本身处理所有事情？本章将探讨认证技术及其放置位置。\n\n通常，关于\
    \ Web 安全的描述似乎比实际需要的更加令人困惑。攻击者可能非常、非常狡猾，而对策可能并不简单。\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_161_0.png)\n\
    \n正如我多次提到的，官方的 FastAPI 文档非常出色。如果本章没有提供你想要的那么多细节，请尝试阅读 [安全部分](https://example.com)。\n\
    \n那么，让我们分步骤进行这次演练。我将从一些简单的技术开始，这些技术旨在仅为测试目的将认证钩入 Web 端点，但无法在公共网站上使用。\n\n## 插曲\
    \ 1：你需要认证吗？\n\n再次强调，*认证* 关注的是 *身份*：你是谁？要实现认证，我们需要一个从秘密信息到唯一身份的映射。有很多方法可以做到这一点，复杂程度\
    \ *多种多样*。让我们从小处着手，逐步深入。\n\n通常，关于 Web 开发的书籍和文章会直接跳到认证和授权的细节，有时会将它们混为一谈。它们有时会跳过第一个问题：你真的需要其中任何一个吗？\n\
    \n你可以允许完全匿名访问你网站的所有页面。但这会让你容易受到拒绝服务攻击等漏洞的利用。虽然一些保护措施（如速率限制）可以在 Web 服务器之外实现（参见\
    \ [第 13 章](https://example.com)），但几乎所有公共 API 提供者都至少需要一些认证。\n\n除了安全之外，我们还想了解网站的有效性：\n\
    \n+   - 有多少独立访客？\n- 哪些页面最受欢迎？\n- 某些更改是否增加了浏览量？\n- 哪些页面序列是常见的？\n\n这些问题的答案需要对特定访客进行认证。否则，你只能获得总数。\n\
    \n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_161_1.png)\n\n如果你的网站需要认证或授权，对其访问应进行加密（使用\
    \ HTTPS 而不是 HTTP），以防止攻击者从纯文本中提取秘密数据。有关设置 HTTPS 的详细信息，请参阅 [第 13 章](https://example.com)。\n\
    \n## 认证方法\n\n有许多 Web 认证方法和工具：\n\n+   - *用户名/邮箱和密码*\n    使用经典的 HTTP 基本认证和摘要认证\n\
    - *API 密钥*\n    一个不透明的长字符串，附带一个 *密钥*\n- *OAuth2*\n    一套用于认证和授权的标准\n- *JavaScript\
    \ Web 令牌 (JWT)*\n    一种包含加密签名用户信息的编码格式\n\n在本节中，我将回顾前两种方法，并向你展示如何传统地实现它们。但我将在完成\
    \ API 和数据库代码之前停止。相反，我们将使用 OAuth2 和 JWT 完全实现一个更现代的方案。\n\n## 全局认证：共享密钥\n\n最简单的认证方法是传递一个通常只有\
    \ Web 服务器知道的秘密。如果匹配，你就通过了。如果你的 API 站点通过 HTTP 而不是 HTTPS 公开暴露，这并不安全。如果它隐藏在一个本身是开放的前端站点后面，前端和后端可以使用共享的常量密钥进行通信。但如果你的前端站点被黑了，那就糟了。让我们看看\
    \ FastAPI 如何处理简单的认证。\n\n创建一个名为 *auth.py* 的新顶级文件。检查你是否没有另一个来自前面章节那些不断变化的 *main.py*\
    \ 文件的 FastAPI 服务器仍在运行。示例 11-1 实现了一个服务器，该服务器只是返回使用 HTTP 基本认证发送给它的任何用户名和密码——这是 Web\
    \ 原始时代的一种方法。\n\n示例 11-1. 使用 HTTP 基本认证获取用户信息：auth.py\n\n```\nimport uvicorn\nfrom\
    \ fastapi import Depends, FastAPI\nfrom fastapi.security import HTTPBasic, HTTPBasicCredentials\n\
    \napp = FastAPI()\n\nbasic = HTTPBasic()\n\n@app.get(\"/who\")\ndef get_user(\n\
    \    creds: HTTPBasicCredentials = Depends(basic)):\n    return {\"username\"\
    : creds.username, \"password\": creds.password}\n\nif __name__ == \"__main__\"\
    :\n    uvicorn.run(\"auth:app\", reload=True)\n```\n\n在示例 11-2 中，告诉 HTTPie 进行此基本认证请求（这需要参数\
    \ -a name:password）。这里，让我们使用名称 me 和密码 secret。\n\n示例 11-2. 使用 HTTPie 测试\n\n```\n\
    $ http -q -a me:secret localhost:8000/who\n{\n    \"password\": \"secret\",\n\
    \    \"username\": \"me\"\n}\n```\n\n在示例 11-3 中使用 Requests 包进行测试类似，使用 auth 参数。\n\
    \n示例 11-3. 使用 Requests 测试\n\n```\n>>> import requests\n>>> r = requests.get(\"\
    http://localhost:8000/who\",\n    auth=(\"me\", \"secret\"))\n>>> r.json()\n{'username':\
    \ 'me', 'password': 'secret'}\n```\n\n你也可以使用自动文档页面 (http://localhost:8000/docs)\
    \ 测试示例 11-1，如图 11-1 所示。\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_163_0.png)\n\
    \n图 11-1. 简单认证的文档页面"
