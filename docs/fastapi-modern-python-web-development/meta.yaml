  md: '# PSV Text Output


    In this section, we''ll use the creatures listed in Appendix B. The data is in
    this book''s GitHub repo, in the pipe-separated file *cryptid.psv* and the SQLite
    database *cryptid.db*. Comma-separated (.csv) and tab-separated (.tsv) files are
    common, but commas are used within the data cells themselves, and tabs are sometimes
    hard to distinguish from other whitespace. The pipe character (|) is distinct,
    and rare enough in standard text to serve as a good separator.


    Let''s try the .psv text file first, using just text output examples for simplicity,
    and then go on to full web examples using the SQLite database.


    The initial header line of the .psv file contains the names of the fields:


    +   - name

    - country (* means many countries)

    - area (optional, US state or other country area)

    - description

    - aka (also known as)


    The rest of the lines in the file describe one creature at a time, with the fields
    in that order, separated by a | character.


    # CSV


    Example 17-1 reads the creature data into Python data structures. First, the pipe-separated
    file *cryptids.psv* can be read with the standard Python csv package, yielding
    a list of tuples, where each tuple represents a line of data from the file. (The
    csv package also includes a DictReader that returns a list of dicts instead.)
    The first line of this file is a header with the names of the columns; without
    this, we could still supply the headers through arguments to csv functions.


    I''m including type hints in the examples, but you can drop these if you have
    an older version of Python, and the code will still work. Let''s print only the
    header and first five lines, to save a few trees.¹


    > 1 If there are any trees like Tolkien''s Ents, we don''t want them lumbering
    up to our doors some night to have a word.'
  merge: -1
  pgno: 239
