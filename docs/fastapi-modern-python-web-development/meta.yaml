- md: "Why not write your own functions to do this? You could, but you would not have\
    \ these:\n\n- Data validity checks\n- Format conversions\n- Automatic documentation\n\
    \nIn many other web frameworks, you would do these checks inside your own functions.\
    \ You’ll see examples of this in Chapter 7, which compares FastAPI with Python\
    \ web frameworks like Flask and Django. But in FastAPI, you can handle your own\
    \ dependencies, much as the built-in ones do.\n\n## Writing a Dependency\n\nIn\
    \ FastAPI, a dependency is something that’s executed, so a dependency object needs\
    \ to be of the type Callable, which includes functions and classes—things that\
    \ you call, with parentheses and optional arguments.\n\nExample 6-1 shows a user_dep()\
    \ dependency function that takes name and password string arguments, and just\
    \ returns True if the user is valid. For this first version, let’s have the function\
    \ return True for anything.\n\nExample 6-1. A dependency function\n\n```\nfrom\
    \ fastapi import FastAPI, Depends, Params\n\napp = FastAPI()\n\n# the dependency\
    \ function:\ndef user_dep(name: str = Params, password: str = Params):\n    return\
    \ {\"name\": name, \"valid\": True}\n\n# the path function / web endpoint:\n@app.get(\"\
    /user\")\ndef get_user(user: dict = Depends(user_dep)) -> dict:\n    return user\n\
    ```\n\nHere, user_dep() is a dependency function. It acts like a FastAPI path\
    \ function (it knows about things like Params, etc.), but doesn’t have a path\
    \ decorator above it. It’s a helper, not a web endpoint itself.\n\nThe path function\
    \ get_user() says that it expects an argument variable called user, and that variable\
    \ will get its value from the dependency function user_dep().\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_97_0.png)\n\
    \nIn the arguments to `get_user()`, we could not have said `user = user_dep`,\
    \ because `user_dep` is a Python function object. And we could not say `user =\
    \ user_dep()`, because that would have called the `user_dep()` function when `get_user()`\
    \ was *defined*, not when it's used. So we need that extra helper FastAPI `Depends()`\
    \ function to call `user_dep()` just when it's wanted.\n\nYou can have multiple\
    \ dependencies in your path function argument list.\n\n## Dependency Scope\n\n\
    You can define dependencies to cover a single path function, a group of them,\
    \ or the whole web application.\n\n### Single Path\n\nIn your *path function*,\
    \ include an argument like this:\n\n```\ndef pathfunc(name: depfunc = Depends(depfunc)):\n\
    ```\n\nor just this:\n\n```\ndef pathfunc(name: depfunc = Depends()):\n```\n\n\
    *name* is whatever you want to call the value(s) returned by *depfunc*.\n\nFrom\
    \ the earlier example:\n\n- *pathfunc* is `get_user()`.\n- *depfunc* is `user_dep()`.\n\
    - *name* is `user`.\n\nExample 6-2 uses this path and dependency to return a fixed\
    \ user name and a valid Boolean.\n\nExample 6-2. Return a user dependency\n\n\
    ```\nfrom fastapi import FastAPI, Depends, Params\n\napp = FastAPI()\n\n# the\
    \ dependency function:\ndef user_dep(name: str = Params, password: str = Params):\n\
    \    return {\"name\": name, \"valid\": True}\n\n# the path function / web endpoint:\n\
    @app.get(\"/user\")\ndef get_user(user: dict = Depends(user_dep)) -> dict:\n \
    \   return user\n```\n\nIf your dependency function just checks something and\
    \ doesn't return any values, you can also define the dependency in your path *decorator*\
    \ (the preceding line, starting with a @):\n\n```\n@app.method(url, dependencies=[Depends(depfunc)])\n\
    ```\n\nLet's try that in Example 6-3.\n\nExample 6-3. Define a user check dependency\n\
    \n```\nfrom fastapi import FastAPI, Depends, Params\n\napp = FastAPI()\n\n# the\
    \ dependency function:\ndef check_dep(name: str = Params, password: str = Params):\n\
    \    if not name:\n        raise\n\n# the path function / web endpoint:\n@app.get(\"\
    /check_user\", dependencies=[Depends(check_dep)])\ndef check_user() -> bool:\n\
    \    return True\n```\n\n### Multiple Paths\n\nChapter 9 gives more details on\
    \ how to structure a larger FastAPI application, including defining more than\
    \ one *router* object under a top-level application, instead of attaching every\
    \ endpoint to the top-level application. Example 6-4 sketches the idea.\n\nExample\
    \ 6-4. Define a subrouter dependency\n\n```\nfrom fastapi import FastAPI, Depends,\
    \ APIRouter\n\nrouter = APIRouter(..., dependencies=[Depends(depfunc)])\n```\n\
    \nThis will cause *depfunc()* to be called for all path functions under router.\n\
    \n### Global\n\nWhen you define your top-level FastAPI application object, you\
    \ can add dependencies to it that will apply to all its path functions, as shown\
    \ in Example 6-5.\n\nExample 6-5. Define app-level dependencies\n\n```\nfrom fastapi\
    \ import FastAPI, Depends\n\ndef depfunc1():\n    pass\n\ndef depfunc2():\n  \
    \  pass\n\napp = FastAPI(dependencies=[Depends(depfunc1), Depends(depfunc2)])\n\
    \n@app.get(\"/main\")\ndef get_main():\n    pass\n```\n\nIn this case, you’re\
    \ using pass to ignore the other details to show how to attach the dependencies.\n\
    \n## Review\n\nThis chapter discussed dependencies and dependency injection—ways\
    \ of getting the data you need when you need it, in a straightforward way. Coming\
    \ up in the next chapter: Flask, Django, and FastAPI walk into a bar…\n\n# CHAPTER\
    \ 7\nFramework Comparisons\n\n> You don't need a framework. You need a painting,\
    \ not a frame.\n—Klaus Kinski, actor\n\n## Preview\n\nFor developers who have\
    \ used Flask, Django, or popular Python web frameworks, this chapter points out\
    \ FastAPI's similarities and differences. It does not go into every excruciating\
    \ detail, because, otherwise, the binding glue wouldn't hold this book together.\
    \ This chapter's comparisons can be useful if you're thinking of migrating an\
    \ application from one of these frameworks to FastAPI or are just curious.\n\n\
    One of the first things you might like to know about a new web framework is how\
    \ to get started, and a top-down way is by defining *routes* (mappings from URLs\
    \ and HTTP methods to functions). The next section compares how to do this with\
    \ FastAPI and Flask, because they're more similar to one another than Django and\
    \ are more likely to be considered together for similar applications.\n\n## Flask\n\
    \nFlask calls itself a *microframework*. It provides the basics, and you download\
    \ third-party packages to supplement it as needed. It's smaller than Django, and\
    \ faster to learn when you're getting started.\n\nFlask is synchronous, based\
    \ on WSGI rather than ASGI. A new project called quart is replicating Flask and\
    \ adding ASGI support.\n\nLet's start at the top, showing how Flask and FastAPI\
    \ define web routing.\n\n### Path\n\nAt the top level, Flask and FastAPI both\
    \ use a decorator to associate a route with a web endpoint. In Example 7-1, let's\
    \ duplicate Example 3-11 (from back in Chapter 3), which gets the person to greet\
    \ from the URL path.\n\nExample 7-1. FastAPI path\n\n```\nfrom fastapi import\
    \ FastAPI\n\napp = FastAPI()\n\n@app.get(\"/hi/{who}\")\ndef greet(who: str):\n\
    \    return f\"Hello? {who}?\"\n```\n\nBy default, FastAPI converts that f\"Hello?\
    \ {who}?\" string to JSON and returns it to the web client.\n\nExample 7-2 shows\
    \ how Flask would do it.\n\nExample 7-2. Flask path\n\n```\nfrom flask import\
    \ Flask, jsonify\n\napp = Flask(__name__)\n\n@app.route(\"/hi/<who>\", methods=[\"\
    GET\"])\ndef greet(who: str):\n    return jsonify(f\"Hello? {who}?\")\n```\n\n\
    Notice that the who in the decorator is now bounded by < and >. In Flask, the\
    \ method needs to be included as an argument—unless it's the default, GET. So\
    \ methods=[\"GET\"] could have been omitted here, but being explicit never hurts.\n\
    \n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_101_0.png)\n\nFlask 2.0 supports the\
    \ FastAPI-style decorators like @app.get instead of app.route.\n\nThe Flask jsonify()\
    \ function converts its argument to a JSON string and returns it, along with the\
    \ HTTP response header indicating that it's JSON. If you're returning a dict (not\
    \ other data types), recent versions of Flask will automatically convert it to\
    \ JSON and return it. Calling jsonify() explicitly works for all data types, including\
    \ dict.\n\n### Query Parameter\n\nIn Example 7-3, let's repeat Example 3-15, where\
    \ who is passed as a query parameter (after the ? in the URL).\n\nExample 7-3.\
    \ FastAPI query parameter\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\
    \n@app.get(\"/hi\")\ndef greet(who):\n    return f\"Hello? {who}?\"\n```\n\nThe\
    \ Flask equivalent is shown in Example 7-4.\n\nExample 7-4. Flask query parameter\n\
    \n```\nfrom flask import Flask, request, jsonify\n\napp = Flask(__name__)\n\n\
    @app.route(\"/hi\", methods=[\"GET\"])\ndef greet():\n    who: str = request.args.get(\"\
    who\")\n    return jsonify(f\"Hello? {who}?\")\n```\n\nIn Flask, we need to get\
    \ request values from the request object. In this case, args is a dict containing\
    \ the query parameters.\n\n### Body\n\nIn Example 7-5, let's copy old Example\
    \ 3-21.\n\nExample 7-5. FastAPI body\n\n```\nfrom fastapi import FastAPI\n\napp\
    \ = FastAPI()\n\n@app.get(\"/hi\")\ndef greet(who):\n    return f\"Hello? {who}?\"\
    \n```\n\nA Flask version looks like Example 7-6."
  mdcn: "为什么不自己编写函数来实现这些功能呢？你当然可以，但你就无法拥有这些：\n\n- 数据有效性检查\n- 格式转换\n- 自动文档生成\n\n在许多其他\
    \ Web 框架中，你需要在自己的函数中执行这些检查。你将在第 7 章看到相关示例，该章将 FastAPI 与 Flask 和 Django 等 Python\
    \ Web 框架进行比较。但在 FastAPI 中，你可以像处理内置依赖一样处理自己的依赖。\n\n## 编写依赖\n\n在 FastAPI 中，依赖是被执行的东西，因此依赖对象需要是\
    \ `Callable` 类型，这包括函数和类——即那些你可以用括号和可选参数调用的东西。\n\n示例 6-1 展示了一个 `user_dep()` 依赖函数，它接受\
    \ `name` 和 `password` 字符串参数，如果用户有效则返回 `True`。对于这个初始版本，我们让函数对任何输入都返回 `True`。\n\n\
    示例 6-1. 一个依赖函数\n\n```\nfrom fastapi import FastAPI, Depends, Params\n\napp = FastAPI()\n\
    \n# 依赖函数：\ndef user_dep(name: str = Params, password: str = Params):\n    return\
    \ {\"name\": name, \"valid\": True}\n\n# 路径函数 / Web 端点：\n@app.get(\"/user\")\n\
    def get_user(user: dict = Depends(user_dep)) -> dict:\n    return user\n```\n\n\
    这里，`user_dep()` 是一个依赖函数。它的行为类似于 FastAPI 路径函数（它知道 `Params` 等东西），但其上方没有路径装饰器。它是一个辅助函数，本身不是\
    \ Web 端点。\n\n路径函数 `get_user()` 声明它期望一个名为 `user` 的参数变量，该变量的值将来自依赖函数 `user_dep()`。\n\
    \n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_97_0.png)\n\n在 `get_user()` 的参数中，我们不能写成\
    \ `user = user_dep`，因为 `user_dep` 是一个 Python 函数对象。我们也不能写成 `user = user_dep()`，因为那会在\
    \ `get_user()` *定义*时调用 `user_dep()` 函数，而不是在它被使用时。因此，我们需要那个额外的辅助函数 FastAPI `Depends()`\
    \ 来在需要时调用 `user_dep()`。\n\n你可以在路径函数的参数列表中拥有多个依赖。\n\n## 依赖作用域\n\n你可以定义依赖来覆盖单个路径函数、一组路径函数或整个\
    \ Web 应用程序。\n\n### 单个路径\n\n在你的*路径函数*中，包含一个像这样的参数：\n\n```\ndef pathfunc(name: depfunc\
    \ = Depends(depfunc)):\n```\n\n或者像这样：\n\n```\ndef pathfunc(name: depfunc = Depends()):\n\
    ```\n\n*name* 是你希望用来称呼 *depfunc* 返回值的任何名称。\n\n从前面的例子来看：\n\n- *pathfunc* 是 `get_user()`。\n\
    - *depfunc* 是 `user_dep()`。\n- *name* 是 `user`。\n\n示例 6-2 使用此路径和依赖来返回固定的用户名和一个有效的布尔值。\n\
    \n示例 6-2. 返回一个用户依赖\n\n```\nfrom fastapi import FastAPI, Depends, Params\n\napp\
    \ = FastAPI()\n\n# 依赖函数：\ndef user_dep(name: str = Params, password: str = Params):\n\
    \    return {\"name\": name, \"valid\": True}\n\n# 路径函数 / Web 端点：\n@app.get(\"\
    /user\")\ndef get_user(user: dict = Depends(user_dep)) -> dict:\n    return user\n\
    ```\n\n如果你的依赖函数只是检查某些内容而不返回任何值，你也可以在路径*装饰器*（以 @ 开头的前一行）中定义依赖：\n\n```\n@app.method(url,\
    \ dependencies=[Depends(depfunc)])\n```\n\n让我们在示例 6-3 中尝试一下。\n\n示例 6-3. 定义一个用户检查依赖\n\
    \n```\nfrom fastapi import FastAPI, Depends, Params\n\napp = FastAPI()\n\n# 依赖函数：\n\
    def check_dep(name: str = Params, password: str = Params):\n    if not name:\n\
    \        raise\n\n# 路径函数 / Web 端点：\n@app.get(\"/check_user\", dependencies=[Depends(check_dep)])\n\
    def check_user() -> bool:\n    return True\n```\n\n### 多个路径\n\n第 9 章提供了更多关于如何构建更大\
    \ FastAPI 应用程序的细节，包括在顶级应用程序下定义多个*路由器*对象，而不是将每个端点都附加到顶级应用程序。示例 6-4 概述了这个想法。\n\n\
    示例 6-4. 定义一个子路由器依赖\n\n```\nfrom fastapi import FastAPI, Depends, APIRouter\n\n\
    router = APIRouter(..., dependencies=[Depends(depfunc)])\n```\n\n这将导致 `depfunc()`\
    \ 为路由器下的所有路径函数被调用。\n\n### 全局\n\n当你定义顶级 FastAPI 应用程序对象时，你可以向其添加依赖，这些依赖将应用于其所有路径函数，如示例\
    \ 6-5 所示。\n\n示例 6-5. 定义应用级依赖\n\n```\nfrom fastapi import FastAPI, Depends\n\n\
    def depfunc1():\n    pass\n\ndef depfunc2():\n    pass\n\napp = FastAPI(dependencies=[Depends(depfunc1),\
    \ Depends(depfunc2)])\n\n@app.get(\"/main\")\ndef get_main():\n    pass\n```\n\
    \n在这种情况下，你使用 `pass` 来忽略其他细节，以展示如何附加依赖。\n\n## 回顾\n\n本章讨论了依赖和依赖注入——以直接的方式在需要时获取所需数据的方法。下一章内容：Flask、Django\
    \ 和 FastAPI 走进一家酒吧……\n\n# 第 7 章\n框架比较\n\n> 你不需要框架。你需要的是画作，而不是画框。\n—克劳斯·金斯基，演员\n\
    \n## 预览\n\n对于使用过 Flask、Django 或流行 Python Web 框架的开发者，本章指出了 FastAPI 的相似之处和不同之处。它不会深入每一个令人痛苦的细节，因为否则，装订胶水就无法将这本书粘合在一起。如果你正在考虑将应用程序从这些框架之一迁移到\
    \ FastAPI，或者只是感到好奇，本章的比较会很有用。\n\n你可能想了解一个新 Web 框架的第一件事就是如何开始，而自上而下的方式是通过定义*路由*（将\
    \ URL 和 HTTP 方法映射到函数）。下一节比较了如何使用 FastAPI 和 Flask 来实现这一点，因为它们彼此之间比 Django 更相似，并且更有可能被一起考虑用于类似的应用程序。\n\
    \n## Flask\n\nFlask 自称是一个*微框架*。它提供基础功能，你可以根据需要下载第三方包来补充它。它比 Django 更小，在入门时学习更快。\n\
    \nFlask 是同步的，基于 WSGI 而不是 ASGI。一个名为 quart 的新项目正在复制 Flask 并添加 ASGI 支持。\n\n让我们从顶层开始，展示\
    \ Flask 和 FastAPI 如何定义 Web 路由。\n\n### 路径\n\n在顶层，Flask 和 FastAPI 都使用装饰器将路由与 Web\
    \ 端点关联起来。在示例 7-1 中，让我们复制示例 3-11（来自第 3 章），它从 URL 路径获取要问候的人。\n\n示例 7-1. FastAPI\
    \ 路径\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n@app.get(\"/hi/{who}\"\
    )\ndef greet(who: str):\n    return f\"Hello? {who}?\"\n```\n\n默认情况下，FastAPI 将该\
    \ f\"Hello? {who}?\" 字符串转换为 JSON 并返回给 Web 客户端。\n\n示例 7-2 展示了 Flask 的做法。\n\n示例\
    \ 7-2. Flask 路径\n\n```\nfrom flask import Flask, jsonify\n\napp = Flask(__name__)\n\
    \n@app.route(\"/hi/<who>\", methods=[\"GET\"])\ndef greet(who: str):\n    return\
    \ jsonify(f\"Hello? {who}?\")\n```\n\n注意装饰器中的 `who` 现在被 `<` 和 `>` 包围。在 Flask 中，方法需要作为参数包含——除非它是默认的\
    \ GET。因此 `methods=[\"GET\"]` 在这里本可以省略，但明确说明总没有坏处。\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_101_0.png)\n\
    \nFlask 2.0 支持 FastAPI 风格的装饰器，如 `@app.get` 而不是 `app.route`。\n\nFlask 的 `jsonify()`\
    \ 函数将其参数转换为 JSON 字符串并返回，同时附带指示其为 JSON 的 HTTP 响应头。如果你返回的是一个字典（而不是其他数据类型），最新版本的\
    \ Flask 会自动将其转换为 JSON 并返回。显式调用 `jsonify()` 适用于所有数据类型，包括字典。\n\n### 查询参数\n\n在示例\
    \ 7-3 中，让我们重复示例 3-15，其中 `who` 作为查询参数传递（在 URL 的 ? 之后）。\n\n示例 7-3. FastAPI 查询参数\n\
    \n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n@app.get(\"/hi\")\ndef\
    \ greet(who):\n    return f\"Hello? {who}?\"\n```\n\nFlask 的等效示例如示例 7-4 所示。\n\n\
    示例 7-4. Flask 查询参数\n\n```\nfrom flask import Flask, request, jsonify\n\napp =\
    \ Flask(__name__)\n\n@app.route(\"/hi\", methods=[\"GET\"])\ndef greet():\n  \
    \  who: str = request.args.get(\"who\")\n    return jsonify(f\"Hello? {who}?\"\
    )\n```\n\n在 Flask 中，我们需要从 `request` 对象获取请求值。在这种情况下，`args` 是一个包含查询参数的字典。\n\n###\
    \ 请求体\n\n在示例 7-5 中，让我们复制旧的示例 3-21。\n\n示例 7-5. FastAPI 请求体\n\n```\nfrom fastapi\
    \ import FastAPI\n\napp = FastAPI()\n\n@app.get(\"/hi\")\ndef greet(who):\n  \
    \  return f\"Hello? {who}?\"\n```\n\nFlask 版本如示例 7-6 所示。"
