    ```\n\nFor more examples, some alternative documentation is a bit more readable\
    \ than the official pages.\n\n# ORM\n\nAn ORM expresses queries in terms of domain\
    \ data models, not the relational tables and SQL logic at the base of the database\
    \ machinery. The official documentation goes into all the details. The ORM is\
    \ much more complex than the SQL expression language. Developers who prefer fully\
    \ object-oriented patterns usually prefer ORMs.\n\nMany books and articles on\
    \ FastAPI jump right into SQLAlchemy's ORM when they come to the database section.\
    \ I understand the appeal but also know that it requires you to learn another\
    \ abstraction. SQLAlchemy is an excellent package, but if its abstractions don't\
    \ always hold, then you have two problems. The simplest solution may be to just\
    \ use SQL, and move to the Expression Language or ORM if the SQL gets too hairy.\n\
    \n# SQLModel\n\nThe author of FastAPI combined aspects of FastAPI, Pydantic, and\
    \ SQLAlchemy to make SQLModel. It repurposes some development techniques from\
    \ the web world to relational databases. SQLModel matches SQLAlchemy's ORM with\
    \ Pydantic's data definition and validation."
  - '[PAGE 216]


    # SQLite


    I introduced SQLite in Chapter 10, using it for the Data layer examples. It’s
    public domain—you can’t get more open sourcey than that. SQLite is used in every
    browser and every smartphone, making it one of the most widely deployed software
    packages in the world. It’s often overlooked when choosing a relational database,
    but it’s possible that multiple SQLite “servers” could support some large services
    as well as a beefy server like PostgreSQL.


    # PostgreSQL


    In the early days of relational databases, IBM’s System R was the pioneer, and
    offshoots battled for the new market—mainly open source Ingres versus commercial
    Oracle. Ingres featured a query language named QUEL, and System R had SQL. Although
    QUEL was considered better than SQL by some, Oracle’s adoption of SQL as a standard,
    plus IBM’s influence, helped push Oracle and SQL to success.


    Years later, Michael Stonebraker returned to migrate Ingres to PostgreSQL. Nowadays,
    open source developers tend to choose PostgreSQL, although MySQL was popular a
    few years ago and is still around.


    # EdgeDB


    Despite the success of SQL over the years, it does have some design flaws that
    make queries awkward. Unlike the mathematical theory that SQL is based on (relational
    calculus by E. F. Codd), the SQL language design itself is not composable. Mainly,
    this means that it’s hard to nest queries within larger ones, leading to more
    complex and verbose code.


    So, just for fun, I’m throwing in a new relational database here. EdgeDB was written
    (in Python!) by the author of Python’s asyncio. It’s described as Post-SQL or
    graph-relational. Under the hood, it uses PostgreSQL to handle the tough system
    stuff. Edge’s contribution is EdgeQL: a new query language that aims to avoid
    those sharp SQL edges; it’s actually translated to SQL for PostgreSQL to execute.
    “My Experience with EdgeDB” by Ivan Daniluk handily compares EdgeQL and SQL. The
    readable illustrated official documentation parallels the book Dracula.


    Could EdgeQL spread beyond EdgeDB and become an alternative to SQL? Time will
    tell.'
  - '[PAGE 217]


    # Nonrelational (NoSQL) Databases


    Biggies in the open source NoSQL or NewSQL world are listed in Table 14-2.


    Table 14-2. NoSQL databases and Python drivers


    | Database | Python drivers |

    | :--- | :--- |

    | Redis | redis-py |

    | MongoDB | PyMongo, Motor |

    | Apache Cassandra | DataStax Driver for Apache Cassandra |

    | Elasticsearch | Python Elasticsearch Client |


    Sometimes *NoSQL* means literally *no SQL*, but sometimes *not only SQL*. Relational
    databases enforce structures on data, often visualized as rectangular tables with
    column fields and data rows, similar to spreadsheets. To reduce redundancy and
    improve performance, relational databases are *normalized* with *normal forms*
    (rules for data and structures), such as allowing only a single value per cell
    (row/column intersection).


    NoSQL databases relax these rules, sometimes allowing varying column/field types
    across individual data rows. Often the *schemas* (database designs) can be ragged
    structures, as you could express in JSON or Python, rather than relational boxes.


    # Redis


    *Redis* is a data structure server that runs completely in memory, although it
    can save to and restore from disk. It closely matches Python''s own data structures
    and has become extremely popular.


    # MongoDB


    *MongoDB* is sort of the PostgreSQL of NoSQL servers. A *collection* is the equivalent
    of a SQL table, and a *document* is the equivalent of a SQL table row. Another
    difference, and the main reason for a NoSQL database in the first place, is that
    you don''t need to define what a document looks like. In other words, there''s
    no fixed *schema*. A document is like a Python dictionary, with any string as
    a key.


    # Cassandra


    Cassandra is a large-scale database that can be distributed across hundreds of
    nodes. It''s written in Java.


    An alternative database called ScyllaDB is written in C++ and claims to be compatible
    with Cassandra but more performant.'
- md: "## Elasticsearch\n\nElasticsearch is more like a database index than a database\
    \ itself. It's often used for full-text search.\n\n## NoSQL Features in SQL Databases\n\
    \nAs noted previously, relational databases were traditionally normalized—constrained\
    \ to follow different levels of rules called *normal forms*. One basic rule was\
    \ that the value in each cell (row-column intersection) had to be a *scalar* (no\
    \ arrays or other structures).\n\nNoSQL (or *document*) databases supported JSON\
    \ directly and were usually your only choice if you had “uneven” or “ragged” data\
    \ structures. They were often *denormalized*: all the data needed for a document\
    \ was included with that document. In SQL, you often needed to *join* across tables\
    \ to build a full document.\n\nHowever, recent revisions of the SQL standard have\
    \ allowed JSON data to be stored in relational databases also. Some relational\
    \ databases now let you store complex (nonscalar) data in table cells, and even\
    \ search and index within them. JSON functions are supported in various ways for\
    \ SQLite, PostgreSQL, MySQL, Oracle, and others.\n\nSQL with JSON can be the best\
    \ of both worlds. SQL databases have been around much longer and have really useful\
    \ features such as foreign keys and secondary indexes. Also, SQL is fairly standardized\
    \ up to a point, and NoSQL query languages are all different.\n\nFinally, new\
    \ data design and query languages are trying to combine SQL and NoSQL advantages,\
    \ like EdgeQL that I mentioned earlier.\n\nSo, if you can't fit your data into\
    \ the rectangular relational box, look at a NoSQL database, a relational database\
    \ with JSON support, or a “Post-SQL” database.\n\n## Database Load Testing\n\n\
    This book is mainly about FastAPI, but websites are so frequently tied to databases.\n\
    \nThe data examples in this book have been tiny. To really stress-test a database,\
    \ millions of items would be great. Rather than think of things to add, it's easier\
    \ use a Python package like Faker. Faker can generate many kinds of data quickly—names,\
    \ places, or special types that you define.\n\nIn Example 14-3, Faker pumps out\
    \ names and countries, which are then loaded by load() into SQLite.\n\n### Example\
    \ 14-3. Load fake explorers in test_load.py\n\n```python\nfrom faker import Faker\n\
    from time import perf_counter\n\ndef load():\n    from error import Duplicate\n\
    \    from data.explorer import create\n    from model.explorer import Explorer\n\
    \n    f = Faker()\n    NUM = 100_000\n    t1 = perf_counter()\n    for row in\
    \ range(NUM):\n        try:\n            create(Explorer(name=f.name(),\n    \
    \            country=f.country(),\n                description=f.description))\n\
    \        except Duplicate:\n            pass\n    t2 = perf_counter()\n    print(NUM,\
    \ \"rows\")\n    print(\"write time:\", t2-t1)\n\ndef read_db():\n    from data.explorer\
    \ import get_all\n\n    t1 = perf_counter()\n    _ = get_all()\n    t2 = perf_counter()\n\
    \    print(\"db read time:\", t2-t1)\n\ndef read_api():\n    from fastapi.testclient\
    \ import TestClient\n    from main import app\n\n    t1 = perf_counter()\n   \
    \ client = TestClient(app)\n    _ = client.get(\"/explorer/\")\n    t2 = perf_counter()\n\
    \    print(\"api read time:\", t2-t1)\n\nload()\nread_db()\nread_db()\nread_api()\n\
    ```\n\nYou're catching the Duplicate exception in load() and ignoring it, because\
    \ Faker generates names from a limited list and is likely to repeat one now and\
    \ then. So the result may be less than 100,000 explorers loaded.\n\nAlso, you’re\
    \ calling read_db() twice, to remove any startup time as SQLite does the query.\
    \ Then read_api() timing should be fair. Example 14-4 fires it up.\n\n### Example\
    \ 14-4. Test database query performance\n\n```\n$ python test_load.py\n100000\
    \ rows\nwrite time: 14.868232927983627\ndb read time: 0.4025074450764805\ndb read\
    \ time: 0.39750714192632586\napi read time: 2.597553930943832\n```\n\nThe API\
    \ read time for all explorers was much slower than the Data layer’s read time.\
    \ Some of this is probably overhead from FastAPI’s conversion of the response\
    \ to JSON. Also, the initial write time to the database wasn’t very zippy. It\
    \ wrote one explorer at a time, because the Data layer API has a single create()\
    \ function, but not a create_many(); on the read side, the API can return one\
    \ (get_one()) or all (get_all()). So, if you ever want to do bulk loading, it\
    \ might be good to add a new Data load function and a new Web endpoint (with restricted\
    \ authorization).\n\nAlso, if you expect any table in your database to grow to\
    \ 100,000 rows, maybe you shouldn’t allow random users to get all of them in one\
    \ API call. Pagination would be useful, or a way to download a single CSV file\
    \ from the table.\n\n## Data Science and AI\n\nPython has become the most prominent\
    \ language in data science in general, and machine learning in particular. So\
    \ much data massaging is needed, and Python is good at that.\n\nSometimes developers\
    \ have used external tools like pandas to do the data manipulation that’s too\
    \ tricky in SQL.\n\nPyTorch is one of the most popular ML tools, because it leverages\
    \ Python’s strengths in data manipulation. The underlying computations may be\
    \ in C or C++ for speed, but Python or Go are well-suited for the “higher” data-integration\
    \ tasks. (The Mojo language, a superset of Python, may handle both the high and\
    \ low ends if it succeeds as planned. Although a general-purpose language, it\
    \ specifically addresses some of the current complexity in AI development.)\n\n\
    A new Python tool called Chroma is a database, similar to SQLite, but tailored\
    \ to machine learning, specifically large language models (LLMs). Read the Getting\
    \ Started page to, you know, get started.\n\nAlthough AI development is complex\
    \ and moving fast, you can try out some AI with Python on your own machine without\
    \ spending the megabucks that were behind GPT-4 and ChatGPT. Let's build a small\
    \ FastAPI web interface to a small AI model.\n\n![AI Model Diagram](img/1d00ed3e85bc756220a3f1a1e9a9664f_221_0.png)\n\
    \n*Model* has different meanings in AI and Pydantic/FastAPI. In Pydantic, a model\
    \ is a Python class that bundles related data fields. AI models cover a broad\
    \ range of techniques for determining patterns in data.\n\n**Hugging Face** provides\
    \ free AI models, datasets, and Python code to use them. First, install PyTorch\
    \ and Hugging Face code:\n\n```\n$ pip install torch torchvision\n$ pip install\
    \ transformers\n```\n\n**Example 14-5** shows a FastAPI application that uses\
    \ Hugging Face's transformers module to access a pretrained mid-sized open source\
    \ machine language model and try to answer your prompts. (This was adapted from\
    \ a command-line example on the YouTube channel CodeToTheMoon.)\n\n### Example\
    \ 14-5. Top-level LLM test (ai.py)\n\n```python\nfrom fastapi import FastAPI\n\
    \napp = FastAPI()\n\nfrom transformers import (AutoTokenizer,\n    AutoModelForSeq2SeqLM,\
    \ GenerationConfig)\nmodel_name = \"google/flan-t5-base\"\ntokenizer = AutoTokenizer.from_pretrained(model_name)\n\
    model = AutoModelForSeq2SeqLM.from_pretrained(model_name)\nconfig = GenerationConfig(max_new_tokens=200)\n\
    \n@app.get(\"/ai\")\ndef prompt(line: str) -> str:\n    tokens = tokenizer(line,\
    \ return_tensors=\"pt\")\n    outputs = model.generate(**tokens,\n        generator_config=config)\n\
    \    result = tokenizer.batch_decode(outputs,\n        skip_special_tokens=True)\n\
    \    return result[0]\n```\n\nRun this with uvicorn ai:app (as always, first make\
    \ sure you don't have another web server still running on localhost, port 8000).\
    \ Feed the /ai endpoint questions and get answers, like this (note the double\
    \ == for an HTTPie query parameter):\n\n```\n$ http -b localhost:8000/ai line==\"\
    What are you?\"\n\"a sailor\"\n```\n\nThis is a fairly small model, and as you\
    \ can see, it doesn't answer questions especially well. I tried other prompts\
    \ (line arguments) and got equally noteworthy answers:\n\n- Q: Are cats better\
    \ than dogs?\n- A: No\n- Q: What does bigfoot eat for breakfast?\n- A: A squid\n\
    - Q: Who comes down the chimney?\n- A: A squealing pig\n- Q: What group was John\
    \ Cleese in?\n- A: The Beatles\n- Q: What has nasty pointy teeth?\n- A: A teddy\
    \ bear\n\nThese questions may get different answers at different times! Once the\
    \ same endpoint said that Bigfoot eats sand for breakfast. In AI-speak, answers\
    \ like this are called *hallucinations*. You can get better answers by using a\
    \ larger model, like google/flan-75-xl, but it will take longer to download model\
    \ data and respond on a personal computer. And of course, models like ChatGPT\
    \ were trained on all the data they could find (using every CPU, GPU, TPU, and\
    \ any other kind of PU), and will give excellent answers.\n\n## Review\n\nThis\
    \ chapter expanded on the use of SQLite we went over in Chapter 10 to other SQL\
    \ databases, and even NoSQL ones. It also showed how some SQL databases can do\
    \ NoSQL tricks with JSON support. Finally, it talked about the uses of database\
    \ and special data tools that have become more important as machine learning continues\
    \ its explosive growth."
  mdcn: "## Elasticsearch\n\nElasticsearch 更像是一个数据库索引，而非数据库本身。它通常用于全文搜索。\n\n## SQL\
    \ 数据库中的 NoSQL 特性\n\n如前所述，关系型数据库传统上是规范化的——被约束以遵循称为*范式*的不同级别规则。一个基本规则是每个单元格（行与列的交点）中的值必须是*标量*（不能是数组或其他结构）。\n\
    \nNoSQL（或*文档*）数据库直接支持 JSON，并且如果你的数据结构“不均匀”或“参差不齐”，它们通常是你唯一的选择。它们通常是*反规范化*的：文档所需的所有数据都包含在该文档中。在\
    \ SQL 中，你通常需要跨表*连接*才能构建完整的文档。\n\n然而，最近的 SQL 标准修订也允许在关系型数据库中存储 JSON 数据。一些关系型数据库现在允许你在表单元格中存储复杂（非标量）数据，甚至可以在其中进行搜索和索引。SQLite、PostgreSQL、MySQL、Oracle\
    \ 等都以各种方式支持 JSON 函数。\n\n带有 JSON 的 SQL 可以兼得两者之长。SQL 数据库存在的时间要长得多，并且具有非常有用的功能，如外键和二级索引。此外，SQL\
    \ 在某种程度上相当标准化，而 NoSQL 查询语言则各不相同。\n\n最后，新的数据设计和查询语言试图结合 SQL 和 NoSQL 的优势，比如我之前提到的\
    \ EdgeQL。\n\n因此，如果你无法将数据放入矩形的关系型盒子中，可以考虑使用 NoSQL 数据库、支持 JSON 的关系型数据库，或“后 SQL”数据库。\n\
    \n## 数据库负载测试\n\n本书主要关于 FastAPI，但网站经常与数据库紧密相连。\n\n本书中的数据示例都很小。要真正对数据库进行压力测试，数百万条数据会更好。与其费心去想添加什么数据，不如使用像\
    \ Faker 这样的 Python 包更容易。Faker 可以快速生成多种数据——姓名、地点或你定义的特殊类型。\n\n在示例 14-3 中，Faker\
    \ 生成姓名和国家，然后由 load() 加载到 SQLite 中。\n\n### 示例 14-3. 在 test_load.py 中加载假探险家数据\n\n\
    ```python\nfrom faker import Faker\nfrom time import perf_counter\n\ndef load():\n\
    \    from error import Duplicate\n    from data.explorer import create\n    from\
    \ model.explorer import Explorer\n\n    f = Faker()\n    NUM = 100_000\n    t1\
    \ = perf_counter()\n    for row in range(NUM):\n        try:\n            create(Explorer(name=f.name(),\n\
    \                country=f.country(),\n                description=f.description))\n\
    \        except Duplicate:\n            pass\n    t2 = perf_counter()\n    print(NUM,\
    \ \"rows\")\n    print(\"write time:\", t2-t1)\n\ndef read_db():\n    from data.explorer\
    \ import get_all\n\n    t1 = perf_counter()\n    _ = get_all()\n    t2 = perf_counter()\n\
    \    print(\"db read time:\", t2-t1)\n\ndef read_api():\n    from fastapi.testclient\
    \ import TestClient\n    from main import app\n\n    t1 = perf_counter()\n   \
    \ client = TestClient(app)\n    _ = client.get(\"/explorer/\")\n    t2 = perf_counter()\n\
    \    print(\"api read time:\", t2-t1)\n\nload()\nread_db()\nread_db()\nread_api()\n\
    ```\n\n你在 load() 中捕获了 Duplicate 异常并忽略它，因为 Faker 从一个有限的列表中生成姓名，很可能会偶尔重复。因此，最终加载的探险家数量可能少于\
    \ 100,000。\n\n此外，你调用了两次 read_db()，以消除 SQLite 执行查询时的任何启动时间。这样 read_api() 的计时应该更公平。示例\
    \ 14-4 运行了它。\n\n### 示例 14-4. 测试数据库查询性能\n\n```\n$ python test_load.py\n100000 rows\n\
    write time: 14.868232927983627\ndb read time: 0.4025074450764805\ndb read time:\
    \ 0.39750714192632586\napi read time: 2.597553930943832\n```\n\nAPI 读取所有探险家的时间比数据层的读取时间慢得多。其中一部分可能是\
    \ FastAPI 将响应转换为 JSON 的开销。此外，初始写入数据库的时间也不是很快。它一次写入一个探险家，因为数据层 API 只有一个 create()\
    \ 函数，而没有 create_many()；在读取方面，API 可以返回一个（get_one()）或所有（get_all()）。因此，如果你需要进行批量加载，最好添加一个新的数据加载函数和一个新的\
    \ Web 端点（并设置权限限制）。\n\n另外，如果你预计数据库中的任何表会增长到 100,000 行，也许你不应该允许随机用户通过一次 API 调用获取所有数据。分页会很有用，或者提供一种从表中下载单个\
    \ CSV 文件的方式。\n\n## 数据科学与人工智能\n\nPython 已经成为数据科学领域，尤其是机器学习领域最突出的语言。需要大量的数据处理，而\
    \ Python 擅长此道。\n\n有时开发者会使用像 pandas 这样的外部工具来处理在 SQL 中过于棘手的数据操作。\n\nPyTorch 是最受欢迎的机器学习工具之一，因为它利用了\
    \ Python 在数据操作方面的优势。底层的计算可能是用 C 或 C++ 编写的以提高速度，但 Python 或 Go 非常适合“更高层”的数据集成任务。（Mojo\
    \ 语言，作为 Python 的超集，如果按计划成功，可能同时处理高端和低端任务。虽然是一种通用语言，但它专门解决当前 AI 开发中的一些复杂性。）\n\n\
    一个名为 Chroma 的新 Python 工具是一个数据库，类似于 SQLite，但专为机器学习量身定制，特别是大型语言模型（LLM）。阅读入门页面，你知道的，开始吧。\n\
    \n尽管 AI 开发复杂且发展迅速，你可以尝试在自己的机器上使用 Python 运行一些 AI，而无需花费支撑 GPT-4 和 ChatGPT 的巨额资金。让我们为一个小型\
    \ AI 模型构建一个小型的 FastAPI Web 界面。\n\n![AI 模型图](img/1d00ed3e85bc756220a3f1a1e9a9664f_221_0.png)\n\
    \n*模型*在 AI 和 Pydantic/FastAPI 中有不同的含义。在 Pydantic 中，模型是一个捆绑相关数据字段的 Python 类。AI\
    \ 模型涵盖了用于确定数据模式的广泛技术。\n\n**Hugging Face** 提供免费的 AI 模型、数据集和使用它们的 Python 代码。首先，安装\
    \ PyTorch 和 Hugging Face 代码：\n\n```\n$ pip install torch torchvision\n$ pip install\
    \ transformers\n```\n\n**示例 14-5** 展示了一个 FastAPI 应用程序，它使用 Hugging Face 的 transformers\
    \ 模块来访问一个预训练的中型开源机器语言模型，并尝试回答你的提示。（这改编自 YouTube 频道 CodeToTheMoon 上的一个命令行示例。）\n\
    \n### 示例 14-5. 顶层 LLM 测试 (ai.py)\n\n```python\nfrom fastapi import FastAPI\n\n\
    app = FastAPI()\n\nfrom transformers import (AutoTokenizer,\n    AutoModelForSeq2SeqLM,\
    \ GenerationConfig)\nmodel_name = \"google/flan-t5-base\"\ntokenizer = AutoTokenizer.from_pretrained(model_name)\n\
    model = AutoModelForSeq2SeqLM.from_pretrained(model_name)\nconfig = GenerationConfig(max_new_tokens=200)\n\
    \n@app.get(\"/ai\")\ndef prompt(line: str) -> str:\n    tokens = tokenizer(line,\
    \ return_tensors=\"pt\")\n    outputs = model.generate(**tokens,\n        generator_config=config)\n\
    \    result = tokenizer.batch_decode(outputs,\n        skip_special_tokens=True)\n\
    \    return result[0]\n```\n\n使用 uvicorn ai:app 运行它（一如既往，首先确保没有其他 Web 服务器在 localhost\
    \ 的 8000 端口上运行）。向 /ai 端点提问并获取答案，像这样（注意 HTTPie 查询参数使用双等号 ==）：\n\n```\n$ http -b\
    \ localhost:8000/ai line==\"What are you?\"\n\"a sailor\"\n```\n\n这是一个相当小的模型，如你所见，它回答问题的效果不是特别好。我尝试了其他提示（line\
    \ 参数），得到了同样值得注意的答案：\n\n- 问：猫比狗好吗？\n- 答：不\n- 问：大脚怪早餐吃什么？\n- 答：一只鱿鱼\n- 问：谁从烟囱下来？\n\
    - 答：一只尖叫的猪\n- 问：约翰·克里斯属于哪个团体？\n- 答：披头士乐队\n- 问：什么有难看的尖牙？\n- 答：一只泰迪熊\n\n这些问题在不同时间可能会得到不同的答案！有一次，同一个端点说大脚怪早餐吃沙子。在\
    \ AI 术语中，这样的答案被称为*幻觉*。你可以通过使用更大的模型（如 google/flan-75-xl）来获得更好的答案，但它在个人计算机上下载模型数据和响应的时间会更长。当然，像\
    \ ChatGPT 这样的模型是在它们能找到的所有数据上训练的（使用了每一个 CPU、GPU、TPU 和任何其他类型的 PU），并且会给出优秀的答案。\n\n\
    ## 复习\n\n本章扩展了我们在第 10 章讨论的 SQLite 的使用，涵盖了其他 SQL 数据库，甚至 NoSQL 数据库。它还展示了一些 SQL 数据库如何通过\
    \ JSON 支持实现 NoSQL 的技巧。最后，它讨论了数据库和特殊数据工具的用途，随着机器学习持续爆炸式增长，这些工具变得越来越重要。"
