  - "[PAGE 229]\n\nFor this example, let's make a directory of (boring) free files\
    \ for users to download:\n\n+   - Make a directory called *static*, at the same\
    \ level as *main.py*. (This can have any name; I'm calling it *static* only to\
    \ help remember why I made it.)\n- Put a text file called *abc.txt* in it, with\
    \ the text contents abc :).\n\nExample 15-12 will serve any URL that starts with\
    \ */static* (you could also have used any text string here) with files from the\
    \ *static* directory.\n\nExample 15-12. Serve everything in a directory with *StaticFiles*\
    \ (add to *main.py*)\n\n```\nfrom pathlib import Path\nfrom fastapi import FastAPI\n\
    from fastapi.staticfiles import StaticFiles\n\n# Directory containing main.py:\n\
    top = Path(__file__).resolve.parent\n\napp.mount(\"/static\",\n    StaticFiles(directory=f\"\
    {top}/static\", html=True),\n    name=\"free\")\n```\n\nThat *top* calculation\
    \ ensures that you put *static* alongside *main.py*. The `__file__` variable is\
    \ the full pathname of this file (*main.py*).\n\nExample 15-13 is one way to manually\
    \ test Example 15-12.\n\nExample 15-13. Get a static file\n\n```\n$ http -b localhost:8000/static/abc.txt\n\
    abc :)\n```\n\nWhat about that `html=True` argument that you passed to `StaticFiles()`?\
    \ That makes it work a little more like a traditional server, returning an *index.html*\
    \ file if one exists in that directory, but you didn't ask for *index.html* explicitly\
    \ in the URL. So, let's create an *index.html* file in the *static* directory\
    \ with the contents Oh. Hi!, and then test with Example 15-14.\n\nExample 15-14.\
    \ Get an *index.html* file from */static*\n\n```\n$ http -b localhost:8000/static/\n\
    Oh. Hi!\n```"
- md: "You can have as many files (and subdirectories with files, etc.) as you want.\
    \ Make a subdirectory *xyz* under *static* and put two files there:\n\n*xyx.txt*\n\
    \    Contains the text xyz :(.\n\n*index.html*\n    Contains the text How did\
    \ you find me?\n\nI won't include the examples here. Try them yourself, with I\
    \ hope more naming imagination.\n\n## Review\n\nThis chapter showed how to upload\
    \ and download files—small, large, even gigantiferous. Plus, you learned how to\
    \ serve *static files* in nostalgic (non-API) web style from a directory.\n\n\
    # CHAPTER 16\nForms and Templates\n\n## Preview\n\nAlthough the *API* in *FastAPI*\
    \ is a hint of its main focus, FastAPI can also handle traditional web content.\
    \ This chapter talks about standard HTML forms and templates for inserting data\
    \ into HTML.\n\n## Forms\n\nAs you've seen, FastAPI was mainly designed to build\
    \ APIs, and its default input is JSON. But that doesn't mean that it can't serve\
    \ standard banana HTML, forms, and friends.\n\nFastAPI supports data from HTML\
    \ forms much as it does from other sources like Query and Path, using the Form\
    \ dependency.\n\nYou'll need the package Python-Multipart for any FastAPI forms\
    \ work, so run pip install python-multipart if you need to. Also, the *static*\
    \ directory from Chapter 15 will be needed to house the test forms in this chapter.\n\
    \nLet's redo Example 3-11, but provide the who value via a form instead of a JSON\
    \ string. (Call this path function greet2() to avoid clobbering the old greet()\
    \ path function if it's still around.) Add Example 16-1 to *main.py*.\n\nExample\
    \ 16-1. Get a value from a GET form\n\n```\nfrom fastapi import FastAPI, Form\n\
    \napp = FastAPI()\n\n@app.get(\"/who2\")\ndef greet2(name: str = Form()):\n  \
    \  return f\"Hello, {name}?\"\n```\n\nThe main difference is that the value comes\
    \ from Form instead of Path, Query, and the others from Chapter 3.\n\nTry an initial\
    \ form test with HTTPie in Example 16-2 (you need that -f to upload with form\
    \ encoding rather than as JSON).\n\nExample 16-2. Form GET request with HTTPie\n\
    \n```\n$ http -f -b GET localhost:8000/who2 name=\"Bob Frapples\"\n\"Hello, Bob\
    \ Frapples?\"\n```\n\nYou could also send a request from a standard HTML form\
    \ file. Chapter 15 showed how to make a directory called static (accessed under\
    \ the URL /static) that could house anything, including HTML files, so in Example\
    \ 16-3, let's put this file (form1.html) there.\n\nExample 16-3. Form GET request\
    \ (static/form1.html)\n\n```\n<form action=\"http://localhost:8000/who2\" method=\"\
    get\">\nSay hello to my little friend:\n<input type=\"text\" name=\"name\" value=\"\
    Bob Frapples\">\n<input type=\"submit\">\n</form>\n```\n\nIf you ask your browser\
    \ to load http://localhost:8000/static/form1.html, you'll see a form. If you fill\
    \ in any test string, you'll get this back:\n\n```\n\"detail\":[{\"loc\":[\"body\"\
    ,\"name\"],\n            \"msg\":\"field required\",\n            \"type\":\"\
    value_error.missing\"}]\n```\n\nHuh?\n\nLook at the window where Uvicorn is running\
    \ to see what its log says:\n\n```\nINFO:     127.0.0.1:63502 -\n          \"\
    GET /who2?name=rr23r23 HTTP/1.1\"\n422 Unprocessable Entity\n```\n\nWhy did this\
    \ form send name as a query parameter when we had it in a form field? That turns\
    \ out to be an HTML weirdness, documented on the W3C website. Also, if you had\
    \ any query parameters in your URL, it will erase them and replace them with name.\n\
    \nSo, why did HTTPie handle it as expected? I don't know. It's an inconsistency\
    \ to be aware of.\n\nThe official HTML incantation is to change the action from\
    \ a GET to a POST. So let's add a POST endpoint for /who2 to main.py in Example\
    \ 16-4.\n\nExample 16-4. Get a value from a POST form\n\n```\nfrom fastapi import\
    \ FastAPI, Form\n\napp = FastAPI()\n\n@app.post(\"/who2\")\ndef greet3(name: str\
    \ = Form()):\n    return f\"Hello, {name}?\"\n```\n\nExample 16-5 is stuff/form2.html,\
    \ with get changed to post.\n\nExample 16-5. Form POST request (static/form2.html)\n\
    \n```\n<form action=\"http://localhost:8000/who2\" method=\"post\">\nSay hello\
    \ to my little friend:\n<input type=\"text\" name=\"name\">\n<input type=\"submit\"\
    >\n</form>\n```\n\nAsk your browser to get off its digital haunches and get this\
    \ new form for you. Fill in **Bob Frapples** and submit the form. This time, you'll\
    \ get the result that you got from HTTPie:\n\n> \"Hello, Bob Frapples?\"\n\nSo,\
    \ if you're submitting forms from HTML files, use POST.\n\n## Templates\n\nYou\
    \ may have seen the word game *Mad Libs*. You ask people to provide a sequence\
    \ of words—nouns, verbs, or something more specific—and you enter them into labeled\
    \ places in a page of text. Once you have all the words, you read the text with\
    \ the inserted values, and hilarity ensues, sometimes with embarrassment.\n\n\
    Well, a web *template* is similar, though usually without the embarrassment. A\
    \ template contains a bunch of text with slots for data to be inserted by the\
    \ server. Its usual purpose is to generate HTML with variable content, unlike\
    \ the *static* HTML of Chapter 15.\n\nUsers of Flask are very familiar with its\
    \ companion project, the template engine Jinja (also often called *Jinja2*). FastAPI\
    \ supports Jinja, as well as other template engines.\n\nMake a directory called\
    \ *template* alongside *main.py* to house Jinja-enhanced HTML files. Inside, make\
    \ a file called *list.html*, as in Example 16-6.\n\nExample 16-6. Define a template\
    \ file (template/list.html)\n\n```\n<html>\n<table bgcolor=\"#eeeeee\">\n  <tr>\n\
    \    <th colspan=3>Creatures</th>\n  </tr>\n  <tr>\n    <th>Name</th>\n    <th>Description</th>\n\
    \    <th>Country</th>\n    <th>Area</th>\n    <th>AKA</th>\n  </tr>\n  {% for\
    \ creature in creatures: %}\n  <tr>\n    <td>{{ creature.name }}</td>\n    <td>{{\
    \ creature.description }}</td>\n    <td>{{ creature.country }}</td>\n    <td>{{\
    \ creature.area }}</td>\n    <td>{{ creature.aka }}</td>\n  </tr>\n  {% endfor\
    \ %}\n</table>\n\n<br>\n\n<table bgcolor=\"#dddddd\">\n  <tr>\n    <th colspan=2>Explorers</th>\n\
    \  </tr>\n  <tr>\n    <th>Name</th>\n    <th>Country</th>\n    <th>Description</th>\n\
    \  </tr>\n  {% for explorer in explorers: %}\n  <tr>\n    <td>{{ explorer.name\
    \ }}</td>\n    <td>{{ explorer.country }}</td>\n    <td>{{ explorer.description\
    \ }}</td>\n  </tr>\n  {% endfor %}\n</table>\n</html>\n```\n\nI don't care how\
    \ it looks, so there's no CSS, just the ancient pre-CSS bgcolor table attribute\
    \ to distinguish the two tables.\n\nDouble curly braces enclose Python variables\
    \ that should be inserted, and {% and %} enclose if statements, for loops, and\
    \ other controls. See the Jinja documentation for the syntax and examples.\n\n\
    This template expects to be passed Python variables called creatures and explorers,\
    \ which are lists of Creature and Explorer objects.\n\nExample 16-7 shows what\
    \ to add to *main.py* to set up templates and use the one from Example 16-6. It\
    \ feeds creatures and explorers to the template, using modules under the *fake*\
    \ directory from previous chapters, which provided test data if the database was\
    \ empty or not connected.\n\nExample 16-7. Configure templates and use one (main.py)\n\
    \n```\nfrom pathlib import Path\nfrom fastapi import FastAPI, Request\nfrom fastapi.templating\
    \ import Jinja2Templates\n\napp = FastAPI()\n\ntop = Path(__file__).resolve().parent\n\
    \ntemplate_obj = Jinja2Templates(directory=f\"{top}/template\")\n\n# Get some\
    \ small predefined lists of our buddies:\nfrom fake.creature import fakes as fake_creatures\n\
    from fake.explorer import fakes as fake_explorers\n\n@app.get(\"/list\")\ndef\
    \ explorer_list(request: Request):\n    return template_obj.TemplateResponse(\"\
    list.html\",\n        {\"request\": request,\n        \"explorers\": fake_explorers,\n\
    \        \"creatures\": fake_creatures})\n```\n\nAsk your favorite browser, or\
    \ even one that you don't like very well, for *http://localhost:8000/list*, and\
    \ you should get Figure 16-1 back.\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_236_0.png)\n\
    \nFigure 16-1. Output from /list\n\n## Review\n\nThis chapter was a quick overview\
    \ of how FastAPI handles non-API topics like forms and templates. Along with the\
    \ previous chapter on files, these are traditional bread-and-butter web tasks\
    \ that you'll encounter often.\n\n# CHAPTER 17\n\n## Data Discovery and Visualization\n\
    \n### Preview\n\nAlthough FastAPI does have *API* in its name, it can serve more\
    \ things than APIs. This chapter shows you how to generate tables, plots, graphs,\
    \ and maps from data, using a small database of imaginary creatures from around\
    \ the world.\n\n### Python and Data\n\nPython has become very popular in the last\
    \ few years for many reasons:\n\n- Ease of learning\n- Clean syntax\n- Rich standard\
    \ library\n- Huge number of high-quality third-party packages\n- Special emphasis\
    \ on data manipulation, conversion, and introspection\n\nThe last point has always\
    \ been relevant for traditional ETL tasks for database creation. A nonprofit group\
    \ called PyData even organizes conferences and develops tools for open source\
    \ data analysis with Python. The popularity of Python also reflects the recent\
    \ surge in AI and the need for tools to prepare the data that feeds AI models.\n\
    \nIn this chapter, we'll try some Python data packages and see how they relate\
    \ to modern Python web development and FastAPI."
  mdcn: "你可以拥有任意数量的文件（以及包含文件的子目录等）。在 *static* 下创建一个名为 *xyz* 的子目录，并在其中放入两个文件：\n\n*xyx.txt*\n\
