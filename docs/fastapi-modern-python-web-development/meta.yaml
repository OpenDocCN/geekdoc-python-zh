    ```\n\n在接下来的部分中，我们将向*main.py*添加更多端点。\n\n## 请求\n\nHTTP请求由文本*头部*后跟一个或多个*主体*部分组成。你可以编写自己的代码将HTTP解析为Python数据结构，但你不会是第一个这样做的人。在你的Web应用程序中，让框架为你处理这些细节会更高效。\n\
