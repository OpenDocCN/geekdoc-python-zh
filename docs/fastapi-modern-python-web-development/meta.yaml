  md: "In addition, Python's *import* logic doesn't work strictly with directory hierarchies.\
    \ It relies on Python *packages* and *modules*. The *.py* files listed in the\
    \ tree structure described previously are Python modules (source files). Their\
    \ parent directories are packages *if* they contain an `__init__.py` file. (This\
    \ is a convention to tell Python whether, if you have a directory called `sys`\
    \ and you type `import sys`, you actually want the system one or your local one.)\n\
    \nPython programs can import packages and modules. The Python interpreter has\
    \ a built-in `sys.path` variable, which includes the location of the standard\
    \ Python code. The environment variable `PYTHONPATH` is an empty or colon-separated\
    \ string of directory names that tells Python which parent directories to check\
    \ before `sys.path` to find the imported modules or packages. So, if you change\
    \ to your new *fastapi* directory, type this (on Linux or macOS) to ensure that\
    \ the new code under it will be checked first when importing:\n\n```\n$ export\
    \ PYTHONPATH=$PWD/src\n```\n\nThat `$PWD` means *print working directory*, and\
    \ saves you from typing the full path to your *fastapi* directory, although you\
    \ can if you want. And the `src` part means to look only in there for modules\
    \ and packages to import.\n\nTo set the `PWD` environment variable under Windows,\
    \ see \"Excursus: Setting Environment Variables\" at the Python Software Foundation\
    \ site.\n\nWhew.\n\n# The First Website Code\n\nThis section discusses how to\
    \ use FastAPI to write requests and responses for a RESTful API site. Then, we'll\
    \ begin to apply these to our actual, increasingly gnarly, site.\n\nLet's begin\
    \ with Example 8-1. Within *src*, make this new top-level *main.py* program that\
    \ will start the Uvicorn program and FastAPI package.\n\nExample 8-1. The main\
    \ program, main.py\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n\
    @app.get(\"/\")\ndef top():\n    return \"top here\"\n```"
