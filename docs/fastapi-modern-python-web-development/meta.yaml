    \n# 第 6 章 依赖项\n\n## 预览\n\nFastAPI 一个非常出色的设计特性是一种称为*依赖注入*的技术。这个术语听起来很专业且深奥，但它是\
    \ FastAPI 的一个关键方面，并且在许多层面上都非常有用。本章将探讨 FastAPI 的内置功能以及如何编写自己的依赖项。\n\n## 什么是依赖项？\n\
    \n*依赖项*是你在某个时刻需要的特定信息。获取此信息的通常方式是在需要时编写代码来获取它。\n\n当你编写 Web 服务时，在某个时间点你可能需要执行以下操作：\n\
