  md: "You can return data types other than the default JSON from a FastAPI path function\
    \ in different ways. One method is to use the `response_model` argument in the\
    \ path decorator to goose FastAPI to return something else. FastAPI will drop\
    \ any fields that were in the object that you returned but are not in the object\
    \ specified by `response_model`.\n\nIn Example 3-34, pretend that you wrote a\
    \ new service module called `service/tag.py` with the `create()` and `get()` functions\
    \ that give this web module something to call. Those lower-stack details don't\
    \ matter here. The important point is the `get_one()` path function at the bottom,\
    \ and the `response_model=TagOut` in its path decorator. That automatically changes\
    \ an internal `Tag` object to a sanitized `TagOut` object.\n\nExample 3-34. Return\
    \ a different response type with `response_model` (web/tag.py)\n\n```\nimport\
    \ datetime\nfrom model.tag import TagIn, Tag, TagOut\nimport service.tag as service\n\
    \n@app.post('/')\ndef create(tag_in: TagIn) -> TagIn:\n    tag: Tag = Tag(tag=tag_in.tag,\
    \ created=datetime.utcnow(),\n                   secret=\"shhhh\")\n    service.create(tag)\n\
    \    return tag_in\n\n@app.get('/{tag_str}', response_model=TagOut)\ndef get_one(tag_str:\
    \ str) -> TagOut:\n    tag: Tag = service.get(tag_str)\n    return tag\n```\n\n\
    Even though we returned a `Tag`, `response_model` will convert it to a `TagOut`.\n\
    \n# Automated Documentation\n\nThis section assumes that you're running the web\
