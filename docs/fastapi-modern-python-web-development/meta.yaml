  md: 'What can the server do with this hard-won authentication information? The server
    can do the following:


    +   - Generate metrics (this user, this endpoint, this time) to help study what''s
    being viewed, by whom, for how long, and so on.

    - Save user-specific information.


    # JWT


    This section contains some details on the JWT. You really don''t need them to
    use all the earlier code in this chapter, but if you''re a little curious...


    A JWT is an encoding scheme, not an authentication method. The low-level details
    are defined in RFC 7519. It can be used to convey authentication information for
    OAuth2 (and other methods), and I''ll show that here.


    A JWT is a readable string with three dot-separated sections:


    +   - Header: Encryption algorithm used, and token type

    - Payload: ...

    - Signature: ...


    Each section consists of a JSON string, encoded in Base 64 URL format. Here''s
    an example (which has been split at the dots to fit on this page):


    ```

    eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.

    eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.

    SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c

    ```


    As a plain ASCII string that''s also safe to use in URLs, it can be passed to
    web servers as part of the URL, a query parameter, HTTP header, cookie, and so
    on.


    JWT avoids a database lookup, but this also means that you can''t detect a revoked
    authorization directly.


    # Third-Party Authentication: OIDC


    You''ll often see websites that let you log in with an ID and password, or let
    you log in via your account at a different site, like Google, Facebook/Meta, LinkedIn,
    or many others. These frequently use a standard called OpenID Connect (OIDC),
    which is built atop OAuth2. When you connect to an external OIDC-enabled site,
    you''ll get back an OAuth2 access token (as in the examples in this chapter),
    but also an ID token.'
