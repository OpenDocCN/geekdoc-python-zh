    # CHAPTER 13

    Production


    > If builders built buildings the way programmers wrote programs, the first woodpecker
    that came along would destroy civilization.

    —Gerald Weinberg, computer scientist


    # Preview


    You have an application running on your local machine, and now you''d like to
    share it. This chapter presents many scenarios on how to move your application
    to production, and keep it running correctly and efficiently. Because some of
    the details can be very detailed, in some cases I''ll refer to helpful external
    documents rather than stuffing them in here.


    # Deployment


    All the code examples in this book so far have used a single instance of uvicorn
    running on localhost, port 8000. To handle lots of traffic, you want multiple
    servers, running on the multiple cores that modern hardware provides. You''ll
    also need something above these servers to do the following:


    +   - Keep them running (a supervisor)

    - Gather and feed external requests (a reverse proxy)

    - Return responses

    - Provide HTTPS termination (SSL decryption)'
