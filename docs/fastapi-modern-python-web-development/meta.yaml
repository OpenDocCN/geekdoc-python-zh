    \ 以获取自动的 mocker fixture；你将在本章后面看到这个。\n\npytest 提供了什么？不错的自动功能包括以下内容：\n\n- *测试发现*：Python\
    \ 文件名中的测试前缀或测试后缀将被自动运行。这种文件名匹配会深入到子目录，执行你拥有的所有测试。\n- *断言失败详情*：失败的 `assert` 语句会打印预期的内容和实际发生的内容。\n\
    - *Fixtures*：这些函数可以为整个测试脚本运行一次，也可以为每个测试运行（其作用域），为测试函数提供参数，如标准测试数据或数据库初始化。Fixtures\
    \ 是一种依赖注入，就像 FastAPI 为 Web 路径函数提供的那样：将特定数据传递给通用测试函数。\n- *参数化*：这为测试函数提供多个测试数据。\n\
    \n## 布局\n\n你应该把测试放在哪里？似乎没有广泛的共识，但这里有两个合理的设计：\n\n- 在顶层有一个测试目录，为被测试的代码区域（如 web、service\
    \ 等）设置子目录。\n- 在每个代码目录（如 web、service 等）下有一个测试目录。\n\n另外，在像 test/web 这样的特定子目录中，是否应该为不同的测试类型（如单元、集成和完整）创建更多目录？在本书中，我使用这种层次结构：\n\
    \n```\ntest\n├── unit\n│   ├── web\n│   ├── service\n│   └── data\n├── integration\n\
    └── full\n```\n\n各个测试脚本位于最底层的目录中。这些内容在本章中。\n\n## 自动化单元测试\n\n单元测试应该在单层内检查一件事。这通常意味着向函数传递参数并断言应该返回的内容。\n\
    单元测试要求被测试的代码是隔离的。如果不是，你也在测试其他东西。那么，如何为单元测试隔离代码呢？\n\n## Mocking\n\n在本书的代码栈中，通过\
    \ Web API 访问 URL 通常会调用 Web 层中的一个函数，该函数调用 Service 层中的一个函数，该函数又调用 Data 层中的一个函数，该函数访问数据库。结果沿着链向上流动，最终从\
    \ Web 层返回给调用者。\n\n单元测试听起来很简单。对于代码库中的每个函数，传入测试参数并确认它返回预期的值。这对于*纯函数*来说效果很好：一个接受输入参数并返回响应，而不引用任何外部代码的函数。但大多数函数也会调用其他函数，那么如何控制这些其他函数的行为呢？来自这些外部源的数据怎么办？需要控制的最常见的外部因素是数据库访问，但实际上它可以是任何东西。\n\
    \n一种方法是*模拟*每个外部函数调用。因为函数在 Python 中是一等对象，你可以用一个函数替换另一个函数。unittest 包有一个 mock 模块可以做到这一点。\n\
    \n许多开发者认为 mock 是隔离单元测试的最佳方式。我将首先在这里展示 mock 的示例，以及一个论点，即 mock 通常需要太多关于你的代码*如何*工作的知识，而不是结果。你可能会听到*结构测试*（如\
    \ mock，被测试的代码相当可见）和*行为测试*（不需要代码内部细节）这些术语。\n\n示例 12-1 和 12-2 定义了模块 *mod1.py* 和\
    \ *mod2.py*。\n\n**示例 12-1. 被调用模块 (mod1.py)**\n\n```python\ndef preamble() -> str:\n\
    \    return \"The sum is \"\n```\n\n**示例 12-2. 调用模块 (mod2.py)**\n\n```python\n\
    import mod1\n\ndef summer(x: int, y:int) -> str:\n    return mod1.preamble() +\
    \ f\"{x+y}\"\n```\n\n*summer()* 函数计算其参数的和，并返回一个带有前缀和和的字符串。示例 12-3 是一个最小的 pytest\
    \ 脚本，用于验证 *summer()*。\n\n**示例 12-3. Pytest 脚本 test_summer1.py**\n\n```python\n\
    import mod2\n\ndef test_summer():\n    assert \"The sum is 11\" == mod2.summer(5,6)\n\
    ```\n\n示例 12-4 成功运行了测试。"
