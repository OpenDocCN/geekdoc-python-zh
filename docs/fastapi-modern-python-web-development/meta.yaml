- img_proc: true
  md: '# Splitting Game Logic


    There are so many ways to write a game. Who does what, and who keeps what where—the
    client or the server? The web is stateless, so each time the client calls the
    server, the server is a total amnesiac and swears it’s never seen this client
    before. So we need to keep *state* somewhere: data retained across game steps
    to thread them all together.


    We could write a game completely in JavaScript on the client side, and keep all
    the state there. If you know JavaScript well, that’s a good solution, but if you
    don’t (a possibility, because you’re reading a Python book), let’s give Python
    something to do too.


    At the other extreme, we could write a server-heavy application: generate some
    distinct id for this particular game on an initial web call, and pass that id
    with other data to the server in subsequent game steps, and maintain all that
    changing state in some server-side data store, like a database.


    Finally, we could structure the game as a sequence of client-server web endpoint
    calls, in a so-called single-page application (SPA). Writing an SPA would typically
    have JavaScript making Ajax calls to a server, and targeting the web responses
    to refresh parts of the page instead of the whole display. The client JavaScript
    and HTML do some of the work, and the server handles some of the logic and data.


    # Game Design


    First, what’s the game? We’ll build a simple [Wordle-like game](https://www.nytimes.com/games/wordle/index.html),
    but using only the names of the creatures from the *cryptid.db* database. This
    makes it quite a bit easier than Wordle, especially if you cheat and look at [Appendix
    B](#appendix-b).


    We’ll use the final, balanced, design approach above:


    +   1. Let’s use vanilla JavaScript in the client instead of well-known JavaScript
    libraries like React, Angular, or even jQuery.

    2. A new FastAPI endpoint, `GET /game`, initializes the game. It gets a random
    creature’s name from our cryptid database, and returns that, embedded as a hidden
    value in a Jinja template file of HTML, CSS, and JavaScript.

    3. On the client, the newly returned HTML and JavaScript display a Wordle-type
    interface. A sequence of boxes appears, one for each letter in the hidden creature
    name.

    4. The player types a letter into each box, then submits this guess and the hidden
    true name to the server. This is in an AJAX call, using the JavaScript `fetch()`
    function.'
  merge: -1
  pgno: 251
- img_proc: true
  md: '+   5. A second new FastAPI endpoint, POST /game, takes this guess and actual
    secret name and scores the guess against that name. It returns the guess and score
    to the client.

    6. The client displays the guess and score with appropriate CSS colors in a newly
    generated table row: green for a letter in the correct place, yellow for a letter
    in the name but another position, and gray for a letter not occurring in the hidden
    name. The score is a string of single characters, which are used as CSS class
    names to display the correct colors for the guess''s letters.

    7. If all the letters are green, then celebrate accordingly. Otherwise, the client
    displays a new sequence of text input boxes for the next guess, and repeats the
    steps 4 and later until the name is guessed or you give up. Most of the cryptid
    names are not household words, so check Appendix B as needed.


    These rules are slightly different from official Wordle, which allows only five-letter
    dictionary words and a limit of six steps.


    Don''t get your hopes up. Like most of the examples in this book, the game logic
    and design are minimal—just enough to get the pieces to work together. You can
    impart much more style and grace, given a working base.


    # Web Part One: Game Initialization


    We want two new web endpoints. We''re using creature names, so we might think
    of naming endpoints like GET /creature/game and POST /creature/game. But that
    won''t work, because we already have similar endpoints GET /creature/{name} and
    POST /creature/{name}, and FastAPI will match those first. So let''s make a new
    top-level routing namespace /game, and place both new endpoints under it.


    The first endpoint in Example 18-1 initializes the game. It needs to get a random
    creature name from the database, and return this with all the client code to implement
    the multistep game logic. For this, we''ll use a Jinja template (which you saw
    in Chapter 16) that contains HTML, CSS, and JavaScript.


    Example 18-1. Web game initialization (web/game.py)


    ```

    from pathlib import Path


    from fastapi import APIRouter, Body, Request

    from fastapi.templating import Jinja2Templates


    from service import game as service


    router = APIRouter(prefix = "/game")


    # Initial game request

    ```'
