  - "[PAGE 244]\n\nOur data fields are all strings, intentionally minimal to keep\
    \ the examples from overwhelming the logic and integration steps. For each example,\
    \ we'll read all the creature data from the SQLite database using code from previous\
    \ chapters, and adding Web and Service functions to select particular data to\
    \ feed to the plot library functions.\n\nFirst, install Plotly, and a library\
    \ needed by Plotly to export images:\n\n+   - pip install plotly\n- pip install\
    \ kaleido\n\nThen, in Example 17-8, add a test function to web/creature.py to\
    \ see if we have the right pieces, in the right places.\n\nExample 17-8. Add a\
    \ test plot endpoint (edit web/creature.py)\n\n```\n# (insert these lines in web/creature.py)\n\
    \nfrom fastapi import Response\nimport plotly.express as px\n\n@router.get(\"\
    /test\")\ndef test():\n    df = px.data.iris()\n    fig = px.scatter(df, x=\"\
    sepal_width\", y=\"sepal_length\", color=\"species\")\n    fig_bytes = fig.to_image(format=\"\
    png\")\n    return Response(content=fig_bytes, media_type=\"image/png\")\n```\n\
    \nThe documentation routinely recommends calling fig.show() to show the image\
    \ that you just created, but we're trying to fit in with how FastAPI and Starlette\
    \ do things.\n\nSo first you get fig_bytes (the actual bytes content of the image);\
    \ then you return a custom Response object.\n\nAfter you've added this endpoint\
    \ to web/creature.py and restarted the web server (automatically if you ran Uvicorn\
    \ with --reload), try accessing this new endpoint by typing localhost:8000/creature/test\
    \ into your browser's location bar. You should see Figure 17-1."
- md: "## Chart Example 2: Histogram\n\nIf all is well, let's start playing with our\
    \ creature data. We'll add a `plot()` function to `web/creature.py`. We'll get\
    \ all the creature data from the database via the `get_all()` functions in `service/creature.py`\
    \ and `data/creature.py`. Then we'll extract what we want and use Plotly to display\
    \ various images of the results.\n\nFor our first trick (Example 17-9), we'll\
    \ just use the name field and make a bar chart indicating the number of creatures'\
    \ names that start with each letter.\n\nExample 17-9. Bar chart of creature name\
    \ initials\n\n```\n# (insert these lines in web/creature.py)\n\nfrom collections\
    \ import Counter\nfrom fastapi import Response\nimport plotly.express as px\n\
    from service.creature import get_all\n\n@router.get(\"/plot\")\ndef plot():\n\
    \    creatures = get_all()\n    letters = \"ABCDEFGHIJKLMNOPQRSTUVWXYZ\"\n   \
    \ counts = Counter(creature.name[0] for creature in creatures)\n    y = { letter:\
    \ counts.get(letter, 0) for letter in letters }\n    fig = px.histogram(x=list(letters),\
    \ y=y, title=\"Creature Names\",\n        labels={\"x\": \"Initial\", \"y\": \"\
    Initial\"})\n    fig_bytes = fig.to_image(format=\"png\")\n    return Response(content=fig_bytes,\
    \ media_type=\"image/png\")\n```\n\nType `localhost:8000/creature/plot` into your\
    \ browser's location bar. You should see Figure 17-2.\n\n*Figure 17-2. Creature\
    \ name initial histogram*\n\n## Map Packages\n\nIf you try to Google **Python**\
    \ and **maps**, you'll get many links about Python dictionaries, which are a built-in\
    \ *mapping type* in the language, and not the same thing. So you may need to try\
    \ synonyms like *GIS*, *geo*, *cartography*, *spatial*, and so on. Popular packages,\
    \ some of them built atop others in the list, include the following:\n\n- *PyGIS*\n\
    \  - References for spatial data processing in Python\n- *PySAL*\n  - Python Spatial\
    \ Analysis Library\n- *Cartopy*\n  - Analyzes and maps geospatial data\n- *Folium*\n\
    \  - Integrated with JavaScript\n- *Python Client for Google Maps Services*\n\
    \  - API access to Google Maps\n- *Geemap*\n  - Google Earth support\n- *Geoplot*\n\
    \  - Extends Cartopy and Matplotlib\n- *GeoPandas*\n  - An extension of our friend\
    \ pandas\n- *ArcGIS and ArcPy*\n  - Esri's open source interface\n\nSimilar to\
    \ the criteria for plot/graph packages, choices may depend on the following:\n\
    \n- Map types (e.g., choropleth, vector, raster)\n- Styling\n- Ease of use\n-\
    \ Performance\n- Data limits\n\nLike charts and graphs, maps come in many types\
    \ and can be used for various purposes.\n\n## Map Example\n\nI'll use Plotly again\
    \ for these mapping examples; it's neither too basic nor too complex, and this\
    \ helps show how to integrate a small web-based map with FastAPI.\n\nExample 17-10\
    \ gets the two-letter ISO country codes of our creatures. But it turns out that\
    \ the function that draws Plotly maps (a *choropleth*, which sounds like a shape-changing\
    \ cryptid itself) wants to use another *three-letter* ISO country code standard\
    \ instead. Grrr. So we could redo all the codes in the database and PSV file,\
    \ but it's easier to run `pip install country_converter` and map one set of country\
    \ codes to another.\n\nExample 17-10. Map countries with cryptids (edit web/creature.py)\n\
    \n```\n# (insert these lines in web/creature.py)\n\nimport plotly.express as px\n\
    import country_converter as coco\n\n@router.get(\"/map\")\ndef map():\n    creatures\
    \ = service.get_all()\n    iso2_codes = set(creature.country for creature in creatures)\n\
    \    iso3_codes = coco.convert(names=iso2_codes, to=\"ISO3\")\n    fig = px.choropleth(\n\
    \        locationmode=\"ISO-3\",\n        locations=iso3_codes)\n    fig_bytes\
    \ = fig.to_image(format=\"png\")\n    return Response(content=fig_bytes, media_type=\"\
    image/png\")\n```\n\nAsk your browser to pretty please get **localhost:8000/creature/map**,\
    \ and with any luck you'll see a map in which cryptid-bearing countries stick\
    \ out (Figure 17-3).\n\n*Figure 17-3. Map of cryptid countries*\n\nYou could expand\
    \ this map to focus on the US by using the area field, which is a two-character\
    \ state code if country is US. Use `locationmode=\"USA-states\"`, and assign those\
    \ area values to the locations parameter of `px.choropleth()`.\n\n## Review\n\n\
    Have any cryptids been snuffling around near your house? You found out in this\
    \ chapter, where various plotting, graphing, and mapping tools poked at a database\
    \ of worrisome creatures.\n\n# CHAPTER 18\nGames\n\n## Preview\n\nGames cover\
    \ a lot of ground, from simple text to multiplayer 3D extravaganzas. This chapter\
    \ will demonstrate a simple game and how the web endpoint can interact with the\
    \ user across multiple steps. This process is different from the familiar one-shot\
    \ request-response web endpoints that you’ve seen so far.\n\n## Python Game Packages\n\
    \nIf you really want to get into Python for games, here are some useful tools:\n\
    \n- Text:\n  - Adventurelib\n- Graphic:\n  - PyGame, primer\n  - pyglet\n  - Python\
    \ Arcade\n  - HARFANG\n  - Panda3D\n\nBut I’m not going to use any of these in\
    \ this chapter. The example code can get so large and complex that it overshadows\
    \ the goal of this book: creating websites—APIs and traditional content—with FastAPI,\
    \ as simply as possible.\n\n## Splitting Game Logic\n\nThere are so many ways\
    \ to write a game. Who does what, and who keeps what where—the client or the server?\
    \ The web is stateless, so each time the client calls the server, the server is\
    \ a total amnesiac and swears it’s never seen this client before. So we need to\
    \ keep *state* somewhere: data retained across game steps to thread them all together.\n\
    \nWe could write a game completely in JavaScript on the client side, and keep\
    \ all the state there. If you know JavaScript well, that’s a good solution, but\
    \ if you don’t (a possibility, because you’re reading a Python book), let’s give\
    \ Python something to do too.\n\nAt the other extreme, we could write a server-heavy\
    \ application: generate some distinct id for this particular game on an initial\
    \ web call, and pass that id with other data to the server in subsequent game\
    \ steps, and maintain all that changing state in some server-side data store,\
    \ like a database.\n\nFinally, we could structure the game as a sequence of client-server\
    \ web endpoint calls, in a so-called single-page application (SPA). Writing an\
    \ SPA would typically have JavaScript making Ajax calls to a server, and targeting\
    \ the web responses to refresh parts of the page instead of the whole display.\
    \ The client JavaScript and HTML do some of the work, and the server handles some\
    \ of the logic and data.\n\n## Game Design\n\nFirst, what’s the game? We’ll build\
    \ a simple [Wordle-like game](https://www.nytimes.com/games/wordle/index.html),\
    \ but using only the names of the creatures from the *cryptid.db* database. This\
    \ makes it quite a bit easier than Wordle, especially if you cheat and look at\
    \ [Appendix B](#appendix-b).\n\nWe’ll use the final, balanced, design approach\
    \ above:\n\n1. Let’s use vanilla JavaScript in the client instead of well-known\
    \ JavaScript libraries like React, Angular, or even jQuery.\n2. A new FastAPI\
    \ endpoint, `GET /game`, initializes the game. It gets a random creature’s name\
    \ from our cryptid database, and returns that, embedded as a hidden value in a\
    \ Jinja template file of HTML, CSS, and JavaScript.\n3. On the client, the newly\
    \ returned HTML and JavaScript display a Wordle-type interface. A sequence of\
    \ boxes appears, one for each letter in the hidden creature name.\n4. The player\
    \ types a letter into each box, then submits this guess and the hidden true name\
    \ to the server. This is in an AJAX call, using the JavaScript `fetch()` function.\n\
    5. A second new FastAPI endpoint, POST /game, takes this guess and actual secret\
    \ name and scores the guess against that name. It returns the guess and score\
    \ to the client.\n6. The client displays the guess and score with appropriate\
    \ CSS colors in a newly generated table row: green for a letter in the correct\
    \ place, yellow for a letter in the name but another position, and gray for a\
    \ letter not occurring in the hidden name. The score is a string of single characters,\
    \ which are used as CSS class names to display the correct colors for the guess's\
    \ letters.\n7. If all the letters are green, then celebrate accordingly. Otherwise,\
    \ the client displays a new sequence of text input boxes for the next guess, and\
    \ repeats the steps 4 and later until the name is guessed or you give up. Most\
    \ of the cryptid names are not household words, so check Appendix B as needed.\n\
    \nThese rules are slightly different from official Wordle, which allows only five-letter\
    \ dictionary words and a limit of six steps.\n\nDon't get your hopes up. Like\
    \ most of the examples in this book, the game logic and design are minimal—just\
    \ enough to get the pieces to work together. You can impart much more style and\
    \ grace, given a working base.\n\n## Web Part One: Game Initialization\n\nWe want\
    \ two new web endpoints. We're using creature names, so we might think of naming\
    \ endpoints like GET /creature/game and POST /creature/game. But that won't work,\
    \ because we already have similar endpoints GET /creature/{name} and POST /creature/{name},\
    \ and FastAPI will match those first. So let's make a new top-level routing namespace\
    \ /game, and place both new endpoints under it.\n\nThe first endpoint in Example\
    \ 18-1 initializes the game. It needs to get a random creature name from the database,\
    \ and return this with all the client code to implement the multistep game logic.\
    \ For this, we'll use a Jinja template (which you saw in Chapter 16) that contains\
    \ HTML, CSS, and JavaScript.\n\nExample 18-1. Web game initialization (web/game.py)\n\
    \n```\nfrom pathlib import Path\n\nfrom fastapi import APIRouter, Body, Request\n\
    from fastapi.templating import Jinja2Templates\n\nfrom service import game as\
    \ service\n\nrouter = APIRouter(prefix = \"/game\")\n\n# Initial game request\n\
    ```"
  mdcn: "## 图表示例 2：直方图\n\n如果一切顺利，让我们开始处理我们的生物数据。我们将在 `web/creature.py` 中添加一个 `plot()`\
    \ 函数。我们将通过 `service/creature.py` 和 `data/creature.py` 中的 `get_all()` 函数从数据库获取所有生物数据。然后，我们将提取所需信息，并使用\
    \ Plotly 展示各种结果图像。\n\n作为我们的第一个技巧（示例 17-9），我们将仅使用名称字段，制作一个条形图，显示以每个字母开头的生物名称数量。\n\
    \n示例 17-9. 生物名称首字母条形图\n\n```\n# (在 web/creature.py 中插入以下代码)\n\nfrom collections\
    \ import Counter\nfrom fastapi import Response\nimport plotly.express as px\n\
    from service.creature import get_all\n\n@router.get(\"/plot\")\ndef plot():\n\
    \    creatures = get_all()\n    letters = \"ABCDEFGHIJKLMNOPQRSTUVWXYZ\"\n   \
    \ counts = Counter(creature.name[0] for creature in creatures)\n    y = { letter:\
    \ counts.get(letter, 0) for letter in letters }\n    fig = px.histogram(x=list(letters),\
    \ y=y, title=\"Creature Names\",\n        labels={\"x\": \"Initial\", \"y\": \"\
    Initial\"})\n    fig_bytes = fig.to_image(format=\"png\")\n    return Response(content=fig_bytes,\
    \ media_type=\"image/png\")\n```\n\n在浏览器的地址栏中输入 `localhost:8000/creature/plot`。你应该会看到图\
    \ 17-2。\n\n*图 17-2. 生物名称首字母直方图*\n\n## 地图包\n\n如果你尝试在谷歌上搜索 **Python** 和 **地图**，你会得到很多关于\
    \ Python 字典的链接，这是该语言内置的*映射类型*，并非同一回事。因此，你可能需要尝试同义词，如 *GIS*、*地理*、*制图*、*空间* 等。流行的包（其中一些是基于列表中的其他包构建的）包括：\n\
    \n- *PyGIS*\n  - Python 空间数据处理参考\n- *PySAL*\n  - Python 空间分析库\n- *Cartopy*\n \
    \ - 分析和绘制地理空间数据\n- *Folium*\n  - 与 JavaScript 集成\n- *Python Client for Google\
    \ Maps Services*\n  - 访问 Google Maps 的 API\n- *Geemap*\n  - 支持 Google Earth\n\
    - *Geoplot*\n  - 扩展 Cartopy 和 Matplotlib\n- *GeoPandas*\n  - 我们的朋友 pandas 的扩展\n\
    - *ArcGIS and ArcPy*\n  - Esri 的开源接口\n\n与绘图/图表包的选择标准类似，选择可能取决于以下因素：\n\n- 地图类型（例如，等值区域图、矢量图、栅格图）\n\
    - 样式\n- 易用性\n- 性能\n- 数据限制\n\n与图表和图形一样，地图也有多种类型，可用于各种目的。\n\n## 地图示例\n\n我将再次使用 Plotly\
    \ 来绘制这些地图示例；它既不太基础也不太复杂，这有助于展示如何将一个小型基于 Web 的地图与 FastAPI 集成。\n\n示例 17-10 获取我们生物的两个字母的\
    \ ISO 国家代码。但事实证明，绘制 Plotly 地图的函数（一种*等值区域图*，听起来本身就像一种变形的神秘生物）希望使用另一个*三个字母*的 ISO\
    \ 国家代码标准。唉。因此，我们可以重新制作数据库和 PSV 文件中的所有代码，但更简单的方法是运行 `pip install country_converter`\
    \ 并将一组国家代码映射到另一组。\n\n示例 17-10. 用神秘生物绘制国家地图（编辑 web/creature.py）\n\n```\n# (在 web/creature.py\
    \ 中插入以下代码)\n\nimport plotly.express as px\nimport country_converter as coco\n\n\
    @router.get(\"/map\")\ndef map():\n    creatures = service.get_all()\n    iso2_codes\
    \ = set(creature.country for creature in creatures)\n    iso3_codes = coco.convert(names=iso2_codes,\
    \ to=\"ISO3\")\n    fig = px.choropleth(\n        locationmode=\"ISO-3\",\n  \
    \      locations=iso3_codes)\n    fig_bytes = fig.to_image(format=\"png\")\n \
    \   return Response(content=fig_bytes, media_type=\"image/png\")\n```\n\n请你的浏览器访问\
    \ **localhost:8000/creature/map**，如果运气好，你会看到一张地图，其中包含神秘生物的国家会突出显示（图 17-3）。\n\n\
    *图 17-3. 神秘生物国家地图*\n\n你可以扩展此地图，通过使用 area 字段（如果国家是 US，则为两个字符的州代码）来专注于美国。使用 `locationmode=\"\
    USA-states\"`，并将这些 area 值分配给 `px.choropleth()` 的 locations 参数。\n\n## 回顾\n\n有没有神秘生物在你家附近嗅探？你在本章中找到了答案，其中各种绘图、图表和地图工具深入探究了一个令人担忧的生物数据库。\n\
    \n# 第 18 章\n游戏\n\n## 预览\n\n游戏涵盖的范围很广，从简单的文本到多人 3D 盛宴。本章将演示一个简单的游戏，以及 Web 端点如何在多个步骤中与用户交互。这个过程与你迄今为止所熟悉的单次请求-响应\
    \ Web 端点不同。\n\n## Python 游戏包\n\n如果你真的想用 Python 来做游戏，这里有一些有用的工具：\n\n- 文本：\n  -\
    \ Adventurelib\n- 图形：\n  - PyGame, primer\n  - pyglet\n  - Python Arcade\n  -\
    \ HARFANG\n  - Panda3D\n\n但本章我不会使用其中任何一个。示例代码可能会变得非常庞大和复杂，以至于掩盖了本书的目标：使用 FastAPI\
    \ 尽可能简单地创建网站——API 和传统内容。\n\n## 分割游戏逻辑\n\n编写游戏的方式有很多种。谁做什么，谁把什么放在哪里——客户端还是服务器？Web\
    \ 是无状态的，所以每次客户端调用服务器时，服务器都是完全健忘的，并且发誓以前从未见过这个客户端。因此，我们需要在某个地方保持*状态*：跨游戏步骤保留的数据，将它们全部串联起来。\n\
    \n我们可以在客户端完全用 JavaScript 编写游戏，并将所有状态保留在那里。如果你精通 JavaScript，这是一个很好的解决方案，但如果你不精通（这是一种可能性，因为你正在阅读一本\
    \ Python 书），让我们也给 Python 一些事情做。\n\n在另一个极端，我们可以编写一个服务器繁重的应用程序：在初始 Web 调用时为此特定游戏生成一个唯一的\
    \ ID，并在后续游戏步骤中将该 ID 与其他数据一起传递给服务器，并在某个服务器端数据存储（如数据库）中维护所有这些变化的状态。\n\n最后，我们可以将游戏构建为一系列客户端-服务器\
    \ Web 端点调用，即所谓的单页应用程序（SPA）。编写 SPA 通常会让 JavaScript 向服务器发出 Ajax 调用，并将 Web 响应定向到刷新页面的部分，而不是整个显示。客户端\
    \ JavaScript 和 HTML 完成部分工作，服务器处理部分逻辑和数据。\n\n## 游戏设计\n\n首先，游戏是什么？我们将构建一个简单的 [类\
    \ Wordle 游戏](https://www.nytimes.com/games/wordle/index.html)，但仅使用 *cryptid.db*\
    \ 数据库中的生物名称。这使得它比 Wordle 容易得多，特别是如果你作弊并查看 [附录 B](#appendix-b)。\n\n我们将使用上述最终的、平衡的设计方法：\n\
    \n1. 让我们在客户端使用原生 JavaScript，而不是像 React、Angular 甚至 jQuery 这样知名的 JavaScript 库。\n\
    2. 一个新的 FastAPI 端点 `GET /game` 初始化游戏。它从我们的神秘生物数据库中获取一个随机生物名称，并将其作为隐藏值嵌入到包含 HTML、CSS\
    \ 和 JavaScript 的 Jinja 模板文件中返回。\n3. 在客户端，新返回的 HTML 和 JavaScript 显示一个 Wordle 类型的界面。出现一系列方框，每个方框对应隐藏生物名称中的一个字母。\n\
    4. 玩家在每个方框中输入一个字母，然后将此猜测和隐藏的真实名称提交给服务器。这是在 AJAX 调用中完成的，使用 JavaScript 的 `fetch()`\
    \ 函数。\n5. 第二个新的 FastAPI 端点 POST /game 接受此猜测和实际的秘密名称，并根据该名称对猜测进行评分。它将猜测和分数返回给客户端。\n\
    6. 客户端在新生成的表格行中使用适当的 CSS 颜色显示猜测和分数：绿色表示字母在正确位置，黄色表示字母在名称中但位置不同，灰色表示字母未出现在隐藏名称中。分数是一个单字符字符串，用作\
    \ CSS 类名来显示猜测字母的正确颜色。\n7. 如果所有字母都是绿色的，那么相应地庆祝。否则，客户端显示一组新的文本输入框用于下一次猜测，并重复步骤 4\
    \ 及之后的步骤，直到猜出名称或你放弃。大多数神秘生物名称不是常用词，因此请根据需要查看附录 B。\n\n这些规则与官方 Wordle 略有不同，后者仅允许五个字母的字典单词，并限制六步。\n\
    \n不要抱太大希望。像本书中的大多数示例一样，游戏逻辑和设计是最小化的——刚好足以让各个部分协同工作。在可用的基础上，你可以赋予更多的风格和优雅。\n\n\
    ## Web 第一部分：游戏初始化\n\n我们需要两个新的 Web 端点。我们使用生物名称，所以可能会考虑将端点命名为 GET /creature/game\
    \ 和 POST /creature/game。但这行不通，因为我们已经有类似的端点 GET /creature/{name} 和 POST /creature/{name}，FastAPI\
    \ 会首先匹配它们。因此，让我们创建一个新的顶级路由命名空间 /game，并将两个新端点都放在其下。\n\n示例 18-1 中的第一个端点初始化游戏。它需要从数据库中获取一个随机的生物名称，并将其与实现多步骤游戏逻辑的所有客户端代码一起返回。为此，我们将使用一个\
    \ Jinja 模板（你在第 16 章中见过），其中包含 HTML、CSS 和 JavaScript。\n\n示例 18-1. Web 游戏初始化（web/game.py）\n\
    \n```\nfrom pathlib import Path\n\nfrom fastapi import APIRouter, Body, Request\n\
    from fastapi.templating import Jinja2Templates\n\nfrom service import game as\
    \ service\n\nrouter = APIRouter(prefix = \"/game\")\n\n# 初始游戏请求\n```"
