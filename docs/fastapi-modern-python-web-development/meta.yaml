  md: 'Also, you’re calling read_db() twice, to remove any startup time as SQLite
    does the query. Then read_api() timing should be fair. Example 14-4 fires it up.


    Example 14-4. Test database query performance


    ```

    $ python test_load.py

    100000 rows

    write time: 14.868232927983627

    db read time: 0.4025074450764805

    db read time: 0.39750714192632586

    api read time: 2.597553930943832

    ```


    The API read time for all explorers was much slower than the Data layer’s read
    time. Some of this is probably overhead from FastAPI’s conversion of the response
    to JSON. Also, the initial write time to the database wasn’t very zippy. It wrote
    one explorer at a time, because the Data layer API has a single create() function,
    but not a create_many(); on the read side, the API can return one (get_one())
    or all (get_all()). So, if you ever want to do bulk loading, it might be good
    to add a new Data load function and a new Web endpoint (with restricted authorization).


    Also, if you expect any table in your database to grow to 100,000 rows, maybe
    you shouldn’t allow random users to get all of them in one API call. Pagination
    would be useful, or a way to download a single CSV file from the table.


    # Data Science and AI


    Python has become the most prominent language in data science in general, and
    machine learning in particular. So much data massaging is needed, and Python is
    good at that.


    Sometimes developers have used external tools like pandas to do the data manipulation
    that’s too tricky in SQL.


    PyTorch is one of the most popular ML tools, because it leverages Python’s strengths
    in data manipulation. The underlying computations may be in C or C++ for speed,
    but Python or Go are well-suited for the “higher” data-integration tasks. (The
    Mojo language, a superset of Python, may handle both the high and low ends if
    it succeeds as planned. Although a general-purpose language, it specifically addresses
    some of the current complexity in AI development.)


    A new Python tool called Chroma is a database, similar to SQLite, but tailored
    to machine learning, specifically large language models (LLMs). Read the Getting
    Started page to, you know, get started.'
