  - "[PAGE 224]\n\n# CHAPTER 15\nFiles\n\n# Preview\n\nBesides fielding API requests\
    \ and traditional content like HTML, web servers are expected to handle file transfers\
    \ in both directions. Very large files may need to be transferred in *chunks*\
    \ that don't use too much of the system's memory. You can also provide access\
    \ to a directory of files (and subdirectories, to any depth) with Static Files.\n\
    \n# Multipart Support\n\nTo handle large files, FastAPI's uploading and downloading\
    \ features need these extra modules:\n\n```\nPython-Multipart\n    pip install\
    \ python-multipart\n\naio-files\n    pip install aiofiles\n```\n\n# Uploading\
    \ Files\n\nFastAPI targets API development, and most of the examples in this book\
    \ have used JSON requests and responses. But in the next chapter you'll see forms,\
    \ which are handled differently. This chapter covers files, which are treated\
    \ like forms in some ways.\n\nFastAPI offers two techniques for file uploads:\
    \ `File()` and `UploadFile`."
