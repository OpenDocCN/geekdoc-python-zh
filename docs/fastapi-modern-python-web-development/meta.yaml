- img_proc: true
  md: "# Example 16-6. Define a template file (template/list.html)\n\n```\n<html>\n\
    <table bgcolor=\"#eeeeee\">\n  <tr>\n    <th colspan=3>Creatures</th>\n  </tr>\n\
    \  <tr>\n    <th>Name</th>\n    <th>Description</th>\n    <th>Country</th>\n \
    \   <th>Area</th>\n    <th>AKA</th>\n  </tr>\n  {% for creature in creatures:\
    \ %}\n  <tr>\n    <td>{{ creature.name }}</td>\n    <td>{{ creature.description\
    \ }}</td>\n    <td>{{ creature.country }}</td>\n    <td>{{ creature.area }}</td>\n\
    \    <td>{{ creature.aka }}</td>\n  </tr>\n  {% endfor %}\n</table>\n\n<br>\n\n\
    <table bgcolor=\"#dddddd\">\n  <tr>\n    <th colspan=2>Explorers</th>\n  </tr>\n\
    \  <tr>\n    <th>Name</th>\n    <th>Country</th>\n    <th>Description</th>\n \
    \ </tr>\n  {% for explorer in explorers: %}\n  <tr>\n    <td>{{ explorer.name\
    \ }}</td>\n    <td>{{ explorer.country }}</td>\n    <td>{{ explorer.description\
    \ }}</td>\n  </tr>\n  {% endfor %}\n</table>\n</html>\n```\n\nI don't care how\
    \ it looks, so there's no CSS, just the ancient pre-CSS bgcolor table attribute\
    \ to distinguish the two tables."
