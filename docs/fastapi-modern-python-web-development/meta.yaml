    Individual test scripts live within the bottom directories. Those are in this\
    \ chapter.\n\n## Automated Unit Tests\n\nA unit test should check one thing, within\
    \ one layer. This usually means passing parameter(s) to a function and asserting\
    \ what should be returned.\nUnit tests require isolation of the code being tested.\
    \ If not, you're also testing something else. So, how do you isolate code for\
    \ unit tests?\n\n## Mocking\n\nIn this book's code stack, accessing a URL via\
    \ a web API generally calls a function in the Web layer, which calls a function\
    \ in the Service layer, which calls a function in the Data layer, which accesses\
    \ a database. The results flow back up the chain, eventually back out of the Web\
    \ layer to the caller.\n\nUnit testing sounds simple. For each function in your\
    \ codebase, pass in test arguments and confirm that it returns expected values.\
    \ This works well for a *pure function*: one that takes input arguments and returns\
    \ responses without referencing any external code. But most functions also call\
    \ other functions, so how can you control what those other functions do? What\
    \ about the data that comes from these external sources? The most common external\
    \ factor to control is database access, but really it can be anything.\n\nOne\
    \ method is to *mock* each external function call. Because functions are first-class\
    \ objects in Python, you can substitute one function for another. The unittest\
    \ package has a mock module that does this.\n\nMany developers believe that mocking\
    \ is the best way to isolate unit tests. I'll first show examples of mocking here,\
    \ along with the argument that often mocking requires too much knowledge of *how*\
    \ your code works, rather than the results. You may hear the terms *structural\
    \ testing* (as in mocks, where the tested code is quite visible) and *behavioral\
    \ testing* (where the code internals are not needed).\n\nExamples 12-1 and 12-2\
    \ define the modules *mod1.py* and *mod2.py*.\n\n**Example 12-1. Called module\
