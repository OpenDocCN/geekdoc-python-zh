    \ directory, alongside *web*, *service*, *data*, and *model*.\n- **unit**\n  -\
    \ Exercise single functions, but don't cross layer boundaries.\n  - **web**\n\
    \    - Web-layer unit tests.\n  - **service**\n    - Service-layer unit tests.\n\
    \  - **data**\n    - Data-layer unit tests.\n- **full**\n  - Also known as *end-to-end*\
    \ or *contract* tests, these span all layers at once. They address the API endpoints\
    \ in the Web layer.\n\nThe directories have the `test_` prefix or `_test` suffix\
    \ for use by pytest, which you'll start to see in Example 9-4 (which runs the\
    \ test in Example 9-3).\n\nBefore testing, a few API design choices need to be\
    \ made. What should be returned by the `get_one()` function if a matching `Creature`\
    \ or `Explorer` isn't found? You can return `None`, as in Example 9-2. Or you\
    \ could raise an exception. None of the built-in Python exception types deal directly\
    \ with missing values:\n\n- `TypeError` may be the closest, because `None` is\
    \ a different type than `Creature`.\n- `ValueError` is more suited for the wrong\
    \ value for a given type, but I guess you could say that passing a missing string\
    \ `id` to `get_one(id)` qualifies.\n- You could define your own `MissingError`\
    \ if you really want to.\n\nWhichever method you choose, the effects will bubble\
    \ up all the way to the top layer. Let's go with the None alternative rather than\
    \ the exception for now. After all, that's what *none* means. Example 9-3 is a\
    \ test.\n\nExample 9-3. Service test test/unit/service/test_creature.py\n\n```python\n\
    from model.creature import Creature\nfrom service import creature as code\n\n\
    sample = Creature(name=\"yeti\",\n                  country=\"CN\",\n        \
    \          area=\"Himalayas\",\n                  description=\"Hirsute Himalayan\"\
    ,\n                  aka=\"Abominable Snowman\",\n                  )\n\ndef test_create():\n\
    \    resp = code.create(sample)\n    assert resp == sample\n\ndef test_get_exists():\n\
    \    resp = code.get_one(\"yeti\")\n    assert resp == sample\n\ndef test_get_missing():\n\
    \    resp = code.get_one(\"boxturtle\")\n    assert resp is None\n```\n\nRun the\
    \ test in Example 9-4.\n\nExample 9-4. Run the service test\n\n```\n$ pytest -v\
    \ test/unit/service/test_creature.py\ntest_creature.py::test_create PASSED [ 16%]\n\
    test_creature.py::test_get_exists PASSED [ 50%]\ntest_creature.py::test_get_missing\
    \ PASSED [ 66%]\n\n========================= 3 passed in 0.06s ==========================\n\
    ```\n\nIn Chapter 10, `get_one()` will no longer return `None` for a missing creature,\
    \ and the `test_get_missing()` test in Example 9-4 would fail. But that will be\
    \ fixed.\n\n## Other Service-Level Stuff\n\nWe're in the middle of the stack now—the\
    \ part that really defines our site's purpose. And so far, we've used it only\
    \ to forward web requests to the (next chapter's) Data layer.\n\nSo far, this\
    \ book has developed the site iteratively, building a minimal base for future\
    \ work. As you learn more about what you have, what you can do, and what users\
    \ might want, you can branch out and experiment. Some ideas might benefit only\
    \ larger sites, but here are some technical site-helper ideas:\n\n- Logging\n\
    - Metrics\n- Monitoring\n- Tracing\n\nThis section discusses each of these. We'll\
    \ revisit these options in \"Troubleshooting\" on page 190, to see if they can\
    \ help diagnose problems.\n\n## Logging\n\nFastAPI logs each API call to an endpoint—including\
    \ the timestamp, method, and URL—but not any data delivered via the body or headers.\n\
    \n## Metrics, Monitoring, Observability\n\nIf you run a website, you probably\
    \ want to know how it's doing. For an API website, you might want to know which\
    \ endpoints are being accessed, how many people are visiting, and so on. Statistics\
    \ on such factors are called *metrics*, and the gathering of them is *monitoring*\
    \ or *observability*.\n\nPopular metrics tools nowadays include [Prometheus](https://prometheus.io/)\
    \ for gathering metrics and [Grafana](https://grafana.com/) for displaying metrics.\n\
    \n## Tracing\n\nHow well is your site performing? It's common for metrics to be\
    \ good overall, but with disappointing results here or there. Or the whole site\
    \ may be a mess. Either way, it's useful to have a tool that measures how long\
    \ an API call takes, end to end—and not just overall time, but the time for each\
    \ intermediate step. If something's slow, you can find the weak link in the chain.\
    \ This is *tracing*.\n\nA new open source project has taken earlier tracing products\
    \ like [Jaeger](https://www.jaegertracing.io/) and branded them as [OpenTelemetry](https://opentelemetry.io/).\
    \ It has a [Python API](https://opentelemetry.io/docs/instrumentation/python/)\
    \ and at least one [integration with FastAPI](https://opentelemetry.io/docs/instrumentation/python/frameworks/fastapi/).\n\
    \nTo install and configure OpenTelemetry with Python, follow the instructions\
    \ in the [OpenTelemetry Python documentation](https://opentelemetry.io/docs/instrumentation/python/).\n\
    \n## Other\n\nThese production issues will be discussed in Chapter 13. Besides\
    \ these, what about our domain—cryptids and anything associated with them? Besides\
    \ bare details on explorers and creatures, what else might you want to take on?\
    \ You may come up with new ideas that require changes to the models and other\
    \ layers. Here are some ideas you might try:\n\n- Links of explorers to the creatures\
    \ that they seek\n- Sighting data\n- Expeditions\n- Photos and videos\n- Sasquatch\
    \ mugs and T-shirts (Figure 9-1)\n\nFigure 9-1. A word from our sponsor\n\nEach\
    \ of these categories will generally require one or more new models to be defined,\
    \ and new modules and functions. Some will be added in Part IV, which is a gallery\
    \ of applications added to the base built here in Part III.\n\n## Review\n\nIn\
    \ this chapter, you replicated some functions from the Web layer and moved the\
    \ fake data that they worked with. The goal was to initiate the new Service layer.\
    \ So far, it’s been a cookie-cutter process, but it will evolve and diverge after\
    \ this. The next chapter builds the final Data layer, yielding a truly live website.\n\
    \n# CHAPTER 10\nData Layer\n\n> If I'm not mistaken, I think Data was the comic\
    \ relief on the show.\n—Brent Spiner, *Star Trek: The Next Generation*\n\n## Preview\n\
    \nThis chapter finally creates a persistent home for our site's data, at last\
    \ connecting the three layers. It uses the relational database SQLite and introduces\
    \ Python's database API, aptly named DB-API. Chapter 14 goes into much more detail\
    \ on databases, including the SQLAlchemy package and nonrelational databases.\n\
    \n## DB-API\n\nFor over 20 years, Python has included a basic definition for a\
    \ relational database interface called DB-API: PEP 249. Anyone who writes a Python\
    \ driver for a relational database is expected to at least include support for\
    \ DB-API, although other features may be included.\n\nThese are the main DB-API\
    \ functions:\n\n- Create a connection `conn` to the database with `connect()`.\n\
    - Create a cursor `curs` with `conn.cursor()`.\n- Execute a SQL string `stmt`\
    \ with `curs.execute(stmt)`.\n\nThe `execute...()` functions run a SQL statement\
    \ *stmt* string with optional parameters, listed here:\n\n- `execute(*stmt*)`\
    \ if there are no parameters\n- `execute(*stmt*, *params*)`, with parameters *params*\
    \ in a single sequence (list or tuple) or dict\n- `executemany(*stmt*, *params_seq*)`,\
    \ with multiple parameter groups in the sequence *params_seq*\n\nThere are five\
    \ ways of specifying parameters, and not all are supported by all database drivers.\
    \ If we have a statement *stmt* that begins with \"select * from creature where\"\
    , and we want to specify string parameters for the creature's name *or* country,\
    \ the rest of the *stmt* string and its parameters would look like those in Table\
    \ 10-1.\n\nTable 10-1. Specifying the statement and parameters\n\n| Type | Statement\
    \ part | Parameters part |\n|---|---|---|\n| qmark | `name=? or country=?` | `(name,\
    \ country)` |\n| numeric | `name=:0 or country=:1` | `(name, country)` |\n| format\
    \ | `name=%s or country=%s` | `(name, country)` |\n| named | `name=:name or country=:country`\
    \ | `{\"name\": name, \"country\": country}` |\n| pyformat | `name=%(name)s or\
    \ country=%(country)s` | `{\"name\": name, \"country\": country}` |\n\nThe first\
    \ three take a tuple argument, where the parameter order matches the `?`, `:N`,\
    \ or `%s` in the statement. The last two take a dictionary, where the keys match\
    \ the names in the statement.\n\nSo, the full call for the *named* style would\
    \ look like Example 10-1.\n\nExample 10-1. Using named-style parameters.\n\n```python\n\
    stmt = \"\"\"select * from creature where\n    name=:name or country=:country\"\
    \"\"\nparams = {\"name\": \"yeti\", \"country\": \"CN\"}\ncurs.execute(stmt, params)\n\
    ```"
