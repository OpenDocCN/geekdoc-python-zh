- md: "## Full Tests\n\nThese call the web endpoints, which take the code elevator\
    \ down through Service to Data, and back up again. Sometimes these are called\
    \ *end-to-end* or *contract* tests.\n\n### Get all explorers\n\nDipping a toe\
    \ in the test waters, not yet knowing if they're infested with piranhas, is brave\
    \ volunteer Example 10-6.\n\nExample 10-6. The Get All Explorers test\n\n```\n\
    $ http localhost:8000/explorer\nHTTP/1.1 405 Method Not Allowed\nallow: POST\n\
    content-length: 31\ncontent-type: application/json\ndate: Mon, 27 Feb 2023 20:05:18\
    \ GMT\nserver: uvicorn\n\n{\n    \"detail\": \"Method Not Allowed\"\n}\n```\n\n\
    Eek! What happened?\n\nOh. The test asked for /explorer, not /explorer/, and there's\
    \ no GET-method path function for the URL /explorer (with no final slash). In\
    \ web/explorer.py, the path decorator for the get_all() path function is this:\n\
    \n```\n@router.get(\"/\")\n```\n\nThat, plus the earlier code\n\n```\nrouter =\
    \ APIRouter(prefix = \"/explorer\")\n```\n\nmeans this get_all() path function\
    \ serves a URL containing /explorer/.\n\nExample 10-7 happily shows that you can\
    \ have more than one path decorator per path function.\n\nExample 10-7. Add a\
    \ nonslash path decorator for the get_all() path function\n\n```\n@router.get(\"\
    \")\n@router.get(\"/\")\ndef get_all() -> list[Explorer]:\n    return service.get_all()\n\
    ```\n\nTest with both URLs in Examples 10-8 and 10-9.\n\nExample 10-8. Test the\
    \ nonslash endpoint\n\n```\n$ http localhost:8000/explorer\nHTTP/1.1 200 OK\n\
    content-length: 2\ncontent-type: application/json\ndate: Mon, 27 Feb 2023 20:12:44\
    \ GMT\nserver: uvicorn\n\n[]\n```\n\nExample 10-9. Test the slash endpoint\n\n\
    ```\n$ http localhost:8000/explorer/\nHTTP/1.1 200 OK\ncontent-length: 2\ncontent-type:\
    \ application/json\ndate: Mon, 27 Feb 2023 20:14:39 GMT\nserver: uvicorn\n\n[]\n\
    ```\n\nNow that both of these work, create an explorer, and retry the Get All\
    \ test after. Example 10-10 attempts this, but with a plot twist.\n\nExample 10-10.\
    \ Test explorer creation, with an input error\n\n```\n$ http post localhost:8000/explorer\
    \ name=\"Beau Buffette\", country=\"US\"\nHTTP/1.1 422 Unprocessable Entity\n\
    content-length: 95\ncontent-type: application/json\ndate: Mon, 27 Feb 2023 20:17:45\
    \ GMT\nserver: uvicorn\n\n{\n    \"detail\": [\n        {\n            \"loc\"\
    : [\n                \"body\",\n                \"country\"\n            ],\n\
    \            \"msg\": \"field required\",\n            \"type\": \"value_error.missing\"\
    \n        }\n    ]\n}\n```\n\nI misspelled country, although my spelling is usually\
    \ impeccable. Pydantic caught this in the Web layer, returning a 422 HTTP status\
    \ code and a description of the problem. Generally, if FastAPI returns a 422,\
    \ the odds are that Pydantic fingered the perpetrator. The \"loc\" part says where\
    \ the error occurred: the field \"country\" is missing, because I'm such an inept\
    \ typist.\n\nFix the spelling and retest in Example 10-11.\n\nExample 10-11. Create\
    \ an explorer with the corrected value\n\n```\n$ http post localhost:8000/explorer\
    \ name=\"Beau Buffette\" country=\"US\"\nHTTP/1.1 201 Created\ncontent-length:\
    \ 55\ncontent-type: application/json\ndate: Mon, 27 Feb 2023 20:20:49 GMT\nserver:\
    \ uvicorn\n\n{\n    \"name\": \"Beau Buffette\",\n    \"country\": \"US\",\n \
    \   \"description\": \"\"\n}\n```\n\nThis time the call returns a 201 status code,\
    \ which is traditional when a resource is created (all 2xx status codes are considered\
    \ to indicate success, with plain 200 being the most generic). The response also\
    \ contains the JSON version of the Explorer object that was just created.\n\n\
    Now back to the initial test: will Beau turn up in the Get All Explorers test?\
    \ Example 10-12 answers this burning question.\n\nExample 10-12. Did the latest\
    \ create() work?\n\n```\n$ http localhost:8000/explorer\nHTTP/1.1 200 OK\ncontent-length:\
    \ 57\ncontent-type: application/json\ndate: Mon, 27 Feb 2023 20:26:26 GMT\nserver:\
    \ uvicorn\n\n[\n    {\n        \"name\": \"Beau Buffette\",\n        \"country\"\
    : \"US\",\n        \"description\": \"\"\n    }\n]\n```\n\nYay.\n\n### Get one\
    \ explorer\n\nNow, what happens if you try to look up Beau with the Get One endpoint\
    \ (Example 10-13)?\n\nExample 10-13. Test the Get One endpoint\n\n```\n$ http\
    \ localhost:8000/explorer/\"Beau Buffette\"\nHTTP/1.1 200 OK\ncontent-length:\
    \ 55\ncontent-type: application/json\ndate: Mon, 27 Feb 2023 20:28:48 GMT\nserver:\
    \ uvicorn\n\n{\n    \"name\": \"Beau Buffette\",\n    \"country\": \"US\",\n \
    \   \"description\": \"\"\n}\n```\n\nI used the quotes to preserve that space\
    \ between the first and last names. In URLs, you could also use Beau%20Buffette;\
    \ the %20 is the hex code for the space character in ASCII.\n\n### Missing and\
    \ duplicate data\n\nI've ignored two main error classes so far:\n\n- *Missing\
    \ data*: If you try to get, modify, or delete an explorer by a name that isn't\
    \ in the database.\n- *Duplicate data*: If you try to create an explorer with\
    \ the same name more than once.\n\nSo, what if you ask for a nonexistent or duplicate\
    \ explorer? So far, the code has been too optimistic, and exceptions will bubble\
    \ up from the abyss.\n\nOur friend Beau was just added to the database. Imagine\
    \ his evil clone (who shares his name) plots to replace him some dark night, using\
    \ Example 10-14.\n\nExample 10-14. Duplicate error: try to create an explorer\
    \ more than once\n\n```\n$ http post localhost:8000/explorer name=\"Beau Buffette\"\
    \ country=\"US\"\nHTTP/1.1 500 Internal Server Error\ncontent-length: 3127\ncontent-type:\
    \ text/plain; charset=utf-8\ndate: Mon, 27 Feb 2023 21:04:09 GMT\nserver: uvicorn\n\
    \nTraceback (most recent call last):\n  File \".../starlette/middleware/errors.py\"\
    , line 162, in call\n  ... (lots of confusing innards here) ...\n  File \".../service/explorer.py\"\
    , line 11, in create\n    return data.create(explorer)\n    ^^^^^^^^\n```"
  mdcn: "## 完整测试\n\n这些测试调用 Web 端点，让代码电梯穿过服务层下降到数据层，然后再返回。有时这些测试被称为*端到端*测试或*契约*测试。\n\
    \n### 获取所有探索者\n\n勇敢的志愿者示例 10-6 正在试探性地踏入测试水域，还不知道里面是否潜伏着食人鱼。\n\n示例 10-6. 获取所有探索者测试\n\
    \n```\n$ http localhost:8000/explorer\nHTTP/1.1 405 Method Not Allowed\nallow:\
    \ POST\ncontent-length: 31\ncontent-type: application/json\ndate: Mon, 27 Feb\
    \ 2023 20:05:18 GMT\nserver: uvicorn\n\n{\n    \"detail\": \"Method Not Allowed\"\
    \n}\n```\n\n哎呀！发生了什么？\n\n哦。测试请求的是 `/explorer`，而不是 `/explorer/`，并且 URL `/explorer`（没有末尾斜杠）没有对应的\
    \ GET 方法路径函数。在 `web/explorer.py` 中，`get_all()` 路径函数的路径装饰器是这样的：\n\n```\n@router.get(\"\
    /\")\n```\n\n再加上之前的代码\n\n```\nrouter = APIRouter(prefix = \"/explorer\")\n```\n\
    \n这意味着这个 `get_all()` 路径函数服务于包含 `/explorer/` 的 URL。\n\n示例 10-7 愉快地展示了你可以为一个路径函数添加多个路径装饰器。\n\
    \n示例 10-7. 为 get_all() 路径函数添加一个无斜杠的路径装饰器\n\n```\n@router.get(\"\")\n@router.get(\"\
    /\")\ndef get_all() -> list[Explorer]:\n    return service.get_all()\n```\n\n\
    使用示例 10-8 和 10-9 中的两个 URL 进行测试。\n\n示例 10-8. 测试无斜杠端点\n\n```\n$ http localhost:8000/explorer\n\
    HTTP/1.1 200 OK\ncontent-length: 2\ncontent-type: application/json\ndate: Mon,\
    \ 27 Feb 2023 20:12:44 GMT\nserver: uvicorn\n\n[]\n```\n\n示例 10-9. 测试带斜杠端点\n\n\
    ```\n$ http localhost:8000/explorer/\nHTTP/1.1 200 OK\ncontent-length: 2\ncontent-type:\
    \ application/json\ndate: Mon, 27 Feb 2023 20:14:39 GMT\nserver: uvicorn\n\n[]\n\
    ```\n\n既然这两个都能工作了，就创建一个探索者，然后重试获取所有测试。示例 10-10 尝试了这个操作，但出现了一个情节转折。\n\n示例 10-10.\
    \ 测试探索者创建，但输入有误\n\n```\n$ http post localhost:8000/explorer name=\"Beau Buffette\"\
    , country=\"US\"\nHTTP/1.1 422 Unprocessable Entity\ncontent-length: 95\ncontent-type:\
    \ application/json\ndate: Mon, 27 Feb 2023 20:17:45 GMT\nserver: uvicorn\n\n{\n\
    \    \"detail\": [\n        {\n            \"loc\": [\n                \"body\"\
    ,\n                \"country\"\n            ],\n            \"msg\": \"field required\"\
    ,\n            \"type\": \"value_error.missing\"\n        }\n    ]\n}\n```\n\n\
    我拼错了 `country`，尽管我的拼写通常无可挑剔。Pydantic 在 Web 层捕获了这个错误，返回了 422 HTTP 状态码和问题描述。通常，如果\
    \ FastAPI 返回 422，很可能是 Pydantic 指出了罪魁祸首。\"loc\" 部分指出了错误发生的位置：字段 \"country\" 缺失，因为我是个笨拙的打字员。\n\
    \n修正拼写并在示例 10-11 中重新测试。\n\n示例 10-11. 使用修正后的值创建探索者\n\n```\n$ http post localhost:8000/explorer\
    \ name=\"Beau Buffette\" country=\"US\"\nHTTP/1.1 201 Created\ncontent-length:\
    \ 55\ncontent-type: application/json\ndate: Mon, 27 Feb 2023 20:20:49 GMT\nserver:\
    \ uvicorn\n\n{\n    \"name\": \"Beau Buffette\",\n    \"country\": \"US\",\n \
    \   \"description\": \"\"\n}\n```\n\n这次调用返回了 201 状态码，这是资源创建时的传统做法（所有 2xx 状态码都被认为表示成功，其中\
    \ 200 是最通用的）。响应还包含了刚刚创建的 Explorer 对象的 JSON 版本。\n\n现在回到最初的测试：Beau 会出现在获取所有探索者测试中吗？示例\
    \ 10-12 回答了这个迫切的问题。\n\n示例 10-12. 最新的 create() 调用成功了吗？\n\n```\n$ http localhost:8000/explorer\n\
    HTTP/1.1 200 OK\ncontent-length: 57\ncontent-type: application/json\ndate: Mon,\
    \ 27 Feb 2023 20:26:26 GMT\nserver: uvicorn\n\n[\n    {\n        \"name\": \"\
    Beau Buffette\",\n        \"country\": \"US\",\n        \"description\": \"\"\n\
    \    }\n]\n```\n\n太好了。\n\n### 获取单个探索者\n\n现在，如果你尝试使用获取单个端点（示例 10-13）来查找 Beau，会发生什么？\n\
    \n示例 10-13. 测试获取单个端点\n\n```\n$ http localhost:8000/explorer/\"Beau Buffette\"\n\
    HTTP/1.1 200 OK\ncontent-length: 55\ncontent-type: application/json\ndate: Mon,\
    \ 27 Feb 2023 20:28:48 GMT\nserver: uvicorn\n\n{\n    \"name\": \"Beau Buffette\"\
    ,\n    \"country\": \"US\",\n    \"description\": \"\"\n}\n```\n\n我使用了引号来保留名字和姓氏之间的空格。在\
    \ URL 中，你也可以使用 `Beau%20Buffette`；`%20` 是 ASCII 中空格字符的十六进制代码。\n\n### 缺失和重复数据\n\n\
