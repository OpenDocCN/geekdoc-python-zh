    \ These should give you a starting point for particular applications.\n\n2 Not\
    \ for the last time.\n\n# CHAPTER 1\nThe Modern Web\n\n> The Web as I envisaged\
    \ it, we have not seen it yet. The future is still so much bigger than the past.\n\
    —Tim Berners-Lee\n\n## Preview\n\nOnce upon a time, the web was small and simple.\
    \ Developers had such fun throwing PHP, HTML, and MySQL calls into single files\
    \ and proudly telling everyone to check out their website. But the web grew over\
    \ time to zillions, nay, squillions of pages—and the early playground became a\
    \ metaverse of theme parks.\n\nIn this chapter, I'll point out some areas that\
    \ have become ever more relevant to the modern web:\n\n- Services and APIs\n-\
    \ Concurrency\n- Layers\n- Data\n\nThe next chapter will show what Python offers\
    \ in these areas. After that, we'll dive into the FastAPI web framework and see\
    \ what it has to offer.\n\n## Services and APIs\n\nThe web is a great connecting\
    \ fabric. Although much activity still occurs on the *content* side—HTML, JavaScript,\
    \ images, and so on—there’s an increasing emphasis on the application programming\
    \ interfaces (APIs) that connect things.\n\nCommonly, a web *service* handles\
    \ low-level database access and middle-level business logic (often lumped together\
    \ as a *backend*), while JavaScript or mobile apps provide a rich top-level *frontend*\
    \ (interactive user interface). These fore and aft worlds have become more complex\
    \ and divergent, usually requiring developers to specialize in one or the other.\
    \ It’s harder to be a *full stack* developer than it used to be.¹\n\nThese two\
    \ worlds talk to each other using APIs. In the modern web, API design is as important\
    \ as the design of websites themselves. An API is a contract, similar to a database\
    \ schema. Defining and modifying APIs is now a major job.\n\n## Kinds of APIs\n\
    \nEach API defines the following:\n\n*Protocol*\n    The control structure\n\n\
    *Format*\n    The content structure\n\nMultiple API methods have developed as\
    \ technology has evolved from isolated machines, to multitasking systems, to networked\
    \ servers. You’ll probably run across one or more of these at some point, so the\
    \ following is a brief summary before getting to *HTTP* and its friends, which\
    \ are featured in this book:\n\n- Before networking, an API usually meant a very\
    \ close connection, like a function call to a *library* in the same language as\
    \ your application—say, calculating a square root in a math library.\n- *Remote\
    \ procedure calls (RPCs)* were invented to call functions in other processes,\
    \ on the same machine or others, as though they were in the calling application.\
    \ A popular current example is gRPC.\n- *Messaging* sends small chunks of data\
    \ in pipelines among processes. Messages may be verb-like commands or may just\
    \ indicate noun-like *events* of interest. Current popular messaging solutions,\
    \ which vary broadly from toolkits to full servers, include Apache Kafka, RabbitMQ,\
    \ NATS, and ZeroMQ. Communication can follow different patterns:\n\n1 I gave up\
    \ trying a few years ago.\n\n*Request-response*\n    One: one, like a web browser\
    \ calling a web server.\n\n*Publish-subscribe, or pub-sub*\n    A *publisher*\
    \ emits messages, and *subscribers* act on each according to some data in the\
    \ message, like a subject.\n\n*Queues*\n    Like pub-sub, but only one of a pool\
    \ of subscribers grabs the message and acts on it.\n\nAny of these may be used\
    \ alongside a web service—for example, performing a slow backend task like sending\
    \ an email or creating a thumbnail image.\n\n## HTTP\n\nBerners-Lee proposed three\
    \ components for his World Wide Web:\n\n*HTML*\n    A language for displaying\
    \ data\n\n*HTTP*\n    A client-server protocol\n\n*URLs*\n    An addressing scheme\
    \ for web resources\n\nAlthough these seem obvious in retrospect, they turned\
    \ out to be a ridiculously useful combination. As the web evolved, people experimented,\
    \ and some ideas, like the IMG tag, survived the Darwinian struggle. And as needs\
    \ became clearer, people got serious about defining standards.\n\n## REST(ful)\n\
    \nOne chapter in Roy Fielding's Ph.D. *thesis* defined *Representational State\
    \ Transfer (REST)*—an *architectural style* for HTTP use.² Although often referenced,\
    \ it's been largely misunderstood.\n\n2 *Style* means a higher-level pattern,\
    \ like *client-server*, rather than a specific design.\n\nA roughly shared adaptation\
    \ has evolved and dominates the modern web. It's called *RESTful*, with these\
    \ characteristics:\n\n- Uses HTTP and client-server protocol\n- Stateless (each\
    \ connection is independent)\n- Cacheable\n- Resource-based\n\nA *resource* is\
    \ data that you can distinguish and perform operations on. A web service provides\
    \ an *endpoint*—a distinct URL and HTTP *verb* (action)—for each feature that\
    \ it wants to expose. An endpoint is also called a *route*, because it routes\
    \ the URL to a function.\n\nDatabase users are familiar with the *CRUD* acronym\
    \ of procedures: create, read, update, delete. The HTTP verbs are pretty CRUDdy:\n\
    \n| Verb | Action |\n| :--- | :--- |\n| POST | Create (write) |\n| PUT | Modify\
    \ completely (replace) |\n| PATCH | Modify partially (update) |\n| GET | Um, get\
    \ (read, retrieve) |\n| DELETE | Uh, delete |\n\nA client sends a *request* to\
    \ a RESTful endpoint with data in one of the following areas of an HTTP message:\n\
    \n- Headers\n- The URL string\n- Query parameters\n- Body values\n\nIn turn, an\
    \ HTTP *response* returns these:\n\n- An integer *status code* indicating the\
    \ following:\n    - 100s: Info, keep going"
