    event, like a mouse click, keypress, or time. The prominent Python package in
    this category is Twisted. Its name reflects the reality that callback-based programs
    are a bit “inside-out” and hard to follow.


    # Python Generators


    Like most languages, Python usually executes code sequentially. When you call
    a function, Python runs it from its first line until its end or a return.


    But in a Python *generator function*, you can stop and return from any point,
    *and go back to that point* later. The trick is the yield keyword.


    In one *Simpsons* episode, Homer crashes his car into a deer statue, followed
    by three lines of dialogue. Example 4-1 defines a normal Python function to return
    these lines as a list and have the caller iterate over them.


    Example 4-1. Use return


    ```

    >>> def doh():

    ...     return ["Homer: D''oh!", "Marge: A deer!", "Lisa: A female deer!"]

    ...

    >>> for line in doh():

    ...     print(line)

    ...

    Homer: D''oh!

    Marge: A deer!

    Lisa: A female deer!

    ```


    This works perfectly when lists are relatively small. But what if we’re grabbing
    all the dialogue from all the *Simpsons* episodes? Lists use memory.


    Example 4-2 shows how a generator function would dole out the lines.


    Example 4-2. Use yield


    ```

    >>> def doh2():

    ...     yield "Homer: D''oh!"

    ...     yield "Marge: A deer!"

    ...     yield "Lisa: A female deer!"

    ...

    >>> for line in doh2():

    ...     print(line)

    ...

    Homer: D''oh!

    Marge: A deer!

    Lisa: A female deer!

    ```'
