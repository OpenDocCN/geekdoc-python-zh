    \ repeat Example 3-24 in Example 7-7.\n\nExample 7-7. FastAPI header\n\n```\n\
    from fastapi import FastAPI, Header\n\napp = FastAPI()\n\n@app.get(\"/hi\")\n\
    def greet(who:str = Header()):\n    return f\"Hello? {who}?\"\n```\n\nThe Flask\
    \ version is shown in Example 7-8.\n\nExample 7-8. Flask header\n\n```\nfrom flask\
    \ import Flask, request, jsonify\n\napp = Flask(__name__)\n\n@app.route(\"/hi\"\
    , methods=[\"GET\"])\ndef greet():\n    who: str = request.headers.get(\"who\"\
    )\n    return jsonify(f\"Hello? {who}?\")\n```\n\nAs with query parameters, Flask\
    \ keeps request data in the `request` object. This time, it's the `headers` dict\
    \ attribute. The header keys are supposed to be case-insensitive.\n\n# Django\n\
    \nDjango is bigger and more complex than Flask or FastAPI, targeting “perfectionists\
    \ with deadlines,” according to its website. Its built-in object-relational mapper\
    \ (ORM) is useful for sites with major database backends. It's more of a monolith\
    \ than a toolkit."
