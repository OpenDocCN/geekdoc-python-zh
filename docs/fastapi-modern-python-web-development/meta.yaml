  md: "```\n...\n    await asyncio.sleep(3)\n...\n>>> async def a():\n...     print(\"\
    Timing!\")\n...\n>>> async def main():\n...     await asyncio.gather(q(), a())\n\
    ...\n>>> asyncio.run(main())\nWhy can't programmers tell jokes?\nTiming!\n```\n\
    \nThis time, the answer should pop out right after the question, followed by three\
    \ seconds of silence—just as though a programmer is telling it. Ha ha! Ahem.\n\
    \n> I've used asyncio.gather() and asyncio.run() in Example 4-4, but there are\
    \ multiple ways of calling async functions. When using FastAPI, you won't need\
    \ to use these.\n\nPython thinks this when running Example 4-4:\n\n+   1. Execute\
    \ q(). Well, just the first line right now.\n2. OK, you lazy async q(), I've set\
    \ my stopwatch and I'll come back to you in three seconds.\n3. In the meantime\
    \ I'll run a(), printing the answer right away.\n4. No other await, so back to\
    \ q().\n5. Boring event loop! I'll sit here aaaand stare for the rest of the three\
    \ seconds.\n6. OK, now I'm done.\n\nThis example uses asyncio.sleep() for a function\
    \ that takes some time, much like a function that reads a file or accesses a website.\
    \ You put await in front of the function that might spend most of its time waiting.\
    \ And that function needs to have async before its def.\n\n> If you define a function\
    \ with async def, its caller must put an await before the call to it. And the\
    \ caller itself must be declared async def, and its caller must await it, all\
    \ the way up.\n\nBy the way, you can declare a function as async even if it doesn't\
    \ contain an await call to another async function. It doesn't hurt."
