    -   发出指标、日志或跟踪信息\n\nWeb 框架将 HTTP 请求字节转换为数据结构，你可以在 Web 层函数中根据需要从中提取所需内容。\n\n##\
    \ 依赖项的问题\n\n在需要时获取所需内容，并且无需外部代码知道你是如何获取的，这似乎相当合理。但事实证明，这样做会带来一些后果：\n\n*测试*\n你无法测试函数的不同变体，这些变体可能以不同方式查找依赖项。\n\
    \n*隐藏依赖项*\n隐藏细节意味着当外部代码更改时，你的函数所需的代码可能会中断。\n\n*代码重复*\n如果你的依赖项是常见的（例如在数据库中查找用户或组合来自\
    \ HTTP 请求的值），你可能会在多个函数中重复查找代码。\n\n*OpenAPI 可见性*\nFastAPI 为你自动生成的测试页面需要来自依赖注入机制的信息。\n\
    \n## 依赖注入\n\n术语*依赖注入*比听起来简单：将函数所需的任何*特定*信息*传递给*该函数。一种传统的方法是传入一个辅助函数，然后你调用它来获取特定数据。\n\
    \n## FastAPI 依赖项\n\nFastAPI 更进一步：你可以将依赖项定义为函数的参数，FastAPI 会*自动*调用它们并传入它们返回的*值*。例如，一个\
    \ `user_dep` 依赖项可以从 HTTP 参数中获取用户的名称和密码，在数据库中查找它们，并返回一个令牌，你随后使用该令牌来跟踪该用户。你的 Web\
    \ 处理函数永远不会直接调用它；它在函数调用时被处理。\n\n你已经见过一些依赖项，只是没有这样称呼它们：HTTP 数据源，如 `Path`、`Query`、`Body`\
    \ 和 `Header`。这些是从 HTTP 请求的各个区域提取请求数据的函数或 Python 类。它们隐藏了细节，例如有效性检查和数据格式。"
