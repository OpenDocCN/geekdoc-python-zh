  md: '# Other Service-Level Stuff


    We''re in the middle of the stack now—the part that really defines our site''s
    purpose. And so far, we''ve used it only to forward web requests to the (next
    chapter''s) Data layer.


    So far, this book has developed the site iteratively, building a minimal base
    for future work. As you learn more about what you have, what you can do, and what
    users might want, you can branch out and experiment. Some ideas might benefit
    only larger sites, but here are some technical site-helper ideas:


    +   - Logging

    - Metrics

    - Monitoring

    - Tracing


    This section discusses each of these. We''ll revisit these options in “Troubleshooting
    on page 190, to see if they can help diagnose problems.


    # Logging


    FastAPI logs each API call to an endpoint—including the timestamp, method, and
    URL—but not any data delivered via the body or headers.


    # Metrics, Monitoring, Observability


    If you run a website, you probably want to know how it''s doing. For an API website,
    you might want to know which endpoints are being accessed, how many people are
    visiting, and so on. Statistics on such factors are called *metrics*, and the
    gathering of them is *monitoring* or *observability*.


    Popular metrics tools nowadays include [Prometheus](https://prometheus.io/) for
    gathering metrics and [Grafana](https://grafana.com/) for displaying metrics.


    # Tracing


    How well is your site performing? It''s common for metrics to be good overall,
    but with disappointing results here or there. Or the whole site may be a mess.
    Either way, it''s useful to have a tool that measures how long an API call takes,
    end to end—and not just overall time, but the time for each intermediate step.
    If something''s slow, you can find the weak link in the chain. This is *tracing*.


    A new open source project has taken earlier tracing products like [Jaeger](https://www.jaegertracing.io/)
    and branded them as [OpenTelemetry](https://opentelemetry.io/). It has a [Python
    API](https://opentelemetry.io/docs/instrumentation/python/) and at least one [integration
    with FastAPI](https://opentelemetry.io/docs/instrumentation/python/frameworks/fastapi/).'
  merge: -1
  pgno: 137
- img_proc: true
  md: 'To install and configure OpenTelemetry with Python, follow the instructions
    in the [OpenTelemetry Python documentation](https://opentelemetry.io/docs/instrumentation/python/).


    # Other


    These production issues will be discussed in Chapter 13. Besides these, what about
    our domain—cryptids and anything associated with them? Besides bare details on
    explorers and creatures, what else might you want to take on? You may come up
    with new ideas that require changes to the models and other layers. Here are some
    ideas you might try:


    +   - Links of explorers to the creatures that they seek

    - Sighting data

    - Expeditions

    - Photos and videos

    - Sasquatch mugs and T-shirts (Figure 9-1)


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_138_0.png)


    Figure 9-1. A word from our sponsor


    Each of these categories will generally require one or more new models to be defined,
    and new modules and functions. Some will be added in Part IV, which is a gallery
    of applications added to the base built here in Part III.


    # Review


    In this chapter, you replicated some functions from the Web layer and moved the
    fake data that they worked with. The goal was to initiate the new Service layer.
    So far, it’s been a cookie-cutter process, but it will evolve and diverge after
    this. The next chapter builds the final Data layer, yielding a truly live website.'
