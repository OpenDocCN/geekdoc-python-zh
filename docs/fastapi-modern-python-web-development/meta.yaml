    # CHAPTER 14


    # Databases, Data Science, and a Little AI


    # Preview


    This chapter discusses how to use FastAPI to store and retrieve data. It expands
    on the simple SQLite examples of Chapter 10 with the following:


    +   - Other open source databases (relational and not)

    - Higher-level uses of SQLAlchemy

    - Better error checking


    # Data Storage Alternatives


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_212_0.png)


    The term *database* is unfortunately used to refer to three things:


    +   - The server *type*, like PostgreSQL, SQLite, or MySQL

    - A running instance of that *server*

    - A *collection of tables* on that server


    To avoid confusion—referring to an instance of the last bulleted item above as
    a “PostgreSQL database database database”—I’ll attach other terms to indicate
    which one I mean.


    The usual backend for a website is a database. Websites and databases are like
    peanut butter and jelly, and although you could conceivably store your data in
    other ways (or pair peanut butter with pickles), for this book we’ll stick with
    databases.'
- md: "Databases handle many problems that you would otherwise have to solve yourself\
    \ with code, such as these:\n\n- Multiple access\n- Indexing\n- Data consistency\n\
    \nThe general choices for databases are as follows:\n\n- Relational databases,\
    \ with the SQL query language\n- Nonrelational databases, with various query languages\n\
    \n## Relational Databases and SQL\n\nPython has a standard relational API definition\
    \ called DB-API, and it’s supported by Python driver packages for all the major\
    \ databases. Table 14-1 lists some prominent relational databases and their main\
    \ Python driver packages.\n\nTable 14-1. Relational databases and Python drivers\n\
    \n| Database | Python drivers |\n| :--- | :--- |\n| **Open source** | |\n| SQLite\
    \ | sqlite3 |\n| PostgreSQL | psycopg2 and asyncpg |\n| MySQL | MySQLdb and PyMySQL\
    \ |\n| **Commercial** | |\n| Oracle | python-oracledb |\n| SQL Server | pyodbc\
    \ and pymssql |\n| IBM Db2 | ibm_db |\n\nThe main Python packages for relational\
    \ databases and SQL are as follows:\n\n*SQLAlchemy*\nA full-featured library that\
    \ can be used at many levels\n\n*SQLModel*\nA combination of SQLAlchemy and Pydantic,\
    \ by the author of FastAPI\n\n*Records*\nFrom the author of the Requests package,\
    \ a simple query API\n\n## SQLAlchemy\n\nThe most popular Python SQL package is\
    \ SQLAlchemy. Although many explanations of SQLAlchemy discuss only its ORM, it\
    \ has multiple layers, and I'll discuss these bottom-up.\n\n### Core\n\nThe base\
    \ of SQLAlchemy, called *Core*, comprises the following:\n\n- An Engine object\
    \ that implements the DB-API standard\n- URLs that express the SQL server type\
    \ and driver, and the specific database collection on that server\n- Client-server\
    \ connection pools\n- Transactions (COMMIT and ROLLBACK)\n- SQL *dialect* differences\
    \ among various database types\n- Direct SQL (text string) queries\n- Queries\
    \ in the SQLAlchemy Expression Language\n\nSome of these features, like the dialect\
    \ handling, make SQLAlchemy the package of choice for working with various server\
    \ types. You can use it to execute plain DB-API SQL statements or use the SQLAlchemy\
    \ Expression Language.\n\nI've been using the raw DB-API SQLite driver so far\
    \ and will continue. But for larger sites or those that might need to take advantage\
    \ of a special server feature, SQLAlchemy (using basic DB-API, SQLAlchemy Expression\
    \ Language, or the full ORM) is well worth using.\n\n### SQLAlchemy Expression\
    \ Language\n\nThe SQLAlchemy Expression Language is *not* the ORM, but another\
    \ way of expressing queries against relational tables. It maps the underlying\
    \ storage structures to Python classes like `Table` and `Column`, and operations\
    \ to Python methods like `select()` and `insert()`. These functions translate\
    \ to plain SQL strings, and you can access them to see what happened. The language\
    \ is independent of SQL server types. If you find SQL difficult, this may be worth\
    \ trying.\n\nLet's compare a few examples. Example 14-1 shows the plain SQL version.\n\
    \nExample 14-1. Straight SQL code for `get_one()` in `data/explorer.py`\n\n```\n\
    def get_one(name: str) -> Explorer:\n    qry = \"select * from explorer where\
    \ name=:name\"\n    params = {\"name\": name}\n    curs.execute(qry, params)\n\
    \    return row_to_model(curs.fetchone())\n```\n\nExample 14-2 shows a partial\
    \ SQLAlchemy Expression Language equivalent to set up the database, build the\
    \ table, and perform the insertion.\n\nExample 14-2. SQLAlchemy Expression Language\
    \ for get_one()\n\n```\nfrom sqlalchemy import Metadata, Table, Column, Text\n\
    from sqlalchemy import connect, insert\n\nconn = connect(\"sqlite:///cryptid.db\"\
    )\nmeta = Metadata()\nexplorer_table = Table(\n    \"explorer\",\n    meta,\n\
    \    Column(\"name\", Text, primary_key=True),\n    Column(\"country\", Text),\n\
    \    Column(\"description\", Text),\n    )\ninsert(explorer_table).values(\n \
    \   name=\"Beau Buffette\",\n    country=\"US\",\n    description=\"...\")\n```\n\
    \nFor more examples, some alternative documentation is a bit more readable than\
    \ the official pages.\n\n### ORM\n\nAn ORM expresses queries in terms of domain\
    \ data models, not the relational tables and SQL logic at the base of the database\
    \ machinery. The official documentation goes into all the details. The ORM is\
    \ much more complex than the SQL expression language. Developers who prefer fully\
    \ object-oriented patterns usually prefer ORMs.\n\nMany books and articles on\
    \ FastAPI jump right into SQLAlchemy's ORM when they come to the database section.\
    \ I understand the appeal but also know that it requires you to learn another\
    \ abstraction. SQLAlchemy is an excellent package, but if its abstractions don't\
    \ always hold, then you have two problems. The simplest solution may be to just\
    \ use SQL, and move to the Expression Language or ORM if the SQL gets too hairy.\n\
    \n## SQLModel\n\nThe author of FastAPI combined aspects of FastAPI, Pydantic,\
    \ and SQLAlchemy to make SQLModel. It repurposes some development techniques from\
    \ the web world to relational databases. SQLModel matches SQLAlchemy's ORM with\
    \ Pydantic's data definition and validation.\n\n## SQLite\n\nI introduced SQLite\
    \ in Chapter 10, using it for the Data layer examples. It’s public domain—you\
    \ can’t get more open sourcey than that. SQLite is used in every browser and every\
    \ smartphone, making it one of the most widely deployed software packages in the\
    \ world. It’s often overlooked when choosing a relational database, but it’s possible\
    \ that multiple SQLite “servers” could support some large services as well as\
    \ a beefy server like PostgreSQL.\n\n## PostgreSQL\n\nIn the early days of relational\
    \ databases, IBM’s System R was the pioneer, and offshoots battled for the new\
    \ market—mainly open source Ingres versus commercial Oracle. Ingres featured a\
    \ query language named QUEL, and System R had SQL. Although QUEL was considered\
    \ better than SQL by some, Oracle’s adoption of SQL as a standard, plus IBM’s\
    \ influence, helped push Oracle and SQL to success.\n\nYears later, Michael Stonebraker\
    \ returned to migrate Ingres to PostgreSQL. Nowadays, open source developers tend\
    \ to choose PostgreSQL, although MySQL was popular a few years ago and is still\
    \ around.\n\n## EdgeDB\n\nDespite the success of SQL over the years, it does have\
    \ some design flaws that make queries awkward. Unlike the mathematical theory\
    \ that SQL is based on (relational calculus by E. F. Codd), the SQL language design\
    \ itself is not composable. Mainly, this means that it’s hard to nest queries\
    \ within larger ones, leading to more complex and verbose code.\n\nSo, just for\
    \ fun, I’m throwing in a new relational database here. EdgeDB was written (in\
    \ Python!) by the author of Python’s asyncio. It’s described as Post-SQL or graph-relational.\
    \ Under the hood, it uses PostgreSQL to handle the tough system stuff. Edge’s\
    \ contribution is EdgeQL: a new query language that aims to avoid those sharp\
    \ SQL edges; it’s actually translated to SQL for PostgreSQL to execute. “My Experience\
    \ with EdgeDB” by Ivan Daniluk handily compares EdgeQL and SQL. The readable illustrated\
    \ official documentation parallels the book Dracula.\n\nCould EdgeQL spread beyond\
    \ EdgeDB and become an alternative to SQL? Time will tell.\n\n## Nonrelational\
    \ (NoSQL) Databases\n\nBiggies in the open source NoSQL or NewSQL world are listed\
    \ in Table 14-2.\n\nTable 14-2. NoSQL databases and Python drivers\n\n| Database\
    \ | Python drivers |\n| :--- | :--- |\n| Redis | redis-py |\n| MongoDB | PyMongo,\
    \ Motor |\n| Apache Cassandra | DataStax Driver for Apache Cassandra |\n| Elasticsearch\
    \ | Python Elasticsearch Client |\n\nSometimes *NoSQL* means literally *no SQL*,\
    \ but sometimes *not only SQL*. Relational databases enforce structures on data,\
    \ often visualized as rectangular tables with column fields and data rows, similar\
    \ to spreadsheets. To reduce redundancy and improve performance, relational databases\
    \ are *normalized* with *normal forms* (rules for data and structures), such as\
    \ allowing only a single value per cell (row/column intersection).\n\nNoSQL databases\
    \ relax these rules, sometimes allowing varying column/field types across individual\
    \ data rows. Often the *schemas* (database designs) can be ragged structures,\
    \ as you could express in JSON or Python, rather than relational boxes.\n\n###\
    \ Redis\n\n*Redis* is a data structure server that runs completely in memory,\
    \ although it can save to and restore from disk. It closely matches Python's own\
    \ data structures and has become extremely popular.\n\n### MongoDB\n\n*MongoDB*\
    \ is sort of the PostgreSQL of NoSQL servers. A *collection* is the equivalent\
    \ of a SQL table, and a *document* is the equivalent of a SQL table row. Another\
    \ difference, and the main reason for a NoSQL database in the first place, is\
    \ that you don't need to define what a document looks like. In other words, there's\
    \ no fixed *schema*. A document is like a Python dictionary, with any string as\
    \ a key.\n\n### Cassandra\n\nCassandra is a large-scale database that can be distributed\
    \ across hundreds of nodes. It's written in Java.\n\nAn alternative database called\
    \ ScyllaDB is written in C++ and claims to be compatible with Cassandra but more\
    \ performant."
  mdcn: "数据库能处理许多原本需要你自己用代码解决的问题，例如：\n\n- 多用户访问\n- 索引\n- 数据一致性\n\n数据库的常见选择如下：\n\n\
    - 关系型数据库，使用 SQL 查询语言\n- 非关系型数据库，使用多种查询语言\n\n## 关系型数据库与 SQL\n\nPython 有一个标准的关系型\
    \ API 定义，称为 DB-API，所有主流数据库的 Python 驱动包都支持它。表 14-1 列出了一些著名的关系型数据库及其主要的 Python 驱动包。\n\
    \n表 14-1. 关系型数据库与 Python 驱动\n\n| 数据库 | Python 驱动 |\n| :--- | :--- |\n| **开源**\
    \ | |\n| SQLite | sqlite3 |\n| PostgreSQL | psycopg2 和 asyncpg |\n| MySQL | MySQLdb\
    \ 和 PyMySQL |\n| **商业** | |\n| Oracle | python-oracledb |\n| SQL Server | pyodbc\
    \ 和 pymssql |\n| IBM Db2 | ibm_db |\n\n关系型数据库和 SQL 的主要 Python 包如下：\n\n*SQLAlchemy*\n\
    一个功能全面的库，可在多个层次上使用\n\n*SQLModel*\n由 FastAPI 的作者开发，结合了 SQLAlchemy 和 Pydantic\n\n\
    *Records*\n由 Requests 包的作者开发，提供简单的查询 API\n\n## SQLAlchemy\n\n最受欢迎的 Python SQL\
    \ 包是 SQLAlchemy。尽管许多关于 SQLAlchemy 的讨论只涉及其 ORM，但它实际上包含多个层次，我将自底向上进行介绍。\n\n### 核心\n\
    \nSQLAlchemy 的基础称为 *Core*，包含以下部分：\n\n- 一个实现 DB-API 标准的 Engine 对象\n- 表达 SQL 服务器类型、驱动以及该服务器上特定数据库集合的\
    \ URL\n- 客户端-服务器连接池\n- 事务（COMMIT 和 ROLLBACK）\n- 各种数据库类型之间的 SQL *方言* 差异\n- 直接 SQL（文本字符串）查询\n\
    - 使用 SQLAlchemy 表达式语言的查询\n\n其中一些特性，比如方言处理，使得 SQLAlchemy 成为处理各种服务器类型的首选包。你可以用它来执行普通的\
    \ DB-API SQL 语句，也可以使用 SQLAlchemy 表达式语言。\n\n到目前为止，我一直在使用原始的 DB-API SQLite 驱动，并将继续使用。但对于较大的站点或可能需要利用特殊服务器功能的站点，SQLAlchemy（使用基本的\
    \ DB-API、SQLAlchemy 表达式语言或完整的 ORM）非常值得使用。\n\n### SQLAlchemy 表达式语言\n\nSQLAlchemy\
    \ 表达式语言 *不是* ORM，而是另一种表达关系表查询的方式。它将底层存储结构映射到 Python 类，如 `Table` 和 `Column`，并将操作映射到\
    \ Python 方法，如 `select()` 和 `insert()`。这些函数会转换为普通的 SQL 字符串，你可以访问它们来查看具体发生了什么。这种语言独立于\
    \ SQL 服务器类型。如果你觉得 SQL 很难，这可能值得一试。\n\n让我们比较几个例子。示例 14-1 展示了普通 SQL 版本。\n\n示例 14-1.\
    \ `data/explorer.py` 中 `get_one()` 的纯 SQL 代码\n\n```\ndef get_one(name: str) ->\
    \ Explorer:\n    qry = \"select * from explorer where name=:name\"\n    params\
    \ = {\"name\": name}\n    curs.execute(qry, params)\n    return row_to_model(curs.fetchone())\n\
    ```\n\n示例 14-2 展示了部分 SQLAlchemy 表达式语言等效代码，用于设置数据库、构建表并执行插入操作。\n\n示例 14-2. 用于 get_one()\
    \ 的 SQLAlchemy 表达式语言\n\n```\nfrom sqlalchemy import Metadata, Table, Column, Text\n\
    from sqlalchemy import connect, insert\n\nconn = connect(\"sqlite:///cryptid.db\"\
    )\nmeta = Metadata()\nexplorer_table = Table(\n    \"explorer\",\n    meta,\n\
    \    Column(\"name\", Text, primary_key=True),\n    Column(\"country\", Text),\n\
    \    Column(\"description\", Text),\n    )\ninsert(explorer_table).values(\n \
    \   name=\"Beau Buffette\",\n    country=\"US\",\n    description=\"...\")\n```\n\
    \n更多示例，请参考一些替代文档，它们比官方页面更易读。\n\n### ORM\n\nORM 使用领域数据模型来表达查询，而不是基于数据库机制底层的关系表和\
    \ SQL 逻辑。官方文档详细介绍了所有细节。ORM 比 SQL 表达式语言复杂得多。偏好完全面向对象模式的开发者通常更喜欢 ORM。\n\n许多关于 FastAPI\
    \ 的书籍和文章在涉及数据库部分时，会直接跳到 SQLAlchemy 的 ORM。我理解其吸引力，但也知道这需要你学习另一种抽象。SQLAlchemy 是一个优秀的包，但如果其抽象并不总是成立，那么你就会面临两个问题。最简单的解决方案可能就是直接使用\
    \ SQL，如果 SQL 变得太复杂，再转向表达式语言或 ORM。\n\n## SQLModel\n\nFastAPI 的作者结合了 FastAPI、Pydantic\
    \ 和 SQLAlchemy 的特点，创建了 SQLModel。它将 Web 世界的一些开发技术重新用于关系型数据库。SQLModel 将 SQLAlchemy\
    \ 的 ORM 与 Pydantic 的数据定义和验证相匹配。\n\n## SQLite\n\n我在第 10 章介绍了 SQLite，并将其用于数据层示例。它是公共领域的——没有比这更开源的了。SQLite\
    \ 被用于每个浏览器和每部智能手机，使其成为世界上部署最广泛的软件包之一。在选择关系型数据库时，它经常被忽视，但多个 SQLite “服务器”可能像强大的\
    \ PostgreSQL 服务器一样，也能支持一些大型服务。\n\n## PostgreSQL\n\n在关系型数据库的早期，IBM 的 System R 是先驱，其衍生产品争夺新市场——主要是开源的\
    \ Ingres 对阵商业的 Oracle。Ingres 采用名为 QUEL 的查询语言，而 System R 使用 SQL。尽管有些人认为 QUEL 优于\
    \ SQL，但 Oracle 采用 SQL 作为标准，加上 IBM 的影响力，帮助推动了 Oracle 和 SQL 的成功。\n\n多年后，Michael\
    \ Stonebraker 回归并将 Ingres 迁移到 PostgreSQL。如今，开源开发者倾向于选择 PostgreSQL，尽管 MySQL 几年前很流行，现在仍然存在。\n\
    \n## EdgeDB\n\n尽管 SQL 多年来取得了成功，但它确实存在一些设计缺陷，使得查询变得笨拙。与 SQL 所基于的数学理论（E. F. Codd\
    \ 的关系演算）不同，SQL 语言设计本身是不可组合的。这主要意味着很难将查询嵌套在更大的查询中，导致代码更复杂和冗长。\n\n所以，只是为了好玩，我在这里介绍一个新的关系型数据库。EdgeDB\
    \ 是由 Python asyncio 的作者用 Python 编写的！它被描述为后 SQL 或图关系型。在底层，它使用 PostgreSQL 来处理复杂的系统事务。Edge\
    \ 的贡献是 EdgeQL：一种新的查询语言，旨在避免 SQL 那些尖锐的边缘；它实际上被转换为 SQL 供 PostgreSQL 执行。Ivan Daniluk\
    \ 的《我的 EdgeDB 体验》一文方便地比较了 EdgeQL 和 SQL。其可读的图文并茂的官方文档与《德古拉》一书相媲美。\n\nEdgeQL 能否超越\
    \ EdgeDB，成为 SQL 的替代品？时间会证明一切。\n\n## 非关系型（NoSQL）数据库\n\n开源 NoSQL 或 NewSQL 领域的巨头列于表\
    \ 14-2。\n\n表 14-2. NoSQL 数据库与 Python 驱动\n\n| 数据库 | Python 驱动 |\n| :--- | :---\
    \ |\n| Redis | redis-py |\n| MongoDB | PyMongo, Motor |\n| Apache Cassandra |\
    \ DataStax Driver for Apache Cassandra |\n| Elasticsearch | Python Elasticsearch\
    \ Client |\n\n有时 *NoSQL* 字面意思是 *没有 SQL*，但有时是 *不仅仅是 SQL*。关系型数据库对数据施加结构，通常可视化为带有列字段和数据行的矩形表，类似于电子表格。为了减少冗余并提高性能，关系型数据库使用\
    \ *范式*（关于数据和结构的规则）进行 *规范化*，例如只允许每个单元格（行/列交叉点）有一个值。\n\nNoSQL 数据库放宽了这些规则，有时允许不同的数据行具有不同的列/字段类型。通常，*模式*（数据库设计）可以是参差不齐的结构，就像你可以用\
    \ JSON 或 Python 表达的那样，而不是关系型的方框。\n\n### Redis\n\n*Redis* 是一个完全在内存中运行的数据结构服务器，尽管它可以保存到磁盘并从磁盘恢复。它与\
    \ Python 自身的数据结构紧密匹配，已经变得极其流行。\n\n### MongoDB\n\n*MongoDB* 有点像 NoSQL 服务器中的 PostgreSQL。一个\
    \ *集合* 相当于一个 SQL 表，一个 *文档* 相当于一个 SQL 表行。另一个区别，也是使用 NoSQL 数据库的主要原因，是你不需要定义文档的外观。换句话说，没有固定的\
    \ *模式*。文档就像一个 Python 字典，任何字符串都可以作为键。\n\n### Cassandra\n\nCassandra 是一个大规模数据库，可以分布在数百个节点上。它是用\
    \ Java 编写的。\n\n另一个名为 ScyllaDB 的替代数据库是用 C++ 编写的，声称与 Cassandra 兼容但性能更高。"
