  md: "# CHAPTER 3\nFastAPI Tour\n\n> FastAPI is a modern, fast (high-performance)\
    \ web framework for building APIs with Python 3.6+ based on standard Python type\
    \ hints.\n—Sebastián Ramírez, creator of FastAPI\n\n# Preview\n\nFastAPI was announced\
    \ in 2018 by Sebastián Ramírez. It's more modern in many senses than most Python\
    \ web frameworks—taking advantage of features that have been added to Python 3\
    \ in the last few years. This chapter is a quick overview of FastAPI's main features,\
    \ with emphasis on the first things that you'll want to know: how to handle web\
    \ requests and responses.\n\n# What Is FastAPI?\n\nLike any web framework, FastAPI\
    \ helps you build web applications. Every framework is designed to make some operations\
    \ easier—by features, omissions, and defaults. As the name implies, FastAPI targets\
    \ development of web APIs, although you can use it for traditional web content\
    \ applications as well.\n\nThe FastAPI website claims these advantages:\n\n+ \
    \  *Performance*\n    As fast as Node.js and Go in some cases, unusual for Python\
    \ frameworks.\n\n*Faster development*\n    No sharp edges or oddities.\n\n*Better\
    \ code quality*\n    Type hinting and models help reduce bugs."
