  md: "+   - If you want to track only admin visitors and leave the rest anonymous:\n\
    \  - Use an Admin table of authenticated usernames. You'd look up the name from\
    \ the Admin table, and if matched, compare the hashed passwords from the User\
    \ table.\n- If *all* visitors should be authenticated, but you need to authorize\
    \ admins for only some endpoints:\n  - Authenticate everyone as in the earlier\
    \ examples (from the User table), and then check the Admin table to see if this\
    \ user is also an admin.\n- For more than one type of permission (such as read-only,\
    \ read, write):\n  - Use a Permission definition table.\n  - Use a UserPermission\
    \ table that pairs users and permissions. This is sometimes called an *access\
    \ control list*.\n- If permission combinations are complex, add a level and define\
    \ *roles* (independent sets of permissions):\n  - Create a Role table.\n  - Create\
    \ a UserRole table pairing User and Role entries. This is sometimes called *role-based\
    \ access control* (RBAC).\n\n# Middleware\n\nFastAPI enables insertion of code\
    \ at the Web layer that does the following:\n\n+   - Intercepts the request\n\
