    for a full end-to-end (Web → Service → Data) website.


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_111_0.png)


    Allowing any anonymous visitor to perform all these actions will be an object
    lesson in “why we can’t have nice things.” Chapter 11 discusses the auth (authentication
    and authorization) needed to define roles and limit who can do what. For the rest
    of the current chapter, we’ll sidestep auth and just show how to handle the raw
    web functions.


    # Interlude: Top-Down, Bottom-Up, Middle-Out?


    When designing a website, you could start from one of the following:


    +   - The Web layer and work down

    - The Data layer and work up

    - The Service layer and work out in both directions


    Do you already have a database, installed and loaded with data, and are just pining
    for a way to share it with the world? If so, you may want to tackle the Data layer’s
    code and tests first, then the Service layer, and write the Web layer last.


    If you’re following domain-driven design, you might start in the middle Service
    layer, defining your core entities and data models. Or you may want to evolve
    the web interface first, and fake calls to the lower layers until you know what
    you’ll expect of them.


    You’ll find very good design discussions and recommendations in these books:


    +   - *Clean Architectures in Python* by Leonardo Giordani (Digital Cat Books)

    - *Architecture Patterns with Python* by Harry J.W. Percival and Bob Gregory (O’Reilly)

    - *Microservice APIs* by José Haro Peralta (Manning)


    In these and other sources, you’ll see terms like hexagonal architecture, ports,
    and adapters. Your choices on how to proceed largely depend on what data you have
    already and how you want to approach the work of building a site.


    I’m guessing that many of you are mainly interested in trying out FastAPI and
    its related technologies, and don’t necessarily have a predefined mature data
    domain that you want to instrument right away.'
  - '[PAGE 112]


    So, in this book I’m taking the web-first approach—step-by-step, starting with
    essential parts, and adding others as needed on the way down. Sometimes experiments
    work, sometimes not. I’ll avoid the urge to stuff everything into this Web layer
    at first.


    > This Web layer is just one way of passing data between a user and a service.
    Alternate ways exist, such as by a CLI or software development kit (SDK). In other
    frameworks, you might see this Web layer called a *view* or *presentation* layer.


    # RESTful API Design


    HTTP is a way to get commands and data between web clients and servers. But, just
    as you can combine ingredients from your refrigerator in ways from ghastly to
    gourmet, some recipes for HTTP work better than others.


    In Chapter 1, I mentioned that *RESTful* became a useful, though sometimes fuzzy,
    model for HTTP development. RESTful designs have these core components:


    +   *Resources*

    The data elements your application manages


    *IDs*

    Unique resource identifiers


    *URLs*

    Structured resource and ID strings


    *Verbs or actions*

    Terms that accompany URLs for different purposes:


    GET

    Retrieve a resource.


    POST

    Create a new resource.


    PUT

    Completely replace a resource.


    PATCH

    Partially replace a resource.


    DELETE

    Resource goes kaboom.'
  - '[PAGE 113]


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_113_0.png)


    You''ll see disagreement about the relative merits of PUT versus PATCH. If you
    don''t need to distinguish between a partial modification and a full one (replacement),
    you may not need both.


    General RESTful rules for combining verbs and URLs containing resources and IDs
    use these patterns of path parameters (content between the / in the URL):


    verb /resource/

    Apply verb to all resources of type resource.


    verb /resource/id

    Apply verb to the resource with ID id.


    Using the example data for this book, a GET request to the endpoint /thing would
    return data on all explorers, but a GET request for /thing/abc would give you
    data for only the thing resource with ID abc.


    Finally, web requests often carry more information, indicating to do the following:


    +   - Sort results

    - Paginate results

    - Perform another function


    Parameters for these can sometimes be expressed as path parameters (tacked onto
    the end, after another /) but are often included as query parameters (var=val
    stuff after the ? in the URL). Because URLs have size limits, large requests are
    often conveyed in the HTTP body.


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_113_1.png)


    Most authors recommend using plurals when naming the resource, and related namespaces
    like API sections and database tables. I followed this advice for a long time
    but now feel that singular names are simpler for many reasons (including oddities
    of the English language):


    +   - Some words are their own plurals: series, fish

    - Some words have irregular plurals: children, people

    - You need bespoke singular to/from plural conversion code in many places


    For these reasons, I''m using a singular naming scheme in many places in this
    book. This is against usual RESTful advice, so feel free to ignore this if you
    disagree.'
