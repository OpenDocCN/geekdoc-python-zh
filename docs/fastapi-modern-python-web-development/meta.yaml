    \n## Review\n\nAfter an overview of ways of increasing concurrency, this chapter\
    \ expanded on functions that use the recent Python keywords `async` and `await`.\
    \ It showed how FastAPI and Starlette handle both plain old synchronous functions\
    \ and these new async funky functions.\n\nThe next chapter introduces the second\
    \ leg of FastAPI: how Pydantic helps you define your data.\n\n## CHAPTER 5\nPydantic,\
    \ Type Hints, and Models Tour\n\n> Data validation and settings management using\
    \ Python type hints.\n> Fast and extensible, Pydantic plays nicely with your linters/IDE/brain.\
    \ Define how data should be in pure, canonical Python 3.6+; validate it with Pydantic.\n\
    > —Samuel Colvin, developer of Pydantic\n\n## Preview\n\nFastAPI stands largely\
    \ on a Python package called Pydantic. This uses *models* (Python object classes)\
    \ to define data structures. These are heavily used in FastAPI applications and\
    \ are a real advantage when writing larger applications.\n\n## Type Hinting\n\n\
    It's time to learn a little more about Python *type hints*.\nChapter 2 mentioned\
    \ that, in many computer languages, a variable points directly to a value in memory.\
    \ This requires the programmer to declare its type, so the size and bits of the\
    \ value can be determined. In Python, variables are just names associated with\
    \ objects, and it's the objects that have types.\nIn standard programming, a variable\
    \ is usually associated with the same object. If we associate a type hint with\
    \ that variable, we can avoid some programming mistakes. So Python added type\
    \ hinting to the language, in the standard typing module. The Python interpreter\
    \ ignores the type hint syntax and runs the program as though it isn't there.\
    \ Then what's the point?\nYou might treat a variable as a string in one line,\
    \ and forget later and assign it an object of a different type. Although compilers\
    \ for other languages would complain, Python won't. The standard Python interpreter\
    \ will catch normal syntax errors and runtime exceptions, but not mixing types\
    \ for a variable. Helper tools like mypy pay attention to type hints and warn\
    \ you about any mismatches.\n\nAlso, the hints are available to Python developers,\
    \ who can write tools that do more than type error checking. The following sections\
    \ describe how the Pydantic package was developed to address needs that weren’t\
    \ obvious. Later, you’ll see how its integration with FastAPI makes a lot of web\
    \ development issues much easier to handle.\n\nBy the way, what do type hints\
    \ look like? There’s one syntax for variables and another for function return\
    \ values.\n\nVariable type hints may include only the type:\n\n```\nname: type\n\
    ```\n\nor also initialize the variable with a value:\n\n```\nname: type = value\n\
    ```\n\nThe *type* can be one of the standard Python simple types like `int` or\
    \ `str`, or collection types like `tuple`, `list`, or `dict`:\n\n```\nthing: str\
    \ = \"yeti\"\n```\n\nBefore Python 3.9, you need to import capitalized versions\
    \ of these standard type names from the typing module:\n\n```\nfrom typing import\
    \ Str\nthing: Str = \"yeti\"\n```\n\nHere are some examples with initializations:\n\
    \n```\nphysics_magic_number: float = 1.0/137.03599913\nhp_lovecraft_noun: str\
    \ = \"ichor\"\nexploding_sheep: tuple = \"sis\", \"boom\", bah!\"\nresponses:\
    \ dict = {\"Marco\": \"Polo\", \"answer\": 42}\n```\n\nYou can also include subtypes\
    \ of collections:\n\n```\nname: dict[keytype, valtype] = {key1: val1, key2: val2}\n\
    ```\n\nThe typing module has useful extras for subtypes; the most common are as\
    \ follows:\n\n- **Any**\n  Any type\n- **Union**\n  Any type of those specified,\
    \ such as `Union[str, int]`.\n\nIn Python 3.10 and up, you can say `type1 | type2`\
    \ instead of `Union[type1, type2]`.\n\nExamples of Pydantic definitions for a\
    \ Python `dict` include the following:\n\n```python\nfrom typing import Any\n\
    responses: dict[str, Any] = {\"Marco\": \"Polo\", \"answer\": 42}\n```\n\nOr,\
    \ a little more specific:\n\n```python\nfrom typing import Union\nresponses: dict[str,\
    \ Union[str, int]] = {\"Marco\": \"Polo\", \"answer\": 42}\n```\n\nor (Python\
    \ 3.10 and up):\n\n```python\nresponses: dict[str, str | int] = {\"Marco\": \"\
    Polo\", \"answer\": 42}\n```\n\nNotice that a type-hinted variable line is legal\
    \ Python, but a bare variable line is not:\n\n```\n$ python\n...\n>>> thing0\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    NameError: name 'thing0' is not defined\n>>> thing0: str\n```\n\nAlso, incorrect\
    \ type uses are not caught by the regular Python interpreter:\n\n```\n$ python\n\
    ...\n>>> thing1: str = \"yeti\"\n>>> thing1 = 47\n```\n\nBut they will be caught\
    \ by mypy. If you don't already have it, run `pip install mypy`. Save those two\
    \ preceding lines to a file called `stuff.py`, and then try this:\n\n```\n$ mypy\
    \ stuff.py\nstuff.py:2: error: Incompatible types in assignment\n(expression has\
    \ type \"int\", variable has type \"str\")\nFound 1 error in 1 file (checked 1\
    \ source file)\n```\n\nA function return type hint uses an arrow instead of a\
    \ colon:\n\n```python\nfunction(args) -> type:\n```\n\nHere's a Pydantic example\
    \ of a function return:\n\n```python\ndef get_thing() -> str:\n    return \"yeti\"\
    \n```\n\nYou can use any type, including classes that you've defined or combinations\
    \ of them. You'll see that in a few pages.\n\n## Data Grouping\n\nOften we need\
    \ to keep a related group of variables together rather than passing around lots\
    \ of individual variables. How do we integrate multiple variables as a group and\
    \ keep the type hints?\n\nLet's leave behind our tepid greeting example from previous\
    \ chapters and start using richer data from now on. As in the rest of this book,\
    \ we'll use examples of *cryptids* (imaginary creatures) and the (also imaginary)\
    \ explorers who seek them. Our initial cryptid definitions will include only string\
    \ variables for the following:\n\n- **name**\n    Key\n- **country**\n    Two-character\
    \ ISO country code (3166-1 alpha 2) or * = all\n- **area**\n    Optional; United\
    \ States state or other country subdivision\n- **description**\n    Free-form\n\
    - **aka**\n    Also known as...\n\nAnd explorers will have the following:\n\n\
    - **name**\n    Key\n- **country**\n    Two-character ISO country code\n- **description**\n\
    \    Free-form"
  mdcn: "所以你可以尝试以下方法之一：\n\n-   在一个房间里完成所有工作，然后到下一个房间，依此类推。\n-   在一个房间里完成一项特定任务，然后到下一个房间，依此类推。比如在厨房和餐厅擦拭银器，或在台球室擦拭台球。\n\
    \n这些方法的总耗时会不同吗？也许。但更重要的可能是考虑你是否需要为任何步骤等待相当长的时间。一个例子可能就在脚下：清洁地毯并给地板打蜡后，它们可能需要干燥数小时，才能将家具搬回原处。\n\
    \n那么，这是你每个房间的计划：\n\n1.  清洁所有固定部件（窗户等）。\n2.  将房间里的所有家具搬到门厅。\n3.  清除地毯和/或硬木地板上多年的污垢。\n\
    4.  执行以下操作之一：\n    a. 等待地毯或蜡干燥，但请与你的奖金说再见。\n    b. 现在就去下一个房间，并重复。在最后一个房间之后，将家具搬回第一个房间，依此类推。\n\
    \n等待干燥的方法是同步的，如果时间不是问题并且你需要休息，这可能是最好的选择。第二种是异步的，节省了每个房间的等待时间。\n\n假设你选择了异步路径，因为钱。你让这处旧宅闪闪发光，并从感激的客户那里获得了奖金。后来的派对非常成功，除了这些问题：\n\
    \n1.  一位没有梗的客人装扮成马里奥。\n2.  你在舞厅给舞池打蜡过度，微醺的普朗姆教授穿着袜子滑来滑去，直到他撞到一张桌子，把香槟洒在了斯嘉丽小姐身上。\n\
    \n这个故事的寓意：\n\n-   需求可能相互冲突和/或很奇怪。\n-   估算时间和工作量可能取决于许多因素。\n-   任务排序可能既是科学也是艺术。\n\
    -   当一切完成时，你会感觉很棒。嗯，拉面。\n\n## 回顾\n\n在概述了增加并发性的方法之后，本章扩展了使用 Python 最新关键字 `async`\
    \ 和 `await` 的函数。它展示了 FastAPI 和 Starlette 如何处理普通的同步函数和这些新的异步函数。\n\n下一章将介绍 FastAPI\
    \ 的第二条腿：Pydantic 如何帮助你定义数据。\n\n## 第 5 章\nPydantic、类型提示和模型之旅\n\n> 使用 Python 类型提示进行数据验证和设置管理。\n\
    > 快速且可扩展，Pydantic 与你的 linter/IDE/大脑配合良好。用纯粹的、规范的 Python 3.6+ 定义数据应有的样子；用 Pydantic\
    \ 验证它。\n> ——Samuel Colvin，Pydantic 开发者\n\n## 预览\n\nFastAPI 主要建立在一个名为 Pydantic\
    \ 的 Python 包之上。它使用 *模型*（Python 对象类）来定义数据结构。这些在 FastAPI 应用程序中被广泛使用，并且在编写较大的应用程序时是一个真正的优势。\n\
    \n## 类型提示\n\n是时候多了解一点 Python 的 *类型提示* 了。\n第 2 章提到，在许多计算机语言中，变量直接指向内存中的值。这要求程序员声明其类型，以便可以确定值的大小和位数。在\
    \ Python 中，变量只是与对象关联的名称，而对象才有类型。\n在标准编程中，一个变量通常与同一个对象关联。如果我们将类型提示与该变量关联，就可以避免一些编程错误。因此，Python\
    \ 在标准 typing 模块中向语言添加了类型提示。Python 解释器忽略类型提示语法，就像它不存在一样运行程序。那么它的意义何在？\n你可能在一行中将变量视为字符串，后来忘记并给它赋值一个不同类型的对象。虽然其他语言的编译器会报错，但\
    \ Python 不会。标准的 Python 解释器会捕获正常的语法错误和运行时异常，但不会捕获变量的类型混合。像 mypy 这样的辅助工具会关注类型提示，并在出现任何不匹配时向你发出警告。\n\
    \n此外，这些提示对 Python 开发者可用，他们可以编写比类型错误检查功能更多的工具。以下部分描述了 Pydantic 包是如何开发出来以解决那些不明显的需求的。稍后，你将看到它与\
    \ FastAPI 的集成如何使许多 Web 开发问题更容易处理。\n\n顺便问一下，类型提示是什么样子的？变量有一种语法，函数返回值有另一种语法。\n\n\
    变量类型提示可以只包含类型：\n\n```\nname: type\n```\n\n或者也可以用值初始化变量：\n\n```\nname: type = value\n\
    ```\n\n*类型* 可以是标准的 Python 简单类型之一，如 `int` 或 `str`，也可以是集合类型，如 `tuple`、`list` 或 `dict`：\n\
    \n```\nthing: str = \"yeti\"\n```\n\n在 Python 3.9 之前，你需要从 typing 模块导入这些标准类型名称的大写版本：\n\
    \n```\nfrom typing import Str\nthing: Str = \"yeti\"\n```\n\n以下是一些带初始化的例子：\n\n\
    ```\nphysics_magic_number: float = 1.0/137.03599913\nhp_lovecraft_noun: str =\
    \ \"ichor\"\nexploding_sheep: tuple = \"sis\", \"boom\", bah!\"\nresponses: dict\
    \ = {\"Marco\": \"Polo\", \"answer\": 42}\n```\n\n你也可以包含集合的子类型：\n\n```\nname:\
    \ dict[keytype, valtype] = {key1: val1, key2: val2}\n```\n\ntyping 模块对子类型有一些有用的扩展；最常见的如下：\n\
    \n-   **Any**\n    任何类型\n-   **Union**\n    指定类型中的任何一种，例如 `Union[str, int]`。\n\
