- img_proc: true
  md: "Why not write your own functions to do this? You could, but you would not have\
    \ these:\n\n+   - Data validity checks\n- Format conversions\n- Automatic documentation\n\
    \nIn many other web frameworks, you would do these checks inside your own functions.\
    \ You’ll see examples of this in Chapter 7, which compares FastAPI with Python\
    \ web frameworks like Flask and Django. But in FastAPI, you can handle your own\
    \ dependencies, much as the built-in ones do.\n\n# Writing a Dependency\n\nIn\
    \ FastAPI, a dependency is something that’s executed, so a dependency object needs\
    \ to be of the type Callable, which includes functions and classes—things that\
    \ you call, with parentheses and optional arguments.\n\nExample 6-1 shows a user_dep()\
    \ dependency function that takes name and password string arguments, and just\
    \ returns True if the user is valid. For this first version, let’s have the function\
    \ return True for anything.\n\nExample 6-1. A dependency function\n\n```\nfrom\
    \ fastapi import FastAPI, Depends, Params\n\napp = FastAPI()\n\n# the dependency\
    \ function:\ndef user_dep(name: str = Params, password: str = Params):\n    return\
    \ {\"name\": name, \"valid\": True}\n\n# the path function / web endpoint:\n@app.get(\"\
    /user\")\ndef get_user(user: dict = Depends(user_dep)) -> dict:\n    return user\n\
    ```\n\nHere, user_dep() is a dependency function. It acts like a FastAPI path\
    \ function (it knows about things like Params, etc.), but doesn’t have a path\
    \ decorator above it. It’s a helper, not a web endpoint itself.\n\nThe path function\
    \ get_user() says that it expects an argument variable called user, and that variable\
    \ will get its value from the dependency function user_dep()."
