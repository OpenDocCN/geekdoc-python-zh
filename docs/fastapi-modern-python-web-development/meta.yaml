- md: "Click that down arrow on the right, then the Try It Out button, and then the\
    \ Execute button. You'll see a form requesting the username and password. Type\
    \ anything. The documentation form will hit that server endpoint and show those\
    \ values in the response.\n\nThese tests show that you can get a username and\
    \ password to the server and back (although none of these actually checked anything).\
    \ Something in the server needs to verify that this name and password match the\
    \ approved values. So, in Example 11-4, I'll include a single secret username\
    \ and password in the web server. The username and password that you pass in now\
    \ needs to match them (each is a *shared secret*), or you'll get an exception.\
    \ The HTTP status code 401 is officially called Unauthorized, but it really means\
    \ *unauthenticated*.\n\n![img](img/1d00ed3e85bc756220a3f1a1e9a9664f_164_0.png)\n\
    \nInstead of memorizing all the HTTP status codes, you can import FastAPI's status\
    \ module (which itself is imported directly from Starlette). So you can use the\
    \ more explanatory `status_code=HTTP_401_UNAUTHORIZED` in Example 11-4 instead\
    \ of a plain `status_code=401`.\n\n*Example 11-4. Add a secret username and password\
    \ to auth.py*\n\n```python\nimport uvicorn\nfrom fastapi import Depends, FastAPI,\
    \ HTTPException\nfrom fastapi.security import HTTPBasic, HTTPBasicCredentials\n\
    \napp = FastAPI()\n\nsecret_user: str = \"newphone\"\nsecret_password: str = \"\
    whodis?\"\n\nbasic: HTTPBasicCredentials = HTTPBasic()\n\n@app.get(\"/who\")\n\
    def get_user(\n    creds: HTTPBasicCredentials = Depends(basic)) -> dict:\n  \
    \  if (creds.username == secret_user and\n        creds.password == secret_password):\n\
    \        return {\"username\": creds.username,\n                \"password\":\
    \ creds.password}\n    raise HTTPException(status_code=401, detail=\"Hey!\")\n\
    \nif __name__ == \"__main__\":\n    uvicorn.run(\"auth:app\", reload=True)\n```\n\
    \nMisguessing the username and password will earn a mild 401 rebuke in Example\
    \ 11-5.\n\nExample 11-5. Test with HTTPie and a mismatched username/password\n\
    \n```\n$ http -a me:secret localhost:8000/who\nHTTP/1.1 401 Unauthorized\ncontent-length:\
    \ 17\ncontent-type: application/json\ndate: Fri, 03 Mar 2023 03:25:09 GMT\nserver:\
    \ uvicorn\n\n{\n    \"detail\": \"Hey!\"\n}\n```\n\nUsing the magic combination\
    \ returns the username and password, as before, in Example 11-6.\n\nExample 11-6.\
    \ Test with HTTPie and the correct username/password\n\n```\n$ http -q -a newphone:whodis?\
    \ localhost:8000/who\n{\n    \"password\": \"whodis?\",\n    \"username\": \"\
    newphone\"\n}\n```\n\n## Simple Individual Authentication\n\nThe previous section\
    \ showed how you could use a shared secret to control access. It's a broad approach,\
    \ not very secure. And it doesn't tell you anything about the individual visitor,\
    \ just that they (or a sentient AI) know the secret.\nMany websites want to do\
    \ the following:\n\n- Define individual visitors in some way\n- Identify specific\
    \ visitors as they access certain endpoints (authentication)\n- Possibly assign\
    \ different permissions to some visitors and endpoints (authorization)\n- Possibly\
    \ save specific information per visitor (interests, purchases, and so on)\n\n\
    If your visitors are humans, you may want them to provide a username or email\
    \ and a password. If they're external programs, you may want them to provide an\
    \ API key and secret.\n\n![img](img/1d00ed3e85bc756220a3f1a1e9a9664f_166_0.png)\n\
    \nFrom here on, I'll use just *username* to refer to either a user-selected name\
    \ or an email.\n\nTo authenticate real individual users instead of a fake one,\
    \ you'll need to do a bit more:\n\n- Pass the user values (name and password)\
    \ to the API server endpoints as HTTP headers.\n- Use HTTPS instead of HTTP, to\
    \ avoid anyone snooping the text of these headers.\n- *Hash* the password to a\
    \ different string. The result is not “de-hashable”—you can't derive the original\
    \ password from its hash.\n- Make a real database store a User database table\
    \ containing the username and the hashed password (never the original plain-text\
    \ password).\n- Hash the newly input password and compare the result with the\
    \ hashed password in the database.\n- If the username and hashed password match,\
    \ pass the matching User object up the stack. If they don't match, return None\
    \ or raise an exception.\n- In the Service layer, fire off any metrics/logging/whatever\
    \ that are relevant to individual user authentication.\n- In the Web layer, send\
    \ the authenticated user info to any functions that require it.\n\nI'll show you\
    \ how to do all these things in the following sections, using recent tools like\
    \ OAuth2 and JWT.\n\n## Fancier Individual Authentication\n\nIf you want to authenticate\
    \ individuals, you have to store some individual information somewhere—for example,\
    \ in a database containing records with at least a key (username or API key),\
    \ and a secret (password or API secret). Your website visitors will provide these\
    \ when accessing protected URLs, and you need something in the database to match\
    \ them with.\n\nThe official FastAPI security docs ([introductory](https://fastapi.tiangolo.com/tutorial/security/)\
    \ and [advanced](https://fastapi.tiangolo.com/advanced/security/)) have top-down\
    \ descriptions of how to set up authentication for multiple users, using a local\
    \ database. But, example web functions fake the actual database access.\n\nHere,\
    \ you'll do the opposite: starting at the Data layer and working up. You'll define\
    \ how a user/visitor is defined, stored, and accessed. Then you'll work up to\
    \ the Web layer, and how user identification is passed in, evaluated, and authenticated.\n\
    \n## OAuth2\n\n> OAuth 2.0, which stands for “Open Authorization,” is a standard\
    \ designed to allow a website or application to access resources hosted by other\
    \ web apps on behalf of a user.\n—Auth0\n\nIn the early trusting web days, you\
    \ could provide your login name and password of a website (let's call it B) to\
    \ another website (A, of course) and let it access stuff on B for you. This would\
    \ give *A full access* to B, although it was trusted to access only what it was\
    \ supposed to. Examples of B and resources were things like Twitter followers,\
    \ Facebook friends, email contacts, and so on. Of course, this couldn't last long,\
    \ so various companies and groups got together to define OAuth. It was originally\
    \ designed only to allow website A to access specific (not all) resources on website\
    \ B.\n\n**OAuth2** is a popular but complex *authorization* standard, with uses\
    \ beyond the A/B example. There are many explanations of it, from [light](https://www.google.com)\
    \ to [heavy](https://www.google.com).\n\n![img](img/1d00ed3e85bc756220a3f1a1e9a9664f_167_0.png)\n\
