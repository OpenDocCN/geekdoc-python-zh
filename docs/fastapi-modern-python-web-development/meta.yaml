    \ process [92543] using StatReload\nINFO:     Started server process [92551]\n\
    INFO:     Waiting for application startup.\nINFO:     Application startup complete.\n\
    ```\n\nThat final & puts the program into the background, and you can run other\
    \ programs in the same terminal window if you like. Or omit the & and run your\
    \ other code in a different window or tab.\n\nNow you can access the site localhost:8000\
