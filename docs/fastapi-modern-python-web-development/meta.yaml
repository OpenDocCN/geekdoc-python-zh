    # Logging


    Uvicorn and other web servers typically write logs to stdout. You can check the
    log to see what call was actually made, including the HTTP verb and URL, but not
    data in the body, headers, or cookies.


    If a particular endpoint returns a 400-level status code, you can try feeding
    the same input back and see if the error reoccurs. If so, my first caveman debugging
    instinct is to add `print()` statements in the relevant Web, Service, and Data
    functions.


    Also, wherever you raise an exception, add details. If a database lookup fails,
    include the input values and specific error, like an attempt to double a unique
    key field.


    # Metrics


    The terms *metrics*, *monitoring*, *observability*, and *telemetry* may seem to
    overlap. It''s common practice in Pythonland to use the following:


    +   - Prometheus to gather metrics

    - Grafana to display them

    - OpenTelemetry to measure timing


    You can apply these to all your site''s layers: Web, Service, and Data. The Service
    ones may be more business-oriented, and the others more technical, and useful
    for site developers and maintainers.


    Here are some links to gather FastAPI metrics:


    +   - Prometheus FastAPI Instrumentator

    - "Getting Started: Monitoring a FastAPI App with Grafana and Prometheus—A Step-by-Step
    Guide" by Zoo Codes

    - "FastAPI Observability" page of Grafana Labs website

    - OpenTelemetry FastAPI Instrumentation

    - "OpenTelemetry FastAPI Tutorial—Complete Implementation Guide" by Ankit Anand

    - OpenTelemetry Python documentation


    # Review


    It''s pretty clear that production is not easy. Problems include the web machinery
    itself, network and disk overloading, and database problems. This chapter offered
    hints on how to get the information you need, and where to start digging when
    problems pop up.'
