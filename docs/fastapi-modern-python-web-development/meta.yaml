    \n```python\n>>> class CreatureClass():\n...     def __init__(self,\n...     \
    \    name: str,\n...         country: str,\n...         area: str,\n...      \
    \   description: str,\n...         aka: str):\n...         self.name = name\n\
    ...         self.country = country\n...         self.area = area\n...        \
    \ self.description = description\n...         self.aka = aka\n...\n>>> class_thing\
    \ = CreatureClass(\n...     \"yeti\",\n...     \"CN\",\n...     \"Himalayas\"\
    ,\n...     \"Hirsute Himalayan\",\n...     \"Abominable Snowman\")\n>>> print(\"\
    Name is\", class_thing.name)\nName is yeti\n```\n\nYou might think, what's so\
    \ bad about that? With a regular class, you can add more data (attributes), but\
    \ especially behavior (methods). You might decide, one madcap day, to add a method\
    \ that looks up an explorer's favorite songs. (This wouldn't apply to a creature.²)\
    \ But the use case here is just to move a clump of data undisturbed among the\
    \ layers, and to validate on the way in and out. Also, methods are square pegs\
    \ that would struggle to fit in the round holes of a database.\n\nDoes Python\
    \ have anything similar to what other computer languages call a *record* or a\
    \ *struct* (a group of names and values)? A recent addition to Python is the *dataclass*.\
    \ Example 5-7 shows how all that `self` stuff disappears with dataclasses.\n\n\
    ### Example 5-7. Using a dataclass\n\n```python\n>>> from dataclasses import dataclass\n\
    >>>\n>>> @dataclass\n... class CreatureDataClass():\n...     name: str\n...  \
    \   country: str\n...     area: str\n...     description: str\n...     aka: str\n\
    ...\n>>> dataclass_thing = CreatureDataClass(\n...     \"yeti\",\n...     \"CN\"\
    ,\n...     \"Himalayas\",\n...     \"Hirsute Himalayan\",\n...     \"Abominable\
    \ Snowman\")\n>>> print(\"Name is\", dataclass_thing.name)\nName is yeti\n```\n\
    \nThis is pretty good for the keeping-variables-together part. But we want more,\
    \ so let's ask Santa for these:\n\n- A *union* of possible alternative types\n\
    - Missing/optional values\n- Default values\n- Data validation\n- Serialization\
    \ to and from formats like JSON\n\n## Alternatives\n\nIt's tempting to use Python's\
    \ built-in data structures, especially dictionaries. But you'll inevitably find\
    \ that dictionaries are a bit too “loose.” Freedom comes at a price. You need\
    \ to check *everything*:\n\n- Is the key optional?\n- If the key is missing, is\
    \ there a default value?\n- Does the key exist?\n- If so, is the key's value of\
    \ the right type?\n- If so, is the value in the right range or matching a pattern?\n\
    \nAt least three solutions address at least some of these requirements:\n\n- **Dataclasses**:\
    \ Part of standard Python.\n- **attrs**: Third party, but a superset of dataclasses.\n\
    - **Pydantic**: Also third party, but integrated into FastAPI, so an easy choice\
    \ if you're already using FastAPI. And if you're reading this book, that's likely.\n\
    \nA handy comparison of the three is on YouTube. One takeaway is that Pydantic\
