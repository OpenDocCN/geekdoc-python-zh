  md: "Here are some points to notice:\n\n+   - app is the top-level FastAPI object\
    \ that represents the whole web application.\n- @app.get(\"/hi\") is a *path decorator*.\
    \ It tells FastAPI the following:\n  - A request for the URL \"/hi\" on this server\
    \ should be directed to the following function.\n  - This decorator applies only\
    \ to the HTTP GET verb. You can also respond to a \"/hi\" URL sent with the other\
    \ HTTP verbs (PUT, POST, etc.), each with a separate function.\n- def greet()\
    \ is a *path function*—the main point of contact with HTTP requests and responses.\
    \ In this example, it has no arguments, but the following sections show that there’s\
    \ much more under the FastAPI hood.\n\nThe next step is to run this web application\
    \ in a web server. FastAPI itself does not include a web server but recommends\
    \ Uvicorn. You can start Uvicorn and the FastAPI web application in two ways:\
    \ externally or internally.\n\nTo start Uvicorn externally, via the command line,\
    \ see Example 3-2.\n\nExample 3-2. Start Uvicorn with the command line\n\n```\n\
    $ uvicorn hello:app --reload\n```\n\nThe hello refers to the *hello.py* file,\
    \ and app is the FastAPI variable name within it.\n\nAlternatively, you can start\
    \ Uvicorn internally in the application itself, as in Example 3-3.\n\nExample\
    \ 3-3. Start Uvicorn internally\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\
    \n@app.get(\"/hi\")\ndef greet():\n    return \"Hello? World?\"\n\nif __name__\
    \ == \"__main__\":\n    import uvicorn\n    uvicorn.run(\"hello:app\", reload=True)\n\
    ```\n\nIn either case, that reload tells Uvicorn to restart the web server if\
    \ *hello.py* changes. In this chapter, we’re going to use this automatic reloading\
    \ a lot."
