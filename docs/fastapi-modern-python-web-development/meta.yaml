  md: '# CHAPTER 11


    # Authentication and Authorization


    > Respect mah authoritay!

    —Eric Cartman, *South Park*


    # Preview


    Sometimes a website is wide open, and any visitor can visit any page. But if any
    of the site''s content may be modified, some endpoints will be restricted to certain
    people or groups. If anyone could alter pages on Amazon, imagine the odd items
    that would show up, and the amazing sales some people would suddenly get. Unfortunately,
    it''s human nature—for some humans—to take advantage of the rest, who pay a hidden
    tax for their activities.


    Should we leave our cryptid site open for any users to access any endpoint? No!
    Almost any sizable web service eventually needs to deal with the following:


    +   *Authentication (authn)*

    Who are you?


    *Authorization (authz)*

    What do you want?


    Should the authentication and authorization (auth) code have its own new layer,
    say between Web and Service? Or should everything be handled by the Web or Service
    layer itself? This chapter dips into auth techniques and where to put them.


    Often descriptions of web security seem more confusing than they need to be. Attackers
    can be really, really sneaky, and countermeasures may not be simple.'
  merge: -1
  pgno: 160
- img_proc: true
  md: '![](img/1d00ed3e85bc756220a3f1a1e9a9664f_161_0.png)


    As I''ve mentioned more than once, the official FastAPI documentation is excellent.
    Try the [Security section](https://example.com) if this chapter doesn''t provide
    as many details as you''d like.


    So, let''s take this walk-through in steps. I''ll start with simple techniques
    that are intended to only hook auth into a web endpoint for testing, but would
    not stand up in a public website.


    # Interlude 1: Do You Need Authentication?


    Again, *authentication* is concerned with *identity*: who are you? To implement
    authentication, we need a mapping of secret information to a unique identity.
    There are many ways to do this, with *many* variations of complexity. Let''s start
    small and work up.


    Often books and articles on web development jump right away into the details of
    authentication and authorization, sometimes muddling them. They sometimes skip
    the first question: do you really need either?


    You could allow completely anonymous access to all your website''s pages. But
    that would leave you open to exploits like denial-of-service attacks. Although
    some protections like rate limits can be implemented outside the web server (see
    [Chapter 13](https://example.com)), almost all public API providers require at
    least some authentication.


    Beyond security, we want to know how effective websites are:


    +   - How many unique visitors?

    - What are the most popular pages?

    - Do some changes increase views?

    - What page sequences are common?


    The answers to these questions require authentication of specific visitors. Otherwise,
    you can get only total counts.


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_161_1.png)


    If your site needs authentication or authorization, access to it should be encrypted
    (using HTTPS instead of HTTP), to prevent attackers from extracting secret data
    from plain text. See [Chapter 13](https://example.com) for details on setting
    up HTTPS.'
