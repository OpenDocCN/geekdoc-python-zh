  - "[PAGE 72]\n\n# FastAPI and Async\n\nAfter that long field trip over hill and\
    \ dale, let's get back to FastAPI and why any of it matters.\n\nBecause web servers\
    \ spend a lot of time waiting, performance can be increased by avoiding some of\
    \ that waiting—in other words, concurrency. Other web servers use many of the\
    \ methods mentioned earlier: threads, gevent, and so on. One of the reasons that\
    \ FastAPI is one of the fastest Python web frameworks is its incorporation of\
    \ async code, via the underlying Starlette package's ASGI support, and some of\
    \ its own inventions.\n\n> The use of async and await on their own does not make\
    \ code run faster. In fact, it might be a little slower, from async setup overhead.\
    \ The main use of async is to avoid long waits for I/O.\n\nNow, let's look at\
    \ our earlier web endpoint calls and see how to make them async.\n\nThe functions\
    \ that map URLs to code are called *path functions* in the FastAPI docs. I've\
    \ also called them *web endpoints*, and you saw synchronous examples of them in\
    \ Chapter 3. Let's make some async ones. As in those earlier examples, we'll just\
    \ use simple types like numbers and strings for now. Chapter 5 introduces *type\
    \ hints* and Pydantic, which we'll need to handle fancier data structures.\n\n\
    Example 4-5 revisits the first FastAPI program from the previous chapter and makes\
    \ it asynchronous.\n\nExample 4-5. A shy async endpoint (greet_async.py)\n\n```\n\
    from fastapi import FastAPI\nimport asyncio\n\napp = FastAPI()\n\n@app.get(\"\
    /hi\")\nasync def greet():\n    await asyncio.sleep(1)\n    return \"Hello? World?\"\
    \n```\n\nTo run that chunk of web code, you need a web server like Uvicorn.\n\n\
    The first way is to run Uvicorn on the command line:\n\n```\n$ uvicorn greet_async:app\n\
    ```"
  - "[PAGE 73]\n\nThe second, as in Example 4-6, is to call Uvicorn from inside the\
    \ example code, when it’s run as a main program instead of a module.\n\nExample\
    \ 4-6. Another shy async endpoint (greet_async_uvicorn.py)\n\n```\nfrom fastapi\
    \ import FastAPI\nimport asyncio\nimport uvicorn\n\napp = FastAPI()\n\n@app.get(\"\
    /hi\")\nasync def greet():\n    await asyncio.sleep(1)\n    return \"Hello? World?\"\
    \n\nif __name__ == \"__main__\":\n    uvicorn.run(\"greet_async_uvicorn:app\"\
    )\n```\n\nWhen run as a standalone program, Python names it main. That if __name__...\
    \ stuff is Python’s way of running it only when called as a main program. Yes,\
    \ it’s ugly.\n\nThis code will pause for one second before returning its timorous\
    \ greeting. The only difference from a synchronous function that used the standard\
    \ sleep(1) function is that the web server can handle other requests in the meantime\
    \ with the async example.\n\nUsing asyncio.sleep(1) fakes a real-world function\
    \ that might take one second, like calling a database or downloading a web page.\
    \ Later chapters will show examples of such calls from this Web layer to the Service\
    \ layer, and from there to the Data layer, actually spending that wait time on\
    \ real work.\n\nFastAPI calls this async greet() path function itself when it\
    \ receives a GET request for the URL /hi. You don’t need to add an await anywhere.\
    \ But for any other async def function definitions that you make, the caller must\
    \ put an await before each call.\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_73_0.png)\n\
    \nFastAPI runs an async event loop that coordinates the async path functions,\
    \ and a threadpool for synchronous path functions. A developer doesn’t need to\
    \ know the tricky details, which is a great plus. For example, you don’t need\
