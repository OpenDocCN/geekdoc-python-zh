    \ the same question, get the same answer*. HTTP GET is supposed to only return\
    \ stuff. The request body is used to send stuff to the server when creating (POST)\
    \ or updating (PUT or PATCH). Chapter 9 shows a way around this.\n\nSo, in Example\
    \ 3-21, let's change the endpoint from a GET to a POST. (Technically, we're not\
