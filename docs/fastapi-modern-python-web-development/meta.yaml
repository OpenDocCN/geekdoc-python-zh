  md: "runtime exceptions, but not mixing types for a variable. Helper tools like\
    \ mypy pay attention to type hints and warn you about any mismatches.\n\nAlso,\
    \ the hints are available to Python developers, who can write tools that do more\
    \ than type error checking. The following sections describe how the Pydantic package\
    \ was developed to address needs that weren’t obvious. Later, you’ll see how its\
    \ integration with FastAPI makes a lot of web development issues much easier to\
    \ handle.\n\nBy the way, what do type hints look like? There’s one syntax for\
    \ variables and another for function return values.\n\nVariable type hints may\
    \ include only the type:\n\n```\nname: type\n```\n\nor also initialize the variable\
    \ with a value:\n\n```\nname: type = value\n```\n\nThe *type* can be one of the\
    \ standard Python simple types like `int` or `str`, or collection types like `tuple`,\
    \ `list`, or `dict`:\n\n```\nthing: str = \"yeti\"\n```\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_79_0.png)\n\
    \nBefore Python 3.9, you need to import capitalized versions of these standard\
    \ type names from the typing module:\n\n```\nfrom typing import Str\nthing: Str\
    \ = \"yeti\"\n```\n\nHere are some examples with initializations:\n\n```\nphysics_magic_number:\
    \ float = 1.0/137.03599913\nhp_lovecraft_noun: str = \"ichor\"\nexploding_sheep:\
    \ tuple = \"sis\", \"boom\", bah!\"\nresponses: dict = {\"Marco\": \"Polo\", \"\
    answer\": 42}\n```\n\nYou can also include subtypes of collections:\n\n```\nname:\
    \ dict[keytype, valtype] = {key1: val1, key2: val2}\n```\n\nThe typing module\
    \ has useful extras for subtypes; the most common are as follows:\n\n+   - **Any**\n\
    \  Any type\n- **Union**\n  Any type of those specified, such as `Union[str, int]`."
