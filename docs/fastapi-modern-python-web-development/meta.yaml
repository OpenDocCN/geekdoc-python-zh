    Database

    The data store, often an SQL or NoSQL server


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_27_0.png)


    Figure 1-1. Vertical layers


    These components will help you scale your site without having to start from scratch.
    They’re not laws of quantum mechanics, so consider them guidelines for this book’s
    exposition.


    The layers talk to one another via APIs. These can be simple function calls to
    separate Python modules, but could access external code via any method. As I showed
    earlier, this could include RPCs, messages, and so on. In this book, I’m assuming
    a single web server, with Python code importing other Python modules. The separation
    and information hiding is handled by the modules.


    The *Web layer* is the one that users see, via *client* applications and APIs.
    We’re usually talking about a RESTful web interface, with URLs, and JSON-encoded
    requests and responses. But alternative text (or command-line interface, CLI)
    clients also could be built alongside the Web layer. Python Web code may import
    Service-layer modules but should not import Data modules.


    The *Service layer* contains the actual details of whatever this website provides.
    This layer essentially looks like a *library*. It imports Data modules to access
    databases and external services but should not know the details.


    The *Data layer* provides the Service layer access to data, through files or client
    calls to other services. Alternative Data layers may also exist, communicating
    with a single Service layer.


    The *Model box* isn’t an actual layer but a source of data definitions shared
    by the layers. This isn’t needed if you’re passing built-in Python data structures
    among them. As you will see, FastAPI’s inclusion of Pydantic enables the definition
    of data structures with many useful features.'
  - '[PAGE 28]


    Why make these divisions? Among many reasons, each layer can be:


    +   - Written by specialists.

    - Tested in isolation.

    - Replaced or supplemented: you might add a second Web layer, using a different
    API such as gRPC, alongside a web one.


    Follow one rule from *Ghostbusters*: Don''t cross the streams. That is, don''t
    let web details leak out of the Web layer, or database details out of the Data
    layer.


    You can visualize *layers* as a vertical stack, like a cake in the Great British
    Bake Off.⁶


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_28_0.png)


    Here are some reasons for separation of the layers:


    +   - If you don''t separate the layers, expect a hallowed web meme: *Now you
    have two problems*.

    - Once the layers are mixed, later separation will be *very* difficult.

    - You''ll need to know two or more specialties to understand and write tests if
    code logic gets muddled.


    By the way, even though I call them *layers*, you don''t need to assume that one
    layer is “above” or “below” another, and that commands flow with gravity. Vertical
    chauvinism! You could also view layers as sideways-communicating boxes (**Figure
    1-2**).


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_28_1.png)


    *Figure 1-2. Sideways-communicating boxes*


    > ⁶ As viewers know, if your layers get sloppy, you may not return to the tent
    the next week.'
- md: "However you visualize them, the *only* communication paths between the boxes/layers\
    \ are the arrows (APIs). This is important for testing and debugging. If undocumented\
    \ doors exist in a factory, the night watchman will inevitably be surprised.\n\
    \nThe arrows between the web client and Web layer use HTTP or HTTPS to transport\
    \ mostly JSON text. The arrows between the Data layer and database use a database-specific\
    \ protocol and carry SQL (or other) text. The arrows between the layers themselves\
    \ are function calls carrying data models.\n\nAlso, the recommended data formats\
    \ flowing through the arrows are as follows:\n\n*Client* ⇔ *Web*\n    RESTful\
    \ HTTP with JSON\n\n*Web* ⇔ *Service*\n    Models\n\n*Service* ⇔ *Data*\n    Models\n\
    \n*Data* ⇔ *Databases and services*\n    Specific APIs\n\nBased on my own experience,\
    \ this is how I've chosen to structure the topics in this book. It's workable\
    \ and has scaled to fairly complex sites, but isn't sacred. You may have a better\
    \ design! However you do it, these are the important points:\n\n- Separate domain-specific\
    \ details.\n- Define standard APIs between the layers.\n- Don't cheat; don't leak.\n\
    \nSometimes deciding which layer is the best home for code is a challenge. For\
    \ example, Chapter 11 looks at authentication and authorization requirements and\
    \ how to implement them—as an extra layer between Web and Service, or within one\
    \ of them. Software development is sometimes as much art as science.\n\n## Data\n\
    \nThe web has often been used as a frontend to relational databases, although\
    \ many other ways of storing and accessing data have evolved, such as NoSQL or\
    \ NewSQL databases.\n\nBut beyond databases, *machine learning (ML)*—or *deep\
    \ learning* or just *AI*—is fundamentally remaking the technology landscape. The\
    \ development of large models requires *lots* of messing with data, which has\
    \ traditionally been called extract, transform, load (ETL).\n\nAs a general-purpose\
    \ service architecture, the web can help with many of the fiddly bits of ML systems.\n\
    \n## Review\n\nThe web uses many APIs, but especially RESTful ones. Asynchronous\
    \ calls allow better concurrency, which speeds up the overall process. Web service\
    \ applications are often large enough to divide into layers. Data has become a\
    \ major area in its own right. All these concepts are addressed in the Python\
    \ programming language, coming in the next chapter.\n\n# CHAPTER 2\nModern Python\n\
    \n> It's all in a day's work for Confuse-a-Cat.\n—Monty Python\n\n## Preview\n\
    \nPython evolves to keep up with our changing technical world. This chapter discusses\
