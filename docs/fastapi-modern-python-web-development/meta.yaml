- md: "Python's historic data grouping structures (beyond the basic int, string, and\
    \ such) are listed here:\n\n- **tuple**: An immutable sequence of objects.\n-\
    \ **list**: A mutable sequence of objects.\n- **set**: Mutable distinct objects.\n\
    - **dict**: Mutable key-value object pairs (the key needs to be of an immutable\
    \ type).\n\nTuples (Example 5-1) and lists (Example 5-2) let you access a member\
    \ variable only by its offset, so you have to remember what went where.\n\n###\
    \ Example 5-1. Using a tuple\n\n```python\n>>> tuple_thing = (\"yeti\", \"CN\"\
    , \"Himalayas\",\n    \"Hirsute Himalayan\", \"Abominable Snowman\")\n>>> print(\"\
    Name is\", tuple_thing[0])\nName is yeti\n```\n\n### Example 5-2. Using a list\n\
    \n```python\n>>> list_thing = [\"yeti\", \"CN\", \"Himalayas\",\n    \"Hirsute\
    \ Himalayan\", \"Abominable Snowman\"]\n>>> print(\"Name is\", list_thing[0])\n\
    Name is yeti\n```\n\nExample 5-3 shows that you can get a little more explanatory\
    \ by defining names for the integer offsets.\n\n### Example 5-3. Using tuples\
    \ and named offsets\n\n```python\n>>> NAME = 0\n>>> COUNTRY = 1\n>>> AREA = 2\n\
    >>> DESCRIPTION = 3\n>>> AKA = 4\n>>> tuple_thing = (\"yeti\", \"CN\", \"Himalayas\"\
    ,\n    \"Hirsute Himalayan\", \"Abominable Snowman\")\n>>> print(\"Name is\",\
    \ tuple_thing[NAME])\nName is yeti\n```\n\nDictionaries are a little better in\
    \ Example 5-4, giving you access by descriptive keys.\n\n### Example 5-4. Using\
    \ a dictionary\n\n```python\n>>> dict_thing = {\"name\": \"yeti\",\n...     \"\
    country\": \"CN\",\n...     \"area\": \"Himalayas\",\n...     \"description\"\
    : \"Hirsute Himalayan\",\n...     \"aka\": \"Abominable Snowman\"}\n>>> print(\"\
    Name is\", dict_thing[\"name\"])\nName is yeti\n```\n\nSets contain only unique\
    \ values, so they're not very helpful for clustering various variables.\n\nIn\
    \ Example 5-5, a *named tuple* is a tuple that gives you access by integer offset\
    \ *or* name.\n\n### Example 5-5. Using a named tuple\n\n```python\n>>> from collections\
    \ import namedtuple\n>>> CreatureNamedTuple = namedtuple(\"CreatureNamedTuple\"\
    ,\n...     \"name, country, area, description, aka\")\n>>> namedtuple_thing =\
    \ CreatureNamedTuple(\"yeti\",\n...     \"CN\",\n...     \"Himalaya\",\n...  \
    \   \"Hirsute Himalayan\",\n...     \"Abominable Snowman\")\n>>> print(\"Name\
    \ is\", namedtuple_thing[0])\nName is yeti\n>>> print(\"Name is\", namedtuple_thing.name)\n\
    Name is yeti\n```\n\nYou can't say `namedtuple_thing[\"name\"]`. It's a tuple,\
    \ not a dict, so the index needs to be an integer.\n\nExample 5-6 defines a new\
