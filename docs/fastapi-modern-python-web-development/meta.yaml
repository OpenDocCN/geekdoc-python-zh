  md: "Although AI development is complex and moving fast, you can try out some AI\
    \ with Python on your own machine without spending the megabucks that were behind\
    \ GPT-4 and ChatGPT. Let's build a small FastAPI web interface to a small AI model.\n\
    \n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_221_0.png)\n\n*Model* has different\
    \ meanings in AI and Pydantic/FastAPI. In Pydantic, a model is a Python class\
    \ that bundles related data fields. AI models cover a broad range of techniques\
    \ for determining patterns in data.\n\n**Hugging Face** provides free AI models,\
    \ datasets, and Python code to use them. First, install PyTorch and Hugging Face\
    \ code:\n\n```\n$ pip install torch torchvision\n$ pip install transformers\n\
    ```\n\n**Example 14-5** shows a FastAPI application that uses Hugging Face's transformers\
    \ module to access a pretrained mid-sized open source machine language model and\
    \ try to answer your prompts. (This was adapted from a command-line example on\
    \ the YouTube channel CodeToTheMoon.)\n\n*Example 14-5. Top-level LLM test (ai.py)*\n\
    \n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\nfrom transformers import\
    \ (AutoTokenizer,\n    AutoModelForSeq2SeqLM, GenerationConfig)\nmodel_name =\
    \ \"google/flan-t5-base\"\ntokenizer = AutoTokenizer.from_pretrained(model_name)\n\
    model = AutoModelForSeq2SeqLM.from_pretrained(model_name)\nconfig = GenerationConfig(max_new_tokens=200)\n\
    \n@app.get(\"/ai\")\ndef prompt(line: str) -> str:\n    tokens = tokenizer(line,\
    \ return_tensors=\"pt\")\n    outputs = model.generate(**tokens,\n        generator_config=config)\n\
    \    result = tokenizer.batch_decode(outputs,\n        skip_special_tokens=True)\n\
    \    return result[0]\n```\n\nRun this with uvicorn ai:app (as always, first make\
    \ sure you don't have another web server still running on localhost, port 8000).\
    \ Feed the /ai endpoint questions and get answers, like this (note the double\
    \ == for an HTTPie query parameter):\n\n```\n$ http -b localhost:8000/ai line==\"\
    What are you?\"\n\"a sailor\"\n```"
