    \nThis is a minimal introduction to Pydantic. The main takeaway is that it lets\
    \ you automate the validation of your data. You'll see how useful this is when\
    \ getting data from either the Web or Data layers.\n\n## Review\n\nModels are\
    \ the best way to define data that will be passed around in your web application.\
    \ Pydantic leverages Python's *type hints* to define data models to pass around\
    \ in your application. Coming next: defining *dependencies* to separate specific\
    \ details from your general code.\n\n# CHAPTER 6 Dependencies\n\n## Preview\n\n\
    One of the very nice design features of FastAPI is a technique called *dependency\
    \ injection*. This term sounds technical and esoteric, but it's a key aspect of\
    \ FastAPI and is surprisingly useful at many levels. This chapter looks at FastAPI's\
    \ built-in capabilities as well as how to write your own.\n\n## What's a Dependency?\n\
    \nA *dependency* is specific information that you need at some point. The usual\
    \ way to get this information is to write code that gets it, right when you need\
    \ it.\n\nWhen you're writing a web service, at some time you may need to do the\
    \ following:\n\n- Gather input parameters from the HTTP request\n- Validate inputs\n\
    - Check user authentication and authorization for some endpoints\n- Look up data\
    \ from a data source, often a database\n- Emit metrics, logs, or tracking information\n\
    \nWeb frameworks convert the HTTP request bytes to data structures, and you pluck\
    \ what you need from them inside your Web layer functions as you go.\n\n## Problems\
    \ with Dependencies\n\nGetting what you want, right when you need it, and without\
    \ external code needing to know how you got it, seems pretty reasonable. But it\
    \ turns out that consequences exist:\n\n*Testing*\nYou can't test variations of\
    \ your function that could look up the dependency differently.\n\n*Hidden dependencies*\n\
    Hiding the details means that code your function needs could break when external\
    \ code changes.\n\n*Code duplication*\nIf your dependency is a common one (like\
    \ looking up a user in a database or combining values from an HTTP request), you\
    \ might duplicate the lookup code in multiple functions.\n\n*OpenAPI visibility*\n\
    The automatic test page that FastAPI makes for you needs information from the\
    \ dependency injection mechanism.\n\n## Dependency Injection\n\nThe term *dependency\
    \ injection* is simpler than it sounds: pass any *specific* information that a\
    \ function needs *into* the function. A traditional way to do this is to pass\
    \ in a helper function, which you then call to get the specific data.\n\n## FastAPI\
    \ Dependencies\n\nFastAPI goes one step more: you can define dependencies as arguments\
    \ to your function, and they are *automatically* called by FastAPI and pass in\
    \ the *values* that they return. For example, a `user_dep` dependency could get\
    \ the user's name and password from HTTP arguments, look them up in a database,\
    \ and return a token that you use to track that user afterward. Your web-handling\
    \ function doesn't ever call this directly; it's handled at function call time.\n\
    \nYou've already seen some dependencies but didn't see them referred to as such:\
    \ HTTP data sources like `Path`, `Query`, `Body`, and `Header`. These are functions\
    \ or Python classes that dig the requested data from various areas in the HTTP\
    \ request. They hide the details, like validity checks and data formats."
