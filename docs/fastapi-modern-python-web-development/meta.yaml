    \n## 回顾\n\n本章展示了如何上传和下载文件——小文件、大文件，甚至是巨型文件。此外，你还学习了如何以怀旧的（非 API）Web 风格从目录中提供 *静态文件*。\n\
    \n# 第 16 章\n表单与模板\n\n## 预览\n\n尽管 *FastAPI* 中的 *API* 暗示了其主要关注点，但 FastAPI 也能处理传统的\
    \ Web 内容。本章讨论标准的 HTML 表单和用于将数据插入 HTML 的模板。\n\n## 表单\n\n正如你所见，FastAPI 主要是为了构建 API\
    \ 而设计的，其默认输入是 JSON。但这并不意味着它不能提供标准的香蕉 HTML、表单及其相关内容。\n\nFastAPI 支持来自 HTML 表单的数据，就像它支持来自\
    \ Query 和 Path 等其他来源的数据一样，使用 Form 依赖项。\n\n你需要 Python-Multipart 包来进行任何 FastAPI\
    \ 表单工作，因此如果需要，请运行 pip install python-multipart。此外，第 15 章的 *static* 目录将用于存放本章的测试表单。\n\
    \n让我们重做示例 3-11，但通过表单而不是 JSON 字符串提供 who 值。（将此路径函数命名为 greet2()，以避免覆盖旧的 greet() 路径函数（如果它仍然存在）。）将示例\
    \ 16-1 添加到 *main.py*。\n\n示例 16-1. 从 GET 表单获取值\n\n```\nfrom fastapi import FastAPI,\
    \ Form\n\napp = FastAPI()\n\n@app.get(\"/who2\")\ndef greet2(name: str = Form()):\n\
    \    return f\"Hello, {name}?\"\n```\n\n主要区别在于值来自 Form，而不是 Path、Query 以及第 3 章中的其他来源。\n\
    \n使用 HTTPie 进行初始表单测试，如示例 16-2 所示（你需要 -f 来以表单编码而不是 JSON 上传）。\n\n示例 16-2. 使用 HTTPie\
    \ 的表单 GET 请求\n\n```\n$ http -f -b GET localhost:8000/who2 name=\"Bob Frapples\"\
    \n\"Hello, Bob Frapples?\"\n```\n\n你也可以从标准的 HTML 表单文件发送请求。第 15 章展示了如何创建一个名为 static\
    \ 的目录（通过 URL /static 访问），该目录可以存放任何内容，包括 HTML 文件，因此在示例 16-3 中，让我们将此文件（form1.html）放在那里。\n\
    \n示例 16-3. 表单 GET 请求 (static/form1.html)\n\n```\n<form action=\"http://localhost:8000/who2\"\
    \ method=\"get\">\nSay hello to my little friend:\n<input type=\"text\" name=\"\
    name\" value=\"Bob Frapples\">\n<input type=\"submit\">\n</form>\n```\n\n如果你让浏览器加载\
    \ http://localhost:8000/static/form1.html，你会看到一个表单。如果你填写任何测试字符串，你会得到这个返回：\n\n\
    ```\n\"detail\":[{\"loc\":[\"body\",\"name\"],\n            \"msg\":\"field required\"\
    ,\n            \"type\":\"value_error.missing\"}]\n```\n\n嗯？\n\n查看 Uvicorn 运行的窗口，看看它的日志说了什么：\n\
    \n```\nINFO:     127.0.0.1:63502 -\n          \"GET /who2?name=rr23r23 HTTP/1.1\"\
    \n422 Unprocessable Entity\n```\n\n为什么这个表单将 name 作为查询参数发送，而我们将其放在表单字段中？这原来是 HTML\
    \ 的一个怪癖，在 W3C 网站上有记录。此外，如果你的 URL 中有任何查询参数，它会擦除它们并用 name 替换它们。\n\n那么，为什么 HTTPie\
    \ 按预期处理了它？我不知道。这是一个需要注意的不一致性。\n\n官方的 HTML 咒语是将 action 从 GET 更改为 POST。因此，让我们在示例\
    \ 16-4 中为 /who2 添加一个 POST 端点到 main.py。\n\n示例 16-4. 从 POST 表单获取值\n\n```\nfrom fastapi\
    \ import FastAPI, Form\n\napp = FastAPI()\n\n@app.post(\"/who2\")\ndef greet3(name:\
    \ str = Form()):\n    return f\"Hello, {name}?\"\n```\n\n示例 16-5 是 stuff/form2.html，其中\
    \ get 更改为 post。\n\n示例 16-5. 表单 POST 请求 (static/form2.html)\n\n```\n<form action=\"\
    http://localhost:8000/who2\" method=\"post\">\nSay hello to my little friend:\n\
