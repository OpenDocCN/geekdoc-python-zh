  md: '# About the Author


    **Bill Lubanovic** has been a developer for over 40 years, specializing in Linux,
    the web, and Python. He coauthored the O''Reilly book *Linux System Administration*
    and wrote both editions of *Introducing Python*. He discovered FastAPI a few years
    ago and, with his team, used it to rewrite a large biomedical research API. The
    experience was so positive that they’ve adopted FastAPI for all new projects.
    Bill lives with his family and cats in the Sangre de Sasquatch mountains of Minnesota.


    # Colophon


    The animal on the cover of *FastAPI* is a spiny-tailed iguana (of the genus *Ctenosaura*).
    The name Ctenosaura comes from two Greek words: ctenos (meaning comb, for the
    comblike spine on their back and tail) and saura (lizard). There are 15 recognized
    types of spiny-tailed iguana, including five-keeled, black-chested, Motagua, Oaxaca,
    Roatán, and Útila.


    Spiny-tailed iguanas can range in size from 4.9 to 39 inches long. Each species
    has a different color that can change based on their body temperature, mood, health,
    and habitat temperature. Some of the colors include brown, black, gray, pink,
    green, and yellow. In general, spiny-tailed iguanas are omnivores that eat a variety
    of fruits, flowers, foliage, and small animals.


    While iguanas can be found in a variety of habitats, spiny-tailed iguanas are
    native to Mexico and Central America. They can be found in tropical and subtropical
    dry forests, scrubland, and occasionally in human-altered habitats and urban areas.
    Some species, like Roatán (only found on the Honduran Bay island of Roatán), Útila
    (only found on Útila, a Bay Island archipelago off of the Caribbean coast of Honduras,
    in swamps and mangrove ecosystems), and Motagua (found only in Guatemala) are
    endemic to very specific areas.


    Several species of spiny-tailed iguanas are listed as endangered or critically
    endangered. A few are also known to be invasive species in the United States (western
    and black spiny-tailed iguanas). They face a number of threats, including habitat
    loss due to agriculture and cattle grazing, illegal pet trade and poaching, habitat
    fragmentation, introduced predators, and fear-based killing. Many of the animals
    on O’Reilly covers are endangered; all of them are important to the world.


    The cover illustration is by Karen Montgomery, based on an antique engraving from
    *Museum of Animated Nature*. The cover fonts are Gilroy Semibold and Guardian
    Sans. The text font is Adobe Minion Pro; the heading font is Adobe Myriad Condensed;
    and the code font is Dalton Maag’s Ubuntu Mono.'
