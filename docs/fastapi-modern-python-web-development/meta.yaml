  md: "Here, you'll do the opposite: starting at the Data layer and working up. You'll\
    \ define how a user/visitor is defined, stored, and accessed. Then you'll work\
    \ up to the Web layer, and how user identification is passed in, evaluated, and\
    \ authenticated.\n\n# OAuth2\n\n> OAuth 2.0, which stands for “Open Authorization,”\
    \ is a standard designed to allow a website or application to access resources\
    \ hosted by other web apps on behalf of a user.\n—Auth0\n\nIn the early trusting\
    \ web days, you could provide your login name and password of a website (let's\
    \ call it B) to another website (A, of course) and let it access stuff on B for\
    \ you. This would give *A full access* to B, although it was trusted to access\
    \ only what it was supposed to. Examples of B and resources were things like Twitter\
    \ followers, Facebook friends, email contacts, and so on. Of course, this couldn't\
    \ last long, so various companies and groups got together to define OAuth. It\
    \ was originally designed only to allow website A to access specific (not all)\
    \ resources on website B.\n\n**OAuth2** is a popular but complex *authorization*\
    \ standard, with uses beyond the A/B example. There are many explanations of it,\
    \ from [light](https://www.google.com) to [heavy](https://www.google.com).\n\n\
    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_167_0.png)\n\nThere used to be an **OAuth1**,\
    \ but it isn't used anymore. Some of the original OAuth2 recommendations are now\
    \ deprecated (computerese for *don't use them*). On the horizon are **OAuth2.1**\
    \ and, even further into the mist, **txauth**.\n\nOAuth offers various [flows](https://www.google.com)\
    \ for different circumstances. I'll use the *authorization code flow* here. This\
    \ section will walk through an implementation, one average-sized step at a time.\n\
    \nFirst, you'll need to install these third-party Python packages:\n\n```\nJWT\
    \ handling\n    pip install python-jose[cryptography]\n\nSecure password handling\n\
    \    pip install passlib\n\nForm handling\n    pip install python-multipart\n\
    ```\n\nThe following sections start with the user data model and database management,\
    \ and work up the familiar layers to the Service and Web, where OAuth pops up."
