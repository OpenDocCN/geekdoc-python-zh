    \    <td>{{ creature.aka }}</td>\n  </tr>\n  {% endfor %}\n</table>\n\n<br>\n\n\
    <table bgcolor=\"#dddddd\">\n  <tr>\n    <th colspan=2>Explorers</th>\n  </tr>\n\
    \  <tr>\n    <th>Name</th>\n    <th>Country</th>\n    <th>Description</th>\n \
    \ </tr>\n  {% for explorer in explorers: %}\n  <tr>\n    <td>{{ explorer.name\
    \ }}</td>\n    <td>{{ explorer.country }}</td>\n    <td>{{ explorer.description\
    \ }}</td>\n  </tr>\n  {% endfor %}\n</table>\n</html>\n```\n\n我不在乎它看起来如何，所以没有\
    \ CSS，只有古老的 CSS 前 bgcolor 表格属性来区分两个表格。\n\n双花括号括起应插入的 Python 变量，而 {% 和 %} 括起 if\
    \ 语句、for 循环和其他控制结构。有关语法和示例，请参阅 Jinja 文档。\n\n此模板期望传递名为 creatures 和 explorers 的\
    \ Python 变量，它们是 Creature 和 Explorer 对象的列表。\n\n示例 16-7 展示了需要添加到 *main.py* 的内容，以设置模板并使用示例\
    \ 16-6 中的模板。它使用前几章 *fake* 目录下的模块（如果数据库为空或未连接，这些模块提供测试数据）将 creatures 和 explorers\
    \ 提供给模板。\n\n示例 16-7. 配置模板并使用一个 (main.py)\n\n```\nfrom pathlib import Path\nfrom\
    \ fastapi import FastAPI, Request\nfrom fastapi.templating import Jinja2Templates\n\
    \napp = FastAPI()\n\ntop = Path(__file__).resolve().parent\n\ntemplate_obj = Jinja2Templates(directory=f\"\
    {top}/template\")\n\n# Get some small predefined lists of our buddies:\nfrom fake.creature\
    \ import fakes as fake_creatures\nfrom fake.explorer import fakes as fake_explorers\n\
    \n@app.get(\"/list\")\ndef explorer_list(request: Request):\n    return template_obj.TemplateResponse(\"\
    list.html\",\n        {\"request\": request,\n        \"explorers\": fake_explorers,\n\
    \        \"creatures\": fake_creatures})\n```\n\n向你最喜欢的浏览器，或者甚至是你不太喜欢的浏览器，请求 *http://localhost:8000/list*，你应该会得到图\
    \ 16-1。\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_236_0.png)\n\n图 16-1. /list\
    \ 的输出\n\n## 回顾\n\n本章快速概述了 FastAPI 如何处理非 API 主题，如表单和模板。连同前一章关于文件的内容，这些是你经常遇到的传统核心\
    \ Web 任务。\n\n# 第 17 章\n\n## 数据发现与可视化\n\n### 预览\n\n尽管 FastAPI 的名称中确实有 *API*，但它可以提供的内容不止\
    \ API。本章向你展示如何使用来自世界各地的虚构生物的小型数据库，从数据生成表格、图表、图形和地图。\n\n### Python 与数据\n\nPython\
    \ 在过去几年中变得非常流行，原因有很多：\n\n- 易于学习\n- 语法简洁\n- 丰富的标准库\n- 大量高质量的第三方包\n- 特别强调数据操作、转换和内省\n\
    \n最后一点对于数据库创建的传统 ETL 任务一直很重要。一个名为 PyData 的非营利组织甚至组织会议并开发用于使用 Python 进行开源数据分析的工具。Python\
    \ 的流行也反映了最近 AI 的激增以及为 AI 模型提供数据的工具需求。\n\n在本章中，我们将尝试一些 Python 数据包，并看看它们与现代 Python\
    \ Web 开发和 FastAPI 的关系。"
