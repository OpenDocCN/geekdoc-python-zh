    - *Fixtures*: These functions can run once for the whole test script, or run for\
    \ every test (its scope), providing test functions with parameters like standard\
    \ test data or database initialization. Fixtures are a sort of dependency injection,\
    \ like FastAPI offers for web path functions: specific data passed to a general\
    \ test function.\n- *Parameterization*: This provides multiple test data to a\
    \ test function.\n\n## Layout\n\nWhere should you put your tests? There doesn't\
    \ seem to be wide agreement, but here are two reasonable designs:\n\n- A test\
    \ directory at the top, with subdirectories for the code area being tested (like\
    \ web, service, etc.)\n- A test directory under each code directory (like web,\
    \ service, etc.).\n\nAlso, within the specific subdirectory like test/web, should\
    \ you make more directories for different test types (like unit, integration,\
    \ and full)? In this book, I'm using this hierarchy:\n\n```\ntest\n├── unit\n\
