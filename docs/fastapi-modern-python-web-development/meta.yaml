  md: "# Web\n\nThis layer implements the site’s API. Ideally, each path function\
    \ (endpoint) should have at least one test—maybe more, if the function could fail\
    \ in more than one way. At the Web layer, you typically want to see if the endpoint\
    \ exists, works with the correct parameters, and returns the right status code\
    \ and data.\n\n> These are shallow API tests, testing solely within the Web layer.\
    \ So, Service-layer calls (which would in turn call the Data layer and the database)\
    \ need to be intercepted, along with any other calls that exit the Web layer.\n\
    \nUsing the import idea of the previous section, use the environment variable\
    \ CRYPTID_UNIT_TEST to import the *fake* package as service, instead of the real\
    \ service. This stops Web functions from calling Service functions, and instead\
    \ short-circuits them to the *fake* (doubles) version. Then the lower Data layer\
    \ and database aren’t involved, either. We get what we want: unit tests. Example\
    \ 12-11 has the modified *web/creature.py* file.\n\nExample 12-11. Modified *web/creature.py*\n\
    \n```\nimport os\nfrom fastapi import APIRouter, HTTPException\nfrom model.creature\
    \ import Creature\nif os.getenv(\"CRYPTID_UNIT_TEST\"):\n    from fake import\
    \ creature as service\nelse:\n    from service import creature as service\nfrom\
    \ error import Missing, Duplicate\n\nrouter = APIRouter(prefix = \"/creature\"\
    )\n\n@router.get(\"/\")\ndef get_all() -> list[Creature]:\n    return service.get_all()\n\
    \n@router.get(\"/{name}\")\ndef get_one(name) -> Creature:\n    try:\n       \
    \ return service.get_one(name)\n    except Missing as exc:\n        raise HTTPException(status_code=404,\
    \ detail=exc.msg)\n\n@router.post(\"/\", status_code=201)\ndef create(creature:\
    \ Creature) -> Creature:\n    try:\n        return service.create(creature)\n\
    ```"
