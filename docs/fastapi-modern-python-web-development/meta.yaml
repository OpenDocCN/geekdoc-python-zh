  md: "Our data fields are all strings, intentionally minimal to keep the examples\
    \ from overwhelming the logic and integration steps. For each example, we'll read\
    \ all the creature data from the SQLite database using code from previous chapters,\
    \ and adding Web and Service functions to select particular data to feed to the\
    \ plot library functions.\n\nFirst, install Plotly, and a library needed by Plotly\
    \ to export images:\n\n+   - pip install plotly\n- pip install kaleido\n\nThen,\
    \ in Example 17-8, add a test function to web/creature.py to see if we have the\
    \ right pieces, in the right places.\n\nExample 17-8. Add a test plot endpoint\
    \ (edit web/creature.py)\n\n```\n# (insert these lines in web/creature.py)\n\n\
    from fastapi import Response\nimport plotly.express as px\n\n@router.get(\"/test\"\
    )\ndef test():\n    df = px.data.iris()\n    fig = px.scatter(df, x=\"sepal_width\"\
    , y=\"sepal_length\", color=\"species\")\n    fig_bytes = fig.to_image(format=\"\
    png\")\n    return Response(content=fig_bytes, media_type=\"image/png\")\n```\n\
