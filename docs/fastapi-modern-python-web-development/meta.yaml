  md: "# SQLAlchemy\n\nThe most popular Python SQL package is SQLAlchemy. Although\
    \ many explanations of SQLAlchemy discuss only its ORM, it has multiple layers,\
    \ and I'll discuss these bottom-up.\n\n# Core\n\nThe base of SQLAlchemy, called\
    \ *Core*, comprises the following:\n\n+   - An Engine object that implements the\
    \ DB-API standard\n- URLs that express the SQL server type and driver, and the\
    \ specific database collection on that server\n- Client-server connection pools\n\
    - Transactions (COMMIT and ROLLBACK)\n- SQL *dialect* differences among various\
    \ database types\n- Direct SQL (text string) queries\n- Queries in the SQLAlchemy\
    \ Expression Language\n\nSome of these features, like the dialect handling, make\
    \ SQLAlchemy the package of choice for working with various server types. You\
    \ can use it to execute plain DB-API SQL statements or use the SQLAlchemy Expression\
    \ Language.\n\nI've been using the raw DB-API SQLite driver so far and will continue.\
    \ But for larger sites or those that might need to take advantage of a special\
    \ server feature, SQLAlchemy (using basic DB-API, SQLAlchemy Expression Language,\
    \ or the full ORM) is well worth using.\n\n# SQLAlchemy Expression Language\n\n\
    The SQLAlchemy Expression Language is *not* the ORM, but another way of expressing\
    \ queries against relational tables. It maps the underlying storage structures\
    \ to Python classes like `Table` and `Column`, and operations to Python methods\
    \ like `select()` and `insert()`. These functions translate to plain SQL strings,\
    \ and you can access them to see what happened. The language is independent of\
    \ SQL server types. If you find SQL difficult, this may be worth trying.\n\nLet's\
    \ compare a few examples. Example 14-1 shows the plain SQL version.\n\nExample\
    \ 14-1. Straight SQL code for `get_one()` in `data/explorer.py`\n\n```\ndef get_one(name:\
    \ str) -> Explorer:\n    qry = \"select * from explorer where name=:name\"\n \
    \   params = {\"name\": name}\n```"
