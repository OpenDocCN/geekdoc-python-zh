    # CHAPTER 12

    Testing


    > A QA engineer walks into a bar. Orders a beer. Orders 0 beers. Orders 99999999999
    beers. Orders a lizard. Orders -1 beers. Orders a ueicbksjhd.

    First real customer walks in and asks where the bathroom is. The bar bursts into
    flames, killing everyone.

    —Brenan Keller, Twitter


    # Preview


    This chapter discusses the kinds of testing that you would perform on a FastAPI
    site: *unit*, *integration*, and *full*. It features *pytest* and automated test
    development.


    # Web API Testing


    You''ve already seen several manual API testing tools as endpoints have been added:


    +   - HTTPie

    - Requests

    - HTTPX

    - The web browser


    And many more testing tools are available:


    +   - **Curl** is very well known, although in this book I''ve used HTTPie instead
    for its simpler syntax.

    - **Httpbin**, written by the author of Requests, is a free test server that provides
    many views into your HTTP request.'
  - "[PAGE 183]\n\n+   - Postman is a full API test platform.\n- Chrome DevTools is\
    \ a rich toolset, part of the Chrome browser.\n\nThese can all be used for full\
    \ (end-to-end) tests, such as those you've seen in the previous chapters. Those\
    \ manual tests have been useful for quickly verifying code just after it's typed.\n\
    \nBut what if a change that you make later breaks one of those earlier manual\
    \ tests (a *regression*)? You don't want to rerun dozens of tests after every\
    \ code change. That's when *automated* tests become important. The rest of this\
    \ chapter focuses on these, and how to build them with pytest.\n\n# Where to Test\n\
    \nI've mentioned the varieties of tests:\n\n+   *Unit*\n    Within a layer, tests\
    \ individual functions\n\n*Integration*\n    Across layers, tests connectivity\n\
    \n*Full*\n    Tests the full API and stack beneath it\n\nSometimes these are called\
    \ a *test pyramid*, with the width indicating the relative number of tests that\
    \ should be in each group (Figure 12-1).\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_183_0.png)\n\
    \n*Figure 12-1. Test pyramid*\n\n# What to Test\n\nWhat should you test as you're\
    \ writing code? Basically, for a given input, confirm that you get the correct\
    \ output. You might check the following:\n\n+   - Missing inputs\n- Duplicate\
    \ inputs\n- Incorrect input types"
  - '[PAGE 184]


    +   - Incorrect input order

    - Invalid input values

    - Huge inputs or outputs


    Errors can happen anywhere:


    *The Web layer*

    Pydantic will catch any mismatch with the model and return a 422 HTTP status code.


    *The Data layer*

    The database will raise exceptions for missing or duplicate data, as well as SQL
    query syntax errors. Timeouts or memory exhaustion may occur when passing a huge
    data result in one piece, instead of in chunks with a generator or pagination.


    *Any layer*

    Plain old bugs and oversights can occur.


    Chapters 8 through 10 contained some of these tests:


    +   - *Full manual tests*, using tools like HTTPie

    - *Unit manual tests*, as Python fragments

    - *Automated tests*, using pytest scripts


    The next few sections expand on pytest.


    # Pytest


    Python has long had the standard package `unittest`. A later third-party package
    called `nose` tried to improve on it. Most Python developers now prefer `pytest`,
    which does more than either of these and is easier to use. It isn''t built into
    Python, so you''ll need to run `pip install pytest` if you don''t already have
    it. Also, run `pip install pytest-mock` to get the automatic mocker fixture; you''ll
    see this later in this chapter.


    What does pytest offer? Nice automatic features include the following:


    *Test discovery*

    A test prefix or test suffix in a Python filename will be run automatically. This
    filename matching goes down into subdirectories, executing as many tests as you
    have there.


    *Assertion failure details*

    A failing `assert` statement prints what was expected and what actually happened.'
  - '[PAGE 185]


    Fixtures

    These functions can run once for the whole test script, or run for every test
    (its scope), providing test functions with parameters like standard test data
    or database initialization. Fixtures are a sort of dependency injection, like
    FastAPI offers for web path functions: specific data passed to a general test
    function.


    Parameterization

    This provides multiple test data to a test function.


    # Layout


    Where should you put your tests? There doesn''t seem to be wide agreement, but
    here are two reasonable designs:


    +   - A test directory at the top, with subdirectories for the code area being
    tested (like web, service, etc.)

    - A test directory under each code directory (like web, service, etc.).


    Also, within the specific subdirectory like test/web, should you make more directories
    for different test types (like unit, integration, and full)? In this book, I''m
    using this hierarchy:


    ```

    test

    ├── unit

    │   ├── web

    │   ├── service

    │   └── data

    ├── integration

    └── full

    ```


    Individual test scripts live within the bottom directories. Those are in this
    chapter.


    # Automated Unit Tests


    A unit test should check one thing, within one layer. This usually means passing
    parameter(s) to a function and asserting what should be returned.

    Unit tests require isolation of the code being tested. If not, you''re also testing
    something else. So, how do you isolate code for unit tests?


    # Mocking


    In this book''s code stack, accessing a URL via a web API generally calls a function
    in the Web layer, which calls a function in the Service layer, which calls a function
    in the Data layer, which accesses a database. The results flow back up the chain,
    eventually back out of the Web layer to the caller.'
  - "[PAGE 186]\n\nUnit testing sounds simple. For each function in your codebase,\
    \ pass in test arguments and confirm that it returns expected values. This works\
    \ well for a *pure function*: one that takes input arguments and returns responses\
    \ without referencing any external code. But most functions also call other functions,\
    \ so how can you control what those other functions do? What about the data that\
    \ comes from these external sources? The most common external factor to control\
    \ is database access, but really it can be anything.\n\nOne method is to *mock*\
    \ each external function call. Because functions are first-class objects in Python,\
    \ you can substitute one function for another. The unittest package has a mock\
    \ module that does this.\n\nMany developers believe that mocking is the best way\
    \ to isolate unit tests. I'll first show examples of mocking here, along with\
    \ the argument that often mocking requires too much knowledge of *how* your code\
    \ works, rather than the results. You may hear the terms *structural testing*\
    \ (as in mocks, where the tested code is quite visible) and *behavioral testing*\
    \ (where the code internals are not needed).\n\nExamples 12-1 and 12-2 define\
    \ the modules *mod1.py* and *mod2.py*.\n\nExample 12-1. Called module (mod1.py)\n\
    \n```\ndef preamble() -> str:\n    return \"The sum is \"\n```\n\nExample 12-2.\
    \ Calling module (mod2.py)\n\n```\nimport mod1\n\ndef summer(x: int, y:int) ->\
    \ str:\n    return mod1.preamble() + f\"{x+y}\"\n```\n\nThe *summer()* function\
    \ calculates the sum of its arguments, and returns a string with a preamble and\
    \ the sum. Example 12-3 is a minimal pytest script to verify *summer()*.\n\nExample\
    \ 12-3. Pytest script test_summer1.py\n\n```\nimport mod2\n\ndef test_summer():\n\
    \    assert \"The sum is 11\" == mod2.summer(5,6)\n```\n\nExample 12-4 runs the\
    \ test successfully."
- md: "## Example 12-4. Run the pytest script\n\n```\n$ pytest -q test_summer1.py\n\
    .\n[100%]\n1 passed in 0.04s\n```\n\n(The `-q` runs the test quietly, without\
    \ lots of extra printed details.) OK, it passed. But the `summer()` function got\
    \ some text from the `preamble` function. What if we just want to test that the\
    \ addition succeeded?\n\nWe could write a new function that just returns the stringified\
    \ sum of two numbers, and then rewrite `summer()` to return this appended to the\
    \ `preamble()` string.\n\nOr, we could mock `preamble()` to remove its effect,\
    \ as shown in multiple ways in Example 12-5.\n\n## Example 12-5. Pytest with a\
    \ mock (test_summer2.py)\n\n```\nfrom unittest import mock\nimport mod1\nimport\
    \ mod2\n\ndef test_summer_a():\n    with mock.patch(\"mod1.preamble\", return_value=\"\
    \"):\n        assert \"11\" == mod2.summer(5,6)\n\ndef test_summer_b():\n    with\
    \ mock.patch(\"mod1.preamble\") as mock_preamble:\n        mock_preamble.return_value=\"\
    \"\n        assert \"11\" == mod2.summer(5,6)\n\n@mock.patch(\"mod1.preamble\"\
    , return_value=\"\")\ndef test_summer_c(mock_preamble):\n    assert \"11\" ==\
    \ mod2.summer(5,6)\n\n@mock.patch(\"mod1.preamble\")\ndef test_caller_d(mock_preamble):\n\
    \    mock_preamble.return_value = \"\"\n    assert \"11\" == mod2.summer(5,6)\n\
    ```\n\nThese tests show that mocks can be created in more than one way. The function\
    \ `test_summer_a()` uses `mock.patch()` as a Python context manager (the `with`\
    \ statement). Its arguments are listed here:\n\n- `\"mod1.preamble\"`: The full\
    \ string name of the `preamble()` function in module `mod1`.\n- `return_value=\"\
    \"`: Makes this mocked version return an empty string.\n\nThe `test_summer_b()`\
    \ function is almost the same, but adds `as mock_preamble` to use the mock object\
    \ on the next line.\n\nThe `test_summer_c()` function defines the mock with a\
    \ Python *decorator*. The mocked object is passed as an argument to `test_summer_c()`.\n\
    \nThe `test_caller_d()` function is like `test_summer_b()`, setting the `return_value`\
    \ in a separate call to `mock_preamble`.\n\nIn each case, the string name of the\
    \ thing to be mocked must match the way it's called in the code that's being tested—in\
    \ this case, `summer()`. The mock library converts this string name to a variable\
    \ that will intercept any references to the original variable with that name.\
    \ (Remember that in Python, variables are just references to the real objects.)\n\
    \nSo, when Example 12-6 is run, in all four `summer()` test functions, when `summer(5,6)`\
    \ is called, the changeling mock `preamble()` is called instead of the real one.\
    \ The mocked version drops that string, so the test can ensure that `summer()`\
    \ returns a string version of the sum of its two arguments.\n\n## Example 12-6.\
    \ Run mocked pytest\n\n```\n$ pytest -q test_summer2.py\n....\n[100%]\n4 passed\
    \ in 0.13s\n```\n\n> That was a contrived case, for simplicity. Mocking can be\
    \ quite complex; see articles like \"Understanding the Python Mock Object Library\"\
    \ by Alex Ronquillo for clear examples, and the official Python docs for the harrowing\
    \ details.\n\n## Test Doubles and Fakes\n\nTo perform that mock, you needed to\
    \ know that the `summer()` function imported the function `preamble()` from the\
    \ module `mod1`. This was a structural test, requiring knowledge of specific variable\
    \ and module names.\n\nIs there a way to perform a behavioral test that doesn't\
    \ need this?\n\nOne way is to define a *double*: separate code that does what\
    \ we want in the test—in this case, make `preamble()` return an empty string.\
    \ One way to do this is with imports. Apply this to this example first, before\
    \ using it for unit tests in the layers of the next three sections.\n\nFirst,\
    \ redefine `mod2.py` in Example 12-7.\n\n## Example 12-7. Make mod2.py import\
    \ a double if unit testing\n\n```\nimport os\nif os.getenv(\"UNIT_TEST\"):\n \
    \   import fake_mod1 as mod1\nelse:\n    import mod1\n\ndef summer(x: int, y:int)\
    \ -> str:\n    return mod1.preamble() + f\"{x+y}\"\n```\n\nExample 12-8 defines\
    \ that double module *fake_mod1.py*.\n\n## Example 12-8. Double fake_mod1.py\n\
    \n```\ndef preamble() -> str:\n    return \"\"\n```\n\nAnd Example 12-9 is the\
    \ test.\n\n## Example 12-9. Test script test_summer_fake.py\n\n```\nimport os\n\
    os.environ[\"UNIT_TEST\"] = \"true\"\nimport mod2\n\ndef test_summer_fake():\n\
    \    assert \"11\" == mod2.summer(5,6)\n```\n\n....which Example 12-10 runs.\n\
    \n## Example 12-10. Run the new unit test\n\n```\n$ pytest -q test_summer_fake.py\n\
    .\n1 passed in 0.04s\n```\n\nThis import-switching method does require adding\
    \ a check for an environment variable, but avoids having to write specific mocks\
    \ for function calls. You can be the judge of which you prefer. The next few sections\
    \ will use the import method, which works nicely with the fake package that I'd\
    \ been using as I defined the code layers.\n\nTo summarize, these examples replaced\
    \ `preamble()` with a mock in a test script or imported a doppelgänger double.\
    \ You can isolate the code being tested in other ways, but these work and are\
    \ not as tricky as others that Google might find for you.\n\n## Web\n\nThis layer\
    \ implements the site’s API. Ideally, each path function (endpoint) should have\
    \ at least one test—maybe more, if the function could fail in more than one way.\
    \ At the Web layer, you typically want to see if the endpoint exists, works with\
    \ the correct parameters, and returns the right status code and data.\n\n> These\
    \ are shallow API tests, testing solely within the Web layer. So, Service-layer\
    \ calls (which would in turn call the Data layer and the database) need to be\
    \ intercepted, along with any other calls that exit the Web layer.\n\nUsing the\
    \ import idea of the previous section, use the environment variable `CRYPTID_UNIT_TEST`\
    \ to import the *fake* package as service, instead of the real service. This stops\
    \ Web functions from calling Service functions, and instead short-circuits them\
    \ to the *fake* (doubles) version. Then the lower Data layer and database aren’t\
    \ involved, either. We get what we want: unit tests. Example 12-11 has the modified\
    \ *web/creature.py* file.\n\n## Example 12-11. Modified *web/creature.py*\n\n\
    ```\nimport os\nfrom fastapi import APIRouter, HTTPException\nfrom model.creature\
    \ import Creature\nif os.getenv(\"CRYPTID_UNIT_TEST\"):\n    from fake import\
    \ creature as service\nelse:\n    from service import creature as service\nfrom\
    \ error import Missing, Duplicate\n\nrouter = APIRouter(prefix = \"/creature\"\
    )\n\n@router.get(\"/\")\ndef get_all() -> list[Creature]:\n    return service.get_all()\n\
    \n@router.get(\"/{name}\")\ndef get_one(name) -> Creature:\n    try:\n       \
    \ return service.get_one(name)\n    except Missing as exc:\n        raise HTTPException(status_code=404,\
    \ detail=exc.msg)\n\n@router.post(\"/\", status_code=201)\ndef create(creature:\
    \ Creature) -> Creature:\n    try:\n        return service.create(creature)\n\
    \    except Duplicate as exc:\n        raise HTTPException(status_code=409, detail=exc.msg)\n\
    \n@router.patch(\"/\")\ndef modify(name: str, creature: Creature) -> Creature:\n\
    \    try:\n        return service.modify(name, creature)\n    except Missing as\
    \ exc:\n        raise HTTPException(status_code=404, detail=exc.msg)\n\n@router.delete(\"\
    /{name}\")\ndef delete(name: str) -> None:\n    try:\n        return service.delete(name)\n\
    \    except Missing as exc:\n        raise HTTPException(status_code=404, detail=exc.msg)\n\
    ```\n\nExample 12-12 has tests, using two pytest fixtures:\n\n- **`sample()`**:\
    \ A new `Creature` object.\n- **`fakes()`**: A list of “existing” creatures.\n\
    \nThe fakes are obtained from a lower-level module. By setting the environment\
    \ variable `CRYPTID_UNIT_TEST`, the Web module from Example 12-11 imports the\
    \ fake service version (providing fake data rather than calling the database)\
    \ instead of the real one. This isolates the tests, which is the point.\n\n##\
    \ Example 12-12. Web unit tests for creatures, using fixtures\n\n```\nfrom fastapi\
    \ import HTTPException\nimport pytest\nimport os\nos.environ[\"CRYPTID_UNIT_TEST\"\
    ] = \"true\"\nfrom model.creature import Creature\nfrom web import creature\n\n\
    @pytest.fixture\ndef sample() -> Creature:\n    return Creature(name=\"dragon\"\
    ,\n        description=\"Wings! Fire! Aieee!\",\n        country=\"*\")\n\n@pytest.fixture\n\
    def fakes() -> list[Creature]:\n    return creature.get_all()\n```"
