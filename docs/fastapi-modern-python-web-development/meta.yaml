    \ 30 Jun 2022 08:09:02 GMT\nserver: uvicorn\n\n\"Hello? Mom?\"\n```\n\n*Example\
    \ 3-14. Test /hi/Mom with Requests*\n\n```python\n>>> import requests\n>>> r =\
    \ requests.get(\"http://localhost:8000/hi/Mom\")\n>>> r.json()\n'Hello? Mom?'\n\
    ```\n\nIn each case, the string \"Mom\" is passed as part of the URL, passed to\
