  mdcn: '# FastAPI


    现代 Python Web 开发


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_0_0.png)


    Bill Lubanovic


    FastAPI 是一个年轻但坚实的框架，它利用了更新的 Python 特性，并采用了简洁的设计。顾名思义，FastAPI 确实很快，在性能上可以与 Golang
    等语言中的类似框架相媲美。通过这本实用的书籍，熟悉 Python 的开发者将学习如何使用 FastAPI，以更少的代码在更短的时间内完成更多工作。


    作者 Bill Lubanovic 涵盖了 FastAPI 开发的方方面面，提供了关于表单、数据库访问、图形、地图等各种主题的实用指南，将带你超越基础知识。本书还将帮助你快速掌握
    RESTful API、数据验证、授权和性能优化。由于它与 Flask 和 Django 等框架有相似之处，你会发现上手 FastAPI 非常容易。


    通过本书的学习，你将：


    - 学习如何使用 FastAPI 构建 Web 应用程序

    - 了解 FastAPI、Starlette 和 Pydantic 之间的区别

    - 学习 FastAPI 的两个独特功能：异步函数和数据类型检查与验证

    - 探索 Python 3.8+ 的新特性，特别是类型注解

    - 理解同步和异步 Python 之间的区别

    - 学习如何连接外部 API 和服务


    Bill Lubanovic 拥有超过 40 年的开发经验，专注于 Linux、Web 和 Python。他最近与团队一起使用 FastAPI 重写了一个大型生物医学研究
    API。Bill 合著了 *Linux System Administration*，并撰写了 *Introducing Python*，这两本书均由 O''Reilly
    出版。


    > “FastAPI 变得简单了！这本书擅长简化 FastAPI 的概念，展示了作者的精通。读者将获得实用知识，并能快速上手。”

    —Ganesh Harke

    花旗银行高级软件工程师


    > “这本书全面概述了 FastAPI 框架及其周边生态系统，让读者能够快速而全面地了解现代 Web 开发。”

    —William Jamir Silva

    Adjust GmbH 高级软件工程师


