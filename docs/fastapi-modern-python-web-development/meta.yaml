  md: "Whether the extra complexity and learning curve are justified depends on your\
    \ application.\n\nAlthough Django was a traditional WSGI application, version\
    \ 3.0 added support for ASGI.\n\nUnlike Flask and FastAPI, Django likes to define\
    \ routes (associating URLs with web functions, which it calls *view functions*)\
    \ in a single URLConf table, rather than using decorators. This makes it easier\
    \ to see all your routes in one place, but makes it harder to see what URL is\
    \ associated with a function when you're looking at just the function.\n\n# Other\
    \ Web Framework Features\n\nIn the previous sections comparing the three frameworks,\
    \ I've mainly compared how to define routes. A web framework might be expected\
    \ to help in these other areas too:\n\n*Forms*\n    All three packages support\
    \ standard HTML forms.\n\n*Files*\n    All these packages handle file uploads\
    \ and downloads, including multipart HTTP requests and responses.\n\n*Templates*\n\
    \    A *template language* lets you mix text and code, and is useful for a *content-oriented*\
    \ website (HTML text with dynamically inserted data), rather than an API website.\
    \ The best-known Python template package is Jinja, and it's supported by Flask,\
    \ Django, and FastAPI. Django also has its own [template language](https://docs.djangoproject.com/en/3.2/ref/templates/language/).\n\
    \nIf you want to use networking methods beyond basic HTTP, try these:\n\n*Server-sent\
    \ events*\n    Push data to a client as needed. Supported by FastAPI ([sse-starlette](https://github.com/sysid/sse-starlette)),\
    \ Flask ([Flask-SSE](https://github.com/paddycarey/flask-sse)), and Django ([Django\
    \ EventStream](https://github.com/fanout/django-eventstream)).\n\n*Queues*\n \
    \   Job queues, publish-subscribe, and other networking patterns are supported\
    \ by external packages like ZeroMQ, Celery, Redis, and RabbitMQ.\n\n*WebSockets*\n\
    \    Supported by FastAPI (directly), Django ([Django Channels](https://channels.readthedocs.io/)),\
    \ and Flask (third-party packages)."
