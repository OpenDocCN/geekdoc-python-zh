- img_proc: true
  md: "![](img/1d00ed3e85bc756220a3f1a1e9a9664f_80_0.png)\n\nIn Python 3.10 and up,\
    \ you can say `type1 | type2` instead of `Union[type1, type2]`.\n\nExamples of\
    \ Pydantic definitions for a Python `dict` include the following:\n\n```\npython\n\
    from typing import Any\nresponses: dict[str, Any] = {\"Marco\": \"Polo\", \"answer\"\
    : 42}\n```\n\nOr, a little more specific:\n\n```\npython\nfrom typing import Union\n\
    responses: dict[str, Union[str, int]] = {\"Marco\": \"Polo\", \"answer\": 42}\n\
    ```\n\nor (Python 3.10 and up):\n\n```\npython\nresponses: dict[str, str | int]\
    \ = {\"Marco\": \"Polo\", \"answer\": 42}\n```\n\nNotice that a type-hinted variable\
    \ line is legal Python, but a bare variable line is not:\n\n```\n\n$ python\n\
    ...\n>>> thing0\nTraceback (most recent call last):\n  File \"<stdin>\", line\
    \ 1, in <module>\nNameError: name 'thing0' is not defined\n>>> thing0: str\n```\n\
    \nAlso, incorrect type uses are not caught by the regular Python interpreter:\n\
    \n```\n\n$ python\n...\n>>> thing1: str = \"yeti\"\n>>> thing1 = 47\n```\n\nBut\
    \ they will be caught by mypy. If you don't already have it, run `pip install\
    \ mypy`. Save those two preceding lines to a file called `stuff.py`, and then\
    \ try this:\n\n```\n\n$ mypy stuff.py\nstuff.py:2: error: Incompatible types in\
    \ assignment\n(expression has type \"int\", variable has type \"str\")\nFound\
    \ 1 error in 1 file (checked 1 source file)\n```\n\nA function return type hint\
    \ uses an arrow instead of a colon:\n\n```\npython\nfunction(args) -> type:\n\
    ```"
