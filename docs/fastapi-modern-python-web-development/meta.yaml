    \ body\n\n```\nfrom fastapi import FastAPI, Body\n\napp = FastAPI()\n\n@app.post(\"\
    /hi\")\ndef greet(who:str = Body(embed=True)):\n    return f\"Hello? {who}?\"\n\
    ```\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_53_0.png)\n\nThat Body(embed=True)\
