    # Pagination and Sorting


    In web interfaces, when returning many or all things with URL patterns like GET
    /resource, you often want to request the lookup and return of the following:


    +   - Only one thing

    - Possibly many things

    - All things


    How do you get our well-meaning but extremely literal-minded computer to do these
    things? Well, for the first case, the RESTful pattern that I mentioned earlier
    is to include the resource’s ID in the URL path. When getting multiple resources,
    we may want to see the results in a particular order:


    *Sort*

    Order all the results, even if you get only a set of them at a time.


    *Paginate*

    Return only some results at a time, respecting any sorting.


    In each case, a group of user-specified parameters indicates what you want. It’s
    common to provide these as query parameters. Here are some examples:


    *Sort*

    GET /explorer?sort=country: Get all explorers, sorted by country code.


    *Paginate*

    GET /explorer?offset=10&size=10: Return (in this case, unsorted) explorers in
    places 10 through 19 of the whole list.


    *Both*

    GET /explorer?sort=country&offset=10&size=10


    Although you could specify these as individual query parameters, FastAPI’s dependency
    injection can help:


    +   - Define the sort and paginate parameters as a Pydantic model.

    - Provide the parameters model to the get_all() path function with the Depends
    feature in the path function arguments.


    Where should the sorting and pagination occur? At first, it may seem simplest
    for the database queries to pass full results up to the Web layer, and use Python
    to carve up the data there. But that isn’t very efficient. These tasks usually
    fit best in the Data layer, because databases are good at those things. I’ll finally
    get around to some code for these in Chapter 17, which has more database tidbits
    beyond those in Chapter 10.'
