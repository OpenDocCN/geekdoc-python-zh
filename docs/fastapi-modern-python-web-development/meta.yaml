  md: "Example 18-5. Calculate score (service/game.py)\n\n```\nfrom collections import\
    \ Counter, defaultdict\n\nHIT = \"H\"\nMISS = \"M\"\nCLOSE = \"C\"  # (letter\
    \ is in the word, but at another position)\n\ndef get_score(actual: str, guess:\
    \ str) -> str:\n    length: int = len(actual)\n    if len(guess) != length:\n\
    \        return ERROR\n    actual_counter = Counter(actual) # {letter: count,\
    \ ...}\n    guess_counter = defaultdict(int)\n    result = [MISS] * length\n \
    \   for pos, letter in enumerate(guess):\n        if letter == actual[pos]:\n\
    \            result[pos] = HIT\n            guess_counter[letter] += 1\n    for\
    \ pos, letter in enumerate(guess):\n        if result[pos] == HIT:\n         \
    \   continue\n        guess_counter[letter] += 1\n        if (letter in actual\
    \ and\n            guess_counter[letter] <= actual_counter[letter]):\n       \
    \     result[pos] = CLOSE\n    result = ''.join(result)\n    return result\n```\n\
    \n# Test!\n\nExample 18-6 contains some pytest exercises for the service score\
    \ calculation. It uses pytest's parametrize feature to pass in a sequence of tests,\
    \ rather than writing a loop inside the test function itself. Remember from Example\
    \ 18-5 that H is a direct hit, C is close (wrong position), and M is a miss.\n\
    \nExample 18-6. Test score calculation (test/unit/service/test_game.py)\n\n```\n\
    import pytest\nfrom service import game\n\nword = \"bigfoot\"\nguesses = [\n \
