    \ SQL，内存中的 SQLite 也可能足以模拟其他数据库。如果不是，这些模块专门用于模拟特定数据库：\n\n- *PostgreSQL*: pgmock\n\
    - *MongoDB*: Mongomock\n- *多种数据库*: Pytest Mock Resources 在 Docker 容器中启动各种测试数据库，并与\
    \ pytest 集成。\n\n最后，你也可以直接启动一个与生产环境相同类型的测试数据库。一个环境变量可以包含具体细节，就像你一直使用的单元测试/假货技巧一样。\n\
    \n## 仓储模式\n\n虽然我在本书中没有实现它，但仓储模式是一个有趣的方法。*仓储*是一个简单的中间内存数据存储——就像你目前在这里看到的假数据层一样。然后它与可插拔的真实数据库后端通信。它伴随着一个工作单元模式，该模式确保单个*会话*中的一组操作要么作为一个整体提交，要么作为一个整体回滚。\n\
    到目前为止，本书中的数据库查询都是原子性的。对于现实世界的数据库工作，你可能需要多步查询和某种会话处理。仓储模式也与依赖注入相辅相成，你在本书的其他地方已经见过它，现在可能也稍微欣赏它了。\n\
    \n## 自动化完整测试\n\n完整测试将所有层一起运行，尽可能接近生产环境的使用情况。你在本书中已经看到的大多数测试都是完整的：调用 Web 端点，穿过服务镇到达数据村中心，然后带着杂货返回。这些是封闭测试。一切都是实时的，你不在乎它是如何做到的，只在乎它做到了。\n\
    \n你可以通过两种方式完整测试整体 API 中的每个端点：\n\n- *通过 HTTP/HTTPS*：编写单独的 Python 测试客户端来访问服务器。本书中的许多例子都这样做了，使用像\
    \ HTTPie 这样的独立客户端，或者在使用 Requests 的脚本中。\n- *使用 TestClient*：使用这个内置的 FastAPI/Starlette\
    \ 对象直接访问服务器，无需显式的 TCP 连接。\n\n但这些方法需要为每个端点编写一个或多个测试。这可能会变得非常繁琐，而我们现在已经过了中世纪好几个世纪了。一种更新的方法是基于*属性测试*。这利用了\
    \ FastAPI 自动生成的文档。每次你在 Web 层更改路径函数或路径装饰器时，FastAPI 都会创建一个名为 *openapi.json* 的 OpenAPI\
    \ *模式*。此模式详细描述了每个端点的所有内容：参数、返回值等。这就是 OpenAPI 的用途，正如 [OpenAPI Initiative 的 FAQ\
    \ 页面](https://www.openapis.org/faq) 所描述的：\n\n> OAS 为 REST API 定义了一个标准的、与编程语言无关的接口描述，它允许人类和计算机在无需访问源代码、额外文档或检查网络流量的情况下发现和理解服务的功能。\n\
    —OAS（OpenAPI 规范）\n\n需要两个包：\n\n- *Hypothesis*：`pip install hypothesis`\n- *Schemathesis*：`pip\
    \ install schemathesis`\n\nHypothesis 是基础库，Schemathesis 将其应用于 FastAPI 生成的 OpenAPI\
    \ 3.0 模式。运行 Schemathesis 会读取此模式，生成大量具有不同数据的测试（这些数据你不需要自己想出来！），并与 pytest 配合使用。"
