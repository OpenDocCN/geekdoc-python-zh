- img_proc: true
  md: 'frameworks are all built on WSGI. But synchronous communication may mean busy
    waiting for something that''s *much* slower than the CPU, like a disk or network.
    Then you''ll look for better *concurrency*. Concurrency has become more important
    in recent years. As a result, the Python Asynchronous Server Gateway Interface
    (ASGI) specification was developed. Chapter 4 talks about this.


    # Django


    Django is a full-featured web framework that tags itself as “the web framework
    for perfectionists with deadlines.” It was announced by Adrian Holovaty and Simon
    Willison in 2003, and named after Django Reinhardt, a 20th-century Belgian jazz
    guitarist. Django is often used for database-backed corporate sites. I include
    more details on Django in Chapter 7.


    # Flask


    In contrast, Flask, introduced by Armin Ronacher in 2010, is a *microframework*.
    Chapter 7 has more information on Flask and how it compares with Django and FastAPI.


    # FastAPI


    After meeting other suitors at the ball, we finally encounter the intriguing FastAPI,
    the subject of this book. Although FastAPI was published by Sebastián Ramírez
    in 2018, it has already climbed to the third place of Python web frameworks, behind
    Flask and Django, and is growing faster. A 2022 comparison shows that it may pass
    them at some point.


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_39_0.png)


    As of the end of October 2023, here are the GitHub star counts:


    +   - Django: 73.8 thousand

    - Flask: 64.8 thousand

    - FastAPI: 64 thousand'
