    same functions. An example is an in-memory class that mimics a database. You’ll
    be making some fake data in this chapter and the next few, as you fill in the
    code that defines the layers and their communication. In [Chapter 10](#), you’ll
    define an actual live data store (a database) to replace these fakes.


