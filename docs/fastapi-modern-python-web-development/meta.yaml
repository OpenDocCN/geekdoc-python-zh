  md: 'So, in this book I’m taking the web-first approach—step-by-step, starting with
    essential parts, and adding others as needed on the way down. Sometimes experiments
    work, sometimes not. I’ll avoid the urge to stuff everything into this Web layer
    at first.


    > This Web layer is just one way of passing data between a user and a service.
    Alternate ways exist, such as by a CLI or software development kit (SDK). In other
    frameworks, you might see this Web layer called a *view* or *presentation* layer.


    # RESTful API Design


    HTTP is a way to get commands and data between web clients and servers. But, just
    as you can combine ingredients from your refrigerator in ways from ghastly to
    gourmet, some recipes for HTTP work better than others.


    In Chapter 1, I mentioned that *RESTful* became a useful, though sometimes fuzzy,
    model for HTTP development. RESTful designs have these core components:


    +   *Resources*

    The data elements your application manages


    *IDs*

    Unique resource identifiers


    *URLs*

    Structured resource and ID strings


    *Verbs or actions*

    Terms that accompany URLs for different purposes:


    GET

    Retrieve a resource.


    POST

    Create a new resource.


    PUT

    Completely replace a resource.


    PATCH

    Partially replace a resource.


    DELETE

    Resource goes kaboom.'
