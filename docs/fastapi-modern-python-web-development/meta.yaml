    \ /explorer .                                [ 41%]\nGET /explorer/{name} .  \
    \                        [ 50%]\nDELETE /explorer/{name} .                   \
    \    [ 58%]\nGET /creature/ .                                [ 66%]\nPOST /creature/\
    \ .                               [ 75%]\nPATCH /creature/ F                 \
    \             [ 83%]\nGET /creature/{name} .                          [ 91%]\n\
    DELETE /creature/{name} .                       [100%]\n```\n\nI got two F's,\
    \ both in PATCH calls (modify() functions). How mortifying.\n\nThis output section\
    \ is followed by one marked FAILURES, with detailed stack traces of any tests\
    \ that failed. Those need to be fixed. The final section is marked SUMMARY:\n\n\
    ```\nPerformed checks:\n    not_a_server_error                    717 / 727 passed\
    \          FAILED\n\nHint: You can visualize test results in Schemathesis.io\n\
    by using '--report' in your CLI command.\n```\n\nThat was fast, and multiple tests\
    \ were not needed for each endpoint, imagining inputs that might break them. Property-based\
    \ testing reads the types and constraints of the input arguments from the API\
    \ schema, and generates a range of values to shoot at each endpoint.\n\nThis is\
    \ yet another unexpected benefit of type hints, which at first seemed to be just\
    \ nice things:\n\ntype hints → OpenAPI schema → generated documentation *and*\
    \ tests\n\n## Security Testing\n\nSecurity isn’t one thing, but everything. You\
    \ need to defend against malice but also against plain old mistakes, and even\
    \ events that you have no control over. Let’s defer scaling issues to the next\
    \ section and deal mainly here with the analysis of potential threats.\n\nChapter\
    \ 11 discussed authentication and authorization. These factors are always messy\
    \ and error-prone. It’s tempting to use clever methods to counteract clever attacks,\
    \ and it’s always a challenge to design protection that’s easy to understand and\
    \ implement.\n\nBut now that you know about Schemathesis, read its documentation\
    \ on property-based testing for authentication. Just as it vastly simplified testing\
    \ most of the API, it can automate much of the tests for endpoints that need authentication.\n\
    \n## Load Testing\n\nLoad tests show how your application handles heavy traffic:\n\
    \n- API calls\n- Database reads or writes\n- Memory use\n- Disk use\n- Network\
    \ latency and bandwidth\n\nSome can be *full* tests that simulate an army of users\
    \ clamoring to use your service; you want to be ready before that day arrives.\
    \ The content in this section overlaps with that in “Performance” on page 188\
    \ and “Troubleshooting” on page 190.\n\nMany good load testers out are there,\
    \ but here I’ll recommend Locust. With Locust, you define all your tests with\
    \ plain Python scripts. It can simulate hundreds of thousands of users, all pounding\
    \ away at your site, or even multiple servers, at once.\n\nInstall it locally\
    \ with `pip install locust`. Your first test may be how many concurrent visitors\
    \ your site can handle. This is like testing how much extreme weather a building\
    \ can withstand when faced with a hurricane/earthquake/blizzard or other home\
    \ insurance event. So, you need some website structural tests. Follow the Locust\
    \ docs for all the details.\n\nBut, as they say on TV, there's more! Recently,\
    \ Grasshopper extended Locust to do things like measuring time across multiple\
    \ HTTP calls. To try this extension out, install with `pip install locust-grasshopper`.\n\
    \n## Review\n\nThis chapter fleshed out the types of testing, with examples of\
    \ pytest performing automated code testing at the unit, integration, and full\
    \ levels. API tests can be automated with Schemathesis. This chapter also discussed\
    \ how to expose security and performance problems before they strike.\n\n# CHAPTER\
    \ 13\nProduction\n\n> If builders built buildings the way programmers wrote programs,\
    \ the first woodpecker that came along would destroy civilization.\n—Gerald Weinberg,\
    \ computer scientist\n\n## Preview\n\nYou have an application running on your\
    \ local machine, and now you'd like to share it. This chapter presents many scenarios\
    \ on how to move your application to production, and keep it running correctly\
    \ and efficiently. Because some of the details can be very detailed, in some cases\
    \ I'll refer to helpful external documents rather than stuffing them in here.\n\
    \n## Deployment\n\nAll the code examples in this book so far have used a single\
    \ instance of uvicorn running on localhost, port 8000. To handle lots of traffic,\
    \ you want multiple servers, running on the multiple cores that modern hardware\
    \ provides. You'll also need something above these servers to do the following:\n\
    \n- Keep them running (a supervisor)\n- Gather and feed external requests (a reverse\
    \ proxy)\n- Return responses\n- Provide HTTPS termination (SSL decryption)\n\n\
    ## Multiple Workers\n\nYou've probably seen another Python server called Gunicorn.\
    \ This can supervise multiple workers, but it's a WSGI server, and FastAPI is\
    \ based on ASGI. Luckily, there's a special Uvicorn worker class that can be managed\
    \ by Gunicorn.\n\nExample 13-1 sets up these Uvicorn workers on localhost, port\
    \ 8000 (this is adapted from the official documentation). The quotes protect the\
    \ shell from any special interpretation.\n\n### Example 13-1. Use Gunicorn with\
    \ Uvicorn workers\n\n```\n$ pip install \"uvicorn[standard]\" gunicorn\n$ gunicorn\
    \ main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000\n\
    ```\n\nYou'll see many lines as Gunicorn does your bidding. It will start a top-level\
    \ Gunicorn process, talking to four Uvicorn worker subprocesses, all sharing port\
    \ 8000 on local host (0.0.0.0). Change the host, port, or number of workers if\
    \ you want something else. The main:app refers to main.py and the FastAPI object\
    \ with the variable name app. The Gunicorn docs claim the following:\n\n> Gunicorn\
    \ should only need 4-12 worker processes to handle hundreds or thousands of requests\
    \ per second.\n\nIt turns out that Uvicorn itself can also fire up multiple Uvicorn\
    \ workers, as in Example 13-2.\n\n### Example 13-2. Use Uvicorn with Uvicorn workers\n\
    \n```\n$ uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4\n```\n\nBut this\
    \ method doesn't do process management, so the gunicorn method is usually preferred.\
    \ Other process managers exist for Uvicorn: see its official docs.\n\nThis handles\
    \ three of the four jobs mentioned in the previous section, but not HTTPS encryption.\n\
    \n## HTTPS\n\nThe official FastAPI [HTTPS docs](https://fastapi.tiangolo.com/deployment/https/),\
    \ like all of the official FastAPI docs, are extremely informative. I recommend\
    \ reading them, followed by Ramírez's [description](https://testdriven.io/blog/fastapi-docker-https/)\
    \ of how to add HTTPS support to FastAPI by using [Traefik](https://traefik.io/).\
    \ Traefik sits “above” your web servers, similar to nginx as a reverse proxy and\
    \ load balancer, but it includes that HTTPS magic.\n\nAlthough the process has\
    \ many steps, it’s still much simpler than it used to be. In particular, you used\
    \ to regularly pay big bucks to a certificate authority for a digital certificate\
    \ that you could use to provide HTTPS for your site. Luckily, those authorities\
    \ have been largely replaced by the free service [Let’s Encrypt](https://letsencrypt.org/).\n\
    \n## Docker\n\nWhen Docker burst on the scene (in a five-minute [lightning talk](https://www.youtube.com/watch?v=w6W8BgabdOY)\
    \ by Solomon Hykes of dotCloud at PyCon 2013), it was the first time most of us\
    \ had ever heard of Linux containers. Over time, we learned that Docker was faster\
    \ and lighter than virtual machines. Instead of emulating a full operating system,\
    \ each container shared the server’s Linux kernel, and isolated processes and\
    \ networks into their own namespaces. Suddenly, by using the free Docker software,\
    \ you could host multiple independent services on a single machine, without worrying\
    \ about them stepping all over one another.\n\nTen years later, Docker is universally\
    \ recognized and supported. If you want to host your FastAPI application on a\
    \ cloud service, you’ll usually need to create a *Docker image* of it first. The\
    \ [official FastAPI docs](https://fastapi.tiangolo.com/deployment/docker/) include\
    \ a thorough description of how to build a Dockerized version of your FastAPI\
    \ application. One step is to write a *Dockerfile*: a text file containing Docker\
    \ configuration info, like what application code to use and what processes to\
    \ run. Just to prove that this isn’t brain surgery during a rocket launch, here’s\
    \ the Dockerfile from that page:\n\n```dockerfile\nFROM python:3.9\nWORKDIR /code\n\
    COPY ./requirements.txt /code/requirements.txt\nRUN pip install --no-cache-dir\
    \ --upgrade -r /code/requirements.txt\nCOPY ./app /code/app\nCMD [\"uvicorn\"\
    , \"app.main:app\", \"--host\", \"0.0.0.0\", \"--port\", \"80\"]\n```\n\nI recommend\
    \ reading the official docs, or other links that a Google search of fastapi docker\
    \ will produce, such as “[The Ultimate FastAPI Tutorial Part 13—Using Docker to\
    \ Deploy Your App](https://testdriven.io/blog/fastapi-docker/)” by Christopher\
    \ Samiullah."
  mdcn: "## 示例 12-16. 精简版 main.py\n\n```python\nfrom fastapi import FastAPI\nfrom\
