    And long-leggetty beasties

    And things that go bump in the night

    Good Lord deliver us.

    —Verse from a Cornish litany


    Imaginary creatures, or *cryptids*, have been reported everywhere. Some animals,
    once considered imaginary—like the panda, platypus, and black swan—turned out
    to be real. So we won''t speculate. Intrepid explorers are seeking them out. Together,
    they provide data for the examples in this book.


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_264_0.png)'
