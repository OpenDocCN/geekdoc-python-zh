    \ response.\n\nThe response in each case is the JSON string (with single or double\
    \ quotes, depending on which test client you used) \"Hello? Mom?\".\n\n## Query\
    \ Parameters\n\nQuery parameters are the `name=value` strings after the `?` in\
    \ a URL, separated by `&` characters. Edit *hello.py* again in Example 3-15.\n\
    \n*Example 3-15. Return the greeting query parameter*\n\n```python\nfrom fastapi\
