    ## Preface


    This is a pragmatic introduction to FastAPI—a modern Python web framework. It’s
    also a story of how, now and then, the bright and shiny objects that we stumble
    across can turn out to be very useful. A silver bullet is nice to have when you
    encounter a werewolf. (And you will encounter werewolves later in this book.)


    I started programming scientific applications in the mid-1970s. And after I first
    met Unix and C on a PDP-11 in 1977, I had a feeling that this Unix thing might
    catch on.


    In the ’80s and early ’90s, the internet was still noncommercial, but already
    a good source for free software and technical info. And when a web browser called
    Mosaic was distributed on the baby open internet in 1993, I had a feeling that
    this web thing might catch on.


    When I started my own web development company a few years later, my tools were
    the usual suspects at the time: PHP, HTML, and Perl. On a contract job a few years
    later, I finally experimented with Python and was surprised at how quickly I was
    able to access, manipulate, and display data. In my spare time over two weeks,
    I was able to replicate most of a C application that had taken four developers
    a year to write. Now I had a feeling that this Python thing might catch on.


    After that, most of my work involved Python and its web frameworks, mostly Flask
    and Django. I particularly liked the simplicity of Flask and preferred it for
    many jobs. But just a few years ago, I spied something glinting in the underbrush:
    a new Python web framework called FastAPI, written by Sebastián Ramírez.


    As I read his (excellent) [documentation](https://fastapi.tiangolo.com/), I was
    impressed by the design and thought that had gone into it. In particular, his
    [history](https://fastapi.tiangolo.com/history/) page showed how much care he
    had taken evaluating alternatives. This was not an ego project or a fun experiment,
    but a serious framework for real-world development. Now I had a feeling that this
    FastAPI thing might catch on.


    I wrote a biomedical API site with FastAPI, and it went so well that a team of
    us rewrote our old core API with FastAPI in the next year. This is still in production
    and has held up well. Our group learned the basics that you''ll read in this book,
    and all felt that we were writing better code, faster, with fewer bugs. And by
    the way, some of us had not written in Python before, and only I had used FastAPI.


    So when I had an opportunity to suggest a follow-up to my *Introducing Python*
    book to O''Reilly, FastAPI was at the top of my list. In my opinion, FastAPI will
    have at least the impact that Flask and Django have had, and maybe more.


    As I''ve mentioned, the FastAPI website itself provides world-class documentation,
    including many details on the usual web topics: databases, authentication, deployment,
    and so on. So why write a book?


    This book isn''t meant to be exhaustive because, well, that''s exhausting. It
    *is* meant to be useful—to help you quickly pick up the main ideas of FastAPI
    and apply them. I will point out various techniques that required some sleuthing
    and offer advice on day-to-day best practices.


    I start each chapter with a Preview of what''s coming. Next, I try not to forget
    what I just promised, offering details and random asides. Finally, there''s a
    brief digestible Review.


    As the saying goes, "These are the opinions on which my facts are based." Your
    experience will be unique, but I hope that you will find enough of value here
    to become a more productive web developer.


    ## Conventions Used in This Book


    The following typographical conventions are used in this book:


    *Italic*

    Indicates new terms, URLs, email addresses, filenames, and file extensions.


    **Constant width**

    Used for program listings, as well as within paragraphs to refer to program elements
    such as variable or function names, databases, data types, environment variables,
    statements, and keywords.


    **Constant width bold**

    Shows commands or other text that should be typed literally by the user.


    *Constant width italic*

    Shows text that should be replaced with user-supplied values or by values determined
    by context.


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_16_0.png)


    This element signifies a tip or suggestion.


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_16_1.png)


    This element signifies a general note.


    ## Using Code Examples


    Supplemental material (code examples, exercises, etc.) is available for download
    at [https://github.com/madscheme/fastapi](https://github.com/madscheme/fastapi).


    If you have a technical question or a problem using the code examples, please
    send email to [support@oreilly.com](mailto:support@oreilly.com).


    This book is here to help you get your job done. In general, if example code is
    offered with this book, you may use it in your programs and documentation. You
    do not need to contact us for permission unless you''re reproducing a significant
    portion of the code. For example, writing a program that uses several chunks of
    code from this book does not require permission. Selling or distributing examples
    from O''Reilly books does require permission. Answering a question by citing this
    book and quoting example code does not require permission. Incorporating a significant
    amount of example code from this book into your product''s documentation does
    require permission.


    We appreciate, but generally do not require, attribution. An attribution usually
    includes the title, author, publisher, and ISBN. For example: “*FastAPI* by Bill
    Lubanovic (O''Reilly). Copyright 2024 Bill Lubanovic, 978-1-098-13550-8.”


    If you feel your use of code examples falls outside fair use or the permission
    given above, feel free to contact us at [permissions@oreilly.com](mailto:permissions@oreilly.com).


