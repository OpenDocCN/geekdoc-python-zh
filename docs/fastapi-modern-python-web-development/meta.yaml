  md: "The second, as in Example 4-6, is to call Uvicorn from inside the example code,\
    \ when it’s run as a main program instead of a module.\n\nExample 4-6. Another\
    \ shy async endpoint (greet_async_uvicorn.py)\n\n```\nfrom fastapi import FastAPI\n\
    import asyncio\nimport uvicorn\n\napp = FastAPI()\n\n@app.get(\"/hi\")\nasync\
    \ def greet():\n    await asyncio.sleep(1)\n    return \"Hello? World?\"\n\nif\
    \ __name__ == \"__main__\":\n    uvicorn.run(\"greet_async_uvicorn:app\")\n```\n\
    \nWhen run as a standalone program, Python names it main. That if __name__...\
    \ stuff is Python’s way of running it only when called as a main program. Yes,\
    \ it’s ugly.\n\nThis code will pause for one second before returning its timorous\
    \ greeting. The only difference from a synchronous function that used the standard\
    \ sleep(1) function is that the web server can handle other requests in the meantime\
    \ with the async example.\n\nUsing asyncio.sleep(1) fakes a real-world function\
    \ that might take one second, like calling a database or downloading a web page.\
    \ Later chapters will show examples of such calls from this Web layer to the Service\
    \ layer, and from there to the Data layer, actually spending that wait time on\
    \ real work.\n\nFastAPI calls this async greet() path function itself when it\
    \ receives a GET request for the URL /hi. You don’t need to add an await anywhere.\
    \ But for any other async def function definitions that you make, the caller must\
    \ put an await before each call.\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_73_0.png)\n\
    \nFastAPI runs an async event loop that coordinates the async path functions,\
    \ and a threadpool for synchronous path functions. A developer doesn’t need to\
