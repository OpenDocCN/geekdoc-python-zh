    \n*Figure I-1. FastAPI: Modern Pooch Woof Development*\n\n1 I actually shook his\
    \ hand once. I didn't wash mine for a month, but I'll bet he did right away.\n\
    \nBut I digress.² This book is about the following:\n\n*The web*\n    An especially\
    \ productive technology, how it has changed, and how to develop software for it\
    \ now\n\n*Python*\n    An especially productive web development language\n\n*FastAPI*\n\
    \    An especially productive Python web framework\n\nThe two chapters in this\
    \ first part discuss emerging topics in the web and in Python: services and APIs;\
    \ concurrency; layered architectures; and big, big data.\n\nPart II is a high-level\
    \ tour of FastAPI, a fresh Python web framework that has good answers to the questions\
    \ posed in Part I.\n\nPart III ruminates deeper through the FastAPI toolbox, including\
    \ tips learned during production development.\n\nFinally, Part IV provides a gallery\
    \ of FastAPI web examples. They use a common data source—imaginary creatures—that\
