  - '[PAGE 34]


    This also works for expressions:


    ```

    >>> wrong_answer = 43

    >>> wrong_answer - 3

    40

    ```


    If you''re fairly new to Python or would like a quick review, read the next few
    sections.


    # Python Itself


    You will need, as a bare minimum, Python 3.7. This includes features like type
    hints and asyncio, which are core requirements for FastAPI. I recommend using
    at least Python 3.9, which will have a longer support lifetime. The standard source
    for Python is the [Python Software Foundation](https://www.python.org/).


    # Package Management


    You will want to download external Python packages and install them safely on
    your computer. The classic tool for this is `pip`.


    But how do you download this downloader? If you installed Python from the Python
    Software Foundation, you should already have pip. If not, follow the instructions
    at the pip site to get it. Throughout this book, as I introduce a new Python package,
    I''ll include the pip command to download it.


    Although you can do a lot with plain old pip, you''ll likely also want to use
    virtual environments and consider an alternative tool like Poetry.


    # Virtual Environments


    Pip will download and install packages, but where should it put them? Although
    standard Python and its included libraries are usually installed in a standard
    place on your operating system, you may not (and probably should not) be able
    to change anything there. Pip uses a default directory other than the system one,
    so you won''t step on your system''s standard Python files. You can change this;
    see the pip site for details for your operating system.


    But it''s common to work with multiple versions of Python, or make installations
    specific to a project, so you know exactly which packages are in there. To do
    this, Python supports *virtual environments*. These are just directories (*folders*
    in the non-Unix world) into which pip writes downloaded packages. When you *activate*
    a virtual environment, your shell (main system command interpreter) looks there
    first when loading Python modules.


    The program for this is `venv`, and it''s been included with standard Python since
    version 3.4.'
  - '[PAGE 35]


    Let''s make a virtual environment called venv1. You can run the venv module as
    a standalone program:


    ```

    $ venv venv1

    ```


    Or as a Python module:


    ```

    $ python -m venv venv1

    ```


    To make this your current Python environment, run this shell command (on Linux
    or Mac; see the venv docs for Windows and others):


    ```

    $ source venv1/bin/activate

    ```


    Now, anytime you run `pip install`, it will install packages under venv1. And
    when you run Python programs, that''s where your Python interpreter and modules
    will be found.


    To *deactivate* your virtual environment, press Control-D (Linux or Mac), or type
    **deactivate** (Windows).


    You can create alternative environments like venv2, and deactivate/activate to
    step between them (although I hope you have more naming imagination than me).


    # Poetry


    This combination of pip and venv is so common that people started combining them
    to save steps and avoid that source shell wizardry. One such package is Pipenv,
    but a newer rival called Poetry is becoming more popular.


    Having used pip, Pipenv, and Poetry, I now prefer Poetry. Get it with `pip install
    poetry`. Poetry has many subcommands, such as `poetry add` to add a package to
    your virtual environment, `poetry install` to actually download and install it,
    and so on. Check the Poetry site or run the `poetry` command for help.


    Besides downloading single packages, pip and Poetry manage multiple packages in
    configuration files: *requirements.txt* for pip, and *pyproject.toml* for Poetry.
    Poetry and pip don''t just download packages, but also manage the tricky dependencies
    that packages may have on other packages. You can specify desired package versions
    as minima, maxima, ranges, or exact values (also known as *pinning*). This can
    be important as your project grows and the packages that it depends on change.
    You may need a minimum version of a package if a feature that you use first appeared
    there, or a maximum if a feature was dropped.'
- md: '## Source Formatting


    Source formatting is less important than the topics of the previous sections but
    still helpful. Avoid code formatting (*bikeshedding*) arguments with a tool that
    massages source into a standard, nonweird format. One good choice is **Black**.
    Install it with `pip install black`.


    ## Testing


    Testing is covered in detail in **Chapter 12**. Although the standard Python test
    package is unittest, the industrial-strength Python test package used by most
    Python developers is **pytest**. Install it with `pip install pytest`.


    ## Source Control and Continuous Integration


    The almost-universal solution for source control now is *Git*, with storage repositories
    (*repos*) at sites like GitHub and GitLab. Using Git isn''t specific to Python
    or FastAPI, but you''ll likely spend a lot of your development time with Git.
    The **pre-commit** tool runs various tests on your local machine (such as `black`
    and `pytest`) before committing to Git. After pushing to a remote Git repo, more
    continuous integration (CI) tests may be run there.


    **Chapter 12** and "Troubleshooting" on page 190 have more details.


    ## Web Tools


    **Chapter 3** shows how to install and use the main Python web tools used in this
    book:


    - *FastAPI* - The web framework itself

    - *Uvicorn* - An asynchronous web server

    - *HTTPie* - A text web client, similar to curl

    - *Requests* - A synchronous web client package

    - *HTTPX* - A synchronous/asynchronous web client package


    ## APIs and Services


    Python''s modules and packages are essential for creating large applications that
    don''t become “big balls of mud”. Even in a single-process web service, you can
    maintain the separation discussed in Chapter 1 by the careful design of modules
    and imports.


    Python''s built-in data structures are extremely flexible, and very tempting to
    use everywhere. But in the coming chapters, you''ll see that we can define higher-level
    models to make our interlayer communication cleaner. These models rely on a fairly
    recent Python addition called type hinting. Let''s get into that, but first with
    a brief aside on how Python handles variables. This won''t hurt.


    ## Variables Are Names


    The term object has many definitions in the software world—maybe too many. In
    Python, an object is a data structure that wraps every distinct piece of data
    in the program, from an integer like 5, to a function, to anything that you might
    define. It specifies, among other bookkeeping info, the following:


    - A unique identity value

    - The low-level type that matches the hardware

    - The specific value (physical bits)

    - A reference count of the number of variables that refer to it


    Python is strongly typed at the object level (its type doesn''t change, although
    its value might). An object is termed mutable if its value may be changed, immutable
    if not.


    But at the variable level, Python differs from many other computing languages,
    and this can be confusing. In many other languages, a variable is essentially
    a direct pointer to an area of memory that contains a raw value, stored in bits
    that follow the computer''s hardware design. If you assign a new value to that
    variable, the language overwrites the previous value in memory with the new one.


    That''s direct and fast. The compiler keeps track of what goes where. It''s one
    reason languages like C are faster than Python. As a developer, you need to ensure
    that you assign only values of the correct type to each variable.


    Now, here''s the big difference with Python: a Python variable is just a name
    that is temporarily associated with a higher-level object in memory. If you assign
    a new value to a variable that refers to an immutable object, you''re actually
    creating a new object that contains that value, and then getting the name to refer
    to that new object. The old object (that the name used to refer to) is then free,
    and its memory can be reclaimed if no other names are still referring to it (i.e.,
    its reference count is 0).


    In *Introducing Python* (O''Reilly), I compare objects to plastic boxes sitting
    on memory shelves, and names/variables to sticky notes on these boxes. Or you
    can picture names as tags attached by strings to those boxes.


    Usually, when you use a name, you assign it to one object, and it stays attached.
    Such simple consistency helps you understand your code. A variable''s *scope*
    is the area of code in which a name refers to the same object—such as within a
    function. You can use the same name in different scopes, but each one refers to
    a different object.


    Although you can make a variable refer to different objects throughout a Python
    program, that isn''t necessarily a good practice. Without looking, you don''t
    know if name x on line 100 is in the same scope as name x on line 20. (By the
    way, x is a terrible name. We should pick names that actually confer some meaning.)


    ## Type Hints


    All of this background has a point.


    Python 3.6 added *type hints* to declare the type of object to which a variable
    refers. These are *not* enforced by the Python interpreter as it''s running! Instead,
    they can be used by various tools to ensure that your use of a variable is consistent.
    The standard type checker is called *mypy*, and I''ll show you how it''s used
    later.


    A type hint may seem like just a nice thing, like many lint tools used by programmers
    to avoid mistakes. For instance, it may remind you that your variable count refers
    to a Python object of type *int*. But hints, although they''re optional and unenforced
    notes (literally, hints), turn out to have unexpected uses. Later in this book,
    you''ll see how FastAPI adapted the Pydantic package to make clever use of type
    hinting.


    The addition of type declarations may be a trend in other, formerly typeless,
    languages. For example, many JavaScript developers have moved to [TypeScript](https://www.typescriptlang.org/).


    ## Data Structures


    You''ll get details on Python and data structures in [Chapter 5](https://learning.oreilly.com/library/view/introducing-python-2nd/9781492051374/ch05.html).


    ## Web Frameworks


    Among other things, a web framework translates between HTTP bytes and Python data
    structures. It can save you a lot of effort. On the other hand, if part of it
    doesn''t work as you need it to, you may need to hack a solution. As the saying
    goes, don''t reinvent the wheel—unless you can''t get a round one.


    The [Web Server Gateway Interface (WSGI)](https://www.python.org/dev/peps/pep-3333/)
    is a synchronous Python [standard specification](https://www.python.org/dev/peps/pep-3333/)
    to connect application code to web servers. Traditional Python web frameworks
    are all built on WSGI. But synchronous communication may mean busy waiting for
    something that''s *much* slower than the CPU, like a disk or network. Then you''ll
    look for better *concurrency*. Concurrency has become more important in recent
    years. As a result, the Python Asynchronous Server Gateway Interface (ASGI) specification
    was developed. Chapter 4 talks about this.


    ## Django


    Django is a full-featured web framework that tags itself as “the web framework
    for perfectionists with deadlines.” It was announced by Adrian Holovaty and Simon
    Willison in 2003, and named after Django Reinhardt, a 20th-century Belgian jazz
    guitarist. Django is often used for database-backed corporate sites. I include
    more details on Django in Chapter 7.


    ## Flask


    In contrast, Flask, introduced by Armin Ronacher in 2010, is a *microframework*.
    Chapter 7 has more information on Flask and how it compares with Django and FastAPI.


    ## FastAPI


    After meeting other suitors at the ball, we finally encounter the intriguing FastAPI,
    the subject of this book. Although FastAPI was published by Sebastián Ramírez
    in 2018, it has already climbed to the third place of Python web frameworks, behind
    Flask and Django, and is growing faster. A 2022 comparison shows that it may pass
    them at some point.


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_39_0.png)


    As of the end of October 2023, here are the GitHub star counts:


    - Django: 73.8 thousand

    - Flask: 64.8 thousand

    - FastAPI: 64 thousand'
  mdcn: '## 源代码格式化


    源代码格式化不如前面章节的主题重要，但仍然很有帮助。使用一个能将源代码整理成标准、非怪异格式的工具，可以避免关于代码格式化（*自行车棚式争论*）的争论。一个不错的选择是
    **Black**。使用 `pip install black` 进行安装。


    ## 测试


    测试在 **第12章** 中有详细介绍。虽然标准的 Python 测试包是 unittest，但大多数 Python 开发者使用的工业级 Python 测试包是
    **pytest**。使用 `pip install pytest` 进行安装。


    ## 源代码控制与持续集成


    目前几乎通用的源代码控制解决方案是 *Git*，其存储库（*repos*）托管在 GitHub 和 GitLab 等网站上。使用 Git 并非 Python
    或 FastAPI 特有，但你很可能会在开发过程中花费大量时间使用 Git。**pre-commit** 工具可以在提交到 Git 之前，在你的本地机器上运行各种测试（例如
    `black` 和 `pytest`）。推送到远程 Git 仓库后，可能会在那里运行更多的持续集成（CI）测试。


    **第12章** 和第190页的“故障排除”部分有更多细节。


    ## Web 工具


    **第3章** 展示了如何安装和使用本书中使用的主要 Python Web 工具：


    - *FastAPI* - Web 框架本身

    - *Uvicorn* - 一个异步 Web 服务器

    - *HTTPie* - 一个文本 Web 客户端，类似于 curl

    - *Requests* - 一个同步 Web 客户端包

    - *HTTPX* - 一个同步/异步 Web 客户端包


    ## API 与服务


    Python 的模块和包对于创建不会变成“大泥球”的大型应用程序至关重要。即使在单进程 Web 服务中，你也可以通过精心设计模块和导入来保持第1章中讨论的分离。


    Python 的内置数据结构非常灵活，很容易在任何地方使用。但在接下来的章节中，你将看到我们可以定义更高级别的模型，以使我们的层间通信更清晰。这些模型依赖于一个相当新的
    Python 特性，称为类型提示。让我们开始介绍这个，但首先简要说明一下 Python 如何处理变量。这不会有害。


    ## 变量即名称


    术语“对象”在软件世界中有许多定义——也许太多了。在 Python 中，对象是一个数据结构，它包装了程序中每个不同的数据片段，从像 5 这样的整数，到函数，再到你可能定义的任何东西。它指定了，除其他簿记信息外，以下内容：


    - 一个唯一的标识值

    - 与硬件匹配的底层类型

    - 具体的值（物理位）

    - 引用它的变量数量的引用计数


    Python 在对象级别是强类型的（其类型不会改变，尽管其值可能会改变）。如果一个对象的值可以改变，则称为可变对象；如果不能改变，则称为不可变对象。


    但在变量级别，Python 与许多其他计算语言不同，这可能会令人困惑。在许多其他语言中，变量本质上是指向内存中包含原始值的区域的直接指针，该值存储在遵循计算机硬件设计的位中。如果你为该变量分配一个新值，该语言会用新值覆盖内存中的旧值。


    这是直接且快速的。编译器跟踪什么放在哪里。这是像 C 这样的语言比 Python 更快的原因之一。作为开发者，你需要确保只将正确类型的值分配给每个变量。


    现在，这里是 Python 的主要区别：Python 变量只是一个临时与内存中更高级别对象关联的名称。如果你为一个引用不可变对象的变量分配一个新值，你实际上是创建了一个包含该值的新对象，然后让该名称引用这个新对象。旧对象（该名称以前引用的对象）随后被释放，如果没有其他名称仍然引用它（即其引用计数为
    0），其内存可以被回收。


    在 *Introducing Python* (O''Reilly) 中，我将对象比作放在内存架子上的塑料盒，将名称/变量比作这些盒子上的便利贴。或者你可以将名称想象成用绳子系在这些盒子上的标签。


    通常，当你使用一个名称时，你将其分配给一个对象，并且它保持附着。这种简单的一致性有助于你理解代码。变量的 *作用域* 是名称引用同一对象的代码区域——例如在函数内部。你可以在不同的作用域中使用相同的名称，但每个名称引用不同的对象。


    尽管你可以在整个 Python 程序中让一个变量引用不同的对象，但这不一定是好的做法。不查看代码，你不知道第100行的名称 x 是否与第20行的名称 x 在同一个作用域中。（顺便说一句，x
    是一个糟糕的名称。我们应该选择确实能传达一些意义的名称。）


    ## 类型提示


    所有这些背景都有其意义。


    Python 3.6 添加了 *类型提示* 来声明变量引用的对象类型。这些在 Python 解释器运行时*不会*被强制执行！相反，它们可以被各种工具用来确保你对变量的使用是一致的。标准的类型检查器叫做
    *mypy*，我稍后会展示如何使用它。


    类型提示可能看起来只是一个不错的东西，就像程序员用来避免错误的许多代码检查工具一样。例如，它可能会提醒你，你的变量 count 引用的是一个类型为 *int*
    的 Python 对象。但是提示，尽管它们是可选的、未强制执行的注释（字面上，提示），结果却有出乎意料的用途。在本书后面，你将看到 FastAPI 如何调整
    Pydantic 包以巧妙地利用类型提示。


    类型声明的添加可能是其他以前无类型语言的趋势。例如，许多 JavaScript 开发者已经转向了 [TypeScript](https://www.typescriptlang.org/)。


    ## 数据结构


    你将在 [第5章](https://learning.oreilly.com/library/view/introducing-python-2nd/9781492051374/ch05.html)
    中获得关于 Python 和数据结构的详细信息。


    ## Web 框架


    Web 框架除了其他功能外，还在 HTTP 字节和 Python 数据结构之间进行转换。它可以为你节省大量精力。另一方面，如果它的部分功能不符合你的需要，你可能需要修改解决方案。正如俗话所说，不要重新发明轮子——除非你找不到一个圆的。


    [Web 服务器网关接口 (WSGI)](https://www.python.org/dev/peps/pep-3333/) 是一个同步的 Python
    [标准规范](https://www.python.org/dev/peps/pep-3333/)，用于将应用程序代码连接到 Web 服务器。传统的 Python
    Web 框架都建立在 WSGI 之上。但同步通信可能意味着忙等某些比 CPU *慢得多* 的东西，比如磁盘或网络。然后你会寻找更好的 *并发性*。近年来，并发性变得更加重要。因此，Python
    异步服务器网关接口 (ASGI) 规范被开发出来。第4章讨论了这一点。


    ## Django


    Django 是一个功能齐全的 Web 框架，它自称是“为有截止日期的完美主义者准备的 Web 框架”。它由 Adrian Holovaty 和 Simon
    Willison 于 2003 年发布，并以 20 世纪比利时爵士吉他手 Django Reinhardt 的名字命名。Django 通常用于数据库支持的企业网站。我在第7章中包含了更多关于
    Django 的细节。


    ## Flask


    相比之下，Flask 由 Armin Ronacher 于 2010 年推出，是一个 *微框架*。第7章有关于 Flask 的更多信息，以及它与 Django
    和 FastAPI 的比较。


    ## FastAPI


    在舞会上与其他追求者相遇后，我们终于遇到了引人入胜的 FastAPI，也就是本书的主题。尽管 FastAPI 由 Sebastián Ramírez 于 2018
    年发布，但它已经攀升至 Python Web 框架的第三位，仅次于 Flask 和 Django，并且增长更快。2022 年的一项比较显示，它可能在某个时候超越它们。


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_39_0.png)


    截至 2023 年 10 月底，GitHub 星标数如下：


    - Django: 73.8 千

    - Flask: 64.8 千

    - FastAPI: 64 千'
