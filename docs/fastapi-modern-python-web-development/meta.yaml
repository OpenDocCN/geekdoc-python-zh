- md: "## Example 7-6. Flask body\n\n```python\nfrom flask import Flask, request,\
    \ jsonify\n\napp = Flask(__name__)\n\n@app.route(\"/hi\", methods=[\"GET\"])\n\
    def greet():\n    who: str = request.json[\"who\"]\n    return jsonify(f\"Hello?\
    \ {who}?\")\n```\n\nFlask stores JSON input in `request.json`.\n\n## Header\n\n\
    Finally, let's repeat Example 3-24 in Example 7-7.\n\n### Example 7-7. FastAPI\
    \ header\n\n```python\nfrom fastapi import FastAPI, Header\n\napp = FastAPI()\n\
    \n@app.get(\"/hi\")\ndef greet(who:str = Header()):\n    return f\"Hello? {who}?\"\
    \n```\n\nThe Flask version is shown in Example 7-8.\n\n### Example 7-8. Flask\
    \ header\n\n```python\nfrom flask import Flask, request, jsonify\n\napp = Flask(__name__)\n\
    \n@app.route(\"/hi\", methods=[\"GET\"])\ndef greet():\n    who: str = request.headers.get(\"\
    who\")\n    return jsonify(f\"Hello? {who}?\")\n```\n\nAs with query parameters,\
    \ Flask keeps request data in the `request` object. This time, it's the `headers`\
    \ dict attribute. The header keys are supposed to be case-insensitive.\n\n## Django\n\
    \nDjango is bigger and more complex than Flask or FastAPI, targeting “perfectionists\
    \ with deadlines,” according to its website. Its built-in object-relational mapper\
    \ (ORM) is useful for sites with major database backends. It's more of a monolith\
    \ than a toolkit.\n\nWhether the extra complexity and learning curve are justified\
    \ depends on your application.\n\nAlthough Django was a traditional WSGI application,\
    \ version 3.0 added support for ASGI.\n\nUnlike Flask and FastAPI, Django likes\
    \ to define routes (associating URLs with web functions, which it calls *view\
    \ functions*) in a single URLConf table, rather than using decorators. This makes\
    \ it easier to see all your routes in one place, but makes it harder to see what\
    \ URL is associated with a function when you're looking at just the function.\n\
    \n## Other Web Framework Features\n\nIn the previous sections comparing the three\
    \ frameworks, I've mainly compared how to define routes. A web framework might\
    \ be expected to help in these other areas too:\n\n- *Forms*\n    All three packages\
    \ support standard HTML forms.\n\n- *Files*\n    All these packages handle file\
    \ uploads and downloads, including multipart HTTP requests and responses.\n\n\
    - *Templates*\n    A *template language* lets you mix text and code, and is useful\
    \ for a *content-oriented* website (HTML text with dynamically inserted data),\
    \ rather than an API website. The best-known Python template package is Jinja,\
    \ and it's supported by Flask, Django, and FastAPI. Django also has its own [template\
    \ language](https://docs.djangoproject.com/en/3.2/ref/templates/language/).\n\n\
    If you want to use networking methods beyond basic HTTP, try these:\n\n- *Server-sent\
    \ events*\n    Push data to a client as needed. Supported by FastAPI ([sse-starlette](https://github.com/sysid/sse-starlette)),\
    \ Flask ([Flask-SSE](https://github.com/paddycarey/flask-sse)), and Django ([Django\
    \ EventStream](https://github.com/fanout/django-eventstream)).\n\n- *Queues*\n\
    \    Job queues, publish-subscribe, and other networking patterns are supported\
    \ by external packages like ZeroMQ, Celery, Redis, and RabbitMQ.\n\n- *WebSockets*\n\
    \    Supported by FastAPI (directly), Django ([Django Channels](https://channels.readthedocs.io/)),\
    \ and Flask (third-party packages).\n\n## Databases\n\nFlask and FastAPI do not\
    \ include any database handling in their base packages, but database handling\
    \ is a key feature of Django.\n\nYour site's Data layer might access a database\
    \ at different levels:\n\n- Direct SQL (PostgreSQL, SQLite)\n- Direct NoSQL (Redis,\
    \ MongoDB, Elasticsearch)\n- An ORM that generates SQL\n- An object document/data\
    \ mapper/manager (ODM) that generates NoSQL\n\nFor relational databases, SQLAlchemy\
    \ is an excellent package that includes multiple access levels, from direct SQL\
    \ up to an ORM. This is a common choice for Flask and FastAPI developers. The\
    \ author of FastAPI has leveraged both SQLAlchemy and Pydantic for the SQLModel\
    \ package, which is discussed more in Chapter 14.\n\nDjango is often the framework\
    \ choice for a site with heavy database needs. It has its own ORM and an automated\
    \ database admin page. Although some sources recommend letting nontechnical staff\
    \ use this admin page for routine data management, be careful. In one case, I've\
    \ seen a non-expert misunderstand an admin page warning message, resulting in\
    \ the database needing to be manually restored from a backup.\n\nChapter 14 discusses\
    \ FastAPI and databases in more depth.\n\n## Recommendations\n\nFor API-based\
    \ services, FastAPI seems to be the best choice now. Flask and FastAPI are about\
    \ equal in terms of getting a service up and running quickly. Django takes more\
    \ time to understand but provides many features of use for larger sites, especially\
    \ those with heavy database reliance.\n\n## Other Python Web Frameworks\n\nThe\
    \ current big three Python web frameworks are Flask, Django, and FastAPI. Google\
    \ python web frameworks and you'll get a wealth of suggestions, which I won't\
    \ repeat here. A few that might not stand out in those lists but that are interesting\
    \ for one reason or another include the following:\n\n- *Bottle*\n    A very minimal\
    \ (single Python file) package, good for a quick proof of concept\n\n- **Litestar**\n\
    \    Similar to FastAPI—it’s based on ASGI/Starlette and Pydantic—but has its\
    \ own opinions\n\n- **AIOHTTP**\n    An ASGI client and server, with useful demo\
    \ code\n\n- **Socketify.py**\n    A new entrant that claims very high performance\n\
    \n## Review\n\nFlask and Django are the most popular Python web frameworks, although\
    \ FastAPI’s popularity is growing faster. All three handle the basic web server\
    \ tasks, with varying learning curves. FastAPI seems to have a cleaner syntax\
    \ for specifying routes, and its support of ASGI allows it to run faster than\
    \ its competitors in many cases. Coming next: let’s build a website already.\n\
    \n# PART III\nMaking a Website\n\nPart II was a quick tour of FastAPI, to get\
    \ you up to speed quickly. This part will go wider and deeper into the details.\
    \ We'll build a medium-sized web service to access and manage data about cryptids—imaginary\
    \ creatures—and the equally fictitious explorers who seek them.\n\nThe full service\
    \ will have three layers, as I've discussed earlier:\n\n- **Web**\n    The web\
    \ interface\n- **Service**\n    The business logic\n- **Data**\n    The precious\
    \ DNA of the whole thing\n\nPlus the web service will have these cross-layer components:\n\
    \n- **Model**\n    Pydantic data definitions\n- **Tests**\n    Unit, integration,\
    \ and end-to-end tests\n\nThe site design will address the following:\n\n- What\
    \ belongs inside each layer?\n- What is passed between layers?\n- Can we change/add/delete\
    \ code later without breaking anything?\n- If something breaks, how do I find\
    \ and fix it?\n- What about security?\n- Can the site scale and perform well?\n\
    - Can we keep all this as clear and simple as possible?\n- Why do I ask so many\
    \ questions? Why, oh why?\n\n# CHAPTER 8\nWeb Layer\n\n## Preview\n\nChapter 3\
    \ was a quick look at how to define FastAPI web endpoints, pass simple string\
    \ inputs to them, and get responses. This chapter goes further into the top layer\
    \ of a FastAPI application—which could also be called an *Interface* or *Router*\
    \ layer—and its integration with the Service and Data layers.\n\nAs before, I'll\
    \ start with small examples. Then I'll introduce some structure, dividing layers\
    \ into subsections to allow for cleaner development and growth. The less code\
    \ we write, the less we'll need to remember and fix later.\n\nThe basic sample\
    \ data in this book concerns imaginary creatures, or *cryptids*, and their explorers.\
    \ You may find parallels with other domains of information.\n\nWhat do we do with\
    \ information, in general? Like most websites, ours will provide ways to do the\
    \ following:\n\n- Retrieve\n- Create\n- Modify\n- Replace\n- Delete\n\nStarting\
    \ from the top, we'll create web endpoints that perform these functions on our\
    \ data. At first, we'll provide fake data to make the endpoints work with any\
    \ web client. In the following chapters, we'll move the fake data code down into\
    \ the lower layers. At each step, we'll ensure that the site still works and passes\
    \ data through correctly."
  mdcn: "## 示例 7-6. Flask 请求体\n\n```python\nfrom flask import Flask, request, jsonify\n\
    \napp = Flask(__name__)\n\n@app.route(\"/hi\", methods=[\"GET\"])\ndef greet():\n\
    \    who: str = request.json[\"who\"]\n    return jsonify(f\"Hello? {who}?\")\n\
    ```\n\nFlask 将 JSON 输入存储在 `request.json` 中。\n\n## 请求头\n\n最后，让我们在示例 7-7 中重复示例 3-24。\n\
    \n### 示例 7-7. FastAPI 请求头\n\n```python\nfrom fastapi import FastAPI, Header\n\n\
    app = FastAPI()\n\n@app.get(\"/hi\")\ndef greet(who:str = Header()):\n    return\
    \ f\"Hello? {who}?\"\n```\n\nFlask 版本如示例 7-8 所示。\n\n### 示例 7-8. Flask 请求头\n\n\
    ```python\nfrom flask import Flask, request, jsonify\n\napp = Flask(__name__)\n\
    \n@app.route(\"/hi\", methods=[\"GET\"])\ndef greet():\n    who: str = request.headers.get(\"\
    who\")\n    return jsonify(f\"Hello? {who}?\")\n```\n\n与查询参数类似，Flask 将请求数据保存在\
    \ `request` 对象中。这次是 `headers` 字典属性。请求头的键应该是大小写不敏感的。\n\n## Django\n\n根据其网站介绍，Django\
    \ 比 Flask 或 FastAPI 更庞大、更复杂，面向“有期限的完美主义者”。其内置的对象关系映射器（ORM）对于具有主要数据库后端的网站非常有用。它更像是一个整体式框架，而非工具包。\n\
    \n额外的复杂性和学习曲线是否合理，取决于你的应用程序。\n\n虽然 Django 是一个传统的 WSGI 应用程序，但 3.0 版本增加了对 ASGI 的支持。\n\
    \n与 Flask 和 FastAPI 不同，Django 喜欢在单个 URLConf 表中定义路由（将 URL 与它称为 *视图函数* 的 Web 函数关联起来），而不是使用装饰器。这使得更容易在一个地方查看所有路由，但当你只查看一个函数时，更难看出它关联的是哪个\
    \ URL。\n\n## 其他 Web 框架功能\n\n在前面比较这三个框架的部分，我主要比较了如何定义路由。Web 框架也可能在以下其他领域提供帮助：\n\
    \n- *表单*\n    所有三个包都支持标准 HTML 表单。\n\n- *文件*\n    所有这些包都处理文件上传和下载，包括多部分 HTTP 请求和响应。\n\
    \n- *模板*\n    *模板语言* 让你混合文本和代码，对于*内容导向*的网站（带有动态插入数据的 HTML 文本）很有用，而不是 API 网站。最著名的\
    \ Python 模板包是 Jinja，它被 Flask、Django 和 FastAPI 支持。Django 还有自己的[模板语言](https://docs.djangoproject.com/en/3.2/ref/templates/language/)。\n\
    \n如果你想使用基本 HTTP 之外的网络方法，请尝试以下：\n\n- *服务器发送事件*\n    根据需要将数据推送到客户端。FastAPI（[sse-starlette](https://github.com/sysid/sse-starlette)）、Flask（[Flask-SSE](https://github.com/paddycarey/flask-sse)）和\
    \ Django（[Django EventStream](https://github.com/fanout/django-eventstream)）都支持。\n\
    \n- *队列*\n    作业队列、发布-订阅和其他网络模式由 ZeroMQ、Celery、Redis 和 RabbitMQ 等外部包支持。\n\n- *WebSockets*\n\
    \    FastAPI（直接支持）、Django（[Django Channels](https://channels.readthedocs.io/)）和\
    \ Flask（第三方包）都支持。\n\n## 数据库\n\nFlask 和 FastAPI 的基础包中不包含任何数据库处理，但数据库处理是 Django\
    \ 的一个关键特性。\n\n你网站的数据层可能在不同级别访问数据库：\n\n- 直接 SQL（PostgreSQL，SQLite）\n- 直接 NoSQL（Redis，MongoDB，Elasticsearch）\n\
    - 生成 SQL 的 ORM\n- 生成 NoSQL 的对象文档/数据映射器/管理器（ODM）\n\n对于关系数据库，SQLAlchemy 是一个优秀的包，包含多个访问级别，从直接\
    \ SQL 到 ORM。这是 Flask 和 FastAPI 开发者的常见选择。FastAPI 的作者利用 SQLAlchemy 和 Pydantic 创建了\
    \ SQLModel 包，这将在第 14 章中进一步讨论。\n\n对于数据库需求繁重的网站，Django 通常是框架选择。它有自己的 ORM 和自动化的数据库管理页面。虽然一些资料建议让非技术人员使用此管理页面进行日常数据管理，但要小心。我曾见过一个非专家误解了管理页面的警告消息，导致需要从备份手动恢复数据库。\n\
    \n第 14 章将更深入地讨论 FastAPI 和数据库。\n\n## 建议\n\n对于基于 API 的服务，FastAPI 似乎是目前的最佳选择。Flask\
    \ 和 FastAPI 在快速启动和运行服务方面大致相当。Django 需要更多时间来理解，但为大型网站提供了许多有用的功能，特别是那些严重依赖数据库的网站。\n\
    \n## 其他 Python Web 框架\n\n当前三大 Python Web 框架是 Flask、Django 和 FastAPI。搜索 Python\
    \ web frameworks 会得到大量建议，我不会在这里重复。以下是一些可能在这些列表中不突出但因某种原因而有趣的框架：\n\n- *Bottle*\n\
    \    一个非常精简（单个 Python 文件）的包，适合快速概念验证\n\n- **Litestar**\n    类似于 FastAPI——它基于 ASGI/Starlette\
    \ 和 Pydantic——但有自己的观点\n\n- **AIOHTTP**\n    一个 ASGI 客户端和服务器，带有有用的演示代码\n\n- **Socketify.py**\n\
    \    一个声称具有非常高性能的新进入者\n\n## 回顾\n\nFlask 和 Django 是最受欢迎的 Python Web 框架，尽管 FastAPI\
    \ 的受欢迎程度增长更快。这三个框架都处理基本的 Web 服务器任务，学习曲线各不相同。FastAPI 在指定路由方面似乎有更清晰的语法，并且它对 ASGI\
    \ 的支持使其在许多情况下比竞争对手运行得更快。接下来：让我们开始构建一个网站吧。\n\n# 第三部分\n构建网站\n\n第二部分是对 FastAPI 的快速浏览，让你快速上手。本部分将更广泛、更深入地探讨细节。我们将构建一个中等规模的\
    \ Web 服务，用于访问和管理关于隐匿生物——虚构的生物——以及同样虚构的寻找它们的探险家的数据。\n\n整个服务将有三个层，正如我之前讨论过的：\n\n\
    - **Web**\n    Web 界面\n- **Service**\n    业务逻辑\n- **Data**\n    整个系统的宝贵数据\n\n\
    此外，Web 服务将包含这些跨层组件：\n\n- **Model**\n    Pydantic 数据定义\n- **Tests**\n    单元测试、集成测试和端到端测试\n\
    \n网站设计将解决以下问题：\n\n- 每个层内应该包含什么？\n- 层与层之间传递什么？\n- 我们以后能否在不破坏任何东西的情况下更改/添加/删除代码？\n\
    - 如果某些东西坏了，我如何找到并修复它？\n- 安全性如何？\n- 网站能否扩展并良好运行？\n- 我们能否让所有这些尽可能清晰简单？\n- 为什么我问这么多问题？为什么，哦，为什么？\n\
    \n# 第 8 章\nWeb 层\n\n## 预览\n\n第 3 章快速介绍了如何定义 FastAPI Web 端点、向它们传递简单的字符串输入并获取响应。本章将进一步探讨\
    \ FastAPI 应用程序的顶层——也可以称为*接口*或*路由*层——以及它与服务层和数据层的集成。\n\n像以前一样，我将从小例子开始。然后我将引入一些结构，将层划分为子部分，以允许更清晰的开发和增长。我们编写的代码越少，以后需要记忆和修复的就越少。\n\
    \n本书中的基本示例数据涉及虚构的生物，或*隐匿生物*，以及它们的探险家。你可能会发现与其他信息领域的相似之处。\n\n通常，我们如何处理信息？像大多数网站一样，我们的网站将提供以下操作方式：\n\
    \n- 检索\n- 创建\n- 修改\n- 替换\n- 删除\n\n从顶层开始，我们将创建 Web 端点来对我们的数据执行这些功能。起初，我们将提供假数据，使端点可以与任何\
