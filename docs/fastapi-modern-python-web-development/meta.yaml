    \napp = FastAPI()\n\napp.include_router(explorer.router)\napp.include_router(creature.router)\n\
    \nif __name__ == \"__main__\":\n    uvicorn.run(\"main:app\", reload=True)\n```\n\
    \nDid all of that work? If you typed or pasted everything exactly, Uvicorn should\
