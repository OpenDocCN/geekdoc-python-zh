    That was fun, in a stretched definition of fun. Given all the user code that was
    just created, let''s give it something to do.


    # Authentication Steps


    Here''s a review of that heap of code from the previous sections:


    +   - If an endpoint has the dependency oauth2_dep() (in web/user.py), a form
    containing username and password fields is generated and sent to the client.

    - After the client fills out and submits this form, the username and password
    (hashed with the same algorithm as those already stored in the local database)
    are matched against the local database.

    - If a match occurs, an access token is generated (in JWT format) and returned.

    - This access token is passed back to the web server as an Authorization HTTP
    header in subsequent requests. This JWT token is decoded on the local server to
    the username and other details. This name does not need to be looked up in the
    database again.

    - The username is authenticated, and the server can do whatever it likes with
    it.


