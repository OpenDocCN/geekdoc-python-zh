- md: "## Service\n\nIn a way, the Service layer is the important one and could be\
    \ connected to different Web and Data layers. Example 12-13 is similar to Example\
    \ 12-11, differing mainly in the import and use of the lower-level data module.\
    \ It also doesn't catch any exceptions that might arise from the Data layer, leaving\
    \ them to be handled by the Web layer.\n\n### Example 12-13. Modified service/creature.py\n\
    \n```python\nimport os\nfrom model.creature import Creature\nif os.getenv(\"CRYPTID_UNIT_TEST\"\
    ):\n    from fake import creature as data\nelse:\n    from data import creature\
    \ as data\n\ndef get_all() -> list[Creature]:\n    return data.get_all()\n\ndef\
    \ get_one(name) -> Creature:\n    return data.get_one(name)\n\ndef create(creature:\
    \ Creature) -> Creature:\n    return data.create(creature)\n\ndef modify(name:\
    \ str, creature: Creature) -> Creature:\n    return data.modify(name, creature)\n\
    \ndef delete(name: str) -> None:\n    return data.delete(name)\n```\n\nExample\
    \ 12-14 has the corresponding unit tests.\n\n### Example 12-14. Service tests\
    \ in test/unit/service/test_creature.py\n\n```python\nimport os\nos.environ[\"\
    CRYPTID_UNIT_TEST\"] = \"true\"\nimport pytest\n\nfrom model.creature import Creature\n\
    from error import Missing, Duplicate\nfrom data import creature as data\n\n@pytest.fixture\n\
    def sample() -> Creature:\n    return Creature(name=\"yeti\",\n        aka=\"\
    Abominable Snowman\",\n        country=\"CN\",\n        area=\"Himalayas\",\n\
    \        description=\"Handsome Himalayan\")\n\ndef test_create(sample):\n   \
    \ resp = data.create(sample)\n    assert resp == sample\n\ndef test_create_duplicate(sample):\n\
    \    resp = data.create(sample)\n    assert resp == sample\n    with pytest.raises(Duplicate):\n\
    \        resp = data.create(sample)\n\ndef test_get_exists(sample):\n    resp\
    \ = data.create(sample)\n    assert resp == sample\n    resp = data.get_one(sample.name)\n\
    \    assert resp == sample\n\ndef test_get_missing():\n    with pytest.raises(Missing):\n\
    \        _ = data.get_one(\"boxturtle\")\n\ndef test_modify(sample):\n    sample.country\
    \ = \"CA\" # Canada!\n    resp = data.modify(sample.name, sample)\n    assert\
    \ resp == sample\n\ndef test_modify_missing():\n    bob: Creature = Creature(name=\"\
    bob\", country=\"US\", area=\"*\",\n        description=\"some guy\", aka=\"??\"\
    )\n    with pytest.raises(Missing):\n        _ = data.modify(bob.name, bob)\n\
    ```\n\n## Data\n\nThe Data layer is simpler to test in isolation, because there’s\
    \ no worry about accidentally calling a function in an even lower layer. Unit\
    \ tests should cover both the functions in this layer and the specific database\
    \ queries that they use. So far, SQLite has been the database “server” and SQL\
    \ the query language. But as I mention in Chapter 14, you may decide to work with\
    \ a package like SQLAlchemy, and use its SQLAlchemy Expression Language or its\
    \ ORM. Then these would need full tests. So far, I’ve kept to the lowest level:\
    \ Python’s DB-API and vanilla SQL queries.\n\nUnlike the Web and Service unit\
    \ tests, this time we don’t need “fake” modules to replace the existing Data layer\
    \ modules. Instead, set a different environment variable to get the Data layer\
    \ to use a memory-only SQLite instance instead of a file-based one. This doesn’t\
    \ require any changes to the existing Data modules, just a setting in Example\
    \ 12-15’s test *before* importing any Data modules.\n\n### Example 12-15. Data\
    \ unit tests test/unit/data/test_creature.py\n\n```python\nimport os\nimport pytest\n\
    from model.creature import Creature\nfrom error import Missing, Duplicate\n\n\
    # set this before data import below\nos.environ[\"CRYPTID_SQLITE_DB\"] = \":memory:\"\
    \n\nfrom data import creature\n\n@pytest.fixture\ndef sample() -> Creature:\n\
    \    return Creature(name=\"yeti\",\n        aka=\"Abominable Snowman\",\n   \
    \     country=\"CN\",\n        area=\"Himalayas\",\n        description=\"Hapless\
    \ Himalayan\")\n\ndef test_create(sample):\n    resp = creature.create(sample)\n\
    \    assert resp == sample\n\ndef test_create_duplicate(sample):\n    with pytest.raises(Duplicate):\n\
    \        _ = creature.create(sample)\n\ndef test_get_one(sample):\n    resp =\
    \ creature.get_one(sample.name)\n    assert resp == sample\n\ndef test_get_one_missing():\n\
    \    with pytest.raises(Missing):\n        resp = creature.get_one(\"boxturtle\"\
    )\n\ndef test_modify(sample):\n    creature.country = \"JP\"  # Japan!\n    resp\
    \ = creature.modify(sample.name, sample)\n    assert resp == sample\n\ndef test_modify_missing():\n\
    \    thing: Creature = Creature(name=\"snurfle\",\n        description=\"some\
    \ thing\", country=\"somewhere\")\n    with pytest.raises(Missing):\n        _\
    \ = creature.modify(thing.name, thing)\n\ndef test_delete(sample):\n    resp =\
    \ creature.delete(sample.name)\n    assert resp is None\n\ndef test_delete_missing(sample):\n\
    \    with pytest.raises(Missing):\n        _ = creature.delete(sample.name)\n\
    ```\n\n## Automated Integration Tests\n\nIntegration tests show how well different\
    \ code interacts *between* layers. But if you look for examples of this, you get\
    \ many different answers. Should you test partial call trails like Web → Service,\
    \ Web → Data, and so on?\n\nTo fully test every connection in an A → B → C pipeline,\
    \ you'd need to test the following:\n\n- A → B\n- B → C\n- A → C\n\nAnd the arrows\
    \ would fill a quiver if you have more than these three junctions.\nOr should\
    \ integration tests be essentially full tests, but with the very end piece—data\
    \ storage on disk—mocked?\nSo far, you've been using SQLite as the database, and\
    \ you can use in-memory SQLite as a double (fake) for the on-disk SQLite database.\
    \ If your queries are *very* standard SQL, SQLite-in-memory may be an adequate\
    \ mock for other databases as well. If not, these modules are tailored to mock\
    \ specific databases:\n\n- *PostgreSQL*: pgmock\n- *MongoDB*: Mongomock\n- *Many*:\
    \ Pytest Mock Resources spins up various test databases in Docker containers,\
    \ and is integrated with pytest.\n\nFinally, you could just fire up a test database\
    \ of the same kind as production. An environment variable could contain the specifics,\
    \ much like the unit test/fake trick you've been using.\n\n## The Repository Pattern\n\
    \nAlthough I did not implement it for this book, the Repository pattern is an\
    \ interesting approach. A *repository* is a simple intermediate in-memory data\
    \ store—like the fake Data layer that you've seen here so far. This then talks\
    \ to pluggable backends for real databases. It's accompanied by a Unit of Work\
    \ pattern, which ensures that a group of operations in a single *session* is either\
    \ committed or rolled back as a whole.\nSo far, the database queries in this book\
    \ have been atomic. For real-world database work, you may need multistep queries,\
    \ and some kind of session handling. The Repository pattern also dovetails with\
    \ dependency injection, which you've seen elsewhere in this book and probably\
    \ appreciate a little by now.\n\n## Automated Full Tests\n\nFull tests exercise\
    \ all the layers together, as close to production use as possible. Most of the\
    \ tests that you've already seen in this book have been full: call the Web endpoint,\
    \ run through Servicetown to downtown Dataville, and return with groceries. These\
    \ are closed tests. Everything is live, and you don't care how it does it, just\
    \ that it does it.\n\nYou can fully test each endpoint in the overall API in two\
    \ ways:\n\n- *Over HTTP/HTTPS*: Write individual Python test clients that access\
    \ the server. Many examples in this book have done this, with standalone clients\
    \ like HTTPie, or in scripts using Requests.\n- *Using TestClient*: Use this built-in\
    \ FastAPI/Starlette object to access the server directly, without an overt TCP\
    \ connection.\n\nBut these approaches require writing one or more tests for each\
    \ endpoint. This can become medieval, and we're a few centuries past medieval\
    \ now. A more recent approach is based on *property-based testing*. This takes\
    \ advantage of FastAPI's auto-generated documentation. An OpenAPI *schema* called\
    \ *openapi.json* is created by FastAPI every time you change a path function or\
    \ path decorator in the Web layer. This schema details everything about every\
    \ endpoint: arguments, return values, and so on. That's what OpenAPI is for, as\
    \ described here by the [OpenAPI Initiative's FAQ page](https://www.openapis.org/faq):\n\
    \n> The OAS defines a standard, programming language-agnostic interface description\
    \ for REST APIs, which allows both humans and computers to discover and understand\
    \ the capabilities of a service without requiring access to source code, additional\
    \ documentation, or inspection of network traffic.\n—OAS (OpenAPI Specification)\n\
    \nTwo packages are needed:\n\n- *Hypothesis*: `pip install hypothesis`\n- *Schemathesis*:\
    \ `pip install schemathesis`\n\nHypothesis is the base library, and Schemathesis\
    \ applies it to the OpenAPI 3.0 schema that FastAPI generates. Running Schemathesis\
    \ reads this schema, generates gobs of tests with varying data (that you don't\
    \ need to come up with!), and works with pytest."
