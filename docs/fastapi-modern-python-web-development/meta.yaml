  md: "In another comparison, Pydantic outperformed older validation packages like\
    \ marshmallow and the intriguingly named Voluptuous. Another big plus for Pydantic\
    \ is that it uses standard Python type hint syntax; older libraries pre-dated\
    \ type hints and rolled their own.\n\nSo I'm going with Pydantic in this book,\
    \ but you may find uses for either of the alternatives if you're not using FastAPI.\n\
    \nPydantic provides ways to specify any combination of these checks:\n\n+   -\
    \ Required versus optional\n- Default value if unspecified but required\n- The\
    \ data type or types expected\n- Value range restrictions\n- Other function-based\
    \ checks if needed\n- Serialization and deserialization\n\n# A Simple Example\n\
    \nYou've seen how to feed a simple string to a web endpoint via the URL, a query\
    \ parameter, or the HTTP body. The problem is that you usually request and receive\
    \ groups of data, of many types. That's where Pydantic models first appear in\
    \ FastAPI.\n\nThis initial example will use three files:\n\n+   - *model.py* defines\
    \ a Pydantic model.\n- *data.py* is a fake data source, defining an instance of\
    \ a model.\n- *web.py* defines a FastAPI web endpoint that returns the fake data.\n\
    \nFor simplicity in this chapter, let's keep all the files in the same directory.\
    \ In later chapters that discuss larger websites, we'll separate them into their\
