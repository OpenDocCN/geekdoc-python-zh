    \ import FastAPI, Header\n\napp = FastAPI()\n\n@app.post(\"/hi\")\ndef greet(who:str\
    \ = Header()):\n    return f\"Hello? {who}?\"\n```\n\nLet's test this one just\
    \ with HTTPie in Example 3-25. It uses `name:value` to specify an HTTP header.\n\
    \n*Example 3-25. Test Example 3-24 with HTTPie*\n\n```\n$ http -v localhost:8000/hi\
