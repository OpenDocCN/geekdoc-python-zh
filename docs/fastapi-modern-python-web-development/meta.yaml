    \ see some of these in Chapter 6 and in various chapters in Part III.\n\n## Which\
    \ Method Is Best?\n\nHere are a few recommendations:\n\n- When passing arguments\
    \ in the URL, following RESTful guidelines is standard practice.\n- Query strings\
    \ are usually used to provide optional arguments, like pagination.\n- The body\
    \ is usually used for larger inputs, like whole or partial models.\n\nIn each\
    \ case, if you provide type hints in your data definitions, your arguments will\
    \ be automatically type-checked by Pydantic. This ensures that they’re both present\
    \ and correct.\n\n## HTTP Responses\n\nBy default, FastAPI converts whatever you\
    \ return from your endpoint function to JSON; the HTTP response has a header line\
    \ Content-type: application/json. So, although the greet() function initially\
    \ returns the string \"Hello? World?\", FastAPI converts it to JSON. This is one\
    \ of the defaults chosen by FastAPI to streamline API development.\n\nIn this\
    \ case, the Python string \"Hello? World?\" is converted to its equivalent JSON\
    \ string \"Hello? World?\", which is the same darn string. But anything that you\
    \ return is converted to JSON, whether built-in Python types or Pydantic models.\n\
    \n## Status Code\n\nBy default, FastAPI returns a 200 status code; exceptions\
    \ raise 4xx codes.\n\nIn the path decorator, specify the HTTP status code that\
    \ should be returned if all goes well (exceptions will generate their own codes\
    \ and override it). Add the code from Example 3-28 somewhere in your hello.py\
    \ (just to avoid showing the whole file again and again), and test it with Example\
    \ 3-29.\n\nExample 3-28. Specify the HTTP status code (add to hello.py)\n\n```\n\
    @app.get(\"/happy\")\ndef happy(status_code=200):\n    return \":)\"\n```\n\n\
    Example 3-29. Test the HTTP status code\n\n```\n$ http localhost:8000/happy\n\
    HTTP/1.1 200 OK\ncontent-length: 4\ncontent-type: application/json\ndate: Sun,\
    \ 05 Feb 2023 04:37:32 GMT\nserver: uvicorn\n\n\":)\"\n```\n\n## Headers\n\nYou\
    \ can inject HTTP response headers, as in Example 3-30 (you don't need to return\
    \ response).\n\nExample 3-30. Set the HTTP headers (add to hello.py)\n\n```\n\
    from fastapi import Response\n\n@app.get(\"/header/{name}/{value}\")\ndef header(name:\
    \ str, value: str, response:Response):\n    response.headers[name] = value\n \
    \   return \"normal body\"\n```\n\nLet's see if it worked (Example 3-31).\n\n\
    Example 3-31. Test the response HTTP headers\n\n```\n$ http localhost:8000/header/marco/polo\n\
    HTTP/1.1 200 OK\ncontent-length: 13\ncontent-type: application/json\ndate: Wed,\
    \ 31 May 2023 17:47:38 GMT\nmarco: polo\nserver: uvicorn\n\n\"normal body\"\n\
    ```\n\n## Response Types\n\nResponse types (import these classes from fastapi.responses)\
    \ include the following:\n\n- JSONResponse (the default)\n- HTMLResponse\n- PlainTextResponse\n\
    - RedirectResponse\n- FileResponse\n- StreamingResponse\n\nI'll say more about\
    \ the last two in Chapter 15.\n\nFor other output formats (also known as *MIME\
    \ types*), you can use a generic Response class, which needs the following:\n\n\
    **content**\n    String or bytes\n\n**media_type**\n    The string MIME type\n\
    \n**status_code**\n    HTTP integer status code\n\n**headers**\n    A dict of\
    \ strings\n\n## Type Conversion\n\nThe path function can return anything, and\
    \ by default (using JSONResponse), FastAPI will convert it to a JSON string and\
    \ return it, with the matching HTTP response headers Content-Length and Content-Type.\
    \ This includes any Pydantic model class.\n\nBut how does it do this? If you've\
    \ used the Python json library, you've probably seen that it raises an exception\
    \ when given some data types, such as *datetime*. FastAPI uses an internal function\
    \ called *jsonable_encoder()* to convert any data structure to a \"JSONable\"\
    \ Python data structure, then calls the usual *json.dumps()* to turn that into\
    \ a JSON string. Example 3-32 shows a test that you can run with pytest.\n\nExample\
    \ 3-32. Use *jsonable_encoder()* to avoid JSON kabooms\n\n```\nimport datetime\n\
    import pytest\nfrom fastapi.encoders import jsonable_encoder\nimport json\n\n\
    @pytest.fixture\ndef data():\n    return datetime.datetime.now()\n\ndef test_json_dump(data):\n\
    \    with pytest.raises(Exception):\n        _ = json.dumps(data)\n\ndef test_encoder(data):\n\
    \    out = jsonable_encoder(data)\n    assert out\n    json_out = json.dumps(out)\n\
    \    assert json_out\n```\n\n## Model Types and response_model\n\nIt’s possible\
    \ to have different classes with many of the same fields, except one is specialized\
    \ for user input, one for output, and one for internal use. Some reasons for these\
    \ variants could include the following:\n\n- Remove some sensitive information\
    \ from the output—like *deidentifying* personal medical data, if you’ve encountered\
    \ Health Insurance Portability and Accountability Act (HIPAA) requirements.\n\
    - Add fields to the user input (like a creation date and time).\n\nExample 3-33\
    \ shows three related classes for a contrived case:\n\n- TagIn is the class that\
    \ defines what the user needs to provide (in this case, just a string called tag).\n\
    - Tag is made from a TagIn and adds two fields: created (when this Tag was created)\
    \ and secret (an internal string, maybe stored in a database, but never supposed\
    \ to be exposed to the world).\n- TagOut is the class that defines what can be\
    \ returned to a user (by a lookup or search endpoint). It contains the tag field\
    \ from the original TagIn object and its derived Tag object, plus the created\
    \ field generated for Tag, but not secret.\n\nExample 3-33. Model variations (model/tag.py)\n\
    \n```\nfrom datetime import datetime\nfrom pydantic import BaseClass\n\nclass\
    \ TagIn(BaseClass):\n    tag: str\n\nclass Tag(BaseClass):\n    tag: str\n   \
    \ created: datetime\n    secret: str\n\nclass TagOut(BaseClass):\n    tag: str\n\
    \    created: datetime\n```\n\nYou can return data types other than the default\
    \ JSON from a FastAPI path function in different ways. One method is to use the\
    \ `response_model` argument in the path decorator to goose FastAPI to return something\
    \ else. FastAPI will drop any fields that were in the object that you returned\
    \ but are not in the object specified by `response_model`.\n\nIn Example 3-34,\
    \ pretend that you wrote a new service module called `service/tag.py` with the\
    \ `create()` and `get()` functions that give this web module something to call.\
    \ Those lower-stack details don't matter here. The important point is the `get_one()`\
    \ path function at the bottom, and the `response_model=TagOut` in its path decorator.\
    \ That automatically changes an internal `Tag` object to a sanitized `TagOut`\
    \ object.\n\nExample 3-34. Return a different response type with `response_model`\
    \ (web/tag.py)\n\n```\nimport datetime\nfrom model.tag import TagIn, Tag, TagOut\n\
    import service.tag as service\n\n@app.post('/')\ndef create(tag_in: TagIn) ->\
    \ TagIn:\n    tag: Tag = Tag(tag=tag_in.tag, created=datetime.utcnow(),\n    \
    \               secret=\"shhhh\")\n    service.create(tag)\n    return tag_in\n\
    \n@app.get('/{tag_str}', response_model=TagOut)\ndef get_one(tag_str: str) ->\
    \ TagOut:\n    tag: Tag = service.get(tag_str)\n    return tag\n```\n\nEven though\
    \ we returned a `Tag`, `response_model` will convert it to a `TagOut`.\n\n## Automated\
    \ Documentation\n\nThis section assumes that you're running the web application\
    \ from Example 3-21, the version that sends the `who` parameter in the HTTP body\
    \ via a POST request to `http://localhost:8000/hi`.\n\nConvince your browser to\
    \ visit the URL `http://localhost:8000/docs`.\n\nYou'll see something that starts\
    \ like Figure 3-1 (I've cropped the following screenshots to emphasize particular\
    \ areas).\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_61_0.png)\n\nFigure 3-1.\
    \ Generated documentation page\n\nWhere did that come from?\n\nFastAPI generates\
    \ an OpenAPI specification from your code, and includes this page to display *and\
    \ test* all your endpoints. This is just one ingredient of its secret sauce.\n\
    \nClick the down arrow on the right side of the green box to open it for testing\
    \ (Figure 3-2).\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_61_1.png)\n\nFigure\
    \ 3-2. Open documentation page\n\nClick that “Try it out” button on the right.\
    \ Now you’ll see an area that will let you enter a value in the body section (Figure\
    \ 3-3).\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_62_0.png)\n\n*Figure 3-3.\
    \ Data entry page*\n\nClick that \"string\". Change it to **\"Cousin Eddie\"**\
    \ (keep the double quotes around it). Then click the bottom blue Execute button.\n\
    \nNow look at the Responses section below the Execute button (Figure 3-4).\n\n\
    The “Response body” box shows that Cousin Eddie turned up.\n\nSo, this is yet\
    \ another way to test the site (besides the earlier examples using the browser,\
    \ HTTPie, and Requests)."
  mdcn: "将它们以特殊方式组合，例如用于分页或身份验证。你将在第6章和第三部分的各章中看到其中一些示例。\n\n## 哪种方法最佳？\n\n以下是一些建议：\n\
    \n- 在URL中传递参数时，遵循RESTful指南是标准做法。\n- 查询字符串通常用于提供可选参数，例如分页。\n- 请求体通常用于较大的输入，例如完整或部分模型。\n\
    \n在每种情况下，如果你在数据定义中提供了类型提示，你的参数将由Pydantic自动进行类型检查。这确保了它们既存在又正确。\n\n## HTTP响应\n\n\
    默认情况下，FastAPI会将你从端点函数返回的任何内容转换为JSON；HTTP响应头包含Content-type: application/json。因此，尽管`greet()`函数最初返回字符串\"\
    Hello? World?\"，FastAPI会将其转换为JSON。这是FastAPI为简化API开发而选择的默认设置之一。\n\n在这种情况下，Python字符串\"\
    Hello? World?\"被转换为等效的JSON字符串\"Hello? World?\"，这完全是同一个字符串。但你返回的任何内容都会被转换为JSON，无论是内置的Python类型还是Pydantic模型。\n\
    \n## 状态码\n\n默认情况下，FastAPI返回200状态码；异常会引发4xx代码。\n\n在路径装饰器中，指定如果一切顺利应返回的HTTP状态码（异常将生成自己的代码并覆盖它）。将示例3-28中的代码添加到你的`hello.py`中的某处（只是为了避免反复显示整个文件），并用示例3-29进行测试。\n\
    \n示例3-28. 指定HTTP状态码（添加到hello.py）\n\n```\n@app.get(\"/happy\")\ndef happy(status_code=200):\n\
    \    return \":)\"\n```\n\n示例3-29. 测试HTTP状态码\n\n```\n$ http localhost:8000/happy\n\
    HTTP/1.1 200 OK\ncontent-length: 4\ncontent-type: application/json\ndate: Sun,\
    \ 05 Feb 2023 04:37:32 GMT\nserver: uvicorn\n\n\":)\"\n```\n\n## 响应头\n\n你可以注入HTTP响应头，如示例3-30所示（你不需要返回响应）。\n\
    \n示例3-30. 设置HTTP头（添加到hello.py）\n\n```\nfrom fastapi import Response\n\n@app.get(\"\
    /header/{name}/{value}\")\ndef header(name: str, value: str, response:Response):\n\
    \    response.headers[name] = value\n    return \"normal body\"\n```\n\n让我们看看它是否有效（示例3-31）。\n\
    \n示例3-31. 测试响应HTTP头\n\n```\n$ http localhost:8000/header/marco/polo\nHTTP/1.1\
    \ 200 OK\ncontent-length: 13\ncontent-type: application/json\ndate: Wed, 31 May\
    \ 2023 17:47:38 GMT\nmarco: polo\nserver: uvicorn\n\n\"normal body\"\n```\n\n\
    ## 响应类型\n\n响应类型（从`fastapi.responses`导入这些类）包括以下：\n\n- JSONResponse（默认）\n- HTMLResponse\n\
    - PlainTextResponse\n- RedirectResponse\n- FileResponse\n- StreamingResponse\n\
    \n我将在第15章中更详细地讨论最后两个。\n\n对于其他输出格式（也称为*MIME类型*），你可以使用通用的`Response`类，它需要以下参数：\n\n\
    **content**\n    字符串或字节\n\n**media_type**\n    字符串MIME类型\n\n**status_code**\n\
    \    HTTP整数状态码\n\n**headers**\n    字符串字典\n\n## 类型转换\n\n路径函数可以返回任何内容，默认情况下（使用`JSONResponse`），FastAPI会将其转换为JSON字符串并返回，同时包含匹配的HTTP响应头`Content-Length`和`Content-Type`。这包括任何Pydantic模型类。\n\
    \n但它是如何做到的呢？如果你使用过Python的`json`库，你可能已经看到当给定某些数据类型（如*datetime*）时，它会引发异常。FastAPI使用一个名为*jsonable_encoder()*的内部函数将任何数据结构转换为“可JSON化”的Python数据结构，然后调用通常的*json.dumps()*将其转换为JSON字符串。示例3-32展示了一个你可以用pytest运行的测试。\n\
    \n示例3-32. 使用*jsonable_encoder()*避免JSON爆炸\n\n```\nimport datetime\nimport pytest\n\
    from fastapi.encoders import jsonable_encoder\nimport json\n\n@pytest.fixture\n\
    def data():\n    return datetime.datetime.now()\n\ndef test_json_dump(data):\n\
    \    with pytest.raises(Exception):\n        _ = json.dumps(data)\n\ndef test_encoder(data):\n\
    \    out = jsonable_encoder(data)\n    assert out\n    json_out = json.dumps(out)\n\
    \    assert json_out\n```\n\n## 模型类型和response_model\n\n可以有多个具有许多相同字段的不同类，只是其中一个专门用于用户输入，一个用于输出，一个用于内部使用。这些变体的一些原因可能包括：\n\
    \n- 从输出中移除一些敏感信息——例如，如果你遇到《健康保险流通与责任法案》（HIPAA）要求，对个人医疗数据进行*去标识化*。\n- 向用户输入添加字段（如创建日期和时间）。\n\
    \n示例3-33展示了一个虚构案例中的三个相关类：\n\n- `TagIn`是定义用户需要提供什么的类（在这种情况下，只是一个名为`tag`的字符串）。\n\
    - `Tag`由`TagIn`派生，并添加了两个字段：`created`（此标签创建的时间）和`secret`（一个内部字符串，可能存储在数据库中，但绝不应暴露给外界）。\n\
    - `TagOut`是定义可以返回给用户（通过查找或搜索端点）的内容的类。它包含来自原始`TagIn`对象及其派生的`Tag`对象的`tag`字段，以及为`Tag`生成的`created`字段，但不包含`secret`。\n\
    \n示例3-33. 模型变体（model/tag.py）\n\n```\nfrom datetime import datetime\nfrom pydantic\
    \ import BaseClass\n\nclass TagIn(BaseClass):\n    tag: str\n\nclass Tag(BaseClass):\n\
    \    tag: str\n    created: datetime\n    secret: str\n\nclass TagOut(BaseClass):\n\
    \    tag: str\n    created: datetime\n```\n\n你可以通过不同的方式从FastAPI路径函数返回默认JSON以外的数据类型。一种方法是在路径装饰器中使用`response_model`参数来促使FastAPI返回其他内容。FastAPI会丢弃你返回的对象中存在但`response_model`指定的对象中不存在的任何字段。\n\
    \n在示例3-34中，假设你编写了一个名为`service/tag.py`的新服务模块，其中包含`create()`和`get()`函数，为这个Web模块提供调用。这些底层细节在这里并不重要。重要的是底部的`get_one()`路径函数，以及其路径装饰器中的`response_model=TagOut`。这会自动将内部的`Tag`对象转换为经过清理的`TagOut`对象。\n\
    \n示例3-34. 使用`response_model`返回不同的响应类型（web/tag.py）\n\n```\nimport datetime\nfrom\
    \ model.tag import TagIn, Tag, TagOut\nimport service.tag as service\n\n@app.post('/')\n\
    def create(tag_in: TagIn) -> TagIn:\n    tag: Tag = Tag(tag=tag_in.tag, created=datetime.utcnow(),\n\
    \                   secret=\"shhhh\")\n    service.create(tag)\n    return tag_in\n\
    \n@app.get('/{tag_str}', response_model=TagOut)\ndef get_one(tag_str: str) ->\
    \ TagOut:\n    tag: Tag = service.get(tag_str)\n    return tag\n```\n\n即使我们返回了一个`Tag`，`response_model`也会将其转换为`TagOut`。\n\
    \n## 自动化文档\n\n本节假设你正在运行示例3-21中的Web应用程序，即通过POST请求将`who`参数放在HTTP请求体中发送到`http://localhost:8000/hi`的版本。\n\
    \n让你的浏览器访问URL `http://localhost:8000/docs`。\n\n你将看到类似图3-1的内容（我裁剪了以下截图以强调特定区域）。\n\
    \n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_61_0.png)\n\n图3-1. 生成的文档页面\n\n这是从哪里来的？\n\
    \nFastAPI从你的代码生成OpenAPI规范，并包含此页面来显示*并测试*你所有的端点。这只是其秘密武器的一个组成部分。\n\n点击绿色框右侧的向下箭头以打开它进行测试（图3-2）。\n\
    \n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_61_1.png)\n\n图3-2. 打开文档页面\n\n点击右侧的“Try\
    \ it out”按钮。现在你将看到一个区域，允许你在body部分输入一个值（图3-3）。\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_62_0.png)\n\
    \n*图3-3. 数据输入页面*\n\n点击那个“string”。将其更改为**\"Cousin Eddie\"**（保留周围的双引号）。然后点击底部的蓝色Execute按钮。\n\
    \n现在查看Execute按钮下方的Responses部分（图3-4）。\n\n“Response body”框显示Cousin Eddie出现了。\n\n\
    所以，这是测试网站的另一种方式（除了之前使用浏览器、HTTPie和Requests的示例之外）。"
