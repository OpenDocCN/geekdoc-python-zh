  md: "# HTTP Requests\n\nExample 3-9 included only one specific request: a GET request\
    \ for the /hi URL on the server localhost, port 8000.\n\nWeb requests squirrel\
    \ data in different parts of an HTTP request, and FastAPI lets you access them\
    \ smoothly. From the sample request in Example 3-9, Example 3-10 shows the HTTP\
    \ request that the http command sent to the web server.\n\nExample 3-10. An HTTP\
    \ request\n\n```\nGET /hi HTTP/1.1\nAccept: */*\nAccept-Encoding: gzip, deflate\n\
    Connection: keep-alive\nHost: localhost:8000\nUser-Agent: HTTPie/3.2.1\n```\n\n\
    This request contains the following:\n\n+   - The verb (GET) and path (/hi)\n\
    - Any query parameters (text after any ? in this case, none)\n- Other HTTP headers\n\
    - No request body content\n\nFastAPI unsquirrels these into handy definitions:\n\
    \nHeader\n    The HTTP headers\n\nPath\n    The URL\n\nQuery\n    The query parameters\
    \ (after the ? at the end of the URL)\n\nBody\n    The HTTP body"
