    Name is yeti\n```\n\nThis is pretty good for the keeping-variables-together part.\
    \ But we want more, so let's ask Santa for these:\n\n+   - A *union* of possible\
    \ alternative types\n- Missing/optional values\n- Default values\n- Data validation\n\
    - Serialization to and from formats like JSON\n\n# Alternatives\n\nIt's tempting\
    \ to use Python's built-in data structures, especially dictionaries. But you'll\
    \ inevitably find that dictionaries are a bit too “loose.” Freedom comes at a\
    \ price. You need to check *everything*:\n\n+   - Is the key optional?\n- If the\
    \ key is missing, is there a default value?\n- Does the key exist?\n- If so, is\
    \ the key's value of the right type?\n- If so, is the value in the right range\
    \ or matching a pattern?\n\nAt least three solutions address at least some of\
    \ these requirements:\n\n*Dataclasses*\n    Part of standard Python.\n\n*attrs*\n\
    \    Third party, but a superset of dataclasses.\n\n*Pydantic*\n    Also third\
    \ party, but integrated into FastAPI, so an easy choice if you're already using\
    \ FastAPI. And if you're reading this book, that's likely.\n\nA handy comparison\
    \ of the three is on YouTube. One takeaway is that Pydantic stands out for validation,\
    \ and its integration with FastAPI catches many potential data errors. Another\
    \ is that Pydantic relies on inheritance (from the BaseModel class), and the other\
    \ two use Python decorators to define their objects. This is more a matter of\
    \ style."
