    # CHAPTER 8

    Web Layer


    # Preview


    Chapter 3 was a quick look at how to define FastAPI web endpoints, pass simple
    string inputs to them, and get responses. This chapter goes further into the top
    layer of a FastAPI application—which could also be called an *Interface* or *Router*
    layer—and its integration with the Service and Data layers.


    As before, I''ll start with small examples. Then I''ll introduce some structure,
    dividing layers into subsections to allow for cleaner development and growth.
    The less code we write, the less we''ll need to remember and fix later.


    The basic sample data in this book concerns imaginary creatures, or *cryptids*,
    and their explorers. You may find parallels with other domains of information.


    What do we do with information, in general? Like most websites, ours will provide
    ways to do the following:


    +   - Retrieve

    - Create

    - Modify

    - Replace

    - Delete


    Starting from the top, we''ll create web endpoints that perform these functions
    on our data. At first, we''ll provide fake data to make the endpoints work with
    any web client. In the following chapters, we''ll move the fake data code down
    into the lower layers. At each step, we''ll ensure that the site still works and
    passes data through correctly.'
- md: "Finally, in Chapter 10, we'll drop the faking and store real data in real databases,\
    \ for a full end-to-end (Web → Service → Data) website.\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_111_0.png)\n\
    \nAllowing any anonymous visitor to perform all these actions will be an object\
    \ lesson in “why we can’t have nice things.” Chapter 11 discusses the auth (authentication\
    \ and authorization) needed to define roles and limit who can do what. For the\
    \ rest of the current chapter, we’ll sidestep auth and just show how to handle\
    \ the raw web functions.\n\n## Interlude: Top-Down, Bottom-Up, Middle-Out?\n\n\
    When designing a website, you could start from one of the following:\n\n- The\
    \ Web layer and work down\n- The Data layer and work up\n- The Service layer and\
    \ work out in both directions\n\nDo you already have a database, installed and\
    \ loaded with data, and are just pining for a way to share it with the world?\
    \ If so, you may want to tackle the Data layer’s code and tests first, then the\
    \ Service layer, and write the Web layer last.\n\nIf you’re following domain-driven\
    \ design, you might start in the middle Service layer, defining your core entities\
    \ and data models. Or you may want to evolve the web interface first, and fake\
    \ calls to the lower layers until you know what you’ll expect of them.\n\nYou’ll\
    \ find very good design discussions and recommendations in these books:\n\n- *Clean\
    \ Architectures in Python* by Leonardo Giordani (Digital Cat Books)\n- *Architecture\
    \ Patterns with Python* by Harry J.W. Percival and Bob Gregory (O’Reilly)\n- *Microservice\
    \ APIs* by José Haro Peralta (Manning)\n\nIn these and other sources, you’ll see\
    \ terms like hexagonal architecture, ports, and adapters. Your choices on how\
    \ to proceed largely depend on what data you have already and how you want to\
    \ approach the work of building a site.\n\nI’m guessing that many of you are mainly\
    \ interested in trying out FastAPI and its related technologies, and don’t necessarily\
    \ have a predefined mature data domain that you want to instrument right away.\n\
    \nSo, in this book I’m taking the web-first approach—step-by-step, starting with\
    \ essential parts, and adding others as needed on the way down. Sometimes experiments\
    \ work, sometimes not. I’ll avoid the urge to stuff everything into this Web layer\
    \ at first.\n\n> This Web layer is just one way of passing data between a user\
    \ and a service. Alternate ways exist, such as by a CLI or software development\
    \ kit (SDK). In other frameworks, you might see this Web layer called a *view*\
    \ or *presentation* layer.\n\n## RESTful API Design\n\nHTTP is a way to get commands\
    \ and data between web clients and servers. But, just as you can combine ingredients\
    \ from your refrigerator in ways from ghastly to gourmet, some recipes for HTTP\
    \ work better than others.\n\nIn Chapter 1, I mentioned that *RESTful* became\
    \ a useful, though sometimes fuzzy, model for HTTP development. RESTful designs\
    \ have these core components:\n\n- **Resources**: The data elements your application\
    \ manages\n- **IDs**: Unique resource identifiers\n- **URLs**: Structured resource\
    \ and ID strings\n- **Verbs or actions**: Terms that accompany URLs for different\
    \ purposes:\n    - **GET**: Retrieve a resource.\n    - **POST**: Create a new\
    \ resource.\n    - **PUT**: Completely replace a resource.\n    - **PATCH**: Partially\
    \ replace a resource.\n    - **DELETE**: Resource goes kaboom.\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_113_0.png)\n\
    \nYou'll see disagreement about the relative merits of PUT versus PATCH. If you\
    \ don't need to distinguish between a partial modification and a full one (replacement),\
    \ you may not need both.\n\nGeneral RESTful rules for combining verbs and URLs\
    \ containing resources and IDs use these patterns of path parameters (content\
    \ between the / in the URL):\n\n- `verb /resource/`: Apply verb to all resources\
    \ of type resource.\n- `verb /resource/id`: Apply verb to the resource with ID\
    \ id.\n\nUsing the example data for this book, a GET request to the endpoint `/thing`\
    \ would return data on all explorers, but a GET request for `/thing/abc` would\
    \ give you data for only the thing resource with ID `abc`.\n\nFinally, web requests\
    \ often carry more information, indicating to do the following:\n\n- Sort results\n\
    - Paginate results\n- Perform another function\n\nParameters for these can sometimes\
    \ be expressed as path parameters (tacked onto the end, after another /) but are\
    \ often included as query parameters (var=val stuff after the ? in the URL). Because\
    \ URLs have size limits, large requests are often conveyed in the HTTP body.\n\
    \n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_113_1.png)\n\nMost authors recommend\
    \ using plurals when naming the resource, and related namespaces like API sections\
    \ and database tables. I followed this advice for a long time but now feel that\
    \ singular names are simpler for many reasons (including oddities of the English\
    \ language):\n\n- Some words are their own plurals: series, fish\n- Some words\
    \ have irregular plurals: children, people\n- You need bespoke singular to/from\
    \ plural conversion code in many places\n\nFor these reasons, I'm using a singular\
    \ naming scheme in many places in this book. This is against usual RESTful advice,\
    \ so feel free to ignore this if you disagree.\n\n## File and Directory Site Layout\n\
    \nOur data mainly concerns creatures and explorers. Initially, we could define\
    \ all the URLs and their FastAPI path functions for accessing their data in a\
    \ single Python file. Let’s resist that temptation, and start as though we were\
    \ already a rising star in the cryptid web space. With a good foundation, cool\
    \ new things are much easier to add.\n\nFirst, pick a directory on your machine.\
    \ Name it *fastapi*, or anything that will help you remember where you’ll be messing\
    \ with the code from this book. Within it, create the following subdirectories:\n\
    \n- *src*: Contains all the website code\n    - *web*: The FastAPI web layer\n\
    \    - *service*: The business logic layer\n    - *data*: The storage interface\
    \ layer\n    - *model*: Pydantic model definitions\n    - *fake*: Early hardwired\
    \ (*stub*) data\n\nEach of these directories will soon gain three files:\n\n-\
    \ *__init__.py*: Needed to treat this directory as a package\n- *creature.py*:\
    \ Creature code for this layer\n- *explorer.py*: Explorer code for this layer\n\
    \n*Many* opinions exist on how to lay out sites for development. This design is\
    \ intended to show the layer separation and leave room for future additions.\n\
    \nSome explanations are needed right now. First, *__init__.py* files are empty.\
    \ They’re sort of a Python hack, so their directory should be treated as a Python\
    \ *package* that may be imported from. Second, the *fake* directory provides some\
    \ stub data to higher layers as the lower ones are built.\n\nIn addition, Python's\
    \ *import* logic doesn't work strictly with directory hierarchies. It relies on\
    \ Python *packages* and *modules*. The *.py* files listed in the tree structure\
    \ described previously are Python modules (source files). Their parent directories\
    \ are packages *if* they contain an `__init__.py` file. (This is a convention\
    \ to tell Python whether, if you have a directory called `sys` and you type `import\
    \ sys`, you actually want the system one or your local one.)\n\nPython programs\
    \ can import packages and modules. The Python interpreter has a built-in `sys.path`\
    \ variable, which includes the location of the standard Python code. The environment\
    \ variable `PYTHONPATH` is an empty or colon-separated string of directory names\
    \ that tells Python which parent directories to check before `sys.path` to find\
    \ the imported modules or packages. So, if you change to your new *fastapi* directory,\
    \ type this (on Linux or macOS) to ensure that the new code under it will be checked\
    \ first when importing:\n\n```\n$ export PYTHONPATH=$PWD/src\n```\n\nThat `$PWD`\
    \ means *print working directory*, and saves you from typing the full path to\
    \ your *fastapi* directory, although you can if you want. And the `src` part means\
    \ to look only in there for modules and packages to import.\n\nTo set the `PWD`\
    \ environment variable under Windows, see \"Excursus: Setting Environment Variables\"\
    \ at the Python Software Foundation site.\n\nWhew.\n\n## The First Website Code\n\
    \nThis section discusses how to use FastAPI to write requests and responses for\
    \ a RESTful API site. Then, we'll begin to apply these to our actual, increasingly\
    \ gnarly, site.\n\nLet's begin with Example 8-1. Within *src*, make this new top-level\
    \ *main.py* program that will start the Uvicorn program and FastAPI package.\n\
    \nExample 8-1. The main program, main.py\n\n```python\nfrom fastapi import FastAPI\n\
    \napp = FastAPI()\n\n@app.get(\"/\")\ndef top():\n    return \"top here\"\n```"
  mdcn: "最后，在第10章中，我们将不再模拟，而是将真实数据存储在真实数据库中，构建一个完整的端到端（Web → 服务 → 数据）网站。\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_111_0.png)\n\
    \n允许任何匿名访客执行所有这些操作，将是一个关于“为什么我们不能拥有美好事物”的生动教训。第11章将讨论定义角色和限制谁可以做什么所需的认证（身份验证和授权）。在本章的剩余部分，我们将绕过认证，只展示如何处理原始的Web功能。\n\
    \n## 插曲：自顶向下、自底向上，还是中间突破？\n\n在设计网站时，你可以从以下任一层面开始：\n\n- Web层，然后向下工作\n- 数据层，然后向上工作\n\
    - 服务层，然后向两个方向扩展\n\n你是否已经有一个安装好并加载了数据的数据库，正渴望着一种与世界分享它的方式？如果是这样，你可能想先处理数据层的代码和测试，然后是服务层，最后编写Web层。\n\
    \n如果你遵循领域驱动设计，你可能会从中间的服务层开始，定义你的核心实体和数据模型。或者，你可能想先开发Web界面，并在了解对下层的期望之前，模拟对下层的调用。\n\
    \n你将在以下书籍中找到非常好的设计讨论和建议：\n\n- Leonardo Giordani 的 *Clean Architectures in Python*（Digital\
    \ Cat Books）\n- Harry J.W. Percival 和 Bob Gregory 的 *Architecture Patterns with\
    \ Python*（O’Reilly）\n- José Haro Peralta 的 *Microservice APIs*（Manning）\n\n在这些以及其他资料中，你会看到诸如六边形架构、端口和适配器之类的术语。你如何进行的选择很大程度上取决于你已经拥有的数据以及你希望如何开展构建网站的工作。\n\
    \n我猜你们中的许多人主要对尝试FastAPI及其相关技术感兴趣，不一定有一个预先定义好的、成熟的、想要立即实现的数据领域。\n\n因此，在本书中，我采用Web优先的方法——一步一步来，从基本部分开始，并在需要时向下添加其他部分。有时实验会成功，有时则不会。我将避免一开始就把所有东西都塞进这个Web层的冲动。\n\
    \n> 这个Web层只是在用户和服务之间传递数据的一种方式。还存在其他方式，例如通过命令行界面（CLI）或软件开发工具包（SDK）。在其他框架中，你可能会看到这个Web层被称为*视图*或*表示*层。\n\
    \n## RESTful API 设计\n\nHTTP是在Web客户端和服务器之间传递命令和数据的一种方式。但是，就像你可以用冰箱里的食材做出从糟糕到美味的各种菜肴一样，一些HTTP的“食谱”比其他食谱效果更好。\n\
    \n在第1章中，我提到*RESTful*已成为HTTP开发的一个有用但有时模糊的模型。RESTful设计具有以下核心组件：\n\n- **资源**：你的应用程序管理的数据元素\n\
    - **ID**：唯一的资源标识符\n- **URL**：结构化的资源和ID字符串\n- **动词或动作**：伴随URL用于不同目的的术语：\n    -\
    \ **GET**：检索资源。\n    - **POST**：创建新资源。\n    - **PUT**：完全替换资源。\n    - **PATCH**：部分替换资源。\n\
    \    - **DELETE**：资源被销毁。\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_113_0.png)\n\
    \n你会看到关于PUT与PATCH相对优缺点的分歧。如果你不需要区分部分修改和完全修改（替换），你可能不需要两者兼备。\n\n将动词与包含资源和ID的URL组合的一般RESTful规则使用以下路径参数模式（URL中/之间的内容）：\n\
    \n- `动词 /资源/`：将动词应用于类型为资源的所有资源。\n- `动词 /资源/ID`：将动词应用于ID为ID的资源。\n\n使用本书的示例数据，对端点`/thing`的GET请求将返回所有探索者的数据，但对`/thing/abc`的GET请求将只给你ID为`abc`的thing资源的数据。\n\
    \n最后，Web请求通常携带更多信息，指示执行以下操作：\n\n- 对结果排序\n- 对结果分页\n- 执行另一个功能\n\n这些参数有时可以表示为路径参数（附加在末尾，在另一个/之后），但通常作为查询参数（URL中?之后的var=val内容）包含。因为URL有大小限制，大型请求通常在HTTP正文中传递。\n\
    \n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_113_1.png)\n\n大多数作者建议在命名资源以及相关的命名空间（如API部分和数据库表）时使用复数。我长期以来一直遵循这个建议，但现在觉得单数名称在许多方面更简单（包括英语的奇特性）：\n\
    \n- 有些词本身就是复数：series, fish\n- 有些词有不规则复数：children, people\n- 你需要在许多地方编写自定义的单数/复数转换代码\n\
