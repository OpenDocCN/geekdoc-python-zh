    # Security Testing


    Security isn’t one thing, but everything. You need to defend against malice but
    also against plain old mistakes, and even events that you have no control over.
    Let’s defer scaling issues to the next section and deal mainly here with the analysis
    of potential threats.


    Chapter 11 discussed authentication and authorization. These factors are always
    messy and error-prone. It’s tempting to use clever methods to counteract clever
    attacks, and it’s always a challenge to design protection that’s easy to understand
    and implement.


    But now that you know about Schemathesis, read its documentation on property-based
    testing for authentication. Just as it vastly simplified testing most of the API,
    it can automate much of the tests for endpoints that need authentication.


    # Load Testing


    Load tests show how your application handles heavy traffic:


    +   - API calls

    - Database reads or writes

    - Memory use

    - Disk use

    - Network latency and bandwidth


    Some can be *full* tests that simulate an army of users clamoring to use your
    service; you want to be ready before that day arrives. The content in this section
    overlaps with that in “Performance” on page 188 and “Troubleshooting” on page
    190.


    Many good load testers out are there, but here I’ll recommend Locust. With Locust,
    you define all your tests with plain Python scripts. It can simulate hundreds
    of thousands of users, all pounding away at your site, or even multiple servers,
    at once.'
