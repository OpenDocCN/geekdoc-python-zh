  md: "Example 15-3 is an equivalent programmatic test.\n\nExample 15-3. Upload a\
    \ small file with Requests\n\n```\n$ python\n>>> import requests\n>>> url = \"\
    http://localhost:8000/small\"\n>>> files = {'small_file': open('1KB.bin', 'rb')}\n\
    >>> resp = requests.post(url, files=files)\n>>> print(resp.json())\nfile size:\
    \ 1000\n```\n\n# UploadFile\n\nFor large files, it's better to use UploadFile.\
    \ This creates a Python SpooledTemporary File object, mostly on the server's disk\
    \ instead of in memory. This is a Python file-like object, which supports the\
    \ methods read(), write(), and seek(). Example 15-4 shows this, and also uses\
    \ async def instead of def to avoid blocking the web server while file pieces\
    \ are uploading.\n\nExample 15-4. Upload a big file with FastAPI (add to main.py)\n\
    \n```\nfrom fastapi import UploadFile\n\n@app.post(\"/big\")\nasync def upload_big_file(big_file:\
    \ UploadFile) -> str:\n    return f\"file size: {big_file.size}, name: {big_file.filename}\"\
    \n```\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_226_0.png)\n\nFile() created\
    \ a bytes object and needed the parentheses. Upload File is a different class\
    \ of object.\n\nIf Uvicorn's starter motor isn't worn out yet, it's test time.\
    \ This time, Examples 15-5 through 15-6 use a 1 GB file (1GB.bin) that I grabbed\
    \ from Fastest Fish.\n\nExample 15-5. Test a big file upload with HTTPie\n\n```\n\
    $ http -f -b POST http://localhost:8000/big big_file@1GB.bin\n\"file size: 1000000000,\
    \ name: 1GB.bin\"\n```"
