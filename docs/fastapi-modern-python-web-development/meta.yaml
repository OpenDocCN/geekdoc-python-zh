  md: "# Authentication Methods\n\nThere are many web authentication methods and tools:\n\
    \n+   - *Username/email and password*\n  Using classic HTTP Basic and Digest Authentication\n\
    - *API key*\n  An opaque long string with an accompanying *secret*\n- *OAuth2*\n\
    \  A set of standards for authentication and authorization\n- *JavaScript Web\
    \ Tokens (JWT)*\n  An encoding format containing cryptographically signed user\
    \ information\n\nIn this section, I'll review the first two methods and show you\
    \ how to traditionally implement them. But I'll stop before filling out the API\
    \ and database code. Instead, we'll fully implement a more modern scheme with\
    \ OAuth2 and JWT.\n\n# Global Authentication: Shared Secret\n\nThe very simplest\
    \ authentication method is to pass a secret that's normally known only by the\
    \ web server. If it matches, you're in. This isn't safe if your API site is exposed\
    \ to the public with HTTP instead of HTTPS. If it's hidden behind a frontend site\
    \ that is itself open, the frontends and backends could communicate using a shared\
