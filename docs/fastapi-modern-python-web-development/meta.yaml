  md: "```\nif __name__ == \"__main__\":\n    import uvicorn\n    uvicorn.run(\"main:app\"\
    , reload=True)\n```\n\nThat app is the FastAPI object that ties everything together.\
    \ Uvicorn's first argument is \"main:app\" because the file is called *main.py*,\
    \ and the second is app, the name of the FastAPI object.\n\nUvicorn will keep\
    \ on running, and restart if any code changes in the same directory or any subdirectories.\
    \ Without reload=True, each time you modify your code, you'd need to kill and\
    \ restart Uvicorn manually. In many of the following examples, you'll just keep\
    \ changing the same *main.py* file and forcing a restart, instead of creating\
    \ *main2.py*, *main3.py*, and so on.\n\nFire up *main.py* in Example 8-2.\n\n\
