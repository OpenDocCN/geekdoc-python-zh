    \ if the endpoint exists, works with the correct parameters, and returns the right\
    \ status code and data.\n\n> These are shallow API tests, testing solely within\
    \ the Web layer. So, Service-layer calls (which would in turn call the Data layer\
    \ and the database) need to be intercepted, along with any other calls that exit\
    \ the Web layer.\n\nUsing the import idea of the previous section, use the environment\
    \ variable CRYPTID_UNIT_TEST to import the *fake* package as service, instead\
    \ of the real service. This stops Web functions from calling Service functions,\
    \ and instead short-circuits them to the *fake* (doubles) version. Then the lower\
    \ Data layer and database aren’t involved, either. We get what we want: unit tests.\
