    \ str\n...     aka: str\n...\n>>> dataclass_thing = CreatureDataClass(\n...  \
    \   \"yeti\",\n...     \"CN\",\n...     \"Himalayas\",\n...     \"Hirsute Himalayan\"\
    ,\n...     \"Abominable Snowman\")\n>>> print(\"Name is\", dataclass_thing.name)\n\
    Name is yeti\n```\n\n这对于将变量组合在一起的部分来说相当不错。但我们想要更多，所以让我们向圣诞老人祈求这些功能：\n\n- 可能替代类型的\
    \ *联合*\n- 缺失/可选值\n- 默认值\n- 数据验证\n- 序列化为 JSON 等格式以及从这些格式反序列化\n\n## 替代方案\n\n使用 Python\
    \ 的内置数据结构，尤其是字典，是很诱人的。但你不可避免地会发现字典有点太“松散”了。自由是有代价的。你需要检查*所有内容*：\n\n- 键是可选的吗？\n\
    - 如果键缺失，是否有默认值？\n- 键是否存在？\n- 如果存在，键的值类型是否正确？\n- 如果类型正确，值是否在正确的范围内或匹配某种模式？\n\n\
    至少有三种解决方案可以满足其中部分需求：\n\n- **Dataclasses**：Python 标准库的一部分。\n- **attrs**：第三方库，但它是\
    \ dataclasses 的超集。\n- **Pydantic**：也是第三方库，但已集成到 FastAPI 中，因此如果你已经在使用 FastAPI，它是一个简单选择。而如果你正在阅读本书，你很可能已经在使用\
    \ FastAPI。\n\nYouTube 上有一个方便的三者比较。一个要点是 Pydantic 在验证方面表现突出，它与 FastAPI 的集成能捕获许多潜在的数据错误。另一个要点是\
    \ Pydantic 依赖于继承（从 BaseModel 类），而另外两个使用 Python 装饰器来定义它们的对象。这更多是风格问题。\n\n在另一个比较中，Pydantic\
    \ 的性能优于像 marshmallow 和名字有趣的 Voluptuous 这样的旧验证库。Pydantic 的另一个大优势是它使用标准的 Python\
    \ 类型提示语法；旧库早于类型提示出现，因此实现了自己的语法。\n\n因此，我将在本书中使用 Pydantic，但如果你不使用 FastAPI，你可能会发现另外两种替代方案也有用武之地。\n\
    \nPydantic 提供了指定这些检查任意组合的方式：\n\n- 必需与可选\n- 如果未指定但必需时的默认值\n- 期望的数据类型或类型\n- 值范围限制\n\
    - 其他基于函数的检查（如果需要）\n- 序列化和反序列化\n\n## 一个简单示例\n\n你已经看到了如何通过 URL、查询参数或 HTTP 主体向 Web\
    \ 端点提供一个简单的字符串。问题在于，你通常请求和接收的是多种类型的数据组。这就是 Pydantic 模型在 FastAPI 中首次出现的地方。\n\n\
    这个初始示例将使用三个文件：\n\n- *model.py* 定义一个 Pydantic 模型。\n- *data.py* 是一个假数据源，定义一个模型实例。\n\
    - *web.py* 定义一个返回假数据的 FastAPI Web 端点。\n\n为简化本章内容，让我们将所有文件放在同一目录中。在后面讨论更大网站的章节中，我们将把它们分到各自的层中。首先，在示例\
    \ 5-8 中定义生物的 *model*。\n\n### 示例 5-8. 定义生物模型：model.py\n\n```python\nfrom pydantic\
    \ import BaseModel\n\nclass Creature(BaseModel):\n    name: str\n    country:\
    \ str\n    area: str\n    description: str\n    aka: str\n\nthing = Creature(\n\
