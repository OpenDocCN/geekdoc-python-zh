  md: "# File()\n\nFile() is used as the type for a direct file upload. Your path\
    \ function may be synchronous (def) or asynchronous (async def), but the asynchronous\
    \ version is better because it won't tie up your web server while the file is\
    \ uploading.\n\nFastAPI will pull up the file in chunks and reassemble it in memory,\
    \ so File() should be used for only relatively small files. Instead of assuming\
    \ that the input is JSON, FastAPI encodes a file as a form element.\n\nLet's write\
    \ the code to request a file and test it. You can grab any file on your machine\
    \ to test with, or download one from a site like Fastest Fish. I grabbed a 1 KB\
    \ file from there and saved it locally as 1KB.bin.\n\nIn Example 15-1, add these\
    \ lines to your top main.py.\n\nExample 15-1. Handle a small file upload with\
    \ FastAPI\n\n```\nfrom fastapi import File\n\n@app.post(\"/small\")\nasync def\
    \ upload_small_file(small_file: bytes = File()) -> str:\n    return f\"file size:\
    \ {len(small_file)}\"\n```\n\nAfter Uvicorn restarts, try an HTTPie test in Example\
    \ 15-2.\n\nExample 15-2. Upload a small file with HTTPie\n\n```\n$ http -f -b\
    \ POST http://localhost:8000/small small_file@1KB.bin\n\"file size: 1000\"\n```\n\
    \nHere are a few notes on this test:\n\n+   - You need to include -f (or --form),\
    \ because files are uploaded like forms, not as JSON text.\n- small_file@1KB.bin:\n\
    \  - small_file\n    Matches the variable name small_file in the FastAPI path\
    \ function in Example 15-1\n  - @\n    HTTPie's shorthand to make a form\n  -\
    \ 1KB.bin\n    The file that is being uploaded"
  merge: -1
