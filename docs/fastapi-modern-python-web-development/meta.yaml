- img_proc: true
  md: "# Services and APIs\n\nThe web is a great connecting fabric. Although much\
    \ activity still occurs on the *content* side—HTML, JavaScript, images, and so\
    \ on—there’s an increasing emphasis on the application programming interfaces\
    \ (APIs) that connect things.\n\nCommonly, a web *service* handles low-level database\
    \ access and middle-level business logic (often lumped together as a *backend*),\
    \ while JavaScript or mobile apps provide a rich top-level *frontend* (interactive\
    \ user interface). These fore and aft worlds have become more complex and divergent,\
    \ usually requiring developers to specialize in one or the other. It’s harder\
    \ to be a *full stack* developer than it used to be.¹\n\nThese two worlds talk\
    \ to each other using APIs. In the modern web, API design is as important as the\
    \ design of websites themselves. An API is a contract, similar to a database schema.\
    \ Defining and modifying APIs is now a major job.\n\n# Kinds of APIs\n\nEach API\
    \ defines the following:\n\n*Protocol*\n    The control structure\n\n*Format*\n\
    \    The content structure\n\nMultiple API methods have developed as technology\
    \ has evolved from isolated machines, to multitasking systems, to networked servers.\
    \ You’ll probably run across one or more of these at some point, so the following\
    \ is a brief summary before getting to *HTTP* and its friends, which are featured\
    \ in this book:\n\n+   - Before networking, an API usually meant a very close\
    \ connection, like a function call to a *library* in the same language as your\
    \ application—say, calculating a square root in a math library.\n- *Remote procedure\
    \ calls (RPCs)* were invented to call functions in other processes, on the same\
    \ machine or others, as though they were in the calling application. A popular\
    \ current example is gRPC.\n- *Messaging* sends small chunks of data in pipelines\
    \ among processes. Messages may be verb-like commands or may just indicate noun-like\
    \ *events* of interest. Current popular messaging solutions, which vary broadly\
    \ from toolkits to full servers, include Apache Kafka, RabbitMQ, NATS, and ZeroMQ.\
    \ Communication can follow different patterns:\n\n1 I gave up trying a few years\
    \ ago."
  merge: -1
  pgno: 21
- img_proc: true
  md: "*Request-response*\n    One: one, like a web browser calling a web server.\n\
    \n*Publish-subscribe, or pub-sub*\n    A *publisher* emits messages, and *subscribers*\
    \ act on each according to some data in the message, like a subject.\n\n*Queues*\n\
    \    Like pub-sub, but only one of a pool of subscribers grabs the message and\
    \ acts on it.\n\nAny of these may be used alongside a web service—for example,\
    \ performing a slow backend task like sending an email or creating a thumbnail\
    \ image.\n\n# HTTP\n\nBerners-Lee proposed three components for his World Wide\
    \ Web:\n\n*HTML*\n    A language for displaying data\n\n*HTTP*\n    A client-server\
    \ protocol\n\n*URLs*\n    An addressing scheme for web resources\n\nAlthough these\
    \ seem obvious in retrospect, they turned out to be a ridiculously useful combination.\
    \ As the web evolved, people experimented, and some ideas, like the IMG tag, survived\
    \ the Darwinian struggle. And as needs became clearer, people got serious about\
    \ defining standards.\n\n# REST(ful)\n\nOne chapter in Roy Fielding's Ph.D. *thesis*\
    \ defined *Representational State Transfer (REST)*—an *architectural style* for\
    \ HTTP use.² Although often referenced, it's been largely misunderstood.\n\n2\
    \ *Style* means a higher-level pattern, like *client-server*, rather than a specific\
    \ design."
  merge: -1
  pgno: 22
- img_proc: true
  md: "A roughly shared adaptation has evolved and dominates the modern web. It's\
    \ called *RESTful*, with these characteristics:\n\n+   - Uses HTTP and client-server\
    \ protocol\n- Stateless (each connection is independent)\n- Cacheable\n- Resource-based\n\
    \nA *resource* is data that you can distinguish and perform operations on. A web\
    \ service provides an *endpoint*—a distinct URL and HTTP *verb* (action)—for each\
    \ feature that it wants to expose. An endpoint is also called a *route*, because\
    \ it routes the URL to a function.\n\nDatabase users are familiar with the *CRUD*\
    \ acronym of procedures: create, read, update, delete. The HTTP verbs are pretty\
    \ CRUDdy:\n\nPOST\n    Create (write)\n\nPUT\n    Modify completely (replace)\n\
    \nPATCH\n    Modify partially (update)\n\nGET\n    Um, get (read, retrieve)\n\n\
    DELETE\n    Uh, delete\n\nA client sends a *request* to a RESTful endpoint with\
    \ data in one of the following areas of an HTTP message:\n\n+   - Headers\n- The\
    \ URL string\n- Query parameters\n- Body values\n\nIn turn, an HTTP *response*\
    \ returns these:\n\n+   - An integer *status code* indicating the following:\n\
    \    100s\n        Info, keep going"
  merge: -1
  pgno: 23
- img_proc: true
  md: '200s

    Success


    300s

    Redirection


    400s

    Client error


    500s

    Server error


    +   - Various headers

    - A body, which may be empty, single, or *chunked* (in successive pieces)


    At least one status code is an Easter egg: 418 (I''m a teapot) is supposed to
    be returned by a web-connected teapot, if asked to brew coffee.


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_24_0.png)


    You''ll find many websites and books on RESTful API design, all with useful rules
    of thumb. This book will dole some out on the way.


    # JSON and API Data Formats


    Frontend applications can exchange plain ASCII text with backend web services,
    but how can you express data structures like lists of things?


    Just about when we really started to need it, along came *JavaScript Object Notation*
    (JSON)—another simple idea that solves an important problem and seems obvious
    with hindsight. Although the *J* stands for *JavaScript*, the syntax looks a lot
    like Python too.


    JSON has largely replaced older attempts like XML and SOAP. In the rest of this
    book, you''ll see that JSON is the default web service input and output format.


    # JSON:API


    The combination of RESTful design and JSON data formats is common now. But some
    wiggle room still remains for ambiguity and nerd tussles. The recent JSON:API
    proposal aims to tighten specs a bit. This book will use the loose RESTful approach,'
  merge: -1
  pgno: 24
- img_proc: true
  md: "but JSON:API or something similarly rigorous may be useful if you have significant\
    \ tussles.\n\n# GraphQL\n\nRESTful interfaces can be cumbersome for some purposes.\
    \ Facebook (now Meta) designed *Graph Query Language (GraphQL)* to specify more\
    \ flexible service queries. I won't go into GraphQL in this book, but you may\
    \ want to look into it if you find RESTful design inadequate for your application.\n\
    \n# Concurrency\n\nBesides the growth of service orientation, the rapid expansion\
    \ of the number of connections to web services requires ever better efficiency\
    \ and scale.\n\nWe want to reduce the following:\n\n*Latency*\n    The up-front\
    \ wait time\n\n*Throughput*\n    The number of bytes per second between the service\
    \ and its callers\n\nIn the old web days,³ people dreamed of supporting hundreds\
    \ of simultaneous connections, then fretted about the “10K problem,” and now assume\
    \ millions at a time.\n\nThe term *concurrency* doesn't mean full parallelism.\
    \ Multiple processing isn't occurring in the same nanosecond, in a single CPU.\
    \ Instead, concurrency mostly avoids *busy waiting* (idling the CPU until a response\
    \ is delivered). CPUs are zippy, but networks and disks are thousands to millions\
    \ of times slower. So, whenever we talk to a network or disk, we don't want to\
    \ just sit there with a blank stare until it responds.\n\nNormal Python execution\
    \ is *synchronous*: one thing at a time, in the order specified by the code. Sometimes\
    \ we want to be *asynchronous*: do a little of one thing, then a little of another\
    \ thing, back to the first thing, and so on. If all our code uses the CPU to calculate\
    \ things (*CPU bound*), there's really no spare time to be asynchronous. But if\
    \ we perform something that makes the CPU wait for an external thing to complete\
    \ (I/O bound), we can be asynchronous.\n\nAsynchronous systems provide an *event\
    \ loop*: requests for slow operations are sent and noted, but we don't hold up\
    \ the CPU waiting for their responses. Instead, some immediate processing is done\
    \ on each pass through the loop, and any responses that came in during that time\
    \ are handled in the next pass.\n\n> ³ Around when caveman played hacky sack with\
    \ giant ground sloths."
