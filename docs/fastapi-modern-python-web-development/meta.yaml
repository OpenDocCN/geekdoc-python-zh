    # JSON and API Data Formats


    Frontend applications can exchange plain ASCII text with backend web services,
    but how can you express data structures like lists of things?


    Just about when we really started to need it, along came *JavaScript Object Notation*
    (JSON)—another simple idea that solves an important problem and seems obvious
    with hindsight. Although the *J* stands for *JavaScript*, the syntax looks a lot
    like Python too.


    JSON has largely replaced older attempts like XML and SOAP. In the rest of this
    book, you''ll see that JSON is the default web service input and output format.


    # JSON:API


    The combination of RESTful design and JSON data formats is common now. But some
    wiggle room still remains for ambiguity and nerd tussles. The recent JSON:API
    proposal aims to tighten specs a bit. This book will use the loose RESTful approach,'
  - "[PAGE 25]\n\nbut JSON:API or something similarly rigorous may be useful if you\
    \ have significant tussles.\n\n# GraphQL\n\nRESTful interfaces can be cumbersome\
    \ for some purposes. Facebook (now Meta) designed *Graph Query Language (GraphQL)*\
    \ to specify more flexible service queries. I won't go into GraphQL in this book,\
    \ but you may want to look into it if you find RESTful design inadequate for your\
    \ application.\n\n# Concurrency\n\nBesides the growth of service orientation,\
    \ the rapid expansion of the number of connections to web services requires ever\
    \ better efficiency and scale.\n\nWe want to reduce the following:\n\n*Latency*\n\
    \    The up-front wait time\n\n*Throughput*\n    The number of bytes per second\
    \ between the service and its callers\n\nIn the old web days,³ people dreamed\
    \ of supporting hundreds of simultaneous connections, then fretted about the “10K\
    \ problem,” and now assume millions at a time.\n\nThe term *concurrency* doesn't\
    \ mean full parallelism. Multiple processing isn't occurring in the same nanosecond,\
    \ in a single CPU. Instead, concurrency mostly avoids *busy waiting* (idling the\
    \ CPU until a response is delivered). CPUs are zippy, but networks and disks are\
    \ thousands to millions of times slower. So, whenever we talk to a network or\
    \ disk, we don't want to just sit there with a blank stare until it responds.\n\
    \nNormal Python execution is *synchronous*: one thing at a time, in the order\
    \ specified by the code. Sometimes we want to be *asynchronous*: do a little of\
    \ one thing, then a little of another thing, back to the first thing, and so on.\
    \ If all our code uses the CPU to calculate things (*CPU bound*), there's really\
    \ no spare time to be asynchronous. But if we perform something that makes the\
    \ CPU wait for an external thing to complete (I/O bound), we can be asynchronous.\n\
    \nAsynchronous systems provide an *event loop*: requests for slow operations are\
    \ sent and noted, but we don't hold up the CPU waiting for their responses. Instead,\
    \ some immediate processing is done on each pass through the loop, and any responses\
    \ that came in during that time are handled in the next pass.\n\n> ³ Around when\
    \ caveman played hacky sack with giant ground sloths."
  - "[PAGE 26]\n\nThe effects can be dramatic. Later in this book, you’ll see how\
    \ FastAPI’s support of asynchronous processing makes it much faster than typical\
    \ web frameworks.\n\nAsynchronous processing isn’t magic. You still have to be\
    \ careful to avoid doing too much CPU-intensive work during the event loop, because\
    \ that will slow down everything. Later in this book, you’ll see the uses of Python’s\
    \ `async` and `await` keywords, and how FastAPI lets you mix both synchronous\
    \ and asynchronous processing.\n\n# Layers\n\n*Shrek* fans may remember he noted\
    \ his layers of personality, to which Donkey replied, “Like an onion?”\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_26_0.png)\n\
    \nWell, if ogres and tearful vegetables can have layers, then so can software.\
    \ To manage size and complexity, many applications have long used a so-called\
    \ *three-tier model*.<sup>4</sup> This isn’t terribly new. Terms differ,<sup>5</sup>\
    \ but for this book I’m using the following simple separation of terms (see Figure\
    \ 1-1):\n\n+   - **Web**\n  Input/output layer over HTTP, which assembles client\
    \ requests, calls the Service Layer, and returns responses\n- **Service**\n  The\
    \ business logic, which calls the Data layer when needed\n- **Data**\n  Access\
    \ to data stores and other services\n- **Model**\n  Data definitions shared by\
    \ all layers\n- **Web client**\n  Web browser or other HTTP client-side software\n\
    \n> 4 Choose your own dialect: tier/layer, tomato/tomahto/arigato.\n\n5 You’ll\
    \ often see the term *Model-View-Controller (MVC)* and variations. Commonly accompanied\
    \ by religious wars, toward which I’m agnostic."
