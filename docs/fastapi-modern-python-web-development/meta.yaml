    ## 前言


    这是一本关于 FastAPI 的实用入门书——一个现代的 Python Web 框架。它也是一个关于那些我们偶然发现的、闪亮的新事物，最终可能变得非常有用的故事。当你遇到狼人时，拥有一颗银弹是件好事。（而你将在本书后面遇到狼人。）


    我于 1970 年代中期开始编写科学应用程序。1977 年，我在一台 PDP-11 上第一次接触 Unix 和 C 之后，就有一种感觉，这个 Unix 东西可能会流行起来。


    在 80 年代和 90 年代初，互联网仍然是非商业化的，但已经是获取免费软件和技术信息的好来源。1993 年，当一个名为 Mosaic 的网络浏览器在早期的开放互联网上发布时，我有一种感觉，这个
    Web 东西可能会流行起来。


    几年后，当我创办自己的 Web 开发公司时，我的工具是当时常见的那些：PHP、HTML 和 Perl。几年后，在一个合同项目中，我终于尝试了 Python，并惊讶于我能多么快速地访问、操作和显示数据。在两周的业余时间里，我能够复制一个
    C 应用程序的大部分功能，而那个程序花了四个开发人员一年的时间才写完。现在我有一种感觉，这个 Python 东西可能会流行起来。


    在那之后，我的大部分工作都涉及 Python 及其 Web 框架，主要是 Flask 和 Django。我特别喜欢 Flask 的简洁性，并在许多工作中更喜欢它。但就在几年前，我在灌木丛中瞥见了一丝闪光：一个名为
    FastAPI 的新 Python Web 框架，由 Sebastián Ramírez 编写。


    当我阅读他（出色的）[文档](https://fastapi.tiangolo.com/)时，我对其中蕴含的设计和思考印象深刻。特别是，他的[历史](https://fastapi.tiangolo.com/history/)页面显示了他评估各种替代方案时所付出的多少心血。这不是一个自我满足的项目或有趣的实验，而是一个用于实际开发的严肃框架。现在我有一种感觉，这个
    FastAPI 东西可能会流行起来。


    我用 FastAPI 编写了一个生物医学 API 站点，效果非常好，以至于我们团队在接下来的一年里用 FastAPI 重写了我们旧的核心 API。这仍然在生产环境中运行，并且表现良好。我们团队学习了你将在本书中读到的基础知识，并且都觉得我们正在编写更好、更快、错误更少的代码。顺便说一句，我们中有些人以前从未用
    Python 编写过，而且只有我使用过 FastAPI。


    所以，当我有机会向 O''Reilly 建议我的 *Introducing Python* 一书的后续作品时，FastAPI 是我的首选。在我看来，FastAPI
    至少会产生 Flask 和 Django 那样的影响，甚至可能更大。


    正如我所提到的，FastAPI 网站本身提供了世界级的文档，包括许多关于常见 Web 主题的细节：数据库、身份验证、部署等等。那么为什么还要写一本书呢？


    这本书并非旨在面面俱到，因为，嗯，那太令人疲惫了。它*旨在*实用——帮助你快速掌握 FastAPI 的主要思想并应用它们。我将指出各种需要一些探索的技巧，并提供关于日常最佳实践的建议。


    我以每章的预览开始，介绍接下来的内容。接下来，我尽量不忘记我刚刚承诺的内容，提供细节和随机的旁白。最后，有一个简短易懂的复习。


    俗话说，“这些是我所依据事实的观点。”你的经历将是独特的，但我希望你能在这里找到足够的价值，成为一名更高效的 Web 开发人员。


    ## 本书中使用的约定


    本书使用以下排版约定：


    *斜体*

    表示新术语、URL、电子邮件地址、文件名和文件扩展名。


    **等宽字体**

    用于程序清单，以及在段落中引用程序元素，如变量或函数名、数据库、数据类型、环境变量、语句和关键字。


    **等宽粗体**

    显示用户应按字面意思输入的命令或其他文本。


    *等宽斜体*

    显示应替换为用户提供的值或由上下文确定的值的文本。


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_16_0.png)


