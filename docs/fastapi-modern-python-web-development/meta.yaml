    ===================== Schemathesis 测试会话开始 ======================\nSchema 位置: http://localhost:8000/openapi.json\n\
    基础 URL: http://localhost:8000/\n规范版本: Open API 3.0.2\n工作进程数: 1\n收集到的 API 操作数:\
    \ 12\n\nGET /explorer/ .                                [  8%]\nPOST /explorer/\
    \ .                               [ 16%]\nPATCH /explorer/ F                 \
