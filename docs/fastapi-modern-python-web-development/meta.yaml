  md: 'Performance has two aspects:


    +   - The time to handle a single request

    - The number of requests that can be handled at once


    # Caches


    If you have a web endpoint that ultimately gets data from a static source (like
    a database record that changes rarely or never), it''s possible to *cache* the
    data in a function. This could be in any of the layers. Python provides the standard
    `functools` module and the functions `cache()` and `lru_cache()`.


    # Databases, Files, and Memory


    One of the most common causes of a slow website is a missing index for a database
    table of sufficient size. Often you won''t see the problem until your table has
    grown to a particular size, and then queries suddenly become much slower. In SQL,
    any column in a `WHERE` clause should be indexed.


    In many examples in this book, the primary key of the `creature` and `explorer`
    tables has been the text field `name`. When the tables were created, `name` was
    declared the `primary` key. For the tiny tables that you''ve seen so far in this
    book, SQLite would ignore that key anyhow, since it''s faster just to scan the
    table. But once a table gets to a decent size—say a million rows—a missing index
    will make a noticeable difference. The solution: run a `query optimizer`.


    Even if you have a small table, you can do database load testing with Python scripts
    or open source tools. If you''re making numerous sequential database queries,
    it may be possible to combine them in a single batch. If you''re uploading or
    downloading a large file, use the streaming versions rather than a giant gulp.


    # Queues


    If you''re performing any task that takes longer than a fraction of a second (like
    sending a confirmation email or downsizing an image), it may be worth handing
    it off to a job queue like `Celery`.'
