    让你的浏览器从它的数字臀部上起来，为你获取这个新表单。填写 **Bob Frapples** 并提交表单。这一次，你会得到从 HTTPie 得到的结果：\n\
    \n> \"Hello, Bob Frapples?\"\n\n所以，如果你从 HTML 文件提交表单，请使用 POST。\n\n## 模板\n\n你可能见过文字游戏\
    \ *Mad Libs*。你让人们提供一系列词语——名词、动词，或者更具体的东西——然后你将它们输入到文本页面中标记好的位置。一旦你有了所有的词语，你就朗读插入了值的文本，然后笑料百出，有时会令人尴尬。\n\
    \n嗯，Web *模板* 类似，尽管通常没有尴尬。模板包含一堆文本，其中有供服务器插入数据的插槽。它的通常目的是生成具有可变内容的 HTML，这与第 15\
    \ 章的 *静态* HTML 不同。\n\nFlask 的用户非常熟悉它的配套项目，模板引擎 Jinja（也常被称为 *Jinja2*）。FastAPI 支持\
    \ Jinja 以及其他模板引擎。\n\n在 *main.py* 旁边创建一个名为 *template* 的目录，用于存放 Jinja 增强的 HTML 文件。在里面，创建一个名为\
    \ *list.html* 的文件，如示例 16-6 所示。\n\n示例 16-6. 定义模板文件 (template/list.html)\n\n```\n\
    <html>\n<table bgcolor=\"#eeeeee\">\n  <tr>\n    <th colspan=3>Creatures</th>\n\
