    \ Dec  7 2020, 12:10:52)\n[Clang 6.0 (clang-600.0.57)] on darwin\nType \"help\"\
    , \"copyright\", \"credits\" or \"license\" for more information.\n>>>\n```\n\n\
    The first few lines are specific to your operating system and Python version.\
    \ The >>> is your prompt here. A handy extra feature of the interactive interpreter\
    \ is that it will print the value of a variable for you if you type its name:\n\
    \n```\n>>> wrong_answer = 43\n>>> wrong_answer\n43\n```\n\nThis also works for\
    \ expressions:\n\n```\n>>> wrong_answer = 43\n>>> wrong_answer - 3\n40\n```\n\n\
    If you're fairly new to Python or would like a quick review, read the next few\
    \ sections.\n\n## Python Itself\n\nYou will need, as a bare minimum, Python 3.7.\
    \ This includes features like type hints and asyncio, which are core requirements\
    \ for FastAPI. I recommend using at least Python 3.9, which will have a longer\
    \ support lifetime. The standard source for Python is the [Python Software Foundation](https://www.python.org/).\n\
    \n## Package Management\n\nYou will want to download external Python packages\
    \ and install them safely on your computer. The classic tool for this is `pip`.\n\
    \nBut how do you download this downloader? If you installed Python from the Python\
    \ Software Foundation, you should already have pip. If not, follow the instructions\
    \ at the pip site to get it. Throughout this book, as I introduce a new Python\
    \ package, I'll include the pip command to download it.\n\nAlthough you can do\
    \ a lot with plain old pip, you'll likely also want to use virtual environments\
    \ and consider an alternative tool like Poetry.\n\n## Virtual Environments\n\n\
    Pip will download and install packages, but where should it put them? Although\
    \ standard Python and its included libraries are usually installed in a standard\
    \ place on your operating system, you may not (and probably should not) be able\
    \ to change anything there. Pip uses a default directory other than the system\
    \ one, so you won't step on your system's standard Python files. You can change\
    \ this; see the pip site for details for your operating system.\n\nBut it's common\
    \ to work with multiple versions of Python, or make installations specific to\
    \ a project, so you know exactly which packages are in there. To do this, Python\
    \ supports *virtual environments*. These are just directories (*folders* in the\
    \ non-Unix world) into which pip writes downloaded packages. When you *activate*\
    \ a virtual environment, your shell (main system command interpreter) looks there\
    \ first when loading Python modules.\n\nThe program for this is `venv`, and it's\
    \ been included with standard Python since version 3.4.\n\nLet's make a virtual\
    \ environment called venv1. You can run the venv module as a standalone program:\n\
    \n```\n$ venv venv1\n```\n\nOr as a Python module:\n\n```\n$ python -m venv venv1\n\
    ```\n\nTo make this your current Python environment, run this shell command (on\
    \ Linux or Mac; see the venv docs for Windows and others):\n\n```\n$ source venv1/bin/activate\n\
    ```\n\nNow, anytime you run `pip install`, it will install packages under venv1.\
    \ And when you run Python programs, that's where your Python interpreter and modules\
    \ will be found.\n\nTo *deactivate* your virtual environment, press Control-D\
    \ (Linux or Mac), or type **deactivate** (Windows).\n\nYou can create alternative\
    \ environments like venv2, and deactivate/activate to step between them (although\
    \ I hope you have more naming imagination than me).\n\n## Poetry\n\nThis combination\
    \ of pip and venv is so common that people started combining them to save steps\
    \ and avoid that source shell wizardry. One such package is Pipenv, but a newer\
    \ rival called Poetry is becoming more popular.\n\nHaving used pip, Pipenv, and\
    \ Poetry, I now prefer Poetry. Get it with `pip install poetry`. Poetry has many\
    \ subcommands, such as `poetry add` to add a package to your virtual environment,\
    \ `poetry install` to actually download and install it, and so on. Check the Poetry\
    \ site or run the `poetry` command for help.\n\nBesides downloading single packages,\
    \ pip and Poetry manage multiple packages in configuration files: *requirements.txt*\
    \ for pip, and *pyproject.toml* for Poetry. Poetry and pip don't just download\
    \ packages, but also manage the tricky dependencies that packages may have on\
    \ other packages. You can specify desired package versions as minima, maxima,\
    \ ranges, or exact values (also known as *pinning*). This can be important as\
    \ your project grows and the packages that it depends on change. You may need\
    \ a minimum version of a package if a feature that you use first appeared there,\
    \ or a maximum if a feature was dropped."
