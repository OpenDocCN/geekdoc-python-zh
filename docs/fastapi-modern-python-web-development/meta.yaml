  md: "# CORS\n\nCross-origin resource sharing (CORS) involves communication between\
    \ other trusted servers and your website. If your site has all the frontend and\
    \ backend code in one place, then there's no problem. But these days, it's common\
    \ to have a JavaScript frontend talking to a backend written in something like\
    \ FastAPI. These servers will not have the same *origin*:\n\n*Protocol*\n    http\
    \ or https\n\n*Domain*\n    Internet domain, like google.com or localhost\n\n\
    *Port*\n    Numeric TCP/IP port on that domain, like 80, 443, or 8000\n\nHow does\
    \ the backend know a trustable frontend from a box of moldy radishes, or a mustache-twirling\
    \ attacker? That's a job for CORS, which specifies what the backend trusts, the\
    \ most prominent being the following:\n\n+   - Origins\n- HTTP methods\n- HTTP\
    \ headers\n- CORS cache timeout\n\nYou hook into CORS at the Web level. Example\
    \ 11-13 shows how to allow only one frontend server (with the domain *https://ui.cryptids.com*),\
    \ and any HTTP headers or methods.\n\n*Example 11-13. Activate the CORS middleware*\n\
    \n```\nfrom fastapi import FastAPI, Request\nfrom fastapi.middleware.cors import\
    \ CORSMiddleware\n\napp = FastAPI()\n\napp.add_middleware(\n    CORSMiddleware,\n\
    \    allow_origins=[\"https://ui.cryptids.com\"],\n    allow_credentials=True,\n\
    \    allow_methods=[\"*\"],\n    allow_headers=[\"*\"],\n    )\n\n@app.get(\"\
    /test_cors\")\n```"
  merge: -1
