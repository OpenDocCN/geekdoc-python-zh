    But, as they say on TV, there''s more! Recently, Grasshopper extended Locust to
    do things like measuring time across multiple HTTP calls. To try this extension
    out, install with `pip install locust-grasshopper`.


    # Review


    This chapter fleshed out the types of testing, with examples of pytest performing
    automated code testing at the unit, integration, and full levels. API tests can
    be automated with Schemathesis. This chapter also discussed how to expose security
    and performance problems before they strike.'
