    \n## 定义数据模型\n\n首先，定义我们将在各层之间传递的数据。我们的*领域*包含探险家和生物，因此让我们为它们定义最小的初始Pydantic模型。其他想法可能会在以后出现，比如探险、日志或咖啡杯的电子商务销售。但现在，只包括示例8-10中的两个有呼吸的（通常是生物）模型。\n\
