  - '[PAGE 222]


    This is a fairly small model, and as you can see, it doesn''t answer questions
    especially well. I tried other prompts (line arguments) and got equally noteworthy
    answers:


    +   - Q: Are cats better than dogs?

    - A: No

    - Q: What does bigfoot eat for breakfast?

    - A: A squid

    - Q: Who comes down the chimney?

    - A: A squealing pig

    - Q: What group was John Cleese in?

    - A: The Beatles

    - Q: What has nasty pointy teeth?

    - A: A teddy bear


    These questions may get different answers at different times! Once the same endpoint
    said that Bigfoot eats sand for breakfast. In AI-speak, answers like this are
    called *hal-lucinations*. You can get better answers by using a larger model,
    like google/flan-75-xl, but it will take longer to download model data and respond
    on a personal computer. And of course, models like ChatGPT were trained on all
    the data they could find (using every CPU, GPU, TPU, and any other kind of PU),
    and will give excellent answers.


    # Review


    This chapter expanded on the use of SQLite we went over in Chapter 10 to other
    SQL databases, and even NoSQL ones. It also showed how some SQL databases can
    do NoSQL tricks with JSON support. Finally, it talked about the uses of database
    and special data tools that have become more important as machine learning continues
    its explosive growth.'
- md: "## CHAPTER 15\nFiles\n\n## Preview\n\nBesides fielding API requests and traditional\
    \ content like HTML, web servers are expected to handle file transfers in both\
    \ directions. Very large files may need to be transferred in *chunks* that don't\
    \ use too much of the system's memory. You can also provide access to a directory\
    \ of files (and subdirectories, to any depth) with Static Files.\n\n## Multipart\
    \ Support\n\nTo handle large files, FastAPI's uploading and downloading features\
    \ need these extra modules:\n\n```\nPython-Multipart\n    pip install python-multipart\n\
    \naio-files\n    pip install aiofiles\n```\n\n## Uploading Files\n\nFastAPI targets\
    \ API development, and most of the examples in this book have used JSON requests\
    \ and responses. But in the next chapter you'll see forms, which are handled differently.\
    \ This chapter covers files, which are treated like forms in some ways.\n\nFastAPI\
    \ offers two techniques for file uploads: `File()` and `UploadFile`.\n\n## File()\n\
    \nFile() is used as the type for a direct file upload. Your path function may\
    \ be synchronous (def) or asynchronous (async def), but the asynchronous version\
    \ is better because it won't tie up your web server while the file is uploading.\n\
    \nFastAPI will pull up the file in chunks and reassemble it in memory, so File()\
    \ should be used for only relatively small files. Instead of assuming that the\
    \ input is JSON, FastAPI encodes a file as a form element.\n\nLet's write the\
    \ code to request a file and test it. You can grab any file on your machine to\
    \ test with, or download one from a site like Fastest Fish. I grabbed a 1 KB file\
    \ from there and saved it locally as 1KB.bin.\n\nExample 15-1. Handle a small\
    \ file upload with FastAPI\n\n```\nfrom fastapi import File\n\n@app.post(\"/small\"\
    )\nasync def upload_small_file(small_file: bytes = File()) -> str:\n    return\
    \ f\"file size: {len(small_file)}\"\n```\n\nAfter Uvicorn restarts, try an HTTPie\
    \ test in Example 15-2.\n\nExample 15-2. Upload a small file with HTTPie\n\n```\n\
    $ http -f -b POST http://localhost:8000/small small_file@1KB.bin\n\"file size:\
    \ 1000\"\n```\n\nHere are a few notes on this test:\n\n- You need to include -f\
    \ (or --form), because files are uploaded like forms, not as JSON text.\n- small_file@1KB.bin:\n\
    \  - small_file\n    Matches the variable name small_file in the FastAPI path\
    \ function in Example 15-1\n  - @\n    HTTPie's shorthand to make a form\n  -\
    \ 1KB.bin\n    The file that is being uploaded\n\nExample 15-3 is an equivalent\
    \ programmatic test.\n\nExample 15-3. Upload a small file with Requests\n\n```\n\
    $ python\n>>> import requests\n>>> url = \"http://localhost:8000/small\"\n>>>\
    \ files = {'small_file': open('1KB.bin', 'rb')}\n>>> resp = requests.post(url,\
    \ files=files)\n>>> print(resp.json())\nfile size: 1000\n```\n\n## UploadFile\n\
    \nFor large files, it's better to use UploadFile. This creates a Python SpooledTemporary\
    \ File object, mostly on the server's disk instead of in memory. This is a Python\
    \ file-like object, which supports the methods read(), write(), and seek(). Example\
    \ 15-4 shows this, and also uses async def instead of def to avoid blocking the\
    \ web server while file pieces are uploading.\n\nExample 15-4. Upload a big file\
    \ with FastAPI (add to main.py)\n\n```\nfrom fastapi import UploadFile\n\n@app.post(\"\
    /big\")\nasync def upload_big_file(big_file: UploadFile) -> str:\n    return f\"\
    file size: {big_file.size}, name: {big_file.filename}\"\n```\n\nFile() created\
    \ a bytes object and needed the parentheses. Upload File is a different class\
    \ of object.\n\nIf Uvicorn's starter motor isn't worn out yet, it's test time.\
    \ This time, Examples 15-5 through 15-6 use a 1 GB file (1GB.bin) that I grabbed\
    \ from Fastest Fish.\n\nExample 15-5. Test a big file upload with HTTPie\n\n```\n\
    $ http -f -b POST http://localhost:8000/big big_file@1GB.bin\n\"file size: 1000000000,\
    \ name: 1GB.bin\"\n```\n\nExample 15-6. Test a big file upload with Requests\n\
    \n```\n>>> import requests\n>>> url = \"http://localhost:8000/big\"\n>>> files\
    \ = {'big_file': open('1GB.bin', 'rb')}\n>>> resp = requests.post(url, files=files)\n\
    >>> print(resp.json())\nfile size: 1000000000, name: 1GB.bin\n```\n\n## Downloading\
    \ Files\n\nSadly, gravity doesn't make files download faster. Instead, we'll use\
    \ equivalents of the upload methods.\n\n## FileResponse\n\nFirst, in Example 15-7,\
    \ is the all-at-once version, FileResponse.\n\nExample 15-7. Download a small\
    \ file with FileResponse (add to main.py)\n\n```\nfrom fastapi.responses import\
    \ FileResponse\n\n@app.get(\"/small/{name}\")\nasync def download_small_file(name):\n\
    \    return FileResponse(name)\n```\n\nThere's a test around here somewhere. First,\
    \ put the file 1KB.bin in the same directory as main.py. Now, run Example 15-8.\n\
    \nExample 15-8. Download a small file with HTTPie\n\n```\n$ http -b http://localhost:8000/small/1KB.bin\n\
    \n---------------------------------------\n| NOTE: binary data not shown in terminal\
    \ |\n---------------------------------------\n```\n\nIf you don't trust that suppression\
    \ message, Example 15-9 pipes the output to a utility like wc to ensure that you\
    \ got 1,000 bytes back.\n\nExample 15-9. Download a small file with HTTPie, with\
    \ byte count\n\n```\n$ http -b http://localhost:8000/small/1KB.bin | wc -c\n1000\n\
    ```\n\n## StreamingResponse\n\nSimilar to FileUpload, it's better to download\
    \ large files with StreamingResponse, which returns the file in chunks. Example\
    \ 15-10 shows this, with an async def path function to avoid blocking when the\
    \ CPU isn't being used. I'm skipping error checking for now; if the file path\
    \ doesn't exist, the open() call will raise an exception.\n\nExample 15-10. Return\
    \ a big file with StreamingResponse (add to main.py)\n\n```\nfrom pathlib import\
    \ path\nfrom typing import Generator\nfrom fastapi.responses import StreamingResponse\n\
    \ndef gen_file(path: str) -> Generator:\n    with open(file=path, mode=\"rb\"\
    ) as file:\n        yield file.read()\n\n@app.get(\"/download_big/{name}\")\n\
    async def download_big_file(name:str):\n    gen_expr = gen_file(file_path=path)\n\
    \    response = StreamingResponse(\n        content=gen_expr,\n        status_code=200,\n\
    \    )\n    return response\n```\n\ngen_expr is the generator expression returned\
    \ by the generator function gen_file(). StreamingResponse uses it for its iterable\
    \ content argument, so it can download the file in chunks.\n\nExample 15-11 is\
    \ the accompanying test. (This first needs the file 1GB.bin alongside main.py,\
    \ and will take a little longer.)\n\nExample 15-11. Download a big file with HTTPie\n\
    \n```\n$ http -b http://localhost:8000/big/1GB.bin | wc -c\n1000000000\n```\n\n\
    ## Serving Static Files\n\nTraditional web servers can treat server files as though\
    \ they were on a normal filesystem. FastAPI lets you do this with StaticFiles.\n\
    \nFor this example, let's make a directory of (boring) free files for users to\
    \ download:\n\n- Make a directory called *static*, at the same level as *main.py*.\
    \ (This can have any name; I'm calling it *static* only to help remember why I\
    \ made it.)\n- Put a text file called *abc.txt* in it, with the text contents\
    \ abc :).\n\nExample 15-12 will serve any URL that starts with */static* (you\
    \ could also have used any text string here) with files from the *static* directory.\n\
    \nExample 15-12. Serve everything in a directory with *StaticFiles* (add to *main.py*)\n\
    \n```\nfrom pathlib import Path\nfrom fastapi import FastAPI\nfrom fastapi.staticfiles\
    \ import StaticFiles\n\n# Directory containing main.py:\ntop = Path(__file__).resolve.parent\n\
    \napp.mount(\"/static\",\n    StaticFiles(directory=f\"{top}/static\", html=True),\n\
    \    name=\"free\")\n```\n\nThat *top* calculation ensures that you put *static*\
    \ alongside *main.py*. The `__file__` variable is the full pathname of this file\
    \ (*main.py*).\n\nExample 15-13 is one way to manually test Example 15-12.\n\n\
    Example 15-13. Get a static file\n\n```\n$ http -b localhost:8000/static/abc.txt\n\
    abc :)\n```\n\nWhat about that `html=True` argument that you passed to `StaticFiles()`?\
    \ That makes it work a little more like a traditional server, returning an *index.html*\
    \ file if one exists in that directory, but you didn't ask for *index.html* explicitly\
    \ in the URL. So, let's create an *index.html* file in the *static* directory\
    \ with the contents Oh. Hi!, and then test with Example 15-14.\n\nExample 15-14.\
    \ Get an *index.html* file from */static*\n\n```\n$ http -b localhost:8000/static/\n\
    Oh. Hi!\n```"
  mdcn: "## 第15章\n文件\n\n## 预览\n\n除了处理API请求和HTML等传统内容外，Web服务器还需要处理双向文件传输。非常大的文件可能需要以*分块*方式传输，以避免占用过多系统内存。你还可以通过静态文件功能提供对文件目录（以及任意深度的子目录）的访问。\n\
    \n## 多部分支持\n\n要处理大文件，FastAPI的上传和下载功能需要这些额外模块：\n\n```\nPython-Multipart\n    pip\
    \ install python-multipart\n\naio-files\n    pip install aiofiles\n```\n\n## 上传文件\n\
    \nFastAPI专注于API开发，本书中的大多数示例都使用了JSON请求和响应。但在下一章中，你将看到表单，其处理方式有所不同。本章介绍文件，它在某些方面与表单的处理方式类似。\n\
    \nFastAPI提供了两种文件上传技术：`File()`和`UploadFile`。\n\n## File()\n\nFile()用作直接文件上传的类型。你的路径函数可以是同步的（def）或异步的（async\
    \ def），但异步版本更好，因为它不会在文件上传期间阻塞你的Web服务器。\n\nFastAPI会分块读取文件并在内存中重新组装，因此File()应仅用于相对较小的文件。FastAPI不会假设输入是JSON，而是将文件编码为表单元素。\n\
    \n让我们编写代码来请求文件并进行测试。你可以使用机器上的任何文件进行测试，或者从Fastest Fish等网站下载一个。我从那里下载了一个1 KB的文件，并将其本地保存为1KB.bin。\n\
    \n示例15-1. 使用FastAPI处理小文件上传\n\n```\nfrom fastapi import File\n\n@app.post(\"/small\"\
    )\nasync def upload_small_file(small_file: bytes = File()) -> str:\n    return\
    \ f\"file size: {len(small_file)}\"\n```\n\nUvicorn重启后，尝试示例15-2中的HTTPie测试。\n\n\
    示例15-2. 使用HTTPie上传小文件\n\n```\n$ http -f -b POST http://localhost:8000/small small_file@1KB.bin\n\
    \"file size: 1000\"\n```\n\n关于此测试的几点说明：\n\n- 你需要包含-f（或--form），因为文件是像表单一样上传的，而不是作为JSON文本。\n\
    - small_file@1KB.bin：\n  - small_file\n    与示例15-1中FastAPI路径函数中的变量名small_file匹配\n\
    \  - @\n    HTTPie用于创建表单的简写\n  - 1KB.bin\n    正在上传的文件\n\n示例15-3是一个等效的编程测试。\n\n\
    示例15-3. 使用Requests上传小文件\n\n```\n$ python\n>>> import requests\n>>> url = \"http://localhost:8000/small\"\
    \n>>> files = {'small_file': open('1KB.bin', 'rb')}\n>>> resp = requests.post(url,\
    \ files=files)\n>>> print(resp.json())\nfile size: 1000\n```\n\n## UploadFile\n\
    \n对于大文件，最好使用UploadFile。这会创建一个Python SpooledTemporary File对象，主要存储在服务器磁盘上而不是内存中。这是一个Python类文件对象，支持read()、write()和seek()方法。示例15-4展示了这一点，并且使用了async\
    \ def而不是def，以避免在文件分块上传时阻塞Web服务器。\n\n示例15-4. 使用FastAPI上传大文件（添加到main.py）\n\n```\n\
    from fastapi import UploadFile\n\n@app.post(\"/big\")\nasync def upload_big_file(big_file:\
    \ UploadFile) -> str:\n    return f\"file size: {big_file.size}, name: {big_file.filename}\"\
    \n```\n\nFile()创建了一个bytes对象并需要括号。UploadFile是一个不同的对象类。\n\n如果Uvicorn的启动马达还没有磨损，那么测试时间到了。这次，示例15-5到15-6使用了我从Fastest\
    \ Fish下载的1 GB文件（1GB.bin）。\n\n示例15-5. 使用HTTPie测试大文件上传\n\n```\n$ http -f -b POST\
    \ http://localhost:8000/big big_file@1GB.bin\n\"file size: 1000000000, name: 1GB.bin\"\
    \n```\n\n示例15-6. 使用Requests测试大文件上传\n\n```\n>>> import requests\n>>> url = \"http://localhost:8000/big\"\
    \n>>> files = {'big_file': open('1GB.bin', 'rb')}\n>>> resp = requests.post(url,\
    \ files=files)\n>>> print(resp.json())\nfile size: 1000000000, name: 1GB.bin\n\
    ```\n\n## 下载文件\n\n遗憾的是，重力并不能让文件下载得更快。相反，我们将使用与上传方法等效的方式。\n\n## FileResponse\n\n\
    首先，在示例15-7中，是一次性下载的版本，FileResponse。\n\n示例15-7. 使用FileResponse下载小文件（添加到main.py）\n\
    \n```\nfrom fastapi.responses import FileResponse\n\n@app.get(\"/small/{name}\"\
    )\nasync def download_small_file(name):\n    return FileResponse(name)\n```\n\n\
    这里某处有一个测试。首先，将文件1KB.bin放在与main.py相同的目录中。现在，运行示例15-8。\n\n示例15-8. 使用HTTPie下载小文件\n\
    \n```\n$ http -b http://localhost:8000/small/1KB.bin\n\n---------------------------------------\n\
    | NOTE: binary data not shown in terminal |\n---------------------------------------\n\
    ```\n\n如果你不相信那个抑制消息，示例15-9将输出通过管道传输到wc等实用程序，以确保你收到了1,000字节。\n\n示例15-9. 使用HTTPie下载小文件，带字节计数\n\
    \n```\n$ http -b http://localhost:8000/small/1KB.bin | wc -c\n1000\n```\n\n##\
    \ StreamingResponse\n\n类似于FileUpload，最好使用StreamingResponse下载大文件，它会分块返回文件。示例15-10展示了这一点，使用async\
    \ def路径函数以避免在CPU未使用时阻塞。我现在跳过了错误检查；如果文件路径不存在，open()调用将引发异常。\n\n示例15-10. 使用StreamingResponse返回大文件（添加到main.py）\n\
    \n```\nfrom pathlib import path\nfrom typing import Generator\nfrom fastapi.responses\
    \ import StreamingResponse\n\ndef gen_file(path: str) -> Generator:\n    with\
    \ open(file=path, mode=\"rb\") as file:\n        yield file.read()\n\n@app.get(\"\
    /download_big/{name}\")\nasync def download_big_file(name:str):\n    gen_expr\
    \ = gen_file(file_path=path)\n    response = StreamingResponse(\n        content=gen_expr,\n\
    \        status_code=200,\n    )\n    return response\n```\n\ngen_expr是生成器函数gen_file()返回的生成器表达式。StreamingResponse将其用作可迭代内容参数，因此它可以分块下载文件。\n\
    \n示例15-11是配套的测试。（这首先需要将文件1GB.bin放在main.py旁边，并且会花费稍长的时间。）\n\n示例15-11. 使用HTTPie下载大文件\n\
    \n```\n$ http -b http://localhost:8000/big/1GB.bin | wc -c\n1000000000\n```\n\n\
    ## 提供静态文件\n\n传统的Web服务器可以将服务器文件视为位于普通文件系统上。FastAPI允许你使用StaticFiles来实现这一点。\n\n对于这个示例，让我们创建一个（无聊的）免费文件目录供用户下载：\n\
    \n- 创建一个名为*static*的目录，与*main.py*处于同一级别。（这可以有任何名称；我称它为*static*只是为了帮助记住我为什么创建它。）\n\
    - 在其中放入一个名为*abc.txt*的文本文件，文本内容为abc :)。\n\n示例15-12将为任何以*/static*开头的URL（你也可以在这里使用任何文本字符串）提供来自*static*目录的文件。\n\
    \n示例15-12. 使用*StaticFiles*提供目录中的所有内容（添加到*main.py*）\n\n```\nfrom pathlib import\
    \ Path\nfrom fastapi import FastAPI\nfrom fastapi.staticfiles import StaticFiles\n\
    \n# Directory containing main.py:\ntop = Path(__file__).resolve.parent\n\napp.mount(\"\
    /static\",\n    StaticFiles(directory=f\"{top}/static\", html=True),\n    name=\"\
    free\")\n```\n\n那个*top*计算确保你将*static*放在*main.py*旁边。`__file__`变量是此文件（*main.py*）的完整路径名。\n\
    \n示例15-13是手动测试示例15-12的一种方法。\n\n示例15-13. 获取静态文件\n\n```\n$ http -b localhost:8000/static/abc.txt\n\
    abc :)\n```\n\n你传递给`StaticFiles()`的那个`html=True`参数是做什么的？它使其工作方式更像传统服务器，如果该目录中存在*index.html*文件，则返回该文件，但你没有在URL中明确请求*index.html*。因此，让我们在*static*目录中创建一个*index.html*文件，内容为Oh.\
    \ Hi!，然后使用示例15-14进行测试。\n\n示例15-14. 从*/static*获取*index.html*文件\n\n```\n$ http -b\
    \ localhost:8000/static/\nOh. Hi!\n```"
