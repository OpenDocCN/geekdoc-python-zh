  mdcn: "FastAPI 从 HTTP 请求的各个部分提供数据的方式是其最佳特性之一，也是对大多数 Python Web 框架处理方式的改进。所有你需要的参数都可以直接在路径函数中声明和提供，使用前面列表中的定义（`Path`、`Query`\
    \ 等），以及你自己编写的函数。这使用了一种称为*依赖注入*的技术，我们将在后续讨论并在第 6 章中详细展开。\n\n让我们通过添加一个名为 `who` 的参数，使我们之前的应用程序更具个性化，将那声恳切的\
    \ \"Hello?\" 问候指向某个人。我们将尝试不同的方式来传递这个新参数：\n\n- 在 URL *路径*中\n- 作为 *查询* 参数，在 URL\
    \ 的 `?` 之后\n- 在 HTTP *请求体*中\n- 作为 HTTP *请求头*\n\n## URL 路径\n\n编辑示例 3-11 中的 *hello.py*。\n\
    \n*示例 3-11. 返回问候路径*\n\n```python\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\
    \n@app.get(\"/hi/{who}\")\ndef greet(who):\n    return f\"Hello? {who}?\"\n```\n\
    \n一旦你在编辑器中保存了这个更改，Uvicorn 应该会重启。（否则，我们将创建 *hello2.py* 等文件，并每次重新运行 Uvicorn。）如果你有拼写错误，请持续尝试直到修复，Uvicorn\
    \ 不会为难你。\n\n在 URL 中添加 `{who}`（在 `@app.get` 之后）告诉 FastAPI 在该位置期望一个名为 `who` 的变量。然后\
    \ FastAPI 将其分配给后续 `greet()` 函数中的 `who` 参数。这展示了路径装饰器和路径函数之间的协调。\n\n此处不要对修改后的 URL\
    \ 字符串（`\"/hi/{who}\"`）使用 Python f-string。花括号由 FastAPI 本身用于将 URL 片段匹配为路径参数。\n\n\
    在示例 3-12 到 3-14 中，使用前面讨论的各种方法测试这个修改后的端点。\n\n*示例 3-12. 在浏览器中测试 /hi/Mom*\n\n```\n\
    localhost:8000/hi/Mom\n```\n\n*示例 3-13. 使用 HTTPie 测试 /hi/Mom*\n\n```\n$ http localhost:8000/hi/Mom\n\
    HTTP/1.1 200 OK\ncontent-length: 13\ncontent-type: application/json\ndate: Thu,\
    \ 30 Jun 2022 08:09:02 GMT\nserver: uvicorn\n\n\"Hello? Mom?\"\n```\n\n*示例 3-14.\
    \ 使用 Requests 测试 /hi/Mom*\n\n```python\n>>> import requests\n>>> r = requests.get(\"\
    http://localhost:8000/hi/Mom\")\n>>> r.json()\n'Hello? Mom?'\n```\n\n在每种情况下，字符串\
    \ \"Mom\" 都作为 URL 的一部分传递，作为 `who` 变量传递给 `greet()` 路径函数，并作为响应的一部分返回。\n\n每种情况下的响应都是\
    \ JSON 字符串（根据你使用的测试客户端，可能是单引号或双引号）\"Hello? Mom?\"。\n\n## 查询参数\n\n查询参数是 URL 中 `?`\
    \ 之后的 `name=value` 字符串，由 `&` 字符分隔。再次编辑示例 3-15 中的 *hello.py*。\n\n*示例 3-15. 返回问候查询参数*\n\
    \n```python\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n@app.get(\"/hi\"\
    )\ndef greet(who):\n    return f\"Hello? {who}?\"\n```\n\n端点函数再次定义为 `greet(who)`，但这次\
    \ `{who}` 不在前面装饰器行的 URL 中，因此 FastAPI 现在假设 `who` 是一个查询参数。使用示例 3-16 和 3-17 进行测试。\n\
    \n*示例 3-16. 使用浏览器测试示例 3-15*\n\n```\nlocalhost:8000/hi?who=Mom\n```\n\n*示例 3-17.\
    \ 使用 HTTPie 测试示例 3-15*\n\n```\n$ http -b localhost:8000/hi?who=Mom\n\"Hello? Mom?\"\
    \n```\n\n在示例 3-18 中，你可以使用查询参数参数调用 HTTPie（注意 `==`）。\n\n*示例 3-18. 使用 HTTPie 和 params\
    \ 测试示例 3-15*\n\n```\n$ http -b localhost:8000/hi who==Mom\n\"Hello? Mom?\"\n```\n\
    \n你可以为 HTTPie 提供多个这样的参数，并且将它们作为空格分隔的参数输入更容易。\n\n示例 3-19 和 3-20 展示了 Requests 的相同替代方案。\n\
    \n*示例 3-19. 使用 Requests 测试示例 3-15*\n\n```python\n>>> import requests\n>>> r =\
    \ requests.get(\"http://localhost:8000/hi?who=Mom\")\n>>> r.json()\n'Hello? Mom?'\n\
    ```\n\n*示例 3-20. 使用 Requests 和 params 测试示例 3-15*\n\n```python\n>>> import requests\n\
    >>> params = {\"who\": \"Mom\"}\n>>> r = requests.get(\"http://localhost:8000/hi\"\
    , params=params)\n>>> r.json()\n'Hello? Mom?'\n```\n\n在每种情况下，你都以一种新的方式提供 \"Mom\"\
    \ 字符串，并将其传递给路径函数，最终传递到响应中。\n\n## 请求体\n\n我们可以为 GET 端点提供路径或查询参数，但不能提供来自请求体的值。在 HTTP\
    \ 中，GET 应该是*幂等的*——一个计算机术语，意思是*问同样的问题，得到同样的答案*。HTTP GET 应该只返回东西。请求体用于在创建（POST）或更新（PUT\
    \ 或 PATCH）时向服务器发送东西。第 9 章展示了一种绕过此限制的方法。\n\n因此，在示例 3-21 中，让我们将端点从 GET 更改为 POST。（从技术上讲，我们没有创建任何东西，所以\
    \ POST 不太合适，但如果 RESTful 大佬们起诉我们，那么，嘿，看看那个酷炫的法院吧。）\n\n*示例 3-21. 返回问候请求体*\n\n```python\n\
    from fastapi import FastAPI, Body\n\napp = FastAPI()\n\n@app.post(\"/hi\")\ndef\
    \ greet(who:str = Body(embed=True)):\n    return f\"Hello? {who}?\"\n```\n\n需要\
    \ `Body(embed=True)` 来告诉 FastAPI，这一次，我们从 JSON 格式的请求体中获取 `who` 的值。`embed` 部分意味着它应该看起来像\
    \ `{\"who\": \"Mom\"}` 而不是仅仅 `\"Mom\"`。\n\n尝试在示例 3-22 中使用 HTTPie 进行测试，使用 `-v`\
    \ 显示生成的请求体（并注意单个 `=` 参数表示 JSON 请求体数据）。\n\n*示例 3-22. 使用 HTTPie 测试示例 3-21*\n\n```\n\
    $ http -v localhost:8000/hi who=Mom\nPOST /hi HTTP/1.1\nAccept: application/json,\
    \ */*;q=0.5\nAccept-Encoding: gzip, deflate\nConnection: keep-alive\nContent-Length:\
    \ 14\nContent-Type: application/json\nHost: localhost:8000\nUser-Agent: HTTPie/3.2.1\n\
    \n{\n    \"who\": \"Mom\"\n}\n\nHTTP/1.1 200 OK\ncontent-length: 13\ncontent-type:\
    \ application/json\ndate: Thu, 30 Jun 2022 08:37:00 GMT\nserver: uvicorn\n\n\"\
    Hello? Mom?\"\n```\n\n最后，在示例 3-23 中使用 Requests 进行测试，它使用其 `json` 参数在请求体中传递 JSON\
    \ 编码的数据。\n\n*示例 3-23. 使用 Requests 测试示例 3-21*\n\n```python\n>>> import requests\n\
    >>> r = requests.post(\"http://localhost:8000/hi\", json={\"who\": \"Mom\"})\n\
    >>> r.json()\n'Hello? Mom?'\n```\n\n## HTTP 请求头\n\n最后，让我们在示例 3-24 中尝试将问候参数作为 HTTP\
    \ 请求头传递。\n\n*示例 3-24. 返回问候请求头*\n\n```python\nfrom fastapi import FastAPI, Header\n\
    \napp = FastAPI()\n\n@app.post(\"/hi\")\ndef greet(who:str = Header()):\n    return\
    \ f\"Hello? {who}?\"\n```\n\n让我们在示例 3-25 中仅使用 HTTPie 测试这个。它使用 `name:value` 来指定\
    \ HTTP 请求头。\n\n*示例 3-25. 使用 HTTPie 测试示例 3-24*\n\n```\n$ http -v localhost:8000/hi\
    \ who:Mom\nGET /hi HTTP/1.1\nAccept: */*\nAccept-Encoding: gzip, deflate\nConnection:\
    \ keep-alive\nHost: localhost:8000\nUser-Agent: HTTPie/3.2.1\nwho: Mom\n\nHTTP/1.1\
    \ 200 OK\ncontent-length: 13\ncontent-type: application/json\ndate: Mon, 16 Jan\
    \ 2023 05:14:46 GMT\nserver: uvicorn\n\n\"Hello? Mom?\"\n```\n\nFastAPI 将 HTTP\
    \ 请求头键转换为小写，并将连字符（`-`）转换为下划线（`_`）。因此，你可以在示例 3-26 和 3-27 中这样打印 HTTP `User-Agent`\
    \ 请求头的值。\n\n*示例 3-26. 返回 User-Agent 请求头 (hello.py)*\n\n```python\nfrom fastapi\
    \ import FastAPI, Header\n\napp = FastAPI()\n\n@app.post(\"/agent\")\ndef get_agent(user_agent:str\
    \ = Header()):\n    return user_agent\n```\n\n*示例 3-27. 使用 HTTPie 测试 User-Agent\
    \ 请求头*\n\n```\n$ http -v localhost:8000/agent\nGET /agent HTTP/1.1\nAccept: */*\n\
    Accept-Encoding: gzip, deflate\nConnection: keep-alive\nHost: localhost:8000\n\
    User-Agent: HTTPie/3.2.1\n\nHTTP/1.1 200 OK\ncontent-length: 14\ncontent-type:\
    \ application/json\ndate: Mon, 16 Jan 2023 05:21:35 GMT\nserver: uvicorn\n\n\"\
    HTTPie/3.2.1\"\n```\n\n## 多种请求数据\n\n你可以在同一个路径函数中使用多种方法。也就是说，你可以从 URL、查询参数、HTTP\
    \ 请求体、HTTP 请求头、Cookie 等获取数据。并且你可以编写自己的依赖函数来处理和"
