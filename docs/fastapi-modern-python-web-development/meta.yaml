    # CHAPTER 1

    The Modern Web


    > The Web as I envisaged it, we have not seen it yet. The future is still so much
    bigger than the past.

    —Tim Berners-Lee


    # Preview


    Once upon a time, the web was small and simple. Developers had such fun throwing
    PHP, HTML, and MySQL calls into single files and proudly telling everyone to check
    out their website. But the web grew over time to zillions, nay, squillions of
    pages—and the early playground became a metaverse of theme parks.


    In this chapter, I''ll point out some areas that have become ever more relevant
    to the modern web:


    +   - Services and APIs

    - Concurrency

    - Layers

    - Data


    The next chapter will show what Python offers in these areas. After that, we''ll
    dive into the FastAPI web framework and see what it has to offer.'
  - "[PAGE 21]\n\n# Services and APIs\n\nThe web is a great connecting fabric. Although\
    \ much activity still occurs on the *content* side—HTML, JavaScript, images, and\
    \ so on—there’s an increasing emphasis on the application programming interfaces\
    \ (APIs) that connect things.\n\nCommonly, a web *service* handles low-level database\
    \ access and middle-level business logic (often lumped together as a *backend*),\
    \ while JavaScript or mobile apps provide a rich top-level *frontend* (interactive\
    \ user interface). These fore and aft worlds have become more complex and divergent,\
    \ usually requiring developers to specialize in one or the other. It’s harder\
    \ to be a *full stack* developer than it used to be.¹\n\nThese two worlds talk\
    \ to each other using APIs. In the modern web, API design is as important as the\
    \ design of websites themselves. An API is a contract, similar to a database schema.\
    \ Defining and modifying APIs is now a major job.\n\n# Kinds of APIs\n\nEach API\
    \ defines the following:\n\n*Protocol*\n    The control structure\n\n*Format*\n\
    \    The content structure\n\nMultiple API methods have developed as technology\
    \ has evolved from isolated machines, to multitasking systems, to networked servers.\
    \ You’ll probably run across one or more of these at some point, so the following\
    \ is a brief summary before getting to *HTTP* and its friends, which are featured\
    \ in this book:\n\n+   - Before networking, an API usually meant a very close\
    \ connection, like a function call to a *library* in the same language as your\
    \ application—say, calculating a square root in a math library.\n- *Remote procedure\
    \ calls (RPCs)* were invented to call functions in other processes, on the same\
    \ machine or others, as though they were in the calling application. A popular\
    \ current example is gRPC.\n- *Messaging* sends small chunks of data in pipelines\
    \ among processes. Messages may be verb-like commands or may just indicate noun-like\
    \ *events* of interest. Current popular messaging solutions, which vary broadly\
    \ from toolkits to full servers, include Apache Kafka, RabbitMQ, NATS, and ZeroMQ.\
    \ Communication can follow different patterns:\n\n1 I gave up trying a few years\
    \ ago."
  - "[PAGE 22]\n\n*Request-response*\n    One: one, like a web browser calling a web\
    \ server.\n\n*Publish-subscribe, or pub-sub*\n    A *publisher* emits messages,\
    \ and *subscribers* act on each according to some data in the message, like a\
    \ subject.\n\n*Queues*\n    Like pub-sub, but only one of a pool of subscribers\
    \ grabs the message and acts on it.\n\nAny of these may be used alongside a web\
    \ service—for example, performing a slow backend task like sending an email or\
    \ creating a thumbnail image.\n\n# HTTP\n\nBerners-Lee proposed three components\
    \ for his World Wide Web:\n\n*HTML*\n    A language for displaying data\n\n*HTTP*\n\
    \    A client-server protocol\n\n*URLs*\n    An addressing scheme for web resources\n\
    \nAlthough these seem obvious in retrospect, they turned out to be a ridiculously\
    \ useful combination. As the web evolved, people experimented, and some ideas,\
    \ like the IMG tag, survived the Darwinian struggle. And as needs became clearer,\
    \ people got serious about defining standards.\n\n# REST(ful)\n\nOne chapter in\
    \ Roy Fielding's Ph.D. *thesis* defined *Representational State Transfer (REST)*—an\
    \ *architectural style* for HTTP use.² Although often referenced, it's been largely\
    \ misunderstood.\n\n2 *Style* means a higher-level pattern, like *client-server*,\
    \ rather than a specific design."
  - "[PAGE 23]\n\nA roughly shared adaptation has evolved and dominates the modern\
    \ web. It's called *RESTful*, with these characteristics:\n\n+   - Uses HTTP and\
    \ client-server protocol\n- Stateless (each connection is independent)\n- Cacheable\n\
    - Resource-based\n\nA *resource* is data that you can distinguish and perform\
    \ operations on. A web service provides an *endpoint*—a distinct URL and HTTP\
    \ *verb* (action)—for each feature that it wants to expose. An endpoint is also\
    \ called a *route*, because it routes the URL to a function.\n\nDatabase users\
    \ are familiar with the *CRUD* acronym of procedures: create, read, update, delete.\
    \ The HTTP verbs are pretty CRUDdy:\n\nPOST\n    Create (write)\n\nPUT\n    Modify\
    \ completely (replace)\n\nPATCH\n    Modify partially (update)\n\nGET\n    Um,\
    \ get (read, retrieve)\n\nDELETE\n    Uh, delete\n\nA client sends a *request*\
    \ to a RESTful endpoint with data in one of the following areas of an HTTP message:\n\
    \n+   - Headers\n- The URL string\n- Query parameters\n- Body values\n\nIn turn,\
    \ an HTTP *response* returns these:\n\n+   - An integer *status code* indicating\
    \ the following:\n    100s\n        Info, keep going"
- md: "## HTTP状态码\n\n200s\nSuccess\n\n300s\nRedirection\n\n400s\nClient error\n\n\
    500s\nServer error\n\n+   - Various headers\n- A body, which may be empty, single,\
    \ or *chunked* (in successive pieces)\n\nAt least one status code is an Easter\
    \ egg: 418 (I'm a teapot) is supposed to be returned by a web-connected teapot,\
    \ if asked to brew coffee.\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_24_0.png)\n\
    \nYou'll find many websites and books on RESTful API design, all with useful rules\
    \ of thumb. This book will dole some out on the way.\n\n## JSON and API Data Formats\n\
    \nFrontend applications can exchange plain ASCII text with backend web services,\
    \ but how can you express data structures like lists of things?\n\nJust about\
    \ when we really started to need it, along came *JavaScript Object Notation* (JSON)—another\
    \ simple idea that solves an important problem and seems obvious with hindsight.\
    \ Although the *J* stands for *JavaScript*, the syntax looks a lot like Python\
    \ too.\n\nJSON has largely replaced older attempts like XML and SOAP. In the rest\
    \ of this book, you'll see that JSON is the default web service input and output\
    \ format.\n\n## JSON:API\n\nThe combination of RESTful design and JSON data formats\
    \ is common now. But some wiggle room still remains for ambiguity and nerd tussles.\
    \ The recent JSON:API proposal aims to tighten specs a bit. This book will use\
    \ the loose RESTful approach, but JSON:API or something similarly rigorous may\
    \ be useful if you have significant tussles.\n\n## GraphQL\n\nRESTful interfaces\
    \ can be cumbersome for some purposes. Facebook (now Meta) designed *Graph Query\
    \ Language (GraphQL)* to specify more flexible service queries. I won't go into\
    \ GraphQL in this book, but you may want to look into it if you find RESTful design\
    \ inadequate for your application.\n\n## Concurrency\n\nBesides the growth of\
    \ service orientation, the rapid expansion of the number of connections to web\
    \ services requires ever better efficiency and scale.\n\nWe want to reduce the\
    \ following:\n\n*Latency*\n    The up-front wait time\n\n*Throughput*\n    The\
    \ number of bytes per second between the service and its callers\n\nIn the old\
    \ web days,³ people dreamed of supporting hundreds of simultaneous connections,\
    \ then fretted about the “10K problem,” and now assume millions at a time.\n\n\
    The term *concurrency* doesn't mean full parallelism. Multiple processing isn't\
    \ occurring in the same nanosecond, in a single CPU. Instead, concurrency mostly\
    \ avoids *busy waiting* (idling the CPU until a response is delivered). CPUs are\
    \ zippy, but networks and disks are thousands to millions of times slower. So,\
    \ whenever we talk to a network or disk, we don't want to just sit there with\
    \ a blank stare until it responds.\n\nNormal Python execution is *synchronous*:\
    \ one thing at a time, in the order specified by the code. Sometimes we want to\
    \ be *asynchronous*: do a little of one thing, then a little of another thing,\
    \ back to the first thing, and so on. If all our code uses the CPU to calculate\
    \ things (*CPU bound*), there's really no spare time to be asynchronous. But if\
    \ we perform something that makes the CPU wait for an external thing to complete\
    \ (I/O bound), we can be asynchronous.\n\nAsynchronous systems provide an *event\
    \ loop*: requests for slow operations are sent and noted, but we don't hold up\
    \ the CPU waiting for their responses. Instead, some immediate processing is done\
    \ on each pass through the loop, and any responses that came in during that time\
    \ are handled in the next pass.\n\n> ³ Around when caveman played hacky sack with\
    \ giant ground sloths.\n\nThe effects can be dramatic. Later in this book, you’ll\
    \ see how FastAPI’s support of asynchronous processing makes it much faster than\
    \ typical web frameworks.\n\nAsynchronous processing isn’t magic. You still have\
    \ to be careful to avoid doing too much CPU-intensive work during the event loop,\
    \ because that will slow down everything. Later in this book, you’ll see the uses\
    \ of Python’s `async` and `await` keywords, and how FastAPI lets you mix both\
    \ synchronous and asynchronous processing.\n\n## Layers\n\n*Shrek* fans may remember\
    \ he noted his layers of personality, to which Donkey replied, “Like an onion?”\n\
    \n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_26_0.png)\n\nWell, if ogres and tearful\
    \ vegetables can have layers, then so can software. To manage size and complexity,\
    \ many applications have long used a so-called *three-tier model*.<sup>4</sup>\
    \ This isn’t terribly new. Terms differ,<sup>5</sup> but for this book I’m using\
    \ the following simple separation of terms (see Figure 1-1):\n\n+   - **Web**\n\
    \  Input/output layer over HTTP, which assembles client requests, calls the Service\
    \ Layer, and returns responses\n- **Service**\n  The business logic, which calls\
    \ the Data layer when needed\n- **Data**\n  Access to data stores and other services\n\
    - **Model**\n  Data definitions shared by all layers\n- **Web client**\n  Web\
    \ browser or other HTTP client-side software\n\n> 4 Choose your own dialect: tier/layer,\
    \ tomato/tomahto/arigato.\n\n> 5 You’ll often see the term *Model-View-Controller\
    \ (MVC)* and variations. Commonly accompanied by religious wars, toward which\
    \ I’m agnostic.\n\nDatabase\nThe data store, often an SQL or NoSQL server\n\n\
    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_27_0.png)\n\nFigure 1-1. Vertical layers\n\
    \nThese components will help you scale your site without having to start from\
    \ scratch. They’re not laws of quantum mechanics, so consider them guidelines\
    \ for this book’s exposition.\n\nThe layers talk to one another via APIs. These\
    \ can be simple function calls to separate Python modules, but could access external\
    \ code via any method. As I showed earlier, this could include RPCs, messages,\
    \ and so on. In this book, I’m assuming a single web server, with Python code\
    \ importing other Python modules. The separation and information hiding is handled\
    \ by the modules.\n\nThe *Web layer* is the one that users see, via *client* applications\
    \ and APIs. We’re usually talking about a RESTful web interface, with URLs, and\
    \ JSON-encoded requests and responses. But alternative text (or command-line interface,\
    \ CLI) clients also could be built alongside the Web layer. Python Web code may\
    \ import Service-layer modules but should not import Data modules.\n\nThe *Service\
    \ layer* contains the actual details of whatever this website provides. This layer\
    \ essentially looks like a *library*. It imports Data modules to access databases\
    \ and external services but should not know the details.\n\nThe *Data layer* provides\
    \ the Service layer access to data, through files or client calls to other services.\
    \ Alternative Data layers may also exist, communicating with a single Service\
    \ layer.\n\nThe *Model box* isn’t an actual layer but a source of data definitions\
    \ shared by the layers. This isn’t needed if you’re passing built-in Python data\
    \ structures among them. As you will see, FastAPI’s inclusion of Pydantic enables\
    \ the definition of data structures with many useful features.\n\nWhy make these\
    \ divisions? Among many reasons, each layer can be:\n\n+   - Written by specialists.\n\
    - Tested in isolation.\n- Replaced or supplemented: you might add a second Web\
    \ layer, using a different API such as gRPC, alongside a web one.\n\nFollow one\
    \ rule from *Ghostbusters*: Don't cross the streams. That is, don't let web details\
    \ leak out of the Web layer, or database details out of the Data layer.\n\nYou\
    \ can visualize *layers* as a vertical stack, like a cake in the Great British\
    \ Bake Off.⁶\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_28_0.png)\n\nHere are\
    \ some reasons for separation of the layers:\n\n+   - If you don't separate the\
    \ layers, expect a hallowed web meme: *Now you have two problems*.\n- Once the\
    \ layers are mixed, later separation will be *very* difficult.\n- You'll need\
    \ to know two or more specialties to understand and write tests if code logic\
    \ gets muddled.\n\nBy the way, even though I call them *layers*, you don't need\
    \ to assume that one layer is “above” or “below” another, and that commands flow\
    \ with gravity. Vertical chauvinism! You could also view layers as sideways-communicating\
    \ boxes (**Figure 1-2**).\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_28_1.png)\n\
    \n*Figure 1-2. Sideways-communicating boxes*\n\n> ⁶ As viewers know, if your layers\
    \ get sloppy, you may not return to the tent the next week."
  mdcn: "## HTTP状态码\n\n200s\n成功\n\n300s\n重定向\n\n400s\n客户端错误\n\n500s\n服务器错误\n\n+  \
    \ - 各种头部信息\n- 一个主体，它可能是空的、单个的，或*分块的*（以连续片段形式）\n\n至少有一个状态码是彩蛋：418（我是一个茶壶）应该由联网的茶壶在被要求煮咖啡时返回。\n\
    \n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_24_0.png)\n\n你会发现很多关于RESTful API设计的网站和书籍，都提供了有用的实用规则。本书也会在过程中分享一些。\n\
    \n## JSON和API数据格式\n\n前端应用可以与后端Web服务交换纯ASCII文本，但如何表达像事物列表这样的数据结构呢？\n\n就在我们真正开始需要它的时候，*JavaScript对象表示法*（JSON）出现了——又一个解决重要问题的简单想法，事后看来似乎显而易见。虽然*J*代表*JavaScript*，但其语法看起来也很像Python。\n\
    \nJSON在很大程度上取代了像XML和SOAP这样的早期尝试。在本书的其余部分，你会看到JSON是默认的Web服务输入和输出格式。\n\n## JSON:API\n\
    \nRESTful设计和JSON数据格式的结合现在很常见。但仍然存在一些模糊性和极客争论的空间。最近的JSON:API提案旨在稍微收紧规范。本书将使用宽松的RESTful方法，但如果你遇到重大争论，JSON:API或类似严格的规范可能有用。\n\
    \n## GraphQL\n\nRESTful接口对于某些目的来说可能很繁琐。Facebook（现为Meta）设计了*图查询语言（GraphQL）*来指定更灵活的服务查询。本书不会深入探讨GraphQL，但如果你发现RESTful设计不足以满足你的应用需求，你可能需要研究一下。\n\
    \n## 并发\n\n除了面向服务的增长，连接到Web服务的数量的快速扩张也要求更好的效率和可扩展性。\n\n我们希望减少以下内容：\n\n*延迟*\n \
    \   初始等待时间\n\n*吞吐量*\n    服务与其调用者之间每秒传输的字节数\n\n在旧的Web时代³，人们梦想着支持数百个同时连接，然后为“万级问题”而烦恼，现在则假设同时有数百万个连接。\n\
    \n术语*并发*并不意味着完全并行。多个处理不会在同一个纳秒内、在单个CPU中发生。相反，并发主要是避免*忙等待*（让CPU空闲直到响应送达）。CPU速度很快，但网络和磁盘慢了几千到几百万倍。所以，每当我们与网络或磁盘通信时，我们不想只是茫然地坐在那里等待它响应。\n\
    \n正常的Python执行是*同步的*：一次一件事，按照代码指定的顺序。有时我们想要*异步*：做一点这件事，然后做一点那件事，再回到第一件事，以此类推。如果我们的所有代码都使用CPU来计算东西（*CPU密集型*），那么确实没有空闲时间来异步。但如果我们执行某些让CPU等待外部事物完成的操作（I/O密集型），我们就可以异步。\n\
    \n异步系统提供一个*事件循环*：发送慢操作的请求并记录下来，但我们不会让CPU等待它们的响应。相反，在每次循环中进行一些即时处理，并在下一次循环中处理在此期间收到的任何响应。\n\
    \n> ³ 大约在穴居人与巨型地懒玩踢毽子的时候。\n\n效果可能是显著的。在本书后面，你会看到FastAPI对异步处理的支持如何使其比典型的Web框架快得多。\n\
    \n异步处理不是魔法。你仍然必须小心避免在事件循环期间做太多CPU密集型工作，因为这会减慢一切。在本书后面，你会看到Python的`async`和`await`关键字的用途，以及FastAPI如何让你混合同步和异步处理。\n\
    \n## 层\n\n*怪物史莱克*的粉丝可能记得他提到了自己性格的层次，驴子回答说：“像洋葱一样？”\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_26_0.png)\n\
    \n好吧，如果食人魔和催泪蔬菜可以有层次，那么软件也可以。为了管理规模和复杂性，许多应用程序长期以来一直使用所谓的*三层模型*。<sup>4</sup> 这并不是什么新鲜事。术语不同，<sup>5</sup>\
    \ 但对于本书，我使用以下简单的术语划分（见图1-1）：\n\n+   - **Web层**\n  基于HTTP的输入/输出层，它组装客户端请求，调用服务层，并返回响应\n\
    - **服务层**\n  业务逻辑，在需要时调用数据层\n- **数据层**\n  访问数据存储和其他服务\n- **模型**\n  所有层共享的数据定义\n\
    - **Web客户端**\n  Web浏览器或其他HTTP客户端软件\n\n> 4 选择你自己的方言：层/层，番茄/番茄/谢谢。\n\n> 5 你经常会看到术语*模型-视图-控制器（MVC）*及其变体。通常伴随着宗教战争，对此我持不可知论。\n\
    \n数据库\n数据存储，通常是SQL或NoSQL服务器\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_27_0.png)\n\
    \n图1-1. 垂直层\n\n这些组件将帮助你扩展网站，而无需从头开始。它们不是量子力学定律，因此将它们视为本书阐述的指南。\n\n这些层通过API相互通信。这些可以是调用独立Python模块的简单函数调用，但也可以通过任何方法访问外部代码。正如我之前所示，这可能包括RPC、消息等。在本书中，我假设有一个Web服务器，Python代码导入其他Python模块。分离和信息隐藏由模块处理。\n\
    \n*Web层*是用户通过*客户端*应用程序和API看到的层。我们通常谈论的是一个RESTful Web接口，带有URL，以及JSON编码的请求和响应。但也可以在Web层旁边构建替代文本（或命令行界面，CLI）客户端。Python\
    \ Web代码可能会导入服务层模块，但不应导入数据模块。\n\n*服务层*包含此网站提供的任何实际细节。此层本质上看起来像一个*库*。它导入数据模块以访问数据库和外部服务，但不应知道细节。\n\
    \n*数据层*通过文件或客户端调用其他服务，为服务层提供对数据的访问。也可能存在替代数据层，与单个服务层通信。\n\n*模型框*不是一个实际的层，而是各层共享的数据定义的来源。如果在它们之间传递内置的Python数据结构，则不需要这个。正如你将看到的，FastAPI包含Pydantic，使得定义具有许多有用功能的数据结构成为可能。\n\
    \n为什么要进行这些划分？在许多原因中，每一层都可以：\n\n+   - 由专家编写。\n- 单独测试。\n- 替换或补充：你可能添加第二个Web层，使用不同的API（如gRPC），与Web层并行。\n\
    \n遵循*捉鬼敢死队*的一条规则：不要交叉水流。也就是说，不要让Web细节泄露到Web层之外，也不要让数据库细节泄露到数据层之外。\n\n你可以将*层*想象成一个垂直堆栈，就像《英国烘焙大赛》中的蛋糕一样。⁶\n\
    \n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_28_0.png)\n\n以下是分层的一些原因：\n\n+   - 如果你不分层，就会遇到一个神圣的网络梗：*现在你有两个问题了*。\n\
    - 一旦层混合在一起，以后的分离将*非常*困难。\n- 如果代码逻辑变得混乱，你需要了解两个或更多专业才能理解和编写测试。\n\n顺便说一句，即使我称它们为*层*，你也不需要假设一层在另一层“之上”或“之下”，并且命令随重力流动。垂直沙文主义！你也可以将层视为横向通信的框（**图1-2**）。\n\
    \n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_28_1.png)\n\n*图1-2. 横向通信的框*\n\n> ⁶\
    \ 正如观众所知，如果你的层变得马虎，你可能下周就不会回到帐篷里了。"
