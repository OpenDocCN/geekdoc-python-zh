    \ echo(thing):\n    return f\"echoing {thing}\"\n\nif __name__ == \"__main__\"\
    :\n    uvicorn.run(\"main:app\", reload=True)\n```\n\n一旦你在编辑器中保存对*main.py*的更改，运行Web服务器的窗口应会打印类似以下内容：\n\
