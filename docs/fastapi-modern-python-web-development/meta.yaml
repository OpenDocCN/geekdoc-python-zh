    newphone\"\n}\n```\n\n# Simple Individual Authentication\n\nThe previous section\
    \ showed how you could use a shared secret to control access. It's a broad approach,\
    \ not very secure. And it doesn't tell you anything about the individual visitor,\
    \ just that they (or a sentient AI) know the secret.\nMany websites want to do\
    \ the following:\n\n+   - Define individual visitors in some way\n- Identify specific\
    \ visitors as they access certain endpoints (authentication)\n- Possibly assign\
    \ different permissions to some visitors and endpoints (authorization)\n- Possibly\
    \ save specific information per visitor (interests, purchases, and so on)\n\n\
    If your visitors are humans, you may want them to provide a username or email\
