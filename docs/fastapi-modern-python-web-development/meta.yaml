- img_proc: true
  md: 'Instead of iterating over a list returned by the plain function doh(), we''re
    iterating over a *generator object* returned by the *generator function* doh2().
    The actual iteration (for...in) looks the same. Python returns the first string
    from doh2(), but keeps track of where it is for the next iteration, and so on
    until the function runs out of dialogue.


    Any function containing yield is a generator function. Given this ability to go
    back into the middle of a function and resume execution, the next section looks
    like a logical adaptation.


    # Python async, await, and asyncio


    Python''s asyncio features have been introduced over various releases. You''re
    running at least Python 3.7, when the async and await terms became reserved keywords.


    The following examples show a joke that''s funny only when run asynchronously.
    Run both yourself, because the timing matters.


    First, run the unfunny Example 4-3.


    Example 4-3. Dullness


    ```

    >>> import time

    >>>

    >>> def q():

    ...     print("Why can''t programmers tell jokes?")

    ...     time.sleep(3)

    ...

    >>> def a():

    ...     print("Timing!")

    ...

    >>> def main():

    ...     q()

    ...     a()

    ...

    >>> main()

    Why can''t programmers tell jokes?

    Timing!

    ```


    You''ll see a three-second gap between the question and answer. Yawn.


    But the async Example 4-4 is a little different.


    Example 4-4. Hilarity


    ```

    >>> import asyncio

    >>>

    >>> async def q():

    ...     print("Why can''t programmers tell jokes?")

    ```'
