  md: "# File and Directory Site Layout\n\nOur data mainly concerns creatures and\
    \ explorers. Initially, we could define all the URLs and their FastAPI path functions\
    \ for accessing their data in a single Python file. Let’s resist that temptation,\
    \ and start as though we were already a rising star in the cryptid web space.\
    \ With a good foundation, cool new things are much easier to add.\n\nFirst, pick\
    \ a directory on your machine. Name it *fastapi*, or anything that will help you\
    \ remember where you’ll be messing with the code from this book. Within it, create\
    \ the following subdirectories:\n\n+   - *src*\n    - Contains all the website\
    \ code\n    - *web*\n        - The FastAPI web layer\n    - *service*\n      \
    \  - The business logic layer\n    - *data*\n        - The storage interface layer\n\
    \    - *model*\n        - Pydantic model definitions\n    - *fake*\n        -\
    \ Early hardwired (*stub*) data\n\nEach of these directories will soon gain three\
    \ files:\n\n+   - *__init__.py*\n    - Needed to treat this directory as a package\n\
    - *creature.py*\n    - Creature code for this layer\n- *explorer.py*\n    - Explorer\
    \ code for this layer\n\n*Many* opinions exist on how to lay out sites for development.\
    \ This design is intended to show the layer separation and leave room for future\
    \ additions.\n\nSome explanations are needed right now. First, *__init__.py* files\
    \ are empty. They’re sort of a Python hack, so their directory should be treated\
    \ as a Python *package* that may be imported from. Second, the *fake* directory\
    \ provides some stub data to higher layers as the lower ones are built."
