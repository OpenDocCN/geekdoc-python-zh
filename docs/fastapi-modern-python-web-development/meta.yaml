  md: "# Automated Full Tests\n\nFull tests exercise all the layers together, as close\
    \ to production use as possible. Most of the tests that you've already seen in\
    \ this book have been full: call the Web endpoint, run through Servicetown to\
    \ downtown Dataville, and return with groceries. These are closed tests. Everything\
    \ is live, and you don't care how it does it, just that it does it.\n\nYou can\
    \ fully test each endpoint in the overall API in two ways:\n\n*Over HTTP/HTTPS*\n\
    \    Write individual Python test clients that access the server. Many examples\
    \ in this book have done this, with standalone clients like HTTPie, or in scripts\
    \ using Requests.\n\n*Using TestClient*\n    Use this built-in FastAPI/Starlette\
    \ object to access the server directly, without an overt TCP connection.\n\nBut\
    \ these approaches require writing one or more tests for each endpoint. This can\
    \ become medieval, and we're a few centuries past medieval now. A more recent\
    \ approach is based on *property-based testing*. This takes advantage of FastAPI's\
    \ auto-generated documentation. An OpenAPI *schema* called *openapi.json* is created\
    \ by FastAPI every time you change a path function or path decorator in the Web\
    \ layer. This schema details everything about every endpoint: arguments, return\
    \ values, and so on. That's what OpenAPI is for, as described here by the [OpenAPI\
    \ Initiative's FAQ page](https://www.openapis.org/faq):\n\n> The OAS defines a\
    \ standard, programming language-agnostic interface description for REST APIs,\
    \ which allows both humans and computers to discover and understand the capabilities\
    \ of a service without requiring access to source code, additional documentation,\
    \ or inspection of network traffic.\n—OAS (OpenAPI Specification)\n\nTwo packages\
    \ are needed:\n\n*Hypothesis*\n    `pip install hypothesis`\n\n*Schemathesis*\n\
    \    `pip install schemathesis`\n\nHypothesis is the base library, and Schemathesis\
    \ applies it to the OpenAPI 3.0 schema that FastAPI generates. Running Schemathesis\
    \ reads this schema, generates gobs of tests with varying data (that you don't\
    \ need to come up with!), and works with pytest."
