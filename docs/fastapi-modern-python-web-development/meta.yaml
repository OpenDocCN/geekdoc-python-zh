  - "[PAGE 142]\n\nFor SQL INSERT, DELETE, and UPDATE statements, the returned value\
    \ from execute() tells you how it worked. For SELECT, you iterate over returned\
    \ data row(s), as Python tuples, with a fetch method:\n\n+   - fetchone() returns\
    \ one tuple, or None.\n- fetchall() returns a sequence of tuples.\n- fetchmany(num)\
    \ returns up to num tuples.\n\n# SQLite\n\nPython includes support for one database\
    \ (SQLite) with the module sqlite3 in its standard packages.\n\nSQLite is unusual:\
    \ it has no separate database server. All the code is in a library, and storage\
    \ is in a single file. Other databases run separate servers, and clients communicate\
    \ with them over TCP/IP, using specific protocols. Let's use SQLite as the first\
    \ physical data store for this website. Chapter 14 will include other databases,\
    \ relational and not, as well as more advanced packages like SQLAlchemy and techniques\
    \ like ORMs.\n\nFirst, we need to define how the data structures we've been using\
    \ in the website (models) can be represented in the database. So far, our only\
    \ models have been simple and similar, but not identical: Creature and Explorer.\
    \ They will change as we think of more things to do with them and let the data\
    \ evolve without massive code changes.\n\nExample 10-2 shows the bare DB-API code\
    \ and SQL to create and work with the first tables. It uses named argument strings\
    \ (values are represented like name), which are supported by the sqlite3 package.\n\
    \nExample 10-2. Create the file data/creature.py using sqlite3\n\n```\nimport\
    \ sqlite3\nfrom model.creature import Creature\n\nDB_NAME = \"cryptid.db\"\nconn\
    \ = sqlite3.connect(DB_NAME)\ncurs = conn.cursor()\n\ndef init():\n    curs.execute(\"\
    create table creature(name, description, country, area, aka)\")\n\ndef row_to_model(row:\
    \ tuple) -> Creature:\n    name, description, country, area, aka = row\n    return\
    \ Creature(name, description, country, area, aka)\n\ndef model_to_dict(creature:\
    \ Creature) -> dict:\n```"
