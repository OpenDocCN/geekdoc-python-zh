    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_166_0.png)


    From here on, I''ll use just *username* to refer to either a user-selected name
    or an email.


    To authenticate real individual users instead of a fake one, you''ll need to do
    a bit more:


    +   - Pass the user values (name and password) to the API server endpoints as
    HTTP headers.

    - Use HTTPS instead of HTTP, to avoid anyone snooping the text of these headers.

    - *Hash* the password to a different string. The result is not “de-hashable”—you
    can''t derive the original password from its hash.

    - Make a real database store a User database table containing the username and
    the hashed password (never the original plain-text password).

    - Hash the newly input password and compare the result with the hashed password
    in the database.

    - If the username and hashed password match, pass the matching User object up
    the stack. If they don''t match, return None or raise an exception.

    - In the Service layer, fire off any metrics/logging/whatever that are relevant
    to individual user authentication.

    - In the Web layer, send the authenticated user info to any functions that require
    it.


    I''ll show you how to do all these things in the following sections, using recent
    tools like OAuth2 and JWT.


    # Fancier Individual Authentication


    If you want to authenticate individuals, you have to store some individual information
    somewhere—for example, in a database containing records with at least a key (username
    or API key), and a secret (password or API secret). Your website visitors will
    provide these when accessing protected URLs, and you need something in the database
    to match them with.


    The official FastAPI security docs ([introductory](https://fastapi.tiangolo.com/tutorial/security/)
    and [advanced](https://fastapi.tiangolo.com/advanced/security/)) have top-down
    descriptions of how to set up authentication for multiple users, using a local
    database. But, example web functions fake the actual database access.'
