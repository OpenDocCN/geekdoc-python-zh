    ,\n...     \"Hirsute Himalayan\",\n...     \"Abominable Snowman\")\n>>> print(\"\
    Name is\", class_thing.name)\nName is yeti\n```\n\n你可能会想，这有什么不好？使用常规类，你可以添加更多数据（属性），尤其是行为（方法）。也许在某个心血来潮的日子，你会决定添加一个查找探险家最爱歌曲的方法。（这不适用于生物。²）但这里的用例只是将一簇数据在各层之间不受干扰地传递，并在进出时进行验证。此外，方法就像方钉，很难塞进数据库的圆孔里。\n\
    \nPython 是否有类似其他计算机语言中称为 *record* 或 *struct*（一组名称和值）的东西？Python 最近新增了 *dataclass*。示例\
    \ 5-7 展示了使用 dataclass 如何消除所有那些 `self` 代码。\n\n### 示例 5-7. 使用 dataclass\n\n```python\n\
    >>> from dataclasses import dataclass\n>>>\n>>> @dataclass\n... class CreatureDataClass():\n\
