    ```\n\n这些测试表明，模拟对象可以通过多种方式创建。函数 `test_summer_a()` 使用 `mock.patch()` 作为 Python\
    \ 上下文管理器（`with` 语句）。其参数如下：\n\n-   `\"mod1.preamble\"`：模块 `mod1` 中 `preamble()`\
    \ 函数的完整字符串名称。\n-   `return_value=\"\"`：使此模拟版本返回一个空字符串。\n\n`test_summer_b()` 函数几乎相同，但添加了\
    \ `as mock_preamble` 以便在下一行使用模拟对象。\n\n`test_summer_c()` 函数使用 Python *装饰器* 定义模拟。模拟对象作为参数传递给\
    \ `test_summer_c()`。\n\n`test_caller_d()` 函数类似于 `test_summer_b()`，在单独的调用中设置 `mock_preamble`\
    \ 的 `return_value`。\n\n在每种情况下，被模拟对象的字符串名称必须与被测试代码中的调用方式相匹配——在本例中是 `summer()`。模拟库将此字符串名称转换为一个变量，该变量将拦截对该名称原始变量的任何引用。（请记住，在\
    \ Python 中，变量只是对实际对象的引用。）\n\n因此，当运行示例 12-6 时，在所有四个 `summer()` 测试函数中，当调用 `summer(5,6)`\
    \ 时，会调用伪装的模拟 `preamble()` 而不是真实的。模拟版本丢弃了那个字符串，因此测试可以确保 `summer()` 返回其两个参数之和的字符串版本。\n\
    \n## 示例 12-6. 运行模拟的 pytest\n\n```\n$ pytest -q test_summer2.py\n....\n[100%]\n\
    4 passed in 0.13s\n```\n\n> 那是一个为了简单起见而人为设计的案例。模拟可能相当复杂；有关清晰的示例，请参阅 Alex Ronquillo\
    \ 的文章“Understanding the Python Mock Object Library”，有关令人头疼的细节，请参阅官方 Python 文档。\n\
    \n## 测试替身与伪对象\n\n要执行该模拟，你需要知道 `summer()` 函数从模块 `mod1` 导入了函数 `preamble()`。这是一个结构测试，需要了解特定的变量和模块名称。\n\
    \n有没有一种方法可以执行不需要这些知识的行为测试？\n\n一种方法是定义一个*替身*：在测试中执行我们想要操作的独立代码——在本例中，让 `preamble()`\
    \ 返回一个空字符串。一种方法是使用导入。在将其用于接下来三节中各层的单元测试之前，先将其应用于此示例。\n\n首先，在示例 12-7 中重新定义 `mod2.py`。\n\
    \n## 示例 12-7. 使 mod2.py 在单元测试时导入替身\n\n```\nimport os\nif os.getenv(\"UNIT_TEST\"\
    ):\n    import fake_mod1 as mod1\nelse:\n    import mod1\n\ndef summer(x: int,\
    \ y:int) -> str:\n    return mod1.preamble() + f\"{x+y}\"\n```\n\n示例 12-8 定义了该替身模块\
    \ *fake_mod1.py*。\n\n## 示例 12-8. 替身 fake_mod1.py\n\n```\ndef preamble() -> str:\n\
    \    return \"\"\n```\n\n示例 12-9 是测试。\n\n## 示例 12-9. 测试脚本 test_summer_fake.py\n\
    \n```\nimport os\nos.environ[\"UNIT_TEST\"] = \"true\"\nimport mod2\n\ndef test_summer_fake():\n\
    \    assert \"11\" == mod2.summer(5,6)\n```\n\n....然后示例 12-10 运行它。\n\n## 示例 12-10.\
    \ 运行新的单元测试\n\n```\n$ pytest -q test_summer_fake.py\n.\n1 passed in 0.04s\n```\n\
    \n这种导入切换方法确实需要添加对环境变量的检查，但避免了为函数调用编写特定模拟的需要。你可以自行判断更喜欢哪种方式。接下来的几节将使用导入方法，它与我在定义代码层时一直使用的伪包配合得很好。\n\
    \n总而言之，这些示例在测试脚本中用模拟替换了 `preamble()`，或者导入了一个分身替身。你可以用其他方式隔离被测试的代码，但这些方法有效，并且不像\
    \ Google 可能为你找到的其他方法那样棘手。\n\n## Web 层\n\n此层实现了站点的 API。理想情况下，每个路径函数（端点）至少应该有一个测试——如果函数可能以多种方式失败，可能需要更多。在\
    \ Web 层，你通常想查看端点是否存在、是否使用正确的参数工作，以及是否返回正确的状态码和数据。\n\n> 这些是浅层的 API 测试，仅在 Web 层内进行测试。因此，需要拦截服务层调用（这些调用又会调用数据层和数据库），以及任何其他离开\
    \ Web 层的调用。\n\n使用上一节的导入思想，使用环境变量 `CRYPTID_UNIT_TEST` 导入 *fake* 包作为服务，而不是真实的服务。这阻止了\
    \ Web 函数调用服务函数，而是将它们短路到 *伪*（替身）版本。然后，较低的数据层和数据库也不会被涉及。我们得到了我们想要的：单元测试。示例 12-11\
    \ 是修改后的 *web/creature.py* 文件。\n\n## 示例 12-11. 修改后的 *web/creature.py*\n\n```\n\
    import os\nfrom fastapi import APIRouter, HTTPException\nfrom model.creature import\
    \ Creature\nif os.getenv(\"CRYPTID_UNIT_TEST\"):\n    from fake import creature\
    \ as service\nelse:\n    from service import creature as service\nfrom error import\
    \ Missing, Duplicate\n\nrouter = APIRouter(prefix = \"/creature\")\n\n@router.get(\"\
    /\")\ndef get_all() -> list[Creature]:\n    return service.get_all()\n\n@router.get(\"\
    /{name}\")\ndef get_one(name) -> Creature:\n    try:\n        return service.get_one(name)\n\
    \    except Missing as exc:\n        raise HTTPException(status_code=404, detail=exc.msg)\n\
    \n@router.post(\"/\", status_code=201)\ndef create(creature: Creature) -> Creature:\n\
    \    try:\n        return service.create(creature)\n    except Duplicate as exc:\n\
    \        raise HTTPException(status_code=409, detail=exc.msg)\n\n@router.patch(\"\
    /\")\ndef modify(name: str, creature: Creature) -> Creature:\n    try:\n     \
    \   return service.modify(name, creature)\n    except Missing as exc:\n      \
    \  raise HTTPException(status_code=404, detail=exc.msg)\n\n@router.delete(\"/{name}\"\
    )\ndef delete(name: str) -> None:\n    try:\n        return service.delete(name)\n\
    \    except Missing as exc:\n        raise HTTPException(status_code=404, detail=exc.msg)\n\
    ```\n\n示例 12-12 包含测试，使用了两个 pytest fixture：\n\n-   **`sample()`**：一个新的 `Creature`\
    \ 对象。\n-   **`fakes()`**：一个“现有”生物的列表。\n\n伪对象从一个较低级别的模块获取。通过设置环境变量 `CRYPTID_UNIT_TEST`，示例\
    \ 12-11 中的 Web 模块导入了伪服务版本（提供伪数据而不是调用数据库），而不是真实版本。这隔离了测试，这正是重点。\n\n## 示例 12-12.\
    \ 使用 fixture 的生物 Web 单元测试\n\n```\nfrom fastapi import HTTPException\nimport pytest\n\
    import os\nos.environ[\"CRYPTID_UNIT_TEST\"] = \"true\"\nfrom model.creature import\
    \ Creature\nfrom web import creature\n\n@pytest.fixture\ndef sample() -> Creature:\n\
    \    return Creature(name=\"dragon\",\n        description=\"Wings! Fire! Aieee!\"\
    ,\n        country=\"*\")\n\n@pytest.fixture\ndef fakes() -> list[Creature]:\n\
    \    return creature.get_all()\n```"
