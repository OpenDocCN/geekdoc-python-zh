- md: "The way that FastAPI provides data from various parts of the HTTP requests\
    \ is one of its best features and an improvement on how most Python web frameworks\
    \ do it. All the arguments that you need can be declared and provided directly\
    \ inside the path function, using the definitions in the preceding list (Path,\
    \ Query, etc.), and by functions that you write. This uses a technique called\
    \ *dependency injection*, which will be discussed as we go along and expanded\
    \ on in Chapter 6.\n\nLet's make our earlier application a little more personal\
    \ by adding a parameter called `who` that addresses that plaintive Hello? to someone.\
    \ We'll try different ways to pass this new parameter:\n\n- In the URL *path*\n\
    - As a *query* parameter, after the `?` in the URL\n- In the HTTP *body*\n- As\
    \ an HTTP *header*\n\n## URL Path\n\nEdit *hello.py* in Example 3-11.\n\n*Example\
    \ 3-11. Return the greeting path*\n\n```python\nfrom fastapi import FastAPI\n\n\
    app = FastAPI()\n\n@app.get(\"/hi/{who}\")\ndef greet(who):\n    return f\"Hello?\
    \ {who}?\"\n```\n\nOnce you save this change from your editor, Uvicorn should\
    \ restart. (Otherwise, we'd create *hello2.py*, etc. and rerun Uvicorn each time.)\
    \ If you have a typo, keep trying until you fix it, and Uvicorn won't give you\
    \ a hard time.\n\nAdding that `{who}` in the URL (after `@app.get`) tells FastAPI\
    \ to expect a variable named `who` at that position in the URL. FastAPI then assigns\
    \ it to the `who` argument in the following `greet()` function. This shows coordination\
    \ between the path decorator and the path function.\n\nDo not use a Python f-string\
    \ for the amended URL string (`\"/hi/{who}\"`) here. The curly brackets are used\
    \ by FastAPI itself to match URL pieces as path parameters.\n\nIn Examples 3-12\
    \ through 3-14, test this modified endpoint with the various methods discussed\
    \ earlier.\n\n*Example 3-12. Test /hi/Mom in the browser*\n\n```\nlocalhost:8000/hi/Mom\n\
    ```\n\n*Example 3-13. Test /hi/Mom with HTTPie*\n\n```\n$ http localhost:8000/hi/Mom\n\
