  - '[PAGE 218]


    # Elasticsearch


    Elasticsearch is more like a database index than a database itself. It''s often
    used for full-text search.


    # NoSQL Features in SQL Databases


    As noted previously, relational databases were traditionally normalized—constrained
    to follow different levels of rules called *normal forms*. One basic rule was
    that the value in each cell (row-column intersection) had to be a *scalar* (no
    arrays or other structures).


    NoSQL (or *document*) databases supported JSON directly and were usually your
    only choice if you had “uneven” or “ragged” data structures. They were often *denormalized*:
    all the data needed for a document was included with that document. In SQL, you
    often needed to *join* across tables to build a full document.


    However, recent revisions of the SQL standard have allowed JSON data to be stored
    in relational databases also. Some relational databases now let you store complex
    (nonscalar) data in table cells, and even search and index within them. JSON functions
    are supported in various ways for SQLite, PostgreSQL, MySQL, Oracle, and others.


    SQL with JSON can be the best of both worlds. SQL databases have been around much
    longer and have really useful features such as foreign keys and secondary indexes.
    Also, SQL is fairly standardized up to a point, and NoSQL query languages are
    all different.


    Finally, new data design and query languages are trying to combine SQL and NoSQL
    advantages, like EdgeQL that I mentioned earlier.


    So, if you can''t fit your data into the rectangular relational box, look at a
    NoSQL database, a relational database with JSON support, or a “Post-SQL” database.


    # Database Load Testing


    This book is mainly about FastAPI, but websites are so frequently tied to databases.


    The data examples in this book have been tiny. To really stress-test a database,
    millions of items would be great. Rather than think of things to add, it''s easier
    use a Python package like Faker. Faker can generate many kinds of data quickly—names,
    places, or special types that you define.


    In Example 14-3, Faker pumps out names and countries, which are then loaded by
    load() into SQLite.'
  - "[PAGE 219]\n\n# Example 14-3. Load fake explorers in test_load.py\n\n```\nfrom\
    \ faker import Faker\nfrom time import perf_counter\n\ndef load():\n    from error\
    \ import Duplicate\n    from data.explorer import create\n    from model.explorer\
    \ import Explorer\n\n    f = Faker()\n    NUM = 100_000\n    t1 = perf_counter()\n\
    \    for row in range(NUM):\n        try:\n            create(Explorer(name=f.name(),\n\
    \                country=f.country(),\n                description=f.description))\n\
    \        except Duplicate:\n            pass\n    t2 = perf_counter()\n    print(NUM,\
    \ \"rows\")\n    print(\"write time:\", t2-t1)\n\ndef read_db():\n    from data.explorer\
    \ import get_all\n\n    t1 = perf_counter()\n    _ = get_all()\n    t2 = perf_counter()\n\
    \    print(\"db read time:\", t2-t1)\n\ndef read_api():\n    from fastapi.testclient\
    \ import TestClient\n    from main import app\n\n    t1 = perf_counter()\n   \
    \ client = TestClient(app)\n    _ = client.get(\"/explorer/\")\n    t2 = perf_counter()\n\
    \    print(\"api read time:\", t2-t1)\n\nload()\nread_db()\nread_db()\nread_api()\n\
    ```\n\nYou're catching the Duplicate exception in load() and ignoring it, because\
    \ Faker generates names from a limited list and is likely to repeat one now and\
    \ then. So the result may be less than 100,000 explorers loaded."
  - '[PAGE 220]


    Also, you’re calling read_db() twice, to remove any startup time as SQLite does
    the query. Then read_api() timing should be fair. Example 14-4 fires it up.


    Example 14-4. Test database query performance


    ```

    $ python test_load.py

    100000 rows

    write time: 14.868232927983627

    db read time: 0.4025074450764805

    db read time: 0.39750714192632586

    api read time: 2.597553930943832

    ```


    The API read time for all explorers was much slower than the Data layer’s read
    time. Some of this is probably overhead from FastAPI’s conversion of the response
    to JSON. Also, the initial write time to the database wasn’t very zippy. It wrote
    one explorer at a time, because the Data layer API has a single create() function,
    but not a create_many(); on the read side, the API can return one (get_one())
    or all (get_all()). So, if you ever want to do bulk loading, it might be good
    to add a new Data load function and a new Web endpoint (with restricted authorization).


    Also, if you expect any table in your database to grow to 100,000 rows, maybe
    you shouldn’t allow random users to get all of them in one API call. Pagination
    would be useful, or a way to download a single CSV file from the table.


    # Data Science and AI


    Python has become the most prominent language in data science in general, and
    machine learning in particular. So much data massaging is needed, and Python is
    good at that.


    Sometimes developers have used external tools like pandas to do the data manipulation
    that’s too tricky in SQL.


    PyTorch is one of the most popular ML tools, because it leverages Python’s strengths
    in data manipulation. The underlying computations may be in C or C++ for speed,
    but Python or Go are well-suited for the “higher” data-integration tasks. (The
    Mojo language, a superset of Python, may handle both the high and low ends if
    it succeeds as planned. Although a general-purpose language, it specifically addresses
    some of the current complexity in AI development.)


    A new Python tool called Chroma is a database, similar to SQLite, but tailored
    to machine learning, specifically large language models (LLMs). Read the Getting
    Started page to, you know, get started.'
