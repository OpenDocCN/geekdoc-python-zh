    \ hash)\n\ndef get_hash(plain: str) -> str:\n    \"\"\"Return the hash of a <plain>\
    \ string\"\"\"\n    return pwd_context.hash(plain)\n\ndef get_jwt_username(token:str)\
    \ -> str | None:\n    \"\"\"Return username from JWT access <token>\"\"\"\n```"
