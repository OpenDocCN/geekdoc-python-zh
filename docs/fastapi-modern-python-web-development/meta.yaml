  md: "![](img/1d00ed3e85bc756220a3f1a1e9a9664f_97_0.png)\n\nIn the arguments to `get_user()`,\
    \ we could not have said `user = user_dep`, because `user_dep` is a Python function\
    \ object. And we could not say `user = user_dep()`, because that would have called\
    \ the `user_dep()` function when `get_user()` was *defined*, not when it's used.\
    \ So we need that extra helper FastAPI `Depends()` function to call `user_dep()`\
    \ just when it's wanted.\n\nYou can have multiple dependencies in your path function\
    \ argument list.\n\n# Dependency Scope\n\nYou can define dependencies to cover\
    \ a single path function, a group of them, or the whole web application.\n\n#\
    \ Single Path\n\nIn your *path function*, include an argument like this:\n\n```\n\
    def pathfunc(name: depfunc = Depends(depfunc)):\n```\n\nor just this:\n\n```\n\
    def pathfunc(name: depfunc = Depends()):\n```\n\n*name* is whatever you want to\
    \ call the value(s) returned by *depfunc*.\n\nFrom the earlier example:\n\n+ \
    \  - *pathfunc* is `get_user()`.\n- *depfunc* is `user_dep()`.\n- *name* is `user`.\n\
    \nExample 6-2 uses this path and dependency to return a fixed user name and a\
    \ valid Boolean.\n\nExample 6-2. Return a user dependency\n\n```\nfrom fastapi\
    \ import FastAPI, Depends, Params\n\napp = FastAPI()\n\n# the dependency function:\n\
    def user_dep(name: str = Params, password: str = Params):\n    return {\"name\"\
    : name, \"valid\": True}\n\n# the path function / web endpoint:\n@app.get(\"/user\"\
    )\n```"
