    \n@router.put(\"/\")\ndef replace(creature: Creature) -> Creature:\n    return\
    \ service.replace(creature)\n\n@router.delete(\"/{name}\")\ndef delete(name: str):\n\
    \    return service.delete(name)\n```\n\nThe last time we poked at *main.py*,\
