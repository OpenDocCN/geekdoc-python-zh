  md: "# Python Itself\n\nIf your web service seems slow because it does significant\
    \ computing with Python, you may want a “faster Python.” Alternatives include\
    \ the following:\n\n+   - Use PyPy instead of the standard CPython.\n- Write a\
    \ Python extension in C, C++, or Rust.\n- Convert the slow Python code to Cython\
    \ (used by Pydantic and Uvicorn themselves).\n\nA very intriguing recent announcement\
    \ was the Mojo language. It aims to be a complete superset of Python, with new\
    \ features (using the same friendly Python syntax) that can speed up a Python\
    \ example by thousands of times. The main author, Chris Lattner, had previously\
    \ worked on compiler tools like LLVM, Clang, and MLIR, plus the Swift language\
    \ at Apple.\n\nMojo aims to be a single-language solution to AI development, which\
    \ now (in PyTorch and TensorFlow) requires Python/C/C++ sandwiches that are hard\
    \ to develop, manage, and debug. But Mojo also would be a good general-purpose\
    \ language aside from AI.\n\nI coded in C for years and kept waiting for a successor\
    \ that was as performant but as easy to use as Python. D, Go, Julia, Zig, and\
    \ Rust were possibilities, but if Mojo can live up to its goals, I would use Mojo\
    \ extensively.\n\n# Troubleshooting\n\nLook bottom-up from the time and place\
    \ where you encounter a problem. This includes time and space performance issues,\
    \ but also logic and async traps.\n\n# Kinds of Problems\n\nAt a first glance,\
    \ what HTTP response code did you get?\n\n404\n    An authentication or authorization\
    \ error.\n\n422\n    Usually a Pydantic complaint about use of a model.\n\n500\n\
    \    The failure of a service behind your FastAPI one."
