- md: "After careful investigation into alternatives, Ramírez came up with a design\
    \ that was heavily based on two third-party Python packages:\n\n- *Starlette*\
    \ for web details\n- *Pydantic* for data details\n\nAnd he added his own ingredients\
    \ and special sauces to the final product. You'll see what I mean in the next\
    \ chapter.\n\n## Review\n\nThis chapter covered a lot of ground related to today's\
    \ Python:\n\n- Useful tools for a Python web developer\n- The prominence of APIs\
    \ and services\n- Python's type hinting, objects, and variables\n- Data structures\
    \ for web services\n- Web frameworks\n\n# PART II\n\n# A FastAPI Tour\n\nThe chapters\
    \ in this part provide a thousand-foot view of FastAPI—more like a drone than\
    \ a spy satellite. They cover the basics quickly but stay above the water line\
    \ to avoid drowning you in details. The chapters are relatively short and are\
    \ meant to provide context for the depths of Part III.\n\nAfter you get used to\
    \ the ideas in this part, Part III zooms into those details. That's where you\
    \ can do some serious good, or damage. No judgment; it's up to you.\n\n# CHAPTER\
    \ 3\nFastAPI Tour\n\n> FastAPI is a modern, fast (high-performance) web framework\
    \ for building APIs with Python 3.6+ based on standard Python type hints.\n—Sebastián\
    \ Ramírez, creator of FastAPI\n\n## Preview\n\nFastAPI was announced in 2018 by\
    \ Sebastián Ramírez. It's more modern in many senses than most Python web frameworks—taking\
    \ advantage of features that have been added to Python 3 in the last few years.\
    \ This chapter is a quick overview of FastAPI's main features, with emphasis on\
    \ the first things that you'll want to know: how to handle web requests and responses.\n\
    \n## What Is FastAPI?\n\nLike any web framework, FastAPI helps you build web applications.\
    \ Every framework is designed to make some operations easier—by features, omissions,\
    \ and defaults. As the name implies, FastAPI targets development of web APIs,\
    \ although you can use it for traditional web content applications as well.\n\n\
    The FastAPI website claims these advantages:\n\n- *Performance*\n    As fast as\
    \ Node.js and Go in some cases, unusual for Python frameworks.\n- *Faster development*\n\
    \    No sharp edges or oddities.\n- *Better code quality*\n    Type hinting and\
    \ models help reduce bugs.\n- Autogenerated documentation and test pages\n   \
    \ Much easier than hand-editing OpenAPI descriptions.\n\nFastAPI uses the following:\n\
    \n- Python type hints\n- Starlette for the web machinery, including async support\n\
    - Pydantic for data definitions and validation\n- Special integration to leverage\
    \ and extend the others\n\nThis combination makes a pleasing development environment\
    \ for web applications, especially RESTful web services.\n\n## A FastAPI Application\n\
    \nLet’s write a teeny FastAPI application—a web service with a single endpoint.\
    \ For now, we’re in what I’ve called the Web layer, handling only web requests\
    \ and responses. First, install the basic Python packages that we’ll be using:\n\
    \n- The `FastAPI` framework: `pip install fastapi`\n- The `Uvicorn` web server:\
    \ `pip install uvicorn`\n- The `HTTPie` text web client: `pip install httpie`\n\
    - The `Requests` synchronous web client package: `pip install requests`\n- The\
    \ `HTTPX` synchronous/asynchronous web client package: `pip install httpx`\n\n\
    Although `curl` is the best known text web client, I think HTTPie is easier to\
    \ use. Also, it defaults to JSON encoding and decoding, which is a better match\
    \ for FastAPI. Later in this chapter, you’ll see a screenshot that includes the\
    \ syntax of the curl command line needed to access a particular endpoint.\n\n\
    Let’s shadow an introverted web developer in Example 3-1 and save this code as\
    \ the file `hello.py`.\n\nExample 3-1. A shy endpoint (hello.py)\n\n```\nfrom\
    \ fastapi import FastAPI\n\napp = FastAPI()\n\n@app.get(\"/hi\")\ndef greet():\n\
    \    return \"Hello? World?\"\n```\n\nHere are some points to notice:\n\n- app\
    \ is the top-level FastAPI object that represents the whole web application.\n\
    - @app.get(\"/hi\") is a *path decorator*. It tells FastAPI the following:\n \
    \   - A request for the URL \"/hi\" on this server should be directed to the following\
    \ function.\n    - This decorator applies only to the HTTP GET verb. You can also\
    \ respond to a \"/hi\" URL sent with the other HTTP verbs (PUT, POST, etc.), each\
    \ with a separate function.\n- def greet() is a *path function*—the main point\
    \ of contact with HTTP requests and responses. In this example, it has no arguments,\
    \ but the following sections show that there’s much more under the FastAPI hood.\n\
    \nThe next step is to run this web application in a web server. FastAPI itself\
    \ does not include a web server but recommends Uvicorn. You can start Uvicorn\
    \ and the FastAPI web application in two ways: externally or internally.\n\nTo\
    \ start Uvicorn externally, via the command line, see Example 3-2.\n\nExample\
    \ 3-2. Start Uvicorn with the command line\n\n```\n$ uvicorn hello:app --reload\n\
    ```\n\nThe hello refers to the *hello.py* file, and app is the FastAPI variable\
    \ name within it.\n\nAlternatively, you can start Uvicorn internally in the application\
    \ itself, as in Example 3-3.\n\nExample 3-3. Start Uvicorn internally\n\n```\n\
    from fastapi import FastAPI\n\napp = FastAPI()\n\n@app.get(\"/hi\")\ndef greet():\n\
    \    return \"Hello? World?\"\n\nif __name__ == \"__main__\":\n    import uvicorn\n\
    \    uvicorn.run(\"hello:app\", reload=True)\n```\n\nIn either case, that reload\
    \ tells Uvicorn to restart the web server if *hello.py* changes. In this chapter,\
    \ we’re going to use this automatic reloading a lot.\n\nEither case will use port\
    \ 8000 on your machine (named localhost) by default. Both the external and internal\
    \ methods have host and port arguments if you'd prefer something else.\n\nNow\
    \ the server has a single endpoint (/hi) and is ready for requests.\n\nLet's test\
    \ with multiple web clients:\n\n- For the browser, type the URL in the top location\
    \ bar.\n- For HTTPie, type the command shown (the $ stands for whatever command\
    \ prompt you have for your system shell).\n- For Requests or HTTPX, use Python\
    \ in interactive mode, and type after the >>> prompt.\n\nAs mentioned in the Preface,\
    \ what you type is in a\n\n```\nbold monospaced font\n```\n\nand the output is\
    \ in a\n\n```\nnormal monospaced font\n```\n\nExamples 3-4 through 3-7 show different\
    \ ways to test the web server's brand-new /hi endpoint.\n\nExample 3-4. Test /hi\
    \ in the browser\n\n```\nhttp://localhost:8000/hi\n```\n\nExample 3-5. Test /hi\
    \ with Requests\n\n```\n>>> import requests\n>>> r = requests.get(\"http://localhost:8000/hi\"\
    )\n>>> r.json()\n'Hello? World?'\n```\n\nExample 3-6. Test /hi with HTTPX, which\
    \ is almost identical to Requests\n\n```\n>>> import httpx\n>>> r = httpx.get(\"\
    http://localhost:8000/hi\")\n>>> r.json()\n'Hello? World?'\n```\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_47_0.png)\n\
    \nIt doesn't matter if you use Requests or HTTPX to test FastAPI routes. But Chapter\
    \ 13 shows cases where HTTPX is useful when making other asynchronous calls. So\
    \ the rest of the examples in this chapter use Requests.\n\nExample 3-7. Test\
    \ /hi with HTTPie\n\n```\n$ http localhost:8000/hi\nHTTP/1.1 200 OK\ncontent-length:\
    \ 15\ncontent-type: application/json\ndate: Thu, 30 Jun 2022 07:38:27 GMT\nserver:\
    \ uvicorn\n\n\"Hello? World?\"\n```\n\nUse the -b argument in Example 3-8 to skip\
    \ the response headers and print only the body.\n\nExample 3-8. Test /hi with\
    \ HTTPie, printing only the response body\n\n```\n$ http -b localhost:8000/hi\n\
    \"Hello? World?\"\n```\n\nExample 3-9 gets the full request headers as well as\
    \ the response with -v.\n\nExample 3-9. Test /hi with HTTPie and get everything\n\
    \n```\n$ http -v localhost:8000/hi\nGET /hi HTTP/1.1\nAccept: */*\nAccept-Encoding:\
    \ gzip, deflate\nConnection: keep-alive\nHost: localhost:8000\nUser-Agent: HTTPie/3.2.1\n\
    \nHTTP/1.1 200 OK\ncontent-length: 15\ncontent-type: application/json\ndate: Thu,\
    \ 30 Jun 2022 08:05:06 GMT\nserver: uvicorn\n\n\"Hello? World?\"\n```\n\nSome\
    \ examples in this book show the default HTTPie output (response headers and body),\
    \ and others show just the body.\n\n## HTTP Requests\n\nExample 3-9 included only\
    \ one specific request: a GET request for the /hi URL on the server localhost,\
    \ port 8000.\n\nWeb requests squirrel data in different parts of an HTTP request,\
    \ and FastAPI lets you access them smoothly. From the sample request in Example\
    \ 3-9, Example 3-10 shows the HTTP request that the http command sent to the web\
    \ server.\n\nExample 3-10. An HTTP request\n\n```\nGET /hi HTTP/1.1\nAccept: */*\n\
    Accept-Encoding: gzip, deflate\nConnection: keep-alive\nHost: localhost:8000\n\
    User-Agent: HTTPie/3.2.1\n```\n\nThis request contains the following:\n\n- The\
    \ verb (GET) and path (/hi)\n- Any query parameters (text after any ? in this\
    \ case, none)\n- Other HTTP headers\n- No request body content\n\nFastAPI unsquirrels\
    \ these into handy definitions:\n\n- Header\n    The HTTP headers\n- Path\n  \
    \  The URL\n- Query\n    The query parameters (after the ? at the end of the URL)\n\
    - Body\n    The HTTP body"
