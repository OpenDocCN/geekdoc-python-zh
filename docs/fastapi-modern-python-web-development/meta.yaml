  md: '# CHAPTER 16

    Forms and Templates


    # Preview


    Although the *API* in *FastAPI* is a hint of its main focus, FastAPI can also
    handle traditional web content. This chapter talks about standard HTML forms and
    templates for inserting data into HTML.


    # Forms


    As you''ve seen, FastAPI was mainly designed to build APIs, and its default input
    is JSON. But that doesn''t mean that it can''t serve standard banana HTML, forms,
    and friends.


    FastAPI supports data from HTML forms much as it does from other sources like
    Query and Path, using the Form dependency.


    You''ll need the package Python-Multipart for any FastAPI forms work, so run pip
    install python-multipart if you need to. Also, the *static* directory from Chapter
    15 will be needed to house the test forms in this chapter.


    Let''s redo Example 3-11, but provide the who value via a form instead of a JSON
    string. (Call this path function greet2() to avoid clobbering the old greet()
    path function if it''s still around.) Add Example 16-1 to *main.py*.


    Example 16-1. Get a value from a GET form


    ```

    from fastapi import FastAPI, Form


    app = FastAPI()


    @app.get("/who2")

    ```'
  merge: -1
