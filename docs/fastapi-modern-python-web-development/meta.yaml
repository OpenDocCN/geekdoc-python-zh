  md: '# Databases


    Flask and FastAPI do not include any database handling in their base packages,
    but database handling is a key feature of Django.


    Your site''s Data layer might access a database at different levels:


    +   - Direct SQL (PostgreSQL, SQLite)

    - Direct NoSQL (Redis, MongoDB, Elasticsearch)

    - An ORM that generates SQL

    - An object document/data mapper/manager (ODM) that generates NoSQL


    For relational databases, SQLAlchemy is an excellent package that includes multiple
    access levels, from direct SQL up to an ORM. This is a common choice for Flask
    and FastAPI developers. The author of FastAPI has leveraged both SQLAlchemy and
    Pydantic for the SQLModel package, which is discussed more in Chapter 14.


    Django is often the framework choice for a site with heavy database needs. It
    has its own ORM and an automated database admin page. Although some sources recommend
    letting nontechnical staff use this admin page for routine data management, be
    careful. In one case, I''ve seen a non-expert misunderstand an admin page warning
    message, resulting in the database needing to be manually restored from a backup.


    Chapter 14 discusses FastAPI and databases in more depth.


    # Recommendations


    For API-based services, FastAPI seems to be the best choice now. Flask and FastAPI
    are about equal in terms of getting a service up and running quickly. Django takes
    more time to understand but provides many features of use for larger sites, especially
    those with heavy database reliance.


    # Other Python Web Frameworks


    The current big three Python web frameworks are Flask, Django, and FastAPI. Google
    python web frameworks and you''ll get a wealth of suggestions, which I won''t
    repeat here. A few that might not stand out in those lists but that are interesting
    for one reason or another include the following:


    *Bottle*

    A very minimal (single Python file) package, good for a quick proof of concept'
