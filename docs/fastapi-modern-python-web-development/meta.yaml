    \ again, but `{who}` isn't in the URL on the previous decorator line this time,\
    \ so FastAPI now assumes that `who` is a query parameter. Test with Examples 3-16\
    \ and 3-17.\n\n*Example 3-16. Test Example 3-15 with your browser*\n\n```\nlocalhost:8000/hi?who=Mom\n\
    ```\n\n*Example 3-17. Test Example 3-15 with HTTPie*\n\n```\n$ http -b localhost:8000/hi?who=Mom\n\
    \"Hello? Mom?\"\n```\n\nIn Example 3-18, you can call HTTPie with a query parameter\
