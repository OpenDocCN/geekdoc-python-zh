    \ \"country\": country} |\n| pyformat | name=%(name)s or country=%(country)s |\
    \ {\"name\": name, \"country\": country} |\n\nThe first three take a tuple argument,\
    \ where the parameter order matches the ?, :N, or %s in the statement. The last\
