- img_proc: true
  md: "Double curly braces enclose Python variables that should be inserted, and {%\
    \ and %} enclose if statements, for loops, and other controls. See the Jinja documentation\
    \ for the syntax and examples.\n\nThis template expects to be passed Python variables\
    \ called creatures and explorers, which are lists of Creature and Explorer objects.\n\
    \nExample 16-7 shows what to add to *main.py* to set up templates and use the\
    \ one from Example 16-6. It feeds creatures and explorers to the template, using\
    \ modules under the *fake* directory from previous chapters, which provided test\
    \ data if the database was empty or not connected.\n\nExample 16-7. Configure\
    \ templates and use one (main.py)\n\n```\nfrom pathlib import Path\nfrom fastapi\
    \ import FastAPI, Request\nfrom fastapi.templating import Jinja2Templates\n\n\
    app = FastAPI()\n\ntop = Path(__file__).resolve().parent\n\ntemplate_obj = Jinja2Templates(directory=f\"\
    {top}/template\")\n\n# Get some small predefined lists of our buddies:\nfrom fake.creature\
    \ import fakes as fake_creatures\nfrom fake.explorer import fakes as fake_explorers\n\
    \n@app.get(\"/list\")\ndef explorer_list(request: Request):\n    return template_obj.TemplateResponse(\"\
    list.html\",\n        {\"request\": request,\n        \"explorers\": fake_explorers,\n\
    \        \"creatures\": fake_creatures})\n```\n\nAsk your favorite browser, or\
    \ even one that you don't like very well, for *http://localhost:8000/list*, and\
    \ you should get Figure 16-1 back.\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_236_0.png)\n\
    \nFigure 16-1. Output from /list"
