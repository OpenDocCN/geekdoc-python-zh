  md: "# SQLite Data Source and Web Output\n\nFor the rest of the examples in this\
    \ chapter, you'll read creature data from the SQLite database, using some of the\
    \ website code from earlier chapters. Then you'll slice, dice, and marinate the\
    \ data with different recipes. Instead of simple text output, you'll install each\
    \ example into our ever-growing cryptid website. You'll need a few additions to\
    \ our existing Web, Service, and Data levels.\n\nFirst, you need a Web-level function\
    \ and an associated HTTP GET route to return all the creature data. And you already\
    \ have one! Let's make a web call to get everything, but again show only the first\
    \ few lines (trees, you know). That's Example 17-7, right here.\n\nExample 17-7.\
    \ Run the creature download test (truncated; trees are watching)\n\n```\n$ http\
    \ -b localhost:8000/creature\n[\n    {\n        \"aka\": \"AKA\",\n        \"\
    area\": \"Area\",\n        \"country\": \"Country\",\n        \"description\"\
    : \"Description\",\n        \"name\": \"Name\"\n    },\n    {\n        \"aka\"\
    : \" \",\n        \"area\": \" \",\n        \"country\": \"FJ\",\n        \"description\"\
    : \"Lake eel\",\n        \"name\": \"Abaia\"\n    },\n...\n]\n```\n\n# Chart/Graph\
    \ Packages\n\nNow we can go beyond text to GUIs. Some of the most useful and popular\
    \ Python packages for graphical data displays include the following:\n\n+   -\
    \ **Matplotlib**: Extensive, but needs some fiddling to get the prettiest results\n\
    - **Plotly**: Similar to Matplotlib and Seaborn, with an emphasis on interactive\
    \ graphs\n- **Dash**: Built on Plotly as a sort of data dashboard"
