    \ and development tools are moving targets, and better solutions come along now\
    \ and then.\n\n## Getting Started\n\nYou should be able to write and run a Python\
    \ program like Example 2-1.\n\nExample 2-1. The Python program that goes like\
    \ this: this.py\n\n```\ndef paid_promotion():\n    print(\"(that calls this function!)\"\
    )\n\nprint(\"This is the program\")\npaid_promotion()\nprint(\"that goes like\
    \ this.\")\n```\n\nTo execute this program from the command line in a text window\
    \ or terminal, I'll use the convention of a $ prompt (your system begging you\
    \ to type something, already). What you type after the prompt is shown in **bold\
    \ print**. If saved Example 2-1 to a file named this.py, you can run it as shown\
    \ in Example 2-2.\n\nExample 2-2. Test this.py\n\n```\n$ python this.py\nThis\
    \ is the program\n(that calls this function!)\nthat goes like this.\n```\n\nSome\
