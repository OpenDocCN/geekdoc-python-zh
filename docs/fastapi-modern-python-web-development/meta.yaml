  md: "# Query Parameter\n\nIn Example 7-3, let's repeat Example 3-15, where who is\
    \ passed as a query parameter (after the ? in the URL).\n\nExample 7-3. FastAPI\
    \ query parameter\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\n@app.get(\"\
    /hi\")\ndef greet(who):\n    return f\"Hello? {who}?\"\n```\n\nThe Flask equivalent\
    \ is shown in Example 7-4.\n\nExample 7-4. Flask query parameter\n\n```\nfrom\
    \ flask import Flask, request, jsonify\n\napp = Flask(__name__)\n\n@app.route(\"\
    /hi\", methods=[\"GET\"])\ndef greet():\n    who: str = request.args.get(\"who\"\
    )\n    return jsonify(f\"Hello? {who}?\")\n```\n\nIn Flask, we need to get request\
    \ values from the request object. In this case, args is a dict containing the\
    \ query parameters.\n\n# Body\n\nIn Example 7-5, let's copy old Example 3-21.\n\
    \nExample 7-5. FastAPI body\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\
    \n@app.get(\"/hi\")\ndef greet(who):\n    return f\"Hello? {who}?\"\n```\n\nA\
    \ Flask version looks like Example 7-6."
