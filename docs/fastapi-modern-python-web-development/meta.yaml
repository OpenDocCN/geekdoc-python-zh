  md: '# Elasticsearch


    Elasticsearch is more like a database index than a database itself. It''s often
    used for full-text search.


    # NoSQL Features in SQL Databases


    As noted previously, relational databases were traditionally normalized—constrained
    to follow different levels of rules called *normal forms*. One basic rule was
    that the value in each cell (row-column intersection) had to be a *scalar* (no
    arrays or other structures).


    NoSQL (or *document*) databases supported JSON directly and were usually your
    only choice if you had “uneven” or “ragged” data structures. They were often *denormalized*:
    all the data needed for a document was included with that document. In SQL, you
    often needed to *join* across tables to build a full document.


    However, recent revisions of the SQL standard have allowed JSON data to be stored
    in relational databases also. Some relational databases now let you store complex
    (nonscalar) data in table cells, and even search and index within them. JSON functions
    are supported in various ways for SQLite, PostgreSQL, MySQL, Oracle, and others.


    SQL with JSON can be the best of both worlds. SQL databases have been around much
    longer and have really useful features such as foreign keys and secondary indexes.
    Also, SQL is fairly standardized up to a point, and NoSQL query languages are
    all different.


    Finally, new data design and query languages are trying to combine SQL and NoSQL
    advantages, like EdgeQL that I mentioned earlier.


    So, if you can''t fit your data into the rectangular relational box, look at a
    NoSQL database, a relational database with JSON support, or a “Post-SQL” database.


    # Database Load Testing


    This book is mainly about FastAPI, but websites are so frequently tied to databases.


    The data examples in this book have been tiny. To really stress-test a database,
    millions of items would be great. Rather than think of things to add, it''s easier
    use a Python package like Faker. Faker can generate many kinds of data quickly—names,
    places, or special types that you define.


    In Example 14-3, Faker pumps out names and countries, which are then loaded by
    load() into SQLite.'
