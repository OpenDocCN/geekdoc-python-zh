    \ whole time, instead of being reset between functions. The reason is to allow\
    \ changes from previous functions to persist. With pytest, a fixture can have\
    \ on the following:\n    - Function scope (the default)\n        It's called anew\
    \ before every test function.\n    - Session scope\n        It's called only once,\
    \ at the start.\n- Some tests force the Missing or Duplicate exceptions, and verify\
    \ that they caught them.\n\nSo, each of the tests in Example 10-22 gets a brand-new,\
