  md: "The official HTML incantation is to change the action from a GET to a POST.\
    \ So let's add a POST endpoint for /who2 to main.py in Example 16-4.\n\nExample\
    \ 16-4. Get a value from a POST form\n\n```\nfrom fastapi import FastAPI, Form\n\
    \napp = FastAPI()\n\n@app.post(\"/who2\")\ndef greet3(name: str = Form()):\n \
    \   return f\"Hello, {name}?\"\n```\n\nExample 16-5 is stuff/form2.html, with\
    \ get changed to post.\n\nExample 16-5. Form POST request (static/form2.html)\n\
    \n```\n<form action=\"http://localhost:8000/who2\" method=\"post\">\nSay hello\
    \ to my little friend:\n<input type=\"text\" name=\"name\">\n<input type=\"submit\"\
    >\n</form>\n```\n\nAsk your browser to get off its digital haunches and get this\
    \ new form for you. Fill in **Bob Frapples** and submit the form. This time, you'll\
    \ get the result that you got from HTTPie:\n\n> \"Hello, Bob Frapples?\"\n\nSo,\
    \ if you're submitting forms from HTML files, use POST.\n\n# Templates\n\nYou\
    \ may have seen the word game *Mad Libs*. You ask people to provide a sequence\
    \ of words—nouns, verbs, or something more specific—and you enter them into labeled\
    \ places in a page of text. Once you have all the words, you read the text with\
    \ the inserted values, and hilarity ensues, sometimes with embarrassment.\n\n\
    Well, a web *template* is similar, though usually without the embarrassment. A\
    \ template contains a bunch of text with slots for data to be inserted by the\
    \ server. Its usual purpose is to generate HTML with variable content, unlike\
    \ the *static* HTML of Chapter 15.\n\nUsers of Flask are very familiar with its\
    \ companion project, the template engine Jinja (also often called *Jinja2*). FastAPI\
    \ supports Jinja, as well as other template engines.\n\nMake a directory called\
    \ *template* alongside *main.py* to house Jinja-enhanced HTML files. Inside, make\
    \ a file called *list.html*, as in Example 16-6."
  merge: -1
