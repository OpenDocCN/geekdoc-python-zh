    'Hello? Mom?'\n```\n\nIn each case, you provide the \"Mom\" string in a new way,\
    \ and get it to the path function and through to the eventual response.\n\n##\
    \ Body\n\nWe can provide path or query parameters to a GET endpoint, but not values\
