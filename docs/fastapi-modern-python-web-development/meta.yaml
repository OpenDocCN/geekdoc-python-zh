    : name}\n    curs.execute(qry, params)\n    row = curs.fetchone()\n    return\
    \ row_to_model(row)\n\ndef get_all(name: str) -> list[Creature]:\n    qry = \"\
    select * from creature\"\n    curs.execute(qry)\n    rows = list(curs.fetchall())\n\
    \    return [row_to_model(row) for row in rows]\n\ndef create(creature: Creature):\n\
    \    qry = \"\"\"insert into creature values\n            (:name, :description,\
    \ :country, :area, :aka)\"\"\"\n    params = model_to_dict(creature)\n    curs.execute(qry,\
    \ params)\n\ndef modify(creature: Creature):\n    return creature\n\ndef replace(creature:\
    \ Creature):\n    return creature\n\ndef delete(creature: Creature):\n    qry\
    \ = \"delete from creature where name = :name\"\n    params = {\"name\": creature.name}\n\
    \    curs.execute(qry, params)\n```\n\nNear the top, the init() function makes\
    \ the connection to sqlite3 and the database fake cryptid.db. It stores this in\
    \ the variable conn; this is global within the data/creature.py module. Next,\
    \ the curs variable is a cursor for iterating over data returned by executing\
    \ a SQL SELECT statement; it's also global to the module.\n\nTwo utility functions\
    \ translate between Pydantic models and DB-API:\n\n+   - row_to_model() converts\
    \ a tuple returned by a fetch function to a model object.\n- model_to_dict() translates\
    \ a Pydantic model to a dictionary, suitable for use as a named query parameter.\n\
    \nThe fake CRUD functions that have been present so far in each layer down (Web\
    \ → Service → Data) will now be replaced. They use only plain SQL and the DB-API\
    \ methods in sqlite3."
  - "[PAGE 144]\n\n# Layout\n\nSo far, (fake) data has been modified in steps:\n\n\
    +   1. In Chapter 8, we made the fake *creatures* list in *web/creature.py*.\n\
    2. In Chapter 8, we made the fake *explorers* list in *web/explorer.py*.\n3. In\
    \ Chapter 9, we moved fake *creatures* to *service/creature.py*.\n4. In Chapter\
    \ 9, we moved fake *explorers* to *service/explorer.py*.\n\nNow the data has moved\
    \ for the last time, down to *data/creature.py*. But it's not fake anymore: it's\
    \ real live data, persisting in the SQLite database file *cryptids.db*. Creature\
    \ data, again by lack of imagination, is stored in the SQL table *creature* in\
    \ this database.\n\nOnce you save this new file, Uvicorn should restart from your\
    \ top *main.py*, which calls *web/creature.py*, which calls *service/creature.py*,\
    \ and finally down to this new *data/creature.py*.\n\n# Making It Work\n\nWe have\
    \ one small problem: this module never calls its `init()` function, so there's\
    \ no SQLite conn or curs for the other functions to use. This a configuration\
    \ issue: how do we provide the database information at startup time? Possibilities\
    \ include the following:\n\n+   - Hardwiring the database info in the code, as\
    \ in Example 10-2.\n- Passing the info down through the layers. But this would\
    \ violate the separation of layers; the Web and Service layers should not know\
    \ the internals of the Data layer.\n- Passing the info from a different external\
    \ source, such as\n  - A config file\n  - An environment variable\n\nThe environment\
    \ variable is simple and is endorsed by recommendations like the Twelve-Factor\
    \ App. The code can include a default value if the environment variable isn't\
    \ specified. This approach can also be used in testing, to provide a separate\
    \ test database from the production one.\n\nIn Example 10-3, let's define an environment\
    \ variable called CRYPTID_SQLITE_DB, with the default value *cryptid.db*. Make\
    \ a new file called *data/init.py* for the new database initialization code so\
    \ it can also be reused for the explorer code."
  - "[PAGE 145]\n\n# Example 10-3. New data initialization module data/init.py\n\n\
    ```\n\"\"\"Initialize SQLite database\"\"\"\n\nimport os\nfrom pathlib import\
    \ Path\nfrom sqlite3 import connect, Connection, Cursor, IntegrityError\n\nconn:\
    \ Connection | None = None\ncurs: Cursor | None = None\n\ndef get_db(name: str|None\
    \ = None, reset: bool = False):\n    \"\"\"Connect to SQLite database file\"\"\
    \"\n    global conn, curs\n    if conn:\n        if not reset:\n            return\n\
    \        conn = None\n    if not name:\n        name = os.getenv(\"CRYPTID_SQLITE_DB\"\
    )\n        top_dir = Path(__file__).resolve().parents[1] # repo top\n        db_dir\
    \ = top_dir / \"db\"\n        db_name = \"cryptid.db\"\n        db_path = str(db_dir\
    \ / db_name)\n        name = os.getenv(\"CRYPTID_SQLITE_DB\", db_path)\n    conn\
    \ = connect(name, check_same_thread=False)\n    curs = conn.cursor()\n\nget_db()\n\
    ```\n\nA Python module is a *singleton*, called only once despite multiple imports.\
    \ So, the initialization code in *init.py* is run only once, when the first import\
    \ of it occurs.\n\nLast, modify *data/creature.py* in Example 10-4 to use this\
    \ new module instead:\n\n+   - Mainly, drop lines 4 through 8.\n- Oh, and create\
    \ the creature table in the first place!\n- The table fields are all SQL text\
    \ strings. This is the default column type in SQLite (unlike most SQL databases),\
    \ so you didn't need to include text earlier, but being explicit doesn't hurt.\n\
    - The if not exists avoids clobbering the table after it's been created.\n- The\
    \ name field is the explicit primary key for this table. If this table ever houses\
    \ lots of explorer data, that key will be necessary for fast lookups. The alternative\
    \ is the dreaded table scan, where the database code needs to look at every row\
    \ until it finds a match for name."
