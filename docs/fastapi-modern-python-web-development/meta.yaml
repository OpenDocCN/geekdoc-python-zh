- md: "In the lower “Response body” section, you’ll see the JSON returned for the\
    \ (fake) explorer data that you’ve defined so far:\n\n```json\n[\n  {\n    \"\
    name\": \"Claude Hande\",\n    \"country\": \"FE\",\n    \"description\": \"Scarce\
    \ during full moons\"\n  },\n  {\n    \"name\": \"Noah Weiser\",\n    \"country\"\
    : \"DE\",\n    \"description\": \"Myopic machete man\"\n  }\n]\n```\n\nTry all\
    \ the others. For some (like GET /explorer/{name}), you’ll need to provide an\
    \ input value. You’ll get a response for each, even though a few still do nothing\
    \ until the database code is added. You can repeat these tests near the end of\
    \ Chapters 9 and 10 to ensure that no data pipelines were punctured during these\
    \ code changes.\n\n## Talking to the Service and Data Layers\n\nWhenever a function\
    \ in the Web layer needs data that is managed by the Data layer, that function\
    \ should ask the Service layer to be an intermediary. This requires more code\
    \ and may seem unnecessary, but it’s a good idea:\n\n- As the label on the jar\
    \ says, the Web layer deals with the web, and the Data layer deals with external\
    \ data stores and services. It’s much safer to keep their respective details completely\
    \ separate.\n- The layers can be tested independently. Separation of layer mechanisms\
    \ allows this.\n\nFor a very small site, you could skip the Service layer if it\
    \ doesn’t add any value. Chapter 9 initially defines service functions that do\
    \ little more than pass requests and responses between the Web and Data layers.\
    \ At least keep the Web and Data layers separate, though.\n\nWhat does that Service\
    \ layer function do? You’ll see in the next chapter. Hint: it talks to the Data\
    \ layer, but in a hushed voice so the Web layer doesn’t know exactly what it’s\
    \ saying. But it also defines any specific business logic, such as interactions\
    \ between resources. Mainly, the Web and Data layers should not care what’s going\
    \ on in there. (The Service layer is a Secret Service.)\n\n## Pagination and Sorting\n\
    \nIn web interfaces, when returning many or all things with URL patterns like\
    \ GET /resource, you often want to request the lookup and return of the following:\n\
    \n- Only one thing\n- Possibly many things\n- All things\n\nHow do you get our\
