- md: "## Test!\n\nThe unit and full tests for this new user component are similar\
    \ to those that you've already seen for creatures and explorers. Rather than using\
    \ the ink and paper here, you can view them at this book's accompanying website.¹\n\
    \n## Top Layer\n\nThe previous section defined a new router variable for URLs\
    \ starting with /user, so Example 11-12 adds this subrouter.\n\nExample 11-12.\
    \ Top layer: main.py\n\n```python\nfrom fastapi import FastAPI\nfrom web import\
    \ explorer, creature, user\n\napp = FastAPI()\napp.include_router(explorer.router)\n\
    app.include_router(creature.router)\napp.include_router(user.router)\n```\n\n\
    When Uvicorn autoreloads, the /user/... endpoints should now be available.\n\n\
    That was fun, in a stretched definition of fun. Given all the user code that was\
    \ just created, let's give it something to do.\n\n## Authentication Steps\n\n\
    Here's a review of that heap of code from the previous sections:\n\n- If an endpoint\
    \ has the dependency oauth2_dep() (in web/user.py), a form containing username\
    \ and password fields is generated and sent to the client.\n- After the client\
    \ fills out and submits this form, the username and password (hashed with the\
    \ same algorithm as those already stored in the local database) are matched against\
    \ the local database.\n- If a match occurs, an access token is generated (in JWT\
    \ format) and returned.\n- This access token is passed back to the web server\
    \ as an Authorization HTTP header in subsequent requests. This JWT token is decoded\
    \ on the local server to the username and other details. This name does not need\
    \ to be looked up in the database again.\n- The username is authenticated, and\
    \ the server can do whatever it likes with it.\n\n1 If I were paid by the line,\
    \ fate might have intervened.\n\nWhat can the server do with this hard-won authentication\
    \ information? The server can do the following:\n\n- Generate metrics (this user,\
    \ this endpoint, this time) to help study what's being viewed, by whom, for how\
    \ long, and so on.\n- Save user-specific information.\n\n## JWT\n\nThis section\
    \ contains some details on the JWT. You really don't need them to use all the\
    \ earlier code in this chapter, but if you're a little curious...\n\nA JWT is\
    \ an encoding scheme, not an authentication method. The low-level details are\
    \ defined in RFC 7519. It can be used to convey authentication information for\
    \ OAuth2 (and other methods), and I'll show that here.\n\nA JWT is a readable\
    \ string with three dot-separated sections:\n\n- Header: Encryption algorithm\
    \ used, and token type\n- Payload: ...\n- Signature: ...\n\nEach section consists\
    \ of a JSON string, encoded in Base 64 URL format. Here's an example (which has\
    \ been split at the dots to fit on this page):\n\n```\neyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.\n\
    eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.\n\
    SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c\n```\n\nAs a plain ASCII string that's\
    \ also safe to use in URLs, it can be passed to web servers as part of the URL,\
    \ a query parameter, HTTP header, cookie, and so on.\n\nJWT avoids a database\
    \ lookup, but this also means that you can't detect a revoked authorization directly.\n\
    \n## Third-Party Authentication: OIDC\n\nYou'll often see websites that let you\
    \ log in with an ID and password, or let you log in via your account at a different\
    \ site, like Google, Facebook/Meta, LinkedIn, or many others. These frequently\
    \ use a standard called OpenID Connect (OIDC), which is built atop OAuth2. When\
    \ you connect to an external OIDC-enabled site, you'll get back an OAuth2 access\
    \ token (as in the examples in this chapter), but also an ID token.\n\nThe official\
    \ FastAPI docs don't include example code for integration with OIDC. If you want\
    \ to try it, some third-party packages (FastAPI-specific and more generic) will\
    \ save time over rolling your own implementation:\n\n- FastAPI OIDC\n- fastapi-third-party-auth\n\
    - FastAPI Resource Server\n- oauthlib\n- oic\n- OIDC Client\n- oidc-op\n- OpenID\
    \ Connect\n\nThe [FastAPI Repo Issues page](https://github.com/tiangolo/fastapi/issues)\
    \ includes multiple code examples, and a comment from tiangelo (Sebastián Ramírez)\
    \ that FastAPI OIDC examples will be included in the official docs and tutorials\
    \ in the future.\n\n## Authorization\n\nAuthentication handles the *who* (identity),\
    \ and authorization handles the *what*: which resources (web endpoints) are you\
    \ allowed to access, and in what way? The number of combinations of *who* and\
    \ *what* can be large.\n\nIn this book, explorers and creatures have been the\
    \ main resources. Looking up an explorer, or listing all of them, would typically\
    \ be more “open” than adding or modifying an existing one. If the website is supposed\
    \ to be a reliable interface to some data, write access should be more limited\
    \ than read access. Because, grr, people.\n\nIf every endpoint is completely open,\
    \ you don't need authorization and can skip this section. The simplest authorization\
    \ could be a simple Boolean (is this user an admin or not?); for the examples\
    \ in this book, you might require admin authorization to add, delete, or modify\
    \ an explorer or creature. If your database has lots of entries, you might also\
    \ want to limit the `get_all()` functions with further permissions for non-admins.\
    \ As the website gets more complex, the permissions might become more fine-grained.\n\
    \nLet's look at a progression of authorization cases. We'll use the User table,\
    \ in which the name can be an email, username, or API key; “pair” tables are the\
    \ relational database way of matching entries from two separate tables:\n\n- If\
    \ you want to track only admin visitors and leave the rest anonymous:\n  - Use\
    \ an Admin table of authenticated usernames. You'd look up the name from the Admin\
    \ table, and if matched, compare the hashed passwords from the User table.\n-\
    \ If *all* visitors should be authenticated, but you need to authorize admins\
    \ for only some endpoints:\n  - Authenticate everyone as in the earlier examples\
    \ (from the User table), and then check the Admin table to see if this user is\
    \ also an admin.\n- For more than one type of permission (such as read-only, read,\
    \ write):\n  - Use a Permission definition table.\n  - Use a UserPermission table\
    \ that pairs users and permissions. This is sometimes called an *access control\
    \ list*.\n- If permission combinations are complex, add a level and define *roles*\
    \ (independent sets of permissions):\n  - Create a Role table.\n  - Create a UserRole\
    \ table pairing User and Role entries. This is sometimes called *role-based access\
    \ control* (RBAC).\n\n## Middleware\n\nFastAPI enables insertion of code at the\
    \ Web layer that does the following:\n\n- Intercepts the request\n- Does something\
    \ with the request\n- Passes the request to a path function\n- Intercepts the\
    \ response returned by the patch function\n- Does something with the response\n\
    - Returns the response to the caller\n\nIt's similar to what a Python decorator\
    \ does to the function that it \"wraps.\"\n\nIn some cases, you could use either\
    \ middleware or dependency injection with Depends(). Middleware is handier for\
    \ more global security issues like CORS, which brings up...\n\n## CORS\n\nCross-origin\
    \ resource sharing (CORS) involves communication between other trusted servers\
    \ and your website. If your site has all the frontend and backend code in one\
    \ place, then there's no problem. But these days, it's common to have a JavaScript\
    \ frontend talking to a backend written in something like FastAPI. These servers\
    \ will not have the same *origin*:\n\n*Protocol*\n    http or https\n\n*Domain*\n\
    \    Internet domain, like google.com or localhost\n\n*Port*\n    Numeric TCP/IP\
    \ port on that domain, like 80, 443, or 8000\n\nHow does the backend know a trustable\
    \ frontend from a box of moldy radishes, or a mustache-twirling attacker? That's\
    \ a job for CORS, which specifies what the backend trusts, the most prominent\
    \ being the following:\n\n- Origins\n- HTTP methods\n- HTTP headers\n- CORS cache\
    \ timeout\n\nYou hook into CORS at the Web level. Example 11-13 shows how to allow\
    \ only one frontend server (with the domain *https://ui.cryptids.com*), and any\
    \ HTTP headers or methods.\n\n*Example 11-13. Activate the CORS middleware*\n\n\
    ```python\nfrom fastapi import FastAPI, Request\nfrom fastapi.middleware.cors\
    \ import CORSMiddleware\n\napp = FastAPI()\n\napp.add_middleware(\n    CORSMiddleware,\n\
    \    allow_origins=[\"https://ui.cryptids.com\"],\n    allow_credentials=True,\n\
    \    allow_methods=[\"*\"],\n    allow_headers=[\"*\"],\n    )\n\n@app.get(\"\
    /test_cors\")\n```"
  mdcn: "## 测试！\n\n这个新用户组件的单元测试和完整测试与你之前看到的生物和探索者测试类似。与其在这里使用纸笔，你可以在本书的配套网站上查看它们。¹\n\
    \n## 顶层\n\n上一节为以 /user 开头的 URL 定义了一个新的路由器变量，因此示例 11-12 添加了这个子路由器。\n\n示例 11-12.\
    \ 顶层：main.py\n\n```python\nfrom fastapi import FastAPI\nfrom web import explorer,\
    \ creature, user\n\napp = FastAPI()\napp.include_router(explorer.router)\napp.include_router(creature.router)\n\
    app.include_router(user.router)\n```\n\n当 Uvicorn 自动重载时，/user/... 端点现在应该可用了。\n\
    \n这很有趣，是在“有趣”的宽泛定义下。鉴于刚刚创建的所有用户代码，让我们给它点事情做。\n\n## 认证步骤\n\n以下是前几节中那堆代码的回顾：\n\n\
    - 如果一个端点有依赖项 `oauth2_dep()`（在 `web/user.py` 中），则会生成一个包含用户名和密码字段的表单并发送给客户端。\n-\
    \ 客户端填写并提交此表单后，用户名和密码（使用与本地数据库中已存储的密码相同的算法进行哈希处理）将与本地数据库进行匹配。\n- 如果匹配成功，则会生成一个访问令牌（JWT\
    \ 格式）并返回。\n- 此访问令牌在后续请求中作为 Authorization HTTP 头传回 Web 服务器。此 JWT 令牌在本地服务器上被解码为用户名和其他详细信息。此名称无需再次在数据库中查找。\n\
    - 用户名通过身份验证，服务器可以对其执行任何操作。\n\n1 如果我是按行计酬，命运可能会介入。\n\n服务器可以用这些来之不易的认证信息做什么？服务器可以执行以下操作：\n\
    \n- 生成指标（此用户、此端点、此时间）以帮助研究谁在查看什么、查看了多久等。\n- 保存用户特定信息。\n\n## JWT\n\n本节包含一些关于 JWT\
    \ 的详细信息。你其实不需要它们来使用本章前面的所有代码，但如果你有点好奇……\n\nJWT 是一种编码方案，而不是一种认证方法。其底层细节在 RFC 7519\
    \ 中定义。它可以用于传递 OAuth2（以及其他方法）的认证信息，我将在此展示。\n\nJWT 是一个可读字符串，包含三个由点分隔的部分：\n\n- 头部：使用的加密算法和令牌类型\n\
    - 载荷：...\n- 签名：...\n\n每个部分由一个 JSON 字符串组成，以 Base 64 URL 格式编码。这是一个示例（为了适应页面宽度，已在点处拆分）：\n\
    \n```\neyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.\neyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.\n\
    SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c\n```\n\n作为一个纯 ASCII 字符串，它也可以安全地在 URL\
    \ 中使用，可以作为 URL 的一部分、查询参数、HTTP 头、Cookie 等传递给 Web 服务器。\n\nJWT 避免了数据库查找，但这也意味着你无法直接检测到已撤销的授权。\n\
    \n## 第三方认证：OIDC\n\n你经常会看到允许你使用 ID 和密码登录的网站，或者允许你通过其他网站（如 Google、Facebook/Meta、LinkedIn\
    \ 或许多其他网站）的账户登录。这些通常使用一种称为 OpenID Connect (OIDC) 的标准，该标准构建在 OAuth2 之上。当你连接到支持外部\
    \ OIDC 的站点时，你会收到一个 OAuth2 访问令牌（如本章示例所示），以及一个 ID 令牌。\n\nFastAPI 的官方文档不包含与 OIDC\
    \ 集成的示例代码。如果你想尝试，一些第三方包（FastAPI 特定的和更通用的）将比自己实现更节省时间：\n\n- FastAPI OIDC\n- fastapi-third-party-auth\n\
    - FastAPI Resource Server\n- oauthlib\n- oic\n- OIDC Client\n- oidc-op\n- OpenID\
    \ Connect\n\n[FastAPI Repo Issues 页面](https://github.com/tiangolo/fastapi/issues)\
    \ 包含多个代码示例，以及 tiangelo (Sebastián Ramírez) 的评论，表示 FastAPI OIDC 示例将来会包含在官方文档和教程中。\n\
    \n## 授权\n\n认证处理 *谁*（身份），授权处理 *什么*：你被允许访问哪些资源（Web 端点），以及以何种方式访问？*谁* 和 *什么* 的组合数量可能很大。\n\
    \n在本书中，探索者和生物一直是主要资源。查找一个探索者，或列出所有探索者，通常比添加或修改现有探索者更“开放”。如果网站应该是某些数据的可靠接口，那么写访问权限应该比读访问权限更受限。因为，呃，人们。\n\
    \n如果每个端点都是完全开放的，你不需要授权，可以跳过本节。最简单的授权可以是一个简单的布尔值（此用户是否是管理员？）；对于本书中的示例，你可能需要管理员授权来添加、删除或修改探索者或生物。如果你的数据库有很多条目，你可能还想通过进一步的权限限制非管理员的\
    \ `get_all()` 函数。随着网站变得越来越复杂，权限可能会变得更加细粒度。\n\n让我们看看授权案例的演进。我们将使用 User 表，其中 name\
    \ 可以是电子邮件、用户名或 API 密钥；“配对”表是关系数据库中匹配两个独立表条目的方式：\n\n- 如果你只想跟踪管理员访客，其余保持匿名：\n  -\
    \ 使用一个已认证用户名的 Admin 表。你会从 Admin 表中查找名称，如果匹配，则比较 User 表中的哈希密码。\n- 如果*所有*访客都应经过身份验证，但你只需要为某些端点授权管理员：\n\
    \  - 如前面的示例所示（从 User 表）对每个人进行身份验证，然后检查 Admin 表以查看此用户是否也是管理员。\n- 对于多种权限类型（例如只读、读、写）：\n\
    \  - 使用权限定义表。\n  - 使用一个将用户和权限配对的 UserPermission 表。这有时称为*访问控制列表*。\n- 如果权限组合很复杂，添加一个级别并定义*角色*（独立的权限集）：\n\
    \  - 创建一个 Role 表。\n  - 创建一个将 User 和 Role 条目配对的 UserRole 表。这有时称为*基于角色的访问控制* (RBAC)。\n\
    \n## 中间件\n\nFastAPI 允许在 Web 层插入代码，执行以下操作：\n\n- 拦截请求\n- 对请求执行某些操作\n- 将请求传递给路径函数\n\
    - 拦截路径函数返回的响应\n- 对响应执行某些操作\n- 将响应返回给调用者\n\n这类似于 Python 装饰器对其“包装”的函数所做的操作。\n\n\
    在某些情况下，你可以使用中间件或使用 `Depends()` 的依赖注入。中间件对于更全局的安全问题（如 CORS）更方便，这就引出了……\n\n## CORS\n\
    \n跨源资源共享 (CORS) 涉及其他受信任服务器与你的网站之间的通信。如果你的站点将所有前端和后端代码放在一个地方，那么就没有问题。但如今，通常有一个\
    \ JavaScript 前端与用 FastAPI 等编写的后端进行通信。这些服务器将没有相同的*源*：\n\n*协议*\n    http 或 https\n\
    \n*域名*\n    互联网域名，如 google.com 或 localhost\n\n*端口*\n    该域上的数字 TCP/IP 端口，如 80、443\
