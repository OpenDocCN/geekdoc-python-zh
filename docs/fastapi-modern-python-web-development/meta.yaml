    \ field must have a value.\n\nIn Example 5-9, pass the arguments in any order\
    \ if you include their names.\n\n### Example 5-9. Create a creature\n\n```python\n\
    >>> thing = Creature(\n...     name=\"yeti\",\n...     country=\"CN\",\n...  \
    \   area=\"Himalayas\",\n...     description=\"Hirsute Himalayan\",\n...     aka=\"\
    Abominable Snowman\")\n>>> print(\"Name is\", thing.name)\nName is yeti\n```\n\
    \nFor now, Example 5-10 defines a teeny source of data; in later chapters, databases\
    \ will do this. The type hint `list[Creature]` tells Python that this is a list\
    \ of `Creature` objects only.\n\n### Example 5-10. Define fake data in data.py\n\
    \n```python\nfrom model import Creature\n\n_creatures: list[Creature] = [\n  \
    \  Creature(name=\"yeti\",\n             country=\"CN\",\n             area=\"\
    Himalayas\",\n             description=\"Hirsute Himalayan\",\n             aka=\"\
    Abominable Snowman\"\n             ),\n    Creature(name=\"sasquatch\",\n    \
    \         country=\"US\",\n             area=\"*\",\n```"
