    TypeError: cannot unpack non-iterable NoneType object\n```\n\nWhat's a good way\
    \ to catch these at the bottom (Data) layer, and communicate the details to the\
    \ top (Web)? Possibilities include the following:\n\n-   Let SQLite cough up a\
    \ hairball (exception) and deal with it in the Web layer.\n    — But: this mixes\
    \ the layers, which is *Bad*. The Web layer should not know anything about specific\
    \ databases.\n-   Make every function in the Service and Data layers return Explorer\
    \ | None where they used to return Explorer. Then a None indicates failure. (You\
    \ can shorten this by defining OptExplorer = Explorer | None in *model/explorer.py*.)\n\
    \    — But: the function may have failed for more than one reason, and you might\
    \ want details. And this requires lots of code editing.\n-   Define exceptions\
    \ for Missing and Duplicate data, including details of the problem. These will\
    \ flow up through the layers with no code changes until the Web path functions\
    \ catch them. They're also application specific rather than database specific,\
    \ preserving the sanctity of the layers.\n    — But: actually, I like this one,\
    \ so it goes in Example 10-16.\n\n## Example 10-16. Define a new top-level errors.py\n\
    \n```\nclass Missing(Exception):\n    def __init__(self, msg:str):\n        self.msg\
    \ = msg\n\nclass Duplicate(Exception):\n    def __init__(self, msg:str):\n   \
    \     self.msg = msg\n```\n\nEach of these exceptions has a msg string attribute\
    \ that can inform the higher-level code of what happened.\n\nTo implement this,\
    \ in Example 10-17, have data/init.py import the DB-API exception that SQLite\
    \ would raise for a duplicate.\n\n## Example 10-17. Add a SQLite exception import\
    \ into data/init.py\n\n```\nfrom sqlite3 import connect, IntegrityError\n```\n\
    \nImport and catch this error in Example 10-18.\n\n## Example 10-18. Modify data/explorer.py\
    \ to catch and raise these exceptions\n\n```\nfrom init import (conn, curs, IntegrityError)\n\
    from model.explorer import Explorer\nfrom error import Missing, Duplicate\n\n\
    curs.execute(\"\"\"create table if not exists explorer(\n                name\
    \ text primary key,\n                country text,\n                description\
    \ text)\"\"\")\n\ndef row_to_model(row: tuple) -> Explorer:\n    name, country,\
    \ description = row\n    return Explorer(name=name,\n        country=country,\
    \ description=description)\n\ndef model_to_dict(explorer: Explorer) -> dict:\n\
    \    return explorer.dict()\n\ndef get_one(name: str) -> Explorer:\n    qry =\
    \ \"select * from explorer where name=:name\"\n    params = {\"name\": name}\n\
    \    curs.execute(qry, params)\n    row = curs.fetchone()\n    if row:\n     \
    \   return row_to_model(row)\n    else:\n        raise Missing(msg=f\"Explorer\
    \ {name} not found\")\n\ndef get_all() -> list[Explorer]:\n    qry = \"select\
    \ * from explorer\"\n    curs.execute(qry)\n    return [row_to_model(row) for\
    \ row in curs.fetchall()]\n\ndef create(explorer: Explorer) -> Explorer:\n   \
    \ if not explorer: return None\n    qry = \"\"\"insert into explorer (name, country,\
    \ description) values\n            (:name, :country, :description)\"\"\"\n   \
    \ params = model_to_dict(explorer)\n    try:\n        curs.execute(qry, params)\n\
    \    except IntegrityError:\n        raise Duplicate(msg=\n            f\"Explorer\
    \ {explorer.name} already exists\")\n    return get_one(explorer.name)\n\ndef\
    \ modify(name: str, explorer: Explorer) -> Explorer:\n    if not (name and explorer):\
    \ return None\n    qry = \"\"\"update explorer\n            set name=:name,\n\
    \            country=:country,\n            description=:description\n       \
    \     where name=:name_orig\"\"\"\n    params = model_to_dict(explorer)\n    params[\"\
    name_orig\"] = explorer.name\n    curs.execute(qry, params)\n    if curs.rowcount\
    \ == 1:\n        return get_one(explorer.name)\n    else:\n        raise Missing(msg=f\"\
    Explorer {name} not found\")\n\ndef delete(name: str):\n    if not name: return\
    \ False\n    qry = \"delete from explorer where name = :name\"\n    params = {\"\
    name\": name}\n    curs.execute(qry, params)\n    if curs.rowcount != 1:\n   \
    \     raise Missing(msg=f\"Explorer {name} not found\")\n```\n\nThis drops the\
    \ need to declare that any functions return Explorer | None or Optional[Explorer].\
    \ You indicate type hints only for normal return types, not exceptions. Because\
    \ exceptions flow upward independent of the call stack until someone catches them,\
    \ for once you don't have to change anything in the Service layer. But here's\
    \ the new web/explorer.py in Example 10-19, with exception handlers and appropriate\
    \ HTTP status code returns.\n\n## Example 10-19. Handle Missing and Duplicate\
    \ exceptions in web/explorer.py\n\n```\nfrom fastapi import APIRouter, HTTPException\n\
    from model.explorer import Explorer\nfrom service import explorer as service\n\
    from error import Duplicate, Missing\n\nrouter = APIRouter(prefix = \"/explorer\"\
    )\n\n@router.get(\"\")\n@router.get(\"/\")\ndef get_all() -> list[Explorer]:\n\
    \    return service.get_all()\n\n@router.get(\"/{name}\")\ndef get_one(name) ->\
    \ Explorer:\n    try:\n        return service.get_one(name)\n    except Missing\
    \ as exc:\n        raise HTTPException(status_code=404, detail=exc.msg)\n\n@router.post(\"\
    \", status_code=201)\n@router.post(\"/\", status_code=201)\ndef create(explorer:\
    \ Explorer) -> Explorer:\n    try:\n        return service.create(explorer)\n\
    \    except Duplicate as exc:\n        raise HTTPException(status_code=404, detail=exc.msg)\n\
    \n@router.patch(\"/\")\ndef modify(name: str, explorer: Explorer) -> Explorer:\n\
    \    try:\n        return service.modify(name, explorer)\n    except Missing as\
    \ exc:\n        raise HTTPException(status_code=404, detail=exc.msg)\n\n@router.delete(\"\
    /{name}\", status_code=204)\ndef delete(name: str):\n    try:\n        return\
    \ service.delete(name)\n    except Missing as exc:\n        raise HTTPException(status_code=404,\
    \ detail=exc.msg)\n```\n\nTest these changes in Example 10-20.\n\n## Example 10-20.\
    \ Test Get One nonexistent explorer again, with new Missing exception\n\n```\n\
    $ http localhost:8000/explorer/\"Beau Buffalo\"\nHTTP/1.1 404 Not Found\ncontent-length:\
    \ 44\ncontent-type: application/json\ndate: Mon, 27 Feb 2023 21:11:27 GMT\nserver:\
    \ uvicorn\n\n{\n    \"detail\": \"Explorer Beau Buffalo not found\"\n}\n```\n\n\
    Good. Now, try the evil clone attempt again in Example 10-21.\n\n## Example 10-21.\
    \ Test duplicate fix\n\n```\n$ http post localhost:8000/explorer name=\"Beau Buffette\"\
    \ country=\"US\"\nHTTP/1.1 404 Not Found\ncontent-length: 50\ncontent-type: application/json\n\
    date: Mon, 27 Feb 2023 21:14:00 GMT\nserver: uvicorn\n\n{\n    \"detail\": \"\
    Explorer Beau Buffette already exists\"\n}\n```\n\nThe missing checks would also\
    \ apply to the Modify and Delete endpoints. You can try writing similar tests\
    \ for them.\n\n# Unit Tests\n\nUnit tests deal only with the Data layer, checking\
    \ the database calls and SQL syntax. I've put this section after the full tests\
    \ because I wanted to have the Missing and Duplicate exceptions already defined,\
    \ explained, and coded into data/creature.py. Example 10-22 lists the test script\
    \ test/unit/data/test_creature.py. Here are some points to note:\n\n-   You set\
    \ the environment variable CRYPTID_SQLITE_DATABASE to \":memory:\" before importing\
    \ init or creature from data. This value makes SQLite work completely in memory,\
    \ not stomping any existing database file, or even creating a file on disk. It's\
    \ checked in data/init.py when that module is first imported.\n-   The fixture\
    \ named sample is passed to the functions that need a Creature object."
