    # CHAPTER 7

    Framework Comparisons


    > You don''t need a framework. You need a painting, not a frame.

    —Klaus Kinski, actor


    # Preview


    For developers who have used Flask, Django, or popular Python web frameworks,
    this chapter points out FastAPI''s similarities and differences. It does not go
    into every excruciating detail, because, otherwise, the binding glue wouldn''t
    hold this book together. This chapter''s comparisons can be useful if you''re
    thinking of migrating an application from one of these frameworks to FastAPI or
    are just curious.


    One of the first things you might like to know about a new web framework is how
    to get started, and a top-down way is by defining *routes* (mappings from URLs
    and HTTP methods to functions). The next section compares how to do this with
    FastAPI and Flask, because they''re more similar to one another than Django and
    are more likely to be considered together for similar applications.


    # Flask


    Flask calls itself a *microframework*. It provides the basics, and you download
    third-party packages to supplement it as needed. It''s smaller than Django, and
    faster to learn when you''re getting started.


    Flask is synchronous, based on WSGI rather than ASGI. A new project called quart
    is replicating Flask and adding ASGI support.


    Let''s start at the top, showing how Flask and FastAPI define web routing.'
  - "[PAGE 101]\n\n# Path\n\nAt the top level, Flask and FastAPI both use a decorator\
    \ to associate a route with a web endpoint. In Example 7-1, let's duplicate Example\
    \ 3-11 (from back in Chapter 3), which gets the person to greet from the URL path.\n\
    \nExample 7-1. FastAPI path\n\n```\nfrom fastapi import FastAPI\n\napp = FastAPI()\n\
    \n@app.get(\"/hi/{who}\")\ndef greet(who: str):\n    return f\"Hello? {who}?\"\
    \n```\n\nBy default, FastAPI converts that f\"Hello? {who}?\" string to JSON and\
    \ returns it to the web client.\n\nExample 7-2 shows how Flask would do it.\n\n\
    Example 7-2. Flask path\n\n```\nfrom flask import Flask, jsonify\n\napp = Flask(__name__)\n\
    \n@app.route(\"/hi/<who>\", methods=[\"GET\"])\ndef greet(who: str):\n    return\
    \ jsonify(f\"Hello? {who}?\")\n```\n\nNotice that the who in the decorator is\
    \ now bounded by < and >. In Flask, the method needs to be included as an argument—unless\
    \ it's the default, GET. So methods=[\"GET\"] could have been omitted here, but\
    \ being explicit never hurts.\n\n![](img/1d00ed3e85bc756220a3f1a1e9a9664f_101_0.png)\n\
    \nFlask 2.0 supports the FastAPI-style decorators like @app.get instead of app.route.\n\
    \nThe Flask jsonify() function converts its argument to a JSON string and returns\
    \ it, along with the HTTP response header indicating that it's JSON. If you're\
    \ returning a dict (not other data types), recent versions of Flask will automatically\
    \ convert it to JSON and return it. Calling jsonify() explicitly works for all\
    \ data types, including dict."
