  md: '# CHAPTER 10

    Data Layer


    > If I''m not mistaken, I think Data was the comic relief on the show.

    —Brent Spiner, *Star Trek: The Next Generation*


    # Preview


    This chapter finally creates a persistent home for our site''s data, at last connecting
    the three layers. It uses the relational database SQLite and introduces Python''s
    database API, aptly named DB-API. Chapter 14 goes into much more detail on databases,
    including the SQLAlchemy package and nonrelational databases.


    # DB-API


    For over 20 years, Python has included a basic definition for a relational database
    interface called DB-API: PEP 249. Anyone who writes a Python driver for a relational
    database is expected to at least include support for DB-API, although other features
    may be included.


    These are the main DB-API functions:


    +   - Create a connection conn to the database with `connect()`.

    - Create a cursor curs with `conn.cursor()`.

    - Execute a SQL string stmt with `curs.execute(stmt)`.'
  merge: -1
  pgno: 140
- img_proc: true
  md: "The execute...() functions run a SQL statement *stmt* string with optional\
    \ parameters, listed here:\n\n+   - execute(*stmt*) if there are no parameters\n\
    - execute(*stmt*, *params*), with parameters *params* in a single sequence (list\
    \ or tuple) or dict\n- executemany(*stmt*, *params_seq*), with multiple parameter\
    \ groups in the sequence *params_seq*\n\nThere are five ways of specifying parameters,\
    \ and not all are supported by all database drivers. If we have a statement *stmt*\
    \ that begins with \"select * from creature where\", and we want to specify string\
    \ parameters for the creature's name *or* country, the rest of the *stmt* string\
    \ and its parameters would look like those in Table 10-1.\n\nTable 10-1. Specifying\
    \ the statement and parameters\n\n| Type | Statement part | Parameters part |\n\
    |---|---|---|\n| qmark | name=? or country=? | (name, country) |\n| numeric |\
    \ name=:0 or country=:1 | (name, country) |\n| format | name=%s or country=%s\
    \ | (name, country) |\n| named | name=:name or country=:country | {\"name\": name,\
    \ \"country\": country} |\n| pyformat | name=%(name)s or country=%(country)s |\
    \ {\"name\": name, \"country\": country} |\n\nThe first three take a tuple argument,\
    \ where the parameter order matches the ?, :N, or %s in the statement. The last\
    \ two take a dictionary, where the keys match the names in the statement.\n\n\
    So, the full call for the *named* style would look like Example 10-1.\n\nExample\
    \ 10-1. Using named-style parameters.\n\n```\nstmt = \"\"\"select * from creature\
    \ where\n    name=:name or country=:country\"\"\"\nparams = {\"name\": \"yeti\"\
    , \"country\": \"CN\"}\ncurs.execute(stmt, params)\n```"
  merge: -1
  pgno: 141
- img_proc: true
  md: "For SQL INSERT, DELETE, and UPDATE statements, the returned value from execute()\
    \ tells you how it worked. For SELECT, you iterate over returned data row(s),\
    \ as Python tuples, with a fetch method:\n\n+   - fetchone() returns one tuple,\
    \ or None.\n- fetchall() returns a sequence of tuples.\n- fetchmany(num) returns\
    \ up to num tuples.\n\n# SQLite\n\nPython includes support for one database (SQLite)\
    \ with the module sqlite3 in its standard packages.\n\nSQLite is unusual: it has\
    \ no separate database server. All the code is in a library, and storage is in\
    \ a single file. Other databases run separate servers, and clients communicate\
    \ with them over TCP/IP, using specific protocols. Let's use SQLite as the first\
    \ physical data store for this website. Chapter 14 will include other databases,\
    \ relational and not, as well as more advanced packages like SQLAlchemy and techniques\
    \ like ORMs.\n\nFirst, we need to define how the data structures we've been using\
    \ in the website (models) can be represented in the database. So far, our only\
    \ models have been simple and similar, but not identical: Creature and Explorer.\
    \ They will change as we think of more things to do with them and let the data\
    \ evolve without massive code changes.\n\nExample 10-2 shows the bare DB-API code\
    \ and SQL to create and work with the first tables. It uses named argument strings\
    \ (values are represented like name), which are supported by the sqlite3 package.\n\
    \nExample 10-2. Create the file data/creature.py using sqlite3\n\n```\nimport\
    \ sqlite3\nfrom model.creature import Creature\n\nDB_NAME = \"cryptid.db\"\nconn\
    \ = sqlite3.connect(DB_NAME)\ncurs = conn.cursor()\n\ndef init():\n    curs.execute(\"\
    create table creature(name, description, country, area, aka)\")\n\ndef row_to_model(row:\
    \ tuple) -> Creature:\n    name, description, country, area, aka = row\n    return\
    \ Creature(name, description, country, area, aka)\n\ndef model_to_dict(creature:\
    \ Creature) -> dict:\n```"
  merge: -1
