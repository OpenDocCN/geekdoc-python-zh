  md: "# FastAPI and Async\n\nAfter that long field trip over hill and dale, let's\
    \ get back to FastAPI and why any of it matters.\n\nBecause web servers spend\
    \ a lot of time waiting, performance can be increased by avoiding some of that\
    \ waiting—in other words, concurrency. Other web servers use many of the methods\
    \ mentioned earlier: threads, gevent, and so on. One of the reasons that FastAPI\
    \ is one of the fastest Python web frameworks is its incorporation of async code,\
    \ via the underlying Starlette package's ASGI support, and some of its own inventions.\n\
    \n> The use of async and await on their own does not make code run faster. In\
    \ fact, it might be a little slower, from async setup overhead. The main use of\
    \ async is to avoid long waits for I/O.\n\nNow, let's look at our earlier web\
    \ endpoint calls and see how to make them async.\n\nThe functions that map URLs\
    \ to code are called *path functions* in the FastAPI docs. I've also called them\
    \ *web endpoints*, and you saw synchronous examples of them in Chapter 3. Let's\
    \ make some async ones. As in those earlier examples, we'll just use simple types\
    \ like numbers and strings for now. Chapter 5 introduces *type hints* and Pydantic,\
    \ which we'll need to handle fancier data structures.\n\nExample 4-5 revisits\
    \ the first FastAPI program from the previous chapter and makes it asynchronous.\n\
    \nExample 4-5. A shy async endpoint (greet_async.py)\n\n```\nfrom fastapi import\
    \ FastAPI\nimport asyncio\n\napp = FastAPI()\n\n@app.get(\"/hi\")\nasync def greet():\n\
    \    await asyncio.sleep(1)\n    return \"Hello? World?\"\n```\n\nTo run that\
    \ chunk of web code, you need a web server like Uvicorn.\n\nThe first way is to\
    \ run Uvicorn on the command line:\n\n```\n$ uvicorn greet_async:app\n```"
