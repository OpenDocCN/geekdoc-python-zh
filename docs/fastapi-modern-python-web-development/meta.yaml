- img_proc: true
  md: '![](img/1d00ed3e85bc756220a3f1a1e9a9664f_113_0.png)


    You''ll see disagreement about the relative merits of PUT versus PATCH. If you
    don''t need to distinguish between a partial modification and a full one (replacement),
    you may not need both.


    General RESTful rules for combining verbs and URLs containing resources and IDs
    use these patterns of path parameters (content between the / in the URL):


    verb /resource/

    Apply verb to all resources of type resource.


    verb /resource/id

    Apply verb to the resource with ID id.


    Using the example data for this book, a GET request to the endpoint /thing would
    return data on all explorers, but a GET request for /thing/abc would give you
    data for only the thing resource with ID abc.


    Finally, web requests often carry more information, indicating to do the following:


    +   - Sort results

    - Paginate results

    - Perform another function


    Parameters for these can sometimes be expressed as path parameters (tacked onto
    the end, after another /) but are often included as query parameters (var=val
    stuff after the ? in the URL). Because URLs have size limits, large requests are
    often conveyed in the HTTP body.


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_113_1.png)


    Most authors recommend using plurals when naming the resource, and related namespaces
    like API sections and database tables. I followed this advice for a long time
    but now feel that singular names are simpler for many reasons (including oddities
    of the English language):


    +   - Some words are their own plurals: series, fish

    - Some words have irregular plurals: children, people

    - You need bespoke singular to/from plural conversion code in many places


    For these reasons, I''m using a singular naming scheme in many places in this
    book. This is against usual RESTful advice, so feel free to ignore this if you
    disagree.'
