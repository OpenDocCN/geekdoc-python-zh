  md: "```\ndef greet2(name: str = Form()):\n    return f\"Hello, {name}?\"\n```\n\
    \nThe main difference is that the value comes from Form instead of Path, Query,\
    \ and the others from Chapter 3.\n\nTry an initial form test with HTTPie in Example\
    \ 16-2 (you need that -f to upload with form encoding rather than as JSON).\n\n\
    Example 16-2. Form GET request with HTTPie\n\n```\n$ http -f -b GET localhost:8000/who2\
    \ name=\"Bob Frapples\"\n\"Hello, Bob Frapples?\"\n```\n\nYou could also send\
    \ a request from a standard HTML form file. Chapter 15 showed how to make a directory\
    \ called static (accessed under the URL /static) that could house anything, including\
    \ HTML files, so in Example 16-3, let's put this file (form1.html) there.\n\n\
    Example 16-3. Form GET request (static/form1.html)\n\n```\n<form action=\"http://localhost:8000/who2\"\
    \ method=\"get\">\nSay hello to my little friend:\n<input type=\"text\" name=\"\
    name\" value=\"Bob Frapples\">\n<input type=\"submit\">\n</form>\n```\n\nIf you\
    \ ask your browser to load http://localhost:8000/static/form1.html, you'll see\
    \ a form. If you fill in any test string, you'll get this back:\n\n```\n\"detail\"\
    :[{\"loc\":[\"body\",\"name\"],\n            \"msg\":\"field required\",\n   \
    \         \"type\":\"value_error.missing\"}]\n```\n\nHuh?\n\nLook at the window\
    \ where Uvicorn is running to see what its log says:\n\n```\nINFO:     127.0.0.1:63502\
    \ -\n          \"GET /who2?name=rr23r23 HTTP/1.1\"\n422 Unprocessable Entity\n\
    ```\n\nWhy did this form send name as a query parameter when we had it in a form\
    \ field? That turns out to be an HTML weirdness, documented on the W3C website.\
    \ Also, if you had any query parameters in your URL, it will erase them and replace\
    \ them with name.\n\nSo, why did HTTPie handle it as expected? I don't know. It's\
    \ an inconsistency to be aware of."
