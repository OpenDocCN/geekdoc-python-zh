    Name is\", namedtuple_thing.name)\nName is yeti\n```\n\n你不能使用 `namedtuple_thing[\"\
    name\"]`。它是元组，不是字典，因此索引必须是整数。\n\n示例 5-6 定义了一个新的 Python 类，并使用 `self` 添加了所有属性。但仅仅定义它们就需要输入大量代码。\n\
    \n### 示例 5-6. 使用标准类\n\n```python\n>>> class CreatureClass():\n...     def __init__(self,\n\
    ...         name: str,\n...         country: str,\n...         area: str,\n...\
    \         description: str,\n...         aka: str):\n...         self.name = name\n\
    ...         self.country = country\n...         self.area = area\n...        \
    \ self.description = description\n...         self.aka = aka\n...\n>>> class_thing\
