  md: '# CHAPTER 6

    Dependencies


    # Preview


    One of the very nice design features of FastAPI is a technique called *dependency
    injection*. This term sounds technical and esoteric, but it''s a key aspect of
    FastAPI and is surprisingly useful at many levels. This chapter looks at FastAPI''s
    built-in capabilities as well as how to write your own.


    # What''s a Dependency?


    A *dependency* is specific information that you need at some point. The usual
    way to get this information is to write code that gets it, right when you need
    it.


    When you''re writing a web service, at some time you may need to do the following:


    +   - Gather input parameters from the HTTP request

    - Validate inputs

    - Check user authentication and authorization for some endpoints

    - Look up data from a data source, often a database

    - Emit metrics, logs, or tracking information


    Web frameworks convert the HTTP request bytes to data structures, and you pluck
    what you need from them inside your Web layer functions as you go.'
  merge: -1
  pgno: 94
- img_proc: true
  md: '# Problems with Dependencies


    Getting what you want, right when you need it, and without external code needing
    to know how you got it, seems pretty reasonable. But it turns out that consequences
    exist:


    *Testing*

    You can''t test variations of your function that could look up the dependency
    differently.


    *Hidden dependencies*

    Hiding the details means that code your function needs could break when external
    code changes.


    *Code duplication*

    If your dependency is a common one (like looking up a user in a database or combining
    values from an HTTP request), you might duplicate the lookup code in multiple
    functions.


    *OpenAPI visibility*

    The automatic test page that FastAPI makes for you needs information from the
    dependency injection mechanism.


    # Dependency Injection


    The term *dependency injection* is simpler than it sounds: pass any *specific*
    information that a function needs *into* the function. A traditional way to do
    this is to pass in a helper function, which you then call to get the specific
    data.


    # FastAPI Dependencies


    FastAPI goes one step more: you can define dependencies as arguments to your function,
    and they are *automatically* called by FastAPI and pass in the *values* that they
    return. For example, a `user_dep` dependency could get the user''s name and password
    from HTTP arguments, look them up in a database, and return a token that you use
    to track that user afterward. Your web-handling function doesn''t ever call this
    directly; it''s handled at function call time.


    You''ve already seen some dependencies but didn''t see them referred to as such:
    HTTP data sources like `Path`, `Query`, `Body`, and `Header`. These are functions
    or Python classes that dig the requested data from various areas in the HTTP request.
    They hide the details, like validity checks and data formats.'
