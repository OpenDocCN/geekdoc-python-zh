    # Multiple Workers


    You''ve probably seen another Python server called Gunicorn. This can supervise
    multiple workers, but it''s a WSGI server, and FastAPI is based on ASGI. Luckily,
    there''s a special Uvicorn worker class that can be managed by Gunicorn.


    Example 13-1 sets up these Uvicorn workers on localhost, port 8000 (this is adapted
    from the official documentation). The quotes protect the shell from any special
    interpretation.


    Example 13-1. Use Gunicorn with Uvicorn workers


    ```

    $ pip install "uvicorn[standard]" gunicorn

    $ gunicorn main:app --workers 4 --worker-class \nuvicorn.workers.UvicornWorker
    --bind 0.0.0.0:8000

    ```


    You''ll see many lines as Gunicorn does your bidding. It will start a top-level
    Gunicorn process, talking to four Uvicorn worker subprocesses, all sharing port
    8000 on local host (0.0.0.0). Change the host, port, or number of workers if you
    want something else. The main:app refers to main.py and the FastAPI object with
    the variable name app. The Gunicorn docs claim the following:


    > Gunicorn should only need 4-12 worker processes to handle hundreds or thousands
    of requests per second.


    It turns out that Uvicorn itself can also fire up multiple Uvicorn workers, as
    in Example 13-2.


    Example 13-2. Use Uvicorn with Uvicorn workers


    ```

    $ uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4

    ```


    But this method doesn''t do process management, so the gunicorn method is usually
    preferred. Other process managers exist for Uvicorn: see its official docs.


    This handles three of the four jobs mentioned in the previous section, but not
    HTTPS encryption.'
  - '[PAGE 204]


    # HTTPS


    The official FastAPI [HTTPS docs](https://fastapi.tiangolo.com/deployment/https/),
    like all of the official FastAPI docs, are extremely informative. I recommend
    reading them, followed by Ramírez''s [description](https://testdriven.io/blog/fastapi-docker-https/)
    of how to add HTTPS support to FastAPI by using [Traefik](https://traefik.io/).
    Traefik sits “above” your web servers, similar to nginx as a reverse proxy and
    load balancer, but it includes that HTTPS magic.


    Although the process has many steps, it’s still much simpler than it used to be.
    In particular, you used to regularly pay big bucks to a certificate authority
    for a digital certificate that you could use to provide HTTPS for your site. Luckily,
    those authorities have been largely replaced by the free service [Let’s Encrypt](https://letsencrypt.org/).


    # Docker


    When Docker burst on the scene (in a five-minute [lightning talk](https://www.youtube.com/watch?v=w6W8BgabdOY)
    by Solomon Hykes of dotCloud at PyCon 2013), it was the first time most of us
    had ever heard of Linux containers. Over time, we learned that Docker was faster
    and lighter than virtual machines. Instead of emulating a full operating system,
    each container shared the server’s Linux kernel, and isolated processes and networks
    into their own namespaces. Suddenly, by using the free Docker software, you could
    host multiple independent services on a single machine, without worrying about
    them stepping all over one another.


    Ten years later, Docker is universally recognized and supported. If you want to
    host your FastAPI application on a cloud service, you’ll usually need to create
    a *Docker image* of it first. The [official FastAPI docs](https://fastapi.tiangolo.com/deployment/docker/)
    include a thorough description of how to build a Dockerized version of your FastAPI
    application. One step is to write a *Dockerfile*: a text file containing Docker
    configuration info, like what application code to use and what processes to run.
    Just to prove that this isn’t brain surgery during a rocket launch, here’s the
    Dockerfile from that page:


    ```

    FROM python:3.9

    WORKDIR /code

    COPY ./requirements.txt /code/requirements.txt

    RUN pip install --no-cache-dir --upgrade -r /code/requirements.txt

    COPY ./app /code/app

    CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "80"]

    ```


    I recommend reading the official docs, or other links that a Google search of
    fastapi docker will produce, such as “[The Ultimate FastAPI Tutorial Part 13—Using
    Docker to Deploy Your App](https://testdriven.io/blog/fastapi-docker/)” by Christopher
    Samiullah.'
- md: '## Cloud Services


    Many sources of paid or free hosting are available on the Net. Some walk-throughs
    on how to host FastAPI with them include the following:


    - “FastAPI—Deployment” by Tutorials Point

    - “The Ultimate FastAPI Tutorial Part 6b—Basic Deployment on Linode” by Christopher
    Samiullah

    - “How to Deploy a FastAPI App on Heroku for Free” by Shinichi Okada


    ## Kubernetes


    Kubernetes grew from internal Google code for managing internal systems that were
    becoming ever more godawfully complex. System administrators (as they were called
    then) used to manually configure tools like load balancers, reverse proxies, humidors¹
    and so on. Kubernetes aimed to take much of this knowledge and automate it: don''t
    tell me *how* to handle this; tell me what you *want*. This included tasks like
    keeping a service running, or firing up more servers if traffic spikes.


    There are many descriptions of how to deploy FastAPI on Kubernetes, including
    “Deploying a FastAPI Application on Kubernetes” by Sumanta Mukhopadhyay.


    ## Performance


    FastAPI''s performance is currently among the highest of any Python web framework,
    even comparable to frameworks in faster languages like Go. But much of this is
    due to ASGI, avoiding I/O waiting with async. Python itself is a relatively slow
    language. The following are some tips and tricks to improve overall performance.


    ## Async


    Often a web server doesn''t need to be really fast. It spends much of its time
    getting HTTP network requests and returning results (the Web layer in this book).
    In between, a web service performs business logic (the Service layer) and accesses
    data sources (the Data layer), and again spends much of its time on network I/O.


    Whenever code in the web service has to wait for a response, it''s a good candidate
    to use an async function (`async def` rather than `def`). This lets FastAPI and
    Starlette schedule the async function and do other things while waiting for it
    to get its response. This is one of the reasons FastAPI''s benchmarks are better
    than WSGI-based frameworks like Flask and Django.


    ¹ Wait, those keep cigars fresh.


    Performance has two aspects:


    - The time to handle a single request

    - The number of requests that can be handled at once


    ## Caches


    If you have a web endpoint that ultimately gets data from a static source (like
    a database record that changes rarely or never), it''s possible to *cache* the
    data in a function. This could be in any of the layers. Python provides the standard
    `functools` module and the functions `cache()` and `lru_cache()`.


    ## Databases, Files, and Memory


    One of the most common causes of a slow website is a missing index for a database
    table of sufficient size. Often you won''t see the problem until your table has
    grown to a particular size, and then queries suddenly become much slower. In SQL,
    any column in a `WHERE` clause should be indexed.


    In many examples in this book, the primary key of the `creature` and `explorer`
    tables has been the text field `name`. When the tables were created, `name` was
    declared the `primary` key. For the tiny tables that you''ve seen so far in this
    book, SQLite would ignore that key anyhow, since it''s faster just to scan the
    table. But once a table gets to a decent size—say a million rows—a missing index
    will make a noticeable difference. The solution: run a `query optimizer`.


    Even if you have a small table, you can do database load testing with Python scripts
    or open source tools. If you''re making numerous sequential database queries,
    it may be possible to combine them in a single batch. If you''re uploading or
    downloading a large file, use the streaming versions rather than a giant gulp.


    ## Queues


    If you''re performing any task that takes longer than a fraction of a second (like
    sending a confirmation email or downsizing an image), it may be worth handing
    it off to a job queue like `Celery`.


    ## Python Itself


    If your web service seems slow because it does significant computing with Python,
    you may want a “faster Python.” Alternatives include the following:


    - Use PyPy instead of the standard CPython.

    - Write a Python extension in C, C++, or Rust.

    - Convert the slow Python code to Cython (used by Pydantic and Uvicorn themselves).


    A very intriguing recent announcement was the Mojo language. It aims to be a complete
    superset of Python, with new features (using the same friendly Python syntax)
    that can speed up a Python example by thousands of times. The main author, Chris
    Lattner, had previously worked on compiler tools like LLVM, Clang, and MLIR, plus
    the Swift language at Apple.


    Mojo aims to be a single-language solution to AI development, which now (in PyTorch
    and TensorFlow) requires Python/C/C++ sandwiches that are hard to develop, manage,
    and debug. But Mojo also would be a good general-purpose language aside from AI.


    I coded in C for years and kept waiting for a successor that was as performant
    but as easy to use as Python. D, Go, Julia, Zig, and Rust were possibilities,
    but if Mojo can live up to its goals, I would use Mojo extensively.


    ## Troubleshooting


    Look bottom-up from the time and place where you encounter a problem. This includes
    time and space performance issues, but also logic and async traps.


    ### Kinds of Problems


    At a first glance, what HTTP response code did you get?


    404

    : An authentication or authorization error.


    422

    : Usually a Pydantic complaint about use of a model.


    500

    : The failure of a service behind your FastAPI one.


    ## Logging


    Uvicorn and other web servers typically write logs to stdout. You can check the
    log to see what call was actually made, including the HTTP verb and URL, but not
    data in the body, headers, or cookies.


    If a particular endpoint returns a 400-level status code, you can try feeding
    the same input back and see if the error reoccurs. If so, my first caveman debugging
    instinct is to add `print()` statements in the relevant Web, Service, and Data
    functions.


    Also, wherever you raise an exception, add details. If a database lookup fails,
    include the input values and specific error, like an attempt to double a unique
    key field.


    ## Metrics


    The terms *metrics*, *monitoring*, *observability*, and *telemetry* may seem to
    overlap. It''s common practice in Pythonland to use the following:


    - Prometheus to gather metrics

    - Grafana to display them

    - OpenTelemetry to measure timing


    You can apply these to all your site''s layers: Web, Service, and Data. The Service
    ones may be more business-oriented, and the others more technical, and useful
    for site developers and maintainers.


    Here are some links to gather FastAPI metrics:


    - Prometheus FastAPI Instrumentator

    - "Getting Started: Monitoring a FastAPI App with Grafana and Prometheus—A Step-by-Step
    Guide" by Zoo Codes

    - "FastAPI Observability" page of Grafana Labs website

    - OpenTelemetry FastAPI Instrumentation

    - "OpenTelemetry FastAPI Tutorial—Complete Implementation Guide" by Ankit Anand

    - OpenTelemetry Python documentation


    ## Review


    It''s pretty clear that production is not easy. Problems include the web machinery
    itself, network and disk overloading, and database problems. This chapter offered
    hints on how to get the information you need, and where to start digging when
    problems pop up.


    # PART IV


    ## A Gallery


    In Part III, you built a minimal website with some basic code. Now let''s do something
    fun with it. The following chapters apply FastAPI to common web uses: forms, files,
    databases, charts and graphics, maps, and games.


    To tie these applications together and make them more interesting than the usual
    dry computing book examples, we''ll plunder data from an unusual source, some
    of which you''ve already glimpsed: imaginary creatures from world folklore and
    the explorers who pursue them. There will be yetis, but also more obscure—though
    no less striking—members.


    # CHAPTER 14


    ## Databases, Data Science, and a Little AI


    ### Preview


    This chapter discusses how to use FastAPI to store and retrieve data. It expands
    on the simple SQLite examples of Chapter 10 with the following:


    - Other open source databases (relational and not)

    - Higher-level uses of SQLAlchemy

    - Better error checking


    ### Data Storage Alternatives


    The term *database* is unfortunately used to refer to three things:


    - The server *type*, like PostgreSQL, SQLite, or MySQL

    - A running instance of that *server*

    - A *collection of tables* on that server


    To avoid confusion—referring to an instance of the last bulleted item above as
    a “PostgreSQL database database database”—I’ll attach other terms to indicate
    which one I mean.


    The usual backend for a website is a database. Websites and databases are like
    peanut butter and jelly, and although you could conceivably store your data in
    other ways (or pair peanut butter with pickles), for this book we’ll stick with
    databases.'
  mdcn: '## 云服务


    网络上提供许多付费或免费的托管服务。以下是一些关于如何使用它们托管 FastAPI 的指南：


    -   Tutorials Point 的《FastAPI—部署》

    -   Christopher Samiullah 的《终极 FastAPI 教程 第 6b 部分—在 Linode 上的基础部署》

    -   Shinichi Okada 的《如何在 Heroku 上免费部署 FastAPI 应用》


    ## Kubernetes


    Kubernetes 源自 Google 内部用于管理日益复杂的内部系统的代码。系统管理员（当时的称呼）过去常常手动配置负载均衡器、反向代理、雪茄保湿盒¹等工具。Kubernetes
    旨在将这些知识的大部分自动化：不要告诉我*如何*处理；告诉我你*想要*什么。这包括保持服务运行，或在流量激增时启动更多服务器等任务。


    有许多关于如何在 Kubernetes 上部署 FastAPI 的描述，包括 Sumanta Mukhopadhyay 的《在 Kubernetes 上部署
    FastAPI 应用》。


    ## 性能


    FastAPI 的性能目前在所有 Python Web 框架中名列前茅，甚至可以与 Go 等更快语言的框架相媲美。但这很大程度上归功于 ASGI，通过异步避免了
    I/O 等待。Python 本身是一种相对较慢的语言。以下是一些提高整体性能的技巧和窍门。


    ## 异步


    通常，Web 服务器不需要非常快。它大部分时间都在获取 HTTP 网络请求和返回结果（本书中的 Web 层）。在此之间，Web 服务执行业务逻辑（服务层）并访问数据源（数据层），并且同样在网络
    I/O 上花费大量时间。


    每当 Web 服务中的代码需要等待响应时，它就是使用异步函数（`async def` 而不是 `def`）的好候选。这允许 FastAPI 和 Starlette
    调度异步函数，并在等待其获得响应时执行其他操作。这是 FastAPI 的基准测试优于基于 WSGI 的框架（如 Flask 和 Django）的原因之一。


    ¹ 等等，那些是用来保持雪茄新鲜的。


    性能有两个方面：


    -   处理单个请求的时间

    -   可以同时处理的请求数量


    ## 缓存


    如果你有一个 Web 端点最终从静态源获取数据（例如很少或从不更改的数据库记录），则可以在函数中*缓存*数据。这可以在任何层中进行。Python 提供了标准的
    `functools` 模块以及 `cache()` 和 `lru_cache()` 函数。


    ## 数据库、文件和内存


    网站缓慢的最常见原因之一是缺少足够大的数据库表的索引。通常，直到表增长到特定大小，你才会看到问题，然后查询突然变得慢得多。在 SQL 中，`WHERE` 子句中的任何列都应该建立索引。


    在本书的许多示例中，`creature` 和 `explorer` 表的主键一直是文本字段 `name`。创建表时，`name` 被声明为 `primary`
    键。对于本书中目前看到的微小表，SQLite 无论如何都会忽略该键，因为直接扫描表更快。但一旦表达到相当大的规模——比如一百万行——缺少索引就会产生明显的差异。解决方案：运行
    `query optimizer`。


    即使你有一个小表，你也可以使用 Python 脚本或开源工具进行数据库负载测试。如果你正在进行大量顺序数据库查询，可能可以将它们合并到单个批处理中。如果你正在上传或下载大文件，请使用流式版本，而不是一次性全部吞下。


    ## 队列


    如果你正在执行任何耗时超过几分之一秒的任务（如发送确认电子邮件或调整图像大小），将其交给像 `Celery` 这样的作业队列可能是值得的。


    ## Python 本身


    如果你的 Web 服务因为使用 Python 进行大量计算而显得缓慢，你可能想要一个“更快的 Python”。替代方案包括：


    -   使用 PyPy 而不是标准的 CPython。

    -   用 C、C++ 或 Rust 编写 Python 扩展。

    -   将缓慢的 Python 代码转换为 Cython（Pydantic 和 Uvicorn 本身使用）。


    最近一个非常有趣的公告是 Mojo 语言。它旨在成为 Python 的完整超集，具有新功能（使用相同的友好 Python 语法），可以将 Python 示例加速数千倍。主要作者
    Chris Lattner 之前曾参与 LLVM、Clang 和 MLIR 等编译器工具以及 Apple 的 Swift 语言的工作。


    Mojo 旨在成为 AI 开发的单一语言解决方案，目前（在 PyTorch 和 TensorFlow 中）需要难以开发、管理和调试的 Python/C/C++
    三明治。但 Mojo 除了 AI 之外，也将是一种很好的通用语言。


    我用 C 编码多年，一直等待着一个像 Python 一样易于使用但性能相当的后继者。D、Go、Julia、Zig 和 Rust 都是可能的选择，但如果 Mojo
    能够实现其目标，我将广泛使用 Mojo。


    ## 故障排除


    从遇到问题的时间和地点自下而上地查看。这包括时间和空间性能问题，以及逻辑和异步陷阱。


    ### 问题类型


    乍一看，你得到了什么 HTTP 响应代码？


    404

    : 认证或授权错误。


    422

    : 通常是 Pydantic 对模型使用的抱怨。


    500

    : 你的 FastAPI 后面的服务失败。


    ## 日志记录


    Uvicorn 和其他 Web 服务器通常将日志写入标准输出。你可以检查日志以查看实际进行了什么调用，包括 HTTP 动词和 URL，但不包括正文、标头或
    Cookie 中的数据。


    如果特定端点返回 400 级别的状态代码，你可以尝试将相同的输入重新输入，看看错误是否再次发生。如果是这样，我第一个原始调试本能是在相关的 Web、服务和数据函数中添加
    `print()` 语句。


    此外，无论在哪里引发异常，都要添加详细信息。如果数据库查找失败，请包含输入值和具体错误，例如尝试使唯一键字段加倍。


    ## 指标


    术语*指标*、*监控*、*可观察性*和*遥测*可能看起来重叠。在 Python 领域，通常的做法是使用：


    -   Prometheus 来收集指标

    -   Grafana 来显示它们

    -   OpenTelemetry 来测量时间


    你可以将这些应用于你网站的所有层：Web、服务和数据。服务层可能更面向业务，而其他层更技术性，对网站开发人员和维护人员有用。


    以下是一些收集 FastAPI 指标的链接：


    -   Prometheus FastAPI Instrumentator

    -   Zoo Codes 的《入门：使用 Grafana 和 Prometheus 监控 FastAPI 应用—分步指南》

    -   Grafana Labs 网站的《FastAPI 可观察性》页面

    -   OpenTelemetry FastAPI Instrumentation

    -   Ankit Anand 的《OpenTelemetry FastAPI 教程—完整实施指南》

    -   OpenTelemetry Python 文档


    ## 回顾


    很明显，生产环境并不容易。问题包括 Web 机制本身、网络和磁盘过载以及数据库问题。本章提供了关于如何获取所需信息以及在问题出现时从何处开始挖掘的提示。


    # 第四部分


    ## 画廊


    在第三部分中，你使用一些基本代码构建了一个最小的网站。现在让我们用它做一些有趣的事情。以下章节将 FastAPI 应用于常见的 Web 用途：表单、文件、数据库、图表和图形、地图以及游戏。


    为了将这些应用程序联系起来，并使它们比通常的枯燥计算书籍示例更有趣，我们将从一个不寻常的来源获取数据，其中一些你已经瞥见：来自世界民间传说的虚构生物和追求它们的探险家。会有雪人，但也有更鲜为人知——但同样引人注目——的成员。


    # 第 14 章


    ## 数据库、数据科学和一点 AI


    ### 预览


    本章讨论如何使用 FastAPI 存储和检索数据。它扩展了第 10 章的简单 SQLite 示例，包括：


    -   其他开源数据库（关系型和非关系型）

    -   SQLAlchemy 的更高级用法

    -   更好的错误检查


    ### 数据存储替代方案


    术语*数据库*不幸地用于指代三件事：


    -   服务器*类型*，如 PostgreSQL、SQLite 或 MySQL

    -   该*服务器*的运行实例

    -   该服务器上的*表集合*


    为避免混淆——将最后一个要点项的实例称为“PostgreSQL 数据库数据库数据库”——我将附加其他术语以指示我指的是哪一个。


    网站的通常后端是数据库。网站和数据库就像花生酱和果冻，虽然你可以想象以其他方式存储数据（或将花生酱与泡菜搭配），但在本书中，我们将坚持使用数据库。'
