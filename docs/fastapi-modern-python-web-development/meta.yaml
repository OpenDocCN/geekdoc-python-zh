    | Name | Country | Area | Description | AKA |

    |---|---|---|---|---|

    | Abaia | FJ | | Lake eel | |

    | Afanc | UK | CYM | Welsh lake monster | |

    | Agropelter | US | ME | Forest twig flinger | |

    | Akkorokamui | JP | | Giant Ainu octopus | |

    | Albatwitch | US | PA | Apple-stealing mini Bigfoot | |

