    DELETE /creature/{name} .                       [100%]\n```\n\n我得到了两个 F，都在 PATCH\
    \ 调用（`modify()` 函数）中。真是令人尴尬。\n\n此输出部分之后是一个标记为 `FAILURES` 的部分，其中包含任何失败测试的详细堆栈跟踪。这些需要修复。最后部分标记为\
    \ `SUMMARY`：\n\n```\n执行的检查：\n    not_a_server_error                    717 / 727\
    \ 通过          失败\n\n提示：你可以通过在 CLI 命令中使用 '--report' 在 Schemathesis.io 中可视化测试结果。\n\
    ```\n\n这速度很快，而且不需要为每个端点运行多个测试来想象可能破坏它们的输入。基于属性的测试从 API 模式中读取输入参数的类型和约束，并生成一系列值来测试每个端点。\n\
    \n这是类型提示带来的又一个意想不到的好处，它起初看起来只是些好东西：\n\n类型提示 → OpenAPI 模式 → 生成的文档 *和* 测试\n\n##\
    \ 安全测试\n\n安全不是单一的事情，而是方方面面。你需要防御恶意攻击，也要防范普通的错误，甚至是你无法控制的事件。我们将扩展性问题推迟到下一节，这里主要讨论潜在威胁的分析。\n\
    \n第 11 章讨论了身份验证和授权。这些因素总是混乱且容易出错。人们很容易想用巧妙的方法来对抗巧妙的攻击，而设计易于理解和实施的保护措施始终是一个挑战。\n\
    \n但既然你已经了解了 Schemathesis，请阅读其关于身份验证的基于属性的测试文档。正如它极大地简化了大多数 API 的测试一样，它也可以自动化许多需要身份验证的端点的测试。\n\
    \n## 负载测试\n\n负载测试显示你的应用程序如何处理高流量：\n\n- API 调用\n- 数据库读写\n- 内存使用\n- 磁盘使用\n- 网络延迟和带宽\n\
    \n有些可以是 *完整* 的测试，模拟一大群用户争先恐后地使用你的服务；你希望在那一天到来之前做好准备。本节的内容与第 188 页的“性能”和第 190 页的“故障排除”有重叠。\n\
    \n市面上有很多优秀的负载测试工具，但这里我推荐 Locust。使用 Locust，你可以用纯 Python 脚本定义所有测试。它可以模拟数十万用户，同时冲击你的网站，甚至是多个服务器。\n\
    \n使用 `pip install locust` 在本地安装。你的第一个测试可能是你的网站能处理多少并发访问者。这就像测试一栋建筑在面临飓风/地震/暴风雪或其他家庭保险事件时能承受多大的极端天气。因此，你需要一些网站结构测试。所有详细信息请参阅\
    \ Locust 文档。\n\n但是，正如电视上说的，还有更多！最近，Grasshopper 扩展了 Locust，使其能够执行诸如测量多个 HTTP 调用时间等操作。要尝试此扩展，请使用\
    \ `pip install locust-grasshopper` 安装。\n\n## 回顾\n\n本章详细阐述了测试类型，并给出了 pytest 在单元、集成和完整级别执行自动化代码测试的示例。API\
    \ 测试可以使用 Schemathesis 自动化。本章还讨论了如何在安全和性能问题发生之前暴露它们。\n\n# 第 13 章\n生产环境\n\n> 如果建筑工人建造建筑的方式与程序员编写程序的方式相同，那么第一只啄木鸟的出现就会摧毁文明。\n\
    —杰拉尔德·温伯格，计算机科学家\n\n## 预览\n\n你有一个在本地机器上运行的应用程序，现在你想分享它。本章介绍了许多关于如何将应用程序迁移到生产环境并保持其正确高效运行的场景。因为有些细节可能非常详细，在某些情况下，我会参考有用的外部文档，而不是把它们都塞在这里。\n\
    \n## 部署\n\n到目前为止，本书中的所有代码示例都使用了在本地主机 8000 端口上运行的单个 uvicorn 实例。为了处理大量流量，你需要多个服务器，运行在现代硬件提供的多个核心上。你还需要在这些服务器之上做一些事情：\n\
    \n- 保持它们运行（一个监督器）\n- 收集和转发外部请求（一个反向代理）\n- 返回响应\n- 提供 HTTPS 终止（SSL 解密）\n\n## 多个工作进程\n\
    \n你可能见过另一个名为 Gunicorn 的 Python 服务器。它可以监督多个工作进程，但它是一个 WSGI 服务器，而 FastAPI 基于 ASGI。幸运的是，有一个特殊的\
    \ Uvicorn 工作进程类可以由 Gunicorn 管理。\n\n示例 13-1 在本地主机 8000 端口上设置这些 Uvicorn 工作进程（这是根据官方文档改编的）。引号保护\
    \ shell 免受任何特殊解释。\n\n### 示例 13-1. 使用带有 Uvicorn 工作进程的 Gunicorn\n\n```\n$ pip install\
    \ \"uvicorn[standard]\" gunicorn\n$ gunicorn main:app --workers 4 --worker-class\
    \ uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000\n```\n\n你会看到 Gunicorn 执行你的命令时输出的许多行。它将启动一个顶层\
    \ Gunicorn 进程，与四个 Uvicorn 工作进程子进程通信，所有进程共享本地主机（0.0.0.0）上的 8000 端口。如果你想使用其他设置，请更改主机、端口或工作进程数。`main:app`\
    \ 指的是 `main.py` 和变量名为 `app` 的 FastAPI 对象。Gunicorn 文档声称：\n\n> Gunicorn 应该只需要 4-12\
    \ 个工作进程就能处理每秒数百或数千个请求。\n\n事实证明，Uvicorn 本身也可以启动多个 Uvicorn 工作进程，如示例 13-2 所示。\n\n\
    ### 示例 13-2. 使用带有 Uvicorn 工作进程的 Uvicorn\n\n```\n$ uvicorn main:app --host 0.0.0.0\
    \ --port 8000 --workers 4\n```\n\n但这种方法不进行进程管理，因此通常更倾向于使用 gunicorn 方法。Uvicorn\
    \ 还有其他进程管理器：请参阅其官方文档。\n\n这处理了上一节提到的四项工作中的三项，但不包括 HTTPS 加密。\n\n## HTTPS\n\n官方的\
    \ FastAPI [HTTPS 文档](https://fastapi.tiangolo.com/deployment/https/)，像所有官方 FastAPI\
    \ 文档一样，信息量极大。我建议阅读它们，然后阅读 Ramírez 关于如何使用 [Traefik](https://traefik.io/) 为 FastAPI\
    \ 添加 HTTPS 支持的[描述](https://testdriven.io/blog/fastapi-docker-https/)。Traefik 位于你的\
    \ Web 服务器“之上”，类似于 nginx 作为反向代理和负载均衡器，但它包含了 HTTPS 的魔法。\n\n尽管这个过程有许多步骤，但它仍然比以前简单得多。特别是，你过去经常需要向证书颁发机构支付一大笔钱来获取数字证书，以便为你的网站提供\
    \ HTTPS。幸运的是，这些机构在很大程度上已被免费服务 [Let's Encrypt](https://letsencrypt.org/) 取代。\n\n\
    ## Docker\n\n当 Docker 出现时（在 2013 年 PyCon 大会上，dotCloud 的 Solomon Hykes 进行了一次五分钟的[闪电演讲](https://www.youtube.com/watch?v=w6W8BgabdOY)），这是我们大多数人第一次听说\
    \ Linux 容器。随着时间的推移，我们了解到 Docker 比虚拟机更快、更轻量。每个容器不是模拟一个完整的操作系统，而是共享服务器的 Linux 内核，并将进程和网络隔离到自己的命名空间中。突然之间，通过使用免费的\
    \ Docker 软件，你可以在一台机器上托管多个独立的服务，而不用担心它们相互干扰。\n\n十年后，Docker 已被普遍认可和支持。如果你想在云服务上托管你的\
    \ FastAPI 应用程序，通常需要先为其创建一个 *Docker 镜像*。[官方 FastAPI 文档](https://fastapi.tiangolo.com/deployment/docker/)详细描述了如何构建你的\
    \ FastAPI 应用程序的 Docker 化版本。其中一个步骤是编写一个 *Dockerfile*：一个包含 Docker 配置信息的文本文件，例如使用哪些应用程序代码以及运行哪些进程。为了证明这不是在火箭发射期间进行脑外科手术，以下是来自该页面的\
    \ Dockerfile：\n\n```dockerfile\nFROM python:3.9\nWORKDIR /code\nCOPY ./requirements.txt\
    \ /code/requirements.txt\nRUN pip install --no-cache-dir --upgrade -r /code/requirements.txt\n\
    COPY ./app /code/app\nCMD [\"uvicorn\", \"app.main:app\", \"--host\", \"0.0.0.0\"\
    , \"--port\", \"80\"]\n```\n\n我建议阅读官方文档，或者通过搜索“fastapi docker”产生的其他链接，例如 Christopher\
    \ Samiullah 的“[终极 FastAPI 教程第 13 部分——使用 Docker 部署你的应用](https://testdriven.io/blog/fastapi-docker/)”。"
