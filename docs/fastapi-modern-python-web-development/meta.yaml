  md: "Example 7-6. Flask body\n\n```\nfrom flask import Flask, request, jsonify\n\
    \napp = Flask(__name__)\n\n@app.route(\"/hi\", methods=[\"GET\"])\ndef greet():\n\
    \    who: str = request.json[\"who\"]\n    return jsonify(f\"Hello? {who}?\")\n\
