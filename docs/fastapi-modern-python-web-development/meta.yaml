  md: '# CHAPTER 4

    Async, Concurrency, and Starlette Tour


    > Starlette is a lightweight ASGI framework/toolkit, which is ideal for building
    async web services in Python.

    —Tom Christie, creator of Starlette


    # Preview


    The previous chapter briefly introduced the first things a developer would encounter
    on writing a new FastAPI application. This chapter emphasizes FastAPI''s underlying
    Starlette library, particularly its support of *async* processing. After an overview
    of multiple ways of “doing more things at once” in Python, you''ll see how its
    newer `async` and `await` keywords have been incorporated into Starlette and FastAPI.


    # Starlette


    Much of FastAPI''s web code is based on the [Starlette package](https://www.starlette.io/),
    which was created by Tom Christie. It can be used as a web framework in its own
    right or as a library for other frameworks, such as FastAPI. Like any other web
    framework, Starlette handles all the usual HTTP request parsing and response generation.
    It''s similar to [Werkzeug](https://werkzeug.palletsprojects.com/), the package
    that underlies Flask.


    But its most important feature is its support of the modern Python asynchronous
    web standard: [ASGI](https://asgi.readthedocs.io/). Until now, most Python web
    frameworks (like Flask and Django) have been based on the traditional synchronous
    [WSGI standard](https://wsgi.readthedocs.io/). Because web applications so frequently
    connect to much slower code (e.g., database, file, and network access), ASGI avoids
    the blocking and busy waiting of WSGI-based applications.'
  merge: -1
  pgno: 66
- img_proc: true
  md: 'As a result, Starlette and frameworks that use it are the fastest Python web
    packages, rivaling even Go and Node.js applications.


    # Types of Concurrency


    Before getting into the details of the *async* support provided by Starlette and
    FastAPI, it''s useful to know the multiple ways we can implement *concurrency*.


    In *parallel* computing, a task is spread across multiple dedicated CPUs at the
    same time. This is common in “number-crunching” applications like graphics and
    machine learning.


    In *concurrent* computing, each CPU switches among multiple tasks. Some tasks
    take longer than others, and we want to reduce the total time needed. Reading
    a file or accessing a remote network service is literally thousands to millions
    of times slower than running calculations in the CPU.


    Web applications do a lot of this slow work. How can we make web servers, or any
    servers, run faster? This section discusses some possibilities, from system-wide
    down to the focus of this chapter: FastAPI''s implementation of Python''s `async`
    and `await`.


    # Distributed and Parallel Computing


    If you have a really big application—one that would huff and puff on a single
    CPU—you can break it into pieces and make those pieces run on separate CPUs in
    a single machine or on multiple machines. You can do this in many, many ways,
    and if you have such an application, you already know a number of them. Managing
    all these pieces is more complex and expensive than managing a single server.


    In this book, the focus is on small- to medium-sized applications that could fit
    on a single box. And these applications can have a mixture of synchronous and
    asynchronous code, nicely managed by FastAPI.


    # Operating System Processes


    An operating system (or OS, because typing hurts) schedules resources: memory,
    CPUs, devices, networks, and so on. Every program that it runs executes its code
    in one or more *processes*. The OS provides each process with managed, protected
    access to resources, including when they can use the CPU.


    Most systems use *preemptive* process scheduling, not allowing any process to
    hog the CPU, memory, or any other resource. An OS continually suspends and resumes
    processes, according to its design and settings.'
  merge: -1
  pgno: 67
- img_proc: true
  md: 'With CPU-intensive Python applications, the usual solution is to use multiple
    processes and let the OS manage them. Python has a multiprocessing module for
    this.


    # Operating System Threads


    You can also run *threads* of control within a single process. Python’s threading
    package manages these.


    Threads are often recommended when your program is I/O bound, and multiple processes
    are recommended when you’re CPU bound. But threads are tricky to program and can
    cause errors that are hard to find. In *Introducing Python*, I likened threads
    to ghosts wafting around in a haunted house: independent and invisible, detected
    only by their effects. Hey, who moved that candlestick?


    Traditionally, Python kept the process-based and thread-based libraries separate.
    Developers had to learn the arcane details of either to use them. A more recent
    package called concurrent.futures is a higher-level interface that makes them
    easier to use.


    As you’ll see, you can get the benefits of threads more easily with the newer
    async functions. FastAPI also manages threads for normal synchronous functions
    (def, not async def) via threadpools.


    # Green Threads


    A more mysterious mechanism is presented by *green threads* such as greenlet,
    gevent and Eventlet. These are *cooperative* (not preemptive). They’re similar
    to OS threads but run in user space (i.e., your program) rather than in the OS
    kernel. They work by *monkey-patching* standard Python functions (modifying standard
    Python functions as they’re running) to make concurrent code look like normal
    sequential code: they give up control when they would block waiting for I/O.


    OS threads are “lighter” (use less memory) than OS processes, and green threads
    are lighter than OS threads. In some benchmarks, all the async methods were generally
    faster than their sync counterparts.


    > After you’ve read this chapter, you may wonder which is better: gevent or asyncio?
    I don’t think there’s a single preference for all uses. Green threads were implemented
    earlier (using ideas from the multiplayer game *Eve Online*). This book features
    Python’s standard asyncio, which is used by FastAPI, is simpler than threads,
    and performs well.


    ![](img/1d00ed3e85bc756220a3f1a1e9a9664f_68_0.png)


    # Callbacks


    Developers of interactive applications like games and graphic user interfaces
    are probably familiar with *callbacks*. You write functions and associate them
    with an'
  merge: -1
  pgno: 68
- img_proc: true
  md: 'event, like a mouse click, keypress, or time. The prominent Python package
    in this category is Twisted. Its name reflects the reality that callback-based
    programs are a bit “inside-out” and hard to follow.


    # Python Generators


    Like most languages, Python usually executes code sequentially. When you call
    a function, Python runs it from its first line until its end or a return.


    But in a Python *generator function*, you can stop and return from any point,
    *and go back to that point* later. The trick is the yield keyword.


    In one *Simpsons* episode, Homer crashes his car into a deer statue, followed
    by three lines of dialogue. Example 4-1 defines a normal Python function to return
    these lines as a list and have the caller iterate over them.


    Example 4-1. Use return


    ```

    >>> def doh():

    ...     return ["Homer: D''oh!", "Marge: A deer!", "Lisa: A female deer!"]

    ...

    >>> for line in doh():

    ...     print(line)

    ...

    Homer: D''oh!

    Marge: A deer!

    Lisa: A female deer!

    ```


    This works perfectly when lists are relatively small. But what if we’re grabbing
    all the dialogue from all the *Simpsons* episodes? Lists use memory.


    Example 4-2 shows how a generator function would dole out the lines.


    Example 4-2. Use yield


    ```

    >>> def doh2():

    ...     yield "Homer: D''oh!"

    ...     yield "Marge: A deer!"

    ...     yield "Lisa: A female deer!"

    ...

    >>> for line in doh2():

    ...     print(line)

    ...

    Homer: D''oh!

    Marge: A deer!

    Lisa: A female deer!

    ```'
