    # Creating a Package


    A package is a way to organize related modules into a directory hierarchy. It
    allows you to group related functionality together and provides a convenient way
    to import multiple modules at once.


    To create a package, you need to create a directory with a special file called
    __init__.py inside it. This file can be empty or can contain initialization code
    for the package. You can then create multiple module files inside the package
    directory.


    Here''s an example of how to create a package called my_package:


    ```

    my_package/

    __init__.py

    module1.py

    module2.py

    ```


