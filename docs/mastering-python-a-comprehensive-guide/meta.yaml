    \ 95], \"address\": {\"street\": \"123 Main St\", \"city\": \"New York\", \"state\"\
    : \"NY\"}}'\ndata = json.loads(json_string)\nprint(data)\n```\n\n## 7.3.4 Working\
    \ with JSON Data\n\nOnce you have deserialized the JSON data into a Python object,\
    \ you can access and manipulate the data using standard Python syntax.\n\nTo access\
    \ a value in a JSON object, you can use the key as you would with a dictionary.\
    \ For example:\n\n```\nimport json\njson_string = '{\"name\": \"John Doe\", \"\
    age\": 30, \"is_student\": false, \"grades\": [85, 90, 95], \"address\": {\"street\"\
    : \"123 Main St\", \"city\": \"New York\", \"state\": \"NY\"}}'\ndata = json.loads(json_string)\n\
    print(data[\"name\"])  # Output: John Doe\nprint(data[\"grades\"][0])  # Output:\
    \ 85\nprint(data[\"address\"][\"city\"])  # Output: New York\n```\n\nTo modify\
    \ a value in a JSON object, you can simply assign a new value to the corresponding\
    \ key. For example:\n\n```\nimport json\njson_string = '{\"name\": \"John Doe\"\
    , \"age\": 30, \"is_student\": false, \"grades\": [85, 90, 95], \"address\": {\"\
    street\": \"123 Main St\", \"city\": \"New York\", \"state\": \"NY\"}}'\ndata\
    \ = json.loads(json_string)\ndata[\"age\"] = 31\ndata[\"grades\"].append(100)\n\
    data[\"address\"][\"city\"] = \"San Francisco\"\njson_string = json.dumps(data)\n\
    print(json_string)\n```\n\n## 7.3.5 Handling JSON Errors\n\nWhen working with\
    \ JSON, it is important to handle potential errors that may occur during serialization\
    \ or deserialization. The json module provides the JSONDecodeError and JSONEncodeError\
    \ exceptions for handling JSON-related errors.\n\nHere is an example of handling\
    \ a JSON decoding error:\n\n```\nimport json\njson_string = '{\"name\": \"John\
    \ Doe\", \"age\": 30, \"is_student\": false, \"grades\": [85, 90, 95], \"address\"\
    : {\"street\": \"123 Main St\", \"city\": \"New York\", \"state\": \"NY\"}}'\n\
    try:\n    data = json.loads(json_string)\nexcept json.JSONDecodeError as e:\n\
    \    print(\"JSON decoding error:\", e)\n```\n\nAnd here is an example of handling\
    \ a JSON encoding error:\n\n```\nimport json\ndata = {\n    \"name\": \"John Doe\"\
    ,\n    \"age\": 30,\n    \"is_student\": False,\n    \"grades\": [85, 90, 95],\n\
    \    \"address\": {\n        \"street\": \"123 Main St\",\n        \"city\": \"\
    New York\",\n        \"state\": \"NY\"\n    },\n    \"invalid_key\": set()\n}\n\
    try:\n    json_string = json.dumps(data)\nexcept json.JSONEncodeError as e:\n\
    \    print(\"JSON encoding error:\", e)\n```\n\nBy handling these errors, you\
    \ can gracefully handle unexpected JSON data and prevent your program from crashing.\n\
    \nIn conclusion, working with JSON in Python is straightforward and convenient.\
    \ The json module provides functions for serializing and deserializing JSON data,\
    \ as well as manipulating the data once it is in Python object form. By understanding\
    \ the JSON syntax and how to handle JSON errors, you can effectively work with\
    \ JSON data in your Python applications.\n\n## 7.4 Working with XML\n\nXML (eXtensible\
    \ Markup Language) is a popular markup language used for storing and exchanging\
    \ structured data. It provides a flexible and self-describing format that is widely\
    \ used in various domains, including web development, data interchange, and configuration\
    \ files. In this section, we will explore how to work with XML in Python.\n\n\
    ### 7.4.1 Introduction to XML\n\nXML is a text-based format that uses tags to\
    \ define elements and their hierarchical relationships. Each XML document starts\
    \ with a prolog, which specifies the version of XML being used and optionally\
    \ the character encoding. The prolog is followed by the root element, which encapsulates\
    \ all other elements in the document.\n\nHere is an example of a simple XML document:\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<bookstore>\n  <book category=\"\
    fiction\">\n    <title>Harry Potter and the Sorcerer's Stone</title>\n    <author>J.K.\
    \ Rowling</author>\n    <year>1997</year>\n  </book>\n  <book category=\"non-fiction\"\
    >\n    <title>Python Crash Course</title>\n    <author>Eric Matthes</author>\n\
    \    <year>2015</year>\n  </book>\n</bookstore>\n```\n\nIn this example, the root\
    \ element is <bookstore>, which contains two <book> elements. Each <book> element\
    \ has child elements such as <title>, <author>, and <year>. The attributes category\
    \ in the <book> elements provide additional information about the books.\n\n###\
    \ 7.4.2 Parsing XML\n\nTo work with XML in Python, we need to parse the XML document\
    \ and convert it into a structured representation that can be easily manipulated.\
    \ Python provides several libraries for parsing XML, including the built-in xml\
    \ module, ElementTree, and lxml.\n\n#### 7.4.2.1 Parsing XML with ElementTree\n\
    \nThe ElementTree module is a lightweight and efficient library for parsing and\
    \ manipulating XML documents. It provides a simple and intuitive API for working\
    \ with XML data.\n\nTo parse an XML document using ElementTree, we first need\
    \ to import the module:\n\n```\nimport xml.etree.ElementTree as ET\n```\n\nWe\
    \ can then use the ElementTree.parse() function to parse an XML file or the ElementTree.fromstring()\
    \ function to parse an XML string. Here’s an example:\n\n```\nimport xml.etree.ElementTree\
    \ as ET\n# Parse an XML file\ntree = ET.parse('books.xml')\n# Get the root element\n\
    root = tree.getroot()\n# Access elements and attributes\nfor book in root.findall('book'):\n\
    \    title = book.find('title').text\n    author = book.find('author').text\n\
    \    year = book.find('year').text\n    category = book.get('category')\n    print(f'Title:\
    \ {title}')\n    print(f'Author: {author}')\n    print(f'Year: {year}')\n    print(f'Category:\
    \ {category}')\n    print()\n```\n\nIn this example, we parse an XML file named\
    \ books.xml and access the elements and attributes using the find() and get()\
    \ methods. We then print the information for each book.\n\n#### 7.4.2.2 Parsing\
    \ XML with lxml\n\nThe lxml library is a powerful and feature-rich library for\
    \ processing XML and HTML documents. It provides a fast and efficient API for\
    \ parsing and manipulating XML data."
  mdcn: "应用程序。在 Python 中，`json` 模块提供了处理 JSON 数据的函数。\n\n## 7.3.1 JSON 语法\n\nJSON 数据以键值对的形式表示，类似于\
    \ Python 字典。键始终是字符串，而值可以是任何有效的 JSON 数据类型，包括字符串、数字、布尔值、数组和其他对象。JSON 的语法如下：\n\n\
    -   对象用花括号 `{}` 括起来，由逗号分隔的键值对组成。键是用双引号括起来的字符串，后跟一个冒号 `:`，然后是值。\n-   数组用方括号 `[]`\
    \ 括起来，由逗号分隔的值组成。\n-   字符串用双引号 `\"\"` 括起来。\n-   数字可以是整数或浮点数。\n-   布尔值可以是 `true`\
