    In the previous sections, we learned the basics of regular expressions and how
    to use them for matching patterns and replacing text. In this section, we will
    explore some advanced techniques and features of regular expressions in Python.


    # Lookahead and Lookbehind Assertions


    Lookahead and lookbehind assertions are powerful tools that allow us to match
    patterns based on what comes before or after a specific position in the string,
    without including it in the match itself.


    # Lookahead Assertions


    A lookahead assertion is denoted by the (?=...) syntax. It allows us to match
    a pattern only if it is followed by another pattern. For example, let’s say we
    want to find all occurrences of the word “Python” that are followed by the word
    “programming”. We can use the following regular expression:


    ```

    import re

    text = "Python is a popular programming language. Python is easy to learn."

    pattern = r"Python(?=\sprogramming)"

    matches = re.findall(pattern, text)

    print(matches)

    Output:

    [''Python'']

    ```


    In this example, the lookahead assertion (?=\sprogramming) ensures that the word
    “Python” is followed by a space and the word “programming”. The match is successful
    only if this condition is met.


    # Lookbehind Assertions


    A lookbehind assertion is denoted by the (?<=...) syntax. It allows us to match
    a pattern only if it is preceded by another pattern. For example, let’s say we
    want to find all occurrences of the word “Python” that are preceded by the word
    “learn”. We can use the following regular expression:


    ```

    import re

    text = "Python is a popular programming language. Learn Python to become a skilled
    developer."

    pattern = r"(?<=Learn\s)Python"

    matches = re.findall(pattern, text)

    print(matches)

    Output:

    [''Python'']

    ```'
  - '[PAGE 113]


    In this example, the lookbehind assertion (?<=Learn\s) ensures that the word “Python”
    is preceded by the word “Learn” and a space. The match is successful only if this
    condition is met.


    # Non-Capturing Groups


    In some cases, we may want to use parentheses for grouping purposes without capturing
    the matched text. We can achieve this by using non-capturing groups, denoted by
    the (?:...) syntax. Non-capturing groups are useful when we want to apply a quantifier
    to a group but don’t need to extract the matched text.


    For example, let’s say we want to find all occurrences of the word “cat” followed
    by either “s” or “es”. We can use the following regular expression:


    ```

    import re

    text = "I have a cat. She has two cats."

    pattern = r"cat(?:s|es)"

    matches = re.findall(pattern, text)

    print(matches)

    Output:

    [''cat'', ''cats'']

    ```


    In this example, the non-capturing group (?:s|es) matches either “s” or “es” after
    the word “cat”. The matched text is not captured, but the entire pattern is considered
    for matching.


    # Backreferences


    Backreferences allow us to refer to a previously captured group within the same
    regular expression. They are denoted by the \number syntax, where number is the
    index of the captured group.


    For example, let’s say we want to find all occurrences of a repeated word in a
    sentence. We can use the following regular expression:


    ```

    import re

    text = "This is is a test test sentence."

    pattern = r"\b(\w+)\s+\1\b"

    matches = re.findall(pattern, text)

    print(matches)

    Output:

    [''is'', ''test'']

    ```


    In this example, the backreference \1 refers to the first captured group (\w+),
    which matches any word character. The pattern \b(\w+)\s+\1\b ensures that the
    same word is repeated consecutively.'
  - "[PAGE 114]\n\n# Named Groups\n\nNamed groups allow us to assign a name to a captured\
    \ group, making it easier to refer to the matched text. They are denoted by the\
    \ (?P<name>...) syntax, where name is the name of the group.\n\nFor example, let’s\
    \ say we want to extract the year, month, and day from a date string. We can use\
    \ the following regular expression:\n\n```\nimport re\ntext = \"Today is 2022-01-01.\"\
    \npattern = r\"(?P<year>\\d{4})-(?P<month>\\d{2})-(?P<day>\\d{2})\"\nmatch = re.search(pattern,\
    \ text)\nif match:\n    print(\"Year:\", match.group(\"year\"))\n    print(\"\
    Month:\", match.group(\"month\"))\n    print(\"Day:\", match.group(\"day\"))\n\
    Output:\nYear: 2022\nMonth: 01\nDay: 01\n```\n\nIn this example, the named groups\
    \ (?P<year>\\d{4}), (?P<month>\\d{2}), and (?P<day>\\d{2}) capture the year, month,\
    \ and day respectively. We can refer to these groups by their names using the\
    \ group() method.\n\n# Conclusion\n\nIn this section, we explored some advanced\
    \ techniques and features of regular expressions in Python. Lookahead and lookbehind\
    \ assertions allow us to match patterns based on what comes before or after a\
    \ specific position in the string. Non-capturing groups are useful when we want\
    \ to group patterns without capturing the matched text. Backreferences allow us\
    \ to refer to previously captured groups within the same regular expression. Named\
    \ groups make it easier to refer to captured text by assigning names to groups.\
    \ By mastering these advanced techniques, you can become even more proficient\
    \ in using regular expressions to manipulate and extract information from text\
    \ data."
