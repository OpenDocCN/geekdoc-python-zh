    # The match() Function


    The match() function is one of the most commonly used functions in the re module.
    It attempts to match a pattern at the beginning of a string. If the pattern is
    found, it returns a match object; otherwise, it returns None.


    Here’s the syntax for using the match() function:


    ```

    re.match(pattern, string, flags=0)

    ```


