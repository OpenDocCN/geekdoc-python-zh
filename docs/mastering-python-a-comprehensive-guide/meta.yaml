  md: 'Once you have set up the logger, you can start recording log messages using
    the various logging methods available. The most commonly used methods are:


    +   - logger.debug(): Records a debug-level message.

    - logger.info(): Records an informational message.

    - logger.warning(): Records a warning message.

    - logger.error(): Records an error message.

    - logger.critical(): Records a critical message.


    Each logging method takes a string message as its argument. You can also include
    additional information by using string formatting or passing in variables.


    ```

    logger.debug(''This is a debug message'')

    logger.info(''This is an informational message'')

    logger.warning(''This is a warning message'')

    logger.error(''This is an error message'')

    logger.critical(''This is a critical message'')

    ```


    By default, the log messages are printed to the console. However, you can configure
    the logger to output the messages to a file by using a FileHandler object. This
    allows you to keep a record of all the log messages for future reference.


    ```

    file_handler = logging.FileHandler(''app.log'')

    logger.addHandler(file_handler)

    ```


    In addition to the console and file outputs, the logging module also supports
    other handlers such as StreamHandler for streaming log messages to a network socket,
    SMTPHandler for sending log messages via email, and SysLogHandler for logging
    to the system log on Unix-like systems.


