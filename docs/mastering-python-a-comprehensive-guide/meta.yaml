    \"address\": {\n\"street\": \"123 Main St\",\n\"city\": \"New York\",\n\"state\"\
    : \"NY\"\n}\n}\n```\n\n## 7.3.2 序列化 JSON\n\n序列化是将 Python 对象转换为 JSON 字符串的过程。`json`\
    \ 模块提供了 `dump()` 和 `dumps()` 函数用于序列化 JSON。\n\n`dump()` 函数将 JSON 数据直接写入类文件对象。以下是一个示例：\n\
    \n```\nimport json\ndata = {\n\"name\": \"John Doe\",\n\"age\": 30,\n\"is_student\"\
    : False,\n\"grades\": [85, 90, 95],\n\"address\": {\n\"street\": \"123 Main St\"\
    ,\n\"city\": \"New York\",\n\"state\": \"NY\"\n}\n}\nwith open(\"data.json\",\
    \ \"w\") as file:\n    json.dump(data, file)\n```\n\n`dumps()` 函数返回一个 JSON 字符串。以下是一个示例：\n\
    \n```\nimport json\ndata = {\n\"name\": \"John Doe\",\n\"age\": 30,\n\"is_student\"\
    : False,\n\"grades\": [85, 90, 95],\n\"address\": {\n\"street\": \"123 Main St\"\
    ,\n\"city\": \"New York\",\n\"state\": \"NY\"\n}\n}\njson_string = json.dumps(data)\n\
    print(json_string)\n```\n\n## 7.3.3 反序列化 JSON\n\n反序列化是将 JSON 字符串转换为 Python 对象的过程。`json`\
    \ 模块提供了 `load()` 和 `loads()` 函数用于反序列化 JSON。\n\n`load()` 函数从类文件对象读取 JSON 数据并返回一个\
    \ Python 对象。以下是一个示例：\n\n```\nimport json\nwith open(\"data.json\", \"r\") as file:\n\
    \    data = json.load(file)\nprint(data)\n```\n\n`loads()` 函数接受一个 JSON 字符串作为输入并返回一个\
    \ Python 对象。以下是一个示例：\n\n```\nimport json\njson_string = '{\"name\": \"John Doe\"\
    , \"age\": 30, \"is_student\": false, \"grades\": [85, 90, 95], \"address\": {\"\
    street\": \"123 Main St\", \"city\": \"New York\", \"state\": \"NY\"}}'\ndata\
    \ = json.loads(json_string)\nprint(data)\n```\n\n## 7.3.4 处理 JSON 数据\n\n一旦将 JSON\
    \ 数据反序列化为 Python 对象，你就可以使用标准的 Python 语法来访问和操作数据。\n\n要访问 JSON 对象中的值，你可以像使用字典一样使用键。例如：\n\
    \n```\nimport json\njson_string = '{\"name\": \"John Doe\", \"age\": 30, \"is_student\"\
    : false, \"grades\": [85, 90, 95], \"address\": {\"street\": \"123 Main St\",\
    \ \"city\": \"New York\", \"state\": \"NY\"}}'\ndata = json.loads(json_string)\n\
    print(data[\"name\"])  # 输出: John Doe\nprint(data[\"grades\"][0])  # 输出: 85\n\
    print(data[\"address\"][\"city\"])  # 输出: New York\n```\n\n要修改 JSON 对象中的值，你只需为相应的键分配一个新值。例如：\n\
    \n```\nimport json\njson_string = '{\"name\": \"John Doe\", \"age\": 30, \"is_student\"\
    : false, \"grades\": [85, 90, 95], \"address\": {\"street\": \"123 Main St\",\
    \ \"city\": \"New York\", \"state\": \"NY\"}}'\ndata = json.loads(json_string)\n\
    data[\"age\"] = 31\ndata[\"grades\"].append(100)\ndata[\"address\"][\"city\"]\
    \ = \"San Francisco\"\njson_string = json.dumps(data)\nprint(json_string)\n```\n\
    \n## 7.3.5 处理 JSON 错误\n\n处理 JSON 时，处理序列化或反序列化过程中可能出现的潜在错误非常重要。`json` 模块提供了 `JSONDecodeError`\
    \ 和 `JSONEncodeError` 异常来处理与 JSON 相关的错误。\n\n以下是处理 JSON 解码错误的示例：\n\n```\nimport\
    \ json\njson_string = '{\"name\": \"John Doe\", \"age\": 30, \"is_student\": false,\
    \ \"grades\": [85, 90, 95], \"address\": {\"street\": \"123 Main St\", \"city\"\
    : \"New York\", \"state\": \"NY\"}}'\ntry:\n    data = json.loads(json_string)\n\
    except json.JSONDecodeError as e:\n    print(\"JSON 解码错误:\", e)\n```\n\n以下是处理\
    \ JSON 编码错误的示例：\n\n```\nimport json\ndata = {\n    \"name\": \"John Doe\",\n \
    \   \"age\": 30,\n    \"is_student\": False,\n    \"grades\": [85, 90, 95],\n\
    \    \"address\": {\n        \"street\": \"123 Main St\",\n        \"city\": \"\
    New York\",\n        \"state\": \"NY\"\n    },\n    \"invalid_key\": set()\n}\n\
    try:\n    json_string = json.dumps(data)\nexcept json.JSONEncodeError as e:\n\
    \    print(\"JSON 编码错误:\", e)\n```\n\n通过处理这些错误，你可以优雅地处理意外的 JSON 数据，并防止程序崩溃。\n\n\
    总之，在 Python 中处理 JSON 简单而方便。`json` 模块提供了用于序列化和反序列化 JSON 数据的函数，以及在数据转换为 Python 对象形式后操作数据的函数。通过理解\
    \ JSON 语法以及如何处理 JSON 错误，你可以在 Python 应用程序中有效地处理 JSON 数据。\n\n## 7.4 处理 XML\n\nXML（可扩展标记语言）是一种流行的标记语言，用于存储和交换结构化数据。它提供了一种灵活且自描述的格式，广泛应用于各个领域，包括\
    \ Web 开发、数据交换和配置文件。在本节中，我们将探讨如何在 Python 中处理 XML。\n\n### 7.4.1 XML 简介\n\nXML 是一种基于文本的格式，使用标签来定义元素及其层次关系。每个\
    \ XML 文档都以一个序言开始，该序言指定所使用的 XML 版本，并可选择指定字符编码。序言之后是根元素，它封装了文档中的所有其他元素。\n\n这是一个简单\
    \ XML 文档的示例：\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<bookstore>\n\
    \  <book category=\"fiction\">\n    <title>Harry Potter and the Sorcerer's Stone</title>\n\
    \    <author>J.K. Rowling</author>\n    <year>1997</year>\n  </book>\n  <book\
    \ category=\"non-fiction\">\n    <title>Python Crash Course</title>\n    <author>Eric\
    \ Matthes</author>\n    <year>2015</year>\n  </book>\n</bookstore>\n```\n\n在这个示例中，根元素是\
    \ `<bookstore>`，它包含两个 `<book>` 元素。每个 `<book>` 元素都有子元素，如 `<title>`、`<author>` 和\
    \ `<year>`。`<book>` 元素中的 `category` 属性提供了关于书籍的附加信息。\n\n### 7.4.2 解析 XML\n\n要在\
    \ Python 中处理 XML，我们需要解析 XML 文档并将其转换为易于操作的结构化表示。Python 提供了几个用于解析 XML 的库，包括内置的 `xml`\
    \ 模块、`ElementTree` 和 `lxml`。\n\n#### 7.4.2.1 使用 ElementTree 解析 XML\n\n`ElementTree`\
    \ 模块是一个轻量级且高效的库，用于解析和操作 XML 文档。它提供了一个简单直观的 API 来处理 XML 数据。\n\n要使用 `ElementTree`\
    \ 解析 XML 文档，我们首先需要导入该模块：\n\n```\nimport xml.etree.ElementTree as ET\n```\n\n然后，我们可以使用\
    \ `ElementTree.parse()` 函数解析 XML 文件，或使用 `ElementTree.fromstring()` 函数解析 XML 字符串。以下是一个示例：\n\
    \n```\nimport xml.etree.ElementTree as ET\n# 解析 XML 文件\ntree = ET.parse('books.xml')\n\
    # 获取根元素\nroot = tree.getroot()\n# 访问元素和属性\nfor book in root.findall('book'):\n\
    \    title = book.find('title').text\n    author = book.find('author').text\n\
    \    year = book.find('year').text\n    category = book.get('category')\n    print(f'标题:\
    \ {title}')\n    print(f'作者: {author}')\n    print(f'年份: {year}')\n    print(f'类别:\
    \ {category}')\n    print()\n```\n\n在这个示例中，我们解析了一个名为 `books.xml` 的 XML 文件，并使用\
    \ `find()` 和 `get()` 方法访问元素和属性。然后我们打印每本书的信息。\n\n#### 7.4.2.2 使用 lxml 解析 XML\n\n\
    `lxml` 库是一个功能强大的库，用于处理 XML 和 HTML 文档。它提供了一个快速高效的 API 来解析和操作 XML 数据。"
