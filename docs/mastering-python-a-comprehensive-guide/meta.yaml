  md: '# Chapter 3 - Data Structures


    # 3.1 Lists


    In Python, a list is a versatile and commonly used data structure that allows
    you to store and manipulate a collection of items. Lists are mutable, which means
    you can modify them by adding, removing, or changing elements. This flexibility
    makes lists a powerful tool for organizing and manipulating data in Python.


    # Creating Lists


    To create a list in Python, you can use square brackets [] and separate the elements
    with commas. For example:


    ```

    fruits = [''apple'', ''banana'', ''orange'']

    ```


    In this example, we have created a list called fruits that contains three strings:
    ‘apple’, ‘banana’, and ‘orange’. Lists can contain elements of different data
    types, including numbers, strings, and even other lists.


    # Accessing Elements


    You can access individual elements in a list by using their index. In Python,
    the index starts at 0 for the first element, 1 for the second element, and so
    on. For example:


    ```

    fruits = [''apple'', ''banana'', ''orange'']

    print(fruits[0]) # Output: ''apple''

    print(fruits[1]) # Output: ''banana''

    print(fruits[2]) # Output: ''orange''

    ```


    You can also use negative indexing to access elements from the end of the list.
    For example:


    ```

    fruits = [''apple'', ''banana'', ''orange'']

    print(fruits[-1]) # Output: ''orange''

    print(fruits[-2]) # Output: ''banana''

    print(fruits[-3]) # Output: ''apple''

    ```


    # Modifying Lists


    Lists are mutable, which means you can modify them by assigning new values to
    specific elements. For example:


    ```

    fruits = [''apple'', ''banana'', ''orange'']

    fruits[1] = ''grape''

    print(fruits) # Output: [''apple'', ''grape'', ''orange'']

    ```'
