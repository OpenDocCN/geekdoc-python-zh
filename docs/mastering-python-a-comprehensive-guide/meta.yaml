    - 整除（//）：返回第一个操作数除以第二个操作数的商，丢弃任何小数部分。\n\n以下示例演示了算术运算符的使用：\n\n```\na = 10\nb =\
    \ 3\nprint(a + b) # 输出：13\nprint(a - b) # 输出：7\nprint(a * b) # 输出：30\nprint(a\
    \ / b) # 输出：3.3333333333333335\nprint(a % b) # 输出：1\nprint(a ** b) # 输出：1000\n\
    print(a // b) # 输出：3\n```\n\n## 赋值运算符\n\n赋值运算符用于为变量赋值。它们将赋值运算符（=）与其他算术或位运算符结合使用。Python\
    \ 支持以下赋值运算符：\n\n- 赋值（=）：将右侧的值赋给左侧的变量。\n- 加法赋值（+=）：将右侧的值加到左侧的变量上，并将结果赋给左侧的变量。\n\
    - 减法赋值（-=）：从左侧的变量中减去右侧的值，并将结果赋给左侧的变量。\n- 乘法赋值（*=）：将左侧的变量乘以右侧的值，并将结果赋给左侧的变量。\n\
    - 除法赋值（/=）：将左侧的变量除以右侧的值，并将结果赋给左侧的变量。\n- 取模赋值（%=）：计算左侧的变量对右侧的值取模的结果，并将结果赋给左侧的变量。\n\
    - 幂赋值（**=）：将左侧的变量提升到右侧的值的幂次，并将结果赋给左侧的变量。\n- 整除赋值（//=）：计算左侧的变量除以右侧的值的整除结果，并将结果赋给左侧的变量。\n\
    \n以下示例演示了赋值运算符的使用：\n\n```\na = 10\nb = 3\na += b # 等同于 a = a + b\nprint(a) # 输出：13\n\
    a -= b # 等同于 a = a - b\nprint(a) # 输出：10\na *= b # 等同于 a = a * b\nprint(a) # 输出：30\n\
    a /= b # 等同于 a = a / b\nprint(a) # 输出：10.0\na %= b # 等同于 a = a % b\nprint(a) #\
    \ 输出：1.0\na **= b # 等同于 a = a ** b\nprint(a) # 输出：1.0\na //= b # 等同于 a = a //\
    \ b\nprint(a) # 输出：0.0\n```\n\n## 比较运算符\n\n比较运算符用于比较两个值，并根据比较结果返回一个布尔值（True 或\
    \ False）。Python 支持以下比较运算符：\n\n- 等于（==）：如果操作数相等，则返回 True。\n- 不等于（!=）：如果操作数不相等，则返回\
    \ True。\n- 大于（>）：如果左侧操作数大于右侧操作数，则返回 True。\n- 小于（<）：如果左侧操作数小于右侧操作数，则返回 True。\n\
    - 大于或等于（>=）：如果左侧操作数大于或等于右侧操作数，则返回 True。\n- 小于或等于（<=）：如果左侧操作数小于或等于右侧操作数，则返回 True。\n\
    \n以下示例演示了比较运算符的使用：\n\n```\na = 10\nb = 3\nprint(a == b) # 输出：False\nprint(a !=\
    \ b) # 输出：True\nprint(a > b) # 输出：True\nprint(a < b) # 输出：False\nprint(a >= b)\
    \ # 输出：True\nprint(a <= b) # 输出：False\n```\n\n## 逻辑运算符\n\n逻辑运算符用于组合多个条件，并将结果评估为\
    \ True 或 False。Python 支持以下逻辑运算符：\n\n- 逻辑与（and）：如果两个操作数都为 True，则返回 True。\n- 逻辑或（or）：如果至少有一个操作数为\
    \ True，则返回 True。\n- 逻辑非（not）：返回操作数值的相反值。\n\n以下示例演示了逻辑运算符的使用：\n\n```\na = 10\n\
    b = 3\nc = 5\nprint(a > b and b < c) # 输出：True\nprint(a > b or b > c) # 输出：True\n\
    print(not(a > b)) # 输出：False\n```\n\n## 位运算符\n\n位运算符用于对二进制数的各个位执行操作。它们在底层编程或处理二进制数据时非常有用。Python\
    \ 支持以下位运算符：\n\n- 按位与（&）：对操作数的二进制表示执行按位与操作。\n- 按位或（|）：对操作数的二进制表示执行按位或操作。\n- 按位异或（^）：对操作数的二进制表示执行按位异或（排他或）操作。\n\
    - 按位非（~）：对操作数的二进制表示执行按位非操作。\n- 左移（<<）：将左侧操作数的位向左移动右侧操作数指定的位数。\n- 右移（>>）：将左侧操作数的位向右移动右侧操作数指定的位数。\n\
    \n以下示例演示了位运算符的使用：\n\n```\na = 10  # 二进制表示：1010\nb = 3  # 二进制表示：0011\nprint(a &\
    \ b)  # 输出：2（二进制表示：0010）\nprint(a | b)  # 输出：11（二进制表示：1011）\nprint(a ^ b)  # 输出：9（二进制表示：1001）\n\
    print(~a)  # 输出：-11（二进制表示：11111111111111111111111111110101）\nprint(a << 2)  #\
    \ 输出：40（二进制表示：101000）\nprint(a >> 2)  # 输出：2（二进制表示：10）\n```\n\n在本节中，我们介绍了 Python\
    \ 中不同类别的运算符，包括算术运算符、赋值运算符、比较运算符、逻辑运算符和位运算符。理解和掌握这些运算符对于在 Python 中执行各种计算和操作至关重要。\n\
    \n## 2.3 控制流\n\n控制流指的是程序中语句执行的顺序。它允许你根据某些条件或标准来控制执行流程。在 Python 中，控制流通过使用条件语句和循环来实现。\n\
    \n### 条件语句\n\n条件语句允许你根据某些条件执行不同的代码块。Python 中最常用的条件语句是 if、elif 和 else 语句。\n\nif\
    \ 语句用于在某个条件为真时执行一段代码。以下是 if 语句的基本语法：\n\n```\nif condition:\n    # 如果条件为真则执行的代码\n\
    ```\n\nelif 语句用于在之前的条件不为真时检查额外的条件。它代表“否则如果”。以下是 elif 语句的语法：\n\n```\nif condition1:\n\
    \    # 如果 condition1 为真则执行的代码\nelif condition2:\n    # 如果 condition2 为真则执行的代码\n\
    ```\n\nelse 语句用于在之前的条件都不为真时执行一段代码。它是可选的，并且只能出现在 if 或 elif 语句之后。以下是 else 语句的语法：\n\
    \n```\nif condition1:\n    # 如果 condition1 为真则执行的代码\nelif condition2:\n    # 如果\
    \ condition2 为真则执行的代码\nelse:\n    # 如果所有条件都不为真则执行的代码\n```\n\n让我们看一个例子来理解条件语句是如何工作的：\n\
    \n```\nage = 25\nif age < 18:\n    print(\"You are a minor.\")\nelif age >= 18\
    \ and age < 65:\n    print(\"You are an adult.\")\nelse:\n    print(\"You are\
    \ a senior citizen.\")\n```\n\n在这个例子中，程序检查 age 变量的值，并根据条件打印相应的消息。\n\n### 循环\n\n\
    循环允许你重复执行一段代码，直到满足某个条件。Python 提供了两种类型的循环：for 循环和 while 循环。\n\n#### For 循环\n\n\
    for 循环用于遍历一个序列（如列表、元组或字符串）或其他可迭代对象。它允许你对序列中的每个项目执行某个操作。以下是 for 循环的基本语法：\n\n```\n\
    for item in sequence:\n    # 对每个项目执行的代码\n```\n\n让我们看一个例子来理解 for 循环是如何工作的：\n\n\
    ```\nfruits = [\"apple\", \"banana\", \"cherry\"]\nfor fruit in fruits:\n    print(fruit)\n\
    ```\n\n在这个例子中，for 循环遍历 fruits 列表中的每个项目并打印它。\n\n#### While 循环\n\nwhile 循环用于在某个条件为真时重复执行一段代码。它允许你执行某个操作，直到条件变为假。以下是\
    \ while 循环的基本语法：\n\n```\nwhile condition:\n    # 只要条件为真就执行的代码\n```\n\n让我们看一个例子来理解\
    \ while 循环是如何工作的：\n\n```\ncount = 0\nwhile count < 5:\n    print(count)\n    count\
    \ += 1\n```\n\n在这个例子中，while 循环打印 count 的值并将其递增 1，直到达到 5。"
