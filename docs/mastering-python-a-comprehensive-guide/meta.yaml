    \n```\ntry:\n    # code that may raise an exception\nexcept Exception as e:\n\
    \    # handle exception\nfinally:\n    # cleanup code\n```\n\nThe finally block\
    \ is useful for releasing resources that need to be cleaned up, regardless of\
    \ whether an exception occurred or not.\n\n### 4. Avoid Bare Except Blocks\n\n\
