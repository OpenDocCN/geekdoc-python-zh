    \  # Output: Drawing a red circle.\n```\n\nIn this example, we have a base class\
    \ called Shape that has an __init__ method to initialize the color attribute and\
    \ a draw method to draw a generic shape. The derived classes Circle and Square\
    \ inherit from the Shape class and override the draw method to draw a specific\
    \ shape. The ColoredShape class inherits from both Circle and Square, allowing\
    \ it to draw a colored circle.\n\n### Method Overriding\n\nInheritance allows\
    \ you to override methods inherited from the base class in the derived class.\
    \ Method overriding is the process of providing a different implementation for\
    \ a method in the derived class. This allows you to customize the behavior of\
    \ the derived class without modifying the base class.\n\nTo override a method,\
    \ you simply define a method with the same name in the derived class. When the\
    \ method is called on an instance of the derived class, the overridden method\
    \ in the derived class is executed instead of the method in the base class.\n\n\
    Let’s consider an example to illustrate method overriding:\n\n```\nclass Vehicle:\n\
    \    def start(self):\n        print(\"The vehicle starts.\")\nclass Car(Vehicle):\n\
    ```"
  mdcn: "## 访问属性\n\n要访问对象的属性，你需要使用点号表示法。例如，要访问 `person1` 对象的 `name` 属性，你会使用 `person1.name`。类似地，要访问\
    \ `age` 属性，你会使用 `person1.age`。这里有一个例子：\n\n```\nprint(person1.name) # Output: John\n\
    print(person1.age) # Output: 25\n```\n\n在上面的例子中，我们访问了 `person1` 对象的 `name` 和 `age`\
    \ 属性，并打印了它们的值。\n\n## 方法\n\n除了属性，类还可以有方法。方法是在类内部定义的函数，可以在该类的对象上调用。它们可用于执行操作或操作类的属性。让我们为\
    \ `Person` 类添加一个名为 `say_hello` 的方法：\n\n```\nclass Person:\n    def __init__(self,\
    \ name, age):\n        self.name = name\n        self.age = age\n    def say_hello(self):\n\
    \        print(f\"Hello, my name is {self.name} and I am {self.age} years old.\"\
    )\n```\n\n在上面的例子中，我们定义了一个名为 `say_hello` 的方法，它接受 `self` 参数，并使用类的 `name` 和 `age`\
    \ 属性打印一条问候消息。\n\n要在对象上调用方法，你需要使用与访问属性类似的点号表示法。例如，要在 `person1` 对象上调用 `say_hello`\
    \ 方法，你会使用 `person1.say_hello()`。这里有一个例子：\n\n```\nperson1 = Person(\"John\", 25)\n\
    person1.say_hello() # Output: Hello, my name is John and I am 25 years old.\n\
    ```\n\n在上面的例子中，我们创建了一个 `Person` 对象 `person1` 并在其上调用了 `say_hello` 方法，该方法打印了一条问候消息。\n\
    \n## 继承\n\n面向对象编程的一个关键特性是继承，它允许你基于现有类创建新类。继承促进了代码重用，并允许你创建从基类继承属性和方法的特化类。\n\n\
    要创建一个从超类（基类）继承的子类（派生类），你需要使用 `class` 关键字定义子类，并在子类名称后的括号中指定超类。让我们创建一个名为 `Student`\
    \ 的子类，它继承自 `Person` 类：\n\n```\nclass Student(Person):\n    def __init__(self,\
    \ name, age, student_id):\n        super().__init__(name, age)\n        self.student_id\
    \ = student_id\n```\n\n在上面的例子中，我们定义了一个名为 `Student` 的子类，它继承自 `Person` 类。`Student`\
    \ 类有一个额外的属性 `student_id`。在 `Student` 类的构造函数内部，我们使用 `super()` 函数调用了 `Person` 类的构造函数，以初始化从\
    \ `Person` 类继承的 `name` 和 `age` 属性。\n\n通过继承 `Person` 类，`Student` 类自动获得了对 `Person`\
    \ 类中定义的所有属性和方法的访问权限。这使你能够重用代码并添加特定于 `Student` 类的额外功能。\n\n## 结论\n\n类和对象是面向对象编程的基本概念。它们允许你通过定义蓝图（类）并创建这些蓝图的实例（对象）来创建可重用和模块化的代码。在本节中，你学习了如何定义类、创建对象、访问属性以及定义方法。你还探索了继承的概念，它允许你基于现有类创建特化类。理解类和对象对于掌握\
    \ Python 和构建复杂应用程序至关重要。\n\n## 4.2 继承\n\n继承是面向对象编程（OOP）中的一个基本概念，它允许你基于现有类创建新类。它是一种机制，使你能够通过继承现有类（称为基类或超类）的属性和行为来定义一个新类（称为派生类或子类）。继承促进了代码重用，并允许你创建具有日益增加特化级别的类层次结构。\n\
    \n### 继承的语法\n\n在 Python 中，你可以使用 `class` 关键字后跟派生类的名称、一对括号和基类的名称来实现继承。定义从基类继承的派生类的语法如下：\n\
    \n```\nclass DerivedClass(BaseClass):\n    # class body\n```\n\n派生类继承基类的所有属性和方法，包括任何公共、受保护或私有成员。它也可以定义自己的属性和方法，或者覆盖从基类继承的方法。\n\
    \n### 单继承\n\n最常见的继承形式是单继承，其中派生类从单个基类继承。这允许派生类继承基类的所有属性和方法。让我们考虑一个例子来说明这个概念：\n\n\
    ```\nclass Animal:\n    def __init__(self, name):\n        self.name = name\n\
    \    def speak(self):\n        print(\"The animal makes a sound.\")\nclass Dog(Animal):\n\
    \    def __init__(self, name, breed):\n        super().__init__(name)\n      \
    \  self.breed = breed\n    def speak(self):\n        print(\"The dog barks.\"\
    )\ndog = Dog(\"Buddy\", \"Labrador\")\nprint(dog.name) # Output: Buddy\ndog.speak()\
    \ # Output: The dog barks.\n```\n\n在这个例子中，我们有一个名为 `Animal` 的基类，它有一个 `__init__`\
    \ 方法来初始化 `name` 属性，以及一个 `speak` 方法来发出通用的动物声音。派生类 `Dog` 继承自 `Animal` 类，并添加了自己的\
    \ `__init__` 方法来初始化 `breed` 属性，以及一个 `speak` 方法来发出特定的狗叫声。\n\n### 方法解析顺序（MRO）\n\n\
    当一个派生类从多个基类继承时，Python 使用方法解析顺序（MRO）来确定它应该搜索方法或属性的顺序。MRO 由 C3 线性化算法确定，该算法确保以一致且可预测的顺序搜索基类。\n\
    \n要查看一个类的 MRO，你可以使用 `mro()` 方法或 `__mro__` 属性。让我们考虑一个例子来理解 MRO 是如何工作的：\n\n```\n\
    class A:\n    def speak(self):\n        print(\"A\")\nclass B(A):\n    def speak(self):\n\
    \        print(\"B\")\nclass C(A):\n    def speak(self):\n        print(\"C\"\
    )\nclass D(B, C):\n    pass\nd = D()\nd.speak() # Output: B\n```\n\n在这个例子中，我们有四个类：A、B、C\
    \ 和 D。类 D 同时继承自 B 和 C，而 B 和 C 又继承自 A。当我们创建一个 D 的实例并调用 `speak` 方法时，它打印 “B”。这是因为\
    \ D 的 MRO 是 D -> B -> C -> A，Python 按照这个顺序搜索 `speak` 方法。\n\n### 多重继承\n\n多重继承允许一个派生类从多个基类继承。这意味着派生类可以从多个来源继承属性和方法。然而，如果相同的属性或方法在多个基类中定义，多重继承可能导致复杂的代码和潜在的冲突。\n\
    \n为了解决多重继承中的冲突，Python 遵循 C3 线性化算法，该算法确保以一致且可预测的顺序搜索基类。这个顺序由定义派生类时指定的基类顺序决定。\n\n\
    让我们考虑一个例子来理解多重继承：\n\n```\nclass Shape:\n    def __init__(self, color):\n     \
    \   self.color = color\n    def draw(self):\n        print(f\"Drawing a {self.color}\
    \ shape.\")\nclass Circle(Shape):\n    def draw(self):\n        print(f\"Drawing\
    \ a {self.color} circle.\")\nclass Square(Shape):\n    def draw(self):\n     \
    \   print(f\"Drawing a {self.color} square.\")\nclass ColoredShape(Circle, Square):\n\
    \    pass\nshape = ColoredShape(\"red\")\nshape.draw()  # Output: Drawing a red\
    \ circle.\n```\n\n在这个例子中，我们有一个名为 `Shape` 的基类，它有一个 `__init__` 方法来初始化 `color` 属性，以及一个\
    \ `draw` 方法来绘制一个通用形状。派生类 `Circle` 和 `Square` 继承自 `Shape` 类，并覆盖了 `draw` 方法以绘制特定形状。`ColoredShape`\
    \ 类同时继承自 `Circle` 和 `Square`，使其能够绘制一个彩色的圆形。\n\n### 方法覆盖\n\n继承允许你在派生类中覆盖从基类继承的方法。方法覆盖是在派生类中为方法提供不同实现的过程。这使你能够自定义派生类的行为，而无需修改基类。\n\
    \n要覆盖一个方法，你只需在派生类中定义一个同名的方法。当在派生类的实例上调用该方法时，将执行派生类中覆盖的方法，而不是基类中的方法。\n\n让我们考虑一个例子来说明方法覆盖：\n\
    \n```\nclass Vehicle:\n    def start(self):\n        print(\"The vehicle starts.\"\
    )\nclass Car(Vehicle):\n```"
