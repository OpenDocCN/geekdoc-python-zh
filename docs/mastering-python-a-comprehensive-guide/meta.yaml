- img_proc: true
  md: '3.9.2) for the best experience.


    +   4. Scroll down to the Files section and select the appropriate installer for
    your system. If you are using a 64-bit version of Windows, choose the “Windows
    x86-64 executable installer.” If you are unsure, select the “Windows x86 executable
    installer” as it will work on both 32-bit and 64-bit systems.

    5. Once the installer is downloaded, double-click on it to start the installation
    process.

    6. In the installer, make sure to check the box that says “Add Python to PATH.”
    This will allow you to run Python from the command prompt without having to specify
    the full path to the Python executable.

    7. Click on the “Install Now” button to begin the installation.

    8. The installer will now copy the necessary files and set up Python on your system.
    This process may take a few minutes.

    9. Once the installation is complete, you will see a screen that says “Setup was
    successful.” Click on the “Close” button to exit the installer.


    Congratulations! You have successfully installed Python on your Windows computer.
    To verify the installation, open the command prompt and type python—version. You
    should see the version number of Python that you installed.


    # Installing Python on macOS


    Installing Python on macOS is a straightforward process. Here’s how you can do
    it:


    +   1. Open a web browser and go to the official Python website at www.python.org.

    2. Navigate to the Downloads section and click on the “Download Python” button.

    3. On the Downloads page, you will see different versions of Python available
    for download. Choose the latest stable version (e.g., Python 3.9.2) for the best
    experience.

    4. Scroll down to the Files section and select the macOS installer package (.dmg)
    for the version of Python you chose.

    5. Once the installer is downloaded, double-click on it to mount the disk image.'
