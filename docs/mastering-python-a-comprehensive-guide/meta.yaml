- md: "## 10.1 Introduction to Web Scraping\n\nWeb scraping is the process of extracting\
    \ data from websites. It involves retrieving information from web pages and saving\
    \ it in a structured format for further analysis or use. Python provides powerful\
    \ libraries and tools that make web scraping easy and efficient.\n\nIn this section,\
    \ we will explore the basics of web scraping using Python. We will learn how to\
    \ retrieve data from HTML pages, scrape dynamic websites, and automate tasks using\
    \ Python.\n\n### Understanding Web Scraping\n\nWeb scraping is a valuable technique\
    \ for gathering data from the internet. It allows us to extract information from\
    \ websites that may not provide an API or have a downloadable dataset. With web\
    \ scraping, we can collect data from multiple sources and combine it for analysis\
    \ or research purposes.\n\nWeb scraping involves sending HTTP requests to a website,\
    \ retrieving the HTML content, and then parsing and extracting the desired data.\
    \ The extracted data can be saved in various formats, such as CSV, JSON, or a\
    \ database.\n\n### The Basics of HTML\n\nBefore we dive into web scraping, it’s\
    \ essential to have a basic understanding of HTML (Hypertext Markup Language).\
    \ HTML is the standard markup language used to create web pages. It consists of\
    \ tags that define the structure and content of a web page.\n\nWhen scraping a\
    \ website, we need to inspect its HTML structure to identify the elements containing\
    \ the data we want to extract. We can use browser developer tools to view the\
    \ HTML source code and locate the relevant elements.\n\n### Scraping HTML Pages\n\
    \nTo scrape HTML pages, we need to use a combination of libraries in Python. The\
    \ most commonly used libraries for web scraping are requests and BeautifulSoup.\n\
    \nThe requests library allows us to send HTTP requests to a website and retrieve\
    \ the HTML content. We can specify headers, cookies, and other parameters to mimic\
    \ a web browser’s behavior.\n\nOnce we have the HTML content, we can use the BeautifulSoup\
    \ library to parse and extract data from the HTML. BeautifulSoup provides a simple\
    \ and intuitive interface for navigating and searching the HTML tree structure.\n\
    \nWe can locate elements using CSS selectors or XPath expressions and extract\
    \ their text, attributes, or other properties. BeautifulSoup also provides methods\
    \ for filtering and manipulating the extracted data.\n\n### Scraping Dynamic Websites\n\
    \nSome websites generate content dynamically using JavaScript. Traditional web\
    \ scraping techniques may not work on these websites because the HTML is not fully\
    \ rendered when we retrieve it.\n\nTo scrape dynamic websites, we can use libraries\
    \ like Selenium or Scrapy. Selenium is a powerful tool for automating web browsers\
    \ and interacting with web pages. It allows us to simulate user actions, such\
    \ as clicking buttons or filling out forms, and retrieve the updated HTML content.\n\
    \nScrapy is a comprehensive web scraping framework that provides a high-level\
    \ API for building web spiders. It handles the complexities of crawling websites,\
    \ following links, and extracting data in a structured manner.\n\n### Automating\
    \ Tasks with Python\n\nPython can be used to automate various tasks on the web.\
    \ With web scraping, we can automate repetitive tasks like data collection, monitoring\
    \ websites for updates, or extracting information from multiple pages.\n\nWe can\
    \ schedule our Python scripts to run at specific intervals using tools like cron\
    \ or Task Scheduler. This allows us to automate tasks that require regular data\
    \ updates or monitoring.\n\nPython also provides libraries like smtplib for sending\
    \ emails, pyautogui for simulating mouse and keyboard actions, and pyperclip for\
    \ interacting with the clipboard. These libraries, combined with web scraping\
    \ techniques, enable us to automate a wide range of tasks efficiently.\n\nIn this\
    \ section, we have covered the basics of web scraping using Python. We have learned\
    \ how to retrieve data from HTML pages, scrape dynamic websites, and automate\
    \ tasks. With these skills, you can extract valuable information from the web\
    \ and use it for various purposes, such as data analysis, research, or automation.\n\
    \n## 10.2 Scraping HTML Pages\n\nWeb scraping is the process of extracting data\
    \ from websites. It involves parsing the HTML structure of a webpage and extracting\
    \ the desired information. Python provides several libraries and tools that make\
    \ web scraping easy and efficient. In this section, we will explore how to scrape\
    \ HTML pages using Python.\n\n### Understanding HTML Structure\n\nBefore we dive\
    \ into web scraping, it is important to have a basic understanding of HTML structure.\
    \ HTML (Hypertext Markup Language) is the standard markup language for creating\
    \ web pages. It uses tags to define the structure and content of a webpage.\n\n\
    HTML tags are enclosed in angle brackets (<>) and consist of an opening tag and\
    \ a closing tag. The opening tag starts with the tag name, followed by any attributes.\
    \ The closing tag is similar to the opening tag but includes a forward slash (/)\
    \ before the tag name.\n\nFor example, the following HTML code represents a simple\
    \ webpage structure:\n\n```html\n<html>\n<head>\n<title>My Webpage</title>\n</head>\n\
    <body>\n<h1>Welcome to My Webpage</h1>\n<p>This is a paragraph.</p>\n<ul>\n<li>Item\
    \ 1</li>\n<li>Item 2</li>\n<li>Item 3</li>\n</ul>\n</body>\n</html>\n```\n\nIn\
    \ this example, the `<html>` tag represents the root element of the webpage. The\
    \ `<head>` tag contains meta-information about the webpage, such as the title.\
    \ The `<body>` tag contains the visible content of the webpage.\n\n### Scraping\
    \ HTML with Beautiful Soup\n\nBeautiful Soup is a Python library that makes it\
    \ easy to scrape information from HTML and XML documents. It provides a simple\
    \ and intuitive API for navigating and manipulating the HTML structure.\n\nTo\
    \ use Beautiful Soup, you first need to install it. You can install it using pip,\
    \ the Python package manager, by running the following command:\n\n```bash\npip\
    \ install beautifulsoup4\n```\n\nOnce installed, you can import the library into\
    \ your Python script using the following line of code:\n\n```python\nfrom bs4\
    \ import BeautifulSoup\n```\n\nTo scrape an HTML page, you first need to download\
    \ the HTML content. This can be done using the requests library, which allows\
    \ you to send HTTP requests and retrieve the response. Here’s an example of how\
    \ to download an HTML page:\n\n```python\nimport requests\nurl = \"https://www.example.com\"\
    \nresponse = requests.get(url)\nhtml_content = response.text\n```\n\nOnce you\
    \ have the HTML content, you can create a Beautiful Soup object by passing the\
    \ HTML content and the parser you want to use. Beautiful Soup supports different\
    \ parsers, such as the built-in html.parser or the faster lxml parser. Here’s\
    \ an example of how to create a Beautiful Soup object:\n\n```python\nsoup = BeautifulSoup(html_content,\
    \ 'html.parser')\n```\n\nWith the Beautiful Soup object, you can now navigate\
    \ and search the HTML structure to extract the desired information. Beautiful\
    \ Soup provides several methods for finding elements, such as `find()` and `find_all()`,\
    \ which allow you to search for elements based on their tag name, attributes,\
    \ or CSS selectors.\n\nHere’s an example of how to find all the `<a>` tags in\
    \ an HTML page and print their text and href attributes:\n\n```python\nfor link\
    \ in soup.find_all('a'):\n    print(\"Text:\", link.text)\n    print(\"URL:\"\
    , link.get('href'))\n    print()\n```\n\nIn addition to searching for elements,\
    \ Beautiful Soup also provides methods for navigating the HTML structure, such\
    \ as parent, next_sibling,"
  mdcn: "## 10.1 网络爬虫简介\n\n网络爬虫是从网站中提取数据的过程。它涉及从网页中检索信息，并将其保存为结构化格式以供进一步分析或使用。Python\
    \ 提供了强大的库和工具，使网络爬虫变得简单高效。\n\n在本节中，我们将探索使用 Python 进行网络爬虫的基础知识。我们将学习如何从 HTML 页面中检索数据、抓取动态网站，以及使用\
    \ Python 自动化任务。\n\n### 理解网络爬虫\n\n网络爬虫是从互联网收集数据的一项宝贵技术。它允许我们从可能不提供 API 或没有可下载数据集的网站中提取信息。通过网络爬虫，我们可以从多个来源收集数据，并将其组合用于分析或研究目的。\n\
    \n网络爬虫涉及向网站发送 HTTP 请求、检索 HTML 内容，然后解析并提取所需的数据。提取的数据可以保存为多种格式，例如 CSV、JSON 或数据库。\n\
    \n### HTML 基础\n\n在深入研究网络爬虫之前，必须对 HTML（超文本标记语言）有基本的了解。HTML 是用于创建网页的标准标记语言。它由定义网页结构和内容的标签组成。\n\
    \n抓取网站时，我们需要检查其 HTML 结构，以识别包含我们想要提取的数据的元素。我们可以使用浏览器开发者工具来查看 HTML 源代码并定位相关元素。\n\
    \n### 抓取 HTML 页面\n\n要抓取 HTML 页面，我们需要在 Python 中使用库的组合。最常用于网络爬虫的库是 `requests` 和\
    \ `BeautifulSoup`。\n\n`requests` 库允许我们向网站发送 HTTP 请求并检索 HTML 内容。我们可以指定 headers、cookies\
    \ 和其他参数来模拟 Web 浏览器的行为。\n\n一旦我们有了 HTML 内容，我们就可以使用 `BeautifulSoup` 库来解析和提取 HTML\
    \ 中的数据。`BeautifulSoup` 提供了一个简单直观的接口来导航和搜索 HTML 树结构。\n\n我们可以使用 CSS 选择器或 XPath 表达式来定位元素，并提取它们的文本、属性或其他属性。`BeautifulSoup`\
    \ 还提供了用于过滤和操作提取数据的方法。\n\n### 抓取动态网站\n\n一些网站使用 JavaScript 动态生成内容。传统的网络爬虫技术可能无法在这些网站上工作，因为当我们检索\
    \ HTML 时，它并未完全渲染。\n\n要抓取动态网站，我们可以使用像 `Selenium` 或 `Scrapy` 这样的库。`Selenium` 是一个强大的工具，用于自动化\
    \ Web 浏览器并与网页进行交互。它允许我们模拟用户操作，例如单击按钮或填写表单，并检索更新后的 HTML 内容。\n\n`Scrapy` 是一个全面的网络爬虫框架，提供了一个高级\
    \ API 来构建网络蜘蛛。它处理了爬取网站、跟踪链接和以结构化方式提取数据的复杂性。\n\n### 使用 Python 自动化任务\n\nPython 可用于自动化\
    \ Web 上的各种任务。通过网络爬虫，我们可以自动化重复性任务，例如数据收集、监控网站更新或从多个页面提取信息。\n\n我们可以使用像 `cron` 或任务计划程序这样的工具来安排我们的\
