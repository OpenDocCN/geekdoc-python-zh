    print(my_dict) # 输出：{}


    在上面的例子中，我们使用了 `keys()`、`values()` 和 `items()` 方法来分别检索字典的键、值和项。我们还使用了 `update()`
    方法来向字典添加新的键值对并更新现有的键值对。最后，我们使用了 `clear()` 方法来移除字典中的所有项。


    当你需要基于特定的键来存储和检索数据时，字典非常有用。它们提供了一种灵活且高效的方式来组织和操作 Python 中的数据。理解字典及其方法对于掌握 Python
    并成为一名熟练的程序员至关重要。


    ## 3.4 集合


    在 Python 中，集合是一个无序的唯一元素集合。它是一种强大的数据结构，允许你执行各种操作，例如添加和移除元素、检查成员资格，以及执行并集、交集和差集等集合运算。集合是可变的，这意味着你可以在创建后修改它们。


    ### 创建集合


    要在 Python 中创建一个集合，你可以使用花括号 `{}` 或 `set()` 函数。以下是一个示例：


    ```

    # 使用花括号

    my_set = {1, 2, 3, 4, 5}

    # 使用 set() 函数

    my_set = set([1, 2, 3, 4, 5])

    ```


    在上面的例子中，我们创建了一个名为 `my_set` 的集合，其中包含元素 1、2、3、4 和 5。请注意，集合不允许重复元素，因此任何重复的值都会被自动移除。


    ### 添加和移除元素


    你可以使用 `add()` 方法或 `update()` 方法来向集合添加元素。要移除元素，你可以使用 `remove()` 方法或 `discard()`
    方法。以下是一个示例：


    ```

    my_set = {1, 2, 3}

    # 添加元素

    my_set.add(4)

    my_set.update([5, 6, 7])

    # 移除元素

    my_set.remove(3)

    my_set.discard(2)

    ```


    在上面的例子中，我们使用 `add()` 和 `update()` 方法向集合 `my_set` 添加了元素 4、5、6 和 7。然后，我们分别使用 `remove()`
    和 `discard()` 方法移除了元素 3 和 2。


    ### 集合运算


    Python 中的集合支持多种运算，如并集、交集、差集和对称差集。这些运算允许你组合或比较集合以获得所需的结果。以下是一些示例：


    ```

    set1 = {1, 2, 3}

    set2 = {3, 4, 5}

    # 并集

    union_set = set1.union(set2)

    # 输出：{1, 2, 3, 4, 5}

    # 交集

    intersection_set = set1.intersection(set2)

    # 输出：{3}

    # 差集

    difference_set = set1.difference(set2)

    # 输出：{1, 2}

    # 对称差集

    symmetric_difference_set = set1.symmetric_difference(set2)

    # 输出：{1, 2, 4, 5}

    ```


    在上面的例子中，我们对 `set1` 和 `set2` 执行了不同的集合运算。`union()` 方法返回一个新集合，其中包含两个集合中的所有唯一元素。`intersection()`
    方法返回一个新集合，其中包含两个集合的共同元素。`difference()` 方法返回一个新集合，其中包含存在于 `set1` 但不存在于 `set2` 的元素。`symmetric_difference()`
    方法返回一个新集合，其中包含存在于 `set1` 或 `set2` 中但不同时存在于两者中的元素。


    ### 成员资格和长度


    你可以使用 `in` 关键字来检查一个元素是否存在于集合中。`len()` 函数可用于获取集合中的元素数量。以下是一个示例：


    ```

    my_set = {1, 2, 3, 4, 5}

    # 成员资格

    print(3 in my_set)

    # 输出：True

    # 长度

    print(len(my_set))

    # 输出：5

    ```


    在上面的例子中，我们使用 `in` 关键字检查元素 3 是否存在于 `my_set` 中。我们还使用 `len()` 函数获取了 `my_set` 中的元素数量，即
    5。


    ### 集合推导式


    与列表推导式类似，Python 也支持集合推导式，它允许你以简洁且可读的方式创建集合。以下是一个示例：


    ```

    my_set = {x for x in range(1, 6)}

    # 输出：{1, 2, 3, 4, 5}

    ```


    在上面的例子中，我们使用集合推导式创建了一个名为 `my_set` 的集合，其中包含从 1 到 5 的数字。


    ### 冻结集合


    除了可变集合外，Python 还提供了一种名为冻结集合的内置数据类型。冻结集合是不可变的，这意味着你无法在创建后修改它们。这在你想要创建一个无法更改的集合的场景中非常有用。以下是一个示例：


    ```

    my_set = frozenset([1, 2, 3, 4, 5])

    ```


    在上面的例子中，我们创建了一个名为 `my_set` 的冻结集合，其中包含元素 1、2、3、4 和 5。由于冻结集合是不可变的，你无法向其中添加或移除元素。


    ### 总结


    集合是 Python 中一种有价值的数据结构，它允许你处理唯一元素并执行各种集合运算。在本节中，你学习了如何创建集合、添加和移除元素、执行集合运算、检查成员资格、获取集合长度、使用集合推导式以及使用冻结集合。理解集合及其运算将极大地增强你在
    Python 中处理数据的能力。


    ## 3.5 字符串


    在 Python 中，字符串是用单引号 (`''`) 或双引号 (`""`) 括起来的字符序列。字符串是 Python 中最常用的数据类型之一，用于表示文本数据。它们是不可变的，这意味着一旦创建了字符串，就无法更改。但是，你可以对字符串执行各种操作来操作和提取信息。


    ### 创建字符串


    要在 Python 中创建一个字符串，你只需将所需的文本用引号括起来即可。例如：


    ```

    my_string = "Hello, World!"

    ```


    在上面的例子中，我们创建了一个名为 `my_string` 的字符串变量，并为其赋值 "Hello, World!"。你也可以使用单引号来创建字符串：


    ```

    my_string = ''Hello, World!''

    ```


    单引号和双引号可以互换使用来创建字符串。但是，如果你想在字符串本身中包含一个引号字符，你需要使用相反类型的引号来括起字符串。例如：


    ```

    my_string = "He said, ''Hello, World!''"

    ```


    在上面的例子中，我们使用了双引号来括起字符串，因为它包含一个单引号字符。


    ### 访问字符串中的字符


    你可以使用索引来访问字符串中的单个字符。在 Python 中，索引从 0 开始，因此字符串的第一个字符位于索引 0，第二个字符位于索引 1，依此类推。例如：


    ```

    my_string = "Hello, World!"

    print(my_string[0]) # 输出：H

    print(my_string[7]) # 输出：W

    ```


    在上面的例子中，我们使用 `my_string[0]` 访问了字符串的第一个字符，使用 `my_string[7]` 访问了第八个字符。


    ### 字符串切片


    除了访问单个字符外，你还可以使用切片从字符串中提取子字符串。切片允许你指定索引范围来提取字符串的一部分。切片的语法是 `string[start:end]`，其中
    `start` 是要包含的第一个字符的索引，`end` 是要排除的第一个字符的索引。例如：


    ```

    my_string = "Hello, World!"

    print(my_string[0:5])  # 输出：Hello

    print(my_string[7:])  # 输出：World!

    ```


    在上面的例子中，`my_string[0:5]` 提取了从索引 0 到索引 4（包含）的字符，而 `my_string[7:]` 提取了从索引 7 到字符串末尾的所有字符。


    ### 字符串连接


    字符串连接是将两个或多个字符串组合成一个字符串的过程。在 Python 中，你可以使用 `+` 运算符来连接字符串。例如：


    ```

    string1 = "Hello"

    string2 = "World"

    concatenated_string = string1 + " " + string2

    print(concatenated_string)  # 输出：Hello World

    ```


    在上面的例子中，我们将 `string1`、一个空格字符和 `string2` 连接起来，创建了字符串 "Hello World"。


    ### 字符串方法


    Python 提供了多种内置方法，你可以使用它们来操作和处理字符串。一些常用的字符串方法包括：


    -   `len()`：返回字符串的长度。

    -   `lower()`：将字符串中的所有字符转换为小写。

    -   `upper()`：将字符串中的所有字符转换为大写。

    -   `strip()`：移除字符串开头和结尾的空白字符。

    -   `split()`：根据指定的分隔符将字符串分割成子字符串列表。

    -   `replace()`：将指定的子字符串替换为另一个子字符串。'
