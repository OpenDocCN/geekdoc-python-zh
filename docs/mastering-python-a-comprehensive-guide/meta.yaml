  md: '# Writing to Files


    To write to a file, we need to open it in write mode (“w”) or append mode (“a”).
    In write mode, the contents of the file are overwritten, while in append mode,
    new content is added to the end of the file.


    ```

    file = open("example.txt", "w")

    file.write("Hello, World!")

    file.close()

    ```


    If we want to write multiple lines to a file, we can use the writelines() method.
    This method takes a list of strings as input and writes each string as a separate
    line in the file.


    ```

    file = open("example.txt", "w")

    lines = ["Line 1\n", "Line 2\n", "Line 3\n"]

    file.writelines(lines)

    file.close()

    ```


