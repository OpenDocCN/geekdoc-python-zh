  md: "# Method Resolution Order (MRO)\n\nWhen a derived class inherits from multiple\
    \ base classes, Python uses a method resolution order (MRO) to determine the order\
    \ in which it should search for a method or attribute. The MRO is determined by\
    \ the C3 linearization algorithm, which ensures that the base classes are searched\
    \ in a consistent and predictable order.\n\nTo view the MRO of a class, you can\
    \ use the mro() method or the __mro__ attribute. Let’s consider an example to\
    \ understand how the MRO works:\n\n```\nclass A:\n    def speak(self):\n     \
    \   print(\"A\")\nclass B(A):\n    def speak(self):\n        print(\"B\")\nclass\
    \ C(A):\n    def speak(self):\n        print(\"C\")\nclass D(B, C):\n    pass\n\
    d = D()\nd.speak() # Output: B\n```\n\nIn this example, we have four classes:\
    \ A, B, C, and D. Class D inherits from both B and C, which in turn inherit from\
    \ A. When we create an instance of D and call the speak method, it prints “B”.\
    \ This is because the MRO for D is D -> B -> C -> A, and Python searches for the\
    \ speak method in this order.\n\n# Multiple Inheritance\n\nMultiple inheritance\
    \ allows a derived class to inherit from multiple base classes. This means that\
    \ the derived class can inherit attributes and methods from multiple sources.\
    \ However, multiple inheritance can lead to complex code and potential conflicts\
    \ if the same attribute or method is defined in multiple base classes.\n\nTo resolve\
    \ conflicts in multiple inheritance, Python follows the C3 linearization algorithm,\
    \ which ensures that the base classes are searched in a consistent and predictable\
    \ order. This order is determined by the order in which the base classes are specified\
    \ when defining the derived class."
