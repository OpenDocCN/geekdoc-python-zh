    \ Doe',))\n    cursor.execute('DELETE FROM employees WHERE name = ?', ('John Doe',))\n\
    \    # Commit the transaction\n    conn.commit()\nexcept:\n    # Rollback the\
    \ transaction if an error occurs\n    conn.rollback()\n# Close the cursor and\
