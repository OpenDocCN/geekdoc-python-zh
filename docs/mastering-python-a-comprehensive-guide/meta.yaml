    # 9.3 Working with Result Sets


    When working with databases, it is common to retrieve data from tables using SQL
    queries. These queries return result sets, which are essentially collections of
    rows and columns that match the specified criteria. In this section, we will explore
    how to work with result sets in Python.


    # Fetching Rows


    To retrieve data from a database table, we use the SELECT statement in SQL. Once
    the query is executed, the result set is returned to the Python program. To access
    the rows of the result set, we can use various methods provided by the database
    API.


    One common method is the fetchone() method, which retrieves the next row of the
    result set. It returns a single row as a tuple or None if there are no more rows
    to fetch. Here’s an example:


    ```

    import sqlite3

    # Connect to the database

    conn = sqlite3.connect(''mydatabase.db'')

    cursor = conn.cursor()

    # Execute the query

    cursor.execute(''SELECT * FROM employees'')

    # Fetch the first row

    row = cursor.fetchone()

    print(row)

    # Fetch the next row

    row = cursor.fetchone()

    print(row)

    # Close the connection

    conn.close()

    ```


