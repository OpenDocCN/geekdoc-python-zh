    \    # code to be executed if condition1 is true\nelif condition2:\n    # code\
    \ to be executed if condition2 is true\nelse:\n    # code to be executed if none\
    \ of the conditions are true\n```\n\nLet’s look at an example to understand how\
    \ conditional statements work:\n\n```\nage = 25\n```"
  - "[PAGE 25]\n\n```\nif age < 18:\n    print(\"You are a minor.\")\nelif age >=\
    \ 18 and age < 65:\n    print(\"You are an adult.\")\nelse:\n    print(\"You are\
    \ a senior citizen.\")\n```\n\nIn this example, the program checks the value of\
    \ the age variable and prints a corresponding message based on the condition.\n\
    \n# Loops\n\nLoops allow you to repeatedly execute a block of code until a certain\
    \ condition is met. Python provides two types of loops: for loops and while loops.\n\
    \n# For Loops\n\nA for loop is used to iterate over a sequence (such as a list,\
    \ tuple, or string) or other iterable objects. It allows you to perform a certain\
    \ action for each item in the sequence. Here’s the basic syntax of a for loop:\n\
    \n```\nfor item in sequence:\n    # code to be executed for each item\n```\n\n\
    Let’s look at an example to understand how for loops work:\n\n```\nfruits = [\"\
    apple\", \"banana\", \"cherry\"]\nfor fruit in fruits:\n    print(fruit)\n```\n\
    \nIn this example, the for loop iterates over each item in the fruits list and\
