    # List Comprehension


    List comprehension is a concise way to create lists based on existing lists or
    other iterable objects. It allows you to combine loops and conditional statements
    in a single line of code. For example:


    ```

    numbers = [1, 2, 3, 4, 5]

    squared_numbers = [x**2 for x in numbers]

    print(squared_numbers) # Output: [1, 4, 9, 16, 25]

    ```


    In this example, we use list comprehension to create a new list squared_numbers
    that contains the squares of the elements in the numbers list.


