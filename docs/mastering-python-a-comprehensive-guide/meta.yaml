    d\", \"\", text)\nprint(new_text)\n```\n\n输出：\n\n```\nI have apples and oranges.\n\
    ```\n\n在上面的示例中，我们使用正则表达式模式 `\\d` 匹配输入字符串 `text` 中的任何数字。然后，我们使用 `sub()` 函数将其替换为空字符串。结果字符串\
    \ `new_text` 被打印到控制台。\n\n### 添加前缀或后缀\n\n要向文本中的某些模式或子字符串添加前缀或后缀，我们可以使用 `re.sub()`\
