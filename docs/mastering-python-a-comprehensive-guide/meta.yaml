    Python has several built-in data types that are used to represent different kinds
    of values. Here are some of the commonly used data types in Python:


    +   1. **Numeric Types**: Numeric types are used to represent numbers in Python.
    There are three numeric types in Python: int, float, and complex. The int type
    is used to represent integers, the float type is used to represent floating-point
    numbers, and the complex type is used to represent complex numbers.

    2. **String Type**: The str type is used to represent strings in Python. A string
    is a sequence of characters enclosed in single quotes ('') or'
