    # Non-Capturing Groups


    In some cases, we may want to use parentheses for grouping purposes without capturing
    the matched text. We can achieve this by using non-capturing groups, denoted by
    the (?:...) syntax. Non-capturing groups are useful when we want to apply a quantifier
    to a group but don’t need to extract the matched text.


    For example, let’s say we want to find all occurrences of the word “cat” followed
    by either “s” or “es”. We can use the following regular expression:


    ```

    import re

    text = "I have a cat. She has two cats."

    pattern = r"cat(?:s|es)"

    matches = re.findall(pattern, text)

    print(matches)

    Output:

    [''cat'', ''cats'']

    ```


    In this example, the non-capturing group (?:s|es) matches either “s” or “es” after
    the word “cat”. The matched text is not captured, but the entire pattern is considered
    for matching.


    # Backreferences


    Backreferences allow us to refer to a previously captured group within the same
    regular expression. They are denoted by the \number syntax, where number is the
    index of the captured group.


    For example, let’s say we want to find all occurrences of a repeated word in a
    sentence. We can use the following regular expression:


    ```

    import re

    text = "This is is a test test sentence."

    pattern = r"\b(\w+)\s+\1\b"

    matches = re.findall(pattern, text)

    print(matches)

    Output:

    [''is'', ''test'']

    ```


    In this example, the backreference \1 refers to the first captured group (\w+),
    which matches any word character. The pattern \b(\w+)\s+\1\b ensures that the
    same word is repeated consecutively.'
