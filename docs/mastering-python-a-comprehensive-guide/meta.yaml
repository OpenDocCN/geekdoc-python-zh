    except InvalidInputError as e:\n    print(e)\n```\n\n在上面的示例中，我们通过创建一个继承自 Exception\
    \ 类的新类来定义自定义异常 InvalidInputError。在 process_input 函数内部，我们检查输入值是否为整数。如果不是，我们引发 InvalidInputError\
    \ 异常并附带自定义错误消息。在 except 块中，我们捕获异常并打印错误消息。\n\n### 异常参数\n\n内置异常和自定义异常都可以接受参数，这些参数提供有关异常的附加信息。这些参数可以在引发异常时传递，并使用异常对象的\
    \ args 属性访问。\n\n以下是一个演示如何传递和访问异常参数的示例：\n\n```\nclass InvalidInputError(Exception):\n\
    \    pass\n\ndef process_input(value):\n```"
