    import re\ntext = \"Hello, Smith! How are you, Smith?\"\nnew_text = re.sub(r\"\
    \\bSmith\\b\", \"Mr. Smith\", text)\nprint(new_text)\n```\n\n输出：\n\n```\nHello,\
