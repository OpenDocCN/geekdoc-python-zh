    \    def area(self):\n        return self.length * self.width\n\nclass Circle(Shape):\n\
    \    def __init__(self, radius):\n        self.radius = radius\n    def area(self):\n\
    \        return 3.14 * self.radius * self.radius\n```\n\nIn the above example,\
    \ both the Rectangle and Circle classes inherit from the Shape class and override\
    \ the area() method. This allows us to treat objects of both classes as Shape\
    \ objects and call the area() method on them.\n\n```python\nrectangle = Rectangle(5,\
    \ 3)\ncircle = Circle(4)\nprint(rectangle.area())  # Output: 15\nprint(circle.area())\
