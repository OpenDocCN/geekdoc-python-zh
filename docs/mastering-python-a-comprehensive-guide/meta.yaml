    \ exceptions by specifying them in a tuple:\n\n```\ntry:\n    # Code that may\
    \ raise an exception\n    result = int('abc')\nexcept (ValueError, TypeError):\n\
    \    # Code to handle the exceptions\n    print(\"Invalid input\")\n```\n\nIn\
    \ addition to handling specific exceptions, you can also catch all exceptions\
    \ by using the Exception class:\n\n```\ntry:\n    # Code that may raise an exception\n\
    \    result = int('abc')\nexcept Exception as e:\n    # Code to handle the exception\n\
    \    print(\"An error occurred:\", str(e))\n```\n\nThe as keyword allows you to\
    \ assign the exception object to a variable, which can be useful for logging or\
    \ further analysis.\n\nSometimes, you may want to execute certain code regardless\
    \ of whether an exception occurs or not. You can achieve this by using the finally\
    \ block, which is executed after the try and except blocks, regardless of whether\
    \ an exception was raised or not.\n\n```\ntry:\n    # Code that may raise an exception\n\
    \    result = int('123')\nexcept ValueError:\n    # Code to handle the exception\n\
    \    print(\"Invalid input\")\nfinally:\n    # Code to execute regardless of exceptions\n\
    \    print(\"Execution complete\")\n```\n\nThe finally block is often used to\
    \ perform cleanup operations, such as closing files or releasing resources, regardless\
