    ## 3.2 元组


    在 Python 中，元组是一个有序的元素集合，用圆括号括起来，元素之间用逗号分隔。元组与列表类似，但它们是不可变的，这意味着一旦创建了元组，其元素就不能被修改。元组通常用于将相关的数据片段存储在一起。


    ### 创建元组


    要创建一个元组，你可以简单地将元素放在圆括号中，并用逗号分隔。例如：


    ```

    my_tuple = (1, 2, 3, 4, 5)

    ```


    你也可以通过用逗号分隔元素来创建元组，而不使用圆括号。例如：


    ```

    my_tuple = 1, 2, 3, 4, 5

    ```


    元组可以包含不同数据类型的元素，包括数字、字符串，甚至其他元组。例如：


    ```

    mixed_tuple = (1, "hello", (2, 3, 4), [5, 6, 7])

    ```


    ### 访问元组中的元素


    你可以使用索引来访问元组中的单个元素，类似于访问列表中的元素。元组中第一个元素的索引是 0，第二个元素是 1，依此类推。例如：


    ```

    my_tuple = (1, 2, 3, 4, 5)

    print(my_tuple[0]) # 输出: 1

    print(my_tuple[2]) # 输出: 3

    ```


    你也可以使用负索引来从元组末尾访问元素。例如：


    ```

    my_tuple = (1, 2, 3, 4, 5)

    print(my_tuple[-1]) # 输出: 5

    print(my_tuple[-3]) # 输出: 3

    ```


    ### 元组切片


    除了访问单个元素，你还可以使用切片从元组中提取元素子集。切片允许你创建一个新元组，其中包含原始元组中的一系列元素。切片的语法是 `start:stop:step`，其中
    `start` 是要包含的第一个元素的索引，`stop` 是要排除的第一个元素的索引，`step` 是要跳过的元素数量。例如：


    ```

    my_tuple = (1, 2, 3, 4, 5)

    print(my_tuple[1:4]) # 输出: (2, 3, 4)

    print(my_tuple[::2]) # 输出: (1, 3, 5)

    print(my_tuple[::-1]) # 输出: (5, 4, 3, 2, 1)

    ```


    ### 修改元组


    如前所述，元组是不可变的，这意味着一旦创建，就不能修改其元素。但是，你可以通过连接或重复现有元组来创建一个新元组。例如：


    ```

    tuple1 = (1, 2, 3)

    tuple2 = (4, 5, 6)

    concatenated_tuple = tuple1 + tuple2

    print(concatenated_tuple) # 输出: (1, 2, 3, 4, 5, 6)

    repeated_tuple = tuple1 * 3

    print(repeated_tuple) # 输出: (1, 2, 3, 1, 2, 3, 1, 2, 3)

    ```


    ### 元组方法


    尽管元组是不可变的，但它们仍然有一些可用于对其执行操作的方法。一些常用的元组方法包括：


    -   count(element): 返回指定元素在元组中出现的次数。

    -   index(element): 返回指定元素在元组中首次出现的索引。


    ```

    my_tuple = (1, 2, 3, 2, 4, 2)

    print(my_tuple.count(2))  # 输出: 3

    print(my_tuple.index(4))  # 输出: 4

    ```


    ### 使用元组的优点


    在某些情况下，元组比列表具有几个优点：


    1.  **不可变**：元组是不可变的，这意味着它们的元素不能被修改。这使得它们适合存储不应更改的数据，例如配置设置或常量值。

    2.  **更快**：元组通常比列表更快，因为它们占用的内存更小，并且不需要任何调整大小的操作。

    3.  **可哈希**：元组是可哈希的，这意味着它们可以用作字典中的键和集合中的元素。另一方面，列表是不可哈希的，不能用作这些数据结构中的键或元素。

    4.  **安全**：由于元组是不可变的，它们在处理不应被意外修改的数据时提供了一定程度的安全性。这有助于防止错误，并使代码更容易理解。


    ### 结论


    元组是 Python 中一种通用的数据结构，允许你将相关的数据片段存储在一起。它们是不可变的，这意味着一旦创建，其元素就不能被修改。元组可以使用索引和切片进行访问，并且有一些方法可以对其执行操作。元组具有不可变性、速度、可哈希性和安全性等优点。理解如何使用元组将增强你编写高效可靠的
    Python 代码的能力。


    ## 3.3 字典


    字典是 Python 中一种通用且强大的数据结构，允许你使用键值对来存储和检索数据。它是一个无序的项目集合，其中每个项目都存储为一个键值对。字典在其他编程语言中也称为关联数组或哈希映射。


    ### 创建字典


