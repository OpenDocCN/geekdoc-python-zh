    \ to MySQL databases and allows us to interact with them programmatically.\n\n\
    To establish a connection to a MySQL database, we need to provide the necessary\
    \ connection details such as the host, username, password, and database name.\
    \ Here’s an example of connecting to a MySQL database:\n\n```python\nimport mysql.connector\n\
    # Establishing a connection\nconnection = mysql.connector.connect(\n    host=\"\
    localhost\",\n    user=\"root\",\n    password=\"password\",\n    database=\"\
    mydatabase\"\n)\n# Closing the connection\nconnection.close()\n```\n\nOnce the\
    \ connection is established, we can perform various operations such as executing\
    \ SQL queries, fetching result sets, and modifying data.\n\n### Connecting to\
    \ PostgreSQL\n\nPostgreSQL is another popular open-source relational database\
    \ management system known for its robustness and scalability. To connect to a\
    \ PostgreSQL database using Python, we need to install the psycopg2 library. This\
    \ library provides a Python interface to PostgreSQL databases and allows us to\
    \ interact with them seamlessly.\n\nTo establish a connection to a PostgreSQL\
    \ database, we need to provide the necessary connection details such as the host,\
    \ username, password, and database name. Here’s an example of connecting to a\
    \ PostgreSQL database:\n\n```python\nimport psycopg2\n# Establishing a connection\n\
    connection = psycopg2.connect(\n    host=\"localhost\",\n    user=\"postgres\"\
    ,\n    password=\"password\",\n    database=\"mydatabase\"\n)\n# Closing the connection\n\
    connection.close()\n```\n\nSimilar to MySQL, once the connection is established,\
    \ we can perform various operations such as executing SQL queries, fetching result\
    \ sets, and modifying data.\n\n### Connecting to SQLite\n\nSQLite is a lightweight\
    \ and self-contained relational database management system that doesn’t require\
    \ a separate server process. It is widely used for embedded systems and small-scale\
    \ applications. Python comes with built-in support for SQLite, so no additional\
    \ libraries need to be installed.\n\nTo establish a connection to an SQLite database\
    \ using Python, we need to provide the path to the SQLite database file. Here’s\
    \ an example of connecting to an SQLite database:\n\n```python\nimport sqlite3\n\
    # Establishing a connection\nconnection = sqlite3.connect(\"mydatabase.db\")\n\
    # Closing the connection\nconnection.close()\n```\n\nOnce the connection is established,\
    \ we can perform various operations such as executing SQL queries, fetching result\
    \ sets, and modifying data.\n\n## Executing SQL Queries"
  mdcn: "在前面的章节中，我们学习了正则表达式的基础知识以及如何使用它们进行模式匹配和文本替换。在本节中，我们将探讨 Python 中正则表达式的一些高级技巧和特性。\n\
    \n## 前向断言和后向断言\n\n前向断言和后向断言是强大的工具，允许我们根据字符串中特定位置之前或之后的内容来匹配模式，而无需将其包含在匹配结果本身中。\n\
    \n## 前向断言\n\n前向断言使用 `(?=...)` 语法表示。它允许我们仅在模式后面跟着另一个模式时才匹配该模式。例如，假设我们想找到所有后面跟着单词\
    \ \"programming\" 的 \"Python\" 一词。我们可以使用以下正则表达式：\n\n```python\nimport re\ntext\
    \ = \"Python is a popular programming language. Python is easy to learn.\"\npattern\
    \ = r\"Python(?=\\sprogramming)\"\nmatches = re.findall(pattern, text)\nprint(matches)\n\
    ```\n\n输出：\n```\n['Python']\n```\n\n在这个例子中，前向断言 `(?=\\sprogramming)` 确保单词 \"Python\"\
    \ 后面跟着一个空格和单词 \"programming\"。只有满足此条件时，匹配才会成功。\n\n## 后向断言\n\n后向断言使用 `(?<=...)`\
    \ 语法表示。它允许我们仅在模式前面是另一个模式时才匹配该模式。例如，假设我们想找到所有前面是单词 \"learn\" 的 \"Python\" 一词。我们可以使用以下正则表达式：\n\
    \n```python\nimport re\ntext = \"Python is a popular programming language. Learn\
    \ Python to become a skilled developer.\"\npattern = r\"(?<=Learn\\s)Python\"\n\
    matches = re.findall(pattern, text)\nprint(matches)\n```\n\n输出：\n```\n['Python']\n\
    ```\n\n在这个例子中，后向断言 `(?<=Learn\\s)` 确保单词 \"Python\" 前面是单词 \"Learn\" 和一个空格。只有满足此条件时，匹配才会成功。\n\
    \n## 非捕获组\n\n在某些情况下，我们可能希望使用括号进行分组，但不捕获匹配的文本。我们可以通过使用非捕获组来实现这一点，其语法为 `(?:...)`。当我们想对一个组应用量词但不需要提取匹配的文本时，非捕获组非常有用。\n\
    \n例如，假设我们想找到所有后面跟着 \"s\" 或 \"es\" 的 \"cat\" 一词。我们可以使用以下正则表达式：\n\n```python\nimport\
    \ re\ntext = \"I have a cat. She has two cats.\"\npattern = r\"cat(?:s|es)\"\n\
    matches = re.findall(pattern, text)\nprint(matches)\n```\n\n输出：\n```\n['cat',\
    \ 'cats']\n```\n\n在这个例子中，非捕获组 `(?:s|es)` 匹配单词 \"cat\" 后面的 \"s\" 或 \"es\"。匹配的文本不会被捕获，但整个模式会被考虑用于匹配。\n\
    \n## 反向引用\n\n反向引用允许我们在同一个正则表达式中引用之前捕获的组。它们使用 `\\number` 语法表示，其中 `number` 是捕获组的索引。\n\
    \n例如，假设我们想找到句子中所有重复出现的单词。我们可以使用以下正则表达式：\n\n```python\nimport re\ntext = \"This\
    \ is is a test test sentence.\"\npattern = r\"\\b(\\w+)\\s+\\1\\b\"\nmatches =\
    \ re.findall(pattern, text)\nprint(matches)\n```\n\n输出：\n```\n['is', 'test']\n\
    ```\n\n在这个例子中，反向引用 `\\1` 指的是第一个捕获组 `(\\w+)`，它匹配任何单词字符。模式 `\\b(\\w+)\\s+\\1\\b`\
    \ 确保同一个单词连续重复出现。\n\n## 命名组\n\n命名组允许我们为捕获组分配一个名称，从而更容易引用匹配的文本。它们使用 `(?P<name>...)`\
    \ 语法表示，其中 `name` 是组的名称。\n\n例如，假设我们想从日期字符串中提取年、月、日。我们可以使用以下正则表达式：\n\n```python\n\
    import re\ntext = \"Today is 2022-01-01.\"\npattern = r\"(?P<year>\\d{4})-(?P<month>\\\
    d{2})-(?P<day>\\d{2})\"\nmatch = re.search(pattern, text)\nif match:\n    print(\"\
    Year:\", match.group(\"year\"))\n    print(\"Month:\", match.group(\"month\"))\n\
    \    print(\"Day:\", match.group(\"day\"))\n```\n\n输出：\n```\nYear: 2022\nMonth:\
    \ 01\nDay: 01\n```\n\n在这个例子中，命名组 `(?P<year>\\d{4})`、`(?P<month>\\d{2})` 和 `(?P<day>\\\
    d{2})` 分别捕获年、月、日。我们可以使用 `group()` 方法通过它们的名称来引用这些组。\n\n## 总结\n\n在本节中，我们探讨了 Python\
    \ 中正则表达式的一些高级技巧和特性。前向断言和后向断言允许我们根据字符串中特定位置之前或之后的内容来匹配模式。非捕获组在我们需要对模式进行分组但不捕获匹配的文本时非常有用。反向引用允许我们在同一个正则表达式中引用之前捕获的组。命名组通过为组分配名称，使得引用捕获的文本变得更加容易。通过掌握这些高级技巧，你将能够更加熟练地使用正则表达式来处理和提取文本数据中的信息。\n\
    \n# 第9章 - 数据库交互\n\n## 9.1 连接数据库\n\n在当今世界，数据是许多应用和系统的支柱。无论是小型项目还是大型企业级应用，高效地存储和检索数据都至关重要。Python\
