    # 3.4 Sets


    In Python, a set is an unordered collection of unique elements. It is a powerful
    data structure that allows you to perform various operations such as adding and
    removing elements, checking for membership, and performing set operations like
    union, intersection, and difference. Sets are mutable, which means you can modify
    them after they are created.


    # Creating a Set


    To create a set in Python, you can use curly braces {} or the set() function.
    Here’s an example:


    ```

    # Using curly braces

    my_set = {1, 2, 3, 4, 5}

    # Using the set() function

    my_set = set([1, 2, 3, 4, 5])

    ```


    In the above examples, we create a set called my_set with the elements 1, 2, 3,
    4, and 5. Note that sets do not allow duplicate elements, so any duplicate values
    will be automatically removed.


    # Adding and Removing Elements'
  - '[PAGE 39]


    You can add elements to a set using the add() method or by using the update()
    method to add multiple elements at once. To remove elements, you can use the remove()
    method or the discard() method. Here’s an example:


    ```

    my_set = {1, 2, 3}

    # Adding elements

    my_set.add(4)

    my_set.update([5, 6, 7])

    # Removing elements

    my_set.remove(3)

    my_set.discard(2)

    ```


    In the above example, we add the elements 4, 5, 6, and 7 to the set my_set using
    the add() and update() methods. Then, we remove the elements 3 and 2 using the
    remove() and discard() methods, respectively.


    # Set Operations


    Sets in Python support various operations such as union, intersection, difference,
    and symmetric difference. These operations allow you to combine or compare sets
    to get the desired result. Here are some examples:


    ```

    set1 = {1, 2, 3}

    set2 = {3, 4, 5}

    # Union

    union_set = set1.union(set2)

    # Output: {1, 2, 3, 4, 5}

    # Intersection

    intersection_set = set1.intersection(set2)

    # Output: {3}

    # Difference

    difference_set = set1.difference(set2)

    # Output: {1, 2}

    # Symmetric Difference

    symmetric_difference_set = set1.symmetric_difference(set2)

    # Output: {1, 2, 4, 5}

    ```


    In the above examples, we perform different set operations on set1 and set2. The
    union() method returns a new set that contains all the unique elements from both
    sets. The intersection() method returns a new set that contains the common elements
    between the two sets. The difference() method returns a new set that contains
    the elements present in set1 but not'
  - '[PAGE 40]


    in set2. The symmetric_difference() method returns a new set that contains the
    elements that are present in either set1 or set2, but not in both.


    # Membership and Length


    You can check if an element is present in a set using the in keyword. The len()
    function can be used to get the number of elements in a set. Here’s an example:


    ```

    my_set = {1, 2, 3, 4, 5}

    # Membership

    print(3 in my_set)

    # Output: True

    # Length

    print(len(my_set))

    # Output: 5

    ```


    In the above example, we check if the element 3 is present in my_set using the
    in keyword. We also use the len() function to get the number of elements in my_set,
    which is 5.


    # Set Comprehension


    Similar to list comprehension, Python also supports set comprehension, which allows
    you to create sets in a concise and readable way. Here’s an example:


    ```

    my_set = {x for x in range(1, 6)}

    # Output: {1, 2, 3, 4, 5}

    ```


    In the above example, we use set comprehension to create a set called my_set that
    contains the numbers from 1 to 5.


    # Frozen Sets


    In addition to mutable sets, Python also provides a built-in data type called
    frozen sets. Frozen sets are immutable, which means you cannot modify them after
    they are created. This can be useful in scenarios where you want to create a set
    that cannot be changed. Here’s an example:


    ```

    my_set = frozenset([1, 2, 3, 4, 5])

    ```


    In the above example, we create a frozen set called my_set with the elements 1,
    2, 3, 4, and 5. Since frozen sets are immutable, you cannot add or remove elements
    from them.


    # Conclusion


    Sets are a valuable data structure in Python that allow you to work with unique
    elements and perform various set operations. In this section, you learned how
    to create sets, add and remove elements, perform set'
