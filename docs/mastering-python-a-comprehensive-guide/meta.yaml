    通过一次获取有限数量的行，我们可以高效地处理大型结果集，而不会消耗过多的内存。\n\n## 结论\n\n处理结果集是 Python 中与数据库交互的重要部分。在本节中，我们学习了如何使用\
    \ `fetchone()`、`fetchall()` 和 `fetchmany()` 方法从结果集中获取行。我们还探讨了如何使用索引和列名访问列值。通过理解这些概念，你将能够在\
    \ Python 程序中有效地从数据库检索和处理数据。\n\n# 9.4 数据库事务\n\n在数据库管理领域，事务在确保数据完整性和一致性方面起着至关重要的作用。事务是一个逻辑工作单元，由一个或多个数据库操作组成，例如插入、更新或删除记录。这些操作被组合在一起形成一个单一的原子操作，这意味着事务中的所有操作要么全部成功执行，要么全部不执行。\n\
    \n## 理解数据库事务\n\n数据库事务遵循 ACID（原子性、一致性、隔离性、持久性）属性，这些属性对于维护数据完整性至关重要。让我们更详细地了解每个属性：\n\
    \n- 1. 原子性：原子性确保事务被视为一个单一的工作单元。事务中的所有操作要么全部成功完成，要么全部不完成。如果任何操作失败，整个事务将回滚，数据库保持不变。\n\
    - 2. 一致性：一致性确保事务将数据库从一个有效状态带到另一个有效状态。它强制执行完整性约束，例如引用完整性、数据类型约束和唯一性约束。如果事务违反任何这些约束，它将被回滚，数据库保持其原始状态。\n\
    - 3. 隔离性：隔离性确保并发事务不会相互干扰。每个事务都在隔离状态下执行，就像它是数据库上运行的唯一事务一样。这防止了多个事务同时访问和修改相同数据时可能发生的数据不一致。\n\
    - 4. 持久性：持久性保证一旦事务被提交，其更改是永久性的，并且将在任何后续系统故障中幸存。已提交事务所做的更改存储在非易失性存储器（如硬盘）中，以确保其持久性。\n\
    \n## 在 Python 中处理数据库事务\n\nPython 提供了多个用于与数据库交互的库和模块，例如 SQLite、MySQL、PostgreSQL\
    \ 和 Oracle。这些库通常包含对管理数据库事务的内置支持。让我们探讨如何使用 Python 处理数据库事务。\n\n首先，你需要使用适当的库建立与数据库的连接，并提供必要的凭据。建立连接后，你可以创建一个游标对象来执行\
    \ SQL 语句和管理事务。\n\n以下是如何使用 SQLite 库执行事务的示例：\n\n```\nimport sqlite3\n# Establish\
    \ a connection to the database\nconn = sqlite3.connect('mydatabase.db')\n# Create\
    \ a cursor object\ncursor = conn.cursor()\n# Begin the transaction\nconn.execute('BEGIN\
    \ TRANSACTION')\ntry:\n    # Execute SQL statements within the transaction\n \
    \   cursor.execute('INSERT INTO employees (name, age) VALUES (?, ?)', ('John Doe',\
    \ 30))\n    cursor.execute('UPDATE employees SET age = 31 WHERE name = ?', ('John\
    \ Doe',))\n    cursor.execute('DELETE FROM employees WHERE name = ?', ('John Doe',))\n\
    \    # Commit the transaction\n    conn.commit()\nexcept:\n    # Rollback the\
    \ transaction if an error occurs\n    conn.rollback()\n# Close the cursor and\
    \ the connection\ncursor.close()\nconn.close()\n```\n\n在这个示例中，我们首先建立与 SQLite 数据库的连接并创建一个游标对象。然后，我们使用\
    \ `BEGIN TRANSACTION` 语句开始事务。在事务中，我们执行一系列 SQL 语句，例如插入、更新和删除记录。如果所有语句都成功执行，我们使用\
    \ `commit()` 方法提交事务。但是，如果在执行任何语句期间发生错误，我们使用 `rollback()` 方法回滚事务。\n\n需要注意的是，并非所有数据库操作都需要显式事务管理。一些操作，例如简单的\
    \ `SELECT` 语句，默认情况下会在事务中自动执行。但是，对于涉及多个语句的复杂操作，显式事务管理是确保数据完整性的必要条件。\n\n## 事务隔离级别\n\
    \n除了 ACID 属性外，数据库事务还支持不同的隔离级别，这些级别决定了并发事务之间的隔离程度。最常用的隔离级别是："
