    statement followed by the name of the library.

    For example, to import the NumPy library, you would use the following statement:

    import numpy

    This imports the entire NumPy library, and you can access its functions and classes
    using the numpy namespace. However, if you only need to use specific functions
    or classes from a library, you can import them directly using the from keyword.

    from numpy import array, linspace

