    ### 变量命名规则


    在深入了解 Python 中不同的数据类型之前，我们首先来了解一下变量的命名规则。在 Python 中，变量名区分大小写，这意味着 `myVariable`
    和 `myvariable` 被视为两个不同的变量。以下是其他一些变量命名规则：


    - 变量名可以包含字母（大写和小写）、数字和下划线。

    - 变量名不能以数字开头。

    - 变量名不能包含空格或特殊字符，如 `!`、`@`、`#`、`$`、`%` 等。

    - 变量名应具有描述性和意义，以便更容易理解变量的用途。


    ### Python 中的数据类型


    Python 有几种内置的数据类型，用于表示不同种类的值。以下是 Python 中一些常用的数据类型：


    1. **数值类型**：数值类型用于表示 Python 中的数字。Python 中有三种数值类型：`int`、`float` 和 `complex`。`int`
    类型用于表示整数，`float` 类型用于表示浮点数，`complex` 类型用于表示复数。

    2. **字符串类型**：`str` 类型用于表示 Python 中的字符串。字符串是用单引号 (`''`) 或双引号 (`"`) 括起来的字符序列。字符串是不可变的，这意味着一旦创建了字符串，就无法更改它。

    3. **布尔类型**：`bool` 类型用于表示布尔值，可以是 `True` 或 `False`。布尔值通常用于条件语句和逻辑运算。

    4. **列表类型**：`list` 类型用于表示项目的集合。列表是有序且可变的，这意味着你可以更改、添加或删除列表中的项目。列表可以包含不同数据类型的元素。

    5. **元组类型**：`tuple` 类型类似于列表，但它是不可变的，这意味着一旦创建了元组，其元素就无法更改。元组通常用于表示相关值的集合。

    6. **字典类型**：`dict` 类型用于表示键值对。字典中的每个元素都是一个键值对，其中键是唯一的，用于访问相应的值。字典是无序且可变的。

    7. **集合类型**：`set` 类型用于表示唯一元素的集合。集合是无序且可变的。它们通常用于执行并集、交集和差集等数学运算。


    ### 变量赋值


    在 Python 中，变量使用赋值运算符 (`=`) 进行赋值。赋值运算符右侧的值被赋给左侧的变量。以下是一些变量赋值的示例：


    ```

    x = 10  # 将整数值赋给变量 x

    name = "John"  # 将字符串值赋给变量 name

    is_valid = True  # 将布尔值赋给变量 is_valid

    ```


    ### 类型转换


    Python 提供了内置函数来将变量从一种类型转换为另一种类型。这个过程称为类型转换或类型强制转换。以下是一些常用的类型转换函数：


    - `int()`：将值转换为整数。

    - `float()`：将值转换为浮点数。

    - `str()`：将值转换为字符串。

    - `bool()`：将值转换为布尔值。

    - `list()`：将值转换为列表。

    - `tuple()`：将值转换为元组。

    - `dict()`：将值转换为字典。

    - `set()`：将值转换为集合。


    ### 检查变量类型


    要检查变量的类型，你可以使用 `type()` 函数。它以对象的形式返回变量的类型。以下是一个示例：


    ```

    x = 10

    print(type(x)) # 输出: <class ''int''>

    name = "John"

    print(type(name)) # 输出: <class ''str''>

    is_valid = True

    print(type(is_valid)) # 输出: <class ''bool''>

    ```


    ### 结论


