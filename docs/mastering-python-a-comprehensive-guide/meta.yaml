    ## 3.4 Sets


    In Python, a set is an unordered collection of unique elements. It is a powerful
    data structure that allows you to perform various operations such as adding and
    removing elements, checking for membership, and performing set operations like
    union, intersection, and difference. Sets are mutable, which means you can modify
    them after they are created.


    ### Creating a Set


    To create a set in Python, you can use curly braces {} or the set() function.
    Here’s an example:


    ```

    # Using curly braces

    my_set = {1, 2, 3, 4, 5}

    # Using the set() function

    my_set = set([1, 2, 3, 4, 5])

    ```


    In the above examples, we create a set called my_set with the elements 1, 2, 3,
    4, and 5. Note that sets do not allow duplicate elements, so any duplicate values
    will be automatically removed.


    ### Adding and Removing Elements


    You can add elements to a set using the add() method or by using the update()
    method to add multiple elements at once. To remove elements, you can use the remove()
    method or the discard() method. Here’s an example:


    ```

    my_set = {1, 2, 3}

    # Adding elements

    my_set.add(4)

    my_set.update([5, 6, 7])

    # Removing elements

    my_set.remove(3)

    my_set.discard(2)

    ```


    In the above example, we add the elements 4, 5, 6, and 7 to the set my_set using
    the add() and update() methods. Then, we remove the elements 3 and 2 using the
    remove() and discard() methods, respectively.


    ### Set Operations


    Sets in Python support various operations such as union, intersection, difference,
    and symmetric difference. These operations allow you to combine or compare sets
    to get the desired result. Here are some examples:


    ```

    set1 = {1, 2, 3}

    set2 = {3, 4, 5}

    # Union

    union_set = set1.union(set2)

    # Output: {1, 2, 3, 4, 5}

    # Intersection

    intersection_set = set1.intersection(set2)

    # Output: {3}

    # Difference

    difference_set = set1.difference(set2)

    # Output: {1, 2}

    # Symmetric Difference

    symmetric_difference_set = set1.symmetric_difference(set2)

    # Output: {1, 2, 4, 5}

    ```


    In the above examples, we perform different set operations on set1 and set2. The
    union() method returns a new set that contains all the unique elements from both
    sets. The intersection() method returns a new set that contains the common elements
    between the two sets. The difference() method returns a new set that contains
    the elements present in set1 but not in set2. The symmetric_difference() method
    returns a new set that contains the elements that are present in either set1 or
    set2, but not in both.


    ### Membership and Length


    You can check if an element is present in a set using the in keyword. The len()
    function can be used to get the number of elements in a set. Here’s an example:


    ```

    my_set = {1, 2, 3, 4, 5}

    # Membership

    print(3 in my_set)

    # Output: True

    # Length

    print(len(my_set))

    # Output: 5

    ```


    In the above example, we check if the element 3 is present in my_set using the
    in keyword. We also use the len() function to get the number of elements in my_set,
    which is 5.


    ### Set Comprehension


    Similar to list comprehension, Python also supports set comprehension, which allows
    you to create sets in a concise and readable way. Here’s an example:


    ```

    my_set = {x for x in range(1, 6)}

    # Output: {1, 2, 3, 4, 5}

    ```


    In the above example, we use set comprehension to create a set called my_set that
    contains the numbers from 1 to 5.


    ### Frozen Sets


    In addition to mutable sets, Python also provides a built-in data type called
    frozen sets. Frozen sets are immutable, which means you cannot modify them after
    they are created. This can be useful in scenarios where you want to create a set
    that cannot be changed. Here’s an example:


    ```

    my_set = frozenset([1, 2, 3, 4, 5])

    ```


    In the above example, we create a frozen set called my_set with the elements 1,
    2, 3, 4, and 5. Since frozen sets are immutable, you cannot add or remove elements
    from them.


    ### Conclusion


    Sets are a valuable data structure in Python that allow you to work with unique
    elements and perform various set operations. In this section, you learned how
    to create sets, add and remove elements, perform set operations, check for membership,
    get the length of a set, use set comprehension, and work with frozen sets. Understanding
    sets and their operations will greatly enhance your ability to work with data
    in Python.


    ## 3.5 Strings


    In Python, a string is a sequence of characters enclosed in either single quotes
    ('') or double quotes (""). Strings are one of the most commonly used data types
    in Python and are used to represent text data. They are immutable, which means
    that once a string is created, it cannot be changed. However, you can perform
    various operations on strings to manipulate and extract information from them.


    ### Creating Strings


    To create a string in Python, you simply need to enclose the desired text within
    quotes. For example:


    ```

    my_string = "Hello, World!"

    ```


    In the above example, we have created a string variable called my_string and assigned
    it the value “Hello, World!”. You can also use single quotes to create strings:


    ```

    my_string = ''Hello, World!''

    ```


    Both single and double quotes can be used interchangeably to create strings. However,
    if you want to include a quote character within the string itself, you need to
    use the opposite type of quote to enclose the string. For example:


    ```

    my_string = "He said, ''Hello, World!''"

    ```


    In the above example, we have used double quotes to enclose the string because
    it contains a single quote character.


    ### Accessing Characters in a String


    You can access individual characters in a string by using indexing. In Python,
    indexing starts from 0, so the first character of a string is at index 0, the
    second character is at index 1, and so on. For example:


    ```

    my_string = "Hello, World!"

    print(my_string[0]) # Output: H

    print(my_string[7]) # Output: W

    ```


    In the above example, we have accessed the first character of the string using
    my_string[0] and the eighth character using my_string[7].


    ### String Slicing


    In addition to accessing individual characters, you can also extract a substring
    from a string using slicing. Slicing allows you to specify a range of indices
    to extract a portion of the string. The syntax for slicing is string[start:end],
    where start is the index of the first character to include and end is the index
    of the first character to exclude. For example:


    ```

    my_string = "Hello, World!"

    print(my_string[0:5])  # Output: Hello

    print(my_string[7:])  # Output: World!

    ```


    In the above example, my_string[0:5] extracts the characters from index 0 to index
    4 (inclusive), while my_string[7:] extracts all characters starting from index
    7 to the end of the string.


    ### String Concatenation


    String concatenation is the process of combining two or more strings into a single
    string. In Python, you can concatenate strings using the + operator. For example:


    ```

    string1 = "Hello"

    string2 = "World"

    concatenated_string = string1 + " " + string2

    print(concatenated_string)  # Output: Hello World

    ```


    In the above example, we have concatenated string1, a space character, and string2
    to create the string “Hello World”.


    ### String Methods


    Python provides a variety of built-in methods that you can use to manipulate and
    work with strings. Some commonly used string methods include:


    - len(): Returns the length of a string.

    - lower(): Converts all characters in a string to lowercase.

    - upper(): Converts all characters in a string to uppercase.

    - strip(): Removes leading and trailing whitespace from a string.

    - split(): Splits a string into a list of substrings based on a specified delimiter.

    - replace(): Replaces occurrences of a specified substring with another substring.'
