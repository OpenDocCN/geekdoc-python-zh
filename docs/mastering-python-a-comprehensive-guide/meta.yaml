    # Bitwise Operators


    Bitwise operators are used to perform operations on individual bits of binary
    numbers. They are useful when working with low-level programming or manipulating
    binary data. Python supports the following bitwise operators:


    +   - Bitwise AND (&): Performs a bitwise AND operation on the binary representations
    of the operands.

    - Bitwise OR (|): Performs a bitwise OR operation on the binary representations
    of the operands.

    - Bitwise XOR (^): Performs a bitwise XOR (exclusive OR) operation on the binary
    representations of the operands.

    - Bitwise NOT (~): Performs a bitwise NOT operation on the binary representation
    of the operand.

    - Left Shift (<<): Shifts the bits of the left operand to the left by the number
    of positions specified by the right operand.

    - Right Shift (>>): Shifts the bits of the left operand to the right by the number
    of positions specified by the right operand.


    Here is an example that demonstrates the use of bitwise operators:


    ```

    a = 10  # Binary representation: 1010

    b = 3  # Binary representation: 0011

    print(a & b)  # Output: 2 (Binary representation: 0010)

    print(a | b)  # Output: 11 (Binary representation: 1011)

    print(a ^ b)  # Output: 9 (Binary representation: 1001)

    print(~a)  # Output: -11 (Binary representation: 11111111111111111111111111110101)

    print(a << 2)  # Output: 40 (Binary representation: 101000)

    print(a >> 2)  # Output: 2 (Binary representation: 10)

    ```'
