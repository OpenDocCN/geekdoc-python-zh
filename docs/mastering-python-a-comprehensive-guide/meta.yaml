    \n### 结论\n\n异常处理是 Python 编程中的一项关键技能。通过使用 try-except 块，你可以优雅地处理错误并防止程序崩溃。你可以处理多个异常，包含一个\
    \ else 块在没有异常发生时运行代码，并使用 finally 块进行清理操作。此外，你可以显式地引发异常以指示错误或意外情况。理解异常处理对于编写健壮可靠的\
    \ Python 代码至关重要。\n\n## 6.3 引发异常\n\n在 Python 中，异常是处理程序执行过程中可能出现的错误和异常情况的一种方式。虽然我们在上一节已经讨论了如何处理异常，但有时有必要显式地引发异常。这允许我们创建自己的自定义异常，或在未满足特定条件时引发内置异常。\n\
    \n### 引发内置异常\n\nPython 提供了广泛的内置异常，可以在不同情况下引发。这些异常定义在 Python 标准库中，涵盖了各种错误条件。一些常用的内置异常包括：\n\
    \n- ValueError：当函数接收到类型正确但值无效的参数时引发。\n- TypeError：当操作或函数应用于不适当类型的对象时引发。\n- IndexError：当序列下标超出范围时引发。\n\
    - KeyError：当找不到字典键时引发。\n- FileNotFoundError：当请求的文件或目录无法找到时引发。\n- ZeroDivisionError：当除数或模运算的除数为零时引发。\n\
    \n要引发内置异常，我们使用 raise 关键字，后跟异常类和一个可选的错误消息。以下是一个示例：\n\n```\ndef divide_numbers(a,\
    \ b):\n    if b == 0:\n        raise ZeroDivisionError(\"Cannot divide by zero\"\
    )\n    return a / b\n\ntry:\n    result = divide_numbers(10, 0)\nexcept ZeroDivisionError\
    \ as e:\n    print(e)\n```\n\n在上面的示例中，我们定义了一个函数 divide_numbers，它接受两个参数 a 和 b。如果\
    \ b 为零，我们引发一个带有自定义错误消息的 ZeroDivisionError。在 try 块中，我们使用参数 10 和 0 调用 divide_numbers\
    \ 函数。由于 b 为零，异常被引发并在 except 块中被捕获，我们在其中打印错误消息。\n\n### 引发自定义异常\n\n除了内置异常，Python\
    \ 还允许我们定义自己的自定义异常。当我们想为应用程序或库创建特定异常时，这非常有用。要定义自定义异常，我们需要创建一个继承自 Exception 类或其子类的新类。\n\
    \n以下是如何定义和引发自定义异常的示例：\n\n```\nclass InvalidInputError(Exception):\n    pass\n\n\
