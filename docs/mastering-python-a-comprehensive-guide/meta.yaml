  mdcn: "## 写入文件\n\n要写入文件，我们需要以写入模式（'w'）打开它。如果文件不存在，Python 会创建它。如果文件已存在，以写入模式打开会覆盖其内容。以下是一个示例：\n\
    \n```\nfile = open('filename', 'w')\nfile.write('Hello, World!')\nfile.close()\n\
    ```\n\n在上面的示例中，我们以写入模式（'w'）打开文件，使用 write() 方法将字符串 'Hello, World!' 写入文件，然后关闭文件。\n\
    \n如果你想向现有文件追加内容而不是覆盖它，可以以追加模式（'a'）打开文件。以下是一个示例：\n\n```\nfile = open('filename',\
    \ 'a')\nfile.write('This is additional content.')\nfile.close()\n```\n\n在上面的示例中，我们以追加模式（'a'）打开文件，将字符串\
    \ 'This is additional content.' 写入文件，然后关闭文件。\n\n## 错误处理\n\n处理文件时，处理可能出现的潜在错误非常重要。一个常见的错误是尝试打开的文件不存在。要处理此类错误，可以使用\
    \ try-except 块。以下是一个示例：\n\n```\ntry:\n    file = open('filename', 'r')\n    content\
    \ = file.read()\n    print(content)\n    file.close()\nexcept FileNotFoundError:\n\
    \    print('File not found.')\n```\n\n在上面的示例中，我们尝试打开文件并读取其内容。如果文件不存在，将引发 FileNotFoundError，并执行\
    \ except 块中的代码。\n\n## 使用 with 语句\n\nPython 提供了一种更便捷的方式来处理文件，即使用 with 语句。with 语句会自动处理文件的打开和关闭，即使发生异常也是如此。以下是一个示例：\n\
    \n```\nwith open('filename', 'r') as file:\n    content = file.read()\n    print(content)\n\
    ```\n\n在上面的示例中，我们使用 with 语句打开文件并将其赋值给变量 file。然后我们读取文件内容并打印出来。当 with 块内的代码执行完毕后，文件将自动关闭。\n\
    \n使用 with 语句被认为是处理文件的最佳实践，因为它确保文件始终被正确关闭，即使发生错误也是如此。\n\n## 结论\n\n在本节中，我们学习了如何在\
    \ Python 中读写文件。我们探索了不同的文件模式，如读取模式、写入模式和追加模式。我们还了解了如何处理处理文件时可能出现的错误。此外，我们发现了使用\
    \ with 语句自动处理文件打开和关闭的便利性。掌握了这些技能，你就可以在 Python 程序中有效地处理文件。\n\n## 7.2 处理 CSV 文件\n\
    \nCSV（逗号分隔值）是一种流行的文件格式，用于存储表格数据。它在各个行业中广泛使用，并被许多软件应用程序支持。在 Python 中，借助内置的 csv\
    \ 模块，处理 CSV 文件变得非常简单。\n\n### 读取 CSV 文件\n\n要从 CSV 文件读取数据，首先需要使用 open() 函数打开文件，并将文件模式指定为\
    \ 'r'（读取）。文件打开后，可以通过将文件对象作为参数传递给 csv.reader 来创建一个 csv.reader 对象。这个 reader 对象允许你遍历\
    \ CSV 文件的行。\n\n以下是从 CSV 文件读取数据的示例：\n\n```\nimport csv\nwith open('data.csv', 'r')\
    \ as file:\n    reader = csv.reader(file)\n    for row in reader:\n        print(row)\n\
    ```\n\n在上面的代码中，我们以读取模式打开名为 'data.csv' 的文件，并创建一个名为 reader 的 csv.reader 对象。然后我们使用\
    \ for 循环遍历 CSV 文件的行，并打印每一行。\n\n默认情况下，csv.reader 对象将每一行视为字符串列表。如果你想以字典的形式访问每一行的值，可以使用\
    \ csv.DictReader 类。该类假定 CSV 文件的第一行包含列标题，后续每一行包含相应的值。\n\n以下是使用 csv.DictReader 从\
    \ CSV 文件读取数据的示例：\n\n```\nimport csv\nwith open('data.csv', 'r') as file:\n   \
    \ reader = csv.DictReader(file)\n    for row in reader:\n        print(row['Name'],\
    \ row['Age'], row['City'])\n```\n\n在上面的代码中，我们使用列标题作为行字典中的键来访问每一行的值。\n\n### 写入\
    \ CSV 文件\n\n要将数据写入 CSV 文件，需要使用 open() 函数打开文件，并将文件模式指定为 'w'（写入）。文件打开后，可以通过将文件对象作为参数传递给\
    \ csv.writer 来创建一个 csv.writer 对象。这个 writer 对象允许你将行写入 CSV 文件。\n\n以下是将数据写入 CSV 文件的示例：\n\
    \n```\nimport csv\ndata = [\n    ['Name', 'Age', 'City'],\n    ['John', '25',\
    \ 'New York'],\n    ['Alice', '30', 'London'],\n    ['Bob', '35', 'Paris']\n]\n\
    with open('data.csv', 'w', newline='') as file:\n    writer = csv.writer(file)\n\
    \    writer.writerows(data)\n```\n\n在上面的代码中，我们定义了一个名为 data 的列表，其中包含要写入 CSV 文件的行。然后我们以写入模式打开名为\
    \ 'data.csv' 的文件，并创建一个名为 writer 的 csv.writer 对象。最后，我们使用 writerows() 方法将 data 列表中的所有行写入\
    \ CSV 文件。\n\n如果你想使用字典将数据写入 CSV 文件，可以使用 csv.DictWriter 类。该类允许你基于字典将行写入 CSV 文件，其中键表示列标题，值表示相应的值。\n\
    \n以下是使用 csv.DictWriter 将数据写入 CSV 文件的示例：\n\n```\nimport csv\ndata = [\n    {'Name':\
    \ 'John', 'Age': '25', 'City': 'New York'},\n    {'Name': 'Alice', 'Age': '30',\
    \ 'City': 'London'},\n    {'Name': 'Bob', 'Age': '35', 'City': 'Paris'}\n]\nfieldnames\
    \ = ['Name', 'Age', 'City']\nwith open('data.csv', 'w', newline='') as file:\n\
    \    writer = csv.DictWriter(file, fieldnames=fieldnames)\n    writer.writeheader()\n\
    \    writer.writerows(data)\n```\n\n在上面的代码中，我们定义了一个名为 data 的字典列表，其中包含要写入 CSV 文件的行。我们还定义了一个名为\
    \ fieldnames 的列表，其中包含列标题。然后我们以写入模式打开名为 'data.csv' 的文件，并创建一个名为 writer 的 csv.DictWriter\
    \ 对象。我们使用 writeheader() 方法将列标题写入 CSV 文件，然后使用 writerows() 方法将 data 列表中的所有行写入 CSV\
    \ 文件。\n\n### 处理 CSV 文件选项\n\ncsv 模块提供了多种选项来自定义读写 CSV 文件的行为。一些常用的选项包括：\n\n- delimiter：指定用于分隔\
    \ CSV 文件中字段的字符。默认设置为 ','。\n- quotechar：指定用于引用包含特殊字符的字段的字符。默认设置为 '\"'。\n- quoting：指定字段的引用行为。可以取值如\
    \ csv.QUOTE_MINIMAL、csv.QUOTE_ALL、csv.QUOTE_NONNUMERIC 或 csv.QUOTE_NONE。\n- skipinitialspace：指定是否跳过分隔符后的前导空格。默认设置为\
    \ False。\n\n你可以将这些选项作为参数传递给 csv.reader 或 csv.writer 对象，以自定义读写 CSV 文件的行为。\n\n```\n\
    import csv\nwith open('data.csv', 'r') as file:\n    reader = csv.reader(file,\
    \ delimiter=';', quotechar='\"')\n    for row in reader:\n        print(row)\n\
    ```\n\n在上面的代码中，我们在创建 csv.reader 对象时将分隔符指定为 ';'，将引号字符指定为 '\"'。这使我们能够读取字段用分号分隔并用双引号引用的\
    \ CSV 文件。\n\n同样，你可以将这些选项作为参数传递给 csv.writer 对象，以自定义写入 CSV 文件的行为。\n\n```\nimport\
    \ csv\ndata = [\n    ['Name', 'Age', 'City'],\n    ['John', '25', 'New York'],\n\
    \    ['Alice', '30', 'London'],\n    ['Bob', '35', 'Paris']\n]\nwith open('data.csv',\
    \ 'w', newline='') as file:\n    writer = csv.writer(file, delimiter=';', quotechar='\"\
    ')\n    writer.writerows(data)\n```\n\n在上面的代码中，我们在创建 csv.writer 对象时将分隔符指定为 ';'，将引号字符指定为\
    \ '\"'。这使我们能够写入字段用分号分隔并用双引号引用的 CSV 文件。\n\n得益于 csv 模块，在 Python 中处理 CSV 文件既直接又高效。无论你需要从\
    \ CSV 文件读取数据还是将数据写入 CSV 文件，Python 都提供了必要的工具来轻松处理 CSV 文件。\n\n## 7.3 处理 JSON\n\n\
