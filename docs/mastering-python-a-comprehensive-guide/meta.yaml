    Once you are in the correct directory, you can run the Python program by typing
    python followed by the name of the file. For example, if your file is named my_program.py,
    you would run it by typing python my_program.py in the command line.


    When you run a Python program from the command line, the Python interpreter reads
    the code line by line and executes it. Any output or errors generated by the program
    will be displayed in the command line.


    # Running Python in an Integrated Development Environment (IDE)


    An Integrated Development Environment (IDE) provides a more user-friendly and
    feature-rich environment for writing and running Python programs. IDEs offer features
    such as code completion, debugging tools, and project management capabilities.


    There are several popular Python IDEs available, including PyCharm, Visual Studio
    Code, and Jupyter Notebook. These IDEs provide a graphical interface where you
    can write your code and execute it with the click of a button.


    To run a Python program in an IDE, you typically need to create a new project
    or open an existing one. Once you have your project set up, you can create a new
    Python file and start writing your code. To run the program, you can either click
    on a “Run” button or use a keyboard shortcut specific to the IDE.


    IDEs also provide additional features such as debugging, which allows you to step
    through your code line by line and inspect variables and their values. This can
    be extremely helpful when troubleshooting issues or understanding how your program
    is executing.


    # Running Python in a Jupyter Notebook


    Jupyter Notebook is a popular web-based interactive computing environment that
    allows you to create and share documents containing live'
- md: 'code, equations, visualizations, and narrative text. It is widely used for
    data analysis, scientific computing, and machine learning.


    In a Jupyter Notebook, you can write and execute Python code in individual cells.
    Each cell can contain code, markdown text, or even visualizations. To run a Python
    program in a Jupyter Notebook, you simply need to type or paste your code into
    a code cell and press Shift+Enter to execute it.


    Jupyter Notebook provides a convenient way to experiment with code and visualize
    the output immediately. It also allows you to document your thought process and
    share your work with others by combining code, text, and visualizations in a single
    document.


    ## Running Python in an Online Compiler


    If you don''t have Python installed on your computer or prefer not to set up a
    development environment, you can also run Python programs in an online compiler.
    Online compilers provide a web-based interface where you can write and execute
    Python code without the need for any local installation.


    There are several online Python compilers available, such as Replit, Ideone, and
    PythonAnywhere. These platforms allow you to write your code in a browser window
    and run it with the click of a button. They also provide features like syntax
    highlighting and error checking to help you write code more efficiently.


    Running Python programs in an online compiler can be useful when you want to quickly
    test a small piece of code or share it with others without requiring them to install
    Python on their machines.


    ## Running Python Scripts as Executables


    In addition to running Python programs from the command line or in an IDE, you
    can also create executable files that can be run directly without invoking the
    Python interpreter explicitly.


    To create an executable Python script, you need to add a special line at the beginning
    of your script called a “shebang” line. This line tells the operating system which
    interpreter to use to execute the script. For example, on Unix-based systems,
    the shebang line for Python 3 would be #!/usr/bin/env python3.


    Once you have added the shebang line, you need to make the script file executable
    by changing its permissions. On Unix-based systems, you can use the chmod command
    to set the executable permission. For example, chmod +x my_script.py would make
    the file my_script.py executable.


    After making the script executable, you can run it by simply typing the name of
    the file in the command line or double-clicking on it in a file explorer. The
    operating system will recognize the shebang line and use the specified Python
    interpreter to execute the script.


    Creating executable Python scripts can be useful when you want to distribute your
    code to others who may not have Python installed or when you want to create standalone
    applications that can be run independently.


    ## Conclusion


    In this section, we explored different ways to run Python programs. Whether you
    choose to run your code from the command line, in an IDE, in a Jupyter Notebook,
    or in an online compiler, Python provides a flexible and versatile environment
    for executing your code. Understanding how to run Python programs is essential
    for mastering the language and building powerful applications.


    # Chapter 2 - Python Basics


    ## 2.1 Variables and Data Types


    In Python, variables are used to store data values. A variable is like a container
    that holds a value, and it can be assigned a different value at any time. Python
    is a dynamically typed language, which means that you don’t need to explicitly
    declare the type of a variable. The type of a variable is determined based on
    the value assigned to it.


    ### Variable Naming Rules


    Before we dive into the different data types in Python, let’s first understand
    the rules for naming variables. In Python, variable names are case-sensitive,
    which means that myVariable and myvariable are considered as two different variables.
    Here are some other rules for naming variables:


    - Variable names can contain letters (both uppercase and lowercase), digits, and
    underscores.

    - Variable names cannot start with a digit.

    - Variable names cannot contain spaces or special characters like !, @, #, $,
    %, etc.

    - Variable names should be descriptive and meaningful, so that it’s easier to
    understand the purpose of the variable.


    ### Data Types in Python


    Python has several built-in data types that are used to represent different kinds
    of values. Here are some of the commonly used data types in Python:


    1. **Numeric Types**: Numeric types are used to represent numbers in Python. There
    are three numeric types in Python: int, float, and complex. The int type is used
    to represent integers, the float type is used to represent floating-point numbers,
    and the complex type is used to represent complex numbers.

    2. **String Type**: The str type is used to represent strings in Python. A string
    is a sequence of characters enclosed in single quotes ('') or double quotes (").
    Strings are immutable, which means that once a string is created, it cannot be
    changed.

    3. **Boolean Type**: The bool type is used to represent boolean values, which
    can be either True or False. Boolean values are often used in conditional statements
    and logical operations.

    4. **List Type**: The list type is used to represent a collection of items. Lists
    are ordered and mutable, which means that you can change, add, or remove items
    from a list. Lists can contain elements of different data types.

    5. **Tuple Type**: The tuple type is similar to a list, but it is immutable, which
    means that once a tuple is created, its elements cannot be changed. Tuples are
    often used to represent a collection of related values.

    6. **Dictionary Type**: The dict type is used to represent key-value pairs. Each
    element in a dictionary is a key-value pair, where the key is unique and used
    to access the corresponding value. Dictionaries are unordered and mutable.

    7. **Set Type**: The set type is used to represent a collection of unique elements.
    Sets are unordered and mutable. They are often used to perform mathematical operations
    like union, intersection, and difference.


    ### Variable Assignment


    In Python, variables are assigned using the assignment operator (=). The value
    on the right side of the assignment operator is assigned to the variable on the
    left side. Here are some examples of variable assignment:


    ```

    x = 10  # assigning an integer value to variable x

    name = "John"  # assigning a string value to variable name

    is_valid = True  # assigning a boolean value to variable is_valid

    ```


    ### Type Conversion


    Python provides built-in functions to convert variables from one type to another.
    This process is known as type conversion or type casting. Here are some commonly
    used type conversion functions:


    - int(): Converts a value to an integer.

    - float(): Converts a value to a floating-point number.

    - str(): Converts a value to a string.

    - bool(): Converts a value to a boolean.

    - list(): Converts a value to a list.

    - tuple(): Converts a value to a tuple.

    - dict(): Converts a value to a dictionary.

    - set(): Converts a value to a set.


    ### Checking Variable Type


    To check the type of a variable, you can use the type() function. It returns the
    type of the variable as an object. Here’s an example:


    ```

    x = 10

    print(type(x)) # Output: <class ''int''>

    name = "John"

    print(type(name)) # Output: <class ''str''>

    is_valid = True

    print(type(is_valid)) # Output: <class ''bool''>

    ```


    ### Conclusion


    In this section, we learned about variables and data types in Python. We explored
    the rules for naming variables and discussed the commonly used data types in Python,
    such as numeric types, strings, booleans, lists, tuples, dictionaries, and sets.
    We also saw how to assign values to variables and perform type conversion. Understanding
    variables and data types is essential as they form the building blocks of any
    Python program. In the next section, we will explore operators in Python, which
    are used to perform various operations on variables and data.


