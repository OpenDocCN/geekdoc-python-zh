    pip install library_name

    Replace library_name with the name of the library you want to install. For example,
    if you want to install the popular NumPy library, you would run the following
    command:

    pip install numpy

    pip will download and install the library and any dependencies it requires. Once
    the installation is complete, you can start using the library in your Python code.


    # 5.4.2 Importing External Libraries


