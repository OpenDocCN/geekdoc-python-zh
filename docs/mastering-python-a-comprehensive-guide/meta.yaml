    `get()` 方法来指定在找不到键时返回的默认值。


    ### 修改字典项


    字典是可变的，这意味着你可以修改与键关联的值。要修改一个值，你可以简单地为该键分配一个新值。以下是一个示例：


    ```

    my_dict = {''name'': ''John'', ''age'': 25, ''city'': ''New York''}

