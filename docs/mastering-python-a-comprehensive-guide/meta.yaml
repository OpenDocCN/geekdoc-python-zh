    # # Chapter 6 - Error Handling and Exceptions


    # ## 6.1 Understanding Errors


    Errors are an inevitable part of programming. No matter how experienced you are,
    you will encounter errors while writing Python code. Understanding errors and
    knowing how to handle them effectively is crucial for writing robust and reliable
    programs.


    # ### Types of Errors


    In Python, errors are categorized into three main types: syntax errors, runtime
    errors, and logical errors.


    # #### Syntax Errors


    Syntax errors occur when the code violates the rules of the Python language. These
    errors are detected by the Python interpreter during the parsing phase, before
    the code is executed. Common syntax errors include missing parentheses, incorrect
    indentation, and misspelled keywords.


    For example, consider the following code snippet:


    ```

    print("Hello, World!"

    ```


    In this case, a syntax error will be raised because the closing parenthesis is
    missing. The Python interpreter will display a traceback message indicating the
    line number and the nature of the error.


    # #### Runtime Errors


    Runtime errors, also known as exceptions, occur during the execution of a program.
    These errors are caused by factors such as invalid input, division by zero, or
    accessing an index out of range. Runtime errors can be handled using exception
    handling techniques, which we will discuss in the next section.


    For example, consider the following code snippet:


    ```

    num1 = 10

    num2 = 0

    result = num1 / num2

    ```


    In this case, a runtime error called “ZeroDivisionError” will be raised because
    we are trying to divide a number by zero. The Python interpreter will display
    a traceback message indicating the line number and the specific exception that
    occurred.


    # #### Logical Errors'
