    \ 定义类\n\n要在 Python 中定义类，你使用 `class` 关键字，后跟类名。类名应遵循变量的命名约定，使用小写字母和下划线表示多个单词。在类内部，你可以定义属性和方法。\n\
    \n属性是保存每个类实例特定数据的变量。它们可以在类内部使用 `self` 关键字定义，该关键字引用类的实例。例如，让我们定义一个名为 `Person` 的简单类，具有\
    \ `name` 和 `age` 属性：\n\n```\nclass Person:\n    def __init__(self, name, age):\n\
