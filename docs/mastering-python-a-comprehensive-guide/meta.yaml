    # Package Initialization


    The __init__.py file inside a package is executed when the package is imported.
    This allows you to perform any necessary initialization code for the package.
    For example, you can define variables, import modules, or set up any other necessary
    resources. The __init__.py file can also be used to control what gets imported
    when the package is imported.


    By default, when you import a package, only the __init__.py file is executed.
    If you want to import specific modules or sub-packages from the package, you need
    to explicitly import them in the __init__.py file. This allows you to control
    what gets exposed when the package is imported.


