    \n## 8.3 替换和修改文本\n\n在前面的章节中，我们学习了正则表达式的基础知识以及如何在文本中匹配模式。在本节中，我们将探讨如何在 Python 中使用正则表达式来替换和修改文本。\n\
    \n### 替换文本\n\n处理文本时的常见任务之一是将某些模式或子字符串替换为新值。正则表达式提供了一种强大的方法来完成此任务。\n\n在 Python\
    \ 中，我们可以使用 `re.sub()` 函数基于正则表达式模式替换文本。`sub()` 函数接受三个参数：要搜索的模式、替换字符串和输入字符串。\n\n\
    以下是一个简单的示例，演示如何使用 `sub()` 函数：\n\n```python\nimport re\ntext = \"Hello, World!\"\
    \nnew_text = re.sub(r\"World\", \"Python\", text)\nprint(new_text)\n```\n\n输出：\n\
    \n```\nHello, Python!\n```\n\n在上面的示例中，我们使用正则表达式模式 `r\"World\"` 在输入字符串 `text` 中搜索单词\
    \ “World”。然后，我们使用 `sub()` 函数将其替换为单词 “Python”。结果字符串 `new_text` 被打印到控制台。\n\n`sub()`\
    \ 函数还可以接受一个函数作为替换参数。这允许我们根据匹配的模式执行更复杂的替换。对于找到的每个匹配项，都会调用该函数，其返回值将用作替换内容。\n\n以下是一个示例，演示如何使用函数作为替换参数：\n\
    \n```python\nimport re\ndef replace(match):\n    return match.group(0).upper()\n\
    text = \"hello, world!\"\nnew_text = re.sub(r\"\\b\\w+\\b\", replace, text)\n\
    print(new_text)\n```\n\n输出：\n\n```\nHELLO, WORLD!\n```\n\n在上面的示例中，我们定义了一个名为 `replace()`\
    \ 的函数，该函数接受一个匹配对象作为参数。该函数简单地返回匹配字符串的大写形式。然后，我们在 `sub()` 函数中使用此函数作为替换参数。结果字符串 `new_text`\
    \ 被打印到控制台。\n\n### 修改文本\n\n除了替换文本，正则表达式还可以用于以各种方式修改文本。例如，我们可以删除某些模式或子字符串、添加前缀或后缀，或重新排列单词的顺序。\n\
    \n让我们看几个示例，了解如何在 Python 中使用正则表达式修改文本。\n\n### 删除模式\n\n要从文本中删除某些模式或子字符串，我们可以使用 `re.sub()`\
