- md: "In the previous sections, we learned the basics of regular expressions and\
    \ how to use them for matching patterns and replacing text. In this section, we\
    \ will explore some advanced techniques and features of regular expressions in\
    \ Python.\n\n## Lookahead and Lookbehind Assertions\n\nLookahead and lookbehind\
    \ assertions are powerful tools that allow us to match patterns based on what\
    \ comes before or after a specific position in the string, without including it\
    \ in the match itself.\n\n## Lookahead Assertions\n\nA lookahead assertion is\
    \ denoted by the (?=...) syntax. It allows us to match a pattern only if it is\
    \ followed by another pattern. For example, let’s say we want to find all occurrences\
    \ of the word “Python” that are followed by the word “programming”. We can use\
    \ the following regular expression:\n\n```python\nimport re\ntext = \"Python is\
    \ a popular programming language. Python is easy to learn.\"\npattern = r\"Python(?=\\\
    sprogramming)\"\nmatches = re.findall(pattern, text)\nprint(matches)\n```\n\n\
    Output:\n```\n['Python']\n```\n\nIn this example, the lookahead assertion (?=\\\
    sprogramming) ensures that the word “Python” is followed by a space and the word\
    \ “programming”. The match is successful only if this condition is met.\n\n##\
    \ Lookbehind Assertions\n\nA lookbehind assertion is denoted by the (?<=...) syntax.\
    \ It allows us to match a pattern only if it is preceded by another pattern. For\
    \ example, let’s say we want to find all occurrences of the word “Python” that\
    \ are preceded by the word “learn”. We can use the following regular expression:\n\
    \n```python\nimport re\ntext = \"Python is a popular programming language. Learn\
    \ Python to become a skilled developer.\"\npattern = r\"(?<=Learn\\s)Python\"\n\
    matches = re.findall(pattern, text)\nprint(matches)\n```\n\nOutput:\n```\n['Python']\n\
    ```\n\nIn this example, the lookbehind assertion (?<=Learn\\s) ensures that the\
    \ word “Python” is preceded by the word “Learn” and a space. The match is successful\
    \ only if this condition is met.\n\n## Non-Capturing Groups\n\nIn some cases,\
    \ we may want to use parentheses for grouping purposes without capturing the matched\
    \ text. We can achieve this by using non-capturing groups, denoted by the (?:...)\
    \ syntax. Non-capturing groups are useful when we want to apply a quantifier to\
    \ a group but don’t need to extract the matched text.\n\nFor example, let’s say\
    \ we want to find all occurrences of the word “cat” followed by either “s” or\
    \ “es”. We can use the following regular expression:\n\n```python\nimport re\n\
    text = \"I have a cat. She has two cats.\"\npattern = r\"cat(?:s|es)\"\nmatches\
    \ = re.findall(pattern, text)\nprint(matches)\n```\n\nOutput:\n```\n['cat', 'cats']\n\
    ```\n\nIn this example, the non-capturing group (?:s|es) matches either “s” or\
    \ “es” after the word “cat”. The matched text is not captured, but the entire\
    \ pattern is considered for matching.\n\n## Backreferences\n\nBackreferences allow\
    \ us to refer to a previously captured group within the same regular expression.\
    \ They are denoted by the \\number syntax, where number is the index of the captured\
    \ group.\n\nFor example, let’s say we want to find all occurrences of a repeated\
    \ word in a sentence. We can use the following regular expression:\n\n```python\n\
    import re\ntext = \"This is is a test test sentence.\"\npattern = r\"\\b(\\w+)\\\
    s+\\1\\b\"\nmatches = re.findall(pattern, text)\nprint(matches)\n```\n\nOutput:\n\
    ```\n['is', 'test']\n```\n\nIn this example, the backreference \\1 refers to the\
    \ first captured group (\\w+), which matches any word character. The pattern \\\
    b(\\w+)\\s+\\1\\b ensures that the same word is repeated consecutively.\n\n##\
    \ Named Groups\n\nNamed groups allow us to assign a name to a captured group,\
    \ making it easier to refer to the matched text. They are denoted by the (?P<name>...)\
    \ syntax, where name is the name of the group.\n\nFor example, let’s say we want\
    \ to extract the year, month, and day from a date string. We can use the following\
    \ regular expression:\n\n```python\nimport re\ntext = \"Today is 2022-01-01.\"\
    \npattern = r\"(?P<year>\\d{4})-(?P<month>\\d{2})-(?P<day>\\d{2})\"\nmatch = re.search(pattern,\
    \ text)\nif match:\n    print(\"Year:\", match.group(\"year\"))\n    print(\"\
    Month:\", match.group(\"month\"))\n    print(\"Day:\", match.group(\"day\"))\n\
    ```\n\nOutput:\n```\nYear: 2022\nMonth: 01\nDay: 01\n```\n\nIn this example, the\
    \ named groups (?P<year>\\d{4}), (?P<month>\\d{2}), and (?P<day>\\d{2}) capture\
    \ the year, month, and day respectively. We can refer to these groups by their\
    \ names using the group() method.\n\n## Conclusion\n\nIn this section, we explored\
    \ some advanced techniques and features of regular expressions in Python. Lookahead\
    \ and lookbehind assertions allow us to match patterns based on what comes before\
    \ or after a specific position in the string. Non-capturing groups are useful\
    \ when we want to group patterns without capturing the matched text. Backreferences\
    \ allow us to refer to previously captured groups within the same regular expression.\
    \ Named groups make it easier to refer to captured text by assigning names to\
    \ groups. By mastering these advanced techniques, you can become even more proficient\
    \ in using regular expressions to manipulate and extract information from text\
    \ data.\n\n# Chapter 9 - Database Interaction\n\n## 9.1 Connecting to Databases\n\
    \nIn today’s world, data is the backbone of many applications and systems. Whether\
    \ it’s a small-scale project or a large enterprise-level application, the ability\
    \ to store and retrieve data efficiently is crucial. Python, being a versatile\
    \ and powerful programming language, provides various libraries and modules to\
    \ interact with databases seamlessly.\n\nIn this section, we will explore different\
    \ ways to connect to databases using Python. We will discuss the popular database\
    \ management systems such as MySQL, PostgreSQL, and SQLite, and learn how to establish\
    \ connections, execute queries, and work with result sets.\n\n### Connecting to\
    \ MySQL\n\nMySQL is one of the most widely used open-source relational database\
    \ management systems. To connect to a MySQL database using Python, we need to\
