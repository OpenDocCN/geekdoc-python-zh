    ## 3.2 Tuples


    In Python, a tuple is an ordered collection of elements, enclosed in parentheses
    and separated by commas. Tuples are similar to lists, but they are immutable,
    meaning that once a tuple is created, its elements cannot be modified. Tuples
    are commonly used to store related pieces of data together.


    ### Creating Tuples


    To create a tuple, you can simply enclose the elements in parentheses and separate
    them with commas. For example:


    ```

    my_tuple = (1, 2, 3, 4, 5)

    ```


    You can also create a tuple without using parentheses by separating the elements
    with commas. For example:


    ```

    my_tuple = 1, 2, 3, 4, 5

    ```


    Tuples can contain elements of different data types, including numbers, strings,
    and even other tuples. For example:


    ```

    mixed_tuple = (1, "hello", (2, 3, 4), [5, 6, 7])

    ```


    ### Accessing Elements in a Tuple


    You can access individual elements in a tuple using indexing, similar to how you
    access elements in a list. The index of the first element in a tuple is 0, the
    second element is 1, and so on. For example:


    ```

    my_tuple = (1, 2, 3, 4, 5)

    print(my_tuple[0]) # Output: 1

    print(my_tuple[2]) # Output: 3

    ```


    You can also use negative indexing to access elements from the end of the tuple.
    For example:


    ```

    my_tuple = (1, 2, 3, 4, 5)

    print(my_tuple[-1]) # Output: 5

    print(my_tuple[-3]) # Output: 3

    ```


    ### Tuple Slicing


    In addition to accessing individual elements, you can also extract a subset of
    elements from a tuple using slicing. Slicing allows you to create a new tuple
    that contains a range of elements from the original tuple. The syntax for slicing
    is start:stop:step, where start is the index of the first element to include,
    stop is the index of the first element to exclude, and step is the number of elements
    to skip. For example:


    ```

    my_tuple = (1, 2, 3, 4, 5)

    print(my_tuple[1:4]) # Output: (2, 3, 4)

    print(my_tuple[::2]) # Output: (1, 3, 5)

    print(my_tuple[::-1]) # Output: (5, 4, 3, 2, 1)

    ```


    ### Modifying Tuples


    As mentioned earlier, tuples are immutable, which means you cannot modify their
    elements once they are created. However, you can create a new tuple by concatenating
    or repeating existing tuples. For example:


    ```

    tuple1 = (1, 2, 3)

    tuple2 = (4, 5, 6)

    concatenated_tuple = tuple1 + tuple2

    print(concatenated_tuple) # Output: (1, 2, 3, 4, 5, 6)

    repeated_tuple = tuple1 * 3

    print(repeated_tuple) # Output: (1, 2, 3, 1, 2, 3, 1, 2, 3)

    ```


    ### Tuple Methods


    Although tuples are immutable, they still have a few methods that can be used
    to perform operations on them. Some of the commonly used tuple methods include:


    - count(element): Returns the number of occurrences of the specified element in
    the tuple.

    - index(element): Returns the index of the first occurrence of the specified element
    in the tuple.


    ```

    my_tuple = (1, 2, 3, 2, 4, 2)

    print(my_tuple.count(2))  # Output: 3

    print(my_tuple.index(4))  # Output: 4

    ```


    ### Advantages of Using Tuples


    Tuples offer several advantages over lists in certain situations:


    1. **Immutable**: Tuples are immutable, which means their elements cannot be modified.
    This makes them suitable for storing data that should not be changed, such as
    configuration settings or constant values.

    2. **Faster**: Tuples are generally faster than lists because they have a smaller
    memory footprint and do not require any resizing operations.

    3. **Hashable**: Tuples are hashable, which means they can be used as keys in
    dictionaries and elements in sets. Lists, on the other hand, are not hashable
    and cannot be used as keys or elements in these data structures.

    4. **Safe**: Since tuples are immutable, they provide a level of safety when working
    with data that should not be accidentally modified. This can help prevent bugs
    and make code easier to reason about.


    ### Conclusion


    Tuples are a versatile data structure in Python that allow you to store related
    pieces of data together. They are immutable, meaning their elements cannot be
    modified once created. Tuples can be accessed using indexing and slicing, and
    they have a few methods for performing operations on them. Tuples offer advantages
    such as immutability, speed, hashability, and safety. Understanding how to work
    with tuples will enhance your ability to write efficient and reliable Python code.


    ## 3.3 Dictionaries


    A dictionary is a versatile and powerful data structure in Python that allows
    you to store and retrieve data using key-value pairs. It is an unordered collection
    of items where each item is stored as a key-value pair. Dictionaries are also
    known as associative arrays or hash maps in other programming languages.


    ### Creating a Dictionary


    To create a dictionary in Python, you can use curly braces {} or the dict() constructor.
    Here’s an example:


    ```

    # Using curly braces

    my_dict = {''name'': ''John'', ''age'': 25, ''city'': ''New York''}

    ```


    ```

    # Using the dict() constructor

    my_dict = dict(name=''John'', age=25, city=''New York'')

    ```


    In the above examples, we have created a dictionary called my_dict with three
    key-value pairs. The keys are ''name'', ''age'', and ''city'', and the corresponding
    values are ''John'', 25, and ''New York''.


    ### Accessing Dictionary Items


    You can access the values in a dictionary by referring to its key. To retrieve
    a value, you can use square brackets [] or the get() method. Here’s an example:


    ```

    my_dict = {''name'': ''John'', ''age'': 25, ''city'': ''New York''}

    # Accessing values using square brackets

    print(my_dict[''name'']) # Output: John

    # Accessing values using the get() method

    print(my_dict.get(''age'')) # Output: 25

    ```


    In the above example, we accessed the value ''John'' by using the key ''name''
    with square brackets. Similarly, we accessed the value 25 by using the key ''age''
    with the get() method.


    If you try to access a key that does not exist in the dictionary, it will raise
    a KeyError. However, when using the get() method, if the key is not found, it
    will return None by default. You can also specify a default value to be returned
    if the key is not found by passing it as the second argument to the get() method.


    ### Modifying Dictionary Items


    Dictionaries are mutable, which means you can modify the values associated with
    a key. To modify a value, you can simply assign a new value to the key. Here’s
    an example:


    ```

    my_dict = {''name'': ''John'', ''age'': 25, ''city'': ''New York''}

    # Modifying a value

    my_dict[''age''] = 26

    print(my_dict) # Output: {''name'': ''John'', ''age'': 26, ''city'': ''New York''}

    ```


    In the above example, we modified the value associated with the key ''age'' from
    25 to 26.


    ### Adding and Removing Items


    You can add new key-value pairs to a dictionary by assigning a value to a new
    key. Similarly, you can remove items from a dictionary using the del keyword or
    the pop() method. Here are some examples:


    ```

    my_dict = {''name'': ''John'', ''age'': 25, ''city'': ''New York''}

    # Adding a new item

    my_dict[''occupation''] = ''Engineer''

    print(my_dict) # Output: {''name'': ''John'', ''age'': 25, ''city'': ''New York'',
    ''occupation'': ''Engineer''}

    # Removing an item using the del keyword

    del my_dict[''age'']

    print(my_dict) # Output: {''name'': ''John'', ''city'': ''New York'', ''occupation'':
    ''Engineer''}

    # Removing an item using the pop() method

    my_dict.pop(''city'')

    print(my_dict) # Output: {''name'': ''John'', ''occupation'': ''Engineer''}

    ```


    In the above examples, we added a new key-value pair ''occupation'': ''Engineer''
    to the dictionary. Then, we removed the key ''age'' using both the del keyword
    and the pop() method. After each operation, we printed the updated dictionary.


    ### Dictionary Methods


    Python provides several built-in methods to perform various operations on dictionaries.
    Here are some commonly used methods:


    - keys(): Returns a list of all the keys in the dictionary.

    - values(): Returns a list of all the values in the dictionary.

    - items(): Returns a list of all the key-value pairs in the dictionary as tuples.

    - update(): Updates the dictionary with the key-value pairs from another dictionary
    or an iterable.

    - clear(): Removes all the items from the dictionary.


    Here’s an example that demonstrates the usage of these methods:


    ```

    my_dict = {''name'': ''John'', ''age'': 25, ''city'': ''New York''}

    # Getting all the keys

    print(my_dict.keys()) # Output: [''name'', ''age'', ''city'']

    # Getting all the values

    print(my_dict.values()) # Output: [''John'', 25, ''New York'']

    # Getting all the items

    ```'
