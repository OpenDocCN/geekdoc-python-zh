    print(a != b) # Output: True

    print(a > b) # Output: True

    print(a < b) # Output: False

    print(a >= b) # Output: True

    print(a <= b) # Output: False

    ```


    # Logical Operators


    Logical operators are used to combine multiple conditions and evaluate the result
    as True or False. Python supports the following logical operators:


    +   - Logical AND (and): Returns True if both operands are True.

    - Logical OR (or): Returns True if at least one of the operands is True.

    - Logical NOT (not): Returns the opposite of the operand’s value.


    Here is an example that demonstrates the use of logical operators:


    ```

    a = 10

    b = 3

    c = 5

    ```'
