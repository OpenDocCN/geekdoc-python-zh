    \ and Circle. Each shape has a method called area() that calculates its area.\n\
    \n```\nclass Shape:\n    def area(self):\n        pass\n\nclass Rectangle(Shape):\n\
    \    def __init__(self, length, width):\n        self.length = length\n      \
    \  self.width = width\n    def area(self):\n        return self.length * self.width\n\
    \nclass Circle(Shape):\n    def __init__(self, radius):\n        self.radius =\
    \ radius\n    def area(self):\n        return 3.14 * self.radius * self.radius\n\
    ```\n\nIn the above example, both the Rectangle and Circle classes inherit from\
