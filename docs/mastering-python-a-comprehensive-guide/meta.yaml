  mdcn: "## 6.2 处理异常\n\n异常处理是 Python 编程的一个重要方面。它允许你优雅地处理代码执行过程中可能出现的错误和意外情况。通过处理异常，你可以防止程序崩溃，并向用户提供有意义的反馈。\n\
    \n### try-except 块\n\n在 Python 中，异常是通过 try-except 块来处理的。try 块包含可能引发异常的代码，而 except\
    \ 块则指定了如果发生异常该如何处理。以下是基本语法：\n\n```\ntry:\n    # 可能引发异常的代码\nexcept ExceptionType:\n\
    \    # 处理异常的代码\n```\n\n当 try 块中引发异常时，代码执行会立即跳转到相应的 except 块。ExceptionType 指定了你想要处理的异常类型。如果引发的异常与指定类型匹配，则执行\
    \ except 块中的代码。如果异常与指定类型不匹配，它会沿着调用栈向上传播，直到被处理或程序终止。\n\n### 处理多个异常\n\n你可以通过在 try\
    \ 块后包含多个 except 块来处理多个异常。每个 except 块可以处理不同类型的异常。这允许你为不同类型的异常提供特定的错误处理。以下是一个示例：\n\
    \n```\ntry:\n    # 可能引发异常的代码\nexcept ExceptionType1:\n    # 处理 ExceptionType1\
    \ 的代码\nexcept ExceptionType2:\n    # 处理 ExceptionType2 的代码\n```\n\n如果引发的异常与指定的某个类型匹配，则执行相应的\
    \ except 块。如果异常与任何指定类型都不匹配，它会沿着调用栈向上传播。\n\n### else 块\n\n除了 try 和 except 块，你还可以在\
    \ except 块之后包含一个可选的 else 块。如果 try 块中没有引发异常，则执行 else 块中的代码。这允许你指定只有在 try 块成功完成时才应运行的代码。以下是一个示例：\n\
    \n```\ntry:\n    # 可能引发异常的代码\nexcept ExceptionType:\n    # 处理异常的代码\nelse:\n  \
    \  # 如果没有引发异常则运行的代码\n```\n\n当你只想在 try 块中的代码没有任何错误地执行时才执行某些操作时，else 块非常有用。\n\n\
    ### finally 块\n\n可以在 try-except 结构中包含的另一个可选块是 finally 块。无论是否引发异常，finally 块中的代码总会被执行。此块对于执行清理操作非常有用，例如关闭文件或释放资源。以下是一个示例：\n\
    \n```\ntry:\n    # 可能引发异常的代码\nexcept ExceptionType:\n    # 处理异常的代码\nfinally:\n\
    \    # 无论异常与否都运行的代码\n```\n\nfinally 块在 try 和 except 块之后执行，无论是否发生异常。它确保指定的清理代码总会被执行，即使异常被引发且未被处理。\n\
    \n### 引发异常\n\n除了处理异常，你还可以使用 raise 语句显式地引发异常。这允许你创建自己的自定义异常，或在满足特定条件时引发内置异常。以下是一个示例：\n\
    \n```\nif condition:\n    raise ExceptionType(\"Error message\")\n```\n\nraise\
    \ 语句后跟你要引发的异常类型，以及一个可选的错误消息。当异常被引发时，代码执行会立即跳转到最近的、能够处理该异常的 except 块。\n\n### 异常层次结构\n\
    \nPython 有一个内置的异常类层次结构，允许你在不同特异性级别处理异常。层次结构的顶部是 BaseException 类，它是所有异常的基类。在 BaseException\
