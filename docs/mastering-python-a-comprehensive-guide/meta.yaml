  md: "bound tasks. In CPU-bound scenarios, where the tasks involve heavy computation,\
    \ threads may not provide a significant performance improvement.\n\n# Coroutines\n\
    \nCoroutines are another way to achieve concurrency in Python. Unlike threads,\
