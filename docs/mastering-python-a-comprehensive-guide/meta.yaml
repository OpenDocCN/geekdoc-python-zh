    operations, check for membership, get the length of a set, use set comprehension,
    and work with frozen sets. Understanding sets and their operations will greatly
    enhance your ability to work with data in Python.


    # 3.5 Strings


    In Python, a string is a sequence of characters enclosed in either single quotes
    ('') or double quotes (""). Strings are one of the most commonly used data types
    in Python and are used to represent text data. They are immutable, which means
    that once a string is created, it cannot be changed. However, you can perform
    various operations on strings to manipulate and extract information from them.


    # Creating Strings


    To create a string in Python, you simply need to enclose the desired text within
    quotes. For example:


    ```

    my_string = "Hello, World!"

    ```


    In the above example, we have created a string variable called my_string and assigned
    it the value “Hello, World!”. You can also use single quotes to create strings:


    ```

    my_string = ''Hello, World!''

    ```


    Both single and double quotes can be used interchangeably to create strings. However,
    if you want to include a quote character within the string itself, you need to
    use the opposite type of quote to enclose the string. For example:


    ```

    my_string = "He said, ''Hello, World!''"

    ```


    In the above example, we have used double quotes to enclose the string because
    it contains a single quote character.


    # Accessing Characters in a String


    You can access individual characters in a string by using indexing. In Python,
    indexing starts from 0, so the first character of a string is at index 0, the
    second character is at index 1, and so on. For example:


    ```

    my_string = "Hello, World!"

    print(my_string[0]) # Output: H

    print(my_string[7]) # Output: W

    ```


    In the above example, we have accessed the first character of the string using
    my_string[0] and the eighth character using my_string[7].


    # String Slicing


    In addition to accessing individual characters, you can also extract a substring
    from a string using slicing. Slicing allows you to specify a range'
  - '[PAGE 42]


    of indices to extract a portion of the string. The syntax for slicing is string[start:end],
    where start is the index of the first character to include and end is the index
    of the first character to exclude. For example:


    ```

    my_string = "Hello, World!"

    print(my_string[0:5])  # Output: Hello

    print(my_string[7:])  # Output: World!

    ```


    In the above example, my_string[0:5] extracts the characters from index 0 to index
    4 (inclusive), while my_string[7:] extracts all characters starting from index
    7 to the end of the string.


    # String Concatenation


    String concatenation is the process of combining two or more strings into a single
    string. In Python, you can concatenate strings using the + operator. For example:


    ```

    string1 = "Hello"

    string2 = "World"

    concatenated_string = string1 + " " + string2

    print(concatenated_string)  # Output: Hello World

    ```


    In the above example, we have concatenated string1, a space character, and string2
    to create the string “Hello World”.


    # String Methods


    Python provides a variety of built-in methods that you can use to manipulate and
    work with strings. Some commonly used string methods include:


    +   - len(): Returns the length of a string.

    - lower(): Converts all characters in a string to lowercase.

    - upper(): Converts all characters in a string to uppercase.

    - strip(): Removes leading and trailing whitespace from a string.

    - split(): Splits a string into a list of substrings based on a specified delimiter.

    - replace(): Replaces occurrences of a specified substring with another substring.'
