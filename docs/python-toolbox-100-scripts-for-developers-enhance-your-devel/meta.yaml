  - '[PAGE 34]


    Creating graphs and charts for data presentations in Python can be done using
    various libraries. Two commonly used libraries for this purpose are matplotlib
    and seaborn. Here are examples of how you can create different types of charts
    using these libraries:


    +   1. Install necessary libraries:


    ```

    pip install matplotlib seaborn

    ```


    +   2. Example scripts for different types of charts:


    # Bar Chart:


    ```

    import matplotlib.pyplot as plt


    # Sample data

    categories = [''Category A'', ''Category B'', ''Category C'']

    values = [25, 40, 30]


    # Create a bar chart

    plt.bar(categories, values, color=''blue'')

    plt.title(''Bar Chart Example'')

    plt.xlabel(''Categories'')

    plt.ylabel(''Values'')

    plt.show()

    ```


    # Line Chart:


    ```

    import matplotlib.pyplot as plt


    # Sample data

    x_values = [1, 2, 3, 4, 5]

    y_values = [10, 12, 18, 15, 20]


    # Create a line chart

    plt.plot(x_values, y_values, marker=''o'', linestyle=''-'', color=''green'')

    plt.title(''Line Chart Example'')

    plt.xlabel(''X-axis'')

    plt.ylabel(''Y-axis'')

    plt.show()

    ```'
