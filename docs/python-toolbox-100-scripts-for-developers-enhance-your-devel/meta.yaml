    \ reader)\n\n# Split the dataset into training and testing sets\ntrainset, testset\
    \ = train_test_split(data, test_size=0.2)\n\n# Use the k-NN algorithm for collaborative\
    \ filtering\nsim_options = {\n    'name': 'cosine',\n    'user_based': True,\n\
    }\n\nmodel = KNNBasic(sim_options=sim_options)\n\n# Train the model on the training\
    \ set\nmodel.fit(trainset)\n\n# Make predictions on the test set\npredictions\
    \ = model.test(testset)\n\n# Evaluate the model using RMSE (Root Mean Squared\
    \ Error)\naccuracy = rmse(predictions)\nprint(f\"RMSE: {accuracy}\")\n\n# Recommend\
    \ items for a specific user (user ID 196 in this example)\nuser_id = str(196)\n\
    user_ratings = trainset.ur[trainset.to_inner_uid(user_id)]\nitems_rated_by_user\
    \ = {item_id: rating for (item_id, rating) in user_ratings}\nitems_not_rated_by_user\
    \ = set(trainset.all_items()) - set(items_rated_by_user)\n```"
