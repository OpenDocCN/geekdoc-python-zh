    \ 删除文件之前，会多次用随机数据覆盖文件内容。覆盖次数可以根据您的安全要求进行调整。\n\n注意：请记住，安全删除是一个复杂的话题，此方法的有效性可能取决于多种因素，包括文件系统和存储介质。处理敏感数据时务必谨慎，对于关键应用，建议咨询安全专家。"
