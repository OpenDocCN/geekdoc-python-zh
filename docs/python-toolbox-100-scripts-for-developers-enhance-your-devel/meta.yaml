  md: "To create a basic port scanner in Python, you can use the `socket` library\
    \ to attempt connections to different ports on a target host. Here's a simple\
    \ example of a port scanner:\n\n```\nimport socket\n\ndef scan_ports(target_host,\
    \ start_port, end_port):\n    print(f\"Scanning ports on {target_host}...\\n\"\
    )\n\n    # Loop through the specified range of ports\n    for port in range(start_port,\
    \ end_port + 1):\n        # Create a socket object\n        sock = socket.socket(socket.AF_INET,\
    \ socket.SOCK_STREAM)\n        sock.settimeout(1) # Set a timeout for the connection\
    \ attempt\n\n        # Attempt to connect to the target host and port\n      \
    \  result = sock.connect_ex((target_host, port))\n\n        # Check if the connection\
    \ was successful\n        if result == 0:\n            print(f\"Port {port} is\
    \ open\")\n        else:\n            print(f\"Port {port} is closed\")\n\n  \
    \      # Close the socket\n        sock.close()\n\nif __name__ == \"__main__\"\
    :\n    # Replace 'example.com' with the target host\n    target_host = 'example.com'\n\
    \n    # Specify the range of ports to scan (e.g., from 1 to 100)\n    start_port\
    \ = 1\n    end_port = 100\n\n    # Perform the port scan\n    scan_ports(target_host,\
    \ start_port, end_port)\n```\n\nReplace the `target_host` variable with the target\
    \ host's IP address or domain name. Specify the range of ports you want to scan\
    \ by setting the `start_port` and `end_port` variables.\n\nRun the script, and\
    \ it will attempt to connect to each port in the specified range. If the connection\
    \ is successful, it will print that the port is open; otherwise, it will indicate\
    \ that the port is closed.\n\nKeep in mind that scanning ports without permission\
    \ is against the terms of service of many networks, and unauthorized port scanning\
