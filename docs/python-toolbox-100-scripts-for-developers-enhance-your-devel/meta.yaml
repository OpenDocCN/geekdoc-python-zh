    \    spelling_quiz.run_quiz(num_questions=5)\n```\n\nYou can customize the `word_dictionary`\
    \ with your own set of words and correct spellings. The `run_quiz` method runs\
    \ the quiz, asking the user to spell random words from the dictionary. After completing\
