- md: "## Monitor changes in file directories\n\nMonitoring changes in file directories\
    \ can be achieved using the watchdog library in Python. This library provides\
    \ a simple API for monitoring file system events. You can install it using:\n\n\
    ```\npip install watchdog\n```\n\nHere's an example script that monitors a directory\
    \ for file system events:\n\n```\nimport time\nfrom watchdog.observers import\
    \ Observer\nfrom watchdog.events import FileSystemEventHandler\n\nclass MyHandler(FileSystemEventHandler):\n\
    \    def on_modified(self, event):\n        if event.is_directory:\n         \
    \   return\n        # File modified\n        print(f'File {event.src_path} has\
    \ been modified')\n\n    def on_created(self, event):\n        if event.is_directory:\n\
    \            return\n        # File created\n        print(f'File {event.src_path}\
    \ has been created')\n\n    def on_deleted(self, event):\n        if event.is_directory:\n\
    \            return\n        # File deleted\n        print(f'File {event.src_path}\
    \ has been deleted')\n\nif __name__ == \"__main__\":\n    path = \"/path/to/directory/to/monitor\"\
    \n\n    event_handler = MyHandler()\n    observer = Observer()\n    observer.schedule(event_handler,\
    \ path, recursive=True)\n    observer.start()\n\n    try:\n        while True:\n\
    \            time.sleep(1)\n    except KeyboardInterrupt:\n        observer.stop()\n\
    \    observer.join()\n```\n\nReplace \"/path/to/directory/to/monitor\" with the\
    \ actual path of the directory you want to monitor. This script will print messages\
    \ when files are modified, created, or deleted within the specified directory.\n\
    \nMake sure to adapt the script according to your specific use case. You can extend\
    \ the MyHandler class to include additional event handling methods if needed.\n\
    \n## Rename files in bulk according to a pattern\n\nTo rename files in bulk according\
    \ to a pattern in Python, you can use the `os` module for interacting with the\
    \ file system and the `re` module for regular expressions. Here's an example script\
    \ that renames files in a directory based on a specified pattern:\n\n```\nimport\
    \ os\nimport re\n\ndef rename_files(directory, pattern):\n    # Get the list of\
    \ files in the directory\n    files = os.listdir(directory)\n\n    # Compile the\
    \ regular expression pattern\n    regex_pattern = re.compile(pattern)\n\n    for\
    \ filename in files:\n        # Check if the filename matches the pattern\n  \
    \      match = regex_pattern.match(filename)\n        if match:\n            #\
    \ Construct the new filename based on the pattern\n            new_filename =\
    \ match.group(1) # Adjust this line based on your pattern\n            new_filepath\
    \ = os.path.join(directory, new_filename)\n\n            # Rename the file\n \
    \           os.rename(os.path.join(directory, filename), new_filepath)\n     \
    \       print(f'Renamed: {filename} to {new_filename}')\n\nif __name__ == \"__main__\"\
    :\n    # Specify the directory and pattern\n    directory_to_rename = \"/path/to/directory\"\
    \n    renaming_pattern = r'your_pattern_(\\d+)\\.txt' # Adjust this pattern based\
    \ on your needs\n\n    # Call the rename_files function\n    rename_files(directory_to_rename,\
    \ renaming_pattern)\n```\n\nReplace \"/path/to/directory\" with the actual path\
    \ of the directory containing the files you want to rename. Adjust the `renaming_pattern`\
    \ variable according to the pattern you want to match. The example pattern assumes\
    \ you want to extract numbers from filenames, but you should customize it based\
    \ on your specific requirements.\n\nMake sure to review and understand the regular\
    \ expression and adjust it to match your file naming pattern accurately. Always\
    \ back up your files before running any script that modifies file names.\n\n##\
    \ Chapter 31\n\n## VII\n\n## System Monitoring and Reporting\n\n*System Monitoring\
    \ and Reporting are powerful tools developed using languages like Python or Bash\
    \ to track and analyze various aspects of a computer system’s performance. These\
    \ scripts actively monitor critical system resources such as CPU usage, memory\
    \ utilization, and disk activity. They can generate regular reports summarizing\
    \ system statistics on a daily or weekly basis, providing insights into resource\
    \ trends and potential issues.*\n\n## Monitor system resource usage (CPU, memory,\
    \ disk)\n\nTo monitor system resource usage (CPU, memory, disk) with Python, you\
    \ can use third-party libraries like psutil. Here's a simple example script that\
    \ shows how to use psutil to monitor these resources:\n\n```\nimport psutil\n\
    import time\n\ndef monitor_resources():\n    while True:\n        # CPU usage\n\
    \        cpu_percent = psutil.cpu_percent(interval=1)\n\n        # Memory usage\n\
    \        memory_info = psutil.virtual_memory()\n        used_memory = memory_info.used\n\
    \        total_memory = memory_info.total\n        memory_percent = memory_info.percent\n\
    \n        # Disk usage\n        disk_info = psutil.disk_usage('/')\n        used_disk\
    \ = disk_info.used\n        total_disk = disk_info.total\n        disk_percent\
    \ = disk_info.percent\n\n        # Print the information\n        print(f\"CPU\
    \ Usage: {cpu_percent}%\")\n        print(f\"Memory Usage: {used_memory / (1024\
    \ ** 3):.2f} GB / {total_memory / (1024 ** 3):.2f} GB ({memory_percent}%)\")\n\
    \        print(f\"Disk Usage: {used_disk / (1024 ** 3):.2f} GB / {total_disk /\
    \ (1024 ** 3):.2f} GB ({disk_percent}%)\")\n\n        # Sleep for a while before\
    \ checking again\n        time.sleep(5)\n\nif __name__ == \"__main__\":\n    monitor_resources()\n\
    ```\n\nThis script uses the `psutil` library to retrieve CPU, memory, and disk\
    \ usage information. The `psutil.cpu_percent` function is used to get the CPU\
    \ usage percentage, and the `psutil.virtual_memory` and `psutil.disk_usage` functions\
    \ provide information about memory and disk usage, respectively.\n\nThe script\
    \ runs in an infinite loop, printing the resource usage information every 5 seconds.\
    \ You can customize the interval or add additional functionality based on your\
    \ specific requirements. To use this script, you'll need to install the psutil\
    \ library by running:\n\n```\npip install psutil\n```\n\n## Generate daily/weekly\
    \ reports on system statistics\n\nTo generate daily or weekly reports on system\
    \ statistics using Python, you can modify the script provided earlier to write\
    \ the information to a file. Here's an example that writes daily reports to a\
    \ text file:\n\n```\nimport psutil\nimport time\nfrom datetime import datetime,\
    \ timedelta\n\ndef get_timestamp():\n    return datetime.now().strftime(\"%Y-%m-%d\
    \ %H:%M:%S\")\n\ndef write_report(report_path, content):\n    with open(report_path,\
    \ 'a') as file:\n        file.write(content + '\\n')\n\ndef monitor_and_report(report_path):\n\
    \    while True:\n        timestamp = get_timestamp()\n\n        # CPU usage\n\
    \        cpu_percent = psutil.cpu_percent(interval=1)\n\n        # Memory usage\n\
    \        memory_info = psutil.virtual_memory()\n        used_memory = memory_info.used\n\
    \        total_memory = memory_info.total\n        memory_percent = memory_info.percent\n\
    \n        # Disk usage\n        disk_info = psutil.disk_usage('/')\n        used_disk\
    \ = disk_info.used\n        total_disk = disk_info.total\n        disk_percent\
    \ = disk_info.percent\n\n        # Prepare the report content\n        report_content\
    \ = (\n            f\"Timestamp: {timestamp}\\n\"\n            f\"CPU Usage: {cpu_percent}%\\\
    n\"\n            f\"Memory Usage: {used_memory / (1024 ** 3):.2f} GB / {total_memory\
    \ / (1024 ** 3):.2f} GB ({memory_percent}%)\\n\"\n            f\"Disk Usage: {used_disk\
    \ / (1024 ** 3):.2f} GB / {total_disk / (1024 ** 3):.2f} GB ({disk_percent}%)\\\
    n\"\n        )\n\n        # Write the report to the file\n        write_report(report_path,\
    \ report_content)\n\n        # Sleep for 24 hours (86400 seconds) before generating\
    \ the next report\n        time.sleep(86400)\n\nif __name__ == \"__main__\":\n\
    \    daily_report_path = 'daily_system_report.txt'\n    monitor_and_report(daily_report_path)\n\
    ```\n\nThis script continuously monitors system statistics and appends the collected\
    \ information to a text file (`daily_system_report.txt`). You can adjust the file\
    \ path and customize the report content as needed.\n\nKeep in mind that this script\
    \ will run indefinitely, generating a report once per day. You can modify the\
    \ sleep duration to adjust the reporting frequency. Additionally, you may want\
    \ to consider using a more structured format for the reports, such as CSV or JSON,\
    \ depending on your reporting needs."
  mdcn: "## 监控文件目录中的变化\n\n监控文件目录中的变化可以使用 Python 中的 watchdog 库来实现。该库提供了一个简单的 API 来监控文件系统事件。你可以使用以下命令安装它：\n\
    \n```\npip install watchdog\n```\n\n以下是一个监控目录中文件系统事件的示例脚本：\n\n```\nimport time\n\
    from watchdog.observers import Observer\nfrom watchdog.events import FileSystemEventHandler\n\
    \nclass MyHandler(FileSystemEventHandler):\n    def on_modified(self, event):\n\
    \        if event.is_directory:\n            return\n        # 文件被修改\n       \
    \ print(f'文件 {event.src_path} 已被修改')\n\n    def on_created(self, event):\n   \
    \     if event.is_directory:\n            return\n        # 文件被创建\n        print(f'文件\
    \ {event.src_path} 已被创建')\n\n    def on_deleted(self, event):\n        if event.is_directory:\n\
    \            return\n        # 文件被删除\n        print(f'文件 {event.src_path} 已被删除')\n\
    \nif __name__ == \"__main__\":\n    path = \"/path/to/directory/to/monitor\"\n\
    \n    event_handler = MyHandler()\n    observer = Observer()\n    observer.schedule(event_handler,\
    \ path, recursive=True)\n    observer.start()\n\n    try:\n        while True:\n\
    \            time.sleep(1)\n    except KeyboardInterrupt:\n        observer.stop()\n\
    \    observer.join()\n```\n\n将 \"/path/to/directory/to/monitor\" 替换为你想要监控的目录的实际路径。当指定目录中的文件被修改、创建或删除时，此脚本将打印消息。\n\
    \n请确保根据你的具体用例调整脚本。如果需要，你可以扩展 MyHandler 类以包含额外的事件处理方法。\n\n## 根据模式批量重命名文件\n\n要在\
    \ Python 中根据模式批量重命名文件，你可以使用 `os` 模块与文件系统交互，并使用 `re` 模块进行正则表达式匹配。以下是一个根据指定模式重命名目录中文件的示例脚本：\n\
    \n```\nimport os\nimport re\n\ndef rename_files(directory, pattern):\n    # 获取目录中的文件列表\n\
    \    files = os.listdir(directory)\n\n    # 编译正则表达式模式\n    regex_pattern = re.compile(pattern)\n\
    \n    for filename in files:\n        # 检查文件名是否匹配模式\n        match = regex_pattern.match(filename)\n\
    \        if match:\n            # 根据模式构造新文件名\n            new_filename = match.group(1)\
    \ # 根据你的模式调整此行\n            new_filepath = os.path.join(directory, new_filename)\n\
    \n            # 重命名文件\n            os.rename(os.path.join(directory, filename),\
    \ new_filepath)\n            print(f'已重命名: {filename} 为 {new_filename}')\n\nif\
    \ __name__ == \"__main__\":\n    # 指定目录和模式\n    directory_to_rename = \"/path/to/directory\"\
    \n    renaming_pattern = r'your_pattern_(\\d+)\\.txt' # 根据你的需求调整此模式\n\n    # 调用\
    \ rename_files 函数\n    rename_files(directory_to_rename, renaming_pattern)\n```\n\
    \n将 \"/path/to/directory\" 替换为包含你要重命名文件的目录的实际路径。根据你想要匹配的模式调整 `renaming_pattern`\
    \ 变量。示例模式假设你想从文件名中提取数字，但你应该根据你的具体需求进行自定义。\n\n请务必检查并理解正则表达式，并调整它以准确匹配你的文件命名模式。在运行任何修改文件名的脚本之前，请务必备份你的文件。\n\
    \n## 第 31 章\n\n## VII\n\n## 系统监控与报告\n\n*系统监控与报告是使用 Python 或 Bash 等语言开发的强大工具，用于跟踪和分析计算机系统性能的各个方面。这些脚本主动监控关键系统资源，如\
    \ CPU 使用率、内存利用率和磁盘活动。它们可以生成定期报告，按日或按周总结系统统计数据，提供资源趋势和潜在问题的洞察。*\n\n## 监控系统资源使用情况（CPU、内存、磁盘）\n\
    \n要使用 Python 监控系统资源使用情况（CPU、内存、磁盘），你可以使用像 psutil 这样的第三方库。以下是一个简单的示例脚本，展示如何使用 psutil\
    \ 来监控这些资源：\n\n```\nimport psutil\nimport time\n\ndef monitor_resources():\n  \
    \  while True:\n        # CPU 使用率\n        cpu_percent = psutil.cpu_percent(interval=1)\n\
    \n        # 内存使用情况\n        memory_info = psutil.virtual_memory()\n        used_memory\
    \ = memory_info.used\n        total_memory = memory_info.total\n        memory_percent\
    \ = memory_info.percent\n\n        # 磁盘使用情况\n        disk_info = psutil.disk_usage('/')\n\
    \        used_disk = disk_info.used\n        total_disk = disk_info.total\n  \
    \      disk_percent = disk_info.percent\n\n        # 打印信息\n        print(f\"CPU\
    \ 使用率: {cpu_percent}%\")\n        print(f\"内存使用情况: {used_memory / (1024 ** 3):.2f}\
    \ GB / {total_memory / (1024 ** 3):.2f} GB ({memory_percent}%)\")\n        print(f\"\
    磁盘使用情况: {used_disk / (1024 ** 3):.2f} GB / {total_disk / (1024 ** 3):.2f} GB ({disk_percent}%)\"\
    )\n\n        # 休眠一段时间后再检查\n        time.sleep(5)\n\nif __name__ == \"__main__\"\
    :\n    monitor_resources()\n```\n\n此脚本使用 `psutil` 库来获取 CPU、内存和磁盘使用信息。`psutil.cpu_percent`\
    \ 函数用于获取 CPU 使用百分比，而 `psutil.virtual_memory` 和 `psutil.disk_usage` 函数分别提供内存和磁盘使用信息。\n\
    \n该脚本在无限循环中运行，每 5 秒打印一次资源使用信息。你可以根据你的具体需求自定义间隔或添加额外功能。要使用此脚本，你需要通过运行以下命令安装 psutil\
    \ 库：\n\n```\npip install psutil\n```\n\n## 生成系统统计数据的每日/每周报告\n\n要使用 Python 生成系统统计数据的每日或每周报告，你可以修改前面提供的脚本，将信息写入文件。以下是一个将每日报告写入文本文件的示例：\n\
    \n```\nimport psutil\nimport time\nfrom datetime import datetime, timedelta\n\n\
    def get_timestamp():\n    return datetime.now().strftime(\"%Y-%m-%d %H:%M:%S\"\
    )\n\ndef write_report(report_path, content):\n    with open(report_path, 'a')\
    \ as file:\n        file.write(content + '\\n')\n\ndef monitor_and_report(report_path):\n\
    \    while True:\n        timestamp = get_timestamp()\n\n        # CPU 使用率\n \
    \       cpu_percent = psutil.cpu_percent(interval=1)\n\n        # 内存使用情况\n   \
    \     memory_info = psutil.virtual_memory()\n        used_memory = memory_info.used\n\
    \        total_memory = memory_info.total\n        memory_percent = memory_info.percent\n\
    \n        # 磁盘使用情况\n        disk_info = psutil.disk_usage('/')\n        used_disk\
    \ = disk_info.used\n        total_disk = disk_info.total\n        disk_percent\
    \ = disk_info.percent\n\n        # 准备报告内容\n        report_content = (\n      \
    \      f\"时间戳: {timestamp}\\n\"\n            f\"CPU 使用率: {cpu_percent}%\\n\"\n\
    \            f\"内存使用情况: {used_memory / (1024 ** 3):.2f} GB / {total_memory / (1024\
    \ ** 3):.2f} GB ({memory_percent}%)\\n\"\n            f\"磁盘使用情况: {used_disk /\
    \ (1024 ** 3):.2f} GB / {total_disk / (1024 ** 3):.2f} GB ({disk_percent}%)\\\
    n\"\n        )\n\n        # 将报告写入文件\n        write_report(report_path, report_content)\n\
    \n        # 休眠 24 小时（86400 秒）后再生成下一份报告\n        time.sleep(86400)\n\nif __name__\
    \ == \"__main__\":\n    daily_report_path = 'daily_system_report.txt'\n    monitor_and_report(daily_report_path)\n\
    ```\n\n此脚本持续监控系统统计数据，并将收集到的信息追加到文本文件（`daily_system_report.txt`）中。你可以根据需要调整文件路径并自定义报告内容。\n\
    \n请记住，此脚本将无限期运行，每天生成一份报告。你可以修改休眠时间以调整报告频率。此外，根据你的报告需求，你可能需要考虑使用更结构化的格式，如 CSV 或\
    \ JSON。"
