  md: "# Generate and verify digital signatures\n\nTo generate and verify digital\
    \ signatures in Python, you can use the cryptography library, which provides a\
    \ secure way to work with cryptographic operations. Below is an example of how\
    \ to generate and verify digital signatures using cryptography:\n\n```\nfrom cryptography.hazmat.backends\
    \ import default_backend\nfrom cryptography.hazmat.primitives import hashes\n\
    from cryptography.hazmat.primitives.asymmetric import rsa\nfrom cryptography.hazmat.primitives\
    \ import serialization\nfrom cryptography.hazmat.primitives.asymmetric import\
    \ padding\n\ndef generate_key_pair():\n    # Generate an RSA key pair\n    private_key\
    \ = rsa.generate_private_key(\n        public_exponent=65537,\n        key_size=2048,\n\
    \        backend=default_backend()\n    )\n    public_key = private_key.public_key()\n\
    \n    # Serialize the public key to PEM format\n    public_key_pem = public_key.public_bytes(\n\
    \        encoding=serialization.Encoding.PEM,\n        format=serialization.PublicFormat.SubjectPublicKeyInfo\n\
    \    )\n\n    return private_key, public_key_pem\n\ndef sign_message(private_key,\
    \ message):\n    # Sign a message using the private key\n    signature = private_key.sign(\n\
    \        message,\n        padding.PSS(\n            mgf=padding.MGF1(hashes.SHA256()),\n\
    \            salt_length=padding.PSS.MAX_LENGTH\n        ),\n        hashes.SHA256()\n\
    \    )\n\n    return signature\n```"
  merge: -1
  pgno: 130
- img_proc: true
  md: "```\ndef verify_signature(public_key_pem, message, signature):\n    # Deserialize\
    \ the public key from PEM format\n    public_key = serialization.load_pem_public_key(public_key_pem,\n\
    \                                                   backend=default_backend())\n\
    \n    try:\n        # Verify the signature\n        public_key.verify(\n     \
    \       signature,\n            message,\n            padding.PSS(\n         \
    \       mgf=padding.MGF1(hashes.SHA256()),\n                salt_length=padding.PSS.MAX_LENGTH\n\
    \            ),\n            hashes.SHA256()\n        )\n        print(\"Signature\
    \ is valid.\")\n        return True\n    except Exception as e:\n        print(f\"\
    Signature verification failed: {e}\")\n        return False\n\nif __name__ ==\
    \ \"__main__\":\n    # Example usage\n    private_key, public_key = generate_key_pair()\n\
    \n    # Message to be signed\n    message = b\"Hello, this is a signed message.\"\
    \n\n    # Sign the message\n    signature = sign_message(private_key, message)\n\
    \n    # Verify the signature\n    verify_signature(public_key, message, signature)\n\
    ```\n\nThis script generates an RSA key pair, signs a message with the private\
    \ key, and then verifies the signature using the corresponding public key. Note\
    \ that this is a basic example, and in real-world scenarios, you should handle\
    \ key storage and management securely."
