  md: "Firstly, you need to enable \"Less secure app access\" in your Gmail account\
    \ settings or generate an \"App Password\" if you have two-factor authentication\
    \ enabled.\n\n```\nimport smtplib\nfrom email.mime.multipart import MIMEMultipart\n\
    from email.mime.text import MIMEText\nfrom email.mime.base import MIMEBase\nfrom\
    \ email import encoders\n\ndef send_email(subject, body, to_email, attachment_path):\n\
    \    # Email configuration\n    smtp_server = 'smtp.gmail.com'\n    smtp_port\
    \ = 587\n    sender_email = 'your_email@gmail.com'\n    sender_password = 'your_password'\
    \  # Use App Password if two-factor authentication is enabled\n\n    # Create\
    \ message container\n    msg = MIMEMultipart()\n    msg['From'] = sender_email\n\
    \    msg['To'] = to_email\n    msg['Subject'] = subject\n\n    # Attach body as\
    \ plain text\n    msg.attach(MIMEText(body, 'plain'))\n\n    # Attach file\n \
    \   attachment = open(attachment_path, 'rb')\n    part = MIMEBase('application',\
    \ 'octet-stream')\n    part.set_payload(attachment.read())\n    encoders.encode_base64(part)\n\
    \    part.add_header('Content-Disposition', f'attachment; filename=\"{attachment_path}\"\
    ')\n    msg.attach(part)\n\n    # Connect to the SMTP server\n    with smtplib.SMTP(smtp_server,\
    \ smtp_port) as server:\n        server.starttls()\n        server.login(sender_email,\
    \ sender_password)\n\n        # Send email\n        server.sendmail(sender_email,\
    \ to_email, msg.as_string())\n\n    print(f\"Email sent successfully to {to_email}\"\
    )\n```"
