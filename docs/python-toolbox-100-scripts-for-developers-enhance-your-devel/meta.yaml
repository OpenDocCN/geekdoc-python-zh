    image_path = \"path/to/your/image.jpg\"\n\n# Call the function\nresult_text =\
    \ extract_text_from_image(image_path)\n\n# Print the extracted text\nprint(\"\
    Extracted Text:\")\nprint(result_text)\n```\n\n将`\"path/to/your/image.jpg\"`替换为你的图像的实际路径。\n\
