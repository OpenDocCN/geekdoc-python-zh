- md: "## Monitor website availability and response times\n\nTo monitor website availability\
    \ and response times with Python, you can use the `requests` library to send HTTP\
    \ requests and measure the time it takes to receive a response. Additionally,\
    \ you can schedule these checks at regular intervals using a library like `schedule`\
    \ to create a basic website monitoring script. Here's a simple example:\n\n```python\n\
    import requests\nimport schedule\nimport time\n\ndef check_website(url):\n   \
    \ try:\n        # Record the start time\n        start_time = time.time()\n\n\
    \        # Send a GET request to the website\n        response = requests.get(url)\n\
    \n        # Calculate the response time\n        response_time = time.time() -\
    \ start_time\n\n        # Print the results\n        print(f\"Website: {url}\"\
    )\n        print(f\"Status Code: {response.status_code}\")\n        print(f\"\
    Response Time: {response_time:.2f} seconds\")\n        print(\"\")\n\n    except\
    \ requests.exceptions.RequestException as e:\n        print(f\"Error: {e}\")\n\
    \        print(\"\")\n\ndef job():\n    # Replace 'https://example.com' with the\
    \ URL you want to monitor\n    website_url = 'https://example.com'\n\n    # Check\
    \ the website\n    check_website(website_url)\n\n# Schedule the job to run every\
    \ 5 minutes\nschedule.every(5).minutes.do(job)\n\nif __name__ == \"__main__\"\
    :\n    # Run the scheduled jobs\n    while True:\n        schedule.run_pending()\n\
    \        time.sleep(1)\n```\n\nThis script defines a `check_website` function\
    \ that sends a GET request to the specified URL using the `requests` library,\
    \ measures the response time, and prints the results. The `job` function is scheduled\
    \ to run every 5 minutes using the `schedule` library.\n\n## Retrieve and analyze\
    \ website headers\n\nTo retrieve and analyze website headers with Python, you\
    \ can use the requests library to send HTTP requests and inspect the response\
    \ headers. Additionally, you can use the http.client library for more detailed\
    \ analysis. Here's an example script:\n\n```python\nimport requests\nimport http.client\n\
    \ndef get_headers(url):\n    try:\n        # Send a HEAD request to retrieve headers\
    \ only\n        response = requests.head(url)\n\n        # Print the status code\n\
    \        print(f\"Status Code: {response.status_code}\")\n\n        # Print the\
    \ response headers\n        print(\"\\nResponse Headers:\")\n        for key,\
    \ value in response.headers.items():\n            print(f\"{key}: {value}\")\n\
    \n        # Analyze headers using http.client\n        analyze_headers(response.headers)\n\
    \n    except requests.exceptions.RequestException as e:\n        print(f\"Error:\
    \ {e}\")\n\ndef analyze_headers(headers):\n    # Extract and analyze specific\
    \ headers\n    server = headers.get('server', 'N/A')\n    content_type = headers.get('content-type',\
    \ 'N/A')\n\n    print(\"\\nAnalysis:\")\n    print(f\"Server: {server}\")\n  \
    \  print(f\"Content Type: {content_type}\")\n\nif __name__ == \"__main__\":\n\
    \    # Replace 'https://example.com' with the URL you want to analyze\n    url\
    \ = 'https://example.com'\n\n    # Retrieve and analyze headers\n    get_headers(url)\n\
    ```\n\nThis script defines a get_headers function that sends a HEAD request to\
    \ the specified URL using the requests library. It then prints the status code\
    \ and response headers. The analyze_headers function extracts and analyzes specific\
    \ headers, such as the server and content type.\n\n## Create a port scanner to\
    \ check for open ports\n\nTo create a basic port scanner in Python, you can use\
    \ the `socket` library to attempt connections to different ports on a target host.\
    \ Here's a simple example of a port scanner:\n\n```python\nimport socket\n\ndef\
    \ scan_ports(target_host, start_port, end_port):\n    print(f\"Scanning ports\
    \ on {target_host}...\\n\")\n\n    # Loop through the specified range of ports\n\
    \    for port in range(start_port, end_port + 1):\n        # Create a socket object\n\
    \        sock = socket.socket(socket.AF_INET, socket.SOCK_STREAM)\n        sock.settimeout(1)\
    \ # Set a timeout for the connection attempt\n\n        # Attempt to connect to\
    \ the target host and port\n        result = sock.connect_ex((target_host, port))\n\
    \n        # Check if the connection was successful\n        if result == 0:\n\
    \            print(f\"Port {port} is open\")\n        else:\n            print(f\"\
    Port {port} is closed\")\n\n        # Close the socket\n        sock.close()\n\
    \nif __name__ == \"__main__\":\n    # Replace 'example.com' with the target host\n\
    \    target_host = 'example.com'\n\n    # Specify the range of ports to scan (e.g.,\
    \ from 1 to 100)\n    start_port = 1\n    end_port = 100\n\n    # Perform the\
    \ port scan\n    scan_ports(target_host, start_port, end_port)\n```\n\nReplace\
    \ the `target_host` variable with the target host's IP address or domain name.\
    \ Specify the range of ports you want to scan by setting the `start_port` and\
    \ `end_port` variables.\n\nRun the script, and it will attempt to connect to each\
    \ port in the specified range. If the connection is successful, it will print\
    \ that the port is open; otherwise, it will indicate that the port is closed.\n\
    \nKeep in mind that scanning ports without permission is against the terms of\
    \ service of many networks, and unauthorized port scanning may be illegal. Always\
    \ ensure that you have the necessary permissions before scanning ports on a network.\n\
    \n## Automate interactions with web APIs\n\nTo automate interactions with web\
    \ APIs in Python, you can use the `requests` library. Below is a simple example\
    \ demonstrating how to make a GET request to an API and handle the JSON response:\n\
    \n```python\nimport requests\n\ndef fetch_data(api_url):\n    try:\n        #\
    \ Make a GET request to the API\n        response = requests.get(api_url)\n\n\
    \        # Check if the request was successful (status code 200)\n        if response.status_code\
    \ == 200:\n            # Parse the JSON response\n            data = response.json()\n\
    \            return data\n        else:\n            print(f\"Error: {response.status_code}\"\
    )\n    except Exception as e:\n        print(f\"An error occurred: {e}\")\n\n\
    if __name__ == \"__main__\":\n    # Replace 'https://api.example.com/data' with\
    \ the actual API URL\n    api_url = 'https://api.example.com/data'\n\n    # Fetch\
    \ data from the API\n    api_data = fetch_data(api_url)\n\n    if api_data:\n\
    \        # Process and use the retrieved data as needed\n        print(\"API Data:\"\
    )\n        print(api_data)\n```\n\nReplace the `api_url` variable with the actual\
    \ URL of the API you want to interact with. The `fetch_data` function sends a\
    \ GET request to the specified API URL, checks if the request was successful,\
    \ and then parses and returns the JSON data.\n\nNote: Some APIs may require authentication\
    \ or additional parameters in the request. In such cases, you may need to include\
    \ headers, API keys, or other authentication details in the request.\n\nMake sure\
    \ to read the API documentation to understand the required parameters and any\
    \ authentication mechanisms. Additionally, consider error handling and handling\
    \ rate limits as part of your script.\n\n## XI\n\n## Security\n\nSecurity scripts\
    \ are essential tools in the realm of cybersecurity, designed to automate and\
    \ enhance various aspects of digital defense. These scripts play a crucial role\
    \ in safeguarding computer systems, networks, and data by automating tasks such\
    \ as vulnerability scanning, penetration testing, log analysis, and intrusion\
    \ detection.\n\n## Encrypt and decrypt files\n\nTo encrypt and decrypt files in\
    \ Python, you can use the cryptography library, which provides a high-level interface\
    \ for various cryptographic operations. Below is an example of how you can encrypt\
    \ and decrypt a file using the Fernet symmetric key encryption scheme:\n\n```python\n\
    from cryptography.fernet import Fernet\n\ndef generate_key():\n    # Generate\
    \ a key for encryption\n    return Fernet.generate_key()\n\ndef write_key_to_file(key,\
    \ filename=\"secret.key\"):\n    # Write the key to a file\n    with open(filename,\
    \ \"wb\") as key_file:\n        key_file.write(key)\n\ndef load_key_from_file(filename=\"\
    secret.key\"):\n    # Load the key from a file\n    return open(filename, \"rb\"\
    ).read()\n\ndef encrypt_file(file_path, key):\n    # Encrypt the contents of a\
    \ file\n    cipher = Fernet(key)\n\n    with open(file_path, \"rb\") as file:\n\
    \        data = file.read()\n\n    encrypted_data = cipher.encrypt(data)\n\n \
    \   with open(file_path + \".encrypted\", \"wb\") as encrypted_file:\n       \
    \ encrypted_file.write(encrypted_data)\n\ndef decrypt_file(encrypted_file_path,\
    \ key):\n    # Decrypt the contents of an encrypted file\n    cipher = Fernet(key)\n\
    \n    with open(encrypted_file_path, \"rb\") as encrypted_file:\n        encrypted_data\
    \ = encrypted_file.read()\n\n    decrypted_data = cipher.decrypt(encrypted_data)\n\
    \n    with open(encrypted_file_path.rstrip(\".encrypted\"), \"wb\") as decrypted_file:\n\
    \        decrypted_file.write(decrypted_data)\n```"
