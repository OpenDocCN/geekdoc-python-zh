    \ (list): A list of grammar and spelling suggestions.\n    \"\"\"\n    tool =\
    \ language_tool_python.LanguageTool('en-US')\n    matches = tool.check(text)\n\
    \    return matches\n\ndef correct_text(text, matches):\n    \"\"\"\n    Correct\
