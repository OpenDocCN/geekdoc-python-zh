    corr_matrix = weather_df.corr()\nsns.heatmap(corr_matrix, annot=True, cmap='coolwarm')\n\
    plt.title('Correlation Matrix')\n\nplt.tight_layout()\nplt.show()\n```\n\n在此示例中，我使用了一个包含日期、温度、湿度和风速列的合成数据集。该脚本创建了不同类型的图表，如折线图、柱状图、散点图以及显示变量间相关性矩阵的热力图。\n\
