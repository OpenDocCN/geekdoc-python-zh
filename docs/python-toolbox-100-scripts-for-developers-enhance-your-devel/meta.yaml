  md: 'Training a model for image recognition involves several steps, and it often
    requires a large labeled dataset. In this example, I''ll use the popular deep
    learning framework TensorFlow and its high-level API, Keras. We''ll create a simple
    convolutional neural network (CNN) for image classification. For demonstration
    purposes, I''ll use the CIFAR-10 dataset, which consists of 60,000 32x32 color
    images in 10 different classes.


    ```

    pip install tensorflow

    ```


    ```

    import tensorflow as tf

    from tensorflow.keras import layers, models

    from tensorflow.keras.datasets import cifar10

    from tensorflow.keras.utils import to_categorical


    # Load and preprocess the CIFAR-10 dataset

    (train_images, train_labels), (test_images, test_labels) = cifar10.load_data()

    train_images, test_images = train_images / 255.0, test_images / 255.0 # Normalize
    pixel values to be between 0 and 1

    train_labels, test_labels = to_categorical(train_labels), to_categorical(test_labels)


    # Build the CNN model

    model = models.Sequential()

    model.add(layers.Conv2D(32, (3, 3), activation=''relu'', input_shape=(32, 32,
    3)))

    model.add(layers.MaxPooling2D((2, 2)))

    model.add(layers.Conv2D(64, (3, 3), activation=''relu''))

    model.add(layers.MaxPooling2D((2, 2)))

    model.add(layers.Conv2D(64, (3, 3), activation=''relu''))

    model.add(layers.Flatten())

    model.add(layers.Dense(64, activation=''relu''))

    model.add(layers.Dense(10, activation=''softmax''))


    # Compile the model

    model.compile(optimizer=''adam'', loss=''categorical_crossentropy'', metrics=[''accuracy''])


    # Train the model

    model.fit(train_images, train_labels, epochs=10, validation_data=(test_images,
    test_labels))


    # Evaluate the model

    test_loss, test_acc = model.evaluate(test_images, test_labels)

    print(f"Test accuracy: {test_acc}")

    ```'
