    Training a model for image recognition involves several steps, and it often requires
    a large labeled dataset. In this example, I''ll use the popular deep learning
    framework TensorFlow and its high-level API, Keras. We''ll create a simple convolutional
    neural network (CNN) for image classification. For demonstration purposes, I''ll
