  - "[PAGE 153]\n\nWe can use the nltk library for natural language processing and\
    \ the re library for regular expressions. For simplicity, we'll create a rule-based\
    \ chatbot that responds to a few predefined patterns.\n\n```\npip install nltk\n\
    ```\n\n```\nimport nltk\nimport re\nimport random\n\n# Download NLTK data (if\
    \ not already downloaded)\nnltk.download('punkt')\n\nclass SimpleChatbot:\n  \
    \  def __init__(self):\n        self.responses = {\n            r'hello|hi|hey':\
    \ ['Hello!', 'Hi there!', 'Hey!'],\n            r'how are you': ['I'm doing well,\
    \ thank you!', 'I'm just a computer program, but I'm fine. How about you?'],\n\
    \            r'what is your name': ['I am a simple chatbot.', 'You can call me\
    \ Chatbot.'],\n            r'bye|goodbye': ['Goodbye!', 'See you later!', 'Bye!']\n\
    \        }\n\n    def respond(self, user_input):\n        for pattern, responses\
    \ in self.responses.items():\n            if re.search(pattern, user_input, re.IGNORECASE):\n\
    \                return random.choice(responses)\n        return \"I'm sorry,\
    \ I don't understand that.\"\n\n# Main loop\nchatbot = SimpleChatbot()\n\nprint(\"\
    Simple Chatbot: Hello! Type 'bye' to exit.\")\nwhile True:\n    user_input = input(\"\
    You: \")\n    if user_input.lower() == 'bye':\n        print(\"Simple Chatbot:\
    \ Goodbye!\")\n        break\n    response = chatbot.respond(user_input)\n   \
    \ print(f\"Simple Chatbot: {response}\")\n```"
