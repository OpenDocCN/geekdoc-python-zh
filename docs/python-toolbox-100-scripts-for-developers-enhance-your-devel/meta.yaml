    \ = string.ascii_uppercase\n    digits = string.digits\n    special_characters\
    \ = string.punctuation\n\n    # Combine character sets\n    all_characters = lowercase_letters\
    \ + uppercase_letters + digits + special_characters\n\n    # Ensure at least one\
