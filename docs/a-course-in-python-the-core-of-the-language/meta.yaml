  mdcn: "## 3.3.3 While 循环\n\nWhile 循环提供了另一种重复执行代码块的方式。这次代码块将被重复执行，直到满足某个条件，即一个布尔表达式变为\
    \ True。while 循环的形式如下：\n\n```\nwhile cond:\n    block\n```\n\n我们从以下示例开始。考虑 $n =\
    \ 123$；当 $n$ 不能被 7 整除时，在 $n$ 的右侧追加数字 1。注意，我们一开始并不知道需要在给定数字的右侧添加多少个 1，直到它能被 7 整除。\n\
    \n```\nn = 123\nwhile n % 7 != 0:\n    n = n*10 + 1\nprint(n)\n```\n\n[79]: 1231111\n\
    \n`n%7 !=0` 是我们的布尔语句（条件）。当 `n%7 !=0` 返回 True 时，while 循环会重复执行属于它的代码块（通过缩进指定）。这里\
    \ `n=10n+1` 是我们想要重复的代码块。代码 `n=10n+1` 只是将数字 $n$ 取出，并在该数字的最右边放置一个 1（对吧？）。因此，目标是在原始\
    \ $n$（这里是 123）的右侧放置尽可能多的 1，以得到一个能被 7 整除的数字。While 循环正是这样做的。它将重复执行上述代码，直到 `n%7 !=0`\
    \ 变为 False。也就是说，直到 $n$ 能被 7 整除。而这正是我们所寻找的。\n\n**练习 3.22** *找出最小的正整数 $m$，使得 $529^3\
    \ + 132^3 m$ 能被 262417 整除。*\n\n*解答*\n\n```\nm = 1\nwhile (529**3 + (132**3)*m)\
    \ % 262417 !=0:\n    m += 1\nm\n```\n\n[80]: 1984\n\n我们从 $m=1$ 开始，当 $529^3+(132^3)*m$\
    \ 除以 262417 的余数不为零时，用 Python 的术语来说，当 `(529**3+(132**3)*m) % 262417 !=0:` 时，我们将\
    \ $m$ 加一，即 `m += 1`，并重复此过程，直到余数为零。那么这就是我们正在寻找的 $m$。\n\n**练习 3.23** *找出最小的 99999\
    \ 的倍数，其各位数字中不包含数字 9。*\n\n*解答*\n\n回想一下，在字符串中我们可以检查一个元素是否属于它（类似于列表）。因此，我们将数字转换为字符串，并检查数字\
    \ 9 是否属于它。\n\n```\nn = 99999\ni = 1\nwhile '9' in str(n):\n    i += 1\n    n =\
    \ 99999 * i\nprint(f'the {i}th multiple of 99999 is {n} which has no digit 9')\n\
    ```\n\n[81]: the 11112th multiple of 99999 is 1111188888 which has no digit 9\n\
    \n请注意，正确把握代码的流程很重要，如果我们交换 while 循环代码块中的两行，答案就不正确了。\n\n```\nn = 99999\ni = 1\n\
    while \"9\" in str(n):\n    n = 99999 * i\n    i += 1\nprint(i, \" \", n)\n```\n\
    \n[82]: 11113 1111188888\n\n虽然标准库 `math` 提供了函数 `gcd` 来计算最大公约数，但这里我们尝试编写一种高效的方法来计算两个给定数字的最大公约数。让我们从一个朴素的方法开始：\n\
    \n```\nn = 36; m = 16;\nif n > m:\n    small = m\nelse:\n    small = n\nfor i\
    \ in range(1, small + 1):\n    if (n % i == 0) and (m % i == 0):\n        gcd\
    \ = i\ngcd\n```\n\n[83]: 4\n\n代码从 *i* = 1 开始，如果 *i* 能同时整除 *n* 和 *m*，它就会被收集到变量\
    \ `gcd` 中。然后我们增加 *i* 并再次测试。循环让 *i* 从 1 运行到较小的数字 *n* 或 *m*，最终它会给我们 `gcd`。我们可以通过从较小的数字开始\
    \ *i* 并递减其值来改进代码，每次检查 *i* 是否能同时整除 *n* 和 *m*。一旦满足条件，我们就通过 `break` 停止循环并打印这个值，这个值就是\
    \ *n* 和 *m* 的最大公约数。\n\n```\nn = 36; m = 16;\nif n > m:\n    small = m\nelse:\n\
    \    small = n\nfor i in range(small, 1, -1):\n    if (n % i == 0) and (m % i\
    \ == 0):\n        gcd = i\n        break\ngcd\n```\n\n[84]: 4\n\n我们可以使用优雅的欧几里得算法，该算法指出，对于整数\
    \ $n$ 和 $m$，如果 $n = mq + r$，其中 $q, r \\in \\mathbb{Z}$，那么 $\\gcd(n, m) = \\gcd(m,\
