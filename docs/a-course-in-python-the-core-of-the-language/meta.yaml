    # 4.2.1 Selecting from a collection


    So far we have been able to create a collection of objects, and apply a function
    to each of the objects. The next step is to be able to choose, from a collection
    of objects, certain objects which fit a specific description. This can be achieved
    by using the command `filter`, as the following example demonstrates.


    How many numbers of the form $3n^5 + 11$, when $n$ varies from 1 to 500, are prime?


    We define the anonymous function `lambda n : 3 * n**5 + 11` and map it to the
    list of the first 500 positive integers.


    ```

    s = map(lambda n : 3 * n**5 + 11, range(1, 501))

