  md: '# 2.5 Tuples


    tuple, similar to list, is designed to handle data. tuple behaves very much like
    list. The main difference is that one can modify an exiting list, i.e., they are
    *mutable objects*, whereas once a tuple is defined, one cannot modify it, i.e.,
    they are *unmutable objects*.


    The examples below show how one can define and handle tuples.


    ```

    t = (1, 2 , ''new'', 1.5)

    ```


    Note that for a list the objects are gathered together with brackets [ ], whereas
    for a tuple, one uses curly brackets (). But accessing the objects within tuples
    is exactly like lists.


    ```

    t[2]

    ```


    ''new''


    ```

    t[ : 3]

    ```


    (1, 2, ''new'')


    ```

    t[ : : -2]

    ```


    (1.5, 2)


    The following example demonstrates what we mean when we say list is mutable whereas
    tuple is immutable.


    ```

    s = [1, 2, 3]

    ```


    ```

    t = (1, 2, 3)

    ```


    ```

    type(s)

    ```


    list


    ```

    type(t)

    ```


    tuple


    ```

    s[1] = ''new data''

    ```


    ```

    s

    ```'
