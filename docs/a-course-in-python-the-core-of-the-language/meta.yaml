    \ 12, 13, 14, 15, 16]\n```\n\n## 7.1.4 使用数组进行向量微积分\n\nnumpy 拥有进行线性代数运算的“所有”工具，例如行列式、特征值、特征向量等等。\n\
    \n之前我们使用列表时提出的一个问题是：给定 **x** = {x₁, x₂, ⋯, xₙ} 和 **y** = {y₁, y₂, ⋯, yₙ}，如何生成\
