    \ + 41$ upon dividing by 7 for $0 \\le n < 100$.*\n\n*Solution*\n\nWe will use\
    \ a **set** to collect the remainders as we are only interested in the actual\
    \ remainders and not how many of them we obtain when dividing $n^2 + 41$ by 7.\n\
    \n```\n[57]: A = set()\nfor n in range(100):\n    A = A | {(n**2 + n + 41) % 7}\n\
    print(A)\n```\n\n[57]: {1, 4, 5, 6}\n\nRecall the shorthand a #= b, which is equivalent\
    \ to a = a # b.\n\n```\n[58]: A = set()\nfor n in range(100):\n    A |= {(n**2\
    \ + n + 41) % 7}\nprint(A)\n```\n\n[58]: {1, 4, 5, 6}\n\n```\n[59]: A = set()\n\
    for n in range(100):\n    A = A.union({(n**2 + n + 41) % 7})\nprint(A)\n```\n\n\
    [59]: {1, 4, 5, 6}\n\nRecall the list comprehension approach to programming. We\
    \ can use “set comprehension” to do the job."
