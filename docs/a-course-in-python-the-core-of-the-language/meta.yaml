    ![](img/fbc0c32b1e2a040146ee86ae9f103987_217_0.png)


    **Exercise 8.1** Plot the graph of $f(x) = \frac{\sin(x)}{\cos(x)}$, for $0 \le
    x \le 10\pi$.


    *Solution*

    The universal function facility of numpy allows us to treat an array as single
    data. We first define an array $x = (x_1, x_2, \cdots, x_n)$, then when using
    numpy''s sin and cos, the expression $y = \sin(x)/\cos(x)$ gives

    $$y = \left( \frac{\sin(x_1)}{\cos(x_1)}, \frac{\sin(x_2)}{\cos(x_2)}, \cdots,
    \frac{\sin(x_n)}{\cos(x_n)} \right).$$

    We can then simply pass $y$ into the plot command.


    ```

    python

    x = np.arange(0.01, 10*np.pi, 0.1)

    y = np.sin(x)/np.cos(x)


    plt.plot(x, y);

    ```


    ![](img/fbc0c32b1e2a040146ee86ae9f103987_217_1.png)


    matplotlib allows us to plot several equations at the same time. For this one
    introduces the equations into plot by using a list containing all the equations.

    As an example we plot the graphs of the functions $\sin(\frac{1}{x^2-x})$ and
    $\cos(\frac{1}{x^2-x})$ in the range $[0, \pi]$.


    ```

    python

    x = np.arange(np.pi/4, np.pi, 0.005)


    y = np.sin(1/(x**2 - x))

    z = np.cos(1/(x**2 - x))


    plt.plot(x, y, x, z);

    ```'
