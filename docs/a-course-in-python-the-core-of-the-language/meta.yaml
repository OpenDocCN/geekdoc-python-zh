- md: "## 3.3.3 While Loops\n\nWhile loops provide another way to repeat a block of\
    \ code. This time the block is going to be repeated until a certain condition\
    \ is satisfied, i.e., a boolean expression becomes True. The while-loop has the\
    \ form\n\n```\nwhile cond:\n    block\n```\n\nWe start with the following example.\
    \ Consider $n = 123$; while n is not divisible by 7, append the digit 1 to the\
    \ right of $n$. Note that we don't know from the outset how many 1s we need to\
    \ add to the right-hand side of the given number until it becomes divisible by\
    \ 7.\n\n```\nn = 123\nwhile n % 7 != 0:\n    n = n*10 + 1\nprint(n)\n```\n\n[79]:\
    \ 1231111\n\nn%7 !=0 is our Boolean statement (condition). The while-loop repeats\
    \ the block belongs to it (specified via spacing) while n%7 !=0 returns True.\
    \ Here n=10n+1 is the block of code we want to repeat. The code n=10n+1 simply\
    \ takes the number n and places 1 at the far right of the number (right?). So\
    \ the aim is to put as many 1s to the right of the original n, which is 123 here,\
    \ to get a number divisible by 7. The While loop does exactly this. It is going\
    \ to repeat the above code until n%7 !=0 becomes False. That is, until n becomes\
    \ divisible by 7. And this is what we were looking for.\n\n**Exercise 3.22** *Find\
    \ the smallest positive integer m such that 529³+132³m is divisible by 262417.*\n\
    \n*Solution*\n\n```\nm = 1\nwhile (529**3 + (132**3)*m) % 262417 !=0:\n    m +=\
    \ 1\nm\n```\n\n[80]: 1984\n\nWe start with m=1 and while the remainder on division\
    \ of 529**3+(132**3)*m by 262417 is not zero, in Python terms, while (529**3+(132**3)*m)\
    \ % 262417 !=0: we add one to m, i.e., m += 1, and repeat this until the remainder\
    \ is zero. Then this is the m we are looking for.\n\n**Exercise 3.23** *Find the\
    \ smallest multiple of 99999 that contains no 9s amongst its digits.*\n\n*Solution*\n\
    \nRecall that within a string we could check if an element belongs to it (similar\
    \ to lists). So we convert the number into a string and check whether the digit\
    \ 9 belongs to it.\n\n```\nn = 99999\ni = 1\nwhile '9' in str(n):\n    i += 1\n\
    \    n = 99999 * i\nprint(f'the {i}th multiple of 99999 is {n} which has no digit\
    \ 9')\n```\n\n[81]: the 11112th multiple of 99999 is 1111188888 which has no digit\
    \ 9\n\nNote that it is important to get the flow of the code right, if we swap\
    \ the two lines in the block of the while-loop the answer is not correct.\n\n\
    ```\nn = 99999\ni = 1\nwhile \"9\" in str(n):\n    n = 99999 * i\n    i += 1\n\
    print(i, \" \", n)\n```\n\n[82]: 11113 1111188888\n\nAlthough the library math\
    \ provides the function gcd to calculate the greatest common divisor, here we\
    \ try to write an efficient way to compute the gcd of two given numbers. Let us\
    \ start with a naive approach:\n\n```\nn = 36; m = 16;\nif n > m:\n    small =\
    \ m\nelse:\n    small = n\nfor i in range(1, small + 1):\n    if (n % i == 0)\
    \ and (m % i == 0):\n        gcd = i\ngcd\n```\n\n[83]: 4\n\nThe code starts with\
    \ *i* = 1 and if *i* divides both *n* and *m*, it would be collected into the\
    \ variable gcd. We then increase *i* and test again. The loop runs *i* from 1\
    \ up to the smaller number *n* or *m*, and eventually it gives us gcd. We could\
    \ improve the code by starting *i* from the smaller number and decreasing its\
    \ value, checking each time if *i* divides both *n* and *m*. As soon as this happens,\
    \ we stop the loop via break and print this value, which would be the greatest\
    \ common divisor of *n* and *m*.\n\n```\nn = 36; m = 16;\nif n > m:\n    small\
    \ = m\nelse:\n    small = n\nfor i in range(small, 1, -1):\n    if (n % i == 0)\
    \ and (m % i == 0):\n        gcd = i\n        break\ngcd\n```\n\n[84]: 4\n\nWe\
    \ can use the elegant Euclidean algorithm, which says that if for integers $n$\
    \ and $m$ we have $n = mq + r$, where $q, r \\in \\mathbb{Z}$, then $\\gcd(n,\
    \ m) = \\gcd(m, r)$. Using this fact we can write:\n\n```\nn = 36; m = 16\nwhile\
    \ m != 0:\n    n, m = m, n % m\nprint(n)\n```\n\n[85]: 4\n\n```\nn = 2334426;\
    \ m = 3336\nwhile m != 0:\n    n, m = m, n % m\nn == math.gcd(2334426, 3336)\n\
    ```\n\n[86]: True\n\n**Exercise 3.24** *Write a code to get a number and create\
    \ a list of its digits. Modify the code to give the list of digits in any given\
    \ base.*\n\n*Solution*\n\nRecall that for any $n \\in \\mathbb{N}$, and any $1\
    \ \\leq b \\leq 10$, one can write\n\n$$n = \\sum r_i b^i$$\n\nwhere $0 \\leq\
    \ r_i < b$ are all unique. As an example\n\n$$1234 = 2 \\times 4^0 + 0 \\times\
    \ 4^1 + 1 \\times 4^2 + 3 \\times 4^2 + 0 \\times 4^3 + 1 \\times 4^4.$$\n\nThen\
    \ we say the number 1234 can be written as 103102 in base 4. If we choose $b$\
    \ to be 10, then we retrieve all the digits of the number.\n\nThe code is easy\
