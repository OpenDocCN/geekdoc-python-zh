  md: "# 5.2 Sets and Dictionaries\n\nOne way to build a dictionary from two lists\
    \ is to use the method zip. If $x = (x_1, x_2, \\dots, x_n)$ and $y = (y_1, y_2,\
    \ \\dots, y_n)$, then zip(x, y) will pair elements of $x$ and $y$.\n\n```\nx =\
    \ ('a', 'b', 'c')\ny = (1, 2, 3)\n```\n\n```\nlist(zip(x, y))\n```\n\n[107]: [('a',\
    \ 1), ('b', 2), ('c', 3)]\n\nNow we can build a dictionary. Here are three different\
    \ ways to do this:\n\n```\nL={}\nfor key, value in zip(x,y):\n    L[key] = value\n\
    \nL\n```\n\n[108]: {'a': 1, 'b': 2, 'c': 3}\n\n```\n{key: value for key, value\
    \ in zip(x,y)}\n```\n\n[109]: {'a': 1, 'b': 2, 'c': 3}\n\nThe easiest way is to\
    \ use dict\n\n```\nL = dict(zip(x, y))\nL\n```\n\n[110]: {'a': 1, 'b': 2, 'c':\
    \ 3}\n\nOftentimes we need to return a certain value if the key we are looking\
    \ for is not in the list. In this case we can use get with a default value.\n\n\
    ```\nL\n```\n\n[111]: {'a': 1, 'b': 2, 'c': 3}\n\n```\nL['b']\n```\n\n[112]: 2\n\
    \nThe input L['z'] would generate an error.\n\n```\nL.get('b')\n```"
