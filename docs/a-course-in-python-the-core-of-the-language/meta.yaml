    One crucial difference in Python that we need to understand at this early stage
    is that the variables are pointers. In other languages the command `x = 2` creates
    a cell or (an object) labelled `x` and `2` is stored in that cell, whereas in
    Python there is an integer object `2` and `x` is a pointer, pointing to that object.
    There is no immediate harm if we just think of `x` as a variable that `2` is assigned
    to, but in the background we have to be aware of the Python philosophy.


    ```python

    x = y = z = 10

    ```


    The way we should understand this line is that we have created three pointers
    all pointing to the integer object `10`. We could change one of the pointers,
    pointing to a different object without changing the direction of the other two
    pointers.


    ```python

    z = 12

    ```


    We print the values of these variables. Note that the command `\n` in `print`
    breaks the line as the result shows.


    ```python

    print(''x is pointing to'', x, ''\ny is pointing to'', y, ''\nz is pointing to'',
    z)

    ```


    ```

