    If a number of the form $2^n - 1$ happens to be prime, it is called a *Mersenne
    prime*. Recall that a *prime number* is a number greater than 1 which is divisible
    only by 1 and itself. It is easy to see that $2^2 - 1$, $2^3 - 1$ and $2^5 - 1$
    are Mersenne primes. The list continues. In 1963, Gillies found that the above
    number, $2^{9941} - 1$, is a Mersenne prime. With my laptop it takes less than
    1 second for Python to check that this is indeed a prime number. The largest Mersenne
    prime found so far is $2^{82,589,933} - 1$, having 24,862,048 digits, which was
    discovered in January 2018.


    Within integer arithmetic, there are division and remainder operations that Python
    can handle with `//` and `%`. It is a fact that for two non-zero integers $n$
    and $m$ one can write $n = mq + r$, where $q$ and $r$ are unique integers with
    $0 \le r < q$. In Python we get `n//m=q` and `n % m =r`. We check this with $n
    = 13$ and $m = 4$ below. Note the use of the function `print` in the example below.'
