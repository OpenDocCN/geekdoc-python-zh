    list(l);\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_115_0.png)\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_115_1.png)\n\
    \n![](img/fbc0c32b1e2a040146ee86ae9f103987_115_2.png)\n\nWe will discuss in depth\
    \ the concepts of iterators and generators in Python in Chapter 5. Here we only\
    \ mention that, when we use map to apply a function, say, f, to a list or any\
    \ ordered set, Python actually does not immediately apply f to all the elements\
    \ of the set. Each time we prompt the map statement, it will apply the function\
    \ $f$ to the set in order. Of course by invoking `list` we can obtain the entire\
    \ action, as we have done so far (see Problem 14).\n\n### 4.2.1 Selecting from\
    \ a collection\n\nSo far we have been able to create a collection of objects,\
    \ and apply a function to each of the objects. The next step is to be able to\
    \ choose, from a collection of objects, certain objects which fit a specific description.\
    \ This can be achieved by using the command `filter`, as the following example\
    \ demonstrates.\n\nHow many numbers of the form $3n^5 + 11$, when $n$ varies from\
