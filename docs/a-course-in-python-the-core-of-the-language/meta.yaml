  md: '# Chapter 8

    The matplotlib Library and Projects


    # 8.1 matplotlib, Plotting Data


    In this chapter we will look more closely at the Python graphics library matplotlib,
    which is widely used for plotting data and creating professional and magnificent
    two-dimensional graphics. This library works perfectly with numpy. With numpy
    we handle the data and with matplotlib we visualise them.


    ```

    import matplotlib.pyplot as plt

    ```


    Let us remind ourselves of the most basic way we can use the library.


    ```

    plt.plot([1, 2, 2.5, 4], [10, 12, -2, 1]);

    ```


    ![](img/fbc0c32b1e2a040146ee86ae9f103987_215_0.png)


    As the example shows, in order to plot a graph, we specify the x-coordinates and
    then the y-coordinates. If $x = (x_1, x_2, \cdots, x_n)$ and $y = (y_1, y_2, \cdots,
    y_n)$, then plt.plot(x,y) will produce a graph determined by the pairs $(x_i,
    y_i), 1 \le i \le n$.


    We can introduce styles and formatting to our graphs. Here is just one example.
    The option b. displays small blue filled circles and r^ displays solid red triangles
    pointing upward.'
