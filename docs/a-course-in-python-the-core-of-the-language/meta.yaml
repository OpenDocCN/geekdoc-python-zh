    \ z)\n```\n\n[47]: $\\sqrt{x_1 + \\sqrt{x_2 + \\sqrt{x_3}}}$\n\n那么我们就能得到正确的输出。这清楚地表明，我们必须从序列的右侧开始循环，而不是左侧。我们已经知道如何反转列表或元组。\n\
