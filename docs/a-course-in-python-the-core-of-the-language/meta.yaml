    # 7.1.4 Vector calculus with arrays


    numpy has “all” the tools available for doing linear algebra, such as determinant,
    eigenvalues, eigenvectors and many more.


    One of the questions asked earlier when we were working with lists was the following:
    Given **x** = {x₁, x₂, ⋯, xₙ} and **y** = {y₁, y₂, ⋯, yₙ}, how can one produce
    {x₁ + y₁, x₂ + y₂, ⋯, xₙ + yₙ}?


    One approach is to consider lists as np.array **x** = array([x1, x2, ..., xn])
    and **y** = array([y1, y2, ..., yn]), then the sum of vectors **x** + **y** is
    what we want. Then, as you might also guess, **x** * **y** would produce array([x1
    y1, x2 y2, ...,xn yn]), i.e., all arithmetical operations performed on array are
    component-wise.


    However, there is another product in the setting of vectors, namely the *inner
    product*, which is defined as **x**.**y** = x₁y₁ + x₂y₂ + ⋯ + xₙyₙ.


    The following shows how numpy handles these different operations.


    ```

    [83]: x = np.arange(2, 7); y = np.arange(7, 2, -1)

    ```


    ```

    [84]: print('''', x, ''\n'', y)

    ```


    [84]: [2 3 4 5 6]

    [7 6 5 4 3]


    ```

    [85]: x + y

    ```


    [85]: array([9, 9, 9, 9, 9])


    ```

    [86]: x * y

    ```


    [86]: array([14, 18, 20, 20, 18])'
