    ## 1.5 Variables in Python


    In order to feed data into a computer program one needs to define variables to
    be able to assign data to them. Python''s methodology in assigning data to variables
    is slightly different than in other languages. We start with the simplest assignment
    of a number to a variable.


    ```python

    x = 2

    ```


