  md: '# Chapter 7

    The numpy Library


    # 7.1 numpy, Numerical Python


    In this chapter we will look at one of the most powerful and most used libraries
    of Python, that is, numpy, which is used working with data. The library numpy
    allows us to handle large lists of values; here a list is called an array. It
    provides a powerful way to do arithmetic on arrays. We can use arrays to handle
    large collections of inputs, and to handle matrices and thus linear algebra, one
    of the branches of mathematics that has become vital in all aspects of computer
    science.


    As is customary, we import numpy as the alias np.


    ```

    [1]: import numpy as np

    ```


    Next, we introduce the arrays in numpy.


    ```

    [2]: x = np.array([1, -2, 3.5])

    ```


    ```

    [3]: x

    ```


    ```

    [3]: array([ 1. , -2. , 3.5])

    ```


    ```

    [4]: list(x)

    ```


    ```

    [4]: [1.0, -2.0, 3.5]

    ```


    Notice how we can convert sequences and lists into an array.


    ```

    [5]: y = np.array(range(1, 18, 2))

    ```


    ```

    [6]: y

    ```'
