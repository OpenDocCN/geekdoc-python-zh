    # 2.2 Lists as Objects


    Recall that everything in Python is an object, which comes with its own tools
    (i.e., methods). With this view, lists are objects which we can change, the so-called
    *mutable* objects. The objects that cannot be changed are called *immutable*.
    We have already seen one object that, once created, cannot be modified, namely
    the object integers.


