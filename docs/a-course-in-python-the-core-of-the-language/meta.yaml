    ```\n\naya\n\n# 3.3 Loops and Repetitions\n\n# 3.3.1 For-loop\n\nA primary ability\
    \ that a computer language provides is the ability to repeat a certain code ‘fast’.\
    \ Python provides three kind of *loops* that enable us to repeat part of our codes.\
    \ These are quite similar to the loops that exist in any procedural language like\
    \ Fortran or C. We will introduce **for** and **while** loops and study nested\
    \ loops, that is, loops defined inside each other. We finish the chapter by looking\
