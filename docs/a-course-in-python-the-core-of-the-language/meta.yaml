    # 5.2.2 Dictionaries


    Dictionaries are another way to collect and organise data. They come in pairs,
    a key and values associated to the key. Both keys and values are objects. However
    keys are unmutable objects whereas values can be mutable. We start by defining
    a dictionary which consists of four keys, A, B, C, D and the values associated
    to them. The example shows how to access the values and how to add more data to
    the dictionary.


    ```

    [87]: score = {''A'': 100, ''B'': 70, ''C'': 50, ''F'': 0 }

    ```


