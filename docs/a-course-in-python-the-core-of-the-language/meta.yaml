    [9]: $$\frac{81x^5}{4x^2 - 4xy + y^2} - \frac{567x^4y}{4x^2 - 4xy + y^2} + \frac{1296x^3y^2}{4x^2
    - 4xy + y^2} - \frac{648x^2y^3}{4x^2 - 4xy + y^2} - \frac{1296xy^4}{4x^2 - 4xy
    + y^2} + \frac{1296y^5}{4x^2 - 4xy + y^2}$$


    The method `factor` can do the inverse of `expand`, namely factorise an expression.


    ```

    [10]: factor(x**3 - y**3)

    ```


    [10]: $(x - y)(x^2 + xy + y^2)$


    While expansion of an algebraic expression is a simple and routine procedure,
    the factorisation of algebraic expressions is often quite challenging. My favourite
    example is this one: Try to factorise the expression $x^{10} + x^5 + 1$. Here
    is one way to do it:


    $$x^{10} + x^5 + 1 \quad (\text{adding } x^i - x^i, 1 \le i \le 9, \text{ to the
    expression we have})$$

    $$= x^{10} + \underbrace{x^9 - x^9}_{\text{}} + \underbrace{x^8 - x^8}_{\text{}}
    + \cdots + \underbrace{x^6 - x^6}_{\text{}} +$$

    $$+ \underbrace{x^5 - x^5}_{\text{}} + x^5 + \underbrace{x^4 - x^4}_{\text{}}
    + \cdots + \underbrace{x - x}_{\text{}} + 1 \quad (\text{now rearranging the terms})$$

    $$= x^{10} + x^9 + x^8 - x^9 - x^8 - x^7 + x^7 + x^6 + x^5 - x^6 - x^5 - x^4$$

    $$+ x^5 + x^4 + x^3 - x^3 - x^2 - x + x^2 + x + 1$$'
