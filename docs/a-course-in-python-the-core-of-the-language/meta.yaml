    \ 2 和 3，我们可以使用 while 循环，不断将 *k* 除以 2，直到结果不再能被 2 整除。接下来，我们得到结果并开始将其除以 3，直到结果不再能被\
    \ 3 整除。如果结果最终被简化为 1，则意味着原始数字必须具有 *k* = 2^m 3^n 的形式。\n\n```\nk = l = 16 * 3 * 2\
