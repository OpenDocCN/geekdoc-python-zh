    \n*求这些方程的唯一解。*\n\n## 解答\n\n用矩阵语言表示这个方程组，指向了一种使用矩阵微积分求解方程的自然方法。写作\n\n$$\\begin{pmatrix}\
    \ 3 & 2 \\\\ 10 & -1 \\end{pmatrix} \\begin{pmatrix} x \\\\ y \\end{pmatrix} =\
    \ \\begin{pmatrix} 3 \\\\ 5 \\end{pmatrix}$$\n\n那么显然\n\n$$\\begin{pmatrix} x \\\
    \\ y \\end{pmatrix} = \\begin{pmatrix} 3 & 2 \\\\ 10 & -1 \\end{pmatrix}^{-1}\
    \ \\begin{pmatrix} 3 \\\\ 5 \\end{pmatrix}.$$\n\n现在我们使用 numpy 来计算矩阵的逆并得到结果。\n\n\
    ```python\nimport numpy as np\n\nA = np.array([[3, 2], [10, -1]])\nB = np.array([3,\
    \ 5])\n```\n\nnumpy 库提供了一种计算非奇异矩阵逆的方法。\n\n```python\ninv_A = np.linalg.inv(A)\n\
    print(inv_A)\n```\n\n```\n[[ 0.04347826  0.08695652]\n [ 0.43478261 -0.13043478]]\n\
    ```\n\n因此，这个方程组的解是：\n\n```python\nprint(np.dot(inv_A, B))\n```\n\n```\n[0.56521739\
    \ 0.65217391]\n```\n\n或者我们可以使用矩阵对象的 dot 方法，在一行中完成所有这些操作：\n\n```python\nnp.linalg.inv(A).dot(B)\n\
    ```\n\n```\narray([0.56521739, 0.65217391])\n```\n\n实际上，numpy 也提供了一种直接求解方程组的方法。\n\
    \n```python\nnp.linalg.solve(A,B)\n```\n\n```\narray([0.56521739, 0.65217391])\n\
    ```\n\n借助第 6 章的 sympy 图形功能，我们绘制直线 3x + 2y = 3 和 10x - y = 5，并观察到它们确实相交于一点。\n\n\
    ```python\nfrom sympy import symbols, Eq\nfrom sympy import plot_implicit\n\n\
    x, y = symbols('x y')\n\np1 = plot_implicit(Eq(3 * x + 2 * y, 3), (x, -2, 2),\
    \ (y, -2, 2), line_color='blue', show=False);\np2 = plot_implicit(Eq(10 * x -\
    \ y, 5), (x, -2, 2), (y, -2, 2), line_color='green', show=False);\np1.append(p2[0])\n\
    p1.show()\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_202_0.png)\n\n有一点需要说明。我们确实将一个\
    \ 2 × 2 矩阵 A 与一个 2 × 1 矩阵 B 相乘了。因此，我们本应将 B 定义为 B = np.array([[3], [5]])。然而，我们只是简单地定义了\
    \ B = np.array([3, 5])，而 numpy 将其视为一个列向量，因此乘法是有效的。\n\n## 练习 7.3 考虑方程组\n\n$$\\\
    begin{cases} 3x + 2y - 4z = 2 \\\\ 3x + 2y - (4 + R)z = \\frac{1}{2} \\\\ 3x +\
    \ (2 + S)y - 4z = 3. \\end{cases}$$\n\n首先，当 R = 0.05 和 S = −0.05 时，求此方程组的唯一解。接下来，探索如果\
    \ R 和 S 发生变化，解会如何表现，以及新解与初始解的距离会有多大。\n\n## 解答\n\n这个有趣的问题由 Shiskowski 和 Frinkle\
    \ 在他们的著作《*Principles of Linear Algebra with Mathematica*》（Wiley & Sons, 2011）中进行了研究（例\
    \ 3.3.5）。\n\n我们首先定义系数矩阵和值矩阵，以便使用 numpy 的线性系统求解方法。\n\n```python\nimport numpy as\
    \ np\n\ndef sys(r,s):\n    A = np.array([[3, 2, -4], [3, 2, -4 - r], [3, 2 + s,\
    \ -4]])\n    return A\n\np = np.array([2, 1/2, 3])\n\nsys(0.05, -0.05)\n```\n\n\
    ```\narray([[ 3.  ,  2.  , -4.  ],\n       [ 3.  ,  2.  , -4.05],\n       [ 3.\
    \  ,  1.95, -4.  ]])\n```\n\n```python\ninit_sol = np.linalg.solve(sys(0.05, -0.05),\
    \ p)\n\ninit_sol\n```\n\n```\narray([ 54., -20., 30.])\n```\n\n如果我们稍微改变 $s$，解会发生显著变化。\n\
    \n```python\nnp.linalg.solve(sys(0.01, -0.1), p)\n```\n\n```\narray([207.33333333,\
    \ -10., 150. ])\n```\n\n下图解释了为什么这个方程组对 $R$ 和 $S$ 的变化如此敏感。这些平面几乎是平行的，因此 $R$ 或 $S$\
    \ 的微小变化会使平面的交点发生很大偏移。\n\n```python\nfrom sympy.plotting import plot3d\nfrom sympy\
    \ import symbols\n\ndef p1(x, y):\n    return (3 * x + 2 * y - 2) / 4\n\ndef p2(x,\
    \ y, r):\n    return (3 * x + 2 * y - 1/2) / (4 + r)\n\ndef p3(x, y, s):\n   \
    \ return (3 * x + (2 + s) * y - 3) / 4\n\nx, y = symbols('x y')\n\nplot3d(p1(x,\
    \ y), p2(x, y, 0.05), p3(x, y, -0.05), (x, -2, 2), (y, -2, 2));\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_203_0.png)\n\
    \n空间中两点 $(x_1, y_1, z_1)$ 和 $(x_2, y_2, z_2)$ 之间的距离由下式度量\n\n$$\\sqrt{(x_1 - x_2)^2\
    \ + (y_1 - y_2)^2 + (z_1 - z_2)^2}.$$\n\nnumpy 的 norm 方法可用于计算这个公式。\n\n```python\n\
    import numpy as np\n\nnp.linalg.norm(np.array([2,0,0]))\n```\n\n```\n2.0\n```\n\
    \n将所有这些代码整合在一起：\n\n```python\ndef dis_fuc(r,s):\n    init_sol = np.array([ 54.,\
    \ -20.,  30.])\n    rs_sol = np.linalg.solve(sys(r, s), p)\n    dis = np.linalg.norm(init_sol\
    \ - rs_sol)\n    return dis\n\ndis_fuc(1,2)\n```\n\n```\n62.46554605896313\n```\n\
    \n## 练习 7.4 定义 $n \\times n$ 矩阵 $A_n = (a_{ij})$，其第 $i, j$ 个元素为\n\n$$a_{ij} =\
    \ \\begin{cases} 1 & i = j \\\\ i^2 + j^2 & i \\neq j. \\end{cases}$$\n\n证明对于\
    \ $1 \\leq n \\leq 10$，当 $n$ 为奇数时 $A_n$ 的行列式为负，当 $n$ 为偶数时为正。\n\n## 解答\n\n我们首先定义一个函数，对于每个\
    \ $n$，它将生成矩阵 $A_n$。然后我们使用 numpy 中的行列式函数来计算 $A_n$ 的行列式。函数 `numpy.linalg.det` 计算矩阵的行列式。\n\
    \n```python\ndef A(n):\n    mat = np.empty([n, n])\n    for i in range(n):\n \
    \       for j in range(n):\n            if i == j:\n                mat[i, i]\
    \ = 1\n            else:\n                mat[i, j] = (i + 1)**2 + (j + 1)**2\n\
    \    return mat\n```\n\n```python\nfrom numpy.linalg import det\n\ndet_odd = {'even\
    \ indices': [round(det(A(n))) for n in range(1, 10, 2)]}\ndet_even = {'odd indices':\
    \ [round(det(A(n))) for n in range(2, 10, 2)]}\n\nprint(det_odd,'\\n' '\\n', det_even)\n\
    ```\n\n```\n{'even indices': [1, 1007, 5771871, 102458829221, 4336469213954120]}\n\
    \n{'odd indices': [-24, -64591, -681222836, -19122185858615]}\n```\n\n请注意，函数 A(n)\
    \ 包含一个局部变量 mat。该变量的初始值是由 mat = np.empty([n, n]) 定义的 n×n 数组。然后我们按照矩阵 $A_n$ 的描述填充该数组的元素。\n\
    \n在下一个练习中，我们定义另一个矩阵。这次我们首先使用列表推导式定义矩阵，然后将其转换为 numpy 库中的数组。\n\n## 练习 7.5 设 $B_n$\
    \ 表示 $n \\times n$ 矩阵，其 $(i, j)$ 个元素等于\n\n$$b_{ij} = \\begin{cases} \\frac{1}{2j-i^2}\
    \ & \\text{if } i > j \\\\ \\frac{1}{i-j} + \\frac{1}{n^2-j-i} & \\text{if } j\
    \ > i \\\\ 0 & \\text{if } i = j. \\end{cases}$$\n\n*定义一个函数 B(n) 来为任意 n 生成此矩阵。观察\
    \ $3 \\le n \\le 15$ 时 $B_n$ 行列式的数值。*\n\n## 解答\n\n我们定义函数 B(n)，它为任意 n 生成上述矩阵。我们首先使用列表推导式定义矩阵。我们也提供了一个使用嵌套\
    \ for 循环的替代代码。\n\n```python\ndef B(n):\n    t = [[1/(2*j - i**2) if i>j\n    \
    \      else 1/(i - j) + 1/(n**2 - j - i) if j>i\n          else 0\n          for\
    \ j in range(1, n+1)] for i in range(1, n+1)]\n    return t\n```\n\n```python\n\
    np.array(B(5))\n```\n\n```\narray([[ 0.        , -0.95454545, -0.45238095, -0.28333333,\n\
    \        -0.19736842],\n       [-0.5       ,  0.        , -0.95      , -0.44736842,\n\
    \        -0.27777778],\n       [-0.14285714, -0.2       ,  0.        , -0.94444444,\n\
    \        -0.44117647],\n       [-0.07142857, -0.08333333, -0.1       ,  0.   \
    \     ,\n        -0.9375    ],\n       [-0.04347826, -0.04761905, -0.05263158,\
    \ -0.05882353,\n         0.        ]])\n```\n\n函数 numpy.linalg.det 计算矩阵的行列式。\n\
    \n```python\nfrom numpy.linalg import det\n```\n\n```python\n[det(B(n)) for n\
    \ in range(3,11)]\n```\n\n```\n[-0.11928571428571424,\n -0.03525757631818237,\n\
    \ -0.018062205431347532,\n -0.013023479578175417,\n -0.009958843179948978,\n -0.007821845590148313,\n\
    \ -0.0062884030416988125,\n -0.005158398365984703]\n```\n\n接下来，我们使用嵌套 for 循环生成矩阵\
    \ B(n)。这里，第一个循环 for i 将生成行，for j 生成列。然后我们生成每一行的每个元素 aij，并通过 row = row + aij 完成每一行。一旦每一行准备就绪，我们就通过\
    \ b = b + [row] 将行收集到矩阵 b 中。\n\n```python\ndef B(n):\n    b = []\n    for i in\
    \ range(1, n+1): # 生成第 i 行\n        row = []\n        for j in range(1, n+1):\
    \  # 生成第 j 列\n            if (i > j):\n                row += [1 / (2*j - i**2)]\
    \  # 将 bij 元素添加到行中\n            elif (i < j):\n                row += [(1 / (i-j))\
    \ + (1 / (n**2 - j - i))]\n            else:\n                row += [0]\n```"
