    \ + 11` and map it to the list of the first 500 positive integers.\n\n```python\n\
    s = map(lambda n : 3 * n**5 + 11, range(1, 501))\n```\n\nNext we use the function\
    \ `isprime` from the sympy library to check which of these numbers are prime.\
    \ To select, among these lists, those which are prime, we use `filter`.\n\n```python\n\
    from sympy import isprime\n\np = filter(isprime, s)\n```\n\n```python\nx = list(p)\n\
    ```\n\n```python\nprint(x, sep=' , ')\n```\n\n[107, 3083, 23339, 746507, 1613483,\
    \ 3145739, 72900011, 136306283, 617888939, 1140612107, 7606576139, 14112810539,\
    \ 36499587083, 52870250507, 63010249739, 87948751883, 95273908139, 243410436107,\
    \ 451609936907, 824384664683, 867763964939, 1691848015883, 2594599836683, 5350160323307,\
    \ 8048749055339, 13630627200011, 18139852800011, 40149811396907, 42089062300139,\
    \ 52941415424939, 73308784432139, 86486190621707]\n\n```python\nlen(x)\n```\n\n\
    32\n\nIn a nutshell, `filter(isprime, s)` will apply the function `isprime` (which\
    \ returns True or False) to all the elements of `s`, and then collects those elements\
    \ for which isprime(x) is true.\nIn mathematical syntax, this is\n\n$\\{x \\in\
    \ s \\mid isprime(x)\\}$.\n\n**Exercise 4.13** *For which $1 \\le n \\le 1000$\
    \ does the Mersenne formula $2^n - 1$ produce a prime number.*\n\n*Solution*\n\
    Once we know how to combine `lambda` function with `filter` this code is very\
    \ easy to put together.\n\n```python\n[123]: s = filter(lambda n : isprime(2**n\
    \ - 1), range(1, 1001))\n```\n\n```python\n[124]: list(s)\n```\n\n[124]: [2, 3,\
    \ 5, 7, 13, 17, 19, 31, 61, 89, 107, 127, 521, 607]\n\nLet us take a deep breath\
    \ and go through this one-liner slowly. The function `lambda n : isprime(2**n\
    \ - 1)` is an anonymous function which returns `True` if the number $2^n - 1$\
    \ is prime and `False` otherwise. That is, the output of this anonymous function\
    \ is a boolean value. We thus can use `filter` with this function.\n\n```python\n\
    [125]: (lambda n : isprime(2**n - 1))(13)\n```\n\n[125]: True\n\n`range(1,1001)`\
    \ creates a list containing the numbers from 1 to 1000. The command `filter` applies\
    \ the anonymous function `lambda n : isprime(2**n - 1)` to each element of this\
    \ list and when the result is true, i.e., when $2^n - 1$ is prime, the element\
    \ $n$ will be selected. The numbers $\\{2, 3, 5, 7, 13, 17, 19, 31, 61, 89, 107,\
    \ 127, 521, 607\\}$ are the only $n$'s in the given range for which $2^n - 1$\
    \ is a prime number.\n\nJust to give a comparison of functional programming with\
    \ standard procedural programming, we can write the following code which does\
    \ the same thing.\n\n```python\n[126]: L=[]\nfor i in range(1, 1001):\n    if\
    \ isprime(2**i - 1):\n        L.append(i)\nL\n```\n\n[126]: [2, 3, 5, 7, 13, 17,\
    \ 19, 31, 61, 89, 107, 127, 521, 607]"
