    \ 2584, 4181, 6765]\n\nHere is an amusing example showing how the generator functions\
    \ keeps track of each call.\n\n```\ndef gene(n):\n    count = 0\n    while count\
    \ < n:\n        count += 1\n        yield count, 'loop' * count\n\nfor i in gene(5):\n\
    \    print(i)\n```\n\n(1, 'loop')\n(2, 'looploop')\n(3, 'looplooploop')\n(4, 'looplooplooploop')\n\
