    # Exercise 6.11 Investigate


    $$\lim_{n \to 0} \frac{\sin(x)}{x} = 1.$$


    # Solution


    This limit tells us that, if the value of $x$ is very small, one can essentially
    replace $\sin(x)$ with $x$. We first plot the graph of the equation $\sin(x)/x$
    as well as the constant line 1.


    ```

    python

    from sympy import sin, cos, pi

    from sympy.plotting import plot


    plot(sin(x)/x, 1, (x, -pi, pi));

    ```


    ![](img/fbc0c32b1e2a040146ee86ae9f103987_179_1.png)


    This clearly shows that the constant line 1 touches (and is tangent to) the graph
    of $\sin(x)/x$ at $x = 0$. We can confirm this with the sympy command `limit`.'
