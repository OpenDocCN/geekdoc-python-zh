    \ 249\n\n## Chapter 1\nBasics of Python\n\n## 1.1 Basic Arithmetic\n\nThis first\
    \ chapter gives an introduction to using Python “out of the box”, demonstrating\
    \ how to use ready-made commands, performing basic arithmetic and building up\
    \ computations. One of the reasons why Python has become the language of choice\
    \ for many is its external libraries, which provide powerful tools that one can\
    \ use to investigate and analyse problems in a multitude of areas. We will showcase\
    \ some of them in this first chapter, such as working with symbols and the first\
    \ instances of symbolic computations.\n\nPython handles all sort of numerical\
    \ calculations, both exact computations and approximations. If we would like to\
    \ calculate $3 \\times 4 \\times 5 \\times 6 + 1$ or $2^{3^4}$ we only need to\
    \ enter them correctly into Python.\n\n```\n[1]: 3 * 4 * 5 * 6 + 1\n```\n\n[1]:\
    \ 361\n\n```\n[2]: 2**3**4\n```\n\n[2]: 2417851639229258349412352\n\nPython is\
    \ a powerful calculator with the basic arithmetic operations; +, – for addition\
    \ and subtraction and *, ** for multiplication and for raising to powers. One\
    \ uses round brackets () to group the expressions together.\n\n```\n[3]: (2**3)**4\n\
    ```\n\n[3]: 4096\n\n```\n[4]: 2**(3**4)\n```\n\n[4]: 2417851639229258349412352\n\
    \nHere is a calculation to disprove a 200-year-old conjecture of the famous mathematician\
    \ Euler. He conjectured that three fourth powers can never sum to a fourth power.\n\
    \n```\n[5]: 2682440**4 + 15365639**4 + 18796760**4\n```\n\n[5]: 180630077292169281088848499041\n\
    \n```\n[6]: 20615673**4\n```\n\n[6]: 180630077292169281088848499041\n\nThe last\
    \ two calculations show that\n\n2682440⁴ + 15365639⁴ + 18796760⁴ = 20615673⁴,\n\
    \nwhich was found by Noam Elkies at Harvard in 1988, giving a counterexample to\
    \ Euler's conjecture.\n\nPython is even more powerful; it can handle large exact\
    \ computations, as the following shows.\n\n```\n[7]: 2**9941 - 1\n```\n\n[7]:\
    \ \n\
    \nIf a number of the form $2^n - 1$ happens to be prime, it is called a *Mersenne\
    \ prime*. Recall that a *prime number* is a number greater than 1 which is divisible\
    \ only by 1 and itself. It is easy to see that $2^2 - 1$, $2^3 - 1$ and $2^5 -\
    \ 1$ are Mersenne primes. The list continues. In 1963, Gillies found that the\
    \ above number, $2^{9941} - 1$, is a Mersenne prime. With my laptop it takes less\
    \ than 1 second for Python to check that this is indeed a prime number. The largest\
    \ Mersenne prime found so far is $2^{82,589,933} - 1$, having 24,862,048 digits,\
    \ which was discovered in January 2018.\n\nWithin integer arithmetic, there are\
    \ division and remainder operations that Python can handle with `//` and `%`.\
    \ It is a fact that for two non-zero integers $n$ and $m$ one can write $n = mq\
    \ + r$, where $q$ and $r$ are unique integers with $0 \\le r < q$. In Python we\
    \ get `n//m=q` and `n % m =r`. We check this with $n = 13$ and $m = 4$ below.\
    \ Note the use of the function `print` in the example below."
