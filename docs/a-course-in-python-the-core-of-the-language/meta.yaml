    \ 'dog', 'mouse', 'food', 'one', 'sydney'}\n```\n\n```\nA = {'cat', 'dog', 50,\
    \ 'sydney', 'food'}\n```\n\n```\nB = {'dog', 23, -34, 50, 'food'}\n```\n\nTo obtain\
    \ (a):\n\n```\nU - B\n```\n\n```\n{'cat', 'mouse', 'one', 'sydney'}\n```\n\nTo\
    \ obtain (b):\n\n```\nA - B\n```\n\n```\n{'cat', 'sydney'}\n```\n\nTo obtain (c),\
    \ we can do one of the following:\n\n```\n(A - B) | (B - A)\n```\n\n```\n{-34,\
    \ 23, 'cat', 'sydney'}\n```\n\n```\nA.symmetric_difference(B)\n```\n\n```\n{-34,\
    \ 23, 'cat', 'sydney'}\n```\n\n```\nB.symmetric_difference(A)\n```\n\n```\n{-34,\
    \ 23, 'cat', 'sydney'}\n```\n\nTo obtain (d):\n\n```\nA^B\n```\n\n```\n{-34, 23,\
    \ 'cat', 'sydney'}\n```\n\n```\nB^A\n```\n\n```\n{-34, 23, 'cat', 'sydney'}\n\
    ```\n\n```\nU - (A^B)\n```\n\n```\n{50, 'dog', 'food', 'mouse', 'one'}\n```\n\n\
    ```\nU - A.symmetric_difference(B)\n```\n\n```\n{50, 'dog', 'food', 'mouse', 'one'}\n\
    ```\n\n**Exercise 5.11** Let $U$ be a set and $A$ a subset of $U$. Then the complement\
    \ of $A$ is defined as $U\\setminus A$ and denoted by $A^c$. One can prove that\
    \ for subsets $A, B \\subseteq U$\n\n$$(A \\cup B)^c = A^c \\cap B^c$$\n\nDemonstrate\
    \ this identity with the example above.\n\n*Solution*\n\nWe only need to translate\
    \ this to Python:\n\n```\nU - (A | B) == (U - A) & (U - B)\n```\n\n```\nTrue\n\
    ```\n\n**Exercise 5.12** Demonstrate the following identities with the example\
    \ above\n\n$$A \\cap (A \\cup B) = A$$\n\n$$(A \\cap B) \\cup (A \\cup B^c)^c\
    \ = B$$\n\n*Solution*\n\nAgain, we need to translate these identities into Python:\n\
    \n```\nA & (A | B) == A\n```\n\n```\nTrue\n```\n\n```\n(A & B) | (U - (A | (U\
    \ - B))) == B\n```\n\n```\nTrue\n```\n\n## Exercise 5.13 How many different words\
    \ are used in The Book of Genesis? Find the longest words in the book.\n\n*Solution*\n\
    \nRecall the library nltk. We upload the library and get the entire text of Genesis.\
    \ Then using set we get rid of the repeated words.\n\n```\nimport nltk\nfrom nltk.book\
    \ import text3\n```\n\n```\n*** Introductory Examples for the NLTK Book ***\n\
    Loading text1, ..., text9 and sent1, ..., sent9\nType the name of the text or\
