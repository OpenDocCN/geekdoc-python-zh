  md: 'library numpy is designed for numerical computations whereas sympy is for symbolic
    computations and calculus. We look at these libraries in detail in Chapters 6
    and 7. Here we just give an indication of how these libraries behave. All these
    libraries provide the basic mathematical functions, such as trigonometric functions
    sin, cos, tan, etc., however their methods of computation differ.


    ```

    import math

    import numpy

    import sympy

    ```


    We will calculate sin(π/5) using each of these libraries.


    ```

    math.sin(math.pi/5)

    ```


    0.5877852522924731


    ```

    numpy.sin(numpy.pi/5)

    ```


    0.5877852522924731


    ```

