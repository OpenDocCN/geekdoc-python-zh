  md: "```\n[122]:\nrama, cube, a = {}, {}, 0\ncond = True\nwhile cond:\n    cube[a]\
    \ = a * a * a\n    for b in range(a):\n        s = cube[b] + cube[a]\n       \
    \ if s in rama:\n            print((s, (b, a), rama[s]))\n            cond = False\n\
    \        rama[s] = (b ,a)\n    a += 1\n```\n\n[122]: (1729, (1, 12), (9, 10))\n\
    \nAs an further exercise, modify the above code to find more numbers that can\
    \ be expressible as the sum of two cubes in two different ways.\n\n# 5.3 Generators\n\
    \nA generator is one of those tools in Python that allows us to write codes that\
    \ can handle a very large number of items, even when we don't know a priori how\
    \ many items we are dealing with. In fact we can handle infinity itself!\n\nWhen\
    \ we define a list, the sequence of items in the list are all already cooked and\
    \ ready and can be used right away, whereas with generators, the items in the\
    \ sequence will be, well, generated upon request. The following examples make\
    \ this clear:\n\n```\n[123]: l = [i**5 for i in range(10)]\n```\n\n```\n[124]:\
    \ l\n```\n\n[124]: [0, 1, 32, 243, 1024, 3125, 7776, 16807, 32768, 59049]\n\n\
    All the elements of the list l have now been generated. l contains 10 elements.\
    \ l can be used as many times as one would like. Now as for a generator:\n\n```\n\
    [125]: g = (i**5 for i in range(10000000))\n```\n\nNotice the difference between\
    \ the definition of l and g. In g, where the range goes all the way up to 10 million,\
    \ Python does not create the list of 10 million numbers! (it might not even make\
    \ sense to do so!) The definition of g is there and when it is needed we can prompt\
    \ Python to generate as many elements of g as needed.\n\n```\n[126]: [next(g)\
    \ for _ in range(10)]\n```"
