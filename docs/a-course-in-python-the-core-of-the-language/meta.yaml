    As long as you use common sense, any names you choose for variables are valid
    (provided they are not used as Python keywords). Names like `x`, `y`, `x3`, `myfunc`,
    `xQuaternion` as well as `x_3`, `my_func`, `x.Quaternion` are all fine. Also note
    that Python is case-sensitive, thus `xy` and `xY` are considered as two different
    variables. We assign values to these variable using `;` to write the code in one
    line.


