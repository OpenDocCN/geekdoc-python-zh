  md: 'The operation

    $$X \setminus Y = \{x \in X | x \notin Y\}$$

    can be obtained in Python by using `.difference`


    ```

    [47]: X - Y

    [47]: {2}

    ```


    ```

    [48]: X.difference(Y)

    [48]: {2}

    ```


    ```

    [49]: X

    [49]: {2, 3, 5, 7, 11, 13, 17, 19}

    ```


    The operation of symmetric difference, namely

    $$X \setminus Y \cup Y \setminus X,$$

    sometimes denoted by $X \Delta Y$ in mathematics books, can be achieved by `symmetric_difference`.


    ```

    [50]: X.symmetric_difference(Y)

    [50]: {2, 9, 15}

    ```


    ```

    [51]: X^Y

    [51]: {2, 9, 15}

    ```


    ```

    [52]: Y - X

    [52]: {9, 15}

    ```


    ```

    [53]: X - Y

    [53]: {2}

    ```


    ```

    [54]: (Y-X).union(X-Y) == X^Y

    [54]: True

    ```


    For the empty set, use `set()` as `{ }` is reserved for the empty dictionary,
    which we will study later.'
