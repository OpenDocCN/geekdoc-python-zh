    ## 1.6 Equalities and Boolean Statements


    Primarily there are two equalities in Python `=` and `==`. The first one creates
    a pointer, whereas `==` is used for comparison. The result of the comparison is
    a boolean value of `True` or `False`.


    ```python

    1 + 2 == 3

    ```


    True


    ```python

    3**2 + 4**2 == 5**2

    ```


    True


    ```python

    9**10 == 10**9

    ```


    False


    Recall the Euclidean division $n = mq + r$. We can check its validity here with
    an example.


    ```python

    23 == (23 // 4) * 4 + 23 % 4

    ```


    True


    However we should be careful when working with floats, as the computations have
    been done up to a certain precision.


    ```python

    0.1 + 0.2 == 0.3

    ```


    False


    ```python

    0.1 + 0.2

    ```


    0.30000000000000004


    In mathematical logic, statements can have a value of `True`, `False` or undefined.
    These are called *Boolean expressions*. This helps us to “make a decision” and
    write programs based on the value of a statement. We will see later how to use
    `if-else` statements to control the flow of the program based on the value of
    boolean expressions.


    One can combine logical statements with the usual boolean operations `and`, `or`,
    `not` or the equivalent `&`, `|`, `!`, as the following examples show:


    ```python

    2 > 3

    ```


    False


    ```python

    not(2 > 3)

    ```


    True


    ```python

    2 > 3 or 3 > 2

    ```


    True


    ```python

    3**2 + 4**2 >= 5**2

    ```


    True


    **Exercise 1.8** *Is the following statement correct!?*


    (1 < 2 < 3) == (1 < 2) and (2 < 3)


    True


    **Solution**


    In fact the way this statement is written is misleading! Indeed `1 < 2 < 3` means
    exactly `1 < 2` and `2 < 3`. However in the statement above, Python evaluates
    the left-hand side (which is `True`) and then evaluates the right-hand side (again
    `True`) and then compare the two. Therefore the statement below also gives `True`,
    which is not mathematically equivalent.


    ```python

    (1 < 2 < 3) == (1 < 2) and (2 < 10)

    ```


    True


