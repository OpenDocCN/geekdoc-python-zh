  md: '# Chapter 1

    Basics of Python


    # 1.1 Basic Arithmetic


    This first chapter gives an introduction to using Python “out of the box”, demonstrating
    how to use ready-made commands, performing basic arithmetic and building up computations.
    One of the reasons why Python has become the language of choice for many is its
    external libraries, which provide powerful tools that one can use to investigate
    and analyse problems in a multitude of areas. We will showcase some of them in
    this first chapter, such as working with symbols and the first instances of symbolic
    computations.


    Python handles all sort of numerical calculations, both exact computations and
    approximations. If we would like to calculate $3 \times 4 \times 5 \times 6 +
    1$ or $2^{3^4}$ we only need to enter them correctly into Python.


    ```

    [1]: 3 * 4 * 5 * 6 + 1

    ```


    [1]: 361


    ```

    [2]: 2**3**4

    ```


    [2]: 2417851639229258349412352


    Python is a powerful calculator with the basic arithmetic operations; +, – for
    addition and subtraction and *, ** for multiplication and for raising to powers.
    One uses round brackets () to group the expressions together.


    ```

    [3]: (2**3)**4

    ```


    [3]: 4096


    ```

    [4]: 2**(3**4)

    ```'
  merge: -1
  pgno: 9
- img_proc: true
  md: '[4]: 2417851639229258349412352


    Here is a calculation to disprove a 200-year-old conjecture of the famous mathematician
    Euler. He conjectured that three fourth powers can never sum to a fourth power.


    ```

    [5]: 2682440**4 + 15365639**4 + 18796760**4

    ```


    [5]: 180630077292169281088848499041


    ```

    [6]: 20615673**4

    ```


    [6]: 180630077292169281088848499041


    The last two calculations show that


    2682440⁴ + 15365639⁴ + 18796760⁴ = 20615673⁴,


    which was found by Noam Elkies at Harvard in 1988, giving a counterexample to
    Euler''s conjecture.


    Python is even more powerful; it can handle large exact computations, as the following
    shows.


    ```

    [7]: 2**9941 - 1

    ```


    [7]: '
