    \ in range(500)]\nran2 = [random.random() for i in range(500)]\n\nfig, ((ax1,\
    \ ax2), (ax3, ax4)) = plt.subplots(2, 2)\nax1.axis('equal')\nax2.axis('equal')\n\
    ax3.axis('equal')\nax4.axis('equal')\nax1.plot(x, y);\nax2.plot(x, y + ran1, color\
