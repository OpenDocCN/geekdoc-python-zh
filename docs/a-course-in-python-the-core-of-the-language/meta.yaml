    \n### 3.3.2 嵌套 For 循环\n\n在许多应用中，有多个因素（变量）同时变化，这就需要我们所说的*嵌套循环*。与其抽象地描述这种情况，不如让我们看一些例子。\n\
    \n让我们找出所有满足 $n, m \\le 10$ 且 $n^2 + m^2$ 是一个完全平方数的数对 $(n, m)$（例如，$(3, 4)$，因为 $3^2\
    \ + 4^2 = 5^2$）。\n\n注意，这里我们处理两个参数 $n$ 和 $m$，每个参数的范围都在 1 到 10 之间。我们可以设计两个 for 循环，每个循环负责一个变量。\n\
    \n```python\nfor n in range(1, 11):\n    for m in range(1, 11):\n        if math.sqrt(n**2\
    \ + m**2).is_integer():\n            print(n, \" \", m)\n```\n\n```\n3    4\n\
    4    3\n6    8\n8    6\n```\n\n这里外层循环从计数器 $n$ 取值 1 开始。然后轮到这个循环内部的代码块执行，这又是一个循环运行。在内层循环中，$m$\
    \ 在 $(1, 11)$ 范围内使计数器 $m$ 从 1 运行到 10。完成后，在外层循环中 $n$ 取值 2，然后 $m$ 从 1 运行到 10，依此类推，每次检查\
