    ```\n\n## 5.2 集合与字典\n\n从两个列表构建字典的一种方法是使用 zip 方法。如果 $x = (x_1, x_2, \\dots, x_n)$\
    \ 且 $y = (y_1, y_2, \\dots, y_n)$，那么 zip(x, y) 将配对 $x$ 和 $y$ 的元素。\n\n```\nx =\
    \ ('a', 'b', 'c')\ny = (1, 2, 3)\n```\n\n```\nlist(zip(x, y))\n```\n\n```\n[('a',\
    \ 1), ('b', 2), ('c', 3)]\n```\n\n现在我们可以构建一个字典。以下是三种不同的方法：\n\n```\nL={}\nfor key,\
