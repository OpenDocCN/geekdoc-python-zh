  md: 'Solution


    The only challenge here is to translate the mathematical expression correctly
    into Python.


    ```

    (math.exp(math.pi) + math.log(23 / math.sin(math.pi/6)))**(1/3)

    ```


    2.998863793038475


    Notice here that math.exp(math.pi) gives e^π.


    Exercise 1.4 Compute


    6 + \frac{1}{5 + \frac{1}{4 + \frac{1}{3 + \frac{1}{2}}}}


    Solution


    One can immediately see a repeating pattern within this expression, and we will
    later write elegant codes to capture and compute such expressions. For the moment
    we can write the following. Note that the notation _ refers to the previous output
    in Jupyter. The symbol _ has other uses, as we will see throughout the book.


    ```

    3 + 1/2

    ```


    3.5


    ```

    4 + 1/_

    ```


    4.285714285714286


    ```

    5 + 1/_

    ```


    5.233333333333333


    ```

    6 + 1/_

    ```


    6.191082802547771


    Or in one line as:


    ```

    6 + 1/(5 + 1/(4 + 1/(3 + 1/2)))

    ```


    6.191082802547771


    Besides the math library, which provides many valuable mathematical functions,
    there are two other libraries in Python that are heavily used: numpy and sympy.
    The'
