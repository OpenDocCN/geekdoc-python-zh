  md: '# Preface


    Python has become, for good reason, a very popular programming language, with
    a substantial number of followers around the globe. In addition to its intuitive
    programming language, Python now offers numerous libraries which provide powerful
    tools and methods to do, among many other things, mathematics, physics, text processing,
    and musical composition. Once one grasps the core of the language, then help,
    hints, and a wealth of sample codes are just a google away.


    Besides many books on Python, there is an uncountable number of documents on the
    internet. However, I wanted to have one source that I can follow to systematically
    teach (or learn) the core of the language before diving into more advanced fronts.
    I also wanted to have a source that is short, to the point and which provides
    interesting programming examples; examples that I enjoy coding, modifying and
    experimenting with.


    This book grew out of a course I gave at Western Sydney University. It allows
    the reader to learn Python by going through interesting exercises step by step,
    with short and concise explanations. I have tried to let the reader learn from
    the codes and avoid long and exhausting explanations, as the codes will speak
    for themselves. Also I have tried to inspire the reader’s imagination by showing
    that in Python (as in the real world) there are many ways to approach a problem
    and solve it.


    Thus, this book could be considered for a course in Python, or for self-study.
    It mainly concentrates on the core of Python programming. I have mostly chosen
    problems having something to do with natural numbers as they do not need any particular
    background. The codes have been written in Jupyter using Python version 3.


    **Acknowledgement.** My thanks go to Thomas Fischbacher from Google Research for
    going through the book and providing insightful comments; to the students at Western
    Sydney University for their contributions to the classes, which made them lively
    and enjoyable, and to the anonymous referees for their support and feedback. My
    thanks also go to Dr. Remi Lodh at Springer for his generous support throughout
    the preparation of the book.'
  merge: -1
  pgno: 5
- img_proc: true
  md: '**How to use the book.** This book can be used as a one semester course in
    programming in Python (13 weeks, 3 hours each week) at the undergraduate level
    or a compact crash course (4 days, 6 hours each day) for more advanced students.
    Each chapter starts with a description of new tools and topics and provides examples.
    The examples are chosen so that the reader can learn from the codes by typing
    and running them and then modifying them and experimenting with them. Long and
    exhausting explanations are avoided. The lecturer can code the examples in the
    class along with students. The students are then encouraged to take the lead role
    and compose codes themselves for some of the exercises. The problems at the end
    of each chapter can be given to students as homework so that they present the
    codes in the class the next week. The book concludes with projects which demonstrate
    how to use Python to explore mathematics. Some of these projects can be given
    as assignments to the students.


    Please start with the codes in the book, change them, tear them apart and turn
    them upside down, and create your own better programs.


    Sydney, Australia, October 2023


    Roozbeh Hazrat

    [r.hazrat@westernsydney.edu.au](mailto:r.hazrat@westernsydney.edu.au)'
