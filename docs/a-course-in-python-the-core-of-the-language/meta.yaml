    \ needed and then define the matrix.\n\n```\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\n```\n\n```\ndef B(n):\n    mat = np.empty([n, n])\n    for i in range(n):\n\
    \        for j in range(n):\n            i += 1; j += 1\n            if (i > j):\n\
