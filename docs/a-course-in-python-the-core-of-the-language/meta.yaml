    [61]: 1


    Next we look at derivatives and integrals. The following table gives an overview
    of how sympy handles these operations.


    | Examples of functions | Commands to use |

    |---|---|

    | $\partial f/\partial x$ | diff(f,x) |

    | $\partial^2 f/\partial x\partial x$ | diff(f,x,x) or diff(f,x,2) |

    | $\partial^2 f/\partial x\partial y$ | diff(f,x,y) |

    | $\int f(x)dx$ | Integrate(f(x),x) |

    | $\int_a^b f(x)dx$ | Integrate(f(x),x) |

    | $\int_c^d \int_a^b f(x,y)dxdy$ | Integrate(f(x),(x, a,b), (y, c,d)) |


    One can use oo and -oo for $\infty$ and $-\infty$ in the calculations above.


    As a first example, we calculate


    $\int_0^\infty e^{-x}dx$.


    ```

    [62]: from sympy import exp, integrate, symbols, oo

    from sympy.plotting import plot


    x= symbols(''x'')


    integrate(exp(-x), (x, 0, oo))

    ```


    [62]: 1


    This means the area under the curve $e^{-x}$ from 0 to $\infty$ is exactly 1.


    ```

    [63]: plot(exp(-x), (x, 0, 10))

    ```


    [63]:


