  - '[PAGE 249]


    4. Let $B_n$ denote the $n \times n$ matrix with $(i, j)$-th entry equal to $1/(|i
    - j|)$ if $i \neq j$ and $0$ if $i = j$. Find a simple formula to predict the
    value of the determinant of $B_n$ for large values of $n$. What is the largest
    percentage error that your prediction has for $20 \leq n \leq 40$? (Hint: Look
    at the determinants of $B_n$ for $2 \leq n \leq 10$ first. You will see that predictions
    are only possible for certain subsequences of the integers. Obtain sufficient
    data for each of these subsequences so that you can find a transformation that
    is approximately linear and hence obtain and test a formula for each subsequence.
    Put the resulting formulae together for the final predictive function.)


    5. Consider the first 10000 digits of $\sqrt{2}$ and present them as a “random
    walk” by converting them into base 4, representing 4 directions (up, down, left
    and right). We know that $\sqrt{2}$ is an irrational number and irrational numbers
    have decimal expansions that neither terminate nor become periodic. Write a code
    to produce this random walk. Try this code with $\sqrt{3}$, $\sqrt{6}$ and $\sqrt{13}$.
    Is there any comparison one can make among these numbers?


    6. (For this problem, see Case study 8.5.) A double sequence $(a_{(m,n)})$ is
    defined by the rules


    ```

    $$a_{(1,1)} = a_{(1,2)} = a_{(2,1)} = 1$$

    $$a_{(m,1)} = a_{(m-1,1)} + a_{(m-2,1)} \quad (\text{if } m > 2)$$

    $$a_{(1,n)} = a_{(1,n-1)} + a_{(1,n-2)} \quad (\text{if } n > 2)$$

    $$a_{(m,n)} = a_{(m,1)} + a_{(1,n)} - a_{(m-1,n-1)} \quad (\text{if } m > 1 \text{
    and } n > 1).$$

    ```


    The value of $a_{(10,10)}$ is 67. Produce a table comparing the values of $a_{(n,n)}$
    with $n$ for $1 \leq n \leq 20$. Find a simple function that predicts the size
    of $a_{(n,n)}$ and compare your predictions for $a_{(30,30)}$ and $a_{(100,100)}$
    with the correct values.


    If the definition of $a_{(m,n)}$ is altered so that


    ```

    $$a_{(m,n)} = a_{(m,1)} + a_{(1,n)} - 2a_{(m-1,n-1)} \quad (\text{if } m > 1 \text{
    and } n > 1)$$

    ```


    then the terms $a_{(n,n)}$ alternate in sign. By considering separately the sequences
    $a_{(2,2)}, a_{(4,4)}, \ldots$ and $a_{(1,1)}, a_{(3,3)}, a_{(5,5)}, \ldots$ produce
    (and verify) a simple formula for estimating the values of $a_{(n,n)}$ in this
    case.


    7. (For this problem, see Case study 8.5.) Define an $n \times n$ matrix $A_n
    = (a_{ij})$ whose $i, j$-th entries are


    ```

    $$a_{ij} = \begin{cases} i + j & \text{if } i = j \ i^{i+j} & \text{if } i \neq
    j. \end{cases}$$

    ```


    Find out how long it takes Python to evaluate the inverse of $A(n)$ for $n = 15,
    16, \ldots 30$ (this might take some seconds). Hence obtain a formula which estimates
    how long it takes to calculate the inverse of $A(n)$ in general. Test this formula
    experimentally by timing the calculation of the inverse of $A(31)$. Use your formula
    to estimate how long it would take to find the inverse of $A(100)$.'
- md: '## Plot the graph of the function


