  md: '# 5.1.1 Putting conditions on parameters


    In building up codes via list comprehension, we can introduce conditions inside
    the list in a natural way. As a first example, we write a program to generate
    all numbers between 1 and 50 which are divisible by 7.


    Mathematically speaking, this is the set


    $\{n \mid 0 \leq n \leq 50, \text{ and } 7 \mid n\}$.


    In Python, using list comprehension, we can create this list, in a similar manner


    ```

    [n for n in range(0, 51) if n % 7 == 0]

    ```


    [0, 7, 14, 21, 28, 35, 42, 49]


    Building on the previous code, here is a list of numbers between 1 and 199 which
    are divisible by 3 and by 5 but not by 7.


    ```

    [n for n in range(1, 200) if n % 3 == 0 and n % 5 == 0 and not(n % 7 == 0)]

    ```


    [15, 30, 45, 60, 75, 90, 120, 135, 150, 165, 180, 195]


    ```

    [n for n in range(1, 200) if n % 15 == 0 and not(n % 7 == 0)]

    ```


    [15, 30, 45, 60, 75, 90, 120, 135, 150, 165, 180, 195]


    Notice how naturally one can incorporate the conditions inside the list comprehension.


    ```

    [(n, ''even'') if n % 2 == 0 else (n, ''odd'') for n in range(1,10)]

    ```


    [(1, ''odd''), (2, ''even''), (3, ''odd''), (4, ''even''), (5, ''odd''), (6, ''even''),
    (7, ''odd''), (8, ''even''), (9, ''odd'')]


    **Exercise 5.2** Suppose a list contains numbers and text. Write a code to extract
    all the text from the list.'
