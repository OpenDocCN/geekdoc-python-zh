    plt.title('countourplot of $\\sin(x^2) \\cos(y^2)$')\nplt.show()\n```\n\n## 练习\
    \ 8.8\n考虑函数\n\n$$f(x, y) = \\frac{\\sin(x^2 + y^2)}{x + y}.$$\n\n绘制\n\n$$f\\left(f(f(x,\
    \ y), f(x, y)), f(f(x, y), f(x, y))\\right)$$\n\n的等高线图。\n\n### 解答\n这里我们再次遇到了复杂的函数复合。然而，一旦定义了函数\
    \ $f(x, y)$，Python 就能自行处理复合运算。这是另一个使用`meshgrid`函数生成等高线图的例子。\n\n```python\ndef\
    \ f(x, y):\n    return np.sin(x**2 + y**2)/(x + y)\n```\n\n```python\nimport numpy\
    \ as np\nimport matplotlib.pyplot as plt\n\npoints = np.arange(-np.pi, np.pi,\
    \ 0.001)\nxs, ys = np.meshgrid(points, points)\nz = f(xs, ys)\nzc = f(f(z , z),\
    \ f(z, z))\n```\n\n```python\nh = plt.contourf(xs, ys, zc)\n\nplt.axis('scaled')\n\
    plt.colorbar()\nplt.title('countourplot')\n\nplt.show()\n```\n\n## 8.4 案例研究：波斯地毯\n\
    以下有趣的算法由 Anne Burns 在一篇短文中提出，用于通过递归过程创建“类似波斯地毯的图案”。（Anne M. Burns, Persian recursion,\
    \ *Mathematics Magazine*, Vol. 70, No. 3, 1997, 196–199.）遵循 Burns 的论文，我们在此描述该过程，然后将编写\
    \ Python 代码来生成其中一些图案。\n\n考虑一个 $2^n + 1 \\times 2^n + 1$ 单元格的正方形。目标是根据已着色角落的颜色为每个单元格着色。这通过为每个单元格分配一个介于\
    \ 0 到 $m - 1$ 之间的数字来实现，其中 $m$ 是可用颜色的数量。我们首先为外部单元格着色，将它们全部涂成相同的颜色以形成边框。然后我们递归地应用以下过程：\n\
    \n- 使用四个角落的单元格和一个四变量函数来确定一种不同的颜色。例如，该函数可以是\n\n$$f(c_1, c_2, c_3, c_4) = (c_1 +\
    \ c_2 + c_3 + c_4) \\mod m.$$\n\n- 将新确定的颜色分配给中心的内部行单元格和列单元格。\n\n- 将此方案应用于每次执行生成的所有四个新边框正方形。\n\
    \n一旦所有单元格都被着色，函数将终止。\n\n### 解答\n我们首先将该过程翻译成 Python，编写一个代码来生成一个矩阵，其中条目被分配了颜色。这需要一个递归函数，找到中间行和列，然后为划分后的每个新矩阵再次调用函数四次。\n\
    \n为了组合代码，我们从一个示例开始。考虑 $2^3+1\\times2^3+1$ 个单元格，其中 $m=7$，边界单元格全部为 4。\n\n在 Python\
