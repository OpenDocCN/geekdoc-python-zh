    # 问题\n\n1.  对于整数 $2 \\leq n \\leq 200$，找出所有满足 $n$ 整除 $(n - 1)! + 1$ 的 $n$。证明这样的\
    \ $n$ 有46个。\n2.  编写一个函数，如果第 $n$ 个素数是 $4k + 1$ 的形式（其中 $k$ 是某个整数），则返回 `True`。由此生成一个介于1到100之间的正整数\
    \ $n$ 的列表，使得第 $n$ 个素数是 $4k + 1$ 的形式。验证这样的 $n$ 有47个。\n3.  假设 $P_i$ 是第 $i$ 个素数。令\
    \ $E_i = P_1 \\times P_2 \\times \\cdots \\times P_i + 1$ 为第 $i$ 个欧几里得数。定义一个函数\
    \ `Euclidnumber(n)` 来生成第 $n$ 个欧几里得数。使用此函数生成前20个欧几里得数的列表。找出这些数中哪些实际上是素数。找出素数欧几里得数的索引（即\
    \ $i$，其中 $E_i$ 是素数），其中 $1 \\leq i \\leq 100$。\n4.  编写一个函数来计算以下公式\n$$p(n) = 1 +\
    \ \\frac{1}{\\sqrt{1}} + \\frac{1}{\\sqrt{1} + \\sqrt{2}} + \\frac{1}{\\sqrt{2}\
    \ + \\sqrt{3}} + \\frac{1}{\\sqrt{3} + \\sqrt{4}} + \\cdots + \\frac{1}{\\sqrt{n\
    \ - 1} + \\sqrt{n}}$$\n（你能用多少种方式编写这个函数？）\n5.  如果一个数 $a_0a_1\\dots a_{n-1}a_n$\
    \ 的所有前缀 $a_0a_1\\dots a_{n-1}a_n$、$a_0a_1\\dots a_{n-1}$、……、$a_0a_1$ 和 $a_0$ 都是素数，我们称这个数为**纯素数**。找出所有3位、4位和5位的纯素数。你能推测存在多少个16位的纯素数吗？（例如：7193是一个纯素数，因为7193、719、71和7都是素数）。使用函数式编程编写代码。\n\
    6.  自然数 $n$ 的函数 $f$ 定义如下。令 $p_n$ 表示第 $n$ 个素数。将 $s$ 初始化为1，然后依次用 $(s \\times p_k)\
    \ - 1$ 替换它，其中 $k = 1, 2, \\dots, p_n$。$s$ 的最终值就是 $f(n)$ 的值。前几个值是 $f(1) = 1$、$f(2)\
    \ = 2$、$f(3) = 9$ 和 $f(4) = 62$。在Python中定义这个函数。$f(5)$ 和 $f(10)$ 是多少？\n7.  令 $A(x,\
    \ y) = (a_{ij}(x, y))$ 是一个 $n \\times n$ 矩阵，其中\n\n$$a_{ij}(x, y) = \\begin{cases}\
    \ 0 & \\text{如果 } i = j \\\\ \\sin(x)^i \\cos(y)^j (\\sin(y) + \\cos(x))^{i+j}\
    \ & \\text{如果 } i \\neq j. \\end{cases}$$\n\n创建 $3 \\times 3$ 矩阵 $A(\\pi, \\pi/5)$。\n\
    8.  实数（即浮点数）向量 $x = (x_1, x_2, \\ldots, x_n)$ 的**范数**定义为\n\n$$\\|x\\| = \\sqrt{\\\
    sum_{k=1}^n x_k^2}.$$\n\n编写一个函数 `vnorm`，计算任意长度实数向量的范数。（用两种不同的方式编写函数：使用过程式循环和使用函数式编程）。\n\
    9.  对于一个数 $n$，真因数 $k$ 是一个不等于 $n$ 且能整除 $n$ 的数。例如，$\\{1, 3, 5\\}$ 是15的所有真因数。考虑一个数的所有真因数之和。现在考虑这个新数的所有真因数之和，并重复这个过程。如果最终得到的数与起始数相同，则这个数被称为**社交数**。编写一个程序来证明1264460是一个社交数。检查14316是否也是一个社交数。\n\
    10. 使用函数式编程，证明对于任何正数序列 $a_1, a_2, \\ldots, a_n$，我们有\n\n$$(a_1 + a_2 + \\cdots\
    \ + a_n)\\left(\\frac{1}{a_1} + \\frac{1}{a_2} + \\cdots + \\frac{1}{a_n}\\right)\
    \ \\geq n^2$$\n\n11. 如果一对素数 $p$ 和 $q$ 满足 $pq$ 和 $qp$ 都是素数（$pq$ 表示将两个数并置在一起），我们称它们为**朋友**。例如，素数563和587是朋友，因为563587和587563都是素数。编写一个程序，在某个合适的素数范围内生成所有素数朋友。\n\
    12. 数字 $\\pi$ 以\n\n3.14159265358979323846264338327950288419716939937510582097494\n\
    45923078164062862089986280348253421170679...\n\n开头，并且没有规律地继续。搜索 $\\pi$ 的前100,000位数字，检查你的生日是否作为数字序列出现在\
    \ $\\pi$ 中。例如，1971年4月8日星期四这个日期出现在 $\\pi$ 的数字中：3.1415926535897932384626433832795028841971693...\n\
    13. 回想一下，如果 $f : A \\rightarrow B$ 和 $g : B \\rightarrow C$ 是两个函数，那么 $gf : A \\\
    rightarrow C$ 定义为 $gf(a) = g(f(a))$，其中 $a \\in A$。解释以下代码的功能，并仅使用一个 `map` 重写它。\n\
    \n```\n[1]: z = map(lambda i : i+1, map(lambda i: i**2, range(1,10)))\n```\n\n\
    ```\n[2]: list(z)\n```\n\n[3]: [2, 5, 10, 17, 26, 37, 50, 65, 82]\n\n14. 回想一下，`map`\
    \ 创建一个迭代器，该迭代器在被提示时执行。运行以下代码并解释 `map` 是如何工作的。\n\n```\n[1]: x_square = map(lambda\
    \ i: i ** 2, range(1,10000000000))\n```\n\n```\n[2]: for n in x_square:\n    if\
    \ n > 6**2:\n        break\n    print(n)\n```\n\n[2]: 1\n4\n9\n16\n25\n36\n\n\
    ```\n[3]: for n in x_square:\n    if n > 9**2:\n        break\n    print(n)\n\
    ```\n\n[3]: 64\n81"
