    \ behaves very much like list. The main difference is that one can modify an exiting\
    \ list, i.e., they are *mutable objects*, whereas once a tuple is defined, one\
    \ cannot modify it, i.e., they are *unmutable objects*.\n\nThe examples below\
    \ show how one can define and handle tuples.\n\n```\nt = (1, 2 , 'new', 1.5)\n\
    ```\n\nNote that for a list the objects are gathered together with brackets [\
    \ ], whereas for a tuple, one uses curly brackets (). But accessing the objects\
    \ within tuples is exactly like lists.\n\n```\nt[2]\n```\n\n'new'\n\n```\nt[ :\
    \ 3]\n```\n\n(1, 2, 'new')\n\n```\nt[ : : -2]\n```\n\n(1.5, 2)\n\nThe following\
    \ example demonstrates what we mean when we say list is mutable whereas tuple\
    \ is immutable.\n\n```\ns = [1, 2, 3]\n```\n\n```\nt = (1, 2, 3)\n```\n\n```\n\
    type(s)\n```\n\nlist\n\n```\ntype(t)\n```\n\ntuple\n\n```\ns[1] = 'new data'\n\
    ```\n\n```\ns\n```\n\n[130]: [1, 'new data', 3]\n\nHowever executing t[1] = 'new\
    \ data' generates an error. The error indicates that once a tuple has been defined,\
    \ one cannot change it.\n\nTuples are defined as a collection of data between\
    \ round brackets ( , ). In fact, one does not need to add the brackets when defining\
    \ tuples.\n\n```\n[131]: seasons = 'summer' , 'autumn' , 'winter', 'spring'\n\
