    \    $$x(2\\pi - x) \\sum_{n=1}^{50} \\frac{\\sin(nx)}{n}$$\n\n    在 $0 \\leq\
    \ x \\leq 2\\pi$ 范围内的图像。\n\n3.  考虑函数 $\\sin(x^2) \\cos(y^2)$。绘制该函数及其等高线图。创建一个动画，观察随着绘图的进行，区域如何变化。\n\
    \n4.  设 $B_n$ 表示一个 $n \\times n$ 矩阵，其 $(i, j)$ 项在 $i \\neq j$ 时等于 $1/(|i - j|)$，在\
