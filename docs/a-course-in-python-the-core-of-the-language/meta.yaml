- md: "## Exercise 8.4 Plot the graph of the function\n\n$$f(x) = \\begin{cases} -x,\
    \ & \\text{if } |x| < 1 \\\\ \\sin(x), & \\text{if } 1 \\le |x| < 2 \\\\ \\cos(x),\
    \ & \\text{otherwise.} \\end{cases}$$\n\n*Solution*\n\nGiven the type of conditions\
    \ introduced in the body of this function, we revert to defining the function\
    \ element-wise.\n\n```python\ndef f(x):\n    if abs(x) < 1:\n        f = -x\n\
    \    elif 1 <= abs(x) < 2:\n        f = math.sin(x)\n    else:\n        f = math.cos(x)\n\
    \    return f\n```\n\n```python\nimport math\nimport numpy as np\n\nx = np.arange(-4,\
    \ 4, 0.1)\ny = list(map(f, x))\n```\n\nThe function $f(x)$ is not a continuous\
    \ function, as becomes more clear from its graph.\n\n```python\nplt.plot(x, y,\
    \ 'r.');\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_222_0.png)\n\n## 8.2\
    \ Plots as Objects\n\nSo far we have been using `plot` as a function, giving two\
    \ list of `x` and `y` for the coordinates to create the graph. However, since\
    \ plots are objects, we can create new plots simply by changing the attributes\
    \ of an existing plot. The following examples show how much more we can get when\
    \ we work in this manner. We will be using the same data generated for the butterfly\
    \ graph from the above example.\n\n```python\n[25]: fig, ax = plt.subplots()\n\
    plt.figure(figsize=(4, 4),dpi=400);\nax.axis('equal')\nax.plot(x_axis, y_axis);\n\
    ```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_223_0.png)\n\n```python\n[26]:\
    \ fig\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_223_1.png)\n\nHere we have\
    \ defined the plot object fig which comes with is own “Axes” object ax. The object\
    \ ax is where we assign the data and decorate the graph, such as adding titles\
    \ and scales. We can then plot the whole graph using the object fig.\n\nA figure\
    \ object can have several Axes, which then allows us to handle several plots in\
    \ one go. The line fig, ax = plt.subplots(m,n) creates an object fig, with m×n\
    \ Axes. Each of these Axes can have their own x--y data and specifications, thus\
    \ the object fig contains m × n graphs. Think of fig as an m × n matrix, with\
    \ each entry a graph with its own specification. We can access each of these subplots\
    \ with ax[i,1], again similar to accessing entries of a matrix. The following\
    \ examples shows how wonderful this approach is.\n\n```python\n[27]: def x(t):\n\
    \    return np.cos(t) + 1/2*np.cos(7*t) + 1/3*np.sin(17*t)\n\ndef y(t):\n    return\
    \ np.sin(t) + 1/2*np.sin(7*t) + 1/3*np.cos(17*t)\n\ndef rrange(i):\n    return\
    \ np.linspace(0, i * np.pi, 40000)\n\nfig, ax = plt.subplots(3)\nax[0].axis('equal')\n\
    ax[1].axis('equal')\nax[2].axis('equal')\nax[0].plot(x(rrange(0.1)), y(rrange(0.1)));\n\
    ax[1].plot(x(rrange(1.1)), y(rrange(1.1)));\nax[2].plot(x(rrange(2.1)), y(rrange(2.1)));\n\
    ```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_224_0.png)\n\n```python\nfig,\
    \ ax = plt.subplots(6)\n\nfor i in [0, 1, 2, 3, 4, 5]:\n    ax[i].axis('equal')\n\
    \    ax[i].plot(x(rrange(0.3 * i )), y(rrange(0.3 * i)))\n    ax[i].set_xlim([1,\
    \ 5])\nplt.show()\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_224_1.png)\n\
    \n**Exercise 8.5** *Define the Conway recursive sequence $a(1) = 1, a(2) = 1$\
    \ and*\n\n$$a(n) = a(a(n - 1)) + a(n - a(n - 1))$$\n\n*and plot $a(n)/n$, as $n$\
    \ runs from 1 to 1500.*\n\n*Next consider a modified version of the function,*\n\
    \n$$a_{i,k}(n) = a(a(n - i)) + a(n - a(n - k))$$\n\n*for $1 \\le i, k \\le 2$\
    \ and plot and plot $a_{i,k}(n)/n$.*\n\n## 8.2 Plots as Objects\n\nSolution\n\n\
    Note that the Conway function $a(n) = a(a(n - 1)) + a(n - a(n - 1))$ is quite\
    \ a complicated recursive function; it calls itself twice within its definition.\
    \ However if we just translate it straight into Python, the program takes care\
    \ of this recursive behaviour.\n\n```python\ndef a(n):\n    a = [0, 1, 1]\n  \
    \  if n == 2:\n        return a[1 : ]\n    else:\n        for i in range(3, n\
    \ + 1):\n            a.append(a[a[-1]] + a[i - a[-1]])\n        return a[1 : ]\n\
    ```\n\n```python\nimport numpy as np\nimport matplotlib.pyplot as plt\n\ny = np.array(a(1500))\
    \ / np.arange(1, 1501)\n```\n\n```python\nplt.plot(y);\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_225_0.png)\n\
    \nNext we define the modified version of the Conway function.\n\n```python\ndef\
    \ a(n, l, k):\n    a = [0, 1, 1]\n    if n == 2:\n        return a[1 : ]\n   \
    \ else:\n        for i in range(3, n + 1):\n            a.append(a[a[-l]] + a[i\
    \ - a[-k]])\n        return a[1 : ]\n```\n\n```python\nfig, ax = plt.subplots(2,\
    \ 2)\n\nfor l in range(1,3):\n    for k in range(1,3):\n        y = np.array(a(1500,\
    \ l, k))/np.arange(1, 1501)\n        ax[l - 1, k - 1].plot(y)\n        ax[l -\
    \ 1, k - 1].set_title(f'l={l}, k={k}')\n\nfor axs in ax.flat:\n    axs.label_outer()\n\
    ```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_226_0.png)\n\nThe last loop will\
    \ hide the x labels and tick labels for the top plots and the y ticks for the\
    \ right plots.\n\nIt is interesting to see that a slight change in the definition\
    \ of the Conway recursive function makes the behaviour of the sequence quite chaotic.\
    \ This has been studied by K. Pinn in the article “A chaotic cousin of Conway’s\
    \ recursive sequence”, available on arXiv.org.\n\n## 8.3 Animation\n\nIn order\
    \ to create an animation, we need to enable the interactive plot. This can be\
    \ done by the following command in Jupyter.\n\n```python\n%matplotlib notebook\n\
    ```\n\nNext we will use FuncAnimation within the command animation. The idea is\
    \ to generate several frames of plots and then show them one after the other.\
    \ The command FuncAnimation just does that. In the line FuncAnimation(fig, animate,\
    \ frames=100, interval=20, ...) we create a fig, which is our graph object. This,\
    \ as before, we do with fig, ax = plt.subplots(). We know ax.plot(x,y) will create\
    \ the graph. The idea is to modify the x and y coordinates accordingly and then\
    \ ask Python to show them frame by frame with some interval. This is done by defining\
    \ a function animate which takes care of these changes and frames to send the\
    \ parameters into animate. The interval sets the delay (in milliseconds) between\
    \ frames. As usual, we start with examples.\n\n```python\nimport numpy as np\n\
    import matplotlib.pyplot as plt\nimport matplotlib.animation as animation\n\n\
    fig, ax = plt.subplots()\n\nax.set_xlim(0, 10*np.pi)\nax.set_ylim(-1.1, 1.1)\n\
    \nline, = ax.plot([], 'r.')\n\ndef animate(i):\n    x = np.arange(0, (i/10)*np.pi,\
    \ 0.1)\n    y = np.sin(x)\n    line.set_data((x, y))\n    return line,\n\nani\
    \ = animation.FuncAnimation(\n    fig, animate, frames=100, interval=20, blit=True)\n\
    plt.show()\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_227_0.png)\n\nNow\
    \ that we have the blueprint for creating graphs, we modify the above example\
    \ to see how the graph of the parametric equations\n\n$x(t) = \\cos(t) + 1/2 \\\
    cos(7t) + 1/3 \\sin(17t)$\n$y(t) = \\sin(t) + 1/2 \\sin(7t) + 1/3 \\cos(17t)$\n\
    \nis created.\n\n```python\nimport numpy as np\nimport matplotlib.pyplot as plt\n\
    import matplotlib.animation as animation\n\ndef x(t):\n    return np.cos(t) +\
    \ 1/2*np.cos(7*t) + 1/3*np.sin(17*t)\n\ndef y(t):\n    return np.sin(t) + 1/2*np.sin(7*t)\
    \ + 1/3*np.cos(17*t)\n\nfig, ax = plt.subplots()\n\nax.set_xlim(-np.pi, np.pi)\n\
    ax.set_ylim(-2, 2)\n\nline, = ax.plot([])\n\ndef animate(i):\n    t = np.linspace(0,\
    \ (i/10)*np.pi, 40000)\n    xc = x(t)\n    yc = y(t)\n    line.set_data((xc, yc))\n\
    \    return line,\n\nani = animation.FuncAnimation(\n    fig, animate, frames=100,\
    \ interval=200, blit=True)\n\nplt.show()\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_228_0.png)\n\
    \n## Exercise 8.6 Plot the polar graph of $r = 3 \\cos(6\\theta)$.\n\nSolution\n\
    \nFor plotting a polar graph, one is given the angle $\\theta$ and the length\
    \ $r = 3 \\cos(6\\theta)$. Using trigonometry, we can obtain the $(x, y)$ coordinates\
    \ as follows:\n\n$$x = r \\sin(\\theta)$$\n$$y = r \\cos(\\theta)$$\n\n```python\n\
    theta = np.linspace(0, 2 * np.pi, 4000)\nr = 3 * np.cos(6 * theta)\nx = r * np.sin(theta)\n\
    y = r * np.cos(theta)\n```\n\n```python\nplt.axis('off');\nplt.axis('equal');\n\
    plt.plot(x,y);\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_229_0.png)\n\n\
    This is another example of multiple graphs. We are going to plot the polar graph\
    \ above and then introduce some “noise” to the result using the command random.\n\
    \n```python\nimport random\nprint(random.random())\n```\n\n0.43010950529070247\n\
    \n```python\ntheta = np.linspace(0, 2 * np.pi, 500)\nr = 3 * np.cos(6 * theta)\n\
