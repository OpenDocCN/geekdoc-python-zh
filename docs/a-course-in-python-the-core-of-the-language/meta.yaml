    **Exercise 5.16** Find the first 5 positive integers $n$ such that $n^6 + 1091$
    is prime.


    *Solution*


    We have seen this exercise before. The exercise previously also told us that the
    first five $n$''s such that $n^6 + 1091$ is prime are between 3500 and 8500. Therefore
    we knew from the outset how far we needed to increase $n$. If we didn''t know
    the bound for $n$, then the notion of generators allows us to write a one-line
    code for this exercise. Since the generators run the code upon request, we can
    define a tuple comprehension, allowing for $n$ to go all the way to a very large
    number, say 1 million, checking if $n^6 + 1091$ is prime. Once this generator
    is defined, we prompt it five times, so it will give us the first five $n$, as
    wanted.


    ```

    from sympy import isprime


    x = (n for n in range(1, 1000000) if isprime(n**6 + 1091))

    ```


    Note that at the moment x is a generator and we need to prompt it so that we get
    the first $n$ such that $n^6 + 1091$ is prime.


    ```

    [next(x) for i in range(5)]

    ```


    [130]: [3906, 4620, 5166, 5376, 5460]


    In order to obtain the first five items in one go, we could use a method from
    the itertools library.


    ```

    import itertools


    list(itertools.repeat(next(x), 5))

    ```'
