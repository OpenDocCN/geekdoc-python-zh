  md: "```\n[55]: X = set(); X\n```\n\n[55]: set()\n\n```\n[56]: X.union({2})\n```\n\
    \n[56]: {2}\n\nNote that one cannot access items in a set by referring to an index\
    \ (as we do for lists or tuples), but we can loop through the set items using\
    \ a for loop, or ask if a specified value is present in a set, by using the in\
    \ keyword.\n\n**Exercise 5.9** *Find the set of remainders of $n^2 + n + 41$ upon\
    \ dividing by 7 for $0 \\le n < 100$.*\n\n*Solution*\n\nWe will use a **set**\
    \ to collect the remainders as we are only interested in the actual remainders\
    \ and not how many of them we obtain when dividing $n^2 + 41$ by 7.\n\n```\n[57]:\
    \ A = set()\nfor n in range(100):\n    A = A | {(n**2 + n + 41) % 7}\nprint(A)\n\
    ```\n\n[57]: {1, 4, 5, 6}\n\nRecall the shorthand a #= b, which is equivalent\
    \ to a = a # b.\n\n```\n[58]: A = set()\nfor n in range(100):\n    A |= {(n**2\
    \ + n + 41) % 7}\nprint(A)\n```\n\n[58]: {1, 4, 5, 6}\n\n```\n[59]: A = set()\n\
    for n in range(100):\n    A = A.union({(n**2 + n + 41) % 7})\nprint(A)\n```\n\n\
    [59]: {1, 4, 5, 6}\n\nRecall the list comprehension approach to programming. We\
    \ can use “set comprehension” to do the job."
