    \ matrix, where the entries of $C$ are\n\n$$C_{i,j} = \\sum_{k=1}^{m} a_{ik}b_{kj},$$\n\
    \nwhere $1 \\le i \\le n$ and $1 \\le j \\le p$. We can translate this into Python\
    \ via three nested-loops. We will later see that several Python libraries such\
    \ as **sympy** and **numpy** provide matrix multiplication, allowing us to perform\
    \ linear algebra.\n\n```\nA = [[2, 1, -1], [-1, 2, 0], [1,1,3]]\nB = [[-1, 0,\
