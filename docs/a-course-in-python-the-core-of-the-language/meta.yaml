    \ Corpus\ntext9: The Man Who Was Thursday by G. K. Chesterton 1908\n\n**Exercise\
    \ 3.8** *The sum of two positive integers is 5432 and their least common multiple\
    \ is 223020. Find the numbers.*\n\n*Solution*\n\nThe math library does not yet\
    \ include the function for the least common multiple of two numbers. However,\
    \ the greatest common divisor is available via `math.gcd`. On the other hand,\
    \ we know the identity\n$$\\text{lcm}(n, m) = \\frac{mn}{\\text{gcd}(n, m)}.$$\n\
    This allows us to write the code for the exercise.\n\n```\n[33]: import math\n\
    math.gcd(25,30)\n```\n\n[33]: 5\n\n```\n[34]: (25 * 30) // math.gcd(25,30)\n```\n\
    \n[34]: 150\n\n```\n[35]: import math\n\nfor n in range(1, 5433):\n    m = 5432\
    \ - n\n    lcm = (n * m) // math.gcd(n,m)\n    if lcm == 223020:\n        print(n,\
    \ m)\n```\n\n[35]: 1652 3780\n3780 1652\n\nAs there is a symmetry between n and\
    \ m we need to go up to half of 5432 in order to avoid repetition of results.\n\
    \n```\n[36]: import math\n\nfor n in range(1, 5433//2):\n    m = 5432 - n\n  \
    \  lcm = (n * m) // math.gcd(n,m)\n    if lcm == 223020:\n        print(n, m)\n\
    ```\n\n[36]: 1652 3780\n\n**Exercise 3.9** Determine all the positive integers\
    \ n between 3 and 50 for which $2^{2008}$ is divisible by\n\n$1 + \\binom{n}{1}\
    \ + \\binom{n}{2} + \\binom{n}{3}$.\n\nHere $\\binom{n}{m}$ is the binomial coefficient:\
    \ $\\binom{n}{m}$ is defined as $\\frac{n!}{m!(n-m)!}$\n\n*Solution*\n\nBoth factorial\
    \ and binomial functions are available in the math library, as the following examples\
    \ show:\n\n### 3.3 Loops and Repetitions\n\n63\n\n```\n[37]: import math\nmath.factorial(5)\
    \ == 1 * 2 * 3 * 4 * 5\n```\n\n[37]: True\n\n```\n[38]: math.comb(5,3) == math.factorial(5)//(math.factorial(3)\
    \ * math.factorial(5-3))\n```\n\n[38]: True\n\nWe are ready to write the code.\
    \ The difficulty is in translating the large formula into Python correctly.\n\n\
    ```\n[39]: for n in range(3,51):\n    f = (1 + math.comb(n,1) + math.comb(n,2)\
    \ + math.comb(n,3))\n    if (2**2008) % f == 0:\n        print(n)\n```\n\n[39]:\
    \ 3\n7\n23\n\nPlease appreciate the complexity of the computation!\n\n```\n[40]:\
    \ 2**2008\n```\n\n[40]: \n\
    \n**Exercise 3.10** Notice that $12^2 = 144$ and $21^2 = 441$, i.e., the numbers\
    \ and their squares are reverses of each other. Find all the numbers up to 10000\
    \ with this property.\n\n*Solution*\n\nThe first thing to take care of is the\
    \ reversal of the digits of a number. We can use the trick that we used for strings,\
    \ reading the characters of a string from right to left via `s[::-1]`. So we convert\
    \ a number into a string, read the characters from right to left, and then convert\
    \ it back to a number.\n\n```\nx=str(12345)\n```\n\n```\nx[::-1]\n```\n\n'54321'\n\
    \n```\nint(x[::-1])\n```\n\n54321\n\n```\nint(str(12345)[::-1])\n```\n\n54321\n\
    \nNow we need to translate the property we are after into code, that is, we need\
    \ to raise a number to the power of two, reverse it, and then compare the result\
    \ to its reverse to the power of two; in code it reads:\n\n`int(str(n**2)[::-1])\
    \ == int(str(n)[::-1])**2`.\n\nPutting these together:\n\n```\nfor n in range(1,10000):\n\
    \    if int(str(n**2)[::-1]) == int(str(n)[::-1])**2:\n        print(n, end='\
    \ ')\n```\n\n1 2 3 10 11 12 13 20 21 22 30 31 100 101 102 103 110 111 112 113\
    \ 120 121 122 130 200 201 202 210 211 212 220 221 300 301 310 311 1000 1001 1002\
    \ 1003 1010 1011 1012 1013 1020 1021 1022 1030 1031 1100 1101 1102 1103 1110 1111\
    \ 1112 1113 1120 1121 1122 1130 1200 1201 1202 1210 1211 1212 1220 1300 1301 2000\
    \ 2001 2002 2010 2011 2012 2020 2021 2022 2100 2101 2102 2110 2111 2120 2121 2200\
    \ 2201 2202 2210 2211 3000 3001 3010 3011 3100 3101 3110 3111\n\nWe check one\
    \ of the answers:\n\n```\n112**2\n```\n\n12544\n\n```\n211**2\n```\n\n[47]: 44521\n\
    \nWe revisit Exercise 1.1 on cyclic numbers.\n\n**Exercise 3.11** *A number with\
    \ n digits is called cyclic if multiplication by 1, 2, 3, ..., n produces numbers\
    \ with the same digits in a different order. Find the only 6-digit cyclic number.*\n\
    \n*Solution*\n\nLet's spill the beans: The number 142857 is the only 6-digit cyclic\
    \ number! We first check this via a simple loop.\n\n```\n[48]: for i in range(1,\
    \ 7):\n    print(i * 142857, end=' ')\n```\n\n[48]: 142857 285714 428571 571428\
    \ 714285 857142\n\nHow to actually find this number? One approach is to sort all\
    \ the digits of the number from smaller to larger. Then we check that any multiple\
    \ of the number, when similarly sorted, has the same sequence of digits.\n\n```\n\
    [49]: str(142857)\n```\n\n[49]: '142857'\n\n```\n[50]: sorted(str(142857))\n```\n\
    \n[50]: ['1', '2', '4', '5', '7', '8']\n\n```\n[51]: str(142857 * 2)\n```\n\n\
    [51]: '285714'\n\n```\n[52]: sorted(str(142857)) == sorted(str(142857 * 2))\n\
    ```\n\n[52]: True\n\nHere is the naive way to code this approach:\n\n```\n[53]:\
    \ for i in range(100000, 1000000):\n    if sorted(str(i)) == sorted(str(i * 2))\
    \ == sorted(str(i * 3)) == sorted(str(i * 4)) == sorted(str(i * 5)) == sorted(str(i\
    \ * 6)):\n        print(i)\n```\n\n[53]: 142857\n\nHere is a bit of a re-working\
    \ of the above code. We set x to be the digits of a number, sorted, and a boolean\
    \ value y = True. Then we examine multiples of the number, each time comparing\
    \ the result with x. If the arrangements do not match, we change the value of\
    \ the Boolean statement to false. This will keep track of whether the arrangement\
    \ of the digits changes.\n\n```\n[54]:\nx = sorted(str(142857))\ny = True\nfor\
    \ i in range(1, 7):\n    y = y and x == sorted(str(142857 * i))\nprint(y)\n```\n\
    \n[54]: True\n\nRecall that, for some operation #, we can write y = y # s in the\
    \ shorter form y #= s.\n\n```\n[55]:\nx = sorted(str(142857))\ny = True\nfor i\
    \ in range(1, 7):\n    y &= x == sorted(str(142857 * i))\nprint(y)\n```\n\n[55]:\
    \ True\n\nWe can improve the above code even more. If in some instance the value\
    \ of y becomes false, namely, if the digits of the new number differs from the\
    \ digits of x, we do not need to go further through the rest of the loop. In this\
    \ case, we can stop the loop, using the command break. The break statement breaks\
    \ out of the loop entirely.\n\n```\n[56]:\nx = sorted(str(142857))\ny = True\n\
    for i in range(1, 7):\n    if x != sorted(str(142857 * i)):\n        y = False\n\
    \        print(y)\n        break\n```\n\nNow we incorporate the code, running\
    \ x through all six-digit numbers.\n\n```\n[57]:\nfor i in range(100000, 1000000):\n\
    \    x = sorted(str(i))\n    y = True\n```"
