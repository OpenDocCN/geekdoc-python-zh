    # 8.4 Case Study, Persian Carpets


    The following amusing algorithm was suggested in a short paper by Anne Burns to
    create “Persian rug-like patterns” using a recursive procedure. (Anne M. Burns,
    Persian recursion, *Mathematics Magazine*, Vol. 70, No. 3, 1997, 196–199.) Following
    Burns’ paper, we describe the procedure here and then we will write a Python code
    to generate some of these patterns.


    Consider a $2^n + 1 \times 2^n + 1$ celled square. The aim is to colour each cell
    based on the colour of the corners already coloured. This is achieved by allocating
    a number between 0 and $m - 1$ to each cell, $m$ being the number of available
    colours. We begin to colour the outer cells first, colouring them all the same
    colour in order to form a border. We then apply the following procedure recursively:


    +   - Use the four cells in the corners and a four-variable function to determine
    a different colour. For example the function could be


    $$f(c_1, c_2, c_3, c_4) = (c_1 + c_2 + c_3 + c_4) \mod m.$$


    - Allocate the newly determined colour to the interior row cells and column cells
    in the centre.


    - Apply this scheme to all of the four new bordered squares generated at each
    execution.


    Once all cells have been coloured the function will terminate.'
