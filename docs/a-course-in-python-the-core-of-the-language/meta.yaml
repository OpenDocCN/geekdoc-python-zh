  md: "# Chapter 3\nDecisions and Repetitions\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_56_0.png)\n\
    \n# 3.1 Decision Making: The Fork on the Road\n\nThe statement\n\n```\nif cond:\n\
    \    this\nelse:\n    that\n```\n\nwhere cond is a Boolean expression, i.e., has\
    \ the value of True or False, will execute the code block this if the cond value\
    \ is True and that otherwise. That means, in either case, one of the statements\
    \ this or that will be performed (but not both). So this gives us the ability\
    \ to make a decision about which part of the code one wants to perform. Here is\
    \ an example:\n\n```\n[1]: if True:\n        print('100%')\n        print('checked')\n\
    \    else:\n        print('0%')\n```\n\n[1]: 100%\nchecked\n\nWe need to go through\
    \ the above code carefully. The decoration and spacing above is not for nicety.\
    \ Python uses spacing to determine the structures. The code block of this belonging\
    \ to the if statement is determined by adding spacing, and likewise for the code\
    \ block that which belongs to the else part of the command. In other languages\
    \ one uses \\begin, \\end, ( and ) or { and } to group things together and give\
    \ structure to codes, but the spacing in Python both plays this role and makes\
    \ the code much easier to read. In particular, this approach cuts the number of\
    \ brackets"
  merge: -1
  pgno: 56
- img_proc: true
  md: "one uses in Python to group things together and it makes the code visually\
    \ much more appealing. Later on in this chapter we will look at loops and repeating\
    \ a block of code. That will also done by determining the code that we would like\
    \ to repeat via indenting. Putting these together, a code in Python will look\
    \ like the following, where the grey blocks represent structured codes.\n\n```\n\
    if cond:\n    [block]\nelse:\n    [block]\nloop\n    if cond:\n        [block]\n\
    \    else:\n        [block]\n```\n\nWhen working with commands that require structures,\
    \ Python expects us to follow the proper indenting, as the following shows. If\
    \ we run the code below, we encounter an error message, which tells us that the\
    \ indenting has not been done correctly.\n\n```\n[2]: if True:\n    print(\"100%\"\
    )\n    print('checked')\nelse:\n    print(\"0%\")\n```\n\n```\n[2]: Cell In[2],\
    \ line 2\n    print(\"100%\")\n    ^\nIndentationError: expected an indented block\
    \ after 'if' statement on line 1\n```\n\nFor the next example we look at the mysterious\
    \ Collatz function, which is defined as follows:\n\n$$f(x) = \\begin{cases} x/2\
    \ & \\text{if } x \\text{ is even,} \\ 3x+1 & \\text{if } x \\text{ is odd.} \\\
    end{cases}$$\n\nIt was conjectured by L. Collatz in 1937 that if one applies $f$\
    \ repeatedly to any positive integer, one eventually arrives at 1, i.e., for any\
    \ $x \\in \\mathbb{N}$, there is an $n$ such that $f^n(x) = 1$.\n\nWe later discuss\
    \ how to define functions in Python. Here we write the Collatz conditional function."
