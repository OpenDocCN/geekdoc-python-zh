    \ where we used a while-loop to get the answer. Here we use the concept of generators\
    \ to approach the problem.\n\n```\n[133]: import itertools\n\nnext(x for x in\
    \ (99999 * k for k in itertools.count(1)) if\n     '9' not in str(x))\n```\n\n\
    [133]: 1111188888\n\nHere the entire line\n\n`(x for x in (99999 * k for k in\
    \ itertools.count(1)) if '9' not in str(x))`\n\nis a generator which generates\
    \ a multiple of 99999 that does not contain the digit 9. Each time we prompt it,\
    \ it gives us the first instance it arrives at.\n\n```\n[134]: t = (x for x in\
    \ (99999 * k for k in itertools.count(1)) if\n     '9' not in str(x))\n\n[next(t)\
    \ for i in range(3)]\n```\n\n[134]: [1111188888, 1111288887, 1111388886]\n\nThe\
