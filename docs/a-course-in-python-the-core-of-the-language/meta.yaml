- md: "## Chapter 8\nThe matplotlib Library and Projects\n\n### 8.1 matplotlib, Plotting\
    \ Data\n\nIn this chapter we will look more closely at the Python graphics library\
    \ matplotlib, which is widely used for plotting data and creating professional\
    \ and magnificent two-dimensional graphics. This library works perfectly with\
    \ numpy. With numpy we handle the data and with matplotlib we visualise them.\n\
    \n```python\nimport matplotlib.pyplot as plt\n```\n\nLet us remind ourselves of\
    \ the most basic way we can use the library.\n\n```python\nplt.plot([1, 2, 2.5,\
    \ 4], [10, 12, -2, 1]);\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_215_0.png)\n\
    \nAs the example shows, in order to plot a graph, we specify the x-coordinates\
    \ and then the y-coordinates. If $x = (x_1, x_2, \\cdots, x_n)$ and $y = (y_1,\
    \ y_2, \\cdots, y_n)$, then plt.plot(x,y) will produce a graph determined by the\
    \ pairs $(x_i, y_i), 1 \\le i \\le n$.\n\nWe can introduce styles and formatting\
    \ to our graphs. Here is just one example. The option b. displays small blue filled\
    \ circles and r^ displays solid red triangles pointing upward.\n\n```python\n\
    plt.plot(range(1, 20), range(1,20), 'b.');\nplt.plot(range(20, 1, -1), range(1,20),\
    \ 'r^');\nplt.plot(range(1, 21), [10 for i in range(1, 21)], color='green', marker='o',\
    \ linestyle='dashed');\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_216_0.png)\n\
    \nStaying with lists, we calculate the sin function for certain values and plot\
    \ the result.\n\n```python\nimport math\n\nx = range(-10, 10)\ny = [math.sin(i)\
    \ for i in x]\n```\n\n```python\nplt.plot(x, y, 'g^-');\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_216_1.png)\n\
    \nWe won't spend too much time on how to style the outputs. The examples below\
    \ show some samples and the codes for any combinations and decorations one has\
    \ in mind are just a google away.\n\nAs mentioned, matplotlib works perfectly\
    \ with numpy. This allows us to do all kind of calculations with ease, since numpy\
    \ allows the use of universal functions, i.e. we can apply functions to each component\
    \ of the array.\n\nThe example below produces the plot of the function sin(x)/x,\
    \ where -10 ≤ x ≤ 10.\n\n```python\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\n\nx = np.arange(-10, 10, 0.2)\nplt.plot(x, np.sin(x)/x, 'g^-');\n```\n\
    \n![](img/fbc0c32b1e2a040146ee86ae9f103987_217_0.png)\n\n**Exercise 8.1** Plot\
    \ the graph of $f(x) = \\frac{\\sin(x)}{\\cos(x)}$, for $0 \\le x \\le 10\\pi$.\n\
    \n*Solution*\nThe universal function facility of numpy allows us to treat an array\
    \ as single data. We first define an array $x = (x_1, x_2, \\cdots, x_n)$, then\
    \ when using numpy's sin and cos, the expression $y = \\sin(x)/\\cos(x)$ gives\n\
    $$y = \\left( \\frac{\\sin(x_1)}{\\cos(x_1)}, \\frac{\\sin(x_2)}{\\cos(x_2)},\
    \ \\cdots, \\frac{\\sin(x_n)}{\\cos(x_n)} \\right).$$\nWe can then simply pass\
    \ $y$ into the plot command.\n\n```python\nx = np.arange(0.01, 10*np.pi, 0.1)\n\
    y = np.sin(x)/np.cos(x)\n\nplt.plot(x, y);\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_217_1.png)\n\
    \nmatplotlib allows us to plot several equations at the same time. For this one\
    \ introduces the equations into plot by using a list containing all the equations.\n\
    As an example we plot the graphs of the functions $\\sin(\\frac{1}{x^2-x})$ and\
    \ $\\cos(\\frac{1}{x^2-x})$ in the range $[0, \\pi]$.\n\n```python\nx = np.arange(np.pi/4,\
    \ np.pi, 0.005)\n\ny = np.sin(1/(x**2 - x))\nz = np.cos(1/(x**2 - x))\n\nplt.plot(x,\
    \ y, x, z);\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_218_0.png)\n\nWe\
    \ could also use the function plot separately.\n\n```python\nplt.plot(x, y);\n\
    plt.plot(x, z);\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_218_1.png)\n\n\
    The way we can think of this is that `plt.plot` creates an object and each time\
    \ we feed it the coordinates, we create new axes. A figure object can have several\
    \ Axes, and Python then shows all of them together in one figure.\n\n**Exercise\
    \ 8.2** *Plot the graphs of*\n$$f_n(x) = \\frac{\\sin(x) - \\cos(nx)}{1 + x}$$\n\
    *between 0 and $7\\pi$ as $n$ ranges from 1 to 10.*\n\n*Solution*\nWe define the\
    \ function $f_n$ in Python, which depends on $n$. We then create a loop, running\
    \ $n$ from 0 to 9.\n\n```python\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\n\nx = np.arange(0, 7*np.pi, 0.005)\n\ndef f(n):\n    return (np.sin(x)\
    \ - np.cos(n * x))/(1+x)\n\nfor n in range(10):\n    plt.plot(x, f(n));\n```\n\
    \n![](img/fbc0c32b1e2a040146ee86ae9f103987_219_0.png)\n\nAs one can see, although\
    \ the plt.plot is repeated 10 times, all the graphs appear in one figure, as the\
    \ plot defines a single object consisting of all these coordinates.\n\nOne can\
    \ see that there is no difference between plotting a parametric plot and functions\
    \ of the form $f(x) = \\sin(x)$. Here, we plot the parametric function $x = \\\
    sin(t)$, $y = \\cos(t)$.\n\n```python\nt = np.linspace(-np.pi, np.pi, 400)\nx\
    \ = np.sin(t)\ny = np.cos(t)\nplt.plot(x,y);\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_219_1.png)\n\
    \nWe expect to get a perfect circle. A closer look shows Python has used different\
    \ scales for $x$ and $y$-axis. We adjust this:\n\n```python\nplt.axis('equal')\n\
    plt.plot(x,y);\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_219_2.png)\n\n\
    ```python\nplt.axis('equal')\nfor i in range(10):\n    plt.plot(x*i + i ,y*i);\n\
    ```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_220_0.png)\n\nWe have plotted\
    \ the butterfly curve given by\n\n$x(t) = \\sin(t)\\left(e^{\\cos(t)} - 2\\cos(4t)\
    \ - \\sin^5(t/12)\\right)$\n\n$y(t) = \\cos(t)\\left(e^{\\cos(t)} - 2\\cos(4t)\
    \ - \\sin^5(t/12)\\right)$\n\nusing sympy graphics. Here we will plot this parametric\
    \ equation using matplotlib.\n\n```python\ndef x(t):\n    return np.sin(t)*(np.exp(np.cos(t))\
    \ - 2*np.cos(4*t) - np.sin(t/12)**5)\n```\n\n```python\ndef y(t):\n    return\
    \ np.cos(t)*(np.exp(np.cos(t)) - 2*np.cos(4*t) - np.sin(t/12)**5)\n```\n\n```python\n\
    import numpy as np\nimport matplotlib.pyplot as plt\n\nx_axis = x(np.linspace(-50,\
    \ 50, 40000))\ny_axis = y(np.linspace(-50, 50, 40000))\n```\n\n```python\nplt.figure(figsize=(4,\
    \ 4));\nplt.axis('off');\nplt.plot(x_axis, y_axis, linewidth=0.2);\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_220_1.png)\n\
    \n**Exercise 8.3** Plot the graph of\n\n$x(t) = \\cos(t) + 1/2 \\cos(7t) + 1/3\
    \ \\sin(17t)$\n$y(t) = \\sin(t) + 1/2 \\sin(7t) + 1/3 \\cos(17t)$\n\nfor $0 \\\
    leq t \\leq 14\\pi$.\n\n**Solution**\n\nThis is very similar to the previous exercise.\
    \ We generate the $x$ and $y$-coordinates and then use plot to create the graph.\n\
    \n```python\ndef x(t):\n    return np.cos(t) + 1/2*np.cos(7*t) + 1/3*np.sin(17*t)\n\
    ```\n\n```python\ndef y(t):\n    return np.sin(t) + 1/2*np.sin(7*t) + 1/3*np.cos(17*t)\n\
    ```\n\n```python\nx_axis= x(np.linspace(0, 14*np.pi, 1000))\ny_axis= y(np.linspace(0,\
    \ 14*np.pi, 1000))\n```\n\n```python\nplt.figure(figsize=(4, 4));\nplt.axis('off');\n\
    plt.plot(x_axis, y_axis, linewidth=0.3);\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_221_0.png)\n\
    \nWe remark that it is not necessary to define the functions $x(t)$ and $y(t)$.\
    \ It is enough to define $t = \\text{np.linspace}(0, 14*\\text{np.pi}, 1000))$\
    \ and then set\n\n$x\\_axis = \\text{np.cos}(t) + 1/2*\\text{np.cos}(7*t) + 1/3*\\\
    text{np.sin}(17*t)$\n$y\\_axis = \\text{np.sin}(t) + 1/2*\\text{np.sin}(7*t) +\
    \ 1/3*\\text{np.cos}(17*t)$"
  mdcn: "## 第8章\nmatplotlib库与项目\n\n### 8.1 matplotlib，数据绘图\n\n在本章中，我们将更深入地探讨Python图形库matplotlib，该库广泛用于绘制数据和创建专业且精美的二维图形。这个库与numpy配合得天衣无缝。我们使用numpy处理数据，然后用matplotlib将其可视化。\n\
    \n```python\nimport matplotlib.pyplot as plt\n```\n\n让我们回顾一下使用该库最基本的方式。\n\n```python\n\
    plt.plot([1, 2, 2.5, 4], [10, 12, -2, 1]);\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_215_0.png)\n\
    \n如示例所示，为了绘制图形，我们先指定x坐标，然后指定y坐标。如果 $x = (x_1, x_2, \\cdots, x_n)$ 且 $y = (y_1,\
    \ y_2, \\cdots, y_n)$，那么 `plt.plot(x,y)` 将生成由点对 $(x_i, y_i), 1 \\le i \\le n$\
    \ 确定的图形。\n\n我们可以为图形引入样式和格式。这里仅举一个例子。选项 `b.` 显示小的蓝色实心圆点，而 `r^` 显示向上的红色实心三角形。\n\n\
    ```python\nplt.plot(range(1, 20), range(1,20), 'b.');\nplt.plot(range(20, 1, -1),\
    \ range(1,20), 'r^');\nplt.plot(range(1, 21), [10 for i in range(1, 21)], color='green',\
    \ marker='o', linestyle='dashed');\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_216_0.png)\n\
    \n继续使用列表，我们计算特定值的正弦函数并绘制结果。\n\n```python\nimport math\n\nx = range(-10, 10)\n\
    y = [math.sin(i) for i in x]\n```\n\n```python\nplt.plot(x, y, 'g^-');\n```\n\n\
    ![](img/fbc0c32b1e2a040146ee86ae9f103987_216_1.png)\n\n我们不会花太多时间讨论如何设置输出样式。下面的示例展示了一些样本，任何你想要的组合和装饰的代码只需搜索一下就能找到。\n\
    \n如前所述，matplotlib与numpy配合得天衣无缝。这使我们能够轻松地进行各种计算，因为numpy允许使用通用函数，即我们可以将函数应用于数组的每个分量。\n\
    \n下面的示例绘制了函数 sin(x)/x 的图像，其中 -10 ≤ x ≤ 10。\n\n```python\nimport numpy as np\n\
    import matplotlib.pyplot as plt\n\nx = np.arange(-10, 10, 0.2)\nplt.plot(x, np.sin(x)/x,\
    \ 'g^-');\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_217_0.png)\n\n**练习\
    \ 8.1** 绘制函数 $f(x) = \\frac{\\sin(x)}{\\cos(x)}$ 在 $0 \\le x \\le 10\\pi$ 区间上的图像。\n\
    \n*解答*\nnumpy的通用函数功能允许我们将数组视为单个数据。我们首先定义一个数组 $x = (x_1, x_2, \\cdots, x_n)$，然后当使用numpy的\
    \ `sin` 和 `cos` 时，表达式 $y = \\sin(x)/\\cos(x)$ 给出\n$$y = \\left( \\frac{\\sin(x_1)}{\\\
    cos(x_1)}, \\frac{\\sin(x_2)}{\\cos(x_2)}, \\cdots, \\frac{\\sin(x_n)}{\\cos(x_n)}\
    \ \\right).$$\n然后我们可以简单地将 $y$ 传入绘图命令。\n\n```python\nx = np.arange(0.01, 10*np.pi,\
    \ 0.1)\ny = np.sin(x)/np.cos(x)\n\nplt.plot(x, y);\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_217_1.png)\n\
    \nmatplotlib允许我们同时绘制多个方程。为此，我们通过使用一个包含所有方程的列表将方程引入绘图。\n例如，我们在 $[0, \\pi]$ 范围内绘制函数\
    \ $\\sin(\\frac{1}{x^2-x})$ 和 $\\cos(\\frac{1}{x^2-x})$ 的图像。\n\n```python\nx =\
    \ np.arange(np.pi/4, np.pi, 0.005)\n\ny = np.sin(1/(x**2 - x))\nz = np.cos(1/(x**2\
    \ - x))\n\nplt.plot(x, y, x, z);\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_218_0.png)\n\
    \n我们也可以分别使用 `plot` 函数。\n\n```python\nplt.plot(x, y);\nplt.plot(x, z);\n```\n\n\
    ![](img/fbc0c32b1e2a040146ee86ae9f103987_218_1.png)\n\n我们可以这样理解：`plt.plot` 创建一个对象，每次我们向它提供坐标时，就创建新的坐标轴。一个图形对象可以有多个坐标轴，然后Python将它们全部显示在一个图形中。\n\
    \n**练习 8.2** *绘制函数图像*\n$$f_n(x) = \\frac{\\sin(x) - \\cos(nx)}{1 + x}$$\n*在0到\
    \ $7\\pi$ 之间，当 $n$ 从1变化到10时。*\n\n*解答*\n我们在Python中定义依赖于 $n$ 的函数 $f_n$。然后我们创建一个循环，让\
    \ $n$ 从0运行到9。\n\n```python\nimport numpy as np\nimport matplotlib.pyplot as plt\n\
    \nx = np.arange(0, 7*np.pi, 0.005)\n\ndef f(n):\n    return (np.sin(x) - np.cos(n\
    \ * x))/(1+x)\n\nfor n in range(10):\n    plt.plot(x, f(n));\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_219_0.png)\n\
    \n可以看到，尽管 `plt.plot` 被重复调用了10次，但所有图形都出现在一个图中，因为绘图定义了一个包含所有这些坐标的单一对象。\n\n可以看到，绘制参数方程图与绘制\
    \ $f(x) = \\sin(x)$ 形式的函数图没有区别。这里，我们绘制参数函数 $x = \\sin(t)$，$y = \\cos(t)$。\n\n\
    ```python\nt = np.linspace(-np.pi, np.pi, 400)\nx = np.sin(t)\ny = np.cos(t)\n\
    plt.plot(x,y);\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_219_1.png)\n\n\
    我们期望得到一个完美的圆。仔细观察发现Python对 $x$ 轴和 $y$ 轴使用了不同的比例。我们调整一下：\n\n```python\nplt.axis('equal')\n\
    plt.plot(x,y);\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_219_2.png)\n\n\
    ```python\nplt.axis('equal')\nfor i in range(10):\n    plt.plot(x*i + i ,y*i);\n\
    ```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_220_0.png)\n\n我们绘制了由以下方程给出的蝴蝶曲线\n\
    \n$x(t) = \\sin(t)\\left(e^{\\cos(t)} - 2\\cos(4t) - \\sin^5(t/12)\\right)$\n\n\
    $y(t) = \\cos(t)\\left(e^{\\cos(t)} - 2\\cos(4t) - \\sin^5(t/12)\\right)$\n\n\
    之前使用了sympy图形。这里我们将使用matplotlib绘制这个参数方程。\n\n```python\ndef x(t):\n    return np.sin(t)*(np.exp(np.cos(t))\
    \ - 2*np.cos(4*t) - np.sin(t/12)**5)\n```\n\n```python\ndef y(t):\n    return\
    \ np.cos(t)*(np.exp(np.cos(t)) - 2*np.cos(4*t) - np.sin(t/12)**5)\n```\n\n```python\n\
    import numpy as np\nimport matplotlib.pyplot as plt\n\nx_axis = x(np.linspace(-50,\
    \ 50, 40000))\ny_axis = y(np.linspace(-50, 50, 40000))\n```\n\n```python\nplt.figure(figsize=(4,\
    \ 4));\nplt.axis('off');\nplt.plot(x_axis, y_axis, linewidth=0.2);\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_220_1.png)\n\
    \n**练习 8.3** 绘制以下函数的图像\n\n$x(t) = \\cos(t) + 1/2 \\cos(7t) + 1/3 \\sin(17t)$\n\
    $y(t) = \\sin(t) + 1/2 \\sin(7t) + 1/3 \\cos(17t)$\n\n在 $0 \\leq t \\leq 14\\\
    pi$ 区间内。\n\n**解答**\n\n这与前面的练习非常相似。我们生成 $x$ 和 $y$ 坐标，然后使用 `plot` 创建图形。\n\n```python\n\
    def x(t):\n    return np.cos(t) + 1/2*np.cos(7*t) + 1/3*np.sin(17*t)\n```\n\n\
    ```python\ndef y(t):\n    return np.sin(t) + 1/2*np.sin(7*t) + 1/3*np.cos(17*t)\n\
    ```\n\n```python\nx_axis= x(np.linspace(0, 14*np.pi, 1000))\ny_axis= y(np.linspace(0,\
    \ 14*np.pi, 1000))\n```\n\n```python\nplt.figure(figsize=(4, 4));\nplt.axis('off');\n\
    plt.plot(x_axis, y_axis, linewidth=0.3);\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_221_0.png)\n\
    \n我们注意到，没有必要定义函数 $x(t)$ 和 $y(t)$。只需定义 $t = \\text{np.linspace}(0, 14*\\text{np.pi},\
    \ 1000))$，然后设置\n\n$x\\_axis = \\text{np.cos}(t) + 1/2*\\text{np.cos}(7*t) + 1/3*\\\
    text{np.sin}(17*t)$\n$y\\_axis = \\text{np.sin}(t) + 1/2*\\text{np.sin}(7*t) +\
    \ 1/3*\\text{np.cos}(17*t)$"
