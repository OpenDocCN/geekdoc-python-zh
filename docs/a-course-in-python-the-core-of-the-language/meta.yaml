    \n## Exercise 7.4 Define the $n \\times n$ matrix $A_n = (a_{ij})$ whose $i, j$-th\
    \ entries are\n\n$$a_{ij} = \\begin{cases} 1 & i = j \\\\ i^2 + j^2 & i \\neq\
    \ j. \\end{cases}$$\n\nShow that for $1 \\leq n \\leq 10$ the determinant of $A_n$\
    \ is negative for odd values and positive for even values of $n$.\n\n## Solution\n\
    \nWe first define a function that, for each $n$, will generate the matrix $A_n$.\
    \ Then we use the determinant function within numpy to evaluate the determinant\
    \ of $A_n$. The function `numpy.linalg.det` evaluates the determinant of a matrix.\n\
    \n```python\ndef A(n):\n    mat = np.empty([n, n])\n    for i in range(n):\n \
    \       for j in range(n):\n            if i == j:\n                mat[i, i]\
    \ = 1\n            else:\n                mat[i, j] = (i + 1)**2 + (j + 1)**2\n\
    \    return mat\n```\n\n```python\nfrom numpy.linalg import det\n\ndet_odd = {'even\
    \ indices': [round(det(A(n))) for n in range(1, 10, 2)]}\ndet_even = {'odd indices':\
    \ [round(det(A(n))) for n in range(2, 10, 2)]}\n\nprint(det_odd,'\\n' '\\n', det_even)\n\
    ```\n\n```\n{'even indices': [1, 1007, 5771871, 102458829221, 4336469213954120]}\n\
    \n{'odd indices': [-24, -64591, -681222836, -19122185858615]}\n```\n\nNote that\
    \ the function A(n) contains a local variable mat. The initial value of this variable\
    \ is the n×n array defined by mat = np.empty([n, n]). We then fill the entries\
    \ of this array as described by the matrix $A_n$.\n\nIn the next exercise, we\
    \ define another matrix. This time we first use a list comprehension to define\
    \ the matrix and then convert it into array within the numpy library.\n\n## Exercise\
    \ 7.5 Let $B_n$ denote the $n \\times n$ matrix with $(i, j)$-th entry equal to\n\
    \n$$b_{ij} = \\begin{cases} \\frac{1}{2j-i^2} & \\text{if } i > j \\\\ \\frac{1}{i-j}\
    \ + \\frac{1}{n^2-j-i} & \\text{if } j > i \\\\ 0 & \\text{if } i = j. \\end{cases}$$\n\
    \n*Define a function B(n) to generate this matrix for any n. Look at the numerical\
    \ values of the determinant of $B_n$ for $3 \\le n \\le 15$.*\n\n## Solution\n\
    \nWe define the function B(n) which generates the above matrix for any n. We first\
    \ use list comprehension to define the matrix. We give an alternative code using\
    \ a nested for-loop as well.\n\n```python\ndef B(n):\n    t = [[1/(2*j - i**2)\
    \ if i>j\n          else 1/(i - j) + 1/(n**2 - j - i) if j>i\n          else 0\n\
    \          for j in range(1, n+1)] for i in range(1, n+1)]\n    return t\n```\n\
    \n```python\nnp.array(B(5))\n```\n\n```\narray([[ 0.        , -0.95454545, -0.45238095,\
    \ -0.28333333,\n        -0.19736842],\n       [-0.5       ,  0.        , -0.95\
    \      , -0.44736842,\n        -0.27777778],\n       [-0.14285714, -0.2      \
    \ ,  0.        , -0.94444444,\n        -0.44117647],\n       [-0.07142857, -0.08333333,\
    \ -0.1       ,  0.        ,\n        -0.9375    ],\n       [-0.04347826, -0.04761905,\
    \ -0.05263158, -0.05882353,\n         0.        ]])\n```\n\nThe function numpy.linalg.det\
    \ evaluates the determinant of a matrix.\n\n```python\nfrom numpy.linalg import\
    \ det\n```\n\n```python\n[det(B(n)) for n in range(3,11)]\n```\n\n```\n[-0.11928571428571424,\n\
    \ -0.03525757631818237,\n -0.018062205431347532,\n -0.013023479578175417,\n -0.009958843179948978,\n\
    \ -0.007821845590148313,\n -0.0062884030416988125,\n -0.005158398365984703]\n\
    ```\n\nNext we generate the matrix B(n) using a nested for-loop. Here the first\
    \ loop for i will generate the rows and for j generates the columns. We then generate\
    \ each entry aij of each row and we complete each row via row = row + aij. Once\
    \ each row is ready then, via b = b + [row], we collect the rows into the matrix\
    \ b.\n\n```python\ndef B(n):\n    b = []\n    for i in range(1, n+1): # generating\
    \ i-th row\n        row = []\n        for j in range(1, n+1):  # generating j-th\
    \ column\n            if (i > j):\n                row += [1 / (2*j - i**2)] \
    \ # adding bij entry\n                # to the row\n            elif (i < j):\n\
    \                row += [(1 / (i-j)) + (1 / (n**2 - j - i))]\n            else:\n\
    \                row += [0]\n```"
