    One can define anonymous functions with several variables.


    ```

    (lambda x, y: x + y)(2, 3)

    ```


    ```

    (lambda x, y, z: x + y + z)(1, 2, 3)

    ```


    ```

    (lambda x, y, z: x + y + z)(''one'', '' two'', '' three'')

    ```


    As the above two examples show, as long as the body of the function can handle
    the types, one can pass any type of object into the parameters of the function.

    Similar to the ‘classical’ functions, we can define default values for parameters.


    ```

    (lambda x, y, z = 3: x * y * z)(1, 2)

    ```


    ```

    (lambda x, y = '' prepared'', z = '' pizza'': x + y + z)(''You'')

    ```


    ```

    (lambda x, y = '' prepared'', z = '' pizza'': x + y + z)(''I'', z = '' hamburger'')

    ```


    ```

    (lambda x, y = '' prepared'', z = '' pizza'': x + y + z)(''He'', y = '' burnt'')

    ```


    Recall that via * we can pass sequences of objects into functions.


    ```

    (lambda *z: z[ : : -1])(1, 2, 3)

    ```


    ```

    (lambda *z: z[ : : -1])(*range(13))

    ```'
