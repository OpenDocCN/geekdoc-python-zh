  md: '# Chapter 2

    Lists and Tuples


    # 2.1 Data: Lists


    In Python, lists provide the first basic building blocks for working with and
    handling data.


    One can think of a computer program as a function which accepts some (crude) data
    or information and gives back the data we would like to obtain. The classic Python
    provides certain tools to collect and handle data, such as `list`, `tuple`, `set`
    and `dictionary`. Libraries such as `numpy` further provide capable tools to work
    with a large collection of data. In this chapter we will study `list` and `tuple`;
    how to collect data and how to access and process the elements in these collections.
    We will study `set` and `dictionary` in Chapter 5.


    Data Science starts with handling data, such as data cleansing, aggregation, transformation,
    and data visualisation, and lists are the first stop in this process. Once we
    grasp the concept of the lists and how to work with them, we can comfortably work
    with other objects which are designed for handling data.


    We start with an example of a `list`:


    ```

    [1]: L = [3, 6.4, 3, ''stuff'', ''x^2+x+1'', 64/3]

