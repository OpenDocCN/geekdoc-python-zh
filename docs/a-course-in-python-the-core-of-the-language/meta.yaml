    However executing t[1] = ''new data'' generates an error. The error indicates
    that once a tuple has been defined, one cannot change it.


    Tuples are defined as a collection of data between round brackets ( , ). In fact,
    one does not need to add the brackets when defining tuples.


    ```

    [131]: seasons = ''summer'' , ''autumn'' , ''winter'', ''spring''

