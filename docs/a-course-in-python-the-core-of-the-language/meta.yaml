    **Exercise 5.8** *Explain what the following code does:*


    ```

    python

    import math


    isprime = lambda x: all(x % k for k in range(2, 1 + math.isqrt(x)))

    [n for n in range(350, 400) if isprime(n**2 + n + 1)]

    ```


    ```

    output

    [351, 357, 369, 378, 381, 383, 392, 395, 398]

    ```


    *Solution*


    The `all()` function returns True if all items in an iterable are true, otherwise
    it returns False. The tuple comprehension `(x % k for k in range(2, 1 + math.isqrt(x)))`
    checks if the number $x$ is divisible by numbers up to $\sqrt{x}$. If there is
    an instance when $x$ is indeed divisible, then $x \% k$ returns 0. Within Boolean
    statements, all positive numbers represent True and zero represent False. Thus
    if there is one number dividing $x$, using `all` the combinations of Boolean outputs
    inside the tuple comprehension is False, otherwise the result is True meaning
    no number divides $x$, i.e., $x$ is a prime number. The next list comprehension
    in the code uses this prime test to find prime numbers of the form of $n^2+n+1$
    for $350 \le n \le 400$.


    # ## 5.2 Sets and Dictionaries


    # ### 5.2.1 Sets


    To handle a collection of data, we have worked with `list` and `tuple`. With `list`
    we can collect data, access the elements, and modify the list by adding or deleting
    items, i.e. they are mutable objects. `tuples` are immutable but we can still
    access their elements.


    Next we introduce two more objects for handling data, `sets` and `dictionaries`.
    The concept of `sets` in Python is the closest to the notion of sets in mathematics:
    a collection of data where order and duplications of members does not change the
    set.


