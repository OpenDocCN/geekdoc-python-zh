  - "[PAGE 91]\n\n# Chapter 4\nFunctions\n\n# 4.1 Functions\n\nFunctions in mathematics\
    \ define rules about how to handle data. A function is a rule which assigns to\
    \ each element in its domain a unique element in a specific range. For example,\
    \ the function $f$ defined as $f(n) = n^2 + 1$ will receive as an input (a number)\
    \ $n$ and its output will be $n^2 + 1$. Another way to think of this is that one\
    \ can assign an object to the parameter $n$ in the function and $f$ will process\
    \ the object according to the rules defined within the function.\n\nFunctions\
    \ (in programming) provide a way to split the code into mini-programs with their\
    \ own (local) variables and codes and one can pass inputs into them and receive\
    \ outputs. In this way one can break a long program into logically smaller programs,\
    \ each piece being a stand-alone function.\n\nWe start by defining simple functions\
    \ in Python.\n\n```\n[1]: def f():\n        print(\"Western Sydney University\"\
    )\n```\n\n```\n[2]: for i in range(4):\n        f()\n```\n\n[2]: Western Sydney\
    \ University\n    Western Sydney University\n    Western Sydney University\n \
    \   Western Sydney University\n\nHere f is the name of the function. What comes\
    \ after : is the body of the function. One can think of f as a mini-program and\
    \ one can call this function anytime in the main program. This function has a\
    \ poor soul: no parameter to pass objects into it. Next we improve this function\
    \ by passing data into it."
