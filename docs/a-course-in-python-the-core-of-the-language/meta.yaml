    \n本 Springer 印记由注册公司 Springer Nature Switzerland AG 出版\n注册公司地址为：Gewerbestrasse\
    \ 11, 6330 Cham, Switzerland\n\n本产品中的纸张可回收利用。\n\n## 前言\n\nPython 已经成为一门非常流行的编程语言，这有充分的理由，它在全球拥有大量的追随者。除了其直观的编程语言特性外，Python\
    \ 现在还提供了众多库，这些库提供了强大的工具和方法，可用于数学、物理、文本处理和音乐创作等众多领域。一旦掌握了语言的核心，那么帮助、提示和丰富的示例代码只需一次搜索即可获得。\n\
    \n除了许多关于 Python 的书籍外，互联网上还有数不清的文档。然而，我希望有一个可以遵循的资源，以便在深入更高级领域之前，系统地教授（或学习）语言的核心。我还希望有一个简短、切中要点并提供有趣编程示例的资源；这些示例是我喜欢编码、修改和尝试的。\n\
    \n本书源于我在西悉尼大学开设的一门课程。它允许读者通过逐步完成有趣的练习来学习 Python，并提供简短而简洁的解释。我试图让读者从代码中学习，避免冗长而令人疲惫的解释，因为代码本身会说话。同时，我也试图通过展示在\
    \ Python 中（就像在现实世界中一样）有许多方法来处理和解决问题，从而激发读者的想象力。\n\n因此，本书可被视为 Python 课程教材，或用于自学。它主要集中在\
    \ Python 编程的核心内容上。我主要选择了与自然数相关的问题，因为它们不需要任何特定的背景知识。代码是使用 Python 3 版本在 Jupyter\
    \ 中编写的。\n\n**致谢。** 我要感谢 Google Research 的 Thomas Fischbacher 审阅本书并提供富有洞察力的意见；感谢西悉尼大学的学生们对课程的贡献，使课程生动有趣；感谢匿名审稿人的支持和反馈。我还要感谢\
    \ Springer 的 Remi Lodh 博士在本书准备过程中给予的慷慨支持。\n\n**如何使用本书。** 本书可用作本科阶段为期一学期的 Python\
    \ 编程课程（13 周，每周 3 小时），或为更高级学生提供的紧凑速成课程（4 天，每天 6 小时）。每章以新工具和主题的描述开始，并提供示例。示例的选择旨在让读者通过输入、运行、修改和尝试代码来学习。避免了冗长而令人疲惫的解释。讲师可以在课堂上与学生一起编写示例代码。然后鼓励学生发挥主导作用，为一些练习自行编写代码。每章末尾的问题可以作为家庭作业布置给学生，以便他们在下周的课堂上展示代码。本书以项目结尾，展示了如何使用\
    \ Python 探索数学。其中一些项目可以作为作业布置给学生。\n\n请从书中的代码开始，修改它们，拆解它们，将它们颠倒过来，并创建你自己更好的程序。\n\
    \n澳大利亚悉尼，2023 年 10 月\n\nRoozbeh Hazrat\n[r.hazrat@westernsydney.edu.au](mailto:r.hazrat@westernsydney.edu.au)\n\
