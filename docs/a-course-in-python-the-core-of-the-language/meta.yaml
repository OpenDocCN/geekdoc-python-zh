    \ when we were working with lists was the following: Given **x** = {x₁, x₂, ⋯,\
    \ xₙ} and **y** = {y₁, y₂, ⋯, yₙ}, how can one produce {x₁ + y₁, x₂ + y₂, ⋯, xₙ\
    \ + yₙ}?\n\nOne approach is to consider lists as np.array **x** = array([x1, x2,\
    \ ..., xn]) and **y** = array([y1, y2, ..., yn]), then the sum of vectors **x**\
    \ + **y** is what we want. Then, as you might also guess, **x** * **y** would\
    \ produce array([x1 y1, x2 y2, ...,xn yn]), i.e., all arithmetical operations\
    \ performed on array are component-wise.\n\nHowever, there is another product\
    \ in the setting of vectors, namely the *inner product*, which is defined as **x**.**y**\
    \ = x₁y₁ + x₂y₂ + ⋯ + xₙyₙ.\n\nThe following shows how numpy handles these different\
    \ operations.\n\n```\n[83]: x = np.arange(2, 7); y = np.arange(7, 2, -1)\n```\n\
    \n```\n[84]: print('', x, '\\n', y)\n```\n\n```\n[84]: [2 3 4 5 6]\n[7 6 5 4 3]\n\
    ```\n\n```\n[85]: x + y\n```\n\n```\n[85]: array([9, 9, 9, 9, 9])\n```\n\n```\n\
    [86]: x * y\n```\n\n```\n[86]: array([14, 18, 20, 20, 18])\n```\n\n```\n[87]:\
    \ x ** y == [2**7, 3**6, 4**5, 5**6, 6**3]\n```\n\n```\n[87]: array([ True,  True,\
    \  True, False,  True])\n```\n\nIt is known that matrix calculation is a tedious\
    \ job. It will take well over 10 minutes to multiply\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_199_0.png)\n\
    \nby hand, most likely only to obtain a wrong answer!\n\nWe generate a 3×2 matrix\
    \ $A$ defined by $(a_{ij})$ with entries $a_{ij} = i - j$ and a 2×3 matrix $B$\
    \ defined by $b_{ij} = i + j^2$ and calculate the matrix products $A.B$ and $B.A$\
