- md: "## 8.6 Case Study, the Thue–Morse Sequence\n\nTo get the Thue–Morse sequence,\
    \ start with 0 and then repeatedly replace 0 with 01 and 1 with 10. So the first\
    \ four numbers in the sequence are\n\n0\n01\n0110\n01101001\n\nWrite a function\
    \ to produce the n-th element of this sequence.\n\nNow generate the 15th number\
    \ in the Thue–Morse sequence. Then, based on this number, create a graph as follows:\
    \ starting from the coordinate (0, 0), move ahead by one unit if you encounter\
    \ 1 in the Thue–Morse sequence and rotate counterclockwise by an angle of $-\\\
    pi/3$ if you encounter 0. (The resulting curve converges to the Koch snowflake,\
    \ a fractal curve of infinite length containing a finite area – see, for example,\
    \ the Thue–Morse sequence in Wikipedia.)\n\n# Solution\n\nWe start by creating\
    \ the Thue–Morse sequence, using the following clever code!\n\n```python\ndef\
    \ ThueMorse(n):\n    x = '0'\n    for i in range(n-1):\n        x = ''.join(['01'\
    \ if char == '0' else '10' for char in [*x]])\n    return x\n```\n\n```python\n\
    for i in range(1, 8):\n    print(f'{ThueMorse(i)} --the length-- {len(ThueMorse(i))}')\n\
    ```\n\n```\n0 --the length-- 1\n01 --the length-- 2\n0110 --the length-- 4\n01101001\
    \ --the length-- 8\n0110100110010110 --the length-- 16\n01101001100101101001011001101001\
    \ --the length-- 32\n01101001100101101001011001101001100101100110100101100110100110110\
    \ --the length-- 64\n```\n\nNote how quickly the sequence grows.\n\n```python\n\
    len(ThueMorse(15))\n```\n\n```\n16384\n```\n\n```python\nfrom math import sin,\
    \ cos, pi\nimport matplotlib.pyplot as plt\nimport numpy as np\n\ndirections =\
    \ ThueMorse(15)\nL = [[0, 0]]\nfacing = 0\n\nfor step in [*directions]:\n    if\
    \ step == \"1\":\n        L.append([L[-1][0] + cos(facing * pi / 3), L[-1][1]\
    \ + sin(facing * pi / 3)])\n    else:\n        facing = (facing + 1)\nx = np.array(L)[:,\
    \ 0]\ny = np.array(L)[:, 1]\n\nplt.figure(figsize=(5, 5))\nplt.xlim([np.amin(L)\
    \ - 1, np.amax(L) + 1])\nplt.ylim([np.amin(L) - 1, np.amax(L) + 1])\nplt.plot(x,\
    \ y, color='green')\nplt.show()\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_248_0.png)\n\
    \n# Problems\n\n1. Plot the graph\n\n$$f(x) = \\cos^2(x) - e^{-\\sum_{k=1}^{50}\
    \ \\frac{\\cos(kx)}{1+kx}} + e^{-\\sum_{k=1}^{50} \\frac{\\sin(kx)}{1+kx}}$$\n\
    \nfor $x$ ranging over the interval $[0, 2\\pi]$. Then find (numerically) the\
    \ root of the equation $f(x) = 0$ lying between 4 and 5.\n\n2. Plot the graph\
    \ of the expression\n\n$$x(2\\pi - x) \\sum_{n=1}^{50} \\frac{\\sin(nx)}{n}$$\n\
    \nfor $0 \\leq x \\leq 2\\pi$.\n\n3. Consider the function $\\sin(x^2) \\cos(y^2)$.\
    \ Plot the function and its contour. Create an animation, observing how the areas\
    \ change as the plot develops.\n\n4. Let $B_n$ denote the $n \\times n$ matrix\
    \ with $(i, j)$-th entry equal to $1/(|i - j|)$ if $i \\neq j$ and $0$ if $i =\
    \ j$. Find a simple formula to predict the value of the determinant of $B_n$ for\
    \ large values of $n$. What is the largest percentage error that your prediction\
    \ has for $20 \\leq n \\leq 40$? (Hint: Look at the determinants of $B_n$ for\
    \ $2 \\leq n \\leq 10$ first. You will see that predictions are only possible\
    \ for certain subsequences of the integers. Obtain sufficient data for each of\
    \ these subsequences so that you can find a transformation that is approximately\
    \ linear and hence obtain and test a formula for each subsequence. Put the resulting\
    \ formulae together for the final predictive function.)\n\n5. Consider the first\
    \ 10000 digits of $\\sqrt{2}$ and present them as a “random walk” by converting\
    \ them into base 4, representing 4 directions (up, down, left and right). We know\
    \ that $\\sqrt{2}$ is an irrational number and irrational numbers have decimal\
    \ expansions that neither terminate nor become periodic. Write a code to produce\
    \ this random walk. Try this code with $\\sqrt{3}$, $\\sqrt{6}$ and $\\sqrt{13}$.\
    \ Is there any comparison one can make among these numbers?\n\n6. (For this problem,\
    \ see Case study 8.5.) A double sequence $(a_{(m,n)})$ is defined by the rules\n\
    \n$$a_{(1,1)} = a_{(1,2)} = a_{(2,1)} = 1$$\n$$a_{(m,1)} = a_{(m-1,1)} + a_{(m-2,1)}\
    \ \\quad (\\text{if } m > 2)$$\n$$a_{(1,n)} = a_{(1,n-1)} + a_{(1,n-2)} \\quad\
    \ (\\text{if } n > 2)$$\n$$a_{(m,n)} = a_{(m,1)} + a_{(1,n)} - a_{(m-1,n-1)} \\\
    quad (\\text{if } m > 1 \\text{ and } n > 1).$$\n\nThe value of $a_{(10,10)}$\
    \ is 67. Produce a table comparing the values of $a_{(n,n)}$ with $n$ for $1 \\\
    leq n \\leq 20$. Find a simple function that predicts the size of $a_{(n,n)}$\
    \ and compare your predictions for $a_{(30,30)}$ and $a_{(100,100)}$ with the\
    \ correct values.\n\nIf the definition of $a_{(m,n)}$ is altered so that\n\n$$a_{(m,n)}\
    \ = a_{(m,1)} + a_{(1,n)} - 2a_{(m-1,n-1)} \\quad (\\text{if } m > 1 \\text{ and\
    \ } n > 1)$$\n\nthen the terms $a_{(n,n)}$ alternate in sign. By considering separately\
    \ the sequences $a_{(2,2)}, a_{(4,4)}, \\ldots$ and $a_{(1,1)}, a_{(3,3)}, a_{(5,5)},\
    \ \\ldots$ produce (and verify) a simple formula for estimating the values of\
    \ $a_{(n,n)}$ in this case.\n\n7. (For this problem, see Case study 8.5.) Define\
    \ an $n \\times n$ matrix $A_n = (a_{ij})$ whose $i, j$-th entries are\n\n$$a_{ij}\
    \ = \\begin{cases} i + j & \\text{if } i = j \\\\ i^{i+j} & \\text{if } i \\neq\
    \ j. \\end{cases}$$\n\nFind out how long it takes Python to evaluate the inverse\
    \ of $A(n)$ for $n = 15, 16, \\ldots 30$ (this might take some seconds). Hence\
    \ obtain a formula which estimates how long it takes to calculate the inverse\
    \ of $A(n)$ in general. Test this formula experimentally by timing the calculation\
    \ of the inverse of $A(31)$. Use your formula to estimate how long it would take\
    \ to find the inverse of $A(100)$."
  mdcn: "## 8.6 案例研究：Thue–Morse 序列\n\n要得到 Thue–Morse 序列，从 0 开始，然后反复将 0 替换为 01，将 1\
    \ 替换为 10。因此，序列中的前四个数是\n\n0\n01\n0110\n01101001\n\n编写一个函数来生成该序列的第 n 个元素。\n\n现在生成\
    \ Thue–Morse 序列中的第 15 个数。然后，基于这个数，按如下方式创建一个图形：从坐标 (0, 0) 开始，如果在 Thue–Morse 序列中遇到\
    \ 1，则向前移动一个单位；如果遇到 0，则逆时针旋转 $-\\pi/3$ 的角度。（由此产生的曲线收敛于科赫雪花，这是一条无限长但包含有限面积的分形曲线——例如，可参见维基百科中的\
    \ Thue–Morse 序列。）\n\n# 解答\n\n我们首先创建 Thue–Morse 序列，使用以下巧妙的代码！\n\n```python\ndef\
    \ ThueMorse(n):\n    x = '0'\n    for i in range(n-1):\n        x = ''.join(['01'\
    \ if char == '0' else '10' for char in [*x]])\n    return x\n```\n\n```python\n\
    for i in range(1, 8):\n    print(f'{ThueMorse(i)} --the length-- {len(ThueMorse(i))}')\n\
    ```\n\n```\n0 --the length-- 1\n01 --the length-- 2\n0110 --the length-- 4\n01101001\
