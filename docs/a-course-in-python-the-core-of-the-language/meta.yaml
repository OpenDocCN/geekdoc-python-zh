  md: '```

    print(13, ''='', 13 // 3, ''x'', 3 ,''+'', 13 % 3)

    ```


    13 = 4 x 3 + 1


    We will explore the function print more at the end of this chapter.


    **Exercise 1.1** *Show that the number 142857 is cyclic, meaning if we multiply
    it by any of the numbers 1 to 6, the result will be a permutation of the digits
    of the original number 142857.*


    *Solution*


    Later in Chapter 3 we will write a program to find cyclic numbers. Checking a
    number is cyclic, however, is quite easy:


    ```

    print(142857*2, 142857*3, 142857*4,142857*5, 142857*6)

    ```


    285714 428571 571428 714285 857142


    # 1.2 Integers, Reals and Complex Numbers


    Python distinguishes between different classes of numbers. The *integers*, denoted
    by $\mathbb{Z} = \{\cdots, -2, -1, 0, 1, 2 \cdots\}$ in mathematics, are those
    numbers with no decimal points, such as all the numbers we have worked with so
    far, whereas *real numbers* or *floats*, denoted by $\mathbb{R}$, are those with
    decimal points, which are used for approximation, such as 1.2, $\sqrt{2}$ or $\pi$.


    Python can also handle complex numbers using the format a+bj, where $a$ is the
    real part and $b$ is the imaginary part. Here $1j$ is what in the literature is
    commonly denoted by $i$, so that $1j^2 = -1$. But note how Python presents the
    complex numbers. In the example below we also add comments into the code. This
    is done by using # and writing the comment after it.


    ```

    (1j)**2 # 1j represents the imaginary number i

    ```


    (-1+0j)


    As an example, we calculate $(\frac{1}{1} + \frac{1}{2} + \frac{1}{3}) \times
    3$ and $(3 - 6i)^2$.


    ```

    (1/1 + 1/2 + 1/3) * 3

    ```


    5.5


    ```

    (3 - 6j)**2

    ```'
