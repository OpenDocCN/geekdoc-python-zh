    \n*Solution*\n\nLet us define a function $f(n)$ which gives back $(n, n(n+1)(n+2)(n+3)+1)$.\
    \ We then map this function inside the list of integers from 1 to 10.\n\n```python\n\
    import math\n\ndef f(n):\n    x = n * (n + 1) * (n + 2) * (n + 3) + 1\n    return\
    \ x, math.sqrt(x)\n\nlist(map(f, range(1, 11)))\n```\n\n```\n[(1, 1.0),\n (25,\
