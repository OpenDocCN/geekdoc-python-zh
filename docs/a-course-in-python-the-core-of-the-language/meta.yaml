    \n## Springer Undergraduate Mathematics Series\n\n**Editor-in-Chief**\nEndre Süli,\
    \ Oxford, UK\n\n**Series Editors**\nMark A. J. Chaplain, St. Andrews, UK\nAngus\
    \ Macintyre, Edinburgh, UK\nShahn Majid, London, UK\nNicole Snashall, Leicester,\
    \ UK\nMichael R. Tehranchi, Cambridge, UK\n\nThe Springer Undergraduate Mathematics\
    \ Series (SUMS) is a series designed for undergraduates in mathematics and the\
    \ sciences worldwide. From core foundational material to final year topics, SUMS\
    \ books take a fresh and modern approach. Textual explanations are supported by\
    \ a wealth of examples, problems and fully-worked solutions, with particular attention\
    \ paid to universal areas of difficulty. These practical and concise texts are\
    \ designed for a one- or two-semester course but the self-study approach makes\
    \ them ideal for independent use.\n\nRoozbeh Hazrat\n\n## A Course in Python\n\
    \nThe Core of the Language\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_3_0.png)\n\
    \nRoozbeh Hazrat\nCentre for Research in Mathematics and Data Science\nWestern\
    \ Sydney University\nPenrith, NSW, Australia\n\nISSN 1615-2085\nISSN 2197-4144\
    \ (electronic)\nSpringer Undergraduate Mathematics Series\nISBN 978-3-031-49779-7\n\
    ISBN 978-3-031-49780-3 (eBook)\nhttps://doi.org/10.1007/978-3-031-49780-3\n\n\
    Mathematics Subject Classification (2020): 00-01\n\n© The Editor(s) (if applicable)\
    \ and The Author(s), under exclusive license to Springer Nature Switzerland AG\
    \ 2023\nThis work is subject to copyright. All rights are solely and exclusively\
