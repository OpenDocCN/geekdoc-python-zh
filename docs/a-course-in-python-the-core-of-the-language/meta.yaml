    \ 249\n\n## 第 1 章\nPython 基础\n\n## 1.1 基本算术\n\n本章首先介绍如何“开箱即用”地使用 Python，演示如何使用现成的命令、执行基本算术运算并构建计算过程。Python\
    \ 成为许多人首选语言的原因之一是其外部库，这些库提供了强大的工具，可用于研究和分析众多领域的问题。我们将在本章中展示其中一些库，例如使用符号以及符号计算的初步实例。\n\
    \nPython 可以处理各种数值计算，包括精确计算和近似计算。如果我们想计算 $3 \\times 4 \\times 5 \\times 6 + 1$\
    \ 或 $2^{3^4}$，只需将它们正确输入 Python 即可。\n\n```\n[1]: 3 * 4 * 5 * 6 + 1\n```\n\n[1]:\
    \ 361\n\n```\n[2]: 2**3**4\n```\n\n[2]: 2417851639229258349412352\n\nPython 是一个功能强大的计算器，支持基本的算术运算：+、-\
    \ 用于加法和减法，*、** 用于乘法和幂运算。使用圆括号 () 将表达式组合在一起。\n\n```\n[3]: (2**3)**4\n```\n\n[3]:\
    \ 4096\n\n```\n[4]: 2**(3**4)\n```\n\n[4]: 2417851639229258349412352\n\n下面是一个推翻著名数学家欧拉一个有\
    \ 200 年历史的猜想的计算。他猜想三个四次幂之和永远不可能等于另一个四次幂。\n\n```\n[5]: 2682440**4 + 15365639**4\
    \ + 18796760**4\n```\n\n[5]: 180630077292169281088848499041\n\n```\n[6]: 20615673**4\n\
    ```\n\n[6]: 180630077292169281088848499041\n\n最后两个计算表明\n\n2682440⁴ + 15365639⁴\
    \ + 18796760⁴ = 20615673⁴，\n\n这是哈佛大学的诺姆·埃尔基斯在 1988 年发现的，为欧拉的猜想提供了一个反例。\n\nPython\
    \ 的功能更加强大；它可以处理大型精确计算，如下所示。\n\n```\n[7]: 2**9941 - 1\n```\n\n[7]: \n\
    \n如果形如 $2^n - 1$ 的数恰好是素数，则称为 *梅森素数*。回顾一下，*素数* 是指大于 1 且只能被 1 和其自身整除的数。很容易看出 $2^2\
    \ - 1$、$2^3 - 1$ 和 $2^5 - 1$ 都是梅森素数。这个列表还在继续。1963 年，吉列斯发现上述数字 $2^{9941} - 1$ 是一个梅森素数。在我的笔记本电脑上，Python\
    \ 检查这确实是一个素数所需的时间不到 1 秒。迄今为止发现的最大梅森素数是 $2^{82,589,933} - 1$，它有 24,862,048 位数字，于\
    \ 2018 年 1 月被发现。\n\n在整数算术中，Python 可以使用 `//` 和 `%` 处理除法和取余运算。一个事实是，对于两个非零整数 $n$\
    \ 和 $m$，可以写成 $n = mq + r$，其中 $q$ 和 $r$ 是唯一的整数，且满足 $0 \\le r < q$。在 Python 中，我们得到\
    \ `n//m=q` 和 `n % m =r`。下面我们用 $n = 13$ 和 $m = 4$ 来验证这一点。请注意下面示例中函数 `print` 的使用。"
