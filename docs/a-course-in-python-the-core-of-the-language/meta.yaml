    **Exercise 5.11** Let $U$ be a set and $A$ a subset of $U$. Then the complement
    of $A$ is defined as $U\setminus A$ and denoted by $A^c$. One can prove that for
    subsets $A, B \subseteq U$


    $$(A \cup B)^c = A^c \cap B^c$$


    Demonstrate this identity with the example above.


    *Solution*


    We only need to translate this to Python:


    ```

    [77]: U - (A | B) == (U - A) & (U - B)

    ```


    [77]: True


    **Exercise 5.12** Demonstrate the following identities with the example above


    $$A \cap (A \cup B) = A$$


    $$(A \cap B) \cup (A \cup B^c)^c = B$$


    *Solution*


    Again, we need to translate these identities into Python:


    ```

    [78]: A & (A | B) == A

    ```


    [78]: True


    ```

    [79]: (A & B) | (U - (A | (U - B))) == B

    ```


    [79]: True'
