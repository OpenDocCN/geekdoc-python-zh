    - 4xy + y^2} - \frac{648x^2y^3}{4x^2 - 4xy + y^2} - \frac{1296xy^4}{4x^2 - 4xy
    + y^2} + \frac{1296y^5}{4x^2 - 4xy + y^2}$$


    The method `factor` can do the inverse of `expand`, namely factorise an expression.


