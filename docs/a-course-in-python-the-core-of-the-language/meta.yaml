    & \text{if } 1 \le |x| < 2 \\ \sum_{n=1}^{10} \cos\left(\frac{x}{n}\right), &
    \text{otherwise.} \end{cases}$$


    How many roots does $f(x)$ have in the interval $[-4, 4]$?


    ## Further Reading


    There are many excellent books about Python. Once one knows the core of the language,
    one can easily use these books. Here we collect a few books that are worth consulting.


    - Eric Matthes, *Python Crash Course*, 3rd Edition, No Starch Press, 2022.

    This comprehensive beginner-level book on Python contains many interesting worked
    out projects.


    - Jake VanderPlas, *A Whirlwind Tour of Python*, O’Reilly Media, 2016.

    This excellent book gives a concise overview of how to use Python and the philosophy
    behind its design.


    - Michael T. Goodrich, Roberto Tamassia, and Michael H. Goldwasser, *Data Structures
    and Algorithms in Python*, Wiley, 2013.

    This is an introduction to practical computer science and an excellent source
    for mathematics and data science students.


    - Mark Lutz, *Learning Python*, 5th Edition, O’Reilly Media, 2013.

    A comprehensive treatment of Python for more experienced readers which can be
    used as a reference book as well.


    - Eli Stevens, Luca Antiga, and Thomas Viehmann, *Deep Learning with PyTorch*,
    Manning, 2020.

    This book provides more advanced uses of Python in data science.


    - T. Andreescu, R. Gelca, *Mathematical Olympiad Challenges*, Birkhäuser, 2nd
    ed. 2009.

    - S. Rabinowitz, *Index to Mathematical Problems 1980–1984*, Math pro Press. 1992.


    Many of the examples in the present book have been inspired by mathematical problems
    from previous mathematical olympiads. The above two books have a wonderful collection
    of such problems.


