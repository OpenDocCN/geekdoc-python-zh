    filter(lambda n: (n**2+ (n+1)**2) % 1997 == 0, range(1,20000))


    is an iterator and in itself will not perform the calculations. It needs us to
    prompt it to start the calculations. The command list will do just that, and the
    iterator will go through the whole range and create a list. The command len then
    gives us the length of this list.


