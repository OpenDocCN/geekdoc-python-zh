    \ developed.\nThe use of general descriptive names, registered names, trademarks,\
    \ service marks, etc. in this publication does not imply, even in the absence\
    \ of a specific statement, that such names are exempt from the relevant protective\
    \ laws and regulations and therefore free for general use.\nThe publisher, the\
    \ authors, and the editors are safe to assume that the advice and information\
    \ in this book are believed to be true and accurate at the date of publication.\
    \ Neither the publisher nor the authors or the editors give a warranty, expressed\
    \ or implied, with respect to the material contained herein or for any errors\
    \ or omissions that may have been made. The publisher remains neutral with regard\
    \ to jurisdictional claims in published maps and institutional affiliations.\n\
    \nThis Springer imprint is published by the registered company Springer Nature\
    \ Switzerland AG\nThe registered company address is: Gewerbestrasse 11, 6330 Cham,\
    \ Switzerland\n\nPaper in this product is recyclable.\n\n## Preface\n\nPython\
    \ has become, for good reason, a very popular programming language, with a substantial\
    \ number of followers around the globe. In addition to its intuitive programming\
    \ language, Python now offers numerous libraries which provide powerful tools\
    \ and methods to do, among many other things, mathematics, physics, text processing,\
    \ and musical composition. Once one grasps the core of the language, then help,\
    \ hints, and a wealth of sample codes are just a google away.\n\nBesides many\
    \ books on Python, there is an uncountable number of documents on the internet.\
    \ However, I wanted to have one source that I can follow to systematically teach\
    \ (or learn) the core of the language before diving into more advanced fronts.\
    \ I also wanted to have a source that is short, to the point and which provides\
    \ interesting programming examples; examples that I enjoy coding, modifying and\
    \ experimenting with.\n\nThis book grew out of a course I gave at Western Sydney\
    \ University. It allows the reader to learn Python by going through interesting\
    \ exercises step by step, with short and concise explanations. I have tried to\
    \ let the reader learn from the codes and avoid long and exhausting explanations,\
    \ as the codes will speak for themselves. Also I have tried to inspire the reader’s\
    \ imagination by showing that in Python (as in the real world) there are many\
    \ ways to approach a problem and solve it.\n\nThus, this book could be considered\
    \ for a course in Python, or for self-study. It mainly concentrates on the core\
    \ of Python programming. I have mostly chosen problems having something to do\
    \ with natural numbers as they do not need any particular background. The codes\
    \ have been written in Jupyter using Python version 3.\n\n**Acknowledgement.**\
    \ My thanks go to Thomas Fischbacher from Google Research for going through the\
    \ book and providing insightful comments; to the students at Western Sydney University\
    \ for their contributions to the classes, which made them lively and enjoyable,\
    \ and to the anonymous referees for their support and feedback. My thanks also\
    \ go to Dr. Remi Lodh at Springer for his generous support throughout the preparation\
    \ of the book.\n\n**How to use the book.** This book can be used as a one semester\
    \ course in programming in Python (13 weeks, 3 hours each week) at the undergraduate\
    \ level or a compact crash course (4 days, 6 hours each day) for more advanced\
    \ students. Each chapter starts with a description of new tools and topics and\
    \ provides examples. The examples are chosen so that the reader can learn from\
    \ the codes by typing and running them and then modifying them and experimenting\
    \ with them. Long and exhausting explanations are avoided. The lecturer can code\
    \ the examples in the class along with students. The students are then encouraged\
    \ to take the lead role and compose codes themselves for some of the exercises.\
    \ The problems at the end of each chapter can be given to students as homework\
    \ so that they present the codes in the class the next week. The book concludes\
    \ with projects which demonstrate how to use Python to explore mathematics. Some\
    \ of these projects can be given as assignments to the students.\n\nPlease start\
    \ with the codes in the book, change them, tear them apart and turn them upside\
    \ down, and create your own better programs.\n\nSydney, Australia, October 2023\n\
    \nRoozbeh Hazrat\n[r.hazrat@westernsydney.edu.au](mailto:r.hazrat@westernsydney.edu.au)\n\
