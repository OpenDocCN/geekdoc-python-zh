    \       [y_n, y_n, ., ., y_n]])]]\n```\n\nWe can use `meshgrid` effectively to\
    \ create the contours of functions.\n\n```python\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\n\npoints = np.arange(-np.pi, np.pi, 0.01)\nxs, ys = np.meshgrid(points,\
