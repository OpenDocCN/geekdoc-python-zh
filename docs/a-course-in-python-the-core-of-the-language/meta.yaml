- md: "## 5.1.1 Putting conditions on parameters\n\nIn building up codes via list\
    \ comprehension, we can introduce conditions inside the list in a natural way.\
    \ As a first example, we write a program to generate all numbers between 1 and\
    \ 50 which are divisible by 7.\n\nMathematically speaking, this is the set\n\n\
    $\\{n \\mid 0 \\leq n \\leq 50, \\text{ and } 7 \\mid n\\}$.\n\nIn Python, using\
    \ list comprehension, we can create this list, in a similar manner\n\n```\n[n\
    \ for n in range(0, 51) if n % 7 == 0]\n```\n\n[0, 7, 14, 21, 28, 35, 42, 49]\n\
    \nBuilding on the previous code, here is a list of numbers between 1 and 199 which\
    \ are divisible by 3 and by 5 but not by 7.\n\n```\n[n for n in range(1, 200)\
    \ if n % 3 == 0 and n % 5 == 0 and not(n % 7 == 0)]\n```\n\n[15, 30, 45, 60, 75,\
    \ 90, 120, 135, 150, 165, 180, 195]\n\n```\n[n for n in range(1, 200) if n % 15\
    \ == 0 and not(n % 7 == 0)]\n```\n\n[15, 30, 45, 60, 75, 90, 120, 135, 150, 165,\
    \ 180, 195]\n\nNotice how naturally one can incorporate the conditions inside\
    \ the list comprehension.\n\n```\n[(n, 'even') if n % 2 == 0 else (n, 'odd') for\
    \ n in range(1,10)]\n```\n\n[(1, 'odd'), (2, 'even'), (3, 'odd'), (4, 'even'),\
    \ (5, 'odd'), (6, 'even'), (7, 'odd'), (8, 'even'), (9, 'odd')]\n\n**Exercise\
    \ 5.2** Suppose a list contains numbers and text. Write a code to extract all\
    \ the text from the list.\n\n### Solution\n\nWe create the list and then use list\
    \ comprehension to collect the data.\n\n```\n[12]: x = ['Sydney', 20, 2.8, 'Brisbane',\
    \ -12, [1,2,3], 'babble']\n```\n\n```\n[13]: x_text = [item for item in x]; x_text\n\
    ```\n\n```\n[13]: ['Sydney', 20, 2.8, 'Brisbane', -12, [1, 2, 3], 'babble']\n\
    ```\n\n```\n[14]: x_text = [item for item in x if type(item) == str]\n```\n\n\
    ```\n[15]: x_text\n```\n\n```\n[15]: ['Sydney', 'Brisbane', 'babble']\n```\n\n\
    ```\n[16]: x_rest = [item for item in x if type(item) != str]\n```\n\n```\n[17]:\
    \ x_rest\n```\n\n```\n[17]: [20, 2.8, -12, [1, 2, 3]]\n```\n\n```\n[18]: x_text\
    \ + x_rest\n```\n\n```\n[18]: ['Sydney', 'Brisbane', 'babble', 20, 2.8, -12, [1,\
    \ 2, 3]]\n```\n\nRecall the notion of Pythagorean pairs $(m,n)$, i.e., pairs $(m,n)$\
    \ such that $m^2 + n^2$ is a square number. We use list comprehension to find\
    \ Pythagorean pairs.\n\n```\n[19]: import math\n\n[(m, n) for m in range(1, 10)\
    \ for n in range(1, 10)\n        if math.sqrt(m**2 + n**2).is_integer()]\n```\n\
    \n```\n[19]: [(3, 4), (4, 3), (6, 8), (8, 6)]\n```\n\nAs $(6,8)$ and $(8,6)$ are\
    \ the same pair for us, in order to avoid repetition, we can start the second\
    \ loop from the starting point of the first loop.\n\n```\n[20]: [(m, n) for m\
    \ in range(1, 10) for n in range(m, 10)\n        if math.sqrt(m**2 + n**2).is_integer()]\n\
    ```\n\n```\n[20]: [(3, 4), (6, 8)]\n```\n\nOnce we have the basic code, it is\
    \ easy to modify it and obtain interesting Pythagorean pairs. For example, one\
    \ can change the above code so that $m = n + 10$, so we are looking for Pythagorean\
    \ pairs $(m, m + 10)$.\n\n## 5.1 List Comprehension\n\n```\n[(m, n) for m in range(1,\
    \ 500) for n in range(m, 500)\n         if math.sqrt(m**2 + n**2).is_integer()\
    \ and n == m + 10]\n```\n\n[(30, 40), (200, 210)]\n\nOne should be aware of the\
    \ order of the loops created in the list comprehension. The outer-loop is the\
    \ one which should be completed first before the inner-loop runs again. The following\
    \ codes will clarify the difference:\n\n```\n[(i, j) for i in range(1, 4) for\
    \ j in ['a', 'b', 'c']]\n```\n\n[(1, 'a'),\n (1, 'b'),\n (1, 'c'),\n (2, 'a'),\n\
    \ (2, 'b'),\n (2, 'c'),\n (3, 'a'),\n (3, 'b'),\n (3, 'c')]\n\nThe above code\
    \ should be compared with the following.\n\n```\nL = []\nfor i in range(1, 4):\n\
    \    for j in ['a', 'b', 'c']:\n        L.append((i, j))\nL\n```\n\n[(1, 'a'),\n\
    \ (1, 'b'),\n (1, 'c'),\n (2, 'a'),\n (2, 'b'),\n (2, 'c'),\n (3, 'a'),\n (3,\
    \ 'b'),\n (3, 'c')]\n\n**Exercise 5.3** *Show that the only n less than 1000 such\
    \ that*\n$$3^n + 4^n + \\cdots + (n+2)^n = (n+3)^n$$\n*are the numbers 2 and 3.*\n\
    \n### Solution\n\nRecall the function sum gives the sum of the entries of a list.\n\
    \n```\nfor n in range(1, 1001):\n    x = [i**n for i in range(3, n+3)]\n    if\
    \ sum(x) == (n + 3)**n:\n        print(n)\n```\n\n[24]: 2\n3\n\nWe can incorporate\
    \ the above code into one long (nested) list comprehension. We leave it to the\
    \ reader to judge which code is easier to read and understand.\n\n```\n[n for\
    \ n in range(1, 1001) if\n    sum([i**n for i in range(3, n+3)])\n    == (n +\
    \ 3)**n]\n```\n\n[25]: [2, 3]\n\n**Exercise 5.4** *Recall the Collatz function*\n\
    \n$$f(x) = \\begin{cases} x/2 & \\text{if } x \\text{ is even} \\\\ 3x+1 & \\\
    text{if } x \\text{ is odd.} \\end{cases}$$\n\n*and produce $f(n), 1 \\le n <\
    \ 20$, using list comprehension.*\n\n### Solution\n\nHere is the code:\n\n```\n\
    [n//2 if n % 2 == 0 else 3 * n + 1 for n in range(1, 20)]\n```\n\n[26]: [4, 1,\
    \ 10, 2, 16, 3, 22, 4, 28, 5, 34, 6, 40, 7, 46, 8, 52, 9, 58]\n\n**Exercise 5.5**\
    \ *Find the first 5 positive integers $n$ such that $n^6 + 1091$ is prime. Show\
    \ that all these $n$ are between 3500 and 8500.*\n\n### Solution\n\nWe will be\
    \ using the isprime function available in sympy to test the numbers.\n\n## 5.1\
    \ List Comprehension\n\n```\n[27]: from sympy import isprime\n```\n\nSince the\
    \ question gives a clue how far one needs to go, we create a list range(1, 10000)\
    \ and check among $n$ in this list when $n^6 + 1091$ is prime.\n\n```\n[28]: [n\
    \ for n in range(1, 10000) if isprime(n**6 + 1091)]\n```\n\n```\n[28]: [3906,\
    \ 4620, 5166, 5376, 5460, 8190]\n```\n\nIf one didn't know how far one needs to\
    \ go to get all five positive $n$ such that $n^6+1091$ is prime, one option would\
    \ have been to create a while loop.\n\n```\n[29]: count = 0\nn = 0\nwhile count\
    \ < 5:\n    n += 1\n    if isprime(n**6 + 1091):\n        print(n)\n        count\
    \ += 1\n```\n\n```\n[29]: 3906\n4620\n5166\n5376\n5460\n```\n\n**Exercise 5.6**\
    \ Determine all the positive integers $n$ between 3 and 50 for which $2^{2008}$\
    \ is divisible by\n$$1 + \\binom{n}{1} + \\binom{n}{2} + \\binom{n}{3}.$$\n\n\
    ### Solution\n\nRecall that the binomial coefficient (the number of ways of choosing\
    \ $m$-items among $n$-items) is\n$$\\binom{n}{m} := \\frac{n!}{m!(n-m)!}.$$\n\n\
    Both the factorial and the binomial coefficient comb are available in the math\
    \ library.\n\n```\n[30]: from math import comb, factorial\n```\n\nWe first check\
    \ the method comb against the definition!\n\n```\n[31]: comb(5,3) == factorial(5)\
    \ // (factorial(3) * factorial(5 - 3))\n```\n\n[31]: True\n\n```\n[n for n in\
    \ range(3, 51) if 2**2008 % (1 + comb(n,1) + comb(n,2) + comb(n,3)) == 0]\n```\n\
    \n[32]: [3, 7, 23]\n\nWe now write Exercise 1.6 with list comprehension.\n\n**Exercise\
    \ 5.7** Let m be a natural number and\n\n$$A = \\frac{(m+3)^3 + 1}{3m}.$$\n\n\
    Find all the integers m less than 500 such that A is an integer. Show that A is\
    \ always odd.\n\n### Solution\n\nWe define the function $A(m)$ and then compose\
    \ a list comprehension to find $m$'s such that $A(m)$ is an integer\n\n```\ndef\
    \ A(m):\n    return ((m + 3)**3 +1)/(3*m)\n\n[m for m in range(1,500) if A(m).is_integer()]\n\
    ```\n\n[33]: [2, 14]\n\nHere is yet another way to write the code using functional\
    \ programming.\n\n```\ndef A(m):\n    A = ((m + 3)**3 +1)/(3*m)\n    return A.is_integer()\n\
    \nlist(filter(A, range(1, 500)))\n```\n\n[34]: [2, 14]\n\n## 5.2 Sets and Dictionaries\n\
    \n**Exercise 5.8** *Explain what the following code does:*\n\n```\npython\nimport\
    \ math\n\nisprime = lambda x: all(x % k for k in range(2, 1 + math.isqrt(x)))\n\
    [n for n in range(350, 400) if isprime(n**2 + n + 1)]\n```\n\n```\noutput\n[351,\
    \ 357, 369, 378, 381, 383, 392, 395, 398]\n```\n\n### Solution\n\nThe `all()`\
    \ function returns True if all items in an iterable are true, otherwise it returns\
    \ False. The tuple comprehension `(x % k for k in range(2, 1 + math.isqrt(x)))`\
    \ checks if the number $x$ is divisible by numbers up to $\\sqrt{x}$. If there\
    \ is an instance when $x$ is indeed divisible, then $x \\% k$ returns 0. Within\
    \ Boolean statements, all positive numbers represent True and zero represent False.\
    \ Thus if there is one number dividing $x$, using `all` the combinations of Boolean\
    \ outputs inside the tuple comprehension is False, otherwise the result is True\
    \ meaning no number divides $x$, i.e., $x$ is a prime number. The next list comprehension\
    \ in the code uses this prime test to find prime numbers of the form of $n^2+n+1$\
    \ for $350 \\le n \\le 400$.\n\n## 5.2 Sets and Dictionaries\n\n### 5.2.1 Sets\n\
    \nTo handle a collection of data, we have worked with `list` and `tuple`. With\
    \ `list` we can collect data, access the elements, and modify the list by adding\
    \ or deleting items, i.e. they are mutable objects. `tuples` are immutable but\
    \ we can still access their elements.\n\nNext we introduce two more objects for\
    \ handling data, `sets` and `dictionaries`. The concept of `sets` in Python is\
    \ the closest to the notion of sets in mathematics: a collection of data where\
    \ order and duplications of members does not change the set.\n\n```\npython\n\
    X = {1, 2, 3, 2, 1}\n```\n\n```\npython\nX\n```\n\n```\noutput\n{1, 2, 3}\n```\n\
    \n```\npython\n{1, 2} == {2, 1}\n```"
