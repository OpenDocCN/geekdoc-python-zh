    # Chapter 6

    The sympy Library


    # 6.1 sympy, Symbolic Python


    One of the abilities of Python, via its library sympy, is to handle symbolic computations,
    i.e., Python can comfortably work with symbols (we have seen some examples of
    this already in Chapter 1). Working symbolically allows one to treat the situation
    “abstractly” without assigning any value to the parameters. When it is needed,
    one can then assign specific objects to the parameters. The sympy library also
    allows us to do calculus symbolically, solve equations and calculate derivatives
    and integrals. In this chapter we will look at some of these features.


    As a first example, consider the expression $(x + y)^2$. One can use Python to
    expand this expression symbolically. All we need to do is to import the library
    sympy, introduce the symbols x and y to the program, and then use the method expand.


    ```

    from sympy import symbols, factor, expand

    ```


    ```

    x = symbols(''x'')

    y = symbols(''y'')

    ```


    ```

    x + y

    ```


    $x + y$


    One can also introduce a sequence of symbols


    ```

    x, y = symbols(''x y'')

    ```


    ```

    x**2 + y**2

    ```


    $x^2 + y^2$


    As one can see, Python can now handle the symbols x and y.'
