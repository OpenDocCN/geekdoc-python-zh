    def B(n):\n    mat = np.empty([n, n])\n    for i in range(n):\n        for j in\
    \ range(n):\n            i += 1; j += 1\n            if (i > j):\n           \
    \     e = 1/(i**2 - j)\n            elif (j > i):\n                e = 1/(j -\
