  - "[PAGE 78]\n\n# 3.3.2 Nested For-loops\n\nIn many applications there are several\
    \ factors (variables) which change simultaneously, and this calls for what we\
    \ call a *nested loop*. Instead of trying to describe the situation abstractly,\
    \ let us look at some examples.\n\nLet us find all the pairs $(n, m)$ for $n,\
    \ m \\le 10$ such that $n^2 + m^2$ is a square number (e.g., $(3, 4)$ as $3^2\
    \ + 4^2 = 5^2$).\n\nNote that here we are working with two parameters $n$ and\
    \ $m$, and each of them has a range between 1 and 10. We can design two for-loops,\
    \ each taking care of one of the variables.\n\n```\nfor n in range(1, 11):\n \
    \   for m in range(1, 11):\n        if math.sqrt(n**2 + m**2).is_integer():\n\
    \            print(n, \" \", m)\n```\n\n```\n3    4\n4    3\n6    8\n8    6\n\
    ```\n\nHere the outer loop starts with the counter $n$ getting the value 1. Then\
    \ it is the turn of the block inside this loop, which is again another loop run.\
    \ In the inner loop $m$ in $(1, 11)$ makes the counter $m$ run from 1 to 10. This\
    \ done, in the outer loop $n$ takes the value 2 and then $m$ runs from 1 to 10\
    \ and so on, each time checking whether $\\sqrt{n^2 + m^2}$ is an integer. This\
    \ is done with a method available in floats, namely `.is_integer`.\n\nAs one can\
    \ see, we get the pairs $(3, 4)$ and $(4, 3)$, which for us are the same answer.\
    \ In order to remove this repetition, we can modify the code.\n\n```\nfor n in\
    \ range(1, 11):\n    for m in range(n, 11):\n        if math.sqrt(n**2 + m**2).is_integer():\n\
    \            print(n, \" \", m)\n```\n\nThe reader should see that in the inner\
    \ loop, $m$ needs to start from $n$ and goes all the way to 10. This is enough\
    \ to find all the pairs up to 10 with the desired property. Can you say how many\
    \ times the `if` line is going to be performed?\n\n**Exercise 3.16** *Pick an\
    \ odd number $p$. Then find a pair $(q, r)$ of positive integers such that $p^2\
    \ + q^2 = r^2$.*"
