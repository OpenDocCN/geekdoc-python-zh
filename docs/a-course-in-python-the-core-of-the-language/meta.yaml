    \ was valid.\n\n## Exercise 7.3 Consider the system of equations\n\n$$\\begin{cases}\
    \ 3x + 2y - 4z = 2 \\\\ 3x + 2y - (4 + R)z = \\frac{1}{2} \\\\ 3x + (2 + S)y -\
    \ 4z = 3. \\end{cases}$$\n\nFirst find the unique solution for this system when\
    \ R = 0.05 and S = −0.05. Next explore if R and S change, how the solution behaves,\
    \ and how far the new solution would be from initial solution.\n\n## Solution\n\
    \nThis interesting problem was investigated by Shiskowski and Frinkle (Example\
    \ 3.3.5) in their book *Principles of Linear Algebra with Mathematica*, Wiley\
    \ & Sons, 2011.\n\nWe first define the coefficient matrix and the value matrix\
    \ in order to use numpy’s linear system solve method.\n\n```python\nimport numpy\
    \ as np\n\ndef sys(r,s):\n    A = np.array([[3, 2, -4], [3, 2, -4 - r], [3, 2\
    \ + s, -4]])\n    return A\n\np = np.array([2, 1/2, 3])\n\nsys(0.05, -0.05)\n\
    ```\n\n```\narray([[ 3.  ,  2.  , -4.  ],\n       [ 3.  ,  2.  , -4.05],\n   \
    \    [ 3.  ,  1.95, -4.  ]])\n```\n\n```python\ninit_sol = np.linalg.solve(sys(0.05,\
    \ -0.05), p)\n\ninit_sol\n```\n\n```\narray([ 54., -20., 30.])\n```\n\nIf we change\
    \ the $s$ slightly, the solutions change substantially.\n\n```python\nnp.linalg.solve(sys(0.01,\
    \ -0.1), p)\n```\n\n```\narray([207.33333333, -10., 150. ])\n```\n\nThe following\
    \ graph explains why this system of equations is so sensitive to changes of $R$\
    \ and $S$. The planes are almost parallel, so a slight change to $R$ or $S$ will\
    \ move the intersection of the planes by a large margin.\n\n```python\nfrom sympy.plotting\
    \ import plot3d\nfrom sympy import symbols\n\ndef p1(x, y):\n    return (3 * x\
    \ + 2 * y - 2) / 4\n\ndef p2(x, y, r):\n    return (3 * x + 2 * y - 1/2) / (4\
    \ + r)\n\ndef p3(x, y, s):\n    return (3 * x + (2 + s) * y - 3) / 4\n\nx, y =\
