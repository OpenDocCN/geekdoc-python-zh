    [3]: plt.plot(range(1, 20), range(1,20), ''b.'');

    plt.plot(range(20, 1, -1), range(1,20), ''r^'');

    plt.plot(range(1, 21), [10 for i in range(1, 21)], color=''green'', marker=''o'',
    linestyle=''dashed'');

    ```


    ![](img/fbc0c32b1e2a040146ee86ae9f103987_216_0.png)


    Staying with lists, we calculate the sin function for certain values and plot
    the result.


    ```

    [4]: import math


    x = range(-10, 10)

    y = [math.sin(i) for i in x]

    ```


    ```

    [5]: plt.plot(x, y, ''g^-'');

    ```


    ![](img/fbc0c32b1e2a040146ee86ae9f103987_216_1.png)


    We won''t spend too much time on how to style the outputs. The examples below
    show some samples and the codes for any combinations and decorations one has in
    mind are just a google away.


    As mentioned, matplotlib works perfectly with numpy. This allows us to do all
    kind of calculations with ease, since numpy allows the use of universal functions,
    i.e. we can apply functions to each component of the array.


    The example below produces the plot of the function sin(x)/x, where -10 ≤ x ≤
    10.


    ```

    [6]: import numpy as np

    import matplotlib.pyplot as plt


    x = np.arange(-10, 10, 0.2)

    plt.plot(x, np.sin(x)/x, ''g^-'');

    ```'
