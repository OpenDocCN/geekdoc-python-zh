    \ = 3 \\\\ 10x - y = 5. \\end{cases}$$\n\n*Find the unique solution to these equations.*\n\
    \n## Solution\n\nRepresenting this system via the language of matrices points\
    \ to a natural way to use matrix calculus to solve the equations. Writing\n\n\
    $$\\begin{pmatrix} 3 & 2 \\\\ 10 & -1 \\end{pmatrix} \\begin{pmatrix} x \\\\ y\
    \ \\end{pmatrix} = \\begin{pmatrix} 3 \\\\ 5 \\end{pmatrix}$$\n\nthen clearly\n\
    \n$$\\begin{pmatrix} x \\\\ y \\end{pmatrix} = \\begin{pmatrix} 3 & 2 \\\\ 10\
    \ & -1 \\end{pmatrix}^{-1} \\begin{pmatrix} 3 \\\\ 5 \\end{pmatrix}.$$\n\nNow\
    \ we use numpy to compute the inverse of the matrix and get the result.\n\n```python\n\
    import numpy as np\n\nA = np.array([[3, 2], [10, -1]])\nB = np.array([3, 5])\n\
    ```\n\nThe library numpy provides a method to calculate the inverse of non-singular\
    \ matrices.\n\n```python\ninv_A = np.linalg.inv(A)\nprint(inv_A)\n```\n\n```\n\
    [[ 0.04347826  0.08695652]\n [ 0.43478261 -0.13043478]]\n```\n\nSo the solution\
    \ to this system of equations is:\n\n```python\nprint(np.dot(inv_A, B))\n```\n\
    \n```\n[0.56521739 0.65217391]\n```\n\nOr we could use the matrix object's dot\
    \ method and do all these in one line:\n\n```python\nnp.linalg.inv(A).dot(B)\n\
    ```\n\n```\narray([0.56521739, 0.65217391])\n```\n\nIn fact numpy also provides\
    \ a method to solve the system of equations directly.\n\n```python\nnp.linalg.solve(A,B)\n\
    ```\n\n```\narray([0.56521739, 0.65217391])\n```\n\nGetting help from sympy graphics\
    \ from Chapter 6, we plot the lines 3x + 2y = 3 and 10x - y = 5 and observe that\
    \ they indeed intersect at one point.\n\n```python\nfrom sympy import symbols,\
    \ Eq\nfrom sympy import plot_implicit\n\nx, y = symbols('x y')\n\np1 = plot_implicit(Eq(3\
    \ * x + 2 * y, 3), (x, -2, 2), (y, -2, 2), line_color='blue', show=False);\np2\
    \ = plot_implicit(Eq(10 * x - y, 5), (x, -2, 2), (y, -2, 2), line_color='green',\
    \ show=False);\np1.append(p2[0])\np1.show()\n```\n\n![](img/fbc0c32b1e2a040146ee86ae9f103987_202_0.png)\n\
    \nA remark is in order. We did multiply a 2 × 2 matrix A with 2 × 1 matrix B.\
