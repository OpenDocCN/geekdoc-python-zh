    # ## 8.5 Case Study, Predictive Estimation


    In many applications as the size increases, the time it takes to complete the
    task also increases. The following case study is a good example showcasing how
    we can'
  merge: -1
  pgno: 238
- img_proc: true
  md: 'analyse the time dependence of an algorithm. Let us donate the size of an application
    by **n** and the time it takes to run the program and obtain the result by **t**.
    It rarely happens that the relationship between the size and time is linear, i.e.,
    **t** = *k* **n** + *l*, for some constants *k* and *l*. If this is the case,
    then by sampling some small **n** and measuring **t**, and plotting (**n**, **t**),
    we should obtain a straight line. If this is not the case (and again oftentimes
    it is not), and if the relation is of the form


    **t** = *k* **n**<sup>*l*</sup>


    or


    **t** = *k* *l*<sup>**n**</sup>,


    then we might also be able to find the relation by running the program for small
    values of **n**.


    Suppose the relation is of the form **t** = *k* **n**<sup>*l*</sup>. Then taking
    logs we have


    log(**t**) = *l* log(**n**) + log(*k*).


    Now if we run the application for some (small) values of **n**, measure the time
    it takes to complete the task, and then plot log(**t**) versus log(**n**), we
    should end up with a straight line. This will then be an indication that the relation
    between **t** and **n** is indeed of the form **t** = *k* **n**<sup>*l*</sup>.
    If the graph we obtain does not look like a straight line, then we can consider
    the next case of **t** = *k* *l*<sup>**n**</sup>. Taking logs we get


    log(**t**) = **n** log(*l*) + log(*k*).


    In this case, the graph of log(**t**) versus **n** should create a straight line.


    Once this is done, we can use regression methods available in Python to get a
    least-squares best fit linear approximation to the line. Thus we get an equation
    of line *y* = *ax* + *b* which approximates the sample. Once we have the equation
    of the line, we should be able to calculate the constants *k* and *l*. This is
    done by using the identity e<sup>log(*x*)</sup> = *x*.


    Case study


