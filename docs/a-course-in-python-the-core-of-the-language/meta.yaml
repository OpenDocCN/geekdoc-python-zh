    Mathematical operations on sets such as union, intersection, and complements are
    available within set objects. We are going to demonstrate these methods with two
    sets; the set of prime numbers smaller than 20 and the set of odd numbers up to
    20.


    ```

    [40]: X = {2, 3, 5, 7, 11, 13, 17, 19}

    ```


    ```

    [41]: Y = {3, 5, 7, 9, 11, 13, 15, 17, 19}

    ```


    Recall the operations of the union and intersection of two sets:


    $X \cup Y = \{x \mid x \in A \text{ or } x \in B\}$


    $X \cap Y = \{x \mid x \in A \text{ and } x \in B\}$.


    ```

    [42]: X.union(Y)

    ```


    [42]: {2, 3, 5, 7, 9, 11, 13, 15, 17, 19}


    ```

    [43]: X.union([''a'',''b''])

    ```


    [43]: {11, 13, 17, 19, 2, 3, 5, 7, ''a'', ''b''}


    Note that union is a method belonging to the set object. However this method does
    not change the object.


    ```

    [44]: X

    ```


    [44]: {2, 3, 5, 7, 11, 13, 17, 19}


    ```

    [45]: X | Y == X.union(Y)

    ```


    [45]: True


    ```

    [46]: X & Y == X.intersection(Y)

    ```


    [46]: True'
