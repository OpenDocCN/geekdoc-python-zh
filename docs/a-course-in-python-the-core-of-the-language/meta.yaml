    \n## 2.2 列表作为对象\n\n回想一下，Python中的一切都是对象，每个对象都有自己的工具（即方法）。从这个角度看，列表是我们可以修改的对象，即所谓的*可变*对象。不能修改的对象称为*不可变*对象。我们已经见过一个一旦创建就不能修改的对象，即整数对象。\n\
