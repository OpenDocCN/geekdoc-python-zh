    \ $c_{m-2} + \\frac{1}{c_{m-1} + \\frac{1}{c_m}}$。这个过程可以用以下代码捕捉\n$$s = 0$$\n$$\\\
    text{for } i \\text{ in } c[: : -1]:$$\n$$\\quad s = i + 1/s$$\n通常，在循环的第一轮，和 $s$\
    \ 会从 0 开始。然而，这种情况下，由于我们使用了 $1/s$，会得到错误信息。一个聪明的避免方法是在代码内部定义一个 if 语句来检查 $s$ 的值是否为零，如果是，则忽略\
    \ $1/s$。\n\n```python\ndef f(*c):\n    s=0\n    for i in c[: : -1]:\n        s\
    \ = i + (1/s if s !=0 else 0)\n    return s\n```"
