    \n**Exercise 6.14** Let $A = (a_{ij})$ denote the $4 \\times 4$ matrix with\n\n\
    $$a_{ij} = x^i + x^j + x^{ij}.$$\n\nSymbolically compute the determinant of $A$?\
    \ If $x = \\sqrt{2}$, what is the inverse of the matrix $A$?\n\n*Solution*\n\n\
    Note that the entries of the matrix contain the symbol $x$. Thus sympy is the\
    \ library to use here to define the function. We can pass the symbol $x$ inside\
    \ the function m. This function puts together the matrix. It consists of a nested\
    \ loop, the first loop taking care of the rows and the other loop putting together\
    \ the entries of each row.\n\n```\nfrom sympy import symbols, det, Matrix, sqrt,\
