  md: '[12]: (-27-36j)


    Since $i^2 = -1$, it is easy to see $(a + bi)(a - bi) = a^2 + b^2$. We check this
    with an example.


    ```

    [13]: (2 - 3j)*(2 + 3j)

    ```


    [13]: (13+0j)


    One of the reasons why Python has become so popular is that it has a large number
    of libraries which contain ready to use tools and functions. Various mathematical
    functions such as sin, cos or $\sqrt{}$ and log are available in different libraries
    of Python. The first library we will use is math, which makes many of these functions
    available to us. Note how we import this library into Python and how the functions
    (or methods) are used from this library. Once we have imported the library, we
    can access its built-in functions via dot “.”.


    ```

    [14]: import math


    math.pi

    ```


    [14]: 3.141592653589793


    ```

    [15]: math.sin(math.pi/2)

    ```


    [15]: 1.0


    **Exercise 1.2** *Show that for any chosen angle $x$, Python gives $\sin^2(x)
    + \cos^2(x) = 1$.*


    *Solution*


    As an instance, choosing $\pi/5$ for the angle and translating the expression
    correctly into Python, we have


    ```

    [16]: math.sin(math.pi/5)**2 + math.cos(math.pi/5)**2

    ```


    [16]: 1.0


    Of course, one could choose any other angle, run the code, and obtain 1 again.


    **Exercise 1.3** *Calculate the expression*


    $$\sqrt[3]{e^\pi + \log\left(\frac{23}{\sin\left(\frac{\pi}{6}\right)}\right)}$$'
