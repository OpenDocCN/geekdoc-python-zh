    # 7.1.2 Generating arrays


    Besides creating arrays in numpy from lists or tuples as we have done so far,
    there are several functions within numpy which we can use to comfortably generate
    arrays. The two main ones are arange and linspace. The following examples show
    their scopes.


    ```

    [19]: np.arange(5, 10)

    ```


    [19]: array([5, 6, 7, 8, 9])


    ```

    [20]: np.arange(5, 10, 0.3)

    ```


    [20]: array([5., 5.3, 5.6, 5.9, 6.2, 6.5, 6.8, 7.1, 7.4, 7.7, 8., 8.3, 8.6, 8.9,
    9.2, 9.5, 9.8])


    Similar to range, arange(m, n, s) starts from m, and increases by s in each iteration
    up to but not including n. The command linspace(m, n, s) gives an array with s
    equally spaced entries, starting from m and ending with n; that is, the array
    starts with m and in each iteration (n-m)/(s-1) will be added until we arrive
    at n.


    ```

    [21]: np.linspace(1, 4, 6)

    ```


    [21]: array([1., 1.6, 2.2, 2.8, 3.4, 4. ])'
