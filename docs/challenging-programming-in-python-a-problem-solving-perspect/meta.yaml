    # Algorithm


    The algorithm takes as input the size of the chessboard ‘n’, the starting coordinates
    of the king ‘x’ and ‘y’, the positions of the opponent’s pieces ‘pieces’, and
    the number of pieces already removed ‘removed’. A BFS-based algorithm is used
    to explore all possible moves from the current state of the board. It initializes
    a set called ‘visited’ to keep track of the states already visited during the
    breadth-first search and a *queue* containing the starting state. It also initializes
    the current maximum to the number of checkers already removed. The algorithm then
    enters a while loop and dequeues the next state from the *queue*. It updates the
    current maximum to the maximum of the current maximum and the number of checkers
    removed so far in this state. For each possible diagonal jump direction, the algorithm
    computes the new position after the jump and the position of the jumped-over checker.
    If the new position is outside the board or there is already a checker at the
    new position or there is no checker at the jumped-over position, the algorithm
    skips this direction. If the algorithm finds a new state with a removed checker,
    it creates a new set of pieces without the jumped-over checker and checks if this
    state has already been visited. If not, the algorithm adds the new state to the
    visited set and the *queue*. The algorithm continues the breadth-first search
    until the *queue* is empty and returns the current maximum number of removed checkers.
    The Python code to capture the most pieces in one move is depicted in Code 6.11.'
