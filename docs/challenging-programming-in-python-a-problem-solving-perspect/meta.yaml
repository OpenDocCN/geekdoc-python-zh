    ### Algorithm


    The algorithm first identifies the minimum element in the input list and checks
    if it is present in the set. If it is, the algorithm appends the minimum element
    to the output list as many times as it appears in the input list, removes all
    occurrences of the minimum element from the input list, and removes the minimum
    element from the set to avoid duplicates. This process is repeated for all elements
    in the set, which ensures that the output list is sorted based on the priority
    set by the elements in the set. After all the elements in the set have been processed,
    any remaining elements in the input list are appended to the output list and the
    final list is sorted in ascending order.'
