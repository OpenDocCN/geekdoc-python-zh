    # Algorithm


    The algorithm in two blocks checks the increasing digits. At first, an empty string
    *concatnumbers* is defined, and it is set *b* = 1. If *b* = 1, it enters the first
    block, and if *b* = 0, it enters the second block. For each digit of the given
    string, in the first block, with the linear search if the next number was greater
    than the previous number and *b* = 1, then the next number is appended into an
    array *storage* and updates the previous number. In the second block, if the comparison
    was not met in the first block, then *b* = 0, and make concatenation for the current
    number and its next, and put it in *concatnumbers*. If *concatnumbers* was greater
    than the previous number, then store it into *storage*, and make empty *concatnumbers*.
    As long as a concatenation of the next numbers is less than or equal to the previous
    number the concatenation is repeated for the next numbers. When *b* = 0 it never
    can enter the first block, because no longer single digits are greater than previous
