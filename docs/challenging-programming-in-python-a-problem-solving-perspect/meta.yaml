    # 2.12.2 Comprehensions


    Comprehensions in Python are faster in terms of time and shorter code to create
    a sequence of data. The following example is a way to create a sequence of data
    in a list.


    ```

    1   lst=[]

    2   for x in range(6):

    3       lst.append(x)

    4   print(lst)

    5   # Output: [0, 1, 2, 3, 4, 5]

    ```


    The following code is an example of creating a sequence of data with a list comprehension.
    It can be seen that the code is shorter than the above code, and actually it is
    faster.


    ```

    1   # List comprehension

    2   lst=[x for x in range(6)]

    3   print(lst)

    4   # Output: [0, 1, 2, 3, 4, 5]

    ```


    Also, many different operations with a list comprehension can be done.


    ```

    1   # List comprehensions

    2   lst=[x+1 for x in range(2)]

    3   print(lst)

    4   # Output: [1, 2]

    5   lst=[x-1 for x in range(4)]

    6   print(lst)

    7   # Output: [-1, 0, 1, 2]

    8   lst=[x**2 for x in range(6)]

    9   print(lst)

    ```'
