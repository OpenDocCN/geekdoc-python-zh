    ## 5.4 Word Height from a Text Corpus


    The length of a word refers to the number of characters it contains, while the
    height of a word indicates the number of meaningful sub-words that can be derived
    from it. A word with no inherent meaning has a height of zero, whereas a word
    that is meaningful and cannot be split into two meaningful sub-words has a height
    of one.


    Table 5.4 The expected outputs for certain inputs for word height


    | Words, word | Expected output |

    | :--- | :--- |

    | ''A text corpus'', wjobnv | 0 |

    | ''A text corpus'', chukker | 1 |


    For words that can be broken down into sub-words, the height of the word is equal
    to the highest height of its sub-words plus one. For example, the word ‘roqm’
    has no inherent meaning and, therefore, a height of zero. On the other hand, the
    word ‘chukker’ cannot be split into two meaningful sub-words, so its height is
    one. Finally, for a word like ‘enterprise’ we can recursively break it down into
    sub-words until we reach meaningless words, and its height is determined by the
    maximum height of its sub-words. Write a function that as input, takes a list
    of words, denoted by *words* and a single word, denoted by *word* and returns
    the height of the word, where *word* for finding its sub-words searches into *words*.
    For some inputs, the expected outputs are illustrated in Table 5.4.


    It is important to note that the height of a word is determined based on the words
    in the text corpus.


    ### Algorithm


    This algorithm recursively computes the height of a word by splitting it into
    smaller parts, computing the heights of those parts recursively, and combining
    the heights of the parts to obtain the height of the original word. Memoization
    is used to avoid redundant computations and improve performance. The algorithm
    steps are outlined in detail as follows:


    1. It takes three inputs: ‘words’, a list of words in the text corpus, ‘word’,
    the word whose height needs to be computed, and ‘memo’, an optional dictionary
    used to memorize previously computed heights.

    2. If ‘memo’ is not provided, an empty dictionary is created for memoization.

    3. If the height of the current word has already been computed and stored in the
    ‘memo’, the memoized value is returned.

    4. A binary search algorithm is utilized to search for a given word in the list
    of words. If the word is found, the index of the word in the list is returned;
    otherwise, −1 is returned.

    5. If the word is not present in the list of words, its height is 0, and 0 is
    returned, and the algorithm is terminated.

    6. A list, ‘validList’, is created to store all possible ways to split the word
    into two parts and check if both parts are present in the list of words.

    7. A loop iterates over all possible split positions in the word, from position
    1 to the length of the word −1. For each split position, the left and right parts
    of the word are extracted.

    8. If both the left and right parts are found in the list of ‘words’, they are
    added to the ‘validList’.

    9. If no valid splits are found, the height of the word is 1, and 1 is returned.'
