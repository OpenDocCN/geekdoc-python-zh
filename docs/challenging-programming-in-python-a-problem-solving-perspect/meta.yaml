    7 print(d)

    8 # Output: [(''argentina'', 1), (''france'', 2)]

    9 d=set(dic.items())

    10 print(d)

    11 # Output: {(''france'', 2), (''argentina'', 1)}

    12 d=str(dic.items())

    13 print(d)

    14 # Output: dict_items([(''argentina'', 1), (''france'', 2)])

    ```'
- md: "## 2.8.2.6 Values\n\nTo obtain all values in a dictionary, *values* function\
