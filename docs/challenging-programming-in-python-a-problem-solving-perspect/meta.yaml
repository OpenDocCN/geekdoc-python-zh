  md: '# 2.2 Data Types in Python


    Before discussing the supported data types in Python, it is important to understand
    the concepts of objects and variables. Python is an object-oriented programming
    language, meaning that everything in Python is an object. Object orientation enables
    programmers to perform tasks by defining various objects with unique attributes.


    In Python, a variable is essentially a word that acts as a pointer to an object.
    When an object is assigned to a variable, the variable is created automatically
    and does not need to be defined beforehand. It is imperative to follow certain
    rules while writing a variable in Python, such as naming conventions and avoiding
    reserved keywords.


    +   1. A variable in Python must follow specific naming conventions. It should
    start with a letter or an underscore, and can be followed by any combination of
    letters, digits, and underscores. For example, ''_sel'' or ''tryj'' are valid
    variable names.

    2. Python is a case-sensitive language. This means that variables with different
    capitalization, such as ''Tryj'' and ''tryj'', are treated as distinct and cannot
    be used interchangeably.

    3. Certain words in Python, known as reserved words or keywords, have special
    meanings within the language and cannot be used as variable names. These words
    are reserved for specific purposes and cannot be repurposed. Please refer to Table
    2.1 for a list of reserved words in Python.


    Unlike statically typed languages, where variable types are determined at compile
    time, in Python, the type of a variable is determined at runtime based on the
    value assigned to it. This means that there is no need to explicitly declare the
    type of a variable before using it, as the interpreter infers the type based on
    the value it holds. This feature makes Python a highly flexible and dynamic language,
    allowing for rapid development.


    Table 2.1 The keywords in Python programming language


    | False | None | True | and | as |

    |---|---|---|---|---|

    | assert | break | class | continue | def |

    | del | elif | else | except | finally |

    | for | from | global | if | import |

    | in | is | lambda | nonlocal | not |

    | or | pass | raise | return | try |

    | while | with | yield | | |'
  merge: -1
