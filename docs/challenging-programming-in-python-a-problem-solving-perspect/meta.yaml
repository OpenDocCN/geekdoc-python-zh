    \ 函数不接收任何参数。默认情况下，*values* 函数返回的值不可见，因此要使其可见，可以将其转换为字符串、列表或集合。*values* 函数不接收任何参数。以下示例展示了如何使用\
    \ *values*。\n\n```\n1 dic={'argentina': 1, 'france': 2}\n2 d=list(dic.values())\n\
    3 print(d)\n4 # 输出: [1, 2]\n```\n\n## 2.8.2.7 键\n\n使用 *keys* 函数可以返回字典的键，使用方式为\
    \ *dic.keys()*。*keys* 函数不接收任何参数。由于 *keys* 函数返回的键默认不可见，因此要使其可见，可以将其转换为字符串、列表或集合。*keys*\
