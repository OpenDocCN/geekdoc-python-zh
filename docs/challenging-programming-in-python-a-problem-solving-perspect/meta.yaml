    \n## 4.21 按数字位数排序\n\n在标准数值比较中，101大于9。然而，在按数字位数排序的上下文中，9的值高于101。本挑战的目标是根据数字的位数对给定数字进行排序。例如，考虑一个数组\
    \ $array = [81181972, 8111972]$，并令 $a = 81181972$，$b = 8111972$。比较从最高位数字开始，在本例中是9。两个数字都有一个9，因此比较下一位数字8。$a$中有两个8，而$b$中有一个，因此$a$被视为较大的数字。比较以这种方式继续：如果$a$和$b$中有相等的数字，则检查下一位数字，直到比较达到零。编写一个函数，该函数以正整数数组作为输入，并按数字位数返回排序后的数组。对于某些输入，预期输出如表4.21所示。\n\
    \n### 算法\n\n“分而治之”策略是一种问题解决技术，涉及将复杂问题分解为更小、更易于管理的子问题，并单独解决每个子问题。归并排序算法基于“分而治之”策略。在归并排序的情况下，算法重复地将给定列表分成多个子列表，直到每个子列表只有一个项目。然后将这些子列表合并在一起形成一个排序列表。算法首先递归地将输入数组分成两半，直到达到单个元素或空数组的基本情况（归并排序）。然后，它根据数字的位数确定两个元素中哪个应该在排序顺序中排在前面。最后，两个排序的子数组按排序顺序合并回一起。按数字位数对数字进行排序的Python代码如代码4.21所示。\n\
