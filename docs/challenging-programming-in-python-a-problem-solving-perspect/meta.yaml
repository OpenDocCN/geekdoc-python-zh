    |---|---|

    | [(''three'', ''clubs''), (''king'', ''spades''), (''queen'', ''clubs''), (''jack'',
    ''hearts'')], queen | (''queen'', ''clubs'') |

    | [(''four'', ''diamonds''), (''ace'', ''clubs''), (''four'', ''spades''), (''king'',
    ''clubs'')], None | (''four'', ''diamonds'') |

    | [(''eight'', ''hearts''), (''three'', ''diamonds''), (''nine'', ''spades''),
    (''queen'', ''hearts'')], None | (''queen'', ''hearts'') |


    - 2. If a trump card is not given, the first card with the highest rank is selected,
    and its player wins the game.


    For example, if cards=[(''three'', ''clubs''), (''king'', ''spades''), (''queen'',
    ''clubs''), (''jack'', ''hearts'')], and trump = queen, the first player with
    the card (''queen'', ''clubs'') is won. Although (''three'', ''clubs'') is the
    first card, but (''queen'', ''clubs'') has more rank. In another example, if cards=[(''four'',
    ''diamonds''), (''ace'', ''clubs''), (''four'', ''spades''), (''king'', ''clubs'')],
    and trump = None, the first player with the card (''four'', ''diamonds'') is won.
