    ### Algorithm


    The algorithm is as follows:


    1. It takes row, col, and tabu.

    2. Create a 2D array paths of size (row+1) × (col+1)

    3. Initialize paths[0][0] to 1

    4. For all i from 1 to row, if (i, 0) is not in tabu, set paths[i][0] to paths[i−1][0]

    5. For all j from 1 to col, if (0, j) is not in tabu, set paths[0][j] to paths[0][j−1]

    6. For all i from 1 to row and for all j from 1 to col, if (i, j) is not in tabu,
    set paths[i][j] to paths[i−1][j] + paths[i][j−1]

    7. Return paths[row][col]


