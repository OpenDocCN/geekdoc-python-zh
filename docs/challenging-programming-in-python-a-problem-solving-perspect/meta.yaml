    # 2.8.2.5 Items


    To obtain all keys and values in a dictionary, *item* function is used, and to
    use it, *dic.items()* is used. No argument is sent to *items* function. By default,
    the obtained objects by *items* can not be visible, so to make them visible, they
    can be converted to a string, and list, set, or dictionary constructor. No argument
    is sent to *item* function. The following examples indicate how *items* is used.


    ```

    1 dic={''argentina'': 1, ''france'': 2}

    2 d=dict(dic.items())

    3 print(d)

    4 # Output: {''argentina'': 1, ''france'': 2}

    5 dic=d={''argentina'': 1, ''france'': 2}

