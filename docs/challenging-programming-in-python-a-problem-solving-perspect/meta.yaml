    \ $goal$ number. For some inputs, the expected outputs are illustrated in Table\
    \ 3.18.\n\nTable 3.18 The expected outputs for certain inputs for Collatz distance\n\
    \n| Start, goal | Expected output |\n|---|---|\n| 20, 321 | 9 |\n| 22, 15 | 8\
    \ |\n| 4, 7 | 2 |\n| 10, 20 | 2 |\n\n### Algorithm\n\nTo achieve the goal number\
    \ for the stated challenges, a breadth-first search (BFS-based) technique is employed.\
    \ The BFS algorithm traverses all the nodes at a particular level before moving\
    \ on to explore the subsequent level. In this instance, each generated layer resulting\
    \ from the application of the Collatz conjecture formulas denotes a level of exploration.\
    \ The algorithm initiates its exploration from the start_num, which represents\
    \ the first layer, and generates successive layers by applying the same formulas.\
    \ The following steps are involved in the algorithm:\n\n1. It takes *start_num*\
    \ and *goal_num* (positive integers).\n2. Initialize the variables *num_layers*\
    \ and *curr_layer*, where *num_layers* = 0 and *curr_layer* is a set containing\
    \ only the starting number, i.e., *start_num*.\n3. While the *goal_num* is not\
    \ in *curr_layer*, do the following:\n   - Create an empty set called *next_layer*\
    \ (As we don't need duplicated numbers).\n   - For each number in *curr_layer*,\
    \ compute the following ones:\n     - *num* // 2.\n     - 3 * *num* + 1.\n   -\
    \ Add them to *next_layer*.\n   - Update *curr_layer* to be equal to *next_layer*.\n\
    \   - Increment *num_layers* by 1.\n4. Return *num_layers* when *goal_num* is\
    \ found in *curr_layer*.\n\nThe Python code for computing Collatz distance is\
    \ depicted in Code 3.18.\n\n```\nCode 3.18 Python code for computing collatz distance\n\
    1 def get_collatz_distance(start_num, goal_num):\n2     \"\"\"\n3     Takes a\
