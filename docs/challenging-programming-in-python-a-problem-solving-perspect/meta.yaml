    \ 弹出\n\n*pop* 函数接受 *key* 参数和可选参数 *obj*，用于返回 *key* 对应的值。如果键不存在，则会引发错误；如果指定了可选参数\
    \ *obj* 且未找到 *key*，则返回 *obj*。使用方式为 *dic.pop(key, obj)*。以下示例展示了如何使用 *pop*。\n\n\
    ```\n1 dic={'argentina': 1, 'france': 2}\n2 d=dic.pop('iee',8)\n3 print(d)\n4\
    \ # 输出: 8\n5 d=dic.pop('france')\n6 print(d,dic)\n7 # # 输出: 2 {'argentina': 1}\n\
    ```\n\n## 2.8.2.9 弹出项\n\n使用 *popitem* 可以移除字典中的最后一项，并返回其键和值。如果字典为空，则会引发错误。使用方式为\
    \ *dic.popitem()*。以下示例展示了如何使用 *popitem*。*popitem* 函数不接收任何参数。\n\n```\n1  dic={'argentina':\
    \ 1, 'france': 2, 'Crotia':3}\n2  d=dic.popitem()\n3  print(d)\n4  # 输出: ('Crotia',\
    \ 3)\n5  print(dic)\n6  # 移除最后一项后的字典\n7  # 输出: {'argentina': 1, 'france': 2}\n\
    ```\n\n## 2.8.3 字典构造函数\n\n要创建字典，可以使用 *dict()*。字典构造函数接受一个可选的可迭代对象，该可迭代对象必须是键值对。请看以下示例。所有对使用\
    \ {} 创建的字典可用的内置函数，同样适用于字典构造函数。\n\n```\n1  # 定义一个空字典\n2  d=dict({})\n3  print(type(d))\n\
    4  d=dict(argentina=1,france=2,Croatia=3)\n5  # 输出: {'argentina': 1, 'france':\
    \ 2, 'Croatia': 3}\n6  d=dict([('argentina', 1), ('france', 2)], Croatia=3)\n\
    7  d=dict(argentina=1,france=2,Croatia=3)\n8  # 输出: {'argentina': 1, 'france':\
    \ 2, 'Croatia': 3}\n9  d=dict([('argentina', 1), ('france', 2)])\n10  print(d)\n\
    11  # 输出: {'argentina': 1, 'france': 2}\n```\n\n## 2.9 元组\n\n在这种数据结构中，可以存储不同的数据类型，并且可以像列表一样进行索引，但它们是不可变的。换句话说，一旦元组被创建，就不能通过添加或删除等方式进行更改。字典具有以下特性。\n\
    \n- 1. 可索引\n  可以通过索引访问元素。\n- 2. 不可更改\n  元组的元素不能被更改或删除，也不能插入任何元素。\n- 3. 可重复\n \
    \ 元组可以像列表一样包含重复的元素。\n- 4. 可嵌套\n  元组可以像列表一样进行嵌套。\n\n在 Python 中创建元组，可以使用左括号 ( 和右括号\
    \ )，或者使用 *tuple()*。\n\n> **注意**\n> 注意：由于元组是不可变的，因此无需复制它，只需进行赋值即可。\n\n以下示例展示了如何在\
    \ Python 中使用字典。\n\n```\n1  # 定义一个空元组\n2  t=()\n3  print(type(t))\n4  # 输出: <class\
    \ 'tuple'>\n5  t=('x', 4, 1, '9', 'p', 'o', 'x', 9, 7, 'x', 8)\n6  print(t)\n\
    7  # 注意重复的键被保留了。\n8  # 输出: ('x', 4, 1, '9', 'p', 'o', 'x', 9, 7, 'x', 8)\n```\n\
    \n元组可以在没有括号的情况下创建，只需用逗号分隔元素即可。请看以下示例。\n\n```\n1  t='argentina', 1, 'france', 2,\
    \ 'Croatia', 3, 'morocco', 4\n2  print(t)\n3  '''\n4  输出: ('argentina', 1, 'france',\
    \ 2,\n5  'Croatia', 3, 'morocco', 4)\n6  '''\n```\n\n元组中的索引操作如下所示。\n\n```\n1 \
    \ t=('argentina', 1, 'france', 2, 'Croatia', 3, 'morocco', 4)\n2  print(t[0])\n\
    3  # 输出: argentina\n4  print(t[3])\n5  # 输出: 2\n```\n\n## 2.9.1 嵌套元组\n\n嵌套元组包含其他元组。元组越多，访问对象所需的索引就越多。\n\
    \n```\n1  # 定义一个嵌套元组\n2  t=('argentina', 1, 'france',('gold','silver',(2,4)))\n\
    3  # 访问嵌套元组的元素\n4  ind=t[3][2][1]\n5  print(ind)\n6  # 输出: 4\n```\n\n在上面的示例中，索引\
    \ t[3][2][1] 用于访问元组对象 t 中的一个元素，其中 [3] 指向 ('gold', 'silver', (2, 4))，[2] 指向 (2,\
    \ 4)，[1] 指向 4。\n\n## 2.9.2 元组内置函数\n\nPython 中的元组对象有一些内置函数，将通过一些示例进行描述。在所有示例中，tup\
    \ 是一个元组对象，iterobj 是一个可迭代对象，obj 是一个 Python 对象。\n\n### 2.9.2.1 计数\n\n此函数用于计算给定对象出现的次数。如果找到该对象，则返回其出现次数，否则返回零。使用方式为\
    \ tup.count(obj)。以下示例展示了如何使用 count 函数。\n\n```\n1  t=('argentina', 1, 'france',[99],1)\n\
    2  y=t.count(1)\n3  # 输出: 2\n```\n\n### 2.9.2.2 索引\n\n使用索引，使用方式为 t.up.index(obj)。\n\
    \n## 2.9.3 元组构造函数\n\n使用元组，可以将可迭代对象转换为元组，使用方式为 tuple(iterobj)。请看以下示例。\n\n```\n\
    1  t=tuple('abcs=d')\n2  print(t)\n3  # 输出: ('a', 'b', 'c', 's', '=', 'd')\n4\
    \  t=tuple('abcs=d')\n5  print(t)\n6  # 输出: ('a', 'b', 'c', 's', '=', 'd')\n7\
    \  t=tuple([7,6,3,0])\n8  print(t)\n9  # 输出: (7, 6, 3, 0)\n10 t=tuple({'x':1,\
    \ 'y':2})\n11 print(t)\n12 # 输出: ('x', 'y')\n13 t=tuple({'x', 'y'})\n14 print(t)\n\
    15 # 输出: ('y', 'x')\n```\n\n## 2.9.4 范围类型\n\n范围类型创建一个整数序列，通常用于在 for 循环中进行迭代。范围类型接受整数\
    \ *start* 参数，以及可选的整数参数 *stop* 和 *step*，其中 *start* 指定范围开始的数字，*stop* 指定范围结束的数字，*step*\
