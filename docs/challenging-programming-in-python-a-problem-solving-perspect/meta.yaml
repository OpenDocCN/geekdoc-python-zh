    # About the Authors


    **Dr. Habib Izadkhah** is an associate professor at the Department of Computer
    Science, University of Tabriz, Iran. He worked in the industry for a decade as
    a software engineer before becoming an academic. His research interests include
    algorithms and graphs, software engineering, and bioinformatics. More recently,
    he has been working on developing and applying deep learning to a variety of problems,
    dealing with biomedical images, speech recognition, text understanding, and generative
    models. He has contributed to various research projects, authored a number of
    research papers in international conferences, workshops, and journals, and also
    has written five books, including *Source Code Modularization: Theory and Techniques*
    from Springer and *Deep Learning in Bioinformatics* from Elsevier.


    **Rashid Behzadidoost** is a Ph.D. candidate in Computer Science at the University
    of Tabriz, Iran. He is currently pursuing his doctoral degree in Computer Science,
    specializing in artificial intelligence, and natural language processing. Rashid
    has a deep passion for coding and enjoys solving challenging problems. He has
    obtained his skills through years of study, practice, and teaching. He has taught
    several courses on computer sciences including challenging programming, microprocessor,
    and data structure at the University of Tabriz.


    # Chapter 1

    Introduction


    This chapter discusses the objectives, applications, and necessities of this book.


    ## 1.1 Why Python?


    Python is a high-level programming language with a simple syntax compared to other
    programming languages. In addition, Python is a general-purpose, cross-platform,
    multi-paradigm, object-oriented language that supports dynamic data types. Python
    is easy to understand, and even individuals with a basic understanding of programming
    can learn Python quickly. The primary reason for this simplicity is that Python
    programming language statements are similar to the English language, making the
    learning process straightforward. Python has an interactive coding environment
    that makes working with the language and testing command execution while learning
    easy. Being cross-platform is a significant advantage of Python because it can
    be used on various operating systems such as Mac, Windows, Linux, and even iOS
    and Android. One of the most significant advantages of Python is that it offers
    extensive libraries for most work areas. In fact, the library provides many ready-made
    code pieces that programmers can use in their work. For instance, to connect Python
    to a database, there is no need to specify all the details of the database connection
    by coding. Instead, to connect to the database, one only needs to call the library''s
    name. All of these features make Python an excellent language to learn. Furthermore,
    Python has numerous real-world applications, such as web development, game development,
    data science, and artificial intelligence. In addition to its simplicity and versatility,
    Python is also a popular choice among developers due to its active and supportive
    community. As an open-source language, Python has a vast community of developers
    who contribute to its growth and development. This community provides a wealth
    of resources, including documentation, forums, and tutorials, making it easier
    for new learners to get started and for experienced developers to find solutions
    to their problems. Additionally, this community is continually updating and improving
    Python through new packages, libraries, and frameworks, ensuring that the language
    remains relevant and up-to-date in an ever-changing technological landscape. This
    supportive and dynamic community is another reason why Python is an excellent
    language to learn.


    ## 1.2 Non-library Based


    Most published Python books typically either cover the language’s syntax with
    basic examples or focus on packages for problem-solving. However, using libraries
    and simple exercises to understand Python’s structure can often be insufficient
    in providing developers with the necessary skills to tackle complex problems.


    We believe that such approaches are inadequate for professional programmers who
    are dealing with complex programs. Therefore, this book takes a different approach
    by discussing problems that are not library-based (although standard libraries
    are used in some programs), and presents solutions through detailed step-by-step
    algorithms, hints, examples, and commented code. This approach is designed to
    equip programmers with the necessary skills to solve more complex problems, leading
    to an improvement in their overall programming abilities.


    ## 1.3 Enhancing Programming Skills and Creative Thinking Through Challenging
    Problems


    Solving challenging problems is an effective way to improve programming skills
    and foster creative thinking. Programmers must first identify a problem, devise
    a solution, and then translate it into an algorithm before implementing it in
    a specific programming language. By tackling difficult problems, programmers learn
    how to approach complex issues systematically and improve their programming skills.
    This book aims to enhance the power of thinking and reasoning among programmers
    and deepen their understanding of the Python language by presenting 90 challenges
    that are coded step-by-step. These challenges are grouped into chapters on math,
    numbers, strings, games, counting, and miscellaneous topics. Each chapter contains
    a set of challenges with examples, hints, and Python code solutions. The number
    of challenges in each chapter is as follows: (1) math—28, (2) numbers—21, (3)
    strings—13, (4) games—14, (5) counting—8, and (6) miscellaneous—6.'
