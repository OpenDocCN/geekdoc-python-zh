    (''jack'', ''hearts'')]，且 trump = queen，则持有牌 (''queen'', ''clubs'') 的第一位玩家获胜。尽管
    (''three'', ''clubs'') 是第一张牌，但 (''queen'', ''clubs'') 的点数更高。在另一个例子中，如果 cards=[(''four'',
