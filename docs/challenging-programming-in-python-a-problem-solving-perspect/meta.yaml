    \ and let $a = 81181972$ and $b = 8111972$. The comparison starts from the most\
    \ significant digit, which is 9 in this case. Both numbers have one 9, so the\
    \ next significant digit, 8, is compared. There are two 8s in $a$ and one in $b$,\
    \ so $a$ is considered as the greater number. The comparison continues in this\
    \ manner: if there are equal digits in both $a$ and $b$, the next significant\
    \ digit is examined until the comparison reaches zero. Write a function that as\
    \ input, takes an array of the positive integers, and returns the sorted array\
    \ in terms of digit count. For some inputs, the expected outputs are illustrated\
    \ in Table 4.21.\n\n### Algorithm\n\nThe ‘divide-and-conquer’ strategy is a problem-solving\
    \ technique that involves breaking down a complex problem into smaller, more manageable\
    \ sub-problems and solving each sub-problem individually. Merge sort algorithm\
    \ is based on the ‘divide-and-conquer’ strategy. In the case of merge sort, the\
    \ algorithm repeatedly divides a given list into multiple sublists until each\
    \ sublist has only one item. These sublists are then merged together to form a\
    \ sorted list. The algorithm first recursively divides the input array into two\
    \ halves until the base case of a single element or an empty array is reached\
    \ (merge sort). Then, it determines which of the two elements should come first\
    \ in the sorted order based on the count of their digits. Finally, the two sorted\
    \ sub-arrays are merged back together in sorted order. The Python code to sort\
    \ the numbers in terms of counting the digits is depicted in Code 4.21.\n\nCode\
    \ 4.21 Python code to sort the numbers in terms of counting the digits\n\n```python\n\
    def sort_by_digit_count(arr):\n    \"\"\"\n    Sorts an array of positive integers\n\
    \    by the count of their digits.\n    \"\"\"\n    # Applying the algorithm of\
    \ merge sort\n    if len(arr) > 1:\n        # Finding the mid of the array\n \
    \       mid = len(arr) // 2\n\n        # Dividing the array elements into 2 halves\n\
    \        L = arr[:mid]\n        R = arr[mid:]\n\n        # Sorting the first half\n\
    \        L = sort_by_digit_count(L)\n\n        # Sorting the second half\n   \
    \     R = sort_by_digit_count(R)\n\n        # Merge the two sorted halves\n  \
    \      i, j, k = 0, 0, 0\n        while i < len(L) and j < len(R):\n         \
    \   if max_(L[i], R[j]) == R[j]:\n                arr[k] = L[i]\n            \
    \    i += 1\n            else:\n                arr[k] = R[j]\n              \
    \  j += 1\n            k += 1\n\n        '''Checking if any element was\n    \
    \    left in the first half\n        '''\n        while i < len(L):\n        \
    \    arr[k] = L[i]\n            i += 1\n            k += 1\n\n        '''Checking\
    \ if any element was\n        left in the second half\n        '''\n        while\
    \ j < len(R):\n            arr[k] = R[j]\n            j += 1\n            k +=\
    \ 1\n\n    return arr\n\ndef max_(a, b):\n    \"\"\"\n    It takes two positive\
    \ integers a and b,\n    and returns the one whose highest\n    digit occurs more\
    \ times. In case of\n    a tie, returns the larger number.\n    \"\"\"\n    a,\
    \ b = str(a), str(b)\n    for i in range(9, -1, -1):\n        if a.count(str(i))\
    \ > b.count(str(i)):\n            return int(a)\n        elif a.count(str(i))\
    \ < b.count(str(i)):\n            return int(b)\n    return max(int(a), int(b))\n\
