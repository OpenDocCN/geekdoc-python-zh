    # 2.8.2.3 Update


    Function of *update* takes an iterable object that is a pair of keys and values
    to add to the existing dictionary. Still, the updates are applied to the current
    dictionary, and a new one is not created. The following example indicates how
    *update* can be used.


    ```

    1 dic={''argentina'': 1, ''france'': 2}

    2 dic.update(c=[98])

    3 print(dic)

