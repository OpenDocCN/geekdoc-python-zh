    \n## 3.18 考拉兹距离\n\n在这个挑战中，给定一个正整数 $n$，目标是通过应用 $3 * n + 1$ 和 $n // 2$ 来达到某些正整数，其中公式取自考拉兹猜想。假设有两个数字\
    \ $start$ 和 $goal$，它们各有 $h$ 层，每层包含一些正整数，第一层用 $start$ 数字初始化。所有正整数在每一层中具有相同的距离。它从\
    \ $start$ 数字开始，通过 $3 * n + 1$ 和 $n // 2$ 各生成一次每层中的数字，直到达到 $goal$ 数字。例如，考虑以下示例。设\
    \ $start = 10$ 且 $goal = 20$，在每一步中，它生成一些具有相同距离的正整数，直到达到 $start$ 数字。由于第一层用 $start$\
    \ 初始化，因此考虑 10。\n\n- 第 1 层：对 10 应用一次 $3 * n + 1$，对 10 应用一次 $n // 2$。$(3n + 1) =\
    \ (3 * 10 + 1) = 31$，$(n // 2) = (10 // 2) = 5$\n- 第 2 层：对 31 和 5 应用一次 $3 * n\
    \ + 1$，对 31 和 5 应用一次 $n // 2$。$(3 * 31 + 1) = 94$，$16$，$(3 * 5 + 1) = 16$，$(31\
    \ // 2) = 15$，$(5 // 2) = 2$。\n- 第 3 层：283, 47, 46, 7, 49, 8, 1\n- 第 4 层：850,\
    \ 141, 142, 23, 139, 22, 3, 148, 24, 25, 4, 0\n- 第 5 层：2551, 425, 424, 70, 71,\
    \ 11, 69, 67, 10, 74, 73, 12, 75, 13,...\n- 第 6 层：7654, 1275, 1276, 212, 1273,\
    \ 211, 35, 34, 31, 37, 6, 40,...\n- 第 7 层：22963, 3827, 3826, 637, 3829, **20**,...\n\
    \n可以看出，在第 7 层，它找到了 $goal$ 数字 **20**。编写一个函数，输入为 $start$ 和 $goal$，返回访问到 $goal$ 数字的层号。对于某些输入，预期输出如表\
    \ 3.18 所示。\n\n表 3.18 考拉兹距离特定输入的预期输出\n\n| 起点, 终点 | 预期输出 |\n|---|---|\n| 20, 321\
    \ | 9 |\n| 22, 15 | 8 |\n| 4, 7 | 2 |\n| 10, 20 | 2 |\n\n### 算法\n\n为了实现所述挑战的目标数字，采用了基于广度优先搜索（BFS）的技术。BFS\
    \ 算法在探索下一层之前，会遍历特定层级的所有节点。在这个例子中，应用考拉兹猜想公式生成的每一层都表示一个探索层级。算法从代表第一层的 start_num\
    \ 开始探索，并通过应用相同的公式生成后续层。算法涉及以下步骤：\n\n1.  它接受 *start_num* 和 *goal_num*（正整数）。\n2.\
    \  初始化变量 *num_layers* 和 *curr_layer*，其中 *num_layers* = 0，*curr_layer* 是一个仅包含起始数字的集合，即\
    \ *start_num*。\n3.  当 *goal_num* 不在 *curr_layer* 中时，执行以下操作：\n    - 创建一个名为 *next_layer*\
    \ 的空集合（因为我们不需要重复的数字）。\n    - 对于 *curr_layer* 中的每个数字，计算以下值：\n        - *num* //\
