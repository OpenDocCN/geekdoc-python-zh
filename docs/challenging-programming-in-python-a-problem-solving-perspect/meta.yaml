    \nLet *items* be a list of numbers such that positions *i < j < k* in *items*\
    \ make a troika if *items[i] == items[j] == items[k]*, and *j - i == k - j*. For\
    \ example, if *items = [42, 9, 42, 42, 42, 103]* is the given input, count the\
    \ number of troikas. In the 0th position, 2th position, and 4th position, there\
    \ are 42, 42, and 42, respectively, where 2 - 0 = 4 - 2, so 2 = 2. In the previous\
    \ step, one Troika is found, and another Troika is in the 2th position, 3th position,\
    \ and 4th position, because 3 - 2 = 4 - 3, so 1 = 1. Therefore two Troikas are\
    \ found. Write a function that as input takes a list of positive and negative\
    \ integers and returns the number of troikas. The expected outputs are illustrated\
    \ in Table 7.7 for some inputs.\n\nTable 7.7 The expected outputs for certain\
    \ inputs for counting troikas\n\n| Items | Expected output |\n| :--- | :--- |\n\
    | [42, 9, 42, 42, 42, 103] | 2 |\n| [-8, -8, 109, -8, -8, -8, -36] | 2 |\n| [21,\
    \ -41, 21, 76, 21, -71, 21, 17, 17, 17, 17, 17, 47] | 4 |\n| [77, 1, 2, -4, 13,\
    \ 77, 7, 9, 1] | 0 |\n\n### Algorithm\n\nLet *TroikaCounter* be to enumerate the\
    \ number of troikas, and *items* be the given numbers. To satisfy condition $j\
    \ - i == k - j$, it is utilized condition $items[i] == items[j] == items[2 * j\
    \ - i]$, and for each $i$ in range 0 to $|items|$, and for each $j$ in range $i\
    \ + 1$ to $|items|$, if condition $items[i] == items[j] == items[2 * j - i]$ is\
    \ satisfied ($2 * j - i$ determines 3th position), the *TroikaCounter* is incremented\
    \ by one. Now, *TroikaCounter* is the number of troikas. The Python code to count\
    \ the number of troikas is depicted in Code 7.7.\n\n```python\n# Code 7.7 Python\
    \ code to count the number of troikas\ndef TroikaCounter(items):\n    TroikaCounter\
    \ = 0\n    for i in range(len(items)):\n        for j in range(i + 1, len(items)):\n\
    \            k = 2*j - i\n            if k > (len(items)-1):\n               \
    \ pass\n            else:\n                if items[i] == items[j] == items[k]:\n\
    \                    TroikaCounter += 1\n    return TroikaCounter\n```\n\n## 7.8\
    \ Counting Intersected Disks\n\nOn the two dimensional plane, there are disks\
    \ as $(x1, y1, r1)$ and $(x2, y2, r2)$, where $(x, y)$ is the center point and\
    \ $r$ is the radius of the disks such that if Pythagorean inequality $(x2 - x1)\
    \ **2 + (y2 - y1) **2 <= (r1 + r2) **2$ satisfies, two disks $(x1, y1, r1)$ and\
    \ $(x2, y2, r2)$ have intersection. The power in Python is shown with **. It should\
    \ be noted that the formula just works for the integers. In this challenge, the\
    \ coordinates of the center and the radius of the disks in a list are given, and\
    \ the task is to write a function that returns the pair of disks that intersect\
    \ at least at one point. For some inputs, the expected outputs are illustrated\
    \ in Table 7.8.\n\nTable 7.8 The expected outputs for certain inputs for counting\
    \ intersected disks\n\n| Disks | Expected output |\n| :--- | :--- |\n| [(1, 1,\
    \ 9), (1, 0, 9)] | 1 |\n| [(4,7,11), (11, 2, 8), (1, 1, 1)] | 2 |\n| [(1, 1, 3),\
    \ (6, 0, 3), (6, 5, 3), (0, 6, 3)] | 3 |\n| [(34, 9, 67)] | 0 |\n\n### Algorithm\n\
    \nTo solve this challenge the sweep line algorithm is utilized. The sweep line\
    \ algorithm is a popular technique used in computational geometry to solve various\
    \ problems related to geometric objects’ arrangement and intersection. By sweeping\
    \ a line or plane across a set of objects, it enables the efficient detection\
    \ of intersections, overlaps, and other geometric properties. The number of comparisons\
    \ of the circles is $\\frac{n \\times n-1}{2}$, where it compares all circles\
    \ and consequently increases the number of comparisons and the execution time.\
    \ To reduce the number of comparisons especially when the two circles have a far\
    \ position, the sweep line algorithm is used, it is utilized to compute the active\
    \ space. In the active space, the intersection of the circles is more frequent.\
    \ Each disk enters the active space when the vertical line than to the x-axis\
    \ enters space $(x - r)$ and exits from the active space when vertical line leave\
    \ $(r + x)$. The Python code to count the number of overlapping disks is depicted\
    \ in Code 7.8.\n\n```python\ndef Counting_Intersected_Disks(disks):\n    # Sort\
    \ disks\n    active_disks = sorted([(x - r, x + r, x, y, r)\n                \
    \           for x, y, r in disks])\n\n    # Initialize count of overlapping disks\
    \ to zero\n    count = 0\n\n    '''\n    Iterate over pairs of disks\n    and\
    \ count overlapping disks\n    '''\n    for i in range(len(active_disks) - 1):\n\
    \        # Start with the next disk after i\n        j = i + 1\n\n        # Check\
    \ if j intersects with i\n        while j < len(active_disks) \\\n           \
    \ and active_disks[j][0] <= active_disks[i][1]:\n            '''Calculate the\
    \ distance between\n            the centers of i and j\n            '''\n    \
    \        dx = active_disks[i][2]- active_disks[j][2]\n            dy = active_disks[i][3]-\
    \ active_disks[j][3]\n            r_sum =active_disks[i][4]+ active_disks[j][4]\n\
    \n            # Check if i and j overlap\n            if dx ** 2 + dy ** 2 <=\
    \ r_sum ** 2:\n                count += 1\n            # Move to the next disk\n\
    \            j += 1\n\n    # Return the count of overlapping disks\n    return\
    \ count\n```\n\n# Chapter 8 Miscellaneous Problems\n\nThis chapter discusses six\
