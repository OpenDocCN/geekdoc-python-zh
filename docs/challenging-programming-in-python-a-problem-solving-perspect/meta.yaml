    The Wythoff array is an infinite two-dimensional grid that is characterized by
    its first row, which is identical to the Fibonacci sequence (1, 2, 3, 5, . . .).
    The array can be defined as follows: Let $pr$ denote the previous row, $cr$ denote
    the current row, and $a$ and $b$ denote the first and second elements of $pr$,
    respectively. The first element of the next row (excluding the first row) is determined
    as the smallest number that does not appear in any of the previous rows, and is
    denoted by $c$. The second element of the next row is determined based on the
    following two conditions:

    (1) If $c - a = 2$, then the value of the second element is $b + 3$. (2) If $c
    - a \neq 2$, then the value of the second element is $b + 5$.


    > $$x = \begin{cases} b + 3 \text{ if } c - a == 2 \text{ (equal with 2)} \ b
    + 5 \text{ if } c - a != 2 \text{ (unequal with 2)} \end{cases}$$


