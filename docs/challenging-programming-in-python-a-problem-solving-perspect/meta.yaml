    ## 3.28 Is a Balanced Centrifuge


    Scientists use centrifuges to test tubes, but it is essential to balance the tubes
    in the centrifuge to avoid disrupting its performance or causing serious damage
    due to its high speed. The balancing can be achieved by placing the tubes in a
    manner such that they either face each other or form a regular pattern. For example,
    in Fig. 3.3, part A shows a centrifuge with six different holes, while part B
    shows four tubes placed in four of the holes. As can be seen in part B, the test
    tubes are balanced, with the two tubes on the left and right facing each other.
    For certain input values, the expected outputs are listed in Table 3.28.


    The objective of this challenge is to determine whether a given situation is balanced,
    given the values of $n$ and $k$. A function is required that takes as input the
    number of holes and tubes, representing $n$ and $k$ respectively, and returns
    true if the situation is balanced, or false otherwise.


    ## Algorithm


    Given $n$ and $k$, the first step involves determining the prime factors of $n$
    and storing them in a list $L$. Subsequently, it is necessary to verify whether
    it is feasible to obtain both $n - k$ and $k$ using the prime factors in $L$.
    For example, consider the case where $n = 6$ and $k = 3$. The list of prime factors
    for $n$ is $[2, 3]$. As both $k$ and $n - k$ can be expressed using the prime
    factors in $L$. Specifically, $k = 3$ is included in $L$, and $n - k = 6 - 3 =
    3$ is also present in $L$, indicating a balanced situation for $n = 6$ and $k
    = 3$. An additional example involves the values $n = 15$ and $k = 8$, whereby
    the list of prime factors is $[5, 3]$. While it is possible to obtain $k$ by adding
    5 and 3, it is not possible to obtain $n - k$, which in this case is 7, using
    the numbers in the list. Consequently, the function returns false.


    To solve the problem, two algorithms are being considered. The first algorithm
    is used to determine the prime factors of $n$, while the second algorithm is used
    to verify whether $n$ and $n - k$ can be created using the prime factors obtained
    from the first algorithm.


    Table 3.28 The expected outputs for certain inputs determining if a centrifuge
    is balanced or not


    | n, k | Expected output |

    |---|---|

    | 76, 19 | True |

    | 23, 3 | False |

    | 113, 18 | False |

    | 60, 2 | True |


    ## Finding Prime Factors


    An empty list to store prime factors is created. The first prime number is equal
    to 2. As long as n is greater than 1, $n$ is divided by 2. If the remainder is
    zero and the number was not added to the considered list, we add it to the list.
    In each step, $n$ is updated with the quotient. If $n$ is no longer divisible
    by 2, the next prime is considered, and this process is repeated until $n < 1$.


    It takes a positive integer ''n'' as input and returns a list of prime factors
    of ''n''. The step-by-step explanation of the algorithm is outlined below.


    1. An empty list called ''primes'' is initialized to store the prime factors.

    2. A variable ''i'' is initialized to 2, which is the first prime number.

    3. A while loop is used to check if the number ''n'' is greater than 1.

    4. Inside the loop, it checks if ''n'' is divisible by ''i''. If ''n'' is divisible
    by ''i'', it means that ''i'' is a factor of ''n''.

    5. If ''i'' is a prime factor of ''n'' and is not already in the ''primes'' list,
    it is added to the list.

    6. ''n'' is then divided by ''i'', so that we can continue to check if ''i'' is
    a prime factor of the remaining value of ''n''.

    7. If ''i'' is not a prime factor of ''n'', ''i'' is incremented by 1 and the
    loop continues to the next iteration.

    8. The loop continues until ''n'' is less than or equal to 1.

    9. Finally, the list of ''primes'' containing all the prime factors of ''n'' is
    returned as the output of the algorithm.


    ## Coin Change


    The coin change algorithm is used to determine whether a given number can be expressed
    as a combination of values from a specified list. This algorithm takes as input
    a number and an array, and checks whether the number can be formed using elements
    of the given list. The idea to solve this problem is to use dynamic programming.
    Specifically, the algorithm creates a list with $n + 1$ elements, and initializes
    it to zero, except for the first element ($ways[0]$), which is set to 1. This
    represents the fact that there is one way to make a total of 0 using no coins
    from the list. The i-th element of this array is equal to the number of times
    that the number $i$ can be made with the numbers of the array. Hence, the last
    element of the array indicates the number of ways the number $n$ can be made by
    the array elements. The Python code for the balanced centrifuge is depicted in
    Code 3.28.


