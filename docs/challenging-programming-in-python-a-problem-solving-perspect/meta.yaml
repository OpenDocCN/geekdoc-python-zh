    ## 6.5 Number Round Counter


    In this challenge, you are given an array of numbers which may be either sorted
    or unsorted. The array is filled with numbers from a permutation of 0 to $n -
    1$. The objective of this challenge is to compute the number of rounds required
    to collect the numbers in ascending order. In the first round, the numbers are
    considered in ascending order. In the subsequent rounds, the numbers that have
    not been considered in the previous rounds are taken into account, again in ascending
    order. This process is repeated until all the numbers in ascending order have
    been visited. For example, let us consider the given list $l = [0, 4, 3, 5, 2,
    1]$. In the first round, 0 and 1 are in ascending order, in the second round,
    just 2 is in ascending order, in the third round, 3 is in ascending order, and
    in the fourth round, 4 and 5 are in ascending order. Hence, there are four rounds
    for list $L$. Write a function that as input takes a permutation of numbers from
    0 to $n - 1$, and returns the numbers of rounds. For some inputs, the expected
    outputs are illustrated in Table 6.5.


    ### Algorithm


    To solve this challenge the method of inverse permutation is used. Let $perm$
    be the given array, and $inverseperm$ is an array equal to size $perm$ that is
    filled with zeros initially, *inverseperm* is utilized to inverse the given permutation.
    For each *i* in *perm*, statement *inverseperm[perm[i]] = i* inverse the permutations.
    To count the number of rounds *rounds* is defined. Initially, *rounds* is set
    to 1, as there is always a sequence of numbers in ascending order that the sequence,
    where the cardinality of the sequence is at least one. Let *n* be the cardinality
    of *inverseperm*, for *k* = 1 to *n*, if *inverseperm[k] < inverseperm[k - 1]*,
    so *k* is on the left side *k - 1*, and *rounds* must be incremented by one. The
    Python code to compute and return the number of rounds in which the numbers are
    collected in ascending order is depicted in Code 6.5.


