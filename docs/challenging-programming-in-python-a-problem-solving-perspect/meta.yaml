    \ division of $(low + high)$ by 2.\n    2. Set $guess$ to $mid$ raised to the\
    \ $power$.\n    3. If $guess$ is equal to $n$, return True.\n    4. Else if $guess$\
    \ is less than $n$, set low to $mid + 1$.\n    5. Else, set $high$ to $mid - 1$.\n\
