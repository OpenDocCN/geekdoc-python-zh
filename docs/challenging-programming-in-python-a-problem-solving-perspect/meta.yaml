    ## 6.5 数字轮次计数器


    在这个挑战中，你会得到一个数字数组，它可能是已排序的，也可能是未排序的。该数组由 0 到 $n - 1$ 的一个排列中的数字填充。此挑战的目标是计算按升序收集数字所需的轮次。在第一轮中，数字按升序考虑。在后续轮次中，考虑前几轮中未考虑过的数字，同样按升序。此过程重复进行，直到所有数字都按升序被访问过。例如，让我们考虑给定的列表
    $l = [0, 4, 3, 5, 2, 1]$。在第一轮中，0 和 1 是升序的；在第二轮中，只有 2 是升序的；在第三轮中，3 是升序的；在第四轮中，4
    和 5 是升序的。因此，列表 $L$ 需要四轮。编写一个函数，输入是 0 到 $n - 1$ 的数字排列，返回轮次数。对于某些输入，预期输出如表 6.5 所示。


