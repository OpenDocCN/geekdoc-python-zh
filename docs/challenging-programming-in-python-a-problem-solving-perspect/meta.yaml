    为了解决这个挑战，使用了逆排列的方法。设 $perm$ 为给定的数组，$inverseperm$ 是一个与 $perm$ 大小相等的数组，初始填充为零，*inverseperm*
    用于反转给定的排列。对于 *perm* 中的每个 *i*，语句 *inverseperm[perm[i]] = i* 反转排列。为了计算轮次数，定义了 *rounds*。最初，*rounds*
    设置为 1，因为总存在一个数字序列是升序的，该序列的基数至少为 1。设 *n* 为 *inverseperm* 的基数，对于 *k* = 1 到 *n*，如果
    *inverseperm[k] < inverseperm[k - 1]*，那么 *k* 在 *k - 1* 的左侧，*rounds* 必须加一。计算并返回数字按升序收集的轮次数的
