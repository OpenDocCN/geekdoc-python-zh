    \n```\n1  s='''worLD'''\n2  r=s.lower()\n3  print(r)\n4  #Output: world\n5  s='UniversitY\
    \ '\n6  r=s.lower()\n7  print(r)\n8  #Output: university\n9  s='PYTHON'\n10  r=s.lower()\n\
    11  print(r)\n12  #Output: python\n```\n\n## 2.2.4.23 Type Conversion\n\nThe process\
    \ of converting an object from one data type to another is known as type conversion.\
    \ Python provides built-in functions for converting between different data types\
    \ such that the type of an integer is represented by *int*, the decimal is represented\
    \ by *float*, and the string is represented by *str*. Also, the type name of any\
    \ object in Python with *type(objectname)* is taken. The following examples indicate\
    \ how to *type* function is used.\n\n```\n1  s='''worLD'''\n2  r=type(s)\n3  print(r)\n\
    4  #Output: <class 'str'>\n5  s='123'\n6  r=type(s)\n7  print(r)\n8  #Output:\
    \ <class 'str'>\n9  s=4\n10  r=type(s)\n11  print(r)\n12  #Output: <class 'int'>\n\
    13  s=8.\n14  r=type(s)\n15  print(r)\n16  #Output: <class 'float'>\n17  s=2/4\n\
    18  r=type(s)\n19  print(r)\n20  #Output: <class 'float'>\n```\n\nTo convert a\
    \ value to another type, *int(value)*, *float(value)*, or *str(value)* is used,\
    \ where *value* is a specified object. Take a look at the following examples to\
    \ see how the conversion is made.\n\n```\n1  c0='4.2'\n2  print(type(c0))\n3 \
    \ # Output: <class 'str'>\n4  # Converting str to float type\n5  c1=float(c0)\n\
    6  print(type(c1))\n7  # Output: <class 'float'>\n8  c0=4\n9  print(type(c0))\n\
    10  # Output: <class 'int'>\n11  # Converting int to float type\n12  c1=float(c0)\n\
    13  print(type(c1))\n14  # Output: <class 'float'>\n15  c0=4.2\n16  print(type(c0))\n\
    17  # Output: <class 'float'>\n18  # Converting float to int type\n19  c1=int(c0)\n\
    20  print(type(c1))\n21  # Output: <class 'int'>\n22  c0='Country'\n23  '''\n\
    24  An error raises to convert\n25  string literals to int or float\n26  '''\n\
    27  c1=int(c0)\n28  print(type(c1))\n29  '''\n30  Output: ValueError: invalid\
    \ literal\n31  for int() with base 10: 'Country'\n32  '''\n33  c1=float(c0)\n\
    34  print(type(c1))\n35  '''\n36  Output: ValueError: could not\n37  convert string\
    \ to float: 'Country'\n38  '''\n39  c0=80\n40  c1=81.9\n41  c2=str(c0)\n42  c3=str(c1)\n\
    43  print(type(c2))\n44  print(type(c3))\n45  # Output: <class 'str'>\n46  # Output:\
    \ <class 'str'>\n```\n\n## 2.3 Data Structures\n\nData is one of the most important\
    \ entities in computer science. Data structures are used to organize, store, and\
    \ retrieve data efficiently. The choice of data structure determines the format\
    \ and organization of the stored data, and influences how the data is stored in\
    \ memory. In the following sections, we will describe some common data structures\
    \ in Python, including lists, arrays, matrices, sets, and dictionaries, along\
    \ with examples of how they can be used.\n\n## 2.4 List\n\nA linked list is a\
    \ data structure where each element is linked to the next element, or to the next\
    \ and previous elements, and the elements in memory are not necessarily stored\
    \ consecutively. In Python, the list data structure is widely used and can be\
    \ used to implement other data structures such as matrices and arrays. Lists in\
    \ Python are used to store a sequence of elements, which can be of any data type\
    \ supported by Python. Lists have the following important features in Python:\n\
    \n- 1. Storing duplicate elements\n  There is no limit to store duplicate elements.\n\
    - 2. Storing heterogeneous elements\n  Elements such as strings, integers, and\
    \ strings can be stored in a list.\n- 3. Being sortable\n  A list can be sorted.\
    \ For example, sort it from lower to upper, or alphabetically.\n- 4. Being changeable\n\
    \  Lists are mutable data structures, which means that their content can be modified\
    \ after they are created. Once data is stored in a list, it can be changed as\
    \ many times as needed.\n- 5. Being Iterable\n  A list is an iterable object that\
    \ can be indexed.\n\nIn Python, lists are created using square brackets [], with\
    \ the list elements separated by commas inside the brackets. The following examples\
    \ depict how the list is used.\n\n![](img/4c2df9b28bbaff22e82058b45864a49a_38_0.png)\n\
    \n```\n1  lst=[2,3.1,'−']\n2  print(lst)\n3  # Output: [2, 3.1, −]\n4  print(type(lst))\n\
    5  # Output: <class 'list'>\n```\n\nIn the above example, *lst* is a variable\
    \ point to a list object that contains the elements of 2, 3.1, ‘−’. Figure 2.5\
    \ depicts an example of a list structure in Python. Alike the string, a list is\
    \ an object and iterable, so it can be indexed in a direct way and reverse way.\
    \ Figure 2.5 depicts red numbers are the indexes in a direct way, and orange numbers\
    \ in a reverse way, and it can be seen that different data types are stored in\
    \ a list.\n\n### 2.4.1 List Built-in Functions\n\nThe list object in Python provides\
    \ a number of built-in functions for working with lists, including functions for\
    \ inserting, removing, counting, indexing, and more. Here are some examples of\
    \ how these functions can be used. In all examples, *lst* is a variable that points\
    \ to a list object, *obj* is any object, and *iterobj* is an iterable object.\n\
    \n#### 2.4.1.1 Append\n\nWith *append*, an object is inserted into the end of\
    \ a list each time, To use it, *lst.append(obj)* is used. The following examples\
    \ indicate how to *append* function is used.\n\n```\n1  lst=[2,3.1,'−']\n2  lst.append(77)\n\
    3  print(lst)\n4  # Output: [2,3.1,'−',77]\n5  lst0=[101,102,9]\n6  lst.append(lst0)\n\
    7  print(lst)\n8  # Output: [2, 3.1,'−',77 [101, 102, 9]]\n9  lst.append(9.9)\n\
    10  print(lst)\n11  # Output: [2, 3.1, '-', 77 [101, 102, 9], 9.9]\n```\n\n####\
    \ 2.4.1.2 Extend\n\nWith *extend*, an iterable object is inserted into the end\
    \ of a list each time. To use it, *lst.extend(iterobj)* is used. With this definition,\
    \ int object and float do not work with *extend* function. As a solution, float\
    \ and int objects must be converted to type string and then they can work the\
    \ *extend* function. The following examples indicate how to *extend* function\
    \ is used.\n\n```\n1  s='learning'\n2  lst=[]\n3  lst.extend(s)\n4  # Output:\
    \ ['l', 'e', 'a', 'r', 'n', 'i', 'n', 'g']\n5  s='learning'\n```\n\nIn python,\
    \ if a string is inserted with extend function, each character is inserted into\
    \ an index. To insert a string into an index of a list with the extend function,\
    \ the string must split as follows:\n\n```\n1  s='learning'\n2  lst=[]\n3  lst.extend(s.split())\n\
    4  # Output: ['learning']\n```\n\nOther example are as follows:\n\n```\n1  lst0=['theta']\n\
    2  lst=[]\n3  r='learning'\n4  lst.extend(lst0)\n5  lst.extend(r)\n6  print(lst)\n\
    7  # Output: ['theta', 'l', 'e', 'a', 'r', 'n', 'i', 'n', 'g']\n```\n\nThe extend()\
    \ function in Python is used to add elements from an iterable object to the end\
    \ of a list. However, if a non-iterable object such as an integer or float is\
    \ passed to the extend() function, Python will raise a TypeError because the object\
    \ cannot be iterated over.\n\n```\n1  lst=[]\n2  lst.extend(9)\n3  # Output: TypeError:\
    \ 'int' object is not iterable\n4  lst=[]\n5  lst.extend(9.87)\n6  # Output: TypeError:\
    \ 'float' object is not iterable\n```"
