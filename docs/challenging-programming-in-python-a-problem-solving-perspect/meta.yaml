    # 2.2.4.3 Count


    The *stringobject.count(g, s, e)* (three parameters), counts the number of appearances
    of *g*, where *stringobject* is a variable that points to a string object, *g*
    is a string object, *s* determines from what indexing counting is started and
    *e* determines until what index counting is continued; *s* and *e* are optional,
    means they can be unused. The following example shows how *count* function is
    used.


    ```

    1  s=''#1ea234rni '' ''ng\nscience ''

    2  c=s.count(''i'')

    3  print(c)

    4  # Output: 2

    5  c=s.count(''i'',10)

    6  print(c)

    7  # Output: 1

    8  c=s.count(''i'',20)

    9  print(c)

    10  # Output: 0

    11  c=s.count(''i'',2022)

    12  print(c)

    13  # Output: 0

    ```


    In the above example, it can be seen that if *s* and *e* are not specified from
    the zero index until the last index, counting is performed. The built-in function
    *count* returns zero if *g* does not appear in *stringobject* or *s* and *e* is
    the out of range of *stringobject* like *s.count(''i'',2022)* because the length
    of *s* is 21.


    > **Note**

    Note: If the start and end indexes are not specified, all indexes of an object
    are considered.'
