    \ 6, 3] → *st* = [19, 5, 456, 6, 3, 64] → *st* = [19, 5, 456, 6, 3, 64, 4] → *st*\
    \ = [19, 5, 456, 6, 3, 64, 4, 11]. So, [19, 5, 456, 6, 3, 64, 4, 11] is as the\
    \ riffled list. For the example above with in-shuffle order, the riffled list\
    \ of items is *st* = [5, 19, 6, 456, 64, 3, 11, 4]. The process to reach the answer\
    \ are *st* = [5] → *st* ="
