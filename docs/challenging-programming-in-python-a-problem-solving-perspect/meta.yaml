    index zero, the new object is inserted in the index of zero and the old object
    is inserted in the index or position one.


    ```

    Code 2.1 Python code to insert the objects into a list in a reverse order

    current_sublist=[]

    current_sublist.insert(0,5)

    current_sublist.insert(0,7)

    current_sublist.insert(0,220)

    ''''''

    The output is:


    [220, 7, 5]

    ''''''

    ```


    If an object is to be inserted at the same index, the previous object should be
    shifted one position after the current one.


    > **Note**

    > Note: `append`, `extend`, and `insert` are used to put data into a list, where
    the `append` and `extend` functions put the data to the end of a list each time,
    and `append` works with objects, while `extend` works with iterable objects. The
    `insert` function is used to put an object into a specified index.


    ## 2.4.1.4 Count


    This function is used to count the number of appearances of a given object, if
    is found the object, the number of its appearance is returned, else zero is returned,
    to use `lst.count(obj)` is used. The following examples indicate how to `count`
    function is used.


    ```

    lst=[1, ''data'', 8, 9, 7, ''8'', ''objj'', 7, 6]

    c=lst.count(7)

    print(c)

    # Output: 2

    c=lst.count(''x'')

    print(c)

    # Output: 0

    ```


    ## 2.4.1.5 Index


    Function of `index` takes three parameters `obj`, `s` and `e`, if `lst` find `obj`,
    returns its index in `lst` and else raises a ValueError, The format to use it,
    is `lst.index(obj, s, e)`, where `s` is the start address, and `e` is the end
    address to find the index. The following example shows how `index` function is
    used.


    ```

    lst=[1, ''data'', 8, 9, 7, 8, 7, 6]

    c=lst.index(8)

    print(c)

    # Output: 2

    c=lst.index(8,3,6)

    print(c)

    # Output: 5

    ```


    ## 2.4.1.6 Clear


    To clear all content of the list object, `clear` function is used. No argument
    is sent to `clear` function. The following example indicates how `clear` function
    can be used.


    ```

    lst=[1, ''data'', 8, 9, 7, ''8'', 7, 6]

    lst.clear()

    print(lst)

    # Output: []

    ```


    There is another way to clear a list object.


    ```

    lst=[1, ''data'', 8, 9, 7, ''8'', 7, 6]

    lst=[]

    print(lst)

    # Output: []

    ```


    ## 2.4.1.7 Remove


    To remove a specific object, *remove* function is used. To use it, *lst.remove(obj)*
    is used. If the object is not in *lst*, an error is raised. The following examples
    indicate how *remove* function is used.


    ```

    lst=[1, ''data'', 8, 9, 7, ''8'', 7, 6]

    lst.remove(8)

    print(lst)

    # Output: [1, ''data'', 8, 9, 7, ''8'', 7]

    lst.remove(76)

    print(lst)

    # Output: ValueError: list.remove(x): x not in list

    ```


    ## 2.4.1.8 Pop


    To remove a specific object, *pop* function is used. To use it, *lst.pop(ind)*
    is used, where *ind* is an optional parameter that specifies the index object
    is to be removed. The default value for *pop* is equal to the index of the last
    item, and if the entered index is not in the range index of *lst*, an error is
    raised. The following examples indicate how *pop* function is used.


    ```

    lst=[1, ''data'', 8, 9, 7, ''8'', 7, 6]

    lst.pop(8)

    # Output: IndexError: pop index out of range

    lst=[1, ''data'', 8, 9, 7, ''8'', 7, 6]

    lst.pop(3)

    print(lst)

    # Output: [1, ''data'', 8, 7, ''8'', 7, 6]

    ```


    > **Note**

    > Note: `remove` and `pop` are used to delete objects into a list, where `remove`
    deletes an object by its object and `pop` deletes an object by its index. The
    `clear()` function is a built-in method of the list object that is used to remove
    all elements from a list, leaving it empty.


    ## 2.4.1.9 Reverse


    To reverse the objects of a list, *reverse* function is used. No argument is sent
    to *reverse* function. The following example indicates how *reverse* function
    can be used.


    ```

    lst=[1, ''data'', 8, 9, 7, ''8'', 7, 6]

    lst.reverse()

    # Output: [6, 7, ''8'', 7, 9, 8, ''data'', 1]

    ```


    ## 2.4.1.10 Copy


    Consider the following example.


    ```

    lst1=[1, ''learn'', 8, 9, 7, ''8'', 7, 6]

    lst2=lst1

    lst1.remove(''learn'')

    print(lst1)

    # Output: [1, 8, 9, 7, ''8'', 7, 6]

    print(lst2)

    # Output: [1, 8, 9, 7, ''8'', 7, 6]

    ```


    In the above example, it can be seen that every change to *lst1*, also will be
    applied to *lst2*. In fact, with an assignment, a distinct copy is not to be created.
    To this end, *copy* function is used that has no parameter. The following examples
    indicate how *copy* function is used.


    ```

    lst1=[1, ''learn'', 8, 9, 7, ''8'', 7, 6]

    lst2=lst1.copy()

    lst1.remove(''learn'')

    print(lst1)

    # Output: [1, 8, 9, 7, ''8'', 7, 6]

    print(lst2)

    # Output: [1, ''learn'', 8, 9, 7, ''8'', 7, 6]

    ```


    ## 2.4.1.11 Nested List


    A nested list is a list of lists; or a list/lists are into another list. The following
    example creates a nested list.


    ```

    nlst=[

    [5.69,8,4.6],

    [''x'',''a'',0.88],

    [66, 7.7, ''8'']]

    ```


    All built-in functions can be applied to the nested lists. Take a look at the
    following example.


    ```

    nlst=[

    [5.69,8,4.6],

    [''x'',''a'',0.88],

    [66, 7.7, ''8'']]

    # ind=nlst.index([66, 7.7, ''8''])

    # Output: 2

    ```


    In a nested list, all lists that are in other lists, have their indexes. The more
    nested, the more indices must be used to access the elements of a nested list.
    Take a look at the following examples.


    ```

    nlst=[

    [5,8,4],

    [''x'',''a'',0.88,''r''],

    [66, 7.7,[10,9,8],4] ]

    # To access the first list and its second element

    val=nlst[1]

    print(val)

    # Output: [''x'', ''a'', 0.88, ''r'']

    val=nlst[0][1]

    print(val)

    # Output: 8

    val=nlst[2][3]

    print(val)

    # Output: [10, 9, 8]

    val=nlst[2][2][1]

    print(val)

    # Output: 9

    ```


    In the above examples, it can be seen that to access a nested list more than an
    index must be used. With details, to access element 9 located in [66, 7.7, [10,
    9, 8], 4], in the above nested list, [2][2][1] is used, where [2] points to [66,
    7.7, [10, 9, 8], 4], [2][2] points to [10, 9, 8], and [2][2][1] points to 9.


    ## 2.4.2 List Constructor


    Function of *list()* as input takes an optional iterable object, and converts
    it to a list object, to use it, *list(iterobj)* is used. In a simple statement,
    each element of *iterobj* is placed in an index of the list. Take a look at the
    following examples. All built-in functions for the list that is created with []
    can be applied to the list constructor.


    ```

    lst=list(''learning'')

    print(lst)

    # Output: [''l'', ''e'', ''a'', ''r'', ''n'', ''i'', ''n'', ''g'']

    lst=list(''1234'')

    print(lst)

    # Output: [''1'', ''2'', ''3'', ''4'']

    ```


    ## 2.5 Array


    An array consists of data of the same type, whose elements can be accessed using
    its indices. The elements in an array are stored sequentially in memory as opposed
    to a list, which means that accessing the elements in the array is faster. In
    Python, there is no special command to use an array, but a list is used. In other
    words, as the data in the array must be of the same type, then only the data of
    the same type is used in the list. In this regard, all built-in functions for
    the list can be applied to the arrays. Take a look at the following examples.


    ```

    # Creating an array of integers with the size of 6

    arr=[1,4,5,7,9]

    # Accessing to an element

    print(arr[0])

    # Output: 1

    # Creating an array of strings with the size of 6

    arr=[''v'',''c'',''g'',''n'']

    d=arr[0]+arr[2]

    print(d)

    # Output: vg

    ```'
