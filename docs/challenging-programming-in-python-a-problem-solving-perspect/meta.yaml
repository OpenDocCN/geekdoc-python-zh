    # Algorithm


    The algorithm takes a sentence as input, splits it into words, sorts them in alphabetical
    order using the bubble sort algorithm, and then sorts them again based on their
    lengths. This is done by iterating over the sorted list of words and comparing
    each word''s length with the lengths of the preceding words. If a word is longer
    than a preceding word, they are swapped. Finally, the sorted words are concatenated
    into a single string and returned.


    The Python code to sort the given string by alphabetical order and length is depicted
    in Code 4.20.


    Code 4.20 Python code to sort the given string by alphabetical order and length


    ```

    1  def bubble_sort(arr):

    2      for i in range(len(arr) - 1):

    3          for j in range(0, (len(arr) - i) - 1):

    4              if arr[j] > arr[j + 1]:

    5                  # Swap if it is needed

    6                  arr[j], arr[j + 1] = arr[j + 1], arr[j]

    7      return arr

    8  def sorted_by_alphabetical_and_length(sentence):

    9      words = sentence.split()

    10     # Sorting in alphabetical order

    11     words=bubble_sort(words)

    12     for word in range(0, len(words)):

