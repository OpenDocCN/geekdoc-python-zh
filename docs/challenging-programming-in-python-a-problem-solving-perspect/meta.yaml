    # 2.8.2.4 Clear


    To clear a dictionary *dic.clear()* is used. No argument is sent to *clear* function.
    The following example indicates how *clear* can be used.


    ```

    1 dic=d={''argentina'': 1, ''france'': 2}

    2 d.clear()

    3 print(d)

    4 # Output: {}

    5 print(type(d))

