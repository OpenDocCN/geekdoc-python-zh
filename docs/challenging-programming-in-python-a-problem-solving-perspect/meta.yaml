- md: '## 2.2.3 Decimal Type


    Decimal numbers are an important data type in Python, with a wide range of applications
    in everyday life. They are commonly used in scientific calculations, as well as
    in calculations involving weights, lengths, times, and financial transactions.
    Decimal numbers are particularly useful when precision is of utmost importance.
    For instance, the multiplication of two decimal numbers in Python can be performed
    using the operator *, as shown in the following code:


    ```

    x=1.2*3.6

    print(x)

    # Output: 4.32

    #################

    x=0.2*4

    print(x)

    # Output: 0.8

    ```


    > **Note**

    > Note: All operators instructed for the integer numbers can be used for the decimal
    numbers in Python.


    ## 2.2.4 String Type


    In Python, strings are a fundamental data type used to represent text. They can
    contain any character that Python supports and can be written using single quotes,
    double quotes, or triple quotes. The use of single or double quotes is interchangeable,
    with the only difference being that in a single-quoted string, double quotes can
    be included and vice versa. Triple quotes, on the other hand, enable the creation
    of strings spanning multiple lines. The following example shows how the strings
    in Python are used.


    ```

    x=''Learning''

    y=''''learning''''

    z=''''''

    Learning

    ''''''

    W=''''''

    Learning

    ''''''

    ```


    ### 2.2.4.1 Strings are Iterable and Indexable


    In Python, an iterable object is any object that can be looped over using a loop
    construct such as the for loop. In addition to strings, other iterable objects
    in Python include lists, sets, tuples, dictionaries, and more.


    > **Note**

    > Note: Unlike strings, lists, sets, and other iterable objects, integer and decimal
    types are not iterable in Python. If an attempt is made to loop over an integer
    or decimal in Python, a TypeError will be raised by the Python interpreter.


    String objects can be indexed, which means that individual characters within a
    string can be accessed and manipulated using their position in the string. Indexing
    is a common method for addressing elements within iterable objects in Python,
    and is typically done using a numerical or string-based index. It is important
    to note that in Python, the index of any object within an iterable is zero-based,
    meaning that the first element has an index of 0, the second element has an index
    of 1, and so on. The process of indexing in Python is demonstrated in Fig. 2.4.
    This figure shows the string ''university'' and its corresponding index positions
    highlighted in red and orange. The red numbers represent direct indexing, where
    the position of each character is indexed from left to right, starting at 0. The
    orange numbers represent reverse indexing, where the position of each character
    is indexed from right to left, starting at −1. In Python, for indexing *objectname[n]*
    is used, where *objectname* is a variable that points to an iterable object, and
    *n* is a positive or negative integer or a string. For a string object, *n* is
    a positive or negative integer. The following example shows how the strings in
    Python are indexed.


    Fig. 2.4 Indexing the string object in Python


    ![](img/4c2df9b28bbaff22e82058b45864a49a_23_0.png)


    ```

    x=''University''

    c=x[1]

    print(c)

    # output: n

    c=x[-2]

    print(c)

    # t

    ''''''

    ```


    In addition to indexing notation, Python also provides a powerful method for addressing
    one or more elements within an iterable object, known as slicing. In Python, the
    slicing notation is written as *objectname[n1 : n2 : s]*, where *objectname* is
    a variable that points to an iterable object, *n1* and *n2* are positive or negative
    integers representing the start and end indices for slicing, and *s* indicates
    the interval between the indices of the iterable object. The following example
    shows how the strings in Python are sliced.


    ```

    x=''University''

    c=x[1:3]

    print(c)

    # output: ni

    c=x[2:7]

    print(c)

    # output: ivers

    c=x[0:7]

    print(c)

    # output: Univers

    c=x[:7]

    print(c)

    # output: Univers

    c=x[4:]

    print(c)

    # output: ersity

    ''''''

    # The start and end addresses are not specified,

    # so the whole string object is considered.

    c=x[::]

    print(c)

    # output: University

    c=x[::2]

    print(c)

    # output: Uiest

    # Reversing a string

    c=x[::-1]

    print(c)

    # ytisrevinU

    ''''''

    ```


    In the above examples, it can be seen that if the start address is not specified,
    slicing from the zero indexes is started, and if the end address is not specified,
    slicing from the last index is done. Also, if the start and end addresses are
    not specified, the whole string is considered. In the above examples, with x[::
    2] from the zero index until the last index slicing is considered such that just
    the elements that are located in the even indexes are selected. Additionally,
    to reverse a string in Python, the slicing notation x[::- 1] can be used. This
    notation extracts the entire string starting from the last index (–1) and moving
    towards the first index (0) with a step size of 1, effectively reversing the order
    of the original string.


    > **Note**

    > Note: The indexing and slicing of all iterable objects in Python is the same.


    In the next, the common operations in the strings can be applied with some examples
    being described. In all examples for the strings, *stringobject* is a variable
    that points to a string object. For the variables of s1 and s2, notation + concat
    s1 and s2, as follows:


    ```

    s1=''learning''

    s2=''data''

    s3=s1+s2

    print(s3)

    # Output: learningdata

    # defining a string that contains just a space

    s0='' ''

    s3=s1+s0+s2

    print(s3)

    # Output: learning data

    ```


    The operator * can be used to repeat a given string object multiple times. The
    syntax for repeating a string is *stringobject * n*, where stringobject is a variable
    that points to a string object, and n is a positive integer indicating the number
    of times to repeat the string. The following example illustrates how operator
    * is used for the strings.


    ```

    s1=''learning''

    s2=s1*3

    # Output: learninglearninglearning

    ```


    With \n, a new line in the string is generated, as follows:


    ```

    s1=''#lea234rning\nscience''

    print(s1)

    # Output: #lea234rning

    # science

    ```


    In the above example, it can be seen that anything that Python encoding supports
    can be written, and a new line is generated. With \t, a new tab in the string
    is generated, as follows:


    ```

    s1=''#lea234rning\tscience''

    print(s1)

    # Output: #lea234rning    science

    ```


    ### 2.2.4.2 String Built-in Functions


    > **Note**

    > Note: A function is a block of code that performs a specific task and can be
    called and executed multiple times throughout a program. Functions are a fundamental
    concept in programming, allowing for the creation of modular, reusable code that
    can be easily maintained and updated.


    > **Note**

    > Note: Built-in functions in Python are pre-defined functions that are part of
    the Python language and can be executed just by referencing their name. These
    functions are part of the Python Standard Library and provide a wide range of
    functionality for common programming tasks, such as working with strings, lists,
    and other data types.'
  mdcn: '## 2.2.3 十进制类型


    十进制数是 Python 中一种重要的数据类型，在日常生活中应用广泛。它们常用于科学计算，以及涉及重量、长度、时间和金融交易的计算。当精度至关重要时，十进制数尤其有用。例如，在
    Python 中，两个十进制数的乘法可以使用运算符 `*` 来执行，如下所示：


    ```

    x=1.2*3.6

    print(x)

    # Output: 4.32

    #################

    x=0.2*4

    print(x)

    # Output: 0.8

    ```


    > **注意**

    > 注意：所有适用于整数的运算符都可以用于 Python 中的十进制数。


    ## 2.2.4 字符串类型


    在 Python 中，字符串是一种用于表示文本的基本数据类型。它们可以包含 Python 支持的任何字符，并且可以使用单引号、双引号或三引号编写。单引号和双引号的使用是可互换的，唯一的区别在于，在单引号字符串中可以包含双引号，反之亦然。而三引号则允许创建跨越多行的字符串。以下示例展示了
    Python 中字符串的使用方法。


    ```

    x=''Learning''

    y=''''learning''''

    z=''''''

    Learning

    ''''''

    W=''''''

    Learning

    ''''''

    ```


    ### 2.2.4.1 字符串是可迭代和可索引的


    在 Python 中，可迭代对象是指任何可以使用循环结构（如 `for` 循环）进行遍历的对象。除了字符串，Python 中的其他可迭代对象还包括列表、集合、元组、字典等。


    > **注意**

    > 注意：与字符串、列表、集合和其他可迭代对象不同，整数和十进制类型在 Python 中是不可迭代的。如果尝试在 Python 中遍历整数或十进制数，Python
    解释器将引发 `TypeError`。


    字符串对象可以被索引，这意味着可以使用字符串中的位置来访问和操作其中的单个字符。索引是 Python 中寻址可迭代对象内元素的常用方法，通常使用数字或基于字符串的索引。需要注意的是，在
    Python 中，可迭代对象中任何元素的索引都是从零开始的，这意味着第一个元素的索引为 0，第二个元素的索引为 1，依此类推。Python 中的索引过程如图
    2.4 所示。该图显示了字符串 ''university'' 及其对应的索引位置，分别用红色和橙色突出显示。红色数字代表直接索引，其中每个字符的位置从左到右索引，从
    0 开始。橙色数字代表反向索引，其中每个字符的位置从右到左索引，从 -1 开始。在 Python 中，索引使用 *objectname[n]* 的形式，其中
    *objectname* 是指向可迭代对象的变量，*n* 是正整数、负整数或字符串。对于字符串对象，*n* 是正整数或负整数。以下示例展示了 Python
    中字符串的索引方式。


    图 2.4 Python 中字符串对象的索引


    ![](img/4c2df9b28bbaff22e82058b45864a49a_23_0.png)


    ```

    x=''University''

    c=x[1]

    print(c)

    # output: n

    c=x[-2]

    print(c)

    # t

    ''''''

    ```


    除了索引表示法，Python 还提供了一种强大的方法来寻址可迭代对象中的一个或多个元素，称为切片。在 Python 中，切片表示法写作 *objectname[n1
    : n2 : s]*，其中 *objectname* 是指向可迭代对象的变量，*n1* 和 *n2* 是表示切片起始和结束索引的正整数或负整数，*s* 表示可迭代对象索引之间的间隔。以下示例展示了
    Python 中字符串的切片方式。


    ```

    x=''University''

    c=x[1:3]

    print(c)

    # output: ni

    c=x[2:7]

    print(c)

    # output: ivers

    c=x[0:7]

    print(c)

    # output: Univers

    c=x[:7]

    print(c)

    # output: Univers

    c=x[4:]

    print(c)

    # output: ersity

    ''''''

    # 未指定起始和结束地址，

    # 因此考虑整个字符串对象。

    c=x[::]

    print(c)

    # output: University

    c=x[::2]

    print(c)

    # output: Uiest

    # 反转字符串

    c=x[::-1]

    print(c)

    # ytisrevinU

    ''''''

    ```


    在上面的示例中，可以看到，如果未指定起始地址，则从零索引开始切片；如果未指定结束地址，则切片到最后一个索引。此外，如果未指定起始和结束地址，则考虑整个字符串。在上面的示例中，`x[::
    2]` 从零索引到最后一个索引进行切片，只选择位于偶数索引的元素。另外，要在 Python 中反转字符串，可以使用切片表示法 `x[::- 1]`。此表示法从最后一个索引（-1）开始，以步长
    1 向第一个索引（0）移动，提取整个字符串，从而有效地反转原始字符串的顺序。


    > **注意**

    > 注意：Python 中所有可迭代对象的索引和切片方式都是相同的。


    接下来，将通过一些示例来描述字符串中常见的操作。在所有字符串示例中，*stringobject* 是指向字符串对象的变量。对于变量 s1 和 s2，使用运算符
    `+` 连接 s1 和 s2，如下所示：


    ```

    s1=''learning''

    s2=''data''

    s3=s1+s2

    print(s3)

    # Output: learningdata

    # 定义一个只包含空格的字符串

    s0='' ''

    s3=s1+s0+s2

    print(s3)

    # Output: learning data

    ```


    运算符 `*` 可用于将给定的字符串对象重复多次。重复字符串的语法为 *stringobject * n*，其中 stringobject 是指向字符串对象的变量，n
    是一个正整数，表示重复字符串的次数。以下示例说明了如何在字符串中使用运算符 `*`。


    ```

    s1=''learning''

    s2=s1*3

    # Output: learninglearninglearning

    ```


    使用 `\n`，可以在字符串中生成换行符，如下所示：


    ```

    s1=''#lea234rning\nscience''

    print(s1)

    # Output: #lea234rning

    # science

    ```


    在上面的示例中，可以看到，可以编写 Python 编码支持的任何内容，并生成换行符。使用 `\t`，可以在字符串中生成制表符，如下所示：


    ```

    s1=''#lea234rning\tscience''

    print(s1)

    # Output: #lea234rning    science

    ```


    ### 2.2.4.2 字符串内置函数


    > **注意**

    > 注意：函数是一段执行特定任务的代码块，可以在程序中多次调用和执行。函数是编程中的一个基本概念，允许创建模块化、可重用的代码，便于维护和更新。


    > **注意**

    > 注意：Python 中的内置函数是预定义的函数，是 Python 语言的一部分，只需引用其名称即可执行。这些函数是 Python 标准库的一部分，为常见的编程任务提供了广泛的功能，例如处理字符串、列表和其他数据类型。'
