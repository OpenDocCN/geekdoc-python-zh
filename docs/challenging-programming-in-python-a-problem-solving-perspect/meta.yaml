    English words can be scrambled arbitrarily without affecting their readability,
    as long as the first and last letters remain the same and the length of the word
    remains unchanged. The goal of this challenge is to unscramble a given word and
    identify similar words from a provided list. Write a function that takes a string
    ‘word’ and a list of words ‘words’ as inputs and returns a list of words from
    ‘words’ that meet the following criteria: (1) The word has the same length as
    ‘word’ and the first and last letters are the same as those of ‘word’. (2) The
    sorted order is the same. For some inputs, the expected outputs are illustrated
    in Table 5.9.


    Algorithm


    Suppose we are given a string ‘word’ and a list of words ‘words’. To unscramble
    ‘word’, we perform the following steps:


    1. Create an empty array ‘res’ to store the similar words.

    2. Iterate over each word ‘w’ in ‘words’ using a linear search.

    3. For each word ‘w’, check if it has the same length as ‘word’ and if its first
    and last letters are the same as those of ‘word’.

    4. If the checks in previous steps are successful, check if the first and last
    letters are the same as the letters of ‘word’.

    5. If the checks in steps 3 and 4 are successful, add ‘w’ to the ‘res’ array.

    6. Repeat steps 3–5 for all words in ‘words’.

    7. Return the ‘res’ array containing the similar words.


    Table 5.9 The expected outputs for certain inputs to unscramble a given word


