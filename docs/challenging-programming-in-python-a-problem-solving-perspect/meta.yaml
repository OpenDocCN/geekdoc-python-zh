    challenges. This chapter provides examples and notes to teach everything necessary
    to understand the basics of Python and to tackle the challenges. Therefore, there
    are no prerequisites for studying this book.


    ## 1.5 Target Audience


    This book presents and solves 90 challenges that can benefit a diverse range of
    people, including computer science and engineering students, as well as anyone
    who wants to master the Python language. The presented problems cover various
    fields, making it suitable for a wide range of people. Moreover, this book enhances
    the power of thinking and reasoning irrespective of the programming language.
    It can serve as a valuable resource for teaching Python in universities or schools.
    Additionally, software developers and participants in ACM or other competitions
    can benefit from this book to improve their programming skills.


    ## Chapter 2

    Python Basics


    This chapter provides an overview of the fundamental concepts and knowledge of
    Python required for this book. It includes instructions for installing and running
    a simple Python program, covers the concept of variables and the basic data types
    of boolean, integer, float, string, and the sequence type of range. The chapter
    also discusses data structures such as lists, arrays, matrices, dictionaries,
    and sets, as well as various types of if statements with examples. It covers loop
    statements, including for and while loops, as well as nested loops, and provides
    examples for each type. Finally, the chapter provides examples for creating built-in
    functions, user-defined functions, lambda functions, modules, and generators.
    Note that this chapter does not cover all statements and modules of Python.


    ### 2.1 How to Run a Python Program


    This book uses Python version 3.9 and Windows 10 operating system. An integrated
    development environment (IDE) is a programming environment that offers useful
    features for programmers such as an editor, debugger, and code completion. The
    use of an IDE simplifies Python coding. There are several popular IDEs available,
    including Pycharm, Jupyter, and Spyder. The choice of IDE depends on personal
    preference, as most IDEs use a Python interpreter, and their differences are mainly
    in appearance and features. In this book, Spyder IDE is used for Python programming,
    which requires the installation of Anaconda. Anaconda is an open-source distribution
    that enables users of Windows, Linux, and other operating systems to code in Python
    and R programming languages. The installation of Anaconda is a straightforward
    process, like any other software, requiring only a few simple clicks. Figure 2.1
    depicts how the Anaconda must be installed. Once Anaconda is installed on Windows
    10, Spyder can be accessed by searching for ‘Spyder’ in the Windows search bar
    until the Spyder icon is displayed. Clicking on the icon will open the Spyder
    environment, as depicted in Fig. 2.2.


    It is important to note that Spyder requires the installation of Anaconda, as
    mentioned earlier in the chapter.


    Figure 2.3 depicts the Spyder environment that specifies the function of each
    block, also, the F5 key can be used to run the written code.


    Fig. 2.2 Opening Spyder


    Fig. 2.3 Spyder environment


    ### 2.2 Data Types in Python


    Before discussing the supported data types in Python, it is important to understand
    the concepts of objects and variables. Python is an object-oriented programming
    language, meaning that everything in Python is an object. Object orientation enables
    programmers to perform tasks by defining various objects with unique attributes.


    In Python, a variable is essentially a word that acts as a pointer to an object.
    When an object is assigned to a variable, the variable is created automatically
    and does not need to be defined beforehand. It is imperative to follow certain
    rules while writing a variable in Python, such as naming conventions and avoiding
    reserved keywords.


    1.  A variable in Python must follow specific naming conventions. It should start
    with a letter or an underscore, and can be followed by any combination of letters,
    digits, and underscores. For example, ''_sel'' or ''tryj'' are valid variable
    names.

    2.  Python is a case-sensitive language. This means that variables with different
    capitalization, such as ''Tryj'' and ''tryj'', are treated as distinct and cannot
    be used interchangeably.

    3.  Certain words in Python, known as reserved words or keywords, have special
    meanings within the language and cannot be used as variable names. These words
    are reserved for specific purposes and cannot be repurposed. Please refer to Table
    2.1 for a list of reserved words in Python.


    Unlike statically typed languages, where variable types are determined at compile
    time, in Python, the type of a variable is determined at runtime based on the
    value assigned to it. This means that there is no need to explicitly declare the
    type of a variable before using it, as the interpreter infers the type based on
    the value it holds. This feature makes Python a highly flexible and dynamic language,
    allowing for rapid development.


    Table 2.1 The keywords in Python programming language


    | False | None | True | and | as |

    |---|---|---|---|---|

    | assert | break | class | continue | def |

    | del | elif | else | except | finally |

    | for | from | global | if | import |

    | in | is | lambda | nonlocal | not |

    | or | pass | raise | return | try |

    | while | with | yield | | |


    #### 2.2.1 Boolean Type


    In the real world, there are numerous objects that can exist in only two distinct
    states. For example, an electronic device can be switched on or off, an individual
    can agree or disagree with a particular stance, or a concept can have two opposing
    states. In Python, the ‘True’ keyword signifies that the state is true, while
    the ‘False’ keyword signifies that the state is false. In actuality, ‘True’ is
    equivalent to the numerical value of 1, while ‘False’ is equivalent to 0.


    #### 2.2.2 Integer Type


    In practice, integers are the most commonly used numeric type in real-life applications.
    They are widely used for counting odd and even numbers, tallying monetary values,
    and similar tasks. For instance, the following code shows the addition of two
    integer values:


    ```

    1  x=2+3

    2  print(x)

    3  # Output: 5

    ```


    There are several points to note regarding the code provided. Firstly, in line
    1, a variable named x is defined and assigned an integer value. Secondly, in line
    2, the print(x) statement is used to display the value stored within the variable
    x. Thirdly, line 3 is a comment. In Python, comments are used to add annotations
    in the source code for the purpose of improving its readability. Comments in Python
    are denoted by the symbol #. It is worth noting that no explicit declaration for
    the variable x is needed in Python. This is due to Python’s dynamic-typing feature,
    which allows variables to be defined without specifying their type beforehand.


    In the next some examples are provided in the below. Computing the remainder of
    two numbers with notation % is performed, as follows:


    ```

    1  x=2%3

    2  print(x)

    3  # Output: 2

    ```


    Computing the multiplication of two numbers with notation * is performed, as follows:


    ```

    1  x=2*3

    2  print(x)

    3  # Output: 6

    ```


    Computing the Division of two numbers with notation / is performed, as follows:


    ```

    1  x=1/2

    2  print(x)

    3  # Output: 0.5

    ```


    Computing the Division of two numbers with notation // is performed, where if
    the result is decimal, their floor is taken, as follows:


    ```

    1 x=1//2

    2 print(x)

    3 # Output: 0

    ```


    Computing the power of two numbers with notation ** is performed, as follows:


    ```

    1 x=2**3

    2 print(x)

    3 # Output: 8

    ```


    Computing the minus of two numbers with notation − is performed, as follows:


    ```

    1 x=2−3

    2 print(x)

    3 # Output: −1

    ```


    In the next, the comparison operators on integers will be described. For the following
    examples, the result is ‘True’ or ‘False’. For the variables of ‘a’ and ‘b’, *a
    < b* leads to a true state if *a* is less than *b*, as follows:


    ```

    1 a=4

    2 b=8

    3 z=a<b

    4 print(z)

    5 # Output: True

    ```


    For the variables of ‘a’ and ‘b’, *a > b* leads to a true state if *a* is greater
    than *b*, as follows:


    ```

    1 a=4

    2 b=8

    3 z=a>b

    4 print(z)

    5 # Output: False

    ```


    For the variables of ‘a’ and ‘b’, *a <= b* leads to a true state if *a* is less
    than or equal to *b*, as follows:


    ```

    1 a=4

    2 b=8

    3 z=b<=a

    4 print(z)

    5 # Output: False

    ```


    For the variables of ‘a’ and ‘b’, *a >= b* leads to a true state if *a* is greater
    than or equal to *b*, as follows:


    ```

    1 a=4

    2 b=8

    ```'
