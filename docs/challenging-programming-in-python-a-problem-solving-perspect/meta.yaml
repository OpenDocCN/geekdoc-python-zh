- md: "## 3.19 Sum of Two Squares\n\nIn this challenge, you will be given a positive\
    \ integer ‘n’ and your task is to calculate the squares of two numbers that add\
    \ up to ‘n’. For example, if ‘n’ is equal to 145, the answer would be (12,1).\
    \ If there are multiple answers, the answer with the highest maximum number should\
    \ be selected. For example, when ‘n’ is equal to 50, there are two possible answers:\
    \ (7,1) and (5,5). As 7 is greater than 5, the answer should be (7,1). You are\
    \ required to write a function that takes a positive integer ‘n’ as input and\
    \ returns the two numbers whose squares add up to ‘n’. If there are no such numbers,\
    \ the function should return ‘None’. The expected inputs and outputs for some\
    \ test cases are illustrated in Table 3.19.\n\nTable 3.19 The expected outputs\
    \ for certain inputs for the problem of sum of two squares\n\n| n | Expected output\
    \ |\n|---|---|\n| 50 | (7,1) |\n| 145 | (12, 1) |\n| 1480 | (38, 6) |\n| 540 |\
    \ None |\n\n### Algorithm\n\nThe algorithm finds the bases by first setting a\
    \ maximum value for the first base, then checking all candidate values for the\
    \ second base. If a candidate value for the second base leads to a pair of bases\
    \ that satisfy the conditions, the function returns this pair. The following provides\
    \ an outline of the algorithm’s steps.\n\n1. It takes a positive integer n.\n\
    2. Calculate the maximum value of the first base as the square root of half of\
    \ n.\n3. Create a set of candidate values for the second base from 1 to the maximum\
    \ value of the first base.\n4. Loop through the candidate values of the second\
    \ base.\n5. For each candidate value of the second base, calculate the difference\
    \ between n and the square of the second base.\n6. Calculate the square root of\
    \ the difference.\n7. Check if the square of the root equals the difference.\n\
    8. If it does, return the pair of bases whose squares sum up to n.\n9. If no such\
    \ pair exists, return None.\n\nThe Python code for computing the sum of two squares\
    \ is depicted in Code 3.19.\n\n```\nCode 3.19 Python code for computing the sum\
    \ of two squares\n1 def get_squares_summing_to_n(n):\n2     \"\"\"\n3     This\
    \ function returns a tuple of two\n4     integers whose squares sum up to `n`.\n\
    5     \"\"\"\n6     # The maximum value of first base\n7     max_first_base =\
    \ int((n/2)**0.5)\n8     # Set of candidate values for the second base\n9    \
    \ '''\n10    the second base cannot be less than the first base,\n11    so 1 +\
    \ max_first_base\n12    '''\n13    candidates = set(range(1, 1 + max_first_base))\n\
    14    # Loop through the candidate values of second base\n15    for second_base\
    \ in candidates:\n16        '''\n17        Calculate the difference between n\n\
    18        and square of second base\n19        '''\n20        difference = n -\
    \ second_base**2\n21        # Calculate the square root of the difference\n22\
    \        root = int(difference ** 0.5)\n23        '''\n24        Check if square\
    \ of the root\n25        equals the difference\n26        '''\n27        if root\
    \ ** 2 == difference:\n28            '''\n29            Return the pair of bases\n\
    30            whose squares sum up to `n`\n31            '''\n32            return\
    \ (root, second_base)\n33    # If no such pair exists, return None\n34    return\
    \ None\n```\n\n## 3.20 Has Three Summer\n\nIn this challenge, a sorted list of\
    \ positive integers must be evaluated to determine if there exist three numbers\
    \ whose sum is exactly equal to a given goal number. It is required to write a\
    \ function that takes as input a sorted list of positive integers, and returns\
    \ true if three numbers are found whose sum matches the goal number, otherwise\
    \ it returns false. The expected outputs for certain inputs are presented in Table\
    \ 3.20.\n\nTable 3.20 The expected outputs for certain inputs for three summer\
    \ problem\n\n| ListNumbers, goal | Expected output |\n| :--- | :--- |\n| [3, 5,\
    \ 6, 8, 9, 21], 14 | True |\n| [2, 4, 8, 16, 32], 16 | False |\n| [550, 600, 2000,\
    \ 3000, 4000], 900 | False |\n| [1, 2, 16, 79, 80, 340], 83 | True |\n\n### Algorithm\n\
    \nThere is a solution that employs three nested for loops to traverse all the\
    \ numbers and compare their sum with the target number. Although this method is\
    \ simple but has high time complexity. To reach the outlined task, an algorithm\
    \ is utilized that includes following steps.\n\n1. It takes a sorted list of numbers\
    \ and a target number as input.\n2. Check if the length of the input list is less\
    \ than 3. If it is, return False.\n3. Iterate through the sorted list one by one.\n\
    4. For each number in the list, compute the new target number by subtracting the\
    \ current number from the goal number.\n5. In the next step, the algorithm utilizes\
    \ the two summer algorithm to reach the answer. Two summer takes a list of numbers\
    \ and a target number as input, and returns True if any two numbers in the list\
    \ add up to the target number. Otherwise, it returns False.\n6. The two summer\
    \ algorithm has the following steps:\n   a. Check if the length of the input list\
    \ is less than 2. If it is, return False.\n   b. Initialize two pointers, one\
    \ at the start of the list and the other at the end of the list.\n   c. While\
    \ the start pointer is less than the end pointer:\n      1. Compute the sum of\
    \ the two numbers at the current positions of the start and end pointers.\n  \
    \    2. If the sum equals the target number, return True.\n      3. If the sum\
    \ is less than the target number, increment the start pointer to move to a larger\
    \ number.\n      4. If the sum is greater than the target number, decrement the\
    \ end pointer to move to a smaller number.\n   d. If no match was found, return\
    \ False.\n7. If such a pair exists, return True.\n8. If no match was found for\
    \ any number in the list, return False.\n\nThe Python code for computing three\
    \ summers is depicted in Code 3.20.\n\n```\nCode 3.20 Python code for computing\
    \ three-summers\n1 def has_two_sum(numbers, target):\n2     '''\n3     If the\
    \ length of the list\n4     is less than 2, it is not\n5     possible to find\
    \ two numbers\n6     that add up to target\n7     '''\n8     if len(numbers) <\
    \ 2:\n9         return False\n10\n11     '''Initialize pointers at the\n12   \
    \  start and end of the list\n13     '''\n14     start = 0\n15     end = len(numbers)\
    \ - 1\n16\n17     '''Keep moving the pointers until\n18     they meet in the middle\n\
    19     '''\n20     while start < end:\n21         two_sum = numbers[start] + numbers[end]\n\
    22\n23         '''If the sum of the two numbers\n24         equals target, we\
    \ have found a match\n25         '''\n26         if two_sum == target:\n27   \
    \          return True\n28\n29         '''If the sum is less than target,\n30\
    \         increment the start pointer to\n31         move to a larger number\n\
    32         '''\n33         elif two_sum < target:\n34             start += 1\n\
    35\n36         # If the sum is greater than target,\n37         #decrement the\
    \ end pointer to move\n38         #to a smaller number\n39         else:\n40 \
    \            end -= 1\n41\n42     '''If no match was found,\n43     return False\n\
    44     '''\n45     return False\n46\n47 '''\n48 The main function that checks\n\
    49 if there exist three numbers in\n50 a sorted list that add up\n51 to a target\
    \ number\n52 '''\n53 def has_three_summers(numbers_list, goal):\n54     '''If\
    \ the length of the list is\n55     less than 3, it is not possible\n56     to\
    \ find three numbers that\n57     add up to the target\n58     '''\n59     if\
    \ len(numbers_list) < 3:\n60         return False\n61\n62     # Iterate through\
    \ the list one by one\n63     for i in range(len(numbers_list)):\n64         '''Get\
    \ the current number\n65         from the list\n66         '''\n67         x =\
    \ numbers_list[i]\n68         '''Compute the new goal\n69         by subtracting\n\
    70         '''\n71         new_goal = goal - x\n72\n73         '''\n74       \
    \  Check if there exist two numbers\n75         in the remaining list that add\n\
    76         up to the new target\n77         '''\n78         if has_two_sum(numbers_list[i+1:],\
    \ new_goal):\n79             return True\n80\n81     '''\n82     If no match was\
    \ found,\n83     return False\n84     '''\n85     return False\n```\n\n## 3.21\
    \ Perfect Power\n\nA positive integer $n$ is considered a perfect power if it\
    \ can be expressed in the form $base^{power}$, where $base$ and $power$ are both\
    \ integers greater than 1. Write a function that as input takes a positive integer\
    \ $n$, and if find $base^{power} = n$, return true, else return false. For instance,\
    \ for $n = 64$, there is $base = 2$ and $power = 6$, $2^6 = 64$. For some inputs,\
    \ the expected outputs are illustrated in Table 3.21.\n\nTable 3.21 The expected\
    \ outputs for certain inputs for determining if a number is a perfect power\n\n\
    | n | Expected output |\n|---|---|\n| 2 | False |\n| 27 | True |\n| 729 | True\
    \ |\n| 1369 | True |\n\n### Algorithm\n\nTo determine whether a positive integer\
    \ $n$ is a perfect power or not, an algorithm is used that performs a binary search\
    \ to find the base of the perfect power. The algorithm starts by setting the power\
    \ to 2 and continues looping until it either finds a perfect power or determines\
    \ that there is no perfect power less than or equal to $n$. This algorithm has\
    \ the following steps as follows.\n\n1. It takes a positive integer $n$.\n2. Set\
    \ $power$ to 2.\n3. Loop while True:\n4. If $2^{*power} > n$, return False.\n\
    5. Set $low$ to 2 and $high$ to $n$.\n6. While $low$ is less than or equal to\
    \ $high$:\n    1. Set $mid$ to the floor division of $(low + high)$ by 2.\n  \
    \  2. Set $guess$ to $mid$ raised to the $power$.\n    3. If $guess$ is equal\
    \ to $n$, return True.\n    4. Else if $guess$ is less than $n$, set low to $mid\
    \ + 1$.\n    5. Else, set $high$ to $mid - 1$.\n7. If $base^{power}$ is equal\
    \ to n, return True\n8. Increment power by 1\n\nThe Python code for checking the\
    \ perfect powers of the positive integers is depicted in Code 3.21."
  mdcn: "## 3.19 两数平方和\n\n在这个挑战中，你将获得一个正整数‘n’，你的任务是计算两个数的平方，使其和等于‘n’。例如，如果‘n’等于145，答案将是(12,1)。如果有多个答案，应选择最大数最大的那个答案。例如，当‘n’等于50时，有两个可能的答案：(7,1)和(5,5)。由于7大于5，答案应为(7,1)。你需要编写一个函数，该函数接受一个正整数‘n’作为输入，并返回两个数，它们的平方和等于‘n’。如果没有这样的数，函数应返回‘None’。一些测试用例的预期输入和输出如表3.19所示。\n\
    \n表3.19 两数平方和问题的某些输入的预期输出\n\n| n | 预期输出 |\n|---|---|\n| 50 | (7,1) |\n| 145 |\
    \ (12, 1) |\n| 1480 | (38, 6) |\n| 540 | None |\n\n### 算法\n\n该算法首先为第一个底数设置一个最大值，然后检查第二个底数的所有候选值来找到底数。如果第二个底数的候选值导致一对底数满足条件，则函数返回这对底数。以下提供了算法步骤的概述。\n\
    \n1.  它接受一个正整数 n。\n2.  计算第一个底数的最大值为 n 的一半的平方根。\n3.  创建一个从 1 到第一个底数最大值的第二个底数的候选值集合。\n\
    4.  遍历第二个底数的候选值。\n5.  对于第二个底数的每个候选值，计算 n 与第二个底数的平方之间的差值。\n6.  计算差值的平方根。\n7.  检查根的平方是否等于差值。\n\
    8.  如果是，则返回平方和为 n 的一对底数。\n9.  如果不存在这样的对，则返回 None。\n\n计算两数平方和的 Python 代码如代码 3.19\
    \ 所示。\n\n```\nCode 3.19 Python code for computing the sum of two squares\n1 def\
    \ get_squares_summing_to_n(n):\n2     \"\"\"\n3     This function returns a tuple\
    \ of two\n4     integers whose squares sum up to `n`.\n5     \"\"\"\n6     # The\
    \ maximum value of first base\n7     max_first_base = int((n/2)**0.5)\n8     #\
    \ Set of candidate values for the second base\n9     '''\n10    the second base\
    \ cannot be less than the first base,\n11    so 1 + max_first_base\n12    '''\n\
    13    candidates = set(range(1, 1 + max_first_base))\n14    # Loop through the\
    \ candidate values of second base\n15    for second_base in candidates:\n16  \
    \      '''\n17        Calculate the difference between n\n18        and square\
    \ of second base\n19        '''\n20        difference = n - second_base**2\n21\
    \        # Calculate the square root of the difference\n22        root = int(difference\
    \ ** 0.5)\n23        '''\n24        Check if square of the root\n25        equals\
    \ the difference\n26        '''\n27        if root ** 2 == difference:\n28   \
    \         '''\n29            Return the pair of bases\n30            whose squares\
    \ sum up to `n`\n31            '''\n32            return (root, second_base)\n\
