    # Finding Prime Factors


    An empty list to store prime factors is created. The first prime number is equal
    to 2. As long as n is greater than 1, $n$ is divided by 2. If the remainder is
    zero and the number was not added to the considered list, we add it to the list.
    In each step, $n$ is updated with the quotient. If $n$ is no longer divisible
    by 2, the next prime is considered, and this process is repeated until $n < 1$.


    It takes a positive integer ''n'' as input and returns a list of prime factors
    of ''n''. The step-by-step explanation of the algorithm is outlined below.


    +   1. An empty list called ''primes'' is initialized to store the prime factors.

    2. A variable ''i'' is initialized to 2, which is the first prime number.

    3. A while loop is used to check if the number ''n'' is greater than 1.

    4. Inside the loop, it checks if ''n'' is divisible by ''i''. If ''n'' is divisible
    by ''i'', it means that ''i'' is a factor of ''n''.

    5. If ''i'' is a prime factor of ''n'' and is not already in the ''primes'' list,
    it is added to the list.

    6. ''n'' is then divided by ''i'', so that we can continue to check if ''i'' is
    a prime factor of the remaining value of ''n''.

    7. If ''i'' is not a prime factor of ''n'', ''i'' is incremented by 1 and the
    loop continues to the next iteration.

    8. The loop continues until ''n'' is less than or equal to 1.

    9. Finally, the list of ''primes'' containing all the prime factors of ''n'' is
    returned as the output of the algorithm.


