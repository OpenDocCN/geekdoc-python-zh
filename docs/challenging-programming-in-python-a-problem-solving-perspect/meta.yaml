    ## 6.6 Reaching Stable State in Candy Share


    A group of children is seated around a circular table with candies placed in front
    of them. The candies are indistinguishable from each other. In order to synchronize
    the children, their teacher rings a bell. When the bell rings, each child who
    has at least two candies must send one candy to the child on their left and one
    to the child on their right. Children with one or zero candies are not required
    to take any action. The application of the pigeonhole principle demonstrates that
    when there are more candies than children, the program will never terminate. Write
    a function that takes the initial distribution of candies as its input and returns
    the number of steps required to reach a stable state. A stable state is one in
    which it is not possible to transfer any more candies to the right or left. The
    expected outputs for certain inputs are shown in Table 6.6.


    ### Algorithm


    It recursively applies a set of rules to the input ‘candies’ list until a stable
    state is reached, where no child has more than one candy. At each iteration, the
    algorithm identifies a child with more than two candies and transfers one candy
    to each of its adjacent children. This process is repeated until all children
    have at most one candy, at which point the algorithm terminates and returns the
    number of states it took to reach the stable state. The algorithm steps are outlined
    in detail as follows:


    1.  It takes two parameters: ‘candies’: a list of integers representing the number
    of candies each child has. ‘states’ (optional): an integer representing the number
    of states that the program has reached a stable state (default is 0).

    2.  Check if the base case is reached. If the number of children is 0 or 1, candies
    is equal to the total number of children, return the number of states.

    3.  Create a copy of the ‘candies’ list for the current round.

    4.  Iterate over each child in the ‘candies’ list.

    5.  Check if the current child has at least two candies. If so, remove two candies
    from the current child and give one candy to each of the neighboring children
    (i.e., the child to the left and the child to the right).

    6.  Recursively do the above steps with the updated ‘candies’ list and the incremented
    ‘states’.

    7.  Return the final value of ‘states’ when the base case is reached.


    The Python code to return the number of states reaching to a stable state in the
    candy share problem is depicted in Code 6.6.


    Table 6.6 The expected outputs for certain inputs for reaching stable state in
    candy share


    | Candies | Expected output |

    | :--- | :--- |

    | [0, 0, 0, 3] | 1 |

    | [2, 0, 0, 1] | 2 |

    | [2, 0, 0, 0, 0, 0, 4, 0, 1] | 8 |

    | [0, 4, 0, 0, 0, 3, 0, 1, 0, 0] | 4 |


    **Code 6.6** Python code to return the number of states reaching to a stable state
    in candy share problem


    ```python

    1 def candy_share(candies, states=0):

    2     """

    3     For returning the number of

    4     states that the program

    5     have reached a stable state.

    6     """

    7     # Base case: all children have at most 1 candy

    8     if candies.count(0) + candies.count(1) == len(candies):

    9         return states

    10

    11     # A copy of candies list for any round

    12     previous_state = candies.copy()

    13

    14     """

    15     To apply the laws

    16     of the game for every child

    17     """

    18     for i in range(len(candies)):

    19         """

    20         Only a child who has more

    21         than two candies in each round

    22         must transfer its candies to left

    23         and right

    24         """

    25         if previous_state[i] >= 2:

    26             # Remove candies of the child

    27             candies[i] -= 2

    28

    29             # Transfer them to left and right

    30             candies[(i - 1) % len(candies)] += 1

