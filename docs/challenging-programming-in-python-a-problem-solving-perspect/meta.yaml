    | [0, 1, 2, 4, 3, 5] | 2 |

    | [4, 11, 2, 8, 6, 9, 5, 3, 0, 10, 1, 12, 7] | 6 |

    | [0, 1, 4, 3, 2] | 3 |


    **Code 6.5** Python code to compute the number of rounds to collect the numbers
    in ascending order


