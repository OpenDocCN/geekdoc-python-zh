    # 3.26 Fibonacci Word


    The Fibonacci word is a sequence that resembles the ordinary Fibonacci sequence,
    with the difference that instead of the sum of the two previous numbers, their
    concatenation is considered. The first term of this sequence is 0, and the second
    term is 01 (as a string). Each subsequent term is obtained by concatenating the
    two previous terms. For example, the third term is obtained by concatenating the
    first and second terms, which results in 010. Similarly, the fourth term is obtained
    by concatenating the second and third terms, which results in 01001, and so on.
