    # 7.6 Counting Dominator Numbers


    An element is considered a dominator in a list of items if the numbers to its
    right are smaller than the element. The task in this challenge is to find the
    number of dominators in a given list. According to this definition, the last element
    of the list is always a dominator. For example, consider the given list *items*
    = [-492, 124, 113, -38, -28, -15]. We can see that element 124 is a dominator
    because it is larger than 113, -38, -28, and -15. Element 113 is also a dominator
    because it is larger than -38, -28, and -15. Finally, -15 is the last element
    of the list, and so it is also a dominator. Therefore, the number of dominators
    in this list is three. If there is an empty list as an input, a zero number must
    be returned. For some inputs, the expected outputs are illustrated in Table 7.6.'
