    ## 3.5 Counting Possible Corners


    On a two-dimensional integer grid, a corner is defined as three points of the
    form (x, y), (x, y + h), and (x + h, y) for some value of h greater than 0. These
    points form a carpenter’s square or a chevron shape that points towards the southwest,
    with the point (x, y) serving as the tip and (x, y + h) and (x + h, y) defining
    its axis-aligned wings of equal length. Write a function that as input take a
    list of points sorted by their x-coordinates, ties broken by y-coordinates, and
    returns the number of possible corners. For some inputs, the expected outputs
    are illustrated in Table 3.5.


    ## Algorithm


    The algorithm to count the possible corners is to find all 3-point combinations
    in the list of points that form a carpenter’s square or chevron shape as described
    in the problem statement. The algorithm steps are outlined in detail as follows:


    - 1. initialize a variable named *counter* to zero.

    - 2. Iterate over each point in the list of points using a nested loop.

    - 3. For each point, check if there exists another point with a larger x-coordinate
    and the same y-coordinate.

    - 4. If such a point exists, check if the third point needed to form a corner
    (as per the definition provided in the problem) is also present in the list of
    points.

    - 5. If the third point exists, increment the counter variable by 1.

    - 6. Return the final value of the *counter*.


    The Python code for counting possible corners is depicted in Code 3.5.


    ```

    Code 3.5 Python code for counting corners

    1 def counting_possible_corners(points):

    2     counter = 0

    3     for x, y in points:

    4         for x2, y2 in points:

    5             if x2 > x and y2 == y and \

    6                 (x + y2 - y, y + x2 - x) in points:

    7                     counter += 1

    8     return counter

    ```


