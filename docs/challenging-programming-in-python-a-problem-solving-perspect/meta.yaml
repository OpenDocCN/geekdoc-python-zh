    \ Safe Rooks with Friends\n\nChess is a sport that is familiar to everyone, or\
    \ at the very least, has been heard of. However, have you ever pondered the question\
    \ of how the game would progress if only the rook pieces were present on the board?\
    \ Consider an $n - by - n$ chessboard with a selection of rook pieces placed upon\
    \ it, some of which belong to the same side as the friend player, and some of\
    \ which belong to the opposing side. The rook pieces are permitted to move either\
    \ horizontally or vertically, and the chessboard spans from square $(0, 0)$ to\
    \ $(n - 1, n - 1)$. The objective of this challenge is to determine the number\
    \ of safe squares on the board for friend rooks. For some inputs, the expected\
    \ outputs are illustrated in Table 6.12.\n\n### Algorithm\n\nIt takes three inputs:\
    \ an integer n representing the size of a square chessboard, a list of tuples\
    \ $friend\\_rooks$ representing the positions of friendly rooks on the board,\
    \ and a list of tuples $enemy\\_rooks$ representing the positions of enemy rooks\
    \ on the board. It returns an integer representing the number of safe squares\
    \ on the board. In the first step, a board of size $n * n$ is created, with all\
    \ squares initialized to zero to signify that they are empty. Friend's pieces\
    \ are then placed on the board represented by the value 1, while enemy pieces\
    \ are represented by $-1$. In the next step, the safety of each square is checked\
    \ by examining its surrounding squares in the left, right, up, and down directions.\
    \ If a square is safe from all these directions, meaning it does not contain an\
    \ enemy piece, or it contains a friend's piece, or it is empty, then it is considered\
    \ a safe square. The counter variable $Safesquares$ is incremented by one for\
    \ each safe square encountered. Finally, in the last step, the function returns\
    \ $Safesquares$, which represents the number of safe squares on the board for\
    \ the friend's pieces.\n\nThe Python code to return the number of safe squares\
    \ for friend rooks is depicted in Code 6.12.\n\n**Table 6.12** The expected outputs\
    \ for certain inputs for determining the number of safe squares on the board for\
    \ friend rooks\n\n| n, friends, enemies | Expected output |\n| :--- | :--- |\n\
    | 22, [(11, 7), (2, 4), (15, 7)], [(10, 20), (18, 12)] | 397 |\n| 9, [(5,5)],\
    \ [(2,5), (1,3)] | 52 |\n| 4, [(2,2)], [(2,1)] | 10 |\n| 7, [(2,2)], [(2,1), [6,4],\
    \ [6,3]] | 22 |\n\nCode 6.12 Python code to return the number of safe squares\
    \ for friend rooks\n\n```python\ndef Safe_rooks_with_friends(n, friend_rooks,\
    \ enemy_rooks):\n    # Initialize the chessboard\n    chess = [[0] * n for _ in\
    \ range(n)]\n    # Place rooks on the board\n    for x, y in friend_rooks + enemy_rooks:\n\
    \        value = 1 if (x, y) in friend_rooks else -1\n        chess[x][y] = value\n\
    \n    # Count safe squares\n    safe_squares = 0\n    for i in range(n):\n   \
    \     for j in range(n):\n            if chess[i][j] != 0:\n                continue\
    \ # Skip occupied squares\n\n            # Check if the square is safe\n     \
    \       is_safe = True\n            for k in range(j - 1, -1, -1): # Check left\n\
    \                if chess[i][k] == -1:\n                    is_safe = False\n\
    \                    break\n                elif chess[i][k] == 1:\n         \
    \           break\n            for k in range(j + 1, n): # Check right\n     \
    \           if chess[i][k] == -1:\n                    is_safe = False\n     \
    \               break\n                elif chess[i][k] == 1:\n              \
    \      break\n            for k in range(i + 1, n): # Check down\n           \
    \     if chess[k][j] == -1:\n                    is_safe = False\n           \
    \         break\n                elif chess[k][j] == 1:\n                    break\n\
    \            for k in range(i - 1, -1, -1): # Check up\n                if chess[k][j]\
    \ == -1:\n                    is_safe = False\n                    break\n   \
    \             elif chess[k][j] == 1:\n                    break\n\n          \
    \  if is_safe:\n                # The square is safe\n                safe_squares\
    \ += 1\n    return safe_squares\n```\n\n## 6.13 Highest Score in Crag Score\n\n\
