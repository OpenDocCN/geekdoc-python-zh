    14        ''''''

    15        if len(w) != len(word):

    16            continue

    17        elif w[0] != word[0] or w[-1] != word[-1]:

    18            continue

    19        # You can employ any sorting algorithm

    20        if bubble_sort(list(word)) == bubble_sort(list(w)):

    21            res.append(w)

    22    return res

