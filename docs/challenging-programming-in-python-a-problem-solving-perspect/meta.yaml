    \ integer numbers, and the first layer is initialized with $start$ number. All\
    \ positive integers have the same distance in each layer. It starts from $start$\
    \ number and generates the numbers in each layer once by $3 * n + 1$ and once\
    \ by $n // 2$ until reaches $goal$ number. For example, consider the following\
    \ example. Let $start = 10$ and $goal = 20$, in each step, it generates some positive\
    \ integers with the same distance, until reaches the $start$ number. As the first\
    \ layer is initialized with $start$, 10 is considered.\n\n- Layer 1: Once $3 *\
    \ n + 1$ for 10 is applied and once $n // 2$ for 10 is applied. $(3n + 1) = (3\
    \ * 10 + 1) = 31$, $(n // 2) = (10 // 2) = 5$\n- Layer 2: Once $3 * n + 1$ for\
    \ 31 and 5 is applied and once $n // 2$ for 31 and 5 is applied. $(3 * 31 + 1)\
    \ = 94$, $16$, $(3 * 5 + 1) = 16$, $(31 // 2) = 15$, $(5 // 2) = 2$.\n- Layer\
    \ 3: 283, 47, 46, 7, 49, 8, 1\n- Layer 4: 850, 141, 142, 23, 139, 22, 3, 148,\
    \ 24, 25, 4, 0\n- Layer 5: 2551, 425, 424, 70, 71, 11, 69, 67, 10, 74, 73, 12,\
