    All the statements discussed in previous sections are simple statements, which
    are executed one after another. However, in Python, the indentation of a line
    of code is used to define a block of code, rather than using braces or other symbols
    like in some other programming languages. A block of code in Python is defined
    by using indentation. All the statements within a block must be indented with
    the same amount of white spaces relative to the header. This is in contrast to
    languages like C++, where blocks of code are defined by using braces . Another
    important concept in Python is a compound statement, which is composed of several
    simple statements that affect the execution of the program. Compound statements
    typically start with a header that consists of a keyword followed by an expression,
    and end with a colon (:). The statements that follow the header are indented with
    the same amount of white spaces and are considered to be part of the block of
    code.


    Some examples of compound statements in Python include the if statement for conditional
