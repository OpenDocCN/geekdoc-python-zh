  mdcn: "## 2.16 递归\n\n在计算机科学中，递归是一种技术，其中函数反复调用自身，直到满足某个条件（基本情况）。递归的重要性在于它能够高效地解决那些可以分解为更小、相似子问题的复杂问题。以下代码使用递归计算一个数的阶乘。\n\
    \n```\n#使用递归计算数字n的阶乘\ndef factorial(n):\n    # 检查n是否等于0（基本情况）\n    if n==0:\n\
    \        # 返回1作为0的阶乘\n        return 1\n    #如果n不等于0，\n    #则递归计算阶乘\n    else:\n\
    \        # 将n乘以n-1的阶乘\n        return n * factorial(n-1)\n```\n\n此外，以下代码使用递归计算第\
    \ *n* 个斐波那契数。\n\n```\n'''\n使用递归计算第n个斐波那契数\n'''\ndef fibonacci(n):\n    '''\n \
