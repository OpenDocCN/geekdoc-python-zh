    ## 3.3 Brussel Choice Problem


    In this challenge, a function must be created for the Brussel choice problem.
    The function takes positive integers n, mink, and maxk as input parameters and
    generates a sorted list of all positive integers n for which there exists a subset
    m that can take on values of either 2 times m or the fraction m/2. The resulting
    list is required to be in ascending order while ensuring that the subset m falls
    within the range of mink and maxk. For some inputs, the expected outputs are illustrated
    in Table 3.3.


    Table 3.3 The expected outputs for certain inputs for Brussel Choice


    | n, mink, maxk | Expected output |

    | :--- | :--- |

    | 10, 2, 5 | [5, 20] |

    | 9, 1, 4 | 18 |

    | 47, 1, 1 | [27, 87, 414] |

    | 100, 84, 99 | [] |


    ### Algorithm


    In general, the algorithm creates a numerical list through specific operations
    performed on the digits of the input number ''n''. The said operations comprise
    dividing a subset of digits by 2 or multiplying it by 2 based on whether the subset
    represents an even or odd integer. Subsequently, the resultant numerical list
    is sorted in ascending order. The algorithm steps are outlined in detail as follows:


    1. The algorithm takes three parameters: ''n'', ''mink'', and ''maxk''.

    2. Initialize an empty list called ''result''.

    3. Convert the input integer ''n'' to a list of its digits using list comprehension
    and save it to the variable ''digits''.

    4. Iterate over ''k'' from ''mink'' to ''maxk+1''.

    5. For each value of ''k'', iterate over ''i'' from 0 to ''len(digits)-k+1''.

    6. Extract the sub-list of digits from index ''i'' to ''i+k-1'', convert it to
    an integer and save it to the variable ''digit''.

    7. Check if ''digit'' is even. If so, compute half of ''digit'' and save it to
    the variable ''half_digit''.

    8. Create a new list called ''new_digits'' which consists of the first ''i'' elements
    of ''digits'', followed by the digits of ''half_digit'', followed by the remaining
    elements of ''digits''.

    9. Convert ''new_digits'' to an integer and save it to the variable ''new_num''.

    10. Append ''new_num'' to the list ''result''.

    11. Create a new integer called ''nd'' which is twice ''digit''.

    12. Create a new list called ''new_digits'' which consists of the first ''i''
    elements of ''digits'', followed by the digits of ''new_digit'', followed by the
    remaining elements of ''digits''.

    13. Convert ''new_digits'' to an integer and save it to the variable ''new_num''.

    14. Append ''new_num'' to the list ''result''.

    15. Sort the list ''result'' using the insertion sort algorithm in an ascending
    order.

    16. Return the sorted list ''result''.


    Code 3.3 depicts the Python code for the Brussel choice problem.


    ```

    Code 3.3 Python code for brussels choice problem

    1 def insertion_sort(arr):

    2     for i in range(1, len(arr)):

    3         k = arr[i]

    4         j = i - 1

    5         while j >= 0 and k < arr[j]:

    6             arr[j + 1] = arr[j]

    7             j -= 1

    8         arr[j + 1] = k

    9     return arr

    10

    11 def brussels_choice_problem(n, min_k, max_k):

    12     res = []

    13     digits = [int(d) for d in str(n)]

    14     for k in range(min_k, max_k+1):

    15         for i in range(len(digits)-k+1):

    16             d = int(''''.join(str(d)

    17                     for d in digits[i:i+k]))

    18             if d % 2 == 0:

    19                 hd = d // 2

    20                 new_digits = digits[:i] + \

    21                 [int(d) for d in str(hd)] + digits[i+k:]

    22                 new_num = int(''''.join(str(d)

    23                         for d in new_digits))

    24                 res.append(new_num)

    25             nd = d * 2

    26             new_digits = digits[:i] + \

    27             [int(d) for d in str(nd)] + digits[i+k:]

    28             new_num = int(''''.join(str(d)

    29                             for d in new_digits))

    30             res.append(new_num)

    31     res = insertion_sort(res)

    32     return res

    ```


    ## 3.4 Inverse Collatz Conjecture


    The Collatz conjecture is a mathematical statement that asserts that any integer
    smaller than 2^68, satisfying the two conditions specified in Eq. 3.2, will eventually
