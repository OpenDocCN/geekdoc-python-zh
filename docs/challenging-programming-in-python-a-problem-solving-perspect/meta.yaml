    # 3.2 Reaching a Point in Lattice Path


    Let the point (x,y) be in a lattice grid that consisted of the pairs of natural
    numbers, and one want to reach to point (0,0). At each point, the movement must
    be either left or down. Write a function that counts the highest number of states
