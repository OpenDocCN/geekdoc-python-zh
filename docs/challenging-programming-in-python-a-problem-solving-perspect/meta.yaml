    \ riffle shuffle, the list is split into two equal halves, and the shuffle is\
    \ performed by alternately taking one element from each half. There are two types\
    \ of perfect riffle shuffles: an out-shuffle, where the first item of the first\
    \ half is taken first, followed by the first item of the second half, and so on\
