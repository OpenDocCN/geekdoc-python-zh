    \ 1, 9, 14]且*k* = 2，答案仍然是9，因为要求的是至少满足条件的第一个。对于第二个例子，考虑['cobol', 'ruby', 'c++',\
    \ 'python', 'c', 'php']，且*k* = 2。哪个字符串前面至少有k个更小的数字？首先，取每个字符串的长度。然后进行与前一个例子相同的操作。第二个例子的答案是'python'，因为它的长度是6，且前面有'c++'、'cobol'和'ruby'。对于某些输入，预期输出如表4.9所示。\n\
    \n表4.9 查找前面有k个更小数字的对象的某些输入的预期输出\n\n| Items,k | 预期输出 |\n| :--- | :--- |\n| [4,2,\
    \ 1, 9, 14],k=3 | 9 |\n| [2,3,4,871], k=4 | None |\n| [700,3,900,400,1100],k=2\
    \ | 900 |\n| ['cobol','ruby','c++','python','c','php'],k=2 | 'python' |\n\n###\
    \ 算法\n\n该算法遍历items列表中的每个项，并检查其前面是否有至少k个更小的项。为此，算法创建一个子列表，包含当前项之前所有比它小的项。这是通过列表推导式完成的。子列表创建后，将其长度与k进行比较。如果长度大于或等于k，算法返回当前项作为原始列表中第一个前面有至少k个更小项的项。如果不存在这样的项，算法返回`None`。计算第一个前面有更小数字的数字的Python代码如代码4.9所示。\n\
    \n### 代码4.9 计算第一个前面有更小数字的数字的Python代码\n\n```python\ndef first_preceded_by_k_smaller_number(items,\
    \ k=1):\n    \"\"\"\n    Loop through each item in the list\n    'items' along\
    \ with its index.\n    \"\"\"\n    for i, current_number in enumerate(items):\n\
    \        \"\"\"\n        Create a list of all items before the current\n     \
    \   item that are smaller than it.\n        \"\"\"\n        smaller_numbers =\
    \ [n for n in items[:i] if n < current_number]\n\n        \"\"\"\n        If there\
    \ are at least 'k' smaller items before\n        the current item, return the\
    \ current item.\n        \"\"\"\n        if len(smaller_numbers) >= k:\n     \
    \       return current_number\n\n    \"\"\"\n    If there is no item that satisfies\n\
    \    the condition, return None.\n    \"\"\"\n    return None\n```\n\n## 4.10\
    \ Calkin-Wilf序列的第*n*项\n\nCalkin-Wilf树是一棵根二叉树，其顶点与正有理数一一对应。树的根对应数字1，对于任何有理数a/b，其左子节点对应数字a/(a+b)，右子节点对应数字(a+b)/b。每个有理数在树中恰好出现一次。当对Calkin-Wilf树进行层序遍历时，会生成一个有理数序列，称为Calkin-Wilf序列。我们希望定义一个函数，该函数接受一个正整数n作为输入，并返回Calkin-Wilf序列的第*n*项，这是一个有理数。例如，考虑以下例子。如果*n*\
    \ = 10，输出是$\\frac{3}{3+2}$。得到答案的过程描述如下。$\\frac{1}{1}$, $\\frac{1}{1+1}$, $\\frac{1+1}{1}$,\
    \ $\\frac{1}{1+1}$, $\\frac{2+1}{2}$, $\\frac{2}{2+1}$, $\\frac{2+1}{1}$, $\\\
    frac{1}{1+3}$, $\\frac{1+3}{3}$, $\\frac{3}{3+2}$。对于某些输入，预期输出如表4.10所示。\n\n表4.10\
    \ 查找calkin-wilf序列中第$n$项的某些输入的预期输出\n\n| n | 预期输出 |\n|---|---|\n| 11 | 5/2 |\n|\
    \ 2022 | 32/45 |\n| 1993 | 59/43 |\n| 24 | 2/7 |\n| 10 | 3/5 |\n\n### 算法\n\n使用广度优先搜索（BFS），这是一种图遍历算法，用于生成Calkin-Wilf序列直到第$n$项。队列数据结构用于存储序列表示的二叉树的节点。算法通过计算当前节点的左子节点和右子节点并将它们添加到队列中来生成序列中的每一项。最后，返回序列的第$n$项。以下项目说明了算法的逐步过程。\n\
    \n1.  接受一个正整数$n$。\n2.  将$n$减1。\n3.  初始化一个空队列'queue'。\n4.  将根节点(1, 1)添加到'queue'。\n\
    5.  重复以下步骤$n$次：\n    a. 使用出队函数从'queue'中出队下一个节点，并将其分子和分母分别赋值给$parent\\_num$和$parent\\\
    _denom$。\n    b. 通过设置其分子为$parent\\_num$，分母为$parent\\_num + parent\\_denom$来计算当前节点的左子节点。\n\
    \    c. 通过设置其分子为$parent\\_num + parent\\_denom$，分母为$parent\\_denom$来计算当前节点的右子节点。\n\
    \    d. 使用入队函数将左子节点和右子节点添加到'queue'。\n6. 使用出队函数从'queue'中出队最终节点，并将其分子和分母分别赋值给$final\\\
    _num$和$final\\_denom$。\n7. 如果最终节点的分母是1，则返回最终节点的分子作为整数。\n\n计算并返回calkin Wilf序列第$n$项分数的Python代码如代码4.10所示。\n\
    \n### 代码4.10 计算并返回calkin wilf序列第$n$项分数的Python代码\n\n```python\ndef nth_term_calkin_wilf(n):\n\
    \    # A function to check if queue is empty\n    def is_empty(q):\n        return\
    \ len(q) == 0\n\n    # A function to add an item to the queue\n    def enqueue(q,\
    \ item):\n        q.append(item)\n        return q\n\n    # A function to remove\
    \ an item from the queue\n    def dequeue(q):\n        if not is_empty(q):\n \
    \           return q.pop(0)\n\n    \"\"\"\n    Initialize queue with the root\
    \ node\n    (1/1) and decrement n by 1\n    \"\"\"\n    n -= 1\n    queue = []\n\
    \    queue = enqueue(queue, (1, 1))\n\n    \"\"\"\n    Generate the Calkin-Wilf\
    \ sequence\n    up to the nth term using BFS\n    \"\"\"\n    for _ in range(n):\n\
    \        # Dequeue the next node from the queue\n        parent_num, parent_denom\
    \ = dequeue(queue)\n        \"\"\"\n        Compute the left and right\n     \
    \   children of the current node\n        \"\"\"\n        left_child_num = parent_num\n\
    \        left_child_denom = parent_num + parent_denom\n        right_child_num\
    \ = parent_num + parent_denom\n        right_child_denom = parent_denom\n    \
    \    \"\"\"\n        Enqueue the left and right\n        children of the current\
    \ node\n        \"\"\"\n        queue = enqueue(queue, (left_child_num, left_child_denom))\n\
    \        queue = enqueue(queue, (right_child_num, right_child_denom))\n\n    #\
    \ Dequeue the final node from the queue\n    final_num, final_denom = dequeue(queue)\n\
    \n    # Return the nth term of the Calkin-Wilf sequence\n    if final_denom ==\
    \ 1:\n        return final_num\n    else:\n        return str(final_num) + '/'\
    \ + str(final_denom)\n```\n\n## 4.11 反转递增子数组\n\n在这个挑战中，给定一个正整数数组，任务是找到递增子数组的反转。每个子列表必须严格递增。例如，对于输入[5,\
    \ 7, 220, 33, 2, 6, 8, 1, 45]，输出递增子数组的反转：子数组是：[5, 7, 220]、[33]、[2, 6, 8]、[1, 45]，下一步，子列表被反转：[220,\
    \ 7, 5]、[33]、[8, 6]、[45, 1]。反转后的子数组按原始顺序合并。因此，[5, 7, 220, 33, 2, 6, 8, 1, 45]\
    \ → [220, 7, 5, 33, 8, 6, 2, 45, 1]。对于某些输入，预期输出如表4.11所示。\n\n表4.11 反转递增子数组的某些输入的预期输出\n\
    \n| 数组 | 预期输出 |\n|---|---|\n| [6, 3, 2] | [6, 3, 2] |\n| [5, 7, 220, 33, 2, 6,\
