    \ to Python’s syntax, it’s illegal<sup>line 4: CodeEx 3-3</sup>. You can’t use\
    \ the same quotes within a string that is used to designate it. But the escape\
    \ character allows you to do so<sup>line 6 to 8: CodeEx 3-3</sup>. Another highly\
