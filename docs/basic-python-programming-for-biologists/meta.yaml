  md: '# 7. Dictionary


    Suppose you need to use restriction site sequences for more than one restriction
    endonuclease (REs) throughout your program. Or, you need to store and reuse the
    amino acids and their single-letter codes for your project. What will you do?


    In one option, you can create a list of restriction site sequences and remember
    their order to relate them with their respective RE. Even better, create two lists.
    One for restriction site sequences and another for REs. Now maintain strict order
    so that you can tally those indexes and with help of an iteration tool (e.g.,
    `zip()` or `for` loop, etc.), you can extract restriction site sequences without
    error.


    But isn’t it too cumbersome and error-prone? As list are mutable, any error on
    your part can break your program or can give you false output! Like you need the
    sequence for EcoRI but getting that of BamH1 because of a silly indexing error
    on your part! That’s not acceptable at all!


    Fortunately, Python has an incredible built-in container just for these purposes,
    where tagging a value and retrieving it using the tag is easy! It’s called the
    *Dictionary*! Dictionaries are collections of values that are mapped to *arbitrary*,
    *immutable*, and *unique keys*. These store data values in a *key-value* pair
    where each value has a unique key. These key-value pairs are the *items* of a
    dictionary.


    Dictionary is *mutable*, while keys are immutable (e.g., `str`, `int`, etc.).
    It is an *ordered* data structure (Since Python 3.7). It does not allow *duplicate
    keys*.


    Dictionary is declared using *curly brackets* containing key-value pairs in a
    comma-separated manner. See CodeEx 7-1 for further clarification.'
