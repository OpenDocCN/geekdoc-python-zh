    programming. In this regard, I strongly recommend visiting the *Rosalind website*
    ([http://rosalind.info/problems/list-view/](http://rosalind.info/problems/list-view/))
    for facing more and more challenges. In the *Problem tab*, you will find a vast
    selection of problems with varying complexity. So after completing each chapter,
    along with Chapter 14 visit Rosalind to check your concepts.


    I also request you to consult the **Glossary** whenever you face jargon. This
    book has an extensive glossary, primarily adopted, and remixed from Prof. Allen
