- md: "## 13. Regular Expression\n\nCongratulations! You have made it through to the\
    \ last chapter. You have learnt so many new things, acquired so many new skills!\
    \ You are now fit enough to start the programming adventure on your own. Now in\
    \ this last chapter, I am going to discuss another ‘not so beginner’ skill, the\
    \ *regular expression*! It will assist you to find complex biological patterns.\n\
    \nPatterns are very important in biology. Much of the work we do in computational\
    \ biology and bioinformatics is a search for a pattern. It may be a restriction\
    \ site on a DNA sequence or a conserved motif in a peptide. It may be a replication\
    \ origin on DNA or a poly-A tail of RNA. It might be a search for disease patterns\
    \ within a healthy genome or a search for genome-wide patterns between two species\
    \ to infer their phylogenies. Programming has given us the momentum we needed\
    \ for long in the never-ending quest for these patterns, to fight against severe\
    \ disease and to predict their development and fate, to excel in personalized\
    \ medicine, to know our ancestry and so on. Such possibilities are ever-expanding\
    \ with new-age computational power in our hand!\n\n## 13.1. re module\n\nThe *Regular\
    \ Expression*, often abbreviated as **RegEx**, is a sequence of characters that\
    \ form a search pattern. The regular expression makes pattern searching a lot\
    \ easier. Though by no means it’s a tool for a newbie, for a biologist it’s a\
    \ must-know. RegEx comes as Python *standard module* `re`. So to access it, first,\
    \ you have to `import` it. Let’s explore the complex pattern searching by using\
    \ `re`.\n\n## 13.2. Finding restriction sites\n\nRestriction site (RES) for EcoRI\
    \ is straightforward: G/AATTC (/ indicates the enzyme cut-point). So, finding\
    \ it in a DNA sequence would not be a big deal. However, many RESs are elusive.\
    \ What, if you need to find the RES for the AasI restriction enzyme, which is\
    \ GACNNNN/NNGTC (N could be any of the four nucleotides A/T/G/C) or RES for AccB1I\
    \ restriction enzyme, which is G/GYRCC (Y represents C or T and R represents A\
    \ or G)? It would be tricky if you try solving these problems with what you have\
    \ learned so far, though not impossible. Give it a try!\n\nAs you know finding\
    \ RES for EcoRI is easy<sup>CodeEx 13-1</sup>. However, with RegEx, finding the\
    \ RES for AccB1I (and/or AasI) is as easy as EcoRI. See CodeEx 13-2.\n\n```python\n\
    #EcoRI RES finder\ndef ecor1(seq_raw, rs = 'gaattc'):\n    seq = seq_raw.lower()\n\
    \    loc = seq.find(rs)\n    if loc != -1:\n        return loc\n    else:\n  \
    \      return 'not found'\n\nres = ecor1('aaattgaattctggca')\nprint('EcoR1 RES\
    \ location:', res)\n```\n\n**CodeEx 13-1**\n\n```\nEcoR1 RES index: 5\n>>>\n```\n\
    \nA lot of things are there in CodeEx 13-2. Let me explain. Here, line-2 defines\
    \ the function `accbl()` which takes two arguments. The first parameter is the\
    \ placeholder for the input sequence. The second parameter has a *default value*\
    \ that is the restriction sequence for AccB1I. Here the most important thing to\
    \ notice is the default value of the second parameter: `r'GG(C|T)(A|G)CC'`. `r`\
    \ at the very beginning makes it a *raw string*². Here, characters like `|`, `()`\
    \ are known as metacharacters. They have special functions. *Pipe character* (`|`)\
    \ in RegEx is equivalent to ‘either or’. Python interprets `C|T` and `(A|G)` as\
    \ *either C or T* and *either A or G*, respectively. So, Python interprets this\
    \ RegEx-defined pattern as either GGCACC or GGCGCC or GGCACC or GGTGCC and searches\
    \ into the input sequence for a match.\n\nLine-11 is calling `re` function `search()`.\
    \ `search()` takes two positional arguments. The first one is the ‘*pattern to\
    \ search for*’ and the second one is the ‘*sequence to search in*’. It returns\
    \ a *match object* (another Python type) if it finds the match. Otherwise, it\
    \ returns `None`. Line-4 stores the search result by assigning it to the `res`\
    \ variable. Note, this `res` is a *local variable* as it is specified within the\
    \ body of the function (compare line-12 where the `res` is a *global variable*).\
    \ Match-object holds the *matched sequence* and its position, i.e., its *index*.\
    \ However, these pieces of information are not directly available. For that, you\
    \ should *call* specific methods on the match-object.\n\nLine-6 uses such methods,\
    \ `group()` and `start()` on match-object, `res`. `group()` extracts the *content\
    \ of the match*, whereas the `start()` extracts the starting position of the match.\
    \ If no match is found, then the variable `res` will hold `None` and will be evaluated\
    \ as `False` in a conditional test and then line-8 will get executed. The rest\
    \ of the code is simple and I think it does not require any explanation here.\n\
    \n```python\n#defining AccB1I RES finding function\ndef accbl(raw_seq, rs=r'GG(C|T)(A|G)CC'):\n\
    \    seq = raw_seq.upper() #upper() or lower() your choice\n    res = re.search(rs,\
    \ seq)\n    if res:\n        return 'RES:' + res.group() + ', at loc:' + str(res.start())\n\
    \    else:\n        return 'not found'\n\n#now importing the re module and calling\
    \ accbl()\nimport re\nres = accbl('aatggcaccggc')\nprint(res)\n```\n\n**CodeEx\
    \ 13-2**\n\n```\nRES:GGCACC, at loc:3\n>>>\n```\n\n² As RegEx uses lots of special\
    \ characters, it is a good practice to convert any string to raw string when the\
    \ string is intended to use in RegEx. This step eliminates chances of creating\
    \ unnecessary confusion to Python.\n\n## 13.3. Metacharacters\n\nWith different\
    \ combinations of metacharacters, we can generate complex search patterns, which\
    \ are very useful indeed in biology. Here I put a list of metacharacters with\
    \ brief description and examples regarding their uses (Table 13-1).\n\n## 13.4.\
    \ `search()`\n\nThe basic function of the `re` module is `search()`. I have discussed\
    \ it in CodeEx 13-2. Its syntax is `re.search(pattern, str to search in)`. It\
    \ searches the pattern within a string for a *match* and returns a match object\
    \ if it finds a match anywhere in the string. Otherwise, it returns `None`. However,\
    \ there is a downside of `search()`. It only returns the first occurrence of the\
    \ match, if there is over one match<sup>CodeEx 13-3</sup>. To overcome this limitation,\
    \ `re` has `findall()` method. But before discussing the `findall()` we should\
    \ discuss match object property and methods available with it.\n\nTable 13-1.\
    \ RegEx Metacharacters\n\n| Metacharacters | Search pattern matches | Description\
    \ |\n| :--- | :--- | :--- |\n| A | T | A or T | Either A or T |\n| GAA | TAA |\
    \ GAA or TAA | Either GAA or TAA |\n| (AT) | AT | Capture and group; treats AT\
    \ as a group |\n| GA(A | T)AA | GAAAA or GATAA | Either A or T as they are grouped\
    \ |\n| [ATGC] | A or T or G or C | A character set. The search pattern matches\
    \ either of the enclosed characters. |\n| [A-D] | A or B or C or D | Returns a\
    \ match for anyone character, alphabetically between A and D |\n| A[GC]T | AGT\
    \ or ACT | G or C |\n| A.T | A (1 or A or X or @ etc. except '\\n') T | Any single\
    \ character in place of the dot (except newline character) |\n| ^AUG | AUGTAA\
    \ but not AAUGTAA | Any string starts with AUG |\n| [^ATGC] | NOT (A or T or G\
    \ or C) | Matches anything but not A, T, G, C |\n| GC[^AT]GA | GCCGA or GCGGA\
    \ or GCXGA or GC#GA or GA3GA, etc | Matches anything but not A, T in between GC\
    \ and GA |\n| UAA$ | TAAAUAA but NOT AAUGTAUAA | Any string ends with UAA |\n\
    | ATC* | AT or ATC or ATCC or ATCCC or ATCCCC and so on | Zero or more occurrences\
    \ of C after AT |\n| ATC+ | ATC or ATCC or ATCCC and so on, but never AT | ATLEAST\
    \ one or more occurrences of C after AT |\n| ATC? | AT or ATC | Zero or ONLY once\
    \ occurrence of C |\n| ATC{3} | ATCCC | Exactly the specified number (3) of occurrences\
    \ of C |\n| (ATC){2} | ATCATC | Exactly the specified number (2) of occurrences\
    \ of ATC (as grouped) |\n| A(TC){2} | ATCTC | Exactly the specified number (2)\
    \ of occurrences of TC (as grouped) |\n| ATC{1,3} | ATC or ATCC or ATCCC | Matches\
    \ occurrence of C, one or two or three times |\n| \\ | Signals a special character\
    \ | \\d Returns a match where the string contains digits (numbers from 0 to 9)\
    \ \\D Returns a match where the string DOES NOT contain any digits |"
  mdcn: "## 13. 正则表达式\n\n恭喜！你已经成功学到了最后一章。你学习了这么多新知识，掌握了这么多新技能！现在你已经足够强大，可以独自开始编程冒险了。在这最后一章，我将讨论另一项“不太初级”的技能——*正则表达式*！它将帮助你查找复杂的生物学模式。\n\
    \n模式在生物学中非常重要。我们在计算生物学和生物信息学中做的大部分工作都是在寻找模式。它可能是DNA序列上的限制性酶切位点，也可能是肽链中的保守基序。它可能是DNA上的复制起点，也可能是RNA的poly-A尾巴。它可能是在健康基因组中寻找疾病模式，也可能是在两个物种之间寻找全基因组模式以推断它们的系统发育关系。编程为我们长期以来在寻找这些模式、对抗严重疾病并预测其发展和命运、在个性化医疗中脱颖而出、了解我们的祖先等方面提供了所需的推动力。随着我们掌握新时代的计算能力，这样的可能性正在不断扩大！\n\
    \n## 13.1. re 模块\n\n*正则表达式*，通常缩写为 **RegEx**，是形成搜索模式的字符序列。正则表达式使模式搜索变得容易得多。虽然它绝不是新手的工具，但对于生物学家来说，它是必须掌握的。RegEx\
    \ 作为 Python *标准模块* `re` 提供。因此，要使用它，首先必须 `import` 它。让我们通过使用 `re` 来探索复杂的模式搜索。\n\n\
    ## 13.2. 查找限制性酶切位点\n\nEcoRI 的限制性酶切位点（RES）很简单：G/AATTC（/ 表示酶切位点）。因此，在 DNA 序列中找到它并不难。然而，许多\
    \ RES 是难以捉摸的。如果你需要找到 AasI 限制性酶的 RES，即 GACNNNN/NNGTC（N 可以是四种核苷酸 A/T/G/C 中的任何一种），或者\
    \ AccB1I 限制性酶的 RES，即 G/GYRCC（Y 代表 C 或 T，R 代表 A 或 G），该怎么办呢？如果你试图用目前所学的知识来解决这些问题，虽然并非不可能，但会很棘手。试一试吧！\n\
    \n如你所知，找到 EcoRI 的 RES 很容易<sup>CodeEx 13-1</sup>。然而，使用 RegEx，找到 AccB1I（和/或 AasI）的\
    \ RES 就像找到 EcoRI 的一样容易。参见 CodeEx 13-2。\n\n```python\n#EcoRI RES finder\ndef ecor1(seq_raw,\
    \ rs = 'gaattc'):\n    seq = seq_raw.lower()\n    loc = seq.find(rs)\n    if loc\
    \ != -1:\n        return loc\n    else:\n        return 'not found'\n\nres = ecor1('aaattgaattctggca')\n\
    print('EcoR1 RES location:', res)\n```\n\n**CodeEx 13-1**\n\n```\nEcoR1 RES index:\
    \ 5\n>>>\n```\n\nCodeEx 13-2 中有很多内容。让我解释一下。这里，第2行定义了函数 `accbl()`，它接受两个参数。第一个参数是输入序列的占位符。第二个参数有一个*默认值*，即\
    \ AccB1I 的限制性序列。这里最重要的是要注意第二个参数的默认值：`r'GG(C|T)(A|G)CC'`。开头的 `r` 使其成为*原始字符串*²。这里，像\
    \ `|`、`()` 这样的字符被称为元字符。它们具有特殊功能。RegEx 中的*管道字符*（`|`）等同于“或”。Python 将 `C|T` 和 `(A|G)`\
    \ 分别解释为*要么 C 要么 T* 和 *要么 A 要么 G*。因此，Python 将这个 RegEx 定义的模式解释为 GGCACC 或 GGCGCC\
    \ 或 GGCACC 或 GGTGCC，并在输入序列中搜索匹配项。\n\n第11行调用了 `re` 函数 `search()`。`search()` 接受两个位置参数。第一个是“*要搜索的模式*”，第二个是“*要搜索的序列*”。如果找到匹配项，它返回一个*匹配对象*（另一种\
    \ Python 类型）。否则，它返回 `None`。第4行通过将搜索结果赋值给 `res` 变量来存储它。注意，这个 `res` 是一个*局部变量*，因为它是在函数体内指定的（比较第12行，其中的\
    \ `res` 是一个*全局变量*）。匹配对象保存*匹配的序列*及其位置，即其*索引*。然而，这些信息不能直接获取。为此，你应该在匹配对象上*调用*特定的方法。\n\
    \n第6行使用了这样的方法，在匹配对象 `res` 上调用 `group()` 和 `start()`。`group()` 提取*匹配的内容*，而 `start()`\
    \ 提取匹配的起始位置。如果没有找到匹配项，那么变量 `res` 将持有 `None`，并在条件测试中被评估为 `False`，然后第8行将被执行。其余的代码很简单，我认为这里不需要任何解释。\n\
    \n```python\n#defining AccB1I RES finding function\ndef accbl(raw_seq, rs=r'GG(C|T)(A|G)CC'):\n\
    \    seq = raw_seq.upper() #upper() or lower() your choice\n    res = re.search(rs,\
    \ seq)\n    if res:\n        return 'RES:' + res.group() + ', at loc:' + str(res.start())\n\
    \    else:\n        return 'not found'\n\n#now importing the re module and calling\
    \ accbl()\nimport re\nres = accbl('aatggcaccggc')\nprint(res)\n```\n\n**CodeEx\
    \ 13-2**\n\n```\nRES:GGCACC, at loc:3\n>>>\n```\n\n² 由于 RegEx 使用大量特殊字符，当字符串打算在\
    \ RegEx 中使用时，将其转换为原始字符串是一个好习惯。这一步消除了给 Python 造成不必要混淆的可能性。\n\n## 13.3. 元字符\n\n\
    通过元字符的不同组合，我们可以生成复杂的搜索模式，这在生物学中确实非常有用。这里我列出一个元字符列表，并附上关于其用法的简要描述和示例（表 13-1）。\n\
    \n## 13.4. `search()`\n\n`re` 模块的基本函数是 `search()`。我在 CodeEx 13-2 中已经讨论过它。它的语法是\
    \ `re.search(pattern, str to search in)`。它在字符串中搜索模式以查找*匹配项*，如果在字符串中的任何位置找到匹配项，则返回一个匹配对象。否则，它返回\
    \ `None`。然而，`search()` 有一个缺点。如果存在多个匹配项，它只返回第一个匹配项<sup>CodeEx 13-3</sup>。为了克服这个限制，`re`\
    \ 有 `findall()` 方法。但在讨论 `findall()` 之前，我们应该讨论匹配对象的属性及其可用的方法。\n\n表 13-1. RegEx\
    \ 元字符\n\n| 元字符 | 搜索模式匹配 | 描述 |\n| :--- | :--- | :--- |\n| A | T | A 或 T | 要么 A\
    \ 要么 T |\n| GAA | TAA | GAA 或 TAA | 要么 GAA 要么 TAA |\n| (AT) | AT | 捕获和分组；将 AT\
    \ 视为一个组 |\n| GA(A | T)AA | GAAAA 或 GATAA | 要么 A 要么 T，因为它们被分组了 |\n| [ATGC] | A\
    \ 或 T 或 G 或 C | 字符集。搜索模式匹配括号内的任何一个字符。 |\n| [A-D] | A 或 B 或 C 或 D | 返回 A 到 D 之间字母顺序的任何一个字符的匹配\
    \ |\n| A[GC]T | AGT 或 ACT | G 或 C |\n| A.T | A (1 或 A 或 X 或 @ 等，除了 '\\n') T |\
    \ 点号代表任何单个字符（除了换行符） |\n| ^AUG | AUGTAA 但不是 AAUGTAA | 任何以 AUG 开头的字符串 |\n| [^ATGC]\
    \ | NOT (A 或 T 或 G 或 C) | 匹配除 A、T、G、C 之外的任何内容 |\n| GC[^AT]GA | GCCGA 或 GCGGA 或\
    \ GCXGA 或 GC#GA 或 GA3GA 等 | 匹配 GC 和 GA 之间除 A、T 之外的任何内容 |\n| UAA$ | TAAAUAA 但不是\
    \ AAUGTAUAA | 任何以 UAA 结尾的字符串 |\n| ATC* | AT 或 ATC 或 ATCC 或 ATCCC 或 ATCCCC 等 |\
    \ AT 之后 C 出现零次或多次 |\n| ATC+ | ATC 或 ATCC 或 ATCCC 等，但绝不是 AT | AT 之后 C 至少出现一次或多次\
    \ |\n| ATC? | AT 或 ATC | C 出现零次或仅一次 |\n| ATC{3} | ATCCC | C 恰好出现指定次数（3次） |\n|\
    \ (ATC){2} | ATCATC | ATC（作为分组）恰好出现指定次数（2次） |\n| A(TC){2} | ATCTC | TC（作为分组）恰好出现指定次数（2次）\
    \ |\n| ATC{1,3} | ATC 或 ATCC 或 ATCCC | C 出现一次、两次或三次 |\n| \\ | 表示特殊字符 | \\d 返回字符串包含数字（0\
    \ 到 9）的匹配项 \\D 返回字符串不包含任何数字的匹配项 |"
