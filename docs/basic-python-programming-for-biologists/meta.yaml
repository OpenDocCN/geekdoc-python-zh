  - '[PAGE 125]


    # Glossary


    **increment:** An update that increases the value of a variable (often by one).


    **index:** An integer value used to select an item in a sequence, such as a character
    in a string. In Python, indices start from 0.


    **infinite loop:** A loop in which the terminating condition is never satisfied.


    **initialization:** An assignment that gives an initial value to a variable that
    will be updated.


    **instance:** An object that belongs to a class.


    **instantiate:** To create a new object.


    **integer:** An immutable type that represents whole numbers.


    **interactive mode:** A way of using the Python interpreter by typing code at
    the prompt.


    **interface:** A description of how to use a function, including the name and
    descriptions of the arguments and return value.


    **interpreted language:** Python is an interpreted language, as opposed to a compiled
    one, though the distinction can be blurry because of the presence of the bytecode
    compiler. This means that source files can be run directly without explicitly
    creating an executable which is then run. Interpreted languages typically have
    a shorter development/debug cycle than compiled ones, though their programs generally
    also run more slowly.


    **interpreter:** A program that reads another program and executes it.


    **invocation:** A statement that calls a method.


    **item:** One of the values in a sequence. In a dictionary, another name for a
    key-value pair. Also, see the *element*.


    **iterable:** An object capable of returning its members one at a time. Examples
    of iterables include all sequence types (such as `list`, `str`, and `tuple`) and
    some non-sequence types like `dict`, `file` objects, etc.


    **iteration:** Repeated execution of a set of statements using either a recursive
    function call or a loop.'
  - '[PAGE 126]


    **iterator:** An object that can iterate through a sequence, but which does not
    provide list operators and methods.


    **key:** An object that appears in a dictionary as the first part of a key-value
    pair.


    **key-value pair:** The representation of the mapping from a key to a value.


    **keyword argument:** An argument that includes the name of the parameter as a
    “keyword”. It preceded by an identifier with an assignment operator in a function
    call.


    **keyword:** A reserved word that is used to parse a program; you cannot use keywords
    like `if`, `def`, and `while` as variable names.


    **list comprehension:** A compact way to process all or part of the elements in
    a sequence and return a list with the results. An expression with a `for` loop
    in square brackets yields a new list.


    **list:** A sequence of values. A built-in Python sequence.


    **literal value:** A literal value is the value of a type that is to be used exactly
    as it is, rather than as a variable. For examples, `''ATGC''` or `456` are literals
    when they are used exactly as it is without assigning a variable to these.


    **local variable:** A variable defined inside a function. A local variable can
    only be used inside its function.


    **logical operator:** One of the operators that combine Boolean expressions: `and`,
    `or`, and `not`.


    **loop:** A part of a program that can run repeatedly.


    **low-level language:** A programming language that is designed to be easy for
    a computer to run; also called “machine language” or “assembly language”.


    **map:** A processing pattern that traverses a sequence and performs an operation
    on each element.


    **mapping:** A relationship in which each element of one set corresponds to an
    element of another set.'
  - '[PAGE 127]


    # Glossary


    **method:** A function that is defined inside a class body and that is associated
    with an object and called using dot notation (`object.method(argument)`).


    **module object:** A value created by an import statement that provides access
    to the values defined in a module.


    **module:** A file that contains a collection of related functions and other definitions.
    It is an object that serves as an organizational unit of Python code.


    **modulus operator:** An operator, denoted with a per cent sign (%), that works
    on integers and returns the remainder when one number is divided by another.


    **natural language:** Any one of the languages that people speak that evolved
    naturally.


    **nested conditional:** A conditional statement that appears in one of the branches
    of another conditional statement.


    **nested list:** A list that is an element of another list.


    **None:** A special value returned by void functions.


    **object:** Something a variable can refer to. Any data with the state (attributes
    or value) and defined behaviour (methods), i.e., an object must have a type and
    a value.


    **object-oriented language:** A language that provides features, such as programmer-defined
    types and methods, that facilitate object-oriented programming.


    **object-oriented programming:** A style of programming in which data and the
    operations that manipulate it are organized into classes and methods.


    **operand:** One of the values on which an operator operates.


    **operator:** A special symbol that represents a simple computation like addition,
    multiplication, or string concatenation.


    **optional argument:** A function or method argument that is not required.


    **override:** To replace a default value with an argument.


    **package:** A Python module that can contain submodules or recursively, sub-packages.'
- md: '**parameter:** A named entity in a function (or method) definition that specifies
    an argument (or in some cases, arguments) that the function can accept, i.e.,
    a name used inside a function to refer to the value passed as an argument.


    **path:** A string that identifies a file.


    **PEP:** Python Enhancement Proposal. A PEP is a design document providing information
    to the Python community, or describing a new feature for Python or its processes
    or environment. PEPs should provide a concise technical specification and a rationale
    for proposed features. PEPs are intended to be the primary mechanisms for proposing
    major new features, collecting community input on an issue, and for documenting
    the design decisions that have gone into Python. The PEP author is responsible
    for building consensus within the community and documenting dissenting opinions.


    **pip:** A Python package management tool that comes bundled with Python 3.4 and
    above.


    **polymorphic:** Pertaining to a function that can work with more than one type.


    **portability:** A property of a program that can run on more than one kind of
    computer.


    **positional argument:** An argument that does not include a parameter name, so
    it is not a keyword argument.


    **print statement:** An instruction that causes the Python interpreter to display
    a value on the screen.


    **program:** A set of instructions that specifies a computation.


    **programming:** writing instructions/codes for a computer to perform.


    **prompt:** Characters displayed by the interpreter to indicate that it is ready
    to take input from the user.


    **pseudorandom:** Pertaining to a sequence of numbers that appears to be random,
    but is generated by a deterministic program.


    ## Glossary


    **Pythonic:** An idea or piece of code which closely follows the most common idioms
    of the Python language, rather than implementing code using concepts common to
    other languages.


    **reassignment:** Assigning a new value to a variable that already exists.


    **reference:** The association between a variable and its value.


    **relational operator:** One of the operators that compares its operands: ==,
    !=, >, <, >=, and <=.


    **relative path:** A path that starts from the current directory.


    **return statement:** A statement that causes a function to end immediately and
    return to the caller.


    **return value:** The result of a function. If a function call is used as an expression,
    the return value is the value of the expression.


    **rubber duck debugging:** Debugging by explaining your problem to an inanimate
    object such as a rubber duck. Articulating the problem can help you solve it,
    even if the rubber duck doesn’t know Python.


    **script mode:** A way of using the Python interpreter to read code from a script
    and run it.


    **script:** A program stored in a file.


    **search:** A pattern of traversal that stops when it finds what it is looking
    for.


    **semantic error:** An error in a program that makes it do something other than
    what the programmer intended.


    **semantics:** The meaning of a program.


    **sequence:** An ordered collection of values where each value is identified by
    an integer index.


    **shape error:** An error caused because a value has the wrong shape; that is,
    the wrong type or size.


    ## Glossary


    **shell:** A program that allows users to type commands and then executes them
    by starting other programs.


    **singleton:** A list (or other sequences) with a single element.


    **slice:** A part of a string specified by a range of indices.


    **slice:** An object usually containing a portion of a sequence. A slice is created
    using the subscript notation, [ ] with colons between numbers when several are
    given.


    **statement:** A section of code that represents a command or action.


    **string:** An immutable type that represents sequences of characters.


    **subject:** The object a method is invoked on.


    **syntax error:** An error in a program that makes it impossible to parse (and
    therefore impossible to interpret).


    **syntax:** The rules that govern the structure of a program.


    **temporary variable:** A variable used to store an intermediate value in a complex
    calculation.


    **text file:** A file object able to read and write string objects.


    **text file:** A sequence of characters stored in permanent storage like a hard
    drive.


    **traceback:** A list of the functions that are executing, printed when an exception
    occurs.


    **traverse:** To iterate through the items in a sequence, performing a similar
    operation on each.


    **tuple assignment:** An assignment with a sequence on the right side and a tuple
    of variables on the left. The right side is evaluated and then its elements are
    assigned to the variables on the left.


    **tuple:** An immutable sequence of elements.


    **type:** The type of a Python object determines what kind of object it is; a
    category of values (e.g., integers (type `int`), floating-point numbers (type
    `float`), and strings (type `str`)).


    ## Glossary


    **update:** An assignment where the new value of the variable depends on the old.


    **value:** One of the basic units of data, like a number or string, that a program
    manipulates; An object that appears in a dictionary as the second part of a key-value
    pair.


    **variable:** A name that refers to a value.


    **void function:** A function that always returns `None`.


    **Zen of Python:** Listing of Python design principles and philosophies that help
    understand and using the language. The listing can be found by typing `import
    this` at the interactive prompt.


    **zip object:** The result of calling a built-in function `zip`; an object that
    iterates through a sequence of tuples.


    ## About the author


    Krishnendu pursued his bachelors in Zoology from the Presidency College, Kolkata,
