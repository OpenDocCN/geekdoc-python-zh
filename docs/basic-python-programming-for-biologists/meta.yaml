    \nAAAA\nTTTT\nGGGG\nCCCC\n>>> #文件现在已关闭。无需显式使用 close()\n```\n\n代码示例 10-8\n\n##\
    \ 第11章：函数\n\n到目前为止，我们编写的都是小型的“一次性”代码。这是一种“用完即弃”的方法。这种方法适合学习。但这些小程序用处不大。几乎在所有情况下，我们都需要编写更大的程序，为此，需要重用一段代码。因此，我们需要**函数**，一个*可重用的代码块*，它*独立于程序中的其他代码*。是的，它和`print()`、`len()`、`type()`等一样。这些是Python中的内置函数。除了这些，Python还允许我们创建自己的函数。\n\
    \n### 11.1. 定义函数\n\n在Python中，创建函数被称为“*定义函数*”。这里有一小段代码，用于计算任何多核苷酸字符串中腺嘌呤核苷酸的数量<sup>代码示例\
    \ 11-1</sup>。现在假设在一个大型程序中，这个`A_counter`需要被多次使用。那么，只需将这段代码转换成一个函数`a_count`，就能解决这个问题！当我们调用它时，`a_count`将`返回`任何多核苷酸字符串的腺嘌呤计数<sup>代码示例\
    \ 11-2</sup>。函数的不同部分在图11-1中描述。\n\n```python\n>>> #A_counter\n>>> seq = 'AATGCAT'\n\
    >>> a_count = seq.count('A')\n>>> print(a_count)\n3\n>>>\n```\n\n**代码示例 11-1**\n\
    \n尽管如此，在深入之前，你必须记住以下关键概念。这些将指导你未来正确地定义函数。\n\n![](img/3a7148b34dba85d777e10b2273b176fd_90_0.png)\n\
    \ni) 函数名后的圆括号，包含所谓的*参数*。*参数*是*实参*的*占位符*。它就像函数定义内部列出的一个*变量*，而实参是在调用函数时传递给函数的*值*。通过参数，函数接收值，并将其传递给内部的代码块进行处理。\n\
    \nii) 虽然可以编写一个*没有*参数的函数，但该函数将不接受实参。\n\niii) 函数*内部*的所有内容对程序来说都是*不可访问的*，因为*函数创建了抽象*，程序*只能*在*调用*函数时访问它。\n\
    \niv) *变量作用域*：函数体内的变量称为**局部变量**（例如，代码示例11-2第4行的`adenine`），而函数体外的变量称为**全局变量**（例如，代码示例11-2第10行的`var`）。虽然你知道变量名在特定程序中是*唯一的*，但你可以在函数体*外*使用局部变量的名称。如果一个局部变量与一个全局变量同名，函数*内部*的任何代码都将访问局部变量。函数*外部*的任何代码将访问全局变量。\n\
    \n如果你不能完全理解所有概念，不要害怕。这对初学者来说是正常的。在获得函数使用经验后，你最终会理解所有内容。在那之前，请坚持住，并记住*开头的def关键字、第一行末尾的冒号(:)以及之后的缩进部分在定义函数时极其重要！*\n\
    \n```python\n1   >>> # '定义' 函数 a_count\n2   >>>\n3   >>> def a_count(parameter):\n\
    4           adenine = parameter.count('A')\n5           return adenine\n6   >>>\n\
    7   >>> # 调用 a_count 并传递 'AAAAA' 作为实参，并将\n8   >>> # 返回值存储在变量 var 中\n9   >>>\n\
    10  >>> var = a_count('AAAAA')\n11  >>> print(var)\n12  5\n13  >>>\n14  >>> #\
    \ 再次调用它，不存储返回值\n15  >>>\n16  >>> print(a_count('AATGAA'))\n17  4\n18  >>>\n```\n\
    \n**代码示例 11-2**\n\n### 11.2. 位置参数和关键字参数\n\n现在我定义一个函数`A_checker()`，它将检查一个核苷酸序列是否具有特定百分比（%）的腺嘌呤含量<sup>代码示例\
    \ 11-3</sup>。该函数将接受*两个*实参，一个用于序列，另一个用于用户定义的腺嘌呤百分比阈值。函数将返回*布尔值*作为输出。它将计算输入字符串的腺嘌呤百分比，并与阈值进行比较。如果腺嘌呤百分比超过阈值，它将返回`True`，否则返回`False`。\n\
    \n```python\n>>> #定义 A_checker\n>>>\n>>> def A_checker(seq,cutoff):\n        seq_up\
    \ = seq.upper()\n        atgc ={n:seq_up.count(n) for n in seq_up}\n        a_per\
    \ = (atgc['A']/len(seq_up))*100\n        if a_per > cutoff:\n            return\
    \ True\n        else:\n            return False\n\n>>> #调用 A_checker() 并直接打印，使用第一个\n\
    >>> #位置参数 'aatgc'（对应第一个参数：seq）和第二个位置参数 20% 阈值\n>>> #（对应第二个参数：cutoff）\n>>>\n>>>\
    \ print(A_checker('aatgc',20))\nTrue\n>>>\n>>> #更改第二个位置参数\n>>>\n>>> print(A_checker('aatgc',50))\n\
    False\n>>>\n>>> #搞乱参数顺序会导致错误\n>>>\n>>> print(A_checker(50, 'aatgc'))\nTraceback\
    \ (most recent call last):\n  File \"C:/Users/krish/Desktop/func.py\", line 27,\
    \ in <module>\n    print(A_checker(50, 'aatgc'))\n  File \"C:/Users/krish/Desktop/func.py\"\
    , line 4, in A_checker\n    seq_up = seq.upper()\nAttributeError: 'int' object\
    \ has no attribute 'upper'\n>>>\n>>> #续见代码示例 11-4\n```\n\nPython中两种主要的参数类型是*位置参数*和*关键字参数*。位置参数需要按照其对应参数的*顺序*包含。参见代码示例11-3。函数`A_checker()`将把它的第一个实参视为序列值（对应的参数是`seq`；第3行），第二个实参视为阈值百分比（对应的参数是`cutoff`；第3行）。如果我们搞乱顺序，将导致错误。仔细看第33行；`AttributeError:\
    \ 'int' object has no attribute 'upper'`。它显示Python在对一个`int`对象应用`upper()`方法时遇到问题，因为`upper()`是一个字符串方法。Python通过`seq`参数传递了第一个实参，该参数应该是`str`类型，但我放了一个`int`！如果你记住实参的*位置值*，这个特性很有帮助且节省时间。然而，如果你的位置感不是那么好，这个特性可能会适得其反。相反，你可以通过对应参数的名称来指定实参，这将被称为`关键字参数`。关键字参数是传递给函数或方法的实参，它*前面*有一个*关键字或标识符*（即*参数名*）和一个*赋值运算符*（`=`）代码示例11-4。这里要注意，一个函数接受的实参数量与定义时指定的（通过使用占位符参数）完全一致。例如，\n\
    \n```python\n>>> #关键字参数（续代码示例 11-3）\n>>>\n>>> #重写代码示例 11-3 的第27行，通过使用\n>>> #参数作为关键字，将位置参数转换为关键字参数\n\
    >>>\n>>> print(A_checker(cutoff = 50, seq = 'aatgc'))\nFalse\n>>>\n>>> #注意：在给实参标记关键字后，它们的位置值\n\
    >>> #变得无关紧要\n>>>\n```\n\n代码示例 11-4"
