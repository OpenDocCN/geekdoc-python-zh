  - '[PAGE 128]


    **parameter:** A named entity in a function (or method) definition that specifies
    an argument (or in some cases, arguments) that the function can accept, i.e.,
    a name used inside a function to refer to the value passed as an argument.


    **path:** A string that identifies a file.


    **PEP:** Python Enhancement Proposal. A PEP is a design document providing information
    to the Python community, or describing a new feature for Python or its processes
    or environment. PEPs should provide a concise technical specification and a rationale
    for proposed features. PEPs are intended to be the primary mechanisms for proposing
    major new features, collecting community input on an issue, and for documenting
    the design decisions that have gone into Python. The PEP author is responsible
    for building consensus within the community and documenting dissenting opinions.


    **pip:** A Python package management tool that comes bundled with Python 3.4 and
    above.


    **polymorphic:** Pertaining to a function that can work with more than one type.


    **portability:** A property of a program that can run on more than one kind of
    computer.


    **positional argument:** An argument that does not include a parameter name, so
    it is not a keyword argument.


    **print statement:** An instruction that causes the Python interpreter to display
    a value on the screen.


    **program:** A set of instructions that specifies a computation.


    **programming:** writing instructions/codes for a computer to perform.


    **prompt:** Characters displayed by the interpreter to indicate that it is ready
    to take input from the user.


    **pseudorandom:** Pertaining to a sequence of numbers that appears to be random,
    but is generated by a deterministic program.'
  - '[PAGE 129]


    # Glossary


    **Pythonic:** An idea or piece of code which closely follows the most common idioms
    of the Python language, rather than implementing code using concepts common to
    other languages.


    **reassignment:** Assigning a new value to a variable that already exists.


    **reference:** The association between a variable and its value.


    **relational operator:** One of the operators that compares its operands: ==,
    !=, >, <, >=, and <=.


    **relative path:** A path that starts from the current directory.


    **return statement:** A statement that causes a function to end immediately and
    return to the caller.


    **return value:** The result of a function. If a function call is used as an expression,
    the return value is the value of the expression.


    **rubber duck debugging:** Debugging by explaining your problem to an inanimate
    object such as a rubber duck. Articulating the problem can help you solve it,
    even if the rubber duck doesn’t know Python.


    **script mode:** A way of using the Python interpreter to read code from a script
    and run it.


    **script:** A program stored in a file.


    **search:** A pattern of traversal that stops when it finds what it is looking
    for.


    **semantic error:** An error in a program that makes it do something other than
    what the programmer intended.


    **semantics:** The meaning of a program.


    **sequence:** An ordered collection of values where each value is identified by
    an integer index.


    **shape error:** An error caused because a value has the wrong shape; that is,
    the wrong type or size.'
  - '[PAGE 130]


    # Glossary


    **shell:** A program that allows users to type commands and then executes them
    by starting other programs.


    **singleton:** A list (or other sequences) with a single element.


    **slice:** A part of a string specified by a range of indices.


    **slice:** An object usually containing a portion of a sequence. A slice is created
    using the subscript notation, [ ] with colons between numbers when several are
    given.


    **statement:** A section of code that represents a command or action.


    **string:** An immutable type that represents sequences of characters.


    **subject:** The object a method is invoked on.


    **syntax error:** An error in a program that makes it impossible to parse (and
    therefore impossible to interpret).


    **syntax:** The rules that govern the structure of a program.


    **temporary variable:** A variable used to store an intermediate value in a complex
    calculation.


    **text file:** A file object able to read and write string objects.


    **text file:** A sequence of characters stored in permanent storage like a hard
    drive.


    **traceback:** A list of the functions that are executing, printed when an exception
    occurs.


    **traverse:** To iterate through the items in a sequence, performing a similar
    operation on each.


    **tuple assignment:** An assignment with a sequence on the right side and a tuple
    of variables on the left. The right side is evaluated and then its elements are
    assigned to the variables on the left.


    **tuple:** An immutable sequence of elements.


    **type:** The type of a Python object determines what kind of object it is; a
    category of values (e.g., integers (type `int`), floating-point numbers (type
    `float`), and strings (type `str`)).'
  - '[PAGE 131]


    # Glossary


    **update:** An assignment where the new value of the variable depends on the old.


    **value:** One of the basic units of data, like a number or string, that a program
    manipulates; An object that appears in a dictionary as the second part of a key-value
    pair.


    **variable:** A name that refers to a value.


    **void function:** A function that always returns `None`.


    **Zen of Python:** Listing of Python design principles and philosophies that help
    understand and using the language. The listing can be found by typing `import
    this` at the interactive prompt.


    **zip object:** The result of calling a built-in function `zip`; an object that
    iterates through a sequence of tuples.'
  - '[PAGE 132]


    # About the author


    Krishnendu pursued his bachelors in Zoology from the Presidency College, Kolkata,
    his masters from the University of Calcutta, Kolkata, and his PhD from the Bose
    Institute, Kolkata, India. Presently, he is working as an Assistant Professor
    in Zoology, Jhargram Raj College, Jhargram since 2015. He is fascinated with evolution
    and Python programming and is currently working in the field of computational
    molecular evolution. He is also actively involved in teaching bioinformatics and
    programming. Krishnendu strongly believes bioinformatics and computational biology
    should be a major part of undergraduate and postgraduate programmes. He also feels
    biology students and researchers must be familiar with programming because, the
    basic understanding of programming is becoming increasingly necessary to understand
    modern biology. Through this book, he wishes to guide all enthusiasts, especially
    from the field of biology, to take baby steps in the world of programming.'
