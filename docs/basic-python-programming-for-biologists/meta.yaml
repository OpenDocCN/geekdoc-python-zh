    14  atcg\n15  aatc\n16  aatc\n17  >>>\n```\n\nCodeEx 3-3\n\n### 3.3. String Characters’\
    \ Index\n\nIn Python, the index of string characters starts at 0, *not* 1. That\
    \ means the first character of a string has an index ‘0’. Figure 3-1 shows the\
