    \ and storing the resulting\n>>> sequence in variables mrna\n>>>\n>>> mrna = exon_1\
    \ + exon_2\n>>> print(mrna)\naugccgau\n>>>\n```\n\n```\n>>> #str can't be concatenated\
    \ with other types\n>>>\n>>> dna = 'atgc'\n>>> length = 4\n>>> print('seq:'+dna+',length:'+length)\n\
    Traceback (most recent call last):\n  File \"<pyshell#4>\", line 1, in <module>\n\
    \    print('seq:'+dna+',length:'+length)\nTypeError: can only concatenate str\
    \ (not \"int\") to str\n>>>\n>>> #casting length (type int) to str and joining\
    \ it with dna\n>>>\n>>> print('seq:'+dna+', length:'+str(length))\nseq:atgc, length:4\n\
    >>>\n```"
