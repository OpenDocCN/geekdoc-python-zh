- md: '## Chapter 0: Hello World!


    Thanks to Dr. Debnarayan Roy, Principal, Jhargram Raj College for his continued
    patronage and encouragement.


    Thanks to Saikat Sarkar, Associate Professor in Zoology, Singur Government General
    Degree College for his persistent motivation.


    Special thanks to the editor and my wife, Dr. Nabanita Ghosh, Assistant Professor
    in Zoology, Maulana Azad College. Without her professional support, the book would
    not see the light of day. Her exceptionally strong optimism motivates me in the
    lows of my life.


    Finally, lots of love for my parents, Mr. Bijonmay Sinha & Mrs. Sandhya Sinha.
    Their unconditional love and enthusiasm keep me enthused in all highs and lows
    of life. As always, their gusto about the project keeps me motivated in these
    tough times.


    ## 0.4. Feedback


    I humbly request you to give your suggestions, comments, and feedback on the book
    to **krishnendupython@gmail.com**. This will help a lot to refine the book in
    the coming days. It will be my pleasure to duly acknowledge your valuable contribution
    in further editions.


    Happy programming,

    **Krishnendu Sinha**

    Email: krishnendupython@gmail.com

    Website: https://sinhakrishnendu.github.io/


    ## 1. Getting Started


    Theoretically, you can write your *code* anywhere, even on the back of an envelope
    and to do so, you must be familiar with Python Syntax. This book is all about
    that. It will make you familiar with Python syntax and its *data structure*. However,
    to *run* your code, have Python and its *Interpreter* installed into your PC.


    ### 1.1. Installing Python


    Installing Python into your PC is as simple as installing something like a media
    player! Just go to *www.python.org*, the official Python website, where you can
    find the latest version of Python (at the time of publishing this book it was
    version 3.9.5.). Download and install it into your Figure 1-1.


    ### 1.2. Accessing the Python Interpreter


    Python''s default implementation comes with the *Integrated Development and Learning
    Environment (IDLE)*. IDLE has two important features, an *interactive interpreter*
    (known as **Shell**) and, a *multi-window text editor*. Mostly, I shall use the
    Shell to write codes throughout the text. Under suitable circumstances, I shall
    use the text editor. Figure 1-2 illustrates how to access IDLE in a step-by-step
    manner.


    ### 1.3. Writing your FIRST code


    Now, write your first code in the *shell* as below CodeEx 1-1 and then hit enter.
    If you have the same output as CodeEx 1-2, then congratulations, you have successfully
    written your first line of code!


    ```

    >>> print(''Hello World!'')

    ```


    **CodeEx 1-1**


    ```

    1 >>> print(''Hello World!'')

    2 Hello World!

    3 >>>

    ```


    **CodeEx 1-2**


    Here one thing is worth mentioning. First, you will find a very cool feature of
    Python’s IDLE when you write your code there. It differentially colours different
    functional parts of the code. Besides the aesthetics, it helps you to avoid unnecessary
    confusion and write less erroneous code. You will understand the importance of
    differential colour coding in due course.


    However, Shell has a downside. Every time Shell starts afresh. Though is a convenient
    tool for testing and learning Python commands, you cannot use the Shell to compose
    an actual program. For practical programming, IDLE has its *text editor*. Figure
    1-3 illustrates steps to access it.


    ### 1.4. Writing your FIRST program


    Now write your code in the *text editor*. Write “`Hello World`” and save it with
    a `.py` extension. Henceforth, I shall call a file with a `.py` as a *Python script*.
    It’s permanent, editable, and sharable! See Figure 1-4.


    Run the Python script following the process shown in Figure 1-5. A script gives
    its output in the *shell* upon running. If you get the desired output (i.e., `Hello
    World!`) in shell, congratulations! You have made it to your first *program*!


    ## Chapter 1: Getting Started


    ![](img/3a7148b34dba85d777e10b2273b176fd_14_0.png)


    Figure 1-1. Step-by-step installation to Python for Windows.


    ## Chapter 1: Getting Started


    ![](img/3a7148b34dba85d777e10b2273b176fd_15_0.png)


    ![](img/3a7148b34dba85d777e10b2273b176fd_16_0.png)


    Figure 1-3. Accessing IDLE text editor. From File menu in IDLE Shell clicking
    the New File opens a new (untitled) text editor in a separate window.


    ## Chapter 1: Getting Started


    ![](img/3a7148b34dba85d777e10b2273b176fd_17_0.png)


    Figure 1-4. Creating Python script using IDLE text editor.


    ## Chapter 1: Getting Started


    ![](img/3a7148b34dba85d777e10b2273b176fd_18_0.png)


    ![](img/3a7148b34dba85d777e10b2273b176fd_18_1.png)


    Figure 1-5. Running the newly created program, `first_program.py`.


    ## 2. Types, Variable & Operators


    In the previous chapter, I have introduced you to the Python interpreter. You
    have written your first line of code. You have also created a Python script. Now
    it is time to understand the building blocks, components, and structure of Python
    code. But first, a brief discussion of data will be beneficial.


    ### 2.1. Data


    In simple term, computer data is the information (e.g., text, images, audio, etc)
    stored and (or) processed by a computer. Data can be anything like the quantities,
    characters, or symbols on which a computer performs operations. At the rudimentary
    level, data is just a sequence of *bits*. One insight of computing is that we
    can interpret those bits any way we want—as data of various *values* and *types*
    (numbers, text characters) or even as computer code itself. We use Python to define
    chunks of these bits for different purposes and to get them to and from the CPU.


    #### 2.1.1. Value and type


    Each data has its type and value. A *value* is one of the fundamental things,
    like a letter or a number, which a program can manipulate. For example, `''Hello
    World!''` in the first code is a value. Values belong to different *data types*
    (in short *types*). Often, programmers use the words *value* and *object*, *type*,
    and *class* interchangeably. The value, `''Hello World!''`, belongs to the class
    *string*. An object is an instance of a class. Say if the human is a class or
    type then we all are instances of that class. Consider yourself as an object that
    belongs to the class human. This chapter is dedicated to clarifying these and
    related concepts.


    ### 2.2. Statement


    The first code you encountered was `>>> print("Hello World!")`. In literature,
    we denote this kind of line as a sentence, but in programming, programmers denote
    this as the **statement**. Henceforth, I shall use this term for any *executable
    line of code*.


    ### 2.3. Function and Argument


    In the statement above, `print()` is a **function**. A function is a *reusable
    block of code*, comprising a series of statements, which runs only upon *calling*
    (i.e., ‘using’) and `returns` some data to the caller. Python has an array of
    built-in useful functions according to our different needs. Also, we can *define*
    (i.e., ‘create’) a customized function which I will discuss in the ‘Functions’
    chapter. A function is analogous to a machine, say like a coffee-maker, which
    takes roasted coffee beans as a starting ingredient and returns a beautiful cup
    of coffee! Similarly, a function takes some *value* as input to work on as the
    starting material and returns an output *value*. Programmers use the word ‘*passing*’
    to describe the value input process and the value passed to a function is denoted
    as an **argument** (abbreviated as `arg`). In the first code, the string object
    `"Hello World!"` was the argument for the function `print()`. Syntactically, functions
    are followed by parentheses and we specify arguments inside the parentheses: `function(arg)`.
    Here note one thing, a function could take more than one argument, passed to the
    function in a comma-separated manner: `function(arg_1, arg_2, arg_3, ..., arg_n)`.
    See CodeEx 2-1 for examples.


    ## Chapter 2: Types, Variable & Operators


    ```

    >>> #examples showing arguments passed to print() function

    >>>

    >>> print(''ATTGC'') #string type argument ''ATTGC''

    ATTGC

    >>> print(''ATTGC'',9) #two args passed to print()

    ATTGC 9

    >>>

    ```


    CodeEx 2-1


    ### 2.4. Comments


    Now look again closely in CodeEx 2-1. You might notice I started the first line
    with the hash (#) sign. Python interpreter ignores everything that starts with
    # while executing a code. In Python, this type of line starting with # is called
    **comment** CodeEx 2-2. Comment is NOT a part of an executable code. Programmers
    use comments to annotate a code to make it more readable to other programmers.
    Comments are there for human, not for a computer! Without proper comments, even
    an excellent program becomes useless over time or at least very hard to read in
    future modifications! Always annotate your code for your own good!


    ```

    >>> #it''s a comment

    >>> #it''s another comment

    >>> #anything starts with a # is a comment

    ```


    CodeEx 2-2


    ### 2.5. Object and Data Types


    In CodeEx 2-1, `ATTGC`, belongs to one of the several basic *data types* of Python,
    **string**, and 9 belongs to the basic data type **integer**. In this section,
    you will get accustomed to Python''s basic data types. A thorough understanding
    of data types is important to learn to code. But first, I would like to present
    the concept of the *object* to you.'
