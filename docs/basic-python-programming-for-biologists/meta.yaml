    # 13.3. Metacharacters


    With different combinations of metacharacters, we can generate complex search
    patterns, which are very useful indeed in biology. Here I put a list of metacharacters
    with brief description and examples regarding their uses (Table 13-1).


    # 13.4. `search()`


    The basic function of the `re` module is `search()`. I have discussed it in CodeEx
    13-2. Its syntax is `re.search(pattern, str to search in)`. It searches the pattern
    within a string for a *match* and returns a match object if it finds a match anywhere
    in the string. Otherwise, it returns `None`. However, there is a downside of `search()`.
    It only returns the first occurrence of the match, if there is over one match<sup>CodeEx
    13-3</sup>. To overcome this limitation, `re` has `findall()` method. But before
    discussing the `findall()` we should discuss match object property and methods
    available with it.'
