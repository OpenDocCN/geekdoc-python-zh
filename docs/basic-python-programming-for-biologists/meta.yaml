- md: '## Chapter 3: String Manipulation


    ### 3.5. Finding DNA Length


    You can calculate the length of a string (i.e., the number of characters within
    the string) by another Python’s in-built function, `len()`. This function takes
    a string as an argument and returns its length in integer. `len()` function *prints*
    nothing on screen like `print()`. Instead, it *returns* (note it does not print
    on screen, instead it returns storable value) the value<sup>CodeEx 3-6</sup>.


    ```

    >>> #finding string length: len(''any string'')

    >>>

    >>> dna = ''atgc'' # here len() will take dna as an argument

    >>> dna_len = len(dna) #assigning retuning value to dna_len

    >>> print(dna_len)

    4

    >>>

    ```


    CodeEx 3-6


    ### 3.6. String Slicing


    You can easily slice a string at specific indexes. For extracting a specific fragment
    from a DNA string, you can use Python’s *slice* tool. Python defines slice tool
    by *square brackets*, `[:]`. It takes integers as the *start* and *end index*
    to use as reference points for cutting. If not explicitly mentioned, by default
    `0` acts as the start index and the length of the string, `len(string)` acts as
    the endpoint<sup>CodeEx 3-7</sup>. Here you should carefully note that the start
    index is *inclusive* while the end index is *exclusive*. That means if you want
    to cut the *substring* `bcd` from the string `abcdef`, use the statement `abcdef`[1:4],
    not `abcdef`[1:3].


    ```

    >>> #string slicing; [start(inclusive) : end(exclusive)]

    >>>

    >>> dna = ''atgcttttcgca''

    >>>

    >>> #slicing substring ''tttt'' from dna; for that

    >>> #start index = 4, end index = 8 NOT 7

    >>>

    >>> dna_slice = dna[4:8]

    >>> print(dna_slice)

    ''tttt''

    >>>

    >>> # observe default start and end index

    >>>

    >>> dna_1 = dna[:8] #default start is index 0

    ''atgctttt''

    >>>

    >>> dna_2 = dna[4:] #default end is the length of the string

    ''ttttcgca''

    >>>

    ```


    ### 3.7. `ATGC` differs from `atgc`


    Python is highly *case* sensitive. It treats the uppercase letters differently
    from the lowercase letters. So, be extra careful about the case of a string. However,
    you can change the case of a string by built-in **methods**, `upper()` and `lower()`.
    As the name suggests, `upper()` converts lowercase strings to uppercase and vice
    versa.


    ```

    >>> #case changing with upper() and lower()

    >>>

    >>> dna = ''ATTGC''

    >>> dna_low = dna.lower() #note the dot(.lower()) notation

    >>> print(dna_low)

    ''attgc''

    >>> dna_up = dna_lower.upper() #using upper() method

    >>> print(dna_up)

    ''ATTGC''

    >>> dna_up == dna #both are same

    True

    >>>

    ```


    ### 3.8. replace() method


    replace() replaces a specified phrase within a string with another specified phrase.
    It replaces all occurrences of the specified phrase if otherwise not restricted.
    Say, I would like to replace the adenines of a DNA string with thymines. replace()
    does the job<sup>CodeEx 3-9</sup>. It takes at least *two* positional arguments
    separated by a comma. The first argument shows what it should replace while the
    second argument shows with which it should replace. However, there is an optional
    third positional argument that specifies counts. This integer shows how many occurrences
    of the specified phrase is to be replaced. By default, it is set to *all occurrences*.
    See CodeEx 3-9 for clarifications.


    ```

    >>> #syntax: string.replace(oldvalue, newvalue, count)

    >>>

    >>> #replacing A with T

    >>>

    >>> dna = ''AAAAATGC''

    >>> dna_a2t = dna.replace(''A'', ''T'')

    >>> print(dna_a2t)

    ''TTTTTTGC''

    >>>

    >>> #replacing with count

    >>>

    >>> dna_a2t_1 = dna.replace(''A'', ''T'',1)

    ''TAAAATGC''

    >>> dna_a2t_2 = dna.replace(''A'', ''T'',2)

    ''TTAAATGC''

    >>> dna_a2t_3 = dna.replace(''A'', ''T'',3)

    ''TTTAATGC''

    >>>

    >>> #replacing substring TGC of dna with AAA

    >>>

    >>> print(dna.replace(''TGC'', ''AAA''))

    ''AAAAAAAA''

    >>>

    ```


    CodeEx 3-9


    ### 3.9. count() method


    count() method takes a character or a substring/phrase as an argument and returns
    the value of their total number of occurrences<sup>CodeEx 3-10</sup>.


    ```

    >>> #counting occurrences

    >>>

    >>> dna = ''attgactgacg''

    >>> t_count = dna.count(''t'') #counting thymine

    >>> print(t_count)

    3

    >>> tga_count = dna.count(''tga'') #counting ''tga''

    >>> print(tga_count)

    2

    >>>

    ```


    ### 3.10. find() method


    In CodeEx 3-11, `tga` can be viewed as an imaginary sequence motif with important
    implications. You can calculate the total number of occurrences of the motif in
    each DNA sequence with the `count()`. Now, with `find()` you also can pinpoint
    the location details of its occurrences within the DNA. `find()` takes the substring/phrase
    as an argument and returns its index<sup>CodeEx 3-11</sup>.


    ```

    >>> #finding position of occurrences

    >>>

    >>> dna = ''attgactgacg''

    >>> tga_index = dna.find(''tga'') #findind index of ''tga'' motif

    >>> print(tga_index)

    2

    >>>

    ```


    Here note that with multiple occurrences it only returns the index of the first
    occurrence. String `attgactgacg` has two `tga` motifs at index 2 and 6. You need
    multiple tools along with `find()` for extracting indexes of all the occurrences.
    I will introduce you to these additional tools in the following chapters.


    ### 3.11. Raw String


    In Python, raw string is a normal string that is prefixed with an `r`. Raw string
    treats special characters like a backslash (`\`) as a literal character. In raw
    string, Python will not treat `\` as an escape character<sup>CodeEx 3-12</sup>.
    In short, within raw string special characters has no speciality.


    ```

    >>> #raw string

    >>>

    >>> print(''atta\ntaat'') #string with new line character

    atta

    taat

    >>> print(r''atta\ntaat'') #raw string treats \n as a literal

    atta\ntaat

    >>> print(''atta\ttaat'') #string with tab character

    atta  taat

    >>> print(r''atta\ttaat'') #raw string treats \t as a literal

    atta\ttaat

    >>> print(''\''ATGC\'''') #escape character \n''ATGC''

    >>>

    >>> #raw string treats escape character \ as literal

    >>> print(r''\''ATGC\'''')

    \''ATGC\''

    >>>

    ```


    CodeEx 3-12


    ## Chapter 4: Interactive Program


    Now you can solve many problems with the bit of skill you have already developed.
    But one thing is missing! I did not describe interactive programming. People imagine
    programs as an interactive sort of machine. Take the example of a calculator.
    A calculator is a program. You put some values in it and specify the arithmetic
    operations to perform on that. Accordingly, you will get the result. Even, it
    will let you know if you have made some error, like dividing a number with 0!
    In short, the calculator takes user input, perform the user-specified task, and
    gives the output. That’s what people are familiar with, and that’s the beauty
    of programming!


    ### 4.1. User input


    Python has a built-in function, `input()` (CodeEx 4-1). When being called, it
    prompts the user to give her input. It takes user input as an argument and supplies
    it to the program as a string. `input()` also allows incorporation messages to
    guide users properly so that, the program gets an error-free input. Just put a
    string as an argument in the `input()` and `input()` will use it as a prompted
    message to guide users (see line 4 & 5; CodeEx 4-1).


    ```

    >>> #asking user for DNA string as an input and storing the

    >>> #input in a variable, user_dna

    >>>

    >>> user_dna = input(''provide DNA seq:'')

    provide DNA seq: ATGCGCAT

    >>>

    ```


    ### 4.2. DNA Length Calculator


    Now imagine, daily you have to calculate lots of DNA length as a part of your
    lab work. For a small sequence, it is ok to go with the ‘eyeball’ method. But,
    for a large sequence, it becomes a humongous job. Here, a DNA Length Calculator
    comes in handy. Let’s make one! From the last chapter, you already know how to
    calculate the DNA length of a string. Here I am just adding the interactive fragment
    of the code<sup>CodeEx 4-2</sup>.


    However, it’s not useful to write an interactive code in the *shell*. As discussed
    earlier, for storing a code as a *script* for subsequent uses, open the text editor
    from IDLE, write the code and save it as a python script (.py) with a proper name.
    Now you can run the script any time you want to calculate the length of a DNA
    sequence! Upon running, it prompts for a DNA sequence in the *shell*. Upon entering
    the sequence data and hitting enter, the program prints the result on the screen.
    As a guide, you can consult Figure 4-1.


    ```

    >>> #DNA Length Calculator

    >>>

    >>> #part 1: the interactive part of the code

    >>>

    >>> user_dna = input(''provide DNA seq:'')

    provide DNA seq: attgacatgacttgatc

    >>>

    >>> #part 2: the core mechanistic part of the code

    >>>

    >>> dna_len = len(user_dna) #user_dna supplied from part 1

    >>> print(''length of the given sequence is:'', dna_len, ''bp'')

    length of the given sequence is: 17 bp

    >>>

    ```


    CodeEx 4-2'
  mdcn: '## 第三章：字符串操作


    ### 3.5. 查找DNA长度


    你可以通过Python的另一个内置函数`len()`来计算字符串的长度（即字符串中的字符数）。该函数接受一个字符串作为参数，并返回其整数长度。`len()`函数与`print()`不同，它*不会*在屏幕上*打印*任何内容。相反，它*返回*（注意它不会打印在屏幕上，而是返回一个可存储的）值<sup>代码示例
    3-6</sup>。


    ```

    >>> #查找字符串长度：len(''任意字符串'')

    >>>

    >>> dna = ''atgc'' # 这里len()将接受dna作为参数

    >>> dna_len = len(dna) #将返回值赋给dna_len

    >>> print(dna_len)

    4

    >>>

    ```


    代码示例 3-6


    ### 3.6. 字符串切片


    你可以轻松地在特定索引处切分字符串。要从DNA字符串中提取特定片段，可以使用Python的*切片*工具。Python使用*方括号*`[:]`定义切片工具。它接受整数作为*起始*和*结束索引*，作为切割的参考点。如果未明确指定，默认情况下`0`作为起始索引，字符串的长度`len(string)`作为结束点<sup>代码示例
    3-7</sup>。这里你应该仔细注意，起始索引是*包含的*，而结束索引是*不包含的*。这意味着如果你想从字符串`abcdef`中切割出*子字符串*`bcd`，应使用语句`abcdef`[1:4]，而不是`abcdef`[1:3]。


    ```

    >>> #字符串切片；[起始(包含) : 结束(不包含)]

    >>>

    >>> dna = ''atgcttttcgca''

    >>>

    >>> #从dna中切片子字符串''tttt''；为此

    >>> #起始索引 = 4，结束索引 = 8 而不是 7

    >>>

    >>> dna_slice = dna[4:8]

    >>> print(dna_slice)

    ''tttt''

    >>>

    >>> # 观察默认的起始和结束索引

    >>>

    >>> dna_1 = dna[:8] #默认起始是索引 0

    ''atgctttt''

    >>>

    >>> dna_2 = dna[4:] #默认结束是字符串的长度

    ''ttttcgca''

    >>>

    ```


    ### 3.7. `ATGC` 与 `atgc` 的区别


    Python对*大小写*高度敏感。它将大写字母与小写字母区别对待。因此，要格外注意字符串的大小写。不过，你可以通过内置的**方法**`upper()`和`lower()`来更改字符串的大小写。顾名思义，`upper()`将小写字符串转换为大写，反之亦然。


    ```

    >>> #使用upper()和lower()更改大小写

    >>>

    >>> dna = ''ATTGC''

    >>> dna_low = dna.lower() #注意点号(.lower())表示法

    >>> print(dna_low)

    ''attgc''

    >>> dna_up = dna_lower.upper() #使用upper()方法

    >>> print(dna_up)

    ''ATTGC''

    >>> dna_up == dna #两者相同

    True

    >>>

    ```


    ### 3.8. replace() 方法


    replace() 方法将字符串中指定的短语替换为另一个指定的短语。除非另有限制，它会替换所有出现的指定短语。例如，我想将DNA字符串中的腺嘌呤（A）替换为胸腺嘧啶（T）。replace()
    方法可以完成这项工作<sup>代码示例 3-9</sup>。它至少接受*两个*由逗号分隔的位置参数。第一个参数显示要替换的内容，第二个参数显示用什么来替换。然而，还有一个可选的第三个位置参数，用于指定计数。这个整数显示要替换多少次指定的短语。默认情况下，它被设置为*所有出现次数*。详见代码示例
    3-9。


    ```

    >>> #语法：string.replace(旧值, 新值, 计数)

    >>>

    >>> #将A替换为T

    >>>

    >>> dna = ''AAAAATGC''

    >>> dna_a2t = dna.replace(''A'', ''T'')

    >>> print(dna_a2t)

    ''TTTTTTGC''

    >>>

    >>> #带计数的替换

    >>>

    >>> dna_a2t_1 = dna.replace(''A'', ''T'',1)

    ''TAAAATGC''

    >>> dna_a2t_2 = dna.replace(''A'', ''T'',2)

    ''TTAAATGC''

    >>> dna_a2t_3 = dna.replace(''A'', ''T'',3)

    ''TTTAATGC''

    >>>

    >>> #将dna的子字符串TGC替换为AAA

    >>>

    >>> print(dna.replace(''TGC'', ''AAA''))

    ''AAAAAAAA''

    >>>

    ```


    代码示例 3-9


    ### 3.9. count() 方法


    count() 方法接受一个字符或子字符串/短语作为参数，并返回它们出现的总次数<sup>代码示例 3-10</sup>。


    ```

    >>> #计算出现次数

    >>>

    >>> dna = ''attgactgacg''

    >>> t_count = dna.count(''t'') #计算胸腺嘧啶

    >>> print(t_count)

    3

    >>> tga_count = dna.count(''tga'') #计算''tga''

    >>> print(tga_count)

    2

    >>>

    ```


    ### 3.10. find() 方法


    在代码示例 3-11中，`tga`可以被视为一个具有重要意义的假想序列模体。你可以用`count()`计算该模体在每个DNA序列中出现的总次数。现在，使用`find()`你还可以精确定位它在DNA中出现的位置详情。`find()`接受子字符串/短语作为参数，并返回其索引<sup>代码示例
    3-11</sup>。


    ```

    >>> #查找出现位置

    >>>

    >>> dna = ''attgactgacg''

    >>> tga_index = dna.find(''tga'') #查找''tga''模体的索引

    >>> print(tga_index)

    2

    >>>

    ```


    这里要注意，当有多个出现时，它只返回第一次出现的索引。字符串`attgactgacg`有两个`tga`模体，分别位于索引2和6。你需要结合`find()`使用多个工具来提取所有出现的索引。我将在后续章节中介绍这些额外的工具。


    ### 3.11. 原始字符串


    在Python中，原始字符串是普通字符串前加上`r`前缀。原始字符串将反斜杠（`\`）等特殊字符视为普通字符。在原始字符串中，Python不会将`\`视为转义字符<sup>代码示例
    3-12</sup>。简而言之，在原始字符串中，特殊字符没有特殊性。


    ```

    >>> #原始字符串

    >>>

    >>> print(''atta\ntaat'') #包含换行符的字符串

    atta

    taat

    >>> print(r''atta\ntaat'') #原始字符串将\n视为普通字符

    atta\ntaat

    >>> print(''atta\ttaat'') #包含制表符的字符串

    atta  taat

    >>> print(r''atta\ttaat'') #原始字符串将\t视为普通字符

    atta\ttaat

    >>> print(''\''ATGC\'''') #转义字符 \n''ATGC''

    >>>

    >>> #原始字符串将转义字符\视为普通字符

    >>> print(r''\''ATGC\'''')

    \''ATGC\''

    >>>

    ```


    代码示例 3-12


    ## 第四章：交互式程序


    现在你可以运用已经掌握的一些技能来解决许多问题。但还缺少一样东西！我没有描述交互式编程。人们想象程序是一种交互式的机器。以计算器为例。计算器就是一个程序。你输入一些值，并指定要执行的算术运算。相应地，你会得到结果。甚至，如果你犯了错误，比如用0去除一个数，它会提示你！简而言之，计算器接受用户输入，执行用户指定的任务，并给出输出。这是人们所熟悉的，也是编程的魅力所在！


    ### 4.1. 用户输入


    Python有一个内置函数`input()`（代码示例 4-1）。当被调用时，它会提示用户输入。它将用户输入作为参数，并将其作为字符串提供给程序。`input()`还允许包含消息来正确引导用户，以便程序获得无错误的输入。只需在`input()`中放入一个字符串作为参数，`input()`就会将其用作提示消息来引导用户（参见第4行和第5行；代码示例
    4-1）。


    ```

    >>> #要求用户输入DNA字符串，并将输入存储在变量user_dna中

    >>>

    >>> user_dna = input(''提供DNA序列：'')

    提供DNA序列： ATGCGCAT

    >>>

    ```


    ### 4.2. DNA长度计算器


    现在想象一下，作为实验室工作的一部分，你每天需要计算大量的DNA长度。对于小序列，用“目测”法还可以。但对于大序列，这将是一项巨大的工作。这时，DNA长度计算器就派上用场了。让我们来制作一个！从上一章中，你已经知道如何计算字符串的DNA长度。这里我只是添加了代码的交互部分<sup>代码示例
    4-2</sup>。


    然而，在*交互式解释器*中编写交互式代码并不实用。如前所述，为了将代码作为*脚本*存储以供后续使用，请从IDLE打开文本编辑器，编写代码并将其保存为具有适当名称的Python脚本（.py）。现在，你可以随时运行该脚本来计算DNA序列的长度！运行时，它会在*交互式解释器*中提示输入DNA序列。输入序列数据并按回车键后，程序会在屏幕上打印结果。作为参考，你可以查阅图4-1。


    ```

    >>> #DNA长度计算器

    >>>

    >>> #第1部分：代码的交互部分

    >>>

    >>> user_dna = input(''提供DNA序列：'')

    提供DNA序列： attgacatgacttgatc

    >>>

    >>> #第2部分：代码的核心机制部分

    >>>

    >>> dna_len = len(user_dna) #user_dna由第1部分提供

    >>> print(''给定序列的长度为：'', dna_len, ''bp'')

    给定序列的长度为： 17 bp

    >>>

    ```


