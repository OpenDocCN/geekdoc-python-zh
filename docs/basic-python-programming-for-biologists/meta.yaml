  md: '# 3. String Manipulation


    Till now you have been exposed to jargons and key concepts which were an absolute
    prerequisite for understanding *syntax* and starting programming in Python. *String*
    denotes *text* in Python and among all data types, it is of the utmost importance
    in biology. Researchers store the enormous amount of data produced through modern
    sequencing techniques in simple text format. Python treats these data as string
    sequences! Biologists need programming to extract a significant amount of information
    from these data, and for that training in string manipulation is necessary.


    # 3.1. Creating a string


    Anything *quoted* in Python is a string and vice versa. Surrounding value with
    ‘single’ or “double-quotes” or ““triple quotes”” declares a string. However, remember
    to use *only one type of quotes* to surround a string. Python does not permit
    the mixing of quotes. This kind of action will lead to an error (line-5-20 of
    CodeEx 3-1). Also, Python considers texts *without quotes* as variable names.
    If you do not assign a value to it, it raises an error (line-22-31 of CodeEx 3-1).
    You can create multi-line strings triple quotes<sup>CodeEx 3-2</sup>. Also, by
    *typecasting* with the help of `str()` function you can create a string type by
    casting suitable *types* into a string.


    # 3.2. Special Characters


    To insert *syntactically ‘illegal’ character* in a string you can use a *special
    character* ‘backslash (\)’ before that illegal character<sup>CodeEx 3-3</sup>.
    Backslash is an ‘escape’ character. It helps to escape from strict syntax rule.'
