  md: "```\n#defining AccB1I RES finding function\ndef accb1(raw_seq,rs=r'GG(C|T)[AG]CC'):\n\
    \    seq = raw_seq.upper()#upper() or lower() your choice\n    res = re.finditer(rs,seq)\n\
    \    #using dict comprehension\n    seq_dict = {m.group():m.span() for m in res}\n\
    \    return seq_dict\n\n#now importing the re module and calling accb1()\nimport\
    \ re\nres = accb1('aatggcaccggcggcgccta')\nprint(res)\n\n{'GGCACC': (3, 9), 'GCGCC':\
    \ (12, 18)}\n>>>\n>>> #matched sequence is the key, its position(tuple containing\n\
    start and end) is value in the resulting dictionary seq_dict\n>>>\n```\n\n# 13.6.\
    \ findall()\n\nIf there is over one match, `findall()` returns a list containing\
    \ all non-overlapping matches. Its syntax is `re.findall (pattern, str to search\
    \ in)`. It does not return any match-object. However, it has a downside. It just\
    \ returns matches, not their indexes. For that, `re` has `finditer()` method.\n\
    \n# 13.7. finditer()\n\n`finditer()` returns a sequence of match-objects, each\
    \ containing data about each matched pattern and its location. So, to do anything\
    \ useful with the return value of `finditer()`, we must iterate over it using\
    \ a loop. Its syntax is `re.finditer(pattern, str to search in)`. See CodeEx 13-4."
