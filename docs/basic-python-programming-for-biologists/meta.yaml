  md: '# 11.Functions


    Till now we have written small ‘disposable’ codes. It was a kind of ‘use and throw’
    approach. This approach is good for learning. But these tiny programs are of little
    use. Almost all the time we need to write bigger programs and for that, reuse
    of a block of code is required. Thus, we need **functions**, a *reusable block
    of code* that is *independent of other codes* of a program. Yes, it’s the same
    thing as `print()`, `len()`, `type()`, etc. These are built-in functions in Python.
    Besides these, Python lets us create our own.


    # 11.1. Defining a function


    In Python creating a function is called ‘*defining a function*’. Here is a small
    chunk of code that calculates the number of adenine nucleotides from any polynucleotide
    string<sup>CodeEx 11-1</sup>. Now suppose for a large program, this `A_counter`
    needs to be used multiple times. So, just converting this piece of code to a function,
    `a_count`, will solve this issue! `a_count` will `return` the adenine count of
    any polynucleotide string when we call it<sup>CodeEx 11-2</sup>. Different parts
    of the function are described in Figure 11-1.


    ```

    >>> #A_counter

    >>> seq = ''AATGCAT''

    >>> a_count = seq.count(''A'')

    >>> print(a_count)

    3

    >>>

    ```


    **CodeEx 11-1**


    Nevertheless, before diving further, you must remember the following key concepts.
    These will guide you to properly define a function in the future.'
