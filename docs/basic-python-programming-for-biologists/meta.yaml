    nucleotide string (keyword: input_seq)\nand second one is the desired rounding\n\
    (keyword: round_to) with a default value of 4\n>>>\n```\n\n## 12. 模块\n\n我想我现在可以放心地假设你知道如何创建“你自己的”函数了，我必须为这一了不起的成就向你表示祝贺。恭喜！有了你的函数，你就可以自动化处理那些枯燥的事情了！编写一次函数，多次使用。但请记住，这种使用仅限于你创建它的脚本。在该脚本之外，你的函数是不可用的！然而，如果你想在其他程序中使用你的函数呢？假设你想在你接下来的程序中使用你创建的函数\
    \ `at_content()`，为此，你需要创建一个**模块**。让我们开始吧。\n\n### 12.1. 模块的结构\n\n*模块*不过是一个包含一组函数的\
    \ *Python 脚本*。它就像一个函数库；尽管只有一个函数的模块也是完全可行的。除了函数，模块还可以包含任何其他对象，如列表、字符串、字典等。\n\n\
    现在，让我用一个类比来解释模块的结构。想象一个有多个房间的图书馆建筑。每个房间都有多个装满书的书架。现在，如果我把 Python 脚本比作一本书，那么一个书架就是一个*模块*，图书馆的房间就是*包*，而图书馆本身则类似于\
    \ Python 的*库*。\n\nPython 在其主框架中有许多非常有用的内置通用函数。所以，当我们需要它们时，我们*调用*它们（例如，`print()`、`len()`\
    \ 等）。除此之外，Python 还有许多“专用函数”，我们可以随时使用它们来让我们的生活更轻松。为了防止 Python 变得臃肿，创建者将这些函数单独存储在主框架之外。他们将这些函数组织在结构化的目录、模块和包中。要使用这些函数，我们必须首先使用\
    \ `import` 关键字来*导入*它们。\n\n### 12.2. 创建模块\n\n从技术上讲，*任何* Python 脚本都可以充当模块，这没什么特别的。所以，创建一个模块很简单。只需创建一个包含所需函数的\
    \ Python 脚本，就这样。现在，我在一个新的文本文件中定义了两个*函数*，并将其保存在桌面上，命名为 `atgc_cal.py`<sup>CodeEx\
    \ 12-1</sup>。从现在开始，我可以将该脚本用作模块。\n\n```\n#atgc_cal.py module\n\n#creating a dict\n\
    nucleotide = {'A':'Adenine',\n              'G':'Guanine',\n              'C':'Cytosine',\n\
    \              'T':'Thymine'}\n\n#func:1\ndef at_cal(seq_in,round_to):\n    '''calculates\
    \ AT content:\ntakes two arguments (para:seq=str &\nround_to=int; output % of\
    \ AT'''\n    seq = seq_in.lower()\n    at = ((seq.count('a')+seq.count('t'))/len(seq))*100\n\
    \    return round(at,round_to)\n\n#func:2\ndef gc_cal(seq_in,round_to):\n    '''calculates\
    \ GC content:\ntakes two arguments (para:seq=str &\nround_to=int; output % of\
    \ GC'''\n    seq = seq_in.lower()\n    gc = ((seq.count('g')+seq.count('c'))/len(seq))*100\n\
    \    return round(gc,round_to)\n```\n\n### 12.3. 使用模块\n\n#### 12.3.1. 导入模块\n\n\
    如前所述，特定模块的函数并非开箱即用。要使用它们，你必须首先使用 `import` 关键字来`导入`该模块。在 CodeEx 12-2 中，我将 `atgc_cal.py`\
    \ 导入到一个名为 `module.py` 的 Python 脚本中。我将 `module.py` 保存在桌面上，与我存储模块的目录相同。\n\n```\n\
    #importing atgc_cal.py module into the script module.py\n\nimport atgc_cal\n```\n\
    \nCodeEx 12-2\n\n```\n#importing atgc_cal.py module into the script module.py\n\
    import atgc_cal\n\n#now calling at_cal()\nat_content = atgc_cal.at_cal('aatgcatagatc',2)\n\
    print(at_content)\n\n#calling gc_content()\ngc_content = gc_cal('aatgcatagatc',2)\n\
    print(gc_content)\n\n================ RESTART: C:\\Users\\Desktop\\module.py ================\n\
