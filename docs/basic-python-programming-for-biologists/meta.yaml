  md: '# 9. Conditional Statements


    You just have landed in a very interesting section of this book! Till now, you
    have been exposed to simple programs only. In the actual world, you will face
    complex problems and for that, you need to come up with complex programs with
    multiple checkpoints and decision-making nodes. These nodes and checkpoints control
    the *flow* of a program and believe me, that is important. After completing this
    chapter, you will be able to create smarter programs that can make their own decisions.


    For example, imagine a situation where there is a demand for DNA fragments whose
    GC-content is greater than 50%. You can create a custom *GC-Content Calculator*
    to meet the demand. It takes input from a user and returns GC-content in percentage.
    Pretty simple? No. In practice, mistakes happen! A user may mistakenly put integer
    instead of a nucleotide string! This situation will inevitably trigger the hidden
    bug of the program! You can only overcome such situations if you can control the
    flow of our program.


    Now, what is meant by the phrase ‘flow control’ or ‘control flow’? You already
    have noticed that *by default*, Python’s interpreter *sequentially executes* a
    program’s code in a *top-down fashion*. But most of the time, this simple strategy
    does not work. In day-to-day life, we modulate our mode of action according to
    the conditions we face. Likewise, to write a useful program, we almost always
    need the ability to check conditions and change the behaviour of the program accordingly.
    *Conditions create logical branches within a program*<sup>Figure 9-1</sup>. Based
    on different conditions a program may execute one such branch or may pass it to
    execute a different branch. It may also repeatedly execute a block of code until
    a condition holds, a phenomenon known as'
  merge: -1
