    5''-WTTTAYRTTTW-3⁴. Any mutations in ACS abolish ARS function. Some ARSs also
    contain additional near-match ACSs replaceable for function. However, substantial
    sequence conservation has been observed in the 3 bp on either side of ACS, allowing
    for the identification of a 17-bp extended ACS (EACS), 5''-WWWWTTTAYRTTTWGTT-3''.
