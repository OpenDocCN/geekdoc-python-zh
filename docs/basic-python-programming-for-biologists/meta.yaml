    **loop:** A part of a program that can run repeatedly.


    **low-level language:** A programming language that is designed to be easy for
    a computer to run; also called “machine language” or “assembly language”.


    **map:** A processing pattern that traverses a sequence and performs an operation
    on each element.


    **mapping:** A relationship in which each element of one set corresponds to an
    element of another set.'
