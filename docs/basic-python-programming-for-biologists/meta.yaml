- md: '## 2.5.1. Object


    Everything in Python (e.g., data types, functions, programs etc) are *objects*.
    An **object** is an instance of a **class**. A class can create many objects.
    Confused? Let me explain the idea with an example.


    Say you have a cookie template shaped like a star. Now if you consider this template
    as a class, the star-cookies made with it are instances of the class and thus
    are objects that belong to the star-template class. Now if you have a Christmas
    tree-shaped cookie, it belongs to a different class, Christmas tree-template.
    Now, the ingredients of the cookies are the values of the object. Until it is
    baked you can play with the ingredients, can make desirable changes like adding
    Choco or almond chips. At this point, the cookie is called a *mutable object*.
    Once baked you can’t make further alterations to its ingredients, aka value. Then,
    the cookie will be called an *immutable object*. Though in reality, mutability
    is not the two stages of the same object. Few objects are born mutable, while
    others are born immutable. Few *types* create mutable objects while others create
    immutable objects. Table 2-1 explicitly showcases important basic data types (aka
    classes) of Python.


    Now, from the storage perspective, if you store the cookies in jars, you can use
    an external label to name those jars, say as choco or almond cookies. This labelling
    or tagging will make it easier to find a jar with specific cookies in future.
    This ‘tag’ is the **variable** assigned to the object (cookie) with a specific
    value (Choco-chip/almond). You will find more about variables in the next section.


    ## 2.5.2. type() function


    In case of any confusion about the type of object, `type()` function helps. `type()`
    takes an object as an argument and returns its class or type<sup>CodeEx 2-3</sup>.


    ## Chapter 2: Types, Variable & Operators


    Table 2-1. Basic Python data types


    | Name | Type/ Class | Mutability | Examples |

    | :--- | :--- | :--- | :--- |

    | **String** | str | Immutable | ''Hello World!''; "5"; ''ATGC'' |

    | **Integer** | int | Immutable | 5; 55; 546747 |

    | **Float** | float | Immutable | 0.45; 5.0; 15.547 |

    | **Dictionary** | dict | Mutable | {''W'': ''Trp'', ''K'': ''Lys'', ''E'': ''Glu''}
    |

    | **List** | list | Mutable | [1, 2, 3]; [''a'', ''b'', ''c'']; [1.2, 5, ''a'']
    |

    | **Tuple** | tuple | Immutable | (1, 2, 3); (''a'', ''b'', ''c''); (1.2, 5, ''a'')
    |

    | **Set** | set | Mutable | {1, 2, 3}; {''a'', ''b'', ''c''}; {1.2, 5, ''a''}
    |

    | **Boolean** | bool | Immutable | True; False |


    ```

    >>> #knowing type of an object

    >>>

    >>> type(''ATGC'')

    <class ''str''>

    >>> type(5)

    <class ''int''>

    >>> type(1.1)

    <class ''float''>

    >>> type([1, 2, 3])

    <class ''list''>

    >>> type({''a'':''x'', ''b'':1})

    <class ''dict''>

    >>> type((''1.0'', 1, ''a''))

    <class ''tuple''>

    >>> type({1, 2, ''a''})

    <class ''set''>

    >>> type(True)

    <class ''bool''>

    >>>

    ```


    CodeEx 2-3


    ## 2.5.3. Type casting


    Python allows us to convert one *data type* to another (e.g., `int` to `str` or
    `str` to `int` etc). Casting one *type* to another is called *type casting* and
    Python has three built-in functions to perform the task: `str()`, `int()` and
    `float()` functions.


    The `int()` function takes in a float or an appropriate string and converts it
    to an integer<sup>CodeEx 2-4</sup>. The `float()` function takes in an integer
    or an appropriate string and changes it to a float<sup>CodeEx 2-5</sup>. Similarly,
    the `str()` function converts suitable *types* to a string<sup>CodeEx 2-6</sup>.


    ```

    >>> #type casting examples with int()

    >>>

    >>> #casting float into int, it removes digits after decimal

    >>> #point

    >>>

    >>> int(4.678) #here 4.678 belongs to type float

    4

    >>>

    >>> #casting str into int

    >>>

    >>> int(''4'') #here ''4'' is a str

    4

    >>>

    >>> #but following conversions are forbidden

    >>> #int(''a string'') and int(''4.678'')

    >>> #here note 4.678(int) is not same as ''4.678'' (str)

    >>>

    >>> #try these yourself. You will get error messages.

    >>> #try to get familiar with these errors.

    >>> #errors are best friend of a programmer.

    >>>

    ```


    ```

    >>> # type casting examples with float()

    >>>

    >>> #casting int into float

    >>>

    >>> float(4)

    4.0

    >>>

    >>> #casting str into float

    >>>

    >>> float(''4'')

    4.0

    >>> float(''4.678'')

    4.678

    >>>

    >>> #but following conversions are forbidden

    >>> #int(''a string'')

    >>>

    >>> #try it yourself and observe the errors message carefully

    >>>

