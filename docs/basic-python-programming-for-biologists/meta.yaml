  md: '# 2.5.3. Type casting


    Python allows us to convert one *data type* to another (e.g., `int` to `str` or
    `str` to `int` etc). Casting one *type* to another is called *type casting* and
    Python has three built-in functions to perform the task: `str()`, `int()` and
    `float()` functions.


    The `int()` function takes in a float or an appropriate string and converts it
    to an integer<sup>CodeEx 2-4</sup>. The `float()` function takes in an integer
    or an appropriate string and changes it to a float<sup>CodeEx 2-5</sup>. Similarly,
    the `str()` function converts suitable *types* to a string<sup>CodeEx 2-6</sup>.


    ```

    >>> #type casting examples with int()

