- md: "## 7. Dictionary\n\nSuppose you need to use restriction site sequences for\
    \ more than one restriction endonuclease (REs) throughout your program. Or, you\
    \ need to store and reuse the amino acids and their single-letter codes for your\
    \ project. What will you do?\n\nIn one option, you can create a list of restriction\
    \ site sequences and remember their order to relate them with their respective\
    \ RE. Even better, create two lists. One for restriction site sequences and another\
    \ for REs. Now maintain strict order so that you can tally those indexes and with\
    \ help of an iteration tool (e.g., `zip()` or `for` loop, etc.), you can extract\
    \ restriction site sequences without error.\n\nBut isn’t it too cumbersome and\
    \ error-prone? As list are mutable, any error on your part can break your program\
    \ or can give you false output! Like you need the sequence for EcoRI but getting\
    \ that of BamH1 because of a silly indexing error on your part! That’s not acceptable\
    \ at all!\n\nFortunately, Python has an incredible built-in container just for\
    \ these purposes, where tagging a value and retrieving it using the tag is easy!\
    \ It’s called the *Dictionary*! Dictionaries are collections of values that are\
    \ mapped to *arbitrary*, *immutable*, and *unique keys*. These store data values\
    \ in a *key-value* pair where each value has a unique key. These key-value pairs\
    \ are the *items* of a dictionary.\n\nDictionary is *mutable*, while keys are\
    \ immutable (e.g., `str`, `int`, etc.). It is an *ordered* data structure (Since\
    \ Python 3.7). It does not allow *duplicate keys*.\n\nDictionary is declared using\
    \ *curly brackets* containing key-value pairs in a comma-separated manner. See\
    \ CodeEx 7-1 for further clarification.\n\n```\n>>> #{dictionary}\n>>>\n>>> re_dict\
    \ = {'ecor1': 'GAATTC',\n              'bamh1': 'GGATCC',\n              'hind3':\
    \ 'aagcct'}\n>>> type(re_dict)\n<class 'dict'>\n>>> #empty dictionary (i.e., dict\
    \ w/o elements)\n>>> empty = {}\n>>> type(empty)\n<class 'dict'>\n>>>\n```\n\n\
    CodeEx 7-1\n\n### 7.1. dict() constructor\n\nAlso, you can build a dictionary\
    \ from key-value sequences (*paired value sequences*) using `dict()` constructor<sup>CodeEx\
    \ 7-2</sup>.\n\n```\n>>> #paired value sequences to dict\n>>>\n>>> #aa is a paired\
    \ value list\n>>>\n>>> aa = [('Q', 'Gln'), ('T', 'Thr'), ('A', 'Ala')]\n>>> aa_dict\
    \ = dict(aa)\n>>> print(aa_dict)\n{'Q': 'Gln', 'T': 'Thr', 'A': 'Ala'}\n>>>\n\
    ```\n\nCodeEx 7-2\n\n### 7.2. Dictionary keys\n\nKeys help us to handle dictionary\
    \ items in several ways as you can see in CodeEx 7-3.\n\n### 7.3. Using `in` keyword\
    \ and `get()` method on a dictionary\n\nTo check whether a *key* is present in\
    \ a dictionary you can use `in` keyword that gives a Boolean outcome. As an output,\
    \ `True` means the key is present in the dictionary\n\n```\n>>> aa_dict = {'Q':\
    \ 'Gln', 'T': 'Thr', 'A': 'Ala'}\n>>> #adding new item (with key 'P' and value\
    \ 'Pro' in aa_dict)\n>>> aa_dict['P'] = 'Pro'\n>>> aa_dict\n{'Q': 'Gln', 'T':\
    \ 'Thr', 'A': 'Ala', 'P': 'Pro'}\n>>> #removing the value ('Thr')\n>>> del(aa_dict['T'])\n\
    >>> aa_dict\n{'Q': 'Gln', 'A': 'Ala', 'P': 'Pro'}\n>>> #changing the value ('Ala'\
    \ to 'Alanine')\n>>> aa_dict['A'] = 'Alanine'\n>>> aa_dict\n{'Q': 'Gln', 'A':\
    \ 'Alanine', 'P': 'Pro'}\n>>>\n```\n\nwhereas False indicates its absence. Also,\
    \ you can access the value mapped with the key with `get()` method<sup>CodeEx\
    \ 7-4</sup>.\n\n```\n>>> #finding a key with value\n>>> aa_dict = {'Q': 'Gln',\
    \ 'T': 'Thr', 'A': 'Ala', 'P': 'Pro'}\n>>> 'T' in aa_dict #using in keyword\n\
    True\n>>> 'S' in aa_dict\nFalse\n>>> aa_dict.get('T') #using get() method\n'Thr'\n\
    >>>\n```\n\n### 7.4. Extract all keys & values, or both\n\nBy using dictionary\
    \ methods `keys()`, `values()` and `items()` you can extract all the keys, values,\
    \ and key-value pairs respectively from a dictionary.\nThe `keys()` method returns\
    \ a *dictionary view object*. The view object (`<class dict_keys`>) contains the\
    \ keys as a list. So, it's best to always pass outputs from these methods through\
    \ `list()`, if you want to *print* these outputs directly (`list[dictionary.keys()]`).\
    \ See CodeEx 7-5 for more details\n\n```\n>>> #keys(), values() & items()\n>>>\n\
    >>> aa_dict = {'Q': 'Gln', 'T': 'Thr', 'A': 'Ala', 'P': 'Pro'}\n>>>\n>>> #getting\
    \ all keys from aa_dict\n>>>\n>>> key = aa_dict.keys()\n>>> print(key)\ndict_keys(['Q',\
    \ 'T', 'A', 'P'])\n>>> type(key)\n<class 'dict_keys'>\n>>>\n>>> #passing the output\
    \ through list() (though not necessary)\n>>>\n>>> list(key)\n['Q', 'T', 'A', 'P']\n\
    >>>\n>>> #similarly\n>>>\n>>> list(aa_dict.values())\n['Gln', 'Thr', 'Ala', 'Pro']\n\
    >>>\n>>> list(aa_dict.items())\n[('Q', 'Gln'), ('T', 'Thr'), ('A', 'Ala'), ('P',\
    \ 'Pro')]\n>>>\n```\n\nCodeEx 7-5\n\n### 7.5. Getting the length of a dictionary\n\
    \nLength of a dictionary shows the total number of items of the dictionary and\
    \ with the `len()` function you can get that. `len()` takes a dictionary as its\
    \ argument\n\n```\n>>> #getting dict length\n>>>\n>>> aa_dict = {'Q': 'Gln', 'T':\
    \ 'Thr', 'A': 'Ala'}\n>>> print(len(aa_dict))\n3\n>>>\n```\n\nCodeEx 7-6\n\n###\
    \ 7.6. Update and merge dictionaries\n\nPython 3.9 has added two new operators\
    \ to its built-in dictionary class: *update* (|=) and *merge* (|). Update operator\
    \ (|=) update the dictionary *left to it* with the object from its *right*, which\
    \ may be either a mapping pair (e.g., another dictionary) or an iterable of key/value\
    \ pairs (e.g., a list of tuples where each tuple has two comma separated items;\
    \ [ (1,2), (3,4) ]). Whereas, merge operator (|) creates a *new* dictionary with\
    \ the merged keys and values of both *operands*. Here, both operands must be dictionaries<sup>CodeEx\
    \ 7-7</sup>.\n\n```\n>>> #merging and updating dictionaries\n>>>\n>>> aa_dict_1\
    \ = {'Q': 'Gln', 'T': 'Thr'}\n>>> aa_dict_2 = {'A': 'Ala', 'P': 'Pro'}\n>>>\n\
    >>> #creating a new aa_dict_3 by merging aa_dict_1 with\n>>> #aa_dict_2\n>>>\n\
    >>> aa_dict_3 = aa_dict_1|aa_dict_2\n>>> aa_dict_3\n{'Q': 'Gln', 'T': 'Thr', 'A':\
    \ 'Ala', 'P': 'Pro'}\n>>>\n>>> #updating aa_dict_1 with aa_dict_2\n>>>\n>>> aa_dict_1\
    \ |= aa_dict_2\n>>> aa_dict_1\n{'Q': 'Gln', 'T': 'Thr', 'A': 'Ala', 'P': 'Pro'}\n\
    >>> aa_dict_2\n{'A': 'Ala', 'P': 'Pro'}\n>>>\n```\n\nCodeEx 7-7\n\n### 7.7. Dictionary\
    \ comprehension\n\nLike all other comprehensions, dictionary comprehensions in\
    \ Python also provide a short and concise way to construct a new dictionary based\
    \ on the values of an iterable paired value object (e.g., [ (1,2) , (3,4) ]).\
    \ In CodeEx 7-8, I have used the paired value list, aa, to create a codon dictionary.\
    \ The dictionary will hold a codon as a key, and its respective amino acid as\
    \ a value. Here is another instance where dictionary comprehension could elegantly\
    \ replace the multi-line code which you could write to know the nucleotide count\
    \ for any sequence<sup>CodeEx 7-9</sup>. From the two-line code, you can make\
    \ an elegant executable program that will help to calculate nucleotide frequencies\
    \ (i.e., percentage of each nucleotide in an input sequence).\n\n```\n>>> #list\
    \ comprehension\n>>> #from pair value list creating an aa dictionary\n>>>\naa\
    \ = [('Q', 'Gln'), ('T', 'Thr'), ('A', 'Ala')]\naa_dict = {a: aaa for a, aaa in\
    \ aa}\nprint(aa_dict)\n{'Q': 'Gln', 'T': 'Thr', 'A': 'Ala'}\n>>>\n```\n\nCodeEx\
    \ 7-8\n\n```\n>>> #atgc count\n>>> dna = 'aggctgacttgacaccagtcgacatcgacgtac'\n\
    >>> atgc_count = {base:dna.count(base) for base in dna}\n>>> print(atgc_count)\n\
    {'a': 9, 'g': 8, 'c': 10, 't': 6}\n>>>\n>>> #even better\n>>> atgc = {base.upper():dna.count(base)\
    \ for base in dna}\n>>> atgc_count\n{'A': 9, 'G': 8, 'C': 10, 'T': 6}\n>>>\n```\n\
    \nCodeEx 7-9\n\n## 8. Set\n\nSet is an unordered, heterogeneous data types that\
    \ do not allow duplicates in its items. Though the set is mutable, its items must\
    \ be immutable. One can imagine set as a dictionary made up of only key values.\
    \ You can declare sets using curly brackets as a dictionary with multiple comma-separated\
    \ values<sup>CodeEx 8-1</sup>.\n\n```\n>>> #{set}\n>>>\n>>> s = {'A', 'B', 1,\
    \ 5}\n>>> type(s)\n<class 'set'>\n>>> print(s)\n{'a', 1, 5, 'b'}\n>>>\n>>> #print(s)\
    \ outcome could be different each time you call it\n>>> #a fresh. This is because\
    \ set is inherently unordered.\n```\n\nCodeEx 8-1\n\n### 8.1. set() constructor\n\
    \nset() constructor works the same as the list or tuple constructor. It can start\
    \ a set or convert other suitable data types to set<sup>CodeEx 8-2</sup>.\n\n\
    ### 8.2. Functions and operators on set\n\nIn CodeEx 8-3, find a few useful functions\
    \ and operators which you can use with the set. Just go through it and try those\
    \ codes yourself. Remember, these are not exhaustive."
  mdcn: "## 7. 字典\n\n假设你需要在程序中使用多个限制性内切酶（REs）的限制位点序列。或者，你需要为项目存储并重用氨基酸及其单字母代码。你会怎么做？\n\
    \n一种选择是，你可以创建一个限制位点序列列表，并记住它们的顺序，以便与各自的限制性内切酶对应。更好的做法是创建两个列表：一个用于限制位点序列，另一个用于限制性内切酶。然后严格保持顺序，这样你就可以核对索引，并借助迭代工具（例如\
    \ `zip()` 或 `for` 循环等），准确无误地提取限制位点序列。\n\n但这不是太繁琐且容易出错吗？由于列表是可变的，你任何的错误都可能破坏你的程序或给出错误的输出！比如你需要\
    \ EcoRI 的序列，却因为你一个愚蠢的索引错误而得到了 BamH1 的序列！这完全无法接受！\n\n幸运的是，Python 有一个令人惊叹的内置容器，专门用于这些目的，它使得标记一个值并使用该标签检索变得非常容易！它就是\
    \ *字典*！字典是值的集合，这些值映射到 *任意的*、*不可变的* 和 *唯一的* 键。它们以 *键-值* 对的形式存储数据值，其中每个值都有一个唯一的键。这些键-值对就是字典的\
    \ *项*。\n\n字典是 *可变的*，而键是不可变的（例如 `str`、`int` 等）。它是一个 *有序的* 数据结构（自 Python 3.7 起）。它不允许\
    \ *重复的键*。\n\n字典使用 *花括号* 声明，其中包含以逗号分隔的键-值对。更多细节请参见代码示例 7-1。\n\n```\n>>> #{dictionary}\n\
    >>>\n>>> re_dict = {'ecor1': 'GAATTC',\n              'bamh1': 'GGATCC',\n   \
    \           'hind3': 'aagcct'}\n>>> type(re_dict)\n<class 'dict'>\n>>> #empty\
    \ dictionary (i.e., dict w/o elements)\n>>> empty = {}\n>>> type(empty)\n<class\
    \ 'dict'>\n>>>\n```\n\n代码示例 7-1\n\n### 7.1. dict() 构造函数\n\n此外，你可以使用 `dict()` 构造函数从键-值序列（*成对的值序列*）构建字典<sup>代码示例\
    \ 7-2</sup>。\n\n```\n>>> #paired value sequences to dict\n>>>\n>>> #aa is a paired\
    \ value list\n>>>\n>>> aa = [('Q', 'Gln'), ('T', 'Thr'), ('A', 'Ala')]\n>>> aa_dict\
    \ = dict(aa)\n>>> print(aa_dict)\n{'Q': 'Gln', 'T': 'Thr', 'A': 'Ala'}\n>>>\n\
    ```\n\n代码示例 7-2\n\n### 7.2. 字典的键\n\n键帮助我们以多种方式处理字典项，如代码示例 7-3 所示。\n\n### 7.3.\
    \ 在字典上使用 `in` 关键字和 `get()` 方法\n\n要检查一个 *键* 是否存在于字典中，你可以使用 `in` 关键字，它会返回一个布尔值。输出\
    \ `True` 表示该键存在于字典中。\n\n```\n>>> aa_dict = {'Q': 'Gln', 'T': 'Thr', 'A': 'Ala'}\n\
    >>> #adding new item (with key 'P' and value 'Pro' in aa_dict)\n>>> aa_dict['P']\
    \ = 'Pro'\n>>> aa_dict\n{'Q': 'Gln', 'T': 'Thr', 'A': 'Ala', 'P': 'Pro'}\n>>>\
    \ #removing the value ('Thr')\n>>> del(aa_dict['T'])\n>>> aa_dict\n{'Q': 'Gln',\
    \ 'A': 'Ala', 'P': 'Pro'}\n>>> #changing the value ('Ala' to 'Alanine')\n>>> aa_dict['A']\
    \ = 'Alanine'\n>>> aa_dict\n{'Q': 'Gln', 'A': 'Alanine', 'P': 'Pro'}\n>>>\n```\n\
    \n而 `False` 则表示其不存在。此外，你可以使用 `get()` 方法访问与键映射的值<sup>代码示例 7-4</sup>。\n\n```\n>>>\
    \ #finding a key with value\n>>> aa_dict = {'Q': 'Gln', 'T': 'Thr', 'A': 'Ala',\
    \ 'P': 'Pro'}\n>>> 'T' in aa_dict #using in keyword\nTrue\n>>> 'S' in aa_dict\n\
    False\n>>> aa_dict.get('T') #using get() method\n'Thr'\n>>>\n```\n\n### 7.4. 提取所有键、值或两者\n\
    \n通过使用字典方法 `keys()`、`values()` 和 `items()`，你可以分别从字典中提取所有的键、值和键-值对。\n`keys()` 方法返回一个\
    \ *字典视图对象*。视图对象（`<class dict_keys>`）包含作为列表的键。因此，如果你想直接 *打印* 这些输出，最好总是将这些方法的输出通过\
    \ `list()` 传递（`list[dictionary.keys()]`）。更多细节请参见代码示例 7-5。\n\n```\n>>> #keys(),\
    \ values() & items()\n>>>\n>>> aa_dict = {'Q': 'Gln', 'T': 'Thr', 'A': 'Ala',\
    \ 'P': 'Pro'}\n>>>\n>>> #getting all keys from aa_dict\n>>>\n>>> key = aa_dict.keys()\n\
    >>> print(key)\ndict_keys(['Q', 'T', 'A', 'P'])\n>>> type(key)\n<class 'dict_keys'>\n\
    >>>\n>>> #passing the output through list() (though not necessary)\n>>>\n>>> list(key)\n\
    ['Q', 'T', 'A', 'P']\n>>>\n>>> #similarly\n>>>\n>>> list(aa_dict.values())\n['Gln',\
    \ 'Thr', 'Ala', 'Pro']\n>>>\n>>> list(aa_dict.items())\n[('Q', 'Gln'), ('T', 'Thr'),\
    \ ('A', 'Ala'), ('P', 'Pro')]\n>>>\n```\n\n代码示例 7-5\n\n### 7.5. 获取字典的长度\n\n字典的长度显示了字典中项的总数，你可以使用\
    \ `len()` 函数获取它。`len()` 接受一个字典作为其参数。\n\n```\n>>> #getting dict length\n>>>\n>>>\
    \ aa_dict = {'Q': 'Gln', 'T': 'Thr', 'A': 'Ala'}\n>>> print(len(aa_dict))\n3\n\
    >>>\n```\n\n代码示例 7-6\n\n### 7.6. 更新和合并字典\n\nPython 3.9 为其内置字典类添加了两个新运算符：*更新*（|=）和\
    \ *合并*（|）。更新运算符（|=）用其 *右侧* 对象的内容更新其 *左侧* 的字典，该对象可以是映射对（例如另一个字典）或键/值对的可迭代对象（例如一个元组列表，其中每个元组有两个逗号分隔的项；[\
    \ (1,2), (3,4) ]）。而合并运算符（|）创建一个 *新的* 字典，其中包含两个 *操作数* 合并后的键和值。这里，两个操作数都必须是字典<sup>代码示例\
    \ 7-7</sup>。\n\n```\n>>> #merging and updating dictionaries\n>>>\n>>> aa_dict_1\
