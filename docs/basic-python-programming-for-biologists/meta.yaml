    # 7.6. Update and merge dictionaries


    Python 3.9 has added two new operators to its built-in dictionary class: *update*
    (|=) and *merge* (|). Update operator (|=) update the dictionary *left to it*
    with the object from its *right*, which may be either a mapping pair (e.g., another
    dictionary) or an iterable of key/value pairs (e.g., a list of tuples where each
    tuple has two comma separated items; [ (1,2), (3,4) ]). Whereas, merge operator
    (|) creates a *new* dictionary with the merged keys and values of both *operands*.
    Here, both operands must be dictionaries<sup>CodeEx 7-7</sup>.


