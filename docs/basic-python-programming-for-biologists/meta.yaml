    \ for Everybody Specialization*’ offered by the *University of Michigan*, etc.\n\
    \    URL: [https://www.coursera.org/](https://www.coursera.org/)\n- 5. *W3Schools\
    \ and GeeksforGeeks*: These are excellent educational websites for learning to\
    \ code online.\n    URL: [https://www.w3schools.com/python/default.asp](https://www.w3schools.com/python/default.asp)\n\
    \    URL: [https://www.geeksforgeeks.org/python-programming-language/?ref=grb](https://www.geeksforgeeks.org/python-programming-language/?ref=grb)\n\
    \n## Glossary\n\n**>>>**: The default Python prompt of the interactive shell.\
    \ Often seen for code examples that can be executed interactively in the interpreter.\n\
    \n**absolute path**: A path that starts from the topmost directory in the file\
    \ system.\n\n**algorithm**: A general process for solving a category of problems.\n\
    \n**argument**: A value passed to a function (or method) when the function is\
    \ called. This value is assigned to the corresponding parameter in the function.\
    \ There are two types of arguments: positional arguments and keyword arguments.\n\
    \n**assignment**: A statement that assigns a value to a variable.\n\n**attribute**:\
    \ One of the named values associated with an object. It is referenced by name\
    \ using dotted expressions. For example, if an object `o` has an attribute `a`\
    \ it would be referenced as `o.a`.\n\n**bit**: A bit (a portmanteau of binary\
    \ digit) is the smallest unit of data in a computer. A bit has a single binary\
    \ value, either 0 or 1. It is the smallest building block of storage. 8 bits together\
    \ to make 1 byte.\n\n**block of code or suite**: A code block is a piece of Python\
    \ program text that is executed as a unit. A code block is implemented using indentation.\n\
    \n**body**: The sequence of statements inside a function definition.\n\n**Boolean\
    \ expression**: An expression whose value is either `True` or `False`.\n\n**branch**:\
    \ One of the alternative sequences of statements in a conditional statement.\n\
    \n**bug**: An error in a program.\n\n**chained conditional**: A conditional statement\
    \ with a series of alternative branches.\n\n**class**: A programmer-defined type.\
    \ It is a template for creating user-defined objects. Class definitions normally\
    \ contain method definitions that operate on instances of the class.\n\n**code\
    \ (short for source code):** A term used to describe text/instructions that are\
    \ written using the syntax of a particular language by a coder/programmer.\n\n\
    **comment:** Information in a program that is meant for other programmers (or\
    \ anyone reading the source code) and does not affect the execution of the program.\n\
    \n**compiled language:** A programming language whose programs are typically translated\
    \ into machine language by a compiler before being executed (e.g., C, Fortran,\
    \ COBOL, etc).\n\n**compiler:** A special program that processes statements written\
    \ in a compiled language and turns them into machine language.\n\n**compound statement:**\
    \ A statement that consists of a header and a body. The header ends with a colon\
    \ (:). The body is indented relative to the header.\n\n**concatenate:** To join\
    \ two operands end-to-end.\n\n**condition:** The Boolean expression in a conditional\
    \ statement that determines which branch runs.\n\n**conditional expression:**\
    \ An expression that has one of two values, depending on a condition.\n\n**conditional\
    \ statement:** A statement that controls the flow of execution depending on some\
    \ condition.\n\n**counter:** A variable used to count something, usually initialized\
    \ to zero and then incremented.\n\n**data structure:** A collection of related\
    \ values, often organized in lists, dictionaries, tuples, etc. Each data structure\
    \ provides a particular way of organizing data so it can be accessed efficiently,\
    \ depending on your use case.\n\n**database:** A file whose contents are organized\
    \ like a dictionary with keys that correspond to values.\n\n**debugging:** The\
    \ process of finding and correcting bugs.\n\n**decrement:** An update that decreases\
    \ the value of a variable.\n\n**default value:** The value given to an optional\
    \ parameter if no argument is provided."
  mdcn: "## 15. 这是一个新的开始\n\n我衷心祝贺你完成了本书的学习。你做得非常出色！这并非一项简单的任务。现在，请记住要多加练习，并探索更多书籍和资源，以拓展你的编程知识视野。你现在已经具备了独立探索该领域的能力。开始你的旅程，享受编程的乐趣吧。在此，我列出了一些优秀的书籍和在线资源，以助你增长知识。请注意，此列表并非详尽无遗。\n\
    \n### 15.1. 进一步参考资料\n\n#### 15.1.1. 开放书籍\n\n- 1. *《像计算机科学家一样思考Python（第2版）》*，作者：艾伦·唐尼，Green\
    \ Tea Press（2015年）；ISBN：978-1-491-93936-9。一本优秀的、面向初学者的通用Python编程免费教材。这本书对“非初学者”同样有益！或许是你现在可以开始阅读的最佳书籍之一。\n\
    - 2. *《Python编程导论：用Python 3探索数据》*，作者：查尔斯·R·塞弗伦斯博士；ISBN：978-9-352-13627-8（2016年）。这是查克博士基于艾伦·唐尼的《像计算机科学家一样思考Python》一书重新编排的开放书籍，其方法是从最基础开始解决数据分析问题。它也是优秀MOOC课程“Python编程导论（密歇根大学）”的配套教材。\n\
    - 3. *《面向生物学家的Python》*，作者：马丁·琼斯博士；ISBN：978-1-492-34613-5（2013年）。这是一本独特的、免费的编程书籍，由琼斯博士为生物学家编写，包含许多以生物学问题为导向的微型项目。我非常喜欢这本书，相信你也会喜欢。\n\
    \n#### 15.1.2. 书籍\n\n- 1. *《生物信息学算法（第3版）》*，作者：菲利普·康波与帕维尔·佩夫佐尔，*主动学习出版社*（2018年）；ISBN：978-0-990-37463-3。这不仅是一本书，更是对生物学感兴趣的程序员的宝库。顾名思义，它并非一本编程书。作者们从算法角度进行了探讨。对于任何希望有效理解和应用生物学编程的人来说，这是一本必备书籍（最好是电子版）。并非为初学者设计。读者应具备任何编程语言的初级知识，才能欣赏本书的精妙之处。完成本书学习后，你便可以阅读它。\n\
    - 2. *《面向生物学家的高级Python》*，作者：马丁·琼斯博士；ISBN：978-1-495-24437-7（2014年）。琼斯博士的另一本编程书，面向具备中级编程技能的生物学家。完成本书后，这是最佳的参考书籍之一。\n\
    - 3. *《面向生物学家的高效Python开发》*，作者：马丁·琼斯博士；ISBN：978-1-539-10303-5（2016年）。一本面向中级程序员、采用生物学方法的书籍。\n\
    - 4. *《一天学会Python》*，作者：杰米·陈（2017年）。一本适合绝对初学者的、易于阅读的通用编程好书。\n- 5. *《Python入门（第2版）》*，作者：比尔·卢巴诺维奇，O'Reilly\
    \ Media（2020年）；ISBN：978-1-492-05136-7。一本介于通用教材和参考书之间的Python编程书籍，适合从初学者到高级程序员。它堪称“那本书”，必须随时放在手边以备查阅。\n\
    \n#### 15.1.3. 其他资源\n\n- 1. *Rosalind*：为了使学习生物信息学变得有趣且简单，Rosalind平台应运而生，这是一个通过解决问题来学习生物信息学的平台。该平台也配套菲利普·康波与帕维尔·佩夫佐尔的*《生物信息学算法》*（2018年）。\n\
    \    网址：[http://rosalind.info/problems/locations/](http://rosalind.info/problems/locations/)\n\
    - 2. *Python编程导论（PY4E）*：该网站由查克博士建立，提供一套免费的材料、讲座、书籍和作业，帮助学生学习如何用Python编程。\n   \
    \ 网址：[https://www.py4e.com/](https://www.py4e.com/)\n- 3. *生物信息学算法*：由菲利普·康波与帕维尔·佩夫佐尔设计的网站，旨在全面展示“生物信息学算法”的世界。\n\
    \    网址：[https://www.bioinformaticalgorithms.org/](https://www.bioinformaticalgorithms.org/)\n\
    - 4. *Coursera和edX*：两个优秀的MOOC平台，你可以在这里找到许多从初级到高级的Python编程课程。几乎所有课程都提供免费旁听选项。这些平台包含优秀的课程，如*加州大学圣地亚哥分校*提供的“*生物信息学专项课程*”，*密歇根大学*提供的“*Python编程导论专项课程*”等。\n\
    \    网址：[https://www.coursera.org/](https://www.coursera.org/)\n- 5. *W3Schools和GeeksforGeeks*：这些是学习在线编程的优秀教育网站。\n\
    \    网址：[https://www.w3schools.com/python/default.asp](https://www.w3schools.com/python/default.asp)\n\
    \    网址：[https://www.geeksforgeeks.org/python-programming-language/?ref=grb](https://www.geeksforgeeks.org/python-programming-language/?ref=grb)\n\
    \n## 术语表\n\n**>>>**：交互式解释器的默认Python提示符。常见于可在解释器中交互执行的代码示例。\n\n**绝对路径**：从文件系统最顶层目录开始的路径。\n\
    \n**算法**：解决一类问题的通用过程。\n\n**参数**：调用函数（或方法）时传递给函数的值。该值被赋给函数中对应的形参。参数有两种类型：位置参数和关键字参数。\n\
    \n**赋值**：将值赋给变量的语句。\n\n**属性**：与对象关联的命名值之一。通过点号表达式按名称引用。例如，如果对象`o`有一个属性`a`，则引用为`o.a`。\n\
    \n**位**：位（二进制数字的合成词）是计算机中最小的数据单位。一个位只有一个二进制值，即0或1。它是存储的最小构建块。8个位组成1个字节。\n\n**代码块或套件**：代码块是作为单元执行的一段Python程序文本。代码块通过缩进来实现。\n\
    \n**函数体**：函数定义内部的语句序列。\n\n**布尔表达式**：其值为`True`或`False`的表达式。\n\n**分支**：条件语句中的一个备选语句序列。\n\
    \n**程序错误**：程序中的错误。\n\n**链式条件**：具有一系列备选分支的条件语句。\n\n**类**：程序员定义的类型。它是创建用户定义对象的模板。类定义通常包含对类实例进行操作的方法定义。\n\
    \n**代码（源代码的简称）**：用于描述编码员/程序员使用特定语言语法编写的文本/指令的术语。\n\n**注释**：程序中供其他程序员（或任何阅读源代码的人）参考的信息，不影响程序的执行。\n\
    \n**编译型语言**：其程序通常在执行前由编译器翻译成机器语言的编程语言（例如，C、Fortran、COBOL等）。\n\n**编译器**：处理用编译型语言编写的语句并将其转换为机器语言的特殊程序。\n\
    \n**复合语句**：由头部和主体组成的语句。头部以冒号（:）结尾。主体相对于头部缩进。\n\n**连接**：将两个操作数首尾相连。\n\n**条件**：条件语句中决定运行哪个分支的布尔表达式。\n\
    \n**条件表达式**：根据条件具有两个值之一的表达式。\n\n**条件语句**：根据某些条件控制执行流程的语句。\n\n**计数器**：用于计数的变量，通常初始化为零，然后递增。\n\
    \n**数据结构**：相关值的集合，通常组织成列表、字典、元组等。每种数据结构提供了一种特定的数据组织方式，以便根据你的用例高效地访问数据。\n\n**数据库**：内容组织得像字典一样的文件，其中键对应值。\n\
    \n**调试**：查找和纠正程序错误的过程。\n\n**递减**：减少变量值的更新操作。\n\n**默认值**：如果未提供参数，则赋予可选参数的值。"
