  md: '# Chapter 9: Conditional Statements


    looping. A *conditional statement* gives us these abilities. It controls the default
    flow of a program.


    A conditional statement is composed of a *Boolean expression* that returns `True`
    or `False`. If it returns `True`, then a branch, a *block of code*, get executed
    and if it returns `False`, any other code block gets executed or the execution
    halts. Nevertheless, do not get lost in words. Examples will make you understand
    the working principle of the conditional statements.


    # 9.1. Conditions


    A Boolean expression, which returns either `True` or `False` is a *condition*.
    *Comparison operators*, *identity operator* along a few other operators and methods
    are widely used to compose a condition. You can also couple simple conditions
    with logical operators to form complex conditions. Refer to CodeEx 9-1 for related
    examples.


    # 9.2. if Statement


    The simplest conditional statement is the `if` statement. Structurally the `if`
    statement has a *header* (line-4; CodeEx 9-2) followed by an *indented* (line-5
    to 7; CodeEx 9-2) body of code called a *block of code* or *suite*. We call statements
    like this *compound statements* (line-4 to 7; CodeEx 9-2). `if` evaluate whether
    the statement met a certain condition. If the condition stands `True` then and
    only then `if` executes its suite. See CodeEx 9-2 for better understanding.


    For more complex situations we need more than one branch. Along with `if`, `elif`
    and `else` is used to create multiple *chained conditions* that lead to multiple
    branches. `elif` is a pythonic way to say “else if”. There can be *zero or more*
    `elif` parts and *zero*'
