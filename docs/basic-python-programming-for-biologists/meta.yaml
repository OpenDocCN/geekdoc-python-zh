    \ x = 7\n>>> while x>=0:\n        if x == 2:\n            break\n        x -=\
    \ 1\n        if x == 4:\n            continue\n        print(x)\n6\n5\n3\n2\n\
    >>>\n```\n\nCodeEx 9-9\n\n```\n>>> #using continue and break in for loop\n>>>\
    \ peptide = 'QHILK'\n>>> for aa in peptide:\n        if aa == 'H':\n         \
    \   continue\n        if aa == 'L':\n            break\n        print(aa)\n\n\
    Q\nI\n>>>\n```\n\nCodeEx 9-10\n\n## 9.4. enumerate() function\n\nThough `enumerate()`\
    \ is not a loop specific function, it is easier to explain with the context of\
    \ `for` loop. `enumerate()` function takes an iterable object as its argument\
    \ and adds a counter to the iterable. It returns an iterable *enumerate object*\
    \ (a python class). Enumerate object stores the items of an iterable and their\
    \ respective index as a paired value tuple. It can also be used as a loop iterable\
    \ that can be converted into a `list` of tuples using the `list()` function on\
    \ it. See CodeEx 9-11 and CodeEx 9-12.\n\n```\n>>> # enumerate() function\n>>>\
    \ \n>>> peptide = 'QHILK'\n>>> enu_obj = enumerate(peptide) #enu_obj is an enumerate\
    \ object\n>>> list(enu_obj) #casting enumerate object to list\n[(0, 'Q'), (1,\
    \ 'H'), (2, 'I'), (3, 'L'), (4, 'K')]\n>>> \n>>> print(enu_obj) # enu_obj can't\
    \ be printed directly\n<enumerate object at 0x0000020D71ACACC0>\n>>> \n>>> type(enu_obj)\
    \ #checking class of enu_obj\n<class 'enumerate'>\n>>>\n```\n\nCodeEx 9-11\n\n\
    ```\n>>> #using enumerate() function with for loop\n>>> \n>>> gene = ['GAPDH',\
    \ 'p53', 'actin', 'SOD2']\n>>> peptide = 'QHILK'\n>>> \n>>> #enumerate() list\n\
    >>> for index, item in enumerate(gene):\n...     print('Index: ', index, ', of\
    \ list item:', item)\n... \nIndex:  0 , of list item: GAPDH\nIndex:  1 , of list\
    \ item: p53\nIndex:  2 , of list item: actin\nIndex:  3 , of list item: SOD2\n\
    >>> \n>>> #enumerate() string\n>>> for i, j in enumerate(peptide):\n...     print('Index:\
    \ ', i, ', of str character:', j)\n... \nIndex:  0 , of str character: Q\nIndex:\
    \  1 , of str character: H\nIndex:  2 , of str character: I\nIndex:  3 , of str\
    \ character: L\nIndex:  4 , of str character: K\n>>>\n```\n\nCodeEx 9-12\n\n##\
    \ 9.5. range() function\n\nThe range() function returns an *integer series* within\
    \ a specified range as an iterable called *range object* (another Python class).\
    \ It is mostly used to generate `for` loop iterables. range() is very useful as\
    \ it helps to automate repetitive works by supplying iterables as counters for\
    \ the `for` loop. range() takes three arguments, all integers. The first one specifies\
    \ the starting point of the integer series which is *inclusive* and with a default\
    \ value of 0. The second one specifies the endpoint which is *exclusive* and with\
    \ *no* default value. So, while using range(), at least you must specify the endpoint.\
    \ The last one specifies the increment step, i.e., the differences between two\
    \ integers in the series, with a default value 1<sup>CodeEx 9-13</sup>.\n\n```\n\
    >>> #range(start,stop,step)function\n>>>\n>>> r = range(5) #r is the range object\n\
    >>> list(r) #casting range object into list to see its content\n[0, 1, 2, 3, 4]\n\
    >>> print(r) #range object can't be directly printed\nrange(0, 5)\n>>> type(r)\
    \ #checking class of range object\n<class 'range'>\n>>> r1 = range(1,5) #specifying\
    \ range with start and endpoint\n>>> list(r1)\n[1, 2, 3, 4]\n>>> r2 =range(1,10,2)\
    \ #specifying with increment step of 2\n>>> list(r2)\n[1, 3, 5, 7, 9]\n>>>\n>>>\
    \ #iterating over range()with for loop\n>>> for i in range(1,10,2):\n        print(i)\n\
    1\n3\n5\n7\n9\n>>>\n```\n\nCodeEx 9-13\n\nNow, say you need to create a 12-nt\
    \ long poly-adenine string. Using a `for` loop you can automate the work<sup>CodeEx\
    \ 9-14</sup>. But a `for` loop needs an iterable object to iterate over in generating\
    \ the polymer. How could you supply the iterable? Here `range()` comes in handy.\
    \ In CodeEx 9-14, `range(12)` created an iterable sequence with 12 items, from\
    \ 0 to 11<sup>line-4</sup>. Then with every iteration, the variable `polya` is\
    \ getting updated with an adenine base<sup>line-5</sup>. This looping goes on\
    \ until the iterable sequence gets exhausted, i.e., the loop runs 12 times and\
    \ reaches the last item of the integer sequence. By that time 12 adenine bases\
    \ have been added to the `polya`, creating a 12-nt poly-A polymer.\n\n```\n>>>\
    \ #using range() to create poly-A polymer\n>>>\n>>> polya = '' #initiating variable\
    \ polya with an empty string\n>>> for i in range(12): #iterating over ranger(12)\n\
    \        polya += 'A'\n\n>>> print(polya)\nAAAAAAAAAAAA\n>>>\n```\n\n## 9.6. Improving\
    \ amino_acid_decoder\n\nNow it's time to revisit CodeEx 9-4. The `amino_acid_decoder`\
    \ asks a user to input a single letter amino acid code. However, it does that\
    \ only once. If the user needs to decode more than one amino acid, she must run\
    \ the code multiple times. It is a glitch. The decoder must prompt the user for\
    \ another input after giving the output and it will break its operation only when\
    \ instructed to do so. To achieve the goal, our code must loop through the block\
    \ of code until a certain condition is met (e.g., instruction for termination).\
    \ Follow CodeEx 9-15 very carefully line-by-line to understand the debugging protocol."
  mdcn: "循环计数器常与 `while` 循环配合使用。它只是一个根据程序需求初始化的变量（如代码示例 9-5 第 3 行的 `x`）。它在循环语句外部声明，并用于创建循环的条件。然而，循环体必须更新循环计数器的值（第\
    \ 6 行；代码示例 9-5），以便条件最终变为 `False`，从而终止循环。代码示例 9-5 在每个循环周期中将 `x` 的值减 1，使得条件（即 `x>=0`）最终变为\
    \ `False`（即 `x<0`），循环结束。虽然 `while` 循环看起来很简单，但在创建时要小心！如果不注意，你可能会进入一个无限循环，一个将永远重复的循环！仅仅省略更新计数器的语句（代码示例\
    \ 9-5 的第 6 行），就会让你进入无限循环！\n\n```\n>>> #while 循环的结构\n>>> #用值 5 初始化循环计数器 x\n>>>\
    \ x = 3\n>>> while x >=0:\n        print(x)\n        x -= 1\n\n3\n2\n1\n0\n>>>\n\
    >>> #你可以将这个程序称为“倒计时”\n>>>\n```\n\n代码示例 9-5\n\n```\n>>> #仅通过省略代码示例 9-5 的第 6 行\n\
    >>> #将倒计时转换为无限循环\n>>> #运行下面的代码，看看会发生什么！\n>>>\n>>> x = 5\n>>> while x >=0:\n  \
    \      print(x)\n...\n```\n\n代码示例 9-6\n\n## 9.3.2. for 循环\n\n与 `while` 循环相反，`for`\
    \ 循环遍历一个*可迭代对象*。它运行的迭代次数与该对象中的项目数量一样多。因此，它也被称为*确定循环*。在结构上，`for` 语句类似于 `while`\
    \ 语句。它有一个*头部*（第 4 行；代码示例 9-7），以冒号（:）结尾，后面跟着一个*缩进的代码块*（第 5 行；代码示例 9-7）。不同之处在于，它的头部中有一个\
    \ `in` 关键字，位于可迭代对象之前。参见代码示例 9-7。\n\n```\n>>> #for 循环的结构\n>>> #使用列表 [0,1,2,3,4]\
    \ 作为可迭代对象\n>>>\n>>> for item in [0,1,2,3,4]:\n        print(\"It's \",item)\n\n\
    It's 0\nIt's 1\nIt's 2\nIt's 3\nIt's 4\n>>>\n```\n\n代码示例 9-8 演示了如何使用 `for` 循环遍历字符串和列表对象。请仔细阅读。通过遍历可迭代对象，`for`\
    \ 循环可以提取其组成项目或字符。\n\n## 9.3.3. continue 和 break\n\n`continue` 和 `break` 语句也是控制语句，用于控制循环内的流程。根据特定条件，`continue`\
    \ 语句会停止当前迭代并跳转到下一次迭代。而 `break` 语句基于某些条件可以提前终止循环，即使循环条件仍为 `True` 或尚未完成其迭代。请参阅代码示例\
    \ 9-9。第 4 行为 `break` 语句（即第 5 行）设置了条件。这里，如果 `x` 变为 2，循环会提前结束。同样，当 `x` 变为 4 时（第\
    \ 7 行和第 8 行），循环在执行完第 8 行后会中止该次迭代，并跳转到下一次迭代。代码示例 9-10 遵循相同的机制。请仔细阅读第 4 到 8 行，并比较\
    \ `for` 循环的输出。\n\n现在，我将向你介绍三个非常有趣的函数：`enumerate()`、`range()` 和 `zip()`。虽然这些不是循环专用的函数，但它们与\
    \ `for` 循环一起使用非常普遍。\n\n```\n>>> #从小肽链中提取氨基酸\n>>> \n>>> peptide = 'QHILK'\n>>>\
    \ for aa in peptide:\n        print('AA: ',aa)\n\nAA:  Q\nAA:  H\nAA:  I\nAA:\
    \  L\nAA:  K\n>>> \n>>> #使用 for 循环遍历列表\n>>> #取一个基因列表\n>>> \n>>> gene = ['GAPDH','p53','actin','SOD2']\n\
    >>> \n>>> #使用 for 语句从基因列表中提取元素基因\n>>> \n>>> for g in gene:\n        print('Gene:\
    \ ',g)\n\nGene:  GAPDH\nGene:  p53\nGene:  actin\nGene:  SOD2\n>>>\n```\n\n代码示例\
    \ 9-8\n\n```\n>>> #在 while 循环中使用 continue 和 break\n>>> x = 7\n>>> while x>=0:\n\
    \        if x == 2:\n            break\n        x -= 1\n        if x == 4:\n \
    \           continue\n        print(x)\n6\n5\n3\n2\n>>>\n```\n\n代码示例 9-9\n\n```\n\
    >>> #在 for 循环中使用 continue 和 break\n>>> peptide = 'QHILK'\n>>> for aa in peptide:\n\
    \        if aa == 'H':\n            continue\n        if aa == 'L':\n        \
    \    break\n        print(aa)\n\nQ\nI\n>>>\n```\n\n代码示例 9-10\n\n## 9.4. enumerate()\
    \ 函数\n\n虽然 `enumerate()` 不是循环专用函数，但在 `for` 循环的上下文中更容易解释。`enumerate()` 函数接受一个可迭代对象作为参数，并为该可迭代对象添加一个计数器。它返回一个可迭代的*枚举对象*（一个\
    \ Python 类）。枚举对象存储可迭代对象的项目及其各自的索引，作为成对的值元组。它也可以用作循环可迭代对象，通过对其使用 `list()` 函数可以转换为元组的\
    \ `list`。参见代码示例 9-11 和代码示例 9-12。\n\n```\n>>> # enumerate() 函数\n>>> \n>>> peptide\
    \ = 'QHILK'\n>>> enu_obj = enumerate(peptide) #enu_obj 是一个枚举对象\n>>> list(enu_obj)\
    \ #将枚举对象转换为列表\n[(0, 'Q'), (1, 'H'), (2, 'I'), (3, 'L'), (4, 'K')]\n>>> \n>>> print(enu_obj)\
    \ # enu_obj 不能直接打印\n<enumerate object at 0x0000020D71ACACC0>\n>>> \n>>> type(enu_obj)\
    \ #检查 enu_obj 的类\n<class 'enumerate'>\n>>>\n```\n\n代码示例 9-11\n\n```\n>>> #在 for\
    \ 循环中使用 enumerate() 函数\n>>> \n>>> gene = ['GAPDH', 'p53', 'actin', 'SOD2']\n>>>\
    \ peptide = 'QHILK'\n>>> \n>>> #枚举列表\n>>> for index, item in enumerate(gene):\n\
    ...     print('Index: ', index, ', of list item:', item)\n... \nIndex:  0 , of\
    \ list item: GAPDH\nIndex:  1 , of list item: p53\nIndex:  2 , of list item: actin\n\
    Index:  3 , of list item: SOD2\n>>> \n>>> #枚举字符串\n>>> for i, j in enumerate(peptide):\n\
    ...     print('Index: ', i, ', of str character:', j)\n... \nIndex:  0 , of str\
    \ character: Q\nIndex:  1 , of str character: H\nIndex:  2 , of str character:\
    \ I\nIndex:  3 , of str character: L\nIndex:  4 , of str character: K\n>>>\n```\n\
    \n代码示例 9-12\n\n## 9.5. range() 函数\n\n`range()` 函数返回一个指定范围内的*整数序列*，作为一个称为*range\
    \ 对象*（另一个 Python 类）的可迭代对象。它主要用于生成 `for` 循环的可迭代对象。`range()` 非常有用，因为它通过提供可迭代对象作为\
    \ `for` 循环的计数器来帮助自动化重复性工作。`range()` 接受三个参数，都是整数。第一个参数指定整数序列的起点，*包含*该点，默认值为 0。第二个参数指定终点，*不包含*该点，且*没有*默认值。因此，使用\
    \ `range()` 时，至少必须指定终点。最后一个参数指定增量步长，即序列中两个整数之间的差值，默认值为 1<sup>代码示例 9-13</sup>。\n\
    \n```\n>>> #range(start,stop,step) 函数\n>>>\n>>> r = range(5) #r 是 range 对象\n>>>\
    \ list(r) #将 range 对象转换为列表以查看其内容\n[0, 1, 2, 3, 4]\n>>> print(r) #range 对象不能直接打印\n\
    range(0, 5)\n>>> type(r) #检查 range 对象的类\n<class 'range'>\n>>> r1 = range(1,5)\
    \ #指定起点和终点的范围\n>>> list(r1)\n[1, 2, 3, 4]\n>>> r2 =range(1,10,2) #指定增量步长为 2\n\
    >>> list(r2)\n[1, 3, 5, 7, 9]\n>>>\n>>> #使用 for 循环遍历 range()\n>>> for i in range(1,10,2):\n\
    \        print(i)\n1\n3\n5\n7\n9\n>>>\n```\n\n代码示例 9-13\n\n现在，假设你需要创建一个 12 个核苷酸长的多聚腺嘌呤字符串。使用\
    \ `for` 循环，你可以自动化这项工作<sup>代码示例 9-14</sup>。但是，`for` 循环需要一个可迭代对象来遍历以生成聚合物。你如何提供这个可迭代对象呢？这时\
    \ `range()` 就派上用场了。在代码示例 9-14 中，`range(12)` 创建了一个包含 12 个项目（从 0 到 11）的可迭代序列<sup>第\
    \ 4 行</sup>。然后，在每次迭代中，变量 `polya` 都会更新一个腺嘌呤碱基<sup>第 5 行</sup>。这个循环会一直进行，直到可迭代序列耗尽，即循环运行\
    \ 12 次并到达整数序列的最后一个项目。此时，`polya` 已经添加了 12 个腺嘌呤碱基，形成了一个 12 个核苷酸的多聚 A 聚合物。\n\n```\n\
    >>> #使用 range() 创建多聚 A 聚合物\n>>>\n>>> polya = '' #用空字符串初始化变量 polya\n>>> for i in\
    \ range(12): #遍历 range(12)\n        polya += 'A'\n\n>>> print(polya)\nAAAAAAAAAAAA\n\
    >>>\n```\n\n## 9.6. 改进 amino_acid_decoder\n\n现在是时候重新审视代码示例 9-4 了。`amino_acid_decoder`\
    \ 要求用户输入单个字母的氨基酸代码。然而，它只执行一次。如果用户需要解码多个氨基酸，她必须多次运行代码。这是一个缺陷。解码器必须在给出输出后提示用户进行另一次输入，并且只有在收到终止指令时才会停止运行。为了实现这个目标，我们的代码必须循环执行代码块，直到满足某个条件（例如，终止指令）。请逐行仔细阅读代码示例\
    \ 9-15，以理解调试协议。"
