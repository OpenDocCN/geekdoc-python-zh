  md: "# 9.3.2. for Loop\n\nIn contrast to the `while` loop, `for` loop, iterate over\
    \ an *iterable object*. It runs through as many iterations as there are items\
    \ in that object. Thus, it is also called a *definite loop*. Structurally, `for`\
    \ statement is like a `while` statement. It has a *header* (line-4; CodeEx 9-7),\
    \ ending with a colon (:), followed by an *indented block of code* (line-5; CodeEx\
    \ 9-7). Except it has an `in` keyword within the header, before the iterable object.\
    \ See CodeEx 9-7.\n\n```\n>>> #structure of for loop\n>>> #using a list [0,1,2,3,4]\
    \ as an iterable object\n>>>\n>>> for item in [0,1,2,3,4]:\n        print(\"It's\
    \ \",item)\n\nIt's 0\nIt's 1\nIt's 2\nIt's 3\nIt's 4\n>>>\n```\n\nCodeEx 9-8 demonstrates\
    \ how `for` loop is used to iterate over string and list object. Follow it carefully.\
    \ By iterating over an iterable object, `for` loop could extract its constituent\
    \ items or characters.\n\n# 9.3.3. continue and break\n\n`continue` and `break`\
    \ statements are also control statements that are used to control the flow within\
    \ a loop. Based on certain condition, `continue` statement stops a current iteration\
