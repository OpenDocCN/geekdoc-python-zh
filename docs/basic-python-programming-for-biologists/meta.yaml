  md: '# 13. Regular Expression


    Congratulations! You have made it through to the last chapter. You have learnt
    so many new things, acquired so many new skills! You are now fit enough to start
    the programming adventure on your own. Now in this last chapter, I am going to
    discuss another ‘not so beginner’ skill, the *regular expression*! It will assist
    you to find complex biological patterns.


    Patterns are very important in biology. Much of the work we do in computational
    biology and bioinformatics is a search for a pattern. It may be a restriction
    site on a DNA sequence or a conserved motif in a peptide. It may be a replication
    origin on DNA or a poly-A tail of RNA. It might be a search for disease patterns
    within a healthy genome or a search for genome-wide patterns between two species
    to infer their phylogenies. Programming has given us the momentum we needed for
    long in the never-ending quest for these patterns, to fight against severe disease
    and to predict their development and fate, to excel in personalized medicine,
    to know our ancestry and so on. Such possibilities are ever-expanding with new-age
    computational power in our hand!


    # 13.1. re module


    The *Regular Expression*, often abbreviated as **RegEx**, is a sequence of characters
    that form a search pattern. The regular expression makes pattern searching a lot
    easier. Though by no means it’s a tool for a newbie, for a biologist it’s a must-know.
    RegEx comes as Python *standard module* `re`. So to access it, first, you have
    to `import` it. Let’s explore the complex pattern searching by using `re`.'
