    \ amount of information from these data, and for that training in string manipulation\
    \ is necessary.\n\n### 3.1. Creating a string\n\nAnything *quoted* in Python is\
    \ a string and vice versa. Surrounding value with ‘single’ or “double-quotes”\
    \ or ““triple quotes”” declares a string. However, remember to use *only one type\
