    nucleotide string (keyword: input_seq)\nand second one is the desired rounding\n\
    (keyword: round_to) with a default value of 4\n>>>\n```\n\n## 12. Modules\n\n\
    I think I can safely assume now that you know how to create ‘your’ function and\
    \ I must congratulate you on this amazing achievement. Congratulations! With your\
    \ function, you can automate boring stuff! Write a function once and use it many\
    \ times. But remember, this use is restricted to the script where you created\
    \ it. Outside that script, your function is not available! However, what if you\
    \ want to use your function across other programs? Suppose you want to use the\
    \ function you have created, `at_content()`, across your upcoming programs and\
    \ for that, you need to create a **module**. Let’s begin.\n\n### 12.1. Anatomy\
    \ of module\n\nA *module* is nothing but a *Python script*, which contains a set\
    \ of functions. It’s like a library of functions; although a module with a single\
    \ function is also completely viable. Besides functions, a module can have any\
    \ other object like a list, string, dictionary, etc.\n\nNow, let me explain the\
    \ structure of a module with an analogy. Imagine a library building with multiple\
    \ rooms. Each room has multiple book-racks full of books. Now, if I compare a\
    \ Python script with a book, then a book-rack will be a *module*, library rooms\
    \ will be *packages*, while the library itself becomes analogous with a Python\
