    \ approach.\n- 4. *Learn Python in One Day and Learn It Well (2017)* by Jamie\
    \ Chan. A good, easy to read general-purpose programming book for absolute beginners.\n\
    - 5. *Introducing Python (2020)* by Bill Lubanovic, O’Reilly Media (2nd Ed); ISBN:\
    \ 978-1-492-05136-7. A sort of general-purpose text cum reference python programming\
    \ text for beginners to advanced programmers. It’s a kind of ‘The book’ which\
    \ must stay in your possession for any time referencing.\n\n#### 15.1.3. Other\
    \ resources\n\n- 1. *Rosalind*: To make learning bioinformatics fun and easy,\
