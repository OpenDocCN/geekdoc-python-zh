    \ to its default value. Also, note that line-21 in CodeEx 11-6 does not elicit\
    \ an error, whereas line-16 in CodeEx 11-5 elicits an error under similar circumstances.\
    \ This is the beauty of default arguments.\n\n`dna_concat()` takes exactly two\
