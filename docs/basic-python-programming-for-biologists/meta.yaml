    Traceback (most recent call last):\n  File \"C:/Users/krish/Desktop/func.py\"\
    , line 16, in <module>\n    print(dna_concat('aaa'))\nTypeError: dna_concat()\
    \ missing 1 required positional argument:\n'seq_2'\n>>>\n>>> #another example\
    \ with 3 args\n>>>\n>>> print(dna_concat('aaa','ttt','ccc'))\nTraceback (most\
    \ recent call last):\n  File \"C:/Users/krish/Desktop/func.py\", line 25, in <module>\n\
    \    print(dna_concat('aaa', 'ttt', 'ccc'))\nTypeError: dna_concat() takes 2 positional\
    \ arguments but 3 were\ngiven\n>>>\n```\n\n```\n>>> #defining a function to check\
    \ AT content\n>>>\n>>> def at_content(input_seq,round_to = 4):\n    seq = input_seq.upper()\n\
