    "[1, ''a'', 1.12]"

    >>>

    >>> #在整篇文章中，你将看到类型转换的实际应用

    >>> #同时记住这些示例并非详尽无遗

    >>>

    ```


    Python 没有声明变量的命令。Python 在你为变量赋值的那一刻初始化该变量。我们将为变量赋值的过程称为*赋值*。Python 的*赋值语句*借助*赋值运算符*完成这项工作<sup>代码示例
    2-7</sup>。赋值运算符由等号 (=) 表示。这里要记住，它与数学上的等于运算符没有关系。参见代码示例 2-7 中的一些示例，以及代码示例 2-8 以了解变量的行为。


    ```

    >>> #变量 = 值; 这是一个赋值语句，(=) 是赋值运算符

    >>>

    >>> #用零值初始化几个变量

    >>>

    >>> str_variable = '''' #用空字符串初始化

    >>> list_variable = [] #用空列表初始化

    >>> dict_variable = {} #用空字典初始化

    >>> int_variable = 0 #用整数 0 初始化

    >>>

    >>> #用一些值初始化几个变量

    >>>

    >>> var_1 = ''ATGC''

    >>> var_2 = 5

    >>> var_3 = [1,2,3]

    >>> var_4 = {''A'':6, ''T'':6, ''G'':7, ''C'':7}

    >>>

    ```


    ```

