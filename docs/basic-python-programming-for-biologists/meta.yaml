  md: "Now, say you need to create a 12-nt long poly-adenine string. Using a `for`\
    \ loop you can automate the work<sup>CodeEx 9-14</sup>. But a `for` loop needs\
    \ an iterable object to iterate over in generating the polymer. How could you\
    \ supply the iterable? Here `range()` comes in handy. In CodeEx 9-14, `range(12)`\
    \ created an iterable sequence with 12 items, from 0 to 11<sup>line-4</sup>. Then\
    \ with every iteration, the variable `polya` is getting updated with an adenine\
    \ base<sup>line-5</sup>. This looping goes on until the iterable sequence gets\
    \ exhausted, i.e., the loop runs 12 times and reaches the last item of the integer\
    \ sequence. By that time 12 adenine bases have been added to the `polya`, creating\
    \ a 12-nt poly-A polymer.\n\n```\n>>> #using range() to create poly-A polymer\n\
    >>>\n>>> polya = '' #initiating variable polya with an empty string\n>>> for i\
    \ in range(12): #iterating over ranger(12)\n        polya += 'A'\n\n>>> print(polya)\n\
    AAAAAAAAAAAA\n>>>\n```\n\n# 9.6. Improving amino_acid_decoder\n\nNow it's time\
    \ to revisit CodeEx 9-4. The `amino_acid_decoder` asks a user to input a single\
    \ letter amino acid code. However, it does that only once. If the user needs to\
