    # 10. File Handling


    Files are very important in computational biology and there are good reasons for
    that. I have used very small DNA sequences in coding examples to keep it manageable.
    But as you know, real biological data are enormous. Even a relatively simple organism
    like *E.coli* has a genome size of 4.6 × 10⁶ bp. The only practical way to handle
    such data is to store it in a file and directly access it from that file. In such
    cases, a program must access the file data. Also, the program preferably stores
    the output in another file so that, it can be shared and used in future with ease.
    In this chapter, you will take a close look at how to work with files. Among different
    file format, simple *text* and *FASTA files* are mostly used in biology.


    # 10.1. Opening a file


    To work with a file, you must open it first. Python’s built-in `open()` function
    does the job. `open()` takes two strings as arguments separated by a comma. The
    first argument is the *file name or its directory*, preferably in a *raw-string*
    format. The second argument is the *mode* of opening. Modes are like permissions
    about what can be done with an opened file. Among all *modes* following three
    are the most important<sup>CodeEx 10-1</sup>:


    +   1. *Read-mode*: represented by `‘r’`. Files opened in read-mode are only allowed
    to read. Any kind of modification to the content is prohibited. Read-mode is the
    *default* mode of opening a file. That means if you skip the second positional
    argument to `open()`, a file will open in read-mode by default.

    2. *Write-mode*: represented by `‘w’`. Files opened in write-mode are eligible
    for modification. Write-mode allows the user to *only* write data to the file.
    Just be'
