    ## 2.6. Variables


    **Variable** is a name that refers to a data value.


    Revisit the cookie’s example. The labels on the cookie jars were analogous to
    variables. Similarly, we assign a variable to a value to store the value in physical
    memory so that we can easily access and reuse it in future. In programming, we
    use the phrase *‘initializing a variable’* instead of ‘creating a variable’ (
    e.g., *‘initializing a variable x and assigning it to the value y’*). After initializing
    a variable, the computer allocates a certain amount of memory space to it to store
    its associated value. You can access the value by referring to the assigned variable’s
    name. Now from here, you must remember one thing: *‘variables are only names!’*


    ```

    >>> # type casting examples with str()

    >>>

    >>> #casting int into str

    >>> str(4)

    ''4''

    >>>

    >>> #casting float into str

    >>> float(4.678)

    ''4.678''

    >>>

    >>> #casting list into str

    >>> str([1, ''a'', 1.12])

    "[1, ''a'', 1.12]"

    >>>

    >>> #throughout the text you will see type casting in actions

    >>> #also remember these examples are not exhaustive

    >>>

    ```


    Python has no command for declaring a variable. Python initializes a variable
    at the moment you assign a value to it. We call the process of assigning a value
    to a variable as *assignment*. Python''s *assignment statement* does this job
    with the help of the *assignment operator*<sup>CodeEx 2-7</sup>. Assignment operator
    is represented by an equal sign, (=). Here remember, it has no relationship with
    mathematical equal operator. See CodeEx 2-7 for a few examples and CodeEx 2-8
    to get an idea about the behaviour of variables.


    ```

    >>> #variable = value; this is an assignment statement and (=)

