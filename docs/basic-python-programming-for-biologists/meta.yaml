  md: '# 2.5.1. Object


    Everything in Python (e.g., data types, functions, programs etc) are *objects*.
    An **object** is an instance of a **class**. A class can create many objects.
    Confused? Let me explain the idea with an example.


    Say you have a cookie template shaped like a star. Now if you consider this template
    as a class, the star-cookies made with it are instances of the class and thus
    are objects that belong to the star-template class. Now if you have a Christmas
    tree-shaped cookie, it belongs to a different class, Christmas tree-template.
    Now, the ingredients of the cookies are the values of the object. Until it is
    baked you can play with the ingredients, can make desirable changes like adding
    Choco or almond chips. At this point, the cookie is called a *mutable object*.
    Once baked you can’t make further alterations to its ingredients, aka value. Then,
    the cookie will be called an *immutable object*. Though in reality, mutability
    is not the two stages of the same object. Few objects are born mutable, while
    others are born immutable. Few *types* create mutable objects while others create
    immutable objects. Table 2-1 explicitly showcases important basic data types (aka
    classes) of Python.


    Now, from the storage perspective, if you store the cookies in jars, you can use
    an external label to name those jars, say as choco or almond cookies. This labelling
    or tagging will make it easier to find a jar with specific cookies in future.
    This ‘tag’ is the **variable** assigned to the object (cookie) with a specific
    value (Choco-chip/almond). You will find more about variables in the next section.


    # 2.5.2. type() function


    In case of any confusion about the type of object, `type()` function helps. `type()`
    takes an object as an argument and returns its class or type<sup>CodeEx 2-3</sup>.'
