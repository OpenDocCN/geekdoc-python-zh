    # 2. Types, Variable & Operators


    In the previous chapter, I have introduced you to the Python interpreter. You
    have written your first line of code. You have also created a Python script. Now
    it is time to understand the building blocks, components, and structure of Python
    code. But first, a brief discussion of data will be beneficial.


    # 2.1. Data


    In simple term, computer data is the information (e.g., text, images, audio, etc)
    stored and (or) processed by a computer. Data can be anything like the quantities,
    characters, or symbols on which a computer performs operations. At the rudimentary
    level, data is just a sequence of *bits*. One insight of computing is that we
    can interpret those bits any way we want—as data of various *values* and *types*
    (numbers, text characters) or even as computer code itself. We use Python to define
    chunks of these bits for different purposes and to get them to and from the CPU.


    # 2.1.1. Value and type


    Each data has its type and value. A *value* is one of the fundamental things,
    like a letter or a number, which a program can manipulate. For example, `''Hello
    World!''` in the first code is a value. Values belong to different *data types*
    (in short *types*). Often, programmers use the words *value* and *object*, *type*,
    and *class* interchangeably. The value, `''Hello World!''`, belongs to the class
    *string*. An object is an instance of a class. Say if the human is a class or
    type then we all are instances of that class. Consider yourself as an object that
    belongs to the class human. This chapter is dedicated to clarifying these and
    related concepts.'
