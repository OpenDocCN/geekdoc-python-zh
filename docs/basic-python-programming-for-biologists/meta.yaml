  md: '# Chapter 10: File Handling


    careful with write-mode as opening a file in write-mode *overwrites and clears*
    any existing data. It also creates a file if the file with the specified name
    does not exist in the specified directory.


    3. *Append-mode*: represented by `''a''`. Files opened in append-mode are also
    eligible for modification. The difference with write-mode is that instead of overwriting,
    it allows appending new data at the end of the existing data.


