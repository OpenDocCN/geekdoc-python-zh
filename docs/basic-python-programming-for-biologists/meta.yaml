    \ with n-number of an item in each, where the first item in each passed iterator\
    \ is paired together, likewise, the second item in each passed iterator is paired\
    \ together and so on. If the passed iterators have different lengths, the iterator\
    \ with the least elements decides the length of the new iterator. `zip()` stops\
    \ when the shortest sequence is over.\n\nCodeEx 5-14\n\n```\n>>> #creating dictionary\
    \ by taking input from two lists\n>>> \n>>> single_letter = ['Q', 'T', 'A', 'P']\n\
    >>> three_letter = ['Gln', 'Thr', 'Ala', 'Pro']\n>>> z = zip(single_letter, three_letter)\n\
    >>> type(z)\n<class 'zip'>\n>>> \n>>> #unzipping\n>>> \n>>> amino_dict = dict(z)\
    \ # unzipping with dict() constructor\n>>> print(amino_dict)\n{'Q': 'Gln', 'T':\
    \ 'Thr', 'A': 'Ala', 'P': 'Pro'}\n>>>\n```\n\nCodeEx 5-13\n\n48"
