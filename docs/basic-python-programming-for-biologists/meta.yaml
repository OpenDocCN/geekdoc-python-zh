    ## 2.6. 变量


    **变量**是引用数据值的名称。


    回顾饼干的例子。饼干罐上的标签类似于变量。同样，我们为一个值分配一个变量，以便将该值存储在物理内存中，以便将来可以轻松访问和重用它。在编程中，我们使用短语*‘初始化一个变量’*而不是‘创建一个变量’（例如，*‘初始化一个变量
    x 并将其赋值为 y’*）。初始化变量后，计算机会为其分配一定量的内存空间来存储其关联的值。你可以通过引用分配的变量名来访问该值。现在，从这里开始，你必须记住一件事：*‘变量只是名称！’*


