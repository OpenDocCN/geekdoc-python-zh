    like a list, string, dictionary, etc.


    Now, let me explain the structure of a module with an analogy. Imagine a library
    building with multiple rooms. Each room has multiple book-racks full of books.
    Now, if I compare a Python script with a book, then a book-rack will be a *module*,
    library rooms will be *packages*, while the library itself becomes analogous with
    a Python *library*.


    Python has many super useful built-in general functions in its mainframe. So,
    when we need them, we *call* them (e.g., `print()`, `len()`, etc). Apart from
    these, Python has many ‘specialized functions’, which we can use anytime to make
    our life easier.'
