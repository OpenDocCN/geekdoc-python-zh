    \ a program may execute one such branch or may pass it to execute a different\
    \ branch. It may also repeatedly execute a block of code until a condition holds,\
    \ a phenomenon known as looping. A *conditional statement* gives us these abilities.\
    \ It controls the default flow of a program.\n\nA conditional statement is composed\
    \ of a *Boolean expression* that returns `True` or `False`. If it returns `True`,\
    \ then a branch, a *block of code*, get executed and if it returns `False`, any\
    \ other code block gets executed or the execution halts. Nevertheless, do not\
    \ get lost in words. Examples will make you understand the working principle of\
    \ the conditional statements.\n\n### 9.1. Conditions\n\nA Boolean expression,\
    \ which returns either `True` or `False` is a *condition*. *Comparison operators*,\
    \ *identity operator* along a few other operators and methods are widely used\
    \ to compose a condition. You can also couple simple conditions with logical operators\
    \ to form complex conditions. Refer to CodeEx 9-1 for related examples.\n\n###\
    \ 9.2. if Statement\n\nThe simplest conditional statement is the `if` statement.\
    \ Structurally the `if` statement has a *header* (line-4; CodeEx 9-2) followed\
