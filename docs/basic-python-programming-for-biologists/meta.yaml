  md: '# # 0. Hello World!


    Welcome to the *Basic Python Programming for Biologists*; a book written to introduce
    beginners to the world of programming!


    Hey pal, you know what, learning programming is like learning Spanish, or French!
    Programming languages like *Python*, are like natural languages. We use natural
    languages to communicate with others while with programming languages we can communicate
    with a computer. Like any other language, it also has grammar called *syntax*.
    The only difference is that there is no talking involved. It only works in writing!


    Here, I am assuming that you are an absolute beginner in programming, with a lot
    of curiosity and enthusiasm to learn it! You may or may not have formal training
    in biology. That does not matter. What matters is a little perseverance because
    computer programming is abstract and sometimes it needs a little extra effort
    to work out! Chapters of this book are like pieces of a jigsaw puzzle. When you
    join these progressively, you will get the bigger picture and you will become
    increasingly comfortable with the language. So, stick to it and keep the faith.
    The book will upgrade your programming knowledge from the ‘*Absolute Beginner*’
    to ‘*Ready for Intermediate*’! Also remember, learning to program is a continuous
    process and, as with other lessons, profoundly depends on practice. I suggest
    investing at least an hour daily to get a good grip on the subject.


    With these, I welcome you to the astonishing world of Python!'
  merge: -1
  pgno: 8
- img_proc: true
  md: 'Chapter 0: Hello World!


    # 0.1. Python


    Python is an *interpreted, object-oriented, high-level* programming language.
    It has a simple, easy to learn *syntax* that emphasizes readability and therefore,
    perfect for absolute beginners. The Dutch programmer *Guido van Rossum* created
    Python at *Stichting Mathematisch Centrum (CWI)* in the Netherlands as a successor
    of a language called *ABC*. He published the first version of the Python code
    in early 1991. Guido van Rossum remains Python’s principal author, although it
    includes many contributions from others with time. Guido van Rossum, himself has
    written, “*I chose Python as a working title for the project, being in a slightly
    irreverent mood (and a big fan of Monty Python’s Flying Circus)*”. That indicates,
    the name is not related to Python, the snake. It came from the famous BBC comedy
    series *Monty Python’s Flying Circus*.


    The non-profit organization *Python Software Foundation* ( [https://www.python.org/psf/](https://www.python.org/psf/)
    ) was formed in 2001, specifically to own Python-related Intellectual Property.
    The Python Software Foundation is an independent non-profit organization that
    holds the copyright on Python versions 2.1 and newer. The PSF’s mission is to
    advance open-source technology related to the Python programming language and
    to publicize the use of Python. All Python releases are *Open Source*, which means
    it grants you all the rights to use, study, change, and share the software in
    modified and unmodified form. In short, it’s completely free to use.


    # 0.2. How to use this book


    I have arranged the chapters in such a manner that skipping chapters will not
    be logical. Each chapter has multiple contextual coding examples named **CodeEx**.
    These are key to understanding syntax. Hence, kindly give special attention to
    these.'
  merge: -1
