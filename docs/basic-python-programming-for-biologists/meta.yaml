    # Chapter 13: Regular Expression


    Table 13-1. RegEx Metacharacters


    | Metacharacters | Search pattern matches | Description |

    | :--- | :--- | :--- |

    | A | T | A or T | Either A or T |

    | GAA | TAA | GAA or TAA | Either GAA or TAA |

    | (AT) | AT | Capture and group; treats AT as a group |

    | GA(A | T)AA | GAAAA or GATAA | Either A or T as they are grouped |

    | [ATGC] | A or T or G or C | A character set. The search pattern matches either
    of the enclosed characters. |

    | [A-D] | A or B or C or D | Returns a match for anyone character, alphabetically
    between A and D |

    | A[GC]T | AGT or ACT | G or C |

    | A.T | A (1 or A or X or @ etc. except ''\n'') T | Any single character in place
    of the dot (except newline character) |

    | ^AUG | AUGTAA but not AAUGTAA | Any string starts with AUG |

    | [^ATGC] | NOT (A or T or G or C) | Matches anything but not A, T, G, C |

    | GC[^AT]GA | GCCGA or GCGGA or GCXGA or GC#GA or GA3GA, etc | Matches anything
    but not A, T in between GC and GA |

    | UAA$ | TAAAUAA but NOT AAUGTAUAA | Any string ends with UAA |

    | ATC* | AT or ATC or ATCC or ATCCC or ATCCCC and so on | Zero or more occurrences
    of C after AT |

    | ATC+ | ATC or ATCC or ATCCC and so on, but never AT | ATLEAST one or more occurrences
    of C after AT |

    | ATC? | AT or ATC | Zero or ONLY once occurrence of C |

    | ATC{3} | ATCCC | Exactly the specified number (3) of occurrences of C |

    | (ATC){2} | ATCATC | Exactly the specified number (2) of occurrences of ATC (as
    grouped) |

    | A(TC){2} | ATCTC | Exactly the specified number (2) of occurrences of TC (as
    grouped) |

    | ATC{1,3} | ATC or ATCC or ATCCC | Matches occurrence of C, one or two or three
    times |

    | \ | Signals a special character | \d Returns a match where the string contains
    digits (numbers from 0 to 9) \D Returns a match where the string DOES NOT contain
    any digits |'
