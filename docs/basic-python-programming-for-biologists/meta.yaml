    ### 2.6.1. Python 变量命名规则


    我们只能用以下字符命名变量：


    - 1. 小写字母（''a'' 到 ''z''），

    - 2. 大写字母（''A'' 到 ''Z''），

    - 3. 数字（0 到 9），

