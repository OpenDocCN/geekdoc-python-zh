    # 6. Tuple


    The tuple is an *ordered, heterogeneous, immutable* data type that allows duplicates
    as its item value. You can imagine a tuple as an *immutable list*. It is used
    to store an ordered collection of data values where the user prefers the immutability
    of the data. You can declare tuples using *round brackets*. Values of a tuple
    are comma separated<sup>CodeEx 6-1</sup>.


    ```

    >>> # (tuple)

    >>>

    >>> #declairing empty tuple

    >>>

    >>> t = ()

    >>> type(t)

    <class ''tuple''>

    >>>

    >>> #multiple-item tuple

    >>>

    >>> triplet = (''AAA'', ''TTT'', ''GGG'', ''CCC'')

    >>> type(triplet)

    <class ''tuple''>

    >>>

    ```


    CodeEx 6-1


    # 6.1. tuple() constructor


    `tuple()` constructor can start a tuple or convert other suitable data types to
    tuple<sup>CodeEx 6-2</sup>. It works similarly to the *list constructor* discussed
