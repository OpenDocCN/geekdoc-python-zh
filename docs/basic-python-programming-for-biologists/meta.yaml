  md: '# Glossary


    **code (short for source code):** A term used to describe text/instructions that
    are written using the syntax of a particular language by a coder/programmer.


    **comment:** Information in a program that is meant for other programmers (or
    anyone reading the source code) and does not affect the execution of the program.


    **compiled language:** A programming language whose programs are typically translated
    into machine language by a compiler before being executed (e.g., C, Fortran, COBOL,
    etc).


    **compiler:** A special program that processes statements written in a compiled
    language and turns them into machine language.


    **compound statement:** A statement that consists of a header and a body. The
    header ends with a colon (:). The body is indented relative to the header.


    **concatenate:** To join two operands end-to-end.


    **condition:** The Boolean expression in a conditional statement that determines
    which branch runs.


    **conditional expression:** An expression that has one of two values, depending
    on a condition.


    **conditional statement:** A statement that controls the flow of execution depending
    on some condition.


    **counter:** A variable used to count something, usually initialized to zero and
    then incremented.


    **data structure:** A collection of related values, often organized in lists,
    dictionaries, tuples, etc. Each data structure provides a particular way of organizing
    data so it can be accessed efficiently, depending on your use case.


    **database:** A file whose contents are organized like a dictionary with keys
    that correspond to values.


    **debugging:** The process of finding and correcting bugs.


    **decrement:** An update that decreases the value of a variable.


    **default value:** The value given to an optional parameter if no argument is
    provided.'
