    \ This kind of action will lead to an error (line-5-20 of CodeEx 3-1). Also, Python\
    \ considers texts *without quotes* as variable names. If you do not assign a value\
    \ to it, it raises an error (line-22-31 of CodeEx 3-1). You can create multi-line\
    \ strings triple quotes<sup>CodeEx 3-2</sup>. Also, by *typecasting* with the\
    \ help of `str()` function you can create a string type by casting suitable *types*\
    \ into a string.\n\n### 3.2. Special Characters\n\nTo insert *syntactically ‘illegal’\
    \ character* in a string you can use a *special character* ‘backslash (\\)’ before\
    \ that illegal character<sup>CodeEx 3-3</sup>. Backslash is an ‘escape’ character.\
    \ It helps to escape from strict syntax rule.\n\n```\n1  >>> #strings are ALWAYS\
    \ quoted\n2  >>>\n3  >>> #always use identical quotes\n4  >>>\n5  >>> dna_1 =\
    \ \"ATTCG\" #or\n6  >>> dna_2 = 'ATTCG' #but not\n7  >>> dna_3 = \"ATTCG' #as\
    \ mixing of quotes are prohibited\n8  SyntaxError: EOL while scanning string literal\n\
    9  >>>\n10 >>> #now printing these strings\n11 >>>\n12 >>> print(dna_1)\n13 ATTCG\n\
    14 >>> print(dna_2)\n15 ATTCG\n16 >>> print(dna_3)\n17 Traceback (most recent\
    \ call last):\n18   File \"<pyshell#12>\", line 1, in <module>\n19     print(dna_3)\n\
    20 NameError: name 'dna_3' is not defined\n21 >>>\n22 >>> dna_4 = ATTCG\n23 Traceback\
    \ (most recent call last):\n24   File \"<pyshell#2>\", line 1, in <module>\n25\
    \     dna_4 = ATTCG\n26 NameError: name 'ATTCG' is not defined\n27 >>>\n28 >>>\
    \ #Python considers dna_4 as a variable by default as it\n29 >>> #stays left to\
    \ assignment operator. But this is not the\n30 >>> #case for ATTCG. NameError\
    \ occurred as Python treated\n31 >>> #ATTCG as a variable as it is a text and\
    \ devoid of quotes\n32 >>>\n```\n\nCodeEx 3-1\n\n```\n>>> #string spanning multiple\
