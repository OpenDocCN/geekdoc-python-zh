    \ use anytime to make our life easier. To prevent Python from bloating, creators\
    \ store these separately besides the mainframe. They have organized these in structured\
    \ directories, modules, and packages. To use these, we must *import* these first\
    \ by using the `import` keyword.\n\n### 12.2. Creating a module\n\nTechnically\
    \ *any* Python script could act as a module and nothing special about it. So,\
