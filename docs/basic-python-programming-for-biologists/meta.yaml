    # 2.2. Statement


    The first code you encountered was `>>> print("Hello World!")`. In literature,
    we denote this kind of line as a sentence, but in programming, programmers denote
    this as the **statement**. Henceforth, I shall use this term for any *executable
    line of code*.


    # 2.3. Function and Argument


    In the statement above, `print()` is a **function**. A function is a *reusable
    block of code*, comprising a series of statements, which runs only upon *calling*
    (i.e., ‘using’) and `returns` some data to the caller. Python has an array of
    built-in useful functions according to our different needs. Also, we can *define*
    (i.e., ‘create’) a customized function which I will discuss in the ‘Functions’
    chapter. A function is analogous to a machine, say like a coffee-maker, which
    takes roasted coffee beans as a starting ingredient and returns a beautiful cup
    of coffee! Similarly, a function takes some *value* as input to work on as the
    starting material and returns an output *value*. Programmers use the word ‘*passing*’
    to describe the value input process and the value passed to a function is denoted
    as an **argument** (abbreviated as `arg`). In the first code, the string object
    `"Hello World!"` was the argument for the function `print()`. Syntactically, functions
    are followed by parentheses and we specify arguments inside the parentheses: `function(arg)`.
    Here note one thing, a function could take more than one argument, passed to the
    function in a comma-separated manner: `function(arg_1, arg_2, arg_3, ..., arg_n)`.
    See CodeEx 2-1 for examples.'
