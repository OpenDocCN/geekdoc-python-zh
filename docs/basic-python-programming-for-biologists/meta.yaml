    ## 第十章：文件处理\n\n文件在计算生物学中非常重要，原因有很多。在编码示例中，我使用了非常小的DNA序列以保持其易于管理。但如你所知，真实的生物数据是巨大的。即使像*大肠杆菌*这样相对简单的生物体，其基因组大小也达到了4.6\
    \ × 10⁶ bp。处理此类数据唯一实用的方法是将其存储在文件中，并直接从该文件访问。在这种情况下，程序必须访问文件数据。此外，程序最好将输出存储在另一个文件中，以便将来可以轻松共享和使用。在本章中，你将仔细研究如何处理文件。在不同的文件格式中，简单的*文本*和*FASTA文件*在生物学中最为常用。\n\
    \n### 10.1. 打开文件\n\n要处理文件，你必须先打开它。Python内置的`open()`函数可以完成这项工作。`open()`接受两个由逗号分隔的字符串作为参数。第一个参数是*文件名或其目录*，最好使用*原始字符串*格式。第二个参数是打开的*模式*。模式类似于关于可以对打开的文件执行什么操作的权限。在所有*模式*中，以下三种是最重要的<sup>代码示例\
    \ 10-1</sup>：\n\n1.  *读取模式*：由`‘r’`表示。以读取模式打开的文件只允许读取。禁止对内容进行任何修改。读取模式是打开文件的*默认*模式。这意味着如果你跳过`open()`的第二个位置参数，文件将默认以读取模式打开。\n\
    2.  *写入模式*：由`‘w’`表示。以写入模式打开的文件允许修改。写入模式允许用户*仅*向文件写入数据。使用写入模式时要小心，因为以写入模式打开文件会*覆盖并清除*任何现有数据。如果指定目录中不存在具有指定名称的文件，它还会创建一个文件。\n\
    3.  *追加模式*：由`'a'`表示。以追加模式打开的文件也允许修改。与写入模式的区别在于，它不是覆盖，而是允许在现有数据末尾追加新数据。\n\n```python\n\
    >>> #opening file\n>>> #file_object = open(\"filename.txt or file's path\", 'mode')\n\
    >>>\n>>> #assuming new_file.txt located in the same folder as Python\n>>> #then\
    \ just file name is sufficient as argument\n>>> f = open('new_file.txt','r') #open\
    \ in read-mode or\n>>> f1 = open('new_file.txt','w') #open in write mode or\n\
    >>> f2 = open('new_file.txt','a') #open in append-mode or\n>>> f3 = open('new_file.txt')\
    \ #open in read-mode by default\n>>>\n>>> #assuming new_file.txt located in different\
    \ folder: Desktop\n>>> #then file path is mandatory (as raw string)\n>>> f = open(r'C:\\\
    Users\\Desktop\\new_file.txt','r')\n>>> f1 = open(r'C:\\Users\\Desktop\\new_file.txt','w')\n\
    >>> f2 = open(r'C:\\Users\\Desktop\\new_file.txt','a')\n>>> f3 = open(r'C:\\Users\\\
    Desktop\\new_file.txt')\n```\n\n代码示例 10-1\n\n### 10.2. 读取文件\n\n`open()`函数返回一个可迭代的*文件对象*。文件对象属于一个特殊的类`_io.TextIOWrapper`（代码示例\
    \ 10-2，第8-9行），并拥有自己的方法，如`read()`、`write()`、`append()`等。然而，在代码示例 10-1中，变量f、f1等被赋值为`open()`返回的文件对象。文件对象可以通过多种策略访问。\n\
    \n![](img/3a7148b34dba85d777e10b2273b176fd_84_0.png)\n\n图 10-1. **new_file.txt**\
    \ 显示包含的数据。\n\n#### 10.2.1. **read()**、**readline()** 和 **readlines()** 方法\n\n\
    *文件对象*有`read()`方法用于读取内容，它将文件内容作为字符串对象返回<sup>代码示例 10-2，第5-7行</sup>。我在*桌面*上创建了`new_file.txt`，它有四行<sup>图\
    \ 10-1</sup>。现在我将读取该文件。由于Python位于不同的位置，我将使用文本文件的完整路径作为第一个参数。参见代码示例 10-3。\n\n```python\n\
    >>> #reading file\n>>> #assuming new_file.txt located in the same folder as Python\n\
    >>>\n>>> f = open('new_file.txt')\n>>> content = f.read()\n>>> type(content)\n\
    <class 'str'>\n>>> type(f)\n<class '_io.TextIOWrapper'>\n>>>\n```\n\n**代码示例 10-2**\n\
    \n然而，`readline()`方法不是访问所有行，而是每次返回一行。每次调用`readline()`时，它都会读取一个新行。通过调用`readline()`两次，你可以读取前两行；调用三次，你可以读取前三行，依此类推。而`readlines()`方法返回一个*列表*，其中包含文本文件的所有行作为其元素。参见代码示例\
    \ 10-4。\n\n```python\n>>> #reading and printing the content of new_file.txt\n\
    >>>\n>>> f = open(r'C:\\Users\\Desktop\\new_file.txt', 'r')\n>>> f_data = f.read()\n\
    >>> print(f_data)\nAAAA\nTTTT\nGGGG\nCCCC\n>>> f.close()\n>>> #close() method\
    \ will be discussed later\n>>>\n```\n\n代码示例 10-3\n\n```python\n>>> #reading by\
    \ lines: readline() & readlines()\n>>>\n>>> f = open(r'C:\\Users\\Desktop\\new_file.txt')\n\
    >>> f_l1 = f.readline()\n>>> print(f_l1)\nAAAA\n\n>>> f_l2 = f.readline()\n>>>\
    \ print(f_l2)\nTTTT\n\n>>> f.close()\n>>>\n>>> #after closing file must be reopened\
    \ to read\n>>>\n>>> f = open(r'C:\\Users\\Desktop\\new_file.txt')\n>>> f_list\
    \ = f.readlines()\n>>> print(f_list)\n['AAAA\\n', 'TTTT\\n', 'GGGG\\n', 'CCCC']\n\
    >>>\n```\n\n代码示例 10-4\n\n你可能已经注意到每行之后都插入了换行符（代码示例 10-4中的第7行、第11行和第15行）。这是由于每行末尾（最后一行除外）“隐藏”了一个换行符（\\\
    n）。当你在文本文件中看到换行时，这表示末尾插入了一个隐秘的\\n。`readline()`和`readlines()`函数揭示了隐藏的\\n。此外，在后台，`print()`默认在提供的打印参数末尾添加一个\\\
    n。这两个\\n相加就产生了一个空白。这就像在写东西时按了两次键盘上的*回车键*。一个\\n就像键盘上的物理回车键。然而，有很多方法可以避免这种效果，例如使用字符串方法`rstrip()`<sup>1</sup>，以'\\\
    n'作为参数<sup>代码示例 10-5</sup>，或者在调用`print()`时将*关键字参数*`end`的默认'\\n'替换为空字符串（代码示例 10-5中的第11行和第12行），等等。\n\
    \n```python\n>>> #removing '\\n' from each line\n>>>\n>>> f = open(r'C:\\Users\\\
    Desktop\\new_file.txt')\n>>> f_l1 = f.readline().rstrip('\\n')\n>>> print(f_l1)\n\
