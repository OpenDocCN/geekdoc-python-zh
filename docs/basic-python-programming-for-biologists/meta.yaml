  md: '# About the author


    Krishnendu pursued his bachelors in Zoology from the Presidency College, Kolkata,
    his masters from the University of Calcutta, Kolkata, and his PhD from the Bose
    Institute, Kolkata, India. Presently, he is working as an Assistant Professor
    in Zoology, Jhargram Raj College, Jhargram since 2015. He is fascinated with evolution
    and Python programming and is currently working in the field of computational
    molecular evolution. He is also actively involved in teaching bioinformatics and
    programming. Krishnendu strongly believes bioinformatics and computational biology
    should be a major part of undergraduate and postgraduate programmes. He also feels
    biology students and researchers must be familiar with programming because, the
    basic understanding of programming is becoming increasingly necessary to understand
    modern biology. Through this book, he wishes to guide all enthusiasts, especially
    from the field of biology, to take baby steps in the world of programming.'
