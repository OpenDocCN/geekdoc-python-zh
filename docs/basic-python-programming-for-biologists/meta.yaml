    # # 0. Hello World!


    Welcome to the *Basic Python Programming for Biologists*; a book written to introduce
    beginners to the world of programming!


    Hey pal, you know what, learning programming is like learning Spanish, or French!
    Programming languages like *Python*, are like natural languages. We use natural
    languages to communicate with others while with programming languages we can communicate
    with a computer. Like any other language, it also has grammar called *syntax*.
    The only difference is that there is no talking involved. It only works in writing!


    Here, I am assuming that you are an absolute beginner in programming, with a lot
    of curiosity and enthusiasm to learn it! You may or may not have formal training
    in biology. That does not matter. What matters is a little perseverance because
    computer programming is abstract and sometimes it needs a little extra effort
    to work out! Chapters of this book are like pieces of a jigsaw puzzle. When you
    join these progressively, you will get the bigger picture and you will become
    increasingly comfortable with the language. So, stick to it and keep the faith.
    The book will upgrade your programming knowledge from the ‘*Absolute Beginner*’
    to ‘*Ready for Intermediate*’! Also remember, learning to program is a continuous
    process and, as with other lessons, profoundly depends on practice. I suggest
    investing at least an hour daily to get a good grip on the subject.


    With these, I welcome you to the astonishing world of Python!'
