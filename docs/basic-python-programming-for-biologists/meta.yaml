  md: "Chapter 9: Conditional Statements\n\n# 9.5. range() function\n\nThe range()\
    \ function returns an *integer series* within a specified range as an iterable\
    \ called *range object* (another Python class). It is mostly used to generate\
    \ `for` loop iterables. range() is very useful as it helps to automate repetitive\
    \ works by supplying iterables as counters for the `for` loop. range() takes three\
    \ arguments, all integers. The first one specifies the starting point of the integer\
    \ series which is *inclusive* and with a default value of 0. The second one specifies\
    \ the endpoint which is *exclusive* and with *no* default value. So, while using\
    \ range(), at least you must specify the endpoint. The last one specifies the\
    \ increment step, i.e., the differences between two integers in the series, with\
    \ a default value 1<sup>CodeEx 9-13</sup>.\n\n```\n>>> #range(start,stop,step)function\n\
    >>>\n>>> r = range(5) #r is the range object\n>>> list(r) #casting range object\
    \ into list to see its content\n[0, 1, 2, 3, 4]\n>>> print(r) #range object can't\
    \ be directly printed\nrange(0, 5)\n>>> type(r) #checking class of range object\n\
    <class 'range'>\n>>> r1 = range(1,5) #specifying range with start and endpoint\n\
    >>> list(r1)\n[1, 2, 3, 4]\n>>> r2 =range(1,10,2) #specifying with increment step\
    \ of 2\n>>> list(r2)\n[1, 3, 5, 7, 9]\n>>>\n>>> #iterating over range()with for\
    \ loop\n>>> for i in range(1,10,2):\n        print(i)\n1\n3\n5\n7\n9\n>>>\n```\n\
    \nCodeEx 9-13\n\n72"
