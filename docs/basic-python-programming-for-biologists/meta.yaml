    ## 5. List


    As mentioned in Chapter 2 there are *four* core built-in container data types
    in Python. Container data types are used to store multiple objects. These are
    *list*, *tuple*, *dictionary* and *set*. These are the most basic *data structures*
    of Python. I have dedicated this chapter to the *list*. I will discuss the other
    three data structures in the next three chapters.


    Lists are used to store an *ordered* collection of values that are usually related.
    It is used to store multiple values in a single variable. You can declare a list
    using *square brackets* with *zero* to more than one value in a *comma-separated*
    manner.


    The values that make up a list are called *elements* or *items* of that list.
    Both are used interchangeably. List elements could belong to any data type. Even
    a list could be an element of another list in a complex data structure. Hence,
    it is considered as a *heterogeneous* data type. You also can declare a list without
    putting any element in it. This kind of list is known as an *empty list*. Refer
    to CodeEx 5-1 for a clearer picture.


    ### 5.1. List indexing


    A list is an *ordered* data structure. That means list elements maintain the order
    of incorporation, have specific indexes and are accessible by their indexes. The
    first element has index 0, the second element has index 1 and so on, same as string
    indexing<sup>Figure 5-1</sup>. You can also access these elements from last where
    the last element has an index of -1, the penultimate has an index of -2 and so
    on<sup>Figure 5-1</sup>. See CodeEx 5-2 for better understanding.


    ```

    >>> #[list]

    >>>

    >>> dna_list = [''ATGC'', ''ATTG'', ''GTAC'']

    >>> type(dna_list)

    <class ''list''>

    >>>

    >>> #here single variable dna_list storing multiple values of

    >>> # DNA seq in a comma separated manner

    >>>

    >>> #declaring empty list (i.e., list w/o elements)

    >>>

    >>> empty_list = []

    >>> type(empty_list)

    <class ''list''>

    >>>

    ```


    CodeEx 5-1


    ```

    >>> #accessing list elements

    >>>

    >>> dna_list = [''ATGC'', ''ATTG'', ''GTAC'']

    >>> first_elm = dna_list[0]

    >>> second_elm = dna_list[1]

    >>> last_elm = dna_list[-1]

    >>> print(first_elm, second_elm, last_elm)

    ATGC ATTG GTAC

    >>>

    ```


    CodeEx 5-2


    ### 5.2. List mutability


    The mutability of a list allows us to *replace* and/or *remove* elements from
    the list.


    #### 5.2.1. append() and insert() method


    `append()` method adds an item to the end of a list whereas, with the `insert()`
    method you can insert an item at any desirable position. `append()` takes the
    item to be inserted as its argument. `insert()` takes two arguments. The first
    positional argument is the desirable index of the new element to be inserted.
    While the second positional argument is the new element itself. Just note that,
    both the method updates the existing list without creating a new one with updated
    items.


    ```

    >>> #list mutability

    >>>

    >>> #append an item

    >>>

    >>> dna_list = [''ATGC'', ''ATTG'', ''GTAC'']

    >>> dna_list.append(''AAAA'') #appending dna_list with ''AAAA''

    >>> print(dna_list)

    [''ATGC'', ''ATTG'', ''GTAC'', ''AAAA'']

    >>>

    >>> #insert an item

    >>>

    >>> dna_list.insert(1, ''TTTT'')

    >>> print(dna_list)

    [''ATGC'', ''TTTT'', ''ATTG'', ''GTAC'', ''AAAA'']

    >>>

    ```


    #### 5.2.2. `remove()` method and `del` keyword


    `remove()` method removes the *first item*, whose value is equal to the argument
    supplied, from the list. `del` keyword deletes item(s) from a list.


    ```

    >>> #list mutability

    >>>

    >>> dna_list = [''AAA'', ''TTT'', ''GGG'', ''CCC'', ''TTT''] #remove an item

    >>> dna_list.remove(''TTT'')

    >>> print(dna_list)

    [''AAA'', ''GGG'', ''CCC'', ''TTT'']

    >>>

    >>> del dna_list[1] #delete item with index 1, i.e., ''GGG''

    >>> print(dna_list)

    [''AAA'', ''CCC'', ''TTT'']

    >>>

    ```


    ### 5.3. Slicing a list


    Like a string, you can easily slice a list at specific indexes for extracting
    a specific set of elements from it with the help of Python’s slice tool, `[:]`.
    It takes a start and an end index to use as slicing points. Here the start index
    is *inclusive* and the end index is *exclusive*. You can store sliced items like
    a new list. See CodeEx 5-5 for a better understanding.


    ```

    >>> #list slicing

    >>>

    >>> dna_list = [''AAA'', ''TTT'', ''GGG'', ''CCC'', ''TTT'']

    >>>

    >>> #extracting items with index 1 & 2 and saving it

    >>> # as a new list

    >>>

    >>> new_list = dna_list[1:3]

    >>> print(new_list)

    [''TTT'', ''GGG'']

    >>>

    ```


    ### 5.4. Reverse a list


    `reverse()` method reverses the order of list elements. This method does not return
    anything. It makes changes in the original list. See CodeEx 5-6.


    ```

    >>> #list reversal

    >>>

    >>> dna_list = [''AAA'', ''TTT'', ''GGG'', ''CCC'', ''TTT'']

    >>> dna_list.reverse()

    >>> print(dna_list)

    [''TTT'', ''CCC'', ''GGG'', ''TTT'', ''AAA'']

    >>>

    ```


    ### 5.5. List joining


    More than one list can be joined with the help of + operator<sup>CodeEx 5-7</sup>.
    The syntax is like string concatenation.


    ```

    >>> #joining two lists

    >>>

    >>> list_1 = [''AAA'', ''TTT'', ''GGG'']

    >>> list_2 = [1, 2, 3]

    >>> joined_list = list_1 + list_2

    >>> print(joined_list)

    [''AAA'', ''TTT'', ''GGG'', 1, 2, 3]

    >>>

    ```


    ### 5.6. Sorting a list


    You can sort list elements by using the sort() method. After sorting, Python will
    assign elements with new indexes according to their new order<sup>CodeEx 5-8</sup>.


    ```

    >>> #sorting strings

    >>>

    >>> str_list = [''k'', ''a'', ''f'', ''b'', ''n'']

    >>> str_list.sort()

    >>> print(str_list)

    [''a'', ''b'', ''f'', ''k'', ''n'']

    >>>

    >>> int_list = [2, 5, 1]

    >>> int_list.sort()

    >>> print(int_list)

    [1, 2, 5]

    >>>

    ```


    ### 5.7. List length


    The length of a list shows its total number of items. len() function takes a list
    as its argument and returns the length of the list<sup>CodeEx 5-9</sup>.


    | list | [ | ''A'' | ''T'' | ''G'' | ''C'' | ] |

    | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    | Index | | 0 | 1 | 2 | 3 | |

    | Index | | -4 | -3 | -2 | -1 | |


    Figure 5-1: List element indexing.'
  mdcn: '## 4.3. 将Python脚本（.py）转换为可执行程序（.exe）


    你刚刚制作了一个非常有用的计算器。但对你这个Python程序员来说，它才有用。对于那些不熟悉编程的人来说，使用这个计算器会非常困难。用户必须了解运行Python脚本的基础知识，并且系统中必须安装Python。但只需几个步骤，你就可以让程序对所有人可用。只需将Python脚本（.py）转换为可执行程序（.exe）。Windows将运行.exe文件，而无需预先安装Python。用户无需任何编程知识即可运行.exe文件。


    ### 4.3.1. pyinstaller


    现在，要将.py转换为.exe，你只需要一个Python库包——pyinstaller。首先，在你的Python目录中安装pyinstaller。为此，通过在Windows搜索中搜索`cmd`打开Windows命令提示符。然后输入`pip
    install pyinstaller`并按回车键。它将在一分钟内安装完成。pyinstaller安装完成后，按照以下步骤使你的脚本可执行。


    1.  导航到存储Python脚本（`dnalencal.py`）的文件夹。然后同时按住`Shift`键并右键单击。

    2.  从弹出菜单中单击“在此处打开PowerShell窗口”。

    3.  将打开一个PowerShell窗口。现在输入`pyinstaller dnalencal.py`并按回车键。pyinstaller将创建可执行文件。要访问它，请打开新创建的`dist`文件夹（该文件夹与.py文件存储在同一位置）。

    4.  在该文件夹内，还有另一个名为`dnalencal`的文件夹。打开它，然后在`dnalencal`文件夹内按住`Shift`键并右键单击以打开Windows
    PowerShell。

    5.  在PowerShell中输入创建的文件名（`dnalencal.exe`），然后按键盘上的`Tab`键。按下`Tab`键后会出现一个提示符。在提示符中输入你的数据，然后查看结果！请始终保持`dist`文件夹及其*所有*内容不受干扰。从`dist`中提取`.exe`文件可能会在运行时产生意外错误。


    ![](img/3a7148b34dba85d777e10b2273b176fd_45_0.png)


