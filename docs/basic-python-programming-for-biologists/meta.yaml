- md: '## 4.3. Converting a Python script (.py) to an executable program (.exe)


    You have just made a very useful calculator. But it’s only useful to you as you
    are a Python programmer. But for those who are not familiar with programming,
    it will be very difficult to use the calculator. To use it the user must know
    the basics of running a Python script and they must have Python installed in their
    system. But with a few steps, you can make the program accessible for all. Just
    convert the Python script (.py) to an executable program (.exe). Windows will
    run the .exe without having Python pre-installed. A user need not have any sort
    of programming knowledge to run a .exe file.


    ### 4.3.1. pyinstaller


    Now, to convert .py to .exe you only need a Python library package, the pyinstaller.
    First, install pyinstaller in your Python directory. To do so, open the Windows
    command prompt by searching cmd in Windows search. Then type pip install pyinstaller
    and hit enter. It will install within a minute. After the pyinstaller installation
    is complete, follow these steps to make your script executable.


    1.  Navigate to the folder where you stored the Python script, (dnalencal.py).
    Then press shift and right click simultaneously.

    2.  From the pop-up menu click on ‘Open PowerShell window here’.

    3.  A PowerShell window will open. Now write, pyinstaller dnalencal.py and hit
    enter. pyinstaller will create the executable file. To access it open the newly
    created dist folder (created in the same location where you stored the .py file).

    4.  Within the folder, there is another folder, `dnalencal`. Open it and within
    the `dnalencal` folder press the shift key and right-click to open Windows PowerShell.

    5.  In the PowerShell write the name of the file (`dnalencal.exe`) created and
    hit the `tab` button on the keyboard. A prompt will appear upon hitting the tab.
    Put your data in the prompt and see the result! Always keep the `dist` folder
    and *all* its content undisturbed. Extracting a `.exe` file from `dist` may create
    unexpected errors while running it.


