    # Glossary


    **>>>**: The default Python prompt of the interactive shell. Often seen for code
    examples that can be executed interactively in the interpreter.


    **absolute path**: A path that starts from the topmost directory in the file system.


    **algorithm**: A general process for solving a category of problems.


    **argument**: A value passed to a function (or method) when the function is called.
    This value is assigned to the corresponding parameter in the function. There are
    two types of arguments: positional arguments and keyword arguments.


    **assignment**: A statement that assigns a value to a variable.


    **attribute**: One of the named values associated with an object. It is referenced
    by name using dotted expressions. For example, if an object `o` has an attribute
    `a` it would be referenced as `o.a`.


    **bit**: A bit (a portmanteau of binary digit) is the smallest unit of data in
    a computer. A bit has a single binary value, either 0 or 1. It is the smallest
    building block of storage. 8 bits together to make 1 byte.


    **block of code or suite**: A code block is a piece of Python program text that
    is executed as a unit. A code block is implemented using indentation.


    **body**: The sequence of statements inside a function definition.


    **Boolean expression**: An expression whose value is either `True` or `False`.


    **branch**: One of the alternative sequences of statements in a conditional statement.


    **bug**: An error in a program.


    **chained conditional**: A conditional statement with a series of alternative
    branches.


    **class**: A programmer-defined type. It is a template for creating user-defined
    objects. Class definitions normally contain method definitions that operate on
    instances of the class.'
  - '[PAGE 122]


    # Glossary


    **code (short for source code):** A term used to describe text/instructions that
    are written using the syntax of a particular language by a coder/programmer.


    **comment:** Information in a program that is meant for other programmers (or
    anyone reading the source code) and does not affect the execution of the program.


    **compiled language:** A programming language whose programs are typically translated
    into machine language by a compiler before being executed (e.g., C, Fortran, COBOL,
    etc).


    **compiler:** A special program that processes statements written in a compiled
    language and turns them into machine language.


    **compound statement:** A statement that consists of a header and a body. The
    header ends with a colon (:). The body is indented relative to the header.


    **concatenate:** To join two operands end-to-end.


    **condition:** The Boolean expression in a conditional statement that determines
    which branch runs.


    **conditional expression:** An expression that has one of two values, depending
    on a condition.


    **conditional statement:** A statement that controls the flow of execution depending
    on some condition.


    **counter:** A variable used to count something, usually initialized to zero and
    then incremented.


    **data structure:** A collection of related values, often organized in lists,
    dictionaries, tuples, etc. Each data structure provides a particular way of organizing
    data so it can be accessed efficiently, depending on your use case.


    **database:** A file whose contents are organized like a dictionary with keys
    that correspond to values.


    **debugging:** The process of finding and correcting bugs.


    **decrement:** An update that decreases the value of a variable.


    **default value:** The value given to an optional parameter if no argument is
    provided.'
- md: '## Glossary


    **delimiter:** A character or string used to indicate where a string should be
    split.


    **dictionary comprehension:** A compact way to process all or part of the elements
    in an iterable and return a dictionary with the results.


    **dictionary view:** The objects returned from `dict.keys()`, `dict.values()`,
    and `dict.items()` are called dictionary views. They provide a dynamic view of
    the dictionary''s entries, which means that when the dictionary changes, the view
    reflects these changes.


    **dictionary:** An associative array, where arbitrary keys are mapped to corresponding
    values.


    **directory:** A named collection of files, also called a folder.


    **docstring:** A string that appears at the top of a function definition to document
    the function''s interface.


    **dot notation:** The syntax for calling a function in another module by specifying
    the module name followed by a dot (period) and the function name.


    **element:** One of the values in a list (or other sequences), also called items.


    **empty string:** A string with no characters and length 0, represented by two
    quotation marks.


    **equivalent:** Having the same value.


    **evaluate:** To simplify an expression by performing the operations to yield
    a single value.


    **exception:** An error (except syntax error) that is detected while the program
    is running.


    **execute:** To run a statement and do what it says.


    **expression:** A piece of syntax that can be evaluated to some value. It is a
    combination of variables, operators, and values that represents a single result.


    **file extension:** It''s the suffix which comes after a file name, usually 2
    to 4 characters long. It comes after a period. Examples: .pdf, .mp3, .mkv, .png,
    .jpeg, .xls, .doc, .py etc.


    **file object:** A value that represents an open file. It is also called a file-like
    object.


    **floating-point:** A type that represents numbers with fractional parts.


    **floor division:** An operator, denoted //, that divides two numbers and rounds
    down (toward negative infinity) to an integer.


    **flow of execution:** The order statements run in.


    **formal language:** Any one of the languages that people have designed for specific
    purposes, such as representing mathematical ideas or computer programs; all programming
    languages are formal languages.


    **function call:** A statement that runs a function. It consists of the function
    name followed by an argument list in parentheses.


    **function definition:** A statement that creates a new function, specifying its
    name, parameters, and the statements it contains.


    **function:** A named series of statements that returns some value to a caller.
    Functions may or may not take arguments and may or may not produce a result.


    **global statement:** A statement that declares a variable name global.


    **global variable:** A variable defined outside a function. Global variables can
    be accessed from any function.


    **header:** The first line of a function definition.


    **high-level language:** A programming language like Python that is designed to
    be easy for humans to read and write.


    **IDLE:** An Integrated Development Environment for Python. IDLE is a basic editor
    and interpreter environment which ships with the standard distribution of Python.


    **immutable:** The property of a sequence whose items cannot be changed. It is
    an object with a fixed value. Immutable objects include numbers, strings, and
    tuples. Such an object cannot be altered. A new object must be created if a different
    value has to be stored.


    **import statement:** A statement that reads a module file and creates a module
    object.


    **increment:** An update that increases the value of a variable (often by one).


    **index:** An integer value used to select an item in a sequence, such as a character
    in a string. In Python, indices start from 0.


    **infinite loop:** A loop in which the terminating condition is never satisfied.


    **initialization:** An assignment that gives an initial value to a variable that
    will be updated.


    **instance:** An object that belongs to a class.


    **instantiate:** To create a new object.


    **integer:** An immutable type that represents whole numbers.


    **interactive mode:** A way of using the Python interpreter by typing code at
    the prompt.


    **interface:** A description of how to use a function, including the name and
    descriptions of the arguments and return value.


    **interpreted language:** Python is an interpreted language, as opposed to a compiled
    one, though the distinction can be blurry because of the presence of the bytecode
    compiler. This means that source files can be run directly without explicitly
    creating an executable which is then run. Interpreted languages typically have
    a shorter development/debug cycle than compiled ones, though their programs generally
    also run more slowly.


    **interpreter:** A program that reads another program and executes it.


    **invocation:** A statement that calls a method.


    **item:** One of the values in a sequence. In a dictionary, another name for a
    key-value pair. Also, see the *element*.


    **iterable:** An object capable of returning its members one at a time. Examples
    of iterables include all sequence types (such as `list`, `str`, and `tuple`) and
    some non-sequence types like `dict`, `file` objects, etc.


    **iteration:** Repeated execution of a set of statements using either a recursive
    function call or a loop.


    **iterator:** An object that can iterate through a sequence, but which does not
    provide list operators and methods.


    **key:** An object that appears in a dictionary as the first part of a key-value
    pair.


    **key-value pair:** The representation of the mapping from a key to a value.


    **keyword argument:** An argument that includes the name of the parameter as a
    “keyword”. It preceded by an identifier with an assignment operator in a function
    call.


    **keyword:** A reserved word that is used to parse a program; you cannot use keywords
    like `if`, `def`, and `while` as variable names.


    **list comprehension:** A compact way to process all or part of the elements in
    a sequence and return a list with the results. An expression with a `for` loop
    in square brackets yields a new list.


    **list:** A sequence of values. A built-in Python sequence.


    **literal value:** A literal value is the value of a type that is to be used exactly
    as it is, rather than as a variable. For examples, `''ATGC''` or `456` are literals
    when they are used exactly as it is without assigning a variable to these.


    **local variable:** A variable defined inside a function. A local variable can
    only be used inside its function.


    **logical operator:** One of the operators that combine Boolean expressions: `and`,
    `or`, and `not`.


    **loop:** A part of a program that can run repeatedly.


    **low-level language:** A programming language that is designed to be easy for
    a computer to run; also called “machine language” or “assembly language”.


    **map:** A processing pattern that traverses a sequence and performs an operation
    on each element.


    **mapping:** A relationship in which each element of one set corresponds to an
    element of another set.


    **method:** A function that is defined inside a class body and that is associated
    with an object and called using dot notation (`object.method(argument)`).


    **module object:** A value created by an import statement that provides access
    to the values defined in a module.


    **module:** A file that contains a collection of related functions and other definitions.
    It is an object that serves as an organizational unit of Python code.


    **modulus operator:** An operator, denoted with a per cent sign (%), that works
    on integers and returns the remainder when one number is divided by another.


    **natural language:** Any one of the languages that people speak that evolved
    naturally.


    **nested conditional:** A conditional statement that appears in one of the branches
    of another conditional statement.


    **nested list:** A list that is an element of another list.


    **None:** A special value returned by void functions.


    **object:** Something a variable can refer to. Any data with the state (attributes
    or value) and defined behaviour (methods), i.e., an object must have a type and
    a value.


    **object-oriented language:** A language that provides features, such as programmer-defined
    types and methods, that facilitate object-oriented programming.


    **object-oriented programming:** A style of programming in which data and the
    operations that manipulate it are organized into classes and methods.


    **operand:** One of the values on which an operator operates.


    **operator:** A special symbol that represents a simple computation like addition,
    multiplication, or string concatenation.


    **optional argument:** A function or method argument that is not required.


    **override:** To replace a default value with an argument.


    **package:** A Python module that can contain submodules or recursively, sub-packages.'
  mdcn: '## 术语表


    **分隔符：** 用于指示字符串应在何处被分割的字符或字符串。


    **字典推导式：** 一种紧凑的方式，用于处理可迭代对象中的全部或部分元素，并返回一个包含结果的字典。


    **字典视图：** 从 `dict.keys()`、`dict.values()` 和 `dict.items()` 返回的对象称为字典视图。它们提供了字典条目的动态视图，这意味着当字典发生变化时，视图会反映这些变化。


    **字典：** 一种关联数组，其中任意键被映射到对应的值。


    **目录：** 文件的命名集合，也称为文件夹。


    **文档字符串：** 出现在函数定义顶部的字符串，用于记录函数的接口。


    **点表示法：** 通过指定模块名称后跟一个点（句号）和函数名称来调用另一个模块中函数的语法。


    **元素：** 列表（或其他序列）中的值之一，也称为项。


    **空字符串：** 没有字符且长度为 0 的字符串，由两个引号表示。


    **等价：** 具有相同的值。


    **求值：** 通过执行运算来简化表达式，以产生单个值。


    **异常：** 程序运行时检测到的错误（语法错误除外）。


    **执行：** 运行一条语句并执行其指定的操作。


    **表达式：** 可以被求值为某个值的语法片段。它是变量、运算符和值的组合，代表单个结果。


    **文件扩展名：** 文件名后的后缀，通常为 2 到 4 个字符长。它出现在一个点之后。例如：.pdf、.mp3、.mkv、.png、.jpeg、.xls、.doc、.py
    等。


    **文件对象：** 表示已打开文件的值。也称为类文件对象。


    **浮点数：** 表示带小数部分的数字的类型。


    **整除：** 一种运算符，用 // 表示，将两个数相除并向下取整（向负无穷方向）为整数。


    **执行流程：** 语句运行的顺序。


    **形式语言：** 人们为特定目的设计的语言之一，例如表示数学思想或计算机程序；所有编程语言都是形式语言。


    **函数调用：** 运行一个函数的语句。它由函数名称后跟括号中的参数列表组成。


    **函数定义：** 创建一个新函数的语句，指定其名称、参数和包含的语句。


    **函数：** 一系列命名的语句，向调用者返回某个值。函数可以接受参数，也可以不接受；可以产生结果，也可以不产生。


    **全局语句：** 声明变量名为全局的语句。


    **全局变量：** 在函数外部定义的变量。全局变量可以从任何函数中访问。


    **函数头：** 函数定义的第一行。


    **高级语言：** 像 Python 这样设计为易于人类读写的编程语言。


    **IDLE：** Python 的集成开发环境。IDLE 是一个基本的编辑器和解释器环境，随 Python 标准发行版一起提供。


    **不可变：** 序列的项不能被更改的属性。它是一个具有固定值的对象。不可变对象包括数字、字符串和元组。这样的对象不能被更改。如果必须存储不同的值，则必须创建一个新对象。


    **导入语句：** 读取模块文件并创建模块对象的语句。


    **增量：** 增加变量值的更新（通常增加一）。


    **索引：** 用于选择序列中项的整数值，例如字符串中的字符。在 Python 中，索引从 0 开始。


    **无限循环：** 终止条件永远无法满足的循环。


    **初始化：** 为将要更新的变量赋予初始值的赋值。


    **实例：** 属于一个类的对象。


    **实例化：** 创建一个新对象。


    **整数：** 表示整数的不可变类型。


    **交互模式：** 通过在提示符处输入代码来使用 Python 解释器的方式。


    **接口：** 描述如何使用函数，包括参数和返回值的名称和描述。


    **解释型语言：** Python 是一种解释型语言，与编译型语言相对，尽管由于字节码编译器的存在，这种区别可能有些模糊。这意味着源文件可以直接运行，而无需显式创建可执行文件然后再运行。解释型语言通常比编译型语言具有更短的开发/调试周期，尽管它们的程序通常也运行得更慢。


    **解释器：** 读取另一个程序并执行它的程序。


    **调用：** 调用方法的语句。


    **项：** 序列中的值之一。在字典中，是键值对的另一个名称。另见 *元素*。


    **可迭代对象：** 能够一次返回其成员的对象。可迭代对象的例子包括所有序列类型（如 `list`、`str` 和 `tuple`）以及一些非序列类型，如
    `dict`、`file` 对象等。


    **迭代：** 使用递归函数调用或循环重复执行一组语句。


    **迭代器：** 可以遍历序列但不提供列表运算符和方法的对象。


    **键：** 作为键值对第一部分出现在字典中的对象。


    **键值对：** 从键到值的映射的表示。


    **关键字参数：** 包含参数名称作为“关键字”的参数。在函数调用中，它前面是一个带有赋值运算符的标识符。


    **关键字：** 用于解析程序的保留字；你不能使用像 `if`、`def` 和 `while` 这样的关键字作为变量名。


    **列表推导式：** 一种紧凑的方式，用于处理序列中的全部或部分元素，并返回一个包含结果的列表。方括号中带有 `for` 循环的表达式会生成一个新列表。


    **列表：** 值的序列。Python 的内置序列。


    **字面值：** 字面值是类型的值，将按原样使用，而不是作为变量。例如，当 `''ATGC''` 或 `456` 被原样使用而不将变量赋给它们时，它们就是字面值。


    **局部变量：** 在函数内部定义的变量。局部变量只能在其函数内部使用。


    **逻辑运算符：** 组合布尔表达式的运算符之一：`and`、`or` 和 `not`。


    **循环：** 程序中可以重复运行的部分。


    **低级语言：** 一种设计为易于计算机运行的编程语言；也称为“机器语言”或“汇编语言”。


    **映射：** 一种处理模式，遍历序列并对每个元素执行操作。


    **映射：** 一种关系，其中一个集合的每个元素对应于另一个集合的元素。


    **方法：** 在类体内部定义的函数，与对象关联，并使用点表示法调用（`object.method(argument)`）。


    **模块对象：** 由导入语句创建的值，提供对模块中定义的值的访问。


    **模块：** 包含相关函数和其他定义集合的文件。它是作为 Python 代码组织单元的对象。


    **取模运算符：** 一种运算符，用百分号 (%) 表示，作用于整数并返回一个数除以另一个数的余数。


    **自然语言：** 人们自然演化出的任何一种语言。


    **嵌套条件：** 出现在另一个条件语句的某个分支中的条件语句。


    **嵌套列表：** 作为另一个列表元素的列表。


    **None：** 空函数返回的特殊值。


    **对象：** 变量可以引用的东西。任何具有状态（属性或值）和定义行为（方法）的数据，即对象必须具有类型和值。


    **面向对象语言：** 提供诸如程序员定义的类型和方法等特性，以促进面向对象编程的语言。


    **面向对象编程：** 一种编程风格，其中数据和操作它的操作被组织成类和方法。


    **操作数：** 运算符操作的值之一。


    **运算符：** 表示简单计算（如加法、乘法或字符串连接）的特殊符号。


    **可选参数：** 不是必需的函数或方法参数。


    **覆盖：** 用参数替换默认值。


    **包：** 一个可以包含子模块或递归包含子包的 Python 模块。'
