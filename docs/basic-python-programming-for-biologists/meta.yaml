- md: "## 15. It’s a New Beginning\n\nI heartily congratulate you upon completing\
    \ the book. You have done a commendable job! It was not a simple task. Now, remember\
    \ to practise a lot and explore more books and resources to expand the horizon\
    \ of your programming knowledge. You are now fit to explore the field on your\
    \ own. Start your voyage and enjoy programming. Here, I have listed a few excellent\
    \ books and online resources to aid your knowledge. Please note, the list is not\
    \ exhaustive.\n\n### 15.1. Further references\n\n#### 15.1.1. Open Books\n\n-\
    \ 1. *Think Python: How to Think Like a Computer Scientist (2015)* by Allen Downey,\
    \ Green Tea Press (2nd Ed); ISBN: 978-1-491-93936-9. An excellent general-purpose\
    \ freely available Python Programming text for beginners. The book could also\
    \ benefit ‘not so beginners! Perhaps one of the best books you can start with\
    \ now.\n- 2. *Python for Everybody: Exploring Data Using Python 3 (2016)* by Dr.\
    \ Charles R. Severance; ISBN: 978-9-352-13627-8. A remixed open book by Dr. Chuck,\
    \ based on the title ‘Think Python by Allen Downey’ with an approach to doing\
    \ data analysis problems from the very beginning. It is also the companion text\
    \ for the great MOOCs course ‘Python for Everybody (University of Michigan)’.\n\
    - 3. *Python for Biologists (2013)* by Dr. Martin Jones; ISBN: 978-1-492-34613-5.\
    \ A unique, freely available programming book by Dr. Jones written for biologists\
    \ with many biological problem-oriented micro-projects. I loved this book and\
    \ I believe you will love it too.\n\n#### 15.1.2. Books\n\n- 1. *Bioinformatics\
    \ Algorithms (2018)* by Phillip Compeau & Pavel Pevzner, *Active Learning Publishers\
    \ (3rd Ed)*; ISBN: 978-0-990-37463-3. It’s not only a book but also a treasure\
    \ trove for programmers interested in biology. As the name suggests, it’s not\
