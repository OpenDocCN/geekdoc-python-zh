    ## Chapter 10: File Handling\n\nFiles are very important in computational biology\
    \ and there are good reasons for that. I have used very small DNA sequences in\
    \ coding examples to keep it manageable. But as you know, real biological data\
    \ are enormous. Even a relatively simple organism like *E.coli* has a genome size\
    \ of 4.6 × 10⁶ bp. The only practical way to handle such data is to store it in\
    \ a file and directly access it from that file. In such cases, a program must\
    \ access the file data. Also, the program preferably stores the output in another\
    \ file so that, it can be shared and used in future with ease. In this chapter,\
    \ you will take a close look at how to work with files. Among different file format,\
    \ simple *text* and *FASTA files* are mostly used in biology.\n\n### 10.1. Opening\
    \ a file\n\nTo work with a file, you must open it first. Python’s built-in `open()`\
    \ function does the job. `open()` takes two strings as arguments separated by\
    \ a comma. The first argument is the *file name or its directory*, preferably\
    \ in a *raw-string* format. The second argument is the *mode* of opening. Modes\
    \ are like permissions about what can be done with an opened file. Among all *modes*\
    \ following three are the most important<sup>CodeEx 10-1</sup>:\n\n1. *Read-mode*:\
    \ represented by `‘r’`. Files opened in read-mode are only allowed to read. Any\
    \ kind of modification to the content is prohibited. Read-mode is the *default*\
    \ mode of opening a file. That means if you skip the second positional argument\
    \ to `open()`, a file will open in read-mode by default.\n2. *Write-mode*: represented\
    \ by `‘w’`. Files opened in write-mode are eligible for modification. Write-mode\
    \ allows the user to *only* write data to the file. Just be careful with write-mode\
    \ as opening a file in write-mode *overwrites and clears* any existing data. It\
    \ also creates a file if the file with the specified name does not exist in the\
    \ specified directory.\n3. *Append-mode*: represented by `'a'`. Files opened in\
    \ append-mode are also eligible for modification. The difference with write-mode\
    \ is that instead of overwriting, it allows appending new data at the end of the\
    \ existing data.\n\n```python\n>>> #opening file\n>>> #file_object = open(\"filename.txt\
    \ or file's path\", 'mode')\n>>>\n>>> #assuming new_file.txt located in the same\
    \ folder as Python\n>>> #then just file name is sufficient as argument\n>>> f\
    \ = open('new_file.txt','r') #open in read-mode or\n>>> f1 = open('new_file.txt','w')\
    \ #open in write mode or\n>>> f2 = open('new_file.txt','a') #open in append-mode\
    \ or\n>>> f3 = open('new_file.txt') #open in read-mode by default\n>>>\n>>> #assuming\
    \ new_file.txt located in different folder: Desktop\n>>> #then file path is mandatory\
    \ (as raw string)\n>>> f = open(r'C:\\Users\\Desktop\\new_file.txt','r')\n>>>\
    \ f1 = open(r'C:\\Users\\Desktop\\new_file.txt','w')\n>>> f2 = open(r'C:\\Users\\\
    Desktop\\new_file.txt','a')\n>>> f3 = open(r'C:\\Users\\Desktop\\new_file.txt')\n\
    ```\n\nCodeEx 10-1\n\n### 10.2. Reading a file\n\nThe `open()` function returns\
    \ an iterable *file object*. File object belongs to a special class `_io.TextIOWrapper`\
    \ (line 8-9, CodeEx 10-2) and has its own method like `read()`, `write()`, `append()`,\
    \ etc. However, in CodeEx 10-1, variable f, f1 etc. assigned to the file objects\
    \ returned by `open()`. File object can be accessed by more than one strategy.\n\
    \n![](img/3a7148b34dba85d777e10b2273b176fd_84_0.png)\n\nFigure 10-1. **new_file.txt**\
    \ showing containing data.\n\n#### 10.2.1. **read()**, **readline()**, and **readlines()**\
    \ method\n\n*File object* has `read()` method for reading the content and it returns\
    \ the file's content as a string object<sup>line 5-7, CodeEx 10-2</sup>. I have\
    \ created `new_file.txt` in *Desktop* and it has four lines<sup>Figure 10-1</sup>.\
    \ Now I am going to read the file. As Python is located at a different location,\
    \ I will use the full path of the text file as the first argument. See CodeEx\
    \ 10-3.\n\n```python\n>>> #reading file\n>>> #assuming new_file.txt located in\
    \ the same folder as Python\n>>>\n>>> f = open('new_file.txt')\n>>> content =\
    \ f.read()\n>>> type(content)\n<class 'str'>\n>>> type(f)\n<class '_io.TextIOWrapper'>\n\
    >>>\n```\n\n**CodeEx 10-2**\n\nHowever, instead of accessing all the lines, the\
    \ `readline()` method returns one line at a time. Each time the `readline()` is\
    \ called, it reads a new line. By calling `readline()` twice, you can read the\
    \ first two lines, by calling it thrice you can read the first three lines and\
    \ so on. Whereas, the `readlines()` method returns a *list* containing all the\
    \ lines of the text file as its elements. See CodeEx 10-4.\n\n```python\n>>> #reading\
    \ and printing the content of new_file.txt\n>>>\n>>> f = open(r'C:\\Users\\Desktop\\\
    new_file.txt', 'r')\n>>> f_data = f.read()\n>>> print(f_data)\nAAAA\nTTTT\nGGGG\n\
    CCCC\n>>> f.close()\n>>> #close() method will be discussed later\n>>>\n```\n\n\
    CodeEx 10-3\n\n```python\n>>> #reading by lines: readline() & readlines()\n>>>\n\
    >>> f = open(r'C:\\Users\\Desktop\\new_file.txt')\n>>> f_l1 = f.readline()\n>>>\
    \ print(f_l1)\nAAAA\n\n>>> f_l2 = f.readline()\n>>> print(f_l2)\nTTTT\n\n>>> f.close()\n\
    >>>\n>>> #after closing file must be reopened to read\n>>>\n>>> f = open(r'C:\\\
    Users\\Desktop\\new_file.txt')\n>>> f_list = f.readlines()\n>>> print(f_list)\n\
    ['AAAA\\n', 'TTTT\\n', 'GGGG\\n', 'CCCC']\n>>>\n```\n\nCodeEx 10-4\n\nYou might\
    \ have noticed new lines are inserted after each line (line 7, line 11, and line\
    \ 15 in CodeEx 10-4). It is due to a new line character (\\n) “hidden” at the\
    \ end of each line, except the last line. When you see a new line in a text file,\
    \ that indicates a cryptic \\n has been inserted at the end. The `readline()`\
    \ and `readlines()` functions reveal the hidden \\n. Also, behind the scene, `print()`\
    \ by default adds an \\n at the end of the supplied argument for printing. These\
    \ two \\n adds up to give a blank space. It is just like hitting the two *enter\
    \ button* on a keyboard when you are writing something. A \\n is just like a physical\
    \ enter button on a keyboard. However, there are many ways to avoid this effect\
    \ like using string method `rstrip()`<sup>1</sup> with '\\n' as argument<sup>CodeEx\
    \ 10-5</sup> or replacing default '\\n' of the *keyword argument* `end` with an\
    \ empty string when calling `print()` (line 11 & 12 in CodeEx 10-5), etc.\n\n\
    ```python\n>>> #removing '\\n' from each line\n>>>\n>>> f = open(r'C:\\Users\\\
    Desktop\\new_file.txt')\n>>> f_l1 = f.readline().rstrip('\\n')\n>>> print(f_l1)\n\
    AAAA\n>>> f_l2 = f.readline().rstrip('\\n')\n>>> print(f_l2)\nTTTT\n>>> f_l3 =\
    \ f.readline()\n>>> print(f_l3,end = '')\nGGGG\n>>> f.close()\n>>>\n```\n\n**CodeEx\
    \ 10-5**\n\n#### 10.2.2. Using **for** loop\n\nA file can be read line-by-line\
    \ by iterating over the iterable file object using *for loop*<sup>CodeEx 10-7</sup>.\n\
    \n<sup>1</sup> It removes the character of the arguments from the end of a string.\
    \ By default, it removes any tailing spaces from strings."
