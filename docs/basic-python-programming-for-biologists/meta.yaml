  md: '# # 5. List


    As mentioned in Chapter 2 there are *four* core built-in container data types
    in Python. Container data types are used to store multiple objects. These are
    *list*, *tuple*, *dictionary* and *set*. These are the most basic *data structures*
    of Python. I have dedicated this chapter to the *list*. I will discuss the other
    three data structures in the next three chapters.


    Lists are used to store an *ordered* collection of values that are usually related.
    It is used to store multiple values in a single variable. You can declare a list
    using *square brackets* with *zero* to more than one value in a *comma-separated*
    manner.


    The values that make up a list are called *elements* or *items* of that list.
    Both are used interchangeably. List elements could belong to any data type. Even
    a list could be an element of another list in a complex data structure. Hence,
    it is considered as a *heterogeneous* data type. You also can declare a list without
    putting any element in it. This kind of list is known as an *empty list*. Refer
    to CodeEx 5-1 for a clearer picture.


    # ## 5.1. List indexing


    A list is an *ordered* data structure. That means list elements maintain the order
    of incorporation, have specific indexes and are accessible by their indexes. The
    first element has index 0, the second element has index 1 and so on, same as string
    indexing<sup>Figure 5-1</sup>. You can also access these elements from last where
    the last element has an index of -1, the penultimate has an index of -2 and so
    on<sup>Figure 5-1</sup>. See CodeEx 5-2 for better understanding.'
