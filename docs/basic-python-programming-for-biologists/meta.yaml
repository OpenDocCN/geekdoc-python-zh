    \    return round(at,round_to)\n\n>>> #rounding outcome to 2 decimal places\n\
    >>> print(at_content('aatgtcgatcgac',2))\n53.85\n>>>\n>>> #rounding outcome to\
    \ 6 decimal places for better accuracy\n>>> print(at_content('aatgtcgatcgac',6))\n\
    53.846154\n>>>\n>>> #but by default, the function rounds to 4 decimal places\n\
    >>> print(at_content('aatgtcgatcgac'))\n53.8462\n>>>\n```\n\nCodeEx 11-6\n\n##\
    \ 11.4. Docstrings\n\nA docstring (*documentation string*) is a string literal\
    \ that occurs as the *first statement* in a function definition. Docstring is\
    \ declared using *triple quotes*. Docstring is used to give the user a rational\
    \ idea about what a function does. It is like comments in the code. You can access\
    \ a docstring using the `__doc__` method or using the help function<sup>CodeEx\
    \ 11-7</sup>. You also can use docstring over built-in functions like, `print(len.__doc__)`\
    \ or `print(print.__doc__)`. Give it a try!\n\n```\n>>> #docstring\n>>>\n>>> def\
    \ at_content(input_seq,round_to = 4):\n    '''This function calculates AT content\n\
    \    It takes two args. First positional arg is the nucleotide\n    string (keyword:\
    \ input_seq) and second one is the desired\n    rounding (keyword: round_to) with\
    \ a default value of 4'''\n\n    seq = input_seq.upper()\n    atgc = {i:seq.count(i)\
    \ for i in seq}\n    at = ((atgc['A']+atgc['T'])/len(seq))*100\n    return round(at,round_to)\n\
    \n>>> #everything within ''' ''' is a docstring\n>>>\n>>> #accessing the docstring\
