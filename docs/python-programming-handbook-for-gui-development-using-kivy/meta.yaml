    # Layouts: Arranging Widgets on the Screen


    In Kivy, layouts are special types of widgets that are used to arrange other widgets
    on the screen. They provide a flexible way to manage the size and position of
    child widgets, making it easier to create organized and responsive interfaces.
    Kivy offers several built-in layout classes, each with its own way of arranging
    widgets:


    **1. BoxLayout**

    `BoxLayout` arranges widgets in a horizontal or vertical line. You can control
    the orientation with the `orientation` property, which can be either `''horizontal''`
    or `''vertical''`.


    ```

    python

    from kivy.uix.boxlayout import BoxLayout


    layout = BoxLayout(orientation=''vertical'')

    layout.add_widget(Button(text=''Button 1''))

    layout.add_widget(Button(text=''Button 2''))

    ```'
  - '[PAGE 43]


    # 2. GridLayout


    `GridLayout` arranges widgets in a grid with a specified number of rows and columns.
    You set the number of rows and columns with the `rows` and `cols` properties,
    respectively.


    ```

    python

    from kivy.uix.gridlayout import GridLayout


    layout = GridLayout(rows=2, cols=2)

    layout.add_widget(Button(text=''Button 1''))

    layout.add_widget(Button(text=''Button 2''))

    layout.add_widget(Button(text=''Button 3''))

    layout.add_widget(Button(text=''Button 4''))

    ```


    # 3. AnchorLayout


    `AnchorLayout` allows you to anchor child widgets to a specific part of the layout,
    such as the top-left corner or the center. You can control the anchor position
    with the `anchor_x` and `anchor_y` properties.


    ```

    python

    from kivy.uix.anchorlayout import AnchorLayout


    layout = AnchorLayout(anchor_x=''center'', anchor_y=''bottom'')

    layout.add_widget(Button(text=''Center-Bottom Button''))

    ```'
  - '[PAGE 44]


    # 4. StackLayout


    `StackLayout` arranges widgets in a stack, either horizontally or vertically,
    depending on the available space. It''s useful for creating fluid layouts that
    adapt to the size of their content.


