  md: '# Chapter 4: Understanding Kivy''s Core Concepts


    # Widgets: Building Blocks of Your GUI


    In this chapter, we''ll delve into one of the fundamental concepts in Kivy: widgets.
    Widgets are the building blocks of your graphical user interface (GUI) in Kivy.
    They are the elements that make up your application, from buttons and labels to
    more complex components like sliders and text inputs. Understanding how to use
    widgets is crucial for creating effective and interactive Kivy applications.


    # What Are Widgets?


    Widgets in Kivy are objects that represent elements of the user interface. They
    can display content, interact with the user, and manage layout and positioning.
    Each widget in Kivy is an instance of the `Widget` class or a subclass of it.
    The `Widget` class provides a base for creating custom widgets and includes properties
    and methods for managing size, position, and interaction.


    # Commonly Used Widgets


    Kivy offers a wide range of pre-built widgets that you can use to construct your
    application''s interface. Here are some of the most commonly used widgets:


    +   - Button: A clickable button that can perform an action when pressed.

    - Label: A widget for displaying text.

    - TextInput: A field for entering text input.

    - Slider: A widget for selecting a value from a range.'
