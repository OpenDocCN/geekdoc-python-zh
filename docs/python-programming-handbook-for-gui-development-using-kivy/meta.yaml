    \ their size relative to the layout. For example, `size_hint=(0.5, 1)` would make\
    \ a widget take up half the width and all the height of a horizontal BoxLayout.\n\
    \n### GridLayout\n\n`GridLayout` arranges widgets in a grid with a specified number\
