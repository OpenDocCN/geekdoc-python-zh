    # Importing a Module


    To use the functions in the `greetings` module, you need to import it into your
    program. There are several ways to import a module:


    +   - Import the entire module: Use the `import` statement followed by the module
    name.


    ```

    python

    import greetings


    print(greetings.say_hello("Alice"))

    ```


    +   - Import specific functions: Use the `from` keyword followed by the module
    name and the `import` statement with the specific function names.


    ```

    python

    from greetings import say_hello, say_goodbye


    print(say_hello("Bob"))

    ```


    +   - Import all functions: Use the `from` keyword followed by the module name
    and the `import *` statement to import all functions from the module.


    ```

    python

    from greetings import *

    ```'
