    \n```python\nfrom kivy.uix.label import Label\n\nlabel = Label(text='Hello, Kivy!')\n\
    ```\n\n你可以使用 `font_size`、`color` 和 `halign`（水平对齐）等属性来自定义文本的外观。\n\n## 文本输入框\n\n\
