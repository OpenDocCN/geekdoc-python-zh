    \ Me!')\nbutton.bind(on_press=lambda instance: print('Button pressed!'))\n```\n\
    \nIn this example, we create a button with the text \"Click Me!\" and bind a callback\
    \ function to the `on_press` event, which is triggered when the button is pressed.\n\
    \n**Labels**\n\nLabels are used to display text on the screen. Kivy's `Label`\
    \ widget is simple but versatile, allowing you to display static or dynamic text\
    \ in your application.\n\n```python\nfrom kivy.uix.label import Label\n\nlabel\
    \ = Label(text='Hello, Kivy!')\n```\n\nYou can customize the appearance of the\
    \ text using properties such as `font_size`, `color`, and `halign` (horizontal\
    \ alignment).\n\n## Text Inputs\n\nText inputs are widgets that allow users to\
    \ enter text. Kivy's `TextInput` widget provides a way for users to input text,\
    \ which can be used for forms, chat boxes, and more.\n\n```python\nfrom kivy.uix.textinput\
    \ import TextInput\n\ntext_input = TextInput(text='Enter your name', multiline=False)\n\
    text_input.bind(on_text_validate=lambda instance: print('Text entered:', instance.text))\n\
