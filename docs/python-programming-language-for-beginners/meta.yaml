    \ Python gives you many built-in functions like print(), etc. but you can also\
    \ create your own functions. These functions are called *user-defined functions*.\n\
    \n## Defining a Function\n\nYou can define functions to provide the required functionality.\
    \ Here are simple rules to define a function in Python.\n\n- Function blocks begin\
    \ with the keyword **def** followed by the function name and parentheses ( ( )\
    \ ).\n- Any input parameters or arguments should be placed within these parentheses.\
    \ You can also define parameters inside these parentheses.\n- The first statement\
    \ of a function can be an optional statement - the documentation string of the\
    \ function or *docstring*.\n- The code block within every function starts with\
    \ a colon (:) and is indented.\n- The statement return [expression] exits a function,\
    \ optionally passing back an expression to the caller. A return statement with\
    \ no arguments is the same as return None.\n\n## Syntax\n\n```\ndef functionname(\
    \ parameters ): \n   \"function_docstring\"\n   function_suite\n   return [expression]\n\
    ```\n\nBy default, parameters have a positional behavior and you need to inform\
    \ them in the same order that they were defined.\n\n## Example\n\nThe following\
    \ function takes a string as input parameter and prints it on standard screen.\n\
    \n```\ndef printme( str ):\n    \"This prints a passed string into this function\"\
    \n    print str\n    return\n```\n\n## Calling a Function\n\nDefining a function\
    \ only gives it a name, specifies the parameters that are to be included in the\
    \ function and structures the blocks of code.\n\nOnce the basic structure of a\
    \ function is finalized, you can execute it by calling it from another function\
    \ or directly from the Python prompt. Following is the example to call printme()\
    \ function –\n\n[Live Demo](http://www.tutorialspoint.com/python/online_python_compiler.php)\n\
    \n```\n#!/usr/bin/python\n\n# Function definition is here\ndef printme( str ):\n\
    \    \"This prints a passed string into this function\"\n    print str\n    return;\n\
    \n# Now you can call printme function\nprintme(\"I'm first call to user defined\
    \ function!\")\nprintme(\"Again second call to the same function\")\n```\n\nWhen\
    \ the above code is executed, it produces the following result –\n\n```\nI'm first\
    \ call to user defined function!\nAgain second call to the same function\n```\n\
    \n## Pass by reference vs value\n\nAll parameters (arguments) in the Python language\
    \ are passed by reference. It means if you change what a parameter refers to within\
    \ a function, the change also reflects back in the calling function. For example\
    \ –\n\n[Live Demo](http://www.tutorialspoint.com/python/python_functions.htm)\n\
    \n```\n#!/usr/bin/python\n\n# Function definition is here\ndef changeme( mylist\
    \ ):\n   \"This changes a passed list into this function\"\n   mylist.append([1,2,3,4]);\n\
    \   print \"Values inside the function: \", mylist\n   return\n\n# Now you can\
    \ call changeme function\nmylist = [10,20,30];\nchangeme( mylist );\nprint \"\
    Values outside the function: \", mylist\n```\n\nHere, we are maintaining reference\
    \ of the passed object and appending values in the same object. So, this would\
    \ produce the following result –\n\n```\nValues inside the function: [10, 20,\
    \ 30, [1, 2, 3, 4]]\nValues outside the function: [10, 20, 30, [1, 2, 3, 4]]\n\
    ```\n\nThere is one more example where argument is being passed by reference and\
    \ the reference is being overwritten inside the called function.\n\n[Live Demo](http://www.tutorialspoint.com/python/python_functions.htm)\n\
    \n```\n#!/usr/bin/python\n\n# Function definition is here\ndef changeme( mylist\
    \ ):\n   \"This changes a passed list into this function\"\n   mylist = [1,2,3,4];\
    \ # This would assig new reference in mylist\n   print \"Values inside the function:\
    \ \", mylist\n   return\n\n# Now you can call changeme function\nmylist = [10,20,30];\n\
    changeme( mylist );\nprint \"Values outside the function: \", mylist\n```\n\n\
    The parameter *mylist* is local to the function changeme. Changing mylist within\
    \ the function does not affect *mylist*. The function accomplishes nothing and\
    \ finally this would produce the following result –\n\n```\nValues inside the\
    \ function: [1, 2, 3, 4]\nValues outside the function: [10, 20, 30]\n```\n\n##\
    \ Function Arguments\n\nYou can call a function by using the following types of\
    \ formal arguments –\n\n- Required arguments\n- Keyword arguments\n- Default arguments\n\
    - Variable-length arguments\n\n## Required arguments\n\nRequired arguments are\
    \ the arguments passed to a function in correct positional order. Here, the number\
    \ of arguments in the function call should match exactly with the function definition.\n\
    \nTo call the function *printme()*, you definitely need to pass one argument,\
    \ otherwise it gives a syntax error as follows –\n\n[Live Demo](http://)\n\n```\n\
    #!/usr/bin/python\n\n# Function definition is here\ndef printme( str ):\n    \"\
    This prints a passed string into this function\"\n    print str\n    return;\n\
    \n# Now you can call printme function\nprintme()\n```\n\nWhen the above code is\
    \ executed, it produces the following result –\n\n```\nTraceback (most recent\
    \ call last):\n  File \"test.py\", line 11, in <module>\n    printme();\nTypeError:\
    \ printme() takes exactly 1 argument (0 given)\n```\n\n## Keyword arguments\n\n\
    Keyword arguments are related to the function calls. When you use keyword arguments\
    \ in a function call, the caller identifies the arguments by the parameter name.\n\
    \nThis allows you to skip arguments or place them out of order because the Python\
    \ interpreter is able to use the keywords provided to match the values with parameters.\
    \ You can also make keyword calls to the *printme()* function in the following\
