    , num\n```\n\n执行上述代码后，产生以下结果 –\n\n```\nPhone Num : 2004-959-559\nPhone Num : 2004959559\n\
    ```\n\n## 正则表达式修饰符：选项标志\n\n正则表达式字面量可以包含一个可选的修饰符来控制匹配的各个方面。修饰符被指定为一个可选的标志。你可以使用异或（|）提供多个修饰符，如前所述，并且可以由以下之一表示\
