    \ PyObject *args) {\n    int a;\n    int b;\n    if (!PyArg_ParseTuple(args, \"\
    ii\", &a, &b)) {\n        return NULL;\n    }\n    return Py_BuildValue(\"ii\"\
    , a + b, a - b);\n}\n```\n\n如果用 Python 实现，看起来会是这样——\n\n```python\ndef add_subtract(a,\
