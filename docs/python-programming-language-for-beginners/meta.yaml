    where as other languages use punctuation, and it has fewer syntactical constructions
    than other languages.


    +   - **Python is Interpreted** – Python is processed at runtime by the interpreter.
    You do not need to compile your program before executing it. This is similar to
    PERL and PHP.

    - **Python is Interactive** – You can actual y sit at a Python prompt and interact
    with the'
