    part2 = \"\"\"Content-Type: text/plain\nContent-Transfer-Encoding:8bit\n%s\n--%s\n\
    \"\"\" % (body,marker)\n\n# Define the attachment section\n\npart3 = \"\"\"Content-Type:\
    \ multipart/mixed; name=\"%s\"\nContent-Transfer-Encoding:base64\nContent-Disposition:\
    \ attachment; filename=%s\n\n%s\n\n--%s--\n\n\"\"\" %(filename, filename, encodedcontent,\
    \ marker)\n\nmessage = part1 + part2 + part3\n\ntry:\n    smtpObj = smtplib.SMTP('localhost')\n\
    \    smtpObj.sendmail(sender, reciever, message)\n    print \"Successfully sent\
    \ email\"\nexcept Exception:\n    print \"Error: unable to send email\"\n```\n\
    \n## Python - Multithreaded Programming\n\nRunning several threads is similar\
    \ to running several different programs concurrently, but with the following benefits\
    \ –\n\n- Multiple threads within a process share the same data space with the\
    \ main thread and can therefore share information or communicate with each other\
    \ more easily than if they were separate processes.\n- Threads sometimes called\
    \ light-weight processes and they do not require much memory overhead; they are\
    \ cheaper than processes.\n\nA thread has a beginning, an execution sequence,\
    \ and a conclusion. It has an instruction pointer that keeps track of where within\
    \ its context it is currently running.\n\n- It can be pre-empted (interrupted)\n\
    - It can temporarily be put on hold (also known as sleeping) while other threads\
    \ are running – this is called yielding.\n\n### Starting a New Thread\n\nTo spawn\
    \ another thread, you need to call following method available in *thread* module\
    \ –\n\n```\nthread.start_new_thread ( function, args[, kwargs] )\n```\n\nThis\
    \ method call enables a fast and efficient way to create new threads in both Linux\
    \ and Windows.\n\nThe method call returns immediately and the child thread starts\
    \ and calls function with the passed list of *args*. When function returns, the\
    \ thread terminates.\n\nHere, *args* is a tuple of arguments; use an empty tuple\
    \ to call function without passing any arguments. *kwargs* is an optional dictionary\
    \ of keyword arguments.\n\n### Example\n\n```\n#!/usr/bin/python\n\nimport thread\n\
    \nimport time\n```"
