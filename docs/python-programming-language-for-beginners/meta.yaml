    \ 将列表转换为元组。 |\n\n## Python - 字典\n\n每个键与其值用冒号 (`:`) 分隔，项用逗号分隔，整个内容用花括号括起来。一个没有任何项的空字典用两个花括号表示，像这样：`{}`。\n\
    \n键在字典中是唯一的，而值可能不是。字典的值可以是任何类型，但键必须是不可变的数据类型，如字符串、数字或元组。\n\n## 访问字典中的值\n\n要访问字典元素，你可以使用熟悉的方括号加上键来获取其值。以下是一个简单的示例\
