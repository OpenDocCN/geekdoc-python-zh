    \n```\n\nWe assume that you have Python interpreter set in PATH variable. Now,\
    \ try to run this program as follows –\n\n```\n$ python test.py\n```\n\nThis produces\
    \ the following result –\n\n```\nHello, Python!\n```\n\nLet us try another way\
    \ to execute a Python script. Here is the modified test.py file –\n\n[Live Demo](http://)\n\
    \n```\n#!/usr/bin/python\n\nprint \"Hello, Python!\"\n```\n\nWe assume that you\
    \ have Python interpreter available in /usr/bin directory. Now, try to run this\
    \ program as follows –\n\n```\n$ chmod +x test.py # This is to make file executable\n\
    \n$ ./test.py\n```\n\nThis produces the following result –\n\n```\nHello, Python!\n\
    ```\n\n## Python Identifiers\n\nA Python identifier is a name used to identify\
    \ a variable, function, class, module or other object.\n\nAn identifier starts\
    \ with a letter A to Z or a to z or an underscore (_) followed by zero or more\
    \ letters, underscores and digits (0 to 9).\n\nPython does not allow punctuation\
    \ characters such as @, $, and % within identifiers. Python is a case sensitive\
    \ programming language. Thus, **Manpower** and **manpower** are two different\
    \ identifiers in Python.\n\nHere are naming conventions for Python identifiers\
    \ –\n\n- Class names start with an uppercase letter. All other identifiers start\
    \ with a lowercase letter.\n- Starting an identifier with a single leading underscore\
    \ indicates that the identifier is private.\n- Starting an identifier with two\
    \ leading underscores indicates a strongly private identifier.\n- If the identifier\
    \ also ends with two trailing underscores, the identifier is a language-defined\
    \ special name.\n\n## Reserved Words\n\nThe following list shows the Python keywords.\
    \ These are reserved words and you cannot use them as constant or variable or\
    \ any other identifier names. All the Python keywords contain lowercase letters\
    \ only.\n\n- and\n- exec\n- not\n- assert\n- finally\n- or\n- break\n- for\n-\
    \ pass\n- class\n- from\n- print\n- continue\n- global\n- raise\n- def\n- if\n\
    - return\n- del\n- import\n- try\n- elif\n- in\n- while\n- else\n- is\n- with\n\
    - except\n- lambda\n- yield\n\n## Lines and Indentation\n\nPython provides no\
    \ braces to indicate blocks of code for class and function definitions or flow\
    \ control. Blocks of code are denoted by line indentation, which is rigidly enforced.\n\
    \nThe number of spaces in the indentation is variable, but all statements within\
    \ the block must be indented the same amount. For example –\n\n```\nif True:\n\
    \    print \"True\"\nelse:\n    print \"False\"\n```\n\nHowever, the following\
    \ block generates an error –\n\n```\nif True:\n    print \"Answer\"\n    print\
    \ \"True\"\nelse:\n    print \"Answer\"\n    print \"False\"\n```\n\nThus, in\
    \ Python all the continuous lines indented with same number of spaces would form\
    \ a block. The following example has various statement blocks –\n\n**Note** –\
    \ Do not try to understand the logic at this point of time. Just make sure you\
    \ understood various blocks even if they are without braces.\n\n```\n#!/usr/bin/python\n\
    import sys\ntry:\n    # open file stream\n    file = open(file_name, \"w\")\n\
    except IOError:\n    print \"There was an error writing to\", file_name\n    sys.exit()\n\
    print \"Enter \", file_finish,\nprint \" When finished\"\nwhile file_text != file_finish:\n\
    \    file_text = raw_input(\"Enter text: \")\n    if file_text == file_finish:\n\
    \        # close the file\n        file.close\n        break\n    file.write(file_text)\n\
    \    file.write(\"\\n\")\nfile.close()\nfile_name = raw_input(\"Enter filename:\
    \ \")\nif len(file_name) == 0:\n    print \"Next time please enter something\"\
    \n    sys.exit()\ntry:\n    file = open(file_name, \"r\")\nexcept IOError:\n \
    \   print \"There was an error reading file\"\n    sys.exit()\n\nfile_text = file.read()\n\
    file.close()\nprint file_text\n```\n\n## Multi-Line Statements\n\nStatements in\
    \ Python typically end with a new line. Python does, however, allow the use of\
    \ the line continuation character (\\) to denote that the line should continue.\
    \ For example –\n\n```\ntotal = item_one + \\\n    item_two + \\\n    item_three\n\
    ```\n\nStatements contained within the [], {}, or () brackets do not need to use\
    \ the line continuation character. For example –\n\n```\ndays = ['Monday', 'Tuesday',\
    \ 'Wednesday',\n        'Thursday', 'Friday']\n```\n\n## Quotation in Python\n\
    \nPython accepts single ('), double (\") and triple (''' or \"\"\") quotes to\
    \ denote string literals, as long as the same type of quote starts and ends the\
    \ string.\n\nThe triple quotes are used to span the string across multiple lines.\
    \ For example, all the following are legal –\n\n```\nword = 'word'\n\nsentence\
    \ = \"This is a sentence.\"\n\nparagraph = \"\"\"This is a paragraph. It is\n\n\
    made up of multiple lines and sentences.\"\"\"\n```\n\n## Comments in Python\n\
    \nA hash sign (#) that is not inside a string literal begins a comment. All characters\
    \ after the # and up to the end of the physical line are part of the comment and\
    \ the Python interpreter ignores them.\n\n[Live Demo](http://)\n\n```\n#!/usr/bin/python\n\
    \n# First comment\n\nprint \"Hello, Python!\" # second comment\n```\n\nThis produces\
    \ the following result –\n\nHello, Python!\n\nYou can type a comment on the same\
    \ line after a statement or expression –\n\n```\nname = \"Madisetti\" # This is\
    \ again comment\n```\n\nYou can comment multiple lines as follows –\n\n```\n#\
    \ This is a comment.\n\n# This is a comment, too.\n\n# This is a comment, too.\n\
    \n# I said that already.\n```\n\nFollowing triple-quoted string is also ignored\
    \ by Python interpreter and can be used as a multiline comments:\n\n```\n\"\"\"\
    \n\nThis is a multiline\n\ncomment.\n\n\"\"\"\n```\n\n## Using Blank Lines\n\n\
    A line containing only whitespace, possibly with a comment, is known as a blank\
    \ line and Python totally ignores it.\n\nIn an interactive interpreter session,\
    \ you must enter an empty physical line to terminate a multiline statement.\n\n\
    ## Waiting for the User\n\nThe following line of the program displays the prompt,\
    \ the statement saying “Press the enter key to exit”, and waits for the user to\
    \ take action –\n\n```\n#!/usr/bin/python\nraw_input(\"\\n\\nPress the enter key\
    \ to exit.\")\n```\n\nHere, \"\\n\\n\" is used to create two new lines before\
    \ displaying the actual line. Once the user presses the key, the program ends.\
    \ This is a nice trick to keep a console window open until the user is done with\
    \ an application.\n\n## Multiple Statements on a Single Line\n\nThe semicolon\
    \ ( ; ) allows multiple statements on the single line given that neither statement\
    \ starts a new code block. Here is a sample snip using the semicolon –\n\n```\n\
    import sys; x = 'foo'; sys.stdout.write(x + '\\n')\n```\n\n## Multiple Statement\
    \ Groups as Suites\n\nA group of individual statements, which make a single code\
    \ block are called **suites** in Python.\n\nCompound or complex statements, such\
    \ as if, while, def, and class require a header line and a suite.\n\nHeader lines\
    \ begin the statement (with the keyword) and terminate with a colon ( : ) and\
    \ are followed by one or more lines which make up the suite. For example –\n\n\
    ```\nif expression :\n    suite\nelif expression :\n```"
  mdcn: "## 第一个 Python 程序\n\n让我们以不同的编程模式来执行程序。\n\n## 交互模式编程\n\n不传递脚本文件作为参数来调用解释器，会显示以下提示符：\n\
    \n```\n$ python\nPython 2.4.3 (#1, Nov 11 2010, 13:34:43)\n[GCC 4.1.2 20080704\
    \ (Red Hat 4.1.2-48)] on linux2\nType \"help\", \"copyright\", \"credits\" or\
    \ \"license\" for more information.\n>>>\n```\n\n在 Python 提示符下输入以下文本并按回车键：\n\n\
    ```\n>>> print \"Hello, Python!\"\n```\n\n如果你运行的是新版本的 Python，那么你需要使用带括号的 print\
    \ 语句，例如 **print (\"Hello, Python!\");**。然而，在 Python 2.4.3 版本中，这会产生以下结果：\n\nHello,\
    \ Python!\n\n## 脚本模式编程\n\n使用脚本参数调用解释器会开始执行脚本，直到脚本结束。当脚本结束时，解释器不再处于活动状态。\n\n让我们在一个脚本中编写一个简单的\
    \ Python 程序。Python 文件的扩展名是 **.py**。在 test.py 文件中输入以下源代码：\n\n[在线演示](http://)\n\n\
    ```\nprint \"Hello, Python!\"\n```\n\n我们假设你已经将 Python 解释器设置在 PATH 变量中。现在，尝试按如下方式运行此程序：\n\
    \n```\n$ python test.py\n```\n\n这会产生以下结果：\n\n```\nHello, Python!\n```\n\n让我们尝试另一种执行\
    \ Python 脚本的方法。这是修改后的 test.py 文件：\n\n[在线演示](http://)\n\n```\n#!/usr/bin/python\n\
    \nprint \"Hello, Python!\"\n```\n\n我们假设你可以在 /usr/bin 目录中找到 Python 解释器。现在，尝试按如下方式运行此程序：\n\
    \n```\n$ chmod +x test.py # 这是为了使文件可执行\n\n$ ./test.py\n```\n\n这会产生以下结果：\n\n```\n\
    Hello, Python!\n```\n\n## Python 标识符\n\nPython 标识符是用于标识变量、函数、类、模块或其他对象的名称。\n\n\
    标识符以字母 A 到 Z 或 a 到 z 或下划线 (_) 开头，后跟零个或多个字母、下划线和数字 (0 到 9)。\n\nPython 不允许在标识符中使用标点字符，如\
    \ @、$ 和 %。Python 是一种区分大小写的编程语言。因此，**Manpower** 和 **manpower** 在 Python 中是两个不同的标识符。\n\
    \n以下是 Python 标识符的命名约定：\n\n- 类名以大写字母开头。所有其他标识符以小写字母开头。\n- 以单个前导下划线开头的标识符表示该标识符是私有的。\n\
    - 以两个前导下划线开头的标识符表示一个强私有标识符。\n- 如果标识符还以两个尾随下划线结尾，则该标识符是语言定义的特殊名称。\n\n## 保留字\n\n\
    以下列表显示了 Python 关键字。这些是保留字，你不能将它们用作常量、变量或任何其他标识符名称。所有 Python 关键字仅包含小写字母。\n\n- and\n\
    - exec\n- not\n- assert\n- finally\n- or\n- break\n- for\n- pass\n- class\n- from\n\
    - print\n- continue\n- global\n- raise\n- def\n- if\n- return\n- del\n- import\n\
    - try\n- elif\n- in\n- while\n- else\n- is\n- with\n- except\n- lambda\n- yield\n\
    \n## 行和缩进\n\nPython 不提供花括号来指示类和函数定义或流程控制的代码块。代码块由行缩进表示，这是严格强制执行的。\n\n缩进中的空格数量是可变的，但块内的所有语句必须缩进相同的量。例如：\n\
    \n```\nif True:\n    print \"True\"\nelse:\n    print \"False\"\n```\n\n然而，以下代码块会产生错误：\n\
    \n```\nif True:\n    print \"Answer\"\n    print \"True\"\nelse:\n    print \"\
    Answer\"\n    print \"False\"\n```\n\n因此，在 Python 中，所有缩进相同空格数的连续行将形成一个块。以下示例包含各种语句块：\n\
    \n**注意** – 此时不要试图理解逻辑。只需确保你理解了各种块，即使它们没有花括号。\n\n```\n#!/usr/bin/python\nimport\
    \ sys\ntry:\n    # 打开文件流\n    file = open(file_name, \"w\")\nexcept IOError:\n\
    \    print \"写入文件时出错：\", file_name\n    sys.exit()\nprint \"输入 \", file_finish,\n\
    print \" 表示完成\"\nwhile file_text != file_finish:\n    file_text = raw_input(\"\
    输入文本：\")\n    if file_text == file_finish:\n        # 关闭文件\n        file.close\n\
    \        break\n    file.write(file_text)\n    file.write(\"\\n\")\nfile.close()\n\
    file_name = raw_input(\"输入文件名：\")\nif len(file_name) == 0:\n    print \"下次请输入内容\"\
    \n    sys.exit()\ntry:\n    file = open(file_name, \"r\")\nexcept IOError:\n \
    \   print \"读取文件时出错\"\n    sys.exit()\n\nfile_text = file.read()\nfile.close()\n\
    print file_text\n```\n\n## 多行语句\n\nPython 中的语句通常以新行结束。然而，Python 允许使用行继续字符 (\\\
    ) 来表示该行应该继续。例如：\n\n```\ntotal = item_one + \\\n    item_two + \\\n    item_three\n\
    ```\n\n包含在 [], {}, 或 () 括号中的语句不需要使用行继续字符。例如：\n\n```\ndays = ['Monday', 'Tuesday',\
    \ 'Wednesday',\n        'Thursday', 'Friday']\n```\n\n## Python 中的引号\n\nPython\
    \ 接受单引号 (')、双引号 (\") 和三引号 (''' 或 \"\"\") 来表示字符串字面量，只要相同类型的引号开始和结束字符串即可。\n\n三引号用于将字符串跨多行。例如，以下所有都是合法的：\n\
    \n```\nword = 'word'\n\nsentence = \"This is a sentence.\"\n\nparagraph = \"\"\
    \"This is a paragraph. It is\n\nmade up of multiple lines and sentences.\"\"\"\
    \n```\n\n## Python 中的注释\n\n不在字符串字面量内的井号 (#) 开始一个注释。从 # 之后到物理行末尾的所有字符都是注释的一部分，Python\
    \ 解释器会忽略它们。\n\n[在线演示](http://)\n\n```\n#!/usr/bin/python\n\n# 第一个注释\n\nprint \"\
    Hello, Python!\" # 第二个注释\n```\n\n这会产生以下结果：\n\nHello, Python!\n\n你可以在语句或表达式之后的同一行输入注释：\n\
    \n```\nname = \"Madisetti\" # 这也是一个注释\n```\n\n你可以按如下方式注释多行：\n\n```\n# 这是一个注释。\n\
    \n# 这也是一个注释。\n\n# 这也是一个注释。\n\n# 我已经说过了。\n```\n\n以下三引号字符串也会被 Python 解释器忽略，可以用作多行注释：\n\
    \n```\n\"\"\"\n\n这是一个多行\n\n注释。\n\n\"\"\"\n```\n\n## 使用空行\n\n仅包含空白字符（可能带有注释）的行称为空行，Python\
    \ 完全忽略它。\n\n在交互式解释器会话中，你必须输入一个空的物理行来终止多行语句。\n\n## 等待用户\n\n程序的以下行显示提示符，即语句“按回车键退出”，并等待用户采取行动：\n\
    \n```\n#!/usr/bin/python\nraw_input(\"\\n\\nPress the enter key to exit.\")\n\
    ```\n\n这里，\"\\n\\n\" 用于在显示实际行之前创建两个新行。一旦用户按下该键，程序就会结束。这是一个很好的技巧，可以在用户完成应用程序之前保持控制台窗口打开。\n\
    \n## 单行上的多条语句\n\n分号 ( ; ) 允许在单行上放置多条语句，前提是这些语句都不开始新的代码块。以下是使用分号的示例片段：\n\n```\n\
    import sys; x = 'foo'; sys.stdout.write(x + '\\n')\n```\n\n## 作为套件的多条语句组\n\n在\
    \ Python 中，构成单个代码块的一组单独语句称为 **套件**。\n\n复合或复杂语句，如 if、while、def 和 class 需要一个标题行和一个套件。\n\
    \n标题行开始语句（带有关键字）并以冒号 ( : ) 结束，后跟一个或多个构成套件的行。例如：\n\n```\nif expression :\n    suite\n\
    elif expression :\n```"
