    \n```python\n#!/usr/bin/python\nprint 'abc', -4.24e93, 18+6.6j, 'xyz'\nx, y =\
    \ 1, 2\nprint \"Value of x , y : \", x,y\n```\n\nWhen the above code is executed,\
    \ it produces the following result –\n\n```\nabc -4.24e+93 (18+6.6j) xyz\nValue\
    \ of x , y : 1 2\n```\n\n## Built-in Tuple Functions\n\nPython includes the following\
    \ tuple functions –\n\n| Sr.No. | Function with Description |\n| :--- | :--- |\n\
    | 1 | [cmp(tuple1, tuple2)](http://google.com) Compares elements of both tuples.\
    \ |\n| 2 | [len(tuple)](http://google.com) Gives the total length of the tuple.\
    \ |\n| 3 | [max(tuple)](http://google.com) Returns item from the tuple with max\
    \ value. |\n| 4 | [min(tuple)](http://google.com) Returns item from the tuple\
    \ with min value. |\n| 5 | [tuple(seq)](https://www.tutorialspoint.com/python/tuple_seq.htm)\
    \ Converts a list into tuple. |\n\n## Python - Dictionary\n\nEach key is separated\
    \ from its value by a colon (:), the items are separated by commas, and the whole\
    \ thing is enclosed in curly braces. An empty dictionary without any items is\
    \ written with just two curly braces, like this: {}.\n\nKeys are unique within\
    \ a dictionary while values may not be. The values of a dictionary can be of any\
    \ type, but the keys must be of an immutable data type such as strings, numbers,\
    \ or tuples.\n\n## Accessing Values in Dictionary\n\nTo access dictionary elements,\
    \ you can use the familiar square brackets along with the key to obtain its value.\
    \ Following is a simple example –\n\n[Live Demo](https://www.tutorialspoint.com/execute_python3_online.php?filename=demo_dict)\n\
    \n```python\n#!/usr/bin/python\ndict = {'Name': 'Zara', 'Age': 7, 'Class': 'First'}\n\
    print \"dict['Name']: \", dict['Name']\nprint \"dict['Age']: \", dict['Age']\n\
    ```\n\nWhen the above code is executed, it produces the following result –\n\n\
    ```\ndict['Name']: Zara\ndict['Age']: 7\n```\n\nIf we attempt to access a data\
    \ item with a key, which is not part of the dictionary, we get an error as follows\
    \ –\n\n[Live Demo](http://www.tutorialspoint.com/python/python_dictionary_accessing.htm#)\n\
    \n```python\n#!/usr/bin/python\ndict = {'Name': 'Zara', 'Age': 7, 'Class': 'First'}\n\
    print \"dict['Alice']: \", dict['Alice']\n```\n\nWhen the above code is executed,\
    \ it produces the following result –\n\n```\ndict['Alice']:\nTraceback (most recent\
    \ call last):\n  File \"test.py\", line 4, in <module>\n    print \"dict['Alice']:\
    \ \", dict['Alice']\nKeyError: 'Alice'\n```\n\n## Updating Dictionary\n\nYou can\
    \ update a dictionary by adding a new entry or a key-value pair, modifying an\
    \ existing entry, or deleting an existing entry as shown below in the simple example\
    \ –\n\n[Live Demo](Live Demo)\n\n```python\n#!/usr/bin/python\ndict = {'Name':\
    \ 'Zara', 'Age': 7, 'Class': 'First'}\ndict['Age'] = 8; # update existing entry\n\
    dict['School'] = \"DPS School\"; # Add new entry\nprint \"dict['Age']: \", dict['Age']\n\
    print \"dict['School']: \", dict['School']\n```\n\nWhen the above code is executed,\
    \ it produces the following result –\n\n```\ndict['Age']: 8\ndict['School']: DPS\
    \ School\n```\n\n## Delete Dictionary Elements\n\nYou can either remove individual\
    \ dictionary elements or clear the entire contents of a dictionary.\n\nYou can\
    \ also delete entire dictionary in a single operation.\n\nTo explicitly remove\
    \ an entire dictionary, just use the **del** statement. Following is a simple\
    \ example –\n\n[Live Demo](Live Demo)\n\n```python\n#!/usr/bin/python\ndict =\
    \ {'Name': 'Zara', 'Age': 7, 'Class': 'First'}\ndel dict['Name']; # remove entry\
    \ with key 'Name'\ndict.clear(); # remove all entries in dict\ndel dict ; # delete\
    \ entire dictionary\nprint \"dict['Age']: \", dict['Age']\nprint \"dict['School']:\
    \ \", dict['School']\n```\n\nThis produces the following result. Note that an\
    \ exception is raised because after **del dict** dictionary does not exist any\
    \ more –\n\n```\ndict['Age']:\nTraceback (most recent call last):\n  File \"test.py\"\
    , line 8, in <module>\n    print \"dict['Age']: \", dict['Age']\nTypeError: 'type'\
    \ object is unsubscriptable\n```\n\n**Note** – del() method is discussed in subsequent\
    \ section.\n\n## Properties of Dictionary Keys\n\nDictionary values have no restrictions.\
    \ They can be any arbitrary Python object, either standard objects or user-defined\
    \ objects. However, same is not true for the keys.\n\nThere are two important\
    \ points to remember about dictionary keys –\n\n**(a)** More than one entry per\
    \ key not allowed. Which means no duplicate key is allowed. When duplicate keys\
    \ encountered during assignment, the last assignment wins. For example –\n\n[Live\
    \ Demo](http://)\n\n```python\n#!/usr/bin/python\ndict = {'Name': 'Zara', 'Age':\
    \ 7, 'Name': 'Manni'}\nprint \"dict['Name']: \", dict['Name']\n```\n\nWhen the\
    \ above code is executed, it produces the following result –\ndict['Name']: Manni\n\
    \n**(b)** Keys must be immutable. Which means you can use strings, numbers or\
    \ tuples as dictionary keys but something like ['key'] is not allowed. Following\
    \ is a simple example –\n\n[Live Demo](Live Demo)\n\n```python\n#!/usr/bin/python\n\
    dict = {['Name']: 'Zara', 'Age': 7}\nprint \"dict['Name']: \", dict['Name']\n\
    ```\n\nWhen the above code is executed, it produces the following result –\nTraceback\
    \ (most recent call last):\n  File \"test.py\", line 3, in <module>\n    dict\
    \ = {['Name']: 'Zara', 'Age': 7}\nTypeError: unhashable type: 'list'\n\n## Built-in\
    \ Dictionary Functions & Methods\n\nPython includes the following dictionary functions\
    \ –\n\n| Sr.No. | Function with Description |\n| :--- | :--- |\n| 1 | [cmp(dict1,\
    \ dict2)](cmp(dict1, dict2)) Compares elements of both dict. |\n| 2 | [len(dict)](len(dict))\
    \ Gives the total length of the dictionary. This would be equal to the number\
    \ of items in the dictionary. |\n| 3 | [str(dict)](str(dict)) Produces a printable\
    \ string representation of a dictionary |\n| 4 | [type(variable)](type(variable))\
    \ Returns the type of the passed variable. If passed variable is dictionary, then\
    \ it would return a dictionary type. |\n\nPython includes following dictionary\
    \ methods –\n\n| Sr.No. | Methods with Description |\n| :--- | :--- |\n| 1 | [dict.clear()](dict.clear())\
    \ Removes all elements of dictionary *dict* |\n| 2 | `dict.copy()` Returns a shallow\
    \ copy of dictionary *dict* |\n| 3 | `dict.fromkeys()` Create a new dictionary\
    \ with keys from seq and values set to *value*. |\n| 4 | `dict.get(key, default=None)`\
    \ For *key* key, returns value or default if key not in dictionary |\n| 5 | `dict.has_key(key)`\
    \ Returns *true* if key in dictionary *dict*, *false* otherwise |\n| 6 | `dict.items()`\
    \ Returns a list of *dict*'s (key, value) tuple pairs |\n| 7 | `dict.keys()` Returns\
    \ list of dictionary dict's keys |\n```"
