    # Assertions in Python


    An assertion is a sanity-check that you can turn on or turn off when you are done
    with your testing of the program.


    The easiest way to think of an assertion is to liken it to a **raise-if** statement
    (or to be more


    accurate, a raise-if-not statement). An expression is tested, and if the result
    comes up false, an exception is raised.


    127


    Assertions are carried out by the assert statement, the newest keyword to Python,
    introduced in version 1.5.


    Programmers often place assertions at the start of a function to check for valid
    input, and after a


    function cal to check for valid output.


    # The **assert** Statement


    When it encounters an assert statement, Python evaluates the accompanying expression,
    which is hopefully true. If the expression is false, Python raises an *AssertionError*
    exception.


    The **syntax** for assert is –


    ```

    assert Expression[, Arguments]

    ```'
