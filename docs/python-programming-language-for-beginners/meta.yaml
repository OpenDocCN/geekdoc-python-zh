    Python provides basic functions and methods necessary to manipulate files by default.
    You can do most of the file manipulation using a **file** object.


    The *open* Function


    Before you can read or write a file, you have to open it using Python''s built-in
    *open()* function.


    This function creates a **file** object, which would be utilized to call other
    support methods associated with it.


    # Syntax


    ```

    file object = open(file_name [, access_mode][, buffering])

    ```


    Here are parameter details –


    113


    +   - **file_name** – The file_name argument is a string value that contains the
    name of the file that you want to access.


    +   - **access_mode** – The access_mode determines the mode in which the file
    has to be opened, i.e., read, write, append, etc. A complete list of possible
    values is given below in the table. This is optional parameter and the default
    file access mode is read (r).


    +   - **buffering** – If the buffering value is set to 0, no buffering takes place.
    If the buffering value is 1, line buffering is performed while accessing a file.
    If you specify the buffering value'
- md: 'as an integer greater than 1, then buffering action is performed with the indicated
    buffer size. If negative, the buffer size is the system default (default behavior).


    Here is a list of the different modes of opening a file:


    | Sr.No. | Modes & Description |

    | :--- | :--- |

    | 1 | **r**<br>Opens a file for reading only. The file pointer is placed at the
    beginning of the file. This is the default mode. |

    | 2 | **rb**<br>Opens a file for reading only in binary format. The file pointer
    is placed at the beginning of the file. This is the default mode. |

    | 3 | **r+**<br>Opens a file for both reading and writing. The file pointer placed
    at the beginning of the file. |

    | 4 | **rb+**<br>Opens a file for both reading and writing in binary format. The
    file pointer placed at the beginning of the file. |

    | 5 | **w**<br>Opens a file for writing only. Overwrites the file if the file
    exists. If the file does not exist, creates a new file for writing. |

    | 6 | **wb**<br>Opens a file for writing only in binary format. Overwrites the
    file if the file exists. If the file does not exist, creates a new file for writing.
    |

    | 7 | **w+**<br>Opens a file for both writing and reading. Overwrites the existing
    file if the file exists. If the file does not exist, creates a new file for reading
    and writing. |

    | 8 | **wb+**<br>Opens a file for both writing and reading in binary format. Overwrites
    the existing file if the file exists. If the file does not exist, creates a new
    file for reading and writing. |

    | 9 | **a**<br>Opens a file for appending. The file pointer is at the end of the
    file if the file exists. That is, the file is in the append mode. If the file
    does not exist, it creates a new file for writing. |

    | 10 | **ab**<br>Opens a file for appending in binary format. The file pointer
    is at the end of the file if the file exists. That is, the file is in the append
    mode. If the file does not exist, it creates a new file for writing. |

    | 11 | **a+**<br>Opens a file for both appending and reading. The file pointer
    is at the end of the file if the file exists. The file opens in the append mode.
    If the file does not exist, it creates a new file for reading and writing. |

    | 12 | **ab+**<br>Opens a file for both appending and reading in binary format.
    The file pointer is at the end of the file if the file exists. The file opens
    in the append mode. If the file does not exist, it creates a new file for reading
    and writing. |


    ## The *file* Object Attributes


    Once a file is opened and you have one *file* object, you can get various information
    related to that file.


    Here is a list of all attributes related to file object:


    | Sr.No. | Attribute & Description |

    | :--- | :--- |

    | 1 | **file.closed**<br>Returns true if file is closed, false otherwise. |

    | 2 | **file.mode**<br>Returns access mode with which file was opened. |

    | 3 | **file.name**<br>Returns name of the file. |

    | 4 | **file.softspace**<br>Returns false if space explicitly required with print,
    true otherwise. |


    ## Example


    [Live Demo](http://)


    ```python

    #!/usr/bin/python


    # Open a file


    fo = open("foo.txt", "wb")


    print "Name of the file: ", fo.name


    print "Closed or not : ", fo.closed


    print "Opening mode : ", fo.mode


    print "Softspace flag : ", fo.softspace

    ```


    This produces the following result:


    ```

    Name of the file: foo.txt


    Closed or not : False


    Opening mode : wb


    Softspace flag : 0

    ```


    ## The *close()* Method


    The close() method of a *file* object flushes any unwritten information and closes
    the file object, after which no more writing can be done.


    Python automatically closes a file when the reference object of a file is reassigned
    to another file. It is a good practice to use the close() method to close a file.


    ## Syntax


    ```python

    fileObject.close()

    ```


    ## Example


    [Live Demo](http://)


    ```python

    #!/usr/bin/python


    # Open a file

    fo = open("foo.txt", "wb")


    print "Name of the file: ", fo.name


    # Close opened file

    fo.close()

    ```


    This produces the following result:


    ```

    Name of the file: foo.txt

    ```


    ## Reading and Writing Files


    The *file* object provides a set of access methods to make our lives easier. We
    would see how to use *read()* and *write()* methods to read and write files.


    ## The *write()* Method


    The *write()* method writes any string to an open file. It is important to note
    that Python strings can have binary data and not just text.


    The write() method does not add a newline character (''\n'') to the end of the
    string.


    ## Syntax


    ```python

    fileObject.write(string)

    ```


    Here, passed parameter is the content to be written into the opened file.


    ## Example


    ```python

    #!/usr/bin/python


    # Open a file


    fo = open("foo.txt", "wb")


    fo.write( "Python is a great language.\nYeah its great!!\n")


    # Close opened file


    fo.close()

    ```


    The above method would create *foo.txt* file and would write given content in
    that file and finally it would close that file. If you would open this file, it
    would have following content.


    ```

    Python is a great language.


    Yeah its great!!

    ```


    ## The *read()* Method


    The *read()* method reads a string from an open file. It is important to note
    that Python strings can have binary data, apart from text data.


    ## Syntax


    ```python

    fileObject.read([count])

    ```


    Here, passed parameter is the number of bytes to be read from the opened file.
    This method starts reading from the beginning of the file and if *count* is missing,
    then it tries to read as much as possible, maybe until the end of file.


    ## Example


    Let''s take a file *foo.txt*, which we created above.


    ```python

