    \ 2.4 provides much more powerful, high-level support for threads than the thread\
    \ module discussed in the previous section.\n\nThe *threading* module exposes\
    \ all the methods of the *thread* module and provides some additional methods\
    \ –\n\n- **threading.activeCount()** – Returns the number of thread objects that\
    \ are active.\n- **threading.currentThread()** – Returns the number of thread\
    \ objects in the caller's thread control.\n- **threading.enumerate()** – Returns\
    \ a list of all thread objects that are currently active.\n\nIn addition to the\
    \ methods, the threading module has the *Thread* class that implements threading.\
    \ The methods provided by the *Thread* class are as follows –\n\n- **run()** –\
    \ The run() method is the entry point for a thread.\n- **start()** – The start()\
    \ method starts a thread by calling the run method.\n- **join([time])** – The\
