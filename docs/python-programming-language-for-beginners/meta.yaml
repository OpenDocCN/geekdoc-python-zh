  md: 'In many situations, using cookies is the most efficient method of remembering
    and tracking preferences, purchases, commissions, and other information required
    for better visitor experience or site statistics.


    # How It Works?


    Your server sends some data to the visitor''s browser in the form of a cookie.
    The browser may accept the cookie. If it does, it is stored as a plain text record
    on the visitor''s hard drive. Now, when the visitor arrives at another page on
    your site, the cookie is available for retrieval. Once retrieved, your server
    knows/remembers what was stored.


    Cookies are a plain text data record of 5 variable-length fields –


    +   - **Expires** – The date the cookie wil expire. If this is blank, the cookie
    will expire when the visitor quits the browser.

    - **Domain** – The domain name of your site.

    - **Path** – The path to the directory or web page that sets the cookie. This
    may be blank if you want to retrieve the cookie from any directory or page.

    - **Secure** – If this field contains the word "secure", then the cookie may only
    be retrieved with a secure server. If this field is blank, no such restriction
    exists.

    - **Name=Value** – Cookies are set and retrieved in the form of key and value
    pairs.


    # Setting up Cookies


    It is very easy to send cookies to browser. These cookies are sent along with
    HTTP Header before to Content-type field. Assuming you'
  merge: -1
  pgno: 259
- img_proc: true
  md: 'want to set UserID and Password as cookies. Setting the cookies is done as
    follows –


    ```

    #!/usr/bin/python


    print "Set-Cookie:UserID = XYZ;\r\n"


    print "Set-Cookie:Password = XYZ123;\r\n"


    print "Set-Cookie:Expires = Tuesday, 31-Dec-2007 23:12:40 GMT";\r\n"


    print "Set-Cookie:Domain = www.tutorialspoint.com;\r\n"


    print "Set-Cookie:Path = /perl;\n"


    184


    print "Content-type:text/html\r\n\r\n"


    ..........Rest of the HTML Content....

    ```


    From this example, you must have understood how to set cookies. We use **Set-Cookie**
    HTTP header to set cookies.


    It is optional to set cookies attributes like Expires, Domain, and Path. It is
    notable that cookies are set before sending magic line **"Content-type:text/html\r\n\r\n"**.


    # Retrieving Cookies


    It is very easy to retrieve al the set cookies. Cookies are stored in CGI environment
    variable HTTP_COOKIE and they will have following form –


    key1 = value1;key2 = value2;key3 = value3....'
