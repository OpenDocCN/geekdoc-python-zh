- md: '## Python - Environment Setup


    Python is available on a wide variety of platforms including Linux and Mac OS
    X. Let''s understand how to set up our Python environment.


    ## Local Environment Setup


    Open a terminal window and type "python" to find out if it is already installed
    and which version is installed.


    - Unix (Solaris, Linux, FreeBSD, AIX, HP/UX, SunOS, IRIX, etc.)

    - Win 9x/NT/2000

    - Macintosh (Intel, PPC, 68K)

    - OS/2

    - DOS (multiple versions)

    - PalmOS

    - Nokia mobile phones

    - Windows CE

    - Acorn/RISC OS

    - BeOS

    - Amiga

    - VMS/OpenVMS

    - QNX

    - VxWorks

    - Psion

    - Python has also been ported to the Java and .NET virtual machines


    ## Getting Python


    The most up-to-date and current source code, binaries, documentation, news, etc.,
    is available on the official website of Python [https://www.python.org/](https://www.python.org/)


    You can download Python documentation from [https://www.python.org/doc/](https://www.python.org/doc/).
    The documentation is available in HTML, PDF, and PostScript formats.


    ## Installing Python


    Python distribution is available for a wide variety of platforms. You need to
    download only the binary code applicable for your platform and install Python.


    If the binary code for your platform is not available, you need a C compiler to
    compile the source code manually. Compiling the source code offers more flexibility
    in terms of choice of features that you require in your installation.


    Here is a quick overview of installing Python on various platforms –


    ## Unix and Linux Installation


    Here are the simple steps to install Python on Unix/Linux machine.


    - Open a Web browser and go to [https://www.python.org/downloads/](https://www.python.org/downloads/).

    - Follow the link to download zipped source code available for Unix/Linux.

    - Download and extract files.

    - Editing the *Modules/Setup* file if you want to customize some options.

    - run ./configure script

    - make

    - make install


    This installs Python at standard location */usr/local/bin* and its libraries at
    /usr/local/lib/pythonXX where XX is the version of Python.


    ## Windows Installation


    Here are the steps to install Python on Windows machine.


    - Open a Web browser and go to [https://www.python.org/downloads/](https://www.python.org/downloads/).

    - Follow the link for the Windows installer *python-XYZ.msi* file where XYZ is
    the version you need to install.

    - To use this installer *python-XYZ.msi*, the Windows system must support Microsoft
    Installer 2.0. Save the installer file to your local machine and then run it to
    find out if your machine supports MSI.

    - Run the downloaded file. This brings up the Python install wizard, which is
    really easy to use. Just accept the default settings, wait until the install is
    finished, and you are done.


    ## Macintosh Installation


    Recent Macs come with Python installed, but it may be several years out of date.


    See [http://www.python.org/download/mac/](http://www.python.org/download/mac/)
    for instructions on getting the current version along with extra tools to support
    development on the Mac. For older Mac OS''s before Mac OS X 10.3 (released in
    2003), MacPython is available.


    Jack Jansen maintains it and you can have full access to the entire documentation
    at his website - [http://www.cwi.nl/~jack/macpython.html](http://www.cwi.nl/~jack/macpython.html).
    You can find complete installation details for Mac OS installation.


    ## Setting up PATH


    Programs and other executable files can be in many directories, so operating systems
    provide a search path that lists the directories that the OS searches for executables.


    The path is stored in an environment variable, which is a named string maintained
    by the operating system. This variable contains information available to the command
    shell and other programs.


    The **path** variable is named as PATH in Unix or Path in Windows (Unix is case
    sensitive; Windows is not).


    In Mac OS, the installer handles the path details. To invoke the Python interpreter
    from any particular directory, you must add the Python directory to your path.


    ## Setting path at Unix/Linux


    To add the Python directory to the path for a particular session in Unix –


    - **In the csh shell** – type setenv PATH "$PATH:/usr/local/bin/python" and press
    Enter.

    - **In the bash shell (Linux)** – type export PATH="$PATH:/usr/local/bin/python"
    and press Enter.

    - **In the sh or ksh shell** – type PATH="$PATH:/usr/local/bin/python" and press
    Enter.

    - **Note** – /usr/local/bin/python is the path of the Python directory


    ## Setting path at Windows


    To add the Python directory to the path for a particular session in Windows –


    **At the command prompt** – type path %path%;C:\Python and press Enter.


    **Note** – C:\Python is the path of the Python directory


    ## Python Environment Variables


    Here are important environment variables, which can be recognized by Python –


    | Sr.No. | Variable & Description |

    | :--- | :--- |

    | 1 | **PYTHONPATH**<br>It has a role similar to PATH. This variable tells the
    Python interpreter where to locate the module files imported into a program. It
    should include the Python source library directory and the directories containing
    Python source code. PYTHONPATH is sometimes preset by the Python installer. |

    | 2 | **PYTHONSTARTUP**<br>It contains the path of an initialization file containing
    Python source code. It is executed every time you start the interpreter. It is
    named as .pythonrc.py in Unix and it contains commands that load utilities or
    modify PYTHONPATH. |

    | 3 | **PYTHONCASEOK**<br>It is used in Windows to instruct Python to find the
    first case-insensitive match in an import statement. Set this variable to any
    value to activate it. |

    | 4 | **PYTHONHOME**<br>It is an alternative module search path. It is usually
    embedded in the PYTHONSTARTUP or PYTHONPATH directories to make switching module
    libraries easy. |


    ## Running Python


    There are three different ways to start Python –


    ## Interactive Interpreter


    You can start Python from Unix, DOS, or any other system that provides you a command-line
    interpreter or shell window.


    Enter **python** the command line.


    Start coding right away in the interactive interpreter.


    ```

    $python # Unix/Linux

    ```


    or


    ```

    python% # Unix/Linux

    ```


    or


    ```

    C:> python # Windows/DOS

    ```


    Here is the list of all the available command line options –


    | Sr.No. | Option & Description |

    | :--- | :--- |

    | 1 | **-d**<br>It provides debug output. |

    | 2 | **-O**<br>It generates optimized bytecode (resulting in .pyo files). |

    | 3 | **-S**<br>Do not run import site to look for Python paths on startup. |

    | 4 | **-v**<br>verbose output (detailed trace on import statements). |

    | 5 | **-X**<br>disable class-based built-in exceptions (just use strings); obsolete
    starting with version 1.6. |

    | 6 | **-c cmd**<br>run Python script sent in as cmd string |

    | 7 | **file**<br>run Python script from given file |


    ## Script from the Command-line


    A Python script can be executed at command line by invoking the interpreter on
    your application, as in the following –


    ```

    $python script.py # Unix/Linux

    ```


    or


    ```

    python% script.py # Unix/Linux

    ```


    or


    ```

    C: >python script.py # Windows/DOS

    ```


    **Note** – Be sure the file permission mode allows execution.


    ## Integrated Development Environment


    You can run Python from a Graphical User Interface (GUI) environment as well,
    if you have a GUI application on your system that supports Python.


    - **Unix** – IDLE is the very first Unix IDE for Python.

    - **Windows** – PythonWin is the first Windows interface for Python and is an
    IDE with a GUI.

    - **Macintosh** – The Macintosh version of Python along with the IDLE IDE is available
    from the main website, downloadable as either MacBinary or BinHex''d files.


    If you are not able to set up the environment properly, then you can take help
    from your system admin. Make sure the Python environment is properly set up and
    working perfectly fine.


    **Note** – All the examples given in subsequent chapters are executed with Python
    2.4.3 version available on CentOS flavor of Linux.


    We already have set up Python Programming environment online, so that you can
    execute all the available examples online at the same time when you are learning
    theory. Feel free to modify any example and execute it online.


    ## Python - Basic Syntax


    The Python language has many similarities to Perl, C, and Java. However, there
    are some definite differences between the languages.'
  mdcn: '## Python - 环境设置


    Python 可在包括 Linux 和 Mac OS X 在内的多种平台上使用。让我们了解如何设置 Python 环境。


    ## 本地环境设置


    打开一个终端窗口，输入 "python" 以查看是否已安装以及安装的版本。


    - Unix (Solaris, Linux, FreeBSD, AIX, HP/UX, SunOS, IRIX 等)

    - Win 9x/NT/2000

    - Macintosh (Intel, PPC, 68K)

    - OS/2

    - DOS (多个版本)

    - PalmOS

    - Nokia 移动电话

    - Windows CE

    - Acorn/RISC OS

    - BeOS

    - Amiga

    - VMS/OpenVMS

    - QNX

    - VxWorks

    - Psion

    - Python 也已被移植到 Java 和 .NET 虚拟机


    ## 获取 Python


    最新的源代码、二进制文件、文档、新闻等，可在 Python 官方网站 [https://www.python.org/](https://www.python.org/)
    获取。


    你可以从 [https://www.python.org/doc/](https://www.python.org/doc/) 下载 Python 文档。文档提供
    HTML、PDF 和 PostScript 格式。


    ## 安装 Python


    Python 发行版适用于多种平台。你只需下载适用于你平台的二进制代码并安装 Python。


    如果你的平台没有可用的二进制代码，则需要一个 C 编译器来手动编译源代码。编译源代码在选择安装所需功能方面提供了更大的灵活性。


    以下是安装 Python 到各种平台的快速概览 –


    ## Unix 和 Linux 安装


    以下是在 Unix/Linux 机器上安装 Python 的简单步骤。


    - 打开 Web 浏览器并访问 [https://www.python.org/downloads/](https://www.python.org/downloads/)。

    - 按照链接下载适用于 Unix/Linux 的压缩源代码。

    - 下载并解压文件。

    - 如果你想自定义某些选项，请编辑 *Modules/Setup* 文件。

    - 运行 ./configure 脚本

    - make

    - make install


    这会将 Python 安装在标准位置 */usr/local/bin*，其库安装在 /usr/local/lib/pythonXX，其中 XX 是 Python
    的版本号。


    ## Windows 安装


    以下是在 Windows 机器上安装 Python 的步骤。


    - 打开 Web 浏览器并访问 [https://www.python.org/downloads/](https://www.python.org/downloads/)。

    - 按照链接下载 Windows 安装程序 *python-XYZ.msi* 文件，其中 XYZ 是你需要安装的版本。

    - 要使用此安装程序 *python-XYZ.msi*，Windows 系统必须支持 Microsoft Installer 2.0。将安装程序文件保存到本地机器，然后运行它以查看你的机器是否支持
    MSI。

    - 运行下载的文件。这将启动 Python 安装向导，它非常易于使用。只需接受默认设置，等待安装完成，即可完成。


    ## Macintosh 安装


    较新的 Mac 通常预装了 Python，但版本可能已经过时多年。


    请参阅 [http://www.python.org/download/mac/](http://www.python.org/download/mac/)
    以获取有关获取当前版本以及支持 Mac 开发的额外工具的说明。对于 Mac OS X 10.3（2003 年发布）之前的旧版 Mac OS，可以使用 MacPython。


    Jack Jansen 维护着它，你可以在他的网站上访问完整的文档 - [http://www.cwi.nl/~jack/macpython.html](http://www.cwi.nl/~jack/macpython.html)。你可以找到
    Mac OS 安装的完整安装细节。


    ## 设置 PATH


    程序和其他可执行文件可能位于多个目录中，因此操作系统提供了一个搜索路径，列出了操作系统搜索可执行文件的目录。


    路径存储在一个环境变量中，这是一个由操作系统维护的命名字符串。此变量包含命令 shell 和其他程序可用的信息。


    **path** 变量在 Unix 中命名为 PATH，在 Windows 中命名为 Path（Unix 区分大小写；Windows 不区分）。


    在 Mac OS 中，安装程序会处理路径细节。要从任何特定目录调用 Python 解释器，必须将 Python 目录添加到你的路径中。


    ## 在 Unix/Linux 中设置路径


    要在 Unix 中为特定会话将 Python 目录添加到路径 –


    - **在 csh shell 中** – 输入 setenv PATH "$PATH:/usr/local/bin/python" 并按 Enter。

    - **在 bash shell (Linux) 中** – 输入 export PATH="$PATH:/usr/local/bin/python" 并按
    Enter。

    - **在 sh 或 ksh shell 中** – 输入 PATH="$PATH:/usr/local/bin/python" 并按 Enter。

    - **注意** – /usr/local/bin/python 是 Python 目录的路径


    ## 在 Windows 中设置路径


    要在 Windows 中为特定会话将 Python 目录添加到路径 –


    **在命令提示符下** – 输入 path %path%;C:\Python 并按 Enter。


    **注意** – C:\Python 是 Python 目录的路径


    ## Python 环境变量


    以下是 Python 可识别的重要环境变量 –


    | 序号 | 变量与描述 |

    | :--- | :--- |

    | 1 | **PYTHONPATH**<br>它的作用类似于 PATH。此变量告诉 Python 解释器在哪里查找导入到程序中的模块文件。它应包含 Python
    源库目录和包含 Python 源代码的目录。PYTHONPATH 有时由 Python 安装程序预设。 |

    | 2 | **PYTHONSTARTUP**<br>它包含一个初始化文件的路径，该文件包含 Python 源代码。每次启动解释器时都会执行它。在 Unix
    中命名为 .pythonrc.py，它包含加载实用程序或修改 PYTHONPATH 的命令。 |

    | 3 | **PYTHONCASEOK**<br>在 Windows 中使用，指示 Python 在 import 语句中查找第一个不区分大小写的匹配项。将此变量设置为任何值以激活它。
    |

    | 4 | **PYTHONHOME**<br>它是一个替代的模块搜索路径。通常嵌入在 PYTHONSTARTUP 或 PYTHONPATH 目录中，以便于切换模块库。
    |


    ## 运行 Python


    有三种不同的方式启动 Python –


    ## 交互式解释器


    你可以从 Unix、DOS 或任何其他提供命令行解释器或 shell 窗口的系统启动 Python。


    在命令行输入 **python**。


    在交互式解释器中立即开始编码。


    ```

    $python # Unix/Linux

    ```


    或


    ```

    python% # Unix/Linux

    ```


    或


    ```

    C:> python # Windows/DOS

    ```


    以下是所有可用命令行选项的列表 –


    | 序号 | 选项与描述 |

    | :--- | :--- |

    | 1 | **-d**<br>提供调试输出。 |

    | 2 | **-O**<br>生成优化的字节码（生成 .pyo 文件）。 |

    | 3 | **-S**<br>启动时不运行 import site 来查找 Python 路径。 |

    | 4 | **-v**<br>详细输出（对 import 语句进行详细跟踪）。 |

    | 5 | **-X**<br>禁用基于类的内置异常（仅使用字符串）；从 1.6 版本开始已过时。 |

    | 6 | **-c cmd**<br>运行作为 cmd 字符串传入的 Python 脚本 |

    | 7 | **file**<br>从给定文件运行 Python 脚本 |


    ## 从命令行运行脚本


    可以通过在你的应用程序上调用解释器来在命令行执行 Python 脚本，如下所示 –


    ```

    $python script.py # Unix/Linux

    ```


    或


    ```

    python% script.py # Unix/Linux

    ```


    或


    ```

    C: >python script.py # Windows/DOS

    ```


    **注意** – 确保文件权限模式允许执行。


    ## 集成开发环境


    如果你的系统上有支持 Python 的图形用户界面 (GUI) 应用程序，你也可以从 GUI 环境运行 Python。


    - **Unix** – IDLE 是第一个用于 Python 的 Unix IDE。

    - **Windows** – PythonWin 是第一个用于 Python 的 Windows 接口，是一个带有 GUI 的 IDE。

    - **Macintosh** – Python 的 Macintosh 版本以及 IDLE IDE 可从主网站获取，可下载为 MacBinary 或 BinHex''d
    文件。


    如果你无法正确设置环境，可以寻求系统管理员的帮助。确保 Python 环境已正确设置并完美运行。


    **注意** – 后续章节中给出的所有示例均使用 CentOS Linux 发行版上可用的 Python 2.4.3 版本执行。


    我们已经在线设置了 Python 编程环境，以便你在学习理论的同时可以在线执行所有可用的示例。随意修改任何示例并在线执行。


    ## Python - 基本语法


    Python 语言与 Perl、C 和 Java 有许多相似之处。然而，这些语言之间存在一些明确的差异。'
