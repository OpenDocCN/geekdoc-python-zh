    \n## 什么是 XML？\n\n可扩展标记语言（XML）是一种类似于 HTML 或 SGML 的标记语言。它由万维网联盟推荐，并作为开放标准提供。\n\n\
    XML 对于跟踪少量到中等量的数据非常有用，无需基于 SQL 的后端支持。\n\n## XML 解析器架构和 API\n\nPython 标准库提供了一组最小但实用的接口来处理\
    \ XML。\n\n处理 XML 数据最基本且广泛使用的两个 API 是 SAX 和 DOM 接口。\n\n- **简单 XML API (SAX)** –\
    \ 在这里，你为感兴趣的事件注册回调，然后让解析器继续处理文档。当你的文档很大或内存有限时，这很有用，因为它在从磁盘读取文件时进行解析，整个文件永远不会存储在内存中。\n\
    - **文档对象模型 (DOM) API** – 这是万维网联盟的一个推荐标准，它将整个文件读入内存并以分层（基于树）的形式存储，以表示 XML 文档的所有特征。\n\
    \n显然，在处理大文件时，SAX 无法像 DOM 那样快速处理信息。另一方面，仅使用 DOM 确实会消耗大量资源，尤其是在处理大量小文件时。\n\nSAX\
    \ 是只读的，而 DOM 允许修改 XML 文件。由于这两种不同的 API 实际上是互补的，因此没有理由不在大型项目中同时使用它们。\n\n对于我们的所有\
    \ XML 代码示例，让我们使用一个简单的 XML 文件 *movies.xml* 作为输入 –\n\n```xml\n<collection shelf=\"\
