    \ 转换为 None。 |\n| w# | char*+int | 可读写单段缓冲区转换为 C 地址和长度。 |\n| z | char* | 类似 s，也接受\
    \ None（将 C char* 设置为 NULL）。 |\n| z# | char*+int | 类似 s#，也接受 None（将 C char* 设置为\
