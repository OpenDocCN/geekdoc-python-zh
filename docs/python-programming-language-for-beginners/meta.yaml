    \n```python\n#!/usr/bin/python\n\n# Function definition is here\nsum = lambda\
    \ arg1, arg2: arg1 + arg2;\n\n# Now you can call sum as a function\nprint \"Value\
    \ of total : \", sum( 10, 20 )\nprint \"Value of total : \", sum( 20, 20 )\n```\n\
    \nWhen the above code is executed, it produces the following result –\n\n```\n\
