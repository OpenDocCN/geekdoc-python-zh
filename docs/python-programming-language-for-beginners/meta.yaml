    \    <stars>2</stars>\n    <description>Viewable boredom</description>\n</movie>\n\
    \n</collection>\n```\n\n## 使用 SAX API 解析 XML\n\nSAX 是一个用于事件驱动 XML 解析的标准接口。使用 SAX\
    \ 解析 XML 通常需要你通过继承 `xml.sax.ContentHandler` 来创建自己的 ContentHandler。\n\n你的 *ContentHandler*\
    \ 处理你特定风格 XML 的标签和属性。ContentHandler 对象提供方法来处理各种解析事件。其拥有的解析器在解析 XML 文件时调用 ContentHandler\
    \ 方法。\n\n方法 `startDocument` 和 `endDocument` 在 XML 文件的开始和结束时被调用。方法 `characters(text)`\
