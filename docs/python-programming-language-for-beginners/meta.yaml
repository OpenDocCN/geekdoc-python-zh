    # Python - Extension Programming with C


    Any code that you write using any compiled language like C, C++, or Java can be
    integrated or imported into another Python script. This code is considered as
    an "extension."


    A Python extension module is nothing more than a normal C library. On Unix machines,
    these libraries usual y end in **.so** (for shared object). On Windows machines,
    you typical y see **.dll** (for dynamical y linked library).


    # Pre-Requisites for Writing Extensions


    To start writing your extension, you are going to need the Python header files.


    +   - On Unix machines, this usual y requires instal ling a developer-specific
    package such as [python2.5-dev](https://www.google.com/search?q=python2.5-dev).

    - Windows users get these headers as part of the package when they use the binary
    Python installer.'
- md: "Additionaly, it is assumed that you have good knowledge of C or C++ to write\
    \ any Python Extension using C programming.\n\n## First look at a Python Extension\n\
    \nFor your first look at a Python extension module, you need to group your code\
    \ into four parts:\n\n- The header file *Python.h*.\n- The C functions you want\
    \ to expose as the interface from your module.\n- A table mapping the names of\
    \ your functions as Python developers see them to C functions inside the extension\
    \ module.\n- An initialization function.\n\n## The Header File *Python.h*\n\n\
    You need to include *Python.h* header file in your C source file, which gives\
    \ you access to the internal Python API used to hook your module into the interpreter.\n\
    \nMake sure to include Python.h before any other headers you might need. You need\
    \ to follow the includes with the functions you want to call from Python.\n\n\
    ## The C Functions\n\nThe signatures of the C implementation of your functions\
    \ always takes one of the following three forms:\n\n```c\nstatic PyObject *MyFunction(\
    \ PyObject *self, PyObject *args );\n```\n\n```c\nstatic PyObject *MyFunctionWithKeywords(PyObject\
    \ *self,\nPyObject *args,\nPyObject *kw);\n```\n\n```c\nstatic PyObject *MyFunctionWithNoArgs(\
    \ PyObject *self );\n```\n\nEach one of the preceding declarations returns a Python\
    \ object. There is no such thing as a *void* function in Python as there is in\
    \ C. If you do not want your functions to return a value, return the C equivalent\
    \ of Python's **None** value. The Python headers define a macro, Py_RETURN_NONE,\
    \ that does this for us.\n\nThe names of your C functions can be whatever you\
    \ like as they are never seen outside of the extension module. They are defined\
    \ as *static* functions.\n\nYour C functions usually are named by combining the\
    \ Python module and function names together, as shown here:\n\n```c\nstatic PyObject\
    \ * module_func(PyObject *self, PyObject *args) {\n/* Do your stuff here. */\n\
    Py_RETURN_NONE;\n}\n```\n\nThis is a Python function called *func* inside of the\
    \ module *module*. You will be putting pointers to your C functions into the method\
    \ table for the module that usually comes next in your source code.\n\n## The\
    \ Method Mapping Table\n\nThis method table is a simple array of PyMethodDef structures.\
    \ That structure looks something like this:\n\n```c\nstruct PyMethodDef {\n  \
    \  char *ml_name;\n    PyCFunction ml_meth;\n    int ml_flags;\n    char *ml_doc;\n\
    };\n```\n\nHere is the description of the members of this structure:\n\n- **ml_name**\
    \ – This is the name of the function as the Python interpreter presents when it\
    \ is used in Python programs.\n- **ml_meth** – This must be the address to a function\
    \ that has any one of the signatures described in the previous section.\n- **ml_flags**\
    \ – This tells the interpreter which of the three signatures ml_meth is using.\n\
    \    - This flag usually has a value of METH_VARARGS.\n    - This flag can be\
    \ bitwise OR'ed with METH_KEYWORDS if you want to allow keyword arguments into\
    \ your function.\n    - This can also have a value of METH_NOARGS that indicates\
    \ you do not want to accept any arguments.\n- **ml_doc** – This is the docstring\
    \ for the function, which could be NULL if you do not feel like writing one.\n\
    \nThis table needs to be terminated with a sentinel that consists of NULL and\
    \ 0 values for the appropriate members.\n\n## Example\n\nFor the above-defined\
    \ function, we have following method mapping table:\n\n```c\nstatic PyMethodDef\
    \ module_methods[] = {\n    { \"func\", (PyCFunction) module_func, METH_NOARGS,\
    \ NULL },\n    { NULL, NULL, 0, NULL }\n};\n```\n\n## The Initialization Function\n\
    \nThe last part of your extension module is the initialization function. This\
    \ function is called by the Python interpreter when the module is loaded. It is\
    \ required that the function be named **init*Module***, where *Module* is the\
    \ name of the module.\n\nThe initialization function needs to be exported from\
    \ the library you will be building. The Python headers define PyMODINIT_FUNC to\
    \ include the appropriate incantations for that to happen for the particular environment\
    \ in which we're compiling. All you have to do is use it when defining the function.\n\
    \nYour C initialization function generally has the following overall structure:\n\
    \n```c\nPyMODINIT_FUNC init Module() {\n\nPy_InitModule3( func, module_methods,\
    \ \"docstring...\");\n\n}\n```\n\nHere is the description of *Py_InitModule3*\
    \ function:\n\n- **func** – This is the function to be exported.\n- **module_methods**\
    \ – This is the mapping table name defined above.\n- **docstring** – This is the\
    \ comment you want to give in your extension.\n\nPutting this all together looks\
    \ like the following:\n\n```c\n#include <Python.h>\n\nstatic PyObject * module_func(PyObject\
    \ *self, PyObject *args) {\n\n/* Do your stuff here. */\n\nPy_RETURN_NONE;\n\n\
    }\n\nstatic PyMethodDef module_methods[] = {\n\n{ \"func\", (PyCFunction) module_func,\
    \ METH_NOARGS, NULL },\n\n{ NULL, NULL, 0, NULL }\n};\nPyMODINIT_FUNC init Module()\
    \ {\nPy_InitModule3( func, module_methods, \"docstring...\");\n}\n```\n\n## Example\n\
    \nA simple example that makes use of all the above concepts:\n\n```c\n#include\
    \ <Python.h>\nstatic PyObject* helloworld(PyObject* self) {\nreturn Py_BuildValue(\"\
    s\", \"Hello, Python extensions!!\");\n}\nstatic char helloworld_docs[] =\n\"\
    helloworld( ): Any message you want to put here!!\\n\";\nstatic PyMethodDef helloworld_funcs[]\
    \ = {\n{\"helloworld\", (PyCFunction)helloworld,\nMETH_NOARGS, helloworld_docs},\n\
    {NULL}\n};\nvoid inithelloworld(void) {\nPy_InitModule3(\"helloworld\", helloworld_funcs,\n\
    \"Extension module example!\");\n}\n```\n\nHere the *Py_BuildValue* function is\
    \ used to build a Python value. Save above code in hello.c file.\n\nWe would see\
    \ how to compile and install this module to be called from Python script.\n\n\
    ## Building and Installing Extensions\n\nThe *distutils* package makes it very\
    \ easy to distribute Python modules, both pure Python and extension modules, in\
    \ a standard way. Modules are distributed in source form and built and installed\
    \ via a setup script usually called *setup.py* as follows.\n\nFor the above module,\
    \ you need to prepare following setup.py script:\n\n```python\nfrom distutils.core\
    \ import setup, Extension\n\nsetup(name='helloworld', version='1.0', \\\next_modules=[Extension('helloworld',\
    \ ['hello.c'])])\n```\n\nNow, use the following command, which would perform all\
    \ needed compilation and linking steps, with the right compiler and linker commands\
    \ and flags, and copies the resulting dynamic library into an appropriate directory:\n\
    \n```\n$ python setup.py install\n```\n\nOn Unix-based systems, you'll most likely\
    \ need to run this command as root in order to have permissions to write to the\
    \ site-packages directory. This usually is not a problem on Windows.\n\n## Importing\
    \ Extensions\n\nOnce you installed your extension, you would be able to import\
    \ and call that extension in your Python script as follows:\n\n```python\n#!/usr/bin/python\n\
    \nimport helloworld\n\nprint helloworld.helloworld()\n```\n\nThis would produce\
    \ the following result:\n\nHello, Python extensions!!\n\n## Passing Function Parameters\n\
    \nAs you will most likely want to define functions that accept arguments, you\
    \ can use one of the other signatures for your C functions. For example, following\
    \ function, that accepts some number of parameters, would be defined like this:\n\
    \n```c\nstatic PyObject * module_func(PyObject *self, PyObject *args) {\n\n/*\
    \ Parse args and do something interesting here. */\n\nPy_RETURN_NONE;\n\n}\n```\n\
    \nThe method table containing an entry for the new function would look like this:\n\
    \n```c\nstatic PyMethodDef module_methods[] = {\n{ \"func\", (PyCFunction) module_func,\
    \ METH_NOARGS, NULL },\n{ \"func\", module_func, METH_VARARGS, NULL },\n{ NULL,\
    \ NULL, 0, NULL }\n};\n```\n\nYou can use API *PyArg_ParseTuple* function to extract\
    \ the arguments from the one PyObject pointer passed into your C function.\n\n\
    The first argument to PyArg_ParseTuple is the args argument. This is the object\
    \ you will be *parsing*. The second argument is a format string describing the\
    \ arguments as you expect them to appear. Each argument is represented by one\
    \ or more characters in the format string as follows.\n\n```c\nstatic PyObject\
    \ * module_func(PyObject *self, PyObject *args) {\n\nint i;\n\ndouble d;\n\nchar\
    \ *s;\n\nif (!PyArg_ParseTuple(args, \"ids\", &i, &d, &s)) {\n\nreturn NULL;\n\
    \n}\n\n/* Do something interesting here. */\n\nPy_RETURN_NONE;\n\n}\n```"
  mdcn: "此外，假设你具备良好的C或C++知识，能够使用C语言编写任何Python扩展。\n\n## 初识Python扩展\n\n要初步了解Python扩展模块，你需要将代码分为四个部分：\n\
    \n- 头文件 *Python.h*。\n- 你希望作为模块接口暴露的C函数。\n- 一个映射表，将Python开发者看到的函数名映射到扩展模块内部的C函数。\n\
    - 一个初始化函数。\n\n## 头文件 *Python.h*\n\n你需要在C源文件中包含 *Python.h* 头文件，它使你能够访问用于将模块挂接到解释器的内部Python\
    \ API。\n\n确保在包含任何其他可能需要的头文件之前包含Python.h。你需要在包含头文件之后，再包含你希望从Python调用的函数。\n\n##\
    \ C函数\n\n你的C函数实现的签名始终采用以下三种形式之一：\n\n```c\nstatic PyObject *MyFunction( PyObject\
    \ *self, PyObject *args );\n```\n\n```c\nstatic PyObject *MyFunctionWithKeywords(PyObject\
    \ *self,\nPyObject *args,\nPyObject *kw);\n```\n\n```c\nstatic PyObject *MyFunctionWithNoArgs(\
    \ PyObject *self );\n```\n\n上述每个声明都返回一个Python对象。Python中没有像C语言那样的 *void* 函数。如果你不希望函数返回值，请返回Python\
    \ **None** 值的C等价物。Python头文件定义了一个宏 `Py_RETURN_NONE`，可以为我们完成这个操作。\n\n你的C函数名称可以随意命名，因为它们在扩展模块外部是不可见的。它们被定义为\
    \ *static* 函数。\n\n你的C函数通常通过组合Python模块名和函数名来命名，如下所示：\n\n```c\nstatic PyObject *\
    \ module_func(PyObject *self, PyObject *args) {\n/* 在这里做你的事情。 */\nPy_RETURN_NONE;\n\
    }\n```\n\n这是一个在模块 *module* 中名为 *func* 的Python函数。你将把指向C函数的指针放入模块的方法表中，该表通常紧随其后出现在源代码中。\n\
    \n## 方法映射表\n\n这个方法表是一个简单的 `PyMethodDef` 结构体数组。该结构体大致如下：\n\n```c\nstruct PyMethodDef\
    \ {\n    char *ml_name;\n    PyCFunction ml_meth;\n    int ml_flags;\n    char\
    \ *ml_doc;\n};\n```\n\n以下是该结构体成员的描述：\n\n- **ml_name** – 这是函数在Python程序中使用时，Python解释器呈现的名称。\n\
    - **ml_meth** – 这必须是具有上一节描述的任何一种签名的函数的地址。\n- **ml_flags** – 这告诉解释器 `ml_meth` 使用的是三种签名中的哪一种。\n\
    \    - 此标志通常具有 `METH_VARARGS` 的值。\n    - 如果你希望允许关键字参数传入函数，此标志可以与 `METH_KEYWORDS`\
    \ 进行按位或运算。\n    - 此标志也可以具有 `METH_NOARGS` 的值，表示你不希望接受任何参数。\n- **ml_doc** – 这是函数的文档字符串，如果你不想编写，可以为NULL。\n\
    \n此表需要以一个哨兵值终止，该哨兵值由相应成员的NULL和0值组成。\n\n## 示例\n\n对于上面定义的函数，我们有以下方法映射表：\n\n```c\n\
    static PyMethodDef module_methods[] = {\n    { \"func\", (PyCFunction) module_func,\
    \ METH_NOARGS, NULL },\n    { NULL, NULL, 0, NULL }\n};\n```\n\n## 初始化函数\n\n扩展模块的最后一部分是初始化函数。当模块被加载时，Python解释器会调用此函数。要求该函数命名为\
    \ **init*Module***，其中 *Module* 是模块的名称。\n\n初始化函数需要从你将构建的库中导出。Python头文件定义了 `PyMODINIT_FUNC`，以包含在特定编译环境中实现此目的所需的适当声明。你只需在定义函数时使用它即可。\n\
    \n你的C初始化函数通常具有以下整体结构：\n\n```c\nPyMODINIT_FUNC init Module() {\n\nPy_InitModule3(\
    \ func, module_methods, \"docstring...\");\n\n}\n```\n\n以下是 *Py_InitModule3* 函数的描述：\n\
    \n- **func** – 这是要导出的函数。\n- **module_methods** – 这是上面定义的映射表名称。\n- **docstring**\
    \ – 这是你希望在扩展中给出的注释。\n\n将所有这些放在一起，如下所示：\n\n```c\n#include <Python.h>\n\nstatic\
    \ PyObject * module_func(PyObject *self, PyObject *args) {\n\n/* 在这里做你的事情。 */\n\
    \nPy_RETURN_NONE;\n\n}\n\nstatic PyMethodDef module_methods[] = {\n\n{ \"func\"\
    , (PyCFunction) module_func, METH_NOARGS, NULL },\n\n{ NULL, NULL, 0, NULL }\n\
    };\nPyMODINIT_FUNC init Module() {\nPy_InitModule3( func, module_methods, \"docstring...\"\
    );\n}\n```\n\n## 示例\n\n一个使用上述所有概念的简单示例：\n\n```c\n#include <Python.h>\nstatic PyObject*\
    \ helloworld(PyObject* self) {\nreturn Py_BuildValue(\"s\", \"Hello, Python extensions!!\"\
    );\n}\nstatic char helloworld_docs[] =\n\"helloworld( ): Any message you want\
    \ to put here!!\\n\";\nstatic PyMethodDef helloworld_funcs[] = {\n{\"helloworld\"\
    , (PyCFunction)helloworld,\nMETH_NOARGS, helloworld_docs},\n{NULL}\n};\nvoid inithelloworld(void)\
    \ {\nPy_InitModule3(\"helloworld\", helloworld_funcs,\n\"Extension module example!\"\
    );\n}\n```\n\n这里使用了 *Py_BuildValue* 函数来构建一个Python值。将上述代码保存在 `hello.c` 文件中。\n\n\
    我们将看到如何编译和安装此模块，以便从Python脚本中调用。\n\n## 构建和安装扩展\n\n*distribution* 包使得以标准方式分发Python模块（包括纯Python模块和扩展模块）变得非常容易。模块以源代码形式分发，并通过一个通常名为\
    \ *setup.py* 的安装脚本进行构建和安装，如下所示。\n\n对于上述模块，你需要准备以下 `setup.py` 脚本：\n\n```python\n\
    from distutils.core import setup, Extension\n\nsetup(name='helloworld', version='1.0',\
    \ \\\next_modules=[Extension('helloworld', ['hello.c'])])\n```\n\n现在，使用以下命令，它将执行所有需要的编译和链接步骤，使用正确的编译器和链接器命令及标志，并将生成的动态库复制到适当的目录：\n\
    \n```\n$ python setup.py install\n```\n\n在基于Unix的系统上，你很可能需要以root身份运行此命令，以便有权限写入\
    \ `site-packages` 目录。在Windows上通常没有这个问题。\n\n## 导入扩展\n\n一旦安装了扩展，你就可以在Python脚本中导入并调用该扩展，如下所示：\n\
    \n```python\n#!/usr/bin/python\n\nimport helloworld\n\nprint helloworld.helloworld()\n\
    ```\n\n这将产生以下结果：\n\nHello, Python extensions!!\n\n## 传递函数参数\n\n由于你很可能希望定义接受参数的函数，你可以使用C函数的其他签名之一。例如，以下接受一定数量参数的函数将这样定义：\n\
    \n```c\nstatic PyObject * module_func(PyObject *self, PyObject *args) {\n\n/*\
    \ 解析参数并在这里做一些有趣的事情。 */\n\nPy_RETURN_NONE;\n\n}\n```\n\n包含新函数条目的方法表将如下所示：\n\n```c\n\
    static PyMethodDef module_methods[] = {\n{ \"func\", (PyCFunction) module_func,\
    \ METH_NOARGS, NULL },\n{ \"func\", module_func, METH_VARARGS, NULL },\n{ NULL,\
    \ NULL, 0, NULL }\n};\n```\n\n你可以使用API `PyArg_ParseTuple` 函数从传递给C函数的PyObject指针中提取参数。\n\
    \n`PyArg_ParseTuple` 的第一个参数是 `args` 参数。这是你将要 *解析* 的对象。第二个参数是一个格式字符串，描述了你期望参数出现的方式。每个参数在格式字符串中由一个或多个字符表示，如下所示。\n\
    \n```c\nstatic PyObject * module_func(PyObject *self, PyObject *args) {\n\nint\
    \ i;\n\ndouble d;\n\nchar *s;\n\nif (!PyArg_ParseTuple(args, \"ids\", &i, &d,\
    \ &s)) {\n\nreturn NULL;\n\n}\n\n/* 在这里做一些有趣的事情。 */\n\nPy_RETURN_NONE;\n\n}\n\
    ```"
