- md: '# Command Line Arguments


    Many programs can be run to provide you with some basic information about how
    they should be run. Python enables you to do this with -h –


    ```

    $ python -h

    ```


    usage: python [option] ... [-c cmd | -m mod | file | -] [arg] ...


    Options and arguments (and corresponding environment variables):


    - -c cmd : program passed in as string (terminates option list)

    - -d : debug output from parser (also PYTHONDEBUG=x)

    - -E : ignore environment variables (such as PYTHONPATH)

    - -h : print this help message and exit


    [ etc. ]


    You can also program your script in such a way that it should accept various options.
    [Command Line Arguments](https://www.tutorialspoint.com/python/python_command_line_arguments.htm)
    is an advanced topic and should be studied a bit later once you have gone through
    rest of the Python concepts.


    # Python - Variable Types


    Variables are nothing but reserved memory locations to store values. This means
    that when you create a variable you reserve some space in memory.


    Based on the data type of a variable, the interpreter allocates memory and decides
    what can be stored in the reserved memory. Therefore, by assigning different data
    types to variables, you can store integers, decimals or characters in these variables.


    # Assigning Values to Variables


    Python variables do not need explicit declaration to reserve memory space. The
    declaration happens automatically when you assign a value to a variable. The equal
    sign (=) is used to assign values to variables.


    The operand to the left of the = operator is the name of the variable and the
    operand to the right of the = operator is the value stored in the variable. For
    example –


    [Live Demo](http://www.tutorialspoint.com/python/)


    ```

    #!/usr/bin/python


    counter = 100 # An integer assignment

    miles = 1000.0 # A floating point

    name = "John" # A string


    print counter

    print miles

    print name

    ```


    Here, 100, 1000.0 and "John" are the values assigned to *counter*, *miles*, and
    *name* variables, respectively. This produces the following result –


    100


    1000.0


    John


    # Multiple Assignment


    Python allows you to assign a single value to several variables simultaneously.
    For example –


    ```

    a = b = c = 1

    ```


    Here, an integer object is created with the value 1, and all three variables are
    assigned to the same memory location. You can also assign multiple objects to
    multiple variables. For example –


    ```

    a,b,c = 1,2,"john"

    ```


    Here, two integer objects with values 1 and 2 are assigned to variables a and
    b respectively, and one string object with the value "john" is assigned to the
    variable c.


    # Standard Data Types


    The data stored in memory can be of many types. For example, a person''s age is
    stored as a numeric value and his or her address is stored as alphanumeric characters.
    Python has various standard data types that are used to define the operations
    possible on them and the storage method for each of them.


    Python has five standard data types –


    - Numbers

    - String

    - List

    - Tuple

    - Dictionary


    # Python Numbers


    Number data types store numeric values. Number objects are created when you assign
    a value to them. For example –


    ```

    var1 = 1

    var2 = 10

    ```


    You can also delete the reference to a number object by using the del statement.
    The syntax of the del statement is –


    ```

    del var1[,var2[,var3[....,varN]]]

    ```


    You can delete a single object or multiple objects by using the del statement.
    For example –


    ```

    del var

    ```


    ```

    del var_a, var_b

    ```


    Python supports four different numerical types –


    - int (signed integers)

    - long (long integers, they can also be represented in octal and hexadecimal)

    - float (floating point real values)

    - complex (complex numbers)


    # Examples


    Here are some examples of numbers –


    | int | long | float | complex |

    | :--- | :--- | :--- | :--- |

    | 10 | 51924361L | 0.0 | 3.14j |

    | 100 | -0x19323L | 15.20 | 45.j |

    | -786 | 0122L | -21.9 | 9.322e-36j |

    | 080 | 0xDEFABCECBDAECBFBAEI | 32.3+e18 | .876j |

    | -0490 | 535633629843L | -90. | -.6545+0J |

    | -0x260 | -052318172735L | -32.54e100 | 3e+26J |

    | 0x69 | -4721885298529L | 70.2-E12 | 4.53e-7j |


    - Python allows you to use a lowercase l with long, but it is recommended that
    you use only an uppercase L to avoid confusion with the number 1. Python displays
    long integers with an uppercase L.

    - A complex number consists of an ordered pair of real floating-point numbers
    denoted by x + yj, where x and y are the real numbers and j is the imaginary unit.


    # Python Strings


    Strings in Python are identified as a contiguous set of characters represented
    in the quotation marks. Python allows for either pairs of single or double quotes.
    Subsets of strings can be taken using the slice operator ([ ] and [:] ) with indexes
    starting at 0 in the beginning of the string and working their way from -1 at
    the end.


    The plus (+) sign is the string concatenation operator and the asterisk (*) is
    the repetition operator. For example –


    [Live Demo](http://)


    ```

    #!/usr/bin/python


    str = ''Hello World!''


    print str # Prints complete string


    print str[0] # Prints first character of the string


    print str[2:5] # Prints characters starting from 3rd to 5th


    print str[2:] # Prints string starting from 3rd character


    print str * 2 # Prints string two times


    print str + "TEST" # Prints concatenated string

    ```


    This will produce the following result –


    Hello World!


    H


    llo


    llo World!


    Hello World!Hello World!


    Hello World!TEST


    # Python Lists


    Lists are the most versatile of Python''s compound data types. A list contains
    items separated by commas and enclosed within square brackets ([]). To some extent,
    lists are similar to arrays in C. One difference between them is that all the
    items belonging to a list can be of different data type.


    The values stored in a list can be accessed using the slice operator ([ ] and
    [:]) with indexes starting at 0 in the beginning of the list and working their
    way to end -1. The plus (+) sign is the list concatenation operator, and the asterisk
    (*) is the repetition operator. For example –


    ```

    #!/usr/bin/python


    list = [ ''abcd'', 786 , 2.23, ''john'', 70.2 ]


    tinylist = [123, ''john'']


    print list # Prints complete list


    print list[0] # Prints first element of the list


    print list[1:3] # Prints elements starting from 2nd till 3rd


    print list[2:] # Prints elements starting from 3rd element


    print tinylist * 2 # Prints list two times


    print list + tinylist # Prints concatenated lists

    ```


    This produces the following result –


    ```

    [''abcd'', 786, 2.23, ''john'', 70.2]


    abcd


    [786, 2.23]


    [2.23, ''john'', 70.2]


    [123, ''john'', 123, ''john'']


    [''abcd'', 786, 2.23, ''john'', 70.2, 123, ''john'']

    ```


    # Python Tuples


    A tuple is another sequence data type that is similar to the list. A tuple consists
    of a number of values separated by commas. Unlike lists, however, tuples are enclosed
    within parentheses.


    The main differences between lists and tuples are: Lists are enclosed in brackets
    ( [ ] ) and their elements and size can be changed, while tuples are enclosed
    in parentheses ( ( ) ) and cannot be updated. Tuples can be thought of as **read-only**
    lists. For example –


    [Live Demo](http://www.tutorialspoint.com/python/python_tuples.htm)


    ```

    #!/usr/bin/python


    tuple = ( ''abcd'', 786 , 2.23, ''john'', 70.2 )


    tinytuple = (123, ''john'')


    print tuple # Prints the complete tuple


    print tuple[0] # Prints first element of the tuple


    print tuple[1:3] # Prints elements of the tuple starting from 2nd till 3rd


    print tuple[2:] # Prints elements of the tuple starting from 3rd element


    print tinytuple * 2 # Prints the contents of the tuple twice


    print tuple + tinytuple # Prints concatenated tuples

    ```


    This produces the following result –


    ```

    (''abcd'', 786, 2.23, ''john'', 70.2)


    abcd


    (786, 2.23)


    (2.23, ''john'', 70.2)


    (123, ''john'', 123, ''john'')


    (''abcd'', 786, 2.23, ''john'', 70.2, 123, ''john'')

    ```


    The following code is invalid with tuple, because we attempted to update a tuple,
    which is not allowed. Similar case is possible with'
  mdcn: '# 命令行参数


    许多程序在运行时可以提供一些关于其运行方式的基本信息。Python 允许你通过 `-h` 选项来实现这一点：


    ```

    $ python -h

    ```


    用法：python [选项] ... [-c 命令 | -m 模块 | 文件 | -] [参数] ...


    选项和参数（以及对应的环境变量）：


    - -c 命令 : 将程序作为字符串传入（终止选项列表）

    - -d : 解析器的调试输出（也可使用 PYTHONDEBUG=x）

    - -E : 忽略环境变量（如 PYTHONPATH）

    - -h : 打印此帮助信息并退出


    [ 等等 ]


    你也可以编写脚本，使其能够接受各种选项。[命令行参数](https://www.tutorialspoint.com/python/python_command_line_arguments.htm)是一个高级主题，建议在学习完其他
    Python 概念后再进行研究。


    # Python - 变量类型


    变量不过是用于存储值的保留内存位置。这意味着当你创建一个变量时，就在内存中预留了一块空间。


    根据变量的数据类型，解释器会分配内存并决定在保留的内存中可以存储什么。因此，通过为变量分配不同的数据类型，你可以在这些变量中存储整数、小数或字符。


    # 给变量赋值


    Python 变量不需要显式声明来预留内存空间。当你给一个变量赋值时，声明会自动发生。等号（`=`）用于给变量赋值。


    `=` 运算符左边的操作数是变量的名称，右边的操作数是存储在变量中的值。例如：


    [在线演示](http://www.tutorialspoint.com/python/)


    ```

    #!/usr/bin/python


    counter = 100 # 整数赋值

    miles = 1000.0 # 浮点数赋值

    name = "John" # 字符串赋值


    print counter

    print miles

    print name

    ```


    这里，100、1000.0 和 "John" 分别被赋值给 *counter*、*miles* 和 *name* 变量。这将产生以下结果：


    100


    1000.0


    John


    # 多重赋值


    Python 允许你同时将一个值赋给多个变量。例如：


    ```

    a = b = c = 1

    ```


    这里，创建了一个值为 1 的整数对象，所有三个变量都被赋值到同一个内存位置。你也可以将多个对象赋给多个变量。例如：


    ```

    a,b,c = 1,2,"john"

    ```


    这里，两个值分别为 1 和 2 的整数对象被分别赋给变量 a 和 b，一个值为 "john" 的字符串对象被赋给变量 c。


    # 标准数据类型


    存储在内存中的数据可以是多种类型的。例如，一个人的年龄存储为数值，而他或她的地址存储为字母数字字符。Python 有多种标准数据类型，用于定义对它们可以进行的操作以及每种类型的存储方法。


    Python 有五种标准数据类型：


    - 数字

    - 字符串

    - 列表

    - 元组

    - 字典


    # Python 数字


    数字数据类型存储数值。当你给数字对象赋值时，它们就被创建了。例如：


    ```

    var1 = 1

    var2 = 10

    ```


    你也可以使用 `del` 语句删除对数字对象的引用。`del` 语句的语法是：


    ```

    del var1[,var2[,var3[....,varN]]]

    ```


    你可以使用 `del` 语句删除单个对象或多个对象。例如：


    ```

    del var

    ```


    ```

    del var_a, var_b

    ```


    Python 支持四种不同的数字类型：


    - int（有符号整数）

    - long（长整数，也可以用八进制和十六进制表示）

    - float（浮点实数）

    - complex（复数）


    # 示例


    以下是一些数字示例：


    | int | long | float | complex |

    | :--- | :--- | :--- | :--- |

    | 10 | 51924361L | 0.0 | 3.14j |

    | 100 | -0x19323L | 15.20 | 45.j |

    | -786 | 0122L | -21.9 | 9.322e-36j |

    | 080 | 0xDEFABCECBDAECBFBAEI | 32.3+e18 | .876j |

    | -0490 | 535633629843L | -90. | -.6545+0J |

    | -0x260 | -052318172735L | -32.54e100 | 3e+26J |

    | 0x69 | -4721885298529L | 70.2-E12 | 4.53e-7j |


    - Python 允许你对 long 类型使用小写 `l`，但建议只使用大写 `L`，以避免与数字 1 混淆。Python 显示长整数时使用大写 `L`。

    - 复数由一对有序的实浮点数表示，形式为 `x + yj`，其中 `x` 和 `y` 是实数，`j` 是虚数单位。


    # Python 字符串


    Python 中的字符串被识别为引号内表示的连续字符集。Python 允许使用单引号或双引号对。可以使用切片操作符（`[ ]` 和 `[:]`）获取字符串的子集，索引从字符串开头的
    0 开始，到末尾的 -1 结束。


    加号（`+`）是字符串连接运算符，星号（`*`）是重复运算符。例如：


    [在线演示](http://)


    ```

    #!/usr/bin/python


    str = ''Hello World!''


    print str # 打印完整字符串


    print str[0] # 打印字符串的第一个字符


    print str[2:5] # 打印从第3个到第5个字符


    print str[2:] # 打印从第3个字符开始的字符串


    print str * 2 # 打印字符串两次


    print str + "TEST" # 打印连接后的字符串

    ```


    这将产生以下结果：


    Hello World!


    H


    llo


    llo World!


    Hello World!Hello World!


    Hello World!TEST


    # Python 列表


    列表是 Python 复合数据类型中最通用的一种。列表包含用逗号分隔并用方括号（`[]`）括起来的项目。在某种程度上，列表类似于 C 语言中的数组。它们之间的一个区别是，属于列表的所有项目可以是不同的数据类型。


    存储在列表中的值可以使用切片操作符（`[ ]` 和 `[:]`）访问，索引从列表开头的 0 开始，到末尾的 -1 结束。加号（`+`）是列表连接运算符，星号（`*`）是重复运算符。例如：


    ```

    #!/usr/bin/python


    list = [ ''abcd'', 786 , 2.23, ''john'', 70.2 ]


    tinylist = [123, ''john'']


    print list # 打印完整列表


    print list[0] # 打印列表的第一个元素


    print list[1:3] # 打印从第2个到第3个元素


    print list[2:] # 打印从第3个元素开始的元素


    print tinylist * 2 # 打印列表两次


    print list + tinylist # 打印连接后的列表

    ```


    这将产生以下结果：


    ```

    [''abcd'', 786, 2.23, ''john'', 70.2]


    abcd


    [786, 2.23]


    [2.23, ''john'', 70.2]


    [123, ''john'', 123, ''john'']


    [''abcd'', 786, 2.23, ''john'', 70.2, 123, ''john'']

    ```


    # Python 元组


    元组是另一种类似于列表的序列数据类型。元组由用逗号分隔的多个值组成。然而，与列表不同，元组用圆括号括起来。


    列表和元组之间的主要区别是：列表用方括号（`[ ]`）括起来，其元素和大小可以更改，而元组用圆括号（`( )`）括起来，不能更新。元组可以被认为是**只读**的列表。例如：


    [在线演示](http://www.tutorialspoint.com/python/python_tuples.htm)


    ```

    #!/usr/bin/python


    tuple = ( ''abcd'', 786 , 2.23, ''john'', 70.2 )


    tinytuple = (123, ''john'')


    print tuple # 打印完整元组


    print tuple[0] # 打印元组的第一个元素


    print tuple[1:3] # 打印从第2个到第3个元素


    print tuple[2:] # 打印从第3个元素开始的元素


    print tinytuple * 2 # 打印元组内容两次


    print tuple + tinytuple # 打印连接后的元组

    ```


    这将产生以下结果：


    ```

    (''abcd'', 786, 2.23, ''john'', 70.2)


    abcd


    (786, 2.23)


    (2.23, ''john'', 70.2)


    (123, ''john'', 123, ''john'')


    (''abcd'', 786, 2.23, ''john'', 70.2, 123, ''john'')

    ```


