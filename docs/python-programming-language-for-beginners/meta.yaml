    \ parameter list and those in the global namespace.\n- Although it appears that\
    \ lambda's are a one-line version of a function, they are not equivalent to inline\
    \ statements in C or C++, whose purpose is by passing function stack allocation\
    \ during invocation for performance reasons.\n\n## Syntax\n\nThe syntax of *lambda*\
    \ functions contains only a single statement, which is as follows –\n\n```python\n\
    lambda [arg1 [,arg2,.....argn]]:expression\n```\n\nFollowing is the example to\
