    LAST_NAME, AGE, SEX, INCOME)\nVALUES ('Mac', 'Mohan', 20, 'M', 2000)\"\"\"\n\n\
    try:\n    # 执行SQL命令\n    cursor.execute(sql)\n\n    # 提交到数据库\n    db.commit()\n\
    except:\n    # 如果发生错误，则回滚\n    db.rollback()\n\n# 断开与服务器的连接\ndb.close()\n```\n\
    \n上述示例可以重写如下，以动态创建SQL查询 –\n\n```\n#!/usr/bin/python\n\nimport MySQLdb\n\n# 打开数据库连接\n\
    db = MySQLdb.connect(\"localhost\",\"testuser\",\"test123\",\"TESTDB\" )\n\n#\
    \ 使用cursor()方法准备一个游标对象\ncursor = db.cursor()\n\n# 准备SQL查询以将记录插入数据库。\nsql = \"\
