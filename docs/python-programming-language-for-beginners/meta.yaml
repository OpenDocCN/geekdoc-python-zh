    \ arguments\n\nYou may need to process a function for more arguments than you\
    \ specified while defining the function. These arguments are called *variable-length*\
    \ arguments and are not named in the function definition, unlike required and\
    \ default arguments.\n\nSyntax for a function with non-keyword variable arguments\
    \ is this –\n\n```python\ndef functionname([formal_args,] *var_args_tuple ):\n\
    \   \"function_docstring\"\n   function_suite\n   return [expression]\n```\n\n\
