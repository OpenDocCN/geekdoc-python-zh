    ## File Positions


    The *tell()* method tells you the current position within the file; in other words,
    the next read or write will occur at that many bytes from the beginning of the
    file.


    The *seek(offset[, from])* method changes the current file position. The *offset*
    argument indicates the number of bytes to be moved. The *from* argument specifies
    the reference position from where the bytes are to be moved.


    If *from* is set to 0, it means use the beginning of the file as the reference
    position and 1 means use the current position as the reference position and if
    it is set to 2 then the end of the file would be taken as the reference position.


    ## Example


    Let us take a file *foo.txt*, which we created above.


    ```python

    #!/usr/bin/python


    # Open a file


    fo = open("foo.txt", "r+")


    str = fo.read(10)


    print "Read String is : ", str


    # Check current position


    position = fo.tell()


    print "Current file position : ", position


    # Reposition pointer at the beginning once again


    position = fo.seek(0, 0);


    str = fo.read(10)


    print "Again read String is : ", str


    # Close opened file

    fo.close()

    ```


    This produces the following result:


    ```

    Read String is : Python is


    Current file position : 10


    Again read String is : Python is

    ```


    ## Renaming and Deleting Files


    Python **os** module provides methods that help you perform file-processing operations,
    such as renaming and deleting files.


    To use this module you need to import it first and then you can call any related
    functions.


    ## The rename() Method


    The *rename()* method takes two arguments, the current filename and the new filename.


    ## Syntax


    ```python

    os.rename(current_file_name, new_file_name)

    ```


    ## Example


    Following is the example to rename an existing file *test1.txt*:


    ```python

    #!/usr/bin/python


    import os


    # Rename a file from test1.txt to test2.txt

    os.rename( "test1.txt", "test2.txt" )

    ```


    ## The *remove()* Method


    You can use the *remove()* method to delete files by supplying the name of the
    file to be deleted as the argument.


    ## Syntax


    ```python

    os.remove(file_name)

    ```


    ## Example


    Following is the example to delete an existing file *test2.txt*:


    ```python

    #!/usr/bin/python


    import os


    # Delete file test2.txt


    os.remove("test2.txt")

    ```


    ## Directories in Python


    All files are contained within various directories, and Python has no problem
    handling these too.


    The **os** module has several methods that help you create, remove, and change
    directories.


    ## The *mkdir()* Method


    You can use the *mkdir()* method of the **os** module to create directories in
    the current directory.'
