    This would create second object of Employee class\"\n\n```\nemp2 = Employee(\"\
    Manni\", 5000)\n```\n\n## Accessing Attributes\n\nYou access the object's attributes\
    \ using the dot operator with object. Class variable would be accessed using class\
    \ name as follows –\n\n```\nemp1.displayEmployee()\nemp2.displayEmployee()\nprint\
    \ \"Total Employee %d\" % Employee.empCount\n```\n\nNow, putting all the concepts\
    \ together –\n\n[Live Demo](http://)\n\n```\n#!/usr/bin/python\n\nclass Employee:\n\
    \    'Common base class for all employees'\n    empCount = 0\n\n    def __init__(self,\
