    \nGET 方法是将信息从浏览器传递到 Web 服务器的默认方法，它会产生一个长字符串，显示在浏览器的 Location: 框中。如果你有密码或其他敏感信息要传递给服务器，切勿使用\
    \ GET 方法。GET 方法有大小限制：请求字符串中只能发送 1024 个字符。GET 方法使用 QUERY_STRING 头部发送信息，并且可以在你的\
    \ CGI 程序中通过 QUERY_STRING 环境变量访问。\n\n你可以通过简单地将键值对与任何 URL 连接来传递信息，或者你可以使用 HTML <FORM>\
