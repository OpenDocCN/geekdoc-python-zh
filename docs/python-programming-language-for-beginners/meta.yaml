- md: "Compiling the new version of your module and importing it enables you to invoke\
    \ the new function with any number of arguments of any type –\n\n```\nmodule.func(1,\
    \ s=\"three\", d=2.0)\n\nmodule.func(i=1, d=2.0, s=\"three\")\n\nmodule.func(s=\"\
    three\", d=2.0, i=1)\n```\n\nYou can probably come up with even more variations.\n\
    \n## The *PyArg_ParseTuple* Function\n\nHere is the standard signature for **PyArg_ParseTuple**\
    \ function –\n\n```\nint PyArg_ParseTuple(PyObject* tuple, char* format, ...)\n\
    ```\n\nThis function returns 0 for errors, and a value not equal to 0 for success.\
    \ `tuple` is the `PyObject*` that was the C function's second argument. Here `format`\
    \ is a C string that describes mandatory and optional arguments.\n\nHere is a\
    \ list of format codes for **PyArg_ParseTuple** function –\n\n| Code | C type\
    \ | Meaning |\n| :--- | :--- | :--- |\n| c | char | A Python string of length\
    \ 1 becomes a C char. |\n| d | double | A Python float becomes a C double. |\n\
    | f | float | A Python float becomes a C float. |\n| i | int | A Python int becomes\
    \ a C int. |\n| l | long | A Python int becomes a C long. |\n| L | long long |\
    \ A Python int becomes a C long long. |\n| O | PyObject* | Gets non-NULL borrowed\
    \ reference to Python argument. |\n| s | char* | Python string without embedded\
    \ nulls to C char*. |\n| s# | char*+int | Any Python string to C address and length.\
    \ |\n| t# | char*+int | Read-only single-segment buffer to C address and length.\
    \ |\n| u | Py_UNICODE* | Python Unicode without embedded nulls to C. |\n| u# |\
    \ Py_UNICODE*+int | Any Python Unicode C address and length. |\n| w# | char*+int\
    \ | Read/write single-segment buffer to C address and length. |\n| z | char* |\
    \ Like s, also accepts None (sets C char* to NULL). |\n| z# | char*+int | Like\
    \ s#, also accepts None (sets C char* to NULL). |\n| (...) | as per ... | A Python\
    \ sequence is treated as one argument per item. |\n| \\| | | The following arguments\
    \ are optional. |\n| : | | Format end, followed by function name for error messages.\
    \ |\n| ; | | Format end, followed by entire error message text. |\n\n## Returning\
    \ Values\n\n*Py_BuildValue* takes in a format string much like *PyArg_ParseTuple*\
    \ does. Instead of passing in the addresses of the values you are building, you\
    \ pass in the actual values. Here's an example showing how to implement an add\
    \ function –\n\n```c\nstatic PyObject *foo_add(PyObject *self, PyObject *args)\
    \ {\n    int a;\n    int b;\n    if (!PyArg_ParseTuple(args, \"ii\", &a, &b))\
    \ {\n        return NULL;\n    }\n    return Py_BuildValue(\"i\", a + b);\n}\n\
    ```\n\nThis is what it would look like if implemented in Python –\n\n```python\n\
    def add(a, b):\n    return (a + b)\n```\n\nYou can return two values from your\
    \ function as follows, this would be captured using a list in Python.\n\n```c\n\
    static PyObject *foo_add_subtract(PyObject *self, PyObject *args) {\n    int a;\n\
    \    int b;\n    if (!PyArg_ParseTuple(args, \"ii\", &a, &b)) {\n        return\
    \ NULL;\n    }\n    return Py_BuildValue(\"ii\", a + b, a - b);\n}\n```\n\nThis\
    \ is what it would look like if implemented in Python –\n\n```python\ndef add_subtract(a,\
    \ b):\n    return (a + b, a - b)\n```\n\n## The *Py_BuildValue* Function\n\nHere\
    \ is the standard signature for **Py_BuildValue** function –\n\n```\nPyObject*\
    \ Py_BuildValue(char* format, ...)\n```\n\nHere `format` is a C string that describes\
    \ the Python object to build. The following arguments of *Py_BuildValue* are C\
    \ values from which the result is built. The `PyObject*` result is a new reference.\n\
    \nFollowing table lists the commonly used code strings, of which zero or more\
    \ are joined into string format.\n\n| Code | C type | Meaning |\n| :--- | :---\
    \ | :--- |\n| c | char | A C char becomes a Python string of length 1. |\n| d\
    \ | double | A C double becomes a Python float. |\n| f | float | A C float becomes\
    \ a Python float. |\n| i | int | A C int becomes a Python integer. |\n| I | int\
    \ | A C int becomes a Python int. |\n| l | long | A C long becomes a Python int.\
    \ |\n| N | PyObject* | Passes a Python object and steals a reference. |\n| O |\
    \ PyObject* | Passes a Python object and INCREFs it as normal. |\n| O& | convert+void*\
    \ | Arbitrary conversion. |\n| s | char* | C 0-terminated char* to Python string,\
    \ or NULL to None. |\n| s# | char*+int | C char* and length to Python string,\
    \ or NULL to None. |\n| u | Py_UNICODE* | C-wide, nul-terminated string to Python\
    \ Unicode, or NULL to None. |\n| u# | Py_UNICODE*+int | C-wide string and length\
    \ to Python Unicode, or NULL to None. |\n| w# | char*+int | Read/write single-segment\
    \ buffer to C address and length. |\n| z | char* | Like s, also accepts None (sets\
    \ C char* to NULL). |\n| z# | char*+int | Like s#, also accepts None (sets C char*\
    \ to NULL). |\n| (...) | as per ... | Builds Python tuple from C values. |\n|\
    \ [...] | as per ... | Builds Python list from C values. |\n| {...} | as per ...\
    \ | Builds Python dictionary from C values, alternating keys and values. |\n\n\
    Code `{...}` builds dictionaries from an even number of C values, alternately\
    \ keys and values. For example, `Py_BuildValue(\"{issi}\", 23, \"zig\", \"zag\"\
    , 42)` returns a dictionary like Python's `{23: 'zig', 'zag': 42}`.\n\n## CONCLUSION\n\
    \nPython is a high-level, interpreted, interactive and object-oriented scripting\
    \ language. Python is designed to be highly readable. It uses English keywords\
    \ frequently where as other languages use punctuation, and it has fewer syntactical\
    \ constructions than other languages.\n\n- **Python is Interpreted** – Python\
    \ is processed at runtime by the interpreter. You do not need to compile your\
    \ program before executing it. This is similar to PERL and PHP.\n- **Python is\
    \ Interactive** – You can actually sit at a Python prompt and interact with the\
    \ interpreter directly to write your programs.\n- **Python is Object-Oriented**\
    \ – Python supports Object-Oriented style or technique of programming that encapsulates\
    \ code within objects.\n- **Python is a Beginner's Language** – Python is a great\
    \ language for the beginner-level programmers and supports the development of\
    \ a wide range of applications from simple text processing to WWW browsers to\
    \ games.\n\n## Document Outline\n\n- [TOC1](TOC1)"
