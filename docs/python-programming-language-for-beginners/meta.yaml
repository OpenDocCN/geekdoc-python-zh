    ## Using Cookies in CGI\n\nHTTP protocol is a stateless protocol. For a commercial\
    \ website, it is required to maintain session information among different pages.\
    \ For example, one user registration ends after completing many pages. How to\
    \ maintain user's session information across all the web pages?\n\nIn many situations,\
    \ using cookies is the most efficient method of remembering and tracking preferences,\
    \ purchases, commissions, and other information required for better visitor experience\
    \ or site statistics.\n\n## How It Works?\n\nYour server sends some data to the\
    \ visitor's browser in the form of a cookie. The browser may accept the cookie.\
    \ If it does, it is stored as a plain text record on the visitor's hard drive.\
    \ Now, when the visitor arrives at another page on your site, the cookie is available\
    \ for retrieval. Once retrieved, your server knows/remembers what was stored.\n\
    \nCookies are a plain text data record of 5 variable-length fields –\n\n- **Expires**\
    \ – The date the cookie will expire. If this is blank, the cookie will expire\
    \ when the visitor quits the browser.\n- **Domain** – The domain name of your\
    \ site.\n- **Path** – The path to the directory or web page that sets the cookie.\
    \ This may be blank if you want to retrieve the cookie from any directory or page.\n\
    - **Secure** – If this field contains the word \"secure\", then the cookie may\
    \ only be retrieved with a secure server. If this field is blank, no such restriction\
    \ exists.\n- **Name=Value** – Cookies are set and retrieved in the form of key\
    \ and value pairs.\n\n## Setting up Cookies\n\nIt is very easy to send cookies\
    \ to browser. These cookies are sent along with HTTP Header before to Content-type\
    \ field. Assuming you want to set UserID and Password as cookies. Setting the\
    \ cookies is done as follows –\n\n```python\n#!/usr/bin/python\n\nprint \"Set-Cookie:UserID\
    \ = XYZ;\\r\\n\"\nprint \"Set-Cookie:Password = XYZ123;\\r\\n\"\nprint \"Set-Cookie:Expires\
    \ = Tuesday, 31-Dec-2007 23:12:40 GMT;\\r\\n\"\nprint \"Set-Cookie:Domain = www.tutorialspoint.com;\\\
    r\\n\"\nprint \"Set-Cookie:Path = /perl;\\n\"\nprint \"Content-type:text/html\\\
    r\\n\\r\\n\"\n\n..........Rest of the HTML Content....\n```\n\nFrom this example,\
    \ you must have understood how to set cookies. We use **Set-Cookie** HTTP header\
    \ to set cookies.\n\nIt is optional to set cookies attributes like Expires, Domain,\
    \ and Path. It is notable that cookies are set before sending magic line **\"\
    Content-type:text/html\\r\\n\\r\\n\"**.\n\n## Retrieving Cookies\n\nIt is very\
    \ easy to retrieve all the set cookies. Cookies are stored in CGI environment\
    \ variable HTTP_COOKIE and they will have following form –\n\nkey1 = value1;key2\
    \ = value2;key3 = value3....\n\nHere is an example of how to retrieve cookies.\n\
    \n```python\n#!/usr/bin/python\n\n# Import modules for CGI handling\nfrom os import\
    \ environ\nimport cgi, cgitb\n\nif environ.has_key('HTTP_COOKIE'):\n    for cookie\
    \ in map(strip, split(environ['HTTP_COOKIE'], ';')):\n        (key, value ) =\
    \ split(cookie, '=');\n        if key == \"UserID\":\n            user_id = value\n\
    \        if key == \"Password\":\n            password = value\n\nprint \"User\
    \ ID = %s\" % user_id\nprint \"Password = %s\" % password\n```\n\nThis produces\
    \ the following result for the cookies set by above script\n\nUser ID = XYZ\n\n\
    Password = XYZ123\n\n## File Upload Example\n\nTo upload a file, the HTML form\
    \ must have the enctype attribute set to **multipart/form-data**. The input tag\
    \ with the file type creates a \"Browse\" button.\n\n```html\n<html>\n<body>\n\
    <form enctype = \"multipart/form-data\"\naction = \"save_file.py\" method = \"\
    post\">\n<p>File: <input type = \"file\" name = \"filename\" /></p>\n<p><input\
    \ type = \"submit\" value = \"Upload\" /></p>\n</form>\n</body>\n</html>\n```\n\
    \nThe result of this code is the following form –\n\nFile:\nUpload\n\nAbove example\
    \ has been disabled intentionally to save people uploading file on our server,\
    \ but you can try above code with your server.\n\nHere is the script **save_file.py**\
    \ to handle file upload –\n\n```python\n#!/usr/bin/python\nimport cgi, os\nimport\
    \ cgitb; cgitb.enable()\nform = cgi.FieldStorage()\n# Get filename here.\nfileitem\
    \ = form['filename']\n# Test if the file was uploaded\nif fileitem.filename:\n\
    \    # strip leading path from file name to avoid\n    # directory traversal attacks\n\
    \    fn = os.path.basename(fileitem.filename)\n    open('/tmp/' + fn, 'wb').write(fileitem.file.read())\n\
    \    message = 'The file \"' + fn + '\" was uploaded successfully'\nelse:\n  \
    \  message = 'No file was uploaded'\nprint \"\"\"\\nContent-Type: text/html\\\
    n\n<html>\n<body>\n<p>%s</p>\n</body>\n</html>\n\"\"\" % (message,)\n```\n\nIf\
    \ you run the above script on Unix/Linux, then you need to take care of replacing\
    \ file separator as follows, otherwise on your windows machine above open() statement\
    \ should work fine.\n\n```python\nfn = os.path.basename(fileitem.filename.replace(\"\
    \\\\\", \"/\" ))\n```\n\n## How To Raise a \"File Download\" Dialog Box?\n\nSometimes,\
    \ it is desired that you want to give option where a user can click a link and\
    \ it will pop up a \"File Download\" dialogue box to the user instead of displaying\
    \ actual content. This is very easy and can be achieved through HTTP header. This\
    \ HTTP header is different from the header mentioned in previous section.\n\n\
    For example, if you want make a **FileName** file downloadable from a given link,\
    \ then its syntax is as follows –\n\n```python\n#!/usr/bin/python\n# HTTP Header\n\
    print \"Content-Type:application/octet-stream; name = \\\"FileName\\\"\\r\\n\"\
    ;\nprint \"Content-Disposition: attachment; filename = \\\"FileName\\\"\\r\\n\\\
    n\";\n# Actual File Content will go here.\nfo = open(\"foo.txt\", \"rb\")\nstr\
    \ = fo.read();\nprint str\n# Close opened file\nfo.close()\n```\n\n## Python -\
    \ MySQL Database Access\n\nThe Python standard for database interfaces is the\
    \ Python DB-API. Most Python database interfaces adhere to this standard.\n\n\
    You can choose the right database for your application. Python Database API supports\
    \ a wide range of database servers such as –\n\n- GadFly\n- mSQL\n- MySQL\n- PostgreSQL\n\
    - Microsoft SQL Server 2000\n- Informix\n- Interbase\n- Oracle\n- Sybase\n\nHere\
    \ is the list of available Python database interfaces: [Python Database Interfaces\
    \ and APIs](https://www.python.org).\n\nYou must download a separate DB API module\
    \ for each database you need to access. For example, if you need to access an\
    \ Oracle database as well as a MySQL database, you must download both the Oracle\
    \ and the MySQL database modules.\n\nThe DB API provides a minimal standard for\
    \ working with databases using Python structures and syntax wherever possible.\
    \ This API includes the following –\n\n- Importing the API module.\n- Acquiring\
    \ a connection with the database.\n- Issuing SQL statements and stored procedures.\n\
    - Closing the connection\n\nWe would learn all the concepts using MySQL, so let\
    \ us talk about MySQLdb module.\n\n## What is MySQLdb?\n\nMySQLdb is an interface\
    \ for connecting to a MySQL database server from Python. It implements the Python\
    \ Database API v2.0 and is built on top of the MySQL C API.\n\n## How do I Install\
    \ MySQLdb?\n\nBefore proceeding, you make sure you have MySQLdb installed on your\
    \ machine. Just type the following in your Python script and execute it –\n\n\
    ```python\n#!/usr/bin/python\n```"
