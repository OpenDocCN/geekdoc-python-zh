    import os\nprint \"Content-type: text/html\\r\\n\\r\\n\";\nprint \"<font size=+1>Environment</font><br>\"\
    ;\nfor param in os.environ.keys():\n    print \"<b>%20s</b>: %s<br>\" % (param,\
    \ os.environ[param])\n```\n\n## GET and POST Methods\n\nYou must have come across\
    \ many situations when you need to pass some information from your browser to\
    \ web server and ultimately to your CGI Program. Most frequently, browser uses\
    \ two methods to pass this information to web server. These methods are GET Method\
    \ and POST Method.\n\n### Passing Information using GET method\n\nThe GET method\
    \ sends the encoded user information appended to the page request. The page and\
    \ the encoded information are separated by the ? character as follows –\n\nhttp://www.test.com/cgi-bin/hello.py?key1=value1&key2=value2\n\
    \nThe GET method is the default method to pass information from browser to web\
    \ server and it produces a long string that appears in your browser's Location:\
    \ box. Never use GET method if you have password or other sensitive information\
    \ to pass to the server. The GET method has size limitation: only 1024 characters\
    \ can be sent in a request string. The GET method sends information using QUERY_STRING\
    \ header and will be accessible in your CGI Program through QUERY_STRING environment\
    \ variable.\n\nYou can pass information by simply concatenating key and value\
    \ pairs along with any URL or you can use HTML <FORM> tags to pass information\
    \ using GET method.\n\n### Simple URL Example: Get Method\n\nHere is a simple\
    \ URL, which passes two values to hello_get.py program using GET method.\n\n/cgi-bin/hello_get.py?first_name=ZARA&last_name=ALI\n\
    \nBelow is **hello_get.py** script to handle input given by web browser. We are\
    \ going to use **cgi** module, which makes it very easy to access passed information\
    \ –\n\n```python\n#!/usr/bin/python\n\n# Import modules for CGI handling\nimport\
    \ cgi, cgitb\n\n# Create instance of FieldStorage\nform = cgi.FieldStorage()\n\
    \n# Get data from fields\nfirst_name = form.getvalue('first_name')\nlast_name\
    \ = form.getvalue('last_name')\nprint \"Content-type:text/html\\r\\n\\r\\n\"\n\
    print \"<html>\"\nprint \"<head>\"\nprint \"<title>Hello - Second CGI Program</title>\"\
    \nprint \"</head>\"\nprint \"<body>\"\nprint \"<h2>Hello %s %s</h2>\" % (first_name,\
    \ last_name)\nprint \"</body>\"\nprint \"</html>\"\n```\n\nThis would generate\
    \ the following result –\n\nHello ZARA ALI\n\n### Simple FORM Example: GET Method\n\
    \nThis example passes two values using HTML FORM and submit button. We use same\
    \ CGI script hello_get.py to handle this input.\n\n```html\n<form action=\"/cgi-bin/hello_get.py\"\
    \ method=\"get\">\n    First Name: <input type=\"text\" name=\"first_name\"><br\
    \ />\n    Last Name: <input type=\"text\" name=\"last_name\" />\n    <input type=\"\
    submit\" value=\"Submit\" />\n</form>\n```\n\nHere is the actual output of the\
    \ above form, you enter First and Last Name and then click submit button to see\
    \ the result.\n\nFirst Name: [input field]\nLast Name: [input field]\n[Submit\
    \ button]\n\n### Passing Information Using POST Method\n\nA generally more reliable\
    \ method of passing information to a CGI program is the POST method. This packages\
    \ the information in exactly the same way as GET methods, but instead of sending\
    \ it as a text string after a ? in the URL it sends it as a separate message.\
    \ This message comes into the CGI script in the form of the standard input.\n\n\
    Below is same hello_get.py script which handles GET as well as POST method.\n\n\
    ```python\n#!/usr/bin/python\n\n# Import modules for CGI handling\nimport cgi,\
    \ cgitb\n\n# Create instance of FieldStorage\nform = cgi.FieldStorage()\n\n# Get\
    \ data from fields\nfirst_name = form.getvalue('first_name')\nlast_name = form.getvalue('last_name')\n\
    print \"Content-type:text/html\\r\\n\\r\\n\"\nprint \"<html>\"\nprint \"<head>\"\
    \nprint \"<title>Hello - Second CGI Program</title>\"\nprint \"</head>\"\nprint\
    \ \"<body>\"\nprint \"<h2>Hello %s %s</h2>\" % (first_name, last_name)\nprint\
    \ \"</body>\"\nprint \"</html>\"\n```\n\nLet us take again same example as above\
    \ which passes two values using HTML FORM and submit button. We use same CGI script\
    \ hello_get.py to handle this input.\n\n```html\n<form action=\"/cgi-bin/hello_get.py\"\
    \ method=\"post\">\n    First Name: <input type=\"text\" name=\"first_name\"><br\
    \ />\n    Last Name: <input type=\"text\" name=\"last_name\" />\n    <input type=\"\
    submit\" value=\"Submit\" />\n</form>\n```\n\nHere is the actual output of the\
    \ above form. You enter First and Last Name and then click submit button to see\
    \ the result.\n\nFirst Name: [input field]\nLast Name: [input field]\n[Submit\
    \ button]\n\n### Passing Checkbox Data to CGI Program\n\nCheckboxes are used when\
    \ more than one option is required to be selected.\n\nHere is example HTML code\
    \ for a form with two checkboxes –\n\n```html\n<form action=\"/cgi-bin/checkbox.cgi\"\
    \ method=\"POST\" target=\"_blank\">\n    <input type=\"checkbox\" name=\"maths\"\
    \ value=\"on\" /> Maths\n    <input type=\"checkbox\" name=\"physics\" value=\"\
    on\" /> Physics\n    <input type=\"submit\" value=\"Select Subject\" />\n</form>\n\
    ```\n\nThe result of this code is the following form –\n\n[Select Subject button]\n\
    [ ] Maths\n[ ] Physics\n\nBelow is checkbox.cgi script to handle input given by\
    \ web browser for checkbox button.\n\n```python\n#!/usr/bin/python\n\n# Import\
    \ modules for CGI handling\nimport cgi, cgitb\n\n# Create instance of FieldStorage\n\
    form = cgi.FieldStorage()\n\n# Get data from fields\nif form.getvalue('maths'):\n\
    \    math_flag = \"ON\"\nelse:\n    math_flag = \"OFF\"\n\nif form.getvalue('physics'):\n\
    \    physics_flag = \"ON\"\nelse:\n    physics_flag = \"OFF\"\n\nprint \"Content-type:text/html\\\
    r\\n\\r\\n\"\nprint \"<html>\"\nprint \"<head>\"\nprint \"<title>Checkbox - Third\
    \ CGI Program</title>\"\nprint \"</head>\"\nprint \"<body>\"\nprint \"<h2> CheckBox\
    \ Maths is : %s</h2>\" % math_flag\nprint \"<h2> CheckBox Physics is : %s</h2>\"\
    \ % physics_flag\nprint \"</body>\"\nprint \"</html>\"\n```\n\n### Passing Radio\
    \ Button Data to CGI Program\n\nRadio Buttons are used when only one option is\
    \ required to be selected.\n\nHere is example HTML code for a form with two radio\
    \ buttons –\n\n```html\n<form action=\"/cgi-bin/radiobutton.py\" method=\"post\"\
    \ target=\"_blank\">\n    <input type=\"radio\" name=\"subject\" value=\"maths\"\
    \ /> Maths\n    <input type=\"radio\" name=\"subject\" value=\"physics\" /> Physics\n\
    \    <input type=\"submit\" value=\"Select Subject\" />\n</form>\n```\n\nThe result\
    \ of this code is the following form –\n\n[Select Subject button]\n( ) Maths\n\
    ( ) Physics\n\nBelow is radiobutton.py script to handle input given by web browser\
    \ for radio button –\n\n```python\n#!/usr/bin/python\n\n# Import modules for CGI\
    \ handling\nimport cgi, cgitb\n\n# Create instance of FieldStorage\nform = cgi.FieldStorage()\n\
    \n# Get data from fields\nif form.getvalue('subject'):\n    subject = form.getvalue('subject')\n\
    else:\n    subject = \"Not set\"\n\nprint \"Content-type:text/html\\r\\n\\r\\\
    n\"\nprint \"<html>\"\nprint \"<head>\"\nprint \"<title>Radio - Fourth CGI Program</title>\"\
    \nprint \"</head>\"\nprint \"<body>\"\nprint \"<h2> Selected Subject is %s</h2>\"\
    \ % subject\nprint \"</body>\"\nprint \"</html>\"\n```\n\n### Passing Text Area\
    \ Data to CGI Program\n\nTEXTAREA element is used when multiline text has to be\
    \ passed to the CGI Program.\n\nHere is example HTML code for a form with a TEXTAREA\
    \ box –\n\n```html\n<form action=\"/cgi-bin/textarea.py\" method=\"post\" target=\"\
    _blank\">\n    <textarea name=\"textcontent\" cols=\"40\" rows=\"4\">\n      \
    \  Type your text here...\n    </textarea>\n    <input type=\"submit\" value=\"\
    Submit\" />\n</form>\n```\n\nThe result of this code is the following form –\n\
    \n[Submit button]\n[Text area box]"
