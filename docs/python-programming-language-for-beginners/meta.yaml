    os.rename( "test1.txt", "test2.txt" )

    ```


    ## *remove()* 方法


    你可以使用*remove()*方法通过提供要删除的文件名作为参数来删除文件。


    ## 语法


    ```python

    os.remove(file_name)

    ```


    ## 示例


    以下是删除现有文件*test2.txt*的示例：


    ```python

    #!/usr/bin/python


    import os


    # 删除文件test2.txt


    os.remove("test2.txt")

    ```


    ## Python中的目录


    所有文件都包含在各种目录中，Python处理这些目录也没有问题。


    **os**模块有几种方法可以帮助你创建、删除和更改目录。


    ## *mkdir()* 方法


    你可以使用**os**模块的*mkdir()*方法在当前目录中创建目录。'
