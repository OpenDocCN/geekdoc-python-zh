    \ and belongs only to the current instance of a class.\n- **Inheritance** – The\
    \ transfer of the characteristics of a class to other classes that are derived\
    \ from it.\n- **Instance** – An individual object of a certain class. An object\
    \ obj that belongs to a class Circle, for example, is an instance of the class\
    \ Circle.\n- **Instantiation** – The creation of an instance of a class.\n- **Method**\
    \ – A special kind of function that is defined in a class definition.\n- **Object**\
    \ – A unique instance of a data structure that's defined by its class. An object\
    \ comprises both data members (class variables and instance variables) and methods.\n\
    - **Operator overloading** – The assignment of more than one function to a particular\
    \ operator.\n\n## Creating Classes\n\nThe *class* statement creates a new class\
    \ definition. The name of the class immediately follows the keyword *class* followed\
    \ by a colon as follows –\n\n```\nclass ClassName:\n    'Optional class documentation\
    \ string'\n    class_suite\n```\n\n- The class has a documentation string, which\
    \ can be accessed via *ClassName.__doc__*.\n- The *class_suite* consists of all\
    \ the component statements defining class members, data attributes and functions.\n\
    \n## Example\n\nFollowing is the example of a simple Python class –\n\n```\nclass\
    \ Employee:\n    'Common base class for all employees'\n    empCount = 0\n\n \
    \   def __init__(self, name, salary):\n        self.name = name\n        self.salary\
    \ = salary\n        Employee.empCount += 1\n\n    def displayCount(self):\n  \
    \      print \"Total Employee %d\" % Employee.empCount\n\n    def displayEmployee(self):\n\
    \        print \"Name : \", self.name, \", Salary: \", self.salary\n```\n\n- The\
    \ variable *empCount* is a class variable whose value is shared among all instances\
    \ of this class. This can be accessed as *Employee.empCount* from inside the class\
    \ or outside the class.\n- The first method *__init__()* is a special method,\
    \ which is called class constructor or initialization method that Python calls\
    \ when you create a new instance of this class.\n- You declare other class methods\
    \ like normal functions with the exception that the first argument to each method\
    \ is *self*. Python adds the *self* argument to the list for you; you do not need\
    \ to include it when you call the methods.\n\n## Creating Instance Objects\n\n\
    To create instances of a class, you call the class using class name and pass in\
    \ whatever arguments its __init__ method accepts.\n\n\"This would create first\
