    \n下表列出了常用的代码字符串，其中零个或多个连接成字符串格式。\n\n| 代码 | C 类型 | 含义 |\n| :--- | :--- | :--- |\n\
    | c | char | C char 转换为长度为 1 的 Python 字符串。 |\n| d | double | C double 转换为 Python\
