- md: "## Python - XML Processing\n\nXML is a portable, open source language that\
    \ allows programmers to develop applications that can be read by other applications,\
    \ regardless of operating system and/or developmental language.\n\n## What is\
    \ XML?\n\nThe Extensible Markup Language (XML) is a markup language much like\
    \ HTML or SGML. This is recommended by the World Wide Web Consortium and available\
    \ as an open standard.\n\nXML is extremely useful for keeping track of small to\
    \ medium amounts of data without requiring a SQL-based backbone.\n\n## XML Parser\
    \ Architectures and APIs\n\nThe Python standard library provides a minimal but\
    \ useful set of interfaces to work with XML.\n\nThe two most basic and broadly\
    \ used APIs to XML data are the SAX and DOM interfaces.\n\n- **Simple API for\
    \ XML (SAX)** – Here, you register callbacks for events of interest and then let\
    \ the parser proceed through the document. This is useful when your documents\
    \ are large or you have memory limitations, it parses the file as it reads it\
    \ from disk and the entire file is never stored in memory.\n- **Document Object\
    \ Model (DOM) API** – This is a World Wide Web Consortium recommendation wherein\
    \ the entire file is read into memory and stored in a hierarchical (tree-based)\
    \ form to represent all the features of an XML document.\n\nSAX obviously cannot\
    \ process information as fast as DOM can when working with large files. On the\
    \ other hand, using DOM exclusively can really kill your resources, especially\
    \ if used on a lot of small files.\n\nSAX is read-only, while DOM allows changes\
    \ to the XML file. Since these two different APIs literally complement each other,\
    \ there is no reason why you cannot use them both for large projects.\n\nFor all\
    \ our XML code examples, let's use a simple XML file *movies.xml* as an input\
    \ –\n\n```xml\n<collection shelf=\"New Arrivals\">\n\n<movie title=\"Enemy Behind\"\
    >\n    <type>War, Thriller</type>\n    <format>DVD</format>\n    <year>2003</year>\n\
    \    <rating>PG</rating>\n    <stars>10</stars>\n    <description>Talk about a\
    \ US-Japan war</description>\n</movie>\n\n<movie title=\"Transformers\">\n   \
    \ <type>Anime, Science Fiction</type>\n    <format>DVD</format>\n    <year>1989</year>\n\
    \    <rating>R</rating>\n    <stars>8</stars>\n    <description>A scientific fiction</description>\n\
    </movie>\n\n<movie title=\"Trigun\">\n    <type>Anime, Action</type>\n    <format>DVD</format>\n\
    \    <episodes>4</episodes>\n    <rating>PG</rating>\n    <stars>10</stars>\n\
    \    <description>Vash the Stampede!</description>\n</movie>\n\n<movie title=\"\
    Ishtar\">\n    <type>Comedy</type>\n    <format>VHS</format>\n    <rating>PG</rating>\n\
    \    <stars>2</stars>\n    <description>Viewable boredom</description>\n</movie>\n\
    \n</collection>\n```\n\n## Parsing XML with SAX APIs\n\nSAX is a standard interface\
    \ for event-driven XML parsing. Parsing XML with SAX generally requires you to\
    \ create your own ContentHandler by subclassing `xml.sax.ContentHandler`.\n\n\
    Your *ContentHandler* handles the particular tags and attributes of your flavor(s)\
    \ of XML. A ContentHandler object provides methods to handle various parsing events.\
    \ Its owning parser calls ContentHandler methods as it parses the XML file.\n\n\
    The methods `startDocument` and `endDocument` are called at the start and the\
    \ end of the XML file. The method `characters(text)` is passed character data\
    \ of the XML file via the parameter text.\n\nThe ContentHandler is called at the\
    \ start and end of each element. If the parser is not in namespace mode, the methods\
    \ `startElement(tag, attributes)` and `endElement(tag)` are called; otherwise,\
    \ the corresponding methods `startElementNS` and `endElementNS` are called. Here,\
    \ tag is the element tag, and attributes is an Attributes object.\n\nHere are\
    \ other important methods to understand before proceeding –\n\n### The `make_parser`\
    \ Method\n\nFollowing method creates a new parser object and returns it. The parser\
    \ object created will be of the first parser type the system finds.\n\n```python\n\
    xml.sax.make_parser( [parser_list] )\n```\n\nHere is the detail of the parameters\
    \ –\n\n- **parser_list** – The optional argument consisting of a list of parsers\
    \ to use which must all implement the `make_parser` method.\n\n### The `parse`\
    \ Method\n\nFollowing method creates a SAX parser and uses it to parse a document.\n\
    \n```python\nxml.sax.parse( xmlfile, contenthandler[, errorhandler])\n```\n\n\
    Here is the detail of the parameters –\n\n- **xmlfile** – This is the name of\
    \ the XML file to read from.\n- **contenthandler** – This must be a ContentHandler\
    \ object.\n- **errorhandler** – If specified, errorhandler must be a SAX ErrorHandler\
    \ object.\n\n### The `parseString` Method\n\nThere is one more method to create\
    \ a SAX parser and to parse the specified **XML string**.\n\n```python\nxml.sax.parseString(xmlstring,\
    \ contenthandler[, errorhandler])\n```\n\nHere is the detail of the parameters\
    \ –\n\n- **xmlstring** – This is the name of the XML string to read from.\n- **contenthandler**\
    \ – This must be a ContentHandler object.\n- **errorhandler** – If specified,\
    \ errorhandler must be a SAX ErrorHandler object.\n\n### Example\n\n```python\n\
    #!/usr/bin/python\n\nimport xml.sax\n\nclass MovieHandler( xml.sax.ContentHandler\
    \ ):\n   def __init__(self):\n      self.CurrentData = \"\"\n      self.type =\
    \ \"\"\n      self.format = \"\"\n      self.year = \"\"\n      self.rating =\
    \ \"\"\n      self.stars = \"\"\n      self.description = \"\"\n\n   # Call when\
    \ an element starts\n   def startElement(self, tag, attributes):\n      self.CurrentData\
    \ = tag\n      if tag == \"movie\":\n         print \"*****Movie*****\"\n    \
    \     title = attributes[\"title\"]\n         print \"Title:\", title\n\n   #\
    \ Call when an elements ends\n   def endElement(self, tag):\n      if self.CurrentData\
    \ == \"type\":\n         print \"Type:\", self.type\n      elif self.CurrentData\
    \ == \"format\":\n         print \"Format:\", self.format\n      elif self.CurrentData\
    \ == \"year\":\n         print \"Year:\", self.year\n      elif self.CurrentData\
    \ == \"rating\":\n         print \"Rating:\", self.rating\n      elif self.CurrentData\
    \ == \"stars\":\n         print \"Stars:\", self.stars\n      elif self.CurrentData\
    \ == \"description\":\n         print \"Description:\", self.description\n   \
    \   self.CurrentData = \"\"\n\n   # Call when a character is read\n   def characters(self,\
    \ content):\n      if self.CurrentData == \"type\":\n         self.type = content\n\
    \      elif self.CurrentData == \"format\":\n         self.format = content\n\
    \      elif self.CurrentData == \"year\":\n         self.year = content\n    \
    \  elif self.CurrentData == \"rating\":\n         self.rating = content\n    \
    \  elif self.CurrentData == \"stars\":\n         self.stars = content\n      elif\
    \ self.CurrentData == \"description\":\n         self.description = content\n\n\
    if ( __name__ == \"__main__\"):\n   # create an XMLReader\n   parser = xml.sax.make_parser()\n\
    \n   # turn off namespaces\n   parser.setFeature(xml.sax.handler.feature_namespaces,\
    \ 0)\n\n   # override the default ContextHandler\n   Handler = MovieHandler()\n\
    \   parser.setContentHandler( Handler )\n   parser.parse(\"movies.xml\")\n```\n\
    \nThis would produce following result –\n\n```\n*****Movie*****\nTitle: Enemy\
    \ Behind\nType: War, Thriller\nFormat: DVD\nYear: 2003\nRating: PG\nStars: 10\n\
    Description: Talk about a US-Japan war\n\n*****Movie*****\nTitle: Transformers\n\
    Type: Anime, Science Fiction\nFormat: DVD\nYear: 1989\nRating: R\nStars: 8\nDescription:\
    \ A scientific fiction\n\n*****Movie*****\nTitle: Trigun\nType: Anime, Action\n\
    Format: DVD\nRating: PG\nStars: 10\nDescription: Vash the Stampede!\n\n*****Movie*****\n\
    Title: Ishtar\nType: Comedy\nFormat: VHS\nRating: PG\nStars: 2\nDescription: Viewable\
    \ boredom\n```\n\nFor a complete detail on SAX API documentation, please refer\
    \ to standard [Python SAX APIs.](http://example.com)\n\n## Parsing XML with DOM\
    \ APIs\n\nThe Document Object Model (\"DOM\") is a cross-language API from the\
    \ World Wide Web Consortium (W3C) for accessing and modifying XML documents.\n\
    \nThe DOM is extremely useful for random-access applications. SAX only allows\
    \ you a view of one bit of the document at a time. If you are looking at one SAX\
    \ element, you have no access to another."
