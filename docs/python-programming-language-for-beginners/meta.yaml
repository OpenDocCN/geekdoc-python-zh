    ## 在CGI中使用Cookies\n\nHTTP协议是一种无状态协议。对于商业网站，需要在不同页面之间维护会话信息。例如，一个用户注册过程在完成多个页面后结束。如何在所有网页中维护用户的会话信息？\n\
    \n在许多情况下，使用cookies是记住和跟踪偏好、购买、佣金以及为改善访客体验或网站统计所需的其他信息的最有效方法。\n\n## 它是如何工作的？\n\n\
    你的服务器以cookie的形式向访客的浏览器发送一些数据。浏览器可能会接受该cookie。如果接受，它将以纯文本记录的形式存储在访客的硬盘驱动器上。现在，当访客访问你网站上的另一个页面时，该cookie可用于检索。一旦检索到，你的服务器就知道/记住了存储的内容。\n\
    \nCookies是5个可变长度字段的纯文本数据记录 –\n\n- **Expires** – cookie过期的日期。如果此字段为空，cookie将在访客退出浏览器时过期。\n\
    - **Domain** – 你网站的域名。\n- **Path** – 设置cookie的目录或网页的路径。如果你想从任何目录或页面检索cookie，此字段可以为空。\n\
    - **Secure** – 如果此字段包含“secure”一词，则只能通过安全服务器检索cookie。如果此字段为空，则不存在此限制。\n- **Name=Value**\
    \ – cookies以键值对的形式设置和检索。\n\n## 设置Cookies\n\n将cookies发送到浏览器非常容易。这些cookies在Content-type字段之前随HTTP\
    \ Header一起发送。假设你想将UserID和Password设置为cookies。设置cookies的方法如下 –\n\n```python\n#!/usr/bin/python\n\
    \nprint \"Set-Cookie:UserID = XYZ;\\r\\n\"\nprint \"Set-Cookie:Password = XYZ123;\\\
    r\\n\"\nprint \"Set-Cookie:Expires = Tuesday, 31-Dec-2007 23:12:40 GMT;\\r\\n\"\
    \nprint \"Set-Cookie:Domain = www.tutorialspoint.com;\\r\\n\"\nprint \"Set-Cookie:Path\
    \ = /perl;\\n\"\nprint \"Content-type:text/html\\r\\n\\r\\n\"\n\n..........Rest\
    \ of the HTML Content....\n```\n\n从这个例子中，你一定已经明白了如何设置cookies。我们使用**Set-Cookie**\
    \ HTTP头来设置cookies。\n\n设置Expires、Domain和Path等cookie属性是可选的。值得注意的是，cookies是在发送魔术行**\"\
    Content-type:text/html\\r\\n\\r\\n\"**之前设置的。\n\n## 检索Cookies\n\n检索所有已设置的cookies非常容易。Cookies存储在CGI环境变量HTTP_COOKIE中，它们具有以下形式\
    \ –\n\nkey1 = value1;key2 = value2;key3 = value3....\n\n这是一个如何检索cookies的示例。\n\n\
    ```python\n#!/usr/bin/python\n\n# Import modules for CGI handling\nfrom os import\
    \ environ\nimport cgi, cgitb\n\nif environ.has_key('HTTP_COOKIE'):\n    for cookie\
    \ in map(strip, split(environ['HTTP_COOKIE'], ';')):\n        (key, value ) =\
    \ split(cookie, '=');\n        if key == \"UserID\":\n            user_id = value\n\
    \        if key == \"Password\":\n            password = value\n\nprint \"User\
    \ ID = %s\" % user_id\nprint \"Password = %s\" % password\n```\n\n这将为上面脚本设置的cookies产生以下结果\n\
    \nUser ID = XYZ\n\nPassword = XYZ123\n\n## 文件上传示例\n\n要上传文件，HTML表单必须将enctype属性设置为**multipart/form-data**。具有file类型的input标签会创建一个“浏览”按钮。\n\
    \n```html\n<html>\n<body>\n<form enctype = \"multipart/form-data\"\naction = \"\
    save_file.py\" method = \"post\">\n<p>File: <input type = \"file\" name = \"filename\"\
    \ /></p>\n<p><input type = \"submit\" value = \"Upload\" /></p>\n</form>\n</body>\n\
    </html>\n```\n\n此代码的结果是以下表单 –\n\nFile:\nUpload\n\n上面的示例已被有意禁用，以防止人们将文件上传到我们的服务器，但你可以使用你自己的服务器尝试上面的代码。\n\
    \n以下是处理文件上传的脚本**save_file.py** –\n\n```python\n#!/usr/bin/python\nimport cgi,\
    \ os\nimport cgitb; cgitb.enable()\nform = cgi.FieldStorage()\n# Get filename\
    \ here.\nfileitem = form['filename']\n# Test if the file was uploaded\nif fileitem.filename:\n\
    \    # strip leading path from file name to avoid\n    # directory traversal attacks\n\
    \    fn = os.path.basename(fileitem.filename)\n    open('/tmp/' + fn, 'wb').write(fileitem.file.read())\n\
    \    message = 'The file \"' + fn + '\" was uploaded successfully'\nelse:\n  \
    \  message = 'No file was uploaded'\nprint \"\"\"\\nContent-Type: text/html\\\
    n\n<html>\n<body>\n<p>%s</p>\n</body>\n</html>\n\"\"\" % (message,)\n```\n\n如果你在Unix/Linux上运行上述脚本，则需要注意按如下方式替换文件分隔符，否则在你的Windows机器上，上面的open()语句应该可以正常工作。\n\
    \n```python\nfn = os.path.basename(fileitem.filename.replace(\"\\\\\", \"/\" ))\n\
    ```\n\n## 如何弹出“文件下载”对话框？\n\n有时，你希望提供一个选项，用户可以点击一个链接，它会向用户弹出一个“文件下载”对话框，而不是显示实际内容。这非常容易，可以通过HTTP头实现。此HTTP头与前面章节中提到的头不同。\n\
    \n例如，如果你想使一个**FileName**文件可从给定链接下载，则其语法如下 –\n\n```python\n#!/usr/bin/python\n\
    # HTTP Header\nprint \"Content-Type:application/octet-stream; name = \\\"FileName\\\
    \"\\r\\n\";\nprint \"Content-Disposition: attachment; filename = \\\"FileName\\\
    \"\\r\\n\\n\";\n# Actual File Content will go here.\nfo = open(\"foo.txt\", \"\
    rb\")\nstr = fo.read();\nprint str\n# Close opened file\nfo.close()\n```\n\n##\
    \ Python - MySQL数据库访问\n\nPython数据库接口的标准是Python DB-API。大多数Python数据库接口都遵循此标准。\n\n\
    你可以为你的应用程序选择合适的数据库。Python数据库API支持广泛的数据库服务器，例如 –\n\n- GadFly\n- mSQL\n- MySQL\n\
    - PostgreSQL\n- Microsoft SQL Server 2000\n- Informix\n- Interbase\n- Oracle\n\
    - Sybase\n\n以下是可用的Python数据库接口列表：[Python Database Interfaces and APIs](https://www.python.org)。\n\
