    \n# Now you can call printme function\nprintme( str = \"My string\")\n```\n\n\
    When the above code is executed, it produces the following result –\n\n```\nMy\
    \ string\n```\n\nThe following example gives more clear picture. Note that the\
    \ order of parameters does not matter.\n\n[Live Demo](http://www.tutorialspoint.com/python/python_functions.htm)\n\
    \n```\n#!/usr/bin/python\n\n# Function definition is here\ndef printinfo( name,\
    \ age ):\n    \"This prints a passed info into this function\"\n    print \"Name:\
    \ \", name\n    print \"Age \", age\n    return;\n\n# Now you can call printinfo\
    \ function\nprintinfo( age=50, name=\"miki\" )\n```\n\nWhen the above code is\
    \ executed, it produces the following result –\n\n```\nName: miki\nAge 50\n```\n\
    \n## Default arguments\n\nA default argument is an argument that assumes a default\
    \ value if a value is not provided in the function call for that argument. The\
    \ following example gives an idea on default arguments, it prints default age\
    \ if it is not passed –\n\n[Live Demo](http://www.tutorialspoint.com/python/python_functions.htm)\n\
    \n```\n#!/usr/bin/python\n```"
  mdcn: "## calendar.monthcalendar(year, month)\n\n返回一个整数列表的列表。每个子列表表示一周。年份 `year`\
    \ 的月份 `month` 之外的日期设置为 0；月份内的日期设置为其当月的日期，从 1 开始。\n\n## calendar.monthrange(year,\
    \ month)\n\n返回两个整数。第一个是年份 `year` 的月份 `month` 第一天的星期代码；第二个是该月的天数。\n\n星期代码为 0（星期一）到\
    \ 6（星期日）；月份编号为 1 到 12。\n\n## calendar.prcal(year, w=2, l=1, c=6)\n\n类似于 `print\
    \ calendar.calendar(year, w, l, c)`。\n\n## calendar.prmonth(year, month, w=2,\
    \ l=1)\n\n类似于 `print calendar.month(year, month, w, l)`。\n\n## calendar.setfirstweekday(weekday)\n\
    \n将每周的第一天设置为星期代码 `weekday`。星期代码为 0（星期一）到 6（星期日）。\n\n## calendar.timegm(tupletime)\n\
    \n`time.gmtime` 的逆操作：接受一个时间元组形式的时间点，并返回自纪元以来的秒数浮点数形式的同一时间点。\n\n## calendar.weekday(year,\
    \ month, day)\n\n返回给定日期的星期代码。星期代码为 0（星期一）到 6（星期日）；月份编号为 1（一月）到 12（十二月）。\n\n##\
    \ 其他模块与函数\n\n如果你感兴趣，这里会列出一些其他重要的模块和函数，用于在 Python 中处理日期和时间 –\n\n- [datetime 模块](https://www.tutorialspoint.com/python3/python_date_time.htm)\n\
    - [pytz 模块](https://www.tutorialspoint.com/python3/python_date_time.htm)\n- [dateutil\
    \ 模块](https://www.tutorialspoint.com/python3/python_date_time.htm)\n\n## Python\
    \ - 函数\n\n函数是一段有组织的、可重用的代码块，用于执行单个相关的操作。\n\n函数为你的应用程序提供了更好的模块化程度和高度的代码重用性。\n\n\
    正如你已经知道的，Python 提供了许多内置函数，如 `print()` 等，但你也可以创建自己的函数。这些函数被称为 *用户自定义函数*。\n\n##\
    \ 定义函数\n\n你可以定义函数来提供所需的功能。以下是在 Python 中定义函数的简单规则。\n\n- 函数块以关键字 **def** 开头，后跟函数名和括号\
    \ ( ( ) )。\n- 任何输入参数或实参都应放在这些括号内。你也可以在这些括号内定义参数。\n- 函数的第一条语句可以是可选的语句——函数的文档字符串或\
    \ *docstring*。\n- 每个函数内的代码块以冒号 (:) 开头并缩进。\n- 语句 `return [expression]` 退出函数，可选择将表达式返回给调用者。没有参数的\
    \ `return` 语句等同于 `return None`。\n\n## 语法\n\n```\ndef functionname( parameters\
    \ ): \n   \"function_docstring\"\n   function_suite\n   return [expression]\n\
    ```\n\n默认情况下，参数具有位置行为，你需要按照它们定义的顺序传递它们。\n\n## 示例\n\n以下函数接受一个字符串作为输入参数，并将其打印到标准屏幕。\n\
    \n```\ndef printme( str ):\n    \"This prints a passed string into this function\"\
    \n    print str\n    return\n```\n\n## 调用函数\n\n定义函数只是给它一个名字，指定要包含在函数中的参数，并构建代码块的结构。\n\
    \n一旦函数的基本结构确定，你就可以通过从另一个函数调用它或直接从 Python 提示符调用它来执行它。以下是调用 `printme()` 函数的示例 –\n\
    \n[在线演示](http://www.tutorialspoint.com/python/online_python_compiler.php)\n\n\
    ```\n#!/usr/bin/python\n\n# Function definition is here\ndef printme( str ):\n\
    \    \"This prints a passed string into this function\"\n    print str\n    return;\n\
    \n# Now you can call printme function\nprintme(\"I'm first call to user defined\
    \ function!\")\nprintme(\"Again second call to the same function\")\n```\n\n当执行上述代码时，会产生以下结果\
    \ –\n\n```\nI'm first call to user defined function!\nAgain second call to the\
    \ same function\n```\n\n## 按引用传递与按值传递\n\nPython 语言中的所有参数（实参）都是按引用传递的。这意味着如果你在函数内更改了参数所引用的内容，该更改也会反映在调用函数中。例如\
    \ –\n\n[在线演示](http://www.tutorialspoint.com/python/python_functions.htm)\n\n```\n\
    #!/usr/bin/python\n\n# Function definition is here\ndef changeme( mylist ):\n\
    \   \"This changes a passed list into this function\"\n   mylist.append([1,2,3,4]);\n\
    \   print \"Values inside the function: \", mylist\n   return\n\n# Now you can\
    \ call changeme function\nmylist = [10,20,30];\nchangeme( mylist );\nprint \"\
    Values outside the function: \", mylist\n```\n\n这里，我们维护了传递对象的引用，并在同一个对象中追加值。因此，这将产生以下结果\
    \ –\n\n```\nValues inside the function: [10, 20, 30, [1, 2, 3, 4]]\nValues outside\
    \ the function: [10, 20, 30, [1, 2, 3, 4]]\n```\n\n还有一个例子，其中参数是按引用传递的，并且在被调用函数内部覆盖了该引用。\n\
    \n[在线演示](http://www.tutorialspoint.com/python/python_functions.htm)\n\n```\n#!/usr/bin/python\n\
    \n# Function definition is here\ndef changeme( mylist ):\n   \"This changes a\
    \ passed list into this function\"\n   mylist = [1,2,3,4]; # This would assig\
    \ new reference in mylist\n   print \"Values inside the function: \", mylist\n\
    \   return\n\n# Now you can call changeme function\nmylist = [10,20,30];\nchangeme(\
    \ mylist );\nprint \"Values outside the function: \", mylist\n```\n\n参数 *mylist*\
