    , total\n```\n\nWhen the above code is executed, it produces the following result\
    \ –\n\n```\nInside the function : 30\nOutside the function : 30\n```\n\n## Scope\
    \ of Variables\n\nAll variables in a program may not be accessible at all locations\
    \ in that program. This depends on where you have declared a variable.\n\nThe\
    \ scope of a variable determines the portion of the program where you can access\
    \ a particular identifier. There are two basic scopes of variables in Python –\n\
    \n- Global variables\n- Local variables\n\n## Global vs. Local variables\n\nVariables\
    \ that are defined inside a function body have a local scope, and those defined\
