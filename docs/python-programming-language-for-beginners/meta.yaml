    if ( __name__ == \"__main__\"):\n   # 创建一个 XMLReader\n   parser = xml.sax.make_parser()\n\
    \n   # 关闭命名空间\n   parser.setFeature(xml.sax.handler.feature_namespaces, 0)\n\n\
