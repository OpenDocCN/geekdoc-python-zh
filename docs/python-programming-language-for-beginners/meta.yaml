- md: "## Performing Transactions\n\nTransactions are a mechanism that ensures data\
    \ consistency. Transactions have the following four properties –\n\n- **Atomicity**\
    \ – Either a transaction completes or nothing happens at all.\n- **Consistency**\
    \ – A transaction must start in a consistent state and leave the system in a consistent\
    \ state.\n- **Isolation** – Intermediate results of a transaction are not visible\
    \ outside the current transaction.\n- **Durability** – Once a transaction was\
    \ committed, the effects are persistent, even after a system failure.\n\nThe Python\
    \ DB API 2.0 provides two methods to either *commit* or *rollback* a transaction.\n\
    \n## Example\n\nYou already know how to implement transactions. Here is again\
    \ similar example –\n\n```python\n# Prepare SQL query to DELETE required records\n\
    sql = \"DELETE FROM EMPLOYEE WHERE AGE > '%d'\" % (20)\ntry:\n    # Execute the\
    \ SQL command\n    cursor.execute(sql)\n    # Commit your changes in the database\n\
    \    db.commit()\nexcept:\n    # Rollback in case there is any error\n    db.rollback()\n\
    ```\n\n## COMMIT Operation\n\nCommit is the operation, which gives a green signal\
    \ to database to finalize the changes, and after this operation, no change can\
    \ be reverted back.\n\nHere is a simple example to call **commit** method.\n\n\
    ```python\ndb.commit()\n```\n\n## ROLLBACK Operation\n\nIf you are not satisfied\
    \ with one or more of the changes and you want to revert back those changes completely,\
    \ then use **rollback()** method.\n\nHere is a simple example to call **rollback()**\
    \ method.\n\n```python\ndb.rollback()\n```\n\n## Disconnecting Database\n\nTo\
    \ disconnect Database connection, use close() method.\n\n```python\ndb.close()\n\
    ```\n\nIf the connection to a database is closed by the user with the close()\
    \ method, any outstanding transactions are rolled back by the DB. However, instead\
    \ of depending on any of DB lower level implementation details, your application\
    \ would be better off calling commit or rollback explicitly.\n\n## Handling Errors\n\
    \nThere are many sources of errors. A few examples are a syntax error in an executed\
    \ SQL statement, a connection failure, or calling the fetch method for an already\
    \ canceled or finished statement handle.\n\nThe DB API defines a number of errors\
    \ that must exist in each database module. The following table lists these exceptions.\n\
    \n| Sr.No. | Exception & Description |\n| :--- | :--- |\n| 1 | **Warning**<br>Used\
    \ for non-fatal issues. Must subclass StandardError. |\n| 2 | **Error**<br>Base\
    \ class for errors. Must subclass StandardError. |\n| 3 | **InterfaceError**<br>Used\
    \ for errors in the database module, not the database itself. Must subclass Error.\
    \ |\n| 4 | **DatabaseError**<br>Used for errors in the database. Must subclass\
    \ Error. |\n| 5 | **DataError**<br>Subclass of DatabaseError that refers to errors\
    \ in the data. |\n| 6 | **OperationalError**<br>Subclass of DatabaseError that\
    \ refers to errors such as the loss of a connection to the database. These errors\
    \ are generally outside of the control of the Python scripter. |\n| 7 | **IntegrityError**<br>Subclass\
    \ of DatabaseError for situations that would damage the relational integrity,\
    \ such as uniqueness constraints or foreign keys. |\n| 8 | **InternalError**<br>Subclass\
    \ of DatabaseError that refers to errors internal to the database module, such\
    \ as a cursor no longer being active. |\n| 9 | **ProgrammingError**<br>Subclass\
    \ of DatabaseError that refers to errors such as a bad table name and other things\
    \ that can safely be blamed on you. |\n| 10 | **NotSupportedError**<br>Subclass\
    \ of DatabaseError that refers to trying to call unsupported functionality. |\n\
    \nYour Python scripts should handle these errors, but before using any of the\
    \ above exceptions, make sure your MySQLdb has support for that exception. You\
    \ can get more information about them by reading the DB API 2.0 specification.\n\
    \n## Python - Network Programming\n\nPython provides two levels of access to network\
    \ services. At a low level, you can access the basic socket support in the underlying\
    \ operating system, which allows you to implement clients and servers for both\
    \ connection-oriented and connectionless protocols.\n\nPython also has libraries\
    \ that provide higher-level access to specific application-level network protocols,\
    \ such as FTP, HTTP, and so on.\n\nThis chapter gives you understanding on most\
    \ famous concept in Networking - Socket Programming.\n\n## What is Sockets?\n\n\
    Sockets are the endpoints of a bidirectional communications channel. Sockets may\
    \ communicate within a process, between processes on the same machine, or between\
    \ processes on different continents.\n\nSockets may be implemented over a number\
    \ of different channel types: Unix domain sockets, TCP, UDP, and so on. The *socket*\
    \ library provides specific classes for handling the common transports as well\
    \ as a generic interface for handling the rest.\n\nSockets have their own vocabulary\
    \ –\n\n| Sr.No. | Term & Description |\n| :--- | :--- |\n| 1 | **Domain**<br>The\
    \ family of protocols that is used as the transport mechanism. These values are\
    \ constants such as AF_INET, PF_INET, PF_UNIX, PF_X25, and so on. |\n| 2 | **type**<br>The\
    \ type of communications between the two endpoints, typically SOCK_STREAM for\
    \ connection-oriented protocols and SOCK_DGRAM for connectionless protocols. |\n\
    | 3 | **protocol**<br>Typically zero, this may be used to identify a variant of\
    \ a protocol within a domain and type. |\n| 4 | **hostname**<br>The identifier\
    \ of a network interface –<br>- A string, which can be a host name, a dotted-quad\
    \ address, or an IPV6 address in colon (and possibly dot) notation<br>- A string\
    \ \"<broadcast>\", which specifies an INADDR_BROADCAST address.<br>- A zero-length\
    \ string, which specifies INADDR_ANY, or<br>- An Integer, interpreted as a binary\
    \ address in host byte order. |\n| 5 | **port**<br>Each server listens for clients\
    \ calling on one or more ports. A port may be a Fixnum port number, a string containing\
    \ a port number, or the name of a service. |\n\n## The *socket* Module\n\nTo create\
    \ a socket, you must use the `socket.socket()` function available in `socket`\
    \ module, which has the general syntax –\n\n```python\ns = socket.socket(socket_family,\
    \ socket_type, protocol=0)\n```\n\nHere is the description of the parameters –\n\
    \n- **socket_family** – This is either AF_UNIX or AF_INET, as explained earlier.\n\
    - **socket_type** – This is either SOCK_STREAM or SOCK_DGRAM.\n- **protocol**\
    \ – This is usually left out, defaulting to 0.\n\nOnce you have `socket` object,\
    \ then you can use required functions to create your client or server program.\
    \ Following is the list of functions required –\n\n## Server Socket Methods\n\n\
    | Sr.No. | Method & Description |\n| :--- | :--- |\n| 1 | **s.bind()**<br>This\
    \ method binds address (hostname, port number pair) to socket. |\n| 2 | **s.listen()**<br>This\
    \ method sets up and start TCP listener. |\n| 3 | **s.accept()**<br>This passively\
    \ accept TCP client connection, waiting until connection arrives (blocking). |\n\
    \n## Client Socket Methods\n\n| Sr.No. | Method & Description |\n| :--- | :---\
    \ |\n| 1 | **s.connect()**<br>This method actively initiates TCP server connection.\
    \ |\n\n## General Socket Methods\n\n| Sr.No. | Method & Description |\n| :---\
    \ | :--- |\n| 1 | **s.recv()**<br>This method receives TCP message |\n| 2 | **s.send()**<br>This\
    \ method transmits TCP message |\n| 3 | **s.recvfrom()**<br>This method receives\
    \ UDP message |\n| 4 | **s.sendto()**<br>This method transmits UDP message |\n\
    | 5 | **s.close()**<br>This method closes socket |\n| 6 | **socket.gethostname()**<br>Returns\
    \ the hostname. |\n\n## A Simple Server\n\nTo write Internet servers, we use the\
    \ **socket** function available in socket module to create a socket object. A\
    \ socket object is then used to call other functions to setup a socket server.\n\
    \nNow call **bind(hostname, port)** function to specify a *port* for your service\
    \ on the given host.\n\nNext, call the *accept* method of the returned object.\
    \ This method waits until a client connects to the port you specified, and then\
    \ returns a *connection* object that represents the connection to that client.\n\
    \n```python\n#!/usr/bin/python\n# This is server.py file\n\nimport socket  # Import\
    \ socket module\n\ns = socket.socket()  # Create a socket object\n\nhost = socket.gethostname()\
    \  # Get local machine name\n\nport = 12345  # Reserve a port for your service.\n\
    \ns.bind((host, port))  # Bind to the port\n\ns.listen(5)  # Now wait for client\
    \ connection.\n\nwhile True:\n    c, addr = s.accept()  # Establish connection\
    \ with client.\n    print 'Got connection from', addr\n    c.send('Thank you for\
    \ connecting')\n    c.close()  # Close the connection\n```\n\n## A Simple Client\n\
    \nLet us write a very simple client program which opens a connection to a given\
    \ port 12345 and given host. This is very simple to create a socket client using\
    \ Python's *socket* module function.\n\nThe **socket.connect(hostname, port)**\
    \ opens a TCP connection to *hostname* on the *port*. Once you have a socket open,\
    \ you can read from it like any IO object. When done, remember to close it, as\
    \ you would close a file."
  mdcn: "## 执行事务\n\n事务是一种确保数据一致性的机制。事务具有以下四个特性：\n\n- **原子性** – 事务要么完全完成，要么完全不发生。\n\
    - **一致性** – 事务必须从一个一致的状态开始，并在结束时使系统保持一致的状态。\n- **隔离性** – 事务的中间结果在当前事务之外不可见。\n\
    - **持久性** – 一旦事务被提交，其效果就是持久的，即使在系统故障后也是如此。\n\nPython DB API 2.0 提供了两种方法来*提交*或*回滚*事务。\n\
    \n## 示例\n\n你已经知道如何实现事务了。这里再给出一个类似的例子：\n\n```python\n# Prepare SQL query to DELETE\
    \ required records\nsql = \"DELETE FROM EMPLOYEE WHERE AGE > '%d'\" % (20)\ntry:\n\
    \    # Execute the SQL command\n    cursor.execute(sql)\n    # Commit your changes\
    \ in the database\n    db.commit()\nexcept:\n    # Rollback in case there is any\
    \ error\n    db.rollback()\n```\n\n## COMMIT 操作\n\n提交是向数据库发出最终确认更改信号的操作，执行此操作后，任何更改都无法回退。\n\
    \n这是一个调用 **commit** 方法的简单示例。\n\n```python\ndb.commit()\n```\n\n## ROLLBACK 操作\n\
    \n如果你对一个或多个更改不满意，并且希望完全回退这些更改，请使用 **rollback()** 方法。\n\n这是一个调用 **rollback()**\
    \ 方法的简单示例。\n\n```python\ndb.rollback()\n```\n\n## 断开数据库连接\n\n要断开数据库连接，请使用 close()\
    \ 方法。\n\n```python\ndb.close()\n```\n\n如果用户使用 close() 方法关闭了与数据库的连接，数据库会回滚任何未完成的事务。然而，与其依赖数据库底层的任何实现细节，你的应用程序最好显式地调用\
    \ commit 或 rollback。\n\n## 错误处理\n\n错误来源有很多。例如，执行的 SQL 语句中存在语法错误、连接失败，或者对已取消或已完成的语句句柄调用\
    \ fetch 方法。\n\nDB API 定义了许多必须存在于每个数据库模块中的错误。下表列出了这些异常。\n\n| 序号 | 异常与描述 |\n| :---\
    \ | :--- |\n| 1 | **Warning**<br>用于非致命问题。必须是 StandardError 的子类。 |\n| 2 | **Error**<br>错误的基类。必须是\
    \ StandardError 的子类。 |\n| 3 | **InterfaceError**<br>用于数据库模块本身的错误，而非数据库本身的错误。必须是\
    \ Error 的子类。 |\n| 4 | **DatabaseError**<br>用于数据库中的错误。必须是 Error 的子类。 |\n| 5 | **DataError**<br>DatabaseError\
    \ 的子类，指与数据相关的错误。 |\n| 6 | **OperationalError**<br>DatabaseError 的子类，指诸如与数据库连接丢失等错误。这些错误通常超出\
    \ Python 脚本编写者的控制范围。 |\n| 7 | **IntegrityError**<br>DatabaseError 的子类，用于可能损害关系完整性的情况，例如唯一性约束或外键。\
    \ |\n| 8 | **InternalError**<br>DatabaseError 的子类，指数据库模块内部的错误，例如游标不再处于活动状态。 |\n\
    | 9 | **ProgrammingError**<br>DatabaseError 的子类，指诸如错误的表名以及其他可以安全地归咎于你的错误。 |\n\
    | 10 | **NotSupportedError**<br>DatabaseError 的子类，指尝试调用不支持的功能。 |\n\n你的 Python\
    \ 脚本应该处理这些错误，但在使用上述任何异常之前，请确保你的 MySQLdb 支持该异常。你可以通过阅读 DB API 2.0 规范获取更多相关信息。\n\
    \n## Python - 网络编程\n\nPython 提供了两个级别的网络服务访问。在底层，你可以访问底层操作系统中的基本套接字支持，这允许你为面向连接和无连接的协议实现客户端和服务器。\n\
    \nPython 还提供了库，可以更高级地访问特定的应用层网络协议，例如 FTP、HTTP 等。\n\n本章将帮助你理解网络中最著名的概念——套接字编程。\n\
    \n## 什么是套接字？\n\n套接字是双向通信通道的端点。套接字可以在进程内、同一台机器上的进程之间，或不同大洲的进程之间进行通信。\n\n套接字可以通过多种不同的通道类型实现：Unix\
    \ 域套接字、TCP、UDP 等。*socket* 库提供了处理常见传输的特定类，以及处理其余部分的通用接口。\n\n套接字有其自己的术语：\n\n| 序号\
    \ | 术语与描述 |\n| :--- | :--- |\n| 1 | **Domain**<br>用作传输机制的协议族。这些值是常量，例如 AF_INET、PF_INET、PF_UNIX、PF_X25\
    \ 等。 |\n| 2 | **type**<br>两个端点之间的通信类型，对于面向连接的协议通常是 SOCK_STREAM，对于无连接的协议是 SOCK_DGRAM。\
    \ |\n| 3 | **protocol**<br>通常为零，可用于标识域和类型内的协议变体。 |\n| 4 | **hostname**<br>网络接口的标识符——<br>-\
    \ 一个字符串，可以是主机名、点分十进制地址或冒号（可能带点）表示法的 IPV6 地址<br>- 字符串 \"<broadcast>\"，指定 INADDR_BROADCAST\
    \ 地址。<br>- 零长度字符串，指定 INADDR_ANY，或<br>- 一个整数，解释为主机字节序的二进制地址。 |\n| 5 | **port**<br>每个服务器监听一个或多个端口上的客户端调用。端口可以是\
    \ Fixnum 端口号、包含端口号的字符串或服务名称。 |\n\n## *socket* 模块\n\n要创建套接字，你必须使用 `socket` 模块中可用的\
    \ `socket.socket()` 函数，其通用语法为：\n\n```python\ns = socket.socket(socket_family,\
    \ socket_type, protocol=0)\n```\n\n以下是参数的描述：\n\n- **socket_family** – 这是 AF_UNIX\
    \ 或 AF_INET，如前所述。\n- **socket_type** – 这是 SOCK_STREAM 或 SOCK_DGRAM。\n- **protocol**\
    \ – 通常省略，默认为 0。\n\n一旦你有了 `socket` 对象，就可以使用所需的函数来创建你的客户端或服务器程序。以下是所需的函数列表：\n\n\
    ## 服务器套接字方法\n\n| 序号 | 方法与描述 |\n| :--- | :--- |\n| 1 | **s.bind()**<br>此方法将地址（主机名、端口号对）绑定到套接字。\
    \ |\n| 2 | **s.listen()**<br>此方法设置并启动 TCP 监听器。 |\n| 3 | **s.accept()**<br>此方法被动接受\
    \ TCP 客户端连接，等待连接到达（阻塞）。 |\n\n## 客户端套接字方法\n\n| 序号 | 方法与描述 |\n| :--- | :--- |\n\
    | 1 | **s.connect()**<br>此方法主动发起与 TCP 服务器的连接。 |\n\n## 通用套接字方法\n\n| 序号 | 方法与描述\
    \ |\n| :--- | :--- |\n| 1 | **s.recv()**<br>此方法接收 TCP 消息。 |\n| 2 | **s.send()**<br>此方法发送\
    \ TCP 消息。 |\n| 3 | **s.recvfrom()**<br>此方法接收 UDP 消息。 |\n| 4 | **s.sendto()**<br>此方法发送\
    \ UDP 消息。 |\n| 5 | **s.close()**<br>此方法关闭套接字。 |\n| 6 | **socket.gethostname()**<br>返回主机名。\
    \ |\n\n## 一个简单的服务器\n\n要编写互联网服务器，我们使用 socket 模块中可用的 **socket** 函数来创建一个套接字对象。然后使用该套接字对象调用其他函数来设置套接字服务器。\n\
    \n现在调用 **bind(hostname, port)** 函数，为你的服务在给定主机上指定一个*端口*。\n\n接下来，调用返回对象的 *accept*\
    \ 方法。此方法会等待客户端连接到你指定的端口，然后返回一个代表与该客户端连接的 *connection* 对象。\n\n```python\n#!/usr/bin/python\n\
    # This is server.py file\n\nimport socket  # Import socket module\n\ns = socket.socket()\
    \  # Create a socket object\n\nhost = socket.gethostname()  # Get local machine\
    \ name\n\nport = 12345  # Reserve a port for your service.\n\ns.bind((host, port))\
    \  # Bind to the port\n\ns.listen(5)  # Now wait for client connection.\n\nwhile\
    \ True:\n    c, addr = s.accept()  # Establish connection with client.\n    print\
    \ 'Got connection from', addr\n    c.send('Thank you for connecting')\n    c.close()\
    \  # Close the connection\n```\n\n## 一个简单的客户端\n\n让我们编写一个非常简单的客户端程序，它打开一个到给定端口\
    \ 12345 和给定主机的连接。使用 Python 的 *socket* 模块函数创建套接字客户端非常简单。\n\n**socket.connect(hostname,\
    \ port)** 打开一个到 *hostname* 上 *port* 的 TCP 连接。一旦你打开了一个套接字，你就可以像读取任何 IO 对象一样从中读取。完成后，记得关闭它，就像关闭文件一样。"
