    ## Python - CGI Programming


    The Common Gateway Interface, or CGI, is a set of standards that define how information
    is exchanged between the web server and a custom script. The CGI specs are currently
    maintained by the NCSA.


    ## What is CGI?


    - The Common Gateway Interface, or CGI, is a standard for external gateway programs
    to interface with information servers such as HTTP servers.

    - The current version is CGI/1.1 and CGI/1.2 is under progress.


    ## Web Browsing


    To understand the concept of CGI, let us see what happens when we click a hyper
    link to browse a particular web page or URL.


    - Your browser contacts the HTTP web server and demands for the URL, i.e., filename.

    - Web Server parses the URL and looks for the filename. If it finds that file
    then sends it back to the browser, otherwise sends an error message indicating
    that you requested a wrong file.

    - Web browser takes response from web server and displays either the received
    file or error message.


    However, it is possible to set up the HTTP server so that whenever a file in a
    certain directory is requested that file is not sent back; instead it is executed
    as a program, and whatever that program outputs is sent back for your browser
    to display. This function is called the Common Gateway Interface or CGI and the
    programs are called CGI scripts. These CGI programs can be a Python Script, PERL
    Script, Shell Script, C or C++ program, etc.


    CGI Architecture Diagram


    ![](img/f3fd3d26c4b832ba0a33f80796bfd0c8_234_0.png)


    HTTP Protocol


    ## Web Server Support and Configuration


    Before you proceed with CGI Programming, make sure that your Web Server supports
    CGI and it is configured to handle CGI Programs. All the CGI Programs to be executed
    by the HTTP server are kept in a pre-configured directory. This directory is called
    CGI Directory and by convention it is named as /var/www/cgi-bin. By convention,
    CGI files have extension as **.cgi**, but you can keep your files with python
    extension **.py** as well.


    By default, the Linux server is configured to run only the scripts in the cgi-bin
    directory in /var/www. If you want to specify any other directory to run your
    CGI scripts, comment the following lines in the httpd.conf file –


    ```

    <Directory "/var/www/cgi-bin">

    AllowOverride None

    Options ExecCGI

    Order allow,deny

    Allow from all

    </Directory>


    <Directory "/var/www/cgi-bin">

    Options All

    </Directory>

    ```


    Here, we assume that you have Web Server up and running successfully and you are
    able to run any other CGI program like Perl or Shell, etc.


    ## First CGI Program


    Here is a simple link, which is linked to a CGI script called [hello.py](hello.py).
    This file is kept in /var/www/cgi-bin directory and it has following content.
    Before running your CGI program, make sure you have change mode of file using
    **chmod 755 hello.py** UNIX command to make file executable.


    ```

    #!/usr/bin/python


    print "Content-type:text/html\r\n\r\n"


    print ''<html>''


    print ''<head>''


    print ''<title>Hello World - First CGI Program</title>''


    print ''</head>''


    print ''<body>''


    print ''<h2>Hello World! This is my first CGI program</h2>''


    print ''</body>''


    print ''</html>''

    ```


    If you click hello.py, then this produces the following output –


    Hello World! This is my first CGI program


    This hello.py script is a simple Python script, which writes its output on STDOUT
    file, i.e., screen.


    There is one important and extra feature available which is first line to be printed
    **Content-type:text/html\r\n\r\n**. This line is sent back to the browser and
    it specifies the content type to be displayed on the browser screen.


    By now you must have understood basic concept of CGI and you can write many complicated
    CGI programs using Python. This script can interact with any other external system
    also to exchange information such as RDBMS.


    ## HTTP Header


    The line **Content-type:text/html\r\n\r\n** is part of HTTP header which is sent
    to the browser to understand the content. All the HTTP header will be in the following
    form –


    HTTP Field Name: Field Content


    For Example


    Content-type: text/html\r\n\r\n


    There are few other important HTTP headers, which you will use frequently in your
    CGI Programming.


    | Sr.No. | Header & Description |

    | :--- | :--- |

    | 1 | **Content-type:**<br>A MIME string defining the format of the file being
    returned. Example is Content-type:text/html |

    | 2 | **Expires: Date**<br>The date the information becomes invalid. It is used
    by the browser to decide when a page needs to be refreshed. A valid date string
    is in the format 01 Jan 1998 12:00:00 GMT. |

    | 3 | **Location: URL**<br>The URL that is returned instead of the URL requested.
    You can use this field to redirect a request to any file. |

    | 4 | **Last-modified: Date**<br>The date of last modification of the resource.
    |

    | 5 | **Content-length: N**<br>The length, in bytes, of the data being returned.
    The browser uses this value to report the estimated download time for a file.
    |

    | 6 | **Set-Cookie: String**<br>Set the cookie passed through the *string* |


    ## CGI Environment Variables


    All the CGI programs have access to the following environment variables. These
    variables play an important role while writing any CGI program.


    | Sr.No. | Variable Name & Description |

    | :--- | :--- |

    | 1 | **CONTENT_TYPE**<br>The data type of the content. Used when the client is
    sending attached content to the server. For example, file upload. |

    | 2 | **CONTENT_LENGTH**<br>The length of the query information. It is available
    only for POST requests. |

    | 3 | **HTTP_COOKIE**<br>Returns the set cookies in the form of key & value pair.
    |

    | 4 | **HTTP_USER_AGENT**<br>The User-Agent request-header field contains information
    about the user agent originating the request. It is name of the web browser. |

    | 5 | **PATH_INFO**<br>The path for the CGI script. |'
