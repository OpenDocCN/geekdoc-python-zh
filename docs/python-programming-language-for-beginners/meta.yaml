    ## Python 位运算符


    位运算符作用于位并逐位执行操作。假设 a = 60；b = 13；现在在二进制格式中，它们的值分别是 0011 1100 和 0000 1101。下表列出了
    Python 语言支持的位运算符，并为每个运算符提供了一个示例，我们使用上述两个变量（a 和 b）作为操作数 –


    ```

    a = 0011 1100

    b = 0000 1101

    ----------------

    a&b = 0000 1100

    a|b = 0011 1101

    a^b = 0011 0001

    ~a = 1100 0011

    ```


    Python 语言支持以下位运算符


    [ 显示示例 ]


    | 运算符 | 描述 | 示例 |

    | :--- | :--- | :--- |

    | & 按位与 | 如果位存在于两个操作数中，则将位复制到结果中 | (a & b) (意味着 0000 1100) |

    | \| 按位或 | 如果位存在于任一操作数中，则将其复制。 | (a \| b) = 61 (意味着 0011 1101) |

