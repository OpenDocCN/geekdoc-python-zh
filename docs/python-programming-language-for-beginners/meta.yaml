- md: '## Python Logical Operators


    There are following logical operators supported by Python language. Assume variable
    a holds 10 and variable b holds 20 then


    | Operator | Description | Example |

    | :--- | :--- | :--- |

    | and | Logical AND. If both the operands are true then condition becomes true.
    | (a and b) is true. |

    | or | Logical OR. If any of the two operands are non-zero then condition becomes
    true. | (a or b) is true. |

    | not | Logical NOT. Used to reverse the logical state of its operand. | Not(a
    and b) is false. |


    ## Python Membership Operators


    Python’s membership operators test for membership in a sequence, such as strings,
    lists, or tuples. There are two membership operators as explained below –


    | Operator | Description | Example |

    | :--- | :--- | :--- |

    | in | Evaluates to true if it finds a variable in the specified sequence and
    false otherwise. | x in y, here in results in a 1 if x is a member of sequence
    y. |

    | not in | Evaluates to true if it does not find a variable in the specified sequence
    and false otherwise. | x not in y, here not in results in a 1 if x is not a member
    of sequence y. |


    ## Python Identity Operators


    Identity operators compare the memory locations of two objects. There are two
    Identity operators explained below –


    | Operator | Description | Example |

    | :--- | :--- | :--- |

    | is | Evaluates to true if the variables on either side of the operator point
    to the same object and false otherwise. | x is y, here **is** results in 1 if
    id(x) equals id(y). |

    | is not | Evaluates to false if the variables on either side of the operator
    point to the same object and true otherwise. | x is not y, here **is not** results
    in 1 if id(x) is not equal to id(y). |


    ## Python Operators Precedence


    The following table lists all operators from highest precedence to lowest.


    | Sr.No. | Operator & Description |

    | :--- | :--- |

    | 1 | ** (Exponentiation (raise to the power)) |

    | 2 | ~ + - (Complement, unary plus and minus (method names for the last two are
    +@ and -@)) |

    | 3 | * / % // (Multiply, divide, modulo and floor division) |

    | 4 | + - (Addition and subtraction) |

    | 5 | >> << (Right and left bitwise shift) |

    | 6 | & (Bitwise ''AND'') |

    | 7 | ^ \| (Bitwise exclusive `OR'' and regular `OR'') |

    | 8 | <= < > >= (Comparison operators) |

    | 9 | <> == != (Equality operators) |

    | 10 | = %= /= //= -= += *= **= (Assignment operators) |

    | 11 | is is not (Identity operators) |

    | 12 | in not in (Membership operators) |

    | 13 | not or and (Logical operators) |


    ## Python - Decision Making


    Decision making is anticipation of conditions occurring while execution of the
    program and specifying actions taken according to the conditions.


    Decision structures evaluate multiple expressions which produce TRUE or FALSE
    as outcome.


    You need to determine which action to take and which statements to execute if
    outcome is TRUE or FALSE otherwise.


    Following is the general form of a typical decision making structure found in
    most of the programming languages –


    Python programming language assumes any **non-zero** and **non-null** values as
    TRUE, and if it is either **zero** or **null**, then it is assumed as FALSE value.


    Python programming language provides following types of decision making statements.
    Click the following links to check their detail.


    | Sr.No. | Statement & Description |

    | :--- | :--- |

    | 1 | [if statements](if statements) - An **if statement** consists of a boolean
    expression followed by one or more statements. |

    | 2 | [if...else statements](if...else statements) - An **if statement** can be
    followed by an optional **else statement**, which executes when the boolean expression
    is FALSE. |

    | 3 | [nested if statements](nested if statements) - You can use one **if** or
    **else if** statement inside another **if** or **else if** statement(s). |


    Let us go through each decision making briefly –


    ### Single Statement Suites


    If the suite of an **if** clause consists only of a single line, it may go on
    the same line as the header statement.


    Here is an example of a **one-line if** clause –


    ```python

    #!/usr/bin/python


    var = 100


    if ( var == 100 ) : print "Value of expression is 100"


    print "Good bye!"

    ```


    When the above code is executed, it produces the following result –


    Value of expression is 100


    Good bye!


    ## Python - Loops


    In general, statements are executed sequentially: The first statement in a function
    is executed first, followed by the second, and so on. There may be a situation
    when you need to execute a block of code several number of times.


    Programming languages provide various control structures that allow for more complicated
    execution paths.


    A loop statement allows us to execute a statement or group of statements multiple
    times. The following diagram illustrates a loop statement –


    Python programming language provides following types of loops to handle looping
    requirements.


    | Sr.No. | Loop Type & Description |

    | :--- | :--- |

    | 1 | [while loop](while loop) - Repeats a statement or group of statements while
    a given condition is TRUE. It tests the condition before executing the loop body.
    |

    | 2 | [for loop](for loop) - Executes a sequence of statements multiple times
    and abbreviates the code that manages the loop variable. |

    | 3 | [nested loops](nested loops) - You can use one or more loop inside any another
    while, for or do..while loop. |


    ### Loop Control Statements


    Loop control statements change execution from its normal sequence. When execution
    leaves a scope, all automatic objects that were created in that scope are destroyed.


    Python supports the following control statements. Click the following links to
    check their detail.


    Let us go through the loop control statements briefly


    | Sr.No. | Control Statement & Description |

    | :--- | :--- |

    | 1 | [break statement](https://www.google.com/search?q=break+statement) - Terminates
    the loop statement and transfers execution to the statement immediately following
    the loop. |

    | 2 | [continue statement](https://www.google.com/search?q=continue+statement)
    - Causes the loop to skip the remainder of its body and immediately retest its
    condition prior to reiterating. |

    | 3 | [pass statement](https://www.google.com/search?q=pass+statement) - The pass
    statement in Python is used when a statement is required syntactically but you
    do not want any command or code to execute. |


    ## Python - Numbers


    Number data types store numeric values. They are immutable data types, means that
    changing the value of a number data type results in a newly allocated object.


    Number objects are created when you assign a value to them. For example –


    ```python

    var1 = 1

    var2 = 10

    ```


    You can also delete the reference to a number object by using the **del** statement.
    The syntax of the del statement is –


    ```python

    del var1[,var2[,var3[....,varN]]]

    ```


    You can delete a single object or multiple objects by using the **del** statement.
    For example –


    ```python

    del var

    ```


    ```python

    del var_a, var_b

    ```


    Python supports four different numerical types –


    - **int (signed integers)** – They are often called just integers or ints, are
    positive or negative whole numbers with no decimal point.

    - **long (long integers)** – Also called longs, they are integers of unlimited
    size, written like integers and followed by an uppercase or lowercase L.

    - **float (floating point real values)** – Also called floats, they represent
    real numbers and are written with a decimal point dividing the integer and fractional
    parts. Floats may also be in scientific notation, with E or e indicating the power
    of 10 (2.5e2 = 2.5 x 102 = 250).

    - **complex (complex numbers)** – are of the form a + bJ, where a and b are floats
    and J (or j) represents the square root of -1 (which is an imaginary number).
    The real part of the number is a, and the imaginary part is b. Complex numbers
    are not used much in Python programming.


    ### Examples


    Here are some examples of numbers


    | int | long | float | complex |

    | :--- | :--- | :--- | :--- |

    | 10 | 51924361L | 0.0 | 3.14j |

    | 100 | -0x19323L | 15.20 | 45.j |

    | -786 | 0122L | -21.9 | 9.322e-36j |

    | 080 | 0xDEFABCECBDAECBFBAEL | 32.3+e18 | |'
  mdcn: '## Python 逻辑运算符


    Python 语言支持以下逻辑运算符。假设变量 `a` 的值为 10，变量 `b` 的值为 20，则：


    | 运算符 | 描述 | 示例 |

    | :--- | :--- | :--- |

    | and | 逻辑与。如果两个操作数都为真，则条件为真。 | (a and b) 为真。 |

    | or | 逻辑或。如果两个操作数中任意一个非零，则条件为真。 | (a or b) 为真。 |

    | not | 逻辑非。用于反转其操作数的逻辑状态。 | Not(a and b) 为假。 |


    ## Python 成员运算符


    Python 的成员运算符用于测试在序列（如字符串、列表或元组）中的成员资格。有两个成员运算符，如下所述：


    | 运算符 | 描述 | 示例 |

    | :--- | :--- | :--- |

    | in | 如果在指定的序列中找到变量，则计算结果为真，否则为假。 | x in y，如果 x 是序列 y 的成员，则 `in` 的结果为 1。 |

    | not in | 如果在指定的序列中未找到变量，则计算结果为真，否则为假。 | x not in y，如果 x 不是序列 y 的成员，则 `not in`
    的结果为 1。 |


    ## Python 身份运算符


    身份运算符比较两个对象的内存位置。有两个身份运算符，如下所述：


    | 运算符 | 描述 | 示例 |

    | :--- | :--- | :--- |

    | is | 如果运算符两侧的变量指向同一个对象，则计算结果为真，否则为假。 | x is y，如果 `id(x)` 等于 `id(y)`，则 **is**
    的结果为 1。 |

    | is not | 如果运算符两侧的变量指向同一个对象，则计算结果为假，否则为真。 | x is not y，如果 `id(x)` 不等于 `id(y)`，则
    **is not** 的结果为 1。 |


    ## Python 运算符优先级


    下表列出了所有运算符，从最高优先级到最低优先级。


    | 序号 | 运算符及描述 |

    | :--- | :--- |

    | 1 | ** (幂运算（求幂）) |

    | 2 | ~ + - (按位取反、一元正号和负号（后两者的名称分别为 +@ 和 -@）) |

    | 3 | * / % // (乘、除、取模和整除) |

    | 4 | + - (加法和减法) |

    | 5 | >> << (右移和左移位运算) |

    | 6 | & (按位与) |

    | 7 | ^ \| (按位异或和按位或) |

    | 8 | <= < > >= (比较运算符) |

    | 9 | <> == != (相等运算符) |

    | 10 | = %= /= //= -= += *= **= (赋值运算符) |

    | 11 | is is not (身份运算符) |

    | 12 | in not in (成员运算符) |

    | 13 | not or and (逻辑运算符) |


    ## Python - 判断


    判断是指在程序执行过程中预测条件的发生，并根据条件指定要采取的操作。


    判断结构会计算多个表达式，其结果为 TRUE 或 FALSE。


    你需要确定在结果为 TRUE 时采取哪个操作，以及在结果为 FALSE 时执行哪些语句。


    以下是大多数编程语言中典型的判断结构的一般形式：


    Python 编程语言将任何**非零**和**非空**值视为 TRUE，如果值为**零**或**空**，则视为 FALSE。


    Python 编程语言提供以下类型的判断语句。点击以下链接查看其详细信息。


    | 序号 | 语句及描述 |

    | :--- | :--- |

    | 1 | [if 语句](if statements) - **if 语句**由一个布尔表达式后跟一个或多个语句组成。 |

    | 2 | [if...else 语句](if...else statements) - **if 语句**后可以跟一个可选的 **else 语句**，当布尔表达式为
    FALSE 时执行。 |

    | 3 | [嵌套 if 语句](nested if statements) - 你可以在另一个 **if** 或 **else if** 语句内部使用一个
    **if** 或 **else if** 语句。 |


    让我们简要地了解每个判断语句：


    ### 单行语句套件


    如果 **if** 子句的套件仅由单行组成，它可以与头部语句放在同一行。


    这是一个**单行 if** 子句的示例：


    ```python

    #!/usr/bin/python


    var = 100


    if ( var == 100 ) : print "Value of expression is 100"


    print "Good bye!"

    ```


    当执行上述代码时，会产生以下结果：


    Value of expression is 100


    Good bye!


    ## Python - 循环


    通常，语句是按顺序执行的：函数中的第一条语句首先执行，然后是第二条，依此类推。有时你可能需要多次执行一段代码块。


    编程语言提供了各种控制结构，允许更复杂的执行路径。


    循环语句允许我们多次执行一条语句或一组语句。下图说明了一个循环语句：


    Python 编程语言提供以下类型的循环来处理循环需求。


    | 序号 | 循环类型及描述 |

    | :--- | :--- |

    | 1 | [while 循环](while loop) - 当给定条件为 TRUE 时，重复执行一条语句或一组语句。它在执行循环体之前测试条件。 |

    | 2 | [for 循环](for loop) - 多次执行一系列语句，并简化管理循环变量的代码。 |

    | 3 | [嵌套循环](nested loops) - 你可以在任何其他 while、for 或 do..while 循环内部使用一个或多个循环。 |


    ### 循环控制语句


    循环控制语句会改变其正常执行顺序。当执行离开一个作用域时，在该作用域内创建的所有自动对象都将被销毁。


    Python 支持以下控制语句。点击以下链接查看其详细信息。


    让我们简要地了解循环控制语句：


    | 序号 | 控制语句及描述 |

    | :--- | :--- |

    | 1 | [break 语句](https://www.google.com/search?q=break+statement) - 终止循环语句，并将执行转移到紧随循环之后的语句。
    |

    | 2 | [continue 语句](https://www.google.com/search?q=continue+statement) - 导致循环跳过其主体的剩余部分，并在重新迭代之前立即重新测试其条件。
    |

    | 3 | [pass 语句](https://www.google.com/search?q=pass+statement) - Python 中的 pass
    语句用于在语法上需要一条语句，但你不想执行任何命令或代码时使用。 |


    ## Python - 数字


    数字数据类型存储数值。它们是不可变数据类型，这意味着更改数字数据类型的值会导致新分配一个对象。


    当你为数字对象赋值时，它们就被创建了。例如：


    ```python

    var1 = 1

    var2 = 10

    ```


    你也可以使用 **del** 语句删除对数字对象的引用。**del** 语句的语法是：


    ```python

    del var1[,var2[,var3[....,varN]]]

    ```


    你可以使用 **del** 语句删除单个对象或多个对象。例如：


    ```python

    del var

    ```


    ```python

    del var_a, var_b

    ```


    Python 支持四种不同的数字类型：


    - **int（有符号整数）** – 通常称为整数或 ints，是正或负的整数，没有小数点。

    - **long（长整数）** – 也称为 longs，是大小无限制的整数，写法像整数，后跟一个大写或小写的 L。

    - **float（浮点实数值）** – 也称为 floats，表示实数，用小数点分隔整数部分和小数部分。浮点数也可以用科学计数法表示，其中 E 或 e 表示
    10 的幂（2.5e2 = 2.5 x 102 = 250）。

    - **complex（复数）** – 形式为 a + bJ，其中 a 和 b 是浮点数，J（或 j）表示 -1 的平方根（这是一个虚数）。数字的实部是 a，虚部是
    b。复数在 Python 编程中不常用。


    ### 示例


    以下是一些数字示例：


    | int | long | float | complex |

    | :--- | :--- | :--- | :--- |

    | 10 | 51924361L | 0.0 | 3.14j |

    | 100 | -0x19323L | 15.20 | 45.j |

    | -786 | 0122L | -21.9 | 9.322e-36j |

    | 080 | 0xDEFABCECBDAECBFBAEL | 32.3+e18 | |'
