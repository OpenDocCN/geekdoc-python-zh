    \     Employee.empCount += 1\n\n    def displayCount(self):\n        print \"\
    Total Employee %d\" % Employee.empCount\n\n    def displayEmployee(self):\n  \
    \      print \"Name : \", self.name, \", Salary: \", self.salary\n\n\"This would\
    \ create first object of Employee class\"\nemp1 = Employee(\"Zara\", 2000)\n\n\
    \"This would create second object of Employee class\"\nemp2 = Employee(\"Manni\"\
    , 5000)\n\nemp1.displayEmployee()\nemp2.displayEmployee()\nprint \"Total Employee\
    \ %d\" % Employee.empCount\n```\n\nWhen the above code is executed, it produces\
    \ the following result –\n\n```\nName : Zara ,Salary: 2000\nName : Manni ,Salary:\
    \ 5000\nTotal Employee 2\n```\n\nYou can add, remove, or modify attributes of\
    \ classes and objects at any time –\n\n```\nemp1.age = 7 # Add an 'age' attribute.\n\
    \nemp1.age = 8 # Modify 'age' attribute.\n\ndel emp1.age # Delete 'age' attribute.\n\
    ```\n\nInstead of using the normal statements to access attributes, you can use\
    \ the following functions\n\n- The **getattr(obj, name[, default])** – to access\
    \ the attribute of object.\n- The **hasattr(obj,name)** – to check if an attribute\
    \ exists or not.\n- The **setattr(obj,name,value)** – to set an attribute. If\
    \ attribute does not exist, then it would be created.\n- The **delattr(obj, name)**\
    \ – to delete an attribute.\n\n```\nhasattr(emp1, 'age') # Returns true if 'age'\
    \ attribute exists\n\ngetattr(emp1, 'age') # Returns value of 'age' attribute\n\
    \nsetattr(emp1, 'age', 8) # Set attribute 'age' at 8\n\ndelattr(emp1, 'age') #\
    \ Delete attribute 'age'\n```\n\n## Built-In Class Attributes\n\nEvery Python\
    \ class keeps following built-in attributes and they can be accessed using dot\
    \ operator like any other attribute –\n\n- **__dict__** – Dictionary containing\
    \ the class's namespace.\n- **__doc__** – Class documentation string or none,\
    \ if undefined.\n- **__name__** - Class name.\n- **__module__** - Module name\
    \ in which the class is defined. This attribute is \"__main__\" in interactive\
    \ mode.\n- **__bases__** - A possibly empty tuple containing the base classes,\
    \ in the order of their occurrence in the base class list.\n\nFor the above class\
    \ let us try to access all these attributes –\n\n[Live Demo](http://)\n\n```\n\
    #!/usr/bin/python\n\nclass Employee:\n    'Common base class for all employees'\n\
