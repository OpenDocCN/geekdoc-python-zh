    ## Python - Modules\n\nA module allows you to logically organize your Python code.\
    \ Grouping related code into a module makes the code easier to understand and\
    \ use. A module is a Python object with arbitrarily named attributes that you\
    \ can bind and reference.\n\nSimply, a module is a file consisting of Python code.\
    \ A module can define functions, classes and variables. A module can also include\
    \ runnable code.\n\n## Example\n\nThe Python code for a module named *aname* normally\
    \ resides in a file named *aname.py*. Here's an example of a simple module, support.py\n\
    \n```python\ndef print_func( par ):\n    print \"Hello : \", par\n    return\n\
    ```\n\n## The *import* Statement\n\nYou can use any Python source file as a module\
    \ by executing an import statement in some other Python source file. The *import*\
    \ has the following syntax –\n\n```python\nimport module1[, module2[,… moduleN]]\n\
    ```\n\nWhen the interpreter encounters an import statement, it imports the module\
    \ if the module is present in the search path. A search path is a list of directories\
    \ that the interpreter searches before importing a module. For example, to import\
    \ the module support.py, you need to put the following command at the top of the\
    \ script –\n\n```python\n#!/usr/bin/python\n\n# Import module support\nimport\
    \ support\n\n# Now you can call defined function that module as follows\nsupport.print_func(\"\
    Zara\")\n```\n\nWhen the above code is executed, it produces the following result\
    \ –\n\n```\nHello : Zara\n```\n\nA module is loaded only once, regardless of the\
    \ number of times it is imported. This prevents the module execution from happening\
    \ over and over again if multiple imports occur.\n\n## The *from...import* Statement\n\
    \nPython's *from* statement lets you import specific attributes from a module\
    \ into the current namespace. The *from...import* has the following syntax –\n\
    \n```python\nfrom modname import name1[, name2[, ... nameN]]\n```\n\nFor example,\
    \ to import the function fibonacci from the module fib, use the following statement\
    \ –\n\n```python\nfrom fib import fibonacci\n```\n\nThis statement does not import\
    \ the entire module fib into the current namespace; it just introduces the item\
    \ fibonacci from the module fib into the global symbol table of the importing\
    \ module.\n\n## The *from...import* * Statement\n\nIt is also possible to import\
    \ all names from a module into the current namespace by using the following import\
    \ statement –\n\n```python\nfrom modname import *\n```\n\nThis provides an easy\
    \ way to import all the items from a module into the current namespace; however,\
    \ this statement should be used sparingly.\n\n## Locating Modules\n\nWhen you\
    \ import a module, the Python interpreter searches for the module in the following\
    \ sequences –\n\n- The current directory.\n- If the module isn't found, Python\
    \ then searches each directory in the shell variable"
