    \    ......................\nexcept ExceptionI:\n    If there is ExceptionI, then\
    \ execute this block.\nexcept ExceptionII:\n    If there is ExceptionII, then\
    \ execute this block.\n....................\nelse:\n    If there is no exception\
    \ then execute this block.\n```\n\nHere are few important points about the above-mentioned\
    \ syntax –\n\n- A single try statement can have multiple except statements. This\
    \ is useful when the try block contains statements that may throw different types\
    \ of exceptions.\n- You can also provide a generic except clause, which handles\
    \ any exception.\n- After the except clause(s), you can include an else-clause.\
    \ The code in the else-block executes if the code in the try: block does not raise\
    \ an exception.\n- The else-block is a good place for code that does not need\
    \ the try: block's protection.\n\n## Example\n\nThis example opens a file, writes\
    \ content in the file and comes out gracefully because there is no problem at\
    \ all –\n\n[Live Demo](http://)\n\n```python\n#!/usr/bin/python\n\ntry:\n    fh\
    \ = open(\"testfile\", \"w\")\n    fh.write(\"This is my test file for exception\
    \ handling!!\")\nexcept IOError:\n    print \"Error: can't find file or read data\"\
    \nelse:\n    print \"Written content in the file successfully\"\n    fh.close()\n\
    ```\n\nThis produces the following result –\n\n```\nWritten content in the file\
    \ successfully\n```\n\n## Example\n\nThis example tries to open a file where you\
    \ do not have write permission, so it raises an exception.\n\n[Live Demo](http://)\n\
    \n```python\n#!/usr/bin/python\n\ntry:\n    fh = open(\"testfile\", \"r\")\n \
    \   fh.write(\"This is my test file for exception handling!!\")\nexcept IOError:\n\
    \    print \"Error: can't find file or read data\"\nelse:\n    print \"Written\
    \ content in the file successfully\"\n```\n\nThis produces the following result\
    \ –\n\n```\nError: can't find file or read data\n```\n\n## The *except* Clause\
    \ with No Exceptions\n\nYou can also use the except statement with no exceptions\
    \ defined as follows –\n\n```python\ntry:\n    You do your operations here;\n\
    \    .....................\nexcept:\n    If there is any exception, then execute\
    \ this block.\n    ....................\nelse:\n    If there is no exception then\
    \ execute this block.\n```\n\nThis kind of a **try-except** statement catches\
    \ all the exceptions that occur. Using this kind of try-except statement is not\
    \ considered a good programming practice though, because it catches all exceptions\
    \ but does not make the programmer identify the root cause of the problem that\
    \ may occur.\n\n## The *except* Clause with Multiple Exceptions\n\nYou can also\
    \ use the same *except* statement to handle multiple exceptions as follows –\n\
    \n```python\ntry:\n    You do your operations here;\n    ....................\n\
    except(Exception1[, Exception2[,…ExceptionN]]):\n    If there is any exception\
    \ from the given exception list,\n    then execute this block.\n    ....................\n\
    else:\n    If there is no exception then execute this block.\n```\n\n## The try-finally\
    \ Clause\n\nYou can use a **finally:** block along with a **try:** block. The\
    \ finally block is a place to put any code that must execute, whether the try-block\
    \ raised an exception or not. The syntax of the try-finally statement is this\
    \ –\n\n```python\ntry:\n    You do your operations here;\n    .........................\n\
    \    Due to any exception, this may be skipped.\nfinally:\n    This would always\
    \ be executed.\n    .........................\n```\n\nYou cannot use *else* clause\
    \ as well along with a finally clause.\n\n## Example\n\n[Live Demo](http://)\n\
    \n```python\n#!/usr/bin/python\n\ntry:\n    fh = open(\"testfile\", \"w\")\n \
    \   fh.write(\"This is my test file for exception handling!!\")\nfinally:\n  \
    \  print \"Error: can't find file or read data\"\n```\n\nIf you do not have permission\
    \ to open the file in writing mode, then this will produce the following result\
    \ –\n\n```\nError: can't find file or read data\n```\n\nSame example can be written\
    \ more cleanly as follows –\n\n[Live Demo](http://)\n\n```python\n#!/usr/bin/python\n\
    \ntry:\n    fh = open(\"testfile\", \"w\")\n    try:\n        fh.write(\"This\
    \ is my test file for exception handling!!\")\n    finally:\n        print \"\
    Going to close the file\"\n        fh.close()\nexcept IOError:\n    print \"Error:\
    \ can't find file or read data\"\n```\n\nWhen an exception is thrown in the *try*\
    \ block, the execution immediately passes to the *finally* block. After all the\
    \ statements in the *finally* block are executed, the exception is raised again\
    \ and is handled in the *except* statements if present in the next higher layer\
    \ of the *try-except* statement.\n\n## Argument of an Exception\n\nAn exception\
    \ can have an *argument*, which is a value that gives additional information about\
    \ the problem. The contents of the argument vary by exception. You capture an\
    \ exception's argument by supplying a variable in the except clause as follows\
    \ –\n\n```python\ntry:\n    You do your operations here;\n    ......................\n\
    except ExceptionType, Argument:\n    You can print value of Argument here...\n\
    ```\n\nIf you write the code to handle a single exception, you can have a variable\
    \ follow the name of the exception in the except statement. If you are trapping\
    \ multiple exceptions, you can have a variable follow the tuple of the exception.\n\
    \nThis variable receives the value of the exception mostly containing the cause\
    \ of the exception.\n\nThe variable can receive a single value or multiple values\
    \ in the form of a tuple. This tuple usually contains the error string, the error\
    \ number, and an error location.\n\n## Example\n\nFollowing is an example for\
    \ a single exception –\n\n[Live Demo](http://)\n\n```python\n#!/usr/bin/python\n\
    \n# Define a function here.\ndef temp_convert(var):\n    try:\n        return\
    \ int(var)\n    except ValueError, Argument:\n        print \"The argument does\
    \ not contain numbers\\n\", Argument\n\n# Call above function here.\ntemp_convert(\"\
    xyz\");\n```\n\nThis produces the following result –\n\n```\nThe argument does\
    \ not contain numbers\ninvalid literal for int() with base 10: 'xyz'\n```\n\n\
    ## Raising an Exception\n\nYou can raise exceptions in several ways by using the\
    \ raise statement. The general syntax for the **raise** statement is as follows.\n\
    \n### Syntax\n\n```python\nraise [Exception [, args [, traceback]]]\n```\n\nHere,\
    \ *Exception* is the type of exception (for example, NameError) and *argument*\
    \ is a value for the exception argument. The argument is optional; if not supplied,\
    \ the exception argument is None.\n\nThe final argument, traceback, is also optional\
    \ (and rarely used in practice), and if present, is the traceback object used\
    \ for the exception.\n\n## Example\n\nAn exception can be a string, a class or\
    \ an object. Most of the exceptions that the Python core raises are classes, with\
    \ an argument that is an instance of the class. Defining new exceptions is quite\
    \ easy and can be done as follows –\n\n```python\ndef functionName( level ):\n\
    \    if level < 1:\n        raise \"Invalid level!\", level\n        # The code\
    \ below to this would not be executed\n        # if we raise the exception\n```\n\
    \n**Note:** In order to catch an exception, an \"except\" clause must refer to\
    \ the same exception thrown either class object or simple string. For example,\
    \ to capture above exception, we must write the except clause as follows –\n\n\
    ```python\ntry:\n    Business Logic here...\nexcept \"Invalid level!\":\n    Exception\
    \ handling here...\nelse:\n    Rest of the code here...\n```\n\n## User-Defined\
    \ Exceptions\n\nPython also allows you to create your own exceptions by deriving\
    \ classes from the standard built-in exceptions.\n\nHere is an example related\
    \ to *RuntimeError*. Here, a class is created that is subclassed from *RuntimeError*.\
    \ This is useful when you need to display more specific information when an exception\
    \ is caught.\n\nIn the try block, the user-defined exception is raised and caught\
    \ in the except block. The variable `e` is used to create an instance of the class\
    \ *Networkerror*.\n\n```python\nclass Networkerror(RuntimeError):\n    def __init__(self,\
    \ arg):\n        self.args = arg\n```\n\nSo once you defined above class, you\
    \ can raise the exception as follows –\n\n```python\ntry:\n    raise Networkerror(\"\
    Bad hostname\")\nexcept Networkerror,e:\n    print e.args\n```\n\n## Python -\
    \ Object Oriented\n\nPython has been an object-oriented language since it existed.\
    \ Because of this, creating and using classes and objects are downright easy.\
    \ This chapter helps you become an expert in using Python's object-oriented programming\
    \ support."
