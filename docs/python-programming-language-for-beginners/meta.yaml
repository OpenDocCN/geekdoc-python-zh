    \nimport Tkinter\n\ntop = Tkinter.Tk()\n\n# Code to add widgets will go here...\n\
    \ntop.mainloop()\n```\n\nThis would create a following window –\n\n## Tkinter\
    \ Widgets\n\nTkinter provides various controls, such as buttons, labels and text\
    \ boxes used in a GUI application. These controls are commonly called widgets.\n\
    \nThere are currently 15 types of widgets in Tkinter. We present these widgets\
    \ as well as a brief description in the following table –\n\n| Sr.No. | Widget\
