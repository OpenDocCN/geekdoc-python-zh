    \ '__doc__': 'Common base class for all employees', '__init__': <function __init__\
    \ at 0xb7c846bc>}\n```\n\n## Destroying Objects (Garbage Collection)\n\nPython\
    \ deletes unneeded objects (built-in types or class instances) automatically to\
    \ free the memory space. The process by which Python periodically reclaims blocks\
    \ of memory that no longer are in use is termed Garbage Collection.\n\nPython's\
    \ garbage collector runs during program execution and is triggered when an object's\
    \ reference count reaches zero. An object's reference count changes as the number\
    \ of aliases that point to it changes.\n\nAn object's reference count increases\
    \ when it is assigned a new name or placed in a container (list, tuple, or dictionary).\
    \ The object's reference count decreases when it's deleted with *del*, its reference\
    \ is reassigned, or its reference goes out of scope. When an object's reference\
    \ count reaches zero, Python collects it automatically.\n\n```\na = 40 # Create\
    \ object <40>\n\nb = a # Increase ref. count of <40>\n\nc = [b] # Increase ref.\
    \ count of <40>\n\ndel a # Decrease ref. count of <40>\n\nb = 100 # Decrease ref.\
    \ count of <40>\n\nc[0] = -1 # Decrease ref. count of <40>\n```\n\nYou normally\
    \ will not notice when the garbage collector destroys an orphaned instance and\
    \ reclaims its space. But a class can implement the special method __del__(),\
    \ called a destructor, that is invoked when the instance is about to be destroyed.\
    \ This method might be used to clean up any non memory resources used by an instance.\n\
    \n## Example\n\nThis __del__() destructor prints the class name of an instance\
    \ that is about to be destroyed –\n\n[Live Demo](http://)"
  mdcn: "如果你之前没有任何面向对象（OO）编程的经验，你可能需要查阅相关的入门课程或至少某种教程，以便掌握基本概念。\n\n不过，这里简要介绍一下面向对象编程（OOP），帮助你快速上手——\n\
    \n## OOP 术语概述\n\n- **类** – 用户定义的对象原型，它定义了一组属性，这些属性表征了该类的任何对象。属性包括数据成员（类变量和实例变量）以及方法，通过点号表示法访问。\n\
    - **类变量** – 由类的所有实例共享的变量。类变量在类内部定义，但在任何类方法之外。类变量的使用频率不如实例变量。\n- **数据成员** – 保存与类及其对象相关数据的类变量或实例变量。\n\
    - **函数重载** – 为特定函数分配多个行为。执行的操作因涉及的对象或参数类型而异。\n- **实例变量** – 在方法内部定义，仅属于类的当前实例的变量。\n\
    - **继承** – 将一个类的特性传递给从它派生的其他类。\n- **实例** – 某个类的单个对象。例如，属于 Circle 类的对象 obj 就是 Circle\
    \ 类的一个实例。\n- **实例化** – 创建类的实例。\n- **方法** – 在类定义中定义的一种特殊函数。\n- **对象** – 由其类定义的数据结构的唯一实例。对象包含数据成员（类变量和实例变量）以及方法。\n\
    - **运算符重载** – 为特定运算符分配多个函数。\n\n## 创建类\n\n*class* 语句创建一个新的类定义。类的名称紧跟在关键字 *class*\
    \ 之后，然后是一个冒号，如下所示——\n\n```\nclass ClassName:\n    'Optional class documentation\
    \ string'\n    class_suite\n```\n\n- 该类有一个文档字符串，可以通过 *ClassName.__doc__* 访问。\n\
    - *class_suite* 包含定义类成员、数据属性和函数的所有组成语句。\n\n## 示例\n\n以下是一个简单的 Python 类示例——\n\n\
    ```\nclass Employee:\n    'Common base class for all employees'\n    empCount\
    \ = 0\n\n    def __init__(self, name, salary):\n        self.name = name\n   \
    \     self.salary = salary\n        Employee.empCount += 1\n\n    def displayCount(self):\n\
    \        print \"Total Employee %d\" % Employee.empCount\n\n    def displayEmployee(self):\n\
    \        print \"Name : \", self.name, \", Salary: \", self.salary\n```\n\n- 变量\
    \ *empCount* 是一个类变量，其值在该类的所有实例之间共享。可以在类内部或外部通过 *Employee.empCount* 访问。\n- 第一个方法\
    \ *__init__()* 是一个特殊方法，被称为类构造函数或初始化方法，当你创建该类的新实例时，Python 会调用它。\n- 你可以像声明普通函数一样声明其他类方法，不同之处在于每个方法的第一个参数是\
    \ *self*。Python 会自动将 *self* 参数添加到列表中；调用方法时不需要包含它。\n\n## 创建实例对象\n\n要创建类的实例，你需要使用类名调用该类，并传入其\
    \ __init__ 方法接受的任何参数。\n\n“这将创建 Employee 类的第一个对象”\n\n```\nemp1 = Employee(\"Zara\"\
    , 2000)\n```\n\n“这将创建 Employee 类的第二个对象”\n\n```\nemp2 = Employee(\"Manni\", 5000)\n\
    ```\n\n## 访问属性\n\n你可以使用点运算符和对象来访问对象的属性。类变量将使用类名访问，如下所示——\n\n```\nemp1.displayEmployee()\n\
    emp2.displayEmployee()\nprint \"Total Employee %d\" % Employee.empCount\n```\n\
    \n现在，将所有概念整合在一起——\n\n[在线演示](http://)\n\n```\n#!/usr/bin/python\n\nclass Employee:\n\
    \    'Common base class for all employees'\n    empCount = 0\n\n    def __init__(self,\
    \ name, salary):\n        self.name = name\n        self.salary = salary\n   \
    \     Employee.empCount += 1\n\n    def displayCount(self):\n        print \"\
    Total Employee %d\" % Employee.empCount\n\n    def displayEmployee(self):\n  \
    \      print \"Name : \", self.name, \", Salary: \", self.salary\n\n\"This would\
    \ create first object of Employee class\"\nemp1 = Employee(\"Zara\", 2000)\n\n\
    \"This would create second object of Employee class\"\nemp2 = Employee(\"Manni\"\
    , 5000)\n\nemp1.displayEmployee()\nemp2.displayEmployee()\nprint \"Total Employee\
    \ %d\" % Employee.empCount\n```\n\n执行上述代码后，将产生以下结果——\n\n```\nName : Zara ,Salary:\
    \ 2000\nName : Manni ,Salary: 5000\nTotal Employee 2\n```\n\n你可以随时添加、删除或修改类和对象的属性——\n\
    \n```\nemp1.age = 7 # Add an 'age' attribute.\n\nemp1.age = 8 # Modify 'age' attribute.\n\
    \ndel emp1.age # Delete 'age' attribute.\n```\n\n除了使用普通语句访问属性外，你还可以使用以下函数\n\n\
    - **getattr(obj, name[, default])** – 访问对象的属性。\n- **hasattr(obj,name)** – 检查属性是否存在。\n\
    - **setattr(obj,name,value)** – 设置属性。如果属性不存在，则会创建它。\n- **delattr(obj, name)**\
    \ – 删除属性。\n\n```\nhasattr(emp1, 'age') # Returns true if 'age' attribute exists\n\
    \ngetattr(emp1, 'age') # Returns value of 'age' attribute\n\nsetattr(emp1, 'age',\
    \ 8) # Set attribute 'age' at 8\n\ndelattr(emp1, 'age') # Delete attribute 'age'\n\
    ```\n\n## 内置类属性\n\n每个 Python 类都保留以下内置属性，可以像访问任何其他属性一样使用点运算符访问它们——\n\n- **__dict__**\
    \ – 包含类命名空间的字典。\n- **__doc__** – 类文档字符串，如果未定义则为 none。\n- **__name__** - 类名。\n\
    - **__module__** - 定义类的模块名。在交互模式下，此属性为 \"__main__\"。\n- **__bases__** - 一个可能为空的元组，包含基类，按其在基类列表中出现的顺序排列。\n\
    \n对于上面的类，让我们尝试访问所有这些属性——\n\n[在线演示](http://)\n\n```\n#!/usr/bin/python\n\nclass\
    \ Employee:\n    'Common base class for all employees'\n    empCount = 0\n\n \
    \   def __init__(self, name, salary):\n        self.name = name\n        self.salary\
    \ = salary\n        Employee.empCount += 1\n\n    def displayCount(self):\n  \
    \      print \"Total Employee %d\" % Employee.empCount\n\n    def displayEmployee(self):\n\
    \        print \"Name : \", self.name, \", Salary: \", self.salary\n\nprint \"\
    Employee.__doc__:\", Employee.__doc__\nprint \"Employee.__name__:\", Employee.__name__\n\
    print \"Employee.__module__:\", Employee.__module__\nprint \"Employee.__bases__:\"\
    , Employee.__bases__\nprint \"Employee.__dict__:\", Employee.__dict__\n```\n\n\
    执行上述代码后，将产生以下结果——\n\n```\nEmployee.__doc__: Common base class for all employees\n\
    Employee.__name__: Employee\nEmployee.__module__: __main__\nEmployee.__bases__:\
    \ ()\nEmployee.__dict__: {'__module__': '__main__', 'displayCount': <function\
    \ displayCount at 0xb7c84994>, 'empCount': 2, 'displayEmployee': <function displayEmployee\
    \ at 0xb7c8441c>, '__doc__': 'Common base class for all employees', '__init__':\
    \ <function __init__ at 0xb7c846bc>}\n```\n\n## 销毁对象（垃圾回收）\n\nPython 会自动删除不再需要的对象（内置类型或类实例）以释放内存空间。Python\
    \ 定期回收不再使用的内存块的过程称为垃圾回收。\n\nPython 的垃圾回收器在程序执行期间运行，当对象的引用计数达到零时触发。对象的引用计数会随着指向它的别名数量的变化而变化。\n\
    \n当对象被赋予新名称或放入容器（列表、元组或字典）时，其引用计数会增加。当对象被 *del* 删除、其引用被重新赋值或其引用超出作用域时，其引用计数会减少。当对象的引用计数达到零时，Python\
    \ 会自动回收它。\n\n```\na = 40 # Create object <40>\n\nb = a # Increase ref. count of\
    \ <40>\n\nc = [b] # Increase ref. count of <40>\n\ndel a # Decrease ref. count\
    \ of <40>\n\nb = 100 # Decrease ref. count of <40>\n\nc[0] = -1 # Decrease ref.\
    \ count of <40>\n```\n\n通常，你不会注意到垃圾回收器何时销毁孤立的实例并回收其空间。但是，一个类可以实现特殊方法 __del__()，称为析构函数，该方法在实例即将被销毁时被调用。此方法可用于清理实例使用的任何非内存资源。\n\
    \n## 示例\n\n这个 __del__() 析构函数会打印即将被销毁的实例的类名——\n\n[在线演示](http://)"
