    ```\n\n## 匹配与搜索\n\nPython提供了两种基于正则表达式的不同基本操作：**匹配**仅检查字符串开头的匹配，而**搜索**检查字符串中任何位置的匹配（这是Perl默认的行为）。\n\
    \n## 示例\n\n[在线演示](http://www.tutorialspoint.com/python3/online_result.php?filename=reg_example1)\n\
    \n```python\n#!/usr/bin/python\nimport re\n\nline = \"Cats are smarter than dogs\"\
    ;\nmatchObj = re.match( r'dogs', line, re.M|re.I)\nif matchObj:\n    print \"\
    match --> matchObj.group() : \", matchObj.group()\nelse:\n    print \"No match!!\"\
    \nsearchObj = re.search( r'dogs', line, re.M|re.I)\nif searchObj:\n    print \"\
    search --> searchObj.group() : \", searchObj.group()\nelse:\n    print \"Nothing\
    \ found!!\"\n```\n\n执行上述代码后，产生以下结果 –\n\n```\nNo match!!\nsearch --> searchObj.group()\
    \ : dogs\n```\n\n## 搜索与替换\n\n使用正则表达式的最重要的**re**方法之一是**sub**。\n\n### 语法\n\n```\n\
    re.sub(pattern, repl, string, max=0)\n```\n\n此方法将*字符串*中所有出现的正则表达式*模式*替换为*repl*，除非提供了*max*，否则替换所有出现。此方法返回修改后的字符串。\n\
    \n## 示例\n\n[在线演示](Live Demo)\n\n```python\n#!/usr/bin/python\n\nimport re\n\n\
