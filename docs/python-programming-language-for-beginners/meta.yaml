    \ '%s', '%d', '%c', '%d' )\" % \\n('Mac', 'Mohan', 20, 'M', 2000)\n\ntry:\n  \
    \  # 执行SQL命令\n    cursor.execute(sql)\n\n    # 提交到数据库\n    db.commit()\nexcept:\n\
    \    # 如果发生错误，则回滚\n    db.rollback()\n\n# 断开与服务器的连接\ndb.close()\n```\n\n### 示例\n\
    \n以下代码段是另一种执行形式，您可以直接传递参数 –\n\n```\n....................................\n\nuser_id\
    \ = \"test123\"\n\npassword = \"password\"\n\ncon.execute('insert into Login values(\"\
    %s\", \"%s\")' % \\ (user_id, password))\n\n....................................\n\
    ```\n\n## READ操作\n\n对任何数据库的READ操作意味着从数据库中获取一些有用的信息。\n\n一旦建立了数据库连接，您就可以对该数据库进行查询。\n\
    \n您可以使用**fetchone()**方法获取单条记录，或使用**fetchall()**方法从数据库表中获取多个值。\n\n- **fetchone()**\
    \ – 它获取查询结果集的下一行。结果集是当游标对象用于查询表时返回的对象。\n- **fetchall()** – 它获取结果集中的所有行。如果某些行已从结果集中提取，则它从结果集中检索剩余的行。\n\
    - **rowcount** – 这是一个只读属性，返回受execute()方法影响的行数。\n\n### 示例\n\n以下过程查询EMPLOYEE表中所有工资超过1000的记录\
    \ –\n\n```\n#!/usr/bin/python\n\nimport MySQLdb\n\n# 打开数据库连接\ndb = MySQLdb.connect(\"\
    localhost\",\"testuser\",\"test123\",\"TESTDB\" )\n\n# 使用cursor()方法准备一个游标对象\n\
    cursor = db.cursor()\n\nsql = \"SELECT * FROM EMPLOYEE \\nWHERE INCOME > '%d'\"\
    \ % (1000)\n\ntry:\n    # 执行SQL命令\n    cursor.execute(sql)\n\n    # 以列表的列表形式获取所有行。\n\
    \    results = cursor.fetchall()\n\n    for row in results:\n        fname = row[0]\n\
    \        lname = row[1]\n        age = row[2]\n        sex = row[3]\n        income\
    \ = row[4]\n        # 现在打印获取的结果\n        print \"fname=%s,lname=%s,age=%d,sex=%s,income=%d\"\
    \ % \\n          (fname, lname, age, sex, income )\nexcept:\n    print \"Error:\
    \ unable to fetch data\"\n\n# 断开与服务器的连接\ndb.close()\n```\n\n这将产生以下结果 –\n\nfname=Mac,\
    \ lname=Mohan, age=20, sex=M, income=2000\n\n## UPDATE操作\n\n对任何数据库的UPDATE操作意味着更新数据库中已存在的一条或多条记录。\n\
    \n以下过程更新所有SEX为'M'的记录。在这里，我们将所有男性的AGE增加一岁。\n\n### 示例\n\n```\n#!/usr/bin/python\n\
    import MySQLdb\n\n# 打开数据库连接\ndb = MySQLdb.connect(\"localhost\",\"testuser\",\"\
    test123\",\"TESTDB\" )\n\n# 使用cursor()方法准备一个游标对象\ncursor = db.cursor()\n\n# 准备SQL查询以更新所需记录\n\
    sql = \"UPDATE EMPLOYEE SET AGE = AGE + 1\nWHERE SEX = '%c'\" % ('M')\n\ntry:\n\
    \    # 执行SQL命令\n    cursor.execute(sql)\n\n    # 提交到数据库\n    db.commit()\nexcept:\n\
    \    # 如果发生错误，则回滚\n    db.rollback()\n\n# 断开与服务器的连接\ndb.close()\n```\n\n## DELETE操作\n\
    \n当您想从数据库中删除一些记录时，需要DELETE操作。\n\n以下是从EMPLOYEE中删除所有AGE大于20的记录的过程 –\n\n### 示例\n\n\
    ```\n#!/usr/bin/python\n\nimport MySQLdb\n\n# 打开数据库连接\ndb = MySQLdb.connect(\"\
    localhost\",\"testuser\",\"test123\",\"TESTDB\" )\n\n# 使用cursor()方法准备一个游标对象\n\
    cursor = db.cursor()\n\n# 准备SQL查询以删除所需记录\nsql = \"DELETE FROM EMPLOYEE WHERE AGE\
    \ > '%d'\" % (20)\n\ntry:\n    # 执行SQL命令\n    cursor.execute(sql)\n\n    # 提交到数据库\n\
    \    db.commit()\n```"
