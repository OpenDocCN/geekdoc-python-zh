    \ 是一个特殊的字符序列，它帮助你使用模式中包含的专门语法来匹配或查找其他字符串或字符串集合。正则表达式在 UNIX 世界中被广泛使用。\n\nPython\
    \ 模块 **re** 提供了对 Perl 风格正则表达式的全面支持。如果在编译或使用正则表达式时发生错误，re 模块会引发 re.error 异常。\n\n\
    我们将介绍两个重要的函数，它们将用于处理正则表达式。\n\n但首先说一件小事：有一些字符在正则表达式中使用时具有特殊含义。为了避免在处理正则表达式时产生任何混淆，我们将使用原始字符串，即\
    \ **r'expression'**。\n\n### *match* 函数\n\n此函数尝试将正则表达式 *pattern* 与 *string* 进行匹配，可选参数为\
    \ *flags*。\n\n以下是此函数的语法 –\n\n```\nre.match(pattern, string, flags=0)\n```\n\n\
    以下是参数的描述 –\n\n| 序号 | 参数与描述 |\n| :--- | :--- |\n| 1 | **pattern**<br>这是要匹配的正则表达式。\
    \ |\n| 2 | **string**<br>这是要搜索的字符串，将在字符串开头匹配模式。 |\n| 3 | **flags**<br>你可以使用按位或（|）指定不同的标志。这些是修饰符，列在下表中。\
    \ |\n\n*re.match* 函数成功时返回一个 **match** 对象，失败时返回 **None**。我们使用 **match** 对象的 *group(num)*\
    \ 或 *groups()* 函数来获取匹配的表达式。\n\n### Match 对象方法与描述\n\n| 序号 | Match 对象方法与描述 |\n|\
    \ :--- | :--- |\n| 1 | **group(num=0)**<br>此方法返回整个匹配（或特定的子组 num） |\n| 2 | **groups()**<br>此方法以元组形式返回所有匹配的子组（如果没有匹配则为空）\
    \ |\n\n### 示例\n\n[在线演示](http://)\n\n```\n#!/usr/bin/python\n\nimport re\n\nline\
    \ = \"Cats are smarter than dogs\"\n\nmatchObj = re.match( r'(.*) are (.*?) .*',\
    \ line, re.M|re.I)\n\nif matchObj:\n    print \"matchObj.group() : \", matchObj.group()\n\
    \    print \"matchObj.group(1) : \", matchObj.group(1)\n    print \"matchObj.group(2)\
    \ : \", matchObj.group(2)\nelse:\n    print \"No match!!\"\n```\n\n当执行上述代码时，会产生以下结果\
    \ –\n\n```\nmatchObj.group() : Cats are smarter than dogs\nmatchObj.group(1) :\
    \ Cats\nmatchObj.group(2) : smarter\n```\n\n### *search* 函数"
