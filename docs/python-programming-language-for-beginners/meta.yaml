    reciever = 'amrood.admin@gmail.com'\nmarker = \"AUNIQUEMARKER\"\nbody =\"\"\"\n\
    This is a test email to send an attachement.\n\"\"\"\n\n# Define the main headers.\n\
    part1 = \"\"\"From: From Person <me@fromdomain.net> To: To Person <amrood.admin@gmail.com>\n\
