- md: "This function searches for first occurrence of RE *pattern* within *string*\
    \ with optional *flags*.\n\nHere is the syntax for this function –\n\n```\nre.search(pattern,\
    \ string, flags=0)\n```\n\nHere is the description of the parameters –\n\n| Sr.No.\
    \ | Parameter & Description |\n| :--- | :--- |\n| 1 | **pattern**<br>This is the\
    \ regular expression to be matched. |\n| 2 | **string**<br>This is the string,\
    \ which would be searched to match the pattern anywhere in the string. |\n| 3\
    \ | **flags**<br>You can specify different flags using bitwise OR (|). These are\
    \ modifiers, which are listed in the table below. |\n\nThe *re.search* function\
    \ returns a **match** object on success, **none** on failure.\n\nWe use *group(num)*\
    \ or *groups()* function of **match** object to get matched expression.\n\n| Sr.No.\
    \ | Match Object Methods & Description |\n| :--- | :--- |\n| 1 | **group(num=0)**<br>This\
    \ method returns entire match (or specific subgroup num) |\n| 2 | **groups()**<br>This\
    \ method returns all matching subgroups in a tuple (empty if there weren't any)\
    \ |\n\n## Example\n\n[Live Demo](http://)\n\n```python\n#!/usr/bin/python\n\n\
    import re\n\nline = \"Cats are smarter than dogs\";\n\nsearchObj = re.search(\
    \ r'(.*) are (.*?) .*', line, re.M|re.I)\nif searchObj:\n    print \"searchObj.group()\
    \ : \", searchObj.group()\n    print \"searchObj.group(1) : \", searchObj.group(1)\n\
    \    print \"searchObj.group(2) : \", searchObj.group(2)\nelse:\n    print \"\
    Nothing found!!\"\n```\n\nWhen the above code is executed, it produces following\
    \ result –\n\n```\nsearchObj.group() : Cats are smarter than dogs\nsearchObj.group(1)\
    \ : Cats\nsearchObj.group(2) : smarter\n```\n\n## Matching Versus Searching\n\n\
    Python offers two different primitive operations based on regular expressions:\
    \ **match** checks for a match only at the beginning of the string, while **search**\
    \ checks for a match anywhere in the string (this is what Perl does by default).\n\
    \n## Example\n\n[Live Demo](http://www.tutorialspoint.com/python3/online_result.php?filename=reg_example1)\n\
    \n```python\n#!/usr/bin/python\nimport re\n\nline = \"Cats are smarter than dogs\"\
    ;\nmatchObj = re.match( r'dogs', line, re.M|re.I)\nif matchObj:\n    print \"\
    match --> matchObj.group() : \", matchObj.group()\nelse:\n    print \"No match!!\"\
    \nsearchObj = re.search( r'dogs', line, re.M|re.I)\nif searchObj:\n    print \"\
    search --> searchObj.group() : \", searchObj.group()\nelse:\n    print \"Nothing\
    \ found!!\"\n```\n\nWhen the above code is executed, it produces the following\
    \ result –\n\n```\nNo match!!\nsearch --> searchObj.group() : dogs\n```\n\n##\
    \ Search and Replace\n\nOne of the most important **re** methods that use regular\
    \ expressions is **sub**.\n\n### Syntax\n\n```\nre.sub(pattern, repl, string,\
    \ max=0)\n```\n\nThis method replaces all occurrences of the RE *pattern* in *string*\
    \ with *repl*, substituting all occurrences unless *max* provided. This method\
    \ returns modified string.\n\n## Example\n\n[Live Demo](Live Demo)\n\n```python\n\
    #!/usr/bin/python\n\nimport re\n\nphone = \"2004-959-559 # This is Phone Number\"\
    \n\n# Delete Python-style comments\nnum = re.sub(r'#.*$', \"\", phone)\nprint\
    \ \"Phone Num : \", num\n\n# Remove anything other than digits\nnum = re.sub(r'\\\
    D', \"\", phone)\nprint \"Phone Num : \", num\n```\n\nWhen the above code is executed,\
    \ it produces the following result –\n\n```\nPhone Num : 2004-959-559\nPhone Num\
    \ : 2004959559\n```\n\n## Regular Expression Modifiers: Option Flags\n\nRegular\
    \ expression literals may include an optional modifier to control various aspects\
    \ of matching. The modifiers are specified as an optional flag. You can provide\
    \ multiple modifiers using exclusive OR (|), as shown previously and may be represented\
    \ by one of these –\n\n| Sr.No. | Modifier & Description |\n| :--- | :--- |\n\
    | 1 | **re.I**<br>Performs case-insensitive matching. |\n| 2 | **re.L**<br>Interprets\
    \ words according to the current locale. This interpretation affects the alphabetic\
    \ group (\\w and \\W), as well as word boundary behavior(\\b and \\B). |\n| 3\
    \ | **re.M**<br>Makes $ match the end of a line (not just the end of the string)\
    \ and makes ^ match the start of any line (not just the start of the string).\
    \ |\n| 4 | **re.S**<br>Makes a period (dot) match any character, including a newline.\
    \ |\n| 5 | **re.U**<br>Interprets letters according to the Unicode character set.\
    \ This flag affects the behavior of \\w, \\W, \\b, \\B. |\n| 6 | **re.X**<br>Permits\
    \ \"cuter\" regular expression syntax. It ignores whitespace (except inside a\
    \ set [] or when escaped by a backslash) and treats unescaped # as a comment marker.\
    \ |\n\n## Regular Expression Patterns\n\nExcept for control characters, (+ ? .\
    \ * ^ $ ( ) [ ] { } | \\), all characters match themselves. You can escape a control\
    \ character by preceding it with a backslash.\n\nFollowing table lists the regular\
    \ expression syntax that is available in Python –\n\n| Sr.No. | Pattern & Description\
    \ |\n| :--- | :--- |\n| 1 | **^**<br>Matches beginning of line. |\n| 2 | **$**<br>Matches\
    \ end of line. |\n| 3 | **.**<br>Matches any single character except newline.\
    \ Using m option allows it to match newline as well. |\n| 4 | **[...]**<br>Matches\
    \ any single character in brackets. |\n| 5 | **[^...]**<br>Matches any single\
    \ character not in brackets. |\n| 6 | **re\\***<br>Matches 0 or more occurrences\
    \ of preceding expression. |\n| 7 | **re+**<br>Matches 1 or more occurrence of\
    \ preceding expression. |\n| 8 | **re?**<br>Matches 0 or 1 occurrence of preceding\
    \ expression. |\n| 9 | **re{ n}**<br>Matches exactly n number of occurrences of\
    \ preceding expression. |\n| 10 | **re{ n,}**<br>Matches n or more occurrences\
    \ of preceding expression. |\n| 11 | **re{ n, m}**<br>Matches at least n and at\
    \ most m occurrences of preceding expression. |\n| 12 | **a\\| b**<br>Matches\
    \ either a or b. |\n| 13 | **(re)**<br>Groups regular expressions and remembers\
    \ matched text. |\n| 14 | **(?imx)**<br>Temporarily toggles on i, m, or x options\
    \ within a regular expression. If in parentheses, only that area is affected.\
    \ |\n| 15 | **(?-imx)**<br>Temporarily toggles off i, m, or x options within a\
    \ regular expression. If in parentheses, only that area is affected. |\n| 16 |\
    \ **(?: re)**<br>Groups regular expressions without remembering matched text.\
    \ |\n| 17 | **(?imx: re)**<br>Temporarily toggles on i, m, or x options within\
    \ parentheses. |\n| 18 | **(?-imx: re)**<br>Temporarily toggles off i, m, or x\
    \ options within parentheses. |\n| 19 | **(?#...)**<br>Comment. |\n| 20 | **(?=\
    \ re)**<br>Specifies position using a pattern. Doesn't have a range. |\n| 21 |\
    \ **(?! re)**<br>Specifies position using pattern negation. Doesn't have a range.\
    \ |\n| 22 | **(?> re)**<br>Matches independent pattern without backtracking. |\n\
    | 23 | **\\w**<br>Matches word characters. |\n| 24 | **\\W**<br>Matches nonword\
    \ characters. |\n| 25 | **\\s**<br>Matches whitespace. Equivalent to [\\t\\n\\\
    r\\f]. |\n| 26 | **\\S**<br>Matches nonwhitespace. |\n| 27 | **\\d**<br>Matches\
    \ digits. Equivalent to [0-9]. |\n| 28 | **\\D**<br>Matches nondigits. |\n| 29\
    \ | **\\A**<br>Matches beginning of string. |\n| 30 | **\\Z**<br>Matches end of\
    \ string. If a newline exists, it matches just before newline. |\n| 31 | **\\\
    z**<br>Matches end of string. |\n| 32 | **\\G**<br>Matches point where last match\
    \ finished. |\n| 33 | **\\b**<br>Matches word boundaries when outside brackets.\
    \ Matches backspace (0x08) when inside brackets. |\n| 34 | **\\B**<br>Matches\
    \ nonword boundaries. |\n| 35 | **\\n, \\t, etc.**<br>Matches newlines, carriage\
    \ returns, tabs, etc. |\n| 36 | **\\1...\\9**<br>Matches nth grouped subexpression.\
    \ |\n| 37 | **\\10**<br>Matches nth grouped subexpression if it matched already.\
    \ Otherwise refers to the octal representation of a character code. |\n\n## Regular\
    \ Expression Examples\n\n### Literal characters\n\n| Sr.No. | Example & Description\
    \ |\n| :--- | :--- |\n| 1 | **python**<br>Match \"python\". |\n\n### Character\
    \ classes\n\n| Sr.No. | Example & Description |\n| :--- | :--- |\n| 1 | **[Pp]ython**<br>Match\
    \ \"Python\" or \"python\" |\n| 2 | **rub[ye]**<br>Match \"ruby\" or \"rube\"\
    \ |\n| 3 | **[aeiou]**<br>Match any one lowercase vowel |\n| 4 | **[0-9]**<br>Match\
    \ any digit; same as [0123456789] |\n| 5 | **[a-z]**<br>Match any lowercase ASCII\
    \ letter |\n| 6 | **[A-Z]**<br>Match any uppercase ASCII letter |\n| 7 | **[a-zA-Z0-9]**<br>Match\
    \ any of the above |\n| 8 | **[^aeiou]**<br>Match anything other than a lowercase\
    \ vowel |\n| 9 | **[^0-9]**<br>Match anything other than a digit |\n\n### Special\
    \ Character Classes\n\n| Sr.No. | Example & Description |\n| :--- | :--- |\n|\
    \ 1 | **.**<br>Match any character except newline |\n| 2 | **\\d**<br>Match a\
    \ digit: [0-9] |"
