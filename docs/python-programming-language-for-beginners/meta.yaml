    \ a number of options as checkboxes. The user can select multiple options at a\
    \ time. |\n| 4 | **Entry**<br>The Entry widget is used to display a single-line\
    \ text field for accepting values from a user. |\n| 5 | **Frame**<br>The Frame\
    \ widget is used as a container widget to organize other widgets. |\n| 6 | **Label**<br>The\
    \ Label widget is used to provide a single-line caption for other widgets. It\
    \ can also contain images. |\n| 7 | **Listbox**<br>The Listbox widget is used\
    \ to provide a list of options to a user. |\n| 8 | **Menubutton**<br>The Menubutton\
    \ widget is used to display menus in your application. |\n| 9 | **Menu**<br>The\
    \ Menu widget is used to provide various commands to a user. These commands are\
    \ contained inside Menubutton. |\n| 10 | **Message**<br>The Message widget is\
    \ used to display multiline text fields for accepting values from a user. |\n\
    | 11 | **Radiobutton**<br>The Radiobutton widget is used to display a number of\
    \ options as radio buttons. The user can select only one option at a time. |\n\
    | 12 | **Scale**<br>The Scale widget is used to provide a slider widget. |\n|\
    \ 13 | **Scrollbar**<br>The Scrollbar widget is used to add scrolling capability\
    \ to various widgets, such as list boxes. |\n| 14 | **Text**<br>The Text widget\
    \ is used to display text in multiple lines. |\n| 15 | **Toplevel**<br>The Toplevel\
    \ widget is used to provide a separate window container. |\n| 16 | **Spinbox**<br>The\
    \ Spinbox widget is a variant of the standard Tkinter Entry widget, which can\
    \ be used to select from a fixed number of values. |\n| 17 | **PanedWindow**<br>A\
    \ PanedWindow is a container widget that may contain any number of panes, arranged\
    \ horizontally or vertically. |\n| 18 | **LabelFrame**<br>A labelframe is a simple\
    \ container widget. Its primary purpose is to act as a spacer or container for\
    \ complex window layouts. |\n| 19 | **tkMessageBox**<br>This module is used to\
    \ display message boxes in your applications. |\n\nLet us study these widgets\
    \ in detail –\n\n## Standard attributes\n\nLet us take a look at how some of their\
