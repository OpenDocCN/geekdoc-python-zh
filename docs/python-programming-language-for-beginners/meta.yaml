    \ |\n\n## 正则表达式模式\n\n除了控制字符（+ ? . * ^ $ ( ) [ ] { } | \\）外，所有字符都匹配自身。你可以通过在控制字符前加反斜杠来转义它。\n\
    \n下表列出了Python中可用的正则表达式语法 –\n\n| 序号 | 模式与描述 |\n| :--- | :--- |\n| 1 | **^**<br>匹配行首。\
