- md: "## Python Internet modules\n\nA list of some important modules in Python Network/Internet\
    \ programming.\n\n| Protocol | Common function | Port No | Python module |\n|\
    \ :--- | :--- | :--- | :--- |\n| HTTP | Web pages | 80 | httplib, urllib, xmlrpclib\
    \ |\n| NNTP | Usenet news | 119 | nntplib |\n| FTP | File transfers | 20 | ftplib,\
    \ urllib |\n| SMTP | Sending email | 25 | smtplib |\n| POP3 | Fetching email |\
    \ 110 | poplib |\n| IMAP4 | Fetching email | 143 | imaplib |\n| Telnet | Command\
    \ lines | 23 | telnetlib |\n| Gopher | Document transfers | 70 | gopherlib, urllib\
    \ |\n\nPlease check all the libraries mentioned above to work with FTP, SMTP,\
    \ POP, and IMAP protocols.\n\n## Python - Sending Email using SMTP\n\nSimple Mail\
    \ Transfer Protocol (SMTP) is a protocol, which handles sending e-mail and routing\
    \ e-mail between mail servers.\n\nPython provides **smtplib** module, which defines\
    \ an SMTP client session object that can be used to send mail to any Internet\
    \ machine with an SMTP or ESMTP listener daemon.\n\nHere is a simple syntax to\
    \ create one SMTP object, which can later be used to send an e-mail –\n\n```\n\
    import smtplib\n\nsmtpObj = smtplib.SMTP( [host [, port [, local_hostname]]] )\n\
    ```\n\nHere is the detail of the parameters –\n\n- **host** – This is the host\
    \ running your SMTP server. You can specify IP address of the host or a domain\
    \ name like tutorialspoint.com. This is optional argument.\n- **port** – If you\
    \ are providing *host* argument, then you need to specify a port, where SMTP server\
    \ is listening. Usually this port would be 25.\n- **local_hostname** – If your\
    \ SMTP server is running on your local machine, then you can specify just *localhost*\
    \ as of this option.\n\nAn SMTP object has an instance method called **sendmail**,\
    \ which is typically used to do the work of mailing a message. It takes three\
    \ parameters –\n\n- The *sender* – A string with the address of the sender.\n\
    - The *receivers* – A list of strings, one for each recipient.\n- The *message*\
    \ – A message as a string formatted as specified in the various RFCs.\n\n### Example\n\
    \nHere is a simple way to send one e-mail using Python script. Try it once –\n\
    \n```\n#!/usr/bin/python\n\nimport smtplib\n\nsender = 'from@fromdomain.com'\n\
    \nreceivers = ['to@todomain.com']\n\nmessage = \"\"\"From: From Person <from@fromdomain.com>\
    \ To: To Person <to@todomain.com>\n\nSubject: SMTP e-mail test\n\nThis is a test\
    \ e-mail message.\n\n\"\"\"\n\ntry:\n\nsmtpObj = smtplib.SMTP('localhost')\n\n\
    smtpObj.sendmail(sender, receivers, message)\n\nprint \"Successfully sent email\"\
    \n\nexcept SMTPException:\n    print \"Error: unable to send email\"\n```\n\n\
    Here, you have placed a basic e-mail in message, using a triple quote, taking\
    \ care to format the headers correctly. An e-mail requires a **From**, **To**,\
    \ and **Subject** header, separated from the body of the e-mail with a blank line.\n\
    \nTo send the mail you use *smtpObj* to connect to the SMTP server on the local\
    \ machine and then use the *sendmail* method along with the message, the from\
    \ address, and the destination address as parameters (even though the from and\
    \ to addresses are within the e-mail itself, these aren't always used to route\
    \ mail).\n\nIf you are not running an SMTP server on your local machine, you can\
    \ use *smtplib* client to communicate with a remote SMTP server. Unless you are\
    \ using a webmail service (such as Hotmail or Yahoo! Mail), your e-mail provider\
    \ must have provided you with outgoing mail server details that you can supply\
    \ them, as follows –\n\n```\nsmtplib.SMTP('mail.your-domain.com', 25)\n```\n\n\
    ### Sending an HTML e-mail using Python\n\nWhen you send a text message using\
    \ Python, then all the content are treated as simple text. Even if you include\
    \ HTML tags in a text message, it is displayed as simple text and HTML tags will\
    \ not be formatted according to HTML syntax. But Python provides option to send\
    \ an HTML message as actual HTML message.\n\nWhile sending an e-mail message,\
    \ you can specify a Mime version, content type and character set to send an HTML\
    \ e-mail.\n\n### Example\n\nFollowing is the example to send HTML content as an\
    \ e-mail. Try it once –\n\n```\n#!/usr/bin/python\n\nimport smtplib\n\nmessage\
    \ = \"\"\"From: From Person <from@fromdomain.com> To: To Person <to@todomain.com>\n\
    MIME-Version: 1.0\nContent-type: text/html\nSubject: SMTP HTML e-mail test\n\n\
    This is an e-mail message to be sent in HTML format\n<b>This is HTML message.</b>\n\
    <h1>This is headline.</h1>\n\"\"\"\n\ntry:\n   smtpObj = smtplib.SMTP('localhost')\n\
    \   smtpObj.sendmail(sender, receivers, message)\n   print \"Successfully sent\
    \ email\"\nexcept SMTPException:\n   print \"Error: unable to send email\"\n```\n\
    \n### Sending Attachments as an E-mail\n\nTo send an e-mail with mixed content\
    \ requires to set **Content-type** header to **multipart/mixed**. Then, text and\
    \ attachment sections can be specified within **boundaries**.\n\nA boundary is\
    \ started with two hyphens followed by a unique number, which cannot appear in\
    \ the message part of the e-mail. A final boundary denoting the e-mail's final\
    \ section must also end with two hyphens.\n\nAttached files should be encoded\
    \ with the **pack(\"m\")** function to have base64 encoding before transmission.\n\
    \n### Example\n\nFollowing is the example, which sends a file **/tmp/test.txt**\
