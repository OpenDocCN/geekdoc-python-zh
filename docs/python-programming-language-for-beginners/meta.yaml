    \ small anonymous functions.\n\n- Lambda forms can take any number of arguments\
    \ but return just one value in the form of an expression. They cannot contain\
    \ commands or multiple expressions.\n- An anonymous function cannot be a direct\
    \ call to print because lambda requires an expression.\n- Lambda functions have\
