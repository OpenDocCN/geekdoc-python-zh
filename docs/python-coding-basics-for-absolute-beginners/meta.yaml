    | --- | --- | --- | --- | --- |

    | asset | def | class | continue | break |

    | else | finally | elif | del | except |

    | global | for | if | from | import |

    | raise | try | or | return | pass |

    | nonlocal | in | not | is | lambda |


    True - It represents the Boolean true, which means that if the given condition
    is true, it returns “True.” Non-zero values are assumed to be true.


    False - It represents the Boolean false; it returns “False” if the given condition
    is false. A value of zero is interpreted as false.


    None - It denotes a null or void value. An empty list or Zero cannot be used to
    represent None.


    And - It is also a logical operator. It’s used to test for multiple conditions.
    If both conditions are met, it returns true. Consider the truth table below.'
