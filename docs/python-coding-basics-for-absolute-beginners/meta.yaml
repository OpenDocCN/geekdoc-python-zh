    # Python Operators


    The operator is a symbol that is in charge of a specific operation between two
    operands. Operators are the foundations of a program, upon which the logic is
    built in a particular programming language. Python has a number of operators,
    which are listed below.


    +   - Arithmetic operators

    - Comparison operators

    - Assignment Operators

    - Logical Operators

    - Bitwise Operators

    - Membership Operators

    - Identity Operators


    # Arithmetic Operators


    Arithmetic operators are used to perform operations on two operands. It has the
    operators + (addition), - (subtraction), *(multiplication), /(divide), percent
    (reminder), /(floor division), and exponent (**).


    Consider the table below for a more in-depth explanation of arithmetic operators.'
  - '[PAGE 33]


    | Operator | Description |

    | --- | --- |

    | + (Addition) | It is used to add two operands. For example, if a = 20, b = 10
    => a+b = 30 |

    | - (Subtraction) | It is used to subtract the second operand from the first operand.
    If the first operand is less than the second operand, the value results negative.
    For example, if a = 20, b = 10 => a - b = 10 |

    | / (divide) | It returns the quotient after dividing the first operand by the
    second operand. For example, if a = 20, b = 10 => a/b = 2.0 |

    | * (Multiplication) | It is used to multiply one operand with the other. For
    example, if a = 20, b = 10 => a * b = 200 |

    | % (reminder) | It returns the reminder after dividing the first operand by the
    second operand. For example, if a = 20, b = 10 => a%b = 0 |

    | ** (Exponent) | It is an exponent operator represented as it calculates the
    first operand power to the second operand. |


    # Comparison operator


    Comparison operators are used to compare the values of two operands and return
    a Boolean true or false result. The comparison operators are listed in the table
    below.


    | Operator | Description |

    | --- | --- |

    | == | If the value of two operands is equal, then the condition becomes true.
    |

    | != | If the value of two operands is not equal, then the condition becomes true.
    |

    | <= | If the first operand is less than or equal to the second operand, then
    the condition becomes true. |

    | >= | If the first operand is greater than or equal to the second operand, then
    the condition becomes true. |

    | > | If the first operand is greater than the second operand, then the condition
    becomes true. |

    | < | If the first operand is less than the second operand, then the condition
    becomes true. |'
