    # Python indentation


    Python indentation is used to define code blocks. Curly braces are used in other
    programming languages such as C, C++, and Java, whereas Python uses indentation.
    In Python, whitespaces are used to indicate indentation.


    Indentation is used at the start of the code and ends with an unexpected line.
    The code block is defined by the same line indentation (body of a function, loop,
    etc.)


    In most cases, four whitespaces are used as indentation. The amount of indentation
    is up to the user, but it must be consistent across the block.


