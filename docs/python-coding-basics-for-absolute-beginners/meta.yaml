    In this section, we''ll go through Python’s fundamental syntax and run a simple
    program that prints Hello World to the terminal.


    Python gives us two options for running a program:


    +   - Using a prompt from an interactive interpreter

    - Making use of a script file


    Let''s take a closer look at each of them.


    # ## Interactive interpreter prompt


    At the interactive prompt, Python allows us to execute each Python statement one
    by one. When we are concerned with the output of each line of our Python program,
    it is preferable.


    To enter interactive mode, type python on the terminal (or command prompt) (python3
    in case if you have Python2 and Python3 both installed on your system).


    It will open the prompt below, where we can run the Python statement and see how
    it affects the terminal.


