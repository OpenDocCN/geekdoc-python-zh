- md: "# PYTHON CODING\n## BASICS FOR ABSOLUTE BEGINNERS\n\n# PYTHON CODING:\nBASICS\
    \ FOR ABSOLUTE BEGINNERS\n# STEP BY STEP GUIDE TO LEARN PYTHON QUICKLY\n\nJ NEWMAN\n\
    \nINTRODUCTION TO PYTHON\nINSTALL PYTHON\nFIRST PYTHON PROGRAM\nPYTHON VARIABLES\n\
    PYTHON DATA TYPES\nPYTHON KEYWORDS\nPYTHON LITERALS\nPYTHON OPERATORS\nPYTHON\
    \ COMMENTS\nPYTHON IF-ELSE STATEMENTS\nPYTHON LOOPS\nPYTHON FOR LOOP\nPYTHON WHILE\
    \ LOOP\nPYTHON BREAK STATEMENT\nPYTHON STRING\nPYTHON LIST\nPYTHON TUPLE\n\n#\
    \ Introduction to Python\nPython has a variety of beneficial features that distinguish\
    \ it from other programming languages. It enables object-oriented programming,\
    \ procedural programming, and memory allocation that is dynamic. A few crucial\
    \ aspects are described below.\n\n## 1) Easy to Learn\nPython is a simple programming\
    \ language to learn when compared to other programming languages. Its syntax is\
    \ simple and similar to that of the English language. The semicolon and curly\
    \ brackets are not used; instead, the indentation defines the code block. For\
    \ novices, it is the suggested programming language.\n\n## 2) Expressive Language\n\
    Python is capable of performing complex tasks with just a few lines of code. For\
    \ example, to run the hello world program, simply type print (\"Hello World\"\
    ). It will just require one line of code to run, whereas Java or C will require\
    \ numerous lines.\n\n## 3) Interpreted Language\nPython is an interpreted language,\
    \ which implies that each line of a Python program is executed separately. The\
    \ benefit of being an interpreted language is that debugging is simple and portable.\n\
    \n## 4) Cross-platform Language\nPython can operate on a variety of platforms,\
    \ including Windows, Linux, UNIX, and Macintosh. As a result, we may conclude\
    \ that Python is a portable programming language. It allows programmers to create\
    \ software for several rival platforms by creating only one program.\n\n## 5)\
    \ Free and Open Source\nPython is a free programming language that anyone can\
    \ use. On its official website, www.python.org, it is freely available. It has\
    \ a vast community all around the world working hard to create new Python modules\
    \ and functions. The Python community welcomes contributions from everyone. “Anyone\
    \ can get its source code without paying a penny,” says open-source.\n\n## 6)\
    \ Object-Oriented Language\nPython enables object-oriented programming, which\
    \ introduces the notions of classes and objects. It allows for inheritance, polymorphism,\
    \ and encapsulation, among other things. The object-oriented method aids programmers\
    \ in writing reusable code and developing applications with fewer code.\n\n##\
    \ 7) Extensible\nIt means that other languages, such as C/C++, can be used to\
    \ compile the code, allowing us to use it in our Python work. It converts the\
    \ program to byte code, which may be run on any platform.\n\n## 8) Large Standard\
    \ Library\nIt offers a diverse set of libraries for a variety of domains, including\
    \ machine learning, web development, and scripting. Tensor flow, Pandas, Numpy,\
    \ Keras, and Pytorch are just a few examples of machine learning libraries. Python\
    \ web development frameworks include Django, Flask, and Pyramids.\n\n## 9) GUI\
    \ Programming Support\nFor the development of a desktop program, a graphical user\
    \ interface is used. The libraries used to construct the web application include\
    \ PyQT5, Tkinter, and Kivy.\n\n## 10) Integrated\nIt’s simple to integrate with\
    \ languages like C, C++, and JAVA, among others. Python, like C, C++, and Java,\
    \ executes code line by line. It makes debugging the code much easier.\n\n## 11.\
    \ Embeddable\nOther programming languages’ code can be used in the Python source\
    \ code. Python source code can also be used in other computer languages. It has\
    \ the ability to embed additional languages into our programs.\n\n## 12. Dynamic\
    \ Memory Allocation\nWe don’t need to specify the variable’s data type in Python.\
    \ When we assign a value to a variable, the variable’s memory is automatically\
    \ allocated at run time. If the integer value 15 is assigned to x, we don’t need\
    \ to write int x = 15. Simply write x = 15 on a piece of paper.\n\n# Install Python\n\
    The first step toward becoming a Python developer is to understand how to install\
    \ and update Python on a local system or computer. We’ll go over how to install\
    \ Python on various operating systems in this topic.\n\n## Installation on Windows\n\
    To get the newest version of Python, go to https://www.python.org/downloads/.\
    \ We will install Python 3.8.6 on our Windows operating system during this procedure.\
    \ When we click the link above, we will be sent to the following website.\n\n\
    Step - 1: Select - Python’s version - download.\n\nStep - 2: Click - Install Now\n\
    \nDouble-click the downloaded executable file to bring up the following window.\
    \ Proceed by selecting Customize installation. When you select the Add Path check\
    \ box, the Python path will be automatically configured.\n\nWe may also select\
    \ the required location and features by clicking on the customise installation\
    \ button. Another key factor to consider is whether or not to install a launcher\
    \ for all users.\n\n## Step - 3 Installation in Process\n\nTry running python\
    \ from the command prompt now. If you’re using Python 3, type `python -version`.\n\
    \nWe’re all set to work with Python.\n\n# First Python Program\nIn this section,\
    \ we'll go through Python’s fundamental syntax and run a simple program that prints\
    \ Hello World to the terminal.\n\nPython gives us two options for running a program:\n\
    \n- Using a prompt from an interactive interpreter\n- Making use of a script file\n\
    \nLet's take a closer look at each of them.\n\n## Interactive interpreter prompt\n\
    At the interactive prompt, Python allows us to execute each Python statement one\
    \ by one. When we are concerned with the output of each line of our Python program,\
    \ it is preferable.\n\nTo enter interactive mode, type python on the terminal\
    \ (or command prompt) (python3 in case if you have Python2 and Python3 both installed\
    \ on your system).\n\nIt will open the prompt below, where we can run the Python\
    \ statement and see how it affects the terminal.\n\nPress the Enter key after\
    \ finishing the print statement.\n\n# Multi-line Statements\nMulti-line statements\
    \ are typed into a notepad like text editor and saved as.py files. We’ve used\
    \ the Python script to describe the execution of numerous code lines in the following\
    \ example.\n\nCode:\n\n1. name = “Andrew Venis”\n2. branch = “Computer Science”\n\
    3. age = “25”\n4. print(“My name is: ”, name, )\n5. print(“My age is: ”, age)\n\
    \nScript File:\n\n```\nname = \"Andrew Venis\"\nbranch = \"Computer Science\"\n\
    age = \"25\"\nprint(\"My name is: \", name, )\nprint(\"My age is: \", age)\n```\n\
    \n```\nPython 3.8.3 (tags/v3.8.3:6f8c832, May 13 2020, 22:20:19) [MSC v.1925 32\
    \ bit (Intel)] on win32\nType \"help\", \"copyright\", \"credits\" or \"license()\"\
    \ for more information.\n>>> \n=============== RESTART: C:/Users/DEVANSH SHARMA/Desktop/details.py\
    \ ===============\nMy name is: Andrew Venis\nMy age is: 25\n>>> \n```\n\n# Python\
    \ Variables\nA variable is a term that refers to a memory region. A Python variable,\
    \ often known as an identifier, is a container for data.\n\nBecause Python is\
    \ an infer language, we don’t need to describe the type of variable because it\
    \ is smart enough to figure it out.\n\nVariable names can consist of a combination\
    \ of letters and digits, but they must start with a letter or underscore.\n\n\
    The variable name should be written in lowercase letters. Both rahul and rahul\
    \ are two distinct variables.\n\n## Identifier Naming\nIdentifiers are examples\
    \ of variables. The literals in the program are identified using an Identifier.\
    \ The following are the rules for naming an identifier.\n\n- The variable’s initial\
    \ character must be an alphabet or underscore ( ).\n- All characters except the\
    \ first may be a lower-case (a-z), upper-case (A-Z), underscore, or digit alphabet\
    \ (0-9).\n- There must be no whitespace or special characters in the identifier\
    \ name (!, @, #, percent,, &, *).\n- The name of the identifier must not be identical\
    \ to any of the language’s keywords."
  mdcn: "# Python 编程\n## 零基础入门\n\n# Python 编程：\n零基础入门\n# 快速掌握 Python 分步指南\n\nJ NEWMAN\n\
    \nPython 简介\n安装 Python\n第一个 Python 程序\nPython 变量\nPython 数据类型\nPython 关键字\nPython\
    \ 字面量\nPython 运算符\nPython 注释\nPython if-else 语句\nPython 循环\nPython for 循环\nPython\
    \ while 循环\nPython break 语句\nPython 字符串\nPython 列表\nPython 元组\n\n# Python 简介\n\
    Python 拥有许多使其区别于其他编程语言的有益特性。它支持面向对象编程、过程式编程以及动态内存分配。下面将介绍一些关键方面。\n\n## 1) 易于学习\n\
    与其他编程语言相比，Python 是一门简单的编程语言。其语法简洁，类似于英语。它不使用分号和花括号，而是通过缩进来定义代码块。对于初学者来说，它是推荐的编程语言。\n\
    \n## 2) 表达能力强\nPython 只需几行代码就能完成复杂的任务。例如，要运行 hello world 程序，只需输入 `print (\"Hello\
    \ World\")`。运行它只需要一行代码，而 Java 或 C 则需要多行。\n\n## 3) 解释型语言\nPython 是一种解释型语言，这意味着\
    \ Python 程序的每一行都是单独执行的。作为解释型语言的好处是调试简单且可移植。\n\n## 4) 跨平台语言\nPython 可以在多种平台上运行，包括\
    \ Windows、Linux、UNIX 和 Macintosh。因此，我们可以得出结论：Python 是一种可移植的编程语言。它允许程序员只需创建一个程序，就能为多个竞争平台开发软件。\n\
    \n## 5) 免费且开源\nPython 是一种免费的编程语言，任何人都可以使用。在其官方网站 www.python.org 上，它可以免费获取。它有一个遍布全球的庞大社区，致力于创建新的\
    \ Python 模块和函数。Python 社区欢迎每个人的贡献。开源意味着“任何人都可以不花一分钱获得其源代码”。\n\n## 6) 面向对象语言\nPython\
    \ 支持面向对象编程，引入了类和对象的概念。它允许继承、多态和封装等特性。面向对象的方法有助于程序员编写可重用的代码，并用更少的代码开发应用程序。\n\n\
    ## 7) 可扩展\n这意味着可以使用其他语言（如 C/C++）来编译代码，从而让我们能在 Python 项目中使用它。它会将程序转换为字节码，可以在任何平台上运行。\n\
    \n## 8) 大型标准库\n它提供了涵盖多个领域的多样化库，包括机器学习、Web 开发和脚本编写。Tensor flow、Pandas、Numpy、Keras\
    \ 和 Pytorch 只是机器学习库的几个例子。Python 的 Web 开发框架包括 Django、Flask 和 Pyramids。\n\n## 9)\
    \ GUI 编程支持\n图形用户界面用于桌面应用程序的开发。用于构建 Web 应用程序的库包括 PyQT5、Tkinter 和 Kivy。\n\n## 10)\
    \ 集成性\n它易于与 C、C++ 和 JAVA 等语言集成。Python 与 C、C++ 和 Java 一样，也是逐行执行代码。这使得调试代码变得更容易。\n\
    \n## 11. 可嵌入\n其他编程语言的代码可以在 Python 源代码中使用。Python 源代码也可以在其他计算机语言中使用。它能够将其他语言嵌入到我们的程序中。\n\
    \n## 12. 动态内存分配\n在 Python 中，我们不需要指定变量的数据类型。当我们将一个值赋给变量时，变量的内存会在运行时自动分配。如果将整数值\
    \ 15 赋给 x，我们不需要写 `int x = 15`。只需在纸上写 `x = 15` 即可。\n\n# 安装 Python\n成为 Python 开发者的第一步是了解如何在本地系统或计算机上安装和更新\
    \ Python。本主题将介绍如何在不同操作系统上安装 Python。\n\n## 在 Windows 上安装\n要获取最新版本的 Python，请访问 https://www.python.org/downloads/。在此过程中，我们将在我们的\
    \ Windows 操作系统上安装 Python 3.8.6。当我们点击上面的链接时，将跳转到以下网站。\n\n步骤 - 1：选择 - Python 的版本\
    \ - 下载。\n\n步骤 - 2：点击 - 立即安装\n\n双击下载的可执行文件，将显示以下窗口。继续选择“自定义安装”。当你勾选“Add Path”复选框时，Python\
    \ 路径将自动配置。\n\n我们也可以通过点击“自定义安装”按钮来选择所需的位置和功能。另一个需要考虑的关键因素是是否为所有用户安装启动器。\n\n## 步骤\
    \ - 3 安装过程\n\n现在尝试从命令提示符运行 python。如果你使用的是 Python 3，请输入 `python -version`。\n\n\
    我们已准备好使用 Python。\n\n# 第一个 Python 程序\n在本节中，我们将讨论 Python 的基本语法，并运行一个简单的程序，在终端打印出\
    \ Hello World。\n\nPython 为我们提供了两种运行程序的方式：\n\n- 使用交互式解释器的提示符\n- 使用脚本文件\n\n让我们更仔细地看看这两种方式。\n\
    \n## 交互式解释器提示符\n在交互式提示符下，Python 允许我们逐个执行每条 Python 语句。当我们关注 Python 程序每一行的输出时，这种方式更为可取。\n\
    \n要进入交互模式，在终端（或命令提示符）中输入 `python`（如果你的系统中同时安装了 Python2 和 Python3，则输入 `python3`）。\n\
    \n它将打开下面的提示符，我们可以在其中运行 Python 语句并查看其对终端的影响。\n\n完成 print 语句后，按 Enter 键。\n\n# 多行语句\n\
    多行语句在类似记事本的文本编辑器中输入，并保存为 .py 文件。在下面的示例中，我们使用 Python 脚本描述了多行代码的执行。\n\n代码：\n\n1.\
    \  name = “Andrew Venis”\n2.  branch = “Computer Science”\n3.  age = “25”\n4.\
    \  print(“My name is: ”, name, )\n5.  print(“My age is: ”, age)\n\n脚本文件：\n\n```\n\
    name = \"Andrew Venis\"\nbranch = \"Computer Science\"\nage = \"25\"\nprint(\"\
    My name is: \", name, )\nprint(\"My age is: \", age)\n```\n\n```\nPython 3.8.3\
    \ (tags/v3.8.3:6f8c832, May 13 2020, 22:20:19) [MSC v.1925 32 bit (Intel)] on\
    \ win32\nType \"help\", \"copyright\", \"credits\" or \"license()\" for more information.\n\
    >>> \n=============== RESTART: C:/Users/DEVANSH SHARMA/Desktop/details.py ===============\n\
    My name is: Andrew Venis\nMy age is: 25\n>>> \n```\n\n# Python 变量\n变量是指向内存区域的术语。Python\
    \ 变量，也称为标识符，是数据的容器。\n\n因为 Python 是一种解释型语言，我们不需要描述变量的类型，因为它足够智能，可以自动推断出来。\n\n变量名可以由字母和数字的组合构成，但必须以字母或下划线开头。\n\
    \n变量名应使用小写字母书写。`rahul` 和 `Rahul` 是两个不同的变量。\n\n## 标识符命名\n标识符是变量的例子。程序中的字面量通过标识符来识别。以下是命名标识符的规则。\n\
    \n- 变量的第一个字符必须是字母或下划线（_）。\n- 除第一个字符外，所有字符都可以是小写字母（a-z）、大写字母（A-Z）、下划线或数字（0-9）。\n\
    - 标识符名称中不得包含空格或特殊字符（!、@、#、百分号、&、*）。\n- 标识符的名称不得与语言中的任何关键字相同。"
