    # Python Comments


    Python Comment is a must-have tool for programmers. In general, comments are used
    to explain the code. If the code is properly explained, we can easily understand
    it. A good programmer should use comments because if anyone wants to modify the
    code or implement a new module in the future, it will be much easier to do so.


    Other programming languages, such as C++, use the / for single-lined comments
    and /*.... */ for multiple-lined comments, whereas Python only uses the / for
    single-lined Python comments. To include a comment in code, place a hash(#) at
    the beginning of the statement or code.


    Let’s take a look at an example.


    ```

    1. # This is the print statement

    2. print(“Hello Python”)

    ```


