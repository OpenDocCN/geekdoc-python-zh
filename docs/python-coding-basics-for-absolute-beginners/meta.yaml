    # Using else with while loop


    Python allows us to use the else statement in conjunction with the while loop.


    When the condition in the while statement fails, the else block is executed.


    If the while loop is broken using the break statement, the else block is not executed,
    and the statement following the else block is executed.


    When using the while loop, the else statement is optional. Consider the following
    scenario.


    # Example 1


    ```

    1. i=1

    2. while(i<=5):

    3.    print(i)

    4.    i=i+1

    5. else:

    6.    print("The while loop exhausted")

    ```


