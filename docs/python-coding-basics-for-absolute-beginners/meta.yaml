  md: 'Negative indexing is used to navigate the items from left to right. Consider
    the following illustration:


    ```

    1. tuple1 = (1, 2, 3, 4, 5)

    2. print(tuple1[-1])

    3. print(tuple1[-4])

    4. print(tuple1[-3:-1])

    5. print(tuple1[:-1])

    6. print(tuple1[-2:])

    ```


    **Output:**


    5


    2


    (3, 4)


    (1, 2, 3, 4)


    (4, 5)


    # Deleting Tuple


    Tuple items, unlike lists, cannot be erased with the **del** keyword because tuples
    are immutable. We can use the **del** keyword with the tuple name to delete an
    entire tuple.


    Consider the following illustration.


    ```

    1. tuple1 = (1, 2, 3, 4, 5, 6)

    2. print(tuple1)

    3. del tuple1[0]

    4. print(tuple1)

    5. del tuple1

    ```'
