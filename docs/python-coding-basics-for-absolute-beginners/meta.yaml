  md: '# # Python If-else statements


    The most important aspect of almost all programming languages is decision making.
    Decision making, as the name implies, allows us to run a specific block of code
    for a specific decision. Decisions on the validity of specific conditions are
    made here. The foundation of decision making is condition checking.


    The following statements in Python are used to make decisions.


    | Statement | Description |

    |---|---|

    | If Statement | The if statement is used to test a specific condition. If the
    condition is true, a block of code (if-block) will be executed. |

    | If - else Statement | The if-else statement is similar to if statement except
    the fact that, it also provides the block of the code for the false case of the
    condition to be checked. If the condition provided in the if statement is false,
    then the else statement will be executed. |

