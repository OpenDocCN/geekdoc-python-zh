  md: '# Python Variables


    A variable is a term that refers to a memory region. A Python variable, often
    known as an identifier, is a container for data.


    Because Python is an infer language, we don’t need to describe the type of variable
    because it is smart enough to figure it out.


    Variable names can consist of a combination of letters and digits, but they must
    start with a letter or underscore.


    The variable name should be written in lowercase letters. Both rahul and rahul
    are two distinct variables.


    # Identifier Naming


    Identifiers are examples of variables. The literals in the program are identified
    using an Identifier. The following are the rules for naming an identifier.


    +   - The variable’s initial character must be an alphabet or underscore ( ).

    - All characters except the first may be a lower-case (a-z), upper-case (A-Z),
    underscore, or digit alphabet (0-9).

    - There must be no whitespace or special characters in the identifier name (!,
    @, #, percent,, &, *).

    - The name of the identifier must not be identical to any of the language’s keywords.'
