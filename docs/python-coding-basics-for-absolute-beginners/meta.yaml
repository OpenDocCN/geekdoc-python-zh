    \ sum is: 15\n```\n\n上述代码可读性很高，即使是完全的初学者也能理解每行代码的功能。这是使用代码注释的好处之一。\n\n对于多行注释，我们也可以使用三引号（\"\
    \"\"）。字符串格式化也使用三引号。考虑以下场景。\n\n## 文档字符串 Python 注释\n\n文档字符串注释通常出现在模块、函数、类或方法中。它是一个\
    \ Python 文档字符串。在后续的教程中，我们将解释类/方法。\n\n## 示例：\n\n```\ndef intro():\n    \"\"\"\n\
    \    This function prints Hello Joseph\n    \"\"\"\n    print(\"Hi Joseph\")\n\
    intro()\n```\n\n## 输出：\n\n```\nHello Joseph\n```\n\n使用 `__doc__` 属性，我们可以检查函数的文档字符串。\n\
    \n在大多数情况下，使用四个空格作为缩进。缩进量由用户决定，但必须在代码块内保持一致。\n\n```\ndef intro():\n    \"\"\"\n\
    \    This function prints Hello Joseph\n    \"\"\"\n    print(\"Hello Joseph\"\
    )\nintro.__doc__\n```\n\n## 输出：\n\n```\nOutput:\n\n\\n This function prints Hello\
    \ Joseph\\n \n```\n\n## Python 缩进\n\nPython 缩进用于定义代码块。在其他编程语言如 C、C++ 和 Java 中使用花括号，而\
    \ Python 使用缩进。在 Python 中，使用空格来表示缩进。\n\n缩进用于代码的开头，并在遇到非预期行时结束。代码块由相同的行缩进定义（函数体、循环等）。\n\
    \n在大多数情况下，使用四个空格作为缩进。缩进量由用户决定，但必须在代码块内保持一致。\n\n```\npython\nfor i in range(5):\n\
    \    print(i)\n    if(i == 3):\n        break\n```\n\n我们使用相同的空格来缩进每行代码，以表示一个代码块。\n\
    \n考虑以下场景。\n\n```\ndn = int(input(\"Enter the number:\"))\nif(n%2 == 0):\n    print(\"\
    Even Number\")\nelse:\n    print(\"Odd Number\")\n\nprint(\"Task Complete\")\n\
    ```\n\n## 输出：\n\n> Enter the number: 10\nEven Number\nTask Complete\n\n在上面的代码中，if\
    \ 和 else 是两个独立的代码块。两个代码块都缩进了四个空格。`print(\"Task Complete\")` 语句位于 if-else 块之外，没有缩进四个空格。\n\
    \n如果缩进使用不正确，将抛出 `IndentationError`。\n\n## Python If-else 语句\n\n几乎所有编程语言最重要的方面都是决策。顾名思义，决策允许我们为特定的决定运行特定的代码块。在此做出关于特定条件有效性的决策。决策的基础是条件检查。\n\
    \nPython 中使用以下语句进行决策。\n\n| 语句 | 描述 |\n|---|---|\n| If 语句 | if 语句用于测试特定条件。如果条件为真，将执行一个代码块（if\
    \ 块）。 |\n| If - else 语句 | if-else 语句类似于 if 语句，不同之处在于它还为被检查条件的假情况提供了代码块。如果 if 语句中提供的条件为假，则将执行\
    \ else 语句。 |\n| 嵌套 if 语句 | 嵌套 if 语句允许我们在外部 if 语句内部使用 if ? else 语句。 |\n\n## Python\
    \ 中的缩进\n\n为了简洁和易于编程，Python 不允许在块级代码中使用括号。要在 Python 中声明一个块，请使用缩进。如果两个语句具有相同的缩进级别，它们就在同一个块中。\n\
    \n通常，使用四个空格来缩进语句，这是 Python 中的标准缩进量。"
