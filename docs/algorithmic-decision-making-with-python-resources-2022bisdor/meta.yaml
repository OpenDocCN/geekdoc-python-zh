    # Part V

    Working with Undirected Graphs


    The last part introduces Python resources for working with undirected graphs.
    Its aim is to eventually show the operational benefits one may get when implementing
    vertex adjacency with bipolar-valued characteristics. Several special graph models
    and algorithms are illustrated: Q-coloring, MIS and clique enumeration, line graphs
    and computing maximal matchings, grid graphs and computing the Ising model, *n*-cycle
    graphs and computing their non-isomorphic MISs, spanning tree graphs and graph
    forests, and generating and recognising split, interval, and permutation graphs.


    # Chapter 21

    Bipolar-Valued Undirected Graphs


    # Contents


    - 21.1 Implementing Simple Graphs

    - 21.2 Q-Coloring of a Graph

    - 21.3 MIS and Clique Enumeration

    - 21.4 Line Graphs and Maximal Matchings

    - 21.5 Grids and the ISING Model

    - 21.6 Simulating METROPOLIS Random Walks

    - 21.7 Computing the Non-isomorphic MISs of the n-Cycle Graph


    **Abstract** The chapter introduces bipolar-valued undirected graphs and illustrates
    several special graph models and algorithms like Q-coloring, MIS and clique enumeration,
    line graphs and maximal matchings, grid graphs, and n-cycle graphs with their
    non-isomorphic maximal independent sets of vertices.


    ## 21.1 Implementing Simple Graphs


    In the DIGRAPH3 `graphs` module, the root `Graph` class provides a generic simple
    graph model, without loops and multiple links. A given object of this `Graph`
    type contains at least the following attributes:


    1. name: usually the name of the stored instance

    2. vertices: a dictionary with name and shortName attributes

    3. order: the number of vertices

    4. valuationDomain: a dictionary with three entries: the minimum (-1 means certainly
    no link), the median (0 means missing information), and the maximum characteristic
