- md: "## 23 About Split, Comparability, Interval, and Permutation Graphs\n\nFig.\
    \ 23.2 Graph representation of the testimonies of the professors\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_352_0.png)\n\
    \nDigraph3 (graphviz), R. Bisdorff, 2019\n\nSix professors (labelled A, B, C,\
    \ D, E, and I) had been to the library on the day that a precious document was\
    \ stolen. Each entered once, stayed for some time, and then left. If two professors\
    \ were in the library at the same time, then at least one of them saw the other.\
    \ Detectives questioned the professors and gathered the testimonies that *Abe*\
    \ saw *Burt* and *Eddie*; *Burt* saw *Abe* and *Ida*; *Charlotte* saw *Desmond*\
    \ and *Ida*; *Desmond* saw *Abe* and *Ida*; *Eddie* saw *Burt* and *Ida*; and\
    \ *Ida* saw *Charlotte* and *Eddie*. This data is gathered in the previous file,\
    \ where each positive edge {x, y} models the testimony that, either x saw y or\
    \ y saw x.\n\n```\n>>> from graphs import Graph\n>>> g = Graph('berge')\n>>> g.showShort()\n\
    *---- short description of the graph ----*\nName            : 'berge'\nVertices\
    \        : ['A', 'B', 'C', 'D', 'E', 'I']\nValuation domain : {'min': -1, 'med':\
    \ 0, 'max': 1}\nGamma function  :\n  A -> ['D', 'B', 'E']\n  B -> ['E', 'I', 'A']\n\
    \  C -> ['E', 'D', 'I']\n  D -> ['C', 'I', 'A']\n  E -> ['C', 'B', 'I', 'A']\n\
    \  I -> ['C', 'E', 'B', 'D']\n>>> g.exportGraphViz('berge1')\n*---- exporting\
    \ a dot file for GraphViz tools ---------*\nExporting to berge1.dot\nfdp -Tpng\
    \ berge1.dot -o berge1.png\n```\n\nFrom graph theory, we know that time interval\
    \ intersections graphs must in fact be interval graph instances, i.e. *triangulated*\
    \ and *co-comparative* graphs. The testimonies graph shown in Fig. 23.2 should\
    \ therefore not contain any chordless cycle of four and more vertices. Now, the\
    \ presence or not of such chordless cycles in the testimonies graph can be checked\
    \ with the computeChordlessCycles() method (Bisdorff 2010).\n\n```\n>>> g.computeChordlessCycles()\n\
    Chordless cycle certificate: ['D','C','E','A','D']\nChordless cycle certificate:\
    \ ['D','I','E','A','D']\nChordless cycle certificate: ['D','I','B','A','D']\n\
    [(['D','C','E','A','D'],frozenset({('C','D','E','A')})),\n (['D','I','E','A','D'],frozenset({('D','E','I','A')})),\n\
    \ (['D','I','B','A','D'],frozenset({('D','B','I','A')}))]\n```\n\nWe see in the\
    \ listing above three intersection cycles of length 4, which is impossible to\
    \ occur on the linear timeline. Obviously, one professor lied!\n\nAnd it is *Desmond*.\
    \ If we doubt his testimony that he saw *Abe* (see Line 1 below), we obtain indeed\
    \ in Fig. 23.3 a triangulated graph instance whose dual is a comparability graph.\n\
    \n```\n1 >>> g.setEdgeValue( ('D','A'), 0)\n2 >>> g.showShort()\n3 *---- short\
    \ description of the graph ----*\n4 Name : 'berge'\n5 Vertices : ['A','B','C','D','E','I']\n\
    6 Valuation domain : {'med': 0,'min': -1,'max': 1}\n7 Gamma function :\n8 A ->\
    \ ['B', 'E']\n9 B -> ['A', 'I', 'E']\n10 C -> ['I', 'E', 'D']\n11 D -> ['I', 'C']\n\
    12 E -> ['A', 'I', 'B', 'C']\n13 I -> ['B', 'E', 'D', 'C']\n14 >>> g.isIntervalGraph(Comments=True)\n\
    15 Graph 'berge' is triangulated.\n16 Graph 'dual_berge' is transitively orientable.\n\
    17 => Graph 'berge' is an interval graph.\n18 >>> g.exportGraphViz('berge2')\n\
    19 *---- exporting a dot file for GraphViz tools ----------*\n20 Exporting to\
    \ berge2.dot\n21 fdp -Tpng berge2.dot -o berge2.png\n```\n\n## 23.3 Generating\
    \ Permutation Graphs\n\nA graph is called a *permutation* or *inversion* graph\
    \ if there exists a permutation of its list of vertices, like [4, 3, 6, 1, 5,\
    \ 2], such that the graph is isomorphic to the inversions operated by the permutation\
    \ in this list (see Golumbic 2004, Chap. 7, pp 157-170). This kind of graphs is\
    \ also part of the class of BERGE graphs (Fig. 23.4).\n\n```\n1 >>> from graphs\
    \ import PermutationGraph\n2 >>> g = PermutationGraph(permutation = [4,3,6,1,5,2])\n\
    3 >>> g\n```\n\nFig. 23.4 The [4,3,6,1,5,2] permutation graph\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_354_0.png)\n\
    \n```\n4   *------- Graph instance description ------*\n5   Instance class   \
    \ : PermutationGraph\n6   Instance name     : permutationGraph\n7   Graph Order\
    \       : 6\n8   Permutation       : [4, 3, 6, 1, 5, 2]\n9   Graph Size      \
    \  : 9\n10  Valuation domain  : [-1.00; 1.00]\n11  Attributes        : ['name',\
    \ 'vertices', 'order',\n12                      'permutation', 'valuationDomain',\n\
    13                      'edges', 'size', 'gamma']\n14  >>> g.isPerfectGraph()\n\
    15  True\n16  >>> g.exportGraphViz(fileName='permutationGraph')\n17  *---- exporting\
    \ a dot file for GraphViz tools ----*\n18  Exporting to permutationGraph.dot\n\
    19  fdp -Tpng permutationGraph.dot -o permutationGraph.png\n```\n\nBy using colour\
    \ sorting queues, the minimal vertex colouring shown in Fig. 23.5 on the facing\
    \ page is computable in $O(n\\log(n))$ (Golumbic 2004).\n\n```\n1   >>> g.computeMinimalVertexColoring(Comments=True)\n\
    2   vertex 1: lightcoral\n3   vertex 2: lightcoral\n4   vertex 3: lightblue\n\
    5   vertex 4: gold\n6   vertex 5: lightblue\n7   vertex 6: gold\n8   >>> g.exportGraphViz(fileName='coloredPermutationGraph',\n\
    9   ...                  WithVertexColoring=True)\n10  *---- exporting a dot file\
    \ for GraphViz tools -------*\n11  Exporting to coloredPermutationGraph.dot\n\
    12  fdp -Tpng coloredPermutationGraph.dot -o coloredPermutationGraph.png\n```\n\
    \nThe correspondingly coloured *matching diagram* of the nine inversions—the actual\
    \ edges of the permutation graph–, which are induced by the given [4,3,6,1,5,2]\
    \ permutation, may as well be drawn with the graphviz neato layout and explicitly\
    \ positioned horizontal lists of vertices as shown in Fig. 23.6 on the next page.\n\
    \nFig. 23.5 Minimal vertex colouring of the permutation graph\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_355_0.png)\n\
    \nDigraph3 (graphviz), R. Bisdorff, 2019\n\nFig. 23.6 Coloured matching diagram\
    \ of the permutation [4,3,6,1,5,2]\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_355_1.png)\n\
    \nDigraph3 (graphviz), R. Bisdorff, 2019\n\n```\n1 >>> g.exportPermutationGraphViz('matchingDiagram',\n\
    2 ...                     WithEdgeColoring=True)\n3 *---- exporting a dot file\
    \ for GraphViz tools ----*\n4   Exporting to matchingDiagram.dot\n5   neato -n\
    \ -Tpng matchingDiagram.dot -o matchingDiagram.png\n```\n\nAs mentioned before,\
    \ a permutation graph and its dual are *transitively orientable*. The transitiveOrientation()\
    \ method constructs from a given permutation graph a digraph where each edge of\
    \ the permutation graph is converted into an arc oriented in an increasing alphabetic\
    \ order of the adjacent vertices' keys (see Golumbic 2004). This orientation of\
    \ the edges of a permutation graph is always transitive and delivers a *transitive\
    \ ordering* of the vertices as shown in Fig. 23.7 on the following page.\n\n```\n\
    1 >>> dg = g.transitiveOrientation()\n2 >>> dg\n3   *------- Digraph instance\
    \ description -------*\n4   Instance class    : TransitiveDigraph\n5   Instance\
    \ name     : oriented_permutationGraph\n6   Digraph Order     : 6\n7   Digraph\
    \ Size      : 9\n8   Valuation domain  : [-1.00; 1.00]\n9   Determinateness  \
    \ : 100.000\n10  Attributes        : ['name', 'order', 'actions',\n11        \
    \              'valuationdomain', 'relation',\n12                      'gamma',\
    \ 'notGamma', 'size']\n13 >>> print('Transitivity degree: %.3f' %\n14 ...    \
    \     dgd.computeTransitivityDegree() )\n15   Transitivity degree: 1.000\n16 >>>\
    \ dg.exportGraphViz(fileName='orientedPermGraph')\n```\n\nFig. 23.7 The transitive\
    \ orientation of the permutation graph\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_356_0.png)\n\
    \n```\n17 *---- exporting a dot file for GraphViz tools ----*\n18 Exporting to\
    \ orientedPermGraph.dot\n19 dot -Grankdir=TB -Tpng orientedPermGraph.dot -o orientedPermGraph.png\n\
    ```\n\nThe dual of a permutation graph is again a permutation graph and as such\
    \ also transitively orientable.\n\n```\n1 >>> dgd = (~g).transitiveOrientation()\n\
    2 >>> print('Dual transitivity degree: %.3f' %\n3 ... dgd.computeTransitivityDegree()\
    \ )\n4 Dual transitivity degree: 1.00\n```\n\n## 23.4 Recognising Permutation\
    \ Graphs\n\nNow, a given graph g is a permutation graph if and only if both g\
    \ and -g are transitively orientable. This property gives a polynomial test procedure\
    \ (in O(n^3) due to the transitivity check) for recognising permutation graphs.\n\
    \nLet us consider, for instance, the following random graph of order 8 generated\
    \ with an edge probability of 40% and a random seed equal to 4335.\n\n```\n1 >>>\
    \ from graphs import RandomGraph\n2 >>> g = RandomGraph(order=8,\n3 ... edgeProbability=0.4,seed=4335)\n\
    4 >>> g\n5 *------- Graph instance description -------*\n6 Instance class : RandomGraph\n\
    7 Instance name : randomGraph\n8 Seed : 4335\n9 Edge probability : 0.4\n10 Graph\
    \ Order : 8\n11 Graph Size : 10\n12 Valuation domain : [-1.00; 1.00]\n```"
