    11   Exporting to random3RegularGraph-mis.dot

    12   fdp -Tpng random3RegularGraph-mis.dot\n13                   -o random3RegularGraph-mis.png

    ```


    It is easily verified in Fig. 17.1 that the computed MIS renders indeed a valid
    kernel of the given graph. The complete set of kernels of this 3-regular graph
    instance coincides hence with the set of its MISs.'
