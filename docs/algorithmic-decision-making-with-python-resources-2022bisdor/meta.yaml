- md: "Notice also the (±1) marked outranking situations, like the one between albt\
    \ and ariz. The statement that “Arizona State University strictly outranks University\
    \ of Alberta” is in fact valid with the precise THE criteria significance weights,\
    \ but not with all potential significance weights vectors that are compatible\
    \ with the given significance preorder. All these (±1) marked outranking situations\
    \ become hence doubtful (r(x ≳ y) = 0.00) and the corresponding CS Depts, like\
    \ University of Alberta and Arizona State University, become incomparable in a\
    \ robust outranking sense.\n\nShowing many incomparabilities and indifferences,\
    \ not being transitive and containing many robust outranking circuits make that\
    \ no ranking algorithm, applied to digraph rdg, does exist that would produce\
    \ a unique optimal linear ranking result. Methodologically, we are only left with\
    \ ranking heuristics. In Chap. 8 on ranking with multiple criteria we have now\
    \ seen several potential heuristic ranking rules that can be used for ranking\
    \ with an outranking digraph; yet, they may deliver potentially more or less diverging\
    \ results. Considering the order of digraph rdg (75) and the largely unequal THE\
    \ criteria significance weights, we rather opt, in this tutorial, for the NETFlows\
    \ ranking rule. Its complexity in O(n²) is indeed quite tractable and, by avoiding\
    \ potential tyranny of short majority effects, the NETFlows rule may specifically\
    \ take the ranking criteria significance weights into a more fairly balanced account.\n\
