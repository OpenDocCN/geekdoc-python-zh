    ```


    When actually computing linear rankings of the complete set of alternatives, the
    local outranking relations per component are of no practical usage, and we may
    furthermore reduce the memory occupation of the resulting digraph by:


    +   1. refining the ordering of the quantile classes by taking into account how
    well an alternative is outranking the lower limit of its quantile class, respectively,
    the upper limit of its quantile class is *not* outranking the alternative;

    2. dropping the local outranking digraphs and keeping for each component only
    a locally ranked list of alternatives.


    We provide therefore the `cQuantilesRankingDigraph` class from the `cSparseIntegerOutrankingDigraphs`
    module.


    **Listing 11.6** Ranking the sparse integer outranking digraph


    ```

    1 >>> from cSparseIntegerOutrankingDigraphs import\n2 ...             cQuantilesRankingDigraph

    3 >>> qr = cQuantilesRankingDigraph(t,4)

    ```'
