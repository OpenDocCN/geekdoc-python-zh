    # Chapter 23

    About Split, Comparability, Interval, and Permutation Graphs


    # Contents


    +   23.1 A ‘multiply’ Perfect Graph ........................................................................
    329

    23.2 Who Is the Liar? .........................................................................................
    331

    23.3 Generating Permutation Graphs ..................................................................
    333

    23.4 Recognising Permutation Graphs .................................................................
    336


    **Abstract** The last chapter of this book eventually presents some famous classes
    of perfect graphs, namely comparability, interval, permutation, and split graphs.
    We first present an example of a graph which is at the same time a triangulated,
    a comparability, a split, and a permutation graph. The importance to be an interval
    is illustrated with BERGE’s mystery story. We discuss furthermore the generation
    of permutation graphs and close with how to recognise that a given graph is in
    fact a permutation graph.


    # 23.1 A ‘multiply’ Perfect Graph


    A graph 𝔤 is called:


    +   - BERGE or *perfect* when 𝔤 and its dual -𝔤 both do not contain any chordless
    odd cycles of length greater than 3 (Berge 1963; Chudnovsky et al. 2006).

    - *Triangulated* graph when 𝔤 does not contain any *chordless cycle* of length
    4 and more.


    **Definition 23.1 (Some Perfect Graph Classes)** Following Martin Golumbic (see
    Golumbic 2004, p. 149), we call a given graph 𝔤:


    +   - *Comparability* graph when 𝔤 is *transitively orientable*.

    - *Interval* graph when 𝔤 is *triangulated* and its dual—𝔤 is a *comparability*
    graph.

    - *Permutation* graph when 𝔤 and its dual -𝔤 both are *comparability* graphs.

    - *Split* graph when 𝔤 and its dual -𝔤 both are *triangulated* graphs.'
  - "[PAGE 350]\n\nTo illustrate these *perfect* graph classes, we will generate from\
    \ 8 intervals, randomly chosen in the default integer range [0, 10], a RandomIntervalIntersectionsGraph\
    \ instance g (see Line 2 below).\n\n```\n>>> from graphs import\\n...        \
    \     RandomIntervalIntersectionsGraph\n>>> g = RandomIntervalIntersectionsGraph(\\\
    n...                                        order=8,seed=100)\n>>> g\n*------\
    \ Graph instance description ------*\n  Instance class    : RandomIntervalIntersectionsGraph\n\
    \  Instance name     : randIntervalIntersections\n  Seed              : 100\n\
    \  Graph Order       : 8\n  Graph Size        : 23\n  Valuation domain  : [-1.0;\
    \ 1.0]\n  Attributes        : ['seed', 'name', 'order',\n        'intervals',\
    \ 'vertices', 'valuationDomain',\n        'edges', 'size', 'gamma']\n>>> print(g.intervals)\n\
    [(2,7), (2,7), (5,6), (6,8), (1,8), (1,1), (4,7), (0,10)]\n```\n\nWith seed =\
    \ 100, we obtain here an *interval graph*, in fact a *perfect graph*, which is\
    \ *conjointly a triangulated, a comparability, a split, and a permutation graph*\
    \ (see Listing 23.1, Lines 2, 6, 10, and 14 and Fig. 23.1 on the next page).\n\
    \n# Listing 23.1 Testing perfect graph categories\n\n```\n>>> g.isPerfectGraph(Comments=True)\n\
    \  Graph 'randIntervalIntersections' is perfect !\n>>> g.isIntervalGraph(Comments=True)\n\
    \  Graph 'randIntervalIntersections' is triangulated.\n  Graph 'dual_randIntervalIntersections'\
    \ is transitively orientable.\n  => Graph 'randIntervalIntersections' is an interval\
    \ graph.\n>>> g.isSplitGraph(Comments=True)\n  Graph 'randIntervalIntersections'\
    \ is triangulated.\n  Graph 'dual_randIntervalIntersections' is triangulated.\n\
    \  => Graph 'randIntervalIntersections' is a split graph.\n>>> g.isPermutationGraph(Comments=True)\n\
    \  Graph 'randIntervalIntersections' is transitively orientable.\n  Graph 'dual_randIntervalIntersections'\
    \ is transitively orientable.\n  => Graph 'randIntervalIntersections' is a permutation\
    \ graph.\n>>> g.exportGraphViz('randomSplitGraph')\n  *----- exporting a dot file\
    \ for GraphViz tools ----------*\n  Exporting to randomSplitGraph.dot\n  fdp -Tpng\
    \ randomSplitGraph.dot -o randomSplitGraph.png\n```\n\nNotice however that the\
    \ following four properties of a given graph g:\n\n+   1. g is a *comparability*\
    \ graph,\n2. −g is a comparability graph,\n3. g is a *triangulated* graph,\n4.\
    \ −g is a triangulated graph,\n\nare all *independent* of one another (Golumbic\
    \ 2004, p. 275)."
