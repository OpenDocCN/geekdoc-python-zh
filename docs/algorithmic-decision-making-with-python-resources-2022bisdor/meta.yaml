    Now, a pairwise outranking situation will be qualified at stability level +2,
    i.e. positively validated with any significance weights that are compatible with
    the given weights preorder, when for all $i$, we observe $Q[i] \le -Q[i]$, and
    there exists one $i$ such that $Q[i] < -Q[i]$. Similarly, a pairwise outranked
    situation will be qualified at stability level $-2$, when for all $i$, we observe
    $Q[i] \ge -Q[i]$, and there exists one $i$ such that $Q[i] > -Q[i]$ (Bisdorff
    2004b).


    Let us verify that the outranking situation observed, for instance, between alternatives
    p2 and p1 does indeed verify this *first-order distributional dominance* condition.


