    Chapter 12 presents a case study concerning the building of a best choice recommendation
    for Alice, a German student who wants some advice concerning the choice of her
    future university studies. We present Alice’s performance tableau—potential foreign
    language study programs, her decision objectives, performance criteria and performance
    evaluations—and build a best choice recommendation for her. A thorough robustness
