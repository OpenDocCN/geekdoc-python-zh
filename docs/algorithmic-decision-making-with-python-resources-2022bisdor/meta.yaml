- md: 'The `KemenyRanking` class from the `linearOrders` module computes such a ranking
    which is highest possible correlated with the underlying strict outranking relation.
    The KEMENY rule is also *invariant* under the codal transform.


    Mind that the `KemenyRanking` class constructor, in order to find a KEMENY ranking,
    has to compute NETFLOWS scores for every permutation of the list of decision alternatives
    (see Eq. 8.1 on the facing page). Therefore the class is limited, by default,
    to digraphs of order up to 7 (Bisdorff 2021). In Listing 8.8 Line 2, the `orderLimit`
    parameter allows to raise this limit.


    **Listing 8.8** Computing a KEMENY ranking


    ```

    >>> from linearOrders import KemenyRanking

    >>> ke = KemenyRanking(gcd,orderLimit=9)

    >>> # default orderLimit is 7

    >>> ke.showRanking()

    [''a5'',''a6'',''a7'',''a3'',''a9'',''a4'',''a1'',''a8'',''a2'']

    >>> corr = gcd.computeOrdinalCorrelation(ke)

    >>> gcd.showCorrelation(corr)

    Correlation indexes:

    Extended Kendall tau : +0.779

    Epistemic determination : 0.230

    Bipolar-valued equivalence : +0.179

    ```


    So, +0.779 represents the *highest possible* ordinal correlation index—*fitness*—any
    potential linear ranking can achieve with the given pairwise outranking digraph
    (see Listing 8.8 Line 9).


    A KEMENY ranking may not be unique. In our example here, we obtain in fact two
    such KEMENY rankings with a same *maximal* KEMENY index of 12.92.


