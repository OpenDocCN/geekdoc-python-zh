    With the quantiles parameter (see Listing 10.10 Line 2), we recover by interpolation
    the same quartiles rating as obtained directly with historical performance quartiles
    (see Listing 10.8 on page 132). Mind that a correct interpolation of quantiles
    from a given cumulative distribution function requires more or less uniform distributions
    of observations in each bin.


    More generally, in the case of industrial production monitoring problems, for
    instance, where large volumes of historical performance data may be available,
    it can be of interest to estimate even more precisely the marginal cumulative
    distribution functions, especially when *tail* rating results, i.e. distinguishing
    *very*'
