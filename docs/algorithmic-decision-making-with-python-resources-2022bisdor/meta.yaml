  md: "# 12.4 Robustness Analysis\n\nAlice considers her four decision objectives\
    \ as being *more or less* equally important. Here we have, however, allocated\
    \ *strictly equal* importance weights with *strictly equi-significant* criteria\
    \ per objective. How robust is the previous best choice recommendation when, now,\
    \ we would consider the importance of the objectives and, hence, the significance\
    \ of the respective performance criteria to be *more or less uncertain*?\n\nTo\
    \ answer this question, we consider the respective criteria significance weights\
    \ $w_j$ for $j = 1, ..., 9$ to be *triangular random variables* in the range 0\
    \ to $2w_j$ with mode = $w_j$. Computing a corresponding *90%-confident* outranking\
    \ digraph may be done with the help of the `ConfidentBipolarOutrankingDigraph`\
    \ class (see Chap. 18).\n\n**Listing 12.7** Computing the 90% confident outranking\
    \ digraph\n\n```\n>>> from outrankingDigraphs import\\n...     ConfidentBipolarOutrankingDigraph\n\
    >>> cdg = ConfidentBipolarOutrankingDigraph(t,\\n...     distribution='triangular',confidence=90.0)\n\
    >>> cdg\n    *------- Object instance description ------*\n    Instance class\
    \ : ConfidentBipolarOutrankingDigraph\n    Instance name : rel_AliceChoice_CLT\n\
    \    Actions : 10\n    Criteria : 9\n    Size : 44\n    Valuation domain : [-1.00;1.00]\n\
    \    Uncertainty model : triangular(a=0,b=2w)\n    Likelihood domain : [-1.0;+1.0]\n\
    \    Confidence level : 90.0%\n    Confident majority : 14/24 (58.3%)\n    Determinateness\
    \ (%) : 68.19\n```\n\nOf the original 67 valid outranking situations, 44 outranking\
    \ situations are retained as being 90%-confident (see Listing 12.7 Line 11). The\
    \ corresponding 90%-confident *qualified majority* of criteria significance amounts\
    \ to 14/24 = 58.3% (Line 16).\n\nConcerning now a 90%-confident best choice recommendation,\
    \ we are lucky.\n\n**Listing 12.8** Computing the 90%-confident best choice recommendation\n\
    \n```\n>>> cdg.computeCondorcetWinners()\n['I-FHK']\n>>> cdg.showBestChoiceRecommendation()\n\
    ***************************\nBest choice recommendation(s) (BCR)\n(in decreasing\
    \ order of determinateness)\nCredibility domain: [-1.00,1.00]\n=== >> potential\
    \ best choice(s)\n```"
