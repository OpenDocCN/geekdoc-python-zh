    # Notes


    Following a seminar presentation in 2005 at the LAMSADE.<sup>9</sup> where the
    author promoted the use of kernels of the outranking digraph as suitable candidates
    for delivering best choice recommendations (Bisdorff 2005), a critical discussion
    started about the methodological requirement for a convincing best choice recommendation
    to be internally stable (pragmatic principle ℘3). *Denis Bouyssou* illustrated
    his doubts with the potential outranking digraph shown in Fig. 4.5 on the next
    page.


    <sup>8</sup> See also the notes of Lecture 7 from the MICS Algorithmic Decision
    Theory course (Bisdorff 2020).

    <sup>9</sup> Laboratoires d''Analyse et de Modélisation de Systèmes d''Aide à
    la Décision, Université Paris-Dauphine, UMR 7243 CNRS.'
