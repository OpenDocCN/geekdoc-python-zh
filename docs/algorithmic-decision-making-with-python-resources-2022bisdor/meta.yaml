    +   - Otherwise, the outranking situation between alternatives $x$ and $y$ is
    considered to be *indeterminate*.


    The credibility of each pairwise outranking situation, denoted $r(x \succcurlyeq
    y)$, is measured in a bipolar significance valuation $[-1.0, 1.0]$, where *positive*
    terms $r(x \succcurlyeq y) > 0.0$ indicate a *validated outranking*, and *negative*
    terms $r(x \succcurlyeq y) < 0.0$ indicate an *invalidated outranking*, i.e. a
    *validated outranked* situation. The *median* value $r(x \succcurlyeq y) = 0.0$
    represents an *indeterminate* situation (see Bisdorff 2004, 2013).


    For computing such a bipolar-valued binary outranking relation from the given
    performance tableau pt, we use the `BipolarOutrankingDigraph` class from the `outrankingDigraphs`
    module. The corresponding `showHTMLRelationTable()` method shows here the resulting
    bipolar-valued adjacency matrix in a system browser window (see Fig. 4.2).


    **Listing 4.3** Computing a bipolar-valued outranking digraph


    ```

    1 >>> from outrankingDigraphs import BipolarOutrankingDigraph

    2 >>> bod = BipolarOutrankingDigraph(pt)

    3 >>> bod.showHTMLRelationTable()

    ```


