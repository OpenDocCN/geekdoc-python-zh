    \ 属性在构建决策建议时，对于指定性能标准的显著性具有方法论上的实用性。通常，我们确实假设所有决策目标同等重要，并且每个目标下的性能标准具有相等的显著性。例如，这是随机\
    \ *3-目标* 性能矩阵模型中的默认设置。\n\n**清单5.3** 决策目标描述示例\n\n```python\n>>> # t = Random3ObjectivesPerformanceTableau()\n\
