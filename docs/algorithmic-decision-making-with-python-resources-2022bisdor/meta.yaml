- md: "## 20.3 Pairwise Comparison of Approval–Disapproval Votes\n\nThe approval votes\
    \ of each voter define now on the set of eligible candidates three ordered categories:\
    \ his approved (+1), his ignored (0), and his disapproved (−1) ones. Within each\
    \ of these three categories, we consider the voter’s actual preferences as *not\
    \ communicated*, i.e. as missing data. This gives for each voter a partially determined\
    \ strict order which we find in the `ballot` attribute.\n\n```\n>>> bavp.ballot['v001']['c12']\n\
    {'c02': Decimal('1'), 'c11': Decimal('1'),\n 'c14': Decimal('1'), 'c04': Decimal('0'),\n\
    \ 'c06': Decimal('1'), 'c05': Decimal('1'),\n 'c12': Decimal('0'), 'c13': Decimal('0'),\n\
    \ 'c15': Decimal('1'), 'c01': Decimal('1'),\n 'c08': Decimal('1'), 'c07': Decimal('1'),\n\
    \ 'c09': Decimal('0'), 'c03': Decimal('1'),\n 'c10': Decimal('0')}\n```\n\nFor\
    \ voter v001, for instance, the best approved Candidate c12 is strictly preferred\
    \ to Candidates: c01, c02, c03, c05, c06, c07, c08, c11, c14, and c15. No candidate\
    \ is preferred to c12, and the comparison with c04, c09, c10, and c13 is not communicated,\
    \ hence indeterminate. Mind by the way that the reflexive comparison of c12 with\
    \ itself is, as usual, ignored, i.e. indeterminate. Each voter v defines thus\
    \ a partially determined transitive strict preference relation denoted ≻v on the\
    \ eligible candidates.\n\nFor each pair of eligible candidates, we aggregate the\
    \ previous individual voter’s preferences into a truth characteristic of the statement:\
    \ ‘Candidate x is *better approved than* Candidate y’, denoted r(x ≻ y):\n\n$$r(x\
    \ \\succ y) = \\sum_{\\mathrm{v}} (r(x \\succ_{\\mathrm{v}} y)) .$$\n\nWe say\
    \ that Candidate $x$ is *better approved* than Candidate $y$ when $r(x > y) >\
    \ 0$, i.e. there is a majority of voters who approve *more* and disapprove *less*\
    \ $x$ than $y$. Vice versa, we say that Candidate $x$ is *not better approved*\
    \ than Candidate $y$ when $r(x > y) < 0$, i.e. there is a majority of voters who\
    \ disapprove more and approve less $x$ than $y$. This computation is achieved\
    \ with the `MajorityMarginsDigraph` constructor.\n\n```\n>>> from votingProfiles\
    \ import MajorityMarginsDigraph\n>>> m = MajorityMarginsDigraph(bavp)\n>>> m\n\
    *------ Digraph instance description ------*\n    Instance class      : MajorityMarginsDigraph\n\
    \    Instance name       : rel_bpApVotingProfile\n    Digraph Order       : 15\n\
