    3.3 Pairwise Comparisons


    ```

    8  ''a4'' | +0.00  +0.14  +0.57  +1.00  +0.29  +0.57  -0.43

    9  ''a5'' | -0.29  +0.00  +0.14  +0.00  +1.00  +0.29  -0.29

