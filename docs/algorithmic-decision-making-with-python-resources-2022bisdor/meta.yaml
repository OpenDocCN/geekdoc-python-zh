- img_proc: true
  md: 'i.e. the asymmetric part—the codual—of a valid outranking digraph. In this
    case, nodes a and d—the kernel of the strict outranking digraph—would actually
    for sure outrank each other and, hence, represent both indifferently the natural
    best choice recommendation. However, in this not strict codual digraph, node a
    becomes also the unique CONDORCET winner—outranking for sure all other nodes—and
    gives hence the evident unique best choice recommendation.


    Only after 2013, when the weak completeness and the coduality properties of the
    outranking digraph were discovered, it became obvious that the initial prekernels
    of the strict outranking digraph, coupled with the solution of the corresponding
    kernel equation system, were in fact delivering the most convincing best choice
    recommendations (see Chap. 17, Sect. 20.4 and Bisdorff 2013). It stays an interesting
    open mathematical problem to show (or not) that both necessary conditions—weak
    completeness and coduality—are also sufficient for qualifying any bipolar-valued
    digraph as potential instance of an outranking digraph.


