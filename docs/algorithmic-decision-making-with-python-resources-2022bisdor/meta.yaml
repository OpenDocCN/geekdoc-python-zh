  - "[PAGE 139]\n\nKEMENY ranking (see Listing 8.8 on page 105). Only two adjacent\
    \ pairs: (a6, a7) and (a8, a9) are actually inverted here. Notice that the KOHLER\
    \ ranking rule, contrary to the previously mentioned rules, is **not** invariant\
    \ under the codual transform and requires to work on the strict outranking digraph\
    \ gcd for a better correlation result.\n\n```\n>>> ko = KohlerRanking(g)\n>>>\
    \ corr = g.computeOrdinalCorrelation(ko)\n>>> g.showCorrelation(corr)\nCorrelation\
    \ indexes:\n  Crisp ordinal correlation  : +0.483\n  Epistemic determination \
    \   :  0.230\n  Bipolar-valued equivalence : +0.111\n```\n\nBut the KOHLER rule\
    \ has a *dual* version, the prudent *Arrow-Raynaud* ordering-by-choosing rule,\
    \ where a corresponding *max-min* strategy, when used on the non-strict dual outranking\
    \ digraph −g, for ordering from *last* to *first* produces a similar ranking result\
    \ (Arrow and Raynaud 1986).\n\nNoticing that the NETFLOWS score of an alternative\
    \ *x* represents in fact a bipolar-valued characteristic of the assertion “alternative\
    \ *x* is ranked first”, we may enhance the KOHLER rule by replacing the simple\
    \ *min-max* strategy with an *iterated* maximal NETFLOWS score selection.\n\n\
    # **Algorithm 8.4** The iterated NETFLOWS ranking-by-choosing rule\n\n*in* : bipolar-valued\
    \ digraph G(X, ≳).\n*out* : linear ranking of the set *X* of *n* decision actions.\n\
    \nAt step *i* (*i* goes from 1 to *n*) do the following:\n\n+   1. Compute for\
    \ each row of the bipolar-valued outranking relation table (see Listing 8.1 on\
    \ page 98) the corresponding NETFLOWS score;\n2. Select the row where this score\
    \ is *maximal*, ties being resolved by lexicographic order;\n3. Put the corresponding\
    \ decision alternative at rank *i*;\n4. Delete the corresponding row and column\
    \ from the relation table and restart until the table is empty.\n\nThe `IteratedNetFlowsRanking`\
    \ class from the `linearOrders` module computes this ranking result.\n\n# **Listing\
    \ 8.16** Ranking-by-choosing with iterated maximal NETFLOWS scores\n\n```\n>>>\
    \ from linearOrders import IteratedNetFlowsRanking\n>>> inf = IteratedNetFlowsRanking(g)\n\
    >>> inf\n*------- Digraph instance description -------*\n  Instance class    \
    \   : IteratedNetFlowsRanking\n  Instance name        : rel_randomCBperftab_ranked\n\
    \  Digraph Order        : 9\n  Digraph Size         : 36\n```"
