    Fig. 16.1 Star-ratings of movies from September 2007


    Such a case is given with a list of star-rated movies that could be seen in town
    in September 2007.¹ The underlying performance tableau data, stored in a file
    named graffiti07.py,² is shown below with the showHTMLPerformanceTableau() method:


    ```

    >>> from outrankingDigraphs import

    ...                     PerformanceTableau

    >>> gt07 = PerformanceTableau(''graffiti07'')

    >>> gt07.showHTMLPerformanceTableau(

    ...                     title=''Graffiti Star wars'',

    ...                     ndigits=0)

    ```


    Figure 16.1 shows the star-ratings of 25 movies by 15 journalists and movie critics:
    5 stars (masterpiece), 4 stars (must be seen), 3 stars (excellent), 2 stars (good),
    1 star (could be seen), −1 star (I do not like), −2 stars (I hate), and NA (not
    seen). Notice in the second row the higher significance (3.00) that is granted
    to two locally renowned movie critics, namely JH and VT. Their opinion counts
    for three times the opinion of the other critics. With six times a 4 stars (must
    be seen) mark, mv_QS is best-rated, followed by mv_RR with four times a 4 stars
    mark. Fewest stars obtain movie mv_TF with three times a -1 star (do not like)
    mark and five times a 1 star mark. Notice that many movies, like movie mv_BI,
    are only rated by some of the critics.


    To aggregate all the critics'' star-ratings, the *Graffiti* magazine computes
    for each movie a global score—the average weighted number of stars it obtained—just
    ignoring the *not seen* movies. Listing 16.1 illustrates below how to compute
    these global scores using the data stored in the gt07 performance tableau. Attribute
    gt07.actions, respectively, gt07.criteria, contains the description of the 25
    movies, respectively, the 15 critics. The actual star-ratings are to be found
    in the gt07.evaluation attribute.


    ### Listing 16.1 Computing the average weighted number of stars per movie


    ```

    1 >>> # gt07 = PerformanceTableau(''graffiti07'')

    2 >>> globalScores = {}

    3 >>> for mv in gt07.actions:

    4 >>>     globalScores[mv] = Decimal(''0'')

    5 >>>     sumWeights = Decimal(''0'')

    6 >>>     for critic in gt07.criteria:

    7 >>>         stars = gt07.evaluation[critic][mv]

    8 >>>         if stars != gt07.NA:

    9 >>>             weight = gt07.criteria[critic][''weight'']

    10 >>>             globalScores[mv] += (stars * weight)

    11 >>>             sumWeights += weight

    12 >>>     globalScores[mv] /= sumWeights

    13 >>> graffitiList = [(globalScores[mv],mv) for mv in globalScores]

    14 >>> graffitiList.sort(reverse=True)

    15 >>> for item in graffitiList:

    16 >>>     print(''%s: %.2f'' % (item[1],item[0]) )

    17 mv_QS: 3.60

    18 mv_RR: 2.88

    19 mv_PE: 2.67

    20 mv_JB: 2.62

    21 mv_HN: 2.62

    22 mv_NP: 2.60

    23 mv_HS: 2.60

    24 mv_DG: 2.56

    25 mv_SM: 2.53

    26 mv_FC: 2.41

    27 mv_TP: 2.21

    28 mv_CM: 2.20

    29 mv_TM: 2.17

    30 mv_DF: 1.94

    31 mv_RG: 1.83

    32 mv_MB: 1.73

    33 mv_GH: 1.67

    34 mv_DJ: 1.67

    35 mv_FF: 1.61

    36 mv_AL: 1.60

    37 mv_HP: 1.55

    38 mv_DI: 1.42

    39 mv_GG: 0.71

    40 mv_BI: 0.71

    41 mv_TF: 0.55

    ```


    The global scores ranking confirms in Lines 17–18 both leading movies—mv_QS (3.60)
    and mv_RR (2.88)—as well as in Line 41 the weakest rated one—mv_TF (0.55). Mind
    however that these global averages, due to the numerous missing ratings, are not
    computed with commensurable denominators; some critics do indeed use a more or
    less extended range of stars. The movies not seen, for instance, by critic SJ
    are favoured, as this critic is severer than others in her rating. Dropping the
    movies that were not rated by all the critics is not possible either, as none
    of the 25 movies was actually rated by all the 15 critics. Providing a fictive
    value for the many not seen situations will as well always somehow falsify the
    global scores. What to do?


    A better approach is to rank the movies on the basis of pairwise bipolar-valued
    “rated at least as well as” statements. Under this epistemic argumentation approach,
    missing evaluations are naturally treated as opinion abstentions and hence do
    not falsify the logical computations. Such a **NETFLOWS** ranking from best-rated
    to weakest-rated is provided by the **heatmap** browser view generated with the
    `showHTMLPerformanceHeatmap()` method (see Listing 16.2).


    ### Listing 16.2 Showing the movie from best- to worst-rated in a heatmap view


    ```

    1 >>> gt07.showHTMLPerformanceHeatmap(

    2 ...                 pageTitle=''Ranking the movies'',

    3 ...                 rankingRule=''NetFlows'',

    4 ...                 Correlations=True,

    5 ...                 ndigits=0)

    ```


    The **NETFLOWS** ranking shown in Fig. 16.2 on the facing page confirms again
    that movie mv_QS, with 6 *must be seen* marks, is correctly first-ranked and the
    movie mv_TF is last-ranked with five *do not like* marks.


    It is fair, however, to eventually mention here that the *Graffiti* magazine’s
    average stars ranking rule is actually showing a very similar result. Indeed,
    average scores usually confirm well all evident pairwise comparisons, yet *enforce*
    comparability for all less evident ones. How to judge now the fitness of a given
    ranking rule?


    This is the purpose of the ordinal correlation *tau* indexes shown in Fig. 16.2
    on the next page, third row. Computing these ordinal correlation indexes is the
    subject of the next section.


    ## 16.2 KENDALL’s Ordinal Correlation Tau Index


    M.G. Kendall defined his ordinal correlation τ (tau) index for linear orders of
    dimension n as a balancing of the number Co of correctly oriented pairs against
    the number In of incorrectly oriented pairs (Kendall 1938). The total number of
    irreflexive pairs being n(n − 1), in the case of linear orders, Co + In = n(n
    − 1). Hence τ = (Co / n(n-1)) − (In / n(n-1)). In case In is zero, τ = +1 (all
    pairs are equivalently oriented); inversely, in case Co is zero, τ = −1 (all pairs
    are differently oriented).


    ---

    ¹ Graffiti Star wars, Edition Revue Luxembourg, September 2007, p. 30.

    ² To be found in the examples directory of the DIGRAPH3 resources.'
