    WILSON’s algorithm only works for connected graphs (Wilson 1996). More general,
    and in case of a not connected graph, the RandomSpanningForest class generates
    a not necessarily uniform random instance of a spanning forest—one or more random
    tree graphs—generated from a random depth first search of the graph components’
    traversals (see Listing 22.7 and Fig. 22.6).


    Listing 22.7 Computing spanning forests over disconnected graphs


    ```

    1 >>> g = RandomGraph(order=15,\n2 ...                 edgeProbability=0.1, seed=140)

    3 >>> g.computeComponents()

