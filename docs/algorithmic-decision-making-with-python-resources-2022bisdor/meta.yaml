    \n一个图 \U0001D524 被称为：\n\n- BERGE 图或*完美图*，当 \U0001D524 及其对偶 -\U0001D524 都不包含任何长度大于\
    \ 3 的无弦奇环时（Berge 1963; Chudnovsky et al. 2006）。\n- *三角化图*，当 \U0001D524 不包含任何长度大于等于\
    \ 4 的*无弦环*时。\n\n**定义 23.1（一些完美图类别）** 遵循 Martin Golumbic（参见 Golumbic 2004, p. 149），我们称一个给定的图\
    \ \U0001D524 为：\n\n- *可比图*，当 \U0001D524 是*可传递定向的*。\n- *区间图*，当 \U0001D524 是*三角化的*且其对偶\
    \ -\U0001D524 是*可比图*。\n- *置换图*，当 \U0001D524 及其对偶 -\U0001D524 都是*可比图*。\n- *分裂图*，当\
    \ \U0001D524 及其对偶 -\U0001D524 都是*三角化图*。\n\n为了说明这些*完美图*类别，我们将从默认整数范围 [0, 10] 中随机选择的\
    \ 8 个区间生成一个 RandomIntervalIntersectionsGraph 实例 g（参见下面第 2 行）。\n\n```\n>>> from\
    \ graphs import RandomIntervalIntersectionsGraph\n>>> g = RandomIntervalIntersectionsGraph(order=8,seed=100)\n\
    >>> g\n*------ 图实例描述 ------*\n  实例类         : RandomIntervalIntersectionsGraph\n\
    \  实例名称       : randIntervalIntersections\n  种子           : 100\n  图阶        \
    \   : 8\n  图规模         : 23\n  评价域         : [-1.0; 1.0]\n  属性           : ['seed',\
    \ 'name', 'order',\n        'intervals', 'vertices', 'valuationDomain',\n    \
    \    'edges', 'size', 'gamma']\n>>> print(g.intervals)\n[(2,7), (2,7), (5,6),\
    \ (6,8), (1,8), (1,1), (4,7), (0,10)]\n```\n\n使用种子 = 100，我们在此得到一个*区间图*，实际上是一个*完美图*，它*同时是三角化图、可比图、分裂图和置换图*（参见清单\
    \ 23.1 的第 2、6、10 和 14 行以及下一页的图 23.1）。\n\n### 清单 23.1 测试完美图类别\n\n```\n>>> g.isPerfectGraph(Comments=True)\n\
    \  图 'randIntervalIntersections' 是完美图！\n>>> g.isIntervalGraph(Comments=True)\n\
    \  图 'randIntervalIntersections' 是三角化的。\n  图 'dual_randIntervalIntersections'\
    \ 是可传递定向的。\n  => 图 'randIntervalIntersections' 是区间图。\n>>> g.isSplitGraph(Comments=True)\n\
    \  图 'randIntervalIntersections' 是三角化的。\n  图 'dual_randIntervalIntersections'\
    \ 是三角化的。\n  => 图 'randIntervalIntersections' 是分裂图。\n>>> g.isPermutationGraph(Comments=True)\n\
    \  图 'randIntervalIntersections' 是可传递定向的。\n  图 'dual_randIntervalIntersections'\
    \ 是可传递定向的。\n  => 图 'randIntervalIntersections' 是置换图。\n>>> g.exportGraphViz('randomSplitGraph')\n\
    \  *----- 为 GraphViz 工具导出 dot 文件 ----------*\n  导出至 randomSplitGraph.dot\n  fdp\
    \ -Tpng randomSplitGraph.dot -o randomSplitGraph.png\n```\n\n然而请注意，给定图 g 的以下四个属性：\n\
    \n1. g 是*可比图*，\n2. −g 是可比图，\n3. g 是*三角化图*，\n4. −g 是三角化图，\n\n它们彼此都是*独立的*（Golumbic\
    \ 2004, p. 275）。\n\n## 23.2 谁是说谎者？\n\n图 23.1 一个联合的三角化、可比、区间、置换和分裂图\n在此图中，可以很容易地识别出分裂图的基本特征，即总是可以分裂成两个不相交的子图：一个独立集\
    \ {v6} 和一个团——{v1, v2, v3, v4, v5, v7, v8}——这解释了它们的名称。\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_351_0.png)\n\
    \n## 23.2 谁是说谎者？\n\nGolumbic（2004, p. 20）讲述的 Claude Berge 著名的神秘故事很好地说明了成为区间图的重要性。\n\
    假设文件 berge.py¹ 包含以下图实例数据：\n\n```\nvertices = {\n    'A': {'name': 'Abe', 'shortName':\
    \ 'A'},\n    'B': {'name': 'Burt', 'shortName': 'B'},\n    'C': {'name': 'Charlotte',\
    \ 'shortName': 'C'},\n    'D': {'name': 'Desmond', 'shortName': 'D'},\n    'E':\
    \ {'name': 'Eddie', 'shortName': 'E'},\n    'I': {'name': 'Ida', 'shortName':\
    \ 'I'},\n    }\nvaluationDomain = {'min':-1,'med':0,'max':1}\nedges = {\n    frozenset(['A','B'])\
    \ : 1,\n    frozenset(['A','C']) : -1,\n    frozenset(['A','D']) : 1,\n    frozenset(['A','E'])\
    \ : 1,\n    frozenset(['A','I']) : -1,\n    frozenset(['B','C']) : -1,\n    frozenset(['B','D'])\
    \ : -1,\n    frozenset(['B','E']) : 1,\n    frozenset(['B','I']) : 1,\n    frozenset(['C','D'])\
    \ : 1,\n    frozenset(['C','E']) : 1,\n    frozenset(['C','I']) : 1,\n    frozenset(['D','E'])\
    \ : -1,\n    frozenset(['D','I']) : 1,\n    frozenset(['E','I']) : 1,\n    }\n\
    ```\n\n¹ 文件 berge.py 提供在 DIGRAPH3 资源的 examples 目录中。"
