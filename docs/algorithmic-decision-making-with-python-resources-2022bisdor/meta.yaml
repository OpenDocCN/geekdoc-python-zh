    >>> mmdg = MajorityMarginsDigraph(v)\n>>> mmdg.showRelationTable(ReflexiveTerms=False)\n\
    \ * ---- Relation Table ----*\n```\n\n**Fig. 7.2** *Cyclic social preferences.*\
    \ c1 > c2 > c3 > c1, for instance\n\nDigraph3 (graphviz), R. Bisdorff, 2020\n\n\
    ```\n15  M(x, y) | 'c1'  'c2'  'c3'  'c4'  'c5'\n16  ---------|---------------------------------\n\
