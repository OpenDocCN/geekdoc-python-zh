    scoring rule, the THE ranking naturally induces marginal criterion correlations
    that are compatible with the given significance weight preorder (Lines 13–17).
    Notice that the mean marginal correlation is of a similar value (+0.51, Line 19)
    as the robust NETFLOWS ranking. Yet, its standard deviation is slightly higher,
    which leads to a less fairer balancing of the three major ranking criteria.


    To conclude, let us emphasise, that, without any commensurability hypothesis and
    by taking, furthermore, into account, first, the always present more or less imprecision
    of any performance evaluation and, secondly, solely ordinal criteria significance
    weights, we may obtain here with our robust outranking approach a very similar
    ranking result with a slightly better preference modelling quality. A convincing
    heatmap view of the 25 first-ranked Institutions may eventually be generated in
    the default system browser with following command (Fig. 13.4 on the following
    page).


