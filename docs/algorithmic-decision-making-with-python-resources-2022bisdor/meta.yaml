    at all, whereas empty and indeterminate digraphs admit both, an empty border and
    an empty inner part.


    # 2.5 Fusion by Epistemic Disjunction


    The Digraph object rdg can be restored from both partial objects asymDg and symDg,
    or as well from the border bg and the inner part ig, with a *bipolar disjunctive
    fusion operator o-max*, also called *epistemic disjunction*, available via the
    FusionDigraph class.


    **Listing 2.6** Epistemic fusion of partial digraphs


    ```

    1 >>> from digraphs import FusionDigraph

    2 >>> fusDg = FusionDigraph(asymDg,symDg,operator=''o-max'')

    3 >>> # fusDg = FusionDigraph(bg,ig,operator=''o-max'')

    4 >>> fusDg.showRelationTable()

    ```'
