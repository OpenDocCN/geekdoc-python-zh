    ```

    >>> rdg.showHTMLRelationMap(\n...     tableTitle=''Robust Outranking Map'',

    ...     rankingRule=''NetFlows'')

    ```


    In Fig. 13.2 on the next page, *dark green*, respectively, *light green* marked
    positions show certainly, respectively, positively valid outranking situations,
    whereas *dark red*, respectively, *light red* marked positions show certainly,
    respectively, positively valid outranked situations. In the left upper corner
    one may verify that the five top-ranked Depts ([ethz, calt, oxf, mit, cmel]) are
    in fact mutually outranking each other and thus are all indifferent one to another.
    They give even robust CONDORCET winners by robustly outranking all other Depts.


    Notice by the way that no certainly valid robust outranking (dark green) and no
    certainly valid robust outranked situations (dark red) appear in Fig. 13.3 on
    page 181 below, respectively, above the principal diagonal; none of these robust
    preferential situations are hence violated by the robust NETFLOWS ranking. The
    non-reflexive *white* positions in the relation map, like the one between the
    Georgia Institute of Technology and the MIT, mark outranking or outranked situations
    that are not robust with respect to the given significance weight preorder. They
    become, hence, doubtful and are set to the indeterminate characteristic value
    0.0.


    By measuring the ordinal correlation with the underlying pairwise global and marginal
    robust outranking situations, the quality of the robust NETFLOWS ranking result
    can be formally evaluated with the `computeRankingCorrelation()` method and the
    `showCorrelation()` method (see Chap. 16).


    **Listing 13.13** Measuring the quality of the NETFLOWS ranking result


