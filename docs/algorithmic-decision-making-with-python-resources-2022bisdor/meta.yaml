    to compute the centres of a tree and draw a rooted and oriented tree. Finally,
    algorithms for computing spanning trees and forests are presented.


    # 22.1 Generating Random Tree Graphs


    Using the `RandomTree` class from the `graphs` module, we may, for instance, generate
    a random tree graph with 9 vertices.


    **Listing 22.1** Generating a random tree graph


    ```

    1 >>> from graphs import RandomTree

    2 >>> rt = RandomTree(order=9,seed=100)

    3 >>> rt

