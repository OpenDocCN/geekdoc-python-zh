    In both cases, choosing only significances that are compatible with the given\
    \ weights preorder will not always result in positively validated outranking situations.\n\
    \n## 19.3 Computing the Stability Denotation of Outranking Situations\n\nStability\
    \ levels ±4 and ±3 are, the case given, easy to detect. Detecting a stability\
    \ level ±2 is far less obvious. Now, it is precisely again the bipolar-valued\
    \ epistemic characteristic domain that will give us a way to implement an effective\
    \ test for stability level +2 and −2 (Bisdorff 2004a,b).\n\nLet us consider the\
    \ significance equivalence classes we observe in the given weights preorder. Here,\
    \ we observe three weight classes: 6, 8, and 12, in an increasing order (see Listing\
    \ 19.2 on page 262). In the pairwise comparisons, shown above, these equivalence\
    \ classes may appear positively or negatively, besides the indeterminate significance\
    \ of value 0.00. We thus get the following ordered bipolar list of significance\
    \ weights: W = [−12, −8, −6, 0, 6, 8, 12].\n\nIn all the pairwise marginal comparisons\
    \ shown in the previous section, we may observe that each one of the nine criteria\
    \ assigns one precise item out of this list W. Let us denote by q[i] the number\
    \ of criteria assigning item W[i] and Q[i] the cumulative sums of these q[i] counts,\
    \ where i is an index in the range of the length of list W.\n\nIn the comparison\
    \ of alternatives p2 and p1, for instance (see Listing 19.5 on page 265), we observe\
    \ the following counts:\n\n| W[i] | -12 | -8 | -6 | 0 | 6 | 8 | 12 |\n|---|---|---|---|---|---|---|---|\n\
    | q[i] | 0 | 0 | 2 | 1 | 1 | 3 | 2 |\n| Q[i] | 0 | 0 | 2 | 3 | 4 | 7 | 9 |\n\n\
    Let us denote by $-q$ and $-Q$ the reversed versions of the $q$ and the $Q$ lists.\
    \ We thus obtain the following result:\n\n| W[i] | -12 | -8 | -6 | 0 | 6 | 8 |\
    \ 12 |\n|---|---|---|---|---|---|---|---|\n| -q[i] | 2 | 3 | 1 | 1 | 2 | 0 | 0\
    \ |\n| -Q[i] | 2 | 5 | 6 | 7 | 9 | 9 | 9 |\n\nNow, a pairwise outranking situation\
    \ will be qualified at stability level +2, i.e. positively validated with any\
    \ significance weights that are compatible with the given weights preorder, when\
    \ for all $i$, we observe $Q[i] \\le -Q[i]$, and there exists one $i$ such that\
    \ $Q[i] < -Q[i]$. Similarly, a pairwise outranked situation will be qualified\
    \ at stability level $-2$, when for all $i$, we observe $Q[i] \\ge -Q[i]$, and\
    \ there exists one $i$ such that $Q[i] > -Q[i]$ (Bisdorff 2004b).\n\nLet us verify\
    \ that the outranking situation observed, for instance, between alternatives p2\
    \ and p1 does indeed verify this *first-order distributional dominance* condition.\n\
    \n| W[i] | -12 | -8 | -6 | 0 | 6 | 8 | 12 |\n|---|---|---|---|---|---|---|---|\n\
    | Q[i] | 0 | 0 | 2 | 3 | 4 | 7 | 9 |\n| -Q[i] | 2 | 5 | 6 | 7 | 9 | 9 | 9 |\n\n\
    Notice that outranking situations qualified at stability levels $\\pm4$ and $\\\
    pm3$ evidently verify the stability level $\\pm2$ test above. The outranking situation\
    \ between alternatives p7 and p3 does not, however, verify this test (see Listing\
    \ 19.6 on page 266).\n\n| W[i] | -12 | -8 | -6 | 0 | 6 | 8 | 12 |\n|---|---|---|---|---|---|---|---|\n\
    | q[i] | 0 | 3 | 1 | 0 | 3 | 0 | 2 |\n| Q[i] | 0 | 3 | 4 | 4 | 7 | 7 | 9 |\n|\
    \ -Q[i] | 2 | 2 | 5 | 5 | 6 | 9 | 9 |\n\nThis time, not all the $Q[i]$ are *lower\
    \ than or equal to* the corresponding $-Q[i]$ terms. Hence the outranking situation\
    \ between p7 and p3 is not positively validated"
