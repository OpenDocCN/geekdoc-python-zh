- md: "## 14.3 Rating-by-Ranking with Lower-Closed Quintile Limits\n\n**Fig. 14.5**\
    \ *Disjunctive fusion of the KEMENY, COPELAND and NETFLOWS rankings.* They diverge\
    \ in their rating-by-ranking of universities U2, U3, and U4\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_220_0.png)\n\
    \nIn Listing 14.5, the showRankingConsensusQuality() method reveals finally how\
    \ fairly KEMENY and COPELAND rules actually balance the fifteen academic subjects.\n\
    \n**Listing 14.5** Checking the consensus quality of the KEMENY ranking\n\n```\n\
    >>> lqr.showRankingConsensusQuality(ke.kemenyRanking)\nConsensus quality of ranking:\n\
    ['m5', 'u5', 'm4', 'm3', 'u1', 'u2', 'u4', 'm2', 'u3', 'm1']\ncriterion (weight):\
    \ correlation\n------------------------------\nphys (0.067): +0.833\ngerm (0.067):\
    \ +0.789\nmath (0.067): +0.722\nbio (0.067): +0.667\nmgt (0.067): +0.633\nchem\
    \ (0.067): +0.611\npsy (0.067): +0.544\npol (0.067): +0.500\ninfo (0.067): +0.478\n\
    mec (0.067): +0.422\nlaw (0.067): +0.411\nsoc (0.067): +0.400\nmed (0.067): +0.400\n\
    eco (0.067): +0.389\nelec (0.067): +0.367\nSummary:\nWeighted mean marginal correlation\
    \ (a): +0.544\nStandard deviation (b) : +0.150\nRanking fairness (a)-(b) : +0.394\n\
    ```\n\n**Listing 14.6** Checking the consensus quality of the COPELAND ranking\n\
    \n```\n>>> lqr.showRankingConsensusQuality(lqr.actionsRanking)\nConsensus quality\
    \ of ranking:\n['m5', 'u5', 'm4', 'm3', 'u1', 'u4', 'u2', 'm2', 'u3', 'm1']\n\
    criterion (weight): correlation\n----------------------------------------\nphys\
    \ (0.067): +0.789\nmath (0.067): +0.767\ngerm (0.067): +0.767\nchem (0.067): +0.656\n\
    bio (0.067): +0.622\nmgt (0.067): +0.589\npsy (0.067): +0.544\ninfo (0.067): +0.522\n\
    pol (0.067): +0.456\nlaw (0.067): +0.411\nelec (0.067): +0.411\nmed (0.067): +0.400\n\
    eco (0.067): +0.389\nmec (0.067): +0.378\nsoc (0.067): +0.356\nSummary:\nWeighted\
    \ mean marginal correlation (a): +0.537\nStandard deviation (b) : +0.148\nRanking\
    \ fairness (a)-(b) : +0.389\n```\n\nThe consensus quality of the two rating-by-ranking\
    \ results does not sensibly differ one of the other. They both show a similar\
    \ high mean marginal correlation (+0.544, +0.537), similar standard deviations\
    \ (+0.150, +0.148), and hence a similar ranking fairness (+0.394, +0.389).\n\n\
    To furthermore check the quality of our COPELAND rating-by-ranking result, we\
    \ shall below compute a direct rating-by-sorting into the historic 2004 quintiles\
    \ of the enrolment quality scores, without making use of any outranking digraph-based\
    \ ranking rule.\n\n## 14.4 Rating by Quintiles Sorting\n\nIn the case study here,\
    \ the five universities U1, U2, U3, U4, and U5 represent the decision actions:\
    \ *where to study*. We say now that University *x* is sorted into the lower-closed\
    \ quintile *k* when the performance record of *x* positively outranks the lower\
    \ limit record **q**($p_{k-1}$) of quintile *q* and *x* does not positively outrank\
    \ the upper limit record **q**($p_k$) of quintile *q*, for *q* = 1, ..., 5 (see\
    \ Listing 14.1 on page 189).\n\nWith the help of the bipolar-valued characteristic\
    \ of the outranking relation $r(x \\succsim y)$, we may indeed compute the bipolar-valued\
    \ characteristic of the assertion: '$x$ belongs to the lower-closed quintile class\
    \ $\\mathbf{q}_k$':\n\n$$r(x \\in \\mathbf{q}_k) = \\min [r(x \\succsim \\mathbf{q}(p_{k-1})),\
    \ r(x \\succnsim \\mathbf{q}(p_k))],$$\n\nwhere $k = 1, \\dots, 5$ and $(p_k)$\
    \ denote the respective quintile proportions: 0.20, 0.40, 0.60, 0.80, and 1.00.\
    \ As bipolar-valued outranking digraphs verify the coduality principle, $r(x \\\
    succnsim \\mathbf{q}(p_k)) = r(x \\precnsim \\mathbf{q}(p_k))$ (see Sect. 9.2).\n\
    \nThe `showSortingCharacteristics()` method gives a precise look in Listing 14.7\
    \ on these quintiles sorting characteristics.\n\n**Listing 14.7** Showing quantiles\
    \ sorting characteristics\n\n```\n>>> lqr.showSortingCharacteristics()\nx  in\
    \  K_k      r (x >= m_k)    r (x < M_k)    r (x in K_k)\nU5 in [0.00 - 0.20[ \
    \   0.73           -0.73           -0.73\nU5 in [0.20 - 0.40[    0.73        \
    \   -0.60           -0.60\nU5 in [0.40 - 0.60[    0.60           -0.60       \
    \    -0.60\nU5 in [0.60 - 0.80[    0.60            0.00            0.00\nU5 in\
    \ [0.80 - <[       0.00            1.00            0.00\n\nU2 in [0.00 - 0.20[\
    \    0.73           -0.13           -0.13\nU2 in [0.20 - 0.40[    0.13       \
    \     0.20            0.13\nU2 in [0.40 - 0.60[   -0.20            0.47      \
    \     -0.20\nU2 in [0.60 - 0.80[   -0.47            0.73           -0.47\nU2 in\
    \ [0.80 - <[      -0.73            1.00           -0.73\n\nU4 in [0.00 - 0.20[\
    \    0.87           -0.47           -0.47\nU4 in [0.20 - 0.40[    0.47       \
    \     0.13            0.13\nU4 in [0.40 - 0.60[   -0.13            0.60      \
    \     -0.13\nU4 in [0.60 - 0.80[   -0.60            0.67           -0.60\nU4 in\
    \ [0.80 - <[      -0.67            1.00           -0.67\n\nU1 in [0.00 - 0.20[\
    \    0.73           -0.33           -0.33\nU1 in [0.20 - 0.40[    0.33       \
    \     0.13            0.13\nU1 in [0.40 - 0.60[   -0.13            0.53      \
    \     -0.13\nU1 in [0.60 - 0.80[   -0.53            0.60           -0.53\nU1 in\
    \ [0.80 - <[      -0.60            1.00           -0.60\n\nU3 in [0.00 - 0.20[\
    \    0.67            0.13            0.13\nU3 in [0.20 - 0.40[   -0.13       \
    \     0.27           -0.13\nU3 in [0.40 - 0.60[   -0.27            0.53      \
    \     -0.27\nU3 in [0.60 - 0.80[   -0.53            0.67           -0.53\nU3 in\
    \ [0.80 - <[      -0.67            1.00           -0.67\n```\n\nThe performance\
    \ record of University U5 cannot be positively rated into a precise quintile,\
    \ but both the fourth and the fifth quintiles are not positively excluded as rating\
    \ result. Otherwise, the bipolar-valued sorting characteristics verify the rating-by-ranking\
    \ result we obtained previously with the KEMENY and COPELAND rating-by-ranking\
    \ result. The `showActionsSortingResult()` method prints the eventual quintiles\
    \ rating result:\n\n**Listing 14.8** Showing a quintiles rating-by-sorting result\n\
    \n```\n>>> lqr.showActionsSortingResult()\nQuantiles sorting result per decision\
    \ action\n [0.20 - 0.40[: U1 with credibility: 0.13 = min(0.33,0.13)\n [0.20 -\
    \ 0.40[: U2 with credibility: 0.13 = min(0.13,0.20)\n [0.00 - 0.20[: U3 with credibility:\
    \ 0.13 = min(0.67,0.13)\n [0.20 - 0.40[: U4 with credibility: 0.13 = min(0.47,0.13)\n\
    \ [0.60 - <[: U5 with credibility: 0.60 = min(0.60,1.00)\n```\n\nThe quintiles\
    \ rating-by-sorting result, shown in Listing 14.8 on the preceding page, confirms\
    \ the previous COPELAND rating-by-ranking result. However, University U5 is here\
    \ sorted conjointly into the fourth and the fifth quintiles and as such is part\
    \ of the top rated institutions. A result already convincingly illustrated in\
    \ the ranked heatmap is shown in Fig. 14.3 on page 192.\n\nLet us conclude this\
    \ hypothetical rating case study by saying that we prefer this latter rating-by-sorting\
    \ approach. It is perhaps providing a less precise rating result, due the case\
    \ given, to missing and contradictory performance data. Yet, the rating-by-sorting\
    \ algorithm is better grounded in a powerful bipolar-valued logic and epistemic\
    \ framework.\n\nChapter 15 proposes a series of decision problems suitable for\
    \ exercises and exam questions.\n\n## References\n\nBisdorff R (2010) Enumerating\
    \ chordless circuits in directed graphs. In: ORBEL24-2010, 24th annual conference\
