    \ for a4 and a9 with a score of −3 (see Listing 8.3 Lines 4–12). The COPELAND\
    \ ranking rule is in fact *invariant* under the *codual* transform (see Sect.\
    \ 2.6) and renders a same linear order indifferently from digraphs g or gcd.\n\
    \nThe COPELAND rule works well, furthermore on any strict outranking digraph that\
    \ models a linear (partial) order on the *median cut* strict outranking digraph\
