    and global average enrolment scores over all subjects become meaningless.


    To take furthermore into account the potential and very likely imprecision of
    the quality scores’ computation, we assume that, for all subjects, an average
    enrolment quality score difference of 0.1 is *insignificant*, whereas a difference
    of 0.5 is sufficient to positively attest a *better* enrolment quality. No considerable
