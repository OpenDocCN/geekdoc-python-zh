    # 20.2 Bipolar Approval–Disapproval Voting Systems


    Traditionally, most of the voting systems in use in the world do only collect
    approval votes and abstentions, dismissing potentially strong disapproval opinions,
    not to be assimilated to voting abstentions. Collecting both explicit approvals
    (+1) and explicit disapprovals (−1) essentially enriches the expression of voters’
    preferences.


    In the votingProfiles module, we provide a BipolarApprovalVotingProfile class
    for handling voting results where, for each eligible Candidate x, the voters are
    invited to approve (+1), disapprove (−1), or ignore (0) the statement that Candidate
    c should win the election (Baujard et al. 2013).


    File bpApVotingProfile.py contains an example of such an approval–disapproval
    voting profile concerning 100 voters and 15 eligible candidates.¹ We can inspect
    its content with the BipolarApprovalVotingProfile class:


    Listing 20.9 Bipolar approval voting profiles


    ```

    1 >>> from votingProfiles import \n2 ...                     BipolarApprovalVotingProfile

    3 >>> bavp = BipolarApprovalVotingProfile(''bpApVotingProfile'')

    4 >>> bavp

    5   *------- VotingProfile instance description -------*

    6     Instance class   : BipolarApprovalVotingProfile

    7     Instance name    : bpApVotingProfile

    8     Candidates       : 15

    9     Voters           : 100

    10    Attributes       : [''name'', ''candidates'', ''voters'',

    11                        ''approvalBallot'', ''netApprovalScores'',

    12                        ''ballot'']

    ```


    ¹The file bpApVotingProfile.py may be found in the examples directory of the DIGRAPH3
    resources.'
