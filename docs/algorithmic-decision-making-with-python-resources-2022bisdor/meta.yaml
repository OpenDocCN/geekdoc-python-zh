    \ 3.27 | 30.10 | 50.82 | 70.89 | 98.05 |\n| 'b5' | 2 | 0.85 | 29.08 | 48.55 |\
    \ 69.98 | 97.56 |\n\n两个目标*同等重要*；*成本*准则的权重之和（10）与*效益*准则的权重之和（10）相平衡（参见前一页清单10.2第2列）。*成本*准则c1和c2的偏好方向是*负向*的；成本越低越好，而所有*效益*准则b1到b5都显示*正向*偏好方向，即效益越高越好。标题为0.00和1.00的列分别显示了迄今为止在每个准则上观察到的*四分位数*\
    \ Q0（*最差*）和Q4（*最佳*）性能。0.50列显示了在各准则上观察到的*中位数*（Q2）性能。\n\n现在可以使用`randomPerfTabs`模块（Bisdorff\
