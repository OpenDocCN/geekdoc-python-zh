    通过使用分位数参数（见清单 10.10 第2行），我们通过插值恢复了与直接使用历史表现四分位数（见第132页清单 10.8）得到的相同四分位评级。请注意，从给定的累积分布函数正确插值分位数，要求每个区间内的观测值分布大致均匀。


    更一般地，例如在工业生产监控问题中，可能有大量历史表现数据可用，此时更精确地估计边际累积分布函数可能很有意义，特别是当*尾部*评级结果，即区分*非常*优秀或非常弱的多标准表现成为关键问题时。类似地，`historySize`参数可用于实时监控不稳定的随机多标准表现数据（Chambers
