  md: "# 7.3 The Majority Margins Digraph\n\n```\nDigraph          : rel_randLinearVotingProfile1\n\
    *----- Candidates -----*\n ['c1', 'c2', 'c3']\n*----- Characteristic valuation\
    \ domain ----*\n {'max': Decimal('15.0'),\n  'med': Decimal('0'),\n  'min': Decimal('-15.0'),\n\
    \  'hasIntegerValuation': True}\n*----- majority margins -----*\n     M(x,y) |\
    \  'c1'  'c2'  'c3'\n -----------|-------------------\n      'c1'  |    0    11\
    \     1\n      'c2'  |  -11     0    -1\n      'c3'  |   -1     1     0\n Valuation\
    \ domain: [-15;+15]\n```\n\nNotice in Listing 7.6 Lines 29–31 that, in the case\
    \ of linear voting profiles, majority margins always verify a *zero-sum property*:\
    \ $M(x, y) + M(y, x) = 0$ for all candidates $x$ and $y$. This is not true in\
    \ general for arbitrary voting profiles. The *majority margins* digraph of linear\
    \ voting profiles defines in fact a *weak tournament* and belongs, hence, to the\
    \ class of *self-codual*<sup>1</sup> bipolar-valued digraphs (see Sect. 2.6).\n\
    \nA candidate $x$, showing a positive majority margin $M(x, y)$, is beating candidate\
    \ $y$ with an absolute majority in a pairwise voting. Hence, a candidate showing\
    \ only positive terms in their row in the *majority margins* digraph relation\
    \ table, beats all other candidates with absolute majority of votes. CONDORCET\
    \ recommends to declare this candidate (is always unique, why?) the winner of\
    \ the election. Here we are lucky, it is again candidate c1 who is the CONDORCET\
    \ winner (see Line 29 in Listing 7.6 on the preceding page). This result is confirmed\
    \ below by the computeCondorcetWinners() method.\n\n```\n>>> mmdg.computeCondorcetWinners()\n\
    ['c1']\n```\n\nBy seeing the majority margins like a *bipolar-valued characteristic\
    \ function* of a global voters' preference relation defined on the set of eligible\
    \ candidates, we may reuse all operational resources of the generic *Digraph*\
    \ class.<sup>2</sup> and especially its *exportGraphViz()* method for visualising\
    \ in Fig. 7.1 on the following page the election result.\n\n> <sup>1</sup> The\
    \ class of self-codual bipolar-valued digraphs consists of all weakly asymmetric\
    \ digraphs, i.e. digraphs containing only asymmetric and/or indeterminate links.\
    \ Limit cases consist of, on the one side, full tournaments with indeterminate\
    \ reflexive links, and, on the other side, fully indeterminate digraphs. In this\
    \ class, the converse (inverse ~) operator is indeed identical to the dual (negation\
    \ −) one.\n<sup>2</sup> See Chap. 2."
