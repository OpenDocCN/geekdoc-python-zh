    ```


    Candidate c02, being actually a CONDORCET winner, gives an initial prekernel of
    digraph m, whereas Party-1 leading Candidates c05 and c14, both being weak CONDORCET
    losers, give together a terminal prekernel. They hence represent our *first choice*
    and, respectively, *last choice* recommendations for winning this simulated election.


    It is worthwhile noticing again the essential structural and computational role,
    the ignored value is playing in approval–disapproval voting systems. This epistemic
    and logical *neutral* term is needed indeed for handling in a consistent and efficient
    manner *not communicated votes* and/or *indeterminate preferential statements*.


    Let us conclude by predicting that, for leading political candidates in an aggressively
    divisive political context, the perspective to easily fail election with an approval–disapproval
    voting system might or will induce a change in the usual way of running electoral
    campaigns. Political parties and politicians, who avoid aggressive competitive
    propaganda and instead propose multipartisan collaborative social choices, will
    be rewarded with better election results than any kind of extremism. It could
    mean the end of sterile political obstructions and war like electoral battles.
    *Let us do it!*


    The last part, Part V, of this monograph illustrates in three chapters computational
    resources for working with simple undirected graphs.


