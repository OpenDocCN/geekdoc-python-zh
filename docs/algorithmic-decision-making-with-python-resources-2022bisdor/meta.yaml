    \ 59.10 | 51.50 | 55.60 | 51.00 | 52.20 |\n| 心理学 | 57.70 | NA | 54.40 | 62.70\
    \ | 59.80 |\n| 法学 | NA | NA | 41.90 | NA | 51.10 |\n| 经济学 | 49.60 | NA | NA |\
