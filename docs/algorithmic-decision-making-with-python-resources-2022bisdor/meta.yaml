    +   1. An *economical* aspect with a coalition of three performance criteria of
    significance weight 8 (Line 24)

    2. A *societal* aspect with a coalition of two performance criteria of significance
    weight 12 (Line 29)

    3. An *environmental* aspect with a coalition of four performance criteria of
    significance weight 6 (Line 33)


    The question we tackle in this chapter is the following: how *dependent* on the
    actual values of the significance weights appears to be the corresponding bipolar-valued
    outranking digraph? In the previous chapter, Chap. 18, we assumed that the criteria
    significance weights were random variables. Here, we shall assume that we know
    for sure only the preordering of the significance weights.


