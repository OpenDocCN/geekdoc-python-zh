    \ criteria and show how to similarly rank with multiple incommensurable performance\
    \ criteria of solely ordinal significance. A third section is finally devoted\
    \ to introduce quality measures for qualifying ranking results.\n\n## 13.1 The\
    \ THE Performance Tableau\n\nFor this decision making case study, we use an extract\
