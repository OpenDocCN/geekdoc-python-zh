    As mentioned before, a permutation graph and its dual are *transitively orientable*.
    The transitiveOrientation() method constructs from a given permutation graph a
    digraph where each edge of the permutation graph is converted into an arc oriented
    in an increasing alphabetic order of the adjacent vertices'' keys (see Golumbic
    2004). This orientation of the edges of a permutation graph is always transitive
    and delivers a *transitive ordering* of the vertices as shown in Fig. 23.7 on
    the following page.


    ```

    1 >>> dg = g.transitiveOrientation()

