    kingDigraph type (Bisdorff 2021). A given BipolarOutrankingDigraph object contains
    hence always at least the following attributes:


    +   1. actions: an ordered dictionary describing the potential decision actions
    or alternatives with name and comment attributes

    2. objectives: a possibly empty ordered dictionary of decision objectives with
    name and comment attributes, describing the multiple preference dimensions involved
    in the decision problem

    3. criteria: an ordered dictionary of performance criteria, i.e. preferentially
    independent and non-redundant decimal-valued evaluation functions used for assessing
    the performance of each potential decision action with respect to a decision objective

    4. evaluation: a double dictionary gathering performance evaluations for each
    decision alternative on each criterion function

    5. valuationdomain: a dictionary with three entries: the minimum (-1.0, certainly
    outranked), the median (0.0, indeterminate), and the maximum characteristic value
    (+1.0, certainly outranking)

    6. relation: a double dictionary defined on the Cartesian product of the set of
    decision alternatives capturing the credibility of the pairwise outranking situation
    computed on the basis of the performance differences observed between couples
    of decision alternatives on the given family of criteria functions


