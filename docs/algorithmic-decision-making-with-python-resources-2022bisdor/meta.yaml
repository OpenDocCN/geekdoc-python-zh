    # Notes


    Following the observation that an independent absorbent choice in an acyclic digraph
    corresponds to the zero values of the associated GRUNDY function, Riquet (1948)
    introduced the name “noyau” (kernel) for such a choice. Terminal kernels where
    in the sequel studied by Berge (1962) in the context of Combinatorial Game Theory.
    Initial kernels—independent and dominating choices—were introduced under the name
    game solutions by von Neumann and Morgenstern (1944). The absorbent version of
    the crisp kernel equation system 17.1 on page 242 was first introduced by Schmidt
    and Ströhlein (1985) in the context of their thorough exploration of relational
    algebra.


    The fuzzy version of kernel equation systems was first investigated by Kitainik
    (1993). Commenting on this work at a meeting in Spring 1995 of the EURO Working
    Group on Multicriteria Decision Aiding in Lausanne (Switzerland), *Marc Roubens*
    feared that solving such fuzzy kernel equation systems could be computationally
    difficult. Triggered by his pessimistic remark and knowing about kernel equation
    systems and the VON NEUMANN fixpoint theorem (Schmidt and Ströhlein 1985; von
    Neumann and Morgenstern 1944), I immediately started to implement in Prolog a
    solver for the valued version of Eq. 17.4 on page 243, the equation system serving
    as constraints for a discrete labelling of all possible rational solution vectors.
    And in Summer 1995, we luckily obtained with a commercial finite domain solver
    the very first valued initial and terminal kernels from a didactic outranking
    digraph of order 8, well known in the multiple-criteria decision aiding community.
    The computation took several seconds on a CRAY 6412 superserver with 12 processors
    operating in a nowadays ridiculous CPU speed of 90 MHz. The labelled solution
    vectors, obtained in the sequel for any outranking digraph with a single initial
    or terminal kernel, were structured in a way that suggested the converging stages
    of the VON NEUMANN fixpoint algorithm and so gave the initial hint for Algorithm
    17.1 (Bisdorff 1996, 1997; Bisdorff and Roubens 2004).


    In our present Python 3.9 implementation, such a tiny problem is solved in less
    than a thousandth of a second on a common laptop. And this remains practically
    the same for any relevant example of outranking digraph observed in a real decision-aiding
    problem. Several times we wrote in our personal journal that there is certainly
    now no more potential for any substantial improvement of this computational efficiency;
    Only to discover, shortly later, that following a new theoretical idea or choosing
    a more efficient implementation—using, for instance, the amazing instrument of
    iterator generators in Python—execution times could well be divided by 20.'
