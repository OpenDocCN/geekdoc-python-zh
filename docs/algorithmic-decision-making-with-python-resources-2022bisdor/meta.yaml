    # 3.1 The Hybrid Outranking Digraph Model


    In the `outrankingDigraphs` module, the `BipolarOutrankingDigraph` class provides
    our standard *outranking digraph* constructor. Such an instance represents a *hybrid*
    object of both the `PerformanceTableau` type *and* the Outran-'
