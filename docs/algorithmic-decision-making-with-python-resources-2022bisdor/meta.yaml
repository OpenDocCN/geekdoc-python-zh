- img_proc: true
  md: '![](img/16b49f4bd7a0e5e8eab9001001a6dc21_359_0.png)


    Digraph3 (graphviz), R. Bisdorff, 2019


    **Fig. 23.10** *Transitive neighbourhoods of the dual graph -g*

    It is worthwhile noticing that the orientation of g is achieved with a single
    neighbourhood decomposition, covering all the vertices, whereas the orientation
    of the dual graph -g here needs a decomposition into three subsequent neighbourhoods
    marked in black, red, and blue


    The `PartiallyDetermined = True` flag in Lines 2 and 7 above is required here
    in order to orient only the actual edges of the graphs. Relations between vertices
    not linked by an edge are put to the indeterminate characteristic value 0. This
    allows us to compute, later on, convenient disjunctive digraph fusions.


    As both graphs are indeed transitively orientable, we conclude that the given
    random graph g is actually a permutation graph instance. Yet, we still need to
    find now its corresponding permutation. We therefore implement a recipe given
    by (Golumbic 2004, p. 159).


    We will first *fuse* both og and ogd orientations above with an *epistemic disjunction*
    operated with the symmetric o-max operator (see Sect. 2.5).


    ```

    1 >>> from digraphs import FusionDigraph

    2 >>> f1 = FusionDigraph(og,ogd,operator=''o-max'')

    3 >>> s1 = f1.computeCopelandRanking()

    4 >>> print(s1)

    5 [''v5'',''v7'',''v1'',''v6'',''v8'',''v4'',''v3'',''v2'']

    ```


    With the `computeCopelandRanking()` method, we obtain the linear ordering [v5,
    v7, v1, v6, v8, v4, v3, v2] of the vertices (see Line 5 above).


    We reverse now the orientation of the edges in og in order to generate, again
    by disjunctive fusion, the *inversions* that are produced by the permutation we
    are looking for (see -og in Line 1 below). Computing again a ranking with the
    COPELAND rule reveals the permuted list of vertices we are looking for (see Line
    4 below).


    ```

    1 >>> f2 = FusionDigraph((-og),ogd,operator=''o-max'')

    2 >>> s2 = f2.computeCopelandRanking()

    3 >>> print(s2)

    4 [''v8'',''v7'',''v6'',''v5'',''v4'',''v3'',''v2'',''v1'']

    ```


    Vertex v8 is put from position 5 to position 1, vertex v7 is put from position
    2 to position 2, vertex v6 from position 4 to position 3, vertex v5 from position
    1 to position 4, etc. We generate these position swaps for all vertices and obtain
    thus the required permutation (see Line 5 below).'
  merge: -1
  pgno: 359
- img_proc: true
  md: '```

    >>> permutation = [0 for j in range(g.order)]

    >>> for j in range(g.order):

    ...     permutation[s2.index(s1[j])] = j+1

    >>> print(permutation)

    [5, 2, 4, 1, 6, 7, 8, 3]

    ```


    It is worthwhile noticing by the way that transitive orientations of a given graph
    and its dual are usually *not unique* and so may also be the resulting permutations.
    However, they all correspond to isomorphic graphs (Golumbic 2004). In our case
    here, we observe two different permutations and their reverses:


    ```

    1 s1: [''v1'', ''v4'', ''v3'', ''v2'', ''v5'', ''v6'', ''v7'', ''v8'']

    2 s2: [''v4'', ''v3'', ''v2'', ''v8'', ''v6'', ''v1'', ''v7'', ''v5'']

    3 (s1 -> s2): [2, 3, 4, 8, 6, 1, 7, 5]

    4 (s2 -> s1): [6, 1, 2, 3, 8, 5, 7, 4]

    ```


    and


    ```

    1 s3: [''v5'', ''v7'', ''v1'', ''v6'', ''v8'', ''v4'', ''v3'', ''v2'']

    2 s4: [''v8'', ''v7'', ''v6'', ''v5'', ''v4'', ''v3'', ''v2'', ''v1'']

    3 (s3 -> s4): [5, 2, 4, 1, 6, 7, 8, 3]

    4 (s4 -> s3) = [4, 2, 8, 3, 1, 5, 6, 7]

    ```


    The `computePermutation()` method does directly operate all these steps: computing
    transitive orientations, ranking their epistemic fusion, and delivering a corresponding
    permutation.


    ```

    >>> g.computePermutation(Comments=True)

    [''v1'', ''v2'', ''v3'', ''v4'', ''v5'', ''v6'', ''v7'', ''v8'']

    [''v2'', ''v3'', ''v4'', ''v8'', ''v6'', ''v1'', ''v7'', ''v5'']

    [2, 3, 4, 8, 6, 1, 7, 5]

    ```


    Let us finally check in Fig. 23.11 that the two permutations [2, 3, 4, 8, 6, 1,
    7, 5] and [4, 2, 8, 3, 1, 5, 6, 7], observed above, will generate corresponding
    *isomorphic* permutation graphs.


    ![](img/16b49f4bd7a0e5e8eab9001001a6dc21_360_0.png)'
  merge: -1
  pgno: 360
