  md: '# Introduction


    # The Editing Strategy


    In the five parts of this monograph, the reader will find several series of tutorials
    and advanced topics that present and illustrate computational methods and tools
    mainly useful in the field of multiple-criteria decision aiding and decision analysis.
    These methods and tools were designed and implemented first in Python2 and then
    in Python3 by the author over the last two decades for supporting both the computational
    verification and validation of decision algorithms as well as the preparation
    and illustration of a master''s course on algorithmic decision theory.


    Each chapter illustrates a specific preference modelling aspect, like building
    a best choice recommendation, ranking or rating a set of potential decision alternatives,
    or computing the winner of an election. In order to keep parts and chapters more
    or less self-contained, definitions and explanations of major concepts, like bipolar-valued
    digraphs, multiple-criteria performance tableaux and outranking situations, may
    appear several times in the monograph.


    Explicit Python programming examples, purposely kept elementary, are shown in
    numerous terminal session style listings. A complete list of the numbered listings,
    shown over all the chapters, is printed in the Appendix. These programming examples
    were all checked against errors with the `doctest` module of the standard Python3
    library and should work effectively as such either, in a Python3 interactive terminal
    console, or for sure in an `ipython` console.¹ Note that the layout of console
    `print(...)` outcomes has been edited in some listings for easing their reading.
    Some chapters will rely on a given data file that is made available in the `examples`
    directory of the DIGRAPH3 resources.


    For similarly easing their reading, most chapters do not provide mathematical
    developments and proofs. Readers interested in such details are invited to consult
    the references listed separately at the end of each chapter. The author''s references


    ¹ IP[i]: IPython interactive computing, https://ipython.org.'
