    Like the KOHLER rule, the iterated NETFLOWS rule has also a dual *ordering-by-choosing*
    version, where instead of selecting at each step *i* the row with maximal NETFLOWS
    score, we choose the row with the *minimal* NETFLOWS score. Both the ranking and
    ordering result are computed by the IteratedNetFlowsRanking class (see Lines 12–13
    in Listing 8.16 on the facing page).


    ```

    1  >>> inf.iteratedNetFlowsOrdering

    2  [''a2'', ''a9'', ''a1'', ''a4'', ''a3'', ''a8'', ''a7'', ''a6'', ''a5'']

    3  >>> corr = g.computeOrderCorrelation(\n4  ...                inf.iteratedNetFlowsOrdering)

    5  >>> g.showCorrelation(corr)

    6  Correlation indexes:

    7    Crisp ordinal correlation  : +0.751

    8    Epistemic determination    :  0.230

    9    Bipolar-valued equivalence : +0.173

    ```


    The iterated NETFLOWS ranking and its dual, the iterated NETFLOWS ordering, do
    not usually deliver both the same result. In our example outranking digraph *g*,
    for instance, it is the *ordering-by-choosing* result that obtains a slightly
    better correlation with the given outranking digraph (+0.751), a result that is
    also slightly better than the original KOHLER ranking result (+0.747, see Listing
    8.15 on page 109 Line 8 on page 109).


    With different *ranking-by-choosing* and *ordering-by-choosing* results, it may
    be useful to *fuse* now, similar to what we have done before with KEMENY’s and
    SLATER’s optimal rankings, both, the iterated NETFLOWS ranking and ordering into
    a partial ranking. But we are hence back to the practical problem of what linear
    ranking should we eventually retain?


    Let us finally mention another interesting *ranking-by-choosing* approach.'
