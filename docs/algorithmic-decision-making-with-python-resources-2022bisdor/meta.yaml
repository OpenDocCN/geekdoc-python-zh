    by the fact that Party-1 and Party-2 supporters show strict opposite preferences.
    The leading candidates of Party-1 (c05 and c14) are last choices for Party-2 supporters,
    and Candidates c07 and c10, leading candidates for Party-2 supporters, are similarly
    the least choices for Party-1 supporters.


    No clear winner may be guessed from these pre-election polls. As Party-2 shows
    however slightly more supporters than Party-1, the expected winner in a uninominal
    plurality or instant-run-off voting system will be Candidate c07, i.e. the leading
    candidate of majority Party-2 (see below).


    ```

    >>> dvp.computeSimpleMajorityWinner()

    [''c07'']

    >>> dvp.computeInstantRunoffWinner()

    [''c07'']

    ```


    Now, in a corresponding approval–disapproval voting system, Party-1 supporters
    will usually approve their leading candidates and disapprove the leading candidates
    of Party-2. Vice versa, Party-2 supporters will usually approve their leading
    candidates and disapprove the leading candidates of Party-1. Let us consult the
    resulting approval votes per candidate.


    ```

