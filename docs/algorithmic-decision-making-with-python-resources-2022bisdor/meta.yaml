  md: '```

    >>> gtesta = PermutationGraph(\n...     permutation=[2, 3, 4, 8, 6, 1, 7, 5])

    >>> gtestb = PermutationGraph(\n...     permutation=[4, 2, 8, 3, 1, 5, 6, 7])

    >>> gtesta.exportGraphViz(''gtesta'')

    >>> gtestb.exportGraphViz(''gtestb'')

    ```


    And, we indeed recover two isomorphic copies of the original random graph (compare
    with Fig. 23.8 on page 337).


