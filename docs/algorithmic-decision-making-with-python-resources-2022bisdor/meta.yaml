    \ thresholds may be set for 'ind', 'pref' and 'veto' thresholds,\n- `commonMode\
    \ = ['triangular','variable',0.5]`: random number generators of various other\
    \ types ('uniform','beta') are available. If the mode of the 'triangular' distribution\
    \ is set to 'variable', three modes at 0.3(−), 0.5(~), respectively, 0.7(+) of\
    \ the common scale span are set at random for each coalition and action.\n- `valueDigits\
    \ = 2` (default): evaluations are encoded as decimals,\n- `missingDataProbability\
