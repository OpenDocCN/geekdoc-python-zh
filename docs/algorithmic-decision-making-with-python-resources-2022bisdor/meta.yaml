    criteria; four criteria positively support that $x$ is *at least as well assessed
    as* $y$ and three criteria support that $x$ is *not at least as well evaluated
    as* $y$. Suppose $E(W_j) = w$ for $j = 1, \ldots, 7$ and $W_j \leadsto Tr(0, 2w,
    w)$ for $j = 1, \ldots, 7$. The expected value of the global ‘at least as well
    evaluated as’ characteristic value becomes $E(\tilde{r}(x \succcurlyeq y)) = 4w
    - 3w = w$ with a variance $V(\tilde{r}(x \succcurlyeq y)) = 7\frac{1}{6}w^2$.


    If $w = 1$, $E(\tilde{r}(x \succcurlyeq y)) = 1$ and $sd(\tilde{r}(x \succcurlyeq
    y)) = 1.08$. By the CLT, the bipolar likelihood of the *at least as well evaluated
    as* situation becomes $lh(x \succcurlyeq y) = 0.66$.'
