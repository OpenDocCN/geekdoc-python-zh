    \ 'a5' | -1.00  1.00 -1.00  1.00   -\n 估值域：[-1.00;1.00]\n>>> eqd.correlation\n\
    {'correlation': -0.1, 'determination': 1.0}\n```\n\n在上面的等价关系 (r1 ⇔ r2) 表中（参见第\
    \ 211 页清单 16.1，第 10-14 行），我们观察到等价与非等价非自反对的归一化多数优势为 (9 – 11)/20 = –0.1，即在此完全确定的清晰情况下\
