    \    'fillRate','minimalComponentSize','maximalComponentSize',\n    ... ]\n```\n\
    \nThe ordering of the 5-tiling result is following the *average* lower and upper\
    \ quintile limits strategy (see Listing 9.6 on the preceding page Line 14). We\
    \ obtain here 9 ordered components of minimal order 1 and maximal order 25. With\
    \ the showDecomposition() method, the corresponding *pre-ranked decomposition*\
    \ may be inspected as follows:\n\n## Listing 9.7 The quantiles decomposition of\
    \ a pre-ranked outranking digraph\n\n```\n>>> prg.showDecomposition()\n    *---\
    \ quantiles decomposition in decreasing order----*\n    c1. ]0.80-1.00] : [5,\
