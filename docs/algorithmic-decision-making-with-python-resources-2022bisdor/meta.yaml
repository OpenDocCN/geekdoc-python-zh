    # 2.7 Symmetric and Transitive Closures


    Symmetric and transitive closures, by default in-site methods, are also available
    (see Fig. 2.5). Note that it is a good idea, before going ahead with these in-site
    operations, that irreversibly modifies the original `rdg` object, to previously
    make a backup version of `rdg`. The simplest storage method, always provided by
    the generic `Digraph.save()` method, writes out in a named file the Python content
    of the Digraph object in string representation (see Sect. 1.3).


    **Listing 2.9** Symmetric and transitive closures


    ```

    1 >>> rdg.save(''tutRandValDigraph'')

    2 >>> rdg.closeSymmetric(InSite=True)

    3 >>> rdg.closeTransitive(InSite=True)

    4 >>> rdg.exportGraphViz(''symTransClosure'')

    ```


    The `closeSymmetric()` method (see Listing 2.9 Line 2), of complexity $O(n^2)$
    where $n$ denotes the digraph''s order, changes, on the one hand, all single pairwise
    links it may detect into double links by operating a disjunction of the pairwise
    relations. On the other hand, the `closeTransitive()` method (see'
  - '[PAGE 53]


    Fig. 2.5 Symmetric and transitive closure of the tutorial random valuation digraph
    rdg


    ![](img/16b49f4bd7a0e5e8eab9001001a6dc21_53_0.png)


    Line 3) implements the *Roy-Warshall* transitive closure algorithm of complexity
    $O(n^3)$ (Roy 1959; Warshall 1962).


    The same `closeTransitive()` with a `Reverse = True` flag may be readily used
    for eliminating all transitive arcs from a transitive digraph instance. We make
    usage of this feature when drawing HASSE diagrams of TransitiveDigraph objects.


    # 2.8 Strong Components


    As the original digraph rdg was connected (see above the result of the showShort()
    command), both the symmetric and the transitive closures operated together, will
    necessarily produce a single strong component, i.e. a **complete** digraph. It
    is sometimes useful to collapse all strong components in a given digraph and construct
    the so *collapsed* digraph. Using the StrongComponentsCollapsedDigraph constructor
    here will render a single hyper-node gathering all the original nodes (see Line
    7 below).


    Listing 2.10 Computing the strong components in a digraph


    ```

    1 >>> from digraphs import StrongComponentsCollapsedDigraph

    2 >>> sc = StrongComponentsCollapsedDigraph(rdg)

    3 >>> sc.showAll()

    4 *----- show detail ----*

    5 Digraph : tutRandValDigraph_Scc

    6 *----- Actions ----*

    7 [''_7_1_2_6_5_3_4_'']

    8 *----- Relation Table ----*

    9 S | ''Scc_1''

    ```'
