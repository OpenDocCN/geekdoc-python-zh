    # 19.5 Characterising Unopposed Multiobjective Outranking Situations


    When facing a performance tableau involving multiple decision objectives, the
    robustness level ±3 may lead to distinguishing what we call unopposed outranking
    situations, like the one shown in the previous section between alternatives p4
    and p1 (r(p4 ≳ p1) = +0.78, see Listing 19.4 on page 264, Line 11), namely preferential
    situations that are more or less validated or invalidated by all the decision
    objectives.


    Definition 19.2 (Unopposed Outranking Situation)


    +   - We say that decision alternative x unopposedly outranks decision alternative
    y when x positively outranks y on one or more decision objectives without x being
    positively outranked by y on any decision objective.'
