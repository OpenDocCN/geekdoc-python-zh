    \ exporting a dot file for GraphViz tools ---------*\nExporting to transOrientDualGraph.dot\n\
    fdp -Tpng transOrientDualGraph.dot -o transOrientDualGraph.png\n```\n\nLet us\
    \ recheck these facts by explicitly constructing transitively oriented digraph\
    \ instances with the computeTransitivelyOrientedDigraph() method.\n\n```\n>>>\
    \ og = g.computeTransitivelyOrientedDigraph(\n...                     PartiallyDetermined\
    \ = True)\n>>> print('Transitivity degree: %.3f' %\n...                     (og.transitivityDegree))\n\
    Transitivity degree: 1.000\n>>> ogd = (-g).computeTransitivelyOrientedDigraph(\n\
    ...                     PartiallyDetermined = True)\n>>> print('Transitivity degree:\
    \ %.3f' %\n...                     (ogd.transitivityDegree))\nTransitivity degree:\
    \ 1.000\n```\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_359_0.png)\n\nDigraph3\
    \ (graphviz), R. Bisdorff, 2019\n\n**Fig. 23.10** *Transitive neighbourhoods of\
    \ the dual graph -g*\n\nIt is worthwhile noticing that the orientation of g is\
    \ achieved with a single neighbourhood decomposition, covering all the vertices,\
    \ whereas the orientation of the dual graph -g here needs a decomposition into\
    \ three subsequent neighbourhoods marked in black, red, and blue.\n\nThe `PartiallyDetermined\
    \ = True` flag in Lines 2 and 7 above is required here in order to orient only\
    \ the actual edges of the graphs. Relations between vertices not linked by an\
    \ edge are put to the indeterminate characteristic value 0. This allows us to\
    \ compute, later on, convenient disjunctive digraph fusions.\n\nAs both graphs\
    \ are indeed transitively orientable, we conclude that the given random graph\
    \ g is actually a permutation graph instance. Yet, we still need to find now its\
    \ corresponding permutation. We therefore implement a recipe given by (Golumbic\
    \ 2004, p. 159).\n\nWe will first *fuse* both og and ogd orientations above with\
    \ an *epistemic disjunction* operated with the symmetric o-max operator (see Sect.\
    \ 2.5).\n\n```\n1 >>> from digraphs import FusionDigraph\n2 >>> f1 = FusionDigraph(og,ogd,operator='o-max')\n\
    3 >>> s1 = f1.computeCopelandRanking()\n4 >>> print(s1)\n5 ['v5','v7','v1','v6','v8','v4','v3','v2']\n\
    ```\n\nWith the `computeCopelandRanking()` method, we obtain the linear ordering\
    \ [v5, v7, v1, v6, v8, v4, v3, v2] of the vertices (see Line 5 above).\n\nWe reverse\
    \ now the orientation of the edges in og in order to generate, again by disjunctive\
    \ fusion, the *inversions* that are produced by the permutation we are looking\
    \ for (see -og in Line 1 below). Computing again a ranking with the COPELAND rule\
    \ reveals the permuted list of vertices we are looking for (see Line 4 below).\n\
    \n```\n1 >>> f2 = FusionDigraph((-og),ogd,operator='o-max')\n2 >>> s2 = f2.computeCopelandRanking()\n\
    3 >>> print(s2)\n4 ['v8','v7','v6','v5','v4','v3','v2','v1']\n```\n\nVertex v8\
    \ is put from position 5 to position 1, vertex v7 is put from position 2 to position\
    \ 2, vertex v6 from position 4 to position 3, vertex v5 from position 1 to position\
    \ 4, etc. We generate these position swaps for all vertices and obtain thus the\
    \ required permutation (see Line 5 below).\n\n```\n>>> permutation = [0 for j\
    \ in range(g.order)]\n>>> for j in range(g.order):\n...     permutation[s2.index(s1[j])]\
    \ = j+1\n>>> print(permutation)\n[5, 2, 4, 1, 6, 7, 8, 3]\n```\n\nIt is worthwhile\
    \ noticing by the way that transitive orientations of a given graph and its dual\
    \ are usually *not unique* and so may also be the resulting permutations. However,\
    \ they all correspond to isomorphic graphs (Golumbic 2004). In our case here,\
    \ we observe two different permutations and their reverses:\n\n```\n1 s1: ['v1',\
    \ 'v4', 'v3', 'v2', 'v5', 'v6', 'v7', 'v8']\n2 s2: ['v4', 'v3', 'v2', 'v8', 'v6',\
    \ 'v1', 'v7', 'v5']\n3 (s1 -> s2): [2, 3, 4, 8, 6, 1, 7, 5]\n4 (s2 -> s1): [6,\
    \ 1, 2, 3, 8, 5, 7, 4]\n```\n\nand\n\n```\n1 s3: ['v5', 'v7', 'v1', 'v6', 'v8',\
    \ 'v4', 'v3', 'v2']\n2 s4: ['v8', 'v7', 'v6', 'v5', 'v4', 'v3', 'v2', 'v1']\n\
    3 (s3 -> s4): [5, 2, 4, 1, 6, 7, 8, 3]\n4 (s4 -> s3) = [4, 2, 8, 3, 1, 5, 6, 7]\n\
    ```\n\nThe `computePermutation()` method does directly operate all these steps:\
    \ computing transitive orientations, ranking their epistemic fusion, and delivering\
    \ a corresponding permutation.\n\n```\n>>> g.computePermutation(Comments=True)\n\
    ['v1', 'v2', 'v3', 'v4', 'v5', 'v6', 'v7', 'v8']\n['v2', 'v3', 'v4', 'v8', 'v6',\
    \ 'v1', 'v7', 'v5']\n[2, 3, 4, 8, 6, 1, 7, 5]\n```\n\nLet us finally check in\
    \ Fig. 23.11 that the two permutations [2, 3, 4, 8, 6, 1, 7, 5] and [4, 2, 8,\
    \ 3, 1, 5, 6, 7], observed above, will generate corresponding *isomorphic* permutation\
    \ graphs.\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_360_0.png)"
