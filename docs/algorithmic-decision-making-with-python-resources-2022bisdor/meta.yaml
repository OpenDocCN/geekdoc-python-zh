- md: "It might be opportune to furthermore study the robustness of the apparent outranking\
    \ situations when assuming *uncertain* or solely *ordinal* criteria significance\
    \ weights (see Chaps. 18 and 19).\n\nThe next Chap. 6 describes DIGRAPH3 resources\
    \ for generating random multiple-criteria performance tableaux of various kinds\
    \ like Cost-Benefit, three-objectives, or academic tableaux.\n\n## References\n\
    \nBisdorff R (2013) On polarizing outranking relations with large performance\
    \ differences. J Multi-Criteria Decis Anal Wiley 20:3–12. http://hdl.handle.net/10993/245\n\
    \nPython Software Foundation (2021) Python documentation. https://docs.python.org/3/\n\
    \n## Chapter 6\nGenerating Random Performance Tableaux\n\n### Contents\n\n- 6.1\
    \ Introduction\n- 6.2 Random Standard Performance Tableaux\n- 6.3 Random Cost-Benefit\
    \ Performance Tableaux\n- 6.4 Random Three Objectives Performance Tableaux\n-\
    \ 6.5 Random Academic Performance Tableaux\n\n**Abstract** The chapter describes\
    \ the DIGRAPH3 resources for generating random multiple-criteria performance tableaux\
    \ like a *Cost-Benefit* tableau, a three Objectives—*economic*, *societal*, and\
    \ *environmental*—tableau, and an *academic* performance tableau.\n\n### 6.1 Introduction\n\
    \nThe `randomPerfTabs` module provides several classes for generating random performance\
    \ tableaux models of different kind, mainly for the purpose of testing implemented\
    \ methods and tools presented and discussed in the Algorithmic Decision Theory\
    \ course lectures at the University of Luxembourg. This chapter introduces several\
    \ of these performance tableau models.\n\nThe simplest class, called `RandomPerformanceTableau`,\
    \ generates a set of *n* decision actions, a family of *m* real-valued performance\
    \ criteria, ranging by default from 0.0 to 100.0, associated with default discrimination\
    \ thresholds: 2.5 (ind), 5.0 (pref), and 60.0 (veto). The generated random evaluations\
    \ are by default Beta(2, 2) distributed on each measurement scale.\n\nOne of the\
    \ most useful models involving two decision objectives, named *Costs* (to be minimised),\
    \ respectively, *Benefits* (to be maximised), is provided by the `RandomCBPerformanceTableau`\
    \ class; its purpose being to generate more or less contradictory performances\
    \ on these two, usually conflicting, objectives. *Low costs* will randomly be\
    \ correlated with *low benefits*, whereas *high costs* will randomly be correlated\
    \ with *high benefits*.\n\nMany public policy decision problems often involve\
    \ three more or less conflicting decision objectives taking into account *economical*,\
    \ *societal* as well as *environmental* aspects. For this type of performance\
    \ tableau model, the `randomPerfTabs` module provides a specific class, called\
    \ `Random3ObjectivesPerformanceTableau`.\n\nBased on their grades obtained in\
    \ a number of examinations, deciding which students validate or not their academic\
    \ studies is the genuine decision practice of universities and academies. To thoroughly\
    \ study these kind of decision problems, the `randomPerfTabs` module provides\
    \ a corresponding performance tableau model, called `RandomAcademicPerformanceTableau`,\
    \ which gathers grades obtained by a given number of students in a given number\
    \ of weighted courses.\n\n### 6.2 Random Standard Performance Tableaux\n\nThe\
    \ `RandomPerformanceTableau` class, the simplest of the kind, specialises the\
    \ generic `PerformanceTableau` class, and takes the following parameters:\n\n\
    - `numberOfActions` := number of decision actions.\n- `numberOfCriteria` := number\
    \ of performance criteria.\n- `weightDistribution` := 'random' (default) | 'fixed'\
    \ | 'equisignificant':\n  - If 'random', weights are uniformly selected randomly\
    \ from the given weight scale;\n  - If 'fixed', the weightScale must provide a\
    \ corresponding weights distribution;\n  - If 'equi-significant', all criterion\
    \ weights are put to unity.\n- `weightScale` := [Min, Max] (default = (1, numberOfCriteria).\n\
    - `IntegerWeights` := True (default) | False (normalised to proportions of 1.0).\n\
    - `commonScale` := [a, b]; common performance measuring scales (default = [0.0,\
    \ 100.0]).\n- `commonThresholds` := [(q0, q1), (p0, p1), (v0, v1)]; indifference(q),\
    \ preference (p) and considerable performance difference (v) discrimination thresholds.\
    \ For each threshold type x ∈ {q, p, v}, the float x0 value represents a *constant\
    \ percentage* of the common scale and the float x1 value a *proportional value*\
    \ of the actual performance measure. Default values are [(2.5, 0.0), (5.0, 0.0),\
    \ (60.0, 0.0)].\n- `commonMode` := common distribution of random performance measurements:¹\n\
    \  - ('beta', None (default setting), (α, β)), a beta generator with default α\
    \ = 2 and β = 2 parameters.\n  - ('uniform', None, None), uniformly distributed\
    \ float values on the given common scales' range [Min, Max];\n  - ('normal', μ,\
    \ σ), truncated Gaussian distribution, by default μ = (b-a)/2 and σ = (b-a)/4;\n\
    \  - ('triangular', mode, repartition), generalised triangular distribution with\
    \ a probability repartition parameter specifying the probability mass accumulated\
    \ until the mode value. By default, mode = (b - a)/2 and repartition=0.5.²\n-\
    \ `valueDigits` := integer, precision of performance measurements (2 decimal digits\
    \ by default).\n- `missingDataProbability` := 0.0 ≤ float ≤ 1.0; probability of\
    \ missing performance evaluation on a criterion for an alternative (default 0.025).\n\
    - `NA` := Decimal (default = -999); missing data symbol.\n\n¹ See Lecture 3 of\
    \ the Computational Statistic Course (Bisdorff 2020).\n² The randomNumbers module\
    \ provides for this purpose the ExtendedTriangular-RandomVariable class.\n\n###\
    \ Code Example\n\nListing 6.1 Generating a random performance tableau\n\n```python\n\
    >>> from randomPerfTabs import RandomPerformanceTableau\n>>> t = RandomPerformanceTableau(numberOfActions=21,\n\
    ...                             numberOfCriteria=13,seed=100)\n>>> t.actions\n\
    \  {'a01': {\n    'comment': 'RandomPerformanceTableau() generated.',\n    'name':\
    \ 'random decision action'\n    },\n    'a02': { ... },\n   ...\n  }\n>>> t.criteria\n\
    \  {'g01': {\n    'thresholds': {\n      'ind' : (Decimal('10.0'), Decimal('0.0')),\n\
    \      'veto': (Decimal('80.0'), Decimal('0.0')),\n      'pref': (Decimal('20.0'),\
    \ Decimal('0.0'))},\n    'scale': [0.0, 100.0],\n    'weight': Decimal('1'),\n\
    \    'name': 'RandomPerformanceTableau() instance',\n    'comment': \"Arguments:\
    \ weightDistribution=random;\n                            weightScale=(1, 1);\n\
    \                            commonMode=None\"\n},\n'g02': { ... },\n...\n}\n\
    >>> t.NA\nDecimal('-999')\n>>> t.evaluation\n{'g01': {'a01': Decimal('15.17'),\n\
    \         'a02': Decimal('44.51'),\n         'a03': Decimal('-999'), # missing\
    \ evaluation\n         ... },\n...\n}\n>>> t.showHTMLPerformanceTableau()\n```\n\
    \nHighest and lowest evaluations on each criterion are marked in *light green*,\
    \ respectively, in *light red*. Notice that missing (NA) evaluations are recorded\
    \ in a performance tableau by default as Decimal('-999') value (see Listing 6.1\
    \ on the preceding page Lines 28–29; Fig. 6.1).\n\n### Performance table randomperftab\n\
    \n| criteria | g01 | g02 | g03 | g04 | g05 | g06 | g07 | g08 | g09 | g10 | g11\
