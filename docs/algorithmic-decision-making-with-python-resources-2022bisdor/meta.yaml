    \ {'shortName': 'v5', 'name': 'random vertex'},\n    'v6': {'shortName': 'v6',\
    \ 'name': 'random vertex'},\n    'v7': {'shortName': 'v7', 'name': 'random vertex'},\n\
    }\nvaluationDomain = {\n    'min': Decimal('-1'), 'med': Decimal('0'),\n    'max':\
    \ Decimal('1')}\nedges = {\n    frozenset(['v1', 'v2']): Decimal('-1'),\n    frozenset(['v1',\
    \ 'v3']): Decimal('-1'),\n    frozenset(['v1', 'v4']): Decimal('-1'),\n    frozenset(['v1',\
    \ 'v5']): Decimal('1'),\n    frozenset(['v1', 'v6']): Decimal('-1'),\n    frozenset(['v1',\
    \ 'v7']): Decimal('-1'),\n    frozenset(['v2', 'v3']): Decimal('1'),\n    frozenset(['v2',\
    \ 'v4']): Decimal('1'),\n    frozenset(['v2', 'v5']): Decimal('-1'),\n    frozenset(['v2',\
    \ 'v6']): Decimal('1'),\n    frozenset(['v2', 'v7']): Decimal('-1'),\n    frozenset(['v3',\
    \ 'v4']): Decimal('-1'),\n    frozenset(['v3', 'v5']): Decimal('-1'),\n    frozenset(['v3',\
    \ 'v6']): Decimal('-1'),\n    frozenset(['v3', 'v7']): Decimal('-1'),\n    frozenset(['v4',\
    \ 'v5']): Decimal('1'),\n    frozenset(['v4', 'v6']): Decimal('-1'),\n    frozenset(['v4',\
    \ 'v7']): Decimal('1'),\n    frozenset(['v5', 'v6']): Decimal('1'),\n    frozenset(['v5',\
    \ 'v7']): Decimal('-1'),\n    frozenset(['v6', 'v7']): Decimal('-1'),\n}\n```\n\
    \n## 21.1 实现简单图\n\n图 21.1 示例简单图实例\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_325_0.png)\n\
    \n存储的图实例可以使用 `exportGraphViz()` 方法重新加载并绘制（见图 21.1）：\n\n```python\n>>> g = Graph('tutorialGraph')\n\
    >>> g.exportGraphViz()\n *---- exporting a dot file for GraphViz tools ----------*\n\
    \  Exporting to tutorialGraph.dot\n  fdp -Tpng tutorialGraph.dot -o tutorialGraph.png\n\
    ```\n\n诸如 gamma 函数（覆盖关系）、顶点度和邻域深度等属性，可以通过 `showShort()` 方法显示。\n\n**清单 21.3 检查图实例**\n\
    \n```python\n>>> g.showShort()\n *---- short description of the graph ----*\n\
    \  Name : 'tutorialGraph'\n  Vertices : ['v1', 'v2', 'v3', 'v4', 'v5', 'v6', 'v7']\n\
    \  Valuation domain : {'min': -1, 'med': 0, 'max': 1}\n  Gamma function :\n  \
    \  v1 -> ['v5']\n    v2 -> ['v6', 'v4', 'v3']\n    v3 -> ['v2']\n    v4 -> ['v5',\
    \ 'v2', 'v7']\n    v5 -> ['v1', 'v6', 'v4']\n    v6 -> ['v2', 'v5']\n    v7 ->\
    \ ['v4']\n  degrees : [0, 1, 2, 3, 4, 5, 6]\n  distribution : [0, 3, 1, 3, 0,\
    \ 0, 0]\n  nbh depths : [0, 1, 2, 3, 4, 5, 6, 'inf.']\n  distribution : [0, 0,\
    \ 1, 4, 2, 0, 0, 0]\n```\n\n一个图实例与一个对称有向图实例之间存在双射关系，我们可以使用 `graph2Digraph()` 方法将图转换为有向图，反之，使用\
    \ `digraph2Graph()` 方法将有向图转换为图（见清单 21.4）。因此，适用于对称有向图的有向图类的所有计算资源都变得可用，反之亦然。\n\n\
    **清单 21.4 图与有向图之间的转换**\n\n```python\n>>> dg = g.graph2Digraph()\n>>> dg.showRelationTable(ndigits=0,\
    \ ReflexiveTerms=False)\n * ---- Relation Table -----\n   S  |  'v1'  'v2'  'v3'\
    \  'v4'  'v5'  'v6'  'v7'\n------|--------------------------------------------\n\
    \ 'v1' |   -    -1    -1    -1     1    -1    -1\n 'v2' |  -1     -     1    \
    \ 1    -1     1    -1\n 'v3' |  -1     1     -    -1    -1    -1    -1\n 'v4'\
    \ |  -1     1    -1     -     1    -1     1\n 'v5' |   1    -1    -1     1   \
    \  -     1    -1\n 'v6' |  -1     1    -1    -1     1     -    -1\n 'v7' |  -1\
    \    -1    -1     1    -1    -1     -\n>>> g1 = dg.digraph2Graph()\n>>> g1\n *-------\
    \ Digraph instance description -------*\n Instance class       : Digraph\n Instance\
    \ name        : tutorialGraph\n Digraph Order        : 7\n Digraph Size      \
    \   : 14\n Valuation domain     : [-1.00;1.00]\n Determinateness (%)  : 100.00\n\
    \ Attributes           : ['name', 'order', 'actions',\n                      \
    \  'valuationdomain', 'relation',\n                        'gamma', 'notGamma']\n\
    ```\n\n## 21.2 图的 Q-着色\n\n使用 `Q_Coloring` 类，可以使用吉布斯采样器（Geman and Geman 1984）计算教程图\
    \ `g` 的 3-着色，并如清单 21.5 所示进行绘制。\n\n**清单 21.5 计算随机图 g 的 3-着色**\n\n```python\n>>>\
    \ from graphs import Q_Coloring\n>>> qc = Q_Coloring(g)\n Running a Gibbs Sampler\
    \ for 42 step !\n The q-coloring with 3 colors is feasible !!\n>>> qc.showConfiguration()\n\
    \ v5 lightblue\n v3 gold\n v7 gold\n v2 lightblue\n v4 lightcoral\n v1 gold\n\
    \ v6 lightcoral\n>>> qc.exportGraphViz('tutorial-3-coloring')\n *---- exporting\
    \ a dot file for GraphViz tools\n Exporting to tutorial-3-coloring.dot\n fdp -Tpng\
    \ tutorial-3-coloring.dot -o tutorial-3-coloring.png\n```\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_327_0.png)\n\
    \n图 21.2 教程图的 3-着色和 2-着色\n\n实际上，对于给定的教程图实例，2-着色已经是可行的（见图 21.2）。\n\n```python\n\
    >>> qc = Q_Coloring(g, colors=['gold', 'coral'])\n Running a Gibbs Sampler for\
    \ 42 step !\n The q-coloring with 2 colors is feasible !!\n>>> qc.showConfiguration()\n\
    \ v5 gold\n v3 coral\n v7 gold\n v2 gold\n v4 coral\n v1 coral\n v6 coral\n>>>\
    \ qc.exportGraphViz('tutorial-2-coloring')\n Exporting to tutorial-2-coloring.dot\n\
    \ fdp -Tpng tutorial-2-coloring.dot -o tutorial-2-coloring.png\n```\n\n## 21.3\
    \ MIS 和团枚举\n\n2-着色定义了基数最大的独立顶点集——即最大独立集（MIS）。`showMIS()` 方法计算并打印这些集合。结果存储在 `misset`\
    \ 属性中（见清单 21.6）。\n\n**清单 21.6 计算并打印图 g 的最大独立集**\n\n```python\n>>> g = Graph('tutorialGraph')\n\
    >>> g.showMIS()\n *--- Maximal Independent Sets ---*\n ['v2', 'v5', 'v7']\n ['v3',\
    \ 'v5', 'v7']\n ['v1', 'v2', 'v7']\n ['v1', 'v3', 'v6', 'v7']\n ['v1', 'v3', 'v4',\
    \ 'v6']\n number of solutions: 5\n cardinality distribution\n card.: [0, 1, 2,\
    \ 3, 4, 5, 6, 7]\n freq.: [0, 0, 0, 3, 2, 0, 0, 0]\n execution time: 0.00032 sec.\n\
    \ Results in self.misset\n>>> g.misset\n [frozenset({'v7', 'v2', 'v5'}),\n  frozenset({'v3',\
    \ 'v7', 'v5'}),\n  frozenset({'v1', 'v2', 'v7'}),\n  frozenset({'v1', 'v6', 'v7',\
    \ 'v3'}),\n  frozenset({'v1', 'v6', 'v4', 'v3'})]\n```\n\n图实例 `g` 的对偶 `-g` 中的一个最大独立集对应于\
    \ `g` 中的一个最大团，即一个最大完全子图。最大团可以使用 `showCliques()` 方法计算并打印。结果存储在 `clique` 属性中，如清单\
    \ 21.7 所示。\n\n**清单 21.7 计算并打印图 g 的最大团**\n\n```python\n>>> g.showCliques()\n *---\
    \ Maximal Cliques ---*\n ['v2', 'v3']\n ['v4', 'v7']\n ['v2', 'v4']\n ['v4', 'v5']\n\
    \ ['v1', 'v5']\n ['v2', 'v6']\n ['v5', 'v6']\n number of solutions: 7\n cardinality\
    \ distribution\n card.: [0, 1, 2, 3, 4, 5, 6, 7]\n freq.: [0, 0, 7, 0, 0, 0, 0,\
    \ 0]\n execution time: 0.00049 sec.\n Results in self.cliques\n>>> g.cliques\n\
    \ [frozenset({'v2', 'v3'}), frozenset({'v4', 'v7'}),\n  frozenset({'v2', 'v4'}),\
    \ frozenset({'v4', 'v5'}),\n  frozenset({'v1', 'v5'}), frozenset({'v6', 'v2'}),\n\
    \  frozenset({'v6', 'v5'})]\n```\n\n## 21.4 线图与最大匹配\n\n`graphs` 模块还提供了一个 `LineGraph`\
    \ 构造函数。线图表示给定图实例中边之间的邻接关系。在清单 21.8 中，我们计算了 5-环图的线图。\n\n**清单 21.8 计算 5-环图的线图**\n\
    \n```python\n>>> from graphs import CycleGraph, LineGraph\n>>> g = CycleGraph(order=5)\n\
    >>> g\n*------ Graph instance description ----*\nInstance class   : CycleGraph\n\
    Instance name    : cycleGraph\nGraph Order      : 5\nGraph Size       : 5\nValuation\
    \ domain : [-1.00; 1.00]\nAttributes       : ['name', 'order',\n             \
    \       'vertices', 'valuationDomain',\n                    'edges', 'size', 'gamma']\n\
    >>> lg = LineGraph(g)\n>>> lg\n*------ Graph instance description ----*\nInstance\
    \ class   : LineGraph\nInstance name    : line-cycleGraph\nGraph Order      :\
    \ 5\nGraph Size       : 5\nValuation domain : [-1.00; 1.00]\nAttributes      \
    \ : ['name', 'graph',\n                    'valuationDomain', 'vertices',\n  \
    \                  'order', 'edges', 'size', 'gamma']\n>>> lg.showShort()\n*----\
    \ short description of the graph ----*\nName             : 'line-cycleGraph'\n\
    Vertices         : [frozenset({'v1', 'v2'}),\n                    frozenset({'v1',\
    \ 'v5'}), frozenset({'v2', 'v3'}),\n                    frozenset({'v3', 'v4'}),\
    \ frozenset({'v4', 'v5'})]\nValuation domain : {'min': Decimal('-1'),\n      \
    \              'med': Decimal('0'), 'max': Decimal('1')}\nGamma function   :\n\
    \  frozenset({'v1', 'v2'}) ->\n    [frozenset({'v2', 'v3'}), frozenset({'v1',\
    \ 'v5'})]\n  frozenset({'v1', 'v5'}) ->\n    [frozenset({'v1', 'v2'}), frozenset({'v4',\
    \ 'v5'})]\n  frozenset({'v2', 'v3'}) ->\n    [frozenset({'v1', 'v2'}), frozenset({'v3',\
    \ 'v4'})]\n  frozenset({'v3', 'v4'}) ->\n    [frozenset({'v2', 'v3'}), frozenset({'v4',\
    \ 'v5'})]\n  frozenset({'v4', 'v5'}) ->\n    [frozenset({'v4', 'v3'}), frozenset({'v1',\
    \ 'v5'})]\ndegrees          : [0, 1, 2, 3, 4]\ndistribution     : [0, 0, 5, 0,\
    \ 0]\nnbh depths       : [0, 1, 2, 3, 4, 'inf.']\ndistribution     : [0, 0, 5,\
    \ 0, 0, 0]\n```"
