    \                           'criteria','ballot',\n                           'valuationdomain',\
    \ 'relation',\n                           'order', 'gamma', 'notGamma']\n```\n\
    \nThe resulting digraph `m` contains 97 positively validated relations (see Line\
    \ 8 above), and for all pairs $(x, y)$ of eligible candidates, $r(x > y)$ takes\
    \ value in a valuation range from $-100.00$ (unanimously rejected) to $+100.00$\
    \ (unanimously approved).\n\nThese pairwise $r(x > y)$ values can be inspected\
    \ in a browser view with the `showHTMLRelationTable()` method:\n\n```\n>>> m.showHTMLRelationTable(relationName='r(x\
    \ > y)')\n```\n\nIn Fig. 20.3, it gets apparent that Candidate c12 is a CONDORCET\
    \ winner, i.e. the candidate who beats all the other candidates and, with the\
    \ given voting profile `gavp`, should without doubt win the election. This strongly\
    \ confirms the first-ranked result obtained with the previous net approval scoring.\n\
    \nLet us eventually compute, with the help of the NETFlows ranking rule, a linear\
