  mdcn: "## 8.7 RANKEDPAIRS 排序规则\n\nN. Tideman 的“选择排序”启发式方法——RANKEDPAIRS 规则，此次在非严格优势有向图\
    \ g 上表现最佳——其基础是审慎地增量构建线性序，以在过程中避免任何循环优势情况（Tideman 1987）。\n\n**算法 8.5 RANKEDPAIRS\
    \ 排序规则**\n*输入*：双极值有向图 G(X, ≳)。\n*输出*：决策行动集合 X 的线性排序。\n1.  将备选方案的有序对 (x, y) 按 r(x\
    \ ≳ y) + r(y ≳ x) 的值降序排列；\n2.  按此顺序考虑这些对（平局通过字典序规则解决）：\n    -   如果下一个对与已阻塞的对不构成回路，则阻塞该对；\n\
    \    -   如果下一个对与已阻塞的对构成回路，则跳过它。\n\n使用我们的教学优势有向图 g，我们得到以下结果。\n\n```\n清单 8.17 计算\
    \ RANKEDPAIRS 排序\n>>> from linearOrders import RankedPairsRanking\n>>> rp = RankedPairsRanking(g)\n\
    >>> rp.showRanking()\n['a5', 'a6', 'a7', 'a3', 'a8', 'a9', 'a4', 'a1', 'a2']\n\
    ```\n\n在我们的示例中，RANKEDPAIRS 规则幸运地给出了两个最优 KEMENY 排序之一，我们可以在下面验证。\n\n```\n>>> ke.maximalRankings\n\
    [['a5', 'a6', 'a7', 'a3', 'a8', 'a9', 'a4', 'a1', 'a2'],\n ['a5', 'a6', 'a7',\
    \ 'a3', 'a9', 'a4', 'a1', 'a8', 'a2']]\n>>> corr = g.computeOrdinalCorrelation(rp)\n\
    >>> g.showCorrelation(corr)\n相关性指标：\n  扩展 Kendall tau 系数   : +0.779\n  认知确定性 \
    \             :  0.230\n  双极值等价性            : +0.179\n```\n\n与 KOHLER 规则类似，RANKEDPAIRS\
    \ 规则也有一个审慎的对偶版本，即 Dias-Lamboray “选择排序”规则。当此次在对偶优势有向图 -g 上运行时，它会产生类似的排序结果（参见 Dias\
    \ and Lamboray 2010; Lamboray 2009）。\n\n除了不能提供唯一的线性排序外，“选择排序”规则及其对偶的“选择排序”规则，不幸的是无法扩展到更大的优势有向图（阶数\
    \ > 100）。对于这些更大的、包含数百或数千个备选方案的优势有向图，实际上只有具有多项式复杂度 O(n²)（其中 $n$ 是优势有向图的阶数）的 COPELAND\
    \ 和 NETFLOWS “评分排序”规则是可处理的。此外，由于 COPELAND 和 NETFLOWS 分数的计算可以按备选方案分别进行，当有多处理资源可用时，后一种排序规则可以立即并行处理。\n\
    \n将项目列表写成线性序列的物理必要性使得排序决策问题在实践中非常重要。然而，从偏好建模的角度来看，将此类项目相对评级为性能分位数类别，会更具表现力和忠实度。这是下一章第\
    \ 9 章的主题。\n\n# 参考文献\n\nArrow KJ, Raynaud H (1986) 社会选择与多准则决策。MIT出版社，剑桥\n\nBisdorff\
    \ R (2010) 枚举有向图中的弦无关回路。见：ORBEL24-2010，比利时运筹学学会第24届年会（ORBEL 又称 Sogesci-B.V.W.B.），1月28-29日，列日（比利时），列日大学（比利时），第1-12页。http://hdl.handle.net/10993/23926\n\
    \nBisdorff R (2012) 论双极优势关系的序相关性测量与检验。见：Mousseau V, Pirlot M (编) DAP’2012 从多准则决策辅助到偏好学习，蒙斯大学（比利时），第91-100页。http://hdl.handle.net/10993/23909\n\
    \nBisdorff R (2013) 论具有大性能差异的优势关系的极化。Wiley 多准则决策分析杂志 20:3-12。http://hdl.handle.net/10993/245\n\
    \nBisdorff R (2021) Digraph3 Python 模块集合的技术文档。https://digraph3.readthedocs.io/en/latest/techDoc.html\n\
