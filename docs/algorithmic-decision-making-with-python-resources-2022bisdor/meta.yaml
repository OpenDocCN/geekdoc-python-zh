    With a cumulated importance of 87% (see above), *Teaching*, *Research*, and *Citations*
    represent clearly the major ranking objectives. *International outlook* and *Industry
    income* are considered of minor importance (12.5%).


    THE authors do, unfortunately, not publish the detail of their performance assessments
    for evaluating CS Depts with respect to each one of performance criteria per ranking
    objective.³ The THE 2016 ranking publication reveals solely a compound assessment
    on a single performance criteria per ranking objective. The five retained performance
    criteria may be printed out as follows.


    ```

    1 >>> for g in cspt.criteria:

    2 ...     print(''%s:\t%s, %s (%.1f%%)'' %\n3 ...           (g,cspt.criteria[g][''name''],cspt.criteria[g][''comment''],\n4
    ...            cspt.criteria[g][''weight'']) )

    5 gtch: Teaching, The learning environment (30.0%)

    6 gres: Research, Volume, income and reputation (30.0%)

    7 gcit: Citations, Research influence (27.5%)

    8 gint: International outlook, In staff, students and research (7.5%)

    9 gind: Industry income, knowledge transfer (5.0%)

    ```


    The largest part (87.5%) of criteria significance is, hence canonically, allocated
    to the major ranking criteria: *Teaching* (30%), *Research* (30%) and *Citations*
    (27.5%). The small remaining part (12.5%) goes to *International outlook* (7.5%)
    and *Industry income* (5%).


    In order to render commensurable these performance criteria, the THE authors replace,
    per criterion, the actual performance evaluation obtained by each University with
    the corresponding *quantile* observed in the cumulative distribution of the performance
    evaluations obtained by all the surveyed institutions (Times Higher Education
    2016). The THE ranking is eventually determined by an *overall score*


    > ³ THE gives some insight on the subject and significance of the actual ranking
    criteria used for evaluating along each ranking objective on her website (Times
    Higher Education 2016).'
