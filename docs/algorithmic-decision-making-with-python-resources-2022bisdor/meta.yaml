    \ qc = Q_Coloring(g)\n Running a Gibbs Sampler for 42 step !\n The q-coloring\
    \ with 3 colors is feasible !!\n>>> qc.showConfiguration()\n v5 lightblue\n v3\
    \ gold\n v7 gold\n v2 lightblue\n v4 lightcoral\n v1 gold\n v6 lightcoral\n>>>\
    \ qc.exportGraphViz('tutorial-3-coloring')\n *---- exporting a dot file for GraphViz\
    \ tools\n Exporting to tutorial-3-coloring.dot\n fdp -Tpng tutorial-3-coloring.dot\
    \ -o tutorial-3-coloring.png\n```\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_327_0.png)\n\
    \nFig. 21.2 3-Colouring and 2-colouring of the tutorial graph\n\nActually, with\
    \ the given tutorial graph instance, a 2-colouring is already feasible (see Fig.\
    \ 21.2).\n\n```python\n>>> qc = Q_Coloring(g, colors=['gold', 'coral'])\n Running\
    \ a Gibbs Sampler for 42 step !\n The q-coloring with 2 colors is feasible !!\n\
    >>> qc.showConfiguration()\n v5 gold\n v3 coral\n v7 gold\n v2 gold\n v4 coral\n\
    \ v1 coral\n v6 coral\n>>> qc.exportGraphViz('tutorial-2-coloring')\n Exporting\
    \ to tutorial-2-coloring.dot\n fdp -Tpng tutorial-2-coloring.dot -o tutorial-2-coloring.png\n\
    ```\n\n## 21.3 MIS and Clique Enumeration\n\n2-colouring define sets of independent\
    \ vertices that are maximal in cardinality—the MISs. The `showMIS()` method computes\
    \ and prints out such sets. The result is stored in a `misset` attribute (see\
    \ Listing 21.6).\n\n**Listing 21.6 Computing and printing the maximal independent\
    \ sets of graph g**\n\n```python\n>>> g = Graph('tutorialGraph')\n>>> g.showMIS()\n\
    \ *--- Maximal Independent Sets ---*\n ['v2', 'v5', 'v7']\n ['v3', 'v5', 'v7']\n\
    \ ['v1', 'v2', 'v7']\n ['v1', 'v3', 'v6', 'v7']\n ['v1', 'v3', 'v4', 'v6']\n number\
    \ of solutions: 5\n cardinality distribution\n card.: [0, 1, 2, 3, 4, 5, 6, 7]\n\
    \ freq.: [0, 0, 0, 3, 2, 0, 0, 0]\n execution time: 0.00032 sec.\n Results in\
    \ self.misset\n>>> g.misset\n [frozenset({'v7', 'v2', 'v5'}),\n  frozenset({'v3',\
    \ 'v7', 'v5'}),\n  frozenset({'v1', 'v2', 'v7'}),\n  frozenset({'v1', 'v6', 'v7',\
    \ 'v3'}),\n  frozenset({'v1', 'v6', 'v4', 'v3'})]\n```\n\nA MIS in the dual `-g`\
    \ of a graph instance `g` corresponds to a maximal clique, i.e. a maximal complete\
    \ subgraph in `g`. Maximal cliques may be computed and printed with the `showCliques()`\
    \ method. The result is stored in a `clique` attribute as shown in Listing 21.7.\n\
    \n**Listing 21.7 Computing and printing the maximal cliques of graph g**\n\n```python\n\
    >>> g.showCliques()\n *--- Maximal Cliques ---*\n ['v2', 'v3']\n ['v4', 'v7']\n\
    \ ['v2', 'v4']\n ['v4', 'v5']\n ['v1', 'v5']\n ['v2', 'v6']\n ['v5', 'v6']\n number\
    \ of solutions: 7\n cardinality distribution\n card.: [0, 1, 2, 3, 4, 5, 6, 7]\n\
    \ freq.: [0, 0, 7, 0, 0, 0, 0, 0]\n execution time: 0.00049 sec.\n Results in\
    \ self.cliques\n>>> g.cliques\n [frozenset({'v2', 'v3'}), frozenset({'v4', 'v7'}),\n\
    \  frozenset({'v2', 'v4'}), frozenset({'v4', 'v5'}),\n  frozenset({'v1', 'v5'}),\
    \ frozenset({'v6', 'v2'}),\n  frozenset({'v6', 'v5'})]\n```\n\n## 21.4 Line Graphs\
    \ and Maximal Matchings\n\nThe `graphs` module also provides a `LineGraph` constructor.\
    \ A line graph represents the adjacencies between edges of the given graph instance.\
    \ In Listing 21.8, we compute, for instance, the line graph of the 5-cycle graph.\n\
    \n**Listing 21.8 Computing the line graph of the 5-cycle graph**\n\n```python\n\
    >>> from graphs import CycleGraph, LineGraph\n>>> g = CycleGraph(order=5)\n>>>\
    \ g\n*------ Graph instance description ----*\nInstance class   : CycleGraph\n\
    Instance name    : cycleGraph\nGraph Order      : 5\nGraph Size       : 5\nValuation\
    \ domain : [-1.00; 1.00]\nAttributes       : ['name', 'order',\n             \
    \       'vertices', 'valuationDomain',\n                    'edges', 'size', 'gamma']\n\
    >>> lg = LineGraph(g)\n>>> lg\n*------ Graph instance description ----*\nInstance\
    \ class   : LineGraph\nInstance name    : line-cycleGraph\nGraph Order      :\
    \ 5\nGraph Size       : 5\nValuation domain : [-1.00; 1.00]\nAttributes      \
    \ : ['name', 'graph',\n                    'valuationDomain', 'vertices',\n  \
    \                  'order', 'edges', 'size', 'gamma']\n>>> lg.showShort()\n*----\
    \ short description of the graph ----*\nName             : 'line-cycleGraph'\n\
    Vertices         : [frozenset({'v1', 'v2'}),\n                    frozenset({'v1',\
    \ 'v5'}), frozenset({'v2', 'v3'}),\n                    frozenset({'v3', 'v4'}),\
    \ frozenset({'v4', 'v5'})]\nValuation domain : {'min': Decimal('-1'),\n      \
    \              'med': Decimal('0'), 'max': Decimal('1')}\nGamma function   :\n\
    \  frozenset({'v1', 'v2'}) ->\n    [frozenset({'v2', 'v3'}), frozenset({'v1',\
    \ 'v5'})]\n  frozenset({'v1', 'v5'}) ->\n    [frozenset({'v1', 'v2'}), frozenset({'v4',\
    \ 'v5'})]\n  frozenset({'v2', 'v3'}) ->\n    [frozenset({'v1', 'v2'}), frozenset({'v3',\
    \ 'v4'})]\n  frozenset({'v3', 'v4'}) ->\n    [frozenset({'v2', 'v3'}), frozenset({'v4',\
    \ 'v5'})]\n  frozenset({'v4', 'v5'}) ->\n    [frozenset({'v4', 'v3'}), frozenset({'v1',\
    \ 'v5'})]\ndegrees          : [0, 1, 2, 3, 4]\ndistribution     : [0, 0, 5, 0,\
    \ 0]\nnbh depths       : [0, 1, 2, 3, 4, 'inf.']\ndistribution     : [0, 0, 5,\
    \ 0, 0, 0]\n```"
  mdcn: "## 6. size：正边的数量\n7. gamma：一个包含每个顶点直接邻居的字典，由对象构造函数自动添加\n\n## 示例 Python 终端会话\n\
    \n可以使用 `graphs` 模块中的 `RandomGraph` 类（见下文）生成一个随机清晰图实例。\n\n**清单 21.1 生成一个随机图实例**\n\
    \n```python\n>>> from graphs import RandomGraph\n>>> g = RandomGraph(order=7,\
    \ edgeProbability=0.5)\n>>> g.save(fileName='tutorialGraph')\n```\n\n保存的图实例，名为\
    \ `tutorialGraph.py`，其编码方式如清单 21.2 所示。\n\n**清单 21.2 随机图的存储实例**\n\n```python\n\
    # Graph instance saved in Python format\nfrom decimal import Decimal\nvertices\
    \ = {\n    'v1': {'shortName': 'v1', 'name': 'random vertex'},\n    'v2': {'shortName':\
    \ 'v2', 'name': 'random vertex'},\n    'v3': {'shortName': 'v3', 'name': 'random\
