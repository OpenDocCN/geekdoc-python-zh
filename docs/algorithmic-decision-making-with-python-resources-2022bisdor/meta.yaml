  - '[PAGE 244]


    did evaluate. Critic JPT (the editor of the Graffiti magazine), for instance,
    evaluated all but one ($d = 24 \times 23/600 = 0.92$), whereas critic FG evaluated
    only 10 movies among the 25 in discussion ($d = 10 \times 9/600 = 0.15$).


    To get a picture of the actual divergence of rating opinions concerning jointly
    seen pairs of movies, we may develop a Principal Component Analysis of the corresponding
    $\tau$ correlation matrix.$^3$ The 3D plot of the first 3 principal axes is shown
    in Fig. 16.2 on page 213.


    ```

    >>> bod.export3DplotOfCriteriaCorrelation(\n...                     ValuedCorrelation=False)

    ```


    The first 3 principal axes support together about 70% of the total inertia. Most
    eccentric and opposed in their respective rating opinions appear, on the first
    principal axis with 27.2% inertia, the conservative daily press against labour
    and public press. On the second principal axis with 23.7% inertia, it is the people
    press versus the cultural critical press. And, on the third axis with still 19.3%
    inertia, the written media appear most opposed to the radio media (Fig. 16.5 on
    the next page).


    # 16.6 Exploring the “better rated” and the “as well as rated” Opinions


    In order to furthermore study the quality of a ranking result, it may be interesting
    to have a separate view on the asymmetric and symmetric parts of the “at least
    as well rated as” opinions (see Sect. 2.3).


    Let us first inspect the pairwise asymmetric part, namely the “better rated than”
    and “less well rated than” opinions of the movie critics.


    ```

    >>> from digraphs import AsymmetricPartialDigraph

    >>> ag = AsymmetricPartialDigraph(bod)

    >>> ag.showHTMLRelationTable(\n...     actionsList=g.computeNetFlowsRanking(),ndigits=0)

    ```


    We notice in Fig. 16.4 on the facing page that the NETFLOWS ranking rule inverts
    in fact just three “less well rated than” opinions and four “better rated than”
    ones. A similar look in Fig. 16.6 on page 222 at the symmetric part—the pairwise
    “as well rated as” opinions—suggests a preordered preference structure in several
    equivalently rated classes.


    ```

    >>> from digraphs import SymmetricPartialDigraph

    >>> sg = SymmetricPartialDigraph(bod)

    >>> sg.showHTMLRelationTable(\n...     actionsList=g.computeNetFlowsRanking(),\n...     ndigits=0)

    ```


    > $^3$ The 3D PCA plot method requires a running R statistics software (https://www.r-project.org/)
    installation and the Calmat matrix calculator (see the calmat directory in the
    DIGRAPH3 resources).'
