    17 On Computing Digraph Kernels


    Fig. 17.1 A random MIS coloured in the random 3-regular graph r3g12. All non-blue
    vertices are covered by a blue vertex


    ![](img/16b49f4bd7a0e5e8eab9001001a6dc21_249_0.png)


    In all graphs or symmetric digraphs, the *maximality condition* imposed on the
    internal stability is equivalent to the *external stability* condition. Indeed,
    if there would exist a vertex or node not related to any of the elements of a
    choice, we may safely add this vertex or node to the given choice without violating
    its internal stability. All kernels must hence be maximal independent choices.
    In fact, in a topological sense, they correspond to maximal *holes* in the given
    graph.


    Figure 17.1 illustrates this coincidence between MISs and kernels in graphs and
    symmetric digraphs with a random 3-regular graph instance generated in Listing
    17.1. A random MIS in this graph may be computed by using the MISModel class (see
    Line 5 below).


    Listing 17.1 Generating a random 3-regular graph of order 12


    ```

    1 >>> from graphs import RandomRegularGraph

    2 >>> r3g12 = RandomRegularGraph(order=12,\n3 ...                         degree=3,seed=4)

    4 >>> from graphs import MISModel

    5 >>> mg = MISModel(r3g12)

    6   Iteration:  1

    7     Running a Gibbs Sampler for 660 step !

    8     {''a05'', ''a07'', ''a12''}  is maximal !

    9 >>> mg.exportGraphViz(''random3RegularGraph-mis'')

