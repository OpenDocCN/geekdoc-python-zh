    \ = 0`将忽略所有历史数据（0/100对100/100），并仅使用新到达的数据重新开始构建分位数估计。\n\n> ² `RandomPerformanceGenerator`类适用于*标准*性能表模型（参见第5.2节）、*成本-效益*模型（参见第5.3节）和3目标模型（参见第5.4节）。\n\
