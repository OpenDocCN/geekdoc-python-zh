  md: 'Considering thus each performance criterion as a subset of unanimous voters
    and balancing the votes in favour against considerable counter-performances in
    disfavour gave eventually rise to the concept of *outranking situation*, a distinctive
    feature of the Multiple-Criteria Decision Aiding approach (Bisdorff et al. 2015).
    A modern definition would be an alternative $x$ is said to *outrank* alternative
    $y$ when—a *significant majority* of criteria confirm that alternative $x$ has
    to be considered as *at least as well evaluated as* an alternative $y$ (the *concordance*
    argument), and—no discordant criterion opens to significant doubt the validity
    of the previous confirmation by revealing a considerable counter-performance of
    alternative $x$ compared to $y$ (the *discordance* argument).


    If the concordance argument was always well received, the discordance argument
    however, very confused in the beginning (Benayoun et al. 1966), could only be
    handled in an epistemically correct and logically sound way by using a bipolar-valued
    epistemic logic (see Definition 3.1 and Bisdorff 2013). The outranking situation
    had consequently to receive an explicit negative definition: an alternative $x$
    is said to *do not outrank* an alternative $y$ when—a *significant majority* of
    criteria confirm that alternative $x$ has to be considered as *not at least as
    well evaluated as* alternative $y$, and—no discordant criterion opens to significant
    doubt the validity of the previous confirmation by revealing a considerable *better*
    performance of alternative $x$ compared to $y$.


    Furthermore, the initial conjunctive aggregation of the concordance and discordance
    arguments had to be replaced by a disjunctive epistemic fusion operation, polarising
    in a logically sound and epistemically correct way the concordance with the discordance
    argument. This way, bipolar-valued outranking digraphs gained two very useful
    properties from a measure theoretical perspective. They are *weakly complete*;
    incomparability situations are no longer attested by the absence of positive outranking
    relations, but instead by epistemic indeterminateness. And they verify the *coduality
    principle*: the negation of the epistemic ‘at least as well evaluated as’ situation
    corresponds formally to the strict converse epistemic ‘less well evaluated than’
    situation.


    In the next methodological Part II, we present and discuss multiple-criteria evaluation
    models and decision algorithms, like building a best choice recommendation, determining
    the winner of an election and computing linear rankings or quantile ratings with
    multiple incommensurable criteria.


