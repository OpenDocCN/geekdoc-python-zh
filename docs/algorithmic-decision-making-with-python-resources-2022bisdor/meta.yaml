    # 7.3 The Majority Margins Digraph


    Candidate c1, for instance, is ranked four times before and once behind candidate
    c2 (see Listing 7.2 on page 84). Hence, due to the voters'' weights, the corresponding
    majority margin M(c1, c2) amounts to (3 + 1 + 5 + 4) - (2) = +11. These pairwise
    majority margins define on the set of candidates what we call a majority margins
    digraph. The MajorityMarginsDigraph class is handling such kind of digraphs.


    **Listing 7.6** Example of *Majority Margins* digraph


    ```

    1 >>> from votingProfiles import MajorityMarginsDigraph

    2 >>> mmdg = MajorityMarginsDigraph(lvp,\n3 ... IntegerValuation=True)

    4 >>> mmdg

    5 *------- Digraph instance description -------*

    6 Instance class : MajorityMarginsDigraph

    7 Instance name : rel_randomLinearVotingProfile1

    8 Digraph Order : 3

    9 Digraph Size : 3

    10 Valuation domain : [-15.00;15.00]

    11 Determinateness (%) : 55.56

    12 Attributes : [''name'', ''actions'', ''voters'',

    13 ''ballot'', ''valuationdomain'',

    14 ''relation'', ''order'',

    15 ''gamma'', ''notGamma'']

    16 >>> mmdg.showAll()

    17 *----- show detail ---------------*

    ```'
