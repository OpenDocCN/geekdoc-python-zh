- md: "## Part II\nEvaluation Models and Decision Algorithms\n\nThe second and methodological\
    \ part of the book presents in eight chapters multiple-criteria evaluation models\
    \ and decision algorithms for selecting a best decision alternative, for ranking\
    \ the potential decision alternative from best to worst, and for relative or absolute\
    \ quantile rating with the help of bipolar-valued outranking digraphs. We also\
    \ show how to edit a new multiple-criteria performance tableau and present several\
    \ models of random performance tableau generators. The last chapter is devoted\
    \ to HPC ranking of big performance tableaux.\n\n## Chapter 4\nBuilding a Best\
    \ Choice Recommendation\n\n> ... The goal of our research was to design a resolution\
    \ method ... that is easy to put into practice, that requires as few and reliable\
    \ hypotheses as possible, and that meets the needs [of the decision maker]...\n\
    —(Benayoun et al. 1966)\n\n## Contents\n\n- 4.1 What Office Location to Choose?\
    \ ........................................................................ 41\n\
    - 4.2 The Given Performance Tableau ........................................................................\
    \ 43\n- 4.3 Computing the Outranking Digraph ....................................................................\
    \ 45\n- 4.4 Designing a Best Choice Recommender System ..................................................\
    \ 47\n- 4.5 Computing the RUBIS Best Choice Recommendation ........................................\
    \ 48\n- 4.6 Weakly Ordering the Outranking Digraph ...........................................................\
    \ 50\n\n**Abstract** This chapter presents the RUBIS best choice recommender system.\
    \ Our approach is illustrated with a best office location selection problem. We\
    \ show how to explore the given performance tableau and compute the corresponding\
    \ outranking digraph. After presenting the pragmatic principles that govern our\
    \ best choice recommendation algorithm we solve the best office location choice\
    \ problem.\n\n### 4.1 What Office Location to Choose?\n\nA SME, specialised in\
    \ printing and copy services, has to move into new offices, and its CEO has gathered\
    \ seven *potential new office locations* (see Table 4.1 on the following page).\n\
    Three *decision objectives*, in order of decreasing importance, are guiding the\
    \ CEO's choice:\n1. *maximise* the future turnover of the SME,\n2. *minimise*\
    \ the future yearly costs induced by the moving,\n3. *maximise* the new working\
    \ conditions.\n\nThe decision consequences to take into account for evaluating\
    \ the potential new office locations with respect to each one of the three objectives\
    \ are modelled by the *family of performance criteria*<sup>1</sup> shown in Table\
    \ 4.2 below.\n\nIn Table 4.2 we notice that the *Costs* criterion admits the highest\
    \ significance weight (45), followed by the *Future turnover* criteria (32, 26,\
    \ 23). The *Working conditions* criteria are the less significant (10, 6, 3).<sup>2</sup>\
    \ It follows that the CEO considers *maximising the future turnover* the most\
    \ important objective ((32 + 26 + 23) = 81), followed by minimising the future\
    \ yearly costs (45), and less important, *maximising working conditions* ((10\
    \ + 6 + 3) = 19).\n\nThe evaluations of the seven potential new locations on each\
    \ performance criterion are gathered in a *performance table* shown in Table 4.3\
    \ on the next page. All criteria, except the *Costs* Criterion, admit for evaluation\
    \ a qualitative satisfaction scale from 0% (weakest) to 100% (highest). One may\
    \ thus notice that location A (*Ave*) is the most expensive, but also 100% satisfying\
    \ the *Proximity* as well as the *Standing* criterion. Whereas location C (*Ces*)\
    \ is the cheapest one; Providing, however, no satisfaction at all on both the\
    \ *Standing* and the *Working Space* criteria.\n\n> <sup>1</sup> See Roy (2000).\n\
    <sup>2</sup> These criteria weights were supposedly established with a swing weighing\
    \ MCDA method (Keeney and Raiffa 1976).\n\n### Table 4.1 The potential new office\
    \ locations\n\n| ID | Name | Address | Comment |\n|---|---|---|---|\n| A | Ave\
    \ | Avenue de la liberté | High standing city centre |\n| B | Bon | Bonnevoie\
    \ | Industrial environment |\n| C | Ces | Cessange | Residential suburb location\
    \ |\n| D | Dom | Dommeldange | Industrial suburb environment |\n| E | Bel | Esch-Belval\
    \ | New and ambitious urbanisation far from the city |\n| F | Fen | Fentange |\
    \ Out in the countryside |\n| G | Gar | Avenue de la Gare | Main city shopping\
    \ street |\n\n### Table 4.2 The family of performance criteria\n\n| Objective\
    \ | ID | Name | Weight | Comment |\n|---|---|---|---|---|\n| Yearly costs | Ct\
    \ | Costs | 45 | Annual rent, charges, and cleaning |\n| Future turnover | Pr\
    \ | Proximity | 32 | Distance from town centre |\n| Future turnover | V | Visibility\
    \ | 26 | Circulation of potential customers |\n| Future turnover | St | Standing\
    \ | 23 | Image and presentation |\n| Working conditions | W | Space | 10 | Working\
    \ space |\n| Working conditions | Cf | Comfort | 6 | Quality of office equipment\
    \ |\n| Working conditions | P | Parking | 3 | Available parking facilities |\n\
    \n### 4.2 The Given Performance Tableau\n\n### Table 4.3 Performance evaluations\
    \ of the potential office locations\n\n| Criterion | A | B | C | D | E | F | G\
    \ |\n| :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |\n| Costs | 35.0K€\
    \ | 17.8K€ | 6.7K€ | 14.1K€ | 34.8K€ | 18.6K€ | 12.0K€ |\n| Proximity | 100 |\
    \ 20 | 80 | 70 | 40 | 0 | 60 |\n| Visibility | 60 | 80 | 70 | 50 | 60 | 0 | 100\
    \ |\n| Standing | 100 | 10 | 0 | 30 | 90 | 70 | 20 |\n| Working space | 75 | 30\
    \ | 0 | 55 | 100 | 0 | 50 |\n| Working comfort | 0 | 100 | 10 | 30 | 60 | 80 |\
    \ 50 |\n| Parking | 90 | 30 | 100 | 90 | 70 | 0 | 80 |\n\nConcerning yearly costs,\
    \ we suppose that the CEO is indifferent up to a performance difference of 1000.00€,\
    \ and he actually prefers a location when there is at least a positive difference\
    \ of 2500.00€. The evaluations observed on the six qualitative criteria (measured\
    \ in percentages of satisfaction) are very subjective and rather imprecise. The\
    \ CEO is hence *indifferent* up to a satisfaction difference of 10%, and he claims\
    \ a significant *preference* when the satisfaction difference is at least of 20%.\
    \ Furthermore, a satisfaction difference of 80% represents for him a *considerably\
    \ large* performance difference, triggering the case given a *polarisation* of\
    \ the preferential situation (Bisdorff 2013).\n\nIn view of Table 4.3, what is\
    \ now the office location we may recommend to the CEO as **best choice**?\n\n\
    ### 4.2 The Given Performance Tableau\n\nThe file `officeChoice.py`, stored in\
    \ the `examples` directory of the DIGRAPH3 resources, provides a corresponding\
    \ `PerformanceTableau` object. We can inspect its actual content with the computing\
    \ resources provided by the `perfTabs` module.\n\n**Listing 4.1** Inspecting the\
    \ officeChoice performance tableau\n\n```\n>>> from perfTabs import PerformanceTableau\n\
    >>> pt = PerformanceTableau('officeChoice')\n>>> pt\n*------- PerformanceTableau\
    \ instance description -------*\n    Instance class     : PerformanceTableau\n\
    \    Instance name      : officeChoice\n    Actions            : 7\n    Objectives\
    \         : 3\n    Criteria           : 7\n    NaN proportion (%) : 0.0\n    Attributes\
    \         : ['name', 'actions', 'objectives',\n                          'criteria',\
    \ 'weightPreorder',\n                          'NA', 'evaluation']\n>>> pt.showPerformanceTableau()\n\
    ```\n\nWe thus recover all the input data shown in Sect. 4.1. Notice that the\
    \ *negative* evaluations of the *Costs* criterion indicate a negative preference\
    \ direction: the *lower* the costs, the *better* it is.\n\nThe `showCriteria()`\
    \ method evaluates the actual preference discrimination we observe on each performance\
    \ criterion.\n\n**Listing 4.2** Inspecting the performance criteria\n\n```\n>>>\
    \ pt.showCriteria(IntegerWeights=True)\n*---- criteria ----*\nCt 'Costs'\n  Preference\
    \ direction: min\n  Scale = (0.00, 50000.00)\n  Weight = 45\n  Threshold ind :\
    \ 1000.00 + 0.00x ; percentile: 9.52\n  Threshold pref : 2500.00 + 0.00x ; percentile:\
    \ 14.29\nCf 'Comfort'\n  Preference direction: max\n  Scale = (0.00, 100.00)\n\
    \  Weight = 6\n  Threshold ind : 10.00 + 0.00x ; percentile: 9.52\n  Threshold\
    \ pref : 20.00 + 0.00x ; percentile: 28.57\n  Threshold veto : 80.00 + 0.00x ;\
    \ percentile: 90.48\n  ...\n  ...\n```\n\nOn the *Costs* criterion, 9.5% of the\
    \ performance differences are considered insignificant and 14.3% below the preference\
    \ discrimination threshold (see Lines 7–8 in Listing 4.2). On the qualitative\
    \ *Comfort* criterion, we observe again 9.5% of insignificant performance differences\
    \ (line 13). Due to the imprecision in the subjective evaluations, we notice here\
    \ 28.6% of performance differences below the preference discrimination threshold\
    \ (Line 14). Furthermore, 100.0 – 90.5 = 9.5% of the performance differences are\
    \ judged *considerably large* (Line 15) and will trigger hence a polarisation\
    \ of the concerned outranking situations (Bisdorff 2013). Same information is\
    \ available for all the other criteria. A colourful comparison of all the evaluations\
    \ is shown in Fig. 4.1 on the facing page by the *heatmap* statistics, illustrating\
    \ the respective quantile class of each evaluation. As the set of potential alternatives\
    \ is tiny, we choose here a classification into performance quintiles."
  mdcn: "## 第二部分\n评估模型与决策算法\n\n本书的第二部分，即方法论部分，共包含八章，介绍了多准则评估模型与决策算法。这些模型和算法旨在：借助双极值优势有向图，选出最佳决策备选方案；将潜在决策备选方案从优到劣进行排序；以及进行相对或绝对的分位数评级。我们还展示了如何编辑新的多准则绩效表，并介绍了几种随机绩效表生成器模型。最后一章则致力于高性能计算（HPC）对大型绩效表的排序。\n\
    \n## 第四章\n构建最佳选择推荐系统\n\n> ……我们研究的目标是设计一种解决方案……它易于实践，所需假设尽可能少且可靠，并能满足[决策者]的需求……\n\
    —（Benayoun 等人，1966）\n\n## 目录\n\n- 4.1 选择哪个办公地点？ ........................................................................\
    \ 41\n- 4.2 给定的绩效表 ........................................................................\
    \ 43\n- 4.3 计算优势有向图 ....................................................................\
    \ 45\n- 4.4 设计最佳选择推荐系统 .................................................. 47\n\
    - 4.5 计算 RUBIS 最佳选择推荐 ........................................ 48\n- 4.6 对优势有向图进行弱排序\
    \ ........................................................... 50\n\n**摘要** 本章介绍了\
    \ RUBIS 最佳选择推荐系统。我们通过一个最佳办公地点选择问题来阐述我们的方法。我们展示了如何探索给定的绩效表并计算相应的优势有向图。在介绍了指导我们最佳选择推荐算法的实用原则之后，我们解决了最佳办公地点选择问题。\n\
    \n### 4.1 选择哪个办公地点？\n\n一家专注于印刷和复印服务的中小企业需要搬迁至新办公室，其首席执行官（CEO）已收集了七个*潜在的新办公地点*（见下页表\
    \ 4.1）。\n三个*决策目标*按重要性递减的顺序指导着 CEO 的选择：\n1. *最大化*中小企业的未来营业额，\n2. *最小化*搬迁引起的未来年度成本，\n\
    3. *最大化*新的工作条件。\n\n为评估潜在新办公地点在每个目标上的决策后果，我们使用了下表 4.2 所示的*绩效标准族*<sup>1</sup> 进行建模。\n\
    \n在表 4.2 中，我们注意到*成本*标准具有最高的显著性权重（45），其次是*未来营业额*标准（32、26、23）。*工作条件*标准的显著性最低（10、6、3）。<sup>2</sup>\
    \ 因此，CEO 认为*最大化未来营业额*是最重要的目标（(32 + 26 + 23) = 81），其次是最小化未来年度成本（45），而*最大化工作条件*的重要性较低（(10\
    \ + 6 + 3) = 19）。\n\n七个潜在新地点在每个绩效标准上的评估结果汇总在下页表 4.3 所示的*绩效表*中。除*成本*标准外，所有标准均采用从\
    \ 0%（最弱）到 100%（最强）的定性满意度量表进行评估。因此，我们可以注意到，地点 A（*Ave*）是最昂贵的，但在*邻近度*和*档次*标准上均达到\
    \ 100% 的满意度。而地点 C（*Ces*）是最便宜的；但在*档次*和*工作空间*标准上均未提供任何满意度。\n\n> <sup>1</sup> 参见\
    \ Roy (2000)。\n<sup>2</sup> 这些标准权重据称是通过摆动加权多准则决策分析（MCDA）方法确定的（Keeney and Raiffa\
    \ 1976）。\n\n### 表 4.1 潜在的新办公地点\n\n| ID | 名称 | 地址 | 备注 |\n|---|---|---|---|\n|\
    \ A | Ave | Avenue de la liberté | 高档市中心 |\n| B | Bon | Bonnevoie | 工业环境 |\n|\
    \ C | Ces | Cessange | 住宅郊区位置 |\n| D | Dom | Dommeldange | 工业郊区环境 |\n| E | Bel\
    \ | Esch-Belval | 远离城市的新且雄心勃勃的城市化区域 |\n| F | Fen | Fentange | 乡村地区 |\n| G | Gar\
    \ | Avenue de la Gare | 主要城市购物街 |\n\n### 表 4.2 绩效标准族\n\n| 目标 | ID | 名称 | 权重 |\
    \ 备注 |\n|---|---|---|---|---|\n| 年度成本 | Ct | 成本 | 45 | 年租金、费用和清洁费 |\n| 未来营业额 |\
    \ Pr | 邻近度 | 32 | 距离市中心的距离 |\n| 未来营业额 | V | 可见度 | 26 | 潜在客户的流通量 |\n| 未来营业额 | St\
    \ | 档次 | 32 | 形象和展示 |\n| 工作条件 | W | 空间 | 10 | 工作空间 |\n| 工作条件 | Cf | 舒适度 | 6 |\
    \ 办公设备质量 |\n| 工作条件 | P | 停车 | 3 | 可用停车设施 |\n\n### 4.2 给定的绩效表\n\n### 表 4.3 潜在办公地点的绩效评估\n\
    \n| 标准 | A | B | C | D | E | F | G |\n| :--- | :--- | :--- | :--- | :--- | :---\
    \ | :--- | :--- |\n| 成本 | 35.0K€ | 17.8K€ | 6.7K€ | 14.1K€ | 34.8K€ | 18.6K€ |\
    \ 12.0K€ |\n| 邻近度 | 100 | 20 | 80 | 70 | 40 | 0 | 60 |\n| 可见度 | 60 | 80 | 70 |\
    \ 50 | 60 | 0 | 100 |\n| 档次 | 100 | 10 | 0 | 30 | 90 | 70 | 20 |\n| 工作空间 | 75\
    \ | 30 | 0 | 55 | 100 | 0 | 50 |\n| 工作舒适度 | 0 | 100 | 10 | 30 | 60 | 80 | 50 |\n\
    | 停车 | 90 | 30 | 100 | 90 | 70 | 0 | 80 |\n\n关于年度成本，我们假设 CEO 在绩效差异不超过 1000.00€\
    \ 时是无差异的，而当差异至少为正 2500.00€ 时，他实际上更偏好某个地点。在六个定性标准（以满意度百分比衡量）上观察到的评估非常主观且相当不精确。因此，CEO\
    \ 在满意度差异不超过 10% 时是*无差异*的，而当满意度差异至少为 20% 时，他声称存在显著的*偏好*。此外，对他而言，80% 的满意度差异代表了*相当大*的绩效差异，这将触发偏好情况的*极化*（Bisdorff\
    \ 2013）。\n\n鉴于表 4.3，我们现在可以向 CEO 推荐哪个办公地点作为**最佳选择**？\n\n### 4.2 给定的绩效表\n\n存储在 DIGRAPH3\
    \ 资源的 `examples` 目录中的文件 `officeChoice.py` 提供了一个相应的 `PerformanceTableau` 对象。我们可以使用\
    \ `perfTabs` 模块提供的计算资源来检查其实际内容。\n\n**代码清单 4.1** 检查 officeChoice 绩效表\n\n```\n>>>\
    \ from perfTabs import PerformanceTableau\n>>> pt = PerformanceTableau('officeChoice')\n\
    >>> pt\n*------- PerformanceTableau instance description -------*\n    Instance\
    \ class     : PerformanceTableau\n    Instance name      : officeChoice\n    Actions\
    \            : 7\n    Objectives         : 3\n    Criteria           : 7\n   \
    \ NaN proportion (%) : 0.0\n    Attributes         : ['name', 'actions', 'objectives',\n\
    \                          'criteria', 'weightPreorder',\n                   \
    \       'NA', 'evaluation']\n>>> pt.showPerformanceTableau()\n```\n\n因此，我们恢复了第\
    \ 4.1 节中显示的所有输入数据。请注意，*成本*标准的*负*评估表示负偏好方向：成本*越低*，*越好*。\n\n`showCriteria()` 方法评估了我们在每个绩效标准上观察到的实际偏好区分度。\n\
    \n**代码清单 4.2** 检查绩效标准\n\n```\n>>> pt.showCriteria(IntegerWeights=True)\n*----\
    \ criteria ----*\nCt 'Costs'\n  Preference direction: min\n  Scale = (0.00, 50000.00)\n\
    \  Weight = 45\n  Threshold ind : 1000.00 + 0.00x ; percentile: 9.52\n  Threshold\
    \ pref : 2500.00 + 0.00x ; percentile: 14.29\nCf 'Comfort'\n  Preference direction:\
    \ max\n  Scale = (0.00, 100.00)\n  Weight = 6\n  Threshold ind : 10.00 + 0.00x\
    \ ; percentile: 9.52\n  Threshold pref : 20.00 + 0.00x ; percentile: 28.57\n \
    \ Threshold veto : 80.00 + 0.00x ; percentile: 90.48\n  ...\n  ...\n```\n\n在*成本*标准上，9.5%\
    \ 的绩效差异被视为不显著，14.3% 低于偏好区分阈值（见代码清单 4.2 第 7-8 行）。在定性的*舒适度*标准上，我们再次观察到 9.5% 的不显著绩效差异（第\
    \ 13 行）。由于主观评估的不精确性，我们注意到此处有 28.6% 的绩效差异低于偏好区分阈值（第 14 行）。此外，100.0 – 90.5 = 9.5%\
    \ 的绩效差异被判断为*相当大*（第 15 行），因此将触发相关优势情况的极化（Bisdorff 2013）。所有其他标准也提供相同的信息。所有评估的彩色比较显示在对面页的图\
    \ 4.1 中，通过*热图*统计说明了每个评估各自的分位数类别。由于潜在备选方案集合很小，我们在此选择按绩效五分位数进行分类。"
