    # 2.4 Border and Inner Parts


    We can also extract the border—the part of a digraph induced by the union of its
    initial and terminal prekernels (see Chap. 17)—as well as, the inner part—the
    complement of the border—with the help of two corresponding classes: GraphBorder
    and GraphInner (see Listing 2.5).


    Figure 2.3 on the following page shows the border and inner parts of the linear
    ordering obtained from the tutorial random valuation digraph rdg with the NETFLOWS
    ranking rule (see Sect. 8.3).


    Listing 2.5 Border and inner part of a linear order


    ```

    1 >>> from digraphs import GraphBorder, GraphInner

    2 >>> from linearOrders import NetFlowsOrder

    3 >>> nf = NetFlowsOrder(rdg)

    4 >>> nf.netFlowsOrder

    5 [''6'', ''4'', ''5'', ''3'', ''2'', ''1'', ''7'']

    6 >>> bnf = GraphBorder(nf)

    ```'
