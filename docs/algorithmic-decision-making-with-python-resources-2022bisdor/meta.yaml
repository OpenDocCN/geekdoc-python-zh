    \ 54.40 | NA |\n| 医学 | NA | NA | NA | 49.50 | 55.50 |\n| 管理学 | 54.00 | 53.40 |\
    \ 50.70 | 49.60 | NA |\n| 物理 | 58.90 | 59.80 | 53.90 | 59.10 | 60.90 |\n| 政治学\
