    # 17.2 Initial and Terminal Kernels


    In an oriented graph context, the internal stability condition of the kernel concept
    remains untouched; however, the external stability condition gets indeed split
    up by the orientation into two lateral cases:


    +   1. A *dominant* stability condition, where each non selected node is dominated
    by at least one member of the kernel

    2. An *absorbent* stability condition, where each non-selected node is absorbed
    by at least one member of the kernel


    A both internally stable **and** dominant, respectively, absorbent choice is called
    a dominant or *initial*, respectively, an absorbent or *terminal* kernel. From
    a topological perspective, the initial kernel concept looks from the outside of
    the digraph into its interior, whereas the terminal kernel looks from the interior
    of a digraph towards its outside. From an algebraic perspective, the initial kernel
    is a prefix operand, and the terminal kernel is a postfix operand in the kernel
    equation systems (see Sect. 17.6 on page 242).


    Furthermore, as the kernel concept involves conjointly a positive logical refutation
    (the internal stability) and a positive logical affirmation (the external stability),
    it appeared rather quickly necessary in our operational developments to adopt
    a bipolar characteristic [-1.0, 1.0] valuation domain, modelling logical negation
    by a change of numerical sign and including explicitly a third median value (0.0),
    expressing logical *indeterminateness*—neither positive nor negative (Bisdorff
    2000, 2002, 2004).


    In such a bipolar-valued context, we call *prekernel* a choice which is *externally
    stable* and for which the internal stability condition is *valid* or *indeterminate*.
    We say that the independence condition is in this case only *weakly validated*.
    Notice that all kernels are hence prekernels, but not vice versa.


    In graphs or symmetric digraphs, where there is essentially no apparent *laterality*,
    all prekernels are initial and terminal at the same time. A universal example
    is given by the *complete* digraph.


    **Listing 17.3** The prekernels of a complete digraph


    ```

    1 >>> from digraphs import CompleteDigraph

    2 >>> u = CompleteDigraph(order=5)

    3 >>> u

    4   *------- Digraph instance description -------*

    5     Instance class   : CompleteDigraph

    6     Instance name    : complete

    7     Digraph Order    : 5

    8     Digraph Size     : 20

    9     Valuation domain : [-1.00 ; 1.00]

    10    --------------------------------------------

    11 >>> u.showPreKernels()

    12   *--- Computing preKernels ---*

    13     Dominant kernels :

    ```'
- md: "## 17.3 Kernels in Lateralized Digraphs\n\nHumans do live in an apparent physical\
    \ space of plain transitive lateral orientation, fully empowered in finite geometrical\
    \ 3D models with linear orders, where first, respectively, last ranked, nodes\
    \ deliver unique initial, respectively, terminal, kernels.\n\nSimilarly, in finite\
    \ preorders, the first, respectively, last, equivalence classes deliver the unique\
    \ initial, respectively, unique terminal, kernels. More generally, in finite partial\
    \ orders, i.e. asymmetric and transitive digraphs, topological sort algorithms\
    \ will easily reveal on the first, respectively, last, level all unique initial,\
    \ respectively, terminal, kernels.\n\nIn genuine random digraphs, however, we\
    \ may need to check for each of its MISs, whether one, both, or none of the lateralized\
    \ external stability conditions may be satisfied. Consider, for instance, in Listing\
    \ 17.9, the following random digraph instance of order 7 and generated with an\
    \ arc probability of 30%.\n\n**Listing 17.9** Generating a random digraph rd of\
    \ order 7 and arc probability 0.3\n\n```\n>>> from randomDigraphs import RandomDigraph\n\
    >>> rd = RandomDigraph(order=7,arcProbability=0.3,seed=5)\n>>> rd.exportGraphViz('randomLaterality')\n\
    *---- exporting a dot file for GraphViz tools ---*\nExporting to randomLaterality.dot\n\
    dot -Grankdir=BT -Tpng randomLaterality.dot -o randomLaterality.png\n```\n\nThe\
    \ random digraph shown in Fig. 17.4 has no apparent special properties, except\
    \ from being connected (see Line 3 in Listing 17.10 on the next page).\n\n**Fig.\
    \ 17.4** *A random digraph instance of order 7 and arc probability 0.3. The digraph\
    \ instance is neither asymmetric (a3 ⇔ a6) nor symmetric (a2 → a1, a1 ↛ a2), and\
    \ the digraph is not transitive (a5 → a2 → a1, but a5 ↛ a1)*\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_256_0.png)\n\
    \nIn a complete digraph, each single node is indeed both an initial and a terminal\
    \ prekernel candidate and there is no definite begin or end of the digraph to\
    \ be detected. Laterality is here entirely relative to a specific singleton chosen\
    \ as reference point of view.\n\nThe same absence of laterality is apparent (see\
    \ Listing 17.4) in two other universal digraph models, the *empty* and the *indeterminate*\
    \ digraph.\n\n### Listing 17.4 The prekernels of the empty or indeterminate digraph\n\
    \n```\n>>> from digraphs import EmptyDigraph\n>>> ed = EmptyDigraph(order=5)\n\
    >>> ed.showPreKernels()\n*--- Computing preKernels ---*\nDominant kernel :\n['1',\
    \ '2', '3', '4', '5']\nindependence : 1.0\ndominance : 1.0\nabsorbency : 1.0\n\
    Absorbent kernel :\n['1', '2', '3', '4', '5']\nindependence : 1.0\ndominance :\
    \ 1.0\nabsorbency : 1.0\n>>> from digraphs import IndeterminateDigraph\n>>> id\
    \ = IndeterminateDigraph(order=5)\n>>> id.showPreKernels()\n*--- Computing preKernels\
    \ ---*\nDominant prekernel :\n['1', '2', '3', '4', '5']\nindependence : 0.0\n\
    dominance : 1.0\nabsorbency : 1.0\nAbsorbent prekernel :\n['1', '2', '3', '4',\
    \ '5']\nindependence : 0.0\ndominance : 1.0\nabsorbency : 1.0\n```\n\nIn the empty\
    \ digraph, the whole set of nodes gives indeed at the same time the unique initial\
    \ and terminal prekernel (see Lines 6 and 11), similarly, for the *indeterminate*\
    \ digraph (see Lines 20 and 25).\nBoth these results make sense, as in a completely\
    \ empty or indeterminate digraph, there is no *interior* of the digraph defined,\
    \ only a *border* which is hence at the same time an initial and terminal prekernel\
    \ (see Sect. 2.4). Notice, however, that in the latter indeterminate case, the\
    \ complete set of nodes verifies only weakly the internal stability condition\
    \ (see Lines 21 and 26).\nOther common digraph models, although being clearly\
    \ oriented, may show nevertheless no apparent laterality, like *chordless circuits*,\
    \ i.e. holes surrounded by an oriented cycle—a circuit—of odd length. They do\
    \ not admit in fact any initial or terminal prekernel.\n\n### Listing 17.5 The\
    \ prekernels of the 5-circuit digraph\n\n```\n>>> from digraphs import CirculantDigraph\n\
    >>> c5 = CirculantDigraph(order=5,circulants=[1])\n>>> c5.showPreKernels()\n*-----\
    \ statistics -----\ndigraph name:  c5\nnumber of solutions\n  dominant prekernels\
    \ :  0\n  absorbent prekernels:  0\n```\n\nChordless circuits of *even* length\
    \ 2 × k, with k > 1, contain however two isomorphic prekernels of cardinality\
    \ k which qualify conjointly as initial and terminal candidates.\n\n### Listing\
    \ 17.6 The prekernels of the 6-circuit digraph\n\n```\n>>> c6 = CirculantDigraph(order=6,circulants=[1])\n\
    >>> c6.showPreKernels()\n*--- Computing preKernels ---*\n  Dominant preKernels\
    \ :\n  ['1', '3', '5'] ind. : 1.0, dom. : 1.0, abs. : 1.0\n  ['2', '4', '6'] ind.\
    \ : 1.0, dom. : 1.0, abs. : 1.0\n  Absorbent preKernels :\n  ['1', '3', '5'] ind.\
    \ : 1.0, dom. : 1.0, abs. : 1.0\n  ['2', '4', '6'] ind. : 1.0, dom. : 1.0, abs.\
    \ : 1.0\n```\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_254_0.png)\n\nDigraph3\
    \ (graphviz), R. Bisdorff, 2020\n\n**Fig. 17.2** *The dual of the chordless 6-circuit.*\
    \ No initial or terminal prekernel—weakly independent and dominant, respectively,\
    \ absorbent subset of nodes—may be found in this kind of digraphs\n\nDual of weak\
    \ 6-circuit\n\nConverse of weak 6-circuit\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_254_1.png)\n\
    \n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_254_2.png)\n\nDigraph3 (graphviz),\
    \ R. Bisdorff, 2020\n\nDigraph3 (graphviz), R. Bisdorff, 2020\n\n**Fig. 17.3**\
    \ Dual and converse transforms of the weak 6-circuit give the same digraph\n\n\
    Chordless circuits of even length may thus be indifferently oriented along two\
    \ opposite directions. Notice by the way in Fig. 17.2 that the duals of all chordless\
    \ circuits of odd or even length, i.e. filled circuits also called anti-holes\
    \ (see Fig. 17.3), never contain any potential prekernel candidates.\n\n### Listing\
    \ 17.7 The prekernels of the dual of the 6-circuit digraph\n\n```\n>>> dc6 = -c6\
    \    # dc6 = DualDigraph(c6)\n>>> dc6.showPreKernels()\n*----- statistics -----\n\
    \    graph name:  dual_c6\n    number of solutions\n    dominant prekernels :\
    \  0\n    absorbent prekernels:  0\n    >>> dc6.exportGraphViz(fileName='dualChordlessCircuit')\n\
    \    *---- exporting a dot file for GraphViz tools ----*\n    Exporting to dualChordlessCircuit.dot\n\
    \    circo -Tpng dualChordlessCircuit.dot -o dualChordlessCircuit.png\n```\n\n\
    We call *weak*, a chordless circuit with indeterminate inner part. In Listing\
    \ 17.8, we use the `IndeterminateInnerPart` parameter of the `CirculantDigraph`\
    \ class for constructing such a weak chordless 6-circuit digraph. It is worth\
    \ noticing in Fig. 17.3 on the preceding page that the *dual* version of a weak\
    \ circuit corresponds to its *converse* version.¹\n\n### Listing 17.8 The weak\
    \ 6-circuit digraph\n\n```\n>>> from digraphs import CirculantDigraph\n>>> c6\
    \ = CirculantDigraph(order=6,circulants=[1],\\\n...                      IndeterminateInnerPart=True)\n\
    >>> (-c6).exportGraphViz()\n*---- exporting a dot file for GraphViz tools ----------*\n\
    Exporting to dual_c6.dot\ncirco -Tpng dual_c6.dot -o dual-c6.png\n>>> (~c6).exportGraphViz()\n\
    *---- exporting a dot file for GraphViz tools ----------*\nExporting to converse_c6.dot\n\
    circo -Tpng converse_c6.dot -o converse-c6.png\n```\n\nWeak chordless circuits\
    \ of length *n* are in fact part of the class of digraphs that are invariant under\
    \ the *codual* transform, *cn* = *~(∼ cn)* = *∼ (−cn)*.² When digraph *cn* is\
    \ a weak chordless *n*-circuit, *cn*, *−cn*, *∼ cn*, and *∼ (−cn)* will all admit\
    \ the same set of prekernels.\n\n> ¹ Not to be confused with the dual graph of\
    \ a plane graph *g* that has a vertex for each face of *g*. Here we mean the *less\
    \ than* (strict converse) relation corresponding to a *greater than or equal to*\
    \ relation, or the *less than or equal to* relation corresponding to a (strict\
    \ converse) *greater than* relation.\n\n> ² The class of *self-codual* bipolar-valued\
    \ digraphs consists of all weakly asymmetric digraphs, i.e. digraphs containing\
    \ only asymmetric and/or indeterminate links. Limit cases consist of, on the one\
    \ side, full tournaments with indeterminate reflexive links and, on the other\
    \ side, fully indeterminate digraphs. In this class, the converse (inverse *~*)\
    \ operator is indeed identical to the dual (negation *−*) one."
  mdcn: "## 17.3 侧向有向图中的核\n\n人类确实生活在一个具有简单传递侧向性的明显物理空间中，完全掌握在具有线性序的有限几何三维模型中，其中排名第一和最后的节点分别提供唯一的初始核和终端核。\n\
    \n类似地，在有限预序中，第一个和最后一个等价类分别提供唯一的初始核和唯一的终端核。更一般地，在有限偏序（即非对称和传递的有向图）中，拓扑排序算法将轻松揭示第一层和最后一层上所有唯一的初始核和终端核。\n\
    \n然而，在真正的随机有向图中，我们可能需要检查其每个最大独立集（MIS），以确定侧向外稳定性条件之一、两者或两者都不满足。例如，考虑清单17.9中以下阶数为7、弧概率为30%的随机有向图实例。\n\
    \n**清单17.9** 生成一个阶数为7、弧概率为0.3的随机有向图rd\n\n```\n>>> from randomDigraphs import RandomDigraph\n\
    >>> rd = RandomDigraph(order=7,arcProbability=0.3,seed=5)\n>>> rd.exportGraphViz('randomLaterality')\n\
    *---- exporting a dot file for GraphViz tools ---*\nExporting to randomLaterality.dot\n\
    dot -Grankdir=BT -Tpng randomLaterality.dot -o randomLaterality.png\n```\n\n图17.4所示的随机有向图除了是连通的（见下一页清单17.10第3行）之外，没有明显的特殊性质。\n\
    \n**图17.4** *一个阶数为7、弧概率为0.3的随机有向图实例。该有向图实例既非非对称（a3 ⇔ a6）也非对称（a2 → a1, a1 ↛ a2），且该有向图不是传递的（a5\
    \ → a2 → a1，但a5 ↛ a1）*\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_256_0.png)\n\
    \n在一个完全有向图中，每个单独的节点确实既是初始预核候选也是终端预核候选，并且没有明确的有向图起点或终点可被检测。侧向性在这里完全相对于所选为参考点的特定单元素集。\n\
    \n同样的侧向性缺失在另外两种通用有向图模型中也很明显（见清单17.4），即*空*有向图和*不确定*有向图。\n\n### 清单17.4 空或不确定有向图的预核\n\
    \n```\n>>> from digraphs import EmptyDigraph\n>>> ed = EmptyDigraph(order=5)\n\
    >>> ed.showPreKernels()\n*--- Computing preKernels ---*\nDominant kernel :\n['1',\
    \ '2', '3', '4', '5']\nindependence : 1.0\ndominance : 1.0\nabsorbency : 1.0\n\
    Absorbent kernel :\n['1', '2', '3', '4', '5']\nindependence : 1.0\ndominance :\
    \ 1.0\nabsorbency : 1.0\n>>> from digraphs import IndeterminateDigraph\n>>> id\
    \ = IndeterminateDigraph(order=5)\n>>> id.showPreKernels()\n*--- Computing preKernels\
    \ ---*\nDominant prekernel :\n['1', '2', '3', '4', '5']\nindependence : 0.0\n\
    dominance : 1.0\nabsorbency : 1.0\nAbsorbent prekernel :\n['1', '2', '3', '4',\
    \ '5']\nindependence : 0.0\ndominance : 1.0\nabsorbency : 1.0\n```\n\n在空有向图中，整个节点集确实同时提供了唯一的初始和终端预核（见第6行和第11行），类似地，对于*不确定*有向图也是如此（见第20行和第25行）。\n\
    这两个结果都是合理的，因为在完全空或不确定的有向图中，没有定义有向图的*内部*，只有一个*边界*，因此该边界同时是初始和终端预核（见第2.4节）。然而，请注意，在后一种不确定情况下，完整的节点集仅弱地验证了内部稳定性条件（见第21行和第26行）。\n\
