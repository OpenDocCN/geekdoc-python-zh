  md: 'In our bipolar-valued outranking approach, all performance criteria implement
    *decimal-valued* evaluation functions, where preferences are either *increasing*
    or *decreasing* with measured performances. In order to model a *coherent* performance
    tableau, the family of decision criteria must satisfy two methodological requirements:


    +   1. *Independence*: Each decision criterion implements an evaluation that is
    *functionally independent* of the evaluation of the other decision criteria, i.e.
    the performance evaluated on one of the criteria does not *constrain* in any sense
    the performance evaluated on any other criterion.

    2. *Non-redundancy*: Each performance criterion is only *significant* for a *single*
    decision objective.


    For taking into account any, usually *unavoidable, imprecision* of the performance
    evaluation procedures, we may specify three performance *discrimination thresholds*:
    an *indifference* (*ind*), a *preference* (*pref*), and a *considerable performance
    difference* (*veto*) threshold (see Listing 5.4 on the preceding page Lines 10–12).
    The left decimal number of a threshold description tuple indicates a *constant*
    part, whereas the right decimal number indicates a *proportional* part.


    On the template performance criterion g1, shown in Listing 5.4 on the previous
    page, we observe, for instance, an evaluation scale from 0.0 to 100.0 with a constant
    *indifference* threshold of 2.5, a constant *preference* threshold of 5.0, and
    a constant *considerable performance difference* threshold of 60.0. The latter
    threshold will trigger, the case given, a *polarisation* of the outranking statement
    (Bisdorff 2013).


    In a random *Cost-Benefit* performance tableau model we may obtain by default
    the following description of a cardinal *Costs* criterion:


    **Listing 5.5** Example of cardinal *Costs* criterion


    ```

