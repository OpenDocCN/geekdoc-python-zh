  - '[PAGE 159]


    Among the 10 new incoming decision alternatives, we recognise alternatives a1001
    (see column 2) and a1010 (see last column) we have shown in Table 10.1 on page
    125.


    The actions dictionary of a `LearnedQuantilesRatingDigraph` class instance includes,
    besides the 10 performance evaluations of the ten new alternatives, also the closed
    lower limits of the four quartile classes: m1 = [0.0 – [, m2 = [0.25 – [, m3 =
    [0.5 – [, m4 = [0.75 – [. We find these limits in the `profiles` attribute (see
    Listing 10.6 below).


    **Listing 10.6** Showing the limiting profiles of the rating quantiles


    ```

    >>> lqr.showPerformanceTableau(actionsSubset=lqr.profiles)

    *---- Quartiles limit profiles ----*

    criteria | ''m1'' ''m2'' ''m3'' ''m4''

    ---------|---------------------------------

    ''b1'' | 2.0 28.8 49.6 75.3

    ''b2'' | 0.0 2.9 4.9 6.7

    ''b3'' | 0.0 2.9 4.9 8.0

    ''b4'' | 3.3 35.9 58.6 72.0

    ''b5'' | 0.8 32.8 48.1 69.7

    ''c1'' | -10.0 -7.4 -5.4 -3.4

    ''c2'' | -96.4 -72.2 -52.3 -34.0

    ```


    The main run time is spent by the `LearnedQuantilesRatingDigraph` class constructor
    in computing a bipolar-valued outranking relation on the extended actions set
    including both the new alternatives as well as the quartile class limits. In case
    of large volumes, i.e. many new decision alternatives and centile classes, for
    instance, a multi-threading version may be used when multiple processing cores
    are available (Bisdorff 2021).


    The actual rating procedure will rely on a complete ranking of the new decision
    alternatives as well as the quantile class limits obtained from the corresponding
    bipolar-valued outranking digraph. Two efficient and scalable ranking rules, the
    COPELAND and its valued version, the NETFLOWS rule may be used for this purpose.
    The `rankingRule` parameter allows to choose one of both. With `rankingRule=''best''`
    (see Listing 10.4 on the preceding page Line 4) the `LearnedQuantilesRatingDigraph`
    constructor will choose the ranking rule that results in the highest ordinal correlation
    with the given outranking relation (see Chap. 16 and Bisdorff 2012).


    In this rating example, the COPELAND rule appears to be the more appropriate ranking
    rule.


    **Listing 10.7** COPELAND ranking of new alternatives and historical quartile
    limits


    ```

    >>> lqr.rankingRule

    ''Copeland''

    >>> lqr.actionsRanking

    [''m4'', ''a1005'', ''a1010'', ''a1002'', ''a1008'', ''a1006'', ''a1001'',

    ''a1003'', ''m3'', ''a1007'', ''a1004'', ''a1009'', ''m2'', ''m1'']

    >>> lqr.showCorrelation(lqr.rankingCorrelation)

    Correlation indexes:

    Crisp ordinal correlation : +0.945

    Epistemic determination : 0.522

    Bipolar-valued equivalence : +0.493

    ```'
