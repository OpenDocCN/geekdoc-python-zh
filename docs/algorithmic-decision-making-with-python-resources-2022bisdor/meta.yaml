    Listing 8.14 Computing the epistemic disjunction of optimal SLATER rankings


    ```

    1 >>> from transitiveDigraphs import RankingsFusionDigraph

    2 >>> slw = RankingsFusionDigraph(sl,sl.maximalRankings)

