    **Fig. 4.5** *The internal stability of a best choice recommendation in question*

    The only kernel of this digraph is the pair {a, d}; yet, it is an ambiguous recommendation,
    as {a, d} is conjointly an outranking and outranked choice. If the instability
    of the best choice recommendation is, however, not considered a problem, then
    the choice {a, b} shows the most convincing strict outranking quality and could
    be considered in priority for a potential best choice recommendation


    His commentary was the following: Adding alternative d to the set of potential
    best choice candidates is not convincing as there exists in the given digraph
    the node b, which is better evaluated than d. The argument that the incomparability
    between a and d should favour d as potential best choice is interesting but another
    hypothesis could be that b perhaps outranks a. In this latter case, it seems clear
    that the actual best choice recommendation should be reduced to node b, unless
    one disposes of other information, like a performance tableau and/or the actual
    computation method of the outranking situations. In any case, one has to be very
    clear about the available information when judging a best choice procedure.


    It became thereafter obvious for us all that both the lack of a specific performance
    tableau as well as the lack of a precisely defined algorithm for computing valid
    outranking situations do not allow to judge if a given digraph does indeed model
    a potential outranking relation. In our present bipolar-valued epistemic approach,
    a valid outranking digraph instance, following from a given performance tableau
    and the disjunctive epistemic fusion construction of the outranking relation (see
    Chap. 3), will necessarily verify the weak completeness condition and the coduality
    principle. As a consequence, incomparability situations are now modelled by epistemic
    indeterminateness not by the actual absence of a reciprocal outranking relation.


    The digraph put forward by *D. Bouyssou* in the October 2005 discussion is not
    weakly complete—node a is not outranking node d and vice versa—and does hence
    not represent, in our present sense, a valid outranking digraph instance. Yet,
    it may be a partial tournament and as such it could be a strict outranking digraph,'
  - '[PAGE 83]


    i.e. the asymmetric part—the codual—of a valid outranking digraph. In this case,
    nodes a and d—the kernel of the strict outranking digraph—would actually for sure
    outrank each other and, hence, represent both indifferently the natural best choice
    recommendation. However, in this not strict codual digraph, node a becomes also
    the unique CONDORCET winner—outranking for sure all other nodes—and gives hence
    the evident unique best choice recommendation.


    Only after 2013, when the weak completeness and the coduality properties of the
    outranking digraph were discovered, it became obvious that the initial prekernels
    of the strict outranking digraph, coupled with the solution of the corresponding
    kernel equation system, were in fact delivering the most convincing best choice
    recommendations (see Chap. 17, Sect. 20.4 and Bisdorff 2013). It stays an interesting
    open mathematical problem to show (or not) that both necessary conditions—weak
    completeness and coduality—are also sufficient for qualifying any bipolar-valued
    digraph as potential instance of an outranking digraph.


