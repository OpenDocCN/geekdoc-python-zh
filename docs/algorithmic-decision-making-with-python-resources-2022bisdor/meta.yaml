    # 17.5 Tractability of Kernel Computation


    Let us give some hints on the tractability of prekernel computations. Detecting
    all prekernels in a digraph is a computationally difficult problem. Checking external
    stability conditions for an independent choice is equivalent to checking its maximality
    and may be done in the linear complexity of the order of the digraph. However,
    checking all independent choices contained in a digraph may get hard already for
    tiny sparse digraphs of order n > 20 (Bisdorff 2006). Indeed, the worst case is
    given by an empty or indeterminate digraph where the set of all potential independent
    choices to check is in fact the power set of the vertices.'
