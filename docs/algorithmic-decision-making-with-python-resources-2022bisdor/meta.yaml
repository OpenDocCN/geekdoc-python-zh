    **Abstract** The DIGRAPH3 python resources provide several algorithms for solving
    the multiple incommensurable criteria ranking problem via bipolar-valued outranking
    digraphs. The COPELAND, NETFLOWS, KEMENY, SLATER, KOHLER, and the RANKEDPAIRS
    ranking rules are introduced and illustrated with a random outranking digraph.


    # 8.1 The Ranking Problem


    We need to rank without ties a set $X$ of items (usually decision alternatives)
    that are evaluated on multiple incommensurable performance criteria; yet, for
    which we know their pairwise bipolar-valued *strict outranking* characteristics,
    i.e. $r(x \succcurlyeq y)$ for all $x, y \in X$ (see Sect. 3.5 and Bisdorff 2013).'
