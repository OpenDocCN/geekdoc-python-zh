    \ 本章我们解决的问题是：根据从过去观察到的类似决策备选方案收集的历史性能数据中学习到的性能分位数，对一组潜在决策备选方案的多准则性能进行评级。我们展示了如何从此类历史性能矩阵中学习性能分位数。新的性能记录现在可以根据这些分位数规范进行评级。\n\
    \n## 10.1 绝对评级问题\n\n为了说明我们面临的*绝对评级*问题，请暂时考虑一下，在给定的决策问题中，我们观察到，例如在下面的表10.1中，两个潜在决策备选方案（名为a1001和a1010）的多准则性能评估，它们在7个*不可通约*的性能准则上进行评估：2个*成本*准则c1和c2（需*最小化*）和5个*效益*准则b1到b5（需*最大化*）。\n\
    \n*效益*准则b1、b4和b5的性能在0.0（最差）到100.0（最佳）的基数尺度上测量，而*效益*准则b2和b3以及*成本*准则c1的性能分别在0（最差）到10（最佳）的序数尺度上测量，以及-10（最差）到0（最佳）。*成本*准则c2的性能最终在-100.00（最差）到0.0（最佳）的基数*负*尺度上测量。两个*成本*准则具有同等重要性（权重5）。同样，五个效益准则也具有同等重要性（权重2）。因此，*成本*准则的*重要性*（显著性权重之和：2\
    \ × 5 = 10）*等同于**效益*准则的*重要性*（显著性权重之和：5 × 2 = 10）。\n\n我们现在面临的非平凡决策问题是，如何对备选方案a1001和a1010先前的两个多准则性能记录进行评级：*优秀？良好？*还是*一般？*；甚至可能是*较弱？*或*非常弱？*当与过去已经评级到分位数中的类似多准则性能记录进行比较时。\n\
    \n为了解决这个*绝对*评级问题，首先，我们需要从历史记录中估计多准则*性能分位数*（Bisdorff 2020）。\n\n## 10.2 历史性能分位数的增量学习\n\
    \n假设我们从给定的随机性能矩阵模型（参见第5章）中随机看到飞入的多准则性能。我们在此解决的问题是，根据迄今为止观察到的性能向量来估计经验性能分位数。对于这项任务，我们受到Chambers等人（2006）的启发，他们提出了一种高效的算法，用于使用新观察到的累积分布函数（CDF）增量更新分位数分箱的累积分布函数。¹\n\
    \n`PerformanceQuantiles`类使用`randomNumbers`模块中的`IncrementalQuantilesEstimator`类，实现了基于给定性能矩阵的这种性能分位数估计（Bisdorff\
