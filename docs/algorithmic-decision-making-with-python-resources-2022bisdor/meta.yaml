    Köln, in Düsseldorf, in Saarbrücken, in Heidelberg or in Munich. She also considers
    two short (4 Semesters) study programs at the Chamber of Commerce in Köln.


    Four **decision objectives** of more or less equal importance are guiding Alice’s
    choice:


    +   1. *maximise* the attractiveness of the study place (GEO),

    2. *maximise* the attractiveness of her further studies (LEA),

    3. *minimise* her financial dependency on her parents (FIN),

    4. *maximise* her professional perspectives (PRA).


    The decision consequences Alice wishes to take into account for evaluating the
    potential study programs with respect to each of the four objectives are modelled
    by the following *coherent family of criteria* (Roy 1991; Roy and Bouyssou 1993).
    Such a family of performance criteria verifies:


    +   1. *Exhaustiveness*: No argument acceptable to Alice can be put forward to
    justify a preference in favour of study program *x* versus program *y* when *x*
    and *y* have the same performance level on each of the performance criteria;'
  - '[PAGE 179]


    12.2 The Performance Tableau 153


    Table 12.2 Alice’s family of performance criteria


    | ID | Name | Comment | Objective | Weight |

    |---|---|---|---|---|

    | DH | Proximity | Distance in km to her home (min) | GEO | 3 |

    | BC | Big City | Number of inhabitants (max) | GEO | 3 |

    | AS | Studies | Attractiveness of the studies (max) | LEA | 6 |

    | SF | Fees | Annual study fees (min) | FIN | 2 |

    | LC | Living | Monthly living costs (min) | FIN | 2 |

    | SL | Length | Length of the studies (min) | FIN | 2 |

    | AP | Profession | Attractiveness of the profession (max) | PRA | 2 |

    | AI | Income | Annual income after studying (max) | PRA | 2 |

    | PR | Prestige | Occupational prestige (max) | PRA | 2 |


    2. *Cohesiveness*: Alice recognises that program $x$ must be preferred to program
    $y$ whenever the performance level of $x$ is significantly better than that of
    $y$ on one of the criteria of positive weight, performance levels of $x$ and $y$
    being the same on each of the other criteria;

    3. *Non-redundancy*: One of the above requirements is violated if one of the performance
    criteria is left out from the family.


    Within each decision objective, the performance criteria are considered to be
    *equi-significant*. Hence, the four decision objectives get a same *importance
    weight* of 6 (see Table 12.2 Column 5).


