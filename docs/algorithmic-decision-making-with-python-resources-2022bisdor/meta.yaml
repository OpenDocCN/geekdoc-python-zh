  - '[PAGE 124]


    The first selection concerns c06 (first) and c02 (last), followed by c11 (first)
    opposed to c05 (last), and so on, until there remains at iteration step 7 a last
    pair of candidates, namely [c04, c12] (see Lines 9–10).


    Notice furthermore the 3rd-best ranked candidates at iteration step 3 (see Line
    5), namely the pair (c07, c08). Both candidates represent indeed conjointly the
    *3rd best ranked* choice. We obtain hence a *weak ranking*, i.e. a ranking with
    a tie.


    Let us mention that the *instant runoff* procedure, we used before when operated
    with a Comments=True parameter setting, will deliver a more or less similar *reversed
    linear ordering-by-rejecting* result, namely [c02, c10, c14, c05, c09, c13, c12,
    c15, c04, c01, c08, c03, c07, c11, c06], ordered from the *last* to the *first*
    choice.


    Remarkable about both these *ranking-by-choosing* or *ordering-by-rejecting* results
    is the fact that the random voting behaviour, simulated here with the help of
    two discrete random variables,⁵ Defined, respectively, by the two random party
    polls, is rendering a ranking that is more or less in accordance with the simulated
    balance of the polls: Party-1 supporters : 460; Party-2 supporters: 436 (see Listing
    7.10 on page 92 Lines 29–43 third column). Despite a random voting behaviour per
    voter, the given polls apparently show a *very strong incidence* on the eventual
    election result. In order to avoid any manipulation of the election outcome, public
    media are therefore in some countries not allowed to publish polls during the
    last weeks before a general election.


    Mind that the specific *ranking-by-choosing* procedure, we use here on the majority
    margins digraph, operates the selection procedure by extracting at each step *initial*
    and *terminal* prekernels, i.e. difficult operational problems (see Chap. 17 and
    Bisdorff 1999); A technique that does not allow in general to tackle voting profiles
    with much more than 30 candidates.


    Next Chap. 8 on multiple incommensurable criteria ranking methods presents more
    methods and tools for ranking from pairwise majority margins when a larger number
    of potential candidates or decision alternatives is given.


    # References


    Bisdorff R (1999) Bipolar ranking from pairwise fuzzy outrankings. Belg J Oper
    Res Stat Comput Sci 37(4):379–387. http://hdl.handle.net/10993/38738


    Bisdorff R (2020a) Lecture 2: Who wins the election? In: Lectures of the algorithmic
    decision theory course, University of Luxembourg. http://hdl.handle.net/10993/37933


    Bisdorff R (2020b) Lecture 4: Discrete random variables. In: Lectures of the computational
    statistics course, University of Luxembourg. http://hdl.handle.net/10993/37870


    ⁵ Discrete random variables with a given empirical probability law (here the polls)
    are provided in the `randomNumbers` module by the `DiscreteRandomVariable` class
    (Bisdorff 2020b).'
- md: "## Chapter 8\nRanking with Multiple Incommensurable Criteria\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_126_0.png)\n\
    \n> ... whether we are deciding between buying different commodity baskets, or\
    \ making choices about what to do on a holiday, or deciding for whom to vote for\
    \ in an election, we are inescapably involved in evaluating alternatives with\
    \ non-commensurable aspects.\n\n—Amartya Sen, Idea of Justice (Sen 2009)\n\n##\
    \ Contents\n\n- 8.1 The Ranking Problem\n- 8.2 The COPELAND Ranking\n- 8.3 The\
    \ NETFLOWS Ranking\n- 8.4 KEMENY Rankings\n- 8.5 SLATER Rankings\n- 8.6 The KOHLER\
    \ Ranking-by-Choosing Rule\n- 8.7 The RANKEDPAIRS Ranking Rule\n\n**Abstract**\
    \ The DIGRAPH3 python resources provide several algorithms for solving the multiple\
    \ incommensurable criteria ranking problem via bipolar-valued outranking digraphs.\
    \ The COPELAND, NETFLOWS, KEMENY, SLATER, KOHLER, and the RANKEDPAIRS ranking\
    \ rules are introduced and illustrated with a random outranking digraph.\n\n###\
    \ 8.1 The Ranking Problem\n\nWe need to rank without ties a set $X$ of items (usually\
    \ decision alternatives) that are evaluated on multiple incommensurable performance\
    \ criteria; yet, for which we know their pairwise bipolar-valued *strict outranking*\
    \ characteristics, i.e. $r(x \\succcurlyeq y)$ for all $x, y \\in X$ (see Sect.\
    \ 3.5 and Bisdorff 2013).\n\nLet us consider in Listing 8.1 a didactic outranking\
    \ digraph g generated from a random Cost-Benefit performance tableau (see Sect.6.3)\
    \ concerning 9 decision alternatives evaluated on 13 performance criteria. The\
    \ BipolarOutrankingDigraph computes the corresponding bipolar-valued outranking\
    \ digraph g and a codual transform gives us the requested strict outranking digraph\
    \ gcd with the pairwise r(x ≳ y) characteristic values (see Lines 11–19 below).\n\
    \n**Listing 8.1** Random bipolar-valued strict outranking relation characteristics\n\
    \n```\n>>> from randomPerfTabs import RandomCBPerformanceTableau\n>>> t = RandomCBPerformanceTableau(numberOfActions=9,\n\
    ...         numberOfCriteria=13,seed=200)\n>>> from outrankingDigraphs import\
    \ BipolarOutrankingDigraph\n>>> g = BipolarOutrankingDigraph(t)\n>>> gcd = ~(-g)\
    \ # strict (codual) outranking digraph\n>>> gcd.showRelationTable(ReflexiveTerms=False)\n\
    * ---- Relation Table -----\nr(>) |  'a1'  'a2'  'a3'  'a4'  'a5'  'a6'  'a7'\
    \  'a8'  'a9'\n-----|------------------------------------------------------\n\
    'a1' |   -   0.00 +0.10 -1.00 -0.13 -0.57 -0.23 +0.10 +0.00\n'a2' | -1.00  - \
    \   0.00 +0.00 -0.37 -0.42 -0.28 -0.32 -0.12\n'a3' | -0.10  0.00  -   -0.17 -0.35\
    \ -0.30 -0.17 -0.17 +0.00\n'a4' |  0.00  0.00 -0.42  -   -0.40 -0.20 -0.60 -0.27\
    \ -0.30\n'a5' | +0.13 +0.22 +0.10 +0.40  -   +0.03 +0.40 -0.03 -0.07\n'a6' | -0.07\
    \ -0.22 +0.20 +0.20 -0.37  -   +0.10 -0.03 -0.07\n'a7' | -0.20 +0.28 -0.03 -0.07\
    \ -0.40 -0.10  -   +0.27 +1.00\n'a8' | -0.10 -0.02 -0.23 -0.13 -0.37 +0.03 -0.27\
    \  -   +0.03\n'a9' |  0.00 +0.12 -1.00 -0.13 -0.03 -0.03 -1.00 -0.03  -\n```\n\
    \nSome ranking rules will work on the associated CONDORCET digraph, i.e. the corresponding\
    \ median cut polarised strict outranking digraph.\n\n**Listing 8.2** Median cut\
    \ polarised strict outranking relation characteristics\n\n```\n>>> ccd = PolarisedOutrankingDigraph(gcd,\n\
    ...         level=g.valuationdomain['med'],\n...         KeepValues=False,StrictCut=True)\n\
    >>> ccd.showRelationTable(ReflexiveTerms=False,\n...         IntegerValues=True)\n\
    *---- Relation Table -----\nr(>)_med | 'a1' 'a2' 'a3' 'a4' 'a5' 'a6' 'a7' 'a8'\
    \ 'a9'\n---------|--------------------------------------------\n  'a1'   |  -\
    \    0   +1   -1   -1   -1   -1   +1    0\n  'a2'   | -1    -   +0    0   -1 \
    \  -1   -1   -1   -1\n  'a3'   | -1    0    -   -1   -1   -1   -1   -1    0\n\
    \  'a4'   |  0    0   -1    -   -1   -1   -1   -1   -1\n  'a5'   | +1   +1   +1\
    \   +1    -   +1   +1   -1   -1\n  'a6'   | -1   -1   +1   +1   -1    -   +1 \
    \  -1   -1\n  'a7'   | -1   +1   -1   -1   -1   -1    -   +1   +1\n  'a8'   |\
    \ -1   -1   -1   -1   -1   +1   -1    -   +1\n  'a9'   |  0   +1   -1   -1   -1\
    \   -1   -1   -1    -\n```\n\n### 8.1 The Ranking Problem\n\nFig. 8.1 *The strict\
    \ outranking relation* $\\succsim$. The relation shown here is, for instance,\
    \ *not transitive*: alternative a8 outranks alternative a6 and alternative a6\
    \ outranks a4, however, a8 does not outrank a4. Furthermore, alternatives a6,\
    \ a7, and a8 show a cyclic outranking relation\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_128_0.png)\n\
    \nUnfortunately, such crisp median cut CONDORCET digraphs, associated with a given\
    \ strict outranking digraph, only exceptionally model a linear ordering. Usually,\
    \ pairwise majority comparisons do not render a *complete* or, at least, a *transitive*\
    \ partial order. There may even frequently appear *cyclic* outranking situations\
    \ (see Sect. 7.4).\n\nTo discover how *difficult* this ranking problem can get,\
    \ let us have a look in Fig. 8.1 at the corresponding strict outranking digraph\
    \ *graphviz* drawing.¹\n\n```\n>>> gcd.exportGraphViz(fileName='rankingTutorial')\n\
    *---- exporting a dot file for GraphViz tools ---------*\nExporting to rankingTutorial.dot\n\
    dot -Grankdir=BT -Tpng rankingTutorial.dot -o rankingTutorial.png\n```\n\nThe\
    \ `computeTransitivityDegree()` method computes the *transitivity degree* of the\
    \ outranking digraph gcd shown in Fig. 8.1, i.e. the ratio of the number\n\n>\
    \ ¹ The `exportGraphViz()` method is depending on drawing tools from graphviz\
    \ software (https://graphviz.org/).\n\nof closed transitive triples—$x \\succcurlyeq\
    \ y$, $y \\succcurlyeq z$ and $x \\succcurlyeq z$—over the number of triples $x\
    \ \\succcurlyeq y$, $y \\succcurlyeq z$ (see below Lines 3–4).\n\n```\n>>> gcd.computeTransitivityDegree(Comments=True)\n\
    Transitivity degree of graph <codual_rel_randomCBperftab>\ntriples x>y>z: 78,\
    \ closed: 38, open: 40\nclosed/triples = 0.487\n```\n\nWith only 49% of the required\
    \ transitive arcs, the strict outranking digraph gcd is hence very far from being\
    \ transitive; a serious problem when a linear ordering of the decision alternatives\
    \ is looked for.\n\nThe `computeChordlessCircuits()` method, followed by the `showChordlessCircuits()`\
    \ method, can check furthermore whether there appear any cyclic outranking situations.²\n\
    \n```\n>>> gcd.computeChordlessCircuits()\n>>> gcd.showChordlessCircuits()\n1\
    \ circuit(s).\n*---- Chordless circuits ----*\n1: ['a6', 'a7', 'a8'] , credibility\
    \ : 0.033\n```\n\nThere is one chordless circuit detected in the given strict\
    \ outranking digraph gcd, namely alternative a6 outranks alternative a7, the latter\
    \ outranks a8, and a8 outranks again alternative a6 (see Fig. 8.1 on the previous\
    \ page). Any potential linear ordering of these three alternatives will, in fact,\
    \ always contradict somehow the given outranking relation.\n\nNow, several heuristic\
    \ ranking rules have been proposed for constructing a linear ordering which is\
    \ closest in some specific sense to a given outranking relation. The DIGRAPH3\
    \ resources provide some of the most common of these ranking rules, like the COPELAND,\
    \ KEMENY, SLATER, KOHLER, and the RANKEDPAIRS ranking rules.\n\n### 8.2 The COPELAND\
    \ Ranking\n\n**Algorithm 8.1 COPELAND ranking rule (Copeland 1951)**\n*in* : median\
    \ cut strict outranking digraph $G(X, \\succcurlyeq_{>0})$,\n*out* : linear ranking\
    \ of the set $X$ of decision actions.\n\n1. For each alternative $x \\in X$, the\
    \ COPELAND ranking rule computes a score resulting from the sum over all non-reflexive\
    \ pairs $(x, y)$ of the differences between the crisp *strict outranking* characteristics\
    \ $r(x \\succcurlyeq_{>0} y)$ and the crisp *strict outranked* characteristics\
    \ $r(y \\succcurlyeq_{>0} x)$.\n2. The alternatives are ranked in decreasing order\
    \ of these COPELAND scores; ties, the case given, being resolved with a lexicographical\
    \ rule applied to the identifiers of the decision actions.\n\n> ²The `computeChordlessCircuits()`\
    \ and `showChordlessCircuits()` methods are separate because there are various\
    \ methods available for enumerating the chordless circuits in a digraph (Bisdorff\
    \ 2010)."
  mdcn: "## 第8章\n基于多个不可公度准则的排序\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_126_0.png)\n\
    \n> ... 无论我们是在决定购买不同的商品组合，还是在选择假期要做什么，抑或是在选举中决定投票给谁，我们都不可避免地要评估具有不可公度方面的备选方案。\n\
    \n—阿马蒂亚·森，《正义的理念》（Sen 2009）\n\n## 目录\n\n- 8.1 排序问题\n- 8.2 COPELAND 排序法\n- 8.3\
    \ NETFLOWS 排序法\n- 8.4 KEMENY 排序法\n- 8.5 SLATER 排序法\n- 8.6 KOHLER 选择排序规则\n- 8.7\
    \ RANKEDPAIRS 排序规则\n\n**摘要** DIGRAPH3 Python 资源提供了多种算法，用于通过双极值优超有向图解决多个不可公度准则的排序问题。本文介绍了\
    \ COPELAND、NETFLOWS、KEMENY、SLATER、KOHLER 和 RANKEDPAIRS 排序规则，并通过一个随机优超有向图进行了说明。\n\
    \n### 8.1 排序问题\n\n我们需要对一组项目（通常是决策备选方案）$X$ 进行无平局排序，这些项目基于多个不可公度的性能准则进行评估；然而，我们已知它们的成对双极值*严格优超*特征，即对所有\
    \ $x, y \\in X$，$r(x \\succcurlyeq y)$（参见第3.5节和 Bisdorff 2013）。\n\n让我们在清单8.1中考虑一个教学用的优超有向图\
    \ g，它由一个随机的成本-效益性能表（参见第6.3节）生成，涉及9个决策备选方案，基于13个性能准则进行评估。BipolarOutrankingDigraph\
    \ 计算相应的双极值优超有向图 g，而一个余对偶变换则给出了我们所需的严格优超有向图 gcd，其中包含成对的 r(x ≳ y) 特征值（参见下面的第11-19行）。\n\
    \n**清单 8.1** 随机双极值严格优超关系特征\n\n```\n>>> from randomPerfTabs import RandomCBPerformanceTableau\n\
    >>> t = RandomCBPerformanceTableau(numberOfActions=9,\n...         numberOfCriteria=13,seed=200)\n\
    >>> from outrankingDigraphs import BipolarOutrankingDigraph\n>>> g = BipolarOutrankingDigraph(t)\n\
