    In Listing 9.4 Line 7, alternative a22 verifies indeed positively both sorting
    conditions only for the highest quintile [0.80−1.00] class. Whereas alternatives
    a44 and a49, for instance, weakly verify both sorting conditions for two, respectively,
    three, adjacent quintile classes (Lines 10−11 and 18−20).


    Quantiles sorting results, indeed, verify always the following properties (Bisdorff
    2020):


    Property 9.1 (Formal Properties of a Quantiles Sorting Result)


    +   1. Coherence: Each object is sorted into a non-empty subset of adjacent q-tiles
    classes. An alternative that would miss evaluations on all the criteria will be
    sorted conjointly in all q-tiled classes.

    2. Uniqueness: When r(x ∈ q^k) ≠ 0.0 for k = 1, ..., q, the performance x is sorted
    into exactly one single q-tiled class.

    3. Separability: Computing the sorting result for performance x is independent
    from the computing of the other performances’ sorting results. This property gives
    access to efficient parallel processing of class membership characteristics.


    The q-tiles sorting result leaves us hence with more or less overlapping ordered
    quantile equivalence classes. For constructing now a linearly ranked q-tiles partition
    of X , we may apply three strategies:


    +   1. Average (default): In decreasing lexicographic order of the average of
    the lower and upper quantile limits and the upper quantile class limit;

    2. Optimistic: In decreasing lexicographic order of the upper and lower quantile
    class limits;

    3. Pessimistic: In decreasing lexicographic order of the lower and upper quantile
    class limits;'
