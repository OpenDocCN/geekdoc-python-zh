    # 2.3 Asymmetric and Symmetric Parts


    Extracting both the *symmetric* as well as the *asymmetric* part of digraph rdg
    may be done with the help of two corresponding classes (see Listing 2.3).


    Listing 2.3 Computing asymmetric and symmetric parts


    ```

    1 >>> from digraphs import AsymmetricPartialDigraph,\n2 ...                     SymmetricPartialDigraph

    3 >>> asymDg = AsymmetricPartialDigraph (rdg)

    4 >>> asymDg.exportGraphViz()

    5 >>> symDg = SymmetricPartialDigraph (rdg)

    6 >>> symDg.exportGraphViz()

    ```


    The relation constructors of the partial objects asymDg and symDg set to the indeterminate
    characteristic value 0.0 all non-asymmetric, respectively, non-symmetric links
    between nodes (see Fig. 2.2 on the next page).


    In Listing 2.4 below is shown, for instance, the source code of the relation constructor
    of the AsymmetricPartialDigraph class:


    Listing 2.4 Computing the asymmetric part of a bipolar-valued relation


    ```

    1 def _constructRelation(self):

    2     actions = self.actions

    3     Min = self.valuationdomain[''min'']

    4     Max = self.valuationdomain[''max'']

    5     Med = self.valuationdomain[''med'']

    6     relationIn = self.relation

    7     relationOut = {}

    8     for a in actions:

    9         relationOut[a] = {}

    10        for b in actions:

    11            if a != b:

    12                if relationIn[a][b] >= Med and relationIn[b][a] <= Med:

    13                    relationOut[a][b] = relationIn[a][b]

    14                elif relationIn[a][b] <= Med and relationIn[b][a] >= Med:

    15                    relationOut[a][b] = relationIn[a][b]

    ```'
