  md: "This confirms again the pertinence of the net approval scoring approach for\
    \ finding the winner in an approval–disapproval voting system. Yet, voting by\
    \ approving (+1), disapproving (−1), or ignoring (0) eligible candidates may also\
    \ be seen as a performance evaluation of the eligible candidates on a {−1, 0,\
    \ 1}-valued ordinal scale.\n\n# 20.4 Three-Valued Evaluative Voting Systems\n\n\
    Following such an epistemic perspective, we may effectively convert the given\
    \ BipolarApprovalVotingProfile instance into a Performance-Tableau instance, so\
    \ as to get access to a corresponding outranking decision aiding approach.\n\n\
    Mind that, contrary to the majority margins of the ‘better approved than’ relation,\
    \ all voters consider now the approved candidates to be equivalent (+1). The same\
    \ is true for the disapproved (−1) and, respectively, the ignored (0) candidates.\
    \ The voter’s marginal preferences model this time a complete preorder with three\
    \ equivalence classes.\n\nFrom the saved file AVPerfTab.py (see Line 1 below),\
    \ we may construct an outranking relation on the eligible candidates with our\
    \ standard BipolarOutrankingDigraph class constructor. The semantics of this outranking\
    \ relation are the following:\n\n+   - We say that Candidate $x$ outranks Candidate\
    \ $y$ when there is a majority of voters who consider $x$ *at least as well evaluated*\
    \ as $y$.\n- We say that Candidate $x$ is *outranked by* Candidate $y$ when there\
    \ is a majority of voters who consider $x$ *not at least as well evaluated* as\
    \ $y$.\n- Otherwise, the outranking situation is indeterminate.\n\n```\nListing\
    \ 20.12 Computing the outranking digraph\n\n>>> bavp.save2PerfTab(fileName='AVPerfTab',valueDigits=0)\n\
    *--- Saving as performance tableau in AVPerfTab.py ---*\n>>> from outrankingDigraphs\
    \ import\\n...                     BipolarOutrankingDigraph\n>>> odg = BipolarOutrankingDigraph('AVPerfTab')\n\
    >>> odg\n*------- Object instance description ------*\n  Instance class      \
    \ : BipolarOutrankingDigraph\n  Instance name        : rel_AVPerfTab\n  Actions\
    \              : 15\n  Criteria             : 100\n  Size                 : 210\n\
    \  Determinateness (%)  : 69.29\n  Valuation domain     : [-1.00;1.00]\n  Attributes\
    \           : ['name', 'actions', 'order,\n  'criteria', 'evaluation', 'NA',\n\
    \  'valuationdomain', 'relation',\n  'gamma', 'notGamma', ...]\n```"
