    **Abstract** The chapter introduces bipolar-valued digraphs, the fundamental root
    type of all the specialised digraphs implemented in the DIGRAPH3 modules. With
    the help of a randomly valued digraph, we illustrate some basic digraph manipulation
    methods, like drawing the digraph, dividing the digraph into its asymmetric and
    symmetric parts, separating the border from the inner part, computing associated
    dual, converse, and codual digraphs, and operating symmetric and transitive closures.


    # 2.1 Random Bipolar-Valued Digraphs


    In Listing 2.1, we generate a uniformly random $[-1.0; +1.0]$-valued digraph of
    order 7, denoted `rdg` and modelling, for instance, a binary relation $S(x, y)$
    defined on the set of nodes of `rdg`. For this purpose, the DIGRAPH3 resources
    provide in the `randomDigraphs` module a specific `RandomValuationDigraph` class
    (Bisdorff 2021b).


    **Listing 2.1** Random bipolar-valued digraph instance


    ```

    1 >>> from randomDigraphs import RandomValuationDigraph

    2 >>> rdg = RandomValuationDigraph(order=7)

    3 >>> rdg.save(''tutRandValDigraph'')

    ```'
