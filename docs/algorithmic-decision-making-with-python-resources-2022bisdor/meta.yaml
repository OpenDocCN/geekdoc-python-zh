- md: "## 3.4 Recoding the Characteristic Valuation Domain\n\nAll outranking digraphs,\
    \ being of root `Digraph` type, inherit the methods available under this latter\
    \ class. The characteristic valuation domain of a digraph can, for instance, be\
    \ recoded with the `recodeValuation()` method to the *integer* range $[-7, +7]$,\
    \ i.e. plus or minus the total significance weights of the family of criteria\
    \ considered in this example instance `odg`.\n\n**Listing 3.8** Recoding the digraph\
    \ valuation\n\n```\n>>> odg.recodeValuation(-7,+7)\n>>> odg.valuationdomain['hasIntegerValuation']\
    \ = True\n>>> Digraph.showRelationTable (odg,ReflexiveTerms=False)\n  * ---- Relation\
    \ Table -----\n  r(x,y) |  'a1'  'a2'  'a3'  'a4'  'a5'  'a6'  'a7'\n  --------|------------------------------------------\n\
    \  'a1'    |    -   +5   +2   +2   +2   +2    0\n  'a2'    |   -5    -   -1  \
    \ -1   +1   +2   -4\n  'a3'    |   -1   +2    -   -1   -1    0   -1\n  'a4'  \
    \  |    0   +1   +4    -   +2   +4   -3\n  'a5'    |   -1    0   +1    0    -\
    \   +2   -1\n  'a6'    |   -1    0   +1   -1   +1    -    0\n  'a7'    |    0\
    \   +5   +4   +3   +2    0    -\n  Valuation domain:  [-7;+7]\n```\n\nNotice in\
    \ Listing 3.8 that the self comparison characteristics $r(x \\succcurlyeq x)$\
    \ may be ignored by setting the `ReflexiveTerms` parameter to `False`. Mind that\
    \ the trivial reflexive terms of outranking relations are ignored in some of the\
    \ DIGRAPH3 methods.\n\n## 3.5 The Strict Outranking Digraph\n\nFrom theory, we\
    \ know that a bipolar-valued outranking digraph is *weakly complete*, i.e. if\
    \ $r(x \\succcurlyeq y) < 0.0$, then $r(y \\succcurlyeq x) \\geqslant 0.0$. From\
    \ this property follows that a bipolar-valued outranking digraph verifies the\
    \ *coduality principle*: the *dual*<sup>1</sup> (negation) of the *converse* (transposition)\
    \ of the outranking relation $(x \\succcurlyeq y)$ corresponds to its asymmetric\
    \ *strict outranking* part $(x \\succ y)$ (Bisdorff 2013, 2020).\nVisualising\
    \ the *codual* (*strict*) outranking digraph may be done with a graphviz drawing\
    \ (Fig. 3.1).<sup>2</sup>\n\n> <sup>1</sup> Not to be confused with the dual graph\
    \ of a plane graph $g$ that has a vertex for each face of $g$. Here we mean the\
    \ *less than* (*strict converse*) relation corresponding to a *greater or equal*\
    \ relation, or the *less than or equal to* relation corresponding to a (*strict*)\
    \ *better than* relation.\n> <sup>2</sup> The `exportGraphViz()` method is depending\
    \ on drawing tools from the graphviz software (https://graphviz.org/). On Linux\
    \ Ubuntu or Debian, you may try `sudo apt-get install graphviz` to install them.\
    \ There are ready dmg installers for Mac OSX.\n\nFig. 3.1 *The strict (codual)\
    \ outranking digraph.* It becomes readily clear now from the picture that both\
    \ alternatives a1 and a7 are *not outranked* by any other alternatives. Hence,\
    \ a1 and a7 appear as *weak* CONDORCET winners and may be recommended as potential\
    \ *best* decision alternatives in this illustrative preference modelling example\n\
    \n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_66_0.png)\n\n```\n>>> cdodg = -(~odg)\n\
    >>> cdodg.exportGraphViz('codualOdg')\n*---- exporting a dot file for GraphViz\
    \ tools ---------*\n  Exporting to codualOdg.dot\n  dot -Grankdir=BT -Tpng codualOdg.dot\
    \ -o codualOdg.png\n```\n\nMany more tools for exploiting bipolar-valued outranking\
    \ digraphs are available in the DIGRAPH3 resources (Bisdorff 2021).\n\n## Notes\n\
    \nThe seminal work on outranking digraphs goes back to the seventies and eighties\
    \ when *Bernard Roy* joined the just starting University Paris-Dauphine and founded\
    \ there the ‘*Laboratoire d’Analyse et de Modélisation de Systèmes pour l’Aide\
    \ à la Décision*’ (LAMSADE). The LAMSADE became the major site in the development\
    \ of the outranking approach to multiple-criteria decision aiding (Roy and Bouyssou\
    \ 1993).\n\nThe ongoing success of the original *outranking* concept stems from\
    \ the fact that it is rooted in a sound pragmatism. The multiple-criteria performance\
    \ tableau, necessarily associated with a given outranking digraph, is indeed convincingly\
    \ objective and meaningful (Roy 1991). And, ideas from social choice theory gave\
    \ initially the insight that a pairwise voting mechanism à la CONDORCET could\
    \ provide an order-statistical tool for aggregating a set of preference points\
    \ of view into what *Marc Barbut* called the *central* CONDORCET point of view\
    \ (de Caritat, Marquis de Condorcet 1784 and Barbut 1980), in fact the median\
    \ of the multiple preference points of view, at minimal absolute KENDALL’s ordinal\
    \ correlation distance from all individual points of view (see Chap. 16).\n\n\
    Considering thus each performance criterion as a subset of unanimous voters and\
    \ balancing the votes in favour against considerable counter-performances in disfavour\
    \ gave eventually rise to the concept of *outranking situation*, a distinctive\
    \ feature of the Multiple-Criteria Decision Aiding approach (Bisdorff et al. 2015).\
    \ A modern definition would be an alternative $x$ is said to *outrank* alternative\
    \ $y$ when—a *significant majority* of criteria confirm that alternative $x$ has\
    \ to be considered as *at least as well evaluated as* an alternative $y$ (the\
    \ *concordance* argument), and—no discordant criterion opens to significant doubt\
    \ the validity of the previous confirmation by revealing a considerable counter-performance\
    \ of alternative $x$ compared to $y$ (the *discordance* argument).\n\nIf the concordance\
    \ argument was always well received, the discordance argument however, very confused\
    \ in the beginning (Benayoun et al. 1966), could only be handled in an epistemically\
    \ correct and logically sound way by using a bipolar-valued epistemic logic (see\
    \ Definition 3.1 and Bisdorff 2013). The outranking situation had consequently\
    \ to receive an explicit negative definition: an alternative $x$ is said to *do\
    \ not outrank* an alternative $y$ when—a *significant majority* of criteria confirm\
    \ that alternative $x$ has to be considered as *not at least as well evaluated\
    \ as* alternative $y$, and—no discordant criterion opens to significant doubt\
    \ the validity of the previous confirmation by revealing a considerable *better*\
    \ performance of alternative $x$ compared to $y$.\n\nFurthermore, the initial\
    \ conjunctive aggregation of the concordance and discordance arguments had to\
    \ be replaced by a disjunctive epistemic fusion operation, polarising in a logically\
    \ sound and epistemically correct way the concordance with the discordance argument.\
    \ This way, bipolar-valued outranking digraphs gained two very useful properties\
    \ from a measure theoretical perspective. They are *weakly complete*; incomparability\
    \ situations are no longer attested by the absence of positive outranking relations,\
    \ but instead by epistemic indeterminateness. And they verify the *coduality principle*:\
    \ the negation of the epistemic ‘at least as well evaluated as’ situation corresponds\
    \ formally to the strict converse epistemic ‘less well evaluated than’ situation.\n\
    \nIn the next methodological Part II, we present and discuss multiple-criteria\
    \ evaluation models and decision algorithms, like building a best choice recommendation,\
    \ determining the winner of an election and computing linear rankings or quantile\
    \ ratings with multiple incommensurable criteria.\n\n## References\n\nBarbut M\
    \ (1980) Médiannes, Condorcet et Kendall. Math Sci Hum 69:9–13\nBenayoun R, Roy\
    \ B, Sussmann B (1966) ELECTRE: une méthode pour guider le choix en présence de\
    \ points de vue multiples. Tech. Rep. 49, Société d’Économie et de Mathématique\
    \ Appliqué, Direction Scientifique\nBisdorff R (2013) On polarizing outranking\
    \ relations with large performance differences. J Multi-Criteria Dec Anal Wiley\
    \ 20:3–12. http://hdl.handle.net/10993/245\nBisdorff R (2020) Lecture 7: best\
    \ multiple criteria choice: the Rubis outranking method. In: Lectures of the algorithmic\
    \ decision theory course, University of Luxembourg. http://hdl.handle.net/10993/37933\n\
    Bisdorff R (2021) Technical documentation of the Digraph3 collection of Python\
    \ modules. https://digraph3.readthedocs.io/en/latest/techDoc.html\nBisdorff R,\
    \ Dias L, Meyer P, Mousseau V, Pirlot M (eds) (2015) Evaluation and decision models\
    \ with multiple criteria: case studies. International handbooks on information\
    \ systems. Springer, Berlin. http://hdl.handle.net/10993/23698\nde Caritat, Marquis\
    \ de Condorcet J (1784) Essai sur l’application de l’analyse à la probabilité\
    \ des décisions rendues à la pluralité des voix. Imprimerie royale, Paris\nRoy\
    \ B (1991) The outranking approach and the foundations of electre methods. Theory\
    \ Decis 31(1):49–73\nRoy B, Bouyssou D (1993) Aide Multicritère à la Décision\
    \ : Méthodes et Cas. Economica, Paris"
  mdcn: "## 3.4 重新编码特征值域\n\n所有优势有向图，作为根`Digraph`类型的子类，都继承了该父类提供的方法。例如，可以使用`recodeValuation()`方法将有向图的特征值域重新编码为*整数*范围\
    \ $[-7, +7]$，即本示例实例`odg`中所考虑的准则族总显著性权重的正负值。\n\n**代码清单 3.8** 重新编码有向图的值域\n\n```\n\
    >>> odg.recodeValuation(-7,+7)\n>>> odg.valuationdomain['hasIntegerValuation']\
    \ = True\n>>> Digraph.showRelationTable (odg,ReflexiveTerms=False)\n  * ---- 关系表\
    \ -----\n  r(x,y) |  'a1'  'a2'  'a3'  'a4'  'a5'  'a6'  'a7'\n  --------|------------------------------------------\n\
    \  'a1'    |    -   +5   +2   +2   +2   +2    0\n  'a2'    |   -5    -   -1  \
    \ -1   +1   +2   -4\n  'a3'    |   -1   +2    -   -1   -1    0   -1\n  'a4'  \
    \  |    0   +1   +4    -   +2   +4   -3\n  'a5'    |   -1    0   +1    0    -\
    \   +2   -1\n  'a6'    |   -1    0   +1   -1   +1    -    0\n  'a7'    |    0\
    \   +5   +4   +3   +2    0    -\n  值域:  [-7;+7]\n```\n\n请注意代码清单 3.8 中，通过将`ReflexiveTerms`参数设置为`False`，可以忽略自比较特征\
    \ $r(x \\succcurlyeq x)$。请注意，在DIGRAPH3的某些方法中，优势关系的平凡自反项会被忽略。\n\n## 3.5 严格优势有向图\n\
    \n根据理论，我们知道双极值优势有向图是*弱完备的*，即如果 $r(x \\succcurlyeq y) < 0.0$，则 $r(y \\succcurlyeq\
    \ x) \\geqslant 0.0$。由此性质可推知，双极值优势有向图满足*余对偶原则*：优势关系 $(x \\succcurlyeq y)$ 的*逆*（转置）的*对偶*<sup>1</sup>（否定）对应于其非对称的*严格优势*部分\
    \ $(x \\succ y)$ (Bisdorff 2013, 2020)。\n可以通过graphviz绘图来可视化*余对偶*（*严格*）优势有向图（图\
    \ 3.1）。<sup>2</sup>\n\n> <sup>1</sup> 不要与平面图 $g$ 的对偶图混淆，后者为 $g$ 的每个面都有一个顶点。这里我们指的是与*大于或等于*关系相对应的*小于*（*严格逆*）关系，或与（*严格*）*优于*关系相对应的*小于或等于*关系。\n\
    > <sup>2</sup> `exportGraphViz()`方法依赖于graphviz软件（https://graphviz.org/）的绘图工具。在Linux\
    \ Ubuntu或Debian上，你可以尝试`sudo apt-get install graphviz`来安装它们。Mac OSX有现成的dmg安装程序。\n\
    \n图 3.1 *严格（余对偶）优势有向图。* 从图中可以清楚地看到，备选方案a1和a7都*未被任何其他备选方案所超越*。因此，a1和a7表现为*弱*孔多塞胜者，并可能在此说明性偏好建模示例中被推荐为潜在的*最佳*决策备选方案。\n\
    \n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_66_0.png)\n\n```\n>>> cdodg = -(~odg)\n\
    >>> cdodg.exportGraphViz('codualOdg')\n*---- 正在导出用于GraphViz工具的dot文件 ---------*\n\
    \  正在导出到 codualOdg.dot\n  dot -Grankdir=BT -Tpng codualOdg.dot -o codualOdg.png\n\
    ```\n\nDIGRAPH3资源库（Bisdorff 2021）中提供了更多用于利用双极值优势有向图的工具。\n\n## 注释\n\n关于优势有向图的开创性工作可以追溯到七八十年代，当时*伯纳德·罗伊*加入了刚成立的巴黎多芬大学，并在那里创立了“*决策支持系统分析与建模实验室*”（LAMSADE）。LAMSADE成为了发展多准则决策支持优势方法的主要基地（Roy\
    \ and Bouyssou 1993）。\n\n原始*优势*概念的持续成功源于其植根于健全的实用主义。与给定优势有向图必然相关的多准则性能表，确实是令人信服的客观且有意义的（Roy\
    \ 1991）。而且，社会选择理论的思想最初提供了洞见，即类似孔多塞的成对投票机制可以提供一种序统计工具，将一组偏好观点聚合成*马克·巴尔布特*所称的*中心*孔多塞观点（de\
    \ Caritat, Marquis de Condorcet 1784 and Barbut 1980），实际上是多个偏好观点的中位数，与所有个体观点的绝对肯德尔序相关距离最小（见第16章）。\n\
    \n因此，将每个性能准则视为一致投票者的子集，并平衡支持票与反对的显著反性能，最终催生了*优势情境*的概念，这是多准则决策支持方法的一个显著特征（Bisdorff\
    \ et al. 2015）。一个现代的定义是：当——*显著多数*的准则确认备选方案 $x$ 必须被视为*至少与*备选方案 $y$ *评价相当*（*一致性*论据），并且——没有不一致的准则通过揭示备选方案\
    \ $x$ 相对于 $y$ 的显著反性能来对先前确认的有效性提出重大质疑（*不一致性*论据）时，称备选方案 $x$ *优于*备选方案 $y$。\n\n如果一致性论据总是被很好地接受，那么不一致性论据，起初非常混乱（Benayoun\
    \ et al. 1966），只能通过使用双极值认知逻辑（见定义 3.1 和 Bisdorff 2013）以认识论上正确且逻辑上合理的方式处理。因此，优势情境必须接受一个明确的否定定义：当——*显著多数*的准则确认备选方案\
    \ $x$ 必须被视为*不至少与*备选方案 $y$ *评价相当*，并且——没有不一致的准则通过揭示备选方案 $x$ 相对于 $ y$ 的显著*更好*性能来对先前确认的有效性提出重大质疑时，称备选方案\
    \ $ x$ *不优于*备选方案 $ y$。\n\n此外，一致性和不一致性论据的初始合取聚合必须被一个析取认知融合操作所取代，该操作以逻辑上合理且认识论上正确的方式将一致性与不一致性论据极化。这样，双极值优势有向图从测度理论的角度获得了两个非常有用的性质。它们是*弱完备的*；不可比情境不再通过正优势关系的缺失来证明，而是通过认知不确定性来证明。并且它们满足*余对偶原则*：认知“至少与...评价相当”情境的否定在形式上对应于严格的逆认知“评价不如”情境。\n\
    \n在接下来的方法论第二部分，我们将介绍和讨论多准则评估模型和决策算法，例如构建最佳选择推荐、确定选举获胜者以及使用多个不可通约准则计算线性排序或分位数评级。\n\
    \n## 参考文献\n\nBarbut M (1980) Médiannes, Condorcet et Kendall. Math Sci Hum 69:9–13\n\
    Benayoun R, Roy B, Sussmann B (1966) ELECTRE: une méthode pour guider le choix\
    \ en présence de points de vue multiples. Tech. Rep. 49, Société d’Économie et\
    \ de Mathématique Appliqué, Direction Scientifique\nBisdorff R (2013) On polarizing\
    \ outranking relations with large performance differences. J Multi-Criteria Dec\
    \ Anal Wiley 20:3–12. http://hdl.handle.net/10993/245\nBisdorff R (2020) Lecture\
    \ 7: best multiple criteria choice: the Rubis outranking method. In: Lectures\
    \ of the algorithmic decision theory course, University of Luxembourg. http://hdl.handle.net/10993/37933\n\
    Bisdorff R (2021) Technical documentation of the Digraph3 collection of Python\
    \ modules. https://digraph3.readthedocs.io/en/latest/techDoc.html\nBisdorff R,\
    \ Dias L, Meyer P, Mousseau V, Pirlot M (eds) (2015) Evaluation and decision models\
    \ with multiple criteria: case studies. International handbooks on information\
    \ systems. Springer, Berlin. http://hdl.handle.net/10993/23698\nde Caritat, Marquis\
    \ de Condorcet J (1784) Essai sur l’application de l’analyse à la probabilité\
    \ des décisions rendues à la pluralité des voix. Imprimerie royale, Paris\nRoy\
    \ B (1991) The outranking approach and the foundations of electre methods. Theory\
    \ Decis 31(1):49–73\nRoy B, Bouyssou D (1993) Aide Multicritère à la Décision\
    \ : Méthodes et Cas. Economica, Paris"
