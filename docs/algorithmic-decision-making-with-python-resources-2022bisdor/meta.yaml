    ## International Series in Operations Research & Management Science


    **Founding Editor**

    Frederick S. Hillier, Stanford University, Stanford, CA, USA


    Volume 324


    **Series Editor**

    Camille C. Price, Department of Computer Science, Stephen F. Austin State University,
