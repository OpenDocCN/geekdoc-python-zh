  md: '# Part I

    Introduction to the DIGRAPH3 Python Resources


    The first part contains three chapters for introducing the DIGRAPH3 software collection
    of Python programming resources. The first chapter is devoted to the installation
    of the DIGRAPH3 Python modules and running a first Python terminal session using
    the DIGRAPH3 3 resources. The second chapter introduces bipolar-valued digraphs,
    the root type of all available specialised digraphs. The third chapter finally
    introduces the main formal objects of this book, namely bipolar-valued outranking
    digraphs.'
  merge: -1
  pgno: 33
- img_proc: true
  md: '# Chapter 1

    Working with the DIGRAPH3 Python Resources


    # Contents


    +   1.1 Installing the DIGRAPH3 Resources ........................................
    3

    1.2 Organisation of the DIGRAPH3 Python Modules ................................
    5

    1.3 Starting a DIGRAPH3 Terminal Session ........................................
    6

    1.4 Inspecting a Digraph Object ................................................
    8


    **Abstract** The chapter is devoted to a first contact with the DIGRAPH3 Python
    resources. Following the installation instructions, we list the main Python modules
    with their purpose and eventually illustrate in a first Python terminal session
    how to generate, save, and inspect a random crisp digraph.


    # 1.1 Installing the DIGRAPH3 Resources


    Using the DIGRAPH3 Python modules is simple.¹ You only need to have installed
    on your system the Python programming language of version 3 (by default available
    under Linux and MacOS).

    Several download options (easiest under Linux or MacOS) are given; either, by
    using a `git` client and `clone` a working copy from the `github.com` directory:

    `...$ git clone https://github.com/rbis dorff/Digraph3`

    or from the `sourceforge.net` directory:

    `...$ git clone https://git.code.sf.net/p/digraph3/code Digraph3`

    It is also possible, with a browser access, to download either,

    • from the `github.com` link or

    • from the `sourceforge.net` link,


    > ¹ See the technical description of the DIGRAPH3 programming resources, Bis dorff
    (2021).'
  merge: -1
  pgno: 34
- img_proc: true
  md: 'the latest distribution zip archive and extract it.


    On Linux or MacOS, ..$ cd to the cloned or extracted Digraph3 directory. The following
    shell command installs (with sudo !) the DIGRAPH3 modules in the system-wide python
    environment :


    ```

    .../Digraph3$ make install

    ```


    Python-3.8 (or later) environment is recommended (see the makefile for adapting
    the make install command to your running python environment). Whereas the following
    shell command installs the DIGRAPH3 modules locally in an activated virtual python
    user environment:


    ```

    .../Digraph3$ make installVenv

    ```


