    图13.1 THE排名标准\n\n因此，观察到的分位数差异中，6%到12%被认为是*不显著的*。同样，77%到88%被认为是*显著的*。在*教学*和*研究*标准上，只有不到1%对应于*显著的*分位数差异；这实际上触发了认识论上的极化效应（Bisdorff\
    \ 2013）。\n\n除了可能不精确的绩效区分外，THE作者分配给五个排名标准的*精确小数显著性权重*也相当*值得商榷*。标准显著性权重有时可能隐藏着策略，旨在使绩效评估在计算总体排名分数时具有可比性。最终的排名结果，在给定情况下，既取决于给定标准显著性权重的精确值，反之，给定的精确显著性权重也取决于主观预期和接受的排名结果。⁵\
    \ 因此，我们将放弃这些精确的小数权重，转而只要求一个相应的标准显著性预序：gtch = gres > gcit > gint > gind。*教学环境*和*研究规模与声誉*被认为同等最重要，其次是*研究影响力*。然后是*教职员工、学生和研究的国际视野*，最后最不重要的是*行业收入与创新*。\n\
    \n这两个工作假设：——绩效区分阈值和——仅序数标准显著性，为我们提供了一种基于*稳健成对优超*情况的排序方法（参见第19章和(Bisdorff 2004)）。\n\
    \n### 定义13.1（具有序数标准显著性权重的稳健优超情况）\n\n- 我们说计算机系*x**稳健地优超*计算机系*y*，当*x*在**所有**与显著性预序gtch\
    \ = gres > gcit > gint > gind兼容的显著性权重向量下，都正向优超*y*；\n- 我们说计算机系*x*被计算机系*y***稳健地优超**，当*x*在**所有**与显著性预序gtch\
    \ = gres > gcit > gint > gind兼容的显著性权重向量下，都被*y*正向优超；\n- 否则，计算机系*x*和*y*被认为是*不可比的*。\n\
    \n`RobustOutrankingDigraph`类提供了相应的有向图构造器。\n\n**清单13.7** 计算稳健优超有向图\n\n```python\n\
    >>> from outrankingDigraphs import RobustOutrankingDigraph\n>>> rdg = RobustOutrankingDigraph(cspt)\n\
    >>> rdg\n  *------ Object instance description ------*\n    Instance class   \
    \    : RobustOutrankingDigraph\n    Instance name        : robust_the_cs_2016\n\
    \    Actions              : 75\n    Criteria             : 5\n    Size       \
    \          : 2993\n    Determinateness (%)  : 78.16\n    Valuation domain    \
    \ : [-1.00;1.00]\n>>> rdg.computeIncomparabilityDegree(Comments=True)\n   Incomparability\
    \ degree (%) of digraph <robust_the_cs_2016>:\n   links x<->y y: 2775, incomparable:\
    \ 102, comparable: 2673\n   (incomparable/links) =  0.037\n>>> rdg.computeTransitivityDegree(Comments=True)\n\
    \   Transitivity degree of digraph <robust_the_cs_2016>:\n   triples x>y>z: 405150,\
    \ closed: 218489, open: 186661\n   (closed/triples) =  0.539\n>>> rdg.computeSymmetryDegree(Comments=True)\n\
    \   Symmetry degree (%) of digraph <robust_the_cs_2016>:\n   arcs x>y: 2673, symmetric:\
    \ 320, asymmetric: 2353\n   (symmetric/arcs) =  0.12\n```\n\n在生成的有向图实例`rdg`（参见清单**13.7**第9行）中，我们观察到2993个这样的稳健成对优超情况，其平均显著性为78%（第10行）。不幸的是，在本例中，它们并未提供任何完整的线性排序。稳健优超有向图`rdg`包含102个不可比情况（3.7%，第15行）；其传递闭包几乎缺失了一半（46.1%，第19行），并且12%的正向优超情况实际上对应于对称的无差异情况（第23行）。\n\
    \n更糟糕的是，有向图`rdg`包含数量非常多的优超回路。⁶\n\n**清单13.8** 检查优超回路\n\n```python\n>>> rdg.computeChordlessCircuits()\n\
    >>> rdg.showChordlessCircuits()\n```\n\n```\n*---- Chordless circuits ----*\n\
