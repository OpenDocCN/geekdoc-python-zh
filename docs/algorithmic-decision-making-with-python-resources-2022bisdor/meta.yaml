    # Weight distributions for E(W_i)=0.5


    ![](img/16b49f4bd7a0e5e8eab9001001a6dc21_274_0.png)


    Fig. 18.1 Four models of uncertain criteria significance weights


    numerical significance weights: *uniform*, *triangular*, and two models of *Beta*
    laws, one more widespread and, the other, more concentrated.


    When considering, for instance, that the potential range of a significance weight
    is distributed between 0 and two times its mean value, we obtain the following
    random variates (Bisdorff 2020):


    +   - A continuous *uniform* distribution on the range 0 to $2E(W_j)$. Thus, $W_j
    \leadsto U(0, 2E(W_j))$ and $V(W_j) = 1/3(E(W_j))^2$.

    - A symmetric *beta* distribution with, for instance, parameters $\alpha = 2$
    and $\beta = 2$. Thus, $W_i \leadsto Beta(2, 2) \times 2E(W_j)$ and $V(W_j) =
    1/5(E(W_j))^2$.

    - A symmetric *triangular* distribution on the same range with mode $E(W_j)$.
    Thus $W_j \leadsto Tr(0, 2E(W_j), E(W_j))$ with $V(W_j) = 1/6(E(W_j))^2$.

    - A narrower *beta* distribution with, for instance, parameters $\alpha = 4$ and
    $\beta = 4$. Thus $W_j \leadsto Beta(4, 4) \times 2E(W_j)$ and $V(W_j) = 1/9(E(W_j))^2$.


    It is worthwhile noticing in Fig. 18.1 that these four uncertainty models all
    admit the same expected value, $E(W_j)$, however, with a respective variance which
    goes decreasing from 1/3 to 1/9 of the square of $E(W_j)$ (Bisdorff 2014).'
