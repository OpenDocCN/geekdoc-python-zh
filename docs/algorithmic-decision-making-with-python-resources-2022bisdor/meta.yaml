    12 ''edges'', ''prueferCode'',

    13 ''size'', ''gamma'']

    14 *---- RandomTree specific data ----*

    15 Pruefer code : [''v3'',''v8'',''v8'',''v3'',''v7'',''v6'',''v7'']

    ```'
