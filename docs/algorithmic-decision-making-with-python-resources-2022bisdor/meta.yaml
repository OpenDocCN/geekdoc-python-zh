    The KEMENY and SLATER ranking rules are furthermore computationally difficult
    problems and effective ranking results are only computable for tiny outranking
    digraphs (<20 objects) (see Eq. 8.1 on page 104).


    More computationally efficient ranking heuristics, like the COPELAND and NETFLOWS
    rules, are therefore needed in practice. Let us finally, after these ranking-by-scoring
    strategies, also present two popular ranking-by-choosing rules.


    # 8.6 The KOHLER Ranking-by-Choosing Rule


    Algorithm 8.3 The KOHLER ranking-by-choosing rule (Kohler 1978)


    in : bipolar-valued digraph G(X, ≳),

    out : linear ranking of the set X of decision actions.


    At step i (i goes from 1 to n) do the following:


    +   1. Compute for each row of the bipolar-valued strict outranking relation table
    (see Listing 8.1 on page 98) the smallest value;

    2. Select the row where this minimum is maximal. Ties are resolved in lexicographic
    order;

    3. Put the selected decision alternative at rank i;

    4. Delete the corresponding row and column from the relation table and restart
    until the table is empty.


    Listing 8.15 Computing a KOHLER ranking


    ```

    1 >>> from linearOrders import KohlerRanking

    2 >>> kocd = KohlerRanking(gcd)

    3 >>> kocd.showRanking()

    4 [''a5'',''a7'',''a6'',''a3'',''a9'',''a8'',''a4'',''a1'',''a2'']

    5 >>> corr = gcd.computeOrdinalCorrelation(kocd)

    6 >>> gcd.showCorrelation(corr)

    7 Correlation indexes:

    8 Extended Kendall tau : +0.747

    9 Epistemic determination : 0.230

    10 Bipolar-valued equivalence : +0.172

    ```


    With this min-max lexicographic ranking-by-choosing strategy, we obtain a correlation
    result (+0.747) that is until now clearly the nearest to an optimal'
- md: "## 8.7 The RANKEDPAIRS Ranking Rule\n\nN. Tideman's ranking-by-choosing heuristic,\
    \ the RANKEDPAIRS rule, working best this time on the non-strict outranking digraph\
    \ g, is based on a prudent incremental construction of linear orders that avoids\
    \ on the fly any cycling outranking situations (Tideman 1987).\n\n**Algorithm\
    \ 8.5 The RANKEDPAIRS ranking rule**\n*in* : bipolar-valued digraph G(X, ≳).\n\
    *out* : linear ranking of the set X of decision actions.\n1. Rank the ordered\
    \ pairs (x, y) of alternatives in decreasing order of r(x ≳ y) + r(y ≳ x);\n2.\
    \ Consider the pairs in that order (ties are resolved by a lexicographic rule):\n\
    \   - if the next pair does not create a circuit with the pairs already blocked,\
    \ block this pair;\n   - if the next pair creates a circuit with the already blocked\
    \ pairs, skip it.\n\nWith our didactic outranking digraph g, we get the following\
    \ result.\n\n```\nListing 8.17 Computing a RANKEDPAIRS ranking\n>>> from linearOrders\
    \ import RankedPairsRanking\n>>> rp = RankedPairsRanking(g)\n>>> rp.showRanking()\n\
    ['a5', 'a6', 'a7', 'a3', 'a8', 'a9', 'a4', 'a1', 'a2']\n```\n\nThe RANKEDPAIRS\
    \ rule renders in our example here luckily one of the two optimal KEMENY ranking,\
    \ as we may verify below.\n\n```\n>>> ke.maximalRankings\n[['a5', 'a6', 'a7',\
    \ 'a3', 'a8', 'a9', 'a4', 'a1', 'a2'],\n ['a5', 'a6', 'a7', 'a3', 'a9', 'a4',\
    \ 'a1', 'a8', 'a2']]\n>>> corr = g.computeOrdinalCorrelation(rp)\n>>> g.showCorrelation(corr)\n\
    Correlation indexes:\n  Extended Kendall tau       : +0.779\n  Epistemic determination\
    \    :  0.230\n  Bipolar-valued equivalence : +0.179\n```\n\nSimilar to KOHLER's\
    \ rule, the RANKEDPAIRS rule has also a prudent dual version, the Dias-Lamboray\
    \ ordering-by-choosing rule, which produces, when working this time on the dual\
    \ outranking digraph -g a similar ranking result (see Dias and Lamboray 2010;\
    \ Lamboray 2009).\n\nBesides of not providing a unique linear ranking, the ranking-by-choosing\
    \ rules, as well as their duals, the ordering-by-choosing rules, are unfortunately\
    \ not scalable to larger outranking digraphs (of orders > 100). For such bigger\
    \ outranking digraphs, with several hundred or thousands of alternatives, only\
    \ the COPELAND and the NETFLOWS ranking-by-scoring rules, with a polynomial complexity\
    \ of O(n²), where $n$ is the order of the outranking digraph, remain in fact tractable.\
    \ Furthermore, as computing the COPELAND and NETFLOWS scores may be done separately\
    \ per alternative, the latter ranking rules can right away be processed in parallel\
    \ when multiprocessing resources are available.\n\nThe physical necessity to write\
    \ down a list of items in a linear sequence renders the ranking decision problem\
    \ very important in practice. However, a relative rating of such items into performance\
    \ quantiles classes would be, from the very preference modelling perspective,\
    \ more expressive and faithful. This is the subject of the following Chap. 9.\n\
    \n# References\n\nArrow KJ, Raynaud H (1986) Social choice and multicriterion\
    \ decision-making. The MIT Press, Cambridge\n\nBisdorff R (2010) Enumerating chordless\
    \ circuits in directed graphs. In: ORBEL24-2010, 24th annual conference of the\
    \ Belgian Operational Research Society (ORBEL aka Sogesci-B.V.W.B.), January 28–29,\
    \ Liège (BE), Université de Liège (BE), pp 1–12. http://hdl.handle.net/10993/23926\n\
    \nBisdorff R (2012) On measuring and testing the ordinal correlation between bipolar\
