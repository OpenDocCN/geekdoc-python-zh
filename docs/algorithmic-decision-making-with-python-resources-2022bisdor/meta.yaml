  md: 'Each criterion $j$ in $F$ contributes the random significance $W_j$ of his
    ‘at least as well evaluated as’ characteristic $r(x \succcurlyeq_j y)$ to the
    global characteristic $\tilde{r}(x \succcurlyeq y)$ in the following way:


    $$\tilde{r}(x \succcurlyeq y) = \sum_{j \in F} W_j \times r(x \succcurlyeq_j y)).
    \quad (18.2)$$


    Thus, $\tilde{r}(x \succcurlyeq y)$ becomes a simple sum of positive or negative
    independent random variables with known means and variances where $\tilde{r}(x
    \succcurlyeq y) > 0$ signifies $x$ is globally at least as well evaluated as $y$,
    $\tilde{r}(x \succcurlyeq y) < 0$ signifies that $x$ is not globally at least
    as well evaluated as $y$, and $\tilde{r}(x \succcurlyeq y) = 0$ signifies that
    it is unclear whether $x$ is globally at least as well evaluated as $y$.


    From the *Central Limit Theorem* (CLT), we know that such a sum of random variables
    leads, with $m$ getting large, to a Gaussian distribution $Y$ with


    $$E(Y) = \sum_{j \in F} \left( E(W_j) \times r(x \succcurlyeq_j y) \right), \text{
    and} \quad (18.3)$$

    $$V(Y) = \sum_{j \in F} \left( V(W_j) \times |r(x \succcurlyeq_j y)| \right).
    \quad (18.4)$$


    And the *likelihood of validation*, respectively, *invalidation*, of an ‘at least
    as well evaluated as’ situation, denoted $lh(x \succcurlyeq y)$, may hence be
    assessed by the probability $P(Y > 0) = 1.0 - P(Y \leqslant 0)$ that $Y$ takes
    a positive value, respectively, $P(Y < 0)$ takes a negative value. In the bipolar-valued
    case here, we can judiciously make usage of the standard Gaussian *error function*,
    i.e. the bipolar $2P(Z) - 1.0$ version of the standard Gaussian $P(Z)$ probability
    distribution function (Press et al. 2007):


    $$lh(x \succcurlyeq y) = -\text{erf}\left(\frac{1}{\sqrt{2}} \frac{-E(Y)}{\sqrt{V(Y)}}\right).
    \quad (18.5)$$


    The range of the bipolar-valued $lh(x \succcurlyeq y)$ hence becomes $[-1.0; +1.0]$,
    and $-lh(x \succcurlyeq y) = lh(x \not\succcurlyeq y)$, i.e. a *negative likelihood*
    represents the likelihood of the correspondent *negated* ‘at least as well evaluated
    as’ situation. A likelihood of $+1.0$ (respectively, $-1.0$) means the corresponding
    preferential situation appears *certainly* validated (respectively, invalidated).


    *Example 18.1* Let $x$ and $y$ be evaluated with respect to 7 equi-significant
    criteria; four criteria positively support that $x$ is *at least as well assessed
    as* $y$ and three criteria support that $x$ is *not at least as well evaluated
    as* $y$. Suppose $E(W_j) = w$ for $j = 1, \ldots, 7$ and $W_j \leadsto Tr(0, 2w,
    w)$ for $j = 1, \ldots, 7$. The expected value of the global ‘at least as well
    evaluated as’ characteristic value becomes $E(\tilde{r}(x \succcurlyeq y)) = 4w
    - 3w = w$ with a variance $V(\tilde{r}(x \succcurlyeq y)) = 7\frac{1}{6}w^2$.


    If $w = 1$, $E(\tilde{r}(x \succcurlyeq y)) = 1$ and $sd(\tilde{r}(x \succcurlyeq
    y)) = 1.08$. By the CLT, the bipolar likelihood of the *at least as well evaluated
    as* situation becomes $lh(x \succcurlyeq y) = 0.66$.'
