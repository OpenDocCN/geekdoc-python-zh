    # 8.6 The KOHLER Ranking-by-Choosing Rule


    Algorithm 8.3 The KOHLER ranking-by-choosing rule (Kohler 1978)


    in : bipolar-valued digraph G(X, ≳),

    out : linear ranking of the set X of decision actions.


    At step i (i goes from 1 to n) do the following:


    +   1. Compute for each row of the bipolar-valued strict outranking relation table
    (see Listing 8.1 on page 98) the smallest value;

    2. Select the row where this minimum is maximal. Ties are resolved in lexicographic
    order;

    3. Put the selected decision alternative at rank i;

    4. Delete the corresponding row and column from the relation table and restart
    until the table is empty.


