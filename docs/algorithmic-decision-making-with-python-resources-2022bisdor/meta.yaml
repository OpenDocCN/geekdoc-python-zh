    \ import LinearVotingProfile\n>>> lpv = LinearVotingProfile('tutorialLinearVotingProfile1')\n\
    ```\n\n## 7.2 Computing the Winner\n\nThe `computeUninominalVotes()` and the `computeSimpleMajorityWinner()`\
    \ methods compute *uninominal votes*, i.e. how many times a candidate was ranked\
    \ first, and who is consequently the *simple majority* (plurality) winner(s) in\
    \ this election.\n\n```python\n>>> lvp.computeUninominalVotes()\n{'c1': 6, 'c2':\
    \ 2, 'c3': 7}\n>>> lvp.computeSimpleMajorityWinner()\n['c3']\n```\n\nAs we observe\
    \ no absolute majority (8/15) of votes for any one of the three candidates, one\
    \ may look, with the `computeInstantRunoffWinner()` method, for the *instant runoff*\
    \ winner instead (Bisdorff 2020a).\n\n### Listing 7.3 Example instant run off\
    \ winner\n\n```python\n>>> lvp.computeInstantRunoffWinner(Comments=True)\nHalf\
    \ of the Votes = 7.50\n==> stage = 1\n    remaining candidates ['c1', 'c2', 'c3']\n\
    \    uninominal votes {'c1': 6, 'c2': 2, 'c3': 7}\n    minimal number of votes\
    \ = 2\n    maximal number of votes = 7\n    candidate to remove = c2\n    remaining\
    \ candidates = ['c1', 'c3']\n==> stage = 2\n    remaining candidates ['c1', 'c3']\n\
    \    uninominal votes {'c1': 8, 'c3': 7}\n    minimal number of votes = 7\n  \
    \  maximal number of votes = 8\n    candidate c1 obtains an absolute majority\n\
    Instant run off winner: ['c1']\n```\n\nIn Listing 7.3 no candidate obtains at\
    \ stage 1 an absolute majority of votes. Candidate c2 obtains the minimal number\
    \ of votes (2/15) and is, hence, eliminated. At stage 2, candidate c1 eventually\
    \ obtains an absolute majority of the votes (8/15) and is hence elected.\n\nOne\
    \ may also follow the *Chevalier de Borda*'s advice and, after a *rank analysis*\
    \ of the linear ballots, compute the BORDA score—the average rank—of each candidate\
    \ and hence determine the BORDA winner(s) (de Borda 1781).\n\n### Listing 7.4\
    \ Example of BORDA rank scores\n\n```python\n>>> lvp.computeRankAnalysis()\n{'c1':\
    \ [6, 9, 0], 'c2': [2, 5, 8], 'c3': [7, 1, 7]}\n>>> v.computeBordaScores()\nOrderedDict([\n\
    \    ('c1', {'BordaScore': 24, 'averageBordaScore': 1.6}),\n    ('c3', {'BordaScore':\
    \ 30, 'averageBordaScore': 2.0}),\n    ('c2', {'BordaScore': 36, 'averageBordaScore':\
    \ 2.4}) ])\n>>> lvp.computeBordaWinners()\n['c1']\n```\n\nIn Listing 7.4, Candidate\
    \ c1 obtains the minimal BORDA score, followed by candidate c3 and finally candidate\
    \ c2. The corresponding BORDA rank analysis table may be printed out with the\
    \ showRankAnalysisTable() method.\n\n### Listing 7.5 Rank analysis example with\
    \ BORDA scores\n\n```python\n>>> lvp.showRankAnalysisTable()\n*---- Borda rank\
    \ analysis tableau ----*\ncandi- | alternative-to-rank | Borda\ndates | 1 2 3\
    \ | score average\n------|---------------------|-----------------\n'c1' | 6 9\
    \ 0 | 24/15 1.60\n'c3' | 7 1 7 | 30/15 2.00\n'c2' | 2 5 8 | 36/15 2.40\n```\n\n\
    In our randomly generated election results, we are lucky: Candidate c1 is both\
    \ the instant runoff winner and the BORDA winner (see Listings 7.3 on the previous\
    \ page and 7.4). However, one could also follow the Marquis de Condorcet's advice,\
    \ and compute the majority margins obtained by voting for each individual pair\
    \ of candidates (de Caritat, Marquis de Condorcet 1784).\n\n## 7.3 The Majority\
    \ Margins Digraph\n\nCandidate c1, for instance, is ranked four times before and\
    \ once behind candidate c2 (see Listing 7.2 on page 84). Hence, due to the voters'\
    \ weights, the corresponding majority margin M(c1, c2) amounts to (3 + 1 + 5 +\
    \ 4) - (2) = +11. These pairwise majority margins define on the set of candidates\
    \ what we call a majority margins digraph. The MajorityMarginsDigraph class is\
    \ handling such kind of digraphs.\n\n### Listing 7.6 Example of *Majority Margins*\
    \ digraph\n\n```python\n>>> from votingProfiles import MajorityMarginsDigraph\n\
    >>> mmdg = MajorityMarginsDigraph(lvp,\n... IntegerValuation=True)\n>>> mmdg\n\
    *------- Digraph instance description -------*\nInstance class : MajorityMarginsDigraph\n\
    Instance name : rel_randomLinearVotingProfile1\nDigraph Order : 3\nDigraph Size\
    \ : 3\nValuation domain : [-15.00;15.00]\nDeterminateness (%) : 55.56\nAttributes\
    \ : ['name', 'actions', 'voters',\n'ballot', 'valuationdomain',\n'relation', 'order',\n\
    'gamma', 'notGamma']\n>>> mmdg.showAll()\n*----- show detail ---------------*\n\
    ```\n\n```python\nDigraph          : rel_randLinearVotingProfile1\n*----- Candidates\
    \ -----*\n ['c1', 'c2', 'c3']\n*----- Characteristic valuation domain ----*\n\
    \ {'max': Decimal('15.0'),\n  'med': Decimal('0'),\n  'min': Decimal('-15.0'),\n\
    \  'hasIntegerValuation': True}\n*----- majority margins -----*\n     M(x,y) |\
    \  'c1'  'c2'  'c3'\n -----------|-------------------\n      'c1'  |    0    11\
    \     1\n      'c2'  |  -11     0    -1\n      'c3'  |   -1     1     0\n Valuation\
    \ domain: [-15;+15]\n```\n\nNotice in Listing 7.6 Lines 29–31 that, in the case\
    \ of linear voting profiles, majority margins always verify a *zero-sum property*:\
    \ $M(x, y) + M(y, x) = 0$ for all candidates $x$ and $y$. This is not true in\
    \ general for arbitrary voting profiles. The *majority margins* digraph of linear\
    \ voting profiles defines in fact a *weak tournament* and belongs, hence, to the\
    \ class of *self-codual*<sup>1</sup> bipolar-valued digraphs (see Sect. 2.6).\n\
    \nA candidate $x$, showing a positive majority margin $M(x, y)$, is beating candidate\
    \ $y$ with an absolute majority in a pairwise voting. Hence, a candidate showing\
    \ only positive terms in their row in the *majority margins* digraph relation\
    \ table, beats all other candidates with absolute majority of votes. CONDORCET\
    \ recommends to declare this candidate (is always unique, why?) the winner of\
    \ the election. Here we are lucky, it is again candidate c1 who is the CONDORCET\
    \ winner (see Line 29 in Listing 7.6 on the preceding page). This result is confirmed\
    \ below by the computeCondorcetWinners() method.\n\n```python\n>>> mmdg.computeCondorcetWinners()\n\
    ['c1']\n```\n\nBy seeing the majority margins like a *bipolar-valued characteristic\
    \ function* of a global voters' preference relation defined on the set of eligible\
    \ candidates, we may reuse all operational resources of the generic *Digraph*\
    \ class.<sup>2</sup> and especially its *exportGraphViz()* method for visualising\
    \ in Fig. 7.1 on the following page the election result.\n\n> <sup>1</sup> The\
    \ class of self-codual bipolar-valued digraphs consists of all weakly asymmetric\
    \ digraphs, i.e. digraphs containing only asymmetric and/or indeterminate links.\
    \ Limit cases consist of, on the one side, full tournaments with indeterminate\
    \ reflexive links, and, on the other side, fully indeterminate digraphs. In this\
    \ class, the converse (inverse ~) operator is indeed identical to the dual (negation\
    \ −) one.\n<sup>2</sup> See Chap. 2."
