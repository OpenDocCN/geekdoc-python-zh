    'max': Decimal('1.0'),\n'hasIntegerValuation': True, # 表示格式\n}\nrelation = {\n\
    'a1': {'a1':Decimal('-1.0'), 'a2':Decimal('-1.0'),\n'a3':Decimal('1.0'), 'a4':Decimal('-1.0'),\n\
    'a5':Decimal('-1.0'),},\n'a2': {'a1':Decimal('1.0'), 'a2':Decimal('-1.0'),\n'a3':Decimal('-1.0'),\
