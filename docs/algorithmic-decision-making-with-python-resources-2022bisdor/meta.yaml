    \ 'a5' |     1     1     1    -1    -1\n赋值域: [-1;+1]\n>>> dg.showComponents()\n\
    *--- 连通分量 ---*\n1: ['a1', 'a2', 'a3', 'a4', 'a5']\n>>> dg.showNeighborhoods()\n\
    邻域:\n  Gamma     :\n'a1': 入 => {'a2', 'a4', 'a3', 'a5'}, 出 => {'a3'}\n'a2': 入\
    \ => {'a5', 'a4'}, 出 => {'a1', 'a4', 'a5'}\n'a3': 入 => {'a1', 'a4', 'a5'}, 出 =>\
    \ {'a1', 'a4'}\n'a4': 入 => {'a2', 'a3'}, 出 => {'a1', 'a3', 'a2'}\n'a5': 入 => {'a2'},\
