    In Fig. 22.3, we noticed that vertex v2 is actually situated in the centre of
    the tree with a neighbourhood depth of 2. Centres of a graph are the vertices
    with minimal neighbourhood depth. For finding such centre(s), the Graph class
    provides the computeGraphCentres() method (see Line 1 in Listing 22.5). Knowing
    now the centre of graph g, we may draw a correspondingly rooted and oriented tree
    with the exportOrientedTreeGraphViz() method from the TreeGraph class (see Fig.
    22.4).


