    \ [5, 2, 4, 1, 6, 7, 8, 3]\n4 (s4 -> s3) = [4, 2, 8, 3, 1, 5, 6, 7]\n```\n\n`computePermutation()`\
    \ 方法直接执行所有这些步骤：计算传递定向、对其认识论融合进行排名，并提供相应的置换。\n\n```\n>>> g.computePermutation(Comments=True)\n\
