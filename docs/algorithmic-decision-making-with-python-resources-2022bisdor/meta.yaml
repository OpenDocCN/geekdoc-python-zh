    # 21.1 Implementing Simple Graphs


    In the DIGRAPH3 `graphs` module, the root `Graph` class provides a generic simple
    graph model, without loops and multiple links. A given object of this `Graph`
    type contains at least the following attributes:


    +   1. name: usually the name of the stored instance

    2. vertices: a dictionary with name and shortName attributes

    3. order: the number of vertices

    4. valuationDomain: a dictionary with three entries: the minimum (-1 means certainly
    no link), the median (0 means missing information), and the maximum characteristic
    value (+1 means certainly a link)

    5. edges: a dictionary with frozensets of pairs of vertices as keys carrying a
    characteristic value in the range of the previous valuation domain


