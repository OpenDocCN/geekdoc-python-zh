    fees as well as her living costs during her studies.

    Alice has already identified 10 potential study programs.

    In Table 12.1 on the next page we notice that Alice considers three *Graduate
    Interpreter* studies (8 or 9 Semesters), respectively, in Köln, in Saarbrücken
    or in Heidelberg; and five *Qualified translator* studies (8 or 9 Semesters),
    respectively, in'
