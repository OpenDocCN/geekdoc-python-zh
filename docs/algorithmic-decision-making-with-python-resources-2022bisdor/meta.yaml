  - '[PAGE 14]


    crucial for the success of the decision-making. This is a very critical and essential
    step. Chapters 4, 5 and 12 illustrate and discuss in detail coherent multiple-criteria
    performance tableaux. In order to discover more examples of potential performance
    tableaux, we provide in Chap. 6 random generators for several common kinds of
    performance tableaux.


    Once the multiple-criteria performance tableau is ready, the thrilling step of
    discovering the resulting outranking relation starts. Are there many chordless
    outranking circuits? What is its degree of symmetry? What is its degree of transitivity?
    If the number of potential decision alternatives is small—less than 30—one can
    try, in the case of a selection problem, to compute prekernels in order to find
    potential first- or last-choice decision alternatives? Chapters 4, 12 and 17 are
    illustrating and discussing this challenging computational problem.


    Comparing various ranking rules working on bipolar-valued outranking relations
    constructed from performance tableaux of various kinds, cost-benefit, 3-objectives
    and academic a.-o., has made us confident about the fact that convincing criteria
    for judging the quality of a ranking result may not to be found alone by mathematical
    properties, like KEMENY optimality or CONDORCET consistency. More useful seems
    to be the fair balancing of decision objectives and performance criteria. In this
    respect, it is the NETFLOWS ranking rule which appears to be most effective and
    often gives fairly balanced multiple-criteria rankings. Chapter 8 on ranking rules,
    the ranking and rating case studies of Chaps. 13 and 14, and Chap. 16 on bipolar-valued
    relational equivalence of digraphs illustrate and discuss this important topic.


    The bipolar-valued epistemic logic, in which our decision algorithms are computing
    and expressing their decision solutions, provides effective assistance for coping
    with missing data and imprecise performance evaluations. Chapters 14 and 16 illustrate
    this advantage. An efficient robustness analysis becomes furthermore available
    for handling, on the one side, uncertain criteria significance weights leading
    in Chap. 18 to α%-confident outranking digraphs. On the other side, Chap. 19 illustrates
    how to compute robust outranking digraphs and decision solutions when solely ordinal
    criteria significance weights are given. In Chap. 20, the same kind of robustness
    analysis proposes strategies for tempering plurality tyranny effects in social
    choice problems by favouring multipartisan candidates, like two-stage elections
    with multipartisan primary selection of candidates or bipolar approval-disapproval
    voting systems.


    Noticing the efficiency of the bipolar-valued epistemic logical framework for
    handling outranking digraphs, we could not resist making in Chaps. 21 and 22 an
    excursion into the domain of simple undirected graphs and tree graphs. The beautiful
    book *Algorithmic Graph Theory and Perfect Graphs* by M. Ch. Golumbic gave eventually
    the opportunity to tackle in the last chapter some famous classes of BERGE graphs.'
  - '[PAGE 15]


    It is my hope that the reader, by going on, will find the same astonishment and
    enchantment as I experienced when discovering the simplicity, efficiency and elegance
    of handling bipolar-valued outranking digraphs and graphs with Python programming
    resources. Extending the bipolar-valued epistemic logical framework to other computational
    science domains will prove valuable, I am sure, for many future scientific works.'
