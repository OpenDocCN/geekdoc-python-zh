    7.5 On Generating Realistic Random Linear Voting Profiles .......................
    91


    **Abstract** This chapter is more specifically devoted to handling linear voting
    profiles and computing the winner of such election results. By following CONDORCET''s
    recipe, we consider pairwise comparisons of election candidates and balance the
    number of times the first beats the second against the number of times the second
    beats the first. Thus we obtain the majority margins digraph, in fact a bipolar-valued
    digraph. When the voters express contradictory linear voting profiles one naturally
    observes cyclic social preferences without seeing any paradox in this situation.
    Finally we present a more politically realistic generator for random linear voting
    profiles which takes into account pre-election polls.


    # 7.1 Linear Voting Profiles


    The `votingProfiles` module provides resources like the `LinearVotingProfile`
    class for handling election results (Bisdorff 2020a). To illustrates these resources
    let us consider elections involving a set of eligible candidates and a set of
    weighted voters, who express their voting preferences in a complete linear ranking
    (without ties) of the eligible candidates. The module provides a `RandomLinearVotingProfile`
    class for generating random instances of such `LinearVotingProfile` type. In the
    interactive Python session shown in Listing 7.1, a random linear voting profile
    is generated, for instance, for the election of three candidates by five voters:'
