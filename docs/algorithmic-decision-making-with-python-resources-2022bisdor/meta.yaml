    # 16.4 Fitness of Ranking Heuristics


    The NETFLOWS ranking of the movies shown in the heatmap view in Fig. 16.2 on page
    213 is based on the bipolar-valued outranking digraph modelling the pairwise global
    “rated at least as well as” relation among the 25 movies from the performance
    tableau instance gt07.


    **Listing 16.8** The bipolar-valued outranking digraph of the star-rated movies


    ```

