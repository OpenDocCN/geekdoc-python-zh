  md: '# 17.2 Initial and Terminal Kernels


    In an oriented graph context, the internal stability condition of the kernel concept
    remains untouched; however, the external stability condition gets indeed split
    up by the orientation into two lateral cases:


    +   1. A *dominant* stability condition, where each non selected node is dominated
    by at least one member of the kernel

    2. An *absorbent* stability condition, where each non-selected node is absorbed
    by at least one member of the kernel


    A both internally stable **and** dominant, respectively, absorbent choice is called
    a dominant or *initial*, respectively, an absorbent or *terminal* kernel. From
    a topological perspective, the initial kernel concept looks from the outside of
    the digraph into its interior, whereas the terminal kernel looks from the interior
    of a digraph towards its outside. From an algebraic perspective, the initial kernel
    is a prefix operand, and the terminal kernel is a postfix operand in the kernel
    equation systems (see Sect. 17.6 on page 242).


    Furthermore, as the kernel concept involves conjointly a positive logical refutation
    (the internal stability) and a positive logical affirmation (the external stability),
    it appeared rather quickly necessary in our operational developments to adopt
    a bipolar characteristic [-1.0, 1.0] valuation domain, modelling logical negation
    by a change of numerical sign and including explicitly a third median value (0.0),
    expressing logical *indeterminateness*—neither positive nor negative (Bisdorff
    2000, 2002, 2004).


    In such a bipolar-valued context, we call *prekernel* a choice which is *externally
    stable* and for which the internal stability condition is *valid* or *indeterminate*.
    We say that the independence condition is in this case only *weakly validated*.
    Notice that all kernels are hence prekernels, but not vice versa.


    In graphs or symmetric digraphs, where there is essentially no apparent *laterality*,
    all prekernels are initial and terminal at the same time. A universal example
    is given by the *complete* digraph.


    **Listing 17.3** The prekernels of a complete digraph


    ```

    1 >>> from digraphs import CompleteDigraph

    2 >>> u = CompleteDigraph(order=5)

    3 >>> u

