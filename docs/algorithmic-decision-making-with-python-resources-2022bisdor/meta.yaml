    This monograph should provide the reader with a self-contained series of tutorials
    which explain how to solve multiple-criteria selection, as well as ranking or
    rating decision problems. If successful in this aim, the curious reader will effectively
    install the DIGRAPH3 programming resources on their laptop and try out and redo
    for themselves the proposed computations.


    The material in this book is valuable for master''s students and doctoral candidates
