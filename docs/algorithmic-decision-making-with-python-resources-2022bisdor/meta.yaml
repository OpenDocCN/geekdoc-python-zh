    We have noticed in Chap. 8 that there is not a unique optimal rule for ranking
    from a given outranking digraph, like digraph lqr here. The COPELAND rule, for
    instance, has the advantage of being CONDORCET consistent, i.e. when the outranking
    digraph models a linear ranking, this ranking will necessarily be the result of
    the COPELAND rule. When this is not the case, and especially when the outranking
    digraph shows chordless circuits, all potential ranking rules may give very divergent
    ranking results and sometimes substantially divergent rating-by-ranking results.'
