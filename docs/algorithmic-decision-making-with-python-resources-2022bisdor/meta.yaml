    对称闭包和传递闭包，默认是原地操作方法，同样可用（见图 2.5）。请注意，在执行这些会不可逆地修改原始 `rdg` 对象的原地操作之前，最好先备份 `rdg`。最简单的存储方法，即通用的\
    \ `Digraph.save()` 方法，会将有向图对象的字符串表示形式的 Python 内容写入一个命名文件中（见第 1.3 节）。\n\n**清单 2.9**\
    \ 对称闭包与传递闭包\n\n```\n>>> rdg.save('tutRandValDigraph')\n>>> rdg.closeSymmetric(InSite=True)\n\
    >>> rdg.closeTransitive(InSite=True)\n>>> rdg.exportGraphViz('symTransClosure')\n\
    ```\n\n`closeSymmetric()` 方法（见清单 2.9 第2行），其复杂度为 $O(n^2)$，其中 $n$ 表示有向图的阶，一方面，它通过执行成对关系的析取，将所有检测到的单向成对链接更改为双向链接。另一方面，`closeTransitive()`\
    \ 方法（见图 2.5 教程随机赋值有向图 rdg 的对称闭包和传递闭包\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_53_0.png)\n\
