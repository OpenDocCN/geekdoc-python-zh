    # 6.3 Random Cost-Benefit Performance Tableaux


    The `randomPerfTabs` module provides a `RandomCBPerformanceTableau` class for
    generating *Costs* versus *Benefits* organised performance tableaux. The random
    generator is following by default the directives below:


    +   - Three types of decision actions are distinguished: *cheap*, *neutral*, and
    *expensive* ones with an equal proportion of 1/3. Two types of weighted criteria
    are also distinguished: *Costs* criteria to be *minimised*, and *Benefits* criteria
    to be *maximised*, in the proportions 1/3, respectively, 2/3;

    - Random performances on each type of criteria are drawn, either from an ordinal
    scale [0; 10], or from a cardinal scale [0.0; 100.0], following a parametric triangular
    law of mode: 30% performance for cheap, 50% for neutral, and 70% performance for
    expensive decision actions, with constant probability repartition 0.5 on each
    side of the respective mode;

    - Costs criteria use mostly cardinal scales (3/4), whereas Benefits criteria use
    mostly ordinal scales (2/3);

    - The sum of weights of the Costs criteria equals by default the sum of weights
    of the Benefits criteria: `weighDistribution = ''equiobjectives''`;

    - On cardinal criteria, both of cost or of benefit type, following constant performance
    discrimination quantiles are instantiated: 5% indifferent situations, 90% preference
    situations, and 5% considerable performance difference situations.


    # Parameters


    +   - If `numberOfActions == None`, a uniform random number between 10 and 31
    of *cheap*, *neutral* or *advantageous* actions (equal 1/3 probability each type)
    actions is instantiated. Minimal number of decision actions required is 3;

    - If `numberOfCriteria == None`, a uniform random number between 5 and 21 of cost
    or benefit criteria (1/3, respectively, 2/3 probability) is instantiated;

    - `weightDistribution := ''equisignificant''` (default) | `''equiobjectives''`
    | `''fixed''` | `''random''`;

    - default `weightScale` for `''random''` weight distribution is 1 - `numberOfCriteria`;

    - All *cardinal* criteria are evaluated with decimals between 0.0 and 100.0 whereas
    *ordinal* criteria are evaluated with integers between 0 and 10.

    - `commonThresholds` is obsolete. Preference discrimination is specified as *percentiles*
    of concerned performance differences (see below).

    - `commonPercentiles := {''ind'': 5, ''pref'': 10, ''veto'': 95}` are expressed
    in percents (reversed for vetoes), and only concern cardinal criteria.

    - `missingDataProbability := 0.0 <= float <= 1.0`; probability of missing performance
    evaluation on a criterion for an alternative (default 0.025).

    - `NA := Decimal` (default = -999); missing data symbol.'
