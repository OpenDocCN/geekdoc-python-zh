    # 20.3 Pairwise Comparison of Approval–Disapproval Votes


    The approval votes of each voter define now on the set of eligible candidates
    three ordered categories: his approved (+1), his ignored (0), and his disapproved
    (−1) ones. Within each of these three categories, we consider the voter’s actual
    preferences as *not communicated*, i.e. as missing data. This gives for each voter
    a partially determined strict order which we find in the `ballot` attribute.


    ```

    1 >>> bavp.ballot[''v001''][''c12'']

    2 {''c02'': Decimal(''1''), ''c11'': Decimal(''1''),

    3 ''c14'': Decimal(''1''), ''c04'': Decimal(''0''),

    4 ''c06'': Decimal(''1''), ''c05'': Decimal(''1''),

    5 ''c12'': Decimal(''0''), ''c13'': Decimal(''0''),

    6 ''c15'': Decimal(''1''), ''c01'': Decimal(''1''),

    7 ''c08'': Decimal(''1''), ''c07'': Decimal(''1''),

    8 ''c09'': Decimal(''0''), ''c03'': Decimal(''1''),

    9 ''c10'': Decimal(''0'')}

    ```


    For voter v001, for instance, the best approved Candidate c12 is strictly preferred
    to Candidates: c01, c02, c03, c05, c06, c07, c08, c11, c14, and c15. No candidate
    is preferred to c12, and the comparison with c04, c09, c10, and c13 is not communicated,
    hence indeterminate. Mind by the way that the reflexive comparison of c12 with
    itself is, as usual, ignored, i.e. indeterminate. Each voter v defines thus a
    partially determined transitive strict preference relation denoted ≻v on the eligible
    candidates.


    For each pair of eligible candidates, we aggregate the previous individual voter’s
    preferences into a truth characteristic of the statement: ‘Candidate x is *better
    approved than* Candidate y’, denoted r(x ≻ y):


    $$r(x \succ y) = \sum_{\mathrm{v}} (r(x \succ_{\mathrm{v}} y)) .$$'
