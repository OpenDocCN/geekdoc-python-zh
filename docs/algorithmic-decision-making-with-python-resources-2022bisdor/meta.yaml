  md: 'Computing the *dual*, respectively, the *converse* of a digraph, may also be
    done with prefixing the `__neg__` (`-`) or the `__invert__` (`~`) operator. The
    *codual* of a Digraph object can, hence, as well be computed with a *composition*
    (in either order) of both operations (see Line 3 below).


