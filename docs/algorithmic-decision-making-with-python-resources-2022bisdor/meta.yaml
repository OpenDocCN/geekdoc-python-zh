    graph, g and its dual -g are both transitively orientable, i.e. comparability
    graphs (Golumbic 2004). With the isComparabilityGraph() test, we may easily check
    this fact. This method proceeds indeed by trying to construct a transitive neighbourhood
    decomposition of a given graph instance and, if successful, stores the resulting
    edge orientations into an edgeOrientations attribute (Golumbic 2004, p.129-132).


    ```

