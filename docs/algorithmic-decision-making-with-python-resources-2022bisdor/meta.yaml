  mdcn: "有趣的是，注意到上面第8行中，RUBIS的*首选推荐*实际上由之前提到的弱孔多塞获胜者集合组成：A、C和D（见第46页图4.2）。在相应的预核特征向量（见第3、15行及第17.6节）中，该向量代表了每个备选方案确实被纳入或排除出此推荐的双极可信度，我们发现备选方案D是唯一被正面验证的，而两个极端方案——A（最昂贵的）和C（最便宜的）——仍处于不确定状态（见Bisdorff\
