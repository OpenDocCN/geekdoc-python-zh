    12 Valuation domain: [-1.0; 1.0]

    ```


    The BipolarOutrankingDigraph class constructor computes from the given performance
    tableau pt the characteristic value $r(x \succsim y)$ of a *pairwise outranking
    relation* $x \succsim y$ in a default *valuation domain* $[-1.0, +1.0]$ with the
    *median* value 0.0 acting as *indeterminate* characteristic value.

    The semantics of $r(x \succsim y)$ are the following:


    # Definition 3.1 (Semantics of the Outranking Characteristic Function)


    +   a. When $r(x \succsim y) > 0.0$, it is **True** that $x$ outranks $y$, i.e.
    alternative $x$ is *''at least as well evaluated as''* alternative $y$ on a majority
    of criteria significance **and** there is no considerable negative performance
    difference observed in disfavour of $x$.

    b. When $r(x \succsim y) < 0.0$, it is **False** that $x$ outranks $y$, i.e. alternative
    $x$ is **only** *''evaluated at least as well as''* alternative $y$ on a minority
    of criteria significance **and** there is no considerable positive performance
    difference observed in favour of $x$.

    c. When $r(x \succsim y) = 0.0$, it is **indeterminate** whether $x$ outranks
    $y$ or not.


    # 3.3 Pairwise Comparisons


    From above given semantics, we notice in Line 5 in Listing 3.5 on the preceding
    page that a1 outranks a2: $r(a1 \succsim a2) + 0.71$, but not a7: $r(a1 \succsim
    a7) = 0.0)$. In order to comprehend the characteristic values shown in the outranking
    relation table, we can inspect with the `showPairwiseComparison()` method the
    details of the pairwise multiple-criteria comparison between, for instance, alternatives
    a1 and a2.


    Listing 3.6 Inspecting a pairwise multiple-criteria comparison


