    ## 8.5 SLATER Rankings


    The SLATER ranking rule is identical to the KEMENY rule, but it is working, instead,
    on the CONDORCET—*median cut polarised*—digraph gcd (Slater 1961). The SLATER
    rule is again *invariant* under the codual transform and the SlaterRanking class
    from the linearOrders module delivers hence indifferently on g or gcd the following
    results:


    Fig. 8.4 *Epistemic disjunction of optimal SLATER rankings.* What precise SLATER
    ranking result should we hence adopt?


    ![](img/16b49f4bd7a0e5e8eab9001001a6dc21_137_0.png)


    **Listing 8.13** Computing a SLATER ranking


    ```

    >>> from linearOrders import SlaterRanking

    >>> sl = SlaterRanking(gcd,orderLimit=9)

    >>> sl.slaterRanking

    [''a5'',''a6'',''a4'',''a1'',''a3'',''a7'',''a8'',''a9'',''a2'']

    >>> corr = gcd.computeRankingCorrelation(sl.slaterRanking)

    >>> sl.showCorrelation(corr)

    Correlation indexes:

    Extended Kendall tau : +0.676

    Epistemic determination : 0.230

    Bipolar-valued equivalence : +0.156

    >>> len(sl.maximalRankings)

    7

    ```


    We notice in Listing 8.13 above that the SLATER ranking shown in Line 4 represents
    a rather good fit (+0.676), slightly better apparently than the NETFLOWS ranking
    result (+0.638). However, there are in fact 7 such optimal SLATER rankings (see
    Line 12). The corresponding epistemic disjunction, again with the RankingsFusionDigraph
    class from the transitiveDigraphs module, gives the partial ordering shown in
    Fig. 8.4:


    **Listing 8.14** Computing the epistemic disjunction of optimal SLATER rankings


    ```

    >>> from transitiveDigraphs import RankingsFusionDigraph

    >>> slw = RankingsFusionDigraph(sl,sl.maximalRankings)

    >>> slw.exportGraphViz(fileName=''tutorialSlater'')

    *---- exporting a dot file for GraphViz tools ----*

    Exporting to tutorialSlater.dot

    dot -Grankdir=TB -Tpng tutorialSlater.dot\n -o tutorialSlater.png

    ```


    The KEMENY and SLATER ranking rules are furthermore computationally difficult
    problems and effective ranking results are only computable for tiny outranking
    digraphs (<20 objects) (see Eq. 8.1 on page 104).


    More computationally efficient ranking heuristics, like the COPELAND and NETFLOWS
    rules, are therefore needed in practice. Let us finally, after these ranking-by-scoring
    strategies, also present two popular ranking-by-choosing rules.


    ## 8.6 The KOHLER Ranking-by-Choosing Rule


    Algorithm 8.3 The KOHLER ranking-by-choosing rule (Kohler 1978)


    in : bipolar-valued digraph G(X, ≳),

    out : linear ranking of the set X of decision actions.


    At step i (i goes from 1 to n) do the following:


    1.  Compute for each row of the bipolar-valued strict outranking relation table
    (see Listing 8.1 on page 98) the smallest value;

    2.  Select the row where this minimum is maximal. Ties are resolved in lexicographic
    order;

    3.  Put the selected decision alternative at rank i;

    4.  Delete the corresponding row and column from the relation table and restart
    until the table is empty.


    **Listing 8.15** Computing a KOHLER ranking


    ```

    >>> from linearOrders import KohlerRanking

    >>> kocd = KohlerRanking(gcd)

    >>> kocd.showRanking()

    [''a5'',''a7'',''a6'',''a3'',''a9'',''a8'',''a4'',''a1'',''a2'']

    >>> corr = gcd.computeOrdinalCorrelation(kocd)

    >>> gcd.showCorrelation(corr)

    Correlation indexes:

    Extended Kendall tau : +0.747

    Epistemic determination : 0.230

    Bipolar-valued equivalence : +0.172

    ```


    With this min-max lexicographic ranking-by-choosing strategy, we obtain a correlation
    result (+0.747) that is until now clearly the nearest to an optimal'
