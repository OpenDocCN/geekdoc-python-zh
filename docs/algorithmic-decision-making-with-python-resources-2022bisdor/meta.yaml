    2. *Picture and Sound* quality of the TV (to be maximised)

    3. *Maintenance contract* quality of the provider (to be maximised)


    The *Costs* objective is assessed by the price of the TV set (criterion *Pr* to
    be minimised). *Picture* quality (criterion *Pq*), *Sound* quality (criterion
