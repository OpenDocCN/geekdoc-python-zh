    \       'c09': 0.28, 'c04': 0.26, 'c10': 0.24,\n       'c05': 0.20, 'c03': 0.20,\
    \ 'c12': 0.06, }\n```\n\nThe strict outranking digraph ($\\sim (\\neg odg)$) being\
    \ actually *empty*, we obtain a unique *ambiguous* – first as well as last – choice\
    \ recommendation which trivially retains all fifteen candidates (see Listing 20.14\
