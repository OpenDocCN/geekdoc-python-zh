    To appreciate now the ordinal correlations of both the COPELAND and the NETFLOWS
    rankings with the underlying strict outranking relation, it is useful to consider
    the *''optimal''* KEMENY and SLATER ranking rules.


    # 8.4 KEMENY Rankings


    A KEMENY ranking $k$ is a linear ranking without ties of the set of $n$ decision
    alternatives $X$ which is *closest*, in the sense of the ordinal KENDALL distance,${}^5$
    to the given valued outranking digraph $\mathfrak{g}$ (Kemeny 1959).


    Formally:


    ```

    $$k = \text{argmax}_{p \in \mathscr{P}(X)} \sum_{i \neq j} (r(p[i] \succcurlyeq
    p[j]) - r(p[j] \succcurlyeq p[i])), \quad (8.1)$$

    ```


    where $\mathscr{P}(X)$ denotes the set of all permutations of $X$ and $i, j =
    0, \dots n$.


    > ${}^5$ See Chap. 16 and Bisdorff (2012).'
