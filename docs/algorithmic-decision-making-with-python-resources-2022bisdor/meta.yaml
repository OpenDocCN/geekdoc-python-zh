- md: "## 22.1 Generating Random Tree Graphs\n\nFig. 22.2 Tree graph instance generated\
    \ with the random PRÜFER code ['v5', 'v7', 'v2', 'v5', 'v3']\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_341_0.png)\n\
    \nDigraph3 (graphviz), R. Bisdorff, 2019\n\n## Listing 22.2 Generating a tree\
    \ graph with a random PRÜFER code\n\n```\n>>> verticesList = ['v1','v2','v3','v4','v5','v6','v7']\n\
    >>> n = len(verticesList)\n>>> from random import seed, choice\n>>> seed(101)\n\
    >>> code = []\n>>> for k in range(n-2):\n...     code.append( choice(verticesList)\
    \ )\n>>> print (code)\n['v5', 'v7', 'v2', 'v5', 'v3']\n>>> rt = RandomTree(prueferCode=code)\n\
    >>> rt\n*------- Graph instance description -------*\nInstance class   : RandomTree\n\
    Instance name    : randomTree\nGraph Order      : 7\nGraph Size       : 6\nValuation\
    \ domain : [-1.00; 1.00]\nAttributes : ['name', 'order', 'vertices',\n       \
    \      'valuationDomain', 'edges',\n             'prueferCode', 'size', 'gamma']\n\
    *---- RandomTree specific data ----*\nPruefer code : ['v5', 'v7', 'v2', 'v5',\
    \ 'v3']\n>>> rt.exportGraphViz('tutPruefTree')\n*---- exporting a dot file for\
    \ GraphViz tools -----------*\nExporting to tutPruefTree.dot\nneato -Tpng tutPruefTree.dot\
    \ -o tutPruefTree.png\n```\n\nFollowing from the bijection between a labelled\
    \ tree and its PRÜFER code, we actually know that there exist $n^{n-2}$ different\
    \ tree graphs with the same $n$ vertices. Given a genuine graph, how can we recognise\
    \ that it is in fact a tree instance?\n\n## 22.2 Recognising Tree Graphs\n\nGiven\
    \ a graph g of order n and size s, the following 5 assertions A1, A2, A3, A4,\
    \ and A5 are all equivalent (see Barthélemy and Guenoche 1991):\n\n- A1: g is\
    \ a tree.\n- A2: g is without (chordless) cycles and n = s + 1.\n- A3: g is connected\
    \ and n = s + 1.\n- A4: Any two vertices of g are always connected by a unique\
    \ path.\n- A5: g is connected and dropping any single edge will always disconnect\
    \ g.\n\nAssertion A3, for instance, gives a simple test for recognising a tree\
    \ graph. In case of a lazy evaluation of the test in Listing 22.3, Line 3 below,\
    \ it is opportune, from a computational complexity perspective, to first check\
    \ the order and size of the graph, before checking its potential connectedness.\
    \ We provide the isTree() method for computing both these tests (see Line 8).\n\
    \n### Listing 22.3 Recognising a tree graph\n\n```\n>>> from graphs import RandomGraph\n\
    >>> g = RandomGraph(order=8,edgeProbability=0.3,seed=62)\n>>> if g.order == (g.size\
    \ +1) and g.isConnected():\n...     print('The graph is a tree ?', True)\n...\
    \ else:\n...     print('The graph is a tree ?',False)\n  The graph is a tree ?\
    \ True\n>>> g.isTree()\n  True\n```\n\nThe random graph of order 8 and edge probability\
    \ 30%, generated with seed 62, is actually a tree graph instance, as confirmed\
    \ by its graphviz drawing shown in Fig. 22.3 on the facing page.\n\n```\n>>> g.exportGraphViz('test62')\n\
    \  *---- exporting a dot file for GraphViz tools ---*\n  Exporting to test62.dot\n\
    \  fdp -Tpng test62.dot -o test62.png\n```\n\nYet, we still have to recover its\
    \ corresponding PRÜFER code. Therefore, we can use the tree2Pruefer() method from\
    \ the TreeGraph class. But, first, the instance class of graph g is changed to\
    \ the TreeGraph type (see Line 2 below).\n\n### Listing 22.4 Computing the PRÜFER\
    \ code of a tree graph instance\n\n```\n>>> from graphs import TreeGraph\n>>>\
    \ g.__class__ = TreeGraph\n>>> g.tree2Pruefer()\n  ['v6', 'v1', 'v2', 'v1', 'v2',\
    \ 'v5']\n```\n\nFig. 22.3 Recognising a tree graph. One may notice that vertex\
    \ v2 is actually situated in the centre of the tree with a neighbourhood depth\
    \ of 2\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_343_0.png)\n\nDigraph3 (graphviz),\
    \ R. Bisdorff, 2019\n\nFig. 22.4 Drawing an oriented tree rooted at its centre\n\
    \n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_343_1.png)\n\nDigraph3 (graphviz)\n\
    R. Bisdorff, 2020\n\nIn Fig. 22.3, we noticed that vertex v2 is actually situated\
    \ in the centre of the tree with a neighbourhood depth of 2. Centres of a graph\
    \ are the vertices with minimal neighbourhood depth. For finding such centre(s),\
    \ the Graph class provides the computeGraphCentres() method (see Line 1 in Listing\
    \ 22.5). Knowing now the centre of graph g, we may draw a correspondingly rooted\
    \ and oriented tree with the exportOrientedTreeGraphViz() method from the TreeGraph\
    \ class (see Fig. 22.4).\n\n### Listing 22.5 Computing the centres of a tree and\
    \ drawing a rooted and oriented tree\n\n```\n>>> g.computeGraphCentres()\n{'v2':\
    \ 2}\n>>> g.exportOrientedTreeGraphViz(\n...     fileName='rootedTree', root='v2')\n\
    *----- exporting a dot file for GraphViz tools\nExporting to rootedTree.dot\n\
    dot -Grankdir=TB -Tpng rootedTree.dot -o rootedTree.png\n```\n\nLet us now turn\
    \ our attention towards a major application of tree graphs, namely spanning trees\
    \ and forests related to graph traversals.\n\n## 22.3 Spanning Trees and Forests\n\
    \nWith the `RandomSpanningTree` class, we may generate, from a given connected\
    \ graph $g$ instance, *uniform* random instances of a spanning tree by using WILSON's\
    \ algorithm (see Listing 22.6 and Fig. 22.5).\n\n### Listing 22.6 Generating uniform\
    \ random spanning trees\n\n```\n>>> from graphs import RandomGraph,\n...     \
    \                RandomSpanningTree\n>>> g = RandomGraph(order=9,\n...       \
    \           edgeProbability=0.4,seed=100)\n>>> spt = RandomSpanningTree(g)\n>>>\
    \ spt\n  *------ Graph instance description ------*\n    Instance class    : RandomSpanningTree\n\
    \    Instance name     : randomGraph_randomSpanningTree\n   Graph Order      \
    \ : 9\n   Graph Size        : 8\n   Valuation domain  : [-1.00; 1.00]\n   Attributes\
    \        : ['name','vertices','order',\n                        'valuationDomain',\n\
    \                        'edges','size','gamma',\n                        'dfs','date',\
    \ 'dfsx',\n                        'prueferCode']\n  *----- RandomTree specific\
    \ data ----*\n    Pruefer code     : ['v7','v9','v5','v1','v8','v4','v9']\n>>>\
    \ spt.exportGraphViz(fileName='randomSpanningTree',\n...                    WithSpanningTree=True)\n\
    \  *----- exporting a dot file for GraphViz tools -----*\n    Exporting to randomSpanningTree.dot\n\
    \    [['v1','v5','v6','v5','v1','v8','v9','v3','v9','v4',\n      'v7','v2','v7','v4','v9','v8','v1']]\n\
    \    neato -Tpng randomSpanningTree.dot\n          -o randomSpanningTree.png\n\
    ```\n\nFig. 22.5 Random spanning tree\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_344_0.png)\n\
    \nDigraph3 (graphviz), R. Bisdorff, 2019\n\nFig. 22.6 Random spanning forest\n\
    \n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_345_0.png)\n\nDigraph3 (graphviz),\
    \ R. Bisdorff, 2019\n\nWILSON's algorithm only works for connected graphs (Wilson\
    \ 1996). More general, and in case of a not connected graph, the RandomSpanningForest\
    \ class generates a not necessarily uniform random instance of a spanning forest—one\
    \ or more random tree graphs—generated from a random depth first search of the\
    \ graph components' traversals (see Listing 22.7 and Fig. 22.6).\n\n### Listing\
    \ 22.7 Computing spanning forests over disconnected graphs\n\n```\n>>> g = RandomGraph(order=15,\n\
    ...                 edgeProbability=0.1, seed=140)\n>>> g.computeComponents()\n\
    [{'v12', 'v01', 'v13'}, {'v02', 'v06'},\n {'v08', 'v03', 'v07'}, {'v15', 'v11',\
    \ 'v10', 'v04', 'v05'},\n {'v09', 'v14'}]\n>>> spf = RandomSpanningForest(g, seed=100)\n\
    >>> spf.exportGraphViz(fileName='spanningForest',\n...                    WithSpanningTree=True)\n\
    \ *---- exporting a dot file for GraphViz tools -----*\n Exporting to spanningForest.dot\n\
    [['v03', 'v07', 'v08', 'v07', 'v03'],\n ['v13', 'v12', 'v13', 'v01', 'v13'],\n\
    \ ['v02', 'v06', 'v02'],\n ['v15', 'v11', 'v04', 'v11', 'v15',\n          'v10',\
    \ 'v05', 'v10', 'v15'],\n ['v09', 'v14', 'v09']]\nneato -Tpng spanningForest.dot\
    \ -o spanningForest.png\n```\n\n## 22.4 Maximum Determined Spanning Forests\n\n\
    In case of valued graphs—supporting weighted edges—we may finally construct a\
    \ *most determined* spanning tree (or forest if not connected) using KRUSKAL's\
    \ greedy minimum spanning tree algorithm on the dual valuation of the graph (Kruskal\
    \ 1956).¹\n\nIn Listing 22.8, we generate, for instance, a randomly valued graph\
    \ with five vertices and seven edges bipolar-valued in [-1.0; 1.0].\n\n### Listing\
    \ 22.8 Generating randomly bipolar-valued graphs\n\n```\n>>> from graphs import\
    \ RandomValuationGraph\n>>> g = RandomValuationGraph(order=5,seed=2)\n>>> g\n\
    \  *------- Graph instance description ------*\n  Instance class    : RandomValuationGraph\n\
    \  Instance name     : randomGraph\n  Graph Order       : 5\n  Graph Size    \
    \    : 7\n  Valuation domain  : [-1.00; 1.00]\n  Attributes        : ['name',\
    \ 'order',\n                      'vertices', 'valuationDomain',\n           \
    \           'edges', 'size', 'gamma']\n```\n\nTo inspect the edges' actual weights,\
    \ we transform in Listing 22.9 the random graph g into a corresponding digraph\
    \ dg and use the showRelationTable() method for printing its symmetric adjacency\
    \ matrix.\n\n### Listing 22.9 Symmetric relation table\n\n```\n>>> dg = g.graph2Digraph()\n\
    >>> dg.showRelationTable()\n  *---- Relation Table ----*\n    S   |  'v1'  'v2'\
    \  'v3'  'v4'  'v5'\n  ------|---------------------------------\n  'v1'  |  0.00\
    \  0.91  0.90 -0.89 -0.83\n  'v2'  |  0.91  0.00  0.67  0.47  0.34\n  'v3'  |\
    \  0.90  0.67  0.00 -0.38  0.21\n  'v4'  | -0.89  0.47 -0.38  0.00  0.21\n  'v5'\
    \  | -0.83  0.34  0.21  0.21  0.00\n  Valuation domain: [-1.00;1.00]\n```\n\n\
    To compute the most determined spanning tree or forest, we can use the Best-DeterminedSpanningForest\
    \ class constructor.\n\n> ¹ KRUSKAL's algorithm is a minimum spanning tree algorithm\
    \ which finds an edge of the least possible weight that connects any two trees\
    \ in the forest."
  mdcn: "## 22.1 生成随机树图\n\n图 22.2 使用随机普吕弗码 ['v5', 'v7', 'v2', 'v5', 'v3'] 生成的树图实例\n\
    \n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_341_0.png)\n\nDigraph3 (graphviz),\
    \ R. Bisdorff, 2019\n\n## 代码清单 22.2 使用随机普吕弗码生成树图\n\n```\n>>> verticesList = ['v1','v2','v3','v4','v5','v6','v7']\n\
    >>> n = len(verticesList)\n>>> from random import seed, choice\n>>> seed(101)\n\
    >>> code = []\n>>> for k in range(n-2):\n...     code.append( choice(verticesList)\
    \ )\n>>> print (code)\n['v5', 'v7', 'v2', 'v5', 'v3']\n>>> rt = RandomTree(prueferCode=code)\n\
    >>> rt\n*------- Graph instance description -------*\nInstance class   : RandomTree\n\
    Instance name    : randomTree\nGraph Order      : 7\nGraph Size       : 6\nValuation\
    \ domain : [-1.00; 1.00]\nAttributes : ['name', 'order', 'vertices',\n       \
    \      'valuationDomain', 'edges',\n             'prueferCode', 'size', 'gamma']\n\
    *---- RandomTree specific data ----*\nPruefer code : ['v5', 'v7', 'v2', 'v5',\
    \ 'v3']\n>>> rt.exportGraphViz('tutPruefTree')\n*---- exporting a dot file for\
    \ GraphViz tools -----------*\nExporting to tutPruefTree.dot\nneato -Tpng tutPruefTree.dot\
    \ -o tutPruefTree.png\n```\n\n基于标记树与其普吕弗码之间的双射关系，我们实际上知道存在 $n^{n-2}$ 个具有相同 $n$\
    \ 个顶点的不同树图。给定一个真实的图，我们如何识别它实际上是一个树实例？\n\n## 22.2 识别树图\n\n给定一个阶为 n、大小为 s 的图 g，以下\
    \ 5 个断言 A1、A2、A3、A4 和 A5 都是等价的（参见 Barthélemy 和 Guenoche 1991）：\n\n- A1：g 是一棵树。\n\
    - A2：g 没有（无弦）环且 n = s + 1。\n- A3：g 是连通的且 n = s + 1。\n- A4：g 的任意两个顶点总是由一条唯一路径连接。\n\
    - A5：g 是连通的，且删除任何一条边都会使 g 断开。\n\n例如，断言 A3 提供了一种识别树图的简单测试。在代码清单 22.3 的惰性求值测试中（见下面第\
    \ 3 行），从计算复杂度的角度来看，先检查图的阶和大小，再检查其潜在的连通性是合适的。我们提供了 `isTree()` 方法来计算这两个测试（见第 8 行）。\n\
    \n### 代码清单 22.3 识别树图\n\n```\n>>> from graphs import RandomGraph\n>>> g = RandomGraph(order=8,edgeProbability=0.3,seed=62)\n\
    >>> if g.order == (g.size +1) and g.isConnected():\n...     print('The graph is\
    \ a tree ?', True)\n... else:\n...     print('The graph is a tree ?',False)\n\
    \  The graph is a tree ? True\n>>> g.isTree()\n  True\n```\n\n使用种子 62 生成的阶为 8、边概率为\
    \ 30% 的随机图，实际上是一个树图实例，这由其在对面页图 22.3 中显示的 graphviz 图所证实。\n\n```\n>>> g.exportGraphViz('test62')\n\
    \  *---- exporting a dot file for GraphViz tools ---*\n  Exporting to test62.dot\n\
    \  fdp -Tpng test62.dot -o test62.png\n```\n\n然而，我们仍然需要恢复其对应的普吕弗码。因此，我们可以使用 TreeGraph\
    \ 类的 `tree2Pruefer()` 方法。但是，首先，图 g 的实例类被更改为 TreeGraph 类型（见下面第 2 行）。\n\n### 代码清单\
    \ 22.4 计算树图实例的普吕弗码\n\n```\n>>> from graphs import TreeGraph\n>>> g.__class__ =\
    \ TreeGraph\n>>> g.tree2Pruefer()\n  ['v6', 'v1', 'v2', 'v1', 'v2', 'v5']\n```\n\
    \n图 22.3 识别树图。可以注意到顶点 v2 实际上位于树的中心，邻域深度为 2\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_343_0.png)\n\
    \nDigraph3 (graphviz), R. Bisdorff, 2019\n\n图 22.4 绘制以其为中心的有根有向树\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_343_1.png)\n\
    \nDigraph3 (graphviz)\nR. Bisdorff, 2020\n\n在图 22.3 中，我们注意到顶点 v2 实际上位于树的中心，邻域深度为\
    \ 2。图的中心是具有最小邻域深度的顶点。为了找到这样的中心，Graph 类提供了 `computeGraphCentres()` 方法（见代码清单 22.5\
    \ 第 1 行）。现在知道了图 g 的中心，我们可以使用 TreeGraph 类的 `exportOrientedTreeGraphViz()` 方法绘制相应的有根有向树（见图\
    \ 22.4）。\n\n### 代码清单 22.5 计算树的中心并绘制有根有向树\n\n```\n>>> g.computeGraphCentres()\n\
    {'v2': 2}\n>>> g.exportOrientedTreeGraphViz(\n...     fileName='rootedTree', root='v2')\n\
    *----- exporting a dot file for GraphViz tools\nExporting to rootedTree.dot\n\
    dot -Grankdir=TB -Tpng rootedTree.dot -o rootedTree.png\n```\n\n现在让我们将注意力转向树图的一个主要应用，即与图遍历相关的生成树和森林。\n\
    \n## 22.3 生成树和森林\n\n使用 `RandomSpanningTree` 类，我们可以从给定的连通图 $g$ 实例生成*均匀*随机的生成树实例，使用\
    \ WILSON 算法（见代码清单 22.6 和图 22.5）。\n\n### 代码清单 22.6 生成均匀随机生成树\n\n```\n>>> from graphs\
    \ import RandomGraph,\n...                     RandomSpanningTree\n>>> g = RandomGraph(order=9,\n\
    ...                  edgeProbability=0.4,seed=100)\n>>> spt = RandomSpanningTree(g)\n\
    >>> spt\n  *------ Graph instance description ------*\n    Instance class    :\
    \ RandomSpanningTree\n    Instance name     : randomGraph_randomSpanningTree\n\
    \   Graph Order       : 9\n   Graph Size        : 8\n   Valuation domain  : [-1.00;\
    \ 1.00]\n   Attributes        : ['name','vertices','order',\n                \
    \        'valuationDomain',\n                        'edges','size','gamma',\n\
    \                        'dfs','date', 'dfsx',\n                        'prueferCode']\n\
    \  *----- RandomTree specific data ----*\n    Pruefer code     : ['v7','v9','v5','v1','v8','v4','v9']\n\
    >>> spt.exportGraphViz(fileName='randomSpanningTree',\n...                   \
    \ WithSpanningTree=True)\n  *----- exporting a dot file for GraphViz tools -----*\n\
    \    Exporting to randomSpanningTree.dot\n    [['v1','v5','v6','v5','v1','v8','v9','v3','v9','v4',\n\
    \      'v7','v2','v7','v4','v9','v8','v1']]\n    neato -Tpng randomSpanningTree.dot\n\
    \          -o randomSpanningTree.png\n```\n\n图 22.5 随机生成树\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_344_0.png)\n\
    \nDigraph3 (graphviz), R. Bisdorff, 2019\n\n图 22.6 随机生成森林\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_345_0.png)\n\
    \nDigraph3 (graphviz), R. Bisdorff, 2019\n\nWILSON 算法仅适用于连通图（Wilson 1996）。更一般地，在图不连通的情况下，`RandomSpanningForest`\
    \ 类生成一个不一定均匀的随机生成森林实例——一个或多个随机树图——通过对图的分量进行随机深度优先搜索遍历生成（见代码清单 22.7 和图 22.6）。\n\
    \n### 代码清单 22.7 在不连通图上计算生成森林\n\n```\n>>> g = RandomGraph(order=15,\n...      \
    \           edgeProbability=0.1, seed=140)\n>>> g.computeComponents()\n[{'v12',\
    \ 'v01', 'v13'}, {'v02', 'v06'},\n {'v08', 'v03', 'v07'}, {'v15', 'v11', 'v10',\
    \ 'v04', 'v05'},\n {'v09', 'v14'}]\n>>> spf = RandomSpanningForest(g, seed=100)\n\
    >>> spf.exportGraphViz(fileName='spanningForest',\n...                    WithSpanningTree=True)\n\
    \ *---- exporting a dot file for GraphViz tools -----*\n Exporting to spanningForest.dot\n\
    [['v03', 'v07', 'v08', 'v07', 'v03'],\n ['v13', 'v12', 'v13', 'v01', 'v13'],\n\
    \ ['v02', 'v06', 'v02'],\n ['v15', 'v11', 'v04', 'v11', 'v15',\n          'v10',\
    \ 'v05', 'v10', 'v15'],\n ['v09', 'v14', 'v09']]\nneato -Tpng spanningForest.dot\
    \ -o spanningForest.png\n```\n\n## 22.4 最大确定生成森林\n\n对于赋值图——支持加权边——我们最终可以使用 KRUSKAL\
    \ 的贪心最小生成树算法在图的对偶赋值上构建一个*最确定*的生成树（或如果不连通则为森林）（Kruskal 1956）。¹\n\n在代码清单 22.8 中，我们生成一个具有五个顶点和七条边的随机赋值图，其双极赋值在\
    \ [-1.0; 1.0] 范围内。\n\n### 代码清单 22.8 生成随机双极赋值图\n\n```\n>>> from graphs import RandomValuationGraph\n\
    >>> g = RandomValuationGraph(order=5,seed=2)\n>>> g\n  *------- Graph instance\
    \ description ------*\n  Instance class    : RandomValuationGraph\n  Instance\
    \ name     : randomGraph\n  Graph Order       : 5\n  Graph Size        : 7\n \
    \ Valuation domain  : [-1.00; 1.00]\n  Attributes        : ['name', 'order',\n\
    \                      'vertices', 'valuationDomain',\n                      'edges',\
    \ 'size', 'gamma']\n```\n\n为了检查边的实际权重，我们在代码清单 22.9 中将随机图 g 转换为相应的有向图 dg，并使用 `showRelationTable()`\
    \ 方法打印其对称邻接矩阵。\n\n### 代码清单 22.9 对称关系表\n\n```\n>>> dg = g.graph2Digraph()\n>>>\
    \ dg.showRelationTable()\n  *---- Relation Table ----*\n    S   |  'v1'  'v2'\
    \  'v3'  'v4'  'v5'\n  ------|---------------------------------\n  'v1'  |  0.00\
    \  0.91  0.90 -0.89 -0.83\n  'v2'  |  0.91  0.00  0.67  0.47  0.34\n  'v3'  |\
    \  0.90  0.67  0.00 -0.38  0.21\n  'v4'  | -0.89  0.47 -0.38  0.00  0.21\n  'v5'\
    \  | -0.83  0.34  0.21  0.21  0.00\n  Valuation domain: [-1.00;1.00]\n```\n\n\
    为了计算最确定的生成树或森林，我们可以使用 `Best-DeterminedSpanningForest` 类构造函数。\n\n> ¹ KRUSKAL 算法是一种最小生成树算法，它找到连接森林中任意两棵树的权重最小的边。"
