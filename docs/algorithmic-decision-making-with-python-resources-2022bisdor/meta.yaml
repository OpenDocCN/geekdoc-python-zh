    \n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_150_0.png)\n\n**Fig. 9.1** The relation\
    \ map of a sparse outranking digraph\n\nIn Fig. 9.1 we easily recognise the 9\
    \ linearly ordered quantile equivalence classes. *Green* and *light-green* pixels\
    \ show positive *outranking* situations, whereas positive *outranked*—negative\
    \ outranking—situations are shown in *red* and *light-red*. Indeterminate situations\
