    \ (-1) | +0.78 (+3) | +0.42 (+2) | +1.00 (+4) |\n\nAll outranking situations,\
    \ qualified at stability level ±1, are now put to an *indeterminate* status (see\
    \ Listing 19.7, Lines 23–36 above). In the example here, three positive outrankings\
    \ get dropped: between p3 and p7, between p7 and p3, and between p6 and p3, where\
    \ the last situation is actually already doubtful because of a veto situation.\
    \ Three negative outrankings get dropped as well: between p1 and p7, between p4\
    \ and p2, and between p7 and p4.\n\nNotice by the way that outranking or outranked\
    \ situations, although qualified at level ±2 or ±3, may nevertheless become doubtful\
    \ because of considerable performance differences. We observe such a doubtful\
    \ situation when comparing, for instance, alternatives p2 and p4 (see Listing\
    \ 19.8, Lines 4–8).\n\n### Listing 19.8 Inspecting polarised outranking situations\n\
    \n```\n>>> rg.showPolarisations()\n*---- Negative polarisations ----*\nnumber\
    \ of negative polarisations : 3\n1: r(p2 >= p4) = 0.33\ncriterion: en3\nConsiderable\
    \ performance difference : -60.02\nVeto discrimination threshold : -60.00\nPolarisation:\
    \ r(p2 >= p4) = 0.33 ==> 0.00\n2: r(p6 >= p3) = 0.06\ncriterion: ec8\nConsiderable\
    \ performance difference : -62.31\nVeto discrimination threshold : -60.00\nPolarisation:\
    \ r(p6 >= p3) = 0.06 ==> 0.00\n3: r(p6 >= p4) = -0.36\ncriterion: en3\nConsiderable\
    \ performance difference : -68.27\nVeto discrimination threshold : -60.00\nPolarisation:\
    \ r(p6 >= p4) = -0.36 ==> -1.00\n```\n\nDespite being robust, the ‘at least as\
    \ well evaluated as’ situation between alternatives p2 and p4 becomes doubtful\
    \ because of a considerable counter-performance (−60.02) of p2 observed on criterion\
    \ en3, a negative difference which exceeds slightly the assumed veto discrimination\
    \ threshold v = 60.00. The same polarisation to 0.00 (indeterminate) happens when\
    \ comparing alternatives p6 and p3 (Line 13). Notice the polarisation to −1.0\
    \ (certainly false) of the “at least as well evaluated as” situation between alternatives\
    \ p6 and p4 (Line 18).\n\nOne may finally compare in Fig. 19.1 the standard and\
    \ the robust versions of the corresponding strict outranking digraphs, both oriented\
    \ by their respective identical initial and terminal prekernels.\n\nThe robust\
    \ version (right in Fig. 19.1) drops two strict outranking situations: between\
    \ p4 and p7 and between p7 and p1. The remaining 14 strict outranking (respectively,\
    \ outranked) situations are now all verified at a stability level of +2 and more\
    \ (respectively, −2 and less). They remain valid, hence, with all potential significance\
    \ weights that are compatible with the given significance weights preordering\
    \ (see Listing 19.2 on page 262).\n\nTo appreciate the apparent partial ordering\
    \ of both the standard and the robust strict outranking digraphs shown in Fig.\
    \ 19.1, let us have in Fig. 19.2 on the next page a final heatmap view on the\
    \ underlying performance tableau ordered by the NETFlows ranking rule actually\
    \ applied to the robust version of the outranking digraph (see the outrankingModel=’this’\
    \ flag in Line 4 below).\n\n### Listing 19.9 Computing a robust performance heatmap\
    \ view\n\n```\n>>> rg.showHTMLPerformanceHeatmap(\n...                 Correlations=True,\n\
    ...                 colorLevels=5,\n...                 outrankingModel='this',\n\
    ...                 rankingRule='NetFlows')\n```\n\nAs the initial prekernel {p2,\
    \ p4} is in the robust outranking digraph validated at least at stability level\
    \ ±2, recommending alternatives p4 and p2 as potential best choices appears robustly\
    \ justified. Alternative p4 represents indeed an overall best compromise choice\
    \ between all decision objectives, whereas alternative p2 gives an unanimous best\
    \ choice with respect to two out of three decision objectives. It is up to the\
    \ decision maker to make his final choice.\n\n## 19.5 Characterising Unopposed\
    \ Multiobjective Outranking Situations\n\nWhen facing a performance tableau involving\
    \ multiple decision objectives, the robustness level ±3 may lead to distinguishing\
    \ what we call unopposed outranking situations, like the one shown in the previous\
    \ section between alternatives p4 and p1 (r(p4 ≳ p1) = +0.78, see Listing 19.4\
    \ on page 264, Line 11), namely preferential situations that are more or less\
    \ validated or invalidated by all the decision objectives.\n\n**Definition 19.2\
