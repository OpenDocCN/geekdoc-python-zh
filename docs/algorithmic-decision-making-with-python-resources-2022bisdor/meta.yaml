    The epistemic fusion operator o-max (see Listing 2.6 Line 2) is defined as follows:


    **Definition 2.1 (Disjunctive Epistemic Fusion Operator o-max)** Let $r$ and $r''$
    characterise two bipolar-valued epistemic situations:


    +   - o-max($r, r''$) = max($r, r''$) when both $r \geqslant 0.0$ and $r'' \geqslant
    0.0$, i.e. $r$ and $r''$ are positively valid or indeterminate;

    - o-max($r, r''$) = min($r, r''$) when both $r \leqslant 0.0$ and $r'' \leqslant
    0.0$, i.e. $r$ and $r''$ are positively invalid or indeterminate;

    - otherwise o-max($r, r''$) = 0.0, i.e. indeterminate.


    Mind that the o-max operator, like a mean operator, is *not associative* when
    more than 2 operands are given. In order to make the o-max fusion univocal, the
    following rule is applied—first, all positive and negative terms are separately
    aggregated—then the o-max fusion is applied to both aggregates.'
