    \ 方法计算*单名投票*，即每位候选人被排在第一位的次数，以及谁是本次选举中*简单多数*（相对多数）的获胜者。\n\n```python\n>>> lvp.computeUninominalVotes()\n\
    {'c1': 6, 'c2': 2, 'c3': 7}\n>>> lvp.computeSimpleMajorityWinner()\n['c3']\n```\n\
    \n由于我们观察到三位候选人中没有任何一位获得绝对多数（8/15）的选票，因此可以使用 `computeInstantRunoffWinner()` 方法来寻找*即时决选*获胜者（Bisdorff\
    \ 2020a）。\n\n### 清单 7.3 即时决选获胜者示例\n\n```python\n>>> lvp.computeInstantRunoffWinner(Comments=True)\n\
    Half of the Votes = 7.50\n==> stage = 1\n    remaining candidates ['c1', 'c2',\
    \ 'c3']\n    uninominal votes {'c1': 6, 'c2': 2, 'c3': 7}\n    minimal number\
    \ of votes = 2\n    maximal number of votes = 7\n    candidate to remove = c2\n\
    \    remaining candidates = ['c1', 'c3']\n==> stage = 2\n    remaining candidates\
    \ ['c1', 'c3']\n    uninominal votes {'c1': 8, 'c3': 7}\n    minimal number of\
    \ votes = 7\n    maximal number of votes = 8\n    candidate c1 obtains an absolute\
    \ majority\nInstant run off winner: ['c1']\n```\n\n在清单 7.3 中，第一阶段没有任何候选人获得绝对多数的选票。候选人\
    \ c2 获得最少的选票（2/15），因此被淘汰。在第二阶段，候选人 c1 最终获得了绝对多数的选票（8/15），因此当选。\n\n也可以遵循*博尔达骑士*的建议，在对线性选票进行*排名分析*后，计算每位候选人的\
    \ BORDA 分数——平均排名——从而确定 BORDA 获胜者（de Borda 1781）。\n\n### 清单 7.4 BORDA 排名分数示例\n\n\
    ```python\n>>> lvp.computeRankAnalysis()\n{'c1': [6, 9, 0], 'c2': [2, 5, 8], 'c3':\
    \ [7, 1, 7]}\n>>> v.computeBordaScores()\nOrderedDict([\n    ('c1', {'BordaScore':\
    \ 24, 'averageBordaScore': 1.6}),\n    ('c3', {'BordaScore': 30, 'averageBordaScore':\
    \ 2.0}),\n    ('c2', {'BordaScore': 36, 'averageBordaScore': 2.4}) ])\n>>> lvp.computeBordaWinners()\n\
    ['c1']\n```\n\n在清单 7.4 中，候选人 c1 获得了最低的 BORDA 分数，其次是候选人 c3，最后是候选人 c2。相应的 BORDA\
    \ 排名分析表可以通过 `showRankAnalysisTable()` 方法打印出来。\n\n### 清单 7.5 带有 BORDA 分数的排名分析示例\n\
    \n```python\n>>> lvp.showRankAnalysisTable()\n*---- Borda rank analysis tableau\
    \ ----*\ncandi- | alternative-to-rank | Borda\ndates | 1 2 3 | score average\n\
    ------|---------------------|-----------------\n'c1' | 6 9 0 | 24/15 1.60\n'c3'\
    \ | 7 1 7 | 30/15 2.00\n'c2' | 2 5 8 | 36/15 2.40\n```\n\n在我们随机生成的选举结果中，我们很幸运：候选人\
    \ c1 既是即时决选获胜者，也是 BORDA 获胜者（参见前一页的清单 7.3 和清单 7.4）。然而，也可以遵循孔多塞侯爵的建议，计算每对候选人之间投票获得的多数优势（de\
    \ Caritat, Marquis de Condorcet 1784）。\n\n## 7.3 多数优势有向图\n\n例如，候选人 c1 有四次排在候选人\
    \ c2 之前，一次排在其后（参见第84页的清单 7.2）。因此，由于选民的权重，相应的多数优势 M(c1, c2) 等于 (3 + 1 + 5 + 4)\
    \ - (2) = +11。这些成对的多数优势在候选人集合上定义了我们所谓的多数优势有向图。`MajorityMarginsDigraph` 类处理此类有向图。\n\
    \n### 清单 7.6 *多数优势*有向图示例\n\n```python\n>>> from votingProfiles import MajorityMarginsDigraph\n\
    >>> mmdg = MajorityMarginsDigraph(lvp,\n... IntegerValuation=True)\n>>> mmdg\n\
    *------- Digraph instance description -------*\nInstance class : MajorityMarginsDigraph\n\
    Instance name : rel_randomLinearVotingProfile1\nDigraph Order : 3\nDigraph Size\
    \ : 3\nValuation domain : [-15.00;15.00]\nDeterminateness (%) : 55.56\nAttributes\
    \ : ['name', 'actions', 'voters',\n'ballot', 'valuationdomain',\n'relation', 'order',\n\
    'gamma', 'notGamma']\n>>> mmdg.showAll()\n*----- show detail ---------------*\n\
    ```\n\n```python\nDigraph          : rel_randLinearVotingProfile1\n*----- Candidates\
    \ -----*\n ['c1', 'c2', 'c3']\n*----- Characteristic valuation domain ----*\n\
    \ {'max': Decimal('15.0'),\n  'med': Decimal('0'),\n  'min': Decimal('-15.0'),\n\
    \  'hasIntegerValuation': True}\n*----- majority margins -----*\n     M(x,y) |\
    \  'c1'  'c2'  'c3'\n -----------|-------------------\n      'c1'  |    0    11\
    \     1\n      'c2'  |  -11     0    -1\n      'c3'  |   -1     1     0\n Valuation\
    \ domain: [-15;+15]\n```\n\n请注意清单 7.6 的第 29-31 行，在线性投票概况的情况下，多数优势总是满足*零和性质*：对于所有候选人\
    \ $x$ 和 $y$，$M(x, y) + M(y, x) = 0$。这对于任意投票概况通常不成立。线性投票概况的*多数优势*有向图实际上定义了一个*弱竞赛图*，因此属于*自对偶*<sup>1</sup>双极值有向图的类别（参见第\
    \ 2.6 节）。\n\n候选人 $x$ 显示出正的多数优势 $M(x, y)$，意味着在成对投票中以绝对多数击败了候选人 $y$。因此，在*多数优势*有向图关系表中，其行仅显示正项的候选人，以绝对多数的选票击败了所有其他候选人。孔多塞准则建议宣布这位候选人（总是唯一的，为什么？）为选举的获胜者。这里我们很幸运，再次是候选人\
    \ c1 成为孔多塞获胜者（参见前一页清单 7.6 的第 29 行）。此结果在下面通过 `computeCondorcetWinners()` 方法得到确认。\n\
    \n```python\n>>> mmdg.computeCondorcetWinners()\n['c1']\n```\n\n通过将多数优势视为定义在合格候选人集合上的全局选民偏好关系的*双极值特征函数*，我们可以重用通用\
    \ `Digraph` 类的所有操作资源。<sup>2</sup> 特别是其 `exportGraphViz()` 方法，用于在下一页的图 7.1 中可视化选举结果。\n\
    \n> <sup>1</sup> 自对偶双极值有向图的类别由所有弱不对称有向图组成，即仅包含不对称和/或不确定链接的有向图。极限情况一方面包括具有不确定自反链接的完全竞赛图，另一方面包括完全不确定的有向图。在此类别中，逆（逆\
    \ ~）运算符确实与对偶（否定 −）运算符相同。\n<sup>2</sup> 参见第 2 章。"
