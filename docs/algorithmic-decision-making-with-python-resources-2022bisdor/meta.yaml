    \n**清单 10.4** 计算10个新决策方案的绝对评级\n\n```\n>>> from sortingDigraphs import LearnedQuantilesRatingDigraph\n\
    >>> newActions = rpg.randomActions(10)\n>>> lqr = LearnedQuantilesRatingDigraph(pq,newActions,\n\
    rankingRule='best')\n>>> lqr\n*---- Object instance description\nInstance class\
