    ## 第20章

    在社会选择中缓和多数暴政效应


    ![](img/16b49f4bd7a0e5e8eab9001001a6dc21_300_0.png)


    > 投票程序的选择塑造了我们生活的民主

    — Baujard, Gavrel, Igersheim, Laslier, and Lebon (2013)


    ## 目录


    - 20.1 具有多党派初选的两阶段选举 … 279

    - 20.2 双极赞成-反对投票系统 … 287

    - 20.3 赞成-反对投票的成对比较 … 290

    - 20.4 三值评估投票系统 … 293

    - 20.5 支持多党派候选人 … 296


    **摘要** 在*社会选择*的背景下，当决策目标与不同政党相对应时，帕累托最优的选择建议实际上代表了*多党派*的社会选择，这些选择可以在两阶段选举系统中明智地进行初选。我们的双极值优超模型基于对‘*至少被同等评价*’陈述的赞成-反对。类似的方法已在赞成-反对投票系统中付诸实践。当将这种赞成-反对投票选票转换为相应的绩效记录时，我们得到了一个（-1,
    0, 1）值的评估投票系统。我们最终表明，在这种赞成-反对投票系统中，获胜者往往是那些或多或少具有多党派背景的候选人。


    ### 20.1 具有多党派初选的两阶段选举


    源于*伯纳德·罗伊*的开创性工作，在优超方法中，通过考虑显著的负面绩效差异来缓和多数暴政效应，这些差异使得原本积极的‘*至少被同等评价*’情况变得可疑（Benayoun
    et al. 1966）。在普选的社会选择背景下，这种两极分化是不可行的，因为真正的单记名投票选票不包含足够丰富的偏好信息。然而，当将决策目标与政党相匹配时，第19.6节中看到的帕累托最优优超情况，在成对比较合格候选人时，对应于多党派的‘至少被同等赞成’情况。基于相应的多党派严格‘更受赞成’情况的最佳选择建议，在条件允许时，可以在两阶段选举中提供令人信服的初选。


    为了计算多党派社会选择，我们首先需要将给定的带有选前民意调查的线性投票概况转换为相应的绩效评估表。我们将用第7章中已经讨论过的一个投票概况来说明这一点。


