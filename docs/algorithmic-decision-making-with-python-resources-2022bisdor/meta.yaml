    ```


    In Listing 19.4 above, we may hence distinguish the following bipolar-valued stability
    levels:


    +   - **±4:** *unanimous* outranking, respectively, outranked, situation. The
    pairwise trivial reflexive outrankings, for instance, all show this stability
    level.

    - **±3:** *validated* outranking, respectively, outranked, situation in *each*
    coalition of equi-significant criteria. This is, for instance, the case for the
    outranking situation observed between alternatives p1 and p4 (see Lines 6 and
    12).

    - **±2:** *validated* outranking, respectively, outranked situation with *all*
    potential significance weights that are *compatible* with the given significance
    preorder (see Listing 19.2 on page 262). This is the case when comparing alternatives
    p1 and p2 (see Lines 6 and 8).

    - **±1:** *validated* outranking, respectively, outranked situation with the *precisely
    given decimal* significance weights, a situation we may observe between alternatives
    p3 and p7 (see Lines 10 and 18).

    - **0:** *indeterminate* outranking situation, like the one between alternatives
    p1 and p3 (see Lines 6 and 10).


    It is worthwhile noticing that, in the one limit case where all performance criteria
    appear equi-significant – there is given a single equivalence class containing
    all the criteria significance weights – one may only distinguish stability levels
    ±4 and ±3. In the other limit case, when all performance criteria admit different
    significance weights, the significance weights may be linearly ordered without
