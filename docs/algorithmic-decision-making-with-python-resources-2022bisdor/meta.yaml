    ```\n\n输入到`LearnedQuantilesRatingDigraph`类构造函数的数据是一个有效的`PerformanceQuantiles`对象`pq`和一个`newActions`列表，该列表包含使用相同随机生成器`rpg`新生成的决策方案（参见清单10.4第3-4行）。\n\
