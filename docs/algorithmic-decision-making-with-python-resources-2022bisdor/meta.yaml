    \n## 16.3 双极值关系等价\n\n在清单 16.4 中生成的两个五阶随机双极值有向图 d1 和 d2 将有助于探索这个想法。\n\n清单 16.4\
    \ 两个随机双极值有向图\n\n```\n>>> from randomDigraphs import RandomValuationDigraph\n>>>\
    \ d1 = RandomValuationDigraph(order=5,seed=1)\n>>> d1.showRelationTable(ReflexiveTerms=False)\n\
    \ * ---- 关系表 -----\n r(d1)|  'a1'   'a2'   'a3'   'a4'   'a5'\n------|------------------------------------\n\
    \ 'a1' |   -   -0.66  0.44  0.94  -0.84\n 'a2' | -0.36   -   -0.70  0.26  0.94\n\
    \ 'a3' |  0.14  0.20   -    0.66  -0.04\n 'a4' | -0.48 -0.76  0.24   -   -0.94\n\
    \ 'a5' | -0.02  0.10  0.54  0.94   -\n 估值域：[-1.00;1.00]\n>>> d2 = RandomValuationDigraph(order=5,seed=2)\n\
    >>> d2.showRelationTable(ReflexiveTerms=False)\n * ---- 关系表 -----\nr(d2) | 'a1'\
    \ 'a2' 'a3' 'a4' 'a5'\n------|----------------------------------------\n'a1' |\
    \ - -0.86 -0.78 -0.80 -0.08\n'a2' | -0.58 - 0.88 0.70 -0.22\n'a3' | -0.36 0.54\
    \ - -0.46 0.54\n'a4' | -0.92 0.48 0.74 - -0.60\n'a5' | 0.10 0.62 0.00 0.84 -\n\
    估值域：[-1.00;1.00]\n```\n\n在生成的随机有向图 d1 和 d2 中，有 9 对，例如 (a1,a2) 或 (a3,a2)，呈现等价定向（参见第\
    \ 7 行和第 18 行，或第 9 行和第 20 行）。EquivalenceDigraph 类计算有向图 d1 和 d2 之间的这种双极值关系等价性（参见清单\
    \ 16.5）。\n\n清单 16.5 双极值等价有向图\n\n```\n>>> from digraphs import EquivalenceDigraph\n\
    >>> eqd = EquivalenceDigraph(d1,d2)\n>>> eqd.showRelationTable(ReflexiveTerms=False)\n\
    \ * ---- 关系表 -----\nr(<=>) | 'a1' 'a2' 'a3' 'a4' 'a5'\n------|----------------------------------------\n\
    'a1' | - 0.66 -0.44 -0.80 0.08\n'a2' | 0.36 - -0.70 0.26 -0.22\n'a3' | -0.14 0.20\
    \ - -0.46 -0.04\n'a4' | 0.48 -0.48 0.24 - 0.60\n'a5' | -0.02 0.10 0.00 0.84 -\n\
    估值域：[-1.00;1.00]\n```\n\n在我们的双极值认知逻辑中，逻辑析取和合取分别实现为 max 和 min 操作。还要注意，逻辑等价 (d1\
    \ ⇔ d2) 对应于双重蕴含 (d1 ⇒ d2) ∧ (d2 ⇒ d1)，并且蕴含 (d1 ⇒ d2) 在逻辑上等价于析取 (¬d1 ∨ d2)。\n\n\
    当 r(x d1 y) 和 r(x d2 y) 分别表示关系 d1 和 d2 的双极值特征值时，我们可以如下计算等价与非等价定向的非自反对 (x, y) 之间的多数优势\
    \ M(d1 ⇔ d2)：\n\nM(d1 ⇔ d2) =\n∑_{(x≠y)} [min(max(−r(x d1 y), r(x d2 y)), max(−r(x\
    \ d2 y), r(x d1 y)))].\n(16.2)\n\n因此，M(d1 ⇔ d2) 由上面计算的关系等价有向图 eqd 的关系表的非自反项之和给出（参见清单\
    \ 16.5）。在清晰情况下，M(d1 ⇔ d2) 用最大可能的非自反对数，即 n(n − 1) 进行归一化。在扩展的 r 值情况下，最大可能的等价多数优势\
    \ M 对应于 $(x \\d1 y)$ 和 $(x \\d2 y)$ 的联合确定度之和 D（参见 Bisdorff 2012）：\n\n$$D = \\\
    sum_{x \\neq y} \\min \\left[ abs(r(x \\d1 y)), abs(r(x \\d2 y)) \\right], \\\
    quad (16.3)$$\n\n因此，在一般的 $r$ 值情况下，我们得到：\n\n$$\\tau(\\d1, \\d2) = \\frac{M(\\d1\
    \ \\Leftrightarrow \\d2)}{D} . \\quad (16.4)$$\n\n$\\tau(\\d1, \\d2)$ 因此对应于经典的序数相关指数，但仅限于给定有向图\
    \ $\\d1$ 和 $\\d2$ 的联合确定部分。在两个清晰线性序的极限情况下，$D$ 等于 $n(n-1)$，即非自反对的数量，我们恢复了 KENDALL\
    \ 原始的 *tau* 指数定义。\n\n值得注意的是，上面得到的序数相关指数 $\\tau(\\d1, \\d2)$ 实际上对应于以下比率：\n\n- $r(\\\
    d1 \\Leftrightarrow \\d2) = \\frac{M(\\d1 \\Leftrightarrow \\d2)}{n(n-1)}$：成对*关系*等价陈述的归一化多数优势，也称为*值序数相关*。\n\
    - $d = \\frac{D}{n(n-1)}$：相应成对关系等价陈述的归一化认识论确定度，实际上是关系等价有向图的*确定性*。\n\n因此，认识论确定效应被成功地从序数相关效应中*分离*出来。对于完全确定的关系，$\\\
    tau(\\d1, \\d2) = r(\\d1 \\Leftrightarrow \\d2)$。与完全不确定的有向图（即当 $D = 0$ 时）的序数相关性，按惯例设置为不确定的相关值\
    \ 0.0。对于均匀选择的随机 $r$ 值有向图，预期的 $\\tau$ 指数为 0.0，实际上表示不确定的关系等价性。相应的预期归一化确定度 $d$ 约为\
    \ 0.333（参见 Bisdorff (2012)）。\n\n我们在下面借助上一页清单 16.5 中计算的等价有向图 eqd 来验证方程 16.4。\n\n\
    清单 16.6 从等价有向图计算序数相关指数\n\n```\n>>> # eqd = EquivalenceDigraph(d1,d2)\n>>> M =\
    \ Decimal('0'); D = Decimal('0')\n>>> n2 = eqd.order*(eqd.order - 1)\n>>> for\
    \ x in eqd.actions:\n...     for y in eqd.actions:\n...         M += eqd.relation[x][y]\n\
    ...         D += abs(eqd.relation[x][y])\n>>> print('r(rd1<=>rd2) = %+.3f, d =\
    \ %.3f, tau = %+.3f' %\\n        (M/n2,D/n2,M/D))\nr(rd1<=>rd2) = +0.026, d =\
    \ 0.356, tau = +0.073\n```"
