    11                      ''valuationdomain'', ''relation'',

    12                      ''gamma'', ''notGamma'', ''size'']

    13 >>> print(''Transitivity degree: %.3f'' %\n14 ...         dgd.computeTransitivityDegree()
    )

    15   Transitivity degree: 1.000

    16 >>> dg.exportGraphViz(fileName=''orientedPermGraph'')

