    # 23.3 Generating Permutation Graphs


    A graph is called a *permutation* or *inversion* graph if there exists a permutation
    of its list of vertices, like [4, 3, 6, 1, 5, 2], such that the graph is isomorphic
    to the inversions operated by the permutation in this list (see Golumbic 2004,
    Chap. 7, pp 157-170). This kind of graphs is also part of the class of BERGE graphs
    (Fig. 23.4).


    ```

    1 >>> from graphs import PermutationGraph

    2 >>> g = PermutationGraph(permutation = [4,3,6,1,5,2])

    3 >>> g

    ```'
