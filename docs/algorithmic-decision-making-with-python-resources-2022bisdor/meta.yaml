    \n## 19.3 计算超越情况的稳定性标示\n\n稳定性水平 ±4 和 ±3 在给定情况下易于检测。检测稳定性水平 ±2 则远不那么明显。现在，正是双极值认知特征域再次为我们提供了一种有效测试稳定性水平\
    \ +2 和 −2 的方法（Bisdorff 2004a,b）。\n\n让我们考虑在给定权重前序中观察到的重要性等价类。这里，我们观察到三个权重类：6、8\
    \ 和 12，按递增顺序排列（参见第 262 页的清单 19.2）。在上面显示的成对比较中，这些等价类可能以正或负的形式出现，此外还有值为 0.00 的不确定重要性。因此，我们得到以下有序的双极重要性权重列表：W\
    \ = [−12, −8, −6, 0, 6, 8, 12]。\n\n在上一节显示的所有成对边际比较中，我们可以观察到九个准则中的每一个都从该列表 W 中分配了一个精确的项目。让我们用\
    \ q[i] 表示分配项目 W[i] 的准则数量，用 Q[i] 表示这些 q[i] 计数的累积和，其中 i 是列表 W 长度范围内的索引。\n\n例如，在备选方案\
