    \ a dot file for GraphViz tools ---------*\nExporting to weakCopelandRanking.dot\n\
    dot -Grankdir=TB -Tpng weakCopelandRanking.dot -o weakCopelandRanking.png\n```\n\
    \nLet us now consider a similar ranking rule, but working directly on the criteria\
    \ *significance majority margins*, i.e. the *bipolar-valued outranking characteristic\
    \ valuation*.\n\n## 8.3 The NETFLOWS Ranking\n\nThe bipolar-valued version of\
    \ the COPELAND ranking rule, we call NETFLOWS,⁴ computes for each alternative\
    \ $x \\in X$ a *net flow* score.\n\n### Algorithm 8.2 NETFLOWS ranking rule\n\n\
    *in* : bipolar-valued strict outranking digraph $G(X, \\succcurlyeq)$,\n*out*\
    \ : linear ranking of the set $X$ of decision actions.\n\n1. The NETFLOWS rule\
    \ computes for each alternative $x \\in X$ the sum over all non-reflexive $y \\\
    in X$ of the differences between the *strict outranking* characteristics $r(x\
    \ \\succcurlyeq y)$ and the *strict outranked* characteristics $r(y \\succcurlyeq\
    \ x)$.\n2. The alternatives are ranked in decreasing order of these NETFLOWS scores;\
    \ ties, the case given, being resolved with a lexicographical rule applied to\
    \ the identifiers of the decision actions.\n\n³ The skeleton of a transitive relation\
    \ drops the transitivity induced arcs.\n⁴ This ranking rule is also known under\
    \ the name PROMETHEE ranking rule (Brans and Vincke 1985).\n\nThe NetFlowsRanking\
    \ class from the linearOrders module computes this linear ranking from the given\
    \ strict outranking digraph gcd.\n\n## Listing 8.6 Computing a NETFLOWS ranking\n\
    \n```\n>>> from linearOrders import NetFlowsRanking\n>>> nf = NetFlowsRanking(gcd,Comments=True)\n\
    \  Net flow scores :\n    a5 : +3.600\n    a7 : +2.800\n    a6 : +1.300\n    a3\
    \ : +0.033\n    a1 : -0.400\n    a8 : -0.567\n    a4 : -1.283\n    a9 : -2.600\n\
    \    a2 : -2.883\n  NetFlows Ranking:\n    ['a5','a7','a6','a3','a1','a8','a4','a9','a2']\n\
    >>> cop.copelandRanking # comparing both\n    ['a5','a1','a6','a7','a8','a4','a9','a3','a2']\n\
    ```\n\nIn Listing 8.6 here, the NETFLOWS scores actually deliver directly a linear\
    \ ranking *without ties* which is rather different from the one delivered by the\
    \ COPELAND rule (compare Lines 14 and 16). It may happen, however, that we obtain,\
    \ as with the COPELAND scores above, only a ranking with ties, which may then\
    \ be resolved similarly by following a lexicographic rule applied to the identifiers\
    \ of the decision alternatives. In such cases, it is possible to construct again\
    \ a *weak ranking* with the corresponding WeakNetFlowsOrder class from the transitiveDigraphs\
    \ module.\n\nIt is worthwhile noticing again, that similar to the COPELAND ranking\
    \ rule seen before, the NETFLOWS ranking rule is also *invariant* under the codual\
