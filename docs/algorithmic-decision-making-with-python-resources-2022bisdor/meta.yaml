- md: "## 6.3 Random Cost-Benefit Performance Tableaux\n\nThe `randomPerfTabs` module\
    \ provides a `RandomCBPerformanceTableau` class for generating *Costs* versus\
    \ *Benefits* organised performance tableaux. The random generator is following\
    \ by default the directives below:\n\n- Three types of decision actions are distinguished:\
    \ *cheap*, *neutral*, and *expensive* ones with an equal proportion of 1/3. Two\
    \ types of weighted criteria are also distinguished: *Costs* criteria to be *minimised*,\
    \ and *Benefits* criteria to be *maximised*, in the proportions 1/3, respectively,\
    \ 2/3;\n- Random performances on each type of criteria are drawn, either from\
    \ an ordinal scale [0; 10], or from a cardinal scale [0.0; 100.0], following a\
    \ parametric triangular law of mode: 30% performance for cheap, 50% for neutral,\
    \ and 70% performance for expensive decision actions, with constant probability\
    \ repartition 0.5 on each side of the respective mode;\n- Costs criteria use mostly\
    \ cardinal scales (3/4), whereas Benefits criteria use mostly ordinal scales (2/3);\n\
    - The sum of weights of the Costs criteria equals by default the sum of weights\
    \ of the Benefits criteria: `weighDistribution = 'equiobjectives'`;\n- On cardinal\
    \ criteria, both of cost or of benefit type, following constant performance discrimination\
    \ quantiles are instantiated: 5% indifferent situations, 90% preference situations,\
    \ and 5% considerable performance difference situations.\n\n### Parameters\n\n\
    - If `numberOfActions == None`, a uniform random number between 10 and 31 of *cheap*,\
    \ *neutral* or *advantageous* actions (equal 1/3 probability each type) actions\
    \ is instantiated. Minimal number of decision actions required is 3;\n- If `numberOfCriteria\
    \ == None`, a uniform random number between 5 and 21 of cost or benefit criteria\
    \ (1/3, respectively, 2/3 probability) is instantiated;\n- `weightDistribution\
    \ := 'equisignificant'` (default) | `'equiobjectives'` | `'fixed'` | `'random'`;\n\
    - default `weightScale` for `'random'` weight distribution is 1 - `numberOfCriteria`;\n\
    - All *cardinal* criteria are evaluated with decimals between 0.0 and 100.0 whereas\
    \ *ordinal* criteria are evaluated with integers between 0 and 10.\n- `commonThresholds`\
    \ is obsolete. Preference discrimination is specified as *percentiles* of concerned\
    \ performance differences (see below).\n- `commonPercentiles := {'ind': 5, 'pref':\
    \ 10, 'veto': 95}` are expressed in percents (reversed for vetoes), and only concern\
    \ cardinal criteria.\n- `missingDataProbability := 0.0 <= float <= 1.0`; probability\
    \ of missing performance evaluation on a criterion for an alternative (default\
    \ 0.025).\n- `NA := Decimal` (default = -999); missing data symbol.\n\n## Example\
    \ Python Session\n\nListing 6.2 Generating a random Cost-Benefit performance tableau\n\
    \n```\n>>> from randomPerfTabs import\n...                 RandomCBPerformanceTableau\n\
    >>> t = RandomCBPerformanceTableau(\n...             numberOfActions=7,\n... \
    \            numberOfCriteria=5,\n...             weightDistribution='equiobjectives',\n\
    ...             commonPercentiles={'ind':0.05,\n...                          \
    \       'pref':0.10,\n...                                 'veto':0.95},\n... \
    \            seed=100)\n>>> t.showActions()\n  *----- show decision action ---------------*\n\
    \    key:  a1\n      short name: a1c\n      name:  random cheap decision action\n\
    \    key:  a2\n      short name: a2n\n      name:  random neutral decision action\n\
    \    ...\n    key:  a7\n      short name: a7a\n      name:  random advantageous\
    \ decision action\n>>> t.showCriteria()\n  *----  criteria ----*\n    b1 'random\
    \ ordinal benefit criterion'\n     Preference direction: max\n     Scale = (0,\
    \ 10)\n     Weight = 3\n     ...\n    c1 'random cardinal cost criterion'\n  \
    \   Preference direction: min\n     Scale = (0.0, 100.0)\n     Weight = 2\n  \
    \   Threshold ind  :  1.76 + 0.00x ; percentile:  9.5\n     Threshold pref : \
    \ 2.16 + 0.00x ; percentile: 14.3\n     Threshold veto : 73.19 + 0.00x ; percentile:\
    \ 95.2\n     ...}\n```\n\nIn Listing 6.2 one may notice the three types of decision\
    \ actions (see Lines 12–22), as well as the two types of criteria with either\
    \ an *ordinal* or a *cardinal* performance measuring scale (Lines 24–36). In the\
    \ latter case, by default about 5% of the random performance differences will\
    \ be below the *indifference* and 10% below the *preference* discriminating threshold.\
    \ About 5% will be *considerably large*. More statistics about the generated performance\
    \ evaluations can be inspected with the `showStatistics()` method.\n\n## 6.3 Random\
    \ Cost-Benefit Performance Tableaux\n\n```\n>>> t.showStatistics()\n*--------\
    \ Performance tableau summary statistics --------*\nInstance name : randomCBperftab\n\
    Actions : 7\nCriteria : 5\nCriterion name : b1\nCriterion weight : 3\ncriterion\
    \ scale : 0.00 - 10.00\nmean evaluation : 5.14\nstandard deviation : 2.64\nmaximal\
    \ evaluation : 8.00\nquantile Q3 (x_75) : 8.00\nmedian evaluation : 6.50\nquantile\
    \ Q1 (x_25) : 3.50\nminimal evaluation : 1.00\nmean absolute difference : 2.94\n\
