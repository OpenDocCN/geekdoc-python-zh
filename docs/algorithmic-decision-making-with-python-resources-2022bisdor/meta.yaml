- md: "## 19.6 Computing Pareto Efficient Multiobjective Choices\n\nDually, we say\
    \ that decision alternative x is unopposedly outranked by decision alternative\
    \ y when x is positively outranked by y on one or more decision objectives without\
    \ x positively outranking y on any decision objective.\n\nLet us reconsider, for\
    \ instance, the performance tableau pt with three decision objectives already\
    \ seen in Listing 19.1 on page 261:\n\n```\n>>> pt.showObjectives()\n*-------\
    \ show objectives -------\"\nEco: Economical aspect\n  ec1 criterion of objective\
    \ Eco 8\n  ec4 criterion of objective Eco 8\n  ec8 criterion of objective Eco\
    \ 8\n  Total weight: 24.00 (3 criteria)\nSoc: Societal aspect\n  so2 criterion\
    \ of objective Soc 12\n  so7 criterion of objective Soc 12\n  Total weight: 24.00\
    \ (2 criteria)\nEnv: Environmental aspect\n  en3 criterion of objective Env 6\n\
    \  en5 criterion of objective Env 6\n  en6 criterion of objective Env 6\n  en9\
    \ criterion of objective Env 6\n  Total weight: 24.00 (4 criteria)\n```\n\nWe\
    \ notice in this example three decision objectives of equal importance (see Lines\
    \ 3, 13, and 17). What will be the outranking situations that are positively (respectively,\
    \ negatively) validated for each one of the decision objectives taken individually?\n\
    \nSuch unopposed multiobjective outranking situations may be obtained by operating\
    \ an epistemic average fusion (see the symmetricAverage() method) of the marginal\
    \ outranking digraphs restricted to the coalition of criteria supporting each\
    \ one of the decision objectives (see Listing 19.10).\n\nListing 19.10 Computing\
    \ unopposed outranking situations\n\n```\n>>> from outrankingDigraphs import\\\
    n...                     BipolarOutrankingDigraph\n>>> geco = BipolarOutrankingDigraph(pt,\\\
    n...                     objectivesSubset=['Eco'])\n>>> gsoc = BipolarOutrankingDigraph(pt,\\\
    n...                     objectivesSubset=['Soc'])\n>>> genv = BipolarOutrankingDigraph(pt,\\\
    n...                     objectivesSubset=['Env'])\n>>> from digraphs import FusionLDigraph\n\
    >>> objectiveWeights = \\n...                     [pt.objectives[obj]['weight']\\\
    n...                     for obj in t.objectives]\n>>> uopg = FusionLDigraph([geco,gsoc,genv],\\\
    n...                     operator='o-average',\\n...                     weights=objectiveWeights)\n\
    >>> uopg.showRelationTable(ReflexiveTerms=False)\n```\n\n```\n* ---- Relation\
    \ Table -----\nr | 'p1' 'p2' 'p3' 'p4' 'p5' 'p6' 'p7'\n-----|--------------------------------------------------------------\n\
    'p1' | - +0.00 +0.00 -0.69 +0.39 +0.11 +0.00\n'p2' | +0.00 - +0.83 +0.00 +0.00\
    \ +0.00 +0.00\n'p3' | +0.00 -0.33 - +0.00 +0.50 +0.00 +0.00\n'p4' | +0.78 +0.00\
    \ +0.61 - +1.00 +1.00 +0.67\n'p5' | -0.11 +0.00 +0.00 -0.89 - +0.11 +0.00\n'p6'\
    \ | +0.00 +0.00 +0.00 -0.44 +0.17 - +0.00\n'p7' | +0.00 +0.00 +0.00 +0.00 +0.78\
    \ +0.42 -\nValuation domain: [-1.0; 1.0]\n```\n\nPositive (respectively, negative)\
    \ $r(x \\succsim y)$ characteristic values, like $r(p1 \\succsim p5) = +0.39$\
    \ (see Listing 19.10, Line 20 above), show hence only outranking situations being\
    \ validated (respectively, invalidated) by one or more decision objectives without\
    \ being invalidated (respectively, validated) by any other decision objective.\n\
    \nFor easily computing this kind of *unopposed multiobjective* outranking digraphs,\
    \ the `outrankingDigraphs` module conveniently provides a corresponding `UnOpposedBipolarOutrankingDigraph`\
    \ constructor.\n\nListing 19.11 Computing unopposed outranking digraphs\n\n```\n\
    1 >>> from outrankingDigraphs import\\n2 ...                 UnOpposedBipolarOutrankingDigraph\n\
    3 >>> uopg = UnOpposedBipolarOutrankingDigraph(pt)\n4 >>> uopg\n5   *--------\
    \ Object instance description --------*\n6   Instance class       : UnOpposedBipolarOutrankingDigraph\n\
