    The outranking characteristic value $r(a1 \succsim a2)$ represents the relative
    *majority margin* resulting from the difference between the significance weights
    of the criteria in favour and the significance weights of the criteria in disfavour
    of the statement that alternative a1 is *''at least as well evaluated as''* alternative
