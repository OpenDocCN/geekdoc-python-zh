    # 13.3 How to Judge the Quality of a Ranking Result?


    In a multiple-criteria based ranking problem, inspecting pairwise marginal performance
    differences may give objectivity to global preferential statements. That a CS
    Dept *x* convincingly outranks Dept *y* can conveniently be checked with the `showPairwiseOutrankings()`
    method.. The ETH Zürich CS Dept is, for instance, first ranked before Caltech''s
    Dept in both previous rankings. Lest us check the preferential reasons.


