    # Notes


    It was *Denis Bouyssou* who first suggested us end of the nineties, when we started
    to work in Prolog on the computation of fuzzy digraph kernels with finite domain
    constraint solvers, that the 50% criteria significance majority was a very special
    value to be carefully taken into account. The converging solution vectors of the
    fixpoint kernel equations furthermore confirmed this special status of the 50%
    majority (see Chap. 17). These early insights led to the seminal articles on bipolar-valued
    epistemic logic where we introduced split truth/falseness semantics for a multi-valued
    logical processing of fuzzy preference modelling (Bisdorff 2000, 2002). The characteristic
    valuation domain remained, however, the classical fuzzy [0.0; 1.0] valuation domain.


    It is only in 2004, when we succeeded in assessing the stability of the outranking
    digraph when solely ordinal criteria significance weights are given that it became
    clear and evident for us that the characteristic valuation domain had to be shifted
    to a [−1.0; +1.0]-valued domain (see Chap. 19 and Bisdorff 2004). In this bipolar
    valuation, the 50% majority threshold corresponds now to the median 0.0 value,
    characterising with the correct zero value an epistemic indeterminateness—no knowledge—situation.
    Furthermore, identifying truth and falseness directly by the sign of the characteristic
    value revealed itself to be very efficient not only from a computational point
    of view but also from scientific and semiotic perspectives. A positive (respectively,
    negative) characteristic value now attests a logically valid (respectively, invalid)
    statement and a negative affirmation now means a positive refutation and vice
    versa. Furthermore, the median zero value gives way to efficiently handling partial
    objects—like the border or the asymmetric part of a digraph—and, even more important
    from a practical decision making point of view, any missing data.


    The bipolar [−1.0; +1.0]-valued characteristic domain opened so the way to important
    new operations and concepts, like the disjunctive epistemic fusion operation seen
    in Sect. 2.5 on page 18 that confers the outranking digraph a logically sound
    and epistemically correct definition (Bisdorff 2013). KENDALL''s ordinal correlation
    index could be extended to a bipolar-valued relational equivalence index between
    digraphs (see Chap. 16 and Bisdorff 2012). Making usage of the bipolar-valued
    Gaussian error function naturally led to defining a bipolar-valued likelihood
    function, where a positive, respectively, negative, value gives the likelihood
    of an affirmation, respectively, a refutation (see Chap. 18 and Bisdorff 2014).


    In the following Chap. 3 we introduce the main formal object of this book, namely
    *bipolar-valued outranking* digraphs.


    # References


    Bisdorff R (2000) Logical foundation of fuzzy preferential systems with application
    to the electre decision aid methods. Comput Oper Res 27:673–687. http://hdl.handle.net/10993/23724'
