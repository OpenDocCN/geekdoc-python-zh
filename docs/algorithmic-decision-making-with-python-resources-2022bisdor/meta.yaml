- md: "## 9.4 Ranking Pre-ranked Sparse Outranking Digraphs\n\n```python\n>>> g =\
    \ BipolarOutrankingDigraph(tp)\n>>> corr = prg.computeOrdinalCorrelation(g)\n\
    >>> g.showCorrelation(corr)\nCorrelation indexes:\n  Crisp ordinal correlation\
    \  : +0.863\n  Epistemic determination    :  0.315\n  Bipolar-valued equivalence\
    \ : +0.272\n```\n\nThe ordinal correlation index between the standard and the\
    \ sparse outranking digraphs is quite high (+0.863) and their bipolar-valued equivalence\
    \ is supported by a mean criteria significance majority of (1.0 + 0.272)/2 = 64%.\n\
    \nIt is worthwhile noticing in Listing 9.6 on page 120 (Lines 20 and following)\
    \ that sparse pre-ranked outranking digraphs do not contain a `relation` attribute.\
    \ The access to pairwise outranking characteristic values is here provided via\
    \ a corresponding `relation()` function.\n\n### Listing 9.8 Functional binary\
    \ relation characteristics\n\n```python\ndef relation(self,x,y):\n    \"\"\"\n\
    \    Dynamic construction of the global\n    outranking characteristic function\
    \ r(x,y).\n    \"\"\"\n    Min = self.valuationdomain['min']\n    Med = self.valuationdomain['med']\n\
    \    Max = self.valuationdomain['max']\n    if x == y:\n        return Med\n \
    \   cx = self.actions[x]['component']\n    cy = self.actions[y]['component']\n\
    \    if cx == cy:\n        return self.components[cx]['subGraph'].relation[x][y]\n\
    \    elif self.components[cx]['rank'] > self.components[cy]['rank']:\n       \
    \ return Min\n    else:\n        return Max\n```\n\nIn Listing 9.8 Lines 9–10,\
    \ all reflexive situations are set to the *indeterminate* value. When two decision\
    \ alternatives belong to a same component—quantile equivalence class—we access\
    \ the relation attribute of the corresponding outranking sub-digraph (Lines 13–14).\
    \ Otherwise we just check the respective ranks of the components.\n\nEach one\
    \ of these nine ordered components is locally ranked by using a suitable ranking\
    \ rule. Best operational results, both in run times and quality, are more or less\
    \ equally obtained with the COPELAND and the NETFLOWS rules (see Sects. 8.2 and\
    \ 8.3). The eventually obtained linear ordering (from the worst to best) is stored\
    \ in a `prg.boostedOrder` attribute. A reversed linear order (from the best to\
    \ the worst) is stored in a `prg.boostedRanking` attribute.\n\n```python\n>>>\
    \ prg.boostedRanking\n[43, 47, 42, 5, 73, 65, 68, 32, 62, 70, 35, 22, 75, 45,\
    \ 1,\n 61, 41, 34, 4, 13, 40, 14, 2, 54, 63, 37, 56, 71, 69, 36,\n 19, 72, 15,\
    \ 48, 6, 30, 74, 3, 21, 58, 52, 18, 7, 24, 27,\n 23, 67, 51, 10, 25, 11, 8, 64,\
    \ 28, 66, 53, 12, 31, 39, 55,\n 20, 46, 49, 16, 44, 26, 38, 33, 17, 50, 29, 60,\
    \ 9, 59, 57]\n```\n\nAlternative 43 appears *first-ranked*, whereas alternative\
    \ 57 is *last ranked* (see above).\n\nThe quality of this ranking result may be\
    \ assessed by computing with the `computeRankingCorrelation()` method its ordinal\
    \ correlation index with the standard outranking digraph g.\n\n```python\n>>>\
    \ corr = g.computeRankingCorrelation(prg.boostedRanking)\n>>> g.showCorrelation(corr)\n\
    Correlation indexes:\n  Crisp ordinal correlation  : +0.807\n  Epistemic determination\
    \    :  0.315\n  Bipolar-valued equivalence : +0.254\n```\n\nOne may also verify\
    \ below that the COPELAND ranking obtained, for instance, from the standard outranking\
    \ digraph g is as well highly correlated (+0.822) with the one obtained from the\
    \ sparse outranking digraph prg.\n\n```python\n>>> from linearOrders import CopelandOrder\n\
    >>> cop = CopelandOrder(g)\n>>> print(cop.computeRankingCorrelation(prg.boostedRanking))\n\
    {'correlation': 0.822, 'determination': 1.0}\n```\n\nNoticing the computational\
    \ efficiency of the quantiles sorting construction, coupled with the separability\
    \ property of the quantile class membership characteristics computation, we will\
    \ make usage of the `PreRankedOutrankingDigraph` constructor in Chap. 11 for HPC\
    \ ranking big and even huge performance tableaux (Bisdorff 2016). The next Chap.\
    \ 10 addresses now the problem of absolute rating into learned quantile performance\
    \ norms.\n\n## References\n\nBisdorff R (2016) Computing linear rankings from\
