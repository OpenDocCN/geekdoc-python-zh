    Alternative a5 obtains here the best COPELAND score (+12), followed by alternatives
    a1, a6, and a7 with same score (+2); following the lexicographic rule, a1 is hence
    ranked before a6 and a6 before a7. Same situation is observed for a4 and a9 with
    a score of −3 (see Listing 8.3 Lines 4–12). The COPELAND ranking rule is in fact
    *invariant* under the *codual* transform (see Sect. 2.6) and renders a same linear
    order indifferently from digraphs g or gcd.


    The COPELAND rule works well, furthermore on any strict outranking digraph that
    models a linear (partial) order on the *median cut* strict outranking digraph
    ccd (Dias and Lamboray 2010). In Listing 8.4, the computeRankingCorrelation()
    method, coupled with the showCorrelation() method, indicates the ordinal correlation
    of the COPELAND ranking result, shown in Listing 8.3 Line 14, with the given outranking
    digraph g (see Chap. 16 and Bisdorff 2012).


    # Listing 8.4 Checking the ordinal quality of the COPELAND ranking


    ```

    1 >>> corr = g.computeRankingCorrelation(cop.copelandRanking)

    2 >>> g.showCorrelation(corr)

