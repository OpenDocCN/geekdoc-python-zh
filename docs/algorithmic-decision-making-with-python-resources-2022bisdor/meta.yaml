    # 1.2 Organisation of the DIGRAPH3 Python Modules


    The main data handling modules of the DIGRAPH3 resources are the following:


    +   1. `digraphs`: main part of the DIGRAPH3 source code with the root `Digraph`
    class.

    2. `graphs`: resources for handling undirected graphs with the root `Graph` class
    and a bridge to the `digraphs` module resources.

    3. `perfTabs`: tools for handling multiple-criteria performance tableaux with
    root `PerformanceTableau` class.

    4. `outrankingDigraphs`: root module for handling outranking digraphs with the
    abstract root `OutrankingDigraph` class and the main `Bipolar-OutrankingDigraph`
    class.⁶

    5. `votingProfiles`: classes and methods for handling voting ballots and computing
    election results with main `LinearVotingProfile` class.


    Various random generators are provided by the following modules:


    +   1. `randomDigraphs`: various random digraph models like random crisp digraphs
    (`RandomDigraph` class) or random bipolar-valued digraphs (`RandomValuationDigraph`
    class).

    2. `randomPerfTabs`: various implemented random performance tableau models, like
    Cost-Benefit tableaux (`RandomCBPerformanceTableau` class) or 3-Objectives tableaux
    (`Random3ObjectivesPerformanceTableau` class).

    3. `randomNumbers`: additional random number generators, not available in the
    standard Python `random.py` library, like a discrete random variable (`DiscreteRandomVariable`
    class) or a Cauchy random variable (`CauchyRandomVariable` class)


    > ⁶ Notice that the outrankingDigraph class defines a hybrid object type, inheriting
    conjointly from the Digraph class and the PerformanceTableau class.'
