  md: '# Part IV

    Advanced Topics


    The fourth part gathers five chapters introducing and discussing further going
    algorithmic developments. In Chap. 16, KENDALL’s ordinal correlation index is
    consistently extended to bipolar-valued digraphs. Chapter 17 explains the important
    concept of digraph kernel and illustrates the DIGRAPH3 algorithmic approach to
    their computation. In Chap. 18, criteria significance weights are considered to
    be uncertain and become random variates. This idea opens the way to compute a
    bipolar-valued likelihood of outranking and outranked situations leading to α%-confident
    outranking digraphs. In Chap. 19, the criteria significance weights are considered
    to be only of ordinal type. This working hypothesis induces the need to put into
    place a specific robustness analysis of the corresponding outranking digraphs.
    The last chapter, Chap. 20, makes use of the preceding robustness analysis for
    introducing and discussing ideas, like two-stage elections with multipartisan
    primary selection or bipolar voting systems, for tempering plurality tyranny effects
    in social choice problems.'
