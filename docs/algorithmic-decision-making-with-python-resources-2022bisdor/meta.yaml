- md: '## Part III

    Evaluation and Decision Case Studies


    The third part with four chapters proposes decision making case studies illustrating
    different performance evaluation models and decision problems. Chapter 12 concerns
    building a best choice recommendation for helping a young student to select a
    foreign language study program. Chapter 13, inspired by the THE World University
    Rankings, presents and discusses the multiple incommensurable criteria ranking
    of Academic Computer Science Departments. Inspired by the 2004 data published
    by DER SPIEGEL magazine, Chap. 14 showcases a multiple-criteria rating problem
    about the student enrolment quality of German universities. Chapter 15 lists finally
    some exercises for students taking a course on Algorithmic Decision Theory.


    ## Chapter 12

    Alice’s Best Choice: A Selection Case Study


    ### Contents


    - 12.1 The Decision Problem

    - 12.2 The Performance Tableau

    - 12.3 Building a Best Choice Recommendation

    - 12.4 Robustness Analysis


    **Abstract** The chapter presents a case study concerning the building of a best
    choice recommendation for Alice, a German student who wants some advice concerning
    the choice of her future University studies. We present Alice’s performance tableau—potential
    foreign language study programs, her decision objectives, performance criteria
    and performance evaluations—and build a best choice recommendation for her. A
    thorough robustness analysis confirms a very best choice.


    ### 12.1 The Decision Problem


    The chapter content is inspired by a multiple criteria decision analysis case
    study (Düsch 2001).

    Alice will probably receive her “Abitur” with satisfactory and/or good marks and
    wants to start her further studies thereafter (Fig. 12.1 on the following page).
    She would not mind staying in Köln, yet is ready to move elsewhere if opportune.
    The length of the higher studies do concern her, as she wants to earn her life
    as soon as possible. Her parents, however, agree to financially support her study
    fees as well as her living costs during her studies.

    Alice has already identified 10 potential study programs.

    In Table 12.1 on the next page we notice that Alice considers three *Graduate
    Interpreter* studies (8 or 9 Semesters), respectively, in Köln, in Saarbrücken
    or in Heidelberg; and five *Qualified translator* studies (8 or 9 Semesters),
    respectively, in Köln, in Düsseldorf, in Saarbrücken, in Heidelberg or in Munich.
    She also considers two short (4 Semesters) study programs at the Chamber of Commerce
    in Köln.


    Fig. 12.1 Alice D., 19 years old German student finishing her secondary studies
    in Köln (Germany), desires to undertake foreign languages studies


    ![](img/16b49f4bd7a0e5e8eab9001001a6dc21_178_0.png)


    Table 12.1 The potential study programs


    | ID | Diploma | Institution | City |

    |---|---|---|---|

    | T-UD | Qualified translator (T) | University (UD) | Düsseldorf |

    | T-FHK | Qualified translator (T) | Higher Technical School (FHK) | Köln |

    | T-FHM | Qualified translator (T) | Higher Technical School (FHM) | München |

    | I-FHK | Graduate interpreter (I) | Higher Technical School (FHK) | Köln |

    | T-USB | Qualified translator (T) | University (USB) | Saarbrücken |

    | I-USB | Graduate interpreter (I) | University (USB) | Saarbrücken |

    | T-UHB | Qualified translator (T) | University (UHB) | Heidelberg |

    | I-UHB | Graduate interpreter (I) | University (UHB) | Heidelberg |

    | S-HKK | Specialised secretary (S) | Chamber of Commerce (HKK) | Köln |

    | C-HKK | Foreign correspondent (C) | Chamber of Commerce (HKK) | Köln |


    Four **decision objectives** of more or less equal importance are guiding Alice’s
    choice:


    1. *maximise* the attractiveness of the study place (GEO),

    2. *maximise* the attractiveness of her further studies (LEA),

    3. *minimise* her financial dependency on her parents (FIN),

    4. *maximise* her professional perspectives (PRA).


    The decision consequences Alice wishes to take into account for evaluating the
    potential study programs with respect to each of the four objectives are modelled
    by the following *coherent family of criteria* (Roy 1991; Roy and Bouyssou 1993).
    Such a family of performance criteria verifies:


    1. *Exhaustiveness*: No argument acceptable to Alice can be put forward to justify
    a preference in favour of study program *x* versus program *y* when *x* and *y*
    have the same performance level on each of the performance criteria;

    2. *Cohesiveness*: Alice recognises that program $x$ must be preferred to program
    $y$ whenever the performance level of $x$ is significantly better than that of
    $y$ on one of the criteria of positive weight, performance levels of $x$ and $y$
    being the same on each of the other criteria;

    3. *Non-redundancy*: One of the above requirements is violated if one of the performance
    criteria is left out from the family.


    Within each decision objective, the performance criteria are considered to be
    *equi-significant*. Hence, the four decision objectives get a same *importance
    weight* of 6 (see Table 12.2 Column 5).


