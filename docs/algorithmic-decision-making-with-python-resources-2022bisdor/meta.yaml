  md: '# 22.2 Recognising Tree Graphs


    Given a graph g of order n and size s, the following 5 assertions A1, A2, A3,
    A4, and A5 are all equivalent (see Barthélemy and Guenoche 1991):


    +   A1: g is a tree.

    A2: g is without (chordless) cycles and n = s + 1.

    A3: g is connected and n = s + 1.

    A4: Any two vertices of g are always connected by a unique path.

    A5: g is connected and dropping any single edge will always disconnect g.


    Assertion A3, for instance, gives a simple test for recognising a tree graph.
    In case of a lazy evaluation of the test in Listing 22.3, Line 3 below, it is
    opportune, from a computational complexity perspective, to first check the order
    and size of the graph, before checking its potential connectedness. We provide
    the isTree() method for computing both these tests (see Line 8).


    Listing 22.3 Recognising a tree graph


    ```

    1 >>> from graphs import RandomGraph

    2 >>> g = RandomGraph(order=8,edgeProbability=0.3,seed=62)

    3 >>> if g.order == (g.size +1) and g.isConnected():

    4 ...     print(''The graph is a tree ?'', True)

    5 ... else:

    6 ...     print(''The graph is a tree ?'',False)

    7   The graph is a tree ? True

    8 >>> g.isTree()

    9   True

    ```


    The random graph of order 8 and edge probability 30%, generated with seed 62,
    is actually a tree graph instance, as confirmed by its graphviz drawing shown
    in Fig. 22.3 on the facing page.


    ```

    1 >>> g.exportGraphViz(''test62'')

    2   *---- exporting a dot file for GraphViz tools ---*

    3   Exporting to test62.dot

    4   fdp -Tpng test62.dot -o test62.png

    ```


    Yet, we still have to recover its corresponding PRÜFER code. Therefore, we can
    use the tree2Pruefer() method from the TreeGraph class. But, first, the instance
    class of graph g is changed to the TreeGraph type (see Line 2 below).


    Listing 22.4 Computing the PRÜFER code of a tree graph instance


    ```

    1 >>> from graphs import TreeGraph

    2 >>> g.__class__ = TreeGraph

    3 >>> g.tree2Pruefer()

    4   [''v6'', ''v1'', ''v2'', ''v1'', ''v2'', ''v5'']

    ```'
