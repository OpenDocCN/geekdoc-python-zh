    # 21.7 Computing the Non-isomorphic MISs of the n-Cycle Graph


    Listing 21.18 Computing the MIS orbits of the 12-cycle graph


    ```

    1 >>> c12.showOrbits(c12.misset,withListing=False)

    2 ...

    3 *---- Global result ----

    4 Number of MIS: 29

    5 Number of orbits : 4

    6 Labelled representatives and cardinality:

    7 1: [''2'',''4'',''6'',''8'',''10'',''12''], 2

    8 2: [''2'',''5'',''8'',''11''], 3

    9 3: [''2'',''4'',''6'',''9'',''11''], 12

    10 4: [''1'',''4'',''7'',''9'',''11''], 12

    11 Symmetry vector

    12 stabilizer size: [1, 2, 3, ..., 8, 9, ..., 12, 13, ...]

    13 frequency : [0, 2, 0, ..., 1, 0, ..., 1, 0, ...]

    ```


    The corresponding group stabilisers’ sizes and frequencies, orbit 1 with 6 symmetry
    axes, orbit 2 with 4 symmetry axes, and orbits 3 and 4 both with one symmetry
    axis (see Lines 12–13 in Listing 21.18), are illustrated in the corresponding
    unlabelled graphs of Fig. 21.5.


    The non-isomorphic MISs in the 12-cycle graph represent in fact all the ways one
    may write the number 12 as the circular sum of ‘2’s and ‘3’s without distinguishing
    opposite directions of writing. The first orbit corresponds to writing six times
    a ‘2’, and the second orbit corresponds to writing four times a ‘3’. The third
    and fourth orbits correspond to writing two times a ‘3’ and three times a ‘2’.
    There are two non-isomorphic ways to do this latter circular sum, separating the
    ‘3’s either by one and two ‘2’s or by zero and three ‘2’s (Bisdorff and Marichal
    2008).


    Chapter 22 is devoted more specifically to tree graphs and graph forests.


