    (0.55)。但请注意，由于存在大量缺失评分，这些全局平均值的计算分母并不一致；一些影评人确实使用了或多或少扩展的星级范围。例如，影评人 SJ 未观看的电影会受到青睐，因为这位影评人的评分比其他人更严格。同样，也不能简单地丢弃未被所有影评人评定的电影，因为实际上没有一部电影被所有15位影评人评定过。为众多“未观看”情况提供一个虚构值也总会以某种方式歪曲全局分数。该怎么办呢？


    一个更好的方法是基于成对的双极值“至少被评为同等好”的陈述来对电影进行排序。在这种认识论论证方法下，缺失的评估自然被视为意见弃权，因此不会歪曲逻辑计算。通过`showHTMLPerformanceHeatmap()`方法生成的**热力图**浏览器视图（见清单
    16.2）提供了从最佳到最差的**NETFLOWS**排名。


    ### 清单 16.2 在热力图视图中显示从最佳到最差的电影


    ```

    1 >>> gt07.showHTMLPerformanceHeatmap(

    2 ...                 pageTitle=''Ranking the movies'',

    3 ...                 rankingRule=''NetFlows'',

    4 ...                 Correlations=True,

    4 ...                 ndigits=0)

    ```


    图 16.2（对面页）所示的**NETFLOWS**排名再次确认，获得6个*必看*标记的电影 mv_QS 正确排名第一，而获得五个*不喜欢*标记的电影 mv_TF
    排名最后。


    然而，公平地说，最终需要提及的是，《*涂鸦*》杂志的平均星级排名规则实际上显示了非常相似的结果。确实，平均分数通常能很好地确认所有明显的成对比较，但对所有不太明显的比较则*强制*了可比性。那么，如何判断给定排名规则的适用性呢？


    这就是下一页图 16.2 第三行所示的序数相关性 *tau* 指数的目的。计算这些序数相关性指数是下一节的主题。


    ## 16.2 KENDALL 序数相关性 Tau 指数


    M.G. Kendall 将其序数相关性 τ (tau) 指数定义为针对维度为 n 的线性序，平衡正确排序的对数 Co 与错误排序的对数 In（Kendall
    1938）。对于线性序，非自反对的总数为 n(n − 1)，因此 Co + In = n(n − 1)。因此 τ = (Co / n(n-1)) − (In
    / n(n-1))。如果 In 为零，则 τ = +1（所有对都等价排序）；反之，如果 Co 为零，则 τ = −1（所有对都不同排序）。


    ---

    ¹ 涂鸦星球大战，卢森堡评论版，2007年9月，第30页。

    ² 可在 DIGRAPH3 资源的 examples 目录中找到。'
