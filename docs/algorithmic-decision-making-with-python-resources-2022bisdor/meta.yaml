    # Chapter 16

    On Measuring the Fitness of a

    Multiple-Criteria Ranking


    ![](img/16b49f4bd7a0e5e8eab9001001a6dc21_233_0.png)


    # Contents


    +   16.1 Listing Movies from Best Star-Rated to Worst ……………………………… 209

    16.2 KENDALL’s Ordinal Correlation Tau Index…………………………………… 212

    16.3 Bipolar-Valued Relational Equivalence ……………………………………… 214

    16.4 Fitness of Ranking Heuristics …………………………………………………… 217

    16.5 Illustrating Preference Divergences …………………………………………… 219

    16.6 Exploring the “better rated” and the “as well as rated” Opinions ………… 220


    **Abstract** Starting from a motivating decision problem about how to list, from
    the best to the worst, a set of movies that are star-rated by journalists and
    movie critics, the chapter shows that KENDALL’s ordinal correlation index tau
    can be extended to a bipolar-valued relational equivalence measure of bipolar-valued
    digraphs. This finding gives way, on the one hand, to measure the fitness and
    fairness of multiple-criteria ranking rules. On the other hand, it provides a
    tool for illustrating preference divergences between decision objectives and criteria.


    # 16.1 Listing Movies from Best Star-Rated to Worst


    In a stubborn keeping with a two-valued logic, where every argument can only be
    true or false, there is no place for efficiently taking into account missing data
    or logical indeterminateness. These cases are seen as problematic and at best
    are simply ignored. Worst, in modern data science, missing data get often replaced
    with *fictive* values, potentially falsifying hence all subsequent computations.


    In social choice problems, voting abstentions are, however, frequently observed
    and represent a social expression that may be significant for revealing non-represented
    social preferences. And, in marketing studies, interviewees will not always respond
    to all the submitted questions. Again, such abstentions do sometimes contain nevertheless
    valid information concerning consumer preferences.'
