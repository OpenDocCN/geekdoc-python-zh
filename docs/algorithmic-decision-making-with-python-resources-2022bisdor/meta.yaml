    16  Ordinal correlation : +0.97\n```\n\nThe resulting ranking of the 5 universities\
    \ including the lower-closed quintile score limits may be well illustrated with\
    \ the `showHTMLRatingHeatmap()` method.\n\n```\n>>> lqr.showHTMLRatingHeatmap(colorLevels=5,\n\
    ...                          Correlations=True,\n...                         \
    \ ndigits=1, rankingRule='Copeland')\n```\n\nThe ordinal correlation (+0.97) of\
    \ the COPELAND ranking with the underlying bipolar-valued outranking digraph is\
    \ very high (see Fig. 14.3 Row 1). Most correlated subjects with this *rating-by-ranking*\
    \ result appear to be Physics (+0.79), Mathematics (+0.77), and German Studies\
    \ (+0.77). Sociology (+0.36) is the less correlated subject (see Row 4).\n\nFrom\
    \ the actual ranking position of the lower 5-tiling limits, we may now immediately\
    \ deduce the quintile enrolment quality equivalence classes. No university reaches\
    \ the highest quintile ([0.80 – ], whereas U3 is rated into the lowest quintile\
    \ ([0.00 – 0.20[). The other three universities U1, U2, and U4 are rated in the\
    \ second quintile ([0.20 – 0.40[). The rating result may be easily printed out\
    \ with the `showQuantilesRating()` method.\n\n**Listing 14.3** Showing the quintiling\
    \ of the enrolment quality of the 5 universities\n\n```\n>>> lqr.showQuantilesRating()\n\
    ```\n\nFig. 14.4 Drawing of the quintiles rating-by-ranking result\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_218_0.png)\n\
    \n```\n*---- Quantiles rating result ----*\n[0.60 - 0.80[ ['U5']\n[0.20 - 0.40[\
    \ ['U1', 'U4', 'U2']\n[0.00 - 0.20[ ['U3']\n```\n\nA corresponding *graphviz*\
    \ drawing with the special *exportRatingByRankingGraphViz()* method may well illustrate\
    \ in Fig. 14.4 these enrolment quality equivalence classes.\n\n```\n>>> lqr.exportRatingByRankingGraphViz('ratingResult')\n\
    *---- exporting a dot file for GraphViz tools ---------*\nExporting to ratingResult.dot\n\
    dot -Grankdir=TB -Tpdf dot -o ratingResult.png\n```\n\nWe have noticed in Chap.\
    \ 8 that there is not a unique optimal rule for ranking from a given outranking\
    \ digraph, like digraph lqr here. The COPELAND rule, for instance, has the advantage\
    \ of being CONDORCET consistent, i.e. when the outranking digraph models a linear\
    \ ranking, this ranking will necessarily be the result of the COPELAND rule. When\
    \ this is not the case, and especially when the outranking digraph shows chordless\
    \ circuits, all potential ranking rules may give very divergent ranking results\
    \ and sometimes substantially divergent rating-by-ranking results.\n\nThe `computeChordlessCircuits()`\
    \ and `showChordlessCircuits()` methods allow to check this issue.⁵\n\n```\n>>>\
    \ lqr.computeChordlessCircuits()\n>>> lqr.showChordlessCircuits()\n*---- Chordless\
    \ circuits ----*\n1 circuits.\n1:  ['U1', 'U2', 'U4'] , credibility : 0.200\n\
    ```\n\nIndeed, there appears an outranking circuit among the three universities\
    \ U1, U2, and U4 rated into the 2nd quintile. It is, hence, interesting, to verify\
    \ if the epistemic fusion of the rating-by-ranking results, one may obtain when\
    \ applying three different ranking rules, like the KEMENY, COPELAND, and NETFLOWS\
    \ rules, does actually confirm our rating-by-ranking result shown in Fig. 14.4\
    \ on the previous page. For this purpose, we make use in Listing 14.4 of the `RankingsFusionDigraph`\
    \ class.\n\n**Listing 14.4** Computing the epistemic fusion of three rating-by-ranking\
    \ results\n\n```\n>>> # lqr.actionsRanking is Copeland ranked\n>>> from linearOrders\
    \ import KemenyOrder,\n...                     NetFlowsOrder\n>>> ke = KemenyOrder(lqr,orderLimit=10)\n\
    >>> nf = NetFlowsOrder(lqr)\n>>> from transitiveDigraphs import\n...         \
    \            RankingsFusionDigraph\n>>> rankings = [lqr.actionsRanking,\n... \
    \            nf.netFlowsRanking,\n...             ke.kemenyRanking]\n>>> rankings\n\
    [['m5','u5','m4','m3','u1','u2','u4','m2','u3','m1'],\n ['m5','u5','m4','m3','u1','u4','u2','u3','m2','m1'],\n\
    \ ['m5','u5','m4','m3','u1','u4','u2','m2','u3','m1']]\n>>> rf = RankingsFusionDigraph(lqr,rankings)\n\
    >>> rf.exportGraphViz(fileName='fusionResult',\n...                   WithRatingDecoration=True)\n\
    exporting a dot file for GraphViz tools\nExporting to fusionResult.dot\ndot -Grankdir=TB\
    \ -Tpng fusionResult.dot\n...                   -o fusionResult.png\n```\n\nThe\
    \ fusion of the three rating-by-ranking results is shown in Fig. 14.5 on the next\
    \ page where we see that they diverge solely in their rating-by-ranking of Universities\
    \ U2, U3 and U4. In Listing 14.4, Lines 12–14, one may more precisely notice that\
    \ the KEMENY and COPELAND rules rate U3 in the first quintile ([0.00 – 0.20]),\
    \ whereas the NETFLOWS rule puts U3 together with U1, U2, and U4 into the second\
    \ quintile ([0.20 – 0.40]). And, the KEMENY rule inverts the position of U2 and\
    \ U4.\n\n> ⁵The `computeChordlessCircuits()` and `showChordlessCircuits()` methods\
    \ are separate because there are various methods available for enumerating the\
    \ chordless circuits in a digraph (Bisdorff 2010)."
