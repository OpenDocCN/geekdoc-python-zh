    2 >>> g = RandomDigraph(order=3,seed=1)

    3 >>> g.showRelationTable()

    4   * ---- Relation Table ----

    5     R  | ''a1''  ''a2''  ''a3''

    6   -----|-------------------

    7   ''a1'' |  -1    +1    -1

    8   ''a2'' |  -1    -1    +1

    9   ''a3'' |  +1    +1    -1

    10 >>> g.showPreKernels()

    11   *--- Computing preKernels ---*

    12    Dominant preKernels :

    13     [''a3'']

    14    Absorbent preKernels :

    15     [''a2'']

    ```


    It is easy to verify by hand that the characteristic vector $[-1, -1, +1]$ satisfies
    the initial kernel equation system; node a3 gives an *initial* kernel. Similarly,
    the characteristic vector $[-1, +1, -1]$ verifies indeed the terminal kernel equation
    system and node a2 gives hence a *terminal* kernel.

    We succeeded now in generalising crisp kernel equation systems to genuine bipolar-valued
    digraphs (Bisdorff 2006; Bisdorff et al. 2006). The constructive proof, found
    by *Marc Pirlot*, is based on the following *fixpoint equation* that may be used
    for computing bipolar-valued kernel membership vectors:

    $$T(Y) := -(Y \circ R) = Y. \tag{17.3}$$'
