  - "[PAGE 266]\n\nJohn von Neumann showed indeed that, when a digraph $G(X, R)$ is\
    \ acyclic with a unique initial kernel $K$ characterised by its membership characteristics\
    \ vector $Y_k$, then the following double fixpoint equation:\n\n$$T^2(Y) := -(\
    \ -(Y \\circ R) \\circ R) = Y \\quad (17.4)$$\n\nwill admit a stable *high* and\
    \ a stable *low* fixpoint solutions that converge both to $Y_k$ (Schmidt and Ströhlein\
    \ 1985).\n\nInspired by the crisp double fixpoint equation 17.4, we observed that\
    \ for a given bipolar-valued digraph $G(X, R)$, each one of its dominant or absorbent\
    \ prekernels $K_i$ in $X$ determines an induced partial digraph $G(X, R/K_i)$\
    \ which is acyclic and admits $K_i$ as unique prekernel (Bisdorff 1997).\n\nFollowing\
    \ the *von Neumann* fixpoint algorithm, a similar bipolar-valued extended double\
    \ fixpoint algorithm, applied to $G(X, R/K_i)$, allows us to compute the associated\
    \ bipolar-valued kernel characteristic vectors $Y_i$ in polynomial complexity.\n\
    \n**Algorithm 17.1 Computing bipolar-valued kernel characteristic vectors**\n\
    *in* : bipolar-valued digraph $G(X, R)$,\n*out* : set $\\{Y_1, Y_2, ..\\}$ of\
    \ bipolar-valued kernel membership characteristic vectors.\n\n+   1. Enumerate\
    \ all initial and terminal prekernels $K_1, K_2, ...$ in the given bipolar-valued\
    \ digraph (see Listing 17.17 on page 241);\n2. For each crisp initial kernel $K_i$:\n\
    \   a. Construct a partially determined subgraph $G(X, R/K_i)$ supporting exactly\
    \ this unique initial kernel $K_i$;\n   b. Use the double fixpoint equation $T^2$\
    \ (17.4) with the partially determined adjacency matrix $R/K_i$ for computing\
    \ a stable low and a stable high fixpoint;\n   c. Determine the bipolar-valued\
    \ $K_i$-membership characteristic vector $Y_i$ with an epistemic disjunction of\
    \ the previous low and high fixpoints;\n3. Repeat step (2) for each terminal kernel\
    \ $K_j$ by using the double fixpoint equation $T^2$ with the transpose of the\
    \ adjacency matrix $R/K_j$.\n\n# Time for a Practical Illustration\n\nWe reconsider\
    \ the random digraph $\\mathfrak{g}$ generated in Listing 17.12 on page 236. Digraph\
    \ $\\mathfrak{g}$ models the pairwise outranking situations between seven decision\
    \ alternatives evaluated on seven incommensurable performance criteria. We recompute\
    \ its corresponding bipolar-valued prekernels on the associated codual digraph\
    \ $\\mathfrak{gcd}$.\n\n```\n>>> gcd = ~(-g) # strict outranking digraph\n>>>\
    \ gcd.showPreKernels()\n*--- Computing prekernels ---*\nDominant prekernels :\n\
    \ ['a1', 'a4', 'a2']\n independence : +0.000\n```"
