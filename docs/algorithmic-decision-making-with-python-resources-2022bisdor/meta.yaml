    with an empirical probability of observing a negative majority margin of about
    17%.


    # 18.3 Confidence level Of Outranking Digraphs


    **Definition 18.1 (Confident Outranking Situation)** Following the classical outranking
    approach (see (Bisdorff 2013)), we say, from an epistemic perspective, that decision
    action $x$ *outranks* decision action $y$ at *confidence* level $\alpha\%$, when:


    +   - An expected majority of criteria validates, at confidence level $\alpha\%$
    or higher, a global ‘at least as well evaluated as’ situation between $x$ and
    $y$.

    - No considerably less performing is observed on a discordant criterion.


    ¹ The GNU Regression, Econometrics and Time-Series Library, http://gretl.sourceforge.net/.'
