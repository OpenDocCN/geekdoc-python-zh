    *教学*、*研究*和*引用*的累计重要性达到 87%（见上文），显然构成了主要的排名目标。*国际视野*和*产业收入*则被认为重要性较低（12.5%）。


    遗憾的是，THE 作者并未公布其绩效评估的细节，即针对每个排名目标下各项绩效标准的评估方法。³ THE 2016 年的排名出版物仅揭示了每个排名目标下单一绩效标准的综合评估。所保留的五个绩效标准可打印如下。


