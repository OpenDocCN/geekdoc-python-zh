  md: "6.2 Random Standard Performance Tableaux\n\n69\n\n+   - `commonMode := common\
    \ distribution of random performance measurements:¹`\n  - `('beta', None (default\
    \ setting), (α, β)), a beta generator with default α = 2 and β = 2 parameters.`\n\
    \  - `('uniform', None, None), uniformly distributed float values on the given\
    \ common scales' range [Min, Max];`\n  - `('normal', μ, σ), truncated Gaussian\
    \ distribution, by default μ = (b-a)/2 and σ = (b-a)/4;`\n  - `('triangular',\
    \ mode, repartition), generalised triangular distribution with a probability repartition\
    \ parameter specifying the probability mass accumulated until the mode value.\
