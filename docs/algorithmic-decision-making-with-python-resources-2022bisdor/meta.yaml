    resources are available.


    The physical necessity to write down a list of items in a linear sequence renders
    the ranking decision problem very important in practice. However, a relative rating
    of such items into performance quantiles classes would be, from the very preference
    modelling perspective, more expressive and faithful. This is the subject of the
    following Chap. 9.


    # References


    Arrow KJ, Raynaud H (1986) Social choice and multicriterion decision-making. The
    MIT Press, Cambridge


    Bisdorff R (2010) Enumerating chordless circuits in directed graphs. In: ORBEL24-2010,
    24th annual conference of the Belgian Operational Research Society (ORBEL aka
    Sogesci-B.V.W.B.), January 28–29, Liège (BE), Université de Liège (BE), pp 1–12.
    http://hdl.handle.net/10993/23926


    Bisdorff R (2012) On measuring and testing the ordinal correlation between bipolar
    outranking relations. In: Mousseau V, Pirlot M (eds) DAP’2012 from multiple criteria
    decision aid to preference learning, University of Mons (Belgium), pp 91–100.
    http://hdl.handle.net/10993/23909


    Bisdorff R (2013) On polarizing outranking relations with large performance differences.
    J Multi-Criteria Decis Anal Wiley 20:3–12. http://hdl.handle.net/10993/245


    Bisdorff R (2021) Technical documentation of the Digraph3 collection of Python
    modules. https://digraph3.readthedocs.io/en/latest/techDoc.html


    Brans JP, Vincke P (1985) A preference ranking organisation method: the PROMETHEE
    method for MCDM. Manag Sci 31(6):647–656


    Copeland A (1951) A reasonable social welfare function. Seminar on mathematics
    in social sciences, University of Michigan


    Dias L, Lamboray C (2010) Extensions of the prudence principle to exploit a valued
    outranking relation. Eur J Oper Res 201(3):828–837


    Kemeny J (1959) Mathematics without numbers. Daedalus 88:577–591


    Kohler G (1978) Choix multicritère et analyse algébrique de données ordinales.
    PhD thesis, Université scientifique et médicale de Grenoble


    Lamboray C (2009) A prudent characterization of the Ranked-Pairs rule. Soc Choice
    Welf 32:129–155


    Sen A (2009) Idea of justice. Allen Lane, London


