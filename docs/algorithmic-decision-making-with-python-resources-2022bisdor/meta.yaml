    # 17.3 Kernels in Lateralized Digraphs


    Humans do live in an apparent physical space of plain transitive lateral orientation,
    fully empowered in finite geometrical 3D models with linear orders, where first,
    respectively, last ranked, nodes deliver unique initial, respectively, terminal,
    kernels.


    > ¹ Not to be confused with the dual graph of a plane graph *g* that has a vertex
    for each face of *g*. Here we mean the *less than* (strict converse) relation
    corresponding to a *greater than or equal to* relation, or the *less than or equal
    to* relation corresponding to a (strict converse) *greater than* relation.


    ² The class of *self-codual* bipolar-valued digraphs consists of all weakly asymmetric
    digraphs, i.e. digraphs containing only asymmetric and/or indeterminate links.
    Limit cases consist of, on the one side, full tournaments with indeterminate reflexive
    links and, on the other side, fully indeterminate digraphs. In this class, the
    converse (inverse *~*) operator is indeed identical to the dual (negation *−*)
    one.'
