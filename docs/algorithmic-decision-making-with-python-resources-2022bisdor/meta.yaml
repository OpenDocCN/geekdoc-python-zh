    \ membership characteristic vector reveals that, among all the fifteen potential\
    \ winners, it is indeed Candidate c12 the most credible one with a 72% majority\
    \ of voters’ support (see Line 15, $(0.44 + 1.0)/2 = 0.72$), followed by Candidate\
    \ c03 (67%) and Candidate c04 (65%). Similarly, Candidates c13 and c06 represent\
    \ the most credible losers with a 68% majority voters’ support (Line 30).\n\n\
    We observe here empirically that *evaluative* voting systems, using three-valued\
    \ ordinal performance scales, match closely corresponding approval–disapproval\
    \ voting systems. The latter systems model, however, more faithfully the very\
    \ preferential information that is expressed with *approved*, *disapproved*, and\
    \ *ignored* statements. The corresponding evaluation on a three-level scale, being\
    \ value (numbers) based, cannot express the fact that in an approval–disapproval\
    \ voting system there is no preferential information given concerning the pairwise\
    \ comparison of all approved and, respectively, disapproved or ignored candidates.\n\
    \n## 20.5 Favouring Multipartisan Candidates\n\nLet us finally illustrate how\
    \ approval–disapproval voting systems may favour multipartisan supported candidates.\
    \ We shall therefore compare *approval–disapproval versus uninominal plurality*\
    \ election results when considering a highly divisive and partisan political context.\n\
    \nIn modern democracy, politics are largely structured by political parties and\
    \ activists. Let us so consider an approval–disapproval voting profile `dvp` where\
    \ the random voter behaviour is simulated from two pre-electoral polls concerning\
    \ a political scene with essentially two major highly competing parties, like\
    \ the one existing in the USA.\n\n### Listing 20.15 A random approval–disapproval\
    \ voting profile in a divisive political context\n\n```\n>>> dvp = RandomBipolarApprovalVotingProfile(\n\
    ...                 numberOfCandidates=15,\n...                 numberOfVoters=100,\n\
    ...                 approvalProbability=0.25,\n...                 disapprovalProbability=0.25,\n\
    ...                 WithPolls=True,\n...                 partyRepartition=0.5,\n\
    ...                 other=0.05,\n...                 DivisivePolitics=True,\n\
    ...                 seed=200)\n>>> dvp.showRandomPolls()\nRandom repartition of\
    \ voters\nParty-1 supporters : 45 (45.00%)\nParty-2 supporters : 49 (49.00%)\n\
    Other voters       : 6 (06.00%)\n*------------------- random polls -------------------\n\
    Party-1(45.0%) | Party-2(49.0%) |     expected\n-----------------------------------------------\n\
    'c05' : 24.10% | 'c07' : 24.10% | 'c07' : 11.87%\n'c14' : 23.48% | 'c10' : 23.48%\
    \ | 'c10' : 11.60%\n'c03' : 15.13% | 'c01' : 15.13% | 'c05' : 10.91%\n'c12' :\
    \ 07.55% | 'c04' : 07.55% | 'c14' : 10.67%\n'c08' : 07.11% | 'c09' : 07.11% |\
    \ 'c01' : 07.67%\n'c15' : 04.37% | 'c13' : 04.37% | 'c03' : 07.09%\n'c11' : 03.99%\
    \ | 'c02' : 03.99% | 'c04' : 04.55%\n'c06' : 03.80% | 'c06' : 03.80% | 'c09' :\
    \ 04.49%\n'c02' : 02.79% | 'c11' : 02.79% | 'c12' : 04.32%\n'c13' : 02.63% | 'c15'\
    \ : 02.63% | 'c08' : 04.30%\n'c09' : 02.24% | 'c08' : 02.24% | 'c06' : 03.57%\n\
    'c04' : 01.89% | 'c12' : 01.89% | 'c13' : 03.32%\n'c01' : 00.57% | 'c03' : 00.57%\
    \ | 'c15' : 03.25%\n'c10' : 00.20% | 'c14' : 00.20% | 'c02' : 03.21%\n'c07' :\
    \ 00.14% | 'c05' : 00.14% | 'c11' : 03.16%\n```\n\nIn Listing 20.15 on the facing\
    \ page, the divisive political situation is reflected by the fact that Party-1\
    \ and Party-2 supporters show strict opposite preferences. The leading candidates\
    \ of Party-1 (c05 and c14) are last choices for Party-2 supporters, and Candidates\
    \ c07 and c10, leading candidates for Party-2 supporters, are similarly the least\
    \ choices for Party-1 supporters.\n\nNo clear winner may be guessed from these\
    \ pre-election polls. As Party-2 shows however slightly more supporters than Party-1,\
    \ the expected winner in a uninominal plurality or instant-run-off voting system\
    \ will be Candidate c07, i.e. the leading candidate of majority Party-2 (see below).\n\
    \n```\n>>> dvp.computeSimpleMajorityWinner()\n['c07']\n>>> dvp.computeInstantRunoffWinner()\n\
    ['c07']\n```\n\nNow, in a corresponding approval–disapproval voting system, Party-1\
    \ supporters will usually approve their leading candidates and disapprove the\
    \ leading candidates of Party-2. Vice versa, Party-2 supporters will usually approve\
    \ their leading candidates and disapprove the leading candidates of Party-1. Let\
    \ us consult the resulting approval votes per candidate.\n\n```\n>>> dvp.showApprovalResults()\n\
    Candidate: 'c07' obtains 30 votes\nCandidate: 'c10' obtains 28 votes\nCandidate:\
    \ 'c05' obtains 28 votes\nCandidate: 'c01' obtains 28 votes\nCandidate: 'c03'\
    \ obtains 26 votes\nCandidate: 'c02' obtains 26 votes\nCandidate: 'c12' obtains\
    \ 25 votes\nCandidate: 'c14' obtains 24 votes\nCandidate: 'c13' obtains 24 votes\n\
    Candidate: 'c09' obtains 21 votes\nCandidate: 'c04' obtains 21 votes\nCandidate:\
    \ 'c08' obtains 19 votes\nCandidate: 'c06' obtains 17 votes\nCandidate: 'c15'\
    \ obtains 15 votes\nCandidate: 'c11' obtains 12 votes\nTotal approval votes: 344\n\
    Approval proportion: 344/1500 = 0.23\n```\n\nWhen considering only the approval\
    \ votes, we find confirmed above that the leading candidate of Party-2 obtains\
    \ in this simulation a plurality of approval votes. In uninominal plurality or\
    \ instant-run-off voting systems, this candidate wins hence the election, quite\
    \ to the despair of Party-1 supporters. As a foreseeable consequence, this election\
    \ result will be more or less aggressively contested which leads to a loss of\
    \ popular trust in democratic elections and institutions.\n\nIf we look however\
    \ on the corresponding disapprovals, we discover that, not surprisingly, the leading\
    \ candidates of both parties collect by far the highest number of disapproval\
    \ votes."
