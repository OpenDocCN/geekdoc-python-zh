    **Abstract** The required cardinal significance weights of the performance criteria
    represent the ‘Achilles’ heel of the outranking approach. Rarely will indeed a
    decision maker be cognitively competent for suggesting precise decimal-valued
    criteria significance weights. More often, the decision problem will involve more
    or less equally important decision objectives with more or less equi-significant
    criteria per objective. In this chapter, we study the robustness of the outranking
    digraph when the criteria significance weights faithfully indicate solely an order
    of importance.


