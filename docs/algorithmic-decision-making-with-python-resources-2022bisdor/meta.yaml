    'a3':Decimal('-1.0'), 'a4':Decimal('1.0'),\n'a5':Decimal('-1.0')},\n'a4': {'a1':Decimal('1.0'),\
    \ 'a2':Decimal('1.0'),\n'a3':Decimal('1.0'), 'a4':Decimal('-1.0'),\n'a5':Decimal('-1.0')},\n\
    'a5': {'a1':Decimal('1.0'), 'a2':Decimal('1.0'),\n'a3':Decimal('1.0'), 'a4':Decimal('-1.0'),\n\
    'a5':Decimal('-1.0')},\n}\n```\n\n在 DIGRAPH3 资源中，所有有向图对象实例都是根 `Digraph` 类型（参见技术描述），并至少包含以下属性（参见第\
    \ 6 页清单 1.1 第 12-14 行）：\n\n- 1. 一个 `name` 属性，通常保存用于创建实例的已存储实例的实际名称；\n- 2. 一个称为\
    \ `actions`（决策备选方案）的有向图节点有序字典，至少包含一个 `name` 属性；\n- 3. 一个 `order` 属性，包含由对象构造函数自动添加的图节点数（actions\
    \ 字典的长度）；\n- 4. 一个逻辑特征 `valuationdomain` 字典，包含三个十进制条目：最小值（-1.0，表示肯定为假）、中值（0.0，表示信息缺失）和最大特征值（+1.0，表示肯定为真）；\n\
    - 5. 一个称为 `relation` 的双重字典，以行动（节点）的有序对为索引，并携带一个在前述赋值域范围内的十进制特征值；\n- 6. 其关联的 `gamma`\
    \ 属性，一个包含每个行动的直接后继或前驱的字典，由对象构造函数自动添加；\n- 7. 其关联的 `notGamma` 属性，一个包含不是每个行动的直接后继或前驱的行动的字典，由对象构造函数自动添加。\n\
    \n## 1.4 检查有向图对象\n\n不同的 `show...()` 方法，如 `showShort()` 方法，现在向我们揭示 `dg` 是一个清晰的、非自反的、连通的五阶有向图（参见清单\
