  md: "# 8.7 The RANKEDPAIRS Ranking Rule\n\nN. Tideman's ranking-by-choosing heuristic,\
    \ the RANKEDPAIRS rule, working best this time on the non-strict outranking digraph\
    \ g, is based on a prudent incremental construction of linear orders that avoids\
    \ on the fly any cycling outranking situations (Tideman 1987).\n\n**Algorithm\
    \ 8.5 The RANKEDPAIRS ranking rule**\n*in* : bipolar-valued digraph G(X, ≳).\n\
    *out* : linear ranking of the set X of decision actions.\n1. Rank the ordered\
    \ pairs (x, y) of alternatives in decreasing order of r(x ≳ y) + r(y ≳ x);\n2.\
    \ Consider the pairs in that order (ties are resolved by a lexicographic rule):\n\
    \   - if the next pair does not create a circuit with the pairs already blocked,\
    \ block this pair;\n   - if the next pair creates a circuit with the already blocked\
    \ pairs, skip it.\n\nWith our didactic outranking digraph g, we get the following\
    \ result.\n\n```\nListing 8.17 Computing a RANKEDPAIRS ranking\n1 >>> from linearOrders\
    \ import RankedPairsRanking\n2 >>> rp = RankedPairsRanking(g)\n3 >>> rp.showRanking()\n\
    4 ['a5', 'a6', 'a7', 'a3', 'a8', 'a9', 'a4', 'a1', 'a2']\n```\n\nThe RANKEDPAIRS\
    \ rule renders in our example here luckily one of the two optimal KEMENY ranking,\
    \ as we may verify below.\n\n```\n1 >>> ke.maximalRankings\n2 [['a5', 'a6', 'a7',\
    \ 'a3', 'a8', 'a9', 'a4', 'a1', 'a2'],\n3  ['a5', 'a6', 'a7', 'a3', 'a9', 'a4',\
    \ 'a1', 'a8', 'a2']]\n4 >>> corr = g.computeOrdinalCorrelation(rp)\n5 >>> g.showCorrelation(corr)\n\
    6  Correlation indexes:\n7    Extended Kendall tau       : +0.779\n8    Epistemic\
    \ determination    :  0.230\n9    Bipolar-valued equivalence : +0.179\n```\n\n\
    Similar to KOHLER's rule, the RANKEDPAIRS rule has also a prudent dual version,\
    \ the Dias-Lamboray ordering-by-choosing rule, which produces, when working this\
    \ time on the dual outranking digraph -g a similar ranking result (see Dias and\
    \ Lamboray 2010; Lamboray 2009).\n\nBesides of not providing a unique linear ranking,\
    \ the ranking-by-choosing rules, as well as their duals, the ordering-by-choosing\
    \ rules, are unfortunately not scalable to larger outranking digraphs (of orders\
    \ > 100). For such bigger outranking digraphs, with several hundred or thousands\
    \ of alternatives, only the COPELAND and the NETFLOWS ranking-by-scoring rules,\
    \ with a polynomial complexity of O(n²),"
