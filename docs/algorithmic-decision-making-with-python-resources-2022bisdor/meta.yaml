    ```\n\n在随机有向图 rd 包含的六个最大独立选择中，我们在对面页的清单 17.11 中发现了两个初始预核和两个终端预核。顺便注意一下 `showPreKernels()`\
    \ 方法（第 16、21、27 和 32 行）显示的覆盖度值（介于 0.0 和 1.0 之间）。这个值越高，相应的预核候选就越能明显地体现有向图的侧向性。在图\
    \ 17.5 中，同一个有向图 rd 通过其最佳覆盖度初始预核候选：优势选择 {a3, a4}（黄色）从内部观察，并通过其最佳被覆盖终端预核候选：吸收选择\
    \ {a1, a6}（蓝色）从外部观察，被重新绘制。\n\n```\n>>> rd.exportGraphViz(fileName='orientedLaterality',\n\
    ...                   firstChoice=set(['a3', 'a4']),\n...                   lastChoice=set(['a1',\
    \ 'a6']))\n*---- 导出用于 GraphViz 工具的 dot 文件 ----*\n导出至 orientedLaterality.dot\n\
    dot -Grankdir=BT -Tpng orientedLaterality.dot -o orientedLaterality.png\n```\n\
    \n正如所有合理的双极值优超有向图通常表现出一些侧向性——边际准则偏好并非完全相互矛盾——初始和终端预核分别提供了令人信服的首选和末选推荐，如第 4 章第\
    \ 41 页所述。\n\n## 17.4 计算首选和末选推荐\n\n为了说明这个想法，让我们最后在清单 17.12 中计算一个随机双极值优超有向图的首选和末选推荐。\n\
    \n### 清单 17.12 生成一个随机双极值优超有向图\n\n```\n>>> from outrankingDigraphs import\n...\
    \                     RandomBipolarOutrankingDigraph\n>>> g = RandomBipolarOutrankingDigraph(seed=5)\n\
    >>> g\n  *------- 对象实例描述 ------*\n  实例类    : RandomBipolarOutrankingDigraph\n\
    \  实例名称     : randomOutranking\n  行动           : 7\n  准则          : 7\n  规模  \
    \            : 26\n  确定性度   : 34.275\n  估值域  : {'min': -100.0, 'med': 0.0, 'max':\
    \ 100.0}\n>>> g.showHTMLPerformanceTableau()\n```\n\n图 17.6 所示的关联随机性能表显示了 7 个潜在决策方案相对于\
    \ 7 个决策准则的性能评估，每个准则支持一个从 0.0 到 100.0 的递增性能尺度。注意决策方案 a2 和 a5 缺失的性能数据。由此产生的*严格优超*——即由加权多数支持的*优于且无显著反性能*——有向图显示在下一页的图\
    \ 17.7 中。\n\n```\n>>> gcd = ~(-g)  # 余对偶：否定的逆\n>>> gcd.exportGraphViz(fileName='tutOutRanking')\n\
    \  *---- 导出用于 GraphViz 工具的 dot 文件 ----*\n  导出至 tutOutranking.dot\n  dot -Grankdir=BT\
    \ -Tpng tutOutranking.dot -o tutOutranking.png\n```\n\n### 性能表 randomOutranking\n\
    \n| 准则 | g1 | g2 | g3 | g4 | g5 | g6 | g7 |\n|---|---|---|---|---|---|---|---|\n\
    | a1 | 64.90 | 1.31 | 13.88 | 98.24 | 94.10 | 14.57 | 31.00 |\n| a2 | NA | NA\
    \ | 61.75 | 87.24 | 69.06 | 6.51 | 81.85 |\n| a3 | 11.32 | 27.95 | 12.67 | 28.93\
    \ | 96.66 | 30.14 | 48.07 |\n| a4 | 46.91 | 91.63 | 0.18 | 96.15 | 89.37 | 60.31\
    \ | 31.58 |\n| a5 | NA | 76.57 | 87.14 | 53.92 | 29.88 | 0.34 | 48.12 |\n| a6\
    \ | 54.38 | 15.96 | 20.95 | 67.78 | 36.12 | 67.79 | 70.47 |\n| a7 | 57.39 | 79.71\
    \ | 21.55 | 20.48 | 16.60 | 33.79 | 5.70 |\n\n图 17.6 一个随机优超有向图实例的性能表\n\n**图 17.7**\
    \ *一个随机严格优超有向图实例。* 所有决策方案都严格优于方案 a7。我们称其为孔多塞失败者，它是一个明显的终端预核候选。另一方面，三个方案：a1、a2\
    \ 和 a4 未被支配。它们共同构成一个初始预核候选。\n\n### 清单 17.13 计算严格优超有向图 gcd 的预核\n\n```\n>>> gcd.showPreKernels()\n\
    *--- 计算预核 ---*\n  优势预核 :\n    ['a1', 'a2', 'a4']\n      独立性 :  0.00\n      优势度\
    \    :  6.98\n      吸收度   : -48.84\n      覆盖度     :  0.667\n  吸收预核 :\n    ['a3',\
    \ 'a7']\n      独立性 :  0.00\n      优势度    : -74.42\n      吸收度   :  16.28\n    \
    \  被覆盖度      :  0.800\n```\n\n由于存在这样唯一的不相交初始和终端预核（见清单 17.13 中的第 4 行和第 10 行），随机有向图\
    \ gcd 显然具有侧向性。实际上，余对偶优超有向图的这些初始和终端预核揭示了基于给定优超有向图实例可以制定的*首选*和*末选*推荐。\n\n### 清单\
    \ 17.14 从有向图 gcd 计算首选和末选推荐\n\n```\n>>> g.showBestChoiceRecommendation()\nRubis\
    \ 最佳选择推荐 (BCR)\n  （按确定性度降序排列）\n  可信度域: [-100.00,100.00]\n  === >> 潜在首选\n    *\
    \ 选择                    : ['a1', 'a2', 'a4']\n      独立性              : 0.00\n\
    \      优势度                 : 6.98\n      吸收度                : -48.84\n      覆盖度\
    \ (%)              : 66.67\n      确定性度 (%)        : 57.97\n      - 最可信行动 =\n \
    \                               {'a4': 20.93,'a2': 20.93}\n  === >> 潜在末选\n   \
    \ * 选择                    : ['a3', 'a7']\n      独立性              : 0.00\n    \
    \  优势度                 : -74.42\n      吸收度                : 16.28\n      被覆盖度\
    \ (%)               : 80.00\n      确定性度 (%)        : 64.62\n      - 最可信行动 = {\
    \ 'a7': 48.84, }\n```\n\n注意前一页清单 17.14 中的第 13 行和第 21 行，求解赋值核方程组进一步提供了每个相应选择推荐中最可信决策方案的正面特征。方案\
    \ a2 和 a4 是唯一*首选*的等效候选，而方案 a7 则被明确确认为*末选*。\n\n在图 17.8 中，我们借助这些首选和末选推荐来调整严格优超有向图实例的绘制方向。\n\
    \n```\n>>> gcd.exportGraphViz(fileName='firstLastOrientation',\n...          \
    \           firstChoice=['a2','a4'],\n...                     lastChoice=['a7'])\n\
    *----- 导出用于 GraphViz 工具的 dot 文件 -----*\n导出至 firstLastOrientation.dot\ndot -Grankdir=BT\
    \ -Tpng firstLastOrientation.dot -o firstLastOrientation.png\n```"
