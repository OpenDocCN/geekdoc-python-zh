    | q[i] | 0 | 0 | 2 | 1 | 1 | 3 | 2 |

    | Q[i] | 0 | 0 | 2 | 3 | 4 | 7 | 9 |


    Let us denote by $-q$ and $-Q$ the reversed versions of the $q$ and the $Q$ lists.
