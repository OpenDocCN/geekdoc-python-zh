    ## Listing 20.8 Example of non-obvious secondary selection\n\n```\n>>> lvp.computeSimpleMajorityWinner()\n\
    ['c2']\n>>> lvp.computeInstantRunoffWinner()\n['c6']\n>>> from votingProfiles\
    \ import MajorityMarginsDigraph\n>>> cg = MajorityMarginsDigraph(lvp)\n>>> cg.showRelationTable(ReflexiveTerms=False)\n\
    * ---- Relation Table -----\nr() | 'c1' 'c2' 'c3' 'c4' 'c5' 'c6' 'c7'\n----|------------------------------------\n\
    'c1' | - -68 -90 -46 -68 -88 -84\n'c2' | +68 - -32 +80 +46 -6 -24\n'c3' | +90\
    \ +32 - +58 +46 +4 +8\n'c4' | +4 -80 -58 - -16 -68 -72\n'c5' | +68 -46 -46 +16\
    \ - -26 -64\n'c6' | +88 +6 -4 +68 +26 - -2\n'c7' | +84 +24 -8 +72 +64 +2 -\nValuation\
    \ domain: [-500;+500]\n>>> cg.computeCondorcetWinners()\n['c3']\n>>> lvp.computeBordaWinners()\n\
    ['c3','c7']\n>>> cg.computeCopelandRanking()\n['c3', 'c7', 'c6', 'c2', 'c5', 'c4',\
    \ 'c1']\n```\n\nBut in our example here, we are lucky. When constructing with\
    \ the pairwise majority margins digraph (Line 6), a CONDORCET winner, namely c3,\
    \ becomes apparent (Lines 13 and 20), which is also one of the two BORDA winners\
    \ (Line 22). More interesting even is to notice that the apparent majority margins\
    \ digraph models in fact a linear ranking [c3, c7, c6, c2, c5, c4, c1] of all\
    \ the eligible candidates, as shown with a COPELAND ranking rule (Line 24).\n\n\
    In Fig. 20.2, this linear ranking is shown with a graphviz drawing where all transitive\
    \ arcs are dropped and the drawing is oriented with the CONDORCET winner c3 and\
    \ loser c1 (Line 3 below).\n\n```\n>>> cg.closeTransitive(Reverse=True)\n>>> cg.exportGraphViz('divGraph',\n\
    ... firstChoice=['c3'],lastChoice=['c1'])\n*---- exporting a dot file for GraphViz\
    \ tools ----------*\nExporting to divGraph.dot\ndot -Grankdir=BT -Tpng divGraph.dot\
    \ -o divGraph.png\n```\n\n## 20.2 Bipolar Approval–Disapproval Voting Systems\n\
    \nFig. 20.2 The linear ranking modelled by the majority margins digraph\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_308_0.png)\n\
    \nTraditionally, most of the voting systems in use in the world do only collect\
    \ approval votes and abstentions, dismissing potentially strong disapproval opinions,\
    \ not to be assimilated to voting abstentions. Collecting both explicit approvals\
    \ (+1) and explicit disapprovals (−1) essentially enriches the expression of voters’\
    \ preferences.\n\nIn the votingProfiles module, we provide a BipolarApprovalVotingProfile\
    \ class for handling voting results where, for each eligible Candidate x, the\
    \ voters are invited to approve (+1), disapprove (−1), or ignore (0) the statement\
    \ that Candidate c should win the election (Baujard et al. 2013).\n\nFile bpApVotingProfile.py\
    \ contains an example of such an approval–disapproval voting profile concerning\
    \ 100 voters and 15 eligible candidates.¹ We can inspect its content with the\
    \ BipolarApprovalVotingProfile class:\n\n### Listing 20.9 Bipolar approval voting\
    \ profiles\n\n```\n>>> from votingProfiles import \\\n...                    \
    \ BipolarApprovalVotingProfile\n>>> bavp = BipolarApprovalVotingProfile('bpApVotingProfile')\n\
    >>> bavp\n  *------- VotingProfile instance description -------*\n    Instance\
    \ class   : BipolarApprovalVotingProfile\n    Instance name    : bpApVotingProfile\n\
