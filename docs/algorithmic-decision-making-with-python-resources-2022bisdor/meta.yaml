    \ the ordinal quality of the COPELAND ranking\n\n```\n>>> corr = g.computeRankingCorrelation(cop.copelandRanking)\n\
    >>> g.showCorrelation(corr)\nCorrelation indexes:\n  Crisp ordinal correlation\
