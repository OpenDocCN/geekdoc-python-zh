    Computing the *dual*, respectively, the *converse* of a digraph, may also be done
    with prefixing the `__neg__` (`-`) or the `__invert__` (`~`) operator. The *codual*
    of a Digraph object can, hence, as well be computed with a *composition* (in either
    order) of both operations (see Line 3 below).


    **Listing 2.8** Computing the dual, the converse, and the codual of a digraph


    ```

    1 >>> ddg = -rdg   # dual of rdg

    2 >>> cdg = ~rdg   # converse of rdg

    3 >>> cddg = ~(-rdg) # = -(~(rdg) codual of rdg

    4 >>> (~(-rdg)).showRelationTable()

    5  * ---- Relation Table ----

    6  -r(y&x) |  ''1''    ''2''    ''3''    ''4''    ''5''    ''6''    ''7''

