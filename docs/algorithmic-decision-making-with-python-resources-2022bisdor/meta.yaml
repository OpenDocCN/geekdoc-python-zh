    It is important to notice that a ranking by weighted average scores requires *commensurable
    ranking criteria* of precise decimal significance and on which precise decimal
    performance evaluations are given. It is very unlikely that the THE 2016 performance
    assessments verify indeed these conditions. Here we show how to relax these methodological
    requirements—precise commensurable criteria and decimal evaluations—by following
    instead a bipolar-valued epistemic logic based ranking methodology (see Chap.
    8).'
