  - '[PAGE 143]


    # Chapter 9

    Rating by Sorting into Relative

    Performance Quantiles


    ![](img/16b49f4bd7a0e5e8eab9001001a6dc21_143_0.png)


    # Contents


    +   9.1 Quantile Sorting on a Single Performance Criterion 115

    9.2 Sorting into Quantiles with Multiple Performance Criteria 116

    9.3 The Sparse Pre-ranked Outranking Digraph Model 120

    9.4 Ranking Pre-ranked Sparse Outranking Digraphs 123


    Abstract In this chapter, we apply order statistics for sorting a set $X$ of $n$
    potential decision alternatives, evaluated on $m$ incommensurable performance
    criteria, into $q$ quantile equivalence classes. The sorting algorithm is based
    on pairwise outranking characteristics involving the quantile class limits observed
    on each criterion. Thus we may implement a weak ordering algorithm of complexity
    $O(nmq)$.


    # 9.1 Quantile Sorting on a Single Performance Criterion


    A single criterion sorting category $K$ is a (usually) lower-closed interval $[m_k;
    M_k[$ on a real-valued performance measurement scale, with $m_k \le M_k$. If $x$
    is a measured performance on this scale, we may distinguish three sorting situations:


    +   1. $x < m_k$ and $x < M_k$: The performance $x$ is lower than category $K$.

    2. $x \ge m_k$ and $x < M_k$: The performance $x$ belongs to category $K$.

    3. $x > m_k$ and $x \ge M_k$: The performance $x$ is higher than category $K$.


    As the relation $<$ is the dual of $\ge (\not\ge)$, it will be sufficient to check
    that $x \ge m_k$ as well as $x \not\ge M_k$ are true for $x$ to be considered
    a member of category $K$.

    Upper-closed categories (in a more mathematical integration style) may as well
    be considered. In this case it is sufficient to check that $m_k \not\ge x$ as
    well as $M_k \ge x$ are true for $x$ to be considered a member of category $K$.
    It is worthwhile noticing that a category $K$ such that $m_k = M_k$ is hence always
    empty by definition. In order to be able to properly sort over the complete range
    of values to be sorted, we will need to use a special, two-sided closed last,
    respectively first, category.'
  - '[PAGE 144]


    Let $K = K_1, ..., K_q$ be a non-trivial partition of the criterion''s performance
    measurement scale into $q \ge 2$ ordered categories $K_k$—i.e. lower-closed intervals
    $[m_k; M_k[$—such that $m_k < M_k$, $M_k = m_{k+1}$ for $k = 0, ..., q - 1$ and
    $M_q = \infty$. And, let $A = \{a_1, a_2, a_3, ...\}$ be a finite set of not all
    equal performance measures observed on the scale in question.


    **Property** For all performance measure $x \in A$ there exists now a unique $k$
    such that $x \in K_k$. If we assimilate, like in descriptive statistics, all the
    measures gathered in a category $K_k$ to the central value of the category—i.e.
    $(m_k + M_k)/2$—the sorting result will hence define a weak order (complete preorder)
    on $A$.


    Let $Q = \{Q_0, Q_1, ..., Q_q\}$ denote the set of $q + 1$ increasing order-statistical
    quantiles—like quartiles or deciles—we may compute from the ordered set $A$ of
    performance measures observed on a performance scale. If $Q_0 = \min(X)$, the
    following intervals: $[Q_0; Q_1[$, $[Q_1; Q_2[$, ..., $[Q_{q-1}; \infty[$ define
    a set of $q$ lower-closed sorting categories. And, in the case of upper-closed
    categories, if $Q_q = \max(X)$, we obtain the intervals $]-\infty; Q_1]$, $]Q_1;
    Q_2]$, ..., $]Q_{q-1}; Q_q]$. The corresponding sorting of $A$ will result, in
    both cases, in a repartition of all measures $x$ into the $q$ quantile categories
    $K_k$ for $k = 1, ..., q$.


    **Example** Let $A = \{ a_7 = 7.03, a_{15} = 9.45, a_{11} = 20.35, a_{16} = 25.94,
    a_{10} = 31.44, a_9 = 34.48, a_{12} = 34.50, a_{13} = 35.61, a_{14} = 36.54, a_{19}
    = 42.83, a_5 = 50.04, a_2 = 59.85, a_{17} = 61.35, a_{18} = 61.61, a_3 = 76.91,
    a_6 = 91.39, a_1 = 91.79, a_4 = 96.52, a_8 = 96.56, a_{20} = 98.42 \}$ be a set
    of 20 increasing performance measures observed on a given criterion. The lower-closed
    category limits we obtain with quartiles ($q = 4$) are: $Q_0 = 7.03 = a_7$, $Q_1
    = 34.485$, $Q_2 = 54.945$ (median performance), and $Q_3 = 91.69$. And the sorting
    into these four categories defines on $A$ a complete preorder with the following
    four equivalence classes: $K_1 = \{a_7, a_{10}, a_{11}, a_{10}, a_{15}, a_{16}\}$,
    $K_2 = \{a_5, a_9, a_{13}, a_{14}, a_{19}\}$, $K_3 = \{a_2, a_3, a_6, a_{17},
    a_{18}\}$, and $K_4 = \{a_1, a_4, a_8, a_{20}\}$.


    # 9.2 Sorting into Quantiles with Multiple Performance Criteria


    Let us now suppose that we are given a performance tableau with a set $X$ of $n$
    decision alternatives evaluated on a coherent family of $m$ performance criteria
    associated with the corresponding outranking relation $\succsim$ defined on $X$.
    We denote $x_j$ the performance of alternative $x$ observed on criterion $j$.


    Suppose furthermore that we want to sort the decision alternatives into $q$ upper-closed
    quantile equivalence classes. We therefore consider a series : $k = k/q$ for $k
    = 0, ..., q$ of $q + 1$ equally spaced quantiles, like quartiles: 0, 0.25, 0.5,
    0.75, 1; quintiles: 0, 0.2, 0.4, 0.6, 0.8, 1: or deciles: 0, 0.1, 0.2, ..., 0.9,
    1, for instance.'
  - '[PAGE 145]


    The upper-closed $\mathbf{q}^k$ class corresponds to the $m$ quantile intervals
    $]q_j(p_{k-1}); q_j(p_k)]$ observed on each criterion $j$, where $k = 2, \dots,
    q$, $q_j(p_q) = \max_X(x_j)$, and the first class gathers all performances below
    or equal to $Q_j(p_1)$.


    The lower-closed $\mathbf{q}_k$ class corresponds to the $m$ quantile intervals
    $[q_j(p_{k-1}); q_j(p_k[$ observed on each criterion $j$, where $k = 1, \dots,
    q-1$, $q_j(p_0) = \min_X(x_j)$, and the last class gathers all performances above
    or equal to $Q_j(p_{q-1})$.


    We call **q-tiles** a complete series of $k = 1, \dots, q$ upper-closed $\mathbf{q}^k$,
    respectively, lower-closed $\mathbf{q}_k$, multiple-criteria quantile classes.


    **Property** With the help of the bipolar-valued characteristic of the outranking
    relation $r(x \succsim y)$ we may compute as follows the bipolar-valued characteristic
    of the assertion: $x$ belongs to upper-closed $q$-tiles class $\mathbf{q}^k$ class,
    respectively, lower-closed class $\mathbf{q}_k$ (Bisdorff 2020):


    $$r(x \in \mathbf{q}^k) = \min[-r(\mathbf{q}(p_{k-1}) \succsim x), r(\mathbf{q}(p_k)
    \succsim x)] \quad (9.1)$$

    $$r(x \in \mathbf{q}_k) = \min[r(x \succsim \mathbf{q}(p_{k-1})), -r(x \succsim
    \mathbf{q}(p_k))] \quad (9.2)$$


    The $\min$ operator implements the logical conjunction and, the outranking relation
    $\succsim$ verifying the coduality principle, $-r(\mathbf{q}(p_{k-1}) \succsim
    x) = r(\mathbf{q}(p_{k-1}) \prec x)$, respectively, $-r(x \succsim \mathbf{q}(p_k))
    = r(x \prec \mathbf{q}(p_k))$.


    The QuantilesSortingDigraph class from the sortingDigraphs module can compute,
    for instance, such a quintiling of a given random performance tableau (Bisdorff
    2021).


    **Listing 9.1** Computing a quintiles sorting result


    ```

    >>> from randomPerfTabs import RandomPerformanceTableau

