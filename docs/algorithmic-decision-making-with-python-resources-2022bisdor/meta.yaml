    Positive characteristic values indicate the presence of an arc whereas negative
    ones indicate their absence. 0.0 values indicate an indeterminate situation: there
    may be or not be an arc (see Listing 2.2 on the facing page Lines 5–11). Mind
    that some Digraph class methods will ignore the reflexive links by considering
    that they are indeterminate, i.e. the characteristic value r(x S x) for all action
    x is set to the median, i.e. indeterminate value 0.0 in this case (Bisdorff 2004).


