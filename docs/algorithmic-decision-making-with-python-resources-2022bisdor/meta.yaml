    Readers interested in the technical aspects of the organisation and implementation
    of the collection of DIGRAPH3 Python modules are invited to consult the extensive
    reference manual: https://digraph3.readthedocs.io/en/latest/techDoc.html, assisted
    by a search page https://digraph3.readthedocs.io/en/latest/search.html covering
    the whole DIGRAPH3 documentation.


    # Organisation of the Book


    The content of the monograph is divided into five parts.


    **Part I** presents three chapters introducing the DIGRAPH3 programming resources
    and the main formal objects discussed in this book, namely *bipolar-valued digraphs*
    and, in particular, *outranking digraphs*.


    In Chap. **1**, the reader will gain contact with the DIGRAPH3 Python resources.
    First are given the installation instructions and the list of the main DIGRAPH3
    Python modules with their purpose. A Python terminal session using the root *digraphs*
    module eventually illustrates how to generate, save and inspect a random crisp
    digraph.


    Chapter **2** introduces the bipolar-valued digraph model—the root type of all
    our digraph models. A randomly bipolar-valued digraph instance is generated. Drawing
    the digraph, separating its asymmetric and symmetric parts, or its border and
    inner parts, is illustrated. The initial digraph instance may be reconstructed
    by epistemic disjunctive fusion from these respective parts. Dual, converse and
    co-dual transforms as well as symmetric and transitive closures are presented.
    Complete, empty and indeterminate digraphs are eventually presented.


    Chapter **3** presents the bipolar-valued outranking digraph—the main formal object
    used and discussed in this monograph. We first notice its hybrid type: it is conjointly
    a multiple-criteria performance tableau and a bipolar-valued relation modelling
    outranking situations between the given performance records. Pairwise comparisons
    of decision alternatives and the recording of the digraph characteristic valuation
    are then illustrated. The co-dual transform of the outranking digraph renders
    the corresponding strict outranking digraph, i.e. its asymmetric part.


    **Part II** illustrates in eight methodological chapters multiple-criteria performance
    evaluation models and decision algorithms. These chapters are mostly problem oriented.


    Chapter **4** presents the RUBIS best choice recommender system. The approach
    is illustrated with building a best office-location recommendation. We show how
    to explore a given performance tableau and compute the corresponding outranking
    digraph. After presenting the pragmatic principles that govern our best choice
    recommendation algorithm we solve the best office-location choice problem.


    Chapter **5** illustrates a way of creating a new multiple-criteria performance
    tableau by editing a given template file containing five decision alternatives,
    three'
  merge: -1
  pgno: 10
- img_proc: true
  md: 'decision objectives and six performance criteria. We discuss in detail how
    to edit the decision alternatives, the decision objectives, the family of performance
    criteria, and, finally, the evaluations of the decision alternatives on the performance
    criteria.


    Chapter 6 describes the DIGRAPH3 resources for generating random multiple-criteria
    performance tableaux. These random performance tableaux instances, mainly meant
    for illustration and training purposes, were serving the preparation and illustration
    of the algorithmic decision theory course lectures. The random generators propose
    several useful models like a cost-benefit tableau, a three objectives—economic,
    societal and environmental—tableau, and an academic performance tableau.


    Chapter 7 is more specifically devoted to handling linear voting profiles and
    computing the winner of such election results like the simple majority or the
    instant runoff winner. By following CONDORCET’s recipe, we consider pairwise comparisons
    of election candidates and balance the number of times the first beats the second
    against the number of times the second beats the first in order to obtain a majority
    margins digraph, in fact a bipolar-valued digraph. When the voters express contradictory
    linear voting profiles, one may naturally observe cyclic social preferences without
    seeing any paradox in this situation. Finally, the chapter presents a more politically
    realistic generator for random linear voting profiles by taking into account pre-election
    polls.


    Chapter 8 introduces several algorithms for solving multiple-criteria ranking
    problems via bipolar-valued outranking digraphs. The COPELAND, NETFLOWS, KEMENY,
    SLATER, KOHLER and the RANKEDPAIRS ranking rules are illustrated with the help
    of a random outranking digraph. The fitness of their respective ranking result
    is measured with a bipolar-valued version of KENDALL’s ordinal correlation index.


    Chapter 9 applies order statistics for sorting a set $X$ of $n$ potential decision
    alternatives, evaluated on $m$ incommensurable performance criteria, into $q$
    quantile equivalence classes. The sorting algorithm is based on pairwise outranking
    characteristics involving the quantile class limits observed on each criterion.
    Thus, we may implement a weak ordering algorithm of complexity $O(nmq)$.


    Chapter 10 addresses the problem of rating multiple-criteria performance records
    of a set of potential decision alternatives with respect to performance quantiles
    learned from similar decision alternatives observed in the past. We show how to
    incrementally compute performance quantiles from incoming performance tableaux.
    New performance records may now be rated with respect to such historical quantile
    norms.


    Chapter 11 tackles the ranking of big multiple-criteria performance tableaux with
    thousands or millions of records. To effectively compute rankings from performance
    tableaux of these sizes, the chapter proposes a collection of C-compiled and optimised
    modules that may be run on Linux Debian HPC clusters as available, for instance,
    at the University of Luxembourg.


    **Part III** delivers three realistic algorithmic decision-making case studies.


    Chapter 12 presents a case study concerning the building of a best choice recommendation
    for Alice, a German student who wants some advice concerning the'
  merge: -1
  pgno: 11
- img_proc: true
  md: 'choice of her future university studies. We present Alice’s performance tableau—potential
    foreign language study programs, her decision objectives, performance criteria
    and performance evaluations—and build a best choice recommendation for her. A
    thorough robustness analysis confirms a very best choice.


    In Chap. 13 we are resolving with our DIGRAPH3 resources a ranking decision problem
    based on published data from the Times Higher Education (THE) World University
    Rankings 2016 by Computer Science (CS) subject. We first have a look into the
    THE multiple-criteria ranking data with short Python scripts. In a second section,
    we relax the commensurability hypothesis of the ranking criteria and show how
    to similarly rank with multiple incommensurable performance criteria of solely
    ordinal significance. A third section is finally devoted to introduce quality
    measures for qualifying ranking results.


    Chapter 14 presents and discusses how to rate with the help of our DIGRAPH3 resources
    the apparent student enrolment quality of higher education institutions. The multiple-criteria
    performance tableau we use is inspired by a 2004 student survey published by DER
    SPIEGEL magazine and concerning nearly 50,000 students, enrolled in 1 of 15 popular
    academic subjects, like German studies, life sciences, psychology, law or computer
    science.


    In Chap. 15, we propose a series of decision problems of various difficulties
    which may serve as exercises and exam questions for an algorithmic decision theory
    or multiple-criteria decision analysis course. They cover selection, ranking and
    rating problems.


    **Part IV** presents in five chapters more advanced topics showing some pearls
    of bipolar-valued epistemic logic.


    Starting from a motivating decision problem about how to list, from the best to
    the worst, a set of movies that are star-rated by journalists and movie critics,
    Chap. 16 shows that KENDALL’s ordinal correlation index tau can be extended to
    a relational bipolar-valued equivalence measure of bipolar-valued digraphs. This
    finding gives way, on the one hand, to measure the fitness and fairness of multiple-criteria
    ranking rules. On the other hand, it provides a tool for illustrating preference
    divergences between decision objectives and/or performance criteria.


    We illustrate in Chap. 17, first, the concept of graph kernel, i.e. maximal independent
    set of vertices. In non-symmetric digraphs, the kernel concept becomes richer
    and separates into initial and terminal kernels. In, furthermore, lateralized
    outranking digraphs, initial and terminal kernels become separate may deliver
    first, respectively last, choice recommendations. After commenting the tractability
    of kernel computations, we close the chapter with the solving of bipolar-valued
    kernel equation systems.


    In Chap. 18 we propose to link a qualifying significance majority for outranking
    situations with a required α%-confidence level. We model therefore the significance
    weights as random variables following more or less widespread distributions around
    a mean value that corresponds to the given deterministic significance weights.
    As the bipolar-valued random credibility of an outranking situation hence results
    from the simple sum of positive or negative independent random variables, we can
    apply'
  merge: -1
  pgno: 12
- img_proc: true
  md: 'the central limit theorem (CLT) for computing the bipolar-valued likelihood
    that the expected significance majority margin will indeed be positive, respectively
    negative.


    In Chap. 19, we study the robustness of the outranking digraph when the criteria
    significance weights faithfully indicate solely an order of importance. The required
    cardinal significance weights of the performance criteria represent actually the
    ‘Achilles’ heel of the outranking approach. Rarely will indeed a decision maker
    be cognitively competent for suggesting precise decimal-valued criteria significance
    weights. This approach leads furthermore to the concept of unopposed or Pareto
    efficient multi-objective choices.


    In a social choice context, where decision objectives would match different political
    parties, such Pareto efficient choices represent in fact multipartisan social
    choices. Chapter 20 shows that they may judiciously deliver the primary selection
    in a two-stage election system. The outranking model is based on bipolar approvals-disapprovals
    of “at least as well evaluated as” statements. A similar approach is put into
    practice with bipolar approval-disapproval voting systems. When converting such
    approval-disapproval voting ballots into corresponding performance records, one
    obtains a (−1, 0, 1)-valued evaluative voting system. We eventually show in this
    chapter that, in such bipolar voting systems, the election winner tends to be
    among the more or less multipartisan candidates.


    **Part V** illustrates in three chapters computational resources for working with
    simple undirected graphs.


    Chapter 21 introduces bipolar-valued undirected graphs and illustrates several
    special graph models and algorithms like Q-coloring, maximal independent set (MIS)
    and clique enumeration, line graphs and maximal matchings, grid graphs, and n-cycle
    graphs with their non-isomorphic MISs.


    Chapter 22 specifically addresses working with tree graphs and graph forests.
    We illustrate how to generate and recognise random tree graphs and how to compute
    the centres of a tree and draw a rooted and oriented tree. Finally, algorithms
    for computing spanning trees and forests are presented.


    Chapter 23 eventually presents some famous classes of BERGE graphs, namely comparability,
    interval, permutation and split graphs. We first present an example of an interval
    graph which is at the same time a triangulated, a comparability, a split and a
    permutation graph. The importance of being an interval graph is illustrated with
    *Claude Berge*’s mystery story. We discuss furthermore the generation of permutation
    graphs and close with how to recognise that a given graph is in fact a permutation
    graph.


    # Highlights


    Contrary to what is generally thought, it is the preparation of the multiple-criteria
    performance tableau that takes most of the decision analysis time, not running
    any decision algorithms. Designing adequate performance evaluating criteria functions
    for each decision objective and collecting meaningful and precise evaluations
    is'
  merge: -1
  pgno: 13
- img_proc: true
  md: 'crucial for the success of the decision-making. This is a very critical and
    essential step. Chapters 4, 5 and 12 illustrate and discuss in detail coherent
    multiple-criteria performance tableaux. In order to discover more examples of
    potential performance tableaux, we provide in Chap. 6 random generators for several
    common kinds of performance tableaux.


    Once the multiple-criteria performance tableau is ready, the thrilling step of
    discovering the resulting outranking relation starts. Are there many chordless
    outranking circuits? What is its degree of symmetry? What is its degree of transitivity?
    If the number of potential decision alternatives is small—less than 30—one can
    try, in the case of a selection problem, to compute prekernels in order to find
    potential first- or last-choice decision alternatives? Chapters 4, 12 and 17 are
    illustrating and discussing this challenging computational problem.


    Comparing various ranking rules working on bipolar-valued outranking relations
    constructed from performance tableaux of various kinds, cost-benefit, 3-objectives
    and academic a.-o., has made us confident about the fact that convincing criteria
    for judging the quality of a ranking result may not to be found alone by mathematical
    properties, like KEMENY optimality or CONDORCET consistency. More useful seems
    to be the fair balancing of decision objectives and performance criteria. In this
    respect, it is the NETFLOWS ranking rule which appears to be most effective and
    often gives fairly balanced multiple-criteria rankings. Chapter 8 on ranking rules,
    the ranking and rating case studies of Chaps. 13 and 14, and Chap. 16 on bipolar-valued
    relational equivalence of digraphs illustrate and discuss this important topic.


    The bipolar-valued epistemic logic, in which our decision algorithms are computing
    and expressing their decision solutions, provides effective assistance for coping
    with missing data and imprecise performance evaluations. Chapters 14 and 16 illustrate
    this advantage. An efficient robustness analysis becomes furthermore available
    for handling, on the one side, uncertain criteria significance weights leading
    in Chap. 18 to α%-confident outranking digraphs. On the other side, Chap. 19 illustrates
    how to compute robust outranking digraphs and decision solutions when solely ordinal
    criteria significance weights are given. In Chap. 20, the same kind of robustness
    analysis proposes strategies for tempering plurality tyranny effects in social
    choice problems by favouring multipartisan candidates, like two-stage elections
    with multipartisan primary selection of candidates or bipolar approval-disapproval
    voting systems.


    Noticing the efficiency of the bipolar-valued epistemic logical framework for
    handling outranking digraphs, we could not resist making in Chaps. 21 and 22 an
    excursion into the domain of simple undirected graphs and tree graphs. The beautiful
    book *Algorithmic Graph Theory and Perfect Graphs* by M. Ch. Golumbic gave eventually
    the opportunity to tackle in the last chapter some famous classes of BERGE graphs.'
