    The least attractive for her appear to be studies at the Chamber of Commerce of
    Köln (C-HKK, S-HKK). Notice by the way that evaluations on performance criteria
    to be minimised, like Distance to Home (criterion DH) or Study time (criterion
    SL), are registered as negative values, so that smaller measures are, in this
    case, preferred to larger ones.


    It is finally interesting to observe in Fig. 12.3 (third row) that the most significant
    performance criteria, appear to be for Alice, on the one side, the Attractiveness
    of the study program (criterion AS, tau = +0.72) followed by the Attractiveness
    of the future profession (criterion AP, tau = +0.62). On the other side, Study
    times (criterion SL, tau = -0.24), Big city (criterion BC, tau = -0.07) as well
    as Monthly living costs (criterion LC, tau = -0.04) appear to be not so significant
    (see Chap. 16).


    ## 12.3 Building a Best Choice Recommendation


    Let us now have a look at the resulting pairwise outranking situations.


    Listing 12.2 Computing Alice''s outranking digraph


    ```

    >>> from outrankingDigraphs import BipolarOutrankingDigraph

