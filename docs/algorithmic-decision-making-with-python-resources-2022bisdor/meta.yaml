    On Computing Digraph Kernels


    ![](img/16b49f4bd7a0e5e8eab9001001a6dc21_248_0.png)


    # ## Contents


    +   - 17.1 What Is a Graph Kernel? ................................................................
    225

    - 17.2 Initial and Terminal Kernels ................................................................
    228

    - 17.3 Kernels in Lateralized Digraphs ................................................................
    232

    - 17.4 Computing First and Last Choice Recommendations ................................................................
    236

    - 17.5 Tractability of Kernel Computation ................................................................
    239

    - 17.6 Solving Kernel Equation Systems ................................................................
    242


    **Abstract** We illustrate in this chapter, first, the concept of graph kernel,
    i.e. maximal independent set of vertices. In non-symmetric digraphs, the kernel
    concept becomes richer and separates into initial and terminal kernels. In, furthermore,
    lateralised outranking digraphs, initial and terminal kernels become separate
    and may deliver suitable first and, respectively, last choice recommendations.
    After commenting the tractability of kernel computations, we close the chapter
    with the solving of bipolar-valued kernel equation systems.


    # ## 17.1 What Is a Graph Kernel?


    We call *choice* in a graph, respectively, a digraph, a subset of its vertices,
    respectively, of its nodes or actions. A choice $Y$ is called *internally stable*
    or *independent* when there exist no links—(edges) or relations (arcs)—between
    its members. Furthermore, a choice $Y$ is called *externally stable* when for
    each vertex, node or action $x$ not in $Y$, there exists at least a member $y$
    of $Y$ such that $x$ is linked or related to $y$. Now, an internally *and* externally
    stable choice is called a *kernel*.


    A first trivial example is immediately given by the maximal independent vertices
    sets (MISs) of the $n$-cycle graph (see Fig. 21.5 on page 317). Indeed, each MIS
    in the $n$-cycle graph is by definition independent, i.e. *internally stable*,
    and each non-selected vertex in the $n$-cycle graph is in relation with either
    one or even two members of the MIS.'
