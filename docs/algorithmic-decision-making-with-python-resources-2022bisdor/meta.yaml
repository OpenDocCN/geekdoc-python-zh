    In Listing 20.2, the linear voting profile lvp is first stored in PerformanceTableau
    format (see Line 1). In Line 3, the PerformanceTableau class reloads this stored
    performance tableau data. The three parties of the linear voting profile represent
    three decision objectives and the 1000 voters are distributed as 1000 performance
    criteria according to the party they support.


