    In our example voting profile here, the multipartisan primary selection stage
    appears quite effective in reducing the number of eligible candidates to four
    out of a set of 15 candidates without by the way rejecting the actual winning
    candidate.


    However, in a very *divisive* two major parties system, like in the USA, where
    preferences of the supporters of one major party are opposite to the preferences
    of the supporters of the other major party, the multipartisan outranking digraph
    will become nearly indeterminate.


    In Listing 20.6 below, we generate such a divisive kind of linear voting profile
    with the help of the DivisivePolitics flag (see Lines 4 and 14–20). When now converting
    the voting profile into a performance tableau (Lines 20-21), we can compute the
    corresponding unopposed outranking digraph.


