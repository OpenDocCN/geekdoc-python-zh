    # 22.4 Maximum Determined Spanning Forests


    In case of valued graphs—supporting weighted edges—we may finally construct a
    *most determined* spanning tree (or forest if not connected) using KRUSKAL’s greedy
    minimum spanning tree algorithm on the dual valuation of the graph (Kruskal 1956).¹


    In Listing 22.8, we generate, for instance, a randomly valued graph with five
    vertices and seven edges bipolar-valued in [-1.0; 1.0].


    Listing 22.8 Generating randomly bipolar-valued graphs


    ```

    1 >>> from graphs import RandomValuationGraph

    2 >>> g = RandomValuationGraph(order=5,seed=2)

    3 >>> g

    4   *------- Graph instance description ------*

    5   Instance class    : RandomValuationGraph

    6   Instance name     : randomGraph

    7   Graph Order       : 5

    8   Graph Size        : 7

    9   Valuation domain  : [-1.00; 1.00]

    10  Attributes        : [''name'', ''order'',

    11                      ''vertices'', ''valuationDomain'',

    12                      ''edges'', ''size'', ''gamma'']

    ```


    To inspect the edges’ actual weights, we transform in Listing 22.9 the random
    graph g into a corresponding digraph dg and use the showRelationTable() method
    for printing its symmetric adjacency matrix.


    Listing 22.9 Symmetric relation table


    ```

    1 >>> dg = g.graph2Digraph()

    2 >>> dg.showRelationTable()

    3   *---- Relation Table ----*

    4     S   |  ''v1''  ''v2''  ''v3''  ''v4''  ''v5''

    5   ------|---------------------------------

    6   ''v1''  |  0.00  0.91  0.90 -0.89 -0.83

    7   ''v2''  |  0.91  0.00  0.67  0.47  0.34

    8   ''v3''  |  0.90  0.67  0.00 -0.38  0.21

    9   ''v4''  | -0.89  0.47 -0.38  0.00  0.21

    10  ''v5''  | -0.83  0.34  0.21  0.21  0.00

    11  Valuation domain: [-1.00;1.00]

    ```


    To compute the most determined spanning tree or forest, we can use the Best-DeterminedSpanningForest
    class constructor.


    > ¹ KRUSKAL’s algorithm is a minimum spanning tree algorithm which finds an edge
    of the least possible weight that connects any two trees in the forest.'
