    \ 52.60 | 55.80 | 54.60 | NA |\n| 电气工程 | 56.10 | 54.50 | NA | 57.20 | NA |\n|\
    \ 机械工程 | 54.30 | 55.20 | NA | 54.40 | NA |\n\n在这个评级案例研究中，我们假设五所德国大学：U1、U2、U3、U4\
    \ 和 U5，在 2005 年对其在读学生进行了一项类似的调查，得出了以下各学术学科的入学质量得分。\n\n在表 14.1 中，十五个热门学术学科被归入主题“学院”：*人文学院、法学院、经济与管理学院、生命科学与医学院、自然科学与数学学院*以及*技术学院*。这五所大学中没有一所大学在所有十五个学科都有学生注册。例如，大学\
    \ U1 在生命科学与医学以及法学和政治学方面没有学生，而大学 U5 则不提供任何技术类学科。\n\n表 14.1 中显示的五所大学的平均入学质量得分，存储在一个名为\
    \ `ratingCaseStudy.py` 的 PerformanceTableau 格式文件中。¹ `showHTMLPerformanceTableau()`\
    \ 方法在下一页的图 14.1 中生成了这些绩效记录的彩色浏览器视图。\n\n```\n>>> from perfTabs import PerformanceTableau\n\
    >>> pt = PerformanceTableau('ratingCaseStudy')\n>>> pt.showHTMLPerformanceTableau(Transposed=True,\n\
    ...                                title='Average enrolment scores')\n```\n\n\
    大学 U5 在十五个学科中的九个学科中得分最高，呈现出五所大学中最高的整体入学质量，而大学 U3 有五个最低得分，显示出五所大学中最低的学生入学质量。\n\n\
    大学管理部门现在想知道，考虑到 2004 年《明镜周刊》调查的结果，他们各自的入学质量得分应如何评价。他们是属于顶尖大学、中游，还是垫底群体？\n\n¹ 该文件可在\
    \ DIGRAPH3 资源的示例目录中找到。\n\n## 14.2 2004 年绩效五分位数\n\n图 14.1 各学科的学生入学质量得分。浅绿色和浅红色数字分别表示五所大学中的最高和最低得分\n\
    \n### 平均入学得分\n\n| 标准 | U1 | U2 | U3 | U4 | U5 |\n|---|---|---|---|---|---|\n|\
    \ 生物 | NA | 53.10 | 49.70 | 52.20 | 55.20 |\n| 化学 | 52.00 | 50.10 | 54.20 | 53.60\
    \ | 56.70 |\n| 经济学 | 49.60 | NA | NA | NA | 54.40 |\n| 电气工程 | 56.10 | 54.50 |\
