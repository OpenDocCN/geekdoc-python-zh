  - '[PAGE 201]


    Notice also the (±1) marked outranking situations, like the one between albt and
    ariz. The statement that “Arizona State University strictly outranks University
    of Alberta” is in fact valid with the precise THE criteria significance weights,
    but not with all potential significance weights vectors that are compatible with
    the given significance preorder. All these (±1) marked outranking situations become
    hence doubtful (r(x ≳ y) = 0.00) and the corresponding CS Depts, like University
    of Alberta and Arizona State University, become incomparable in a robust outranking
    sense.


    Showing many incomparabilities and indifferences, not being transitive and containing
    many robust outranking circuits make that no ranking algorithm, applied to digraph
    rdg, does exist that would produce a unique optimal linear ranking result. Methodologically,
    we are only left with ranking heuristics. In Chap. 8 on ranking with multiple
    criteria we have now seen several potential heuristic ranking rules that can be
    used for ranking with an outranking digraph; yet, they may deliver potentially
    more or less diverging results. Considering the order of digraph rdg (75) and
    the largely unequal THE criteria significance weights, we rather opt, in this
    tutorial, for the NETFlows ranking rule. Its complexity in O(n²) is indeed quite
    tractable and, by avoiding potential tyranny of short majority effects, the NETFlows
    rule may specifically take the ranking criteria significance weights into a more
    fairly balanced account.


    The NETFlows ranking result of the CS Depts can be directly computed with the
    computeNetFlowsRanking() method.


    **Listing 13.10** Computing a robust NETFlows ranking


    ```

    1 >>> nfRanking = rdg.computeNetFlowsRanking()

    2 >>> nfRanking

    3   [''ethz'',''calt'',''mit'', ''oxf'', ''cmel'',''git'', ''epfl'',

    4    ''icl'', ''cou'', ''tum'', ''wash'', ''sing'',''hkst'',''ucl'',

    5    ''uiu'', ''unt'', ''ued'', ''ntu'', ''mcp'', ''csd'', ''cbu'',

    6    ''uta'', ''tsu'', ''nyu'', ''uwa'', ''csb'', ''kit'', ''utj'',

    7    ''bju'', ''kcl'', ''chku'',''kist'', ''rwth'',''pud'', ''epfr'',

    8    ''hku'', ''rcu'', ''cir'', ''dut'', ''ens'', ''ntw'', ''anu'',

    9    ''tub'', ''mel'', ''lms'', ''bro'', ''frei'',''wtu'', ''tech'',

    10   ''itmo'',''zhej'',''man'', ''kuj'', ''kul'', ''unsw'',''glas'',

    11   ''utw'', ''unlu'',''naji'',''sou'', ''hkpu'',''qut'', ''humb'',

    12   ''shJi'',''stut'',''tud'', ''tlavu'',''cihk'',''albt'',''indis'',

    13   ''ariz'',''kth'', ''hels'',''eind'', ''mil'']

    ```


    We actually obtain in Listing 13.10 a very similar ranking result as the one obtained
    with the THE average scores. The same group of seven Depts: ethz, calt,mit,oxf,cmel,git,and
    epfl is top-ranked. And a same group of Depts: tlavu, cihk, indis, ariz, kth,
    hels, eind, and mil appears at the end of the list.


    > 7 The reader might try other ranking rules, like the COPELAND or KOHLER rules.
    Mind that the latter ranking-by-choosing rule is more complex (see Chap. 8).'
