- md: "## 11.3 C-implemented Integer-Valued Outranking Digraphs\n\nThe C-compiled\
    \ version of the BipolarOutrankingDigraph class takes integer r-characteristic\
    \ values.\n\n**Listing 11.2** Constructing big bipolar-valued outranking digraphs\n\
    \n```python\n>>> from cRandPerfTabs import cRandomPerformanceTableau\n>>> t =\
    \ cRandomPerformanceTableau(numberOfActions=1000,\n...                       \
    \         numberOfCriteria=2,seed=100)\n>>> from cIntegerOutrankingDigraphs import\n\
    ...                 IntegerBipolarOutrankingDigraph\n>>> g = IntegerBipolarOutrankingDigraph(t,\n\
    ...                 Threading=True, nbrCores=4)\n>>> g\n*------- Object instance\
    \ description -------*\n Instance class   : IntegerBipolarOutrankingDigraph\n\
    \ Instance name    : rel_cRandomperftab\n Actions          : 1000\n Criteria \
    \        : 2\n Size             : 460795\n Determinateness  : 55.975\n Valuation\
    \ domain : {'min': -2, 'med': 0, 'max': 2,\n                    'hasIntegerValuation':\
    \ True}\n Attributes       : ['name', 'actions', 'criteria',\n               \
    \     'totalWeight', 'valuationdomain',\n                    'methodData', 'evaluation',\n\
    \                    'order', 'runTimes', 'nbrThreads',\n                    'relation',\
    \ 'gamma', 'notGamma']\n ----  Constructor run times (in sec.) ----\n Total time\
    \       : 2.29166\n Data input       : 0.01170\n Compute relation : 1.73179\n\
    \ Gamma sets       : 0.54816\n Threads          : 4\n```\n\nOn a common PC with\
    \ four single threaded cores, the IntegerBipolarOutrankingDigraph class constructor\
    \ takes about 2.3 seconds for computing a *million* pairwise outranking characteristic\
    \ values (see Listing 11.2 on the preceding page). In a similar setting, the standard\
    \ BipolarOutrankingDigraph constructor operates more than three times slower.\n\
    \n```python\n>>> from outrankingDigraphs import BipolarOutrankingDigraph\n>>>\
    \ t1 = t.convert2Standard()\n>>> g1 = BipolarOutrankingDigraph(t1,\n...      \
    \               Threading=True,nbrCores=4)\n>>> g1\n*------- Object instance description\
    \ -------*\n Instance class      : BipolarOutrankingDigraph\n Instance name  \
    \     : rel_std_cRandomperftab\n Actions             : 1000\n Criteria       \
    \     : 2\n Size                : 460795\n Determinateness (%) : 77.99\n Valuation\
    \ domain    : [-1.00;1.00]\n Attributes          : ['name','actions','valuationdomain',\n\
    \                        'criteria','methodData','evaluation',\n             \
    \           'NA','order','runTimes','nbrThreads',\n                        'relation','gamma','notGamma']\n\
    \ ----  Constructor run times (in sec.) ----\n Total time          : 8.35748\n\
    \ Data input          : 0.01407\n Compute relation    : 7.30510\n Gamma sets \
    \         : 1.03831\n Threads             : 4\n```\n\nBy far, most of the run\
    \ time is in each case needed for computing the individual pairwise outranking\
    \ characteristic values: 1.7 second versus 7.3 second. Notice also below the memory\
    \ occupations—about 108 MB for g and 212 MB for g1—of both outranking digraph\
    \ instances (see Line 3 and 5 below).\n\n```python\n>>> from digraphsTools import\
    \ total_size\n>>> total_size(g)\n107503580\n>>> total_size(g1)\n211519995\n>>>\
    \ total_size(g.relation)/total_size(g)\n0.34\n>>> total_size(g.gamma)/total_size(g)\n\
    0.46\n```\n\nThe standard Decimal valued BipolarOutrankingDigraph instance g1\
    \ thus nearly doubles the memory occupation of the corresponding IntegerBipolarOutrankingDigraph\
    \ g instance. About 80% of this memory occupation is due to the g.relation (34%)\
    \ and the g.gamma (46%) dictionaries. And this ratio grows quadratically with\
    \ the outranking digraph order. To limit the object sizes for really big outranking\
    \ digraphs, we need to furthermore abandon the implementation of complete adjacency\
    \ tables and gamma functions.\n\n## 11.4 The Sparse Implementation of Big Outranking\
    \ Digraphs\n\nThe idea is to first decompose the complete outranking relation\
    \ into an ordered collection of equivalent quantile performance classes. Let us\
    \ consider for this illustration a random performance tableau with 100 decision\
    \ alternatives evaluated on 7 criteria.\n\n```python\n>>> from cRandPerfTabs import\
    \ cRandomPerformanceTableau\n>>> t = cRandomPerformanceTableau(numberOfActions=100,\n\
    ...                               numberOfCriteria=7,seed=100)\n```\n\nThe cSparseIntegerOutrankingDigraphs\
    \ module provides the SparseIntegerOutrankingDigraph class for sorting the 100\
    \ decision alternatives into overlapping quartile classes and rank all 100 with\
    \ respect to the average quantile limits.\n\n**Listing 11.3** Constructing the\
    \ sparse integer outranking digraph\n\n```python\n>>> from cSparseIntegerOutrankingDigraphs\
    \ import\n...                               SparseIntegerOutrankingDigraph\n>>>\
    \ sg = SparseIntegerOutrankingDigraph(t,quantiles=4)\n>>> sg\n  *----- Object\
    \ instance description ---------------*\n  Instance class     : SparseIntegerOutrankingDigraph\n\
    \  Instance name      : cRandomperftab_mp\n  Actions            : 100\n  Criteria\
    \           : 7\n  Sorting by         : 4-Tiling\n  Ordering strategy  : average\n\
    \  Ranking rule       : Copeland\n  Components         : 6\n  Minimal order  \
    \    : 1\n  Maximal order      : 35\n  Average order      : 16.7\n  fill rate\
    \          : 24.970%\n  *---- Constructor run times (in sec.) ----*\n  Nbr of\
    \ threads     : 1\n  Total time         : 0.08212\n  QuantilesSorting   : 0.01481\n\
    \  Preordering        : 0.00022\n  Decomposing        : 0.06707\n  Ordering  \
    \         : 0.00000\n  Attributes         : ['runTimes', 'name', 'actions',\n\
    \      'criteria', 'evaluation', 'order', 'dimension',\n      'sortingParameters',\
    \ 'nbrOfCPUs',\n      'valuationdomain', 'profiles', 'categories',\n      'sorting',\
    \ 'minimalComponentSize',\n      'decomposition', 'nbrComponents', 'nd',\n   \
    \   'components', 'fillRate',\n      'maximalComponentSize', 'componentRankingRule',\n\
    \      'boostedRanking']\n```\n\nWe obtain in this example here a decomposition\
    \ into 6 linearly ordered components with a maximal component size of 35 for component\
    \ c3.\n\n**Listing 11.4** The 6 components of a sparse outranking digraph\n\n\
    ```python\n>>> sg.showDecomposition()\n*--- quantiles decomposition in decreasing\
    \ order---*\nc1. ]0.75-1.00] : [3,22,24,34,41,44,50,53,56,62,93]\nc2. ]0.50-1.00]\
    \ : [7,29,43,58,63,81,96]\nc3. ]0.50-0.75] : [1,2,5,8,10,11,20,21,25,28,30,33,\n\
    \    35,36,45,48,57,59,61,65,66,68,70,\n    71,73,76,82,85,89,90,91,92,94,95,97]\n\
    c4. ]0.25-0.75] : [17,19,26,27,40,46,55,64,69,87,98,100]\nc5. ]0.25-0.50] : [4,6,9,12,13,14,15,16,18,23,31,32,\n\
    \    37,38,39,42,47,49,51,52,54,60,67,72,\n    74,75,77,78,80,86,88,99]\nc6. ]<-0.25]\
    \    : [79,83,84]\n```\n\nA restricted outranking relation is stored for each\
    \ component with more than one alternative. The showRelationMap() prints out below\
    \ the relation map of the sparse digraph sg for the 75 first-ranked alternatives\
    \ (see Fig. 11.1 on the next page):\n\n```python\n>>> sg.showRelationMap(toIndex=75)\n\
    ```\n\nWith a fill rate of 25%, the memory occupation of this sparse outranking\
    \ digraph sg instance takes now only 769 kB, compared to the 1.7 MB required by\
    \ a corresponding standard BipolarOutrankingDigraph instance (see Listing 11.3\
    \ on the preceding page).\n\n```python\n>>> print('%.0fkB' % (total_size(sg)/1024)\
    \ )\n769kB\n```\n\nFor sparse outranking digraphs, the adjacency table is implemented\
    \ as a dynamic relation() function instead of a double dictionary."
  mdcn: "## 11.3 C语言实现的整数值优超有向图\n\nBipolarOutrankingDigraph类的C编译版本采用整数r-特征值。\n\n**清单\
