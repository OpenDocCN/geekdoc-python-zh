    # 11.6 HPC Quantiles Ranking Records


    Following from the separability property of the $q$-tiles sorting of each action
    into a $q$-tiles class, the $q$-sorting algorithm may be safely split into as
    much threads as are multiple processing cores available for working in parallel
    (see Proposition 9.1). Furthermore, the ranking procedure being local to each
    diagonal component, these procedures may as well be safely processed in parallel
    threads on each component restricted outranking digraph.


    Using the HPC platform of the University of Luxembourg—https://hpc-docs.uni.lu/
    (Varrette et al. 2014)—the run times shown in Fig. 11.2 for very big ranking problems
    could be achieved both on:


    +   - *Iris* -skylake nodes with 28 cores: (see https://hpc-docs.uni.lu/systems/iris),
    and

    - the 3TB -bigmem *Gaia-183* node with 64 cores (see https://hpc.uni.lu/systems/gaia),


