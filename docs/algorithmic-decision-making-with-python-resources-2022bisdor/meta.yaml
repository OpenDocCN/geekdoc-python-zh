    In the DIGRAPH3 resources, all digraph object instances are of root `Digraph`
    type (see the technical description) and contain at least the following attributes
    (see Listing 1.1 on page 6 Lines 12–14):


    +   1. A name attribute, holding usually the actual name of the stored instance
    that was used to create the instance;

    2. An ordered dictionary of digraph nodes called `actions` (decision alternatives)
    with at least a `name` attribute;

    3. An `order` attribute containing the number of graph nodes (length of the actions
    dictionary) automatically added by the object constructor;

    4. A logical characteristic `valuationdomain` dictionary with three decimal entries:
    the minimum (-1.0, means certainly false), the median (0.0, means missing information),
    and the maximum characteristic value (+1.0, means certainly true);

    5. A double dictionary called `relation` and indexed by an oriented pair of actions
    (nodes) and carrying a decimal characteristic value in the range of the previous
    valuation domain;

    6. Its associated `gamma` attribute, a dictionary containing the direct successors,
    respectively, predecessors of each action, automatically added by the object constructor;

    7. Its associated `notGamma` attribute, a dictionary containing the actions that
    are not direct successors, respectively, predecessors of each action, automatically
    added by the object constructor.


