    \ the given weights preorder.\n\nUsing this stability denotation, we may, hence,\
    \ define the following *robust* version of a bipolar-valued outranking digraph.\n\
    \n# 19.4 Robust Bipolar-Valued Outranking Digraphs\n\n**Definition 19.1 (Robust\
    \ Outranking Situation)**\n\n+   - We say that decision alternative $x$ *robustly\
    \ outranks* decision alternative $y$ when:\n  - $x$ is at least as well evaluated\
    \ as $y$ at stability level $+2$ or higher.\n  - We do not observe any considerable\
    \ counter-performance of $x$ on a discordant criterion.\n- Dually, we say that\
    \ decision alternative $x$ *does not robustly outrank* decision alternative $y$\
    \ when:\n  - $x$ is not at least as well evaluated as $y$ at stability level $-2$\
    \ or lower.\n  - We do not observe any considerable better performance of $x$\
    \ on a discordant criterion.\n- Otherwise, the outranking situation is indeterminate.\n\
    \nThe corresponding *robust* outranking digraph can be computed as follows with\
    \ the `RobustOutrankingDigraph` class:\n\n**Listing 19.7** Computing a robust\
    \ outranking digraph\n\n```\n1 >>> from outrankingDigraphs import\\n2 ...    \
    \             RobustOutrankingDigraph\n3 >>> rg = RobustOutrankingDigraph(pt)\
    \ # same pt\n4 >>> rg\n5  *------- Object instance description ------*\n6  Instance\
