    We suppose in this rating case study that five German universities: U1, U2, U3,
    U4, and U5 conducted in 2005 a similar survey among their enrolled students which
    gave the following enrolment quality scores per academic subject.


    In Table 14.1, the fifteen popular academic subjects are grouped into topical
    ‘Faculties’: *Humanities, Law, Economics & Management, Life Sciences & Medicine,
    Natural Sciences & Mathematics*, and *Technology*. None of the five universities
    have students enrolled in all the fifteen subjects. University U1 has, for instance,
    no students in Life Sciences & Medicine and in Law and Politology, whereas University
    U5 does not offer any Technology subjects.


    The average enrolment quality scores of the five universities, shown in Table
    14.1, are stored in a file named `ratingCaseStudy.py` of PerformanceTableau format.¹
    The `showHTMLPerformanceTableau()` method produces in Fig. 14.1 on the next page
    a colourful browser view of these performance records.


    ```

    >>> from perfTabs import PerformanceTableau

    >>> pt = PerformanceTableau(''ratingCaseStudy'')

    >>> pt.showHTMLPerformanceTableau(Transposed=True,\n...                                title=''Average
    enrolment scores'')

    ```


    With the best score in nine out of fifteen subjects, university U5 presents the
    highest global enrolment quality of the five, whereas University U3, with five
    lowest scores, shows the lowest student enrolment quality of the five.


    The university administrations would like to know now how their respective enrolment
    quality scores are to be appreciated in view the results of the 2004 DER


    ¹ The file may be found in the examples directory of the DIGRAPH3 resources.'
