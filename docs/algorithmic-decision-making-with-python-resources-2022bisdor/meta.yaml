    \ ['U1', 'U4', 'U2']\n[0.00 - 0.20[ ['U3']\n```\n\n使用特殊的 `exportRatingByRankingGraphViz()`\
    \ 方法生成的相应 *graphviz* 绘图可以很好地在图 14.4 中展示这些入学质量等价类。\n\n```\n>>> lqr.exportRatingByRankingGraphViz('ratingResult')\n\
    *---- exporting a dot file for GraphViz tools ---------*\nExporting to ratingResult.dot\n\
    dot -Grankdir=TB -Tpdf dot -o ratingResult.png\n```\n\n我们在第 8 章中注意到，对于从给定的优超有向图（如这里的有向图\
    \ lqr）进行排序，并不存在唯一的最优规则。例如，COPELAND 规则的优点是满足孔多塞一致性，即当优超有向图建模了一个线性排序时，该排序必然是 COPELAND\
    \ 规则的结果。当情况并非如此时，特别是当优超有向图显示无弦回路时，所有潜在的排序规则可能会给出非常不同的排序结果，有时甚至会给出实质上不同的评级排序结果。\n\
    \n`computeChordlessCircuits()` 和 `showChordlessCircuits()` 方法允许检查这个问题。⁵\n\n```\n\
    >>> lqr.computeChordlessCircuits()\n>>> lqr.showChordlessCircuits()\n*---- Chordless\
    \ circuits ----*\n1 circuits.\n1:  ['U1', 'U2', 'U4'] , credibility : 0.200\n\
    ```\n\n确实，在评级到第二五分位数的三所大学 U1、U2 和 U4 之间出现了一个优超回路。因此，验证当应用三种不同的排序规则（如 KEMENY、COPELAND\
    \ 和 NETFLOWS 规则）时获得的评级排序结果的认识融合，是否确实确认了我们在前一页图 14.4 中显示的评级排序结果，是很有意义的。为此，我们在清单\
    \ 14.4 中使用了 `RankingsFusionDigraph` 类。\n\n**清单 14.4** 计算三种评级排序结果的认识融合\n\n```\n\
    >>> # lqr.actionsRanking is Copeland ranked\n>>> from linearOrders import KemenyOrder,\n\
    ...                     NetFlowsOrder\n>>> ke = KemenyOrder(lqr,orderLimit=10)\n\
    >>> nf = NetFlowsOrder(lqr)\n>>> from transitiveDigraphs import\n...         \
    \            RankingsFusionDigraph\n>>> rankings = [lqr.actionsRanking,\n... \
    \            nf.netFlowsRanking,\n...             ke.kemenyRanking]\n>>> rankings\n\
    [['m5','u5','m4','m3','u1','u2','u4','m2','u3','m1'],\n ['m5','u5','m4','m3','u1','u4','u2','u3','m2','m1'],\n\
    \ ['m5','u5','m4','m3','u1','u4','u2','m2','u3','m1']]\n>>> rf = RankingsFusionDigraph(lqr,rankings)\n\
    >>> rf.exportGraphViz(fileName='fusionResult',\n...                   WithRatingDecoration=True)\n\
    exporting a dot file for GraphViz tools\nExporting to fusionResult.dot\ndot -Grankdir=TB\
    \ -Tpng fusionResult.dot\n...                   -o fusionResult.png\n```\n\n三种评级排序结果的融合显示在下一页的图\
    \ 14.5 中，我们看到它们仅在对大学 U2、U3 和 U4 的评级排序上存在分歧。在清单 14.4 的第 12-14 行，我们可以更精确地注意到，KEMENY\
    \ 和 COPELAND 规则将 U3 评级在第一五分位数（[0.00 – 0.20]），而 NETFLOWS 规则将 U3 与 U1、U2 和 U4 一起放入第二五分位数（[0.20\
    \ – 0.40]）。并且，KEMENY 规则颠倒了 U2 和 U4 的位置。\n\n> ⁵ `computeChordlessCircuits()` 和\
    \ `showChordlessCircuits()` 方法是分开的，因为有多种方法可用于枚举有向图中的无弦回路（Bisdorff 2010）。"
