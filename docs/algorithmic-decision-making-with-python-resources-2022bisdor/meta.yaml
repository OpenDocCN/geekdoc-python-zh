- md: "## 13.3 How to Judge the Quality of a Ranking Result?\n\nIn a multiple-criteria\
    \ based ranking problem, inspecting pairwise marginal performance differences\
    \ may give objectivity to global preferential statements. That a CS Dept *x* convincingly\
    \ outranks Dept *y* can conveniently be checked with the `showPairwiseOutrankings()`\
    \ method. The ETH Zürich CS Dept is, for instance, first ranked before Caltech's\
    \ Dept in both previous rankings. Lest us check the preferential reasons.\n\n\
    **Listing 13.12** Comparing pairwise criteria performances\n\n```\n>>> rdg.showPairwiseOutrankings('ethz','calt')\n\
    *------------ pairwise comparisons ----*\nValuation in range: -100.00 to +100.00\n\
    Comparing actions : ('ethz', 'calt')\ncrit.  wght.  g(ethz) g(calt) diff | ind\
    \  pref   r() |\n------------------------------------|------------------\n'gcit'\
    \  27.50  97.10  99.80  -2.70 | 2.50  5.00  +0.00 |\n'gind'   5.00  64.10  85.90\
    \ -21.80 | 2.50  5.00  -5.00 |\n'gint'   7.50  93.60  59.10 +34.50 | 2.50  5.00\
    \  +7.50 |\n'gres'  30.00  97.30  96.00  +1.30 | 2.50  5.00 +30.00 |\n'gtch' \
    \ 30.00  89.20  91.50  -2.30 | 2.50  5.00 +30.00 |\n------------------------------------|------------------\n\
    \                                    r(x >= y):  +62.50\ncrit.  wght.  g(calt)\
    \ g(ethz) diff | ind  pref   r() |\n------------------------------------|------------------\n\
    'gcit'  27.50  99.80  97.10  +2.70 | 2.50  5.00 +27.50 |\n'gind'   5.00  85.90\
    \  64.10 +21.80 | 2.50  5.00  +5.00 |\n'gint'   7.50  59.10  93.60 -34.50 | 2.50\
    \  5.00  -7.50 |\n'gres'  30.00  96.00  97.30  -1.30 | 2.50  5.00 +30.00 |\n'gtch'\
    \  30.00  91.50  89.20  +2.30 | 2.50  5.00 +30.00 |\n------------------------------------|------------------\n\
    \                                    r(y >= x):  +85.00\n```\n\nA significant\
    \ positive performance difference (+34.50), concerning the *International outlook*\
    \ criterion (of 7.5% significance), is observed in Listing 13.12 in favour of\
    \ the ETH Zürich Dept (Line 9 above). Similarly, a significant positive performance\
    \ difference (+21.80), concerning the *Industry income* criterion (of 5% significance),\
    \ is observed, this time, in favour of the Caltech Dept (Line 17). The former,\
    \ larger positive, performance difference, observed on a more significant criterion,\
    \ gives so far a first convincing argument of 12.5% significance for putting ETH\
    \ Zürich first, before Caltech. Yet, the slightly positive performance difference\
    \ (+2.70, Line 16) between Caltech and ETH Zürich on the *Citations* criterion\
    \ (of 27.5% significance) confirms an \"*at least as well evaluated as*\" situation\
    \ in favour of the Caltech Dept.\n\nThe inverse negative performance difference\
    \ (−2.70, Line 7), however, is neither *significant* (< −5.00), nor *insignificant*\
    \ (> −2.50), and does hence neither confirm nor inform a \"*not at least as well\
    \ evaluated as*\" situation in disfavour of ETH Zürich. We observe here a convincing\
    \ argument of 27.5% significance for ranking Caltech first, before ETH Zürich.\n\
    \nNotice finally, that, on the *Teaching* and *Research* criteria of total significance\
    \ 60%, both Depts do, with performance differences (<| 2.50 |), perform one as\
    \ well as the other. As these two major performance criteria together necessarily\
    \ admit always the highest significance with the imposed significance weight preorder:\
    \ gtch = gres > gcit > gint > gind, both outranking situations get in fact globally\
    \ confirmed at stability level +2 (see Chap. 19).\n\nA browser view of the corresponding\
    \ robust relation map, ordering the CS Depts again with the same NETFLOWS ranking\
    \ rule, well illustrates all such *stable outranking* situations.\n\n```\n>>>\
    \ rdg.showHTMLRelationMap(\n...     tableTitle='Robust Outranking Map',\n... \
    \    rankingRule='NetFlows')\n```\n\nIn Fig. 13.2 on the next page, *dark green*,\
    \ respectively, *light green* marked positions show certainly, respectively, positively\
    \ valid outranking situations, whereas *dark red*, respectively, *light red* marked\
    \ positions show certainly, respectively, positively valid outranked situations.\
    \ In the left upper corner one may verify that the five top-ranked Depts ([ethz,\
    \ calt, oxf, mit, cmel]) are in fact mutually outranking each other and thus are\
    \ all indifferent one to another. They give even robust CONDORCET winners by robustly\
    \ outranking all other Depts.\n\nNotice by the way that no certainly valid robust\
    \ outranking (dark green) and no certainly valid robust outranked situations (dark\
    \ red) appear in Fig. 13.3 on page 181 below, respectively, above the principal\
    \ diagonal; none of these robust preferential situations are hence violated by\
    \ the robust NETFLOWS ranking. The non-reflexive *white* positions in the relation\
    \ map, like the one between the Georgia Institute of Technology and the MIT, mark\
    \ outranking or outranked situations that are not robust with respect to the given\
    \ significance weight preorder. They become, hence, doubtful and are set to the\
    \ indeterminate characteristic value 0.0.\n\nBy measuring the ordinal correlation\
    \ with the underlying pairwise global and marginal robust outranking situations,\
    \ the quality of the robust NETFLOWS ranking result can be formally evaluated\
    \ with the `computeRankingCorrelation()` method and the `showCorrelation()` method\
    \ (see Chap. 16).\n\n**Listing 13.13** Measuring the quality of the NETFLOWS ranking\
    \ result\n\n```\n>>> corrnf = rdg.computeRankingCorrelation(nfRanking)\n>>> rdg.showCorrelation(corrnf)\n\
    ```\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_206_0.png)\n\nFig. 13.2 Relation\
    \ map of the robust outranking relation\n\n```\nCorrelation indexes:\n    Crisp\
    \ ordinal correlation   : +0.901\n    Epistemic determination     :   0.563\n\
    \    Bipolar-valued equivalence  : +0.507\n```\n\nListing 13.13 on the previous\
    \ page Line 4 indicates that the NETFLOWS ranking result is indeed highly correlated\
    \ (+0.901, in KENDALL’s tau index sense) with the pairwise global robust outranking\
    \ relation. Their bipolar-valued *relational equivalence* index (+0.51, Line 6)\
    \ indicates a more than 75% criteria significance support.\n\nWith the `showRankingConsensusQuality()`\
    \ method, we can also check how the NETFLOWS ranking rule is actually balancing\
    \ the five ranking objectives.\n\n**Listing 13.14** Measuring the consensus quality\
    \ of the NETFLOWS ranking result\n\n```\n>>> rdg.showRankingConsensusQuality(nfRanking)\n\
    Criterion (weight): correlation\n------------------------------\n    gtch (0.300):\
    \ +0.660\n    gres (0.300): +0.638\n    gcit (0.275): +0.370\n    gint (0.075):\
    \ +0.155\n    gind (0.050): +0.101\n    Summary:\nWeighted mean marginal correlation\
    \ (a): +0.508\nStandard deviation (b)                : +0.187\nRanking fairness\
    \ (a) - (b)            : +0.321\n```\n\nThe ordinal correlation indexes with the\
    \ marginal performance criterion rankings are nearly respecting the given significance\
    \ weights preorder: gtch ≈ gres > gcit > gint > gind (see Lines 4–8 above). The\
    \ mean marginal ordinal correlation index is quite high (+0.51). Coupled with\
    \ a low standard deviation (0.187), we obtain a quite fairly balanced ranking\
    \ result (Lines 10–12).\n\nWe can furthermore inspect with the `showCriteriaCorrelationTable()`\
    \ method the mutual correlation indexes observed between the individual criterion\
    \ based marginal robust outranking relations.\n\n**Listing 13.15** Showing the\
    \ ordinal correlation between the marginal criterion relations\n\n```\n>>> rdg.showCriteriaCorrelationTable()\n\
    Criteria ordinal correlation index\n| gcit gind gint gres gtch\n-----|------------------------------------------\n\
    gcit | +1.00 -0.11 +0.24 +0.13 +0.17\ngind | +1.00 -0.18 +0.15 +0.15\ngint | +1.00\
    \ +0.04 -0.00\ngres | +1.00 +0.67\ngtch | +1.00\n```\n\nSlightly contradictory\
    \ (−0.11) appear the *Citations* and *Industrial income* criteria (Line 5 Column\
    \ 3 in Listing 13.15 on the preceding page). Due perhaps to potential confidentiality\
    \ clauses, it seems perhaps not always possible to publish industrially relevant\
    \ research results in highly ranked journals. However, criteria *Citations* and\
    \ *International outlook* show a slightly positive correlation (+0.24, Column\
    \ 4), whereas the *International outlook* criterion shows no apparent correlation\
    \ with both the major *Teaching* and *Research* criteria. The latter are, however,\
    \ highly correlated (+0.67. Line 9 Column 6).\n\nA Principal Component Analysis\
    \ may well illustrate with the `export3DplotOfCriteriaCorrelation()` method the\
    \ previous findings (Bisdorff 2020).\n\n```\n>>> rdg.export3DplotOfCriteriaCorrelation(graphType='pdf')\n\
    ```\n\nIn Fig. 13.3 on the previous page, one may notice first that more than\
    \ 80% of the total variance of the previous correlation table is explained by\
    \ the apparent opposition between the marginal outrankings of criteria: *Teaching*,\
    \ *Research*, and *Industry income* on the left side, and the marginal outrankings\
    \ of criteria: *Citations* and *International outlook* on the right side. Notice\
    \ also in the left lower corner the nearly identical positions of the marginal\
    \ outrankings of the major *Teaching* and *Research* criteria. In the factors\
    \ 2 and 3 plot, about 30% of the total variance is captured by the opposition\
    \ between the marginal outrankings of the *Teaching* and *Research* criteria and\
    \ the marginal outrankings of the *Industrial income* criterion. Finally, in the\
    \ factors 1 and 3 plot, nearly 15% of the total variance is explained by the opposition\
    \ between the marginal outrankings of the *International outlook* criterion and\
    \ the marginal outrankings of the *Citations* criterion.\n\nIt is, finally, interesting\
    \ to similarly assess the ordinal correlation between the THE average scores-based\
    \ ranking and the robust outranking digraph.\n\n**Listing 13.16** Computing the\
    \ ordinal quality of the THE ranking\n\n```\n>>> # theScores = [(xScore_1,x_1),\
    \ (xScore_2,x_2),... ]\n>>> # is sorted in decreasing order of xscores\n>>> theRanking\
    \ = [item[1] for item in theScores]\n>>> corrthe = rdg.computeRankingCorrelation(theRanking)\n\
    >>> rdg.showCorrelation(corrthe)\nCorrelation indexes:\nCrisp ordinal correlation\
    \ : +0.907\nEpistemic determination : 0.563\nBipolar-valued equivalence : +0.511\n\
    ```"
  mdcn: "## 13.3 如何评判排序结果的质量？\n\n在基于多标准的排序问题中，检查成对边际性能差异可以为全局偏好陈述提供客观性。计算机科学系 *x*\
    \ 是否令人信服地优于系 *y*，可以方便地使用 `showPairwiseOutrankings()` 方法进行检验。例如，在之前的两次排名中，苏黎世联邦理工学院计算机系都排在加州理工学院系之前。让我们检查一下偏好原因。\n\
    \n**清单 13.12** 比较成对标准性能\n\n```\n>>> rdg.showPairwiseOutrankings('ethz','calt')\n\
    *------------ pairwise comparisons ----*\nValuation in range: -100.00 to +100.00\n\
    Comparing actions : ('ethz', 'calt')\ncrit.  wght.  g(ethz) g(calt) diff | ind\
    \  pref   r() |\n------------------------------------|------------------\n'gcit'\
    \  27.50  97.10  99.80  -2.70 | 2.50  5.00  +0.00 |\n'gind'   5.00  64.10  85.90\
    \ -21.80 | 2.50  5.00  -5.00 |\n'gint'   7.50  93.60  59.10 +34.50 | 2.50  5.00\
    \  +7.50 |\n'gres'  30.00  97.30  96.00  +1.30 | 2.50  5.00 +30.00 |\n'gtch' \
    \ 30.00  89.20  91.50  -2.30 | 2.50  5.00 +30.00 |\n------------------------------------|------------------\n\
    \                                    r(x >= y):  +62.50\ncrit.  wght.  g(calt)\
    \ g(ethz) diff | ind  pref   r() |\n------------------------------------|------------------\n\
    'gcit'  27.50  99.80  97.10  +2.70 | 2.50  5.00 +27.50 |\n'gind'   5.00  85.90\
    \  64.10 +21.80 | 2.50  5.00  +5.00 |\n'gint'   7.50  59.10  93.60 -34.50 | 2.50\
    \  5.00  -7.50 |\n'gres'  30.00  96.00  97.30  -1.30 | 2.50  5.00 +30.00 |\n'gtch'\
    \  30.00  91.50  89.20  +2.30 | 2.50  5.00 +30.00 |\n------------------------------------|------------------\n\
