    **Abstract** The required cardinal significance weights of the performance criteria
    represent the ‘Achilles’ heel of the outranking approach. Rarely will indeed a
    decision maker be cognitively competent for suggesting precise decimal-valued
    criteria significance weights. More often, the decision problem will involve more
    or less equally important decision objectives with more or less equi-significant
    criteria per objective. In this chapter, we study the robustness of the outranking
    digraph when the criteria significance weights faithfully indicate solely an order
    of importance.


    ### 19.1 Cardinal or Ordinal Criteria Significance Weights?


    A random example of such a decision problem with equally important decision objectives
    and equi-significant criteria may be generated with the `Random3ObjectivesPerformanceTableau`
    class.


    **Listing 19.1** Generate a random 3-objectives performance tableau


    ```

    >>> from randomPerfTabs import \

    ...                 RandomObjectivesPerformanceTableau

    >>> pt = Random3ObjectivesPerformanceTableau(

    ...                 numberOfActions=7,

    ...                 numberOfCriteria=9,seed=102)

    >>> pt

    ```


    ```

    *------- PerformanceTableau instance description -------*

    Instance class : Random3ObjectivesPerformanceTableau

    Seed : 102

    Instance name : random3ObjectivesPerfTab

    Actions : 7

    Objectives : 3

    Criteria : 9

    NA proportion (%): 0.0

    Attributes : [''name'', ''valueDigits'', ''BigData'',

    ''OrdinalScales'', ''missingDataProbability'',

    ''negativeWeightProbability'', ''randomSeed'',

    ''sumWeights'', ''valuationPrecision'',

    ''commonScale'', ''objectiveSupportingTypes'',

    ''actions'', ''objectives'', ''criteriaWeightMode'',

    ''criteria'', ''evaluation'', ''weightPreorder'']

    >>> pt.showObjectives()

    *------- show objectives -------*

    Eco: Economical aspect

    ec1 criterion of objective Eco 8

    ec4 criterion of objective Eco 8

    ec8 criterion of objective Eco 8

    Total weight: 24.00 (3 criteria)

    Soc: Societal aspect

    so2 criterion of objective Soc 12

    so7 criterion of objective Soc 12

    Total weight: 24.00 (2 criteria)

    Env: Environmental aspect

    en3 criterion of objective Env 6

    en5 criterion of objective Env 6

    en6 criterion of objective Env 6

    en9 criterion of objective Env 6

    Total weight: 24.00 (4 criteria)

    ```


    In Listing 19.1 above, one may notice a performance tableau pt describing seven
    decision alternatives that are assessed with respect to three equally important
    decision objectives concerning:


    - 1. An *economical* aspect with a coalition of three performance criteria of
    significance weight 8 (Line 24)

    - 2. A *societal* aspect with a coalition of two performance criteria of significance
    weight 12 (Line 29)

    - 3. An *environmental* aspect with a coalition of four performance criteria of
    significance weight 6 (Line 33)


    The question we tackle in this chapter is the following: how *dependent* on the
    actual values of the significance weights appears to be the corresponding bipolar-valued
    outranking digraph? In the previous chapter, Chap. 18, we assumed that the criteria
    significance weights were random variables. Here, we shall assume that we know
    for sure only the preordering of the significance weights.


    In the random performance tableau pt, we observe three increasing weight equivalence
    classes.


    Listing 19.2 The significance weights preorder


    ```

    >>> pt.showWeightPreorder()

    [''en3'', ''en5'', ''en6'', ''en9''] (6) <

    [''ec1'', ''ec4'', ''ec8''] (8) <

    [''so2'', ''so7''] (12)

    ```


    How robust will appear now the validated outranking and outranked situations when
    allowing all possible significance weights that are compatible with the weights
    preorder shown above (Bisdorff et al. 2009, 2014)?


    ### 19.2 Qualifying the Stability of Outranking Situations


    Let us construct the bipolar-valued outranking digraph corresponding to the random
    3-objectives performance tableau pt.


    Listing 19.3 Example bipolar outranking digraph


    ```

    >>> from outrankingDigraphs import BipolarOutrankingDigraph

    >>> g = BipolarOutrankingDigraph(pt)

    >>> g.showRelationTable()

    * ---- Relation Table -----

    r(>=) | ''p1'' ''p2'' ''p3'' ''p4'' ''p5'' ''p6'' ''p7''

    ------|----------------------------------------

    ''p1'' | +1.00 -0.42 +0.00 -0.69 +0.39 +0.11 -0.06

    ''p2'' | +0.58 +1.00 +0.83 +0.00 +0.58 +0.58 +0.58

    ''p3'' | +0.25 -0.33 +1.00 +0.00 +0.50 +1.00 +0.25

    ''p4'' | +0.78 +0.00 +0.61 +1.00 +1.00 +1.00 +0.67

    ''p5'' | -0.11 -0.50 -0.25 -0.89 +1.00 +0.11 -0.14

    ''p6'' | +0.22 -0.42 +0.00 -1.00 +0.17 +1.00 -0.11

    ''p7'' | +0.22 -0.50 +0.17 -0.06 +0.78 +0.42 +1.00

    ```


    In Listing 19.3, Lines 7–13, we notice on the principal diagonal of the relation
    table the certainly validated reflexive terms +1.00; they are trivially independent
    of any significance weights. Now, we know for sure that *unanimous* outranking
    situations are also completely independent of the significance weights. And, all
    outranking situations that are supported by a majority significance in each coalition
    of equi-significant criteria are as well independent of the actual importance
    we attach to each individual criteria coalition. We are furthermore able to effectively
    test if an outranking situation remains valid with all potential significance
    weights that are compatible with the given preordering shown in Listing 19.2 on
    the preceding page (Bisdorff 2014). Mind that usually one obtains more or less
    numerous outranking situations that are in fact *dependent* on the precise cardinal
    significance weights given to the criteria.


    Such a *stability denotation* of outranking situations can be inspected using
    the StabilityDenotation=True flag with the showRelationTable() method.


    ### Listing 19.4 Bipolar-valued outranking relation table with stability denotation


    ```

    >>> g.showRelationTable(StabilityDenotation=True)

    * ---- Relation Table ----

    r/ (stab) | ''p1'' ''p2'' ''p3'' ''p4'' ''p5'' ''p6'' ''p7''

    -----------|--------------------------------------------------

    ''p1'' | +1.00 -0.42 +0.00 -0.69 +0.39 +0.11 -0.06

    | (+4) (-2) (+0) (-3) (+2) (+2) (-1)

