    Criteria            : 7\nSize                : 10\nDeterminateness (%) : 72.38\n\
    Valuation domain    : [-1.00;1.00]\n```\n\n## 4.4 Designing a Best Choice Recommender\
    \ System\n\nSolving a best choice problem consists traditionally in finding the\
    \ unique best decision alternative. We adopt here instead a modern recommender\
    \ system’s approach which shows a non-empty subset of decision alternatives which\
    \ contains by construction the potential best alternative(s).\n\nThe five pragmatic\
    \ principles for computing such a best choice recommendation (BCR) are the following:\n\
    \n- P1: Elimination for well motivated reasons; each eliminated alternative has\
    \ to be strictly outranked by at least one alternative in the BCR.\n- P2: Minimal\
    \ size; the BCR must be as limited in cardinality as possible.\n- P3: Efficient\
    \ and informative; the BCR must not contain a self-contained sub-recommendation.\n\
    - P4: Effectively better; the BCR must not be ambiguous in the sense that it may\
    \ not be both a first choice as well as a last choice recommendation.\n- P5: Maximally\
    \ determined; the BCR is, of all potential best choice recommendations, the most\
    \ determined one in the sense of the epistemic characteristics of the bipolar-valued\
    \ outranking relation.\n\nLet X be the set of potential decision alternatives.\
    \ Let Y be a non-empty subset of X, called a choice in the strict outranking digraph\
    \ G(X, r(≻)). We can now qualify a BCR Y in following terms:\n\n- Y is called\
    \ strictly outranking (respectively, outranked) when for all not selected alternative\
    \ x there exists an alternative y ∈ X retained such that r(y ≻ x) > 0.0 (respectively,\
    \ r(y ≻ x) > 0.0). Such a choice verifies principle P1.\n- $Y$ is called *weakly\
    \ independent* when for all $x \\neq y$ in $Y$ we observe $r(x \\not\\succ y)\
    \ \\leq 0.0$. Such a choice verifies principles P3 (*internal stability*).\n-\
    \ $Y$ is conjointly a strictly *outranking* (respectively, *outranked*) **and**\
    \ *weakly independent* choice. Such a choice is called an *initial* (respectively,\
    \ *terminal*) *prekernel*.$^5$ The initial prekernel now verifies principles P1,\
    \ P2, P3, and P4.\n- To finally verify principle P5, we recommend among all potential\
    \ initial prekernels, a *most determined* one, i.e. a strictly *outranking* and\
    \ *weakly independent* choice supported by the highest criteria significance.\
    \ And in this most determined initial prekernel we eventually retain the alternative(s)\
    \ that are included with highest criteria significance.$^6$\n\nMind that a given\
    \ strict outranking digraph may not always admit prekernels. This is the case\
    \ when the digraph contains chordless circuits of odd length (see Chap. 17). Luckily,\
    \ our strict outranking digraph `bodcd` here does not show any chordless outranking\
    \ circuits; a fact we can check with the `computeChordlessCircuits()` method followed\
    \ by the `showChordlessCircuits()` method.$^7$\n\n```\n>>> bodcd.computeChordlessCircuits()\n\
    []\n>>> bodcd.showChordlessCircuits()\nNo circuits observed in this digraph.\n\
    ```\n\nWhen observing chordless odd outranking circuits, we need to break them\
    \ open with the `BrokenCocsDigraph` class at their weakest link, before enumerating\
    \ the prekernels (Bisdorff 2021).\n\nWe are ready now for building a best choice\
    \ recommendation.\n\n## 4.5 Computing the RUBIS Best Choice Recommendation\n\n\
    The `showBestChoiceRecommendation()` method computes the RUBIS best choice recommendation\
    \ directly from the outranking digraph `bod`. By default this method is operating\
    \ on the *codual* (strict) outranking digraph where chordless odd circuits have\
    \ been broken up (see the `CoDual` and `BrokenCocs` parameters in Listing 4.4\
    \ Line 2):\n\n**Listing 4.4** Computing the best choice recommendation\n\n```\n\
    >>> bod.showBestChoiceRecommendation(\n...                 CoDual=True, BrokenCocs=True\
    \ # default settings\n```\n\n$^5$ See Chap. 17 on computing kernels in digraphs.\n\
    $^6$ See Sect. 17.6.\n$^7$ The `computeChordlessCircuits()` and `showChordlessCircuits()`\
    \ methods are separate because there are various methods available for enumerating\
    \ the chordless circuits in a digraph (Bisdorff 2010)."
