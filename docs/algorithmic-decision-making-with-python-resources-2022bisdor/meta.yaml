    # 6.4 Random Three Objectives Performance Tableaux


    The `randomPerfTabs` module provides a `Random3ObjectivesPerformanceTableau` class
    for generating random tableaux concerning public policies evaluated with respect
    to three decision objectives taking, respectively, into account *economical*,
    *societal* as well as *environmental* aspects. Each potential public policy is
    qualified randomly as performing *weakly* (−), *fairly* (~) or *well* (+) with
    respect to each one of the three objectives.


    **Generator Directives Are the Following**


    +   - `numberOfActions = 20` (default), minimal number required is 3;

    - `numberOfCriteria = 13` (default),

    - `weightDistribution = ''equiobjectives''` (default) | `''random''` | `''equisignificant''`,

    - `weightScale = (1,numberOfCriteria)`: only used when random criterion weights
    are requested,

    - `integerWeights = True` (default): False gives normalised rational weights,

    - `commonScale = (0.0,100.0)`,

    - `commonThresholds = [(5.0, 0.0), (10.0, 0.0), (60.0, 0.0)]`: Performance discrimination
    thresholds may be set for ''ind'', ''pref'' and ''veto'' thresholds,

    - `commonMode = [''triangular'',''variable'',0.5]`: random number generators of
    various other types (''uniform'',''beta'') are available. If the mode of the ''triangular''
    distribution is set to ''variable'', three modes at 0.3(−), 0.5(~), respectively,
    0.7(+) of the common scale span are set at random for each coalition and action.

    - `valueDigits = 2` (default): evaluations are encoded as decimals,'
