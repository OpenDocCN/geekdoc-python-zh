    \ THE ranking and here in the position 36 (Line 51). The opposite situation may\
    \ also happen; the Berlin Humboldt University CS Dept, occupying the 74th position\
    \ in the THE ranking, advances in the robust NETFLOWS ranking to position 63 (Line\
    \ 78).\n\nIn our bipolar-valued epistemic framework, the NETFLOWS score of any\
    \ CS Dept $x$ corresponds to the criteria significance support for the logical\
    \ statement “$x$ is first-ranked”. Formally\n\n$r(x \\text{ is first-ranked})\
    \ = \\sum_{y \\neq x} r((x \\succsim y) + (y \\nsuccsim x)) = \\sum_{y \\neq x}\
