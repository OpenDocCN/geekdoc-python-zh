    \                'a26','a34','a38','a45']\n]  < -0.40]  : ['a44']\n```\n\nFollowing,\
    \ for instance, the *average* ranking strategy, we find confirmed in the weak\
    \ ranking shown in Listing 9.5 that alternative a49 is indeed sorted into three\
    \ adjacent quintiles classes, namely ]0.20−0.80] and precedes the ]0.40−0.60]\
    \ class, of same average of lower and upper limits (see Line 6).\n\nThe QuantilesSortingDigraph\
    \ class constructor models hence a linearly ordered decomposition of the corresponding\
    \ bipolar-valued outranking digraph. This decomposition leads us to a new *sparse\
    \ pre-ranked* outranking digraph model.\n\n## 9.3 The Sparse Pre-ranked Outranking\
    \ Digraph Model\n\nFollowing the methodological requirements of the outranking\
    \ approach, a given outranking digraph is, necessarily associated with a corresponding\
    \ performance tableau (see Chap.3). And, we can use this associated performance\
    \ tableau for linearly decomposing the set of potential decision alternatives\
    \ into ordered quantiles equivalence classes by using the quantiles sorting algorithm\
    \ seen in the previous Section.\n\nIn the coding example shown in Listing 9.6\
    \ below, we generate, first a simple performance tableau of 75 decision alternatives\
    \ and, secondly, construct with the PreRankedOutrankingDigraph class from sparseOutrankingDigraphs\
    \ module the corresponding sparse outranking digraph called prg. Notice by the\
    \ way in Line 3 the BigData flag used for generating a parsimoniously commented\
    \ performance tableau (Bisdorff 2021).\n\n## Listing 9.6 Computing a *pre-ranked*\
    \ sparse outranking digraph\n\n```\n>>> from randomPerfTabs import RandomPerformanceTableau\n\
    >>> tp = RandomPerformanceTableau(numberOfActions=75,\n...                   \
