    candidates of Party-1 supporters, with more than 10%, appear to be c06 (19.91%),
    c07 (14.27%), and c03 (10.02%). Whereas for Party-2 supporters, favourite candidates
    appear to be c11 (22.94%), followed by c08 (15.65%), c04 (15.07%) and c06 (13.4%).
    Being *first* choice for Party-1 supporters and *fourth* choice for Party-2 supporters,
    this candidate c06 is a natural candidate for clearly winning this election game
    (see Listing 7.11).


    **Listing 7.11** The uninominal and BORDA election winner


