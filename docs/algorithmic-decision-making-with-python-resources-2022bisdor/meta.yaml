    ```

    1 >>> wcop.exportGraphViz(fileName=''weakCopelandRanking'')

    2 *---- exporting a dot file for GraphViz tools ---------*

    3 Exporting to weakCopelandRanking.dot

    4 dot -Grankdir=TB -Tpng weakCopelandRanking.dot\n5                     -o weakCopelandRanking.png

    ```


    Let us now consider a similar ranking rule, but working directly on the criteria
    *significance majority margins*, i.e. the *bipolar-valued outranking characteristic
    valuation*.


    # 8.3 The NETFLOWS Ranking


    The bipolar-valued version of the COPELAND ranking rule, we call NETFLOWS,⁴ computes
    for each alternative $x \in X$ a *net flow* score.


    **Algorithm 8.2** NETFLOWS ranking rule


    *in* : bipolar-valued strict outranking digraph $G(X, \succcurlyeq)$,

    *out* : linear ranking of the set $X$ of decision actions.


    1. The NETFLOWS rule computes for each alternative $x \in X$ the sum over all
    non-reflexive $y \in X$ of the differences between the *strict outranking* characteristics
    $r(x \succcurlyeq y)$ and the *strict outranked* characteristics $r(y \succcurlyeq
    x)$.

    2. The alternatives are ranked in decreasing order of these NETFLOWS scores; ties,
    the case given, being resolved with a lexicographical rule applied to the identifiers
    of the decision actions.


    ³ The skeleton of a transitive relation drops the transitivity induced arcs.

    ⁴ This ranking rule is also known under the name PROMETHEE ranking rule (Brans
    and Vincke 1985).'
