    In Listing 19.3, Lines 7–13, we notice on the principal diagonal of the relation
    table the certainly validated reflexive terms +1.00; they are trivially independent
    of any significance weights. Now, we know for sure that *unanimous* outranking
    situations are also completely independent of the significance weights. And, all
    outranking situations that are supported by a majority significance in each coalition
    of equi-significant criteria are as well independent of the actual importance
    we attach to each individual criteria coalition. We are furthermore able to effectively
    test if an outranking situation remains valid with all potential significance
    weights that are compatible with the given preordering shown in Listing 19.2 on
    the preceding page (Bisdorff 2014). Mind that usually one obtains more or less
    numerous outranking situations that are in fact *dependent* on the precise cardinal
    significance weights given to the criteria.


    Such a *stability denotation* of outranking situations can be inspected using
    the StabilityDenotation=True flag with the showRelationTable() method.'
