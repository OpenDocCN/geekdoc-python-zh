    4   *----- statistics -----

    5   digraph name:  c5

    6   number of solutions

    7     dominant prekernels :  0

    8     absorbent prekernels:  0

    ```


    Chordless circuits of *even* length 2 × k, with k > 1, contain however two isomorphic
    prekernels of cardinality k which qualify conjointly as initial and terminal candidates.


