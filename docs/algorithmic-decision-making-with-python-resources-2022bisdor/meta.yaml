    \ 生成置换图\n- 23.4 识别置换图\n\n**摘要** 本书的最后一章最终介绍了一些著名的完美图类别，即可比图、区间图、置换图和分裂图。我们首先展示一个同时是三角化图、可比图、分裂图和置换图的图的例子。通过\
