    **Abstract** We address in this chapter the problem of rating multiple-criteria
    performances of a set of potential decision alternatives with respect to performance
    quantiles learned from historical performance data gathered from similar decision
    alternatives observed in the past. We show how to learn performance quantiles
    from such historical performance tableaux. New performance records may now be
    rated with respect to these quantile norms.


    # 10.1 The Absolute Rating Problem


    To illustrate the *absolute rating* problem we face, consider for a moment that,
    in a given decision making problem we observe, for instance, in Table 10.1 below,
    the multi-criteria performance evaluations of two potential decision alternatives,
    named a1001 and a1010, evaluated on 7 *incommensurable* performance criteria:
    2 *Costs* criteria c1 and c2 (to *minimise*) and 5 *Benefits* criteria b1 to b5
    (to *maximise*).

    The performance on *Benefits* criteria b1, b4, and b5 is measured on a cardinal
    scale from 0.0 (worst) to 100.0 (best) whereas, the performance on the *Benefits*
    criteria b2 and b3 and on the *Costs* criterion c1 is measured on an ordinal scale
    from 0 (worst) to 10 (best), respectively, −10 (worst) to 0 (best). The performance


    **Table 10.1** Multi-criteria performances of two potential decision alternatives


    | Criterion (weight) | b1 (2) | b2 (2) | b3 (2) | b4 (2) | b5 (2) | c1 (5) | c2
    (5) |

    | :--- | :--- | :--- | :--- | :--- | :--- | :--- | :--- |

    | a1001 | 37.0 | 2 | 2 | 61.0 | 31.0 | −4 | −40.0 |

    | a1010 | 32.0 | 9 | 6 | 55.0 | 51.0 | −4 | −35.0 |'
