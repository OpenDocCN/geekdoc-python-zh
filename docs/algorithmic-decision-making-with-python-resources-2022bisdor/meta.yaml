  - '[PAGE 236]


    The global scores ranking confirms in Lines 17–18 both leading movies—mv_QS (3.60)
    and mv_RR (2.88)—as well as in Line 41 the weakest rated one—mv_TF (0.55). Mind
    however that these global averages, due to the numerous missing ratings, are not
    computed with commensurable denominators; some critics do indeed use a more or
    less extended range of stars. The movies not seen, for instance, by critic SJ
    are favoured, as this critic is severer than others in her rating. Dropping the
    movies that were not rated by all the critics is not possible either, as none
    of the 25 movies was actually rated by all the 15 critics. Providing a fictive
    value for the many not seen situations will as well always somehow falsify the
    global scores. What to do?


    A better approach is to rank the movies on the basis of pairwise bipolar-valued
    “rated at least as well as” statements. Under this epistemic argumentation approach,
    missing evaluations are naturally treated as opinion abstentions and hence do
    not falsify the logical computations. Such a **NETFLOWS** ranking from best-rated
    to weakest-rated is provided by the **heatmap** browser view generated with the
    `showHTMLPerformanceHeatmap()` method (see Listing 16.2).


    **Listing 16.2** Showing the movie from best- to worst-rated in a heatmap view


    ```

    1 >>> gt07.showHTMLPerformanceHeatmap(\n2 ...                 pageTitle=''Ranking
    the movies'',\n3 ...                 rankingRule=''NetFlows'',\n4 ...                 Correlations=True,\n5
    ...                 ndigits=0)

    ```


    The **NETFLOWS** ranking shown in Fig. 16.2 on the facing page confirms again
    that movie mv_QS, with 6 *must be seen* marks, is correctly first-ranked and the
    movie mv_TF is last-ranked with five *do not like* marks.


    It is fair, however, to eventually mention here that the *Graffiti* magazine’s
    average stars ranking rule is actually showing a very similar result. Indeed,
    average scores usually confirm well all evident pairwise comparisons, yet *enforce*
    comparability for all less evident ones. How to judge now the fitness of a given
    ranking rule?


    This is the purpose of the ordinal correlation *tau* indexes shown in Fig. 16.2
    on the next page, third row. Computing these ordinal correlation indexes is the
    subject of the next section.


    # 16.2 KENDALL’s Ordinal Correlation Tau Index


    M.G. Kendall defined his ordinal correlation τ (tau) index for linear orders of
    dimension n as a balancing of the number Co of correctly oriented pairs against
    the number In of incorrectly oriented pairs (Kendall 1938). The total number of
    irreflexive pairs being n(n − 1), in the case of linear orders, Co + In = n(n
    − 1). Hence τ = (Co / n(n-1)) − (In / n(n-1)). In case In is zero, τ = +1 (all
    pairs are equivalently oriented); inversely, in case Co is zero, τ = −1 (all pairs
    are differently oriented).'
