    A unique stable bipolar-valued high and low fixpoint is attained at the third
    iteration with alternative a7 positively confirmed (about (1.0 + 0.49)/2 = 0.75%
    criteria significance majority, see Line 15 above) as member of this terminal
    prekernel, whereas the membership of alternative a3 in this prekernel appears
    indeterminate. All the remaining nodes have negative membership characteristic
    values and are hence positively excluded from this prekernel.


    When we reconsider the graphviz drawing of this outranking digraph in Fig. 17.12,
    it becomes obvious here why alternative a1 is *neither included nor excluded*
    from the initial prekernel. The same observation is applicable to alternative
    a3 that can *neither be included nor excluded* from the terminal prekernel. It
    may even happen, in case of more indeterminate outranking situations, that no
    alternative is positively included or excluded from a weakly independent prekernel,
    the corresponding bipolar-valued membership characteristic vector being completely
    indeterminate.


