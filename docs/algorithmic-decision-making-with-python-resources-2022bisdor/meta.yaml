    \ `showQuantilesRating()` 方法打印出来。\n\n**清单 14.3** 显示 5 所大学入学质量的五分位数划分\n\n```\n\
    >>> lqr.showQuantilesRating()\n```\n\n图 14.4 五分位数评级排序结果的绘图\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_218_0.png)\n\
