    \ | 98.05 |\n| 'b5' | 2 | 0.85 | 29.08 | 48.55 | 69.98 | 97.56 |\n\nBoth objectives\
    \ are *equally important*; the sum of weights (10) of the *Costs* criteria balance\
    \ the sum of weights (10) of the *Benefits* criteria (see Listing 10.2 on the\
    \ previous page column 2). The preference direction of the *Costs* criteria c1\
    \ and c2 is *negative*; the lesser the costs, the better it is, whereas all the\
    \ *Benefits* criteria b1 to b5 show *positive* preference directions, i.e. the\
