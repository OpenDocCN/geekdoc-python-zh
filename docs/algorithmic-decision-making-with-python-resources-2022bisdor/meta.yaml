    8  c4. ]0.25-0.75] : [17,19,26,27,40,46,55,64,69,87,98,100]

    9  c5. ]0.25-0.50] : [4,6,9,12,13,14,15,16,18,23,31,32,

    10     37,38,39,42,47,49,51,52,54,60,67,72,

    11     74,75,77,78,80,86,88,99]

    12 c6. ]<-0.25]    : [79,83,84]

    ```


    A restricted outranking relation is stored for each component with more than one
    alternative. The showRelationMap() prints out below the relation map of the sparse
    digraph sg for the 75 first-ranked alternatives (see Fig. 11.1 on the next page):


    ```

    1  >>> sg.showRelationMap(toIndex=75)

    ```


    With a fill rate of 25%, the memory occupation of this sparse outranking digraph
    sg instance takes now only 769 kB, compared to the 1.7 MB required by a corresponding
    standard BipolarOutrankingDigraph instance (see Listing 11.3 on the preceding
    page).


    ```

    1  >>> print(''%.0fkB'' % (total_size(sg)/1024) )

    2      769kB

    ```


    For sparse outranking digraphs, the adjacency table is implemented as a dynamic
    relation() function instead of a double dictionary.'
- md: "## 11.4 The Sparse Implementation of Big Outranking Digraphs\n\nFig. 11.1 Sparse\
    \ quartiles-sorting decomposed outranking relation (extract). Legend: outranking\
    \ for certain (⊤); outranked for certain (⊥); more or less outranking (+); more\
    \ or less outranked (−); indeterminate ( )\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_171_0.png)\n\
    \nListing 11.5 The relation() function of a sparse outranking digraph\n\n```python\n\
    def relation(self, int x, int y):\n    \"\"\"\n    *Parameters*:\n        * x\
    \ (int action key),\n        * y (int action key).\n    Dynamic construction of\
    \ the global outranking\n    characteristic function *r(x S y)*.\n    \"\"\"\n\
    \    cdef int Min, Med, Max, rx, ry\n    Min = self.valuationdomain['min']\n \
    \   Med = self.valuationdomain['med']\n    Max = self.valuationdomain['max']\n\
    \    if x == y:\n        return Med\n    cx = self.actions[x]['component']\n \
    \   cy = self.actions[y]['component']\n    #print(self.components)\n    rx = self.components[cx]['rank']\n\
    \    ry = self.components[cy]['rank']\n    if rx == ry:\n        try:\n      \
    \      rxpg = self.components[cx]['subGraph'].relation\n            return rxpg[x][y]\n\
    \        except AttributeError:\n            componentRanking = self.components[cx]['componentRanking']\n\
    \            if componentRanking.index(x) < componentRanking.index(y):\n     \
    \           return Max\n            else:\n                return Min\n    elif\
    \ rx > ry:\n        return Min\n    else:\n        return Max\n```\n\n## 11.5\
    \ Quantiles Ranking of Big Performance Tableaux\n\nThe `boostedRanking` attribute\
    \ of the sparse outranking digraph `sg` contains the global linear ranking of\
    \ the 100 decision alternatives. This ranking is computed by locally ranking the\
    \ individual 6 components with the COPELAND rule (see Listing 11.4 on page 142).\n\
    \n```\n>>> sg.boostedRanking\n[22, 53, 3, 34, 56, 62, 24, 44, 50, 93, 41, 63,\
    \ 29, 58,\n 96, 7, 43, 81, 91, 35, 25, 76, 66, 65, 8, 10, 1, 11, 61,\n 30, 48,\
    \ 45, 68, 5, 89, 57, 59, 85, 82, 73, 33, 94, 70,\n 97, 20, 92, 71, 90, 95, 21,\
    \ 28, 2, 36, 87, 40, 98, 46, 55,\n 100, 64, 17, 26, 27, 19, 69, 6, 38, 4, 37,\
    \ 60, 31, 77, 78,\n 47, 99, 18, 12, 80, 54, 88, 39, 9, 72, 86, 42, 13, 23, 67,\n\
    \ 52, 15, 32, 49, 51, 74, 16, 14, 75, 79, 83, 84]\n```\n\nWhen actually computing\
    \ linear rankings of the complete set of alternatives, the local outranking relations\
    \ per component are of no practical usage, and we may furthermore reduce the memory\
    \ occupation of the resulting digraph by:\n\n- 1. refining the ordering of the\
    \ quantile classes by taking into account how well an alternative is outranking\
    \ the lower limit of its quantile class, respectively, the upper limit of its\
    \ quantile class is *not* outranking the alternative;\n- 2. dropping the local\
    \ outranking digraphs and keeping for each component only a locally ranked list\
    \ of alternatives.\n\nWe provide therefore the `cQuantilesRankingDigraph` class\
    \ from the `cSparseIntegerOutrankingDigraphs` module.\n\n**Listing 11.6** Ranking\
    \ the sparse integer outranking digraph\n\n```\n>>> from cSparseIntegerOutrankingDigraphs\
    \ import cQuantilesRankingDigraph\n>>> qr = cQuantilesRankingDigraph(t,4)\n>>>\
    \ qr\n*----- Object instance description ----------------*\n Instance class  \
    \  : cQuantilesRankingDigraph\n Instance name     : cRandomperftab_mp\n Actions\
    \           : 100\n Criteria          : 7\n Sorting by        : 4-Tiling\n Ordering\
    \ strategy : optimal\n Ranking rule      : Copeland\n Components        : 47\n\
    \ Minimal order     : 1\n Maximal order     : 10\n Average order     : 2.1\n fill\
    \ rate         : 2.566%\n*----  Constructor run times (in sec.) ----*\n Nbr of\
    \ threads    : 1\n Total time        : 0.03702\n QuantilesSorting  : 0.01785\n\
    \ Preordering       : 0.00022\n Decomposing       : 0.01892\n Attributes     \
    \   : ['runTimes', 'name',\n 'actions', 'order', 'dimension', 'sortingParameters',\n\
    \ 'nbrOfCPUs', 'valuationdomain', 'profiles', 'categories',\n 'sorting', 'minimalComponentSize',\
    \ 'decomposition',\n 'nbrComponents', 'nd', 'components', 'fillRate',\n 'maximalComponentSize',\
    \ 'componentRankingRule',\n 'boostedRanking']\n```\n\nWith this *optimised* quantile\
    \ ordering strategy, we obtain now 47 performance equivalence classes (see Listing\
    \ 11.6 on the facing page Line 13).\n\n### Listing 11.7 The ordered components\
    \ of the sparse outranking digraph\n\n```\n>>> qr.components\nOrderedDict([\n\
    \ ('c01', {'rank': 1,\n           'lowQtileLimit': ']0.75',\n           'highQtileLimit':\
    \ '1.00]',\n           'componentRanking': [53]}),\n ('c02', {'rank': 2,\n   \
    \        'lowQtileLimit': ']0.75',\n           'highQtileLimit': '1.00]',\n  \
    \         'componentRanking': [3, 23, 63, 50]}),\n ('c03', {'rank': 3,\n     \
    \      'lowQtileLimit': ']0.75',\n           'highQtileLimit': '1.00]',\n    \
    \       'componentRanking': [34, 44, 56, 24, 93, 41]}),\n ...\n ...\n ...\n ('c45',\
    \ {'rank': 45,\n           'lowQtileLimit': ']0.25',\n           'highQtileLimit':\
    \ '0.50]',\n           'componentRanking': [49]}),\n ('c46', {'rank': 46,\n  \
    \         'lowQtileLimit': ']0.25',\n           'highQtileLimit': '0.50]',\n \
    \          'componentRanking': [52, 16, 86]}),\n ('c47', {'rank': 47,\n      \
    \     'lowQtileLimit': ']<',\n           'highQtileLimit': '0.25]',\n        \
    \   'componentRanking': [79, 83, 84]}))\n>>> print('%.0fkB' % (total_size(qr)/1024)\
    \ )\n208kB\n```\n\nWe observe in the last Line of Listing 11.7 on the previous\
    \ page an even more considerably less voluminous memory occupation 208 kB, compared\
    \ to the 769 kB of the SparseIntegerOutrankingDigraph instance.\nIt is opportune,\
    \ however, to measure the loss of quality of the resulting COPELAND ranking when\
    \ working with sparse outranking digraphs.\n\n### Listing 11.8 Measuring the loss\
    \ of quality with respect to the standard outranking digraph\n\n```python\n>>>\
    \ from cIntegerOutrankingDigraphs import IntegerBipolarOutrankingDigraph\n>>>\
    \ ig = IntegerBipolarOutrankingDigraph(t)\n>>> print('Complete outranking : %+.3f'\n\
    ...       % (ig.computeOrderCorrelation(\n...          ig.computeCopelandOrder()))['correlation']))\n\
    Complete outranking : +0.747\n\n>>> print('Sparse 4-tiling : %+.3f'\n...     \
    \  % (ig.computeOrderCorrelation(\n...          list(reversed(sg.boostedRanking)))['correlation']))\n\
    Sparse 4-tiling       : +0.717\n\n>>> print('Optimized sparse 4-tiling: %+.3f'\n\
    ...       % (ig.computeOrderCorrelation(\n...          list(reversed(qr.boostedRanking)))\n\
    ...          ['correlation']))\nOptimized sparse 4-tiling: +0.705\n```\n\nThe\
    \ best ranking correlation with the pairwise outranking situations (+0.747) is\
    \ naturally given when we apply the COPELAND rule to the standard outranking digraph\
    \ (see Listing 10.8 on page 132 Line 7). When applying the same rule to the sparse\
    \ 4-tiled outranking digraph, one gets a correlation of +0.717 (Line 12), and\
    \ when applying the COPELAND rule to the optimised sparse 4-tiled digraph, we\
    \ still obtain a correlation of +0.705 (Line 18). These optimistic results actually\
    \ depend on the number of quantiles we use as well as on the given model of random\
    \ performance tableau.\nIn case of Random3ObjectivesPerformanceTableau instances\
    \ we would get in a similar setting an even better standard outranking correlation\
    \ of +0.86, a sparse 4-tiling correlation of +0.82, and an optimised sparse 4-tiling\
    \ correlation of +0.81.\n\n## 11.6 HPC Quantiles Ranking Records\n\nFig. 11.2\
    \ *HPC-UL Ranking Performance Records (Spring 2018)*. On the big memory equipped\
    \ Gaia-183 node with 64 cores we were able to rank one million, respectively,\
    \ 6 million decision alternatives in about 2 minutes, respectively, 41 minutes\n\
    \n| $\\succcurlyeq^q$ outranking relation order | size | $q$ | fill rate | nbr.\
    \ cores | run time |\n|---|---|---|---|---|---|\n| 5 000 | $25 \\times 10^6$ |\
    \ 4 | 0.005% | 28 | 0.5\" |\n| 10 000 | $1 \\times 10^8$ | 4 | 0.001% | 28 | 1\"\
    \ |\n| 100 000 | $1 \\times 10^{10}$ | 5 | 0.002% | 28 | 10\" |\n| 1 000 000 |\
    \ $1 \\times 10^{12}$ | 6 | 0.001% | 64 | 2' |\n| 3 000 000 | $9 \\times 10^{12}$\
    \ | 15 | 0.004% | 64 | 13' |\n| 6 000 000 | $36 \\times 10^{12}$ | 15 | 0.002%\
    \ | 64 | 41' |\n\nFollowing from the separability property of the $q$-tiles sorting\
    \ of each action into a $q$-tiles class, the $q$-sorting algorithm may be safely\
    \ split into as much threads as are multiple processing cores available for working\
    \ in parallel (see Proposition 9.1). Furthermore, the ranking procedure being\
    \ local to each diagonal component, these procedures may as well be safely processed\
    \ in parallel threads on each component restricted outranking digraph.\n\nUsing\
    \ the HPC platform of the University of Luxembourg—https://hpc-docs.uni.lu/ (Varrette\
    \ et al. 2014)—the run times shown in Fig. 11.2 for very big ranking problems\
    \ could be achieved both on:\n\n- *Iris* -skylake nodes with 28 cores: (see https://hpc-docs.uni.lu/systems/iris),\
    \ and\n- the 3TB -bigmem *Gaia-183* node with 64 cores (see https://hpc.uni.lu/systems/gaia),\n\
    \nby running the cythonized Python modules in an Intel compiled virtual Python\
    \ 3.6.5 environment [GCC Intel(R) 17.0.1—enable-optimisations c++ gcc 6.3 mode]\
    \ on Debian 8 Linux.\n\nThe next Part III presents three real case studies of\
    \ building a best choice recommendation—Chap. 12, ranking incommensurable multiple-criteria\
    \ performance records—Chap. 13, and rating student enrolment qualities—Chap. 14.\
    \ Chapter 15 eventually list some exercises for home work and exam questions.\n\
    \n## References\n\nBisdorff R (2016) Computing linear rankings from trillions\
    \ of pairwise outranking situations. In: Busa-Fekete R, Hüllermeier E, Mousseau\
    \ V, Pfannschmidt K (eds) From multiple criteria decision aid to preference learning\
    \ , DAP’2016, University of Paderborn (Germany), pp 1–16. http://hdl.handle.net/10993/28613\n\
    \nVarrette S, Bouvry P, Cartiaux H, Georgatos F (2014) Management of an academic\
    \ HPC cluster: the UL experience. In: Intl. conf. on high performance computing\
    \ & simulation (HPCS 2014), Bologna (Italy). IEEE, New York, pp 959–967"
  mdcn: "## 11.4 大型优势关系图的稀疏实现\n\n图 11.1 稀疏四分位数排序分解的优势关系（摘录）。图例：确定优势（⊤）；确定劣势（⊥）；大致优势（+）；大致劣势（−）；不确定（\
    \ ）\n\n![](img/16b49f4bd7a0e5e8eab9001001a6dc21_171_0.png)\n\n代码清单 11.5 稀疏优势关系图的\
    \ `relation()` 函数\n\n```python\ndef relation(self, int x, int y):\n    \"\"\"\n\
    \    *Parameters*:\n        * x (int action key),\n        * y (int action key).\n\
    \    Dynamic construction of the global outranking\n    characteristic function\
    \ *r(x S y)*.\n    \"\"\"\n    cdef int Min, Med, Max, rx, ry\n    Min = self.valuationdomain['min']\n\
    \    Med = self.valuationdomain['med']\n    Max = self.valuationdomain['max']\n\
    \    if x == y:\n        return Med\n    cx = self.actions[x]['component']\n \
    \   cy = self.actions[y]['component']\n    #print(self.components)\n    rx = self.components[cx]['rank']\n\
    \    ry = self.components[cy]['rank']\n    if rx == ry:\n        try:\n      \
    \      rxpg = self.components[cx]['subGraph'].relation\n            return rxpg[x][y]\n\
    \        except AttributeError:\n            componentRanking = self.components[cx]['componentRanking']\n\
    \            if componentRanking.index(x) < componentRanking.index(y):\n     \
    \           return Max\n            else:\n                return Min\n    elif\
    \ rx > ry:\n        return Min\n    else:\n        return Max\n```\n\n## 11.5\
    \ 大型性能矩阵的分位数排序\n\n稀疏优势关系图 `sg` 的 `boostedRanking` 属性包含了 100 个决策方案的全局线性排序。该排序是通过使用\
    \ COPELAND 规则（参见第 142 页的代码清单 11.4）对 6 个独立组件进行局部排序后计算得出的。\n\n```\n>>> sg.boostedRanking\n\
    [22, 53, 3, 34, 56, 62, 24, 44, 50, 93, 41, 63, 29, 58,\n 96, 7, 43, 81, 91, 35,\
    \ 25, 76, 66, 65, 8, 10, 1, 11, 61,\n 30, 48, 45, 68, 5, 89, 57, 59, 85, 82, 73,\
    \ 33, 94, 70,\n 97, 20, 92, 71, 90, 95, 21, 28, 2, 36, 87, 40, 98, 46, 55,\n 100,\
    \ 64, 17, 26, 27, 19, 69, 6, 38, 4, 37, 60, 31, 77, 78,\n 47, 99, 18, 12, 80,\
    \ 54, 88, 39, 9, 72, 86, 42, 13, 23, 67,\n 52, 15, 32, 49, 51, 74, 16, 14, 75,\
    \ 79, 83, 84]\n```\n\n在实际计算完整方案集的线性排序时，每个组件的局部优势关系并无实际用途，我们还可以通过以下方式进一步减少所得关系图的内存占用：\n\
    \n- 1. 通过考虑一个方案对其分位数类别下限的优势程度，以及其分位数类别上限*不*对该方案构成优势的程度，来细化分位数类别的排序；\n- 2. 丢弃局部优势关系图，仅为每个组件保留一个局部排序的方案列表。\n\
    \n因此，我们提供了来自 `cSparseIntegerOutrankingDigraphs` 模块的 `cQuantilesRankingDigraph`\
    \ 类。\n\n**代码清单 11.6** 对稀疏整数优势关系图进行排序\n\n```\n>>> from cSparseIntegerOutrankingDigraphs\
    \ import cQuantilesRankingDigraph\n>>> qr = cQuantilesRankingDigraph(t,4)\n>>>\
    \ qr\n*----- Object instance description ----------------*\n Instance class  \
    \  : cQuantilesRankingDigraph\n Instance name     : cRandomperftab_mp\n Actions\
    \           : 100\n Criteria          : 7\n Sorting by        : 4-Tiling\n Ordering\
    \ strategy : optimal\n Ranking rule      : Copeland\n Components        : 47\n\
    \ Minimal order     : 1\n Maximal order     : 10\n Average order     : 2.1\n fill\
    \ rate         : 2.566%\n*----  Constructor run times (in sec.) ----*\n Nbr of\
    \ threads    : 1\n Total time        : 0.03702\n QuantilesSorting  : 0.01785\n\
    \ Preordering       : 0.00022\n Decomposing       : 0.01892\n Attributes     \
    \   : ['runTimes', 'name',\n 'actions', 'order', 'dimension', 'sortingParameters',\n\
    \ 'nbrOfCPUs', 'valuationdomain', 'profiles', 'categories',\n 'sorting', 'minimalComponentSize',\
    \ 'decomposition',\n 'nbrComponents', 'nd', 'components', 'fillRate',\n 'maximalComponentSize',\
    \ 'componentRankingRule',\n 'boostedRanking']\n```\n\n通过这种*优化的*分位数排序策略，我们现在得到了\
    \ 47 个性能等价类（参见对面页代码清单 11.6 第 13 行）。\n\n### 代码清单 11.7 稀疏优势关系图的有序组件\n\n```\n>>>\
    \ qr.components\nOrderedDict([\n ('c01', {'rank': 1,\n           'lowQtileLimit':\
    \ ']0.75',\n           'highQtileLimit': '1.00]',\n           'componentRanking':\
    \ [53]}),\n ('c02', {'rank': 2,\n           'lowQtileLimit': ']0.75',\n      \
    \     'highQtileLimit': '1.00]',\n           'componentRanking': [3, 23, 63, 50]}),\n\
    \ ('c03', {'rank': 3,\n           'lowQtileLimit': ']0.75',\n           'highQtileLimit':\
    \ '1.00]',\n           'componentRanking': [34, 44, 56, 24, 93, 41]}),\n ...\n\
    \ ...\n ...\n ('c45', {'rank': 45,\n           'lowQtileLimit': ']0.25',\n   \
    \        'highQtileLimit': '0.50]',\n           'componentRanking': [49]}),\n\
    \ ('c46', {'rank': 46,\n           'lowQtileLimit': ']0.25',\n           'highQtileLimit':\
    \ '0.50]',\n           'componentRanking': [52, 16, 86]}),\n ('c47', {'rank':\
    \ 47,\n           'lowQtileLimit': ']<',\n           'highQtileLimit': '0.25]',\n\
    \           'componentRanking': [79, 83, 84]}))\n>>> print('%.0fkB' % (total_size(qr)/1024)\
    \ )\n208kB\n```\n\n我们在前一页代码清单 11.7 的最后一行观察到，与 SparseIntegerOutrankingDigraph 实例的\
    \ 769 kB 相比，内存占用显著减少至 208 kB。然而，有必要衡量在使用稀疏优势关系图时，所得 COPELAND 排序的质量损失。\n\n### 代码清单\
    \ 11.8 衡量相对于标准优势关系图的质量损失\n\n```python\n>>> from cIntegerOutrankingDigraphs import\
    \ IntegerBipolarOutrankingDigraph\n>>> ig = IntegerBipolarOutrankingDigraph(t)\n\
    >>> print('Complete outranking : %+.3f'\n...       % (ig.computeOrderCorrelation(\n\
    ...          ig.computeCopelandOrder()))['correlation']))\nComplete outranking\
    \ : +0.747\n\n>>> print('Sparse 4-tiling : %+.3f'\n...       % (ig.computeOrderCorrelation(\n\
    ...          list(reversed(sg.boostedRanking)))['correlation']))\nSparse 4-tiling\
    \       : +0.717\n\n>>> print('Optimized sparse 4-tiling: %+.3f'\n...       %\
    \ (ig.computeOrderCorrelation(\n...          list(reversed(qr.boostedRanking)))\n\
    ...          ['correlation']))\nOptimized sparse 4-tiling: +0.705\n```\n\n与成对优势情况的最佳排序相关性（+0.747）自然是在将\
    \ COPELAND 规则应用于标准优势关系图时获得的（参见第 132 页的代码清单 10.8 第 7 行）。当将相同的规则应用于稀疏 4-分块优势关系图时，得到的相关性为\
    \ +0.717（第 12 行），而当将 COPELAND 规则应用于优化的稀疏 4-分块关系图时，我们仍然获得 +0.705 的相关性（第 18 行）。这些乐观的结果实际上取决于我们使用的分位数数量以及给定的随机性能矩阵模型。在\
    \ Random3ObjectivesPerformanceTableau 实例的情况下，在类似设置中，我们将获得更好的标准优势相关性 +0.86，稀疏 4-分块相关性\
    \ +0.82，以及优化的稀疏 4-分块相关性 +0.81。\n\n## 11.6 高性能计算分位数排序记录\n\n图 11.2 *HPC-UL 排序性能记录（2018\
    \ 年春季）*。在配备大内存的 Gaia-183 节点（64 核）上，我们能够在大约 2 分钟和 41 分钟内分别对一百万和六百万个决策方案进行排序。\n\n\
    | $\\succcurlyeq^q$ 优势关系阶 | 规模 | $q$ | 填充率 | 核心数 | 运行时间 |\n|---|---|---|---|---|---|\n\
    | 5 000 | $25 \\times 10^6$ | 4 | 0.005% | 28 | 0.5\" |\n| 10 000 | $1 \\times\
    \ 10^8$ | 4 | 0.001% | 28 | 1\" |\n| 100 000 | $1 \\times 10^{10}$ | 5 | 0.002%\
    \ | 28 | 10\" |\n| 1 000 000 | $1 \\times 10^{12}$ | 6 | 0.001% | 64 | 2' |\n\
    | 3 000 000 | $9 \\times 10^{12}$ | 15 | 0.004% | 64 | 13' |\n| 6 000 000 | $36\
    \ \\times 10^{12}$ | 15 | 0.002% | 64 | 41' |\n\n由于每个方案的 $q$-分位数排序具有可分离性，$q$-排序算法可以安全地拆分为与可用并行处理核心数量一样多的线程（参见命题\
    \ 9.1）。此外，由于排序过程对每个对角线组件是局部的，这些过程也可以安全地在每个组件受限的优势关系图上并行线程处理。\n\n使用卢森堡大学的高性能计算平台——https://hpc-docs.uni.lu/（Varrette\
    \ 等人，2014 年）——图 11.2 中所示的非常大的排序问题的运行时间可以在以下环境中实现：\n\n- *Iris* -skylake 节点（28 核）：（参见\
    \ https://hpc-docs.uni.lu/systems/iris），以及\n- 3TB 大内存 *Gaia-183* 节点（64 核）（参见 https://hpc.uni.lu/systems/gaia），\n\
    \n通过在 Debian 8 Linux 上的 Intel 编译虚拟 Python 3.6.5 环境 [GCC Intel(R) 17.0.1—enable-optimisations\
    \ c++ gcc 6.3 模式] 中运行 Cython 化的 Python 模块。\n\n下一部分第三部分介绍了三个构建最佳选择推荐的实际案例研究——第\
    \ 12 章，对不可通约的多准则性能记录进行排序——第 13 章，以及评估学生入学质量——第 14 章。第 15 章最终列出了一些家庭作业和考试题目。\n\n\
