    # 14.4 Rating by Quintiles Sorting


    In the case study here, the five universities U1, U2, U3, U4, and U5 represent
    the decision actions: *where to study*. We say now that University *x* is sorted
    into the lower-closed quintile *k* when the performance record of *x* positively
    outranks the lower limit record **q**($p_{k-1}$) of quintile *q* and *x* does
    not positively outrank the upper limit record **q**($p_k$) of quintile *q*, for
    *q* = 1, ..., 5 (see Listing 14.1 on page 189).'
  - '[PAGE 222]


    With the help of the bipolar-valued characteristic of the outranking relation
    $r(x \succsim y)$, we may indeed compute the bipolar-valued characteristic of
    the assertion: ''$x$ belongs to the lower-closed quintile class $\mathbf{q}_k$'':


    $$r(x \in \mathbf{q}_k) = \min [r(x \succsim \mathbf{q}(p_{k-1})), r(x \succnsim
    \mathbf{q}(p_k))],$$


    where $k = 1, \dots, 5$ and $(p_k)$ denote the respective quintile proportions:
    0.20, 0.40, 0.60, 0.80, and 1.00. As bipolar-valued outranking digraphs verify
    the coduality principle, $r(x \succnsim \mathbf{q}(p_k)) = r(xprecnsim\mathbf{q}(p_k))$
    (see Sect. 9.2).


    The `showSortingCharacteristics()` method gives a precise look in Listing 14.7
    on these quintiles sorting characteristics.


