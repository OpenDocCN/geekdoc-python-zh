- md: "## Chapter 5\nHow to Create a New Multiple-Criteria Performance Tableau\n\n\
    ## Contents\n\n- 5.1 Editing a Template File\n- 5.2 Editing the Decision Alternatives\n\
    - 5.3 Editing the Decision Objectives\n- 5.4 Editing the Family of Performance\
    \ Criteria\n- 5.5 Editing the Performance Evaluations\n- 5.6 Inspecting the Template\
    \ Outranking Relation\n\n**Abstract** The chapter illustrates a way of creating\
    \ a new `PerformanceTableau` instance by editing a given template with five decision\
    \ alternatives, three decision objectives, and six performance criteria. We discuss\
    \ in detail editing the decision alternatives, the decision objectives, the family\
    \ of performance criteria, and finally, the evaluations of the decision alternatives\
    \ on the performance criteria.\n\n## 5.1 Editing a Template File\n\nFor easing\
    \ the editing of a new multiple-criteria performance tableau, we provide the following\
    \ `perfTab_Template.py` file in the `examples` directory of the DIGRAPH3 resources.\n\
    \n**Listing 5.1** PerformanceTableau object template\n\n```python\n###############################################\n\
    # Digraph3 documentation\n# Template for creating a new PerformanceTableau instance\n\
    # (C) R. Bisdorff Mar 2021\n# Digraph3/examples/perfTab_Template.py\n###############################################\n\
    from decimal import Decimal\nfrom collections import OrderedDict\n#####\n# edit\
    \ the decision actions\n# avoid special characters, like '_', '/' or ':',\n# in\
    \ action identifiers and short names\nactions = OrderedDict([\n('a1', {\n 'shortName':\
    \ 'action1',\n 'name': 'decision alternative a1',\n 'comment': 'some specific\
    \ features of this alternative',\n}),\n...\n...\n]),\n#####\n# edit the decision\
    \ objectives\n# adjust the list of performance criteria\n# and the total weight\
    \ (sum of the criteria weights\n# per objective\nobjectives = OrderedDict([\n\
    ('obj1', {\n 'name': 'decision objective obj1',\n 'comment': \"some specific features\
    \ of this objective\",\n 'criteria': ['g1', 'g2'],\n 'weight': Decimal('6'),\n\
    }),\n...\n...\n])\n#####\n# edit the performance criteria\n# adjust the objective\
    \ reference\n# Left Decimal of a threshold = constant part and\n#  right Decimal\
    \ = proportional part of the threshold\ncriteria = OrderedDict([\n('g1', {\n 'shortName':\
    \ 'crit1',\n 'name': \"performance criteria 1\",\n 'objective': 'obj1',\n 'preferenceDirection':\
    \ 'max',\n 'comment': 'measurement scale type and unit',\n 'scale': (Decimal('0.0'),\
    \ Decimal('100.0'),\n 'thresholds': {'ind': (Decimal('2.50'), Decimal('0.0')),\n\
    \                'pref': (Decimal('5.00'), Decimal('0.0')),\n                'veto':\
    \ (Decimal('60.00'), Decimal('0.0'))\n                },\n 'weight': Decimal('3'),\n\
    }),\n...\n...\n])\n#####\n# default missing data symbol = -999\nNA = Decimal('-999')\n\
    #####\n# edit the performance evaluations\n# criteria to be minimized take negative\
    \ evaluations\nevaluation = {\n'g1': {\n   'a1':Decimal(\"41.0\"),\n   'a2':Decimal(\"\
    100.0\"),\n   'a3':Decimal(\"63.0\"),\n   'a4':Decimal('23.0'),\n   'a5': NA,\n\
    \ },\n # g2 is of ordinal type and scale 0-10\n'g2': {\n   'a1':Decimal(\"4\"\
    ),\n   'a2':Decimal(\"10\"),\n   'a3':Decimal(\"6\"),\n   'a4':Decimal('2'),\n\
    \   'a5':Decimal('9'),\n },\n```\n\nDigraph3 (graphviz), R. Bisdorff, 2020\n\n\
    **Fig. 4.5** *The internal stability of a best choice recommendation in question*\n\
    The only kernel of this digraph is the pair {a, d}; yet, it is an ambiguous recommendation,\
    \ as {a, d} is conjointly an outranking and outranked choice. If the instability\
    \ of the best choice recommendation is, however, not considered a problem, then\
    \ the choice {a, b} shows the most convincing strict outranking quality and could\
    \ be considered in priority for a potential best choice recommendation.\n\nHis\
    \ commentary was the following: Adding alternative d to the set of potential best\
    \ choice candidates is not convincing as there exists in the given digraph the\
    \ node b, which is better evaluated than d. The argument that the incomparability\
    \ between a and d should favour d as potential best choice is interesting but\
    \ another hypothesis could be that b perhaps outranks a. In this latter case,\
    \ it seems clear that the actual best choice recommendation should be reduced\
    \ to node b, unless one disposes of other information, like a performance tableau\
    \ and/or the actual computation method of the outranking situations. In any case,\
    \ one has to be very clear about the available information when judging a best\
    \ choice procedure.\n\nIt became thereafter obvious for us all that both the lack\
    \ of a specific performance tableau as well as the lack of a precisely defined\
    \ algorithm for computing valid outranking situations do not allow to judge if\
    \ a given digraph does indeed model a potential outranking relation. In our present\
    \ bipolar-valued epistemic approach, a valid outranking digraph instance, following\
    \ from a given performance tableau and the disjunctive epistemic fusion construction\
    \ of the outranking relation (see Chap. 3), will necessarily verify the weak completeness\
    \ condition and the coduality principle. As a consequence, incomparability situations\
    \ are now modelled by epistemic indeterminateness not by the actual absence of\
    \ a reciprocal outranking relation.\n\nThe digraph put forward by *D. Bouyssou*\
    \ in the October 2005 discussion is not weakly complete—node a is not outranking\
    \ node d and vice versa—and does hence not represent, in our present sense, a\
    \ valid outranking digraph instance. Yet, it may be a partial tournament and as\
    \ such it could be a strict outranking digraph, i.e. the asymmetric part—the codual—of\
    \ a valid outranking digraph. In this case, nodes a and d—the kernel of the strict\
    \ outranking digraph—would actually for sure outrank each other and, hence, represent\
    \ both indifferently the natural best choice recommendation. However, in this\
