    c6 : 09.79% | c7 : 09.79% | c6 : 10.23%\nc4 : 04.83% | c3 : 04.83% | c4 : 09.89%\n\
    c1 : 02.37% | c2 : 02.37% | c5 : 08.98%\n```\n\n## 20.1 带有多党初选的两阶段选举\n\n```\n\
