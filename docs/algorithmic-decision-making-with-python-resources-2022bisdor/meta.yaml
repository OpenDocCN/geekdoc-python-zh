    **Abstract** In 2004, the German magazine *Der Spiegel*, with the help of *McKinsey
    & Company* and *AOL*, conducted an extensive online survey, assessing the apparent
    quality of German University students. The eventually published results by the
    *Spiegel* magazine concerned nearly 50,000 students, enrolled in one of fifteen
    popular academic subjects, like *German Studies*, *Life Sciences*, *Psychology*,
    *Law* or *CS*. Based on this published data, we present and discuss in this chapter,
    how to *rate* with the help of our DIGRAPH3 software resources the apparent global
    *enrolment quality* of new performance records.


    # 14.1 The Rating Problem


    In the 2004 DER SPIEGEL survey, more than 80,000 students, by participating, were
    questioned on their ‘Abitur’ and university exams’ marks, time of studies and
    age, grants, awards and publications, IT proficiency, linguistic skills, practical
    work experience, foreign mobility, and civil engagement. Each student received
    in return a quality score through a specific weighing of the collected data which
    depended on the subject the student is mainly studying. Publishing only those
    subject-university combinations, where at least 18 students had correctly filled
    in the questionnaire, left 41 German universities where, for at least eight out
    of the fifteen subjects, an average enrolment quality score could be determined
    (DER SPIEGEL 2004; Friedmann et al. 2004).'
