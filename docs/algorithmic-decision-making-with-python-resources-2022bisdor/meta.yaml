    ```\n\n没有无弦回路（见上方第 9 行），并且超过一半所需的传递闭包缺失（见上方第 13 行）。现在，我们知道它的潜在预核必须在其最大独立选择集合中。\n\
    \n## 清单 17.11 检查随机有向图 rd 的预核\n\n```\n>>> rd.showMIS()\n*--- 最大独立选择 ---*\n  ['a2',\
