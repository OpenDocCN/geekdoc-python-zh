    \ ['en03', 'en04', 'en05', 'en07',\n               'en08', 'en10', 'en11', 'en13'],\n\
    \  'weight': Decimal('48')})\n])\n```\n\n在清单5.3所示的三个示例决策目标中，每个目标的重要性权重总和为48，因此3个经济标准的显著性权重各设为16，2个社会标准的显著性权重各设为24，6个环境标准的显著性权重各设为8（参见第8、13和19行）。\n\
    \n请注意，即使为空，`objectives` 属性也始终存在于性能矩阵对象实例中。在这种情况下，我们认为每个性能标准都规范地代表其自身的决策目标。此时，标准的显著性权重等于相应决策目标的重要性权重。\n\
    \n模板文件的第三部分现在涉及性能标准。\n\n## 5.4 编辑性能标准族\n\n为了评估每个潜在决策备选方案在多大程度上满足给定的决策目标，我们需要性能标准，即收集在有序标准字典中的十进制值评估函数。所需属性（参见清单5.4）除了标准标识符外，还包括通常的\
    \ `shortName`、`name` 和 `comment`。特定于标准的属性还包括：目标引用、显著性权重、评估量表（最小和最大性能值）、`preferenceDirection`（'max'\
    \ 或 'min'）以及性能区分阈值属性。\n\n**清单5.4** 性能标准描述示例\n\n```python\ncriteria = OrderedDict([\n\
    ('g1', {\n 'shortName': 'crit1',\n 'name': \"performance criteria 1\",\n 'comment':\
    \ 'measurement scale type and unit',\n 'objective': 'obj1',\n 'weight': Decimal('3'),\n\
