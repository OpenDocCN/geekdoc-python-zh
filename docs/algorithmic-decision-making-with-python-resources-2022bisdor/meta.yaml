    18.3 Confidence level Of Outranking Digraphs .....................................................
    255


    **Abstract** When modelling preferences following the outranking approach, the
    signs of the majority margins do sharply distribute validation and invalidation
    of pairwise outranking situations. How can we be confident in the resulting outranking
    digraph, when we acknowledge the usual imprecise knowledge of criteria significance
    weights coupled with small majority margins? In this chapter we propose to link
    the qualifying significance majority with a required $\alpha\%$-confidence level.
    We model therefore the significance weights as random variables following more
    or less widespread distributions around an average significance value that corresponds
    to the given deterministic weight. As the bipolar-valued random credibility of
    an outranking statement hence results from the simple sum of positive or negative
    independent random variables, we may apply the Central Limit Theorem (CLT) for
    computing the bipolar likelihood that the expected majority margin will indeed
    be positive and, respectively, negative.


    # 18.1 Modelling Uncertain Criteria Significance Weights


    Let us consider the significance weights of a family $F$ of $m$ criteria to be
    independent random variables $W_j$, distributing the potential significance weight
    of each criterion $j = 1, ..., m$ around a mean value $E(W_j)$ with variance $V(W_j)$.

    Choosing a specific stochastic model of uncertainty is usually application specific.
    In the limited scope of this chapter, we will illustrate the consequence of this
    design decision on the resulting outranking modelling with four slightly different
    models for taking into account the uncertainty with which we know the'
