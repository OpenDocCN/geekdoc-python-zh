    **Abstract** In this case study, we are solving with our DIGRAPH3 resources a
    ranking decision problem based on published data from the *Times Higher Education*
    (THE) *World University Rankings* 2016 by *Computer Science* (CS) subject. Several
    hundred academic CS Departments, from all over the world, were ranked that year
    following an overall numerical score based on the weighted average of five performance
    criteria: *Teaching* (the learning environment, 30%), *Research* (volume, income
    and reputation, 30%), *Citations* (research influence, 27.5%), *International
    outlook* (staff, students, and research, 7.5%), and *Industry income* (innovation,
    5%). To illustrate our DIGRAPH3 programming resources, we shall first have a look
    into the THE multiple-criteria ranking data with short Python scripts. In a second
    section, we shall relax the commensurability hypothesis of the ranking criteria
    and show how to similarly rank with multiple incommensurable performance criteria
    of solely ordinal significance. A third section is finally devoted to introduce
    quality measures for qualifying ranking results.


    # 13.1 The THE Performance Tableau


    For this decision making case study, we use an extract of the published TIMES
    HIGHER EDUCATION (THE) World University rankings 2016 by Computer Science (CS)
    subject, concerning the 75 first-ranked academic Institutions.¹ The multiple-


