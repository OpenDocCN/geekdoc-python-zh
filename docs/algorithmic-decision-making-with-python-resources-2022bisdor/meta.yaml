- md: '## Part I

    Introduction to the DIGRAPH3 Python Resources


    The first part contains three chapters for introducing the DIGRAPH3 software collection
    of Python programming resources. The first chapter is devoted to the installation
    of the DIGRAPH3 Python modules and running a first Python terminal session using
    the DIGRAPH3 resources. The second chapter introduces bipolar-valued digraphs,
    the root type of all available specialised digraphs. The third chapter finally
    introduces the main formal objects of this book, namely bipolar-valued outranking
    digraphs.


    ## Chapter 1

    Working with the DIGRAPH3 Python Resources


    ### Contents


    - 1.1 Installing the DIGRAPH3 Resources

    - 1.2 Organisation of the DIGRAPH3 Python Modules

    - 1.3 Starting a DIGRAPH3 Terminal Session

    - 1.4 Inspecting a Digraph Object


    **Abstract** The chapter is devoted to a first contact with the DIGRAPH3 Python
    resources. Following the installation instructions, we list the main Python modules
    with their purpose and eventually illustrate in a first Python terminal session
    how to generate, save, and inspect a random crisp digraph.


    ### 1.1 Installing the DIGRAPH3 Resources


    Using the DIGRAPH3 Python modules is simple.¹ You only need to have installed
    on your system the Python programming language of version 3 (by default available
    under Linux and MacOS).


    Several download options (easiest under Linux or MacOS) are given; either, by
    using a `git` client and `clone` a working copy from the `github.com` directory:

    `...$ git clone https://github.com/rbisdorff/Digraph3`

    or from the `sourceforge.net` directory:

    `...$ git clone https://git.code.sf.net/p/digraph3/code Digraph3`


    It is also possible, with a browser access, to download either,

    - from the `github.com` link or

    - from the `sourceforge.net` link,


    the latest distribution zip archive and extract it.


    On Linux or MacOS, `...$ cd` to the cloned or extracted Digraph3 directory. The
    following shell command installs (with sudo !) the DIGRAPH3 modules in the system-wide
    python environment:


    ```

    .../Digraph3$ make install

    ```


    Python-3.8 (or later) environment is recommended (see the makefile for adapting
    the make install command to your running python environment). Whereas the following
    shell command installs the DIGRAPH3 modules locally in an activated virtual python
    user environment:


    ```

    .../Digraph3$ make installVenv

    ```


    If the C-compiled modules for Big Data applications are required, it is necessary
    to previously install the cython compiler² package in the running Python environment:


    ```

    ...$ python3 -m pip install cython

    ```


    It is recommended to run a test suite:


    ```

    .../Digraph3$ make tests

    ```


    Test results are stored in the Digraph3/test directory. Notice that the python3
    pytest package is required:


    ```

    ...$ python3 -m pip install pytest

    ```


    A verbose (with stdout not captured) pytest suite may be run as follows:


    ```

    .../Digraph3$ make verboseTests

    ```


    When the GNU parallel shell tool³ is installed and multiple cores are detected,
    the tests will be executed in multiprocessing mode:


    ```

    .../Digraph3$ make pTests

    ```


    Individual module pytest suites are also provided (see the makefile), like the
    one for the outrankingDigraphs module (see Chap. 2):


    ```

    .../Digraph3$ make outrankingDigraphsTests

    ```


    #### Dependencies


    To be fully functional, the DIGRAPH3 resources mainly need:


    - The graphviz tools (Gansner and North 2000),⁴ and

    - The R statistics resources⁵ to be installed;

    - When exploring digraph isomorphisms, the `nauty` isomorphism testing program
    is required (McKay and Piperno 2013). On Linux you may try: `sudo apt install
    nauty`. For MacOS, corresponding `dmg` installers are available for downloading:

    - Two specific methods of the `OutrankingDigraph` class for clustering performance
    criteria or decision alternatives require furthermore the `calmat` matrix computing
    resource to be installed (see the `calmat` directory in the DIGRAPH3 resources).


    ¹ See the technical description of the DIGRAPH3 programming resources, Bisdorff
    (2021).

    ² https://cython.org.

    ³ https://www.gnu.org/software/parallel.

    ⁴ https://graphviz.org.

    ⁵ https://www.r-project.org.


    ### 1.2 Organisation of the DIGRAPH3 Python Modules


    The main data handling modules of the DIGRAPH3 resources are the following:


    1. `digraphs`: main part of the DIGRAPH3 source code with the root `Digraph` class.

    2. `graphs`: resources for handling undirected graphs with the root `Graph` class
    and a bridge to the `digraphs` module resources.

    3. `perfTabs`: tools for handling multiple-criteria performance tableaux with
    root `PerformanceTableau` class.

    4. `outrankingDigraphs`: root module for handling outranking digraphs with the
    abstract root `OutrankingDigraph` class and the main `Bipolar-OutrankingDigraph`
    class.⁶

    5. `votingProfiles`: classes and methods for handling voting ballots and computing
    election results with main `LinearVotingProfile` class.


    Various random generators are provided by the following modules:


    1. `randomDigraphs`: various random digraph models like random crisp digraphs
    (`RandomDigraph` class) or random bipolar-valued digraphs (`RandomValuationDigraph`
    class).

    2. `randomPerfTabs`: various implemented random performance tableau models, like
    Cost-Benefit tableaux (`RandomCBPerformanceTableau` class) or 3-Objectives tableaux
    (`Random3ObjectivesPerformanceTableau` class).

    3. `randomNumbers`: additional random number generators, not available in the
    standard Python `random.py` library, like a discrete random variable (`DiscreteRandomVariable`
    class) or a Cauchy random variable (`CauchyRandomVariable` class).


    > ⁶ Notice that the outrankingDigraph class defines a hybrid object type, inheriting
    conjointly from the Digraph class and the PerformanceTableau class.


    Following modules provide tools for *sorting*, *ranking*, and *rating* problems:


    1. `sortingDigraphs`: tools for solving sorting problems with the root `SortingDigraph`
    class and the main `QuantilesSortingDigraph` class;

    2. `linearOrders`: tools for solving linearly ranking or ordering problems with
    the root `LinearOrder` class;

    3. `transitiveDigraphs`: additional tools for handing transitive digraphs with
    root `TransitiveDigraph` class.


    Tools for specifically handling Big Data are eventually provided by the following
    modules:


    1. `performanceQuantiles`: incremental representation of large performance tableaux
    via binned cumulated density functions per criteria; Depends on the `randomPerfTabs`
    module.

    2. `sparseOutrankingDigraphs`: sparse implementation design for bipolar-valued
    outranking digraphs of order >500.

    3. *Cythonized* modules: C-compiled and optimised Python modules for handling
    big performance tableaux and bipolar outranking digraphs of order >1000.


    Readers interested in technical implementation details are invited to consult
    the reference manual of the DIGRAPH3 resources, where they will find the documentation
    and complete source code of all DIGRAPH3 modules, classes, and methods (Bisdorff
    2021).


    ### 1.3 Starting a DIGRAPH3 Terminal Session


    After downloading the DIGRAPH3 resources, one may start an interactive Python3
    terminal session in the `Digraph3` directory.


    ```

    $HOME/.../Digraph3$ python3

    Python 3.9.6 (v3.9.6:db3ff76da1, Jun 28 2021, 11:49:53)

    [Clang 6.0 (clang-600.0.57)] on darwin

    Type "help", "copyright", "credits" or "license" for more information.

    >>>

    ```


    For exploring the classes and methods provided by the DIGRAPH3 modules enter the
    Python3 commands following the session prompts marked with `>>>` or `...`; the
    lines without a prompt are output from the Python3 interpreter. Python class names
    and Boolean parameters start by convention with a capital case; names of other
    Python objects, like modules, methods, and variables start with a lower case.
    All Python names and code are shown in a `typewriting` font.


    **Listing 1.1** Generating a digraph instance


    ```

    >>> from randomDigraphs import RandomDigraph

    >>> dg = RandomDigraph(order=5,arcProbability=0.5)

    ```'
  mdcn: '## 第一部分

    DIGRAPH3 Python 资源简介


    第一部分包含三章，用于介绍 DIGRAPH3 这套 Python 编程资源软件集合。第一章专注于 DIGRAPH3 Python 模块的安装以及使用 DIGRAPH3
    资源运行第一个 Python 终端会话。第二章介绍双极值有向图，这是所有可用专用有向图的基础类型。第三章最终介绍了本书的主要形式对象，即双极值优序有向图。


    ## 第一章

    使用 DIGRAPH3 Python 资源


    ### 目录


    - 1.1 安装 DIGRAPH3 资源

    - 1.2 DIGRAPH3 Python 模块的组织结构

    - 1.3 启动 DIGRAPH3 终端会话

    - 1.4 检查有向图对象


    **摘要** 本章致力于与 DIGRAPH3 Python 资源的初次接触。遵循安装说明，我们列出了主要的 Python 模块及其用途，并最终在一个 Python
    终端会话中演示如何生成、保存和检查一个随机的清晰有向图。


    ### 1.1 安装 DIGRAPH3 资源


    使用 DIGRAPH3 Python 模块很简单。¹ 你只需要在你的系统上安装 Python 3 版本的编程语言（在 Linux 和 MacOS 下默认可用）。


    提供了几种下载选项（在 Linux 或 MacOS 下最简单）：要么使用 `git` 客户端从 `github.com` 目录 `clone` 一个工作副本：

    `...$ git clone https://github.com/rbisdorff/Digraph3`

    或者从 `sourceforge.net` 目录：

    `...$ git clone https://git.code.sf.net/p/digraph3/code Digraph3`


    也可以通过浏览器访问，从 `github.com` 链接或 `sourceforge.net` 链接下载最新的发行版 zip 压缩包并解压。


    在 Linux 或 MacOS 上，`...$ cd` 到克隆或解压后的 Digraph3 目录。以下 shell 命令（使用 sudo！）将 DIGRAPH3
    模块安装到系统级的 python 环境中：


    ```

    .../Digraph3$ make install

    ```


    推荐使用 Python-3.8（或更高版本）环境（请参阅 makefile 以将 make install 命令适配到你正在运行的 python 环境）。而以下
    shell 命令则将 DIGRAPH3 模块本地安装到已激活的虚拟 python 用户环境中：


    ```

    .../Digraph3$ make installVenv

    ```


    如果需要用于大数据应用的 C 编译模块，则必须事先在运行的 Python 环境中安装 cython 编译器² 包：


    ```

    ...$ python3 -m pip install cython

    ```


    建议运行测试套件：


    ```

    .../Digraph3$ make tests

    ```


    测试结果存储在 Digraph3/test 目录中。请注意，需要 python3 pytest 包：


    ```

    ...$ python3 -m pip install pytest

    ```


    一个详细（不捕获 stdout）的 pytest 套件可以如下运行：


    ```

    .../Digraph3$ make verboseTests

    ```


    当安装了 GNU parallel shell 工具³ 并且检测到多个核心时，测试将在多处理模式下执行：


    ```

    .../Digraph3$ make pTests

    ```


    也提供了单独的模块 pytest 套件（参见 makefile），例如用于 outrankingDigraphs 模块的套件（见第 2 章）：


    ```

    .../Digraph3$ make outrankingDigraphsTests

    ```


    #### 依赖项


    为了完全正常工作，DIGRAPH3 资源主要需要：


    - 安装 graphviz 工具 (Gansner and North 2000),⁴ 和

    - 安装 R 统计资源⁵；

    - 当探索有向图同构时，需要 `nauty` 同构测试程序 (McKay and Piperno 2013)。在 Linux 上你可以尝试：`sudo apt
    install nauty`。对于 MacOS，可以下载相应的 `dmg` 安装程序：

    - `OutrankingDigraph` 类的两个特定方法用于聚类性能标准或决策方案，此外还需要安装 `calmat` 矩阵计算资源（参见 DIGRAPH3
    资源中的 `calmat` 目录）。


    ¹ 参见 DIGRAPH3 编程资源的技术描述，Bisdorff (2021)。

    ² https://cython.org。

    ³ https://www.gnu.org/software/parallel。

    ⁴ https://graphviz.org。

    ⁵ https://www.r-project.org。


    ### 1.2 DIGRAPH3 Python 模块的组织结构


    DIGRAPH3 资源的主要数据处理模块如下：


    1. `digraphs`：DIGRAPH3 源代码的主要部分，包含根 `Digraph` 类。

    2. `graphs`：用于处理无向图的资源，包含根 `Graph` 类以及与 `digraphs` 模块资源的桥接。

    3. `perfTabs`：用于处理多标准性能表的工具，包含根 `PerformanceTableau` 类。

    4. `outrankingDigraphs`：用于处理优序有向图的根模块，包含抽象根 `OutrankingDigraph` 类和主要的 `Bipolar-OutrankingDigraph`
    类。⁶

    5. `votingProfiles`：用于处理投票选票和计算选举结果的类和方法，主要包含 `LinearVotingProfile` 类。


    以下模块提供了各种随机生成器：


    1. `randomDigraphs`：各种随机有向图模型，如随机清晰有向图（`RandomDigraph` 类）或随机双极值有向图（`RandomValuationDigraph`
    类）。

    2. `randomPerfTabs`：各种已实现的随机性能表模型，如成本-效益表（`RandomCBPerformanceTableau` 类）或 3-目标表（`Random3ObjectivesPerformanceTableau`
    类）。

    3. `randomNumbers`：标准 Python `random.py` 库中不可用的附加随机数生成器，如离散随机变量（`DiscreteRandomVariable`
    类）或柯西随机变量（`CauchyRandomVariable` 类）。


    > ⁶ 请注意，outrankingDigraph 类定义了一个混合对象类型，同时继承自 Digraph 类和 PerformanceTableau 类。


    以下模块为 *排序*、*排名* 和 *评级* 问题提供了工具：


    1. `sortingDigraphs`：用于解决排序问题的工具，包含根 `SortingDigraph` 类和主要的 `QuantilesSortingDigraph`
    类；

    2. `linearOrders`：用于解决线性排名或排序问题的工具，包含根 `LinearOrder` 类；

    3. `transitiveDigraphs`：用于处理传递有向图的附加工具，包含根 `TransitiveDigraph` 类。


    专门用于处理大数据的工具最终由以下模块提供：


    1. `performanceQuantiles`：通过每个标准的分箱累积密度函数来增量表示大型性能表；依赖于 `randomPerfTabs` 模块。

    2. `sparseOutrankingDigraphs`：针对阶数 >500 的双极值优序有向图的稀疏实现设计。

    3. *Cythonized* 模块：用于处理大型性能表和阶数 >1000 的双极优序有向图的 C 编译和优化的 Python 模块。


    对技术实现细节感兴趣的读者，请参阅 DIGRAPH3 资源的参考手册，您将在其中找到所有 DIGRAPH3 模块、类和方法的文档和完整源代码 (Bisdorff
    2021)。


    ### 1.3 启动 DIGRAPH3 终端会话


    下载 DIGRAPH3 资源后，可以在 `Digraph3` 目录中启动一个交互式 Python3 终端会话。


    ```

    $HOME/.../Digraph3$ python3

    Python 3.9.6 (v3.9.6:db3ff76da1, Jun 28 2021, 11:49:53)

    [Clang 6.0 (clang-600.0.57)] on darwin

    Type "help", "copyright", "credits" or "license" for more information.

    >>>

    ```


    要探索 DIGRAPH3 模块提供的类和方法，请在会话提示符 `>>>` 或 `...` 后输入 Python3 命令；没有提示符的行是 Python3 解释器的输出。按照惯例，Python
    类名和布尔参数以大写字母开头；其他 Python 对象的名称，如模块、方法和变量，以小写字母开头。所有 Python 名称和代码均以 `typewriting`
    字体显示。


    **清单 1.1** 生成一个有向图实例


    ```

    >>> from randomDigraphs import RandomDigraph

    >>> dg = RandomDigraph(order=5,arcProbability=0.5)

    ```'
