- md: "## 2.3 Asymmetric and Symmetric Parts\n\nExtracting both the *symmetric* as\
    \ well as the *asymmetric* part of digraph rdg may be done with the help of two\
    \ corresponding classes (see Listing 2.3).\n\nListing 2.3 Computing asymmetric\
    \ and symmetric parts\n\n```\n>>> from digraphs import AsymmetricPartialDigraph,\n\
    ...                     SymmetricPartialDigraph\n>>> asymDg = AsymmetricPartialDigraph(rdg)\n\
    >>> asymDg.exportGraphViz()\n>>> symDg = SymmetricPartialDigraph(rdg)\n>>> symDg.exportGraphViz()\n\
    ```\n\nThe relation constructors of the partial objects asymDg and symDg set to\
    \ the indeterminate characteristic value 0.0 all non-asymmetric, respectively,\
    \ non-symmetric links between nodes (see Fig. 2.2 on the next page).\n\nIn Listing\
    \ 2.4 below is shown, for instance, the source code of the relation constructor\
    \ of the AsymmetricPartialDigraph class:\n\nListing 2.4 Computing the asymmetric\
    \ part of a bipolar-valued relation\n\n```\ndef _constructRelation(self):\n  \
    \  actions = self.actions\n    Min = self.valuationdomain['min']\n    Max = self.valuationdomain['max']\n\
    \    Med = self.valuationdomain['med']\n    relationIn = self.relation\n    relationOut\
    \ = {}\n    for a in actions:\n        relationOut[a] = {}\n        for b in actions:\n\
    \            if a != b:\n                if relationIn[a][b] >= Med and relationIn[b][a]\
    \ <= Med:\n                    relationOut[a][b] = relationIn[a][b]\n        \
    \        elif relationIn[a][b] <= Med and relationIn[b][a] >= Med:\n         \
    \           relationOut[a][b] = relationIn[a][b]\n                else:\n    \
    \                relationOut[a][b] = Med\n            else: # reflexive links\
    \ are ignored\n                relationOut[a][b] = Med\n    return relationOut\n\
    ```\n\nIn Line 17 above all non-asymmetric situations are set to the indeterminate—median—characteristic\
    \ value. Mind by the way that all reflexive relations are similarly set to this\
    \ indeterminate value (see Line 19).\n\n## 2.4 Border and Inner Parts\n\nWe can\
    \ also extract the border—the part of a digraph induced by the union of its initial\
    \ and terminal prekernels (see Chap. 17)—as well as, the inner part—the complement\
    \ of the border—with the help of two corresponding classes: GraphBorder and GraphInner\
    \ (see Listing 2.5).\n\nFigure 2.3 on the following page shows the border and\
    \ inner parts of the linear ordering obtained from the tutorial random valuation\
    \ digraph rdg with the NETFLOWS ranking rule (see Sect. 8.3).\n\nListing 2.5 Border\
    \ and inner part of a linear order\n\n```\n>>> from digraphs import GraphBorder,\
    \ GraphInner\n>>> from linearOrders import NetFlowsOrder\n>>> nf = NetFlowsOrder(rdg)\n\
    >>> nf.netFlowsOrder\n['6', '4', '5', '3', '2', '1', '7']\n>>> bnf = GraphBorder(nf)\n\
    >>> bnf.exportGraphViz(lastChoice=['6'],firstChoice=['7'])\n>>> inf = GraphInner(nf)\n\
    >>> inf.exportGraphViz(lastChoice=['6'],firstChoice=['7'])\n```\n\nThe drawings\
    \ in Fig. 2.3 are oriented with the terminal node 6 (lastChoice parameter) and\
    \ initial node 7 (firstChoice parameter) (see Listing 2.5 on the previous page\
    \ Lines 7 and 9).\n\nThe class constructors of the partial digraphs bnf and inf\
    \ (see Lines 6 and 8) set to the *indeterminate* characteristic value all links\
    \ not in the *border*, respectively, *not* in the *inner* part (see Fig. 2.3).\
    \ Being much *denser* than a linear order, the actual inner part of our tutorial\
    \ random valuation digraph rdg is reduced to a single arc between nodes 3 and\
    \ 4 (see Fig. 2.4 on the facing page right side). Indeed, a complete digraph on\
    \ the limit has no inner part (privacy!) at all, whereas empty and indeterminate\
    \ digraphs admit both, an empty border and an empty inner part.\n\n## 2.5 Fusion\
    \ by Epistemic Disjunction\n\nThe Digraph object rdg can be restored from both\
    \ partial objects asymDg and symDg, or as well from the border bg and the inner\
    \ part ig, with a *bipolar disjunctive fusion operator o-max*, also called *epistemic\
    \ disjunction*, available via the FusionDigraph class.\n\n**Listing 2.6** Epistemic\
    \ fusion of partial digraphs\n\n```\n>>> from digraphs import FusionDigraph\n\
    >>> fusDg = FusionDigraph(asymDg,symDg,operator='o-max')\n>>> # fusDg = FusionDigraph(bg,ig,operator='o-max')\n\
    >>> fusDg.showRelationTable()\n    * ---- Relation Table ----\n    r(xSy) | '1'\
    \   '2'   '3'   '4'   '5'   '6'   '7'\n    -------------------------------------------------\n\
    \    '1'     |  0.00 -0.48  0.70  0.86  0.30  0.38  0.44\n    '2'     | -0.22\
    \  0.00 -0.38  0.50  0.80 -0.54  0.02\n    '3'     | -0.42  0.08  0.00  0.70 -0.56\
    \  0.84 -1.00\n    '4'     |  0.44 -0.40 -0.62  0.00  0.04  0.66  0.76\n    '5'\
    \     |  0.32 -0.48 -0.46  0.64  0.00 -0.22 -0.52\n    '6'     | -0.84  0.00 -0.40\
    \ -0.96 -0.18  0.00 -0.22\n    '7'     |  0.88  0.72  0.82  0.52 -0.84  0.04 \
    \ 0.00\n```\n\nThe epistemic fusion operator o-max (see Listing 2.6 Line 2) is\
    \ defined as follows:\n\n**Definition 2.1 (Disjunctive Epistemic Fusion Operator\
    \ o-max)** Let $r$ and $r'$ characterise two bipolar-valued epistemic situations:\n\
    \n- o-max($r, r'$) = max($r, r'$) when both $r \\geqslant 0.0$ and $r' \\geqslant\
    \ 0.0$, i.e. $r$ and $r'$ are positively valid or indeterminate;\n- o-max($r,\
    \ r'$) = min($r, r'$) when both $r \\leqslant 0.0$ and $r' \\leqslant 0.0$, i.e.\
    \ $r$ and $r'$ are positively invalid or indeterminate;\n- otherwise o-max($r,\
    \ r'$) = 0.0, i.e. indeterminate.\n\nMind that the o-max operator, like a mean\
    \ operator, is *not associative* when more than 2 operands are given. In order\
    \ to make the o-max fusion univocal, the following rule is applied—first, all\
    \ positive and negative terms are separately aggregated—then the o-max fusion\
    \ is applied to both aggregates.\n\n## 2.6 Dual, Converse, and Codual Digraphs\n\
    \nThe *digraphs* module provides class constructors for computing the *dual*<sup>2</sup>\
    \ (negated relation), the *converse* (transposed relation), and the *codual* (transposed\
    \ and negated relation) of the Digraph instance *rdg* (see Listing 2.7 Lines 4,\
    \ 16, 29).\n\nListing 2.7 Computing associated dual, converse and codual digraphs\n\
    \n```\n>>> from digraphs import\n...           DualDigraph, ConverseDigraph, CoDualDigraph\n\
    >>> # dual of rdg\n>>> ddg = DualDigraph(rdg)\n>>> ddg.showRelationTable()\n \
    \   -r(xSy) |  '1'    '2'    '3'    '4'    '5'    '6'    '7'\n    ---------------------------------------------------------\n\
    \     '1'     |  0.00  0.48 -0.70 -0.86 -0.30 -0.38 -0.44\n     '2'     |  0.22\
    \  0.00  0.38 -0.50  0.80  0.54 -0.02\n     '3'     |  0.42  0.08  0.00 -0.70\
    \  0.56 -0.84  1.00\n     '4'     | -0.44  0.40  0.62  0.00 -0.04 -0.66 -0.76\n\
    \     '5'     | -0.32  0.48  0.46 -0.64  0.00  0.22  0.52\n     '6'     |  0.84\
    \  0.00  0.40  0.96  0.18  0.00  0.22\n     '7'     |  0.88 -0.72 -0.82 -0.52\
    \  0.84 -0.04  0.00\n>>> # converse of rdg\n>>> cdg = ConverseDigraph(rdg)\n>>>\
    \ cdg.showRelationTable()\n    * ---- Relation Table -----\n    r(ySx) |  '1'\
    \    '2'    '3'    '4'    '5'    '6'    '7'\n    ---------------------------------------------------------\n\
    \    '1'     |  0.00 -0.22 -0.42  0.44  0.32 -0.84  0.88\n    '2'     | -0.48\
    \  0.00  0.08 -0.40 -0.48  0.00  0.72\n    '3'     |  0.70 -0.38  0.00 -0.62 -0.46\
    \ -0.40  0.82\n    '4'     |  0.86  0.50  0.70  0.00  0.64 -0.96  0.52\n    '5'\
    \     |  0.30  0.80 -0.56  0.04  0.00 -0.18 -0.84\n    '6'     |  0.38 -0.54 \
    \ 0.84  0.66 -0.22  0.00  0.04\n    '7'     |  0.44  0.02 -1.00  0.76 -0.52 -0.22\
    \  0.00\n>>> # codual of rdg\n>>> cddg = CoDualDigraph(rdg)\n>>> cddg.showRelationTable()\n\
    \    * ---- Relation Table -----\n    -r(ySx) |  '1'    '2'    '3'    '4'    '5'\
    \    '6'    '7'\n    ---------------------------------------------------------\n\
    \    '1'     |  0.00  0.22  0.42 -0.44 -0.32  0.84 -0.88\n    '2'     |  0.48\
