- md: '## Chapter 18

    On Confident Outrankings with Uncertain Criteria Significance Weights


    ## Contents


    - 18.1 Modelling Uncertain Criteria Significance Weights

    - 18.2 Bipolar-Valued Likelihood of Outranking Situations

    - 18.3 Confidence Level of Outranking Digraphs


    **Abstract** When modelling preferences following the outranking approach, the
    signs of the majority margins do sharply distribute validation and invalidation
    of pairwise outranking situations. How can we be confident in the resulting outranking
    digraph, when we acknowledge the usual imprecise knowledge of criteria significance
    weights coupled with small majority margins? In this chapter we propose to link
    the qualifying significance majority with a required $\alpha\%$-confidence level.
    We model therefore the significance weights as random variables following more
    or less widespread distributions around an average significance value that corresponds
    to the given deterministic weight. As the bipolar-valued random credibility of
    an outranking statement hence results from the simple sum of positive or negative
    independent random variables, we may apply the Central Limit Theorem (CLT) for
    computing the bipolar likelihood that the expected majority margin will indeed
    be positive and, respectively, negative.


    ## 18.1 Modelling Uncertain Criteria Significance Weights


    Let us consider the significance weights of a family $F$ of $m$ criteria to be
    independent random variables $W_j$, distributing the potential significance weight
    of each criterion $j = 1, ..., m$ around a mean value $E(W_j)$ with variance $V(W_j)$.


    Choosing a specific stochastic model of uncertainty is usually application specific.
    In the limited scope of this chapter, we will illustrate the consequence of this
    design decision on the resulting outranking modelling with four slightly different
    models for taking into account the uncertainty with which we know the numerical
    significance weights: *uniform*, *triangular*, and two models of *Beta* laws,
    one more widespread and, the other, more concentrated.


    ![Fig. 18.1 Four models of uncertain criteria significance weights](img/16b49f4bd7a0e5e8eab9001001a6dc21_274_0.png)


    When considering, for instance, that the potential range of a significance weight
    is distributed between 0 and two times its mean value, we obtain the following
    random variates (Bisdorff 2020):


    - A continuous *uniform* distribution on the range 0 to $2E(W_j)$. Thus, $W_j
    \leadsto U(0, 2E(W_j))$ and $V(W_j) = 1/3(E(W_j))^2$.

    - A symmetric *beta* distribution with, for instance, parameters $\alpha = 2$
    and $\beta = 2$. Thus, $W_j \leadsto Beta(2, 2) \times 2E(W_j)$ and $V(W_j) =
    1/5(E(W_j))^2$.

    - A symmetric *triangular* distribution on the same range with mode $E(W_j)$.
    Thus $W_j \leadsto Tr(0, 2E(W_j), E(W_j))$ with $V(W_j) = 1/6(E(W_j))^2$.

    - A narrower *beta* distribution with, for instance, parameters $\alpha = 4$ and
    $\beta = 4$. Thus $W_j \leadsto Beta(4, 4) \times 2E(W_j)$ and $V(W_j) = 1/9(E(W_j))^2$.


    It is worthwhile noticing in Fig. 18.1 that these four uncertainty models all
    admit the same expected value, $E(W_j)$, however, with a respective variance which
    goes decreasing from 1/3 to 1/9 of the square of $E(W_j)$ (Bisdorff 2014).


    ## 18.2 Bipolar-Valued Likelihood of Outranking Situations


    Let $A = \{x, y, z, ...\}$ be a finite set of $n$ potential decision actions,
    evaluated on $F = \{1, ..., m\}$—a finite and coherent family of $m$ performance
    criteria. On each criterion $j \in F$, the decision actions are evaluated on a
    real performance scale $[0; M_j]$, supporting an upper-closed indifference threshold
    $ind_j$ and a lower-closed preference threshold $pr_j$ such that $0 \leq ind_j
    < pr_j \leq M_j$. The marginal performance of object $x$ on criterion $j$ is denoted
    $x_j$. Each criterion $j$ is thus characterising a marginal double threshold order
    $\succcurlyeq_j$ on $A$:


    $$r(x \succcurlyeq_j y) = \begin{cases} +1 & \text{if } x_j - y_j \succcurlyeq
    -ind_j, \\ -1 & \text{if } x_j - y_j \preccurlyeq -pr_j, \\ 0 & \text{otherwise.}
    \end{cases}$$


    Semantics of the marginal bipolar-valued characteristic function:


    - $+1$ signifies $x$ is at least as well evaluated as $y$ on criterion $j$.

    - $-1$ signifies that $x$ is not at least as well evaluated as $y$ on criterion
    $j$.

    - $0$ signifies that it is unclear whether, on criterion $j$, $x$ is at least
    as well evaluated as $y$ (Fig. 18.2).


    ![Fig. 18.2 Bipolar-valued outranking characteristic function](img/16b49f4bd7a0e5e8eab9001001a6dc21_275_0.png)


    Each criterion $j$ in $F$ contributes the random significance $W_j$ of his ‘at
    least as well evaluated as’ characteristic $r(x \succcurlyeq_j y)$ to the global
    characteristic $\tilde{r}(x \succcurlyeq y)$ in the following way:


    $$\tilde{r}(x \succcurlyeq y) = \sum_{j \in F} W_j \times r(x \succcurlyeq_j y)).
    \quad (18.2)$$


    Thus, $\tilde{r}(x \succcurlyeq y)$ becomes a simple sum of positive or negative
    independent random variables with known means and variances where $\tilde{r}(x
    \succcurlyeq y) > 0$ signifies $x$ is globally at least as well evaluated as $y$,
    $\tilde{r}(x \succcurlyeq y) < 0$ signifies that $x$ is not globally at least
    as well evaluated as $y$, and $\tilde{r}(x \succcurlyeq y) = 0$ signifies that
    it is unclear whether $x$ is globally at least as well evaluated as $y$.


    From the *Central Limit Theorem* (CLT), we know that such a sum of random variables
    leads, with $m$ getting large, to a Gaussian distribution $Y$ with


    $$E(Y) = \sum_{j \in F} \left( E(W_j) \times r(x \succcurlyeq_j y) \right), \text{
    and} \quad (18.3)$$

    $$V(Y) = \sum_{j \in F} \left( V(W_j) \times |r(x \succcurlyeq_j y)| \right).
    \quad (18.4)$$


    And the *likelihood of validation*, respectively, *invalidation*, of an ‘at least
    as well evaluated as’ situation, denoted $lh(x \succcurlyeq y)$, may hence be
    assessed by the probability $P(Y > 0) = 1.0 - P(Y \leqslant 0)$ that $Y$ takes
    a positive value, respectively, $P(Y < 0)$ takes a negative value. In the bipolar-valued
    case here, we can judiciously make usage of the standard Gaussian *error function*,
    i.e. the bipolar $2P(Z) - 1.0$ version of the standard Gaussian $P(Z)$ probability
    distribution function (Press et al. 2007):


    $$lh(x \succcurlyeq y) = -\text{erf}\left(\frac{1}{\sqrt{2}} \frac{-E(Y)}{\sqrt{V(Y)}}\right).
    \quad (18.5)$$


    The range of the bipolar-valued $lh(x \succcurlyeq y)$ hence becomes $[-1.0; +1.0]$,
    and $-lh(x \succcurlyeq y) = lh(x \not\succcurlyeq y)$, i.e. a *negative likelihood*
    represents the likelihood of the correspondent *negated* ‘at least as well evaluated
    as’ situation. A likelihood of $+1.0$ (respectively, $-1.0$) means the corresponding
    preferential situation appears *certainly* validated (respectively, invalidated).


    *Example 18.1* Let $x$ and $y$ be evaluated with respect to 7 equi-significant
    criteria; four criteria positively support that $x$ is *at least as well assessed
    as* $y$ and three criteria support that $x$ is *not at least as well evaluated
    as* $y$. Suppose $E(W_j) = w$ for $j = 1, \ldots, 7$ and $W_j \leadsto Tr(0, 2w,
    w)$ for $j = 1, \ldots, 7$. The expected value of the global ‘at least as well
    evaluated as’ characteristic value becomes $E(\tilde{r}(x \succcurlyeq y)) = 4w
    - 3w = w$ with a variance $V(\tilde{r}(x \succcurlyeq y)) = 7\frac{1}{6}w^2$.


    If $w = 1$, $E(\tilde{r}(x \succcurlyeq y)) = 1$ and $sd(\tilde{r}(x \succcurlyeq
    y)) = 1.08$. By the CLT, the bipolar likelihood of the *at least as well evaluated
    as* situation becomes $lh(x \succcurlyeq y) = 0.66$.


    ![Fig. 18.3 Distribution of 10 000 random outranking characteristic values](img/16b49f4bd7a0e5e8eab9001001a6dc21_277_0.png)


    which corresponds to a global support of (0.66 + 1.0)/2 = 83% of the criteria
    significance weights.


    A Monte Carlo simulation with 10 000 runs empirically confirms the effective convergence
    to a Gaussian (see Fig. 18.3 realised with gretl.¹)


    Indeed, $\bar{r}(x \succcurlyeq y) \rightsquigarrow Y = \mathcal{N}(1.03, 1.089)$,
    with an empirical probability of observing a negative majority margin of about
    17%.


    ## 18.3 Confidence Level of Outranking Digraphs


    **Definition 18.1 (Confident Outranking Situation)** Following the classical outranking
    approach (see (Bisdorff 2013)), we say, from an epistemic perspective, that decision
    action $x$ *outranks* decision action $y$ at *confidence* level $\alpha\%$, when:


    - An expected majority of criteria validates, at confidence level $\alpha\%$ or
    higher, a global ‘at least as well evaluated as’ situation between $x$ and $y$.

    - No considerably less performing is observed on a discordant criterion.


    ¹ The GNU Regression, Econometrics and Time-Series Library, http://gretl.sourceforge.net/.'
  mdcn: '## 第18章

    关于准则重要性权重不确定时的置信优超关系


    ## 目录


    - 18.1 不确定准则重要性权重的建模

    - 18.2 优超情形的双极值似然度

    - 18.3 优超有向图的置信水平


    **摘要** 在遵循优超方法建模偏好时，多数优势的符号会明确区分成对优超情形的有效性与无效性。当我们承认准则重要性权重通常具有不精确性，且多数优势较小时，我们如何能对所得的优超有向图保持信心？在本章中，我们提出将具有资格的重要性多数与所需的
    $\alpha\%$ 置信水平联系起来。因此，我们将重要性权重建模为随机变量，它们围绕一个对应于给定确定性权重的平均重要性值，呈现或多或少广泛分布。由于优超陈述的双极值随机可信度因此源于正或负独立随机变量的简单求和，我们可以应用中心极限定理（CLT）来计算预期多数优势确实为正或为负的双极值似然度。


    ## 18.1 不确定准则重要性权重的建模


    让我们考虑一个包含 $m$ 个准则的族 $F$ 的重要性权重是独立的随机变量 $W_j$，它们将每个准则 $j = 1, ..., m$ 的潜在重要性权重分布在其均值
    $E(W_j)$ 周围，方差为 $V(W_j)$。


    选择特定的不确定性随机模型通常是应用相关的。在本章有限的范围内，我们将通过四个略有不同的模型来说明这一设计决策对最终优超建模的影响，这些模型用于考虑我们对数值重要性权重认知的不确定性：*均匀分布*、*三角分布*和两种*Beta分布*模型，一种分布更广泛，另一种更集中。


    ![图 18.1 四种不确定准则重要性权重模型](img/16b49f4bd7a0e5e8eab9001001a6dc21_274_0.png)


    例如，当考虑一个潜在重要性权重的范围分布在0到其均值的两倍之间时，我们得到以下随机变量（Bisdorff 2020）：


    - 一个在0到 $2E(W_j)$ 范围上的连续*均匀*分布。因此，$W_j \leadsto U(0, 2E(W_j))$ 且 $V(W_j) = 1/3(E(W_j))^2$。

    - 一个对称的*beta*分布，例如参数 $\alpha = 2$ 和 $\beta = 2$。因此，$W_j \leadsto Beta(2, 2) \times
    2E(W_j)$ 且 $V(W_j) = 1/5(E(W_j))^2$。

    - 一个在相同范围上、众数为 $E(W_j)$ 的对称*三角*分布。因此 $W_j \leadsto Tr(0, 2E(W_j), E(W_j))$，方差
    $V(W_j) = 1/6(E(W_j))^2$。

    - 一个更窄的*beta*分布，例如参数 $\alpha = 4$ 和 $\beta = 4$。因此 $W_j \leadsto Beta(4, 4) \times
    2E(W_j)$ 且 $V(W_j) = 1/9(E(W_j))^2$。


    值得注意的是，在图 18.1 中，这四种不确定性模型都具有相同的期望值 $E(W_j)$，然而，其方差分别从 $E(W_j)$ 平方的 1/3 递减到 1/9（Bisdorff
    2014）。


    ## 18.2 优超情形的双极值似然度


    设 $A = \{x, y, z, ...\}$ 是一个包含 $n$ 个潜在决策行动的有限集合，在 $F = \{1, ..., m\}$ 上进行评估——这是一个包含
    $m$ 个性能准则的有限且一致的族。在每个准则 $j \in F$ 上，决策行动在一个实数性能尺度 $[0; M_j]$ 上进行评估，该尺度支持一个上闭的无差异阈值
    $ind_j$ 和一个下闭的偏好阈值 $pr_j$，使得 $0 \leq ind_j < pr_j \leq M_j$。对象 $x$ 在准则 $j$ 上的边际性能记为
    $x_j$。因此，每个准则 $j$ 在 $A$ 上表征了一个边际双阈值序 $\succcurlyeq_j$：


    $$r(x \succcurlyeq_j y) = \begin{cases} +1 & \text{如果 } x_j - y_j \succcurlyeq
    -ind_j, \\ -1 & \text{如果 } x_j - y_j \preccurlyeq -pr_j, \\ 0 & \text{其他情况。} \end{cases}$$


    边际双极值特征函数的语义：


    - $+1$ 表示在准则 $j$ 上，$x$ 的评估结果至少与 $y$ 一样好。

    - $-1$ 表示在准则 $j$ 上，$x$ 的评估结果并非至少与 $y$ 一样好。

    - $0$ 表示在准则 $j$ 上，$x$ 的评估结果是否至少与 $y$ 一样好尚不清楚（图 18.2）。


    ![图 18.2 双极值优超特征函数](img/16b49f4bd7a0e5e8eab9001001a6dc21_275_0.png)


    $F$ 中的每个准则 $j$ 将其“至少与...一样好”特征 $r(x \succcurlyeq_j y)$ 的随机重要性 $W_j$ 以如下方式贡献给全局特征
    $\tilde{r}(x \succcurlyeq y)$：


    $$\tilde{r}(x \succcurlyeq y) = \sum_{j \in F} W_j \times r(x \succcurlyeq_j y)).
    \quad (18.2)$$


    因此，$\tilde{r}(x \succcurlyeq y)$ 变成了具有已知均值和方差的正或负独立随机变量的简单求和，其中 $\tilde{r}(x \succcurlyeq
    y) > 0$ 表示 $x$ 在全局上至少与 $y$ 一样好，$\tilde{r}(x \succcurlyeq y) < 0$ 表示 $x$ 在全局上并非至少与
    $y$ 一样好，而 $\tilde{r}(x \succcurlyeq y) = 0$ 表示 $x$ 在全局上是否至少与 $y$ 一样好尚不清楚。


    根据*中心极限定理*（CLT），我们知道随着 $m$ 变大，这样的随机变量求和会导致一个高斯分布 $Y$，其


    $$E(Y) = \sum_{j \in F} \left( E(W_j) \times r(x \succcurlyeq_j y) \right), \text{
    且} \quad (18.3)$$

    $$V(Y) = \sum_{j \in F} \left( V(W_j) \times |r(x \succcurlyeq_j y)| \right).
    \quad (18.4)$$


    而一个“至少与...一样好”情形的*有效性似然度*，或*无效性似然度*，记为 $lh(x \succcurlyeq y)$，因此可以通过概率 $P(Y >
    0) = 1.0 - P(Y \leqslant 0)$ 来评估 $Y$ 取正值的可能性，或通过 $P(Y < 0)$ 评估其取负值的可能性。在我们这里的双极值情况下，我们可以明智地使用标准高斯*误差函数*，即标准高斯概率分布函数
    $P(Z)$ 的双极值 $2P(Z) - 1.0$ 版本（Press et al. 2007）：


    $$lh(x \succcurlyeq y) = -\text{erf}\left(\frac{1}{\sqrt{2}} \frac{-E(Y)}{\sqrt{V(Y)}}\right).
    \quad (18.5)$$


    因此，双极值 $lh(x \succcurlyeq y)$ 的范围变为 $[-1.0; +1.0]$，并且 $-lh(x \succcurlyeq y) =
    lh(x \not\succcurlyeq y)$，即一个*负似然度*代表了相应*否定*的“至少与...一样好”情形的似然度。似然度为 $+1.0$（或 $-1.0$）意味着相应的偏好情形*肯定*被验证（或被否定）。


    *示例 18.1* 设 $x$ 和 $y$ 根据7个等重要性准则进行评估；四个准则积极支持 $x$ *至少与* $y$ *一样好*，三个准则支持 $x$ *并非至少与*
    $y$ *一样好*。假设对于 $j = 1, \ldots, 7$，$E(W_j) = w$ 且 $W_j \leadsto Tr(0, 2w, w)$。全局“至少与...一样好”特征值的期望变为
    $E(\tilde{r}(x \succcurlyeq y)) = 4w - 3w = w$，方差为 $V(\tilde{r}(x \succcurlyeq
    y)) = 7\frac{1}{6}w^2$。


    如果 $w = 1$，则 $E(\tilde{r}(x \succcurlyeq y)) = 1$ 且 $sd(\tilde{r}(x \succcurlyeq
    y)) = 1.08$。根据CLT，*至少与...一样好*情形的双极值似然度变为 $lh(x \succcurlyeq y) = 0.66$。


    ![图 18.3 10,000个随机优超特征值的分布](img/16b49f4bd7a0e5e8eab9001001a6dc21_277_0.png)


    这对应于准则重要性权重的全局支持度为 (0.66 + 1.0)/2 = 83%。


    一个包含10,000次运行的蒙特卡洛模拟从经验上证实了向高斯分布的有效收敛（见图 18.3，由gretl实现。¹）


    实际上，$\bar{r}(x \succcurlyeq y) \rightsquigarrow Y = \mathcal{N}(1.03, 1.089)$，观察到负多数优势的经验概率约为17%。


    ## 18.3 优超有向图的置信水平


    **定义 18.1（置信优超情形）** 遵循经典的优超方法（参见 (Bisdorff 2013)），我们从认知视角说，当满足以下条件时，决策行动 $x$ 在
    $\alpha\%$ *置信*水平上*优超*决策行动 $y$：


    - 一个预期的多数准则在 $\alpha\%$ 或更高的置信水平上，验证了 $x$ 和 $y$ 之间全局的“至少与...一样好”情形。

    - 在一个不一致准则上未观察到显著较差的性能。


    ¹ GNU 回归、计量经济学和时间序列库，http://gretl.sourceforge.net/.'
