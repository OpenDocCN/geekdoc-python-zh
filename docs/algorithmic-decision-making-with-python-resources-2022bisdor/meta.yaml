    # 21.5 Grids and the ISING Model


    Special classes of graphs, like the GridGraph class, provide $n \times m$ rectangular
    or triangular grids. With a Gibbs sampler$^2$, the IsingModel class can simulate
    in Fig. 21.4 on the following page an ISING model on, for instance, a $15 \times
    15$ grid (Ising 1925).


    Listing 21.11 Simulating an Ising model on a $15 \times 15$ rectangular grid


    ```

    1 >>> from graphs import GridGraph, IsingModel

    2 >>> g = GridGraph(n=15,m=15)

    3 >>> g.showShort()

    4 *---- show short ----------------*

    5 Grid graph    : grid-6-6

    6 n             : 6

    7 m             : 6

    8 order         : 36

    9 >>> im = IsingModel(g,beta=0.3,nSim=100000)

    10 Running a Gibbs Sampler for 100000 step !

    11 >>> im.exportGraphViz(colors=[''lightblue'',''lightcoral''])

    12 *---- exporting a dot file for GraphViz tools ----------*

    13 Exporting to grid-15-15-ising.dot

    14 fdp -Tpng grid-15-15-ising.dot -o grid-15-15-ising.png

    ```


