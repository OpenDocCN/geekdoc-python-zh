    In the generated random digraphs d1 and d2, 9 pairs, like (a1,a2) or (a3,a2),
    for instance, appear equivalently oriented (see Lines 7 and 18 or Lines 9 and
    20). The EquivalenceDigraph class computes this bipolar-valued relational equivalence
    between digraphs d1 and d2 (see Listing 16.5).


    # Listing 16.5 Bipolar-valued equivalence digraph


    ```

    1 >>> from digraphs import EquivalenceDigraph

    2 >>> eqd = EquivalenceDigraph(d1,d2)

    3 >>> eqd.showRelationTable(ReflexiveTerms=False)

    4 * ---- Relation Table -----

    5 r(<=>) | ''a1'' ''a2'' ''a3'' ''a4'' ''a5''

    6 ------|----------------------------------------

    7 ''a1'' | - 0.66 -0.44 -0.80 0.08

    8 ''a2'' | 0.36 - -0.70 0.26 -0.22

    9 ''a3'' | -0.14 0.20 - -0.46 -0.04

    10 ''a4'' | 0.48 -0.48 0.24 - 0.60

    11 ''a5'' | -0.02 0.10 0.00 0.84 -

    12 Valuation domain: [-1.00;1.00]

    ```


    In our bipolar-valued epistemic logic, logical disjunctions and conjunctions are
    implemented as max and, respectively, min operations. Notice also that the logical
    equivalence (d1 ⇔ d2) corresponds to a double implication (d1 ⇒ d2) ∧ (d2 ⇒ d1)
    and that the implication (d1 ⇒ d2) is logically equivalent to the disjunction
    (¬d1 ∨ d2).


    When r(x d1 y) and r(x d2 y) denote the bipolar-valued characteristic values of
    relation d1 and, respectively, d2, we may hence compute as follows a majority
    margin M(d1 ⇔ d2) between equivalently and not equivalently oriented irreflexive
    pairs (x, y):


    M(d1 ⇔ d2) =

    ∑_{(x≠y)} [min(max(−r(x d1 y), r(x d2 y)), max(−r(x d2 y), r(x d1 y)))].

    (16.2)


    M(d1 ⇔ d2) is thus given by the sum of the non-reflexive terms of the relation
    table of eqd, the relational equivalence digraph computed above (see Listing 16.5).
    In the crisp case, M(d1 ⇔ d2) is normalised with the maximum number of possible
    irreflexive pairs, namely n(n − 1). In the extended r-valued case, the maximal
    possible equivalence majority margin M corresponds to the sum D of the'
  - '[PAGE 240]


    conjoint determinations of $(x \d1 y)$ and $(x \d2 y)$ (see Bisdorff 2012):


    $$D = \sum_{x \neq y} \min \left[ abs(r(x \d1 y)), abs(r(x \d2 y)) \right], \quad
    (16.3)$$


    and we obtain hence in the general $r$-valued case:


    $$\tau(\d1, \d2) = \frac{M(\d1 \Leftrightarrow \d2)}{D} . \quad (16.4)$$


    $\tau(\d1, \d2)$ corresponds so to the classical ordinal correlation index, yet
    restricted to the conjointly determined parts of the given digraphs $\d1$ and
    $\d2$. In the limit case of two crisp linear orders, $D$ equals $n(n-1)$, i.e.
    the number of irreflexive pairs, and we recover KENDALL''s original *tau* index
    definition.


    It is worthwhile noticing that the ordinal correlation index $\tau(\d1, \d2)$
    one obtains above corresponds in fact to the ratio of:


    +   - $r(\d1 \Leftrightarrow \d2) = \frac{M(\d1 \Leftrightarrow \d2)}{n(n-1)}$:
    the normalised majority margin of the pairwise *relational* equivalence statements,
    also called *valued ordinal correlation*.

    - $d = \frac{D}{n(n-1)}$: the normalised epistemic determination of the corresponding
    pairwise relational equivalence statements, in fact the *determinateness* of the
    relational equivalence digraph.


    The epistemic determination effect is thus successfully *out-factored* from the
    ordinal correlation effect. With completely determined relations, $\tau(\d1, \d2)
    = r(\d1 \Leftrightarrow \d2)$. The ordinal correlation with a completely indeterminate
    digraph, i.e. when $D = 0$, is set by convention to the indeterminate correlation
    value 0.0. With uniformly chosen random $r$-valued digraphs, the expected $\tau$
    index is 0.0, denoting in fact an indeterminate relational equivalence. The corresponding
    expected normalised determination $d$ is about 0.333 (see Bisdorff (2012)).


    We verify Eq. 16.4 below with the help of the equivalence digraph eqd computed
    in Listing 16.5 on the previous page.


    **Listing 16.6** Computing the ordinal correlation index from the equivalence
    digraph


    ```

    1 >>> # eqd = EquivalenceDigraph(d1,d2)

    2 >>> M = Decimal(''0''); D = Decimal(''0'')

    3 >>> n2 = eqd.order*(eqd.order - 1)

    4 >>> for x in eqd.actions:

    5 ...     for y in eqd.actions:

    6 ...         M += eqd.relation[x][y]

    7 ...         D += abs(eqd.relation[x][y])

    8 >>> print(''r(rd1<=>rd2) = %+.3f, d = %.3f, tau = %+.3f'' %\n9         (M/n2,D/n2,M/D))

    10 r(rd1<=>rd2) = +0.026, d = 0.356, tau = +0.073

    ```'
