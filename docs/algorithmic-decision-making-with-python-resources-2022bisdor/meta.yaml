    \ Bisdorff, 2019\n\n```\n1 >>> g.exportPermutationGraphViz('matchingDiagram',\n\
    2 ...                     WithEdgeColoring=True)\n3 *---- exporting a dot file\
    \ for GraphViz tools ----*\n4   Exporting to matchingDiagram.dot\n5   neato -n\
    \ -Tpng matchingDiagram.dot -o matchingDiagram.png\n```\n\n如前所述，置换图及其对偶图是*可传递定向的*。`transitiveOrientation()`\
    \ 方法从给定的置换图构造一个有向图，其中置换图的每条边都被转换为一条弧，其方向按相邻顶点键的字母递增顺序排列（参见 Golumbic 2004）。这种置换图边的定向总是传递的，并提供了顶点的*传递排序*，如下一页图\
    \ 23.7 所示。\n\n```\n1 >>> dg = g.transitiveOrientation()\n2 >>> dg\n3   *-------\
