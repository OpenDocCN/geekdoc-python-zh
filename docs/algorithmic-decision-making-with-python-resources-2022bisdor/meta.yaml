    ## Chapter 20

    Tempering Plurality Tyranny Effects

    in Social Choice


    ![](img/16b49f4bd7a0e5e8eab9001001a6dc21_300_0.png)


    > The choice of a voting procedure shapes the democracy in which we live

    — Baujard, Gavrel, Igersheim, Laslier, and Lebon (2013)


    ## Contents


    - 20.1 Two-Stage Elections with Multipartisan Primary Selection … 279

    - 20.2 Bipolar Approval–Disapproval Voting Systems … 287

    - 20.3 Pairwise Comparison of Approval–Disapproval Votes … 290

    - 20.4 Three-Valued Evaluative Voting Systems … 293

    - 20.5 Favouring Multipartisan Candidates … 296


    **Abstract** In a *social choice* context, where decision objectives would match
    different political parties, Pareto efficient choice recommendations represent
    in fact *multipartisan* social choices that may judiciously deliver the primary
    selection in a two-stage election system. Our bipolar-valued outranking model
    is based on approvals–disapprovals of ‘*at least as well evaluated as*’ statements.
    A similar approach is put into practice with approval–disapproval voting systems.
    When converting such approval–disapproval voting ballots into corresponding performance
    records, we obtain a (−1, 0, 1)-valued evaluative voting system. We eventually
    show that in such an approval–disapproval voting system, the winner tends to be
    among the more or less multipartisan candidates.


    ### 20.1 Two-Stage Elections with Multipartisan Primary Selection


    From the seminal work by *Bernard Roy*, tempering plurality tyranny effects is
    achieved in the outranking approach by taking into account considerable negative
    performance differences that render doubtful otherwise positive ‘*at least as
    well evaluated as*’ situations (Benayoun et al. 1966). In the social choice context
    of general elections, such a polarisation is not feasible as the genuine uninominal
    voting ballots do not contain rich enough preferential information. Yet, when
    matching decision objectives with political parties, the Pareto efficient outranking
    situations seen in Sect. 19.6 correspond to multipartisan ''at least as well approved
    as'' situations when pairwise comparing the eligible candidates. A best choice
    recommendation based on the corresponding multipartisan strict ''better approved
    as'' situations may, the case given, deliver a convincing primary selection in
    a two-stage election.


    To compute multipartisan social choices, we need to, first, convert a given linear
    voting profile with pre-election polls into a corresponding performance tableau.
    We shall illustrate this point with a voting profile we discussed already in Chap.
    7.


    **Listing 20.1** Example of a 3 parties voting profile


    ```

    1 >>> from votingProfiles import RandomLinearVotingProfile

    2 >>> lvp = RandomLinearVotingProfile(numberOfCandidates=15,

