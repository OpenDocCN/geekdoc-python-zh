    ```\n\n在此示例中（参见上文第 21 行及后续行），我们得到 460 名政党1支持者（46%），436 名政党2支持者（43.6%），以及 104 名其他选民（10.4%）。政党1支持者最喜欢的候选人（支持率超过\
    \ 10%）似乎是 c06（19.91%）、c07（14.27%）和 c03（10.02%）。而对于政党2支持者，最喜欢的候选人似乎是 c11（22.94%），其次是\
    \ c08（15.65%）、c04（15.07%）和 c06（13.4%）。作为政党1支持者的*第一*选择和政党2支持者的*第四*选择，候选人 c06 是赢得这场选举游戏的自然人选（参见清单\
    \ 7.11）。\n\n## 清单 7.11 单名制和 BORDA 选举获胜者\n\n```\n1 >>> lvp.computeSimpleMajorityWinner()\n\
    2 ['c06']\n3 >>> lvp.computeInstantRunoffWinner()\n4 ['c06']\n5 >>> lvp.computeBordaWinners()\n\
    6 ['c06']\n```\n\n候选人 c06 也是孔多塞获胜者吗？为了验证，我们首先借助 MajorityMarginsDigraph 类创建相应的*多数优势*有向图\
    \ *mmdg*。创建的有向图实例包含 15 个*行动*——即候选人——和 104 条*有向弧*——即*正*多数优势——（参见清单 7.12 第 7-8 行）。\n\
    \n## 清单 7.12 从线性投票概况构建的多数优势有向图\n\n```\n1 >>> from votingProfiles import MajorityMarginsDigraph\n\
    2 >>> mmdg = MajorityMarginsDigraph(lvp)\n3 >>> mmdg\n4 *------- Digraph instance\
    \ description ------*\n5  Instance class      : MajorityMarginsDigraph\n6  Instance\
    \ name       : rel_randLinearProfile\n7  Digraph Order       : 15\n8  Digraph\
    \ Size        : 104\n9  Valuation domain    : [-1000.00;1000.00]\n10  Determinateness\
    \ (%) : 67.08\n11  Attributes          : ['name', 'actions', 'voters',\n12   \
    \                      'ballot', 'valuationdomain',\n13                      \
    \   'relation', 'order',\n13                         'gamma', 'notGamma']\n```\n\
    \nshowHTMLRelationTable() 方法通过在浏览器视图中显示 *mmdg* 关系表的 HTML 格式版本，来可视化成对多数优势的结果。\n\
    \n```\n1 >>> mmdg.showHTMLRelationTable(\n2 ...         tableTitle='Pairwise majority\
    \ margins',\n3 ...         relationName='M(x,y)')\n```\n\n下一页图 7.4 中一个完整的浅绿色*行*揭示了一个孔多塞获胜者，而一个完整的浅绿色*列*则揭示了一个孔多塞失败者。我们再次确认候选人\
    \ c06 是孔多塞获胜者，⁴ 而明显的孔多塞失败者是候选人 c02，该候选人在两个政党中的支持率都是最低的（参见第 92 页清单 7.10 第 43 行）。\n\
    \n使用相同的双极第一排名和最后排名选择程序，我们可以通过在剩余候选人中迭代这些第一和最后的选择来弱排名候选人（可能存在平局）（Bisdorff 1999）。\n\
    \n在展示按选择排名的结果之前，我们必须首先计算迭代的双极选择程序（参见清单 7.13）。\n\n## 清单 7.13 通过迭代选择剩余的第一和最后候选人进行排名\n\
    \n```\n1 >>> cdg.showRankingByChoosing()\nRanking by Choosing and Rejecting\n\
    \  1st best ranked ['c06']\n    2nd best ranked ['c11']\n      3rd best ranked\
    \ ['c07','c08']\n        4th best ranked ['c03']\n          5th best ranked ['c01']\n\
    \            6th best ranked ['c13']\n              7th first ranked ['c04']\n\
    \             7th last ranked ['c12']\n           6th last ranked ['c14']\n  \
    \       5th last ranked ['c15']\n       4th last ranked ['c09']\n     3rd last\
    \ ranked ['c10']\n   2nd last ranked ['c05']\n 1st last ranked ['c02']\n```\n\n\
    > ⁴ 孔多塞获胜者的概念——绝对多数获胜者的推广——由孔多塞在 1784 年提出，是初始有向图核的一个早期历史示例（参见第 17 章）。\n\n第一次选择涉及\
    \ c06（第一）和 c02（最后），接着是 c11（第一）对阵 c05（最后），依此类推，直到在第 7 次迭代步骤中剩下最后一对候选人，即 [c04, c12]（参见第\
    \ 9-10 行）。\n\n另外请注意第 3 次迭代步骤中的第 3 名最佳候选人（参见第 5 行），即 (c07, c08) 这一对。这两位候选人确实共同代表了*第\
    \ 3 名最佳*选择。因此我们得到了一个*弱排名*，即一个带有平局的排名。\n\n让我们提一下，我们之前在使用 Comments=True 参数设置时使用的*即时淘汰*程序，将提供一个或多或少相似的*通过拒绝进行的逆线性排序*结果，即\
    \ [c02, c10, c14, c05, c09, c13, c12, c15, c04, c01, c08, c03, c07, c11, c06]，从*最后*到*第一*选择排序。\n\
    \n关于这两个*按选择排名*或*通过拒绝排序*结果值得注意的是，这里借助两个离散随机变量⁵ 模拟的随机投票行为，其定义分别来自两个随机政党民意调查，产生的排名或多或少与模拟的民意调查平衡一致：政党1支持者：460；政党2支持者：436（参见第\
    \ 92 页清单 7.10 第 29-43 行第三列）。尽管每位选民的投票行为是随机的，但给定的民意调查显然对最终的选举结果产生了*非常强烈的影响*。为了避免任何对选举结果的操纵，因此在一些国家，公共媒体在普选前的最后几周不允许发布民意调查。\n\
    \n请注意，我们这里在多数优势有向图上使用的特定*按选择排名*程序，通过在每一步提取*初始*和*终端*预核来操作选择程序，即困难的操作问题（参见第 17 章和\
    \ Bisdorff 1999）；这种技术通常无法处理超过 30 名候选人的投票概况。\n\n下一章第 8 章关于多不可比标准排名方法，将介绍当有更多潜在候选人或决策替代方案时，从成对多数优势进行排名的更多方法和工具。\n\
