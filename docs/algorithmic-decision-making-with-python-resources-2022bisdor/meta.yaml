  md: '# 3.4 Recoding the Characteristic Valuation Domain


    All outranking digraphs, being of root `Digraph` type, inherit the methods available
    under this latter class. The characteristic valuation domain of a digraph can,
    for instance, be recoded with the `recodeValuation()` method to the *integer*
    range $[-7, +7]$, i.e. plus or minus the total significance weights of the family
    of criteria considered in this example instance `odg`.


    **Listing 3.8** Recoding the digraph valuation


    ```

    1 >>> odg.recodeValuation(-7,+7)

    2 >>> odg.valuationdomain[''hasIntegerValuation''] = True

    3 >>> Digraph.showRelationTable (odg,ReflexiveTerms=False)

    4   * ---- Relation Table -----

    5   r(x,y) |  ''a1''  ''a2''  ''a3''  ''a4''  ''a5''  ''a6''  ''a7''

    6   --------|------------------------------------------

    7   ''a1''    |    -   +5   +2   +2   +2   +2    0

    8   ''a2''    |   -5    -   -1   -1   +1   +2   -4

    9   ''a3''    |   -1   +2    -   -1   -1    0   -1

    10  ''a4''    |    0   +1   +4    -   +2   +4   -3

    11  ''a5''    |   -1    0   +1    0    -   +2   -1

    12  ''a6''    |   -1    0   +1   -1   +1    -    0

    13  ''a7''    |    0   +5   +4   +3   +2    0    -

    14  Valuation domain:  [-7;+7]

    ```


    Notice in Listing 3.8 that the self comparison characteristics $r(x \succcurlyeq
    x)$ may be ignored by setting the `ReflexiveTerms` parameter to `False`. Mind
    that the trivial reflexive terms of outranking relations are ignored in some of
    the DIGRAPH3 methods.


    # 3.5 The Strict Outranking Digraph


    From theory, we know that a bipolar-valued outranking digraph is *weakly complete*,
    i.e. if $r(x \succcurlyeq y) < 0.0$, then $r(y \succcurlyeq x) \geqslant 0.0$.
    From this property follows that a bipolar-valued outranking digraph verifies the
    *coduality principle*: the *dual*<sup>1</sup> (negation) of the *converse* (transposition)
    of the outranking relation $(x \succcurlyeq y)$ corresponds to its asymmetric
    *strict outranking* part $(x \succ y)$ (Bisdorff 2013, 2020).

    Visualising the *codual* (*strict*) outranking digraph may be done with a graphviz
    drawing (Fig. 3.1).<sup>2</sup>


    > <sup>1</sup> Not to be confused with the dual graph of a plane graph $g$ that
    has a vertex for each face of $g$. Here we mean the *less than* (*strict converse*)
    relation corresponding to a *greater or equal* relation, or the *less than or
    equal to* relation corresponding to a (*strict*) *better than* relation.

    <sup>2</sup> The `exportGraphViz()` method is depending on drawing tools from
    the graphviz software (https://graphviz.org/). On Linux Ubuntu or Debian, you
    may try `sudo apt-get install graphviz` to install them. There are ready dmg installers
    for Mac OSX.'
