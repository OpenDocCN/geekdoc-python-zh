    **摘要** 2004 年，德国杂志《明镜周刊》在麦肯锡公司和 AOL 的帮助下，进行了一项广泛的在线调查，评估德国大学生的显性质量。《明镜周刊》最终公布的结果涉及近
    50,000 名学生，他们就读于十五个热门学术科目之一，如*德语研究*、*生命科学*、*心理学*、*法学*或*计算机科学*。基于这些已公布的数据，我们在本章中介绍并讨论如何借助我们的
    DIGRAPH3 软件资源，对新的性能记录的显性全局*入学质量*进行*评级*。


    ## 14.1 评级问题


    在 2004 年的《明镜周刊》调查中，超过 80,000 名学生通过参与调查，被询问了他们的“高中毕业考试”和大学考试成绩、学习时间和年龄、资助、奖项和出版物、IT
    技能、语言能力、实践经验、国外流动性和公民参与情况。每位学生通过特定的数据加权方式获得一个质量分数，该加权方式取决于学生主要学习的科目。仅公布那些至少有 18
    名学生正确填写了问卷的科目-大学组合，留下了 41 所德国大学，在这些大学中，对于十五个科目中的至少八个，可以确定平均入学质量分数（DER SPIEGEL
    2004; Friedmann et al. 2004）。'
