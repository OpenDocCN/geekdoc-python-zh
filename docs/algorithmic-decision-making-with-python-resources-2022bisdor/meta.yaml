  md: '# 22.4 Maximum Determined Spanning Forests


    In case of valued graphs—supporting weighted edges—we may finally construct a
    *most determined* spanning tree (or forest if not connected) using KRUSKAL’s greedy
    minimum spanning tree algorithm on the dual valuation of the graph (Kruskal 1956).¹


    In Listing 22.8, we generate, for instance, a randomly valued graph with five
    vertices and seven edges bipolar-valued in [-1.0; 1.0].


    Listing 22.8 Generating randomly bipolar-valued graphs


    ```

    1 >>> from graphs import RandomValuationGraph

    2 >>> g = RandomValuationGraph(order=5,seed=2)

    3 >>> g

    4   *------- Graph instance description ------*

    5   Instance class    : RandomValuationGraph

    6   Instance name     : randomGraph

    7   Graph Order       : 5

    8   Graph Size        : 7

    9   Valuation domain  : [-1.00; 1.00]

    10  Attributes        : [''name'', ''order'',

    11                      ''vertices'', ''valuationDomain'',

    12                      ''edges'', ''size'', ''gamma'']

    ```


    To inspect the edges’ actual weights, we transform in Listing 22.9 the random
