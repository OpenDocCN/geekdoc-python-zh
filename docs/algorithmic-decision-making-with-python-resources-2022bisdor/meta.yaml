    The purpose of this book is to present in a single monograph the methodological
    and scientific contributions the author made over the past two decades to the
    multiple-criteria decision aiding field and that are either left unpublished or
    solely published in very specialised media difficult to access.


    This monograph should provide the reader with a self-contained series of tutorials
    which explain how to solve multiple-criteria selection, as well as ranking or
    rating decision problems. If successful in this aim, the curious reader will effectively
    install the DIGRAPH3 programming resources on their laptop and try out and redo
    for themselves the proposed computations.


    The material in this book is valuable for master''s students and doctoral candidates
    in computer science, mathematics, engineering sciences or computational management
    sciences taking a course on algorithmic decision theory, multiple-criteria decision
    aiding or decision analysis. Some experience in computer programming, in particular
    with Python, will assist the reader, but it is not a prerequisite. The many coding
    examples shown throughout the text are purposely kept elementary from a programming
    point of view.


    Chapters presenting algorithms for ranking multiple-criteria performance records
    from best to worst—especially when facing big performance tableaux—will be of
    computational interest for designers of web recommender systems.


    Similarly, the relative and absolute quantiles-rating algorithms, discussed and
    illustrated in several chapters, will be of practical interest for public or private
    performance auditors.


    Finally, the monograph does not provide any mathematical developments or proofs.
    Those readers interested in the mathematical background of our decision algorithms
    are invited to consult the references provided at chapter level. Full texts of
    most of these references may be downloaded from the open access https://orbilu.uni.lu/
    repository of the University of Luxembourg.


    # Acknowledgements


    This monograph contains many ideas, methods and tools that are not the author''s
    alone. They have been shared with and enhanced by friends, colleagues and many
    students. To name the most relevant: *Pascal Bouvry, Denis Bouyssou, Luis C Dias,
    Claude Lamboray, Patrick Meyer, Vincent Mousseau, Alex Olteanu, Marc Pirlot, the
    late Bernard Roy, Ulrich Sorger, Alexis Tsoukiàs, Thomas Veneziano* and, especially,
    the late *Marc Roubens*.'
