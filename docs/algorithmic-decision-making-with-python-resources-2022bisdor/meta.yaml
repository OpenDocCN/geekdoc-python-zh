    \ 对象实例描述 -------*\n实例类        : BipolarOutrankingDigraph\n实例名称      : converse-dual-rel_officeChoice\n\
    行动数        : 7\n标准数        : 7\n规模          : 10\n确定性 (%)    : 72.38\n赋值域    \
    \    : [-1.00;1.00]\n```\n\n## 4.4 设计最佳选择推荐系统\n\n解决最佳选择问题传统上在于找到唯一的最佳决策备选方案。我们在此采用现代推荐系统的方法，该方法显示一个非空的决策备选方案子集，该子集在构造上包含潜在的最佳备选方案。\n\
    \n计算此类最佳选择推荐（BCR）的五个实用原则如下：\n\n- P1：基于充分理由的排除；每个被排除的备选方案必须被 BCR 中至少一个备选方案严格优超。\n\
    - P2：最小规模；BCR 的基数必须尽可能有限。\n- P3：高效且信息丰富；BCR 不得包含一个自包含的子推荐。\n- P4：有效更优；BCR 不得模棱两可，即它不能同时是首选推荐和末选推荐。\n\
    - P5：最大程度确定；在所有潜在的最佳选择推荐中，BCR 是在双极值优超关系的认识特征意义上最确定的一个。\n\n设 X 为潜在决策备选方案的集合。设 Y\
    \ 为 X 的一个非空子集，在严格优超有向图 G(X, r(≻)) 中称为一个选择。我们现在可以用以下术语来限定一个 BCR Y：\n\n- Y 被称为严格优超（respectively,\
    \ 被优超）的，当对于所有未被选中的备选方案 x，存在一个被保留的备选方案 y ∈ X，使得 r(y ≻ x) > 0.0（respectively, r(y\
    \ ≻ x) > 0.0）。这样的选择验证原则 P1。\n- $Y$ 被称为*弱独立*的，当对于 $Y$ 中所有 $x \\neq y$，我们观察到 $r(x\
    \ \\not\\succ y) \\leq 0.0$。这样的选择验证原则 P3（*内部稳定性*）。\n- $Y$ 同时是一个严格*优超*（respectively,\
    \ *被优超*）**和***弱独立*的选择。这样的选择被称为*初始*（respectively, *终端*）*预核*。$^5$ 初始预核现在验证原则 P1、P2、P3\
    \ 和 P4。\n- 为了最终验证原则 P5，我们在所有潜在的初始预核中推荐一个*最确定*的，即一个由最高标准重要性支持的严格*优超*和*弱独立*的选择。并且在这个最确定的初始预核中，我们最终保留那些以最高标准重要性被包含的备选方案。$^6$\n\
    \n请注意，给定的严格优超有向图可能并不总是存在预核。当有向图包含奇数长度的无弦回路时，就会出现这种情况（参见第 17 章）。幸运的是，我们这里的严格优超有向图\
    \ `bodcd` 没有显示任何无弦优超回路；我们可以通过 `computeChordlessCircuits()` 方法后跟 `showChordlessCircuits()`\
    \ 方法来检查这一事实。$^7$\n\n```\n>>> bodcd.computeChordlessCircuits()\n[]\n>>> bodcd.showChordlessCircuits()\n\
    此有向图中未观察到回路。\n```\n\n当观察到无弦奇数优超回路时，我们需要在枚举预核之前，使用 `BrokenCocsDigraph` 类在其最薄弱的环节将其打破（Bisdorff\
    \ 2021）。\n\n我们现在准备好构建最佳选择推荐了。\n\n## 4.5 计算 RUBIS 最佳选择推荐\n\n`showBestChoiceRecommendation()`\
    \ 方法直接从优超有向图 `bod` 计算 RUBIS 最佳选择推荐。默认情况下，此方法在*余对偶*（严格）优超有向图上操作，其中无弦奇数回路已被打破（参见清单\
    \ 4.4 第 2 行中的 `CoDual` 和 `BrokenCocs` 参数）：\n\n**清单 4.4** 计算最佳选择推荐\n\n```\n>>>\
    \ bod.showBestChoiceRecommendation(\n...                 CoDual=True, BrokenCocs=True\
    \ # 默认设置\n```\n\n$^5$ 参见第 17 章关于计算有向图中核的内容。\n$^6$ 参见第 17.6 节。\n$^7$ `computeChordlessCircuits()`\
    \ 和 `showChordlessCircuits()` 方法是分开的，因为有多种方法可用于枚举有向图中的无弦回路（Bisdorff 2010）。"
