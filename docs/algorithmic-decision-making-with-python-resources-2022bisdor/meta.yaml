    \ | -0.10 | - | 1.00 | -0.42 |\n| F | 0.00 | -1.00 | -1.00 | -1.00 | -1.00 | -\
    \ | -1.00 |\n| G | 0.00 | 0.92 | -0.10 | 1.00 | 0.54 | 1.00 | - |\n\n赋值域：[-1.00;\
    \ +1.00]\n\n- 否则，备选方案 $x$ 和 $y$ 之间的优超情况被视为*不确定*。\n\n每个成对优超情况的可信度，记为 $r(x \\succcurlyeq\
