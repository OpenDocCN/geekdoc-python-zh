    In a complete digraph, each single node is indeed both an initial and a terminal
    prekernel candidate and there is no definite begin or end of the digraph to be
    detected. Laterality is here entirely relative to a specific singleton chosen
    as reference point of view.


    The same absence of laterality is apparent (see Listing 17.4) in two other universal
    digraph models, the *empty* and the *indeterminate* digraph.


    # Listing 17.4 The prekernels of the empty or indeterminate digraph


    ```

