    ## 10.3 Rating-by-Ranking New Performances with Quantile Norms\n\nFor *rating*\
    \ a newly given set of decision alternatives with the help of empirical performance\
    \ quantiles estimated from historical data, the `sortingDigraphs` module provides\
    \ the `LearnedQuantilesRatingDigraph` class, a specialisation of the `QuantilesSortingDigraph`\
    \ class (see Chap. 9). The absolute rating result is computed by *ranking* the\
    \ new performance records together with the learned historical quantile limits.\n\
    \nThe class constructor requires a valid `PerformanceQuantiles` instance and,\
    \ by default, uses the `COPELAND` or the `NETFLOWS` ranking rule, whichever fits\
    \ best in an ordinal correlation sense with the underlying outranking digraph.\n\
    \nIt is important to notice that the `LearnedQuantilesRatingDigraph` class, contrary\
    \ to the generic `OutrankingDigraph` class, does not inherit from the generic\
    \ `PerformanceTableau` class, but instead from the `PerformanceQuantiles` class\
    \ (Bisdorff 2021).\n\nThe `actions` attribute in such a `LearnedQuantilesRatingDigraph`\
    \ class instance contains not only the newly given decision alternatives, but\
    \ also the historical quantile limits (attribute `profiles`) obtained from a given\
    \ `PerformanceQuantiles` class instance, i.e. estimated quantile bins' performance\
