    **Abstract** In this chapter, we introduce the main formal object of this book,
    namely the bipolar-valued outranking digraph. With a randomly generated multiple-criteria
    performance tableau, we construct the corresponding bipolar-valued outranking
    relation from pairwise comparisons. The resulting bipolar-valued outranking characteristics
    may be recoded. Finally, the codual outranking digraph gives us the associated
