    \ alternative y when x is positively outranked by y on one or more decision objectives\
    \ without x positively outranking y on any decision objective.\n\nLet us reconsider,\
    \ for instance, the performance tableau pt with three decision objectives already\
    \ seen in Listing 19.1 on page 261:\n\n```\n>>> pt.showObjectives()\n*-------\
