    and C (the cheapest) give in fact *weak* CONDORCET winners.


    ```

    1 >>> bod.computeCondorcetWinners()

    2 [''D'']

    3 >>> bod.computeWeakCondorcetWinners()

    4 [''A'', ''C'', ''D'']

    ```


    From theory, we know that outranking digraphs are *weakly complete*, i.e. for
    all $x$ and $y$ in $X$, $r(x \succcurlyeq y) < 0.0$ implies that $r(y \succcurlyeq
    x) \geq 0.0$. And, they verify the *coduality principle*: $r(x \succcurlyeq y)
    = r(y \succcurlyeq x)$ (Bisdorff 2013).⁴


