  mdcn: "## 19.6 计算帕累托有效的多目标选择\n\n对偶地，我们说决策备选方案 x 被决策备选方案 y **无反对地超越**，当 x 在一个或多个决策目标上被\
    \ y 正向超越，而 x 在任何决策目标上都没有正向超越 y。\n\n例如，让我们重新考虑第 261 页清单 19.1 中已经看到的具有三个决策目标的性能表\
    \ `pt`：\n\n```\n>>> pt.showObjectives()\n*------- show objectives -------\"\n\
    Eco: Economical aspect\n  ec1 criterion of objective Eco 8\n  ec4 criterion of\
    \ objective Eco 8\n  ec8 criterion of objective Eco 8\n  Total weight: 24.00 (3\
    \ criteria)\nSoc: Societal aspect\n  so2 criterion of objective Soc 12\n  so7\
    \ criterion of objective Soc 12\n  Total weight: 24.00 (2 criteria)\nEnv: Environmental\
    \ aspect\n  en3 criterion of objective Env 6\n  en5 criterion of objective Env\
    \ 6\n  en6 criterion of objective Env 6\n  en9 criterion of objective Env 6\n\
    \  Total weight: 24.00 (4 criteria)\n```\n\n我们注意到在这个例子中，三个决策目标具有同等重要性（见第 3、13\
    \ 和 17 行）。对于每个单独考虑的决策目标，哪些超越情况会被正向（或负向）验证？\n\n这种无反对的多目标超越情况，可以通过对限制在支持每个决策目标的准则联盟上的边际超越有向图进行认知平均融合（参见\
    \ `symmetricAverage()` 方法）来获得（见清单 19.10）。\n\n清单 19.10 计算无反对超越情况\n\n```\n>>> from\
    \ outrankingDigraphs import\\n...                     BipolarOutrankingDigraph\n\
    >>> geco = BipolarOutrankingDigraph(pt,\\n...                     objectivesSubset=['Eco'])\n\
    >>> gsoc = BipolarOutrankingDigraph(pt,\\n...                     objectivesSubset=['Soc'])\n\
    >>> genv = BipolarOutrankingDigraph(pt,\\n...                     objectivesSubset=['Env'])\n\
    >>> from digraphs import FusionLDigraph\n>>> objectiveWeights = \\n...       \
    \              [pt.objectives[obj]['weight']\\n...                     for obj\
    \ in t.objectives]\n>>> uopg = FusionLDigraph([geco,gsoc,genv],\\n...        \
    \             operator='o-average',\\n...                     weights=objectiveWeights)\n\
    >>> uopg.showRelationTable(ReflexiveTerms=False)\n```\n\n```\n* ---- Relation\
    \ Table -----\nr | 'p1' 'p2' 'p3' 'p4' 'p5' 'p6' 'p7'\n-----|--------------------------------------------------------------\n\
    'p1' | - +0.00 +0.00 -0.69 +0.39 +0.11 +0.00\n'p2' | +0.00 - +0.83 +0.00 +0.00\
    \ +0.00 +0.00\n'p3' | +0.00 -0.33 - +0.00 +0.50 +0.00 +0.00\n'p4' | +0.78 +0.00\
    \ +0.61 - +1.00 +1.00 +0.67\n'p5' | -0.11 +0.00 +0.00 -0.89 - +0.11 +0.00\n'p6'\
    \ | +0.00 +0.00 +0.00 -0.44 +0.17 - +0.00\n'p7' | +0.00 +0.00 +0.00 +0.00 +0.78\
    \ +0.42 -\nValuation domain: [-1.0; 1.0]\n```\n\n正向（或负向）的 $r(x \\succsim y)$ 特征值，例如\
    \ $r(p1 \\succsim p5) = +0.39$（见上面清单 19.10 第 20 行），因此仅显示那些被一个或多个决策目标验证（或否定）而未被任何其他决策目标否定（或验证）的超越情况。\n\
    \n为了方便计算这类*无反对的多目标*超越有向图，`outrankingDigraphs` 模块提供了一个相应的 `UnOpposedBipolarOutrankingDigraph`\
    \ 构造函数。\n\n清单 19.11 计算无反对超越有向图\n\n```\n1 >>> from outrankingDigraphs import\\\
    n2 ...                 UnOpposedBipolarOutrankingDigraph\n3 >>> uopg = UnOpposedBipolarOutrankingDigraph(pt)\n\
    4 >>> uopg\n5   *-------- Object instance description --------*\n6   Instance\
    \ class       : UnOpposedBipolarOutrankingDigraph\n7   Instance name        :\
    \ unopposed_outrankings\n8   Actions              : 7\n9   Criteria          \
    \   : 9\n10  Size                 : 13\n11  Oppositeness (%)     : 43.48\n12 \
    \ Determinateness (%)  : 61.71\n13  Valuation domain     : [-1.00;1.00]\n14  Attributes\
    \           : ['name', 'actions',\n15                          'valuationdomain',\
    \ 'objectives',\n16                          'criteria', 'methodData',\n17   \
    \                       'evaluation', 'order', 'runTimes',\n18               \
    \           'relation', ...\n19                          'gamma', 'notGamma']\n\
    20 >>> uopg.computeOppositeness(InPercents=True)\n21 {'standardSize': 23, 'unopposedSize':\
    \ 13,\n22  'oppositeness': 43.47826086956522}\n```\n\n生成的*无反对*超越有向图实际上保留了 23 个正向验证的*标准*超越情况中的\
    \ 13 个（见清单 19.11 第 10、11 行），导致*对立度*——决策目标之间的偏好分歧——为 $(1.0 - 13/23) = 0.4348$。\n\
    \n我们现在可以，例如，验证备选方案 p1 和 p5 之间观察到的超越情况的无反对状态。\n\n清单 19.12 无反对多目标超越情况示例\n\n```\n\
    1 >>> uopg.showPairwiseComparison('p1','p5')\n2 *----------- pairwise comparison\
    \ ----*\n3 Comparing actions : ('p1', 'p5')\n4 crit. wght. g(x) g(y) diff | ind\
    \ pref r()\n5 ec1 8.00 38.11 46.75 -8.64 | 5.00 10.00 +0.00\n6 ec4 8.00 22.65\
    \ 8.96 +13.69 | 5.00 10.00 +8.00\n7 ec8 8.00 77.02 35.91 +41.11 | 5.00 10.00 +8.00\n\
    8 en3 6.00 58.16 31.05 +27.11 | 5.00 10.00 +6.00\n9 en5 6.00 31.40 29.52 +1.88\
    \ | 5.00 10.00 +6.00\n10 en6 6.00 11.41 31.22 -19.81 | 5.00 10.00 -6.00\n11 en9\
    \ 6.00 44.37 9.83 +34.54 | 5.00 10.00 +6.00\n12 so2 12.00 22.43 12.36 +10.07 |\
    \ 5.00 10.00 +12.00\n13 so7 12.00 28.41 44.92 -16.51 | 5.00 10.00 -12.00\n14 Valuation\
    \ in range: -72.00 to +72.00; -------\n15 global concordance: +28.00\n```\n\n\
    在清单 19.12 中，我们看到备选方案 p1 确实从经济角度正向超越了备选方案 p5（r(p1 ≽Eco p5) = +16/24），并且从环境角度也正向超越（r(p1\
    \ ≽Env p5) = +12/24），而从社会角度看，两个备选方案显得不可比较（r(p1 ≽Soc p5) = 0/24）。\n\n当每个目标的准则重要性权重按比例相等时，这些超越情况对于我们可以分配给决策目标的所有可能的重要性权重都是稳定的。\n\
    \n这就为计算多目标帕累托有效选择推荐提供了途径。\n\n事实上，从无反对多目标超越有向图计算出的最佳选择推荐，提供了给定情况下的帕累托有效选择。\n\n\
    清单 19.13 帕累托有效多目标选择\n\n```\n1 >>> uopg.showBestChoiceRecommendation()\n2 Best\
    \ choice recommendation(s) (BCR)\n3 (in decreasing order of determinateness)\n\
    4 Credibility domain: [-1.00,1.00]\n5 === >> potential first choice(s)\n6 choice\
    \ : ['p2', 'p4', 'p7']\n7 independence : 0.00\n8 dominance : 0.33\n9 absorbency\
    \ : 0.00\n10 covering (%) : 33.33\n11 determinateness (%) : 50.00\n12 === >> potential\
    \ last choice(s)\n13 choice : ['p3', 'p5', 'p6', 'p7']\n14 independence : 0.00\n\
    15 dominance : -0.61\n16 absorbency : 0.11\n17 covered (%) : 33.33\n18 determinateness\
    \ (%) : 50.00\n```\n\n我们之前*稳健的*最佳选择推荐（p2 和 p4，见第 271 页图 19.1）在这个例子中仍然是*稳定的*。我们确实得到了最佳选择推荐\
    \ [p2, p4, p7]（见前一页清单 19.13 第 6 行）。然而，请注意决策备选方案 p7 同时是一个潜在的*首选*和一个潜在的*末选*推荐（见第\
    \ 13 行），这是由于当可比性仅限于无反对的严格超越情况时，p7 与其他决策备选方案完全*不可比较*。\n\n这种帕累托有效结果如图 19.3 所示。\n\
    \n```\n1 >>> (~(-uopg)).exportGraphViz(fileName = 'unopDigraph',\\n2 ...     \
    \                firstChoice = ['p2','p4'],\\n3 ...                     lastChoice\
    \ = ['p3','p5','p6'])\n4 *---- exporting a dot file for GraphViz tools ----*\n\
    5 Exporting to unopDigraph.dot\n6 dot -Grankdir=BT -Tpng unopDigraph.dot -o unopDigraph.png\n\
    ``\n\n为了现在做出最终的最佳唯一选择，决策者必然需要在决策辅助过程的第二阶段权衡各个决策目标的相对重要性。\n\n最后，让我们提一下，正是我们双极值逻辑特征框架在这里为我们提供了一阶分布优势检验，以有效地表征一个\n\
    \n图 19.3 由首选和末选推荐导向的标准与*无反对*严格超越有向图"
