    \       -122.000        -6.0\n'c01'       -126.000        -5.0\n```\n\nIn Listing\
    \ 20.11 on the previous page, we may notice that the NETFLOWS rule delivers a\
    \ ranking that is very similar to the one previously obtained with the corresponding\
    \ *Net Approval* scores. Only minor inversions do appear, like in the midfield,\
    \ where Candidate c09 advances before Candidates c13 and c14 (see Line 16), and\
    \ Candidates c06 and c07 swap their positions 9 and 10 (see Line 19). The two\
    \ last ranked Candidates c10 and c01 also swap their positions.\n\nThis confirms\
    \ again the pertinence of the net approval scoring approach for finding the winner\
    \ in an approval–disapproval voting system. Yet, voting by approving (+1), disapproving\
    \ (−1), or ignoring (0) eligible candidates may also be seen as a performance\
    \ evaluation of the eligible candidates on a {−1, 0, 1}-valued ordinal scale.\n\
    \n## 20.4 Three-Valued Evaluative Voting Systems\n\nFollowing such an epistemic\
    \ perspective, we may effectively convert the given BipolarApprovalVotingProfile\
    \ instance into a Performance-Tableau instance, so as to get access to a corresponding\
    \ outranking decision aiding approach.\n\nMind that, contrary to the majority\
    \ margins of the ‘better approved than’ relation, all voters consider now the\
    \ approved candidates to be equivalent (+1). The same is true for the disapproved\
    \ (−1) and, respectively, the ignored (0) candidates. The voter’s marginal preferences\
    \ model this time a complete preorder with three equivalence classes.\n\nFrom\
    \ the saved file AVPerfTab.py (see Line 1 below), we may construct an outranking\
    \ relation on the eligible candidates with our standard BipolarOutrankingDigraph\
    \ class constructor. The semantics of this outranking relation are the following:\n\
    \n- We say that Candidate $x$ outranks Candidate $y$ when there is a majority\
    \ of voters who consider $x$ *at least as well evaluated* as $y$.\n- We say that\
    \ Candidate $x$ is *outranked by* Candidate $y$ when there is a majority of voters\
    \ who consider $x$ *not at least as well evaluated* as $y$.\n- Otherwise, the\
    \ outranking situation is indeterminate.\n\n**Listing 20.12** Computing the outranking\
