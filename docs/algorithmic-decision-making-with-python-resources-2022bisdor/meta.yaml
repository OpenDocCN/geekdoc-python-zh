    In the empty digraph, the whole set of nodes gives indeed at the same time the
    unique initial and terminal prekernel (see Lines 6 and 11), similarly, for the
    *indeterminate* digraph (see Lines 20 and 25).

    Both these results make sense, as in a completely empty or indeterminate digraph,
    there is no *interior* of the digraph defined, only a *border* which is hence
    at the same time an initial and terminal prekernel (see Sect. 2.4). Notice, however,
    that in the latter indeterminate case, the complete set of nodes verifies only
    weakly the internal stability condition (see Lines 21 and 26).

    Other common digraph models, although being clearly oriented, may show nevertheless
    no apparent laterality, like *chordless circuits*, i.e. holes surrounded by an
    oriented cycle—a circuit—of odd length. They do not admit in fact any initial
    or terminal prekernel.


    # Listing 17.5 The prekernels of the 5-circuit digraph


    ```

    1 >>> from digraphs import CirculantDigraph

    2 >>> c5 = CirculantDigraph(order=5,circulants=[1])

