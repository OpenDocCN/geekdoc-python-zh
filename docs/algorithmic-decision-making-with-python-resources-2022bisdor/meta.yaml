    Welf 4(3):185–206'
- md: "## Chapter 9\nRating by Sorting into Relative Performance Quantiles\n\n## Contents\n\
    \n- 9.1 Quantile Sorting on a Single Performance Criterion 115\n- 9.2 Sorting\
    \ into Quantiles with Multiple Performance Criteria 116\n- 9.3 The Sparse Pre-ranked\
    \ Outranking Digraph Model 120\n- 9.4 Ranking Pre-ranked Sparse Outranking Digraphs\
    \ 123\n\nAbstract In this chapter, we apply order statistics for sorting a set\
    \ $X$ of $n$ potential decision alternatives, evaluated on $m$ incommensurable\
    \ performance criteria, into $q$ quantile equivalence classes. The sorting algorithm\
    \ is based on pairwise outranking characteristics involving the quantile class\
    \ limits observed on each criterion. Thus we may implement a weak ordering algorithm\
    \ of complexity $O(nmq)$.\n\n## 9.1 Quantile Sorting on a Single Performance Criterion\n\
    \nA single criterion sorting category $K$ is a (usually) lower-closed interval\
    \ $[m_k; M_k[$ on a real-valued performance measurement scale, with $m_k \\le\
    \ M_k$. If $x$ is a measured performance on this scale, we may distinguish three\
    \ sorting situations:\n\n1. $x < m_k$ and $x < M_k$: The performance $x$ is lower\
    \ than category $K$.\n2. $x \\ge m_k$ and $x < M_k$: The performance $x$ belongs\
    \ to category $K$.\n3. $x > m_k$ and $x \\ge M_k$: The performance $x$ is higher\
    \ than category $K$.\n\nAs the relation $<$ is the dual of $\\ge (\\not\\ge)$,\
    \ it will be sufficient to check that $x \\ge m_k$ as well as $x \\not\\ge M_k$\
    \ are true for $x$ to be considered a member of category $K$.\n\nUpper-closed\
    \ categories (in a more mathematical integration style) may as well be considered.\
    \ In this case it is sufficient to check that $m_k \\not\\ge x$ as well as $M_k\
    \ \\ge x$ are true for $x$ to be considered a member of category $K$. It is worthwhile\
    \ noticing that a category $K$ such that $m_k = M_k$ is hence always empty by\
    \ definition. In order to be able to properly sort over the complete range of\
    \ values to be sorted, we will need to use a special, two-sided closed last, respectively\
    \ first, category.\n\nLet $K = K_1, ..., K_q$ be a non-trivial partition of the\
    \ criterion's performance measurement scale into $q \\ge 2$ ordered categories\
    \ $K_k$—i.e. lower-closed intervals $[m_k; M_k[$—such that $m_k < M_k$, $M_k =\
    \ m_{k+1}$ for $k = 0, ..., q - 1$ and $M_q = \\infty$. And, let $A = \\{a_1,\
    \ a_2, a_3, ...\\}$ be a finite set of not all equal performance measures observed\
    \ on the scale in question.\n\n**Property** For all performance measure $x \\\
    in A$ there exists now a unique $k$ such that $x \\in K_k$. If we assimilate,\
    \ like in descriptive statistics, all the measures gathered in a category $K_k$\
    \ to the central value of the category—i.e. $(m_k + M_k)/2$—the sorting result\
    \ will hence define a weak order (complete preorder) on $A$.\n\nLet $Q = \\{Q_0,\
    \ Q_1, ..., Q_q\\}$ denote the set of $q + 1$ increasing order-statistical quantiles—like\
    \ quartiles or deciles—we may compute from the ordered set $A$ of performance\
    \ measures observed on a performance scale. If $Q_0 = \\min(X)$, the following\
    \ intervals: $[Q_0; Q_1[$, $[Q_1; Q_2[$, ..., $[Q_{q-1}; \\infty[$ define a set\
    \ of $q$ lower-closed sorting categories. And, in the case of upper-closed categories,\
    \ if $Q_q = \\max(X)$, we obtain the intervals $]-\\infty; Q_1]$, $]Q_1; Q_2]$,\
    \ ..., $]Q_{q-1}; Q_q]$. The corresponding sorting of $A$ will result, in both\
    \ cases, in a repartition of all measures $x$ into the $q$ quantile categories\
    \ $K_k$ for $k = 1, ..., q$.\n\n**Example** Let $A = \\{ a_7 = 7.03, a_{15} =\
    \ 9.45, a_{11} = 20.35, a_{16} = 25.94, a_{10} = 31.44, a_9 = 34.48, a_{12} =\
    \ 34.50, a_{13} = 35.61, a_{14} = 36.54, a_{19} = 42.83, a_5 = 50.04, a_2 = 59.85,\
    \ a_{17} = 61.35, a_{18} = 61.61, a_3 = 76.91, a_6 = 91.39, a_1 = 91.79, a_4 =\
    \ 96.52, a_8 = 96.56, a_{20} = 98.42 \\}$ be a set of 20 increasing performance\
    \ measures observed on a given criterion. The lower-closed category limits we\
    \ obtain with quartiles ($q = 4$) are: $Q_0 = 7.03 = a_7$, $Q_1 = 34.485$, $Q_2\
    \ = 54.945$ (median performance), and $Q_3 = 91.69$. And the sorting into these\
    \ four categories defines on $A$ a complete preorder with the following four equivalence\
    \ classes: $K_1 = \\{a_7, a_{10}, a_{11}, a_{10}, a_{15}, a_{16}\\}$, $K_2 = \\\
    {a_5, a_9, a_{13}, a_{14}, a_{19}\\}$, $K_3 = \\{a_2, a_3, a_6, a_{17}, a_{18}\\\
    }$, and $K_4 = \\{a_1, a_4, a_8, a_{20}\\}$.\n\n## 9.2 Sorting into Quantiles\
    \ with Multiple Performance Criteria\n\nLet us now suppose that we are given a\
    \ performance tableau with a set $X$ of $n$ decision alternatives evaluated on\
    \ a coherent family of $m$ performance criteria associated with the corresponding\
    \ outranking relation $\\succsim$ defined on $X$. We denote $x_j$ the performance\
    \ of alternative $x$ observed on criterion $j$.\n\nSuppose furthermore that we\
    \ want to sort the decision alternatives into $q$ upper-closed quantile equivalence\
    \ classes. We therefore consider a series : $k = k/q$ for $k = 0, ..., q$ of $q\
    \ + 1$ equally spaced quantiles, like quartiles: 0, 0.25, 0.5, 0.75, 1; quintiles:\
    \ 0, 0.2, 0.4, 0.6, 0.8, 1: or deciles: 0, 0.1, 0.2, ..., 0.9, 1, for instance.\n\
    \nThe upper-closed $\\mathbf{q}^k$ class corresponds to the $m$ quantile intervals\
    \ $]q_j(p_{k-1}); q_j(p_k)]$ observed on each criterion $j$, where $k = 2, \\\
    dots, q$, $q_j(p_q) = \\max_X(x_j)$, and the first class gathers all performances\
    \ below or equal to $Q_j(p_1)$.\n\nThe lower-closed $\\mathbf{q}_k$ class corresponds\
    \ to the $m$ quantile intervals $[q_j(p_{k-1}); q_j(p_k[$ observed on each criterion\
    \ $j$, where $k = 1, \\dots, q-1$, $q_j(p_0) = \\min_X(x_j)$, and the last class\
    \ gathers all performances above or equal to $Q_j(p_{q-1})$.\n\nWe call **q-tiles**\
    \ a complete series of $k = 1, \\dots, q$ upper-closed $\\mathbf{q}^k$, respectively,\
    \ lower-closed $\\mathbf{q}_k$, multiple-criteria quantile classes.\n\n**Property**\
    \ With the help of the bipolar-valued characteristic of the outranking relation\
    \ $r(x \\succsim y)$ we may compute as follows the bipolar-valued characteristic\
    \ of the assertion: $x$ belongs to upper-closed $q$-tiles class $\\mathbf{q}^k$\
    \ class, respectively, lower-closed class $\\mathbf{q}_k$ (Bisdorff 2020):\n\n\
    $$r(x \\in \\mathbf{q}^k) = \\min[-r(\\mathbf{q}(p_{k-1}) \\succsim x), r(\\mathbf{q}(p_k)\
    \ \\succsim x)] \\quad (9.1)$$\n$$r(x \\in \\mathbf{q}_k) = \\min[r(x \\succsim\
    \ \\mathbf{q}(p_{k-1})), -r(x \\succsim \\mathbf{q}(p_k))] \\quad (9.2)$$\n\n\
    The $\\min$ operator implements the logical conjunction and, the outranking relation\
    \ $\\succsim$ verifying the coduality principle, $-r(\\mathbf{q}(p_{k-1}) \\succsim\
    \ x) = r(\\mathbf{q}(p_{k-1}) \\prec x)$, respectively, $-r(x \\succsim \\mathbf{q}(p_k))\
    \ = r(x \\prec \\mathbf{q}(p_k))$.\n\nThe QuantilesSortingDigraph class from the\
    \ sortingDigraphs module can compute, for instance, such a quintiling of a given\
    \ random performance tableau (Bisdorff 2021).\n\n### Listing 9.1 Computing a quintiles\
    \ sorting result\n\n```\n>>> from randomPerfTabs import RandomPerformanceTableau\n\
    >>> t = RandomPerformanceTableau(numberOfActions=50,seed=5)\n>>> from sortingDigraphs\
    \ import QuantilesSortingDigraph\n>>> qs = QuantilesSortingDigraph(t,limitingQuantiles=5)\n\
    >>> qs\n*------ Object instance description -----------*\nInstance class : QuantilesSortingDigraph\n\
    Instance name : sorting_with_5-tile_limits\nActions : 50\nCriteria : 7\nCategories\
    \ : 5\nLowerclosed : False\nSize : 841\nValuation domain : [-1.00;1.00]\nDeterminateness\
    \ (%) : 81.39\nAttributes : ['actions','actionsOrig',\n'criteria','evaluation','runTimes','name',\n\
    'limitingQuantiles','LowerClosed',\n'categories','criteriaCategoryLimits',\n'profiles','profileLimits','hasNoVeto',\n\
    'valuationdomain','nbrThreads','relation',\n'categoryContent','order','gamma','notGamma']\n\
    *------- Constructor run times (in sec.) ------*\n# Threads : 1\nTotal time :\
    \ 0.03120\nData input : 0.00300\nCompute profiles : 0.00075\nCompute relation\
    \ : 0.02581\nWeak Ordering : 0.00052\n```\n\n5-Tiling the 50 decision alternatives\
    \ results in 5 ordered upper-closed categories of decision alternatives—the quintiles—supported\
    \ by a 81.39% majority of criteria significance (see Line 15 above).\n\nThe `showCriteriaQuantileLimits()`\
    \ method shows in Listing 9.2 the quintile limits separating on each criterion\
    \ the respective evaluations of the 50 decision alternatives into the 5 quintiles.\
    \ Highest evaluations are observed on criterion g1 (see Line 6 below).\n\n###\
    \ Listing 9.2 Inspecting the quantile limits\n\n```\n>>> qs.showCriteriaQuantileLimits()\n\
    Quantile Class Limits (q = 5)\nUpper-closed classes\ncrit.        0.20      0.40\
    \      0.60      0.80      1.00\n*-----------------------------------------------------------\n\
    g1           31.35     41.09     58.53     71.91     98.08\ng2           27.81\
    \     39.19     49.87     61.66     96.18\ng3           25.10     34.78     49.45\
    \     63.97     92.59\ng4           24.61     37.91     53.91     71.02     89.84\n\
    g5           26.94     36.43     52.16     72.52     96.25\ng6           23.94\
    \     44.06     54.92     67.34     95.97\ng7           30.94     47.40     55.46\
    \     69.04     97.10\n```\n\nAnd with the `showSorting()` method we can inspect\
    \ the actual quintiles sorting result in Listing 9.3 below.\n\n### Listing 9.3\
    \ Computing a quintiles sorting result\n\n```\n>>> qs.showSorting()\n    *---\
    \ Sorting results in descending order ---*\n    ]0.80 - 1.00]: ['a22']\n    ]0.60\
    \ - 0.80]: ['a03','a07','a08','a11','a14','a17',\n                    'a19','a20','a29','a32','a33','a37',\n\
    \                    'a39','a41','a42','a49']\n    ]0.40 - 0.60]: ['a01','a02','a04','a05','a06','a08',\n\
    \                    'a09','a16','a17','a18','a19','a21',\n                  \
    \  'a24','a27','a28','a30','a31','a35',\n                    'a36','a40','a43','a46','a47','a48',\n\
    \                    'a49','a50']\n    ]0.20 - 0.40]: ['a04','a10','a12','a13','a15','a23',\n\
    \                    'a25','a26','a34','a38','a43','a44',\n                  \
    \  'a45','a49']\n    ]   < - 0.20]: ['a44']\n```\n\nMost of the decision alternatives\
    \ (26) are gathered in the median quintile ]0.40 – 0.60] class, whereas the highest\
    \ quintile ]0.80 – 1.00] and the lowest quintile ] < –0.20] classes gather each\
    \ one a unique decision alternative (a22, respectively, a44).\n\nInspecting the\
    \ details of the corresponding sorting characteristics may be done with the `showSortingCharacteristics()`\
    \ method."
  mdcn: "## 第9章\n通过排序至相对绩效分位数进行评级\n\n## 目录\n\n- 9.1 单一绩效标准的分位数排序 115\n- 9.2 多绩效标准的分位数排序\
    \ 116\n- 9.3 稀疏预排序优势图模型 120\n- 9.4 预排序稀疏优势图的排序 123\n\n摘要 本章中，我们应用顺序统计学，将一组在$m$个不可通约的绩效标准上评估的$n$个潜在决策备选方案集合$X$，排序至$q$个分位数等价类中。该排序算法基于涉及每个标准上观察到的分位数类别界限的成对优势特征。因此，我们可以实现一个复杂度为$O(nmq)$的弱排序算法。\n\
    \n## 9.1 单一绩效标准的分位数排序\n\n单一标准排序类别$K$是实值绩效测量尺度上的一个（通常）下闭区间$[m_k; M_k[$，其中$m_k \\\
    le M_k$。如果$x$是该尺度上的测量绩效，我们可以区分三种排序情况：\n\n1.  $x < m_k$ 且 $x < M_k$：绩效$x$低于类别$K$。\n\
    2.  $x \\ge m_k$ 且 $x < M_k$：绩效$x$属于类别$K$。\n3.  $x > m_k$ 且 $x \\ge M_k$：绩效$x$高于类别$K$。\n\
    \n由于关系$<$是$\\ge (\\not\\ge)$的对偶，只需检查$x \\ge m_k$以及$x \\not\\ge M_k$均为真，即可认为$x$是类别$K$的成员。\n\
    \n上闭类别（采用更数学化的积分风格）同样可以考虑。在这种情况下，只需检查$m_k \\not\\ge x$以及$M_k \\ge x$均为真，即可认为$x$是类别$K$的成员。值得注意的是，一个满足$m_k\
    \ = M_k$的类别$K$根据定义总是空的。为了能够对需要排序的整个值域进行正确排序，我们将需要使用一个特殊的、双侧闭合的最后（或第一个）类别。\n\n\
    设$K = K_1, ..., K_q$是将标准的绩效测量尺度划分为$q \\ge 2$个有序类别$K_k$（即下闭区间$[m_k; M_k[$）的一个非平凡划分，使得$m_k\
    \ < M_k$，$M_k = m_{k+1}$（对于$k = 0, ..., q - 1$），且$M_q = \\infty$。并且，设$A = \\{a_1,\
    \ a_2, a_3, ...\\}$是在相关尺度上观察到的、并非全部相等的有限绩效测量集合。\n\n**性质** 对于所有绩效测量$x \\in A$，现在存在唯一的$k$使得$x\
    \ \\in K_k$。如果我们像在描述性统计中那样，将收集在类别$K_k$中的所有测量值等同于该类别的中心值——即$(m_k + M_k)/2$——那么排序结果将在$A$上定义一个弱序（完全预序）。\n\
    \n设$Q = \\{Q_0, Q_1, ..., Q_q\\}$表示我们可以从绩效尺度上观察到的有序绩效测量集合$A$计算出的$q + 1$个递增顺序统计分位数——如四分位数或十分位数。如果$Q_0\
    \ = \\min(X)$，则以下区间：$[Q_0; Q_1[$，$[Q_1; Q_2[$，...，$[Q_{q-1}; \\infty[$定义了一组$q$个下闭排序类别。并且，在上闭类别的情况下，如果$Q_q\
    \ = \\max(X)$，我们得到区间$]-\\infty; Q_1]$，$]Q_1; Q_2]$，...，$]Q_{q-1}; Q_q]$。在两种情况下，$A$的相应排序都将导致所有测量值$x$重新分配到$q$个分位数类别$K_k$中，其中$k\
    \ = 1, ..., q$。\n\n**示例** 设$A = \\{ a_7 = 7.03, a_{15} = 9.45, a_{11} = 20.35,\
    \ a_{16} = 25.94, a_{10} = 31.44, a_9 = 34.48, a_{12} = 34.50, a_{13} = 35.61,\
    \ a_{14} = 36.54, a_{19} = 42.83, a_5 = 50.04, a_2 = 59.85, a_{17} = 61.35, a_{18}\
    \ = 61.61, a_3 = 76.91, a_6 = 91.39, a_1 = 91.79, a_4 = 96.52, a_8 = 96.56, a_{20}\
    \ = 98.42 \\}$是在给定标准上观察到的20个递增绩效测量值的集合。我们使用四分位数（$q = 4$）得到的下闭类别界限为：$Q_0 = 7.03\
    \ = a_7$，$Q_1 = 34.485$，$Q_2 = 54.945$（中位数绩效），以及$Q_3 = 91.69$。将$A$排序至这四个类别中，定义了一个完全预序，包含以下四个等价类：$K_1\
    \ = \\{a_7, a_{10}, a_{11}, a_{10}, a_{15}, a_{16}\\}$，$K_2 = \\{a_5, a_9, a_{13},\
    \ a_{14}, a_{19}\\}$，$K_3 = \\{a_2, a_3, a_6, a_{17}, a_{18}\\}$，以及$K_4 = \\{a_1,\
    \ a_4, a_8, a_{20}\\}$。\n\n## 9.2 多绩效标准的分位数排序\n\n现在让我们假设我们有一个绩效表，其中包含一组$n$个决策备选方案$X$，这些方案在$m$个绩效标准的一致族上进行评估，并与定义在$X$上的相应优势关系$\\\
    succsim$相关联。我们用$x_j$表示备选方案$x$在标准$j$上观察到的绩效。\n\n进一步假设我们希望将决策备选方案排序至$q$个上闭分位数等价类中。因此，我们考虑一个序列：$k\
    \ = k/q$，其中$k = 0, ..., q$，表示$q + 1$个等间距的分位数，例如：四分位数：0, 0.25, 0.5, 0.75, 1；五分位数：0,\
    \ 0.2, 0.4, 0.6, 0.8, 1；或十分位数：0, 0.1, 0.2, ..., 0.9, 1。\n\n上闭$\\mathbf{q}^k$类对应于在每个标准$j$上观察到的$m$个分位数区间$]q_j(p_{k-1});\
    \ q_j(p_k)]$，其中$k = 2, \\dots, q$，$q_j(p_q) = \\max_X(x_j)$，第一个类别汇集所有低于或等于$Q_j(p_1)$的绩效。\n\
    \n下闭$\\mathbf{q}_k$类对应于在每个标准$j$上观察到的$m$个分位数区间$[q_j(p_{k-1}); q_j(p_k[$，其中$k =\
    \ 1, \\dots, q-1$，$q_j(p_0) = \\min_X(x_j)$，最后一个类别汇集所有高于或等于$Q_j(p_{q-1})$的绩效。\n\
    \n我们将$k = 1, \\dots, q$个上闭$\\mathbf{q}^k$（或下闭$\\mathbf{q}_k$）多标准分位数类的完整序列称为**q分位数**。\n\
    \n**性质** 借助优势关系的双极值特征$r(x \\succsim y)$，我们可以如下计算断言的双极值特征：$x$属于上闭$q$分位数类$\\mathbf{q}^k$（或下闭类$\\\
    mathbf{q}_k$）(Bisdorff 2020)：\n\n$$r(x \\in \\mathbf{q}^k) = \\min[-r(\\mathbf{q}(p_{k-1})\
    \ \\succsim x), r(\\mathbf{q}(p_k) \\succsim x)] \\quad (9.1)$$\n$$r(x \\in \\\
    mathbf{q}_k) = \\min[r(x \\succsim \\mathbf{q}(p_{k-1})), -r(x \\succsim \\mathbf{q}(p_k))]\
    \ \\quad (9.2)$$\n\n$\\min$算子实现逻辑合取，并且优势关系$\\succsim$满足对偶性原则，即$-r(\\mathbf{q}(p_{k-1})\
    \ \\succsim x) = r(\\mathbf{q}(p_{k-1}) \\prec x)$，或$-r(x \\succsim \\mathbf{q}(p_k))\
    \ = r(x \\prec \\mathbf{q}(p_k))$。\n\nsortingDigraphs模块中的QuantilesSortingDigraph类可以计算，例如，给定随机绩效表的五分位数排序（Bisdorff\
    \ 2021）。\n\n### 代码清单 9.1 计算五分位数排序结果\n\n```\n>>> from randomPerfTabs import RandomPerformanceTableau\n\
    >>> t = RandomPerformanceTableau(numberOfActions=50,seed=5)\n>>> from sortingDigraphs\
    \ import QuantilesSortingDigraph\n>>> qs = QuantilesSortingDigraph(t,limitingQuantiles=5)\n\
    >>> qs\n*------ Object instance description -----------*\nInstance class : QuantilesSortingDigraph\n\
    Instance name : sorting_with_5-tile_limits\nActions : 50\nCriteria : 7\nCategories\
    \ : 5\nLowerclosed : False\nSize : 841\nValuation domain : [-1.00;1.00]\nDeterminateness\
    \ (%) : 81.39\nAttributes : ['actions','actionsOrig',\n'criteria','evaluation','runTimes','name',\n\
