    The book series **International Series in Operations Research and Management Science**
    encompasses the various areas of operations research and management science. Both
    theoretical and applied books are included. It describes current advances anywhere
    in the world that are at the cutting edge of the field. The series is aimed especially
    at researchers, advanced graduate students, and sophisticated practitioners.


    The series features three types of books:


    - Advanced expository books that extend and unify our understanding of particular
    areas.

    - Research monographs that make substantial contributions to knowledge.

    - Handbooks that define the new state of the art in particular areas. Each handbook
    will be edited by a leading authority in the area who will organize a team of
    experts on various aspects of the topic to write individual chapters. A handbook
    may emphasize expository surveys or completely new advances (either research or
    applications) or a combination of both.


    The series emphasizes the following four areas:


    **Mathematical Programming:** Including linear programming, integer programming,
    nonlinear programming, interior point methods, game theory, network optimization
    models, combinatorics, equilibrium programming, complementarity theory, multiobjective
    optimization, dynamic programming, stochastic programming, complexity theory,
    etc.


    **Applied Probability:** Including queuing theory, simulation, renewal theory,
    Brownian motion and diffusion processes, decision analysis, Markov decision processes,
    reliability theory, forecasting, other stochastic processes motivated by applications,
    etc.


    **Production and Operations Management:** Including inventory theory, production
    scheduling, capacity planning, facility location, supply chain management, distribution
    systems, materials requirements planning, just-in-time systems, flexible manufacturing
    systems, design of production lines, logistical planning, strategic issues, etc.


    **Applications of Operations Research and Management Science:** Including telecommunications,
    health care, capital budgeting and finance, economics, marketing, public policy,
    military operations research, humanitarian relief and disaster mitigation, service
    operations, transportation systems, etc.


    This book series is indexed in Scopus.


    More information about this series at [https://link.springer.com/bookseries/6161](https://link.springer.com/bookseries/6161)


    Raymond Bisdorff


