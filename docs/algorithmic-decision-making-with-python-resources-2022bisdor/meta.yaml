- md: "## Chapter 2\nWorking with Bipolar-Valued Digraphs\n\n## Contents\n\n- 2.1\
    \ Random Bipolar-Valued Digraphs\n- 2.2 Graphviz Drawings\n- 2.3 Asymmetric and\
    \ Symmetric Parts\n- 2.4 Border and Inner Parts\n- 2.5 Fusion by Epistemic Disjunction\n\
    - 2.6 Dual, Converse, and Codual Digraphs\n- 2.7 Symmetric and Transitive Closures\n\
    - 2.8 Strong Components\n- 2.9 CSV Storage\n- 2.10 Complete, Empty, and Indeterminate\
    \ Digraphs\n\n**Abstract** The chapter introduces bipolar-valued digraphs, the\
    \ fundamental root type of all the specialised digraphs implemented in the DIGRAPH3\
    \ modules. With the help of a randomly valued digraph, we illustrate some basic\
    \ digraph manipulation methods, like drawing the digraph, dividing the digraph\
    \ into its asymmetric and symmetric parts, separating the border from the inner\
    \ part, computing associated dual, converse, and codual digraphs, and operating\
    \ symmetric and transitive closures.\n\n## 2.1 Random Bipolar-Valued Digraphs\n\
    \nIn Listing 2.1, we generate a uniformly random $[-1.0; +1.0]$-valued digraph\
    \ of order 7, denoted `rdg` and modelling, for instance, a binary relation $S(x,\
    \ y)$ defined on the set of nodes of `rdg`. For this purpose, the DIGRAPH3 resources\
    \ provide in the `randomDigraphs` module a specific `RandomValuationDigraph` class\
    \ (Bisdorff 2021b).\n\n**Listing 2.1** Random bipolar-valued digraph instance\n\
    \n```\n>>> from randomDigraphs import RandomValuationDigraph\n>>> rdg = RandomValuationDigraph(order=7)\n\
    >>> rdg.save('tutRandValDigraph')\n```\n\n```\n>>> from digraphs import Digraph\n\
    >>> rdg = Digraph('tutRandValDigraph')\n>>> rdg\n*------- Digraph instance description\
    \ -------*\n  Instance class       : Digraph\n  Instance name        : tutRandValDigraph\n\
    \  Digraph Order        : 7\n  Digraph Size         : 22\n  Valuation domain \
    \    : [-1.00;1.00]\n  Determinateness (%)  : 75.24\n  Attributes           :\
    \ ['name','actions','order',\n                          'valuationdomain','relation',\n\
    \                          'gamma','notGamma']\n```\n\nWith the save() method\
    \ (see Listing 2.1 on the previous page Line 3) we keep for future use a backup\
    \ version of rdg which is saved into a file named tutRandValDigraph.py in the\
    \ current working directory. The genuine Digraph class constructor can reload\
    \ the rdg object from the stored file (Line 5). One can easily inspect the content\
    \ of a Digraph object with its name rdg (Line 6). The digraph size 22 indicates\
    \ the number of positively valued arcs (Line 11). The valuation domain is uniformly\
    \ distributed in the interval [-1.0; 1.0], the mean absolute arc valuation being\
    \ (0.7524 × 2) − 1.0 = 0.5048 (Line 13).\n\nAs mentioned in the previous Chap.\
    \ 1, all objects of Digraph type contain at least the list of attributes shown\
    \ here in Lines 14–16:\n\n- A name (string) and a dictionary of actions (digraph\
    \ nodes),\n- An order (integer) attribute containing the number of nodes,\n- A\
    \ valuationdomain dictionary and a double dictionary relation representing the\
    \ adjacency table of the digraph relation,\n- A gamma and a notGamma dictionary\
    \ containing the direct neighbourhood and not neighbourhood of each node.\n\n\
    The Digraph class provides some generic show...() methods for exploring the content\
    \ of a given Digraph object, like the showRelationTable(), the showComponents(),\
    \ and the showNeighborhoods() methods.\n\n## Listing 2.2 Example of random valuation\
    \ digraph\n\n```\n>>> rdg.showRelationTable()\n  * ---- Relation Table ----\n\
    \  r(xSy) |  '1'    '2'    '3'    '4'    '5'    '6'    '7'\n  -------|-------------------------------------------------\n\
    \  '1'    |  0.00 -0.48  0.70  0.86  0.30  0.38  0.44\n  '2'    | -0.22  0.00\
    \ -0.38  0.50  0.80 -0.54  0.02\n  '3'    | -0.42  0.08  0.00  0.70 -0.56  0.84\
    \ -1.00\n  '4'    |  0.44 -0.40 -0.62  0.00  0.04  0.66  0.76\n  '5'    |  0.32\
    \ -0.48 -0.46  0.64  0.00 -0.22 -0.52\n  '6'    | -0.84  0.00 -0.40 -0.96 -0.18\
    \  0.00 -0.22\n  '7'    |  0.88  0.72  0.82  0.52 -0.84  0.04  0.00\n>>> rdg.showComponents()\n\
    ```\n\n```\n*--- Connected Components ---*\n1: ['1', '2', '3', '4', '5', '6',\
    \ '7']\n>>> rdg.showNeighborhoods()\n*---- Neighborhoods ------*\n    Gamma:\n\
    \    '1': in => {'5','7','4'}, out => {'5','7','6','3','4'}\n    '2': in => {'7','3'},\
    \ out => {'5','7','4'}\n    '3': in => {'7','1'}, out => {'6','2','4'}\n    '4':\
    \ in => {'5','7','1','2','3'}, out => {'5','7','1','6'}\n    '5': in => {'1','2','4'},\
    \ out => {'1','4'}\n    '6': in => {'7','1','3','4'}, out => set()\n    '7': in\
    \ => {'1','2','4'}, out => {'1','2','3','4','6'}\n    Not Gamma:\n    '1': in\
    \ => {'6','2','3'}, out => {'2'}\n    '2': in => {'5','1','4'}, out => {'1','6','3'}\n\
    \    '3': in => {'5','6','2','4'}, out => {'5','7','1'}\n    '4': in => {'6'},\
    \ out => {'2','3'}\n    '5': in => {'7','6','3'}, out => {'7','6','2','3'}\n \
    \   '6': in => {'5','2'}, out => {'5','7','1','3','4'}\n    '7': in => {'5','6','3'},\
    \ out => {'5'}\n```\n\nPositive characteristic values indicate the presence of\
    \ an arc whereas negative ones indicate their absence. 0.0 values indicate an\
    \ indeterminate situation: there may be or not be an arc (see Listing 2.2 on the\
    \ facing page Lines 5–11). Mind that some Digraph class methods will ignore the\
    \ reflexive links by considering that they are indeterminate, i.e. the characteristic\
    \ value r(x S x) for all action x is set to the median, i.e. indeterminate value\
    \ 0.0 in this case (Bisdorff 2004).\n\n## 2.2 Graphviz Drawings\n\nAn even better\
    \ insight into the Digraph object rdg is given by looking in Fig. 2.1 at its graphviz\
    \ drawing (Gansner and North 2000).¹\n\n```\n>>> rdg.exportGraphViz('tutRandValDigraph')\n\
    *---- exporting a dot file for GraphViz tools ------*\n  Exporting to tutRandValDigraph.dot\n\
    \  dot -Grankdir=BT -Tpng tutRandValDigraph.dot -o tutRandValDigraph.png\n```\n\
    \n¹The exportGraphViz() method is depending on drawing tools from the graphviz\
    \ software (https://graphviz.org/). On Linux Ubuntu or Debian you may try to install\
    \ them with . . .$ sudo apt-get install graphviz. There are ready dmg installers\
    \ for MacOS.\n\n---\n\nFig. 1.3 The circulant [1,3] digraph and the 3 grid digraph\n\
    \n```\n*---- exporting a dot file for GraphViz tools ----*\nExporting to c8.dot\n\
    circo -Tpng c8.dot -o c8.png\n>>> grid3 = GridDigraph(n=3,m=3,\n...          \
    \           hasMedianSplitOrientation=True)\n>>> grid.exportGraphViz('grid3')\n\
    *---- exporting a dot file for GraphViz tools ----*\nExporting to grid3.dot\n\
    dot -Grankdir=BT -Tpng grid3.dot -o grid3.png\n```\n\nThe next Chap. 2 introduces\
    \ the fundamental *bipolar-valued digraph* model which is *root object type* to\
    \ all the digraph models implemented in the DIGRAPH3 modules (Bisdorff 2021).\n\
    \n## References\n\nBisdorff R (2021) Technical documentation of the Digraph3 collection\
    \ of Python modules. https://digraph3.readthedocs.io/en/latest/techDoc.html\n\
    Gansner E, North S (2000) An open graph visualization system and its applications\
    \ to software engineering. Softw Pract Exp 30(11):1203–1233. https://graphviz.org/documentation/\n\
    McKay B, Piperno A (2013) Practical graph isomorphism, II. J Symb Comput 60:94–112.\
    \ https://www.cs.sunysb.edu/~algorith/implement/nauty/implement.shtml"
  mdcn: "## 第2章\n处理双极值有向图\n\n## 目录\n\n- 2.1 随机双极值有向图\n- 2.2 Graphviz 绘图\n- 2.3 非对称与对称部分\n\
    - 2.4 边界与内部部分\n- 2.5 通过认知析取进行融合\n- 2.6 对偶、逆与余对偶有向图\n- 2.7 对称与传递闭包\n- 2.8 强连通分量\n\
    - 2.9 CSV 存储\n- 2.10 完全、空与不确定有向图\n\n**摘要** 本章介绍双极值有向图，这是 DIGRAPH3 模块中实现的所有专用有向图的基本根类型。借助一个随机赋值的有向图，我们演示一些基本的有向图操作方法，例如绘制有向图、将其划分为非对称和对称部分、分离边界与内部部分、计算相关的对偶、逆和余对偶有向图，以及操作对称和传递闭包。\n\
    \n## 2.1 随机双极值有向图\n\n在清单 2.1 中，我们生成一个阶为 7 的均匀随机 $[-1.0; +1.0]$ 赋值有向图，记为 `rdg`，例如，它建模了定义在\
    \ `rdg` 节点集上的一个二元关系 $S(x, y)$。为此，DIGRAPH3 资源在 `randomDigraphs` 模块中提供了一个特定的 `RandomValuationDigraph`\
    \ 类 (Bisdorff 2021b)。\n\n**清单 2.1** 随机双极值有向图实例\n\n```\n>>> from randomDigraphs\
    \ import RandomValuationDigraph\n>>> rdg = RandomValuationDigraph(order=7)\n>>>\
    \ rdg.save('tutRandValDigraph')\n```\n\n```\n>>> from digraphs import Digraph\n\
    >>> rdg = Digraph('tutRandValDigraph')\n>>> rdg\n*------- Digraph instance description\
    \ -------*\n  Instance class       : Digraph\n  Instance name        : tutRandValDigraph\n\
    \  Digraph Order        : 7\n  Digraph Size         : 22\n  Valuation domain \
    \    : [-1.00;1.00]\n  Determinateness (%)  : 75.24\n  Attributes           :\
    \ ['name','actions','order',\n                          'valuationdomain','relation',\n\
    \                          'gamma','notGamma']\n```\n\n通过 save() 方法（参见前一页清单 2.1\
    \ 第 3 行），我们保存了 rdg 的备份版本以供将来使用，该备份保存在当前工作目录中名为 tutRandValDigraph.py 的文件中。真正的 Digraph\
    \ 类构造函数可以从存储的文件中重新加载 rdg 对象（第 5 行）。人们可以轻松地检查名为 rdg 的 Digraph 对象的内容（第 6 行）。有向图大小\
    \ 22 表示正赋值弧的数量（第 11 行）。赋值域在区间 [-1.0; 1.0] 内均匀分布，平均绝对弧赋值为 (0.7524 × 2) − 1.0 =\
    \ 0.5048（第 13 行）。\n\n如前一章第 1 章所述，所有 Digraph 类型的对象至少包含此处第 14–16 行所示的属性列表：\n\n-\
    \ 一个名称（字符串）和一个动作字典（有向图节点），\n- 一个阶（整数）属性，包含节点数量，\n- 一个 valuationdomain 字典和一个双层字典\
    \ relation，表示有向图关系的邻接表，\n- 一个 gamma 和一个 notGamma 字典，包含每个节点的直接邻域和非邻域。\n\nDigraph\
