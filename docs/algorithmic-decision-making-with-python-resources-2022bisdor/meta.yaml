    \ 'thresholds': {'ind': (Decimal('2.50'), Decimal('0.0')),\n                'pref':\
    \ (Decimal('5.00'), Decimal('0.0')),\n                'veto': (Decimal('60.00'),\
    \ Decimal('0.0'))\n                },\n }),\n...\n...])\n```\n\n在我们的双极值偏好排序方法中，所有性能标准都实现\
    \ *十进制值* 评估函数，其中偏好随测量性能的增加而 *递增* 或 *递减*。为了建模一个 *连贯的* 性能矩阵，决策标准族必须满足两个方法论要求：\n\n\
    1.  *独立性*：每个决策标准实现的评估在功能上 *独立于* 其他决策标准的评估，即在一个标准上评估的性能不会在任何意义上 *约束* 在任何其他标准上评估的性能。\n\
    2.  *非冗余性*：每个性能标准仅对 *单个* 决策目标 *显著*。\n\n为了考虑性能评估过程中任何通常 *不可避免的不精确性*，我们可以指定三个性能\
