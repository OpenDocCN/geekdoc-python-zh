    \           : 75\nCriteria          : 7\nSorting by        : 5-Tiling\nOrdering\
    \ strategy : average\nComponents        : 9\nMinimal order     : 1\nMaximal order\
    \     : 25\nAverage order     : 8.3\nfill rate         : 20.432%\nAttributes \
    \       :\n    ['actions','criteria','evaluation','NA','name',\n    'order','runTimes','dimension','sortingParameters',\n\
