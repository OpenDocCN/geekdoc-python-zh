    # 2.10 Complete, Empty, and Indeterminate Digraphs


    Let us finally mention some special universal classes of digraphs that are readily
    available in the `digraphs` module,⁵ like:


    +   - the `CompleteDigraph` class,

    - the `EmptyDigraph` class, and

    - the `IndeterminateDigraph` class,


    which set all pairwise characteristic values, respectively, to the *maximum*,
    the *minimum*, respectively, to the *median*—indeterminate—value.


    **Listing 2.11** Complete, empty, and indeterminate digraphs


    ```

    1 >>> from digraphs import CompleteDigraph,EmptyDigraph,\n2 ...                     IndeterminateDigraph

