- md: "## Notes\n\nIt was *Denis Bouyssou* who first suggested us end of the nineties,\
    \ when we started to work in Prolog on the computation of fuzzy digraph kernels\
    \ with finite domain constraint solvers, that the 50% criteria significance majority\
    \ was a very special value to be carefully taken into account. The converging\
    \ solution vectors of the fixpoint kernel equations furthermore confirmed this\
    \ special status of the 50% majority (see Chap. 17). These early insights led\
    \ to the seminal articles on bipolar-valued epistemic logic where we introduced\
    \ split truth/falseness semantics for a multi-valued logical processing of fuzzy\
    \ preference modelling (Bisdorff 2000, 2002). The characteristic valuation domain\
    \ remained, however, the classical fuzzy [0.0; 1.0] valuation domain.\n\nIt is\
    \ only in 2004, when we succeeded in assessing the stability of the outranking\
    \ digraph when solely ordinal criteria significance weights are given that it\
    \ became clear and evident for us that the characteristic valuation domain had\
    \ to be shifted to a [−1.0; +1.0]-valued domain (see Chap. 19 and Bisdorff 2004).\
    \ In this bipolar valuation, the 50% majority threshold corresponds now to the\
    \ median 0.0 value, characterising with the correct zero value an epistemic indeterminateness—no\
    \ knowledge—situation. Furthermore, identifying truth and falseness directly by\
    \ the sign of the characteristic value revealed itself to be very efficient not\
    \ only from a computational point of view but also from scientific and semiotic\
    \ perspectives. A positive (respectively, negative) characteristic value now attests\
    \ a logically valid (respectively, invalid) statement and a negative affirmation\
    \ now means a positive refutation and vice versa. Furthermore, the median zero\
    \ value gives way to efficiently handling partial objects—like the border or the\
    \ asymmetric part of a digraph—and, even more important from a practical decision\
    \ making point of view, any missing data.\n\nThe bipolar [−1.0; +1.0]-valued characteristic\
    \ domain opened so the way to important new operations and concepts, like the\
    \ disjunctive epistemic fusion operation seen in Sect. 2.5 on page 18 that confers\
    \ the outranking digraph a logically sound and epistemically correct definition\
    \ (Bisdorff 2013). KENDALL's ordinal correlation index could be extended to a\
    \ bipolar-valued relational equivalence index between digraphs (see Chap. 16 and\
    \ Bisdorff 2012). Making usage of the bipolar-valued Gaussian error function naturally\
    \ led to defining a bipolar-valued likelihood function, where a positive, respectively,\
    \ negative, value gives the likelihood of an affirmation, respectively, a refutation\
    \ (see Chap. 18 and Bisdorff 2014).\n\nIn the following Chap. 3 we introduce the\
    \ main formal object of this book, namely *bipolar-valued outranking* digraphs.\n\
    \n## References\n\nBisdorff R (2000) Logical foundation of fuzzy preferential\
    \ systems with application to the electre decision aid methods. Comput Oper Res\
    \ 27:673–687. http://hdl.handle.net/10993/23724\n\nBisdorff R (2002) Logical foundation\
    \ of multicriteria preference aggregation. In: Bouyssou D, Jacquet-Lagrèze E,\
    \ Perny P, Slowiński R, Vanderpooten D, Vincke P (eds) Aiding decisions with multiple\
    \ criteria. Kluwer Academic, pp 379–403. http://hdl.handle.net/10993/45313\n\n\
    Bisdorff R (2004) On a natural fuzzification of Boolean logic. In: Klément EP,\
    \ Pap E (eds) Linz seminar on fuzzy set theory, mathematics of fuzzy systems,\
    \ Bildungszentrum St. Magdalena, Linz (Austria), pp 20–26. http://hdl.handle.net/10993/23721\n\
    \nBisdorff R (2012) On measuring and testing the ordinal correlation between bipolar\
    \ outranking relations. In: Mousseau V, Pirlot M (eds) DAP’2012 from multiple\
    \ criteria decision aid to preference learning, University of Mons (Belgium),\
    \ pp 91–100. http://hdl.handle.net/10993/23909\n\nBisdorff R (2013) On polarizing\
    \ outranking relations with large performance differences. J Multi-Criteria Decis\
    \ Anal Wiley 20:3–12. http://hdl.handle.net/10993/245\n\nBisdorff R (2014) On\
    \ confident outrankings with multiple criteria of uncertain significance. In:\
    \ Mousseau V, Pirlot M (eds) DAP’2014 from multiple criteria decision aid to preference\
    \ learning, Ecole Centrale de Paris, pp 1–6. http://hdl.handle.net/10993/23910\n\
    \nBisdorff R (2021a) Documentation of the Digraph3 collection of Python modules\
    \ for algorithmic decision theory. https://digraph3.readthedocs.io/en/latest/\n\
    \nBisdorff R (2021b) Technical documentation of the Digraph3 collection of Python\
    \ modules. https://digraph3.readthedocs.io/en/latest/techDoc.html\n\nGansner E,\
    \ North S (2000) An open graph visualization system and its applications to software\
    \ engineering. Softw Pract Exp 30(11):1203–1233. https://graphviz.org/documentation/\n\
    \nRoy B (1959) Transitivité et connexité. C R Acad Sci Paris 249:216–218\n\nWarshall\
    \ S (1962) A theorem on Boolean matrices. J ACM 9:11–12\n\n## Chapter 3\nWorking\
    \ with Outranking Digraphs\n\n> The rule for the combination of independent concurrent\
    \ arguments takes a very simple form when expressed in terms of the intensity\
    \ of belief ... It is this: Take the sum of all the feelings of belief which would\
    \ be produced separately by all the arguments pro, subtract from that the similar\
    \ sum for arguments con, and the remainder is the feeling of belief which ought\
    \ to have the whole. This is a proceeding which men often resort to, under the\
    \ name of balancing reasons\n\n—C.S. Peirce, The probability of induction (1878)\n\
    \n## Contents\n\n- 3.1 The Hybrid Outranking Digraph Model\n- 3.2 The Bipolar-Valued\
    \ Outranking Digraph\n- 3.3 Pairwise Comparisons\n- 3.4 Recoding the Characteristic\
    \ Valuation Domain\n- 3.5 The Strict Outranking Digraph\n\n**Abstract** In this\
    \ chapter, we introduce the main formal object of this book, namely the bipolar-valued\
    \ outranking digraph. With a randomly generated multiple-criteria performance\
    \ tableau, we construct the corresponding bipolar-valued outranking relation from\
    \ pairwise comparisons. The resulting bipolar-valued outranking characteristics\
    \ may be recoded. Finally, the codual outranking digraph gives us the associated\
    \ strict outranking relation.\n\n### 3.1 The Hybrid Outranking Digraph Model\n\
    \nIn the `outrankingDigraphs` module, the `BipolarOutrankingDigraph` class provides\
    \ our standard *outranking digraph* constructor. Such an instance represents a\
    \ *hybrid* object of both the `PerformanceTableau` type *and* the OutrankingDigraph\
    \ type (Bisdorff 2021). A given BipolarOutrankingDigraph object contains hence\
    \ always at least the following attributes:\n\n1. actions: an ordered dictionary\
    \ describing the potential decision actions or alternatives with name and comment\
    \ attributes\n2. objectives: a possibly empty ordered dictionary of decision objectives\
    \ with name and comment attributes, describing the multiple preference dimensions\
    \ involved in the decision problem\n3. criteria: an ordered dictionary of performance\
    \ criteria, i.e. preferentially independent and non-redundant decimal-valued evaluation\
    \ functions used for assessing the performance of each potential decision action\
    \ with respect to a decision objective\n4. evaluation: a double dictionary gathering\
    \ performance evaluations for each decision alternative on each criterion function\n\
    5. valuationdomain: a dictionary with three entries: the minimum (-1.0, certainly\
    \ outranked), the median (0.0, indeterminate), and the maximum characteristic\
    \ value (+1.0, certainly outranking)\n6. relation: a double dictionary defined\
    \ on the Cartesian product of the set of decision alternatives capturing the credibility\
    \ of the pairwise outranking situation computed on the basis of the performance\
    \ differences observed between couples of decision alternatives on the given family\
    \ of criteria functions\n\nLet us consider, for instance, a random bipolar-valued\
    \ outranking digraph with seven decision actions denoted a1, a2, ..., a7. We need\
    \ therefore, first, to generate in Listing 3.1 a corresponding random performance\
    \ tableau.\n\n**Listing 3.1** Generating a random performance tableau\n\n```python\n\
    >>> from perfTabs import RandomPerformanceTableau\n>>> pt = RandomPerformanceTableau(numberOfActions=7,\n\
    ...                                seed=100)\n>>> pt\n *------- PerformanceTableau\
    \ instance description -------*\n    Instance class     : RandomPerformanceTableau\n\
    \    Seed               : 100\n    Instance name      : randomperftab\n    Actions\
    \            : 7\n    Criteria           : 7\n    NaN proportion (%) : 6.1\n>>>\
    \ pt.showActions()\n *----- show digraphs actions ---------------*\n   key:  a1\n\
    \     name:        action 1\n     comment:     RandomPerformanceTableau() generated.\n\
    \   key:  a2\n     name:        action 2\n     comment:     RandomPerformanceTableau()\
    \ generated.\n     ...\n     ...\n```"
  mdcn: "## 注释\n\n正是*丹尼斯·布伊索*在九十年代末首次向我们提出，当时我们刚开始使用Prolog和有限域约束求解器来计算模糊有向图核，50%的准则显著性多数是一个需要仔细考虑的非常特殊的值。不动点核方程的收敛解向量进一步证实了50%多数的这一特殊地位（见第17章）。这些早期的洞见催生了关于双极值认知逻辑的开创性文章，我们在其中引入了分裂真/假语义，用于模糊偏好建模的多值逻辑处理（Bisdorff\
    \ 2000, 2002）。然而，特征值域仍然是经典的模糊[0.0; 1.0]值域。\n\n直到2004年，当我们成功评估了仅给定序数准则显著性权重时优势有向图的稳定性，我们才清楚地认识到，特征值域必须转移到一个[−1.0;\
    \ +1.0]值域（见第19章和Bisdorff 2004）。在这种双极值中，50%多数阈值现在对应于中位数0.0值，用正确的零值表征了一种认知不确定性——无知识——状态。此外，通过特征值的符号直接识别真与假，不仅从计算角度，而且从科学和符号学角度来看，都被证明是非常高效的。一个正（或负）的特征值现在证明了一个逻辑上有效（或无效）的陈述，而一个否定的断言现在意味着一个肯定的反驳，反之亦然。此外，中位数零值使得能够高效处理部分对象——比如有向图的边界或非对称部分——并且，从实际决策的角度来看，更重要的是处理任何缺失数据。\n\
    \n双极[−1.0; +1.0]值特征域因此为重要的新运算和概念开辟了道路，例如第2.5节第18页讨论的析取认知融合运算，它赋予了优势有向图一个逻辑上合理且认知上正确的定义（Bisdorff\
