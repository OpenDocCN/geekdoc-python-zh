    # 23.2 Who Is the Liar?


    Claude Berge''s famous mystery story related by Golumbic (2004, p. 20) may well
    illustrate the importance of being an interval graph.

    Suppose the file berge.py¹ contains the following Graph instance data:


    ```

    1 vertices = {

    2     ''A'': {''name'': ''Abe'', ''shortName'': ''A''},

    3     ''B'': {''name'': ''Burt'', ''shortName'': ''B''},

    4     ''C'': {''name'': ''Charlotte'', ''shortName'': ''C''},

    5     ''D'': {''name'': ''Desmond'', ''shortName'': ''D''},

    6     ''E'': {''name'': ''Eddie'', ''shortName'': ''E''},

    7     ''I'': {''name'': ''Ida'', ''shortName'': ''I''},

    8     }

    9 valuationDomain = {''min'':-1,''med'':0,''max'':1}

    10 edges = {

    11     frozenset([''A'',''B'']) : 1,

    12     frozenset([''A'',''C'']) : -1,

    13     frozenset([''A'',''D'']) : 1,

    14     frozenset([''A'',''E'']) : 1,

    15     frozenset([''A'',''I'']) : -1,

    16     frozenset([''B'',''C'']) : -1,

    17     frozenset([''B'',''D'']) : -1,

    18     frozenset([''B'',''E'']) : 1,

    19     frozenset([''B'',''I'']) : 1,

    20     frozenset([''C'',''D'']) : 1,

    21     frozenset([''C'',''E'']) : 1,

