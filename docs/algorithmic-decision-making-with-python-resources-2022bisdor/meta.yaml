    ## Preface


    The reader will find in this monograph a series of tutorials and advanced topics
    originally written over the last decade as documentation parts for the DIGRAPH3
    collection of Python modules. These programming resources—like the outrankingDigraphs
    module—were essentially used both for the computational verification of decision
    algorithms and for the preparation and illustration of a master’s course on algorithmic
    decision theory taught at the University of Luxembourg from 2010 to 2020. Some
    resources, like the randomNumbers module, served for preparing and illustrating
    the lectures of a computational statistics course. Curious readers will also discover
    some resources—the arithmetics module—used for preparing and illustrating a first
    semester course on discrete mathematics.


    The DIGRAPH3 Python programming resources are useful in the field of algorithmic
    decision theory and more specifically for the outranking approach of multiple-criteria
    decision aiding (MCDA). In this latter scientific field, we address essentially
    three kinds of usage.


    First, we present algorithms and illustrate computing tools for solving either
    a multiple-criteria first choice selection or a dual last choice rejection problem.
    We also tackle the problem of how to list a set of items with multiple incommensurable
    performance criteria either from the best to the worst (ranking problem) or from
    the worst to the best (ordering problem). Finally, we present order-statistical
    algorithms for relative or absolute quantiles rating of multiple-criteria performance
    records.


    It is necessary to mention that the DIGRAPH3 resources do not provide a professional
    Python software library. The collection of Python modules I describe in this book
    was not built following any professional software development methodology. The
    design of classes and methods was kept as simple and elementary as was opportune
    for the author. Sophisticated and cryptic overloading of classes, methods and
    variables is more or less avoided all over. A simple copy, paste and ad hoc customisation
    development strategy was generally preferred. As a consequence, the DIGRAPH3 modules
    keep a large part of independence. Furthermore, the development of the DIGRAPH3
