    \ when $r(x > y) > 0$, i.e. there is a majority of voters who approve *more* and\
    \ disapprove *less* $x$ than $y$. Vice versa, we say that Candidate $x$ is *not\
    \ better approved* than Candidate $y$ when $r(x > y) < 0$, i.e. there is a majority\
    \ of voters who disapprove more and approve less $x$ than $y$. This computation\
    \ is achieved with the `MajorityMarginsDigraph` constructor.\n\n```\n>>> from\
    \ votingProfiles import MajorityMarginsDigraph\n>>> m = MajorityMarginsDigraph(bavp)\n\
