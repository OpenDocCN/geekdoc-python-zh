    # 6.5 Random Academic Performance Tableaux


    The RandomAcademicPerformanceTableau class generates performance tableaux with
    random grades for a given number of students in different courses.


    # Generator Directives


    +   - numberOfStudents := Integer (default 10),

    - numberOfCourses := Integer (default 5),

    - weightDistribution := ''equisignificant'' | ''random'' (default),

    - weightScale := 1, 1 - numberOfCourses (default when random)),

    - IntegerWeights := Boolean (True = default),

    - commonScale := (Integer, integer) (0, 20) (default),

    - ndigits := Integer (default 0),

    - WithTypes := Boolean (default False),

    - commonMode := (''triangular'', xm=14, r=0.25) (default),

    - commonThresholds := ''ind'':(0,0), ''pref'':(1,0) (default),

    - missingDataProbability := 0.0 (default),

    - NA := Decimal (default = -999); missing data symbol.


    When Parameter WithTypes is set to True, the students are randomly allocated to
    one of the following four categories—weak (1/6), fair (1/3), good (1/3), and excellent
    (1/3)—in the bracketed proportions. In a default 0–20 grading range, the random
    range of a weak student is 0–10, of a fair student 4–16, of a good student 8–20,
    and of an excellent student 12–20. The random grading generator follows in this
    case a double triangular probability law with mode (xm) equal to the middle of
    the random range and median repartition (r = 0.5) of probability each side of
    the mode.'
