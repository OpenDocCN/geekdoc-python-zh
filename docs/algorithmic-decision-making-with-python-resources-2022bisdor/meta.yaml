    \ `Reverse = True` 标志的相同 `closeTransitive()` 方法，可以轻松地从传递有向图实例中消除所有传递弧。我们在绘制 TransitiveDigraph\
    \ 对象的 HASSE 图时会使用此功能。\n\n## 2.8 强连通分量\n\n由于原始有向图 rdg 是连通的（见上文 showShort() 命令的结果），对称闭包和传递闭包共同操作，必然会产生一个单一的强连通分量，即一个**完全**有向图。有时，将给定有向图中的所有强连通分量合并，并构建所谓的*折叠*有向图是有用的。使用这里的\
