    # 8.1 The Ranking Problem


    Fig. 8.1 *The strict outranking relation* $\succsim$. The relation shown here
    is, for instance, *not transitive*: alternative a8 outranks alternative a6 and
    alternative a6 outranks a4, however, a8 does not outrank a4. Furthermore, alternatives
    a6, a7, and a8 show a cyclic outranking relation


    ![](img/16b49f4bd7a0e5e8eab9001001a6dc21_128_0.png)


    Unfortunately, such crisp median cut CONDORCET digraphs, associated with a given
    strict outranking digraph, only exceptionally model a linear ordering. Usually,
    pairwise majority comparisons do not render a *complete* or, at least, a *transitive*
    partial order. There may even frequently appear *cyclic* outranking situations
    (see Sect. 7.4).


    To discover how *difficult* this ranking problem can get, let us have a look in
    Fig. 8.1 at the corresponding strict outranking digraph *graphviz* drawing.¹


    ```

    >>> gcd.exportGraphViz(fileName=''rankingTutorial'')

    *---- exporting a dot file for GraphViz tools ---------*

    Exporting to rankingTutorial.dot

    dot -Grankdir=BT -Tpng rankingTutorial.dot\n-o rankingTutorial.png

    ```


    The `computeTransitivityDegree()` method computes the *transitivity degree* of
    the outranking digraph gcd shown in Fig. 8.1, i.e. the ratio of the number


    > ¹ The `exportGraphViz()` method is depending on drawing tools from graphviz
    software (https://graphviz.org/).'
  - '[PAGE 129]


    of closed transitive triples—$x \succcurlyeq y$, $y \succcurlyeq z$ and $x \succcurlyeq
    z$—over the number of triples $x \succcurlyeq y$, $y \succcurlyeq z$ (see below
    Lines 3–4).


    ```

    >>> gcd.computeTransitivityDegree(Comments=True)

    Transitivity degree of graph <codual_rel_randomCBperftab>

    triples x>y>z: 78, closed: 38, open: 40

    closed/triples = 0.487

    ```


    With only 49% of the required transitive arcs, the strict outranking digraph gcd
    is hence very far from being transitive; a serious problem when a linear ordering
    of the decision alternatives is looked for.


    The `computeChordlessCircuits()` method, followed by the `showChordlessCircuits()`
    method, can check furthermore whether there appear any cyclic outranking situations.²


    ```

    >>> gcd.computeChordlessCircuits()

    >>> gcd.showChordlessCircuits()

    1 circuit(s).

    *---- Chordless circuits ----*

    1: [''a6'', ''a7'', ''a8''] , credibility : 0.033

    ```


    There is one chordless circuit detected in the given strict outranking digraph
    gcd, namely alternative a6 outranks alternative a7, the latter outranks a8, and
    a8 outranks again alternative a6 (see Fig. 8.1 on the previous page). Any potential
    linear ordering of these three alternatives will, in fact, always contradict somehow
    the given outranking relation.


    Now, several heuristic ranking rules have been proposed for constructing a linear
    ordering which is closest in some specific sense to a given outranking relation.
    The DIGRAPH3 resources provide some of the most common of these ranking rules,
    like the COPELAND, KEMENY, SLATER, KOHLER, and the RANKEDPAIRS ranking rules.


    # 8.2 The COPELAND Ranking


    **Algorithm 8.1 COPELAND ranking rule (Copeland 1951)**

    *in* : median cut strict outranking digraph $G(X, \succcurlyeq_{>0})$,

    *out* : linear ranking of the set $X$ of decision actions.


    +   1. For each alternative $x \in X$, the COPELAND ranking rule computes a score
    resulting from the sum over all non-reflexive pairs $(x, y)$ of the differences
    between the crisp *strict outranking* characteristics $r(x \succcurlyeq_{>0} y)$
    and the crisp *strict outranked* characteristics $r(y \succcurlyeq_{>0} x)$.

    2. The alternatives are ranked in decreasing order of these COPELAND scores; ties,
    the case given, being resolved with a lexicographical rule applied to the identifiers
    of the decision actions.


    > ²The `computeChordlessCircuits()` and `showChordlessCircuits()` methods are
    separate because there are various methods available for enumerating the chordless
    circuits in a digraph (Bisdorff 2010).'
