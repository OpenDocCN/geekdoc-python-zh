  md: '# Chapter 23

    About Split, Comparability, Interval, and Permutation Graphs


    # Contents


    +   23.1 A ‘multiply’ Perfect Graph ........................................................................
    329

    23.2 Who Is the Liar? .........................................................................................
    331

    23.3 Generating Permutation Graphs ..................................................................
    333

    23.4 Recognising Permutation Graphs .................................................................
    336


    **Abstract** The last chapter of this book eventually presents some famous classes
    of perfect graphs, namely comparability, interval, permutation, and split graphs.
    We first present an example of a graph which is at the same time a triangulated,
    a comparability, a split, and a permutation graph. The importance to be an interval
    is illustrated with BERGE’s mystery story. We discuss furthermore the generation
    of permutation graphs and close with how to recognise that a given graph is in
    fact a permutation graph.


    # 23.1 A ‘multiply’ Perfect Graph


    A graph 𝔤 is called:


    +   - BERGE or *perfect* when 𝔤 and its dual -𝔤 both do not contain any chordless
    odd cycles of length greater than 3 (Berge 1963; Chudnovsky et al. 2006).

    - *Triangulated* graph when 𝔤 does not contain any *chordless cycle* of length
    4 and more.


    **Definition 23.1 (Some Perfect Graph Classes)** Following Martin Golumbic (see
    Golumbic 2004, p. 149), we call a given graph 𝔤:


    +   - *Comparability* graph when 𝔤 is *transitively orientable*.

    - *Interval* graph when 𝔤 is *triangulated* and its dual—𝔤 is a *comparability*
    graph.

    - *Permutation* graph when 𝔤 and its dual -𝔤 both are *comparability* graphs.

    - *Split* graph when 𝔤 and its dual -𝔤 both are *triangulated* graphs.'
  merge: -1
  pgno: 349
