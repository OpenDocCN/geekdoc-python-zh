    # 13.3 How to Judge the Quality of a Ranking Result?


    ```

    >>> rdg.showRankingConsensusQuality(theRanking)

    Criterion (weight): correlation

    -----------------------------------

    gtch (0.300): +0.683

    gres (0.300): +0.670

    gcit (0.275): +0.319

    gint (0.075): +0.161

    gind (0.050): +0.106

    Summary:

    Weighted mean marginal correlation (a): +0.511

    Standard deviation (b) : +0.210

    Ranking fairness (a)-(b) : +0.302

    ```


    The THE ranking result is similarly correlated (+0.907, Line 7 in Listing 13.16)
    with the pairwise global robust outranking situations. By its overall weighted
    scoring rule, the THE ranking naturally induces marginal criterion correlations
    that are compatible with the given significance weight preorder (Lines 13–17).
    Notice that the mean marginal correlation is of a similar value (+0.51, Line 19)
    as the robust NETFLOWS ranking. Yet, its standard deviation is slightly higher,
    which leads to a less fairer balancing of the three major ranking criteria.


    To conclude, let us emphasise, that, without any commensurability hypothesis and
    by taking, furthermore, into account, first, the always present more or less imprecision
    of any performance evaluation and, secondly, solely ordinal criteria significance
    weights, we may obtain here with our robust outranking approach a very similar
    ranking result with a slightly better preference modelling quality. A convincing
    heatmap view of the 25 first-ranked Institutions may eventually be generated in
    the default system browser with following command (Fig. 13.4 on the following
    page).


    ```

    >>> rdg.showHTMLPerformanceHeatmap(

    ... WithActionNames=True,\n... outrankingModel=''this'',\n... rankingRule=''NetFlows'',\n...
    ndigits=1,\n... Correlations=True,\n... fromIndex=0,toIndex=25)

    ```


    As an exercise, the reader is invited to try out other robust outranking based
    ranking heuristics. Notice also that we have not challenged in this case study
    the THE provided criteria significance preorder. It would be very interesting
    to consider the five ranking objectives as equally important and, consequently,
    consider the ranking criteria to be equi-significant. Curious to see the ranking
    results under such settings.


    The next case study in Chap. 14 is tackling the absolute quantile rating of the
    student enrolment quality of higher education institutions.'
