    \n```python\n>>> sg.showRelationMap(toIndex=75)\n```\n\n填充率为25%时，这个稀疏优超有向图sg实例的内存占用现在仅为769\
    \ kB，而相应的标准BipolarOutrankingDigraph实例则需要1.7 MB（参见前一页的清单11.3）。\n\n```python\n>>>\
