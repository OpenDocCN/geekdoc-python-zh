    multipartisan supported candidates. We shall therefore compare *approval–disapproval
    versus uninominal plurality* election results when considering a highly divisive
    and partisan political context.


    # 20.5 Favouring Multipartisan Candidates


    In modern democracy, politics are largely structured by political parties and
    activists. Let us so consider an approval–disapproval voting profile `dvp` where
    the random voter behaviour is simulated from two pre-electoral polls concerning
    a political scene with essentially two major highly competing parties, like the
    one existing in the USA.


