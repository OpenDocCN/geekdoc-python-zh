    \ in ]0.80 - 1.00]   -0.57           0.86         -0.57\n```\n\nIn Listing 9.4\
    \ Line 7, alternative a22 verifies indeed positively both sorting conditions only\
    \ for the highest quintile [0.80−1.00] class. Whereas alternatives a44 and a49,\
    \ for instance, weakly verify both sorting conditions for two, respectively, three,\
    \ adjacent quintile classes (Lines 10−11 and 18−20).\n\nQuantiles sorting results,\
    \ indeed, verify always the following properties (Bisdorff 2020):\n\nProperty\
    \ 9.1 (Formal Properties of a Quantiles Sorting Result)\n\n1.  Coherence: Each\
    \ object is sorted into a non-empty subset of adjacent q-tiles classes. An alternative\
    \ that would miss evaluations on all the criteria will be sorted conjointly in\
    \ all q-tiled classes.\n2.  Uniqueness: When r(x ∈ q^k) ≠ 0.0 for k = 1, ...,\
    \ q, the performance x is sorted into exactly one single q-tiled class.\n3.  Separability:\
    \ Computing the sorting result for performance x is independent from the computing\
    \ of the other performances’ sorting results. This property gives access to efficient\
    \ parallel processing of class membership characteristics.\n\nThe q-tiles sorting\
    \ result leaves us hence with more or less overlapping ordered quantile equivalence\
    \ classes. For constructing now a linearly ranked q-tiles partition of X, we may\
    \ apply three strategies:\n\n1.  Average (default): In decreasing lexicographic\
    \ order of the average of the lower and upper quantile limits and the upper quantile\
    \ class limit;\n2.  Optimistic: In decreasing lexicographic order of the upper\
    \ and lower quantile class limits;\n3.  Pessimistic: In decreasing lexicographic\
    \ order of the lower and upper quantile class limits;\n\n## Listing 9.5 Weakly\
    \ ranking the quintiles sorting result\n\n```\n>>> qs.showQuantileOrdering(strategy='average')\n\
    ]0.80-1.00]  : ['a22']\n]0.60-0.80]  : ['a03','a07','a11','a14','a20','a29',\n\
