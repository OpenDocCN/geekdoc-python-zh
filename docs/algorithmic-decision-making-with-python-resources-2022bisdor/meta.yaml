    \ we are lucky.\n\n**Listing 12.8** Computing the 90%-confident best choice recommendation\n\
    \n```\n>>> cdg.computeCondorcetWinners()\n['I-FHK']\n>>> cdg.showBestChoiceRecommendation()\n\
    ***************************\nBest choice recommendation(s) (BCR)\n(in decreasing\
    \ order of determinateness)\nCredibility domain: [-1.00,1.00]\n=== >> potential\
    \ best choice(s)\n```"
