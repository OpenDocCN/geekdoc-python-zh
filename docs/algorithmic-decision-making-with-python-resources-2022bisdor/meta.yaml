- md: "## 5.2 Editing the Decision Alternatives\n\nDecision alternatives are stored\
    \ in attribute `actions` under the `OrderedDict` format. The `OrderedDict` object\
    \ keeps this initial order when iterating over the decision alternatives.¹\n\n\
    Required attributes of each decision alternative, besides the object identifier,²\
    \ are: `shortName`, `name`, and `comment` (see Lines 15–17 in Listing 5.1 on page\
    \ 55). The `shortName` attribute is essentially used when showing the performance\
    \ tableau or the performance heatmap in a browser view.\n\nThe random performance\
    \ tableau models, introduced in Chap. 6, use the `actions` attribute for storing\
    \ special features of the decision alternatives. The *Cost-Benefit* model, for\
    \ instance, uses a `type` attribute for distinguishing between *advantageous*,\
    \ *neutral*, and *cheap* alternatives (see Sect. 6.3). The *3-Objectives* model\
    \ keeps a detailed record of the performance profile per decision objective and\
    \ the corresponding random generators per performance criteria as shown in Listing\
    \ 5.2.\n\n**Listing 5.2** Example of decision alternative description\n\n```python\n\
    >>> from randomPerfTabs import \\\n...             Random3ObjectivesPerformanceTableau\n\
    >>> t = Random3ObjectivesPerformanceTableau()\n>>> t.actions\nOrderedDict([\n\
    \    ('p01', {'shortName': 'p01',\n             'name': 'action p01 Eco- Soc-\
    \ Env+',\n             'comment': 'random public policy',\n             'Eco':\
    \ 'fair',\n             'Soc': 'weak',\n             'Env': 'good',\n        \
    \     'profile': {'Eco':'fair',\n                         'Soc':'weak',\n    \
    \                     'Env':'good'},\n             'generators': {'ec01': ('triangular',\
    \ 50.0, 0.5),\n                            'so02': ('triangular', 30.0, 0.5),\n\
    \                            'en03': ('triangular', 70.0, 0.5),\n            \
    \                ...\n                            },\n             }\n    ),\n\
    \    ...\n    ])\n```\n\n> ¹ See the `OrderedDict` description in the Python documentation\
    \ (Python Software Foundation 2021).\n\n² Mind that `graphviz` drawings require\
    \ node identifier strings without any special characters like `_` or `/`.\n\n\
    The second section of the template file concerns the decision *objectives*.\n\n\
    ## 5.3 Editing the Decision Objectives\n\nThe minimal required attributes of the\
    \ ordered decision *objectives* dictionary, besides the individual objective identifiers,\
    \ are name, comment, criteria: the list of significant performance criteria, and\
    \ weight: the importance of the decision objective. The latter attribute contains\
    \ the sum of the *significance* weights of the objective's criteria list (see\
    \ Lines 27–33 in Listing 5.1 on page 55).\n\nThe *objectives* attribute is methodologically\
    \ useful for specifying the performance criteria significance in building decision\
    \ recommendations. Mostly, we assume indeed that decision objectives are all equally\
    \ important and the performance criteria are equi-significant per objective. This\
    \ is, for instance, the default setting in the random *3-Objectives* performance\
    \ tableau model.\n\n**Listing 5.3** Example of decision objectives' description\n\
    \n```python\n>>> # t = Random3ObjectivesPerformanceTableau()\n>>> t.objectives\n\
    OrderedDict([\n('Eco',\n {'name': 'Economical aspect',\n  'comment': 'Random3ObjectivesPerformanceTableau\
    \ generated',\n  'criteria': ['ec01', 'ec06', 'ec09'],\n  'weight': Decimal('48')}),\n\
    ('Soc',\n {'name': 'Societal aspect',\n  'comment': 'Random3ObjectivesPerformanceTableau\
    \ generated',\n  'criteria': ['so02', 'so12'],\n  'weight': Decimal('48')}),\n\
    ('Env',\n {'name': 'Environmental aspect',\n  'comment': 'Random3ObjectivesPerformanceTableau\
    \ generated',\n  'criteria': ['en03', 'en04', 'en05', 'en07',\n              \
    \ 'en08', 'en10', 'en11', 'en13'],\n  'weight': Decimal('48')})\n])\n```\n\nThe\
    \ importance weight sums up to 48 for each one of the three example decision objectives\
    \ shown in Listing 5.3 on the facing page so that the significance weight of each\
    \ one of the 3 economic criteria is set to 16, of both societal criteria is set\
    \ to 24, and of each one of the 6 environmental criteria is set to 8 (see Lines\
    \ 8, 13 and 19).\n\nMind that the objectives attribute is always present in a\
    \ Performance-Tableau object instance, even when empty. In this case, we consider\
    \ that each performance criterion canonically represents its own decision objective.\
    \ The criterion significance weight equals in this case the corresponding decision\
    \ objective's importance weight.\n\nThe third section of the template file concerns\
    \ now the performance criteria.\n\n## 5.4 Editing the Family of Performance Criteria\n\
    \nIn order to assess how well each potential decision alternative is satisfying\
    \ a given decision objective, we need performance criteria, i.e. decimal-valued\
    \ evaluation functions gathered in an ordered criteria dictionary. The required\
    \ attributes (see Listing 5.4), besides the criteria identifiers, are the usual\
    \ shortName, name, and comment. Specific for a criterion is furthermore the objective\
    \ reference, the significance weight, the evaluation scale (minimum and maximum\
    \ performance values), the preferenceDirection ('max' or 'min'), and the performance\
    \ discrimination thresholds attributes.\n\n**Listing 5.4** Example of performance\
    \ criteria description\n\n```python\ncriteria = OrderedDict([\n('g1', {\n 'shortName':\
    \ 'crit1',\n 'name': \"performance criteria 1\",\n 'comment': 'measurement scale\
    \ type and unit',\n 'objective': 'obj1',\n 'weight': Decimal('3'),\n 'scale':\
    \ (Decimal('0.0'), Decimal('100.0')),\n 'preferenceDirection': 'max',\n 'thresholds':\
    \ {'ind': (Decimal('2.50'), Decimal('0.0')),\n                'pref': (Decimal('5.00'),\
    \ Decimal('0.0')),\n                'veto': (Decimal('60.00'), Decimal('0.0'))\n\
    \                },\n }),\n...\n...])\n```\n\nIn our bipolar-valued outranking\
    \ approach, all performance criteria implement *decimal-valued* evaluation functions,\
    \ where preferences are either *increasing* or *decreasing* with measured performances.\
    \ In order to model a *coherent* performance tableau, the family of decision criteria\
    \ must satisfy two methodological requirements:\n\n1.  *Independence*: Each decision\
    \ criterion implements an evaluation that is *functionally independent* of the\
    \ evaluation of the other decision criteria, i.e. the performance evaluated on\
    \ one of the criteria does not *constrain* in any sense the performance evaluated\
    \ on any other criterion.\n2.  *Non-redundancy*: Each performance criterion is\
    \ only *significant* for a *single* decision objective.\n\nFor taking into account\
    \ any, usually *unavoidable, imprecision* of the performance evaluation procedures,\
    \ we may specify three performance *discrimination thresholds*: an *indifference*\
    \ (*ind*), a *preference* (*pref*), and a *considerable performance difference*\
    \ (*veto*) threshold (see Listing 5.4 on the preceding page Lines 10–12). The\
    \ left decimal number of a threshold description tuple indicates a *constant*\
    \ part, whereas the right decimal number indicates a *proportional* part.\n\n\
    On the template performance criterion g1, shown in Listing 5.4 on the previous\
    \ page, we observe, for instance, an evaluation scale from 0.0 to 100.0 with a\
    \ constant *indifference* threshold of 2.5, a constant *preference* threshold\
    \ of 5.0, and a constant *considerable performance difference* threshold of 60.0.\
    \ The latter threshold will trigger, the case given, a *polarisation* of the outranking\
    \ statement (Bisdorff 2013).\n\nIn a random *Cost-Benefit* performance tableau\
    \ model we may obtain by default the following description of a cardinal *Costs*\
    \ criterion:\n\n**Listing 5.5** Example of cardinal *Costs* criterion\n\n```python\n\
    >>> from randomPerfTabs import \\\n...                 RandomCBPerformanceTableau\n\
    >>> tcb = RandomCBPerformanceTableau()\n>>> tcb.showObjectives()\n*------- decision\
    \ objectives -------*\nC: Costs\n  c1 random cardinal cost criterion 6\n  Total\
    \ weight: 6.00 (1 criteria)\n  ...\n...\n>>> tcb.criteria\nOrderedDict([\n  ('c1',\
    \ {'preferenceDirection': 'min',\n          'scaleType': 'cardinal',\n       \
    \   'objective': 'C',\n          'shortName': 'c1',\n          'name': 'random\
    \ cardinal cost criterion',\n          'scale': (0.0, 100.0),\n          'weight':\
    \ Decimal('6'),\n          'randomMode': ['triangular', 50.0, 0.5],\n        \
    \  'comment': 'Evaluation generator: triangular law ...',\n```"
