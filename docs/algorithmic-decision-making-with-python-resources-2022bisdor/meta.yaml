    # 11.5 Quantiles Ranking of Big Performance Tableaux


    The `boostedRanking` attribute of the sparse outranking digraph `sg` contains
    the global linear ranking of the 100 decision alternatives. This ranking is computed
    by locally ranking the individual 6 components with the COPELAND rule (see Listing
