  md: '# 17.6 Solving Kernel Equation Systems


    Let $G(X, R)$ be a crisp irreflexive digraph defined on a finite set $X$ of nodes
    and where $R$ is the corresponding $\{-1, +1\}$-valued adjacency matrix. Let $Y$
    be the $\{-1, +1\}$-valued membership characteristic (row) vector of a choice
    in $X$.

    When $Y$ satisfies the following equation system:

    $$Y \circ R = -Y, \tag{17.1}$$

    where for all $x$ in $X$,

    $$(Y \circ R)(x) = \max_{y \in X, x \neq y} (\min(Y(x), R(x, y))), \tag{17.2}$$

    then $Y$ characterises an *initial kernel* (Bisdorff 2006; Bisdorff et al. 2006).

    When transposing now the membership characteristic vector $Y$ into a column vector
    $Y^t$, the following equation system: $R \circ Y^t = -Y^t$ makes $Y^t$ similarly
    characterise a *terminal kernel*.

    Let us verify this result in Listing 17.18 on a tiny random digraph.


    **Listing 17.18** Verifying the kernel equation system on a tiny random digraph


    ```

    1 >>> from digraphs import RandomDigraph

    2 >>> g = RandomDigraph(order=3,seed=1)

    3 >>> g.showRelationTable()

    4   * ---- Relation Table ----

    5     R  | ''a1''  ''a2''  ''a3''

    6   -----|-------------------

    7   ''a1'' |  -1    +1    -1

    8   ''a2'' |  -1    -1    +1

    9   ''a3'' |  +1    +1    -1

    10 >>> g.showPreKernels()

    11   *--- Computing preKernels ---*

    12    Dominant preKernels :

    13     [''a3'']

