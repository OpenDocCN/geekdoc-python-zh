    # 19.3 Computing the Stability Denotation of Outranking Situations


    Stability levels ±4 and ±3 are, the case given, easy to detect. Detecting a stability
    level ±2 is far less obvious. Now, it is precisely again the bipolar-valued epistemic
    characteristic domain that will give us a way to implement an effective test for
    stability level +2 and −2 (Bisdorff 2004a,b).


    Let us consider the significance equivalence classes we observe in the given weights
    preorder. Here, we observe three weight classes: 6, 8, and 12, in an increasing
    order (see Listing 19.2 on page 262). In the pairwise comparisons, shown above,
    these equivalence classes may appear positively or negatively, besides the indeterminate
    significance of value 0.00. We thus get the following ordered bipolar list of
    significance weights: W = [−12, −8, −6, 0, 6, 8, 12].


    In all the pairwise marginal comparisons shown in the previous section, we may
    observe that each one of the nine criteria assigns one precise item out of this
    list W. Let us denote by q[i] the number of criteria assigning item W[i] and Q[i]
    the cumulative sums of these q[i] counts, where i is an index in the range of
    the length of list W.'
