    ## Contents


    - 11.1 C-compiled Python Modules

    - 11.2 Big Data Performance Tableaux

    - 11.3 C-implemented Integer-Valued Outranking Digraphs

    - 11.4 The Sparse Implementation of Big Outranking Digraphs

    - 11.5 Quantiles Ranking of Big Performance Tableaux

    - 11.6 HPC Quantiles Ranking Records


    **Abstract** The sparse outranking digraph, introduced in Chap. 9, is suitable
    for tackling the ranking of big multiple-criteria performance tableaux with thousands
    or millions of records. To effectively compute rankings from performance tableaux
    of these sizes, we propose in this chapter a collection of C-compiled and optimised
    DIGRAPH3 modules that may be run on HPC equipment as available, for instance,
    at the University of Luxembourg.


    ## 11.1 C-compiled Python Modules


    The DIGRAPH3 collection provides cythonized,¹ i.e. C-compiled and optimised versions
    of the main python modules for tackling multiple-criteria decision problems facing
    very large sets of decision alternatives ( >10,000 ). Such problems appear usually
    with a combinatorial organisation of the potential decision alternatives, as is
    frequently the case in bioinformatics, for instance. If HPC facilities with nodes
    supporting numerous cores (>20) and big RAM (>50 GB) are available, ranking up
    to several millions of alternatives becomes effectively tractable (Bisdorf 2016).


    Four cythonized DIGRAPH3 modules, prefixed with the letter c and taking a pyx
    extension, are provided with their corresponding setup tools in the cython directory
    of the DIGRAPH3 resources, namely:


    > ¹ CYTHON C-extension for Python, https://cython.org/.


    cRandPerfTabs.pyx,

    cIntegerOutrankingDigraphs.pyx,

    cIntegerSortingDigraphs.pyx, and

    cSparseIntegerOutrankingDigraphs.pyx.


    Their automatic compilation and installation, alongside the standard DIGRAPH3
    python3 modules, requires the *cython* compiler:

    ...$ python3 -m pip install cython

    and a C compiler:

    ...$ sudo apt install gcc on Ubuntu, for instance.

    These cythonized modules, specifically designed for being run on HPC clusters,
    require the Unix *forking* start method of subprocesses and therefore, due to
    forking problems on Mac OS platforms, may only operate safely on Linux platforms
    (see start methods of the [Python multiprocessing library](https://docs.python.org/3/library/multiprocessing.html)).


    ## 11.2 Big Data Performance Tableaux


    In order to efficiently type the C variables, the `cRandPerfTabs` module provides
    the root `cPerformanceTableau` class, but, with *integer* action keys, *float*
    performance evaluations, *integer* criteria weights and *float* discrimination
    thresholds. And, to limit as much as possible memory occupation of class instances,
    all the usual verbose comments are dropped from the description of the *actions*
    and *criteria* dictionaries. A random instance may be generated with the `cRandomPerformanceTableau`
    class from the `cRandPerfTabs` module:


