    ## 6.4 Random Three Objectives Performance Tableaux\n\nThe `randomPerfTabs` module\
    \ provides a `Random3ObjectivesPerformanceTableau` class for generating random\
    \ tableaux concerning public policies evaluated with respect to three decision\
    \ objectives taking, respectively, into account *economical*, *societal* as well\
    \ as *environmental* aspects. Each potential public policy is qualified randomly\
    \ as performing *weakly* (−), *fairly* (~) or *well* (+) with respect to each\
