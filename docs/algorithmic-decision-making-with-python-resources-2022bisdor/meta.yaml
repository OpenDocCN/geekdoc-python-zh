    c06 : 19.91%   | c11 : 22.94%   | c06 : 15.00%\nc07 : 14.27%   | c08 : 15.65%\
    \   | c11 : 13.08%\nc03 : 10.02%   | c04 : 15.07%   | c08 : 09.01%\nc13 : 08.39%\
    \   | c06 : 13.40%   | c07 : 08.79%\nc15 : 08.39%   | c03 : 06.49%   | c03 : 07.44%\n\
    c11 : 06.70%   | c09 : 05.63%   | c04 : 07.11%\nc01 : 06.17%   | c07 : 05.10%\
    \   | c01 : 05.06%\nc12 : 04.81%   | c01 : 05.09%   | c13 : 05.04%\nc08 : 04.75%\
    \   | c12 : 03.43%   | c15 : 04.23%\nc10 : 04.66%   | c13 : 02.71%   | c12 : 03.71%\n\
    c14 : 04.42%   | c14 : 02.70%   | c14 : 03.21%\nc05 : 04.01%   | c15 : 00.86%\
    \   | c09 : 03.10%\nc09 : 01.40%   | c10 : 00.44%   | c10 : 02.34%\nc04 : 01.18%\
    \   | c05 : 00.29%   | c05 : 01.97%\nc02 : 00.90%   | c02 : 00.21%   | c02 : 00.51%\n\
    ```\n\nIn this example (see above Lines 21 and following), we obtain 460 Party-1\
    \ supporters (46%), 436 Party-2 supporters (43.6%), and 104 other voters (10.4%).\
    \ Favourite candidates of Party-1 supporters, with more than 10%, appear to be\
    \ c06 (19.91%), c07 (14.27%), and c03 (10.02%). Whereas for Party-2 supporters,\
    \ favourite candidates appear to be c11 (22.94%), followed by c08 (15.65%), c04\
    \ (15.07%) and c06 (13.4%). Being *first* choice for Party-1 supporters and *fourth*\
    \ choice for Party-2 supporters, this candidate c06 is a natural candidate for\
    \ clearly winning this election game (see Listing 7.11).\n\n## Listing 7.11 The\
    \ uninominal and BORDA election winner\n\n```\n1 >>> lvp.computeSimpleMajorityWinner()\n\
    2 ['c06']\n3 >>> lvp.computeInstantRunoffWinner()\n4 ['c06']\n5 >>> lvp.computeBordaWinners()\n\
    6 ['c06']\n```\n\nIs candidate c06 also a CONDORCET winner? To verify, we start\
    \ by creating the corresponding *majority margins* digraph *mmdg* with the help\
    \ of the MajorityMarginsDigraph class. The created digraph instance contains 15\
    \ *actions*—the candidates—and 104 *oriented arcs*—the *positive* majority margins—(see\
    \ Listing 7.12 Lines 7–8).\n\n## Listing 7.12 A majority margins digraph constructed\
    \ from a linear voting profile\n\n```\n1 >>> from votingProfiles import MajorityMarginsDigraph\n\
    2 >>> mmdg = MajorityMarginsDigraph(lvp)\n3 >>> mmdg\n4 *------- Digraph instance\
    \ description ------*\n5  Instance class      : MajorityMarginsDigraph\n6  Instance\
    \ name       : rel_randLinearProfile\n7  Digraph Order       : 15\n8  Digraph\
    \ Size        : 104\n9  Valuation domain    : [-1000.00;1000.00]\n10  Determinateness\
    \ (%) : 67.08\n11  Attributes          : ['name', 'actions', 'voters',\n12   \
    \                      'ballot', 'valuationdomain',\n13                      \
    \   'relation', 'order',\n14                         'gamma', 'notGamma']\n```\n\
    \nThe showHTMLRelationTable() method visualises the resulting pairwise majority\
    \ margins by showing the HTML formatted version of the *mmdg* relation table in\
    \ a browser view.\n\n```\n1 >>> mmdg.showHTMLRelationTable(\n2 ...         tableTitle='Pairwise\
    \ majority margins',\n3 ...         relationName='M(x,y)')\n```\n\nA complete\
    \ light green *row* in Fig. 7.4 on the following page reveals a CONDORCET winner,\
    \ whereas a complete light green *column* reveals a CONDORCET loser. We recover\
    \ again candidate c06 as CONDORCET winner,⁴ whereas the obvious CONDORCET loser\
    \ is here candidate c02, the candidate with the lowest support in both parties\
    \ (see Listing 7.10 on page 92 Line 43).\n\nWith a same bipolar first-ranked and\
    \ last ranked selection procedure, we may weakly rank the candidates (with possible\
    \ ties) by iterating these first-ranked and last ranked choices among the remaining\
    \ candidates (Bisdorff 1999).\n\nBefore showing the ranking-by-choosing result,\
    \ we have to, first, compute the iterated bipolar selection procedure (see Listing\
    \ 7.13).\n\n## Listing 7.13 Ranking by iterating choosing the first and last remaining\
    \ candidates\n\n```\n1 >>> cdg.showRankingByChoosing()\n2 Ranking by Choosing\
    \ and Rejecting\n3   1st best ranked ['c06']\n4     2nd best ranked ['c11']\n\
    5       3rd best ranked ['c07','c08']\n6         4th best ranked ['c03']\n7  \
    \         5th best ranked ['c01']\n8             6th best ranked ['c13']\n9  \
    \             7th first ranked ['c04']\n10              7th last ranked ['c12']\n\
    11            6th last ranked ['c14']\n12          5th last ranked ['c15']\n13\
    \        4th last ranked ['c09']\n14      3rd last ranked ['c10']\n15    2nd last\
    \ ranked ['c05']\n16  1st last ranked ['c02']\n```\n\n> ⁴ The concept of CONDORCET\
    \ winner—a generalisation of absolute majority winners—proposed by CONDORCET in\
    \ 1784, is an early historical example of initial digraph kernel (see Chap. 17).\n\
    \nThe first selection concerns c06 (first) and c02 (last), followed by c11 (first)\
    \ opposed to c05 (last), and so on, until there remains at iteration step 7 a\
    \ last pair of candidates, namely [c04, c12] (see Lines 9–10).\n\nNotice furthermore\
    \ the 3rd-best ranked candidates at iteration step 3 (see Line 5), namely the\
    \ pair (c07, c08). Both candidates represent indeed conjointly the *3rd best ranked*\
    \ choice. We obtain hence a *weak ranking*, i.e. a ranking with a tie.\n\nLet\
    \ us mention that the *instant runoff* procedure, we used before when operated\
    \ with a Comments=True parameter setting, will deliver a more or less similar\
    \ *reversed linear ordering-by-rejecting* result, namely [c02, c10, c14, c05,\
    \ c09, c13, c12, c15, c04, c01, c08, c03, c07, c11, c06], ordered from the *last*\
    \ to the *first* choice.\n\nRemarkable about both these *ranking-by-choosing*\
    \ or *ordering-by-rejecting* results is the fact that the random voting behaviour,\
    \ simulated here with the help of two discrete random variables,⁵ Defined, respectively,\
    \ by the two random party polls, is rendering a ranking that is more or less in\
    \ accordance with the simulated balance of the polls: Party-1 supporters : 460;\
    \ Party-2 supporters: 436 (see Listing 7.10 on page 92 Lines 29–43 third column).\
    \ Despite a random voting behaviour per voter, the given polls apparently show\
    \ a *very strong incidence* on the eventual election result. In order to avoid\
    \ any manipulation of the election outcome, public media are therefore in some\
    \ countries not allowed to publish polls during the last weeks before a general\
    \ election.\n\nMind that the specific *ranking-by-choosing* procedure, we use\
    \ here on the majority margins digraph, operates the selection procedure by extracting\
    \ at each step *initial* and *terminal* prekernels, i.e. difficult operational\
    \ problems (see Chap. 17 and Bisdorff 1999); A technique that does not allow in\
    \ general to tackle voting profiles with much more than 30 candidates.\n\nNext\
    \ Chap. 8 on multiple incommensurable criteria ranking methods presents more methods\
    \ and tools for ranking from pairwise majority margins when a larger number of\
    \ potential candidates or decision alternatives is given.\n\n## References\n\n\
    Bisdorff R (1999) Bipolar ranking from pairwise fuzzy outrankings. Belg J Oper\
    \ Res Stat Comput Sci 37(4):379–387. http://hdl.handle.net/10993/38738\n\nBisdorff\
    \ R (2020a) Lecture 2: Who wins the election? In: Lectures of the algorithmic\
