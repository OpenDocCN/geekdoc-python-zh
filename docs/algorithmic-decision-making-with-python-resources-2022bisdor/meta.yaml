    ```


    In Fig. 22.1, one may notice that a tree graph of order $n > 2$ always contains
    $n-1$ edges (see Lines 7 and 8 in Listing 22.1 on the preceding page) and its
    structure is entirely characterised by a corresponding PRÜFER code, i.e. a list
    of vertices keys of length $n-2$. See, for instance, in Line 15 the code [''v3'',
    ''v8'', ''v8'', ''v3'', ''v7'', ''v6'', ''v7''] corresponding to our sample tree
    graph rt.


    Each position of the code indicates the parent of the remaining leaf with the
    smallest vertex label. Vertex v3 is thus the parent of v1 and we drop leaf v1,
    v8 is now the parent of leaf v2 and we drop v2, vertex v8 is again the parent
    of leaf v4 and we drop v4, vertex v3 is the parent of leaf v5 and we drop v5,
    v7 is now the parent of leaf v3 and we may drop v3, v6 becomes the parent of leaf
    v8 and we drop v8, and v7 becomes the parent of leaf v6 and we may drop v6. The
    two eventually remaining vertices, v7 and v9, give the last link in the reconstructed
    tree (Barthélémy and Guenoche 1991).


    It is as well possible to, first, generate a random PRÜFER code of length $n-2$
    from a set of $n$ vertices and then construct the corresponding tree of order
    $n$ by reversing the procedure illustrated above (see Listing 22.2 on the next
    page). The resulting tree graph is shown in Fig. 22.2 on the facing page.


    **Fig. 22.1** *Random tree graph instance of order 9. One may distinguish vertices
    like v1, v2, v4, v5, or v9 of degree 1, called the leaves of the tree, and vertices
    like v3, v6, v7, or v8 of degree 2 or more, called the nodes of the tree*


