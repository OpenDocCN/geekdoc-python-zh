    \ and, respectively, d2, we may hence compute as follows a majority margin M(d1\
    \ ⇔ d2) between equivalently and not equivalently oriented irreflexive pairs (x,\
    \ y):\n\nM(d1 ⇔ d2) =\n∑_{(x≠y)} [min(max(−r(x d1 y), r(x d2 y)), max(−r(x d2\
    \ y), r(x d1 y)))].\n(16.2)\n\nM(d1 ⇔ d2) is thus given by the sum of the non-reflexive\
    \ terms of the relation table of eqd, the relational equivalence digraph computed\
    \ above (see Listing 16.5). In the crisp case, M(d1 ⇔ d2) is normalised with the\
    \ maximum number of possible irreflexive pairs, namely n(n − 1). In the extended\
    \ r-valued case, the maximal possible equivalence majority margin M corresponds\
    \ to the sum D of the conjoint determinations of $(x \\d1 y)$ and $(x \\d2 y)$\
    \ (see Bisdorff 2012):\n\n$$D = \\sum_{x \\neq y} \\min \\left[ abs(r(x \\d1 y)),\
    \ abs(r(x \\d2 y)) \\right], \\quad (16.3)$$\n\nand we obtain hence in the general\
    \ $r$-valued case:\n\n$$\\tau(\\d1, \\d2) = \\frac{M(\\d1 \\Leftrightarrow \\\
    d2)}{D} . \\quad (16.4)$$\n\n$\\tau(\\d1, \\d2)$ corresponds so to the classical\
    \ ordinal correlation index, yet restricted to the conjointly determined parts\
    \ of the given digraphs $\\d1$ and $\\d2$. In the limit case of two crisp linear\
    \ orders, $D$ equals $n(n-1)$, i.e. the number of irreflexive pairs, and we recover\
    \ KENDALL's original *tau* index definition.\n\nIt is worthwhile noticing that\
    \ the ordinal correlation index $\\tau(\\d1, \\d2)$ one obtains above corresponds\
    \ in fact to the ratio of:\n\n- $r(\\d1 \\Leftrightarrow \\d2) = \\frac{M(\\d1\
    \ \\Leftrightarrow \\d2)}{n(n-1)}$: the normalised majority margin of the pairwise\
    \ *relational* equivalence statements, also called *valued ordinal correlation*.\n\
    - $d = \\frac{D}{n(n-1)}$: the normalised epistemic determination of the corresponding\
    \ pairwise relational equivalence statements, in fact the *determinateness* of\
    \ the relational equivalence digraph.\n\nThe epistemic determination effect is\
    \ thus successfully *out-factored* from the ordinal correlation effect. With completely\
    \ determined relations, $\\tau(\\d1, \\d2) = r(\\d1 \\Leftrightarrow \\d2)$. The\
    \ ordinal correlation with a completely indeterminate digraph, i.e. when $D =\
    \ 0$, is set by convention to the indeterminate correlation value 0.0. With uniformly\
    \ chosen random $r$-valued digraphs, the expected $\\tau$ index is 0.0, denoting\
    \ in fact an indeterminate relational equivalence. The corresponding expected\
    \ normalised determination $d$ is about 0.333 (see Bisdorff (2012)).\n\nWe verify\
    \ Eq. 16.4 below with the help of the equivalence digraph eqd computed in Listing\
    \ 16.5 on the previous page.\n\nListing 16.6 Computing the ordinal correlation\
    \ index from the equivalence digraph\n\n```\n>>> # eqd = EquivalenceDigraph(d1,d2)\n\
    >>> M = Decimal('0'); D = Decimal('0')\n>>> n2 = eqd.order*(eqd.order - 1)\n>>>\
    \ for x in eqd.actions:\n...     for y in eqd.actions:\n...         M += eqd.relation[x][y]\n\
    ...         D += abs(eqd.relation[x][y])\n>>> print('r(rd1<=>rd2) = %+.3f, d =\
    \ %.3f, tau = %+.3f' %\\n        (M/n2,D/n2,M/D))\nr(rd1<=>rd2) = +0.026, d =\
    \ 0.356, tau = +0.073\n```"
