    Potential decision alternatives, in our case here, are the 75 THE best-ranked
    CS Departments in 2016, all of them located at world renowned Institutions, like
    California Institute of Technology, Swiss Federal Institute of Technology Zurich,
    Technical University München, University of Oxford or the National University
    of Singapore (see Listing 13.2 below).


    Instead of using prefigured DIGRAPH3 show . . . () methods, readily available
    for inspecting PerformanceTableau instances, Listing 13.2 illustrates how to write
    small Python scripts for printing out its content.


    # Listing 13.2 Printing the CS Departments


