    ...$ sudo apt install gcc（例如在Ubuntu上）。

    这些cython化模块专为在HPC集群上运行而设计，需要Unix的子进程*forking*启动方法，因此，由于Mac OS平台上的forking问题，只能在Linux平台上安全运行（参见[Python
    multiprocessing库](https://docs.python.org/3/library/multiprocessing.html)的启动方法）。


