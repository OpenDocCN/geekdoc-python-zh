    \ *常量* 部分，而右侧十进制数表示 *比例* 部分。\n\n在清单5.4所示的模板性能标准 g1 上，我们观察到，例如，评估量表从0.0到100.0，具有2.5的常量\
    \ *无差异* 阈值、5.0的常量 *偏好* 阈值和60.0的常量 *显著性能差异* 阈值。在给定情况下，后一个阈值将触发偏好排序陈述的 *极化*（Bisdorff\
    \ 2013）。\n\n在随机 *成本-效益* 性能矩阵模型中，我们默认可能获得以下基数 *成本* 标准的描述：\n\n**清单5.5** 基数 *成本*\
    \ 标准示例\n\n```python\n>>> from randomPerfTabs import \\\n...                 RandomCBPerformanceTableau\n\
    >>> tcb = RandomCBPerformanceTableau()\n>>> tcb.showObjectives()\n*------- decision\
    \ objectives -------*\nC: Costs\n  c1 random cardinal cost criterion 6\n  Total\
    \ weight: 6.00 (1 criteria)\n  ...\n...\n>>> tcb.criteria\nOrderedDict([\n  ('c1',\
    \ {'preferenceDirection': 'min',\n          'scaleType': 'cardinal',\n       \
