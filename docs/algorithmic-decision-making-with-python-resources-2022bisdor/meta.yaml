    In the resulting digraph instance `rdg` (see Line 9 in Listing **13.7**), we observe
    2993 such robust pairwise outranking situations validated with a mean significance
    of 78% (Line 10). Unfortunately, in the case here, they do not deliver any complete
    linear ranking. The robust outranking digraph `rdg` contains 102 incomparability
    situations (3.7%, Line 15); nearly half of its transitive closure is missing (46.1%,
    Line 19) and 12% of the positive outranking situations correspond in fact to symmetric
    indifference situations (Line 23).

    Worse even, the digraph `rdg` admits a really high number of outranking circuits.⁶


    **Listing 13.8** Inspecting outranking circuits


    ```

    1 >>> rdg.computeChordlessCircuits()

    2 >>> rdg.showChordlessCircuits()

    ```


    > ⁶ The `computeChordlessCircuits()` and `showChordlessCircuits()` methods are
    separate because there are various methods available for enumerating the chordless
    circuits in a digraph (Bisdorff 2010).'
