    \ outlook* (staff, students, and research, 7.5%), and *Industry income* (innovation,\
    \ 5%). To illustrate our DIGRAPH3 programming resources, we shall first have a\
    \ look into the THE multiple-criteria ranking data with short Python scripts.\
