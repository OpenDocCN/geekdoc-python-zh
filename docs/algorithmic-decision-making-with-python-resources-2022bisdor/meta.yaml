    # 2.7 Symmetric and Transitive Closures


    Symmetric and transitive closures, by default in-site methods, are also available
    (see Fig. 2.5). Note that it is a good idea, before going ahead with these in-site
    operations, that irreversibly modifies the original `rdg` object, to previously
    make a backup version of `rdg`. The simplest storage method, always provided by
    the generic `Digraph.save()` method, writes out in a named file the Python content
    of the Digraph object in string representation (see Sect. 1.3).


    **Listing 2.9** Symmetric and transitive closures


    ```

    1 >>> rdg.save(''tutRandValDigraph'')

    2 >>> rdg.closeSymmetric(InSite=True)

    3 >>> rdg.closeTransitive(InSite=True)

    4 >>> rdg.exportGraphViz(''symTransClosure'')

    ```


    The `closeSymmetric()` method (see Listing 2.9 Line 2), of complexity $O(n^2)$
    where $n$ denotes the digraph''s order, changes, on the one hand, all single pairwise
    links it may detect into double links by operating a disjunction of the pairwise
    relations. On the other hand, the `closeTransitive()` method (see'
