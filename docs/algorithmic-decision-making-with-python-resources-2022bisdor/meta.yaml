- md: "## 13.2 Ranking with Multiple Criteria of Ordinal Significance\n\nLet us, first,\
    \ have a critical look in Fig. 13.1 at the THE performance criteria.\n\n```python\n\
    >>> cspt.showHTMLCriteria(Sorted=False)\n```\n\nConsidering a very likely imprecision\
    \ of the performance evaluation procedure, followed by some potential violation\
    \ of uniform distributed quantile classes, we assume here that a performance quantile\
    \ difference of up to 2.5% is *insignificant*, whereas a difference of 5% and\
    \ more warrants a *clearly better*, respectively, *clearly less good* performance.\
    \ With quantiles 94%, respectively, 87.3%, Oxford's CS teaching environment, for\
    \ instance, is thus clearly better evaluated than that of the MIT (see Listing\
    \ 13.5 on page 169 Lines 27–28). We shall furthermore assume that a *considerable*\
    \ performance quantile difference of 60%, observed on the three major ranking\
    \ criteria: *Teaching*, *Research*, and *Citations*, will trigger the polarisation\
    \ of pairwise outranking, respectively, outranked situations (Bisdorff 2013).\n\
    \nThe effect these performance discrimination thresholds induce on the outranking\
    \ modelling can be inspected with the `showCriteria()` method.\n\n**Listing 13.6**\
    \ Inspecting the performance discrimination thresholds\n\n```python\n>>> cspt.showCriteria()\n\
    *---- criteria ----*\n  gtch 'Teaching'\n    Scale = (Decimal('0.00'), Decimal('100.00'))\n\
    \    Weight = 0.300\n    Threshold ind : 2.50 + 0.00x ; percentile: 8.07\n   \
    \ Threshold pref : 5.00 + 0.00x ; percentile: 15.75\n    Threshold veto : 60.00\
    \ + 0.00x ; percentile: 99.75\n  gres 'Research'\n    Scale = (Decimal('0.00'),\
    \ Decimal('100.00'))\n    Weight = 0.300\n    Threshold ind : 2.50 + 0.00x ; percentile:\
    \ 7.86\n    Threshold pref : 5.00 + 0.00x ; percentile: 16.14\n    Threshold veto\
    \ : 60.00 + 0.00x ; percentile: 99.21\n  gcit 'Citations'\n    Scale = (Decimal('0.00'),\
    \ Decimal('100.00'))\n    Weight = 0.275\n    Threshold ind : 2.50 + 0.00x ; percentile:\
    \ 11.82\n    Threshold pref : 5.00 + 0.00x ; percentile: 22.99\n    Threshold\
    \ veto : 60.00 + 0.00x ; percentile: 100.00\n  gint 'International outlook'\n\
    \    Scale = (Decimal('0.00'), Decimal('100.00'))\n    Weight = 0.075\n    Threshold\
    \ ind : 2.50 + 0.00x ; percentile: 6.45\n    Threshold pref : 5.00 + 0.00x ; percentile:\
    \ 11.75\n  gind 'Industry income'\n    Scale = (Decimal('0.00'), Decimal('100.00'))\n\
    \    Weight = 0.050\n    Threshold ind : 2.50 + 0.00x ; percentile: 11.82\n  \
    \  Threshold pref : 5.00 + 0.00x ; percentile: 21.51\n```\n\n### the_cs_2016:\
    \ Family of Criteria\n\n| # | Identifier | Name | Comment | Weight | Scale direction\
    \ | Scale min | Scale max | Thresholds (ax + b) indifference | Thresholds (ax\
    \ + b) preference | Thresholds (ax + b) veto |\n|---|---|---|---|---|---|---|---|---|---|---|\n\
    | 1 | gtch | Teaching | The learning environment | 30.00 | max | 0.00 | 100.00\
    \ | 0.00x + 2.50 | 0.00x + 5.00 | 0.00x + 60.00 |\n| 2 | gres | Research | Volume,\
    \ income and reputation | 30.00 | max | 0.00 | 100.00 | 0.00x + 2.50 | 0.00x +\
    \ 5.00 | 0.00x + 60.00 |\n| 3 | gcit | Citations | Research influence | 27.50\
    \ | max | 0.00 | 100.00 | 0.00x + 2.50 | 0.00x + 5.00 | 0.00x + 60.00 |\n| 4 |\
    \ gint | International outlook | In staff, students and research | 7.50 | max\
    \ | 0.00 | 100.00 | 0.00x + 2.50 | 0.00x + 5.00 | |\n| 5 | gind | Industry income\
    \ | Innovation | 5.00 | max | 0.00 | 100.00 | 0.00x + 2.50 | 0.00x + 5.00 | |\n\
    \nFig. 13.1 The THE ranking criteria\n\nBetween 6% and 12% of the observed quantile\
    \ differences are, hence, considered to be *insignificant*. Similarly, between\
    \ 77% and 88% are considered to be *significant*. Less than 1% correspond to *considerable*\
    \ quantile differences on both the *Teaching* and *Research* criteria; actually\
    \ triggering an epistemic polarisation effect (Bisdorff 2013).\n\nBesides the\
    \ likely imprecise performance discrimination, the *precise decimal significance\
    \ weights*, as allocated by the THE authors to the five ranking criteria are,\
    \ as well, quite *questionable*. Criteria significance weights may carry sometimes\
    \ hidden strategies for rendering the performance evaluations commensurable in\
    \ view of a numerical computation of the overall ranking scores. The eventual\
    \ ranking result is, the case given, as much depending on the precise values of\
    \ the given criteria significance weights as, vice versa, the given precise significance\
    \ weights are depending on the subjectively expected and accepted ranking results.⁵\
    \ We will therefore drop these precise decimal weights and, instead, only require\
    \ a corresponding criteria significance preorder: gtch = gres > gcit > gint >\
    \ gind. *Teaching environment* and *Research volume and reputation* are equally\
    \ considered most significant, followed by *Research influence*. Then comes *International\
    \ outlook in staff, students and research* and, least significant finally, *Industry\
    \ income and innovation*.\n\nBoth these working hypotheses:—performance discrimination\
    \ thresholds and—solely ordinal criteria significance, give us way to a ranking\
    \ methodology based on *robust pairwise outranking* situations (see Chap. 19 and\
    \ (Bisdorff 2004)).\n\n### Definition 13.1 (Robust Outranking Situations with\
    \ Ordinal Criteria Significance Weights)\n\n- We say that CS Dept *x* *robustly\
    \ outranks* CS Dept *y* when *x* positively outranks *y* with **all** significance\
    \ weight vectors that are compatible with the significance preorder: gtch = gres\
    \ > gcit > gint > gind;\n- We say that CS Dept *x* is *robustly outranked* by\
    \ CS Dept *y* when *x* is positively outranked by *y* with **all** significance\
    \ weight vectors that are compatible with the significance preorder: gtch = gres\
    \ > gcit > gint > gind;\n- Otherwise, CS Depts *x* and *y* are considered to be\
    \ *incomparable*.\n\nA corresponding digraph constructor is provided by the `RobustOutrankingDigraph`\
    \ class.\n\n**Listing 13.7** Computing the robust outranking digraph\n\n```python\n\
    >>> from outrankingDigraphs import RobustOutrankingDigraph\n>>> rdg = RobustOutrankingDigraph(cspt)\n\
    >>> rdg\n  *------ Object instance description ------*\n    Instance class   \
    \    : RobustOutrankingDigraph\n    Instance name        : robust_the_cs_2016\n\
    \    Actions              : 75\n    Criteria             : 5\n    Size       \
    \          : 2993\n    Determinateness (%)  : 78.16\n    Valuation domain    \
    \ : [-1.00;1.00]\n>>> rdg.computeIncomparabilityDegree(Comments=True)\n   Incomparability\
    \ degree (%) of digraph <robust_the_cs_2016>:\n   links x<->y y: 2775, incomparable:\
    \ 102, comparable: 2673\n   (incomparable/links) =  0.037\n>>> rdg.computeTransitivityDegree(Comments=True)\n\
    \   Transitivity degree of digraph <robust_the_cs_2016>:\n   triples x>y>z: 405150,\
    \ closed: 218489, open: 186661\n   (closed/triples) =  0.539\n>>> rdg.computeSymmetryDegree(Comments=True)\n\
    \   Symmetry degree (%) of digraph <robust_the_cs_2016>:\n   arcs x>y: 2673, symmetric:\
    \ 320, asymmetric: 2353\n   (symmetric/arcs) =  0.12\n```\n\nIn the resulting\
    \ digraph instance `rdg` (see Line 9 in Listing **13.7**), we observe 2993 such\
    \ robust pairwise outranking situations validated with a mean significance of\
    \ 78% (Line 10). Unfortunately, in the case here, they do not deliver any complete\
    \ linear ranking. The robust outranking digraph `rdg` contains 102 incomparability\
    \ situations (3.7%, Line 15); nearly half of its transitive closure is missing\
    \ (46.1%, Line 19) and 12% of the positive outranking situations correspond in\
    \ fact to symmetric indifference situations (Line 23).\n\nWorse even, the digraph\
    \ `rdg` admits a really high number of outranking circuits.⁶\n\n**Listing 13.8**\
    \ Inspecting outranking circuits\n\n```python\n>>> rdg.computeChordlessCircuits()\n\
    >>> rdg.showChordlessCircuits()\n```\n\n```\n*---- Chordless circuits ----*\n\
    145 circuits.\n1:  ['albt', 'unlu', 'ariz', 'hels'], cred. : 0.300\n2:  ['albt',\
    \ 'tlavu', 'hels'], cred. : 0.150\n3:  ['anu', 'man', 'itmo'], cred. : 0.250\n\
    4:  ['anu', 'zhej', 'rcu'], cred. : 0.250\n...\n...\n82:  ['csb', 'epfr', 'rwth'],\
    \ cred. : 0.250\n83:  ['csb', 'epfr', 'pud', 'nyu'], cred. : 0.250\n84:  ['csd',\
    \ 'kcl', 'kist'], cred. : 0.250\n...\n...\n142:  ['kul', 'qut', 'mil'], cred.\
    \ : 0.250\n143:  ['lms', 'rcu', 'tech'], cred. : 0.300\n144:  ['mil', 'stut',\
    \ 'qut'], cred. : 0.300\n145:  ['mil', 'stut', 'tud'], cred. : 0.300\n```\n\n\
    Among the 145 detected robust outranking circuits reported in Listing 13.8 on\
    \ the previous page, we notice, for instance, two outranking circuits of length\
    \ 4 (see circuits 1 and 83).\n\nLet us inspect below the bipolar-valued robust\
    \ outranking characteristics of the first circuit.\n\n**Listing 13.9** Showing\
    \ the relation table with stability denotation\n\n```python\n>>> rdg.showRelationTable(actionsSubset=['albt',\
    \ 'unlu', 'ariz', 'hels'], Sorted=False)\n* ---- Relation Table -----\nr/(stab)|\
    \  'albt' 'unlu' 'ariz' 'hels'\n-----|---------------------------------\n'albt'\
    \ | +1.00  +0.30  +0.00  +0.00\n|  (+4)   (+2)   (-1)   (-1)\n'unlu' | +0.00 \
    \ +1.00  +0.40  +0.00\n|  (+0)   (+4)   (+2)   (-1)\n'ariz' | +0.00  -0.12  +1.00\
    \  +0.40\n|  (+1)   (-2)   (+4)   (+2)\n'hels' | +0.45  +0.00  -0.03  +1.00\n\
    |  (+2)   (+1)   (-2)   (+4)\nValuation domain: [-1.0; 1.0]\nStability denotation\
    \ semantics:\n+4|-4 : unanimous outranking | outranked situation;\n+2|-2 : outranking\
    \ | outranked situation validated\nwith all potential significance weights that\
    \ are\ncompatible with the given significance preorder;\n+1|-1 : validated outranking\
    \ | outranked situation\nwith the given significance weights;\n0 : indeterminate\
    \ relational situation.\n```\n\nIn Listing 13.9, we notice that the robust outranking\
    \ circuit [albt, unlu, ariz, hels] will reappear with all potential criteria significance\
    \ weight vectors that are compatible with given preorder: gtch = gres > gcit >\
    \ gint > gind.\n\n---\n⁵ In a social choice context, this potential double bind\
    \ between voting profiles and election result corresponds to voting manipulation\
    \ strategies.\n\n⁶ The `computeChordlessCircuits()` and `showChordlessCircuits()`\
    \ methods are separate because there are various methods available for enumerating\
    \ the chordless circuits in a digraph (Bisdorff 2010)."
  mdcn: "## 13.2 基于序数显著性多标准的排序\n\n首先，让我们批判性地审视图13.1中的THE绩效标准。\n\n```python\n>>> cspt.showHTMLCriteria(Sorted=False)\n\
    ```\n\n考虑到绩效评估过程很可能存在不精确性，以及随后可能违反均匀分布分位数类别的情况，我们在此假设：绩效分位数差异在2.5%以内是*不显著的*，而5%及以上的差异则表明绩效*明显更好*或*明显较差*。例如，牛津大学的教学环境分位数为94%，而麻省理工学院为87.3%，因此前者明显优于后者（参见第169页清单13.5第27-28行）。此外，我们进一步假设，在*教学*、*研究*和*引用*这三个主要排名标准上观察到的60%的*显著*绩效分位数差异，将引发成对优超或被优超情况的极化（Bisdorff\
    \ 2013）。\n\n这些绩效区分阈值对优超建模的影响可以通过`showCriteria()`方法进行检查。\n\n**清单13.6** 检查绩效区分阈值\n\
