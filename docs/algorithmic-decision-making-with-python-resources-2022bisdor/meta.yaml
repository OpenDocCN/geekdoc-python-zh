    always the highest significance with the imposed significance weight preorder:
    gtch = gres > gcit > gint > gind, both outranking situations get in fact globally
    confirmed at stability level +2 (see Chap. 19).


    A browser view of the corresponding robust relation map, ordering the CS Depts
    again with the same NETFLOWS ranking rule, well illustrates all such *stable outranking*
