    \ 9 | 机械工程 | 机械工程 | 技术 | 1.00 | 最大值 | 45.00 | 65.00 | 0.00x + 0.10 | 0.00x + 0.50\
    \ | |\n| 10 | 医学 | 医学 | 生命科学与医学 | 1.00 | 最大值 | 45.00 | 65.00 | 0.00x + 0.10 |\
    \ 0.00x + 0.50 | |\n| 11 | 管理学 | 管理学 | 法学、经济与管理 | 1.00 | 最大值 | 40.00 | 80.00 |\
    \ 0.00x + 0.10 | 0.00x + 0.50 | |\n| 12 | 物理 | 物理学 | 自然科学与数学 | 1.00 | 最大值 | 45.00\
    \ | 65.00 | 0.00x + 0.10 | 0.00x + 0.50 | |\n| 13 | 政治学 | 政治学 | 人文 | 1.00 | 最大值\
    \ | 50.00 | 70.00 | 0.00x + 0.10 | 0.00x + 0.50 | |\n| 14 | 心理学 | 心理学 | 人文 | 1.00\
    \ | 最大值 | 50.00 | 70.00 | 0.00x + 0.10 | 0.00x + 0.50 | |\n| 15 | 社会学 | 社会学 |\
    \ 人文 | 1.00 | 最大值 | 45.00 | 65.00 | 0.00x + 0.10 | 0.00x + 0.50 | |\n\n图 14.2\
    \ 用于评估学生入学质量的十五个学术学科\n\n前一页清单 14.1 中报告的历史规模，表明了 2004 年调查中在十五个热门学科中评估的大学数量。例如，德语研究在\
    \ 41 所大学中有 39 所被评估，而电气工程和机械工程分别只有 14 所和 13 所机构被评估。十五个学科中没有一个在所有 41 所大学中都被评估。³\n\
    \n十五个学术学科——绩效标准——的详细信息可以在浏览器视图中查阅（见图 14.2）。\n\n```\n>>> pt.showHTMLLCriteria()\n\
    ```\n\n所有十五个学科被认为同等重要（见权重列）。大多数学科的平均分在 45 到 65 之间变化。然而，在某些学科，如法学研究（35.0–65.0）和政治学（50.0–70.0），观察到了不同的变异性。因此，各学科的平均入学得分是不可通约的，所有学科的总平均入学得分变得毫无意义。\n\
    \n此外，考虑到质量得分计算中潜在且极有可能的不精确性，我们假设对于所有学科，平均入学质量得分差异为 0.1 是*不显著的*，而差异为 0.5 则足以肯定地证明入学质量*更好*。没有假设存在显著的绩效差异。\n\
    \n> ³ 如果能从所有近 50,000 名被调查学生的个人质量得分中估计出这样的分位数界限，那将是很有趣的。但这些数据并未公开（Friedmann et\
    \ al. 2004）。"
