  mdcn: '人类影响的范围。阿斯彭全球变化研究所（AGCI）确定了地球的六大系统：


    1. 大气圈

    2. 冰冻圈

    3. 水圈

    4. 生物圈

    5. 岩石圈

    6. 人类圈


    人类圈指的是人类在地球上的存在。地理空间数据使我们能够理解所有这些系统的相互关联性，并且我们拥有*大数据*——海量数据——可用于构建完善的数据问题。


    你不必成为专家就能掌握应对更重大问题的重要技能。如果你从基础层面理解地理空间数据和技术的工作原理，你就已经踏上了通往更复杂概念的道路。你将学会构建数据问题，并准备好确定可操作的步骤，以推进开发你的创新应用或解决方案。


    地理空间问题复杂多变，随空间和时间而变化，并日益影响我们的日常生活。只需看看当前的头条新闻，就能找到我们未来几年将面临的挑战实例：种族不平等、气候变化、健康的结构性决定因素、刑事司法、安全饮用水、可持续农业实践、海洋酸化、贫困、物种濒危与灭绝，以及经济困境——仅举几例。个人的位置如何影响其健康、福祉或经济机会？利用GIS，可以通过展示疾病传播率、到最近医院的距离、道路、水道、树木覆盖和城市步行便利性之间的模式来研究这类问题。


    ## 地点作为对象（点、线和多边形）


    我们将深入探讨如何在Python中探索矢量数据，但首先我需要介绍一些在本书后续内容中会用到的概念。*矢量*数据由点、线和多边形表示。我们将使用Python脚本和QGIS集成将数据集加载到地图中，并检查矢量数据的结构。后续章节还将教授如何使用颜色和符号自定义地图，以提高清晰度和准确性。


    在ArcGIS对中央公园及周边建筑的渲染中，我们可以看到几何图形以多边形表示。关于这些要素的附加信息可能揭示结构类型、建造年份、建筑尺寸以及其他可在属性表中访问的属性。要素的几何图形决定了它的渲染方式——是作为点、线还是多边形。


    Coverage、shapefile和地理数据库是ESRI产品的演进，代表了其文件格式的不同世代。我不会花太多时间讨论不同的格式，但你可能会看到数据文件被指定为shapefile（.shp）或地理数据库（.gdb），因此了解它们的优缺点是很有好处的。将文件格式与文字处理程序（如Microsoft
    Word）和简单文本文件进行比较。内容（页面上的文字）可能相同，但文本文件的复杂性和精细度肯定较低。不同的GIS文件格式也是如此。尽管内容相同，但功能元素却不同。如果你想分享一段文字，为什么选择文本文件？如果你希望文档能被所有人阅读，无论使用什么软件，或者你希望便于携带或使用更小的存储格式呢？GIS格式文件在功能上各不相同——shapefile没有拓扑或空间图层，而地理数据库可以选择包含此类图层。它们在简单性、冗余性、错误检测和存储大小方面也各不相同。在使用包含位置数据的数据集时，你可能没有选择余地，因此了解可用选项以及你能从地理角度说明什么非常重要。


    图1-8显示了纽约市的建筑类型。如果你使用过人口普查地理数据，你可能熟悉TIGER/Line提取文件或shapefile。它们作为一组文件与数字文件（带有.shp扩展名的矢量坐标）、索引（.shx扩展名）和dBASE属性数据（.dbf扩展名）一起分组。虽然一直有传言说它们正在逐渐消失，但由于它们在开源和专有系统中都很普遍，短期内不会消失。


