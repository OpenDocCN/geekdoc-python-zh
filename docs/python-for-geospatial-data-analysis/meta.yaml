    \ San Fr... |\n| (Derived) | |\n\n模式：当前图层\n\n视图：树\n\n帮助\n\n输入以定位 (WK)\n\n坐标：-136462305,\
    \ 4546108 | 比例尺：1:207166 | 放大倍率：100% | 旋转：0.0° | 渲染 | EPSG:3857\n\n## 图 2-8. 旧金山\
    \ Uber 出行时间\n\n在简要介绍 Python 之后，我们将更深入地探讨创建可视化和地图的“如何做”。你不需要任何先验知识就能跟上进度，我的目标是为你提供一个良好的起点，让你开始在\
    \ QGIS 的 Python 控制台之外编写代码。到目前为止，无需编写任何 Python 代码，所呈现的地图无需集成任何额外框架即可轻松生成。\n\n##\
    \ 映射不平等\n\n在我们开始将 Python 与 QGIS 及其他平台集成之前，我想以一个强大的可视化来结束本章，该可视化展示了在考虑数据问题时，地点和位置的价值。\n\
    \n“新政时期的美国映射红线”网站展示了房主贷款公司（HOLC）的数据。该网站是这样介绍这个项目的：\n\n在 1935 年至 1940 年间，联邦政府房主贷款公司的代理人创建了数千份区域描述，其中为现在称为佐治亚州萨凡纳市卡弗高地社区所写的描述尤为突出。HOLC\
    \ 工作人员使用每个城市当地房地产专业人士（贷款人、开发商和房地产评估师）组织的数据和评估，为住宅社区分配了反映其“抵押贷款安全性”的等级，然后这些等级会在彩色编码的地图上可视化。获得最高等级“A”（在地图上显示为绿色）的社区，在银行和其他抵押贷款机构决定谁应该获得贷款以及城市中哪些地区是安全投资时，被视为风险最小。获得最低等级“D”（显示为红色）的社区则被视为“危险”。\n\
    \n该交互式网站允许选择感兴趣的具体城市。我选择了纽约市，以查看我经常光顾的历史区域。多年来，我一直在纽约市的社区中漫步，目睹了经济投资涌入那些曾经危险到不敢涉足的社区。1930\
    \ 年代的红线政策将靠近公园的社区标记为“仍然理想”和“最佳”，只要与哈莱姆区和主要的黑人社区保持距离即可。\n\n“地点”的力量一直延续到现代，抵押贷款安全红线不再是“正式”做法，但许多这些地区已经锁定了土地利用系统。\n\
    \n## 新政时期的美国映射红线\n\n介绍 下载与数据 关于 联系我们 美国全景\n\n地图选项\n\n搜索城市\n\n### 纽约州曼哈顿\n\n###\
    \ 按等级划分的区域\n\n| 区域等级 | |\n|---|---|\n| 10% | A \"最佳\" |\n| 25% | B \"仍然理想\" |\n\
    | 11% | C \"肯定衰落\" |\n| 54% | D \"危险\" |\n\n### 人口统计\n\n- 1,889,924 总人口 (1940)\n\
    - 54.9% 本土出生白人\n- 28.6% 外国出生白人\n- 15.8% 非裔美国人\n- 1.8% 外国出生非裔美国人\n- 0.7% 亚裔美国人\n\
    \n### 区域描述\n\n点击选择\n\n搜索\n\n区域描述摘选\n\nC5\n\n![](img/d9a4de69dc9f5461c7bf43698eae7be6_52_0.png)\n\
    \n## 图 2-9. 1930 年代纽约市红线地图中的 HOLC 等级\n\n*红线政策*锁定了土地利用系统，使得最佳等级（绿色或蓝色）之外的某些区域可能遭受更多洪水（更多沥青）、更少公园、有限的树线、更靠近废物处理设施以及更靠近州际高速公路（污染），并且可能经历过更高的地表温度，增加了不利气候影响的额外风险。\n\
    \n城市热岛是温度较高的人造或自然地点。拥有更多绿化、更少不透水表面或更少工业或建筑的社区显示为黄色，较温暖的区域则用橙色到红色表示。自红线政策将某些社区标记为危险以来，纽约市令人难以置信的演变，使其目前整体较低的城市热岛效应，似乎是这些土地利用趋势的例外。如果你探索城市热岛集群（用箭头标记）并重新审视图\
    \ 2-9，这些可能是需要深入调查的区域。\n\n![](img/d9a4de69dc9f5461c7bf43698eae7be6_54_0.png)\n\n\
    ## 图 2-10. 城市热岛，ArcGIS\n\n图 2-11 所示的历史地图是使用从“映射不平等”网站下载的数据在 QGIS 中生成的。我们可以用现代地图校正该地图，并添加人口统计数据和气候信息来讲述一个完整的故事，一个不从空间角度思考就无法讲述的故事。\n\
    \n![](img/d9a4de69dc9f5461c7bf43698eae7be6_56_0.png)\n\n## 图 2-11. 1930 年代纽约市红线地图中的\
    \ HOLC 等级 QGIS\n\n我很好奇历史地图在 QGIS 中能被多么干净地重现。我手动更新了图例，但除此之外，空间元素相当无缝地被拉入地图中。\n\n\
    图 2-12 包括属性“state”、“city”、“holc_grade”、社区和区域描述，这些信息可作为创建叙述的附加信息。属性表是地理和非地理数据的资源。\n\
    \n![](img/d9a4de69dc9f5461c7bf43698eae7be6_57_0.png)\n\n在第 3 章中，你将开始与实际数据交互，并扩展你将地理空间思维和位置智能集成到数据工作流中的能力。\n\
    \n## 数据资源\n\n以下是本章讨论的相关资源链接：\n\n- Natural Earth：有人居住的地方\n- Uber Movement\n- HOLC\
    \ “红线”地图：隔离与经济不平等的持久结构\n\n## 关于作者\n\n**邦妮·P·麦克莱恩博士**是国家新闻俱乐部、500 名女性科学家以及调查记者与编辑组织的成员，这使她能够参与广泛的卫生政策和卫生经济讨论。\n\
    \n邦妮将先进的数据分析（包括数据工程和地理丰富）应用于关于贫困、种族和性别的讨论。她的研究针对社会决定因素、种族公平和交叉性要素的判断，以阐明导致贫困的指标交汇点。超越邮政编码，探索基于基础人口数据的分配社会经济数据，有助于发现基于位置的新变量，从而为复杂的数据问题构建更多背景。\n\
    \n为了影响改变或缓解导致“贫困”的因素的途径，我们需要评估影响社会背景的措施。种族主义、阶级剥削、性别歧视、民族主义和异性恋主义等核心主题都导致了社会不平等。在专业和个人层面，她重新定义了我们如何衡量这些属性，以及我们如何更准确地识别适合干预的因素。空间数据承载着各种物理和文化特征，以揭示分布模式，帮助分析师和数据专业人员理解这些模式的根本原因。查询这些关系的能力可以为政策提供信息并识别解决方案。\n\
    \n邦妮是 Tableau 用户组负责人、Tableau 演讲局成员和数据分析专业人士。她的专业目标包括通过教育、Tableau 技能集成以及 R、Python\
    \ 和 Tableau Prep 工具来提高数据素养，探索大型数据集，并为更大的问题策划富有同理心的答案——让广阔的世界显得更小。"
