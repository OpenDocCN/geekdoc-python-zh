    图 1-10. 栅格数据示例 (QGIS)


    ## 评估与选择数据


    在学习新技能、跟进新应用，甚至启动自己的独立地理空间项目时，有许多数据集可供探索用于教程。本书中你将看到的大多数数据集都经过审查，并在各种应用和工作流中被证明是可行的。


    在选择数据集之前，你需要评估数据。关于数据集的信息称为*元数据*。通过查阅元数据，你可以了解到很多信息，但关于数据最重要的信息包括地理区域、属性、地图投影、比例尺以及使用是否收费。你可以把元数据想象成汤罐头上的标签。你想知道里面可能有什么成分，更重要的是，这汤对你是否有益。图
    1-11 展示了一个元数据示例。


    通常还有一个补充数据文件，描述诸如字段标题之类的属性。这通常被称为*数据字典*。


    ![](img/d9a4de69dc9f5461c7bf43698eae7be6_30_0.png)


    图 1-11. 元数据示例


    尽管探索你自己的兴趣和数据可能很诱人，但我建议首先尝试按照以下建议的数据资源进行操作。一旦你感到有信心，再去探索并看看你能发现什么：


    - [国家地理空间计划](https://www.nationalmap.gov/)

    - 地理资源分析支持系统 (GRASS)

    - OpenGeoportal

    - ServirGlobal

    - DIVA-GIS

    - Natural Earth

    - OpenStreetMap

    - 国家地理空间数字档案馆

    - 国家历史地理信息系统 (NHGIS)

    - 地理与美国社区调查 (美国人口普查局)

    - 地理空间信息科学卓越中心 (CEGIS)


    ## 第 2 章. 空间分析的基本设施


    > **致早期版本读者的说明**


    通过早期版本电子书，你可以在书籍的最早期形式——作者撰写时未经编辑的原始内容——中获取书籍，从而在这些书籍正式发布之前很久就能利用这些技术。


    这将是最终书籍的第 2 章。


    如果你对我们如何改进本书内容和/或示例有意见，或者你注意到本章中有缺失的内容，请通过 bonny@dataanddonuts.org 联系作者。


    第 1 章涵盖了将三维 (3D) 地球映射到二维 (2D) 坐标系统的复杂性。这通常需要理解如何根据你感兴趣查看或分析的区域选择合适的地图投影。具体来说，你学习了如何将地球表面的
    3D 坐标转换为 2D 坐标。为此，引入了*大地水准面*和*椭球体*的概念。


    低于或高于地球表面的地形特征会发生什么？地理空间工具除了能够分析时间序列数据（通常被描述为第四维）之外，还能在空间上分析这些特征。你在第 1 章中也看到了各种地图投影，我讨论了如何为给定区域选择合适的投影——例如，选择一个在你查看的区域上最小化变形的投影。


    你可能注意到 *GIS* 这个术语在学习空间素养时承担了大量工作，但实际上有多个集成概念在系统层面发挥作用。我已经讨论了*空间数据*框架，其中空间位置在地球表面被识别。这对于构建用于地理编码和制图数据的全面（且可靠的）参考系统至关重要。


    ## 理解空间关系


    空间参考数据被定义为离散对象或连续（标量场）。客观视图关注特定位置可见的内容。地图上有特定的边界或区域，数据或对象要么存在，要么不存在。你不会期望在特定边界内的每个位置都存在一个建筑物，甚至是一个代表城市的多边形对象。


    场视图代表缺乏特定边界但存在于整个地图视图中的连续数据。也许更直观一点，考虑地表高程、降水或地表温度。无论你的研究视图如何，你都可以在研究位置包含的每个位置记录这些测量值。


    到目前为止，我只是在描述我们研究位置内点、多边形或线的分布。栅格，你可能还记得，将图像、地表温度和数字高程表示为一个值数组，该数组被划分为单元格网格。单元格或像素描述空间分辨率。这两个术语经常互换使用，描述代表所覆盖区域的单元格或像素的维度。空间数据模型将这些现实世界客观和/或场视图的抽象表示进行探索，以数学关系建模或预测关系。


    照片和栅格图像之间的主要区别在于后者扩展的波长波段。这种超越简单的红、绿、蓝波长的增强数据，使得机器学习模型能够区分各种各样的物体。反射红外光的能力是物体特有的，并在多光谱图像中产生额外信息。太空中有数百颗地球观测卫星持续捕捉地球图像。世界各地的许多航天机构免费提供这些数据。这些数据集对科学家、研究人员、政府和企业具有巨大的价值。


    如图 2-1 所示的山体阴影栅格使用光影来创建所视区域的 3D 效果。


    ![](img/d9a4de69dc9f5461c7bf43698eae7be6_35_0.png)


    图 2-1. 以栅格形式描绘的旧金山 (QGIS)


    在审视 GIS 的系统级方法时，有必要同时考虑多个概念。在更大系统中工作的小型组件通过动态交互强化了更好的参与，从而揭示系统中的模式。几何可视化就是一个例子，包括计算要素之间的距离、计算缓冲区区域（例如，一个要素距离另一个要素有多远）以及识别区域或周长。如果我们把这些主题视为整体的部分，将简化我们的讨论。随着我们旅程的继续，我将更深入地探讨这些主题。


    理解这些入门概念将简化你在后续章节中的学习。从空间素养的基线开始很重要。


    > 如果不明确关注[空间素养]，我们就无法履行为下一代学生装备 21 世纪生活和工作技能的责任。


    —*学会空间思考*，美国国家研究委员会


    ## 空间素养


    空间素养需要理解空间关系所必需的概念相互作用。你将在此基础上构建关于地理空间如何表示的知识，以便对空间概念进行推理和做出关键决策。流行的 Python 编程语言是实现超越简单地图投影、地理处理和地理可视化的更高级分析工具的强大工具。QGIS
    拥有强大的编程接口，允许你扩展软件的核心功能以及编写脚本来自动化你的任务，并且 QGIS 支持 Python 脚本语言。即使你是编程和/或 QGIS 的新手，学习一点
    Python 并熟悉 QGIS 编程接口，也能让你在工作中更加高效。


    > **提示**


    第 6 章提供了关于使用 QGIS 的详细信息，但你可能想下载它并开始自己探索。我建议查看那里的步骤或访问 [QGIS 网站](http://www.qgis.org)
    并为你的操作系统下载长期支持版 (LTR)。


    空间或关系数据库管理系统旨在存储和查询空间数据。这对我来说一直很困惑——PostGIS 和 PostgreSQL，到底有什么区别？以下是我的理解。如果你处理的是大型数据集，将数据存储在数据库中是合理的。关系数据库有模式，数据存储在列和行中。当你想要访问数据时，你查询关系数据库。结构化查询语言
    (SQL) 执行查询，作为关系数据库的原生语言，允许无缝集成。


    PostgreSQL 数据库管理系统 (DBMS) 是一个数据库，PostGIS 作为扩展器与其打包在一起，为 PostgreSQL 添加空间功能。例如，空间数据库通常会有一列来标识由空间参考标识符
    (SRID) 定义的坐标系。SQL Server Spatial 和 ESRI ArcSDE 是其他空间数据库的例子。


    对于本书，我主要使用我在培训或项目中首次使用的数据资源，并更新到最新报告的数据。我想确保无论你的操作系统如何，你都可以访问不同的数据集。QGIS 有各种各样的工具，这将使操作变得简单直接。我也在专业上使用
    ArcGIS，但由于 ArcGIS Pro 只能在 Microsoft Windows 上运行，这会太受限。如果你是高级用户，并希望用本地数据或更能反映你个人或专业兴趣的数据替换数据，这里有一些建议：


    1.  你需要一个健康混合的城市和农村地点，具有不同类型的道路、边界、水体特征和地形。

    2.  当有选择时，我更喜欢最近的数据，但对于教学目的'
