    # 第1章 地理空间分析导论


    > ### 给早期发布读者的说明


    通过早期发布电子书，您可以在书籍的最早期形式——作者撰写时的原始和未编辑内容——中获取书籍，从而在这些书籍正式发布之前很久就能利用这些技术。


    这将是最终书籍的第1章。


    如果您对我们如何改进本书的内容和/或示例有意见，或者您注意到本章中有缺失的内容，请通过 bonny@dataanddonuts.org 联系作者。


    您是地理学家、地质学家还是计算机科学家？如果您回答“是”，那很了不起，但我是一名空间数据分析师。简而言之，我对探索数据和整合位置信息感兴趣。现在，位置数据和地理空间数据集的获取已相当普遍，无论专业头衔或研究领域如何，我们大多数人都对数据产生了好奇心。在分析中欣赏*位置*维度，为理解更广泛特征对特定观察或结果的影响引入了新的维度。我花费大量专业时间研究公共卫生数据和医疗保健领域的大型开源数据集。一旦您熟悉了地理编码和空间文件，您不仅可以跨多个领域整理洞察，还能识别出存在巨大差距的区域。


    这也是公民科学家的时代。开源工具和大规模开放在线课程（MOOCs）的可及性不仅赋能了更广泛的专业人士，也赋能了对数据好奇的人们。也许您对某种鸟类有爱好或兴趣，并希望获取空间数据来了解它们的栖息地。它们在哪里筑巢？它们从哪里迁徙到哪里？哪些栖息地支持最多的物种，这种情况随时间如何变化？您或许能够创建您的观测点或其他感兴趣变量的地图。我们稍后在生成一个数据问题进行探索时，会进一步探讨这个想法。


    与此同时，如果您对公民科学家项目感兴趣，不妨看看纽约公共图书馆（NYPL）的 Map Warper 项目。正如您可能想象的那样，NYPL 拥有大量历史地图。挑战在于通过搜索现代匹配的*地面控制点*（GCPs）来纠正过时测量技术中的错误，并相应地对图像进行扭曲。这被称为*地图校正*。


    [NYPL Map Warper](https://maps.nypl.org/warper)（如图1-1所示）是一个用于*校正*（数字对齐）NYPL 馆藏中历史地图的工具，使其与当今精确的地图相匹配。访客可以浏览已校正的地图，或通过校准地图来协助
    NYPL。欢迎所有人参与！


    ![](img/d9a4de69dc9f5461c7bf43698eae7be6_6_0.png)


    图1-1. 1870年的曼哈顿地图


    我曾使用校正后的地图来探索不同城市随时间的发展，或准确地重新构想一个历史地点。例如，基础设施和工业发展的投资如何随时间影响社区？图1-2显示了一张校正后的地图。


    ![](img/d9a4de69dc9f5461c7bf43698eae7be6_7_0.png)


    图1-2. 校正后的当代曼哈顿地图


    各行各业的专业人士都有许多机会在其分析中纳入位置智能。位置智能描述了在制定数据问题和评估假设时，通过探索地理空间关系得出的可操作信息。开源工具正在欢迎新的终端用户，我们需要的是一个适用于无数不同兴趣、资源和学习背景的词汇表。是的，企业解决方案功能强大，但许多人对基于订阅的应用程序和工具的访问有限。地理信息系统（GIS）软件有多种选择，每种都有其优缺点。我将在提到时提及几种，但尽管我可以使用
    ArcGIS（也称为航空侦察覆盖地理信息系统）和 QGIS（量子 GIS），我更喜欢让 QGIS 作为主角。它是真正的开源，意味着您不需要不同级别的许可即可访问所有可用工具。由于本书面向广泛的兴趣群体，我希望您能够探索所有工具。在我的专业工作中，是的，我会在
    ArcGIS 和 QGIS 之间切换——主要是为了访问 ArcGIS 在线丰富的 GIS 数据集目录。我在 ArcGIS 中进行地理编码时确实不得不吸取教训。ArcGIS
    使用信用系统，我很容易在不知不觉中陷入不利境地。当我上传包含位置数据的 CSV 文件时，我没有意识到付费服务会相当自动地启动。另一方面，QGIS 提供了两种我们稍后将探讨的选项——两者都是免费的。


    图1-3中地图上的多边形以不同颜色对应种族类别。如果我们同时考察其他属性，我们可能会对这些集群得出什么结论？让我们先思考一下这些问题。我给您一个提示：魔鬼在细节中，或者我应该说，在*图层*中。多边形根据某个种族是多数人口的区域进行着色。这是引入*默认值不应是终点*这一表达的好地方。对
    GIS 更深入的理解将使您能够摆脱默认设置，创建独特而深刻的洞察。'
