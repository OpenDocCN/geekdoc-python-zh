- md: '## Legend


    ACS Race and Hispanic Origin Variables - Boundaries - County


    Predominant category


    - Non-Hispanic White Population

    - Hispanic or Latino Population

    - Black or African American Population

    - American Indian and Alaska Native Population

    - Asian Population

    - Native Hawaiian and Other Pacific Islander Population

    - Two or More Races Population


    Strength of predominance


    - > 99

    - < 15


    ## 2020 USA Diversity Index


    County


    - 84 - 109

    - 58 - 84

    - 33 - 58

    - 7 - 33

    - 0 - 7


    ![](img/d9a4de69dc9f5461c7bf43698eae7be6_9_0.png)


    > Selecting on a specific county yields additional data—diversity index


    Figure 1-3. Race and diversity (ArcGIS)


    Spatial Data Analysis 101 tells us that any analysis requires a defined question.
    Once you formulate the question you can discover whether there is data that will
    help you answer or address the hypothesis. I don’t mean cherry-picked data, but
    all of the data imperative to shape a hypothesis or generate an insight. Should
    race be treated like a poor biologic proxy for something else or as a social or
    political construct? We need to understand the variables we have gathered to be
    able to curate empathy, reveal policy gaps, or address unmet health needs. We
    may need to reformulate our question if faced with missing data or resources we
    are unable to access.


    When you become familiar with Census data you begin to understand the heavy lifting
    race has been asked to accomplish. The ability to now examine data on place (housing,
    employment, transportation, and education to name a few) illuminates the role
    of spatial data and launched my integration of geospatial applications like ArcGIS
    and QGIS into my talks about poverty, racial inequity, structural determinants
    of health, and a wide variety of new questions continuing to emerge. When you
    rely on spreadsheets or tables of data, I would argue in the absence of spatial
    considerations you might be missing out on critical insights. Static metrics like
    where a road might be located, or the coordinates of a specific event, or dynamic
    measures like the spread of an infectious disease become more powerful when integrated
    with location intelligence.


    A problem uniquely solved by spatial analysis examines the relationships between
    features identified within a geographic boundary. For example, non-geographic
    data describes how values are distributed--and we can rely on descriptive statistics.
    But what if we are curious about the impact spatial relationships might have on
    these values?


    At first glance we can appreciate county level race variables from the American
    Community Survey. We can see clusters of categorical variables, but do we know
    anything else? These are predominant categories in each region, but what else
    might we want to know? This is where geospatial data becomes so valuable.


    > **NOTE**


    The annual [American Community Survey](https://www.census.gov/programs-surveys/acs/)
    (ACS) replaced the long form of the decennial census appearing in 2005 and contains
    a wide variety of questions to identify shifting demographics for gathering information
    about local communities.


    What if we think a little more outside the box? This map you see in Figure 1-4
    was created as an exploration of populations where an unexpected emergency would
    exceed the financial wherewithal of a family. The red squares now tell us that
    these are the families at the most risk, and bigger squares reflect a larger number
    of households. To demonstrate the value of geospatial analysis, the green squares
    are the sites for the summer meal sites in 2020 during the global pandemic. The
    summer meal sites are part of the Summer Food Service Program (SFSP) serving free
    meals to low-income children when school is not in session at approved locations.


