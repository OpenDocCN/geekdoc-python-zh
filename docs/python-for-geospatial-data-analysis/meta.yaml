  md: 'Figure 1-4. Risk Index Summer Meals (ArcGIS)


    Open source resources like the Census API yield demographic data accessible for
    retrieval with a few lines of code in Python. If you aren’t familiar with API,
    it stands for *application programming interface*, a computer interface enabling
    data transmission between software products. The beauty is in the interface part.
    The Census API is a wrapper for the United States Census. You can now pull specific
    data from the annual ACS and the census without downloading entire humongous files
    of data. Geographies are also captured in census data either at the census website
    or downloadable from IPUMS, formally known as Integrated Public Use Microdata
    Series. The beauty of IPUMS includes person-level data, the harmonization of variables
    across surveys and the ability to easily download raw data files.


    > ### NOTE


    From the IPUMS website:


    *IPUMS provides census and survey data from around the world integrated across
    time and space. IPUMS integration and documentation makes it easy to study change,
    conduct comparative research, merge information across data types, and analyze
    individuals within family and community context. Data and services are available
    free of charge.*


