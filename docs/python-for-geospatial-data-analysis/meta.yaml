  md: 'Figure 2-1. San Francisco depicted as a raster (QGIS)


    It is necessary to consider multiple concepts simultaneously when reviewing a
    systems level approach to GIS. The smaller components working within a larger
    system reinforce better engagement revealing patterns in the system through dynamic
    interactions. Geometric visualization is one example and includes calculating
    distances between features, calculating buffer regions (how far away one feature
    is from another, for example), and identifying areas or perimeters. It will simplify
    our discussion if we think of these topics as parts to a whole. I will be digging
    a little deeper into these topics as we continue our journey.


    Understanding these introductory concepts will simplify your learning in the following
    chapters. It is important to begin with a baseline of spatial literacy.


    > Without explicit attention to [spatial literacy], we cannot meet our responsibility
    for equipping the next generation of students for life and work in the 21st century.


    —*Learning to Think Spatially*, the National Research Council


    # Spatial Literacy


    Spatial literacy requires an interplay of the concepts necessary for understanding
    spatial relationships. You will build on this knowledge of how geographic space
    is represented in order to reason and make key decisions about spatial concepts.
    The popular Python programming language is a powerful tool in achieving more advanced
    analytic tools beyond simple map projections, geoprocessing, and geo-visualization.
    QGIS has a powerful programming interface that allows you to extend the core functionality
    of the software as well as write scripts to automate your tasks, and QGIS supports
    the Python scripting language. Even if you are new to programming and or QGIS,
    learning a little bit of Python and navigating the QGIS programming interface
    will allow you to be much more productive in your work.'
