    Figure 1-10. Example of raster data (QGIS)


    ## Evaluating and Selecting Data


    There are many datasets to explore for use in tutorials for learning a new skill,
    following along in a new application, or even for launching your own independent
    geospatial project. Most of the datasets you will see in this book have been vetted
    and found workable on a wide variety of applications and workflows.


    Before selecting your dataset, you need to evaluate the data. The information
    about your dataset is called *metadata*. You can learn a lot by looking through
    the metadata, but the most important information about your data includes geographic
    area, attributes, map projection, scale, and whether there is a fee to use it.
    You can think of metadata as the label on a can of soup. You want to know what
    the ingredients might be, and more importantly, whether the soup is good for you.
    Figure 1-11 shows an example of metadata.


    Often there is also a supplemental data file that describes attributes like field
    headings. This is typically called a *data dictionary*.


    ![](img/d9a4de69dc9f5461c7bf43698eae7be6_30_0.png)


    Figure 1-11. Example of metadata


    Although it can be tempting to explore your own interests and data, I suggest
    first attempting to follow along with the following suggested data resources.
    Once you feel confident, then explore and see what you can discover:


    - [National Geospatial Program](https://www.nationalmap.gov/)

    - Geographic Resources Analysis Support System (GRASS)

    - OpenGeoportal

    - ServirGlobal

    - DIVA-GIS

    - Natural Earth

    - OpenStreetMap

    - The National Geospatial Digital Archive

    - National Historical Geographic Information System (NHGIS)

    - Geography and American Community Survey (US Census)

    - Center of Excellence for Geospatial Information Science (CEGIS)


    ## Chapter 2. Essential Facilities for Spatial Analysis


    > **A NOTE FOR EARLY RELEASE READERS**


    With Early Release ebooks, you get books in their earliest form—the author’s raw
    and unedited content as they write—so you can take advantage of these technologies
    long before the official release of these titles.


    This will be the 2nd chapter of the final book.


    If you have comments about how we might improve the content and/or examples in
    this book, or if you notice missing material within this chapter, please reach
    out to the author at bonny@dataanddonuts.org.


    Chapter 1 covered the complexity of mapping a three-dimensional (3D) globe to
    a two-dimensional (2D) coordinate system. This often requires an understanding
    of how to select an appropriate map projection depending on the area you are interested
    in viewing or analyzing. In detail, you studied how 3D coordinates on the surface
    of the Earth can be converted to 2D coordinates. For that, the concepts of *geoid*
    and *ellipsoid* were introduced.


    What happens to topographical features that are below or above the earth’s surface?
    Geospatial tools are able to analyze these features spatially as well, in addition
    to time-series data, often described as a fourth dimension. You also saw a variety
    of map projections in Chapter 1, and I discussed how to choose an appropriate
    one for a given area -- for example, selecting a projection that minimizes distortion
    over the area you are viewing.


    You might notice the term *GIS* doing a lot of the heavy lifting when learning
    about spatial literacy, but in reality there are multiple integrated concepts
    contributing at the systems level. I have discussed the *spatial data* framework,
    where spatial locations are identified on the earth’s surface. This is fundamental
    for building a comprehensive (and reliable) reference system for geocoding and
    mapping data.


    ## Understanding Spatial Relationships


    Spatial referenced data is defined as either discrete objects or continuous (scalar
    fields). An objective view focuses on what is visible in a particular location.
    There are specific boundaries or areas on a map where data or objects are either
    present or absent. You wouldn’t expect a building or even a polygonal object representing
    a city to exist in every location within a specific boundary.


    A field view represents continuous data lacking specific boundaries but present
    across the entire map view. Perhaps slightly more intuitive, consider surface
    elevation, precipitation, or surface temperature. You can record these measures
    at each location included within your study location regardless of your study
    view.


    So far, I am simply describing the distribution of points, polygons, or lines
    within our research location. Rasters, as you may recall, represent imagery, surface
    temperatures, and digital elevations as an array of values divided into a grid
    of cells. Cells or pixels describe spatial resolution. The two terms are often
    referred to interchangeably and describe the dimension of the cell or pixel representing
    the area being covered. Spatial data models take these abstract representations
    of real-world objective and/or field views and explore mathematical relationships
    to model or predict relationships.


    The big differentiator between photos and raster images arises from the expanded
    bands of wavelengths in the latter. This enhanced data beyond simply red, green,
    and blue wavelengths allows machine learning models to distinguish between a wide
    variety of objects. The ability to reflect infrared light is object specific and
    yields additional information in a multi-spectral image. There are hundreds of
    earth observation satellites in space continuously capturing images of the earth.
    Many space agencies around the world make this data available freely. These datasets
    are immensely valuable to scientists, researchers, governments, and businesses.


    A hillshade raster as seen in Figure 2-1 uses light and shadow to create the 3D
    effect of the area in view.


    ![](img/d9a4de69dc9f5461c7bf43698eae7be6_35_0.png)


    Figure 2-1. San Francisco depicted as a raster (QGIS)


    It is necessary to consider multiple concepts simultaneously when reviewing a
    systems level approach to GIS. The smaller components working within a larger
    system reinforce better engagement revealing patterns in the system through dynamic
    interactions. Geometric visualization is one example and includes calculating
    distances between features, calculating buffer regions (how far away one feature
    is from another, for example), and identifying areas or perimeters. It will simplify
    our discussion if we think of these topics as parts to a whole. I will be digging
    a little deeper into these topics as we continue our journey.


    Understanding these introductory concepts will simplify your learning in the following
    chapters. It is important to begin with a baseline of spatial literacy.


    > Without explicit attention to [spatial literacy], we cannot meet our responsibility
    for equipping the next generation of students for life and work in the 21st century.


    —*Learning to Think Spatially*, the National Research Council


    ## Spatial Literacy


    Spatial literacy requires an interplay of the concepts necessary for understanding
    spatial relationships. You will build on this knowledge of how geographic space
    is represented in order to reason and make key decisions about spatial concepts.
    The popular Python programming language is a powerful tool in achieving more advanced
    analytic tools beyond simple map projections, geoprocessing, and geo-visualization.
    QGIS has a powerful programming interface that allows you to extend the core functionality
    of the software as well as write scripts to automate your tasks, and QGIS supports
    the Python scripting language. Even if you are new to programming and or QGIS,
    learning a little bit of Python and navigating the QGIS programming interface
    will allow you to be much more productive in your work.


    > **TIP**


    Chapter 6 provides details on working with QGIS, but you may want to download
    it and start exploring on your own. I suggest reviewing the steps there or visiting
    the [QGIS website](http://www.qgis.org) and downloading the long term release
    (LTR) for your operating system.


    Spatial or relational database management systems are designed to store and query
    spatial data. This has always been confusing to me--PostGIS and PostgreSQL, what
    in the world is the difference? Here is how it makes sense to me. If you are working
    with large datasets it makes sense to store the data in a database. Relational
    databases have schemas where data is stored in columns and rows. When you want
    to access the data, you query the relational database. Structured Query Language
    (SQL) executes queries allowing seamless integration as the native language of
    relational databases.


    PostgreSQL Database Management System (DBMS) is a database, and PostGIS is packaged
    with it as an extender that adds spatial functions to PostgreSQL. For example,
    a spatial database will often have a column to identify coordinate systems defined
    by a spatial reference identifier (SRID). SQL Server Spatial and ESRI ArcSDE are
    other examples of spatial databases.


    For this book I am mainly using data resources I first used in my training or
    projects, updated to the latest reported data. I want to be certain that independent
    of your operating system you can access the different data sets. QGIS has a wide
    variety of tools that will make this straightforward. I also use ArcGIS professionally,
    but since ArcGIS Pro only works on Microsoft Windows, it would be too limited.
    If you are an advanced user and would like to replace the data with local data
    or data that is more reflective of your personal or professional interest, here
    are a few suggestions:


    1. You will want a healthy mix of urban and rural locations with different types
    of roads, boundaries, water features, and topographies.

    2. When given a choice, I prefer recent data but for instructional'
