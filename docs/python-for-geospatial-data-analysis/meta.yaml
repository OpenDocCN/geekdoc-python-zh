  md: 'transportation that seem local or regional cross physical and political boundaries,
    ecological regions, municipalities, and watersheds and possess a spatial component.
    Since maps are one of the first appreciations we have of data visualization, it
    makes sense that after interrogating our data we might become curious about location.


    Geographic Information Systems (GIS) continuously analyze data and provide real-time
    insights across a wide variety of industries. Although there may be similarities
    between spatial and non-spatial analyses, spatial statistics are developed specifically
    for use with geographic data. Both are associated with geographic features but
    spatial statistics look specifically at geocoded geographical spatial data. For
    example, when imagining airport data there are non-spatial statistics for variables
    such as region or use (military, civilian/public) or on-time arrivals and departures
    as well as spatial components for analysis (elevation and geographical coordinates).
    Unlike traditional non-spatial statistical methods, they incorporate space (proximity,
    area, connectivity, and/or other spatial relationships) directly into their mathematics.
    Additionally, for those tools written with Python, the source code is available
    to encourage you to learn from, modify, extend, and/or share these and other analysis
    tools with others.These complex problems are spatial. Where are these problems
    occurring and how can we plan for better outcomes in the future?


