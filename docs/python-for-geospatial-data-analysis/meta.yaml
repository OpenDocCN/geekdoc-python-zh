  md: 'sphere of human influence. The Aspen Global Change Institute (AGCI) identifies
    six systems of the earth:


    +   1. Atmosphere

    2. Cryosphere

    3. Hydrosphere

    4. Biosphere

    5. Geosphere

    6. Anthroposphere


    The anthroposphere refers to human presence on earth. Geospatial data allows us
    to comprehend the interconnectivity of all of these systems, and we have *big
    data* -- lots of data -- accessible for well-formulated data questions.


    You don’t have to become an expert to retain important skills for bigger questions.
    If you understand at a fundamental level how things work in geospatial data and
    technology, you are already on your way to more complex ideas. You will learn
    to formulate a data question and be ready to determine actionable steps to move
    toward developing your novel application or solution.


    Geospatial problems are complex and change over space and over time and increasingly
    affect our everyday lives. Look no further than current headlines to find examples
    of challenges we face in the years to come: racial inequity, climate change, structural
    determinants of health, criminal justice, safe drinking water, sustainable agriculture
    practices, ocean acidification, poverty, species endangerment and extinction,
    and economic strife -- to name a few. How does an individual’s location influence
    their health, well being, or economic opportunity? Questions like these can be
    examined utilizing GIS by showing patterns between diffusion rates of disease,
    distance to nearest hospital, roadways, waterways, tree cover and city walkability.


