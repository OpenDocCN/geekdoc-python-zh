  md: '> **TIP**


    Chapter 6 provides details on working with QGIS, but you may want to download
    it and start exploring on your own. I suggest reviewing the steps there or visiting
    the [QGIS website](http://www.qgis.org) and downloading the long term release
    (LTR) for your operating system.


    Spatial or relational database management systems are designed to store and query
    spatial data. This has always been confusing to me--PostGIS and PostgreSQL, what
    in the world is the difference? Here is how it makes sense to me. If you are working
    with large datasets it makes sense to store the data in a database. Relational
    databases have schemas where data is stored in columns and rows. When you want
    to access the data, you query the relational database. Structured Query Language
    (SQL) executes queries allowing seamless integration as the native language of
    relational databases.


    PostgreSQL Database Management System (DBMS) is a database, and PostGIS is packaged
    with it as an extender that adds spatial functions to PostgreSQL. For example,
    a spatial database will often have a column to identify coordinate systems defined
    by a spatial reference identifier (SRID). SQL Server Spatial and ESRI ArcSDE are
    other examples of spatial databases.


    For this book I am mainly using data resources I first used in my training or
    projects, updated to the latest reported data. I want to be certain that independent
    of your operating system you can access the different data sets. QGIS has a wide
    variety of tools that will make this straightforward. I also use ArcGIS professionally,
    but since ArcGIS Pro only works on Microsoft Windows, it would be too limited.
    If you are an advanced user and would like to replace the data with local data
    or data that is more reflective of your personal or professional interest, here
    are a few suggestions:


