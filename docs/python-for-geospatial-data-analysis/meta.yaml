  md: '# Polygons)


    We will dig deeper into how to explore vector data in Python, but first I need
    to introduce a few concepts that will be useful as we move through the book. *Vector*
    data is explained by points, lines, and polygons. We will use Python scripts and
    QGIS integrations to load datasets into a map and examine the structure of vector
    data. Later chapters will also teach how to customize maps with colors and symbols
    to improve clarity and accuracy.


    In the ArcGIS rendering of Central Park and surrounding buildings we can see the
    geometry represented as polygons. Additional information about the features might
    reveal the type of structure, year built, architectural dimensions, and other
    attributes accessible in an attribute table. The geometry of a feature determines
    how it is rendered -- either as a point, line, or polygon.


    Coverage, shapefiles, and geodatabases are an evolution of ESRI products denoting
    different generations of their file formats. I won’t spend a lot of time discussing
    the different formats but you may see data files designated as shapefiles (.shp)
    or geodatabase (.gdb), so it is good to know their advantages and disadvantages.
    Compare the file formats of word-processing programs like Microsoft Word to a
    simple text file. The content (the words on the page) may be the same but the
    complexity and sophistication is certainly less in the text file. Same thing with
    the different GIS file formats. Although the content is the same, the elements
    of functionality are different. If you wanted to share a piece of writing, why
    would you choose a text file? What if you wanted the document to be read by everyone
    regardless of software, or what if you wanted ease of portability or a smaller
    storage format? GIS format files vary in functionality -- shape files do not have
    a topological or spatial layer, whereas with a geodatabase such a layer is optional.
    They also vary in simplicity, redundancy, error detection, and storage size. You
    may not have a choice when working with a dataset that has location data, so it
    is important to know what is available and what you can say geographically.


    Figure 1-8 shows types of buildings in New York City. If you have worked with
    Census geographic data you are likely familiar with TIGER/Line'
