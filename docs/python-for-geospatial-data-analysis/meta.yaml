    地理系统可以处理多种类型的数据。当我们想到点、线或多边形（例如shapefile）以及LIDAR（激光雷达）测量时，我们指的是矢量数据。例如，在检查像景观这样的GIS环境时，当你在QGIS等应用程序中渲染时，你视野范围内的所有东西都是一个要素。关于这些要素的详细信息被捕获为属性。


    当位置数据出现在电子表格中时，纬度和经度列会创建一个点。图1-9所示的空气质量电子表格包含地理（*纬度*和*经度*）和非地理数据（*值*列中的空气质量测量值），允许GIS应用程序添加与特定地理位置相关的信息。点要素具有X、Y和（可选的）Z值。最熟悉的坐标投影系统是经度和纬度。你可以被放置在世界任何地方，如果你提供你的经度（X）和纬度（Y），你的位置就已知——这正是我们所说的*点*属性。这个坐标精确地描述了地球上某个特定位置。点属性可以是定量或定性的描述。


