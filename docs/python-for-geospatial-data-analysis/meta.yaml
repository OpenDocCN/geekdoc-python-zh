- md: 'notebooks or relying on open source tools like QGIS with the hosted python
    plug-in, is the focus of this book.


    As data visualization continues to become more relevant, think about the most
    familiar graphics: Maps. Our level of comfort in viewing maps belies the complexity
    of layers of information, interactivity of multiple datasets, and even how we
    communicate findings. Accessibility to open source data and platforms extends
    spatial data science to not only professionals but to hobbyists and individual
    analysts. But we also need to exercise caution. Familiarity isn’t the same as
    accuracy or competency.


    Open source platforms like [OpenStreetMap](https://www.openstreetmap.org/) allow
    us to zoom into a level of detail, revealing structures in the landscape, and
    add attributes to our analysis. There are Python packages like OSMnx that allow
    OpenStreetMap downloads into a Jupyter Notebook independent of a specific application
    or tool (see nearby Note for more).


    [OSMnx](https://github.com/gboeing/osmnx) is a Python package that lets you download
    spatial data from OpenStreetMap and model, project, visualize, and analyze real-world
    street networks. You can download and model walkable, drivable, or bikeable urban
    networks with a single line of Python code, and then easily analyze and visualize
    them. You can just as easily download and work with other infrastructure types,
    amenities/points of interest, building footprints, elevation data, street bearings/orientations,
    and speed/travel time.


    ## Conceptual Framework for Spatial Data Science


    Planet earth is not perfectly spherical. That makes sense when you think of the
    chemical nature of the planet, and how the centrifugal force caused by spinning
    in space would tend to push out the middle, resulting in an oblate spheroid shape.
    Technically the shape of the earth is an ellipsoid, the circumference around the
    poles is shorter than the circumference around the equator, almost like the planet
    has been squished from top to bottom. When we attempt to map the surface, we take
    a geographic coordinate system and translate it into a projected coordinate system
    -- for a flat map. The establishment of a *graticule*, the latitude and longitude
    lines framework of a map, is expedited by QGIS and other GIS applications. Coordinate
    systems attempt to render the location data in meaningful ways that are close
    to a single source of truth. These different projections are called *conic*, *azimuthal*,
    and *cylindrical*. Each one leaves a distortion that must be dealt with. Depending
    on the chosen coordinate system, we might have distortions in area, distance,
    direction, and size. You will be glad to know that we don’t need to wrestle with
    these compromises alone -- software manages much of the complicated math. Figure
    1-5 shows a geographic coordinate system.


    ![](img/d9a4de69dc9f5461c7bf43698eae7be6_17_0.png)


    © Encyclopædia Britannica, Inc.


    Figure 1-5. Geographic coordinate system.


    If you use OpenStreetMap or Google Maps you will be familiar with the Web Mercator
    coordinate system. Familiarity with variations of these maps will allow you to
    select the optimal projection as compromises will need to be made. For example,
    in my work in population health, it is critical that area is maintained on projections.
    If I’m mapping percentages or raw numbers on a map, and I want to be as impartial
    as possible, making a small place look too large compared to other places, there’s
    an inherent bias there that affects my interpretation of that map. I’m going to
    do my best to look at the projection’s weaknesses and its strengths and say, “I’m
    going to choose one that maintains area.”


    Maps that maintain area are called *equal area projections*. Later chapters discuss
    this in more detail. I will review QGIS and ArcMap and show how they convert projections
    for the best cartographic results. Because the earth is not a perfect sphere,
    we do have to make compromises and accept a little bit of distortion. But if we
    ensure that the measures most relevant to our visualization are captured in the
    coordinate system we select, we are most of the way there. Naturally we would
    like our values to closely match the actual values in the real world. The reality
    of a “where” question in an interesting dataset is often the impetus for visual
    communication. For example, spatial phenomena are often iterative instead of linear.
    Perhaps you are intrigued by an extent or scale of a systematic geography. Where
    do you begin? The whole world won’t fit on a piece of paper or a computer screen--at
    least not in a visibly available manner for interpretation.


    The error or deviation from the accuracy of a globe (remember we are trying to
    represent the ellipsoid geometry on a flat surface) is typically measured by the
    Goldberg-Gott error score. The most recent attempt at minimizing the error was
    researched by J. Richard Gott and colleagues. For reference the popular Mercator
    projection (Figure 1-7) has an error score of 8.296 while the Winkel Tripel comes
    in at 4.563. The lower score reflects fewer errors or compromises in the rendering
    of the flat map. The new J. Richard Gott map (0.881) has the lowest error score
