    \n## Figure 2-8. Uber travel times in San Francisco\n\nWe will delve more into\
    \ the “how to” of creating visualizations and maps after a brief introduction\
    \ to Python. You don’t need prior knowledge to be able to follow along, and my\
    \ goal is to give you a nice starting point to begin coding beyond the Python\
    \ console in QGIS. So far, there has been no need to write any Python code, and\
    \ the maps presented are easily generated without integrating any additional frameworks.\n\
    \n## Mapping Inequalities\n\nBefore we launch into integrating Python with QGIS\
    \ and other platforms, I wanted to end this chapter with a powerful visualization\
    \ that demonstrates the value of place and location when considering a data question.\n\
    \nMapping Inequality Redlining in New Deal America presents data from the Home\
    \ Owners’ Loan Corporation (HOLC). Here’s how the site introduces the project:\n\
    \nAmong the thousands of area descriptions created by agents of the federal government’s\
    \ Home Owners’ Loan Corporation between 1935 and 1940, the one that was written\
    \ for what is now called the Carver Heights neighborhood in Savannah, Georgia,\
    \ stands out. HOLC staff members, using data and evaluations organized by local\
    \ real estate professionals--lenders, developers, and real estate appraisers--in\
    \ each city, assigned grades to residential neighborhoods that reflected their\
    \ “mortgage security” that would then be visualized on color-coded maps. Neighborhoods\
    \ receiving the highest grade of “A\"--colored green on the maps--were deemed\
    \ minimal risks for banks and other mortgage lenders when they were determining\
    \ who should receive loans and which areas in the city were safe investments.\
    \ Those receiving the lowest grade of “D,” colored red, were considered “hazardous.”\n\
    \nThe interactive website allows selection of specific cities of interest. I selected\
    \ NYC to see historical areas where I spend a lot of time. I have walked the neighborhoods\
    \ of NYC for many years, watching economic investments into neighborhoods once\
    \ too dangerous to roam. The 1930s redlining highlighted park hugging neighborhoods\
    \ as “still desirable” and “best” as long as distance was kept from Harlem and\
    \ primarily black neighborhoods.\n\nThe power of “place” extends to the modern\
    \ era whereby mortgage security redlining is no longer a “formal” practice, but\
    \ many of these areas have locked-in land-use systems.\n\n## Mapping Inequality\
    \ Redlining in New Deal America\n\nIntroduction Downloads & Data About Contact\
    \ Us American Panorama\n\nmap options\n\nSearch for city\n\n### Manhattan, NY\n\
    \n### Areas by Grade\n\n| Area Grade | |\n|---|---|\n| 10% | A \"Best\" |\n| 25%\
    \ | B \"Still Desirable\" |\n| 11% | C \"Definitely Declining\" |\n| 54% | D \"\
    Hazardous\" |\n\n### Demographics\n\n- 1,889,924 Total Population (1940)\n- 54.9%\
    \ Native-born white\n- 28.6% Foreign-born white\n- 15.8% African American\n- 1.8%\
    \ Foreign-born African American\n- 0.7% Asian American\n\n### Area Descriptions\n\
    \nclick to select\n\nsearch\n\nSelections from the Area Descriptions\n\nC5\n\n\
    ![](img/d9a4de69dc9f5461c7bf43698eae7be6_52_0.png)\n\n## Figure 2-9. HOLC grades\
    \ in NYC Redlining Map of the 1930s\n\n*Redlining* locks in place land-use systems\
    \ so that certain areas outside of the best classifications (green or blue) will\
    \ likely have more flooding (more asphalt), fewer parks, limited treeline, closer\
    \ proximity to waste disposal, and closer proximity to interstate freeways (pollution),\
    \ and likely have experience higher surface temperatures adding the additional\
    \ risk of adverse climate effects.\n\nUrban heat islands are man-made or natural\
    \ locations with higher temperatures. Neighborhoods with more greenery, less impervious\
    \ surfaces or less industrial or buildings are yellow with the warmer areas indicated\
    \ by orange to red hues. The incredible evolution of NYC since redlining of neighborhoods\
    \ perceived as dangerous to its current overall low urban heat seem the exception\
    \ to these land-use trends. If you explore the cluster of urban heat islands (marked\
    \ by arrows) and revisit Figure 2-9 these might be areas for deeper investigation.\n\
    \n![](img/d9a4de69dc9f5461c7bf43698eae7be6_54_0.png)\n\n## Figure 2-10. Urban\
    \ heat islands, ArcGIS\n\nThe historic map shown in Figure 2-11 was generated\
    \ in QGIS using downloadable data from the Mapping Inequality website. We could\
    \ rectify the map with modern maps and add population demographic data and climate\
    \ information to tell a complete story, a story impossible to tell without thinking\
    \ spatially.\n\n![](img/d9a4de69dc9f5461c7bf43698eae7be6_56_0.png)\n\n## Figure\
    \ 2-11. HOLC grades in NYC Redlining Map of the 1930s QGIS\n\nI was curious to\
    \ see how cleanly the historic map might be recreated within QGIS. I manually\
    \ updated the legend but otherwise, the spatial elements were pulled into the\
    \ map fairly seamlessly.\n\nFigure 2-12 includes the attributes “state”, \"city\"\
    , \"holc_grade\", neighborhood and area descriptions available as additional information\
    \ to create a narrative. Attribute tables are resources for geographic and non-geographic\
    \ data.\n\n![](img/d9a4de69dc9f5461c7bf43698eae7be6_57_0.png)\n\nIn Chapter 3\
    \ you will begin to interact with actual data and expand your ability to integrate\
    \ geospatial thinking and location intelligence into your data workflows.\n\n\
    ## Data Resources\n\nHere are the relevant links to resources discussed in this\
    \ chapter:\n\n- Natural Earth: Populated Places\n- Uber Movement\n- HOLC “Redlining”\
    \ Maps: The Persistent Structure Of Segregation And Economic Inequality\n\n##\
    \ About the Author\n\n**Dr. Bonny P. McClain** is a member of the National Press\
    \ Club, 500 Women Scientists, and Investigational Reporters and Editors allowing\
    \ access to a wide variety of health policy and health economic discussions.\n\
    \nBonny applies advanced data analytics including data engineering and geoenrichment\
    \ to discussions of poverty, race, and gender. Her research targets judgements\
    \ about social determinants, racial equity, and elements of intersectionality\
    \ to illuminate the confluence of metrics contributing to poverty. Moving beyond\
    \ zipcodes to explore apportioned socioeconomic data based on underlying population\
    \ data leads to discovering novel variables based on location to build more context\
    \ to complex data questions.\n\nIn order to influence change or pathways to mitigate\
    \ factors contributing to “poverty” we need to evaluate the measures that influence\
    \ the social context. Core themes of racism, class exploitation, sexism and nationalism\
    \ and heterosexism all contribute to social inequality. Professionally and personally\
    \ she redefines how we measure these attributes and how we can more accurately\
    \ identify factors amenable to intervention. Spatial data hosts a variety of physical\
    \ and cultural features to reveal distribution patterns helping analysts and data\
    \ professionals understand underlying causes of these patterns. The ability to\
    \ query these relationships can inform policy and identify solutions.\n\nBonny\
    \ is a Tableau User Group Leader, Tableau Speaker’s Bureau member and Data Analytics\
    \ Professional. Her professional goals include working to improve data literacy\
    \ through education, Tableau skill integration, as well as R, Python, and Tableau\
    \ Prep tools, exploring large datasets and curating empathetic answers to larger\
    \ questions--making a big world seem smaller."
  mdcn: "## 图 2-7. 从 Uber Movement 下载数据\n\n以图 2-8 为例，让我们观察旧金山市民中心 30 分钟内的距离。这类地图被称为*等时线地图*。等时线地图描绘了在特定时间阈值内可到达的区域，是做出关于空间概念关键决策的资源示例。\n\
    \n仅通过编写 Python 代码，就可以可视化旧金山某地点 30 分钟车程内的地理区域。在 Uber Movement 网站下载数据后，可以在 QGIS\
