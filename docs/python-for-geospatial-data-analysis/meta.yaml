    What I hope to share here is not the complete coding paradigm of Python. But by
    learning how to write actionable code either within a notebook or a console within
    QGIS, we can learn by doing. The book contains simple examples, and we will be
    exploring these concepts in more detail as we move through the chapters. Graphics
    in earlier chapters are included to familiarize you with how these maps or relationships
    may be rendered. Later chapters explore the code and platforms empowering Python
    as a resource for answering geospatial questions.


    When formulating a data question, I like to refer to Tobler’s First Law of Geography.
    For example, examining access to public transportation at the community level,
    understanding how transportation and commute times impact neighborhood home values
    outside of New York City are important considerations.


    > *Everything is related to everything else, but near things are more related
    than distant things.*


    —Waldo Tobler’s First Law of Geography


    The homes within a certain buffer region of Manhattan are likely to share a wider
    variety of attributes when compared to outer more distant regions. The ability
    to map the areas and focus on home values within a certain radius might be confirmatory.


    Geospatial data is being collected everywhere. Dynamic sensors with temporal metrics
    are generating massive amounts of data often being made available to the public.
    Using open source solutions optimized for geospatial projects is my primary goal.
    Python is the missing piece for flexibility in manipulating data in both open
    source and proprietary systems. It is fairly easy to learn, and has a variety
    of libraries to pivot and reshape tables, merge data, and generate plots either
