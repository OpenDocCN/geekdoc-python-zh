    of spatial data and launched my integration of geospatial applications like ArcGIS
    and QGIS into my talks about poverty, racial inequity, structural determinants
    of health, and a wide variety of new questions continuing to emerge. When you
    rely on spreadsheets or tables of data, I would argue in the absence of spatial
    considerations you might be missing out on critical insights. Static metrics like
    where a road might be located, or the coordinates of a specific event, or dynamic
    measures like the spread of an infectious disease become more powerful when integrated
    with location intelligence.


    A problem uniquely solved by spatial analysis examines the relationships between
