- md: "## Figure 2-7. Downloading data from Uber Movement\n\nBy way of an example,\
    \ let’s observe distances within 30 minutes of the Civic Center in San Francisco\
    \ in Figure 2-8. These types of maps are known as *isochrone maps*. Isochrone\
    \ maps depict areas accessible within a specific time threshold and are an example\
    \ of a resource for making key decisions about spatial concepts.\n\nSimply by\
    \ writing Python code it is possible to visualize the geographic areas within\
    \ a 30-minute travel distance of a location in San Francisco. Downloading data\
    \ on the Uber Movement website it is possible to ask bigger questions within the\
    \ QGIS platform.\n\n30min_isochrone_sf — QGIS\n\nBrowser (2)\n\nType here to filter\
    \ visible items...\n\n- Music\n- my-tabpy-env\n- opt\n- Pictures\n- Public\n-\
