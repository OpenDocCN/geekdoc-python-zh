  md: 'Figure 2-9. HOLC grades in NYC Redlining Map of the 1930s


    *Redlining* locks in place land-use systems so that certain areas outside of the
    best classifications (green or blue) will likely have more flooding (more asphalt),
    fewer parks, limited treeline, closer proximity to waste disposal, and closer
    proximity to interstate freeways (pollution), and likely have experience higher
    surface temperatures adding the additional risk of adverse climate effects.


    Urban heat islands are man-made or natural locations with higher temperatures.
    Neighborhoods with more greenery, less impervious surfaces or less industrial
    or buildings are yellow with the warmer areas indicated by orange to red hues.
    The incredible evolution of NYC since redlining of neighborhoods perceived as
    dangerous to its current overall low urban heat seem the exception to these land-use
    trends. If you explore the cluster of urban heat islands (marked by arrows) and
    revisit [Figure 2-9](#figure-2-9) these might be areas for deeper investigation.'
