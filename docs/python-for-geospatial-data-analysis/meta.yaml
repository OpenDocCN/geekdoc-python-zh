    ![](img/d9a4de69dc9f5461c7bf43698eae7be6_19_3.png)


    摩尔威德投影


    ![](img/d9a4de69dc9f5461c7bf43698eae7be6_19_4.png)


    兰伯特方位等面积投影


    ![](img/d9a4de69dc9f5461c7bf43698eae7be6_19_5.png)


    汉默投影


    ![](img/d9a4de69dc9f5461c7bf43698eae7be6_19_6.png)


    ![](img/d9a4de69dc9f5461c7bf43698eae7be6_19_7.png)


    图1-6. 等面积投影


    图1-6展示了几种投影，你可以看到它们对我们可视化的影响。如果你在所有这些等面积投影中查看格陵兰岛，你会看到它保持了适当的比例。


    另一方面，像图1-7所示的墨卡托投影地图，在靠近两极的区域会产生变形。我们可以根据所选投影的不同，展示我们创建的地图之间的差异。这将在我们后续章节选择坐标系时变得明显。


    ![](img/d9a4de69dc9f5461c7bf43698eae7be6_20_0.png)


    图1-7. 墨卡托投影


    既然你已经了解了空间数据分析的广泛目标，那么请思考从地方社区一直到社会和全球层面所面临的挑战。例如，想想环境、医疗保健、生物学、地理学、经济学、历史、工程学、地方政府、城市规划和供应链管理。即使是像医疗保健可及性、环境法规、社区规划和交通这样看似地方性或区域性的问题，也跨越了物理和政治边界、生态区域、市政区和流域，并具有空间组成部分。由于地图是我们对数据可视化最早的欣赏之一，因此在审视我们的数据后，我们可能会对位置产生好奇，这是有道理的。


    地理信息系统（GIS）持续分析数据，并在广泛的行业中提供实时洞察。尽管空间分析和非空间分析之间可能存在相似之处，但空间统计是专门为处理地理数据而开发的。两者都与地理要素相关，但空间统计专门研究地理编码的地理空间数据。例如，当想象机场数据时，有非空间统计变量，如区域或用途（军事、民用/公共）或准点到达和起飞，也有用于分析的空间组成部分（高程和地理坐标）。与传统的非空间统计方法不同，它们将空间（邻近性、面积、连通性和/或其他空间关系）直接纳入其数学计算中。此外，对于那些用Python编写的工具，源代码是可用的，以鼓励你学习、修改、扩展和/或与他人分享这些以及其他分析工具。这些复杂的问题是空间性的。这些问题发生在哪里？我们如何规划以在未来取得更好的结果？


    > 注意


    如前所述，我更喜欢将我所做的描述为*位置智能*。这很有道理，也比说你在GIS领域工作要清晰得多。为什么要用工具来定义一项分析呢？专注于成果要好得多。


    *空间思维*的概念，涉及邻近性、重叠包含、邻接性，以及测量地理空间和要素与现象之间相互关系的方式。这就是我们通过空间素养入门可以学到的东西。*空间素养*始于内容知识以及对系统及其如何与'
