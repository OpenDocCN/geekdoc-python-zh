    Figure 2-8. Uber travel times in San Francisco


    We will delve more into the “how to” of creating visualizations and maps after
    a brief introduction to Python. You don’t need prior knowledge to be able to follow
    along, and my goal is to give you a nice starting point to begin coding beyond
    the Python console in QGIS. So far, there has been no need to write any Python
    code, and the maps presented are easily generated without integrating any additional
    frameworks.


    # Mapping Inequalities


    Before we launch into integrating Python with QGIS and other platforms, I wanted
    to end this chapter with a powerful visualization that demonstrates the value
    of place and location when considering a data question.


    Mapping Inequality Redlining in New Deal America presents data from the Home Owners’
    Loan Corporation (HOLC). Here’s how the site introduces the project:


    Among the thousands of area descriptions created by agents of the federal government’s
    Home Owners’ Loan Corporation between 1935 and 1940, the one that was written
    for what is now called the Carver Heights neighborhood in Savannah, Georgia, stands
    out. HOLC staff members, using data and evaluations organized by local real estate
    professionals--lenders, developers, and real estate appraisers--in each city,
    assigned grades to residential neighborhoods that reflected their “mortgage security”
    that would then be visualized on color-coded maps. Neighborhoods receiving the
    highest grade of “A"--colored green on the maps--were deemed minimal risks for
    banks and other mortgage lenders when they were determining who should receive
    loans and which areas in the city were safe investments. Those receiving the lowest
    grade of “D,” colored red, were considered “hazardous.”


    The interactive website allows selection of specific cities of interest. I selected
    NYC to see historical areas where I spend a lot of time. I have walked the neighborhoods
    of NYC for many years, watching economic investments into neighborhoods once too
    dangerous to roam. The 1930s'
  - '[PAGE 51]


    redlining highlighted park hugging neighborhoods as “still desirable” and “best”
    as long as distance was kept from Harlem and primarily black neighborhoods.


    The power of “place” extends to the modern era whereby mortgage security redlining
    is no longer a “formal” practice, but many of these areas have locked- in land-use
    systems.'
