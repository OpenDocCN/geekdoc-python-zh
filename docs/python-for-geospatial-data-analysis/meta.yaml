  mdcn: '无论是使用笔记本电脑还是依赖像QGIS这样带有托管Python插件的开源工具，都是本书的重点。


    随着数据可视化变得越来越重要，想想我们最熟悉的图形：地图。我们对查看地图的熟悉程度，掩盖了其背后信息的多层复杂性、多个数据集的交互性，甚至是我们传达发现的方式。开源数据和平台的可及性，将空间数据科学扩展到了不仅是专业人士，也包括爱好者和个体分析师。但我们也需要保持谨慎。熟悉并不等同于准确或胜任。


    像[OpenStreetMap](https://www.openstreetmap.org/)这样的开源平台，允许我们放大到细节层面，揭示景观中的结构，并为我们的分析添加属性。有些Python包，比如OSMnx，允许将OpenStreetMap下载到Jupyter
    Notebook中，而无需依赖特定的应用程序或工具（更多信息请参见附近的注释）。


    [OSMnx](https://github.com/gboeing/osmnx)是一个Python包，它允许你从OpenStreetMap下载空间数据，并对真实的街道网络进行建模、投影、可视化和分析。你可以用一行Python代码下载并建模可步行、可驾驶或可骑行的城市网络，然后轻松地进行分析和可视化。你同样可以轻松地下载和处理其他基础设施类型、便利设施/兴趣点、建筑轮廓、高程数据、街道方位/朝向以及速度/出行时间。


    ## 空间数据科学的概念框架


    地球并非完美的球体。考虑到地球的化学性质，以及在太空中旋转产生的离心力会倾向于将中间部分向外推，导致其呈扁球体形状，这就说得通了。从技术上讲，地球的形状是一个椭球体，绕两极的周长比绕赤道的周长要短，就像这个星球从上到下被挤压过一样。当我们试图绘制地表地图时，我们会采用一个地理坐标系，并将其转换为投影坐标系——用于平面地图。*经纬网*（地图的纬度和经度线框架）的建立，由QGIS和其他GIS应用程序加速完成。坐标系试图以接近单一事实来源的有意义方式呈现位置数据。这些不同的投影被称为*圆锥投影*、*方位投影*和*圆柱投影*。每一种都会留下必须处理的变形。根据所选的坐标系，我们可能会在面积、距离、方向和大小上出现变形。你会很高兴知道，我们不需要独自应对这些妥协——软件处理了大部分复杂的数学计算。图1-5展示了一个地理坐标系。


    ![](img/d9a4de69dc9f5461c7bf43698eae7be6_17_0.png)


    © Encyclopædia Britannica, Inc.


    图1-5. 地理坐标系。


    如果你使用OpenStreetMap或谷歌地图，你会熟悉Web墨卡托坐标系。熟悉这些地图的变体将使你能够选择最佳投影，因为需要做出妥协。例如，在我从事人口健康领域的工作时，在投影中保持面积至关重要。如果我在地图上绘制百分比或原始数字，并且我希望尽可能公正，不让一个小地方看起来比其他地方大太多，那么其中就存在一种固有的偏见，影响我对该地图的解读。我将尽力审视投影的弱点和优势，并说：“我将选择一个保持面积的投影。”


    保持面积的地图被称为*等面积投影*。后面的章节将更详细地讨论这一点。我将回顾QGIS和ArcMap，并展示它们如何转换投影以获得最佳制图效果。因为地球不是一个完美的球体，我们确实必须做出妥协并接受一点点变形。但如果我们确保与可视化最相关的度量标准在所选坐标系中得到体现，我们就已经成功了大半。自然，我们希望我们的值与现实世界中的实际值紧密匹配。一个有趣数据集中的“在哪里”问题的现实，往往是视觉传达的推动力。例如，空间现象通常是迭代的而非线性的。也许你对某个系统地理的范围或尺度感到好奇。你从哪里开始？整个世界无法放在一张纸或一个电脑屏幕上——至少无法以一种可供解读的可见方式呈现。


    与地球仪精度（记住我们试图在平面上表示椭球体几何形状）的误差或偏差，通常由Goldberg-Gott误差分数来衡量。最近一次最小化误差的尝试是由J. Richard
    Gott及其同事研究的。作为参考，流行的墨卡托投影（图1-7）的误差分数为8.296，而温克尔三重投影为4.563。较低的分数反映了在平面地图渲染中更少的误差或妥协。新的J.
    Richard Gott地图（0.881）与地球仪（0.0）相比，是迄今为止误差分数最低的。


    ![](img/d9a4de69dc9f5461c7bf43698eae7be6_19_0.png)


