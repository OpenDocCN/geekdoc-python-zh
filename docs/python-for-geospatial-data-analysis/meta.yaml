    \ dissolve (by attribute)\n\nLayer Styling | Processing Toolbox\n\nIdentify Results\n\
    \n| Feature | Value |\n|---|---|\n| san_francisco_censustracts | |\n| DISPLAY_NAME\
    \ | 0 The Embarcadero, North Beach, San Fr... |\n| (Derived) | |\n\nMode: Current\
