  md: 'Figure 2-3. Population Data by Population Expression window (QGIS)


    Describing different types of attributes might be helpful as you explore the attribute
    table. We will do this in detail when we build maps together in Chapter 5. Does
    the measure we hope to map depend on the size of the unit? For reference, I selected
    pop_max as an attribute, which is an example of a *spatially extensive attribute*.
    Population counts are associated with an area, but if we divide the population
    into smaller areas, the counts would not necessarily be proportional, since population
    is rarely uniformly distributed. Because we are summarizing a specific area, population
    counts, for example, are only accurate if they represent the area as a whole.
    These attributes apply to length, area, or volume, for example. If you change
    the length, or increase or decrease the area or the volume, you are changing the
    size of the unit, so the measures will change.


    A *spatially intensive attribute* like population density is not dependent on
    the size of the area. If the unit is assumed to be homogenous, then these values
    can describe any part of it, whereas spatially *extensive* variables, such as
    population count, are spatially dependent.


    Figure 2-4 displays the expression window where you are able to select populations
    that are larger than 1,000,000. Selecting pop_max and writing a simple SQL expression
    including the “adm0cap” field from the attribute table selects cities larger than
    1,000,000 that are also capital cities. If you are interested in examining specific
    parts of the population you can filter the values to represent specific attributes.'
