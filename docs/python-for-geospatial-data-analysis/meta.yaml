    Figure 1-4. Risk Index Summer Meals (ArcGIS)


    Open source resources like the Census API yield demographic data accessible for
    retrieval with a few lines of code in Python. If you aren’t familiar with API,
    it stands for *application programming interface*, a computer interface enabling
    data transmission between software products. The beauty is in the interface part.
    The Census API is a wrapper for the United States Census. You can now pull specific
    data from the annual ACS and the census without downloading entire humongous files
    of data. Geographies are also captured in census data either at the census website
    or downloadable from IPUMS, formally known as Integrated Public Use Microdata
    Series. The beauty of IPUMS includes person-level data, the harmonization of variables
    across surveys and the ability to easily download raw data files.


    > ### NOTE


    From the IPUMS website:


    *IPUMS provides census and survey data from around the world integrated across
    time and space. IPUMS integration and documentation makes it easy to study change,
    conduct comparative research, merge information across data types, and analyze
    individuals within family and community context. Data and services are available
    free of charge.*


    In my evolution as a data analyst, I began to realize I had bigger and more complex
    questions to consider, and I needed more resources. With an eye towards working
    with Census data, I enrolled in an online executive education course in applied
    analytics sponsored by Columbia School of Engineering. I had worked in the R programming
    language, so was a bit nervous when I realized the entire course would be taught
    in Python. I made it through but remember feeling a little whiplashed. After months
    of completing assignments and a capstone project, I wasn’t sure how to apply these
    facts to emerging tasks at hand. I learned a lot in the following months that
    I wish I had been taught in parallel to learning how to code. What are some real-world
    examples of recursive iteration? Which functions will simplify my work as I wrestle
    with large datasets? I work independently and was hoping for a solid workflow
    to guide me through my tasks. My data analytics company is small -- an *n* of
    1 to be accurate. The buck starts and stops on my desk.


    What I hope to share here is not the complete coding paradigm of Python. But by
    learning how to write actionable code either within a notebook or a console within
    QGIS, we can learn by doing. The book contains simple examples, and we will be
    exploring these concepts in more detail as we move through the chapters. Graphics
    in earlier chapters are included to familiarize you with how these maps or relationships
    may be rendered. Later chapters explore the code and platforms empowering Python
    as a resource for answering geospatial questions.


    When formulating a data question, I like to refer to Tobler’s First Law of Geography.
    For example, examining access to public transportation at the community level,
    understanding how transportation and commute times impact neighborhood home values
    outside of New York City are important considerations.


    > *Everything is related to everything else, but near things are more related
    than distant things.*


    —Waldo Tobler’s First Law of Geography


    The homes within a certain buffer region of Manhattan are likely to share a wider
    variety of attributes when compared to outer more distant regions. The ability
    to map the areas and focus on home values within a certain radius might be confirmatory.


    Geospatial data is being collected everywhere. Dynamic sensors with temporal metrics
    are generating massive amounts of data often being made available to the public.
    Using open source solutions optimized for geospatial projects is my primary goal.
    Python is the missing piece for flexibility in manipulating data in both open
    source and proprietary systems. It is fairly easy to learn, and has a variety
    of libraries to pivot and reshape tables, merge data, and generate plots either
    inside or outside of a desktop environment.


