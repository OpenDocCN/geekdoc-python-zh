- md: "## 4.3.3 The Flexibility of Python Functions\n\nAs we discussed in the *previous\
    \ lecture*, Python functions are very flexible. In particular\n\n- Any number\
    \ of functions can be defined in a given file.\n- Functions can be (and often\
    \ are) defined inside other functions.\n- Any object can be passed to a function\
    \ as an argument, including other functions.\n- A function can return any kind\
    \ of object, including functions.\n\nWe will give examples of how straightforward\
    \ it is to pass a function to a function in the following sections.\n\n## 4.3.4\
    \ One-Line Functions: lambda\n\nThe `lambda` keyword is used to create simple\
    \ functions on one line. For example, the definitions\n\n```python\ndef f(x):\n\
    \    return x**3\n```\n\nand\n\n```python\nf = lambda x: x**3\n```\n\nare entirely\
    \ equivalent. To see why `lambda` is useful, suppose that we want to calculate\
    \ $\\int_0^2 x^3 dx$ (and have forgotten our high-school calculus). The SciPy\
    \ library has a function called `quad` that will do this calculation for us. The\
    \ syntax of the `quad` function is `quad(f, a, b)` where `f` is a function and\
    \ `a` and `b` are numbers. To create the function $f(x) = x^3$ we can use `lambda`\
    \ as follows\n\n```python\nfrom scipy.integrate import quad\n\nquad(lambda x:\
    \ x**3, 0, 2)\n```\n\n(4.0, 4.440892098500626e-14)\n\nHere the function created\
    \ by `lambda` is said to be *anonymous* because it was never given a name.\n\n\
    ## 4.3.5 Why Write Functions?\n\nUser-defined functions are important for improving\
    \ the clarity of your code by\n\n- separating different strands of logic\n- facilitating\
    \ code reuse\n\n(Writing the same thing twice is [almost always a bad idea](https://www.google.com/search?q=almost+always+a+bad+idea))\
    \ We will say more about this *later*.\n\n## 4.4 Applications\n\n### 4.4.1 Random\
    \ Draws\n\nConsider again this code from the *previous lecture*\n\n```python\n\
    ts_length = 100\nϵ_values = []   # empty list\n\nfor i in range(ts_length):\n\
    \    e = np.random.randn()\n    ϵ_values.append(e)\n\nplt.plot(ϵ_values)\nplt.show()\n\
    ```\n\nWe will break this program into two parts:\n\n1. A user-defined function\
    \ that generates a list of random variables.\n2. The main part of the program\
    \ that\n   1. calls this function to get data\n   2. plots the data\n\nThis is\
    \ accomplished in the next program\n\n```python\ndef generate_data(n):\n    ε_values\
    \ = []\n    for i in range(n):\n        e = np.random.randn()\n        ε_values.append(e)\n\
    \    return ε_values\n\ndata = generate_data(100)\nplt.plot(data)\nplt.show()\n\
    ```\n\nWhen the interpreter gets to the expression `generate_data(100)`, it executes\
    \ the function body with `n` set equal to 100.\n\nThe net result is that the name\
    \ `data` is *bound* to the list `ε_values` returned by the function.\n\n### 4.4.2\
    \ Adding Conditions\n\nOur function `generate_data()` is rather limited. Let's\
    \ make it slightly more useful by giving it the ability to return either standard\
    \ normals or uniform random variables on (0, 1) as required. This is achieved\
    \ in the next piece of code.\n\n```python\ndef generate_data(n, generator_type):\n\
    \    ε_values = []\n    for i in range(n):\n        if generator_type == 'U':\n\
    \            e = np.random.uniform(0, 1)\n        else:\n            e = np.random.randn()\n\
    \        ε_values.append(e)\n    return ε_values\n\ndata = generate_data(100,\
    \ 'U')\nplt.plot(data)\nplt.show()\n```\n\nHopefully, the syntax of the if/else\
    \ clause is self-explanatory, with indentation again delimiting the extent of\
    \ the code blocks.\n\nNotes\n\n- We are passing the argument U as a string, which\
    \ is why we write it as 'U'.\n- Notice that equality is tested with the == syntax,\
    \ not =.\n    - For example, the statement a = 10 assigns the name a to the value\
    \ 10.\n    - The expression a == 10 evaluates to either True or False, depending\
    \ on the value of a.\n\nNow, there are several ways that we can simplify the code\
    \ above. For example, we can get rid of the conditionals all together by just\
    \ passing the desired generator type *as a function*. To understand this, consider\
    \ the following version.\n\n```python\ndef generate_data(n, generator_type):\n\
    \    ε_values = []\n    for i in range(n):\n        e = generator_type()\n   \
    \     ε_values.append(e)\n    return ε_values\n\ndata = generate_data(100, np.random.uniform)\n\
    plt.plot(data)\nplt.show()\n```\n\nNow, when we call the function `generate_data()`,\
    \ we pass `np.random.uniform` as the second argument. This object is a *function*.\n\
    \nWhen the function call `generate_data(100, np.random.uniform)` is executed,\
    \ Python runs the function code block with `n` equal to 100 and the name `generator_type`\
    \ “bound” to the function `np.random.uniform`.\n\n- While these lines are executed,\
    \ the names `generator_type` and `np.random.uniform` are “synonyms”, and can be\
    \ used in identical ways.\n\nThis principle works more generally—for example,\
    \ consider the following piece of code\n\n```python\nmax(7, 2, 4)  # max() is\
    \ a built-in Python function\n```\n\n```\n7\n```\n\n```python\nm = max\nm(7, 2,\
    \ 4)\n```\n\n```\n7\n```\n\nHere we created another name for the built-in function\
    \ `max()` , which could then be used in identical ways. In the context of our\
    \ program, the ability to bind new names to functions means that there is no problem\
    \ *passing a function as an argument to another function*—as we did above.\n\n\
    ## 4.5 Recursive Function Calls (Advanced)\n\nThis is not something that you will\
    \ use every day, but it is still useful — you should learn it at some stage. Basically,\
    \ a recursive function is a function that calls itself. For example, consider\
    \ the problem of computing $x_t$ for some t when\n\n$x_{t+1} = 2x_t, \\quad x_0\
    \ = 1$\n\nObviously the answer is $2^t$. We can compute this easily enough with\
    \ a loop\n\n```python\ndef x_loop(t):\n    x = 1\n    for i in range(t):\n   \
    \     x = 2 * x\n    return x\n```\n\nWe can also use a recursive solution, as\
    \ follows\n\n```python\ndef x(t):\n    if t == 0:\n        return 1\n    else:\n\
    \        return 2 * x(t-1)\n```\n\nWhat happens here is that each successive call\
    \ uses its own *frame* in the *stack*\n\n- a frame is where the local variables\
    \ of a given function call are held\n- stack is memory used to process function\
    \ calls\n    - a First In Last Out (FILO) queue\n\nThis example is somewhat contrived,\
    \ since the first (iterative) solution would usually be preferred to the recursive\
    \ solution. We'll meet less contrived applications of recursion later on.\n\n\
    ## 4.6 Exercises\n\n**Exercise 4.6.1**\nRecall that $n!$ is read as “$n$ factorial”\
    \ and defined as $n! = n \\times (n - 1) \\times \\cdots \\times 2 \\times 1$.\
    \ We will only consider $n$ as a positive integer here. There are functions to\
    \ compute this in various modules, but let’s write our own version as an exercise.\n\
    \n1. In particular, write a function `factorial` such that `factorial(n)` returns\
    \ $n!$ for any positive integer $n$.\n2. In addition, try to add a new argument\
    \ for your function. The argument takes a function $f$ that transforms $n$ to\
    \ $f(n) = n^2 + 1$ if $n$ is even, and $f(n) = n^2$ if $n$ is odd. The default\
    \ value should be $f(n) = n$.\n\nFor example\n\n- The default case `factorial(3)`\
    \ should return $3!$\n- `factorial(3, f)` should return $9!$\n- `factorial(2,\
    \ f)` should return $5!$\n\nTry to use lambda expressions to define the function\
    \ $f$.\n\n**Solution to Exercise 4.6.1**\nHere’s one solution for part 1\n\n```python\n\
    def factorial(n):\n    k = 1\n    for i in range(n):\n        k = k * (i + 1)\n\
    \    return k\n\nfactorial(4)\n```\n\n```\n24\n```\n\nAdding the lambda expression\n\
    \n```python\ndef factorial(n, f = lambda x: x):\n    k = 1\n    for i in range(f(n)):\n\
    \        k = k * (i + 1)\n    return k\n\nfactorial(9) # default\n```\n\n```\n\
    362880\n```\n\n```python\nf = lambda x: x**2 + 1 if x % 2 == 0 else x**2\n\nfactorial(3,\
    \ f) # odd (equivalent to factorial(9))\n```\n\n```\n362880\n```\n\n```python\n\
    factorial(2, f) # even (equivalent to factorial(5))\n```\n\n```\n120\n```\n\n\
    ### Exercise 4.6.2\n\nThe binomial random variable $Y \\sim Bin(n, p)$ represents\
    \ the number of successes in $n$ binary trials, where each trial succeeds with\
    \ probability $p$.\n\nWithout any import besides `from numpy.random import uniform`,\
    \ write a function `binomial_rv` such that `binomial_rv(n, p)` generates one draw\
    \ of $Y$.\n\n> **Hint:** If $U$ is uniform on $(0, 1)$ and $p \\in (0, 1)$, then\
    \ the expression `U < p` evaluates to `True` with probability $p$.\n\n### Solution\
    \ to Exercise 4.6.2\n\nHere is one solution:\n\n```python\nfrom numpy.random import\
    \ uniform\n\ndef binomial_rv(n, p):\n    count = 0\n    for i in range(n):\n \
    \       U = uniform()\n        if U < p:\n            count = count + 1    # Or\
    \ count += 1\n    return count\n\nbinomial_rv(10, 0.5)\n```\n\n```\n8\n```\n\n\
    ### Exercise 4.6.3\n\nFirst, write a function that returns one realization of\
