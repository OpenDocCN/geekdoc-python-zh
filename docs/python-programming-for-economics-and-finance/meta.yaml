    \ can only compile a subset of Python.\nHowever, that subset is ever expanding.\n\
    For example, Numba is now quite effective at compiling classes.\nIf a class is\
    \ successfully compiled, then its methods act as JIT-compiled functions.\nTo give\
    \ one example, let's consider the class for analyzing the Solow growth model we\
