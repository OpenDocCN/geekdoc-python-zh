  md: '# 6.4 Summary


    Messages in this lecture are clear:


    +   - In Python, *everything in memory is treated as an object*.

    - Zero, one or many names can be bound to a given object.

    - Every name resides within a scope defined by its namespace.


    This includes not just lists, strings, etc., but also less obvious things, such
    as


    +   - functions (once they have been read into memory)

    - modules (ditto)

    - files opened for reading or writing

    - integers, etc.


    Consider, for example, functions.

    When Python reads a function definition, it creates a **function object** and
    stores it in memory.

    The following code illustrates further this idea


    ```

    #reset the current namespace

    %reset

    ```


    ```

    def f(x): return x**2

    f

    ```


    ```

    <function __main__.f(x)>

    ```


    ```

    type(f)

    ```


    ```

    function

    ```


    ```

    id(f)

    ```


    ```

    140472213439648

    ```


    ```

    f.__name__

    ```


    ```

    ''f''

    ```


    We can see that f has type, identity, attributes and so on—just like any other
    object.

    It also has methods.

    One example is the `__call__` method, which just evaluates the function


    ```

    f.__call__(3)

    ```'
