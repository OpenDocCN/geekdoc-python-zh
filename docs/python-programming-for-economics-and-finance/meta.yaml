    plt.rcParams[''figure.figsize''] = (10,6)


    # Fixing random state for reproducibility

    np.random.seed(19680801)


    # Compute pie slices

    N = 20

    θ = np.linspace(0.0, 2 * np.pi, N, endpoint=False)

    radii = 10 * np.random.rand(N)

