    \n## 7.3.3 Example: A Market\n\nNext, let's write a class for competitive market\
    \ in which buyers and sellers are both price takers.\n\nThe market consists of\
    \ the following objects:\n\n- A linear demand curve $Q = a_d - b_d p$\n- A linear\
