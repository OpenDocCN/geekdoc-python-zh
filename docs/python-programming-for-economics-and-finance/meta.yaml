  md: "# 8.2 Working with Python files\n\nPython files are used when writing long,\
    \ reusable blocks of code - by convention, they have a .py suffix.\nLet us begin\
    \ by working with the following example.\n\n```\nListing 8.1: sine_wave.py\n\n\
    python\nimport matplotlib.pyplot as plt\nimport numpy as np\n\nx = np.linspace(0,\
    \ 10, 100)\ny = np.sin(x)\n\nplt.plot(x, y)\nplt.xlabel('x')\nplt.ylabel('y')\n\
    plt.title('Sine Wave')\nplt.show()\n```\n\nThe code is first saved locally on\
    \ the computer before it is executed.\nAs there are various ways to execute the\
    \ code, we will explore them in the context of different development environments.\n\
