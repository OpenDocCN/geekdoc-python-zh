  md: "# Python Programming for Economics and Finance\n\n# Solution to Exercise 18.5.1\n\
    \nHere's one solution, that uses a class:\n\n```\nclass Equilibrium:\n\n    def\
    \ __init__(self, α=0.1, β=1, γ=1, δ=1):\n        self.α, self.β, self.γ, self.δ\
    \ = α, β, γ, δ\n\n    def qs(self, p):\n        return np.exp(self.α * p) - self.β\n\
    \n    def qd(self, p):\n        return self.γ * p**(-self.δ)\n\n    def compute_equilibrium(self):\n\
    \        def h(p):\n            return self.qd(p) - self.qs(p)\n        p_star\
    \ = brentq(h, 2, 4)\n        q_star = np.exp(self.α * p_star) - self.β\n\n   \
    \     print(f'Equilibrium price is {p_star: .2f}')\n        print(f'Equilibrium\
    \ quantity is {q_star: .2f}')\n\n    def plot_equilibrium(self):\n        # Now\
    \ plot\n        grid = np.linspace(2, 4, 100)\n        fig, ax = plt.subplots()\n\
