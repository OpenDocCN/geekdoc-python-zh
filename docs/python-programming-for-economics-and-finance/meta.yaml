    \ 1)\n        d = np.sqrt((u - 0.5)**2 + (v - 0.5)**2)\n        if d < 0.5:\n\
    \            count += 1\n\n    area_estimate = count / n\n    return area_estimate\
    \ * 4  # dividing by radius**2\n```\n\n现在让我们看看它运行得有多快：\n\n```python\n%time calculate_pi()\n\
    ```\n\n```\nCPU times: user 148 ms, sys: 3.99 ms, total: 152 ms\nWall time: 152\
