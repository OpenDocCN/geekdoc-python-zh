  md: 'Moreover, the compiler is made aware of the data type by the programmer.


    +   - In this case 64 bit integers


    Hence, each successive data point can be accessed by shifting forward in memory
    space by a known and fixed amount.


    +   - In this case 8 bytes


    # Summing in Pure Python


    Python tries to replicate these ideas to some degree.

    For example, in the standard Python implementation (CPython), list elements are
    placed in memory locations that are in a sense contiguous.

    However, these list elements are more like pointers to data rather than actual
    data.

    Hence, there is still overhead involved in accessing the data values themselves.

    This is a considerable drag on speed.

    In fact, it’s generally true that memory traffic is a major culprit when it comes
    to slow execution.

    Let’s look at some ways around these problems.


    # 9.4 Vectorization


    There is a clever method called **vectorization** that can be used to speed up
    high level languages in numerical applications.

    The key idea is to send array processing operations in batch to pre-compiled and
    efficient native machine code.

    The machine code itself is typically compiled from carefully optimized C or Fortran.

    For example, when working in a high level language, the operation of inverting
    a large matrix can be subcontracted to efficient machine code that is pre-compiled
    for this purpose and supplied to users as part of a package.

    This clever idea dates back to MATLAB, which uses vectorization extensively.

    Vectorization can greatly accelerate many numerical computations (but not all,
    as we shall see).

    Let’s see how vectorization works in Python, using NumPy.


    # 9.4.1 Operations on Arrays


    First, let’s run some imports


    ```

