  md: "For example, a new array is created when x**2 is calculated.\nThe same is true\
    \ when y**2 is calculated, and then x**2 + y**2 and so on.\nNumba avoids creating\
    \ all these intermediate arrays by compiling one function that is specialized\
    \ to the entire operation.\nBut if this is true, then why isn't the Numba code\
    \ faster?\nThe reason is that NumPy makes up for its disadvantages with implicit\
    \ multithreading, as we've just discussed.\n\n# 16.3.4 Multi threading a Numba\
    \ Ufunc\n\nCan we get both of these advantages at once?\nIn other words, can we\
