  - "[PAGE 353]\n\n# 20.3.3 Handling Errors During Runtime\n\nThe approach used above\
    \ is a bit limited, because it always leads to termination.\nSometimes we can\
    \ handle errors more gracefully, by treating special cases.\nLet's look at how\
    \ this is done.\n\n# Catching Exceptions\n\nWe can catch and deal with exceptions\
    \ using `try-except` blocks.\nHere's a simple example\n\n```\ndef f(x):\n    try:\n\
    \        return 1.0 / x\n    except ZeroDivisionError:\n        print('Error:\
    \ division by zero. Returned None')\n        return None\n```\n\nWhen we call\
    \ `f` we get the following output\n\n```\nf(2)\n```\n\n```\n0.5\n```\n\n```\n\
    f(0)\n```\n\n```\nError: division by zero. Returned None\n```\n\n```\nf(0.0)\n\
    ```\n\n```\nError: division by zero. Returned None\n```\n\nThe error is caught\
    \ and execution of the program is not terminated.\nNote that other error types\
    \ are not caught.\nIf we are worried the user might pass in a string, we can catch\
    \ that error too\n\n```\ndef f(x):\n    try:\n        return 1.0 / x\n    except\
    \ ZeroDivisionError:\n        print('Error: Division by zero. Returned None')\n\
    \    except TypeError:\n        print(f'Error: x cannot be of type {type(x)}.\
    \ Returned None')\n    return None\n```\n\nHere's what happens\n\n```\nf(2)\n\
    ```"
  - "[PAGE 354]\n\n0.5\n\n```\nf(0)\n```\n\nError: Division by zero. Returned None\n\
    \n```\nf('foo')\n```\n\nError: x cannot be of type <class 'str'>. Returned None\n\
    \nIf we feel lazy we can catch these errors together\n\n```\ndef f(x):\n    try:\n\
    \        return 1.0 / x\n    except:\n        print(f'Error. An issue has occurred\
    \ with x = {x} of type: {type(x)}')\n        return None\n```\n\nHere's what happens\n\
    \n```\nf(2)\n```\n\n0.5\n\n```\nf(0)\n```\n\nError. An issue has occurred with\
    \ x = 0 of type: <class 'int'>\n\n```\nf('foo')\n```\n\nError. An issue has occurred\
    \ with x = foo of type: <class 'str'>\n\nIn general it's better to be specific.\n\
