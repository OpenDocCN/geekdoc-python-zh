    \nbisect(f, 0, 1)\n```\n\n```\n0.4082935042806639\n```\n\n### 12.4.2 牛顿-拉弗森法\n\
    \n另一种非常常见的求根算法是牛顿-拉弗森法。\n在 SciPy 中，该算法由 `scipy.optimize.newton` 实现。\n与二分法不同，牛顿-拉弗森法使用局部斜率信息来尝试提高收敛速度。\n\
    让我们使用上面定义的同一个函数 $f$ 来研究一下。\n使用合适的搜索初始条件，我们得到了收敛：\n\n```python\nfrom scipy.optimize\
    \ import newton\n\nnewton(f, 0.2)   # Start the search at initial condition x\
    \ = 0.2\n```\n\n```\n0.40829350427935673\n```\n\n但其他初始条件会导致收敛失败：\n\n```python\n\
    newton(f, 0.7)   # Start the search at x = 0.7 instead\n```\n\n```\n0.7001700000000279\n\
    ```\n\n### 12.4.3 混合方法\n\n数值方法的一个通用原则如下：\n\n- 如果你对给定问题有特定知识，你或许可以利用它来提高效率。\n-\
    \ 如果没有，那么算法的选择涉及速度和鲁棒性之间的权衡。\n\n在实践中，大多数用于求根、优化和不动点的默认算法都使用*混合*方法。\n\n这些方法通常以如下方式将快速方法与鲁棒方法结合起来：\n\
    \n1. 尝试使用快速方法\n2. 检查诊断信息\n3. 如果诊断信息不佳，则切换到更鲁棒的算法\n\n在 `scipy.optimize` 中，函数 `brentq`\
    \ 就是这样一种混合方法，是一个很好的默认选择\n\n```python\nfrom scipy.optimize import brentq\n\nbrentq(f,\
    \ 0, 1)\n```\n\n```\n0.40829350427936706\n```\n\n这里找到了正确的解，并且速度比二分法更快：\n\n```python\n\
    %timeit brentq(f, 0, 1)\n```\n\n```\n20.1 µs ± 170 ns per loop (mean ± std. dev.\
    \ of 7 runs, 10,000 loops each)\n```\n\n```python\n%timeit bisect(f, 0, 1)\n```\n\
    \n```\n80.6 µs ± 322 ns per loop (mean ± std. dev. of 7 runs, 10,000 loops each)\n\
    ```\n\n### 12.4.4 多元求根\n\n使用 `scipy.optimize.fsolve`，它是 MINPACK 中一个混合方法的包装器。\n\
    \n详情请参阅文档。\n\n### 12.4.5 不动点\n\n实函数 $f$ 在区间 $[a, b]$ 上的**不动点**是一个 $x \\in [a,\
