  md: "# Python Programming for Economics and Finance\n\n```\n'foobar'\n```\n\nIf\
    \ `a` and `b` are lists, then `a + b` requires list concatenation\n\n```\na, b\
    \ = ['foo'], ['bar']\na + b\n```\n\n```\n['foo', 'bar']\n```\n\n(We say that the\
    \ operator + is *overloaded* — its action depends on the type of the objects on\
    \ which it acts)\nAs a result, Python must check the type of the objects and then\
    \ call the correct operation.\nThis involves substantial overheads.\n\n# Static\
    \ Types\n\nCompiled languages avoid these overheads with explicit, static types.\n\
    For example, consider the following C code, which sums the integers from 1 to\
    \ 10\n\n```\n#include <stdio.h>\n\nint main(void) {\n    int i;\n    int sum =\
    \ 0;\n    for (i = 1; i <= 10; i++) {\n        sum = sum + i;\n    }\n    printf(\"\
    sum = %d\\n\", sum);\n    return 0;\n}\n```\n\nThe variables `i` and `sum` are\
    \ explicitly declared to be integers.\nHence, the meaning of addition here is\
    \ completely unambiguous.\n\n# 9.3.2 Data Access\n\nAnother drag on speed for\
    \ high-level languages is data access.\nTo illustrate, let's consider the problem\
    \ of summing some data — say, a collection of integers.\n\n# Summing with Compiled\
    \ Code\n\nIn C or Fortran, these integers would typically be stored in an array,\
    \ which is a simple data structure for storing homogeneous data.\nSuch an array\
    \ is stored in a single contiguous block of memory\n\n+   - In modern computers,\
    \ memory addresses are allocated to each byte (one byte = 8 bits).\n- For example,\
    \ a 64 bit integer is stored in 8 bytes of memory.\n- An array of $n$ such integers\
    \ occupies $8n$ **consecutive** memory slots."
