    When you want to do something interesting with Python, you almost always need
    to import additional functionality.


    # Packages


    As stated above, NumPy is a Python *package*.

    Packages are used by developers to organize code they wish to share.

    In fact, a package is just a directory containing


    +   1. files with Python code — called **modules** in Python speak

    2. possibly some compiled code that can be accessed by Python (e.g., functions
    compiled from C or FORTRAN code)

    3. a file called `__init__.py` that specifies what will be executed when we type
    `import package_name`


    You can check the location of your `__init__.py` for NumPy in python by running
    the code:


    ```

    import numpy as np


    print(np.__file__)

    ```


    # Subpackages


    Consider the line `epsilon_values = np.random.randn(100)`.

    Here `np` refers to the package NumPy, while `random` is a **subpackage** of NumPy.

    Subpackages are just packages that are subdirectories of another package.

    For instance, you can find folder `random` under the directory of NumPy.'
