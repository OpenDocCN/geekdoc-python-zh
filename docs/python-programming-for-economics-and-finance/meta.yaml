  md: "# 19.4.1 Decorators\n\nDecorators are a bit of syntactic sugar that, while\
    \ easily avoided, have turned out to be popular.\nIt’s very easy to say what decorators\
    \ do.\nOn the other hand it takes a bit of effort to explain *why* you might use\
    \ them.\n\n# An Example\n\nSuppose we are working on a program that looks something\
    \ like this\n\n```\nimport numpy as np\n\ndef f(x):\n    return np.log(np.log(x))\n\
    \ndef g(x):\n    return np.sqrt(42 * x)\n\n# Program continues with various calculations\
    \ using f and g\n```\n\nNow suppose there’s a problem: occasionally negative numbers\
    \ get fed to `f` and `g` in the calculations that follow.\nIf you try it, you’ll\
    \ see that when these functions are called with negative numbers they return a\
    \ NumPy object called `nan`.\nThis stands for “not a number” (and indicates that\
    \ you are trying to evaluate a mathematical function at a point where it is not\
    \ defined).\nPerhaps this isn’t what we want, because it causes other problems\
    \ that are hard to pick up later on.\nSuppose that instead we want the program\
    \ to terminate whenever this happens, with a sensible error message.\nThis change\
    \ is easy enough to implement\n\n```\nimport numpy as np\n\ndef f(x):\n    assert\
    \ x >= 0, \"Argument must be nonnegative\"\n    return np.log(np.log(x))\n\ndef\
    \ g(x):\n    assert x >= 0, \"Argument must be nonnegative\"\n    return np.sqrt(42\
    \ * x)\n\n# Program continues with various calculations using f and g\n```\n\n\
    Notice however that there is some repetition here, in the form of two identical\
    \ lines of code.\nRepetition makes our code longer and harder to maintain, and\
    \ hence is something we try hard to avoid.\nHere it’s not a big deal, but imagine\
    \ now that instead of just `f` and `g`, we have 20 such functions that we need\
    \ to modify in exactly the same way.\nThis means we need to repeat the test logic\
    \ (i.e., the `assert` line testing nonnegativity) 20 times.\nThe situation is\
    \ still worse if the test logic is longer and more complicated.\nIn this kind\
    \ of scenario the following approach would be neater"
