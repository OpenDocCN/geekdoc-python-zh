  md: "0.5\n\n```\nf(0)\n```\n\nError: Division by zero. Returned None\n\n```\nf('foo')\n\
    ```\n\nError: x cannot be of type <class 'str'>. Returned None\n\nIf we feel lazy\
    \ we can catch these errors together\n\n```\ndef f(x):\n    try:\n        return\
    \ 1.0 / x\n    except:\n        print(f'Error. An issue has occurred with x =\
