    # Example: bank deposits


    Imagine a bank with $D_0$ as the deposit at time $t$.


    It loans $(1 - r)$ of its deposits and keeps a fraction $r$ as cash reserves.


    Its deposits over an infinite time horizon can be written as


    $$\sum_{i=0}^{\infty} (1 - r)^i D_0$$


    Let''s compute the deposits at time $t$


    ```

    D = symbols(''D_0'')

    r = Symbol(''r'', positive=True)

    Dt = Sum(''(1 - r)^i * D_0'', (i, 0, oo))

    Dt

    ```


    $$\sum_{i=0}^{\infty} D_0 (1 - r)^i$$


    We can call the `doit` method to evaluate the series


    ```

    Dt.doit()

    ```


    $$D_0 \left( \begin{cases} \frac{1}{r} & \text{for } |r - 1| < 1 \ \sum_{i=0}^{\infty}
    (1 - r)^i & \text{otherwise} \end{cases} \right)$$


    Simplifying the expression above gives


    ```

    simplify(Dt.doit())

    ```


    $$\begin{cases} \frac{D_0}{r} & \text{for } r > 0 \land r < 2 \ D_0 \sum_{i=0}^{\infty}
    (1 - r)^i & \text{otherwise} \end{cases}$$


    This is consistent with the solution in the lecture on [geometric series](https://python-programming-for-economics-and-finance.readthedocs.io/en/latest/geometric_series.html).'
