    \ Johansson 提供了关于 F2Py 等内容的精彩介绍。最近，已经开发了一个用于 Fortran 的 Jupyter 单元格魔法——你可能想尝试一下。\n\
    \n## 15.7 总结与评论\n\n让我们回顾一下以上内容，并添加一些注意事项。\n\n### 15.7.1 局限性\n\n正如我们所看到的，Numba\
    \ 需要推断所有变量的类型信息以生成快速的机器级指令。对于简单的例程，Numba 推断类型的效果非常好。对于较大的例程，或者使用外部库的例程，它很容易失败。因此，在使用\
    \ Numba 时，专注于加速小型、时间关键的代码片段是明智的。这将比在你的 Python 程序中大量使用 `@njit` 语句给你带来更好的性能。\n\n\
    ### 15.7.2 一个陷阱：全局变量\n\n使用 Numba 时，还有另一件事需要注意。考虑以下示例：\n\n```python\na = 1\n\n\
    @njit\ndef add_a(x):\n    return a + x\n\nprint(add_a(10))\n```\n\n```\n11\n```\n\
    \n```python\na = 2\n\nprint(add_a(10))\n```\n\n```\n11\n```\n\n注意，更改全局变量对函数返回的值没有影响。当\
    \ Numba 为函数编译机器代码时，它将全局变量视为常量以确保类型稳定性。\n\n## 15.8 练习\n\n**练习 15.8.1**\n\n*之前*我们考虑了如何通过蒙特卡洛方法近似\
