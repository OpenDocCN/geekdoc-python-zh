  md: "# 6.3.8 Name Resolution\n\nNamespaces are great because they help us organize\
    \ variable names.\n(Type `import this` at the prompt and look at the last item\
    \ that's printed)\nHowever, we do need to understand how the Python interpreter\
    \ works with multiple namespaces.\nUnderstanding the flow of execution will help\
    \ us to check which variables are in scope and how to operate on them when writing\
    \ and debugging programs.\nAt any point of execution, there are in fact at least\
    \ two namespaces that can be accessed directly.\n(\"Accessed directly\" means\
    \ without using a dot, as in `pi` rather than `math.pi`)\nThese namespaces are\n\
    \n+   - The global namespace (of the module being executed)\n- The builtin namespace\n\
    \nIf the interpreter is executing a function, then the directly accessible namespaces\
    \ are\n\n+   - The local namespace of the function\n- The global namespace (of\
    \ the module being executed)\n- The builtin namespace\n\nSometimes functions are\
    \ defined within other functions, like so\n\n```\ndef f():\n    a = 2\n    def\
    \ g():\n        b = 4\n        print(a * b)\n    g()\n```\n\nHere `f` is the *enclosing\
    \ function* for `g`, and each function gets its own namespaces.\nNow we can give\
    \ the rule for how namespace resolution works:\nThe order in which the interpreter\
    \ searches for names is\n\n+   1. the local namespace (if it exists)\n2. the hierarchy\
    \ of enclosing namespaces (if they exist)\n3. the global namespace\n4. the builtin\
    \ namespace\n\nIf the name is not in any of these namespaces, the interpreter\
    \ raises a `NameError`.\nThis is called the **LEGB rule** (local, enclosing, global,\
    \ builtin).\nHere's an example that helps to illustrate.\nVisualizations here\
    \ are created by `nbtutor` in a Jupyter notebook.\nThey can help you better understand\
    \ your program when you are learning a new language.\nConsider a script `test.py`\
    \ that looks as follows"
