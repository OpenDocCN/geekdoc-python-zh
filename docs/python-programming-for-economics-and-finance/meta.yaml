  mdcn: "## 12.5 优化\n\n大多数数值软件包只提供*最小化*函数。\n最大化可以通过回忆以下事实来执行：函数 $f$ 在定义域 $D$ 上的最大化点就是\
    \ $-f$ 在 $D$ 上的最小化点。\n最小化与求根密切相关：对于光滑函数，内部极值点对应于一阶导数的根。\n上述的速度/鲁棒性权衡在数值优化中同样存在。\n\
    除非你有一些可以利用的先验信息，否则通常最好使用混合方法。\n对于有约束的单变量（即标量）最小化，一个很好的混合选择是 `fminbound`\n\n```python\n\
    from scipy.optimize import fminbound\n\nfminbound(lambda x: x**2, -1, 2)  # 在\
    \ [-1, 2] 中搜索\n```\n\n```\n0.0\n```\n\n### 12.5.1 多变量优化\n\n多变量局部优化器包括 `minimize`、`fmin`、`fmin_powell`、`fmin_cg`、`fmin_bfgs`\
    \ 和 `fmin_ncg`。\n有约束的多变量局部优化器包括 `fmin_l_bfgs_b`、`fmin_tnc`、`fmin_cobyla`。\n详情请参阅[文档](https://docs.scipy.org/doc/scipy/reference/optimize.html)。\n\
    \n## 12.6 积分\n\n大多数数值积分方法通过计算近似多项式的积分来工作。\n由此产生的误差取决于多项式对被积函数的拟合程度，而这又取决于被积函数的“规则性”。\n\
    在 SciPy 中，与数值积分相关的模块是 `scipy.integrate`。\n对于单变量积分，一个好的默认选择是 `quad`\n\n```python\n\
    from scipy.integrate import quad\n\nintegral, error = quad(lambda x: x**2, 0,\
    \ 1)\nintegral\n```\n\n```\n0.33333333333333337\n```\n\n事实上，`quad` 是 Fortran 库\
    \ QUADPACK 中一个非常标准的数值积分例程的接口。\n它使用 Clenshaw-Curtis 求积法，基于切比雪夫多项式展开。\n还有其他单变量积分选项——一个有用的是\
    \ `fixed_quad`，它速度快，因此在 `for` 循环内工作良好。\n还有用于多变量积分的函数。\n更多详情请参阅文档。\n\n## 12.7 线性代数\n\
    \n我们看到 NumPy 提供了一个名为 `linalg` 的线性代数模块。\nSciPy 也提供了一个同名的线性代数模块。\n后者不是前者的精确超集，但总体上功能更多。\n\
    我们留给你去研究可用的例程集。\n\n## 12.8 练习\n\n前几个练习涉及在风险中性假设下为欧式看涨期权定价。价格满足\n$$P = \\beta^n\
    \ \\mathbb{E} \\max\\{S_n - K, 0\\}$$\n其中\n1. $\\beta$ 是折现因子，\n2. $n$ 是到期日，\n\
    3. $K$ 是执行价格，\n4. $\\{S_t\\}$ 是标的资产在每个时间 $t$ 的价格。\n例如，如果看涨期权是以执行价格 $K$ 购买亚马逊股票，那么所有者有权（但无义务）在\
    \ $n$ 天后以价格 $K$ 购买 1 股亚马逊股票。\n因此，收益为 $\\max\\{S_n - K, 0\\}$。\n价格是收益的期望值，折现到当前价值。\n\
    \n**练习 12.8.1**\n假设 $S_n$ 服从参数为 $\\mu$ 和 $\\sigma$ 的对数正态分布。令 $f$ 表示该分布的密度。那么\n\
    $$P = \\beta^n \\int_0^\\infty \\max\\{x - K, 0\\} f(x) dx$$\n在区间 $[0, 400]$ 上绘制函数\n\
    $$g(x) = \\beta^n \\max\\{x - K, 0\\} f(x)$$\n其中 $\\mu$, $\\sigma$, $\\beta$,\
    \ $n$, $K = 4$, $0.25$, $0.99$, $10$, $40$。\n\n**提示：** 你可以从 `scipy.stats` 导入 `lognorm`，然后使用\
