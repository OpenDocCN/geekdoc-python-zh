    \       ISR  2000    6114.570  4.077330  1.292539e+05   \n4     Malawi       MWI\
    \  2000   11801.505 59.543808  5.026222e+03   \n5  South Africa       ZAF  2000\
    \   45064.098  6.939830  2.272424e+05   \n6 United States       USA  2000  282171.957\
