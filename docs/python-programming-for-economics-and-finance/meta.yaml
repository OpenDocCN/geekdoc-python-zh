    We could now write some additional code to parse this text and store it as an
    array.

    But this is unnecessary — pandas’ `read_csv` function can handle the task for
    us.

    We use `parse_dates=True` so that pandas recognizes our dates column, allowing
    for simple date filtering


    ```

    data = pd.read_csv(url, index_col=0, parse_dates=True)

    ```


