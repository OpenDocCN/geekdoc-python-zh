    # 20.2.3 Other Useful Magics


    In this lecture, we used the `%debug` IPython magic.

    There are many other useful magics:


    +   - `%precision 4` sets printed precision for floats to 4 decimal places

    - `%whos` gives a list of variables and their values

    - `%quickref` gives a list of magics


    The full list of magics is [here](https://ipython.readthedocs.io/en/stable/interactive/magics.html).


    # 20.3 Handling Errors


    Sometimes it''s possible to anticipate bugs and errors as we''re writing code.

    For example, the unbiased sample variance of sample $y_1, \dots, y_n$ is defined
    as


    $$s^2 := \frac{1}{n-1} \sum_{i=1}^n (y_i - \bar{y})^2 \quad \bar{y} = \text{sample
    mean}$$


    This can be calculated in NumPy using `np.var`.

    But if you were writing a function to handle such a calculation, you might anticipate
    a divide-by-zero error when the sample size is one.

    One possible action is to do nothing — the program will just crash, and spit out
    an error message.

    But sometimes it''s worth writing your code in a way that anticipates and deals
    with runtime errors that you think might arise.

    Why?


    +   - Because the debugging information provided by the interpreter is often less
    useful than what can be provided by a well written error message.

    - Because errors that cause execution to stop interrupt workflows.

    - Because it reduces confidence in your code on the part of your users (if you
    are writing for others).


    In this section, we''ll discuss different types of errors in Python and techniques
    to handle potential errors in our programs.'
