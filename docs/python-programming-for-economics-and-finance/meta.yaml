  - "[PAGE 98]\n\nWhen we cover the numerical libraries, we will see they include\
    \ many alternatives for interpolation and function approximation.\n\nNevertheless,\
    \ let's write our own function approximation routine as an exercise.\n\nIn particular,\
    \ without using any imports, write a function `linapprox` that takes as arguments\n\
    \n+   - A function `f` mapping some interval $[a, b]$ into $\\mathbb{R}$.\n- Two\
    \ scalars `a` and `b` providing the limits of this interval.\n- An integer `n`\
    \ determining the number of grid points.\n- A number `x` satisfying `a <= x <=\
    \ b`.\n\nand returns the piecewise linear interpolation of `f` at `x`, based on\
    \ `n` evenly spaced grid points `a = point[0] < point[1] < ... < point[n-1] =\
    \ b`.\n\nAim for clarity, not efficiency.\n\n# Solution to Exercise 5.7.5\n\n\
    Here's a solution:\n\n```\ndef linapprox(f, a, b, n, x):\n    \"\"\"\n    Evaluates\
    \ the piecewise linear interpolant of f at x on the interval\n    [a, b], with\
    \ n evenly spaced grid points.\n\n    Parameters\n    ==========\n        f :\
    \ function\n            The function to approximate\n\n        x, a, b : scalars\
    \ (floats or integers)\n            Evaluation point and endpoints, with a <=\
    \ x <= b\n\n        n : integer\n            Number of grid points\n\n    Returns\n\
    \    =======\n        A float. The interpolant evaluated at x\n\n    \"\"\"\n\
    \    length_of_interval = b - a\n    num_subintervals = n - 1\n    step = length_of_interval\
    \ / num_subintervals\n\n    # === find first grid point larger than x === #\n\
    \    point = a\n    while point <= x:\n        point += step\n\n    # === x must\
    \ lie between the gridpoints (point - step) and point === #\n    u, v = point\
    \ - step, point\n\n    return f(u) + (x - u) * (f(v) - f(u)) / (v - u)\n```"
