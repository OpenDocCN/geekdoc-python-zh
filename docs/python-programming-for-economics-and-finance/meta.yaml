  md: "# Python Programming for Economics and Finance\n\nIn the last two lines we\
    \ see that `miles` and `kms` are out of sync.\nWhat we really want is some mechanism\
    \ whereby each time a user sets one of these variables, *the other is automatically\
    \ updated*.\n\n# A Solution\n\nIn Python, this issue is solved using *descriptors*.\n\
    A descriptor is just a Python object that implements certain methods.\nThese methods\
    \ are triggered when the object is accessed through dotted attribute notation.\n\
    The best way to understand this is to see it in action.\nConsider this alternative\
    \ version of the `Car` class\n\n```\nclass Car:\n\n    def __init__(self, miles=1000):\n\
    \        self._miles = miles\n        self._kms = miles * 1.61\n\n    def set_miles(self,\
    \ value):\n        self._miles = value\n        self._kms = value * 1.61\n\n \
    \   def set_kms(self, value):\n        self._kms = value\n        self._miles\
    \ = value / 1.61\n\n    def get_miles(self):\n        return self._miles\n\n \
    \   def get_kms(self):\n        return self._kms\n\n    miles = property(get_miles,\
    \ set_miles)\n    kms = property(get_kms, set_kms)\n```\n\nFirst let's check that\
    \ we get the desired behavior\n\n```\ncar = Car()\ncar.miles\n```\n\n```\n1000\n\
    ```\n\n```\ncar.miles = 6000\ncar.kms\n```\n\n```\n9660.0\n```\n\nYep, that's\
    \ what we want — `car.kms` is automatically updated."
