  md: "(continued from previous page)\n\n```\ntime2 = qe.toc()\n```\n\n```\nTOC: Elapsed:\
    \ 0:00:0.20\n```\n\nThis is already a massive speed gain.\n\nIn fact, the next\
    \ time and all subsequent times it runs even faster as the function has been compiled\
    \ and is in memory:\n\n```\nqe.tic()\nqm_numba(0.1, int(n))\ntime3 = qe.toc()\n\
    ```\n\n```\nTOC: Elapsed: 0:00:0.02\n```\n\n```\ntime1 / time3  # Calculate speed\
    \ gain\n```\n\n```\n128.11253329868106\n```\n\nThis kind of speed gain is huge\
    \ relative to how simple and clear the implementation is.\n\n# 15.2.2 How and\
    \ When it Works\n\nNumba attempts to generate fast machine code using the infrastructure\
    \ provided by the LLVM Project.\n\nIt does this by inferring type information\
    \ on the fly.\n\n(See our *earlier lecture* on scientific computing for a discussion\
    \ of types.)\n\nThe basic idea is this:\n\n+   - Python is very flexible and hence\
    \ we could call the function qm with many types.\n    - e.g., x0 could be a NumPy\
    \ array or a list, n could be an integer or a float, etc.\n- This makes it hard\
    \ to *pre-compile* the function.\n- However, when we do actually call the function,\
    \ say by executing qm(0.5, 10), the types of x0 and n become clear.\n- Moreover,\
    \ the types of other variables in qm can be inferred once the input is known.\n\
    - So the strategy of Numba and other JIT compilers is to wait until this moment,\
    \ and *then* compile the function.\n\nThat's why it is called \"just-in-time\"\
    \ compilation.\n\nNote that, if you make the call qm(0.5, 10) and then follow\
    \ it with qm(0.9, 20), compilation only takes place on the first call.\n\nThe\
    \ compiled code is then cached and recycled as required."
