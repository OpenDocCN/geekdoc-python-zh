    This is unlikely to change in the near future, due to inherent physical limitations\
    \ on the construction of chips and circuit boards.\nChip designers and computer\
    \ programmers have responded to the slowdown by seeking a different path to fast\
    \ execution: parallelization.\nHardware makers have increased the number of cores\
    \ (physical CPUs) embedded in each machine.\nFor programmers, the challenge has\
    \ been to exploit these multiple CPUs by running many processes in parallel (i.e.,\
    \ simultaneously).\nThis is particularly important in scientific programming,\
