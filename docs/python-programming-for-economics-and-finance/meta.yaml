    \   IND    2000  1006300.297\n3  Israel       ISR    2000     6114.570\n4  Malawi\
    \       MWI    2000    11801.505\n```\n\nTo select rows and columns using a mixture\
    \ of integers and labels, the `loc` attribute can be used in a similar way\n\n\
    ```\ndf.loc[df.index[2:5], ['country', 'tcgdp']]\n```"
