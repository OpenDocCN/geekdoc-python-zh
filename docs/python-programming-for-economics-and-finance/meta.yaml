  - '[PAGE 183]


    # 10.6 Mutability and Copying Arrays


    NumPy arrays are mutable data types, like Python lists.

    In other words, their contents can be altered (mutated) in memory after initialization.

    We already saw examples above.

    Here’s another example:


    ```

    a = np.array([42, 44])

    a

    ```


    ```

    array([42, 44])

    ```


    ```

    a[-1] = 0  # Change last element to 0

    a

    ```


    ```

    array([42,  0])

    ```


    Mutability leads to the following behavior (which can be shocking to MATLAB programmers…)


    ```

    a = np.random.randn(3)

    a

    ```


    ```

    array([-0.54890232, -0.63618665, -0.94948789])

    ```


    ```

    b = a

    b[0] = 0.0

    a

    ```


    ```

    array([ 0.        , -0.63618665, -0.94948789])

    ```


    What’s happened is that we have changed `a` by changing `b`.

    The name `b` is bound to `a` and becomes just another reference to the array (the
    Python assignment model is described in more detail *later in the course*).

    Hence, it has equal rights to make changes to that array.

    This is in fact the most sensible default behavior!

    It means that we pass around only pointers to data, rather than making copies.

    Making copies is expensive in terms of both speed and memory.'
  - "[PAGE 184]\n\n# 10.6.1 Making Copies\n\nIt is of course possible to make b an\
    \ independent copy of a when required.\nThis can be done using `np.copy`\n\n```\n\
    a = np.random.randn(3)\na\n```\n\n```\narray([-0.17144282,  1.25599012,  0.94965095])\n\
    ```\n\n```\nb = np.copy(a)\nb\n```\n\n```\narray([-0.17144282,  1.25599012,  0.94965095])\n\
    ```\n\nNow b is an independent copy (called a *deep copy*)\n\n```\nb[:] = 1\n\
    b\n```\n\n```\narray([1., 1., 1.])\n```\n\n```\na\n```\n\n```\narray([-0.17144282,\
    \  1.25599012,  0.94965095])\n```\n\nNote that the change to b has not affected\
    \ a.\n\n# 10.7 Additional Functionality\n\nLet's look at some other useful things\
    \ we can do with NumPy.\n\n# 10.7.1 Vectorized Functions\n\nNumPy provides versions\
    \ of the standard functions `log`, `exp`, `sin`, etc. that act *element-wise*\
    \ on arrays\n\n```\nz = np.array([1, 2, 3])\nnp.sin(z)\n```\n\n```\narray([0.84147098,\
    \ 0.90929743, 0.14112001])\n```\n\nThis eliminates the need for explicit element-by-element\
    \ loops such as\n\n```\nn = len(z)\ny = np.empty(n)\nfor i in range(n):\n    y[i]\
    \ = np.sin(z[i])\n```"
- md: "## Python Programming for Economics and Finance\n\nBecause they act element-wise\
    \ on arrays, these functions are called *vectorized functions*.\nIn NumPy-speak,\
    \ they are also called *ufuncs*, which stands for “universal functions”.\nAs we\
    \ saw above, the usual arithmetic operations (+, *, etc.) also work element-wise,\
    \ and combining these with the ufuncs gives a very large set of fast element-wise\
    \ functions.\n\n```python\nz\n```\n\n```\narray([1, 2, 3])\n```\n\n```python\n\
    (1 / np.sqrt(2 * np.pi)) * np.exp(- 0.5 * z**2)\n```\n\n```\narray([0.24197072,\
    \ 0.05399097, 0.00443185])\n```\n\nNot all user-defined functions will act element-wise.\n\
    For example, passing the function `f` defined below a NumPy array causes a `ValueError`\n\
    \n```python\ndef f(x):\n    return 1 if x > 0 else 0\n```\n\nThe NumPy function\
    \ `np.where` provides a vectorized alternative:\n\n```python\nx = np.random.randn(4)\n\
    x\n```\n\n```\narray([-1.4410515 , -0.65186216, -0.64465183,  0.8134109 ])\n```\n\
    \n```python\nnp.where(x > 0, 1, 0)  # Insert 1 if x > 0 true, otherwise 0\n```\n\
    \n```\narray([0, 0, 0, 1])\n```\n\nYou can also use `np.vectorize` to vectorize\
    \ a given function\n\n```python\nf = np.vectorize(f)\nf(x)                # Passing\
    \ the same vector x as in the previous example\n```\n\n```\narray([0, 0, 0, 1])\n\
    ```\n\nHowever, this approach doesn't always obtain the same speed as a more carefully\
    \ crafted vectorized function.\n\n## 10.7.2 Comparisons\n\nAs a rule, comparisons\
    \ on arrays are done element-wise\n\n```python\nz = np.array([2, 3])\ny = np.array([2,\
    \ 3])\nz == y\n```\n\n```\narray([ True,  True])\n```\n\n```python\ny[0] = 5\n\
    z == y\n```\n\n```\narray([False,  True])\n```\n\n```python\nz != y\n```\n\n```\n\
    array([ True, False])\n```\n\nThe situation is similar for >, <, >= and <=.\n\n\
    We can also do comparisons against scalars\n\n```python\nz = np.linspace(0, 10,\
    \ 5)\nz\n```\n\n```\narray([ 0. ,  2.5,  5. ,  7.5, 10. ])\n```\n\n```python\n\
    z > 3\n```\n\n```\narray([False, False,  True,  True,  True])\n```\n\nThis is\
    \ particularly useful for *conditional extraction*\n\n```python\nb = z > 3\nb\n\
    ```\n\n```\narray([False, False,  True,  True,  True])\n```\n\n```python\nz[b]\n\
    ```\n\n```\narray([ 5. ,  7.5, 10. ])\n```\n\nOf course we can—and frequently\
    \ do—perform this in one step\n\n```python\nz[z > 3]\n```\n\n```\narray([ 5. ,\
    \ 7.5, 10. ])\n```\n\n## 10.7.3 Sub-packages\n\nNumPy provides some additional\
    \ functionality related to scientific programming through its sub-packages.\n\
    We've already seen how we can generate random variables using np.random\n\n```python\n\
    z = np.random.randn(10000)  # Generate standard normals\ny = np.random.binomial(10,\
    \ 0.5, size=1000)  # 1,000 draws from Bin(10, 0.5)\ny.mean()\n```\n\n```\n5.045\n\
    ```\n\nAnother commonly used subpackage is np.linalg\n\n```python\nA = np.array([[1,\
    \ 2], [3, 4]])\nnp.linalg.det(A)  # Compute the determinant\n```\n\n```\n-2.0000000000000004\n\
    ```\n\n```python\nnp.linalg.inv(A)  # Compute the inverse\n```\n\n```\narray([[-2.\
    \ ,  1. ],\n       [ 1.5, -0.5]])\n```\n\nMuch of this functionality is also available\
    \ in SciPy, a collection of modules that are built on top of NumPy.\nWe'll cover\
    \ the SciPy versions in more detail soon.\nFor a comprehensive list of what's\
    \ available in NumPy see this documentation.\n\n## 10.8 Exercises\n\n```python\n\
    %matplotlib inline\nimport matplotlib.pyplot as plt\nplt.rcParams['figure.figsize']\
    \ = (10,6)\n```\n\n### Exercise 10.8.1\n\nConsider the polynomial expression\n\
    \n$p(x) = a_0 + a_1x + a_2x^2 + \\cdots a_Nx^N = \\sum_{n=0}^N a_nx^n$  (10.1)\n\
    \nEarlier, you wrote a simple function p(x, coeff) to evaluate (10.1) without\
    \ considering efficiency.\nNow write a new function that does the same job, but\
    \ uses NumPy arrays and array operations for its computations, rather than any\
    \ form of Python loop.\n\n(Such functionality is already implemented as `np.poly1d`,\
    \ but for the sake of the exercise don't use this class)\n\n**Hint:** Use `np.cumprod()`\n\
    \n### Solution to Exercise 10.8.1\n\nThis code does the job\n\n```python\ndef\
    \ p(x, coef):\n    X = np.ones_like(coef)\n    X[1:] = x\n    y = np.cumprod(X)\
    \   # y = [1, x, x**2,...]\n    return coef @ y\n```\n\nLet's test it\n\n```python\n\
    x = 2\ncoef = np.linspace(2, 4, 3)\nprint(coef)\nprint(p(x, coef))\n# For comparison\n\
    q = np.poly1d(np.flip(coef))\nprint(q(x))\n```\n\n```\n[2. 3. 4.]\n24.0\n24.0\n\
    ```\n\n### Exercise 10.8.2\n\nLet `q` be a NumPy array of length `n` with `q.sum()\
    \ == 1`.\nSuppose that `q` represents a probability mass function.\nWe wish to\
    \ generate a discrete random variable `x` such that $\\mathbb{P}\\{x = i\\} =\
    \ q_i$.\nIn other words, `x` takes values in `range(len(q))` and `x = i` with\
    \ probability `q[i]`.\nThe standard (inverse transform) algorithm is as follows:\n\
    \n- Divide the unit interval $[0, 1]$ into $n$ subintervals $I_0, I_1, \\dots,\
    \ I_{n-1}$ such that the length of $I_i$ is $q_i$.\n- Draw a uniform random variable\
    \ $U$ on $[0, 1]$ and return the $i$ such that $U \\in I_i$.\n\nThe probability\
    \ of drawing $i$ is the length of $I_i$, which is equal to $q_i$.\nWe can implement\
    \ the algorithm as follows\n\n```python\nfrom random import uniform\n\ndef sample(q):\n\
    \    a = 0.0\n    U = uniform(0, 1)\n    for i in range(len(q)):\n        if a\
    \ < U <= a + q[i]:\n            return i\n        a = a + q[i]\n```\n\nIf you\
    \ can't see how this works, try thinking through the flow for a simple example,\
    \ such as q = [0.25, 0.75] It helps to sketch the intervals on paper.\n\nYour\
    \ exercise is to speed it up using NumPy, avoiding explicit loops\n\nHint: Use\
    \ `np.searchsorted` and `np.cumsum`\n\nIf you can, implement the functionality\
    \ as a class called `DiscreteRV`, where\n\n- the data for an instance of the class\
    \ is the vector of probabilities q\n- the class has a `draw()` method, which returns\
    \ one draw according to the algorithm described above\n\nIf you can, write the\
    \ method so that `draw(k)` returns k draws from q.\n\n### Solution to Exercise\
    \ 10.8.2\n\nHere's our first pass at a solution:\n\n```python\nfrom numpy import\
    \ cumsum\nfrom numpy.random import uniform\n\nclass DiscreteRV:\n    \"\"\"\n\
    \    Generates an array of draws from a discrete random variable with vector of\n\
    \    probabilities given by q.\n    \"\"\"\n\n    def __init__(self, q):\n   \
    \     \"\"\"\n        The argument q is a NumPy array, or array like, nonnegative\
    \ and sums\n        to 1\n        \"\"\"\n        self.q = q\n        self.Q =\
    \ cumsum(q)\n\n    def draw(self, k=1):\n        \"\"\"\n        Returns k draws\
    \ from q. For each such draw, the value i is returned\n        with probability\
    \ q[i].\n        \"\"\"\n        return self.Q.searchsorted(uniform(0, 1, size=k))\n\
    ```\n\nThe logic is not obvious, but if you take your time and read it slowly,\
    \ you will understand.\n\nThere is a problem here, however.\n\nSuppose that q\
    \ is altered after an instance of `DiscreteRV` is created, for example by\n\n\
    ```python\nq = (0.1, 0.9)\nd = DiscreteRV(q)\nd.q = (0.5, 0.5)\n```\n\nThe problem\
    \ is that Q does not change accordingly, and Q is the data used in the draw method.\n\
    To deal with this, one option is to compute Q every time the draw method is called.\n\
    But this is inefficient relative to computing Q once-off.\nA better option is\
    \ to use descriptors.\nA solution from the quantecon library using descriptors\
    \ that behaves as we desire can be found here.\n\n### Exercise 10.8.3\n\nRecall\
    \ our earlier discussion of the empirical cumulative distribution function.\n\
    Your task is to\n\n1. Make the `__call__` method more efficient using NumPy.\n\
    2. Add a method that plots the ECDF over [a, b], where a and b are method parameters.\n\
    \n### Solution to Exercise 10.8.3\n\nAn example solution is given below.\nIn essence,\
    \ we've just taken this code from QuantEcon and added in a plot method\n\n```python\n\
    \"\"\"\nModifies ecdf.py from QuantEcon to add in a plot method\n\"\"\"\n\nclass\
    \ ECDF:\n    \"\"\"\n    One-dimensional empirical distribution function given\
    \ a vector of\n    observations.\n\n    Parameters\n    ----------\n    observations\
    \ : array_like\n        An array of observations\n\n    Attributes\n    ----------\n\
    \    observations : array_like\n        An array of observations\n\n    \"\"\"\
    \n\n    def __init__(self, observations):\n        self.observations = np.asarray(observations)\n\
    \n    def __call__(self, x):\n        \"\"\"\n        Evaluates the ecdf at x\n\
    \n        Parameters\n        ----------\n        x : scalar(float)\n        \
    \    The x at which the ecdf is evaluated\n\n        Returns\n        -------\n\
    \        scalar(float)\n            Fraction of the sample less than x\n\n   \
    \     \"\"\"\n        return np.mean(self.observations <= x)\n\n    def plot(self,\
    \ ax, a=None, b=None):\n        \"\"\"\n        Plot the ecdf on the interval\
    \ [a, b].\n\n        Parameters\n        ----------\n        a : scalar(float),\
    \ optional(default=None)\n            Lower endpoint of the plot interval\n  \
    \      b : scalar(float), optional(default=None)\n            Upper endpoint of\
    \ the plot interval\n\n        \"\"\"\n\n        # === choose reasonable interval\
    \ if [a, b] not specified === #\n        if a is None:\n            a = self.observations.min()\
    \ - self.observations.std()\n        if b is None:\n            b = self.observations.max()\
    \ + self.observations.std()\n\n        # === generate plot === #\n        x_vals\
    \ = np.linspace(a, b, num=100)\n        f = np.vectorize(self.__call__)\n    \
    \    ax.plot(x_vals, f(x_vals))\n        plt.show()\n```\n\nHere's an example\
    \ of usage\n\n```python\nfig, ax = plt.subplots()\nX = np.random.randn(1000)\n\
    F = ECDF(X)\nF.plot(ax)\n```"
  mdcn: "## 面向经济学与金融的Python编程\n\n由于这些函数对数组进行逐元素操作，因此被称为*向量化函数*。\n在NumPy术语中，它们也被称为*ufuncs*，即“通用函数”的缩写。\n\
    如上所述，常规算术运算（+、*等）也逐元素工作，将它们与ufuncs结合使用，可以得到大量快速的逐元素函数。\n\n```python\nz\n```\n\n\
    ```\narray([1, 2, 3])\n```\n\n```python\n(1 / np.sqrt(2 * np.pi)) * np.exp(- 0.5\
    \ * z**2)\n```\n\n```\narray([0.24197072, 0.05399097, 0.00443185])\n```\n\n并非所有用户定义的函数都会逐元素操作。\n\
    例如，将下面定义的函数`f`传递给NumPy数组会导致`ValueError`\n\n```python\ndef f(x):\n    return 1\
    \ if x > 0 else 0\n```\n\nNumPy函数`np.where`提供了一个向量化的替代方案：\n\n```python\nx = np.random.randn(4)\n\
    x\n```\n\n```\narray([-1.4410515 , -0.65186216, -0.64465183,  0.8134109 ])\n```\n\
    \n```python\nnp.where(x > 0, 1, 0)  # 如果 x > 0 为真则插入1，否则插入0\n```\n\n```\narray([0,\
    \ 0, 0, 1])\n```\n\n你也可以使用`np.vectorize`来向量化给定的函数\n\n```python\nf = np.vectorize(f)\n\
    f(x)                # 传递与上一个示例相同的向量 x\n```\n\n```\narray([0, 0, 0, 1])\n```\n\n\
    然而，这种方法并不总能达到与更精心设计的向量化函数相同的速度。\n\n## 10.7.2 比较\n\n通常，数组上的比较是逐元素进行的\n\n```python\n\
    z = np.array([2, 3])\ny = np.array([2, 3])\nz == y\n```\n\n```\narray([ True,\
    \  True])\n```\n\n```python\ny[0] = 5\nz == y\n```\n\n```\narray([False,  True])\n\
    ```\n\n```python\nz != y\n```\n\n```\narray([ True, False])\n```\n\n对于 >、<、>=\
    \ 和 <=，情况类似。\n\n我们也可以与标量进行比较\n\n```python\nz = np.linspace(0, 10, 5)\nz\n```\n\
    \n```\narray([ 0. ,  2.5,  5. ,  7.5, 10. ])\n```\n\n```python\nz > 3\n```\n\n\
    ```\narray([False, False,  True,  True,  True])\n```\n\n这对于*条件提取*特别有用\n\n```python\n\
    b = z > 3\nb\n```\n\n```\narray([False, False,  True,  True,  True])\n```\n\n\
    ```python\nz[b]\n```\n\n```\narray([ 5. ,  7.5, 10. ])\n```\n\n当然，我们可以——并且经常——一步完成这个操作\n\
    \n```python\nz[z > 3]\n```\n\n```\narray([ 5. , 7.5, 10. ])\n```\n\n## 10.7.3\
    \ 子包\n\nNumPy通过其子包提供了一些与科学编程相关的额外功能。\n我们已经看到如何使用np.random生成随机变量\n\n```python\n\
    z = np.random.randn(10000)  # 生成标准正态分布\ny = np.random.binomial(10, 0.5, size=1000)\
    \  # 从二项分布 Bin(10, 0.5) 中抽取1,000个样本\ny.mean()\n```\n\n```\n5.045\n```\n\n另一个常用的子包是np.linalg\n\
    \n```python\nA = np.array([[1, 2], [3, 4]])\nnp.linalg.det(A)  # 计算行列式\n```\n\n\
    ```\n-2.0000000000000004\n```\n\n```python\nnp.linalg.inv(A)  # 计算逆矩阵\n```\n\n\
    ```\narray([[-2. ,  1. ],\n       [ 1.5, -0.5]])\n```\n\n这些功能中的大部分在SciPy中也可用，SciPy是建立在NumPy之上的模块集合。\n\
    我们很快将更详细地介绍SciPy版本。\n有关NumPy中可用功能的完整列表，请参阅此文档。\n\n## 10.8 练习\n\n```python\n%matplotlib\
    \ inline\nimport matplotlib.pyplot as plt\nplt.rcParams['figure.figsize'] = (10,6)\n\
    ```\n\n### 练习 10.8.1\n\n考虑多项式表达式\n\n$p(x) = a_0 + a_1x + a_2x^2 + \\cdots a_Nx^N\
    \ = \\sum_{n=0}^N a_nx^n$  (10.1)\n\n之前，你编写了一个简单的函数 p(x, coeff) 来计算 (10.1)，没有考虑效率。\n\
    现在编写一个新函数来完成相同的工作，但在计算中使用NumPy数组和数组操作，而不是任何形式的Python循环。\n\n（此类功能已作为 `np.poly1d`\
    \ 实现，但为了练习，请不要使用此类）\n\n**提示：** 使用 `np.cumprod()`\n\n### 练习 10.8.1 的解答\n\n这段代码可以完成任务\n\
    \n```python\ndef p(x, coef):\n    X = np.ones_like(coef)\n    X[1:] = x\n    y\
    \ = np.cumprod(X)   # y = [1, x, x**2,...]\n    return coef @ y\n```\n\n让我们测试一下\n\
    \n```python\nx = 2\ncoef = np.linspace(2, 4, 3)\nprint(coef)\nprint(p(x, coef))\n\
    # 作为比较\nq = np.poly1d(np.flip(coef))\nprint(q(x))\n```\n\n```\n[2. 3. 4.]\n24.0\n\
    24.0\n```\n\n### 练习 10.8.2\n\n设 `q` 是一个长度为 `n` 的NumPy数组，且 `q.sum() == 1`。\n假设\
    \ `q` 代表一个概率质量函数。\n我们希望生成一个离散随机变量 `x`，使得 $\\mathbb{P}\\{x = i\\} = q_i$。\n换句话说，`x`\
    \ 在 `range(len(q))` 中取值，并且 `x = i` 的概率为 `q[i]`。\n标准（逆变换）算法如下：\n\n- 将单位区间 $[0,\
    \ 1]$ 划分为 $n$ 个子区间 $I_0, I_1, \\dots, I_{n-1}$，使得 $I_i$ 的长度为 $q_i$。\n- 在 $[0,\
    \ 1]$ 上绘制一个均匀随机变量 $U$，并返回满足 $U \\in I_i$ 的 $i$。\n\n绘制 $i$ 的概率是 $I_i$ 的长度，等于 $q_i$。\n\
    我们可以如下实现该算法\n\n```python\nfrom random import uniform\n\ndef sample(q):\n    a\
    \ = 0.0\n    U = uniform(0, 1)\n    for i in range(len(q)):\n        if a < U\
    \ <= a + q[i]:\n            return i\n        a = a + q[i]\n```\n\n如果你不明白这是如何工作的，尝试为一个简单的例子（例如\
    \ q = [0.25, 0.75]）思考一下流程。在纸上画出区间会有所帮助。\n\n你的练习是使用NumPy来加速它，避免显式循环\n\n提示：使用 `np.searchsorted`\
    \ 和 `np.cumsum`\n\n如果可以，请将功能实现为一个名为 `DiscreteRV` 的类，其中\n\n- 类实例的数据是概率向量 q\n- 该类有一个\
    \ `draw()` 方法，根据上述算法返回一次抽取结果\n\n如果可以，请编写该方法，使得 `draw(k)` 从 q 中返回 k 次抽取结果。\n\n\
    ### 练习 10.8.2 的解答\n\n这是我们解决方案的初稿：\n\n```python\nfrom numpy import cumsum\nfrom\
    \ numpy.random import uniform\n\nclass DiscreteRV:\n    \"\"\"\n    从离散随机变量生成一个抽取数组，其概率向量由\
    \ q 给出。\n    \"\"\"\n\n    def __init__(self, q):\n        \"\"\"\n        参数\
    \ q 是一个NumPy数组或类似数组，非负且总和为1\n        \"\"\"\n        self.q = q\n        self.Q\
    \ = cumsum(q)\n\n    def draw(self, k=1):\n        \"\"\"\n        从 q 中返回 k 次抽取。对于每次这样的抽取，值\
    \ i 以概率 q[i] 被返回。\n        \"\"\"\n        return self.Q.searchsorted(uniform(0,\
    \ 1, size=k))\n```\n\n逻辑并不明显，但如果你花时间慢慢阅读，你会理解的。\n\n然而，这里有一个问题。\n\n假设在创建 `DiscreteRV`\
    \ 的实例后，q 被更改了，例如通过\n\n```python\nq = (0.1, 0.9)\nd = DiscreteRV(q)\nd.q = (0.5,\
    \ 0.5)\n```\n\n问题是 Q 没有相应地更改，而 Q 是 draw 方法中使用的数据。\n为了解决这个问题，一个选项是在每次调用 draw 方法时计算\
    \ Q。\n但这相对于一次性计算 Q 是低效的。\n更好的选项是使用描述符。\n这里有一个来自 quantecon 库的使用描述符的解决方案，其行为符合我们的期望。\n\
    \n### 练习 10.8.3\n\n回顾我们之前关于经验累积分布函数的讨论。\n你的任务是\n\n1. 使用NumPy使 `__call__` 方法更高效。\n\
    2. 添加一个方法来绘制 ECDF 在 [a, b] 上的图像，其中 a 和 b 是方法参数。\n\n### 练习 10.8.3 的解答\n\n下面给出了一个示例解决方案。\n\
    本质上，我们只是从 QuantEcon 中获取了这段代码并添加了一个绘图方法\n\n```python\n\"\"\"\n修改 QuantEcon 的 ecdf.py\
    \ 以添加绘图方法\n\"\"\"\n\nclass ECDF:\n    \"\"\"\n    给定一个观测向量的一维经验分布函数。\n\n    参数\n\
    \    ----------\n    observations : array_like\n        一个观测数组\n\n    属性\n   \
    \ ----------\n    observations : array_like\n        一个观测数组\n\n    \"\"\"\n\n\
    \    def __init__(self, observations):\n        self.observations = np.asarray(observations)\n\
    \n    def __call__(self, x):\n        \"\"\"\n        在 x 处计算 ecdf\n\n       \
    \ 参数\n        ----------\n        x : scalar(float)\n            计算 ecdf 的 x 值\n\
    \n        返回\n        -------\n        scalar(float)\n            小于 x 的样本比例\n\
    \n        \"\"\"\n        return np.mean(self.observations <= x)\n\n    def plot(self,\
    \ ax, a=None, b=None):\n        \"\"\"\n        在区间 [a, b] 上绘制 ecdf。\n\n     \
    \   参数\n        ----------\n        a : scalar(float), optional(default=None)\n\
    \            绘图区间的下端点\n        b : scalar(float), optional(default=None)\n   \
    \         绘图区间的上端点\n\n        \"\"\"\n\n        # === 如果未指定 [a, b]，则选择合理的区间 ===\
    \ #\n        if a is None:\n            a = self.observations.min() - self.observations.std()\n\
    \        if b is None:\n            b = self.observations.max() + self.observations.std()\n\
    \n        # === 生成绘图 === #\n        x_vals = np.linspace(a, b, num=100)\n    \
