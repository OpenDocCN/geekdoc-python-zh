  md: '# Python Programming for Economics and Finance


    3.140936


    By switching parallelization on and off (selecting `True` or `False` in the `@njit`
    annotation), we can test the speed gain that multithreading provides on top of
    JIT compilation.


    On our workstation, we find that parallelization increases execution speed by
