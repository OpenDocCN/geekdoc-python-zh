    # 1.3.6 Cloud Computing


    Running your Python code on massive servers in the cloud is becoming easier and
    easier.


    An excellent example of the portability of python in a cloud computing environment
    is [Google Colab](https://colab.research.google.com/). It hosts the Jupyter notebook
    on cloud servers with no pre-configuration necessary to run Python code using
    cloud servers.


    There are also commercial applications of cloud computing using Python:


    +   - Anaconda Enterprise

    - Amazon Web Services

    - Google Cloud

    - Digital Ocean


    # 1.3.7 Parallel Processing


    Apart from the cloud computing options listed above, you might like to consider


    +   - Parallel computing through IPython clusters.

    - Dask parallelises PyData and Machine Learning in Python.

    - GPU programming through JAX, PyCuda, PyOpenCL, Rapids, etc.


    Here is more about [recent developments](https://www.nvidia.com/en-us/data-center/hpc/)
    in high-performance computing (HPC) in scientific computing and [how HPC helps
    researchers in different fields](https://www.nvidia.com/en-us/data-center/hpc/).'
