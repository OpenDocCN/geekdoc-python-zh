    \ Calls (Advanced)\n\nThis is not something that you will use every day, but it\
    \ is still useful — you should learn it at some stage.\nBasically, a recursive\
    \ function is a function that calls itself.\nFor example, consider the problem\
    \ of computing $x_t$ for some t when\n\n$x_{t+1} = 2x_t, \\quad x_0 = 1$\n\nObviously\
    \ the answer is $2^t$.\nWe can compute this easily enough with a loop\n\n```\n\
    def x_loop(t):\n    x = 1\n    for i in range(t):\n        x = 2 * x\n    return\
    \ x\n```\n\nWe can also use a recursive solution, as follows\n\n```\ndef x(t):\n\
    \    if t == 0:\n        return 1\n    else:\n        return 2 * x(t-1)\n```\n\
    \nWhat happens here is that each successive call uses it's own *frame* in the\
    \ *stack*\n\n+   - a frame is where the local variables of a given function call\
    \ are held\n- stack is memory used to process function calls\n    - a First In\
    \ Last Out (FILO) queue\n\nThis example is somewhat contrived, since the first\
    \ (iterative) solution would usually be preferred to the recursive solution.\n\
    We'll meet less contrived applications of recursion later on."
