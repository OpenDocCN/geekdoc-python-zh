    \n## Contents\n\n- Writing Longer Programs\n    - Overview\n    - Working with\
    \ Python files\n    - Development environments\n    - A step forward from Jupyter\
    \ Notebooks: JupyterLab\n    - A walk through Visual Studio Code\n    - Git your\
    \ hands dirty\n\n## 8.1 Overview\n\nSo far, we have explored the use of Jupyter\
    \ Notebooks in writing and executing Python code. While they are efficient and\
    \ adaptable when working with short pieces of code, Notebooks are not the best\
    \ choice for longer programs and scripts. Jupyter Notebooks are well suited to\
    \ interactive computing (i.e. data science workflows) and can help execute chunks\
    \ of code one at a time. Text files and scripts allow for long pieces of code\
    \ to be written and executed in a single go. We will explore the use of Python\
    \ scripts as an alternative. The Jupyter Lab and Visual Studio Code (VS Code)\
    \ development environments are then introduced along with a primer on version\
    \ control (Git). In this lecture, you will learn to\n\n- work with Python scripts\n\
    - set up various development environments\n- get started with GitHub\n\n> **Note:**\
    \ Going forward, it is assumed that you have an Anaconda environment up and running.\
    \ You may want to create a new conda environment if you haven't done so already.\n\
    \n## 8.2 Working with Python files\n\nPython files are used when writing long,\
    \ reusable blocks of code - by convention, they have a .py suffix. Let us begin\
    \ by working with the following example.\n\n```python\n# Listing 8.1: sine_wave.py\n\
    \nimport matplotlib.pyplot as plt\nimport numpy as np\n\nx = np.linspace(0, 10,\
    \ 100)\ny = np.sin(x)\n\nplt.plot(x, y)\nplt.xlabel('x')\nplt.ylabel('y')\nplt.title('Sine\
    \ Wave')\nplt.show()\n```\n\nThe code is first saved locally on the computer before\
    \ it is executed. As there are various ways to execute the code, we will explore\
    \ them in the context of different development environments. One major advantage\
    \ of using Python scripts lies in the fact that you can “import” functionality\
    \ from other scripts into your current script or Jupyter Notebook. Let’s rewrite\
    \ the earlier code into a function.\n\n```python\n# Listing 8.2: sine_wave.py\n\
    \nimport matplotlib.pyplot as plt\nimport numpy as np\n\n# Define the plot_wave\
    \ function.\ndef plot_wave(title : str = 'Sine Wave'):\n    x = np.linspace(0,\
    \ 10, 100)\n    y = np.sin(x)\n\n    plt.plot(x, y)\n    plt.xlabel('x')\n   \
    \ plt.ylabel('y')\n    plt.title(title)\n    plt.show()\n```\n\n```python\n# Listing\
    \ 8.3: second_script.py\n\nimport sine_wave # Import the sine_wave script\n\n\
    # Call the plot_wave function.\nsine_wave.plot_wave(\"Sine Wave - Called from\
    \ the Second Script\")\n```\n\nThis allows you to split your code into chunks\
    \ and structure your codebase better. Look into the use of modules and packages\
    \ for more information on importing functionality.\n\n## 8.3 Development environments\n\
    \nA development environment is a one stop workspace where you can\n\n- edit and\
    \ run your code\n- test and debug\n- manage project files\n\nThis lecture takes\
    \ you through the workings of two development environments.\n\n## 8.4 A step forward\
    \ from Jupyter Notebooks: JupyterLab\n\nJupyterLab is a browser based development\
    \ environment for Jupyter Notebooks, code scripts, and data files.\n\nYou can\
    \ try JupyterLab in the browser if you want to test it out before installing it\
    \ locally.\n\nYou can install JupyterLab using pip\n\n```\n> pip install jupyterlab\n\
    ```\n\nand launch it in the browser, similar to Jupyter Notebooks.\n\n```\n> jupyter-lab\n\
    ```\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_144_0.png)\n\nYou can see that\
    \ the Jupyter Server is running on port 8888 on the localhost.\n\nThe following\
    \ interface should open up on your default browser automatically - if not, CTRL\
    \ + Click the server URL.\n\nClick on\n\n- the Python 3 (ipykernel) button under\
    \ Notebooks to open a new Jupyter Notebook\n- the Python File button to open a\
    \ new Python script (.py)\n\nYou can always open this launcher tab by clicking\
    \ the ‘+’ button on the top. All the files and folders in your working directory\
    \ can be found in the File Browser (tab on the left). You can create new files\
    \ and folders using the buttons available at the top of the File Browser tab.\n\
    \n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_145_1.png)\n\nYou can install extensions\
    \ that increase the functionality of JupyterLab by visiting the Extensions tab.\
    \ Coming back to the example scripts from earlier, there are two ways to work\
    \ with them in JupyterLab.\n\n- Using magic commands\n- Using the terminal\n\n\
    ![](img/71948b0dce962ae14bde4e2e4d9fbb7b_146_0.png)\n\n### 8.4.1 Using magic commands\n\
    \nJupyter Notebooks and JupyterLab support the use of magic commands - commands\
    \ that extend the capabilities of a standard Jupyter Notebook.\n\nThe %run magic\
    \ command allows you to run a Python script from within a Notebook.\n\nThis is\
    \ a convenient way to run scripts that you are working on in the same directory\
    \ as your Notebook and present the outputs within the Notebook.\n\n### 8.4.2 Using\
    \ the terminal\n\nHowever, if you are looking into just running the .py file,\
    \ it is sometimes easier to use the terminal.\n\nOpen a terminal from the launcher\
    \ and run the following command.\n\n```\n> python <path to file.py>\n```\n\n**Note:**\
    \ You can also run the script line by line by opening an ipykernel console either\n\
    \n- from the launcher\n- by right clicking within the Notebook and selecting Create\
    \ Console for Editor\n\nUse Shift + Enter to run a line of code.\n\nMore on ipykernel\
    \ consoles [here](here).\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_147_0.png)\n\
    \n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_147_1.png)\n\n## 8.5 A walk through\
    \ Visual Studio Code\n\nVisual Studio Code (VS Code) is a code editor and development\
    \ workspace that can run\n\n- in the browser.\n- as a local installation.\n\n\
    Both interfaces are identical. When you launch VS Code, you will see the following\
    \ interface.\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_148_0.png)\n\nExplore\
    \ how to customize VS Code to your liking through the guided walkthroughs. When\
    \ presented with the following prompt, go ahead an install all recommended extensions.\
    \ You can also install extensions from the Extensions tab. Jupyter Notebooks (.ipynb\
    \ files) can be worked on in VS Code. Make sure to install the Jupyter extension\
    \ from the Extensions tab before you try to open a Jupyter Notebook. Create a\
    \ new file (in the file Explorer tab) and save it with the .ipynb extension. Choose\
    \ a kernel/environment to run the Notebook in by clicking on the Select Kernel\
    \ button on the top right corner of the editor. VS Code also has excellent version\
    \ control functionality through the Source Control tab. Link your GitHub account\
    \ to VS Code to push and pull changes to and from your repositories. Further discussions\
    \ about version control can be found in the next section. To open a new Terminal\
    \ in VS Code, click on the Terminal tab and select New Terminal. VS Code opens\
    \ a new Terminal in the same directory you are working in - a PowerShell in Windows\
    \ and a Bash in Linux. You can change the shell or open a new instance through\
    \ the dropdown menu on the right end of the terminal tab.\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_149_0.png)\n\
