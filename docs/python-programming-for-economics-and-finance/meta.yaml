    \ user 10.9 ms, sys: 0 ns, total: 10.9 ms\nWall time: 10.8 ms\n\n3.142884\n```\n\
    \n如果我们通过移除 `@njit` 来关闭 JIT 编译，代码在我们的机器上大约需要 150 倍的时间。因此，通过添加四个字符，我们获得了 2 个数量级的速度提升——这是巨大的。\n\
