  - "[PAGE 143]\n\n# 8.2 Working with Python files\n\nPython files are used when writing\
    \ long, reusable blocks of code - by convention, they have a .py suffix.\nLet\
    \ us begin by working with the following example.\n\n```\nListing 8.1: sine_wave.py\n\
    \npython\nimport matplotlib.pyplot as plt\nimport numpy as np\n\nx = np.linspace(0,\
    \ 10, 100)\ny = np.sin(x)\n\nplt.plot(x, y)\nplt.xlabel('x')\nplt.ylabel('y')\n\
    plt.title('Sine Wave')\nplt.show()\n```\n\nThe code is first saved locally on\
    \ the computer before it is executed.\nAs there are various ways to execute the\
    \ code, we will explore them in the context of different development environments.\n\
    One major advantage of using Python scripts lies in the fact that you can “import”\
    \ functionality from other scripts into your current script or Jupyter Notebook.\n\
    Let’s rewrite the earlier code into a function.\n\n```\nListing 8.2: sine_wave.py\n\
    \npython\nimport matplotlib.pyplot as plt\nimport numpy as np\n\n# Define the\
    \ plot_wave function.\ndef plot_wave(title : str = 'Sine Wave'):\n    x = np.linspace(0,\
    \ 10, 100)\n    y = np.sin(x)\n\n    plt.plot(x, y)\n    plt.xlabel('x')\n   \
    \ plt.ylabel('y')\n    plt.title(title)\n    plt.show()\n```\n\n```\nListing 8.3:\
    \ second_script.py\n\npython\nimport sine_wave # Import the sine_wave script\n\
    \n# Call the plot_wave function.\nsine_wave.plot_wave(\"Sine Wave - Called from\
    \ the Second Script\")\n```\n\nThis allows you to split your code into chunks\
    \ and structure your codebase better.\nLook into the use of modules and packages\
    \ for more information on importing functionality."
