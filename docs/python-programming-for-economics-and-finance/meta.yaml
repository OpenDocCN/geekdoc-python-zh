  md: '# 10.1.1 References


    +   - The official NumPy documentation.


    # 10.2 NumPy Arrays


    The essential problem that NumPy solves is fast array processing.

    The most important structure that NumPy defines is an array data type formally
    called a `numpy.ndarray`.

    NumPy arrays power a large proportion of the scientific Python ecosystem.

    Let’s first import the library.


    ```

    import numpy as np

    ```


    To create a NumPy array containing only zeros we use `np.zeros`


    ```

    a = np.zeros(3)

    a

    ```


    ```

    array([0., 0., 0.])

    ```


    ```

    type(a)

    ```


    ```

    numpy.ndarray

    ```


    NumPy arrays are somewhat like native Python lists, except that


    +   - Data *must be homogeneous* (all elements of the same type).

    - These types must be one of the `data types` (`dtypes`) provided by NumPy.


    The most important of these dtypes are:


    +   - `float64`: 64 bit floating-point number

    - `int64`: 64 bit integer

    - `bool`: 8 bit True or False


    There are also dtypes to represent complex numbers, unsigned integers, etc.

    On modern machines, the default dtype for arrays is `float64`


    ```

    a = np.zeros(3)

    type(a[0])

    ```


    ```

    numpy.float64

    ```


    If we want to use integers we can specify as follows:


    ```

    a = np.zeros(3, dtype=int)

    type(a[0])

    ```'
