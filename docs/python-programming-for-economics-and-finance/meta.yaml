  - "[PAGE 281]\n\n(continued from previous page)\n\n```\ntime2 = qe.toc()\n```\n\n\
    ```\nTOC: Elapsed: 0:00:0.20\n```\n\nThis is already a massive speed gain.\n\n\
    In fact, the next time and all subsequent times it runs even faster as the function\
    \ has been compiled and is in memory:\n\n```\nqe.tic()\nqm_numba(0.1, int(n))\n\
    time3 = qe.toc()\n```\n\n```\nTOC: Elapsed: 0:00:0.02\n```\n\n```\ntime1 / time3\
    \  # Calculate speed gain\n```\n\n```\n128.11253329868106\n```\n\nThis kind of\
    \ speed gain is huge relative to how simple and clear the implementation is.\n\
    \n# 15.2.2 How and When it Works\n\nNumba attempts to generate fast machine code\
    \ using the infrastructure provided by the LLVM Project.\n\nIt does this by inferring\
    \ type information on the fly.\n\n(See our *earlier lecture* on scientific computing\
    \ for a discussion of types.)\n\nThe basic idea is this:\n\n+   - Python is very\
    \ flexible and hence we could call the function qm with many types.\n    - e.g.,\
    \ x0 could be a NumPy array or a list, n could be an integer or a float, etc.\n\
    - This makes it hard to *pre-compile* the function.\n- However, when we do actually\
    \ call the function, say by executing qm(0.5, 10), the types of x0 and n become\
    \ clear.\n- Moreover, the types of other variables in qm can be inferred once\
    \ the input is known.\n- So the strategy of Numba and other JIT compilers is to\
    \ wait until this moment, and *then* compile the function.\n\nThat's why it is\
    \ called \"just-in-time\" compilation.\n\nNote that, if you make the call qm(0.5,\
    \ 10) and then follow it with qm(0.9, 20), compilation only takes place on the\
    \ first call.\n\nThe compiled code is then cached and recycled as required."
  - "[PAGE 282]\n\n# 15.3 Decorator Notation\n\nIn the code above we created a JIT\
    \ compiled version of `qm` via the call\n\n```\nqm_numba = njit(qm)\n```\n\nIn\
    \ practice this would typically be done using an alternative *decorator* syntax.\n\
    (We will explain all about decorators in a *later lecture* but you can skip the\
    \ details at this stage.)\nLet's see how this is done.\nTo target a function for\
    \ JIT compilation we can put `@njit` before the function definition.\nHere's what\
    \ this looks like for `qm`\n\n```\n@njit\ndef qm(x0, n):\n    x = np.empty(n+1)\n\
    \    x[0] = x0\n    for t in range(n):\n        x[t+1] = a * x[t] * (1 - x[t])\n\
    \    return x\n```\n\nThis is equivalent to `qm = njit(qm)`.\nThe following now\
    \ uses the jitted version:\n\n```\n%%time\n\nqm(0.1, 100_000)\n```\n\n```\nCPU\
    \ times: user 65.9 ms, sys: 4.11 ms, total: 70 ms\nWall time: 69.7 ms\n\narray([0.1\
    \       , 0.36      , 0.9216    , ..., 0.98112405, 0.07407858,\n       0.27436377])\n\
    ```\n\nNumba provides several arguments for decorators to accelerate computation\
    \ and cache functions [here](https://numba.pydata.org/numba-doc/latest/reference/jit.html).\n\
    In the *following lecture on parallelization*, we will discuss how to use the\
    \ `parallel` argument to achieve automatic parallelization.\n\n# 15.4 Type Inference\n\
    \nClearly type inference is a key part of JIT compilation.\nAs you can imagine,\
    \ inferring types is easier for simple Python objects (e.g., simple scalar data\
    \ types such as floats and integers).\nNumba also plays well with NumPy arrays.\n\
    In an ideal setting, Numba can infer all necessary type information.\nThis allows\
    \ it to generate native machine code, without having to call the Python runtime\
    \ environment.\nIn such a setting, Numba will be on par with machine code from\
    \ low-level languages."
