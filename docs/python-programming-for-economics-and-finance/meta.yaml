    # 6.2.3 Object Content: Data and Attributes


    If we set `x = 42` then we create an object of type `int` that contains the data
    `42`.

    In fact, it contains more, as the following example shows


    ```

    x = 42

    x

    ```


    ```

    42

    ```


    ```

    x.imag

    ```


    ```

    0

    ```


    ```

    x.__class__

    ```


    ```

    int

    ```


    When Python creates this integer object, it stores with it various auxiliary information,
    such as the imaginary part, and the type.

    Any name following a dot is called an *attribute* of the object to the left of
    the dot.


    +   - e.g., `imag` and `__class__` are attributes of `x`.


    We see from this example that objects have attributes that contain auxiliary information.

    They also have attributes that act like functions, called *methods*.

    These attributes are important, so let''s discuss them in-depth.


    # 6.2.4 Methods


    Methods are *functions that are bundled with objects*.

    Formally, methods are attributes of objects that are callable (i.e., can be called
    as functions)


    ```

    x = [''foo'', ''bar'']

    callable(x.append)

    ```


    ```

    True

    ```


    ```

    callable(x.__doc__)

    ```


    ```

    False

    ```


    Methods typically act on the data contained in the object they belong to, or combine
    that data with other data'
