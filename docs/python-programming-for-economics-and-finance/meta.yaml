  md: '# 6.3.2 Namespaces


    Recall from the preceding discussion that the statement


    ```

    x = 42

    ```


    binds the name x to the integer object on the right-hand side.

    We also mentioned that this process of binding x to the correct object is implemented
    as a dictionary.

    This dictionary is called a *namespace*.

    **Definition:** A namespace is a symbol table that maps names to objects in memory.

    Python uses multiple namespaces, creating them on the fly as necessary.

    For example, every time we import a module, Python creates a namespace for that
    module.

    To see this in action, suppose we write a script `mathfoo.py` with a single line


    ```

    %%file mathfoo.py

    pi = ''foobar''

    ```


    ```

    Writing mathfoo.py

    ```


    Now we start the Python interpreter and import it


    ```

    import mathfoo

    ```


    Next let''s import the `math` module from the standard library


    ```

    import math

    ```


    Both of these modules have an attribute called `pi`


    ```

    math.pi

    ```


    ```

    3.141592653589793

    ```


    ```

    mathfoo.pi

    ```


    ```

    ''foobar''

    ```


    These two different bindings of `pi` exist in different namespaces, each one implemented
    as a dictionary.

    We can look at the dictionary directly, using `module_name.__dict__`


    ```

    import math

    math.__dict__.items()

