    \ the above and add some cautionary notes.\n\n# 15.7.1 Limitations\n\nAs we’ve\
    \ seen, Numba needs to infer type information on all variables to generate fast\
    \ machine-level instructions.\nFor simple routines, Numba infers types very well.\n\
    For larger ones, or for routines using external libraries, it can easily fail.\n\
    Hence, it’s prudent when using Numba to focus on speeding up small, time-critical\
    \ snippets of code.\nThis will give you much better performance than blanketing\
    \ your Python programs with @njit statements.\n\n# 15.7.2 A Gotcha: Global Variables\n\
    \nHere’s another thing to be careful about when using Numba.\nConsider the following\
