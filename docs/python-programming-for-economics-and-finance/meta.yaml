    # 21.1 Fixing Your Local Environment\n\nThe basic assumption of the lectures is\
    \ that code in a lecture should execute whenever\n1. it is executed in a Jupyter\
    \ notebook and\n2. the notebook is running on a machine with the latest version\
    \ of Anaconda Python.\nYou have installed Anaconda, haven’t you, following the\
