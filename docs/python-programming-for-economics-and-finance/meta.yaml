  mdcn: "## 20.3.3 运行时错误处理\n\n上面使用的方法有些局限，因为它总是导致程序终止。\n有时我们可以通过处理特殊情况来更优雅地处理错误。\n\
    让我们看看这是如何做到的。\n\n## 捕获异常\n\n我们可以使用 `try-except` 块来捕获和处理异常。\n这里有一个简单的例子\n\n```python\n\
    def f(x):\n    try:\n        return 1.0 / x\n    except ZeroDivisionError:\n \
    \       print('Error: division by zero. Returned None')\n        return None\n\
    ```\n\n当我们调用 `f` 时，会得到以下输出\n\n```python\nf(2)\n```\n\n```\n0.5\n```\n\n```python\n\
    f(0)\n```\n\n```\nError: division by zero. Returned None\n```\n\n```python\nf(0.0)\n\
    ```\n\n```\nError: division by zero. Returned None\n```\n\n错误被捕获，程序的执行不会终止。\n\
    请注意，其他类型的错误没有被捕获。\n如果我们担心用户可能会传入字符串，我们也可以捕获那个错误\n\n```python\ndef f(x):\n    try:\n\
    \        return 1.0 / x\n    except ZeroDivisionError:\n        print('Error:\
    \ Division by zero. Returned None')\n    except TypeError:\n        print(f'Error:\
    \ x cannot be of type {type(x)}. Returned None')\n    return None\n```\n\n以下是发生的情况\n\
    \n```python\nf(2)\n```\n\n```\n0.5\n```\n\n```python\nf(0)\n```\n\n```\nError:\
    \ Division by zero. Returned None\n```\n\n```python\nf('foo')\n```\n\n```\nError:\
    \ x cannot be of type <class 'str'>. Returned None\n```\n\n如果我们觉得懒，可以一起捕获这些错误\n\
    \n```python\ndef f(x):\n    try:\n        return 1.0 / x\n    except:\n      \
    \  print(f'Error. An issue has occurred with x = {x} of type: {type(x)}')\n  \
    \      return None\n```\n\n以下是发生的情况\n\n```python\nf(2)\n```\n\n```\n0.5\n```\n\
    \n```python\nf(0)\n```\n\n```\nError. An issue has occurred with x = 0 of type:\
    \ <class 'int'>\n```\n\n```python\nf('foo')\n```\n\n```\nError. An issue has occurred\
    \ with x = foo of type: <class 'str'>\n```\n\n通常，更具体一些会更好。\n\n## 20.4 练习\n\n###\
    \ 练习 20.4.1\n\n假设我们有一个文本文件 `numbers.txt`，包含以下行\n\n```\nprices\n3\n8\n\n7\n21\n\
    ```\n\n## 经济与金融的 Python 编程\n\n使用 `try - except`，编写一个程序来读取文件内容并对数字求和，忽略没有数字的行。\n\
    你可以使用我们*之前*学过的 `open()` 函数来打开 `numbers.txt`。\n\n### 练习 20.4.1 的解答\n\n让我们先保存数据\n\
    \n```python\n%%file numbers.txt\nprices\n3\n8\n\n7\n21\n```\n\n写入 numbers.txt\n\
    \n```python\nf = open('numbers.txt')\n\ntotal = 0.0\nfor line in f:\n    try:\n\
    \        total += float(line)\n    except ValueError:\n        pass\n\nf.close()\n\
    \nprint(total)\n```\n\n```\n39.0\n```\n\n## 第五部分\n\n## 其他\n\n## 第二十一章\n## 故障排除\n\
