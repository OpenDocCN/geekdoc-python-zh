    \ + 1/y)**2, 1))\n```\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_269_0.png)\n\
    \n```python\np = plot_implicit(And(2*x + 5*y <= 30, 4*x + 2*y >= 20),\n      \
    \           (x, -1, 10), (y, -10, 10))\n```\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_270_0.png)\n\
    \nand visualizations in three-dimensional space\n\n```python\np = plot3d(cos(2*x\
    \ + y), zlabel='')\n```\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_271_0.png)\n\
    \n## 14.6 Application: Two-person Exchange Economy\n\nImagine a pure exchange\
    \ economy with two people ($a$ and $b$) and two goods recorded as proportions\
    \ ($x$ and $y$).\nThey can trade goods with each other according to their preferences.\n\
    Assume that the utility functions of the consumers are given by\n\n$u_a(x, y)\
    \ = x^\\alpha y^{1-\\alpha}$\n\n$u_b(x, y) = (1-x)^\\beta (1-y)^{1-\\beta}$\n\n\
    where $\\alpha, \\beta \\in (0, 1)$.\nFirst we define the symbols and utility\
    \ functions\n\n```python\n# Define symbols and utility functions\nx, y, α, β =\
    \ symbols('x, y, α, β')\nu_a = x**α * y**(1-α)\nu_b = (1 - x)**β * (1 - y)**(1\
    \ - β)\n```\n\n```python\nu_a\n```\n\n$x^{\\alpha} y^{1-\\alpha}$\n\n```python\n\
    u_b\n```\n\n$(1-x)^{\\beta} (1-y)^{1-\\beta}$\n\nWe are interested in the Pareto\
    \ optimal allocation of goods $x$ and $y$.\nNote that a point is Pareto efficient\
    \ when the allocation is optimal for one person given the allocation for the other\
    \ person.\nIn terms of marginal utility:\n\n$\\frac{\\frac{\\partial u_a}{\\partial\
    \ x}}{\\frac{\\partial u_a}{\\partial y}} = \\frac{\\frac{\\partial u_b}{\\partial\
    \ x}}{\\frac{\\partial u_b}{\\partial y}}$\n\n```python\n# A point is Pareto efficient\
    \ when the allocation is optimal\n# for one person given the allocation for the\
    \ other person\n\npareto = Eq(diff(u_a, x)/diff(u_a, y),\n            diff(u_b,\
    \ x)/diff(u_b, y))\npareto\n```\n\n$\\frac{y y^{1-\\alpha} y^{\\alpha-1} \\alpha}{x\
    \ (1-\\alpha)} = -\\frac{\\beta (1-y) (1-y)^{1-\\beta} (1-y)^{\\beta-1}}{(1-x)\
    \ (\\beta-1)}$\n\n```python\n# Solve the equation\nsol = solve(pareto, y)[0]\n\
    sol\n```\n\n$\\frac{x \\beta (\\alpha-1)}{x \\alpha - x \\beta + \\alpha \\beta\
    \ - \\alpha}$\n\nLet's compute the Pareto optimal allocations of the economy (contract\
    \ curves) with $\\alpha = \\beta = 0.5$ using SymPy\n\n```python\n# Substitute\
    \ α = 0.5 and β = 0.5\nsol.subs({α: 0.5, β: 0.5})\n```\n\n$1.0x$\n\nWe can use\
    \ this result to visualize more contract curves under different parameters\n\n\
    ```python\n# Plot a range of αs and βs\nparams = [{α: 0.5, β: 0.5},\n        \
    \  {α: 0.1, β: 0.9},\n          {α: 0.1, β: 0.8},\n          {α: 0.8, β: 0.9},\n\
    \          {α: 0.4, β: 0.8},\n          {α: 0.8, β: 0.1},\n          {α: 0.9,\
    \ β: 0.8},\n          {α: 0.8, β: 0.4},\n          {α: 0.9, β: 0.1}]\n\np = plot(xlabel='x',\
    \ ylabel='y', show=False)\n\nfor param in params:\n    p_add = plot(sol.subs(param),\
    \ (x, 0, 1),\n                 show=False)\n    p.append(p_add[0])\np.show()\n\
    ```\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_273_0.png)\n\nWe invite you to\
    \ play with the parameters and see how the contract curves change and think about\
    \ the following two questions:\n\n- Can you think of a way to draw the same graph\
    \ using `numpy`?\n- How difficult will it be to write a `numpy` implementation?\n\
    \n## 14.7 Exercises\n\n**Exercise 14.7.1**\n\nL'Hôpital's rule states that for\
    \ two functions $f(x)$ and $g(x)$, if $\\lim_{x \\to a} f(x) = \\lim_{x \\to a}\
    \ g(x) = 0$ or $\\pm \\infty$, then\n\n$$\\lim_{x \\to a} \\frac{f(x)}{g(x)} =\
    \ \\lim_{x \\to a} \\frac{f'(x)}{g'(x)}$$\n\nUse SymPy to verify L'Hôpital's rule\
    \ for the following functions\n\n$$f(x) = \\frac{y^x - 1}{x}$$\n\nas $x$ approaches\
    \ to 0\n\n**Solution to Exercise 14.7.1**\n\nLet's define the function first\n\
    \n```python\nf_upper = y**x - 1\nf_lower = x\nf = f_upper/f_lower\nf\n```\n\n\
    $$\\frac{y^x - 1}{x}$$\n\nSympy is smart enough to solve this limit\n\n```python\n\
    lim = limit(f, x, 0)\nlim\n```\n\n$$\\log(y)$$\n\nWe compare the result suggested\
    \ by L'Hôpital's rule\n\n```python\nlim = limit(diff(f_upper, x)/\n          \
    \  diff(f_lower, x), x, 0)\nlim\n```\n\n$$\\log(y)$$\n\n**Exercise 14.7.2**\n\n\
    Maximum likelihood estimation (MLE) is a method to estimate the parameters of\
    \ a statistical model.\nIt usually involves maximizing a log-likelihood function\
    \ and solving the first-order derivative.\nThe binomial distribution is given\
    \ by\n\n$$f(x; n, \\theta) = \\frac{n!}{x!(n-x)!} \\theta^x (1-\\theta)^{n-x}$$\n\
    \nwhere $n$ is the number of trials and $x$ is the number of successes.\nAssume\
    \ we observed a series of binary outcomes with $x$ successes out of $n$ trials.\n\
    Compute the MLE of $\\theta$ using SymPy\n\n**Solution to Exercise 14.7.2**\n\n\
    First, we define the binomial distribution\n\n```python\nn, x, θ = symbols('n\
    \ x θ')\n\nbinomial_factor = (factorial(n)) / (factorial(x)*factorial(n-x))\n\
    binomial_factor\n```\n\n$$\\frac{n!}{x!(n-x)!}$$\n\n```python\nbino_dist = binomial_factor\
    \ * ((θ**x) * (1-θ) ** (n-x))\nbino_dist\n```\n\n$$\\frac{\\theta^x (1-\\theta)^{n-x}\
    \ n!}{x!(n-x)!}$$\n\nNow we compute the log-likelihood function and solve for\
    \ the result\n\n```python\nlog_bino_dist = log(bino_dist)\n```\n\n```python\n\
    log_bino_diff = simplify(diff(log_bino_dist, θ))\nlog_bino_diff\n```\n\n$$\\frac{n\\\
    theta - x}{\\theta(\\theta - 1)}$$\n\n```python\nsolve(Eq(log_bino_diff, 0), θ)[0]\n\
    ```\n\n$$\\frac{x}{n}$$"
