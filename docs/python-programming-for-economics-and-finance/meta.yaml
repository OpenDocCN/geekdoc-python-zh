  md: "# 6.3.5 The Global Namespace\n\nPython documentation often makes reference\
    \ to the “global namespace”.\nThe global namespace is *the namespace of the module\
    \ currently being executed*.\nFor example, suppose that we start the interpreter\
    \ and begin making assignments.\nWe are now working in the module `__main__`,\
    \ and hence the namespace for `__main__` is the global namespace.\nNext, we import\
    \ a module called `amodule`\n\n```\nimport amodule\n```\n\nAt this point, the\
    \ interpreter creates a namespace for the module `amodule` and starts executing\
    \ commands in the module.\nWhile this occurs, the namespace `amodule.__dict__`\
    \ is the global namespace.\nOnce execution of the module finishes, the interpreter\
    \ returns to the module from where the import statement was made.\nIn this case\
    \ it’s `__main__`, so the namespace of `__main__` again becomes the global namespace.\n\
    \n# 6.3.6 Local Namespaces\n\nImportant fact: When we call a function, the interpreter\
    \ creates a *local namespace* for that function, and registers the variables in\
    \ that namespace.\nThe reason for this will be explained in just a moment.\nVariables\
    \ in the local namespace are called *local variables*.\nAfter the function returns,\
    \ the namespace is deallocated and lost.\nWhile the function is executing, we\
    \ can view the contents of the local namespace with `locals()`.\nFor example,\
    \ consider\n\n```\ndef f(x):\n    a = 2\n    print(locals())\n    return a * x\n\
    ```\n\nNow let’s call the function\n\n```\nf(1)\n{'x': 1, 'a': 2}\n2\n```\n\n\
    You can see the local namespace of `f` before it is destroyed."
