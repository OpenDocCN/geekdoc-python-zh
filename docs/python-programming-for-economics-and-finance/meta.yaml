  md: "# Python Programming for Economics and Finance\n\n# 16.3.2 A Multithreaded\
    \ Ufunc\n\nOver the last few years, NumPy has managed to push this kind of multithreading\
    \ out to more and more operations.\nFor example, let's return to a maximization\
    \ problem *discussed previously*:\n\n```\ndef f(x, y):\n    return np.cos(x**2\
    \ + y**2) / (1 + x**2 + y**2)\n\ngrid = np.linspace(-3, 3, 5000)\nx, y = np.meshgrid(grid,\
    \ grid)\n```\n\n```\n%timeit np.max(f(x, y))\n```\n\n```\n472 ms ± 1.86 ms per\
    \ loop (mean ± std. dev. of 7 runs, 1 loop each)\n```\n\nIf you have a system\
    \ monitor such as htop (Linux/Mac) or perfmon (Windows), then try running this\
    \ and then observing the load on your CPUs.\n\n(You will probably need to bump\
    \ up the grid size to see large effects.)\nAt least on our machine, the output\
    \ shows that the operation is successfully distributed across multiple threads.\n\
    This is one of the reasons why the vectorized code above is fast.\n\n# 16.3.3\
    \ A Comparison with Numba\n\nTo get some basis for comparison for the last example,\
    \ let's try the same thing with Numba.\nIn fact there is an easy way to do this,\
    \ since Numba can also be used to create custom `ufuncs` with the `@vectorize`\
    \ decorator.\n\n```\nfrom numba import vectorize\n\n@vectorize\ndef f_vec(x, y):\n\
    \    return np.cos(x**2 + y**2) / (1 + x**2 + y**2)\n\nnp.max(f_vec(x, y))  #\
    \ Run once to compile\n```\n\n```\n0.9999992797121728\n```\n\n```\n%timeit np.max(f_vec(x,\
    \ y))\n```\n\n```\n334 ms ± 1.15 ms per loop (mean ± std. dev. of 7 runs, 1 loop\
    \ each)\n```\n\nAt least on our machine, the difference in the speed between the\
    \ Numba version and the vectorized NumPy version shown above is not large.\n\n\
    But there's quite a bit going on here so let's try to break down what is happening.\n\
    Both Numba and NumPy use efficient machine code that's specialized to these floating\
    \ point operations.\nHowever, the code NumPy uses is, in some ways, less efficient.\n\
    The reason is that, in NumPy, the operation `np.cos(x**2 + y**2) / (1 + x**2 +\
    \ y**2)` generates several intermediate arrays."
