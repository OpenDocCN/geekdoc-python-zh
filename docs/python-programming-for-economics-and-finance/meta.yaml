  md: "# Python Programming for Economics and Finance\n\n```\nimport numpy as np\n\
    \ndef check_nonneg(func):\n    def safe_function(x):\n        assert x >= 0, \"\
    Argument must be nonnegative\"\n        return func(x)\n    return safe_function\n\
    \ndef f(x):\n    return np.log(np.log(x))\n\ndef g(x):\n    return np.sqrt(42\
    \ * x)\n\nf = check_nonneg(f)\ng = check_nonneg(g)\n# Program continues with various\
    \ calculations using f and g\n```\n\nThis looks complicated so let’s work through\
    \ it slowly.\nTo unravel the logic, consider what happens when we say `f = check_nonneg(f)`.\n\
    This calls the function `check_nonneg` with parameter `func` set equal to `f`.\n\
    Now `check_nonneg` creates a new function called `safe_function` that verifies\
    \ `x` as nonnegative and then calls `func` on it (which is the same as `f`).\n\
    Finally, the global name `f` is then set equal to `safe_function`.\nNow the behavior\
    \ of `f` is as we desire, and the same is true of `g`.\nAt the same time, the\
    \ test logic is written only once.\n\n# Enter Decorators\n\nThe last version of\
    \ our code is still not ideal.\nFor example, if someone is reading our code and\
    \ wants to know how `f` works, they will be looking for the function definition,\
    \ which is\n\n```\ndef f(x):\n    return np.log(np.log(x))\n```\n\nThey may well\
    \ miss the line `f = check_nonneg(f)`.\nFor this and other reasons, decorators\
    \ were introduced to Python.\nWith decorators, we can replace the lines\n\n```\n\
    def f(x):\n    return np.log(np.log(x))\n\ndef g(x):\n    return np.sqrt(42 *\
    \ x)\n\nf = check_nonneg(f)\ng = check_nonneg(g)\n```\n\nwith"
