- md: "## Python Programming for Economics and Finance\n\n## 6.1.1 Python and OOP\n\
    \nPython is a pragmatic language that blends object-oriented and procedural styles,\
    \ rather than taking a purist approach.\nHowever, at a foundational level, Python\
    \ *is* object-oriented.\nIn particular, in Python, *everything is an object*.\n\
    In this lecture, we explain what that statement means and why it matters.\n\n\
    ## 6.2 Objects\n\nIn Python, an *object* is a collection of data and instructions\
    \ held in computer memory that consists of\n\n- 1. a type\n- 2. a unique identity\n\
    - 3. data (i.e., content)\n- 4. methods\n\nThese concepts are defined and discussed\
    \ sequentially below.\n\n### 6.2.1 Type\n\nPython provides for different types\
    \ of objects, to accommodate different categories of data.\nFor example\n\n```\n\
    s = 'This is a string'\ntype(s)\n```\n\n```\nstr\n```\n\n```\nx = 42   # Now let's\
    \ create an integer\ntype(x)\n```\n\n```\nint\n```\n\nThe type of an object matters\
    \ for many expressions.\nFor example, the addition operator between two strings\
    \ means concatenation\n\n```\n'300' + 'cc'\n```\n\n```\n'300cc'\n```\n\nOn the\
    \ other hand, between two numbers it means ordinary addition\n\n```\n300 + 400\n\
    ```\n\n```\n700\n```\n\nConsider the following expression\n\n```\n'300' + 400\n\
    ```\n\n```\n---------------------------------------------------------------------------\n\
    TypeError                                 Traceback (most recent call last)\n\
    Cell In[5], line 1\n----> 1 '300' + 400\n\nTypeError: can only concatenate str\
    \ (not \"int\") to str\n```\n\nHere we are mixing types, and it's unclear to Python\
    \ whether the user wants to\n\n- convert '300' to an integer and then add it to\
    \ 400, or\n- convert 400 to string and then concatenate it with '300'\n\nSome\
    \ languages might try to guess but Python is *strongly typed*\n\n- Type is important,\
    \ and implicit type conversion is rare.\n- Python will respond instead by raising\
    \ a `TypeError`.\n\nTo avoid the error, you need to clarify by changing the relevant\
    \ type.\nFor example,\n\n```\nint('300') + 400  # To add as numbers, change the\
    \ string to an integer\n```\n\n```\n700\n```\n\n### 6.2.2 Identity\n\nIn Python,\
    \ each object has a unique identifier, which helps Python (and us) keep track\
    \ of the object.\nThe identity of an object can be obtained via the `id()` function\n\
    \n```\ny = 2.5\nz = 2.5\nid(y)\n```\n\n```\n140472214388432\n```\n\n```\nid(z)\n\
    ```\n\n```\n140472214388240\n```\n\nIn this example, `y` and `z` happen to have\
    \ the same value (i.e., 2.5), but they are not the same object.\nThe identity\
    \ of an object is in fact just the address of the object in memory.\n\n### 6.2.3\
    \ Object Content: Data and Attributes\n\nIf we set `x = 42` then we create an\
    \ object of type `int` that contains the data `42`.\nIn fact, it contains more,\
    \ as the following example shows\n\n```\nx = 42\nx\n```\n\n```\n42\n```\n\n```\n\
    x.imag\n```\n\n```\n0\n```\n\n```\nx.__class__\n```\n\n```\nint\n```\n\nWhen Python\
    \ creates this integer object, it stores with it various auxiliary information,\
    \ such as the imaginary part, and the type.\nAny name following a dot is called\
    \ an *attribute* of the object to the left of the dot.\n\n- e.g., `imag` and `__class__`\
    \ are attributes of `x`.\n\nWe see from this example that objects have attributes\
    \ that contain auxiliary information.\nThey also have attributes that act like\
    \ functions, called *methods*.\nThese attributes are important, so let's discuss\
    \ them in-depth.\n\n### 6.2.4 Methods\n\nMethods are *functions that are bundled\
    \ with objects*.\nFormally, methods are attributes of objects that are callable\
    \ (i.e., can be called as functions)\n\n```\nx = ['foo', 'bar']\ncallable(x.append)\n\
    ```\n\n```\nTrue\n```\n\n```\ncallable(x.__doc__)\n```\n\n```\nFalse\n```\n\n\
    Methods typically act on the data contained in the object they belong to, or combine\
    \ that data with other data\n\n```\nx = ['a', 'b']\nx.append('c')\ns = 'This is\
    \ a string'\ns.upper()\n```\n\n```\n'THIS IS A STRING'\n```\n\n```\ns.lower()\n\
    ```\n\n```\n'this is a string'\n```\n\n```\ns.replace('This', 'That')\n```\n\n\
    ```\n'That is a string'\n```\n\nA great deal of Python functionality is organized\
    \ around method calls.\nFor example, consider the following piece of code\n\n\
    ```\nx = ['a', 'b']\nx[0] = 'aa'  # Item assignment using square bracket notation\n\
    x\n```\n\n```\n['aa', 'b']\n```\n\nIt doesn't look like there are any methods\
    \ used here, but in fact the square bracket assignment notation is just a convenient\
    \ interface to a method call.\nWhat actually happens is that Python calls the\
    \ `__setitem__` method, as follows\n\n```\nx = ['a', 'b']\nx.__setitem__(0, 'aa')\
    \  # Equivalent to x[0] = 'aa'\nx\n```\n\n```\n['aa', 'b']\n```\n\n(If you wanted\
    \ to you could modify the `__setitem__` method, so that square bracket assignment\
    \ does something totally different)\n\n## 6.3 Names and Name Resolution\n\n###\
    \ 6.3.1 Variable Names in Python\n\nConsider the Python statement\n\n```\nx =\
    \ 42\n```\n\nWe now know that when this statement is executed, Python creates\
    \ an object of type `int` in your computer's memory, containing\n\n- the value\
    \ 42\n- some associated attributes\n\nBut what is x itself?\nIn Python, x is called\
    \ a *name*, and the statement x = 42 *binds* the name x to the integer object\
    \ we have just discussed.\nUnder the hood, this process of binding names to objects\
    \ is implemented as a dictionary—more about this in a moment.\nThere is no problem\
    \ binding two or more names to the one object, regardless of what that object\
    \ is\n\n```\ndef f(string):    # Create a function called f\n    print(string)\
    \  # that prints any string it's passed\n\ng = f\nid(g) == id(f)\n```\n\n```\n\
    True\n```\n\n```\ng('test')\n```\n\n```\ntest\n```\n\nIn the first step, a function\
    \ object is created, and the name f is bound to it.\nAfter binding the name g\
    \ to the same object, we can use it anywhere we would use f.\nWhat happens when\
    \ the number of names bound to an object goes to zero?\nHere's an example of this\
    \ situation, where the name x is first bound to one object and then rebound to\
    \ another\n\n```\nx = 'foo'\nid(x)\n```\n\n```\n140472239369648\n```\n\n```\n\
    x = 'bar'  # No names bound to the first object\n```\n\nWhat happens here is that\
    \ the first object is garbage collected.\nIn other words, the memory slot that\
    \ stores that object is deallocated, and returned to the operating system.\nGarbage\
    \ collection is actually an active research area in computer science.\nYou can\
    \ [read more on garbage collection](https://en.wikipedia.org/wiki/Garbage_collection_(computer_science))\
    \ if you are interested.\n\n### 6.3.2 Namespaces\n\nRecall from the preceding\
    \ discussion that the statement\n\n```\nx = 42\n```\n\nbinds the name x to the\
    \ integer object on the right-hand side.\nWe also mentioned that this process\
    \ of binding x to the correct object is implemented as a dictionary.\nThis dictionary\
    \ is called a *namespace*.\n**Definition:** A namespace is a symbol table that\
    \ maps names to objects in memory.\nPython uses multiple namespaces, creating\
    \ them on the fly as necessary.\nFor example, every time we import a module, Python\
    \ creates a namespace for that module.\nTo see this in action, suppose we write\
    \ a script `mathfoo.py` with a single line\n\n```\n%%file mathfoo.py\npi = 'foobar'\n\
    ```\n\n```\nWriting mathfoo.py\n```\n\nNow we start the Python interpreter and\
    \ import it\n\n```\nimport mathfoo\n```\n\nNext let's import the `math` module\
    \ from the standard library\n\n```\nimport math\n```\n\nBoth of these modules\
    \ have an attribute called `pi`\n\n```\nmath.pi\n```\n\n```\n3.141592653589793\n\
    ```\n\n```\nmathfoo.pi\n```\n\n```\n'foobar'\n```\n\nThese two different bindings\
    \ of `pi` exist in different namespaces, each one implemented as a dictionary.\n\
    We can look at the dictionary directly, using `module_name.__dict__`\n\n```\n\
    import math\nmath.__dict__.items()\n```\n\n```\ndict_items([('__name__', 'math'),\
    \ ('__doc__', 'This module provides access to the\nmathematical functions\\ndefined\
    \ by the C standard.'), ('__package__', ''), ('__\nloader__', <_frozen_importlib_external.ExtensionFileLoader\
    \ object at\n0x7fc23f2bba50>), ('__spec__', ModuleSpec(name='math', loader=<_frozen_importlib_\n\
    external.ExtensionFileLoader object at 0x7fc23f2bba50>, origin='/usr\nminiconda3/envs/quantecon/lib/python3.11/lib-dynload/math.cpython-311-x86_64-\n\
