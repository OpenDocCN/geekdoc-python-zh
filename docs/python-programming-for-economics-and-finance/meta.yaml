- md: "## 5.6 Coding Style and Documentation\n\nA consistent coding style and the\
    \ use of documentation can make the code easier to understand and maintain.\n\n\
    ### 5.6.1 Python Style Guidelines: PEP8\n\nYou can find Python programming philosophy\
    \ by typing `import this` at the prompt.\nAmong other things, Python strongly\
    \ favors consistency in programming style.\nWe've all heard the saying about consistency\
    \ and little minds.\nIn programming, as in mathematics, the opposite is true.\n\
    \n- A mathematical paper where the symbols ∪ and ∩ were reversed would be very\
    \ hard to read, even if the author told you so on the first page.\n\nIn Python,\
    \ the standard style is set out in `PEP8`.\n(Occasionally we'll deviate from PEP8\
    \ in these lectures to better match mathematical notation)\n\n### 5.6.2 Docstrings\n\
    \nPython has a system for adding comments to modules, classes, functions, etc.\
    \ called *docstrings*.\nThe nice thing about docstrings is that they are available\
    \ at run-time.\nTry running this\n\n```python\ndef f(x):\n    \"\"\"\n    This\
    \ function squares its argument\n    \"\"\"\n    return x**2\n```\n\nAfter running\
    \ this code, the docstring is available\n\n```\nf?\n```\n\n```\nType:        function\n\
    String Form: <function f at 0x2223320>\nFile:        /home/john/temp/temp.py\n\
    Definition:  f(x)\nDocstring:   This function squares its argument\n```\n\n```\n\
    f??\n```\n\n```\nType:        function\nString Form: <function f at 0x2223320>\n\
    File:        /home/john/temp/temp.py\nDefinition:  f(x)\nSource:\ndef f(x):\n\
    \    \"\"\"\n    This function squares its argument\n    \"\"\"\n    return x**2\n\
    ```\n\nWith one question mark we bring up the docstring, and with two we get the\
    \ source code as well.\nYou can find conventions for docstrings in PEP257.\n\n\
    ## 5.7 Exercises\n\nSolve the following exercises.\n(For some, the built-in function\
    \ `sum()` comes in handy).\n\n**Exercise 5.7.1**\n\nPart 1: Given two numeric\
    \ lists or tuples `x_vals` and `y_vals` of equal length, compute their inner product\
    \ using `zip()`.\n\nPart 2: In one line, count the number of even numbers in 0,...,99.\n\
    \nPart 3: Given `pairs = ((2, 5), (4, 2), (9, 8), (12, 10))`, count the number\
    \ of pairs `(a, b)` such that both `a` and `b` are even.\n\n**Hint:** `x % 2`\
    \ returns 0 if `x` is even, 1 otherwise.\n\n**Solution to Exercise 5.7.1**\n\n\
    **Part 1 Solution:**\n\nHere's one possible solution\n\n```python\nx_vals = [1,\
    \ 2, 3]\ny_vals = [1, 1, 1]\nsum([x * y for x, y in zip(x_vals, y_vals)])\n```\n\
    \n```\n6\n```\n\nThis also works\n\n```python\nsum(x * y for x, y in zip(x_vals,\
    \ y_vals))\n```\n\n```\n6\n```\n\n**Part 2 Solution:**\n\nOne solution is\n\n\
    ```python\nsum([x % 2 == 0 for x in range(100)])\n```\n\n```\n50\n```\n\nThis\
    \ also works:\n\n```python\nsum(x % 2 == 0 for x in range(100))\n```\n\n```\n\
    50\n```\n\nSome less natural alternatives that nonetheless help to illustrate\
    \ the flexibility of list comprehensions are\n\n```python\nlen([x for x in range(100)\
    \ if x % 2 == 0])\n```\n\n```\n50\n```\n\nand\n\n```python\nsum([1 for x in range(100)\
    \ if x % 2 == 0])\n```\n\n```\n50\n```\n\n**Part 3 Solution:**\n\nHere's one possibility\n\
    \n```python\npairs = ((2, 5), (4, 2), (9, 8), (12, 10))\nsum([x % 2 == 0 and y\
    \ % 2 == 0 for x, y in pairs])\n```\n\n```\n2\n```\n\n**Exercise 5.7.2**\n\nConsider\
    \ the polynomial\n\n$p(x) = a_0 + a_1 x + a_2 x^2 + \\cdots a_n x^n = \\sum_{i=0}^{n}\
    \ a_i x^i$\n\n(5.1)\n\nWrite a function `p` such that `p(x, coeff)` that computes\
    \ the value in (5.1) given a point `x` and a list of coefficients `coeff` ($a_1,\
    \ a_2, \\cdots a_n$).\nTry to use `enumerate()` in your loop.\n\n**Solution to\
    \ Exercise 5.7.2**\n\nHere's a solution:\n\n```python\ndef p(x, coeff):\n    return\
    \ sum(a * x**i for i, a in enumerate(coeff))\n```\n\n```python\np(1, (2, 4))\n\
    ```\n\n```\n6\n```\n\n**Exercise 5.7.3**\n\nWrite a function that takes a string\
    \ as an argument and returns the number of capital letters in the string.\n\n\
    **Hint:** `'foo'.upper()` returns `'FOO'`.\n\n**Solution to Exercise 5.7.3**\n\
    \nHere's one solution:\n\n```python\ndef f(string):\n    count = 0\n    for letter\
    \ in string:\n        if letter == letter.upper() and letter.isalpha():\n    \
    \        count += 1\n    return count\n```\n\n```python\nf('The Rain in Spain')\n\
    ```\n\n```\n3\n```\n\nAn alternative, more pythonic solution:\n\n```python\ndef\
    \ count_uppercase_chars(s):\n    return sum([c.isupper() for c in s])\n```\n\n\
    ```python\ncount_uppercase_chars('The Rain in Spain')\n```\n\n```\n3\n```\n\n\
    **Exercise 5.7.4**\n\nWrite a function that takes two sequences `seq_a` and `seq_b`\
    \ as arguments and returns `True` if every element in `seq_a` is also an element\
    \ of `seq_b`, else `False`.\n\n- By “sequence” we mean a list, a tuple or a string.\n\
    - Do the exercise without using `sets` and set methods.\n\n**Solution to Exercise\
    \ 5.7.4**\n\nHere’s a solution:\n\n```python\ndef f(seq_a, seq_b):\n    for a\
    \ in seq_a:\n        if a not in seq_b:\n            return False\n    return\
    \ True\n\n# == test == #\nprint(f(\"ab\", \"cadb\"))\nprint(f(\"ab\", \"cjdb\"\
    ))\nprint(f([1, 2], [1, 2, 3]))\nprint(f([1, 2, 3], [1, 2]))\n```\n\n```\nTrue\n\
    False\nTrue\nFalse\n```\n\nAn alternative, more pythonic solution using `all()`:\n\
    \n```python\ndef f(seq_a, seq_b):\n    return all([i in seq_b for i in seq_a])\n\
    \n# == test == #\nprint(f(\"ab\", \"cadb\"))\nprint(f(\"ab\", \"cjdb\"))\nprint(f([1,\
    \ 2], [1, 2, 3]))\nprint(f([1, 2, 3], [1, 2]))\n```\n\n```\nTrue\nFalse\nTrue\n\
    False\n```\n\nOf course, if we use the `sets` data type then the solution is easier\n\
    \n```python\ndef f(seq_a, seq_b):\n    return set(seq_a).issubset(set(seq_b))\n\
    ```\n\n**Exercise 5.7.5**\n\nWhen we cover the numerical libraries, we will see\
    \ they include many alternatives for interpolation and function approximation.\n\
    \nNevertheless, let's write our own function approximation routine as an exercise.\n\
    \nIn particular, without using any imports, write a function `linapprox` that\
    \ takes as arguments\n\n- A function `f` mapping some interval $[a, b]$ into $\\\
    mathbb{R}$.\n- Two scalars `a` and `b` providing the limits of this interval.\n\
    - An integer `n` determining the number of grid points.\n- A number `x` satisfying\
    \ `a <= x <= b`.\n\nand returns the piecewise linear interpolation of `f` at `x`,\
    \ based on `n` evenly spaced grid points `a = point[0] < point[1] < ... < point[n-1]\
    \ = b`.\n\nAim for clarity, not efficiency.\n\n**Solution to Exercise 5.7.5**\n\
    \nHere's a solution:\n\n```python\ndef linapprox(f, a, b, n, x):\n    \"\"\"\n\
    \    Evaluates the piecewise linear interpolant of f at x on the interval\n  \
    \  [a, b], with n evenly spaced grid points.\n\n    Parameters\n    ==========\n\
    \        f : function\n            The function to approximate\n\n        x, a,\
    \ b : scalars (floats or integers)\n            Evaluation point and endpoints,\
    \ with a <= x <= b\n\n        n : integer\n            Number of grid points\n\
    \n    Returns\n    =======\n        A float. The interpolant evaluated at x\n\n\
    \    \"\"\"\n    length_of_interval = b - a\n    num_subintervals = n - 1\n  \
    \  step = length_of_interval / num_subintervals\n\n    # === find first grid point\
    \ larger than x === #\n    point = a\n    while point <= x:\n        point +=\
    \ step\n\n    # === x must lie between the gridpoints (point - step) and point\
    \ === #\n    u, v = point - step, point\n\n    return f(u) + (x - u) * (f(v) -\
    \ f(u)) / (v - u)\n```\n\n**Exercise 5.7.6**\n\nUsing list comprehension syntax,\
    \ we can simplify the loop in the following code.\n\n```python\nimport numpy as\
    \ np\n\nn = 100\nε_values = []\nfor i in range(n):\n    e = np.random.randn()\n\
    \    ε_values.append(e)\n```\n\n**Solution to Exercise 5.7.6**\n\nHere's one solution.\n\
    \n```python\nn = 100\nε_values = [np.random.randn() for i in range(n)]\n```\n\n\
    # CHAPTER SIX\n\n## OOP I: OBJECTS AND NAMES\n\n- Contents\n    - OOP I: Objects\
    \ and Names\n        - Overview\n        - Objects\n        - Names and Name Resolution\n\
    \        - Summary\n        - Exercises\n\n### 6.1 Overview\n\nObject-oriented\
    \ programming (OOP) is one of the major paradigms in programming.\nThe traditional\
    \ programming paradigm (think Fortran, C, MATLAB, etc.) is called *procedural*.\n\
    It works as follows\n\n- The program has a state corresponding to the values of\
    \ its variables.\n- Functions are called to act on these data.\n- Data are passed\
    \ back and forth via function calls.\n\nIn contrast, in the OOP paradigm\n\n-\
    \ data and functions are “bundled together” into “objects”\n\n(Functions in this\
    \ context are referred to as **methods**)"
