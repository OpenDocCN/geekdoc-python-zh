  md: 'There''s some special syntax here so let''s step through carefully


    +   - The `class` keyword indicates that we are building a class.


    The `Consumer` class defines instance data `wealth` and three methods: `__init__`,
    `earn` and `spend`


    +   - `wealth` is *instance data* because each consumer we create (each instance
    of the `Consumer` class) will have its own wealth data.


    The `earn` and `spend` methods deploy the functions we described earlier and that
    can potentially be applied to the `wealth` instance data.


    The `__init__` method is a *constructor method*.


    Whenever we create an instance of the class, the `__init__` method will be called
    automatically.


    Calling `__init__` sets up a "namespace" to hold the instance data — more on this
    soon.


    We''ll also discuss the role of the peculiar `self` bookkeeping device in detail
    below.


    # Usage


    Here''s an example in which we use the class `Consumer` to create an instance
    of a consumer whom we affectionately name `c1`.


    After we create consumer `c1` and endow it with initial wealth 10, we''ll apply
    the `spend` method.


    ```

    c1 = Consumer(10)  # Create instance with initial wealth 10

    c1.spend(5)

    c1.wealth

    ```


    ```

    5

    ```


    ```

    c1.earn(15)

    c1.spend(100)

    ```


    ```

    Insufficient funds

    ```


    We can of course create multiple instances, i.e., multiple consumers, each with
    its own name and data


    ```

    c1 = Consumer(10)

    c2 = Consumer(12)

    c2.spend(4)

    c2.wealth

    ```


    ```

    8

    ```


    ```

    c1.wealth

    ```


    ```

    10

    ```


    Each instance, i.e., each consumer, stores its data in a separate namespace dictionary


    ```

    c1.__dict__

