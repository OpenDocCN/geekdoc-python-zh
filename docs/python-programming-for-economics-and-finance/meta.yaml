    max\n```\n\n```\n<function max>\n```\n\n```python\n__builtins__.max == max\n```\n\
    \n```\nTrue\n```\n\nThe next section explains how this works ...\n\n## 6.3.8 Name\
    \ Resolution\n\nNamespaces are great because they help us organize variable names.\n\
    (Type `import this` at the prompt and look at the last item that's printed)\n\
    However, we do need to understand how the Python interpreter works with multiple\
    \ namespaces.\nUnderstanding the flow of execution will help us to check which\
    \ variables are in scope and how to operate on them when writing and debugging\
    \ programs.\nAt any point of execution, there are in fact at least two namespaces\
    \ that can be accessed directly.\n(\"Accessed directly\" means without using a\
    \ dot, as in `pi` rather than `math.pi`)\nThese namespaces are\n\n- The global\
    \ namespace (of the module being executed)\n- The builtin namespace\n\nIf the\
