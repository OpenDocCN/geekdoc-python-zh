  md: '# Python Programming for Economics and Finance


    # 6.1.1 Python and OOP


    Python is a pragmatic language that blends object-oriented and procedural styles,
    rather than taking a purist approach.

    However, at a foundational level, Python *is* object-oriented.

    In particular, in Python, *everything is an object*.

    In this lecture, we explain what that statement means and why it matters.


    # 6.2 Objects


    In Python, an *object* is a collection of data and instructions held in computer
    memory that consists of


    +   1. a type

    2. a unique identity

    3. data (i.e., content)

    4. methods


    These concepts are defined and discussed sequentially below.


    # 6.2.1 Type


    Python provides for different types of objects, to accommodate different categories
    of data.

    For example


    ```

    s = ''This is a string''

    type(s)

    ```


    ```

    str

    ```


    ```

    x = 42   # Now let''s create an integer

    type(x)

    ```


    ```

    int

    ```


    The type of an object matters for many expressions.

    For example, the addition operator between two strings means concatenation


    ```

    ''300'' + ''cc''

    ```


    ```

    ''300cc''

    ```


    On the other hand, between two numbers it means ordinary addition


    ```

    300 + 400

    ```


    ```

    700

    ```'
