    \n唯一的根大约是 0.408。\n让我们考虑一些求根的数值技术。\n\n### 12.4.1 二分法\n\n最常见的数值求根算法之一是*二分法*。\n要理解这个想法，回想一下那个著名的游戏：\n\
    \n- 玩家 A 想一个 1 到 100 之间的秘密数字\n- 玩家 B 问它是否小于 50\n  - 如果是，B 问它是否小于 25\n  - 如果不是，B\
    \ 问它是否小于 75\n\n以此类推。\n这就是二分法。\n以下是该算法在 Python 中的一个简单实现。\n它适用于所有足够良好的、满足 $f(a)\
    \ < 0 < f(b)$ 的递增连续函数\n\n```python\ndef bisect(f, a, b, tol=10e-5):\n    \"\"\"\
    \n    Implements the bisection root finding algorithm, assuming that f is a\n\
