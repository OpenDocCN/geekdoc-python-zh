    # 19.2.1 Iterators


    Iterators are a uniform interface to stepping through elements in a collection.

    Here we''ll talk about using iterators—later we''ll learn how to build our own.

    Formally, an *iterator* is an object with a `__next__` method.

    For example, file objects are iterators .

    To see this, let''s have another look at the *US cities data*, which is written
    to the present working directory in the following cell


    ```

    %%file us_cities.txt

    new york: 8244910

    los angeles: 3819702

    chicago: 2707120

    houston: 2145146

    philadelphia: 1536471

    phoenix: 1469471

    san antonio: 1359758

    san diego: 1326179

    dallas: 1223229

    ```


    Writing us_cities.txt


    ```

    f = open(''us_cities.txt'')

    f.__next__()

    ```


    ''new york: 8244910\n''


    ```

    f.__next__()

    ```


    ''los angeles: 3819702\n''


    We see that file objects do indeed have a `__next__` method, and that calling
    this method returns the next line in the file.

    The next method can also be accessed via the builtin function `next()`, which
    directly calls this method


    ```

    next(f)

    ```


    ''chicago: 2707120\n''


    The objects returned by `enumerate()` are also iterators


    ```

    e = enumerate([''foo'', ''bar''])

    next(e)

    ```


    (0, ''foo'')


    ```

    next(e)

    ```'
