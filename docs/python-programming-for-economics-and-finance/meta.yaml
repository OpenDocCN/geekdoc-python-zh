    \nUse no import besides `from numpy.random import uniform`."
  mdcn: "## 4.3.3 Python 函数的灵活性\n\n正如我们在*上一讲*中讨论的，Python 函数非常灵活。具体来说\n\n-   在一个给定的文件中可以定义任意数量的函数。\n\
    -   函数可以（并且经常）在其他函数内部定义。\n-   任何对象都可以作为参数传递给函数，包括其他函数。\n-   函数可以返回任何类型的对象，包括函数。\n\
    \n我们将在接下来的章节中举例说明将函数传递给函数是多么简单直接。\n\n## 4.3.4 单行函数：lambda\n\n`lambda` 关键字用于在一行内创建简单的函数。例如，以下定义\n\
    \n```python\ndef f(x):\n    return x**3\n```\n\n和\n\n```python\nf = lambda x:\
    \ x**3\n```\n\n是完全等价的。为了理解 `lambda` 为何有用，假设我们想计算 $\\int_0^2 x^3 dx$（并且忘记了高中微积分）。SciPy\
    \ 库有一个名为 `quad` 的函数可以为我们进行此计算。`quad` 函数的语法是 `quad(f, a, b)`，其中 `f` 是一个函数，`a` 和\
    \ `b` 是数字。为了创建函数 $f(x) = x^3$，我们可以如下使用 `lambda`\n\n```python\nfrom scipy.integrate\
    \ import quad\n\nquad(lambda x: x**3, 0, 2)\n```\n\n(4.0, 4.440892098500626e-14)\n\
    \n这里由 `lambda` 创建的函数被称为*匿名*函数，因为它从未被赋予名称。\n\n## 4.3.5 为什么要编写函数？\n\n用户定义的函数对于提高代码清晰度很重要，通过\n\
    \n-   分离不同的逻辑流\n-   促进代码重用\n\n（将相同的事情写两次[几乎总是一个坏主意](https://www.google.com/search?q=almost+always+a+bad+idea)）我们将在*稍后*对此进行更多讨论。\n\
    \n## 4.4 应用\n\n### 4.4.1 随机抽样\n\n再次考虑*上一讲*中的这段代码\n\n```python\nts_length = 100\n\
    ϵ_values = []   # empty list\n\nfor i in range(ts_length):\n    e = np.random.randn()\n\
    \    ϵ_values.append(e)\n\nplt.plot(ϵ_values)\nplt.show()\n```\n\n我们将把这个程序分成两部分：\n\
    \n1.  一个用户定义的函数，用于生成随机变量列表。\n2.  程序的主体部分，它\n    1.  调用此函数获取数据\n    2.  绘制数据\n\n\
    这将在下一个程序中实现\n\n```python\ndef generate_data(n):\n    ε_values = []\n    for i\
    \ in range(n):\n        e = np.random.randn()\n        ε_values.append(e)\n  \
    \  return ε_values\n\ndata = generate_data(100)\nplt.plot(data)\nplt.show()\n\
    ```\n\n当解释器遇到表达式 `generate_data(100)` 时，它会执行函数体，其中 `n` 被设置为 100。\n\n最终结果是，名称 `data`\
    \ 被*绑定*到函数返回的列表 `ε_values`。\n\n### 4.4.2 添加条件\n\n我们的函数 `generate_data()` 功能相当有限。让我们通过赋予它根据需要返回标准正态分布或\
    \ (0, 1) 上的均匀随机变量的能力，使其稍微更有用一些。这在下一段代码中实现。\n\n```python\ndef generate_data(n,\
    \ generator_type):\n    ε_values = []\n    for i in range(n):\n        if generator_type\
    \ == 'U':\n            e = np.random.uniform(0, 1)\n        else:\n          \
    \  e = np.random.randn()\n        ε_values.append(e)\n    return ε_values\n\n\
    data = generate_data(100, 'U')\nplt.plot(data)\nplt.show()\n```\n\n希望 if/else\
    \ 子句的语法是不言自明的，缩进再次界定了代码块的范围。\n\n注意\n\n-   我们将参数 U 作为字符串传递，这就是为什么我们将其写为 'U'。\n\
    -   注意相等性测试使用的是 == 语法，而不是 =。\n    -   例如，语句 a = 10 将名称 a 赋值给值 10。\n    -   表达式\
    \ a == 10 的计算结果为 True 或 False，具体取决于 a 的值。\n\n现在，有几种方法可以简化上面的代码。例如，我们可以通过将所需的生成器类型*作为函数*传递来完全摆脱条件语句。要理解这一点，请考虑以下版本。\n\
    \n```python\ndef generate_data(n, generator_type):\n    ε_values = []\n    for\
    \ i in range(n):\n        e = generator_type()\n        ε_values.append(e)\n \
    \   return ε_values\n\ndata = generate_data(100, np.random.uniform)\nplt.plot(data)\n\
    plt.show()\n```\n\n现在，当我们调用函数 `generate_data()` 时，我们将 `np.random.uniform` 作为第二个参数传递。这个对象是一个*函数*。\n\
    \n当函数调用 `generate_data(100, np.random.uniform)` 被执行时，Python 运行函数代码块，其中 `n` 等于\
    \ 100，名称 `generator_type` 被“绑定”到函数 `np.random.uniform`。\n\n-   当执行这些行时，名称 `generator_type`\
    \ 和 `np.random.uniform` 是“同义词”，可以以相同的方式使用。\n\n这个原理更普遍地适用——例如，考虑以下代码\n\n```python\n\
    max(7, 2, 4)  # max() is a built-in Python function\n```\n\n```\n7\n```\n\n```python\n\
    m = max\nm(7, 2, 4)\n```\n\n```\n7\n```\n\n这里我们为内置函数 `max()` 创建了另一个名称，然后可以以相同的方式使用它。在我们的程序上下文中，将新名称绑定到函数的能力意味着*将函数作为参数传递给另一个函数*没有问题——正如我们上面所做的那样。\n\
    \n## 4.5 递归函数调用（高级）\n\n这不是你每天都会用到的东西，但它仍然很有用——你应该在某个阶段学习它。基本上，递归函数是调用自身的函数。例如，考虑计算\
    \ $x_t$ 的问题，其中\n\n$x_{t+1} = 2x_t, \\quad x_0 = 1$\n\n显然答案是 $2^t$。我们可以很容易地用循环计算这个\n\
    \n```python\ndef x_loop(t):\n    x = 1\n    for i in range(t):\n        x = 2\
    \ * x\n    return x\n```\n\n我们也可以使用递归解决方案，如下所示\n\n```python\ndef x(t):\n    if\
    \ t == 0:\n        return 1\n    else:\n        return 2 * x(t-1)\n```\n\n这里发生的是，每个后续调用都在*栈*中使用自己的*帧*\n\
    \n-   帧是保存给定函数调用的局部变量的地方\n-   栈是用于处理函数调用的内存\n    -   一个后进先出（FILO）队列\n\n这个例子有些刻意，因为通常会优先选择第一种（迭代）解决方案而不是递归解决方案。我们稍后会遇到不那么刻意的递归应用。\n\
    \n## 4.6 练习\n\n**练习 4.6.1**\n回想一下 $n!$ 读作“$n$ 的阶乘”，定义为 $n! = n \\times (n - 1)\
    \ \\times \\cdots \\times 2 \\times 1$。这里我们只考虑 $n$ 为正整数。各种模块中有计算此值的函数，但让我们作为练习编写自己的版本。\n\
    \n1.  具体来说，编写一个函数 `factorial`，使得 `factorial(n)` 对于任何正整数 $n$ 返回 $n!$。\n2.  此外，尝试为你的函数添加一个新参数。该参数接受一个函数\
    \ $f$，该函数将 $n$ 转换为：如果 $n$ 是偶数，则 $f(n) = n^2 + 1$；如果 $n$ 是奇数，则 $f(n) = n^2$。默认值应为\
    \ $f(n) = n$。\n\n例如\n\n-   默认情况 `factorial(3)` 应返回 $3!$\n-   `factorial(3, f)`\
    \ 应返回 $9!$\n-   `factorial(2, f)` 应返回 $5!$\n\n尝试使用 lambda 表达式定义函数 $f$。\n\n**练习\
    \ 4.6.1 的解答**\n这是第 1 部分的一个解决方案\n\n```python\ndef factorial(n):\n    k = 1\n  \
    \  for i in range(n):\n        k = k * (i + 1)\n    return k\n\nfactorial(4)\n\
    ```\n\n```\n24\n```\n\n添加 lambda 表达式\n\n```python\ndef factorial(n, f = lambda\
    \ x: x):\n    k = 1\n    for i in range(f(n)):\n        k = k * (i + 1)\n    return\
    \ k\n\nfactorial(9) # default\n```\n\n```\n362880\n```\n\n```python\nf = lambda\
    \ x: x**2 + 1 if x % 2 == 0 else x**2\n\nfactorial(3, f) # odd (equivalent to\
    \ factorial(9))\n```\n\n```\n362880\n```\n\n```python\nfactorial(2, f) # even\
    \ (equivalent to factorial(5))\n```\n\n```\n120\n```\n\n### 练习 4.6.2\n\n二项随机变量\
    \ $Y \\sim Bin(n, p)$ 表示在 $n$ 次二元试验中成功的次数，其中每次试验成功的概率为 $p$。\n\n除了 `from numpy.random\
    \ import uniform` 之外不使用任何导入，编写一个函数 `binomial_rv`，使得 `binomial_rv(n, p)` 生成 $Y$\
    \ 的一次抽样。\n\n> **提示：** 如果 $U$ 在 $(0, 1)$ 上均匀分布，且 $p \\in (0, 1)$，那么表达式 `U < p`\
    \ 以概率 $p$ 计算为 `True`。\n\n### 练习 4.6.2 的解答\n\n这是一个解决方案：\n\n```python\nfrom numpy.random\
    \ import uniform\n\ndef binomial_rv(n, p):\n    count = 0\n    for i in range(n):\n\
    \        U = uniform()\n        if U < p:\n            count = count + 1    #\
    \ Or count += 1\n    return count\n\nbinomial_rv(10, 0.5)\n```\n\n```\n8\n```\n\
    \n### 练习 4.6.3\n\n首先，编写一个函数，返回以下随机装置的一次实现\n\n1.  抛一枚均匀硬币 10 次。\n2.  如果在此序列中至少有一次连续出现\
    \ $k$ 次或更多次正面，则支付一美元。\n3.  如果没有，则不支付。\n\n其次，编写另一个函数执行相同的任务，但上述随机装置的第二条规则变为\n\n\
