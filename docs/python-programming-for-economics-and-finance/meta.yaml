  md: "# Python Programming for Economics and Finance\n\n# 1.3.4 Statistics\n\nPython's\
    \ data manipulation and statistics libraries have improved rapidly over the last\
    \ few years to tackle specific problems in data science.\n\n# Pandas\n\nOne of\
    \ the most popular libraries for working with data is pandas.\nPandas is fast,\
    \ efficient, flexible and well designed.\nHere's a simple example, using some\
    \ dummy data generated with Numpy's excellent `random` functionality.\n\n```\n\
    import pandas as pd\nnp.random.seed(1234)\n\ndata = np.random.randn(5, 2)  # 5x2\
