    # 19.3.2 Arbitrary Arguments


    When we *define* functions, it is sometimes desirable to allow users to put as
    many arguments as they want into a function.


    You might have noticed that the `ax.plot()` function could handle arbitrarily
    many arguments.


    If we look at the documentation of the function, we can see the function is defined
    as


    ```

    Axes.plot(*args, scalex=True, scaley=True, data=None, **kwargs)

    ```


    We found * and ** operators again in the context of the *function definition*.


    In fact, *args and **kargs are ubiquitous in the scientific libraries in Python
    to reduce redundancy and allow flexible inputs.


    *args enables the function to handle *positional arguments* with a variable size


    ```

    l1 = [''a'', ''b'', ''c'']

    l2 = [''b'', ''c'', ''d'']

    ```'
