- md: "## CHAPTER SEVEN\n\n## OOP II: BUILDING CLASSES\n\n**Contents**\n- OOP II:\
    \ Building Classes\n    - Overview\n    - OOP Review\n    - Defining Your Own\
    \ Classes\n    - Special Methods\n    - Exercises\n\n## 7.1 Overview\n\nIn an\
    \ *earlier lecture*, we learned some foundations of object-oriented programming.\n\
    The objectives of this lecture are\n- cover OOP in more depth\n- learn how to\
    \ build our own objects, specialized to our needs\n\nFor example, you already\
    \ know how to\n- create lists, strings and other Python objects\n- use their methods\
    \ to modify their contents\n\nSo imagine now you want to write a program with\
    \ consumers, who can\n- hold and spend cash\n- consume goods\n- work and earn\
    \ cash\n\nA natural solution in Python would be to create consumers as objects\
    \ with\n- data, such as cash on hand\n- methods, such as `buy` or `work` that\
    \ affect this data\n\nPython makes it easy to do this, by providing you with **class\
    \ definitions**.\nClasses are blueprints that help you build objects according\
    \ to your own specifications.\n\n## Python Programming for Economics and Finance\n\
    \nIt takes a little while to get used to the syntax so we'll provide plenty of\
    \ examples.\nWe'll use the following imports:\n\n```\n%matplotlib inline\nimport\
    \ numpy as np\nimport matplotlib.pyplot as plt\nplt.rcParams['figure.figsize']\
    \ = (10, 6)\n```\n\n## 7.2 OOP Review\n\nOOP is supported in many languages:\n\
    \n- JAVA and Ruby are relatively pure OOP.\n- Python supports both procedural\
    \ and object-oriented programming.\n- Fortran and MATLAB are mainly procedural,\
    \ some OOP recently tacked on.\n- C is a procedural language, while C++ is C with\
    \ OOP added on top.\n\nLet's cover general OOP concepts before we specialize to\
    \ Python.\n\n### 7.2.1 Key Concepts\n\nAs discussed an *earlier lecture*, in the\
    \ OOP paradigm, data and functions are **bundled together** into “objects”.\n\
    An example is a Python list, which not only stores data but also knows how to\
    \ sort itself, etc.\n\n```\nx = [1, 5, 4]\nx.sort()\nx\n```\n\n```\n[1, 4, 5]\n\
    ```\n\nAs we now know, `sort` is a function that is “part of” the list object\
    \ — and hence called a *method*.\nIf we want to make our own types of objects\
    \ we need to use class definitions.\nA *class definition* is a blueprint for a\
    \ particular class of objects (e.g., lists, strings or complex numbers).\nIt describes\n\
    \n- What kind of data the class stores\n- What methods it has for acting on these\
    \ data\n\nAn *object* or *instance* is a realization of the class, created from\
    \ the blueprint\n\n- Each instance has its own unique data.\n- Methods set out\
    \ in the class definition act on this (and other) data.\n\nIn Python, the data\
    \ and methods of an object are collectively referred to as *attributes*.\nAttributes\
    \ are accessed via “dotted attribute notation”\n\n- `object_name.data`\n- `object_name.method_name()`\n\
    \nIn the example\n\n```\nx = [1, 5, 4]\nx.sort()\nx.__class__\n```\n\n```\nlist\n\
    ```\n\n- x is an object or instance, created from the definition for Python lists,\
    \ but with its own particular data.\n- x.sort() and x.__class__ are two attributes\
    \ of x.\n- dir(x) can be used to view all the attributes of x.\n\n### 7.2.2 Why\
    \ is OOP Useful?\n\nOOP is useful for the same reason that abstraction is useful:\
    \ for recognizing and exploiting the common structure.\nFor example,\n\n- a Markov\
    \ chain consists of a set of states, an initial probability distribution over\
    \ states, and a collection of probabilities of moving across states\n- a general\
    \ equilibrium theory consists of a commodity space, preferences, technologies,\
    \ and an equilibrium definition\n- a game consists of a list of players, lists\
    \ of actions available to each player, each player's payoffs as functions of all\
    \ other players' actions, and a timing protocol\n\nThese are all abstractions\
    \ that collect together “objects” of the same “type”.\nRecognizing common structure\
    \ allows us to employ common tools.\nIn economic theory, this might be a proposition\
    \ that applies to all games of a certain type.\nIn Python, this might be a method\
    \ that's useful for all Markov chains (e.g., simulate).\nWhen we use OOP, the\
    \ simulate method is conveniently bundled together with the Markov chain object.\n\
    \n## 7.3 Defining Your Own Classes\n\nLet's build some simple classes to start\
    \ off.\nBefore we do so, in order to indicate some of the power of Classes, we'll\
    \ define two functions that we'll call earn and spend.\n\n```\ndef earn(w,y):\n\
    \    \"Consumer with initial wealth w earns y\"\n    return w+y\n\ndef spend(w,x):\n\
    \    \"consumer with initial wealth w spends x\"\n    new_wealth = w -x\n    if\
    \ new_wealth < 0:\n        print(\"Insufficient funds\")\n    else:\n        return\
    \ new_wealth\n```\n\n## Python Programming for Economics and Finance\n\nThe `earn`\
    \ function takes a consumer's initial wealth $w$ and adds to it her current earnings\
    \ $y$.\nThe `spend` function takes a consumer's initial wealth $w$ and deducts\
    \ from it her current spending $x$.\nWe can use these two functions to keep track\
    \ of a consumer's wealth as she earns and spends.\nFor example\n\n```\nw0=100\n\
    w1=earn(w0,10)\nw2=spend(w1,20)\nw3=earn(w2,10)\nw4=spend(w3,20)\nprint(\"w0,w1,w2,w3,w4\
    \ = \", w0,w1,w2,w3,w4)\n```\n\n```\nw0,w1,w2,w3,w4 =  100 110 90 100 80\n```\n\
    \nA *Class* bundles a set of data tied to a particular *instance* together with\
    \ a collection of functions that operate on the data.\nIn our example, an *instance*\
    \ will be the name of particular *person* whose *instance data* consist solely\
    \ of its wealth.\n(In other examples *instance data* will consist of a vector\
    \ of data.)\nIn our example, two functions `earn` and `spend` can be applied to\
    \ the current instance data.\nTaken together, the instance data and functions\
    \ are called *methods*.\nThese can be readily accessed in ways that we shall describe\
    \ now.\n\n### 7.3.1 Example: A Consumer Class\n\nWe'll build a `Consumer` class\
    \ with\n\n- a `wealth` attribute that stores the consumer's wealth (data)\n- an\
    \ `earn` method, where `earn(y)` increments the consumer's wealth by $y$\n- a\
    \ `spend` method, where `spend(x)` either decreases wealth by $x$ or returns an\
    \ error if insufficient funds exist\n\nAdmittedly a little contrived, this example\
    \ of a class helps us internalize some peculiar syntax.\nHere how we set up our\
    \ Consumer class.\n\n```\nclass Consumer:\n\n    def __init__(self, w):\n    \
    \    \"Initialize consumer with w dollars of wealth\"\n        self.wealth = w\n\
    \n    def earn(self, y):\n        \"The consumer earns y dollars\"\n        self.wealth\
    \ += y\n\n    def spend(self, x):\n        \"The consumer spends x dollars if\
    \ feasible\"\n        new_wealth = self.wealth - x\n        if new_wealth < 0:\n\
    \            print(\"Insufficient funds\")\n        else:\n            self.wealth\
    \ = new_wealth\n```\n\nThere's some special syntax here so let's step through\
    \ carefully\n\n- The `class` keyword indicates that we are building a class.\n\
    \nThe `Consumer` class defines instance data `wealth` and three methods: `__init__`,\
    \ `earn` and `spend`\n\n- `wealth` is *instance data* because each consumer we\
    \ create (each instance of the `Consumer` class) will have its own wealth data.\n\
    \nThe `earn` and `spend` methods deploy the functions we described earlier and\
    \ that can potentially be applied to the `wealth` instance data.\n\nThe `__init__`\
    \ method is a *constructor method*.\n\nWhenever we create an instance of the class,\
    \ the `__init__` method will be called automatically.\n\nCalling `__init__` sets\
    \ up a \"namespace\" to hold the instance data — more on this soon.\n\nWe'll also\
    \ discuss the role of the peculiar `self` bookkeeping device in detail below.\n\
    \n### Usage\n\nHere's an example in which we use the class `Consumer` to create\
    \ an instance of a consumer whom we affectionately name `c1`.\n\nAfter we create\
    \ consumer `c1` and endow it with initial wealth 10, we'll apply the `spend` method.\n\
    \n```\nc1 = Consumer(10)  # Create instance with initial wealth 10\nc1.spend(5)\n\
    c1.wealth\n```\n\n```\n5\n```\n\n```\nc1.earn(15)\nc1.spend(100)\n```\n\n```\n\
    Insufficient funds\n```\n\nWe can of course create multiple instances, i.e., multiple\
    \ consumers, each with its own name and data\n\n```\nc1 = Consumer(10)\nc2 = Consumer(12)\n\
    c2.spend(4)\nc2.wealth\n```\n\n```\n8\n```\n\n```\nc1.wealth\n```\n\n```\n10\n\
    ```\n\nEach instance, i.e., each consumer, stores its data in a separate namespace\
    \ dictionary\n\n```\nc1.__dict__\n```"
  mdcn: "## 第七章\n\n## 面向对象编程 II：构建类\n\n**目录**\n- 面向对象编程 II：构建类\n    - 概述\n    - 面向对象编程回顾\n\
    \    - 定义你自己的类\n    - 特殊方法\n    - 练习\n\n## 7.1 概述\n\n在*之前的课程*中，我们学习了面向对象编程的一些基础知识。\n\
    本节课的目标是\n- 更深入地探讨面向对象编程\n- 学习如何构建我们自己的、针对我们需求的对象\n\n例如，你已经知道如何\n- 创建列表、字符串和其他\
    \ Python 对象\n- 使用它们的方法来修改其内容\n\n那么，想象一下你现在想编写一个包含消费者的程序，这些消费者能够\n- 持有和花费现金\n-\
    \ 消费商品\n- 工作并赚取现金\n\n在 Python 中，一个自然的解决方案是将消费者创建为具有以下特性的对象：\n- 数据，例如手头现金\n- 方法，例如影响这些数据的\
    \ `buy` 或 `work`\n\nPython 通过提供**类定义**使这变得容易。\n类是帮助你根据自己的规格构建对象的蓝图。\n\n## 面向经济学与金融的\
    \ Python 编程\n\n需要一点时间来适应语法，因此我们将提供大量示例。\n我们将使用以下导入：\n\n```\n%matplotlib inline\n\
    import numpy as np\nimport matplotlib.pyplot as plt\nplt.rcParams['figure.figsize']\
    \ = (10, 6)\n```\n\n## 7.2 面向对象编程回顾\n\n许多语言都支持面向对象编程：\n\n- JAVA 和 Ruby 是相对纯粹的面向对象语言。\n\
    - Python 同时支持过程式和面向对象编程。\n- Fortran 和 MATLAB 主要是过程式的，最近才附加了一些面向对象特性。\n- C 是一种过程式语言，而\
    \ C++ 是在 C 的基础上添加了面向对象特性。\n\n在专门讨论 Python 之前，让我们先介绍一般的面向对象编程概念。\n\n### 7.2.1 关键概念\n\
