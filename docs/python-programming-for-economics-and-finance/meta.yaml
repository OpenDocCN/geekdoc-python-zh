    y = np.random.randn(4)\nA = x / y\n```\n\nHere is the output\n\n```python\nprint(A)\n\
    ```\n\n**Part 2:** Move on to replicate the result of the following broadcasting\
    \ operation. Meanwhile, compare the speeds of broadcasting and the `for` loop\
    \ you implement.\n\n```python\nimport quantecon as qe\n\nnp.random.seed(123)\n\
    x = np.random.randn(1000, 100, 100)\ny = np.random.randn(100)\n\nqe.tic()\nB =\
    \ x / y\nqe.toc()\n```\n\n```\nTOC: Elapsed: 0:00:0.01\n```\n\n```\n0.012936592102050781\n\
    ```\n\nHere is the output\n\n```python\nprint(B)\n```\n\n## Solution to Exercise\
    \ 10.8.4\n\n### Part 1 Solution\n\n```python\nnp.random.seed(123)\nx = np.random.randn(4,\
    \ 4)\ny = np.random.randn(4)\n\nC = np.empty_like(x)\nn = len(x)\nfor i in range(n):\n\
    \    for j in range(n):\n        C[i, j] = x[i, j] / y[j]\n```\n\nCompare the\
    \ results to check your answer\n\n```python\nprint(C)\n```\n\nYou can also use\
    \ `array_equal()` to check your answer\n\n```python\nprint(np.array_equal(A, C))\n\
    ```\n\n```\nTrue\n```\n\n### Part 2 Solution\n\n```python\nnp.random.seed(123)\n\
    x = np.random.randn(1000, 100, 100)\ny = np.random.randn(100)\n\nqe.tic()\nD =\
    \ np.empty_like(x)\nd1, d2, d3 = x.shape\nfor i in range(d1):\n    for j in range(d2):\n\
