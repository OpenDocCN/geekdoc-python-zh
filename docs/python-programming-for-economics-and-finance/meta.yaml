  md: "# 20.3.3 Handling Errors During Runtime\n\nThe approach used above is a bit\
    \ limited, because it always leads to termination.\nSometimes we can handle errors\
    \ more gracefully, by treating special cases.\nLet's look at how this is done.\n\
    \n# Catching Exceptions\n\nWe can catch and deal with exceptions using `try-except`\
    \ blocks.\nHere's a simple example\n\n```\ndef f(x):\n    try:\n        return\
    \ 1.0 / x\n    except ZeroDivisionError:\n        print('Error: division by zero.\
    \ Returned None')\n        return None\n```\n\nWhen we call `f` we get the following\
    \ output\n\n```\nf(2)\n```\n\n```\n0.5\n```\n\n```\nf(0)\n```\n\n```\nError: division\
    \ by zero. Returned None\n```\n\n```\nf(0.0)\n```\n\n```\nError: division by zero.\
    \ Returned None\n```\n\nThe error is caught and execution of the program is not\
    \ terminated.\nNote that other error types are not caught.\nIf we are worried\
    \ the user might pass in a string, we can catch that error too\n\n```\ndef f(x):\n\
    \    try:\n        return 1.0 / x\n    except ZeroDivisionError:\n        print('Error:\
    \ Division by zero. Returned None')\n    except TypeError:\n        print(f'Error:\
    \ x cannot be of type {type(x)}. Returned None')\n    return None\n```\n\nHere's\
    \ what happens\n\n```\nf(2)\n```"
  merge: -1
