  md: "# 1.3.5 Networks and Graphs\n\nPython has many libraries for studying graphs.\n\
    One well-known example is NetworkX. Its features include, among many other things:\n\
    \n+   - standard graph algorithms for analyzing networks\n- plotting routines\n\
    \nHere’s some example code that generates and plots a random graph, with node\
    \ color determined by the shortest path length from a central node.\n\n```\n%matplotlib\
    \ inline\nimport networkx as nx\nimport matplotlib.pyplot as plt\nplt.rcParams['figure.figsize']\
    \ = (10,6)\nnp.random.seed(1234)\n\n# Generate a random graph\np = dict((i, (np.random.uniform(0,\
    \ 1), np.random.uniform(0, 1)))\n         for i in range(200))\ng = nx.random_geometric_graph(200,\
    \ 0.12, pos=p)\npos = nx.get_node_attributes(g, 'pos')\n\n# Find node nearest\
    \ the center point (0.5, 0.5)\ndists = [(x - 0.5)**2 + (y - 0.5)**2 for x, y in\
    \ list(pos.values())]\nncenter = np.argmin(dists)\n\n# Plot graph, coloring by\
    \ path length from central node\np = nx.single_source_shortest_path_length(g,\
    \ ncenter)\nplt.figure()\nnx.draw_networkx_edges(g, pos, alpha=0.4)\nnx.draw_networkx_nodes(g,\n\
    \                       pos,\n                       nodelist=list(p.keys()),\n\
    \                       node_size=120, alpha=0.5,\n                       node_color=list(p.values()),\n\
    \                       cmap=plt.cm.jet_r)\nplt.show()\n```"
