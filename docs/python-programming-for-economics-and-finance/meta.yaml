  md: '# 13.4 On-Line Data Sources


    Python makes it straightforward to query online databases programmatically.

    An important database for economists is FRED — a vast collection of time series
    data maintained by the St. Louis Fed.

    For example, suppose that we are interested in the unemployment rate.

    Via FRED, the entire series for the US civilian unemployment rate can be downloaded
    directly by entering this URL into your browser (note that this requires an internet
    connection)


    ```

    https://research.stlouisfed.org/fred2/series/UNRATE/downloaddata/UNRATE.csv

    ```


    (Equivalently, click here: https://research.stlouisfed.org/fred2/series/UNRATE/downloaddata/UNRATE.csv)

    This request returns a CSV file, which will be handled by your default application
    for this class of files.

    Alternatively, we can access the CSV file from within a Python program.

    This can be done with a variety of methods.

    We start with a relatively low-level method and then return to pandas.


    # 13.4.1 Accessing Data with requests


    One option is to use requests, a standard Python library for requesting data over
    the Internet.

    To begin, try the following code on your computer


    ```

    r = requests.get(''http://research.stlouisfed.org/fred2/series/UNRATE/downloaddata/UNRATE.csv'')

    ```


    If there’s no error message, then the call has succeeded.

    If you do get an error, then there are two likely causes


    +   1. You are not connected to the Internet — hopefully, this isn’t the case.

    2. Your machine is accessing the Internet through a proxy server, and Python isn’t
    aware of this.


    In the second case, you can either


    +   - switch to another machine

    - solve your proxy problem by reading the documentation


    Assuming that all is working, you can now proceed to use the source object returned
    by the call requests.get(''http://research.stlouisfed.org/fred2/series/UNRATE/downloaddata/UNRATE.csv'')


    ```

    url = ''http://research.stlouisfed.org/fred2/series/UNRATE/downloaddata/UNRATE.csv''

    source = requests.get(url).content.decode().split("\n")

    source[0]

    ```


    ```

    ''DATE,VALUE\r''

    ```


    ```

    source[1]

    ```'
