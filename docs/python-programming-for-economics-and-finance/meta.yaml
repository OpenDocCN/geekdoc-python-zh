    \ `miles` and `kms` are out of sync.\nWhat we really want is some mechanism whereby\
    \ each time a user sets one of these variables, *the other is automatically updated*.\n\
    \n### A Solution\n\nIn Python, this issue is solved using *descriptors*.\nA descriptor\
