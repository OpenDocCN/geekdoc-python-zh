    \ $Q$ is quantity and $t$ is a per-unit tax.\n- Other symbols are demand and supply\
    \ parameters.\n\nThe class provides methods to compute various values of interest,\
    \ including competitive equilibrium price and quantity, tax revenue raised, consumer\
    \ surplus and producer surplus.\n\nHere's our implementation.\n\n(It uses a function\
    \ from SciPy called quad for numerical integration—a topic we will say more about\
    \ later on.)\n\n```python\nfrom scipy.integrate import quad\n\nclass Market:\n\
    \n    def __init__(self, ad, bd, az, bz, tax):\n        \"\"\"\n        Set up\
    \ market parameters.  All parameters are scalars.  See\n        https://lectures.quantecon.org/py/python_oop.html\
    \ for interpretation.\n\n        \"\"\"\n        self.ad, self.bd, self.az, self.bz,\
    \ self.tax = ad, bd, az, bz, tax\n        if ad < az:\n            raise ValueError('Insufficient\
    \ demand.')\n\n    def price(self):\n        \"Compute equilibrium price\"\n \
    \       return  (self.ad - self.az + self.bz * self.tax) / (self.bd + self.bz)\n\
    \n    def quantity(self):\n        \"Compute equilibrium quantity\"\n        return\
    \  self.ad - self.bd * self.price()\n\n    def consumer_surp(self):\n        \"\
