  md: "(continued from previous page)\n\n```\nk_{t+1} = [(s z k^a_t) + (1 - δ)k_t]\
    \ / (1 + n)\n\n\"\"\"\ndef __init__(self, n=0.05,  # population growth rate\n\
    \                   s=0.25,  # savings rate\n                   δ=0.1,   # depreciation\
    \ rate\n                   α=0.3,   # share of labor\n                   z=2.0,\
    \   # productivity\n                   k=1.0):  # current capital stock\n\n  \
    \  self.n, self.s, self.δ, self.α, self.z = n, s, δ, α, z\n    self.k = k\n\n\
    def h(self):\n    \"Evaluate the h function\"\n    # Unpack parameters (get rid\
    \ of self to simplify notation)\n    n, s, δ, α, z = self.n, self.s, self.δ, self.α,\
    \ self.z\n    # Apply the update rule\n    return (s * z * self.k**α + (1 - δ)\
    \ * self.k) / (1 + n)\n\ndef update(self):\n    \"Update the current state (i.e.,\
    \ the capital stock).\"\n    self.k =  self.h()\n\ndef steady_state(self):\n \
    \   \"Compute the steady state value of capital.\"\n    # Unpack parameters (get\
    \ rid of self to simplify notation)\n    n, s, δ, α, z = self.n, self.s, self.δ,\
    \ self.α, self.z\n    # Compute and return steady state\n    return ((s * z) /\
    \ (n + δ))**(1 / (1 - α))\n\ndef generate_sequence(self, t):\n    \"Generate and\
    \ return a time series of length t\"\n    path = []\n    for i in range(t):\n\
    \        path.append(self.k)\n        self.update()\n    return path\n```\n\n\
    Here's a little program that uses the class to compute time series from two different\
    \ initial conditions.\nThe common steady state is also plotted for comparison\n\
    \n```\ns1 = Solow()\ns2 = Solow(k=8.0)\n\nT = 60\nfig, ax = plt.subplots(figsize=(9,\
    \ 6))\n\n# Plot the common steady state value of capital\nax.plot([s1.steady_state()]*T,\
    \ 'k-', label='steady state')\n\n# Plot time series for each economy\nfor s in\
    \ s1, s2:\n    lb = f'capital series from initial state {s.k}'\n    ax.plot(s.generate_sequence(T),\
    \ 'o-', lw=2, alpha=0.6, label=lb)\n```\n\n(continues on next page)"
