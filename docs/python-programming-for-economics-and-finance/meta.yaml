- md: "## 11.3.4 A Customizing Function\n\nPerhaps you will find a set of customizations\
    \ that you regularly use.\n\nSuppose we usually prefer our axes to go through\
    \ the origin, and to have a grid.\n\nHere’s a nice example from Matthew Doty of\
    \ how the object-oriented API can be used to build a custom subplots function\
    \ that implements these changes.\n\nRead carefully through the code and see if\
    \ you can follow what’s going on\n\n```python\ndef subplots():\n    \"Custom subplots\
    \ with axes through the origin\"\n    fig, ax = plt.subplots()\n\n    # Set the\
    \ axes through the origin\n    for spine in ['left', 'bottom']:\n        ax.spines[spine].set_position('zero')\n\
    \    for spine in ['right', 'top']:\n        ax.spines[spine].set_color('none')\n\
    \n    ax.grid()\n    return fig, ax\n```\n\n```python\nfig, ax = subplots()  #\
    \ Call the local version, not plt.subplots()\nx = np.linspace(-2, 10, 200)\ny\
    \ = np.sin(x)\nax.plot(x, y, 'r-', linewidth=2, label='sine function', alpha=0.6)\n\
    ax.legend(loc='lower right')\nplt.show()\n```\n\nThe custom `subplots` function\n\
    \n1. calls the standard `plt.subplots` function internally to generate the `fig`,\
    \ `ax` pair,\n2. makes the desired customizations to `ax`, and\n3. passes the\
    \ `fig`, `ax` pair back to the calling code.\n\n## 11.3.5 Style Sheets\n\nAnother\
    \ useful feature in Matplotlib is `style sheets`.\nWe can use style sheets to\
    \ create plots with uniform styles.\nWe can find a list of available styles by\
    \ printing the attribute `plt.style.available`\n\n```python\nprint(plt.style.available)\n\
    ```\n\n```\n['Solarize_Light2', '_classic_test_patch', '_mpl-gallery', '_mpl-gallery-nogrid',\n\
    \ 'bmh', 'classic', 'dark_background', 'fast', 'fivethirtyeight', 'ggplot',\n\
    \ 'grayscale', 'seaborn-v0_8', 'seaborn-v0_8-bright', 'seaborn-v0_8-colorblind',\n\
    \ 'seaborn-v0_8-dark', 'seaborn-v0_8-dark-palette', 'seaborn-v0_8-darkgrid',\n\
    \ 'seaborn-v0_8-deep', 'seaborn-v0_8-muted', 'seaborn-v0_8-notebook', 'seaborn-v0_8-paper',\n\
    \ 'seaborn-v0_8-pastel', 'seaborn-v0_8-poster', 'seaborn-v0_8-talk',\n 'seaborn-v0_8-ticks',\
    \ 'seaborn-v0_8-white', 'seaborn-v0_8-whitegrid', 'tableau-colorblind10']\n```\n\
    \nWe can now use the `plt.style.use()` method to set the style sheet.\nLet's write\
    \ a function that takes the name of a style sheet and draws different plots with\
    \ the style\n\n```python\ndef draw_graphs(style='default'):\n\n    # Setting a\
    \ style sheet\n    plt.style.use(style)\n\n    fig, axes = plt.subplots(nrows=1,\
    \ ncols=4, figsize=(10, 3))\n    x = np.linspace(-13, 13, 150)\n\n    # Set seed\
    \ values to replicate results of random draws\n    np.random.seed(9)\n\n    for\
    \ i in range(3):\n\n        # Draw mean and standard deviation from uniform distributions\n\
    \        m, s = np.random.uniform(-8, 8), np.random.uniform(2, 2.5)\n\n      \
    \  # Generate a normal density plot\n        y = norm.pdf(x, loc=m, scale=s)\n\
    \        axes[0].plot(x, y, linewidth=3, alpha=0.7)\n\n        # Create a scatter\
    \ plot with random X and Y values\n        # from normal distributions\n     \
    \   rnormX = norm.rvs(loc=m, scale=s, size=150)\n        rnormY = norm.rvs(loc=m,\
    \ scale=s, size=150)\n        axes[1].plot(rnormX, rnormY, ls='none', marker='o',\
    \ alpha=0.7)\n\n        # Create a histogram with random X values\n        axes[2].hist(rnormX,\
    \ alpha=0.7)\n\n        # and a line graph with random Y values\n        axes[3].plot(x,\
    \ rnormY, linewidth=2, alpha=0.7)\n\n    style_name = style.split('-')[0]\n  \
    \  plt.suptitle(f'Style: {style_name}', fontsize=13)\n    plt.show()\n```\n\n\
    Let's see what some of the styles look like.\nFirst, we draw graphs with the style\
    \ sheet `seaborn`\n\n```python\ndraw_graphs(style='seaborn-v0_8')\n```\n\n# Style:\
    \ seaborn\n\nWe can use `grayscale` to remove colors in plots\n\n```python\ndraw_graphs(style='grayscale')\n\
    ```\n\n# Style: grayscale\n\nHere is what `ggplot` looks like\n\n```python\ndraw_graphs(style='ggplot')\n\
    ```\n\n# Style: ggplot\n\nWe can also use the style `dark_background`\n\n# Python\
    \ Programming for Economics and Finance\n\n```python\ndraw_graphs(style='dark_background')\n\
    ```\n\nYou can use the function to experiment with other styles in the list.\n\
    If you are interested, you can even create your own style sheets.\nParameters\
    \ for your style sheets are stored in a dictionary-like variable `plt.rcParams`\n\
    \n```python\nprint(plt.rcParams.keys())\n```\n\nThere are many parameters you\
    \ could set for your style sheets.\nSet parameters for your style sheet by:\n\n\
    1. creating your own `matplotlibrc` file, or\n2. updating values stored in the\
    \ dictionary-like variable `plt.rcParams`\n\nLet's change the style of our overlaid\
    \ density lines using the second method\n\n```python\nfrom cycler import cycler\n\
    \n# set to the default style sheet\nplt.style.use('default')\n\n# You can update\
    \ single values using keys:\n\n# Set the font style to italic\nplt.rcParams['font.style']\
    \ = 'italic'\n\n# Update linewidth\nplt.rcParams['lines.linewidth'] = 2\n\n# You\
    \ can also update many values at once using the update() method:\n\nparameters\
    \ = {\n\n    # Change default figure size\n    'figure.figsize': (5, 4),\n\n \
    \   # Add horizontal grid lines\n    'axes.grid': True,\n\n    'axes.grid.axis':\
    \ 'y',\n\n    # Update colors for density lines\n    'axes.prop_cycle': cycler('color',\n\
    \                              ['dimgray', 'slategrey', 'darkgray'])\n}\n\nplt.rcParams.update(parameters)\n\
    ```\n\n**Note:** These settings are `global`.\n\nAny plot generated after changing\
    \ parameters in `.rcParams` will be affected by the setting.\n\n```python\nfig,\
    \ ax = plt.subplots()\nx = np.linspace(-4, 4, 150)\nfor i in range(3):\n    m,\
    \ s = uniform(-1, 1), uniform(1, 2)\n    y = norm.pdf(x, loc=m, scale=s)\n   \
    \ current_label = f'$\\mu = {m:.2}$'\n    ax.plot(x, y, linewidth=2, alpha=0.6,\
    \ label=current_label)\nax.legend()\nplt.show()\n```\n\nApply the `default` style\
    \ sheet again to change your style back to default\n\n```python\nplt.style.use('default')\n\
    \n# Reset default figure size\nplt.rcParams['figure.figsize'] = (10, 6)\n```\n\
    \nHere are [more examples](https://matplotlib.org/stable/tutorials/introductory/customizing.html)\
    \ on how to change these parameters.\n\n## 11.4 Further Reading\n\n- The Matplotlib\
    \ gallery provides many examples.\n- A nice Matplotlib tutorial by Nicolas Rougier,\
    \ Mike Muller and Gael Varoquaux.\n- mpltools allows easy switching between plot\
    \ styles.\n- Seaborn facilitates common statistics plots in Matplotlib.\n\n##\
    \ 11.5 Exercises\n\n**Exercise 11.5.1**\n\nPlot the function\n\n$$f(x) = \\cos(\\\
    pi \\theta x) \\exp(-x)$$\n\nover the interval $[0, 5]$ for each $\\theta$ in\
    \ `np.linspace(0, 2, 10)`.\n\nPlace all the curves in the same figure.\n\nThe\
    \ output should look like this\n\n**Solution to Exercise 11.5.1**\n\nHere's one\
    \ solution\n\n```python\ndef f(x, θ):\n    return np.cos(np.pi * θ * x ) * np.exp(-\
    \ x)\n\nθ_vals = np.linspace(0, 2, 10)\nx = np.linspace(0, 5, 200)\nfig, ax =\
    \ plt.subplots()\n\nfor θ in θ_vals:\n    ax.plot(x, f(x, θ))\n\nplt.show()\n\
    ```\n\n# CHAPTER TWELVE\n\n# SCIPY\n\n- Contents\n    - SciPy\n        - Overview\n\
    \        - SciPy versus NumPy\n        - Statistics\n        - Roots and Fixed\
    \ Points\n        - Optimization\n        - Integration\n        - Linear Algebra\n\
    \        - Exercises\n\n## 12.1 Overview\n\nSciPy builds on top of NumPy to provide\
    \ common tools for scientific programming such as\n\n- linear algebra\n- numerical\
    \ integration\n- interpolation\n- optimization\n- distributions and random number\
    \ generation\n- signal processing\n- etc., etc\n\nLike NumPy, SciPy is stable,\
    \ mature and widely used.\nMany SciPy routines are thin wrappers around industry-standard\
    \ Fortran libraries such as LAPACK, BLAS, etc.\nIt’s not really necessary to “learn”\
    \ SciPy as a whole.\nA more common approach is to get some idea of what’s in the\
