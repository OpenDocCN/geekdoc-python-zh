    \n## 14.6 应用：两人交换经济\n\n想象一个纯交换经济，有两个人（$a$ 和 $b$）和两种商品，以比例形式记录（$x$ 和 $y$）。\n他们可以根据自己的偏好相互交易商品。\n\
    假设消费者的效用函数由以下给出\n\n$u_a(x, y) = x^\\alpha y^{1-\\alpha}$\n\n$u_b(x, y) = (1-x)^\\\
    beta (1-y)^{1-\\beta}$\n\n其中 $\\alpha, \\beta \\in (0, 1)$。\n首先我们定义符号和效用函数\n\n\
    ```python\n# 定义符号和效用函数\nx, y, α, β = symbols('x, y, α, β')\nu_a = x**α * y**(1-α)\n\
    u_b = (1 - x)**β * (1 - y)**(1 - β)\n```\n\n```python\nu_a\n```\n\n$x^{\\alpha}\
    \ y^{1-\\alpha}$\n\n```python\nu_b\n```\n\n$(1-x)^{\\beta} (1-y)^{1-\\beta}$\n\
    \n我们感兴趣的是商品 $x$ 和 $y$ 的帕累托最优配置。\n请注意，当给定另一个人的配置时，一个人的配置是最优的，那么该点就是帕累托有效的。\n用边际效用表示：\n\
    \n$\\frac{\\frac{\\partial u_a}{\\partial x}}{\\frac{\\partial u_a}{\\partial\
    \ y}} = \\frac{\\frac{\\partial u_b}{\\partial x}}{\\frac{\\partial u_b}{\\partial\
    \ y}}$\n\n```python\n# 当给定另一个人的配置时，一个人的配置是最优的，\n# 该点就是帕累托有效的\n\npareto = Eq(diff(u_a,\
    \ x)/diff(u_a, y),\n            diff(u_b, x)/diff(u_b, y))\npareto\n```\n\n$\\\
    frac{y y^{1-\\alpha} y^{\\alpha-1} \\alpha}{x (1-\\alpha)} = -\\frac{\\beta (1-y)\
    \ (1-y)^{1-\\beta} (1-y)^{\\beta-1}}{(1-x) (\\beta-1)}$\n\n```python\n# 解方程\n\
    sol = solve(pareto, y)[0]\nsol\n```\n\n$\\frac{x \\beta (\\alpha-1)}{x \\alpha\
    \ - x \\beta + \\alpha \\beta - \\alpha}$\n\n让我们使用 SymPy 计算 $\\alpha = \\beta\
    \ = 0.5$ 时经济的帕累托最优配置（契约曲线）\n\n```python\n# 代入 α = 0.5 和 β = 0.5\nsol.subs({α:\
    \ 0.5, β: 0.5})\n```\n\n$1.0x$\n\n我们可以使用这个结果来可视化不同参数下的更多契约曲线\n\n```python\n# 绘制一系列\
    \ α 和 β\nparams = [{α: 0.5, β: 0.5},\n          {α: 0.1, β: 0.9},\n          {α:\
    \ 0.1, β: 0.8},\n          {α: 0.8, β: 0.9},\n          {α: 0.4, β: 0.8},\n  \
    \        {α: 0.8, β: 0.1},\n          {α: 0.9, β: 0.8},\n          {α: 0.8, β:\
    \ 0.4},\n          {α: 0.9, β: 0.1}]\n\np = plot(xlabel='x', ylabel='y', show=False)\n\
    \nfor param in params:\n    p_add = plot(sol.subs(param), (x, 0, 1),\n       \
    \          show=False)\n    p.append(p_add[0])\np.show()\n```\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_273_0.png)\n\
    \n我们邀请您尝试不同的参数，看看契约曲线如何变化，并思考以下两个问题：\n\n- 您能想到一种使用 `numpy` 绘制相同图形的方法吗？\n- 编写一个\
    \ `numpy` 实现会有多困难？\n\n## 14.7 练习\n\n**练习 14.7.1**\n\n洛必达法则指出，对于两个函数 $f(x)$ 和 $g(x)$，如果\
    \ $\\lim_{x \\to a} f(x) = \\lim_{x \\to a} g(x) = 0$ 或 $\\pm \\infty$，那么\n\n\
    $$\\lim_{x \\to a} \\frac{f(x)}{g(x)} = \\lim_{x \\to a} \\frac{f'(x)}{g'(x)}$$\n\
    \n使用 SymPy 验证以下函数的洛必达法则\n\n$$f(x) = \\frac{y^x - 1}{x}$$\n\n当 $x$ 趋近于 0 时\n\n\
    **练习 14.7.1 的解答**\n\n首先，我们定义函数\n\n```python\nf_upper = y**x - 1\nf_lower = x\n\
    f = f_upper/f_lower\nf\n```\n\n$$\\frac{y^x - 1}{x}$$\n\nSymPy 足够智能，可以解出这个极限\n\
    \n```python\nlim = limit(f, x, 0)\nlim\n```\n\n$$\\log(y)$$\n\n我们比较洛必达法则建议的结果\n\
    \n```python\nlim = limit(diff(f_upper, x)/\n            diff(f_lower, x), x, 0)\n\
    lim\n```\n\n$$\\log(y)$$\n\n**练习 14.7.2**\n\n最大似然估计（MLE）是一种估计统计模型参数的方法。\n它通常涉及最大化对数似然函数并求解一阶导数。\n\
    二项分布由以下给出\n\n$$f(x; n, \\theta) = \\frac{n!}{x!(n-x)!} \\theta^x (1-\\theta)^{n-x}$$\n\
    \n其中 $n$ 是试验次数，$x$ 是成功次数。\n假设我们观察到一系列二元结果，在 $n$ 次试验中有 $x$ 次成功。\n使用 SymPy 计算 $\\\
    theta$ 的 MLE\n\n**练习 14.7.2 的解答**\n\n首先，我们定义二项分布\n\n```python\nn, x, θ = symbols('n\
    \ x θ')\n\nbinomial_factor = (factorial(n)) / (factorial(x)*factorial(n-x))\n\
    binomial_factor\n```\n\n$$\\frac{n!}{x!(n-x)!}$$\n\n```python\nbino_dist = binomial_factor\
    \ * ((θ**x) * (1-θ) ** (n-x))\nbino_dist\n```\n\n$$\\frac{\\theta^x (1-\\theta)^{n-x}\
    \ n!}{x!(n-x)!}$$\n\n现在我们计算对数似然函数并求解结果\n\n```python\nlog_bino_dist = log(bino_dist)\n\
    ```\n\n```python\nlog_bino_diff = simplify(diff(log_bino_dist, θ))\nlog_bino_diff\n\
    ```\n\n$$\\frac{n\\theta - x}{\\theta(\\theta - 1)}$$\n\n```python\nsolve(Eq(log_bino_diff,\
    \ 0), θ)[0]\n```\n\n$$\\frac{x}{n}$$"
