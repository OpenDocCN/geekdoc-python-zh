  md: '# 12.2 SciPy versus NumPy


    SciPy is a package that contains various tools that are built on top of NumPy,
    using its array data type and related functionality.


    In fact, when we import SciPy we also get NumPy, as can be seen from this excerpt
    the SciPy initialization file:


    ```

    # Import numpy symbols to scipy namespace

    from numpy import *

    from numpy.random import rand, randn

    from numpy.fft import fft, ifft

    from numpy.lib.scimath import *

    ```


    However, it''s more common and better practice to use NumPy functionality explicitly.


    ```

    import numpy as np


    a = np.identity(3)

    ```


    What is useful in SciPy is the functionality in its sub-packages


    +   - scipy.optimize, scipy.integrate, scipy.stats, etc.


    Let''s explore some of the major sub-packages.


    # 12.3 Statistics


    The `scipy.stats` subpackage supplies


    +   - numerous random variable objects (densities, cumulative distributions, random
    sampling, etc.)

    - some estimation procedures

    - some statistical tests


    # 12.3.1 Random Variables and Distributions


    Recall that `numpy.random` provides functions for generating random variables


    ```

    np.random.beta(5, 5, size=3)

    ```


    ```

    array([0.28365394, 0.30195851, 0.83421157])

    ```


    This generates a draw from the distribution with the density function below when
    a, b = 5, 5


    $$f(x; a, b) = \frac{x^{(a-1)}(1-x)^{(b-1)}}{\int_0^1 u^{(a-1)}(1-u)^{(b-1)}du}
    \quad (0 \le x \le 1) \quad (12.1)$$


    Sometimes we need access to the density itself, or the cdf, the quantiles, etc.


    For this, we can use `scipy.stats`, which provides all of this functionality as
    well as random number generation in a single consistent interface.


    Here''s an example of usage'
