    # Python Programming for Economics and Finance


    # 1.2.1 Common Uses


    Python is a general-purpose language used in almost all application domains such
    as


    +   - communications

    - web development

    - CGI and graphical user interfaces

    - game development

    - resource planning

    - multimedia, data science, security, etc., etc., etc.


    Used and supported extensively by Internet services and high-tech companies including


    +   - Google

    - Netflix

    - Meta

    - Dropbox

    - Amazon

    - Reddit


    For reasons we will discuss, Python is particularly popular within the scientific
    community and behind many scientific achievements in


    +   - Space Science

    - Particle Physics

    - Genetics


    and practically all branches of academia.


    Meanwhile, Python is also very beginner-friendly and is found to be suitable for
    students learning programming and recommended to introduce computational methods
    to students in fields other than computer science.


    Python is also replacing familiar tools like Excel as an essential skill in the
    fields of finance and banking.


    # 1.2.2 Relative Popularity


    The following chart, produced using Stack Overflow Trends, shows one measure of
    the relative popularity of Python


    ![](img/71948b0dce962ae14bde4e2e4d9fbb7b_11_0.png)


    The figure indicates not only that Python is widely used but also that adoption
    of Python has accelerated significantly since 2012.


    We suspect this is driven at least in part by uptake in the scientific domain,
    particularly in rapidly growing fields like data science.'
