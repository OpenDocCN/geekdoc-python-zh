  md: "# 15.5 Compiling Classes\n\nAs mentioned above, at present Numba can only compile\
    \ a subset of Python.\nHowever, that subset is ever expanding.\nFor example, Numba\
    \ is now quite effective at compiling classes.\nIf a class is successfully compiled,\
    \ then its methods act as JIT-compiled functions.\nTo give one example, let's\
    \ consider the class for analyzing the Solow growth model we created in *this\
    \ lecture*.\nTo compile this class we use the `@jitclass` decorator:\n\n```\n\
    from numba import float64\nfrom numba.experimental import jitclass\n```\n\nNotice\
    \ that we also imported something called `float64`.\nThis is a data type representing\
    \ standard floating point numbers.\nWe are importing it here because Numba needs\
    \ a bit of extra help with types when it tries to deal with classes.\nHere's our\
    \ code:\n\n```\nsolow_data = [\n    ('n', float64),\n    ('s', float64),\n   \
    \ ('δ', float64),\n    ('a', float64),\n    ('z', float64),\n    ('k', float64)\n\
    ]\n\n@jitclass(solow_data)\nclass Solow:\n    r\"\"\"\n    Implements the Solow\
    \ growth model with the update rule\n\n        k_{t+1} = [(s z k^a_t) + (1 - δ)k_t]\
    \ /(1 + n)\n\n    \"\"\"\n    def __init__(self, n=0.05,  # population growth\
    \ rate\n                       s=0.25,  # savings rate\n                     \
    \  δ=0.1,   # depreciation rate\n                       a=0.3,   # share of labor\n\
    \                       z=2.0,   # productivity\n                       k=1.0):\
    \  # current capital stock\n\n        self.n, self.s, self.δ, self.a, self.z =\
    \ n, s, δ, a, z\n        self.k = k\n\n    def h(self):\n        \"Evaluate the\
    \ h function\"\n        # Unpack parameters (get rid of self to simplify notation)\n\
    \        n, s, δ, a, z = self.n, self.s, self.δ, self.a, self.z\n        # Apply\
    \ the update rule\n        return (s * z * self.k**a + (1 - δ) * self.k) / (1\
    \ + n)\n```"
