    \ how the `for` loop works: When we execute a loop of the form\n\n```\nfor variable_name\
    \ in sequence:\n    <code block>\n```\n\nThe Python interpreter performs the following:\n\
    \n+   - For each element of the `sequence`, it “binds” the name `variable_name`\
    \ to that element and then executes the code block.\n\nThe `sequence` object can\
    \ in fact be a very general object, as we'll see soon enough.\n\n# 3.4.4 A Comment\
    \ on Indentation\n\nIn discussing the `for` loop, we explained that the code blocks\
    \ being looped over are delimited by indentation.\nIn fact, in Python, **all**\
    \ code blocks (i.e., those occurring inside loops, if clauses, function definitions,\
    \ etc.) are delimited by indentation.\nThus, unlike most other languages, whitespace\
    \ in Python code affects the output of the program.\nOnce you get used to it,\
    \ this is a good thing: It\n\n+   - forces clean, consistent indentation, improving\
    \ readability\n- removes clutter, such as the brackets or end statements used\
    \ in other languages\n\nOn the other hand, it takes a bit of care to get right,\
    \ so please remember:\n\n+   - The line before the start of a code block always\
