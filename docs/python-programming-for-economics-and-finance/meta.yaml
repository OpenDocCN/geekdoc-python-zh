  md: '![](img/71948b0dce962ae14bde4e2e4d9fbb7b_287_0.png)


    # 15.6 Alternatives to Numba


    There are additional options for accelerating Python loops.

    Here we quickly review them.

    However, we do so only for interest and completeness.

    If you prefer, you can safely skip this section.


    # 15.6.1 Cython


    Like *Numba*, Cython provides an approach to generating fast compiled code that
    can be used from Python.

    As was the case with Numba, a key problem is the fact that Python is dynamically
    typed.

    As you''ll recall, Numba solves this problem (where possible) by inferring type.

    Cython''s approach is different — programmers add type definitions directly to
    their “Python” code.

    As such, the Cython language can be thought of as Python with type definitions.

    In addition to a language specification, Cython is also a language translator,
    transforming Cython code into optimized C and C++ code.

    Cython also takes care of building language extensions — the wrapper code that
    interfaces between the resulting compiled code and Python.

    While Cython has certain advantages, we generally find it both slower and more
    cumbersome than Numba.'
