  md: "# Python Programming for Economics and Finance\n\nBecause they act element-wise\
    \ on arrays, these functions are called *vectorized functions*.\nIn NumPy-speak,\
    \ they are also called *ufuncs*, which stands for “universal functions”.\nAs we\
    \ saw above, the usual arithmetic operations (+, *, etc.) also work element-wise,\
    \ and combining these with the ufuncs gives a very large set of fast element-wise\
    \ functions.\n\n```\nz\n```\n\n```\narray([1, 2, 3])\n```\n\n```\n(1 / np.sqrt(2\
    \ * np.pi)) * np.exp(- 0.5 * z**2)\n```\n\n```\narray([0.24197072, 0.05399097,\
    \ 0.00443185])\n```\n\nNot all user-defined functions will act element-wise.\n\
    For example, passing the function `f` defined below a NumPy array causes a `ValueError`\n\
    \n```\ndef f(x):\n    return 1 if x > 0 else 0\n```\n\nThe NumPy function `np.where`\
    \ provides a vectorized alternative:\n\n```\nx = np.random.randn(4)\nx\n```\n\n\
    ```\narray([-1.4410515 , -0.65186216, -0.64465183,  0.8134109 ])\n```\n\n```\n\
    np.where(x > 0, 1, 0)  # Insert 1 if x > 0 true, otherwise 0\n```\n\n```\narray([0,\
    \ 0, 0, 1])\n```\n\nYou can also use `np.vectorize` to vectorize a given function\n\
    \n```\nf = np.vectorize(f)\nf(x)                # Passing the same vector x as\
    \ in the previous example\n```\n\n```\narray([0, 0, 0, 1])\n```\n\nHowever, this\
    \ approach doesn't always obtain the same speed as a more carefully crafted vectorized\
    \ function."
