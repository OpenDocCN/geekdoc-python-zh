    \ date.\n[Here’s a useful article](https://conda.io/docs/user-guide/tasks/update-conda.html)\
    \ on how to update Anaconda.\nAnother option is to simply remove Anaconda and\
    \ reinstall.\nYou also need to keep the external code libraries, such as [QuantEcon.py](https://quantecon.org/quantecon-py)\
    \ up to date.\nFor this task you can either\n* use `conda upgrade quantecon` on\
    \ the command line, or\n* execute `!conda upgrade quantecon` within a Jupyter\
    \ notebook.\nIf your local environment is still not working you can do two things.\n\
    First, you can use a remote machine instead, by clicking on the Launch Notebook\
    \ icon available for each lecture\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_358_0.png)"
  - '[PAGE 359]


    Second, you can report an issue, so we can try to fix your local set up.

    We like getting feedback on the lectures so please don''t hesitate to get in touch.


    # 21.2 Reporting an Issue


    One way to give feedback is to raise an issue through our [issue tracker](https://github.com/QuantEcon/lecture-python-programming/issues).

    Please be as specific as possible. Tell us where the problem is and as much detail
    about your local set up as you can provide.

    Another feedback option is to use our [discourse forum](https://discourse.quantecon.org/).

    Finally, you can provide direct feedback to [contact@quantecon.org](mailto:contact@quantecon.org)'
