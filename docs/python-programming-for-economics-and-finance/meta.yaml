    \    assert x >= 0, \"Argument must be nonnegative\"\n    return np.sqrt(42 *\
    \ x)\n\n# Program continues with various calculations using f and g\n```\n\nNotice\
    \ however that there is some repetition here, in the form of two identical lines\
    \ of code.\nRepetition makes our code longer and harder to maintain, and hence\
    \ is something we try hard to avoid.\nHere it's not a big deal, but imagine now\
