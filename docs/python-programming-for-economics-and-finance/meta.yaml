  md: '# Python Programming for Economics and Finance


    Let''s start with some imports:


    ```

    %matplotlib inline

    import numpy as np

    import quantecon as qe

    import matplotlib.pyplot as plt

    plt.rcParams[''figure.figsize''] = (10,6)

    ```


    # 16.2 Types of Parallelization


    Large textbooks have been written on different approaches to parallelization but
    we will keep a tight focus on what''s most useful to us.


    We will briefly review the two main kinds of parallelization commonly used in
    scientific computing and discuss their pros and cons.


    # 16.2.1 Multiprocessing


    Multiprocessing means concurrent execution of multiple processes using more than
    one processor.


    In this context, a **process** is a chain of instructions (i.e., a program).


    Multiprocessing can be carried out on one machine with multiple CPUs or on a collection
    of machines connected by a network.


    In the latter case, the collection of machines is usually called a **cluster**.


    With multiprocessing, each process has its own memory space, although the physical
    memory chip might be shared.


    # 16.2.2 Multithreading


    Multithreading is similar to multiprocessing, except that, during execution, the
    threads all share the same memory space.


    Native Python struggles to implement multithreading due to some [legacy design
    features](https://docs.python.org/3/c-api/init.html#freeing-the-gil).


    But this is not a restriction for scientific libraries like NumPy and Numba.


    Functions imported from these libraries and JIT-compiled code run in low level
    execution environments where Python''s legacy restrictions don''t apply.


    # 16.2.3 Advantages and Disadvantages


    Multithreading is more lightweight because most system and memory resources are
    shared by the threads.


    In addition, the fact that multiple threads all access a shared pool of memory
    is extremely convenient for numerical programming.


    On the other hand, multiprocessing is more flexible and can be distributed across
    clusters.


    For the great majority of what we do in these lectures, multithreading will suffice.'
