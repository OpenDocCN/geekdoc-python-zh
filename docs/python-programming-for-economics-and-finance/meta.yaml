    The tail of the sequence shows us where the trajectory concentrates after settling
    down to some kind of steady state, if a steady state exists.

    Whether it settles down, and the character of the steady state to which it does
    settle down, depend on the value of $r$.

    For $r$ between about 2.5 and 3, the time series settles into a single fixed point
    plotted on the vertical axis.

    For $r$ between about 3 and 3.45, the time series settles down to oscillating
    between the two values plotted on the vertical axis.

