  md: "Python Programming for Economics and Finance\n\n```\nfrom scipy.integrate import\
    \ quad\n\nclass Market:\n\n    def __init__(self, ad, bd, az, bz, tax):\n    \
    \    \"\"\"\n        Set up market parameters.  All parameters are scalars.  See\n\
    \        https://lectures.quantecon.org/py/python_oop.html for interpretation.\n\
    \n        \"\"\"\n        self.ad, self.bd, self.az, self.bz, self.tax = ad, bd,\
    \ az, bz, tax\n        if ad < az:\n            raise ValueError('Insufficient\
    \ demand.')\n\n    def price(self):\n        \"Compute equilibrium price\"\n \
    \       return  (self.ad - self.az + self.bz * self.tax) / (self.bd + self.bz)\n\
    \n    def quantity(self):\n        \"Compute equilibrium quantity\"\n        return\
    \  self.ad - self.bd * self.price()\n\n    def consumer_surp(self):\n        \"\
    Compute consumer surplus\"\n        # == Compute area under inverse demand function\
    \ == #\n        integrand = lambda x: (self.ad / self.bd) - (1 / self.bd) * x\n\
    \        area, error = quad(integrand, 0, self.quantity())\n        return area\
    \ - self.price() * self.quantity()\n\n    def producer_surp(self):\n        \"\
    Compute producer surplus\"\n        #  == Compute area above inverse supply curve,\
    \ excluding tax == #\n        integrand = lambda x: -(self.az / self.bz) + (1\
    \ / self.bz) * x\n        area, error = quad(integrand, 0, self.quantity())\n\
    \        return (self.price() - self.tax) * self.quantity() - area\n\n    def\
    \ taxrev(self):\n        \"Compute tax revenue\"\n        return self.tax * self.quantity()\n\
    \n    def inverse_demand(self, x):\n        \"Compute inverse demand\"\n     \
    \   return self.ad / self.bd - (1 / self.bd)* x\n\n    def inverse_supply(self,\
    \ x):\n        \"Compute inverse supply curve\"\n        return -(self.az / self.bz)\
    \ + (1 / self.bz) * x + self.tax\n\n    def inverse_supply_no_tax(self, x):\n\
    \        \"Compute inverse supply curve without tax\"\n        return -(self.az\
    \ / self.bz) + (1 / self.bz) * x\n```\n\nHere's a sample of usage\n\n```\nbaseline_params\
    \ = 15, .5, -2, .5, 3\nm = Market(*baseline_params)\nprint(\"equilibrium price\
    \ = \", m.price())\n```"
