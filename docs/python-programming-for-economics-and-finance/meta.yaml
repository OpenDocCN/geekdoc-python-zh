    \ behaved increasing continuous functions with $f(a) < 0 < f(b)$\n\n```\npython\n\
    def bisect(f, a, b, tol=10e-5):\n    \"\"\"\n    Implements the bisection root\
    \ finding algorithm, assuming that f is a\n    real-valued function on [a, b]\
    \ satisfying f(a) < 0 < f(b).\n    \"\"\"\n    lower, upper = a, b\n\n    while\
    \ upper - lower > tol:\n```"
