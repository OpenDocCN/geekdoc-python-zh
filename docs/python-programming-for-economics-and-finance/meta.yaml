    # 8.5 A walk through Visual Studio Code


    Visual Studio Code (VS Code) is a code editor and development workspace that can
    run


    +   - in the browser.

    - as a local installation.


    Both interfaces are identical.

    When you launch VS Code, you will see the following interface.


    ![](img/71948b0dce962ae14bde4e2e4d9fbb7b_148_0.png)


    Explore how to customize VS Code to your liking through the guided walkthroughs.

    When presented with the following prompt, go ahead an install all recommended
    extensions.

    You can also install extensions from the Extensions tab.

    Jupyter Notebooks ( . ipynb files) can be worked on in VS Code.

    Make sure to install the Jupyter extension from the Extensions tab before you
    try to open a Jupyter Notebook.

    Create a new file (in the file Explorer tab) and save it with the . ipynb extension.

    Choose a kernel/environment to run the Notebook in by clicking on the Select Kernel
    button on the top right corner of the editor.

    VS Code also has excellent version control functionality through the Source Control
    tab.

    Link your GitHub account to VS Code to push and pull changes to and from your
    repositories.

    Further discussions about version control can be found in the next section.

    To open a new Terminal in VS Code, click on the Terminal tab and select New Terminal.

    VS Code opens a new Terminal in the same directory you are working in - a PowerShell
    in Windows and a Bash in Linux.

    You can change the shell or open a new instance through the dropdown menu on the
    right end of the terminal tab.'
