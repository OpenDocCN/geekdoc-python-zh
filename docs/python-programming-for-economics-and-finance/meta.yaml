    binds the name x to the integer object on the right-hand side.

    We also mentioned that this process of binding x to the correct object is implemented
    as a dictionary.

    This dictionary is called a *namespace*.

    **Definition:** A namespace is a symbol table that maps names to objects in memory.

    Python uses multiple namespaces, creating them on the fly as necessary.

    For example, every time we import a module, Python creates a namespace for that
