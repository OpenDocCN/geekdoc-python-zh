  md: '# Python Programming for Economics and Finance


    +   - adjusting indices

    - working with dates and time series

    - sorting, grouping, re-ordering and general data munging¹

    - dealing with missing values, etc., etc.


    More sophisticated statistical functionality is left to other packages, such as
    `statsmodels` and `scikit-learn`, which are built on top of pandas.


    This lecture will provide a basic introduction to pandas.


    Throughout the lecture, we will assume that the following imports have taken place


    ```

    %matplotlib inline

    import pandas as pd

    import numpy as np

    import matplotlib.pyplot as plt

    plt.rcParams["figure.figsize"] = [10,8]  # Set default figure size

    import requests

    ```


    Two important data types defined by pandas are `Series` and `DataFrame`.


    You can think of a `Series` as a “column” of data, such as a collection of observations
    on a single variable.


    A `DataFrame` is a two-dimensional object for storing related columns of data.


    # 13.2 Series


    Let’s start with Series.


    We begin by creating a series of four random observations


    ```

    s = pd.Series(np.random.randn(4), name=''daily returns'')

    s

    ```


    ```

    0   -0.720017

    1   -0.210659

    2   -0.262305

    3    0.848900

    Name: daily returns, dtype: float64

    ```


    Here you can imagine the indices 0, 1, 2, 3 as indexing four listed companies,
    and the values being daily returns on their shares.


    Pandas `Series` are built on top of NumPy arrays and support many similar operations


    ```

    s * 100

    ```


    ```

    0   -72.001671

    1   -21.065885

    2   -26.230458

    3    84.889974

    Name: daily returns, dtype: float64

    ```


    > ¹ Wikipedia defines munging as cleaning data from one raw form into a structured,
    purged one.'
