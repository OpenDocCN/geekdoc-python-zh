  md: "# Python Programming for Economics and Finance\n\nUsing `try - except`, write\
    \ a program to read in the contents of the file and sum the numbers, ignoring\
    \ lines without numbers.\nYou can use the `open()` function we learnt *before*\
    \ to open `numbers.txt`.\n\n# Solution to Exercise 20.4.1\n\nLet's save the data\
    \ first\n\n```\n%%file numbers.txt\nprices\n3\n8\n\n7\n21\n```\n\nWriting numbers.txt\n\
    \n```\nf = open('numbers.txt')\n\ntotal = 0.0\nfor line in f:\n    try:\n    \
    \    total += float(line)\n    except ValueError:\n        pass\n\nf.close()\n\
    \nprint(total)\n```\n\n39.0"
