    \n## 20.3 Handling Errors\n\nSometimes it's possible to anticipate bugs and errors\
    \ as we're writing code.\nFor example, the unbiased sample variance of sample\
    \ $y_1, \\dots, y_n$ is defined as\n\n$$s^2 := \\frac{1}{n-1} \\sum_{i=1}^n (y_i\
    \ - \\bar{y})^2 \\quad \\bar{y} = \\text{sample mean}$$\n\nThis can be calculated\
    \ in NumPy using `np.var`.\nBut if you were writing a function to handle such\
    \ a calculation, you might anticipate a divide-by-zero error when the sample size\
