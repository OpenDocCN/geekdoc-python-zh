    \ of code do exactly the same thing.\nIf they do the same thing, do we really\
    \ need decorator syntax?\nWell, notice that the decorators sit right on top of\
    \ the function definitions.\nHence anyone looking at the definition of the function\
    \ will see them and be aware that the function is modified.\nIn the opinion of\
    \ many people, this makes the decorator syntax a significant improvement to the\
    \ language.\n\n### 19.4.2 Descriptors\n\nDescriptors solve a common problem regarding\
    \ management of variables.\nTo understand the issue, consider a `Car` class, that\
    \ simulates a car.\nSuppose that this class defines the variables `miles` and\
    \ `kms`, which give the distance traveled in miles and kilometers respectively.\n\
    A highly simplified version of the class might look as follows\n\n```python\n\
    class Car:\n    def __init__(self, miles=1000):\n        self.miles = miles\n\
    \        self.kms = miles * 1.61\n\n    # Some other functionality, details omitted\n\
    ```\n\nOne potential problem we might have here is that a user alters one of these\
