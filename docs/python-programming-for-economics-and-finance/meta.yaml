    \n```\n@vectorize('float64(float64, float64)', target='parallel')\ndef f_vec(x,\
    \ y):\n    return np.cos(x**2 + y**2) / (1 + x**2 + y**2)\n\nnp.max(f_vec(x, y))\
    \  # Run once to compile\n```\n\n```\n0.9999992797121728\n```\n\n```\n%timeit\
