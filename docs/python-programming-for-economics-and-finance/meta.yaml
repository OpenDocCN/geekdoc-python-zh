- md: "## CHAPTER FOURTEEN\n\n## SYMPY\n\n- *SymPy*\n  - *Overview*\n  - *Getting\
    \ Started*\n  - *Symbolic algebra*\n  - *Symbolic Calculus*\n  - *Plotting*\n\
    \  - *Application: Two-person Exchange Economy*\n  - *Exercises*\n\n## 14.1 Overview\n\
    \nUnlike numerical libraries that deal with values, SymPy focuses on manipulating\
    \ mathematical symbols and expressions directly.\n\nSymPy provides a wide range\
    \ of features including\n\n- symbolic expression\n- equation solving\n- simplification\n\
    - calculus\n- matrices\n- discrete math, etc.\n\nThese functions make SymPy a\
    \ popular open-source alternative to other proprietary symbolic computational\
    \ software such as Mathematica.\n\nIn this lecture, we will explore some of the\
    \ functionality of SymPy and demonstrate how to use basic SymPy functions to solve\
    \ economic models.\n\n## 14.2 Getting Started\n\nLet's first import the library\
    \ and initialize the printer for symbolic output\n\n```python\nfrom sympy import\
    \ *\nfrom sympy.plotting import plot, plot3d_parametric_line, plot3d\nfrom sympy.solvers.inequalities\
    \ import reduce_rational_inequalities\nfrom sympy.stats import Poisson, Exponential,\
    \ Binomial, density, moment, E, cdf\n\nimport numpy as np\nimport matplotlib.pyplot\
    \ as plt\n\n# Enable the mathjax printer\ninit_printing(use_latex='mathjax')\n\
    ```\n\n## 14.3 Symbolic algebra\n\n### 14.3.1 Symbols\n\nFirst we initialize some\
    \ symbols to work with\n\n```python\nx, y, z = symbols('x y z')\n```\n\nSymbols\
    \ are the basic units for symbolic computation in SymPy.\n\n### 14.3.2 Expressions\n\
    \nWe can now use symbols x, y, and z to build expressions and equations.\nHere\
    \ we build a simple expression first\n\n```python\nexpr = (x+y) ** 2\nexpr\n```\n\
    \n$(x + y)^2$\n\nWe can expand this expression with the `expand` function\n\n\
    ```python\nexpand_expr = expand(expr)\nexpand_expr\n```\n\n$x^2 + 2xy + y^2$\n\
    \nand factorize it back to the factored form with the `factor` function\n\n```python\n\
    factor(expand_expr)\n```\n\n$(x + y)^2$\n\nWe can solve this expression\n\n```python\n\
    solve(expr)\n```\n\n$[\\{x : -y\\}]$\n\nNote this is equivalent to solving the\
    \ following equation for x\n\n$(x + y)^2 = 0$\n\n> **Note:** Solvers is an important\
    \ module with tools to solve different types of equations.\nThere are a variety\
    \ of solvers available in SymPy depending on the nature of the problem.\n\n###\
    \ 14.3.3 Equations\n\nSymPy provides several functions to manipulate equations.\n\
    Let's develop an equation with the expression we defined before\n\n```python\n\
    eq = Eq(expr, 0)\neq\n```\n\n$(x + y)^2 = 0$\n\nSolving this equation with respect\
    \ to $x$ gives the same output as solving the expression directly\n\n```python\n\
    solve(eq, x)\n```\n\n$[-y]$\n\nSymPy can handle equations with multiple solutions\n\
    \n```python\neq = Eq(expr, 1)\nsolve(eq, x)\n```\n\n$[1 - y, -y - 1]$\n\n`solve`\
    \ function can also combine multiple equations together and solve a system of\
    \ equations\n\n```python\neq2 = Eq(x, y)\neq2\n```\n\n$x = y$\n\n```python\nsolve([eq,\
    \ eq2], [x, y])\n```\n\n$\\left[\\left(-\\frac{1}{2}, -\\frac{1}{2}\\right), \\\
    left(\\frac{1}{2}, \\frac{1}{2}\\right)\\right]$\n\nWe can also solve for the\
    \ value of $y$ by simply substituting $x$ with $y$\n\n```python\nexpr_sub = expr.subs(x,\
    \ y)\nexpr_sub\n```\n\n$4y^2$\n\n```python\nsolve(Eq(expr_sub, 1))\n```\n\n$\\\
    left[-\\frac{1}{2}, \\frac{1}{2}\\right]$\n\nBelow is another example equation\
    \ with the symbol $x$ and functions $\\sin$, $\\cos$, and $\\tan$ using the `Eq`\
    \ function\n\n```python\n# Create an equation\neq = Eq(cos(x) / (tan(x)/sin(x)),\
    \ 0)\neq\n```\n\n$\\frac{\\sin(x)\\cos(x)}{\\tan(x)} = 0$\n\nNow we simplify this\
    \ equation using the `simplify` function\n\n```python\n# Simplify an expression\n\
    simplified_expr = simplify(eq)\nsimplified_expr\n```\n\n$\\cos^2(x) = 0$\n\nAgain,\
    \ we use the `solve` function to solve this equation\n\n```python\n# Solve the\
    \ equation\nsol = solve(eq, x)\nsol\n```\n\n$$\\left[\\frac{\\pi}{2}, \\frac{3\\\
    pi}{2}\\right]$$\n\nSymPy can also handle more complex equations involving trigonometry\
    \ and complex numbers.\nWe demonstrate this using Euler's formula\n\n```python\n\
    # 'I' represents the imaginary number i\neuler = cos(x) + I*sin(x)\neuler\n```\n\
    \n$$i \\sin(x) + \\cos(x)$$\n\n```python\nsimplify(euler)\n```\n\n$$e^{ix}$$\n\
    \nIf you are interested, we encourage you to read the lecture on trigonometry\
    \ and complex numbers.\n\n### Example: fixed point computation\n\nFixed point\
    \ computation is frequently used in economics and finance.\nHere we solve the\
    \ fixed point of the Solow-Swan growth dynamics:\n$$k_{t+1} = s f(k_t) + (1 -\
    \ \\delta)k_t, \\quad t = 0, 1, \\dots$$\nwhere $k_t$ is the capital stock, $f$\
    \ is a production function, $\\delta$ is a rate of depreciation.\nWe are interested\
    \ in calculating the fixed point of this dynamics, i.e., the value of $k$ such\
    \ that $k_{t+1} = k_t$.\nWith $f(k) = Ak^\\alpha$, we can show the unique fixed\
    \ point of the dynamics $k^*$ using pen and paper:\n$$k^* := \\left(\\frac{sA}{\\\
    delta}\\right)^{1/(1-\\alpha)}$$\nThis can be easily computed in SymPy\n\n```python\n\
    A, s, k, a, δ = symbols('A s k^* a δ')\n```\n\nNow we solve for the fixed point\
    \ $k^*$\n$$k^* = sA(k^*)^\\alpha + (1 - \\delta)k^*$$\n\n```python\n# Define Solow-Swan\
    \ growth dynamics\nsolow = Eq(s*A*k**a + (1-δ)*k, k)\nsolow\n```\n\n$A(k^*)^\\\
    alpha s + k^*(1-\\delta) = k^*$\n\n```python\nsolve(solow, k)\n```\n\n$\\left[\\\
    left(\\frac{As}{\\delta}\\right)^{-\\frac{1}{\\alpha-1}}\\right]$\n\n### 14.3.4\
    \ Inequalities and logic\n\nSymPy also allows users to define inequalities and\
    \ set operators and provides a wide range of operations.\n\n```python\nreduce_inequalities([2*x\
    \ + 5*y <= 30, 4*x + 2*y <= 20], [x])\n```\n\n$x \\leq 5 - \\frac{y}{2} \\wedge\
    \ x \\leq 15 - \\frac{5y}{2} \\wedge -\\infty < x$\n\n```python\nAnd(2*x + 5*y\
    \ <= 30, x > 0)\n```\n\n$2x + 5y \\leq 30 \\wedge x > 0$\n\n### 14.3.5 Series\n\
    \nSeries are widely used in economics and statistics, from asset pricing to the\
    \ expectation of discrete random variables.\nWe can construct a simple series\
    \ of summations using `Sum` function and `Indexed` symbols\n\n```python\nx, y,\
    \ i, j = symbols(\"x y i j\")\nsum_xy = Sum(Indexed('x', i)*Indexed('y', j),\n\
    \            (i, 0, 3),\n            (j, 0, 3))\nsum_xy\n```\n\n$\\sum_{0 \\leq\
    \ i \\leq 3} \\sum_{0 \\leq j \\leq 3} x_i y_j$\n\nTo evaluate the sum, we can\
    \ `lambdify` the formula.\nThe lambdified expression can take numeric values as\
    \ input for $x$ and $y$ and compute the result\n\n```python\nsum_xy = lambdify([x,\
    \ y], sum_xy)\ngrid = np.arange(0, 4, 1)\nsum_xy(grid, grid)\n```\n\n36\n\n###\
    \ Example: bank deposits\n\nImagine a bank with $D_0$ as the deposit at time $t$.\n\
    \nIt loans $(1 - r)$ of its deposits and keeps a fraction $r$ as cash reserves.\n\
    \nIts deposits over an infinite time horizon can be written as\n\n$$\\sum_{i=0}^{\\\
    infty} (1 - r)^i D_0$$\n\nLet's compute the deposits at time $t$\n\n```python\n\
    D = symbols('D_0')\nr = Symbol('r', positive=True)\nDt = Sum('(1 - r)^i * D_0',\
    \ (i, 0, oo))\nDt\n```\n\n$$\\sum_{i=0}^{\\infty} D_0 (1 - r)^i$$\n\nWe can call\
    \ the `doit` method to evaluate the series\n\n```python\nDt.doit()\n```\n\n$$D_0\
    \ \\left( \\begin{cases} \\frac{1}{r} & \\text{for } |r - 1| < 1 \\\\ \\sum_{i=0}^{\\\
    infty} (1 - r)^i & \\text{otherwise} \\end{cases} \\right)$$\n\nSimplifying the\
    \ expression above gives\n\n```python\nsimplify(Dt.doit())\n```\n\n$$\\begin{cases}\
    \ \\frac{D_0}{r} & \\text{for } r > 0 \\land r < 2 \\\\ D_0 \\sum_{i=0}^{\\infty}\
    \ (1 - r)^i & \\text{otherwise} \\end{cases}$$\n\nThis is consistent with the\
    \ solution in the lecture on [geometric series](https://python-programming-for-economics-and-finance.readthedocs.io/en/latest/geometric_series.html).\n\
    \n### Example: discrete random variable\n\nIn the following example, we compute\
    \ the expectation of a discrete random variable.\nLet's define a discrete random\
    \ variable $X$ following a Poisson distribution:\n\n$$f(x) = \\frac{\\lambda^x\
    \ e^{-\\lambda}}{x!}, \\quad x = 0, 1, 2, \\dots$$\n\n```python\nλ = symbols('lambda')\n\
    \n# We refine the symbol x to positive integers\nx = Symbol('x', integer=True,\
    \ positive=True)\npmf = λ**x * exp(-λ) / factorial(x)\npmf\n```\n\n$$\\frac{\\\
    lambda^x e^{-\\lambda}}{x!}$$\n\nWe can verify if the sum of probabilities for\
    \ all possible values equals 1:\n\n$$\\sum_{x=0}^{\\infty} f(x) = 1$$\n\n```python\n\
    sum_pmf = Sum(pmf, (x, 0, oo))\nsum_pmf.doit()\n```\n\n$$1$$\n\nThe expectation\
    \ of the distribution is:\n\n$$E(X) = \\sum_{x=0}^{\\infty} x f(x)$$\n\n```python\n\
    fx = Sum(x*pmf, (x, 0, oo))\nfx.doit()\n```\n\n$$\\lambda$$\n\nSymPy includes\
    \ a statistics submodule called `Stats`.\n`Stats` offers built-in distributions\
    \ and functions on probability distributions.\nThe computation above can also\
    \ be condensed into one line using the expectation function `E` in the `Stats`\
    \ module\n\n```python\nλ = Symbol(\"λ\", positive = True)\n\n# Using sympy.stats.Poisson()\
    \ method\nX = Poisson(\"x\", λ)\nE(X)\n```\n\n$$\\lambda$$"
  mdcn: "## 第十四章\n\n## SYMPY\n\n- *SymPy*\n  - *概述*\n  - *入门*\n  - *符号代数*\n  - *符号微积分*\n\
    \  - *绘图*\n  - *应用：两人交换经济*\n  - *练习*\n\n## 14.1 概述\n\n与处理数值的数值库不同，SymPy 专注于直接操作数学符号和表达式。\n\
    \nSymPy 提供了广泛的功能，包括\n\n- 符号表达式\n- 方程求解\n- 化简\n- 微积分\n- 矩阵\n- 离散数学等。\n\n这些功能使 SymPy\
    \ 成为其他专有符号计算软件（如 Mathematica）的流行开源替代品。\n\n在本讲中，我们将探索 SymPy 的一些功能，并演示如何使用基本的 SymPy\
    \ 函数来求解经济模型。\n\n## 14.2 入门\n\n让我们首先导入库并初始化用于符号输出的打印机\n\n```python\nfrom sympy\
    \ import *\nfrom sympy.plotting import plot, plot3d_parametric_line, plot3d\n\
    from sympy.solvers.inequalities import reduce_rational_inequalities\nfrom sympy.stats\
    \ import Poisson, Exponential, Binomial, density, moment, E, cdf\n\nimport numpy\
    \ as np\nimport matplotlib.pyplot as plt\n\n# Enable the mathjax printer\ninit_printing(use_latex='mathjax')\n\
    ```\n\n## 14.3 符号代数\n\n### 14.3.1 符号\n\n首先，我们初始化一些要使用的符号\n\n```python\nx, y, z\
    \ = symbols('x y z')\n```\n\n符号是 SymPy 中符号计算的基本单元。\n\n### 14.3.2 表达式\n\n我们现在可以使用符号\
    \ x、y 和 z 来构建表达式和方程。\n这里我们先构建一个简单的表达式\n\n```python\nexpr = (x+y) ** 2\nexpr\n\
    ```\n\n$(x + y)^2$\n\n我们可以使用 `expand` 函数展开这个表达式\n\n```python\nexpand_expr = expand(expr)\n\
    expand_expr\n```\n\n$x^2 + 2xy + y^2$\n\n并使用 `factor` 函数将其因式分解回因式形式\n\n```python\n\
    factor(expand_expr)\n```\n\n$(x + y)^2$\n\n我们可以求解这个表达式\n\n```python\nsolve(expr)\n\
    ```\n\n$[\\{x : -y\\}]$\n\n请注意，这等同于求解以下关于 x 的方程\n\n$(x + y)^2 = 0$\n\n> **注意：**\
    \ 求解器是一个重要的模块，包含用于求解不同类型方程的工具。\nSymPy 中有各种各样的求解器，具体取决于问题的性质。\n\n### 14.3.3 方程\n\
    \nSymPy 提供了多个函数来操作方程。\n让我们用之前定义的表达式来构建一个方程\n\n```python\neq = Eq(expr, 0)\neq\n\
    ```\n\n$(x + y)^2 = 0$\n\n求解这个关于 $x$ 的方程，其输出与直接求解表达式相同\n\n```python\nsolve(eq,\
    \ x)\n```\n\n$[-y]$\n\nSymPy 可以处理具有多个解的方程\n\n```python\neq = Eq(expr, 1)\nsolve(eq,\
    \ x)\n```\n\n$[1 - y, -y - 1]$\n\n`solve` 函数也可以将多个方程组合在一起，求解方程组\n\n```python\n\
