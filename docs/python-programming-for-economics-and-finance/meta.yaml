- md: "## 8.5.1 Using the run button\n\nVS Code helps you manage conda environments\
    \ without using the command line.\nOpen the Command Palette (CTRL + SHIFT + P\
    \ or from the dropdown menu under View tab) and search for `Python: Select Interpreter`.\n\
    This loads existing environments.\nYou can also create new environments using\
    \ `Python: Create Environment` in the Command Palette.\nA new environment (.conda\
    \ folder) is created in the current working directory.\nComing to the example\
    \ scripts from earlier, there are again two ways to work with them in VS Code.\n\
    \n- Using the run button\n- Using the terminal\n\nYou can run the script by clicking\
    \ on the run button on the top right corner of the editor.\n\nYou can also run\
    \ the script interactively by selecting the **Run Current File in Interactive\
    \ Window** option from the dropdown.\n\nThis creates an ipykernel console and\
    \ runs the script.\n\n## 8.5.2 Using the terminal\n\nThe command `python <path\
    \ to file.py>` is executed on the console of your choice.\nIf you are using a\
    \ Windows machine, you can either use the Anaconda Prompt or the Command Prompt\
    \ - but, generally not the PowerShell.\nHere's an execution of the earlier code.\n\
    \n> **Note:** If you would like to develop packages and build tools using Python,\
    \ you may want to look into [the use of Docker containers and VS Code](https://code.visualstudio.com/docs/remote/containers).\n\
    However, this is outside the focus of these lectures.\n\n## 8.6 Git your hands\
    \ dirty\n\nThis section will familiarize you with git and GitHub.\n*Git* is a\
    \ *version control system* — a piece of software used to manage digital projects\
    \ such as code libraries.\nIn many cases, the associated collections of files\
    \ — called *repositories* — are stored on *GitHub*.\nGitHub is a wonderland of\
    \ collaborative coding projects.\nFor example, it hosts many of the scientific\
    \ libraries we'll be using later on, such as [this one](https://github.com/QuantEcon/QuantEcon.lectures.code).\n\
    Git is the underlying software used to manage these projects.\n\n# Python Programming\
    \ for Economics and Finance\n\nGit is an extremely powerful tool for distributed\
    \ collaboration — for example, we use it to share and synchronize all the source\
    \ files for these lectures.\n\nThere are two main flavors of Git\n\n1. the plain\
    \ vanilla command line Git version\n2. the various point-and-click GUI versions\n\
    \   - See, for example, the GitHub version or Git GUI integrated into your IDE.\n\
    \nIn case you already haven't, try\n\n1. Installing Git.\n2. Getting a copy of\
    \ QuantEcon.py using Git.\n\nFor example, if you've installed the command line\
    \ version, open up a terminal and enter.\n\n```\ngit clone https://github.com/QuantEcon/QuantEcon.py\n\
    ```\n\n(This is just `git clone` in front of the URL for the repository)\n\nThis\
    \ command will download all necessary components to rebuild the lecture you are\
    \ reading now.\n\nAs the 2nd task,\n\n1. Sign up to GitHub.\n2. Look into 'forking'\
    \ GitHub repositories (forking means making your own copy of a GitHub repository,\
    \ stored on GitHub).\n3. Fork QuantEcon.py.\n4. Clone your fork to some local\
    \ directory, make edits, commit them, and push them back up to your forked GitHub\
    \ repo.\n5. If you made a valuable improvement, send us a pull request!\n\nFor\
    \ reading on these and other topics, try\n\n- The official Git documentation.\n\
    - Reading through the docs on GitHub.\n- Pro Git Book by Scott Chacon and Ben\
    \ Straub.\n- One of the thousands of Git tutorials on the Net.\n\n# Part II\n\n\
    # The Scientific Libraries\n\n# CHAPTER NINE\n\n# PYTHON FOR SCIENTIFIC COMPUTING\n\
    \nContents\n\n- Python for Scientific Computing\n    - Overview\n    - Scientific\
    \ Libraries\n    - The Need for Speed\n    - Vectorization\n    - Beyond Vectorization\n\
    \n> “We should forget about small efficiencies, say about 97% of the time: premature\
    \ optimization is the root of all evil.” – Donald Knuth\n\n## 9.1 Overview\n\n\
    Python is extremely popular for scientific computing, due to such factors as\n\
    \n- the accessible and flexible nature of the language itself,\n- the huge range\
    \ of high quality scientific libraries now available,\n- the fact that the language\
    \ and libraries are open source,\n- the popular Anaconda Python distribution,\
    \ which simplifies installation and management of those libraries, and\n- the\
    \ recent surge of interest in using Python for machine learning and artificial\
    \ intelligence.\n\nIn this lecture we give a short overview of scientific computing\
    \ in Python, addressing the following questions:\n\n- What are the relative strengths\
    \ and weaknesses of Python for these tasks?\n- What are the main elements of the\
    \ scientific Python ecosystem?\n- How is the situation changing over time?\n\n\
    In addition to what’s in Anaconda, this lecture will need\n\n```\n!pip install\
    \ quantecon\n```\n\n## 9.2 Scientific Libraries\n\nLet's briefly review Python's\
    \ scientific libraries, starting with why we need them.\n\n### 9.2.1 The Role\
    \ of Scientific Libraries\n\nOne obvious reason we use scientific libraries is\
    \ because they implement routines we want to use.\nFor example, it's almost always\
    \ better to use an existing routine for root finding than to write a new one from\
    \ scratch.\n(For standard algorithms, efficiency is maximized if the community\
    \ can coordinate on a common set of implementations,\nwritten by experts and tuned\
    \ by users to be as fast and robust as possible.)\nBut this is not the only reason\
    \ that we use Python's scientific libraries.\nAnother is that pure Python, while\
    \ flexible and elegant, is not fast.\nSo we need libraries that are designed to\
    \ accelerate execution of Python code.\nAs we'll see below, there are now Python\
    \ libraries that can do this extremely well.\n\n### 9.2.2 Python's Scientific\
    \ Ecosystem\n\nIn terms of popularity, the big four in the world of scientific\
    \ Python libraries are\n\n- NumPy\n- SciPy\n- Matplotlib\n- Pandas\n\nFor us,\
    \ there's another (relatively new) library that will also be essential for numerical\
    \ computing:\n\n- Numba\n\nOver the next few lectures we'll see how to use these\
    \ libraries.\nBut first, let's quickly review how they fit together.\n\n- NumPy\
    \ forms the foundations by providing a basic array data type (think of vectors\
    \ and matrices) and functions\nfor acting on these arrays (e.g., matrix multiplication).\n\
    - SciPy builds on NumPy by adding the kinds of numerical methods that are routinely\
    \ used in science (interpolation,\noptimization, root finding, etc.).\n- Matplotlib\
    \ is used to generate figures, with a focus on plotting data stored in NumPy arrays.\n\
    - Pandas provides types and functions for empirical work (e.g., manipulating data).\n\
    - Numba accelerates execution via JIT compilation — we'll learn about this soon.\n\
    \n## 9.3 The Need for Speed\n\nNow let’s discuss execution speed.\nHigher-level\
    \ languages like Python are optimized for humans.\nThis means that the programmer\
    \ can leave many details to the runtime environment\n\n- specifying variable types\n\
    - memory allocation/deallocation, etc.\n\nThe upside is that, compared to low-level\
    \ languages, Python is typically faster to write, less error-prone and easier\
    \ to debug.\nThe downside is that Python is harder to optimize — that is, turn\
    \ into fast machine code — than languages like C or Fortran.\nIndeed, the standard\
    \ implementation of Python (called CPython) cannot match the speed of compiled\
    \ languages such as C or Fortran.\nDoes that mean that we should just switch to\
    \ C or Fortran for everything?\nThe answer is: No, no and one hundred times no!\n\
    (This is what you should say to the senior professor insisting that the model\
    \ needs to be rewritten in Fortran or C++.)\nThere are two reasons why:\nFirst,\
    \ for any given program, relatively few lines are ever going to be time-critical.\n\
    Hence it is far more efficient to write most of our code in a high productivity\
    \ language like Python.\nSecond, even for those lines of code that *are* time-critical,\
    \ we can now achieve the same speed as C or Fortran using Python’s scientific\
    \ libraries.\n\n### 9.3.1 Where are the Bottlenecks?\n\nBefore we learn how to\
    \ do this, let’s try to understand why plain vanilla Python is slower than C or\
    \ Fortran.\nThis will, in turn, help us figure out how to speed things up.\n\n\
    #### Dynamic Typing\n\nConsider this Python operation\n\n```python\na, b = 10,\
    \ 10\na + b\n```\n\n```\n20\n```\n\nEven for this simple operation, the Python\
    \ interpreter has a fair bit of work to do.\nFor example, in the statement `a\
    \ + b`, the interpreter has to know which operation to invoke.\nIf `a` and `b`\
    \ are strings, then `a + b` requires string concatenation\n\n```python\na, b =\
    \ 'foo', 'bar'\na + b\n```"
  mdcn: "## 8.5.1 使用运行按钮\n\nVS Code 帮助你无需使用命令行即可管理 conda 环境。\n打开命令面板（CTRL + SHIFT\
    \ + P 或从 View 选项卡下的下拉菜单中选择）并搜索 `Python: Select Interpreter`。\n这将加载现有环境。\n你也可以使用命令面板中的\
    \ `Python: Create Environment` 来创建新环境。\n一个新环境（.conda 文件夹）将在当前工作目录中创建。\n回到之前的示例脚本，在\
    \ VS Code 中处理它们同样有两种方式。\n\n- 使用运行按钮\n- 使用终端\n\n你可以通过点击编辑器右上角的运行按钮来运行脚本。\n\n你也可以通过从下拉菜单中选择\
    \ **Run Current File in Interactive Window** 选项来交互式地运行脚本。\n\n这将创建一个 ipykernel\
    \ 控制台并运行脚本。\n\n## 8.5.2 使用终端\n\n命令 `python <path to file.py>` 在你选择的控制台上执行。\n如果你使用的是\
    \ Windows 机器，你可以使用 Anaconda Prompt 或命令提示符 - 但通常不使用 PowerShell。\n以下是之前代码的执行示例。\n\
    \n> **注意：** 如果你想使用 Python 开发包和构建工具，你可能需要了解 [Docker 容器和 VS Code 的使用](https://code.visualstudio.com/docs/remote/containers)。\n\
    然而，这超出了本系列讲座的重点。\n\n## 8.6 动手实践 Git\n\n本节将让你熟悉 git 和 GitHub。\n*Git* 是一个*版本控制系统*——一种用于管理数字项目（如代码库）的软件。\n\
    在许多情况下，相关的文件集合——称为*仓库*——存储在 *GitHub* 上。\nGitHub 是协作编码项目的乐园。\n例如，它托管了我们稍后将使用的许多科学库，比如[这个](https://github.com/QuantEcon/QuantEcon.lectures.code)。\n\
    Git 是用于管理这些项目的底层软件。\n\n# 经济学与金融学的 Python 编程\n\nGit 是一个极其强大的分布式协作工具——例如，我们用它来共享和同步本系列讲座的所有源文件。\n\
    \nGit 主要有两种形式\n\n1.  纯命令行 Git 版本\n2.  各种点击式 GUI 版本\n    - 例如，参见 GitHub 版本或集成到你\
    \ IDE 中的 Git GUI。\n\n如果你还没有，尝试\n\n1.  安装 Git。\n2.  使用 Git 获取 QuantEcon.py 的副本。\n\
    \n例如，如果你安装了命令行版本，打开一个终端并输入。\n\n```\ngit clone https://github.com/QuantEcon/QuantEcon.py\n\
    ```\n\n（这只是在仓库的 URL 前加上 `git clone`）\n\n此命令将下载重建你正在阅读的讲座所需的所有必要组件。\n\n作为第二个任务，\n\
    \n1.  注册 GitHub。\n2.  了解 'fork' GitHub 仓库（fork 意味着在 GitHub 上创建你自己的 GitHub 仓库副本）。\n\
    3.  Fork QuantEcon.py。\n4.  将你的 fork 克隆到某个本地目录，进行编辑，提交它们，并将它们推送回你 fork 的 GitHub\
    \ 仓库。\n5.  如果你做出了有价值的改进，请向我们发送拉取请求！\n\n要阅读这些和其他主题，请尝试\n\n- 官方 Git 文档。\n- 阅读 GitHub\
    \ 上的文档。\n- Scott Chacon 和 Ben Straub 所著的《Pro Git》一书。\n- 网上数千个 Git 教程中的一个。\n\n\
    # 第二部分\n\n# 科学计算库\n\n# 第九章\n\n# 用于科学计算的 Python\n\n目录\n\n- 用于科学计算的 Python\n   \
    \ - 概述\n    - 科学计算库\n    - 对速度的需求\n    - 向量化\n    - 超越向量化\n\n> “我们应该忘记小的效率提升，大约\
    \ 97% 的时间是这样：过早优化是万恶之源。” – Donald Knuth\n\n## 9.1 概述\n\nPython 在科学计算中非常受欢迎，原因如下\n\
    \n- 语言本身易于理解和灵活，\n- 现在有大量高质量的科学计算库可用，\n- 语言和库都是开源的，\n- 流行的 Anaconda Python 发行版简化了这些库的安装和管理，\n\
    - 以及最近人们对将 Python 用于机器学习和人工智能的兴趣激增。\n\n在本讲座中，我们将简要概述 Python 中的科学计算，探讨以下问题：\n\n\
