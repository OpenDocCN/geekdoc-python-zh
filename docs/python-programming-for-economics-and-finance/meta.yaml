    要退出调试器，请使用`q`。\n\n## 20.2.3 其他有用的魔法命令\n\n在本讲中，我们使用了`%debug` IPython魔法命令。\n还有许多其他有用的魔法命令：\n\
    \n- `%precision 4` 将浮点数的打印精度设置为4位小数\n- `%whos` 给出变量及其值的列表\n- `%quickref` 给出魔法命令的列表\n\
