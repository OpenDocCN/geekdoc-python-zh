- md: "## 20.3.3 Handling Errors During Runtime\n\nThe approach used above is a bit\
    \ limited, because it always leads to termination.\nSometimes we can handle errors\
    \ more gracefully, by treating special cases.\nLet's look at how this is done.\n\
    \n## Catching Exceptions\n\nWe can catch and deal with exceptions using `try-except`\
    \ blocks.\nHere's a simple example\n\n```python\ndef f(x):\n    try:\n       \
    \ return 1.0 / x\n    except ZeroDivisionError:\n        print('Error: division\
    \ by zero. Returned None')\n        return None\n```\n\nWhen we call `f` we get\
    \ the following output\n\n```python\nf(2)\n```\n\n```\n0.5\n```\n\n```python\n\
    f(0)\n```\n\n```\nError: division by zero. Returned None\n```\n\n```python\nf(0.0)\n\
    ```\n\n```\nError: division by zero. Returned None\n```\n\nThe error is caught\
    \ and execution of the program is not terminated.\nNote that other error types\
    \ are not caught.\nIf we are worried the user might pass in a string, we can catch\
    \ that error too\n\n```python\ndef f(x):\n    try:\n        return 1.0 / x\n \
    \   except ZeroDivisionError:\n        print('Error: Division by zero. Returned\
    \ None')\n    except TypeError:\n        print(f'Error: x cannot be of type {type(x)}.\
    \ Returned None')\n    return None\n```\n\nHere's what happens\n\n```python\n\
    f(2)\n```\n\n```\n0.5\n```\n\n```python\nf(0)\n```\n\n```\nError: Division by\
    \ zero. Returned None\n```\n\n```python\nf('foo')\n```\n\n```\nError: x cannot\
    \ be of type <class 'str'>. Returned None\n```\n\nIf we feel lazy we can catch\
    \ these errors together\n\n```python\ndef f(x):\n    try:\n        return 1.0\
    \ / x\n    except:\n        print(f'Error. An issue has occurred with x = {x}\
    \ of type: {type(x)}')\n        return None\n```\n\nHere's what happens\n\n```python\n\
    f(2)\n```\n\n```\n0.5\n```\n\n```python\nf(0)\n```\n\n```\nError. An issue has\
    \ occurred with x = 0 of type: <class 'int'>\n```\n\n```python\nf('foo')\n```\n\
    \n```\nError. An issue has occurred with x = foo of type: <class 'str'>\n```\n\
    \nIn general it's better to be specific.\n\n## 20.4 Exercises\n\n### Exercise\
    \ 20.4.1\n\nSuppose we have a text file `numbers.txt` containing the following\
    \ lines\n\n```\nprices\n3\n8\n\n7\n21\n```\n\n## Python Programming for Economics\
    \ and Finance\n\nUsing `try - except`, write a program to read in the contents\
    \ of the file and sum the numbers, ignoring lines without numbers.\nYou can use\
    \ the `open()` function we learnt *before* to open `numbers.txt`.\n\n### Solution\
    \ to Exercise 20.4.1\n\nLet's save the data first\n\n```python\n%%file numbers.txt\n\
    prices\n3\n8\n\n7\n21\n```\n\nWriting numbers.txt\n\n```python\nf = open('numbers.txt')\n\
    \ntotal = 0.0\nfor line in f:\n    try:\n        total += float(line)\n    except\
    \ ValueError:\n        pass\n\nf.close()\n\nprint(total)\n```\n\n```\n39.0\n```\n\
