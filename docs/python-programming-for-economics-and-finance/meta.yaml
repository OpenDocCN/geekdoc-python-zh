    # 12.4.3 Hybrid Methods


    A general principle of numerical methods is as follows:


    +   - If you have specific knowledge about a given problem, you might be able
    to exploit it to generate efficiency.

    - If not, then the choice of algorithm involves a trade-off between speed and
    robustness.


    In practice, most default algorithms for root-finding, optimization and fixed
    points use *hybrid* methods.


    These methods typically combine a fast method with a robust method in the following
    manner:


    +   1. Attempt to use a fast method

    2. Check diagnostics

    3. If diagnostics are bad, then switch to a more robust algorithm


    In `scipy.optimize`, the function `brentq` is such a hybrid method and a good
    default


    ```

    from scipy.optimize import brentq


    brentq(f, 0, 1)

    ```


    ```

    0.40829350427936706

    ```


    Here the correct solution is found and the speed is better than bisection:


    ```

    %timeit brentq(f, 0, 1)

    ```


    ```

    20.1 µs ± 170 ns per loop (mean ± std. dev. of 7 runs, 10,000 loops each)

    ```


    ```

    %timeit bisect(f, 0, 1)

    ```


    ```

    80.6 µs ± 322 ns per loop (mean ± std. dev. of 7 runs, 10,000 loops each)

    ```


    # 12.4.4 Multivariate Root-Finding


    Use `scipy.optimize.fsolve`, a wrapper for a hybrid method in MINPACK.


    See the documentation for details.


    # 12.4.5 Fixed Points


    A **fixed point** of a real function $f$ on $[a, b]$ is an $x \in [a, b]$ such
    that $f(x) = x$.


    SciPy has a function for finding (scalar) fixed points too


    ```

    from scipy.optimize import fixed_point


    fixed_point(lambda x: x**2, 10.0)  # 10.0 is an initial guess

    ```


