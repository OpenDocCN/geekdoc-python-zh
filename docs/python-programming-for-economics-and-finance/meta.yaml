  mdcn: "## 面向经济学与金融的Python编程\n\n例如，我们可以使用条件筛选来选择家庭消费占GDP份额（cc）最大的国家。\n\n```\ndf.loc[df.cc\
    \ == max(df.cc)]\n```\n\n```\n  country country isocode  year       POP      XRAT\
    \      tcgdp       cc\n7  Uruguay       URY  2000  3219.793  12.099592  25255.961693\
    \  78.97874\n          cg\n7  5.108068\n```\n\n当我们只想查看选定子数据框的某些列时，可以将上述条件与`.loc[__\
    \ , __]`命令结合使用。\n\n第一个参数接受条件，第二个参数接受我们希望返回的列的列表。\n\n```\ndf.loc[(df.cc + df.cg\
    \ >= 80) & (df.POP <= 20000), ['country', 'year', 'POP']]\n```\n\n```\n  country\
    \  year       POP\n4  Malawi  2000  11801.505\n7  Uruguay  2000   3219.793\n```\n\
    \n## 应用：数据框子集化\n\n现实世界的数据集可能非常庞大。\n\n有时，处理数据的子集以提高计算效率并减少冗余是可取的。\n\n假设我们只对人口（POP）和总GDP（tcgdp）感兴趣。\n\
    \n一种将数据框`df`精简为仅包含这些变量的方法是使用上述选择方法覆盖数据框\n\n```\ndf_subset = df[['country', 'POP',\
    \ 'tcgdp']]\ndf_subset\n```\n\n```\n          country         POP       tcgdp\n\
    0       Argentina   37335.653  2.950722e+05\n1       Australia   19053.186  5.418047e+05\n\
    2           India  1006300.297  1.728144e+06\n3          Israel     6114.570 \
    \ 1.292539e+05\n4          Malawi    11801.505  5.026222e+03\n5    South Africa\
    \    45064.098  2.272424e+05\n6  United States   282171.957  9.898700e+06\n7 \
    \       Uruguay     3219.793  2.525596e+04\n```\n\n然后我们可以保存这个较小的数据集以供进一步分析。\n\n\
    ```\ndf_subset.to_csv('pwt_subset.csv', index=False)\n```\n\n## 13.3.3 Apply方法\n\
    \n另一个广泛使用的Pandas方法是`df.apply()`。\n它将一个函数应用于每一行/每一列，并返回一个序列。\n这个函数可以是某些内置函数（如`max`函数）、`lambda`函数或用户定义的函数。\n\
    这里是一个使用`max`函数的示例\n\n```\ndf[['year', 'POP', 'XRAT', 'tcgdp', 'cc', 'cg']].apply(max)\n\
    ```\n\n```\nyear      2.000000e+03\nPOP       1.006300e+06\nXRAT      5.954381e+01\n\
    tcgdp     9.898700e+06\ncc        7.897874e+01\ncg        1.407221e+01\ndtype:\
    \ float64\n```\n\n这行代码将`max`函数应用于所有选定的列。\n`lambda`函数常与`df.apply()`方法一起使用。\n一个简单的例子是返回数据框中每一行本身\n\
    \n```\ndf.apply(lambda row: row, axis=1)\n```\n\n```\n  country country isocode\
    \  year        POP      XRAT      tcgdp\n0  Argentina       ARG  2000   37335.653\
    \  0.999500  2.950722e+05\n1  Australia       AUS  2000   19053.186  1.724830\
    \  5.418047e+05\n2      India       IND  2000  1006300.297 44.941600  1.728144e+06\n\
    3     Israel       ISR  2000    6114.570  4.077330  1.292539e+05\n4     Malawi\
    \       MWI  2000   11801.505 59.543808  5.026222e+03\n5  South Africa       ZAF\
    \  2000   45064.098  6.939830  2.272424e+05\n6 United States       USA  2000 \
    \ 282171.957  1.000000  9.898700e+06\n7     Uruguay       URY  2000    3219.793\
    \ 12.099592  2.525596e+04\n         cc        cg\n0  75.716805  5.578804\n1  67.759026\
    \  6.720098\n2  64.575551 14.072206\n3  64.436451 10.266688\n4  74.707624 11.658954\n\
    5  72.718710  5.726546\n6  72.347054  6.032454\n7  78.978740  5.108068\n```\n\n\
    **注意：** 对于`.apply()`方法\n\n- axis = 0 – 将函数应用于每一列（变量）\n- axis = 1 – 将函数应用于每一行（观测值）\n\
    - axis = 0 是默认参数\n\n我们可以将其与`.loc[]`结合使用，以进行一些更高级的选择。\n\n```\ncomplexCondition\
    \ = df.apply(\n    lambda row: row.POP > 40000 if row.country in ['Argentina',\
    \ 'India', 'South Africa'] else row.POP < 20000,\n    axis=1), ['country', 'year',\
    \ 'POP', 'XRAT', 'tcgdp']\n```\n\n这里的`df.apply()`返回一个布尔值序列，对应于满足if-else语句中指定条件的行。\n\
    此外，它还定义了感兴趣变量的子集。\n\n```\ncomplexCondition\n\n(0    False\n1     True\n2     True\n\
    3     True\n4     True\n5     True\n6    False\n7     True\ndtype: bool,\n['country',\
    \ 'year', 'POP', 'XRAT', 'tcgdp'])\n```\n\n当我们把这个条件应用到数据框时，结果将是\n\n```\ndf.loc[complexCondition]\n\
    \n    country  year          POP      XRAT        tcgdp\n1  Australia  2000  \
    \ 19053.186  1.724830  5.418047e+05\n2      India  2000  1006300.297 44.941600\
    \  1.728144e+06\n3     Israel  2000     6114.570  4.077330  1.292539e+05\n4  \
