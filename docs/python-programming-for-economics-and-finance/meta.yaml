  md: "# Python Programming for Economics and Finance\n\n```\ndef g(x):\n    while\
    \ 1:\n        yield x\n        x = x * x\n```\n\n# 19.5.3 Advantages of Iterators\n\
    \nWhat's the advantage of using an iterator here?\nSuppose we want to sample a\
    \ binomial(n,0.5).\nOne way to do it is as follows\n\n```\nimport random\nn =\
    \ 10000000\ndraws = [random.uniform(0, 1) < 0.5 for i in range(n)]\nsum(draws)\n\
    ```\n\n4997254\n\nBut we are creating two huge lists here, `range(n)` and `draws`.\n\
    This uses lots of memory and is very slow.\nIf we make n even bigger then this\
    \ happens\n\n```\nn = 100000000\ndraws = [random.uniform(0, 1) < 0.5 for i in\
    \ range(n)]\n```\n\nWe can avoid these problems using iterators.\nHere is the\
    \ generator function\n\n```\ndef f(n):\n    i = 1\n    while i <= n:\n       \
    \ yield random.uniform(0, 1) < 0.5\n        i += 1\n```\n\nNow let's do the sum\n\
    \n```\nn = 10000000\ndraws = f(n)\ndraws\n```\n\n<generator object f at 0x7fbfd2095b60>\n\
    \n```\nsum(draws)\n```\n\n4998844\n\nIn summary, iterables"
