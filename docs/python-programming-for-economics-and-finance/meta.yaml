    \ do so, we add the `parallel=True` flag and change `range` to `prange`:\n\n```\n\
    from numba import prange\n\n@njit(parallel=True)\ndef compute_long_run_median_parallel(w0=1,\
    \ T=1000, num_reps=50_000):\n\n    obs = np.empty(num_reps)\n    for i in prange(num_reps):\n\
    \        w = w0\n        for t in range(T):\n            w = h(w)\n        obs[i]\
    \ = w\n\n    return np.median(obs)\n```\n\nLet's look at the timing:\n\n```\n\
    %%time\ncompute_long_run_median_parallel()\n```\n\n```\nCPU times: user 6.68 s,\
    \ sys: 0 ns, total: 6.68 s\nWall time: 1.94 s\n```\n\n```\n1.8497894505998835\n\
    ```\n\nThe speed-up is significant.\n\n# 16.4.1 A Warning\n\nParallelization works\
    \ well in the outer loop of the last example because the individual tasks inside\
    \ the loop are independent of each other.\n\nIf this independence fails then parallelization\
    \ is often problematic.\n\nFor example, each step inside the inner loop depends\
    \ on the last step, so independence fails, and this is why we use ordinary `range`\
    \ instead of `prange`.\n\nWhen you see us using `prange` in later lectures, it\
    \ is because the independence of tasks holds true.\n\nWhen you see us using ordinary\
    \ `range` in a jitted function, it is either because the speed gain from parallelization\
    \ is small or because independence fails."
