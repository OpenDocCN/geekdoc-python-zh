    # 7.3.3 Example: A Market


    Next, let''s write a class for competitive market in which buyers and sellers
    are both price takers.


    The market consists of the following objects:


    +   - A linear demand curve $Q = a_d - b_d p$

    - A linear supply curve $Q = a_z + b_z(p - t)$


    Here


    +   - $p$ is price paid by the buyer, $Q$ is quantity and $t$ is a per-unit tax.

    - Other symbols are demand and supply parameters.


    The class provides methods to compute various values of interest, including competitive
    equilibrium price and quantity, tax revenue raised, consumer surplus and producer
    surplus.


    Here''s our implementation.


    (It uses a function from SciPy called quad for numerical integration—a topic we
    will say more about later on.)'
