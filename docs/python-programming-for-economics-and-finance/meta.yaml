    You might not need the following concepts immediately, but you will see them in\
    \ other people's code.\nHence you need to understand them at some stage of your\
    \ Python education.\n\n### 19.4.1 Decorators\n\nDecorators are a bit of syntactic\
    \ sugar that, while easily avoided, have turned out to be popular.\nIt's very\
