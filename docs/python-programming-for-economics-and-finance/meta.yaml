    \ *minimization*.\nMaximization can be performed by recalling that the maximizer\
    \ of a function $f$ on domain $D$ is the minimizer of $-f$ on $D$.\nMinimization\
    \ is closely related to root-finding: For smooth functions, interior optima correspond\
    \ to roots of the first derivative.\nThe speed/robustness trade-off described\
    \ above is present with numerical optimization too.\nUnless you have some prior\
    \ information you can exploit, it's usually best to use hybrid methods.\nFor constrained,\
    \ univariate (i.e., scalar) minimization, a good hybrid option is `fminbound`\n\
    \n```python\nfrom scipy.optimize import fminbound\n\nfminbound(lambda x: x**2,\
    \ -1, 2)  # Search in [-1, 2]\n```\n\n```\n0.0\n```\n\n### 12.5.1 Multivariate\
    \ Optimization\n\nMultivariate local optimizers include `minimize`, `fmin`, `fmin_powell`,\
