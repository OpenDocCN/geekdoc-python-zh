- img_proc: true
  md: '# 11.2.2 The Object-Oriented API


    Here''s the code corresponding to the preceding figure using the object-oriented
    API


    ```

    fig, ax = plt.subplots()

    ax.plot(x, y, ''b-'', linewidth=2)

    plt.show()

    ```


    ![](img/71948b0dce962ae14bde4e2e4d9fbb7b_198_0.png)


    Here the call `fig, ax = plt.subplots()` returns a pair, where


    +   - `fig` is a `Figure` instance—like a blank canvas.

    - `ax` is an `AxesSubplot` instance—think of a frame for plotting in.


    The `plot()` function is actually a method of `ax`.


    While there''s a bit more typing, the more explicit use of objects gives us better
    control.


    This will become more clear as we go along.


    # 11.2.3 Tweaks


    Here we''ve changed the line to red and added a legend


    ```

    fig, ax = plt.subplots()

    ax.plot(x, y, ''r-'', linewidth=2, label=''sine function'', alpha=0.6)

    ax.legend()

    plt.show()

    ```'
