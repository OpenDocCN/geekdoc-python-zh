    \ stock).\"\n    self.k = self.h()\n\ndef steady_state(self):\n    \"Compute the\
    \ steady state value of capital.\"\n    # Unpack parameters (get rid of self to\
    \ simplify notation)\n    n, s, δ, α, z = self.n, self.s, self.δ, self.α, self.z\n\
    \    # Compute and return steady state\n    return ((s * z) / (n + δ))**(1 / (1\
    \ - α))\n\ndef generate_sequence(self, t):\n    \"Generate and return a time series\
    \ of length t\"\n    path = []\n    for i in range(t):\n        path.append(self.k)\n\
