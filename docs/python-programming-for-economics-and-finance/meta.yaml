    ![](img/71948b0dce962ae14bde4e2e4d9fbb7b_146_0.png)


    # 8.4.1 Using magic commands


    Jupyter Notebooks and JupyterLab support the use of magic commands - commands
    that extend the capabilities of a standard Jupyter Notebook.


    The %run magic command allows you to run a Python script from within a Notebook.


    This is a convenient way to run scripts that you are working on in the same directory
    as your Notebook and present the outputs within the Notebook.


    # 8.4.2 Using the terminal


    However, if you are looking into just running the .py file, it is sometimes easier
    to use the terminal.


    Open a terminal from the launcher and run the following command.


    ```

    > python <path to file.py>

    ```


    **Note:** You can also run the script line by line by opening an ipykernel console
    either


    +   - from the launcher

    - by right clicking within the Notebook and selecting Create Console for Editor


    Use Shift + Enter to run a line of code.


    More on ipykernel consoles [here](here).'
