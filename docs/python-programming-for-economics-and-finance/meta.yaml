    # Python Programming for Economics and Finance


    The free-tier GPUs are adequate and better ones can be accessed by signing up
    for Colab Pro.

    Tutorials on how to get started with Google Colab can be found by searching.

    Written examples include


    +   - Google Colab Tutorial for Beginners

    - Intro to Google Colab


    Videos on the same topic can be found by searching on Youtube.

    Most of our lectures include a “Launch notebook” (play icon) button on the top
    right that allows you to easily run them in Colab.


    # 2.3 Local Install


    Local installs are preferable if you have access to a suitable machine and plan
    to do a substantial amount of Python programming.

    At the same time, local installs require more work than a cloud option like Colab.

    The rest of this lecture runs you through the details.


    # 2.3.1 The Anaconda Distribution


    The core Python package is easy to install but not what you should choose for
    these lectures.

    These lectures require the entire scientific programming ecosystem, which


    +   - the core installation doesn’t provide

    - is painful to install one piece at a time.


    Hence the best approach for our purposes is to install a Python distribution that
    contains


    +   1. the core Python language **and**

    2. compatible versions of the most popular scientific libraries.


    The best such distribution is Anaconda.

    Anaconda is


    +   - very popular

    - cross-platform

    - comprehensive

    - completely unrelated to the Nicki Minaj song of the same name


    Anaconda also comes with a great package management system to organize your code
    libraries.

    **All of what follows assumes that you adopt this recommendation!**'
  - '[PAGE 26]


    # 2.3.2 Installing Anaconda


    To install Anaconda, download the binary and follow the instructions.

    Important points:


    +   - Install the latest version!

    - Find the correct distribution for your system.

    - If you are asked during the installation process whether you''d like to make
    Anaconda your default Python installation, say yes.


    # 2.3.3 Updating Anaconda


    Anaconda supplies a tool called `conda` to manage and upgrade your Anaconda packages.

    One `conda` command you should execute regularly is the one that updates the whole
    Anaconda distribution.

    As a practice run, please execute the following


    +   1. Open up a terminal

    2. Type `conda update anaconda`


    For more information on conda, type `conda help` in a terminal.


    # 2.4 Jupyter Notebooks


    Jupyter notebooks are one of the many possible ways to interact with Python and
    the scientific libraries.

    They use a *browser-based* interface to Python with


    +   - The ability to write and execute Python commands.

    - Formatted output in the browser, including tables, figures, animation, etc.

    - The option to mix in formatted text and mathematical expressions.


    Because of these features, Jupyter is now a major player in the scientific computing
    ecosystem.

    Here''s an image showing execution of some code (borrowed from here) in a Jupyter
    notebook

    While Jupyter isn''t the only way to code in Python, it''s great for when you
    wish to


    +   - start coding in Python

    - test new ideas or interact with small pieces of code

    - use powerful online interactive environments such as Google Colab

    - share or collaborate scientific ideas with students or colleagues


    These lectures are designed for executing in Jupyter notebooks.'
