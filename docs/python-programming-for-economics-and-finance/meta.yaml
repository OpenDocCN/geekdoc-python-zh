    True, the code more or less follows PEP8.

    At the same time, it''s very poorly structured.

    Let''s talk about why that''s the case, and what we can do about it.


    # 18.3 Good Coding Practice


    There are usually many different ways to write a program that accomplishes a given
    task.

    For small programs, like the one above, the way you write code doesn''t matter
    too much.

    But if you are ambitious and want to produce useful things, you''ll write medium
    to large programs too.

    In those settings, coding style matters **a great deal**.

    Fortunately, lots of smart people have thought about the best way to write code.

    Here are some basic precepts.


    # 18.3.1 Don''t Use Magic Numbers


    If you look at the code above, you''ll see numbers like 50 and 49 and 3 scattered
    through the code.

    These kinds of numeric literals in the body of your code are sometimes called
    “magic numbers”.

    This is not a compliment.

    While numeric literals are not all evil, the numbers shown in the program above
    should certainly be replaced by named constants.

    For example, the code above could declare the variable `time_series_length = 50`.

    Then in the loops, 49 should be replaced by `time_series_length - 1`.

    The advantages are:


    +   - the meaning is much clearer throughout

    - to alter the time series length, you only need to change one value


    # 18.3.2 Don''t Repeat Yourself


    The other mortal sin in the code snippet above is repetition.

    Blocks of logic (such as the loop to generate time series) are repeated with only
    minor changes.

    This violates a fundamental tenet of programming: Don''t repeat yourself (DRY).


    +   - Also called DIE (duplication is evil).


    Yes, we realize that you can just cut and paste and change a few symbols.

    But as a programmer, your aim should be to **automate** repetition, **not** do
    it yourself.

    More importantly, repeating the same logic in different places means that eventually
    one of them will likely be wrong.

    If you want to know more, read the excellent summary found on [this page](https://en.wikipedia.org/wiki/Don%27t_repeat_yourself).

    We''ll talk about how to avoid repetition below.'
  - '[PAGE 313]


    # Python Programming for Economics and Finance


    # 18.3.3 Minimize Global Variables


    Sure, global variables (i.e., names assigned to values outside of any function
    or class) are convenient.

    Rookie programmers typically use global variables with abandon — as we once did
    ourselves.

    But global variables are dangerous, especially in medium to large size programs,
    since


    +   - they can affect what happens in any part of your program

    - they can be changed by any function


    This makes it much harder to be certain about what some small part of a given
    piece of code actually commands.

    Here’s a [useful discussion on the topic](https://www.google.com).

    While the odd global in small scripts is no big deal, we recommend that you teach
    yourself to avoid them.

    (We’ll discuss how just below).


    # JIT Compilation


    For scientific computing, there is another good reason to avoid global variables.

    As *we’ve seen in previous lectures*, JIT compilation can generate excellent performance
    for scripting languages like Python.

    But the task of the compiler used for JIT compilation becomes harder when global
    variables are present.

    Put differently, the type inference required for JIT compilation is safer and
    more effective when variables are sandboxed inside a function.


    # 18.3.4 Use Functions or Classes


    Fortunately, we can easily avoid the evils of global variables and WET code.


    +   - WET stands for “we enjoy typing” and is the opposite of DRY.


    We can do this by making frequent use of functions or classes.

    In fact, functions and classes are designed specifically to help us avoid shaming
    ourselves by repeating code or excessive use of global variables.


    # Which One, Functions or Classes?


    Both can be useful, and in fact they work well with each other.

    We’ll learn more about these topics over time.

    (Personal preference is part of the story too)

    What’s really important is that you use one or the other or both.'
