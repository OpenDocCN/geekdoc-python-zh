- md: "## Python Programming for Economics and Finance\n\nFor example, we can use\
    \ the conditioning to select the country with the largest household consumption\
    \ - gdp share cc.\n\n```\ndf.loc[df.cc == max(df.cc)]\n```\n\n```\n  country country\
    \ isocode  year       POP      XRAT      tcgdp       cc\n7  Uruguay       URY\
    \  2000  3219.793  12.099592  25255.961693  78.97874\n          cg\n7  5.108068\n\
    ```\n\nWhen we only want to look at certain columns of a selected sub-dataframe,\
    \ we can use the above conditions with the `.loc[__ , __]` command.\n\nThe first\
    \ argument takes the condition, while the second argument takes a list of columns\
    \ we want to return.\n\n```\ndf.loc[(df.cc + df.cg >= 80) & (df.POP <= 20000),\
    \ ['country', 'year', 'POP']]\n```\n\n```\n  country  year       POP\n4  Malawi\
    \  2000  11801.505\n7  Uruguay  2000   3219.793\n```\n\n## Application: Subsetting\
    \ Dataframe\n\nReal-world datasets can be enormous.\n\nIt is sometimes desirable\
    \ to work with a subset of data to enhance computational efficiency and reduce\
    \ redundancy.\n\nLet’s imagine that we’re only interested in the population (POP)\
    \ and total GDP (tcgdp).\n\nOne way to strip the data frame df down to only these\
    \ variables is to overwrite the dataframe using the selection method described\
    \ above\n\n```\ndf_subset = df[['country', 'POP', 'tcgdp']]\ndf_subset\n```\n\n\
    ```\n          country         POP       tcgdp\n0       Argentina   37335.653\
    \  2.950722e+05\n1       Australia   19053.186  5.418047e+05\n2           India\
    \  1006300.297  1.728144e+06\n3          Israel     6114.570  1.292539e+05\n4\
    \          Malawi    11801.505  5.026222e+03\n5    South Africa    45064.098 \
    \ 2.272424e+05\n6  United States   282171.957  9.898700e+06\n7        Uruguay\
    \     3219.793  2.525596e+04\n```\n\nWe can then save the smaller dataset for\
    \ further analysis.\n\n```\ndf_subset.to_csv('pwt_subset.csv', index=False)\n\
    ```\n\n## 13.3.3 Apply Method\n\nAnother widely used Pandas method is `df.apply()`.\n\
    It applies a function to each row/column and returns a series.\nThis function\
    \ can be some built-in functions like the `max` function, a `lambda` function,\
    \ or a user-defined function.\nHere is an example using the `max` function\n\n\
    ```\ndf[['year', 'POP', 'XRAT', 'tcgdp', 'cc', 'cg']].apply(max)\n```\n\n```\n\
    year      2.000000e+03\nPOP       1.006300e+06\nXRAT      5.954381e+01\ntcgdp\
    \     9.898700e+06\ncc        7.897874e+01\ncg        1.407221e+01\ndtype: float64\n\
    ```\n\nThis line of code applies the `max` function to all selected columns.\n\
    `lambda` function is often used with `df.apply()` method.\nA trivial example is\
    \ to return itself for each row in the dataframe\n\n```\ndf.apply(lambda row:\
    \ row, axis=1)\n```\n\n```\n  country country isocode  year        POP      XRAT\
    \      tcgdp\n0  Argentina       ARG  2000   37335.653  0.999500  2.950722e+05\n\
    1  Australia       AUS  2000   19053.186  1.724830  5.418047e+05\n2      India\
    \       IND  2000  1006300.297 44.941600  1.728144e+06\n3     Israel       ISR\
    \  2000    6114.570  4.077330  1.292539e+05\n4     Malawi       MWI  2000   11801.505\
    \ 59.543808  5.026222e+03\n5  South Africa       ZAF  2000   45064.098  6.939830\
    \  2.272424e+05\n6 United States       USA  2000  282171.957  1.000000  9.898700e+06\n\
    7     Uruguay       URY  2000    3219.793 12.099592  2.525596e+04\n         cc\
    \        cg\n0  75.716805  5.578804\n1  67.759026  6.720098\n2  64.575551 14.072206\n\
    3  64.436451 10.266688\n4  74.707624 11.658954\n5  72.718710  5.726546\n6  72.347054\
    \  6.032454\n7  78.978740  5.108068\n```\n\n**Note:** For the `.apply()` method\n\
    \n- axis = 0 – apply function to each column (variables)\n- axis = 1 – apply function\
    \ to each row (observations)\n- axis = 0 is the default parameter\n\nWe can use\
    \ it together with `.loc[]` to do some more advanced selection.\n\n```\ncomplexCondition\
    \ = df.apply(\n    lambda row: row.POP > 40000 if row.country in ['Argentina',\
    \ 'India', 'South Africa'] else row.POP < 20000,\n    axis=1), ['country', 'year',\
    \ 'POP', 'XRAT', 'tcgdp']\n```\n\n`df.apply()` here returns a series of boolean\
    \ values for rows that satisfy the condition specified in the if-else statement.\n\
    In addition, it also defines a subset of variables of interest.\n\n```\ncomplexCondition\n\
    \n(0    False\n1     True\n2     True\n3     True\n4     True\n5     True\n6 \
    \   False\n7     True\ndtype: bool,\n['country', 'year', 'POP', 'XRAT', 'tcgdp'])\n\
    ```\n\nWhen we apply this condition to the dataframe, the result will be\n\n```\n\
    df.loc[complexCondition]\n\n    country  year          POP      XRAT        tcgdp\n\
    1  Australia  2000   19053.186  1.724830  5.418047e+05\n2      India  2000  1006300.297\
    \ 44.941600  1.728144e+06\n3     Israel  2000     6114.570  4.077330  1.292539e+05\n\
    4     Malawi  2000    11801.505 59.543808  5.026222e+03\n5 South Africa 2000 \
    \   45064.098  6.939830  2.272424e+05\n7    Uruguay  2000     3219.793 12.099592\
    \  2.525596e+04\n```\n\n## 13.3.4 Make Changes in DataFrames\n\nThe ability to\
    \ make changes in dataframes is important to generate a clean dataset for future\
    \ analysis.\n\n1. We can use `df.where()` conveniently to “keep” the rows we have\
    \ selected and replace the rest rows with any other values\n\n```\ndf.where(df.POP\
    \ >= 20000, False)\n\n    country country isocode  year          POP      XRAT\
    \        tcgdp\n0  Argentina       ARG  2000   37335.653  0.9995  295072.21869\n\
    1     False     False False  False      False  False         False\n2     India\
    \       IND  2000  1006300.297 44.9416 1728144.3748\n3     False     False False\
    \  False      False  False         False\n4     False     False False  False \
    \     False  False         False\n5 South Africa     ZAF  2000    45064.098  6.93983\
    \ 227242.36949\n6 United States     USA  2000   282171.957  1.0    9898700.0\n\
    7     False     False False  False      False  False         False\n         \
    \ cc          cg\n0  75.716805    5.578804\n1       False       False\n2  64.575551\
    \   14.072206\n3       False       False\n4       False       False\n5  72.71871\
    \    5.726546\n6  72.347054    6.032454\n7       False       False\n```\n\n2.\
    \ We can simply use `.loc[]` to specify the column that we want to modify, and\
    \ assign values\n\n```\ndf.loc[df.cg == max(df.cg), 'cg'] = np.nan\ndf\n```\n\n\
    ```\n      country country isocode  year          POP      XRAT        tcgdp\n\
    0   Argentina       ARG  2000  37335.653  0.999500  2.950722e+05\n1   Australia\
    \       AUS  2000  19053.186  1.724830  5.418047e+05\n2       India       IND\
    \  2000 1006300.297 44.941600  1.728144e+06\n3      Israel       ISR  2000   6114.570\
    \  4.077330  1.292539e+05\n4      Malawi       MWI  2000  11801.505 59.543808\
    \  5.026222e+03\n5  South Africa       ZAF  2000  45064.098  6.939830  2.272424e+05\n\
    6 United States       USA  2000 282171.957  1.000000  9.898700e+06\n7     Uruguay\
    \       URY  2000   3219.793 12.099592  2.525596e+04\n          cc          cg\n\
    0  75.716805    5.578804\n1  67.759026    6.720098\n2  64.575551         NaN\n\
    3  64.436451   10.266688\n4  74.707624   11.658954\n5  72.718710    5.726546\n\
    6  72.347054    6.032454\n7  78.978740    5.108068\n```\n\n3. We can use the `.apply()`\
    \ method to modify rows/columns as a whole\n\n```\ndef update_row(row):\n    #\
    \ modify POP\n    row.POP = np.nan if row.POP<= 10000 else row.POP\n\n    # modify\
    \ XRAT\n    row.XRAT = row.XRAT / 10\n    return row\n\ndf.apply(update_row, axis=1)\n\
    ```\n\n```\n      country country isocode  year          POP      XRAT       \
    \ tcgdp\n0   Argentina       ARG  2000  37335.653  0.099950  2.950722e+05\n1 \
    \  Australia       AUS  2000  19053.186  0.172483  5.418047e+05\n2       India\
    \       IND  2000 1006300.297  4.494160  1.728144e+06\n3      Israel       ISR\
    \  2000         NaN  0.407733  1.292539e+05\n4      Malawi       MWI  2000  11801.505\
    \  5.954381  5.026222e+03\n5  South Africa       ZAF  2000  45064.098  0.693983\
    \  2.272424e+05\n6 United States       USA  2000 282171.957  0.100000  9.898700e+06\n\
    7     Uruguay       URY  2000         NaN  1.209959  2.525596e+04\n          cc\
    \          cg\n0  75.716805    5.578804\n1  67.759026    6.720098\n2  64.575551\
    \         NaN\n3  64.436451   10.266688\n4  74.707624   11.658954\n5  72.718710\
    \    5.726546\n6  72.347054    6.032454\n7  78.978740    5.108068\n```\n\n4. We\
    \ can use the `.applymap()` method to modify all individual entries in the dataframe\
    \ altogether.\n\n```\n# Round all decimal numbers to 2 decimal places\ndf.applymap(lambda\
    \ x : round(x,2) if type(x)!=str else x)\n```\n\n| | country | country isocode\
    \ | year | POP | XRAT | tcgdp | cc | cg |\n|---|---|---|---|---|---|---|---|---|\n\
    | 0 | Argentina | ARG | 2000 | 37335.65 | 1.00 | 295072.22 | 75.72 | 5.58 |\n\
    | 1 | Australia | AUS | 2000 | 19053.19 | 1.72 | 541804.65 | 67.76 | 6.72 |\n\
    | 2 | India | IND | 2000 | 1006300.30 | 44.94 | 1728144.37 | 64.58 | NaN |\n|\
    \ 3 | Israel | ISR | 2000 | 6114.57 | 4.08 | 129253.89 | 64.44 | 10.27 |\n| 4\
    \ | Malawi | MWI | 2000 | 11801.50 | 59.54 | 5026.22 | 74.71 | 11.66 |\n| 5 |\
    \ South Africa | ZAF | 2000 | 45064.10 | 6.94 | 227242.37 | 72.72 | 5.73 |\n|\
    \ 6 | United States | USA | 2000 | 282171.96 | 1.00 | 9898700.00 | 72.35 | 6.03\
    \ |\n| 7 | Uruguay | URY | 2000 | 3219.79 | 12.10 | 25255.96 | 78.98 | 5.11 |\n\
    \n## Application: Missing Value Imputation\n\nReplacing missing values is an important\
    \ step in data munging.\n\nLet's randomly insert some NaN values\n\n```\nfor idx\
    \ in list(zip([0, 3, 5, 6], [3, 4, 6, 2])):\n    df.iloc[idx] = np.nan\n\ndf\n\
    ```\n\n| | country | country isocode | year | POP | XRAT | tcgdp | cc | cg |\n\
    |---|---|---|---|---|---|---|---|---|\n| 0 | Argentina | ARG | 2000.0 | NaN |\
    \ 0.999500 | 295072.22 | 75.72 | 5.58 |\n| 1 | Australia | AUS | 2000.0 | 19053.186\
    \ | 1.724830 | 541804.65 | 67.76 | 6.72 |\n| 2 | India | IND | 2000.0 | 1006300.297\
    \ | 44.941600 | 1728144.37 | 64.58 | NaN |\n| 3 | Israel | ISR | 2000.0 | 6114.570\
