  md: "With $s_t := \\ln S_t$, the price dynamics become\n\n$s_{t+1} = s_t + \\mu\
    \ + \\exp(h_t)\\xi_{t+1}$\n\nUsing this fact, the solution can be written as follows.\n\
    \n```\nfrom numpy.random import randn\nM = 10_000_000\n\nn, β, K = 20, 0.99, 100\n\
    μ, ρ, ν, S0, h0 = 0.0001, 0.1, 0.001, 10, 0\n\n@njit(parallel=True)\ndef compute_call_price_parallel(β=β,\n\
    \                                μ=μ,\n                                S0=S0,\n\
    \                                h0=h0,\n                                K=K,\n\
    \                                n=n,\n                                ρ=ρ,\n\
    \                                ν=ν,\n                                M=M):\n\
    \    current_sum = 0.0\n    # For each sample path\n    for m in prange(M):\n\
    \        s = np.log(S0)\n        h = h0\n        # Simulate forward in time\n\
    \        for t in range(n):\n            s = s + μ + np.exp(h) * randn()\n   \
    \         h = ρ * h + ν * randn()\n        # And add the value max{S_n - K, 0}\
    \ to current_sum\n        current_sum += np.maximum(np.exp(s) - K, 0)\n\n    return\
    \ β**n * current_sum / M\n```\n\nTry swapping between `parallel=True` and `parallel=False`\
    \ and noting the run time.\n\nIf you are on a machine with many CPUs, the difference\
    \ should be significant."
