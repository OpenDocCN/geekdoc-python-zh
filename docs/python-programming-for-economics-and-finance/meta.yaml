    \n> “让我们明确一点：科学工作与共识毫无关系。共识是政治的事务。相反，科学只需要一个碰巧正确的研究者，这意味着他或她拥有可以通过参照现实世界来验证的结果。在科学中，共识是无关紧要的。重要的是可重复的结果。”\
    \ – 迈克尔·克莱顿\n\n## 10.1 概述\n\nNumPy是一个一流的数值编程库。\n\n- 在学术界、金融界和工业界广泛使用。\n- 成熟、快速、稳定且持续发展。\n\
    \n我们在前面的讲座中已经看到了一些涉及NumPy的代码。\n在本讲座中，我们将开始更系统地讨论：\n\n- NumPy数组，以及\n- NumPy提供的基本数组处理操作。"
