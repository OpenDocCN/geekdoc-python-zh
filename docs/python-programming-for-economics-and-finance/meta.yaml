    \n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_244_0.png)\n\n## 13.4 On-Line Data\
    \ Sources\n\nPython makes it straightforward to query online databases programmatically.\n\
    An important database for economists is FRED — a vast collection of time series\
    \ data maintained by the St. Louis Fed.\nFor example, suppose that we are interested\
    \ in the unemployment rate.\nVia FRED, the entire series for the US civilian unemployment\
    \ rate can be downloaded directly by entering this URL into your browser (note\
    \ that this requires an internet connection)\n\n```\nhttps://research.stlouisfed.org/fred2/series/UNRATE/downloaddata/UNRATE.csv\n\
    ```\n\n(Equivalently, click here: https://research.stlouisfed.org/fred2/series/UNRATE/downloaddata/UNRATE.csv)\n\
    This request returns a CSV file, which will be handled by your default application\
    \ for this class of files.\nAlternatively, we can access the CSV file from within\
    \ a Python program.\nThis can be done with a variety of methods.\nWe start with\
    \ a relatively low-level method and then return to pandas.\n\n### 13.4.1 Accessing\
    \ Data with requests\n\nOne option is to use requests, a standard Python library\
    \ for requesting data over the Internet.\nTo begin, try the following code on\
    \ your computer\n\n```\nr = requests.get('http://research.stlouisfed.org/fred2/series/UNRATE/downloaddata/UNRATE.csv')\n\
    ```\n\nIf there’s no error message, then the call has succeeded.\nIf you do get\
    \ an error, then there are two likely causes\n\n1.  You are not connected to the\
    \ Internet — hopefully, this isn’t the case.\n2.  Your machine is accessing the\
    \ Internet through a proxy server, and Python isn’t aware of this.\n\nIn the second\
    \ case, you can either\n\n-   switch to another machine\n-   solve your proxy\
    \ problem by reading the documentation\n\nAssuming that all is working, you can\
    \ now proceed to use the source object returned by the call requests.get('http://research.stlouisfed.org/fred2/series/UNRATE/downloaddata/UNRATE.csv')\n\
    \n```\nurl = 'http://research.stlouisfed.org/fred2/series/UNRATE/downloaddata/UNRATE.csv'\n\
    source = requests.get(url).content.decode().split(\"\\n\")\nsource[0]\n```\n\n\
    ```\n'DATE,VALUE\\r'\n```\n\n```\nsource[1]\n```"
