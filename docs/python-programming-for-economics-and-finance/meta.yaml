  - "[PAGE 139]\n\n# 7.5 Exercises\n\n# Exercise 7.5.1\n\nThe empirical cumulative\
    \ distribution function (ecdf) corresponding to a sample $\\{X_i\\}_{i=1}^n$ is\
    \ defined as\n\n$$F_n(x) := \\frac{1}{n} \\sum_{i=1}^n \\mathbf{1}\\{X_i \\leq\
    \ x\\} \\quad (x \\in \\mathbb{R}) \\qquad (7.3)$$\n\nHere $\\mathbf{1}\\{X_i\
    \ \\leq x\\}$ is an indicator function (one if $X_i \\leq x$ and zero otherwise)\
    \ and hence $F_n(x)$ is the fraction of the sample that falls below $x$.\n\nThe\
    \ Glivenko–Cantelli Theorem states that, provided that the sample is IID, the\
    \ ecdf $F_n$ converges to the true distribution function $F$.\n\nImplement $F_n$\
    \ as a class called `ECDF`, where\n\n+   - A given sample $\\{X_i\\}_{i=1}^n$\
    \ are the instance data, stored as `self.observations`.\n- The class implements\
    \ a `__call__` method that returns $F_n(x)$ for any $x$.\n\nYour code should work\
    \ as follows (modulo randomness)\n\n```\nfrom random import uniform\n\nsamples\
    \ = [uniform(0, 1) for i in range(10)]\nF = ECDF(samples)\nF(0.5)  # Evaluate\
    \ ecdf at x = 0.5\n```\n\n```\nF.observations = [uniform(0, 1) for i in range(1000)]\n\
    F(0.5)\n```\n\nAim for clarity, not efficiency.\n\n# Solution to Exercise 7.5.1\n\
    \n```\nclass ECDF:\n\n    def __init__(self, observations):\n        self.observations\
    \ = observations\n\n    def __call__(self, x):\n        counter = 0.0\n      \
    \  for obs in self.observations:\n            if obs <= x:\n                counter\
    \ += 1\n        return counter / len(self.observations)\n```\n\n```\n# == test\
    \ == #\n\nfrom random import uniform\n\nsamples = [uniform(0, 1) for i in range(10)]\n\
    F = ECDF(samples)\n```"
