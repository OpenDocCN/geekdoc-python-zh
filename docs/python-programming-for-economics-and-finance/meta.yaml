    \ * x)\n\n# Program continues with various calculations using f and g\n```\n\n\
    Now suppose there's a problem: occasionally negative numbers get fed to `f` and\
    \ `g` in the calculations that follow.\nIf you try it, you'll see that when these\
    \ functions are called with negative numbers they return a NumPy object called\
    \ `nan`.\nThis stands for \"not a number\" (and indicates that you are trying\
    \ to evaluate a mathematical function at a point where it is not defined).\nPerhaps\
    \ this isn't what we want, because it causes other problems that are hard to pick\
