    ## PARALLELIZATION\n\nContents\n\n- Parallelization\n- Overview\n- Types of Parallelization\n\
    - Implicit Multithreading in NumPy\n- Multithreaded Loops in Numba\n- Exercises\n\
    \nIn addition to what's in Anaconda, this lecture will need the following libraries:\n\
    \n```python\n!pip install quantecon\n```\n\n## 16.1 Overview\n\nThe growth of\
    \ CPU clock speed (i.e., the speed at which a single chain of logic can be run)\
    \ has slowed dramatically in recent years.\nThis is unlikely to change in the\
    \ near future, due to inherent physical limitations on the construction of chips\
    \ and circuit boards.\nChip designers and computer programmers have responded\
    \ to the slowdown by seeking a different path to fast execution: parallelization.\n\
    Hardware makers have increased the number of cores (physical CPUs) embedded in\
    \ each machine.\nFor programmers, the challenge has been to exploit these multiple\
    \ CPUs by running many processes in parallel (i.e., simultaneously).\nThis is\
    \ particularly important in scientific programming, which requires handling\n\n\
    - large amounts of data and\n- CPU intensive simulations and other calculations.\n\
    \nIn this lecture we discuss parallelization for scientific computing, with a\
    \ focus on\n\n1. the best tools for parallelization in Python and\n2. how these\
    \ tools can be applied to quantitative economic problems.\n\nLet's start with\
    \ some imports:\n\n```python\n%matplotlib inline\nimport numpy as np\nimport quantecon\
    \ as qe\nimport matplotlib.pyplot as plt\nplt.rcParams['figure.figsize'] = (10,6)\n\
    ```\n\n## 16.2 Types of Parallelization\n\nLarge textbooks have been written on\
    \ different approaches to parallelization but we will keep a tight focus on what's\
    \ most useful to us.\n\nWe will briefly review the two main kinds of parallelization\
    \ commonly used in scientific computing and discuss their pros and cons.\n\n###\
    \ 16.2.1 Multiprocessing\n\nMultiprocessing means concurrent execution of multiple\
    \ processes using more than one processor.\n\nIn this context, a **process** is\
    \ a chain of instructions (i.e., a program).\n\nMultiprocessing can be carried\
    \ out on one machine with multiple CPUs or on a collection of machines connected\
    \ by a network.\n\nIn the latter case, the collection of machines is usually called\
    \ a **cluster**.\n\nWith multiprocessing, each process has its own memory space,\
    \ although the physical memory chip might be shared.\n\n### 16.2.2 Multithreading\n\
    \nMultithreading is similar to multiprocessing, except that, during execution,\
    \ the threads all share the same memory space.\n\nNative Python struggles to implement\
    \ multithreading due to some [legacy design features](https://docs.python.org/3/c-api/init.html#freeing-the-gil).\n\
    \nBut this is not a restriction for scientific libraries like NumPy and Numba.\n\
    \nFunctions imported from these libraries and JIT-compiled code run in low level\
    \ execution environments where Python's legacy restrictions don't apply.\n\n###\
    \ 16.2.3 Advantages and Disadvantages\n\nMultithreading is more lightweight because\
    \ most system and memory resources are shared by the threads.\n\nIn addition,\
    \ the fact that multiple threads all access a shared pool of memory is extremely\
    \ convenient for numerical programming.\n\nOn the other hand, multiprocessing\
    \ is more flexible and can be distributed across clusters.\n\nFor the great majority\
    \ of what we do in these lectures, multithreading will suffice.\n\n## 16.3 Implicit\
    \ Multithreading in NumPy\n\nActually, you have already been using multithreading\
    \ in your Python code, although you might not have realized it.\n(We are, as usual,\
    \ assuming that you are running the latest version of Anaconda Python.)\nThis\
    \ is because NumPy cleverly implements multithreading in a lot of its compiled\
    \ code.\nLet’s look at some examples to see this in action.\n\n### 16.3.1 A Matrix\
    \ Operation\n\nThe next piece of code computes the eigenvalues of a large number\
