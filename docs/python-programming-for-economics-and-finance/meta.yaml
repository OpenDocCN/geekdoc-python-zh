    \ to investigate the set of available routines.\n\n## 12.8 Exercises\n\nThe first\
    \ few exercises concern pricing a European call option under the assumption of\
    \ risk neutrality. The price satisfies\n$$P = \\beta^n \\mathbb{E} \\max\\{S_n\
    \ - K, 0\\}$$\nwhere\n1. $\\beta$ is a discount factor,\n2. $n$ is the expiry\
    \ date,\n3. $K$ is the strike price and\n4. $\\{S_t\\}$ is the price of the underlying\
    \ asset at each time $t$.\nFor example, if the call option is to buy stock in\
    \ Amazon at strike price $K$, the owner has the right (but not the obligation)\
    \ to buy 1 share in Amazon at price $K$ after $n$ days.\nThe payoff is therefore\
    \ $\\max\\{S_n - K, 0\\}$\nThe price is the expectation of the payoff, discounted\
