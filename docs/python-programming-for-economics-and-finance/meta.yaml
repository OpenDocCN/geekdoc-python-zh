  md: "# # 16.5 Exercises\n\n**Exercise 16.5.1**\n\nIn *an earlier exercise*, we used\
    \ Numba to accelerate an effort to compute the constant $\\pi$ by Monte Carlo.\n\
    \nNow try adding parallelization and see if you get further speed gains.\n\nYou\
    \ should not expect huge gains here because, while there are many independent\
    \ tasks (draw point and test if in circle), each one has low execution time.\n\
    \nGenerally speaking, parallelization is less effective when the individual tasks\
    \ to be parallelized are very small relative to total execution time.\n\nThis\
    \ is due to overheads associated with spreading all of these small tasks across\
    \ multiple CPUs.\n\nNevertheless, with suitable hardware, it is possible to get\
    \ nontrivial speed gains in this exercise.\n\nFor the size of the Monte Carlo\
    \ simulation, use something substantial, such as n = 100_000_000.\n\n**Solution\
    \ to Exercise 16.5.1**\n\nHere is one solution:\n\n```\npython\nfrom random import\
    \ uniform\n\n@njit(parallel=True)\ndef calculate_pi(n=1_000_000):\n    count =\
    \ 0\n    for i in prange(n):\n        u, v = uniform(0, 1), uniform(0, 1)\n  \
    \      d = np.sqrt((u - 0.5)**2 + (v - 0.5)**2)\n        if d < 0.5:\n       \
    \     count += 1\n\n    area_estimate = count / n\n    return area_estimate *\
    \ 4  # dividing by radius**2\n```\n\nNow let's see how fast it runs:\n\n```\n\
    python\n%time calculate_pi()\n```\n\n```\n\nCPU times: user 367 ms, sys: 28.1\
