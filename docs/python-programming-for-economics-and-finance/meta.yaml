    # Example: fixed point computation


    Fixed point computation is frequently used in economics and finance.

    Here we solve the fixed point of the Solow-Swan growth dynamics:

    $$k_{t+1} = s f(k_t) + (1 - \delta)k_t, \quad t = 0, 1, \dots$$

    where $k_t$ is the capital stock, $f$ is a production function, $\delta$ is a
    rate of depreciation.

    We are interested in calculating the fixed point of this dynamics, i.e., the value
    of $k$ such that $k_{t+1} = k_t$.

    With $f(k) = Ak^\alpha$, we can show the unique fixed point of the dynamics $k^*$
    using pen and paper:

    $$k^* := \left(\frac{sA}{\delta}\right)^{1/(1-\alpha)}$$

    This can be easily computed in SymPy


    ```

    A, s, k, a, δ = symbols(''A s k^* a δ'')

    ```


    Now we solve for the fixed point $k^*$

    $$k^* = sA(k^*)^\alpha + (1 - \delta)k^*$$'
