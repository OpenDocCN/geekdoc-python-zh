- md: "## 15.5 Compiling Classes\n\nAs mentioned above, at present Numba can only\
    \ compile a subset of Python. However, that subset is ever expanding. For example,\
    \ Numba is now quite effective at compiling classes. If a class is successfully\
    \ compiled, then its methods act as JIT-compiled functions. To give one example,\
    \ let's consider the class for analyzing the Solow growth model we created in\
    \ *this lecture*. To compile this class we use the `@jitclass` decorator:\n\n\
    ```python\nfrom numba import float64\nfrom numba.experimental import jitclass\n\
    ```\n\nNotice that we also imported something called `float64`. This is a data\
    \ type representing standard floating point numbers. We are importing it here\
    \ because Numba needs a bit of extra help with types when it tries to deal with\
    \ classes. Here's our code:\n\n```python\nsolow_data = [\n    ('n', float64),\n\
    \    ('s', float64),\n    ('δ', float64),\n    ('a', float64),\n    ('z', float64),\n\
    \    ('k', float64)\n]\n\n@jitclass(solow_data)\nclass Solow:\n    r\"\"\"\n \
    \   Implements the Solow growth model with the update rule\n\n        k_{t+1}\
    \ = [(s z k^a_t) + (1 - δ)k_t] /(1 + n)\n\n    \"\"\"\n    def __init__(self,\
    \ n=0.05,  # population growth rate\n                       s=0.25,  # savings\
    \ rate\n                       δ=0.1,   # depreciation rate\n                \
    \       a=0.3,   # share of labor\n                       z=2.0,   # productivity\n\
    \                       k=1.0):  # current capital stock\n\n        self.n, self.s,\
    \ self.δ, self.a, self.z = n, s, δ, a, z\n        self.k = k\n\n    def h(self):\n\
    \        \"Evaluate the h function\"\n        # Unpack parameters (get rid of\
    \ self to simplify notation)\n        n, s, δ, a, z = self.n, self.s, self.δ,\
    \ self.a, self.z\n        # Apply the update rule\n        return (s * z * self.k**a\
    \ + (1 - δ) * self.k) / (1 + n)\n\n    def update(self):\n        \"Update the\
    \ current state (i.e., the capital stock).\"\n        self.k = self.h()\n\n  \
    \  def steady_state(self):\n        \"Compute the steady state value of capital.\"\
    \n        # Unpack parameters (get rid of self to simplify notation)\n       \
    \ n, s, δ, α, z = self.n, self.s, self.δ, self.α, self.z\n        # Compute and\
    \ return steady state\n        return ((s * z) / (n + δ))**(1 / (1 - α))\n\n \
    \   def generate_sequence(self, t):\n        \"Generate and return a time series\
    \ of length t\"\n        path = []\n        for i in range(t):\n            path.append(self.k)\n\
    \            self.update()\n        return path\n```\n\nFirst we specified the\
    \ types of the instance data for the class in `solow_data`. After that, targeting\
    \ the class for JIT compilation only requires adding `@jitclass(solow_data)` before\
    \ the class definition. When we call the methods in the class, the methods are\
    \ compiled just like functions.\n\n```python\ns1 = Solow()\ns2 = Solow(k=8.0)\n\
    \nT = 60\nfig, ax = plt.subplots()\n\n# Plot the common steady state value of\
    \ capital\nax.plot([s1.steady_state()]*T, 'k-', label='steady state')\n\n# Plot\
    \ time series for each economy\nfor s in s1, s2:\n    lb = f'capital series from\
    \ initial state {s.k}'\n    ax.plot(s.generate_sequence(T), 'o-', lw=2, alpha=0.6,\
    \ label=lb)\nax.set_ylabel('$k_{t}$', fontsize=12)\nax.set_xlabel('$t$', fontsize=12)\n\
    ax.legend()\nplt.show()\n```\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_287_0.png)\n\
    \n## 15.6 Alternatives to Numba\n\nThere are additional options for accelerating\
    \ Python loops. Here we quickly review them. However, we do so only for interest\
    \ and completeness. If you prefer, you can safely skip this section.\n\n### 15.6.1\
    \ Cython\n\nLike *Numba*, Cython provides an approach to generating fast compiled\
    \ code that can be used from Python. As was the case with Numba, a key problem\
    \ is the fact that Python is dynamically typed. As you'll recall, Numba solves\
    \ this problem (where possible) by inferring type. Cython's approach is different\
    \ — programmers add type definitions directly to their “Python” code. As such,\
    \ the Cython language can be thought of as Python with type definitions. In addition\
    \ to a language specification, Cython is also a language translator, transforming\
    \ Cython code into optimized C and C++ code. Cython also takes care of building\
    \ language extensions — the wrapper code that interfaces between the resulting\
    \ compiled code and Python. While Cython has certain advantages, we generally\
    \ find it both slower and more cumbersome than Numba.\n\n### 15.6.2 Interfacing\
    \ with Fortran via F2Py\n\nIf you are comfortable writing Fortran you will find\
    \ it very easy to create extension modules from Fortran code using F2Py. F2Py\
    \ is a Fortran-to-Python interface generator that is particularly simple to use.\
    \ Robert Johansson provides a nice introduction to F2Py, among other things. Recently,\
    \ a Jupyter cell magic for Fortran has been developed — you might want to give\
    \ it a try.\n\n## 15.7 Summary and Comments\n\nLet’s review the above and add\
    \ some cautionary notes.\n\n### 15.7.1 Limitations\n\nAs we’ve seen, Numba needs\
    \ to infer type information on all variables to generate fast machine-level instructions.\
    \ For simple routines, Numba infers types very well. For larger ones, or for routines\
    \ using external libraries, it can easily fail. Hence, it’s prudent when using\
    \ Numba to focus on speeding up small, time-critical snippets of code. This will\
    \ give you much better performance than blanketing your Python programs with @njit\
    \ statements.\n\n### 15.7.2 A Gotcha: Global Variables\n\nHere’s another thing\
    \ to be careful about when using Numba. Consider the following example:\n\n```python\n\
    a = 1\n\n@njit\ndef add_a(x):\n    return a + x\n\nprint(add_a(10))\n```\n\n```\n\
    11\n```\n\n```python\na = 2\n\nprint(add_a(10))\n```\n\n```\n11\n```\n\nNotice\
    \ that changing the global had no effect on the value returned by the function.\
    \ When Numba compiles machine code for functions, it treats global variables as\
    \ constants to ensure type stability.\n\n## 15.8 Exercises\n\n**Exercise 15.8.1**\n\
    \n*Previously* we considered how to approximate $\\pi$ by Monte Carlo. Use the\
    \ same idea here, but make the code efficient using Numba. Compare speed with\
    \ and without Numba when the sample size is large.\n\n**Solution to Exercise 15.8.1**\n\
    \nHere is one solution:\n\n```python\nfrom random import uniform\n\n@njit\ndef\
    \ calculate_pi(n=1_000_000):\n    count = 0\n    for i in range(n):\n        u,\
    \ v = uniform(0, 1), uniform(0, 1)\n        d = np.sqrt((u - 0.5)**2 + (v - 0.5)**2)\n\
    \        if d < 0.5:\n            count += 1\n\n    area_estimate = count / n\n\
    \    return area_estimate * 4  # dividing by radius**2\n```\n\nNow let's see how\
    \ fast it runs:\n\n```python\n%time calculate_pi()\n```\n\n```\nCPU times: user\
    \ 148 ms, sys: 3.99 ms, total: 152 ms\nWall time: 152 ms\n\n3.138976\n```\n\n\
    ```python\n%time calculate_pi()\n```\n\n```\nCPU times: user 10.9 ms, sys: 0 ns,\
    \ total: 10.9 ms\nWall time: 10.8 ms\n\n3.142884\n```\n\nIf we switch off JIT\
    \ compilation by removing `@njit`, the code takes around 150 times as long on\
    \ our machine. So we get a speed gain of 2 orders of magnitude—which is huge—by\
    \ adding four characters.\n\n**Exercise 15.8.2**\n\nIn the [Introduction to Quantitative\
    \ Economics with Python](https://python-intro.quantecon.org/) lecture series you\
    \ can learn all about finite-state Markov chains."
  mdcn: "## 15.5 编译类\n\n如上所述，目前 Numba 只能编译 Python 的一个子集。然而，这个子集正在不断扩展。例如，Numba 现在在编译类方面已经相当有效。如果一个类被成功编译，那么它的方法就充当\
    \ JIT 编译的函数。举个例子，让我们考虑一下我们在*本讲*中创建的用于分析索洛增长模型的类。为了编译这个类，我们使用 `@jitclass` 装饰器：\n\
    \n```python\nfrom numba import float64\nfrom numba.experimental import jitclass\n\
    ```\n\n注意我们还导入了一个名为 `float64` 的东西。这是一个表示标准浮点数的数据类型。我们在这里导入它是因为 Numba 在尝试处理类时需要一些额外的类型帮助。以下是我们的代码：\n\
    \n```python\nsolow_data = [\n    ('n', float64),\n    ('s', float64),\n    ('δ',\
    \ float64),\n    ('a', float64),\n    ('z', float64),\n    ('k', float64)\n]\n\
    \n@jitclass(solow_data)\nclass Solow:\n    r\"\"\"\n    Implements the Solow growth\
    \ model with the update rule\n\n        k_{t+1} = [(s z k^a_t) + (1 - δ)k_t] /(1\
    \ + n)\n\n    \"\"\"\n    def __init__(self, n=0.05,  # population growth rate\n\
    \                       s=0.25,  # savings rate\n                       δ=0.1,\
    \   # depreciation rate\n                       a=0.3,   # share of labor\n  \
    \                     z=2.0,   # productivity\n                       k=1.0):\
    \  # current capital stock\n\n        self.n, self.s, self.δ, self.a, self.z =\
    \ n, s, δ, a, z\n        self.k = k\n\n    def h(self):\n        \"Evaluate the\
    \ h function\"\n        # Unpack parameters (get rid of self to simplify notation)\n\
    \        n, s, δ, a, z = self.n, self.s, self.δ, self.a, self.z\n        # Apply\
    \ the update rule\n        return (s * z * self.k**a + (1 - δ) * self.k) / (1\
    \ + n)\n\n    def update(self):\n        \"Update the current state (i.e., the\
    \ capital stock).\"\n        self.k = self.h()\n\n    def steady_state(self):\n\
    \        \"Compute the steady state value of capital.\"\n        # Unpack parameters\
    \ (get rid of self to simplify notation)\n        n, s, δ, α, z = self.n, self.s,\
    \ self.δ, self.α, self.z\n        # Compute and return steady state\n        return\
    \ ((s * z) / (n + δ))**(1 / (1 - α))\n\n    def generate_sequence(self, t):\n\
    \        \"Generate and return a time series of length t\"\n        path = []\n\
    \        for i in range(t):\n            path.append(self.k)\n            self.update()\n\
    \        return path\n```\n\n首先，我们在 `solow_data` 中指定了类的实例数据的类型。之后，要对类进行 JIT 编译，只需在类定义前添加\
    \ `@jitclass(solow_data)` 即可。当我们调用类中的方法时，这些方法就像函数一样被编译。\n\n```python\ns1 = Solow()\n\
