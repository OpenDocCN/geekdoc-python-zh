    \ of a `cell magic`.\n\n### 2.6.1 Editing and Execution\n\nIf you come across\
    \ code saved in a `*.py` file, you'll need to consider the following questions:\n\
    \n1.  How should you execute it?\n2.  How should you modify or edit it?\n\n####\
    \ Option 1: JupyterLab\n\n`JupyterLab` is an integrated development environment\
