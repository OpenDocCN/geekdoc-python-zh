  md: "# 18.4 Revisiting the Example\n\nHere's some code that reproduces the plot\
    \ above with better coding style.\n\n```\nfrom itertools import product\n\ndef\
    \ plot_path(ax, as, s_vals, δs, time_series_length=50):\n    \"\"\"\n    Add a\
    \ time series plot to the axes ax for all given parameters.\n    \"\"\"\n    k\
    \ = np.empty(time_series_length)\n\n    for (a, s, δ) in product(as, s_vals, δs):\n\
    \        k[0] = 1\n        for t in range(time_series_length-1):\n           \
    \ k[t+1] = s * k[t]**a + (1 - δ) * k[t]\n        ax.plot(k, 'o-', label=rf\"$\\\
    alpha = {a},\\; s = {s},\\; \\delta = {δ}$\")\n\n    ax.set_xlabel('time')\n \
    \   ax.set_ylabel('capital')\n    ax.set_ylim(0, 18)\n    ax.legend(loc='upper\
    \ left', frameon=True)\n\nfig, axes = plt.subplots(3, 1, figsize=(8, 16))\n\n\
    # Parameters (as, s_vals, δs)\nset_one = ([0.25, 0.33, 0.45], [0.4], [0.1])\n\
    set_two = ([0.33], [0.3, 0.4, 0.5], [0.1])\nset_three = ([0.33], [0.4], [0.05,\
    \ 0.1, 0.15])\n\nfor (ax, params) in zip(axes, (set_one, set_two, set_three)):\n\
    \    as, s_vals, δs = params\n    plot_path(ax, as, s_vals, δs)\n\nplt.show()\n\
    ```"
