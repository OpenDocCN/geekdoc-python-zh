    # 12.1 Overview\n\nSciPy builds on top of NumPy to provide common tools for scientific\
    \ programming such as\n\n+   * linear algebra\n* numerical integration\n* interpolation\n\
    * optimization\n* distributions and random number generation\n* signal processing\n\
    * etc., etc\n\nLike NumPy, SciPy is stable, mature and widely used.\nMany SciPy\
    \ routines are thin wrappers around industry-standard Fortran libraries such as\
    \ LAPACK, BLAS, etc.\nIt’s not really necessary to “learn” SciPy as a whole.\n\
    A more common approach is to get some idea of what’s in the library and then look\
    \ up documentation as required.\nIn this lecture, we aim only to highlight some\
    \ useful parts of the package."
- md: "## 12.2 SciPy versus NumPy\n\nSciPy is a package that contains various tools\
    \ that are built on top of NumPy, using its array data type and related functionality.\n\
    \nIn fact, when we import SciPy we also get NumPy, as can be seen from this excerpt\
    \ the SciPy initialization file:\n\n```python\n# Import numpy symbols to scipy\
    \ namespace\nfrom numpy import *\nfrom numpy.random import rand, randn\nfrom numpy.fft\
    \ import fft, ifft\nfrom numpy.lib.scimath import *\n```\n\nHowever, it's more\
    \ common and better practice to use NumPy functionality explicitly.\n\n```python\n\
    import numpy as np\n\na = np.identity(3)\n```\n\nWhat is useful in SciPy is the\
    \ functionality in its sub-packages\n\n- scipy.optimize, scipy.integrate, scipy.stats,\
    \ etc.\n\nLet's explore some of the major sub-packages.\n\n## 12.3 Statistics\n\
    \nThe `scipy.stats` subpackage supplies\n\n- numerous random variable objects\
    \ (densities, cumulative distributions, random sampling, etc.)\n- some estimation\
    \ procedures\n- some statistical tests\n\n### 12.3.1 Random Variables and Distributions\n\
    \nRecall that `numpy.random` provides functions for generating random variables\n\
    \n```python\nnp.random.beta(5, 5, size=3)\n```\n\n```\narray([0.28365394, 0.30195851,\
    \ 0.83421157])\n```\n\nThis generates a draw from the distribution with the density\
    \ function below when a, b = 5, 5\n\n$$f(x; a, b) = \\frac{x^{(a-1)}(1-x)^{(b-1)}}{\\\
    int_0^1 u^{(a-1)}(1-u)^{(b-1)}du} \\quad (0 \\le x \\le 1) \\quad (12.1)$$\n\n\
    Sometimes we need access to the density itself, or the cdf, the quantiles, etc.\n\
    \nFor this, we can use `scipy.stats`, which provides all of this functionality\
    \ as well as random number generation in a single consistent interface.\n\nHere's\
    \ an example of usage\n\n```python\n%matplotlib inline\nfrom scipy.stats import\
    \ beta\nimport matplotlib.pyplot as plt\nplt.rcParams['figure.figsize'] = (10,6)\n\
    \nq = beta(5, 5)      # Beta(a, b), with a = b = 5\nobs = q.rvs(2000)   # 2000\
    \ observations\ngrid = np.linspace(0.01, 0.99, 100)\n\nfig, ax = plt.subplots()\n\
    ax.hist(obs, bins=40, density=True)\nax.plot(grid, q.pdf(grid), 'k-', linewidth=2)\n\
    plt.show()\n```\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_216_0.png)\n\nThe\
    \ object q that represents the distribution has additional useful methods, including\n\
    \n```python\nq.cdf(0.4)    # Cumulative distribution function\n```\n\n```\n0.26656768000000003\n\
    ```\n\n```python\nq.ppf(0.8)    # Quantile (inverse cdf) function\n```\n\n```\n\
    0.6339134834642708\n```\n\n```python\nq.mean()\n```\n\n```\n0.5\n```\n\n## Python\
    \ Programming for Economics and Finance\n\nThe general syntax for creating these\
    \ objects that represent distributions (of type `rv_frozen`) is\n\n```python\n\
    name = scipy.stats.distribution_name(shape_parameters, loc=c, scale=d)\n```\n\n\
    Here `distribution_name` is one of the distribution names in `scipy.stats`.\n\
    The `loc` and `scale` parameters transform the original random variable $X$ into\
    \ $Y = c + dX$.\n\n### 12.3.2 Alternative Syntax\n\nThere is an alternative way\
    \ of calling the methods described above.\nFor example, the code that generates\
    \ the figure above can be replaced by\n\n```python\nobs = beta.rvs(5, 5, size=2000)\n\
    grid = np.linspace(0.01, 0.99, 100)\n\nfig, ax = plt.subplots()\nax.hist(obs,\
    \ bins=40, density=True)\nax.plot(grid, beta.pdf(grid, 5, 5), 'k-', linewidth=2)\n\
    plt.show()\n```\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_217_0.png)\n\n###\
    \ 12.3.3 Other Goodies in scipy.stats\n\nThere are a variety of statistical functions\
    \ in `scipy.stats`.\nFor example, `scipy.stats.linregress` implements simple linear\
    \ regression\n\n```python\nfrom scipy.stats import linregress\n\nx = np.random.randn(200)\n\
    y = 2 * x + 0.1 * np.random.randn(200)\ngradient, intercept, r_value, p_value,\
    \ std_err = linregress(x, y)\ngradient, intercept\n```\n\n```\n(1.995172323965754,\
    \ 0.011553895772083343)\n```\n\nTo see the full list, consult the documentation.\n\
    \n## 12.4 Roots and Fixed Points\n\nA **root** or **zero** of a real function\
    \ $f$ on $[a, b]$ is an $x \\in [a, b]$ such that $f(x) = 0$.\nFor example, if\
    \ we plot the function\n\n$f(x) = \\sin(4(x - 1/4)) + x + x^{20} - 1$\n\nwith\
    \ $x \\in [0, 1]$ we get\n\n```python\nf = lambda x: np.sin(4 * (x - 1/4)) + x\
    \ + x**20 - 1\nx = np.linspace(0, 1, 100)\n\nfig, ax = plt.subplots()\nax.plot(x,\
    \ f(x), label='$f(x)$')\nax.axhline(ls='--', c='k')\nax.set_xlabel('$x$', fontsize=12)\n\
    ax.set_ylabel('$f(x)$', fontsize=12)\nax.legend(fontsize=12)\nplt.show()\n```\n\
    \n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_219_0.png)\n\nThe unique root is approximately\
    \ 0.408.\nLet's consider some numerical techniques for finding roots.\n\n### 12.4.1\
    \ Bisection\n\nOne of the most common algorithms for numerical root-finding is\
    \ *bisection*.\nTo understand the idea, recall the well-known game where\n\n-\
    \ Player A thinks of a secret number between 1 and 100\n- Player B asks if it's\
    \ less than 50\n  - If yes, B asks if it's less than 25\n  - If no, B asks if\
    \ it's less than 75\n\nAnd so on.\nThis is bisection.\nHere's a simplistic implementation\
    \ of the algorithm in Python.\nIt works for all sufficiently well behaved increasing\
    \ continuous functions with $f(a) < 0 < f(b)$\n\n```python\ndef bisect(f, a, b,\
    \ tol=10e-5):\n    \"\"\"\n    Implements the bisection root finding algorithm,\
    \ assuming that f is a\n    real-valued function on [a, b] satisfying f(a) < 0\
    \ < f(b).\n    \"\"\"\n    lower, upper = a, b\n\n    while upper - lower > tol:\n\
    \        middle = 0.5 * (upper + lower)\n        if f(middle) > 0:   # root is\
    \ between lower and middle\n            lower, upper = lower, middle\n       \
    \ else:               # root is between middle and upper\n            lower, upper\
    \ = middle, upper\n\n    return 0.5 * (upper + lower)\n```\n\nLet's test it using\
    \ the function $f$ defined in (12.2)\n\n```python\nbisect(f, 0, 1)\n```\n\n```\n\
    0.408294677734375\n```\n\nNot surprisingly, SciPy provides its own bisection function.\n\
    Let's test it using the same function $f$ defined in (12.2)\n\n```python\nfrom\
    \ scipy.optimize import bisect\n\nbisect(f, 0, 1)\n```\n\n```\n0.4082935042806639\n\
    ```\n\n### 12.4.2 The Newton-Raphson Method\n\nAnother very common root-finding\
    \ algorithm is the Newton-Raphson method.\nIn SciPy this algorithm is implemented\
    \ by `scipy.optimize.newton`.\nUnlike bisection, the Newton-Raphson method uses\
    \ local slope information in an attempt to increase the speed of convergence.\n\
    Let's investigate this using the same function $f$ defined above.\nWith a suitable\
    \ initial condition for the search we get convergence:\n\n```python\nfrom scipy.optimize\
    \ import newton\n\nnewton(f, 0.2)   # Start the search at initial condition x\
    \ = 0.2\n```\n\n```\n0.40829350427935673\n```\n\nBut other initial conditions\
    \ lead to failure of convergence:\n\n```python\nnewton(f, 0.7)   # Start the search\
    \ at x = 0.7 instead\n```\n\n```\n0.7001700000000279\n```\n\n### 12.4.3 Hybrid\
    \ Methods\n\nA general principle of numerical methods is as follows:\n\n- If you\
    \ have specific knowledge about a given problem, you might be able to exploit\
    \ it to generate efficiency.\n- If not, then the choice of algorithm involves\
    \ a trade-off between speed and robustness.\n\nIn practice, most default algorithms\
    \ for root-finding, optimization and fixed points use *hybrid* methods.\n\nThese\
    \ methods typically combine a fast method with a robust method in the following\
    \ manner:\n\n1. Attempt to use a fast method\n2. Check diagnostics\n3. If diagnostics\
    \ are bad, then switch to a more robust algorithm\n\nIn `scipy.optimize`, the\
    \ function `brentq` is such a hybrid method and a good default\n\n```python\n\
    from scipy.optimize import brentq\n\nbrentq(f, 0, 1)\n```\n\n```\n0.40829350427936706\n\
    ```\n\nHere the correct solution is found and the speed is better than bisection:\n\
    \n```python\n%timeit brentq(f, 0, 1)\n```\n\n```\n20.1 µs ± 170 ns per loop (mean\
    \ ± std. dev. of 7 runs, 10,000 loops each)\n```\n\n```python\n%timeit bisect(f,\
    \ 0, 1)\n```\n\n```\n80.6 µs ± 322 ns per loop (mean ± std. dev. of 7 runs, 10,000\
    \ loops each)\n```\n\n### 12.4.4 Multivariate Root-Finding\n\nUse `scipy.optimize.fsolve`,\
    \ a wrapper for a hybrid method in MINPACK.\n\nSee the documentation for details.\n\
    \n### 12.4.5 Fixed Points\n\nA **fixed point** of a real function $f$ on $[a,\
    \ b]$ is an $x \\in [a, b]$ such that $f(x) = x$.\n\nSciPy has a function for\
    \ finding (scalar) fixed points too\n\n```python\nfrom scipy.optimize import fixed_point\n\
    \nfixed_point(lambda x: x**2, 10.0)  # 10.0 is an initial guess\n```\n\n```\n\
    array(1.)\n```"
