    \n## 20.3 处理错误\n\n有时在编写代码时，可以预见错误和异常。\n例如，样本$y_1, \\dots, y_n$的无偏样本方差定义为\n\n$$s^2\
    \ := \\frac{1}{n-1} \\sum_{i=1}^n (y_i - \\bar{y})^2 \\quad \\bar{y} = \\text{样本均值}$$\n\
    \n这可以使用NumPy中的`np.var`来计算。\n但如果你正在编写一个处理此类计算的函数，你可能会预见到当样本大小为1时会出现除零错误。\n一种可能的做法是什么都不做——程序会崩溃，并输出一条错误消息。\n\
    但有时值得以一种能预见并处理你认为可能出现的运行时错误的方式来编写代码。\n为什么？\n\n- 因为解释器提供的调试信息通常不如编写良好的错误消息有用。\n\
    - 因为导致执行停止的错误会中断工作流程。\n- 因为它会降低用户对你代码的信心（如果你是为他人编写代码）。\n\n在本节中，我们将讨论Python中不同类型的错误以及处理程序中潜在错误的技术。\n\
    \n### 20.3.1 Python中的错误\n\n我们在*之前的例子*中已经见过`AttributeError`和`NameError`。\n在Python中，有两种类型的错误——语法错误和异常。\n\
    这是一个常见错误类型的例子\n\n```python\ndef f:\n```\n\n```\nCell In[6], line 1\n    def f:\n\
    \       ^\nSyntaxError: expected '('\n```\n\n由于非法语法无法执行，语法错误会终止程序的执行。\n这是另一种与语法无关的错误\n\
    \n```python\n1 / 0\n```\n\n```\n---------------------------------------------------------------------------\n\
    ZeroDivisionError                         Traceback (most recent call last)\n\
    Cell In[7], line 1\n----> 1 1 / 0\n\nZeroDivisionError: division by zero\n```\n\
    \n这是另一个\n\n```python\nx1 = y1\n```\n\n```\n---------------------------------------------------------------------------\n\
    NameError                                 Traceback (most recent call last)\n\
    Cell In[8], line 1\n----> 1 x1 = y1\n\nNameError: name 'y1' is not defined\n```\n\
    \n还有一个\n\n```python\n'foo' + 6\n```\n\n```\n---------------------------------------------------------------------------\n\
    TypeError                                 Traceback (most recent call last)\n\
    Cell In[9], line 1\n----> 1 'foo' + 6\n\nTypeError: can only concatenate str (not\
    \ \"int\") to str\n```\n\n以及另一个\n\n```python\nX = []\nx = X[0]\n```\n\n```\n---------------------------------------------------------------------------\n\
    IndexError                                Traceback (most recent call last)\n\
    Cell In[10], line 2\n      1 X = []\n----> 2 x = X[0]\n\nIndexError: list index\
    \ out of range\n```\n\n每次，解释器都会告知我们错误类型\n\n- NameError、TypeError、IndexError、ZeroDivisionError等。\n\
    \n在Python中，这些错误被称为*异常*。\n\n### 20.3.2 断言\n\n有时可以通过检查程序是否按预期运行来避免错误。\n处理检查的一种相对简单的方法是使用`assert`关键字。\n\
    例如，暂时假设`np.var`函数不存在，我们需要自己编写一个\n\n```python\ndef var(y):\n    n = len(y)\n  \
    \  assert n > 1, 'Sample size must be greater than one.'\n    return np.sum((y\
    \ - y.mean())**2) / float(n-1)\n```\n\n如果我们用一个长度为1的数组运行这个函数，程序将终止并打印我们的错误消息\n\n\
    ```python\nvar([1])\n```\n\n```\n---------------------------------------------------------------------------\n\
    AssertionError                            Traceback (most recent call last)\n\
    Cell In[12], line 1\n----> 1 var([1])\n\nCell In[11], line 3, in var(y)\n    \
    \  1 def var(y):\n      2     n = len(y)\n----> 3     assert n > 1, 'Sample size\
    \ must be greater than one.'\n      4     return np.sum((y - y.mean())**2) / float(n-1)\n\
    \nAssertionError: Sample size must be greater than one.\n```\n\n优点在于我们可以\n\n-\
    \ 尽早失败，一旦知道会有问题就立即失败\n- 提供关于程序为何失败的具体信息"
