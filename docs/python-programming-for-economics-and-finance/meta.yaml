    \ ends up modifying `c1.wealth`.\n\n# 7.3.2 Example: The Solow Growth Model\n\n\
    For our next example, let's write a simple class to implement the Solow growth\
    \ model.\n\nThe Solow growth model is a neoclassical growth model in which the\
    \ per capita capital stock $k_t$ evolves according to the rule\n\n$$k_{t+1} =\
    \ \\frac{szk_t^\\alpha + (1-\\delta)k_t}{1+n}$$\n\nHere\n\n+   - $s$ is an exogenously\
    \ given saving rate\n- $z$ is a productivity parameter\n- $\\alpha$ is capital's\
    \ share of income\n- $n$ is the population growth rate\n- $\\delta$ is the depreciation\
    \ rate\n\nA **steady state** of the model is a $k$ that solves (7.1) when $k_{t+1}\
    \ = k_t = k$.\n\nHere's a class that implements this model.\n\nSome points of\
    \ interest in the code are\n\n+   - An instance maintains a record of its current\
    \ capital stock in the variable `self.k`.\n- The `h` method implements the right-hand\
    \ side of (7.1).\n- The `update` method uses `h` to update capital as per (7.1).\n\
    \  - Notice how inside `update` the reference to the local method `h` is `self.h`.\n\
    \nThe methods `steady_state` and `generate_sequence` are fairly self-explanatory\n\
    \n```\nclass Solow:\n    r\"\"\"\n    Implements the Solow growth model with the\
    \ update rule\n```"
