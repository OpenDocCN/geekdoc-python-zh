    \n- Contents\n    - Matplotlib\n        - Overview\n        - The APIs\n     \
    \   - More Features\n        - Further Reading\n        - Exercises\n\n## 11.1\
    \ Overview\n\nWe've already generated quite a few figures in these lectures using\
    \ Matplotlib.\nMatplotlib is an outstanding graphics library, designed for scientific\
    \ computing, with\n\n- high-quality 2D and 3D plots\n- output in all the usual\
    \ formats (PDF, PNG, etc.)\n- LaTeX integration\n- fine-grained control over all\
    \ aspects of presentation\n- animation, etc.\n\n### 11.1.1 Matplotlib's Split\
    \ Personality\n\nMatplotlib is unusual in that it offers two different interfaces\
    \ to plotting.\nOne is a simple MATLAB-style API (Application Programming Interface)\
    \ that was written to help MATLAB refugees find a ready home.\nThe other is a\
    \ more \"Pythonic\" object-oriented API.\nFor reasons described below, we recommend\
    \ that you use the second API.\nBut first, let's discuss the difference.\n\n##\
    \ 11.2 The APIs\n\n### 11.2.1 The MATLAB-style API\n\nHere's the kind of easy\
    \ example you might find in introductory treatments\n\n```python\n%matplotlib\
    \ inline\nimport matplotlib.pyplot as plt\nplt.rcParams[\"figure.figsize\"] =\
    \ (10, 6) #set default figure size\nimport numpy as np\n\nx = np.linspace(0, 10,\
    \ 200)\ny = np.sin(x)\n\nplt.plot(x, y, 'b-', linewidth=2)\nplt.show()\n```\n\n\
    This is simple and convenient, but also somewhat limited and un-Pythonic.\n\n\
    For example, in the function calls, a lot of objects get created and passed around\
    \ without making themselves known to the programmer.\n\nPython programmers tend\
    \ to prefer a more explicit style of programming (run `import this` in a code\
    \ block and look at the second line).\n\nThis leads us to the alternative, object-oriented\
    \ Matplotlib API.\n\n### 11.2.2 The Object-Oriented API\n\nHere's the code corresponding\
    \ to the preceding figure using the object-oriented API\n\n```python\nfig, ax\
    \ = plt.subplots()\nax.plot(x, y, 'b-', linewidth=2)\nplt.show()\n```\n\nHere\
    \ the call `fig, ax = plt.subplots()` returns a pair, where\n\n- `fig` is a `Figure`\
    \ instance—like a blank canvas.\n- `ax` is an `AxesSubplot` instance—think of\
    \ a frame for plotting in.\n\nThe `plot()` function is actually a method of `ax`.\n\
    \nWhile there's a bit more typing, the more explicit use of objects gives us better\
    \ control.\n\nThis will become more clear as we go along.\n\n### 11.2.3 Tweaks\n\
    \nHere we've changed the line to red and added a legend\n\n```python\nfig, ax\
    \ = plt.subplots()\nax.plot(x, y, 'r-', linewidth=2, label='sine function', alpha=0.6)\n\
    ax.legend()\nplt.show()\n```\n\nWe've also used `alpha` to make the line slightly\
    \ transparent—which makes it look smoother.\n\nThe location of the legend can\
    \ be changed by replacing `ax.legend()` with `ax.legend(loc='upper center')`.\n\
    \n```python\nfig, ax = plt.subplots()\nax.plot(x, y, 'r-', linewidth=2, label='sine\
    \ function', alpha=0.6)\nax.legend(loc='upper center')\nplt.show()\n```\n\nIf\
    \ everything is properly configured, then adding LaTeX is trivial\n\n```python\n\
    fig, ax = plt.subplots()\nax.plot(x, y, 'r-', linewidth=2, label='$y=\\sin(x)$',\
    \ alpha=0.6)\nax.legend(loc='upper center')\nplt.show()\n```\n\nControlling the\
    \ ticks, adding titles and so on is also straightforward\n\n```python\nfig, ax\
    \ = plt.subplots()\nax.plot(x, y, 'r-', linewidth=2, label='$y=\\sin(x)$', alpha=0.6)\n\
    ax.legend(loc='upper center')\nax.set_yticks([-1, 0, 1])\nax.set_title('Test plot')\n\
    plt.show()\n```\n\n## 11.3 More Features\n\nMatplotlib has a huge array of functions\
    \ and features, which you can discover over time as you have need for them. We\
    \ mention just a few.\n\n### 11.3.1 Multiple Plots on One Axis\n\nIt's straightforward\
    \ to generate multiple plots on the same axes.\nHere's an example that randomly\
    \ generates three normal densities and adds a label with their mean\n\n```python\n\
    from scipy.stats import norm\nfrom random import uniform\n\nfig, ax = plt.subplots()\n\
    x = np.linspace(-4, 4, 150)\nfor i in range(3):\n    m, s = uniform(-1, 1), uniform(1,\
    \ 2)\n    y = norm.pdf(x, loc=m, scale=s)\n    current_label = f'$\\mu = {m:.2}$'\n\
    \    ax.plot(x, y, linewidth=2, alpha=0.6, label=current_label)\nax.legend()\n\
    plt.show()\n```\n\n### 11.3.2 Multiple Subplots\n\nSometimes we want multiple\
    \ subplots in one figure.\n\nHere's an example that generates 6 histograms\n\n\
    ```python\nnum_rows, num_cols = 3, 2\nfig, axes = plt.subplots(num_rows, num_cols,\
    \ figsize=(10, 12))\nfor i in range(num_rows):\n    for j in range(num_cols):\n\
    \        m, s = uniform(-1, 1), uniform(1, 2)\n        x = norm.rvs(loc=m, scale=s,\
    \ size=100)\n        axes[i, j].hist(x, alpha=0.6, bins=20)\n        t = f'$\\\
    mu = {m:.2}, \\quad \\sigma = {s:.2}$'\n        axes[i, j].set(title=t, xticks=[-4,\
    \ 0, 4], yticks=[])\nplt.show()\n```\n\n### 11.3.3 3D Plots\n\nMatplotlib does\
    \ a nice job of 3D plots — here is one example\n\n```python\nfrom mpl_toolkits.mplot3d.axes3d\
    \ import Axes3D\nfrom matplotlib import cm\n\ndef f(x, y):\n    return np.cos(x**2\
    \ + y**2) / (1 + x**2 + y**2)\n\nxgrid = np.linspace(-3, 3, 50)\nygrid = xgrid\n\
    x, y = np.meshgrid(xgrid, ygrid)\n\nfig = plt.figure(figsize=(10, 6))\nax = fig.add_subplot(111,\
    \ projection='3d')\nax.plot_surface(x,\n                y,\n                f(x,\
    \ y),\n                rstride=2, cstride=2,\n                cmap=cm.jet,\n \
    \               alpha=0.7,\n                linewidth=0.25)\nax.set_zlim(-0.5,\
    \ 1.0)\nplt.show()\n```"
