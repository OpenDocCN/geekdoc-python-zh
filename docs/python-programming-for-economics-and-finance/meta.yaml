- md: "## Part III\n\n## High Performance Computing\n\n## CHAPTER FIFTEEN\n\n## NUMBA\n\
    \n- Contents\n  - Numba\n    - Overview\n    - Compiling Functions\n    - Decorator\
    \ Notation\n    - Type Inference\n    - Compiling Classes\n    - Alternatives\
    \ to Numba\n    - Summary and Comments\n    - Exercises\n\nIn addition to what's\
    \ in Anaconda, this lecture will need the following libraries:\n\n```\n!pip install\
    \ quant-econ\n```\n\nPlease also make sure that you have the latest version of\
    \ Anaconda, since old versions are a *common source of errors*.\n\nLet's start\
    \ with some imports:\n\n```\n%matplotlib inline\nimport numpy as np\nimport quant-econ\
    \ as qe\nimport matplotlib.pyplot as plt\nplt.rcParams['figure.figsize'] = (10,\
    \ 6)\n```\n\n## 15.1 Overview\n\nIn an *earlier lecture* we learned about vectorization,\
    \ which is one method to improve speed and efficiency in numerical work.\n\nVectorization\
    \ involves sending array processing operations in batch to efficient low-level\
    \ code.\n\nHowever, as *discussed previously*, vectorization has several weaknesses.\n\
    \nOne is that it is highly memory-intensive when working with large amounts of\
    \ data.\n\nAnother is that the set of algorithms that can be entirely vectorized\
    \ is not universal.\n\nIn fact, for some algorithms, vectorization is ineffective.\n\
    \nFortunately, a new Python library called Numba solves many of these problems.\n\
    \nIt does so through something called **just in time (JIT) compilation**.\n\n\
    The key idea is to compile functions to native machine code instructions on the\
    \ fly.\n\nWhen it succeeds, the compiled code is extremely fast.\n\nNumba is specifically\
    \ designed for numerical work and can also do other tricks such as multithreading.\n\
    \nNumba will be a key part of our lectures — especially those lectures involving\
    \ dynamic programming.\n\nThis lecture introduces the main ideas.\n\n## 15.2 Compiling\
    \ Functions\n\nAs stated above, Numba's primary use is compiling functions to\
    \ fast native machine code during runtime.\n\n### 15.2.1 An Example\n\nLet's consider\
    \ a problem that is difficult to vectorize: generating the trajectory of a difference\
    \ equation given an initial condition.\n\nWe will take the difference equation\
    \ to be the quadratic map\n\n$$x_{t+1} = \\alpha x_t (1 - x_t)$$\n\nIn what follows\
    \ we set\n\n```\nα = 4.0\n```\n\nHere's the plot of a typical trajectory, starting\
    \ from $x_0 = 0.1$, with $t$ on the x-axis\n\n```\ndef qm(x0, n):\n    x = np.empty(n+1)\n\
    \    x[0] = x0\n    for t in range(n):\n        x[t+1] = α * x[t] * (1 - x[t])\n\
    \    return x\n\nx = qm(0.1, 250)\nfig, ax = plt.subplots()\n```\n\n```\nax.plot(x,\
    \ 'b-', lw=2, alpha=0.8)\nax.set_xlabel('$t$', fontsize=12)\nax.set_ylabel('$x_{t}$',\
    \ fontsize = 12)\nplt.show()\n```\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_280_0.png)\n\
    \nTo speed the function qm up using Numba, our first step is\n\n```\nfrom numba\
    \ import njit\n\nqm_numba = njit(qm)\n```\n\nThe function qm_numba is a version\
    \ of qm that is \"targeted\" for JIT-compilation.\nWe will explain what this means\
    \ momentarily.\nLet's time and compare identical function calls across these two\
    \ versions, starting with the original function qm:\n\n```\nn = 10_000_000\n\n\
    qe.tic()\nqm(0.1, int(n))\ntime1 = qe.toc()\n\nTOC: Elapsed: 0:00:3.29\n```\n\n\
    Now let's try qm_numba\n\n```\nqe.tic()\nqm_numba(0.1, int(n))\n```\n\n```\ntime2\
    \ = qe.toc()\n```\n\n```\nTOC: Elapsed: 0:00:0.20\n```\n\nThis is already a massive\
    \ speed gain.\n\nIn fact, the next time and all subsequent times it runs even\
    \ faster as the function has been compiled and is in memory:\n\n```\nqe.tic()\n\
    qm_numba(0.1, int(n))\ntime3 = qe.toc()\n```\n\n```\nTOC: Elapsed: 0:00:0.02\n\
    ```\n\n```\ntime1 / time3  # Calculate speed gain\n```\n\n```\n128.11253329868106\n\
    ```\n\nThis kind of speed gain is huge relative to how simple and clear the implementation\
    \ is.\n\n### 15.2.2 How and When it Works\n\nNumba attempts to generate fast machine\
    \ code using the infrastructure provided by the LLVM Project.\n\nIt does this\
    \ by inferring type information on the fly.\n\n(See our *earlier lecture* on scientific\
    \ computing for a discussion of types.)\n\nThe basic idea is this:\n\n- Python\
    \ is very flexible and hence we could call the function qm with many types.\n\
    \  - e.g., x0 could be a NumPy array or a list, n could be an integer or a float,\
    \ etc.\n- This makes it hard to *pre-compile* the function.\n- However, when we\
    \ do actually call the function, say by executing qm(0.5, 10), the types of x0\
    \ and n become clear.\n- Moreover, the types of other variables in qm can be inferred\
    \ once the input is known.\n- So the strategy of Numba and other JIT compilers\
    \ is to wait until this moment, and *then* compile the function.\n\nThat's why\
    \ it is called \"just-in-time\" compilation.\n\nNote that, if you make the call\
    \ qm(0.5, 10) and then follow it with qm(0.9, 20), compilation only takes place\
    \ on the first call.\n\nThe compiled code is then cached and recycled as required.\n\
    \n## 15.3 Decorator Notation\n\nIn the code above we created a JIT compiled version\
    \ of `qm` via the call\n\n```\nqm_numba = njit(qm)\n```\n\nIn practice this would\
    \ typically be done using an alternative *decorator* syntax.\n(We will explain\
    \ all about decorators in a *later lecture* but you can skip the details at this\
    \ stage.)\nLet's see how this is done.\nTo target a function for JIT compilation\
    \ we can put `@njit` before the function definition.\nHere's what this looks like\
    \ for `qm`\n\n```\n@njit\ndef qm(x0, n):\n    x = np.empty(n+1)\n    x[0] = x0\n\
    \    for t in range(n):\n        x[t+1] = a * x[t] * (1 - x[t])\n    return x\n\
    ```\n\nThis is equivalent to `qm = njit(qm)`.\nThe following now uses the jitted\
    \ version:\n\n```\n%%time\n\nqm(0.1, 100_000)\n```\n\n```\nCPU times: user 65.9\
    \ ms, sys: 4.11 ms, total: 70 ms\nWall time: 69.7 ms\n\narray([0.1       , 0.36\
    \      , 0.9216    , ..., 0.98112405, 0.07407858,\n       0.27436377])\n```\n\n\
    Numba provides several arguments for decorators to accelerate computation and\
    \ cache functions [here](https://numba.pydata.org/numba-doc/latest/reference/jit.html).\n\
    In the *following lecture on parallelization*, we will discuss how to use the\
    \ `parallel` argument to achieve automatic parallelization.\n\n## 15.4 Type Inference\n\
    \nClearly type inference is a key part of JIT compilation.\nAs you can imagine,\
    \ inferring types is easier for simple Python objects (e.g., simple scalar data\
    \ types such as floats and integers).\nNumba also plays well with NumPy arrays.\n\
    In an ideal setting, Numba can infer all necessary type information.\nThis allows\
    \ it to generate native machine code, without having to call the Python runtime\
    \ environment.\nIn such a setting, Numba will be on par with machine code from\
    \ low-level languages.\n\nWhen Numba cannot infer all type information, it will\
    \ raise an error.\nFor example, in the case below, Numba is unable to determine\
    \ the type of function `mean` when compiling the function `bootstrap`\n\n```\n\
    @njit\ndef bootstrap(data, statistics, n):\n    bootstrap_stat = np.empty(n)\n\
    \    n = len(data)\n    for i in range(n_resamples):\n        resample = np.random.choice(data,\
    \ size=n, replace=True)\n        bootstrap_stat[i] = statistics(resample)\n  \
    \  return bootstrap_stat\n\ndef mean(data):\n    return np.mean(data)\n\ndata\
    \ = np.array([2.3, 3.1, 4.3, 5.9, 2.1, 3.8, 2.2])\nn_resamples = 10\n\nprint('Type\
    \ of function:', type(mean))\n\n#Error\ntry:\n    bootstrap(data, mean, n_resamples)\n\
    except Exception as e:\n    print(e)\n```\n\n```\nType of function: <class 'function'>\n\
    \nFailed in nopython mode pipeline (step: nopython frontend)\nnon-precise type\
    \ pyobject\nDuring: typing of argument at /tmp/ipykernel_2182/2092422549.py (1)\n\
    \nFile \"../../../../../../tmp/ipykernel_2182/2092422549.py\", line 1:\n<source\
    \ missing, REPL/exec in use?>\n\nThis error may have been caused by the following\
    \ argument(s):\n- argument 1: Cannot determine Numba type of <class 'function'>\n\
    ```\n\nBut Numba recognizes JIT-compiled functions\n\n```\n@njit\ndef mean(data):\n\
    \    return np.mean(data)\n\nprint('Type of function:', type(mean))\n\n%time bootstrap(data,\
    \ mean, n_resamples)\n```\n\n```\nType of function: <class 'numba.core.registry.CPUDispatcher'>\n\
    \nCPU times: user 277 ms, sys: 55.9 ms, total: 333 ms\nWall time: 333 ms\n```"
  mdcn: "## 第三部分\n\n## 高性能计算\n\n## 第十五章\n\n## NUMBA\n\n- 目录\n  - Numba\n    - 概述\n\
    \    - 编译函数\n    - 装饰器语法\n    - 类型推断\n    - 编译类\n    - Numba的替代方案\n    - 总结与评论\n\
    \    - 练习\n\n除了Anaconda自带的内容，本讲还需要以下库：\n\n```\n!pip install quant-econ\n```\n\n\
    请确保你使用的是最新版本的Anaconda，因为旧版本是*常见错误来源*。\n\n让我们从一些导入开始：\n\n```\n%matplotlib inline\n\
    import numpy as np\nimport quant-econ as qe\nimport matplotlib.pyplot as plt\n\
    plt.rcParams['figure.figsize'] = (10, 6)\n```\n\n## 15.1 概述\n\n在*早期的讲座*中，我们学习了向量化，这是提高数值计算速度和效率的一种方法。\n\
    \n向量化涉及将数组处理操作批量发送到高效的低级代码。\n\n然而，正如*之前讨论的*，向量化有几个弱点。\n\n一个是在处理大量数据时，它非常消耗内存。\n\
    \n另一个是能够完全向量化的算法集合并不普遍。\n\n事实上，对于某些算法，向量化是无效的。\n\n幸运的是，一个名为Numba的新Python库解决了许多这些问题。\n\
    \n它通过一种叫做**即时编译（JIT）**的技术来实现这一点。\n\n关键思想是将函数动态编译为本地机器码指令。\n\n当它成功时，编译后的代码速度极快。\n\
    \nNumba专为数值计算设计，还可以执行其他技巧，例如多线程。\n\nNumba将是我们讲座的关键部分——特别是那些涉及动态规划的讲座。\n\n本讲介绍主要思想。\n\
    \n## 15.2 编译函数\n\n如上所述，Numba的主要用途是在运行时将函数编译为快速的本地机器码。\n\n### 15.2.1 一个例子\n\n让我们考虑一个难以向量化的问题：给定初始条件，生成差分方程的轨迹。\n\
    \n我们将差分方程设为二次映射\n\n$$x_{t+1} = \\alpha x_t (1 - x_t)$$\n\n在下面的内容中，我们设置\n\n```\n\
    α = 4.0\n```\n\n这是一个典型轨迹的图，从$x_0 = 0.1$开始，x轴为$t$\n\n```\ndef qm(x0, n):\n    x\
    \ = np.empty(n+1)\n    x[0] = x0\n    for t in range(n):\n        x[t+1] = α *\
    \ x[t] * (1 - x[t])\n    return x\n\nx = qm(0.1, 250)\nfig, ax = plt.subplots()\n\
    ```\n\n```\nax.plot(x, 'b-', lw=2, alpha=0.8)\nax.set_xlabel('$t$', fontsize=12)\n\
    ax.set_ylabel('$x_{t}$', fontsize = 12)\nplt.show()\n```\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_280_0.png)\n\
    \n要使用Numba加速函数qm，我们的第一步是\n\n```\nfrom numba import njit\n\nqm_numba = njit(qm)\n\
    ```\n\n函数qm_numba是qm的一个版本，它被“定向”用于JIT编译。\n我们稍后会解释这意味着什么。\n让我们计时并比较这两个版本中相同函数的调用，从原始函数qm开始：\n\
    \n```\nn = 10_000_000\n\nqe.tic()\nqm(0.1, int(n))\ntime1 = qe.toc()\n\nTOC: Elapsed:\
    \ 0:00:3.29\n```\n\n现在让我们试试qm_numba\n\n```\nqe.tic()\nqm_numba(0.1, int(n))\n\
    ```\n\n```\ntime2 = qe.toc()\n```\n\n```\nTOC: Elapsed: 0:00:0.20\n```\n\n这已经是一个巨大的速度提升。\n\
    \n事实上，下一次和所有后续运行会更快，因为函数已被编译并保存在内存中：\n\n```\nqe.tic()\nqm_numba(0.1, int(n))\n\
    time3 = qe.toc()\n```\n\n```\nTOC: Elapsed: 0:00:0.02\n```\n\n```\ntime1 / time3\
    \  # 计算速度提升\n```\n\n```\n128.11253329868106\n```\n\n相对于实现的简单性和清晰性，这种速度提升是巨大的。\n\
    \n### 15.2.2 工作原理和时机\n\nNumba尝试使用LLVM项目提供的基础设施生成快速的机器码。\n\n它通过动态推断类型信息来实现这一点。\n\
    \n（关于我们*早期讲座*中关于科学计算的类型讨论，请参阅。）\n\n基本思想是：\n\n- Python非常灵活，因此我们可以用多种类型调用函数qm。\n\
    \  - 例如，x0可以是NumPy数组或列表，n可以是整数或浮点数等。\n- 这使得*预编译*函数变得困难。\n- 然而，当我们实际调用函数时，比如执行qm(0.5,\
    \ 10)，x0和n的类型就变得清晰了。\n- 此外，一旦输入已知，就可以推断出qm中其他变量的类型。\n- 因此，Numba和其他JIT编译器的策略是等待这一刻，*然后*编译函数。\n\
    \n这就是为什么它被称为“即时”编译。\n\n请注意，如果你调用qm(0.5, 10)，然后调用qm(0.9, 20)，编译只在第一次调用时发生。\n\n\
    编译后的代码随后被缓存并按需回收。\n\n## 15.3 装饰器语法\n\n在上面的代码中，我们通过调用创建了`qm`的JIT编译版本\n\n```\nqm_numba\
    \ = njit(qm)\n```\n\n在实践中，这通常使用替代的*装饰器*语法来完成。\n（我们将在*后面的讲座*中解释装饰器，但你现在可以跳过细节。）\n\
    让我们看看这是如何完成的。\n要将一个函数定向用于JIT编译，我们可以在函数定义前加上`@njit`。\n以下是`qm`的示例\n\n```\n@njit\n\
    def qm(x0, n):\n    x = np.empty(n+1)\n    x[0] = x0\n    for t in range(n):\n\
    \        x[t+1] = a * x[t] * (1 - x[t])\n    return x\n```\n\n这等同于`qm = njit(qm)`。\n\
    以下现在使用的是jitted版本：\n\n```\n%%time\n\nqm(0.1, 100_000)\n```\n\n```\nCPU times: user\
    \ 65.9 ms, sys: 4.11 ms, total: 70 ms\nWall time: 69.7 ms\n\narray([0.1      \
    \ , 0.36      , 0.9216    , ..., 0.98112405, 0.07407858,\n       0.27436377])\n\
    ```\n\nNumba为装饰器提供了多个参数，以加速计算和缓存函数[此处](https://numba.pydata.org/numba-doc/latest/reference/jit.html)。\n\
    在*关于并行化的后续讲座*中，我们将讨论如何使用`parallel`参数实现自动并行化。\n\n## 15.4 类型推断\n\n显然，类型推断是JIT编译的关键部分。\n\
    可以想象，对于简单的Python对象（例如，简单的标量数据类型，如浮点数和整数），推断类型更容易。\nNumba也能很好地与NumPy数组配合使用。\n在理想情况下，Numba可以推断所有必要的类型信息。\n\
    这使得它能够生成本地机器码，而无需调用Python运行时环境。\n在这种情况下，Numba将与来自低级语言的机器码相媲美。\n\n当Numba无法推断所有类型信息时，它会引发错误。\n\
    例如，在下面的情况下，Numba在编译函数`bootstrap`时无法确定函数`mean`的类型\n\n```\n@njit\ndef bootstrap(data,\
