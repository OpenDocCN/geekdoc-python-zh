    SciPy includes many of the standard routines used in


    +   - linear algebra

    - integration

    - interpolation

    - optimization

    - distributions and statistical techniques

    - signal processing


    See them all [here](https://docs.scipy.org/doc/scipy/reference/).


    # 1.3.2 Graphics


    The most popular and comprehensive Python library for creating figures and graphs
    is Matplotlib, with functionality including


    +   - plots, histograms, contour images, 3D graphs, bar charts etc.

    - output in many formats (PDF, PNG, EPS, etc.)

    - LaTeX integration


    Example 2D plot with embedded LaTeX annotations

    Example contour plot

    Example 3D plot

    More examples can be found in the Matplotlib thumbnail gallery.


    Other graphics libraries include


    +   - Plotly

    - seaborn — a high-level interface for matplotlib

    - Altair

    - Bokeh


    You can visit the Python Graph Gallery for more example plots drawn using a variety
    of libraries.


    # 1.3.3 Symbolic Algebra


    It''s useful to be able to manipulate symbolic expressions, as in Mathematica
    or Maple.

    The SymPy library provides this functionality from within the Python shell.


    ```

    from sympy import Symbol


    x, y = Symbol(''x''), Symbol(''y'')  # Treat ''x'' and ''y'' as algebraic symbols

    x + x + x + y

    ```'
