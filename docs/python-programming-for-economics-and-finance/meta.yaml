    True\nFalse\nTrue\nFalse\n```\n\n当然，如果我们使用 `sets` 数据类型，解决方案会更简单\n\n```python\n\
    def f(seq_a, seq_b):\n    return set(seq_a).issubset(set(seq_b))\n```\n\n**练习\
    \ 5.7.5**\n\n当我们介绍数值库时，我们会看到它们包含许多用于插值和函数近似的替代方案。\n\n尽管如此，让我们编写自己的函数近似程序作为练习。\n\
    \n具体来说，在不使用任何导入的情况下，编写一个函数 `linapprox`，它接受以下参数\n\n- 一个函数 `f`，将某个区间 $[a, b]$ 映射到\
    \ $\\mathbb{R}$。\n- 两个标量 `a` 和 `b`，提供该区间的界限。\n- 一个整数 `n`，确定网格点的数量。\n- 一个数字 `x`，满足\
    \ `a <= x <= b`。\n\n并返回 `f` 在 `x` 处的分段线性插值，基于 `n` 个均匀分布的网格点 `a = point[0] < point[1]\
    \ < ... < point[n-1] = b`。\n\n目标是清晰，而不是效率。\n\n**练习 5.7.5 的解答**\n\n这是一个解决方案：\n\n\
    ```python\ndef linapprox(f, a, b, n, x):\n    \"\"\"\n    Evaluates the piecewise\
