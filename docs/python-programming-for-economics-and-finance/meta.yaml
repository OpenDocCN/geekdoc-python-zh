    # 19.3.1 Unpacking Arguments


    When we operate on a list of parameters, we often need to extract the content
    of the list as individual arguments instead of a collection when passing them
    into functions.


    Luckily, the * operator can help us to unpack lists and tuples into positional
    arguments in function calls.


    To make things concrete, consider the following examples:


    Without *, the `print` function prints a list


    ```

    l1 = [''a'', ''b'', ''c'']


    print(l1)

    ```


    ```

    [''a'', ''b'', ''c'']

    ```


    While the `print` function prints individual elements since * unpacks the list
    into individual arguments


    ```

    print(*l1)

    ```


    ```

    a b c

    ```


    Unpacking the list using * into positional arguments is equivalent to defining
    them individually when calling the function


    ```

    print(''a'', ''b'', ''c'')

    ```


    ```

    a b c

    ```


    However, * operator is more convenient if we want to reuse them again


    ```

    l1.append(''d'')


    print(*l1)

    ```


    ```

    a b c d

    ```


    Similarly, ** is used to unpack arguments.


    The difference is that ** unpacks *dictionaries* into *keyword arguments*.


    ** is often used when there are many keyword arguments we want to reuse.


    For example, assuming we want to draw multiple graphs using the same graphical
    settings, it may involve repetitively setting many graphical parameters, usually
    defined using keyword arguments.


    In this case, we can use a dictionary to store these parameters and use ** to
    unpack dictionaries into keyword arguments when they are needed.


    Let''s walk through a simple example together and distinguish the use of * and
    **


    ```

    import numpy as np

    import matplotlib.pyplot as plt


    # Set up the frame and subplots

    ```'
