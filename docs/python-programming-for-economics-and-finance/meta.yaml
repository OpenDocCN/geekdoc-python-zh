    \    e_values.append(e)\n```\n\nPython executes the two indented lines `ts_length`\
    \ times before moving on.\nThese two lines are called a `code block`, since they\
    \ comprise the “block” of code that we are looping over.\nUnlike most other languages,\
    \ Python knows the extent of the code block *only from indentation*.\nIn our program,\
    \ indentation decreases after line `e_values.append(e)`, telling Python that this\
    \ line marks the lower limit of the code block.\nMore on indentation below—for\
    \ now, let's look at another example of a `for` loop\n\n```\nanimals = ['dog',\
    \ 'cat', 'bird']\nfor animal in animals:\n    print(\"The plural of \" + animal\
    \ + \" is \" + animal + \"s\")\n```\n\n```\nThe plural of dog is dogs\nThe plural\
