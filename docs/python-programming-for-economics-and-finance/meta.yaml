  md: 'If you don''t get good results, you can always switch back to the `brentq`
    root finder, since the fixed point of a function $f$ is the root of $g(x) := x
    - f(x)$.


    # 12.5 Optimization


    Most numerical packages provide only functions for *minimization*.

    Maximization can be performed by recalling that the maximizer of a function $f$
    on domain $D$ is the minimizer of $-f$ on $D$.

    Minimization is closely related to root-finding: For smooth functions, interior
    optima correspond to roots of the first derivative.

    The speed/robustness trade-off described above is present with numerical optimization
    too.

    Unless you have some prior information you can exploit, it''s usually best to
    use hybrid methods.

    For constrained, univariate (i.e., scalar) minimization, a good hybrid option
    is `fminbound`


    ```

    from scipy.optimize import fminbound


    fminbound(lambda x: x**2, -1, 2)  # Search in [-1, 2]

    ```


    0.0


    # 12.5.1 Multivariate Optimization


    Multivariate local optimizers include `minimize`, `fmin`, `fmin_powell`, `fmin_cg`,
    `fmin_bfgs`, and `fmin_ncg`.

    Constrained multivariate local optimizers include `fmin_l_bfgs_b`, `fmin_tnc`,
    `fmin_cobyla`.

    See the [documentation](https://docs.scipy.org/doc/scipy/reference/optimize.html)
    for details.


    # 12.6 Integration


    Most numerical integration methods work by computing the integral of an approximating
    polynomial.

    The resulting error depends on how well the polynomial fits the integrand, which
    in turn depends on how “regular” the integrand is.

    In SciPy, the relevant module for numerical integration is `scipy.integrate`.

    A good default for univariate integration is `quad`


    ```

    from scipy.integrate import quad


    integral, error = quad(lambda x: x**2, 0, 1)

    integral

    ```


    0.33333333333333337'
