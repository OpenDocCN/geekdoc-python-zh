- md: "This website presents a set of lectures on Python programming for economics\
    \ and finance.\nThis is the first text in the series, which focuses on programming\
    \ in Python.\nFor an overview of the series, see [this page](this page)\n\n##\
    \ Introduction to Python\n- About Python\n- Getting Started\n- An Introductory\
    \ Example\n- Functions\n- Python Essentials\n- OOP I: Objects and Names\n- OOP\
    \ II: Building Classes\n- Writing Longer Programs\n\n## The Scientific Libraries\n\
    - Python for Scientific Computing\n- NumPy\n- Matplotlib\n- SciPy\n- Pandas\n\
    - SymPy\n\n## High Performance Computing\n- Numba\n- Parallelization\n- JAX\n\n\
    ## Advanced Python Programming\n- Writing Good Code\n- More Language Features\n\
    - Debugging and Handling Errors\n\n## Other\n- Troubleshooting\n- Execution Statistics\n\
    \n# Python Programming for Economics and Finance\n\n# Part I\n\n# Introduction\
    \ to Python\n\n# CHAPTER ONE\n\n# ABOUT PYTHON\n\n## Contents\n- About Python\n\
    \  - Overview\n  - What's Python?\n  - Scientific Programming\n  - Learn More\n\
    \n> “Python has gotten sufficiently weapons grade that we don’t descend into R\
    \ anymore. Sorry, R people. I used to be one of you but we no longer descend into\
    \ R.” – Chris Wiggins\n\n# 1.1 Overview\n\nIn this lecture we will\n- outline\
    \ what Python is\n- compare it to some other languages\n- showcase some of its\
    \ abilities.\n\nAt this stage, it’s **not** our intention that you try to replicate\
    \ all you see.\nWe will work through what follows at a slow pace later in the\
    \ lecture series.\nOur only objective for this lecture is to give you some feel\
    \ of what Python is, and what it can do.\n\n# 1.2 What’s Python?\n\nPython is\
    \ a general-purpose programming language conceived in 1989 by Dutch programmer\
    \ Guido van Rossum.\nPython is free and open source, with development coordinated\
    \ through the Python Software Foundation.\nPython has experienced rapid adoption\
    \ in the last decade and is now one of the most popular programming languages.\n\
    \n# Python Programming for Economics and Finance\n\n# 1.2.1 Common Uses\n\nPython\
    \ is a general-purpose language used in almost all application domains such as\n\
    \n- communications\n- web development\n- CGI and graphical user interfaces\n-\
    \ game development\n- resource planning\n- multimedia, data science, security,\
    \ etc., etc., etc.\n\nUsed and supported extensively by Internet services and\
    \ high-tech companies including\n\n- Google\n- Netflix\n- Meta\n- Dropbox\n- Amazon\n\
    - Reddit\n\nFor reasons we will discuss, Python is particularly popular within\
    \ the scientific community and behind many scientific achievements in\n\n- Space\
    \ Science\n- Particle Physics\n- Genetics\n\nand practically all branches of academia.\n\
    \nMeanwhile, Python is also very beginner-friendly and is found to be suitable\
    \ for students learning programming and recommended to introduce computational\
    \ methods to students in fields other than computer science.\n\nPython is also\
    \ replacing familiar tools like Excel as an essential skill in the fields of finance\
    \ and banking.\n\n# 1.2.2 Relative Popularity\n\nThe following chart, produced\
    \ using Stack Overflow Trends, shows one measure of the relative popularity of\
    \ Python\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_11_0.png)\n\nThe figure indicates\
    \ not only that Python is widely used but also that adoption of Python has accelerated\
    \ significantly since 2012.\n\nWe suspect this is driven at least in part by uptake\
    \ in the scientific domain, particularly in rapidly growing fields like data science.\n\
    \nFor example, the popularity of pandas, a library for data analysis with Python\
    \ has exploded, as seen here. (The corresponding time path for MATLAB is shown\
    \ for comparison)\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_12_0.png)\n\nNote\
    \ that pandas takes off in 2012, which is the same year that we see Python’s popularity\
    \ begin to spike in the first figure. Overall, it’s clear that\n\n- Python is\
    \ one of the most popular programming languages worldwide.\n- Python is a major\
    \ tool for scientific computing, accounting for a rapidly rising share of scientific\
    \ work around the globe.\n\n# 1.2.3 Features\n\nPython is a high-level language\
    \ suitable for rapid development. It has a relatively small core language supported\
    \ by many libraries. Other features of Python:\n\n- multiple programming styles\
    \ are supported (procedural, object-oriented, functional, etc.)\n- it is interpreted\
    \ rather than compiled.\n\n# 1.2.4 Syntax and Design\n\nOne nice feature of Python\
    \ is its elegant syntax — we’ll see many examples later on. Elegant code might\
    \ sound superfluous but in fact it’s highly beneficial because it makes the syntax\
    \ easy to read and easy to remember. Remembering how to read from files, sort\
    \ dictionaries and other such routine tasks means that you don’t need to break\
    \ your flow in order to hunt down correct syntax. Closely related to elegant syntax\
    \ is an elegant design. Features like iterators, generators, decorators and list\
    \ comprehensions make Python highly expressive, allowing you to get more done\
    \ with less code. Namespaces improve productivity by cutting down on bugs and\
    \ syntax errors.\n\n# 1.3 Scientific Programming\n\nPython has become one of the\
    \ core languages of scientific computing.\nIt's either the dominant player or\
    \ a major player in\n\n- machine learning and data science\n- astronomy\n- chemistry\n\
    - computational biology\n- meteorology\n- natural language processing\n\nIts popularity\
    \ in economics is also beginning to rise.\nThis section briefly showcases some\
    \ examples of Python for scientific programming.\n\n- All of these topics below\
    \ will be covered in detail later on.\n\n# 1.3.1 Numerical Programming\n\nFundamental\
    \ matrix and array processing capabilities are provided by the excellent NumPy\
    \ library.\nNumPy provides the basic array data type plus some simple processing\
    \ operations.\nFor example, let's build some arrays\n\n```python\nimport numpy\
    \ as np\n\na = np.linspace(-np.pi, np.pi, 100)\nb = np.cos(a)\nc = np.sin(a)\n\
    ```\n\nNow let's take the inner product\n\n```python\nb @ c\n```\n\n```\n9.853229343548264e-16\n\
    ```\n\nThe number you see here might vary slightly but it's essentially zero.\n\
    (For older versions of Python and NumPy you need to use the np.dot function)\n\
    The SciPy library is built on top of NumPy and provides additional functionality.\n\
    For example, let's calculate $\\int_{-2}^{2} \\phi(z)dz$ where $\\phi$ is the\
    \ standard normal density.\n\n```python\nfrom scipy.stats import norm\nfrom scipy.integrate\
    \ import quad\n\nphi = norm()\nvalue, error = quad(phi.pdf, -2, 2)\nvalue\n```\n\
    \n```\n0.9544997361036417\n```\n\nSciPy includes many of the standard routines\
    \ used in\n\n- linear algebra\n- integration\n- interpolation\n- optimization\n\
    - distributions and statistical techniques\n- signal processing\n\nSee them all\
    \ [here](https://docs.scipy.org/doc/scipy/reference/).\n\n# 1.3.2 Graphics\n\n\
    The most popular and comprehensive Python library for creating figures and graphs\
    \ is Matplotlib, with functionality including\n\n- plots, histograms, contour\
    \ images, 3D graphs, bar charts etc.\n- output in many formats (PDF, PNG, EPS,\
    \ etc.)\n- LaTeX integration\n\nExample 2D plot with embedded LaTeX annotations\n\
    Example contour plot\nExample 3D plot\nMore examples can be found in the Matplotlib\
    \ thumbnail gallery.\n\nOther graphics libraries include\n\n- Plotly\n- seaborn\
    \ — a high-level interface for matplotlib\n- Altair\n- Bokeh\n\nYou can visit\
    \ the Python Graph Gallery for more example plots drawn using a variety of libraries.\n\
    \n# 1.3.3 Symbolic Algebra\n\nIt's useful to be able to manipulate symbolic expressions,\
    \ as in Mathematica or Maple.\nThe SymPy library provides this functionality from\
    \ within the Python shell.\n\n```python\nfrom sympy import Symbol\n\nx, y = Symbol('x'),\
    \ Symbol('y')  # Treat 'x' and 'y' as algebraic symbols\nx + x + x + y\n```\n\n\
    ![](img/71948b0dce962ae14bde4e2e4d9fbb7b_15_0.png)\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_16_0.png)\n\
    \n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_17_0.png)\n\n$3x + y$\n\nWe can manipulate\
    \ expressions\n\n```python\nexpression = (x + y)**2\nexpression.expand()\n```\n\
    \n$x^2 + 2xy + y^2$\n\nsolve polynomials\n\n```python\nfrom sympy import solve\n\
    \nsolve(x**2 + x + 2)\n```\n\n```\n[-1/2 - sqrt(7)*I/2, -1/2 + sqrt(7)*I/2]\n\
    ```\n\nand calculate limits, derivatives and integrals\n\n```python\nfrom sympy\
    \ import limit, sin, diff, integrate\n\nlimit(1 / x, x, 0)\n```\n\n$\\infty$\n\
    \n```python\nlimit(sin(x) / x, x, 0)\n```\n\n$1$\n\n```python\ndiff(sin(x), x)\n\
    ```\n\n$\\cos(x)$\n\n```python\nintegrate(sin(x) * x, x)\n```\n\n$-x \\cos(x)\
    \ + \\sin(x)$\n\nThe beauty of importing this functionality into Python is that\
    \ we are working within a fully fledged programming language. We can easily create\
    \ tables of derivatives, generate LaTeX output, add that output to figures and\
    \ so on.\n\n# 1.3.4 Scientific Programming"
  mdcn: "本网站提供一系列关于经济学与金融学Python编程的讲座。\n这是该系列的第一篇文本，专注于Python编程。\n有关该系列的概述，请参阅[此页面](this\
    \ page)\n\n## Python简介\n- 关于Python\n- 入门\n- 一个入门示例\n- 函数\n- Python基础\n- 面向对象编程\
    \ I：对象与命名\n- 面向对象编程 II：构建类\n- 编写较长的程序\n\n## 科学计算库\n- 用于科学计算的Python\n- NumPy\n\
    - Matplotlib\n- SciPy\n- Pandas\n- SymPy\n\n## 高性能计算\n- Numba\n- 并行化\n- JAX\n\n\
    ## 高级Python编程\n- 编写优质代码\n- 更多语言特性\n- 调试与错误处理\n\n## 其他\n- 故障排除\n- 执行统计\n\n# 经济学与金融学的Python编程\n\
    \n# 第一部分\n\n# Python简介\n\n# 第一章\n\n# 关于Python\n\n## 目录\n- 关于Python\n  - 概述\n \
    \ - 什么是Python？\n  - 科学编程\n  - 进一步学习\n\n> “Python已经变得足够强大，我们不再需要转向R了。抱歉，R的用户们。我曾经也是你们中的一员，但我们不再转向R了。”\
    \ – Chris Wiggins\n\n# 1.1 概述\n\n在本讲中，我们将\n- 概述Python是什么\n- 将其与其他一些语言进行比较\n- 展示其部分能力。\n\
    \n现阶段，我们**不**打算让你尝试复制你所看到的所有内容。\n我们将在本系列讲座的后续部分以较慢的节奏讲解这些内容。\n本讲的唯一目标是让你对Python是什么以及它能做什么有一些感受。\n\
    \n# 1.2 什么是Python？\n\nPython是一种通用编程语言，由荷兰程序员Guido van Rossum于1989年构思。\nPython是免费且开源的，其开发由Python软件基金会协调。\n\
    Python在过去十年中迅速普及，现在已成为最受欢迎的编程语言之一。\n\n# 经济学与金融学的Python编程\n\n# 1.2.1 常见用途\n\nPython是一种通用语言，几乎应用于所有领域，例如\n\
    \n- 通信\n- 网页开发\n- CGI和图形用户界面\n- 游戏开发\n- 资源规划\n- 多媒体、数据科学、安全等等。\n\n被众多互联网服务和高科技公司广泛使用和支持，包括\n\
    \n- Google\n- Netflix\n- Meta\n- Dropbox\n- Amazon\n- Reddit\n\n出于我们将讨论的原因，Python在科学界特别受欢迎，并支撑了许多科学成就，涉及\n\
    \n- 空间科学\n- 粒子物理学\n- 遗传学\n\n以及几乎所有学术分支。\n\n同时，Python也非常适合初学者，被认为适合学习编程的学生，并推荐给非计算机科学领域的学生介绍计算方法。\n\
    \nPython也正在取代Excel等熟悉工具，成为金融和银行领域的必备技能。\n\n# 1.2.2 相对流行度\n\n以下图表由Stack Overflow\
    \ Trends生成，显示了Python相对流行度的一个衡量指标\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_11_0.png)\n\
    \n该图不仅表明Python被广泛使用，还表明自2012年以来Python的采用率显著加速。\n\n我们怀疑这至少部分是由科学领域的采用推动的，特别是在数据科学等快速增长的领域。\n\
    \n例如，用于Python数据分析的pandas库的受欢迎程度激增，如图所示。（为比较起见，显示了MATLAB的相应时间路径）\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_12_0.png)\n\
    \n请注意，pandas在2012年开始起飞，这与我们在第一张图中看到Python流行度开始飙升的年份相同。总体而言，很明显\n\n- Python是全球最受欢迎的编程语言之一。\n\
    - Python是科学计算的主要工具，在全球科学工作中所占份额迅速上升。\n\n# 1.2.3 特性\n\nPython是一种适合快速开发的高级语言。它有一个相对较小的核心语言，并由许多库支持。Python的其他特性包括：\n\
    \n- 支持多种编程风格（过程式、面向对象、函数式等）\n- 它是解释型的，而非编译型的。\n\n# 1.2.4 语法与设计\n\nPython的一个优点是其优雅的语法——我们稍后会看到许多例子。优雅的代码听起来可能多余，但实际上它非常有益，因为它使语法易于阅读和记忆。记住如何从文件读取、对字典排序以及其他此类常规任务，意味着你不需要中断工作流程去查找正确的语法。与优雅语法密切相关的是优雅的设计。迭代器、生成器、装饰器和列表推导式等特性使Python具有高度表达性，允许你用更少的代码完成更多工作。命名空间通过减少错误和语法错误来提高生产力。\n\
    \n# 1.3 科学编程\n\nPython已成为科学计算的核心语言之一。\n它在以下领域是主导者或主要参与者\n\n- 机器学习和数据科学\n- 天文学\n\
    - 化学\n- 计算生物学\n- 气象学\n- 自然语言处理\n\n它在经济学中的受欢迎程度也开始上升。\n本节简要展示一些Python用于科学编程的例子。\n\
    \n- 以下所有主题将在后面详细讲解。\n\n# 1.3.1 数值编程\n\n基础的矩阵和数组处理能力由优秀的NumPy库提供。\nNumPy提供了基本的数组数据类型以及一些简单的处理操作。\n\
    例如，让我们构建一些数组\n\n```python\nimport numpy as np\n\na = np.linspace(-np.pi, np.pi,\
    \ 100)\nb = np.cos(a)\nc = np.sin(a)\n```\n\n现在让我们计算内积\n\n```python\nb @ c\n```\n\
    \n```\n9.853229343548264e-16\n```\n\n你在这里看到的数字可能略有不同，但它本质上是零。\n（对于旧版本的Python和NumPy，你需要使用np.dot函数）\n\
    SciPy库构建在NumPy之上，提供了额外的功能。\n例如，让我们计算 $\\int_{-2}^{2} \\phi(z)dz$，其中 $\\phi$ 是标准正态密度。\n\
    \n```python\nfrom scipy.stats import norm\nfrom scipy.integrate import quad\n\n\
    phi = norm()\nvalue, error = quad(phi.pdf, -2, 2)\nvalue\n```\n\n```\n0.9544997361036417\n\
    ```\n\nSciPy包含许多用于以下方面的标准例程\n\n- 线性代数\n- 积分\n- 插值\n- 优化\n- 分布与统计技术\n- 信号处理\n\n\
    请在[此处](https://docs.scipy.org/doc/scipy/reference/)查看所有内容。\n\n# 1.3.2 图形\n\n用于创建图表和图形的最流行、最全面的Python库是Matplotlib，其功能包括\n\
    \n- 绘图、直方图、等高线图、3D图、条形图等\n- 多种格式输出（PDF、PNG、EPS等）\n- LaTeX集成\n\n带有嵌入式LaTeX注释的2D绘图示例\n\
    等高线图示例\n3D图示例\n更多示例可在Matplotlib缩略图画廊中找到。\n\n其他图形库包括\n\n- Plotly\n- seaborn — matplotlib的高级接口\n\
    - Altair\n- Bokeh\n\n你可以访问Python Graph Gallery查看更多使用各种库绘制的示例图。\n\n# 1.3.3 符号代数\n\
    \n能够操纵符号表达式是很有用的，就像在Mathematica或Maple中一样。\nSymPy库在Python shell中提供了此功能。\n\n```python\n\
    from sympy import Symbol\n\nx, y = Symbol('x'), Symbol('y')  # 将'x'和'y'视为代数符号\n\
    x + x + x + y\n```\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_15_0.png)\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_16_0.png)\n\
    \n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_17_0.png)\n\n$3x + y$\n\n我们可以操纵表达式\n\
    \n```python\nexpression = (x + y)**2\nexpression.expand()\n```\n\n$x^2 + 2xy +\
    \ y^2$\n\n求解多项式\n\n```python\nfrom sympy import solve\n\nsolve(x**2 + x + 2)\n\
    ```\n\n```\n[-1/2 - sqrt(7)*I/2, -1/2 + sqrt(7)*I/2]\n```\n\n并计算极限、导数和积分\n\n```python\n\
    from sympy import limit, sin, diff, integrate\n\nlimit(1 / x, x, 0)\n```\n\n$\\\
    infty$\n\n```python\nlimit(sin(x) / x, x, 0)\n```\n\n$1$\n\n```python\ndiff(sin(x),\
    \ x)\n```\n\n$\\cos(x)$\n\n```python\nintegrate(sin(x) * x, x)\n```\n\n$-x \\\
    cos(x) + \\sin(x)$\n\n将此功能导入Python的美妙之处在于，我们是在一个功能齐全的编程语言中工作。我们可以轻松创建导数表、生成LaTeX输出、将该输出添加到图形中等等。\n\
    \n# 1.3.4 科学编程"
