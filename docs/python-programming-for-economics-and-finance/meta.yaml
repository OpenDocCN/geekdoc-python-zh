- md: "For example, a new array is created when x**2 is calculated.\nThe same is true\
    \ when y**2 is calculated, and then x**2 + y**2 and so on.\nNumba avoids creating\
    \ all these intermediate arrays by compiling one function that is specialized\
    \ to the entire operation.\nBut if this is true, then why isn't the Numba code\
    \ faster?\nThe reason is that NumPy makes up for its disadvantages with implicit\
    \ multithreading, as we've just discussed.\n\n## 16.3.4 Multi threading a Numba\
    \ Ufunc\n\nCan we get both of these advantages at once?\nIn other words, can we\
    \ pair\n\n- the efficiency of Numba's highly specialized JIT compiled function\
    \ and\n- the speed gains from parallelization obtained by NumPy's implicit multithreading?\n\
    \nIt turns out that we can, by adding some type information plus `target='parallel'`.\n\
    \n```\n@vectorize('float64(float64, float64)', target='parallel')\ndef f_vec(x,\
    \ y):\n    return np.cos(x**2 + y**2) / (1 + x**2 + y**2)\n\nnp.max(f_vec(x, y))\
    \  # Run once to compile\n```\n\n```\n0.9999992797121728\n```\n\n```\n%timeit\
    \ np.max(f_vec(x, y))\n```\n\n```\n130 ms ± 707 µs per loop (mean ± std. dev.\
    \ of 7 runs, 10 loops each)\n```\n\nNow our code runs significantly faster than\
    \ the NumPy version.\n\n## 16.4 Multithreaded Loops in Numba\n\nWe just saw one\
    \ approach to parallelization in Numba, using the `parallel` flag in `@vectorize`.\n\
    This is neat but, it turns out, not well suited to many problems we consider.\n\
    Fortunately, Numba provides another approach to multithreading that will work\
    \ for us almost everywhere parallelization is possible.\nTo illustrate, let's\
    \ look first at a simple, single-threaded (i.e., non-parallelized) piece of code.\n\
    The code simulates updating the wealth $w_t$ of a household via the rule\n\n$w_{t+1}\
    \ = R_{t+1}sw_t + y_{t+1}$\n\nHere\n\n- $R$ is the gross rate of return on assets\n\
    - $s$ is the savings rate of the household and\n- $y$ is labor income.\n\n# Python\
    \ Programming for Economics and Finance\n\nWe model both $R$ and $y$ as independent\
    \ draws from a lognormal distribution.\nHere's the code:\n\n```\nfrom numpy.random\
    \ import randn\nfrom numba import njit\n\n@njit\ndef h(w, r=0.1, s=0.3, v1=0.1,\
    \ v2=1.0):\n    \"\"\"\n    Updates household wealth.\n    \"\"\"\n\n    # Draw\
    \ shocks\n    R = np.exp(v1 * randn()) * (1 + r)\n    y = np.exp(v2 * randn())\n\
    \n    # Update wealth\n    w = R * s * w + y\n    return w\n```\n\nLet's have\
    \ a look at how wealth evolves under this rule.\n\n```\nfig, ax = plt.subplots()\n\
    \nT = 100\nw = np.empty(T)\nw[0] = 5\nfor t in range(T-1):\n    w[t+1] = h(w[t])\n\
    \nax.plot(w)\nax.set_xlabel('$t$', fontsize=12)\nax.set_ylabel('$w_{t}$', fontsize=12)\n\
    plt.show()\n```\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_298_0.png)\n\nNow\
    \ let's suppose that we have a large population of households and we want to know\
    \ what median wealth will be.\nThis is not easy to solve with pencil and paper,\
    \ so we will use simulation instead.\nIn particular, we will simulate a large\
    \ number of households and then calculate median wealth for this group.\nSuppose\
    \ we are interested in the long-run average of this median over time.\nIt turns\
    \ out that, for the specification that we've chosen above, we can calculate this\
    \ by taking a one-period snapshot of what has happened to median wealth of the\
    \ group at the end of a long simulation.\nMoreover, provided the simulation period\
    \ is long enough, initial conditions don't matter.\n\n- This is due to something\
    \ called ergodicity, which we will discuss later on.\n\nSo, in summary, we are\
    \ going to simulate 50,000 households by\n\n1. arbitrarily setting initial wealth\
    \ to 1 and\n2. simulating forward in time for 1,000 periods.\n\nThen we'll calculate\
    \ median wealth at the end period.\nHere's the code:\n\n```\n@njit\ndef compute_long_run_median(w0=1,\
    \ T=1000, num_reps=50_000):\n\n    obs = np.empty(num_reps)\n    for i in range(num_reps):\n\
    \        w = w0\n        for t in range(T):\n            w = h(w)\n        obs[i]\
    \ = w\n\n    return np.median(obs)\n```\n\n# Python Programming for Economics\
    \ and Finance\n\nLet's see how fast this runs:\n\n```\n%%time\ncompute_long_run_median()\n\
    ```\n\n```\nCPU times: user 5.71 s, sys: 80.4 ms, total: 5.79 s\nWall time: 5.78\
    \ s\n```\n\n```\n1.8336628488163855\n```\n\nTo speed this up, we're going to parallelize\
    \ it via multithreading.\nTo do so, we add the `parallel=True` flag and change\
    \ `range` to `prange`:\n\n```\nfrom numba import prange\n\n@njit(parallel=True)\n\
    def compute_long_run_median_parallel(w0=1, T=1000, num_reps=50_000):\n\n    obs\
    \ = np.empty(num_reps)\n    for i in prange(num_reps):\n        w = w0\n     \
    \   for t in range(T):\n            w = h(w)\n        obs[i] = w\n\n    return\
    \ np.median(obs)\n```\n\nLet's look at the timing:\n\n```\n%%time\ncompute_long_run_median_parallel()\n\
    ```\n\n```\nCPU times: user 6.68 s, sys: 0 ns, total: 6.68 s\nWall time: 1.94\
    \ s\n```\n\n```\n1.8497894505998835\n```\n\nThe speed-up is significant.\n\n##\
    \ 16.4.1 A Warning\n\nParallelization works well in the outer loop of the last\
    \ example because the individual tasks inside the loop are independent of each\
    \ other.\n\nIf this independence fails then parallelization is often problematic.\n\
    \nFor example, each step inside the inner loop depends on the last step, so independence\
    \ fails, and this is why we use ordinary `range` instead of `prange`.\n\nWhen\
    \ you see us using `prange` in later lectures, it is because the independence\
    \ of tasks holds true.\n\nWhen you see us using ordinary `range` in a jitted function,\
    \ it is either because the speed gain from parallelization is small or because\
    \ independence fails.\n\n## 16.5 Exercises\n\n**Exercise 16.5.1**\n\nIn *an earlier\
    \ exercise*, we used Numba to accelerate an effort to compute the constant $\\\
    pi$ by Monte Carlo.\n\nNow try adding parallelization and see if you get further\
    \ speed gains.\n\nYou should not expect huge gains here because, while there are\
    \ many independent tasks (draw point and test if in circle), each one has low\
    \ execution time.\n\nGenerally speaking, parallelization is less effective when\
    \ the individual tasks to be parallelized are very small relative to total execution\
    \ time.\n\nThis is due to overheads associated with spreading all of these small\
    \ tasks across multiple CPUs.\n\nNevertheless, with suitable hardware, it is possible\
    \ to get nontrivial speed gains in this exercise.\n\nFor the size of the Monte\
    \ Carlo simulation, use something substantial, such as n = 100_000_000.\n\n**Solution\
    \ to Exercise 16.5.1**\n\nHere is one solution:\n\n```\npython\nfrom random import\
    \ uniform\n\n@njit(parallel=True)\ndef calculate_pi(n=1_000_000):\n    count =\
    \ 0\n    for i in prange(n):\n        u, v = uniform(0, 1), uniform(0, 1)\n  \
    \      d = np.sqrt((u - 0.5)**2 + (v - 0.5)**2)\n        if d < 0.5:\n       \
    \     count += 1\n\n    area_estimate = count / n\n    return area_estimate *\
    \ 4  # dividing by radius**2\n```\n\nNow let's see how fast it runs:\n\n```\n\
    python\n%time calculate_pi()\n```\n\n```\n\nCPU times: user 367 ms, sys: 28.1\
    \ ms, total: 395 ms\nWall time: 382 ms\n\n3.141416\n```\n\n```\npython\n%time\
    \ calculate_pi()\n```\n\n```\n\nCPU times: user 17.6 ms, sys: 0 ns, total: 17.6\
    \ ms\nWall time: 4.87 ms\n```\n\n# Python Programming for Economics and Finance\n\
    \n3.140936\n\nBy switching parallelization on and off (selecting `True` or `False`\
    \ in the `@njit` annotation), we can test the speed gain that multithreading provides\
    \ on top of JIT compilation.\n\nOn our workstation, we find that parallelization\
    \ increases execution speed by a factor of 2 or 3.\n\n(If you are executing locally,\
    \ you will get different numbers, depending mainly on the number of CPUs on your\
    \ machine.)\n\n## Exercise 16.5.2\n\nIn *our lecture on SciPy*, we discussed pricing\
    \ a call option in a setting where the underlying stock price had a simple and\
    \ well-known distribution.\n\nHere we discuss a more realistic setting.\n\nWe\
    \ recall that the price of the option obeys\n\n$$P = \\beta^n \\mathbb{E} \\max\\\
    {S_n - K, 0\\}$$\n\nwhere\n\n1. $\\beta$ is a discount factor,\n2. $n$ is the\
    \ expiry date,\n3. $K$ is the strike price and\n4. $\\{S_t\\}$ is the price of\
    \ the underlying asset at each time $t$.\n\nSuppose that $n$, $\\beta$, $K = 20$,\
    \ $0.99$, $100$.\n\nAssume that the stock price obeys\n\n$$\\ln \\frac{S_{t+1}}{S_t}\
    \ = \\mu + \\sigma_t \\xi_{t+1}$$\n\nwhere\n\n$$\\sigma_t = \\exp(h_t), \\quad\
    \ h_{t+1} = \\rho h_t + \\nu \\eta_{t+1}$$\n\nHere $\\{\\xi_t\\}$ and $\\{\\eta_t\\\
    }$ are IID and standard normal.\n\n(This is a **stochastic volatility** model,\
    \ where the volatility $\\sigma_t$ varies over time.)\n\nUse the defaults $\\\
    mu$, $\\rho$, $\\nu$, $S0$, $h0 = 0.0001$, $0.1$, $0.001$, $10$, $0$.\n\n(Here\
    \ $S0$ is $S_0$ and $h0$ is $h_0$.)\n\nBy generating $M$ paths $s_0, \\dots, s_n$,\
    \ compute the Monte Carlo estimate\n\n$$\\hat{P}_M := \\beta^n \\mathbb{E} \\\
    max\\{S_n - K, 0\\} \\approx \\frac{1}{M} \\sum_{m=1}^M \\max\\{S_n^m - K, 0\\\
    }$$\n\nof the price, applying Numba and parallelization.\n\n## Solution to Exercise\
