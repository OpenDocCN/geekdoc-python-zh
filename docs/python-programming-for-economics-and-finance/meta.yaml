  md: "# How it Works\n\nThe names `_miles` and `_kms` are arbitrary names we are\
    \ using to store the values of the variables.\nThe objects `miles` and `kms` are\
    \ *properties*, a common kind of descriptor.\nThe methods `get_miles`, `set_miles`,\
    \ `get_kms` and `set_kms` define what happens when you get (i.e. access) or set\
    \ (bind) these variables\n\n+   - So-called “getter” and “setter” methods.\n\n\
    The builtin Python function `property` takes getter and setter methods and creates\
    \ a property.\nFor example, after `car` is created as an instance of `Car`, the\
    \ object `car.miles` is a property.\nBeing a property, when we set its value via\
    \ `car.miles = 6000` its setter method is triggered — in this case `set_miles`.\n\
    \n# Decorators and Properties\n\nThese days its very common to see the `property`\
    \ function used via a decorator.\nHere’s another version of our `Car` class that\
    \ works as before but now uses decorators to set up the properties\n\n```\nclass\
    \ Car:\n\n    def __init__(self, miles=1000):\n        self._miles = miles\n \
    \       self._kms = miles * 1.61\n\n    @property\n    def miles(self):\n    \
    \    return self._miles\n\n    @property\n    def kms(self):\n        return self._kms\n\
    \n    @miles.setter\n    def miles(self, value):\n        self._miles = value\n\
    \        self._kms = value * 1.61\n\n    @kms.setter\n    def kms(self, value):\n\
    \        self._kms = value\n        self._miles = value / 1.61\n```\n\nWe won’t\
    \ go through all the details here.\nFor further information you can refer to the\
    \ [descriptor documentation](https://docs.python.org/3/howto/descriptor.html)."
