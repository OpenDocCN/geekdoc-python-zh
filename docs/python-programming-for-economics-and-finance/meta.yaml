    \ 请在不使用 `sets` 和集合方法的情况下完成此练习。\n\n**练习 5.7.4 的解答**\n\n这是一个解决方案：\n\n```python\n\
    def f(seq_a, seq_b):\n    for a in seq_a:\n        if a not in seq_b:\n      \
