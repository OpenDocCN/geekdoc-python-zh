    Our only objective for this lecture is to give you some feel of what Python is,\
    \ and what it can do.\n\n# 1.2 What’s Python?\n\nPython is a general-purpose programming\
    \ language conceived in 1989 by Dutch programmer Guido van Rossum.\nPython is\
    \ free and open source, with development coordinated through the Python Software\
    \ Foundation.\nPython has experienced rapid adoption in the last decade and is\
    \ now one of the most popular programming languages."
