    # 9.2 Scientific Libraries


    Let''s briefly review Python''s scientific libraries, starting with why we need
    them.


    # 9.2.1 The Role of Scientific Libraries


    One obvious reason we use scientific libraries is because they implement routines
    we want to use.

    For example, it''s almost always better to use an existing routine for root finding
    than to write a new one from scratch.

    (For standard algorithms, efficiency is maximized if the community can coordinate
    on a common set of implementations,

    written by experts and tuned by users to be as fast and robust as possible.)

    But this is not the only reason that we use Python''s scientific libraries.

    Another is that pure Python, while flexible and elegant, is not fast.

    So we need libraries that are designed to accelerate execution of Python code.

    As we''ll see below, there are now Python libraries that can do this extremely
    well.


    # 9.2.2 Python''s Scientific Ecosystem


    In terms of popularity, the big four in the world of scientific Python libraries
    are


    +   - NumPy

    - SciPy

    - Matplotlib

    - Pandas


    For us, there''s another (relatively new) library that will also be essential
    for numerical computing:


    +   - Numba


    Over the next few lectures we''ll see how to use these libraries.

    But first, let''s quickly review how they fit together.


    +   - NumPy forms the foundations by providing a basic array data type (think
    of vectors and matrices) and functions

    for acting on these arrays (e.g., matrix multiplication).

    - SciPy builds on NumPy by adding the kinds of numerical methods that are routinely
    used in science (interpolation,

    optimization, root finding, etc.).

    - Matplotlib is used to generate figures, with a focus on plotting data stored
    in NumPy arrays.

    - Pandas provides types and functions for empirical work (e.g., manipulating data).

    - Numba accelerates execution via JIT compilation — we''ll learn about this soon.'
  - '[PAGE 160]


    # # 9.3 The Need for Speed


    Now let’s discuss execution speed.

    Higher-level languages like Python are optimized for humans.

    This means that the programmer can leave many details to the runtime environment


    +   - specifying variable types

    - memory allocation/deallocation, etc.


    The upside is that, compared to low-level languages, Python is typically faster
    to write, less error-prone and easier to debug.

    The downside is that Python is harder to optimize — that is, turn into fast machine
    code — than languages like C or Fortran.

    Indeed, the standard implementation of Python (called CPython) cannot match the
    speed of compiled languages such as C or Fortran.

    Does that mean that we should just switch to C or Fortran for everything?

    The answer is: No, no and one hundred times no!

    (This is what you should say to the senior professor insisting that the model
    needs to be rewritten in Fortran or C++.)

    There are two reasons why:

    First, for any given program, relatively few lines are ever going to be time-critical.

    Hence it is far more efficient to write most of our code in a high productivity
    language like Python.

    Second, even for those lines of code that *are* time-critical, we can now achieve
    the same speed as C or Fortran using Python’s scientific libraries.


    # ## 9.3.1 Where are the Bottlenecks?


    Before we learn how to do this, let’s try to understand why plain vanilla Python
    is slower than C or Fortran.

    This will, in turn, help us figure out how to speed things up.


    # ### Dynamic Typing


    Consider this Python operation


    ```

    python

    a, b = 10, 10

    a + b

    ```


    ```

    output

    20

    ```


    Even for this simple operation, the Python interpreter has a fair bit of work
    to do.

    For example, in the statement `a + b`, the interpreter has to know which operation
    to invoke.

    If `a` and `b` are strings, then `a + b` requires string concatenation


    ```

    python

    a, b = ''foo'', ''bar''

    a + b

    ```'
