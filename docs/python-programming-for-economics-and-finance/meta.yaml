    \ include `fmin_l_bfgs_b`, `fmin_tnc`, `fmin_cobyla`.\nSee the [documentation](https://docs.scipy.org/doc/scipy/reference/optimize.html)\
    \ for details.\n\n## 12.6 Integration\n\nMost numerical integration methods work\
    \ by computing the integral of an approximating polynomial.\nThe resulting error\
    \ depends on how well the polynomial fits the integrand, which in turn depends\
    \ on how “regular” the integrand is.\nIn SciPy, the relevant module for numerical\
    \ integration is `scipy.integrate`.\nA good default for univariate integration\
    \ is `quad`\n\n```python\nfrom scipy.integrate import quad\n\nintegral, error\
