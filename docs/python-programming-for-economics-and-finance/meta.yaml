    \        area, error = quad(integrand, 0, self.quantity())\n        return area\
    \ - self.price() * self.quantity()\n\n    def producer_surp(self):\n        \"\
    Compute producer surplus\"\n        #  == Compute area above inverse supply curve,\
    \ excluding tax == #\n        integrand = lambda x: -(self.az / self.bz) + (1\
    \ / self.bz) * x\n        area, error = quad(integrand, 0, self.quantity())\n\
    \        return (self.price() - self.tax) * self.quantity() - area\n\n    def\
    \ taxrev(self):\n        \"Compute tax revenue\"\n        return self.tax * self.quantity()\n\
    \n    def inverse_demand(self, x):\n        \"Compute inverse demand\"\n     \
    \   return self.ad / self.bd - (1 / self.bd)* x\n\n    def inverse_supply(self,\
    \ x):\n        \"Compute inverse supply curve\"\n        return -(self.az / self.bz)\
    \ + (1 / self.bz) * x + self.tax\n\n    def inverse_supply_no_tax(self, x):\n\
    \        \"Compute inverse supply curve without tax\"\n        return -(self.az\
    \ / self.bz) + (1 / self.bz) * x\n```\n\nHere's a sample of usage\n\n```\nbaseline_params\
    \ = 15, .5, -2, .5, 3\nm = Market(*baseline_params)\nprint(\"equilibrium price\
    \ = \", m.price())\n```"
- md: "## 7.3.4 Example: Chaos\n\nLet's look at one more example, related to chaotic\
    \ dynamics in nonlinear systems.\nA simple transition rule that can generate erratic\
    \ time paths is the logistic map\n\n$x_{t+1} = r x_t (1 - x_t), \\quad x_0 \\\
    in [0, 1], \\quad r \\in [0, 4] \\qquad (7.2)$\n\nLet's write a class for generating\
    \ time series from this model.\nHere's one implementation\n\n```python\nclass\
    \ Chaos:\n    \"\"\"\n    Models the dynamical system :math:`x_{t+1} = r x_t (1\
    \ - x_t)`\n    \"\"\"\n    def __init__(self, x0, r):\n        \"\"\"\n      \
    \  Initialize with state x0 and parameter r\n        \"\"\"\n        self.x, self.r\
    \ = x0, r\n\n    def update(self):\n        \"\"\"Apply the map to update state.\"\
    \"\"\n        self.x = self.r * self.x * (1 - self.x)\n\n    def generate_sequence(self,\
    \ n):\n        \"\"\"Generate and return a sequence of length n.\"\"\"\n     \
    \   path = []\n        for i in range(n):\n            path.append(self.x)\n \
    \           self.update()\n        return path\n```\n\nHere's an example of usage\n\
    \n```python\nch = Chaos(0.1, 4.0)    # x0 = 0.1 and r = 4.0\nch.generate_sequence(5)\
    \  # First 5 iterates\n```\n\n```\n[0.1, 0.36000000000000004, 0.9216, 0.28901376000000006,\
    \ 0.8219392261226498]\n```\n\nThis piece of code plots a longer trajectory\n\n\
    ```python\nch = Chaos(0.1, 4.0)\nts_length = 250\n\nfig, ax = plt.subplots()\n\
    ax.set_xlabel('$t$', fontsize=14)\nax.set_ylabel('$x_t$', fontsize=14)\nx = ch.generate_sequence(ts_length)\n\
    ax.plot(range(ts_length), x, 'bo-', alpha=0.5, lw=2, label='$x_t$')\nplt.show()\n\
    ```\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_136_0.png)\n\nThe next piece of\
    \ code provides a bifurcation diagram\n\n```python\nfig, ax = plt.subplots()\n\
    ch = Chaos(0.1, 4)\nr = 2.5\nwhile r < 4:\n    ch.r = r\n    t = ch.generate_sequence(1000)[950:]\n\
    \    ax.plot([r] * len(t), t, 'b.', ms=0.6)\n    r = r + 0.005\n\nax.set_xlabel('$r$',\
    \ fontsize=16)\nax.set_ylabel('$x_t$', fontsize=16)\nplt.show()\n```\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_137_0.png)\n\
    \nOn the horizontal axis is the parameter $r$ in (7.2).\nThe vertical axis is\
    \ the state space $[0, 1]$.\nFor each $r$ we compute a long time series and then\
    \ plot the tail (the last 50 points).\nThe tail of the sequence shows us where\
    \ the trajectory concentrates after settling down to some kind of steady state,\
    \ if a steady state exists.\nWhether it settles down, and the character of the\
    \ steady state to which it does settle down, depend on the value of $r$.\nFor\
    \ $r$ between about 2.5 and 3, the time series settles into a single fixed point\
    \ plotted on the vertical axis.\nFor $r$ between about 3 and 3.45, the time series\
    \ settles down to oscillating between the two values plotted on the vertical axis.\n\
    For $r$ a little bit higher than 3.45, the time series settles down to oscillating\
    \ among the four values plotted on the vertical axis.\nNotice that there is no\
    \ value of $r$ that leads to a steady state oscillating among three values.\n\n\
    ## 7.4 Special Methods\n\nPython provides special methods that come in handy.\n\
    \nFor example, recall that lists and tuples have a notion of length and that this\
    \ length can be queried via the `len` function\n\n```python\nx = (10, 20)\nlen(x)\n\
    ```\n\n```\n2\n```\n\nIf you want to provide a return value for the `len` function\
    \ when applied to your user-defined object, use the `__len__` special method\n\
    \n```python\nclass Foo:\n    def __len__(self):\n        return 42\n```\n\nNow\
    \ we get\n\n```python\nf = Foo()\nlen(f)\n```\n\n```\n42\n```\n\nA special method\
    \ we will use regularly is the `__call__` method.\n\nThis method can be used to\
    \ make your instances callable, just like functions\n\n```python\nclass Foo:\n\
    \    def __call__(self, x):\n        return x + 42\n```\n\nAfter running we get\n\
    \n```python\nf = Foo()\nf(8)  # Exactly equivalent to f.__call__(8)\n```\n\n```\n\
    50\n```\n\nExercise 1 provides a more useful example.\n\n## 7.5 Exercises\n\n\
    ### Exercise 7.5.1\n\nThe empirical cumulative distribution function (ecdf) corresponding\
    \ to a sample $\\{X_i\\}_{i=1}^n$ is defined as\n\n$$F_n(x) := \\frac{1}{n} \\\
    sum_{i=1}^n \\mathbf{1}\\{X_i \\leq x\\} \\quad (x \\in \\mathbb{R}) \\qquad (7.3)$$\n\
    \nHere $\\mathbf{1}\\{X_i \\leq x\\}$ is an indicator function (one if $X_i \\\
    leq x$ and zero otherwise) and hence $F_n(x)$ is the fraction of the sample that\
    \ falls below $x$.\n\nThe Glivenko–Cantelli Theorem states that, provided that\
    \ the sample is IID, the ecdf $F_n$ converges to the true distribution function\
    \ $F$.\n\nImplement $F_n$ as a class called `ECDF`, where\n\n- A given sample\
    \ $\\{X_i\\}_{i=1}^n$ are the instance data, stored as `self.observations`.\n\
    - The class implements a `__call__` method that returns $F_n(x)$ for any $x$.\n\
    \nYour code should work as follows (modulo randomness)\n\n```python\nfrom random\
    \ import uniform\n\nsamples = [uniform(0, 1) for i in range(10)]\nF = ECDF(samples)\n\
    F(0.5)  # Evaluate ecdf at x = 0.5\n```\n\n```python\nF.observations = [uniform(0,\
    \ 1) for i in range(1000)]\nF(0.5)\n```\n\nAim for clarity, not efficiency.\n\n\
    ### Solution to Exercise 7.5.1\n\n```python\nclass ECDF:\n\n    def __init__(self,\
    \ observations):\n        self.observations = observations\n\n    def __call__(self,\
    \ x):\n        counter = 0.0\n        for obs in self.observations:\n        \
    \    if obs <= x:\n                counter += 1\n        return counter / len(self.observations)\n\
    ```\n\n```python\n# == test == #\n\nfrom random import uniform\n\nsamples = [uniform(0,\
    \ 1) for i in range(10)]\nF = ECDF(samples)\nprint(F(0.5))  # Evaluate ecdf at\
    \ x = 0.5\n\nF.observations = [uniform(0, 1) for i in range(1000)]\nprint(F(0.5))\n\
    ```\n\n```\n0.5\n0.491\n```\n\n### Exercise 7.5.2\n\nIn an *earlier exercise*,\
    \ you wrote a function for evaluating polynomials.\nThis exercise is an extension,\
    \ where the task is to build a simple class called `Polynomial` for representing\
    \ and manipulating polynomial functions such as\n\n$$p(x) = a_0 + a_1 x + a_2\
    \ x^2 + \\cdots a_N x^N = \\sum_{n=0}^N a_n x^n \\quad (x \\in \\mathbb{R}) \\\
    qquad (7.4)$$\n\nThe instance data for the class `Polynomial` will be the coefficients\
    \ (in the case of (7.4), the numbers $a_0, \\dots, a_N$).\nProvide methods that\n\
    \n1. Evaluate the polynomial (7.4), returning $p(x)$ for any $x$.\n2. Differentiate\
    \ the polynomial, replacing the original coefficients with those of its derivative\
    \ $p'$.\n\nAvoid using any `import` statements.\n\n### Solution to Exercise 7.5.2\n\
    \n```python\nclass Polynomial:\n\n    def __init__(self, coefficients):\n    \
    \    \"\"\"\n        Creates an instance of the Polynomial class representing\n\
    \n            p(x) = a_0 x^0 + ... + a_N x^N,\n\n        where a_i = coefficients[i].\n\
    \        \"\"\"\n        self.coefficients = coefficients\n\n    def __call__(self,\
    \ x):\n        \"Evaluate the polynomial at x.\"\n        y = 0\n        for i,\
    \ a in enumerate(self.coefficients):\n            y += a * x**i\n        return\
    \ y\n\n    def differentiate(self):\n        \"Reset self.coefficients to those\
    \ of p' instead of p.\"\n```"
