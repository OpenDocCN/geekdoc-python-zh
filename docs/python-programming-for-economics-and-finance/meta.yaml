  md: "# Python Programming for Economics and Finance\n\nThe `earn` function takes\
    \ a consumer's initial wealth $w$ and adds to it her current earnings $y$.\nThe\
    \ `spend` function takes a consumer's initial wealth $w$ and deducts from it her\
    \ current spending $x$.\nWe can use these two functions to keep track of a consumer's\
    \ wealth as she earns and spends.\nFor example\n\n```\nw0=100\nw1=earn(w0,10)\n\
    w2=spend(w1,20)\nw3=earn(w2,10)\nw4=spend(w3,20)\nprint(\"w0,w1,w2,w3,w4 = \"\
    , w0,w1,w2,w3,w4)\n```\n\n```\nw0,w1,w2,w3,w4 =  100 110 90 100 80\n```\n\nA *Class*\
    \ bundles a set of data tied to a particular *instance* together with a collection\
    \ of functions that operate on the data.\nIn our example, an *instance* will be\
    \ the name of particular *person* whose *instance data* consist solely of its\
    \ wealth.\n(In other examples *instance data* will consist of a vector of data.)\n\
    In our example, two functions `earn` and `spend` can be applied to the current\
    \ instance data.\nTaken together, the instance data and functions are called *methods*.\n\
    These can be readily accessed in ways that we shall describe now.\n\n# 7.3.1 Example:\
    \ A Consumer Class\n\nWe'll build a `Consumer` class with\n\n+   - a `wealth`\
    \ attribute that stores the consumer's wealth (data)\n- an `earn` method, where\
    \ `earn(y)` increments the consumer's wealth by $y$\n- a `spend` method, where\
    \ `spend(x)` either decreases wealth by $x$ or returns an error if insufficient\
    \ funds exist\n\nAdmittedly a little contrived, this example of a class helps\
    \ us internalize some peculiar syntax.\nHere how we set up our Consumer class.\n\
    \n```\nclass Consumer:\n\n    def __init__(self, w):\n        \"Initialize consumer\
    \ with w dollars of wealth\"\n        self.wealth = w\n\n    def earn(self, y):\n\
    \        \"The consumer earns y dollars\"\n        self.wealth += y\n\n    def\
    \ spend(self, x):\n        \"The consumer spends x dollars if feasible\"\n   \
    \     new_wealth = self.wealth - x\n        if new_wealth < 0:\n            print(\"\
    Insufficient funds\")\n        else:\n            self.wealth = new_wealth\n```"
