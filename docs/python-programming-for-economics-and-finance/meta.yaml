    # # 11.2 The APIs


    # ## 11.2.1 The MATLAB-style API


    Here''s the kind of easy example you might find in introductory treatments


    ```

    python

    %matplotlib inline

    import matplotlib.pyplot as plt

    plt.rcParams["figure.figsize"] = (10, 6) #set default figure size

    import numpy as np


    x = np.linspace(0, 10, 200)

    y = np.sin(x)


    plt.plot(x, y, ''b-'', linewidth=2)

    plt.show()

    ```


    ![](img/71948b0dce962ae14bde4e2e4d9fbb7b_197_0.png)


    This is simple and convenient, but also somewhat limited and un-Pythonic.


    For example, in the function calls, a lot of objects get created and passed around
    without making themselves known to the programmer.


    Python programmers tend to prefer a more explicit style of programming (run `import
    this` in a code block and look at the second line).


    This leads us to the alternative, object-oriented Matplotlib API.'
