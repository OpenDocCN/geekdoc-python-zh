    \n# 18.5 Exercises\n\n# Exercise 18.5.1\n\nHere is some code that needs improving.\n\
    It involves a basic supply and demand problem.\nSupply is given by\n\n$$q_s(p)\
    \ = \\exp(\\alpha p) - \\beta.$$\nThe demand curve is\n\n$$q_d(p) = \\gamma p^{-\\\
    delta}.$$\nThe values $\\alpha$, $\\beta$, $\\gamma$ and $\\delta$ are **parameters**\n\
    The equilibrium $p^*$ is the price such that $q_d(p) = q_s(p)$.\nWe can solve\
    \ for this equilibrium using a root finding algorithm. Specifically, we will find\
    \ the $p$ such that $h(p) = 0$, where\n\n$$h(p) := q_d(p) - q_s(p)$$\nThis yields\
    \ the equilibrium price $p^*$. From this we get the equilibrium quantity by $q^*\
    \ = q_s(p^*)$\nThe parameter values will be\n\n+   - $\\alpha = 0.1$\n- $\\beta\
    \ = 1$\n- $\\gamma = 1$\n- $\\delta = 1$\n\n```\nfrom scipy.optimize import brentq\n\
    \n# Compute equilibrium\ndef h(p):\n    return p**(-1) - (np.exp(0.1 * p) - 1)\
    \  # demand - supply\n\np_star = brentq(h, 2, 4)\nq_star = np.exp(0.1 * p_star)\
    \ - 1\n\nprint(f'Equilibrium price is {p_star: .2f}')\nprint(f'Equilibrium quantity\
    \ is {q_star: .2f}')\n```"
