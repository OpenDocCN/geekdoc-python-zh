  md: '# Python Programming for Economics and Finance


    # 1.2.1 Common Uses


    Python is a general-purpose language used in almost all application domains such
    as


    +   - communications

    - web development

    - CGI and graphical user interfaces

    - game development

    - resource planning

    - multimedia, data science, security, etc., etc., etc.


    Used and supported extensively by Internet services and high-tech companies including


    +   - Google

    - Netflix

    - Meta

    - Dropbox

    - Amazon

    - Reddit


    For reasons we will discuss, Python is particularly popular within the scientific
    community and behind many scientific achievements in


    +   - Space Science

    - Particle Physics

    - Genetics


    and practically all branches of academia.


    Meanwhile, Python is also very beginner-friendly and is found to be suitable for
    students learning programming and recommended to introduce computational methods
    to students in fields other than computer science.


    Python is also replacing familiar tools like Excel as an essential skill in the
    fields of finance and banking.


    # 1.2.2 Relative Popularity


    The following chart, produced using Stack Overflow Trends, shows one measure of
    the relative popularity of Python


    ![](img/71948b0dce962ae14bde4e2e4d9fbb7b_11_0.png)


    The figure indicates not only that Python is widely used but also that adoption
    of Python has accelerated significantly since 2012.


    We suspect this is driven at least in part by uptake in the scientific domain,
    particularly in rapidly growing fields like data science.'
  merge: -1
  pgno: 11
- img_proc: true
  md: 'For example, the popularity of pandas, a library for data analysis with Python
    has exploded, as seen here. (The corresponding time path for MATLAB is shown for
    comparison)


    ![](img/71948b0dce962ae14bde4e2e4d9fbb7b_12_0.png)


    Note that pandas takes off in 2012, which is the same year that we see Python’s
    popularity begin to spike in the first figure. Overall, it’s clear that


    +   - Python is one of the most popular programming languages worldwide.

    - Python is a major tool for scientific computing, accounting for a rapidly rising
    share of scientific work around the globe.


    # 1.2.3 Features


    Python is a high-level language suitable for rapid development. It has a relatively
    small core language supported by many libraries. Other features of Python:


    +   - multiple programming styles are supported (procedural, object-oriented,
    functional, etc.)

    - it is interpreted rather than compiled.


    # 1.2.4 Syntax and Design


    One nice feature of Python is its elegant syntax — we’ll see many examples later
    on. Elegant code might sound superfluous but in fact it’s highly beneficial because
    it makes the syntax easy to read and easy to remember. Remembering how to read
    from files, sort dictionaries and other such routine tasks means that you don’t
    need to break your flow in order to hunt down correct syntax. Closely related
    to elegant syntax is an elegant design. Features like iterators, generators, decorators
    and list comprehensions make Python highly expressive, allowing you to get more
    done with less code. Namespaces improve productivity by cutting down on bugs and
    syntax errors.'
