- md: "## 19.5 Generators\n\nA generator is a kind of iterator (i.e., it works with\
    \ a `next` function).\nWe will study two ways to build generators: generator expressions\
    \ and generator functions.\n\n### 19.5.1 Generator Expressions\n\nThe easiest\
    \ way to build generators is using *generator expressions*.\nJust like a list\
    \ comprehension, but with round brackets.\nHere is the list comprehension:\n\n\
    ```python\nsingular = ('dog', 'cat', 'bird')\ntype(singular)\n```\n\n```\noutput\n\
    tuple\n```\n\n```python\nplural = [string + 's' for string in singular]\nplural\n\
    ```\n\n```\noutput\n['dogs', 'cats', 'birds']\n```\n\n```python\ntype(plural)\n\
    ```\n\n```\noutput\nlist\n```\n\nAnd here is the generator expression\n\n```python\n\
    singular = ('dog', 'cat', 'bird')\nplural = (string + 's' for string in singular)\n\
    type(plural)\n```\n\n```\noutput\ngenerator\n```\n\n```python\nnext(plural)\n\
    ```\n\n```\noutput\n'dogs'\n```\n\n```python\nnext(plural)\n```\n\n```\noutput\n\
    'cats'\n```\n\n```python\nnext(plural)\n```\n\n```\noutput\n'birds'\n```\n\nSince\
    \ `sum()` can be called on iterators, we can do this\n\n```python\nsum((x * x\
    \ for x in range(10)))\n```\n\n```\noutput\n285\n```\n\nThe function `sum()` calls\
    \ `next()` to get the items, adds successive terms.\nIn fact, we can omit the\
    \ outer brackets in this case\n\n```python\nsum(x * x for x in range(10))\n```\n\
    \n```\noutput\n285\n```\n\n### 19.5.2 Generator Functions\n\nThe most flexible\
    \ way to create generator objects is to use generator functions.\nLet's look at\
    \ some examples.\n\n#### Example 1\n\nHere's a very simple example of a generator\
    \ function\n\n```python\ndef f():\n    yield 'start'\n    yield 'middle'\n   \
