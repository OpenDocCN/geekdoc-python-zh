    \n# Plot time series for each economy\nfor s in s1, s2:\n    lb = f'capital series\
    \ from initial state {s.k}'\n    ax.plot(s.generate_sequence(T), 'o-', lw=2, alpha=0.6,\
    \ label=lb)\nax.set_ylabel('$k_{t}$', fontsize=12)\nax.set_xlabel('$t$', fontsize=12)\n\
    ax.legend()\nplt.show()\n```\n\n![](img/71948b0dce962ae14bde4e2e4d9fbb7b_287_0.png)\n\
    \n## 15.6 Numba 的替代方案\n\n还有其他加速 Python 循环的选项。我们在此快速回顾一下。不过，我们这样做只是为了兴趣和完整性。如果你愿意，可以放心地跳过本节。\n\
    \n### 15.6.1 Cython\n\n与 *Numba* 类似，Cython 提供了一种生成快速编译代码的方法，这些代码可以从 Python 中使用。与\
    \ Numba 的情况一样，一个关键问题是 Python 是动态类型的。正如你所记得的，Numba 通过推断类型来解决这个问题（在可能的情况下）。Cython\
    \ 的方法不同——程序员直接在他们的“Python”代码中添加类型定义。因此，Cython 语言可以被视为带有类型定义的 Python。除了语言规范，Cython\
    \ 还是一个语言翻译器，将 Cython 代码转换为优化的 C 和 C++ 代码。Cython 还负责构建语言扩展——即在生成的编译代码和 Python 之间进行接口的包装代码。虽然\
    \ Cython 有某些优势，但我们通常发现它比 Numba 更慢且更繁琐。\n\n### 15.6.2 通过 F2Py 与 Fortran 接口\n\n\
