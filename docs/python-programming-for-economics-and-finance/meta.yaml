  md: 'In fact, `quad` is an interface to a very standard numerical integration routine
    in the Fortran library QUADPACK.

    It uses Clenshaw-Curtis quadrature, based on expansion in terms of Chebychev polynomials.

    There are other options for univariate integration—a useful one is `fixed_quad`,
    which is fast and hence works well inside `for` loops.

    There are also functions for multivariate integration.

    See the documentation for more details.


    # 12.7 Linear Algebra


    We saw that NumPy provides a module for linear algebra called `linalg`.

    SciPy also provides a module for linear algebra with the same name.

    The latter is not an exact superset of the former, but overall it has more functionality.

    We leave you to investigate the set of available routines.


    # 12.8 Exercises


    The first few exercises concern pricing a European call option under the assumption
    of risk neutrality. The price satisfies

    $$P = \beta^n \mathbb{E} \max\{S_n - K, 0\}$$

    where

    1. $\beta$ is a discount factor,

    2. $n$ is the expiry date,

    3. $K$ is the strike price and

    4. $\{S_t\}$ is the price of the underlying asset at each time $t$.

    For example, if the call option is to buy stock in Amazon at strike price $K$,
    the owner has the right (but not the obligation) to buy 1 share in Amazon at price
    $K$ after $n$ days.

    The payoff is therefore $\max\{S_n - K, 0\}$

    The price is the expectation of the payoff, discounted to current value.


    **Exercise 12.8.1**

    Suppose that $S_n$ has the log-normal distribution with parameters $\mu$ and $\sigma$.
    Let $f$ denote the density of this distribution. Then

    $$P = \beta^n \int_0^\infty \max\{x - K, 0\} f(x) dx$$

    Plot the function

    $$g(x) = \beta^n \max\{x - K, 0\} f(x)$$

    over the interval $[0, 400]$ when $\mu$, $\sigma$, $\beta$, $n$, $K = 4$, $0.25$,
    $0.99$, $10$, $40$.'
