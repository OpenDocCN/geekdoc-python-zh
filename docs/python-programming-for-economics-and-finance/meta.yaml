    # 7.2 OOP Review


    OOP is supported in many languages:


    +   - JAVA and Ruby are relatively pure OOP.

    - Python supports both procedural and object-oriented programming.

    - Fortran and MATLAB are mainly procedural, some OOP recently tacked on.

    - C is a procedural language, while C++ is C with OOP added on top.


    Let''s cover general OOP concepts before we specialize to Python.


    # 7.2.1 Key Concepts


    As discussed an *earlier lecture*, in the OOP paradigm, data and functions are
    **bundled together** into “objects”.

    An example is a Python list, which not only stores data but also knows how to
    sort itself, etc.


    ```

    x = [1, 5, 4]

    x.sort()

    x

    ```


    ```

    [1, 4, 5]

    ```


    As we now know, `sort` is a function that is “part of” the list object — and hence
    called a *method*.

    If we want to make our own types of objects we need to use class definitions.

    A *class definition* is a blueprint for a particular class of objects (e.g., lists,
    strings or complex numbers).

    It describes


    +   - What kind of data the class stores

    - What methods it has for acting on these data


    An *object* or *instance* is a realization of the class, created from the blueprint


    +   - Each instance has its own unique data.

    - Methods set out in the class definition act on this (and other) data.


    In Python, the data and methods of an object are collectively referred to as *attributes*.

    Attributes are accessed via “dotted attribute notation”


    +   - `object_name.data`

    - `object_name.method_name()`'
