    \ [1, 2]))\n```\n\n```\nTrue\nFalse\nTrue\nFalse\n```\n\n一个使用 `all()` 的更 Pythonic\
    \ 的替代方案：\n\n```python\ndef f(seq_a, seq_b):\n    return all([i in seq_b for i\
