  - '[PAGE 38]


    British culture was to see an ever-increasing infusion of the weird and the strange
    into a wide variety of cultural and media texts. It hardly needs remarking upon
    that many popular British TV shows were influenced and actively drew upon absurdism,
    surrealism and Pop Art. Popular 1960s programmes where this is perhaps most evident
    are those that fall within the genre that I shall refer to as ‘sort-of-but-not-really-science-fiction’:
    *The Avengers* (1961–9), *Adam Adamant Lives!* (1966–7), *Department S* (1969)
    and, of course, the seminal *The Prisoner* (1967–8). We can also see the impact
    of these movements on popular prose fiction in this period: Michael Moorcock’s
    fantasy novels, even at their most conventional, toyed with Pop Art and surrealism,
    but entered an entirely new realm of the absurd and bizarre with his experimental
    Jerry Cornelius novels: *The Final Programme* (1969), *A Cure for Cancer* (1971),
    *The English Assassin* (1972) and *The Condition of Muzak* (1979). However, such
    elements and influences could also be witnessed in areas of culture one might
    think of as being less likely to embrace the weird and the avant-garde.


    Poet and author Edward Upward, the ‘last of the Auden Generation’, had a writing
    career that spanned from 1938 to 2003. Despite being a friend and contemporary
    of the Bloomsbury group, he was to see an increased interest shown in his work
    in the wake of the publication of his *The Railway Accident and Other Stories*
    in 1969. Although a Marxist and active member of the Communist Party, Upward eschewed
    the social realism generally utilised by Marxist writers of his generation in
    favour of a dreamy, often horrific, fantastical form of prose that owed much to
    Lewis Carroll and H. P. Lovecraft. This dark yet whimsical surrealism is perhaps
    best illustrated by his series of short stories set in the fictional village of
    Montmere, often co-written with Christopher Isherwood. These stories frequently
    come to an abrupt close, or peter out after only a few pages, only hinting at
    or alluding to a deep lurking and unsettling conflation of the horrific and humorous
    which was to become – or perhaps has always been – a keystone of English humour.
    Indeed, in this grotesque fusion of terror and comedy we can perhaps see in Montmere
    an antecedent of Royston Vasey which was to feature later in the TV series *The
    League of Gentlemen* (1999–2002).


    Scottish poet/songwriter/comedian Ivor Cutler produced work that also demonstrated
    absurdism and surrealism; however, Cutler’s writing was to achieve its disturbing
    and destabilising effect by embracing a childish, nonsensical silliness rather
    than the horrific. Cutler was embraced by popular culture despite him being something
    of a fringe, avant-garde figure. Cutler had his songs broadcast by BBC radio from
    the late 1950s and was to perform regularly on Neil Innes’ various TV programmes
    throughout the 1960s as well as featuring on BBC Radio 1’s *The John Peel Show*
    from 1969. Additionally, he appeared in the Beatles’ 1967 film *Magical Mystery
    Tour*, having won the admiration of Paul McCartney.'
  - '[PAGE 39]


    British culture in the 1960s also witnessed surrealism emerge in the unlikely
    realm of children’s television due to the work of Oliver Postgate who, in collaboration
    with animator and puppet-maker Peter Firmin, produced short TV programmes for
    children that were not only hugely popular with their audiences, but steeped in
    surrealism and fantasy: *Noggin the Nog* (1959–65), *Ivor the Engine* (1959/1975–7),
    *Pogle’s Wood* (1965–7), *The Clangers* (1969–72/1974) and *Bagpuss* (1974). Postgate
    and Firmin’s animations went beyond the sort of fantasy that one is familiar with
    in children’s fiction to produce stories and worlds that were kindly, warm, welcoming
    and yet sinister; conservative yet eccentric; sentimental and silly, yet melancholic;
    parochial yet experimental; ground-breaking yet nostalgic. Indeed, this contradiction
    is further emphasised by the fact that these children’s TV shows were underscored
    by Postgate’s socialist and environmental principles.


    Nonetheless, even in this climate where the abnormal was being assimilated into
    the mainstream, Python was, and is, recognised as being distinct from these other
    programmes and narratives. This may possibly be due to the individual and combined
    talents and influences of six individual members being fused together. It may
    be due to these particular individuals coming together at a particular time when
    the conventional media was open to the challenging, new and untried. But whatever
    the reason, even in the revolutionary and experimental environment of the late
    1960s and early 1970s, *Monty Python’s Flying Circus* truly was something completely
    different.


    *Monty Python’s Flying Circus* did indeed share many features with absurdist theatre,
    and the influence of absurdism is not only demonstrated through observing similarities
    between episodes of *Flying Circus* and the work of absurdist playwrights, but
    openly acknowledged by Terry Jones himself as noted above. Nevertheless, Python
    is far from nihilistic: it is deeply Humanistic (and I do not use the term in
    a pejorative way). Like much cultural output of the 1960s and early 1970s, it
    was essentially satirical: critical of an establishment it saw as not only dull
    and staid, but unfair, unjust and reactionary. Satire attacks injustice, hypocrisy,
    dishonesty and corruption, and therefore – by extension – a satirist believes
    that there is a justice to be had and an honesty and a truth that is obscured
    by lies and corruption. Python – despite its often savage and violent humour and
    its use of absurd and surreal images, characters and situations – was deeply *human*
    in its outlook. Frequently the protagonist in a Python sketch will be (all too)
    ‘human’ and ‘normal’, but thrown into a bizarre and incomprehensible situation.
    We can see this in the film *Monty Python’s Life of Brian* (1979). Brian – the
    protagonist – is very much a flawed ‘ordinary bloke’ who finds himself flung into
    absurd scenarios. These absurd situations often arise due to the pettiness, short-sightedness
    and irrationality of those in positions of power, or systems of power that have
    been corrupted by their own internal absurd rationalities.'
  - '[PAGE 40]


    Cruelties are often perpetrated as a consequence of naivety or incompetence, rather
    than malice (Hudson 2017b: 93–108).


    Likewise, there is a glee in Python that is markedly absent from both Beckett
    and Pinter. Beckett and Pinter both utilise language and word games in order to
    convey meaninglessness and the inability of language to truly communicate. Bran
    Nicol says of Beckett:


    > [H]e was concerned, from the outset, with the peculiar paradox of fiction. It
    was the job of literature, he thought, to reflect the meaninglessness of existence.
    Yet the paradox is that it must do this via language, which is endlessly (in his
    view) meaningful. So his writing attempts the impossible task of conveying meaninglessness
    through meaning, or trying to convey nothingness through something, or silence
    in words. (Nicol 2009: 53)


    He expands upon this point as follows:


    > Beckett’s writing is the counterpart of abstract visual art of the painter Mark
    Rothko, who exemplifies Susan Sontag’s new postmodern sensibility in art, and
    whose paintings defy any viewer to say plausibly what they are ‘about’ other than
    what the title tells us. Beckett’s prose does something equivalent, though of
    course language cannot be as abstract as colour and his fiction still features
    peoples, places, and situations which can be taken as corresponding to those in
    the outside world. Nevertheless his prose writing is dedicated to the idea of
    upholding the notion that fiction is not ‘about’ anything, does not ‘refer’ to
    anything outside itself. (Ibid.: 53)


    Python similarly utilised language and word games, but with a different intent,
    and with a joyful spirit absent from Pinter and Beckett. ‘Eric the Half a Bee’
    (written by Eric Idle and John Cleese and originally released as a single in 1972
    on Charisma Records) takes delight in its own silliness. The humour in the song
    arrives from a number of sources: the forced rhymes, the deadpan delivery of its
    absurdity, the contrast between the rather pompous language and the daftness of
    the subject matter. It is at once complete nonsense, yet has an internal logic
    of its own:


    > Half a bee, philosophically, must *ipso facto* half not be. But half the bee
    has got to bee, *vis-à-vis* its entity – d’you see? But can a bee be said to be
    or not to be an entire bee when half the bee is not a bee, due to some ancient
    injury?


    And yet, while it is about nothing, it has meaning: it is a send-up of popular
    song, and satirises that song format.'
- md: 'Similarly, language games and wordplay are evidenced in Python sketches such
    as in ‘Argument Skit’ (episode 29, ‘The Money Programme’); this routine cheerily
    engages in wordplay with a focus on pedantry and literalism, centring on an argument
    over the meaning of argument. Although this sketch derives its humour from the
    vagaries and frailties of language, it in no way indicates or implies that language
    or existence itself are meaningless. Far from it, this sketch is a comic view
    of frustrations we encounter in our day-to-day lives: not just problems with language,
    but frustrations with civil servants and individuals providing commercial services.
    It may not be a particularly revolutionary satire, but a satire it remains: it
    is ‘about’ and ‘refers’ to the reality the audience mutually experience, albeit
    it uses the mechanism of absurdity to do so.


    It is a mistake to suggest that just because Python is lighter in tone than Pinter
    and Beckett, it is lighter in substance. If we return to the comparison earlier
    in this chapter between the section of Beckett’s *Murphy* and the *Flying Circus*
    animation about the society woman – both of which involve toilets – we may be
    led to think that Beckett’s reference to lavatories carries more intellectual
    ‘clout’. Murphy’s failure even to see the flushing of his ashes down the toilet
    is emblematic of futility and meaninglessness, whereas the *Flying Circus* animation
    is just – surely – an exercise in crude humour in the extreme.


    However, we may interpret this differently in the light of the ‘laughing truth’
    of the Menippean satire as explored by Mikhail Bakhtin. For Bakhtin there is a
    truth and even a poetry in the vulgar and the scatological (Bakhtin 1984b: 112–19).
    Art may, such as in the writing of Rabelais, celebrate the ‘base’ elements of
    life and culture as a means of comically undermining authority and its oppressive
    and dictatorial norms (Stam 1989: 158). If we view this animation sequence with
    Bakhtin’s ideas in mind, we can re-evaluate it not just as vulgar lavatorial humour,
    but as subversive critique of the societal norms of Britain. To do so we have
    to acknowledge that the animation is funny because the subject is not only a woman,
    but an upper-class society woman at that. Our culture tells us that *women do
    not go to the toilet*, they are too busy pressing flowers and writing wistfully
    in their occasional diaries, and posh women certainly don’t go to the toilet,
    and most definitely do not experience loud and explosive bowel movements. By presenting
    us with a scenario in which a woman, and a posh woman at that, goes to the toilet
    and loudly defecates, this sequence undermines our cultural values in two ways.
    Firstly, it bursts the bubble of a particular cultural illusion that women are
    (or should be) somewhat purer in body and mind than men and confronts us with
    the truth that women do in fact go to the toilet. Secondly, it acknowledges that
    we know and have always known that women – even posh ones – go to the toilet,
    and that we know and have always known that a particular reactionary vision of
    ‘femininity’ is a construct and a lie. If we accept this Bakhtinian interpretation,
    then we can see that Python – even at its silliest and crudest – has a more radical
    and challenging quality than we may hitherto have suspected.


    Monty Python''s Flying Circus was and is famed for its lampooning of TV shows
    and TV itself. It regularly satirised established TV formats and genres, such
    as the gameshow in ''Blackmail'' (episode 18, ''Live from the Grill-O-Mat'');
    however, it also questioned and deconstructed the phenomenon of TV itself on a
    number of occasions, and did so as effectively as Pinter and Beckett challenged
    the fabric of the play. In ''Psychiatrist Milkman'' (episode 16, ''Déjà Vu''),
    the sketch is caught in a repeating loop and collapses in on itself. ''Flying
    Fox of the Yard'' (episode 29, ''The Money Programme'') is a very brief sequence
    which – nevertheless – manages to deconstruct itself, the sketch that preceded
    it, television comedy, comedy as a whole and Monty Python''s Flying Circus.


    The cultural and intellectual impact of comedy is often underrated; even William
    Shakespeare''s comedies are considered – by consensus – to be lesser than his
    tragedies and his histories. However, it has been the subject of a considerable
    body of academic study which has interrogated both its social purpose and its
    operational procedures. In *Jokes and Their Relation to the Unconscious* (1905
    [1976]), Sigmund Freud subjected jokes and humour to a psychoanalytic study and
    observed that ''jokes are used as an envelope for thoughts of the greatest substance''
    (Freud 1905 [1976]: 135). Many scholars have since enquired into how comedy is
    utilised as a means of critique and attack on a society, individuals or groups
    within society. Alison Ross particularly looks at how comedy can be put to either
    reactionary or subversive use depending upon whether the humour is targeted by
    those in power against the vulnerable, or whether the humour is aimed at the higher
    power strata in society by the general population, or those who speak for them
    (see Ross 1998). Mikhail Bakhtin''s work on François Rabelais maintains that laughter
    itself is a subversive act against tyranny and oppression (see Bakhtin 1984a).
    However, it is perhaps Henri Bergson (1859–1941) whose work is most crucial for
    understanding the role of humour in both Beckett and Pinter as well as Monty Python.
    Crucially, however, it is perhaps also Bergson who can help us understand the
    key differences between Python and these absurdists.


    Bergson''s position on comedy – given in *Laughter* (1899) – is that ''we laugh
    at human nature when it behaves with machine-like rigidity'' (Howarth 1978: 16).
    This is perhaps best illustrated by his discussion on Molière which W. D. Howarth
    outlines as follows:


    > [C]haracters are comic because of the rigidity of their outlook on life, the
    mechanical inflexibility of their behavioural responses. Monsieur Jourdan, the
    ''would-be nobleman'', who is quite happy to wear a new coat, made with its pattern
    upside-down, once his tailor has persuaded him that this is the latest fashion
    amongst the gentry, is an . . . excellent example of this comic rigidity: everything
    he says or does is determined by the way he thinks the nobility behave. Another
    example is Argan, the hypochondriac hero *Le Malade imaginaire*, who carries his
    obsession with ill-health and medicaments to such lengths that he anxiously asks
    how many grains of salt he should take with his boiled egg. These are caricatural
    portraits, it is true, and sufficient imagination has gone into their creation
    to make them ready targets for our laughter; but the reality they caricature is
    never so remote that they become mere creatures of fantasy. (Ibid.: 106–7)


    We can claim that the humour of the absurdists and Python functions in accordance
    with this mechanical analogy; nevertheless, there is a profound difference in
    how this ‘machine-like rigidity’ manifests itself and is exploited for humorous
    effect. In Pinter and Beckett, life itself is a futile machine and the characters
    in their plays are mere faulty, or even superfluous, components in its meaningless
    grinding operation. By contrast, in Python the humour lies in the mechanical rigidity
    of particular individuals and organisations that inveigle reasonable citizens
    into their ridiculous mechanisms and procedures. Like the (not particularly funny)
    work of Franz Kafka, in which the ordinary, even anonymous, citizen is trapped
    on a downward spiral track of irrational systematisation, Python frequently pitted
    a hapless individual against illogical authority figures and organisations, as
    in, for example, ‘New Cooker Sketch’ (episode 14, ‘Face the Press’). The similarities
    between the work of Kafka and Python are considerably marked; indeed, both Kafkaesque
    and Pythonesque have entered the popular lexicon as adjectives that are freely
    used to indicate the strange, irrational and bizarre. Looking at the ‘New Cooker
    Sketch’ as an illustrative example, the sketch begins in one situation which is
    both absurd and mundane and then accelerates through increasing levels of weirdness
    as it progresses. A woman has bought a new gas cooker and wishes it to be fitted;
    however, the gas board employees who come to fit the appliance give a relatively
    mundane reason why they can’t complete the task. These gas fitters call upon colleagues,
    who also are unable to fit the cooker for other reasons. From this point more
    and more gas board employees are called, each of whom gives an increasingly absurd
    bureaucratic reason why they can’t fit the gas cooker and why another colleague
    needs to be called in to fit the cooker, leading to the suggestion that the woman
    should gas herself to speed up the process. The sketch ends – or rather, morphs
    into another – with the sight of an endless line of gas board employees extending
    down the street. This sketch has similarities to the writing of Kafka not only
    in that it highlights how the individual may be caught in a ludicrously officious
    bureaucratic process, but also by the fact that in the scenario of this sketch
    and much of Kafka’s fiction, the citizen becomes a victim in an irrational trap
    from which they cannot escape.'
  mdcn: '同样，语言游戏和文字游戏在巨蟒剧团的短剧中也有所体现，例如在《辩论小品》（第29集，《金钱计划》）中；这段表演愉快地玩起了文字游戏，聚焦于学究气和字面意思，围绕着“辩论”的含义展开争论。尽管这个短剧的幽默源于语言的变幻莫测和脆弱性，但它绝没有表明或暗示语言或存在本身是无意义的。远非如此，这个短剧是对我们日常生活中遇到的挫折的一种喜剧式呈现：不仅是语言问题，还有对公务员和提供商业服务的个人的挫败感。它可能不是特别具有革命性的讽刺，但它仍然是一种讽刺：它“关于”并“指向”观众共同经历的现实，尽管它使用了荒诞的机制来实现这一点。


    认为巨蟒剧团的基调比品特和贝克特更轻松，因此内容也更浅薄，这是一种错误的看法。如果我们回到本章前面将贝克特的《墨菲》中关于厕所的部分与《飞天大马戏团》动画中关于上流社会女士的片段——两者都涉及厕所——进行的比较，我们可能会认为贝克特对厕所的引用更具智识上的“分量”。墨菲甚至未能看到他的骨灰被冲下马桶，这象征着徒劳和无意义，而《飞天大马戏团》的动画则肯定——无疑——是极端粗俗幽默的练习。


    然而，根据米哈伊尔·巴赫金探讨的“笑的真理”——梅尼普斯式讽刺，我们可能会对此有不同的解读。对巴赫金来说，粗俗和排泄物中蕴含着真理，甚至诗意（巴赫金 1984b:
    112–19）。艺术，例如拉伯雷的作品，可以颂扬生活和文化的“低俗”元素，以此作为喜剧性地颠覆权威及其压迫性和专制规范的手段（斯坦姆 1989: 158）。如果我们带着巴赫金的思想来看待这段动画序列，我们可以重新评估它，而不仅仅是将其视为粗俗的厕所幽默，而是对英国社会规范的颠覆性批判。要做到这一点，我们必须承认这段动画之所以有趣，是因为对象不仅是一位女性，而且是一位上流社会的女士。我们的文化告诉我们，*女性不上厕所*，她们忙于压制花朵和在偶尔的日记中忧郁地书写，而上流社会的女性当然不上厕所，绝对不会有响亮而爆发性的排便。通过向我们展示一个女性，而且是一位上流社会的女性，上厕所并大声排便的场景，这段动画以两种方式颠覆了我们的文化价值观。首先，它打破了女性在身体和思想上比男性更纯洁的特定文化幻想的泡沫，并让我们面对女性事实上会上厕所的真相。其次，它承认我们知道并且一直知道女性——即使是上流社会的女性——会上厕所，我们也知道并且一直知道某种关于“女性气质”的反动观念是一种建构和谎言。如果我们接受这种巴赫金式的解读，那么我们可以看到，巨蟒剧团——即使在其最愚蠢和最粗俗的时候——也具有比我们迄今为止可能怀疑的更激进和更具挑战性的品质。


    《蒙提·派森的飞天大马戏团》过去和现在都以讽刺电视节目和电视本身而闻名。它经常讽刺既定的电视形式和类型，例如在《勒索》（第18集，来自烤架-奥-马特的直播）中的游戏节目；然而，它也在许多场合质疑和解构了电视本身的现象，并且做得像品特和贝克特挑战戏剧结构一样有效。在《精神病医生送奶工》（第16集，似曾相识）中，短剧陷入了一个重复的循环并自我崩溃。《院子飞狐》（第29集，《金钱计划》）是一个非常简短的序列——然而——却成功地解构了自身、之前的短剧、电视喜剧、整体喜剧以及《蒙提·派森的飞天大马戏团》。


    喜剧的文化和智识影响常常被低估；甚至威廉·莎士比亚的喜剧也被——普遍认为——不如他的悲剧和历史剧。然而，它一直是大量学术研究的主题，这些研究探讨了其社会目的和运作程序。在《笑话及其与无意识的关系》（1905
    [1976]）中，西格蒙德·弗洛伊德对笑话和幽默进行了精神分析研究，并观察到“笑话被用作承载最重要思想的信封”（弗洛伊德 1905 [1976]: 135）。此后，许多学者探究了喜剧如何被用作批判和攻击社会、个人或社会群体的手段。艾莉森·罗斯特别关注喜剧如何根据幽默是被掌权者针对弱势群体，还是被普通民众或代表他们的人针对社会更高权力阶层，而被用于反动或颠覆性的用途（见罗斯
    1998）。米哈伊尔·巴赫金关于弗朗索瓦·拉伯雷的著作认为，笑声本身是对暴政和压迫的颠覆性行为（见巴赫金 1984a）。然而，或许亨利·柏格森（1859–1941）的著作对于理解幽默在贝克特、品特以及蒙提·派森作品中的作用最为关键。但关键的是，或许也是柏格森能帮助我们理解巨蟒剧团与这些荒诞派作家之间的关键差异。


    柏格森关于喜剧的立场——见于《笑》（1899）——是“当人性表现得像机器一样僵化时，我们就会发笑”（豪沃思 1978: 16）。这或许最好通过他对莫里哀的讨论来说明，W.
    D. 豪沃思概述如下：


    > [人]物之所以滑稽，是因为他们对生活的看法僵化，行为反应机械地缺乏灵活性。若尔当先生，这位“想当贵族的人”，一旦他的裁缝说服他这是绅士中最新的时尚，就很乐意穿上一件图案做反了的新外套，这是……这种滑稽僵化的绝佳例子：他所说或所做的一切都取决于他认为贵族应有的行为方式。另一个例子是阿尔冈，《无病呻吟》中那位疑病症主角，他对疾病和药物的痴迷达到了如此程度，以至于他焦急地询问煮鸡蛋时应该放多少粒盐。诚然，这些是漫画式的肖像，并且投入了足够的想象力使它们成为我们笑声的现成目标；但它们所漫画化的现实从未如此遥远，以至于它们仅仅成为幻想的产物。（同上：106–7）


    我们可以声称荒诞派和巨蟒剧团的幽默是按照这种机械类比运作的；然而，这种“机器般的僵化”如何表现并被利用以产生幽默效果，存在着深刻的差异。在品特和贝克特的作品中，生活本身是一台徒劳的机器，他们戏剧中的角色只是这台机器无意义运转中出现故障的、甚至是多余的部件。相比之下，在巨蟒剧团的作品中，幽默在于特定个人和组织的机械僵化，他们诱骗合理的公民陷入其荒谬的机制和程序中。就像弗朗茨·卡夫卡（并非特别有趣）的作品一样，普通甚至匿名的公民被困在非理性系统化的螺旋式下降轨道上，巨蟒剧团经常将一个不幸的个体与不合逻辑的权威人物和组织对立起来，例如在《新炉灶小品》（第14集，面对新闻界）中。卡夫卡和巨蟒剧团作品之间的相似之处非常显著；事实上，“卡夫卡式”和“巨蟒式”都已进入大众词汇，作为形容词自由使用，以表示奇怪、非理性和怪异。以《新炉灶小品》为例，这个短剧始于一个既荒谬又平凡的情境，然后随着进展，通过不断增加的怪异程度而加速。一位女士买了一个新的燃气灶并希望安装；然而，来安装设备的燃气公司员工给出了一个相对平凡的理由，说明他们无法完成任务。这些燃气安装工叫来了同事，他们也因为其他原因无法安装燃气灶。从这一点开始，越来越多的燃气公司员工被叫来，每个人都给出了越来越荒谬的官僚理由，说明他们为什么不能安装燃气灶，以及为什么需要叫另一位同事来安装燃气灶，最终建议这位女士应该用煤气自杀以加快进程。这个短剧以——或者更确切地说，演变成了另一个——一排望不到头的燃气公司员工延伸到街道上的景象结束。这个短剧与卡夫卡的作品有相似之处，不仅在于它突出了个体如何可能陷入荒谬的官僚程序，还在于在这个短剧和卡夫卡大部分小说的情境中，公民成为了无法逃脱的非理性陷阱的受害者。'
