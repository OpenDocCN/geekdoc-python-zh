    was transforming itself and defining itself against and critiquing the culture
    and society of an imperial Britain. The 1960s is often envisaged as a colourful
    attack on the repressed, authoritarian and – frankly – drab post-war era and its
    austerity (Hudson 2017a: 171–82). While it is doubtlessly true to envisage post-war
    Britain as a somewhat conservative and stifled environment in which the loss of
