    offered as food in a restaurant. ‘Hey, look,’ some other fish in a tank say, ‘How-ard
    is being eaten’. ‘Makes you think,’ they contemplate. Further on in the film,
    another restaurant guest is persuaded to eat a mint after having consumed so many
    courses everyone knows he is about to explode. And so he does (I will expand on
    this scene further on). Pranks are played; people are tripped up. These examples
    show cruelty that may be mischievous but that exists outside the distinction between
    good and evil. Other scenes show cruelty as a result of efforts to enforce a belief
    system. The revolt of the pirates against The System in the prologue to the film
    is one example: there is the cruelty of the corporate system the workers labour
    in, and there is their cruelty as they, once liberated, maraud, execute victims
    and loot. And there is the corporate boardroom’s debate about ‘viewpoints’, later
    on in the film, which aims to implement penal-ties for not wearing enough hats.
    Their meeting is interrupted by pirates. But as these try to enter the boardroom,
    the pirate building/ship is violently flattened by a skyscraper. The reason? To
    enforce the progress of the film (which it presents as its own morality).


    We find this metaphor or trope of immoral cruelty in other British comedy of the
    time, and also in literary efforts that infuse the science fiction genre with
    philosophical aspirations (and there is quite a bit of science fiction in *The
    Meaning of Life*). The closest point of reference here is writer Douglas Adams.
    The successful and cult-like reception of *The Hitchhiker’s Guide to the Galaxy*
    (1979), as a science fiction story with a philosophical overtone, revolves around
    the search for the meaning of life by groups (aliens this time) who use cruelty
    (the blowing up of a planet) as a means to administer a view-point. Earth has
    to go simply because of some administrative plans, made in the name of a belief
    about progress – no matter who is hurt. *The Hitch-hiker’s Guide to the Galaxy*
    goes a long way in following the philosophical implications of cruelty and institutionalised
    violence, even if it does so tongue-in-cheek (one can easily read it as a philosophical
    manual the same way Robert Pirsig’s *Zen and the Art of Motorcycle Maintenance*
    [1974] had been received, or Ursula K. Le Guin and Italo Calvino’s stories – though
    the influence of those was not as direct as Adams’s novel). Its cheery preoccupation
    made the novel a pressing cultural phenomenon, which, one could argue, the Pythons
    used as a source of inspiration. Terry Jones makes this closeness apparent when
    he recalls that near the inception of *The Meaning of Life*, ‘Douglas Adams phoned
    me up and said he’d just written a book called ‘The Meaning of Liff’. I said:
    ‘Oh no! Our film is going to be called *The Meaning of Life*’ (Michael 2013).
    Of course, the film comments on this: a tombstone in the title sequence of *The
    Meaning of Life* references the (shall we say) coincidence when it misspells its
    own title as *The Meaning of Liff*. The mis-take is erased by a strike of lightning
    but the nudge is made. Reference aside, *The Hitchhiker’s Guide to the Galaxy*
    and *The Meaning of Life* both direct'
