    ## 动画喜剧


    将吉列姆的作品置于更广泛的动画喜剧语境中来进一步定位是恰当的。当然，动画借鉴了所有喜剧形式——杂耍表演、无声电影喜剧、电视情景喜剧、类型戏仿等等——但同样，作为一种视觉媒介，它也提供了自身独特的可能性（参见
    Wells 1998: 127–86, 2013: 497–520; Goldmark and Keil 2011; Buchan 2013: 521–44）。不可避免地，它也从更广泛的绘画传统中汲取养分——儿童插画、政治漫画、连环画、纯艺术——但通过动画形式的呈现，它形成了自身的条件。迪士尼的“九老”中的两位——弗兰克·托马斯和奥利·约翰斯顿，这两位最初的动画师本质上首次创造并理论化了经典手绘动画的十二原则——他们声称，“在动画中，视觉噱头是一系列描绘有趣动作的图画，其引发笑声的效果，既来自于情境的绘制方式，也来自于笑话本身的内容”（Thomas
    and Johnston 1987: 15）。当然，吉列姆并非从事手绘动画，但很明显，他对静态剪纸图像的*策展*，以及用剪刀和颜料对图像的操控，赋予了其情境叙事和可能性。这些图像之所以有趣，既源于其构图（通常是通过重新定位人物和物体，在语境和预期上产生*不协调*），也源于它们随后被赋予的运动方式。许多服务于视觉噱头的这种操控，也常常与象征或隐喻意义产生共鸣——例如，在《圣杯》（Terry
    Gilliam and Terry Jones, 1975）中，吉列姆使用了一张留着长胡子的板球运动员 W. G. Grace 的复古图像作为上帝的面孔，这既是对许多绘画中标志性上帝胡须形象的视觉双关，也是对这位运动员名字及其与上帝般品质相关性的戏谑。


    这些*联想关系*（参见 Wells 1998: 93–6）是吉列姆创造视觉噱头的表征方法的核心，很少依赖迪士尼后来擅长的那种基于人物性格的幽默。相反，它们是视觉不协调感的累积但相关的即兴发挥，这种不协调感源于图像本身的暗示性——例如，一个男人脸的上半部分被定位得仿佛是一排房屋的一部分，他的眼镜让人联想到房屋的窗户。然后，他的眼镜在一次破坏行为中被砸碎，他的眼睛被挖出，仿佛是被窃贼偷走的物品。这里的联想特质在于，将男人的脸视为房屋正面，是因为他的眼镜像窗户，而眼镜和窗户都可以被打破，因此这随后被视为闯入的结果；如此一来，窗户后面的东西——可偷的物品——再次变成了眼镜后面实际存在的眼睛。在许多意义上，这里的叙事描述起来比实际感知要花更长时间。吉列姆依赖于观众的*视觉素养*，这种素养能识别图像中的表征相似性和可供性，从而允许视觉双关和隐喻。吉列姆喜爱早期迪士尼电影，并接受了该工作室动画师理论化和定义的笑话形式，即点状噱头、连续噱头、动作噱头、“有趣的图画”等，但他主要关注的是托马斯和约翰斯顿所说的“场景噱头”和“累积式噱头”的发展（Thomas
    and Johnston 1987: 25–32）。


    托马斯和约翰斯顿指出：


    > 场景噱头是动作结束时的一个定格画面，其中角色因某种外来物质或物体被放置在脸上、周围、上方或内部，而呈现出滑稽的外观。（Thomas and Johnston
    1987: 30）


    这里的幽默本质上源于所涉角色对羞辱的坚忍接受，尤其是当角色所经历的是卡通动画在角色身上可以展现的过度行为的结果时。关键的是，在这种情况下，角色的*形象*被卡通动画中表现身体的可塑性所侵犯，但*角色*本身是不可侵犯的。唐老鸭可以被压扁、拉伸到极限、被物体击打，但他仍然是“唐老鸭”。无论发生了什么，都发生在一个已知的人物身上，而发生的“闹剧”导致观众嘲笑角色*在*情境中的处境以及角色*对*情境的反应。吉列姆将场景*视为*一种情境，而不是以传统意义上创造角色作为视觉符号，这些符号主要以四种方式发挥作用：通过*破坏*、*进入*、*消耗*或*改变*身体或环境来侵犯它——这些是吉列姆在他的绘画中做过的事情，甚至在他还是个孩子的时候（The
    Pythons 2003: 58–9）。吉列姆后来暗示：


    > 我能做的只是粗糙的东西，而粗糙的东西最终不知何故变得暴力。从一开始，那只脚踩下来，然后砰！——你创造了一些美丽的东西，然后你把它压碎了。很多作品都是关于这个的。我处于那个阶段，我在砸东西，这很有趣。那种暴力对我来说总是显得非常有趣。那也是世界非常反暴力的时候，因为战争正在进行。（McCabe
    1999: 35）


    然而，这种“暴力”表达与华纳的四种变形模式——变异、孵化、分裂和倍增（参见 Warner 2002）——有某种对应关系，这些模式都基于动画在表现身体、物体或环境时的可塑性条件，而吉列姆乐于利用这一点。对吉列姆来说，“角色”充其量要么是因其象征或社会身份而被刻意使用的人物（即上述提到的特里维廉或格雷斯），要么是来自媒介视觉来源的标志性图像（即维多利亚时代照片或艺术杰作中的人物）。因此，从根本上说，如果迪士尼2D动画中的场景噱头在某种程度上是一种*有机变形*——是角色在极端情境下可变性的结果（参见
    Wells 1998: 69–75）——那么吉列姆的场景噱头则是*颠覆性变形*的结果，这种变形创造并扩展了极端情境。


    吉列姆对场景的兴趣具体始于使用旧的爱德华时代和维多利亚时代照片即兴创作视觉笑话。人物明显的“摆拍”性质以及“静止”被强加于他们的感觉，使得他们的姿势更加笨拙和僵化。因此，吉列姆的干预针对的是人物缺乏“生命力”，并开始允许破坏、进入、消耗和改变，这些是他视觉干预的常用手段。一个站着的女人斥责一个坐着的男人“坐直”，对他又打又哄，直到他整个人从椅子上转出去（“破坏”）。在另一张图片中，人物似乎在一个女人裙子的衬裙下打斗（“破坏”），她的头缩进身体里去查看（“进入”）。当一个小女孩走近时，争吵的人坚持保持安静，然后一个男人的头出现，取代了女人的头（“进入”）。在另一张图片中，展示了一张士兵的肖像，人物出现在他的嘴里，并在他的勋章下形成，哭喊着他们被困住了，想要逃脱（“进入”）。然后，一个人物从内部切开了头骨顶部（“改变”），并出现获得自由，结果又被“困在”一个高地人的熊皮帽里（“消耗”）。在另一张照片中，一个站着的男性人物像揭开桌布或拿起食物罩展示食物一样，一次性脱掉了坐着女士的全部衣服（“改变”）。男人戴上了一个佐罗式的眼罩，仿佛这能伪装他，而女人则赤裸地坐着，当警察出现在图像前景时，这对夫妇重新穿上了衣服（“改变”）。在一幅坐着的肖像中，一个男人的头发变成了“翅膀”，他的头开始飞走（“改变”），结果被一只从他身体里伸出的手臂收回（“进入”）。在一个更大胆的视觉噱头中，一个毛皮袋似乎吃掉了士兵的下半身（“消耗”），然后变形为一个小女孩的头发，这头发又变成了一个让人想起'
