    the feature film’ (Archer 2016: 56), particularly with regard to the tensions
    between faithfully depicting past historical eras on film and a comedic awareness
    of ‘the impossibility’ of doing so (Smith 2010: 120).


    The second key contemporary strand of literature is the growing body of work on
    representations of sexuality and gender within Python’s film and television output.
    Challenging previous work, which has championed Python’s progressive critiques
    of myth, convention, authority and institutions, this scholarship has identified
    Python’s portrayal of gender and sexuality as the ‘blind spot in the Pythons’
    comic project’, with copious examples existing across their television and film
    work which suggest ‘an investment in traditional gender roles that persists’ in
