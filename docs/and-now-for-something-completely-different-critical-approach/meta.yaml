    公平地说，我期望大多数学者和文化批评家——无论是研究邪典媒体还是其他领域——都会认可这些观点；因此问题依然存在：是什么导致了邪典电影学者普遍忽视喜剧，尤其是《蒙提·派森》？（这里最大的讽刺之一是，根据我的经验，邪典电影学者和学术界几乎普遍对《蒙提·派森》表示喜爱！）是因为喜剧被认为太主流了吗？应该指出的是，这并没有阻止对《哈利·波特》、《星战》和漫画角色系列的批评成为一个小产业。是因为喜剧不够怪异，无法施展学术魔法吗？是因为尽管学者们理解所有文本都需要解释才能有意义，但对喜剧的文化偏见依然盛行，喜剧仍然被认为比其他类型缺乏深度——意义较小吗？对喜剧的犹豫是否仅仅源于这样的认识：虽然幽默很复杂，但没有什么比解释笑话更无趣——或者比解释笑话的乏味之人更无聊？


    邪典媒体学者对《蒙提·派森》的忽视尤其令人费解，因为人们普遍接受《蒙提·派森》是邪典崇拜的焦点。例如，罗伯特·休伊森在概述《蒙提·派森》和审查制度的历史时写道，在英国，“‘《蒙提·派森》’迅速成为一种邪典……它的活力和热情传递给了观众，观众为这一切的荒谬而欣喜”（Hewison
    1981: 8）。玛西娅·兰迪在她关于《蒙提·派森的飞行马戏团》的精彩著作中，引用了评论家安德鲁·克利夫1989年对该节目的类似历史描述：“蒙提·派森已经20岁了……有一段时间，这个节目在BBC的第二频道上萎靡不振……很快它就有了邪典追随者”（Landy
    2005: 100）。这种邪典随后传播到美国海岸：“许多美国年轻人看到了它[《飞行马戏团》]并相信它，以至于它成为了一种校园邪典”（Wilmut quoted
    in Landy 2005: 26）。兰迪随后对此评论道，


    > 邪典这个词暗示了一种特定的、通常与粉丝文化相关的、投入的、集体的和强烈的情感反应。《飞行马戏团》因其对权威的不敬和对电视非常规的使用而吸引了年轻人和不满的群体——它揭示了在英国、美国和其他地方，人们内心深处渴望社会和文化一致性的替代品。（同上：26）


    派森似乎几乎从一开始就具有邪典性，这一点得到了邪典电影批评家的承认，尽管他们随后迅速转向讨论其他邪典媒体。马蒂斯和塞克斯顿在其权威教科书《邪典电影：导论》（2011）中仅用了半段篇幅讨论《蒙提·派森》，主要涉及《蒙提·派森与圣杯》（特里·吉列姆和特里·琼斯，1975）和《布莱恩的一生》（特里·琼斯，1979），写道“对一些人来说，蒙提·派森是荒谬的，对另一些人来说是愚蠢的，对另一些人来说是超级聪明的，对许多人来说它兼具所有这些——之所以成为邪典，是因为它颠覆了幽默的概念”（Mathijs
    and Sexton 2011: 227）。里昂·亨特在其《邪典英国电视喜剧：从里夫斯和莫蒂默到惊魂小镇》中认为《蒙提·派森的飞行马戏团》是素描喜剧的“经典对象”（Hunt
    2013: 100）——然后根本没有提供任何分析，只是简要提到了对某个素描（1970年的“殡仪员素描”；见同上：204–5）“品味低下”的担忧。在沃勒菲尔出版社关于邪典电影的“邪典传记”系列丛书中，没有收录《圣杯》或任何其他派森电影（这简直令人费解），霍伯曼和罗森鲍姆经常被引用的《午夜电影》（1991）在讨论100多部邪典电影时也完全没有提到《蒙提·派森》。格雷戈里·A·沃勒在讨论午夜电影时确实提到了《蒙提·派森与圣杯》，但只是为了将其与另一部邪典电影——《洛基恐怖秀》（吉姆·沙曼，1975）的独特地位进行对比！他解释道，


    > 作为其特殊地位的进一步证明，《洛基恐怖秀》到20世纪80年代中期已被美国媒体单独挑出并赋予邪典和文化现象的地位，并被学术学者分析，而《蒙提·派森与圣杯》和[奇奇和冲的]《飞车党》则没有。（Waller
    1991: 173）


    而这种分析的缺失依然存在：除了兰迪（她的关注点较少在于思考《蒙提·派森》的邪典特质，而更多在于概述该电视剧的历史和重点）、杰弗里·S·米勒在《完全不同：英国电视与美国文化》中对《蒙提·派森的飞行马戏团》在美国接受情况的思考，以及贾斯汀·史密斯在《威纳斯与我们：英国电影中的邪典电影与电影邪典》中对《圣杯》的简要思考之外，似乎派森的命运就是经常被电影和媒体批评家提及为邪典崇拜的焦点，但很少被讨论——事实上，据我所知，迄今为止还没有对《蒙提·派森的飞行马戏团》或其电影的邪典特质进行持续分析，也没有对蒙提·派森邪典进行社会学思考。


    一旦注意到派森在其全部作品中恰恰展示了邪典电影学者在分析中倾向于强调的那些特征，邪典电影学者对《蒙提·派森》的忽视就更难理解了。例如，兰迪在谈到《飞行马戏团》（但可推广到所有派森作品）时观察到，派森们有意识且巧妙地突出和操纵电视和电影惯例，并颠覆文化期望的各种方式。她指出，派森们在连续性和分段上进行了实验，导致对电视媒体的自我反思和批判性处理（Landy
    2005: 2–3；另见Miller 2000: 130–3）。她提请人们注意他们“高雅与低俗文化”的混合，将文学、哲学和历史的典故与闹剧和无厘头结合起来（Landy
    2005: 3）。她认为“派森的文化政治利用了语言、社会制度和媒体中的荒谬和滥用”（同上：30），等等。许多邪典电影学者寻找的颠覆性震颤、文化评论和彻头彻尾的怪异当然存在，但在派森这里，我们遇到了一个奇特的案例：典型的邪典媒体却几乎没有得到学术关注，这可能主要是由于与愚蠢的关联以及根深蒂固的对喜剧的偏见。因此本章：在我剩余的篇幅里，我将尝试通过聚焦《圣杯》来考虑《蒙提·派森》的一些邪典电影特质，以弥补这一疏漏；然后我将简要讨论另一个理论化不足的领域：文化差异在邪典崇拜中的作用。


    ## 来看看这个体制内在的暴力吧！


    分析是什么让某物成为邪典电影，可以说常常遭受与某些情况下对幽默的思考相同的弊病：*寻求最终结论*。正如导致某人觉得某事好笑的因素可能因背景、情境和性情而有很大不同，导致一部电影形成邪典追随者的因素也可能不同。事实上，试图对一个可以涵盖《卡萨布兰卡》（迈克尔·柯蒂斯，1942）、《洛基恐怖秀》、《鬼玩人》（山姆·雷米，1981）和《摇滚万万岁》的类别得出具体结论，是一项棘手的任务。就整体概括而言，我们能做的最好的也许是泰洛特的结论：邪典迷在电影中享受的是一种“舒适的差异”，这暗示着“不仅关于电影本身，而且关于他们自身性格的某些不寻常、值得注意和有价值的东西”（Telotte
    1991: 5）。然而，在转向1975年《蒙提·派森与圣杯》的具体邪典特质之前，我想提出一个邪典电影标准，虽然并非适用于所有情况，但在我看来适用于其中许多——当然也适用于派森的节目和电影：可引用性。


    在某种程度上，我这里的提议与翁贝托·艾柯的断言有关，即邪典电影由其缺乏有机统一性来定义，艾柯将其描述为“光荣的不连贯”（Eco 1985: 4）。艾柯写道，


    > 我认为，要将一部作品转化为邪典对象，必须能够将其拆解、打碎或分解，以便之后只记住其中的部分，而不管它们与整体的原始关系如何。（同上）'
