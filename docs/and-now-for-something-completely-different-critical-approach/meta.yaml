    # 9. ‘POLITICAL CORRECTNESS’, REVERSAL AND INCONGRUITY: DYNAMICS OF HUMOUR IN
    *LIFE OF BRIAN*


    Kathleen J. Cassity


    Does so-called ‘political correctness’ cause people today to take offence too
    easily, to the point of stifling the collective comic muse? Does comedy from prior
    eras, such as the work of the Monty Python troupe, often fail to hold up for the
    same reason? In short, has the polarised sociocultural climate of the 2020s rendered
    humour impossible, especially when it is deliberately irreverent as is the case
    with Monty Python’s body of work?


    On the surface, it may seem easy to answer a quick ‘yes’ to all of the above.
    One does not need to delve very far into social media or online publications before
    encountering some version of the sentiment, ‘We can’t tell jokes any more because
    people today are too easily offended’, and much recent humour scholarship focuses
    on this issue. At first glance, John Cleese would appear to agree with the frequently
    articulated belief that ‘political correctness’ has stifled comedy, having posited
    that today’s social norms may have a censorious effect on comic production. In
    his 2015 autobiography *So, Anyway . . .*, Cleese hypothesised that much of the
    Monty Python troupe’s work could not be produced today due to a zeitgeist of ‘political
    correctness’ that represses humour.


    However, a more nuanced understanding of the dynamics and power relationships
    shaping comic cultural production suggests a situation that is both more complex
    and more optimistic. In this chapter, I will interpret selected scenes from *Life
    of Brian* (1979) in order to demonstrate that while some aspects of Monty Python’s
    comedy may initially appear at odds with shifting social norms, this is not universally
    the case. In fact, much of that film’s humour'
  - '[PAGE 161]


    still resonates today, largely because much of its humour stems from incongruity
    and reversal rather than superiority. While some might write off attention to
    power differentials in superiority-based humour as mere ‘political correctness’,
    I would argue that inattention to power dynamics does indeed pose an ethical problem.
    Fortunately, superiority-based humour directed at those with less power and/or
    status is not the only potential source of humour. Even when some aspects of comedy
    from earlier eras are deemed to be problematic in retrospect, other sources of
    humour, such as incongruity and reversal, not only allow earlier comedies to withstand
    the test of time, but at least some aspects of those comedies may become even
    *more* relevant in light of cultural and historical developments.


    I focus here on *Life of Brian* because, on several fronts, it lends itself particularly
    well to analysis from a twenty-first-century perspective. First, while this film
    has arguably been the most controversial of the Monty Python troupe’s body of
    work – a status it held even prior to its highly publicised and picketed release
    – the aspects that garnered widespread disapproval have shifted in the subsequent
    forty years. Where concern over blasphemous depictions of the divine provided
    the source of the original controversy, contemporary culture is more likely to
    locate problems in the film’s portrayal of human beings from marginalised groups.
    Second, *Life of Brian* is often considered to be Monty Python’s emblematic work,
    braiding together many of the themes explored earlier in the troupe’s sketch comedy
    and in the *Holy Grail* film. Finally, *Life of Brian* lends itself particularly
    well to illustrating both incongruity and reversal as sources of humour – strategies
    which continue to make the film largely salient today despite some of its dated
    aspects. As Danielle Bobker states, it is possible to move towards a ‘humor-positive
    frame’ when comedy stems from incongruity rather than from superiority, and when
    comedy that does depend on superiority ‘punches up’ rather than ‘punching down’
    in terms of power (Bobker 2017). *Life of Brian*, for the most part, engages both
    of these dynamics, rendering its satirical critique of status-quo power relations
    still relevant in many respects today. Considering the power dynamics at play
    in this film provides a framework for understanding why not all comedy – even
    that from an earlier era – is equally open to charges of ‘political incorrectness’,
    even as we recognise *some* earlier comedy as problematic from a contemporary
    social justice perspective. (Here it should be noted that both problematic and
    acceptable sources of humour may be located in the same cultural production.)
    Fortunately, when it comes to comedy, derisive jokes that poke fun at the less
    privileged are not the only option. Understanding the dynamics at play allows
    comedy to remain thinkable even in our current polarised, sometimes too-humourless
    world.


    Before turning to my reading of the film, it is helpful to provide a brief contextual
    summary of comic theory. For all the contemporary complaints about ‘political
    correctness’ rendering humour obsolete, the assumption that humour'
- md: 'is inherently problematic from a moral standpoint is clearly not new. For well
    over two millennia, thinkers from Aristotle and Plato to Hobbes and Konrad Lorenz
    have posited humour as inherently unethical, based on the underlying assumption
    that laughter always and necessarily stems from a sense of ‘superiority’. As Morreall
    summarises this longstanding philosophical assumption: ‘The oldest, and probably
    still most widespread theory of laughter is that laughter is an expression of
    a person’s feelings of superiority over other people’ (Morreall 1983: 4). Plato
    viewed laughter as a condition in which ‘our attention is focused on vice’ (ibid.),
    and Morreall adds, ‘Aristotle agreed with Plato that laughter is basically a form
    of derision’ (ibid.: 5). This theory of laughter as necessarily derisive would
    remain dominant for many centuries, with Hobbes positing that laughter arises
    from ‘a sudden glory arising from some conception of some eminency in ourselves,
    by comparison with the infirmity of others’ (quoted in ibid.). Voltaire broke
    from centuries of conventional thought by positing a completely different view,
    that ‘laughter always arises from a gaiety of disposition, absolutely incompatible
    with contempt and indignation’ (ibid. 8). Yet, as Morreall points out, Voltaire’s
    stance is, like the superiority theory of humour itself, incomplete: ‘What is
    wrong with this response to the superiority theory is that it denies an obvious
    fact – that people sometimes [do] laugh in derision at other people’ (ibid.: 8).
    The laughter of derision, Morreall emphasises, has always been with us. Where
    the superiority theory fails, however, is in its attempt towards totalisation
    – the claim that *all* laughter is necessarily derisive. (This assumption has
    also contributed to centuries of venerating the serious/tragic above the comic.)


    While much humour indeed derives from superiority, what these thinkers failed
    to consider is the importance of power dynamics in determining humour’s ethical
    implications. When a ‘joke’ derives from an assumption of superiority on the part
    of someone with relative power and status and is targeted towards someone with
    less of both, the humour may quickly become sadistic. Shifts in our collective
    cultural thinking, both in the United States and globally, have generated greater
    awareness of this potential sadistic streak – even as some complain that attention
    to power dynamics constitutes a stifling form of ‘political correctness’. Despite
    that widespread complaint, I would argue that any attempt at humour that kicks
    those who are already down is not funny. Yet considering superiority out of context,
    without attention to the power dynamics at play, does not alone determine whether
    an attempt at humour is likely to be deemed offensive. Here it is important to
    ask contextual questions: who holds power, status and privilege over whom? Do
    those power dynamics reverse or reinscribe existing sociocultural norms? What
    broader social purpose is being targeted by the humour? When ‘superiority’ is
    invoked as a means of questioning rather than reinscribing status-quo power relations,
    the effect can be to bring differentials into sharp relief, in the process affirming
    the humanity of those in power-down positions and making visible a power asymmetry
    that was previously taken for granted. (Whether this reversal results in meaningful
    and lasting social change or simply provides a ‘release valve’ for the built-in
    tensions surrounding hegemonic social roles is, of course, a question open to
    discussion.)


    Reversal can be understood as a form of incongruity, which Morreall identifies
    as one of the most potent sources of comedy. Drawing upon Schopenhauer and Kant,
    Morreall explains incongruity as an unexpected disruption in expectations: ‘We
    live in an orderly world, where we have come to expect certain patterns among
    things, their properties, events, etc. We laugh when we experience something that
    doesn’t fit into these patterns’ (Morreall 1983: 16). While Kant and Schopenhauer
    differed in how they conceptualised the mechanisms of incongruity, Morreall succinctly
    summarises a key principle uniting them both: ‘What causes laughter, if you will,
    is a mismatch between conceptual understanding and perception’ (ibid.: 18). As
    Bobker puts it: ‘Today humor philosophers are most convinced by the idea, first
    fully elaborated in the 18th century, that laughter is a response to incongruity:
    something familiar suddenly looks strange, and the resulting sense of surprise
    pleases us’ (Bobker 2017). Reversal of power dynamics, similarly, surprises by
    offering ‘just the opposite of what everyone is expecting’. Reversal is often
    more pointed than other forms of incongruity, since it has the potential to uncover
    implicit biases and cultural assumptions. Since power dynamics are often invisible
    to those in a privileged location, humour and satire often use reversal as a strategy
    to render those dynamics visible – an approach that, of course, harkens back to
    Jonathan Swift and that continues to be prevalent today.


    While some humour in *Life of Brian* may be found problematic by contemporary
    viewers (as I will demonstrate shortly), a substantial portion of the film’s humour
    draws on the dynamics of incongruity and reversal of culturally hegemonic power
    dynamics. Consequently, *Life of Brian* can still stand today as a salient critique
    of human folly and hypocrisy, the blindness and pervasiveness of power, and the
    dangers of mob mentality.


    Take, for example, the ‘stoning’ sequence near the beginning of the film. In a
    humorous instance of dramatic irony, the predominance of women in the crowd is
    obvious to anyone with full sensory capacity. When the Priest (played by Cleese)
    asks the obvious question, ‘Are there any women here today?’, he appears to be
    fooled when the assembled women respond by suddenly dropping their voices into
    the lower male register. The joke here is not so much on women as on the arbitrariness
    and the blindness of a patriarchal society that excludes women for no other reason
    than ‘It is written, that’s why!’ The scene marks a recognition that such arbitrary
    rules are often broken, while mocking the gullibility of those who enforce the
    status quo (in this case, the Priest). The power dynamics then invert literally,
    as the mob summoned by the Priest against the accused blasphemer turns its frenzied
    mentality against the Priest and hurls its stones at him instead. The arbitrariness
    of ‘It is written, that’s why’ is capable of being inverted, with the enforcers
    of arbitrary power suddenly as vulnerable to capricious regulations as the masses
    were previously. (Unfortunately for Brian and the other victims of the Roman imperialist
    regime, no such inversion takes place at the end of the film.)


    A similar dynamic is at play in the scene where the nearly inarticulate ‘cave
    man’ jailers in the dungeon turn out to be acting. The joke, once again, is on
    the easily fooled establishment that exploits the working class (whom it perceives,
    incorrectly, to be stupid and disabled) in order to perform its enforcement function.
    The clandestine intelligence of the jailers suggests a larger-picture reality
    that does not align with hegemonic beliefs about what various social classes are
    capable of achieving. Ruptures, fissures, dissent and disobedience seep through
    the accepted narrative, once again revealing social roles (whether dictated by
    class, race, ethnicity or gender) to be arbitrary and socially constructed rather
    than essentialised. In this scene, the two jailers who are assumed by the establishment
    to be sub-human are actually demonstrating far more wit and intelligence than
    their overlords, finding enjoyment in mocking those ostensibly ‘above’ them by
    over-playing roles that they – and only they – know to be artificially imposed.


    Similarly, towards the end of the film when the crowd publicly mocks Pilate (played
    by Michael Palin) for his speech impediment, Pilate mistakenly believes that he
    is being revered. Throughout this scene, he remains clueless that, far from being
    the target of anyone’s admiration, he is in fact the butt of a massive collective
    joke. While it may be possible to interpret this scene as mocking the differently
    abled and therefore falling under the umbrella of problematic superiority, I would
    argue that both Pilate’s self-delusion and his all-encompassing power – one man
    in charge of millions with the power to make life-or-death decisions and eliminate
    those who do not comply with his mandates – would mitigate that interpretation.
    (Given the rise of dictatorially inclined national leaders around the globe who
    often persist in believing themselves to be widely popular despite the fact that
    grasping and maintaining their power has necessitated a considerable amount of
    chicanery, this scene is perhaps even more relevant today than when the film was
    released.) When Pilate’s ‘very good friend in Rome’, Biggus Dickus (played by
    Graham Chapman), arrives on the scene and reveals that he speaks with a lisp,
    it becomes clear that, despite the pretensions of the ruling class to godhood,
    they are in fact not only human and flawed, but self-deluded as well. Brian (also
    played by Chapman), of course, is also clearly imperfect and mortal, especially
    when juxtaposed alongside the Christ for whom he is continually mistaken. Unlike
    the ruling class, however, Brian remains keenly aware of his own mortality – even
    as those around him continue in their collective delusions and insist on venerating
    him to a status that he is ill-equipped to assume.'
  mdcn: '从道德立场来看，幽默本身存在问题的观点显然并非新论。两千多年来，从亚里士多德、柏拉图到霍布斯和康拉德·洛伦兹的思想家们，都基于“笑声总是且必然源于‘优越感’”这一潜在假设，认为幽默本质上是不道德的。正如莫雷尔对这一长期存在的哲学假设所总结的：“关于笑声最古老、可能至今仍最普遍的理论是，笑声表达了一个人对他人优越感的感受”（Morreall
    1983: 4）。柏拉图将笑声视为一种“我们的注意力集中在恶习上”的状态（同上），莫雷尔补充道：“亚里士多德同意柏拉图的观点，认为笑声基本上是一种嘲弄的形式”（同上：5）。这种认为笑声必然带有嘲弄性的理论在许多世纪里一直占据主导地位，霍布斯提出笑声源于“通过与他人的弱点比较，突然产生的一种对自己某种卓越之处的荣耀感”（引自同上）。伏尔泰打破了几个世纪的传统观念，提出了完全不同的观点，即“笑声总是源于一种愉悦的性情，与轻蔑和愤慨绝对不相容”（同上
    8）。然而，正如莫雷尔指出的，伏尔泰的立场，就像幽默优越论本身一样，是不完整的：“这种对优越论的回应的问题在于，它否认了一个明显的事实——人们有时确实会嘲笑他人”（同上：8）。莫雷尔强调，嘲弄的笑声一直伴随着我们。然而，优越论的失败之处在于其试图全面化——声称*所有*笑声都必然是嘲弄性的。（这一假设也促成了几个世纪以来对严肃/悲剧高于喜剧的尊崇。）


    虽然许多幽默确实源于优越感，但这些思想家未能考虑到权力动态在决定幽默伦理影响方面的重要性。当一个“笑话”源于拥有相对权力和地位的人对自身优越感的假设，并针对权力和地位较低的人时，幽默可能迅速变得残忍。在美国和全球范围内，我们集体文化思维的转变，使人们更加意识到这种潜在的残忍倾向——即使有些人抱怨关注权力动态构成了一种令人窒息的“政治正确”。尽管存在这种普遍的抱怨，我认为任何试图以落井下石为乐的幽默都不好笑。然而，脱离语境考虑优越感，而不关注所涉及的权力动态，并不能单独决定一种幽默尝试是否可能被视为冒犯。这里重要的是提出语境性问题：谁对谁拥有权力、地位和特权？这些权力动态是颠覆还是重申了现有的社会文化规范？幽默针对的是什么更广泛的社会目的？当“优越感”被用作质疑而非重申现状权力关系的手段时，其效果可能是使差异变得鲜明突出，在此过程中肯定了处于权力弱势地位的人的人性，并使先前被视为理所当然的权力不对称变得可见。（当然，这种颠覆是否会导致有意义且持久的社会变化，还是仅仅为围绕霸权社会角色的内在紧张提供了一个“释放阀”，是一个有待讨论的问题。）


    颠覆可以被理解为一种不协调的形式，莫雷尔将其认定为喜剧最有力的来源之一。借鉴叔本华和康德的观点，莫雷尔将不协调解释为预期中意外的中断：“我们生活在一个有序的世界里，我们已经习惯于期待事物、其属性、事件等之间存在某些模式。当我们体验到不符合这些模式的事物时，我们就会发笑”（Morreall
    1983: 16）。虽然康德和叔本华在如何概念化不协调的机制上有所不同，但莫雷尔简洁地总结了一个将两者联系起来的关键原则：“如果可以这么说的话，引起笑声的是概念理解与感知之间的不匹配”（同上：18）。正如博克所说：“当今的幽默哲学家最信服的是18世纪首次充分阐述的观点，即笑声是对不协调的反应：熟悉的事物突然显得陌生，由此产生的惊讶感让我们愉悦”（Bobker
    2017）。同样，权力动态的颠覆通过提供“与所有人预期完全相反的东西”而令人惊讶。颠覆通常比其他形式的不协调更尖锐，因为它有可能揭示隐含的偏见和文化假设。由于权力动态对于处于特权位置的人来说往往是不可见的，幽默和讽刺经常使用颠覆作为一种策略，使这些动态变得可见——这种方法当然可以追溯到乔纳森·斯威夫特，并且在今天仍然很普遍。


    虽然《布莱恩的一生》中的一些幽默可能被当代观众认为有问题（正如我即将展示的那样），但该片的大部分幽默都借鉴了不协调动态和颠覆文化霸权权力动态。因此，《布莱恩的一生》在今天仍然可以作为对人类愚蠢和伪善、权力的盲目性和普遍性以及暴民心态危险的鲜明批判。


    例如，影片开头附近的“石刑”场景。在一个充满戏剧性讽刺的幽默场景中，任何感官健全的人都能明显看出人群中女性占多数。当祭司（由克莱斯饰演）提出显而易见的问题“今天这里有女人吗？”时，聚集的女性突然压低声音模仿男性音调回应，他似乎被愚弄了。这里的笑话与其说是针对女性，不如说是针对父权社会的任意性和盲目性，这种社会排除女性的理由仅仅是“这是写下来的，所以就是这样！”这个场景标志着人们认识到这种任意的规则经常被打破，同时嘲弄了那些维护现状的人（在这种情况下是祭司）的轻信。随后，权力动态发生了字面上的逆转，祭司召集来对付被指控亵渎神明者的暴民，将其狂热的心态转向祭司，反而向他投掷石块。“这是写下来的，所以就是这样”的任意性能够被颠覆，任意权力的执行者突然变得像之前的大众一样容易受到反复无常的法规的影响。（不幸的是，对于布莱恩和罗马帝国主义政权的其他受害者来说，影片结尾并没有发生这样的颠覆。）


    类似的动态也出现在地牢中几乎无法清晰表达的“穴居人”狱卒实际上是装出来的场景中。笑话再次针对的是容易上当的统治阶级，它剥削工人阶级（错误地认为他们愚蠢且残疾）以执行其强制功能。狱卒的秘密智慧暗示了一个与霸权信念不符的更大图景的现实，即关于不同社会阶层能够实现什么的信念。裂痕、分歧、异议和不服从渗透到被接受的叙事中，再次揭示了社会角色（无论是由阶级、种族、民族还是性别决定的）是任意的、社会建构的，而非本质化的。在这个场景中，被统治阶级认为低于人类的两个狱卒，实际上表现出了远超其主人的机智和智慧，他们通过过度扮演那些——只有他们知道——是人为强加的角色，以嘲弄那些表面上“高于”他们的人为乐。


    同样，在影片接近尾声时，当人群公开嘲笑彼拉多（由迈克尔·佩林饰演）的言语障碍时，彼拉多错误地认为自己受到了尊敬。在整个场景中，他始终没有意识到，他远非任何人钦佩的对象，实际上是一个巨大集体笑话的靶子。虽然可以将这个场景解释为嘲弄残障人士，因此属于有问题的优越论范畴，但我认为彼拉多的自我妄想和他无所不包的权力——一个人掌管数百万人，有权决定生死并消灭那些不服从他命令的人——会减轻这种解释。（考虑到全球范围内专制倾向的国家领导人的崛起，他们常常坚持认为自己广受欢迎，尽管攫取和维持权力需要大量的欺骗手段，这个场景在今天可能比影片上映时更具现实意义。）当彼拉多的“罗马的好朋友”比格斯·迪库斯（由格雷厄姆·查普曼饰演）出场并透露他说话口齿不清时，很明显，尽管统治阶级自诩为神，但他们实际上不仅是有缺陷的凡人，而且还是自我妄想的。当然，布莱恩（也由查普曼饰演）也明显不完美且终有一死，尤其是与他不断被误认的基督相比。然而，与统治阶级不同，布莱恩敏锐地意识到自己的必死性——即使他周围的人继续沉浸在集体妄想中，并坚持将他尊崇为他无力承担的地位。'
