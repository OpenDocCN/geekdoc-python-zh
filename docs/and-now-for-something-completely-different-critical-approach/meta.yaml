    ## CONCLUSION


    In his book on parody in British film and television, Neil Archer confronts directly
    the problem of trying to “‘explain’ something as intractable and frequently abstract
    as humour, especially in the case of Python’s absurdist style’ (Archer 2016: 55).
    At the beginning of his chapter on Python films, Archer admits to his concern
    about the ‘silly’ being deemed ‘somehow out of analytical bounds’ (ibid.), and
    advocates for ‘digging a bit further’ in relation to the ‘often complex or allusive
    nature’ of Python comedy (ibid.). This has been my goal in this chapter, but I
    would acknowledge that any single-minded analytical pathway through Python is
    doomed to find complication and contradiction as much as enlightenment. On the
    one hand, it is possible to see and hear Python music and musical references as
    indicative of the team’s broader strategies and preoccupations. On the other,
    Python music raises unique interpretative challenges, in that its most famous
    examples in the programmes, films and albums have had an afterlife far beyond
    the expectation of their originators. If ‘Always Look on the Bright Side of Life’
    was quickly taken up, according to the account in *Monty Python Speaks*, by the
    military – apparently, those aboard the *HMS Sheffield* during the 1983 Falklands
    conflict sang it when the boat had been struck by an Exocet missile, as did RAF
    pilots in the Gulf War (Morgan 1999: 195) – does this limit or enhance its subversive
    take on a certain strand of patriotic, stoical British music often belittled elsewhere?
    How does this make a fit with ‘Sit on My Face’, the repeated damage done to ‘Jerusalem’
    or the mockery of national anthems like the Marseillaise, seen performed by a
    man operating a tape recorder hidden in his nose (episode 9, ‘The Ant, an Introduction’)?
    Either way, the complex and persistent recontextualising of Python music – songs
    and motifs transferred from one medium to another, placed in different narrative
    positions, or woven into new shapes and forms – poses questions about the stability
    and parameters of the canon: for instance, pre- and post-Python musical endeavours
    have been included in retrospectives and compilations, and Neil Innes (for a while)
    performed his own material when touring with the group. And a final contradiction
    stems from the proof, upon closer inspection of Python texts and author reflections,
    that the team were simultaneously flippant, particular, deliberate and obfuscating
    in their choice of musical subjects and referents. To paraphrase the title of
    their first musical compilation album, Monty Python *sings*, but it also listens
    carefully, and demands its audience and scholars do the same.


