    as an ideology. It is a way of organising life and beliefs about life and its
    inspirations that supersedes any and all other considerations for worldviews.
    It is encapsulated in ‘ways to do things’ that become their own command, simply
    because they offer practical ways of living life – so much so that life is what
    happens when you’re making other plans (to paraphrase an overused quotation).
    For instance, it meant that the Pythons were now parcelling out and scheduling
    their time commitments. Whereas with previous films each member of the team was
    always on hand, with *The Meaning of Life* members only showed up on schedule,
    when needed (Michael 2013). For an art form like comedy (especially in its troupe
    form) that relies on group dynamics, this meant the structure *became* the film’s
    meaning – spontaneity traded for production efficiency. One implication of this
    was a more rigorous division of labour (one that is cheekily implied at the beginning
    of the short feature via a cardboard-clipped time sheet). If, at times, as some
    reviewers remarked, the film appears a bit laboured, then bureaucracy can certainly
    be pointed at as a cause (McNally 2012). Gilliam, who was in charge of *The Crimson
    Permanent Assurance*, explains how the division of labour, which he calls ‘they
