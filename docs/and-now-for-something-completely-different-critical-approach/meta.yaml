    apparent that there was a concentration of younger respondents in this group (particularly
    in the 18–35 age categories), pointing, crucially, to Python’s durability across
    generations.


    KATE EGAN


    ![Figure 12.1 The higher percentage of 18–35-year-olds in the ‘Dad Memories Group’
    compared to the *Monty Python Memories* database as a whole.](img/ebe0b8e55d891830377e938813c6b978_213_0.png)


    In addition, there was also a shift in the number of women within this group when
    compared to the dataset as a whole – specifically, and as illustrated by Figure
    12.2, an 8 per cent rise in female responses and a 7 per cent drop in male responses.


    The focus on fathers in these Python memories connects, in some ways, with an
    emerging tradition of work within fan studies focused on familial influence and
    intergenerational fandom, in studies on, for instance, music fandom (Vroomen 2004),
    soap opera fandom (Harrington and Bielby 2010), football fandom (Dixon 2013),
    film star fandom (Ralph 2015), fandom of the *Alien* film franchise (Barker *et
    al.* 2015) and wrestling fandom (Alcott 2019). All of this work, to differing
    degrees, has acknowledged the ‘role of the family’ as ‘a recurring social context’
    in people’s accounts of their history of fandom (Barker *et al.* 2015: 43), noting,
    in particular, how family members can function as gatekeepers, curators, tastemakers
    or mentors, initiating younger relatives into an engagement with a film, television
    show, star, sport, novel or music artist. As


    ![Figure 12.2 The higher percentage of female respondents in the ‘Dad Memories
    Group’ compared to the *Monty Python Memories* database as a whole.](img/ebe0b8e55d891830377e938813c6b978_214_0.png)


    acknowledged in Vroomen and Dixon’s work in particular, these activities have
    clear connections to Bourdieu’s concepts of cultural capital and habitus – to
    the ways in which ‘cultural knowledge’ is ‘acquired through family socialisation’
    (Claessens and Dhoest 2010: 50). However, scholars like Harrington and Bielby
    and Sarah Ralph have also considered the ways in which these shared investments
    relate to child and adolescent developmental processes, particularly in considering
    how forms of media can function in the history of relations between mothers and
    daughters. For Harrington and Bielby, mothers can operate, in this context, ‘as
    a central figure’ in a daughter’s ‘negotiation into adulthood as mediated through
    soap opera’, facilitating ‘adolescent explorations’ and providing ‘moral guidance’
    on a daughter’s shifting emotional relationships with others through engagement
    with soap opera’s fictional narratives (Harrington and Bielby 2010); while, for
    Ralph, shared engagement with film stars can ‘open up conversations between mothers
    and daughters about potentially awkward subjects during adolescence’, particularly
    in relation to sexual identity and romance (Ralph 2015: 1).


    These existing insights on intergenerational fandom prompt a series of questions,
    when thinking about the higher concentration of female respondents in the *Monty
    Python Memories* project’s ‘Dad Memories Group’. If, as this previous


    KATE EGAN


    scholarship has indicated, mothers and daughters can use shared media engagements
    to discuss puberty and romantic and sexual relationships, then what might be the
    motivations, benefits and consequences of a shared engagement with Monty Python
    between fathers and daughters? Is this shared investment in Python informed by
    different forms of emotional engagement and ways of looking at the world? How
    might this relate to Python’s status as sketch comedy, rather than dramatic narrative?
    These are particularly complex questions, when considering two factors. Firstly,
    Python’s status as an all-male comedy troupe who have been critiqued, particularly
    since the 1990s, for the sexually objectified roles played by Carol Cleveland
    in *Flying Circus*, as well as the ‘grotesque’ and caricatured female characters
    (the ‘Pepperpots’) the Pythons have played in drag (Whybray 2016: 172; see also
    Wagg 1992). Secondly, the fact that respondent attitudes to these more problematic
    aspects of Python’s comedy – and to their relationships with their fathers – will
    inevitably be complicated by the fact that the respondents are recalling, from
    the present, memories of Python and their fathers that are located, in some cases,
    10–15 years ago (in the early 2000s) and, at the other extreme, 40 years ago (in
    the mid-1970s or even earlier). Consequently, these recollections of cross-gender
    relationships around Python will inevitably, as Jackie Stacey has noted, involve
    complex negotiations between changing ‘public discourses’ around Python and ‘private
    narratives’ relating to their ‘own personal histories’ and ‘the feelings’ they
    have ‘about their past, present and future selves’ (Stacey 1993: 63, 70). Further
    to this, the strong focus on paternal influence within these memories of first
    encounters with Monty Python seems at odds with Python’s status as comedy producers
    fuelled by an anti-establishment spirit, which involved, for Eric Idle, being
    ‘anti-authority, anti-school, anti-teachers, anti-church, anti-mothers, anti-fathers’
    (cited in Mills 2014: 134) and, therefore, as Robert Hewison notes, revolting
    against the ‘deferential society’ that the Python team ‘were introduced to by
    their parents’ (Hewison in Jones et al. 2009). With this in mind, a further consideration,
    when analysing these responses, is the extent to which the association between
    Python and parental influence appears to have impacted on Python’s ability to,
    in Jeffrey Weinstock’s terms, retain (or not retain) ‘its transgressive edge’
    (Weinstock 2007: 111).


    In the analysis that follows, these questions will be considered through exploration
    of the discursive repertoires/ways of talking about the association between fathers
    and Monty Python among the female respondents within the *Monty Python Memories*
    project’s ‘Dad Memories Group’. While it should be noted that some of these memories
    recount activities involving fathers and mixed-gender children (female respondents
    and their brothers or sisters), the focus will be on the father–daughter relations
    primarily discussed in these memories, in order to shed light not only on Python’s
    durability across decades but also its surprising status as the focus of a cross-gender
    form of intergenerational media fandom.'
  mdcn: '年长一代，尤其是55岁以上的人群，对喜剧普遍持怀疑态度，他们拒绝接受绝大多数新晋喜剧演员，而更倾向于欣赏那些年代较早、风格“通俗”的喜剧演员。相比之下，“高雅”喜剧的品味在44岁及以下人群中似乎更为普遍……一个重要的促成因素可能是1979年后喜剧的审美化趋势，这恰好与年轻一代的文化社会化进程同步发生。（同上：60）


    因此，弗里德曼在此揭示了1964年及之前出生者与1965年及之后出生者之间潜在的代际品味断层。1980年代英国“另类喜剧热潮”的兴起——以里克·梅奥尔、阿列克谢·塞尔和本·埃尔顿等喜剧演员为代表——被弗里德曼视为关键里程碑，它使年轻喜剧爱好者开始认识并接纳喜剧的“艺术潜力”（同上：87），从而将他们对喜剧的品味和态度与父母及祖父母辈区分开来。对弗里德曼而言，1980年代的这股热潮是英国喜剧地位转变的关键时刻，因为这些喜剧演员“都秉持一种实验性的喜剧理念，自觉地试图突破此前主导该领域的‘通俗’风格”，而早期的实验者如蒙提·派森和《边缘之外》“从统计角度看……在1960年代和1970年代仅占整体喜剧产出的一小部分”（同上：19）。与之前引用的派森研究类似，弗里德曼在评估英国喜剧的当代地位、文化等级和影响力时，似乎依据的是基于作品创作和传播即时时刻的喜剧与观众偏好历史图谱。此处未被考虑的是（在其他关于派森及更广泛喜剧观众的现有研究中也是如此）像派森这样经久不衰的喜剧“超越起源的意义历史性”（Klinger
    1997: 112）——即它们在最初接受时刻之后数年乃至数十年间持续传播所产生的历时性影响，无论是在本国还是国际上，尤其是在家庭录像技术、互联网和流媒体兴起之后。


    事实上，“蒙提·派森记忆”项目的其他结果似乎挑战并复杂化了弗里德曼关于英国喜剧品味代际差异的发现。例如，我对数据集中自由文本回复进行的首批搜索之一显示，受访者首次接触派森的记忆中，最普遍的趋势之一是提及“爸爸”或“父亲”，共有1,098条回复在其通常较长的答案中至少提及了其中一个词，相比之下，仅有576条回复提及“母亲”、“妈妈”或“Mom”。在单独分析这1,098条回复（以下简称“爸爸记忆组”）时，明显可以看出该组中年轻受访者（尤其是18-35岁年龄段）较为集中，这关键地指向了派森跨越代际的持久影响力。


    凯特·伊根


    ![图12.1 “爸爸记忆组”中18-35岁人群的比例高于*蒙提·派森记忆*数据库整体比例。](img/ebe0b8e55d891830377e938813c6b978_213_0.png)


    此外，与整个数据集相比，该组中女性人数也发生了变化——具体而言，如图12.2所示，女性回复比例上升了8%，男性回复比例下降了7%。


    这些派森记忆中对父亲的关注，在某种程度上与粉丝研究领域新兴的、聚焦家庭影响和代际粉丝现象的研究传统相呼应，例如关于音乐粉丝（Vroomen 2004）、肥皂剧粉丝（Harrington
    and Bielby 2010）、足球粉丝（Dixon 2013）、电影明星粉丝（Ralph 2015）、《异形》电影系列粉丝（Barker *et al.*
    2015）和摔跤粉丝（Alcott 2019）的研究。所有这些研究都在不同程度上承认了“家庭角色”作为“反复出现的社会背景”在人们描述其粉丝历史时的作用（Barker
    *et al.* 2015: 43），并特别指出家庭成员如何充当守门人、策展人、品味塑造者或导师，引导年轻亲属接触电影、电视节目、明星、体育、小说或音乐艺术家。正如


    ![图12.2 “爸爸记忆组”中女性受访者的比例高于*蒙提·派森记忆*数据库整体比例。](img/ebe0b8e55d891830377e938813c6b978_214_0.png)


    弗鲁门和迪克森的研究尤其指出的，这些活动与布迪厄的文化资本和惯习概念有着明确的联系——即“文化知识”如何“通过家庭社会化获得”（Claessens and
    Dhoest 2010: 50）。然而，哈林顿、比尔比和莎拉·拉尔夫等学者也考虑了这些共同投入如何与儿童和青少年发展过程相关联，特别是在思考媒体形式如何在母女关系史中发挥作用。对哈林顿和比尔比而言，在这种背景下，母亲可以“作为核心人物”，在女儿“通过肥皂剧协商步入成年”的过程中，促进“青少年探索”，并通过参与肥皂剧的虚构叙事，为女儿不断变化的情感关系提供“道德指导”（Harrington
    and Bielby 2010）；而对拉尔夫而言，共同参与电影明星相关活动可以“为母女之间开启关于青春期潜在尴尬话题的对话”，特别是关于性身份和浪漫关系（Ralph
    2015: 1）。


    这些关于代际粉丝现象的现有见解，在思考*蒙提·派森记忆*项目“爸爸记忆组”中女性受访者比例较高时，引发了一系列问题。如果如先前


    凯特·伊根


    研究所指出的，母女可以利用共同的媒体参与来讨论青春期以及浪漫和性关系，那么父女之间共同参与蒙提·派森的动机、益处和后果可能是什么？这种对派森的共同投入是否基于不同的情感参与形式和看待世界的方式？这与派森作为素描喜剧（而非戏剧叙事）的地位有何关联？考虑到两个因素，这些问题尤其复杂。首先，派森作为一个全男性喜剧团体的地位，自1990年代以来因其作品中卡罗尔·克利夫兰在《飞行马戏团》中扮演的性客体化角色，以及派森成员反串扮演的“怪诞”和漫画化的女性角色（“胡椒瓶”）而受到批评（Whybray
    2016: 172; 另见 Wagg 1992）。其次，受访者对派森喜剧中这些更具争议性方面的态度——以及他们与父亲的关系——不可避免地会因受访者是从当下回忆起派森和父亲的记忆而变得复杂，这些记忆在某些情况下可追溯到10-15年前（21世纪初），在另一些极端情况下则可追溯到40年前（1970年代中期甚至更早）。因此，正如杰基·斯泰西所指出的，这些围绕派森的跨性别关系回忆，不可避免地涉及不断变化的关于派森的“公共话语”与他们“个人历史”及“对过去、现在和未来自我的感受”的“私人叙事”之间的复杂协商（Stacey
    1993: 63, 70）。此外，这些首次接触蒙提·派森的记忆中对父亲影响的强烈关注，似乎与派森作为受反建坛精神驱动的喜剧创作者的地位相悖，对埃里克·艾德尔而言，这种精神意味着“反权威、反学校、反教师、反教会、反母亲、反父亲”（引自
    Mills 2014: 134），因此，正如罗伯特·休伊森所指出的，派森团队是在反抗他们“父母所介绍的”“顺从社会”（Hewison in Jones et
    al. 2009）。考虑到这一点，在分析这些回复时，另一个需要考虑的因素是，派森与父母影响之间的关联在多大程度上影响了派森保持（或未能保持）其“颠覆性锋芒”的能力（Weinstock
    2007: 111）。


    在接下来的分析中，将通过探讨*蒙提·派森记忆*项目“爸爸记忆组”中女性受访者关于父亲与蒙提·派森关联的话语库/谈论方式来审视这些问题。虽然应该指出，其中一些记忆描述了涉及父亲和不同性别子女（女性受访者及其兄弟姐妹）的活动，但重点将放在这些记忆中主要讨论的父女关系上，以揭示派森不仅跨越数十年的持久影响力，而且其作为跨性别代际媒体粉丝现象焦点的惊人地位。'
