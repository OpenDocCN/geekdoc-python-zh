    2004: 55），既作为故事片段之间的简短插曲，也如前所述，作为电影文本新篇章的装饰首字母，通过屏幕上“电影之书”这一比喻得以具象化。除了在《白雪公主与七个小矮人》（1937）到《罗宾汉》（1973）之间，迪士尼动画长片频繁使用故事书作为开场装置外，英国电影如大卫·里恩的《远大前程》（1946）和鲍威尔与普雷斯伯格的《红菱艳》（1948）也运用了这一手法来致敬其文学来源。巨蟒剧团最初引入故事书装置，是为了以一种经济高效的方式快速介绍组成亚瑟追寻队伍的骑士，取代了拉森认为“可能也打算做成完全动画序列”的蒙太奇段落（Larsen
