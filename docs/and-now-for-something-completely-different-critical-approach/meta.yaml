  - '[PAGE 72]


    These eight years saw the emergence of another generation of comedians spearheading
    the satire boom, like Peter Cook, Dudley Moore, Jonathan Miller and Alan Bennett
    of *Beyond the Fringe* fame; and David Frost, for whom all British Pythons worked
    at some point in their pre-Python careers (Chapman *et al.* 2003: 155–6). It also
    saw the ‘Swinging London’ phenomenon gain popularity (Landy 2005: 18), epitomised
    by the Beatles, whose fame, accents and their disruption of existing social and
    cultural structures, as well as some stylistic and thematic choices in their films,
    were precursors to much of Python itself. The Beatles can also be seen to function
    as a link between the Goons and the Pythons, between one generation of comedians
    and the next. Not only did both the members of the Beatles and of the Oxbridge
    Mafia listen to *The Goon Show* (Wilmut 1982: xvii), but there are also tangible
    links in the form of friendships and professional relationships forged in comedy.
    The Beatles’ acceptance of a collaboration first with George Martin, their producer,
    and then with Richard Lester, director of two of their feature films, hinged on
    the two men having previously worked with the Goons, Martin producing their comedy
    record output and Lester directing the Goons’ short film, *The Running Jumping
    and Standing Still Film*, as well as episodes of *A Show Called Fred*, a televisual
    incarnation of *The Goon Show* (Rawlings 2017: 183). Then, continuing the cycle,
    in 1979 it was George Harrison who, after EMI pulled out, put up the money for
    the Pythons’ *Life of Brian* (Chapman *et al.* 2003: 366–7). While emphasising
    the influence of the Goons on the coming generation of comedians, Roger Wilmut
    also speaks of a ‘real watershed’ that came as *The Goon Show* was airing its
    last episodes in 1960, and *Beyond the Fringe* first appeared at the Edinburgh
    Festival the same year (Wilmut 1982: xvii–xviii). One of the key aspects of this
    watershed could be seen to centre on the representation of the war in the two
    generations’ comedy output.


    # PYTHON AND THE WAR


    When looking at two Monty Python sketches that are explicitly set in the Second
    World War, the ‘Lethal Joke’ sketch from the first episode of *Monty Python’s
    Flying Circus* and the ‘Mr Hilter’ sketch from the twelfth, a paradigm shift from
    the Goons’ approach to the war becomes apparent. As seen in the brief juxtaposition
    of the pudding-attack trope in the two programmes, Python uses contemporary audio-visual,
    particularly televisual, modes to contextualise its sketches – especially when
    it comes to reframing historical events (Brock 2015: 54). This is precisely the
    premise of *The Complete and Utter History of Britain*, the pre-Python programme
    written by Michael Palin and Terry Jones; and, as seen below, in both of the two
    Python war sketches the Second World War gets recontextualised this way'
  - '[PAGE 73]


    within contemporary televisual and/or societal modes, shifting the temporal settings
    for comedic purposes. Landy calls these the ‘explosions and physical mutilation
    that expand in meaning to include dismemberment of cultural forms’ (Landy 2005:
    44); her choice of words gains extratextual relevance when thinking about the
    implications of explosions in a Second World War context.


    The first case study from *Monty Python’s Flying Circus* appears in the very first
    episode of the series. The episode entitled ‘Whither Canada?’ uses and lampoons
    a number of television formats such as quiz shows in the ‘Famous Deaths’ sketch,
    television interviews in the ‘Sir Edward Ross’ sequence, art programmes in the
    ‘Arthur “Two-Sheds” Jackson’ and the ‘Picasso Cycling Tour’ sketches and television
    documentaries in the ‘Lethal Joke’ sketch. This context already signals the aforementioned
    shift, positioning the sketch within a contemporary framework. The plot exploits
    the Nazi super-weapon theme of ‘Tales of Men’s Shirts’, but turns it around, into
    a British super-weapon that won us the war: a joke that is so funny, it kills
    whoever hears it. After a few casualties during the invention and the testing
    of the joke, it is translated, strictly word by word, to German and is deployed
    in action, killing masses of German soldiers. The enemy attempts, without success,
    to invent their own master weapon, and after the war is over the joke is buried
    forever, never to be told again. The sketch itself could, seemingly, easily be
    part of a *The Goon Show* plot; there are a few crucial points both in the narrative
    and more importantly in the format of the sketch that indicate significant differences.
    On the one hand, the ‘Lethal Joke’ sketch unambiguously positions the British
    as victorious; on the other hand, it frames the events as a documentary spoof,
    referencing them as the past, positioning the war as distant, as something to
    remember.


    By unpacking the sketch, we notice both the several formal and stylistic elements
    that indicate its generic position as documentary spoof, and also the initial
    ambiguity of the timelines in the sketch. There is jaunty background music, an
    omniscient voice-over (Eric Idle) who announces that ‘[i]n a few moments [Ernest
    Scribbler] will have written the funniest joke in the world’ (Chapman *et al.*
    1990: 10), and a contemporary news reporter (Terry Jones), who reports on the
    events from Ernest Scribbler’s front garden. The presence of both the omniscient
    narrator and the reporter, however, blurs the line between past and present, as
    the presence of the reporter seems to signal that what we see is happening that
    very moment, while the voice-over clearly references it as the past. The ambiguity
    prevails: as the police arrive at the scene and start their investigation, the
    voice-over stops, and it seems that even if the invention of the lethal joke happened
    in the past, it must have been the recent past, since no elements in the *mise-en-scène*
    indicate a temporal shift.


    It is not until the voice-over returns that the temporal setting of the sketch
    is clarified, and is indicated to be the Second World War. The voice-over and'
  - '[PAGE 74]


    the images converge in depicting how the military top brass became interested
    in the joke and began to utilise it to improve Britain’s chance against the Nazis
    in the war. Gradually the sketch turns into a BBC dramatised documentary-spoof
    with sequences such as the testing of the joke on Salisbury Plain, the Joke Brigade
    in action, and a scene in a Nazi interrogation room. All these shots are in colour,
    indicating that it is the dramatised version of the historical events that we
    see. There are no attempts to present the events in black-and-white, for instance,
    which would tap into our sense of realism and create the impression that we see
    real footage of the war. What further accentuates the documentary form is the
    character of the Colonel (Graham Chapman), featured in the sketch as a military
    expert outlining the development of the joke as an efficient weapon in actual
    battle.


    As in *The Goon Show* episodes, the ‘Lethal Joke’ sketch is also full of explosions;
    in the case of the Python sketch, however, nobody is hurt, not even symbolically,
    by the bombs and shells. In the case of the ‘Lethal Joke’ sketch it is not physical
    weapons, but humour and intelligence that have a devastating effect on people.
    This way the Pythons subvert the very essence of the Goons’ contextualisation
    of the war: in *The Goon Show*, even in the sketches that were set in the present
    the characters fell victims to Second World War weaponry. In contrast, in *Monty
    Python’s Flying Circus* even in the Second World War it was not rifles and grenades
    that were doing the killing but humour.


    Furthermore, in *The Goon Show* the Second World War episodes depict events from
    an insider perspective with Grytpype and Moriarty being the criminal minds behind
    even Nazi Germany’s hideous acts, while the Pythons shift the focus and report
    on the killing joke as outsiders. The sketch uses the form of a dramatised historical
    documentary-spoof, with two-dimensional characters who function merely to illustrate
    the events; there are no main characters involved, creating a distance that signals
    that even when somebody dies as a result of hearing the joke, it is inconsequential.
    In this sketch, just like in the *Goon Show* episodes examined above, the narrative
    evokes the war on a large scale: the military apparatus is involved, so are the
    Nazi Germans, Prime Minister Chamberlain, and even Hitler. In the ‘Lethal Joke’
    sketch, however, the lack of main characters and the fact that the sketch serves
    to outline the events inform its positioning as distant and external.


    In the sketch, its creators use the techniques offered by television not only
    for lampooning television genres but also for creating comedy by visual effects,
    just as *The Goon Show* used radio techniques to their advantage. The Pythons
    effectively satirise pre-war politics of appeasement, and by juxtaposing a well-known
    joke with the well-known and menacing image of Hitler at a Nazi rally, they also
    subvert his threat for comedic purposes. When the voice-over starts describing
    the devastating effect of the joke, he says that it was ‘[o]ver sixty thousand
    times as powerful as Britain’s great pre-war joke’.'
- md: 'At this moment there is a cut to the archive footage of Neville Chamberlain
    brandishing the ‘Peace in our time’ piece of paper. The voice-over goes on, ‘and
    one which Hitler just couldn’t match’. Cut to archive footage, this time of Hitler,
    presumably from a propaganda piece, where we see him in a close-up, and the superimposed
    subtitles read: ‘My dog’s got no nose.’ Cut to a young soldier who replies to
    Hitler, and the subtitles are: ‘How does he smell?’ Back to Hitler speaking, the
    subtitles read: ‘Awful’ (Chapman *et al.* 1990: 12).


    Another element that links the ‘Lethal Joke’ sketch to *The Goon Show* is the
    use of a German accent that apparently the Pythons enjoyed just as much as the
    Goons did. The joke itself, which can be heard throughout the entire sketch only
    in German – to spare the viewers from an untimely death perhaps – is in fact merely
    German-sounding gibberish. The scene in the Nazi interrogation room also provides
    a splendid opportunity to speak English with a German accent.


    > *Cut to Nazi interrogation room. An officer from the joke brigade has a light
    shining in his face. A Gestapo officer is interrogating him; another (clearly
    labelled ‘A Gestapo Officer’) stands behind him.*


    Nazi (John) Vott is the big joke?

    Officer (Michael) I can only give you name, rank, and why did the chicken cross
    the road?

    Nazi That’s not funny! (*slaps him*) I vant to know the joke.

    Officer All right. How do you make a Nazi cross?

    Nazi (*momentarily fooled*) I don’t know . . . how do you make a Nazi cross?

    Officer Tread on his corns. (*does so; the Nazi hops in pain*)

    Nazi Gott in Himmel! That’s not funny. (Chapman *et al.* 1990: 13)


    After these dramatised scenes – the Gestapo office, the German joke laboratories
    and their own V-joke ‘Der ver zwei peanuts, valking down der strasse, and von
    vas . . . assaulted! Peanut. Ho-ho-ho-ho’ (ibid.: 13) – the camera cuts to a modern
    BBC2 interview, where the voice-over/reporter (Eric Idle) can be seen in a woodland
    glade. He closes the sketch with an appropriately solemn and majestic speech about
    the Second World War and joke warfare that was ‘banned at a special session of
    the Geneva Convention’ (ibid.: 13–14). As he walks away an inscription becomes
    visible: ‘To the unknown Joke’. Using Eric Idle’s character as the omniscient
    voice-over/reporter, the sketch effectively frames joke warfare, and the wider
    context of the war, as an event in the past, playing with televisual modes to
    emphasise the distance between the then and the now, positioning the war as something
    to remember. As Landy suggests, the use of the German accent itself, and I would
    argue the success of the British joke as opposed to the failure of the German
    one, taps into tropes and ‘myths about the superiority and culturally sustaining
    nature of British humor’ as well (Landy 2005: 81).


    The other Second World War sketch unpacked in this chapter is the ‘Mr Hilter/Minehead
    By-election’ sketch in episode 12, framed by another television genre spoof, a
    fast-paced report programme on current affairs entitled *Spectrum*, which returns
    to the screen right after the ‘Minehead by-election’ sequence finishes. The sketch
    itself begins with an ordinary British couple, Mr and Mrs Johnson (Eric Idle,
    Maureen Flanagan), arriving at a boarding house in Minehead, Somerset. The Johnsons
    discuss their journey at length with the landlady (Terry Jones), who then turns
    to introduce them to the residents of the boarding house. Among them are Adolf
    Hitler (John Cleese), Heinrich Himmler (Michael Palin) and Joachim Von Ribbentrop
    (Graham Chapman), who are poring over a map, allegedly planning a hike to Bideford.
    Hitler, wearing full Nazi uniform, is introduced to the Johnsons as Mr Hilter,
    Himmler is in evening dress with an Iron Cross on, presented as Mr Bimmler, and
    Von Ribbentrop is in uniform as well, introduced by the landlady as Ron Vibbentrop.
    The Nazi leaders even receive a phone call from a ‘Mr McGoering’, after which
    the landlady tells the Johnsons about Mr Hilter’s plans to stand as National Bocialist
    candidate at the North Minehead by-elections.


    Alexander Brock evokes the incongruity theory of humour in connection with *Monty
    Python’s Flying Circus*, contextualising the programme as a series of ‘potential
    point[s] of attack for incongruities’ (Brock 2015: 55). This seems particularly
    apt when interrogating the ‘Mr Hilter’ sketch, especially when placing it within
    the context of the Second World War. The core of the sketch is that the Pythons
    took Hitler just as he was: his looks (although taller, Cleese gave quite an impressive
    impersonation of Hitler), his accessories, uniform, anger, the scene of yelling
    from balconies, Italian mates, cheering and Sieg Heils – though only from a gramophone
    – and his companions, Von Ribbentrop and Himmler, and transferred him to Britain,
    late 1960s. They seem not to change a thing: Hitler’s beliefs, methods and aims
    are the same in the sketch as what one knows from history books. He still is a
    National Socialist preaching loudly to the masses, promising them things that
    ‘historically belong to them’ (Chapman et al. 1990: 153) and he still wishes to
    invade Poland.


    > **Landlady:** Oh it’s the North Minehead by-election. Mr Hilter’s standing as
    a National Bocialist candidate. He’s got wonderful plans for Minehead.

    **Johnson:** Like what?

    **Landlady:** Well for a start he wants to annex Poland.

    [ . . . ]

    **Hitler:** I am not a racialist, but, and this is a big but, we in the National
    Bocialist Party believe das Überleben muss gestammen sein mit der sneaky Armstrong-Jones.
    Historische Taunton ist Volkermeining von Minehead.

    **Himmler:** Mr Hitler, *Hilter*, he says that historically Taunton is part of
    Minehead already. (Ibid.: 152–3)


    The Pythons effectively use the clash of these notions: Hitler and his world taken
    without changes from 1930s–1940s Nazi Germany and mixed into British small-town
    consumer society of the late 1960s, a milieu characterised by a ‘presumption of
    affluence’ (Landy 2005: 16), for comedic purposes. This way Python, once more,
