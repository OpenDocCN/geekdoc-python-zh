    accompanying choice of alternative, non-heteronormative lifestyles, as well as
    the influence of American popular culture and the prevalent fear of increasing
    Americanisation.


    Furthermore, the Pythons’ lasting cult status and idiosyncratic engagement with
    British society and culture, their explicit focus upon the (post-)adolescent state
    of mind, and their alleged countercultural edge (see Mills 2014: 134) legitimate
    an analytical focus on the *Flying Circus* era in particular. Drawing upon previous
    accounts of Monty Python’s roots in 1960s British (popular) culture (Landy 2005)
    and counterculture (Mills 2014), this chapter sets out to further examine their
    early years within this highly conflicted sociocultural context. As has been widely
    noted (see Marwick 1998; Harris and O’Brien Castro 2014), both the 1960s in general
    as well as British culture of the time display a very contradictory disposition
    that is defined by a coexistence of progressive and reactionary tendencies (e.g.
    empire nostalgia). Throughout the chapter, several sketches that are linked to
    key aspects of the era will be analysed and further contextualised with similar
    treatments of British culture and society in 1960s British cinema.


    # ‘LET’S DO IT A DADA’: SURREALIST AND PSYCHEDELIC TENDENCIES IN *MONTY PYTHON’S
    FLYING CIRCUS* (1969–73)


    The *Flying Circus* series engages with 1960s British culture on different levels:
    it integrates several significant artistic influences while simultaneously explicitly
    addressing specific sociocultural issues of the time (e.g. the generational conflict
    or the affluent, permissive society) as well as including a wide range of (pop-)cultural
    references.¹ Mills aptly observes a coexistent affinity *for* and critical engagement
    *with* the counterculture in relation to Eric Idle. Accordingly, ‘[f]rom *Do Not
    Adjust Your Set* through Python and the Rutles, we have a body of work which opens
    a window on the 1960s roots of his comedy’ (Mills 2014: 126). He then names several
    key influences on Idle that can likewise be extended to the *Flying Circus* series:
    the early 1960s satire boom (*Beyond the Fringe*), the Beatles, surrealist art
    and ‘the Dadaist artistic movement which informed the child-like surrealism of
    the Python troupe’ (ibid.), as well as the Bonzo Dog Doo-Dah Band. All mentioned
    influences further share a power structures-ridiculing degree of the Bakhtinian
    carnivalesque (ibid.). Accordingly, they echo the 1960s anti-authoritarian and
    free-spirited countercultural and psychedelic mindset. Russell Duncan further
    identifies ‘[c]anonical items associated with psychedelia: visual arts, sex, drugs,
    new music, and hippie fashion’ (Duncan 2013: 155), while Kevin Donnelly underscores
    that ‘[t]he British variant of psychedelia was perhaps more aesthetically than
    politically motivated’ (Donnelly 2001: 21). As Mills stresses, the 1960s psychedelic
    tendency also employed a surrealist element to a certain degree. At the same time,


