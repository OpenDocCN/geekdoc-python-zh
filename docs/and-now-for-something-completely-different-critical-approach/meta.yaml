    bore the title *Knight and Death*, recalling Dürer’s *Knight, Death and the Devil*
    (Törnqvist 2012). For *Throne of Blood*, Kurosawa studied the *musha-e*, ‘early
    picture scrolls of battle scenes’, and ‘decided to use black and armored walls
    since they would go well with the *suiboku-ga* (ink-painting) effect [they] planned
    with lots of mist and fog’ (Richie 1996: 122). And, in *The Canterbury Tales*,
    Pasolini grasps ‘the strong medieval connection between the sublime and the grotesque’
    (Blandeau 2006: 155), epitomised by the film’s Boschian finale. The Pasolini film,
    rife with sex, filth and monstrous imagery, struck a chord with Gilliam, who would
    later look to the paintings of Bosch and Breugel as inspiration for the *mise-en-scène*
    of *Jabberwocky*. Indeed, Palin recalls viewing *The Canterbury Tales* with Jones,
    which ‘Terry G. had recommended. Superb recreation of mediaeval England – the
    kind of style and quality of shooting that we must get in our film, to stop it
    being just another *Carry on King Arthur*’ (Palin 2006: 163–4). Echoed in Palin’s
    admiration of Pasolini’s film is Jones’s love of Keaton’s work, and the desire
    to prove that comedy and artistry are not mutually exclusive.


    However, the utilisation of an art cinema aesthetic was not just a means of presenting
    their work as a serious piece of filmmaking; it also allowed the Pythons the opportunity
    to make comedy out of the formal elements of the medium itself. The film’s opening
    credits, featuring a moody, percussive score and pseudo-Nordic subtitles over
    a black background, plays to an audience awareness of Bergman-esque art cinema
    before introducing a series of jokes about renegade subtitlers. Similarly, the
    film’s opening shot of a Catherine wheel shrouded in fog nods to *Throne of Blood*,
    and the revelation that the sounds of an approaching horse are produced by coconuts
    is made all the funnier in its absurdity. *The Seventh Seal*’s self-flagellating
    monks are likewise parodied, their whips substituted for boards against which
    they repeatedly smack their heads. Though the jokes in *Holy Grail* were generated
    by the Python collective and are ultimately rooted in the written word, their
    presentation in the visual language of art cinema is due largely, if not entirely,
    to Gilliam and Jones as directors. Jones has, for the purposes of this chapter,
    already been identified as writer-director while Gilliam’s directorial duties
    cast him as more akin to a director-illustrator – Meuwese’s ‘modern miniaturist’.
    In their cooperative filming of *Holy Grail*, herein considered as an illuminated
    text, Jones and Gilliam are participants in a tradition of Arthurian illustrators
    who, ‘by serving as authors/illustrators, explore the relational quality and ultimate
    interdependence of word and image . . . as Howard Pyle and Hudson Talbott did’
    (Lupack and Lupack 2008: 10).


    It is prudent at this juncture to note that the practice of manuscript illumination
    is one which spans several centuries, and the relationship between and responsibilities
