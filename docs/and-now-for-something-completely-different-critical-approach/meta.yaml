  md: 'Similarly, language games and wordplay are evidenced in Python sketches such
    as in ‘Argument Skit’ (episode 29, ‘The Money Programme’); this routine cheerily
    engages in wordplay with a focus on pedantry and literalism, centring on an argument
    over the meaning of argument. Although this sketch derives its humour from the
    vagaries and frailties of language, it in no way indicates or implies that language
    or existence itself are meaningless. Far from it, this sketch is a comic view
    of frustrations we encounter in our day-to-day lives: not just problems with language,
    but frustrations with civil servants and individuals providing commercial services.
    It may not be a particularly revolutionary satire, but a satire it remains: it
    is ‘about’ and ‘refers’ to the reality the audience mutually experience, albeit
    it uses the mechanism of absurdity to do so.


    It is a mistake to suggest that just because Python is lighter in tone than Pinter
    and Beckett, it is lighter in substance. If we return to the comparison earlier
    in this chapter between the section of Beckett’s *Murphy* and the *Flying Circus*
    animation about the society woman – both of which involve toilets – we may be
    led to think that Beckett’s reference to lavatories carries more intellectual
    ‘clout’. Murphy’s failure even to see the flushing of his ashes down the toilet
    is emblematic of futility and meaninglessness, whereas the *Flying Circus* animation
    is just – surely – an exercise in crude humour in the extreme.


    However, we may interpret this differently in the light of the ‘laughing truth’
    of the Menippean satire as explored by Mikhail Bakhtin. For Bakhtin there is a
    truth and even a poetry in the vulgar and the scatological (Bakhtin 1984b: 112–19).
    Art may, such as in the writing of Rabelais, celebrate the ‘base’ elements of
    life and culture as a means of comically undermining authority and its oppressive
    and dictatorial norms (Stam 1989: 158). If we view this animation sequence with
    Bakhtin’s ideas in mind, we can re-evaluate it not just as vulgar lavatorial humour,
    but as subversive critique of the societal norms of Britain. To do so we have
    to acknowledge that the animation is funny because the subject is not only a woman,
    but an upper-class society woman at that. Our culture tells us that *women do
    not go to the toilet*, they are too busy pressing flowers and writing wistfully
    in their occasional diaries, and posh women certainly don’t go to the toilet,
    and most definitely do not experience loud and explosive bowel movements. By presenting
    us with a scenario in which a woman, and a posh woman at that, goes to the toilet
    and loudly defecates, this sequence undermines our cultural values in two ways.
    Firstly, it bursts the bubble of a particular cultural illusion that women are
    (or should be) somewhat purer in body and mind than men and confronts us with
    the truth that women do in fact go to the toilet. Secondly, it acknowledges that
    we know and have always known that women – even posh ones – go to the toilet,
    and that we know and have always known that a particular reactionary vision of
    ‘femininity’ is a construct and a lie. If we accept this Bakhtinian interpretation,
    then we can see that Python – even at its silliest and crudest – has a more radical
    and challenging quality than we may hitherto have suspected.'
