  md: 'classes: ‘Python was a middle-class thing, rooted in college quad and JCR .
    . . you will find very few working-class people who get it.’ The criticism that
    they only appeal to the small class group whom they satirise is intriguing given
    the massive popularity of Monty Python throughout the ‘baby boom’ universities
    in 1969 when they first aired (in the UK, working-class and lower-middle-class
    students arrived then in new or expanding universities and polytechnics in large
    numbers). They had a very broad appeal, crossing age and class. It might have
    been useful to have heard of Proust and Sartre and found them confusing, but you
    could also laugh if you ever had to wait for the gasman and then several came
    at once but were unable to fix the leak, or you’d bought a budgie in a corner
    shop from a man in a brown mac. It is very British and their treatment of class
    is thoroughly satirical.


    Their immediate preceding British origins and influences are several, each clever,
    funny, satirical, political and social. These include the radio programme *Round
    the Horne* (1965–8), the absurdism of Peter Sellers and *The Goon Show* (1951–60)
    and the intellectually based satirical comedy of *Beyond the Fringe* (1960), with
    Jonathan Miller, Alan Bennett, Peter Cook and Dudley Moore (the latter in the
    1970s as Derek and Clive with their upper-class duffer Sir Arthur Streeb-Greebling,
    precursor of the Pythons’ upper-class twits). Their subversion is also based on
    the performances of Gilbert and Sullivan: ‘It isn’t such a big step from I Am
    the Ruler of the Queen’s Navee to the Upper Class Twit of the Year Race’ (Henderson
    2013).


    Donald Hoffman draws attention to the plummeting sheep, dead parrot and the existential
    references in Monty Python sketches, arguing that ‘no tradition remains intact
    in the presence of the Pythons’ quest for silliness’ (Hoffman 2002: 141). Some
    Python roots are in pantomime, the class- and sex-oriented bawdy of Sid James,
    Hattie Jacques, the Ealing comedies, *Carry On* films (1958–92) and Dick Emery
    (1963–81). All undercut and poke cruel, hilarious fun at the pre- tentiousness
    and hypocrisy of the class system and, in *Carry On up the Khyber* (1968) (with
    its veiled sexual reference), the arrogance of British imperialism based on constructions
    of racialised social hierarchies. Since Python, both *Little Britain* (2003–5)
    and Harry Enfield (1990–2, 1994–9) took on their satirical, political juxtaposition
    of the ridiculous and unlikely with the everyday targeting of hypocritical approaches
    to gender and sexuality, social class and disability with some outrageous sketches,
    their roots in the bawdy humour of British sea- side towns. Class and power are
    satirised in *The Harry Enfield Television Show* (1990–2) and *Harry Enfield and
    Chums* (1994–9) with a long-running skit (‘The Self-Righteous Brothers’), in which
    two blokes in a pub (resembling Derek and Clive) become insistent about controlling
    situations where celebrities and royalty might want their advice or company, undercutting
    the class system with a pecu- liarly British form of self-aggrandisement and anger.
    Monty Python, however, is more surreal.'
