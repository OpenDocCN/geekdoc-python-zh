  md: '# 8. THE PARROT, THE ALBATROSS AND THE CAT: ANIMALS AND COMEDY IN MONTY PYTHON


    Brett Mills


    # INTRODUCTION: THE PARROT


    The most famous sketch in the history of Monty Python is that commonly known as
    ‘the dead parrot sketch’ (also known as ‘the pet shop sketch’ and ‘parrot sketch’).
    It has a disarmingly simple premise: a customer (John Cleese) returns to a pet
    shop to complain that the parrot he has recently bought is dead. The comedy arises
    from the shop owner’s (Michael Palin) refusal to accept that it is no longer alive,
    and a battle of wordplay ensues as the customer uses an increasingly complex array
    of terms to describe the animal’s deceased state while the shop owner offers a
    variety of rationales for the bird’s lack of movement. The sketch quickly moves
    beyond this set-up, with the customer being advised to visit the pet shop’s complaints
    department, and, after a detour into a sequence where he is confused about being
    in Bolton or Ipswich, the sketch ends as many others in Monty Python do; with
    Graham Chapman’s army captain entering the scene and complaining that everything
    has now gone too silly, and that the programme should move onto something else.
    The sketch is the UK’s favourite sketch from across the whole of the troupe’s
    output (Jefferies 2014), and was voted as the second greatest comedy sketch in
    the history of British television in one poll (BBC News 2005) and first in another
    (BBC News 2004). Its iconic status as an ‘old friend’ (Wilmut 1980: 205) of Monty
    Python fans was confirmed when, in order to promote the troupe’s comeback performances
    in London in 2014, a fifty-foot-long fibreglass model of the deceased bird was
    unveiled in the city (Rucki 2014).'
