  md: 'tempered with a healthy dose of existentialism, of the sort found in Jean Paul
    Sartre’s *La Nausée* (1938) (and we must not forget that Mrs Jean Paul Sartre
    is a regular character in Python sketches). To bowdlerise this somewhat, one of
    the tenets of *La Nausée* is that we agree to labels and names, to values and
    rules, they are not intrinsically part of things. Everything is labelled – this
    is not what something or someone ‘is’ (if there were such a definable essence),
    but instead we construct meanings and values round the labels which we agree and
    share. There is only immediacy and appearances: ‘Now I knew: things are entirely
    what they appear to be – and behind them . . . there is nothing’ (Sartre 1938).
    In his introduction to *La Nausée*, Hayden Carruth (1963) notes of Sartre’s development
    as an existentialist that


    > [l]ater in his philosophical development the idea of freedom became Sartre’s
    main theme. Man, beginning in the loathsome emptiness of his existence, creates
    his essence – his self, his being – through the choices that he freely makes.
    Hence his being is never fixed. He is always becoming, and if it were not for
    the contingency of death he would never end. Nor would his philosophy.


    There is free choice over labels, meanings invested in words, hierarchies and
    political commitments or acts, hence a political refusal to collude with illegitimate
    enforced power (such as Nazism, in Sartre’s case).

    Based on superficiality and tenuousness, so also social hierarchy, the class system
    is exposed as a construct that only really has power if people invest that power
    in it. Social hierarchy and, in Britain, its concrete embedding in the class system,
    has led to enormous abuse, particularly with the upper classes, who believe they
    are one step down from divinity and have a right to certain power and quality
    of life. Criticism of the Pythons for their public or grammar school then Oxbridge
    origins underestimates their brilliantly comic irreverence for politics, power,
    hierarchies and class. Emphasising the surreal weirdness of the Pythons’ humour,
    and their very broad appeal, Parkes notes:


    > Very rarely was Python political, but it was a protest all right – a protest
    against bullshit and bullying, sloppy thinking and humbug, a gleeful assault on
