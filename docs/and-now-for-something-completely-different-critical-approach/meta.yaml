    然而与此同时，权威人物（查普曼饰演的警察）对老奶奶们“享乐主义”挥霍行为所流露出的些许愤慨，却讽刺地影射了20世纪60年代中后期日益加剧的毒品滥用现象。正如大卫·西蒙内利所观察到的：“到1968年，英国已经发展出一种另类青年文化，其核心是摇滚乐、浪漫主义价值观、毒品体验以及探索人类体验极限的普遍渴望”（Simonelli
    2013: 139）。特别是威廉·布莱克及其关于放纵的观念，以及19世纪诸如夏尔·波德莱尔（《恶之花》，1857–68）、阿蒂尔·兰波、若里斯-卡尔·于斯曼（其开创性的《逆天》，1884）或奥斯卡·王尔德（在“奥斯卡·王尔德素描”即第39集“看台”中，对世纪末伦敦和王尔德式机智进行了戏谑的探讨）等艺术家的作品，似乎吸引了1960年代那种好奇的心态——在奥尔德斯·赫胥黎的《知觉之门》（1954）之后，这种心态渴望在迷幻中发现新的感知和性维度。这些艺术家也对鲍勃·迪伦、吉姆·莫里森或莱昂纳德·科恩等创作型歌手产生了相当大的影响。在英国背景下，滚石乐队代表了反文化运动中更黑暗、更狄奥尼索斯的一面，因为“他们重新点燃了摇滚乐与不良行为之间的联系，而这种联系在60年代中期的乐观主义中曾被重塑”（James
    2016: 255）。西蒙内利进而强调，滚石乐队成为了“公众和媒体恐惧的明确目标”以及“青年文化之恶的化身”（Simonelli 2013: 116）。虽然米尔斯描述了埃里克·艾德尔与乔治·哈里森的友谊（Mills
    2014: 131），但也可以注意到基思·理查兹也“花了很多时间与彼得·库克以及“巨蟒剧团”的成员们在一起”（Sandford 2012: 291）。


    对老奶奶们在电影院里不守规矩行为的讽刺性暗示，也影射了《黑板丛林》在美国、欧洲大陆和英国所引起的骚动反响。在英国，这类混乱当时往往主要归咎于泰迪男孩（见Tebbutt
    2016: 98）。然而，更进一步的是，在这个案例中，采取这种行为的违法者是老年人，这导致了对那个时代迷恋青春及其“对童年和青春期的理想化和浪漫化观点”（Mills
    2014: 133）的一种讽刺性颠覆。艾德尔饰演的新闻播音员刚刚开始对老奶奶们公然“拒绝当代社会的价值观：她们看着自己的孩子长大，成为会计师、股票经纪人”进行说教，就很快被这些淘气的老太太们无礼地打断了，因此无法对此事做出最终裁决。


    ## 结论


    正如前面的分析所希望展示的那样，巨蟒剧团的《飞行马戏团》时代与战后的社会文化转型、20世纪的各种艺术流派（超现实主义、达达主义），以及更具体地说，1960年代（英国）文化紧密交织在一起。特别是1960年代的影响在不同层面上显现出来：美学风格层面（《飞行马戏团》的超现实主义和迷幻倾向）、社会文化背景的影响、“青年震荡”和反文化心态，以及与美国和英国流行文化的相遇。该剧集也普遍运用了大量对当时电影和音乐的引用。正如对“地狱老奶奶”的细读所要强调的，《蒙提·派森的飞行马戏团》以一种非常微妙的方式与1960年代的社会文化背景及其流行文化进行互动。尽管其风格上具有自发的荒诞-超现实主义倾向，但文化引用实际上完全融入了各个小品的结构构成中。


    米尔斯进一步声称，“艾德尔和巨蟒剧团成员与1960年代的摇滚乐队是同一类人。他们打破传统、超现实、荒诞且年轻”（Mills 2014: 134）。因此，就像披头士和滚石乐队一样，巨蟒剧团也“深受嬉皮士文化的影响：他们是这个痴迷于青年的十年的象征”（同上）。艾德尔通过声明该团体“探讨的是后青春期状态。它反军队、反权威、反教师、反教会、反母亲、反父亲、反阿姨”（引自同上）证实了这一说法。然而与此同时，就像《边缘之外》的牛剑毕业生、英国新浪潮的创意驱动力或1960年代反文化运动的成员一样，巨蟒剧团成员也属于他们试图批判的那个资产阶级父权体系。因此，他们呼应了前面提到的、在一定程度上标志着1960年代英国社会的、进步与保守倾向的矛盾共存（例如，反文化运动中叛逆反抗与消费主义立场的融合，其对另类生活方式的偏好——如“隐士”小品中提到的——仍未完全摆脱异性恋规范，艺术与企业家精神的融合——如“诗人麦克蒂格尔”小品、“工人阶级剧作家”和“飞羊”小品中所体现的，或反复提及的代际冲突）。尽管如此，鉴于（流行）文化引用的极其丰富，对巨蟒剧团与1960年代文化或其特定方面之间独特关系的进一步研究将证明是非常有启发性的。


