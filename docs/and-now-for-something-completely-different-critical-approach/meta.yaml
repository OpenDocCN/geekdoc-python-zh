  md: '# MONTY PYTHON FANDOM AMONG FATHERS AND DAUGHTERS: MOTIVATIONS AND CIRCUMSTANCES


    Responses from women across the ‘Dad Memories Group’ make reference to the moment
    their father introduced them to the world of Monty Python, in a number of interlinked
    ways. Firstly, many respondents recall this paternal introduction in a way that
    suggests their father wanted to replicate, for their daughter, the conditions
    under which they had first encountered Python as a younger man. While some respondents
    note that their father sat them down to watch Python in order to ‘pass on the
    laughter’ or ‘share the humour’, others remark that their father ‘wanted me to
    experience the same feeling of happiness that Monty Python gave to him as a teenager’,
    that he ‘decided to show me the first episode he ever saw once he decided I was
    old enough in middle school’, or that he’d ‘said he’d been to the cinema to watch
    it when he was my age about 12/13 and he knew I loved to laugh’ (#2177 Canadian,
    36–45; #2958 American, 26–35; #962 Portuguese, 18–25; #900 American, 18–25; #2338
    British, 18–25).¹ Akin to other studies of intergenerational fandom, the sharing
    of Python here involves, in many cases, a father ‘packaging’ it as a ‘rite of
    passage’ (Barker *et al.* 2015: 42) that is passed on to the child when they are
    deemed ‘old enough’ or when they reach the same age or stage at which their father
    had first encountered Python. As illustrated in these examples, conditions of
    replication also extend to showing the same episode first viewed by their father,
    or of the strong indication being given that the respondent should ‘experience
    the same feeling of happiness’ that their father had experienced in his teenage
    past.


    Extending this notion of passing on a family tradition or family experience of
    Python fandom, a substantial number of American and Canadian respondents also
    noted that this – almost ceremonial – introduction to Python was informed by their
    father’s British roots. Respondents noted, for instance, that ‘my father is English’
    and ‘made me aware of my British heritage’, that ‘my British Dad was excited to
    share’ Python ‘with us as he loved it’, and that ‘it was very important’ to ‘my
    father, a British expat . . . that his Canadian child developed an appreciation
    for British comedy’ (#2885 Canadian, 56–65; #259 American, 46–55; #3618 Canadian,
    26–35). Further to this, there is a sense that – for fathers who were broadly
    first-generation fans who had encountered Monty Python during its initial British
    or North American circulation between 1969 and 1976 – the importance of passing
    on ‘some of the comedy of his youth’ (#2098 Danish, 18–25) also related to the
    ‘specific cultural moment’ of ‘generational tensions’, the breaking up of institutions,
    and ‘the emergence of new forms of globalism’ frequently associated with *Monty
    Python’s Flying Circus*’s initial appearance (Landy 2005: 15). As one respondent
    outlined, for instance,


    > many important social issues, stereotypes, tropes, themes, and miscellaneous
    objects are reflected in the seemingly nonsensical humor of the Pythons.'
