    Pythons, the film tells the story of Brian Cohen (Chapman), a young Jewish man
    mistaken for the Messiah. Controversial from the moment of its inception, funding
    for the film was withdrawn by EMI Films days before production was scheduled to
    begin; financial backing was then organised by Python fan George Harrison through
    the formation of his company, HandMade Films (Rainey 2011). Containing elements
    of religious satire, the film was characterised as blasphemous by some religious
    groups and banned in certain parts of the UK and some other countries. The film
    was nevertheless – or likely because of the controversy – a box office success.
    It was the fourth highest grossing film in the UK for 1979 and the highest grossing
    British comedy film in American history at the time of its release (ibid.).


    In 1982, the Pythons released *Monty Python Live at the Hollywood Bowl*, a recording
    mostly of sketches from *Flying Circus*, but incorporating material predating
    *Flying Circus* – notably, the ‘Four Yorkshiremen’ sketch from 1967’s *At Last
    the 1948 Show*, which features four men attempting to outdo each other with tales
    of their humble origins. *Hollywood Bowl* also features inserted material dubbed
    into English from the Pythons’ two episodes of *Flying Circus* prepared specifically
    for German television and aired in 1972 (IMDb n.d.).


    *Hollywood Bowl* was then followed a year later by the last Python film to feature
    all six original members: *Monty Python’s The Meaning of Life* (1983). While both
    *Holy Grail* and *Life of Brian* had coalesced around a single somewhat coherent
    story, *Meaning of Life* returned the troupe to its roots in sketch comedy as
    it is loosely structured around a series of scenes addressing different stages
    of life. Although not as successful as *Holy Grail* and *Life of Brian*, the film
    did win the Grand Prix at the 1983 Cannes Film Festival (Chilton 2014). It would
    be another thirty-one years before the remaining Python members would perform
    together as part of the *Monty Python Live (Mostly)* events in 2014.


    # It’s a Living


