    show, for example), while politicians and philosophers concern themselves with
    the Eurovision Song Contest, and a disease can be turned into a musical. Another
    rather self-evident observation is that, for the Pythons, music is but one tool
    for deconstruction of the medium of television and the ‘rules’ of light entertainment.
    In his diary, Michael Palin cites the decision to include ‘two city gents dancing
    to balalaika music’ in the background of the ‘cheese shop’ sketch (episode 33,
    ‘Salad Days’) of the third series as evidence of the evolution of the team’s style
    of humour away from the ‘revue’ or satirical origins of their previous work (on
    the *Frost Report* [1966–7] and such), towards the ‘illogical and confusing’ (Palin
    2006: 77). There is certainly incongruity to the prospect of a cheese emporium
    ‘licensed for public dancing’ (as a flash-picture of the exterior informs us before
    the television sketch starts), and the incessant live bouzouki accompaniment may
    well be a means to complicate the *mise-en-scène* of what Palin himself describes
    as a potentially formulaic ‘parrot shop type of sketch’, with John Cleese reprising
    the role of an increasingly frustrated customer. Although the sketch, here and
    in its various iterations (recorded album and live versions) reaches its end via
    Cleese casually shooting the shopkeeper, his mania reaches its peak about a minute
    earlier with his instruction of the musician to ‘shut up’; this moment is particularly
    dramatic in the *Secret Policeman’s Ball* (1979) rendition, where Cleese – who
    frequently comes near to ‘breaking’ character in the sketch – takes particular
    relish (as does the audience) in his banishment of the (non-Python) dancers and
    musician off stage. In some ways, then, the sketch works as a loose metaphor for
    Python’s attitude to music in its evocation of a three-way antagonism between
    shopkeeper, customer and musical source; there is also a parallel with the shooting
    (rather gorily in the *Live [Mostly]* version) of Terry Gilliam as he sings his
    unsophisticated ‘I’ve Got Two Legs’ ditty.


    As might be expected, as well as having characters bursting randomly into song,
    or sketches disrupted by singers, *MPFC* often plays with the conventions of non-diegetic
    music. In episode 7, ‘You’re No Fun Any­more’, an alarmed character is reassured
    that ‘it’s only the incidental music’. There’s a meta-textual spin on this joke
    in episode 9, ‘The Ant, an Introduction’, when an unwanted house-guest interrupts
    a courting couple and demands to change the romantic music (which the viewer may
    have assumed to have been non-diegetic) on the record-player to something far
    more strident: the fact that he aggressively replaces a record identified by Larsen
    (2008: 124) as Dudley Moore’s group playing ‘I Love You Samantha’ with Sousa’s
    ‘Washington Post’ invites explanation as an ‘in-joke’ expression of Python’s own
    confidence in its assault on the contemporary comedic landscape. Another variant
    on this gag drives the ‘Psychiatrist’ sketch (episode 13, ‘Intermission’), where
    Notlob suffers from grim ‘auditory hallucinations’ of ‘folk’ songs and inoffensive
    pop numbers such as Peter, Paul and Mary’s ‘We’re All Going to the Zoo Tomorrow’.
