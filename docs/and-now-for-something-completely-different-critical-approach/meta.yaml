    The silly subtitles provoke laughter both through their own inherent absurdity
    (‘A Møøse once bit my sister’) and their upsetting of viewer expectations based
    on prior knowledge of how films function. Indeed, Monty Python’s playful approach
    to the credits enacts a kind of Derridean deconstruction of them, inverting the
    inside/outside hierarchy, and then calling into question the logic that supports
    that hierarchy entirely as the line separating what is and isn’t part of the film
    is erased.


    While the surprising subtitles of the opening credits provoke laughter by abandoning
    expectations concerning cinematic conventions, much of *Holy Grail* in general
    elicits laughter through its parodying of Arthurian romance. Silly scenes throughout,
    such as the Dennis scene discussed above, poke fun at the seriousness of such
    legends, and the absurdity is often heightened by the incongruity between the
    gravitas with which lines are delivered (particularly by Chapman’s Arthur) and
    the ridiculousness of the dialogue and action. Consider for example Arthur’s first
    appearance as he pretends to ride a horse while his servant, Patsy (Terry Gilliam),
    knocks coconuts together to approximate the sound of hooves. Consider as well
    as the ‘Knights of the Round Table’ musical number that interrupts the action
    as Arthur and his knights consider riding on to Camelot. Both scenes surprise
    the viewer with something unexpected and absurd – the substitution of knocking
    coconuts for horses, and knights dancing the can-can as they sing ridiculously
    anachronistic lyrics about eating spam and impersonating Clark Gable.


    The playful parodying of Arthurian romance is particularly evident in the scenes
    in which Arthur encounters the dreaded Knights Who Say Ni. In keeping with quest
    narratives in general, Arthur and his knights must overcome various obstacles
    as they seek the Holy Grail. Like the Black Knight who ends up limbless, the Knights
    Who Say Ni block Arthur’s passage and initially appear intimidating – particularly
    the head knight, played by Palin, who appears double Arthur’s size. The sense
    of danger is also amplified by the ominous soundtrack as Arthur *et al.* move
    through the forest. Any tension created by the materialisation of the Knights
    Who Say Ni from out of the mist is, however, quickly undercut by Palin’s grating
    falsetto, wholly out of keeping with his exaggerated size, and the surprising
    concern of Arthur and his company over having the nonsense word ‘Ni’ spat at them.
    The Knights Who Say Ni then demand of Arthur a ‘sacrifice’ in the form of . .
    . a shrubbery.


    Figure 11.3 Arthur confronts the Knights Who Say Ni: *Monty Python and the Holy
    Grail*.


    Luckily happening upon Roger the Shrubber (Idle), Arthur and his retinue return
    to the Knights Who Say Ni, only to discover that the terms permitting their passage
    through the forest have changed. Although the head knight pronounces the shrubbery
    good, he reveals that they are no longer the Knights Who Say Ni, but are now instead
    the Knights Who Say Ekke Ekke Ekke Ekke Ptang Zoo Boing and they must give Arthur
    a new test: not only must he procure another shrubbery, he must also ‘cut down
    the mightiest tree in the forest with . . . a herring!’ Arthur’s incredulous protestation
    that ‘it can’t be done’ causes the knights to recoil in apparent pain, and it
    soon becomes apparent that the knights cannot tolerate hearing the word ‘it’.
    Incapacitated by the repeated utterance of the word both by Arthur’s party and
    themselves, the knights do not notice Arthur and his party’s escape.


    Everything about the two scenes with the Knights Who Say Ni, in keeping with the
    film in general, is calculated to provoke laughter through sheer absurdity as
    repeated incongruities undermine the seriousness of the encounters. The head knight’s
    exaggerated size and falsetto defy our expectations concerning physical limitations
    and correspondence between size and voice. That the nonsense word ‘Ni’ should
    function like a curse or harsh epithet – or even cause pain – jars with our sense
    of the functioning of language – as does the knights’ aversion to the word ‘it’.
    That the knights should demand a shrubbery, refer to themselves as the Knights
    Who Say Ekke Ekke Ekke Ekke Ptang Zoo Boing, or seek to test Arthur by requiring
    him to cut down a tree with a herring all upset learned expectations concerning
    the seriousness of such encounters between knights and adversaries in tales of
    chivalry. The result are scenes that – like the rest of the film – are gleefully
    silly as they undercut and invert viewer expectations.


    Silly scenes like these thus appeal at least in part due to their *irreverence*,
    which participates in constructing their cultic appeal. As carnivalesque parodies,
    they consistently poke fun at the solemnity of Arthurian romance, and attack,
    as Aronstein asserts, ‘British myths of national identity, monarchy, class, and
    government’ (Aronstein 2009: 116). Through an ‘encyclopedia of comedy – involving
    gags, slapstick, the grotesque, wordplay, and banter’ (Landy 2005: 39), *Holy
    Grail* punctures the pretensions surrounding myth and nobility, playfully roiling
    our assumptions concerning national identity, history and character. As Landy
    suggests of *Flying Circus*, *Holy Grail* arguably appeals to ‘young people and
    disaffected groups for its irreverence toward authority’ (ibid.: 36). Rather than
    silliness as innocent play, this is silliness as light-hearted satire.'
  mdcn: '## 迁徙的愚行？


    遵循 Python 的逻辑，我想以一个或许不完全相关但至少是旁枝末节的话题来收尾——那就是民族归属在构建邪典吸引力中所扮演的角色。具体而言，我感兴趣的问题是，除了单纯欣赏一部在其他国家制作的电影之外，将一部来自不同民族传统的电影挪用为邪典对象意味着什么。更具体地说：如果《圣杯》是一部讽刺英国文化神话的电影，那么作为一个美国人（或其他国籍的人）热爱这部电影又意味着什么？


    关于美国亲英主义的现有学术研究寥寥无几，且往往将美国人对英国性的联想置于广义的“高雅文化”背景下：如《杰作剧场》、 Merchant Ivory 制作的电影、根深蒂固的贵族阶层、下午茶时光，当然还有詹姆斯·邦德。例如，约瑟夫·爱泼斯坦声称，“在美国，我们关于荣誉、勇气、浪漫、体面的观念——都是舶来品，都来自英国”（Epstein
    1997: 3）。英国文化为爱泼斯坦提供了一个“更英雄主义的世界”（同上：18）。琼斯指出，“英国性在美国文化中长期享有崇高地位”（Jones 2001:
    77），并认为“英国人是典型的上层阶级 WASPs（白人盎格鲁-撒克逊新教徒），所有美国人都被认为渴望达到这种地位”（同上：78）。马克·德里对美国亲英主义进行了广泛推测，认为它可能源于对美国资本主义虚伪性的蔑视——这种资本主义一方面声称鄙视精英主义，另一方面却暗中推崇；也源于白人种族主义；以及“有抱负的蓝血贵族”对贵族身份的向往（Dery
    2018）。


    《圣杯》当然与《告别有情天》（詹姆斯·伊沃里，1993）或《印度之行》（大卫·里恩，1984）或刻板英国绅士的“坚忍克制”相去甚远。因此可以想象，美国亲英主义者接受
    Python 可能仅仅是因为英国人接受它。但我认为，美国人对蒙提· Python 的邪典式崇拜不仅仅是一种对所有英国事物的普遍迷恋。恰恰因为 Python
    的愚行深深植根于 1960 和 1970 年代英国文化的特定语境中，对 Python 幽默的欣赏放大了德里所说的美国粉丝的“借来的他者性”（Dery 2018）。正如《圣杯》片尾字幕的副标题既因其内在的荒谬性，又因其偏离了字幕应扮演的角色而显得滑稽一样，《圣杯》的滑稽之处既在于文字游戏和闹剧带来的即时乐趣，也在于它颠覆了关于英国神话和性格的预期。对于美国亲英主义者来说，这是一种隔了一层的愚行。因此，美国亲英主义者的知识通过识别这些差异而得到回报。美国
    Python 粉丝所拥抱的“舒适的差异”正是证明规则的例外——要欣赏戏仿作为戏仿，人们必须熟悉原作。因此，愚行的邪典吸引力不可避免地通过民族性的透镜被折射。


    我在此的论点是，可引用性、不敬的愚行以及对电影媒介的一种后现代探索，共同构建了《圣杯》的邪典吸引力。当然，电影中的其他场景也可以结合这些特质来考虑，毫无疑问，还存在其他邪典特质。


    图 11.2 驯鹿控制：《蒙提· Python 与圣杯》。


    “刚刚被解雇的人已被解雇”。直到人们注意到，与真实的制作职位越来越混杂的是那些与驼鹿（或“Møøse”）相关的职位，理智似乎才恢复到片尾字幕中。与伪瑞典语副标题一样，Møøse
    职位不断升级，直到观众无法忽视它们，片尾字幕第三次暂停，告知观众“[t]he credits have been completed in an entirely
    different style at great expense and at the last minute”。然后，在令人眼花缭乱的红绿闪烁屏幕和 mariachi
    音乐背景下，片尾字幕最终将一切归功于不是驼鹿，而是羊驼的恩惠——包括 142 只墨西哥呼噜羊驼。


    愚蠢的副标题既因其自身的内在荒谬性（“一只 Møøse 曾咬过我姐姐”），又因其颠覆了观众基于先前对电影运作方式了解的预期而引发笑声。事实上，蒙提· Python
    对片尾字幕的戏谑处理实施了一种德里达式的解构，颠倒了内/外等级制度，然后质疑支撑该等级制度的逻辑，因为区分电影内外部分的界限被抹去了。


    虽然开场字幕中令人惊讶的副标题通过放弃对电影惯例的预期来引发笑声，但《圣杯》的大部分内容通常通过戏仿亚瑟王传奇来引发笑声。贯穿全片的愚蠢场景，例如上文讨论的丹尼斯场景，嘲笑了这些传说的严肃性，而荒谬性常常因台词（尤其是查普曼饰演的亚瑟）所带的庄重感与对话和动作的荒谬性之间的不协调而加剧。例如，考虑亚瑟首次出场时假装骑马，而他的仆人帕西（特里·吉列姆）敲击椰子来模拟马蹄声。再考虑“圆桌骑士”音乐插曲，它打断了亚瑟和他的骑士们考虑骑马前往卡梅洛特的行动。这两个场景都以意想不到和荒谬的事物让观众感到惊讶——用敲击椰子代替马匹，以及骑士们跳着康康舞，唱着关于吃午餐肉和模仿克拉克·盖博的荒谬时代错位歌词。


    对亚瑟王传奇的戏谑戏仿在亚瑟遭遇可怕的“说‘Ni’的骑士”的场景中尤为明显。遵循一般的 quest 叙事，亚瑟和他的骑士们在寻找圣杯的过程中必须克服各种障碍。就像最终失去四肢的黑骑士一样，“说‘Ni’的骑士”阻挡了亚瑟的去路，最初显得令人生畏——尤其是由佩林饰演的首领骑士，他的体型看起来是亚瑟的两倍。当亚瑟等人穿过森林时，不祥的配乐也加剧了危险感。然而，由佩林刺耳的假声（与他夸张的体型完全不符）以及亚瑟一行人对被吐出无意义单词“Ni”所表现出的惊人担忧，迅速削弱了“说‘Ni’的骑士”从雾中现身所制造的任何紧张感。然后，“说‘Ni’的骑士”要求亚瑟以……一丛灌木的形式进行“献祭”。


    图 11.3 亚瑟对抗“说‘Ni’的骑士”：《蒙提· Python 与圣杯》。


    幸运地遇到了灌木丛罗杰（艾尔），亚瑟和他的随从回到了“说‘Ni’的骑士”那里，却发现允许他们通过森林的条件已经改变。尽管首领骑士宣布灌木丛很好，但他透露他们不再是“说‘Ni’的骑士”，而是现在变成了“说
    Ekke Ekke Ekke Ekke Ptang Zoo Boing 的骑士”，他们必须给亚瑟一个新的考验：他不仅必须再弄一丛灌木，还必须“用……一条鲱鱼砍倒森林中最强大的树！”亚瑟难以置信的抗议“这不可能做到”导致骑士们明显痛苦地退缩，很快人们就明白骑士们无法忍受听到“它”这个词。由于亚瑟一行人和他们自己反复说出这个词，骑士们失去了行动能力，没有注意到亚瑟一行人的逃脱。


    与电影整体一致，“说‘Ni’的骑士”的两个场景中的一切，都旨在通过纯粹的荒谬性引发笑声，因为反复出现的不协调性削弱了遭遇的严肃性。首领骑士夸张的体型和假声违背了我们对身体限制以及体型与声音之间对应关系的预期。无意义单词“Ni”像诅咒或严厉的辱骂一样起作用——甚至引起疼痛——这与我们对语言运作方式的理解相冲突——骑士们对“it”一词的厌恶也是如此。骑士们要求一丛灌木，自称是“说
    Ekke Ekke Ekke Ekke Ptang Zoo Boing 的骑士”，或者试图通过要求亚瑟用一条鲱鱼砍倒一棵树来考验亚瑟，所有这些都颠覆了关于骑士故事中骑士与对手之间严肃相遇的习得预期。结果是这些场景——像电影的其他部分一样——欢快地愚蠢，因为它们颠覆并颠倒了观众的预期。


    像这样的愚蠢场景之所以吸引人，至少部分原因是它们的*不敬*，这参与构建了它们的邪典吸引力。作为狂欢式的戏仿，它们持续嘲笑亚瑟王传奇的庄严，并如阿伦斯坦所断言的那样，攻击“关于民族认同、君主制、阶级和政府的英国神话”（Aronstein
    2009: 116）。通过“喜剧百科全书——包括噱头、闹剧、怪诞、文字游戏和戏谑”（Landy 2005: 39），《圣杯》刺破了围绕神话和贵族的矫饰，戏谑地搅动了我们关于民族认同、历史和性格的假设。正如兰迪对《飞行马戏团》的评价，《圣杯》可以说因其“对权威的不敬”而吸引“年轻人和不满群体”（同上：36）。这不是作为天真游戏的愚行，而是作为轻松讽刺的愚行。'
