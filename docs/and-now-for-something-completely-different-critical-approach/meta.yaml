  md: 'about. Yet in order for it to do this, it must draw on, and establish, those
    expectations which are to be overturned or reformulated. So, whether comedy results
    in ‘nothing’ or ‘something’, it is a form of communication whose incongruities
    can only be meaningful if it draws on expectations assumed to be shared by its
    audience. And it is because of this that we can examine comedy to make explicit
    those expectations and, by extension, a wide range of sociocultural norms.


    But the structure of comedy is more constrained than that which is produced by
    presenting incongruities. After all, not everything that is incongruous is funny.
    Kant’s assertion that comedy results in ‘nothing’ begins to point towards the
    necessity for comic incongruities to be unthreatening in order to be pleasurable.
    But in addition to this is the necessity for a ‘logic of the absurd’ in which
    ‘the state of affairs portrayed is simultaneously highly implausible and just
    a little bit plausible’ (Palmer 1994: 96; also see Palmer 1987). The ‘logic’ Palmer
    refers to is one that both enables the incongruity to be resolved, but also points
    towards the possibility of the incongruity occurring in the first place. As such,
    jokes typically require set-ups and punchlines, whereby the set-up offers a logical
    world of expectations, while the punchline delivers an incongruity that is sudden,
    unexpected, unthreatening and – importantly – in some way makes some kind of sense
    according to the rules established by the set-up. It is the relationship between
    the set-up and the punchline that constructs an event as a joke; one without the
    other is not comic. But important here is that set-ups themselves typically draw
    on sociocultural norms in order to establish the ‘logic’ of the world in which
    the punchline is both incongruous and ‘a little bit plausible’. It is because
    of this that comedy can be examined for its indication of sociocultural norms,
    for they are vital to both parts of the process; they are drawn upon in order
    for the set-up to be established efficiently, and they are troubled or overturned
    by the punchline. It is precisely because both parts of the comic moment rely
    on expectations and norms for their effects that, even if a joke unarguably questions
    those norms, it is possible to argue that humour is never truly radical. After
    all, comedy can never move into an arena where those norms are truly abandoned,
    for then there would be nothing upon which the ‘logic of the absurd’ could be
    established.


    For the ‘albatross’ sketch, it’s clear the cultural assumptions this logic relies
    upon. Indeed, these assumptions are so specific that the sketch can become unintelligible
    when viewed from outside the required context. The sketch is not required to explain
    to its contemporaneous audience that intermissions at cinemas take place, or that
    during those intermissions sellers proffer ice-cream; the mere presentation of
    it as fact would resonate with the viewing audience at the time. But that this
    is merely a cultural norm is evidenced in that viewers watching the sketch now
    might be confused by what is taking place, given that intermissions and ice-cream
    sellers are largely absent from contemporary multiplexes. And there are other
    cultural norms the sketch relies on too. The'
