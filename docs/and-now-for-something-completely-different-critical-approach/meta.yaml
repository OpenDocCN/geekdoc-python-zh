    Monty Python''s Flying Circus was and is famed for its lampooning of TV shows
    and TV itself. It regularly satirised established TV formats and genres, such
    as the gameshow in ''Blackmail'' (episode 18, ''Live from the Grill-O-Mat'');
    however, it also questioned and deconstructed the phenomenon of TV itself on a
    number of occasions, and did so as effectively as Pinter and Beckett challenged
    the fabric of the play. In ''Psychiatrist Milkman'' (episode 16, ''Déjà Vu''),
    the sketch is caught in a repeating loop and collapses in on itself. ''Flying
    Fox of the Yard'' (episode 29, ''The Money Programme'') is a very brief sequence
    which – nevertheless – manages to deconstruct itself, the sketch that preceded
    it, television comedy, comedy as a whole and Monty Python''s Flying Circus.


    The cultural and intellectual impact of comedy is often underrated; even William
    Shakespeare''s comedies are considered – by consensus – to be lesser than his
    tragedies and his histories. However, it has been the subject of a considerable
    body of academic study which has interrogated both its social purpose and its
    operational procedures. In Jokes and Their Relation to the Unconscious (1905 [1976]),
    Sigmund Freud subjected jokes and humour to a psychoanalytic study and observed
    that ''jokes are used as an envelope for thoughts of the greatest substance''
    (Freud 1905 [1976]: 135). Many scholars have since enquired into how comedy is
    utilised as a means of critique and attack on a society, individuals or groups
    within society. Alison Ross particularly looks at how comedy can be put to either
    reactionary or subversive use depending upon whether the humour is targeted by
    those in power against the vulnerable, or whether the humour is aimed at the higher
    power strata in society by the general population, or those who speak for them
    (see Ross 1998). Mikhail Bakhtin''s work on François Rabelais maintains that laughter
    itself is a subversive act against tyranny and oppression (see Bakhtin 1984a).
    However, it is perhaps Henri Bergson (1859–1941) whose work is most crucial for
    understanding the role of humour in both Beckett and Pinter as well as Monty Python.
    Crucially, however, it is perhaps also Bergson who can help us understand the
    key differences between Python and these absurdists.


    Bergson''s position on comedy – given in Laughter (1899) – is that ''we laugh
    at human nature when it behaves with machine-like rigidity'' (Howarth 1978: 16).
    This is perhaps best illustrated by his discussion on Molière which W. D. Howarth
    outlines as follows:


    > [C]haracters are comic because of the rigidity of their outlook on life, the
    mechanical inflexibility of their behavioural responses. Monsieur Jourdan, the
    ''would-be nobleman'', who is quite happy to wear a new coat, made with its pattern
    upside-down, once his tailor has persuaded him that this is the latest fashion
    amongst the gentry, is an . . . excellent'
  - '[PAGE 43]


    example of this comic rigidity: everything he says or does is determined by the
    way he thinks the nobility behave. Another example is Argan, the hypochondriac
    hero *Le Malade imaginaire*, who carries his obsession with ill-health and medicaments
    to such lengths that he anxiously asks how many grains of salt he should take
    with his boiled egg. These are caricatural portraits, it is true, and sufficient
    imagination has gone into their creation to make them ready targets for our laughter;
    but the reality they caricature is never so remote that they become mere creatures
    of fantasy. (Ibid.: 106–7)


    We can claim that the humour of the absurdists and Python functions in accordance
    with this mechanical analogy; nevertheless, there is a profound difference in
    how this ‘machine-like rigidity’ manifests itself and is exploited for humorous
    effect. In Pinter and Beckett, life itself is a futile machine and the characters
    in their plays are mere faulty, or even superfluous, components in its meaningless
    grinding operation. By contrast, in Python the humour lies in the mechanical rigidity
    of particular individuals and organisations that inveigle reasonable citizens
    into their ridiculous mechanisms and procedures. Like the (not particularly funny)
    work of Franz Kafka, in which the ordinary, even anonymous, citizen is trapped
    on a downward spiral track of irrational systematisation, Python frequently pitted
    a hapless individual against illogical authority figures and organisations, as
    in, for example, ‘New Cooker Sketch’ (episode 14, ‘Face the Press’). The similarities
    between the work of Kafka and Python are considerably marked; indeed, both Kafkaesque
    and Pythonesque have entered the popular lexicon as adjectives that are freely
    used to indicate the strange, irrational and bizarre. Looking at the ‘New Cooker
    Sketch’ as an illustrative example, the sketch begins in one situation which is
    both absurd and mundane and then accelerates through increasing levels of weirdness
    as it progresses. A woman has bought a new gas cooker and wishes it to be fitted;
    however, the gas board employees who come to fit the appliance give a relatively
    mundane reason why they can’t complete the task. These gas fitters call upon colleagues,
    who also are unable to fit the cooker for other reasons. From this point more
    and more gas board employees are called, each of whom gives an increasingly absurd
    bureaucratic reason why they can’t fit the gas cooker and why another colleague
    needs to be called in to fit the cooker, leading to the suggestion that the woman
    should gas herself to speed up the process. The sketch ends – or rather, morphs
    into another – with the sight of an endless line of gas board employees extending
    down the street. This sketch has similarities to the writing of Kafka not only
    in that it highlights how the individual may be caught in a ludicrously officious
    bureaucratic process, but also by the fact that in the scenario of this sketch
    and much of Kafka’s fiction, the citizen becomes a victim in an irrational trap
    from which they cannot escape.'
- md: 'The scenario also escalates in absurdity and claustrophobic hysteria at an
    alarming rate. The sketch/piece of fiction frequently opens with a scene in which
    an unwitting character, thinking that they are in quite a mundane situation, finds
    this mundane situation take on an odd slant. Nevertheless, despite the oddness
    of this situation, usually the scenario is still within the realms of the plausible,
    if unlikely. However, in both Python and Kafka, the protagonist’s situation becomes
    rapidly more bizarre in incremental steps. Very quickly, the character has found
    themselves whisked along speedily from the mundane, to the odd, to the absurd.
    Both Python and Kafka utilise this strategy both as a means of highlighting how
    absurd the mundane actually is, and also to demonstrate how vulnerable we are
    to the absurd and irrational once it begins to intrude on our lives, how helpless
    we are once this irrationality has us in its grip, and how impossible it is to
    escape this absurdity.


    Although some characters in Python are comic because they are set up in opposition
    to stereotypes, such as ‘Hell’s Grannies’ (episode 8, ‘Full Frontal Nudity’) and
    ‘The Bishop’ (episode 17, ‘The Buzz Aldrin Show’), Monty Python is riddled with
    caricatures that would sit well with Molière’s gallery of fools. These characters
    are trapped by a machine-like absurd over-logic, in love with and imprisoned by
    the delusions of their position and supposed rank. Python routines are habitually
    populated by pompous and self-righteous civil servants, judges, clergymen and
    army officers, officious shopkeepers, sleazy gameshow hosts and pedantic bureaucrats.
    As such, the Pythons are *with* their audience, they share a common foe: Python
    sketches – despite their absurdity – are very much ‘about’ and ‘refer to’ the
    audience’s world, rather than maintain that their world is a fiction.


    For Beckett and Pinter, the mundane is not only meaningless, but mocked. It is
    to be mocked and derided for its futility. For them, the triviality of having
    a gas cooker fitted is a terrible and soul-corroding affirmation of the essential
    nihilism that underscores existence and evidences the meaninglessness of humanity
    and the universe. The Pythons, however, one feels, do not position themselves
    above such things. They too use and need gas cookers. For the Pythons, the need
    for a gas cooker is not the issue, and it is certainly not taken as an emblematic
    device to represent the yawning void of nothingness at the heart of being. The
    Pythons – like us – need a working gas cooker. The Pythons – like us – are frustrated
    by the fact that something seemingly as simple and mundane as having a gas cooker
    fitted becomes hugely complex and time-consuming when a government department
    (as was the case at the time of *Flying Circus*’s broadcast) has to be called
    in to oversee its installation. At the heart of *Python* there is a very real
    link with the reality of the audience’s lives rather than a distancing from it.


    In using humour to attack the institutions and practices predominant in British
    society, Python was recognised as being part of a wider move towards satirical
    comedy that was becoming more prevalent in the 1960s and 1970s on British TV as
    its practitioners and its audience recognised the value of comedy as a means of
    attack on the powerful – a means of attack that carried greater weight than more
    ‘serious’ cultural forms. As Friedrich Dürrenmatt noted in 1966:


    > Man’s freedom manifests itself in laughter, his necessity in crying; today we
    have to demonstrate freedom. The tyrants of this planet are not moved by works
    of poets, they yawn at their lamentations, they consider their heroic lays silly
    nursery tales, they fall asleep over their religious poetry, there is only one
    thing they fear: their mockery. So parody has crept into all genres, into drama,
    into lyrical poetry. (Dürrenmatt 1966: 128)


    Yet despite there being so many examples of satiric and parodic work produced
    in this period, *Monty Python’s Flying Circus* retains its status as a subversive,
    ground-breaking, anarchic, boundary-defying and (let’s not forget) funny text,
    and the programme’s appeal has far outlived its initial 1969–74 run. Pythonesque
    remains our best available adjective for the absurd and nonsensical, whether we
    are talking about fiction or reality. While the post-Python output of the individual
    team members may ostensibly seem tamer and more conventional, they continue to
    challenge the viewer and familiar media format. John Cleese’s *Fawlty Towers*
    (1975–9) revitalised the stale format of the sitcom and gave it greater bite;
    Terry Jones’s history programmes, such as *Crusades* (1995), brought revisionist
    history to popular television; Eric Idle has subverted the affected and anodyne
    world of musical theatre with *Spamalot* (2005); Michael Palin’s genial travel
    programmes – for example, *Around the World in Eighty Days* (1989) – have quietly
    challenged the format of the travel programme by making the production of the
    show overt; and Terry Gilliam’s film work – exemplified by *Brazil* (1985) – blended
    the Pythonesque with the Kafkaesque and Orwellian to blatantly satirise contemporary
    society.


    The Pythons have demonstrated – both in *Monty Python’s Flying Circus* and beyond
    – an influence and debt to the Theatre of the Absurd, yet their output has extended
    beyond its parameters by both embracing a more humanist ethos and engaging a vast
    audience by utilising the avant-garde within the popular domain. Few of us have
    cause to return dead parrots to pet shops, fear the Spanish Inquisition or take
    our mother’s corpses to undertakers in sacks, but fifty years after its original
    transmission, *Monty Python’s Flying Circus* remains one of the most relevant,
    most subversive and challenging television programmes in TV history.


