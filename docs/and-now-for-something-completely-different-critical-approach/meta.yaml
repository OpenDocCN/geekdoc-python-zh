  mdcn: '## 10. 哲学、荒诞、浪费与*生命的意义*：一部cult电影，某种意义上的


    欧内斯特·马蒂斯


    > – 宝贝，生活由你创造

    Talk Talk，《生活由你创造》（1985）

    > – 噢，好吧，我们到了，这是主题音乐

    蒙提·派森的《生命的意义》（1983）


    *蒙提·派森的《生命的意义》*（1983）反映了生活，并且表现得像一部cult电影，某种意义上的。这部电影的结构就像收到糟糕的路线指引。它始于对（特定类型的）逻辑和进步的坚定信念，固执地、线性地从出生走向死亡。一个又一个路口，《生命的意义》将道德置于生活的中心——对与错、好与坏的区别，或者如道格拉斯·亚当斯在《银河系漫游指南》的导言中所说，“为善而错”（Adams
    2002: vii）。在前进的路上，《生命的意义》直面并嘲弄二元对立（个体 vs 官僚机构，宗教 vs 唯物主义，朴素 vs 华丽）。然后，电影逐渐且不可避免地迷失了自己，它将文化主题切割成碎片和片段，最终将自己编织成一个无尽循环、令人挠头的结——带着一个感叹号。就像大多数路线指引一样，它戛然而止：时间到了，开关被关掉，一段关于当今娱乐现状的、结结实实的他妈的咆哮结束了这一切。


    本章分析《生命的意义》从逻辑到迷失的转变，并非将其视为一种犬儒主义的承认或虚无主义的宣言，或者说“好吧，管他呢”，即认为一切都无关紧要。相反，本章认为，《生命的意义》将生命的荒诞与浪费呈现为一种哲学，这种哲学通过颂扬生命——不是将其视为抑郁，而是*灿烂的生命之乐*——渗透到我们理解尘世时光的方方面面。在这种哲学中，幸福与残酷是邻居，它们*都*需要以充沛的精力去面对，而且它们都导致浪费——但这种浪费是好的。结合哲学评论，并努力将其同时缩小到其文本时刻和复杂性，以及将其置于更广阔的电影、喜剧和文化背景中，本章旨在勾勒出一些实例和联系，以阐明《生命的意义》作为一部结构歪斜、对严肃性所假定的深刻性竖起手指的作品的特殊地位。在文学研究中，本章的方法接近于米哈伊尔·巴赫金在《对话的想象》（1982
    [1975]）中提出的术语和方法，特别是关于“话语”（互文单元）的部分。最直接地说：《生命的意义》通过大量的话语爆发出来。


    关于方法论还有一点说明：由于本章大部分内容结合了文本解读和文化背景分析，我忍不住应用了一种《生命的意义》也使用的技术，它的灵感来源和参考点也是如此，那就是引用来自流行文化各处的引文，以说明这部派森电影是如何深陷于文化循环之中的（有点像名为“死亡”片段的开头）。如果这让本章的阅读更像一场耐力测试，那么请想象一些主题音乐伴随它。


    ### 哲学


    与它自己在一个关于中世纪的片段中的宣言相反，《生命的意义》并没有将哲学用作“构建一个可行的假设来解释生命意义的尝试”，至少不是直接的。如果将其归结为一个宽泛的主张，派森对生命意义的探讨与特里·伊格尔顿的探讨并无太大不同，后者在其简短的哲学小册子《生命的意义》（2007）中使用了电影中的图片作为插图。对伊格尔顿来说，生活由你创造，在其物质性、过程和实践中，存在着一种走向幸福的运动（不是个人的而是集体的幸福，不受意识形态或意识的污染，但有一个道德指南针——一套亚里士多德式的美德）。将幸福替换为享受（并忽略伊格尔顿关于快乐“短暂”性质的少数异议——他将其等同于在城里度过一个夜晚，顺便说一句，这也是派森如何结束他们电影的一个显著特征），并将他承认生活是“所有这一切的总和”替换为派森电影的最后一句话“我们到了”，那么生活*是*可以拥有的，在那里，在当下，*在它流逝之时*，似乎是唯一合理的答案。这类似于西格弗里德·克拉考尔得出的结论，他提出了一种“观望”态度作为开放性的形式，这最接近生活所能达到的意义（Kracauer
    1995）。


    《生命的意义》也声称，生活并非纯粹的个人追求。像克拉考尔和伊格尔顿的思考一样，它牢固地置于社会背景中。生活与人同在，有时以被称为家庭、邻里、社区、政党、选区、人口的群体形式存在，其动态有助于推动生活。而且因为它发生在群体中，生活会与他人碰撞。在此过程中，根据亨利·柏格森（1900）的说法，它可以产生各种反应，其中之一就是笑声。这种笑声大多是对怪事和意外、未计划的事件和话语的反应，人们希望通过结构来解决（或至少减弱）这些。从这个意义上说，喜剧是一种应对机制，有助于生活创造意义（参见诺尔·卡罗尔的《化身喜剧》[2009]）。《生命的意义》提供了许多这样的共处时刻。其中一些采用了大型编舞的形式，比如最终涉及约克郡整个工人阶级社区（甚至更多）的罗马天主教歌舞。另一些，比如鱼缸里的一小群鱼，则保持小巧。然而，这些场景共同编织成一个整体，不仅提供了慰藉（应对），还为生活提供了一个想象的方向。正如米歇尔·马费索利（1988）所观察到的，社交聚会本身成为了一种结构。


    因此，尽管有开放性、等待和应对，《生命的意义》也坚定地强加了一种分组结构、一个严格的剧本，按时间和类别划分。生活被分阶段呈现。此外，由于这种结构化的生活伴随着压力（责任、义务、制度……），它也从一个反常的侧面展现自己——这个侧面似乎与上述通往幸福的道路背道而驰。其中一个侧面是残酷。根据安德烈·巴赞（2013
    [1976]）在分析路易斯·布努埃尔、阿尔弗雷德·希区柯克和普雷斯顿·斯特奇斯（等人）电影中的残酷时所说，存在几种电影残酷。一种是偶然的残酷，意外。一个痛苦的摔倒就是一个例子，卡罗尔描述的那种滑稽戏和马戏团喜剧，属于身体幽默，其中身体伤害和疼痛是可能的——它们发生了，不是任何人的错。《生命的意义》中几乎没有这种。派森的《飞行马戏团》系列和《圣杯》偶尔会涉及，但在这里被推到了边缘。一个值得一提的例子是小詹金斯母亲的去世，只是顺便提及。我们甚至不知道她死于什么。


    第二种残酷是故意的。它意在伤害，但可以独立于道德之外——它意在伤害，但不是惩罚。如果我们将巴赞的哲学和基督教灵感追溯到其源头，我们甚至可以区分非道德的残酷和不道德的残酷。前者只是为了伤害。后者是因为它基于一种信仰体系而实施伤害，它通常通过“矫正性处决”的结构出现（关于巴赞对电影中残酷的分析与道德哲学之间联系的详细讨论，参见Mathijs
    1994）。我们在《生命的意义》中目睹了许多故意的伤害。在最初的几分钟里，一条鱼被


    ---


