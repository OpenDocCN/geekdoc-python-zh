    2009），同时也捕捉到了1970年代初英国的某种情绪：评论者总结道，“《飞行马戏团》原声带背后的人拥有高度发达的音乐思维”（同上）。换句话说，这个非官方策划的音乐作品集，虽然大多只在电视节目中短暂出现，且选择原因多样（很可能有些纯粹是因为现成可用），但它仍然为分析这一已被充分挖掘的文化现象提供了另一个合理的工具。*The
    Quietus*的另一篇文章，这次由Taylor Parkes撰写，借2014年“重聚”演出之机，批评了他认为大众对Python仅提供“愚蠢”娱乐的误解，以及音乐在此过程中扮演的角色。他认为，罪魁祸首是Eric
    Idle——他通常被认为是Python中“有音乐才华”的成员（Wright 2017: 20），被Terry Jones描述为团队的“音乐权威”（Morgan
    1999: 72）——以及自他的音乐剧《Spamalot》（2005年首演）成功以来对Python的“无声接管”，这“定下了基调……在用音乐插曲和编舞稀释喜剧方面”（Parkes
    2014）。与近年来其他“点唱机”音乐剧类似，它们重新利用并叙事化与特定艺术家或时期相关的流行素材，《Spamalot》将来自电视节目、电影和专辑的零散Python歌曲和小调（有些在原作中几乎只是草稿）编织成对《圣杯》（1975）的扩展改编。这一举动在1999年Eric
    Idle的现场录音《Eric Idle Sings Monty Python》中已有预示，该录音以“蒙提·皮森”是伟大的未被认可的作曲家之一这一构思开始，存在于一个替代宇宙中，其版本的《Anything
    Goes》比科尔·波特的更受欢迎；这让人想起第42集《轻娱乐战争》，其中波特对放荡行为的颂歌被一个字面意义上的、实体的替代品所取代：“Anything goes
    in/Anything goes out/ Mutton, beef and trout”等等。在2014年为粉丝服务的《蒙提·皮森现场演出（大部分）》重聚秀中也采用了类似的方法，这实际上是一场“精选集”演出，反映并强化了特定小品和歌曲的经典化。正如每幕开场的两首序曲所展示的关键音乐主题所示，演出中编排的音乐作品不仅仅是功能性的（即覆盖场景转换或弥补表演者的身体缺陷），而且常常提供各部分之间的衔接策略，有时以新的方式组合元素：例如，“Nudge
    Nudge”和“Blackmail”小品被一首融合了两者元素的“说唱”歌曲分隔开。


    有人可能会认为，在《Spamalot》或《现场演出（大部分）》中使用音乐来实现结构连贯性和观众满足感/怀旧感，这与原版《飞行马戏团》（MPFC）的精神相悖，在原版中，音乐和歌曲是以颠覆性、轻率和刺耳的方式排列的，作为对电视形式和陈词滥调批判的一部分。按照这一思路，官方的Python“乐谱书”《相当不完整且插图相当糟糕的蒙提·皮森歌曲集》（1994）更接近“真正的”Python态度，有时甚至为音乐家/表演者实际使用设置了障碍：例如，《I''m
    So Worried》的旋律用了一种恰如其分的“颤抖”字体，《Never Be Rude to an Arab》以炸弹爆炸的视觉等效物结束，《Eric the
    Half a Bee》（奇怪地）以球形呈现，而《Summarising Proust》歌曲则大多难以辨认。


    本章的目的并非裁决关于音乐在丰富或“稀释”Python喜剧享受方面作用的不同评价，而是思考Python传达对音乐态度的一些场合和方式——我指的是音乐家和表演者，以及现场和录制的音乐与歌曲。


    ## 接近Python音乐


    然而，在此之前，有必要承认从Python音乐中挖掘意义和连贯性这一任务的规模和复杂性。此外，正如我即将给出的许多例子所表明的，Python对音乐的陌生化处理在许多方面等同于并展示了他们更广泛的喜剧策略，主要是“文化形式的肢解”（Landy
    2005: 45）、“对传统社会形象的颠覆”（同上：37）以及类型代码的混淆。关于Python对音乐的态度，常见的观察是“高雅与低俗”的模糊化：即古典/精英/知识分子与流行/日常/大众的融合。正如Marcia
    Landy所总结的，“小品大量借鉴了戏剧、文学和电影的经典作品[我们或许可以加上音乐和作曲家]……但掏空了它们备受尊崇的呈现和解释模式，常常将其变成无稽之谈”（同上：83）。因此，古典作曲家和音乐在平凡的语境中被重新想象（例如，莫扎特主持一档低俗的电视节目），而政治家和哲学家则关心欧洲歌唱大赛，一种疾病也可以被改编成音乐剧。另一个相当不言自明的观察是，对于Python成员来说，音乐只是解构电视媒介和轻娱乐“规则”的工具之一。在日记中，Michael
    Palin提到在第三季第33集《沙拉时光》的“奶酪店”小品背景中加入“两位城市绅士随着巴拉莱卡音乐跳舞”的决定，作为团队幽默风格从他们之前作品（在《弗罗斯特报告》[1966-7]等中）的“时事讽刺剧”或讽刺起源，向“不合逻辑和令人困惑”（Palin
    2006: 77）演变的证据。奶酪店“获准公众跳舞”（电视小品开始前，一张外部快照告诉我们）的前景确实存在不协调之处，而持续不断的现场布祖基琴伴奏很可能是一种手段，用以复杂化Palin自己描述的可能流于俗套的“鹦鹉店类型小品”的*场面调度*，John
    Cleese扮演一个日益沮丧的顾客。尽管小品在这里及其各种版本（录制的专辑和现场版本）中通过Cleese随意射杀店主而结束，但他的狂躁在大约一分钟前他指示音乐家“闭嘴”时达到顶峰；在《秘密警察的舞会》（1979）的演绎中，这一刻尤其戏剧性，Cleese——在小品中经常差点“笑场”——特别享受（观众也是）将（非Python的）舞者和音乐家赶下舞台。因此，在某种程度上，这个小品通过唤起店主、顾客和音乐来源之间的三方对抗，成为Python对音乐态度的一个松散隐喻；这也与Terry
    Gilliam被枪杀（在《现场演出[大部分]》版本中相当血腥）时唱着他那并不精致的《I''ve Got Two Legs》小调有相似之处。


    正如预期的那样，除了让人物随机突然唱歌或小品被歌手打断之外，《MPFC》也经常玩弄非剧情音乐的惯例。在第7集《你不再有趣了》中，一个惊慌的角色被安慰说“这只是背景音乐”。在第9集《蚂蚁，介绍》中，这个笑话有了一个元文本的转折，一个不受欢迎的房客打断了一对情侣，并要求将唱片机上的浪漫音乐（观众可能以为是非剧情音乐）换成更刺耳的东西：他咄咄逼人地将一张被Larsen（2008:
    124）识别为Dudley Moore乐队演奏的《I Love You Samantha》的唱片，换成苏萨的《华盛顿邮报进行曲》，这可以被解释为Python自身对当代喜剧格局发起攻击的“内部笑话”式表达。这个笑话的另一个变体推动了第13集《中场休息》的“精神病医生”小品，其中Notlob遭受着“民谣”歌曲和无害的流行歌曲（如Peter,
    Paul and Mary的《We''re All Going to the Zoo Tomorrow》）的可怕“听觉幻觉”。外科医生'
