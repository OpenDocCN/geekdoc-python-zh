    ERNEST MATHIJS


    If hyperbole already was a well-established tactic in comedy, especially in the
    humour of Python’s immediate predecessors Peter Cook, Dudley Moore and Peter Sellers,
    the Pythons turned it up a notch or two – making, in a way, hyperbolic silliness
    the rhetorical centrepiece of many of their sketches (see Jeffrey Weinstock’s
    chapter in this volume). To that, the Pythons also add visual hyperbole aided
    by the increased permissibility of the time. Nudity, violence, evocative choreography
    and hallucinatory *mise-en-scène* (helped by cinematography that was a lot more
    daring in its angling, movement and use of wide-angle lenses than what was present
    in the Pythons’ television work) make *The Meaning of Life* more provocative,
    and yank it out of any regime of representation. This is reflexively commented
    on in the film’s ending (fittingly announced as ‘the ending of the film’), and
    its snipe at popular culture of the time, and beyond. In this epilogue, a lady
    presenter, somewhat resembling the archetype of the well-meaning yet finger-wagging
    Auntie BBC, laments this hyperbolic overkill: ‘Family entertainment? Bollocks.
    What they want is filth. People doing things to each other with chainsaws, . .
    . armed bands of theatre critics exterminating mutant goats. Where’s the fun in
    pictures?’ It is an apt comment on the ways in which hyperbole blew aesthetic
    rules out of existence and equally a smart reflection on then-popular genres experiencing
    some sort of hyperbolic renaissance: the horror film, science fiction and grotesque
    realism, from mondo films to Pasolini’s *Salo* (1975).


    Hyperbole becomes waste in *The Meaning of Life*. The crazy abundance of elements
    stuffed into a scene leads to an explosion of utterances, instances and mentions
    that make up a dense and unruly pile of unnecessary detail from which the story,
    and the film, needs to discharge. A lot of this is visualised via food and body
    fluids. Prompted by theories of pollution and purity, Mathijs and Sexton (2011)
    make the case that displays of traffic of food and fluids from the inside of the
    body to the outside present instances of transgression that are typical for cult
    cinema. *The Meaning of Life* sprays these instances around in abundance. Blood,
    urine, spit, semen, drool and slime all make noted appearances, as they are tied
    to absurd considerations of etiquette, sex-education, politeness and hospitality,
    and made to illustrate the idea that whatever flows from the messy insides of
    people to the highly controlled presentation of self that is one’s outside, challenges
    good behaviour until it blows up.


    The inevitable exemplar of this, and indeed the one scene in *The Meaning of Life*
    that is never left unmentioned, is the ‘Mr. Creosote’ scene. In it, an overweight
    patron in a posh restaurant overeats until he is so filled he looks ready to explode.
    In their very depiction of Mr. Creosote, the Pythons already cross boundaries
    of taste. He is shown as hyperbolically obese, with spilled food scraps dribbled
    and drivelled down his expensive suit. After a copious dinner, and in spite of
    his reluctance, the maître d’ persuades him to consume just one more ‘wafer-thin
    mint’, after which he literally explodes. Litres of minestrone soup are blown
    across the screen. There is hardly any better indication of an utterance in


