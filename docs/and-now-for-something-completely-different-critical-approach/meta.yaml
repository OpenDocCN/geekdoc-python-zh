  mdcn: '## 父女间的蒙提·派森粉丝文化：动机与情境


    “父亲回忆小组”中的女性受访者们以多种相互关联的方式，提及了父亲将她们引入蒙提·派森世界的那个时刻。首先，许多受访者回忆起父亲的这次引荐时，都暗示父亲希望为女儿重现他们年轻时初次接触派森时的环境。虽然一些受访者提到父亲让他们坐下看派森是为了“传递笑声”或“分享幽默”，但另一些人则表示父亲“想让我体验蒙提·派森在他青少年时期带给他的那种同样的幸福感”，或者“等我上中学，觉得我够大了，就决定给我看他看的第一集”，又或者“他说他在我这个年纪，大概12/13岁时，就去电影院看过，而且他知道我爱笑”（#2177
    加拿大人，36–45岁；#2958 美国人，26–35岁；#962 葡萄牙人，18–25岁；#900 美国人，18–25岁；#2338 英国人，18–25岁）。¹
    与其他关于代际粉丝现象的研究类似，这里分享派森的行为在许多情况下涉及父亲将其“包装”成一种“成人礼”（Barker *et al.* 2015: 42），在孩子被认为“够大”或达到父亲初次接触派森的相同年龄或阶段时传递给他们。正如这些例子所示，重现的条件也延伸到先播放父亲看过的同一集，或者强烈暗示受访者应该“体验与父亲青少年时期经历过的同样的幸福感”。


    进一步延伸这种传递家庭传统或家庭派森粉丝体验的观念，相当多的美国和加拿大受访者也指出，这种——几乎是仪式性的——对派森的引荐，源于他们父亲的英国根源。例如，受访者提到“我父亲是英国人”，并“让我意识到我的英国血统”，“我英国的父亲很兴奋能与我们分享”派森“因为他热爱它”，而且“这非常重要”，对于“我父亲，一个英国侨民……来说，他的加拿大孩子能欣赏英国喜剧”（#2885
    加拿大人，56–65岁；#259 美国人，46–55岁；#3618 加拿大人，26–35岁）。此外，还有一种感觉——对于那些在1969年至1976年间蒙提·派森在英国或北美初次流通时接触它的第一代粉丝父亲们来说——传递“他年轻时的一些喜剧”（#2098
    丹麦人，18–25岁）的重要性，也与“代际紧张”、“制度瓦解”以及“新形式全球主义的出现”等常与《蒙提·派森的飞行马戏团》初次亮相相关的“特定文化时刻”（Landy
    2005: 15）有关。例如，一位受访者概述道：


    > 许多重要的社会问题、刻板印象、套路、主题和杂项事物都反映在派森看似荒诞的幽默中。然而，正如我父亲解释了这些事物背后的意义——其中许多对他那一代人来说极其重要——它们对我来说变得更加相关和可理解了。（#3578
    美国人，18–25岁）


    在这些叙述中，有一种感觉——至少通过他们子女的回忆呈现出来——这种父亲对派森的引荐，常常与哈林顿和比尔比所描述的通过共同媒体参与实现家庭关系的超越有关。在这些例子中，向女儿介绍蒙提·派森似乎让父亲能够更多地展现自己作为社会和文化环境中的人（而不仅仅是这些受访者的父亲），从而提供对其“偏好、价值观和解读”的“诚实洞察”（Harrington
    and Bielby 2010），以加强父女纽带。


    除了这些精心包装和有目的的引荐外，许多其他女性受访者回忆起父亲以更渐进和分散的方式将她们引入蒙提·派森，这支持了马特·希尔斯的观点，即成为粉丝常常“成为与流行文化互动的一种常规化、习惯化方式的一部分”，而非总是发生在某个“改变人生、关键性的时刻”（Hills
    2014: 10）。对于许多这些女性受访者来说，派森是她们成长过程中生活中的一个常量。它“总是在我们家播放”，而对于一位瑞典受访者来说，“它就在那里，只要我懂了足够多的英语能欣赏它”；事实上，许多受访者提到“我不记得有不知道他们是谁的时候”，并且“从我记事起就知道”派森（#178
    美国人，36–45岁；#801 瑞典人，36–45岁；#2127 美国人，36–45岁；#3444 美国人，18–25岁）。


    促成这种派森作为他们童年无处不在且日常化一面的感觉的，是频繁提及派森如何渗透到他们生活中的其他方式，超越了电视播放或家庭录像版本的节目或电影放映。首先，派森作为多媒体喜剧现象的地位意味着，对一些人来说，派森最初出现在他们生活中是在他们翻阅父亲的派森书籍时，或者父亲在家播放派森唱片，或在家庭驾车旅行中播放磁带时。这意味着派森喜剧的电视起源最初对一些人来说并不清楚；例如，一位受访者回忆说，“过了好几年我才意识到那磁带是谁的，甚至不知道这个节目是作为电视剧存在的”，而另一位则提到“*Matching
    Tie and Handkerchief*是在我一岁生日后发行的，所以我从太小而无法理解所有词语的时候起就一直在听它，并听家庭成员背诵它”（#723 英国人，36–45岁；#1842
    美国人，36–45岁）。其次，正如最后这个回忆所说明的，与派森的初次接触也常常由父亲持续地重新表演或引用派森小品或场景所引发，这再次意味着背诵喜剧的起源最初对受访者来说并不清楚。例如，受访者提到“当我还是个孩子的时候，我父亲代替睡前故事的方式是重新表演各种他记在脑子里的蒙提·派森小品”，“我想我可能从父亲的模仿中学到的MP引用比从节目本身学到的还多”，以及“我爸爸过去常常背诵它们（我特别记得他表演苏格兰玛丽女王之死）在长途公路旅行中娱乐我……我想我可能以为是我爸爸自己想出来的”（#3578
    美国人，18–25岁；#2305 英国人，36–45岁；#742 美国人，26–35岁）。这里重要的是蒙提·派森作为一种高度可引用的喜剧形式的具体性，它通过多种媒体形式传播，从电视到唱片到书籍再到电影。这导致派森在许多这些记忆中，成为一种弥散但恒定的家庭文本，渗透到许多这些受访者的童年——在家里、在车里、在餐桌上——并且常常对父亲具有使用价值，作为重新利用的睡前故事，或作为专辑形式的公路旅行娱乐，或通过重新表演或引用。因此，这些记忆揭示了派森喜剧如何在其最初播出或发行之后保持其存在和持久性的关键方式，同时也支持了英格-丽丝·博尔的见解，即引用喜剧“提供了一种打破文本与我们自身日常生活之间界限的方式”（Bore
    2017: 112）。


    许多这些叙述中关注派森作为父女之间沟通和娱乐的载体，也是理解父亲与蒙提·派森的关联在受访者发展其派森粉丝身份的记忆中的重要性的关键框架。无论最初的派森接触是通过引荐还是通过成长过程中派森的持续存在发生的，对于许多受访者来说，作为儿童和青少年参与派森的意义始终与其作为一项仅与父亲共享或特别与父亲共享的投资的地位相关。对于“父亲回忆小组”中的许多女性受访者来说，派森是“我们共享的东西”，“我母亲和姐姐‘不懂’这种幽默，但我爸爸和我都很喜欢”，以及“花时间，与我爸爸分享一些家里其他人都不分享的东西，是特别的”（#2168
    英国人，26–35岁；#1371 美国人，46–55岁；#1523 美国人，46–55岁）。这包括一些父母在受访者童年时离婚或分居的情况，例如，一位受访者提到，当她和弟弟去看望父亲时，蒙提·派森是“我们唯一能建立联系的东西”（#2243
    加拿大人，36–45岁）。


