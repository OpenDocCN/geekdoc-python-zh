    and laughers, after all, often demand get-out-of-jail-free cards by professing
    something to be just a joke’ (Cheng 2017: 532).


    Amidst these challenges, I would argue, ethical humour – humour that does not
    depend on disparagement of the disadvantaged or through replication of current
    power relations – is more necessary than ever. If the comic worldview is inherently
    flexible and if humourlessness stems from intractability, it stands to reason
    that if we are going to progress past our current cultural impasse, we need a
    reprieve from that intractability and rigidity. In short, now as never before,
    we need humour. What we do not need, however, is more humour that kicks those
    who are already down. To dismiss such a position as mere ‘political correctness’
    is at best tone-deaf, at worst deliberately cruel.


    Fortunately, other forms of humour are available and always have been. While not
    ‘perfect’ in these terms, much of Monty Python’s work still resonates today. The
    Pythons’ work has been deeply influential, changing comic expectations and conventions
    in significant ways. While some aspects of their comedy may reveal cultural blind
    spots, examples abound – both in *Life of Brian* and elsewhere – of incongruities
    and reversals that not only amuse us, but that have the potential, even decades
    after their original production, to question and challenge multiple aspects of
    the status quo.


    # WORKS CITED


    Benko, Steven (2012) ‘Ironic Faith in Monty Python’s *Life of Brian*’, *Journal
    of Religion and Film* 16(1), article 6. <http://digitalcommons.unomaha.edu/jrf/vol16/iss16/>
    (last accessed 26 August 2019)

    Berlant, Lauren (2017) ‘Three Monologues and a Hairpiece’, *Critical Inquiry*
    (23)2, 233–49.

    Bobker, Danielle (2017) ‘Toward a Humor-Positive Feminism: Lessons from the Sex
    Wars’, *Los Angeles Review of Books*, 17 December. <https://lareviewofbooks.org/article/toward-humor-positive-feminism-lessons-sex-wars/#!>
    (last accessed 26 August 2019)'
- md: '## 10. PHILOSOPHY, ABSURDITY, WASTE AND *THE MEANING OF LIFE*: A CULT FILM,
    OF SORTS


    Ernest Mathijs


    > – Baby, life’s what you make it

    Talk Talk, ‘Life’s What You Make It’ (1985)

    > – Oh well, there we are, here’s the theme music

    Monty Python’s The Meaning of Life (1983)


    *Monty Python’s The Meaning of Life* (1983) reflects life and behaves like a cult
    film, of sorts. The film is structured like receiving bad road directions. It
    starts with a firm belief in (certain kinds of) logic and progress as it moves
    stubbornly straight and linear from birth to death. Junction after junction, *The
    Meaning of Life* puts morality at the centre of life – the difference between
    right and wrong, good and bad, or as Douglas Adams put it in his introduction
    to *The Hitchhiker’s Guide to the Galaxy*, ‘wrong for good’ (Adams 2002: vii).
    On its way, *The Meaning of Life* confronts and ridicules binary oppositions (the
    individual vs bureaucracy, religion vs materialism, austere vs orotund). Then,
    the film gradually and inevitably loses track of itself as it cuts cultural topics
    up into fragments and snippets, and finally it weaves itself into an endlessly
    circular, head-scratching knot – with an exclamation mark. Like most road directions,
    it finishes abruptly: time is up, a switch is flicked off, and a solid effing
    rant about the state of entertainment today ends it all.


    This chapter analyses *The Meaning of Life*’s move from logic to loss not as an
    admission of cynicism or a manifesto of nihilism, or a ‘well, what the heck’ namely
    that nothing matters. Rather, this chapter holds that *Life* presents the absurdity
    and wastefulness of life as a philosophy that worms its way into all facets of
    understanding our time on earth by glorifying it not as depression but *joie de
    vivre éclatante*. In that philosophy, happiness and cruelty are neighbours and
    they are *both* to be approached with exuberance, and they all lead to waste –
    but that waste is good. In conjunction with philosophical commentary, and in an
    effort to simultaneously narrow it down to its textual moments and intricacies,
    as well as situate it in a wider perspective of cinema, comedy and culture at
    the time, this chapter aims to sketch instances and connections that clarify the
    peculiar position of *The Meaning of Life* as a wonkily structured wagging finger
    at the seriousness profundity assumes. In literary scholarship, this chapter’s
    approach comes close to the terminology and methods Mikhail Bakhtin proposes in
    *The Dialogical Imagination* (1982 [1975]), especially with regard to ‘utterances’
    (intertextual units). To put it at its most direct: *The Meaning of Life* explodes
    through a whole lot of utterances.


    One more note on methodology: as the majority of this chapter combines textual
    interpretation with an analysis of cultural contexts, I could not resist applying
    a technique that *The Meaning of Life* uses too, as do its inspirations and points
    of reference, and that is to employ quotations from all around popular culture
    to illustrate how tangled up in circuits of culture this Python film is (a bit
    like the beginning of the segment called ‘Death’). If that makes the reading of
    this chapter a bit more of an endurance test, then please imagine some theme music
    alongside it.


    ### PHILOSOPHY


    In contradiction to its own declaration in a segment on Middle Age, *The Meaning
    of Life* does not use philosophy as ‘an attempt to construct a viable hypothesis
    to explain the meaning of life’, at least not directly. If one puts it all in
    one broad claim, Python’s examination of the meaning of life is not that different
    from that of Terry Eagleton, who uses pictures from the film as illustrations
    in his short philosophical tractate *The Meaning of Life* (2007). For Eagleton,
    life is what you make it and, in its materiality, in its process and practice,
    there is a movement towards happiness (not individual but communal happiness,
    untainted by ideology or consciousness, but with a moral compass – an Aristotelian
    set of virtues). Substitute happiness for enjoyment (and ignore the few quibbles
    Eagleton has about the ‘passing’ nature of pleasure – he equates it with a night
    on the town, which is, by the way, also a strong feature of how the Pythons end
    their film), and substitute his admission that life is ‘what it all adds up to’
    with Python’s last sentence of the film ‘there we are’, and the notion that life
    is *to be had*, there and then, *as it passes*, seems about the only reasonable
    answer. It is similar to the conclusion Siegfried Kracauer comes to, in his propositions
    for a ‘wait-and-see’ attitude as a form of openness that is as close to a meaning
    as life can come (Kracauer 1995).


    Life is not a purely individual pursuit either, Python’s *Meaning of Life* claims.
    Like Kracauer’s and Eagleton’s considerations, it is firmly placed in a social
    context. Life is with people, in constellations sometimes called families, neighbourhoods,
    communities, parties, constituencies, populations, with dynamics that help propel
    life. And because it occurs in groups, life bounces off other people. In doing
    so, it can, according to Henri Bergson (1900), create a variety of reactions,
    one of which is laughter. Most of this laughter is a reaction to oddities and
    accidents, unplanned occurrences and utterances, that people through structure
    hope to solve (or at least mute). In that sense, comedy is a coping mechanism
    that helps life make meaning (see Noel Carroll in *Comedy Incarnate* [2009]).
    *The Meaning of Life* offers plenty of such moments of being-together. Some of
    them take on the form of large choreographies, such as the Roman Catholic song
    and dance that ends up involving an entire working-class neighbourhood in Yorkshire
    (and then some). Others, like the small grouping of fish in a tank, stay small.
    Together, however, these scenes knit a whole that offers not only solace (the
    coping) but also an imaginary direction to life. As Michel Maffesoli (1988) observed,
    social gatherings become a structure for their own sake.


    So, in spite of openness, waiting and coping, *The Meaning of Life* also firmly
    imposes a grouped structure, a strict script, chronological and categorical. Life
    is presented in stages. Moreover, as this structured living comes with stresses
    (responsibilities, duties, regimes, . . .), it also shows itself from a side that
    is perverse – a side that seems to go against the aforementioned path towards
    happiness. One of these sides is cruelty. According to André Bazin (2013 [1976]),
    in his analysis of cruelty in the films of Luis Bunuel, Alfred Hitchcock and Preston
    Sturges (among others), there exist several kinds of cinematic cruelty. One is
    happenstance cruelty, accidents. A hurtful pratfall would be an example, the kind
    of slapstick and circus comedy Carroll describes as physical humour, in which
    bodily hurt and smarts are possibilities – they happen, to no-one’s fault. There
    is little of that in *The Meaning of Life*. Python’s *Flying Circus* series and
    *The Holy Grail* deal with it on occasion, but it is pushed to the sidelines here.
    One example worth mentioning is the death of young Jenkins’ mother, which is announced
    only in passing. We do not even get to know what she died of.


    The second kind of cruelty is deliberate. It is intended to harm but it can stand
    outside of morality – it is meant to hurt but not to punish. If one follows Bazin’s
    philosophical and Christian inspirations to their source here, we can even distinguish
    between amoral and immoral cruelty. The first is meant to just hurt. The second
    is meant to hurt because it is enacted out of a belief system, and it usually
    comes through a structure of ‘correctional execution’ (see Mathijs 1994, for a
    detailed discussion of the connections between Bazin’s analysis of cruelty in
    cinema, and philosophies of morality). We witness a lot of deliberate hurt in
    *The Meaning of Life*. In the first few minutes, a fish gets


