- md: '## CONCLUSION


    Having unpacked some war sketches in both *Monty Python’s Flying Circus* and *The
    Goon Show*, the two programmes arguably have different takes on the Second World
    War, and on military authority in general. It is not only that the frequent explosions,
    sea voyages, plotting and cowardice of the characters suggest that the Second
    World War is the temporal setting and general framework in which *The Goon Show*
    operates, but also that the Goons’ assessment of the war involves a much more
    personal dimension than the Pythons’. Operating with recurring characters who
    often die in each show but then are resurrected in the next, within familiar settings
    such as Bexhill, and using familiar weaponry, *The Goon Show* uses tropes of the
    war to process its trauma, and arguably extend its paradigm to the whole series.
    As opposed to the Goons’ intimate relationship to the war, the Pythons use various
    means to negotiate it as something external that belongs to the realm of memory
    and to another generation. Emphasising contemporary settings, frameworks and self-referential,
    televisual contexts, as well as nominating a character like the Colonel as representative
    of the war and of the military, the Pythons effectively reframe the Second World
    War as a distant event, belonging to another generation.


    ## NOTE


    1. A chronology of *The Goon Show* is accessible here: <http://www.thegoonshow.net/history.asp>


    ## WORKS CITED


    Brock, Alexander (2015) “The Struggle of Class against Class Is a What Struggle?”
    *Monty Python’s Flying Circus* and Its Politics’, in Juergen Kamm and Brigit Neumann
    (eds), *British TV Comedies: Cultural Concepts, Contexts and Controversies*. London:
    Palgrave Macmillan, pp. 51–65.


    Chapman, Graham, *et al.* (1990) *Monty Python’s Flying Circus: Just the Words*,
    vols 1–2. London: Methuen/Mandarin.


    Chapman, Graham, *et al.* (2003) *The Pythons Autobiography by the Pythons*. London:
    Orion.


    Landy, Marcia (2005) *Monty Python’s Flying Circus*. Detroit, MI: Wayne State
    University Press.


    Lenz, Bernard (2015) “‘Your Little Game’: Myth and War in *Dad’s Army*”, in Juergen
    Kamm and Brigit Neumann (eds), *British TV Comedies: Cultural Concepts, Contexts
    and Controversies*. London: Palgrave Macmillan, pp. 36–50.


    Milligan, Spike (1972) *Adolf Hitler: My Part in His Downfall*. Harmondsworth:
    Penguin.


    Milligan, Spike (1973) *The Goon Show Scripts*. London: Sphere Books [edition
    without page numbers].


    Milligan, Spike (1976) *’Rommel?’ ‘Gunner Who?’*. Harmondsworth: Penguin.


    Rawlings, Roger (2017) *Ripping England! Postwar British Satire from Ealing to
    the Goons*. Albany, NY: State University of New York.


    Wagg, Stephen (1992) ‘You’ve Never Had It So Silly: The Politics of British Satirical
    Comedy from “Beyond the Fringe” to “Spitting Image”’, in Dominic Strinati and
