  md: 'Another key illustration of the impact of Python’s continued presence in these
    respondents’ lives is that a substantial number noted that they have either passed
    on, or intend to pass on, their Python fandom to their children, replicating the
    processes enacted by their fathers and passing on the family tradition in a manner
    akin to Dixon’s insights on football fandom and family influence. Respondents
    note, for instance, that ‘I’m loving that my kids are now old enough to *begin
    the process all over again*!’, and that ‘my daughter enjoys it *as much as I did*,
    because the humor references general experiences that most everybody shares’ (#3797
    British, 46–55; #263 British, 36–45; #1553 American, 36–45; my italics). This
    second example refers to a characteristic that has long been seen as a core component
    of Python’s comedy, something which has enabled Python to travel and succeed outside
    the UK in a way that has not been achieved by other forms of British comedy. In
    line with this respondent’s comment that their comedy ‘references general experiences’,
    Jeffrey Miller has accounted for Python’s success in the US, for instance, by
    noting that Python ‘largely avoided topical satire that named specific names and/or
    issues; instead, it focused on institutions of authority familiar to both national
    cultures – the church, the military/police, the legal system, governmental bureaucracies’
    (Miller 2000: 131–2). While this broad applicability has its limits – with, as
    noted earlier, a number of female respondents acknowledging that, looking back
    from the present, Python can be seen as having problematically sexist elements
    – it also appears, in many cases, to have propelled Python’s circulation and impact
    not only internationally but also through time and generations.


    Many respondents also vividly conveyed the sense that they carry Python around
    with them, through their ability, like their fathers, to know and recite every
    word of particular Python sketches and films. As one respondent notes, ‘I have
    since expanded my repertoire and I can proudly quote several Monty Python productions
    backwards and forwards’; for another, ‘it’s so wonderful to have all of their
    comedic skits etched into my brain’; while, for another, ‘some skits are just
    written on my bones at this point. I feel like they are old family friends’ (#3873
    American, 26–35; #1497 American, 46–55; #1842 American, 36–45). Once again, and
    illustrating Barbara Klinger’s argument that ‘dialogue’ can ‘define the means’
    by which media texts ‘circulate culturally’ (Klinger 2008), the marked quotability
    of Python’s comedy output is shown to be key to its durability and continued presence
    in the life cycles of these respondents, evocatively illustrated by the comment,
    from one respondent, that Python’s sketches have now come to be ‘written on my
    bones’ after years of circulation through childhood into adulthood.


    In line with the earlier respondent’s comment that they ‘owe much’ of their ‘adolescent
    character development’ to Monty Python, respondents also demonstrate, in their
    responses, how their initial introduction to and engagement with Python served
    as ‘crucial’ in their ‘adult identity-formation and self-definition’'
