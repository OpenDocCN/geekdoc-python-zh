  mdcn: '此外，这种文化材料作为*电视*的地位至关重要。电视的社会角色建立在一个相对连贯的公众概念之上，正是因此它才成为大众媒介。喜剧常常在其文本元素中铭刻这个集体公众，而背景笑声则作为信号，向家庭观众展示其他人对所描绘内容的反应。《蒙提·派森》有背景笑声，这不仅向观众表明这些小品应如何被理解，还证明了真实的人们确实如此理解了它们。但这种集体只能是人类中心主义的；背景笑声是人类文化用来标示其关于何为幽默、何为不幽默的集体确定性的工具。因此，是人类决定一只死鹦鹉是幽默的，一只待售的信天翁是幽默的，一只无聊的猫是幽默的。而人类通过背景笑声来标示他们对这种划分的认可。因此，即使其中一些小品的内容可能挑战了支撑人与动物关系的假设，它们也并未——也不可能——挑战人类赋予自身对他者进行表征的权威，以及就这些表征的意义和价值达成共识的权威。这意味着这里展示的动物只能是喜剧对象，其表征服务于非人类中心主义之外的任何目的。


