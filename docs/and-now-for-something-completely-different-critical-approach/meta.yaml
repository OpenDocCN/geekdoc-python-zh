  md: '# 4. THE ROYAL PHILHARMONIC GOES TO THE BATHROOM: THE MUSIC OF MONTY PYTHON


    James Leggott


    In 2005, a CD was released entitled *De Wolfe Music Presents: Monty Python’s Flying
    Circus*, its front cover advertising ‘30 musical masterpieces’ from the ‘infamous
    television programme 1969–1974’. The casual or unwary comedy fan may well have
    been disappointed to discover that, rather than containing songs and ditties such
    as ‘The Lumberjack Song’, ‘Spam’ or ‘Dennis Moore’, the album merely featured
    full-length versions of the incidental music heard occasionally, albeit often
    effectively, on the TV series. Although the release of the De Wolfe compilation,
    drawing from the holdings of one of the earliest and most significant ‘libraries’
    of tracks for film and television production, is just one demonstration of the
    increasing collector and scholarly interest in historical stock music, it surely
    also confirms the strong association in the popular imagination between Python
    and music.


    The ‘musicality’ of Python can be evidenced in various ways: the reach and popularity
    of songs such as ‘Always Look on the Bright Side of Life’, the production of a
    song book and musical compilation albums (*Monty Python Sings*, first released
    in 1989 and later expanded), the liberal sprinkling of songs across the albums
    and live shows, and the widespread connotations today of a Sousa march with absurdist
    imagery and flatulence rather than the Liberty Bell of its actual title. But beyond
    that, as an act with an irreverent, countercultural reputation, Python has also
    been received and interpreted in ways analogous with contemporary music and musicians.
    In addition to the *Sgt. Pepper*-evoking name, the reception as a cult act (particularly
    in the United States following'
