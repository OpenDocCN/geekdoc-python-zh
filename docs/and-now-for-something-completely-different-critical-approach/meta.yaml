    ## ARCHAEOLOGY TODAY


    In their 2017 edited collection, *Python beyond Python*, Reinsch, Whitfield and
    Weiner focus on ‘the creative endeavors of Python members, alone and in smaller
    groupings’, arguing that – in contrast to ‘the canonical Monty Python texts’ –
    this work has been ‘neglected or misread’ (Reinsch *et al.* 2017: 2). While studying
    the work of individual Python members outside of the Python canon is clearly valuable,
    this argument assumes that Monty Python’s canon of work has already been well
    covered and explored within academic scholarship. To some extent this is the case,
    with academic writing on Python stretching from the chapter on *Flying Circus*
    in Frank Krutnik and Steve Neale’s *Popular Film and Television Comedy* (1990),
    to Adam Whybray’s 2016 article on the uses and meanings of drag in Python’s work.
    However, our book returns to analysis and investigation of the Monty Python canon
    without apology, and with an acknowledgement of the fact that (as we will go on
    to outline) there is an array of approaches and questions of crucial importance
    to considering and reflecting on the initial impact and continued popularity of
    Monty Python that have yet to be brought to bear on Python as a set of comedy
    texts, as a comedy team of creative individuals, and as a multi-media comedy phenomenon.


    Our book is indebted, however, to the – largely excellent – scholarly work that
    has already been published on Python, which, we would argue, can be loosely grouped
    into four strands in terms of theme and chronology. Between 1990 and 2005, work
    by Krutnik and Neale, Stephen Wagg, and Marcia Landy laid the groundwork for scholarly
    investigations of Monty Python within television and media studies, through its
    mapping of the key influences, contexts, features and themes of Python’s comedy,
    with particular focus on the ground-breaking nature of *Monty Python’s Flying
    Circus*. This work offers a number of key forms of knowledge and insight. Firstly,
    it has focused on identifying and outlining ‘the show’s British (indeed English)
    antecedents, sociocultural context, and institutional base’ (Neale 2001: 64),
    contextualising Python’s style and techniques within the ‘1960s satire boom’ (Mills
    2014: 126) and Oxbridge revues and in relation to, on the one hand, contemporaneous
    comedy such as *Beyond the Fringe* and *Q5*, but, on the other, the influence
    of the musical hall and the physical comedy of silent cinema (see Landy 2005,
    and also, more recently, Brock 2016). Beyond this set of influences, Landy has
    also identified and explored the way *Flying Circus* mixed high and low culture,
    arguing that this crucial aspect of Python’s comedy ‘made the shows accessible
    to wide audiences despite the often erudite character of allusions to literature,
    philosophy and history’ (Landy 2005: 3).


    Secondly, and conversely, this strand of literature has also offered key insights
    on what can be seen to distinguish Python’s comedy from this web of (largely British)
    comedic influences. Once again, of particular note here is Landy’s work, which
    has considered, in detail, how the comedy of *Flying Circus* can be related to
    Mikhail Bakhtin’s theories of the Carnival, through its focus on the body, violence
    and death and on turning ‘the accepted world . . . on its head’, using these strategies
    ‘to call attention to the role of institutions – medicine, psychiatry, the family,
    the state’s administration of social life, the uses and abuses of history, and
    especially the disciplining of the sexual body through existing social formations’
    (Landy 2005: 101). Of course, another key distinguishing innovation is the employment
    of animation within the format of the sketch comedy, something which is explored
    in unprecedented depth and detail in Paul Wells’ chapter within this volume. As
    initially acknowledged in Landy’s work, Gilliam’s animation was important in not
    only informing but instigating much of the distinctive style and structure of
    Python’s comedy. Finally, and perhaps most crucially, this strand of scholarship
    has also foregrounded *Flying Circus*’s ‘unrelenting critique of the television
    medium’ (ibid.: 3) as key to its impact and distinctiveness, exploring how Python
    built on the innovations of *The Goon Show* (in the radio medium) and Spike Milligan
    (in the television medium) in order to play with, explore and parody the conventions
    of television, myriad television formats and the structure and flow of broadcast
    television as a whole. Of particular importance here is Krutnik and Neale’s detailed
    analysis of the strategies employed to do this across one case study episode of
    *Flying Circus*. Here, they built on Wilmut''s identification of Python''s use
    of ''the format sketch'', which involved taking ''the format of something like
    a television quiz programme'' and then emptying ''the content out of it, replacing
    it with something ludicrous'', as well as the ''escalation sketch'' – which is
    when, for Wilmut, an idea is allowed to ''get wildly out of hand, so that absurdity
    builds on absurdity'' (Wilmut 1980: 198). Through a consideration of how these
    strategies are employed within the chosen *Flying Circus* episode, Neale and Krutnik
    are able to illustrate how these approaches, in tandem with the employment of
    ''diegetic and functional overlap'', ''interruption and intrusion'' and ''repetition
    and variation'', enabled Python to ''produce a markedly “self-reflexive” style'',
    creating ''the sense . . . not only of a distinctive and extensive comic world,
    but of a world that pertains to television''. Through this, they not only exposed
    ''the limits of conventional television formats'' but linking ''their absurd arbitrariness
    to institutions and representatives of institutional power'' (Krutnik and Neale
    1990: 202).


    The key arguments and observations of this initial strand of scholarship on Monty
    Python primarily aimed, then, to identify the innovations and distinctiveness
    of their television comedy. Indeed, a return to the key insights within this scholarship
    serves as a useful reminder of what made Monty Python so distinctive and innovative
    at a time, in 2020, when they have reached new heights of accessibility and respectability,
    after the sell-out O2 shows and purchase of their content by Netflix.


    Beyond this strand of initial Python scholarship, a second strand of work encompasses
    four edited volumes on Python, published between 2006 and 2017. The aims and agendas
    of these volumes are, in our view, distinct from our book, in both their focus
    and the disciplinary approaches adopted. Gary C. Hardcastle and George A. Reisch''s
    2006 volume, *Monty Python and Philosophy*, includes analyses from scholars of
    philosophy and political science of sketches or aspects of both the Python television
    show and films, but with the emphasis placed on how the chosen sketches and films
    illustrate philosophical issues or ideas rather than placing focus, through film,
    television and media studies frameworks, on Monty Python itself and the production
    practices and play with relevant modes and media that underpin Python''s comedy
    and its cultural status. The same is the case with Joan E. Taylor''s 2015 volume
    *Jesus and Brian*, which brings together biblical scholars to consider *Life of
