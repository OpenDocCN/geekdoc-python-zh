    the importance of sentimentality, the subversive aspect of the ‘When Does a Dream
    Begin’ sequence – within the Python body of work so far – is that it is essentially
    played ‘straight’; Innes sings to camera in a piece of black-and-white footage
    deliberately ‘distressed’ so as to appear like war-time film footage. Such well-observed
