    that is, for them at least to conform to the column of script in width and to
    the lines of script in height. It has been shown that in Parisian illuminated
    manuscripts of the early fifteenth century, the page ruling might affect not just
    the format of a miniature, but its internal spatial organisation and objects represented,
    for instance the alignment of roof-lines or the doorposts of buildings. (Alexander
