    by their children – this paternal introduction to Python was frequently tied to
    what Harrington and Bielby have described as the transcendence of familial relationships
    through shared media engagements. In these examples, introducing Monty Python
    to their daughters seems to allow fathers to reveal more about themselves as socially
    and culturally situated people (rather than as just these respondents’ fathers),
