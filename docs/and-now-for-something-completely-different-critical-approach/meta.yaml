    as a ‘touchstone for a continuing set of beliefs about the world’ (Pillemer 1998:
    65–83), which, as with the first Monty Python generation represented by many of
    these respondents’ fathers, involves an engagement with the anti-authoritarian
    aspects of Python’s comedy. As in these cases, however, this is an engagement
    which can lead to respondents’ criticism of the same familial and paternal context
    through which they were introduced to Python in the first place. Such paradoxes
    and complexities illustrate the value of attending, in detail, to people’s memories
    of enduring comedy fandom, and particularly the kind of durable, transnational,
    pervasive, culturally eclectic, polysemic and multi-medial comedy represented
    by Monty Python.


    ## CONCLUSION


    In some ways, the recollections of initial encounters with Python discussed in
    this chapter seem to point to processes which Jeffrey Weinstock has identified
    as informing the long-term circulation of *The Rocky Horror Picture Show* – where,
    through a new status ‘as an inherited rite of passage’, the ‘necessity of viewing’
    an originally daring and countercultural text moves from ‘subcultural demand to
    general cultural imperative’, from an ‘edgy’ to a mundane and ‘normal’ act (Weinstock
    2007: 112–13). In this respect, paternal encouragements for daughters to watch
    the same episodes and experience the same pleasures as those first encountered
    by their youthful fathers could be seen to stymie and restrict the shaping of
    these daughters’ comedy tastes and engagement with humour. While the recollections
    analysed in this chapter to some degree support such readings, there are two key
    discursive trends repeatedly crossing the responses which illustrate how enduring
    comedy consumption can shed new light on ‘how young people, past and present,
    engage with popular culture and media as part of the process of growing up’ (Kuhn
    2002: 238), and, in turn, how they build and maintain meaningful familial relationships
    that cross both gender and generation.


    Firstly, the fact that an investment in Python served as the (in many cases) singular
    or primary element in many of the father–daughter relationships discussed and
    recalled by these female respondents provides a new intergenerational perspective
    on the social uses and functions of comedy and, crucially, Giselinde Kuipers’
    important argument that humour is primarily ‘a form of communication that is embedded
    in social relationships’ (Kuipers 2015: 7). Despite the dated nature of some of
    Python’s comedy (from the perspective of present-day reminiscence), the diversity
    and polysemic nature of Python’s output (silly but adult, absurd but socially
    critical, irreverent but philosophical) has clearly enabled quotations and particular
    sketches to endure and to serve, for these respondents, as vehicles of communication
    which maintained father–daughter relationships while, paradoxically, transcending
    them by foregrounding, for daughters, their father’s status as a distinct person.
    Secondly, and in contrast to Weinstock’s argument that the take-up of a text like
    *Rocky Horror* by younger generations has little to do with the assertion of ‘transgressive
    individuality’ (Weinstock 2007: 111), engagement with Python, in examples discussed
    across the chapter, has enabled respondents to embrace a sense of themselves as
    different, distinct or as standing out from their gender or peer group in different
    contexts, and to, in other cases and in relation to Python’s anti-authoritarian
    or socially critical dimensions, critically assess and reflect on aspects of their
    own social worlds and familial backgrounds.


    In these respects, such cross-gender intergenerational forms of Python fandom
    can, arguably, be read less as a form of co-option of daughters into the comedy
    tastes of older generations, and more as continuing textual encounters which,
    in varying ways, have enabled the ‘expansion of self-experience’ and ‘knowledge’
    about these respondents’ selves (Hills 2014: 11), their familial and social relationships,
    and their ways of seeing the world, both humorously and critically.


