  md: 'Important in these human–animal relations is that ‘pets exist for human pleasure
    and convenience. Fond as owners are of their animals, they do not hesitate to
    get rid of them when they prove inconvenient’ (Tuan 1984: 88). The activity of
    pet-keeping is one whose primary driver is the desire of the human, and it is
    not a relationship that an animal enters into through choice. While it is certainly
    the case that pet-owners attend to their pets’ needs, these must function within
    the dominant needs of the human. As such pet-keeping can be seen to evidence a
    ‘psychology of dominance and affection’ (ibid.: 167) by which humans justify the
    dominance over animals they choose to keep in their homes via displays of affection.
    And that dominance is most evident in that ‘English law views animals simply as
    the property of human owners, only trivially different from less mobile goods’
    (Ritvo 1987: 2). The transformation of other living beings into property establishes
    a hierarchical power relationship normalised and enacted by pet-keeping.


    The failure of that power relationship can function as the incongruity that comedy
    exploits. So, in the sketch ‘confuse-a-cat’, a suburban couple peer worriedly
    out of the living room window at the cat sitting motionless on their lawn. A vet
    arrives, and it transpires that the couple have sought the medical expert’s help
    because the cat, as the wife explains, ‘Doesn’t do anything. He just sits out
    there on the lawn.’ The vet goes on to diagnose the cat as exhibiting ‘[t]otal
    physical inertia. Absence of interest in its ambience . . . Failure to respond
    to conventional external stimuli . . . To be blunt, your cat is in a rut’. The
    couple react fearfully, and the vet continues: ‘It’s the old stockbroker syndrome.
    The suburban fin de siècle ennui.’ His prescription is to call the company Confuse-A-Cat
    Ltd, who arrive in a large van from which several white-coated performers emerge.
    They are managed by an army general, who orders them to build a stage in the couple’s
    garden, directly in the eye-line of the cat. Once it’s built they perform a sequence
    of nonsensical and non-realist tableaux, in which boxers, a policeman, Napoleon
    and a penguin on a pogo stick interact. Editing means that characters vanish in
    a moment, and reappear elsewhere. The performance ends with the actors taking
    a curtain call, and the couple and the army general turn their attention to the
    cat. The cat slowly gets up, walks past the humans and into the house. The couple
    enthusiastically thank the general, who modestly notes that they were simply doing
    their job. Captions on-screen then state that Confuse-A-Cat Ltd is associated
    with other animal-startling companies, such as Amaze-A-Vole, Puzzle-A-Puma and
    Bewilderbeest. This is overlaid with rousing military music, as the general looks
    determinedly into the middle distance.


    The sketch’s comedy relies on the idea that to make such an effort in order to
    solve the problem of a cat not doing much is absurd. This is evident in the performance
    style that runs throughout, in which Graham Chapman’s vet and John Cleese’s general
    deliver their lines in excessive earnest. It is also captured in the suburban
    couple’s worrying, in which Terry Jones and Michael Palin clutch'
