    Python fandom, a substantial number of American and Canadian respondents also
    noted that this – almost ceremonial – introduction to Python was informed by their
    father’s British roots. Respondents noted, for instance, that ‘my father is English’
    and ‘made me aware of my British heritage’, that ‘my British Dad was excited to
    share’ Python ‘with us as he loved it’, and that ‘it was very important’ to ‘my
    father, a British expat . . . that his Canadian child developed an appreciation
    for British comedy’ (#2885 Canadian, 56–65; #259 American, 46–55; #3618 Canadian,
    26–35). Further to this, there is a sense that – for fathers who were broadly
    first-generation fans who had encountered Monty Python during its initial British
    or North American circulation between 1969 and 1976 – the importance of passing
    on ‘some of the comedy of his youth’ (#2098 Danish, 18–25) also related to the
    ‘specific cultural moment’ of ‘generational tensions’, the breaking up of institutions,
    and ‘the emergence of new forms of globalism’ frequently associated with *Monty
    Python’s Flying Circus*’s initial appearance (Landy 2005: 15). As one respondent
    outlined, for instance,


