  md: 'its recruitment methods, of the memories and experiences of invested, self-identifying
    Python fans.


    The project’s focus on the memories and history of experiences of Monty Python
    fans related to a gap in both existing scholarship on Python and the broader,
    emergent strand of research on comedy audiences. In 2014, the Monty Python team
    were reunited on stage at London’s O2 arena for the first time in over thirty
    years. The shows sold out, and a BBC documentary heralded them as the most successful
    comedy group of all time (*Imagine*, BBC1, July 2014). Despite the passing of
    more than fifty years, Monty Python’s popularity has clearly endured. However,
    while existing Python scholarship has made significant claims about the core audiences
    for Python as broadly young, middle class and university-educated (see, for instance,
    Wagg 1992; Miller 2000; Landy 2005; Brock 2016), these claims have been based
    either on analysis of Python texts or, in the case of *Monty Python’s Flying Circus*,
    institutional factors relating to the show’s initial UK and US reception context
    of the late 1960s to mid-1970s (the show’s target audience, the audience profile
    of the channel on which it was broadcast or BBC Audience Research reports). While
    my questionnaire results go some way to supporting the claims of this scholarship,
    in terms of Python appealing to a predominantly educated audience, the *Monty
    Python Memories* project’s focus on memories and histories of Python fandom allows
    for a much more detailed consideration of how this appeal has been sustained over
    the forty-plus years since this initial period of reception, whether it has changed,
    developed or become qualified, and, if so, in relation to which public and private
    circumstances.


    In contrast, the emerging body of work on comedy audiences has produced excellent
    and robust research and insights on ‘comedy texts and audience practices’ (Bore
    2017: 8) and ‘humor styles’ and tastes ‘in everyday life’ (Kuipers 2015: 19; see
    also Claessens and Dhoest 2010), but with a predominant focus on the contemporary
    reception of contemporary comedy texts and forms of humour. The main exception,
    in some ways, is Sam Friedman’s book *Comedy and Distinction*, a ground-breaking
    empirical study of contemporary comedy taste among attendees of the 2009 Edinburgh
    Festival Comedy Fringe. Here, Friedman identifies key patterns in comedy preferences
    for a wide range of both past and present British comedy (from *Last of the Summer
    Wine* and *Yes Minister* to *Little Britain* and *Stewart Lee’s Comedy Vehicle*).
    His study’s primary aim is to consider the utility of Pierre Bourdieu’s concepts
    of habitus and embodied capital when accounting for the ‘major fault lines in
    comedy taste’ among contemporary British comedy consumers (Friedman 2014: 43).
    Most prominently, his findings illustrate that, for a substantial number of his
    901 respondents, taste in ‘highbrow’ or ‘lowbrow’ comedy relates clearly to respondents’
    higher or lower cultural capital resources. However, he also argues that his study’s
    results ‘suggest important generational differences in comedy taste’, and notes
    that'
