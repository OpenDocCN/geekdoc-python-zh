    George Harrison, and the Beatles by extension), Python also offers a narrative
    of artistic tension, break-up and reformation familiar to many rock bands. Furthermore,
    the team’s cult status, particularly in the United States, came in part via the
    promotion of their albums via FM radio, hence the importance, for some fans, of
    Python’s sonic qualities – including musical numbers – above their visual signatures.


    It is unsurprising, then, that Python music has been the arena for (sometimes
    heated) debate about the group’s creativity and legacy. A review of the De Wolfe
    incidental music collection on the left-field music and pop culture website *The
    Quietus*, for example, registered how the odd collision between signifiers of
    stiff Britishness (such as militaristic or regal, Elgar-type compositions) and
    of flamboyant international exotica alerted the listener to the ‘inherent contrast
    in the Pythons’ cultural landmarks’ (Ross 2009), as well as capturing something
    of the mood of early 1970s Britain: the reviewer concludes that ‘those behind
    the *Flying Circus* soundtrack were possessed of highly developed musical minds’
    (ibid.). In other words, this unofficially curated assortment of musical items,
    mostly heard only fleetingly in the television show, where they would have been
    chosen for a range of reasons and some (in all likelihood) purely for their availability,
    nevertheless offers another legitimate tool for the analysis of an already well-excavated
    cultural phenomenon. Another article in *The Quietus*, this time by Taylor Parkes,
    used the occasion of the 2014 ‘reunion’ performances to critique what he considered
    popular misperception of Python as providers of mere ‘silliness’, and the role
    played by music in this process. The culprit, he argued, echoing grumbles heard
    elsewhere among fans, was Eric Idle – generally considered the ‘musical’ Python
    (Wright 2017: 20) and described by Terry Jones as the ‘musical authority’ of the
    group (Morgan 1999: 72) – and his ‘silent takeover of Python’ since the success
    of his *Spamalot* musical (which opened in 2005), which had ‘set the tone . .
    . in terms of diluting the comedy with musical interludes and choreography’ (Parkes
    2014). In a similar vein to other ‘jukebox’ musicals of recent years repurposing
    and narrativising pop material associated with a particular artist or time period,
    *Spamalot* weaves disparate Python songs and ditties (some barely sketches in
    their original form) from the TV show, films and albums into an expanded adaptation
    of *The Holy Grail* (1975). This move was anticipated by the *Eric Idle Sings
    Monty Python* live recording of 1999, which begins with the conceit that ‘Monty
    Python’ is one of the great unrecognised composers, existing in an alternative
    universe where its version of ‘Anything Goes’ is preferred to that of Cole Porter;
    this is a reminder of episode 42, ‘The Light Entertainment War’, where Porter’s
    ode to licentious behaviour is supplanted by a literal, corporeal alternative:
    ‘Anything goes in/Anything goes out/ Mutton, beef and trout’, etc. A similar approach
    would be taken in the fan-serving *Monty Python Live (Mostly)* reunion shows of
    2014, to all intents and purposes a ‘greatest hits’ compilation reflecting and
    reinforcing the canonisation of particular sketches and songs. As evidenced by
    the two overtures to each act introducing key musical motifs, the choreographed
    musical numbers in the show are not merely functional (i.e. covering scene changes
    or compensating for the performers’ physical shortcomings), but often provide
    bridging strategies between sections, sometimes combining elements in new ways:
    for example, the ‘Nudge Nudge’ and ‘Blackmail’ sketches are divided by a ‘rap’
    song incorporating elements of both.


    One might argue that the use of music in *Spamalot* or the *Live (Mostly)* shows
    for purposes of structural coherence and audience gratification/nostalgia is alien
    to the spirit of the original *Flying Circus* (MPFC) programme, where music and
    songs are arrayed disruptively, flippantly and abrasively as part of a critique
    of television formats and clichés. According to this train of thought, the official
    Python ‘sheet music book’, *The Fairly Incomplete and Rather Badly Illustrated
    Monty Python Song Book* (1994), is closer to the ‘authentic’ Python attitude,
    in at times offering impediments to actually being functional for the musician/performer:
    for example, the melody of ‘I’m So Worried’ is given in an appropriately ‘shaky’
    font, ‘Never Be Rude to an Arab’ ends with a visual equivalent of a bomb explosion,
    ‘Eric the Half a Bee’ is (oddly) given in spherical form and the ‘Summarising
    Proust’ song is mostly illegible.


    It is not the intention of this chapter to arbitrate between the differing assessments
    of the role of music in either enriching or ‘diluting’ an enjoyment of Python
    comedy, but to consider some of the occasions and means by which Python conveys
    an attitude towards music – by which I mean musicians and performers, as well
    as live and recorded music and song.


    ## APPROACHING PYTHON MUSIC


    Before doing so, however, it is necessary to acknowledge the scale and complexity
    of the task of mining Python music for meaning and coherence. Moreover, as many
    of my forthcoming examples will suggest, Python’s defamiliarising approach to
    music is in many respects equivalent to and demonstrative of their broader comedic
    strategies, chiefly the ‘dismemberment of cultural forms’ (Landy 2005: 45), the
    ‘inversion of conventional social images’ (ibid.: 37) and the confusion of generic
    codes. With respect to the Python attitude to music, it is common to observe the
    blurring of ‘high and low’: that is, the collapsing together of the classical/elitist/intellectual
    and the popular/quotidian/demotic. As Marcia Landy summarises, ‘sketches drew
    heavily on canonical works of drama, literature and film [to which we might add
    music and composers] . . . but emptied them of their revered mode of presentation
    and interpretation, often turning them into nonsense’ (ibid.: 83). Hence, classical
    composers and music are reimagined in humdrum contexts (Mozart presenting a tawdry
    TV show, for example), while politicians and philosophers concern themselves with
    the Eurovision Song Contest, and a disease can be turned into a musical. Another
    rather self-evident observation is that, for the Pythons, music is but one tool
    for deconstruction of the medium of television and the ‘rules’ of light entertainment.
    In his diary, Michael Palin cites the decision to include ‘two city gents dancing
    to balalaika music’ in the background of the ‘cheese shop’ sketch (episode 33,
    ‘Salad Days’) of the third series as evidence of the evolution of the team’s style
    of humour away from the ‘revue’ or satirical origins of their previous work (on
    the *Frost Report* [1966–7] and such), towards the ‘illogical and confusing’ (Palin
    2006: 77). There is certainly incongruity to the prospect of a cheese emporium
    ‘licensed for public dancing’ (as a flash-picture of the exterior informs us before
    the television sketch starts), and the incessant live bouzouki accompaniment may
    well be a means to complicate the *mise-en-scène* of what Palin himself describes
    as a potentially formulaic ‘parrot shop type of sketch’, with John Cleese reprising
    the role of an increasingly frustrated customer. Although the sketch, here and
    in its various iterations (recorded album and live versions) reaches its end via
    Cleese casually shooting the shopkeeper, his mania reaches its peak about a minute
    earlier with his instruction of the musician to ‘shut up’; this moment is particularly
    dramatic in the *Secret Policeman’s Ball* (1979) rendition, where Cleese – who
    frequently comes near to ‘breaking’ character in the sketch – takes particular
    relish (as does the audience) in his banishment of the (non-Python) dancers and
    musician off stage. In some ways, then, the sketch works as a loose metaphor for
    Python’s attitude to music in its evocation of a three-way antagonism between
    shopkeeper, customer and musical source; there is also a parallel with the shooting
    (rather gorily in the *Live [Mostly]* version) of Terry Gilliam as he sings his
    unsophisticated ‘I’ve Got Two Legs’ ditty.


