- md: '## II. IN PRAISE OF SILLINESS: THE CULT OF PYTHON


    Jeffrey Andrew Weinstock


    ### COMEDY''S NEGLECT


    While scholarship on cult film, television and media has blossomed in the twenty-first
    century, comedy in general and Monty Python in particular have largely been neglected
    by cult media scholars. True, following on Susan Sontag''s famous essay on the
    subject, some attention has been paid by film and television critics to camp –
    both the retrospective campiness of classic Hollywood films and the obvious intent
    to elevate bad taste into an art form in films such as those by John Waters (see
    Sontag 1964). Comedy and cult has been touched on as part of the discussion of
    mockumentary''s parody of the documentary (with an emphasis on *Spinal Tap* [Rob
    Reiner, 1984]; see, for example, de Seife 2007), and certainly cult scholarship
    has addressed films with comedic elements – typically those that we might describe
    as black comedies that combine the absurd and ridiculous with the gruesome (see,
    for example, Egan 2011). As I''ve addressed elsewhere, however, scholarship on
    cult media has tended to keep a wide berth around the unapologetically silly (see
    my essay ''Bubba Ho-tep'' 2015). There are those it seems who study comedy, and
    those who study cult film, TV and media, and it appears seldom the twain do meet.


    My suspicion is that this neglect of comedy on the part of those who study cult
    media in its various forms is because silliness along the lines of dead parrots,
    silly walks, killer jokes and unexpected inquisitions, rather than pointed political
    comedy or satire that has attracted some attention from scholars, lacks the frisson
    of the transgressive or just the out-and-out weirdness that those who study cult
    media (myself included) tend to enjoy. People consume cult films for many reasons,
    of course; however, I would hazard that the pleasure in doing so often clusters
    at least in part around the sense of sophistication or superiority that accompanies
    consciously adopting an antagonistic position in relation to established social
    norms and conventions: the consumer of the cult film feels pleased to be able
    to appreciate that which goes beyond or violates the conventions of the mainstream
    Hollywood film and the presumed provincialism of its audience. This appreciation
    may involve watching classic films ‘differently’ – calling out their queer subtexts,
    for example, or mocking what seems absurdly saccharine or primitive from a contemporary
    perspective – or embracing the strange, gross, ghoulish or ‘bad’. There is a kind
    of aggressive posturing towards the mainstream associated with cultivating non-normative
    tastes, and to deploy one’s tastes as a marker of one’s independence and individuality
    (as a ‘refusal’ in the sense developed by Dick Hebdige in connection with social
    subcultures; see Hebdige 1979) is to offer a kind of critique or implicit rebuke
    of society that positions one as superior: one possesses the intellectual capacity,
    requisite sensitivity, specialised knowledge – and often endurance – to appreciate
    and derive enjoyment from that which confuses, disgusts or outrages the less sophisticated.
    Part of the cult fan’s pleasure then is connected to a sense of superiority that
    comes from mocking the provincialism of the mainstream.


    The pleasure of studying cult film, television and media to a certain extent mirrors
    the pleasure of participating in the cult itself (and often the two overlap as
    scholars choose objects of focus they enjoy). Like cult film fans, cult film scholars
    – sometimes at least – seem to savour their outcast status as they focus their
    attention on ‘questionable’ texts and argue for their meaningfulness and importance.
    The scholar perhaps differs from the fan most often only in the degree to which
    they overlay a more sustained intellectualisation atop the experience of viewing
    genres often dismissed as frivolous or trash or juvenile. And, indeed, those who
    study cult film can often seem like wizards as they recuperate gruesome horror,
    bad taste and/or sheer absurdity as canny social commentary, and make sense of
    the surreal. The analysis of the horror film is a case in point as film critics
    have repeatedly and often persuasively analysed cinematic monsters as metaphors
    for pervasive cultural anxieties. *The Babadook* (Jennifer Kent, 2014), for example,
    is an allegory for grappling with depression. *Get Out* (Jordan Peele, 2017) –
    which, granted, wears its metaphoric status on its sleeve – is an allegory of
    the American history of white usurpation of black bodies. Zombies reflect anxieties
    about viral contagion and global pandemics. Werewolves are metaphors for the concealment
    of a shameful secret such as homosexuality. And so on. Using a kind of Freudian
    dream logic, critics of cult media and genre fiction have frequently made compelling
    cases that that which we don’t like, which is unpleasant, which scares us or disgusts
    us, can be interpreted as the condensation and displacement of both idiosyncratic
    and widely shared anxieties and tabooed desires. Interpreting such media and our
    response to it is then regarded as telling concerning both intra-psychic processes
    and the cultural imaginary.


    Ironically, given comedy’s second-class status, it would seem ideally suited as
    an object of scrutiny for film scholars who make their livings excavating the
    depths of neglected or dismissed genres – showing us the meaning against the tendency
    to dismiss something as gratuitous or frivolous, pornographic, or simply gross.
    But this wizardry curiously seems to reach its limit where comedy is concerned
    – the right spells can’t be found to master the Knights Who Say Ni or a dynamite
    carnivorous rabbit – and my suspicion again is that this is because silliness,
    associated with childishness, is often felt to be the antithesis of cult film
    sophistication. The same scholars who will insist on the social significance of
    *I Spit on Your Grave* (Meir Zarchi, 1978) and *Cannibal Holocaust* (Ruggero Deodato,
    1985) refuse to visit Camelot because it is a silly place.


    To a certain extent, this dismissive attitude reflects a deeply engrained critical
    and cultural tendency to consider comedy as less real or important than drama.
    The standard assumption is that Shakespeare’s tragedies are where the real grandeur
    lies and present the true test of the thespian. One is hard-pressed to find too
    many comedies included as part of the secondary school curriculum anywhere (my
    recollections of works from high school English class are unrelentingly bleak
    – *The Grapes of Wrath* anyone?). In the history of the Academy Awards to date,
    going back to their beginnings in 1928, only seven ‘comedies’ have won best picture.
    Even fewer Pulitzer Prizes for Literature have gone to comedies. Drama in general
    is considered to have more depth, to be more real, to be weightier and more meaningful.
    In contrast, films and programmes that seek to elicit laughter and particularly
    those that wrap things up neatly with a happy ending (which not all comedies do,
    of course) are considered more surface and characterised as fantasy.


    There are in fact multiple levels of irony at play here that extend beyond the
    idea of critics who specialise in neglected genres neglecting a neglected genre.
    The first is that, despite popular perception, comedy is never straightforward
    or depthless. As Andrew Stott explains and I will address more fully below, comedy
    is inherently social and, like horror, presupposes shared understandings of social
    norms that are then suspended, inverted or abandoned (Stott 2014: 8). Just like
    horror and science fiction – and drama and romance and all other genres for that
    matter – comedy requires interpretation and contextualisation to be understood.
    Indeed, to recognise something as funny in the first place presupposes certain
    cultural understandings of what makes something funny or not. And while silliness
    may connote a childish *naïveté* and lack of guile, cinematic silliness as the
    product of conscious deployment (rather than accident or incompetence) is itself
    a sophisticated manipulation of culturally embedded expectations. Further, the
    performance and consumption of silliness by'
  mdcn: '## II. 赞美愚蠢：Python的崇拜


    杰弗里·安德鲁·温斯托克


    ### 喜剧的忽视


    尽管关于邪典电影、电视和媒体的学术研究在二十一世纪蓬勃发展，但喜剧，尤其是蒙提·派森，却在很大程度上被邪典媒体学者所忽视。诚然，继苏珊·桑塔格关于该主题的著名文章之后，一些电影和电视评论家确实关注了坎普风格——包括经典好莱坞电影的回顾性坎普风格，以及像约翰·沃特斯电影中那种明显将低级趣味提升为艺术形式的意图（参见桑塔格
    1964）。喜剧与邪典的关联在讨论伪纪录片对纪录片的戏仿时有所触及（重点是《摇滚万万岁》[罗伯·莱纳，1984]；例如，参见 de Seife 2007），当然，邪典研究也涉及具有喜剧元素的电影——通常是我们可能描述为黑色喜剧的类型，它们将荒谬可笑与恐怖可怕结合在一起（例如，参见
    Egan 2011）。然而，正如我在其他地方所指出的，邪典媒体研究往往对那些毫不掩饰的愚蠢敬而远之（参见我的文章《Bubba Ho-tep》2015）。似乎存在研究喜剧的人，也存在研究邪典电影、电视和媒体的人，而这两者似乎很少交集。


    我怀疑，那些研究各种形式邪典媒体的人之所以忽视喜剧，是因为像死鹦鹉、愚蠢行走、杀手笑话和意外审讯这类愚蠢，而非那些引起学者一些关注的尖锐政治喜剧或讽刺，缺乏那种越界的刺激感或纯粹的怪异感，而这些正是研究邪典媒体的人（包括我自己）往往喜欢的。当然，人们消费邪典电影有很多原因；然而，我敢冒昧地说，这种乐趣至少部分地集中在一种精明或优越感上，这种感觉伴随着有意识地采取与既定社会规范和习俗相对立的立场：邪典电影的消费者为能够欣赏那些超越或违反主流好莱坞电影惯例及其假定的观众狭隘性的东西而感到高兴。这种欣赏可能包括以“不同”的方式观看经典电影——例如，指出其酷儿潜文本，或嘲笑从当代视角看似乎荒谬地甜腻或原始的东西——或者拥抱奇怪、恶心、可怕或“糟糕”的东西。培养非规范性品味与一种对主流的攻击性姿态相关联，而将个人品味作为独立性和个性的标志（作为迪克·赫布迪奇在社会亚文化背景下提出的“拒绝”概念；参见
    Hebdige 1979），就是提供一种对社会的批判或含蓄的谴责，将自己置于优越地位：一个人拥有智力能力、必要的敏感度、专业知识——以及通常的耐力——去欣赏并从那些让不那么精明的人感到困惑、厌恶或愤怒的事物中获得乐趣。因此，邪典粉丝的部分乐趣与嘲弄主流狭隘性所带来的优越感有关。


    研究邪典电影、电视和媒体的乐趣，在某种程度上反映了参与邪典本身的乐趣（并且当学者们选择他们喜欢的关注对象时，两者常常重叠）。就像邪典电影粉丝一样，邪典电影学者——至少有时——似乎品味着他们被排斥的地位，因为他们将注意力集中在“有问题的”文本上，并论证其意义和重要性。学者与粉丝最常有的区别，或许仅仅在于他们在观看那些常被贬为轻浮、垃圾或幼稚的类型体验之上，叠加了更持久的智识化程度。而且，确实，那些研究邪典电影的人常常看起来像巫师，因为他们将可怕的恐怖、低级趣味和/或纯粹的荒谬重新诠释为精明的社会评论，并理解超现实的事物。恐怖电影的分析就是一个典型的例子，因为电影评论家反复且常常令人信服地将电影怪物分析为普遍文化焦虑的隐喻。例如，《巴巴杜》（詹妮弗·肯特，2014）是与抑郁症斗争的寓言。《逃出绝命镇》（乔丹·皮尔，2017）——诚然，它毫不掩饰其隐喻地位——是美国历史上白人篡夺黑人身体的寓言。僵尸反映了对病毒传播和全球大流行的焦虑。狼人是隐藏可耻秘密（如同性恋）的隐喻。诸如此类。使用一种弗洛伊德式的梦境逻辑，邪典媒体和类型小说的评论家经常提出令人信服的论点，即那些我们不喜欢、令人不快、吓到我们或让我们厌恶的东西，可以被解释为个人特有和广泛共享的焦虑以及禁忌欲望的凝缩与置换。因此，解读此类媒体及我们对它的反应，被认为既能揭示心理内部过程，也能揭示文化想象。


    具有讽刺意味的是，考虑到喜剧的二等地位，它似乎非常适合那些以挖掘被忽视或被摒弃类型的深度为生的电影学者作为审视对象——向我们展示意义，以对抗那种将某些东西视为无端、轻浮、色情或单纯恶心的倾向。但这种巫术在涉及喜剧时似乎奇怪地达到了极限——找不到正确的咒语来驯服说“Ni”的骑士或一只会爆炸的食肉兔子——我再次怀疑，这是因为愚蠢与幼稚相关，常被视为邪典电影精明性的对立面。那些坚持《我唾弃你的坟墓》（梅尔·扎奇，1978）和《食人族大屠杀》（鲁杰罗·德奥达托，1985）具有社会意义的学者，却拒绝造访卡米洛特，因为它是个愚蠢的地方。


    在某种程度上，这种轻蔑的态度反映了一种根深蒂固的批评和文化倾向，即认为喜剧不如戏剧真实或重要。标准的假设是，莎士比亚的悲剧才是真正的宏伟所在，并对演员提出了真正的考验。很难在任何地方的中学课程中找到太多喜剧被纳入（我对高中英语课作品的回忆是无情的阴郁——有人记得《愤怒的葡萄》吗？）。在奥斯卡金像奖的历史上，从1928年至今，只有七部“喜剧”赢得了最佳影片奖。获得普利策文学奖的喜剧则更少。戏剧通常被认为更有深度、更真实、更有分量、更有意义。相比之下，那些试图引发笑声，特别是那些以幸福结局圆满收场的电影和节目（当然并非所有喜剧都如此），被认为更表面化，并被定性为幻想。


    事实上，这里存在多层次的讽刺，超越了专门研究被忽视类型的评论家忽视了一个被忽视类型这一观念。第一层讽刺是，尽管大众认知如此，喜剧从来不是直白或缺乏深度的。正如安德鲁·斯托特所解释的，并且我将在下文更充分地阐述，喜剧本质上是社会性的，并且像恐怖片一样，预设了对社会规范的共同理解，然后这些规范被悬置、颠倒或抛弃（Stott
    2014: 8）。就像恐怖片和科幻片——以及戏剧、爱情片和所有其他类型一样——喜剧需要解读和语境化才能被理解。事实上，首先将某事识别为有趣，就预设了关于什么使某事有趣或不有趣的特定文化理解。而虽然愚蠢可能暗示一种幼稚的*天真*和缺乏心机，但作为有意识运用（而非意外或无能）产物的电影愚蠢，本身就是对文化嵌入期望的精妙操控。此外，愚蠢的表演和消费……'
