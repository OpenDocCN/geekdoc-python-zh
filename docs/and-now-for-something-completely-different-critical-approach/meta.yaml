    # ARCHAEOLOGY TODAY


    In their 2017 edited collection, *Python beyond Python*, Reinsch, Whitfield and
    Weiner focus on ‘the creative endeavors of Python members, alone and in smaller
    groupings’, arguing that – in contrast to ‘the canonical Monty Python texts’ –
    this work has been ‘neglected or misread’ (Reinsch *et al.* 2017: 2). While studying
    the work of individual Python members outside of the Python canon is clearly valuable,
    this argument assumes that Monty Python’s canon of work has already been well
    covered and explored within academic scholarship. To some extent this is the case,
    with academic writing on Python stretching from the chapter on *Flying Circus*
    in Frank Krutnik and Steve Neale’s *Popular Film and Television Comedy* (1990),
