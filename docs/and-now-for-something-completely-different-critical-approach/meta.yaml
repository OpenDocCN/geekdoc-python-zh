    # ‘Upper Class Twit of the Year’


    The first series established a delightful lack of reverence and decorum for the
    British ruling classes in the ‘Upper Class Twit of the Year’ sketch, which parodied
    both the endless competitive drive and the utter incompetence, physical and mental,
