    as a growth in job opportunities and a resulting increase in affluence.


    At the same time, however, the authority figure’s (Chapman’s police officer) slight
    expression of outrage with regard to the grannies’ ‘hedonistic’ profligacy ironically
    alludes to the increasing drug excesses of the mid- to late 1960s. As David Simonelli
    observes: ‘By 1968, Britain had developed an alternative youth culture based around
    rock music, Romantic values, the experience of drugs, and a general desire to
    explore the limits of human experience’ (Simonelli 2013: 139). Particularly William
    Blake and his notion of excess as well as nineteenth-century works of art by the
    likes of Charles Baudelaire (*The Flowers of Evil*, 1857–68), Arthur Rimbaud,
    Joris-Karl Huysmans (his seminal *Against Nature*, 1884) or Oscar Wilde (both
    fin-de-siècle London and Wildean wit are playfully addressed in the ‘Oscar Wilde
    Sketch’, episode 39, ‘Grandstand’) seemed to appeal to the curious 1960s mindset
    that, in the aftermath of Aldous Huxley’s *The Doors of Perception* (1954), yearned
    for the psychedelic discovery of new perceptual and sexual dimensions. These artists
    also had a considerable impact upon singer-songwriters such as Bob Dylan, Jim
    Morrison or Leonard Cohen. In the British context, the Rolling Stones represented
    the darker, Dionysian side of the counter-culture since ‘they reignited rock’n’roll’s
    associations with delinquency that had been reconfigured in the mid-decade’s optimism’
    (James 2016: 255). Simonelli then underscores that the Stones were turned into
    ‘clear targets of press and public fears’ as well as the ‘embodiment of youth
    culture’s evils’ (Simonelli 2013: 116). While Mills describes Eric Idle’s friendship
    with George Harrison (Mills 2014: 131), it may also be noted that Keith Richards
    also ‘spent much of his time with Peter Cook and members of the Python crew’ (Sandford
    2012: 291).


    The ironic hint at the grannies’ unruly behaviour in the cinema also references
    the tumultuous reception of *Blackboard Jungle* in the United States, continental
    Europe and the UK. In Britain, this kind of mayhem tended to be predominantly
    blamed on the Teddy boys at the time (see Tebbutt 2016: 98). Moreover, however,
    the fact that the delinquents who adopt such conduct are senior citizens in this
    case then results in an ironic inversion of the era’s fascination with youthfulness
    and its ‘idealized and romanticized view of childhood and adolescence’ (Mills
    2014: 133). Idle’s news presenter, who has just embarked upon a moralising lecture
    on the grannies’ outright ‘rejection of the values of contemporary society: They
    see their children grow up and become accountants, stockbrokers’, is then quickly
    and irreverently silenced by the mischievous old ladies and therefore unable to
    reach a final verdict on the matter.


    ## CONCLUSION


    As the preceding analysis has hopefully demonstrated, Python’s *Flying Circus*
    era is deeply intertwined with the post-war sociocultural transformations, various
    twentieth-century artistic strands (Surrealism, Dadaism) and, more specifically,
    1960s (British) culture. Particularly the 1960s influence becomes manifest on
    different levels: the aesthetic-stylistic level (*Flying Circus*’s surrealist
    and psychedelic tendencies), the impact of the sociocultural background, the ‘youthquake’
    and the countercultural mindset and the encounter with both American and British
    popular culture. The series also generally employs many references to films and
    music of the time. As the close reading of ‘Hell’s Grannies’ then set out to highlight,
    *Monty Python’s Flying Circus* engages with the sociocultural context of the 1960s
    and its popular culture in a very nuanced manner. Despite its stylistically spontaneous
    absurdist-surrealist tendencies, the cultural references are, in fact, thoroughly
    situated in the sketches’ respective structural composition.


    Mills further claims that ‘Idle and the Pythons are cut from the same material
    as the rock bands of the 1960s. They are iconoclastic, surrealist, absurdist,
    and youthful’ (Mills 2014: 134). Therefore, like the Beatles and the Rolling Stones,
    the Pythons are also ‘informed by a hippie culture: they are a symbol of a youth-obsessed
    decade’ (ibid.). Idle confirms this remark by stating that the group ‘addresses
    the post-adolescent state. It’s anti-army, anti-authority, anti-teachers, anti-church,
    anti-mothers, anti-fathers, anti-aunties’ (quoted in ibid.). At the same time,
    however, like the Oxbridge-educated members of *Beyond the Fringe*, the creative
    driving forces behind the British New Wave or the 1960s counterculture, the Pythons
    belonged to the very bourgeois patriarchal system they set out to criticise. Accordingly,
    they echo the initially mentioned contradictory coexistence of progressive and
    conservative tendencies (e.g. the counterculture’s conflation of rebellious defiance
    and a consumerist stance, its penchant for alternative lifestyles that still do
    not completely break free from heteronormative norms as mentioned in relation
    to the ‘Hermits’ sketch, the fusion of art and entrepreneurialism as evident in
    the ‘Poet McTeagle’ sketch, the ‘Working-Class Playwright’ and the ‘Flying Sheep’
    sketches, or the repeatedly addressed generational conflict) that characterised
    1960s British society to a certain extent. Nonetheless, given the sheer abundance
    of (popular) cultural references, further examinations of the Pythons’ distinctive
    relation to 1960s culture or specific aspects thereof would prove very insightful.


