    know them, as the Colonel stops them allegedly before the punchline; therefore,
    the source of comedy becomes twofold: it is no longer the particular joke or punchline
    we are meant to laugh at, but instead at the shift from diegetic to supposedly
    non-diegetic content, as well as at his actual dialogue, and, crucially, at the
    characteristic traits of the Colonel himself – his squareness, humourlessness
    and rigidity, which serve to mark him as generationally other.


    When comparing the Colonel to the military personnel and authority figures in
    *The Goon Show*, his traits gain significance in highlighting the different approaches
    to the war, and particularly the military apparatus in the two programmes, as
    well as the generational differences and the connotations of these. In *The Goon
    Show*, those related to the armed forces, namely Major Bloodnok, in most episodes
    Neddie and Eccles, or even Bluebottle, are depicted as irrational, usually cowardly,
    surreal and often unbearably unintelligent, though generally likeable characters.
    As opposed to this, the Pythons’ Colonel is a painfully dull character from an
    older generation, whose only function is to keep law and order, everything proper
    and straight. In his other sketches, such as the ‘It’s a Man’s Life in the Army’
    (episode 4), in which he protests against the usage of the army’s slogan in the
    programme for other purposes, or the brief ‘Mary Recruiting Office sketch’ (episode
    30), where it is the anagram of the word ‘army’ that is posted outside the office
    and he has to send a number of nuns away, the Colonel remains a solid, strict
    and tedious figure of authority, a protector of morals and values.


    # CONCLUSION


    Having unpacked some war sketches in both *Monty Python’s Flying Circus* and *The
    Goon Show*, the two programmes arguably have different takes on the Second World
    War, and on military authority in general. It is not only that the frequent explosions,
    sea voyages, plotting and cowardice of the characters suggest that the Second
    World War is the temporal setting and general framework in which *The Goon Show*
    operates, but also that the Goons’ assessment of the war involves a much more
    personal dimension than the Pythons’. Operating with recurring characters who
    often die in each show but then are resurrected in the next, within familiar settings
    such as Bexhill, and using familiar weaponry, *The Goon Show* uses tropes of the
    war to process its trauma, and arguably extend its paradigm to the whole series.
    As opposed to the Goons’ intimate relationship to the war, the Pythons use various
    means to negotiate it as something external that belongs to the realm of memory
    and to another generation. Emphasising contemporary settings, frameworks and self-referential,
    televisual contexts, as well as nominating a character like the Colonel as representative
    of the war and of the military, the Pythons effectively reframe the Second World
    War as a distant event, belonging to another generation.'
