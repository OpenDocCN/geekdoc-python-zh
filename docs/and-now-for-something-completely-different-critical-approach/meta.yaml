    An amalgam of several sketches from *Flying Circus*, *And Now for Something Completely
    Different* (ANFSCD) was a feature-length sketch show which failed to make any
    real engagement with or exploitation of the cinematic form. The first draft of
    *Holy Grail* exhibits a similar lack of cohesion, being formed of two parallel
    grail quests – one past, one present – that eventually collide in Harrods department
    store. However, Forstater notes that ‘the medieval story had much more potential
    for laughs and for medieval pastiche’ (ibid.: 36), and the Pythons, too, found
    that there was more original humour to be mined from the court of King Arthur
    than from the present. By doing so, the Pythons were plumbing not just a wealth
    of literary and cultural material, but also the body of films which fall under
    the umbrellas of pastiche and cinema Arthuriana.


    While Britain saw the likes of the *Carry On* franchise churn out pastiche after
    pastiche, parodies such as *Casino Royale* (John Huston *et al.*, 1967) and *The
    Producers* (Mel Brooks, 1968) gained traction in Hollywood. At the same time,
    however, American cinema continued to add to the body of films which Susan Aronstein
    dubs ‘Hollywood Arthuriana’, a specifically American sub-shoot of Harty’s ‘cinema
    Arthuriana’. At the tail end of the 1960s, it was Joshua Logan’s musical *Camelot*
    (1967), an adaptation of Lerner and Loewe’s eponymous stage play of 1961, that
    was chief in the public eye and which the Pythons lampooned most directly in *Holy
    Grail*.⁴ While Darl Larsen refers to *Holy Grail*’s script to assert that the
    musical number in the film’s ‘Camelot’ episode is modelled after ‘If They Could
    See Me Now’ from the 1966 stage play *Sweet Charity* (Larsen 2015: 244), he also
    notes that ‘the formerly mythic denizens of Camelot had been singing and dancing
    for about thirteen years when the Pythons came to write their own version’ (ibid.:
    251). Consequently, the king’s dismissal of Camelot as ‘a silly place’ can be
    understood not just as a jibe at the expense of Hollywood’s tendency to look to
    Arthurian myth as an idealised model for society, but also at the way in which
    it had previously portrayed the Middle Ages. With *Holy Grail*, Jones and Gilliam
    strove to break away from the glamorised past presented by Hollywood, in which
    ‘all the pores were mysteriously gone from the skin and everybody’s teeth shone
    like Doris Day’s and Rock Hudson’s’ (Gilliam and Thompson 2015: 172), and instead
    drew on the aesthetics of such mediaeval epics as Bergman’s *The Seventh Seal*
    (1957), Kurosawa’s *Throne of Blood* (1957) and Pasolini’s *The Canterbury Tales*
    (1972).


    Of the numerous influences that shaped *Holy Grail*, these three films are worthy
    of note because of their distinctive and evocative depictions of the Middle Ages.
    These films, though perhaps no more historically accurate in their construction
    of the past than the Hollywood features bemoaned by Gilliam, are united in the
    inspiration they draw not just from mediaeval art, but from a long tradition of
    visual culture.⁵ The image of Death playing chess is just one that Bergman recalled
    from the walls of the churches in which his father used to preach (Bergman 1956),
