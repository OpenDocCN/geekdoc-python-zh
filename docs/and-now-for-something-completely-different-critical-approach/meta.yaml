    emphasis is therefore on *historicising Python’s comedy and its impact*, tracing
    its meanings from a range of social, cultural, national and transnational perspectives,
    and focusing, in an unprecedented manner, on these questions from the perspectives
    not only of form, theme and representation but also production and creative practice
    and long-term reception and consumption. Because of our emphasis on Python as
    a multi-media comedy phenomenon (encompassing not only Python’s audio-visual output
    but also, in particular, its employment of music and song across multiple media),
    the book is primarily an evaluation of Monty Python’s impact on comedy and popular
    culture through the framework of film, television and media studies. However,
    the book draws, when relevant, on concepts and frameworks from a range of disciplines,
    including literary studies, art history, medieval studies, comedy studies, animal
