    of international and local influences that have been less recognised as affecting
    that tradition. Like much British satire, the work of the Monty Python troupe
    is a mixture of slapstick, farce and political incisiveness that operates through
    ridicule, irreverence, a sharp cutting through pretentiousness and performance,
    through artifice and arrogance, puncturing the pomposity and the lies of dominant
    systems and the social everyday. Their origins are middle and upper middle class,
    their politics left-wing but not extreme, against narrow-mindedness in all its
    forms and origins, and ready to satirise the stupidities, excesses and divisiveness
    of political parties. Reflecting on their recent live shows in 2014, Taylor Parkes
    comments:


    > Politically, they were your standard-issue *Guardian*-reading media types. In
    the run-up to the general election of 1970, all of them bar Idle appeared in a
    Cleese-penned instructional film for Labour Party canvassers; no one who’s ever
    seen *Life of Brian* could possibly be in any doubt as to their opinion of the
    revolutionary Left. (Parkes 2014)


    Extremes are butts of their satire whatever way you voted.

    Many of the reviews which preceded the 2014 stage revival seem provoked by a challenge
    to the reviewers’ own nostalgia. Parkes, however, captures the engaged critique
    of ‘bullshit’ at the heart of their absurdist comedy in an avant-garde age where
    there was for many years the opportunity for satire, a healthy response to conservatism
    and contradictory political behaviours:


    > *Python* evolved out of British satire in much the same way psychedelia evolved
    from the protest movement, or Situationism from left-Libertarianism: disillusionment
    with straightforward political solutions, a belief in the transformative power
    of the imagination, a desire to open minds by force. Not that the Pythons ever
    actually thought of their work in those terms – they’d tell you they were just
    trying to make people laugh, that the weirdness was only the influence of Milligan
    and Peter Cook (or in Gilliam’s case, Walerian Borowczyk or Harry Everett Smith).
    (Parkes 2014)


    The rich comic mix of the Monty Python troupe punctures the complaisance and unthinking
    arrogance of wealth, class and power, consistently reminding us of the skull beneath
    the skin in ways which might (or might not) transfer outside of Britain.

    This chapter, accordingly, concentrates on two themes, death and social hierarchy,
    particularly the British class system, briefly considering Monty Python in the
    context of a range of international comedic and philosophical influences from
    Juvenal to carnival, with an underpinning of existentialism, through to the ongoing
    twentieth- and twenty-first-century British satirical tradition.'
