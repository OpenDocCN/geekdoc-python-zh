    role of the singer Eartha Kitt in the world of ‘The Cycling Tour’ (episode 34,
    ‘The Cycling Tour’), as part of a surrealist plot that resists easy paraphrase
    but seems to involve its hero swivelling between identities as a light entertainment
    singer (Clodagh Rogers and Eartha Kitt) and various political figures (Trotsky,
    Edward Heath), while a briefly seen poster for the climactic ‘Saturday Night at
    the Moscow Praesidium’ mentions not just Kitt but the spies Burgess and Maclean,
    and fellow satirists Dudley Moore and Peter Cook. This is merely one example of
    the show’s many conflations of ‘light entertainment’ and ‘serious’ political/historical/academic
    allusions, to which we might add Cardinal Richelieu’s impersonation of Petula
    Clark (episode 13, ‘Intermission’), the ‘Election Night’ candidate whose name
    includes renditions of songs such as ‘Don’t Sleep in the Subway’ (episode 19,
    ‘It’s a Living’), ‘The Ronettes’ (not the real ones) singing a ditty about King
    George III (episode 40, ‘The Golden Age of Ballooning’) and so forth. In relation
    to ‘The Cycling Tour’, Larsen observes that Eartha Kitt was not only known at
    the time for being politically engaged (via public anti-war statements), but had
    appeared recently in the British comedy *Up the Chastity Belt* (1971), directed
    by the writer/producer/satirist Ned Sherrin, very much part of the Python ‘orbit’
    of television and arts personalities. But the question remains as to the impact
    of such contextualisation – i.e. Kitt as potentially a strategically chosen figure,
    rather than merely a whimsical allusion – upon our reading of the show.


    In other words, while the analysis of the use of music in Python may bring enlightenment,
    it is also yet another rabbit-hole for the unwary fan/scholar. Furthermore, pursuing
    some of the connecting webs draws attention to the lack of a definitive Python
    resource, as well as the instability of the TV show as trustworthy archive. The
    *Just the Words* script-books tend to offer only vague descriptions of background
    music (‘stirring military music’ [Chapman *et al.* 1990: 8] and so on), but Larsen
    and others have noted occasional contradictions between the script-books, the
    scripts held by the BBC’s Written Archive Centre and the copies of the show in
    circulation, which themselves were subject to edits and censorship, sometimes
    in relation to musical elements; the fan/scholar has recourse to the wisdom accrued
    on websites such as the (now defunct) *Some of the Corpses Are Amusing*, which
    carries information and speculation on excised material (such as the removal of
    legally challenged pieces of music).


    ## IT''S WOLFGANG AMADEUS MOZART


    Having introduced some of the general functions of music in Monty Python and noted
    the significance of ‘light entertainment’ allusions, I want to turn to a specific
    case study of the Python musical attitude: their handling of classical music,
    that is, ‘serious’ music in the concert tradition. Again, as with the Pythons’
    disinclination to acknowledge ‘progressive’ rock music, there is barely any mention
    (to my knowledge) of twentieth-century or ‘avant-garde’ classical composers in
    the vein of Britten, Schoenberg or Stockhausen; we get no suggestion of what Arthur
    ‘Two Sheds’ Jackson’s work might sound like, although Arthur Ewing’s ‘musical
    mice’ act is vaguely reminiscent of the ‘prepared piano’ experimentations by the
    likes of John Cage. Notably, the programme’s very first episode (‘Whither Canada?’)
    begins with such a reference, in the form of the ‘It’s Wolfgang Amadeus Mozart’
    show, in which the composer (John Cleese) incongruously introduces a studio competition
    for ‘famous deaths’. This is but the first of a thread of recurring sketches or
    incidental references across the series that involve ‘high art’ in collision with
    the populist, the sensational, the domestic or the banal. Other examples include:
    the interview wherein the contemporary composer Arthur ‘Two Sheds’ Jackson is
    humiliated through repeated mention of his hobby and his sportsman-like moniker;
    the repeated motif of a naked Terry Jones playing an organ; the self-explanatory
    and scatological ‘The Royal Philharmonic Orchestra Goes to the Bathroom’ sketch;
    the exploding Blue Danube; Ludwig van Beethoven struggling to complete his Fifth
    Symphony due to domestic interruptions and a visit from the rat-catcher Colin
    Mozart (son of Wolfgang); Mrs Little and her son Mervyn trying and failing to
    keep their hamster alive by playing Mozart concertos to it (‘There’s nothing we
    could do, Mervyn. If we’d have had the whole Philharmonic Orchestra in there,
    he’d still have gone’). The ‘It’s the Arts’ sketch (episode 6, ‘It’s the Arts’)
    about an unremembered Baroque composer with a ridiculously long name conforms
    to Landy’s (2005: 83) observation of serious art and artistry degenerated to ‘nonsense’.
    Aside from the vague idea that Baroque music is exemplified by its florid and
    sometimes formalistic properties, and perhaps its demands for listener patience,
    the sketch does not particularly demand a familiarity with the periodisation of
    European classical music; rather, it pokes fun at the idea of a ‘great name’ being
    anything but, and is prefaced by deliberately ‘schoolboy’ humour, in the form
    of the presenter’s Freudian slip when listing important composers: ‘Beethoven,
    Mozart, Chopin, Brahms, Panties – I’m sorry’. The Pythons’ iconoclastic position
    in relation to ‘great names’ is illustrated most boldly via the sleeve of *Another
    Monty Python Record* (1971), which purports to be a vandalised cover of a legitimate
    recording of Beethoven’s Second Symphony. The album itself, however, purports
    at times to be, as the result of a production error, a collection of Norwegian
    folk songs. Python has fun elsewhere with folk traditions (the ‘fish slapping
    dance’, for instance), but the conflation of traditional indigenous musical culture
    and the ‘art’ tradition here seems to point to their comparable ‘humourlessness’,
    at least in their presentation and categorisation.


    Placing these sketches and conceits together, one notes a persistent emphasis
    upon the vulnerable or endangered body of the performer, composer or audience
    – and in the case of Mr Ewing’s sadistic ‘mouse organ’ act (a pun on ‘mouth organ’),
    the instrument itself: the mice struck by his mallet so as to replicate ‘The Bells
    of St Mary’ (episode 2, ‘Sex and Violence’). These violent evocations are commensurate
    with the general Python preoccupation with the ‘dead or dying body’ (Landy 2005:
    67); a process that culminates in the ‘Decomposing Composers’ song (on the *Contractual
    Obligation Album*) describing the bodily decay of various composers (and is of
    course visually formalised in the famous title sequence ending of a massive slamming
    foot coinciding with an unexpected ‘raspberry’ instead of the final note of Sousa’s
    ‘Liberty Bell’ melody). These, and other instances, are but one element of Python’s
    recurrent juxtaposition of the ‘high’ – the rarefied and the intellectual – with
    the ‘low’ – the everyday and the corporeal – seen elsewhere via equivalent allusions
    to art, literature, philosophy, art cinema and so forth. One might be given pause,
    however, by the ‘Farming Club’ special on the life of Tchaikovsky (episode 28,
    ‘Mr and Mrs. Brian Morris’ Ford Popular’), an archetypal ‘genre-mixing’ sketch
    predicated upon the composer’s homosexuality and involving ‘experts’ using Polari-style
    descriptions of his work (‘sammy super symphonies’, etc.), before showing a (pretend)
    Sviatoslav Richter playing a piano concerto while escaping from a ‘sack’. Perhaps
    problematic within a contemporary context, a sympathetic reading of the sketch
    might see its target as Ken Russell’s sensationalist treatment of the material
    in *The Music Lovers* (1971), and the BBC’s own salaciousness in its reporting
    of it. It is open to question, then, whether all these classical musical references
    constitute an ingratiating appeal to an acculturated audience, speak from an anti-intellectual
    position (as epitomised by the irrationally anti-snob instructor in ‘Flying Lessons’
    [episode 16, ‘Déjà Vu’] who considers the word ‘aeroplane’, nonsensically, to
    be as pompous as ‘I’m off to play the grand piano’), offer a satirical comment
    on the appropriation of ‘canonical cultural texts for mass cultural consumption’
    (Landy 2005: 83), or are just inscrutably deconstructive or whimsical.


