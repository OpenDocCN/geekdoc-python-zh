  - '[PAGE 152]


    offering up of an albatross adheres to the ‘logic of the absurd’ Palmer proposes,
    in that while the seller is not vending what is typically expected, it is ‘possible’
    that an alternative to ice-cream could be such a bird. While large and unwieldy,
    it is conceivable that it is edible, and the sketch relies on this logic for Jones’s
    line, asking what flavour it is, to make sense. This line is comic because it
    is both incongruous to ask about the flavour of an albatross, and logical given
    that it’s a question a consumer might ask of a new product they’re thinking of
    trying.


    As noted above, the gestation of the ‘dead parrot’ sketch required thinking through
    the ‘right’ animal for the comedy to work. Here, too, it is unlikely that any
    animal would work. And this is because different kinds of animals are categorised
    in different ways by contemporaneous human cultures, via a ‘discourse of lines’
    (Johnson 2012: 56) that chops up lived reality via taxonomies such as species.
    As such humans engage in a ‘social construction of nature’ (Eder 1996 [1988])
    that builds a clear line between humans and other beings, then dividing those
    beings into subcategories that can be, as Herzog (2011) notes, loved, hated or
    eaten. The ‘logic of the absurd’ that enables an albatross to be comic in this
    sketch is one that relies on the idea that an albatross *could* be in the ‘edible’
    category, even though it typically is not understood to be as such. It is thus
    incongruous in that it is not what is usually for sale at a cinema, but also incongruous
    as not something eaten by humans at all; but it is logical that it could be for
    it is a bird and thus sits within the same category of chickens, ducks and geese.
    To be sure, it is larger and more unwieldy, but it is not impossible to imagine
    eating an albatross at a cinema in the way in which, for example, a giraffe might
    be. And these two layers of incongruity are necessary; after all, a seller at
    a cinema offering lamb would be incongruous but much less funny, given that lamb
    is an animal that is understood as edible. So, it is the albatross’s possibility
    of edible-ness that enables the logic to function, and it is this logic which
    means the ensuing conversation between Cleese and Jones about the animal’s taste
    makes (comic) sense.


    But telling here is that all of this relies on the idea that it is normal and
    mundane for humans to eat other animals. After all, part of the humour rests on
    Cleese’s repeated yells of ‘albatross’ and his disinterested expression while
    doing so, in the manner of such sellers selling ice-cream in the real world. By
    making this an albatross, that mundanity becomes marked, the comic absurd resting
    on the incongruity between the unexpected animal and the normality with which
    Cleese presents it. But for this to work it has to be something that is reasonably
    edible, and thus it has to be an animal. After all, it would be incongruous if
    Cleese’s seller was proffering something resolutely inedible, such as a toaster,
    or a helicopter or an umbrella. This means the albatross sits in the category
    of ‘potentially edible’ because it is a bird, and human cultures categorise birds
    as something with the potential to be consumed even if – as in this case – it
    is an animal typically not'
