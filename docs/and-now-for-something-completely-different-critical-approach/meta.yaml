    If hyperbole already was a well-established tactic in comedy, especially in the
    humour of Python’s immediate predecessors Peter Cook, Dudley Moore and Peter Sellers,
    the Pythons turned it up a notch or two – making, in a way, hyperbolic silliness
    the rhetorical centrepiece of many of their sketches (see Jeffrey Weinstock’s
    chapter in this volume). To that, the Pythons also add visual hyperbole aided
    by the increased permissibility of the time. Nudity, violence, evocative choreography
    and hallucinatory *mise-en-scène* (helped by cinematography that was a lot more
    daring in its angling, movement and use of wide-angle lenses than what was present
    in the Pythons’ television work) make *The Meaning of Life* more provocative,
    and yank it out of any regime of representation. This is reflexively commented
    on in the film’s ending (fittingly announced as ‘the ending of the film’), and
    its snipe at popular culture of the time, and beyond. In this epilogue, a lady
    presenter, somewhat resembling the archetype of the well-meaning yet finger-wagging
    Auntie BBC, laments this hyperbolic overkill: ‘Family entertainment? Bollocks.
    What they want is filth. People doing things to each other with chainsaws, . .
    . armed bands of theatre critics exterminating mutant goats. Where’s the fun in
    pictures?’ It is an apt comment on the ways in which hyperbole blew aesthetic
    rules out of existence and equally a smart reflection on then-popular genres experiencing
    some sort of hyperbolic renaissance: the horror film, science fiction and grotesque
    realism, from mondo films to Pasolini’s *Salo* (1975).


    Hyperbole becomes waste in *The Meaning of Life*. The crazy abundance of elements
    stuffed into a scene leads to an explosion of utterances, instances and mentions
    that make up a dense and unruly pile of unnecessary detail from which the story,
    and the film, needs to discharge. A lot of this is visualised via food and body
    fluids. Prompted by theories of pollution and purity, Mathijs and Sexton (2011)
    make the case that displays of traffic of food and fluids from the inside of the
    body to the outside present instances of transgression that are typical for cult
    cinema. *The Meaning of Life* sprays these instances around in abundance. Blood,
    urine, spit, semen, drool and slime all make noted appearances, as they are tied
    to absurd considerations of etiquette, sex-education, politeness and hospitality,
    and made to illustrate the idea that whatever flows from the messy insides of
    people to the highly controlled presentation of self that is one’s outside, challenges
    good behaviour until it blows up.


    The inevitable exemplar of this, and indeed the one scene in *The Meaning of Life*
    that is never left unmentioned, is the ‘Mr. Creosote’ scene. In it, an overweight
    patron in a posh restaurant overeats until he is so filled he looks ready to explode.
    In their very depiction of Mr. Creosote, the Pythons already cross boundaries
    of taste. He is shown as hyperbolically obese, with spilled food scraps dribbled
    and drivelled down his expensive suit. After a copious dinner, and in spite of
    his reluctance, the maître d’ persuades him to consume just one more ‘wafer-thin
    mint’, after which he literally explodes. Litres of minestrone soup are blown
    across the screen. There is hardly any better indication of an utterance in the
    history of film than this one. Robert Osborne in the *Hollywood Reporter* said
    it was ‘unbelievably crass’ (Osborne 1983), and warned that its inclusion in the
    film requires audiences to ‘unbend’. Vincent Canby (1983) in the *New York Times*
    called it ‘out of proportion’ and Roger Ebert (1983) adds that ‘we get gallons
    of vomit, streams of it, all a vile yellow color, sprayed all over everybody and
    everything in a formal dining room. . . . It’s a barbed, uncompromising attack
    on generally observed community standards’. Most reviewers comment on how Monty
    Python’s attempt to demonstratively purge itself by pushing puke into cinemagoers’
    view helps it rise above vulgarity (it’s more like vulgarity XXL), but that it
    also blows up any possible understandings. Tellingly, most critics do not get
    further than to merely describe what’s happening, as if nothing else can be said.
    And that is exactly it. Nothing can be said about the scene. It is waste and waste
    only. In that sense, the ‘Mr. Creosote’ scene goes beyond what Bakhtin (1965)
    describes as potentially grotesque or carnivalesque – beyond attempts to offer
    a safe space to unbounded celebrations of life outside structured and regulated
    normality. Instead, by not adding anything to the plot, or the poetics (it is
    beyond absurd), or the structure, or the bureaucracy or the philosophy of the
    film (it does add its *flow* but only visually), it is pure waste.


    ## CONCLUSION


    History, as it is, has not been terribly kind to *The Meaning of Life*. The reason
    for that is Python’s own myth. At the time of its release the film was applauded,
    and even won a prize at the Cannes festival. But it was also found to be exasperating;
    at least that was the consensus among anglophone reviewers. Home nation reviews
    that had been critical of Monty Python’s output, especially with regard to *Life
    of Brian*, were unexpectedly mild in their assessment. For instance, *The Telegraph*
    called it a ‘curious hit-and-miss affair’ (Chilton 2014). It seemed most reviewers
    avoided the bait of ‘controversy’ the film itself dangled in front of them. Outside
    the English-speaking world the reception was decidedly positive, especially in
    France and Latin America. Nowadays, the status of *The Meaning of Life* seems
    overweight, at least as a bearer of Python’s legacy. Though the film frequently
    features in generalist overviews of the canons and cults of cinema (see Mathijs
    and Sexton 2011), it also sits there uneasily. For instance, French and French
    (1999) give their ‘cult Python’ vote to *Life of Brian*, and Soren McCarthy (2003)
    and Mathijs and Mendik (2011) prefer *The Holy Grail*. For Neil McNally (2012),
    too, the film is not quite as good as the others. Some of the Pythons themselves
    have commented on how the writing and the logistics of the film and its ambitious
    theme made them run out of steam (see Jones *et al.* 2009). And virtually all
    sources that discuss the oeuvre of Python in this era present Gilliam’s *Time
    Bandits* (1981) and *Brazil* (1984), or the *Crimson* short that precedes the
    feature (which was by his hand), or still Terry Jones’s *Erik the Viking* (1989),
    as films that more legitimately capture the aesthetics of the legacy of Python
    – its whimsicality, exuberance and silliness – what I called above its *joie de
    vivre éclatante*. *The Meaning of Life*, then, is Python’s final aria, to be over
    with it.


    *The Meaning of Life* retains a tongue-in-cheek irony as to its own seriousness.
    In that sense, it is perhaps tempting to see it connected, in one way or another
    (perhaps as an aside, similar to how scenes in the film move into each other?),
    to postulations of the end of philosophy or of postmodern theory (and anti-theory),
    common in the early 1980s (see the description in the last chapter of Aufenanger
