    cannily foregrounded and manipulated televisual and cinematic conventions and
    upended cultural expectations. She notes that the Pythons experimented with continuity
    and segmentation, resulting in a self-reflexive and critical treatment of televisual
    media (Landy 2005: 2–3; see also Miller 2000: 130–3). She calls attention to their
    mix of ‘high and low culture’ which combined allusions to literature, philosophy
    and history with slapstick and nonsense (Landy 2005: 3). She argues that ‘Python
    cultural politics played on the absurdity and abuses in language, social institutions,
    and media’ (ibid.: 30), and so on. The frisson of the transgressive, the cultural
    commentary and the out-and-out weirdness many cult film scholars look for is certainly
    there but, with the Pythons, we have the curious case of paradigmatic cult media
    that has received very little scholarly attention, arguably due to the primary
    association with silliness and the entrenched bias against comedy. Hence this
    chapter: What I will attempt in the space left to me is to take a shot at redressing
    this omission by considering some of the cult film qualities of Monty Python with
    a focus on *Holy Grail*; then I will briefly address another under-theorised area:
    the role of cultural difference in cultic veneration.


    # COME AND SEE THE VIOLENCE INHERENT IN THE SYSTEM!


    Analysis of what makes something a cult film has arguably often suffered from
    the same malady that has in some cases afflicted considerations of humour: *the
    search for the definitive conclusion*. Just as the factors that cause someone
    to receive something as funny can vary considerably based on background, context
    and disposition, the factors that result in a film developing a cult following
    can vary. Indeed, it is a tricky endeavour to try to draw specific conclusions
    about a category that can encompass *Casablanca* (Michael Curtiz, 1942), *The
    Rocky Horror Picture Show*, *The Evil Dead* (Sam Raimi, 1981) and *This Is Spinal
    Tap*. The best we can do as far as an overall generalisation is perhaps Telotte’s
    conclusion that what cultists enjoy in a film is a ‘comfortable difference’ that
    suggests ‘something unusual, noteworthy, and valuable not just about the movies,
    but about their own character, too’ (Telotte 1991: 5). However, before turning
    to the specific cultic qualities of *Monty Python and the Holy Grail* from 1975,
    I would like to suggest one cult film criterion that, while not applicable in
    every case, seems to me to apply in many of them – and certainly where the Pythons’
    programme and films are concerned: quotability.


    To some extent, my proposition here is related to Umberto Eco’s assertion that
    cult films are defined by their lack of organic unity, which Eco describes as
    ‘glorious incoherence’ (Eco 1985: 4). Eco writes,


    > I think in order to transform a work into a cult object one must be able to
    unhinge it, to break it up or take it apart so that one then may remember only
    parts of it, regardless of their original relationship to the whole. (Ibid.)'
- md: 'Eco''s proposition is that a precondition for an object to become one of cult
    veneration is a certain looseness of organisation in which the seams show, so
    to speak. To quote selectively from a film seems to me to fall into the category
    of ''breakability''; however, I would also argue that it acts as an unhinging
    that functions as communal shorthand for calling to mind what Eco calls a ''completely
    furnished world'' (Eco 1985: 3). The quotation wrenches something out of context
    for the purpose of communal re-establishment of precisely that context.


    Quotability is obviously not a contributing cultic factor in all cases or to the
    same extent – it will apply less to silent films (although one may perhaps quote
    intertitles), and certain films may be defined more immediately by other factors:
    striking shots and scenes, music, effects and so on. Nevertheless, one marker
    of fandom that applies as equally to *Spinal Tap* and *The Princess Bride* (Rob
    Reiner, 1987) as it does to *The Shining* (Stanley Kubrick, 1980) and *They Live!*
    (John Carpenter, 1988) is the ability to quote key lines as a form of bonding
    with other like-minded fans. To fans of these films, ''This one goes to eleven'',
    ''As you wish'', ''Here''s Johnny!'' and ''All out of chewing gum'' are passwords
    that admit one to a select community. Quoting a line to someone else who grasps
    the allusion and shares the speaker''s enthusiasm establishes a bond. And one
    quotation begets many: if you are fan of one or more of these films, you may now
    be mentally rehearsing other lines. In this way, a universe is reconstructed out
    of pregnant shards, each of which carries with it the DNA of the whole. The breakability
    of the film into individual lines allows for its communal reconstruction – as
    well as for the communication of a kind of shared affect of affectionate or passionate
    regard.


    This seems to me central in discussing Monty Python, whose programme and films
    are particularly notable for their profusion of oft-quoted lines. Considering
    *Holy Grail*, the list of oft-quoted lines is extensive indeed: ''just a flesh
    wound'', ''taunt you a second time'' (and the entire French soldier''s monologue),
    ''I''m not dead yet'', ''Ni!'' ''Holy Hand Grenade of Antioch'', ''a shrubbery'',
    ''some farcical aquatic ceremony'', and so on. Fans of the programme and the films
    will be able to supplement this brief list with other favourites – and then to
    recite the scenes more fully. What I am therefore suggesting is that one important
    factor that precipitates cult fandom at play in *Monty Python and the Holy Grail*,
    the other Python films, *Monty Python''s Flying Circus*, and film and television
    in general is the presence of striking lines of dialogue that can be detached
    and deployed as both a signal of affinity and invitation to reconstruction. In
    this way, quotability helps establish what Noël Carroll refers to as a ''community
    of laughter'' (Carroll 2014: 85). With precisely this point in mind, Justin Smith
    notes in his brief consideration of *Holy Grail* how ''the Pythons'' transgressive
    humour gave a generation of adolescents scripts to memorise, rehearse and intone
    like the mystic liturgy of some obscure, clandestine sect'' (Smith 1984: 121).


    JEFFREY ANDREW WEINSTOCK


    Given, however, that most films have a significant amount of dialogue, this raises
    the obvious question of what makes a line striking enough to be detachable. Again,
    there is no single answer to this question. A line may be memorable for its delivery,
    its gravitas or its eloquence. In the case of *Holy Grail*, however, detachable
    lines are generally memorable for their absurdity within the context of silly
    scenes, accentuated in some cases by the ridiculousness of their delivery. As
    such, the question of memorable lines dovetails with considerations of the film’s
    humour and ‘glorious incoherence’.


    *Monty Python and the Holy Grail* is a film with only the barest thread of continuity
    linking together its twenty-three disparate scenes, all of which can essentially
    stand alone as comic sketches as Arthur (Graham Chapman) or Galahad (Michael Palin)
    or Lancelot (John Cleese) or Sir Robin (Eric Idle) or a combination encounter
    various odd situations. Many of the scenes, such as Arthur’s confrontation with
    the Black Knight (Cleese), Sir Robin’s encounter with the three-headed giant,
    Galahad’s visit to Castle Anthrax or Lancelot’s ‘rescue’ of Herbert (Terry Jones)
