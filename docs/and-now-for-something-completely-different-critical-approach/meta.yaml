  md: 'Even the more youth-oriented developments in pop music of the era, surely ripe
    for mockery, undergo little observance; exceptions being a parody of the inanities
    of BBC Radio 1 DJs (episode 35, ‘The Nude Organist’) and a *Top of the Pops*-style
    spoof of studio pop performances (episode 24, How Not to Be Seen), where ‘Jackie
    Charlton and the Tonettes’ – actually, a collection of static packing crates connected
    to microphones – ‘perform’ Ohio Express’s 1968 pop song ‘Yummy, Yummy, Yummy’.
    As satire, this works fairly obviously as critique of formulaic, bubble-gum pop
    and the clichés – cameras tracking the stage and zooming modishly into lights
    – of pop television. This antagonism to the blandness of modern pop music (a fairly
    minor yet emblematic Python strand) arguably reaches its apotheosis in the ‘Christmas
    in Heaven’ sequence in *The Meaning of Life*, which begins in the vein of musical
    theatre before moving towards ‘disco’ embellishments as comparably ‘tasteless’
    as the song’s sentiment, delivery and visualisation. Such moments aside, the general
    Python disinclination to engage textually with pop/rock culture or with cutting-edge
    or cult musicians is rather curious, although given that the group were not shy
    in conveying, for example, their familiarity with avant-garde cinema (through
    parodies and scripted mentions), it may simply be that here they had no particular
    interest, knowledge or desire to ingratiate themselves with their youthful audience
    through vogue-ish citation.


    # ALLUSIVE DENSITY AND INSCRUTABILITY


    Paradoxically, given that some key examples of Python music have had a historical
    reach to a constituency beyond their audiences and fans, it would seem that Python
    scholars have been somewhat overwhelmed by its allusive density and inscrutability.
    Even a rare example of sustained analysis of musical instances by Liz Guiffre
    and Demetrius Romeo, in a chapter in a collection on music and comedy television,
    limits its view to the first series, and reaches only a tentative conclusion about
    how original and library music was used to ‘play with audience expectations and
    ultimately subvert these for comedic effect’ (Guiffre and Romeo 2017: 39). While
    Guiffre and Romeo pay close attention to examples such as the selection of Sousa’s
    ‘Liberty Bell’ as theme tune, the deconstructive use of Parry’s ‘Jerusalem’ and
    the importance of the ‘Lumberjack Song’ as a confident reach to a broad audience
    base, they steer clear of any speculation upon the satirical or self-referential
    connotations of references, particularly in relation to the programme’s various
    intimations of the contemporary or near-recent televisual landscape (for example,
    by way of television theme tunes).


    The Python fan or scholar might assume that the various musical allusions and
    in-jokes of the TV show have already been well excavated. There is certainly useful
    spadework in Darl Larsen’s massive, episode-by-episode'
