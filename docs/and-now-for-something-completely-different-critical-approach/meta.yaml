  md: 'Our book is indebted, however, to the – largely excellent – scholarly work
    that has already been published on Python, which, we would argue, can be loosely
    grouped into four strands in terms of theme and chronology. Between 1990 and 2005,
    work by Krutnik and Neale, Stephen Wagg, and Marcia Landy laid the groundwork
    for scholarly investigations of Monty Python within television and media studies,
    through its mapping of the key influences, contexts, features and themes of Python’s
    comedy, with particular focus on the ground-breaking nature of *Monty Python’s
    Flying Circus*. This work offers a number of key forms of knowledge and insight.
    Firstly, it has focused on identifying and outlining ‘the show’s British (indeed
    English) antecedents, sociocultural context, and institutional base’ (Neale 2001:
    64), contextualising Python’s style and techniques within the ‘1960s satire boom’
    (Mills 2014: 126) and Oxbridge revues and in relation to, on the one hand, contemporaneous
    comedy such as *Beyond the Fringe* and *Q5*, but, on the other, the influence
    of the musical hall and the physical comedy of silent cinema (see Landy 2005,
    and also, more recently, Brock 2016). Beyond this set of influences, Landy has
    also identified and explored the way *Flying Circus* mixed high and low culture,
    arguing that this crucial aspect of Python’s comedy ‘made the shows accessible
    to wide audiences despite the often erudite character of allusions to literature,
    philosophy and history’ (Landy 2005: 3).


    Secondly, and conversely, this strand of literature has also offered key insights
    on what can be seen to distinguish Python’s comedy from this web of (largely British)
    comedic influences. Once again, of particular note here is Landy’s work, which
    has considered, in detail, how the comedy of *Flying Circus* can be related to
    Mikhail Bakhtin’s theories of the Carnival, through its focus on the body, violence
    and death and on turning ‘the accepted world . . . on its head’, using these strategies
    ‘to call attention to the role of institutions – medicine, psychiatry, the family,
    the state’s administration of social life, the uses and abuses of history, and
    especially the disciplining of the sexual body through existing social formations’
    (Landy 2005: 101). Of course, another key distinguishing innovation is the employment
    of animation within the format of the sketch comedy, something which is explored
    in unprecedented depth and detail in Paul Wells’ chapter within this volume. As
    initially acknowledged in Landy’s work, Gilliam’s animation was important in not
    only informing but instigating much of the distinctive style and structure of
    Python’s comedy. Finally, and perhaps most crucially, this strand of scholarship
    has also foregrounded *Flying Circus*’s ‘unrelenting critique of the television
    medium’ (ibid.: 3) as key to its impact and distinctiveness, exploring how Python
    built on the innovations of *The Goon Show* (in the radio medium) and Spike Milligan
    (in the television medium) in order to play with, explore and parody the conventions
    of television, myriad television formats and the structure and flow of broadcast
    television as a whole. Of particular importance here is Krutnik and Neale’s detailed
    analysis of the strategies'
