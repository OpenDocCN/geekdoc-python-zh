    classes: ‘Python was a middle-class thing, rooted in college quad and JCR . .
    . you will find very few working-class people who get it.’ The criticism that
    they only appeal to the small class group whom they satirise is intriguing given
    the massive popularity of Monty Python throughout the ‘baby boom’ universities
    in 1969 when they first aired (in the UK, working-class and lower-middle-class
    students arrived then in new or expanding universities and polytechnics in large
    numbers). They had a very broad appeal, crossing age and class. It might have
    been useful to have heard of Proust and Sartre and found them confusing, but you
    could also laugh if you ever had to wait for the gasman and then several came
    at once but were unable to fix the leak, or you’d bought a budgie in a corner
    shop from a man in a brown mac. It is very British and their treatment of class
    is thoroughly satirical.


    Their immediate preceding British origins and influences are several, each clever,
    funny, satirical, political and social. These include the radio programme *Round
    the Horne* (1965–8), the absurdism of Peter Sellers and *The Goon Show* (1951–60)
    and the intellectually based satirical comedy of *Beyond the Fringe* (1960), with
    Jonathan Miller, Alan Bennett, Peter Cook and Dudley Moore (the latter in the
    1970s as Derek and Clive with their upper-class duffer Sir Arthur Streeb-Greebling,
    precursor of the Pythons’ upper-class twits). Their subversion is also based on
    the performances of Gilbert and Sullivan: ‘It isn’t such a big step from I Am
    the Ruler of the Queen’s Navee to the Upper Class Twit of the Year Race’ (Henderson
    2013).


    Donald Hoffman draws attention to the plummeting sheep, dead parrot and the existential
    references in Monty Python sketches, arguing that ‘no tradition remains intact
    in the presence of the Pythons’ quest for silliness’ (Hoffman 2002: 141). Some
    Python roots are in pantomime, the class- and sex-oriented bawdy of Sid James,
    Hattie Jacques, the Ealing comedies, *Carry On* films (1958–92) and Dick Emery
    (1963–81). All undercut and poke cruel, hilarious fun at the pre- tentiousness
    and hypocrisy of the class system and, in *Carry On up the Khyber* (1968) (with
    its veiled sexual reference), the arrogance of British imperialism based on constructions
    of racialised social hierarchies. Since Python, both *Little Britain* (2003–5)
    and Harry Enfield (1990–2, 1994–9) took on their satirical, political juxtaposition
    of the ridiculous and unlikely with the everyday targeting of hypocritical approaches
    to gender and sexuality, social class and disability with some outrageous sketches,
    their roots in the bawdy humour of British sea- side towns. Class and power are
    satirised in *The Harry Enfield Television Show* (1990–2) and *Harry Enfield and
    Chums* (1994–9) with a long-running skit (‘The Self-Righteous Brothers’), in which
    two blokes in a pub (resembling Derek and Clive) become insistent about controlling
    situations where celebrities and royalty might want their advice or company, undercutting
    the class system with a pecu- liarly British form of self-aggrandisement and anger.
    Monty Python, however, is more surreal.'
- md: '## SOCIAL SATIRE AND EXISTENTIALISM: PUNCTURING THE POMPOUS AND PRETENTIOUS;
    JUVENAL, POPE AND SARTRE


    Chief among the roots and influences of Monty Python are social satire and existentialism.
    The great classical satirist of the powerful and the ordinary, Juvenal (55/60–127
    CE), exposed human vanity (Juvenal [2 CE] 1998) in ancient Rome, while Alexander
    Pope (1688–1744), drawing from Juvenal, took exquisite delight in puncturing the
    pomposity and artifice of those around him in aristocratic and society circles.
    He was deliberately nasty and cuttingly accurate in revealing the ridiculous celebration
    of the trivial and artificial among the rich in, for example, ‘The Rape of the
    Lock’ (1712), where the loss of a small piece of hair is treated as a cataclysmic
    event in the eyes of a socialite. Everywhere in satire the grinning skull beneath
    the painted skin is a target for exposure and wit which expose hubris, pomposity
    and a self-deluding belief in one’s own success, loveliness and time-defying modes
    of behaviour. The cry of *carpe diem*, seize the day and live it to the full,
    is always ironic, because death is just around the corner. Referencing Ernest
    Becker’s arguments that man seeks infinity but ultimately is ‘a worm and food
    for worms’ (Becker 1974: 26), Katarzyna Malecka sees in the Pythons’ work ‘man’s
    existential paradox’ (2014: 4).


    Mortal vulnerability unforgettably opens the first show. A giant foot stamps on
    a man’s head, which sprouts flowers; the head of a cabaret-dressed woman explodes;
    a falling angel squashes Cardinal Richelieu. The grey-suited announcer is in league
    with the mayhem of dead pigs and we are invited to consider the comedic drama
    of famous deaths, including that of Genghis Khan. This is dark comedy mixed with
    slapstick, carnival and cartoon.


    Satirical comedy from the farcical to the cuttingly mean has its partner in Gothic
    horror, which also punctures artifice, deliberately undercutting complacency,
    comfort based on maintaining pretence, holding off the terrible end just on the
    edge of the precipice. Horror also represents people as objects, as does comedy.
    Each has its taboos: death, the decaying body, religion. Each treats complacencies
    as revelations of insecurities. What they also have in common is a reduction of
    human vitality to the objectification of the manipulated. Dehumanisation accompanies
    defamiliarisation. Things and people are not just rendered strange, weird, unfamiliar;
    they are exposed as mindless objects.


    The vanity of human wishes, the skull beneath the skin, are inevitabilities. Everything
    is just a construct, in decay, and every attempt at fancy clothing, grandeur,
    is a show. Self-delusion is dangerously blinkered, unutterably silly and hilarious
    to the acute eye of the satirist and their audience. This kind of social satire
    has its excessive, exploding hilarity in pantomime, in carnival, in switching
    gender codes and dress, social roles, exposing artifice while demonstrating excess
    in dressing up, painting, self-display. For the Monty Python troupe, the satirical
    tradition of Juvenal and Pope, which critiqued the vanity of human wishes, is
    tempered with a healthy dose of existentialism, of the sort found in Jean Paul
    Sartre’s *La Nausée* (1938) (and we must not forget that Mrs Jean Paul Sartre
    is a regular character in Python sketches). To bowdlerise this somewhat, one of
    the tenets of *La Nausée* is that we agree to labels and names, to values and
    rules, they are not intrinsically part of things. Everything is labelled – this
    is not what something or someone ‘is’ (if there were such a definable essence),
    but instead we construct meanings and values round the labels which we agree and
    share. There is only immediacy and appearances: ‘Now I knew: things are entirely
    what they appear to be – and behind them . . . there is nothing’ (Sartre 1938).
    In his introduction to *La Nausée*, Hayden Carruth (1963) notes of Sartre’s development
    as an existentialist that


    > [l]ater in his philosophical development the idea of freedom became Sartre’s
    main theme. Man, beginning in the loathsome emptiness of his existence, creates
    his essence – his self, his being – through the choices that he freely makes.
    Hence his being is never fixed. He is always becoming, and if it were not for
    the contingency of death he would never end. Nor would his philosophy.


    There is free choice over labels, meanings invested in words, hierarchies and
    political commitments or acts, hence a political refusal to collude with illegitimate
    enforced power (such as Nazism, in Sartre’s case). Based on superficiality and
    tenuousness, so also social hierarchy, the class system is exposed as a construct
    that only really has power if people invest that power in it. Social hierarchy
    and, in Britain, its concrete embedding in the class system, has led to enormous
    abuse, particularly with the upper classes, who believe they are one step down
    from divinity and have a right to certain power and quality of life. Criticism
    of the Pythons for their public or grammar school then Oxbridge origins underestimates
    their brilliantly comic irreverence for politics, power, hierarchies and class.
    Emphasising the surreal weirdness of the Pythons’ humour, and their very broad
    appeal, Parkes notes:


    > Very rarely was Python political, but it was a protest all right – a protest
    against bullshit and bullying, sloppy thinking and humbug, a gleeful assault on
    philistinism and pseudery. What’s more, it was weird. Not ‘wacky’, not ‘delightfully
    loopy’ – *really, really weird*. At its best, Python could be a disturbing experience,
    disquieting, disordered, disruptive . . . something close to Dada. It was not
    just absurd, but absurdist: cosmic satire, a mockery of meaning. (Parkes 2014)


    The work of Monty Python might be truly weird but it is also rooted in the mundane,
    in the often bizarre details of the everyday and the unavoidability of life, and
    death. We cannot escape the inevitability and the contingency of death, but it
    is possible to refuse its psychological stranglehold on life and, unlike death,
    the social class system is not inevitable. The class system and forms of social
    hierarchy are no more than embedded human constructions, as are all forms of differentiation,
    including gendered, religious and racial Othering, systems in which the Other
    once constructed can be abjected, persecuted, destroyed (Kristeva 1988). Dehumanisation
    is fostered in a view of life as composed of hierarchies of worth and human rights
    (or their lack). There is then, I would argue, in this undermining and exposure,
    an underlying value of free choice, of equality and social justice running through
    the work of Monty Python, as well as manic humour and a lot of old-fashioned bawdiness.


    These are the (historically originated and existential) bases of Monty Python’s
    satire, but it is also a particular form of British irreverence to anything established
    and unable to see its own temporary nature, its instability and its self-aggrandising
    folly. The Pythons can poke fun at the odd responses of working-class gasmen in
    identical brown coats, queuing down a working-class street, unable to fix a gas
    cooker (‘New Cooker’ sketch, 1970), at unionised labourers in overalls, and mothers
    (Pythons in drag) having tea parties – any role and level. However, they reserve
    their cruellest and most absurd satire for the upper classes, universally seen
    as (sometimes dangerous) inbred twits. These arrogant, entitled twits are defused,
    shown as having no right to any more rights than anyone else. Human constructed
    symbols are also exposed as just that – symbols, proxies and replicas of an undiscoverable
    real. Upsetting and debunking an artificial order is the job of carnival, and
    its very British sister, pantomime.


    ## CARNIVAL AND BAKHTIN


    At the roots of Monty Python’s work lie multiple expressions of unease: satire,
    black comedy through to farce, and Gothic horror. Some influences on the Pythons’
    humour derive from a long-standing tradition of farce and slapstick, common in
    popular culture, and a version of carnivalesque (Bakhtin, 1895–1975), which Bakhtin
    developed in *Rabelais and His World* (1965). Carnivalesque defined moments of
    temporarily licensed behaviours challenging capital and power, mocking and overturning
    authority. In the space of carnival, as in *Twelfth Night* (Shakespeare, 1623)
    and traditional Trinidadian carnival times (Earl Lovelace’s *The Dragon Can’t
    Dance*, 1979), it is possible to expose the pomposities and control of the ruling
    classes, bureaucracies, belief systems and hierarchies of power, as they affect
    everything and everyone. A major butt of carnival is social hierarchy, birthright,
    inheritance, entitlement and social position. Social and ontological freedom explodes,
    liberating behaviour and puncturing myths and narratives concerning birth, money,
    power, gender, ethnicity; overturned are symbols of status, and the'
  mdcn: '## 社会讽刺与存在主义：戳穿浮夸与矫饰；尤维纳利斯、蒲柏与萨特


    蒙提·派森的根源与影响中，首要的是社会讽刺与存在主义。伟大的古典讽刺作家尤维纳利斯（公元55/60–127年）揭露了古罗马权贵与平民的虚荣（尤维纳利斯 [公元2世纪]
    1998），而亚历山大·蒲柏（1688–1744）则借鉴尤维纳利斯，乐此不疲地戳穿贵族与社交圈中他人的浮夸与矫饰。他刻意刻薄，以精准的犀利揭示富人对琐碎与虚饰的荒谬推崇，例如在《夺发记》（1712）中，一小缕头发的丢失在社交名媛眼中被视作灾难性事件。讽刺作品中无处不在的“画皮下的狞笑骷髅”是揭露与机智的目标，旨在揭露傲慢、浮夸以及对自身成功、魅力和超越时间的行为方式的自欺信念。*及时行乐*（carpe
    diem）的呼喊总是充满反讽，因为死亡近在咫尺。参考欧内斯特·贝克尔关于人类追求无限但终究是“蠕虫的食物”（贝克尔 1974: 26）的论点，卡塔兹娜·马莱卡在派森的作品中看到了“人类的存在悖论”（2014:
    4）。


    凡人的脆弱性令人难忘地开启了第一场演出。一只巨脚踩在一个男人头上，头上长出花朵；一位身着歌舞表演服的女性头部爆炸；一位坠落的天使压扁了黎塞留枢机主教。身着灰色西装的播音员与死猪的混乱场面勾结，我们被邀请思考著名死亡的喜剧戏剧，包括成吉思汗的死亡。这是融合了闹剧、狂欢与卡通的黑色喜剧。


    从滑稽到尖刻的讽刺喜剧，其搭档是哥特式恐怖，后者同样戳穿矫饰，刻意削弱基于维持伪装的自满与舒适，将可怕的结局挡在悬崖边缘。恐怖也将人表现为物体，如同喜剧一样。两者都有其禁忌：死亡、腐烂的躯体、宗教。两者都将自满视为不安全感的揭示。它们的共同点在于将人类活力简化为被操控的物化。非人化伴随着陌生化。事物与人不仅被渲染得怪异、陌生；它们被揭露为无意识的物体。


    人类愿望的虚荣，画皮下的骷髅，是不可避免的。一切都只是建构，正在衰败，任何精心着装、宏伟的尝试都是一场表演。自欺欺人是危险的狭隘，在讽刺作家及其观众的敏锐眼光中显得无比愚蠢和可笑。这种社会讽刺在哑剧、狂欢、性别编码与服饰、社会角色的转换中达到爆炸性的滑稽高潮，揭露矫饰的同时展示盛装打扮、化妆、自我展示的过度。对蒙提·派森剧团而言，尤维纳利斯和蒲柏批判人类愿望虚荣的讽刺传统，融入了健康剂量的存在主义，如让·保罗·萨特的《恶心》（1938）（我们绝不能忘记让·保罗·萨特夫人是派森小品中的常客）。稍作简化，《恶心》的信条之一是我们同意标签与名称、价值与规则，它们并非事物固有的一部分。一切都贴有标签——这不是某物或某人“是”什么（如果存在这样可定义的本质），而是我们围绕同意并共享的标签构建意义与价值。只有直接性与表象：“现在我明白了：事物完全如其所呈现的那样——而在它们背后……空无一物”（萨特
    1938）。海登·卡鲁斯在《恶心》的导言中指出萨特作为存在主义者的发展：


    > [在]他哲学发展的后期，自由的理念成为萨特的主旨。人类从其存在的可憎空虚开始，通过自由做出的选择创造其本质——其自我、其存在。因此，他的存在从未固定。他总是在成为，若非死亡的偶然性，他将永无终结。他的哲学亦然。


