  - '[PAGE 212]


    older generations, particularly those over 55, tend to have a largely sceptical
    view of comedy, rejecting the vast majority of new comedians and instead reporting
    tastes for mainly older, ‘lowbrow’ comedians. In contrast, taste for ‘highbrow’
    comedy appears to be much more prevalent among those 44 and under . . . one important
    contributing factor may be the post-1979 aestheticisation of comedy, which has
    coincided with the cultural socialisation of these younger generations. (Ibid.:
    60)


    Here, then, Friedman sheds light on potential generational taste fault lines between
    those born in or before 1964 and those born in or after 1965, with the rise of
    the British ‘Alternative Comedy Boom’ of the 1980s – exemplified by such comedians
    as Rik Mayall, Alexei Sayle and Ben Elton – put forward by Friedman as the key
    milestone that enabled younger comedy fans to begin to recognise and embrace comedy’s
    ‘artistic potential’ (ibid.: 87), and thus distinguish their tastes and attitudes
    to comedy from their parents’ and grandparents’ generations. For Friedman, this
    1980s boom was a crucial moment in shifting the status of British comedy because
    these comedians ‘were united by an experimental approach to comedy that self-consciously
    attempted to push beyond the “lowbrow” styles that had previously dominated the
    field’, whereas earlier experimenters such as Monty Python and Beyond the Fringe
    ‘in statistical terms . . . only made up a small fraction of overall comedy output
    . . . during the 1960s and 1970s’ (ibid.: 19). As with the earlier cited Python
    scholarship, what Friedman seems to draw on here – when assessing British comedy’s
    contemporary status, cultural hierarchies and impact – is a historical map of
    comedy and audience preference based on the immediate moment of their production
    and dissemination. What is not considered here (and in other existing scholarship
    on Python specifically and on comedy audiences more broadly) is ‘the historicity
    of meaning beyond origins’ (Klinger 1997: 112) of enduring comedy like Python
    – their diachronic reach and impact as they continue to circulate years and decades
    after their initial reception moment, both in their native countries and internationally,
    particularly after the rise of home video technologies, the internet and streaming.


    Indeed, other Monty Python Memories results seemed to challenge and complicate
    Friedman’s findings on generational differences in British comedy taste. For instance,
    one of the first searches I conducted on the free-text responses in my dataset
    revealed that one of the most prevalent trends crossing respondents’ memories
    of first encountering Python were mentions of ‘Dad’ or ‘Father’, with 1,098 responses
    mentioning either term at least once in their, generally lengthy, answers, compared
    to only 576 responses mentioning ‘Mother’, ‘Mum’ or ‘Mom’. On isolating these
    1,098 responses (henceforth referred to as the ‘Dad Memories Group’), it became
    apparent that there was a concentration of younger respondents in this group (particularly
    in the 18–35 age categories), pointing, crucially, to Python’s durability across
    generations.'
