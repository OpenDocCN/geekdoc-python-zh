  md: 'So far, I believe, we have established that there are pronounced similarities
    between absurdist playwrights like Beckett and Pinter and *Monty Python''s Flying
    Circus*; however, I have essentially done little more than describe how they are
    ''kind of like each other''. To advance this study further it is crucial to highlight
    that Brandt''s statement above not only foregrounds the blackly comic and the
    sinister humour in Pinter (which is shared by Python), but also foregrounds the
    mundane.


    Although discussions of Python often remark upon the absurdity, the strangeness
    and the occasional violence of the show, we must also recognise that the sketches
    and animated sequences frequently drew upon the familiar, the trivial and the
    mundane. The comedy in Python was accentuated by juxtaposing the ridiculous with
    the banal. The ''Marriage Guidance Councillor'' sketch (episode 2, ''Sex and Violence'')
    gains its humour not only from presenting us with a marriage guidance councillor
    who seduces a female client in front of her husband, but also from the fact that
    the husband (played by Palin) is drably dull and tiresomely mundane. ''How to
    Recognise Different Types of Trees from Quite a Long Way Away'' (episode 3, ''How
    to Recognise Different Types of Trees from Quite a Long Way Away'') is a sequence
    running through the half-hour show in which a slide photograph of a tree is repeatedly
    presented to viewers accompanied by John Cleese''s voice emotionlessly intoning
    ''The larch. The larch''. It is quite difficult to explain how something so drab
    and ostensibly humourless could be funny, and yet this sequence has become a celebrated
    classic among Python fans. In this juxtaposing of the strange with the mundane,
    or perhaps in highlighting the strangeness of the mundane, Python demonstrates
    the influence not just of absurdism, but also surrealism.


    Surreal is a term that has come to be accepted as a synonym for strange, bizarre
    or odd, so it is perhaps useful at this point to identify what surrealism actually
    means within art. Although surrealism shares absurdism''s foregrounding of the
    strange and the weird, and on a superficial level ''looks'' like absurdism, the
    ethos of surrealism is very different. Whereas absurdism grew from existentialism
    and was predominantly nihilistic, surrealism developed from psychoanalysis. For
    the surrealists, the highlighting of the strange was not intended to deny that
    a reality existed, but rather to confirm that a reality existed – albeit that
    it is subjectively constructed – and that it could not only be accessed, but revealed
    to be remarkable through the use of strange images and the apposition of the familiar
    with the unfamiliar, or placing the familiar in unfamiliar locations. In essence,
    the mission of the surrealists was not to celebrate the unusual for its own sake,
    nor to deride or deny reality, but to demonstrate that the ''real'' and mundane
    was – if reconsidered – extraordinary (Childs 2008: 125–7). This distinction,
    I believe, is crucial to understanding Python as a phenomenon.


    We must also acknowledge that the influence of absurdism and surrealism did not
    impact on Python alone. Throughout the 1960s, and well into the 1970s,'
  merge: -1
