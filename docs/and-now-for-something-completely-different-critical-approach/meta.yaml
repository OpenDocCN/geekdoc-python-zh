  md: 'absurdist theatre with Luigi Pirandello (although Alfred Jarry and many others
    could be identified as the instigator of absurdist theatre with equal legitimacy).
    Pirandello’s plays are notable for featuring many qualities we may now describe
    as postmodern: a self-reflexive awareness and foregrounding of the unrealness
    of the theatre and the fact that we are in a theatre watching a performance, not
    viewing a reality. This is particularly true of his most famous play *Six Characters
    in Search of an Author* (1921). This play opens with the actors playing actors
    and a director who are rehearsing for a play by Luigi Pirandello called *Mixing
    It Up*. The rehearsal is disrupted by the arrival of six individuals who maintain
    that they are not real people, but characters looking for a story to appear in.
    These six characters become aggrieved and an argument ensues when the director
    and the actors who were rehearsing start to devise and act out a play based on
    the six characters; the characters want to play themselves in their story. As
    the play continues the boundary between fact and fiction breaks down: ironically
    it is all fiction of course, being a play. At one point two of the cast members
    argue about how real drama is.


    Although Pirandello’s work predates the coining of the phrase ‘Theatre of the
    Absurd’ – a term originated by Martin Esslin in his book *The Theatre of the Absurd*
    (1961) – his plays can be identified as such. Absurdist theatre is highly influenced
    by existentialism, particularly the work of Albert Camus and Jean Paul Sartre,
    and seeks to confront a world without meaning in the absence of God. In order
    to do this, it jettisons any attempt to dramatically represent a meaningful reality;
    it favours illogical scenes and purposeless characters. Absurdist drama embraces
    the failure of language to convey meaning and not only emphasises the failure
    of art to represent reality, but questions whether there is in fact a reality
    to be represented. In his discussion of Pirandello, Malcolm Bradbury comments
    on this foregrounding of unrealness, and notes its impression on the theatre that
    developed in its wake, including the work of Beckett and Pinter (Bradbury 1989:
    207).


    Turning to Beckett and Pinter, we can see in their work similar themes and similar
    strategies utilised to express them. Furthermore, without even entering into any
    actual analysis at this point, we can see features of Pirandello’s work that foreshadow
    what will later be termed the ‘Pythonesque’. In regard to Beckett, we may not
    consider him to be a particularly funny writer, but a comic pulse that is a response
    to and an acknowledgement of absurdity beats through his work. Discussing his
    novel *Murphy* (1938), Peter Childs notes that humour is used as a mechanism through
    which the work articulates its bleak philosophical concerns (Childs 2008: 7–8).
    Here we can see ideas and strategies similar to those employed by Pirandello,
    but also tropes which would be markers of the Pythonesque. Childs also observes
    that this novel also employs both abrupt, comic violence and scatological humour
    that may seem out of place in ‘high’ literature:'
