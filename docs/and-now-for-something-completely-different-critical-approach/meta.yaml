    draft of *Holy Grail* exhibits a similar lack of cohesion, being formed of two
    parallel grail quests – one past, one present – that eventually collide in Harrods
    department store. However, Forstater notes that ‘the medieval story had much more
    potential for laughs and for medieval pastiche’ (ibid.: 36), and the Pythons,
    too, found that there was more original humour to be mined from the court of King
    Arthur than from the present. By doing so, the Pythons were plumbing not just
    a wealth of literary and cultural material, but also the body of films which fall
    under the umbrellas of pastiche and cinema Arthuriana.


    While Britain saw the likes of the *Carry On* franchise churn out pastiche after
    pastiche, parodies such as *Casino Royale* (John Huston *et al.*, 1967) and *The
    Producers* (Mel Brooks, 1968) gained traction in Hollywood. At the same time,
    however, American cinema continued to add to the body of films which Susan Aronstein
    dubs ‘Hollywood Arthuriana’, a specifically American sub-shoot of Harty’s ‘cinema
    Arthuriana’. At the tail end of the 1960s, it was Joshua Logan’s musical *Camelot*
    (1967), an adaptation of Lerner and Loewe’s eponymous stage play of 1961, that
