  md: 'era and its austerity (Hudson 2017a: 171–82). While it is doubtlessly true
    to envisage post-war Britain as a somewhat conservative and stifled environment
    in which the loss of empire was bemoaned and the privations of austerity were
    being suffered, this period is perhaps misunderstood to a large degree. While
    we may imagine 1950s Britain as overly restrained and cheerless, we must acknowledge
    that many of the cultural movements and phenomena that emerged in the 1960s had
    their foundations laid in the 1950s, if not earlier. American writers celebrated
    by the 1960s counterculture in Britain, such as Jack Kerouac, William Burroughs
    and Alan Ginsberg, first came to prominence in the 1950s, as did Pop artists Richard
    Hamilton, Eduardo Paolozzi and Andy Warhol. With the emergence of Pop Art, the
    1950s also heralded the collapse of boundaries between ‘high’ and ‘low’ art that
    was to become so prevalent in the 1960s, and evident in *Monty Python’s Flying
    Circus*. Of specific relevance to Python, the radio comedy programme *The Goon
    Show* (1951–60) was a 1950s phenomenon that also contradicts popularly held notions
    that 1950s culture was uniformly reactionary and sterile. *The Goon Show* has
    been specifically cited by all the individual members of the Python team as a
    seminal influence on *Flying Circus* (Landy 2005: 34). Many aspects of Python
    are certainly similar to elements of *The Goon Show*, not least of all the absurd
    and bizarre situations and characters.


    Other cultural products of the 1950s had a deep and significant impact and influence
    on Python: specifically absurdist and surrealist theatre by playwrights such as
    Samuel Beckett and Harold Pinter. Terry Jones himself presented *Simply Absurd*
    – a documentary on Radio 4 on 10 August 2010 – in which he discussed the influence
    of the absurdist theatre on British comedy. Reviewing this programme for the *Daily
    Telegraph*, Benji Wilson comments on the impact absurdist theatre had on Python:


    > ‘The absurdists were trying to do something that would shock, to stir their
    audience up to think in a different kind of way,’ [Terry Jones] says. From Ionesco’s
    *Rhinoceros* (itself a critique of conformity in which Berenger, a central character
    in many of Ionesco’s plays, watches his friends turn into rhinos one by one) to
    Winnie in Samuel Beckett’s *Happy Days*, buried up to her neck for no obvious
    reason, the Theatre of the Absurd valued incongruity above plot or character.
    It is not that much of a leap to an animated foot trampling on the screen or the
    fish-slapping dance. (Wilson 2010)


    To fully understand avant-garde British theatre of the 1950s, we have to understand
    both absurdism and surrealism. Although it is difficult to pinpoint a specific
    writer or artist as being responsible for starting a movement or style – one finds
    oneself merely uncovering a never-ending chain of influencers and precursors –
    for the sake of brevity, if nothing else, I will start this discussion of'
