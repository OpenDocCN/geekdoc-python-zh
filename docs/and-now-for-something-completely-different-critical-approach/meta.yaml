    and unconvincing effects participate in Bakhtinian carnival with its emphasis
    on the grotesque body, while the machinic nature of the Black Knight’s persistence
    reminds us of Henri Bergson’s argument that ‘humour is born in moments where the
    life-force is momentarily usurped or eclipsed by an involuntary manifestation
    of automatism or reduction of the body to a lifeless machine’ (see Stott 2014:
    27). But the dialogue is icing on the silly cake as it were, making it clear that
    we are to regard the scene as comic rather than tragic.


    Comic inversion is also central to the scene of Arthur’s encounter with the peasants
    Dennis and ‘the woman’ as they gather ‘filth’ in a field. In this scene, Arthur
    hails what he perceives as an ‘old woman’ in order to request information about
    who lives in a nearby castle. He is quickly corrected by the individual who informs
    him that he is neither a woman nor old. The humour of the scene, however, derives
    not just from the peasants’ surprising lack of obeisance to their king, but from
    the fact that they turn out to be unexpectedly well-versed in political theory,
    even to the extent of calling into question Arthur’s legitimacy as their ruler.
    In response to Arthur’s assertion that Dennis owes him deference due to his status
    as king, Dennis launches into an anachronistic Marxist diatribe out of place for
    both the era (932 AD as we’re told in the opening frame) and a peasant field worker
    addressing nobility:


    > ‘Oh, King, eh, very nice. And how d’you get that, eh? By exploiting the workers!
    By ’anging on to outdated imperialist dogma which perpetuates the economic and
    social differences in our society. If there’s ever going to be any progress with
    the . . .’


    Dennis’s lecture is then interrupted by another peasant – Jones in drag – who,
    summoning Dennis to some ‘lovely filth’, takes note of Arthur, but also fails
    to recognise him and their shared nationality as ‘Britons’ or to acknowledge his
    nobility: ‘I didn’t know we had a king,’ she says. ‘I thought we were an autonomous
    collective.’ When Arthur, indignant, asserts again, ‘I am your king!’ she replies
    rejecting his authority, ‘Well, I didn’t vote for you’ – provoking a smile from
    viewers who understand her error: democracy has no bearing on nobility.


    Arthur is forced to point this out and, to defend his legitimacy as monarch, to
    explain that his mandate derives from ‘Divine Providence’ as the Lady of the Lake
    gifted him with the sword Excalibur. Rather than impressing Dennis, this provokes
    only derision, leading Dennis to outline what an absurd premise this is on which
    to establish authority: ‘Listen. Strange women lying in ponds distributing swords
    is no basis for a system of government. Supreme executive power derives from a
    mandate from the masses, not from some farcical aquatic ceremony.’ Despite Arthur’s
    attempts to silence him, Dennis continues: ‘Well, but you can’t expect to wield
    supreme executive power just ’cause some watery tart threw a sword at you!’ A
    textbook example of bathos, Dennis’s deflation of Arthur’s lofty rhetoric is funny
    because of its source: an insolent field worker apparently gathering mud or manure
    – not someone conventionally presumed to be knowledgeable and articulate on issues
    of governance. The scene ends with Arthur losing his patience and grabbing Dennis,
    which provokes Dennis’s cry, ‘Oh! Come and see the violence inherent in the system!
    Help! Help! I’m being repressed!’


    The ‘deliberate exploitation of anachronism’ (Day 1991: 83) in this scene is construed
    by Aronstein as being part of the film’s overall attack on ‘British myths of national
    identity, monarchy, class, and government at the moment of their supposed origin’
    (Aronstein 2009: 116) – and, indeed, it is possible to intuit a pointed political
    subtext to the depiction of filthy peasants gathering filth debating political
    philosophy with the king they refuse to acknowledge, foregrounding in the process
    the ways Althusserian ideological state apparatuses including national myth, in
    concert with more direct repressive measures, work to ensure the docility of the
    people. Dennis and the woman refuse Arthur’s call – refuse to be interpolated
    as the king’s subjects. The political subtext of this scene – which Aronstein
    links to the film’s overall postmodern ethos in which metanarratives of all stripes
    are challenged – may well be part of the film’s cultic appeal. It is important
    to notice, however, the mechanisms through which these messages are encoded by
    the film to then be decoded and appropriated by viewers: comic inversion (peasants
    proficient in political philosophy reducing their less articulate king to physical
    violence), camp performance (Jones in drag), anachronism (the references to later
    political theories), sheer absurdity (the gathering of mud) and, importantly,
    detachable dialogue that becomes shorthand for the entire scene: ‘Come and see
    the violence inherent in the system! Help, help, I’m being repressed!’ Individual
    lines of dialogue thus play a central role in cult enjoyment as they can be redeployed
    to establish shared affinity for the film in question.


    ## A SILLY PLACE


    My suggestion above is that quotability is one important quality of media that
    often participates in the establishment of cult receptivity – and this would clearly
    seem to be the case where Monty Python is concerned. With a focus on *Holy Grail*,
    I would like to consider two other intertwined generic features of the film that
    also seem to me to be important in constructing its cultic appeal – silliness
    and self-reflexivity – and then to consider briefly how or why the film might
    appeal beyond its British context.


    *Holy Grail*, in keeping with much of Monty Python in general, is unabashedly
    silly – as noted above, it seeks to evoke laughter through absurdity, wordplay,
    slapstick, grotesquerie and so on – and this may be part of the reason for its
    neglect by scholars who associate silliness with superficiality, triviality or
    foolishness. However, while this quality may make it less appealing to those who
    study cult film, it is I would venture a primary component of its appeal to those
    who love the film – and I would like to propose that silliness is never as simple
    or innocent as it may appear as, for adults, it often functions as a form of critique,
    foregrounding and mocking our expectations. Laugher is elicited by the immediacy
    of incongruity, but recognition of that incongruity requires anticipation based
    on prior experience. Put differently, in order to recognise something as a deviation,
    we need to be conversant with the rule. To explore how silliness functions within
