    Today’) makes a fruitful case study, in its complex combination of a rather regressive
    premise (the universality of the nagging housewife) with the assumption of some
    knowledge of the composer’s life and times (Beethoven’s encroaching deafness,
    and his influence upon Felix Mendelssohn) but also a meta-textual address to audiences
    familiar with previous British comedy. Firstly, there are distinct echoes, whether
    intentional or not, of Dudley Moore’s ‘Ludvig’ character'
