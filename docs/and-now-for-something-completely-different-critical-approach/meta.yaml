  mdcn: '这些记忆代表了跨越四十余年的父女关系回忆（涵盖了女权主义与后女权主义辩论的重大变革时期），同时也因为父女双方对《蒙提·派森》的共同投入，以及受访者母亲在此投入中常被边缘化的现象，并不能告诉我们母亲或父亲在“育儿日常琐事”（同上：2）全貌中所扮演角色的程度——事实上，如前所述，许多受访者指出，对《蒙提·派森》的热爱是他们与父亲之间唯一的联系。尽管如此，这些回忆似乎确实与某些与1960年代后“新父亲”观念相关的过程相契合，特别是将《蒙提·派森》小品作为睡前故事（这可被视为育儿的“日常”实践），以及父亲“与女儿同样投入”的理念（Joseph
    Pleck 引自同上：10）。


    事实上，在许多女性受访者关于她们与父亲共同投入《蒙提·派森》的回忆中，有证据表明，这种投入作为一种关键的发展活动，其功能等同于——但又有别于——通过母女共同观看肥皂剧或电影明星而实现的“协商步入成年”和促进“青少年探索”的形式。这一点最清晰地体现在受访者详细描述的、通过父亲学习喜剧和欢笑的过程中。关于这种与父亲一起学习欢笑过程的记忆，在受访者回忆中有详细阐述，她们讲述了童年时如何通过观察父亲的笑声或“密切关注正在发生的事情”来理解父亲为何在特定时刻发笑，从而学会欣赏《蒙提·派森》（#2639
    加拿大人，46-55岁）。许多受访者将童年接触《蒙提·派森》的经历呈现为进入成人喜剧的入口——例如，一位受访者评论说他们“在成长过程中记住了一些对十岁孩子来说非常不合适的东西”，另一位则回忆起“和爸爸坐在一起，被允许看成人电视”的快乐（#388
    美国人，26-35岁；#2626 英国人，46-55岁）——这进一步强化了这种感觉：与父亲分享对《蒙提·派森》的热爱，引领他们进入一个可以通过父亲的特定指导来培养幽默感的空间。但关键的是，这种指导并非针对任何形式的喜剧，而是对许多受访者而言，被记忆为愚蠢而有趣的喜剧——这为他们年幼时提供了接触喜剧的入口——但同时，如前所述，也因其“不合适”、令人困惑、“出乎意料”、“不寻常且与众不同”，或者因为他们“无法相信成年人可以如此愚蠢和有趣”（#1115
    美国人，26-35岁；#3562 美国人，26-35岁；#3372 加拿大人，26-35岁；#2339 波兰人，36-45岁；#3564 美国人，36-45岁），而具有明显的成人吸引力。


    《蒙提·派森》在女性受访者与父亲之间建立独特纽带的特殊且显然重要的方式，也可以与受访者童年时观察或听到父亲对《蒙提·派森》发笑的许多生动记忆联系起来。在许多回忆中，她们强调了看到或听到父亲发笑的喜爱程度，而这些记忆的影响和意义，往往通过承认她们的父亲很少笑，或者她们从未见过他在其他喜剧节目中如此开怀大笑来体现。例如，一位受访者回忆道，“它让我父亲笑了，而在我童年时期，他是一位经历过多次战役的坚毅老兵，这并不常见，因此任何能让他微笑的事物也给我带来了快乐”，而另一位则说，“我记得他笑得多么厉害。我爸爸平时很少笑，即使笑也只是轻声咯咯，所以这给我留下了深刻的印象。他笑得那么厉害，几乎要哭了”（#1610
    美国人，26-35岁；#3283 美国人，36-45岁）。与 Harrington 和 Bielby 关于代际粉丝行为可以协助或促进儿童或青少年“发展和/或成熟过程”（Harrington
    and Bielby 2010）的论点一致，这些叙述再次凸显了这样一个观点：通过发现和分享父亲对《蒙提·派森》的热爱，受访者可以开始将父亲视为一个具有文化背景的人来了解，而不仅仅是作为父母和父亲来关联和理解。此外，受访者目睹父亲“放声大笑”（#405
    英国人，26-35岁；#2639 加拿大人，46-55岁）或笑得“几乎要哭”的印象——这种笑声她们最终也参与并分享——表明了父亲和女儿如何通过共同的《蒙提·派森》粉丝行为在情感上建立联系。在这里，父亲被记忆为向女儿展示并分享极度愉悦（因此也是情感）的表达，而在
    Sue Sharpe 对父女关系的研究中，这与更传统的父亲观念相冲突，即父亲需要避免与孩子进行情感投入，以符合“社会建构的男性气质要求”以及更广泛的父权制父亲观念（Sharpe
    1994: 168）。


    ## 源源不断的礼物？蒙提·派森代际粉丝行为的后果


    除了要求受访者回忆他们与《蒙提·派森》的初次接触外，项目问卷中的进一步问题还要求他们反思自初次接触以来观点是否发生了变化，并对《蒙提·派森》的影响和受欢迎程度给出总体评价。在回答这些问题时，受访者继续提及《蒙提·派森》与她们父亲之间的联系，一致性与恒常性的话语渗透在关于《蒙提·派森》在受访者成年后与父亲持续联系中所扮演角色的提及中。对于许多女性受访者来说，对《蒙提·派森》的投入“继续是我与爸爸之间的重要纽带”，“我和爸爸仍然互相引用它”，并且它“帮助我与爸爸建立联系”（#1839
    美国人，18-25岁；#2338 英国人，18-25岁；#3527 美国人，18-25岁）。正如一位受访者简洁地指出，“这是我们的事”；而另一位在讨论《蒙提·派森与圣杯》时说，“我们之间几乎没有共同点，因此我们仍然能坐在一起为这部电影放声大笑的事实，在我看来是完美的”（#1026
    美国人，26-35岁；#3318 美国人，26-35岁）。这些回应中显而易见的是，《蒙提·派森》在启动、加强和维持受访者与父亲在整个生命历程中的关系方面具有使用价值，通过引用《蒙提·派森》和持续的共同观看，为她们提供了一种关键的“沟通货币”（Ralph
    2015: 14）。


    除了维系这种父女纽带外，她们父亲与《蒙提·派森》之间不可磨灭的联系，也使得《蒙提·派森》的喜剧对这些受访者而言，成为与父亲共同观看和共同欢笑的过去记忆的提醒，特别是对于那些父亲已经去世的受访者。正如受访者所指出的，“我有那段与他在一起的美好记忆，任何与《蒙提·派森》相关的事物都会让我想起他以及他给予我的优质喜剧教育”，“它在我爸爸去世时帮助了我”，以及“当我的父亲在2005年突然去世时……[我们]对《蒙提·派森》的共同兴趣安慰了我——我可以提到死鹦鹉小品和殡仪馆小品，并感觉到我爸爸即使在悲伤的情况下也与我一起笑”（#61
    美国人，36-45岁；#263 英国人，36-45岁；#1957 丹麦人，36-45岁）。在这里，任何与《蒙提·派森》相关的事物，包括那些直接探讨和嘲笑死亡本身的小品，帮助受访者保留了
    Jackie Stacey 所说的关于她们父亲以及他个性中促成与女儿独特纽带的元素的“珍贵记忆”（Stacey 1993: 64）。《蒙提·派森》观看记忆不仅在此实现了对“逝去亲人的纪念”（Kuhn
    2002: 44），而且在面临失去继续体验共同欢笑的机会时提供了慰藉，而这种共同欢笑对许多受访者而言，是她们独特父女关系的基础。


    对于这些受访者来说，对《蒙提·派森》的热爱从根本上是她们父亲是谁或曾经是谁（作为一个个体，超越其作为父母的假定地位）的一部分，这一点通过提及以下事实得到进一步说明：在一个案例中，受访者父亲的葬礼上播放了《银河之歌》；在另一个案例中，受访者和她的父亲在她的婚礼和三十岁生日时随着《永远看到生活光明的一面》跳舞；在许多其他案例中，受访者和他们的父亲每年在他的生日或圣诞节或复活节观看《蒙提·派森》电影（特别是《布莱恩的一生》）。这些活动为
    Barker 等人提出的观点赋予了新的内涵，即电影或其他媒体文本可以成为“仪式化观看”实践的一部分（Barker *et al.* 2015: 53），而《蒙提·派森》在一系列家庭仪式或家庭生活事件中的作用——包括以歌曲的形式——说明了其作为'
