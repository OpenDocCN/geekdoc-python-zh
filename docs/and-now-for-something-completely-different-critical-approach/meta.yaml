    As Wilmut explains, choosing a title for the programme had been difficult since
    the troupe did not wish to give away content. Various silly names were considered,
    including *Owl Stretching Time* and *A Horse, a Spoon, and a Bucket*, before the
    group settled on *Monty Python’s Flying Circus* as suitably ridiculous (Wilmut
    1980: 195–6). The programme was certainly influenced by other important comedy
    series, including *The Frost Report* and Spike Milligan’s ground-breaking series
    *Q5*. Milligan, who had earlier starred in the comedy radio programme, *The Goon
    Show*, eschewed the typical sketch comedy format on *Q5*, preferring instead a
    more stream-of-consciousness approach with a surreal element. Michael Palin recalls
    that ‘Terry Jones and I adored the *Q* . . . shows. . . . [Milligan] was the first
    writer to play with the conventions of television’ (Ventham 2002: 157). Jones
    extends on this, noting that Milligan ‘totally ripped up all form and shape –
    and there we’d been writing three-minute sketches with beginnings, middles and
    ends – and Milligan started a sketch, and then it turned into a different sketch,
    then it turned into something else’ (quoted in Wilmut 1980: 197). John Cleese,
    too, notes the influence of Spike Milligan and *Q5*, explaining in *The Pythons
    Autobiography by the Pythons* that


    > we [Cleese and Terry Jones] both happened to watch Spike Milligan’s *Q5*, and
    one or the other of us phoned up and said kind of jokingly but also rather anxiously,
