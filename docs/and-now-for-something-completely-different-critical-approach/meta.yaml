  md: '(#1839 American, 18–25; #2338 British, 18–25; #3527 American, 18–25). As one
    respondent succinctly notes, ‘it’s our thing’; while, for another discussing *Monty
    Python and the Holy Grail*, ‘there is very little common ground between us and
    so the fact that we can still sit back and roar with laughter over this film makes
    it perfect in my eyes’ (#1026 American, 26–35; #3318 American, 26–35). What is
    evident in these responses is the use-value of Python in initiating, strengthening
    and maintaining respondents’ relationships with their fathers throughout the life
    course, giving them, through Python quoting sessions and continued shared viewings,
    a key ‘currency of communication’ (Ralph 2015: 14).


    Alongside the maintenance of this father–daughter bond, the indelible associations
    between their fathers and Monty Python have also enabled Python’s comedy to function,
    for these respondents, as a reminder of past memories of shared viewings and shared
    laughter with their father, particularly for those whose fathers have now passed
    away. As respondents note, ‘I have that amazing memory with him and anything Python
    reminds me of him and the quality comedy education he gave me’, ‘it helped me
    when Dad died’, and ‘when my father suddenly died in 2005 . . . [our] common interest
    in Monty Python comforted me – I could refer to the dead parrot sketch and the
    undertakers sketch and feel my Dad laughing with me even in this sad situation’
    (#61 American, 36–45; #263 British, 36–45; #1957 Danish, 36–45). Here, ‘anything
    Python’-related, including Python sketches focused on addressing and laughing
    at death itself, helps respondents hold on to what Jackie Stacey would term ‘treasured
    memories’ (Stacey 1993: 64) of their father and the elements of his personality
    and humour that fed into the exclusive bond they had with their daughters. Not
    only do memories of Python spectatorship work here to enable the ‘memorialising’
    of ‘deceased loved ones’ (Kuhn 2002: 44) but also to provide comfort when faced
    with the loss of opportunity to keep experiencing the shared laughter that served,
    for many of these respondents, as the foundation of their distinct father–daughter
    relationship.


    The sense that a love for Python is, for these respondents, fundamentally part
    of who their father is or was (as an individual, beyond his putative status as
    a parent) is further illustrated by mentions of the fact that, in one case, ‘The
    Galaxy Song’ was played at a respondent’s father’s funeral, that, in another,
    a respondent and her father danced to ‘Always Look on the Bright Side of Life’
    at her wedding and her thirtieth birthday, and, in many others, that Python films
    were watched annually by respondents and their fathers on his birthday or at Christmas
    or Easter (particularly and notably *Monty Python’s Life of Brian*). Such activities
    give a new spin on the idea that, as Barker *et al.* argue, films or other media
    texts can become part of ‘ritualised viewing’ practices (Barker *et al.* 2015:
    53), with Python’s role in a range of family rituals or family life events – including
    in the form of songs – illustrating its marked utility as a'
  merge: -1
  pgno: 221
- img_proc: true
  md: 'source of (multi-media) comedy that can be drawn on and pervade all aspects
    of a person''s life.


    In turn, if Monty Python is shown to be, for many respondents, indelibly associated
    with their father and the bond they have had with him, it is also presented as
    something which is now a fundamental part of these respondents'' identities too.
    Respondent answers here returned again to discourses associated with self-development,
    with many stating that their early encounters with Python had helped to shape,
    form, or had served as a foundation for their sense of humour. As one respondent
    stated, ''I owe much of my adolescent character development and sense of humour
    to them'', while, for another, ''[i]t opened a huge door for me and I couldn''t
    imagine what my sense of humour would be like if I''d never seen Monty Python''
    (#932 American, 46–55; #2709 Canadian, 18–25). Discourses of constancy and consistency
    also characterised these responses, in terms of their reflections on repeated
    encounters with Python''s comedy over the years. The words ''always'' and ''still''
    are repeated constantly throughout these accounts; for instance, respondents note
    that ''I have always found'' Python ''hilarious, no matter how many times I watch'',
    ''I still feel great joy when I watch the programmes and the films'', and ''Python
    still makes me hurt laughing'' (#131 American, 18–25; #491 British, 36–45; #708
    British, 36–45). In these examples, respondents engage in what Harrington and
    Bielby, drawing on developmental psychology, term ''autobiographical reasoning''.
    Here, respondents present a sense of continuity in their Python fandom, outlining
    how Python''s continued capacity to amuse respondents, and produce the same kind
    of intense, physically impactful laughter experienced as a child, illustrates
    ''continuity in the self over time'' and ''personality coherence from infancy
    to adulthood'' (Harrington and Bielby 2010). Indeed, this sense of constancy and
    consistency is prevalent even in the group of female respondents who note that,
    looking back, aspects of Python''s comedy can be read as sexist or dated. As one
    respondent notes, ''[i]t is interesting that I retain such fond memories, even
    as I look back to what now reads as sexist''; for another, ''some of the programmes
    now look a little dated and parts are a bit sexist'' but ''that aside the silly
    humour and more sophisticated humorous way of looking at life still stands up
    in our modern society''; while, for another, ''I still love it I''m just more
    aware of how sexist this time was'' (#28 Belgian, 46–55; #1615 British, 36–45;
    #701 Canadian, 46–55). In these examples, then, there is clearly a pull and negotiation
    – when reflecting on their contemporary relations to Python – between, in Jackie
    Stacey''s terms, ''private narratives'' of their history of consistent Python
    fandom and its association with past memories, and a contemporary ''critical awareness''
    of the dated aspects of Python (Stacey 1993: 63, 65), which are frequently bracketed
    off, in these responses, from Python''s pleasurable silliness or ''more sophisticated
    . . . way of looking at life'' or are put in context by being seen as reflective
    of the time in which Python was made.'
