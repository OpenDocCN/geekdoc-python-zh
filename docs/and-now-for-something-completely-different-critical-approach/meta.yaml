  mdcn: '在操作诺特洛布的任务中，他通过播放《基尔代尔医生》（1961–66）主题曲的唱片来传达其演讲中的权威。正如在第35集《裸体风琴手》中对雪莉·贝西主持“殡仪馆节目”的随意提及一样，这里的笑话在某种程度上依赖于对表面“轻松”音乐的潜在力量和可能误用的认识。《圣杯》和《布莱恩的一生》（1979）中也有类似的正式戏谑。前者包含对音乐剧《卡米洛特》（1960年首次在百老汇上演，1967年改编为电影）的简短恶搞式打断，而后者则以一首对圣经式史诗而言“不合时宜”的歌曲开场和收尾：一首宏大、詹姆斯·邦德主题曲风格的歌曲（以雪莉·贝西的方式演唱），歌颂这位被误解的弥赛亚平凡的童年和青春期（“他的脸上长了雀斑”），然后是《永远看到生活光明的一面》，一首关于坚忍的欢快颂歌，其主唱（艾德尔）在最终演职员表出现时直接向观众发表评论。


    有趣的是，《蒙提·派森的飞行马戏团》（MPFC）通过仅偶尔融入有界限、持续的“音乐段落”而区别于其直接的喜剧前辈（以及后辈），这种音乐段落常见于公认的派森前身作品，如《对不起，我再读一遍》（1964–73）和《不要调整你的设备》（1967–69），或后来的埃里克·艾德尔/尼尔·英尼斯合作作品《拉特兰周末电视台》（1975–76）。相反，且大概违背了当时的普遍预期，表演歌曲往往只短暂且不协调地出现；例如，想想唱歌的警察（第3集《如何从很远的地方辨认不同种类的树》），埃里克·艾德尔随意弹奏帕里《耶路撒冷》的片段（第4集《猫头鹰伸展时间》；这首歌也出现在其他地方），BDA旅鼠的“主题曲”（第4集《猫头鹰伸展时间》），“午餐肉之歌”（第25集《午餐肉》），唱着关于羊驼的西班牙人（第9集《蚂蚁，导论》），考古学家罗伯特·埃弗斯利爵士在“西部”风格的音乐剧中演唱“今天我听到知更鸟在歌唱”（第17集《巴兹·奥尔德林秀》），同时他挖出一个“第四王朝的苏美尔饮酒器”，达基中士的欧洲歌唱大赛歌曲（第22集《如何辨认身体的不同部位》），以及“金钱秀”主持人（第35集《裸体风琴手》）带领合唱团唱歌，等等。“伐木工之歌”（第9集《蚂蚁，导论》）尽管出名，却是一个罕见的例外，它是一首结构完整、有主歌/副歌结构和逻辑推进的歌曲，尽管结局出人意料地“未完成”。这首歌有其自成一体的逻辑，逐渐揭示了骑警的异装癖，以及“音乐声音的轻快特质”（兰迪
    2005: 73，让人想起“山地音乐剧”（拉森 2008: 125））与歌词中对复杂男性气质的呼唤之间的脱节；其“独立”特质使其在后来的现场表演中被定位为一系列其他小品的结尾。


    ## 詹姆斯·莱戈特


    在采访中，派森团队的成员往往强调他们的“音盲”，以及将音乐融入一个“已经发挥到极致”的小品的写作或表演中的实用主义（派森在纪录片《从午餐肉到精子》中引述，该片于1999年10月9日作为BBC1“派森之夜”的一部分播出）；一个典型的例子可以在第9集（《蚂蚁，导论》）中找到，其中“理发师”小品过渡到“伐木工之歌”，其演唱者在结尾的“访客”小品结束时再次出现，现在打扮成威尔士矿工，唱着《叮咚欢乐高唱》，作为对一个越来越令人不快的房屋入侵场景叙事的恰当混乱结局。确实，有人可能会认为，后来派森项目（特别是《生命的意义》[1983]和《合同义务专辑》[1980]）对音乐元素的日益依赖与一定程度的创作枯竭之间存在关联。


    仅限于派森专辑和现场表演的歌曲（即它们未出现在电视节目或电影中）几乎构成了一个替代经典，有时与他们的其他作品相连，有时则显得脱节、随意，更能体现团队成员的个人特质；特别是《合同义务专辑》被视为他们的《白色专辑》，因为大部分材料——主要是音乐——是单独构思和录制的。大多数专辑歌曲都基于其概念、音乐伴奏和人声表演之间的脱节，而大多数派森成员明显“未经打磨”的歌唱才能（埃里克·艾德尔是个可敬的例外）常常增加了另一层不协调。因此，《我们爱长江》想象英国的“顶级守门员”以通俗的“足球歌曲”风格吟唱关于长江；《医疗情歌》为一系列可怕的疾病配上轻快的曲调，由格雷厄姆·查普曼以假装严肃的方式演唱；《半只蜜蜂埃里克》有着简单的旋律和编曲，掩盖了其存在主义难题；而《哲学家之歌》基于之前电视小品的前提，是一首关于知识分子饮酒习惯的喧闹歌曲。还有一些自觉有问题的歌曲：《永远不要对阿拉伯人无礼》将冒犯性的种族侮辱配上缓慢轻快的华尔兹；《坐在我脸上》通过将爱国的格雷西·菲尔兹歌曲《我们走时歌唱》配置为一系列性爱姿势而游走在危险边缘；被禁的《再见约翰·丹佛》（从某些版本中删除）似乎描述了这位艺术家的死亡；而《我打赌他们不会在电台播放这首歌》是一首听起来平淡无奇的当代流行歌曲，带有对其自身被删除的脏话的自我指涉。还有一些故意“糟糕”的曲目，挑战听众的耐心，比如《又来一个》和《我喜欢交通灯》，其中特里·琼斯单调地唱完一首天真直白的无伴奏歌曲，然后显然失去了继续的意愿。


    与许多这些歌曲的“随意”——或确实是“填充”——氛围相比，《生命的意义》的音乐材料是整个派森作品中最刻意和细致的之一：开场短片《深红永恒保险》的海员号子预示了“银河之歌”的旋律，这是一首存在主义歌曲（在故事中）旨在说服一个女人交出她的肝脏。“每一个精子都是神圣的”——一首宏大（且相对昂贵）的莱昂内尔·巴特式歌舞曲目，从音乐厅宣叙调无缝过渡到赞美诗再到音乐剧合唱——之后是一首学校赞美诗的戏仿，并在结尾的“天堂里的圣诞节”曲目中找到关联，这是一次同样“过度”的表演（包括裸胸天使和摇摆的东方三博士），这次是关于来世，而非受孕。“阴茎之歌”想象诺埃尔·科沃德不协调地对校园俚语中的男性生殖器感到高兴，这是一首非常不寻常的派森曲目，因为它戏仿了特定的作曲家/表演者。


    在更广泛的层面上，少数单集电视节目将音乐作为概念基石。例如，第31集（《全英普鲁斯特总结大赛》）可以作为对“不合时宜”音乐的对位设计考量来分析，其中——延续音乐类比——相互交织的主题涉及合唱团的意外努力（总结普鲁斯特或爬山）、通过古典音乐力量复活的动物、办公室环境中对桑迪·威尔逊《魔鬼》的表演（一个依赖观众既熟悉一位声誉相当无害的英国歌舞剧/音乐剧作曲家，又熟悉肯·拉塞尔1971年同名争议电影的双关笑话），以及角色元文本地抱怨其他角色突然唱歌。人们可能会推测，这个特定节目中大量使用弗雷德·汤姆林森（“内部”音乐编曲家）和他的歌手团队，是最初的意图，还是仅仅是一种利用他参与（以及成本，可以推测）的务实方式。类似地，后来的剧集《轻娱乐战争》（第42集），正如其标题所示，在其拼贴中特别密集，包含了与音乐剧以及爱国、战争相关的管弦乐/流行音乐相关的口语和歌唱典故及资料库音乐，所有这些都建立在尼尔·英尼斯歌曲《梦想何时开始》的变奏基础上。首次听到（其和弦进行只能事后识别）是通过一个对《斯蒂尔父子》（1962–74）主题音乐的精确质感戏仿，它在其他小品的背景中短暂出现，然后在剧集结局时由英尼斯直接表演其“完整”版本，风格类似1930年代的流行歌曲。这首歌的使用及其在剧集中的位置，无疑引发了一些关于派森及其相关经典交汇点的问题。到这一集时，英尼斯可以说是“秘密”的派森成员，在他们的现场表演中表演自己的曲目，并为他们的专辑贡献了最时髦的音乐戏仿（例如《领带与手帕》[1973]中用于说明学术讨论的华丽摇滚流行乐）。尽管符合派森技巧'
