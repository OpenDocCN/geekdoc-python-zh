    gallons of vomit, streams of it, all a vile yellow color, sprayed all over everybody
    and everything in a formal dining room. . . . It’s a barbed, uncompromising attack
    on generally observed community standards’. Most reviewers comment on how Monty
    Python’s attempt to demonstratively purge itself by pushing puke into cinemagoers’
    view helps it rise above vulgarity (it’s more like vulgarity XXL), but that it
    also blows up any possible understandings. Tellingly, most critics do not get
    further than to merely describe what’s happening, as if nothing else can be said.
    And that is exactly it. Nothing can be said about the scene. It is waste and waste
    only. In that sense, the ‘Mr. Creosote’ scene goes beyond what Bakhtin (1965)
    describes as potentially grotesque or carnivalesque – beyond attempts to offer
    a safe space to unbounded celebrations of life outside structured and regulated
    normality. Instead, by not adding anything to the plot, or the poetics (it is
    beyond absurd), or the structure, or the bureaucracy or the philosophy of the
    film (it does add its *flow* but only visually), it is pure waste.


    # CONCLUSION


    History, as it is, has not been terribly kind to *The Meaning of Life*. The reason
    for that is Python’s own myth. At the time of its release the film was applauded,'
