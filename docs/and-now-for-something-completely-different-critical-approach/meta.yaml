    ## 7. GRANNIES FROM HELL, DARING BICYCLE REPAIRMEN, UPPER-CLASS TWITS AND ‘MAKE
    TEA NOT LOVE’: MONTY PYTHON’S FLYING CIRCUS AND 1960S BRITISH (POPULAR) CULTURE


    Caroline Langhorst


    In ‘Working-Class Playwright’, the hard-working, well-dressed young miner (Eric
    Idle) tells his cramp-suffering, swearing and London-bound Northern playwright
    father (Graham Chapman) that he would realise one day that ‘there’s more to life
    than culture . . . there’s dirt, and smoke, and good honest sweat’. The Pythons
    famously addressed both mentioned aspects, the diverse strands of culture and
    the highly absurd and morbid nature of life, in a distinctive satirical, surrealist
    and subversive manner. Moreover, the selected sketch proves to be an apt example
    of their recurrent ‘practice of inverting all roles involving social class and
    national and generational identities’ (Landy 2005: 71). Having grown up in post-war
    Britain and having accordingly encountered a more critical and radical atmosphere
    at university, they were also ‘part of worldwide cultural transformations that
    increasingly challenged existing social and political institutions, opening the
    door . . . to more critical, and perhaps cynical, approaches to questions of authority,
    gender, generation, sexuality, and national and regional identity’ (ibid.: 19).
    As a result, various well-known clichés of British culture in general as well
    as specific pivotal cultural transformations since the post-war era are repeatedly
    referenced throughout the entire Flying Circus series: these encompass the class
    division, the North–South divide and related kitchen sink aesthetics and narratives
    (the angry young man generation and the films of the British New Wave), the generational
    conflict and the growing significance of youth culture and anti-authoritarian
    stances, the related emergence of the supposedly ‘affluent’, ‘permissive society’,
    the accompanying choice of alternative, non-heteronormative lifestyles, as well
    as the influence of American popular culture and the prevalent fear of increasing
    Americanisation.


    Furthermore, the Pythons’ lasting cult status and idiosyncratic engagement with
    British society and culture, their explicit focus upon the (post-)adolescent state
    of mind, and their alleged countercultural edge (see Mills 2014: 134) legitimate
    an analytical focus on the *Flying Circus* era in particular. Drawing upon previous
    accounts of Monty Python’s roots in 1960s British (popular) culture (Landy 2005)
    and counterculture (Mills 2014), this chapter sets out to further examine their
    early years within this highly conflicted sociocultural context. As has been widely
    noted (see Marwick 1998; Harris and O’Brien Castro 2014), both the 1960s in general
    as well as British culture of the time display a very contradictory disposition
    that is defined by a coexistence of progressive and reactionary tendencies (e.g.
    empire nostalgia). Throughout the chapter, several sketches that are linked to
    key aspects of the era will be analysed and further contextualised with similar
    treatments of British culture and society in 1960s British cinema.


    ### ‘LET’S DO IT A DADA’: SURREALIST AND PSYCHEDELIC TENDENCIES IN *MONTY PYTHON’S
    FLYING CIRCUS* (1969–73)


    The *Flying Circus* series engages with 1960s British culture on different levels:
    it integrates several significant artistic influences while simultaneously explicitly
    addressing specific sociocultural issues of the time (e.g. the generational conflict
    or the affluent, permissive society) as well as including a wide range of (pop-)cultural
    references.¹ Mills aptly observes a coexistent affinity *for* and critical engagement
    *with* the counterculture in relation to Eric Idle. Accordingly, ‘[f]rom *Do Not
    Adjust Your Set* through Python and the Rutles, we have a body of work which opens
    a window on the 1960s roots of his comedy’ (Mills 2014: 126). He then names several
    key influences on Idle that can likewise be extended to the *Flying Circus* series:
