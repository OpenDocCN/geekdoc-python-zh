    extraordinary aspect of Python’s international success is the Britishness of the
    humour. More specifically it is the humour (“Who threw that slipper?”) of the
    British public school . . . They had all grown up in a small-c conservative world.’
    Oddly, he thinks their work is only of interest to the middle'
