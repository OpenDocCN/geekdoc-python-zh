  mdcn: '艾柯的论点是，一个物品要成为崇拜对象，其前提条件是组织结构上存在某种松散性，可以说，其接缝是外露的。在我看来，从一部电影中选择性地引用台词属于“可破碎性”的范畴；然而，我同样认为，这种引用行为起到了一种“脱钩”作用，它作为一种社群的速记方式，唤起艾柯所说的“一个完全布置好的世界”（Eco
    1985: 3）。引用台词是为了社群性地重新确立那个特定的语境，而将某些内容从其原始语境中强行抽离出来。


    显然，可引用性并非在所有情况下都是同等程度的邪典因素——它对默片的影响较小（尽管人们或许可以引用字幕卡），某些电影可能更直接地由其他因素来定义：引人注目的镜头和场景、音乐、特效等等。然而，粉丝文化的一个标志，既适用于《摇滚万万岁》（*Spinal
    Tap*）和《公主新娘》（*The Princess Bride*，罗伯·莱纳，1987），也同样适用于《闪灵》（*The Shining*，斯坦利·库布里克，1980）和《极度空间》（*They
    Live!*，约翰·卡朋特，1988），那就是能够引用关键台词，以此作为与其他志同道合粉丝建立联系的一种形式。对于这些电影的粉丝来说，“这个调到十一档”、“如你所愿”、“强尼在这里！”和“口香糖全用光了”是进入特定社群的密码。向另一个理解这个典故并分享说话者热情的人引用一句台词，就能建立起一种联系。而一句引用会催生更多引用：如果你是其中一部或多部电影的粉丝，你现在可能正在脑海中排练其他台词。通过这种方式，一个宇宙从充满意义的碎片中被重构出来，每一片碎片都携带着整体的DNA。电影可被分解为独立台词的特性，使得其社群性重构成为可能——同时也传递了一种共享的、充满喜爱或热情的情感。


    在我看来，这在讨论蒙提·派森时至关重要，他们的节目和电影尤其以大量被频繁引用的台词而著称。以《圣杯》（*Holy Grail*）为例，被频繁引用的台词列表确实很长：“只是皮肉伤”、“再嘲讽你一次”（以及整个法国士兵的独白），“我还没死呢”、“Ni！”、“安提阿圣手榴弹”、“一丛灌木”、“某种滑稽的水上仪式”等等。该节目和电影的粉丝们能够用其他最爱的台词来补充这个简短的列表——然后更完整地背诵出场景。因此，我认为，在《蒙提·派森与圣杯》（*Monty
    Python and the Holy Grail*）、其他派森电影、《蒙提·派森的飞行马戏团》（*Monty Python''s Flying Circus*）以及一般的影视作品中，一个促成邪典粉丝文化的重要因素，是存在那些引人注目的、可以被抽离出来并作为亲和力信号和重构邀请的台词。通过这种方式，可引用性有助于建立诺尔·卡罗尔所称的“笑声共同体”（Carroll
    2014: 85）。正是考虑到这一点，贾斯汀·史密斯在他对《圣杯》的简短评论中指出，“派森们颠覆性的幽默为一代青少年提供了可以记忆、排练和吟诵的剧本，如同某个隐秘、地下教派的神秘礼拜仪式”（Smith
    1984: 121）。


    杰弗里·安德鲁·温斯托克


    然而，鉴于大多数电影都有大量对话，这就引出了一个显而易见的问题：是什么让一句台词足够引人注目，从而可以被抽离出来？同样，这个问题没有单一的答案。一句台词可能因其表达方式、其庄重性或其雄辩性而令人难忘。然而，就《圣杯》而言，可抽离的台词通常因其在愚蠢场景中的荒谬性而令人难忘，在某些情况下，其荒谬的表达方式加剧了这种效果。因此，令人难忘的台词问题与电影的幽默和“辉煌的不连贯性”的考量是相辅相成的。


    《蒙提·派森与圣杯》是一部仅靠最微弱的连续性线索将其二十三个迥异的场景串联起来的电影，所有这些场景本质上都可以作为独立的喜剧小品存在，因为亚瑟（格雷厄姆·查普曼）或加拉哈德（迈克尔·佩林）或兰斯洛特（约翰·克里斯）或罗宾爵士（埃里克·爱德勒）或他们的组合会遇到各种奇怪的情况。许多场景，例如亚瑟与黑骑士（克里斯）的对峙、罗宾爵士与三头巨人的遭遇、加拉哈德造访“炭疽城堡”或兰斯洛特“营救”赫伯特（特里·琼斯），都可以被重新排序甚至省略，而不会对电影的完整性——就其本身而言——造成任何重大损害。从这个意义上说，这部电影非常符合艾柯的提议，即成为邪典电影的前提条件是其辉煌的不连贯性：邪典电影是“一系列不连贯的图像、高潮、充满远见的冰山”（Eco
    1985: 4）。就像《飞行马戏团》的一集一样，《圣杯》可以被分解成不同的独立场景，由某些总体构思连接起来，并偶尔被“现在来点完全不同的东西”打断。


    在每个场景中，重点在于引发观众的笑声——为此目标，剧团使用了他们所能动用的每一种手法，从闹剧到讽刺漫画再到富有创意的文字游戏，但主要围绕着不协调或反讽倒置的手法。有些笑话是弗洛伊德所说的“倾向性”笑话——即带有敌意或淫秽的笑话；另一些则是弗洛伊德所说的“天真”笑话，其幽默源于“文字游戏或概念置换”（见
    Stott 2014: 184）。让我们假设，一个成功的笑话是能从其观众那里唤起预期的愉悦或笑声的笑话；成功的笑话因此很可能被重复给或提及给其他对这部电影有类似喜爱之情的人。考虑到这一点——并且记住“解释过的笑话是最不好笑的东西”这句格言——让我们考虑两个经常被引用的场景：亚瑟与黑骑士的对峙，以及亚瑟与农民丹尼斯（佩林）和无名女子（琼斯）的遭遇。


    黑骑士场景似乎属于弗洛伊德的“倾向性”类别，其幽默源于黑骑士伤势的怪诞、黑骑士与亚瑟之间战斗的闹剧性质、黑骑士对其状态的评价与其实际健康状况之间荒谬的不协调，以及他在失去四肢后继续战斗的超现实性。在拒绝让开并允许亚瑟通过后，黑骑士攻击了亚瑟，并相对迅速地被砍掉了一只手臂，导致一股怪诞的血流从伤口喷涌而出。这当然可能是一个悲剧场景，但黑骑士拒绝承认受伤。当再次被要求让开时，黑骑士回答说：“只是擦伤而已。”当亚瑟难以置信地回应时，黑骑士声称“我受过更重的伤”，两人再次交手，结果是另一只手臂被砍断，更多的血液喷涌而出。黑骑士再次拒绝承认对亚瑟和观众都显而易见的事实，坚称伤势“只是皮肉伤”。按照有条不紊的进程，黑骑士先失去一条腿，然后是另一条腿，但不可思议的是，他仍然拒绝承认失败。当亚瑟和他的同伴帕西“嗒嗒”地离开时，场景以黑骑士的嘲弄结束：“逃跑了，嗯？你们这些胆小鬼！回来接受你们应得的惩罚。我要把你们的腿咬下来！”


    黑骑士的否认以轻描淡写来点缀荒谬的夸张，通过不协调性引发笑声。对于蒙提·派森的粉丝来说，“只是擦伤而已”和“只是皮肉伤”是整个场景荒谬性的速记，场景中一个战斗者，违背了我们所知的现实法则，在相继失去四肢后继续战斗，直到变成一个虽感不便但依然好斗的躯干、脖子和头部。事实上，如果没有对话，这场战斗本身就会是荒谬的——被砍断的肢体、喷涌的血液


