    emerge from the suggestiveness of the image itself – for example, the top half
    of a man’s face is positioned as if it were part of a terrace of houses, his glasses
    reminiscent of the windows in a house. His glasses are then smashed in an act
    of vandalism, and his eyes plucked out as if they were objects stolen by a burglar.
    The associative quality here is seeing the man’s face as a house front because
    his glasses resemble windows and, as both glasses and windows can be broken, this
    is thereafter seen as the consequence of a break-in; as such, the things behind
    the windows – objects to steal – become the eyes once more that are actually behind
    the spectacles. In many senses, the narrative here takes longer to describe than
    actually perceive. Gilliam relies on a *visual literacy* in his audience that
    sees the signifying resemblances and affordances in the images that permit visual
    puns and metaphors. Gilliam loved early Disney films, and embraced the joke forms
    theorised and defined by the studio’s animators, i.e. the spot gag, the running
    gag, the action gag, ‘the funny drawing’, etc., but his main preoccupations became
    developments in what Thomas and Johnston called the ‘tableau gag’ and the ‘gag-that-builds’
    (Thomas and Johnston 1987: 25–32).


    Thomas and Johnston note that


    > the tableau gag is a held picture at the end of an action, in which the character
    is left with a ridiculous appearance due to some foreign substance, or object
    having been placed on, around, over, or in the face or figure. (Thomas and Johnston
    1987: 30)


    The humour here essentially emerges from the stoic acceptance of humiliation of
    the character involved, especially if what the character has experienced has been
    the consequence of the excesses cartoon-animation can play out on a character.
    Crucially, in this instance, the *image* of the character is violated by the very
    plasticity of representing the body in cartoon animation, but the *character*
    itself is inviolate. Donald Duck can be crushed, pulled to extremes and battered
    with objects, but he remains ‘Donald Duck’. Whatever has occurred has happened
    to a known figure, and the ‘slapstick’ that has taken place results in the audience
    laughing at the character *in* the situation and the character’s reaction *to*
    the situation. Gilliam treats the tableau *as* a situation, and does not create
    characters in the conventional sense as visual ciphers that predominantly function
    in four ways: as a violation of the body or environment by *breaking it*, *entering
    it*, *consuming it*, or *altering it* – things Gilliam had done in his drawing,
    even as a child (The Pythons 2003: 58–9). Gilliam later suggests,


    > All I could do was crude, and crude things ended up being violent, somehow.
    Right from the beginning, the foot coming down and Wham! – you create something
    beautiful and then you crush it. A lot of them are about'
