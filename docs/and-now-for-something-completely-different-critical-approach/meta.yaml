    eclectic nature of his influences, his working practices and his particular thematic
    preoccupations and stylistic motifs; and Ewan Wilson builds significantly on existing
    scholarship on *Monty Python and the Holy Grail* through his consideration of
    the ways in which the creative practices of the film’s two directors, Gilliam
    and Jones, can be understood and related to traditions of medieval literature
    and medieval art. This section’s originality, then, relates, in many ways, to
    these chapters’ rigorous and insightful charting of the working practices involved
    in producing Python’s comedy, from the factors that informed choices of library
    music within the television series, to the delineation of Terry Gilliam’s distinct
    approaches to animation practice, to the creative relations between Terry Jones
    and Terry Gilliam in the directing of *The Holy Grail*.


    The chapters in Part Three, ‘Contexts and Representations’, consider key representations
    within Python texts, from countercultural forms, to human-animal relations, to
    potentially offensive representations of race, gender, sexuality and religion,
    using a critical and context-aware approach. The section moves from Caroline Langhorst’s
    nuanced analysis of representations of the 1960s counterculture within key *Flying
    Circus* sketches, to Brett Mills’ re-evaluation and insightful critique of key
    Python sketches through the framework of animal studies, to Kathleen J. Cassity’s
    timely reassessment – particularly in light of recent controversial comments on
    this issue from both John Cleese and Terry Gilliam – of *Life of Brian* from the
    perspective and framework of ‘political correctness’. The chapters in this section
    also all work, through their analysis, to place key concepts within comedy theory
    in historical and contemporary context, most prominently through developing and
    interrogating Python’s association with comic incongruity.


    Part Four, ‘Cult, Fandom and Python’, addresses another frequently invoked but
    underexplored element of Monty Python’s enduring appeal – its cult status and
    following. Here, Ernest Mathijs puts forward a case for an appreciation of *Monty
    Python’s The Meaning of Life* through an analysis of those aspects of the film
    that chime with the historical appreciation of cult cinema (its intertextuality,
    and its relations with other celebrated cult texts, as well as its transgressive
    qualities); Jeffrey Andrew Weinstock attempts to redress the academic neglect
    of Python’s cult status by focusing on the cultic qualities of *The Holy Grail*,
    with an emphasis on quotability, comic inversion, silliness and self-reflexivity;
    and Kate Egan draws on findings from the audience research project *Monty Python
    Memories*, in order to explore the forms of cross-generational fandom, between
    fathers and daughters, recounted in the memories of Python’s female fans. Through
    identifying a range of relevant cult ideologies and themes (pollution, waste,
    hyperbole, transgression, freakery), textual qualities (silliness, incongruity,
    performance styles, quotable lines and their relations to key sketches/scenes)
    and consumption practices (intergenerational and cross-gender fandom), this part
    considers these markedly under-theorised issues and, consequently, sheds important
    light on the global cult status of Monty Python, as an enduring touch-stone of
    alternative British comedy.


    Our book therefore aims to reconsider and reappraise its object of study from
    a range of new angles and perspectives, to challenge or revise received wisdom
    on Monty Python’s meanings, status and appeal, and to reflect critically on its
    ongoing influence and popularity. Through its range of critical essays – which
    draw on new historical, analytical, theoretical and empirical research – *And
    Now for Something Completely Different* provides a multi-faceted assessment of
    Monty Python’s influences, practices, forms, representations and cultural impact,
    from the perspective of fifty years of its existence and increasingly wide circulation
    in innumerable forms and guises.


