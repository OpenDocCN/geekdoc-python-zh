  md: '# ‘IT’S . . . THE INTRODUCTION’


    Kate Egan and Jeffrey Andrew Weinstock


    On 5 October 1969, a new sketch comedy programme premiered on BBC1. The episode,
    with a title, ‘Whither Canada?’ designed to confound critics and reviewers, opened
    with a bedraggled, half-drowned man (Michael Palin) emerging from the ocean and
    collapsing exhausted on the shore, where he uttered one word: ‘It’s . . .’ His
    thought was then completed by a sedate narratorial voice revealing the unlikely
    name of the programme, ‘Monty Python’s Flying Circus’, backed by John Philip Sousa’s
    ‘The Liberty Bell’ march and against surreal, stylised animation of exploding
    heads, naked ladies and characters squashed by a giant foot. Following the opening
    credits, Wolfgang Amadeus Mozart (John Cleese) considered ridiculously inaccurate
    famous deaths in history as rated by a panel of judges; a British language instructor
    (Terry Jones) attempted to teach Italian to native speakers; a commercial was
    presented for butter touted as indistinguishable from a dead crab; a talk show
    host (John Cleese) interviewed a famous director (Graham Chapman) but failed to
    get past trying to establish the director’s name; another talk show host (Eric
    Idle) interviewed one of the world’s ‘leading modern composers’ (Terry Jones)
    but, again, focused on the composer’s name; news coverage was offered of a bicycle
    race in which the participants were all twentieth-century artists; and the history
    of a joke so funny that to hear it was to die immediately from laughter was pursued
    in the form of a documentary. In between segments, pigs squealed and animated
    bits featured absurd and suggestive manipulations of photographs. The episode
    then ended with the same bedraggled man who had opened the episode laboriously
    returning to the ocean.'
  merge: -1
  pgno: 12
- img_proc: true
  md: '![](img/ebe0b8e55d891830377e938813c6b978_13_0.png)


    Figure I.1 Michael Palin’s ‘It’s’ Man: *Monty Python’s Flying Circus* (1969–74).


    The premiere episode of *Monty Python’s Flying Circus* was audacious, erudite
    and irreverent. With parts filmed in front of a studio audience and parts on location,
    and mocking different media formats including the documentary, news broadcast,
    talk show and game show, the episode combined dazzling wordplay (Cleese’s litany
    of contemporary artists during the ‘Picasso/Cycling Race’ segment stands out)
    with absurdist animation, sophisticated references to art and history with unapologetic
    silliness, and original sketch comedy with parody. It was also not particularly
    well received.


    The first episode premiered at just shy of 11pm on a Sunday, with *Flying Circus*
    replacing a religious devotional programme for clergymen that had received lacklustre
    ratings (Hewison 1981: 7). According to Robert Verkaik, the first episode captured
    only a 3 per cent share of the British viewing population – about 1.5 million
    people – the lowest ratings for any ‘light entertainment show’ for the week (Verkaik
    2009). Even more alarmingly, BBC management expressed concern about the content
    of some of the sketches. As reported by Verkaik:'
  merge: -1
  pgno: 13
- img_proc: true
  md: 'Aubrey Singer, the head of the BBC’s features group, told the meeting that
    he had found parts of the programme ‘disgusting’ while the controller of BBC1
    [Paul Fox] complained the show had ‘gone over the edge of what was acceptable’.
    (Ibid.)


    Audience response, however, appears to have been a bit more positive. The *History
    of the BBC* ‘Monty Python at 50’ website reports that ‘[w]ithin a week of Monty
    Python’s first episode, BBC Audience Research had undertaken one of its regular
    Audience Research Reports. The results overall were positive – amusing, entertaining,
    goon-like, and “outrageous” being some of the comments’ (BBC n.d.a). Fortunately,
    enthusiasm for the series on the part of viewers and critics built over the course
    of the first series’ thirteen-week run, and the series went on to run for four
    seasons – a total of forty-five episodes, plus two recorded specifically for German
    television.


    Looking back from a vantage point of over fifty years after the series’ premiere,
    it is clear that both the BBC executives and the viewing audience intuited correctly
    what was happening as the Pythons ‘tore up the rule book of comedy grammar, conventions
    and traditions’ (BBC n.d.a). That which is new and innovative is invariably received
    as threatening by the standard bearers of the status quo and those invested in
    not ruffling feathers, and the goal of the Pythons was never adhering strictly
    to established standards of good taste. The yardstick against which success was
    measured was instead simply: is it funny? And, as Hewison notes, ‘[t]he Pythons
    were quick to exploit the humorous possibilities of bad language’, as well as
    sex and ‘comic violence’ (Hewison 1981: 14). But *Monty Python’s Flying Circus*,
    of course, did more than that. As Wilmut proposes and Landy develops at length
    in her book devoted to the programme, the series ‘mock[ed] the techniques of television’
    (Wilmut 1980: 198). No wonder BBC executives were perturbed! Audiences, however,
    increasingly appreciated what the Pythons were doing, first on their television
    show and, later, in their films as they rewrote the rules of television comedy
    with humour that could be, in the words of *Encyclopaedia Britannica*, ‘simultaneously
    sarcastic, scatological, and intellectual’. Television, notes the entry, ‘had
    never broadcast anything so surreal, daring, and untraditional as *Monty Python*,
    and its importance to television is difficult to overstate’ (*Encyclopaedia Britannica*
    n.d.).


    And yet, while popular appreciation of the Pythons has swelled to truly impressive
    proportions – as attested to by the fact that tickets for the 2014 reunion show
    sold out in forty-three seconds, leading the troupe to quickly announce more shows
    (Dex 2013) – and as the Pythons have been justly honoured and fêted for their
    achievements, scholarly appraisal of their artistry and accomplishments (as is
    often the case with scrutiny of popular culture) has lagged behind. The purpose
    of this collection then, on the occasion of the fiftieth anniversary of the premiere
    of *Monty Python’s Flying Circus*, is to contribute to the'
  merge: -1
  pgno: 14
- img_proc: true
  md: 'surprisingly slim – although growing – body of scholarship on Monty Python.
    With this in mind, we will first offer a brief recapitulation of the troupe’s
    history and output, before considering what made them so ground-breaking.


    # HOW TO RECOGNISE MONTY PYTHON FROM A LONG WAY OFF


    The history of Monty Python – of the coming together of the troupe, the development
    of the *Monty Python’s Flying Circus* television series, and of the subsequent
    films, including *Monty Python and the Holy Grail* (1975), *Monty Python’s Life
    of Brian* (1979) and *Monty Python’s The Meaning of Life* (1983) – has been exhaustively
    detailed in a number of book publications, frequently as narrated by the troupe
    members themselves, including *Monty Python Speaks!* (1999) and *The Pythons:
    An Autobiography by the Pythons* (2003). For that reason, this Introduction will
    limit itself to a concise historical overview. Terry Jones and Michael Palin met
    at Oxford University, where they performed together as part of a comedy group
    called the Oxford Revue. Graham Chapman, John Cleese and Eric Idle similarly met
    at Cambridge University as part of the Cambridge University Footlights dramatic
    club, and Chapman, Cleese and Idle then met American Terry Gilliam in New York
    City while on tour with the Footlights (Landy 2005: 6–13). From 1964 to 1969,
    the six future-Pythons collaborated in various capacities and combinations on
    a variety of different British radio and television shows. All five British Pythons
    worked on the satirical television show *The Frost Report*, which broadcast from
    1966 to 1967 and featured Cleese as a cast member and writer, and Idle, Palin,
    Chapman and Jones as writers (BBC n.d.b). Idle, Jones and Palin – together with
    Gilliam, who was brought in as an animator – went on to work on the quirky British
    television series *Do Not Adjust Your Set*, which aired from 1967 to 1969 (Wilmut
    1980: 181), and Jones and Palin also created and starred in the six episodes of
    *The Complete and Utter History of Britain* in 1969 (see Eggers 2006). Cleese
    and Chapman, for their part, served as cast members and writers for the programme
    *How to Irritate People* in 1968 (Cleese *et al.* 2003: 128) and then as writers
    for *Doctor in the House* in 1969 (McCall 2014: 5).


    There appear to be two different origin stories for *Monty Python’s Flying Circus*.
    As told by Cleese in *The Pythons: An Autobiography by the Pythons*, the *Flying
    Circus* found its beginnings in Cleese and Chapman’s admiration for *Do Not Adjust
    Your Set*. ‘Graham and I used to watch *Do Not Adjust Your Set*’, recalls Cleese.
    ‘We would finish early and watch that because it was the funniest thing on television.
    I said to Graham, “Why don’t we ring the guys and see if they want to do a show
    with us?”’ (Cleese *et al.* 2003: 126). Idle, Jones, Palin and Gilliam had in
    fact been offered a contract by Thames Television to create their own late-night
    comedy series, but the production company wouldn’t have a studio available until
    the summer of 1970 – some year or eighteen months later – so, according to the
    official Monty Python website, Monty Python was born in May 1969 when the'
  merge: -1
  pgno: 15
- img_proc: true
  md: 'six sat down together at a tandoori restaurant in Hampstead, London (‘Pythons’
    n.d.). Television producer Barry Took remembers it differently in *Monty Python
    Speaks*. According to his recollection, the germ of the programme was his conversation
    with British actor and comedian Marty Feldman. Took had been working with Palin
    and Jones on *Do Not Adjust Your Set*, while Feldman had worked with Chapman and
    Cleese on *The Frost Report* and, again, on *At Last the 1948 Show*. According
    to Took, he said to Feldman, ‘I’ll put my two Oxford chaps [Palin and Jones] against
    your two Cambridge chaps [Cleese and Chapman]’, which was meant as a joke but
    later struck him as a good idea. He ran the idea past Palin, but Palin would only
    agree if he could bring Gilliam and Idle along. Took then ran the idea by Cleese
    and Chapman, who also agreed, and Took brought the idea to the BBC (Morgan 1999:
    22–3).


    As Wilmut explains, choosing a title for the programme had been difficult since
    the troupe did not wish to give away content. Various silly names were considered,
    including *Owl Stretching Time* and *A Horse, a Spoon, and a Bucket*, before the
    group settled on *Monty Python’s Flying Circus* as suitably ridiculous (Wilmut
    1980: 195–6). The programme was certainly influenced by other important comedy
    series, including *The Frost Report* and Spike Milligan’s ground-breaking series
    *Q5*. Milligan, who had earlier starred in the comedy radio programme, *The Goon
    Show*, eschewed the typical sketch comedy format on *Q5*, preferring instead a
    more stream-of-consciousness approach with a surreal element. Michael Palin recalls
    that ‘Terry Jones and I adored the *Q* . . . shows. . . . [Milligan] was the first
    writer to play with the conventions of television’ (Ventham 2002: 157). Jones
    extends on this, noting that Milligan ‘totally ripped up all form and shape –
    and there we’d been writing three-minute sketches with beginnings, middles and
    ends – and Milligan started a sketch, and then it turned into a different sketch,
    then it turned into something else’ (quoted in Wilmut 1980: 197). John Cleese,
    too, notes the influence of Spike Milligan and *Q5*, explaining in *The Pythons
    Autobiography by the Pythons* that


    > we [Cleese and Terry Jones] both happened to watch Spike Milligan’s *Q5*, and
    one or the other of us phoned up and said kind of jokingly but also rather anxiously,
    “I thought that’s what we were supposed to be doing?” And the other one said,
    “That’s what I thought too.” We felt that Spike had got to where we were trying
    to get to . . . [I]n a way that fact that Spike had gone there probably enabled
    us to go a little bit further than we would have otherwise gone. (Cleese *et al.*
    2003: 131)


    Despite these anxieties concerning influences, the style of *Monty Python’s Flying
    Circus* was quite different from its predecessors and, as we will go on to outline,
    the group broke new ground through its sketches and episodes that targeted the
    banalities and idiosyncrasies of British life as the troupe experimented'
  merge: -1
  pgno: 16
- img_proc: true
  md: 'with and parodied the conventions of television. As noted above, their humour
    was not always considered appropriate for the television of the period, leading
    to increasingly heated clashes with the BBC during the series’ run (and then larger
