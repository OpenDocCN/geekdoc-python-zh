    a parent) is further illustrated by mentions of the fact that, in one case, ‘The
    Galaxy Song’ was played at a respondent’s father’s funeral, that, in another,
    a respondent and her father danced to ‘Always Look on the Bright Side of Life’
    at her wedding and her thirtieth birthday, and, in many others, that Python films
    were watched annually by respondents and their fathers on his birthday or at Christmas
    or Easter (particularly and notably *Monty Python’s Life of Brian*). Such activities
    give a new spin on the idea that, as Barker *et al.* argue, films or other media
    texts can become part of ‘ritualised viewing’ practices (Barker *et al.* 2015:
    53), with Python’s role in a range of family rituals or family life events – including
    in the form of songs – illustrating its marked utility as a'
