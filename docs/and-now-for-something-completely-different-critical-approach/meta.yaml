  md: 'There are many cartoon deaths and death threats in *The Holy Grail*, highlighting
    the constructedness of filmic and TV cartoon scenario representations, sending
    itself up. Arthur’s seriousness is tried by the silliness of the knights who dance
    the cancan on the round table and sing of eating Spam a lot. This is pantomime,
    farce and, as Day suggests, a clear product of the ‘post-Vietnam political and
    social cynicism of the 1970s’ (Day 2002: 133). If we move away from the secular
    constructions of class and death, funeral costs, and into the philosophical, metaphysical
    and spiritual, we see that this film, alongside much of Monty Python and much
    good satire, destabilises the bases in which people invest, whether secular –
    hierarchy of birth, wealth and its outer accoutrements – or spiritual – the miracle
    of birth and the terror of dissolution.


    Death is also made silly partly in the engagement with Python-originated mythical
    beasts, and Hoffman, while acknowledging that there were no recorded fights with
    dragons in the Arthurian era, discusses the Python creations based on a variety
    of mythical creatures (including killer kitty) with which Arthur and the knights
    were thought to have engaged in the UK and Europe. These include ‘the Killer Rabbit
    of Caerbanog’, building on the ‘Trojan Rabbit’, which appears earlier in the film,
    but much more deadly (and very Welsh-sounding), who ‘returns us to the times of
    gore and corpses’ (Hoffman 2002: 144). There is also the ‘Legendary Black Beast
    of Aaaaarrrrrrgggghhhh!’, so named because the cartoonist dies as he draws him
    and scribbles ‘aargh’, but he has much to do with mythical creatures such as Cerberus
    and Hydra in classical mythology. Death is here comic and mysterious. It leaves
    indecipherable traces and mistakes upon which whole sets of belief and behaviours
    are built.


    Beginning with the brilliant social analysis of Dennis the peasant, it is entirely
    possible to be very silly and very Marxist simultaneously. Indeed, if the condition
    of man under capitalism is essentially alienated and absurd, silliness becomes
    the most appropriate and accurate response. The Pythons, then, are true Brechtians
    and true Marxists:


    > not in spite of their silliness, but because of it even if the object of their
    demystification is trivial (such as the cinematic intermission), it provides the
    basis for the questioning of systems and media that are too often assumed to be
    eternal and unchanging. (Hoffman 2002: 145)


    Humour combines with social criticism, and absurdity undermines all systems, beliefs
    and communication. In a post-existential and Marxist moment, the Pythons expose
    the silliness of systems, using satire, slapstick, farce and pantomime to emphasise
    their horror and threat, managed through comic forms. Like carnival, perhaps,
    this is only a brief release before the systems reimpose themselves and the toys
    go back in the box. Their power, however, is permanently queried.'
