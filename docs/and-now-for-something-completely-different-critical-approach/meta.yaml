    关于《蒙提·皮森的飞行马戏团》似乎有两个不同的起源故事。正如克里斯在《皮森们：皮森们的自传》中所讲述的，《飞行马戏团》的起源在于克里斯和查普曼对《不要调整你的设置》的欣赏。“格雷厄姆和我过去常看《不要调整你的设置》，”克里斯回忆道。“我们会早早结束工作然后看那个节目，因为它是电视上最有趣的东西。我对格雷厄姆说，‘我们为什么不打电话给那些家伙，看看他们是否想和我们一起做个节目？’”（Cleese
    *et al.* 2003: 126）。爱、琼斯、帕林和吉列姆实际上已经获得了泰晤士电视台的合同，可以创作他们自己的深夜喜剧系列，但制作公司直到1970年夏天——大约一年或十八个月后——才有演播室可用，因此，根据蒙提·皮森官方网站，蒙提·皮森诞生于1969年5月，当时六人一起坐在伦敦汉普斯特德的一家坦都里餐厅（‘Pythons’
