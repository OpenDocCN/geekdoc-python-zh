  md: 'Cruelties are often perpetrated as a consequence of naivety or incompetence,
    rather than malice (Hudson 2017b: 93–108).


    Likewise, there is a glee in Python that is markedly absent from both Beckett
    and Pinter. Beckett and Pinter both utilise language and word games in order to
    convey meaninglessness and the inability of language to truly communicate. Bran
    Nicol says of Beckett:


    > [H]e was concerned, from the outset, with the peculiar paradox of fiction. It
    was the job of literature, he thought, to reflect the meaninglessness of existence.
    Yet the paradox is that it must do this via language, which is endlessly (in his
    view) meaningful. So his writing attempts the impossible task of conveying meaninglessness
    through meaning, or trying to convey nothingness through something, or silence
    in words. (Nicol 2009: 53)


    He expands upon this point as follows:


    > Beckett’s writing is the counterpart of abstract visual art of the painter Mark
    Rothko, who exemplifies Susan Sontag’s new postmodern sensibility in art, and
    whose paintings defy any viewer to say plausibly what they are ‘about’ other than
    what the title tells us. Beckett’s prose does something equivalent, though of
    course language cannot be as abstract as colour and his fiction still features
    peoples, places, and situations which can be taken as corresponding to those in
    the outside world. Nevertheless his prose writing is dedicated to the idea of
    upholding the notion that fiction is not ‘about’ anything, does not ‘refer’ to
    anything outside itself. (Ibid.: 53)


    Python similarly utilised language and word games, but with a different intent,
    and with a joyful spirit absent from Pinter and Beckett. ‘Eric the Half a Bee’
    (written by Eric Idle and John Cleese and originally released as a single in 1972
    on Charisma Records) takes delight in its own silliness. The humour in the song
    arrives from a number of sources: the forced rhymes, the deadpan delivery of its
    absurdity, the contrast between the rather pompous language and the daftness of
    the subject matter. It is at once complete nonsense, yet has an internal logic
    of its own:


    > Half a bee, philosophically, must *ipso facto* half not be. But half the bee
    has got to bee, *vis-à-vis* its entity – d’you see? But can a bee be said to be
    or not to be an entire bee when half the bee is not a bee, due to some ancient
    injury?


    And yet, while it is about nothing, it has meaning: it is a send-up of popular
    song, and satirises that song format.'
