- md: '## The Pervasiveness of the Tragic Ending


    The pervasiveness of the tragic ending in Monty Python’s work is itself an example
    of incongruity, since the classical definition of ‘comic’ implies a happy resolution
    typically culminating in marriage. Even the comic ending of *Spamalot* is written
    with such a self-conscious intertextual nod to audience expectations (‘a Broadway
    wedding!’) that it can still be interpreted as mocking the audience’s expectation
    for comic resolution. In the majority of Monty Python’s oeuvre, there are no happy
    endings, just spiralling chaos. Perhaps it is this dynamic that continues to keep
    at least some aspects of the troupe’s work culturally relevant today; whereas
    a comic resolution implies finality, the unresolved chaos of a classically tragic
    ending is, though unpleasant, never entirely finalised. Becoming is emphasised
    over being and process over product, suggesting that, for all the difficulties
    in the world, we are not yet finished – and neither are the incongruities that
    continue to provide us with the possibility of humour.


    The emphasis on incongruity and reversal throughout this chapter is not intended
    to obscure the clearly problematic aspects of humour in *Life of Brian* that may
    be poorly received by many contemporary audiences. This point resonates with multiple
    current cultural conversations regarding to what extent we can/should accept art
    forms from earlier times as products of their time, or whether such a ‘presentist’
    approach to interpretation unfairly imposes our current value systems upon an
    earlier social order. (The discussion of how the song ‘Baby, It’s Cold Outside’
    should be interpreted in the post-#metoo era comes to mind here.) This longstanding
    and broad debate clearly touches on much more than Monty Python. What are we to
    make, for instance, of Shakespeare’s Shylock? Is *The Merchant of Venice* anti-Semitic,
    or does it actually expose anti-Semitism? What of *Othello*? *Huckleberry Finn*?
    *To Kill A Mockingbird*? Do creative works such as these that shape sweeping social
    injustices into an artistic frame primarily serve to question and challenge those
    injustices? Or, by giving injustice the status of art, do works such as these
    risk reinscribing that injustice?


    Three scenes readily come to mind as potentially challenging from this standpoint.
    First is the dialogue regarding ‘What have the Romans ever done for us?’, which
    can easily be interpreted as an apologetic for empire – a potential ethical problem,
    given that the script was written by those from the imperial centre. (At times
    in his autobiography, in fact, Cleese appears tone-deaf to the implications of
    a British man, from the centre of a once-major empire, bemoaning his ‘inability’
    to poke fun at those from a formerly colonised and impoverished country, and at
    the struggles of assimilation experienced by people from the former colonies who
    have immigrated to Britain.) However, as some sketch comedy regarding Brexit has
    demonstrated, in a world where Britain arguably no longer occupies the colonial
    centre, the implications of this scene can also be reversed. (See, for example,
    the *Guardian* video featuring Sir Patrick Stewart, along with several recaptioned
    ‘Brexit’ versions of this scene on YouTube.)


    Another problematic instance can be found in the ‘Big Nose’ scene near the beginning
    of the film – arguably the film’s most tedious and least amusing sequence. This
    exchange could certainly be interpreted as anti-Semitic, though, alternatively,
    it could be interpreted as a critique of anti-Semitism given the complete unlikeability
    of the character giving voice to the ugly stereotype. Since the villain here is
    himself sporting a rather large nose, this scene can also be interpreted as yet
    another instance of hypocrisy, one of many moments in the film in which unlikeable
    characters who easily find fault in others appear to be blind and deaf to their
    own flaws.


    In the scene where Stan/Loretta (Eric Idle) has to keep reminding the revolutionaries
    to include women in their liberatory plans, some may find nothing funny nowadays
    about Stan/Loretta’s assertion that he wants to be a woman because he ‘wants to
    have babies’. With issues surrounding the struggles of transgendered people coming
    to the fore, this scene may feel less than humorous for anyone who has faced that
    challenge. At the same time, this scene does serve to point out one of the often-noted
    limitations of revolutionary groups: male dominance and the mimicry of hegemonic
    power relations even in groups that claim a liberatory agenda. Here, the anti-imperialists
    are made up almost entirely of men (with the exception of Judith, whose presence
    primarily serves the purpose of providing a love interest for Brian). The revolutionaries
    are imagining a ‘freedom fight’ waged by, and entirely on behalf of, men – something
    only Stan/Loretta has the wherewithal to point out. Viewed from this vantage point,
    the scene can be interpreted as foreshadowing the growing awareness that even
    in ostensibly marginalised groups, dominant power structures such as patriarchy
    and heteronormativity are often at play.


    Perhaps the most problematic scene from a contemporary perspective is the response
    of Brian’s mother to his question as to whether she was raped by his Roman biological
    father, Naughtius Maximus: ‘Well, at first, yes . . .’ Since rape is clearly no
    laughing matter, this line may cause many a contemporary viewer to cringe. The
    too-often-accepted narrative of women as ‘wanting it’ even when they say ‘no’,
    and of powerful men not taking ‘no’ as meaning ‘no’, has only just begun to receive
    the attention it deserves. It is long past time that we address this issue head-on
    and cease accepting abuse of power and coercion in sexual situations; understandably,
    many viewers may find there simply is no interpretive frame that can salvage a
    rape joke. A possible alternative reading, for those so inclined, would be that
    the character of Brian’s mother is unscrupulous and absurd in every way and thus
    not remotely believable. (Nor, of course, is the character of Brian’s mother even
    played by a woman.)


    While it is possible to argue for more palatable interpretations of certain scenes,
    many viewers may well find certain aspects of *Life of Brian* to be cringeworthy
    from a contemporary perspective. Nevertheless, I would argue that the majority
    of the film’s humorous scenes – and the overall interpretation of the film if
    it is considered as a whole – derive comic effects from incongruity and reversal,
    in the process delivering a message that continues to be pertinent today, especially
    in light of recent political and social developments.


    The times we are currently living in, on both sides of the Atlantic and globally,
    are undeniably challenging. Some would argue that humour has no place in today’s
    world: how can we be laughing in the face of pending disaster, increasing inequality,
    dehumanisation and unleashed bigotry? I would argue, however, that it is in times
    like these that we need comedy more than ever – not of the sadistic variety where
    the powerful invoke their own superiority, but in the forms of incongruity and
    reversal. Despite his own tendency to complain about ‘political correctness’,
    Cleese himself demonstrates an awareness of the role of power dynamics when he
    states:


    > Not that laughter can’t be unkind and destructive. Like most manifestations
    of human behaviour it ranges from the loving to the hateful. The latter produces
    nasty racial jokes and savage teasing; the former, warm and affectionate banter,
    and the kind of inclusive humour that says, ‘Isn’t the human condition absurd,
    but we’re all in the same boat’. (Cleese 2014: 103)


    Cleese’s latter statement may sound contradictory to his prior assertions, in
    that if humour is to be inclusive and filled with ‘warm and affectionate banter’,
    derogatory humour targeting those with less power and privilege – the sort that
    he earlier writes off as mere ‘political incorrectness’ – is just the kind of
    ‘nasty’ or ‘savage’ comedy that should be avoided. But, like all of us mortals
    who are ‘in the same boat’, Cleese is hardly alone in having some blind spots.
    Often the distinction between humour and disparagement can be difficult to discern;
    there can be a fine line between the two, and, as society changes, those lines
    are not only blurring but constantly shifting. Consequently, many of us experience
    an ongoing tension between the desire to move towards a more equitable world and
    the comfort of the familiar. It is especially difficult for those who are not
    targeted by derogatory humour in power-laden contexts to perceive how that ‘humour’
    may be received by someone with a different identity and social location. Perceptions
    of whether an utterance that the speaker calls ‘humorous’ is funny or cruel will
    differ, depending on the subject position of the audience for that supposedly
    funny joke.


    In counterpoint to the narrative that comedy is being ‘ruined’ by ‘oversensitive’
    neurotics, easily offended ‘snowflakes’ and so forth, a growing body of contemporary
    humour scholarship addresses issues such as cultural, racial and gender power
    dynamics in humour. Many both within and beyond the scholarly community argue
