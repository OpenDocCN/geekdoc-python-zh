    # CONCLUSION


    Objections to certain forms of humour, along with public discussion about what
    constitutes appropriate and inappropriate jokes, are certainly not unique to the
    current era. Contexts shift between cultures and across time, and highly contextualised
    humour often does not travel well, especially as social norms evolve. As Lauren
    Berlant states:


    > Although having good humor is often considered a virtue and a relief, we would
    not always want the state of humorlessness to be replaced by whatever appears
    as the generosity of humor . . . How do we, how can we, distinguish foolish righteousness
    from principled commitment? Context is everything. Perspectives vary. (Berlant
    2017: 314)


    Even Cleese’s apparently contradictory statements capture the tension in play
    during this polarised moment: what kind of humour is deemed ‘acceptable’ in a
    world of seemingly ever-shifting cultural values, and who gets to make that determination?
    As a society, we are currently grappling with an increased awareness of inequity
    and oppression, along with an intense (and presently hegemonic) backlash to that
    heightened sensitivity. For many of us today, laughter only feels safe when we
    are securely located within our own ‘in-group’; in more heterogeneous social spaces,
    polarisation often gives rise to humourlessness, and lack of humour both creates
    and is created by intransigence, the insistence of the ‘rightness’ of one’s position.
    As Berlant states, ‘[h]umorlessness involves the encounter with a fundamental
    intractability in oneself or in others’ (ibid.: 308).


    This intractable ‘humourlessness’ worldview stands in opposition to the ‘deeply
    comic worldview’ described by Morreall in *Taking Laughter Seriously*:


    > Having a sense of humor . . . involves a flexibility and openness to experience
    which a fundamentally serious person lacks. In part this flexibility comes from
    the realization that what is important is relative to the situation someone is
    in and to his point of view . . . Indeed, relativity itself gives a humorous cast
    to our lives as a whole. (Morreall 1983: 123–4)


    The rigidity that Morreall attributes to the contrasting ‘serious’ worldview explains
    the dichotomy noted by Berlant: ‘Humorlessness is associated both'
