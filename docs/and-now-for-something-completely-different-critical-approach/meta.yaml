    2005), Terry Gilliam playfully claims that the group’s TV series was once not
    a satiric ensemble sketch show, but one long cartoon, anticipating *South Park*
    by many years, and only changed by the manipulations of the BBC eager to employ
    Oxbridge alumni. A ruse, of course, but a playful assertion of the significance
    of animation in helping to define, cohere and challenge in the Monty Python oeuvre.
    Gilliam’s role as ‘the American’ in the group, and his special status as ‘the
    animator’ as well as a writer and performer, gave him the requisite distance to
    offer ‘something completely different’ to the ensemble, especially in the variegation
    of the visual and aesthetic dynamics of the sketches and continuity of narratives.
    Central to this, of course, is the place of animation per se, and how Gilliam’s
    particular distinctiveness in using 2D cut-out collages drew upon the compositional
    strategies of fine art and the modernist idioms of pop culture surrealism in redefining
    both the place and presence of animation on television, and as a ready vehicle
    for satire.


    Gilliam extended the intellectual framing of the Monty Python ‘text’ by playing
    with commercial idioms, challenging the Oxford and Cambridge University ‘class
    consciousness’ in the group and embracing American counterculture values. In bringing
    the critical and anarchic outlook of *Mad* magazine from his own cartoon work
    in Harvey Kurtzman’s *Help!* publication (1960–5), he helped advance the modern
    underground *adult* sensibilities that were later associated with such figures
    as Robert Crumb. Gilliam enhanced the British anti-establishment model of his
    colleagues by making the physical comedy of Hogarth more abrasive and the social
    comment of Gilray more direct but, most importantly, by rendering all high-status
    and revered institutions diminished by the absurdity and plain silliness of their
    representation in his animation. As Gilliam was to later remark, ‘[t]hat’s the
    thing I like about Python – it goes from incredibly intelligent to incredibly
    infantile’ (McCabe 1999: 36). This discussion, then, looks at the work of Gilliam
    within the context of Monty Python, addressing the influence of Bob Godfrey, his
    approach to animation practice, his engagement with fine art (from Botticelli
    to Bronzino), his specific models of critique and his particular preoccupations
    as a social commentator.


