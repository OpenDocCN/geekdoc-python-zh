- md: 'A clear example of reversal takes place earlier in the film, when the Legionaries
    attempt but ultimately fail to restrain their laughter in the face of the phallocentric,
    imperial social order represented by Pilate. Here, the troops inform Pilate that
    they doubt the would-be revolutionary Brian’s claim to Roman paternity, since
    his absent father’s purported name, ‘Naughtius Maximus’, is clearly a joke name,
    ‘like Biggus Dickus’. That name, Pilate counters, is *not* a joke; the Romans
    in power apparently take their phallocentrism seriously. Pilate makes it clear
    that he expects an answer of ‘No’ when he then asks his assembled troops, ‘Do
    any of the rest of you find anything funny about the name Biggus Dickus?’ Here
    the complete ridiculousness of Pilate’s unchecked power and fragile masculinity
    breaks through in laughter that the assembled Legionaries attempt yet fail to
    suppress – a semiotic eruption through the symbolic walls, to invoke a Kristevian
    analysis – leading to one of the film’s funniest moments while at the same time
    demonstrating both Pilate’s fragility and his self-delusion.


    Both in this and in the later ‘Release Roger’ scene, everyone aside from Pilate
    and Biggus seems to understand the absurdity of life and their own relatively
    minor place in the larger scheme of things. The dictatorial authority figures,
    blind to their own unpopularity as well as to the arbitrariness and ultimate cruelty
    of the absolute power they hold, stand alone in their oblivion. Yet the social
    order is not upended in a permanent or meaningful way, as this scene underscores
    a grimly serious point: while the mobs and even his own troops may ridicule him,
    Pilate will continue to hold absolute power, even to the point of being able to
    grant life or death, over those beneath him. The mob may have the ability to mock
    their leader, and, due to his own delusional narcissism, to protect themselves
    temporarily from his wrath by engaging in collective plausible denial for comic
    effect. Yet ultimately the mob lacks the power to overthrow Pilate, as we see
    in the rows and rows of crosses bearing the unjustly crucified that become visible
    as the film’s credits roll. This harsh reality, while anything but funny, underscores
    the fact that *Life of Brian*, despite being released forty years ago, still has
    much to say to contemporary viewers; and, while it is presented as a comic film,
    some of its most compelling messages are profoundly serious.


    For all its critique of power, however, ‘the masses’ are not idealised in *Life
    of Brian*, given that the dangers of mob rule and the folly of blindly following
    one’s tribe provide some of the film’s most frequently recurring themes. One memorable
    example includes the ease and speed with which Brian’s followers divide into conflicting
    factions when deciding whether to ‘follow the gourd’ or ‘follow the shoe’. The
    gullibility, mob mentality and easy divisibility of the crowd are satirised when
    the already-factionalised mob follows Brian into the desert, and when they gather
    below Brian’s window the following morning after his amorous tryst with Judith
    (played by Sue Jones-Davies). Here, incongruity is at play in the tension between
    the idealistic hopes of the crowd venerating the hapless, obviously mortal Brian
    as a god, and their own collective inability to achieve any kind of transcendent
    ideal due to their propensity for infighting and their gullibility.


    Incongruity can also be located in the internal hypocrisy of those who gather
    into self-righteous social groups at multiple points along the political spectrum.
    Some examples are fleeting, such as the ‘Popular’ Front of Judea with its membership
    of one. Another example occurs when competing anti-imperialist groups finally
    appear to grasp that they are more likely to achieve their aims against Rome if
    they cease their internecine quarrelling long enough to fight against the ‘real
    enemy’ – only to reaffirm their ‘splitting’ tendencies when they unite just long
    enough to identify the ‘real enemy’ as ‘the Judean People’s Front!’ Hypocrisy
    intertwined with bureaucracy provides fodder for satire when, after agonising
    for several minutes about the need to take action rather than getting mired in
    discussion, Judith breaks into the revolutionaries’ headquarters to announce that
    Brian has been arrested – to which the revolutionaries respond, ‘Right! This calls
    for immediate discussion!’ In this manner, as Michael Palin stated in David Morgan’s
    *Monty Python Speaks!*, *Life of Brian*’s satire was pointed not only towards
    religious excess but was targeted just as sharply at the factionalised leftist
    political groups that existed in England at the time the film was made (Morgan
    2019: 196).


    On this point, numerous scholars have argued that *Life of Brian* is not satirising
    Jesus Christ at all nor sincere followers of the faith; the satire instead is
    on the gullible, the hypocritical and the self-deluded. Here, the incongruity
    lies between the human desire for a divine transcendent and the human flaws that
    prevent us from getting anywhere near that ideal. As Bill Gibron pointed out in
    *Pop Matters*:


    > The only time Christ Himself is depicted in the film is during the Sermon on
    the Mount, and then it’s the audience who is the butt of the joke, as they misunderstand
    and misapply His poetic words. The movie treats the Son of God as an unfathomable
    good, while those who would follow Him are depicted as merely human by nature
    and design. (Gibron 2004: 3)


    When Jesus speaks early in the film (and one time only), the incongruity lies
    between the profundity of his words and the inability of his audience to hear
    them (‘blessed are the cheesemakers’). The joke here is not on Jesus, but on everybody
    else.


    Incongruity abounds in what is perhaps the film’s most iconic scene, when a naked
    (that is to say, clearly mortal) Brian lazily yawns as he parts the curtains at
    the window after a night of debauchery with his love interest Judith – only to
    discover that a huge crowd has gathered beneath his house to ‘worship’ him as
    a deity. Compelled in his state of surprise to speak back to the masses, Brian
    informs them that ‘You don’t need to follow me – you don’t need to follow anybody!’
    When Brian insists to the crowd, ‘You’re all individuals!’ the crowd responds
    in unison, ‘Yes, we’re all individuals!’ to which one lone voice counters, ‘I’m
    not!’ This amusing ironic moment is just one line of dialogue in a scene rich
    with incongruity, most notably the very physical bodies of Brian and Judith juxtaposed
    against the sacred notion of an entirely spiritual Messiah. A further incongruity
    sparks humour in the film’s arguably most iconic line, delivered by Brian’s equally
    mortal mother (played by Terry Jones): ‘He’s not the Messiah! He’s a very naughty
    boy!’ Still more incongruities lie in Brian and Judith’s perceived privacy against
    the masses gathered outside, and in the crowd’s expectation of hearing a profound
    sermon rather than Brian’s crudely vernacular stab at existential philosophy.
    This scene also includes a notable instance of reversal, with Graham Chapman’s
    full-frontal male nudity inverting the conventional cinematic male gaze.


    The film is rife with other examples. There is the Centurion’s attempt to police
    Brian’s graffiti not by threatening his arrest for defacement of public property
    but by correcting his Latin grammar (in the manner of an English public-school
    headmaster). There is the overall ordinariness of Brian, who consistently serves
    as a conventional foil against which the absurdity surrounding him plays out.
    Not least of all, there are the thwarted expectations of rescue in the crucifixion
    scene, which lead to a denouement that, despite the film’s status as a comedy,
    is devastatingly tragic in terms of plot trajectory. Brian’s helplessness ultimately
    reveals a recognition of one’s own limitations in the larger scheme of things,
    bringing to mind Morreall’s observation that the comic mindset involves a certain
    distancing: ‘To have a humorous attitude toward some issue is to be distanced
    from its practical aspects’ (Morreall 1983: 122). That sense of critical distance
    lends a comic effect to a scene that would be devastating in another context:
    Brian’s inability to remove himself from the cross despite his innocence. As an
    individual, Brian is helpless to change his fate; to solve his extremely consequential,
    life-or-death problem will require the cooperation of community, which he is ultimately
    unable to receive. Brian is rendered helpless both by the pervasiveness of imperial
    power and by the lack of solidarity displayed by those around him. The final message
    of the film, then, is deeply serious, harshly critical both of status-quo power
    relations and individualistic self-centredness. Despite being wrapped in a comical
    package, the plot trajectory of *Life of Brian* is tragic, the message sombre.


    The classical tragic trajectory, in fact, is a key element in most of Monty Python’s
    body of work. In the Pythonesque world, situations rarely reach resolution and
    comic set-ups almost invariably devolve into unresolved chaos. (One exception
    is Eric Idle’s more recent stage play *Spamalot*, which offers the expected –
    though self-consciously and meta-theatrically artificial – happy ending.)'
  mdcn: '影片中更早出现的一个清晰的反转例子是，军团士兵们试图却最终未能在代表帝国社会秩序的彼拉多面前，克制住他们对这种以男性为中心的秩序的嘲笑。在这里，士兵们告诉彼拉多，他们怀疑这位潜在的革命者布莱恩声称自己是罗马人后裔的说法，因为他那位缺席的父亲据称的名字“Naughtius
    Maximus”显然是个玩笑名字，“就像Biggus Dickus一样”。彼拉多反驳说，这个名字*不是*玩笑；掌权的罗马人显然非常认真地对待他们的男性中心主义。彼拉多明确表示，当他随后问集合的士兵们：“你们其他人中有谁觉得Biggus
    Dickus这个名字有什么好笑的吗？”时，他期望得到的回答是“没有”。在这里，彼拉多不受约束的权力和脆弱的男子气概的彻底荒谬性，在试图却未能抑制的笑声中爆发出来——借用克里斯蒂娃的分析来说，这是一次通过象征之墙的符号学喷发——这引出了影片中最搞笑的时刻之一，同时也展示了彼拉多的脆弱和自我欺骗。


    无论是在这个场景还是后来的“释放罗杰”场景中，除了彼拉多和Biggus，似乎每个人都明白生活的荒谬以及他们在更大格局中相对次要的位置。那些独裁的权威人物，既看不到自己不受欢迎，也看不到他们所掌握的绝对权力的任意性和最终的残酷性，孤独地沉浸在自己的无知中。然而，社会秩序并未以持久或有意义的方式被颠覆，正如这个场景所强调的一个严峻而严肃的观点：尽管暴民甚至他自己的部队可能会嘲笑他，彼拉多将继续掌握绝对权力，甚至能够决定他下属的生死。暴民或许有能力嘲笑他们的领袖，并且，由于他自身的妄想性自恋，他们可以通过集体进行看似合理的否认来暂时保护自己免受他的愤怒，以达到喜剧效果。然而，暴民最终缺乏推翻彼拉多的力量，正如我们在影片片尾字幕滚动时看到的一排排十字架上钉着的无辜受难者所揭示的那样。这一严酷的现实，虽然一点也不好笑，却强调了一个事实：尽管《布莱恩的一生》是在四十年前上映的，但它仍然对当代观众有很多启示；而且，虽然它被呈现为一部喜剧片，但其中一些最引人入胜的信息却极其严肃。


    然而，尽管对权力进行了批判，但《布莱恩的一生》并未将“大众”理想化，因为暴民统治的危险和盲目追随自己部落的愚蠢是影片中一些最常反复出现的主题。一个令人难忘的例子是，当布莱恩的追随者们在决定是“追随葫芦”还是“追随鞋子”时，他们分裂成对立派系的轻易和迅速。当已经分裂的暴民跟随布莱恩进入沙漠，以及当他们在布莱恩与朱迪丝（由苏·琼斯-戴维斯饰演）一夜风流后的第二天早上聚集在他窗下时，人群的轻信、暴民心态和易于分裂被讽刺了。在这里，不协调性体现在人群将不幸的、明显会死的布莱恩奉为神明的理想主义希望，与他们自身由于内斗倾向和轻信而无法实现任何超越性理想之间的紧张关系中。


    不协调性也可以在那些在政治光谱的多个节点上聚集起来、自以为是的社会群体的内部虚伪中找到。有些例子转瞬即逝，比如只有一名成员的“犹太人民阵线”。另一个例子发生在相互竞争的反帝国主义团体最终似乎意识到，如果他们停止内部争斗足够长的时间去对抗“真正的敌人”，他们更有可能实现对抗罗马的目标——但当他们联合起来仅仅是为了将“真正的敌人”确定为“犹太人民阵线！”时，他们又重新确认了自己“分裂”的倾向。当朱迪丝在痛苦地纠结了几分钟关于需要采取行动而不是陷入讨论之后，闯入革命者总部宣布布莱恩被捕时，虚伪与官僚主义交织在一起，为讽刺提供了素材——革命者们的回应是：“对！这需要立即讨论！”就这样，正如迈克尔·佩林在大卫·摩根的《巨蟒剧团讲话！》中所说，《布莱恩的一生》的讽刺不仅指向宗教过度，而且同样尖锐地指向了影片制作时存在于英国的派系化左翼政治团体（摩根
    2019: 196）。


    在这一点上，许多学者认为《布莱恩的一生》根本不是在讽刺耶稣基督或该信仰的真诚追随者；讽刺的对象是那些轻信的、虚伪的和自我欺骗的人。在这里，不协调性存在于人类对神圣超越的渴望与阻碍我们接近这一理想的人类缺陷之间。正如比尔·吉布伦在《Pop
    Matters》中指出的：


    > 影片中唯一一次描绘基督本人是在登山宝训期间，而那时观众才是笑话的对象，因为他们误解并误用了他诗意的话语。电影将上帝之子视为深不可测的善，而那些追随他的人则被描绘为本质上和设计上仅仅是凡人。（吉布伦
    2004: 3）


    当耶稣在影片早期（且仅此一次）说话时，不协调性在于他话语的深奥与他的听众无法理解（“奶酪制造者有福了”）。这里的笑话不是针对耶稣，而是针对其他所有人。


    不协调性在影片中或许最具标志性的场景中比比皆是：赤身裸体（即明显会死的）布莱恩在与他的爱人朱迪丝一夜放纵后，懒洋洋地打着哈欠拉开窗帘——却发现一大群人聚集在他房子下面“崇拜”他为神。在惊讶的状态下被迫回应人群，布莱恩告诉他们：“你们不需要追随我——你们不需要追随任何人！”当布莱恩坚持对人群说：“你们都是个体！”人群齐声回应：“是的，我们都是个体！”这时一个孤独的声音反驳道：“我不是！”这个有趣的讽刺时刻只是这个充满不协调性的场景中的一句台词，最显著的是布莱恩和朱迪丝非常真实的肉体与完全精神化的弥赛亚这一神圣概念的并置。另一个不协调性在影片中或许最具标志性的台词中引发了幽默，这句台词由布莱恩同样会死的母亲（由特里·琼斯饰演）说出：“他不是弥赛亚！他是个非常淘气的男孩！”更多的不协调性存在于布莱恩和朱迪丝所感知的隐私与外面聚集的人群之间，以及人群期望听到深刻布道而非布莱恩粗俗的、口语化的存在主义哲学尝试之间。这个场景还包括一个显著的反转例子，格雷厄姆·查普曼的正面男性裸体颠覆了传统的电影男性凝视。


    影片中充满了其他例子。有百夫长试图通过纠正布莱恩的拉丁语法（以英国公学男校校长的方式）而非威胁以破坏公共财产逮捕他来监管他的涂鸦。有布莱恩整体的平凡性，他始终作为一个传统的陪衬，衬托出围绕他的荒谬。最重要的是，十字架场景中对救援的期望落空，导致了一个尽管影片是喜剧，但在情节走向上却极其悲剧的结局。布莱恩的无助最终揭示了在更大格局中对自身局限性的认识，让人想起莫雷尔的观察：喜剧心态涉及某种距离感：“对某个问题持幽默态度，就是与其实际方面保持距离”（莫雷尔
    1983: 122）。这种批判性的距离感为一个在其他语境下会是毁灭性的场景增添了喜剧效果：布莱恩尽管无辜却无法将自己从十字架上解救下来。作为一个个体，布莱恩无力改变自己的命运；解决他这个极其重要、生死攸关的问题需要社区的合作，而他最终无法得到。布莱恩既被帝国权力的无处不在所困，也被周围人缺乏团结所困。因此，影片的最终信息是极其严肃的，既严厉批判了现状的权力关系，也批判了个人主义的自我中心。尽管包裹在喜剧的外衣下，《布莱恩的一生》的情节走向是悲剧性的，信息是忧郁的。


    事实上，古典悲剧轨迹是巨蟒剧团大部分作品的关键元素。在巨蟒式的世界里，情况很少得到解决，喜剧设定几乎总是演变成未解决的混乱。（一个例外是埃瑞克·艾德尔近期创作的舞台剧《肥皂剧》，它提供了预期的——尽管是有意识且元戏剧性地人为制造的——幸福结局。）'
