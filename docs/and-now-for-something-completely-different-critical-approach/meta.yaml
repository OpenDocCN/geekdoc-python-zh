    Jean Baudrillard, much of philosophy of the time concentrated on how symbolic
    and sign value (the worth of something through its appearance) is central to the
    kind of ‘rituals of gift exchange’ and ‘conspicuous consumption of useless goods’
    that made ‘waste and excess . . . a central value of commodities’ (West 2011).
