  - '[PAGE 18]


    While the ‘Undertakers’ sketch, which was wiped from the master tape of the episode,
    was not rebroadcast until 1987, the Pythons were brought back for a third season,
    which aired from October 1972 to January 1973 – under a more watchful eye from
    the BBC (Wilmut 1980: 214). As Hewison notes, by the spring of 1972, the troupe
    had been producing material without much respite for two years and tensions had
    developed. Cleese had expressed his desire to leave after the end of the second
    series, but had been persuaded to continue, ‘although in his opinion the search
    for new ideas was making them thrash about, exploiting the strange and violent
    rather than the funny’ (Hewison 1981: 23). By the third series, Cleese felt that
    they were just rehashing earlier sketches (Cleese et al. 2003: 225) and left at
    the conclusion of the series. The ‘Python style’, however, continues Hewison,


    > had been perfected, and the idea of what a comedy series was supposed to be
    totally changed. In three years, they had moved from minority cult to acknowledged
    mastery of the School of British nonsense. The term “python-esque” was firmly
    established in the language. (Hewison 1981: 23)


    The remaining Pythons produced a shortened fourth series consisting of six episodes,
    with the final episode broadcast on 5 December 1974.


    Even during the original run of *Monty Python’s Flying Circus*, the troupe did
    not restrict themselves to television, but expanded into other media, including
    records, books and film. Between 1970 and 1974, the Pythons released four records
    consisting of recordings of sketches and songs: *Monty Python’s Flying Circus*
    (1970), *Another Monty Python Record* (1971), *Monty Python’s Previous Record*
    (1972) and *The Monty Python Matching Tie and Handkerchief* (1974). The group
    subsequently released album versions of their films (*The Album Version of the
    Soundtrack of the Trailer of the Film of Monty Python and the Holy Grail* in 1975,
    *Monty Python’s Life of Brian* in 1979 and *Monty Python’s The Meaning of Life*
    in 1983), live albums (*Monty Python Live at Drury Lane* in 1974 and *Monty Python
    Live at City Center* in 1976), and multiple singles and compilation albums.


    In the world of print, they published *Monty Python’s Big Red Book* (a book with,
    of course, a blue cover) in 1971. Edited by Idle, the book consists mostly of
    material that expands on sketches from the first two series of the television
    programme. This was followed in 1973 by *The Brand New Monty Python Bok* (sic).
    The dust jacket for this one was printed with realistic fingerprints on the front,
    which Michael Palin recalled fooled some into thinking their copy was used, but
    a bit more surprising to many was the fake cover beneath the dust jacket: ‘a mock
    soft-core magazine, featuring lots of bare-bottomed ladies beneath the title:
    “Tits and Bums, a Weekly Look at Church Architecture”’ (Palin 2006: 136). As Robert
    Hewison (1981: 29) notes, this play with the'
- md: 'print medium recast the forms of subversion they had employed in the television
    medium. And this medium-specific irreverence also extended to their albums, with,
    for instance, *The Monty Python Matching Tie and Handkerchief* indulging in diegetic
    play with the sounds of vinyl crackle and scratched records in ‘The Record Shop/First
    World War Noises’ sketch. Many further books followed, including expanded reissues
    of the first two, film scripts and television transcripts, oral histories and
    autobiographies by the members.


    And then there were the films. The first film, *And Now for Something Completely
    Different* (1971), consisted of recreations of sketches from the first two television
    series without an audience, and was intended for an American audience unfamiliar
    with the series. Cleese appears occasionally between sketches in different positions
    (such as being roasted on a spit or on a desk in a pink bikini) to deliver the
    now-iconic line, ‘And now for something completely different’. The film was first
    released in America in 1972, but had little success at the time – likely because,
    at that point, the American public had had no real exposure to Monty Python. As
    Jeffrey Miller reports, Python records and books had begun to ‘trickle in’, and
    those near the Canadian border could view the programme via the Canadian Broadcasting
    Company, which began to air it in 1970 (Miller 2000: 128), but Monty Python was
    far from being a household name. Python began to take hold in America in 1974
    when the Public Broadcasting Station KERA in Dallas began broadcasting the *Flying
    Circus*. Other PBS stations followed suit, and a re-released version of *And Now
    for Something Different* in 1974 performed much better. Noting the growing popularity
    of *Monty Python’s Flying Circus*, ABC (American Broadcasting Company) began to
    air selected episodes of the series in mid-1975 on its late-night *Wide World
    of Entertainment* programme. ABC, however, re-edited and censored the episodes,
    altering their flow and continuity (Hewison 1981: 43). The Pythons took ABC to
    court, ultimately gaining control over subsequent US broadcasts (see ibid.: 54–6).


    Despite the success of the *Flying Circus*, both in the UK and abroad, Monty Python
    is, however, perhaps best known today for the troupe’s three feature-length original
    films, *Monty Python and the Holy Grail* (1975), *Monty Python’s Life of Brian*
    (1979) and *Monty Python’s The Meaning of Life* (1983). *Holy Grail*, conceived
    during the hiatus between the third and fourth series of *Flying Circus*, drew
    upon and parodied Arthurian legend. Mostly shot on location in Scotland, the film
    cast Chapman as King Arthur, Cleese as Sir Lancelot, Gilliam as Arthur’s servant,
    Patsy, Idle as Sir Robin the Not-Quite-So-Brave-as-Sir-Lancelot, Palin as Sir
    Galahad and Jones as Sir Bedevere. Each of the Pythons also played a variety of
    other roles. While reviews of the film were mixed, the film today is widely considered
    to be a cult classic.


    *Monty Python and the Holy Grail* was followed four years later by *Monty Python’s
    Life of Brian*. Directed by Jones and written collectively by the Pythons, the
    film tells the story of Brian Cohen (Chapman), a young Jewish man mistaken for
    the Messiah. Controversial from the moment of its inception, funding for the film
    was withdrawn by EMI Films days before production was scheduled to begin; financial
    backing was then organised by Python fan George Harrison through the formation
    of his company, HandMade Films (Rainey 2011). Containing elements of religious
    satire, the film was characterised as blasphemous by some religious groups and
    banned in certain parts of the UK and some other countries. The film was nevertheless
    – or likely because of the controversy – a box office success. It was the fourth
    highest grossing film in the UK for 1979 and the highest grossing British comedy
    film in American history at the time of its release (ibid.).


    In 1982, the Pythons released *Monty Python Live at the Hollywood Bowl*, a recording
    mostly of sketches from *Flying Circus*, but incorporating material predating
    *Flying Circus* – notably, the ‘Four Yorkshiremen’ sketch from 1967’s *At Last
    the 1948 Show*, which features four men attempting to outdo each other with tales
    of their humble origins. *Hollywood Bowl* also features inserted material dubbed
    into English from the Pythons’ two episodes of *Flying Circus* prepared specifically
    for German television and aired in 1972 (IMDb n.d.).


    *Hollywood Bowl* was then followed a year later by the last Python film to feature
    all six original members: *Monty Python’s The Meaning of Life* (1983). While both
    *Holy Grail* and *Life of Brian* had coalesced around a single somewhat coherent
    story, *Meaning of Life* returned the troupe to its roots in sketch comedy as
    it is loosely structured around a series of scenes addressing different stages
    of life. Although not as successful as *Holy Grail* and *Life of Brian*, the film
    did win the Grand Prix at the 1983 Cannes Film Festival (Chilton 2014). It would
    be another thirty-one years before the remaining Python members would perform
    together as part of the *Monty Python Live (Mostly)* events in 2014.


    ## It’s a Living


    Following the conclusion of the *Flying Circus*, the individual Pythons all pursued
    different projects, many of which were Python-adjacent in the sense of relating
    back to the programme and/or involving other members of the troupe. Eric Idle,
    for example, appeared in Terry Gilliam’s film, *The Adventures of Baron Munchausen*,
    and, in 2004, created *Spamalot*, a musical comedy based on 1975’s *Monty Python
    and the Holy Grail*. The 2005 Broadway production, which starred Tim Curry as
    King Arthur, received fourteen Tony Award nominations, winning in three categories
    including Best Musical (*New York Times* 2005). Idle was also the creator and
    director of the live show *Monty Python Live (Mostly)*, which took place at London’s
    O2 Arena between 1 and 20 July 2014, and joined fellow Python John Cleese in 2015
    and 2016 for the ‘John Cleese and Eric Idle: Together Again at Last . . . For
    the Very First Time’ tour of venues in North America, Australia and New Zealand.
    For his part, Cleese went on to have a very successful career in comedy, television
    and film, including co-writing and starring in the comedy series *Fawlty Towers*.
    In 1988, he wrote and starred in *A Fish Called Wanda* – a film that also featured
    Michael Palin.


    After *Flying Circus* ended, Palin collaborated with Terry Jones on the comedy
    series *Ripping Yarns* (BBC 2014) and starred as Dennis the Peasant in Gilliam’s
    1977 film *Jabberwocky*, with whom he also co-wrote the 1980 film *Time Bandits*.
    Palin and Gilliam teamed up again in 1984 when Palin appeared in Gilliam’s film
    *Brazil*. After *A Fish Called Wanda*, Palin again worked with Cleese on 1997’s
    *Fierce Creatures* – a successor (if not a direct sequel) to *Wanda*, co-written
    and starring Cleese. After a small part in *The Wind in the Willows* in 1996,
    a film written and directed by Terry Jones, Palin stepped back from film, focusing
    instead on a series of travel documentaries. In 2019, he received a knighthood
    for ‘services to travel, culture and geography’ (BBC 2019).


    Following the end of *Flying Circus*, Terry Gilliam, as the overview above suggests,
    focused his energies and talents on screenwriting and directing, often involving
    other Pythons in his projects. His films include *Jabberwocky* (1977), *Time Bandits*
    (1981), *Brazil* (1985), *The Adventures of Baron Munchausen* (1988), *The Fisher
    King* (1991), *12 Monkeys* (1995), *Fear and Loathing in Las Vegas* (1998), *The
    Imaginarium of Doctor Parnassus* (2009) and *The Man Who Killed Don Quixote* (2018).
    Terry Jones, who had co-directed *Holy Grail* with Gilliam and served as sole
    director of *Life of Brian* and *Meaning of Life*, went on to direct *Erik the
    Viking*, involving Cleese, in 1989, and *The Wind in the Willows* in 1996. In
    2015, he directed the comedy *Absolutely Anything*, which featured the voices
    of the five remaining Pythons. Jones also went on to author a number of books
    and screenplays, including works on medieval history.


    Graham Chapman alone did not survive to see the twenty-first century or to appreciate
    the full extent of contemporary Python adoration. Following *Flying Circus*, he
    moved to Los Angeles and wrote and starred in a pirate film called *Yellowbeard*
    (1983) that featured appearances by, among others, Cleese, Idle, Marty Feldman
    and Spike Milligan. Chapman reunited with the other Pythons for *The Meaning of
    Life* and then appeared again with them one last time for a spot that was included
    in November 1989 in a televised, BBC-produced *Flying Circus* twentieth-anniversary
    special called *Parrot Sketch Not Included – 20 Years of Monty Python*, hosted
    by Steve Martin. Chapman died on 4 October 1989 – before the anniversary special
    was broadcast.


    In 1988, Monty Python received a BAFTA award for Outstanding British Contribution
    to Cinema (BAFTA n.d.); ten years later, they received an American Film Institute
    star award (McCall 2014: 203). The five living Pythons gathered for the premiere
    of Idle’s *Spamalot* in 2005, a musical which, as noted, won the 2004 Tony Award
    for Best Musical. In 2005, PBS in the United States aired the entire run of *Monty
    Python’s Flying Circus* and added new one-hour specials.'
  mdcn: '印刷媒介重塑了他们在电视媒介中所采用的颠覆形式。这种媒介特有的不敬态度也延伸到了他们的专辑中，例如，*《蒙提·皮森的领带与手帕搭配指南》*在“唱片店/一战噪音”小品中，就沉溺于对黑胶唱片噼啪声和划痕声的叙事性游戏。随后又出版了许多书籍，包括前两本书的扩展再版、电影剧本和电视节目文字记录、成员们的口述历史和自传。


    然后是电影。第一部电影*《现在来看点完全不同的东西》*（1971年）由前两部电视剧中的小品重演组成，没有现场观众，旨在面向不熟悉该系列的美国观众。克里塞在小品间隙偶尔以不同身份出现（例如被烤在烤肉叉上或穿着粉色比基尼坐在桌子上），说出那句如今标志性的台词：“现在来看点完全不同的东西”。该片于1972年在美国首次上映，但当时反响平平——很可能是因为那时美国公众对蒙提·皮森还缺乏真正的了解。正如杰弗里·米勒所报告的，皮森的唱片和书籍开始“零星传入”，靠近加拿大边境的人可以通过加拿大广播公司收看该节目，该公司于1970年开始播出（Miller
    2000: 128），但蒙提·皮森远非家喻户晓的名字。皮森在美国开始站稳脚跟是在1974年，当时达拉斯的公共广播电台KERA开始播出*《飞行马戏团》*。其他PBS电视台纷纷效仿，1974年重新发行的*《现在来看点完全不同的东西》*版本表现要好得多。注意到*《蒙提·皮森的飞行马戏团》*日益增长的人气，美国广播公司（ABC）于1975年年中开始在其深夜节目*《广阔娱乐世界》*中播出该系列的精选剧集。然而，ABC对剧集进行了重新编辑和审查，改变了其节奏和连贯性（Hewison
    1981: 43）。皮森们将ABC告上法庭，最终获得了对后续美国广播的控制权（见同上：54–6）。


    尽管*《飞行马戏团》*在英国和国外都取得了成功，但蒙提·皮森如今或许最为人所知的是剧团的三部原创长片：*《蒙提·皮森与圣杯》*（1975年）、*《蒙提·皮森的布莱恩的一生》*（1979年）和*《蒙提·皮森的生命的意义》*（1983年）。*《圣杯》*构思于*《飞行马戏团》*第三季和第四季之间的休整期，借鉴并戏仿了亚瑟王传说。该片大部分在苏格兰实景拍摄，由查普曼饰演亚瑟王，克里塞饰演兰斯洛特爵士，吉列姆饰演亚瑟的仆人帕西，艾德尔饰演“勇气不及兰斯洛特爵士”的罗宾爵士，佩林饰演加拉哈德爵士，琼斯饰演贝德维尔爵士。每位皮森成员还扮演了各种其他角色。虽然该片的评论褒贬不一，但如今被广泛认为是一部邪典经典。


    *《蒙提·皮森与圣杯》*四年后推出了*《蒙提·皮森的布莱恩的一生》*。该片由琼斯执导，皮森们集体编剧，讲述了年轻的犹太人布莱恩·科恩（查普曼饰）被误认为弥赛亚的故事。该片从构思之初就充满争议，开拍前几天，EMI电影公司撤回了资金；随后，皮森粉丝乔治·哈里森通过成立自己的HandMade
    Films公司组织了财务支持（Rainey 2011）。影片包含宗教讽刺元素，被一些宗教团体定性为亵渎神明，并在英国部分地区和其他一些国家被禁映。然而，该片——或者很可能正是因为争议——在票房上取得了成功。它是1979年英国票房第四高的电影，也是上映时美国历史上票房最高的英国喜剧片（同上）。


    1982年，皮森们发行了*《蒙提·皮森在好莱坞露天剧场现场》*，这是一场主要由*《飞行马戏团》*小品组成的演出，但也包含了早于*《飞行马戏团》*的素材——特别是1967年*《最后是1948年演出》*中的“四个约克郡人”小品，该小品讲述了四个男人试图用各自卑微出身的故事互相攀比。*《好莱坞露天剧场》*还包含了为德国电视特别制作的两集*《飞行马戏团》*中配音为英语的插入素材，这两集于1972年播出（IMDb
    n.d.）。


    *《好莱坞露天剧场》*一年后推出了最后一部由全部六位原始成员出演的皮森电影：*《蒙提·皮森的生命的意义》*（1983年）。虽然*《圣杯》*和*《布莱恩的一生》*都围绕一个相对连贯的单一故事展开，但*《生命的意义》*让剧团回归了小品喜剧的根源，其结构松散地围绕一系列探讨人生不同阶段的场景展开。尽管不如*《圣杯》*和*《布莱恩的一生》*成功，但该片确实赢得了1983年戛纳电影节评审团大奖（Chilton
    2014）。又过了三十一年，剩余的皮森成员才在2014年的*《蒙提·皮森现场（主要）》*活动中再次同台表演。


    ## 这就是生活


    *《飞行马戏团》*结束后，各位皮森成员都追求不同的项目，其中许多与皮森相关，因为它们与该节目和/或涉及剧团其他成员有关。例如，艾瑞克·艾德尔出演了特里·吉列姆的电影*《吹牛大王历险记》*，并于2004年创作了*《火腿骑士》*，一部基于1975年*《蒙提·皮森与圣杯》*的音乐喜剧。2005年的百老汇制作由蒂姆·柯里饰演亚瑟王，获得了十四项托尼奖提名，并赢得了包括最佳音乐剧在内的三个奖项（*《纽约时报》*
    2005）。艾德尔也是2014年7月1日至20日在伦敦O2体育馆举行的现场演出*《蒙提·皮森现场（主要）》*的创作者和导演，并于2015年和2016年与皮森成员约翰·克里塞一起，参加了在北美、澳大利亚和新西兰场馆举行的“约翰·克里塞与艾瑞克·艾德尔：再次相聚……首次同台”巡演。就克里塞而言，他在喜剧、电视和电影领域取得了非常成功的职业生涯，包括联合编剧并主演喜剧系列*《非常大酒店》*。1988年，他编剧并主演了*《一条名叫旺达的鱼》*——该片也由迈克尔·佩林出演。


    *《飞行马戏团》*结束后，佩林与特里·琼斯合作了喜剧系列*《精彩故事》*（BBC 2014），并在吉列姆1977年的电影*《歪小子斯科特》*中饰演农民丹尼斯，他还与吉列姆共同编剧了1980年的电影*《时光大盗》*。1984年，佩林出演了吉列姆的电影*《巴西》*，两人再次合作。在*《一条名叫旺达的鱼》*之后，佩林再次与克里塞合作了1997年的*《狂野生物》*——这是*《旺达》*的续集（即使不是直接续集），由克里塞联合编剧并主演。在1996年出演了由特里·琼斯编剧和导演的电影*《柳林风声》*中的一个小角色后，佩林淡出电影界，转而专注于一系列旅行纪录片。2019年，他因“对旅行、文化和地理的贡献”被授予爵士爵位（BBC
    2019）。


    *《飞行马戏团》*结束后，正如上文概述所示，特里·吉列姆将他的精力和才华集中在编剧和导演上，经常让其他皮森成员参与他的项目。他的电影包括*《歪小子斯科特》*（1977年）、*《时光大盗》*（1981年）、*《巴西》*（1985年）、*《吹牛大王历险记》*（1988年）、*《渔王》*（1991年）、*《十二猴子》*（1995年）、*《恐惧拉斯维加斯》*（1998年）、*《帕纳索斯博士的奇幻秀》*（2009年）和*《谁杀死了堂吉诃德》*（2018年）。特里·琼斯曾与吉列姆联合执导*《圣杯》*，并单独执导了*《布莱恩的一生》*和*《生命的意义》*，之后于1989年执导了*《埃里克·维京》*（克里塞参演），并于1996年执导了*《柳林风声》*。2015年，他执导了喜剧*《绝对无敌》*，该片由五位在世的皮森成员配音。琼斯还创作了许多书籍和剧本，包括关于中世纪历史的作品。


    格雷厄姆·查普曼未能独自活到二十一世纪，也未能充分领略当代皮森崇拜的盛况。*《飞行马戏团》*结束后，他搬到洛杉矶，编写并主演了一部名为*《黄胡子》*（1983年）的海盗电影，该片由克里塞、艾德尔、马蒂·费尔德曼和斯派克·米利根等人客串出演。查普曼为*《生命的意义》*与其他皮森成员重聚，然后在1989年11月最后一次与他们一起出现在一个电视特别节目中，该节目是BBC制作的*《飞行马戏团》*二十周年纪念特辑，名为*《鹦鹉小品未收录——蒙提·皮森20年》*，由史蒂夫·马丁主持。查普曼于1989年10月4日去世——在纪念特辑播出之前。


    1988年，蒙提·皮森获得了英国电影和电视艺术学院（BAFTA）颁发的“对英国电影的杰出贡献奖”（BAFTA n.d.）；十年后，他们获得了美国电影学会颁发的明星奖（McCall
    2014: 203）。五位在世的皮森成员于2005年齐聚一堂，出席了艾德尔的*《火腿骑士》*的首演，如前所述，该剧赢得了2004年托尼奖最佳音乐剧奖。2005年，美国PBS电视台播出了*《蒙提·皮森的飞行马戏团》*的全部剧集，并增加了新的一个小时特别节目。'
