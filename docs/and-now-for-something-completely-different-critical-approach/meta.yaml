    It is not the intention of this chapter to arbitrate between the differing assessments
    of the role of music in either enriching or ‘diluting’ an enjoyment of Python
    comedy, but to consider some of the occasions and means by which Python conveys
    an attitude towards music – by which I mean musicians and performers, as well
    as live and recorded music and song.


    # APPROACHING PYTHON MUSIC


