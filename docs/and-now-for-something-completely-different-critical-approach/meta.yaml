- md: '## 荒诞派戏剧与路易吉·皮兰德娄（尽管阿尔弗雷德·雅里和其他许多人同样可以被视为荒诞派戏剧的开创者）。皮兰德娄的戏剧以具备许多我们现在可能描述为后现代的特质而著称：一种自我指涉的意识，并凸显了戏剧的不真实性以及我们身处剧院观看表演而非观看现实这一事实。这在他最著名的戏剧《六个寻找剧作家的角色》（1921）中尤为明显。该剧开场时，演员们正在扮演演员和一位导演，他们正在为路易吉·皮兰德娄的戏剧《混合》进行排练。排练被六个人的到来打断，他们坚称自己不是真人，而是寻找故事来出演的角色。当导演和正在排练的演员们开始构思并表演一出基于这六个角色的戏剧时，这六个角色感到不满并引发了争论；角色们想在自己的故事中扮演自己。随着戏剧的继续，事实与虚构之间的界限崩溃了：讽刺的是，这一切当然都是虚构的，因为它是一出戏。在某个时刻，两位演员就戏剧的真实性展开了争论。


    尽管皮兰德娄的作品早于“荒诞派戏剧”这一术语的提出——该术语由马丁·埃斯林在其著作《荒诞派戏剧》（1961）中首创——但他的戏剧可以被认定为荒诞派戏剧。荒诞派戏剧深受存在主义，特别是阿尔贝·加缪和让-保罗·萨特作品的影响，旨在直面一个在上帝缺席下毫无意义的世界。为此，它摒弃了任何戏剧性地呈现有意义现实的尝试；它偏爱不合逻辑的场景和漫无目的的角色。荒诞派戏剧拥抱语言传达意义的失败，不仅强调艺术再现现实的失败，还质疑是否真的存在一个可以被再现的现实。在讨论皮兰德娄时，马尔科姆·布拉德伯里评论了这种对不真实性的凸显，并指出它对后来发展的戏剧产生的影响，包括贝克特和品特的作品（布拉德伯里
    1989: 207）。


    转向贝克特和品特，我们可以在他们的作品中看到相似的主题和用于表达这些主题的相似策略。此外，即使在这一点上不进行任何实际分析，我们也能看到皮兰德娄作品中预示了后来被称为“巨蟒式”风格的特征。关于贝克特，我们可能不认为他是一个特别有趣的作家，但一种作为对荒诞性的回应和承认的喜剧脉搏贯穿于他的作品。彼得·查尔兹在讨论他的小说《墨菲》（1938）时指出，幽默被用作一种机制，通过它来表达其深刻的哲学关切（查尔兹
    2008: 7–8）。在这里，我们可以看到与皮兰德娄所采用的相似的思想和策略，但也看到了将成为巨蟒式风格标志的修辞手法。查尔兹还观察到，这部小说还运用了突兀的喜剧暴力和粗俗幽默，这在“高雅”文学中可能显得格格不入：


    墨菲最终从他的欲望中解脱出来，当他坐在摇椅上时，煤气泄漏被点燃，墨菲最终在一声最终的“巨响”中获得了他一直寻求的湮灭。……《墨菲》是一部非常有趣但极其悲观的小说，墨菲[原文如此]要求将他烧焦的遗骨冲进都柏林阿比剧院的马桶，“他们最快乐的时光就是在那里度过的”，这是完全合适的。对于贝克特的讽刺感和徒劳感来说，它们实际上会在伦敦一家酒吧的斗殴中被撒在地板上，这是合适的。（同上：12）


    这种运用直白、突然的暴力来制造喜剧效果，以及对厕所等的提及，在巨蟒剧团中变得司空见惯。在《飞行马戏团》中，那个象征性地踩扁喜剧片段的动画大脚就是这种喜剧暴力的典范例证，而该剧最喜欢兴高采烈地投入那些幽默完全源于其粗俗的常规表演。这在第39集（“Grandstand”）的一个短动画序列中得到了最好的说明，其中一位上流社会的女士礼貌地告退以便“补个妆”。这位女士进入洗手间，从关着的门后，我们听到她大声而剧烈地排便。重要的是，我们在贝克特和巨蟒剧团中看到的是“高雅”与“低俗”、粗俗喜剧与哲学、暴力与荒谬的融合与并置。然而，至少在贝克特那里，这并非无动机的不成熟，而是他试图产生效果的一种手段。W·D·豪沃思在贝克特戏剧中注意到的这种矛盾风格的混合，旨在扰乱和启发观众，以表达其关注点的目的：“人们可能将塞缪尔·贝克特的杰作《等待戈多》（1953）归入哪一类——这部戏剧，尽管充满了喜剧性的对白，却提供了对人类状况最深刻的反思？”（豪沃思
    1978: 121）。


    乔治·布兰特认为，这种忧郁与喜剧的融合在哈罗德·品特的戏剧中也很明显，他强调这些戏剧被描述为“威胁喜剧”（布兰特 1978: 172）。布兰特观察到品特与贝克特和其他荒诞派作家在运用幽默方面的相似之处：


    > 品特经常让一句忧郁的台词听起来像个笑话。因此，在独幕剧《送菜升降机》（1959）中——其情节被比作一个缺少最后一卷的希区柯克故事——两个小杀手本和格斯正在一家前餐厅的地下室里等待执行一次合同杀人。情况已经足够黑暗了；但在戏剧上，两个杀手之间为争夺主导权而进行的斗争——结果是一场生死斗争——却显得很有趣。他们琐碎的闲聊与他们致命的任务形成了鲜明的对比；他们激烈地争吵应该说“点煤气”还是“点水壶”。（同上：172）


    到目前为止，我相信我们已经确立了像贝克特和品特这样的荒诞派剧作家与《蒙提·派森的飞行马戏团》之间存在显著的相似之处；然而，我本质上所做的不过是描述它们“彼此有点像”。为了进一步推进这项研究，至关重要的是要强调布兰特上面的陈述不仅凸显了品特（巨蟒剧团也共享）的黑色喜剧和险恶幽默，也凸显了其平凡性。


    尽管对巨蟒剧团的讨论经常提到该剧的荒诞性、怪异性和偶尔的暴力，但我们也必须认识到，其短剧和动画序列经常借鉴熟悉、琐碎和平凡的事物。巨蟒剧团的喜剧通过将荒谬与平庸并置而得到加强。“婚姻指导顾问”短剧（第2集，“性与暴力”）的幽默不仅来自于向我们展示一位婚姻指导顾问在她的丈夫面前引诱一位女性客户，也来自于她的丈夫（由帕林饰演）沉闷乏味且令人厌倦的平凡。“如何从相当远的地方辨认不同类型的树木”（第3集，“如何从相当远的地方辨认不同类型的树木”）是一个贯穿半小时节目的序列，其中一张树木的幻灯片照片反复呈现给观众，伴随着约翰·克里斯的声音毫无感情地吟诵“落叶松。落叶松”。很难解释如此沉闷且表面上毫无幽默感的东西怎么会有趣，然而这个序列在巨蟒剧团粉丝中已成为一个著名的经典。在这种将怪异与平凡并置，或者也许是在凸显平凡的怪异性中，巨蟒剧团展示了不仅受荒诞主义，也受超现实主义的影响。


    超现实主义是一个已被接受为奇怪、怪异或古怪同义词的术语，因此在此时识别超现实主义在艺术中的实际含义或许是有用的。尽管超现实主义与荒诞主义一样凸显了怪异和奇异，并且在表面上“看起来”像荒诞主义，但超现实主义的精神却大不相同。荒诞主义源于存在主义，主要是虚无主义的，而超现实主义则发展自精神分析。对于超现实主义者来说，凸显怪异并非意在否认现实的存在，而是为了确认现实的存在——尽管它是主观构建的——并且它不仅可以被触及，还可以通过使用奇异的图像以及将熟悉与不熟悉并置，或将熟悉置于不熟悉的环境中而被揭示为非凡。本质上，超现实主义者的使命不是为了怪异本身而颂扬怪异，也不是为了贬低或否认现实，而是为了证明“真实”和平凡的——如果重新审视——是非凡的（查尔兹
    2008: 125–7）。我认为，这一区别对于理解巨蟒剧团作为一个现象至关重要。


    我们还必须承认，荒诞主义和超现实主义的影响并非仅影响了巨蟒剧团。在整个20世纪60年代，甚至一直到70年代，'
