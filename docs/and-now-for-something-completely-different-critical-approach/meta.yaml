  md: 'While the comedy of the sketch is dependent upon the linguistic playfulness
    and absurdity of the two participants’ responses, coupled with the contradiction
    of Cleese’s strained exasperation and Palin’s cunning benignity, it is also important
    that the sketch is about a parrot. Indeed, in outlining the development of the
    sketch, Cleese has stated that it began as being about a shifty car salesman,
    before he and his co-writer (Graham Chapman) thought such a setting not inventive
    enough. When it was decided a pet shop would instead be more productive, the next
    step was to decide upon the animal being returned:


    > What animal, then? A cat? No, dead kitties are not funny. A mouse? Wouldn’t
    work: too small, and too vulnerable. Something big? A dog? Could work, but people
    are fond of dogs. Imagine banging a dead dog against a counter to wake it up –
    you could get lynched. A parrot . . . ? Yes! Nobody’s going to get upset about
    the death of a cartoon creature like a parrot – except, perhaps, its owner . .
    . (Quoted in Lockett 2014)


    While revealing an interesting insight into the decidedly mechanical nature of
    the creative process, Cleese’s recollection also indicates an awareness of the
    sociocultural meanings of a variety of animal species. That a cat would not be
    funny, that a mouse is ‘too vulnerable’, that a sketch about a dead dog raises
    fears of lynching, points to the differing meanings contemporary Western television
    audiences assign to an array of animals. Furthermore, this process indicates the
    particular relationships that exist between comedy and animals, whereby the use
    of non-humans for humorous purposes – especially if those animals are dead – is
    socially regulated in terms of offence. The funniness of the sketch is therefore
    dependent on picking the right animal, and the right animal is dependent upon
    cultural connotations of the selected non-human, both within society as a whole
    and in comedy in particular. In order to delineate the functions to which comedy
    can put animals, this chapter examines the use of animals in the output of the
    Monty Python team to delineate the humorous functions animals can and cannot play
    within the kinds of comedy they produce. It works from the assumption that the
    purposes to which humans put animals reveal something significant about human–animal
    relations; furthermore, that when those purposes are – as here – comic, they help
    highlight those assumptions and, in some places, interrogate them. Indeed, some
    of the comedy in Monty Python works precisely by refusing to conform to standards
    of broadcasting decency which, for ‘the parrot sketch’, meant that fears of lynching
    result in the impossibility of ‘the dead dog sketch’. By this account, comedy
    is a useful mode for thinking through the complex and contradictory understandings
    humans have of animals, especially given that it is precisely those complications
    that humour can draw upon so productively for its matter.'
