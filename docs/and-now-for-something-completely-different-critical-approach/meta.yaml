    more anarchic work of Tex Avery (binocular lens bulging out like Avery’s trademark
    bug-out eyes) and Bob Clampett (Eggs Diamond, the gangster crossed with a hen,
    echoing Clampett’s mixed-media figures), much of Gilliam’s work had different
    reference points and, consequently, repositioned the nature of the joke. The ‘midway’
    experience for those familiar with cartoons, then, is in the first instance the
    broad recognition that these are *not* Disney cartoons, but unless there is a
    greater familiarity with the Warner Bros. output, there is also probably less
    of an understanding that Gilliam’s work, at the very least, shares its urbanity
    and its self-conscious address of adults. Familiarity with the work of Jan Svankmajer
    or Karel Zeman might also offer clues to the European animation sources in Gilliam’s
    aesthetic, most notably in its preoccupations with the grotesque, the corporeal
    and foregrounded fantastical artifice. Satire, of course, invites the pleasures
    of such decoding and, in Gilliam’s case, there is a certain relish in exploring
    the physiological and erotic as a mode of deformation and difference, pointing
    to more counterculture or ‘under the counter’ sources. Crucially, though, if these
    idioms were to fully reach a new audience while brokering the ‘midway’, it would
    necessarily have to speak to mediated experience – the very act of looking and
    seeing in understanding contemporary visual culture. As such, Gilliam looks to
    contemporary advertising to reach an audience versed in watching television, and
    the visual iconography of the Grand Masters of art to reach the middle-class intellectuals
    that the Python team most resembled and spoke to.


