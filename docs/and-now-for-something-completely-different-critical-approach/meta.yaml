    eaten. And so the sketch signals how animals function as objects to be consumed
    by humans, their status as living beings rendered absent through ‘mechanisms of
    erasure and alienation’ (Stibbe 2012: 3) that normalise animals as food.


    # Pets: The Cat


    Another category that cultures place animals into is that of pets. The anger of
    Cleese’s character in the ‘dead parrot sketch’ arises less because the animal
    is dead, and more because its lack of life means that it cannot function as a
    pet in a manner promised by the financial transaction that led to his ownership
    of it. As such, it is significant that the sketch is in a pet shop, for a skit
    about a dead parrot in the wild would necessarily work quite differently. It is
    the shopkeeper’s failure to supply a product that fulfils its purpose that motivates
    the initial anger of Cleese’s character, and the shopkeeper’s subsequent disregard
    for the conventions of dealing with complaining customers that enables the sketch
    to continue. The scene therefore relies on cultural understandings of pets, and
    the capitalist structures that enable animals to be bought and sold. That the
    sketch’s initial setting was a car shop, which was later changed to a pet shop,
    shows how within these terms an animal is understood as interchangeable with a
    vehicle. The ‘logic of the absurd’ that the sketch relies on, then, is one that
    does not query the notion that animals can be bought and kept as pets; in presenting
    the collapse of this transaction as comic it upholds the notion of animals as
    objects.


    After all, ‘[i]t is by “disavowing” animals that we construct ourselves [as humans]’
    (Fudge 2008: 7). That is, categorising animals as objects to be bought and sold
    powerfully distinguishes them from humans, who are commonly not understood as
    objects in this way. It is through placing animals within regimes of financial
    transaction that ‘man [sic] instils or claims in a single stroke *his property
    . . . and his superiority* over what is called animal life’ (Derrida 2008 [2006]:
    20). Human cultures have had to work hard in order to assert and normalise this
    superiority, and the boundaries between the human and the non-human have not always
    been stable, as the history of slavery attests (Spiegel 1988). While humans have
    always interacted with other beings, the idea of keeping animals as pets – rather
    than as livestock or hunting partners – became widespread in the UK only in ‘the
    mid-nineteenth century, [when] a positive cult of pet keeping arose in Victorian
    society’ (Fagan 2015: 259). The movement of animals into the home as pets over
    the last couple of centuries has coincided with humans having fewer interactions
    with other beings as wildlife or livestock. This means that ‘[e]verywhere animals
    disappear’ (Berger 2009: 36), to be replaced by representations of animals in
    cultural forms such as art or wildlife documentaries. Alongside these, animals
    continue to live alongside humans within the interaction of pet-keeping, a human–animal
    relationship whose norms something like the ‘dead parrot sketch’ can rely on for
    its humour.'
  - '[PAGE 154]


    Important in these human–animal relations is that ‘pets exist for human pleasure
    and convenience. Fond as owners are of their animals, they do not hesitate to
    get rid of them when they prove inconvenient’ (Tuan 1984: 88). The activity of
    pet-keeping is one whose primary driver is the desire of the human, and it is
    not a relationship that an animal enters into through choice. While it is certainly
    the case that pet-owners attend to their pets’ needs, these must function within
    the dominant needs of the human. As such pet-keeping can be seen to evidence a
    ‘psychology of dominance and affection’ (ibid.: 167) by which humans justify the
    dominance over animals they choose to keep in their homes via displays of affection.
    And that dominance is most evident in that ‘English law views animals simply as
    the property of human owners, only trivially different from less mobile goods’
    (Ritvo 1987: 2). The transformation of other living beings into property establishes
    a hierarchical power relationship normalised and enacted by pet-keeping.


    The failure of that power relationship can function as the incongruity that comedy
    exploits. So, in the sketch ‘confuse-a-cat’, a suburban couple peer worriedly
    out of the living room window at the cat sitting motionless on their lawn. A vet
    arrives, and it transpires that the couple have sought the medical expert’s help
    because the cat, as the wife explains, ‘Doesn’t do anything. He just sits out
    there on the lawn.’ The vet goes on to diagnose the cat as exhibiting ‘[t]otal
    physical inertia. Absence of interest in its ambience . . . Failure to respond
    to conventional external stimuli . . . To be blunt, your cat is in a rut’. The
    couple react fearfully, and the vet continues: ‘It’s the old stockbroker syndrome.
    The suburban fin de siècle ennui.’ His prescription is to call the company Confuse-A-Cat
    Ltd, who arrive in a large van from which several white-coated performers emerge.
    They are managed by an army general, who orders them to build a stage in the couple’s
    garden, directly in the eye-line of the cat. Once it’s built they perform a sequence
    of nonsensical and non-realist tableaux, in which boxers, a policeman, Napoleon
    and a penguin on a pogo stick interact. Editing means that characters vanish in
    a moment, and reappear elsewhere. The performance ends with the actors taking
    a curtain call, and the couple and the army general turn their attention to the
    cat. The cat slowly gets up, walks past the humans and into the house. The couple
    enthusiastically thank the general, who modestly notes that they were simply doing
    their job. Captions on-screen then state that Confuse-A-Cat Ltd is associated
    with other animal-startling companies, such as Amaze-A-Vole, Puzzle-A-Puma and
    Bewilderbeest. This is overlaid with rousing military music, as the general looks
    determinedly into the middle distance.


    The sketch’s comedy relies on the idea that to make such an effort in order to
    solve the problem of a cat not doing much is absurd. This is evident in the performance
    style that runs throughout, in which Graham Chapman’s vet and John Cleese’s general
    deliver their lines in excessive earnest. It is also captured in the suburban
    couple’s worrying, in which Terry Jones and Michael Palin clutch'
- md: 'at each other as if receiving devastating news. This is significant in that
    it means the narrative is rendered comprehensible because of the humans’ interpretation
    of the cat’s behaviour. The couple’s concern arises because the cat is failing
    to behave as is required in a pet-keeping household. While the vet’s diagnosis
    blames the couple for their failure to confuse and excite the cat as required
    by responsible owners, the cat’s behaviour is a problem for those owners rather
    than the cat itself. There is nothing in the sketch that suggests the cat itself
    finds its situation to be a problem. Indeed, it is precisely the humans’ overreaction
    that constitutes some of the comic meat. But it also means that the sketch re-enacts
    the idea that animals are meaningful only inasmuch as they conform to humans’
    expectations of them. It is because the couple cannot interpret their cat’s behaviour
    that they call the vet; it is they who have the problem. Solving the cat – via
    an absurd theatrical performance – is actually about solving the couple’s problems
    within the human–animal relationship. It is they who are grateful at the end of
    the sequence, because the cat no longer troubles the pet-keeping norm. Important
    here is that the cat is perceived to respond appropriately to human stimuli, and
    thus the idea that a cat (or any other pet) should be objectified by human activity
    constitutes the resolution to the problem the sketch dramatises. This evidences
    this interplay of dominance and affection, where the couple believe they have
    demonstrated their affection by getting help for their cat, but the outcome that
    resolves the problem is one that reassures humans’ dominance over other species.
    Thus ‘[p]ets can support a hierarchy that reassures us [humans] of our status
    in the world’ (Fudge 2008: 21), where that status is one in which a pet is knowable
    and controllable.


    Like the parrot and the albatross, the cultural conceptualisations of particular
    species is important to the comedy in this sketch. While there are a number of
    animals that are commonly kept as pets in the UK, this sketch relies on the cat-ness
    of this cat. Cats are contradictory animals, bringing the ‘inaccessible, unrestrained,
    wild’ (Lorenz 2002 [1949]: 162) attributes of non-humans into the home in a way
    that helps reassert the controlled human-ness of the domestic space. So this wildness
    is


    > also the very reason why the cat is so ‘homely’, for somebody or something can
    only be ‘at home’ whose profession lies outside; and the purring cat on the hearth
    betokens for me the symbol of homeliness just because he is not my prisoner but
    an independent being of almost equal status who happens to live in the same house
    that I do. (Ibid.)


    Cats are pets that are not conceived of as enthusiastically interacting with their
    human cohabitees in the way dogs do. The ‘confuse-a-cat’ sketch draws on this,
    for there is an incongruity in worrying about a cat behaving distantly, given
    that that is what cats are understood to do. A sketch about a dog with ‘suburban
    fin de siècle ennui’ would work quite differently, for a dog sitting in a garden
    distractedly staring into space would be understood as genuinely problematic and
    of concern. Furthermore, a dog failing to react to the theatrical performance
    presented to it would similarly have a different meaning to this cat doing the
    same. It is significant that while the sketch ends with a list of companies who
    engage in the activity of confusing other species, this is not behaviour that
    is enacted with the sketch. A sketch about ‘Amaze-A-Vole’ would not function in
    the same way, partly because voles are not typical domestic animals, but mainly
    because it is not a species for which human cultures have defined expectations,
    and thus there is little for the ‘logic of the absurd’ to draw upon. The jokes
    here are far more about the wordplay that extrapolates the linguistic structure
    of ‘confuse-a-cat’ and applies it to other animals, alongside the absurdity of
    there being so many companies engaging in similarly redundant activity. This is
    one of the ways in which animals ‘disappear’ (Berger 2009: 36), becoming nothing
    other than species able to be employed in a comic list.


    But the bored cat is instead depicted, and in its behaviour it could be read as
    comically troubling the structures of ‘affection and dominance’ that pets are
    ensnared in. It is in refusing to be active, and in troubling its owners’ expectations
    of it, that it actually engages in a form of agency. The comedy of the sketch
    arises because it disturbs the human–animal interaction by evidencing that a cat
    has a subjectivity, even if that subjectivity results in it doing nothing. Indeed,
    the power of that subjectivity is most acute in the cat’s inactivity, given that
    pets’ continued status as domestic animals is dependent on their engaging in behaviour
    deemed acceptable and pleasurable to humans. It refuses to be a pet, and is instead
    a cat: the Confuse-A-Cat company returns it to a pet. Or, more accurately, given
    that it is impossible to know whether the cat’s eventual movement is a consequence
    of the performance in front of it or merely a coincidence, Confuse-A-Cat instead
    offers the cat’s owners the possibility that they have regained mastery over the
    animal in their house. What constitutes a narrative resolution here is the reassertion
    of ‘status’ (Fudge 2008: 21) for the humans, which shows how this comic sketch
    relies on the normalised idea of human–animal hierarchies for its humour. So,
    while the sequence might lampoon fretting pet-owners, and depict cats as having
    agency, its narrative structure – and therefore comic success – relies on unquestioned
    notions of the human domination of animals as pets. It is this contradictory nature
    – in which the narrative appears to offer quite a different reading to the comic
    moments – that renders comedy such a difficult mode to make sense of.


    ## CONCLUSION: ANIMALS AND COMEDY


    This difficulty, though, is one that does not negate the humour’s reliance on
    cultural understandings of humans and animals for its potency. In ‘confuse-a-cat’,
    the notion of animals as pets is not troubled, even if the sketch relies on the
    idea that suburbia might be a boring place for a cat. The humour concerns the
    excessive techniques used to re-enthuse the cat; there are no jokes that trouble
    the idea that cats can be the property of humans, or that trouble the concept
    of ‘cat’ in the first place. This is made explicit in the ‘dead parrot sketch’,
    in which the humour is dependent upon a failure of the successful commercial transaction
    expected in a pet shop; Cleese’s character asserts his right to own a parrot,
    and this assertion is not critiqued by the sketch. Similarly, while the ‘albatross’
    sketch finds humour in the ‘wrong’ kind of animal being offered for consumption,
    this ‘wrong-ness’ is reliant upon the idea that there are ‘right’ animal-related
    foodstuffs to be offered for consumption in a cinema.


    These are sketches, then, in which human characters assert their right to have
    particular relationships with animals, and this relationship is one centred on
    concepts of ownership, particularly via commercial transactions. In all the sketches,
    the comedy arises from the failure of successful commercial, transactional activity,
    with the animals merely objects that enable that failure to be explicit. The specificity
    of their animal-ness – whether as members of species, or as individuals – is absent,
    and they function merely as signifiers of the expected norms of human dominance
    over animals. There are other sketches, though, which might suggest a depiction
    of animal agency. For example, both the killer rabbit of Caerbannog and the gorilla
    librarian depict specific, individualised animals whose agency is precisely the
    meat of the comedy. However, still what the comedy offers here is an incongruity
    between expected animal behaviour and that which the sketch depicts. More importantly,
    though, this incongruity is depicted in a manner that situates the viewing audience
    as aligned with the human characters in the sketch. It is the human characters’
    reactions to the actions of the rabbit and the gorilla that offers the ‘empowered
    gaze’ in which ‘the practice of looking is at the heart of both our sympathy for
    and our oppression of the animal’ (Baker 2001: 15). So, while such sketches might
    be seen to offer up ‘the dance of relating’ (Haraway 2008: 25) that animal advocacy
    supporters argue is necessary in order for more morally appropriate human–animal
    relations to come into being, they do so within contexts that are human-centric.
    After all, the comic nature of this material is made for human consumption, and
    so must align with communicative strategies that are comprehensible for that audience.
    While Marcia Landy might argue that the animal-related comedy seen in sketches
    such as those outlined above are forms of ‘unpredictable transformation’ indicative
    of a troubling of ‘assumptions about human uniqueness and rationality’ (Landy
    2005: 63), the only cultural strategy on offer for this activity is a human-centric
    one. That the comedy’s offering up of the absurd logic of human–animal relations
    might be seen to critique that ‘uniqueness and rationality’, it can do so only
    via discourses that construct the viewer as avowedly rational, with that rationality
    enacted via the process of reading these sketches as funny.'
  mdcn: '他们面面相觑，仿佛听到了毁灭性的消息。这一点很重要，因为它意味着叙事之所以变得可理解，是因为人类对猫的行为进行了诠释。这对夫妇的担忧源于这只猫未能表现出养宠物家庭所要求的行为。虽然兽医的诊断指责这对夫妇未能按照负责任主人的要求去迷惑和刺激这只猫，但猫的行为对这些主人来说是个问题，而非猫本身的问题。小品中没有任何迹象表明猫自己觉得它的处境是个问题。事实上，正是人类的过度反应构成了部分喜剧素材。但这也意味着，该小品重演了这样一个观念：动物只有在符合人类对它们的期望时才有意义。正是因为这对夫妇无法解读他们猫的行为，他们才打电话给兽医；有问题的是他们。解决这只猫——通过一场荒诞的戏剧表演——实际上是为了解决这对夫妇在人与动物关系中的问题。在片段结束时，感激的是他们，因为猫不再困扰养宠物的规范。这里重要的是，猫被认为对人类刺激做出了恰当的回应，因此，猫（或任何其他宠物）应被人活动所客体化的观念，构成了该小品所戏剧化问题的解决方案。这证明了支配与情感之间的相互作用，这对夫妇相信他们通过为猫寻求帮助表达了他们的爱，但解决问题的结果却让人安心于人类对其他物种的支配地位。因此，“宠物可以支持一种等级制度，让我们（人类）安心于自己在世界上的地位”（Fudge
    2008: 21），在这种地位中，宠物是可知且可控的。


    与鹦鹉和信天翁一样，特定物种的文化概念化对于这个小品中的喜剧效果很重要。虽然在英国有许多动物通常被当作宠物饲养，但这个小品依赖于这只猫的猫性。猫是矛盾的动物，它们将非人类的“难以接近、不受约束、野性”（Lorenz
    2002 [1949]: 162）属性带入家庭，以一种有助于重新确立受控的人类性的方式。因此，这种野性


    > 也正是猫如此“居家”的原因，因为只有职业在外部的人或事物才能“在家”；壁炉上打呼噜的猫对我来说正是居家的象征，因为它不是我的囚徒，而是一个几乎平等地位的独立存在，碰巧和我住在同一所房子里。（同上）


    猫是宠物，但不像狗那样被认为会热情地与人类同居者互动。“迷惑猫”小品利用了这一点，因为担心猫表现得疏远是不协调的，毕竟人们理解猫就是这样的。一个关于患有“郊区世纪末倦怠症”的狗的小品效果会大不相同，因为一只坐在花园里心不在焉地凝视远方的狗会被理解为真正有问题且令人担忧。此外，一只未能对呈现给它的戏剧表演做出反应的狗，与这只猫做同样的事情相比，也会有不同的意义。值得注意的是，虽然小品以一系列从事迷惑其他物种活动的公司名单结束，但这种行为并未在小品中上演。一个关于“惊吓田鼠”的小品不会以同样的方式发挥作用，部分原因是田鼠不是典型的家养动物，但主要是因为人类文化没有为这个物种定义期望，因此“荒诞逻辑”几乎无从借鉴。这里的笑话更多是关于文字游戏，它推导出“迷惑猫”的语言结构并将其应用于其他动物，以及荒谬的是有如此多的公司从事类似的冗余活动。这是动物“消失”（Berger
    2009: 36）的方式之一，它们变成了仅仅能在喜剧名单中被使用的物种。


    但无聊的猫却被描绘出来，在其行为中，它可以被解读为以喜剧的方式困扰着宠物所陷入的“情感与支配”结构。正是通过拒绝活跃，以及困扰主人对它的期望，它实际上参与了一种能动性。小品的喜剧效果源于它扰乱了人与动物的互动，证明了猫具有主体性，即使这种主体性导致它无所作为。事实上，这种主体性的力量在猫的不活跃中最为明显，因为宠物作为家养动物的持续地位取决于它们从事被认为对人类可接受和愉悦的行为。它拒绝成为宠物，而是一只猫：“迷惑猫”公司将其变回了宠物。或者，更准确地说，鉴于无法知道猫最终的移动是面前表演的结果还是仅仅是巧合，“迷惑猫”公司反而向猫的主人提供了他们重新掌控家中动物的可能性。这里构成叙事结局的是人类“地位”（Fudge
    2008: 21）的重新确立，这表明这个喜剧小品如何依赖于人类-动物等级制度的规范化观念来获得其幽默感。因此，虽然这个片段可能嘲讽了焦虑的宠物主人，并将猫描绘成具有能动性，但其叙事结构——因此也是喜剧成功——依赖于对人类作为宠物支配动物的毋庸置疑的观念。正是这种矛盾的本质——叙事似乎提供了与喜剧时刻截然不同的解读——使得喜剧成为一种难以理解的模式。


    ## 结论：动物与喜剧


    然而，这种困难并不否定幽默依赖于对人类和动物的文化理解来获得其效力。在“迷惑猫”中，动物作为宠物的概念并未受到困扰，即使该小品依赖于郊区对猫来说可能是个无聊地方的观念。幽默涉及用于重新激发猫兴趣的过度技巧；没有笑话困扰猫可以成为人类财产的观念，或者困扰“猫”这个概念本身。这在“死鹦鹉小品”中得到了明确体现，其中的幽默依赖于宠物店预期成功商业交易的失败；克莱斯的角色主张他拥有一只鹦鹉的权利，而这一主张并未受到小品的批判。同样，虽然“信天翁”小品在提供错误的动物供消费中找到了幽默，但这种“错误”依赖于在电影院提供“正确”的与动物相关的食品供消费的观念。


    因此，这些小品中，人类角色主张他们与动物建立特定关系的权利，这种关系以所有权概念为中心，特别是通过商业交易。在所有小品中，喜剧源于成功的商业交易活动的失败，动物仅仅是使这种失败显而易见的物体。它们作为物种成员或个体的动物特异性缺失了，它们仅仅作为人类支配动物的预期规范的能指而发挥作用。然而，还有其他小品可能暗示对动物能动性的描绘。例如，凯尔班诺格的杀手兔和大猩猩图书管理员都描绘了具体的、个性化的动物，它们的能动性正是喜剧的素材。然而，喜剧在这里提供的仍然是预期动物行为与小品所描绘行为之间的不协调。更重要的是，这种不协调的描绘方式将观看观众置于与小品中人类角色一致的位置。正是人类角色对兔子和大猩猩行为的反应提供了“赋权的凝视”，其中“观看的实践是我们对动物的同情和压迫的核心”（Baker
    2001: 15）。因此，虽然这样的小品可能被视为提供了动物倡导者认为对于建立更符合道德的人类-动物关系所必需的“关联之舞”（Haraway 2008: 25），但它们是在以人类为中心的背景下做到这一点的。毕竟，这种材料的喜剧性质是为人类消费而制作的，因此必须与该受众可理解的交流策略保持一致。虽然玛西亚·兰迪可能认为上述小品中看到的与动物相关的喜剧是“不可预测的转变”形式，表明了对“人类独特性和理性假设的困扰”（Landy
    2005: 63），但为这种活动提供的唯一文化策略是以人类为中心的。喜剧对人与动物关系荒诞逻辑的呈现可能被视为批判了那种“独特性和理性”，但它只能通过将观众构建为明确理性的论述来实现，而这种理性是通过将这些小品解读为有趣的过程来实施的。'
