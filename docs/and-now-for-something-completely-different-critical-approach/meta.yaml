    emphasis is therefore on *historicising Python’s comedy and its impact*, tracing
    its meanings from a range of social, cultural, national and transnational perspectives,
    and focusing, in an unprecedented manner, on these questions from the perspectives
    not only of form, theme and representation but also production and creative practice
