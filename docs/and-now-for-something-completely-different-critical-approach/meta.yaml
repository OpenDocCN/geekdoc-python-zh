    of life, and death. We cannot escape the inevitability and the contingency of
    death, but it is possible to refuse its psychological stranglehold on life and,
    unlike death, the social class system is not inevitable. The class system and
    forms of social hierarchy are no more than embedded human constructions, as are
    all forms of differentiation, including gendered, religious and racial Othering,
    systems in which the Other once constructed can be abjected, persecuted, destroyed
    (Kristeva 1988). Dehumanisation is fostered in a view of life as composed of hierarchies
    of worth and human rights (or their lack). There is then, I would argue, in this
    undermining and exposure, an underlying value of free choice, of equality and
    social justice running through the work of Monty Python, as well as manic humour
    and a lot of old-fashioned bawdiness.


    These are the (historically originated and existential) bases of Monty Python’s
    satire, but it is also a particular form of British irreverence to anything established
    and unable to see its own temporary nature, its instability and its self-aggrandising
    folly. The Pythons can poke fun at the odd responses of working-class gasmen in
    identical brown coats, queuing down a working-class street, unable to fix a gas
    cooker (‘New Cooker’ sketch, 1970), at unionised labourers in overalls, and mothers
    (Pythons in drag) having tea parties – any role and level. However, they reserve
    their cruellest and most absurd satire for the upper classes, universally seen
    as (sometimes dangerous) inbred twits. These arrogant, entitled twits are defused,
    shown as having no right to any more rights than anyone else. Human constructed
    symbols are also exposed as just that – symbols, proxies and replicas of an undiscoverable
    real. Upsetting and debunking an artificial order is the job of carnival, and
    its very British sister, pantomime.


    # CARNIVAL AND BAKHTIN


    At the roots of Monty Python’s work lie multiple expressions of unease: satire,
    black comedy through to farce, and Gothic horror. Some influences on the Pythons’
    humour derive from a long-standing tradition of farce and slapstick, common in
    popular culture, and a version of carnivalesque (Bakhtin, 1895–1975), which Bakhtin
    developed in *Rabelais and His World* (1965). Carnivalesque defined moments of
    temporarily licensed behaviours challenging capital and power, mocking and overturning
    authority. In the space of carnival, as in *Twelfth Night* (Shakespeare, 1623)
    and traditional Trinidadian carnival times (Earl Lovelace’s *The Dragon Can’t
    Dance*, 1979), it is possible to expose the pomposities and control of the ruling
    classes, bureaucracies, belief systems and hierarchies of power, as they affect
    everything and everyone. A major butt of carnival is social hierarchy, birthright,
    inheritance, entitlement and social position. Social and ontological freedom explodes,
    liberating behaviour and puncturing myths and narratives concerning birth, money,
    power, gender, ethnicity; overturned are symbols of status, and the'
