    接下来，将考察巨蟒剧团及其与战后青年震荡的特定关系。战后青年文化的新角色及其对摇滚乐作为“文化与代际表达手段”（Caine 2004: 97）的热切拥抱，引起了父辈一代和文化精英的不同反应，他们担心道德价值观和文化标准会出现显著且可能不可逆转的下降。将青年描绘为社会问题，部分也源于媒体对所谓青少年不良行为和暴力爆发（如1958年诺丁山种族骚乱、1950年代泰迪男孩的暴力行为，或1964年夏天海滨摩斯族与摇滚族的冲突）的夸大报道。围绕青少年不良行为的道德恐慌，早在十年前就在美国达到顶峰，因为“好莱坞制作法典的逐渐放松和独立电影制作的增长，将一系列公开探索性、犯罪和毒品使用等禁忌主题的美国电影推到了前台”（Biltereyst
    2007: 9）。特别是《飞车党》、《无因的反叛》（尼古拉斯·雷，1955年）和《黑板丛林》（理查德·布鲁克斯，1955年）“直接面对了战后年轻人的犯罪和帮派生活问题，开启了通常被称为青少年不良行为电影的青少年剥削电影周期（Gilbert,
    178–195; Doherty, 1–18; Shary 2002, 82）”（Biltereyst 2007: 9）。例如，《飞车党》甚至“在战后的英国被认为风险太大，不适合普遍发行，并被英国电影审查委员会禁映，直到1967年”（Tebbutt
    2016: 98）。


    对“地狱老奶奶”小品（第8集“完全正面裸体”）的细读，旨在展示《飞行马戏团》系列如何涉及与青年文化、青少年不良行为以及反文化相关的不同方面。例如，围绕青少年不良行为的道德恐慌在该小品中被公开戏仿。它以一个唤起厨房水槽氛围的镜头开始，展现了博尔顿（大曼彻斯特）一个荒凉的地区，新闻播报员（艾瑞克·爱德）的画外音将这座北方城市介绍为一个“受惊的”地方，被“一种正在恐吓城市的新暴力的恐惧”所困扰。随后，两个年轻人（由查普曼和琼斯饰演）出现，他们穿着卷边牛仔裤——像《飞车党》中的马龙·白兰度——和短夹克，具有亚文化装扮。不久之后，观众的期望被一个突然引入的叙事转折所颠覆：一群发出尖锐刻薄咯咯笑声的咄咄逼人的老妇人从树后出现，开始攻击这两个男人，同时画外音宣布：“是的，一群老妇人正在攻击手无寸铁的年轻人。”随后，这些全身黑衣的老妇人继续在街上游荡，反复推开或攻击其他人。非常短暂地，播放了《霹雳弹》（特伦斯·杨，1965年）中著名的007主题曲，以嘲弄地强调她们“威胁性”的举止。更具讽刺意味的是，采访了两个显然受惊的皮衣摩托车手（琼斯和克莱斯）：他们声称在老妇人出现之前这里很安静，现在简直不敢出门了。这是对围绕摩托车帮派的陈词滥调式道德恐慌的讽刺性反转。摩托车手现象在1960年代的美国电影中尤为突出，包括罗杰·科曼的《野帮伙》（1966年）、理查德·拉什的《地狱天使在飞驰》、安东尼·M·兰扎的《荣耀踏步者》（均为1967年）以及丹尼斯·霍珀的《逍遥骑士》（1969年）。一个著名的英国例子是邪典恐怖/摩托车手电影《精神病》（唐·夏普，1973年），它讽刺性且戏谑地将美国剥削性摩托车手电影中描绘的对终极混乱和破坏的渴望，与英国的神秘主义和异教、一个恶魔般的管家形象以及乡村背景融合在一起。


    该小品进一步概括了1950年代围绕青少年不良行为的道德恐慌氛围，以及其在1960年代的进一步发展。这些，在本例中是“衰老的”不良分子，被轻蔑地描述为“老流氓”和“蕾丝边的懒汉”，他们喜欢攻击电话亭，无耻地在墙上涂写命令式标语（“要喝茶，不要做爱”），并且——根据一位恼怒的警察（查普曼）的说法——通常只会制造恶作剧，尤其是在养老金发放日，他们立刻“把钱全花在牛奶、面包、茶上”。他们也倾向于在下午2点的日场放映期间表现得咄咄逼人，尤其是在放映《音乐之声》（罗伯特·怀斯，1965年）时。“地狱老奶奶”开始了一场讽刺性的游戏，玩弄关于当时青年文化和1960年代反文化的神话。“要喝茶，不要做爱”这句标语明确地戏仿了嬉皮士的口号“要做爱，不要作战”，同时也让人联想到爱之夏以及约翰·列侬和小野洋子著名的和平床上抗议，而这些又在第24集“如何不被看见”（爱德饰演的列侬：“我正在发动一场为和平的战争！”）和“激怒者”乐队的伪纪录片《你只需要现金》（艾瑞克·爱德和加里·韦斯，1978年）中被公开戏仿。“要喝茶，不要做爱”所传达的实际上是保守和压抑的信息，以及老奶奶们所谓的放纵（牛奶、面包、茶）或她们的电影偏好（《音乐之声》）所具有的相当清教徒式的本质，再次暴露了前面强调的反文化心态的矛盾倾向。对备受期待的养老金发放日的提及也'
