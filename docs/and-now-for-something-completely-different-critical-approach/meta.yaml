    and consumed by a giant floating mouth that proclaims ‘actually I find violence
    extremely distasteful’ (‘Consuming’).


    Gilliam’s tableau gags are often constructed from a single image in which only
    one aspect is animated, or specific sounds become intrinsic to the joke. A frog
    with a man’s head only moves when a tongue springs from the man’s mouth to swallow
    a watch. His forehead then expands to show a cuckoo clock in his head, whose timer
    goes off, rattling his eyes. A pie is then taken from his gaping mouth as if it
    had been in an oven. Mouth closed, a ‘Time’s Up’ banner emerges from his nose,
    and Michael Palin’s voice-over – a gameshow announcer – brashly announces, ‘Sorry,
    your time’s up Mr Spume, I’m afraid you lose your three-piece suite, and your
    youngest daughter’. Finally, the sound of the ticking clock becomes the sound
    of a fuse of a bomb burning down, and the head eventually explodes altogether.
    This comic riff on ‘time’ draws on suspense and surprise, but these typical filmmaking
    elements are recast within the alternative logic of the context Gilliam creates,
    and which the animation facilitates. ‘Timing’ is crucial in this, and clearly
    Gilliam is not merely playing with typical Hollywood conventions in using time,
    but parodying cartoon gags that speak readily to the concept of ‘timing’ in the
    joke. This is most explicit in a joke where an ambulance takes an age to move
    from the background to the foreground of the image before *suddenly* knocking
    down a businessman, and for a policeman within – literally here ‘the long arm
    of the law’ – purloining the businessman’s watch. As noted earlier this is a consequence
    of the 2D stop-motion technique, in which suddenness or slow motion delivers the
    possibility of comic outcomes – *disruptive metamorphoses* – that are formal,
    technical and conceptual jokes.


    In Disney’s ‘gag-that-builds’, Thomas and Johnston suggest that this is ‘made
    up of a series of gags that increase in intensity . . . until a climactic event
    crowns a complete routine’ (Thomas and Johnston 1987: 26). This approach invariably
    exploits the new logic of a situation once what was expected to happen has not
    occurred, and every new intervention compounds the error until one final calamity
    arrests the joke. Gilliam’s ‘gag-that-builds’ does not have the logic or structure
    of the changing circumstance, but rather the changing association, and rarely
    does it build to a climax. Often, indeed, the gag leads only back to the sketch
    or live-action sequence in the overall programme or film, or possesses no denouement
    or specific ‘punchline’. Gilliam’s version of a ‘gag-that-builds’, for example,
    begins when three ballet-dancing admirals – the top half a cut-out of an admiral,
    the bottom half a cut-out of a ballet dancer – annoy another character, who responds
    by saying ‘God if they don’t stop I’ll kill myself’. The man finally capitulates
    and does so, shooting himself in the ear, the bullet rolling one eye-ball on to
    the other eye-ball and out the other ear. ‘For three days and nights, the displaced
    eye-ball plummeted earthward’ intones the voice-over. ‘Finally’ (a caption), the
    eye spins and flattens into a disc when it lands on the ground, becoming the base
    of a bus-stop, where an old lady stands. After a bus passes here twice, on a third
    occasion the old lady extends her foot to trip the bus, upending it in the process,
    before she gets on board. The bus is then passed by a group of tourists, who are
    set upon by ‘killer cars’ hiding behind trees and in alleyways. In order to decrease
    pedestrian congestion, ‘certain fanatical cars had taken the law into their own
    hands’ and devoured people. ‘The days of the killer cars were numbered’, though,
    ‘thanks to atomic mutation’. A Godzilla-like cat standing on its hind legs then
    staggers through Trafalgar Square in London in a tribute to the Ray Harryhausen’s
    stop-motion B-movies of the 1950s in which American cities are normally destroyed
    by aliens or mutated creatures. The cat drives away the cars, then starts eating
    buildings, before a hand – a reference to ‘thing’ in the US sitcom, *The Addams
    Family* – flattens first the cat and then a group of citizens who gather to thank
    it for saving them.


    Bodies, objects, animals and environments all take on arbitrary and incongruous
    qualities, merely the visual assets by which Gilliam plays out his own associative
    ‘low-rent’ spectaculars, rendering the generic, overblown and predictable as fresh
    ironic gags. One gag literally flows into another here, an episodic sequence of
    ‘micro-narratives’ that finds comic purchase by being rendered as the subject
    of a formalist controlling agency – ‘the impish god’ of the animator. Such control,
    which puts everything on an even footing, diminishes known hierarchies, established
    power-bases, social and cultural expectations, and oppressive habits and routines.
    These become a series of *disruptive metamorphoses* that rely on ‘mutating’ (the
    cat as Godzilla), ‘hatching’ (the bullet that produces the falling eye), ‘splitting’
    (the dancing admirals) and ‘doubling’ (the eye as base, the killer cars as monstrous
    creatures devouring all before them). This in turn creates worlds in which suicide,
    accidents and violent conflict become reductive acts, made absurd by what might
    be termed the *filter* of the animated form in which all things are placed into
    the kind of relief by which they might be re-considered, and even re-appreciated.
    Each visual joke thus operates simultaneously as both a *dilution* of the implications
    of the ‘reality’ implied, yet an *amplification* of the possible symbolic and
    metaphoric interpretation of such ‘reality’.


    Many of Gilliam’s comic riffs, therefore, are (literal) reversals of expectation
    or practice. For example, when Conrad Pooh (a treated photo of Gilliam himself)
    believes he has received a telegram, an intervening figure notes that he has actually
    received *a letter*, whereupon a retreating postman takes the letter away, posting
    the letter back into a postbox on a small island. In effect, when the letter disappears
    into the postbox, it is now visualised as being back in a process that is normally
    hidden from the public – the internalised system by which a letter goes from one
    person to another. In John Grierson’s *Nightmail* (Basil Wright, 1936), featuring
    the poetry of W. H. Auden, this is depicted, for instance, in poetic documentary
    form, while Gilliam uses animation’s capacity for *penetration* (see Wells 1998:
    122–7) – the capacity to depict interior or non-visible states, mechanisms and
    procedures. As Gilliam has noted:


    > It’s the innards of everything, whether it’s people, or machines. The inner
    workings of things have always intrigued me. Toilets have always intrigued me.
    I’m curious about how things work, how the guts of a system function, and the
    sound of plumbing is always comic. (McCabe 1999: 36)


    Once the letter enters the postbox, it is subject to the way Gilliam visualises
    the journey of the letter. The letter is transported by a mechanical hand from
    holes in the landscape into a Karel Zeman-style airship, whereupon it falls beneath
    a football boot, travels through the mouth of a serpent, back into a conveyor
    system, speeds past two nude women, and rests back on a post office counter. This
    reversal of the normal process puts the letter back into the hands of the live-action
    bowler-hatted sender (Terry Jones), making the mundane exotic, yet comically complex
    in its Heath Robinson/Rube Goldberg styling. The exoticism of the mundane is common
    in Gilliam’s work, partly referring to a particularly British kind of ordinariness,
    but partly employing a certain comic fetishism of the *interiority* of objects
    and habitual processes, making them funny by pointing up their lack of exoticism
    by depicting them as if they were.


    ## THE MIDWAY EXPERIENCE


    Gilliam’s use of the tableau gags and accumulative micro-narratives allied to
    the satirical context in which the Pythons largely worked place his animated sequences
