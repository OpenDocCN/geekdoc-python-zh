    there is any meaning to be derived from how it behaves yet it seems confidently
    fuelled by some dynamic. Pasolini (1976), in his description (and practice) of
    poetry and his search for pure language and dialects in danger of losing their
    cultural function, and Thomas Pynchon (1973), in his explorations of explosive
    frames of reference in which everything refers to everything to the extent that
    language and existence act without any gravitational pull, offer such instances
    as ‘orgies’ in which happiness erupts blindingly bright as joie de vivre éclatante.
    Consider the computer-animated body, built from a grid that appears in the middle
    of the Milky Way, whose vagina explodes a case in point. Much like The Rocky Horror
    Picture Show, and with Pynchon and Pasolini, the Middle of the Film is the moment
    when The Meaning of Life creates its own poetry.


    ## BUREAUCRACY, HYPERBOLE AND WASTE


    The Meaning of Life was financed by Universal, and it was the highest-budgeted
    Python film to that date. Though, as we shall see, this brought with it certain
    production logistics, it also brought opportunity for experimenting with set pieces
    that could be properly prepared and rehearsed. Blowing up those set pieces allowed
    Python to be at its most Pythonesque (which is, in this case, to be understood
    as self-aware of its own style). Some of the influences for such experimenting
    have been mentioned above, and Calvino, Pasolini and Pynchon, and, above all,
    *The Hitchhiker''s Guide to the Galaxy*, must count as profound points of reference.
    As with *The Rocky Horror Picture Show*, there is not only a shared resistance
    to oppressive systems that regulate moral behaviour, ideology and gender and the
    conduct of sexuality, as well as a desire to expose the hypocrisy of these doctrines
    (the Roman Catholic segment followed by the Protestant Conversation is a good
    example), but there is also a stylistic overlap in the segmenting of a narrative
    into vignettes, some flowing neatly from one another, and others intercalating
    the main narrative more abruptly. Among the reasons why *The Meaning of Life*
    is considered a cult film, these similarities certainly carry weight. A lot of
    the stylistic flavour of *The Meaning of Life* comes of course from the Pythons''
    earlier work. As detailed in other chapters in this collection, musical set-piece
    interventions, brusque changes in pace and tone that pervert the logical progression
    of time, voice-over commentary that contradicts or otherwise reframes the visual
    flow, and crazy and absurd animated bursts (courtesy of Terry Gilliam) are key
    staples of the Python aesthetic, and we find them in abundance here as well. A
    British middle-aged couple''s visit to an event-restaurant where philosophy is
    on the menu is a classic Python sketch (complete with Cleese''s aplomb and ''Oh,
    I see, very well then''-esque reactions to silly dialogue).


    One of the stylistic techniques *The Meaning of Life* applies that constrains
    it is its internal bureaucracy. The structure of the film, even though it gets
    blown to bits, does survive the madness and mayhem of exuberance that it endures
    – after all is done, it is still a story about one''s life trajectory, and the
    idea of a path, a route, is pervasive throughout the film''s vignettes and asides.
    Michael Palin, in an interview, describes it as follows: ''That harked back to
    Python''s love of bureaucracy [sic]: you know, people coming round from the council,
    10 of them, with different bits of paper'' (Michael 2013). Even though Palin adds
    that, in his view, *The Meaning of Life* has only a shell structure (''the loosest
    structure, which will be the meaning of life''), he acknowledges that the film''s
    vast budget brought with it its own administrative demands, from which it then
    had to break loose. *The Meaning of Life* comments on this in its prologue, *The
    Crimson Permanent Assurance* short feature that precedes the long feature. In
    it, the workforce of an insurance company, most of them it seems of near-retirement
    age (the age when insurance becomes a more pressing concern, one is led to think),
    and ''strained under the yoke of their oppressive corporate management'', revolt
    against their labour conditions. They take over the building in which they work,
    and, with the building dressed as a pirate ship, the clerks set sail from London
    to New York, to overtake Wall Street''s bankers. The bankers fight back but the
    pirate-accountant prevails and they leave Wall Street behind as a wasteland .
    . . only to drop off a cliff – end of short feature.


    When considered in some detail, that bureaucracy is twofold. On the one hand,
    it is similar to what Karl Mannheim (1929) points to as bureaucracy as an ideology.
    It is a way of organising life and beliefs about life and its inspirations that
    supersedes any and all other considerations for worldviews. It is encapsulated
    in ‘ways to do things’ that become their own command, simply because they offer
    practical ways of living life – so much so that life is what happens when you’re
    making other plans (to paraphrase an overused quotation). For instance, it meant
    that the Pythons were now parcelling out and scheduling their time commitments.
    Whereas with previous films each member of the team was always on hand, with *The
    Meaning of Life* members only showed up on schedule, when needed (Michael 2013).
    For an art form like comedy (especially in its troupe form) that relies on group
    dynamics, this meant the structure *became* the film’s meaning – spontaneity traded
    for production efficiency. One implication of this was a more rigorous division
    of labour (one that is cheekily implied at the beginning of the short feature
    via a cardboard-clipped time sheet). If, at times, as some reviewers remarked,
    the film appears a bit laboured, then bureaucracy can certainly be pointed at
    as a cause (McNally 2012). Gilliam, who was in charge of *The Crimson Permanent
    Assurance*, explains how the division of labour, which he calls ‘they didn’t know
    how I worked so I got to do it’ (Christie 1999), led to him going vastly over
    budget to make it an outstanding and grandiose critique of bureaucracy, only to
    see the protocols of audience previews reduce the segment’s significance (and
    its power as a critique of bureaucracy): ‘It had a completely different style
    from the Python material,’ he observes, ‘the laughs aren’t immediate.’ After Gilliam
    suggested it become the main feature’s accompanying short, ‘it gave us the chance
    of allowing it to come back and “attack” the main film’ (ibid.: 108).


    On the other hand, this bureaucracy offered the perfect background against which
    to fire off critiques on structure, which is already indicated in the short prologue
    and, further, as the film progresses from birth to death, following life’s trajectory.
    The seven core segments of the film, The Miracle of Birth, Growth and Learning,
    Fighting Each Other, Middle Age, Live Organ Transplants, The Autumn Years, and
    Death, are commented on by insertions that become increasingly wild and nonsensical
    (though they do present a lyricism not seen too often in earlier Python work).
    As McNally (2012) puts it: ‘The tone and style of each sketch changes, but the
    comedy hits higher and higher speeds with such perennials as John Cleese’s Sex
    Education Class, Over-Appreciative World War I Soldiers and Fishy, Fishy, Fishy,
    Fish!’ The *Hollywood Reporter* (Osborne 1983) wrote that the film disintegrates
    into a ‘hodgepodge of vignettes’, an accurate observation of the film’s disintegration
    into wildness. As hinted at in the discussion of the film’s employment of notions
    of absurdity and poetry as deviations from the straitjackets of structure, it
    blows protocols, routines and rituals out of the water. Two techniques of representation
    typical for cult cinema that, in fact, border on what *is* representable demonstrate
    this: hyperbole and waste.'
  mdcn: '它本身。因此，它是荒谬的、无政府主义的；它只是模糊地暗示其行为方式中蕴含着某种意义，却又似乎自信地被某种动力所驱动。帕索里尼（1976）在其对诗歌的描述（及实践）中，以及他对濒临丧失文化功能的纯粹语言和方言的探寻中；托马斯·品钦（1973）在其对爆炸性参照框架的探索中——其中万物相互指涉，以至于语言和存在毫无引力般地运作——都提供了这样的实例，如同“狂欢”，幸福如“灿烂的生命之乐”般耀眼地迸发。想想那个由网格构成、出现在银河系中央的电脑动画身体，其阴道的爆炸便是一个恰当的例子。这很像《洛基恐怖秀》，也与品钦和帕索里尼的作品相似，《生命的意义》的“电影中段”正是“生命的意义”创造自身诗意的时刻。


    ## 官僚主义、夸张与浪费


    《生命的意义》由环球影业资助，是当时预算最高的“巨蟒”电影。尽管正如我们将看到的，这带来了一定的制作后勤问题，但也为实验那些可以精心准备和排练的固定场景提供了机会。炸毁这些场景让“巨蟒”得以展现其最具“巨蟒风格”的一面（在此语境下，应理解为对其自身风格的自觉）。这种实验的一些影响因素前文已提及，卡尔维诺、帕索里尼和品钦，尤其是《银河系漫游指南》，必须被视为深刻的参照点。与《洛基恐怖秀》一样，这不仅是对压制道德行为、意识形态、性别及性行为规范的压迫性体系的共同抵制，以及揭露这些教条虚伪性的愿望（紧随罗马天主教片段之后的新教对话便是一个很好的例子），而且在将叙事分割成小插曲的风格上也存在重叠，有些小插曲流畅地衔接，有些则更突兀地插入主线叙事。在《生命的意义》被视为邪典电影的诸多原因中，这些相似之处无疑举足轻重。《生命的意义》的许多风格特色当然源于“巨蟒”成员们早期的作品。正如本合集中其他章节所详述的，音乐固定场景的介入、扭曲时间逻辑进程的节奏与基调的突兀转变、与视觉流相矛盾或重新框定的画外音评论，以及疯狂荒诞的动画爆发（由特里·吉列姆呈现），都是“巨蟒”美学的关键要素，我们在此片中也能大量发现。一对英国中年夫妇光顾一家以哲学为菜单的事件餐厅，便是一个经典的“巨蟒”小品（带有克莱斯式的沉着以及对愚蠢对话的“哦，我明白了，那好吧”式反应）。


    《生命的意义》运用的一种限制其自身的风格技巧是其内部的官僚主义。电影的结构，尽管被炸得粉碎，却在它所经历的狂热与混乱中幸存下来——毕竟，它仍然是一个关于人生轨迹的故事，而道路、路径的观念贯穿于电影的小插曲和旁白之中。迈克尔·帕林在一次采访中如此描述：“那让人想起‘巨蟒’对官僚主义[原文如此]的热爱：你知道，市政委员会的人过来，10个人，拿着不同的文件”（Michael
    2013）。尽管帕林补充说，在他看来，《生命的意义》只有一个外壳结构（“最松散的结构，那将是生命的意义”），但他承认电影庞大的预算带来了自身的行政需求，而电影随后不得不从中挣脱出来。《生命的意义》在其序幕——正片前的短片《深红色永久保证》中对此进行了评论。片中，一家保险公司的员工，其中大多数人似乎已接近退休年龄（人们不禁想到，这是保险变得更为紧迫的年纪），在“压迫性公司管理的重压下”，反抗他们的劳动条件。他们占领了工作的大楼，并将大楼装扮成一艘海盗船，职员们从伦敦启航前往纽约，意图取代华尔街的银行家。银行家们反击，但海盗会计师们获胜了，他们将华尔街抛在身后，使其成为一片废墟……然后却坠下悬崖——短片结束。


    细究之下，这种官僚主义是双重的。一方面，它类似于卡尔·曼海姆（1929）所指出的作为意识形态的官僚主义。它是一种组织生活以及关于生活及其灵感的信念的方式，超越了任何和所有其他世界观的考量。它体现在“做事方式”中，这些方式因其提供了实际的生活方式而成为自身的命令——以至于生活成了你制定其他计划时发生的事情（套用一句被滥用的引语）。例如，这意味着“巨蟒”成员们现在开始分配和安排他们的时间承诺。与之前每部电影团队成员总是随叫随到不同，在《生命的意义》中，成员们只在需要时按计划出现（Michael
    2013）。对于像喜剧（尤其是其剧团形式）这样依赖团队动态的艺术形式而言，这意味着结构*成为*了电影的意义——自发性让位于制作效率。其一个影响是更严格的劳动分工（这在短片开头通过一个纸板夹着的时间表被戏谑地暗示）。如果有时，正如一些评论家所言，电影显得有些吃力，那么官僚主义无疑可以被指为一个原因（McNally
    2012）。负责《深红色永久保证》的吉列姆解释了这种劳动分工——他称之为“他们不知道我怎么工作，所以我得以去做”（Christie 1999）——如何导致他严重超支，将其打造成对官僚主义的杰出而宏大的批判，却眼睁睁看着观众试映的流程削弱了该片段的意义（及其作为官僚主义批判的力量）：“它与‘巨蟒’的材料风格完全不同，”他观察道，“笑声不是即时的。”在吉列姆建议它成为正片的伴随短片后，“这给了我们机会让它回来‘攻击’正片”（同上：108）。


    另一方面，这种官僚主义为批判结构提供了完美的背景，这在序幕中已有所暗示，并且随着电影从出生到死亡，沿着人生轨迹推进，这种批判进一步展开。电影的七个核心片段——出生的奇迹、成长与学习、相互争斗、中年、活体器官移植、暮年和死亡——被越来越狂野和荒谬的插入片段所评论（尽管它们确实呈现出一种在早期“巨蟒”作品中不常见的抒情性）。正如麦克纳利（2012）所言：“每个小品的基调和风格都在变化，但喜剧速度越来越快，诸如约翰·克莱斯的性教育课、过度赞赏的一战士兵以及‘鱼，鱼，鱼，鱼！’这样的经典桥段层出不穷。”《好莱坞报道者》（Osborne
    1983）写道，电影瓦解成“小插曲的大杂烩”，这是对电影瓦解为狂野状态的准确观察。正如在讨论电影运用荒谬和诗意作为对结构束缚的偏离时所暗示的，它将流程、常规和仪式炸得粉碎。两种典型的邪典电影表现技巧，实际上已接近可表现的边界，证明了这一点：夸张与浪费。'
