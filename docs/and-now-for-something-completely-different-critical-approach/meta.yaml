    ## 荒诞与诗意


    在从作为模型的哲学滑向作为流动的哲学，甚至超越哲学的过程中，《生命的意义》做出了约尔格·奥芬南格（1984: 159）通过罗兰·巴特所称的转变，从建模转向记录日常生活的神话——但其顺序是剥去神话的外衣，而不是确认它们作为理解生活的基石。生命本身并无意义，而是充满了仪式，正如格雷厄姆·查普曼的角色在名为“出生的奇迹”的片段中所说，它越来越多地充斥着“装置”，那些会发出“乒”声的设备，它们似乎在书写自己的神话。但这些仪式并不能解释任何事情。相反，它们显示出自己是偶然的、临时的和道德上空洞的。它们不好也不坏，只是毫无意义。随着《生命的意义》的推进，这一点变得极其明显。在医院场景中孩子出生之后，教堂和学校里的童年与青年场景、集会、体育活动都围绕着仪式和为仪式而设的程序来组织。在这些场景中，巨蟒剧团先是零星地，然后越来越多地戳破漏洞。中断的频率增加，几乎没有例外，片段要么再次以舞蹈和歌唱结束——芭芭拉·埃伦赖希将其视为围绕仪式的集体欢乐（Ehrenreich
    2006），要么以混乱和骚动结束——陷入无政府状态。在几分钟的银幕时间内，电影从一个结构良好的教室跳到一场以疯狂推搡和同样疯狂的庆祝结束的橄榄球赛，再跳到一场所有方向感都丧失的战争冲突。当镜头从军队在轰炸下试图保持礼仪的荒谬情境中拉远时，只剩下废墟。在另一个例子中，一个关于性教育的场景充满了荒诞性，仪式（性行为、课堂纪律）相互争斗，争夺对一个早已失去意义的情境的主导权。自始至终，都存在着一种哲学，认为仪式，即使在其随机性中，也有其目的。


    正如里克·赫德森在本卷中的章节所指出的，巨蟒剧团在这里的态度类似于路易吉·皮兰德娄。皮兰德娄在唤起角色的荒诞性时，无论是舞台上的表演性角色（如皮兰德娄最著名的戏剧《六个寻找剧作家的角色》[1921]），还是日常生活中更平凡的片段（《十一个短篇故事》[1994]），他的角色都坚持认为，我们所做之事有某种外在原因，即使它难以理解，即使它仅仅是工具性的（就像电影中一个片段所说的“在广场上来回行进”）。《生命的意义》中几乎每个片段都有一个皮兰德娄式态度占据中心的时刻，当那些可能分散叙事注意力的“日常琐事”成为该场景的焦点时，除了提供一个支点，让一个摇摇欲坠、完全随机或非理性的结构得以建立和维持之外，别无他因。电影通过能量物理学短暂（且被打断）地涉足信仰体系，其中佩戴帽子被提议作为董事会重要讨论的话题，就是这样一个结构化荒诞的时刻。另一个例子是，一个器官移植团队仅仅因为他们能做，而且捐赠卡上这么写了，就切除了一个人的肝脏。暴力随之而来，鲜血四溅，但因为这是看似不言自明的结构的一部分（卡片上这么写了），旁观者（家人）以及施暴者（他们闲聊着）都接受了它——荒诞但没事。


    “电影中场”，一个类似幕间休息的片段，打断了故事从学校到军事和帝国建设各个阶段的某种流动，最好地例证了这一点。在风格上，它类似于《洛基恐怖秀》（Sharman,
    1975）的摄影、场面调度、设计和化妆，这部电影当时处于邪典电影的中心（见Weinstock 2007）。它被宣布为一个寻找鱼的游戏（但没人找到），它只是展示了一个看似即兴的怪异和疏离行为，毫无结构可言，但却充满了活力、舞蹈（或许更准确地说是哑剧和魔术师般的动作）和暗示。在其荒诞性中，这个场景超越了皮兰德娄式的“抓住虚无”的态度，因为它甚至没有一个想象的组织中心。如果它是一个仪式或程序（作为一个“游戏”，它应该有一个），它并没有揭示'
