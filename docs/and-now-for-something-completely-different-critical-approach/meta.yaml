    Swinging London’s infamous yet alluring crime and pop milieux-merging gangster
    duo, the Kray Brothers (the ‘Piranha Brothers’), or cheekily calls its second
    episode ‘Sex and Violence’. The ‘Twentieth Century Vole’ sketch (episode 6, ‘It’s
    the Arts’) then not only mocks the then-prominent idea of the filmmaker as an
    individualist auteur with a specific vision as championed by the proponents of
    the French New Wave. It also explicitly exposes the shady, corrupt side of Hollywood’s
    film business. In the British context, this also alludes to 1960s Soho’s association
    with both sex and cinema (see Halligan 2003: 60). The producer’s (Chapman) proposed
    idea of a picture also reflects the changing mores by juxtaposing the quintessential
    American couple of tame romantic comedies with screwball elements, Doris Day and
    Rock Hudson, that are still rooted in the 1950s ideal of the nuclear suburban
    family with the more liberated and experimental Swinging Sixties mindset: ‘It’s
    a love story. Intercourse. Italian-Style. David Hemmings as a hippie Gestapo officer.
    Frontal nudity. A family picture.’ The references to Swinging Sixties icon David
    Hemmings and ‘Italian-Style’ lovemaking play on the permissiveness connoted by
    Swinging London as well as the increasingly less inhibited depiction of sexuality
    in European cinema. While British films such as *Darling* (John Schlesinger, 1965),
    *The Pleasure Girls* (Gerry O’Hara, 1965), *Alfie* (Lewis Gilbert, 1966), Michelangelo
    Antonioni’s *Blow-Up* (1966) featuring Hemmings’s by now iconic role as a fashion
    photographer, *Here We Go Round the Mulberry Bush* (Clive Donner, 1968) or *The
    Touchables* (Robert Freeman, 1968), on the one hand, display this curious mindset,
    on the other hand they ‘do not simply celebrate freedom, superficiality, popular
    culture and affluence’ (Luckett 2000: 233). Instead, they at times also ‘conjure
    up a particularly bleak vision of the Swinging London zeitgeist’ (ibid.).


    Unsurprisingly, permissiveness and playfully naughty remarks also feature strongly
    in the *Flying Circus* series: whether it be the ‘Marriage Guidance Counsellor’
    sketch (episode 2, ‘Sex and Violence’), the ‘Nudge Nudge’ sketch (episode 3, ‘How
    to Recognise Different Types of Trees from Quite a Long Way Away’), Eric Idle’s
    refreshment room host Kenny Lust (episode 9, ‘The Ant, an Introduction’), the
    naughty chemists (episode 17, ‘The Buzz Aldrin Show’), the romantic date that
    almost turned into a ‘very broad-minded’ 1960s Dionysian love-in, even featuring
    Palin holding a goat that evokes Satyr connotations (episode 9, ‘The Ant, an Introduction’),
    Idle’s groovy, laid-back hippie who lives with his commune inside Palin’s character
    (episode 13, ‘Intermission’), multiple marriages and communal living (‘They’re
    all married and living quite well in a council estate near Dulwich’; episode 19,
    ‘It’s a Living’), or the very enamoured shadow minister and his dachshund (episode
    20, ‘The Attila the Hun Show’). The permissive society is also frequently directly
    referenced and discussed, either via interviews, talk shows or complaining letters.


    The class struggle then is similarly repeatedly referenced: whereas the well-known
    ‘Upper-Class Twit’ sketch (episode 12, ‘The Naked Ant’) mocks the Ruling Class’s
    delusions of grandeur and privilege, the ‘Idiot in Society’ sketch (episode 20,
    ‘The Attila the Hun Show’) deals with the city residents’ prejudices against the
    rural community and clichéd notions of backwardness as well as various clichés
    country folk associate with their own kind. The generational conflict is then
    brought to the fore by the scepticism of the older, self-taught village idiots
    towards the college education of their graduate offspring – a diploma in Idiocy
    awarded by the University of East Anglia – that was enabled by the post-war social
    transformations. In the ‘Vox Pops on Politicians’ sketch (episode 21, ‘Archaeology
    Today’) that ironically applies the devoted groupie lifestyle linked to the hedonistic
    realm of rock ‘n’ roll excess to the allegedly respectable yet scandal-ridden
    political sphere, the interviewed parents similarly express disappointment in
    their wayward, hippie aesthetics-sporting children who have run away from home
    to obsessively follow politicians. At the same time, the privileged upbringing
    associated with London’s elite (Eton, Sandhurst, Oxbridge, parents either bankers,
    aristocrats or in politics) is ridiculed. Peter Medak’s 1972 comedy *The Ruling
    Class*, for instance, adopts a similar satirical fashion: it mocks the aristocracy
    via its schizophrenic protagonist (Peter O’Toole) who becomes the 14th Earl of
    Gurney and believes himself to be the reincarnation of Jesus before undergoing
    a further – albeit electroshock-induced – metamorphosis from a peaceful, nature-loving
    hippie ‘Christ’ into torture-obsessed Jack the Ripper.


    Two years after the Summer of Love, psychedelic happenings and the related ‘Turn
    on, Tune In, Drop Out’ mentality, which also witnessed a public love-in in Hyde
    Park, and a few months after Woodstock, the Altamont Free Concert with its violent
    outcome likewise underscored the darker side of the counter-culture. On top of
    this, the break-up of the Beatles and the expansion of the ‘27 Club’, with the
    deaths of Brian Jones, Jimi Hendrix, Janis Joplin, and Jim Morrison between 1969
    and 1971, marked the end of whatever ‘innocence’ remained in youth counterculture.
    (Gair 2007: 9)'
