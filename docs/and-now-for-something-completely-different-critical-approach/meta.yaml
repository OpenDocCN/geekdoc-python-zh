    *蒙提·派森的飞行马戏团*——由格雷厄姆·查普曼、约翰·克里斯、特里·吉列姆、埃里克·艾德尔、特里·琼斯和迈克尔·帕林编写并主演——于1969年10月首次播出，当时和现在都被视为对传统电视喜剧的激进背离，既具有颠覆性又具有挑战性。事实上，它正是为此而有意创造的，正如詹姆斯·詹特在派森官方网站上的一篇短文中所述：


    > 团队一致同意，他们想要颠覆传统小品喜剧的惯例——那些有开头、中间和结尾、有笑点、有落幕、有应景笑话的小品。他们对喜剧的处理方式将是不可预测的、具有攻击性的和不敬的，每一集都是三十分钟的意识流，反映了60年代末的革命时代。（詹特
    2014）


    派森们成功地实现了他们的目标，制作了一部超越了既定电视喜剧界限的喜剧系列，其程度超过了以往。正如詹特进一步指出的：


    > 派森们愉快地解构了电视这一媒介本身；有对纪录片、游戏节目、广告和访谈节目的戏仿。但他们也经常颠覆电视本身的语法——例如，片头可能出现在剧集的中途，或者片尾字幕滚动可能在最开始就出现。标志性的BBC地球仪经常被劫持，背景中可以听到画外音播音员在吃东西或陷入痛苦的个人危机。在接下来的几年里，该节目获得了三项BAFTA奖，包括最佳轻松娱乐节目奖，以及两项特别奖，分别授予其编剧表演和吉列姆的图形设计。（同上）


    然而，*飞行马戏团*并非在文化真空中凭空出现，而是文化影响和社会环境共同作用的最终结果。该节目可以被视为团队独立成员的才华、品味和写作风格的融合，他们早期的作品展示了初具雏形的“派森特质”。我们可以在查普曼和克里斯为*弗罗斯特报告*（1966–7）和*最后是1948年秀*（1967）编写和出演的节目中看到派森的讽刺元素；帕林、琼斯和艾德尔的*不要调整你的设备*（1967–9）中则明显体现了不敬的愚蠢和胡闹，该节目也包含了特里·吉列姆的动画。同样，*飞行马戏团*并非唯一向英国电视喜剧引入超现实和非常规内容及形式的节目；1969年也播出了斯派克·米利根和尼尔·尚德的*Q5*，其怪异程度有时可与派森相媲美。


    派森常被视为1960年代的产物，那个时期英国文化正在转型，并通过对抗和批判帝国时代的文化和社会来定义自身。1960年代常被设想为对压抑、威权且——坦率地说——沉闷的战后时代及其紧缩政策的多彩攻击（哈德森
    2017a: 171–82）。虽然将战后英国设想为一个相当保守和压抑的环境，人们哀叹帝国的丧失并忍受着紧缩的困苦，这无疑是正确的，但这个时期在很大程度上可能被误解了。虽然我们可能想象1950年代的英国过于拘谨和缺乏生气，但我们必须承认，许多在1960年代出现的文化运动和现象，其基础早在1950年代甚至更早之前就已奠定。在英国被1960年代反文化所颂扬的美国作家，如杰克·凯鲁亚克、威廉·巴勒斯和艾伦·金斯堡，以及波普艺术家理查德·汉密尔顿、爱德华多·保洛齐和安迪·沃霍尔，都是在1950年代首次崭露头角。随着波普艺术的出现，1950年代也预示了“高雅”与“通俗”艺术之间界限的崩溃，这在1960年代变得如此普遍，并在*蒙提·派森的飞行马戏团*中显而易见。与派森特别相关的是，广播喜剧节目*呆瓜秀*（1951–60）是1950年代的一个现象，它也反驳了普遍认为1950年代文化一律反动和贫瘠的观念。*呆瓜秀*被派森团队的所有成员特别提及，认为是*飞行马戏团*的开创性影响（兰迪
    2005: 34）。派森的许多方面无疑与*呆瓜秀*的元素相似，尤其是那些荒诞和离奇的情境与角色。


    1950年代的其他文化产品对派森产生了深远而重大的影响：具体来说是塞缪尔·贝克特和哈罗德·品特等剧作家的荒诞派和超现实主义戏剧。特里·琼斯本人主持了*纯粹荒诞*——2010年8月10日在第四广播电台播出的一部纪录片——他在其中讨论了荒诞派戏剧对英国喜剧的影响。本杰明·威尔逊在为*每日电讯报*评论该节目时，谈到了荒诞派戏剧对派森的影响：


    > “荒诞派试图做一些会令人震惊的事情，以激发观众以不同的方式思考，”[特里·琼斯]说。从尤内斯库的《犀牛》（本身是对顺从的批判，其中贝朗热，尤内斯库多部戏剧中的核心人物，看着他的朋友们一个个变成犀牛）到塞缪尔·贝克特的《快乐的日子》中被埋到脖子的温妮，没有明显的原因，荒诞派戏剧重视不协调性胜过情节或角色。从一只动画脚踩踏屏幕到拍鱼舞，这之间的跳跃并不大。（威尔逊
    2010）


    要充分理解1950年代的英国先锋派戏剧，我们必须理解荒诞主义和超现实主义。虽然很难确定具体哪位作家或艺术家是发起一场运动或风格的始作俑者——人们发现自己只是在揭示一个永无止境的影响者和先驱链条——但为了简洁起见，我将从讨论'
