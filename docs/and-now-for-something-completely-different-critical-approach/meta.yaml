  md: '# 12. MEMORIES OF CONNECTING: FATHERS, DAUGHTERS AND INTERGENERATIONAL MONTY
    PYTHON FANDOM


    Kate Egan


    In 2017, I began work on the audience research project *Monty Python Memories*.
    This project’s central research tool was an online questionnaire – combining quantitative/multiple-choice
    and qualitative/free-text questions and answers – asking respondents to share
    their memories and experiences of encountering Monty Python for the first time
    and then over subsequent years. The questionnaire was designed to encourage respondents
    to outline their emergent and enduring fandom for Python, with the first free-text
    question asking for recollections of their first encounter with Python in any
    form (the television show, or one of the films, albums or live shows). To my knowledge,
    this project has since amassed the largest dataset of audience responses to a
    comedy form/text to date – 6,120 responses from across the world, with a particular
    concentration of respondents from the US (2,848 responses) and the UK (1,123 responses),
    but with substantial numbers also received from Canada (409), Australia (264),
    Germany (144), Sweden (94), France (82), Denmark (76) and Poland (72). I received
    a relatively balanced number of responses from men and women: 52 per cent men
    and 46 per cent women, while 71 per cent of the 1,772 participants who responded
    to the (optional) question about education indicated that they were educated to
    at least university degree level. The scale of response was assisted by the project’s
    promotion on Monty Python’s official website http://www.montypython.com/ and official
    Monty Python social media outlets on Facebook and Twitter, leading to a dataset
    which is global in scope and largely representative, because of'
  merge: -1
