- md: '## 8. THE PARROT, THE ALBATROSS AND THE CAT: ANIMALS AND COMEDY IN MONTY PYTHON


    Brett Mills


    ### INTRODUCTION: THE PARROT


    The most famous sketch in the history of Monty Python is that commonly known as
    ‘the dead parrot sketch’ (also known as ‘the pet shop sketch’ and ‘parrot sketch’).
    It has a disarmingly simple premise: a customer (John Cleese) returns to a pet
    shop to complain that the parrot he has recently bought is dead. The comedy arises
    from the shop owner’s (Michael Palin) refusal to accept that it is no longer alive,
    and a battle of wordplay ensues as the customer uses an increasingly complex array
    of terms to describe the animal’s deceased state while the shop owner offers a
    variety of rationales for the bird’s lack of movement. The sketch quickly moves
    beyond this set-up, with the customer being advised to visit the pet shop’s complaints
    department, and, after a detour into a sequence where he is confused about being
    in Bolton or Ipswich, the sketch ends as many others in Monty Python do; with
    Graham Chapman’s army captain entering the scene and complaining that everything
    has now gone too silly, and that the programme should move onto something else.
    The sketch is the UK’s favourite sketch from across the whole of the troupe’s
    output (Jefferies 2014), and was voted as the second greatest comedy sketch in
    the history of British television in one poll (BBC News 2005) and first in another
    (BBC News 2004). Its iconic status as an ‘old friend’ (Wilmut 1980: 205) of Monty
    Python fans was confirmed when, in order to promote the troupe’s comeback performances
    in London in 2014, a fifty-foot-long fibreglass model of the deceased bird was
    unveiled in the city (Rucki 2014).


    While the comedy of the sketch is dependent upon the linguistic playfulness and
    absurdity of the two participants’ responses, coupled with the contradiction of
    Cleese’s strained exasperation and Palin’s cunning benignity, it is also important
    that the sketch is about a parrot. Indeed, in outlining the development of the
    sketch, Cleese has stated that it began as being about a shifty car salesman,
    before he and his co-writer (Graham Chapman) thought such a setting not inventive
    enough. When it was decided a pet shop would instead be more productive, the next
    step was to decide upon the animal being returned:


    > What animal, then? A cat? No, dead kitties are not funny. A mouse? Wouldn’t
    work: too small, and too vulnerable. Something big? A dog? Could work, but people
    are fond of dogs. Imagine banging a dead dog against a counter to wake it up –
    you could get lynched. A parrot . . . ? Yes! Nobody’s going to get upset about
    the death of a cartoon creature like a parrot – except, perhaps, its owner . .
    . (Quoted in Lockett 2014)


    While revealing an interesting insight into the decidedly mechanical nature of
    the creative process, Cleese’s recollection also indicates an awareness of the
    sociocultural meanings of a variety of animal species. That a cat would not be
    funny, that a mouse is ‘too vulnerable’, that a sketch about a dead dog raises
    fears of lynching, points to the differing meanings contemporary Western television
    audiences assign to an array of animals. Furthermore, this process indicates the
    particular relationships that exist between comedy and animals, whereby the use
    of non-humans for humorous purposes – especially if those animals are dead – is
    socially regulated in terms of offence. The funniness of the sketch is therefore
    dependent on picking the right animal, and the right animal is dependent upon
    cultural connotations of the selected non-human, both within society as a whole
    and in comedy in particular. In order to delineate the functions to which comedy
    can put animals, this chapter examines the use of animals in the output of the
    Monty Python team to delineate the humorous functions animals can and cannot play
    within the kinds of comedy they produce. It works from the assumption that the
    purposes to which humans put animals reveal something significant about human–animal
    relations; furthermore, that when those purposes are – as here – comic, they help
    highlight those assumptions and, in some places, interrogate them. Indeed, some
    of the comedy in Monty Python works precisely by refusing to conform to standards
    of broadcasting decency which, for ‘the parrot sketch’, meant that fears of lynching
    result in the impossibility of ‘the dead dog sketch’. By this account, comedy
    is a useful mode for thinking through the complex and contradictory understandings
    humans have of animals, especially given that it is precisely those complications
    that humour can draw upon so productively for its matter.


    Marcia Landy argues that the Pythons’ use of animals for comic purposes arises
    from the unsettling nature of ‘unpredictable transformations’ that ‘ridicule the
    cultural restraints placed on the human body and on all forms of language’ (Landy
    2005: 63). These restraints apply to cultural understandings of animals too, and
    thus the humour arises from the rejection of those societal norms. By this account,
    such representations of animals in comedy could be seen to function in a powerful
    way, critiquing and destabilising human–animal relationships. A reading such as
    this could align with emerging debates about the representations of animals within
    culture, particularly given that culture relies on language, and ‘language [has]
    denied animals throughout the history of much philosophy’ (Lippit 2015: xiv).
    This has resulted in conceptualisations of animals as lacking in the kind of subjectivity
    deemed to define the human; and the consequence of this is that animals within
    cultural representations are forever objects rather than subjects. We can then
    see ‘people’s framing of animals in visual culture’ (Malamud 2012: 2) as a powerful
    contributor to humans’ treatment of animals in the lived world. Indeed, humans
    encounter animals as representations far more often than they do as living beings;
    it is not unlikely that many people who have seen ‘the parrot sketch’ might never
    have encountered an actual, living parrot. Thus, human–animal relationships are
    ones dominated by representations, to the extent that those relationships are
    ones *of* representation.


    The particularities of those representations are inflected here via the comic
    nature of the programme under discussion. Indeed, the relationships between animals
    and comedy are acute, for there is


    > a common view that almost anything to do with animals is somehow funny, or at
    least likely to be funny. This funniness in animal representation – a release
    from the usual constraints of meaning – may range from the endearingly amusing
    to the surrealistic and bizarre. (Baker 2001: 23)


    What this suggests is that animals function as a representational category which
    can be used for particular purposes within human cultures, and those purposes
    rely on an understanding of animals as ‘somehow funny’. This funniness is dependent
    on their non-human status, and that distinction is enough to render animals funny.
    What this means is that comedy functions as a space within which the human norm
    is repeatedly reinscribed, via the representation of the other which is not human:
    the animal. That a culture should find animals *intrinsically* funny points to
    the certainty of human–animal distinctions, with humour used to police and naturalise
    those distinctions.


    Given this ‘common view’ of animals’ funniness, it is not surprising that animals
    recur across Monty Python’s oeuvre beyond the ‘Dead Parrot Sketch’. In *Monty
    Python’s Flying Circus*, these include: ‘Mouse Organ’ in which Terry'
  mdcn: '## 8. 鹦鹉、信天翁与猫：蒙提·派森喜剧中的动物元素


    布雷特·米尔斯


    ### 引言：那只鹦鹉


    蒙提·派森历史上最著名的短剧，通常被称为“死鹦鹉短剧”（亦称“宠物店短剧”或“鹦鹉短剧”）。其前提设定简单得令人莞尔：一位顾客（约翰·克里斯饰）回到宠物店，投诉他新买的鹦鹉已经死了。喜剧效果源于店主（迈克尔·佩林饰）拒绝承认鹦鹉已死，双方展开了一场文字游戏的较量——顾客用越来越复杂的术语描述动物的死亡状态，而店主则为鸟儿不动弹提供了各种理由。短剧很快超越了这一设定，顾客被建议去宠物店的投诉部门，随后剧情转向一段他困惑于自己身处博尔顿还是伊普斯维奇的插曲，最终以蒙提·派森许多短剧的典型方式结束：格雷厄姆·查普曼饰演的陆军上尉登场，抱怨一切都变得太荒唐了，节目应该转向其他内容。这部短剧是整个剧团作品中英国人最喜爱的短剧（Jefferies
    2014），在一次投票中被评为英国电视史上第二伟大的喜剧短剧（BBC News 2005），在另一次投票中则位列第一（BBC News 2004）。它作为蒙提·派森粉丝心中“老朋友”（Wilmut
    1980: 205）的标志性地位，在2014年为宣传剧团在伦敦的复出演出而竖立起一座五十英尺长的玻璃纤维死鹦鹉模型时得到了确认（Rucki 2014）。


    虽然这部短剧的喜剧效果依赖于两位参与者语言上的戏谑与荒诞回应，以及克里斯紧绷的恼怒与佩林狡黠的温和之间的反差，但短剧以鹦鹉为主角这一点同样重要。事实上，在概述短剧的创作过程时，克里斯曾表示，它最初是关于一个狡猾的汽车销售员，后来他和合作者（格雷厄姆·查普曼）认为这样的设定不够新颖。当决定改用宠物店会更有成效后，下一步就是决定被退回的动物：


    > 那么，用什么动物？猫？不，死小猫不好笑。老鼠？行不通：太小，太脆弱。大一点的东西？狗？可能行，但人们喜欢狗。想象一下把一只死狗摔在柜台上想弄醒它——你可能会被私刑处死。鹦鹉……？对！没人会为一只卡通生物如鹦鹉的死而难过——也许它的主人除外……（引自
    Lockett 2014）


    克里斯的回忆不仅揭示了创作过程机械性的一面，也表明他对不同动物物种的社会文化意义有所认识。猫不好笑，老鼠“太脆弱”，关于死狗的短剧会引发被私刑处死的恐惧，这些都指向了当代西方电视观众赋予不同动物的不同意义。此外，这一过程也揭示了喜剧与动物之间存在的特定关系，即使用非人类动物达到幽默目的——尤其是当这些动物已死时——在社会层面会受到是否构成冒犯的规制。因此，这部短剧的趣味性取决于选择正确的动物，而正确的动物则取决于所选非人类动物在社会整体文化中，特别是在喜剧语境中的文化内涵。为了厘清喜剧可以赋予动物的功能，本章通过考察蒙提·派森团队作品中动物的使用，来界定在他们所创作的喜剧类型中，动物能够和不能够扮演的幽默功能。本章基于这样一个假设：人类使用动物的目的揭示了人与动物关系的重要方面；此外，当这些目的——如本章所讨论的——是喜剧性的时，它们有助于凸显并有时审视这些假设。事实上，蒙提·派森的一些喜剧正是通过拒绝遵循广播内容的得体标准而产生效果的，对于“死鹦鹉短剧”而言，这意味着对私刑处死的恐惧使得“死狗短剧”成为不可能。据此，喜剧是思考人类对动物复杂且矛盾理解的一种有用模式，尤其是因为正是这些复杂性，幽默可以如此有效地从中汲取素材。


    玛西亚·兰迪认为，蒙提·派森将动物用于喜剧目的，源于“不可预测的转变”所带来的不安感，这种转变“嘲弄了施加于人体和所有语言形式的文化束缚”（Landy 2005:
    63）。这些束缚同样适用于对动物的文化理解，因此幽默源于对这些社会规范的拒绝。据此，喜剧中的此类动物表征可以被视为以一种有力的方式运作，批判并动摇人与动物的关系。这样的解读可能与关于文化中动物表征的新兴辩论相一致，特别是考虑到文化依赖于语言，而“在许多哲学的历史中，语言一直否认动物的存在”（Lippit
    2015: xiv）。这导致了将动物概念化为缺乏那种被认为定义人类的主体性；其后果是，文化表征中的动物永远是客体而非主体。因此，我们可以将“人们在视觉文化中对动物的框定”（Malamud
    2012: 2）视为人类在现实世界中对待动物的重要影响因素。事实上，人类遇到动物作为表征的次数远多于作为活生生的生命；许多看过“死鹦鹉短剧”的人可能从未真正遇到过一只活生生的鹦鹉，这并非不可能。因此，人与动物的关系是由表征主导的关系，以至于这些关系本质上是*关于*表征的关系。


    这些表征的特殊性在此通过所讨论节目的喜剧性质得以体现。事实上，动物与喜剧之间的关系是紧密的，因为


    > 有一种普遍观点认为，几乎任何与动物有关的事情都多少有点好笑，或者至少可能好笑。动物表征中的这种趣味性——从通常的意义约束中释放出来——可能范围从令人喜爱的滑稽到超现实和怪诞。（Baker
    2001: 23）


    这表明，动物作为一个表征类别，可以在人类文化中用于特定目的，而这些目的依赖于将动物理解为“多少有点好笑”。这种趣味性取决于它们的非人类地位，而这种区别足以使动物变得好笑。这意味着，喜剧作为一个空间，在其中人类规范通过表征非人类的“他者”——动物——被反复重申。一种文化认为动物*本质上*好笑，这指向了人与动物区别的确定性，幽默被用来规训和自然化这些区别。


    鉴于这种关于动物趣味性的“普遍观点”，动物在蒙提·派森的作品中反复出现，超越了“死鹦鹉短剧”，也就不足为奇了。在《蒙提·派森的飞行马戏团》中，这些包括：“老鼠风琴”，其中特里……'
