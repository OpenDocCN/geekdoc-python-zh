    possess the ‘smoothness’ of frame-by-frame drawn animation, and works best either
    in fast sudden motion, very slow motion or motion that foregrounds its own ‘jerkiness’.
    Gilliam largely used the fast/slow timings in his visual gags, and deliberately
    used the off-set artifice of the medium to extend the surrealism of the imagery.
    His techniques, processes and themes will be addressed later in this chapter,
    but it is important to stress here that animation at this time was primarily understood
    as a children’s entertainment medium and as a feature of commercials and credits,
    but rarely featured on television otherwise. The very presence of animation in
    a prime-time satirical show was, therefore, in itself subversive and, somewhat
    ironically, effectively established the style and flow of the programme, challenging
    the orthodoxies of the conventional sketch show, both in form and content. Crucially,
    this spoke to a youth audience actively seeking the ‘shock of the new’ – where
    else could they see a cancerous spot with a life of its own, ‘a nasty five-frog
    curse on the M4’ and ‘a resurgence of cheap jokes about poo-poo’? By pushing the
    envelope in representing death, violence and bodily taboo in animation – supposedly
    an ‘innocent’ medium – this merely encouraged and influenced the rest of the team
    to write more challenging material. Further, the use of animation helped to extend
    and develop satire as an approach, enabling what the Monty Python group were to
    dub a ‘stream of consciousness’ style of comedy that liberated itself from the
    need for conventional punchlines (The Pythons 2003: 134–6).


    Dustin Griffin, writing predominantly about literary satire, summarises what was
    the theoretical consensus about the form in the 1960s:


    > Satire is a highly rhetorical and moral art. A work of satire is designed to
    attack vice or folly. To this end it uses wit or ridicule. Like polemical rhetoric
    it seeks to persuade an audience that someone or something is reprehensible or
    ridiculous; unlike pure rhetoric, it engages in exaggeration and some sort of
    fiction. But satire does not forsake the ‘real world’ entirely. Its victims come
    from that world, and it is this fact (together with a darker or sharper tone)
    that separates satire from pure comedy. Finally, satire usually proceeds by means
    of clear reference to some moral standards or purposes. (Griffin 1994: 1)


    I have suggested in all of my work on animation as a form that it is inherently
    rhetorical and enunciative. Animation is *always* rhetorical on the basis that
    it is both an interpretation and an intervention in the representation of material
    and perceived reality. Its status as an illusionist, artificially constructed
    and self-figurative form (where the animator is always implied and present) lends
    it also an enunciative quality, in which it literally announces its difference
    from other forms of expression. In the context of Monty Python, it offers ‘bookends’
    to live-action and performed sketches or, alternatively, works as signifying signposts
    pointing backward and forward narratively and thematically. Gilliam uses animation’s
    rhetorical quality highly self-consciously both aesthetically and conceptually,
    making ‘vice’ and ‘folly’ highly relative, and rendering the ‘moral standards’
    of the programme in flux.


    Griffin argues that satire has changed significantly subject to its historical
    context and purpose, and, beyond its more didactic moral and social agenda, it
    is actually a vehicle for inquiry and exploration. The satire that emerged in
    the 1960s could no longer distinguish sharp differences between vice and virtue
    given that the sexual revolution and political mobilisation had collapsed any
    kind of certainty about ‘what man *is* and what he *ought* to be’ (Griffin 1994:
    36). Indeed, the whole notion of ‘difference’ and the early signs of an emergence
    of identity politics were promoting a greater relativity of ‘truth’ and challenging
    established ideas and practices. The rhetorical and enunciative status of animation
    was, therefore, an entirely pertinent vehicle by which to express contested issues
    through fresh modes of expression to challenge and discredit conventional orthodoxies.
    When a long-extended hand seeks to pull away the fig leaf from Michelangelo’s
    *David* (1501–4) and is slapped by the figure’s beautifully formed hand in one
    of Gilliam’s most famous animated vignettes, there resides a coded message about
    maintaining decency and decorum, a respect for art, culture and social norms.
    When the fig leaf is finally removed though, it reveals the face of film censor,
