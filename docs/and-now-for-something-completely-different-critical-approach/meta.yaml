  md: '# SOCIAL SATIRE AND EXISTENTIALISM: PUNCTURING THE POMPOUS AND PRETENTIOUS;
    JUVENAL, POPE AND SARTRE


    Chief among the roots and influences of Monty Python are social satire and existentialism.
    The great classical satirist of the powerful and the ordinary, Juvenal (55/60–127
    CE), exposed human vanity (Juvenal [2 CE] 1998) in ancient Rome, while Alexander
    Pope (1688–1744), drawing from Juvenal, took exquisite delight in puncturing the
    pomposity and artifice of those around him in aristocratic and society circles.
    He was deliberately nasty and cuttingly accurate in revealing the ridiculous celebration
    of the trivial and artificial among the rich in, for example, ‘The Rape of the
    Lock’ (1712), where the loss of a small piece of hair is treated as a cataclysmic
    event in the eyes of a socialite. Everywhere in satire the grinning skull beneath
    the painted skin is a target for exposure and wit which expose hubris, pomposity
    and a self-deluding belief in one’s own success, loveliness and time-defying modes
    of behaviour. The cry of *carpe diem*, seize the day and live it to the full,
    is always ironic, because death is just around the corner. Referencing Ernest
    Becker’s arguments that man seeks infinity but ultimately is ‘a worm and food
    for worms’ (Becker 1974: 26), Katarzyna Malecka sees in the Pythons’ work ‘man’s
    existential paradox’ (2014: 4).


    Mortal vulnerability unforgettably opens the first show. A giant foot stamps on
    a man’s head, which sprouts flowers; the head of a cabaret-dressed woman explodes;
    a falling angel squashes Cardinal Richelieu. The grey-suited announcer is in league
    with the mayhem of dead pigs and we are invited to consider the comedic drama
    of famous deaths, including that of Genghis Khan. This is dark comedy mixed with
    slapstick, carnival and cartoon.


    Satirical comedy from the farcical to the cuttingly mean has its partner in Gothic
    horror, which also punctures artifice, deliberately undercutting complacency,
    comfort based on maintaining pretence, holding off the terrible end just on the
    edge of the precipice. Horror also represents people as objects, as does comedy.
    Each has its taboos: death, the decaying body, religion. Each treats complacencies
    as revelations of insecurities. What they also have in common is a reduction of
    human vitality to the objectification of the manipulated. Dehumanisation accompanies
    defamiliarisation. Things and people are not just rendered strange, weird, unfamiliar;
    they are exposed as mindless objects.


    The vanity of human wishes, the skull beneath the skin, are inevitabilities. Everything
    is just a construct, in decay, and every attempt at fancy clothing, grandeur,
    is a show. Self-delusion is dangerously blinkered, unutterably silly and hilarious
    to the acute eye of the satirist and their audience. This kind of social satire
    has its excessive, exploding hilarity in pantomime, in carnival, in switching
    gender codes and dress, social roles, exposing artifice while demonstrating excess
    in dressing up, painting, self-display. For the Monty Python troupe, the satirical
    tradition of Juvenal and Pope, which critiqued the vanity of human wishes, is'
