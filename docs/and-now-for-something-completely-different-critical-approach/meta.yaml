    that. I was in that phase where I was smashing things and it was funny. That kind
    of violence always seemed very funny to me. It was also at a time when the world
    was very anti-violence because the war was on. (McCabe 1999: 35)


    This ‘violent’ expression, though, has some correspondence with Warner’s four
    modes of metamorphosis – mutating, hatching, splitting and doubling (see Warner
    2002) – which are all predicated on the protean condition of animation in representing
    the body, object or environment that Gilliam readily exploits. At best, ‘character’
    for Gilliam is either a figure deliberately used for their symbolic or social
    identity (i.e. Trevelyan or Grace, noted above), or an iconic image from a mediated
    visual source (i.e. people from Victorian photographs or fine art masterpieces).
    Fundamentally, then, if the tableau gag in Disney 2D animation is in some way
    an *organic metamorphosis* – a consequence of character mutability in an extreme
    situation (see Wells 1998: 69–75) – then the tableau gag for Gilliam is a consequence
    of a *disruptive metamorphosis* that creates and extends an extreme situation.


    Gilliam’s interest in tableau starts specifically in improvising visual jokes
    using old Edwardian and Victorian photographs. The overtly ‘posed’ nature of figures
    and the sense that ‘stillness’ has been imposed upon them makes their postures
    all the more awkward and static. As such, Gilliam’s interventions speak to the
    lack of ‘life’ in the figures, and begin to permit the breaking, entering, consuming
    and altering that are the stock of his visual interventions. A standing woman
    chastises a sitting man to ‘sit up’, punching and cajoling him until his whole
    figure spins out of the chair (‘Breaking’). In another image, figures seem to
    fight under the crinolines of a woman’s dress (‘Breaking’), her head disappearing
    down into her body to investigate (‘Entering’). As a small girl approaches, those
    in dispute insist they stay quiet, before a man’s head appears replacing the woman’s
    (‘Entering’). In yet another, a portrait of a soldier is presented and figures
    appear in his mouth and form under his medals, crying out that they are trapped
    and want to escape (‘Entering’). A figure then cuts away the top of the cranium
    from the inside (‘Altering’) and emerges to freedom, only to be ‘recaptured’ in
    a highlander’s bearskin headwear (‘Consuming’). A standing male figure in another
    photograph removes the whole of a seated lady’s clothing in a single reveal as
    if he were removing a tablecloth or picking up a food dome to show a meal (‘Altering’).
    The man puts on a Zorro-like eye-mask as if this disguises him as the woman sits
    in the nude, the couple re-dressing upon the approach of a police constable in
    the foreground of the image (‘Altering’). In a seated portrait, a man’s hair becomes
    ‘wings’ and his head starts to fly away (‘Altering’), only to be reclaimed by
    an arm emerging from within his body (‘Entering’). In a more daring visual gag,
    a sporran appears to eat away the bottom half of a soldier (‘Consuming’), before
    metamorphosing into a young girl’s hair, which in turn becomes a young girl figure
