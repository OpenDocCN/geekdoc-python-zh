  - '[PAGE 158]


    Furthermore, the status of this cultural material as *television* is significant.
    Television''s social role is predicated on the notion that there is a relatively
    coherent idea of the public that it serves, and it is for this reason it is a
    mass medium. Comedy often inscribes that collective public within its textual
    elements, with the laugh-track functioning as a signal to the viewer at home of
    how others reacted to what is being depicted. Monty Python has a laugh-track,
    and in doing so evidences to its viewers not only how these sketches should be
    understood, but also evidences that they were understood as such by real people.
    But this collective can only ever be anthropocentric; the laugh-track is a tool
    by which human cultures signal their collective certainties about what is and
    is not funny. It is then humans that decide that a dead parrot is funny, that
    an albatross for sale is funny, that a bored cat is funny. And humans signal their
    assent to this delineation through the laugh-track that evidences it. So even
    if the content of some of these sketches might trouble assumptions that underpin
    human–animal relations, they do not – and cannot – trouble the authority humans
    give themselves to offer up representations of others, and to come to a consensus
    about the meaning and value of those representations. This means that the animals
    on display here can only ever be comic objects, whose representation serves no
    purpose that is not anthropocentric.


