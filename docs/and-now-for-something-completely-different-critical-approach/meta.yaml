    of the pompous and the powerful is undercut, exposing hubris and the vanity of
    human wishes, and revealing that wet blanket, mortality, the skull beneath the
    skin. Carnival, the rebellion and table-turning of the proletariat, might be temporary,
    after which the toys are put back in the box and everything returns to order,
    but these explosive critical moments of radical energy destabilise carefully maintained
    rules and belief systems. It can and will happen again. Monty Python’s surreal
    comedy, often expressed in Terry Gilliam’s active artwork, is destabilising and
    will not let any of us remain complacent, conservative, foolishly reassured that
    the structures of behaviour, belief, right and wholeness of self, family, religion,
    civil society, the divine right of kings, are solid. They are exposed as rather
    tentative, delicate, foolish human constructs subject to dissolution. Monty Python
    causes laughter and unease. The more unease, the more unsettled the audience;
    the more laughter, the more release. Mortality, death, is also the last laugh.


    ## PANTOMIME AND ANGELA CARTER


    Pantomime, a grand old British carnival tradition of class and gender reversals,
    is another key influence on Monty Python. Angela Carter, whose family lived a
    middle-class family life in South London, was brought up on Hollywood films and
    the carnival excess and performance of British pantomime, embedded in the class
    system. She writes of pantomime, ‘in pantoland, everything is grand. Well let’s
    not exaggerate – grandish. Not like what it used to be but, then what isn’t, even
    so, it is brightly coloured – garish in fact’ (Carter 1991: 1); ‘everything is
    excessive, sexualised, phallic or else demonically aggressively female’ (ibid.).
    There is an emphasis on procreation as comic and ‘nostalgia for naval heroes,
    the rise of the poor, for instance Dick Whittington and his cat are set against
    “Baron Hardup of Hardup Hall”, father of Cinderella, stepfather of the ugly sisters’
    (ibid.: 2). Music, ‘illusion and transformation’ (ibid.: 1) predominate, mixing
    the real (horses on stage) and the cartoon illusory (pantomime horses on stage).
    Pantomime’s power is to undermine and query power: ‘in pantoland, which is the
    carnival of the unacknowledged and the fiesta of the repressed, everything is
    excessive and gender is variable’ (ibid.: 4). It is based, as is *Twelfth Night*,
    on the mid-winter carnival of the Feast of Fools, and ‘the orgiastic non-time
    of the Solstice, which once upon a time, was also the time of the Saturnalia,
    the topsy-turvy time . . . when a master swapped places with a slave and anything
    could happen’ (ibid.). Carter’s well-researched exploration of that very British
    tradition of panto delves back historically and out internationally for roots.
    She does not talk of her contemporaries, Monty Python (Terry Jones interviewed
    her in 1981), but these are also the roots of their very British social satire:
    rebellion against social hierarchy, heritage, wealth. The dressing up and bizarre
    rituals of the rich are rendered first foolish, then challenged and overturned
    by the riotous poor in brief Saturnalian carnivalesque moments, puncturing the
    class system’s constructions at Twelfth Night, at carnival, in panto, and in the
    tradition of British satire of which the Pythons are the great twentieth-century
    champions.


    Like Carter, the Pythons range far and wide through history, myth and religious
    systems to undermine the seeming solidity of the constructions of class and the
    many ritualistic, spiritual and physical issues around death. Like panto, they
    cross-dress, use cartoon excess (not Dick Whittington’s Cat but killer kitty),
    bawdy musical interludes and prat falls. Their satire reveals the elision of the
    untouchable belief systems of worth through birth and of the finality (or not)
    of death. Breeding, inheritance, heredity, the ‘solid’ base on which class systems
    are based, and the belief systems around death, a highly elaborate constructedness
    of ritual, medical, cosmetic, religious and spiritual, which attempts to defy
    and deny death, set against its terror, physical corruption and decay, are equally
    sent up. The running sores beneath the skin, the taboos and terrors of death and
    the afterlife, are exposed symbolically, debunked, flouted. Fundamentally class
    and belief systems are undercut by both the accident of birth and the inevitability
    of death.


    Pantomime, carnival, satire and Monty Python revel in each of these. And they
    do so in a very British way.


    ## ‘Upper Class Twit of the Year’


    The first series established a delightful lack of reverence and decorum for the
    British ruling classes in the ‘Upper Class Twit of the Year’ sketch, which parodied
    both the endless competitive drive and the utter incompetence, physical and mental,
    of these future rulers of the nation. It opens on a sporting pitch with some kind
    of race about to take place. Everyone and everything is dysfunctional. Identical
    with bowler hats and receding chins, Gervaise, Vivian, Oliver, Simon, Nigel (their
    names are upper class; they haven’t a clue) can’t respond to starter’s orders
    because they can’t cope with directions, or a sense of direction. The hurdles
    are puny, like matchboxes, yet these public school, bowler-hatted, incompetent
    twits have no idea how to tackle them. The suggestion is that inbreeding among
    the upper classes is so complete that there is no brain left, although each is
    a stockbroker or similar with a powerful influential job probably through nepotism,
    so these clearly physical and mental incompetents blindly succeed due to their
    inherited wealth and entitlement. Prestige and influence substitute for intelligence
    and worth. Their runs are versions of the Ministry of Silly Walks. They are totally
    unable to connect brain and body, and run at the high jump wooden frames, which
    they are meant to go under. Lacking direction and any skills, they tackle taking
    the bras off the dummies, which end up broken. Oliver runs himself over. In the
    end they determine who wins according to who has shot themselves, so the podium
    has only coffins on it. They’re so totally stupid, destroying themselves so sportingly.
    A range of ‘chinless wonders’ and upper-class twits with double-barrelled names
    limp and lisp through the Monty Python series, sending up any notion of class
    superiority.


    ## THE PARROT IN THE ROOM


    Death, the threat of death, its inevitability; the power over life and death operated
    by religious men in power; sorcery and physical decay; the whole querying of the
    liminality between life and death: these are very big issues that draw in politics,
    religion, law, psychology, social hierarchies, justice and inevitability. Death
    is the ‘elephant in the room’, rarely spoken of except in tones of reverence and
    sadness, despair and apprehension. It might be a great leveller, but it also offers
    many opportunities for black comedy and irreverence.


    In the ‘Dead Parrot’ sketch, a pet is returned to a pet shop. The parrot was obviously
    passed off as alive and well when sold, and has now passed on. Whatever collusion
    took place between the salesman and new owner at that point is unknown, but the
    ontological state of the returned parrot is, it would seem, indisputable, as it
    is clearly not moving and looks stuffed. We suspend disbelief watching drama.
    A stuffed parrot could pass as live on stage with our agreement, but this scene
    highlights the artifice and the collusion of comedy sketches as drama, while itself
    being a mixture of the earthy and the surreal. It is an everyday annoyance, returning
    shoddy goods and having sales people insist that you are in the wrong rather than
    that the purchase is flawed or their marketing policies are flawed. The ‘Dead
    Parrot’ sketch combines issues of death and social hierarchies, a clash between
    pet shop owner (an expert) and an irate customer (a man with the money and the
    rights). This is an argument based on power and knowledge. This parrot was indeed
    a shoddy purchase; it is actually dead. The sketch also exemplifies the relative
    experience of death, set against its finality: disputed but also proven. The shuffling
    of the truth, the pretence, the sly little jibes selected from the repertoire
    of bawdy and erudition, and a linguistic range which moves between low-level cunning
    and intellectual referencing of French art, philosophy and political traditions
    makes this and so many other Python scenes hilarious on a whole range of levels.
    The Python team were able to insert the ridiculous into the everyday, facetiously
    showing off their own knowledge while bringing in sardonic, satirical wit to puncture
    pretentiousness. Everyday exchanges in the street between people take on a resonance
    of absurdity, so that after Python it is not possible to take anything as given:
    the class system, myths and behavioural systems, even our approaches to death.'
  mdcn: '那些随之而来并限制世界观的信仰与结构。权贵阶层的虚伪被削弱，暴露出人类的傲慢与虚妄，揭示出那令人扫兴的真相——死亡，即皮肤之下的骷髅。无产阶级的狂欢、反叛与颠覆或许只是暂时的，之后玩具会被放回盒子，一切重归秩序，但这些充满激进能量的爆炸性批判时刻，动摇了精心维护的规则与信仰体系。它能够并且将会再次发生。蒙提·派森的超现实喜剧，常通过特里·吉列姆充满活力的艺术作品表达，具有颠覆性，不会让我们任何人安于现状、保守自满，愚蠢地确信行为、信仰、权利以及自我、家庭、宗教、公民社会、君权神授的完整结构是稳固的。它们被揭露为相当试探性、脆弱、愚蠢的人类建构，随时可能瓦解。蒙提·派森引发笑声与不安。越不安，观众越动荡；越欢笑，越释放。死亡，亦是最后的笑声。


    ## 哑剧与安吉拉·卡特


    哑剧，一种古老的英国狂欢传统，涉及阶级与性别的颠倒，是蒙提·派森的另一个关键影响。安吉拉·卡特，其家庭在伦敦南部过着中产阶级生活，自幼受好莱坞电影和英国哑剧的狂欢过度与表演熏陶，这些都根植于阶级体系。她写道：“在哑剧王国，一切都是宏大的。好吧，别夸张——算是宏大吧。不像过去那样，但话说回来，什么不是呢？即便如此，它色彩鲜艳——事实上是俗艳的”（卡特
    1991: 1）；“一切都是过度的、性化的、阳具崇拜的，否则就是恶魔般具有攻击性的女性化”（同上）。强调生育作为喜剧，以及“对海军英雄的怀旧，对穷人崛起的向往，例如迪克·惠廷顿和他的猫，与‘困难厅男爵’——灰姑娘的父亲、丑姐姐们的继父——形成对比”（同上:
    2）。音乐、“幻觉与转变”（同上: 1）占主导，混合了真实（舞台上的马）与卡通幻象（舞台上的哑剧马）。哑剧的力量在于颠覆和质疑权力：“在哑剧王国，即未被承认者的狂欢节和被压抑者的嘉年华，一切都是过度的，性别是可变的”（同上:
    4）。它基于，如同《第十二夜》一样，中冬愚人节的狂欢节，以及“至日的狂欢无时间性，曾几何时，这也是农神节的时间，颠倒的时间……主人与奴隶互换位置，任何事情都可能发生”（同上）。卡特对这一非常英国传统的深入研究，从历史和国际根源中探寻。她没有提及她的同代人蒙提·派森（特里·琼斯于1981年采访过她），但这些也是他们非常英国式社会讽刺的根源：反抗社会等级、传统、财富。富人的装扮和怪异仪式首先被渲染得愚蠢，然后被短暂的农神节狂欢时刻中喧闹的穷人挑战和颠覆，在《第十二夜》、在狂欢节、在哑剧中，以及在派森作为二十世纪伟大代表的英国讽刺传统中，戳穿了阶级体系的建构。


    像卡特一样，派森广泛涉猎历史、神话和宗教体系，以颠覆阶级建构的表面稳固性，以及围绕死亡的众多仪式、精神和身体议题。像哑剧一样，他们反串，使用卡通式的夸张（不是迪克·惠廷顿的猫，而是杀手小猫），粗俗的音乐插曲和跌倒。他们的讽刺揭示了通过出身获得价值的不可触碰信仰体系的模糊性，以及死亡的终结性（或非终结性）。血统、继承、遗传——阶级体系所基于的“坚实”基础，以及围绕死亡的信仰体系——一种高度精心构建的仪式、医疗、美容、宗教和精神体系，试图反抗和否认死亡，与其恐怖、肉体腐烂和衰败相对立——同样被嘲弄。皮肤之下的溃烂、死亡与来世的禁忌和恐惧，被象征性地揭露、揭穿、藐视。从根本上说，阶级和信仰体系被出生的偶然性和死亡的必然性所削弱。


    哑剧、狂欢、讽刺和蒙提·派森沉醉于其中每一点。并且他们以一种非常英国的方式做到这一点。


    ## “年度上流社会蠢货”


    第一季通过“年度上流社会蠢货”小品，确立了对英国统治阶级令人愉悦的缺乏敬意和礼仪，该小品讽刺了这些国家未来统治者无尽的竞争驱动力以及身体和精神上的完全无能。开场于运动场，某种比赛即将开始。每个人和每件事都功能失调。戴着圆顶礼帽、下巴后缩的加维斯、维维安、奥利弗、西蒙、奈杰尔（他们的名字是上流社会的；他们毫无头绪）无法响应起跑指令，因为他们无法处理方向或方向感。跨栏微不足道，像火柴盒，但这些公学出身、戴圆顶礼帽、无能的蠢货不知道如何应对。暗示是上流社会的近亲繁殖如此彻底，以至于没有留下大脑，尽管每个人都可能是通过裙带关系获得有影响力的职位的股票经纪人或类似人物，因此这些明显身体和精神无能的人盲目地因其继承的财富和特权而成功。声望和影响力取代了智力和价值。他们的奔跑是“愚蠢行走部”的变体。他们完全无法连接大脑和身体，跑向本应钻过去的跳高木架。缺乏方向和任何技能，他们试图从假人身上取下胸罩，结果假人被弄坏了。奥利弗把自己撞倒了。最终他们根据谁开枪打中自己来决定谁赢，因此领奖台上只有棺材。他们如此彻底地愚蠢，如此运动般地摧毁自己。一系列“无下巴的奇迹”和拥有双姓的上流社会蠢货在蒙提·派森系列中蹒跚学语，嘲弄任何阶级优越的观念。


    ## 房间里的鹦鹉


    死亡，死亡的威胁，其必然性；掌权宗教人士对生死的权力；巫术与肉体衰败；对生死之间阈限性的全面质疑：这些是涉及政治、宗教、法律、心理学、社会等级、正义和必然性的重大议题。死亡是“房间里的大象”，很少被提及，除非以崇敬和悲伤、绝望和忧虑的语气。它可能是一个伟大的平衡器，但也为黑色喜剧和不敬提供了许多机会。


    在“死鹦鹉”小品中，一只宠物被送回宠物店。鹦鹉在出售时显然被冒充为活蹦乱跳，现在已经去世了。当时销售员和新主人之间发生了什么勾结不得而知，但送回的鹦鹉的存在状态似乎是无可争辩的，因为它显然没有动，看起来像是标本。我们在观看戏剧时暂停怀疑。一只标本鹦鹉在舞台上可以冒充活的，只要我们同意，但这个场景突出了喜剧小品作为戏剧的人为性和勾结性，同时它本身是粗俗与超现实的混合。这是日常的烦恼，退回劣质商品，而销售人员坚持认为你错了，而不是购买有缺陷或他们的营销政策有缺陷。“死鹦鹉”小品结合了死亡和社会等级的问题，宠物店老板（专家）与愤怒顾客（有钱有权利的人）之间的冲突。这是一场基于权力和知识的争论。这只鹦鹉确实是一次劣质购买；它实际上是死了。这个小品也体现了死亡的相对经验，与其终结性相对：有争议但也被证明。真相的掩饰、伪装、从粗俗和博学的曲目中挑选出的狡猾小嘲讽，以及在低级狡猾和对法国艺术、哲学和政治传统的智力引用之间游走的语言范围，使得这个以及许多其他派森场景在多个层面上都令人捧腹。派森团队能够将荒谬融入日常，诙谐地炫耀自己的知识，同时引入讽刺、讽刺的智慧来戳穿自负。街头人与人之间的日常交流产生了荒诞的共鸣，以至于在派森之后，不可能再将任何事情视为理所当然：阶级体系、神话和行为体系，甚至我们对待死亡的方式。'
