- md: '# AND NOW FOR SOMETHING COMPLETELY DIFFERENT


    # AND NOW FOR SOMETHING COMPLETELY DIFFERENT


    Critical Approaches to Monty Python


    Edited by Kate Egan and Jeffrey Andrew Weinstock


    EDINBURGH University Press


    Edinburgh University Press is one of the leading university presses in the UK.
    We publish academic books and journals in our selected subject areas across the
    humanities and social sciences, combining cutting-edge scholarship with high editorial
    and production values to produce academic works of lasting importance. For more
    information visit our website: edinburghuniversitypress.com


    © editorial matter and organisation Kate Egan and Jeffrey Andrew Weinstock, 2020

    © the chapters their several authors, 2020


    Edinburgh University Press Ltd

    The Tun – Holyrood Road

    12(2f) Jackson’s Entry

    Edinburgh EH8 8PJ


    Typeset in 10/12.5 pt Sabon

    by IDSUK (DataConnection) Ltd, and

    printed and bound in Great Britain


    A CIP record for this book is available from the British Library


    ISBN 978 1 4744 7515 0 (hardback)

    ISBN 978 1 4744 7517 4 (webready PDF)

    ISBN 978 1 4744 7518 1 (epub)


    The right of Kate Egan and Jeffrey Andrew Weinstock to be identified as the editors
    of this work has been asserted in accordance with the Copyright, Designs and Patents
    Act 1988, and the Copyright and Related Rights Regulations 2003 (SI No. 2498).


    # CONTENTS


    - List of Figures vii

    - Acknowledgements viii

    - Notes on Contributors ix


    ‘It’s . . . The Introduction’

    *Kate Egan and Jeffrey Andrew Weinstock* 1


    # PART ONE SITUATING PYTHON


    - 1. Six Comics in Search of a . . . : Monty Python and Absurdist/Surrealist Theatre

    *Rick Hudson* 23


    - 2. ‘None shall pass’ and ‘The skull beneath the skin’: Monty Python, the British
    Class System and Death

    *Gina Wisker* 39


    - 3. Der Ver Zwei Peanuts: Depictions of a Distant War in *Monty Python’s Flying
    Circus*

    *Anna Martonfi* 57


    # PART TWO PYTHON’S PRACTICES, FORMS AND MEDIUMS


    - 4. The Royal Philharmonic Goes to the Bathroom: The Music of Monty Python

    *James Leggott* 75


    AND NOW FOR SOMETHING COMPLETELY DIFFERENT


    - 5. The Disruptive Metamorphoses of an Impish God: Gilliam’s Satiric Animation

    *Paul Wells*


    - 6. Figures Traced in Shite: The Scribe, The Illuminator and Monty Python’s *Holy
    Grail*

    *Ewan Wilson*


    # PART THREE CONTEXTS AND REPRESENTATIONS


    - 7. Grannies from Hell, Daring Bicycle Repairmen, Upper-Class Twits and ‘Make
    Tea Not Love’: *Monty Python’s Flying Circus* and 1960s British (Popular) Culture

    *Caroline Langhorst*


    - 8. The Parrot, the Albatross and the Cat: Animals and Comedy in Monty Python

    *Brett Mills*


    - 9. ‘Political Correctness’, Reversal and Incongruity: Dynamics of Humour in
    *Life of Brian*

    *Kathleen J. Cassity*


    # PART FOUR CULT, FANDOM AND PYTHON


    - 10. Philosophy, Absurdity, Waste and *The Meaning of Life*: A Cult Film, of
    Sorts

    *Ernest Mathijs*


    - 11. In Praise of Silliness: The Cult of Python

    *Jeffrey Andrew Weinstock*


    - 12. Memories of Connecting: Fathers, Daughters and Intergenerational Monty Python
    Fandom

    *Kate Egan*


    - Index


    # FIGURES


    - I.1 Michael Palin’s ‘It’s’ Man: *Monty Python’s Flying Circus* (1969–74) 2

    - I.2 Cleese shows Undertaker Chapman his mother in the sack: *Monty Python’s
    Flying Circus*, episode 26 (1970) 6

    - 10.1 *Monty Python’s The Meaning of Life* (1983) and *The Rocky Horror Picture
    Show* (1975): *joie de vivre éclatante* 179

    - 10.2 Hyperbole and waste at work in *The Meaning of Life* 183

    - 10.3 The end of *The Meaning of Life*: A solid rant on entertainment today 186

    - 11.1 Just a flesh wound: *Monty Python and the Holy Grail* (1975) 197

    - 11.2 Moøse control: *Monty Python and the Holy Grail* 201

    - 11.3 Arthur confronts the Knights Who Say Ni: *Monty Python and the Holy Grail*
    202

    - 12.1 The higher percentage of 18–35-year-olds in the ‘Dad Memories Group’ compared
    to the *Monty Python Memories* database as a whole 210

    - 12.2 The higher percentage of female respondents in the ‘Dad Memories Group’
    compared to the *Monty Python Memories* database as a whole 211


    # ACKNOWLEDGEMENTS


    We would like to thank everyone at Edinburgh University Press, particularly Gillian
    Leslie and Richard Strachan, for their guidance and investment in this book project,
    and Ernest Mathijs for suggesting that we work together as editors on a book on
    Monty Python!


    Kate would also like to thank Sian Barber, Martin Barker, Beck Edwards, Russ Hunter,
    Stephanie Jones, Paul Newland, Tim Noble, Lisa Richards, Jamie Sexton and Justin
    Smith for their feedback and encouragement.


    # NOTES ON CONTRIBUTORS


    **Kathleen J. Cassity** holds a PhD in English from the University of Hawaii-Manoa
    in Honolulu, Hawaii, USA. She currently serves as Dean of the College of Liberal
    Arts and Sciences and Professor of English at Western Oregon University in Monmouth,
    Oregon, USA. Dr Cassity has published and presented several papers and book chapters
    relating to humour, including a recent article on *Life of Brian* published in
    the *Journal of Religion and Film*. She is also co-editor of an anthology of Anglo-Indian
    writing, *Curtain Call: Anglo-Indian Reflections*. Her scholarly interests include
    liberal arts advocacy, writing pedagogy, life writing/memoir and Anglo-Indian
    narrative.


    **Kate Egan** is Senior Lecturer in Film and Media at Northumbria University,
    UK, and the author of *Trash or Treasure? Censorship and the Changing Meanings
    of the Video Nasties* (2007), *Cultographies: The Evil Dead* (2011) and (with
    Martin Barker, Tom Phillips and Sarah Ralph) *Alien Audiences* (2015). She is
    also co-editor (with Sarah Thomas) of *Cult Film Stardom* (2012). She is currently
    conducting research on the local censorship of *Monty Python’s Life of Brian*
    throughout the UK in the late 1970s and early 1980s, and is writing up her findings
    from an international audience project on audience memories of Monty Python.


    **Rick Hudson** has written professionally since leaving school and has had his
    fiction not only broadcast by the BBC, but widely published in collections and
    professional magazines. He has written experimental literary fiction, popular
    genre fiction and work that sits somewhere between these two poles. Rick also
    works in game design and has produced game materials for computer game companies
    and table-top role-playing games. In addition, Rick is an English Literature academic
    who lectures on fantasy/SF and horror fiction, TV and film. His previously published
    academic work includes chapters in: Christopher Shaberg (ed.) *Deconstructing
    Brad Pitt* (2014) and Lynn Whitfield, Paul N. Reinarch and Robert G. Weiner (eds)
    *Python Beyond Python* (2016).


    **Caroline Langhorst** holds a BA in Film Studies and British Studies and a MA
    in Film Studies from the University of Mainz, Germany. She is currently working
    on her PhD thesis on male rebellion and rebellious actors in 1960s British cinema
    at the Cinema and Television History Research Institute (CATHI), De Montfort University
    Leicester, UK. Her main research interests include British and American cinema,
    television, popular music and culture, gender studies, star studies and acting/performance
    studies as well as the ‘long’ 1960s and the counterculture.


    **James Leggott** is Senior Lecturer in Film and Television at Northumbria University,
    UK. He has published on various aspects of British film and television culture.
    He is the author of *Contemporary British Cinema: From Heritage to Horror* (2008),
    and the co-editor of *No Known Cure: The Comedy of Chris Morris* (2013), *British
    Science Fiction Film and Television: Critical Essays* (2011) and *Upstairs and
    Downstairs: British Costume Drama Television from The Forsyte Saga to Downton
    Abbey* (2019). He is also the principal editor of the *Journal of Popular Television*.


    **Anna Martonfi** completed her PhD at the University of East Anglia, UK, examining
    transnational aspects of Jewish humour in British and Hungarian films in the inter-war
    era. Her research interests include British radio, television and film comedy,
    transnational humour, Hungarian comedies of the inter-war era, and Jewish comedy;
    and she has also published on how the translation and transcreation of audiovisual
    texts, including animation, impacts the cultural complexities of interpretation.
    She currently works as Lecturer at the Vrije Universiteit Amsterdam, and as Visiting
    Lecturer at Universiteit Leiden.


    **Ernest Mathijs** is a Professor in Film and Media Studies at the University
    of British Columbia, Canada. He researches cult film, genre cinema and European
    film. He has written on the reception of digital cinema and fantasy (*The Hobbit*
    and *The Lord of the Rings*), on Belgian cinema, *The Room*, and on the activism
    and acting of Delphine Seyrig. He has also published *100 Cult Films*, *Cult Cinema*,
    and *The Cinema of the Coen Brothers*.'
