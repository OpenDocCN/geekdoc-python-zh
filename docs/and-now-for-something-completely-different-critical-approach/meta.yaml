  md: 'A clear example of reversal takes place earlier in the film, when the Legionaries
    attempt but ultimately fail to restrain their laughter in the face of the phallocentric,
    imperial social order represented by Pilate. Here, the troops inform Pilate that
    they doubt the would-be revolutionary Brian’s claim to Roman paternity, since
    his absent father’s purported name, ‘Naughtius Maximus’, is clearly a joke name,
    ‘like Biggus Dickus’. That name, Pilate counters, is *not* a joke; the Romans
    in power apparently take their phallocentrism seriously. Pilate makes it clear
    that he expects an answer of ‘No’ when he then asks his assembled troops, ‘Do
    any of the rest of you find anything funny about the name Biggus Dickus?’ Here
    the complete ridiculousness of Pilate’s unchecked power and fragile masculinity
    breaks through in laughter that the assembled Legionaries attempt yet fail to
    suppress – a semiotic eruption through the symbolic walls, to invoke a Kristevian
    analysis – leading to one of the film’s funniest moments while at the same time
    demonstrating both Pilate’s fragility and his self-delusion.


    Both in this and in the later ‘Release Roger’ scene, everyone aside from Pilate
    and Biggus seems to understand the absurdity of life and their own relatively
    minor place in the larger scheme of things. The dictatorial authority figures,
    blind to their own unpopularity as well as to the arbitrariness and ultimate cruelty
