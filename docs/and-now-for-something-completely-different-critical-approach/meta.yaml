    **Kate Egan** is Senior Lecturer in Film and Media at Northumbria University,
    UK, and the author of *Trash or Treasure? Censorship and the Changing Meanings
    of the Video Nasties* (2007), *Cultographies: The Evil Dead* (2011) and (with
    Martin Barker, Tom Phillips and Sarah Ralph) *Alien Audiences* (2015). She is
