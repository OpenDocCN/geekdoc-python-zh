    # MONTY PYTHON''S LIFE OF BRIAN (1979): SOCIAL HIERARCHY AND DEATH


    In *The Secret Life of Brian*, a 2007 TV documentary reflecting on an earlier
    TV debate (1979) with Malcolm Muggeridge and the Bishop of Southwark, systems
    of control based on belief came under scrutiny when the Pythons discussed a range
    of theoretical versions of religious moments in *The Life of Brian* (1979). They
    argued how, in reading this film as blasphemous, some viewers in some cultures,
    including the UK and US, missed the point. Their desire was to show the life and
    death of an ordinary bloke, an everyman, Brian, alongside Christ. They focus in
    this film, and across their work, on socially constructed hierarchies, constraining
    belief systems, and on mortality and death. This comic treatment is part of dealing
    with taboo subjects through normalising them. It is also part of a tradition of
    black humour and irreverent satire that, in the Monty Python troupe, mixes, in
    an unusual, idiosyncratic manner, with surrealism, the fantastic spliced with
    the realistic. Focusing on both British and international contexts and examples,
    Monty Python are known for debunking grand beliefs, myths, oppression and historical
    grand narratives in equal measure, often through replaying those myths and narratives.


    According to Laura Basu (2014), Terry Jones in an interview in 2011 stated he
    would not make a movie like *The Life of Brian* now as it would be too risky in
    the climate of religious resurgence. It did, however, produce what Giselinde Kuipers
    (2011: 177) calls a ‘humour scandal’, which surprised the Pythons. Terry Jones
    commented to the *Radio Times* that, at that time, religion ‘seemed to be on the
    back burner and it felt like kicking a dead donkey’ (Jones 2011). However, there
    was a backlash against the film (e.g. see Hewison 1981). Basu marvels at how little
    storm *Four Lions* (Morris 2010), about a set of London jihadis, caused and how
    much *The Life of Brian* caused, considering issues of free speech.


    *The Life of Brian* tells the story of Brian (Graham Chapman), an ordinary everyday
    Jewish boy born at the same place and time as Jesus, who gets mistaken for him.
    Brian, whose mother is called Mandy (Terry Jones), discovers his father might
    have been a Roman soldier, joins a Jewish resistance group and a protest, and
    ends up on a cross, encouraged by a fellow sufferer to sing ‘Always look on the
    bright side of life’. Another line, ‘Always look on the bright side of death/Just
    before you draw your terminal breath’, is even more blackly humorous, since the
    group on the crosses are facing crucifixion.


    The Pythons were somewhat bemused at the extremist religious backlash to the film.
    When Jesus appears he is always played straight as baby Jesus with a halo, or
    as an adult, for example at the sermon on the mount, while the comedy is directed
    not at the Christian religion but ‘towards the blind following of leaders and
    doctrines, and its disastrous consequences’ (Basu 2014: 180). At the time, Eric
    Idle said ‘it became clear early on that we couldn’t make fun of'
- md: 'the Christ since what he said is very fine (and Buddhist), but the people around
    him were hilarious and still are!'' (Morgan 1999: 174). Philip Davies''s theological
    research explores and exposes the careful work done here (Davies 1998: 400). Rather
    than an attack on the Bible, the film is a well-researched satirical tool particularly
    aimed at ''a universal picture of human absurdity'', as Basu (2014: 181) notes.
    In one scene a Roman centurion, played by John Cleese, discovers Brian writing
    ''Romans go home'', and in a very public-school teacher manner insists he write
    it as lines, as a punishment. This anti-Roman graffiti therefore gets replicated
    hundreds of times on the palace wall, so ''Britain''s deeply entrenched class
    system and its stuffy establishment figures thereby become objects of fun'' (ibid.).


    *The Life of Brian* was the subject of scholarly lectures in Auckland (2016) following
    a London conference (and book) (Taylor 2015) uncovering how the film and Brian
    himself are carefully based on scholarship about the historical Jewish Jesus.


    > That was very much key stuff in the 1970s. But the main point is that Brian
    is not Jesus – he is mistaken for a Messiah when he is an ordinary guy. The real
    Messiah exists but people misunderstand him and complain about him. (Taylor 2016)


    Essentially the normalising of Brian undercuts hierarchies – religious and social.
    While emphasising the often-problematic ways in which people act in concert to
    perpetuate evils against each other, some social, some leading to persecution
    and death, Brian is a voice for sensible equality rather than religious or mythically
    inspired views of who has power and rights.


    **Brian:** Look you''ve got it all wrong. You don''t need to follow me. You don''t
    need to follow anybody! You''ve got to think for yourselves, you''re all individuals!

    **Crowd** (in perfect unison): Yes, we''re all individuals.

    **Brian:** You''re all different!

    **Crowd:** Yes, we''re all different,

    **Homogeneous man:** I''m not.

    **Crowd:** [multiple silencing sounds]

    **Brian:** You''ve all got to work it out for yourselves!

    **Crowd:** Yes, we''ve got to work it out for ourselves!

    **Brian:** Exactly!

    **Crowd:** Tell us more!


    Death, social hierarchies and the class system lie at the heart of the film. While
    the Pythons are very British (apart from Gilliam) in location, dress and history,
    revelling in self-mockery of self-aggrandisement, which itself is also very British,
    their references are also continentally European, Middle Eastern, their influences
    international.


    ## DEATH COMES TO DINNER: Monty Python''s THE MEANING OF LIFE (1983)


    Nobody expects the Spanish Inquisition, but perhaps if they have (or even if they
    have not) read Edgar Allan Poe''s ''The Masque of the Red Death'' (1842) they
    would recognise an uninvited dinner guest who will devastate their rich complacency
    and remind them sharply of mortality. Social class and death come together in
    *The Meaning of Life*, Part 7 (1983). The Grim Reaper, Death himself, with hood
    and scythe, desolate location and blasted tree, heads towards a lone building
    and knocks at a door. A man in a suit answers, dealing with this arrival like
    any other visitor and introducing him to the twee little middle-class candle-lit
    dinner party with ''Mr Death''s come about the reaping, I don''t think we need
    anything''. They''re polite of course, they''re middle class, so they invite him
    in for a drink and some post-prandial conversation but Death does not know the
    norms of genteel behaviour (and he is rather repetitive and boring). They try
    to bring him into the conversation about a death which they''ve just been talking
    about but he keeps saying ''I am the grim reaper'', rejects red wine and insists
    he''s not of this world. None of this interaction works well for either party.
    This is not enough dinner conversation for the little gathering, and his ultimate
    power and grandeur are undermined by their prosaic expectations.


    ## CONCLUSION


    As Parkes notes of Monty Python in general:


    > Like all popular avant-garde art, its appeal was beautifully basic. This was
    comedy stripped to its root: two incompatible ideas colliding, noisily and painfully.
    Comedy returned to its primary purpose: to inform the powerful, the headstrong
    and the vainglorious that everything is bullshit – life is a joke, your finery
    is meaningless and worms will be feasting on you sooner than you think. (Parkes
    2014)


    The Pythons go beyond ''the vanity of human wishes'' and *carpe diem*, however.
    Theirs is Gothic horror-inspired satirical comedy. Insights and a puncturing of
    complacency accompany the hysterical laughter injecting horror into social class-based
    comedy, in which death and the end of the world as we know it are eagerly awaited.


    To return to the Spanish Inquisition: it was real, it was legitimated by the power
    of religion and government. Perhaps Monty Python selected it as an example of
    non-British deadly nonsense, but by making it ridiculously British they utterly
    undermined its stranglehold on the imagination. The British class system, snobbishness
    and elitism are prime Python targets, as is the cosiness and complacency to take
    such instances and behaviours seriously. There is a constant edge to the everyday,
    so that the surreal and exposure of the contradictions and stupidities make it
    all more or less tolerable, giving us power to criticise and to do something else
    than be trapped in the mundane. The power of hierarchy (in Britain, social class)
    and the power over life and death which such hierarchies wield are real. Death
    is the ultimate reality and leveller of all systems. Monty Python, and particularly
    the films *Monty Python and the Holy Grail* and *The Life of Brian*, expose the
    dangerous, potentially deadly, damaging investment in belief systems, and the
    hierarchies, structures, constraints and attendant punishments for infringements.
    They reveal the imperatives and the rituals (on the left, one cross each; none
    shall pass) as based, at worst, on embedded whimsy. A group of costumed manic
    comics in a suburban living room have other powers, however: the freedom and irreverence
    of carnival''s radical querying, undermining and rejection of all hierarchies,
    physical and psychological. The work of *Monty Python* enacts a healthy, existentially
    informed irreverence for the imposition and straitjacketing of all regulations,
    rules and dominant beliefs that constrain us. Laughter helps us all face up to
    the very worst, the inevitable, to death, and so undermine its domineering terrorising
    of life. This is the achievement of irreverent successful satire – it punctures
    the power and gives the imaginative energies of life the last laugh.


    However, Eric Idle should perhaps have the last laugh. Sopan Deb in a 2018 interview
    asks Idle: ''Nothing is more identified with you than the song "Always Look on
    the Bright Side of Life", which is, of course, the title of your memoir. Will
    you have it played at your funeral?'' He replies: ''I don''t know. I won''t be
    there.''


