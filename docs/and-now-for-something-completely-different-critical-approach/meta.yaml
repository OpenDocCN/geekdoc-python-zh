    Despite these anxieties concerning influences, the style of *Monty Python’s Flying
    Circus* was quite different from its predecessors and, as we will go on to outline,
    the group broke new ground through its sketches and episodes that targeted the
    banalities and idiosyncrasies of British life as the troupe experimented with
    and parodied the conventions of television. As noted above, their humour was not
    always considered appropriate for the television of the period, leading to increasingly
    heated clashes with the BBC during the series’ run (and then larger concerns following
    the release of *Monty Python’s Life of Brian* in 1979), as Robert Hewison chronicles
    in *Monty Python: The Case Against*. Notable in this regard is the notorious ‘Undertakers’
