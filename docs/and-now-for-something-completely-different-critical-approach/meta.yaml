- md: '## Migratory Silliness?


    In keeping with Python logic, I would like to end with something perhaps not completely
    different but at least tangential – and that is the role that national affiliation
    plays in the construction of cultic appeal. In particular, I’m interested in the
    question of, beyond simply enjoying a film produced in another country, what it
    means to appropriate as cult object a film from a different national tradition.
    Even more specifically: if *Holy Grail* is a film that lampoons British cultural
    myths, what does it mean to love the film as an American (or other nationality
    for that matter)?


    The minimal available scholarship on American Anglophilia tends to foreground
    American associations of Britishness with ‘high culture’ writ large: Masterpiece
    Theatre, Merchant Ivory films, entrenched aristocracy, tea-time and, of course,
    James Bond. Joseph Epstein, for example, claims that, ‘[i]n America, our conceptions
    of honor, courage, romance, decency – were all imports, all came from English’
    (Epstein 1997: 3). English culture offered Epstein ‘a more heroic world’ (ibid.:
    18). Jones notes that ‘Englishness has long enjoyed high status in American culture’
    (Jones 2001: 77) and suggests that ‘English people are the archetypal upper-class
    WASPs, a status to which all Americans are assumed to aspire’ (ibid.: 78). Speculating
    broadly on American Anglophilia, Mark Dery suggests that it may be rooted in a
    contempt for the hypocrisies of American capitalism, which claims to disdain elitism
    on the one hand while surreptitiously honouring it on the other; white racism;
    and aspirations to aristocracy on the part of ‘aspiring bluebloods’ (Dery 2018).


    *Holy Grail* is of course a far cry from *Remains of the Day* (James Ivory, 1993)
    or *A Passage to India* (David Lean, 1984) or the ‘stiff upper lip’ of stereotypical
    British gentry. It is conceivable then that American Anglophiles adopt Python
    simply because the British do. But I think American cultic veneration of Monty
    Python is more than a kind of general fetishising of all things British. Precisely
    because Python’s silliness is so deeply invested in the specific context of 1960s
    and 1970s British culture, the appreciation of the Pythons’ humour amplifies what
    Dery calls the ‘borrowed Otherness’ of American fans (Dery 2018). In the same
    way that *Holy Grail*’s subtitles to the credits are funny both because of their
    intrinsic absurdity and their divergence from the role subtitles are supposed
    to play, *Holy Grail* is funny both because of the immediate delights of wordplay
    and slapstick, and because of the way that it defies expectations concerning British
    myth and character. For the American Anglophile, it is silliness once removed.
    The knowledge of the American Anglophile is thus rewarded through recognition
    of those differences. The ‘comfortable difference’ the American Python fan embraces
    is thus the exception that proves the rule – to appreciate the parody as parody,
    one must be conversant with the original. The cultic appeal of silliness is thus
    inevitably inflected through the lens of nationality.


    My argument here has been that quotability, irreverent silliness and a kind of
    postmodern exploration of the medium of film participate in constructing *Holy
    Grail*’s cultic appeal. Other scenes from the film, of course, could be considered
    in relation to these qualities, and no doubt there are additional cultic qualities
    of


