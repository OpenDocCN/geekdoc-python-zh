    JEFFREY ANDREW WEINSTOCK


    Given, however, that most films have a significant amount of dialogue, this raises
    the obvious question of what makes a line striking enough to be detachable. Again,
    there is no single answer to this question. A line may be memorable for its delivery,
    its gravitas or its eloquence. In the case of *Holy Grail*, however, detachable
    lines are generally memorable for their absurdity within the context of silly
    scenes, accentuated in some cases by the ridiculousness of their delivery. As
    such, the question of memorable lines dovetails with considerations of the film’s
    humour and ‘glorious incoherence’.


    *Monty Python and the Holy Grail* is a film with only the barest thread of continuity
    linking together its twenty-three disparate scenes, all of which can essentially
    stand alone as comic sketches as Arthur (Graham Chapman) or Galahad (Michael Palin)
    or Lancelot (John Cleese) or Sir Robin (Eric Idle) or a combination encounter
    various odd situations. Many of the scenes, such as Arthur’s confrontation with
    the Black Knight (Cleese), Sir Robin’s encounter with the three-headed giant,
    Galahad’s visit to Castle Anthrax or Lancelot’s ‘rescue’ of Herbert (Terry Jones)
    could be reordered or even omitted without any significant harm to the integrity
    – such as it is – of the film. In this sense, the film very much reflects Eco’s
    proposal that a precondition for becoming a cult film is its glorious incoherence:
    cult film as ‘a disconnected series of images, of peaks, of visionary icebergs’
    (Eco 1985: 4). Like an episode of *Flying Circus*, *Holy Grail* can be broken
    up into different stand-alone scenes connected by certain general conceits and
    occasionally interrupted by the equivalent of ‘now for something completely different’.


    Within each scene, the emphasis is on provoking laughter from the audience – in
    the service of which goal the troupe uses every device at its disposal ranging
    from slapstick to caricature to inventive wordplay, but clustering around the
    device of incongruity or ironic inversion. Some of the jokes are what Freud would
    call ‘tendentious’ – that is, jokes that are hostile or obscene; others are what
    Freud would call ‘innocent’ with humour derived from its ‘play on words or transposition
    of concepts’ (see Stott 2014: 184). Let us propose that the successful joke is
    one that evokes the intended amusement or laughter from its audience; successful
    jokes are then apt to be repeated to or referenced with others who share similar
    affection for the film. With this in mind – and bearing in mind the maxim that
    a joke explained is the least funny thing possible – let us consider two oft-quoted
    scenes: Arthur’s confrontation with the Black Knight and Arthur’s encounter with
    the peasants Dennis (Palin) and the unnamed woman (Jones).


    The Black Knight scene, which would seem to fall into Freud’s category of the
    tendentious, derives its humour from the grotesqueness of the Black Knight’s injuries,
    the slapstick nature of the battle between the Black Knight and Arthur, the absurd
    incongruity between the Black Knight’s evaluation of his status and his actual
    health, and the surrealness of his continuing to fight when deprived of limbs.
    After refusing to step aside and allow Arthur to pass, the Black Knight


