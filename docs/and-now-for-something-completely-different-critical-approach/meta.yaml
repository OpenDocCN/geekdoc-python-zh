    To be fair, I expect most scholars and cultural critics – of cult media and beyond
    – will grant these claims; so the question remains: what explains the neglect
    of comedy by cult film scholars in general, and Monty Python in particular? (And
    not least among the many ironies here is that, in my experience, cult film scholars
    and academics in general almost universally express a fondness for Monty Python!)
    Is it that comedy is considered too mainstream? It should be pointed out that
    this hasn’t stopped criticism of the *Harry Potter* and *Star Wars* and comic
    character franchises from becoming cottage industries. Is it that comedy just
    isn’t outré enough to allow for academic wizardry? Is it that, despite an understanding
    by scholars that all texts require interpretation to be meaningful, the cultural
    bias against comedy prevails and comedy is still considered to have less depth
    – to be less meaningful – than other genres? Does some of the hesitation to address
    comedy simply have to do with the awareness that, while humour is complicated,
    nothing is less funny than a joke explained – or less interesting than the tedious
    bore who explains it?


    The neglect of Monty Python by scholars of cult media is especially curious given
    the commonplace acceptance of Monty Python as a focus of cult veneration. Robert
    Hewison, for example, writes in his overview of the history of Monty Python and
    censorship that, in Great Britain, ‘*Monty Python* quickly became a cult . . .
    Its energy and enthusiasm transmitted itself to the audience, who rejoiced in
    the absurdity of it all’ (Hewison 1981: 8). Marcia Landy, in her excellent book
    on *Monty Python’s Flying Circus*, quotes a similar history of the programme by
    reviewer Andrew Cliff from 1989: ‘Monty Python is 20 years old . . . For a while
    the show languished on the BBC’s second channel . . . Soon it had a cult following’
    (Landy 2005: 100). That cult then spread to American shores: ‘Many young Americans
    saw it [the *Flying Circus*] and believed in it to the extent of its becoming
    a campus cult’ (Wilmut quoted in Landy 2005: 26). Landy then comments on this,
    writing,


    > the term cult suggests a particular type of devoted, collective, and intense
    emotional reaction usually associated with fandom. The *Flying Circus* appealed
