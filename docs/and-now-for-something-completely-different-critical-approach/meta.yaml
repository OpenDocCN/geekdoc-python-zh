    # *Monty Python and the Holy Grail* (1975)


    The British class system, that very tight, historically established gridlock,
    has roots in structures based on wealth and birth, and grows from the belief in
    the divine right of kings (the concept that the right to rule derives from God
    and that kings are answerable for their actions to God alone). Structures of social
    hierarchy, therefore, have some foundations, a certain kind of enforced legitimacy,
    in views of God and the universe. Irreverence for hierarchy and social class,
    divinely legitimated or not, runs throughout *Monty Python and the Holy Grail*.
    Grand visions behind the recognition of Arthur as King of the Britons are punctured
    when the Lady of the Lake, dressed in purest white, raises the sword Excalibur
    from the lake and gives it to Arthur, thus confirming his divine right (something
    spiritual and magical), and also opening the whole event to ridicule. The divine
    right of kings is only so much hierarchical mystical nonsense to Dennis the peasant,
    who deflates and demystifies the event with his common-sense view that ‘strange
    women lying about in ponds distributing swords is no basis for a system of governance’,
    followed by calling the Lady of the Lake a ‘watery tart’. In *The Holy Grail*,
    the king goes around telling people he’s the king. Dennis’s peasant companion
    responds with ‘well I didn’t vote for you’, which challenges his status, and when
    Arthur explains that you don’t vote for the king, Dennis, the more intelligent,
    politicised peasant, points out that the ruler should be voted in by the people’s
    democratic vote.


    Hoffman argues that both the medieval issues and practice of power – divine kingship
    and government – are satirised, particularly with the idea that: ‘the king is
    easily recognisable because he is the only one not covered in shit’ (Hoffman 2002:
    138). Death, a commonplace, is also satirised. ‘Not dead yet’ is a constant refrain
    with, for example, the refusal of the Black Knight to recognise that he has lost
    the battle, even though all his limbs have been hacked off – a reference to Robert
    Bresson’s film *Lancelot du Lac* (1974), with its almost farcical, excessive hacking
    off of limbs and spouting of blood from huge wounds. This ‘reduces the notion
    of chivalric heroism to the very bottom line of absurdity’ (Hoffman 2002: 138).
    Myth, death, hierarchy and the combination of religion and kingship link them
    all, as well as the reverence regarding the historical versions we have of medieval
    times, so that the ‘absurdity at the heart of both chivalry and anarchy is made
    visible and, consequently, made ridiculous’ (ibid.).'
