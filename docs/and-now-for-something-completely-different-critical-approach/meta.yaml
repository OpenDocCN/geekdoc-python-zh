    - 1. 这些仅举几例，包括当代艺术家如大卫·霍克尼，歌手如佩图拉·克拉克，演员如马龙·白兰度或保罗·纽曼，电影导演如斯坦利·库布里克、林赛·安德森、约翰·施莱辛格、萨姆·佩金帕、皮埃尔·保罗·帕索里尼或阿尔弗雷德·希区柯克，或当时的性感偶像如女演员拉蔻儿·薇芝。

    - 2. 该电影最初拍摄于1968年。


