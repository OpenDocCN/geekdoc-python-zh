    ERNEST MATHIJS


    and even won a prize at the Cannes festival. But it was also found to be exasperating;
    at least that was the consensus among anglophone reviewers. Home nation reviews
    that had been critical of Monty Python’s output, especially with regard to *Life
    of Brian*, were unexpectedly mild in their assessment. For instance, *The Telegraph*
    called it a ‘curious hit-and-miss affair’ (Chilton 2014). It seemed most reviewers
    avoided the bait of ‘controversy’ the film itself dangled in front of them. Outside
    the English-speaking world the reception was decidedly positive, especially in
    France and Latin America. Nowadays, the status of *The Meaning of Life* seems
    overweight, at least as a bearer of Python’s legacy. Though the film frequently
    features in generalist overviews of the canons and cults of cinema (see Mathijs
    and Sexton 2011), it also sits there uneasily. For instance, French and French
    (1999) give their ‘cult Python’ vote to *Life of Brian*, and Soren McCarthy (2003)
    and Mathijs and Mendik (2011) prefer *The Holy Grail*. For Neil McNally (2012),
    too, the film is not quite as good as the others. Some of the Pythons themselves
    have commented on how the writing and the logistics of the film and its ambitious
    theme made them run out of steam (see Jones *et al.* 2009). And virtually all
    sources that discuss the oeuvre of Python in this era present Gilliam’s *Time
    Bandits* (1981) and *Brazil* (1984), or the *Crimson* short that precedes the
    feature (which was by his hand), or still Terry Jones’s *Erik the Viking* (1989),
    as films that more legitimately capture the aesthetics of the legacy of Python
    – its whimsicality, exuberance and silliness – what I called above its *joie de
    vivre éclatante*. *The Meaning of Life*, then, is Python’s final aria, to be over
    with it.


    *The Meaning of Life* retains a tongue-in-cheek irony as to its own seriousness.
    In that sense, it is perhaps tempting to see it connected, in one way or another
    (perhaps as an aside, similar to how scenes in the film move into each other?),
    to postulations of the end of philosophy or of postmodern theory (and anti-theory),
    common in the early 1980s (see the description in the last chapter of Aufenanger
    1984). As Patrick West observes in a review of the work of French philosopher
    Jean Baudrillard, much of philosophy of the time concentrated on how symbolic
    and sign value (the worth of something through its appearance) is central to the
    kind of ‘rituals of gift exchange’ and ‘conspicuous consumption of useless goods’
    that made ‘waste and excess . . . a central value of commodities’ (West 2011).
    It is an observation that, as this chapter has hopefully shown, sits at the centre
    of *The Meaning of Life* (West also makes an explicit reference to Monty Python,
    albeit to *Life of Brian*). If one looks at it like that, *The Meaning of Life*
    fooled philosophy by offering it a symbolic carrot at a time when philosophy was
    desperately looking for one. The carrot suggested that the film’s ‘everything’s
    waste’ idea could be co-opted into schemata and models of life’s meaning as a
    sometimes bureaucratic ritual of wasteful gifts – such as mints – that ‘just keep
    the whole thing going’ but are otherwise meaningless. But, in making that offering,
    *The Meaning of Life* also'
