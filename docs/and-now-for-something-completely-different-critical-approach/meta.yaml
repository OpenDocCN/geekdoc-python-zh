    many of the sketches grounded in unfamiliar comic strategies. The audience was
    being invited into an innovative creative context in which it negotiated a different
    space between the ‘private experience’ and its recognisably public referent. This
    was a different kind of ‘midway’ context in which Gilliam’s surrealist turn and
    its satiric underpinnings did not prompt obvious points of connection in the topicality
    of the everyday, but rather in an assumed visual literacy – a recognition, too,
    that Gilliam’s work was an *iteration* of script, not an *illustration* of it.


