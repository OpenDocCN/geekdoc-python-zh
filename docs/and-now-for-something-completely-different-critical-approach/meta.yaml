    PYTHONS


    In the following, the Pythons and their specific relation to the post-war youth-quake
    will be examined. The new role of post-war youth culture and its eager embrace
    of rock ‘n’ roll music as a ‘means of cultural and generational expression’ (Caine
    2004: 97) received different reactions from the parent generation and cultural
    elite who feared a considerable and presumably irrevocable decline in moral values
    and cultural standards. The portrayal of youth as social problem also emanates
    partly from the exaggerated media coverage of an alleged increase in juvenile
    delinquency and violent outbursts such as the 1958 Notting Hill race riots, the
    violent behaviour of the Teddy boys in the 1950s, or the seaside Mods vs Rockers
    clash in the summer of 1964. Moral panics surrounding juvenile delinquency had
    already peaked in the United States a decade earlier since ‘the gradual relaxation
    of the Hollywood Production Code and the growth of independent filmmaking brought
    to the forefront a whole series of American movies which openly explored taboo-breaking
    subjects around sexuality, crime, and the use of drugs’ (Biltereyst 2007: 9).
    Particularly, *The Wild One*, *Rebel Without a Cause* (Nicholas Ray, 1955) and
    *Blackboard Jungle* (Richard Brooks, 1955) ‘directly confronted the issue of postwar
    youngsters’ crime and gang life, initiating cycles of teen-pic exploitation films
    often called juvenile delinquency movies (Gilbert, 178–195; Doherty, 1–18; Shary
    2002, 82)’ (Biltereyst 2007: 9). *The Wild One*, for instance, even ‘had been
    considered too risky for general distribution in post-war Britain and was banned
    by the British Board of Film Censors until 1967’ (Tebbutt 2016: 98).


