  md: 'British culture was to see an ever-increasing infusion of the weird and the
    strange into a wide variety of cultural and media texts. It hardly needs remarking
    upon that many popular British TV shows were influenced and actively drew upon
    absurdism, surrealism and Pop Art. Popular 1960s programmes where this is perhaps
    most evident are those that fall within the genre that I shall refer to as ‘sort-of-but-not-really-science-fiction’:
    *The Avengers* (1961–9), *Adam Adamant Lives!* (1966–7), *Department S* (1969)
    and, of course, the seminal *The Prisoner* (1967–8). We can also see the impact
    of these movements on popular prose fiction in this period: Michael Moorcock’s
    fantasy novels, even at their most conventional, toyed with Pop Art and surrealism,
    but entered an entirely new realm of the absurd and bizarre with his experimental
    Jerry Cornelius novels: *The Final Programme* (1969), *A Cure for Cancer* (1971),
    *The English Assassin* (1972) and *The Condition of Muzak* (1979). However, such
    elements and influences could also be witnessed in areas of culture one might
    think of as being less likely to embrace the weird and the avant-garde.


    Poet and author Edward Upward, the ‘last of the Auden Generation’, had a writing
    career that spanned from 1938 to 2003. Despite being a friend and contemporary
    of the Bloomsbury group, he was to see an increased interest shown in his work
    in the wake of the publication of his *The Railway Accident and Other Stories*
    in 1969. Although a Marxist and active member of the Communist Party, Upward eschewed
    the social realism generally utilised by Marxist writers of his generation in
    favour of a dreamy, often horrific, fantastical form of prose that owed much to
    Lewis Carroll and H. P. Lovecraft. This dark yet whimsical surrealism is perhaps
    best illustrated by his series of short stories set in the fictional village of
    Montmere, often co-written with Christopher Isherwood. These stories frequently
    come to an abrupt close, or peter out after only a few pages, only hinting at
    or alluding to a deep lurking and unsettling conflation of the horrific and humorous
    which was to become – or perhaps has always been – a keystone of English humour.
    Indeed, in this grotesque fusion of terror and comedy we can perhaps see in Montmere
    an antecedent of Royston Vasey which was to feature later in the TV series *The
    League of Gentlemen* (1999–2002).


    Scottish poet/songwriter/comedian Ivor Cutler produced work that also demonstrated
    absurdism and surrealism; however, Cutler’s writing was to achieve its disturbing
    and destabilising effect by embracing a childish, nonsensical silliness rather
    than the horrific. Cutler was embraced by popular culture despite him being something
    of a fringe, avant-garde figure. Cutler had his songs broadcast by BBC radio from
    the late 1950s and was to perform regularly on Neil Innes’ various TV programmes
    throughout the 1960s as well as featuring on BBC Radio 1’s *The John Peel Show*
    from 1969. Additionally, he appeared in the Beatles’ 1967 film *Magical Mystery
    Tour*, having won the admiration of Paul McCartney.'
