    > 为《圣杯》电影创作的许多荒诞内容都有健康的先例（例如，在围城时嘲弄对手，以及作为最后手段向他们投掷死动物——这两者都被蒙哥马利引用为中世纪战术）。（Palin
    2006: 164）


    然而，吉列姆的动画取材于真实手稿，遵循的是其原始材料的嬉戏和无意义逻辑，而非追寻叙事的逻辑，因此它们明确地将自己定位在中世纪旁注的传统之中。


