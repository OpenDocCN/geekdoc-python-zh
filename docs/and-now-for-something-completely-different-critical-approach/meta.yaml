    was a child, my father’s substitution for a bedtime story was to re-enact various
    Monty Python skits that he had committed to memory’, that ‘I think I probably
    learnt more MP quotes from my Dad’s impressions than from the shows themselves’,
    and that ‘my dad used to recite them (I particularly remember him doing the Death
