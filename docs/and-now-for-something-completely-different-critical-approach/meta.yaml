    that references major art works to point up the difference between high and low
    cultural practices. It is in undermining the assumed significance of high art
    with Sunday Magazine idioms that Gilliam articulates ‘the midway’ and offers access
    to amusement in the recognition of *wit*. Gilliam is ‘clever’, and the pleasure
    and fun come in the recognition of this cleverness *first*, before it is in the
    nuances of the subject, the joke or the object of satire. For example, in seeing
    the angle of a hand gesture and the position of the couple’s embrace in Auguste
    Rodin’s *The Kiss* (1882), Gilliam merely straightens the female participant’s
    leg and adds some finger holes, and the man begins to play the


    102'
  - '[PAGE 110]


    woman as if she were a musical instrument. What successfully extends the gag,
    though, is the use of sound, in that the music played is the warped notes of a
    swance whistle rather than another instrument that might have at least lent the
    sound more classical gravitas. The iconography of the sculpture and its significance
    as art is completely undermined by making the romanticism of the image the subject
    of mischievous ‘vulgarity’ by ironically *de-eroticising* the figures. There is
    a similar approach in most of Gilliam’s use of fine art when the enigma of *The
    Mona Lisa* (1595) by Da Vinci is broken by portraying her in a flat cap, or by
    exposing her breasts; the poignancy of Da Vinci’s *The Last Supper* (1490) is
    punctured by making the occasion just another meal, where someone says, ‘That
    bitch, he spilled a whole bottle of chateau le tour’; the ethereal beauty of Botticelli’s
    *The Birth of Venus* (1484) is rendered coarse by a hand tweaking Venus’s nipple
    as if turning on a radio, reducing her to a dancing dervish; or the use ofThe
    request was rejected because it was considered high risk'
  - '[PAGE 111]


    Similar techniques are used when Gilliam sends up the rhetoric of advertising
    – ‘Whizzo Butter’ enables you to ‘go to heaven’; ‘Creln’ toothpaste enables a
    lovelorn dragon to attract girls again, before eating them; packets of ‘American
    Defence’ can prevent the ‘domino theory’ of the collapse of one rotten tooth (through
    the decay of ‘international communism’) leading to the collapse of all the rest
    of the dentures; ‘Dynamo Tension’ promotes ‘muscles pulling against muscles the
    natural way’ in order to body-build supposedly attractive hyper-muscular grotesques.
    Gilliam effectively parodies the promises of commercial culture, highlighting
    the obvious absurdities between rhetoric and reality. Fundamentally, for all its
    play with the physiological and the arbitrary treatment of the body, Gilliam’s
    animation insists upon the necessity to create the Brechtian distance that promotes
    cerebral engagement. His ‘adverts’ seek to show how commercial deception is in
    essence the same as social and political deception. ‘Purchase a Past’, for example,
    offers the opportunity to buy ‘beautifully framed photographs of other people’s
    lives’, and imagine that the people who populate them offer the possibility of
    a life that is better than your own. ‘Cartoon Religions Ltd’ insists that ‘We
    want you to think of us as your friends’, while Gilliam reveals that the vicar
    intoning to the public is having his brains consumed by the devil himself. Gilliam
    simply refuses to assume that the audience is homogeneous or will respond to lowest
    common denominator principles in joke-making, insisting instead that viewers will
    invest not merely in the immediacy of the joke, but in the value of a joke in
    opening up alternative points of view about the human experience. In this respect,
    virtually every visual joke carries with it a resonance about always questioning
    the things the media and other outlets present as ‘a truth’. The discovery of
    a ‘huge thumb’, for example, enables the British Museum, after years of painstaking
    research, to reconstruct the whole animal from which it apparently came. The thumb
    is simply attached to a mammoth as if it were its trunk. The visual incongruity
    is in itself amusing, but the ultimate message is not to be deceived by the things
    that we see.


    # AN ANIMATOR’S SOUL


    > His real satiric business here is to display his wit: the reader is delighted
    by the ingenuity, the ransacking of natural history, military, science, medicine,
    folklore, philosophy, and myth to produce an interrelated series of puns. It is
    a bit like a virtuoso performer’s cadenza, a jazz musician’s improvisation, or
    the entries in some mad thesaurus under the heading ‘Regarding the End’ or ‘Get
    in by the back door’. (Griffin 1994: 81)


    Griffin, here, writes about the work of one of the greatest literary satirists,
    Jonathan Swift. I wish to argue that the very same view can be applied to the
    animated vignettes made by Terry Gilliam. In his own text, *Animations of*'
  - '[PAGE 112]


    Mortality, he claims to reveal the dark inner workings of the animator’s soul,
    but instead playfully demonstrates some of the techniques of 2D stop-motion cut-out
    animation – ‘creating nothing out of somethings’, ‘looking the part’ or making
    ‘meaningless political statements’, for example, all in the service of ‘intense
    religious experience’ or ‘sexual perversion’ (see Gilliam 1978). Fundamentally,
    though, Gilliam makes something out of nothing, prioritises the act of looking,
    makes meaningful political statements, and places sex and religion in perspective
    as dominant and affecting social and political discourses. As the policeman, who
    rips open his uniform to reveal a nude woman’s body, says, ‘I apologise for that
    but I think you’ll find this a bit more interesting.’ It is always Gilliam’s intention
    to surprise and shock in order to find the real interest beneath the dressings
    and surfaces of social, cultural and artistic experience, and as a result not
    merely advance the terms and conditions of satirical address, but to enhance the
    claims for animation as one of the most potentially subversive forms of creative
    expression.


    # WORKS CITED


    Buchan, Suzanne (2013) ‘Theatrical Cartoon Comedy: From Animated Portmanteau to
    the *Risus Purus*’, in Andrew Horton and Joanna E. Rapf (eds), *A Companion to
    Film Comedy*. Chichester and Oxford: Wiley-Blackwell, pp. 521–44.

    Gilliam, Terry (1978) *Animations of Mortality*. London: Eyre Methuen.

    Goldmark, Daniel and Charlie Keil (eds) (2011) *Funny Pictures: Animation and
    Comedy in Studio-Era Hollywood*. Berkeley, Los Angeles and London: University
    of California Press.

    Griffin, Dustin H. (1994) *Satire: A Critical Reintroduction*. Lexington: University
    Press of Kentucky.

    McCabe, Bob (1999) *Dark Knights and Holy Fools: The Art and Films of Terry Gilliam*.
    London: Orion.

    Pythons, The (with Bob McCabe) (2003) *The Pythons Autobiography*. London: Orion.

    Sterritt, David and Lucille Rhodes (eds) (2004) *Terry Gilliam: Interviews*. Jackson:
    University Press of Mississippi.

    Thomas, Frank and Ollie Johnston (1987) *Too Funny for Words: Disney’s Greatest
    Sight Gags*. New York: Abbeville Press.

    Thompson, John O. (1982) *Monty Python: A Complete and Utter Theory of the Grotesque*.
    London: BFI.

    Topliss, Iain (2005) *The Comic Worlds*. Baltimore, MD: Johns Hopkins University
    Press.

    Warner, Marina (2002) *Fantastic Metamorphoses, Other Worlds*. Oxford and New
    York: Oxford University Press.

    Wells, Paul (1998) *Understanding Animation*. London and New York: Routledge.

    Wells, Paul (2013) ‘Laughter Is Ten Times More Powerful than a Scream: The Case
    of Animated Comedy’, in Andrew Horton and Joanna E. Rapf (eds), *A Companion to
    Film Comedy*. Chichester and Oxford: Wiley-Blackwell, pp. 497–520.'
- md: '## 6. FIGURES TRACED IN SHITE: THE SCRIBE, THE ILLUMINATOR AND MONTY PYTHON’S
    HOLY GRAIL


    Ewan Wilson


    David D. Day observed in the first edition of Kevin J. Harty’s *Cinema Arthuriana:
    Essays on Arthurian Film* that what is ‘[u]ltimately at issue in *Monty Python
    and the Holy Grail* is our ability to know the Middle Ages at all, when every
    attempt we make ultimately betrays the traces of its modern manufacture’ (Day
    1991: 83). Indeed, the first and seemingly inevitable question at which one arrives
    in the examination of a film that purports to be set in the past is one of historical
    accuracy; regardless of the fictive nature of the narrative, the question of period
    authenticity is quick to arise. For their part, the Middle Ages are rarely portrayed
    for their own sake, often appearing instead as imagined visions of the past in
    service of an aesthetic or political agenda which overlooks authenticity in favour
    of representation. As Robert A. Rosenstone points out of such efforts,


    > the focus tends to be on the creation and manipulation of the meanings of the
    past, on a discourse that is free of data other than that of other discourses,
    on what seems to be the free play of signifiers signifying history. (Rosenstone
    1995: 10)


    In *Monty Python and the Holy Grail* (1975), the Pythons present an absurdist
    retelling of Malory’s *Le Morte d’Arthur* that appears, at first glance, to be
    little but abject silliness. However, scholars such as Day, Brian Levy and Lesley
    Coote (2004) and Neil Archer (2016) have made detailed examinations of the film’s
    comedic conventions, its politics and the way in which it represents Arthur’s
    England, unpacking the complexities of *Holy Grail*''s specific brand of mediaevalism.
    For Day, *Holy Grail* highlights the difficulties of portraying the distant Middle
    Ages in a manner free from modern influences, particularly in a medium as modern
    as film; Levy and Coote''s analysis draws comparison between the political stance
    and its comedic conventions with those present in the literature of Chaucer and
    Malory, ultimately arguing that the Pythons participate in an inherently mediaeval
    literary tradition; and Archer, in a wider discussion of parody, brings the question
    of ''historical verisimilitude'' (Archer 2016: 60) under the scrutiny of genre
    convention and audience expectation. Common to these analyses of the film, and
    indeed to several other such studies, is an interest in the interaction between
    its modern and mediaeval elements. However, where the majority of the existing
    scholarship surrounding *Holy Grail* is concerned with the film as a modern treatment
    of mediaeval material, this chapter builds on Martine Meuwese''s examination of
    ''The Animation of Marginal Decorations in "Monty Python and the Holy Grail"''
    (2004) to suggest that the creative practices of the film''s two directors, Gilliam
    and Jones, are just as participatory in mediaeval tradition as is their subject
    matter. Drawing on the wealth of published accounts of the film''s production,
    interviews with the Python team and J. J. G. Alexander''s book-length study of
    *Medieval Illuminators and Their Methods of Work* (1992), it seeks to delineate
    the directorial styles of the two directors and draw connections between their
    cooperation and that of the mediaeval scribe with an illuminator, as well as the
    influences the film draws from cinema Arthuriana and the mediaeval epics of Bergman,
    Kurosawa and Pasolini.¹


    Since the early days of Python, Gilliam has been considered a member in equal
    weighting to his colleagues; yet as the lone American expatriate in a group of
    Oxbridge graduates, he has always been something of an outsider. As Cleese observes,
    ''he''s much more like an artist in a painterly sense. He works in a studio, he
    doesn''t work in a *team*, or didn''t on Python; we worked very much in a team''
    (Morgan 1999: 79). This distinction between the Englishmen and the American, the
    writers and the artist, allows us to consider the work of the Pythons and that
    of Gilliam as belonging to two different traditions: the written and the visual.
    The Oxbridge contingent of the Pythons are heavily steeped in the written culture
    of Britain: Palin read history; Jones and Idle, English literature; and Cleese,
    law. Gilliam, on the other hand, ''just wanted to get on and paint and draw and
    sculpt'' (Pythons and McCabe 2003: 86); he studied at Occidental College, drifting
    from physics to art history to political science, dipping into oriental philosophy
    and drama along the way. Chapman, a medic, was the outlier. Their studies were
    never the main focus of the soon-to-be Pythons, however; while the Englishmen
    brought their brand of ''literate comedy'' (ibid.: 85) to the Cambridge Footlights,
    Gilliam immersed himself in the reinvigoration of Occidental''s ''previously quite
    serious art and poetry journal called *Fang*, which . . . was rapidly transformed
    into a showcase for scabrous gags and unfettered cartooning’ (Gilliam and Thompson
    2015: 46). While a bent for comedy and innovation is their uniting factor, a clear
    divide in practice is struck between the wordsmithing of the Footlights/Revue
    alumni and the visual absurdism of Gilliam.


    This distinction is of particular relevance to a delineation of the responsibilities
    of Gilliam and Jones during the production of *Holy Grail*; as its producer, John
    Goldstone, observes,


    > Terry Jones’ attitude (as opposed to Terry Gilliam’s) has always been much more
    about performance than visuals . . . ultimately the nature of Python is more verbal
    than visual, and it seemed very important to make it work on a performance level
    and that the words were there. (Morgan 1999: 154)


    Indeed, Gilliam recalls that after an argument he had with Cleese during the filming
    of Arthur’s initial encounter with the French, ‘[i]t ended up with Terry talking
    to the guys, and me talking to the crew and the cameramen’ (McCabe 1999: 56).
    In this division of labour, *Holy Grail* displays a level of mediaeval influence
    that extends beyond that of its subject matter. Meuwese identifies Lilian M. C.
    Randall’s encyclopaedic *Illustrations in the Margins of Gothic Manuscripts* as
    Gilliam’s primary source for the images that he employs in the animated segments
    of the film. As she observes:


    > Gilliam’s animated sequences contain many medieval visual motifs. In ‘The Tale
    of Sir Launcelot,’ this animation sequence is restricted to the Celtic-style text;
    the rest of the animation develops in Gilliam’s own style of drawing. However,
    ‘The Quest for the Holy Grail’ contains a Romanesque Christ and a series of Gothic
    figures, while ‘The Tale of Sir Galahad’ and ‘Season Animation’ are also mainly
    populated by figures which look as though they have been borrowed directly from
    early fourteenth-century manuscript illustrations. And indeed, that is precisely
    what has happened. (Meuwese 2004: 47)


    Meuwese goes on to connect Gilliam’s numbering of his concept sketches for the
    film’s animations to the numbered illustrations in Randall’s book, suggesting
    that the relationship between Randall’s text and Gilliam’s appropriation of it
    might be compared to that of a mediaeval scribe and his source book; she writes
    that ‘Gilliam’s orientation sketches and notes may be compared to the terse instructions
    that a miniaturist would scribble or sketch next to the place where the illustration
    was to be executed’ (ibid.: 54). As insightful as her observations are, Meuwese
    limits the scope of her study to Gilliam’s use of manuscript material in his animations
    and neglects to consider the film as a whole, or indeed the role of the other
    Pythons, particularly that of Jones, within the production of the film. If Gilliam
    is considered a modern miniaturist, a participant in a visual tradition which
    spans centuries, the other Pythons, having been more directly involved in the
    writing of the film’s script, can be viewed as akin to mediaeval scribes, represented
    by Jones as writer-director.


    Although *Holy Grail* was written by Monty Python as a collective, and all six
    of the troupe are credited accordingly, this chapter’s focus lies with the relationship
    between the film’s directors and as such it shall consider Jones as chief among
    Python’s scribes. He, more so than any other of his colleagues, is embedded in
    the literary and historical traditions of Britain as both a practitioner and a
    scholar. Post-Python, Cleese has made a long career of comedic performances while
    Idle has peppered his song-writing output with a handful of novels; Palin garnered
    a modest number of screenwriting credits, including *Ripping Yarns* (1976–9) in
    collaboration with Jones and *Time Bandits* (1981) with Gilliam, before embarking
    on a career as a travel writer and presenter for the BBC in 1989; and Gilliam,
    having developed a taste for the role of director but desiring complete artistic
    control over his projects, went on to forge a decidedly idiosyncratic career as
    a filmmaker. Jones, on the other hand, directed only a handful of further features,
    and soon returned to his passion for the mediaeval as the presenter of such BBC
    documentaries as *Ancient Inventions* (1998), *Terry Jones’ Medieval Lives* (2004)
    and *Terry Jones’ Barbarians* (2006), the latter two of which were later complemented
    with accompanying books.²


    His is the largest of the bibliographies produced by any one Python, and his writing
    includes children’s literature, librettos and his scholarly discussions of the
    work of Chaucer, *Chaucer’s Knight: The Portrait of a Medieval Mercenary* (1980)
    and *Who Murdered Chaucer?: A Medieval Mystery* (2003). While a gifted comedic
    writer and actor, Jones is also a respected scholar, and Palin recalls that he
    ‘was, from the first time I met him, a huge fan of Geoffrey Chaucer, which he
    took great pleasure in reciting in the original Middle English’ (Palin 2012: 56).
    Although Jones writes of a realisation reached in the Bodleian Library during
    his university days that ‘I didn’t want to spend my life being an English academic
    and commentator . . . I wanted to make things and write the raw material’ (Pythons
    and McCabe 2003: 74), his subsequent writing for both page and screen is consistently
    informed by and engaged with the history and literature of Britain’s past. *The
    Complete and Utter History of Britain* (1969), for example, which Palin and Jones
    wrote and acted for London Weekend Television, presents a gamut of landmark moments
    in British history through a contemporary lens; highlights from the programme’s
    surviving episodes include a post-Battle of Hastings sketch in which William the
    Conqueror gives a reporter the run-down in the manner of a post-match football
    interview, and Richard the Lionheart’s return from the Crusades with a plethora
    of souvenirs and a hankering for ‘a plate of egg'
  mdcn: '## 6. 以白色描绘的图形：抄写员、彩饰师与《巨蟒与圣杯》


    尤恩·威尔逊


    大卫·D·戴在凯文·J·哈蒂的《亚瑟王电影文集：亚瑟王电影论文集》第一版中指出，《巨蟒与圣杯》中“最终的问题在于，我们是否能够真正了解中世纪，因为我们每一次尝试最终都暴露了其现代制造的痕迹”（戴
    1991: 83）。确实，在考察一部声称以过去为背景的电影时，人们似乎不可避免地首先会提出历史准确性的问题；无论叙事本身具有怎样的虚构性，关于时代真实性的问题总会迅速浮现。就中世纪而言，它们很少被纯粹地描绘，而常常作为对过去的想象性呈现，服务于某种美学或政治议程，这种议程为了表现而忽视了真实性。正如罗伯特·A·罗森斯通在评论此类努力时指出的：


    > 焦点往往在于创造和操纵过去的意义，在于一种除了其他话语的数据外别无数据的话语，在于似乎是能指自由嬉戏地指涉历史。（罗森斯通 1995: 10）


    在《巨蟒与圣杯》（1975）中，巨蟒剧团以荒诞主义的方式重述了马洛里的《亚瑟王之死》，乍看之下，这似乎不过是十足的愚蠢。然而，戴、布莱恩·莱维与莱斯利·科特（2004）以及尼尔·阿彻（2016）等学者，都对这部电影的喜剧惯例、其政治性以及它呈现亚瑟王英格兰的方式进行了详细考察，剖析了《圣杯》特定中世纪主义的复杂性。对戴而言，《圣杯》凸显了在不受现代影响的情况下描绘遥远中世纪的困难，尤其是在电影这样现代的媒介中；莱维和科特的分析将其政治立场和喜剧惯例与乔叟和马洛里文学中的相应元素进行了比较，最终认为巨蟒剧团参与了一种本质上中世纪的文学传统；而阿彻在更广泛的戏仿讨论中，将“历史逼真性”（阿彻
    2016: 60）的问题置于类型惯例和观众期待的审视之下。这些对电影的分析，以及确实存在的其他几项研究，共同之处在于对其现代与中世纪元素之间互动的兴趣。然而，现有围绕《圣杯》的大部分学术研究关注的是电影作为对中世纪素材的现代处理，本章则基于马丁·梅乌韦斯对“《巨蟒与圣杯》中边缘装饰的动画化”（2004）的考察，提出电影两位导演吉列姆和琼斯的创作实践，与其题材一样，也参与了中世纪传统。本章借鉴了大量关于电影制作的已出版记述、对巨蟒剧团成员的采访，以及J·J·G·亚历山大关于《中世纪彩饰师及其工作方法》（1992）的专著研究，旨在勾勒两位导演的导演风格，并将他们的合作与中世纪抄写员和彩饰师之间的合作联系起来，同时探讨电影从亚瑟王电影以及伯格曼、黑泽明和帕索里尼的中世纪史诗中汲取的影响。¹


    自巨蟒剧团早期以来，吉列姆一直被视为与同事们同等重要的成员；然而，作为一群牛津剑桥毕业生中唯一的美国侨民，他始终有点像个局外人。正如克莱斯观察到的，“他更像一个画家意义上的艺术家。他在工作室工作，他不以团队方式工作，至少在巨蟒时期不是；我们则非常以团队方式工作”（摩根
    1999: 79）。这种英国人与美国人、作家与艺术家之间的区别，使我们能够将巨蟒剧团的工作和吉列姆的工作视为属于两个不同的传统：文字的与视觉的。巨蟒剧团中的牛津剑桥成员深受英国文字文化的浸润：帕林读历史；琼斯和艾德尔读英国文学；克莱斯读法律。另一方面，吉列姆“只想继续画画、素描和雕塑”（巨蟒剧团与麦凯布
    2003: 86）；他就读于西方学院，从物理学到艺术史再到政治学，期间还涉猎了东方哲学和戏剧。查普曼是学医的，是个例外。然而，他们的学业从来不是这些未来的巨蟒剧团成员的主要关注点；当英国人将他们那种“文学喜剧”（同上：85）带到剑桥脚灯社时，吉列姆则沉浸于复兴西方学院“之前相当严肃的艺术与诗歌期刊《尖牙》”中，该期刊“……迅速转变为展示粗俗笑话和无拘无束卡通画的舞台”（吉列姆与汤普森
    2015: 46）。虽然对喜剧和创新的倾向是他们的共同因素，但在实践中，脚灯社/讽刺剧校友的文字创作与吉列姆的视觉荒诞主义之间存在着明显的鸿沟。


    这种区别对于界定吉列姆和琼斯在《圣杯》制作过程中的职责尤为重要；正如其制片人约翰·戈德斯通观察到的：


    > 特里·琼斯的态度（与特里·吉列姆相比）始终更关乎表演而非视觉效果……最终，巨蟒的本质是语言多于视觉，因此让它在表演层面奏效，并确保台词到位，似乎非常重要。（摩根
    1999: 154）


    确实，吉列姆回忆说，在拍摄亚瑟王与法国人的初次遭遇时，他与克莱斯发生争执后，“结果是特里在和演员们谈，而我在和剧组及摄影师们谈”（麦凯布 1999: 56）。在这种分工中，《圣杯》展现了一种超越其题材本身的中世纪影响程度。梅乌韦斯指出，莉莲·M·C·兰德尔的百科全书式著作《哥特式手稿边缘的插图》是吉列姆在电影动画片段中所用图像的主要来源。正如她观察到的：


    > 吉列姆的动画序列包含许多中世纪视觉母题。在“兰斯洛特爵士的故事”中，这个动画序列仅限于凯尔特风格的文本；其余动画则以吉列姆自己的绘画风格展开。然而，“寻找圣杯”包含一个罗马式基督和一系列哥特式人物，而“加拉哈德爵士的故事”和“季节动画”也主要由看起来像是直接借自十四世纪早期手稿插图的人物构成。事实上，情况正是如此。（梅乌韦斯
    2004: 47）


    梅乌韦斯进一步将吉列姆为电影动画绘制的概念草图编号与兰德尔书中的编号插图联系起来，暗示兰德尔的文本与吉列姆对其的挪用之间的关系，或许可以类比于中世纪抄写员与其源书之间的关系；她写道，“吉列姆的草图和笔记可以比作微型画师在准备绘制插图的地方潦草写下的简短说明”（同上：54）。尽管她的观察富有洞见，但梅乌韦斯将研究范围局限于吉列姆在动画中对手稿材料的使用，而忽略了将电影作为一个整体来考虑，或者确实忽略了其他巨蟒剧团成员，特别是琼斯，在电影制作中的作用。如果吉列姆被视为一位现代微型画师，一个跨越数世纪的视觉传统的参与者，那么其他巨蟒剧团成员，由于更直接地参与了电影剧本的写作，可以被视为类似于中世纪抄写员，其中琼斯作为编剧兼导演是其代表。


    尽管《圣杯》是由巨蟒剧团集体创作的，剧团所有六位成员都因此获得了署名，但本章的重点在于电影导演之间的关系，因此将考虑琼斯作为巨蟒剧团抄写员中的首要人物。他比其他任何同事都更深入地植根于英国的文学和历史传统，既是实践者也是学者。巨蟒剧团之后，克莱斯长期从事喜剧表演，艾德尔则在其歌曲创作中穿插了几部小说；帕林获得了少量编剧署名，包括与琼斯合作的《惊悚故事集》（1976–9）和与吉列姆合作的《时光大盗》（1981），之后于1989年投身于旅行作家和BBC主持人的职业生涯；而吉列姆，在培养了对导演角色的兴趣但渴望对其项目拥有完全的艺术控制后，继续打造了作为电影制作人明显独特的职业生涯。另一方面，琼斯只执导了少数几部后续长片，很快便回归到他对中世纪的热情，担任了诸如BBC纪录片《古代发明》（1998）、《特里·琼斯的中世纪生活》（2004）和《特里·琼斯的野蛮人》（2006）的主持人，后两部后来还配有相应的书籍。²


    他的著作目录是所有巨蟒剧团成员中最大的，他的写作包括儿童文学、剧本以及他对乔叟作品的学术讨论，《乔叟的骑士：一个中世纪雇佣兵的肖像》（1980）和《谁谋杀了乔叟？：一个中世纪之谜》（2003）。虽然是一位有天赋的喜剧作家和演员，琼斯也是一位受人尊敬的学者，帕林回忆说他“从我第一次见到他起，就是杰弗里·乔叟的超级粉丝，他非常乐于用中古英语原文背诵”（帕林
    2012: 56）。尽管琼斯写道，他在大学时代在博德利图书馆意识到“我不想一辈子当个英国学术界人士和评论家……我想创造事物，写原始素材”（巨蟒剧团与麦凯布
    2003: 74），但他随后为书籍和银幕所写的作品始终受到并参与英国过去的历史和文学。例如，《英国完整而彻底的历史》（1969），由帕林和琼斯为伦敦周末电视台编写并出演，通过当代视角呈现了英国历史上的众多标志性时刻；该节目现存剧集的亮点包括一个黑斯廷斯战役之后的短剧，其中征服者威廉以赛后足球采访的方式向记者介绍情况，以及狮心王理查德从十字军东征归来，带着大量纪念品并渴望“一盘鸡蛋'
