    呈现方式的问题不仅对琼斯很重要，对蒙提·派森集体也同样重要。到《飞行马戏团》结束时，吉列姆和琼斯都已萌生了从电视转向电影的想法，因此敏锐地意识到两种媒介在形式上的差异，而当时其他英国喜剧电影未能注意到这些差异。正如《圣杯》的制片人马克·福斯塔特所观察到的：


    > 1970年代的英国喜剧电影，与电视剧不同，相当糟糕。大多数是成功电视剧的衍生作品，预算很低……这些电影主要是为英国观众制作的，只能出口到电视剧有播出的国家……使用了平坦的整体照明，以给演员尽可能多的行动自由，同时也避免了不同布景之间的重大灯光变化。派森的第一部电影《现在来看点完全不同的东西》（1971）就属于这一类。（Forstater
    2015: 15）


    《现在来看点完全不同的东西》（ANFSCD）是《飞行马戏团》几个小品的合集，是一部长片小品秀，未能真正参与或利用电影形式。《圣杯》的初稿也表现出类似的缺乏凝聚力，由两个平行的圣杯追寻故事组成——一个过去，一个现在——最终在哈罗德百货公司碰撞。然而，福斯塔特指出，“中世纪故事在制造笑料和中世纪戏仿方面潜力更大”（同上：36），派森成员也发现，从亚瑟王宫廷挖掘原创幽默比从当代挖掘更多。通过这样做，派森成员不仅挖掘了丰富的文学和文化素材，还挖掘了属于戏仿和亚瑟王电影范畴的电影作品。


    当英国看到像《继续》系列这样的作品一部接一部地推出戏仿作品时，像《皇家赌场》（约翰·休斯顿等，1967）和《制作人》（梅尔·布鲁克斯，1968）这样的戏仿作品在好莱坞获得了关注。然而与此同时，美国电影继续增加苏珊·阿伦斯坦称之为“好莱坞亚瑟王传奇”的电影作品，这是哈蒂“亚瑟王电影”的一个特定美国分支。在1960年代末，约书亚·洛根的音乐剧《卡米洛特》（1967）——改编自勒纳和洛伊1961年的同名舞台剧——在公众眼中最为突出，也是派森在《圣杯》中直接讽刺的主要对象。⁴
    尽管达尔·拉森引用《圣杯》的剧本断言，电影“卡米洛特”片段中的音乐数字是模仿1966年舞台剧《飞燕金枪》中的“如果他们现在能看到我就好了”（Larsen 2015:
    244），但他也指出，“当派森开始创作他们自己的版本时，卡米洛特的前神话居民已经歌唱和舞蹈了大约十三年”（同上：251）。因此，国王将卡米洛特斥为“一个愚蠢的地方”，不仅可以理解为对好莱坞倾向于将亚瑟王神话视为社会理想化模型的嘲讽，也可以理解为对好莱坞之前描绘中世纪方式的嘲讽。通过《圣杯》，琼斯和吉列姆努力摆脱好莱坞呈现的浪漫化过去，在那个过去里，“皮肤上的毛孔神秘地消失了，每个人的牙齿都像多丽丝·戴和洛克·哈德森的牙齿一样闪闪发光”（Gilliam
    and Thompson 2015: 172），转而借鉴了伯格曼的《第七封印》（1957）、黑泽明的《蜘蛛巢城》（1957）和帕索里尼的《坎特伯雷故事集》（1972）等中世纪史诗的美学。


    在塑造《圣杯》的众多影响中，这三部电影值得注意，因为它们对中世纪进行了独特而富有感染力的描绘。这些电影，尽管在构建过去方面可能并不比吉列姆所诟病的好莱坞电影更具历史准确性，但它们都从不仅从中世纪艺术，而且从悠久的视觉文化传统中汲取灵感。⁵
    死神下棋的形象只是伯格曼从他父亲过去布道的教堂墙壁上回忆起的一个形象（Bergman 1956），而《第七封印》的剧本最初标题为《骑士与死神》，让人联想到丢勒的《骑士、死神与魔鬼》（Törnqvist
    2012）。对于《蜘蛛巢城》，黑泽明研究了“武者绘”，即“早期描绘战斗场景的画卷”，并“决定使用黑色和装甲墙，因为它们与他们计划的大量雾气和薄雾的水墨画效果相得益彰”（Richie
    1996: 122）。而在《坎特伯雷故事集》中，帕索里尼抓住了“中世纪崇高与怪诞之间的强烈联系”（Blandeau 2006: 155），这在电影的博斯式结局中得到了体现。帕索里尼的电影充满了性、污秽和怪诞的意象，引起了吉列姆的共鸣，他后来将博斯和勃鲁盖尔的画作作为《巨蟒与圣杯》场景设计的灵感来源。事实上，帕林回忆起与琼斯一起观看《坎特伯雷故事集》，“特里·G推荐的。对中世纪英格兰的精彩再现——我们必须在我们的电影中达到的那种风格和拍摄质量，以避免它成为另一部《继续，亚瑟王》”（Palin
    2006: 163–4）。帕林对帕索里尼电影的钦佩呼应了琼斯对基顿作品的热爱，以及证明喜剧与艺术性并非互斥的愿望。


    然而，运用艺术电影美学不仅仅是为了将他们的作品呈现为一部严肃的电影作品；它也让派森有机会从媒介本身的正式元素中制造喜剧。电影的片头字幕，以阴郁的打击乐配乐和黑色背景上的伪北欧字幕为特色，利用了观众对伯格曼式艺术电影的认知，然后引入了一系列关于叛逆字幕员的笑话。同样，电影开场镜头中雾气笼罩的凯瑟琳轮向《蜘蛛巢城》致敬，而揭示马蹄声是由椰子壳发出的声音，因其荒谬性而更加有趣。《第七封印》中自我鞭笞的僧侣同样被戏仿，他们的鞭子被木板取代，他们反复用木板拍打自己的头。尽管《圣杯》中的笑话是由派森集体创作的，最终植根于文字，但它们以艺术电影的视觉语言呈现，很大程度上（即使不是完全）归功于吉列姆和琼斯作为导演。就本章而言，琼斯已被认定为编剧兼导演，而吉列姆的导演职责使他更像导演兼插画家——穆维斯的“现代微缩画家”。在他们合作拍摄《圣杯》（此处被视为一部彩饰文本）的过程中，琼斯和吉列姆是亚瑟王插画传统的参与者，他们“通过担任作者/插画家，探索文字与图像的关系品质和最终相互依存性……正如霍华德·派尔和哈德森·塔尔博特所做的那样”（Lupack
    and Lupack 2008: 10）。


    在此值得注意的是，手稿彩饰的做法跨越了几个世纪，抄写员和彩饰师之间的关系和职责也随着时间的推移而演变。乔纳森·J·G·亚历山大对这一过程的演变进行了详尽的概述，从'
