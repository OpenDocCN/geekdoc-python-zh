    ## 如何从远处识别蒙提·皮森


    蒙提·皮森的历史——包括团体的组建、《蒙提·皮森的飞行马戏团》电视系列剧的发展，以及随后的电影，包括《蒙提·皮森与圣杯》（1975年）、《蒙提·皮森的布莱恩的一生》（1979年）和《蒙提·皮森的生命的意义》（1983年）——已在多部书籍出版物中被详尽地记录，通常由团体成员亲自叙述，包括《蒙提·皮森发言！》（1999年）和《皮森们：皮森们的自传》（2003年）。因此，本引言将仅限于提供一个简洁的历史概述。特里·琼斯和迈克尔·帕林在牛津大学相识，他们在那里作为名为“牛津讽刺剧团”的喜剧团体的一部分一起表演。格雷厄姆·查普曼、约翰·克里斯和艾瑞克·爱
    similarly 在剑桥大学作为剑桥大学脚灯戏剧俱乐部的成员相识，随后查普曼、克里斯和爱在随脚灯俱乐部巡演期间在纽约市遇到了美国人特里·吉列姆（Landy
    2005: 6–13）。从1964年到1969年，这六位未来的皮森成员以各种身份和组合在各种不同的英国广播和电视节目中合作。所有五位英国皮森成员都参与了讽刺电视节目《弗罗斯特报告》，该节目从1966年播出到1967年，克里斯是演员和编剧，爱、帕林、查普曼和琼斯是编剧（BBC
    n.d.b）。爱、琼斯和帕林——以及被请来担任动画师的吉列姆——接着参与了古怪的英国电视系列剧《不要调整你的设置》，该剧从1967年播出到1969年（Wilmut
    1980: 181），琼斯和帕林还在1969年创作并主演了六集《英国完整而彻底的历史》（见Eggers 2006）。克里斯和查普曼则在1968年担任节目《如何激怒人们》的演员和编剧（Cleese
