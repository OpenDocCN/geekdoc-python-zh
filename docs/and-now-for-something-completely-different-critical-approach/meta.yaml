- md: '## ‘IT’S . . . THE INTRODUCTION’


    Kate Egan and Jeffrey Andrew Weinstock


    On 5 October 1969, a new sketch comedy programme premiered on BBC1. The episode,
    with a title, ‘Whither Canada?’ designed to confound critics and reviewers, opened
    with a bedraggled, half-drowned man (Michael Palin) emerging from the ocean and
    collapsing exhausted on the shore, where he uttered one word: ‘It’s . . .’ His
    thought was then completed by a sedate narratorial voice revealing the unlikely
    name of the programme, ‘Monty Python’s Flying Circus’, backed by John Philip Sousa’s
    ‘The Liberty Bell’ march and against surreal, stylised animation of exploding
    heads, naked ladies and characters squashed by a giant foot. Following the opening
    credits, Wolfgang Amadeus Mozart (John Cleese) considered ridiculously inaccurate
    famous deaths in history as rated by a panel of judges; a British language instructor
    (Terry Jones) attempted to teach Italian to native speakers; a commercial was
    presented for butter touted as indistinguishable from a dead crab; a talk show
    host (John Cleese) interviewed a famous director (Graham Chapman) but failed to
    get past trying to establish the director’s name; another talk show host (Eric
    Idle) interviewed one of the world’s ‘leading modern composers’ (Terry Jones)
    but, again, focused on the composer’s name; news coverage was offered of a bicycle
    race in which the participants were all twentieth-century artists; and the history
    of a joke so funny that to hear it was to die immediately from laughter was pursued
    in the form of a documentary. In between segments, pigs squealed and animated
    bits featured absurd and suggestive manipulations of photographs. The episode
    then ended with the same bedraggled man who had opened the episode laboriously
    returning to the ocean.


    ![](img/ebe0b8e55d891830377e938813c6b978_13_0.png)


    Figure I.1 Michael Palin’s ‘It’s’ Man: *Monty Python’s Flying Circus* (1969–74).


    The premiere episode of *Monty Python’s Flying Circus* was audacious, erudite
    and irreverent. With parts filmed in front of a studio audience and parts on location,
    and mocking different media formats including the documentary, news broadcast,
    talk show and game show, the episode combined dazzling wordplay (Cleese’s litany
    of contemporary artists during the ‘Picasso/Cycling Race’ segment stands out)
    with absurdist animation, sophisticated references to art and history with unapologetic
    silliness, and original sketch comedy with parody. It was also not particularly
    well received.


    The first episode premiered at just shy of 11pm on a Sunday, with *Flying Circus*
    replacing a religious devotional programme for clergymen that had received lacklustre
    ratings (Hewison 1981: 7). According to Robert Verkaik, the first episode captured
    only a 3 per cent share of the British viewing population – about 1.5 million
    people – the lowest ratings for any ‘light entertainment show’ for the week (Verkaik
    2009). Even more alarmingly, BBC management expressed concern about the content
    of some of the sketches. As reported by Verkaik:


    Aubrey Singer, the head of the BBC’s features group, told the meeting that he
    had found parts of the programme ‘disgusting’ while the controller of BBC1 [Paul
    Fox] complained the show had ‘gone over the edge of what was acceptable’. (Ibid.)


    Audience response, however, appears to have been a bit more positive. The *History
    of the BBC* ‘Monty Python at 50’ website reports that ‘[w]ithin a week of Monty
    Python’s first episode, BBC Audience Research had undertaken one of its regular
    Audience Research Reports. The results overall were positive – amusing, entertaining,
    goon-like, and “outrageous” being some of the comments’ (BBC n.d.a). Fortunately,
    enthusiasm for the series on the part of viewers and critics built over the course
    of the first series’ thirteen-week run, and the series went on to run for four
    seasons – a total of forty-five episodes, plus two recorded specifically for German
    television.


    Looking back from a vantage point of over fifty years after the series’ premiere,
    it is clear that both the BBC executives and the viewing audience intuited correctly
    what was happening as the Pythons ‘tore up the rule book of comedy grammar, conventions
    and traditions’ (BBC n.d.a). That which is new and innovative is invariably received
    as threatening by the standard bearers of the status quo and those invested in
    not ruffling feathers, and the goal of the Pythons was never adhering strictly
    to established standards of good taste. The yardstick against which success was
    measured was instead simply: is it funny? And, as Hewison notes, ‘[t]he Pythons
    were quick to exploit the humorous possibilities of bad language’, as well as
    sex and ‘comic violence’ (Hewison 1981: 14). But *Monty Python’s Flying Circus*,
    of course, did more than that. As Wilmut proposes and Landy develops at length
    in her book devoted to the programme, the series ‘mock[ed] the techniques of television’
    (Wilmut 1980: 198). No wonder BBC executives were perturbed! Audiences, however,
    increasingly appreciated what the Pythons were doing, first on their television
    show and, later, in their films as they rewrote the rules of television comedy
    with humour that could be, in the words of *Encyclopaedia Britannica*, ‘simultaneously
    sarcastic, scatological, and intellectual’. Television, notes the entry, ‘had
    never broadcast anything so surreal, daring, and untraditional as *Monty Python*,
    and its importance to television is difficult to overstate’ (*Encyclopaedia Britannica*
    n.d.).


    And yet, while popular appreciation of the Pythons has swelled to truly impressive
    proportions – as attested to by the fact that tickets for the 2014 reunion show
    sold out in forty-three seconds, leading the troupe to quickly announce more shows
    (Dex 2013) – and as the Pythons have been justly honoured and fêted for their
    achievements, scholarly appraisal of their artistry and accomplishments (as is
    often the case with scrutiny of popular culture) has lagged behind. The purpose
    of this collection then, on the occasion of the fiftieth anniversary of the premiere
    of *Monty Python’s Flying Circus*, is to contribute to the'
  mdcn: '## ‘这是……开场白’


    凯特·伊根 与 杰弗里·安德鲁·温斯托克


    1969年10月5日，一档新的素描喜剧节目在BBC1频道首播。该集的标题“加拿大何去何从？”旨在迷惑评论家和剧评人，开场是一个衣衫褴褛、半身湿透的男人（迈克尔·帕林）从海中走出，精疲力竭地瘫倒在岸边，只说了一个词：“这是……”随后，一个沉稳的旁白声音接完了他的想法，揭示了节目那个不太可能的名字——“蒙提·派森的飞行马戏团”，伴随着约翰·菲利普·苏萨的《自由之钟》进行曲，背景是超现实、风格化的动画：爆炸的头颅、裸体女士和被巨脚踩扁的角色。片头字幕后，沃尔夫冈·阿马德乌斯·莫扎特（约翰·克里斯）在一个评委小组面前，对历史上那些荒谬不准确的名人死法进行点评；一位英国语言教师（特里·琼斯）试图向意大利母语者教授意大利语；一则广告推销一种被吹嘘得与死螃蟹无法区分的黄油；一位脱口秀主持人（约翰·克里斯）采访一位著名导演（格雷厄姆·查普曼），却始终无法确认导演的名字；另一位脱口秀主持人（埃里克·艾德尔）采访一位世界“顶尖现代作曲家”（特里·琼斯），但同样，焦点集中在作曲家的名字上；新闻报道了一场自行车赛，参赛者都是二十世纪的艺术家；并以纪录片的形式，追寻一个笑话的历史，这个笑话如此好笑，以至于听到它的人会立刻笑死。在各个片段之间，猪在尖叫，动画片段则展示了对照片进行荒谬且带有暗示性的处理。该集最后，以开场那个衣衫褴褛的男人艰难地返回大海而结束。


    ![](img/ebe0b8e55d891830377e938813c6b978_13_0.png)


    图 I.1 迈克尔·帕林的“这是”人：《蒙提·派森的飞行马戏团》（1969–74）。


    《蒙提·派森的飞行马戏团》的首播集大胆、博学且不敬。部分在演播室观众前拍摄，部分在外景地拍摄，嘲讽了包括纪录片、新闻广播、脱口秀和游戏节目在内的不同媒体形式，该集将令人眼花缭乱的文字游戏（克里斯在“毕加索/自行车赛”片段中对当代艺术家的连珠炮式列举尤为突出）与荒诞动画、对艺术和历史的精妙引用与毫无歉意的愚蠢、原创素描喜剧与戏仿结合在一起。然而，它的反响也并非特别好。


    首播集在周日晚上接近11点播出，《飞行马戏团》取代了一档收视率平淡的神职人员宗教节目（Hewison 1981: 7）。据罗伯特·韦尔凯克称，首播集仅获得了英国观众3%的份额——约150万人——是当周所有“轻娱乐节目”中收视率最低的（Verkaik
    2009）。更令人担忧的是，BBC管理层对一些素描的内容表示了担忧。正如韦尔凯克所报道的：


    BBC专题组负责人奥布里·辛格在会议上表示，他发现节目的某些部分“令人作呕”，而BBC1频道的总监[保罗·福克斯]则抱怨该节目“越过了可接受的界限”。（同上）


    然而，观众的反应似乎更为积极。《BBC历史》的“蒙提·派森50周年”网站报道称，“在蒙提·派森首播集播出后一周内，BBC观众研究部进行了其定期的观众研究报告。总体结果是积极的——有趣、娱乐性强、像傻瓜一样，以及‘离谱’是一些评论中的关键词”（BBC
    n.d.a）。幸运的是，观众和评论家对这部剧集的热情在第一季为期十三周的播出过程中逐渐高涨，该剧最终播出了四季——总共四十五集，另外还有两集是专门为德国电视台录制的。


    从该剧首播五十多年后的有利视角来看，很明显，BBC高管和观众都正确地直觉到了当派森们“撕毁喜剧语法、惯例和传统的规则手册”时正在发生什么（BBC n.d.a）。任何新奇和创新的东西，总会被现状的捍卫者和那些不愿惹麻烦的人视为威胁，而派森们的目标从来不是严格遵守既定的品味标准。衡量成功的标准反而很简单：它好笑吗？而且，正如休伊森指出的，“派森们迅速利用了脏话、性以及‘喜剧暴力’的幽默可能性”（Hewison
    1981: 14）。但《蒙提·派森的飞行马戏团》当然不止于此。正如威尔穆特提出，并在兰迪关于该节目的书中详细阐述的那样，该系列“嘲讽了电视技术”（Wilmut
    1980: 198）。难怪BBC高管们感到不安！然而，观众越来越欣赏派森们所做的事情，首先是在他们的电视节目中，后来是在他们的电影中，他们用《大英百科全书》所描述的“同时具有讽刺、粗俗和智慧”的幽默改写了电视喜剧的规则。该词条指出，“电视从未播出过像《蒙提·派森》这样超现实、大胆且非传统的节目，其对电视的重要性怎么强调都不为过”（*Encyclopaedia
    Britannica* n.d.）。


    然而，尽管对派森们的大众欣赏已经膨胀到真正令人印象深刻的规模——正如2014年重聚演出的门票在四十三秒内售罄，促使剧团迅速宣布更多演出所证明的那样（Dex
    2013）——并且派森们因其成就而获得了应有的荣誉和赞誉，但对他们艺术性和成就的学术评价（正如对流行文化的审视常常如此）却滞后了。因此，本合集的目的，恰逢《蒙提·派森的飞行马戏团》首播五十周年之际，旨在为'
