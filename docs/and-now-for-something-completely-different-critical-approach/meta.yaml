    ## CONCLUSION


    By breaking down the division of labour between its creators to that of the primarily
    written and the primarily visual, Jones and Gilliam can be placed within the mediaeval
    tradition of manuscript illumination; by borrowing elements from a range of mediaeval
    films, such as the self-flagellating monks of *The Seventh Seal* and the musical
    revelry of *Camelot*, the Pythons engage with existing representations and appropriations
    of the Middle Ages on film; and, by incorporating a supposed source text into
    the body of the film, they draw directly on the same device of literary authority
    as do the likes of Chrétien de Troyes and Malory. Furthermore, in both Gilliam’s
    appropriation of mediaeval manuscript illuminations and the Pythons’ postmodern
    interference with the quest narrative there is an echo of the relationship between
    the illuminator and the text that was to be illuminated. Camille writes:


    > Ironically, the medieval illuminator hardly ever read the text of a work he
    was formally illustrating – in the case of Bibles or Romances – where he followed
    earlier copies or models; but on the edge he was free to read the words for himself
    and make what he wanted of them. In this respect, marginal images are *conscious*
    usurpation, perhaps even political statements about diffusing the power of the
    text through its unravelling (the word ‘text’ is derived from *textus*, meaning
    weaving or interlacing), rather than repressed meanings that suddenly flash back
    onto the surface of things. (Camille 2015: 42)


    Though it may initially appear as mere silliness masquerading in the trappings
    of Arthurian legend, *Monty Python and the Holy Grail* is in fact a highly complex
    engagement with and continuation of a wealth of literary, artistic and historical
    traditions. In the same way that these mediaeval illuminators offered, in their
    marginalia, commentary or interpretations of the material that they were illustrating,
    *Holy Grail* contains and exhibits the Pythons’ readings, understandings and commentaries
    on the plethora of influences which made their way into the film. Absurd it may
    be, but the Pythons’ contribution to the Arthurian tradition is a well-informed
    one and is, in its relationship between word and image, form and content, inherently
    mediaeval at heart.


