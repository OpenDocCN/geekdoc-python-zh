- md: 'it also displays an ‘indeterminacy and randomness of language’ and ‘bathetic
    discontinuity’ (Mills 2014: 129), which he subsequently also applies to *Monty
    Python’s Flying Circus*. For him, the surrealistic or psychedelic aspect even
    serves as the series’ cornerstone (ibid.). Consequently, the *Flying Circus*’s
    distinctive aesthetic is therefore predominantly characterised by ‘a mélange of
    disparate subconscious images (Terry Gilliam’s cartoons) and the ridiculous (Idle’s
    puns)’ (ibid.). Additionally, the Pythons as well as the Bonzo Dog Doo-Dah Band
    and the Beatles ‘[a]ll . . . exemplify surrealism or Dadaism in a popular or low-cultural
    framework’ (ibid.: 126).


    While the *Flying Circus* series classifies as a sketch show with interlinking
    elements (e.g. Gilliam’s animations or the ‘and now for something completely different’
    announcer), it maintains a singular position as the sketches themselves and the
    series’ overall structure repeatedly tend to undermine the audience’s expectations.
    As Alexander Brock highlights, the animations ‘often took an element from the
    previous sketch as their starting point, developed it into a mini-narrative and
    then led on to the next sketch. The connections occasionally followed an unexpected
    logic’ (Brock 2016: 53). Therefore, the series applies a kind of associative ‘stream-of-consciousness
    approach’ (ibid.). This, again, is also a characteristic of the psychedelic 1960s
    mindset that simultaneously echoes the spontaneous nature of Surrealist automatism.
    Unlike their previous contribution to the satirical television programme *The
    Frost Report* (1966–7) and the initially rather strict televisual conventions,
    the Pythons were granted a certain artistic licence with regard to the *Flying
    Circus* series (ibid.). As a result, many sketches not only contain absurd wordplay
    and tongue-in-cheek double entendres, but are also devoid of a punchline while
    quite a few are even suddenly abandoned (e.g. the ‘Strangers in the Night’ sketch,
    in which Terry Jones plays an adulterous, promiscuous wife who is simultaneously
    visited by her numerous lovers, episode 10, ‘Untitled’).


    The Pythons’ absurdist-surrealist tendency is also apparent in Richard Lester’s
    1960s output, ranging from both Beatles films (*A Hard Day’s Night*, 1964, and
    *Help!*, 1965) to the post-nuclear comedy *The Bed Sitting Room* (1969). Particularly
    the latter appears as very Pythonesque, especially since Lester fuses absurdist
    comic elements with tragic-nihilistic dimensions as the narrative is principally
    centred upon ‘the theme of human alienation brought about by social annihilation’
    (Sinyard 2010: 74). The breakdown of social hierarchies and its absurd, at times
    highly bizarre consequences – a certain Mrs Ethel Shroake becomes queen and ‘[t]he
    Prime Minister is selected on the basis of his inside-leg measurement’ (ibid.:
    75) – are also present in *Monty Python’s Flying Circus*: in the ‘It’s a Tree’
    sketch, for example, a rainforest and a bucket of sawdust express their view on
    teenage violence (episode 10, ‘Untitled’); or in the ‘Poets’ sketch, each household
    can install its own poet of choice (episode 17, ‘The Buzz Aldrin Show’).


    The series is also notable for its meta-humoristic tendency: frequently, the artificial
    nature of the sketch show is pointed out directly, ‘occasionally triggered by
    characters complaining about the poor quality of the lines written for them .
    . . , apologies for repetitiveness . . . or extras who were not informed about
    the content of sketches they were supposed to act in’ (Brock 2016: 53) (e.g. the
    recurrent actor dressed up as a bishop). This device had, however, also recently
    made its appearance in absurdist theatre, namely in the plays of Joe Orton to
    name one significant example. In his seminal *Entertaining Mr Sloane* (1964),
    Orton explicitly refers to the play’s artificial disposition. Moreover, similar
    to the narrative structure of the Python sketches, Orton’s farcical comedy is
    marked by a specific degree of incongruity that continuously upsets the audience’s
    expectations. The resulting ‘dislocation between language and reality is the center
    of what has come to be called the “Ortonesque” – an intensely farcical style characterized
    by fast-paced, witty word play involving elevated language applied to low and
    base situations’ (Lawson 2003: 16). In *Entertaining Mr Sloane*, Orton even goes
    so far as to eventually set out ‘to frustrate the expectations of the audience’
    (ibid.: 19) by subverting the characteristics of a well-made play and, most notoriously,
    by discarding the anticipated happy ending. Since Python’s *Flying Circus* series
    also aims at – and succeeds in – inverting and exposing ‘institutionalized representations
    of gender and sexuality as they are expressed and disseminated broadly through
    the culture and through the medium of television’ (Landy 2005: 79), Orton’s decidedly
    queer perspective and candid attack on bourgeois hypocrisy and outright ‘refusal
    of society’s repressive categorization of sexual conduct as “normal” or “deviant”,
    and his mockery of its attempts to pigeonhole individuals as one or the other’
    (Higgins 2006: 263–4) seem particularly noteworthy.


    ## ‘WE’RE DOING OUR OWN THING, MAN’: THE PYTHONS AND 1960S BRITAIN


    As previously highlighted, ‘[t]he specific cultural moment of the show’s appearance
    was also intrinsic to its success’ (Landy 2005: 15). Accordingly, ‘[t]he character
    and effects of the *Flying Circus* comedy are best described as belonging to this
    broadly acknowledged moment of transition’ (ibid.). By the time the programme
    was aired, the general mood in Britain as well as in the United States was increasingly
    marked by a sense of disillusionment and frustration that resulted from the dire
    economic status quo and what was commonly regarded as the failure of the 1960s
    dream of peace, love, freedom, expanded perceptual dimensions and the overcoming
    of social boundaries and inequalities. In Britain, a growing dissatisfaction with
    the Labour government (1964–70) became manifest and there were various protests
    against the Vietnam War, no consensus regarding Britain’s entry into the European
    Economic Community and several strikes (ibid.). However, as Landy underlines,
    the actual social discrepancies were to a certain extent covered by the increase
    in personal income (ibid.: 16). Moreover, the notion of the era’s ‘affluent society’
    was ‘directly and indirectly intertwined with media’ (ibid.). Consequently, the
    media, whose growing impact was also intellectually acknowledged by Marshall McLuhan’s
    various writings, contributed to the public perception of the highly conflicted
    decade. While its exact periodisation remains equally problematic and contested,
    cultural memory of the 1960s is often characterised by a tendency to mythologise
    the era as a ‘decade of decadence and decline’ (Burkett 2013: 11). Emphasising
    the formative role of the post-war ‘youthquake’ in relation to a ‘wider and often
    mythic construction of time’ (Jenss 2015: 39), Heike Jenss then refers to Colin
    MacInnes’s portrayal of British youth culture in his seminal *Absolute Beginners*
    (1959). The novel ‘inscribes an opposing sartorial-temporal orientation in line
    with the dichotomous narrative of modernity’ (Jenss 2015: 39), thus simultaneously
