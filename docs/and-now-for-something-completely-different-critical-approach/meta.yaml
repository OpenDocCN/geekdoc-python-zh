  md: 'forces philosophy to tie itself into a knot of irrelevance by foregrounding
    the kind of ironic playfulness that amounts to silliness and absurdity (‘there
    it is, nothing is real. And even that’s not real. See what I did there?’).


    Beyond postmodernism, *The Meaning of Life* continues to baffle critics. Eagleton,
    who ambitiously took his book title from the film, is one of the very few who
    hold it for what it is (as I showed above). But Eagleton’s reviewers fail to see
    that (look for instance to Dempsey 2010). To this day, the Pythons *still* fool
    a critical establishment slavishly eager to champion them as prophets. *Harper’s*
    solemn publication of John Cleese’s ‘Sermon’ (2019) is but one example (and one
    in which Cleese cheekily references *The Meaning of Life* in anything but name),
    as is the seriousness surrounding Michael Palin’s documentary travel series, or
    even his appearance in *Death of Stalin* (Iannucci, 2018) – another film about
    laughter and murder taken way too seriously by those in the serious-business.
    The only difference is that, as Eric Idle observes, it is now no longer in their
    hands: ‘I think I’ve done my bit. I’m interested in my life, whatever is left
    of it’ (Deb 2018).


    For many, *The Meaning of Life* is indicative of the ‘ending of Python’, its ramshackle
    assembly and overblown style not a show of firepower but of exhaustion, as if
    the machine had run out of fuel. As such, then, the link between *The Meaning
    of Life* and the rest of the Python oeuvre is that it functions as a tail, a loose
    end. True, it shares with *Life of Brian* a sense of impertinence – as if there
    is a pinch of meanness to it, and that the aforementioned exhaustion is also,
    slightly, one of frustration (perhaps a frustration within the troupe). But in
    essence it stands alone, as a big landfill at the edge of town. That view is backed
    by the fate of some contemporary films Pythons were involved in. *Yellowbeard*
    (Damski, 1981), *Brazil* and *Erik the Viking* also appear to indicate Monty Python’s
    time was simply up. In spite of the involvement of Pythons, these films did not
    fare too well. In the end, *The Meaning of Life*, and the comparisons it draws
    with philosophy, kinds of cruelty, absurd realism and poetry, contemporary comedy
    and other Python-influenced projects, paint it as overly ambitious – perhaps not
    by design, but certainly in its eventual appearance and, yes, meaning. It is Python’s
    rock opera or concept album (Pink Floyd or The Who, anyone?) going over the top.
    That said, the film’s trajectory from logic to loss, and its insertions, at increasingly
    higher rhythm, of increasingly more absurd vignettes, give the in-between segments
    a degree of anarchic freedom, as if *The Meaning of Life* goes rogue at the cost
    of its own game plan and team structure. It is in this waste that its value lies.


    Ultimately, *The Meaning of Life* refuses to be taken seriously. It is irreverent
    because its behaviour shows it couldn’t possibly be in earnest. As a confirmation
    of the fluidity of comedy at large and as a hyperbolic gesture, as well as, to
    stick with *The Meaning of Life*’s own ending, a solid rant on the state of entertainment
    today, it remains the perfect Python endnote. ‘Now everybody –’'
