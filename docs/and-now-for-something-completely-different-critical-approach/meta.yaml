    character takes his dead mother to an undertakers’ office and her youthful appearance
    suggests to the undertaker (Chapman) the possibility of cannibalism. Cleese’s
    character is initially shocked, but then admits to ‘feeling a bit peckish’. The
    outcry concerning this sketch was predictable and in December 1989 John Cleese
    would eulogise Chapman, who suggested the final line of the sketch, ‘All right,
    we’ll eat her, but if you feel bad about it afterwards, we’ll dig a grave and
    you can throw up into it’, with the characterisation, ‘Anything for him but mindless
