    Marcia Landy argues that the Pythons’ use of animals for comic purposes arises
    from the unsettling nature of ‘unpredictable transformations’ that ‘ridicule the
    cultural restraints placed on the human body and on all forms of language’ (Landy
    2005: 63). These restraints apply to cultural understandings of animals too, and
    thus the humour arises from the rejection of those societal norms. By this account,
    such representations of animals in comedy could be seen to function in a powerful
    way, critiquing and destabilising human–animal relationships. A reading such as
    this could align with emerging debates about the representations of animals within
    culture, particularly given that culture relies on language, and ‘language [has]
    denied animals throughout the history of much philosophy’ (Lippit 2015: xiv).
    This has resulted in conceptualisations of animals as lacking in the kind of subjectivity
    deemed to define the human; and the consequence of this is that animals within
    cultural representations are forever objects rather than subjects. We can then
    see ‘people’s framing of animals in visual culture’ (Malamud 2012: 2) as a powerful
    contributor to humans’ treatment of animals in the lived world. Indeed, humans
    encounter animals as representations far more often than they do as living beings;
    it is not unlikely that many people who have seen ‘the parrot sketch’ might never
    have encountered an actual, living parrot. Thus, human–animal relationships are
    ones dominated by representations, to the extent that those relationships are
    ones *of* representation.


    The particularities of those representations are inflected here via the comic
    nature of the programme under discussion. Indeed, the relationships between animals
    and comedy are acute, for there is


    > a common view that almost anything to do with animals is somehow funny, or at
    least likely to be funny. This funniness in animal representation – a release
    from the usual constraints of meaning – may range from the endearingly amusing
    to the surrealistic and bizarre. (Baker 2001: 23)


    What this suggests is that animals function as a representational category which
    can be used for particular purposes within human cultures, and those purposes
    rely on an understanding of animals as ‘somehow funny’. This funniness is dependent
    on their non-human status, and that distinction is enough to render animals funny.
    What this means is that comedy functions as a space within which the human norm
    is repeatedly reinscribed, via the representation of the other which is not human:
    the animal. That a culture should find animals *intrinsically* funny points to
    the certainty of human–animal distinctions, with humour used to police and naturalise
    those distinctions.


    Given this ‘common view’ of animals’ funniness, it is not surprising that animals
    recur across Monty Python’s oeuvre beyond the ‘Dead Parrot Sketch’. In *Monty
    Python’s Flying Circus*, these include: ‘Mouse Organ’ in which Terry'
- md: 'Jones hammers mice to make music, ‘Albatross’ in which John Cleese attempts
    to sell that bird in a manner more akin to ice-cream, the linked ‘Flying Sheep’
    and ‘French Lecture on Sheep Aircraft’ in which sheep suddenly become air-borne,
    ‘Confuse-A-Cat’ in which a vet advises a couple worried about their cat’s lack
    of movement to confuse it more, ‘Gorilla Librarian’ featuring a gorilla at a job
    interview, and ‘Crunchy Frog’, where that animal’s inclusion in a box of chocolates
    is deemed problematic. In the Monty Python films, animals often appear for comic
    purposes too, from *Holy Grail*’s killer rabbit of Caerbannog to the recurring
    fish tank in *The Meaning of Life*. There are *Flying Circus* episodes called
    ‘The Ant: An Introduction’ (series 1, episode 9), ‘It’s the Arts (or: the BBC
    Entry to the Zinc Stoat of Budapest)’ (series 1, episode 6), ‘The Naked Ant’ (series
    1, episode 12), and ‘Owl Stretching Time’ (series 1, episode 4). The latter of
    these was a suggestion for the title of the programme itself, and many others
    of these similarly refer to animals, including ‘A Horse, a Spoon and a Bucket’
    and ‘The Toad Elevating Moment’. That the eventual title itself includes an animal
    – and that the troupe are often referred to as ‘the Pythons’ – demonstrates the
    recurring interplay of comedy and cultural understandings of animals.


    This plethora of animal representation also indicates the variety of ways in which
    humans use animals – both in representations and in the lived world. In the ‘dead
    parrot sketch’ the animal is a domesticated pet; in sketches featuring sheep those
    animals are farmed, prior to their being turned into meat; the humour in the ‘gorilla
    librarian’ sketch relies on the typical understanding of that animal as wild;
    and whereas the killer rabbit of Caerbannog is also a wild animal, its wildness
    is of a kind not expected for a rabbit. So, some animals are pets, some are wild,
    some are farmed, some are meat. The category ‘animal’ is a baggy and loose one,
    encapsulating a variety of meanings. This evidences human cultures’ contradictory
    understanding of animals, and the title of Hal Herzog’s book *Some We Love, Some
    We Hate, Some We Eat* aims to capture that ‘[t]he way we think about other species
    often defies logic’ (Herzog 2011: 1). The case studies examined below draw on
    those contradictions, looking at representations of animals as meat and as pets.
    Yet those contradictions remain framed within the broader category of ‘the animal’,
    and so this variety is evidence of the breadth of that category, rather than a
    destabilisation of it. Animal representations can be used for multiple purposes,
    yet they never fundamentally trouble human–animal hierarchies.


    ## EATING ANIMALS: THE ALBATROSS


    The sketch ‘Albatross’ is set in a cinema where, in common with contemporaneous
    theatrical norms, there is an intermission between the various films being shown.
    John Cleese is dressed as a female ice-cream seller, replete with tray upon which
    it is typical for that product to be available. But instead of calling ‘ice-cream’
    to attract customers, the seller instead yells ‘albatross’, and there is a large
    bird of that kind lying on the tray, taking up all of its space, one of its wings
    raised in the air. Terry Jones plays a cinemagoer, who goes up to the seller to
    enquire about the availability of choc-ices. The seller replies that they only
    have the albatross, and continues to yell the bird’s name across the cinema to
    attract more customers. Jones asks what flavour the albatross is, and whether
    it comes with wafers. Cleese, irate, answers that it is sea-bird flavour, and,
    ‘Course you don’t get bloody wafers with it.’ After asking the price, Jones buys
    two, and Cleese then moves on to the other wares for sale, this time exclaiming,
    ‘Gannet on a stick.’ Later in the episode Jones reappears, once again sitting
    in the cinema audience, this time with the albatross on his lap. It is a short
    sketch, lasting less than forty seconds, and it is this brevity that signals its
    usefulness for thinking about the cultural understandings of animals. After all,
    such a concise sketch has no time to set up complicated ideas or work through
    a complex narrative, and so must instead rely on normalised sociocultural contexts
    in order for its comic meaning to be apparent.


    As such, the sequence aligns neatly with the incongruity theory of humour. This
    theory argues that comedy arises because ‘[w]e live in an orderly world, where
    we have come to expect certain patterns among things . . . We laugh when we experience
    something that doesn’t fit into these patterns’ (Morreall 1983: 15–16). This conceptualisation
    of humour is commonly traced back to Immanuel Kant, who argues that ‘[l]aughter
    is an affection arising from the sudden transformation of a strained expectation
    into nothing’ (Kant [1790] 1931: 233). Important here are two ideas. Firstly,
    that comedy requires its incongruities to be presented and understood suddenly;
    a punchline that is slowly worked out, or laboriously explained, is rarely funny.
    Secondly, comedy turns such expectations into ‘nothing’; that is, these are not
    incongruities that result in fear or horror or disgust. By this account, comedy
    is a relatively benign phenomenon, its pleasure dependent upon its resolution
    resulting in ‘nothing’. The incongruity theory was also expounded by Arthur Schopenhauer,
    who argues that


    > The cause of laughter in every case is simply the sudden perception of the incongruity
    between a concept and the real objects which have been thought through it in some
    relation, and laughter itself is just the expression of this incongruity. (Schopenhauer
    [1819] 1970: 76)


    For Schopenhauer, comic incongruity does not result in ‘nothing’, but ‘[r]ather
    we get something that we were not expecting’ (Morreall 1983: 17). This formulation
    argues that the incongruous nature of comedy allows it to present ideas, concepts
    or representations beyond those of our expectations, and thus it can constitute
    a considerable force for reconceptualising how the world is thought about. Yet
    in order for it to do this, it must draw on, and establish, those expectations
    which are to be overturned or reformulated. So, whether comedy results in ‘nothing’
    or ‘something’, it is a form of communication whose incongruities can only be
    meaningful if it draws on expectations assumed to be shared by its audience. And
    it is because of this that we can examine comedy to make explicit those expectations
    and, by extension, a wide range of sociocultural norms.


    But the structure of comedy is more constrained than that which is produced by
    presenting incongruities. After all, not everything that is incongruous is funny.
    Kant’s assertion that comedy results in ‘nothing’ begins to point towards the
    necessity for comic incongruities to be unthreatening in order to be pleasurable.
    But in addition to this is the necessity for a ‘logic of the absurd’ in which
    ‘the state of affairs portrayed is simultaneously highly implausible and just
    a little bit plausible’ (Palmer 1994: 96; also see Palmer 1987). The ‘logic’ Palmer
    refers to is one that both enables the incongruity to be resolved, but also points
    towards the possibility of the incongruity occurring in the first place. As such,
    jokes typically require set-ups and punchlines, whereby the set-up offers a logical
    world of expectations, while the punchline delivers an incongruity that is sudden,
    unexpected, unthreatening and – importantly – in some way makes some kind of sense
    according to the rules established by the set-up. It is the relationship between
    the set-up and the punchline that constructs an event as a joke; one without the
    other is not comic. But important here is that set-ups themselves typically draw
    on sociocultural norms in order to establish the ‘logic’ of the world in which
    the punchline is both incongruous and ‘a little bit plausible’. It is because
    of this that comedy can be examined for its indication of sociocultural norms,
    for they are vital to both parts of the process; they are drawn upon in order
    for the set-up to be established efficiently, and they are troubled or overturned
    by the punchline. It is precisely because both parts of the comic moment rely
    on expectations and norms for their effects that, even if a joke unarguably questions
    those norms, it is possible to argue that humour is never truly radical. After
    all, comedy can never move into an arena where those norms are truly abandoned,
    for then there would be nothing upon which the ‘logic of the absurd’ could be
    established.


    For the ‘albatross’ sketch, it’s clear the cultural assumptions this logic relies
    upon. Indeed, these assumptions are so specific that the sketch can become unintelligible
    when viewed from outside the required context. The sketch is not required to explain
    to its contemporaneous audience that intermissions at cinemas take place, or that
    during those intermissions sellers proffer ice-cream; the mere presentation of
    it as fact would resonate with the viewing audience at the time. But that this
    is merely a cultural norm is evidenced in that viewers watching the sketch now
    might be confused by what is taking place, given that intermissions and ice-cream
    sellers are largely absent from contemporary multiplexes. And there are other
    cultural norms the sketch relies on too.'
  mdcn: '琼斯敲打老鼠来制造音乐，‘信天翁’中约翰·克里斯试图以一种更像卖冰淇淋的方式出售那种鸟，相关的‘飞羊’和‘关于绵羊飞机的法语讲座’中绵羊突然飞上天空，‘迷惑猫’中一位兽医建议一对担心猫缺乏活动的夫妇更多地迷惑它，‘大猩猩图书管理员’以一只大猩猩参加工作面试为特色，以及‘脆皮青蛙’，其中那种动物被放入一盒巧克力中被认为有问题。在蒙提·派森的电影中，动物也经常出于喜剧目的出现，从*圣杯*中卡班诺格的杀手兔子到*生命的意义*中反复出现的鱼缸。有*飞行马戏团*的剧集名为‘蚂蚁：简介’（第1季，第9集），‘这是艺术（或：布达佩斯锌白鼬的BBC参赛作品）’（第1季，第6集），‘裸体蚂蚁’（第1季，第12集），以及‘猫头鹰伸展时间’（第1季，第4集）。后者曾是节目本身标题的建议，许多其他剧集也类似地指涉动物，包括‘一匹马、一个勺子和一个桶’和‘蟾蜍提升时刻’。最终标题本身包含一种动物——而且该团体常被称为‘派森们’——这展示了喜剧与对动物的文化理解之间反复的相互作用。


    这种大量的动物表征也表明了人类使用动物的多种方式——无论是在表征中还是在现实世界中。在‘死鹦鹉小品’中，动物是家养宠物；在以绵羊为特色的小品中，那些动物是农场养殖的，在它们被制成肉之前；‘大猩猩图书管理员’小品中的幽默依赖于将该动物视为野生动物的典型理解；而卡班诺格的杀手兔子也是一种野生动物，但它的野性是人们不期望兔子具有的。所以，有些动物是宠物，有些是野生动物，有些是农场养殖的，有些是肉。‘动物’这个类别是一个宽泛而松散的范畴，包含了多种含义。这证明了人类文化对动物的矛盾理解，哈尔·赫尔佐格的书*我们爱一些，我们恨一些，我们吃一些*的标题旨在捕捉‘[我们]思考其他物种的方式常常违背逻辑’（赫尔佐格
    2011: 1）。下面考察的案例研究利用了这些矛盾，审视了动物作为肉和作为宠物的表征。然而，这些矛盾仍然被框定在更广泛的‘动物’范畴内，因此这种多样性证明了该范畴的广度，而不是对其的动摇。动物表征可以用于多种目的，但它们从未从根本上扰乱人与动物的等级关系。


    ## 吃动物：信天翁


    小品‘信天翁’设定在一个电影院里，与当时的戏剧规范一样，在放映的电影之间有中场休息。约翰·克里斯打扮成一个女性冰淇淋销售员，配有一个典型的盛放该产品的托盘。但销售员没有喊‘冰淇淋’来吸引顾客，而是大喊‘信天翁’，一只那种大鸟躺在托盘上，占据了所有空间，一只翅膀举在空中。特里·琼斯扮演一位电影院观众，他走向销售员询问是否有巧克力冰淇淋。销售员回答说他们只有信天翁，并继续在电影院里大喊鸟的名字以吸引更多顾客。琼斯问信天翁是什么口味的，是否配华夫饼。克里斯愤怒地回答说是海鸟口味，而且，‘当然你不会得到该死的华夫饼。’询问价格后，琼斯买了两个，然后克里斯转向其他出售的商品，这次喊道，‘棍子上的鲣鸟。’在该集的后面，琼斯再次出现，再次坐在电影院观众席上，这次信天翁放在他的腿上。这是一个简短的小品，持续不到四十秒，正是这种简洁性表明了它对于思考动物文化理解的有用性。毕竟，如此简洁的小品没有时间设置复杂的想法或展开复杂的叙事，因此必须依赖规范化的社会文化背景，以便其喜剧意义显而易见。


    因此，该片段与幽默的不协调理论完美契合。该理论认为喜剧之所以产生是因为‘[我们]生活在一个有序的世界里，我们已经习惯于期待事物之间的某些模式……当我们体验到不符合这些模式的东西时，我们就会笑’（莫里尔
    1983: 15–16）。这种幽默的概念化通常追溯到伊曼努尔·康德，他认为‘[笑]是一种情感，源于紧张的期待突然转变为无’（康德 [1790] 1931:
    233）。这里重要的是两个观点。首先，喜剧需要其不协调性被突然呈现和理解；一个慢慢推导出或费力解释的笑点很少有趣。其次，喜剧将这种期待转变为‘无’；也就是说，这些不协调性不会导致恐惧、恐怖或厌恶。根据这种说法，喜剧是一种相对良性的现象，其愉悦感取决于其解决导致‘无’。不协调理论也被亚瑟·叔本华阐述过，他认为


    > 笑的原因始终是概念与通过它在某种关系中思考的真实对象之间不协调性的突然感知，而笑本身只是这种不协调性的表达。（叔本华 [1819] 1970: 76）


    对叔本华来说，喜剧的不协调性不会导致‘无’，而是‘[相反]我们得到了一些我们没有预料到的东西’（莫里尔 1983: 17）。这种表述认为喜剧的不协调性使其能够呈现超出我们预期的想法、概念或表征，因此它可以构成重新概念化世界思考方式的巨大力量。然而，为了做到这一点，它必须借鉴并建立那些将被推翻或重新表述的预期。所以，无论喜剧导致‘无’还是‘某种东西’，它都是一种交流形式，其不协调性只有在借鉴观众假定共享的预期时才有意义。正是因此，我们可以审视喜剧以明确这些预期，并由此延伸到广泛的社会文化规范。


    但喜剧的结构比通过呈现不协调性所产生的结构更受限制。毕竟，并非所有不协调的东西都好笑。康德断言喜剧导致‘无’开始指向喜剧不协调性必须是无威胁的才能令人愉悦的必要性。但除此之外，还需要一种‘荒谬的逻辑’，其中‘描绘的事态同时高度不可信又有一点点可信’（帕尔默
    1994: 96；另见帕尔默 1987）。帕尔默所指的‘逻辑’是一种既能使不协调性得以解决，又指向不协调性首先发生的可能性的逻辑。因此，笑话通常需要铺垫和笑点，其中铺垫提供了一个逻辑预期的世界，而笑点则传递了一种突然的、意想不到的、无威胁的不协调性，并且——重要的是——在某种程度上根据铺垫建立的规则是有某种道理的。正是铺垫和笑点之间的关系将一个事件构建为笑话；缺少其中一个就不构成喜剧。但这里重要的是，铺垫本身通常借鉴社会文化规范来建立笑点既不协调又‘有一点点可信’的世界的‘逻辑’。正是因此，喜剧可以被审视其对社会文化规范的指示，因为它们对过程的两个部分都至关重要；它们被借鉴以高效地建立铺垫，它们被笑点扰乱或推翻。正是因为喜剧时刻的两个部分都依赖于预期和规范来产生效果，即使一个笑话无疑质疑了这些规范，也有可能论证幽默从未真正激进。毕竟，喜剧永远无法进入那些规范被真正抛弃的领域，因为那样就没有什么可以建立‘荒谬的逻辑’了。


    对于‘信天翁’小品，很明显这种逻辑所依赖的文化假设。事实上，这些假设如此具体，以至于当从所需背景之外观看时，小品可能变得难以理解。小品不需要向当时的观众解释电影院有中场休息，或者在这些中场休息期间销售员提供冰淇淋；仅仅将其作为事实呈现就会引起当时观众的共鸣。但这仅仅是一种文化规范，这一点从现在观看该小品的观众可能会对发生的事情感到困惑得到证明，因为中场休息和冰淇淋销售员在当代多厅影院中基本不存在。小品还依赖其他文化规范。'
