    ridiculed in the sketch, the former are heavily satirised for their ignorance
    and complacency: even if they register that something is amiss with the strange
    men from the boarding house, they simply fail to care. Unless there is direct
    involvement, as in the case of the stockbroker who embraces the Nazi agenda because
    he believes it to be beneficial for the stock exchange, the characters remain
    largely indifferent to Hitler’s threat – which, again, works to discredit his
    political ambitions and notions.


    Apart from looking at specific sketches in *Monty Python’s Flying Circus* that
    relate directly to the war, I’d also like to note one of the few recurring characters
    of the show: the aforementioned Colonel, who appears for the first time briefly
    in the ‘Lethal Joke’ sketch, and then returns in the eighth episode to provide
    a running gag, continuously disrupting the diegetic framework of the programme.
    This eighth episode, entitled ‘Full Frontal Nudity’, includes one of the most
    iconic Python sketches, the ‘Parrot Sketch’, and serves to position the character
    of the Colonel as an ultimate authority figure, exerting his influence on the
    programming structure of the entire show. The Colonel is emphatically ‘old school’,
    a representative of the other side of the counterculture movements and ‘generational
    tensions’ (Landy 2005: 15); crucially, he has no sense of humour and claims ‘most
    people like a good laugh more than [he does]’ (Chapman et al. 1990: 102). On several
    occasions, for instance in the famous ‘Parrot Sketch’, when he deems a sequence
    to be silly he simply stops it by breaking the fourth wall and giving instructions
    to the crew on how to proceed with the programming. This informs, on the one hand,
    the self-reflexive nature of the show: instead of remaining within the framework
    of a sketch comedy programme with fictitious sketches, it highlights production
    and programming practices, normally not at our disposal, and taps into our sense
    of realism. If the sketches we see are fictitious, as it is explicitly stated
    by him, then surely the Colonel and his complaints must be genuine. On the other
    hand, his interruptions disrupt the structure of comic sketches as we'
