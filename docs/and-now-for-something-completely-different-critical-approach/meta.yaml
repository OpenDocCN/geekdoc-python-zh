    # PANTOMIME AND ANGELA CARTER


    Pantomime, a grand old British carnival tradition of class and gender reversals,
    is another key influence on Monty Python. Angela Carter, whose family lived a
    middle-class family life in South London, was brought up on Hollywood films and
    the carnival excess and performance of British pantomime, embedded in the class
    system. She writes of pantomime, ‘in pantoland, everything is grand. Well let’s
    not exaggerate – grandish. Not like what it used to be but, then what isn’t, even
    so, it is brightly coloured – garish in fact’ (Carter 1991: 1); ‘everything is
    excessive, sexualised, phallic or else demonically aggressively female’ (ibid.).
    There is an emphasis on procreation as comic and ‘nostalgia for naval heroes,
    the rise of the poor, for instance Dick Whittington and his cat are set against
    “Baron Hardup of Hardup Hall”, father of Cinderella, stepfather of the ugly sisters’
    (ibid.: 2). Music, ‘illusion and transformation’ (ibid.: 1) predominate, mixing
    the real (horses on stage) and the cartoon illusory (pantomime horses on stage).
    Pantomime’s power is to undermine and query power: ‘in pantoland, which is the
    carnival of the unacknowledged and the fiesta of the repressed, everything is
    excessive and gender is variable’ (ibid.: 4). It is based, as is *Twelfth Night*,
    on the mid-winter carnival of the Feast of Fools, and ‘the orgiastic non-time
    of the Solstice, which once upon a time, was also the time of the Saturnalia,
    the topsy-turvy time . . . when a master swapped places with a slave and anything
    could happen’ (ibid.). Carter’s well-researched exploration of that very British
    tradition of panto delves back historically and out internationally for roots.
    She does not talk of her contemporaries, Monty Python (Terry Jones interviewed
    her in 1981), but these are also the roots of their very British social satire:
    rebellion against social hierarchy, heritage, wealth. The'
