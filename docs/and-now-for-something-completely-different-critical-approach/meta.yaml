    already peaked in the United States a decade earlier since ‘the gradual relaxation
    of the Hollywood Production Code and the growth of independent filmmaking brought
    to the forefront a whole series of American movies which openly explored taboo-breaking
    subjects around sexuality, crime, and the use of drugs’ (Biltereyst 2007: 9).
    Particularly, *The Wild One*, *Rebel Without a Cause* (Nicholas Ray, 1955) and
