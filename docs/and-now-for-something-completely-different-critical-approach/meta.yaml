    **Grams:** Sweet background music, very, very soft

    **Harry:** Darling – darling, will you marry me?

    **Bloodnok:** Of course I will – darling.

    **Bill:** Thank you – good night. (Milligan 1973)


    When juxtaposing this *The Goon Show* episode with episode 7 of the first series
    of *Monty Python’s Flying Circus*, revolving around a blancmange invasion of planet
    Earth, a significant generic shift is apparent. The theme of the two programmes
    is essentially the same: an attack involving puddings; the generic positioning
    of the two, however, highlights some of the differences explored further below.
    Whereas the Goons chose a Second World War setting, the Python team did their
    version of pudding throwing as a science fiction spoof: the Python pudding story
    lampoons contemporary science fiction and fantasy programmes, such as *Doctor
    Who* or *The Twilight Zone*; there are not even subtle references to the Second
    World War.


    When *The Goon Show* episodes are set in different time-frames, as in the case
    of ‘The Phantom Head Shaver’, ‘The Affair of the Lone Banana’, ‘Napoleon’s Piano’
    or ‘The Mighty Wurlitzer’, the characters still move within the same paradigm
    of the war: Major Bloodnok is a cowardly and greedy army officer, Eccles is still
    the prototype of the dumb soldier, and Neddie occupies a dubious position of authority.
    Furthermore, the non-Second World War episodes also operate with army humour and
    army references, which can take the form of sound effects that imitate gunshots
    and explosions – these latter occur in the vast majority of *The Goon Show* episodes.


    ‘The Affair of the Lone Banana’ starts and ends with huge explosions, since the
    plot, as in the case of ‘Foiled by President Fred’, takes place in South America
    during a revolution. This proves to be fertile ground for including pistol shots,
    explosions, bombs and other sounds of warfare. In ‘Foiled by'
  - '[PAGE 70]


    President Fred’, one of the weapons used is a double-action hydraulic-recoil eighteen-inch
    Howitzer – the type of weapon used by Milligan during the Second World War (Milligan
    1976). ‘Napoleon’s Piano’, just like ‘The Affair of the Lone Banana’, ends with
    an enormous explosion – this time on the English Channel. ‘The Phantom Head Shaver’
    includes a military cordon around the town of Brighton and a court scene with
    battle-like sound effects, besides the usual pistol shots and explosions.


    Further exploiting the theme of shells and explosions, most of *The Goon Show*
    episodes culminate in one of the characters, usually Neddie Seagoon, Eccles, Bluebottle
    or Bloodnok, having to take considerable risks, such as delivering sticks of TNT
    or other explosive devices, or dismantling one to hamper Grytpype-Thynne’s and
    Moriarty’s plans. The significance of this is firstly that, unlike in the war,
    within a 1950s British context such sequences of events are highly unlikely, placing
    *The Goon Show* episodes once again within a surreal context and the paradigm
    of the Second World War. Secondly, the behaviour of *The Goon Show* characters
    in these situations, particularly when the events take place outside of a Second
    World War setting, still operates within army modes and hierarchies.


    Apart from the explosions, however, in ‘The Phantom Head Shaver’, which is said
    to take place in 1898, there is another significant allusion to the war, as referred
    to by Neddie Seagoon:


    > I have on me several documents of identification – including a letter of personal
    trust from the Commander of the British Army; a memo of recommendation from Mr
    Anthony Eden, the Foreign Secretary; a special pass signed by Mr Clement Atlee
    [sic], the leader of the Opposition; and last but not least, a permit to go where
    I please, signed by the Prime Minister the Right Honourable Sir Winston Spencer
    Churchill. (Milligan 1973)


    These politicians were at the time of the transmission (October 1954) indeed in
    the offices attributed to them by Neddie; they were also, however, occupying the
    same positions in parliament after Churchill became prime minister in May 1940,
    aside from Attlee being deputy prime minister instead of leader of the Opposition.
    It is also interesting to note that Neddie not only includes the Commander of
    the British Army in his list of protectors, but starts with him, emphasising the
    connotations of the war. Churchill, voiced by Peter Sellers, is evoked in other
    episodes as well, for instance in ‘The Canal’ and indeed in ‘The Dreaded Batter
    Pudding Hurler’, further contextualising the programme within a Second World War
    framework.


    Another frequently used panel in *The Goon Show* is travelling, more precisely
    sea travel, something that is featured in ‘The Dreaded Batter Pudding Hurler’
    as well as in ‘Tales of Men’s Shirts’. In ‘The Affair of the Lone Banana’'
  - '[PAGE 71]


    and ‘Foiled by President Fred’, the two shows that include South American revolutions,
    there arises naturally the issue of reaching the faraway continent; these episodes
    thus present opportunities not only for gunshots and explosions, but a chance
    for a sea voyage. In ‘Napoleon’s Piano’, the narrative concerns a journey through
    the Channel on top of a piano. Sea voyages serve a double purpose in this context:
    they highlight the distance between the reality of post-war Britain and a faraway
    Gooniverse, and create an evocation of the journeys army personnel took in order
    to serve in the war, by juxtaposing the sea journeys with the sound effects of
    explosions.


    In ‘Tales of Men’s Shirts’ from the tenth series, the Second World War is even
    more in the forefront than in ‘The Dreaded Batter Pudding Hurler (of Bexhill-on-Sea)’.
    The programme draws on the trope of the Nazi wonder weapon within a familiar *The
    Goon Show* framework of a surreal plot conceived by Grytpype-Thynne and Moriarty,
    which needs to be solved by Neddie Seagoon. The setting is, significantly, moved
    to Nazi Germany from the home front, and the episode features a whole array of
    Second World War references: army jokes, special effects of explosions, the heavy
    use of a German accent, military cowardice and sea travel.


    The Nazi master weapon in question is a colourless and odourless material that,
    if applied to a British soldier’s shirt-tail, explodes upon sitting down. Following
    the usual pattern of *The Goon Show* plots, Neddie is sent to Germany to investigate;
    he travels by sea on Grytpype-Thynne and Moriarty’s ship, and finds the two of
    them to be the criminal masterminds behind the scheme. The structure of the narrative,
    the relations between the characters, the panels used in the shows or the self-reflexive
    nature of the humour remain largely unchanged. What is significant in this episode,
    however, is its position within the timeline of the programme: it was one of the
    last *The Goon Show* episodes to be transmitted in 1960 in its original run, and
    was reprised eight years later as a one-off television broadcast, the penultimate
    performance of *The Goon Show*, with John Cleese taking the position of compere,
    providing a further link between the two programmes.


    Contextualising this episode, both its original broadcast and the television reprise,
    within British comedy traditions serves to highlight that it was not necessarily
    simply the passing of time that allowed the Pythons to take a different approach
    to the war than the Goons did. In 1960, and especially 1968, with a significant
    shift towards satire, the multitude of Second World War references in ‘Tales of
    Men’s Shirts’ evoke another set of connotations than they might have in the early
    or mid-1950s, and certainly other than those of contemporary comedy culture. Notably,
    1968 was also the year when, with *Dad’s Army*, ‘war . . . became a respectable
    topic for sitcoms’ (Lenz 2015: 37). The emphasis on *became* signals a change
    not only within the context of sketch comedy programmes, but also within the wider
    framework of British comedy traditions.'
- md: 'These eight years saw the emergence of another generation of comedians spearheading
    the satire boom, like Peter Cook, Dudley Moore, Jonathan Miller and Alan Bennett
    of *Beyond the Fringe* fame; and David Frost, for whom all British Pythons worked
    at some point in their pre-Python careers (Chapman *et al.* 2003: 155–6). It also
    saw the ‘Swinging London’ phenomenon gain popularity (Landy 2005: 18), epitomised
    by the Beatles, whose fame, accents and their disruption of existing social and
    cultural structures, as well as some stylistic and thematic choices in their films,
    were precursors to much of Python itself. The Beatles can also be seen to function
    as a link between the Goons and the Pythons, between one generation of comedians
    and the next. Not only did both the members of the Beatles and of the Oxbridge
    Mafia listen to *The Goon Show* (Wilmut 1982: xvii), but there are also tangible
    links in the form of friendships and professional relationships forged in comedy.
    The Beatles’ acceptance of a collaboration first with George Martin, their producer,
    and then with Richard Lester, director of two of their feature films, hinged on
    the two men having previously worked with the Goons, Martin producing their comedy
    record output and Lester directing the Goons’ short film, *The Running Jumping
    and Standing Still Film*, as well as episodes of *A Show Called Fred*, a televisual
    incarnation of *The Goon Show* (Rawlings 2017: 183). Then, continuing the cycle,
    in 1979 it was George Harrison who, after EMI pulled out, put up the money for
    the Pythons’ *Life of Brian* (Chapman *et al.* 2003: 366–7). While emphasising
    the influence of the Goons on the coming generation of comedians, Roger Wilmut
    also speaks of a ‘real watershed’ that came as *The Goon Show* was airing its
    last episodes in 1960, and *Beyond the Fringe* first appeared at the Edinburgh
    Festival the same year (Wilmut 1982: xvii–xviii). One of the key aspects of this
    watershed could be seen to centre on the representation of the war in the two
    generations’ comedy output.


    ## PYTHON AND THE WAR


    When looking at two Monty Python sketches that are explicitly set in the Second
    World War, the ‘Lethal Joke’ sketch from the first episode of *Monty Python’s
    Flying Circus* and the ‘Mr Hilter’ sketch from the twelfth, a paradigm shift from
    the Goons’ approach to the war becomes apparent. As seen in the brief juxtaposition
    of the pudding-attack trope in the two programmes, Python uses contemporary audio-visual,
    particularly televisual, modes to contextualise its sketches – especially when
    it comes to reframing historical events (Brock 2015: 54). This is precisely the
    premise of *The Complete and Utter History of Britain*, the pre-Python programme
    written by Michael Palin and Terry Jones; and, as seen below, in both of the two
    Python war sketches the Second World War gets recontextualised this way within
    contemporary televisual and/or societal modes, shifting the temporal settings
    for comedic purposes. Landy calls these the ‘explosions and physical mutilation
    that expand in meaning to include dismemberment of cultural forms’ (Landy 2005:
    44); her choice of words gains extratextual relevance when thinking about the
    implications of explosions in a Second World War context.


    The first case study from *Monty Python’s Flying Circus* appears in the very first
    episode of the series. The episode entitled ‘Whither Canada?’ uses and lampoons
    a number of television formats such as quiz shows in the ‘Famous Deaths’ sketch,
    television interviews in the ‘Sir Edward Ross’ sequence, art programmes in the
    ‘Arthur “Two-Sheds” Jackson’ and the ‘Picasso Cycling Tour’ sketches and television
    documentaries in the ‘Lethal Joke’ sketch. This context already signals the aforementioned
    shift, positioning the sketch within a contemporary framework. The plot exploits
    the Nazi super-weapon theme of ‘Tales of Men’s Shirts’, but turns it around, into
    a British super-weapon that won us the war: a joke that is so funny, it kills
    whoever hears it. After a few casualties during the invention and the testing
    of the joke, it is translated, strictly word by word, to German and is deployed
    in action, killing masses of German soldiers. The enemy attempts, without success,
    to invent their own master weapon, and after the war is over the joke is buried
    forever, never to be told again. The sketch itself could, seemingly, easily be
    part of a *The Goon Show* plot; there are a few crucial points both in the narrative
    and more importantly in the format of the sketch that indicate significant differences.
    On the one hand, the ‘Lethal Joke’ sketch unambiguously positions the British
    as victorious; on the other hand, it frames the events as a documentary spoof,
    referencing them as the past, positioning the war as distant, as something to
    remember.


    By unpacking the sketch, we notice both the several formal and stylistic elements
    that indicate its generic position as documentary spoof, and also the initial
    ambiguity of the timelines in the sketch. There is jaunty background music, an
    omniscient voice-over (Eric Idle) who announces that ‘[i]n a few moments [Ernest
    Scribbler] will have written the funniest joke in the world’ (Chapman *et al.*
    1990: 10), and a contemporary news reporter (Terry Jones), who reports on the
    events from Ernest Scribbler’s front garden. The presence of both the omniscient
    narrator and the reporter, however, blurs the line between past and present, as
    the presence of the reporter seems to signal that what we see is happening that
    very moment, while the voice-over clearly references it as the past. The ambiguity
    prevails: as the police arrive at the scene and start their investigation, the
    voice-over stops, and it seems that even if the invention of the lethal joke happened
    in the past, it must have been the recent past, since no elements in the *mise-en-scène*
    indicate a temporal shift.


    It is not until the voice-over returns that the temporal setting of the sketch
    is clarified, and is indicated to be the Second World War. The voice-over and
    the images converge in depicting how the military top brass became interested
    in the joke and began to utilise it to improve Britain’s chance against the Nazis
    in the war. Gradually the sketch turns into a BBC dramatised documentary-spoof
    with sequences such as the testing of the joke on Salisbury Plain, the Joke Brigade
    in action, and a scene in a Nazi interrogation room. All these shots are in colour,
    indicating that it is the dramatised version of the historical events that we
    see. There are no attempts to present the events in black-and-white, for instance,
    which would tap into our sense of realism and create the impression that we see
    real footage of the war. What further accentuates the documentary form is the
    character of the Colonel (Graham Chapman), featured in the sketch as a military
    expert outlining the development of the joke as an efficient weapon in actual
    battle.


    As in *The Goon Show* episodes, the ‘Lethal Joke’ sketch is also full of explosions;
    in the case of the Python sketch, however, nobody is hurt, not even symbolically,
    by the bombs and shells. In the case of the ‘Lethal Joke’ sketch it is not physical
    weapons, but humour and intelligence that have a devastating effect on people.
    This way the Pythons subvert the very essence of the Goons’ contextualisation
    of the war: in *The Goon Show*, even in the sketches that were set in the present
    the characters fell victims to Second World War weaponry. In contrast, in *Monty
    Python’s Flying Circus* even in the Second World War it was not rifles and grenades
    that were doing the killing but humour.


    Furthermore, in *The Goon Show* the Second World War episodes depict events from
    an insider perspective with Grytpype and Moriarty being the criminal minds behind
    even Nazi Germany’s hideous acts, while the Pythons shift the focus and report
    on the killing joke as outsiders. The sketch uses the form of a dramatised historical
    documentary-spoof, with two-dimensional characters who function merely to illustrate
    the events; there are no main characters involved, creating a distance that signals
    that even when somebody dies as a result of hearing the joke, it is inconsequential.
    In this sketch, just like in the *Goon Show* episodes examined above, the narrative
    evokes the war on a large scale: the military apparatus is involved, so are the
    Nazi Germans, Prime Minister Chamberlain, and even Hitler. In the ‘Lethal Joke’
    sketch, however, the lack of main characters and the fact that the sketch serves
    to outline the events inform its positioning as distant and external.


    In the sketch, its creators use the techniques offered by television not only
    for lampooning television genres but also for creating comedy by visual effects,
    just as *The Goon Show* used radio techniques to their advantage. The Pythons
    effectively satirise pre-war politics of appeasement, and by juxtaposing a well-known
    joke with the well-known and menacing image of Hitler at a Nazi rally, they also
    subvert his threat for comedic purposes. When the voice-over starts describing
    the devastating effect of the joke, he says that it was ‘[o]ver sixty thousand
    times as powerful as Britain’s great pre-war joke’.'
  mdcn: '这八年见证了另一代喜剧演员的崛起，他们引领了讽刺喜剧的热潮，例如《边缘之外》的彼得·库克、达德利·摩尔、乔纳森·米勒和艾伦·贝内特；以及大卫·弗罗斯特，所有英国巨蟒成员在加入巨蟒剧团前的职业生涯中都曾为他工作过（Chapman
    *et al.* 2003: 155–6）。这八年也见证了“摇摆伦敦”现象的流行（Landy 2005: 18），其代表是披头士乐队，他们的名声、口音以及对现有社会和文化结构的颠覆，还有他们电影中的一些风格和主题选择，都预示了后来巨蟒剧团的许多特点。披头士乐队也可以被视为连接“呆瓜”乐队和巨蟒剧团、连接一代喜剧演员与下一代的桥梁。不仅披头士成员和牛津剑桥帮成员都听过《呆瓜秀》（Wilmut
    1982: xvii），而且通过喜剧界建立的友谊和职业关系，也存在着切实的联系。披头士乐队接受与他们的制作人乔治·马丁合作，以及与理查德·莱斯特合作（莱斯特执导了他们的两部故事片），关键在于这两人此前都曾与“呆瓜”乐队合作过：马丁制作了他们的喜剧唱片，莱斯特则执导了“呆瓜”乐队的短片《奔跑、跳跃和静止的电影》，以及《一个叫弗雷德的秀》的剧集，后者是《呆瓜秀》的电视化身（Rawlings
    2017: 183）。接着，这个循环继续，1979年，在百代唱片撤资后，是乔治·哈里森为巨蟒剧团的《布莱恩的一生》提供了资金（Chapman *et al.*
    2003: 366–7）。罗杰·威尔穆特在强调“呆瓜”乐队对下一代喜剧演员影响的同时，也提到了一个“真正的分水岭”，它出现在1960年《呆瓜秀》播出最后几集，以及《边缘之外》同年在爱丁堡艺术节首次亮相之时（Wilmut
    1982: xvii–xviii）。这个分水岭的一个关键方面，可能就体现在两代喜剧作品对战争的描绘上。


    ## 巨蟒剧团与战争


    当审视两个明确设定在第二次世界大战背景下的蒙提·巨蟒小品——《蒙提·巨蟒的飞行马戏团》第一集中的“致命笑话”小品和第十二集中的“希特勒先生”小品——时，从“呆瓜”乐队处理战争的方式到巨蟒剧团方式的范式转变变得显而易见。正如在两个节目中“布丁攻击”桥段的简短并置所见，巨蟒剧团运用当代的视听，特别是电视模式来构建其小品的语境——尤其是在重塑历史事件方面（Brock
    2015: 54）。这正是迈克尔·佩林和特里·琼斯在巨蟒剧团成立前创作的节目《不列颠完整而彻底的历史》的前提；并且，如下文所示，在这两个巨蟒战争小品中，第二次世界大战都以这种方式在当代电视和/或社会模式中被重新语境化，为了喜剧效果而改变了时间设定。兰迪将这些称为“爆炸和身体残害，其意义扩展到包括文化形式的肢解”（Landy
    2005: 44）；当想到第二次世界大战背景下爆炸的含义时，她的措辞获得了文本外的关联性。


    《蒙提·巨蟒的飞行马戏团》的第一个案例研究出现在该系列的第一集。题为“加拿大何往？”的这一集使用并讽刺了多种电视形式，例如“著名死亡”小品中的智力竞赛节目、“爱德华·罗斯爵士”片段中的电视访谈、“亚瑟·‘两个棚子’·杰克逊”和“毕加索自行车之旅”小品中的艺术节目，以及“致命笑话”小品中的电视纪录片。这种语境已经预示了前述的转变，将小品置于一个当代的框架内。情节利用了“男人衬衫的故事”中的纳粹超级武器主题，但将其反转，变成了一种为我们赢得战争的英国超级武器：一个如此有趣以至于能杀死听者的笑话。在笑话的发明和测试过程中造成了一些伤亡后，它被严格逐字翻译成德语并投入实战，杀死了大批德国士兵。敌人试图发明自己的终极武器，但未能成功。战争结束后，这个笑话被永远埋葬，永不再讲。这个小品本身看似很容易成为《呆瓜秀》情节的一部分；但在叙事上，更重要的是在小品的形式上，有几个关键点表明了显著的差异。一方面，“致命笑话”小品明确地将英国定位为胜利者；另一方面，它将事件构建为纪录片戏仿，将其作为过去来提及，将战争定位为遥远的、值得铭记的事物。


    通过解析这个小品，我们注意到几个表明其作为纪录片戏仿类型定位的形式和风格元素，以及小品中时间线的最初模糊性。有欢快的背景音乐，一个全知的画外音（埃里克·爱德）宣布“[过一会儿]
    [欧内斯特·斯克里布勒]将写出世界上最有趣的笑话”（Chapman *et al.* 1990: 10），以及一位当代新闻记者（特里·琼斯）在欧内斯特·斯克里布勒的前花园报道事件。然而，全知叙述者和记者的并存模糊了过去与现在的界限，因为记者的存在似乎表明我们看到的是正在发生的事情，而画外音则明确将其作为过去来提及。这种模糊性持续存在：当警察到达现场开始调查时，画外音停止了，似乎即使致命笑话的发明发生在过去，也一定是不久前的过去，因为场景布置中没有任何元素表明时间发生了变化。


    直到画外音再次出现，小品的时间设定才被明确，并被指明为第二次世界大战。画外音和画面汇聚，描绘了军方高层如何对这个笑话产生兴趣，并开始利用它来提高英国在战争中对抗纳粹的机会。小品逐渐转变为BBC的戏剧化纪录片戏仿，包含诸如在索尔兹伯里平原测试笑话、笑话旅投入行动以及纳粹审讯室场景等片段。所有这些镜头都是彩色的，表明我们看到的是历史事件的戏剧化版本。例如，没有尝试以黑白方式呈现事件，因为那会迎合我们的现实感，制造出我们看到真实战争影像的印象。进一步强化纪录片形式的是上校（格雷厄姆·查普曼）这个角色，他在小品中作为军事专家，概述了笑话作为实战中高效武器的发展过程。


    与《呆瓜秀》剧集一样，“致命笑话”小品也充满了爆炸；然而，在巨蟒小品中，没有人因炸弹和炮弹受伤，甚至象征性的伤害也没有。在“致命笑话”小品中，对人们产生毁灭性影响的不是物理武器，而是幽默和智慧。通过这种方式，巨蟒剧团颠覆了“呆瓜”乐队对战争语境化的核心本质：在《呆瓜秀》中，即使在设定于当下的小品中，角色们也会成为第二次世界大战武器的受害者。相反，在《蒙提·巨蟒的飞行马戏团》中，即使在第二次世界大战背景下，造成杀伤的也不是步枪和手榴弹，而是幽默。


    此外，在《呆瓜秀》中，第二次世界大战剧集从内部视角描绘事件，格里泰普和莫里亚蒂甚至是纳粹德国可怕行径背后的犯罪头脑，而巨蟒剧团则转移焦点，从外部视角报道这个致命笑话。小品采用了戏剧化历史纪录片戏仿的形式，角色是二维的，仅用于说明事件；没有主要角色参与，营造出一种距离感，表明即使有人因听到笑话而死，也是无关紧要的。在这个小品中，就像在上面分析的《呆瓜秀》剧集一样，叙事唤起了大规模的战争：军事机器参与其中，纳粹德国、张伯伦首相，甚至希特勒也参与其中。然而，在“致命笑话”小品中，缺乏主要角色以及小品旨在概述事件的事实，使其定位显得疏远和外部化。


    在小品中，其创作者不仅利用电视提供的技术来讽刺电视类型，还通过视觉效果创造喜剧，就像《呆瓜秀》利用广播技术一样。巨蟒剧团有效地讽刺了战前的绥靖政策，通过将一个众所周知的笑话与希特勒在纳粹集会上那众所周知且充满威胁的形象并置，他们也颠覆了他的威胁以达到喜剧目的。当画外音开始描述笑话的毁灭性效果时，他说它“比英国战前伟大的笑话威力大六十多倍”。'
