    # 6. FIGURES TRACED IN SHITE: THE SCRIBE, THE ILLUMINATOR AND MONTY PYTHON’S HOLY
    GRAIL


    Ewan Wilson


    David D. Day observed in the first edition of Kevin J. Harty’s *Cinema Arthuriana:
    Essays on Arthurian Film* that what is ‘[u]ltimately at issue in *Monty Python
    and the Holy Grail* is our ability to know the Middle Ages at all, when every
    attempt we make ultimately betrays the traces of its modern manufacture’ (Day
    1991: 83). Indeed, the first and seemingly inevitable question at which one arrives
    in the examination of a film that purports to be set in the past is one of historical
    accuracy; regardless of the fictive nature of the narrative, the question of period
    authenticity is quick to arise. For their part, the Middle Ages are rarely portrayed
    for their own sake, often appearing instead as imagined visions of the past in
    service of an aesthetic or political agenda which overlooks authenticity in favour
    of representation. As Robert A. Rosenstone points out of such efforts,


    > the focus tends to be on the creation and manipulation of the meanings of the
    past, on a discourse that is free of data other than that of other discourses,
    on what seems to be the free play of signifiers signifying history. (Rosenstone
    1995: 10)


    In *Monty Python and the Holy Grail* (1975), the Pythons present an absurdist
    retelling of Malory’s *Le Morte d’Arthur* that appears, at first glance, to be
    little but abject silliness. However, scholars such as Day, Brian Levy and Lesley
    Coote (2004) and Neil Archer (2016) have made detailed examinations of the film’s
    comedic conventions, its politics and the way in which it represents Arthur’s'
  - '[PAGE 115]


    England, unpacking the complexities of *Holy Grail*''s specific brand of mediaevalism.
    For Day, *Holy Grail* highlights the difficulties of portraying the distant Middle
    Ages in a manner free from modern influences, particularly in a medium as modern
    as film; Levy and Coote''s analysis draws comparison between the political stance
    and its comedic conventions with those present in the literature of Chaucer and
    Malory, ultimately arguing that the Pythons participate in an inherently mediaeval
    literary tradition; and Archer, in a wider discussion of parody, brings the question
    of ''historical verisimilitude'' (Archer 2016: 60) under the scrutiny of genre
    convention and audience expectation. Common to these analyses of the film, and
    indeed to several other such studies, is an interest in the interaction between
    its modern and mediaeval elements. However, where the majority of the existing
    scholarship surrounding *Holy Grail* is concerned with the film as a modern treatment
    of mediaeval material, this chapter builds on Martine Meuwese''s examination of
    ''The Animation of Marginal Decorations in "Monty Python and the Holy Grail"''
    (2004) to suggest that the creative practices of the film''s two directors, Gilliam
    and Jones, are just as participatory in mediaeval tradition as is their subject
    matter. Drawing on the wealth of published accounts of the film''s production,
    interviews with the Python team and J. J. G. Alexander''s book-length study of
    *Medieval Illuminators and Their Methods of Work* (1992), it seeks to delineate
    the directorial styles of the two directors and draw connections between their
    cooperation and that of the mediaeval scribe with an illuminator, as well as the
    influences the film draws from cinema Arthuriana and the mediaeval epics of Bergman,
    Kurosawa and Pasolini.¹


    Since the early days of Python, Gilliam has been considered a member in equal
    weighting to his colleagues; yet as the lone American expatriate in a group of
    Oxbridge graduates, he has always been something of an outsider. As Cleese observes,
    ''he''s much more like an artist in a painterly sense. He works in a studio, he
    doesn''t work in a *team*, or didn''t on Python; we worked very much in a team''
    (Morgan 1999: 79). This distinction between the Englishmen and the American, the
    writers and the artist, allows us to consider the work of the Pythons and that
    of Gilliam as belonging to two different traditions: the written and the visual.
    The Oxbridge contingent of the Pythons are heavily steeped in the written culture
    of Britain: Palin read history; Jones and Idle, English literature; and Cleese,
    law. Gilliam, on the other hand, ''just wanted to get on and paint and draw and
    sculpt'' (Pythons and McCabe 2003: 86); he studied at Occidental College, drifting
    from physics to art history to political science, dipping into oriental philosophy
    and drama along the way. Chapman, a medic, was the outlier. Their studies were
    never the main focus of the soon-to-be Pythons, however; while the Englishmen
    brought their brand of ''literate comedy'' (ibid.: 85) to the Cambridge Footlights,
    Gilliam immersed himself in the reinvigoration of Occidental''s ''previously quite
    serious art and poetry journal called *Fang*, which . . . was rapidly transformed
    into a showcase for'
  - '[PAGE 116]


    scabrous gags and unfettered cartooning’ (Gilliam and Thompson 2015: 46). While
    a bent for comedy and innovation is their uniting factor, a clear divide in practice
    is struck between the wordsmithing of the Footlights/Revue alumni and the visual
    absurdism of Gilliam.


    This distinction is of particular relevance to a delineation of the responsibilities
    of Gilliam and Jones during the production of *Holy Grail*; as its producer, John
    Goldstone, observes,


    > Terry Jones’ attitude (as opposed to Terry Gilliam’s) has always been much more
    about performance than visuals . . . ultimately the nature of Python is more verbal
    than visual, and it seemed very important to make it work on a performance level
    and that the words were there. (Morgan 1999: 154)


    Indeed, Gilliam recalls that after an argument he had with Cleese during the filming
    of Arthur’s initial encounter with the French, ‘[i]t ended up with Terry talking
    to the guys, and me talking to the crew and the cameramen’ (McCabe 1999: 56).
    In this division of labour, *Holy Grail* displays a level of mediaeval influence
    that extends beyond that of its subject matter. Meuwese identifies Lilian M. C.
    Randall’s encyclopaedic *Illustrations in the Margins of Gothic Manuscripts* as
    Gilliam’s primary source for the images that he employs in the animated segments
    of the film. As she observes:


    > Gilliam’s animated sequences contain many medieval visual motifs. In ‘The Tale
    of Sir Launcelot,’ this animation sequence is restricted to the Celtic-style text;
    the rest of the animation develops in Gilliam’s own style of drawing. However,
    ‘The Quest for the Holy Grail’ contains a Romanesque Christ and a series of Gothic
    figures, while ‘The Tale of Sir Galahad’ and ‘Season Animation’ are also mainly
    populated by figures which look as though they have been borrowed directly from
    early fourteenth-century manuscript illustrations. And indeed, that is precisely
    what has happened. (Meuwese 2004: 47)


    Meuwese goes on to connect Gilliam’s numbering of his concept sketches for the
    film’s animations to the numbered illustrations in Randall’s book, suggesting
    that the relationship between Randall’s text and Gilliam’s appropriation of it
    might be compared to that of a mediaeval scribe and his source book; she writes
    that ‘Gilliam’s orientation sketches and notes may be compared to the terse instructions
    that a miniaturist would scribble or sketch next to the place where the illustration
    was to be executed’ (ibid.: 54). As insightful as her observations are, Meuwese
    limits the scope of her study to Gilliam’s use of manuscript material in his animations
    and neglects to consider the film as a whole,'
  - '[PAGE 117]


    or indeed the role of the other Pythons, particularly that of Jones, within the
    production of the film. If Gilliam is considered a modern miniaturist, a participant
    in a visual tradition which spans centuries, the other Pythons, having been more
    directly involved in the writing of the film’s script, can be viewed as akin to
    mediaeval scribes, represented by Jones as writer-director.


    Although *Holy Grail* was written by Monty Python as a collective, and all six
    of the troupe are credited accordingly, this chapter’s focus lies with the relationship
    between the film’s directors and as such it shall consider Jones as chief among
    Python’s scribes. He, more so than any other of his colleagues, is embedded in
    the literary and historical traditions of Britain as both a practitioner and a
    scholar. Post-Python, Cleese has made a long career of comedic performances while
    Idle has peppered his song-writing output with a handful of novels; Palin garnered
    a modest number of screenwriting credits, including *Ripping Yarns* (1976–9) in
    collaboration with Jones and *Time Bandits* (1981) with Gilliam, before embarking
    on a career as a travel writer and presenter for the BBC in 1989; and Gilliam,
    having developed a taste for the role of director but desiring complete artistic
    control over his projects, went on to forge a decidedly idiosyncratic career as
    a filmmaker. Jones, on the other hand, directed only a handful of further features,
    and soon returned to his passion for the mediaeval as the presenter of such BBC
    documentaries as *Ancient Inventions* (1998), *Terry Jones’ Medieval Lives* (2004)
    and *Terry Jones’ Barbarians* (2006), the latter two of which were later complemented
    with accompanying books.²


    His is the largest of the bibliographies produced by any one Python, and his writing
    includes children’s literature, librettos and his scholarly discussions of the
    work of Chaucer, *Chaucer’s Knight: The Portrait of a Medieval Mercenary* (1980)
    and *Who Murdered Chaucer?: A Medieval Mystery* (2003). While a gifted comedic
    writer and actor, Jones is also a respected scholar, and Palin recalls that he
    ‘was, from the first time I met him, a huge fan of Geoffrey Chaucer, which he
    took great pleasure in reciting in the original Middle English’ (Palin 2012: 56).
    Although Jones writes of a realisation reached in the Bodleian Library during
    his university days that ‘I didn’t want to spend my life being an English academic
    and commentator . . . I wanted to make things and write the raw material’ (Pythons
    and McCabe 2003: 74), his subsequent writing for both page and screen is consistently
    informed by and engaged with the history and literature of Britain’s past. *The
    Complete and Utter History of Britain* (1969), for example, which Palin and Jones
    wrote and acted for London Weekend Television, presents a gamut of landmark moments
    in British history through a contemporary lens; highlights from the programme’s
    surviving episodes include a post-Battle of Hastings sketch in which William the
    Conqueror gives a reporter the run-down in the manner of a post-match football
    interview, and Richard the Lionheart’s return from the Crusades with a plethora
    of souvenirs and a hankering for ‘a plate of egg'
- md: 'and chips''.³ This programme, a direct forerunner to *Monty Python''s Flying
    Circus* (1969–74), exhibits much of the same absurdist humour that became the
    trademark of the Pythons, but suffers by comparison in the absence of the comedic
    performances of the other soon-to-be troupe members.


    It was during the filming of *Complete and Utter History* that Jones was once
    again motivated to direct as well as to write. While working at the BBC in 1966,
    he was enrolled on their internal director''s course, but fell ill with peritonitis
    shortly before the day on which he was to film his demonstration piece and was
    unable to complete the programme as a result (Pythons and McCabe 2003: 98–9).
    Subsequently, he devoted his attentions to writing jobs, although Palin recalls
    from the time that


    > Terry was particularly keen on little films and he would have his 8mm camera,
    and we used to shoot little films in the back garden of his house in Claygate
    and rush around moving the chairs in different directions, so when he put it together,
    the chairs would appear to whiz around. (Ibid.: 85)


    There are similar moments in *Complete and Utter History*, such as that in the
    ''Catechism of the Witch'' sketch where Jones, in full Witch of the West regalia,
    ''flies'' from one side of the frame to the other on his broomstick, an action
    achieved with stop-action trick photography. Though Jones did not direct the programme,
    and the absence of a script for this insert makes it difficult to determine how
    much of the scene''s visual style was dictated by the writers, it is likely that
    this idea stemmed from him. In the combination of physical, slapstick humour and
    the earliest means of special effects is evident Jones''s admiration for Buster
    Keaton, whom he idolises ''because he made comedy look beautiful; he took it seriously''
    (Morgan 1999: 10).


    The question of presentation is one that was important not just to Jones, but
    to Monty Python as a collective. By the time *Flying Circus* had run its course,
    both Gilliam and Jones had developed the notion of making the jump from television
    to film, and consequently were acutely aware of the formal differences between
    the two mediums that other British comedy films of the period failed to observe.
    As the producer of *Holy Grail*, Mark Forstater, observes:


    > British comedy films of the 1970s, unlike the TV shows, were pretty awful. Most
    were spin-offs of successful TV series, made for quite low budgets . . . These
    films were largely made for UK audiences and could only be exported to countries
    where the TV series had found a home . . . flat overall lighting was used to give
    the actors as much freedom of movement as possible, but also to avoid major lighting
    changes between set-ups. The Pythons'' first film *And Now for Something Completely
    Different* (1971) fell into this category. (Forstater 2015: 15)


    An amalgam of several sketches from *Flying Circus*, *And Now for Something Completely
    Different* (ANFSCD) was a feature-length sketch show which failed to make any
    real engagement with or exploitation of the cinematic form. The first draft of
    *Holy Grail* exhibits a similar lack of cohesion, being formed of two parallel
    grail quests – one past, one present – that eventually collide in Harrods department
    store. However, Forstater notes that ‘the medieval story had much more potential
    for laughs and for medieval pastiche’ (ibid.: 36), and the Pythons, too, found
    that there was more original humour to be mined from the court of King Arthur
    than from the present. By doing so, the Pythons were plumbing not just a wealth
    of literary and cultural material, but also the body of films which fall under
    the umbrellas of pastiche and cinema Arthuriana.


    While Britain saw the likes of the *Carry On* franchise churn out pastiche after
    pastiche, parodies such as *Casino Royale* (John Huston *et al.*, 1967) and *The
    Producers* (Mel Brooks, 1968) gained traction in Hollywood. At the same time,
    however, American cinema continued to add to the body of films which Susan Aronstein
    dubs ‘Hollywood Arthuriana’, a specifically American sub-shoot of Harty’s ‘cinema
    Arthuriana’. At the tail end of the 1960s, it was Joshua Logan’s musical *Camelot*
    (1967), an adaptation of Lerner and Loewe’s eponymous stage play of 1961, that
    was chief in the public eye and which the Pythons lampooned most directly in *Holy
    Grail*.⁴ While Darl Larsen refers to *Holy Grail*’s script to assert that the
    musical number in the film’s ‘Camelot’ episode is modelled after ‘If They Could
    See Me Now’ from the 1966 stage play *Sweet Charity* (Larsen 2015: 244), he also
    notes that ‘the formerly mythic denizens of Camelot had been singing and dancing
    for about thirteen years when the Pythons came to write their own version’ (ibid.:
    251). Consequently, the king’s dismissal of Camelot as ‘a silly place’ can be
    understood not just as a jibe at the expense of Hollywood’s tendency to look to
    Arthurian myth as an idealised model for society, but also at the way in which
    it had previously portrayed the Middle Ages. With *Holy Grail*, Jones and Gilliam
    strove to break away from the glamorised past presented by Hollywood, in which
    ‘all the pores were mysteriously gone from the skin and everybody’s teeth shone
    like Doris Day’s and Rock Hudson’s’ (Gilliam and Thompson 2015: 172), and instead
    drew on the aesthetics of such mediaeval epics as Bergman’s *The Seventh Seal*
    (1957), Kurosawa’s *Throne of Blood* (1957) and Pasolini’s *The Canterbury Tales*
    (1972).


    Of the numerous influences that shaped *Holy Grail*, these three films are worthy
    of note because of their distinctive and evocative depictions of the Middle Ages.
    These films, though perhaps no more historically accurate in their construction
    of the past than the Hollywood features bemoaned by Gilliam, are united in the
    inspiration they draw not just from mediaeval art, but from a long tradition of
    visual culture.⁵ The image of Death playing chess is just one that Bergman recalled
    from the walls of the churches in which his father used to preach (Bergman 1956),
    and the script from which *The Seventh Seal* evolved bore the title *Knight and
    Death*, recalling Dürer’s *Knight, Death and the Devil* (Törnqvist 2012). For
    *Throne of Blood*, Kurosawa studied the *musha-e*, ‘early picture scrolls of battle
    scenes’, and ‘decided to use black and armored walls since they would go well
    with the *suiboku-ga* (ink-painting) effect [they] planned with lots of mist and
    fog’ (Richie 1996: 122). And, in *The Canterbury Tales*, Pasolini grasps ‘the
    strong medieval connection between the sublime and the grotesque’ (Blandeau 2006:
    155), epitomised by the film’s Boschian finale. The Pasolini film, rife with sex,
    filth and monstrous imagery, struck a chord with Gilliam, who would later look
    to the paintings of Bosch and Breugel as inspiration for the *mise-en-scène* of
    *Jabberwocky*. Indeed, Palin recalls viewing *The Canterbury Tales* with Jones,
    which ‘Terry G. had recommended. Superb recreation of mediaeval England – the
    kind of style and quality of shooting that we must get in our film, to stop it
    being just another *Carry on King Arthur*’ (Palin 2006: 163–4). Echoed in Palin’s
    admiration of Pasolini’s film is Jones’s love of Keaton’s work, and the desire
    to prove that comedy and artistry are not mutually exclusive.


    However, the utilisation of an art cinema aesthetic was not just a means of presenting
    their work as a serious piece of filmmaking; it also allowed the Pythons the opportunity
    to make comedy out of the formal elements of the medium itself. The film’s opening
    credits, featuring a moody, percussive score and pseudo-Nordic subtitles over
    a black background, plays to an audience awareness of Bergman-esque art cinema
    before introducing a series of jokes about renegade subtitlers. Similarly, the
    film’s opening shot of a Catherine wheel shrouded in fog nods to *Throne of Blood*,
    and the revelation that the sounds of an approaching horse are produced by coconuts
    is made all the funnier in its absurdity. *The Seventh Seal*’s self-flagellating
    monks are likewise parodied, their whips substituted for boards against which
    they repeatedly smack their heads. Though the jokes in *Holy Grail* were generated
    by the Python collective and are ultimately rooted in the written word, their
    presentation in the visual language of art cinema is due largely, if not entirely,
    to Gilliam and Jones as directors. Jones has, for the purposes of this chapter,
    already been identified as writer-director while Gilliam’s directorial duties
    cast him as more akin to a director-illustrator – Meuwese’s ‘modern miniaturist’.
    In their cooperative filming of *Holy Grail*, herein considered as an illuminated
    text, Jones and Gilliam are participants in a tradition of Arthurian illustrators
    who, ‘by serving as authors/illustrators, explore the relational quality and ultimate
    interdependence of word and image . . . as Howard Pyle and Hudson Talbott did’
    (Lupack and Lupack 2008: 10).


