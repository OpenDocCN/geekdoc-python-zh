  md: '# I. SIX COMICS IN SEARCH OF A . . . : MONTY PYTHON AND ABSURDIST/ SURREALIST
    THEATRE


    Rick Hudson


    It may appear self-evident, perhaps even overstated, to observe that *Monty Python’s
    Flying Circus* was influenced by absurdist and surrealist art. Nevertheless, these
    terms are often applied to the TV series somewhat glibly and superficially with
    little or no analysis or justification. This chapter addresses this issue and
    assesses the degree to which Monty Python was influenced – in terms of its style,
    subversive content and humour – by both absurdist and surrealist art and literature.
    Its particular focus is the influence of absurdist and surrealist theatre: specifically
    the plays of Harold Pinter, Samuel Beckett and Luigi Pirandello.


    To enable this, this chapter will not only engage with episodes of *Monty Python’s
    Flying Circus* and other Python products and the work of Pinter, Beckett and so
    on themselves, but also draw upon the work of theorists and critics who have explored
    comedy such as Henri Bergson, Mikhail Bakhtin and Sigmund Freud. In doing so,
    this chapter will demonstrate the depth and breadth of influences that fed into
    *Monty Python’s Flying Circus* and the role played by ‘serious’ theatre and literature
    in the creation of the Pythonesque. Importantly, this chapter will not only establish
    the similarities between Python and the Theatre of the Absurd, but also highlight
    significant differences between the two.


    *Monty Python’s Flying Circus* – written by and featuring Graham Chapman, John
    Cleese, Terry Gilliam, Eric Idle, Terry Jones and Michael Palin – was first broadcast
    in October 1969 and was perceived, then as now, as a radical departure'
  merge: -1
  pgno: 32
- img_proc: true
  md: 'from conventional TV comedy, and as both a subversive and challenging programme.
    Indeed, it had been purposely created to be just this, as James Gent states in
    a short article on the Pythons’ official website:


    > The team all agreed that they wanted to overturn the conventions of traditional
    sketch comedy – sketches with a beginning, middle and end, punchlines, blackouts,
    and topical gags. Their approach to comedy would be unpredictable, aggressive
    and irreverent, each episode a thirty-minute stream-of-consciousness, reflecting
    the revolutionary times of the late ’60s. (Gent 2014)


    The Pythons were successful in their aim, producing a comedy series which transcended
    the established boundaries of TV comedy further than they had been pushed before.
    As Gent further notes:


    > The Pythons’ gleefully deconstructed the very medium of television; there were
    parodies of documentaries, game shows, commercials and chat-show interviews. But
    they also frequently subverted the very grammar of television itself – for example,
    the opening titles might appear halfway through an episode, or the end title crawl
    would unspool at the very beginning. The iconic BBC globe was regularly hijacked,
    with voice-over announcers heard eating or engaged in tortured personal crises
    in the background. Over the next few years the show received three BAFTA awards,
    including Best Light Entertainment Programme, and two special awards for its writing-performance,
    and for Gilliam’s graphics. (Ibid.)


    Nevertheless, *Flying Circus* did not emerge sui generis in a cultural vacuum,
    but was rather the net result of both cultural influence and societal environment.
    The show can be seen as being a fusion of the talents, tastes and writing styles
    of the independent members of the team, and their earlier work demonstrates nascent
    python-ness. We can see the satirical elements of Python at play in Chapman and
    Cleese’s writing for and appearances on *The Frost Report* (1966–7) and *At Last
    the 1948 Show* (1967); the irreverent silliness and tomfoolery is evident in Palin,
    Jones and Idle’s *Do Not Adjust Your Set* (1967–9), which also featured Terry
    Gilliam’s animation. Similarly, *Flying Circus* was not alone in introducing surreal
    and unconventional content and format to British TV comedy; 1969 also saw the
    broadcast of Spike Milligan and Neal Shand’s *Q5*, which could at times equal
    Python’s strangeness.


    Python is often perceived as a product of the 1960s, a period when British culture
    was transforming itself and defining itself against and critiquing the culture
    and society of an imperial Britain. The 1960s is often envisaged as a colourful
    attack on the repressed, authoritarian and – frankly – drab post-war'
