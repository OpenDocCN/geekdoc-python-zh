    > [漫]画倾向于将我们的注意力引向那些对参与者和观察者来说，介于仅仅是偶然和个人的私人体验与特定群体中每个人都共享、因此具有普遍认可和充分理解的重要性甚至“普遍性”的公共体验之间的事件。我们可以称这些事件为“中途”体验。（Topliss
    2005: 6）


