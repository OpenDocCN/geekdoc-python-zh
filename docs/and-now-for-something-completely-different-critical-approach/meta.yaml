    and von vas . . . assaulted! Peanut. Ho-ho-ho-ho”（同上：13）——之后，镜头切到现代BBC2的采访，旁白/记者（埃里克·爱德尔）出现在一片林间空地。他以一篇关于第二次世界大战和“在日内瓦公约特别会议上被禁止”的笑话战争的、恰如其分的庄严而宏大的演讲结束了这个小品（同上：13–14）。当他走开时，一行铭文变得清晰可见：“献给无名的笑话”。通过使用埃里克·爱德尔的角色作为全知的旁白/记者，这个小品有效地将笑话战争以及更广泛的战争背景框定为过去的事件，利用电视模式来强调过去与现在的距离，将战争定位为需要铭记之事。正如兰迪所暗示的，德国口音本身的使用，以及我认为英国笑话的成功与德国笑话的失败相对比，也触及了关于英国幽默优越性和文化延续性的陈词滥调和“神话”（Landy
    2005: 81）。


    本章分析的另一个第二次世界大战小品是第12集中的“希特勒先生/米恩黑德补选”小品，它由另一个电视类型戏仿所框定，即一个名为*Spectrum*的快节奏时事报道节目，该节目在“米恩黑德补选”序列结束后立即回到屏幕。小品本身以一对普通的英国夫妇，约翰逊先生和太太（埃里克·爱德尔，莫琳·弗拉纳根）抵达萨默塞特郡米恩黑德的一家寄宿公寓开始。约翰逊夫妇与女房东（特里·琼斯）详细讨论了他们的旅程，然后女房东转身向他们介绍了寄宿公寓的住客。其中包括阿道夫·希特勒（约翰·克里斯）、海因里希·希姆莱（迈克尔·佩林）和约阿希姆·冯·里宾特洛甫（格雷厄姆·查普曼），他们正埋头研究一张地图，据称是在计划一次前往比迪福德的徒步旅行。希特勒身着全套纳粹制服，被介绍给约翰逊夫妇为希特勒先生，希姆莱穿着晚礼服，佩戴着铁十字勋章，被介绍为宾姆勒先生，冯·里宾特洛甫也穿着制服，被女房东介绍为罗恩·维宾特洛甫。这些纳粹领导人甚至接到了一个“麦戈林先生”的电话，之后女房东告诉约翰逊夫妇，希特勒先生计划在北米恩黑德补选中作为国家社会主义候选人参选。


    亚历山大·布罗克在联系*《蒙提·派森的飞行马戏团》*时提到了幽默的不协调理论，将该节目语境化为一系列“潜在的不协调攻击点”（Brock 2015: 55）。在审视“希特勒先生”小品时，这似乎特别贴切，尤其是将其置于第二次世界大战的背景下。小品的核心是巨蟒剧团完全按照希特勒的原样来呈现他：他的外貌（尽管更高大，克里斯对希特勒的模仿相当令人印象深刻）、他的配饰、制服、愤怒、从阳台上大喊大叫的场景、意大利伙伴、欢呼声和“胜利万岁”——尽管只是来自留声机——以及他的同伴冯·里宾特洛甫和希姆莱，并将他转移到了1960年代末的英国。他们似乎没有做任何改变：小品中希特勒的信仰、方法和目标与历史书中所知的一致。他仍然是一个向大众大声疾呼的国家社会主义者，承诺给他们“历史上属于他们”的东西（Chapman
    et al. 1990: 153），并且他仍然希望入侵波兰。


    > **女房东：** 哦，是北米恩黑德补选。希特勒先生作为国家社会主义候选人参选。他对米恩黑德有绝妙的计划。

    **约翰逊：** 比如什么？

    **女房东：** 嗯，首先他想吞并波兰。

    [ . . . ]

    **希特勒：** 我不是种族主义者，但是，这是一个大“但是”，我们国家社会主义党相信 das Überleben muss gestammen sein mit
    der sneaky Armstrong-Jones. Historische Taunton ist Volkermeining von Minehead.

    **希姆莱：** 希特勒先生，*希特勒*，他说历史上汤顿已经是米恩黑德的一部分了。(Ibid.: 152–3)


    巨蟒剧团有效地利用了这些概念的冲突：希特勒及其世界未经改变地从1930年代-1940年代的纳粹德国搬来，混入1960年代末英国小镇的消费社会，这个环境以“富裕的预设”（Landy
    2005: 16）为特征，以达到喜剧效果。这样，巨蟒剧团再次做了与*《呆瓜秀》*中呆瓜们相反的事情：他们没有将第二次世界大战的范式扩展到全世界和所有时间段，而是截取了第二次世界大战的一个片段，并将其尖锐性消融在战后、紧缩政策后英国温和的环境中。在英国政治中曾经相当流行、一度被危险接受的纳粹理想，在这个萨默塞特的小寄宿公寓里显得荒谬可笑。


    这个小品也为巨蟒剧团提供了一个绝佳的机会，利用两个世界的不协调并置来达到喜剧效果，并玩转战犯们蹩脚的英语和德国口音。


    > **女房东：** 哦，计划一次小小的远足吗，希特勒先生？

    **希特勒：** Ja! Ja! 我们来一次小小的……（*对其他人*） Was ist rückweise bewegen?

    **冯·里宾特洛甫**（*格雷厄姆*）：Hike。

    [ . . . ]

    **女房东：** 哦，对不起，我没介绍你，这是罗恩……罗恩·维宾特洛甫。

    **约翰逊：** 哦，不是冯·里宾特洛甫，嗯？哈，哈，哈。

    **冯·里宾特洛甫**（*吓得跳起两英尺高，然后意识到*）：Nein! Nein! Nein!!

    哦！！哈，哈，哈。不，是另一个不同的家伙。不，我在萨默塞特出生，冯·里宾特洛甫出生在西杜塞尔多夫Gotterammstrasse 46号。他们是这么说的！(Chapman
    *et al.* 1990: 151)


    在*《呆瓜秀》*中，即使在和平时期，爆炸、炮弹呼啸和暴力死亡也很常见，即使没有纳粹在场，角色们也用德国口音说话，并且使用榴弹炮；相比之下，巨蟒剧团关于第二次世界大战的小品似乎失去了其暴力本质，因为战争贩子们被迫进入了郊区。即使是希特勒本人和他最忠实的纳粹同志也无法伤害到郊区的英国人，更不用说格莱特派普或莫里亚蒂了。


    话虽如此，纳粹领导人试图隐瞒身份的举动只是做做样子，因为他们的野心一如既往地具有侵略性；然而，他们要么遇到完全的无知，要么遇到英国人轻微的排斥。寄宿公寓的女房东对待希特勒和他同伴的方式，就像她对待其他每一位客人一样，对待他们的野心，就好像他们在从事一种古怪的爱好。当希特勒在阳台上发表演讲时，在场的唯一其他人——第一个乡巴佬和几个孩子——在长篇大论之后一脸茫然，只表现出轻微的怀疑。即使当小品变成街头采访式的系列访谈，旨在准确评估对希特勒和他的国家'
