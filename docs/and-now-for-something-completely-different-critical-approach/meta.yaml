    the powerful invoke their own superiority, but in the forms of incongruity and
    reversal. Despite his own tendency to complain about ‘political correctness’,
    Cleese himself demonstrates an awareness of the role of power dynamics when he
    states:


    > Not that laughter can’t be unkind and destructive. Like most manifestations
    of human behaviour it ranges from the loving to the hateful. The latter produces
    nasty racial jokes and savage teasing; the former, warm and affectionate banter,
    and the kind of inclusive humour that says, ‘Isn’t the human condition absurd,
    but we’re all in the same boat’. (Cleese 2014: 103)


    Cleese’s latter statement may sound contradictory to his prior assertions, in
    that if humour is to be inclusive and filled with ‘warm and affectionate banter’,
    derogatory humour targeting those with less power and privilege – the sort that
    he earlier writes off as mere ‘political incorrectness’ – is just the kind of
    ‘nasty’ or ‘savage’ comedy that should be avoided. But, like all of us mortals
    who are ‘in the same boat’, Cleese is hardly alone in having some blind spots.
    Often the distinction between humour and disparagement can be difficult to discern;
    there can be a fine line between the two, and, as society changes, those lines
    are not only blurring but constantly shifting. Consequently, many of us experience
    an ongoing tension between the desire to move towards a more equitable world and
    the comfort of the familiar. It is especially difficult for those who are not
    targeted by derogatory humour in power-laden contexts to perceive how that ‘humour’
    may be received by someone with a different identity and social location. Perceptions
    of whether an utterance that the speaker calls ‘humorous’ is funny or cruel will
    differ, depending on the subject position of the audience for that supposedly
    funny joke.


    In counterpoint to the narrative that comedy is being ‘ruined’ by ‘oversensitive’
    neurotics, easily offended ‘snowflakes’ and so forth, a growing body of contemporary
    humour scholarship addresses issues such as cultural, racial and gender power
    dynamics in humour. Many both within and beyond the scholarly community argue
    that it is long past time that society opens its eyes to various'
- md: 'forms of bigotry and cease accepting the systematic ridicule of marginalised
    populations in the name of comedy. As William Cheng argues in ‘Taking Back the
    Laugh: Comedic Alibis, Funny Fails’:


    > Within neoliberal logics, people who endure systemic oppression (blacks, queers,
    crips) – who might have the *least* reason to lighten up arbitrarily – tend to
    be the ones who are *most* exhorted to gain a sense of humour, to take a joke,
    and to laugh things off. (Cheng 2017: 530)


    From an ethical perspective informed by awareness of power dynamics and social
    inequities, it is difficult to view sensitivity to bigotry and disapproval of
    disparaging humour towards the oppressed as a negative. It may also be difficult
    to feel sympathetic to the complaints of those with the social position of the
    Python troupe: Oxbridge-educated Anglo-Saxon males (some of whom have been knighted),
    located at the cultural centre of a nation that, until relatively recently, imperialised
    and controlled much of the globe.


    It may also seem falsely nostalgic to claim that Pythonesque comedy was deemed
    more acceptable in the past, since anyone old enough to remember the original
    release of *Life of Brian* will recall the outcry that accompanied its release.
    As is well known by Python followers, the original filmmaker halted production
    of the film due to the controversial nature of its subject matter, and it was
    only thanks to George Harrison’s intervention and financial backing that the film
    could be made at all (Benko 2012: 3). Even then, the film’s release was met with
    boycotts, censorship, negative press and widespread disapproval. When it came
    to Monty Python’s short-form work, the surviving members of the troupe revealed
    in an interview with *The Telegraph* that the BBC occasionally censored their
    sketch show back in the 1970s (Stadlen 2013). As Freud (for all his limitations)
    pointed out nearly 100 years ago in *Jokes and Their Relation to the Unconscious*,
    the ‘tendentious joke’ is hardly new. However much we might long to harken back
    to a previous ‘golden age’ of comedy, even in Mont Python’s heyday much of the
    material they produced was – in Cleese’s terms – ‘not allowed’.


    Here it should be noted, however, that the source of *Life of Brian*’s offence
    in the late 1970s was much different from what is likely to generate offence today.
    The aspects of the film that triggered the most acrimonious critiques upon its
    release were focused not on gender roles, imperialism or rape jokes, but almost
    entirely on whether it was appropriate for a comic film to invoke a satirical
    approach to the gospel story. Interestingly, much recent scholarship on the film
    has been produced by religious scholars who explore various ways in which *Life
    of Brian* reinscribes the story of Jesus (see, for example, the 2015 edited collection
    *Jesus and Brian: Exploring the Historical Jesus and His Times via Monty Python’s
    Life of Brian*, along with Benko’s article and my own in the *Journal of Film
    and Religion*). While undoubtedly there are many Christian believers who would
    still interpret the film as blasphemous, the more salient critiques today appear
    to be not so much about the film’s depiction of Jesus (who, as Gibron points out,
    is only seen once in the film and is depicted as an ‘absolute good’), but where
    the film pokes fun at certain aspects of human identity.


    ## CONCLUSION


    Objections to certain forms of humour, along with public discussion about what
    constitutes appropriate and inappropriate jokes, are certainly not unique to the
    current era. Contexts shift between cultures and across time, and highly contextualised
    humour often does not travel well, especially as social norms evolve. As Lauren
    Berlant states:


    > Although having good humor is often considered a virtue and a relief, we would
    not always want the state of humorlessness to be replaced by whatever appears
    as the generosity of humor . . . How do we, how can we, distinguish foolish righteousness
    from principled commitment? Context is everything. Perspectives vary. (Berlant
    2017: 314)


    Even Cleese’s apparently contradictory statements capture the tension in play
    during this polarised moment: what kind of humour is deemed ‘acceptable’ in a
    world of seemingly ever-shifting cultural values, and who gets to make that determination?
    As a society, we are currently grappling with an increased awareness of inequity
    and oppression, along with an intense (and presently hegemonic) backlash to that
    heightened sensitivity. For many of us today, laughter only feels safe when we
    are securely located within our own ‘in-group’; in more heterogeneous social spaces,
    polarisation often gives rise to humourlessness, and lack of humour both creates
    and is created by intransigence, the insistence of the ‘rightness’ of one’s position.
    As Berlant states, ‘[h]umorlessness involves the encounter with a fundamental
    intractability in oneself or in others’ (ibid.: 308).


    This intractable ‘humourlessness’ worldview stands in opposition to the ‘deeply
    comic worldview’ described by Morreall in *Taking Laughter Seriously*:


    > Having a sense of humor . . . involves a flexibility and openness to experience
    which a fundamentally serious person lacks. In part this flexibility comes from
    the realization that what is important is relative to the situation someone is
    in and to his point of view . . . Indeed, relativity itself gives a humorous cast
    to our lives as a whole. (Morreall 1983: 123–4)


    The rigidity that Morreall attributes to the contrasting ‘serious’ worldview explains
    the dichotomy noted by Berlant: ‘Humorlessness is associated both with political
    correctness and with the privilege that reproduces inequality as a casual, natural
    order of things. Humorlessness wedges an encounter in order to control it, creating
    a buttress of immobility and impasse’ (Berlant 2017: 308). Thus, lack of humour,
    as Berlant points out, is not the sole province of supposedly ‘over-sensitive’
    marginalised people who are often targeted by jokes told by the more powerful
    and privileged at their expense. Humourlessness can also be located in those *with*
    power and privilege, for whom much is at stake if they perceived the social order
    to be threatened, whether by humour or by anything else.


    Once again, the operative variable here is one of *power*: it makes inherent sense
    for those with little power and status to react negatively against humour that
    ridicules and perhaps even dehumanises them. Furthermore, the defence of ‘we were
    only kidding – don’t you have any sense of humour?’ is often used to silence appropriate
    objections on the part of the marginalised. As Cheng points out, ‘[c]omedians
    and laughers, after all, often demand get-out-of-jail-free cards by professing
    something to be just a joke’ (Cheng 2017: 532).


    Amidst these challenges, I would argue, ethical humour – humour that does not
    depend on disparagement of the disadvantaged or through replication of current
    power relations – is more necessary than ever. If the comic worldview is inherently
    flexible and if humourlessness stems from intractability, it stands to reason
    that if we are going to progress past our current cultural impasse, we need a
    reprieve from that intractability and rigidity. In short, now as never before,
    we need humour. What we do not need, however, is more humour that kicks those
    who are already down. To dismiss such a position as mere ‘political correctness’
    is at best tone-deaf, at worst deliberately cruel.


    Fortunately, other forms of humour are available and always have been. While not
    ‘perfect’ in these terms, much of Monty Python’s work still resonates today. The
    Pythons’ work has been deeply influential, changing comic expectations and conventions
    in significant ways. While some aspects of their comedy may reveal cultural blind
    spots, examples abound – both in *Life of Brian* and elsewhere – of incongruities
    and reversals that not only amuse us, but that have the potential, even decades
    after their original production, to question and challenge multiple aspects of
    the status quo.


