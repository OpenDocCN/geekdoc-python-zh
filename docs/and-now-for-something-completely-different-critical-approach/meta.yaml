    1988）。非人化在将生活视为由价值等级与人权（或其缺失）构成的观点中得以助长。因此，我认为，在这种颠覆与揭露中，存在一种贯穿蒙提·派森作品的自由选择、平等与社会正义的潜在价值，以及狂躁的幽默与大量老式的粗俗。


