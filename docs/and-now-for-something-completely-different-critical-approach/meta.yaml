    and ‘amateurish’ attitude to music.


    ## MUSICAL CHOICES AND INSCRUTABILITY


    To a certain degree it is difficult to ascertain which musical decisions in *MPFC*
    were circumstantial and arbitrary – background music, for example, determined
    by questions of access and cost – as opposed to strategic; Larsen (2008: 400)
    notes that many of the requested musical cues on file at the BBC archive were
    rejected in favour of inexpensive British light music by composers such as Trevor
    Duncan and Reg Wale, thus providing a practical explanation for the surfeit of
    a particular type of ‘pleasant’ middle-brow orchestral music. But what to make,
    for example, of a brief comment in Michael Palin’s published diary, on the occasion
    of a meeting at the BBC with the director Ian MacNaughton, Terry Gilliam and Terry
    Jones involving the selection of a brass-band performance of a Sousa march for
    the programme’s theme tune? Palin observes that brass-band music carries both
    ‘patrician’ and working-class associations, and that this particular choice is
    not ‘calculated or satirical or “fashionable”’ (Palin 2006: 6). A casual remark,
    perhaps, but one to support a possible thesis about the deliberately opaque deployment
    of music in Python, and the avoidance of the modish and contemporaneous. Palin’s
    diaries contain various anecdotes about encounters with rock-star fans and would-be
    collaborators (from George Harrison to Pink Floyd and Led Zeppelin), yet also
    convey an antipathy to chasing musical fashion; there is mention of the Pythons
    refusing to appear on the pop show *Top of the Pops* (1964–2006) to support the
    release of a Harrison-produced version of ‘The Lumberjack Song’ (Palin 2006: 286),
    and a withering assessment of a slick *Top of the Pops*-style pop performance
