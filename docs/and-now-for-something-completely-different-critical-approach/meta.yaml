    in order to consider the strengths and limits of these aims while also, importantly,
    positioning this work ‘within its specific time and place’ (Archer 2016: 55).


    The central aim of our book, then, is to build on these valuable strands of recent
    work and insight by revisiting, reflecting on and interrogating the range of factors
    and elements that have been identified (in popular culture and existing scholarship)
    as contributing to Python’s celebrated status as ‘something different’ – addressing
    Python’s continuing status as a comedy touchstone associated with irreverence,
    anti-authoritarianism, the alternative and the unconventional, fifty years after
    its inception, across generations and across the globe. Consequently, the chapters
    in this book avoid an uncritically celebratory approach to Python’s comedy by
    assessing its shifting cultural meanings and ambiguities.


