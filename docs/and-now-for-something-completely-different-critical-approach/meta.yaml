    proposal that a precondition for becoming a cult film is its glorious incoherence:
    cult film as ‘a disconnected series of images, of peaks, of visionary icebergs’
    (Eco 1985: 4). Like an episode of *Flying Circus*, *Holy Grail* can be broken
    up into different stand-alone scenes connected by certain general conceits and
    occasionally interrupted by the equivalent of ‘now for something completely different’.


