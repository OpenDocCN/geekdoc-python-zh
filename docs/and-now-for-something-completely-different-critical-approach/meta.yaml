    as screeching versions of the staple of ‘the grotesque Bad Mother’ (Whybray 2016:
    172). Further to this, Aronstein has also identified the ways in which, in the
    television programmes in particular, ‘explorations of male gender-bending’, in
    sketches such as ‘Camp Square-Bashing’ (episode 22, ‘How to Recognise Different
