    This speaks to Griffin’s view that


    > the notion of a rhetoric of inquiry and provocation assumes that satirists –
    though they may not have answers to all their questions – exercise an overall
    control over the process of exploration, leading us to raise questions we must
    then ponder. (Griffin 1994: 64)


    Gilliam, then, becomes part of Monty Python’s overall project in being less concerned
    with any kind of moral or political certainty. Rather, his work was much more
    about playing out a different kind of ‘knowing’, using a different kind of ‘photomontage’
    than that used by John Heartfield, Georges Grosz and the Berlin Club Dadaists
    during the First World War to express the suppressed and repressed feelings of
    British social and cultural life. Gilliam is both personally amusing himself and
    speaking to the ‘real world’ in mocking the conventions of the media forms that
    increasingly define and determine it, and in poking fun at establishment thinking,
    which seemed no longer in tune with lived experience in Britain. This becomes
    especially pertinent when taking into account Gilliam’s ‘American-ness’ in that
    he could simultaneously draw upon the more radical and political sensibilities
    of the American underground as it reacted to social change, as well as parody
    the more formal class-oriented critiques of British culture. Significantly, this
    not merely spoke to the freedoms of expression available in animation, but also
    recalls the more transgressive, obscene or carnivalesque aspects of satire sometimes
    removed by the focus upon cleverness, wit and deliberate stylisation in many satiric
    forms (see Thompson 1982). Gilliam’s surreality and absurdity moves Python away
    from the dangers of a potentially patronising sense of superiority or, indeed,
    any specific targets, to secure a more open perspective implicitly championing
    broader ideas about challenging authority and mocking established patterns and
    expectation. This long anticipates *South Park* in its propensity for equal opportunity
    offence – nothing is beyond consideration for sending up or undermining in some
    way. Gilliam is clear on this – nothing is so important that it cannot be joked
    about, nor should anything be so important that it cannot recognise that it might,
    and indeed should, be joked about, and may actually benefit from withstanding
    comic interrogation (see Sterritt and Rhodes 2004: 126). In these respects, rather
    than targeted and polemical satire, Gilliam’s cartoons become playful ‘checks
    and balances’ by which everyone from policemen to philosophers to advertisers
    to grannies are maintained in the public discourse.


    This sense of ‘discourse’ recalls early satirist John Dryden, of course, whose
    theoretical work essentially situated satire – previously a matter of public exchange
    and potential legal intervention, even in its emergent literary forms – into the
    context of creating ‘art’ (Griffin 1994: 14–24). Though in the modern era this
    seems an obvious context in which satire would flourish, Dryden’s intervention
