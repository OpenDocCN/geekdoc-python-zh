    Pynchon, and, above all, *The Hitchhiker''s Guide to the Galaxy*, must count as
    profound points of reference. As with *The Rocky Horror Picture Show*, there is
    not only a shared resistance to oppressive systems that regulate moral behaviour,
    ideology and gender and the conduct of sexuality, as well as a desire to expose
    the hypocrisy of these doctrines (the Roman Catholic segment followed by the Protestant
    Conversation is a good example), but there is also a stylistic overlap in the
    segmenting of a narrative into vignettes, some flowing neatly from one another,
    and others intercalating the main narrative more abruptly. Among the reasons why
    *The Meaning of Life* is considered a cult film, these similarities certainly
    carry weight. A lot of the stylistic flavour of *The Meaning of Life* comes of
    course from the Pythons'' earlier work. As detailed in other chapters in this
    collection, musical set-piece interventions, brusque changes in pace and tone
    that pervert the logical progression of time, voice-over commentary that contradicts
    or otherwise reframes the visual flow, and crazy and absurd animated bursts (courtesy
    of Terry Gilliam) are key staples of the Python aesthetic, and we find them in
    abundance here as well. A British middle-aged couple''s visit to an event-restaurant
