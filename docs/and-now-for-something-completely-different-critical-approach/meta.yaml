    scholarship has indicated, mothers and daughters can use shared media engagements
    to discuss puberty and romantic and sexual relationships, then what might be the
    motivations, benefits and consequences of a shared engagement with Monty Python
    between fathers and daughters? Is this shared investment in Python informed by
    different forms of emotional engagement and ways of looking at the world? How
    might this relate to Python’s status as sketch comedy, rather than dramatic narrative?
    These are particularly complex questions, when considering two factors. Firstly,
    Python’s status as an all-male comedy troupe who have been critiqued, particularly
    since the 1990s, for the sexually objectified roles played by Carol Cleveland
    in *Flying Circus*, as well as the ‘grotesque’ and caricatured female characters
    (the ‘Pepperpots’) the Pythons have played in drag (Whybray 2016: 172; see also
    Wagg 1992). Secondly, the fact that respondent attitudes to these more problematic
    aspects of Python’s comedy – and to their relationships with their fathers – will
    inevitably be complicated by the fact that the respondents are recalling, from
    the present, memories of Python and their fathers that are located, in some cases,
    10–15 years ago (in the early 2000s) and, at the other extreme, 40 years ago (in
    the mid-1970s or even earlier). Consequently, these recollections of cross-gender
    relationships around Python will inevitably, as Jackie Stacey has noted, involve
    complex negotiations between changing ‘public discourses’ around Python and ‘private
    narratives’ relating to their ‘own personal histories’ and ‘the feelings’ they
    have ‘about their past, present and future selves’ (Stacey 1993: 63, 70). Further
    to this, the strong focus on paternal influence within these memories of first
    encounters with Monty Python seems at odds with Python’s status as comedy producers
    fuelled by an anti-establishment spirit, which involved, for Eric Idle, being
    ‘anti-authority, anti-school, anti-teachers, anti-church, anti-mothers, anti-fathers’
    (cited in Mills 2014: 134) and, therefore, as Robert Hewison notes, revolting
    against the ‘deferential society’ that the Python team ‘were introduced to by
    their parents’ (Hewison in Jones et al. 2009). With this in mind, a further consideration,
    when analysing these responses, is the extent to which the association between
    Python and parental influence appears to have impacted on Python’s ability to,
    in Jeffrey Weinstock’s terms, retain (or not retain) ‘its transgressive edge’
    (Weinstock 2007: 111).


    In the analysis that follows, these questions will be considered through exploration
    of the discursive repertoires/ways of talking about the association between fathers
    and Monty Python among the female respondents within the *Monty Python Memories*
    project’s ‘Dad Memories Group’. While it should be noted that some of these memories
    recount activities involving fathers and mixed-gender children (female respondents
    and their brothers or sisters), the focus will be on the father–daughter relations
    primarily discussed in these memories, in order to shed light not only on Python’s
    durability across decades but also its surprising status as the focus of a cross-gender
    form of intergenerational media fandom.


