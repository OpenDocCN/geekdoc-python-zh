    The tensions and conflicts of the decade are then cinematically echoed in several
    by now iconic 1960s British films such as Michael Reeves’s *Witchfinder General*
    (1968) starring Vincent Price as the ruthless witchfinder Matthew Hopkins as well
    as Donald Cammell’s and Nicolas Roeg’s *Performance* (1970)² with Mick Jagger
    as Dionysian reclusive rock star Turner. *Witchfinder General* comments upon the
    culture wars of the decade by explicitly relating its period setting to the contemporary
    conflict (Towson 2014: 88). Simultaneously, it reflects the countercultural fascination
    with occultism and paganism, its related search for simpler times than the technocratic,
    affluent and estranged present and the prevalent yearning for a more authentic
    national culture (see Hunt 2002: 84). *Performance*, on the other hand, depicts
    the ‘post-Altamont, post-Manson’ (Hunt 1998: 143) status quo and prevalent atmosphere
    of violence and disillusion. Thus, it deconstructs the myth of the allegedly Swinging
    Sixties by stressing the self-destructive disposition of late 1960s culture and
    pop music (see Donnelly 2001: 22; Smith 2010: 55) and the counterculture’s highly
    ambiguous and contradictory disposition that is marked both by a conflation of
    seemingly rebellious defiance and consumerism as well as by a reproduction of
    specific mainstream practices.


    This latter stance is, for instance, also articulated in both the ‘Working-Class
    Playwright’ and the ‘Flying Sheep’ sketches (both episode 2, ‘Sex and Violence’)
    as either individualist-artistic (playwright) or career-driven and class-related
    (the ambitious, clever and thus dangerous ringleader sheep Harold and the equally
    ambitious, exploitative farmer) forces that are explicitly linked with entrepreneurial
    spirit and desired commercial success. British films of the time such as the Joseph
    Losey–Harold Pinter collaboration *The Servant* (1963) or the black comedy *Nothing
    But the Best* (1964) also brought this aspect to the fore: while the class struggle
    depicted in *The Servant* takes the shape of Pinteresque power plays with a decidedly
    sexual – that is, queer – tension, the latter film presents a highly ambitious
    young man (Alan Bates) who transcends every moral boundary – including manipulation,
    murder and related sexual blackmailing to keep his dark deed a secret – to get
    to the top. Both Python’s ‘Blackmail’ sketch (episode 18, ‘Live from the Grill-O-Mat’)
    and the ‘Secretary of State Striptease’ sketch (episode 20, ‘The Attila the Hun
    Show’), in which important politicians enter the Peephole Club’s world of burlesque,
    also follow in this vein, thereby also evoking the previously mentioned Vassall
    affair.


    The *Flying Circus* series’ repeated fusion of surrealist, playful and satirical
    wordplay and a recurrent explicitly macabre humour (e.g. the ‘Undertakers Sketch’,
    episode 26, ‘Royal Episode 13’; ‘Falling from Buildings’, episode 12, ‘The Naked
    Ant’; ‘Famous Deaths’ and ‘Funniest Joke in the World’, episode 1, ‘Whither Canada?’;
    or the occult practices employing police officers in episode 13, ‘Intermission’)
    then echo both dominant strands of the 1960s. This specific combination of tongue-in-cheek
    humour and Gothic horror had become popular with the emergence of American television
    series such as *The Addams Family* (1964–6), *The Munsters* (1964–6) or *Dark
    Shadows* (1966–71) that ironically subvert the American ideal of the nuclear suburban
    family. In the first sketch of episode 20, ‘The Attila the Hun Show’, for instance,
    such an alternative family image is constructed by depicting the eponymous warrior
    as husband and father who has just come home from ‘another merciless sweep across
    Central Europe’.


