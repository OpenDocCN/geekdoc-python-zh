    the aforementioned *Python Beyond Python* is devoted to exploring the creative
    work of the Python team members outside of Monty Python. This is distinct from
    our book, which remains focused on evaluating and assessing the impact and continued
    resonance of the Monty Python comedic canon across time and media, including assessments
    of the contribution of Python team members (particularly Terry Gilliam and Terry
    Jones) to Python’s appeal, impact and resonance.


    Alongside the publication of these edited volumes, there has been a smattering
    of book chapters and articles published on aspects of Monty Python and their work
    between 2009 and 2016. Among these, two further key strands can be identified,
    which our volume aims to build and significantly expand upon. The first is the
    valuable work that has been done to address the specific innovations of Python’s
    feature films, as distinct from Python’s television output. Most prominently,
    Justin Smith and Neil Archer have considered the ways in which *Monty Python and
    the Holy Grail* and *Monty Python’s Life of Brian* ‘explore and address the medium
    in which they are working’, not only in their play with cinema conventions but
    through their comedic interrogation of ‘the illusory reality constructed through
    the feature film’ (Archer 2016: 56), particularly with regard to the tensions
    between faithfully depicting past historical eras on film and a comedic awareness
    of ‘the impossibility’ of doing so (Smith 2010: 120).


    The second key contemporary strand of literature is the growing body of work on
    representations of sexuality and gender within Python’s film and television output.
    Challenging previous work, which has championed Python’s progressive critiques
    of myth, convention, authority and institutions, this scholarship has identified
    Python’s portrayal of gender and sexuality as the ‘blind spot in the Pythons’
    comic project’, with copious examples existing across their television and film
    work which suggest ‘an investment in traditional gender roles that persists’ in
    spite of Python’s ‘recognition that all other identities are constructed performances’
    (Aronstein 2009: 115). For Susan Aronstein and Adam Whybray, this is most evident
    in the two types of female characters who largely populate Python’s comedic world
    – ‘the sexualised, hyper-feminine’ characters played predominantly by Carol Cleveland
    (Whybray 2016: 172) and the ‘wide array of frumpy and clueless housewives’ played
    in drag by the Python members. For Aronstein, they operated ‘as a satire on British
    middle-class mores and customs even as they reified misogynist clichés’ (Aronstein
