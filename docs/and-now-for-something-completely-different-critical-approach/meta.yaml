    ‘mature’ deportment. Put differently: kids being silly means one thing, adults
    being silly signifies entirely differently.


    To be fair, I expect most scholars and cultural critics – of cult media and beyond
    – will grant these claims; so the question remains: what explains the neglect
    of comedy by cult film scholars in general, and Monty Python in particular? (And
    not least among the many ironies here is that, in my experience, cult film scholars
    and academics in general almost universally express a fondness for Monty Python!)
    Is it that comedy is considered too mainstream? It should be pointed out that
    this hasn’t stopped criticism of the *Harry Potter* and *Star Wars* and comic
    character franchises from becoming cottage industries. Is it that comedy just
    isn’t outré enough to allow for academic wizardry? Is it that, despite an understanding
    by scholars that all texts require interpretation to be meaningful, the cultural
    bias against comedy prevails and comedy is still considered to have less depth
    – to be less meaningful – than other genres? Does some of the hesitation to address
    comedy simply have to do with the awareness that, while humour is complicated,
    nothing is less funny than a joke explained – or less interesting than the tedious
    bore who explains it?


    The neglect of Monty Python by scholars of cult media is especially curious given
    the commonplace acceptance of Monty Python as a focus of cult veneration. Robert
    Hewison, for example, writes in his overview of the history of Monty Python and
    censorship that, in Great Britain, ‘*Monty Python* quickly became a cult . . .
    Its energy and enthusiasm transmitted itself to the audience, who rejoiced in
    the absurdity of it all’ (Hewison 1981: 8). Marcia Landy, in her excellent book
    on *Monty Python’s Flying Circus*, quotes a similar history of the programme by
    reviewer Andrew Cliff from 1989: ‘Monty Python is 20 years old . . . For a while
    the show languished on the BBC’s second channel . . . Soon it had a cult following’
    (Landy 2005: 100). That cult then spread to American shores: ‘Many young Americans
    saw it [the *Flying Circus*] and believed in it to the extent of its becoming
    a campus cult’ (Wilmut quoted in Landy 2005: 26). Landy then comments on this,
    writing,


    > the term cult suggests a particular type of devoted, collective, and intense
    emotional reaction usually associated with fandom. The *Flying Circus* appealed
    to young people and to disaffected groups for its irreverence toward authority
    and for its unconventional uses of television – it exposed the existence of deeply
    felt desires for alternatives to social and cultural conformity in the United
    Kingdom, America, and elsewhere. (Ibid.: 26)


    Python, it appears, was cult almost from the get-go, which is acknowledged by
    critics of cult film even as they then swiftly move on to discussions of other
    cult media. Mathijs and Sexton devote only half a paragraph to Monty Python in
    their authoritative textbook, *Cult Cinema: An Introduction* (2011), writing primarily
    in relation to *Monty Python and the Holy Grail* (Terry Gilliam and Terry Jones,
    1975) and *Life of Brian* (Terry Jones, 1979) that ‘[f]or some, Monty Python is
    ridiculous, for others silly, for others yet it is ultra-clever, and for many
    it is all of that – cult because of how it unhinges notions of humor’ (Mathijs
    and Sexton 2011: 227). Leon Hunt in his *Cult British TV Comedy: From Reeves and
    Mortimer to Psychoville* considers *Monty Python’s Flying Circus* as sketch comedy’s
    ‘canonical object’ (Hunt 2013: 100) – and then offers no analysis of it at all,
    except to briefly note concerns about the ‘tastelessness’ of a particular sketch
    (‘The Undertaker’s Sketch’ from 1970; see ibid.: 204–5). There is no inclusion
    of *Holy Grail* or any other Python film in the Wallflower Press ‘Cultographies’
    series of books on cult films (which frankly boggles the mind), nor does Hoberman
    and Rosenbaum’s oft-cited *Midnight Movies* (1991) mention Monty Python at all
    among its discussion of 100+ cult films. Gregory A. Waller does mention *Monty
    Python and the Holy Grail* in his discussion of midnight movies, but only to contrast
    it against the unique status of another cult film – *The Rocky Horror Picture
    Show* (Jim Sharman, 1975)! He explains,


    > As further proof of its special status, *Rocky Horror* had by the mid-1980s
    been singled out and accorded the status of cultic and cultural phenomenon by
    the American media and analyzed by academic scholars in a way that *Monty Python
    and the Holy Grail* and [Cheech and Chong’s] *Up in Smoke*, for example, had not.
    (Waller 1991: 173)


    And this absence of analysis remains the case: with the notable exception of Landy,
    whose concern is less with considering the cultic qualities of Monty Python than
    with offering an overview of the television series’ history and emphases, Jeffrey
    S. Miller’s consideration of the American reception of *Monty Python’s Flying
    Circus* in *Something Completely Different: British Television and American Culture*,
    and Justin Smith’s brief consideration of *Holy Grail* in *Withnail and Us: Cult
    Films and Film Cults in British Cinema*, it seems to have been Python’s fate to
    be frequently mentioned by film and media critics as a focus of cult veneration
    but little discussed – indeed, to the best of my knowledge, to this date there
    has been no sustained analysis of the cultic qualities of *Monty Python’s Flying
    Circus* or the films, or sociological consideration of the Monty Python cult.


    This neglect of Monty Python by cult film scholars is even harder to comprehend
    once one notes that the Pythons across their oeuvre demonstrate precisely the
    kinds of characteristics that cult film scholars tend to highlight in their analyses.
    Writing of the *Flying Circus*, but generalizable to all the Pythons’ work, Landy
    observes, for example, the various ways that the Pythons consciously and cannily
    foregrounded and manipulated televisual and cinematic conventions and upended
    cultural expectations. She notes that the Pythons experimented with continuity
    and segmentation, resulting in a self-reflexive and critical treatment of televisual
    media (Landy 2005: 2–3; see also Miller 2000: 130–3). She calls attention to their
    mix of ‘high and low culture’ which combined allusions to literature, philosophy
    and history with slapstick and nonsense (Landy 2005: 3). She argues that ‘Python
    cultural politics played on the absurdity and abuses in language, social institutions,
    and media’ (ibid.: 30), and so on. The frisson of the transgressive, the cultural
    commentary and the out-and-out weirdness many cult film scholars look for is certainly
    there but, with the Pythons, we have the curious case of paradigmatic cult media
    that has received very little scholarly attention, arguably due to the primary
    association with silliness and the entrenched bias against comedy. Hence this
    chapter: What I will attempt in the space left to me is to take a shot at redressing
    this omission by considering some of the cult film qualities of Monty Python with
    a focus on *Holy Grail*; then I will briefly address another under-theorised area:
    the role of cultural difference in cultic veneration.


    ## COME AND SEE THE VIOLENCE INHERENT IN THE SYSTEM!


    Analysis of what makes something a cult film has arguably often suffered from
    the same malady that has in some cases afflicted considerations of humour: *the
    search for the definitive conclusion*. Just as the factors that cause someone
    to receive something as funny can vary considerably based on background, context
    and disposition, the factors that result in a film developing a cult following
    can vary. Indeed, it is a tricky endeavour to try to draw specific conclusions
    about a category that can encompass *Casablanca* (Michael Curtiz, 1942), *The
    Rocky Horror Picture Show*, *The Evil Dead* (Sam Raimi, 1981) and *This Is Spinal
    Tap*. The best we can do as far as an overall generalisation is perhaps Telotte’s
    conclusion that what cultists enjoy in a film is a ‘comfortable difference’ that
    suggests ‘something unusual, noteworthy, and valuable not just about the movies,
    but about their own character, too’ (Telotte 1991: 5). However, before turning
    to the specific cultic qualities of *Monty Python and the Holy Grail* from 1975,
    I would like to suggest one cult film criterion that, while not applicable in
    every case, seems to me to apply in many of them – and certainly where the Pythons’
    programme and films are concerned: quotability.


    To some extent, my proposition here is related to Umberto Eco’s assertion that
    cult films are defined by their lack of organic unity, which Eco describes as
    ‘glorious incoherence’ (Eco 1985: 4). Eco writes,


    > I think in order to transform a work into a cult object one must be able to
    unhinge it, to break it up or take it apart so that one then may remember only
    parts of it, regardless of their original relationship to the whole. (Ibid.)'
