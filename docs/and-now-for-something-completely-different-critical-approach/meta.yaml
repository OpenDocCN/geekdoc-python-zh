  md: '(Barker *et al.* 2015: 62). For one respondent, for example, ‘the stream-of-consciousness
    quality of it appeals to me. I have Asperger’s and my brain is all over the place.
    I feel less alone when I watch anything Pythonesque. Somebody up there gets me’;
    for another, ‘I can’t think of my adolescent years and coming of age without Monty
    Python. They helped me discover who I am and where I “fit”’; while, for another,
    ‘I was always a weird kid, who grew up into a weird adult who looks at life in
    a different way than most, and I gained a love for the Monty Python humour into
    my adulthood’ (#2585 American, 46–55; #1698 Canadian, 36–45; #1722 Canadian, 46–55).
    For these respondents, then, embracing Monty Python, through the mentorship of
    their father, was about embracing difference or distinctiveness and then coming
    to terms with this, by allowing this engagement to help them work out ‘where I
    “fit”’, including, in some cases, recognising that, through their father’s mentorship,
    they had become a fan of something that was conventionally associated with male
    comedy fans. In these cases, some respondents reported that, as a youngster, they
    were often the only female in their peer groups who knew or were invested in Python,
    or that they recall pleasure in standing out from other girls through their investment
    in Python’s adult comedy. For instance, as one respondent recalled, ‘I remember
    being a Brownie in girl scouts. They asked each of us to share our favorite TV
    program. While the other girls mentioned *The Brady Bunch* or *The Partridge Family*,
    I proudly said, “Monty Python”’ (#1230 American, 46–55).


    Many female ‘Dad Memories Group’ respondents also reflected on how their enduring
    engagement with Python had impacted on their ways of seeing the world. As one
    female respondent put it, ‘personally: their humour is stimulating my brain –
    my fantasy, my imagination, my curiosity. Monty Python has given me another way
    of looking at the world’ (#1957 Danish, 36–45). For many, Python’s comedy was
    seen to have multiple levels within it that not only encouraged repeat viewing
    and fed into its appeal as ‘adult’ comedy, but which also enabled respondents’
    relations with Python to grow and develop as they moved through different life
    stages. As one respondent notes, ‘I think that I always liked their humor and
    nonsense, but I get their philosophical and social criticism (“we are all individuals!”,
    the peasants in *Holy Grail*) more as an adult and appreciate that level of their
    humor’ (#1429 Israeli, 26–35).


    Indeed, relations to Python may develop for these enduring female fans due to
    the depth and layered nature of the comedy content itself, but can also shift
    in line with respondents’ changing relations with their fathers. As one respondent
    notes, for instance, ‘[a]s a teen I related to the rebellion they offered by skirting
    the rules of decency in polite society (as a pastor’s kid I could relate to toeing
    that fine line)’ (#3885 American, 36–45). This respondent’s reference to relating
    to Python as a tool of rebellion against (or criticism of) the religious aspects
    of their upbringing during adolescence is also mirrored in a number of other'
  merge: -1
  pgno: 224
- img_proc: true
  md: 'responses which note that their engagement with Python (and, in particular,
    *Life of Brian*) impacted on their worldview. For one respondent, this film made
    ‘me re-think my religious beliefs and why we believe’, while, for another, ‘I
    was raised in an evangelical Southern (US) Baptist family and never took to religion.
    Monty Python was the first truly (and innocently) funny take on the story of Jesus
    I had come across’ (#3020 American, 36–45; #3564 American, 36–45).


    In these examples, then, becoming a Python fan remains an ‘anchoring event’ serving
    as a ‘touchstone for a continuing set of beliefs about the world’ (Pillemer 1998:
    65–83), which, as with the first Monty Python generation represented by many of
    these respondents’ fathers, involves an engagement with the anti-authoritarian
    aspects of Python’s comedy. As in these cases, however, this is an engagement
    which can lead to respondents’ criticism of the same familial and paternal context
    through which they were introduced to Python in the first place. Such paradoxes
    and complexities illustrate the value of attending, in detail, to people’s memories
    of enduring comedy fandom, and particularly the kind of durable, transnational,
    pervasive, culturally eclectic, polysemic and multi-medial comedy represented
    by Monty Python.


    # CONCLUSION


    In some ways, the recollections of initial encounters with Python discussed in
    this chapter seem to point to processes which Jeffrey Weinstock has identified
    as informing the long-term circulation of *The Rocky Horror Picture Show* – where,
    through a new status ‘as an inherited rite of passage’, the ‘necessity of viewing’
    an originally daring and countercultural text moves from ‘subcultural demand to
    general cultural imperative’, from an ‘edgy’ to a mundane and ‘normal’ act (Weinstock
    2007: 112–13). In this respect, paternal encouragements for daughters to watch
    the same episodes and experience the same pleasures as those first encountered
    by their youthful fathers could be seen to stymie and restrict the shaping of
    these daughters’ comedy tastes and engagement with humour. While the recollections
    analysed in this chapter to some degree support such readings, there are two key
    discursive trends repeatedly crossing the responses which illustrate how enduring
    comedy consumption can shed new light on ‘how young people, past and present,
    engage with popular culture and media as part of the process of growing up’ (Kuhn
    2002: 238), and, in turn, how they build and maintain meaningful familial relationships
    that cross both gender and generation.


    Firstly, the fact that an investment in Python served as the (in many cases) singular
    or primary element in many of the father–daughter relationships discussed and
    recalled by these female respondents provides a new intergenerational perspective
    on the social uses and functions of comedy and, crucially, Giselinde Kuipers’
    important argument that humour is primarily ‘a form of'
  merge: -1
  pgno: 225
- img_proc: true
  md: 'communication that is embedded in social relationships’ (Kuipers 2015: 7).
    Despite the dated nature of some of Python’s comedy (from the perspective of present-day
    reminiscence), the diversity and polysemic nature of Python’s output (silly but
    adult, absurd but socially critical, irreverent but philosophical) has clearly
    enabled quotations and particular sketches to endure and to serve, for these respondents,
    as vehicles of communication which maintained father– daughter relationships while,
    paradoxically, transcending them by foreground- ing, for daughters, their father’s
    status as a distinct person. Secondly, and in contrast to Weinstock’s argument
    that the take-up of a text like *Rocky Hor- ror* by younger generations has little
    to do with the assertion of ‘transgressive individuality’ (Weinstock 2007: 111),
    engagement with Python, in examples discussed across the chapter, has enabled
    respondents to embrace a sense of themselves as different, distinct or as standing
    out from their gender or peer group in different contexts, and to, in other cases
    and in relation to Python’s anti-authoritarian or socially critical dimensions,
    critically assess and reflect on aspects of their own social worlds and familial
    backgrounds.


    In these respects, such cross-gender intergenerational forms of Python fan- dom
    can, arguably, be read less as a form of co-option of daughters into the comedy
    tastes of older generations, and more as continuing textual encounters which,
    in varying ways, have enabled the ‘expansion of self-experience’ and ‘knowledge’
    about these respondents’ selves (Hills 2014: 11), their familial and social relationships,
    and their ways of seeing the world, both humorously and critically.


    # NOTE


    1. Throughout the chapter, in-text references to quotations from project questionnaire
    responses give the ID number of the response, the nationality of the respondent
    and the age range of the respondent (e.g. #46 British, 26–35).


