  md: '# NOBODY EXPECTS


    In itself, if we rely on historical accounts, the Spanish Inquisition cannot be
    said to be at all a subject for comedy. But as a historical record, reality, cultural
    construct and the butt of the energetic satire of the Monty Python troupe, it
    is blackly comic, farcical, absurd and, ultimately, more manageable, at least
    in the imagination. Irreverence for seemingly unquestionable power over life and
    death informs the delight of the comedy we share with Monty Python. As the Spanish
    Inquisition (Cardinal Ximenez played by Palin, Cardinal Fang by Gilliam and Cardinal
    Biggles by Jones) burst in on ordinary middle-class homes and force ordinary people
    to endure torture with soft cushions, so the terrifying, warped power maintained
    over life and death by the hierarchy of the Catholic Church in the Renaissance
    period is both there on the screen in all the flamboyant brutality it evokes,
    and also, with the alternative power of satire, utterly nonsensical and undermined.
    It is a very British home, and these overdressed wielders of religious and political
    power are undercut, met by a double refusal of their power: the lack of understanding
    of the basis for their right to terrorise, and the homely everydayness of the
    middle-class woman who is their intended (rather random) victim. Monty Python,
    the mainly Oxbridge-educated, surrealist-influenced comedy troupe, use visual
    and verbal satire to capture the terrors and the forces, real and imagined, that
    govern us. Then, enriched by centuries of satirical tradition and a few dashes
    of pantomime, carnival, farce and existentialism, they puncture these forces.


    Each seeming intransigent, the class system and death tantalisingly offer scope
    for their own undermining and do so by way of comedy through the questioning of
    taboos, boundaries and blockages. The absolute nature of death can be queried
    with belief in ghosts and the afterlife, religious or not, and the class system,
    that system of social inequality based on birth, is troubled by other systems
    of power based on money, meritocracy, bullying and random Othering. It is into
    these liminal clearings of querying, queering and questioning that the surreal
    satirical comedy of the Monty Python troupe enters. Their acute sense of the class
    system is based on their position within it, their irreverence founded in an existential
    and satirical vision that is international in influence and also very British,
    an irreverence for the range of puny, invested constructs that straitjacket people
    – law, religion, polities, hierarchy. These constructs and death, the ultimate
    leveller, are managed by wit and by farce: a large cartoon foot flattening anyone
    and anything, particularly if they are being pompous or excessive.


    The Monty Python troupe started with the Cambridge Footlights and the Oxford Revue,
