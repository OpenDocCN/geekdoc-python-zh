- md: '## 3. DER VER ZWEI PEANUTS: DEPICTIONS OF A DISTANT WAR IN MONTY PYTHON’S FLYING
    CIRCUS


    Anna Martonfi


    ## INTRODUCTION


    In this chapter, I examine the portrayal of the Second World War in *Monty Python’s
    Flying Circus* by contextualising it within post-war sketch comedy programmes
    characterised by absurd or surreal humour. The key argument of the chapter concerns
    the Second World War depicted as an event in the past in *Monty Python’s Flying
    Circus*, rather than as a paradigm of a perpetual present as in some sketch comedy
    shows preceding the Pythons, most notably the radio programme *The Goon Show*.
    The two programmes arguably share similarities in comedic style: they both operate
    with a set of unlikely, extraordinary characters; repeatedly place themselves
    outside the framework of traditional comedy programming by disregarding the structure
    of jokes and placing numerous highly self-referential elements; and in both shows
    the comic absurdity is achieved by setting the opening scene in an ordinary situation
    which, in turn, is transformed into something unexpected and bizarre (Brock 2015:
    55; Landy 2005: 34). Yet in their approaches to the Second World War, the two
    comedy shows arguably differ radically. *The Goon Show*, which ran from 1951 to
    1960, was created by comedians who had experienced the war first hand, while *Monty
    Python’s Flying Circus*, which was broadcast between 1969 and 1974, was the collaborative
    effort of six baby boomers. Apart from the difference in personal experiences,
    another crucial factor to take into account is the larger connotations and implications
    of the generational shift between the two shows and their creators, the Pythons
    belonging to and flourishing in a 1960s and early 1970s ‘countercultural moment’
    (Landy 2005: 15–16). Perhaps consequently, the former show utilises the subject
    of the Second World War as its constant point of reference, using its tropes even
    in the episodes explicitly set in different eras; whereas by contextualising its
    war sketches within contemporary settings, *Monty Python’s Flying Circus* reframes
    the war as an event in the past, not, as in *The Goon Show*, as an event in the
    present.


    In order to successfully interrogate the perception in these two programmes of
    the Second World War, I rely heavily on looking at the primary texts of the two
    shows themselves, and the most significant material supporting the above claim
    are the sketches and episodes themselves related to the war in *Monty Python’s
    Flying Circus* and *The Goon Show*. That said, I imply here that one of the crucial
    reasons why the war is depicted in different ways in the two shows stems from
    the creators’ personal experiences – namely that the Goons were in active service
    during the war while the Pythons were not. Therefore, to a certain extent this
    chapter adopts an auteurist approach, and operates within the framework of performing
    textual analysis on the war sketches, but with emphasis on contextualising them
    both within the social, historical and economic circumstances of post-war Britain,
    and reflecting on some relevant aspects of the creative personnel responsible
    for the programmes. Thus, the discourses this chapter taps into – and relies on
    – consist partly of material on world history, British social and cultural history,
    the specific history of the British Army and that of the Second World War, and
    partly of autobiographical and biographical works on the creators of the two shows,
    and – where available – academic literature on the programmes themselves.


    ## THE GOON SHOW


    > The Goons of course were my favourite. It was the surreality of the imagery
    and the speed of the comedy that I loved – the way they broke up the conventions
    of radio and played with the very nature of the medium. (Chapman et al. 2003:
    73)


    Perhaps no lengthy introductory paragraphs are needed to *Monty Python’s Flying
    Circus* for the benefit of the readers of this volume; I would, however, like
    to briefly introduce *The Goon Show* before unpacking some of its characteristic
    aspects below. *The Goon Show* was a radio comedy programme that ran on the BBC
    Home Service throughout most of the 1950s. Its original cast members were Spike
    Milligan, Peter Sellers, Harry Secombe and Michael Bentine. After the first two
    seasons, during which the show was called *Crazy People*, Bentine left the programme
    and the three remaining actors gradually created the name and format of the show
    that would become extremely popular especially among ex-servicemen of the Second
    World War.¹ From the mid-1950s onwards, *The Goon Show* established itself with
    episodes about the most unlikely plots and plans, with a set of recurring characters
    of various army ranks, and adventures taking place in or around battlefields.


    What *The Goon Show* also achieved during its ten seasons, apart from being a
    highly popular and ‘subversive’ programme set in a surreal fantasy world, was
    revolutionising the use of radio techniques (Wagg 1992: 256). By the beginning
    of the 1950s, the Drama Department of the BBC had developed the use of realistic
    sound effects, something that was more or less alien to the comedy programmes
    of the time, where the sound effects were ‘a knock on the door and tramps on gravel’
    (Wilmut 1978: 47). It was producer Peter Eton, who came to the show with significant
    drama experience, who opened the way for the Goons’ radical use of radio techniques,
    most significantly the sound effects of explosions, shots, shell whooshes and
    bombardments. In the same way the Pythons changed television comedy in the late
    1960s, so did the Goons with regard to radio comedy – a dying genre – in the 1950s.


    In the analysis below, I will look at some of the more iconic war episodes from
    *The Goon Show*, such as ‘The Dreaded Batter Pudding Hurler (of Bexhill-on-Sea)’
    from the fifth series and ‘Tales of Men’s Shirts’ from the ninth. However, it
    is by examining some other episodes and sketches that take place in explicitly
    different settings, either in terms of space or time, or both, that *The Goon
    Show*’s characteristic take on the Second World War is clarified. The evidence
    for this argument is twofold: both the sound effects emulating sounds of battles,
    and the complex relationships between the programme’s set of characters, point
    towards *The Goon Show* using the war as its dominant setting.


    ‘The Dreaded Batter Pudding Hurler (of Bexhill-on-Sea)’ is set in 1941 in the
    small coastal town of Bexhill-on-Sea where, incidentally, Spike Milligan was posted
    for about eighteen months during the Second World War as a soldier (Milligan 1972:
    33). The narrative concerns a mysterious criminal who, using the darkness of the
    blackout in Bexhill, attacks the elderly gentlefolk of the town with freshly baked
    batter puddings. It displays the characteristic structure of *The Goon Show* episodes,
    with the show’s varied set of buffoons and idiots taking centre stage. The relations
    between these characters is far from consistent: those who aid the central goon,
    Neddie Seagoon (Harry Secombe) in one episode, might want to hamper his efforts
    in another.


    In ‘The Dreaded Batter Pudding Hurler’, Neddie is called in to investigate the
    case, and is helped in his endeavours by most of the cast of buffoons and idiots:
    Henry Crun (Peter Sellers) and Minnie Bannister (Spike Milligan), the original
    victims of the pudding hurler; Major Bloodnok (Sellers), an army-type buffoon;
    and finally Eccles (Milligan) and Bluebottle (Sellers), two archetypal goons.
    Whereas these power games and relations vary from episode to episode, it is usually
    Grytpype Thynne (Sellers) and Moriarty (Milligan) who are cast'
  mdcn: '## 3. 远方的战争：《蒙提·派森的飞行马戏团》中的二战描绘


    安娜·马尔通菲


    ## 引言


    在本章中，我将通过把《蒙提·派森的飞行马戏团》置于以荒诞或超现实幽默为特征的战后小品喜剧节目中进行考察，来审视该节目对第二次世界大战的描绘。本章的核心论点是：《蒙提·派森的飞行马戏团》将二战描绘为一个**过去的事件**，而非像派森之前的一些小品喜剧节目（尤其是广播节目《呆瓜秀》）那样，将其视为一个**永恒当下的范式**。可以说，这两个节目在喜剧风格上有相似之处：它们都运用了一系列离奇、非凡的角色；通过无视笑话结构并加入大量高度自指的元素，反复将自己置于传统喜剧节目的框架之外；并且在这两个节目中，喜剧的荒诞性都是通过将开场场景设置在一个普通情境中来实现的，而这个普通情境随后又被转变为意想不到且怪诞的事物（Brock
    2015: 55; Landy 2005: 34）。然而，在对待二战的方式上，这两个喜剧节目可以说存在根本性的差异。《呆瓜秀》（1951年至1960年播出）由亲身经历过战争的喜剧演员创作，而《蒙提·派森的飞行马戏团》（1969年至1974年播出）则是六位婴儿潮一代合作的成果。除了个人经历的差异，另一个需要考虑的关键因素是两档节目及其创作者之间代际转变所蕴含的更广泛意义和影响——派森成员属于并在1960年代和1970年代初的“反文化时刻”中蓬勃发展（Landy
    2005: 15–16）。或许因此，前者将二战主题作为其恒定的参照点，甚至在明确设定于不同时代的剧集中也使用其套路；而《蒙提·派森的飞行马戏团》则通过将其战争小品置于当代背景中，将战争重新定义为一个**过去的事件**，而非像《呆瓜秀》那样，将其视为一个**当下的事件**。


    为了成功探究这两档节目对二战的认知，我主要依赖于审视两档节目本身的原始文本，而支持上述论点的最重要材料，正是《蒙提·派森的飞行马戏团》和《呆瓜秀》中与战争相关的小品和剧集本身。话虽如此，我在此暗示，两档节目以不同方式描绘战争的一个关键原因，源于创作者的个人经历——即“呆瓜”们在战争期间服役，而“派森”们则没有。因此，在某种程度上，本章采用了作者论的方法，在对战争小品进行文本分析的框架内运作，但重点在于将它们置于战后英国的社会、历史和经济背景中进行语境化，并反思负责这些节目的创作人员的一些相关方面。因此，本章所涉及并依赖的论述，部分来自关于世界历史、英国社会文化史、英国陆军特定历史以及二战历史的材料，部分来自关于两档节目创作者的自传和传记作品，以及——在可获得的情况下——关于节目本身的学术文献。


    ## 呆瓜秀


    > 当然，呆瓜们是我最喜欢的。我喜欢的是那种超现实的意象和喜剧的节奏——他们打破广播常规、玩弄媒介本质的方式。（Chapman et al. 2003: 73）


    或许对于本卷的读者来说，无需为《蒙提·派森的飞行马戏团》撰写冗长的介绍性段落；然而，在下文展开其某些特征之前，我想简要介绍一下《呆瓜秀》。《呆瓜秀》是一档广播喜剧节目，在1950年代的大部分时间里于BBC国内频道播出。其原始演员阵容包括斯派克·米利根、彼得·塞勒斯、哈里·塞科姆和迈克尔·本廷。在前两季（当时节目名为《疯人院》）之后，本廷离开了节目，剩下的三位演员逐渐创造了后来变得极为流行（尤其是在二战退伍军人中）的节目名称和形式。¹
    从1950年代中期开始，《呆瓜秀》确立了自己的风格，剧集围绕最不可能的情节和计划展开，有一系列不同军衔的常设角色，冒险故事发生在战场内或战场周围。


    除了是一档设定在超现实幻想世界中、广受欢迎且具有“颠覆性”的节目外，《呆瓜秀》在其十季播出期间还实现了广播技术的革命性运用（Wagg 1992: 256）。到1950年代初，BBC戏剧部已经发展出逼真音效的使用，而这在当时的喜剧节目中或多或少是陌生的，那时的音效无非是“敲门声和踩在碎石路上的脚步声”（Wilmut
    1978: 47）。正是制作人彼得·伊顿，带着丰富的戏剧经验来到这个节目，为“呆瓜”们激进地使用广播技术（尤其是爆炸、枪声、炮弹呼啸和轰炸的音效）开辟了道路。正如派森在1960年代末改变了电视喜剧一样，“呆瓜”们也在1950年代改变了广播喜剧——一个日渐式微的类型。


    在下面的分析中，我将审视《呆瓜秀》中一些更具标志性的战争剧集，例如第五季的《可怕的面糊布丁投掷者（贝克斯希尔滨海）》和第九季的《男人衬衫的故事》。然而，正是通过考察一些其他设定在明确不同背景（无论是空间上还是时间上，或两者兼有）的剧集和小品，《呆瓜秀》对二战的典型处理方式才得以清晰呈现。这一论点的证据是双重的：模拟战斗声音的音效，以及节目角色之间复杂的关系，都指向《呆瓜秀》将战争作为其主导背景。


    《可怕的面糊布丁投掷者（贝克斯希尔滨海）》设定于1941年，在贝克斯希尔滨海这个海滨小镇——顺便提一下，斯派克·米利根在二战期间曾作为士兵在此驻扎约十八个月（Milligan
    1972: 33）。故事讲述了一个神秘的罪犯，利用贝克斯希尔的灯火管制黑暗，用新鲜出炉的面糊布丁袭击镇上的老年绅士。它展示了《呆瓜秀》剧集的典型结构，节目中的各类小丑和傻瓜成为主角。这些角色之间的关系远非一致：在某一集中帮助主角呆瓜内迪·西古恩（哈里·塞科姆饰）的人，可能在另一集中想要阻碍他的行动。


    在《可怕的面糊布丁投掷者》中，内迪被召来调查此案，并得到了大多数小丑和傻瓜演员的帮助：亨利·克伦（彼得·塞勒斯饰）和明妮·班尼斯特（斯派克·米利根饰），他们是布丁投掷者的最初受害者；布拉德诺克少校（塞勒斯饰），一个军队类型的小丑；以及埃克尔斯（米利根饰）和布鲁特尔（塞勒斯饰），两个典型的呆瓜。尽管这些权力游戏和关系因剧集而异，但通常是格里泰普·辛（塞勒斯饰）和莫里亚蒂（米利根饰）被设定为……'
