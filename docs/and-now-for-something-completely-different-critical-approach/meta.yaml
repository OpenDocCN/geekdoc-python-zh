  md: 'with political correctness and with the privilege that reproduces inequality
    as a casual, natural order of things. Humorlessness wedges an encounter in order
    to control it, creating a buttress of immobility and impasse’ (Berlant 2017: 308).
    Thus, lack of humour, as Berlant points out, is not the sole province of supposedly
    ‘over-sensitive’ marginalised people who are often targeted by jokes told by the
    more powerful and privileged at their expense. Humourlessness can also be located
    in those *with* power and privilege, for whom much is at stake if they perceived
    the social order to be threatened, whether by humour or by anything else.


    Once again, the operative variable here is one of *power*: it makes inherent sense
    for those with little power and status to react negatively against humour that
    ridicules and perhaps even dehumanises them. Furthermore, the defence of ‘we were
    only kidding – don’t you have any sense of humour?’ is often used to silence appropriate
    objections on the part of the marginalised. As Cheng points out, ‘[c]omedians
    and laughers, after all, often demand get-out-of-jail-free cards by professing
    something to be just a joke’ (Cheng 2017: 532).


    Amidst these challenges, I would argue, ethical humour – humour that does not
    depend on disparagement of the disadvantaged or through replication of current
    power relations – is more necessary than ever. If the comic worldview is inherently
    flexible and if humourlessness stems from intractability, it stands to reason
    that if we are going to progress past our current cultural impasse, we need a
    reprieve from that intractability and rigidity. In short, now as never before,
    we need humour. What we do not need, however, is more humour that kicks those
    who are already down. To dismiss such a position as mere ‘political correctness’
    is at best tone-deaf, at worst deliberately cruel.


    Fortunately, other forms of humour are available and always have been. While not
    ‘perfect’ in these terms, much of Monty Python’s work still resonates today. The
    Pythons’ work has been deeply influential, changing comic expectations and conventions
    in significant ways. While some aspects of their comedy may reveal cultural blind
    spots, examples abound – both in *Life of Brian* and elsewhere – of incongruities
    and reversals that not only amuse us, but that have the potential, even decades
    after their original production, to question and challenge multiple aspects of
    the status quo.


