    ## 12. 连接的记忆：父亲、女儿与跨代际的《蒙提·派森》粉丝


    凯特·伊根


    2017年，我开始着手观众研究项目《蒙提·派森的记忆》。该项目的核心研究工具是一份在线问卷——结合了定量/多项选择和定性/自由文本的问题与答案——要求受访者分享他们初次接触以及随后多年间接触《蒙提·派森》的记忆和经历。问卷旨在鼓励受访者概述他们对《蒙提·派森》萌生并持续存在的粉丝热情，第一个自由文本问题要求受访者回忆他们以任何形式（电视节目、电影、专辑或现场演出）首次接触《蒙提·派森》的情景。据我所知，该项目此后已积累了迄今为止关于喜剧形式/文本的最大规模观众反馈数据集——来自全球的6,120份回复，其中美国（2,848份）和英国（1,123份）的受访者尤为集中，但加拿大（409份）、澳大利亚（264份）、德国（144份）、瑞典（94份）、法国（82份）、丹麦（76份）和波兰（72份）也提供了大量回复。我收到了来自男性和女性的回复数量相对平衡：男性占52%，女性占46%，而在1,772名回答了（可选的）教育背景问题的参与者中，71%表示他们至少拥有大学学位。回复规模之大，得益于该项目在《蒙提·派森》官方网站
    http://www.montypython.com/ 以及Facebook和Twitter上的官方社交媒体渠道上的推广，从而形成了一个具有全球范围的数据集，并且由于其招募方法，在很大程度上代表了投入其中、自我认同的《蒙提·派森》粉丝的记忆和经历。


    该项目聚焦于《蒙提·派森》粉丝的记忆和经历历史，这与现有关于《蒙提·派森》的学术研究以及更广泛的、新兴的喜剧观众研究领域中的空白有关。2014年，《蒙提·派森》团队时隔三十余年首次在伦敦O2体育馆重聚舞台。演出门票售罄，BBC纪录片称他们为史上最成功的喜剧团体（《想象》，BBC1，2014年7月）。尽管已过去五十多年，《蒙提·派森》的受欢迎程度显然经久不衰。然而，尽管现有的《蒙提·派森》学术研究对核心观众做出了重要论断，认为他们大致是年轻、中产阶级且受过大学教育的群体（例如，参见
    Wagg 1992; Miller 2000; Landy 2005; Brock 2016），但这些论断要么基于对《蒙提·派森》文本的分析，要么（就《蒙提·派森的飞行马戏团》而言）基于与该节目在1960年代末至1970年代中期的英国和美国最初接受背景相关的制度因素（节目的目标受众、播出频道的受众画像或BBC受众研究报告）。虽然我的问卷结果在一定程度上支持了这些学术研究的论断，即《蒙提·派森》主要吸引受过教育的观众，但《蒙提·派森的记忆》项目聚焦于粉丝热情的记忆和历史，使得我们能够更详细地思考这种吸引力如何在最初接受期之后的四十多年里得以维持，它是否发生了变化、发展或变得复杂化，以及如果发生了变化，是与哪些公共和私人环境相关。


    相比之下，新兴的喜剧观众研究领域已经产生了关于“喜剧文本与观众实践”（Bore 2017: 8）以及“日常生活中的幽默风格”和品味（Kuipers 2015:
    19; 另见 Claessens and Dhoest 2010）的优秀且扎实的研究与见解，但主要聚焦于当代喜剧文本和幽默形式的当代接受。在某种程度上，主要的例外是萨姆·弗里德曼的著作《喜剧与区隔》，这是一项关于2009年爱丁堡喜剧边缘艺术节参与者当代喜剧品味的开创性实证研究。在此，弗里德曼识别了对广泛过去和现在英国喜剧（从《最后的夏日之酒》和《是，大臣》到《小不列颠》和《斯图尔特·李的喜剧载体》）的喜剧偏好的关键模式。他的研究主要目的是考虑皮埃尔·布尔迪厄的惯习和具身资本概念在解释当代英国喜剧消费者“喜剧品味的主要断层线”时的效用（Friedman
    2014: 43）。最突出的是，他的研究结果表明，对于他的901名受访者中的相当一部分人来说，对“高雅”或“通俗”喜剧的品味与受访者较高或较低的文化资本资源密切相关。然而，他也认为他的研究结果“表明了喜剧品味中重要的代际差异”，并指出'
