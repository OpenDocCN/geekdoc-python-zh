    如果说夸张手法在喜剧中早已是一种成熟的策略——尤其是在巨蟒剧团的前辈彼得·库克、达德利·摩尔和彼得·塞勒斯的幽默中——那么巨蟒剧团则将其提升了一两个档次，在某种程度上，将夸张的愚蠢变成了他们许多小品的修辞核心（参见本书中杰弗里·温斯托克的章节）。此外，巨蟒剧团还借助当时日益宽松的环境，增添了视觉上的夸张。裸露、暴力、富有暗示性的编舞以及迷幻的*场面调度*（得益于比巨蟒剧团电视作品中更大胆的摄影角度、运动和广角镜头运用），使得《人生的意义》更具挑衅性，并将其从任何表现体系中剥离出来。影片结尾（恰如其分地宣布为“电影的结尾”）对此进行了反身性的评论，并讽刺了当时乃至更久远的流行文化。在这段尾声中，一位有些类似于善意却爱说教的“BBC阿姨”原型的女主持人，哀叹这种夸张的过度：“家庭娱乐？胡扯。他们想要的是污秽。人们用电锯互相残杀……武装的戏剧评论家消灭变异山羊。电影里的乐趣何在？”这恰如其分地评论了夸张手法如何将美学规则炸得粉碎，同时也巧妙地反思了当时正经历某种夸张复兴的流行类型：恐怖片、科幻片和怪诞现实主义，从《世界残酷奇谈》到帕索里尼的《索多玛120天》（1975）。


    在《人生的意义》中，夸张变成了浪费。塞进一个场景的疯狂丰富的元素，导致了言语、实例和提及的爆炸，构成了一个密集而杂乱的不必要细节堆，故事和电影需要从中解脱出来。其中很多是通过食物和体液来可视化的。受污染与纯洁理论的启发，马蒂斯和塞克斯顿（2011）认为，展示食物和体液从身体内部到外部的流动，呈现了邪典电影典型的越界实例。《人生的意义》大量喷洒了这些实例。血液、尿液、唾液、精液、口水和黏液都显著登场，因为它们与荒谬的礼仪、性教育、礼貌和好客观念联系在一起，并被用来阐释这样一个观点：无论什么从人们混乱的内部流向高度控制的外部自我呈现，都会挑战良好行为，直到它爆炸。


    不可避免的典范，也是《人生的意义》中从未被遗漏的一个场景，就是“克里索特先生”场景。其中，一位在高档餐厅的肥胖顾客暴饮暴食，直到他被填满，看起来快要爆炸。在对克里索特先生的描绘中，巨蟒剧团已经跨越了品味的界限。他被表现为夸张的肥胖，洒落的食物残渣顺着他昂贵的西装滴落流淌。在一顿丰盛的晚餐之后，尽管他不情愿，餐厅领班还是说服他再吃一片“薄如蝉翼的薄荷糖”，之后他真的爆炸了。数升蔬菜通心粉汤喷洒在银幕上。电影史上几乎没有比这更好的言语实例了。罗伯特·奥斯本在《好莱坞报道》中说它“粗俗得令人难以置信”（奥斯本
    1983），并警告说，它的出现要求观众“放松”。文森特·坎比（1983）在《纽约时报》称其“不成比例”，罗杰·伊伯特（1983）补充道：“我们得到了成加仑的呕吐物，一股股的，全是令人作呕的黄色，喷洒在正式餐厅里的每个人和每样东西上……这是对普遍遵守的社区标准的一次尖锐、毫不妥协的攻击。”大多数评论家评论了巨蟒剧团如何试图通过将呕吐物推入电影观众的视野来展示性地净化自己，这有助于它超越粗俗（它更像是超大号的粗俗），但它也炸毁了任何可能的理解。值得注意的是，大多数评论家仅仅描述了正在发生的事情，仿佛无话可说。而这正是关键所在。关于这个场景，无话可说。它只是浪费，仅仅是浪费。从这个意义上说，“克里索特先生”场景超越了巴赫金（1965）所描述的潜在怪诞或狂欢化——超越了为结构化和规范化的常态之外的无拘无束的生命庆典提供安全空间的尝试。相反，它没有为情节、或诗学（它超越了荒诞）、或结构、或官僚体系、或电影的哲学增添任何东西（它确实增加了它的*流动*，但只是视觉上的），它是纯粹的浪费。


    ## 结论


    历史，就其本身而言，对《人生的意义》并不十分友好。原因在于巨蟒剧团自身的神话。在上映时，这部电影受到了赞扬，甚至在戛纳电影节上获奖。但它也被认为令人恼火；至少这是英语评论家的共识。对巨蟒剧团作品一直持批评态度的本国评论，尤其是对《布莱恩的一生》的评论，其评价却出人意料地温和。例如，《每日电讯报》称其为“一部时好时坏的奇特作品”（奇尔顿
    2014）。似乎大多数评论家都避开了电影本身在他们面前晃悠的“争议”诱饵。在英语世界之外，反响绝对是积极的，尤其是在法国和拉丁美洲。如今，《人生的意义》的地位似乎过重了，至少作为巨蟒剧团遗产的承载者是这样。尽管这部电影经常出现在对电影经典和邪典的概述中（参见马蒂斯和塞克斯顿
    2011），但它也令人不安地坐在那里。例如，弗伦奇和弗伦奇（1999）将他们的“邪典巨蟒”票投给了《布莱恩的一生》，索伦·麦卡锡（2003）以及马蒂斯和门迪克（2011）更喜欢《圣杯》。对尼尔·麦克纳利（2012）来说，这部电影也不如其他几部好。一些巨蟒剧团成员自己也评论过，电影的写作、后勤工作及其宏大的主题如何让他们力不从心（参见琼斯等人
    2009）。几乎所有讨论巨蟒剧团这一时期作品的资料，都提到吉列姆的《时光大盗》（1981）和《巴西》（1984），或者正片前由他执导的《红》短片，或者特里·琼斯的《维京海盗艾瑞克》（1989），认为这些电影更合法地捕捉了巨蟒剧团遗产的美学——它的异想天开、活力充沛和愚蠢——也就是我上面所说的它*灿烂的生命之乐*。那么，《人生的意义》就是巨蟒剧团的终曲咏叹调，到此为止。


    《人生的意义》对其自身的严肃性保留了一种戏谑的反讽。从这个意义上说，或许很容易将其与1980年代初常见的哲学终结或后现代理论（及反理论）的假设联系起来（参见奥芬南格
    1984 最后一章的描述），无论以何种方式（也许是作为旁白，就像电影中的场景彼此过渡一样？）。正如帕特里克·韦斯特在评论法国哲学家让·鲍德里亚的著作时所观察到的，当时的许多哲学都集中在符号和符号价值（某物通过其外观所具有的价值）如何成为“礼物交换仪式”和“无用商品的炫耀性消费”的核心，这使得“浪费和过剩……成为商品的核心价值”（韦斯特
    2011）。正如本章希望表明的那样，这一观察正位于《人生的意义》的核心（韦斯特也明确提到了巨蟒剧团，尽管是《布莱恩的一生》）。如果这样看，《人生的意义》愚弄了哲学，在哲学拼命寻找象征性胡萝卜的时候，为它提供了一根。这根胡萝卜暗示，电影的“一切都是浪费”的理念可以被纳入生活意义的图式和模型中，作为一种有时是官僚主义的浪费性礼物仪式——比如薄荷糖——“只是让整个事情继续下去”，但除此之外毫无意义。但是，在做出这种奉献的同时，《人生的意义》也'
