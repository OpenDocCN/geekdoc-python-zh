    JAMES LEGGOTT


    In interviews, members of the Python team have tended to emphasise their ‘tone-deafness’,
    and the pragmatics of incorporating music into the writing or delivery of a sketch
    that has otherwise ‘run its course’ (Python cited in the documentary *From Spam
    to Sperm*, broadcast on BBC1 as part of ‘Python Night’, 9 October 1999); a typical
    example can be found in episode 9 (‘The Ant, an Introduction’), where the ‘barber’
    sketch segues into the ‘Lumberjack Song’, whose singers return at the end of the
    concluding ‘Visitors’ sketch, now dressed as Welsh miners, singing ‘Ding Dong
    Merrily on High’ as a part of a suitably chaotic denouement to a narrative of
    an increasingly unpleasant house invasion scenario. And indeed, some might argue
    for a correlation between the increasing reliance on musical elements in later
    Python projects (particularly *The Meaning of Life* [1983] and the *Contractual
    Obligation Album* [1980]) and a degree of creative exhaustion.


    The songs that are exclusive to the Python albums and live shows (i.e. they do
    not appear in the television shows or films) almost constitute an alternative
    canon, at times connecting with their other work, at others seeming disconnected,
    throwaway and more indicative of the individual personae of the team; the *Contractual
    Obligation Album* in particular has been received as the equivalent of their *White
    Album*, in that much of the material – predominantly musical – was conceived and
    recorded individually. Most album songs are predicated upon a disjunction between
    their concept, musical backing and vocal delivery, and the distinctly ‘non-polished’
    singing talents of most of the Pythons (Eric Idle being an honourable exception)
    often adds another layer of incongruity. Thus, ‘We Love the Yangtze’ imagines
    Britain’s ‘top goalies’ chanting, in the demotic ‘football song’ style, about
    the Yangtze river; ‘Medical Love Song’ gives a jaunty tune to a list of grim ailments,
    sung by Graham Chapman in mock-serious fashion; ‘Eric the Half a Bee’ has a simplistic
    melody and arrangement that belies its existential conundrums; and the ‘Philosophers’
    Song’, building upon the premise of a previous TV sketch, is a rumbustious number
    about the drinking habits of intellectuals. There are also self-consciously problematic
    songs: ‘Never Be Rude to an Arab’ sets offensive racial epithets to a slow lilting
    waltz; ‘Sit on My Face’ sails close to the wind by configuring the patriotic Gracie
    Fields song ‘Sing as We Go’ as a litany of sexual positions; the banned ‘Farewell
    to John Denver’ (removed from some releases) appears to describe the death of
    the artist; and ‘I Bet You They Won’t Play This Song on the Radio’ is an anodyne-sounding
    contemporary pop song with self-reflexive references to its own deleted expletives.
    There are also deliberately ‘bad’ numbers that challenge the patience of the listener,
    such as ‘Here Comes Another One’ and ‘I Like Traffic Lights’, wherein Terry Jones
    monotonously plods his way through an a cappella song of childish straightforwardness
    before apparently losing the will to continue.


    In comparison with the ‘throwaway’ – or indeed ‘filler’ – ambience of many of
    these songs, the musical material of *The Meaning of Life* is some of the


