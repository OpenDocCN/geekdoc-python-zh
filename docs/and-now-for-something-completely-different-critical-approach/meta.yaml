    # THE SATIRIC CONTEXT


    Gilliam suggested the music for the opening titles – John Philip Sousa’s ‘Liberty
    Bell’ – so that he could animate to its march tempo. Cut-out animation does not
    possess the ‘smoothness’ of frame-by-frame drawn animation, and works best either
    in fast sudden motion, very slow motion or motion that foregrounds its own ‘jerkiness’.
    Gilliam largely used the fast/slow timings in his visual gags, and deliberately
    used the off-set artifice of the medium to extend the surrealism of the imagery.
    His techniques, processes and themes will be addressed later in this chapter,
    but it is important to stress here that animation at this time was primarily understood
    as a children’s entertainment medium and as a feature of commercials and credits,
    but rarely featured on television otherwise. The very presence of animation in
    a prime-time satirical show was, therefore, in itself subversive and, somewhat
    ironically, effectively established the style and flow of the programme, challenging
    the orthodoxies of the conventional sketch show, both in form and content. Crucially,
    this spoke to a youth audience actively seeking the ‘shock of the new’ – where
    else could they see a cancerous spot with a life of its own, ‘a nasty five-frog
    curse on the M4’ and ‘a resurgence of cheap jokes about poo-poo’? By pushing the
    envelope in representing death, violence and bodily taboo in animation – supposedly
    an ‘innocent’ medium – this merely encouraged and influenced the rest of the team
    to write more challenging material. Further, the use of animation helped to extend
    and develop satire as an approach, enabling what the Monty Python group were to
    dub a ‘stream of consciousness’ style of comedy that liberated itself from the
    need for conventional punchlines (The Pythons 2003: 134–6).


    Dustin Griffin, writing predominantly about literary satire, summarises what was
    the theoretical consensus about the form in the 1960s:


    > Satire is a highly rhetorical and moral art. A work of satire is designed to
    attack vice or folly. To this end it uses wit or ridicule. Like polemical rhetoric
    it seeks to persuade an audience that someone or something is reprehensible or
    ridiculous; unlike pure rhetoric, it engages in exaggeration and'
