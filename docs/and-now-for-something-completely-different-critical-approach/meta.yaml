    George Harrison, and the Beatles by extension), Python also offers a narrative
    of artistic tension, break-up and reformation familiar to many rock bands. Furthermore,
    the team’s cult status, particularly in the United States, came in part via the
    promotion of their albums via FM radio, hence the importance, for some fans, of
    Python’s sonic qualities – including musical numbers – above their visual signatures.


    It is unsurprising, then, that Python music has been the arena for (sometimes
    heated) debate about the group’s creativity and legacy. A review of the De Wolfe
    incidental music collection on the left-field music and pop culture website *The
    Quietus*, for example, registered how the odd collision between signifiers of
    stiff Britishness (such as militaristic or regal, Elgar-type compositions) and
