    ## *Monty Python and the Holy Grail* (1975)


    The British class system, that very tight, historically established gridlock,
    has roots in structures based on wealth and birth, and grows from the belief in
    the divine right of kings (the concept that the right to rule derives from God
    and that kings are answerable for their actions to God alone). Structures of social
    hierarchy, therefore, have some foundations, a certain kind of enforced legitimacy,
    in views of God and the universe. Irreverence for hierarchy and social class,
    divinely legitimated or not, runs throughout *Monty Python and the Holy Grail*.
    Grand visions behind the recognition of Arthur as King of the Britons are punctured
    when the Lady of the Lake, dressed in purest white, raises the sword Excalibur
    from the lake and gives it to Arthur, thus confirming his divine right (something
    spiritual and magical), and also opening the whole event to ridicule. The divine
    right of kings is only so much hierarchical mystical nonsense to Dennis the peasant,
    who deflates and demystifies the event with his common-sense view that ‘strange
    women lying about in ponds distributing swords is no basis for a system of governance’,
    followed by calling the Lady of the Lake a ‘watery tart’. In *The Holy Grail*,
    the king goes around telling people he’s the king. Dennis’s peasant companion
    responds with ‘well I didn’t vote for you’, which challenges his status, and when
    Arthur explains that you don’t vote for the king, Dennis, the more intelligent,
    politicised peasant, points out that the ruler should be voted in by the people’s
    democratic vote.


    Hoffman argues that both the medieval issues and practice of power – divine kingship
    and government – are satirised, particularly with the idea that: ‘the king is
    easily recognisable because he is the only one not covered in shit’ (Hoffman 2002:
    138). Death, a commonplace, is also satirised. ‘Not dead yet’ is a constant refrain
    with, for example, the refusal of the Black Knight to recognise that he has lost
    the battle, even though all his limbs have been hacked off – a reference to Robert
    Bresson’s film *Lancelot du Lac* (1974), with its almost farcical, excessive hacking
    off of limbs and spouting of blood from huge wounds. This ‘reduces the notion
    of chivalric heroism to the very bottom line of absurdity’ (Hoffman 2002: 138).
    Myth, death, hierarchy and the combination of religion and kingship link them
    all, as well as the reverence regarding the historical versions we have of medieval
    times, so that the ‘absurdity at the heart of both chivalry and anarchy is made
    visible and, consequently, made ridiculous’ (ibid.).


    There are many cartoon deaths and death threats in *The Holy Grail*, highlighting
    the constructedness of filmic and TV cartoon scenario representations, sending
    itself up. Arthur’s seriousness is tried by the silliness of the knights who dance
    the cancan on the round table and sing of eating Spam a lot. This is pantomime,
    farce and, as Day suggests, a clear product of the ‘post-Vietnam political and
    social cynicism of the 1970s’ (Day 2002: 133). If we move away from the secular
    constructions of class and death, funeral costs, and into the philosophical, metaphysical
    and spiritual, we see that this film, alongside much of Monty Python and much
    good satire, destabilises the bases in which people invest, whether secular –
    hierarchy of birth, wealth and its outer accoutrements – or spiritual – the miracle
    of birth and the terror of dissolution.


    Death is also made silly partly in the engagement with Python-originated mythical
    beasts, and Hoffman, while acknowledging that there were no recorded fights with
    dragons in the Arthurian era, discusses the Python creations based on a variety
    of mythical creatures (including killer kitty) with which Arthur and the knights
    were thought to have engaged in the UK and Europe. These include ‘the Killer Rabbit
    of Caerbanog’, building on the ‘Trojan Rabbit’, which appears earlier in the film,
    but much more deadly (and very Welsh-sounding), who ‘returns us to the times of
    gore and corpses’ (Hoffman 2002: 144). There is also the ‘Legendary Black Beast
    of Aaaaarrrrrrgggghhhh!’, so named because the cartoonist dies as he draws him
    and scribbles ‘aargh’, but he has much to do with mythical creatures such as Cerberus
    and Hydra in classical mythology. Death is here comic and mysterious. It leaves
    indecipherable traces and mistakes upon which whole sets of belief and behaviours
    are built.


    Beginning with the brilliant social analysis of Dennis the peasant, it is entirely
    possible to be very silly and very Marxist simultaneously. Indeed, if the condition
    of man under capitalism is essentially alienated and absurd, silliness becomes
    the most appropriate and accurate response. The Pythons, then, are true Brechtians
    and true Marxists:


    > not in spite of their silliness, but because of it even if the object of their
    demystification is trivial (such as the cinematic intermission), it provides the
    basis for the questioning of systems and media that are too often assumed to be
    eternal and unchanging. (Hoffman 2002: 145)


    Humour combines with social criticism, and absurdity undermines all systems, beliefs
    and communication. In a post-existential and Marxist moment, the Pythons expose
    the silliness of systems, using satire, slapstick, farce and pantomime to emphasise
    their horror and threat, managed through comic forms. Like carnival, perhaps,
    this is only a brief release before the systems reimpose themselves and the toys
    go back in the box. Their power, however, is permanently queried.


    ## MONTY PYTHON''S LIFE OF BRIAN (1979): SOCIAL HIERARCHY AND DEATH


    In *The Secret Life of Brian*, a 2007 TV documentary reflecting on an earlier
    TV debate (1979) with Malcolm Muggeridge and the Bishop of Southwark, systems
    of control based on belief came under scrutiny when the Pythons discussed a range
    of theoretical versions of religious moments in *The Life of Brian* (1979). They
    argued how, in reading this film as blasphemous, some viewers in some cultures,
    including the UK and US, missed the point. Their desire was to show the life and
    death of an ordinary bloke, an everyman, Brian, alongside Christ. They focus in
    this film, and across their work, on socially constructed hierarchies, constraining
    belief systems, and on mortality and death. This comic treatment is part of dealing
    with taboo subjects through normalising them. It is also part of a tradition of
    black humour and irreverent satire that, in the Monty Python troupe, mixes, in
    an unusual, idiosyncratic manner, with surrealism, the fantastic spliced with
    the realistic. Focusing on both British and international contexts and examples,
    Monty Python are known for debunking grand beliefs, myths, oppression and historical
    grand narratives in equal measure, often through replaying those myths and narratives.


    According to Laura Basu (2014), Terry Jones in an interview in 2011 stated he
    would not make a movie like *The Life of Brian* now as it would be too risky in
    the climate of religious resurgence. It did, however, produce what Giselinde Kuipers
