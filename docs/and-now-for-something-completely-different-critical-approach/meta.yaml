    ERNEST MATHIJS


    rituals (Ehrenreich 2006), or in mayhem and chaos – in anarchy. Within a few minutes
    of screen time, the film jumps from a well-structured classroom to a rugby game
    that ends in wild jostling and equally wild celebrations to a war conflict in
    which all sense of direction is gone. As the camera zooms out of the absurdity
    of a situation in which troops tried to maintain etiquette while under bombardment,
    only waste remains. In another example, a scene on sexual education brims with
    absurdity, as rituals (the sex act, in-class discipline) fight with each other
    over dominance of a situation that has already stopped making sense well before
    that. Throughout, there persists a philosophy that maintains that rituals, even
    in their randomness, have purpose.


    As has been noted in Rick Hudson’s chapter in this volume, the Pythons’ attitude
    here is similar to that of Luigi Pirandello. In his evocation of the absurdity
    of roles, be they performative ones, on stage (as in Pirandello’s most famous
    play, *Six Characters in Search of an Author* [1921]), or in more mundane sketches
    of daily life (in *Eleven Short Stories* [1994]), Pirandello’s characters uphold
    the notion that there is some sort of extrinsic reason for why we do what we do,
    even if it is unintelligible, and even if it is a merely instrumental one (like
    ‘marching up and down the square’, as one vignette in the film has it). Virtually
    every segment in *The Meaning of Life* has a moment in which the Pirandellian
    attitude takes centre stage, when ‘everyday trivia’ that potentially distract
    from the narrative become the focal point of that scene, for no reason other than
    to offer a pivot around which a wonky structure, completely random or irrational,
    can be built, and kept. The film’s short (and interrupted) excursion into systems
    of belief via energy physics, in which wearing a hat is proposed as a boardroom
    topic for vital discussion, is such a moment of structured absurdity. Yet another
    example finds a team of organ transplanters cutting out a person’s liver simply
    because they can and it says so on the donor card. Violence ensues, with blood
    galore, but because it is part of a structure that seems self-explanatory (the
    card says so), the lookers-on (the family) as well as the perpetrators (who banter
    about) accept it – absurd but all right.


    ‘The Middle of the Film’, an intermission-type segment that interrupts what had
    been somewhat of a flow to the story as it makes its way from school through various
