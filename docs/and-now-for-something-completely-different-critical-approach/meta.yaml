    with and parodied the conventions of television. As noted above, their humour
    was not always considered appropriate for the television of the period, leading
    to increasingly heated clashes with the BBC during the series’ run (and then larger
    concerns following the release of *Monty Python’s Life of Brian* in 1979), as
    Robert Hewison chronicles in *Monty Python: The Case Against*. Notable in this
    regard is the notorious ‘Undertakers’ sketch – the final sketch of the second
