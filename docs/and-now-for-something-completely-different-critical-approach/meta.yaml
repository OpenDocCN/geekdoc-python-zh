    ## 7. 来自地狱的老奶奶、大胆的自行车修理工、上流社会的傻瓜以及‘要泡茶，不要做爱’：《蒙提·派森的飞行马戏团》与1960年代英国（流行）文化


    Caroline Langhorst


    在《工人阶级剧作家》这个小品中，那位勤奋、衣着考究的年轻矿工（埃里克·艾德尔饰）对他那位饱受抽筋之苦、满口脏话、即将前往伦敦的北方剧作家父亲（格雷厄姆·查普曼饰）说，他总有一天会明白“生活不仅仅是文化……还有泥土、烟尘和诚实的汗水”。众所周知，蒙提·派森以一种独特的讽刺、超现实主义和颠覆性方式，同时探讨了上述两个方面：文化的多样层面以及生活高度荒诞和病态的本质。此外，这个精选的小品恰当地例证了他们反复实践的“颠覆所有涉及社会阶级、国家和代际身份角色的做法”（Landy
    2005: 71）。他们在战后的英国长大，并因此在大学里遭遇了更为批判和激进的氛围，他们也是“全球文化转型的一部分，这些转型日益挑战现有的社会和政治制度，为……更批判性，或许更愤世嫉俗地审视权威、性别、代际、性取向以及国家和地区身份等问题打开了大门”（同上：19）。因此，整个《飞行马戏团》系列中反复引用了英国文化中各种众所周知的陈词滥调，以及战后时代以来特定的关键文化转型：这些包括阶级分化、南北差异以及相关的“厨房水槽”美学和叙事（愤怒的年轻一代和英国新浪潮电影）、代际冲突以及青年文化和反权威立场日益增长的重要性、随之出现的所谓“富裕”、“宽容社会”、与之相伴的另类、非异性恋规范生活方式的选择，以及美国流行文化的影响和对日益美国化的普遍恐惧。


    此外，蒙提·派森持久的邪典地位及其对英国社会和文化的独特参与，他们明确聚焦于（后）青春期的心态，以及他们所谓的反文化锋芒（见 Mills 2014: 134），都使得将分析重点特别放在《飞行马戏团》时代变得合理。本章借鉴了先前关于蒙提·派森植根于1960年代英国（流行）文化（Landy
    2005）和反文化（Mills 2014）的论述，旨在进一步审视他们在这一高度冲突的社会文化背景下的早期岁月。正如广泛指出的那样（见 Marwick 1998;
    Harris and O’Brien Castro 2014），无论是1960年代整体还是当时的英国文化，都表现出一种非常矛盾的倾向，其特点是进步与反动倾向（例如帝国怀旧）的共存。在本章中，将分析几个与该时代关键方面相关的小品，并将其与1960年代英国电影中对英国文化和社会的类似处理进行进一步的语境化。


    ### ‘让我们像达达主义那样做吧’：《蒙提·派森的飞行马戏团》（1969–73）中的超现实主义与迷幻倾向


    《飞行马戏团》系列在不同层面上与1960年代的英国文化互动：它融合了多种重要的艺术影响，同时明确探讨了当时特定的社会文化问题（例如代际冲突或富裕、宽容的社会），并包含了广泛的（流行）文化参考。¹
    米尔斯恰当地观察到埃里克·艾德尔对反文化既亲近又批判性参与的共存关系。因此，“从《不要调整你的设置》到《派森》和《激怒者》，我们有一系列作品，为他的喜剧在1960年代的根源打开了一扇窗”（Mills
    2014: 126）。他随后列举了几个对艾德尔的关键影响，这些影响同样可以延伸到《飞行马戏团》系列：1960年代初的讽刺热潮（《边缘之外》）、披头士乐队、超现实主义艺术以及“启发了派森剧团童真般超现实主义的达达主义艺术运动”（同上），以及邦佐狗杜达乐队。所有提到的影响还共同分享着一种巴赫金式的狂欢化程度，即对权力结构的嘲弄（同上）。因此，它们呼应了1960年代反权威和自由精神的反文化与迷幻心态。拉塞尔·邓肯进一步指出了“与迷幻相关的经典元素：视觉艺术、性、毒品、新音乐和嬉皮士时尚”（Duncan
    2013: 155），而凯文·唐纳利则强调“英国的迷幻变体或许更多是出于美学而非政治动机”（Donnelly 2001: 21）。正如米尔斯所强调的，1960年代的迷幻倾向在一定程度上也运用了超现实主义元素。与此同时，'
