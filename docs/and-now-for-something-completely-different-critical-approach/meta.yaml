  - '[PAGE 35]


    absurdist theatre with Luigi Pirandello (although Alfred Jarry and many others
    could be identified as the instigator of absurdist theatre with equal legitimacy).
    Pirandello’s plays are notable for featuring many qualities we may now describe
    as postmodern: a self-reflexive awareness and foregrounding of the unrealness
    of the theatre and the fact that we are in a theatre watching a performance, not
    viewing a reality. This is particularly true of his most famous play *Six Characters
    in Search of an Author* (1921). This play opens with the actors playing actors
    and a director who are rehearsing for a play by Luigi Pirandello called *Mixing
    It Up*. The rehearsal is disrupted by the arrival of six individuals who maintain
    that they are not real people, but characters looking for a story to appear in.
    These six characters become aggrieved and an argument ensues when the director
    and the actors who were rehearsing start to devise and act out a play based on
    the six characters; the characters want to play themselves in their story. As
    the play continues the boundary between fact and fiction breaks down: ironically
    it is all fiction of course, being a play. At one point two of the cast members
    argue about how real drama is.


    Although Pirandello’s work predates the coining of the phrase ‘Theatre of the
    Absurd’ – a term originated by Martin Esslin in his book *The Theatre of the Absurd*
    (1961) – his plays can be identified as such. Absurdist theatre is highly influenced
    by existentialism, particularly the work of Albert Camus and Jean Paul Sartre,
    and seeks to confront a world without meaning in the absence of God. In order
    to do this, it jettisons any attempt to dramatically represent a meaningful reality;
    it favours illogical scenes and purposeless characters. Absurdist drama embraces
    the failure of language to convey meaning and not only emphasises the failure
    of art to represent reality, but questions whether there is in fact a reality
    to be represented. In his discussion of Pirandello, Malcolm Bradbury comments
    on this foregrounding of unrealness, and notes its impression on the theatre that
    developed in its wake, including the work of Beckett and Pinter (Bradbury 1989:
    207).


    Turning to Beckett and Pinter, we can see in their work similar themes and similar
    strategies utilised to express them. Furthermore, without even entering into any
    actual analysis at this point, we can see features of Pirandello’s work that foreshadow
    what will later be termed the ‘Pythonesque’. In regard to Beckett, we may not
    consider him to be a particularly funny writer, but a comic pulse that is a response
    to and an acknowledgement of absurdity beats through his work. Discussing his
    novel *Murphy* (1938), Peter Childs notes that humour is used as a mechanism through
    which the work articulates its bleak philosophical concerns (Childs 2008: 7–8).
    Here we can see ideas and strategies similar to those employed by Pirandello,
    but also tropes which would be markers of the Pythonesque. Childs also observes
    that this novel also employs both abrupt, comic violence and scatological humour
    that may seem out of place in ‘high’ literature:'
  - '[PAGE 36]


    Murphy is eventually freed from his desires, when, while he is seated in his rocking
    chair, a gas leak is ignited and Murphy at last achieves the oblivion he has sought
    in a final ‘big bang’. . . . *Murphy* is a very funny but deeply pessimistic novel,
    and it is entirely appropriate that Murphy’s [sic] will ask for his burnt remains
    to be flushed down the toilet in the Abbey Theatre, Dublin, ‘where their happiest
    hours have been spent’. It is appropriate to Beckett’s sense of irony and futility
    that they will actually be scattered across the floor of a London pub in a brawl.
    (Ibid.: 12)


    This employment of a blunt, sudden violence for comic effect, and references to
    toilets and the like, were to become endemic in Python. The iconic animated foot
    that would literally stamp out comic sequences is an exemplary illustration of
    this comic violence in *Flying Circus*, and the show loved nothing better than
    to gleefully launch into routines in which the humour derived solely from their
    vulgarity. This is best illustrated by a short animation sequence in episode 39
    (‘Grandstand’), in which a society lady politely excuses herself so that she may
    ‘powder her nose’. The woman enters the lavatory and, from behind a closed door,
    we hear her loudly and violently voiding her bowels. Importantly, what we see
    here in Beckett and Python is a merging and juxtaposition of the ‘high’ and the
    ‘low’, the ribaldly comic and the philosophical, the violent and the ridiculous.
    However, in Beckett at least, this is not motiveless immaturity, but a means by
    which he sought to have an effect. This blending of contradictory styles which
    W. D. Howarth notes in Beckett’s drama served to disturb and illuminate the audience
    with the express purpose of embracing its concerns: ‘Into what category could
    one possibly put Samuel Beckett’s masterpiece *En attendant Godot* (*Waiting for
    Godot*, 1953) – a play which, for all its comic repartee, offers the most searching
    reflections of the human condition?’ (Howarth 1978: 121).


    This blending of bleakness and the comic, George Brandt argues, is also evident
    in the plays of Harold Pinter which, he highlights, have been described as ‘comedy
    of menace’ (Brandt 1978: 172). Brandt observes in Pinter similarities with Beckett
    and other absurdists with regard to their grim use of humour:


    > Pinter often makes a bleak utterance sound like a joke. Thus, in the one act
    play *The Dumb Waiter* (1959), the action of which has been likened to a Hitchcock
    story with the last reel missing, two smalltime gunmen, Ben and Gus, are waiting
    to perform a contract killing in the basement of a former restaurant. The situation
    is black enough; but theatrically the struggle for dominance between the two killers,
    which turns out to be a life-and-death struggle, comes over as funny. Their trivial
    chitchat is in a violent contrast to their lethal mission; they quarrel furiously
    over whether one should say ‘light the gas’ or ‘light the kettle’. (Ibid.: 172)'
  - '[PAGE 37]


    So far, I believe, we have established that there are pronounced similarities
    between absurdist playwrights like Beckett and Pinter and *Monty Python''s Flying
    Circus*; however, I have essentially done little more than describe how they are
    ''kind of like each other''. To advance this study further it is crucial to highlight
    that Brandt''s statement above not only foregrounds the blackly comic and the
    sinister humour in Pinter (which is shared by Python), but also foregrounds the
    mundane.


    Although discussions of Python often remark upon the absurdity, the strangeness
    and the occasional violence of the show, we must also recognise that the sketches
    and animated sequences frequently drew upon the familiar, the trivial and the
    mundane. The comedy in Python was accentuated by juxtaposing the ridiculous with
    the banal. The ''Marriage Guidance Councillor'' sketch (episode 2, ''Sex and Violence'')
    gains its humour not only from presenting us with a marriage guidance councillor
    who seduces a female client in front of her husband, but also from the fact that
    the husband (played by Palin) is drably dull and tiresomely mundane. ''How to
    Recognise Different Types of Trees from Quite a Long Way Away'' (episode 3, ''How
    to Recognise Different Types of Trees from Quite a Long Way Away'') is a sequence
    running through the half-hour show in which a slide photograph of a tree is repeatedly
    presented to viewers accompanied by John Cleese''s voice emotionlessly intoning
    ''The larch. The larch''. It is quite difficult to explain how something so drab
    and ostensibly humourless could be funny, and yet this sequence has become a celebrated
    classic among Python fans. In this juxtaposing of the strange with the mundane,
    or perhaps in highlighting the strangeness of the mundane, Python demonstrates
    the influence not just of absurdism, but also surrealism.


    Surreal is a term that has come to be accepted as a synonym for strange, bizarre
    or odd, so it is perhaps useful at this point to identify what surrealism actually
    means within art. Although surrealism shares absurdism''s foregrounding of the
    strange and the weird, and on a superficial level ''looks'' like absurdism, the
    ethos of surrealism is very different. Whereas absurdism grew from existentialism
    and was predominantly nihilistic, surrealism developed from psychoanalysis. For
    the surrealists, the highlighting of the strange was not intended to deny that
    a reality existed, but rather to confirm that a reality existed – albeit that
    it is subjectively constructed – and that it could not only be accessed, but revealed
    to be remarkable through the use of strange images and the apposition of the familiar
    with the unfamiliar, or placing the familiar in unfamiliar locations. In essence,
    the mission of the surrealists was not to celebrate the unusual for its own sake,
    nor to deride or deny reality, but to demonstrate that the ''real'' and mundane
    was – if reconsidered – extraordinary (Childs 2008: 125–7). This distinction,
    I believe, is crucial to understanding Python as a phenomenon.


    We must also acknowledge that the influence of absurdism and surrealism did not
    impact on Python alone. Throughout the 1960s, and well into the 1970s,'
- md: '## British culture was to see an ever-increasing infusion of the weird and
    the strange into a wide variety of cultural and media texts. It hardly needs remarking
    upon that many popular British TV shows were influenced and actively drew upon
    absurdism, surrealism and Pop Art. Popular 1960s programmes where this is perhaps
    most evident are those that fall within the genre that I shall refer to as ‘sort-of-but-not-really-science-fiction’:
    *The Avengers* (1961–9), *Adam Adamant Lives!* (1966–7), *Department S* (1969)
    and, of course, the seminal *The Prisoner* (1967–8). We can also see the impact
    of these movements on popular prose fiction in this period: Michael Moorcock’s
    fantasy novels, even at their most conventional, toyed with Pop Art and surrealism,
    but entered an entirely new realm of the absurd and bizarre with his experimental
    Jerry Cornelius novels: *The Final Programme* (1969), *A Cure for Cancer* (1971),
    *The English Assassin* (1972) and *The Condition of Muzak* (1979). However, such
    elements and influences could also be witnessed in areas of culture one might
    think of as being less likely to embrace the weird and the avant-garde.


    Poet and author Edward Upward, the ‘last of the Auden Generation’, had a writing
    career that spanned from 1938 to 2003. Despite being a friend and contemporary
    of the Bloomsbury group, he was to see an increased interest shown in his work
    in the wake of the publication of his *The Railway Accident and Other Stories*
    in 1969. Although a Marxist and active member of the Communist Party, Upward eschewed
    the social realism generally utilised by Marxist writers of his generation in
    favour of a dreamy, often horrific, fantastical form of prose that owed much to
    Lewis Carroll and H. P. Lovecraft. This dark yet whimsical surrealism is perhaps
    best illustrated by his series of short stories set in the fictional village of
    Montmere, often co-written with Christopher Isherwood. These stories frequently
    come to an abrupt close, or peter out after only a few pages, only hinting at
    or alluding to a deep lurking and unsettling conflation of the horrific and humorous
    which was to become – or perhaps has always been – a keystone of English humour.
    Indeed, in this grotesque fusion of terror and comedy we can perhaps see in Montmere
    an antecedent of Royston Vasey which was to feature later in the TV series *The
    League of Gentlemen* (1999–2002).


    Scottish poet/songwriter/comedian Ivor Cutler produced work that also demonstrated
    absurdism and surrealism; however, Cutler’s writing was to achieve its disturbing
    and destabilising effect by embracing a childish, nonsensical silliness rather
    than the horrific. Cutler was embraced by popular culture despite him being something
    of a fringe, avant-garde figure. Cutler had his songs broadcast by BBC radio from
    the late 1950s and was to perform regularly on Neil Innes’ various TV programmes
    throughout the 1960s as well as featuring on BBC Radio 1’s *The John Peel Show*
    from 1969. Additionally, he appeared in the Beatles’ 1967 film *Magical Mystery
    Tour*, having won the admiration of Paul McCartney.


    British culture in the 1960s also witnessed surrealism emerge in the unlikely
    realm of children’s television due to the work of Oliver Postgate who, in collaboration
    with animator and puppet-maker Peter Firmin, produced short TV programmes for
    children that were not only hugely popular with their audiences, but steeped in
    surrealism and fantasy: *Noggin the Nog* (1959–65), *Ivor the Engine* (1959/1975–7),
    *Pogle’s Wood* (1965–7), *The Clangers* (1969–72/1974) and *Bagpuss* (1974). Postgate
    and Firmin’s animations went beyond the sort of fantasy that one is familiar with
    in children’s fiction to produce stories and worlds that were kindly, warm, welcoming
    and yet sinister; conservative yet eccentric; sentimental and silly, yet melancholic;
    parochial yet experimental; ground-breaking yet nostalgic. Indeed, this contradiction
    is further emphasised by the fact that these children’s TV shows were underscored
    by Postgate’s socialist and environmental principles.


    Nonetheless, even in this climate where the abnormal was being assimilated into
    the mainstream, Python was, and is, recognised as being distinct from these other
    programmes and narratives. This may possibly be due to the individual and combined
    talents and influences of six individual members being fused together. It may
    be due to these particular individuals coming together at a particular time when
    the conventional media was open to the challenging, new and untried. But whatever
    the reason, even in the revolutionary and experimental environment of the late
    1960s and early 1970s, *Monty Python’s Flying Circus* truly was something completely
    different.


    *Monty Python’s Flying Circus* did indeed share many features with absurdist theatre,
    and the influence of absurdism is not only demonstrated through observing similarities
    between episodes of *Flying Circus* and the work of absurdist playwrights, but
    openly acknowledged by Terry Jones himself as noted above. Nevertheless, Python
    is far from nihilistic: it is deeply Humanistic (and I do not use the term in
    a pejorative way). Like much cultural output of the 1960s and early 1970s, it
    was essentially satirical: critical of an establishment it saw as not only dull
    and staid, but unfair, unjust and reactionary. Satire attacks injustice, hypocrisy,
    dishonesty and corruption, and therefore – by extension – a satirist believes
    that there is a justice to be had and an honesty and a truth that is obscured
    by lies and corruption. Python – despite its often savage and violent humour and
    its use of absurd and surreal images, characters and situations – was deeply *human*
    in its outlook. Frequently the protagonist in a Python sketch will be (all too)
    ‘human’ and ‘normal’, but thrown into a bizarre and incomprehensible situation.
    We can see this in the film *Monty Python’s Life of Brian* (1979). Brian – the
    protagonist – is very much a flawed ‘ordinary bloke’ who finds himself flung into
    absurd scenarios. These absurd situations often arise due to the pettiness, short-sightedness
    and irrationality of those in positions of power, or systems of power that have
    been corrupted by their own internal absurd rationalities.


    Cruelties are often perpetrated as a consequence of naivety or incompetence, rather
    than malice (Hudson 2017b: 93–108).


    Likewise, there is a glee in Python that is markedly absent from both Beckett
    and Pinter. Beckett and Pinter both utilise language and word games in order to
    convey meaninglessness and the inability of language to truly communicate. Bran
    Nicol says of Beckett:


    > [H]e was concerned, from the outset, with the peculiar paradox of fiction. It
    was the job of literature, he thought, to reflect the meaninglessness of existence.
    Yet the paradox is that it must do this via language, which is endlessly (in his
    view) meaningful. So his writing attempts the impossible task of conveying meaninglessness
    through meaning, or trying to convey nothingness through something, or silence
    in words. (Nicol 2009: 53)


    He expands upon this point as follows:


    > Beckett’s writing is the counterpart of abstract visual art of the painter Mark
    Rothko, who exemplifies Susan Sontag’s new postmodern sensibility in art, and
    whose paintings defy any viewer to say plausibly what they are ‘about’ other than
    what the title tells us. Beckett’s prose does something equivalent, though of
    course language cannot be as abstract as colour and his fiction still features
    peoples, places, and situations which can be taken as corresponding to those in
    the outside world. Nevertheless his prose writing is dedicated to the idea of
    upholding the notion that fiction is not ‘about’ anything, does not ‘refer’ to
    anything outside itself. (Ibid.: 53)


    Python similarly utilised language and word games, but with a different intent,
    and with a joyful spirit absent from Pinter and Beckett. ‘Eric the Half a Bee’
    (written by Eric Idle and John Cleese and originally released as a single in 1972
    on Charisma Records) takes delight in its own silliness. The humour in the song
    arrives from a number of sources: the forced rhymes, the deadpan delivery of its
    absurdity, the contrast between the rather pompous language and the daftness of
    the subject matter. It is at once complete nonsense, yet has an internal logic
    of its own:


    > Half a bee, philosophically, must *ipso facto* half not be. But half the bee
    has got to bee, *vis-à-vis* its entity – d’you see? But can a bee be said to be
    or not to be an entire bee when half the bee is not a bee, due to some ancient
    injury?


    And yet, while it is about nothing, it has meaning: it is a send-up of popular
    song, and satirises that song format.'
  mdcn: '## 英国文化中，各种怪异与奇特的元素正日益渗透到广泛的文艺与媒体文本中。无需赘言，许多受欢迎的英国电视节目都受到了荒诞主义、超现实主义和波普艺术的影响，并积极从中汲取灵感。1960年代最受欢迎的节目中，或许最能体现这一点的，是那些我称之为“似是而非的科幻”类型的节目：《复仇者》（1961–1969）、《亚当·亚当南特活着！》（1966–1967）、《S部门》（1969），当然还有开创性的《囚徒》（1967–1968）。我们也能看到这些运动对这一时期通俗散文小说的影响：迈克尔·穆尔科克的奇幻小说，即使在其最传统的作品中，也玩味着波普艺术和超现实主义，而他的实验性杰瑞·科尼利厄斯系列小说——《最终程序》（1969）、《癌症疗法》（1971）、《英国刺客》（1972）和《穆扎克的状况》（1979）——则完全进入了荒诞与怪异的新境界。然而，这些元素和影响也可能出现在人们认为不太可能拥抱怪异与先锋派的文化领域。


    诗人兼作家爱德华·阿普沃德，这位“奥登一代的最后一位成员”，其写作生涯从1938年延续至2003年。尽管他是布鲁姆斯伯里团体的朋友和同代人，但在1969年他的《铁路事故及其他故事》出版后，人们对他的作品兴趣日增。尽管阿普沃德是马克思主义者和共产党员，但他摒弃了同代马克思主义作家普遍采用的社会现实主义，转而采用一种梦幻、常常令人恐惧的奇幻散文形式，这深受刘易斯·卡罗尔和H.P.洛夫克拉夫特的影响。这种黑暗而异想天开的超现实主义，或许在他以虚构村庄蒙特米尔为背景的一系列短篇小说中得到了最佳体现，这些小说常与克里斯托弗·伊舍伍德合著。这些故事常常戛然而止，或在几页后便无疾而终，仅暗示或影射着一种潜伏深处、令人不安的恐怖与幽默的融合——这种融合后来成为，或者说或许一直是，英式幽默的基石。确实，在这种恐怖与喜剧的怪诞融合中，我们或许能在蒙特米尔中看到罗伊斯顿·瓦西的雏形，后者后来出现在电视剧《绅士联盟》（1999–2002）中。


    苏格兰诗人/词曲作者/喜剧演员艾弗·卡特勒的作品也展现了荒诞主义和超现实主义；然而，卡特勒的写作是通过拥抱一种幼稚、无意义的愚蠢，而非恐怖，来达到其令人不安和动摇的效果。尽管卡特勒有些边缘化和先锋派色彩，但他仍被大众文化所接纳。从1950年代末开始，他的歌曲就在BBC广播中播出，并在整个1960年代定期出现在尼尔·英尼斯的各种电视节目中，此外还从1969年起出现在BBC广播1台的《约翰·皮尔秀》中。此外，他还出现在披头士1967年的电影《奇幻之旅》中，赢得了保罗·麦卡特尼的赞赏。


    1960年代的英国文化也见证了超现实主义在看似不太可能的儿童电视领域崭露头角，这要归功于奥利弗·波斯特盖特的工作。他与动画师兼木偶制作人彼得·弗明合作，为儿童制作了短篇电视节目，这些节目不仅深受观众喜爱，而且充满了超现实主义和奇幻色彩：《诺金》（1959–1965）、《引擎伊弗》（1959/1975–1977）、《波格尔的森林》（1965–1967）、《叮叮当当》（1969–1972/1974）和《巴格普斯》（1974）。波斯特盖特和弗明的动画超越了人们在儿童文学中熟悉的那种奇幻，创造出既友善、温暖、好客，又阴森；既保守又古怪；既多愁善感又愚蠢，却又忧郁；既乡土又实验性；既开创性又怀旧的故事和世界。事实上，这种矛盾因这些儿童电视节目以波斯特盖特的社会主义和环保原则为基础而进一步凸显。


    尽管如此，即使在异常事物被融入主流的这种氛围中，巨蟒剧团过去和现在都被认为与其他节目和叙事截然不同。这可能是因为六位成员各自及共同的才华与影响力融合在一起。也可能是因为这些特定的个体在特定的时间聚集在一起，而当时的传统媒体对具有挑战性、新颖和未经尝试的事物持开放态度。但无论原因如何，即使在1960年代末和1970年代初那个革命性和实验性的环境中，《蒙提·派森的飞行马戏团》也确实是完全不同的东西。


    《蒙提·派森的飞行马戏团》确实与荒诞派戏剧有许多共同特征，荒诞主义的影响不仅通过观察《飞行马戏团》剧集与荒诞派剧作家作品之间的相似性得以体现，而且正如上文所述，特里·琼斯本人也公开承认了这一点。然而，巨蟒剧团远非虚无主义：它是深刻的人文主义的（我并非贬义地使用这个词）。与1960年代和1970年代初的许多文化产出一样，它本质上是讽刺性的：批判一个它认为不仅沉闷、刻板，而且不公、不义和反动的体制。讽刺攻击不公、虚伪、不诚实和腐败，因此——推而广之——讽刺作家相信存在一种正义，以及一种被谎言和腐败所掩盖的诚实与真相。巨蟒剧团——尽管其幽默常常尖刻暴力，并使用荒诞和超现实的意象、角色和情境——其世界观是深刻*人性*的。巨蟒剧团小品中的主角常常是（过于）“人性”和“正常”的，却被抛入一个怪异且难以理解的境地。我们可以在电影《蒙提·派森之布莱恩的一生》（1979）中看到这一点。主角布莱恩是一个非常有缺陷的“普通家伙”，却发现自己被抛入荒诞的情境中。这些荒诞的情境常常是由于掌权者的狭隘、短视和非理性，或是被自身内部荒诞理性所腐化的权力体系所造成的。


    残酷常常是天真或无能的结果，而非恶意（Hudson 2017b: 93–108）。


    同样，巨蟒剧团中有一种贝克特和品特作品中明显缺乏的欢乐。贝克特和品特都运用语言和文字游戏来传达无意义以及语言无法真正沟通的无力感。布兰·尼科尔这样评价贝克特：


    > 他从一开始就关注小说的特殊悖论。他认为，文学的任务是反映存在的无意义。然而悖论在于，它必须通过语言来做到这一点，而语言在他看来是无穷尽地有意义的。因此，他的写作试图完成一项不可能的任务：通过意义传达无意义，或试图通过有来传达无，或用言语传达沉默。（Nicol
    2009: 53）


    他进一步阐述了这一点：


    > 贝克特的写作是画家马克·罗斯科抽象视觉艺术的对应物，罗斯科体现了苏珊·桑塔格在艺术中的新后现代感性，他的画作让任何观者都难以令人信服地说出它们“关于”什么，除了标题告诉我们的内容。贝克特的散文做了类似的事情，尽管语言当然不能像颜色那样抽象，他的小说仍然包含可以被视为与外部世界相对应的人物、地点和情境。然而，他的散文致力于维护这样一个观念：小说不“关于”任何东西，不“指涉”自身之外的任何事物。（同上：53）


    巨蟒剧团同样运用语言和文字游戏，但意图不同，并带有一种品特和贝克特作品中缺乏的欢乐精神。《半只蜜蜂埃里克》（由埃里克·艾德尔和约翰·克里斯创作，最初于1972年在Charisma唱片公司作为单曲发行）以其自身的愚蠢为乐。这首歌的幽默来自多个方面：生硬的押韵、对其荒诞性一本正经的演绎、相当浮夸的语言与愚蠢主题之间的对比。它完全是胡言乱语，却又自有其内在逻辑：


    > 从哲学上讲，半只蜜蜂，*ipso facto*（根据事实本身）必然*不是*半只。但半只蜜蜂必须是蜜蜂，*vis-à-vis*（相对于）它的存在——你明白吗？但是，当半只蜜蜂由于某种古老的伤害而不再是蜜蜂时，我们能说一只蜜蜂是或不是一整只蜜蜂吗？


    然而，尽管它关于虚无，却有意义：它是对流行歌曲的戏仿，并讽刺了那种歌曲形式。'
