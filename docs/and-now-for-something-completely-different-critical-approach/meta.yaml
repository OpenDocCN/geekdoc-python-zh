    ## 讽刺语境


    吉列姆建议片头使用约翰·菲利普·苏萨的《自由之钟》作为配乐，以便他能配合其进行曲节奏进行动画制作。剪纸动画不具备逐帧手绘动画的“流畅性”，它最适合快速突然的运动、极慢的运动，或者突出其自身“顿挫感”的运动。吉列姆在他的视觉噱头中主要运用了快/慢节奏，并刻意利用这种媒介的错位技巧来延伸图像的超现实主义。他的技术、流程和主题将在本章后面讨论，但这里需要强调的是，当时的动画主要被理解为一种儿童娱乐媒介，以及广告和片头字幕的特色，但很少在电视上以其他形式出现。因此，动画出现在黄金时段的讽刺节目中，其本身的存在就是颠覆性的，并且颇具讽刺意味的是，它有效地确立了节目的风格和节奏，无论在形式还是内容上都挑战了传统滑稽短剧的正统观念。至关重要的是，这迎合了积极寻求“新奇冲击”的年轻观众——他们还能在哪里看到一个有自己生命的癌变斑点、“对M4高速公路的恶毒五蛙诅咒”以及“关于便便的廉价笑话的复兴”？通过推动动画在表现死亡、暴力和身体禁忌方面的界限——动画本应是一种“纯真”的媒介——这仅仅鼓励并影响了团队其他成员去创作更具挑战性的材料。此外，动画的使用有助于扩展和发展讽刺作为一种方法，使得蒙提·派森团体后来称之为“意识流”的喜剧风格得以实现，这种风格摆脱了对传统笑点的依赖（The
    Pythons 2003: 134–6）。


    达斯汀·格里芬主要研究文学讽刺，他总结了1960年代关于这种形式的理论共识：


    > 讽刺是一种高度修辞性和道德性的艺术。讽刺作品旨在抨击恶行或愚蠢。为此，它运用机智或嘲弄。像论辩性修辞一样，它试图说服受众某人或某事是应受谴责或可笑的；与纯粹修辞不同的是，它涉及夸张和某种虚构。但讽刺并不完全抛弃“现实世界”。它的受害者来自那个世界，正是这一事实（加上更阴暗或更尖锐的基调）将讽刺与纯粹喜剧区分开来。最后，讽刺通常通过明确参照某些道德标准或目的来进行。（Griffin
    1994: 1）


    在我所有关于动画作为一种形式的研究中，我都提出，它本质上是修辞性的和表述性的。动画*总是*修辞性的，因为它既是对物质和感知现实的表现的一种解释，也是一种干预。它作为一种幻觉的、人为构建的和自我图示的形式（动画师总是被暗示和存在）的地位，也赋予了它一种表述性的特质，使其在字面上宣告了自己与其他表达形式的不同。在蒙提·派森的语境中，它为真人表演和表演短剧提供了“书挡”，或者作为叙事和主题上前后呼应的标志性路标。吉列姆高度自觉地在美学和概念上运用动画的修辞特质，使“恶行”和“愚蠢”变得高度相对，并使节目的“道德标准”处于流动状态。


    格里芬认为，讽刺因其历史背景和目的而发生了显著变化，并且，除了其更具说教性的道德和社会议程外，它实际上是探究和探索的载体。1960年代出现的讽刺，由于性革命和政治动员瓦解了任何关于“人*是*什么以及他*应该*是什么”的确定性（Griffin
    1994: 36），已无法清晰区分恶行与美德。事实上，“差异”的整个概念以及身份政治出现的早期迹象，正在促进“真理”更大的相对性，并挑战既有的观念和实践。因此，动画的修辞和表述地位，成为一种完全恰当的载体，通过新的表达方式来表达有争议的问题，以挑战和质疑传统正统观念。当一只伸出的长手试图从米开朗基罗的《大卫》（1501–4）身上扯下遮羞布，却被雕像形态优美的手拍打时——这是吉列姆最著名的动画片段之一——其中蕴含着关于保持体面和礼仪、尊重艺术、文化和社会规范的编码信息。然而，当遮羞布最终被移除时，它揭示的是电影审查官约翰·特雷维利安的脸，取代了大卫生殖器的位置，而这只手又被动画师吉列姆本人用橡皮图章“审查”了。吉列姆扭转了道德局面，禁止了禁令，含蓄地提倡了自由开放的新秩序。正如吉列姆坚持的那样：


    > 你可以成为一个顽皮的上帝。你可以重塑世界。你可以取笑它。你把它里外翻转，上下颠倒。你让眼睛凸出来。你给蒙娜丽莎画上胡子。你改变世界，并在短暂的时刻控制它。（Sterritt
    and Rhodes 2004: 128）


    这呼应了格里芬的观点，即


    > 探究和挑衅的修辞概念假定讽刺作家——尽管他们可能没有所有问题的答案——对探索过程保持着总体控制，引导我们提出必须思考的问题。（Griffin 1994:
    64）


    那么，吉列姆成为蒙提·派森整体计划的一部分，他不那么关心任何道德或政治上的确定性。相反，他的作品更多是关于展现一种不同的“认知”，使用一种不同于约翰·哈特菲尔德、乔治·格罗斯和柏林达达俱乐部成员在一战期间使用的“照片蒙太奇”，来表达英国社会和文化生活中被压抑和压制的情感。吉列姆既在个人层面上自娱自乐，也在嘲讽日益定义和决定现实世界的媒体形式惯例，以及取笑建制派思想——这种思想似乎不再与英国的生活经验相协调。这一点在考虑到吉列姆的“美国性”时变得尤为重要，因为他可以同时借鉴美国地下文化对社会变革反应中更激进和政治化的敏感性，同时戏仿英国文化中更正式、基于阶级的批判。重要的是，这不仅体现了动画中可用的表达自由，也让人想起讽刺有时因聚焦于机智、才智和刻意风格化而被移除的更具颠覆性、淫秽或狂欢化的方面（见
    Thompson 1982）。吉列姆的超现实主义和荒诞性使蒙提·派森远离了潜在居高临下的优越感或任何特定目标的危险，从而确保了一种更开放的视角，含蓄地拥护挑战权威和嘲弄既定模式与期望的更广泛理念。这远远预见了《南方公园》对冒犯机会均等的倾向——没有什么是不能以某种方式拿来嘲弄或颠覆的。吉列姆对此很清楚——没有什么重要到不能开玩笑，也没有什么重要到不能认识到它可能、而且确实应该被开玩笑，并且实际上可能从经受喜剧性质询中受益（见
