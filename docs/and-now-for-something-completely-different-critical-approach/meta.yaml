    ochre or lead, explaining that ‘[m]iniatures may be executed without the use of
    gold or silver while illuminations may not. Although there are illuminated miniatures
    – i.e., pictures finished with touches of gold to represent the lights – many
    miniatures are not illuminations’ (Diringer 1980: 149). By dividing these two
    terms on the basis of their constituent alchemical metals, it is a simple matter
    to neatly connect the practice of film-making with that of manuscript illumination;
    the silver pigment of the page becomes the silver halide of the film stock, while
    the representation of light becomes the projection of light.


    Applying a mediaeval model of practice to a modern form inevitably fails to produce
    exact parallels, but viewing the division of work within the Python troupe in
    this way provides an interesting insight into Gilliam’s aesthetic and his evolution
    as a filmmaker. It has been noted above, of course, that though less visually
