    attention to immorality as a logical consequence of belief systems and the practices
    of oppression they employ. *The Meaning of Life* resists acceptance of this consequence
    quite angrily, as the unravelling of most sketches in the film shows, but it also
    does not know how to redirect that frustration.


    In fact, the film cannot decide whether to offer a critique of cruelty or, as
    the flattening of the pirate ship/building implies, use it for its own purposes.
    It takes a detour, and then another one, and then another one, as if it drags,
    as Pier Paolo Pasolini puts it (in a critique of Calvino), ‘everything with itself
    in a completely illogical dimension that solves problems by diluting them infinitely,
    destroying them until they’re rotten and it’s their turn to be surreal’ (Pasolini
    1973: 121). This indecision makes shaky the philosophical foundation of *The Meaning
    of Life* (life happens, it moves to happiness, and structure is what we hold on
    to, to get there even if it brings some ‘necessary violence’ with it). Philosophically
    speaking, then, *The Meaning of Life* is unsteady. Its disbelief in a vast structure
    or worldview (or even worldviews, plural) makes it so it can only rely on morality.
    That morality is unmasked as suspicious, subordinate to influences that disguise
    it as coincidences but that, like towels and fish in *The Hitchhiker’s Guide to
    the Galaxy*, add up to as much of a structure as anything else – fragile at best.
    As the beginning of *The Meaning of Life* shows, fish’s navigation systems (or,
    in this case of tank fish, the lack thereof) are the only compass left. It offers
    only flow, not solid ground. But hopefully that flow drifts towards happiness.


    # THE ABSURD AND THE POETIC


    In its slide away from philosophy as a model, towards philosophy as flow, and
    even beyond that, beyond philosophy, *The Meaning of Life* makes what Jörg Aufenanger
    (1984: 159) has called, via Roland Barthes, a turn away from modelling, towards
    chronicling the myths of everyday life – but in an order that disrobes them rather
    than confirming them as building blocks for understanding life. Life is not meaningful
    as such but instead filled with rituals, and, as Graham Chapman’s character remarks
    in the segment called ‘The Miracle of Birth’, it is increasingly stocked with
    ‘apparatus’, equipment that goes ‘ping’, which seem to write their own myths.
    But these rituals do not explain anything. Instead, they show themselves to be
    accidental, contingent and morally empty. They are not good or bad, just nonsensical.
    As *The Meaning of Life* proceeds, this becomes abundantly visible. After the
    hospital scene in which a child is born, scenes of childhood and youth in a church
    and a school, in congregation, in sports are organised around rituals and for-the-sake
    procedures. In these, the Pythons puncture holes, first sparingly, then increasingly
    so. The frequency of interruptions mounts, and with few or no exceptions, segments
    end either again in dance and song, what Barbara Ehrenreich sees as the collective
    joy around'
