    wish to more formally address how this was achieved.


    ## ANIMATED COMEDY


    It is pertinent to further situate Gilliam’s work within a broader engagement
    with comedy in animation. Animation, of course, borrows from all comic idioms
    – vaudeville performance, silent film comedy, TV sitcom, genre parodies, etc.
    – but, equally, it offers its own distinctive possibilities as a visual medium
    (see Wells 1998: 127–86, 2013: 497–520; Goldmark and Keil 2011; Buchan 2013: 521–44).
    Inevitably, it also draws from a wider range of pictorial traditions – children’s
    illustration, the political cartoon, the comic book, fine art – but it takes on
    its own conditions by being rendered in animated form. Frank Thomas and Ollie
    Johnston, two of Disney’s ‘Nine Old Men’, the original animators who in essence
    first created and theorised the twelve principles of classical drawn animation,
    claimed that ‘[i]n animation the sight gag is a series of drawings depicting a
    funny bit of action that can induce a laugh as much from the way the situation
    is drawn as from the content of the joke’ (Thomas and Johnston 1987: 15). Gilliam,
    of course, is not working in drawn animation, but it is still clear that his *curation*
    of the still cut-out image and his manipulation of the image with scissors and
    paint invests it with situational narratives and possibilities. These are then
    made amusing as much from their composition (normally an *incongruity* from a
    repositioning of figures and objects in terms of context and expectation) as from
    the ways in which they are then made to move. Much of this manipulation in the
    service of the sight gag is often also resonant with symbolic or metaphoric meaning
    – in *The Holy Grail* (Terry Gilliam and Terry Jones, 1975), for example, Gilliam
    uses a vintage image of the long-bearded cricketer, W. G. Grace, as the face of
    God, a visual pun on the iconic bearded representation of God in many paintings,
    but also a play on the sportsman’s name and its pertinence to God-like qualities.


    These *associative relations* (see Wells 1998: 93–6) are at the heart of Gilliam’s
    representational approach to creating sight gags, and rarely rely on the kind
    of personality-based humour Disney was to specialise in. Rather, they are accumulating
    but related improvisations of visual incongruity that emerge from the suggestiveness
    of the image itself – for example, the top half of a man’s face is positioned
    as if it were part of a terrace of houses, his glasses reminiscent of the windows
    in a house. His glasses are then smashed in an act of vandalism, and his eyes
    plucked out as if they were objects stolen by a burglar. The associative quality
    here is seeing the man’s face as a house front because his glasses resemble windows
    and, as both glasses and windows can be broken, this is thereafter seen as the
    consequence of a break-in; as such, the things behind the windows – objects to
    steal – become the eyes once more that are actually behind the spectacles. In
    many senses, the narrative here takes longer to describe than actually perceive.
    Gilliam relies on a *visual literacy* in his audience that sees the signifying
    resemblances and affordances in the images that permit visual puns and metaphors.
    Gilliam loved early Disney films, and embraced the joke forms theorised and defined
    by the studio’s animators, i.e. the spot gag, the running gag, the action gag,
    ‘the funny drawing’, etc., but his main preoccupations became developments in
    what Thomas and Johnston called the ‘tableau gag’ and the ‘gag-that-builds’ (Thomas
    and Johnston 1987: 25–32).


    Thomas and Johnston note that


    > the tableau gag is a held picture at the end of an action, in which the character
    is left with a ridiculous appearance due to some foreign substance, or object
    having been placed on, around, over, or in the face or figure. (Thomas and Johnston
    1987: 30)


    The humour here essentially emerges from the stoic acceptance of humiliation of
    the character involved, especially if what the character has experienced has been
    the consequence of the excesses cartoon-animation can play out on a character.
    Crucially, in this instance, the *image* of the character is violated by the very
    plasticity of representing the body in cartoon animation, but the *character*
    itself is inviolate. Donald Duck can be crushed, pulled to extremes and battered
    with objects, but he remains ‘Donald Duck’. Whatever has occurred has happened
    to a known figure, and the ‘slapstick’ that has taken place results in the audience
    laughing at the character *in* the situation and the character’s reaction *to*
    the situation. Gilliam treats the tableau *as* a situation, and does not create
    characters in the conventional sense as visual ciphers that predominantly function
    in four ways: as a violation of the body or environment by *breaking it*, *entering
    it*, *consuming it*, or *altering it* – things Gilliam had done in his drawing,
    even as a child (The Pythons 2003: 58–9). Gilliam later suggests,


    > All I could do was crude, and crude things ended up being violent, somehow.
    Right from the beginning, the foot coming down and Wham! – you create something
    beautiful and then you crush it. A lot of them are about that. I was in that phase
    where I was smashing things and it was funny. That kind of violence always seemed
    very funny to me. It was also at a time when the world was very anti-violence
    because the war was on. (McCabe 1999: 35)


