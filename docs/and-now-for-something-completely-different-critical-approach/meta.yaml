    ## 结论


    尼尔·阿彻在其关于英国电影和电视中戏仿的著作中，直接面对了试图“解释”幽默这种棘手且常常抽象的事物的问题，尤其是在派森荒诞主义风格的情况下（Archer 2016:
    55）。在关于派森电影的章节开头，阿彻承认他担心“愚蠢”会被认为“某种程度上超出了分析范围”（同上），并主张对派森喜剧“常常复杂或引经据典的性质”进行“更深入的挖掘”（同上）。这正是我在本章中的目标，但我必须承认，任何试图通过派森作品进行单一路径分析的尝试，都注定会发现其中的复杂性和矛盾性，而非仅仅是启发性。一方面，我们有可能看到并听到派森的音乐和音乐引用，将其视为团队更广泛策略和关注点的体现。另一方面，派森的音乐提出了独特的解释挑战，因为其在节目、电影和专辑中最著名的例子，其后续影响远远超出了创作者的预期。根据《蒙提·派森如是说》中的记述，《永远看向生活光明面》很快就被军队采用——显然，在1983年福克兰群岛冲突中，当“谢菲尔德号”被飞鱼导弹击中时，船上的人员唱起了这首歌，海湾战争中的英国皇家空军飞行员也是如此（Morgan
    1999: 195）——这究竟是限制还是增强了它对某种常在其他地方被贬低的、爱国而坚忍的英国音乐的颠覆性解读？这如何与《坐在我脸上》、对《耶路撒冷》的反复破坏，或是对国歌（如《马赛曲》）的嘲弄（见于一个男人用藏在鼻子里的录音机表演的场景，第9集“蚂蚁，一个介绍”）相协调？无论如何，派森音乐复杂而持续的再语境化——歌曲和主题从一种媒介转移到另一种媒介，置于不同的叙事位置，或编织成新的形状和形式——对经典曲目的稳定性和参数提出了问题：例如，派森之前和之后的音乐努力都被纳入了回顾和精选集，而尼尔·英尼斯（曾一度）在与乐队巡演时表演他自己的作品。最后一个矛盾源于对派森文本和作者反思的仔细审视所证明的事实：团队在选择音乐主题和引用时，同时是轻率的、挑剔的、刻意的和含糊其辞的。借用他们第一张音乐精选专辑的标题来意译，蒙提·派森*歌唱*，但它也仔细聆听，并要求其观众和学者们也这样做。


