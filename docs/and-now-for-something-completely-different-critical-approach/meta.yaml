  mdcn: '一些受访者指出，他们与Python（尤其是*《布莱恩的一生》*）的接触影响了他们的世界观。对一位受访者而言，这部电影“让我重新思考自己的宗教信仰以及我们为何会相信”，而对另一位受访者来说，“我在美国南方的福音派浸信会家庭长大，从未接受过宗教。蒙提·派森是我遇到的第一个真正（且天真地）有趣地诠释耶稣故事的作品”（#3020
    美国人，36–45岁；#3564 美国人，36–45岁）。


    因此，在这些例子中，成为Python粉丝仍然是一种“锚定事件”，作为“一系列关于世界的持续信念的试金石”（Pillemer 1998: 65–83），这与许多受访者父亲所代表的第一代蒙提·派森粉丝一样，涉及对Python喜剧中反权威方面的投入。然而，与这些情况一样，这种投入可能导致受访者批评最初让他们接触Python的同一家庭和父亲背景。这些悖论和复杂性说明了详细关注人们对持久喜剧粉丝记忆的价值，特别是蒙提·派森所代表的那种持久、跨国、普遍、文化多元、多义和多媒体的喜剧。


    ## 结论


    在某些方面，本章讨论的与Python初次相遇的回忆似乎指向了杰弗里·温斯托克所指出的过程，这些过程影响了*《洛基恐怖秀》*的长期传播——通过“作为继承的成人仪式”的新地位，观看一部最初大胆且具有反文化色彩的文本的“必要性”从“亚文化需求转变为普遍文化要求”，从“前卫”行为变为平凡且“正常”的行为（Weinstock
    2007: 112–13）。在这方面，父亲鼓励女儿观看同样的剧集并体验他们年轻时初次遇到的相同乐趣，可能被视为阻碍和限制了这些女儿喜剧品味和幽默参与的形成。虽然本章分析的回忆在某种程度上支持这种解读，但有两个关键的话语趋势反复出现在回应中，说明了持久的喜剧消费如何能为“过去和现在的年轻人如何作为成长过程的一部分参与流行文化和媒体”（Kuhn
    2002: 238）提供新的视角，进而如何建立和维持跨越性别和代际的有意义的家庭关系。


    首先，对Python的投入作为许多女性受访者讨论和回忆的父女关系中（在许多情况下）唯一或主要元素的事实，为喜剧的社会用途和功能提供了一个新的代际视角，至关重要的是，吉塞琳·库珀斯的重要论点，即幽默主要是“一种嵌入社会关系中的交流形式”（Kuipers
    2015: 7）。尽管从当前回忆的角度看，Python的一些喜剧可能已过时，但Python作品的多样性和多义性（愚蠢但成人化、荒谬但具有社会批判性、不敬但富有哲理）显然使得引用和特定小品得以持久，并为这些受访者充当了交流的载体，在维持父女关系的同时，悖论性地通过强调女儿父亲作为独立个体的地位而超越了这些关系。其次，与温斯托克关于年轻一代接受像*《洛基恐怖秀》*这样的文本与“越界个性”的主张关系不大（Weinstock
    2007: 111）的论点相反，在本章讨论的例子中，对Python的参与使受访者能够拥抱自己作为不同、独特或在不同环境中区别于其性别或同龄群体的感觉，并在其他情况下，就Python的反权威或社会批判方面，批判性地评估和反思他们自身社会世界和家庭背景的方面。


    在这些方面，这种跨性别的代际Python粉丝形式，可以说，与其说是将女儿纳入老一代喜剧品味的一种同化形式，不如说是以不同方式使这些受访者能够“扩展自我体验”和关于他们自身、家庭和社会关系以及他们看待世界方式的“知识”（Hills
    2014: 11），既幽默又批判性的持续文本接触。


