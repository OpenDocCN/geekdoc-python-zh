    2014: 81）。1960年代兴起的讽刺热潮及其对权威人物和英国机构直言不讳（尽管模棱两可）的嘲弄，常被视为“‘摇摆六十年代’的先声，紧随1960年《查泰莱夫人的情人》审判带来的审查制度放松之后到来”（沃德
    2001: 92），同时也是“战后英国社会主流价值观深刻变革的象征”（同上：91），这种变革受到了英国在后帝国时代持续寻求其世界地位的影响。相关的艺术表达方式的解放（自由诗、音乐实验与即兴创作）也在《飞行马戏团》中得到了讽刺性的体现：在《诗人麦克蒂格尔》小品（第16集，《似曾相识》）中，那位同名的、永远身无分文的苏格兰诗人“借我们一镑”，以及随后接受采访的穿着高领毛衣的剧作家，都讽刺性地唤起了垮掉的一代以及情境主义将日常生活与艺术融合的理念。


    ## “首先，大卫·霍克尼要来设计炸弹”：《蒙提·派森的飞行马戏团》、1960年代末与反文化


    如前所述，社会动荡在美国和欧洲都达到了新的程度（例如1968年巴黎学生抗议及其激进的“马克思、毛泽东、马尔库塞”口号 [邓肯 2013: 149]）。双方越来越多地诉诸暴力行为，也暴露了那个时代更具破坏性的一面，从而表明“和平与爱的文化也是一种对抗与冲突的文化”（米勒
    2011: 87）。《飞行马戏团》系列同样凸显了1960年代和反文化的矛盾本质：它明确提及了如马龙·白兰度主演的、饰演看似反抗一切的矛盾摩托车帮领袖约翰尼的《飞车党》（拉兹洛·本尼迪克，1953）（第10集，《无题》），林赛·安德森充满1968年气息的《如果……》——特别强调其暴力的结局——或是约翰·施辛格忧郁的《午夜牛郎》（1969）（均为第19集，《这是生活》）。此外，它还隐晦地影射了“摇摆伦敦”那臭名昭著却又迷人、将犯罪与流行文化融为一体的黑帮二人组克雷兄弟（“食人鱼兄弟”），或是俏皮地将其第二集命名为《性与暴力》。《二十世纪田鼠》小品（第6集，《这是艺术》）不仅嘲讽了当时由法国新浪潮倡导者所推崇的、作为具有独特视野的个人主义作者的电影制作人观念，也明确揭露了好莱坞电影业阴暗、腐败的一面。在英国语境下，这也影射了1960年代苏活区与性和电影的关联（见哈利根
    2003: 60）。制片人（查普曼）提出的电影构想也反映了不断变化的道德观念，他将典型的美国夫妇——温和浪漫喜剧中的多丽丝·戴和洛克·哈德森，他们仍植根于1950年代核心郊区家庭的理想——与更自由、更具实验性的“摇摆六十年代”心态并置：“这是一个爱情故事。性爱。意大利风格。大卫·海明斯饰演一个嬉皮士盖世太保军官。正面裸体。一部家庭电影。”对“摇摆六十年代”偶像大卫·海明斯和“意大利风格”做爱的提及，既玩味了“摇摆伦敦”所暗示的宽容，也玩味了欧洲电影中对性越来越不加掩饰的描绘。一方面，像《亲爱的》（约翰·施辛格，1965）、《快乐女孩》（格里·奥哈拉，1965）、《阿尔菲》（刘易斯·吉尔伯特，1966）、米开朗基罗·安东尼奥尼的《放大》（1966）（其中海明斯饰演了如今标志性的时尚摄影师角色）、《我们绕着桑树转》（克里夫·唐纳，1968）或《可触碰者》（罗伯特·弗里曼，1968）这样的英国电影，展现了这种奇特的心态；但另一方面，它们“并非简单地颂扬自由、肤浅、流行文化和富裕”（勒基特
    2000: 233）。相反，它们有时也“唤起了对摇摆伦敦时代精神一种特别阴郁的想象”（同上）。


    不足为奇的是，宽容和俏皮的淘气言论也在《飞行马戏团》系列中占据重要地位：无论是《婚姻指导顾问》小品（第2集，《性与暴力》），《推推搡搡》小品（第3集，《如何从很远的地方辨认不同种类的树》），埃里克·艾德尔饰演的茶点室主持人肯尼·勒斯特（第9集，《蚂蚁导论》），淘气的化学家们（第17集，《巴兹·奥尔德林秀》），那场几乎演变成“思想非常开放”的1960年代狄俄尼索斯式爱情集会的浪漫约会（甚至包括佩林抱着一只让人联想到萨堤尔的山羊）（第9集，《蚂蚁导论》），艾德尔饰演的、与他的公社一起生活在佩林角色体内的时髦、慵懒的嬉皮士（第13集，《中场休息》），多次婚姻和群居生活（“他们都结了婚，在达利奇附近的一个政府廉租屋里过得相当好”；第19集，《这是生活》），或是那位非常迷恋的影子部长和他的腊肠犬（第20集，《阿提拉·匈人秀》）。宽容社会也经常被直接提及和讨论，无论是通过访谈、脱口秀还是投诉信。


    阶级斗争同样被反复提及：著名的“上流社会蠢货”小品（第12集，《裸体蚂蚁》）嘲弄了统治阶级的宏大妄想和特权，而“社会中的白痴”小品（第20集，《阿提拉·匈人秀》）则处理了城市居民对农村社区的偏见、关于落后的陈词滥调，以及乡下人对自己同类的各种刻板印象。代际冲突则通过老一辈、自学成才的乡村白痴对他们受过大学教育的子女的怀疑态度被推到前台——这些子女获得了东安格利亚大学颁发的“白痴学”文凭——而这种教育是战后社会变革所促成的。在《街头采访谈政客》小品（第21集，《今日考古学》）中，讽刺性地将与摇滚乐过度放纵的享乐主义领域相关的忠实追星族生活方式应用于据称体面却丑闻缠身的政治领域，受访的父母同样表达了对他们误入歧途、崇尚嬉皮士美学、离家出走并痴迷追随政客的孩子们的失望。与此同时，与伦敦精英阶层相关的特权教养（伊顿公学、桑赫斯特皇家军事学院、牛津剑桥、父母要么是银行家、贵族要么从政）也受到了嘲弄。例如，彼得·梅达克1972年的喜剧《统治阶级》就采用了类似的讽刺手法：它通过其患有精神分裂症的主角（彼得·奥图尔）来嘲弄贵族，该主角成为格尼伯爵十四世，相信自己是耶稣的转世，随后又经历了一次——尽管是电击诱发的——从热爱自然的和平嬉皮士“基督”到痴迷于折磨的开膛手杰克的蜕变。


    在爱之夏、迷幻集会以及相关的“开启、融入、退出”心态（见证了海德公园的公众爱情集会）两年后，以及伍德斯托克音乐节几个月后，阿尔塔蒙特免费音乐会及其暴力结局同样凸显了反文化阴暗的一面。除此之外，披头士乐队的解散以及“27俱乐部”的扩大——布莱恩·琼斯、吉米·亨德里克斯、贾尼斯·乔普林和吉姆·莫里森在1969年至1971年间相继去世——标志着青年反文化中残存的任何“纯真”的终结。（盖尔
    2007: 9）'
