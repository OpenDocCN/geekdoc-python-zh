  md: '# Exercise 2


    Given of input a positive integer n. If n is even, the algorithm divides it by
    two, and if n is odd, the algorithm multiplies it by three and adds one. The algorithm
    repeats this, until n is one. For example, the sequence for n=5 is as follows:

    5→16→8→4→21

    Your task is to simulate the execution of the algorithm for a given value of n.


    # Input


    The only input line contains an positive integer n.


    # Output


    Print a line that contains all values of n separated with spaces.


    # Example


    # Input


    5


    # Output


    5 16 8 4 21'
  merge: -1
  pgno: 5
- img_proc: true
  md: '# Solution


    To solve this task, a cycle is used to verify that the number is not yet 1. Within
    the cycle it is checked if the number is even, it is divided by two, otherwise
    the number is multiplied by 3 and 1 is added to it. the number is printed, like
    this until the number is 1.


    The code for the solution written in Python is shown below.


    ```

    1 n = int(input())

    2 print(n, end='' '')

    3 while n > 1:

    4     if n % 2 == 0:

    5         n //= 2

    6     else:

    7         n = 3 * n + 1

    8     print(n, end='' '')

    ```


    # Desktop Testing


    Doing a desktop testing, it shows if the number is odd or even and the operation
    is performed.


    | Operation | n | Even or odd |

    | :--- | :--- | :--- |

    | | 5 | odd |

    | 3 * n + 1 | 16 | odd |

    | 3 * n + 1 | 8 | even |

    | n // 2 | 4 | even |

    | n // 2 | 2 | even |

    | n // 2 | 1 | |'
