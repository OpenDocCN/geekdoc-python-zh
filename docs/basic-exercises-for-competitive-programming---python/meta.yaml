  md: '# Solution


    To solve this task, to obtain each one of the ways in which they can be displaced
    if they are attacked first, the integer ''n'' is stored. For each ''k'' (length
    of the matrix) up to ''n + 1'' starting at 1, ''a1'' stores the total number of
    cells on the board, ''a2'' stores the total amount in which they can move around
    the board. At the time the board is 3 or more, if two knights attack each other,
    they will be in a 2 * 3 rectangle or a 3 * 2 rectangle. So the number of ways
    to place them is (n-1) * (n-2) + (n-2) * (n-1). The total ways to position the
    knight to attack each other will be 2 * 2 * (n-1) * (n-2) = 4 * (n-1) * (n-2).
    This operation must be subtracted from the total movements of both knights, you
    get the amount of movements they can make without attacking.


    The code for the solution written in Python is shown below.


    ```

    1 n = int(input())

    2 for k in range(1, n + 1):

    3     a1 = k * k

    4     a2 = a1 * (a1 - 1) // 2

    5     if k > 2:

    6         a2 -= 4 * (k - 1) * (k - 2)

    7     print(a2)

    ```'
