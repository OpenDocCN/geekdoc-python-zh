  - '[PAGE 13]


    # Solution


    To solve this task, an efficient way to know which number is the most repeated
    is to use variables that help us in the process. In this case, ''k'' is used to
    determine how much a number is repeated, ''i'' saves the previous index, ''j''
    saves the current index and ''v'' stores the number that is repeated the most
    sequentially.


    At the beginning of the cycle, the previous and current values are compared, if
    they are different, the indices are exchanged. The index ''j'' increases and is
    compared if the numbers that are repeated is greater than ''k'', if so, ''v''
    takes the value of the number and ''k'' takes the value of how much that number
    was repeated.


    The code for the solution written in Python is shown below.


    ```

    1 A = list(map(int, input().split()))

    2

    3 v = A[0]

    4 k = 1

    5 i = 0

    6 j = 1

    7 while j < len(A):

    8     if A[j] != A[i]:

    9         i = j

    10    j += 1

    11    if j - i > k:

    12        v = A[i]

    13        k = j - i

    14

    15 print(v)

    ```'
