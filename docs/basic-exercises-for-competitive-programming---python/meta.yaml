- img_proc: true
  md: '# Solution


    To solve this task, a recursive method will be used, the function calls itself.
    For each function call, a stack is used to store the numbers to print them later,
    ''remainder'' is responsible for printing the complete stack when the number has
    been reached, otherwise it will call the function again to complete it, '' limit
    ''is in charge of adding numbers to the stack has control of the cycle, each time
    it ends it returns the recursion to the previous call.


    The code for the solution in Python written is shown below.


    ```

    1 def partition(n, limit, P):

    2     while limit > 0:

    3         P.append(limit)

    4         remainder = n - limit

    5         if remainder > limit:

    6             partition(remainder, limit, P)

    7         else:

    8             if remainder == 0:

    9                 for n in P:

    10                    print(n,end='' '')

    11                print()

    12            else:

    13                partition(remainder, remainder, P)

    14        del P[-1]

    15        limit -= 1

    16

    17 N = int(input())

    18

    19 partition(N, N, [])

    ```'
