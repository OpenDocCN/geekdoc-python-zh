    | Method start s = ''2'' n = -4 | | | | | | |

    | ''2'' | -4 | | | | | None |

    | End of method s = ''2'' n = -4 | | | | | | |

    | Method start s = ''2'' n = 2 | | | | | | |

    | ''2'' | 2 | | | | | None |

    | End of method s = ''2'' n = 2 | | | | | | |

    | | | | | | | ''+2'' |

    | End of method s = ''32'' n = -1 | | | | | | |

    | | | | | | | ''-3+2'' |

    | End of method s = ''132'' n = 0 | | | | | | |

    | | | | | | | ''+1-3+2'' |'
