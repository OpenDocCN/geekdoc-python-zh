- md: "## Solution\n\nTo solve this task, a recursive method is used to traverse the\
    \ string to find the appropriate sign. It has conditions to be able to exit the\
    \ method for when the recursion occurs. A cycle is started where 'front', 'back'\
    \ and 'target' are extracted, in this way the method is called recursively, returning\
    \ the part of the string with the corresponding sign.\n\nThe code for the solution\
    \ written in Python is shown below.\n\n```python\ndef solve(s, n):\n    v = int(s)\n\
    \    if v == n:\n        return '+' + s\n\n    if v == -n:\n        return '-'\
    \ + s\n\n    if v < abs(n):\n        return None\n\n    for i in range(1, len(s)):\n\
    \        front = s[0:i]\n        back = s[i:]\n        target = int(front)\n \
    \       back_solution = solve(back, n-target)\n        if back_solution != None:\n\
    \            return '+' + front + back_solution\n        back_solution = solve(back,\
    \ n+target)\n        if back_solution != None:\n            return '-' + front\
    \ + back_solution\n    return None\n\nprint(solve(input(), 0))\n```\n\n## Desktop\
