  - '[PAGE 65]


    # Solution


    To solve this task, each of the lines is read and stored in a dictionary to count
    the frequency. The variable ''min_v'' is used to save the lowest frequency and
    ''min_len_word'' to save the word of shortest length. By containing the value
    ''None'' they start with the first values of the dictionary, otherwise if the
    value is less than ''min_v'' the word and value are replaced, finally if the length
    is the same but the length of the word is less than ''min_len_word'', it is replaced.


    The code for the solution written in Python is shown below.


    ```

    1 D = {}

    2 n = int(input())

    3 for w in range(n):

    4     w = input().strip()

    5     if w in D:

    6         D[w] += 1

    7     else:

    8         D[w] = 1

    9

    10 min_v = None

    11 min_len_word = None

    12 for k,v in D.items():

    13     if min_v == None:

    14         min_v = v

    15         min_len_word = k

    16     elif v < min_v:

    17         min_v = v

    18         min_len_word = k

    19     elif v == min_v and len(k) < len(min_len_word):

    20         min_len_word = k

    21

    22 print(min_len_word)

    ```'
