    # Solution


    To solve this task, the integer n is saved. Then the integer line is saved. A
    sum is initialized, each integer is added. At the end, the Gauss sum formula is
    used: n * (n + 1) / 2. The previously made sum is subtracte it to obtain the missing
    number. This works because the Gauss sum gets the real total sum based on the
    total of numbers, if the sum of the provided numbers is subtracted, the result
    will show the missing value to get the real total sum.


    The code for the solution written in Python is shown below.


    ```

    1 n = int(input())

    2 arr = map(int, input().split())

    3 s = 0

    4

    5 for a in arr:

    6     s += a

    7

    8 print(n * (n + 1) // 2 - s)

    ```


