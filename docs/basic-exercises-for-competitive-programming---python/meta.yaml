    previous number to the greater is saved by itself. If `z` is odd, and `x` is the
    highest, it will suffice to add `y` to `z2`, otherwise double `z` minus x is added
    to `z2`. If `z` is even, and `y` is the highest, just add `x` to `z2`, otherwise
