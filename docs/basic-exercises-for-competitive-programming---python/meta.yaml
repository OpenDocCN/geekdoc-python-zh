    \ written in Python is shown below.\n\n```\n1 def solve(s, n):\n2     v = int(s)\n\
    3     if v == n:\n4         return '+' + s\n5 \n6     if v == -n:\n7         return\
    \ '-' + s\n8 \n9     if v < abs(n):\n10        return None\n11 \n12    for i in\
    \ range(1, len(s)):\n13        front = s[0:i]\n14        back = s[i:]\n15    \
    \    target = int(front)\n16        back_solution = solve(back, n-target)\n17\
    \        if back_solution != None:\n18            return '+' + front + back_solution\n\
    19        back_solution = solve(back, n+target)\n20        if back_solution !=\
    \ None:\n21            return '-' + front + back_solution\n22    return None\n\
    23 \n24 print(solve(input(), 0))\n```"
