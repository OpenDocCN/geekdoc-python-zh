  - '[PAGE 59]


    # Solution


    To solve this task, use the `itertools` library using the `combinations` method.
    The first for controls the length of each set, while the second goes through each
    possible combination looking for the smallest difference between the two sets.
    First `w1` calculates the sum of the set and `w2` subtracts the sum of the weights,
    if the difference of both is less than `ans`, it is substituted, it continues
    until the smallest possible difference is found.


    The code for the solution written in Python is shown below.


    ```

    1 from itertools import combinations

    2 n = int(input())

    3 weights = [int(i) for i in input().split()]

    4 ans = sum(weights)

    5 for i in range(1,n):

    6     for comb in combinations(weights,i):

    7         w1 = sum(comb)

    8         w2 = sum(weights)-sum(comb)

    9         if abs(w2-w1)<ans:

    10            ans = abs(w2-w1)

    11 print(ans)

    ```'
