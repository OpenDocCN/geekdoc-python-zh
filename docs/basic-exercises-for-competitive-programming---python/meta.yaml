- md: "# Basic Exercises for Competitive Programming - Python\n\nJan Pol\n\n![](img/0565e03b7dbde868c225ca5888b5ab10_0_0.png)\n\
    \nThe following book shows a compilation of more than 20 basic exercises for competitive\
    \ programming, all of them are written in Python. In addition, desktop tests are\
    \ added to observe the operation of each algorithm.\n\nHoping you can take knowledge\
    \ of the pages of this book, my best wishes.\n\nJan Pol\n\n## Exercise 1\n\nWrite\
    \ a program that reads a string S, and prints that line on the standard output\
    \ in reverse, that is, flipped right-to-left.\n\n### Input\n\nThe only input has\
    \ a string S.\n\n### Output\n\nPrint the string in reverse.\n\n### Example\n\n\
    #### Input\n\n```\n1 2 3 hello\n```\n\n#### Output\n\n```\nolleh 3 2 1\n```\n\n\
    ## Solution\n\nOne way to easily solve this task is to use a loop to print the\
    \ characters from the last position to the first. This avoids the need to save\
    \ the reverse list, just print each character.\n\nThe code for the solution written\
    \ in Python is shown below.\n\n```python\nl = input()\ni = len(l)\nwhile i > 0:\n\
    \    i = i - 1\n    print(l[i], end='')\nprint()\n```\n\n### Desktop Testing\n\
    \nDoing a desktop testing, it is observed how in each iteration each character\
    \ is added inversely.\n\n| l | i | print |\n|---|---|---|\n| 1 2 3 hello | 11\
    \ | |\n| | 10 | o |\n| | 9 | ol |\n| | 8 | oll |\n| | 7 | olle |\n| | 6 | olleh\
    \ |\n| | 5 | olleh |\n| | 4 | olleh 3 |\n| | 3 | olleh 3 |\n| | 2 | olleh 3 2\
    \ |\n| | 1 | olleh 3 2 |\n| | 1 | olleh 3 2 1 |\n\n## Exercise 2\n\nGiven of input\
    \ a positive integer n. If n is even, the algorithm divides it by two, and if\
    \ n is odd, the algorithm multiplies it by three and adds one. The algorithm repeats\
    \ this, until n is one. For example, the sequence for n=5 is as follows:\n5→16→8→4→2→1\n\
    Your task is to simulate the execution of the algorithm for a given value of n.\n\
    \n### Input\n\nThe only input line contains a positive integer n.\n\n### Output\n\
    \nPrint a line that contains all values of n separated with spaces.\n\n### Example\n\
    \n#### Input\n\n```\n5\n```\n\n#### Output\n\n```\n5 16 8 4 2 1\n```\n\n## Solution\n\
    \nTo solve this task, a cycle is used to verify that the number is not yet 1.\
    \ Within the cycle it is checked if the number is even, it is divided by two,\
    \ otherwise the number is multiplied by 3 and 1 is added to it. The number is\
    \ printed, like this until the number is 1.\n\nThe code for the solution written\
    \ in Python is shown below.\n\n```python\nn = int(input())\nprint(n, end=' ')\n\
    while n > 1:\n    if n % 2 == 0:\n        n //= 2\n    else:\n        n = 3 *\
    \ n + 1\n    print(n, end=' ')\n```\n\n### Desktop Testing\n\nDoing a desktop\
    \ testing, it shows if the number is odd or even and the operation is performed.\n\
    \n| Operation | n | Even or odd |\n| :--- | :--- | :--- |\n| | 5 | odd |\n| 3\
    \ * n + 1 | 16 | even |\n| n // 2 | 8 | even |\n| n // 2 | 4 | even |\n| n //\
    \ 2 | 2 | even |\n| n // 2 | 1 | |\n\n## Exercise 3\n\nWrite a program that reads\
    \ a list of non-negative numbers from the standard input, with one number per\
    \ line, and prints a histogram corresponding to those numbers. In this histogram,\
    \ each number N is represented by a line of N characters \"#\".\n\n### Input\n\
    \nThe only line contains n non-negative integers.\n\n### Output\n\nPrint the histogram\
    \ result.\n\n### Example\n\n#### Input\n\n```\n10 15 7 9 1 3\n```\n\n#### Output\n\
    \n```\n##########\n###############\n#######\n#########\n#\n###\n```\n\n## Solution\n\
    \nTo solve this task, it is taken into account that a list of non-negative integers\
    \ will be received so that they are saved using a “map” of integers for the input,\
    \ removing the spaces. Then '#' is printed as many times as the value of the number.\n\
    \nThe code for the solution written in Python is shown below.\n\n```python\narr\
    \ = map(int, input().split())\n\nfor a in arr:\n    print('#' * a)\n```\n\n###\
    \ Desktop Testing\n\nDoing a desktop testing, it is shown how in the next line\
    \ of each iteration as many '#' as the value of the number are added.\n\n| arr\
    \ | a | print |\n|---|---|---|\n| 10 15 7 9 1 3 | 10 | ########## |\n| | 15 |\
    \ ############### |\n| | 7 | ####### |\n| | 9 | ######### |\n| | 1 | # |\n| |\
    \ 3 | ### |\n\n## Exercise 4\n\nYou are given all numbers between 1,2,...,n except\
    \ one. Your task is to find the missing number.\n\n### Input\n\nThe first input\
    \ line contains an integer n.\n\nThe second line contains n−1 numbers. Each number\
    \ is distinct and between 1 and n (inclusive).\n\n### Output\n\nPrint the missing\
    \ number.\n\n### Example\n\n#### Input\n\n```\n10\n2 8 10 6 5 1 3 7 4\n```\n\n\
    #### Output\n\n```\n9\n```\n\n## Solution\n\nTo solve this task, the integer n\
    \ is saved. Then the integer line is saved. A sum is initialized, each integer\
    \ is added. At the end, the Gauss sum formula is used: n * (n + 1) / 2. The previously\
    \ made sum is subtracted to obtain the missing number. This works because the\
    \ Gauss sum gets the real total sum based on the total of numbers, if the sum\
    \ of the provided numbers is subtracted, the result will show the missing value\
    \ to get the real total sum.\n\nThe code for the solution written in Python is\
    \ shown below.\n\n```python\nn = int(input())\narr = map(int, input().split())\n\
    s = 0\n\nfor a in arr:\n    s += a\n\nprint(n * (n + 1) // 2 - s)\n```\n\n###\
    \ Desktop Testing\n\nDoing a desktop testing, it is shown how in each iteration\
    \ the respective number is added. At the end the operation is printed.\n\n| n\
    \ | s | a |\n|---|---|---|\n| 10 | 0 | |\n| | 0 | 2 |\n| | 2 | 8 |\n| | 10 | 10\
    \ |\n| | 20 | 6 |\n| | 26 | 5 |\n| | 31 | 1 |\n| | 32 | 3 |\n| | 35 | 7 |\n| |\
    \ 42 | 4 |\n| | 46 | |\n\nThe final result is:\n\n```\n10 * (10 + 1) // 2 - 46\n\
    10 * 11 // 2 - 46\n110 // 2 - 46\n55 - 46\n```\n\nResult: 9\n\n## Exercise 5\n\
    \nGiven a sequence of integers A, a maximal identical sequence is a sequence of\
    \ adjacent identical values of maximal length k. Write a program that reads an\
    \ input sequence A, with one or more numbers per line, and outputs the value of\
    \ the first (leftmost) maximal identical sequence in A.\n\n### Input\n\nThe first\
    \ input line contains an integer n.\nThe second line contains n integers.\n\n\
    ### Output\n\nPrint one integer: the length of the longest repetition.\n\n###\
    \ Example\n\n#### Input\n\n```\n2 4 6 2 2\n```\n\n#### Output\n\n```\n2\n```\n\
    \n## Solution\n\nTo solve this task, an efficient way to know which number is\
    \ the most repeated is to use variables that help us in the process. In this case,\
    \ 'k' is used to determine how much a number is repeated, 'i' saves the previous\
    \ index, 'j' saves the current index and 'v' stores the number that is repeated\
    \ the most sequentially.\n\nAt the beginning of the cycle, the previous and current\
    \ values are compared, if they are different, the indices are exchanged. The index\
    \ 'j' increases and is compared if the numbers that are repeated is greater than\
    \ 'k', if so, 'v' takes the value of the number and 'k' takes the value of how\
    \ much that number was repeated.\n\nThe code for the solution written in Python\
    \ is shown below.\n\n```python\nA = list(map(int, input().split()))\n\nv = A[0]\n\
    k = 1\ni = 0\nj = 1\nwhile j < len(A):\n    if A[j] != A[i]:\n        i = j\n\
    \    j += 1\n    if j - i > k:\n        v = A[i]\n        k = j - i\n\nprint(v)\n\
    ```\n\n### Desktop Testing\n\nDoing a desktop testing, it is observed how in each\
    \ cycle the previous number and the current number are compared, as well as the\
    \ increase or exchange in the indexes according to whether the sequential number\
    \ is different. When the numbers compared are equal, the index 'j' increases more\
    \ than the 'i', when not, the indexes go hand in hand.\n\nBelow is the sequence\
    \ of integers 'A' and the desk test.\n\nA: 2 4 6 2 2\n\n| v | A[j] | A[i] | k\
    \ | i | j |\n|---|---|---|---|---|---|\n| 2 | | | 1 | 0 | 1 |\n| | 4 | 2 | | 1\
    \ | 0 |\n| | | | | | 1 |\n| | 4 | 4 | | | 2 |\n| | 6 | 4 | | 2 | 1 |\n| | | |\
    \ | | 2 |\n| | 6 | 6 | | | 3 |\n| | 2 | 6 | | 3 | 2 |\n| | | | | | 3 |\n| | 2\
    \ | 2 | | | 4 |\n| | 2 | 2 | | | 5 |\n| 2 | | | 2 | | |\n\n## Exercise 6\n\nYou\
    \ are given a DNA sequence: a string consisting of characters A, C, G, and T.\
    \ Your task is to find the longest repetition in the sequence. This is a maximum-length\
    \ substring containing only one type of character.\n\n### Input\n\nThe only input\
    \ line contains a string of n characters.\n\n### Output\n\nPrint one integer:\
    \ the length of the longest repetition.\n\n### Example\n\n#### Input\n\n```\n\
    ATTGCCCA\n```\n\n#### Output\n\n```\n3\n```"
  mdcn: "# 竞赛编程基础练习 - Python\n\nJan Pol\n\n![](img/0565e03b7dbde868c225ca5888b5ab10_0_0.png)\n\
    \n以下书籍展示了超过20个竞赛编程基础练习的汇编，所有练习均使用Python编写。此外，还添加了桌面测试以观察每个算法的运行过程。\n\n希望你能从本书的页面中获取知识，致以我最美好的祝愿。\n\
    \nJan Pol\n\n## 练习 1\n\n编写一个程序，读取一个字符串 S，并在标准输出中以相反的顺序（即从右到左翻转）打印该行。\n\n### 输入\n\
    \n唯一的输入是一个字符串 S。\n\n### 输出\n\n以相反的顺序打印字符串。\n\n### 示例\n\n#### 输入\n\n```\n1 2 3\
    \ hello\n```\n\n#### 输出\n\n```\nolleh 3 2 1\n```\n\n## 解决方案\n\n解决此任务的一种简单方法是使用循环从最后一个位置到第一个位置打印字符。这避免了保存反转列表的需要，只需打印每个字符即可。\n\
    \n用Python编写的解决方案代码如下所示。\n\n```python\nl = input()\ni = len(l)\nwhile i > 0:\n\
    \    i = i - 1\n    print(l[i], end='')\nprint()\n```\n\n### 桌面测试\n\n进行桌面测试时，可以观察到在每次迭代中，每个字符是如何反向添加的。\n\
    \n| l | i | print |\n|---|---|---|\n| 1 2 3 hello | 11 | |\n| | 10 | o |\n| |\
    \ 9 | ol |\n| | 8 | oll |\n| | 7 | olle |\n| | 6 | olleh |\n| | 5 | olleh |\n\
    | | 4 | olleh 3 |\n| | 3 | olleh 3 |\n| | 2 | olleh 3 2 |\n| | 1 | olleh 3 2 |\n\
    | | 1 | olleh 3 2 1 |\n\n## 练习 2\n\n给定一个正整数 n 作为输入。如果 n 是偶数，算法将其除以二；如果 n 是奇数，算法将其乘以三并加一。算法重复此过程，直到\
    \ n 等于一。例如，当 n=5 时，序列如下：\n5→16→8→4→2→1\n你的任务是模拟算法对给定值 n 的执行过程。\n\n### 输入\n\n唯一的输入行包含一个正整数\
    \ n。\n\n### 输出\n\n打印一行，包含所有用空格分隔的 n 值。\n\n### 示例\n\n#### 输入\n\n```\n5\n```\n\n\
    #### 输出\n\n```\n5 16 8 4 2 1\n```\n\n## 解决方案\n\n为了解决此任务，使用一个循环来验证数字是否尚未为1。在循环内，检查数字是否为偶数，如果是，则除以二；否则，将数字乘以3并加1。打印数字，如此重复直到数字为1。\n\
    \n用Python编写的解决方案代码如下所示。\n\n```python\nn = int(input())\nprint(n, end=' ')\nwhile\
    \ n > 1:\n    if n % 2 == 0:\n        n //= 2\n    else:\n        n = 3 * n +\
    \ 1\n    print(n, end=' ')\n```\n\n### 桌面测试\n\n进行桌面测试时，它显示了数字是奇数还是偶数以及执行的操作。\n\
    \n| Operation | n | Even or odd |\n| :--- | :--- | :--- |\n| | 5 | odd |\n| 3\
    \ * n + 1 | 16 | even |\n| n // 2 | 8 | even |\n| n // 2 | 4 | even |\n| n //\
    \ 2 | 2 | even |\n| n // 2 | 1 | |\n\n## 练习 3\n\n编写一个程序，从标准输入读取一个非负数字列表（每行一个数字），并打印与这些数字对应的直方图。在此直方图中，每个数字\
    \ N 由一行 N 个字符 \"#\" 表示。\n\n### 输入\n\n唯一的行包含 n 个非负整数。\n\n### 输出\n\n打印直方图结果。\n\n\
    ### 示例\n\n#### 输入\n\n```\n10 15 7 9 1 3\n```\n\n#### 输出\n\n```\n##########\n###############\n\
    #######\n#########\n#\n###\n```\n\n## 解决方案\n\n为了解决此任务，考虑到将接收一个非负整数列表，因此使用整数的“map”来保存输入，去除空格。然后，根据数字的值打印相应次数的\
    \ '#'。\n\n用Python编写的解决方案代码如下所示。\n\n```python\narr = map(int, input().split())\n\
    \nfor a in arr:\n    print('#' * a)\n```\n\n### 桌面测试\n\n进行桌面测试时，它显示了在每次迭代的下一行中，如何根据数字的值添加相应数量的\
    \ '#'。\n\n| arr | a | print |\n|---|---|---|\n| 10 15 7 9 1 3 | 10 | ##########\
    \ |\n| | 15 | ############### |\n| | 7 | ####### |\n| | 9 | ######### |\n| | 1\
    \ | # |\n| | 3 | ### |\n\n## 练习 4\n\n给定从1,2,...,n中除一个之外的所有数字。你的任务是找出缺失的数字。\n\n\
    ### 输入\n\n第一行输入包含一个整数 n。\n第二行包含 n−1 个数字。每个数字都是唯一的，且在1到n之间（包含1和n）。\n\n### 输出\n\n\
    打印缺失的数字。\n\n### 示例\n\n#### 输入\n\n```\n10\n2 8 10 6 5 1 3 7 4\n```\n\n#### 输出\n\
    \n```\n9\n```\n\n## 解决方案\n\n为了解决此任务，首先保存整数 n。然后保存整数行。初始化一个和，将每个整数相加。最后，使用高斯求和公式：n\
    \ * (n + 1) / 2。减去之前计算的和，即可得到缺失的数字。这是可行的，因为高斯求和根据数字总数得到真实的总和，如果减去所提供数字的和，结果将显示缺失的值，从而得到真实的总和。\n\
    \n用Python编写的解决方案代码如下所示。\n\n```python\nn = int(input())\narr = map(int, input().split())\n\
    s = 0\n\nfor a in arr:\n    s += a\n\nprint(n * (n + 1) // 2 - s)\n```\n\n###\
    \ 桌面测试\n\n进行桌面测试时，它显示了在每次迭代中如何添加相应的数字。最后打印操作结果。\n\n| n | s | a |\n|---|---|---|\n\
    | 10 | 0 | |\n| | 0 | 2 |\n| | 2 | 8 |\n| | 10 | 10 |\n| | 20 | 6 |\n| | 26 |\
    \ 5 |\n| | 31 | 1 |\n| | 32 | 3 |\n| | 35 | 7 |\n| | 42 | 4 |\n| | 46 | |\n\n\
    最终结果是：\n\n```\n10 * (10 + 1) // 2 - 46\n10 * 11 // 2 - 46\n110 // 2 - 46\n55 -\
    \ 46\n```\n\n结果：9\n\n## 练习 5\n\n给定一个整数序列 A，一个最大相同序列是具有最大长度 k 的相邻相同值的序列。编写一个程序，读取一个输入序列\
    \ A（每行一个或多个数字），并输出 A 中第一个（最左边的）最大相同序列的值。\n\n### 输入\n\n第一行输入包含一个整数 n。\n第二行包含 n\
    \ 个整数。\n\n### 输出\n\n打印一个整数：最长重复的长度。\n\n### 示例\n\n#### 输入\n\n```\n2 4 6 2 2\n```\n\
    \n#### 输出\n\n```\n2\n```\n\n## 解决方案\n\n为了解决此任务，了解哪个数字重复次数最多的一种有效方法是使用变量来帮助我们完成过程。在这种情况下，使用\
    \ 'k' 来确定一个数字重复了多少次，'i' 保存前一个索引，'j' 保存当前索引，'v' 存储顺序重复最多的数字。\n\n在循环开始时，比较前一个值和当前值，如果不同，则交换索引。索引\
    \ 'j' 增加，并比较重复的数字是否大于 'k'，如果是，则 'v' 取该数字的值，'k' 取该数字重复的次数。\n\n用Python编写的解决方案代码如下所示。\n\
    \n```python\nA = list(map(int, input().split()))\n\nv = A[0]\nk = 1\ni = 0\nj\
    \ = 1\nwhile j < len(A):\n    if A[j] != A[i]:\n        i = j\n    j += 1\n  \
    \  if j - i > k:\n        v = A[i]\n        k = j - i\n\nprint(v)\n```\n\n###\
    \ 桌面测试\n\n进行桌面测试时，可以观察到在每次循环中，前一个数字和当前数字是如何比较的，以及根据顺序数字是否不同，索引是如何增加或交换的。当比较的数字相等时，索引\
    \ 'j' 比 'i' 增加得更多，否则，索引同步增加。\n\n以下是整数序列 'A' 和桌面测试。\n\nA: 2 4 6 2 2\n\n| v | A[j]\
    \ | A[i] | k | i | j |\n|---|---|---|---|---|---|\n| 2 | | | 1 | 0 | 1 |\n| |\
    \ 4 | 2 | | 1 | 0 |\n| | | | | | 1 |\n| | 4 | 4 | | | 2 |\n| | 6 | 4 | | 2 | 1\
    \ |\n| | | | | | 2 |\n| | 6 | 6 | | | 3 |\n| | 2 | 6 | | 3 | 2 |\n| | | | | |\
    \ 3 |\n| | 2 | 2 | | | 4 |\n| | 2 | 2 | | | 5 |\n| 2 | | | 2 | | |\n\n## 练习 6\n\
    \n给定一个DNA序列：一个由字符 A、C、G 和 T 组成的字符串。你的任务是找出序列中最长的重复。这是一个只包含一种字符类型的最长子串。\n\n###\
    \ 输入\n\n唯一的输入行包含一个由 n 个字符组成的字符串。\n\n### 输出\n\n打印一个整数：最长重复的长度。\n\n### 示例\n\n####\
    \ 输入\n\n```\nATTGCCCA\n```\n\n#### 输出\n\n```\n3\n```"
