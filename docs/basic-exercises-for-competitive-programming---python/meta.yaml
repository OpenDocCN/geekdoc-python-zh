  md: '# Solution


    To solve this task, the `collections` library is used to convert the string into
    a Counter. The variable `chance` is used to add the number of odd letters, `fail`
    when there is no solution, `arr` to save the letters of even numbers and `mid`
    for the odd ones. For each letter in the Counter, if the amount is even, it is
    saved in ''arr'', otherwise depending on the value of ''chance'', the odd value
    is saved in ''mid'' or it has no solution. The last is joined by `arr` plus `mid`
    and the inverse of `arr`.


    The code for the solution written in Python is shown below.


    ```

    1 import collections

    2 S = str(input())

    3 D = collections.Counter(S)

    4 chance = True

    5 fail = False

    6 arr = []

    7 mid = []

    8 for c in D:

    9     if D[c] & 1 == 0:

    10         arr.append(c*(D[c]//2))

    11     else:

    12         if chance:

    13             mid.append(c*(D[c]))

    14             chance = False

    15         else:

    16             print(''NO SOLUTION'')

    17             fail = True

    18             break

    19 if not fail:

    20     print(''''.join(arr) + ''''.join(mid) + ''''.join(arr[::-1]))

    ```'
