    # Solution


    To solve this task it is not necessary to make a matrix that contains the infinite
    grid, first the input value is stored, then for each ''x'', ''y'' the highest
    is obtained and it is saved in ''z'', in ''z2'' the multiplication between the
    previous number to the greater is saved by itself. If `z` is odd, and `x` is the
    highest, it will suffice to add `y` to `z2`, otherwise double `z` minus x is added
    to `z2`. If `z` is even, and `y` is the highest, just add `x` to `z2`, otherwise
    double `z` minus `y` is added to `z2`.


    The code for the solution written in Python is shown below.


    ```

    1 t = int(input())

    2 for i in range(t):

