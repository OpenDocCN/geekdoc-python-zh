    goes through 3 by 3 verifying each permutation. If the permutation is incorrect,
    it prints and the program ends, otherwise it prints that it is correct.


    The code for the solution written in Python is shown below.


    ```

    1 def perm9(V):

    2     F = [ 0, 0, 0, 0, 0, 0, 0, 0, 0 ]

