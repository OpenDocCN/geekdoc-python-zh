  mdcn: "## 解决方案\n\n为了解决这个任务，我们使用递归方法遍历字符串以找到合适的符号。该方法设有条件，以便在递归发生时能够退出。我们启动一个循环，从中提取“前部”、“后部”和“目标值”，通过这种方式递归调用该方法，返回带有相应符号的字符串部分。\n\
    \n以下是用Python编写的解决方案代码。\n\n```python\ndef solve(s, n):\n    v = int(s)\n    if\
