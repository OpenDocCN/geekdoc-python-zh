  - "[PAGE 62]\n\n# Solution\n\nTo solve this task, first the matrix where '.' Is\
    \ replaced by 0 and '*' by 1. Next, the variables column 'col' with length 8,\
    \ the diagonals 'diag1' and `diag2` are started with length 15, and 'count' at\
    \ 0. A recursive method is used to traverse the board, when 'n' reaches 8 it means\
    \ that a move can be made so 'count' increases. The loop is used to cycle through\
    \ each 'reserved' position as long as it is not reserved and both the column and\
    \ the diagonals remain True, the values are changed to ensure that two queens\
    \ do not touch.\n\nThe code for the solution written in Python is shown below.\n\
    \n```\n1 reserved = [[0]*8 for _ in range(8)]\n2 for i in range(8):\n3     row\
    \ = list(str(input()))\n4     for j in range(8):\n5         if row[j] == '*':\n\
    6             reserved[i][j] = 1\n7 \n8 col = [True] * 8\n9 diag1 = [True] * 15\n\
    10 diag2 = [True] * 15\n11 count = 0\n12 def chess(n):\n13     global count\n\
    14     if n == 8:\n15         count += 1\n16         return\n17     for m in range(8):\n\
    18         if reserved[n][m] == 0 and col[m] and diag1[m+n] and diag2[7-n+m]:\n\
    19             col[m] = diag1[m+n] = diag2[7-n+m] = False\n20             chess(n+1)\n\
    21             col[m] = diag1[m+n] = diag2[7-n+m] = True\n22 \n23 chess(0)\n24\
    \ print(count)\n```"
