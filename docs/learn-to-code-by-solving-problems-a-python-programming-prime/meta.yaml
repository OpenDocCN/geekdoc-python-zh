    \ test cases test our program closer and closer to the limit of acceptable input.\
    \ Our program does not solve those in time. It’s too slow.\n\n## Efficiency of\
    \ Our Program\n\nTo understand why our program is so slow, it helps to think about\
    \ the number of triples that it must go through. Think back to the test case we\
    \ just studied, which had seven cows. How many triples will our program check?\
    \ Well, for the first cow, there are seven choices: 16, 14, 23, and so on. There\
    \ are also seven choices for the second cow, and seven choices for the third cow.\
    \ Multiplying these together, we see that our program checks 7 * 7 * 7 = 343 triples.\n\
    \nWhat if we had eight cows instead of seven? Then our program would check 8 *\
    \ 8 * 8 = 512 triples.\n\nWe can give an expression for the number of triples\
    \ that works for any number of cows. Let’s use $n$ for the number of cows; it\
    \ could be 7, 8, 50, 1,000, and so on, depending on the test case. Then we can\
    \ say that the number of triples our program checks is $n * n * n$, or $n^3$.\n\
    \nWe can substitute any number of cows for $n$ to determine the number of triples\
