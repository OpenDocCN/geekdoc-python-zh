    To find the size of the smallest neighborhood, we start by finding the size of
    the neighborhood for the village at index 1. (Notice that we don’t start at index
    0: the village at index 0 is the leftmost one, and per the problem description,
    we can ignore it.) We can find that neighborhood size like this:


    ```

    >>> left = (positions[1] - positions[0]) / 2

    >>> right = (positions[2] - positions[1]) / 2

    >>> min_size = left + right

    >>> min_size

