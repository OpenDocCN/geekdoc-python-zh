    With this dictionary, we can figure out the number of special pairs of cities.
    Let’s work through the process.


    The first key is ''SCPA''; its value is 1. To find special pairs of cities involving
    ''SCPA'', we need to look up the value for ''PASC''. That value is also 1. We
    multiply the two values together, yielding 1 * 1 = 1 special pair of cities involving
    these combos. We need to carry out this same procedure for each other key in the
