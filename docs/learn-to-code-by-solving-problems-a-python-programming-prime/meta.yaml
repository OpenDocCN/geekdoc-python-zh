    <_io.TextIOWrapper name='blah.in' mode='w' encoding='cp1252'>\n```\n\nNow that\
    \ *blah.in* exists, we can open it for reading without getting an error:\n\n```\n\
    >>> open('blah.in', 'r')\n<_io.TextIOWrapper name='blah.in' mode='r' encoding='cp1252'>\n\
    ```\n\nWhat's that `_io.TextIOWrapper` that we keep seeing? That's the type of\
    \ the value that `open` returns:\n\n```\n>>> type(open('word.in', 'r'))\n<class\
    \ '_io.TextIOWrapper'>\n```\n\nThink of this type as a file type. Its values represent\
