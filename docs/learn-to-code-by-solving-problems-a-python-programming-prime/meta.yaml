    The new main program is in Listing 8-4. Include Listing 8-1 before this code for\
    \ a complete solution to the problem.\n\n```\n# Main Program\n\nfor dataset in\
    \ range(10):\n    n = int(input())\n    addresses = set()\n    for i in range(n):\n\
    \        address = input()\n        address = clean(address)\n        addresses.add(address)\n\
    \n    print(len(addresses))\n```\n\nListing 8-4: Main program, using a set\n\n\
    Notice that we’re now using a set ❶ of email addresses rather than a list. After\
    \ cleaning each email address, we add it to the set using the set add method ❷.\n\
    In Listing 8-2, we used the in operator to check whether an email address is already\
    \ in the list so that we didn’t add duplicates. There’s no corresponding in check\
    \ in our set-based solution. Where did it go? It seems that we’re adding each\
    \ email address to the set without even making sure that it’s not already there.\n\
    We can get away without the in check when using a set because a set never contains\
    \ duplicates. The add method handles the in check for us, ensuring that a duplicate\
    \ doesn’t get added. You can think of add carrying out its own in check. There’s\
    \ no timing concern there, because searching a set is so fast.\nIf you submit\
