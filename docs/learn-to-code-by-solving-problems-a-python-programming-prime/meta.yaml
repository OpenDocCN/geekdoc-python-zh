    We don’t want to have to keep track of all of those quotes, pluses, and spaces.

    The most flexible way to build a string consisting of strings and numbers is to
    use an *f-string*. Here’s how the previous example looks with an f-string:


    ```

    >>> num1 = 7

    >>> num2 = 82

    >>> num3 = 11

    >>> f''We have {num1}, {num2}, and {num3}.''

    ''We have 7, 82, and 11.''

    ```


    Notice the *f* before the opening quote of the string. The *f* stands for format,
    because f-strings allow you to format the contents of a string. Inside of an f-string,
    we can place expressions inside curly brackets. As the string is being built,
    each expression is replaced by its value and inserted into the string. The result
    is just a regular old string—there’s no new type here:


    ```

    >>> type(f''hello'')

    <class ''str''>

    >>> type(f''{num1} days'')

    <class ''str''>

    ```


    The expressions in the curly brackets can be more complex than bare variable names:


    ```

    >>> f''The sum is {num1 + num2 + num3}''

    ''The sum is 100''

    ```


    We can use f-strings in the final line of Slot Machines. Here’s how that would
    look:


    ```

    print(f''Martha plays {plays} times before going broke.'')

    ```


    Even in this simplest of string-formatting contexts, I think f-strings add clarity.
    Keep them in the back of your mind for whenever you catch yourself building a
    string from smaller pieces.'
