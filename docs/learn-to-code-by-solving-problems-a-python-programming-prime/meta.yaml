    # A Limitation of for loops


    In Chapter 3, we studied for loops. Standard for loops loop through a sequence,
    such as a string. We certainly have no string in the Slot Machines problem.


    Range for loops loop through a range of integers and can be used to loop a specified
    number of times. But how many times should we loop for Slot Machines? Ten? Fifty?
    Who knows. It depends on the number of plays that Martha can make before she’s
    out of quarters.


    We have no string and don’t know how many iterations are required. If all we had
    were for loops, we’d be stuck.


    Enter the while loop, the most general looping structure that Python offers. We
    can write while loops that have nothing to do with strings or sequences of integers.
    In return for this added flexibility, we’ll need to be a little more careful and
    take a little more responsibility with writing our loops. Let’s dig in!


    # while loops'
  - '[PAGE 110]


    To write a while loop, we use Python’s while statement. A while loop is controlled
    by a Boolean expression. If the Boolean expression is True, then Python executes
    one iteration of the while loop. If the expression is still True, then Python
    executes another iteration of the while loop, and so on, until the Boolean expression
    is False. If the Boolean expression is False at the outset, then the loop does
    not run at all.


    while loops are *indefinite loops*: the number of iterations may not be known
    in advance.


    # Using while loops


    Let’s start with the following example of a while loop:


    ```

    >>> num = 0

    >>> while num < 5:

    ...     print(num)

    ...     num = num + 1

    ...

    0

    1

    2

    3

    4

    ```


    In a for loop, the loop variable is created for us; we don’t have to use an assignment
    statement to create the variable prior to the loop. But in a while loop, we get
    nothing for free. If we need a variable to loop through values in a while loop,
    then we have to create that variable ourselves. We do that here by making num
    refer to 0 prior to the loop ❶.


    The while loop itself is controlled by the Boolean expression num < 5 ❷. If num
    < 5 is True, then the code in the loop block will run. Right now, num refers to
    0, so the Boolean expression is True. We therefore run the loop block, which outputs
    0 and then increases num to 1 ❸.


    We jump back to the top of the loop and evaluate the num < 5 Boolean expression
    again. As num refers to 1, the expression is True. We therefore run the loop block
    again, which outputs 1 and then increases num to 2.


    Back to the top of the loop: is num < 5 still True? It is, because num is only
    2. That kicks off another iteration of the loop, which outputs 2 and increases
    num to 3.


    This pattern continues, with two more iterations of the loop: one when num refers
    to 3 and one when num refers to 4. When num refers to 5,'
  - '[PAGE 111]


    the `num < 5` Boolean expression is finally `False`, which terminates the loop.


    It’s important that we remember to increase `num` ③. A `for` loop automatically
    steps our loop variable through the appropriate values. But, again, we get nothing
    for free in a `while` loop and must update variables ourselves to bring us closer
    and closer to loop termination. If we forget to increase `num`, this happens:


    ```

    >>> num = 0

    >>> while num < 5:

    ...     print(num)

    ...

    0

    0

    0

    0

    0

    0

    0

    0

    ... forever

    ```


    If you run this code on your computer, your screen will fill up with zeros, and
    you’ll have to terminate your program. You can do that by pressing CTRL-C or by
    closing the Python window.


    The problem is that `num < 5` stays `True` forever; nothing in the loop can ever
    make it `False`. This situation, where a loop never terminates, is called an *infinite
    loop*. It’s surprisingly easy to inadvertently produce infinite `while` loops.
    If you see the same values repeating or your program appears to be doing nothing
    at all, it’s likely that you’re stuck in an infinite loop. Carefully check the
    `while` loop’s Boolean expression and that the loop block is making progress toward
    termination.


    We can do whatever we like with the `num` variable. Here’s a `while` loop counting
    up by three:


    ```

    >>> num = 0

    >>> while num < 10:

    ...     print(num)

    ...     num = num + 3

    ...

    0

    3

    6

    9

    ```'
