- md: "## 9 DESIGNING ALGORITHMS WITH COMPLETE SEARCH\n\nAn *algorithm* is a sequence\
    \ of steps that solves a problem. For each problem in this book, we solved it\
    \ by writing an algorithm in the form of Python code. We’ll focus in this chapter\
    \ on designing algorithms. When faced with a new problem, sometimes it’s hard\
    \ to know what to do to solve it. What algorithm should we write? Fortunately,\
    \ we don’t need to start from scratch each time. Computer scientists and programmers\
    \ have identified several general types of algorithms, and it’s likely that at\
    \ least one of them can be used to solve our problem.\n\nOne type of algorithm\
    \ is called a *complete search* algorithm; it involves trying all candidate solutions\
    \ and choosing the best one. For example, if the problem asks us to find a maximum,\
    \ we try all solutions and choose the largest; if the problem asks us to find\
    \ a minimum, we try all solutions and choose the smallest. Complete-search algorithms\
    \ are also known as *brute-force* algorithms, but I’ll avoid that term. It’s true\
    \ that the computer is powering its way through, checking solution after solution,\
    \ but there’s nothing brute force about what we’re doing as algorithm designers.\n\
    \nWe used a complete-search algorithm to solve Village Neighborhood in Chapter\
    \ 5. We were asked to find the smallest size of the neighborhoods, and we did\
    \ that by looking at each neighborhood and remembering the size of the smallest\
    \ one. In this chapter, we’ll use complete-search algorithms to solve other problems.\
    \ We’ll see that it can take considerable ingenuity to determine what exactly\
    \ to search.\n\nWe’ll solve two problems using complete search: determining which\
    \ lifeguard to fire and identifying the minimum cost to meet ski training camp\
    \ requirements. Then we’ll see a third problem, counting triples of cows that\
    \ meet given observations, that requires we go a little further.\n\n## Problem\
    \ #21: Lifeguards\n\nIn this problem, we’ll need to determine which lifeguard\
    \ to fire that leaves us with the maximum schedule coverage of a pool. We’ll try\
    \ separately firing each one and observing the results—that’s a complete-search\
    \ algorithm!\n\nThis is USACO 2018 January Bronze Contest problem Lifeguards.\n\
    \n## The Challenge\n\nFarmer John has purchased a swimming pool for his cows.\
    \ The pool is open from time 0 to time 1000.\n\nFarmer John hires $n$ lifeguards\
    \ to monitor the pool. Each lifeguard monitors the pool for a given interval of\
    \ time. For example, a lifeguard might start at time 2 and end at time 7. I’ll\
    \ denote such an interval as 2–7. The number of units of time covered by an interval\
    \ is the ending time minus the starting time. For example, the lifeguard whose\
    \ time interval is 2–7 covers $7 - 2 = 5$ units of time. Those time units are\
    \ from time 2 to 3, 3 to 4, 4 to 5, 5 to 6, and 6 to 7.\n\nUnfortunately, Farmer\
    \ John only has enough money to pay for $n - 1$ lifeguards, not $n$ lifeguards,\
    \ so he must fire one lifeguard.\n\nDetermine the maximum number of units of time\
    \ that can still be covered after firing one lifeguard.\n\n## Input\n\nRead input\
    \ from the file named `lifeguards.in`.\n\nThe input consists of the following\
    \ lines:\n\n- A line containing $n$, the number of lifeguards who were hired.\
    \ $n$ is between 1 and 100.\n- $n$ lines, one per lifeguard. Each line gives the\
    \ time when the lifeguard starts, a space, and the time when the lifeguard ends.\
    \ The start and end times are all integers between 0 and 1,000 and are all distinct.\n\
    \n## Output\n\nWrite output to the file named `lifeguards.out`.\n\nOutput the\
    \ maximum number of units of time that can be covered by $n - 1$ of the lifeguards.\n\
    \nThe time limit for solving each test case is four seconds.\n\n## Exploring a\
    \ Test Case\n\nLet’s explore a test case to help justify why a complete-search\
    \ algorithm makes sense for this problem. Here’s the test case:\n\n```\n4\n5 8\n\
    10 15\n17 25\n9 20\n```\n\nOne simple rule you might try to use to solve this\
    \ problem is to fire the lifeguard with the shortest time interval. That makes\
    \ some intuitive sense, because it seems as though that lifeguard contributes\
    \ the least to covering the pool.\n\nDoes this rule give us a correct algorithm?\
    \ Let’s see. It tells us to fire the 5–8 lifeguard, since that lifeguard has the\
    \ shortest time interval. That leaves us with the three lifeguards whose time\
    \ intervals are 10–15, 17–25, and 9–20. These three remaining lifeguards cover\
    \ exactly the interval 9–25, which consists of $25 - 9 = 16$ units of time. Is\
    \ 16 the correct answer?\n\nUnfortunately, no. It turns out that what we should\
    \ have done is fire the 10–15 lifeguard. If we do that, then we’re left with the\
    \ three lifeguards whose time intervals are 5–8, 17–25, and 9–20. These three\
    \ remaining lifeguards cover the intervals 5–8 and 9–25. (Careful: they don’t\
    \ cover the unit of time from 8 to 9.) The first of these intervals covers $8\
    \ - 5 = 3$ units of time, and the second covers $25 - 9 = 16$ units of time, for\
    \ a total of 19 units of time.\n\nThe correct answer is 19, not 16. Firing the\
    \ lifeguard with the shortest time interval didn’t work.\n\nIt’s not easy to come\
    \ up with a simple rule that always works to solve this problem. We don’t need\
    \ to worry, though: with a complete-search algorithm, we dodge this requirement\
    \ entirely.\n\nHere’s what our complete-search algorithm will do to solve our\
    \ test case:\n\n1. First, it will ignore the first lifeguard and determine the\
    \ number of units of time that the three remaining lifeguards cover. It will obtain\
    \ an answer of 16. It will remember 16 as the score to beat.\n2. Next, it will\
    \ ignore the second lifeguard and determine the number of units of time that the\
    \ three remaining lifeguards cover. It will obtain an answer of 19. Since 19 is\
    \ greater than 16, it will remember 19 as the score to beat.\n3. Next, it will\
    \ ignore the third lifeguard and determine the number of units of time that the\
    \ three remaining lifeguards cover. It will obtain an answer of 14. The score\
    \ to beat is still 19.\n4. Finally, it will ignore the fourth lifeguard and determine\
    \ the number of units of time that the three remaining lifeguards cover. It will\
    \ obtain an answer of 16. The score to beat is still 19.\n\nHaving considered\
    \ the ramifications of firing each lifeguard, the algorithm concludes that 19\
    \ is the correct answer. There can be no better answer than this, because we tried\
    \ every option! We performed a complete search of the possible solutions.\n\n\
    ## Solving the Problem\n\nTo use complete search, it’s often helpful to begin\
    \ by writing a function that solves the problem for a particular candidate solution.\
    \ We can then call that function many times, once for each candidate solution.\n\
    \n### Firing One Lifeguard\n\nLet’s write a function to determine the number of\
    \ time units that are covered when one particular lifeguard is fired. Listing\
    \ 9-1 shows the code.\n\n```python\ndef num_covered(intervals, fired):\n    \"\
    \"\"\n    intervals is a list of lifeguard intervals;\n    each interval is a\
    \ [start, end] list.\n    fired is the index of the lifeguard to fire.\n\n   \
    \ Return the number of time units covered by all lifeguards\n    except the one\
    \ fired.\n    \"\"\"\n    covered = set()\n    for i in range(len(intervals)):\n\
    \        if i != fired:\n            interval = intervals[i]\n            for\
    \ j in range(interval[0], interval[1]):\n                covered.add(j)\n    return\
    \ len(covered)\n```\n\nListing 9-1: Solving when one particular lifeguard is fired\n\
    \nThe first parameter is a list of lifeguard time intervals; the second is the\
    \ index of the lifeguard to fire. Enter the code into the Python shell. Here are\
    \ two sample calls of the function:\n\n```python\n>>> num_covered([[5, 8], [10,\
    \ 15], [9, 20], [17, 25]], 0)\n16\n>>> num_covered([[5, 8], [10, 15], [9, 20],\
    \ [17, 25]], 1)\n19\n```\n\nThese calls confirm that we can cover 16 units of\
    \ time if we fire lifeguard 0 and can cover 19 units of time if we fire lifeguard\
    \ 1.\n\nNow let’s understand how the function operates. We begin by creating a\
    \ set that will hold the units of time that are covered ①. Whenever a unit of\
    \ time is covered, the code will add the start of that unit of time to the set.\
    \ For example, if the unit of time from 0 to 1 is covered, then the code will\
    \ add 0 to the set; if the unit of time from 4 to 5 is covered, it will add 4\
    \ to the set.\n\nWe loop through the lifeguard time intervals. If a lifeguard\
    \ isn’t fired, then we loop through this lifeguard’s time interval ② to consider\
    \ each unit of covered time. We add each of these time units to the set ③, as\
    \ promised. Recall that sets don’t retain duplicate values; we don’t have to worry\
    \ if we try to add the same unit of time multiple times. We’ve gone through all\
    \ of the nonfired lifeguards and added to the set all units of time that are covered.\
    \ We therefore simply return the number of values in the set.\n\n### The Main\
    \ Program"
  mdcn: "## 9 使用完全搜索设计算法\n\n*算法*是解决问题的一系列步骤。对于本书中的每个问题，我们都通过编写Python代码形式的算法来解决。本章我们将重点讨论算法设计。当面对一个新问题时，有时很难知道该做什么来解决它。我们应该编写什么算法？幸运的是，我们不必每次都从头开始。计算机科学家和程序员已经确定了几种通用类型的算法，很可能其中至少有一种可以用来解决我们的问题。\n\
    \n一种算法类型称为*完全搜索*算法；它涉及尝试所有候选解并选择最佳的一个。例如，如果问题要求我们找最大值，我们就尝试所有解并选择最大的；如果问题要求我们找最小值，我们就尝试所有解并选择最小的。完全搜索算法也被称为*暴力*算法，但我会避免使用这个术语。计算机确实在强力推进，检查一个又一个解，但作为算法设计者，我们所做的事情并没有什么暴力之处。\n\
    \n我们在第5章使用完全搜索算法解决了Village Neighborhood问题。我们被要求找到邻域的最小规模，我们通过查看每个邻域并记住最小的那个的规模来做到这一点。在本章中，我们将使用完全搜索算法来解决其他问题。我们将看到，确定到底要搜索什么可能需要相当大的独创性。\n\
    \n我们将使用完全搜索解决两个问题：确定解雇哪个救生员，以及确定满足滑雪训练营要求的最小成本。然后我们将看到第三个问题，计算满足给定观察结果的奶牛三元组，这需要我们更进一步。\n\
    \n## 问题 #21：救生员\n\n在这个问题中，我们需要确定解雇哪个救生员，以使我们保留对游泳池的最大时间表覆盖。我们将尝试分别解雇每个救生员并观察结果——这就是一个完全搜索算法！\n\
    \n这是USACO 2018年一月铜级竞赛问题Lifeguards。\n\n## 挑战\n\n农夫约翰为他的奶牛购买了一个游泳池。游泳池从时间0开放到时间1000。\n\
    \n农夫约翰雇佣了$n$名救生员来监控游泳池。每名救生员在给定的时间间隔内监控游泳池。例如，一名救生员可能从时间2开始，到时间7结束。我将这样的间隔表示为2–7。一个间隔覆盖的时间单位数是结束时间减去开始时间。例如，时间间隔为2–7的救生员覆盖了$7\
    \ - 2 = 5$个时间单位。这些时间单位是从时间2到3、3到4、4到5、5到6和6到7。\n\n不幸的是，农夫约翰只有足够的钱支付$n - 1$名救生员，而不是$n$名救生员，所以他必须解雇一名救生员。\n\
    \n确定解雇一名救生员后仍能覆盖的最大时间单位数。\n\n## 输入\n\n从名为`lifeguards.in`的文件读取输入。\n\n输入包含以下行：\n\
    \n- 一行包含$n$，即被雇佣的救生员数量。$n$在1到100之间。\n- $n$行，每行一名救生员。每行给出救生员开始的时间，一个空格，以及救生员结束的时间。开始和结束时间都是0到1,000之间的整数，并且都是不同的。\n\
    \n## 输出\n\n将输出写入名为`lifeguards.out`的文件。\n\n输出$n - 1$名救生员能覆盖的最大时间单位数。\n\n解决每个测试用例的时间限制为四秒。\n\
    \n## 探索一个测试用例\n\n让我们探索一个测试用例，以帮助说明为什么完全搜索算法对这个问题有意义。以下是测试用例：\n\n```\n4\n5 8\n\
    10 15\n17 25\n9 20\n```\n\n你可能尝试用来解决这个问题的一个简单规则是解雇时间间隔最短的救生员。这在直觉上有些道理，因为似乎那个救生员对覆盖游泳池的贡献最小。\n\
    \n这个规则能给我们一个正确的算法吗？让我们看看。它告诉我们解雇5–8的救生员，因为那个救生员的时间间隔最短。这留下了时间间隔为10–15、17–25和9–20的三名救生员。这三名剩余的救生员正好覆盖了9–25的间隔，由$25\
    \ - 9 = 16$个时间单位组成。16是正确答案吗？\n\n不幸的是，不是。事实证明，我们应该做的是解雇10–15的救生员。如果我们这样做，那么我们剩下时间间隔为5–8、17–25和9–20的三名救生员。这三名剩余的救生员覆盖了5–8和9–25的间隔。（注意：它们没有覆盖从8到9的时间单位。）第一个间隔覆盖了$8\
    \ - 5 = 3$个时间单位，第二个覆盖了$25 - 9 = 16$个时间单位，总共19个时间单位。\n\n正确答案是19，而不是16。解雇时间间隔最短的救生员没有成功。\n\
    \n想出一个总是有效的简单规则来解决这个问题并不容易。不过，我们不必担心：使用完全搜索算法，我们完全避开了这个要求。\n\n以下是我们完全搜索算法解决测试用例的步骤：\n\
    \n1.  首先，它将忽略第一名救生员，并确定三名剩余救生员覆盖的时间单位数。它将得到答案16。它将记住16作为需要超越的分数。\n2.  接下来，它将忽略第二名救生员，并确定三名剩余救生员覆盖的时间单位数。它将得到答案19。由于19大于16，它将记住19作为需要超越的分数。\n\
    3.  接下来，它将忽略第三名救生员，并确定三名剩余救生员覆盖的时间单位数。它将得到答案14。需要超越的分数仍然是19。\n4.  最后，它将忽略第四名救生员，并确定三名剩余救生员覆盖的时间单位数。它将得到答案16。需要超越的分数仍然是19。\n\
    \n在考虑了解雇每名救生员的后果后，算法得出结论，19是正确答案。不可能有比这更好的答案了，因为我们尝试了每一个选项！我们对可能的解进行了完全搜索。\n\n\
    ## 解决问题\n\n要使用完全搜索，通常首先编写一个函数来解决特定候选解的问题会很有帮助。然后我们可以多次调用该函数，每个候选解调用一次。\n\n###\
    \ 解雇一名救生员\n\n让我们编写一个函数来确定当解雇特定一名救生员时覆盖的时间单位数。清单9-1显示了代码。\n\n```python\ndef num_covered(intervals,\
    \ fired):\n    \"\"\"\n    intervals is a list of lifeguard intervals;\n    each\
    \ interval is a [start, end] list.\n    fired is the index of the lifeguard to\
    \ fire.\n\n    Return the number of time units covered by all lifeguards\n   \
    \ except the one fired.\n    \"\"\"\n    covered = set()\n    for i in range(len(intervals)):\n\
    \        if i != fired:\n            interval = intervals[i]\n            for\
    \ j in range(interval[0], interval[1]):\n                covered.add(j)\n    return\
