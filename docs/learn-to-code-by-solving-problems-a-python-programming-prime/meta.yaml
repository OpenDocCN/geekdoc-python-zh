  md: 'string (not the left). As far as it’s concerned, newlines are whitespace just
    like spaces:


    ```

    >>> ''hello\nthere\n\n''

    ''hello\nthere\n\n''

    >>> ''hello\nthere\n\n''.rstrip()

    ''hello\nthere''

