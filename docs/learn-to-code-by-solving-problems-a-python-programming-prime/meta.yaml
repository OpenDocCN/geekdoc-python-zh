    walk through the code and are not part of the code itself.


    We begin by acquiring the line of text from the input and assigning it to a variable
    ①. That gives us a string, on which we can use the count method. We add 1 to the
    count of spaces to account for the final word in the string, and we use the variable
    total_words to refer to that result ②. The last thing to do is output the value
    referred to by total_words ③.


    Be sure to save the file once you’ve finished typing the code.


    ## Running the Program


    To run the program, we’ll use the python command from our operating system command
    prompt. As we’ve seen, entering python by itself runs the Python shell, but we
    don’t want that this time. Instead, we want to tell Python to run the program
    in word_count.py. To do that, navigate to your programming folder, and enter python
    word_count.py. Here and throughout the book, please use the python3 command instead
    of the python command if needed.


    Your program is now waiting at the input prompt for you to type something. Type
    a few words, press ENTER, and you should see our program working correctly. For
    example, type the following:


    ```

    this is my first python program

    ```


