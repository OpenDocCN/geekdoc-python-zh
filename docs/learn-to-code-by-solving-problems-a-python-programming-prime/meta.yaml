    \ find the problem, go to http://usaco.org/, click **Contests**, click **2020\
    \ January Contest Results**, and then click **View problem** under Word Processor.\n\
    \n## The Challenge\n\nBessie the cow is writing an essay. Each word in the essay\
    \ contains only lowercase or uppercase characters. Her teacher has specified the\
    \ maximum number of characters, not counting spaces, that can occur per line.\
    \ To satisfy this requirement, Bessie writes down the words of the essay using\
    \ the following rules:\n\n- If the next word fits on the current line, add it\
    \ to the current line. Include a space between each pair of words on the line.\n\
    - Otherwise, put this word on a new line; this line becomes the new current line.\n\
    \nOutput the essay with the correct words on each line.\n\n## Input\n\nRead input\
    \ from the file named *word.in*.\nThe input consists of two lines.\n\n- The first\
    \ line contains two integers separated by a space. The first integer is *n*, the\
    \ number of words in the essay; it’s between 1 and 100. The second integer is\
    \ *k*, the maximum number of characters (not counting spaces) that can occur per\
    \ line; it’s between 1 and 80.\n- The second line contains *n* words, with a space\
    \ between each pair of words. Each word has at most *k* characters.\n\n## Output\n\
    \nWrite output to the file named *word.out*.\nOutput the properly formatted essay.\n\
    \n## Working with Files\n\nThe Essay Formatting problem requires that we read\
    \ from file *word.in* and write to file *word.out*. Before we can do those things,\
    \ though, we need to learn how to open files in our programs.\n\n## Opening a\
    \ File\n\nUsing your text editor, create a new file called *word.in*. Put that\
    \ file in the same directory that you’ve been using for your *.py* Python programs.\n\
    \nThis is the first time that we’re creating a file that doesn’t end with *.py*.\
    \ Instead, it ends with *.in*. Be sure to name the file *word.in*, not *word.py*.\
    \ The *in* is short for input; you’ll see it used often for files that contain\
    \ input for a program.\n\nIn that file, let’s place valid input for the Essay\
    \ Formatting problem. Enter the following into the file:\n\n```\n12 13\nperhaps\
    \ better poetry will be written in the language of digital computers\n```\n\n\
    Save the file.\n\nTo open the file in Python, we use the `open` function. We pass\
