    \ of bonuses awarded is 2 + 4 + 3 = 9. So, 9 is the correct output for this test\
    \ case.\n\n## Nested Lists\n\nTo this point, we’ve seen lists of integers, floats,\
    \ and strings. We can also create lists of lists, called *nested lists*. Each\
    \ value of such a list is itself a list. It’s common to use a variable name like\
