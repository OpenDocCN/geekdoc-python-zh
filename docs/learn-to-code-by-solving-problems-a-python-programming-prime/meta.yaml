- md: "## The Challenge\n\nYou have a scarf whose length is $n$ feet, and each foot\
    \ has a specific color.\n\nYou also have $m$ relatives. Each relative indicates\
    \ what their desired scarf looks like by specifying the color of its first foot\
    \ and last foot.\n\nYour goal is to cut your original scarf in such a way as to\
    \ produce the longest desired scarf for one of your relatives.\n\n## Input\n\n\
    The input consists of the following lines:\n\n- A line containing the integer\
    \ scarf length $n$ and integer number of relatives $m$, separated by a space.\
    \ $n$ and $m$ are each between 1 and 100,000.\n- A line containing $n$ integers\
    \ separated by spaces. Each integer specifies the color of one foot of scarf in\
    \ order from the first foot to the last foot. Each integer is between 1 and 1,000,000.\n\
    - $m$ lines, one per relative, containing two integers separated by a space. These\
    \ numbers describe the relative’s desired scarf: the first integer is the desired\
    \ color of the first foot, and the second integer is the desired color of the\
    \ last foot.\n\n## Output\n\nOutput the length of the longest desired scarf that\
    \ can be produced by cutting your original scarf.\n\nThe time limit for solving\
    \ the test cases is 0.4 seconds.\n\n## Exploring a Test Case\n\nLet’s make sure\
    \ we know exactly what is being asked by working through a small test case. Here\
    \ it is:\n\n```\n6 3\n18 4 4 2 1 2\n1 2\n4 2\n18 4\n```\n\nWe have a scarf that’s\
    \ 6 feet long and three relatives. The color of each foot of the scarf is 18,\
    \ 4, 4, 2, 1, and 2. What’s the longest desired scarf we can make?\n\nThe first\
    \ relative wants a scarf whose first foot is color 1 and whose last foot is color\
    \ 2. The best we can do is give this relative a 2-foot scarf: the 2 feet (colors\
    \ 1 and 2) at the end of the scarf.\n\nThe second relative wants a scarf whose\
    \ first foot is color 4 and whose last foot is color 2. We can give them a 5-foot\
    \ scarf: 4, 4, 2, 1, 2.\n\nThe third relative wants a scarf whose first foot is\
    \ color 18 and whose last foot is color 4. We can give them a 3-foot scarf: 18,\
    \ 4, 4.\n\nThe maximum length of a desired scarf that we can make is 5, so that’s\
    \ the answer for this test case.\n\n## Algorithm 1\n\nThe way we just processed\
    \ that test case might immediately suggest to you an algorithm that we can use\
    \ to solve this problem. Namely, we should be able to go through the relatives\
    \ and figure out the maximum length of a desired scarf for each one. For example,\
    \ the maximum length for the first relative might be 2, so we remember that. The\
    \ maximum length for the second relative might be 5. That’s longer than 2, so\
    \ we remember the 5. The maximum length for the third relative might be 3. This\
    \ isn’t greater than 5—no change here. If this reminds you of a complete-search\
    \ algorithm (Chapter 9): good, because it is one!\n\nThere are *m* relatives.\
    \ If we knew how long it would take us to process each relative, then we’d be\
    \ able to work out the big O efficiency we’d be dealing with.\n\nHere’s an idea:\
    \ for each relative, let’s find the leftmost index of the color of the first foot\
    \ and the rightmost index of the color of the last foot. Once we had these indices,\
    \ then no matter how long the scarf, we could use these indices to quickly determine\
    \ the length of the longest desired scarf for this relative. For example, if the\
    \ leftmost index of the color of the first foot is 100 and the rightmost index\
    \ of the color of the last foot is 110, then their longest desired scarf is 110\
    \ – 100 + 1 = 11.\n\nDepending on how we try to find these indices, we might be\
    \ lucky and find them quickly. For example, we might scan from the left for the\
    \ leftmost index of the color of the first foot and scan from the right for the\
    \ rightmost index of the color of the last foot. Then, if the color of the first\
    \ foot is near the beginning of the scarf and the color of the last foot is near\
    \ the end, we’ll discover these indices very quickly.\n\nWe might not be lucky,\
    \ though. Finding one or both of the indices could take up to $n$ steps. For example,\
    \ suppose that a relative wants a scarf whose first foot is a color that shows\
    \ up right at the end of the scarf or that doesn’t show up in the scarf at all.\
    \ We will have to check the entire $n$ feet of the scarf, one foot at a time,\
    \ to figure this out.\n\nSo, about $n$ steps per relative. That’s linear time,\
    \ and we know that linear time is fast. Are we good? No, because in this case\
    \ the linear-time work is far more menacing than it may appear. Remember that\
    \ we’d be doing this $O(n)$ work for each of the $m$ relatives. We therefore have\
    \ an $O(mn)$ algorithm overall. $m$ and $n$ can be as big as 100,000. So, $mn$\
    \ can be as big as 100,000 * 100,000 = 10,000,000,000. That’s 10 billion! Given\
    \ that we can do about five million operations per second and that our time limit\
    \ is 0.4 seconds . . . yeah, we’re not even close. There’s no need to implement\
    \ this algorithm. We’re certain that it will time out on large test cases. We\
    \ may as well move on and spend our time implementing something else. (If you’re\
    \ nevertheless curious about the code, please see the online resources associated\
    \ with the book. Just remember that without even looking at the code, we already\
    \ figured out that it would be too slow. The power of big O analysis is in helping\
    \ us understand whether an algorithm is doomed even before we implement it.)\n\
    \n## Algorithm 2\n\nWe’re going to have to somehow process each of the relatives—there’s\
    \ no getting around that. What we’ll focus on optimizing, then, is the amount\
    \ of work that we do per relative. Unfortunately, processing a relative in the\
    \ way we did in the previous section may cause us to check over a huge portion\
    \ of the scarf. It’s this searching through the scarf, once per relative, that’s\
    \ crushing us. We need to get that searching under control.\n\nSuppose that we\
    \ could look through the scarf only once, up-front, before we knew anything about\
    \ what the relatives wanted. We could remember two things about each color in\
    \ the scarf: its leftmost index and its rightmost index. Then, no matter what\
    \ each relative wants, we could figure out the maximum length of their desired\
    \ scarf using the left and right indices that we had already stored.\n\nFor example,\
    \ assume we have this scarf:\n\n18 4 4 2 1 2\n\nWe would store the following information\
    \ for it:\n\n| Color | Leftmost index | Rightmost index |\n| :--- | :--- | :---\
    \ |\n| 1 | 4 | 4 |\n| 2 | 3 | 5 |\n| 4 | 1 | 2 |\n| 18 | 0 | 0 |\n\nSuppose that\
    \ a relative wants a scarf whose first foot is color 1 and whose last foot is\
    \ color 2. We look up the leftmost index for color 1, which is 4, and the rightmost\
    \ index for color 2, which is 5. We then calculate 5 – 4 + 1 = 2, and that’s the\
    \ length of the longest desired scarf for this relative.\n\nAmazing: no matter\
    \ how long the scarf, we can just do a quick calculation for each relative. No\
    \ more running through the scarf over and over. The only tricky thing here is\
    \ how to calculate all the leftmost and rightmost indices for the colors and to\
    \ do so by looking through the scarf only once.\n\nThe code is presented in Listing\
    \ 10-1. Try to figure out how the leftmost_index and rightmost_index dictionaries\
    \ are constructed before you continue reading my explanation that follows.\n\n\
    ```python\nlst = input().split()\nn = int(lst[0])\nm = int(lst[1])\n\nscarf =\
    \ input().split()\nfor i in range(n):\n    scarf[i] = int(scarf[i])\n\n❶ leftmost_index\
    \ = {}\n❷ rightmost_index = {}\n\n❸ for i in range(n):\n    color = scarf[i]\n\
    \    ❹ if not color in leftmost_index:\n        leftmost_index[color] = i\n  \
    \      rightmost_index[color] = i\n    else:\n        rightmost_index[color] =\
    \ i\n\nmax_length = 0\n\nfor i in range(m):\n    relative = input().split()\n\
    \    first = int(relative[0])\n    last = int(relative[1])\n    if first in leftmost_index\
    \ and last in leftmost_index:\n        length = rightmost_index[last] - leftmost_index[first]\
    \ + 1\n        if length > max_length:\n            max_length = length\n\nprint(max_length)\n\
    ```\n\nListing 10-1: Solving Longest Scarf, algorithm 2\n\nThis solution uses\
    \ two dictionaries: one to keep track of the leftmost index for each color ❶ and\
    \ one to keep track of the rightmost index for each color ❷.\n\nAs promised, we\
    \ look at each foot of the scarf just once ❸. Here’s how we keep the leftmost_index\
    \ and rightmost_index dictionaries up-to-date:\n\n- If the color of the current\
    \ foot has never been seen before ❹, then the current index serves as both the\
    \ leftmost and rightmost index for this color.\n- Otherwise, the color of the\
    \ current foot has been seen before ❺. We don’t want to update the leftmost index\
    \ for this color, because the current index is to the right of the old one. We\
    \ *do* want to update the rightmost index, though, because we have found an index\
    \ to the right of the old one.\n\nNow for the payoff: for each relative, we can\
    \ simply look up the leftmost and rightmost indices from these dictionaries ❻.\
    \ The maximum length of the desired scarf is the rightmost index of the color\
    \ of the last foot, minus the leftmost index of the color of the first foot, plus\
    \ one.\n\nAs I’ll argue now, this algorithm is far better than algorithm 1. Reading\
    \ the scarf takes *O(n)* time, as does processing the scarf’s feet. That’s *O(n)*\
    \ time so far. We then take a constant number of steps to process each relative\
    \ (not *n* steps like before!), so that’s *O(m)* time. In"
  mdcn: "## 挑战\n\n你有一条长度为 $n$ 英尺的围巾，每英尺都有特定的颜色。\n\n你还有 $m$ 位亲戚。每位亲戚通过指定围巾第一英尺和最后一英尺的颜色来描述他们想要的围巾样式。\n\
    \n你的目标是将原始围巾剪裁成一段，使得为其中一位亲戚制作出的所需围巾尽可能长。\n\n## 输入\n\n输入包含以下几行：\n\n-   一行包含两个整数：围巾长度\
    \ $n$ 和亲戚数量 $m$，以空格分隔。$n$ 和 $m$ 的取值范围均为 1 到 100,000。\n-   一行包含 $n$ 个以空格分隔的整数。每个整数按顺序指定围巾从第一英尺到最后一英尺每一英尺的颜色。每个整数的取值范围为\
    \ 1 到 1,000,000。\n-   $m$ 行，每行对应一位亲戚，包含两个以空格分隔的整数。这两个数字描述了亲戚想要的围巾：第一个整数是期望的第一英尺颜色，第二个整数是期望的最后一英尺颜色。\n\
    \n## 输出\n\n输出通过剪裁原始围巾所能制作出的最长所需围巾的长度。\n\n解决测试用例的时间限制为 0.4 秒。\n\n## 探索一个测试用例\n\n\
    让我们通过一个小型测试用例来确保我们完全理解了问题要求。测试用例如下：\n\n```\n6 3\n18 4 4 2 1 2\n1 2\n4 2\n18 4\n\
    ```\n\n我们有一条 6 英尺长的围巾和三位亲戚。围巾每一英尺的颜色依次是 18, 4, 4, 2, 1, 2。我们能制作出的最长所需围巾是多长？\n\n\
    第一位亲戚想要一条第一英尺颜色为 1、最后一英尺颜色为 2 的围巾。我们能做的最好是给这位亲戚一条 2 英尺长的围巾：围巾末尾的 2 英尺（颜色为 1 和\
    \ 2）。\n\n第二位亲戚想要一条第一英尺颜色为 4、最后一英尺颜色为 2 的围巾。我们可以给他们一条 5 英尺长的围巾：4, 4, 2, 1, 2。\n\
    \n第三位亲戚想要一条第一英尺颜色为 18、最后一英尺颜色为 4 的围巾。我们可以给他们一条 3 英尺长的围巾：18, 4, 4。\n\n我们能制作出的所需围巾的最大长度是\
    \ 5，所以这就是这个测试用例的答案。\n\n## 算法 1\n\n我们刚才处理测试用例的方式可能立刻让你想到一个可以用来解决这个问题的算法。也就是说，我们应该能够遍历所有亲戚，并找出每位亲戚所需围巾的最大长度。例如，第一位亲戚的最大长度可能是\
    \ 2，我们记住它。第二位亲戚的最大长度可能是 5。这比 2 长，所以我们记住 5。第三位亲戚的最大长度可能是 3。这不大于 5——这里没有变化。如果这让你想起了一个完全搜索算法（第\
    \ 9 章）：很好，因为它确实是一个完全搜索算法！\n\n有 *m* 位亲戚。如果我们知道处理每位亲戚需要多长时间，那么我们就能计算出整体的大 O 效率。\n\
    \n这里有一个想法：对于每位亲戚，让我们找到第一英尺颜色的最左索引和最后一英尺颜色的最右索引。一旦我们有了这些索引，那么无论围巾有多长，我们都可以使用这些索引来快速确定这位亲戚所需围巾的最大长度。例如，如果第一英尺颜色的最左索引是\
    \ 100，最后一英尺颜色的最右索引是 110，那么他们所需围巾的最大长度就是 110 – 100 + 1 = 11。\n\n根据我们尝试查找这些索引的方式，我们可能运气好，能很快找到它们。例如，我们可以从左向右扫描以找到第一英尺颜色的最左索引，并从右向左扫描以找到最后一英尺颜色的最右索引。那么，如果第一英尺的颜色靠近围巾的开头，而最后一英尺的颜色靠近围巾的结尾，我们将非常快地发现这些索引。\n\
    \n然而，我们可能运气不好。找到其中一个或两个索引可能需要多达 $n$ 步。例如，假设一位亲戚想要一条围巾，其第一英尺的颜色恰好出现在围巾的末尾，或者根本没有出现在围巾中。我们将不得不逐英尺检查整个\
    \ $n$ 英尺的围巾才能弄清楚。\n\n所以，每位亲戚大约需要 $n$ 步。这是线性时间，我们知道线性时间是很快的。我们搞定了吗？没有，因为在这种情况下，线性时间的工作比它看起来要危险得多。记住，我们将为\
    \ $m$ 位亲戚中的每一位都执行这个 $O(n)$ 的工作。因此，我们整体上有一个 $O(mn)$ 的算法。$m$ 和 $n$ 最大可以是 100,000。所以，$mn$\
    \ 最大可以是 100,000 * 100,000 = 10,000,000,000。那是 100 亿！考虑到我们每秒大约能执行五百万次操作，而时间限制是\
    \ 0.4 秒……是的，我们差得远呢。没有必要实现这个算法。我们确信它在大型测试用例上会超时。我们不妨继续前进，把时间花在实现其他算法上。（如果你仍然对代码感到好奇，请参阅与本书相关的在线资源。请记住，即使不看代码，我们已经知道它会太慢了。大\
    \ O 分析的力量在于帮助我们理解一个算法在实现之前是否注定失败。）\n\n## 算法 2\n\n我们将不得不以某种方式处理每位亲戚——这是无法避免的。因此，我们将专注于优化的是我们为每位亲戚所做的工作量。不幸的是，像上一节那样处理一位亲戚可能会导致我们检查围巾的很大一部分。正是这种为每位亲戚搜索围巾的做法拖垮了我们。我们需要控制这种搜索。\n\
    \n假设我们可以在了解任何亲戚需求之前，只预先查看一次围巾。我们可以记住围巾中每种颜色的两个信息：它的最左索引和最右索引。那么，无论每位亲戚想要什么，我们都可以使用已经存储的左右索引来计算他们所需围巾的最大长度。\n\
    \n例如，假设我们有这条围巾：\n\n18 4 4 2 1 2\n\n我们将为它存储以下信息：\n\n| 颜色 | 最左索引 | 最右索引 |\n| :---\
    \ | :--- | :--- |\n| 1 | 4 | 4 |\n| 2 | 3 | 5 |\n| 4 | 1 | 2 |\n| 18 | 0 | 0 |\n\
    \n假设一位亲戚想要一条第一英尺颜色为 1、最后一英尺颜色为 2 的围巾。我们查找颜色 1 的最左索引，即 4，以及颜色 2 的最右索引，即 5。然后我们计算\
    \ 5 – 4 + 1 = 2，这就是这位亲戚所需围巾的最大长度。\n\n神奇的是：无论围巾有多长，我们都可以为每位亲戚做一个快速计算。不再需要反复遍历围巾。这里唯一棘手的是如何计算所有颜色的最左和最右索引，并且只通过查看一次围巾来完成。\n\
    \n代码如清单 10-1 所示。在继续阅读我下面的解释之前，请尝试弄清楚 `leftmost_index` 和 `rightmost_index` 字典是如何构建的。\n\
    \n```python\nlst = input().split()\nn = int(lst[0])\nm = int(lst[1])\n\nscarf\
    \ = input().split()\nfor i in range(n):\n    scarf[i] = int(scarf[i])\n\n❶ leftmost_index\
    \ = {}\n❷ rightmost_index = {}\n\n❸ for i in range(n):\n    color = scarf[i]\n\
    \    ❹ if not color in leftmost_index:\n        leftmost_index[color] = i\n  \
    \      rightmost_index[color] = i\n    else:\n        rightmost_index[color] =\
    \ i\n\nmax_length = 0\n\nfor i in range(m):\n    relative = input().split()\n\
    \    first = int(relative[0])\n    last = int(relative[1])\n    if first in leftmost_index\
    \ and last in leftmost_index:\n        length = rightmost_index[last] - leftmost_index[first]\
    \ + 1\n        if length > max_length:\n            max_length = length\n\nprint(max_length)\n\
    ```\n\n清单 10-1：解决最长围巾问题，算法 2\n\n这个解决方案使用了两个字典：一个用于跟踪每种颜色的最左索引 ❶，另一个用于跟踪每种颜色的最右索引\
    \ ❷。\n\n正如承诺的那样，我们只查看围巾的每一英尺一次 ❸。以下是我们如何保持 `leftmost_index` 和 `rightmost_index`\
    \ 字典更新的方法：\n\n-   如果当前英尺的颜色以前从未出现过 ❹，那么当前索引既是该颜色的最左索引，也是最右索引。\n-   否则，当前英尺的颜色以前出现过\
    \ ❺。我们不想更新该颜色的最左索引，因为当前索引在旧索引的右边。我们*确实*想更新最右索引，因为我们找到了一个在旧索引右边的索引。\n\n现在是收获的时候了：对于每位亲戚，我们可以简单地从这些字典中查找最左和最右索引\
    \ ❻。所需围巾的最大长度等于最后一英尺颜色的最右索引减去第一英尺颜色的最左索引，再加一。\n\n正如我现在将要论证的，这个算法比算法 1 好得多。读取围巾需要\
    \ *O(n)* 时间，处理围巾的每一英尺也是如此。到目前为止是 *O(n)* 时间。然后我们处理每位亲戚只需要常数步（不像之前需要 *n* 步！），所以那是\
    \ *O(m)* 时间。在"
