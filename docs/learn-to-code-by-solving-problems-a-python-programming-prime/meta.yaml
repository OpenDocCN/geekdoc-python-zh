    # Problem #19: Common Words


    In this problem, we’ll need to associate words with their number of occurrences.
    This is beyond what we can do with sets, so we won’t use sets here. Instead, we’ll
    learn about and use Python dictionaries.

    This is DMOJ problem cco99p2.


    # The Challenge


    We are given $m$ words. The words are not necessarily distinct; for example, the
    word `brook` could appear multiple times. We are also given an integer $k$.

    Our task is to find the $k$th most common words. A word $w$ is a $k$th most common
    word if exactly $k - 1$ distinct words occur more often than does $w$. Depending
    on the dataset, the $k$th most common words could be no words, one word, or more
    than one word.

    Let’s make sure we’re clear on this definition of the $k$th most common words.
    If $k = 1$, then we’re being asked for the words for which exactly 0 words occur
    more often; that is, we’re being asked for the words that occur most often. If
    $k = 2$, then we’re being asked for the words for which exactly 1 word occurs
    more often. If $k = 3$, then we’re being asked for the words for which exactly
    two distinct words occur more often, and so on.


    # Input


    The input contains a line giving the number of test cases, followed by the lines
    of the test cases themselves. Each test case contains the following lines:


    +   - A line containing the integers $m$ (the number of words in the test case)
    and $k$ separated by a space. $m$ is between 0 and 1,000; $k$ is at least 1.

    - $m$ lines, each of which gives a word. Each word consists of at most 20 characters,
    and all characters are lowercase.


    # Output


    For each test case, output the following lines:


    +   - A line containing the following:'
  - '[PAGE 271]


    p most common word(s):


    where **p** is 1st if *k* is 1, 2nd if *k* is 2, 3rd if *k* is 3, 4th if *k* is
    4, and so on.


    +   - One line for each of the *k*th most common words. If there are no such words,
    there are no lines of output here.

    - A blank line.


    The time limit for solving the test cases is one second.


    # Exploring a Test Case


    Let’s start by exploring a test case. It’ll boost our understanding of the problem
    and motivate the use of a new Python type.


    Suppose that we’re interested in the most common words of all. This means that
    *k* is 1. Here’s the test case:


    ```

    1

    14 1

    storm

    cut

    magma

    cut

    brook

    gully

    gully

    storm

    cliff

    cut

    blast

    brook

    cut

    gully

    ```


    The word that shows up most often is `cut`. There are four occurrences of `cut`,
    and no other word has that many occurrences. The correct output is therefore:


    ```

    1st most common word(s):

    cut

    ```


    Notice the required blank line at the end ❶.'
