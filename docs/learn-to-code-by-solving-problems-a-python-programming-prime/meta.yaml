    \ gets paid again and that after 10 more plays (for a total of 16), Martha is\
    \ broke.\n\n## A Limitation of for loops\n\nIn Chapter 3, we studied for loops.\
    \ Standard for loops loop through a sequence, such as a string. We certainly have\
