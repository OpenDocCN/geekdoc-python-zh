    ## The Challenge


    Lena has $n$ unopened boxes of action figures. The boxes cannot be opened (otherwise
    the action figures lose their value), so the order of action figures in a box
    cannot be changed. Further, a box cannot be rotated (otherwise the action figures
    will be facing the wrong way).


    Each action figure is specified by its height. For example, one of the boxes might
    have three action figures, from left to right, of heights 4, 5, and 7. When I
    talk about a box of action figures, I’ll always list the heights from left to
    right.


    Lena wants to *organize the boxes*, which means to arrange the boxes so that heights
    of action figures increase or stay the same from left to right.


    Whether she can organize the boxes or not depends on the heights of action figures
    in the boxes. For example, if a first box has action figures of heights 4, 5,
    and 7, and a second box has action figures of heights 1 and 2, then she can organize
    these boxes by putting the second box first. But if we keep the first box as is
    and change the second box to have action figures of heights 6 and 8, then there’s
    no way to organize these boxes.


    Determine whether it’s possible for Lena to organize the boxes.


    ## Input


    The input consists of the following lines:


    - A line containing integer $n$, the number of boxes. $n$ is between 1 and 100.

    - $n$ lines, one for each box. Each of these lines begins with integer $k$, indicating
    the number of action figures in this box. $k$ is between 1 and 100. (Since $k$
    is at least 1, we don’t have to worry about empty boxes.) Following $k$, there
    are $k$ integers giving the heights of the action figures from left to right in
    this box. Each height is an integer between 1 and 10,000. There is a space between
    each pair of integers on the line.


    ## Output


    If Lena can organize the boxes, output YES; otherwise, output NO.


    ## Representing the Boxes


    This problem consists of several smaller problems, each of which we can solve
    by writing a function. Let’s first see how to represent the boxes in Python, and
    then we’ll design the functions that we need.


    In Chapter 5, when we solved Baker Bonus, we learned that lists can have other
    lists as their values. This allows us to nest lists inside of lists. We can use
    such an arrangement to represent the boxes of action figures. For example, here’s
    a list that represents two boxes:


    ```

    >>> boxes = [[4, 5, 7], [1, 2]]

    ```


    The first box has three action figures, and the second has two. We can access
    each box individually:


    ```

    >>> boxes[0]

    [4, 5, 7]

    >>> boxes[1]

    [1, 2]

    ```


    We’ll read the contents of the boxes from the input and put that information into
    a nested list, like the one I’ve shown. Then we’ll use that nested list to determine
    whether the boxes can be organized.


    ## Top-Down Design


    We’ll solve this problem using a program design approach called *top-down design*.
    Top-down design breaks a large problem into several smaller problems. That’s useful
    because each of the smaller problems will be easier to solve. We can then assemble
    those subproblem solutions to solve the original problem.


    ## Doing Top-Down Design


    Here’s how top-down design works. We start by writing an incomplete Python program
    that captures the main tasks in a solution. Some of these tasks won’t require
    much code, so we can proceed to solve them directly. Other tasks will require
    more from us, and we’ll turn each of those into a function that we’ll call. We
    might also solve a task by writing a little code *and* calling a function. However,
    those functions won’t exist yet. We’ll have to write them!


    To write a needed function, we repeat this same process for that function’s task.
    That is, we start by writing down the tasks for that function. If we can write
    code for a task outright, then we do it; otherwise, we call another function (that
    we’ll write later) to handle that task.


    We keep doing this until we have no more functions to write. At that point, we’ll
    have a solution to our problem.


    It’s called top-down design because we start at the top, or highest, level of
    the problem and make our way downward, through the guts of the problem, until
    each task has been completely written in code. We’ll now use this to solve Action
    Figures.


    ## The Top Level


    To begin our design, we focus on the main tasks that we’ll need to solve.


    We’ll certainly have to read the input, so that’s our first task.


    Now, assume that we’ve read the input. What should we do to determine whether
    the boxes can be organized? One important thing to do is check each box on its
    own to make sure that its action figures have their heights in order. For example,
    suppose that we had the box [18, 20, 4]. This box, with heights out of order,
    means that we have no chance of organizing all of the boxes. We can’t even organize
    this one!


    So, that’s our second task: determine whether each box, on its own, has its action
    figures in order. If any of these boxes has its action figures out of order, then
    we know that the boxes can’t be organized. If all boxes are OK, then we have more
    to check.


    If each box on its own is OK, the next question is whether we can organize all
    of the boxes. One important observation we can make here is that the only action
    figures we care about from now on are the ones at the left and right sides of
    each box. The action figures between these don’t matter anymore.


    Consider this example where we have three boxes:


    ```

    [[9, 13, 14, 17, 25],

    [32, 33, 34, 36],

    [1, 6]]

    ```


    The first box starts with an action figure of height 9 and ends with an action
    figure of height 25. Action figures placed to the left of this box must all have
    height 9 or less; for example, we can place the third box to the left of this
    box. Action figures placed to the right of this box must all have height 25 or
    more; for example, we can place the second box to the right of this box. The action
    figures of heights 13, 14, and 17 change nothing; they may as well not be there.


    That’s our third task then: ignore all action figures except those on the ends
    of boxes.


    Following that third task, we’ll have a list that looks like this:


    ```

    [[9, 25],

    [32, 36],

    [1, 6]]

    ```


    It’s a lot easier to tell whether we can organize these boxes if we first sort
    them, like this:


    ```

    [[1, 6],

    [9, 25],

    [32, 36]]

    ```


    Now it’s easy to see what the neighboring boxes of a box must be. (We used a similar
    approach when solving Village Neighborhood in Chapter 5.) So, our fourth task
    is to sort the boxes.


    Our fifth and final task is to determine whether these sorted boxes are organized.
    They are organized if the heights of action figures are sorted from left to right.
    The action figures of heights 1, 6, 9, 25, 32, and 36 are appropriately sorted,
    so the previous boxes can be organized. But consider this example:


    ```

    [[1, 6],

    [9, 50],

    [32, 36]]

    ```


    These boxes can’t be organized because of that huge action figure in the second
    box. That second box takes up heights 9 to 50; the third box can’t go on the right
    of the second box because its heights are too small.


    We’ve now finished working through the problem and have decided on five main tasks:


    1. Read input.

    2. Check whether all boxes are OK.

    3. Obtain a new list of boxes with only the left and right action figure heights
    from each box.

    4. Sort these new boxes.'
