    # Problem #25: Ribbon Painting


    Here’s another problem where the first algorithm that we might come up with is
    too slow. We won’t waste much time on that algorithm, though, because our big
    O analysis will tell us all we need to know before we consider implementing the
    code. We’ll then spend our time designing a faster algorithm.


    This is DMOJ problem dmopc17c4p1.


    # The Challenge


    You have a purple ribbon whose length is $n$ units. The first unit goes from position
    0 up to but not including position 1, the second unit goes from position 1 up
    to but not including position 2, and so on. You then carry out $q$ paint strokes,
    each of which colors a segment of the ribbon blue.


    Your goal is to determine the number of units of the ribbon that are still purple
    and the number of units of the ribbon that are now blue.


    # Input


    The input consists of the following lines:


    +   - A line containing the integer ribbon length $n$ and integer number of paint
    strokes $q$, separated by a space. $n$ and $q$ are each between 1 and 100,000.

    - $q$ lines, one per paint stroke, containing two integers separated by a space.
    The first integer gives the starting position of the paint stroke; the second
    gives the ending position of the paint stroke. The starting position is guaranteed
    to be less than the ending position; each integer is between 0 and $n$. The paint
    stroke goes from the starting position up to but not including the ending position.
    As a quick example here, if a paint stroke has a starting position of 5 and an
    ending position of 12, then the stroke paints the ribbon from position 5 up to
    but not including position 12.'
  - '[PAGE 358]


    # Output


    Output the number of units of the ribbon that are still purple, a space, and the
    number of units of the ribbon that are now blue.

    The time limit for solving the test cases is 2 seconds.


    # Exploring a Test Case


    Let’s look at a small test case. This test case will not only ensure that we’ve
    interpreted the problem correctly but also highlight the perils of a naive algorithm.
    Here it is:


    ```

    20 4

    18 19

    4 16

    4 14

    5 12

    ```


    Our ribbon’s length is 20, and there are four paint strokes. How much of the ribbon
    do our paint strokes turn blue?

    The first paint stroke paints one unit blue, the one that starts at position 18.

    The second paint stroke paints the units of ribbon starting at positions 4, 5,
    6, 7, and so on, all the way up to position 15. That’s 12 units painted blue by
    this stroke, and 13 blue units in total.

    The third paint stroke paints 10 units blue. But all of those units are already
    blue from the second paint stroke! It would be a colossal waste of time indeed
    if we spent time “painting” anything with this paint stroke. Whatever algorithm
    we come up with better not fall into this time-wasting trap.

    The fourth paint stroke paints 7 units blue. But again: all of these units are
    already blue!

    Now we’re done painting, and we have 13 blue units. There are 20 – 13 = 7 remaining
    purple units, so the correct output for this test case is:


    ```

    7 13

    ```


    # Solving the Problem'
  - '[PAGE 359]


    The maximum length of the ribbon is 100,000, and the maximum number of paint strokes
    is 100,000. Recall algorithm 1 from when we solved Longest Scarf, where we learned
    that an $O(mn)$ algorithm was too slow with these bounds. Similarly, here, an
    $O(nq)$ algorithm would be inadequate, as it would not finish within the time
    limit on large test cases.


    This means that we cannot afford to process each unit that is painted by each
    paint stroke. It would be nice if we could more easily focus on only the *new*
    units that are painted blue by a paint stroke. Then we could go through each paint
    stroke and add up the number of blue units that it contributes.


    Fair enough, but how can we determine the contribution of each paint stroke? That’s
    tricky, because bits and pieces of the next paint stroke may have already been
    painted blue by previous paint strokes.


    This situation is made much simpler, however, if we sort the paint strokes first.
    Remember from “n log n Time” earlier in this chapter that sorting is extremely
    fast, taking only $O(n \log n)$ time. There’s no efficiency concern in using sorting,
    so let’s understand why sorting helps us here.


    Sorting the paint strokes from the test case in the prior section gives us the
    following list of paint strokes:


    ```

    4 14

    4 16

    5 12

    18 19

    ```


    Now that the paint strokes are sorted, we can efficiently process them. As we
    do so, we’ll store the rightmost position of any paint stroke that we’ve processed
    so far. We’ll start this rightmost position off at 0 to indicate that we haven’t
    painted anything.


    Our first paint stroke paints $14 - 4 = 10$ units blue. Now our stored rightmost
    position is 14.


    Our second paint stroke paints 12 units blue, yes, but how many of those 12 does
    it turn from purple to blue? After all, it overlaps the previous paint stroke,
    so some of these units were blue already. We can calculate the number of new blue
    units by subtracting 14, our stored rightmost position, from 16, the ending position
    of the current paint stroke. This is how we ignore the units already painted blue
    by previous paint strokes. So, there are $16 - 14 = 2$ new blue units and 12 blue
    units'
