- md: '## Finding the kth Most Common Words


    The `most_common_words` function ④ is the function that actually finds the words
    that we need. It takes an inverted dictionary (which maps numbers of occurrences
    to lists of words) and an integer $k$ and returns a list of the kth most common
    words.


    To see how it works, let’s look at a sample inverted dictionary. I’ve organized
    its keys in order from most occurrences to fewest occurrences, as that’s the order
    that `most_common_words` goes through the keys. Here’s the dictionary:


    ```

    {4: [''cut''],

    3: [''gully''],

    2: [''storm'', ''brook''],

    1: [''magma'', ''cliff'', ''blast'']}

    ```


    Suppose that $k$ is 3. Therefore, exactly two words must be more common than the
    words that we return. The words we need are not provided by the first dictionary
    key. That key gives us only one word (cut), so it can’t be the third most common
    word. Similarly, the words we need are not provided by the second dictionary key.
    That key gives us one more word (gully). We’ve processed a total of two words
    now but haven’t found the third most common words yet. The words we need, however,
    *are* provided by the third dictionary key. That key gives us two more words;
    each of these words (storm and brook) has exactly two words with more occurrences,
    so these are the words for when $k$ is 3.


    What if $k$ were 4? This time, exactly three words must be more common than the
    words that we return. The candidate words are still those from the third key (storm
    and brook), but there are only two words that occur more often than each of these
    words. There are therefore *no* words for when k = 4.


    In summary, we need to total up the words we see when going through the keys until
    we find the key that might contain the words we need. If exactly k - 1 words occur
    more often, then we have words for k; otherwise, we don''t, and there are no words
    to output.


    Now let''s walk through the code itself. We begin by obtaining a list of the dictionary''s
    keys and sorting them from biggest to smallest. We then loop through the keys
    in that reverse-sorted order ❺. The *done* variable tells us whether we''ve looked
    at k or more words yet. As soon as we have ❻, we exit the loop.


    When the loop is done, we check whether there are any words for k. If there are
    exactly k - 1 words that occur more often, and we haven''t gone past the end of
    our keys ❼, then we indeed have words to return. Otherwise, there are no words
    to return, so we return the empty list.


    ## The Main Program


    Now we arrive at the main part of the program ❽. We build dictionary `word_to_num`,
    which maps each word to its number of occurrences. We then build the inverted
    dictionary `num_to_words` ❾, which maps each number of occurrences to the associated
    list of words. Notice how the names of these dictionaries convey the direction
    of mapping: `word_to_num` goes from words to numbers, and `num_to_words` goes
    from numbers to words.


    The rest of the code calls our other helper functions and outputs the appropriate
    words.


    With that, you''re ready to submit to the judge. Well done: that''s the first
    problem that you''ve solved with dictionaries. Whenever you need to map between
    two types of values, think about whether you can organize the information using
    a dictionary. If you can, it''s likely that you''ll be well on your way to an
    efficient solution!


    ## Problem #20: Cities and States


    Here''s another problem where we''ll be able to use a dictionary. As you read
    the problem description, think about what we could use as the keys and what we
    could use as the values.


    This is USACO 2016 December Silver Contest problem Cities and States.


    ### **The Challenge**


    The United States is divided into geographical regions called *states*, each of
    which contains one or more cities. Each state has been given a two-character abbreviation.
    For example, the abbreviation for Pennsylvania is PA, and the abbreviation for
    South Carolina is SC. We’ll write city names and state abbreviations in all uppercase.


    Consider the pair of cities SCRANTON PA and PARKER SC. This pair of cities is
    *special* because the first two characters of each city give the abbreviation
    for the other city’s state. That is, the first two characters of SCRANTON give
    us SC (PARKER’s state), and the first two characters of PARKER give us PA (SCRANTON’s
    state).


    A pair of cities is *special* if they meet this property and are not in the same
    state.


    Determine the number of special pairs of cities in the provided input.


    ### **Input**


    Read input from the file named *citystate.in*.


    The input consists of the following lines:


    - A line containing *n*, the number of cities. *n* is between 1 and 200,000.

    - *n* lines, one per city. Each line gives the name of a city in uppercase, a
    space, and its state’s abbreviation in uppercase. The name of each city is between
    2 and 10 characters; the abbreviation for each state is exactly two characters.
    The same city name can exist in multiple states but will not appear more than
    once in the same state. The name of a city or state in this problem is any string
    that meets these requirements; it might not be the name of an actual US city or
    state.


    ### **Output**


    Write output to the file named *citystate.out*.


    Output the number of special pairs of cities.


    The time limit for solving each test case is four seconds.


    ## Exploring a Test Case


    Perhaps you’re thinking that you could solve this problem with a list. That’s
    a good thought to have! If you’re interested, I suggest giving that a try before
    continuing. The strategy would be to use two nested loops to consider each pair
    of cities and check whether each pair is special. It’s possible to come up with
    a correct solution using this approach.


    A correct solution, yes, but also a slow one. The list of cities can be huge—up
    to a maximum of 200,000—and any solution involving searching a list for matching
    cities is doomed to be too slow. Let’s explore a test case and work out how a
    dictionary can help.


    Here’s our test case:


    ```

    12

    SCRANTON PA

    MANISTEE MI

    NASHUA NH

    PARKER SC

    LAFAYETTE CO

    WASHOUGAL WA

    MIDDLEBOROUGH MA

    MADISON MI

    MILFORD MA

    MIDDLETON MA

    COVINGTON LA

    LAKEWOOD CO

    ```


    The first city is SCRANTON PA. To find special pairs involving this city, we need
    to find other cities whose name starts with PA and whose state is SC. The only
    other city that meets this description is PARKER SC.


    Notice that all we care about for SCRANTON PA is that its name starts with SC
    and that its state is PA. It could have been called SCMERWIN PA or SCSHOCK PA
    or SCHRUTE PA; it would still be a special pair with PARKER SC.


    Let’s refer to the first two characters of a city name followed by the city’s
    state as a *combo*. For example, the combo for SCRANTON PA is SCPA, and the combo
    for PARKER SC is PASC.


    Rather than searching for special pairs of cities, we can now look at special
    pairs of combos. Let’s try this.


    There are two cities with the combo MAMI. They happen to be MANISTEE MI and MADISON
    MI, but all we care about is that there are two of them. The MAMI cities start
    with MA and are in state MI. To count up the special pairs involving MAMI cities,
    we need to know the cities that start with MI and have state MA. That is, we need
    to know the number of MIMA cities. There are three MIMA cities. They happen to
    be MIDDLEBOROUGH MA, MILFORD MA, and MIDDLETON MA, but all we care about is that
    there are three of them. Okay—so we have two MAMI cities and three MIMA cities.
    The total special pairs for these combos is therefore 2 * 3 = 6, because for each
    of the two MAMI cities, we have a choice of three MIMA cities.


    If you’re not convinced, here are the six special pairs for these combos:


    - MANISTEE MI and MIDDLEBOROUGH MA

    - MANISTEE MI and MILFORD MA

    - MANISTEE MI and MIDDLETON MA

    - MADISON MI and MIDDLEBOROUGH MA

    - MADISON MI and MILFORD MA

    - MADISON MI and MIDDLETON MA


    If we could map combos—SCPA, PASC, MAMI, MIMA, and so on—to the number of occurrences,
    we could loop through the combos to find the number of special pairs of cities.
    A dictionary is the perfect tool to store this mapping.


    Here’s the dictionary that we’d like to create for our test case:


    ```

    {''SCPA'': 1, ''MAMI'': 2, ''NANH'': 1, ''PASC'': 1, ''LACO'': 2,

    ''MIMA'': 3, ''COLA'': 1}

    ```


    With this dictionary, we can figure out the number of special pairs of cities.
    Let’s work through the process.


    The first key is ''SCPA''; its value is 1. To find special pairs of cities involving
    ''SCPA'', we need to look up the value for ''PASC''. That value is also 1. We
    multiply the two values together, yielding 1 * 1 = 1 special pair of cities involving
    these combos. We need to carry out this same procedure for each other key in the
    dictionary.


    The next key is ''MAMI''; its value is 2. To find special pairs of cities involving
    ''MAMI'', we need to look up the value for ''MIMA''. That value is 3. We multiply
    the two values together, yielding 2 * 3 = 6 special pairs of cities involving
    these combos. With the 1 we found previously, we now have a total of 7.'
  mdcn: '## 寻找第 k 个最常见的单词


    `most_common_words` 函数 ④ 是实际查找所需单词的函数。它接受一个反转字典（将出现次数映射到单词列表）和一个整数 $k$，并返回第 k
    个最常见的单词列表。


    为了理解其工作原理，让我们看一个示例反转字典。我已将其键按出现次数从多到少排序，因为这正是 `most_common_words` 遍历键的顺序。字典如下：


    ```

    {4: [''cut''],

    3: [''gully''],

    2: [''storm'', ''brook''],

    1: [''magma'', ''cliff'', ''blast'']}

    ```


    假设 $k$ 为 3。因此，必须恰好有两个单词比我们返回的单词更常见。我们需要的单词并非由第一个字典键提供。该键仅给出一个单词（cut），因此它不可能是第三常见的单词。同样，我们需要的单词也非由第二个字典键提供。该键再给出一个单词（gully）。至此我们已处理了两个单词，但尚未找到第三常见的单词。然而，我们需要的单词*确实*由第三个字典键提供。该键再给出两个单词；每个单词（storm
    和 brook）都恰好有两个出现次数更多的单词，因此这些就是 $k$ 为 3 时的单词。


    如果 $k$ 为 4 呢？这次，必须恰好有三个单词比我们返回的单词更常见。候选单词仍然是第三个键中的单词（storm 和 brook），但每个单词只有两个出现次数更多的单词。因此，当
    k = 4 时*没有*单词。


    总之，我们需要在遍历键时累加看到的单词，直到找到可能包含所需单词的键。如果恰好有 k - 1 个单词出现次数更多，那么我们就找到了 k 对应的单词；否则，就没有单词可输出。


    现在让我们逐步分析代码本身。我们首先获取字典键的列表，并按从大到小排序。然后按此逆序遍历键 ❺。*done* 变量告诉我们是否已查看了 k 个或更多单词。一旦满足条件
    ❻，我们就退出循环。


    循环结束后，我们检查是否存在 k 对应的单词。如果恰好有 k - 1 个单词出现次数更多，并且我们没有超出键的末尾 ❼，那么我们确实有单词可返回。否则，没有单词可返回，因此我们返回空列表。


    ## 主程序


    现在我们来到程序的主体部分 ❽。我们构建字典 `word_to_num`，将每个单词映射到其出现次数。然后构建反转字典 `num_to_words` ❾，将每个出现次数映射到相关的单词列表。注意这些字典的名称如何传达映射方向：`word_to_num`
    从单词到数字，`num_to_words` 从数字到单词。


    其余代码调用我们的其他辅助函数并输出相应的单词。


    至此，你已准备好提交给评测系统。干得好：这是你用字典解决的第一个问题。无论何时需要在两种类型的值之间映射，都想想是否可以用字典组织信息。如果可以，你很可能正走在高效解决方案的道路上！


    ## 问题 #20：城市与州


    这是另一个我们可以使用字典的问题。阅读问题描述时，思考我们可以用什么作为键，用什么作为值。


    这是 USACO 2016 年十二月银组竞赛问题 Cities and States。


    ### **挑战**


    美国被划分为称为*州*的地理区域，每个州包含一个或多个城市。每个州都有一个两个字符的缩写。例如，宾夕法尼亚州的缩写是 PA，南卡罗来纳州的缩写是 SC。我们将用全大写书写城市名和州缩写。


    考虑城市对 SCRANTON PA 和 PARKER SC。这对城市是*特殊的*，因为每个城市名的前两个字符给出了另一个城市所在州的缩写。也就是说，SCRANTON
    的前两个字符给出了 SC（PARKER 所在的州），PARKER 的前两个字符给出了 PA（SCRANTON 所在的州）。


    如果一对城市满足此属性且不在同一州，则它们是*特殊的*。


    确定给定输入中特殊城市对的数量。


    ### **输入**


    从名为 *citystate.in* 的文件读取输入。


    输入包含以下行：


    - 一行包含 *n*，即城市数量。*n* 在 1 到 200,000 之间。

    - *n* 行，每行一个城市。每行给出一个全大写的城市名、一个空格和其所在州的全大写缩写。每个城市名在 2 到 10 个字符之间；每个州的缩写恰好两个字符。相同的城市名可以存在于多个州，但不会在同一州出现多次。本问题中城市或州的名称是任何满足这些要求的字符串；它可能不是实际美国城市或州的名称。


    ### **输出**


    将输出写入名为 *citystate.out* 的文件。


    输出特殊城市对的数量。


    解决每个测试用例的时间限制为四秒。


    ## 探索测试用例


    也许你在想可以用列表解决这个问题。这是个好想法！如果你感兴趣，我建议在继续之前先尝试一下。策略是使用两个嵌套循环考虑每对城市，并检查每对是否特殊。使用这种方法可以得出正确解决方案。


    是的，正确解决方案，但也是缓慢的。城市列表可能非常庞大——最多可达 200,000——任何涉及在列表中搜索匹配城市的解决方案都注定太慢。让我们探索一个测试用例，看看字典如何提供帮助。


    这是我们的测试用例：


    ```

    12

    SCRANTON PA

    MANISTEE MI

    NASHUA NH

    PARKER SC

    LAFAYETTE CO

    WASHOUGAL WA

    MIDDLEBOROUGH MA

    MADISON MI

    MILFORD MA

    MIDDLETON MA

    COVINGTON LA

    LAKEWOOD CO

    ```


    第一个城市是 SCRANTON PA。要找到涉及此城市的特殊对，我们需要找到其他城市名以 PA 开头且所在州为 SC 的城市。唯一满足此描述的其他城市是 PARKER
    SC。


    请注意，对于 SCRANTON PA，我们只关心其名称以 SC 开头且所在州为 PA。它可能叫 SCMERWIN PA 或 SCSHOCK PA 或 SCHRUTE
    PA；它仍然会与 PARKER SC 形成特殊对。


    让我们将城市名的前两个字符后跟城市所在州称为*组合*。例如，SCRANTON PA 的组合是 SCPA，PARKER SC 的组合是 PASC。


    我们现在可以寻找特殊组合对，而不是寻找特殊城市对。让我们试试。


    有两个组合为 MAMI 的城市。它们恰好是 MANISTEE MI 和 MADISON MI，但我们只关心有两个。MAMI 城市以 MA 开头且在 MI 州。要计算涉及
    MAMI 城市的特殊对，我们需要知道以 MI 开头且在 MA 州的城市。也就是说，我们需要知道 MIMA 城市的数量。有三个 MIMA 城市。它们恰好是 MIDDLEBOROUGH
    MA、MILFORD MA 和 MIDDLETON MA，但我们只关心有三个。好的——所以我们有两个 MAMI 城市和三个 MIMA 城市。这些组合的特殊对总数因此是
    2 * 3 = 6，因为对于两个 MAMI 城市中的每一个，我们都有三个 MIMA 城市可选。


    如果你不确定，以下是这些组合的六个特殊对：


    - MANISTEE MI 和 MIDDLEBOROUGH MA

    - MANISTEE MI 和 MILFORD MA

    - MANISTEE MI 和 MIDDLETON MA

    - MADISON MI 和 MIDDLEBOROUGH MA

    - MADISON MI 和 MILFORD MA

    - MADISON MI 和 MIDDLETON MA


    如果我们能将组合——SCPA、PASC、MAMI、MIMA 等——映射到出现次数，我们就可以遍历组合以找到特殊城市对的数量。字典是存储此映射的完美工具。


    这是我们为测试用例希望创建的字典：


    ```

    {''SCPA'': 1, ''MAMI'': 2, ''NANH'': 1, ''PASC'': 1, ''LACO'': 2,

    ''MIMA'': 3, ''COLA'': 1}

    ```


    有了这个字典，我们可以计算出特殊城市对的数量。让我们逐步处理。


    第一个键是 ''SCPA''；其值为 1。要找到涉及 ''SCPA'' 的特殊城市对，我们需要查找 ''PASC'' 的值。该值也是 1。我们将两个值相乘，得出
    1 * 1 = 1 个涉及这些组合的特殊城市对。我们需要对字典中的每个其他键执行相同的过程。


    下一个键是 ''MAMI''；其值为 2。要找到涉及 ''MAMI'' 的特殊城市对，我们需要查找 ''MIMA'' 的值。该值为 3。我们将两个值相乘，得出
    2 * 3 = 6 个涉及这些组合的特殊城市对。加上之前找到的 1，我们现在总共有 7 个。'
