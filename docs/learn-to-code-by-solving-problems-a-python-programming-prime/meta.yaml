    \ module is `choice`. We pass it a sequence, and it returns one of its values\
    \ at random:\n\n```\n>>> random.choice(['win', 'lose'])\n'lose'\n>>> random.choice(['win',\
    \ 'lose'])\n'lose'\n>>> random.choice(['win', 'lose'])\n'win'\n```\n\nIf we frequently\
    \ use a small number of functions from a module, it can be tedious to type the\
