    # The Challenge


    You have a scarf whose length is $n$ feet, and each foot has a specific color.


    You also have $m$ relatives. Each relative indicates what their desired scarf
    looks like by specifying the color of its first foot and last foot.


    Your goal is to cut your original scarf in such a way as to produce the longest
    desired scarf for one of your relatives.


    # Input


    The input consists of the following lines:


    +   - A line containing the integer scarf length $n$ and integer number of relatives
    $m$, separated by a space. $n$ and $m$ are each between 1 and 100,000.

    - A line containing $n$ integers separated by spaces. Each integer specifies the
    color of one foot of scarf in order from the first foot to the last foot. Each
    integer is between 1 and 1,000,000.

    - $m$ lines, one per relative, containing two integers separated by a space. These
    numbers describe the relative’s desired scarf: the first integer is the desired
    color of the first foot, and the second integer is the desired color of the last
    foot.


    # Output


    Output the length of the longest desired scarf that can be produced by cutting
    your original scarf.


    The time limit for solving the test cases is 0.4 seconds.


    # Exploring a Test Case


    Let’s make sure we know exactly what is being asked by working through a small
    test case. Here it is:


    ```

    6 3

    18 4 4 2 1 2

    1 2

    4 2

    18 4

    ```'
  - '[PAGE 353]


    We have a scarf that’s 6 feet long and three relatives. The color of each foot
    of the scarf is 18, 4, 4, 2, 1, and 2. What’s the longest desired scarf we can
    make?


    The first relative wants a scarf whose first foot is color 1 and whose last foot
    is color 2. The best we can do is give this relative a 2-foot scarf: the 2 feet
    (colors 1 and 2) at the end of the scarf.


    The second relative wants a scarf whose first foot is color 4 and whose last foot
    is color 2. We can give them a 5-foot scarf: 4, 4, 2, 1, 2.


    The third relative wants a scarf whose first foot is color 18 and whose last foot
    is color 4. We can give them a 3-foot scarf: 18, 4, 4.


    The maximum length of a desired scarf that we can make is 5, so that’s the answer
    for this test case.


    # Algorithm 1


    The way we just processed that test case might immediately suggest to you an algorithm
    that we can use to solve this problem. Namely, we should be able to go through
    the relatives and figure out the maximum length of a desired scarf for each one.
    For example, the maximum length for the first relative might be 2, so we remember
    that. The maximum length for the second relative might be 5. That’s longer than
    2, so we remember the 5. The maximum length for the third relative might be 3.
    This isn’t greater than 5—no change here. If this reminds you of a complete-search
    algorithm (Chapter 9): good, because it is one!


    There are *m* relatives. If we knew how long it would take us to process each
    relative, then we’d be able to work out the big O efficiency we’d be dealing with.


    Here’s an idea: for each relative, let’s find the leftmost index of the color
    of the first foot and the rightmost index of the color of the last foot. Once
    we had these indices, then no matter how long the scarf, we could use these indices
    to quickly determine the length of the longest desired scarf for this relative.
    For example, if the leftmost index of the color of the first foot is 100 and the
    rightmost index of the color of the last foot is 110, then their longest desired
    scarf is 110 – 100 + 1 = 11.


    Depending on how we try to find these indices, we might be lucky and find them
    quickly. For example, we might scan from the left for the leftmost index of the
    color of the first foot and scan from the right for the rightmost index of the
    color of the last foot. Then, if the color of the first'
  - '[PAGE 354]


    foot is near the beginning of the scarf and the color of the last foot is near
    the end, we’ll discover these indices very quickly.


    We might not be lucky, though. Finding one or both of the indices could take up
    to $n$ steps. For example, suppose that a relative wants a scarf whose first foot
    is a color that shows up right at the end of the scarf or that doesn’t show up
    in the scarf at all. We will have to check the entire $n$ feet of the scarf, one
    foot at a time, to figure this out.


    So, about $n$ steps per relative. That’s linear time, and we know that linear
    time is fast. Are we good? No, because in this case the linear-time work is far
    more menacing than it may appear. Remember that we’d be doing this $O(n)$ work
    for each of the $m$ relatives. We therefore have an $O(mn)$ algorithm overall.
    $m$ and $n$ can be as big as 100,000. So, $mn$ can be as big as 100,000 * 100,000
    = 10,000,000,000. That’s 10 billion! Given that we can do about five million operations
    per second and that our time limit is 0.4 seconds . . . yeah, we’re not even close.
    There’s no need to implement this algorithm. We’re certain that it will time out
    on large test cases. We may as well move on and spend our time implementing something
    else. (If you’re nevertheless curious about the code, please see the online resources
    associated with the book. Just remember that without even looking at the code,
    we already figured out that it would be too slow. The power of big O analysis
    is in helping us understand whether an algorithm is doomed even before we implement
    it.)


    # Algorithm 2


    We’re going to have to somehow process each of the relatives—there’s no getting
    around that. What we’ll focus on optimizing, then, is the amount of work that
    we do per relative. Unfortunately, processing a relative in the way we did in
    the previous section may cause us to check over a huge portion of the scarf. It’s
    this searching through the scarf, once per relative, that’s crushing us. We need
    to get that searching under control.


    Suppose that we could look through the scarf only once, up-front, before we knew
    anything about what the relatives wanted. We could remember two things about each
    color in the scarf: its leftmost index and its rightmost index. Then, no matter
    what each relative wants, we could figure out the maximum length of their desired
    scarf using the left and right indices that we had already stored.'
