  - '[PAGE 159]


    Having read the village positions, we next sort them in increasing order ④. We
    then find the size of the neighborhood of the village at index 1, storing it using
    `min_size` ⑤.


    Next, in a second loop, we loop through each of the other villages whose neighborhood
    sizes we need to compute ⑥. Those villages start at index 2 and end at index n
    - 2. (We don’t want to consider the village at index n - 1, because that’s the
    rightmost village.) We therefore use `range` with a first argument of 2 (thus
    starting at 2) and a second argument of n - 1 (thus ending at n - 2).


    Inside the loop, we calculate the size of the current village’s neighborhood,
    exactly as we did for the first village. The size of the smallest neighborhood
    that we’ve found so far is referred to by `min_size`. Is the current village’s
    neighborhood smaller than our smallest so far? To answer that, we use an if statement
    ⑦. If this village’s neighborhood is smaller than `min_size`, we update `min_size`
    to the size of this neighborhood. If this village’s neighborhood isn’t smaller
    than `min_size`, then we do nothing, because this village doesn’t change the size
    of the smallest neighborhood.


    Having gone through all of the villages, `min_size` must be the size of the smallest
    neighborhood. We therefore output the value of `min_size`.


    The “Output” section of this problem description specified “Include exactly one
    digit after the decimal point.” What if the smallest size was something like 6.25
    or 8.33333? Shouldn’t we do something about that?


    No. We’re safe with what we’ve done. The only neighborhood sizes we can get are
    numbers like 3.0 (with a 0 after the decimal point) and 3.5 (with a .5 after the
    decimal point). Here’s why. When we calculate the left part of a neighborhood,
    we subtract two integers and divide that resulting integer by 2. If we have an
    even integer before dividing by 2, then dividing gives us a .0 number (no remainder).
    And if we have an odd integer before dividing by 2, then dividing gives us a .5
    number. The same goes for the right part of the neighborhood: the size will be
    a .0 number or a .5 number. Adding the left and right parts to get the total size
    is therefore guaranteed to give us another .0 or .5 number.


