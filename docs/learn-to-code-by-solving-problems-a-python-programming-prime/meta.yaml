  md: 'To write a while loop, we use Python’s while statement. A while loop is controlled
    by a Boolean expression. If the Boolean expression is True, then Python executes
    one iteration of the while loop. If the expression is still True, then Python
    executes another iteration of the while loop, and so on, until the Boolean expression
    is False. If the Boolean expression is False at the outset, then the loop does
    not run at all.


    while loops are *indefinite loops*: the number of iterations may not be known
    in advance.


    # Using while loops


    Let’s start with the following example of a while loop:


    ```

    >>> num = 0

    >>> while num < 5:

    ...     print(num)

    ...     num = num + 1

    ...

    0

    1

    2

    3

    4

    ```


    In a for loop, the loop variable is created for us; we don’t have to use an assignment
    statement to create the variable prior to the loop. But in a while loop, we get
    nothing for free. If we need a variable to loop through values in a while loop,
    then we have to create that variable ourselves. We do that here by making num
    refer to 0 prior to the loop ❶.


    The while loop itself is controlled by the Boolean expression num < 5 ❷. If num
    < 5 is True, then the code in the loop block will run. Right now, num refers to
    0, so the Boolean expression is True. We therefore run the loop block, which outputs
    0 and then increases num to 1 ❸.


    We jump back to the top of the loop and evaluate the num < 5 Boolean expression
    again. As num refers to 1, the expression is True. We therefore run the loop block
    again, which outputs 1 and then increases num to 2.


    Back to the top of the loop: is num < 5 still True? It is, because num is only
    2. That kicks off another iteration of the loop, which outputs 2 and increases
    num to 3.


    This pattern continues, with two more iterations of the loop: one when num refers
    to 3 and one when num refers to 4. When num refers to 5,'
