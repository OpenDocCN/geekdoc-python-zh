    # Problem #17: Farm Seeding


    We can use a loop to read a specified number of lines from a file. We’ll do that
    in this problem, and we’ll see that it’s similar to using a loop with `input`
    to read from standard input.


    In Chapter 6, when we solved Action Figures, we learned about top-down design
    using functions. It’s an important skill, composing multiple functions to solve
    a problem. And since there isn’t much more to say about files, I’ve chosen a problem
    that doubles as a site for top-down design.


    This is a challenging problem. We’ll first need to understand exactly what we’re
    being asked to do. After that, we’ll need to develop a way to solve the problem
    and think carefully about why our solution is correct.


    This is USACO 2019 February Bronze Contest problem The Great Revegetation.


    # The Challenge


    Farmer John has $n$ pastures, all of which he would like to seed with grass. The
    pastures are numbered 1, 2, . . . , $n$.


    Farmer John has four different types of grass seed, numbered 1, 2, 3, and 4. He’ll
    choose one of these grass types for each pasture.


    Farmer John also has $m$ cows. Each cow has two favorite pastures in which it
    eats grass. Each cow cares only about its two favorite pastures, no others. For
    a healthy diet, each cow requires that its two pastures have different types of
    grass. For example, for some given cow, it would be okay if one of its pastures
    had grass type 1 and the other had grass type 4. But it would not be okay if both
    of its pastures had grass type 1.'
