    \ `count`. We pass it a string argument, and it tells us how many occurrences\
    \ of that argument are found in our string:\n\n```\n>>> 'abc'.count('a')\n1\n\
    >>> 'abc'.count('q')\n0\n>>> 'aaabcaa'.count('a')\n5\n>>> 'aaabcaa'.count('ab')\n\
