    \n```python\n>>> search(list(range(1, 50001)), 50000)\n```\n\n它花了大约 30 秒。记住，我们的\
    \ `search` 函数搜索列表 50,000 次。所以，搜索一个长度为 50000 的列表总共 50,000 次需要 30 秒。我们可能会遇到一个需要这么多搜索的测试用例。例如，假设我们一次一个地向列表中添加\
    \ 100,000 个唯一的电子邮件地址。进行到一半时，我们将有一个包含 50,000 个值的列表；从那时起，剩余的 50,000 次 `in` 操作将作用于一个至少有\
