    # and Operator


    The and operator returns True if both of its operands are True, and returns False
    otherwise:


    ```

    >>> True and True

    True

    >>> True and False

    False

    >>> False and True

    False

    >>> False and False

    False

    ```


    The only way to get True out of the And operator is if both of its operands are
    True.

    The precedence of and is higher than or. Here’s an example of why this matters:


    ```

    >>> True or True and False

    True

    ```


    Python interprets that expression like this, with the and happening first:


    ```

    >>> True or (True and False)

    True

    ```


    The result is True because the first operand of or is True.

    We can force the or to happen first by including parentheses:


    ```

    >>> (True or True) and False

    False

    ```


    The result is False because the second operand of and is False.


