    # Chapter 10: Big O and Program Efficiency


    ![](img/3e15323aee4cec3bf673834bfafe8024_329_0.png)


    In the first seven chapters of this book, we focused on writing programs that
    were correct: for any valid input, we wanted our program to produce the desired
    output. In addition to correct code, though, we generally want efficient code,
    code that runs quickly even in the face of huge amounts of input. You may have
    received the occasional time limit exceeded error when working through the first
    seven chapters, but our first formal foray into program efficiency wasn’t until
    Chapter 8, when we solved Email Addresses. We saw there that sometimes we need
    to make our programs more efficient so that they can finish within a given time
    limit.


    In this chapter, we’ll first learn how programmers think and communicate about
    program efficiency. Then, we’ll study two problems where we’ll need to write efficient
    code: determining the most desired piece of a scarf and painting a ribbon.


    For each problem, we’ll see that our initial ideas lead to an algorithm that would
    not be efficient enough. But we’ll keep at it until we design a faster algorithm
    for the same problem, one that’s dramatically more efficient than before. This
    exemplifies a common workflow for programmers: first, come up with a correct algorithm;
    then, only if needed, make it faster.


    ## The Problem with Timing


    Each competitive programming problem that we solve in this book has a time limit
    on how long our program will be allowed to run. (I began including time limits
    in the problem descriptions of Chapter 8, when we started running into programming
    problems where efficiency is a serious concern.) If our program exceeds the time
    limit, then the judge terminates our program with a time limit exceeded error.
    A time limit is designed to prevent solutions that are too slow from passing the
    test cases. For example, perhaps we come up with a complete-search solution but
    the author of the problem has worked out a solution that’s much faster. That faster
    solution may be a variation of complete search, as it was when we solved the Cow
    Baseball problem in Chapter 9, or it may be a different approach entirely. Regardless,
    the time limit may be set such that our complete-search solution will not finish
    in time. As such, in addition to being correct, we may need our programs to be
    fast.


    We can run a program to explore whether it is efficient enough. For example, think
    back to “Efficiency of Searching a List” in Chapter 8 when we tried to solve Email
    Addresses using a list. We ran code that used bigger and bigger lists to get a
    sense of the amount of time taken by list operations. This kind of testing can
    give us some understanding of the efficiency of our programs. If our program is
    too slow, according to the time limit for the problem, then we know that we need
    to optimize the current code or find a wholly new approach.


    The amount of time taken by a program depends on the computer it is being run
    on. We don’t know what kind of computer the judge is using, but running the program
    on our own computer is still informative because the judge is probably using a
    computer that’s at least as fast as ours. Say that we run our program on our laptop
    and it takes 30 seconds on some small test case. If the problem time limit is
    three seconds, we can be confident that our program is simply not fast enough.


    An exclusive focus on time limits, however, is limiting. Think about our first
    solution to Cow Baseball in Chapter 9. We didn’t need to run that code to determine
    how slow it would be. That’s because we were able to characterize the program
    in terms of the amount of work that it would do if we did run it. For example,
    in “Efficiency of Our Program” on page 253, we said that for $n$ cows, our program
    processes $n^3$ triples of cows. Notice that our focus here is not on the number
    of seconds our program would take to run, but on how much work it does in terms
    of the amount of input $n$.


    There are significant advantages to this kind of analysis compared to running
    our programs and recording execution times. Here are five:'
