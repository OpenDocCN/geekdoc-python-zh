    >>> first % 35\n0\n```\n\nWe can just check first % 35 == 0 to determine whether\
    \ to pay Martha.\nI’ve updated Listing 4-1 to use the % operator. The new code\
    \ is in Listing 4-2.\n\n```\nquarters = int(input())\nfirst = int(input())\nsecond\
