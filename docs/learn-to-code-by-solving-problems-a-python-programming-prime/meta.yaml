    **dmopc15c7p2**。要在 DMOJ 上找到此问题，请点击 **Problems**，在搜索框中输入 **dmopc15c7p2**，然后点击 **Go**。你应该会看到该问题是唯一的结果。如果你点击问题标题，你应该会看到问题本身。


    当你准备好为某个问题提交 Python 代码时，找到该问题并点击 **Submit solution**。在出现的页面上，将你的 Python 代码粘贴到文本框中，然后点击
    **Submit!**。你的代码将被评判，并显示结果。


    ## Timus 评测网站


    要在 Timus 评测网站上创建账户，请访问 *https://acm.timus.ru/* 并点击 **Register**。在出现的注册页面上，输入你的姓名、密码、电子邮件地址和其他请求的信息。点击
    **Register** 创建你的账户。然后，检查你的电子邮件，查找来自 Timus 的包含你的评测 ID 的消息。每次提交 Python 代码时，你都需要你的评测
    ID。


    目前无法设置默认编程语言，因此在提交 Python 代码时，请务必选择可用的 Python 3 版本。


    我们只在第 6 章使用一次 Timus 评测网站，因此我不会在此处做更多说明。


    ## USACO 评测网站


    要在 USACO 评测网站上创建账户，请访问 *http://usaco.org/* 并点击 **Register for New Account**。在出现的注册页面上，输入你的用户名、电子邮件地址和其他请求的信息。点击
    **Submit** 创建你的账户。然后，检查你的电子邮件，查找来自 USACO 的包含你的密码的消息。获得密码后，你可以使用你的用户名和密码登录 USACO。


    目前无法设置默认编程语言，因此在提交 Python 代码时，请务必选择可用的 Python 3 版本。你还需要选择包含你的 Python 代码的文件，而不是将代码粘贴到文本框中。


    我们直到第 7 章才会使用 USACO 评测网站，因此我不会在此处做更多说明。


    ## 关于本书


    本书的每一章都由来自编程评测网站的两到三个问题驱动。事实上，我在每章开始时都会提出第一个问题，然后再教授任何新的 Python 知识！我这样做的目的是激励你想要学习解决问题所需的
    Python 特性。如果在阅读问题描述后你不确定如何解决问题，请不要担心。（如果你还不能解决这个问题，那么你读对书了！）如果你理解了问题要求你做什么，那么你就准备好了。我们将一起学习
    Python 并解决问题。本章后续的问题可能会引入更多的 Python 特性，或者要求我们扩展在第一个问题中学到的内容。每章末尾都有练习，你应该自己解决，以练习刚刚学到的内容。


    以下是我们将在每章学习的内容概要：


    **第 1 章：入门** 在我们能够使用 Python 解决任何问题之前，我们需要学习相当多的入门概念。在本章中，我们将学习这些概念，包括输入 Python
    代码、处理字符串和数字、使用变量、读取输入和写入输出。


    **第 2 章：做出决策** 在本章中，我们将学习 `if` 语句，它允许我们的程序根据特定条件是真还是假来决定做什么。


    **第 3 章：重复代码：确定循环** 许多程序只要还有工作要做就会继续运行。在本章中，我们将学习 `for` 循环，它让我们的程序处理每一条输入，直到工作完成。'
