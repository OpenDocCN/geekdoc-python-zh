    this 1 in there. With the 7 we found previously, we now have a total of 8.


    The next key is ''LACO''; its value is 2. The value for ''COLA'' is 1, giving
    2 * 1 = 2 special pairs of cities involving these combos. With the 8 we found
    previously, we now have a total of 10.


    There are two keys to go, ''MIMA'' and ''COLA''. The first leads us to add 6 to
    our total; the second leads us to add 2. With the 10 we found previously, we now
    have a total of 18.


    Remember that we''ve double-counted every special pair of cities. We don''t have
    18 unique special pairs of cities, then. We have only 18 / 2 = 9 special pairs
    of cities. All we need to do is divide by 2 to undo the double counting.


    If you compare the dictionary we just went through to the cities in the test case,
    you''ll notice that something is missing from the dictionary. It''s that city
    WASHOUGAL WA! Its combo is WAWA, but there''s no ''WAWA'' key in our dictionary.
    We''re not accounting for this city, and we need to understand why.


    The first two characters of WASHOUGAL WA are WA. This means that the only way
    for WASHOUGAL WA to be part of a special pair of cities is to find another city
    whose state is WA. Notice that WASHOUGAL WA is in state WA, too. However, the
    problem specifies that the two cities in a special pair of cities must come from
    different states. There''s therefore no way to find a special pair of cities involving
    WASHOUGAL WA. To make sure we don''t accidentally count fake special pairs, we
    don''t even include WASHOUGAL WA in the dictionary.'
  - "[PAGE 292]\n\n# Solving the Problem\n\nWe’re ready to go! We can use a dictionary\
    \ for a concise, rocket-fast solution to Cities and States. The code is in Listing\
    \ 8-7.\n\n```\ninput_file = open('citystate.in', 'r')\noutput_file = open('citystate.out',\
    \ 'w')\n\nn = int(input_file.readline())\n\n❶ combo_to_num = {}\n\nfor i in range(n):\n\
    \    lst = input_file.readline().split()\n    ❷ city = lst[0][:2]\n    state =\
    \ lst[1]\n    ❸ if city != state:\n        combo = city + state\n        if not\
    \ combo in combo_to_num:\n            combo_to_num[combo] = 1\n        else:\n\
    \            combo_to_num[combo] = combo_to_num[combo] + 1\n\ntotal = 0\n\n❹ for\
    \ combo in combo_to_num:\n    ❺ other_combo = combo[2:] + combo[:2]\n    if other_combo\
    \ in combo_to_num:\n        ❻ total = total + combo_to_num[combo] * combo_to_num[other_combo]\n\
    \n❼ output_file.write(str(total // 2) + '\\n')\n\ninput_file.close()\noutput_file.close()\n\
    ```\n\nListing 8-7: *Solving Cities and States*\n\nThis is a USACO problem where\
    \ we need to use files rather than standard input and standard output.\n\nThe\
    \ dictionary that we’ll build is called `combo_to_num` ❶. It maps from four-character\
    \ combos, like 'SCPA', to the number of cities with that combo.\n\nFor each city\
    \ from the input, we use variables to refer to the first two characters of the\
    \ name of the city ❷ and its state. Then, if these values are not the same ❸ ,\
    \ we combine them and add the combo to the"
  - '[PAGE 293]


    dictionary. If the combo wasn’t already in the dictionary, we add it with a value
    of 1; if it was already there, we increase its value by 1.


    The dictionary is now built. We loop through its keys ④. For each key, we construct
    the other combo that we need to look up to find special pairs of cities involving
    this key. If the key is ''SCPA'', for example, then we want the other combo to
    be ''PASC''. To do that, we take the rightmost two characters of the key and follow
    those by the leftmost two characters ⑤. If that other combo is also in the dictionary,
    then we multiply the two key’s values and add that to our total ⑥.


    All we need to do now is output the total number of special pairs of cities to
    the output file. As explained in the previous section, we need to divide our total
    by 2 ⑦ to undo the double-counting that results from processing each key in the
    dictionary.


    There we have it: another example of solving a problem with a suitable deployment
    of a dictionary. Feel free to submit our code!


    # Summary


    In this chapter, we learned about Python sets and dictionaries. A set is a collection
    of values with no order and no duplicates. A dictionary is a collection of key:value
    pairs. As we saw in this chapter’s problems, sometimes these collections are more
    appropriate than lists. For example, determining whether a value is in a set is
    ridiculously fast compared to the same operation on a list. If we don’t care about
    the order of values or want to eliminate duplicates, we should seriously consider
    using a set.


    Similarly, a dictionary makes it easy to determine the value mapped to by a key.
    If we’re maintaining a mapping from keys to values, then we should seriously consider
    using a dictionary.


    With sets and dictionaries in the mix, you now have more flexibility for how to
    store your values. This flexibility, however, means that you need to make a choice.
    Don’t default to using a list anymore! The difference between using one type or
    another might be the difference between solving the problem or not.


    We’ve reached an important milestone, as we’ve now covered most of the Python
    that I’ll be teaching you in this book. This doesn’t mean that your Python journey
    is complete. There’s a lot more to know about Python beyond what I’ve included
    in the book. This does mean, though, that we’ve reached a point where we can solve
    a wide variety of'
