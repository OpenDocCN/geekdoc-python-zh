    ```\n>>> len({'cut':4, 'gully':3})\n2\n>>> len({2: ['storm', 'brook']})\n1\n```\n\
    \n要创建一个空字典，我们使用 `{}`。这就是为什么我们不得不使用次优的 `set()` 语法来创建集合——字典获得了更好的语法：\n\n```\n>>>\
