- md: "## Another Limitation of for loops\n\nIn Chapter 3, we learned how for loops\
    \ can be used to process strings. A for loop plods through the string, from beginning\
    \ to end, one character at a time. In many cases, that’s precisely what we want.\
    \ In Three Cups, for example, we needed to look at each swap from left to right,\
    \ so we used a for loop over the string of swaps.\n\nIn other cases, that’s too\
    \ restrictive, and a range for loop may be more appropriate. A range for loop\
    \ gives us access to indices rather than characters. It also allows us to skip\
    \ through a sequence with whatever step size we choose. For example, we can use\
    \ a range for loop to visit every third character of a string:\n\n```\n>>> s =\
    \ 'zephyr'\n>>> for i in range(0, len(s), 3):\n...     print(s[i])\n...\nz\nh\n\
    ```\n\nWe can also use a range for loop to process a string from right to left\
    \ instead of left to right:\n\n```\n>>> for i in range(len(s) - 1, -1, -1):\n\
    ...     print(s[i])\n...\nr\ny\nh\np\ne\nz\n```\n\nAll of this assumes that we\
    \ want to step by a fixed amount on each iteration.\n\nWhat if sometimes we want\
    \ to move one character to the right and other times we want to move three characters\
    \ to the right? That’s not at all farfetched. In fact, if we could do that, then\
    \ we’d be well on our way to solving Secret Sentence.\n\nTo see why, consider\
    \ this test case:\n\nipi lipikepe yopoupu\n\nImagine that we’re reconstructing\
    \ Luka’s original sentence by copying characters to it. The first character in\
    \ the encoded sentence is the vowel i. This is the first character of Luka’s original\
    \ sentence, too. Based on how Luka encodes sentences, we know that the next two\
    \ characters will be p and i. We don’t want to include those in Luka’s original\
    \ sentence, so we need to skip over them. That is, after processing index 0, we\
    \ want to jump to index 3.\n\nIndex 3 is a space character. Since it isn’t a vowel,\
    \ we copy this character as is to Luka’s original sentence and then move to index\
    \ 4. Index 4 is l, another nonvowel, so we copy that too and move to index 5.\
    \ Here at index 5 we have a vowel; after copying it, we want to jump to index\
    \ 8.\n\nWhat’s the step size here? Sometimes we jump by three, but not always.\
    \ And sometimes we jump by one, but not always. It’s a mix of threes and ones.\
    \ for loops are not designed for this kind of processing.\n\nWith a while loop,\
    \ we can zip around a string however we please, unencumbered by predefined step\
    \ sizes.\n\n## while Loops Through Indices\n\nWriting a while loop that loops\
    \ through string indices isn’t any different from writing any other kind of while\
    \ loop. We just need to incorporate the string's length. Here's how we can loop\
    \ through each character of a string from left to right:\n\n```\n>>> s = 'zephyr'\n\
    >>> i = 0\n>>> while i < len(s):\n...     print('We have ' + s[i])\n...     i\
    \ = i + 1\n...\nWe have z\nWe have e\nWe have p\nWe have h\nWe have y\nWe have\
    \ r\n```\n\nThe variable i allows us to access each character of the string. It\
