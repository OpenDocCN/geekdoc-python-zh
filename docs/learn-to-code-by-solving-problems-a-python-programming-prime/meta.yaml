  md: 'This is now a single if statement, not three separate if statements. For this
    reason, don’t press ENTER at the ... prompt; instead, type the elif line.


    To execute this if statement, Python begins by evaluating the first Boolean expression
    ❶. If it’s True, then A is output, and the rest of the elifs are skipped. If it’s
    False, Python continues, evaluating the second Boolean expression ❷. If it’s True,
    then B is output, and the remaining elif is skipped. If it’s False, Python continues,
    evaluating the third Boolean expression ❸. If it’s True, then T is output.


    The keyword elif stands for “else-if.” Use this as a reminder that an elif expression
    is checked only if nothing “else” before it in the if statement was executed.


    This version of the code is equivalent to the previous code where we used three
    separate if statements. Had we wanted to allow the possibility of executing more
    than one block, we’d have to use three separate if statements, not a single if
    statement with elif blocks.


    # if with else


    We can use the else keyword to run code if all the Boolean expressions in the
    if statement are False. Here’s an example:


    ```

    >>> if apple_total > banana_total:

    ...     print(''A'')

    ... elif banana_total > apple_total:

    ...     print(''B'')

    ... else:

    ...     print(''T'')

    ...

    T

    ```


    Python evaluates the Boolean expressions from top to bottom. If any of them is
    True, Python runs the associated block and skips the rest of the if statement.
    If all the Boolean expressions are False, Python executes the else block.


    Notice that there is no longer a test for apple_total == banana_total. The only
    way to get to the else part of the if statement is if apple_total > banana_total
    is False and banana_total > apple_total is False, that is, if the values are equal.


    Should you use separate if statements? An if statement with elifs? An if statement
    with an else? It often comes down to preference. Use a chain'
