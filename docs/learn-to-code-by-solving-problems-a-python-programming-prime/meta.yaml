    \ by `secret_word`, which is `'olive'`.\n\nLike the `if`, `elif`, and `else` lines\
    \ of an `if` statement, the `for` line ends with a colon (`:`). And, also like\
    \ an `if` statement, a `for` statement has an indented block of one or more statements.\n\
    \nAn execution of the indented statements is referred to as an *iteration* of\
