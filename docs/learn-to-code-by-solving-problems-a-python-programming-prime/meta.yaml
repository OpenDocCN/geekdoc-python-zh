  md: 'Python.


    In addition to mode ''r'' for reading, there''s mode ''w'' for writing. If we
    use ''w'', then we''re opening a file so that we can put text in it.


    Be careful with mode ''w''. If you use ''w'' with a file that already exists,
    the contents of that file will be deleted. I just accidentally did that with my
    *word.in* file. No big deal, because it was easy to re-create. But no one would
    be happy if we accidentally overwrote an important file.


    If you use ''w'' with a filename that doesn''t exist, it creates an empty file.


    Let''s use mode ''w'' to create an empty file called *blah.in*:


    ```

    >>> open(''blah.in'', ''w'')

    <_io.TextIOWrapper name=''blah.in'' mode=''w'' encoding=''cp1252''>

    ```


    Now that *blah.in* exists, we can open it for reading without getting an error:


    ```

    >>> open(''blah.in'', ''r'')

    <_io.TextIOWrapper name=''blah.in'' mode=''r'' encoding=''cp1252''>

    ```


