  md: '```

    *

    Letter: i

    *

    Letter: v

    *

    Letter: e

    *

    ```


    Now we have two statements executing on each iteration of the loop: one that outputs
    the current letter of the string, and one that outputs a * character.


    A for loop loops through the elements of a sequence, so the sequence’s length
    tells us how many iterations there will be. The len function takes a string and
    returns its length:


    ```

    >>> len(''olive'')

    5

    ```


    Our for loop on ''olive'' will therefore consist of five iterations:


    ```

    >>> secret_word = ''olive''

    >>> print(len(secret_word), ''iterations, coming right up!'')

    >>> for char in secret_word:

    ...     print(''Letter: '' + char)

    ...

    5 iterations, coming right up!

    Letter: o

    Letter: l

    Letter: i

    Letter: v

    Letter: e

    ```


    I called print with multiple arguments ❶, rather than using concatenation, to
    avoid having to convert the length to a string.


    A for loop is what’s called a *definite loop*, referring to the idea that the
    number of iterations is predetermined. There are also *indefinite loops*, whose
    iterations depend on the vagaries of what happens when your program runs. We’ll
    study those in the next chapter.


