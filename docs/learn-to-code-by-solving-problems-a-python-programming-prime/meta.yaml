    \    print('We have ' + s[i])\n...     i = i - 1\n...\nWe have r\nWe have y\n\
    We have h\nWe have p\nWe have e\nWe have z\n```\n\nA final use case for a while\
    \ loop on a string: stopping at the first index that meets some criterion. The\
    \ strategy is to use the Boolean and operator to continue while there are more\
    \ characters to check and we haven’t yet met our criterion. For example, here\
    \ is how we can find the index of the first 'y' in a string:\n\n```\n>>> i = 0\n\
    >>> while i < len(s) and s[i] != 'y':\n...     i = i + 1\n...\n>>> print(i)\n\
    4\n```\n\nIf there’s no 'y' anywhere in the string, the loop stops when i equals\
    \ the string length:\n\n```\n>>> s = 'breeze'\n>>> i = 0\n>>> while i < len(s)\
