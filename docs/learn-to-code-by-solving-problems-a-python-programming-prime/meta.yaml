    # The Challenge


    Students would like to go on a school trip at the end of the year, but they need
    money to pay for it. To raise money, they have organized a brunch. To attend the
    brunch, a student in their first year pays $12, a student in their second year
    pays $10, a student in their third year pays $7, and a student in their fourth
