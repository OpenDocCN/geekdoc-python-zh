    # Log Time


    In “Efficiency of Our Program” on page 255, we discussed the difference between
    linear search and binary search. A linear search finds a value in a list by searching
    the list from beginning to end. That’s an *O(n)* algorithm. It works whether or
    not the list is sorted. A binary search, by contrast, works only on a sorted list.
    But if you have a sorted list, then binary search is blazingly fast.


    Binary search works by comparing the value we’re searching for to the value at
    the middle of the list. If the value at the middle of the list is larger than
    the value we’re searching for, we continue searching in the left half of the list.
    If the value at the middle of the list is smaller than the value we’re searching
    for, we continue searching in the right half of the list. We keep doing this,
    ignoring half of the list each time, until we find the value that we’re looking
    for.


    Suppose we use binary search to find a value in a list of 512 values. How many
    steps does it take? Well, after one step, we’ve ignored half the list, so we’re
    left with about 512 / 2 = 256 values. (It doesn’t matter whether our value is
    larger than half of the values in the list or smaller than half the values in
    the list; in each case, we ignore one half of the list.) After two steps, we’re
    left with 256 / 2 = 128 values. After three steps, we’re left with 128 / 2 = 64
    values. Continuing, after four steps we have 32 values, after five steps we have
    16 values, after six steps we have 8 values, after seven steps we have 4 values,
    after eight steps we have 2 values, and after nine steps we have only 1 value.


    Nine steps—that’s it! That’s way better than taking up to 512 steps using linear
    search. Binary search does far less work than a linear-time algorithm. But what
    kind of algorithm is it? It’s not constant time: while it takes very few steps,
    the number of steps does increase a little as the amount of input increases.


    Binary search is an example of a *logarithmic-time* or *log-time* algorithm. In
    big O notation, we say that a logarithmic-time algorithm is *O(log n)*.'
- md: "## Logarithmic-time\n\nLogarithmic-time refers to the logarithm function in\
    \ mathematics. Given a number, this function tells you the number of times you\
    \ have to divide that number by a base to get to 1 or less. The base we typically\
    \ use in computer science is 2, so we’re looking for the number of times you have\
    \ to divide a number by 2 to get to 1 or less. For example, it takes 9 divisions\
    \ by 2 to take 512 down to 1. We write this as $\\log_2 512 = 9$.\n\nThe logarithm\
    \ function is the inverse of the exponential function, the latter of which may\
    \ be more familiar to you. Another way to calculate $\\log_2 512$ is to find the\
    \ power $p$ so that $2^p = 512$. Since $2^9 = 512$, we confirm that $\\log_2 512\
    \ = 9$.\n\nIt’s shocking how slowly the logarithm function grows. For example,\
    \ consider a list of one million values. How many steps would binary search take\
    \ to search that? It takes $\\log_2 1,000,000$ steps, which is only about 20.\
    \ Logarithmic-time is much closer to constant-time than it is to linear-time.\
    \ It’s a huge win any time you can replace a linear-time algorithm by a logarithmic-time\
    \ one.\n\n## n log n Time\n\nIn Chapter 5, we solved the Village Neighborhood\
    \ problem. I’ve reproduced our solution from Listing 5-1 here:\n\n```\nn = int(input())\n\
    \npositions = []\n\nfor i in range(n):\n    positions.append(int(input()))\n\n\
    positions.sort()\n\nleft = (positions[1] - positions[0]) / 2\nright = (positions[2]\
    \ - positions[1]) / 2\nmin_size = left + right\nfor i in range(2, n - 1):\n  \
    \  left = (positions[i] - positions[i - 1]) / 2\n    right = (positions[i + 1]\
    \ - positions[i]) / 2\n    size = left + right\n    if size < min_size:\n    \
    \    min_size = size\n\nprint(min_size)\n```\n\nLooks like a linear-time algorithm,\
    \ eh? I mean, there’s a linear-time loop to read the input ❶ and another linear-time\
    \ loop to find the minimum size ❸. Is this code $O(n)$, then?\n\nIt’s too early\
    \ to tell! The reason is that we haven’t yet taken into account that we sort the\
    \ positions ❷. We can’t just ignore that; we need to know about the efficiency\
    \ of sorting. As we’ll see, sorting is slower than linear time. So, since sorting\
    \ is the slowest step here, whatever the efficiency is of sorting will be the\
    \ efficiency overall.\n\nProgrammers and computer scientists have devised many\
    \ sorting algorithms, and these algorithms can roughly be divided into two groups.\
    \ The first group consists of algorithms that take $O(n^2)$ time. The three most\
    \ famous of these sorting algorithms are bubble sort, selection sort, and insertion\
    \ sort. You can learn more about these sorting algorithms on your own if you like,\
    \ but we won’t need to know anything about them to continue here. All we have\
    \ to keep in mind is that $O(n^2)$ can be quite slow. For example, to sort a list\
    \ of 10,000 values, an $O(n^2)$ sorting algorithm would take about $10,000^2 =\
    \ 100,000,000$ steps. As we know, this would take any computer at least a few\
    \ seconds. That’s pretty disappointing: sorting 10,000 values feels like something\
    \ computers should be able to do almost instantly.\n\nEnter the second group of\
    \ sorting algorithms. This group consists of algorithms that take only $O(n \\\
    log n)$ time. There are two famous sorting algorithms in this group: quick sort\
    \ and merge sort. Again, you’re free to look them up if you like, but we don’t\
    \ need the details here.\n\nWhat does $O(n \\log n)$ mean? Don’t let the notation\
    \ confuse you. It’s just the multiplication of $n$ by $\\log n$. Let’s try this\
    \ out on a list of 10,000 values. Here, we have $10,000 * \\log 10,000$ steps,\
    \ which is only about 132,877. This is a very small number of steps, especially\
    \ compared to the 100,000,000 steps taken by the $O(n^2)$ sorting algorithms.\n\
    \nNow we can ask the question we really care about: what sorting algorithm is\
    \ Python using when we ask it to sort a list? Answer: an $O(n \\log n)$ one! (It’s\
    \ called Timsort. If you’d like to learn more, start with merge sort, because\
    \ Timsort is a souped-up merge sort.) No slow $O(n^2)$ sorting here. In general,\
    \ sorting is so fast—so close to linear time—that we can use it without affecting\
    \ our efficiency too much.\n\nReturning to Village Neighborhood, now we see that\
    \ its efficiency is not $O(n)$ but, because of the sort, $O(n \\log n)$. In practice,\
    \ an $O(n \\log n)$ algorithm only does a little more work than an $O(n)$ algorithm\
    \ and far less than an $O(n^2)$ algorithm. If your goal is to design an $O(n)$\
    \ algorithm, designing one that’s $O(n \\log n)$ is probably good enough.\n\n\
    ## Handling Function Calls\n\nStarting in Chapter 6, we wrote our own functions\
    \ to help us design larger programs. In our big O analysis, we need to be careful\
    \ to include the work done when we call these functions.\n\nLet’s revisit the\
    \ Card Game problem from Chapter 6. We solved it in Listing 6-1, and part of our\
    \ solution involved calling our `no_high` function. I’ve reproduced that solution\
    \ here:\n\n```\nNUM_CARDS = 52\n\ndef no_high(lst):\n    \"\"\"\n    lst is a\
    \ list of strings representing cards.\n\n    Return True if there are no high\
    \ cards in lst, False otherwise.\n    \"\"\"\n    if 'jack' in lst:\n        return\
    \ False\n    if 'queen' in lst:\n        return False\n    if 'king' in lst:\n\
    \        return False\n    if 'ace' in lst:\n        return False\n    return\
    \ True\n\ndeck = []\n\nfor i in range(NUM_CARDS):\n    deck.append(input())\n\n\
    score_a = 0\nscore_b = 0\nplayer = 'A'\n\nfor i in range(NUM_CARDS):\n    card\
    \ = deck[i]\n    points = 0\n    remaining = NUM_CARDS - i - 1\n    if card ==\
    \ 'jack' and remaining >= 1 and no_high(deck[i+1:i+2]):\n        points = 1\n\
    \    elif card == 'queen' and remaining >= 2 and no_high(deck[i+1:i+3]):\n   \
    \     points = 2\n    elif card == 'king' and remaining >= 3 and no_high(deck[i+1:i+4]):\n\
    \        points = 3\n    elif card == 'ace' and remaining >= 4 and no_high(deck[i+1:i+5]):\n\
    \        points = 4\n\n    if points > 0:\n        print(f'Player {player} scores\
    \ {points} point(s).')\n\n    if player == 'A':\n        score_a = score_a + points\n\
    \        player = 'B'\n    else:\n        score_b = score_b + points\n       \
    \ player = 'A'\n\nprint(f'Player A: {score_a} point(s).')\nprint(f'Player B: {score_b}\
    \ point(s).')\n```\n\nWe’ll use $n$ to represent the number of cards. The `no_high`\
    \ function ❶ takes a list and uses `in` on it, so we might conclude that it is\
    \ $O(n)$ time. (`in` may have to search the whole list to find what it’s looking\
    \ for, after all.) However, we only ever call `no_high` with lists of constant\
    \ size—maximum four cards—so we can treat each call of `no_high` as $O(1)$ time.\n\
    \nNow that we understand the efficiency of `no_high`, we can determine the big\
    \ O efficiency of the complete program. We begin with a loop that takes $O(n)$\
    \ time to read the cards ❷. We then enter another loop that iterates $n$ times\
    \ ❸. Each iteration takes just a constant number of steps, possibly including\
    \ a call of `no_high` that takes a constant number of steps. This loop, then,\
    \ takes $O(n)$ time. The program therefore consists of two $O(n)$ pieces, so it\
    \ is $O(n)$ overall.\n\nBe careful to accurately judge the amount of work performed\
    \ when a function is called. As you just saw with `no_high`, this may involve\
    \ looking at both the function itself and the context in which it is called.\n\
    \n### CONCEPT CHECK\n\nWhat is the big O efficiency of the following algorithm?\n\
    \n```\ndef f(lst):\n    for i in range(len(lst)):\n        lst[i] = lst[i] + 1\n\
    \n# Assume that lst refers to a list of numbers\nfor i in range(len(lst)):\n \
    \   f(lst)\n```\n\n- A. $O(1)$\n- B. $O(n)$\n- C. $O(n^2)$\n\nAnswer: C. The loop\
    \ in the main program iterates $n$ times. On each iteration, we call function\
    \ f, which itself has a loop that iterates $n$ times.\n\n## Summary\n\nThe algorithms\
    \ that do the least work are $O(1)$, followed by $O(\\log n)$, followed by $O(n)$,\
    \ followed by $O(n \\log n)$. Have you solved a problem using one of these four?\
    \ If so, you’re probably done. If not, then depending on the time limit, you may\
    \ have more work to do.\n\nWe’re now going to look at two problems where a straightforward\
    \ solution will not be efficient enough—it won’t run within the time limit. Using\
    \ what we just learned about big O, we’ll be able to predict this inefficiency\
    \ even without implementing the code! We’ll then work on a faster solution and\
    \ implement it to solve the problem within the time limit.\n\n## Problem #24:\
    \ Longest Scarf\n\nIn this problem, we’ll determine the longest desired scarf\
    \ that we can produce by cutting an initial scarf. After reading the following\
    \ description, pause: how would you solve it? Can you come up with multiple algorithms\
    \ whose efficiency you’d like to investigate?\n\nThis is DMOJ problem dmopc20c2p2."
  mdcn: "## 对数时间\n\n对数时间指的是数学中的对数函数。给定一个数字，这个函数告诉你需要将该数字除以多少次底数才能得到1或更小的数。在计算机科学中，我们通常使用的底数是2，因此我们关注的是需要将一个数字除以2多少次才能得到1或更小的数。例如，将512除以2九次才能得到1。我们将其写作\
    \ $\\log_2 512 = 9$。\n\n对数函数是指数函数的反函数，后者可能更让你熟悉。计算 $\\log_2 512$ 的另一种方法是找到一个幂\
    \ $p$，使得 $2^p = 512$。由于 $2^9 = 512$，我们确认 $\\log_2 512 = 9$。\n\n对数函数的增长速度之慢令人震惊。例如，考虑一个包含一百万个值的列表。二分查找需要多少步来搜索它？它需要\
    \ $\\log_2 1,000,000$ 步，这大约只有20步。对数时间比线性时间更接近常数时间。任何时候，只要你能用对数时间算法替换线性时间算法，这都是一个巨大的胜利。\n\
    \n## n log n 时间\n\n在第5章中，我们解决了村庄邻里问题。我在这里重现了我们从代码清单5-1中的解决方案：\n\n```\nn = int(input())\n\
    \npositions = []\n\nfor i in range(n):\n    positions.append(int(input()))\n\n\
    positions.sort()\n\nleft = (positions[1] - positions[0]) / 2\nright = (positions[2]\
    \ - positions[1]) / 2\nmin_size = left + right\nfor i in range(2, n - 1):\n  \
    \  left = (positions[i] - positions[i - 1]) / 2\n    right = (positions[i + 1]\
    \ - positions[i]) / 2\n    size = left + right\n    if size < min_size:\n    \
    \    min_size = size\n\nprint(min_size)\n```\n\n看起来像是一个线性时间算法，对吧？我的意思是，有一个线性时间的循环来读取输入❶，另一个线性时间的循环来找到最小尺寸❸。那么，这段代码是\
    \ $O(n)$ 吗？\n\n现在下结论还为时过早！原因是我们还没有考虑到我们对位置进行了排序❷。我们不能忽视这一点；我们需要了解排序的效率。正如我们将看到的，排序比线性时间慢。因此，由于排序是这里最慢的步骤，无论排序的效率如何，它都将决定整体的效率。\n\
    \n程序员和计算机科学家已经设计了许多排序算法，这些算法大致可以分为两组。第一组包括需要 $O(n^2)$ 时间的算法。其中最著名的三种排序算法是冒泡排序、选择排序和插入排序。如果你愿意，可以自行了解更多关于这些排序算法的信息，但在这里我们不需要了解它们的任何细节。我们只需要记住\
    \ $O(n^2)$ 可能相当慢。例如，要对一个包含10,000个值的列表进行排序，一个 $O(n^2)$ 排序算法大约需要 $10,000^2 = 100,000,000$\
    \ 步。我们知道，这将使任何计算机至少需要几秒钟。这相当令人失望：对10,000个值进行排序感觉应该是计算机几乎能立即完成的事情。\n\n现在来看第二组排序算法。这一组包括只需要\
    \ $O(n \\log n)$ 时间的算法。这一组中有两个著名的排序算法：快速排序和归并排序。同样，如果你愿意，可以自行查阅，但我们这里不需要细节。\n\n\
    $O(n \\log n)$ 是什么意思？不要让符号迷惑你。它只是 $n$ 乘以 $\\log n$。让我们在一个包含10,000个值的列表上试试。这里，我们有\
    \ $10,000 * \\log 10,000$ 步，这大约只有132,877步。这是一个非常小的步数，特别是与 $O(n^2)$ 排序算法所需的100,000,000步相比。\n\
    \n现在我们可以问我们真正关心的问题：当我们要求Python对一个列表进行排序时，它使用的是哪种排序算法？答案是：一个 $O(n \\log n)$ 的算法！（它被称为Timsort。如果你想了解更多，可以从归并排序开始，因为Timsort是一个增强版的归并排序。）这里没有缓慢的\
    \ $O(n^2)$ 排序。总的来说，排序非常快——非常接近线性时间——我们可以使用它而不会过多影响我们的效率。\n\n回到村庄邻里问题，现在我们看到它的效率不是\
    \ $O(n)$，而是由于排序，是 $O(n \\log n)$。实际上，一个 $O(n \\log n)$ 算法只比一个 $O(n)$ 算法多做一点工作，远少于一个\
    \ $O(n^2)$ 算法。如果你的目标是设计一个 $O(n)$ 算法，那么设计一个 $O(n \\log n)$ 的算法可能就足够好了。\n\n## 处理函数调用\n\
    \n从第6章开始，我们编写了自己的函数来帮助我们设计更大的程序。在我们的大O分析中，我们需要小心地包含调用这些函数时所做的工作。\n\n让我们重新审视第6章的纸牌游戏问题。我们在代码清单6-1中解决了它，我们解决方案的一部分涉及调用我们的\
    \ `no_high` 函数。我在这里重现了那个解决方案：\n\n```\nNUM_CARDS = 52\n\ndef no_high(lst):\n  \
    \  \"\"\"\n    lst is a list of strings representing cards.\n\n    Return True\
    \ if there are no high cards in lst, False otherwise.\n    \"\"\"\n    if 'jack'\
    \ in lst:\n        return False\n    if 'queen' in lst:\n        return False\n\
    \    if 'king' in lst:\n        return False\n    if 'ace' in lst:\n        return\
    \ False\n    return True\n\ndeck = []\n\nfor i in range(NUM_CARDS):\n    deck.append(input())\n\
    \nscore_a = 0\nscore_b = 0\nplayer = 'A'\n\nfor i in range(NUM_CARDS):\n    card\
    \ = deck[i]\n    points = 0\n    remaining = NUM_CARDS - i - 1\n    if card ==\
    \ 'jack' and remaining >= 1 and no_high(deck[i+1:i+2]):\n        points = 1\n\
    \    elif card == 'queen' and remaining >= 2 and no_high(deck[i+1:i+3]):\n   \
    \     points = 2\n    elif card == 'king' and remaining >= 3 and no_high(deck[i+1:i+4]):\n\
    \        points = 3\n    elif card == 'ace' and remaining >= 4 and no_high(deck[i+1:i+5]):\n\
    \        points = 4\n\n    if points > 0:\n        print(f'Player {player} scores\
    \ {points} point(s).')\n\n    if player == 'A':\n        score_a = score_a + points\n\
    \        player = 'B'\n    else:\n        score_b = score_b + points\n       \
    \ player = 'A'\n\nprint(f'Player A: {score_a} point(s).')\nprint(f'Player B: {score_b}\
    \ point(s).')\n```\n\n我们将用 $n$ 来表示卡片的数量。`no_high` 函数❶接受一个列表并在其上使用 `in`，因此我们可能得出结论它是\
    \ $O(n)$ 时间。（毕竟，`in` 可能必须搜索整个列表才能找到它要找的东西。）然而，我们只用常数大小的列表——最多四张卡片——来调用 `no_high`，因此我们可以将每次\
    \ `no_high` 的调用视为 $O(1)$ 时间。\n\n现在我们理解了 `no_high` 的效率，我们可以确定整个程序的大O效率。我们从一个需要\
    \ $O(n)$ 时间来读取卡片的循环开始❷。然后我们进入另一个循环，该循环迭代 $n$ 次❸。每次迭代只需要常数步，可能包括一次需要常数步的 `no_high`\
    \ 调用。因此，这个循环需要 $O(n)$ 时间。因此，程序由两个 $O(n)$ 部分组成，所以整体是 $O(n)$。\n\n要小心准确判断函数调用时执行的工作量。正如你刚才在\
    \ `no_high` 中看到的，这可能涉及查看函数本身及其被调用的上下文。\n\n### 概念检查\n\n以下算法的大O效率是什么？\n\n```\ndef\
    \ f(lst):\n    for i in range(len(lst)):\n        lst[i] = lst[i] + 1\n\n# Assume\
    \ that lst refers to a list of numbers\nfor i in range(len(lst)):\n    f(lst)\n\
    ```\n\n- A. $O(1)$\n- B. $O(n)$\n- C. $O(n^2)$\n\n答案：C。主程序中的循环迭代 $n$ 次。每次迭代，我们调用函数f，该函数本身有一个迭代\
    \ $n$ 次的循环。\n\n## 总结\n\n做最少工作的算法是 $O(1)$，其次是 $O(\\log n)$，然后是 $O(n)$，接着是 $O(n\
    \ \\log n)$。你是否使用过这四种算法之一来解决问题？如果是，那么你可能已经完成了。如果不是，那么根据时间限制，你可能还有更多工作要做。\n\n我们现在将看两个问题，其中直接的解决方案效率不够——它无法在时间限制内运行。利用我们刚刚学到的大O知识，即使不实现代码，我们也能预测这种低效性！然后我们将研究一个更快的解决方案并实现它，以在时间限制内解决问题。\n\
    \n## 问题 #24：最长围巾\n\n在这个问题中，我们将确定通过切割初始围巾可以制作出的最长所需围巾。阅读以下描述后，暂停一下：你会如何解决它？你能想出多个你想研究其效率的算法吗？\n\
    \n这是DMOJ问题 dmopc20c2p2。"
