    \n## 集合\n\n*集合*是一种 Python 类型，用于存储一组值，其中不允许重复值。我们使用花括号来界定集合。与列表不同，集合可能不会按照你指定的顺序维护值。这是一个整数集合：\n\
    \n```python\n>>> {13, 15, 30, 45, 61}\n{45, 13, 15, 61, 30}\n```\n\n注意 Python\
