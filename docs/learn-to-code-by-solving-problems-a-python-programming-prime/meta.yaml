    It’s too early to tell! The reason is that we haven’t yet taken into account that
    we sort the positions ❷. We can’t just ignore that; we need to know about the
    efficiency of sorting. As we’ll see, sorting is slower than linear time. So, since
    sorting is the slowest step here, whatever the efficiency is of sorting will be
    the efficiency overall.


    Programmers and computer scientists have devised many sorting algorithms, and
    these algorithms can roughly be divided into two groups. The first group consists
    of algorithms that take $O(n^2)$ time. The three most famous of these sorting
    algorithms are bubble sort, selection sort, and insertion sort. You can learn
    more about these sorting algorithms on your own if you like, but we won’t need
    to know anything about them to continue here. All we have to keep in mind is that
    $O(n^2)$ can be quite slow. For example, to sort a list of 10,000 values, an $O(n^2)$
    sorting algorithm would take about $10,000^2 = 100,000,000$ steps. As we know,
    this would take any computer at least a few seconds. That’s pretty disappointing:
    sorting 10,000 values feels like something computers should be able to do almost
    instantly.


    Enter the second group of sorting algorithms. This group consists of algorithms
    that take only $O(n \log n)$ time. There are two famous sorting algorithms in
    this group: quick sort and merge sort. Again, you’re free to look them up if you
    like, but we don’t need the details here.


    What does $O(n \log n)$ mean? Don’t let the notation confuse you. It’s just the
    multiplication of $n$ by $\log n$. Let’s try this out on a list of 10,000 values.
    Here, we have $10,000 * \log 10,000$ steps, which is only about 132,877. This
    is a very small number of steps, especially compared to the 100,000,000 steps
    taken by the $O(n^2)$ sorting algorithms.


    Now we can ask the question we really care about: what sorting algorithm is Python
    using when we ask it to sort a list? Answer: an $O(n \log n)$ one! (It’s called
    Timsort. If you’d like to learn more, start with merge sort, because Timsort is
    a souped-up merge sort.) No slow $O(n^2)$ sorting here. In general, sorting is
    so fast—so close to linear time—that we can use it without affecting our efficiency
    too much.


    Returning to Village Neighborhood, now we see that its efficiency is not $O(n)$
    but, because of the sort, $O(n \log n)$. In practice, an $O(n \log n)$'
