    # if with elif


    Let’s use three successive if statements to print A if the Apples win, B if the
    Bananas win, and T if it’s a tie:


    ```

    >>> apple_total = 6

    >>> banana_total = 6

    >>> if apple_total > banana_total:

    ...     print(''A'')

    ...

    >>> if banana_total > apple_total:

    ...     print(''B'')

    ...

    >>> if apple_total == banana_total:

    ...     print(''T'')

    ...

    T

    ```


    The blocks of the first two if statements are skipped, because their Boolean expressions
    are False. But the block of the third if statement executes, producing the T.


    When you put one if statement after another, they’re independent. Each Boolean
    expression is evaluated, regardless of whether the previous Boolean expressions
    were True or False.


    For any given values of apple_total and banana_total, only one of our if statements
    can run. For example, if apple_total > banana_total is True, then the first if
    statement will run, but the other two will not. It’s possible to write the code
    to highlight that only one block of code is allowed to run. Here’s how we can
    do that:


    ```

    ❶ >>> if apple_total > banana_total:

    ...     print(''A'')

    ❷ ... elif banana_total > apple_total:

    ...     print(''B'')

    ... elif apple_total == banana_total:

    ...     print(''T'')

    ...

    T

    ```'
