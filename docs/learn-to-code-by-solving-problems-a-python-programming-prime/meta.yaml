    parking space. For example, CC. means that the first two parking spaces were occupied
    and the third was empty.


    +   - The third line contains a string of $n$ characters for today’s information,
    in the same format as the second line.


    # Output


    Output the number of parking spaces that were occupied on both days.


    # A New Kind of Loop


    We could have up to 100 parking spaces, so you may not be surprised that a loop
    will show up here somewhere. The kind of for loop we learned when solving Three
    Cups can certainly loop through a string of parking-space information:


    ```

    >>> yesterday = ''CC.''

    >>> for parking_space in yesterday:

    ...     print(''The space is '' + parking_space)

    ...

    The space is C

    The space is C

    The space is .

    ```


    That tells us whether each space was occupied yesterday. But we also need to know
    whether each space was also occupied today.

    Consider this test case:


    ```

    3

    CC.

    .C.

    ```


    The first parking space was occupied yesterday. Was that parking space occupied
    on both days? To answer that, we need to look at the corresponding character in
    today’s string. It’s a . (empty), so this parking space was not occupied on both
    days.

    What about the second parking space? That one was also occupied yesterday. And,
    looking at the second character of today’s string, it was also occupied today.
    So this *is* a parking space that was occupied on both days. (This is the only
    such parking space; the correct output for this test case is 1.)'
  - "[PAGE 93]\n\nLooping through the characters of one string doesn’t help us find\
    \ the corresponding characters in the other string. But if we could keep track\
    \ of where we were in the string—we’re at the first parking space, we’re at the\
    \ second parking space, and so on—we could look up the corresponding character\
    \ from each string. The for loops we’ve learned so far are not the way to do this.\
    \ The way to do this is using indexing and a new type of for loop.\n\n# Indexing\n\
    \nEach character in a string has an *index*, which indicates its location. The\
    \ first character is at index 0, the second character is at index 1, and so on.\
    \ In natural language, we often start counting at 1. In English, no one says “the\
    \ character at position 0 of *hello* is *h*.” But most programming languages,\
    \ Python included, start at 0.\n\nTo use indexing, we follow a string by an index\
    \ in square brackets. Here are some examples of indexing:\n\n```\n>>> word = 'splore'\n\
    >>> word[0]\n's'\n>>> word[3]\n'o'\n>>> word[5]\n'e'\n```\n\nIf we like, we can\
    \ use variables in an index:\n\n```\n>>> where = 2\n>>> word[where]\n'l'\n>>>\
    \ word[where + 2]\n'r'\n```\n\nThe highest index that we can use on a nonempty\
    \ string is its length minus 1. (There is no valid index for an empty string.)\
    \ For example, 'splore' is length 6, so index 5 is its highest index. Any bigger\
    \ and we get an error:\n\n```\n>>> word[len(word)]\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nIndexError: string index out\
    \ of range\n```"
- md: "## CONCEPT CHECK\n\nWhat is the output of the following code?\n\n```\ns = 'abcde'\n\
    t = s[0] + s[-5] + s[len(s) - 5]\n\nprint(t)\n```\n\n- A. aaa\n- B. aae\n- C.\
    \ aee\n- D. This code produces an error\n\nAnswer: A. Each of the three indices\
    \ refers to the first character in 'abcde'. First, s[0] refers to 'a' because\
    \ 'a' is at index 0 of the string. Second, s[-5] refers to 'a' because 'a' is\
    \ the fifth character from the right. Third, s[len(s) - 5] refers to 'a' because\
    \ the index evaluates to 0: 5 (the length of the string) minus 5.\n\n## Range\
    \ for loops\n\nPython’s range function generates ranges of integers, and we can\
    \ use those ranges to control for loops. Rather than looping through the characters\
    \ of a string, a range for loop loops through integers. If we provide one argument\
    \ to range, we get a range from 0 to 1 less than that argument:\n\n```\n>>> for\
    \ num in range(5):\n...     print(num)\n...\n0\n1\n2\n3\n4\n```\n\nNotice that\
    \ 5 is not output.\nIf we provide two arguments to range, we get a sequence from\
    \ the first argument up to but not including the second argument:\n\n```\n>>>\
    \ for num in range(3, 7):\n...     print(num)\n...\n3\n4\n5\n6\n```\n\nWe can\
    \ count up by a different *step size* by including a third argument. The default\
    \ step size is 1, which counts up by one. Let’s try a couple of other step sizes:\n\
    \n```\n>>> for num in range(0, 10, 2):\n...     print(num)\n...\n0\n2\n4\n6\n\
    8\n\n>>> for num in range(0, 10, 3):\n...     print(num)\n...\n0\n3\n6\n9\n```\n\
    \nWe can count backward, too, but *not* like this:\n\n```\n>>> for num in range(6,\
    \ 2):\n...     print(num)\n...\n```\n\nThat doesn’t work, because by default `range`\
    \ counts up. A step size of -1 lets us go backward, one at a time:\n\n```\n>>>\
    \ for num in range(6, 2, -1):\n...     print(num)\n...\n6\n5\n4\n3\n```\n\nTo\
    \ count down from 6 to 0, including 0, we need a value of -1 for the second argument:\n\
    \n```\n>>> for num in range(6, -1, -1):\n...     print(num)\n...\n6\n5\n4\n3\n\
    ```\n\nIt’s sometimes helpful to quickly look at the numbers in a range without\
    \ coding a loop. Unfortunately, the range function doesn’t directly show us those\
    \ numbers:\n\n```\n>>> range(3, 7)\nrange(3, 7)\n```\n\nWe can pass that result\
    \ to the list function to get what we want:\n\n```\n>>> list(range(3, 7))\n[3,\
    \ 4, 5, 6]\n```\n\nWhen called with a range, the list function produces a list\
    \ of the range’s integers. We’ll learn all about lists later; for now, keep list\
    \ in mind as an aid to diagnosing errors with ranges.\n\n## CONCEPT CHECK\n\n\
    How many iterations are performed by the following loop?\n\n```\nfor i in range(10,\
    \ 20):\n    # Some code here\n```\n\n- A. 9\n- B. 10\n- C. 11\n- D. 20\n\nAnswer:\
    \ B. The range goes through the numbers 10, 11, 12, 13, 14, 15, 16, 17, 18, and\
    \ 19. There are 10 numbers and hence 10 iterations.\n\n## Range for Loops Through\
    \ Indices\n\nSuppose we have strings giving yesterday’s and today’s parking-space\
    \ information:\n\n```\n>>> yesterday = 'CC.'\n>>> today = '.C.'\n```\n\nGiven\
    \ an index, we can look at yesterday’s and today’s information for that index:\n\
    \n```\n>>> yesterday[0]\n'C'\n>>> today[0]\n'.'\n```\n\nWe can use a range for\
    \ loop through the indices to process each pair of corresponding characters. We\
    \ know that yesterday and today are the same length. But that length could be\
    \ anything from 1 to 100, so we can’t write something like range(3). We want to\
    \ iterate with indices 0, 1, 2, and so on, all the way up to the length of the\
    \ string minus 1. We can do that by using the length of one of the strings as\
    \ the argument to range:\n\n```\n>>> for index in range(len(yesterday)):\n...\
    \     print(yesterday[index], today[index])\n...\nC .\nC C\n..\n```\n\nI’ve called\
    \ the loop variable index. Other popular names include i (the first letter of\
    \ index) and ind. I’ll use i from here on out.\n\nDon’t call this loop variable\
    \ status or information. Those names imply that it takes on 'C' and '.' values,\
    \ when really it takes on integers.\n\n## Solving the Problem\n\nWith our range\
    \ for loops, we’re ready to solve Occupied Spaces. Our strategy is to loop through\
    \ each index from the beginning of the strings to the end. We can check what’s\
    \ at each index in both yesterday’s information and today’s information. Using\
    \ a nested if statement, we’ll determine whether the parking space was occupied\
    \ on both days.\n\nListing 3-3 has our solution.\n\n```\nn = int(input())\nyesterday\
    \ = input()\ntoday = input()\n\noccupied = 0\n\nfor i in range(len(yesterday)):\n\
    \    if yesterday[i] == 'C' and today[i] == 'C':\n        occupied = occupied\
    \ + 1\n\nprint(occupied)\n```\n\nListing 3-3: Solving Occupied Spaces\n\nThe program\
    \ starts by reading the three lines of input: n refers to the number of parking\
    \ spaces; and yesterday and today refer to yesterday’s and today’s parking-space\
    \ information, respectively.\n\nNotice that we don’t refer to the number of parking\
    \ spaces (n) again. We could make use of it to tell us the length of the strings,\
    \ but I’ve chosen to ignore it because it’s often not provided in real-life scenarios.\n\
    \nWe use the occupied variable to count the number of parking spaces that were\
    \ occupied both yesterday and today. We start that variable off at 0 ❶.\n\nNow\
    \ we reach the range for loop, which loops through the valid indices of yesterday\
    \ and today ❷. For each such index, we check whether the parking space was occupied\
    \ yesterday and occupied today ❸. If it was, then we include this parking space\
    \ in our total by increasing occupied by 1 ❹.\n\nWhen the range for loop terminates,\
    \ we’ll have gone through all parking spaces. The total number of parking spaces\
    \ that were occupied yesterday and today can be accessed through the occupied\
    \ variable. All that’s left is to output that total.\n\nThat’ll do it for this\
    \ problem. Time to submit your code to the judge.\n\n## Problem #7: Data Plan\n\
    \nWe’ve learned that for loops are useful for processing data after we’ve read\
    \ it from the input. They’re also often useful for reading the data itself. In\
    \ this problem, we’ll tackle data that’s spread over many lines and use a for\
    \ loop to help us read it all.\nThis is DMOJ problem coci16c1p1.\n\n## The Challenge\n\
    \nPero has a data plan with his cell phone provider that offers him $x$ megabytes\
    \ of data per month. In addition, any data he doesn’t use in a given month carries\
    \ over to the next month. For example, if $x$ is 10 and Pero uses only 4MB in\
    \ a given month, the remaining 6MB carry over to the next month (in which he’d\
    \ now have $10 + 6 = 16$MB available).\nWe’re given the number of megabytes of\
    \ data that Pero uses in each of the first $n$ months. Our task is to determine\
    \ the number of megabytes available for the following month.\n\n## Input\n\nThe\
    \ input consists of the following lines:\n\n- A line containing integer $x$, the\
    \ number of megabytes given to Pero per month. $x$ is between 1 and 100.\n- A\
    \ line containing integer $n$, the number of months that Pero has had the data\
    \ plan. $n$ is between 1 and 100.\n- $n$ lines, one for each month, giving the\
    \ integer number of megabytes that Pero uses in that month. Each number is at\
    \ least 0 and will never outstrip the number of available megabytes. (For example,\
    \ if $x$ is 10 and Pero currently has 30MB available, the next number will be\
    \ at most 30.)\n\n## Output\n\nOutput the number of megabytes available for the\
    \ next month.\n\n## Looping to Read Input\n\nIn all of our problems so far, we’ve\
    \ known exactly how many lines to read from the input. For example, in Three Cups,\
    \ we read one line; in Occupied Spaces, we read three lines. Here in Data Plan,\
    \ we don’t know in advance how many lines to read, because it depends on the number\
    \ that we read from the second line."
