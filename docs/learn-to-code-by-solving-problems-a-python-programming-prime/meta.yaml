    \n- 一行包含整数 $m$（测试用例中的单词数）和 $k$，用空格分隔。$m$ 在 0 到 1,000 之间；$k$ 至少为 1。\n- $m$ 行，每行给出一个单词。每个单词最多包含\
    \ 20 个字符，且所有字符均为小写。\n\n### 输出\n\n对于每个测试用例，输出以下行：\n\n- 一行包含以下内容：\n\np most common\
    \ word(s):\n\n其中 **p** 在 *k* 为 1 时是 1st，*k* 为 2 时是 2nd，*k* 为 3 时是 3rd，*k* 为 4\
    \ 时是 4th，依此类推。\n\n- 每个第 *k* 常用的单词占一行。如果没有这样的单词，则此处没有输出行。\n- 一个空行。\n\n解决测试用例的时间限制为一秒。\n\
