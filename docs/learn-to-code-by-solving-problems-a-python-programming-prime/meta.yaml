    \ type: 'list'\n```\n\n集合中的值必须是不可变的，这解释了为什么我们不能将列表放入集合中。这个限制与 Python 如何在集合中搜索值有关。当\
    \ Python 将一个值添加到集合时，它使用值本身来确定其确切的存储位置。之后，Python 可以通过查看它应该所在的位置来找到这个值。如果集合中的值可以改变，那么\
    \ Python 可能会在错误的位置查找，从而找不到该值。\n\n虽然我们不能创建一个列表集合，但一个集合列表是没有问题的：\n\n```python\n\
    >>> lst = [{1, 2, 3}, {4, 5, 6}]\n>>> lst\n[{1, 2, 3}, {4, 5, 6}]\n>>> len(lst)\n\
