- md: "## 3 REPEATING CODE: DEFINITE LOOPS\n\nComputers shine when we have them repeat\
    \ a process over and over. They tirelessly do exactly what we ask, whether it\
    \ involves doing something 10, 100, or a billion times. In this chapter, we’ll\
    \ learn about loops, statements that instruct the computer to repeat the execution\
    \ of part of our program.\n\nWe’ll use loops to solve three problems: tracking\
    \ the location of a ball under a cup, counting the number of occupied parking\
    \ spaces, and determining how much data is available on a cell phone plan.\n\n\
    ### Problem #5: Three Cups\n\nIn this problem, we’ll track the location of a ball\
    \ under a cup as the cups move. But the cups can move many times, so we won’t\
    \ be able to write code for each move separately. Instead, we’ll learn about and\
    \ use the for loop, which allows us to more easily run code for each move.\n\n\
    This is DMOJ problem `coci06c5p1`.\n\n#### The Challenge\n\nBorko has a row of\
    \ three opaque cups: one at the left (location 1), one at the middle (location\
    \ 2), and one at the right (location 3). There is a ball under the cup at the\
    \ left. It’s our job to keep track of the location of the ball as Borko swaps\
    \ the locations of the cups.\n\nBorko can make three types of swap:\n\n**A** Swap\
    \ the left and middle cups\n**B** Swap the middle and right cups\n**C** Swap the\
    \ left and right cups\n\nFor example, if Borko’s first swap is type A, then he\
    \ swaps the left and middle cups; because the ball starts at the left, this swap\
    \ moves it to the middle. If instead his first swap is type B, then he swaps the\
    \ middle and right cups; the left cup stays where it is, so the ball doesn’t change\
    \ locations.\n\n#### Input\n\nThe input is one line of at most 50 characters.\
    \ Each character specifies a type of swap that Borko makes: A, B, or C.\n\n####\
