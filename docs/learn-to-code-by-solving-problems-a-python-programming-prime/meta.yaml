    # Problem #13: Baker Bonus


    In this problem, we’ll see how lists help us work with two-dimensional data. This
    kind of data arises often in real-world programs. For example, data in the form
    of a spreadsheet consists of rows and columns; processing such data requires techniques
    like those we’re about to learn.


    This is DMOJ problem `ecoo17r3p1`.


    # The Challenge


    Baker Brie has a number of franchisees, each of which sells baked goods to consumers.
    Having reached the milestone of being in business for 13 years, Baker Brie will
    celebrate by awarding bonuses based on sales. The bonuses depend on sales per
    day and sales per franchisee. Here’s how the bonuses work:


    +   - For every day on which the total sales across all franchisees is a multiple
    of 13, that multiple will be given as bonuses. For example, a day where the franchisees
    sold a combined 26 baked goods will add 26 / 13 = 2 bonuses to the total.

    - For every franchisee whose total sales across all days is a multiple of 13,
    that multiple will be given as bonuses. For example, a franchisee that sold a
    total of 39 baked goods will add 39 / 13 = 3 bonuses to the total.


    Determine the total number of bonuses awarded.


    # Input'
