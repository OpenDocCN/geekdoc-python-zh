  md: '# Problem #4: Telemarketers


    Sometimes we need to encode more complex Boolean expressions than those that we
    have seen so far. In this problem, we’ll learn about Boolean operators that help
    us do this.

    This is DMOJ problem ccc18j1.


    # The Challenge


    In this problem, we’ll assume that phone numbers are four digits. A phone number
    belongs to a telemarketer if its four digits satisfy all three of the following
    properties:


    +   - The first digit is 8 or 9.

    - The fourth digit is 8 or 9.

    - The second and third digits are the same.


    For example, a phone number whose four digits are 8119 belongs to a telemarketer.

    Determine whether a phone number belongs to a telemarketer, and indicate whether
    we should answer the phone or ignore it.


    # Input


    There are four lines of input. These lines give the first, second, third, and
    fourth digits of the phone number, respectively. Each digit is an integer between
    0 and 9.


    # Output


    If the phone number belongs to a telemarketer, output `ignore`; otherwise, output
    `answer`.


    # Boolean Operators


    What has to be true about a phone number that belongs to a telemarketer? Its first
    digit has to be 8 *or* 9. *And*, its fourth digit has to be 8 *or* 9. *And*, the
    second and third digits have to be the same. We can encode this “or” and “and”
    logic using Python’s *Boolean operators*.'
