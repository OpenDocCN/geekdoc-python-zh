    Python outputs A, as we’d expect.


    An if statement starts with the keyword if. A *keyword* is a word that has special
    meaning to Python and cannot be used as a variable name. The keyword if is followed
    by a Boolean expression, followed by a colon, followed by one or more indented
    statements. The indented statements are often referred to as the *block* of the
    if statement. The block executes if the Boolean expression is True and is skipped
    if the Boolean expression is False.


    Notice that the prompt changes from >>> to .... That’s a reminder that we’re inside
    the block of the if statement and must indent the code. I’ve chosen to indent
    by four spaces, so to indent the code, press the spacebar four times. Some Python
    programmers press the TAB key to indent, but we’ll exclusively use spaces in this
    book.


    Once you type print(''A'') and hit ENTER, you should see another ... prompt. Since
    we don’t have anything else to put in this if statement, press ENTER again to
    dismiss this prompt and return to the >>> prompt. This extra press of ENTER is
    a quirk of the Python shell; such blank lines are not required when we write a
    Python program in a file.


    Let’s see an example of putting two statements in the block of an if statement:


    ```

    >>> apple_total = 20

    >>> banana_total = 6

    >>> if apple_total > banana_total:

    ...     print(''A'')

    ...     print(''Apples win!'')

    ...

    A

    Apples win!

    ```


    Both print calls execute, producing two lines of output.


    Let’s try another if statement, this one with a Boolean expression that’s False:


    ```

    >>> apple_total = 6

