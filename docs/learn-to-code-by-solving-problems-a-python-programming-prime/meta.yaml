    # Nested Lists


    To this point, we’ve seen lists of integers, floats, and strings. We can also
    create lists of lists, called *nested lists*. Each value of such a list is itself
    a list. It’s common to use a variable name like `grid` or `table` to refer to
    a nested list. Here’s a Python list corresponding to Table 5-3:


    ```

    >>> grid = [[ 1, 13, 2, 1, 1, 8],

    ...     [ 2, 12, 10, 5, 11, 4],

    ...     [39, 6, 13, 52, 3, 3],

    ...     [15, 8, 6, 2, 7, 14]]

    ```


    Each list value corresponds to one row. If we index once, we get a row, which
    is itself a list:


    ```

    >>> grid[0]

    [1, 13, 2, 1, 1, 8]

    >>> grid[2]

    [39, 6, 13, 52, 3, 3]

    ```


