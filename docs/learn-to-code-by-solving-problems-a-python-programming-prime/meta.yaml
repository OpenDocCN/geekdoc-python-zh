    To Dad, for the computer code\n\nand\n\nTo Mom, for the teacher code\n\n## About\
    \ the Author\n\nDr. Daniel Zingaro is an associate teaching professor of computer\
    \ science and award-winning teacher at the University of Toronto. His main area\
    \ of research is computer science education, where he studies how students learn\
    \ (and sometimes don’t learn) computer science material. He is the author of *Algorithmic\
    \ Thinking* (No Starch Press, 2021), a book that helps learners understand and\
    \ use algorithms and data structures.\n\n## About the Technical Reviewer\n\nLuke\
    \ Sawczak is a frequent freelance editor and hobby programmer; his favorite projects\
    \ include a prose-to-poetry converter, a visual aid for cutting the right number\
    \ of slices of cake, and a version of Boggle that uses numbers made for math tutors.\
    \ He currently teaches French and English on the outskirts of Toronto. He also\
    \ writes poetry and composes for the piano, which he would do for a living if\
    \ he could. He can be found online at https://sawczak.com/.\n\n# BRIEF CONTENTS\n\
