    \ code.\n\nTime to submit to the Timus judge. You should see that all test cases\
    \ pass.\n\n## CONCEPT CHECK\n\nIn Task 2, we wrote function `box_ok` for determining\
    \ whether a single box has its heights in order. It uses a range for loop. Is\
    \ the following while loop version of `box_ok` correct?\n\n```\ndef box_ok(box):\n\
    \    \"\"\"\n    box is the list of action figure heights in a given box.\n\n\
    \    Return True if the heights in box are in nondecreasing order,\n    False\
    \ otherwise.\n    \"\"\"\n    ok = True\n    i = 0\n    while i < len(box) - 1\
    \ and ok:\n        if box[i] > box[i + 1]:\n            ok = False\n        i\
    \ = i + 1\n    return ok\n```\n\n- A. Yes\n- B. No; it can cause an IndexError\n\
    - C. No; it doesn’t cause any errors, but it can return the wrong value\n\nAnswer:\
    \ A. This is equivalent to our earlier version using the range for loop. The ok\
    \ variable starts off as True, meaning that all heights we have checked are fine\
    \ (because we haven’t checked any yet!). The while loop continues as long as there\
    \ are more boxes to check and there are no height violations. If an action figure\
    \ is out of order, ok is set to False, which terminates the loop. If all action\
    \ figures are in order, then the value of ok never changes from True to False.\
    \ Therefore, when we return ok at the bottom of the function, we return True if\
    \ all action figures are in order and False if not.\n\n## Summary\n\nIn this chapter,\
    \ we learned about functions. A function is a self-contained block of code that\
    \ solves a small part of a larger problem. We learned how to pass information\
    \ to a function (through arguments) and get information back (through a return\
    \ value).\n\nTo determine which functions to write in the first place, we can\
    \ use top-down design. Top-down design helps us break a solution to a large problem\
    \ into a number of smaller tasks; for each task, we solve it directly if we can\
    \ or write a function for it if we can’t. If a given task is too unwieldy, we\
    \ can perform further top-down design on it.\n\nIn the next chapter, we’ll learn\
    \ how to work with files of our choosing, rather than using standard input and\
    \ standard output. As we continue to push the boundaries of what we know, we’ll\
    \ find many uses for functions in that chapter and the rest of the book. Practice\
    \ with some of the following exercises to increase your confidence using functions.\n\
    \n## Chapter Exercises\n\nHere are some exercises for you to try. For each, use\
