    value that `open` returns:


    ```

    >>> type(open(''word.in'', ''r''))

    <class ''_io.TextIOWrapper''>

    ```


    Think of this type as a file type. Its values represent open files, and you''ll
    see shortly that it has methods that we can call.


    As with any function, if we don''t assign what `open` returns to a variable, then
    its return value is lost. The way we''ve been calling `open` so far doesn''t give
    us any way to refer to the file that we''ve opened!


    Here''s how we can make a variable refer to an open file:


