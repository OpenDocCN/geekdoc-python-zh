    \ ecoo12r1p2, Decoding DNA\n- 4. DMOJ problem crci07p1, Platforme\n- 5. DMOJ problem\
    \ coci13c2p2, Misa\n- 6. Revisit some of the exercises from Chapter 5 and improve\
    \ your solutions by using functions. I particularly suggest revisiting DMOJ problem\
    \ coci18c2p1 (Preokret) and DMOJ problem ccc00s2 (Babbling Brooks).\n\n## Notes\n\
    \nCard Game is originally from the 1999 Canadian Computing Competition. Action\
    \ Figures is originally from the 2019 Ural School Programming Contest.\n\nMany\
    \ modern programming languages, Python included, support two distinct programming\
    \ paradigms. One is based on functions; that’s what we studied in this chapter.\
    \ The other is based on *objects* and leads to a paradigm known as *object-oriented\
    \ programming (OOP)*. OOP involves defining new types and writing methods for\
