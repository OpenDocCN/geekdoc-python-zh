    >>> ''this is a string with a few words''.count('' '')

    7

    ```


    We get a value of 7. That’s not quite the number of words—the string has eight
    words—but we’re close. Why are we getting 7 instead of 8?

    The reason is that each word has a space after it except the last word. Counting
    the spaces therefore fails to account for the final word. To remedy that, we need
    to learn how to handle numbers.


    # Integer and Floating-Point Numbers


    An *expression* is made up of values and operators. We’ll now see how to write
    numeric values and combine them with operators.

    There are two different Python types that represent numbers: integers (with no
    decimal part) and floating-point numbers (with a decimal part).

    We write integer values as numbers with no decimal point. Here are some examples:'
- md: '## Variables


    We now know how to write string and numeric values. We’ll also find it valuable
    to be able to store them so we can access them later. In Word Count, it would
    be convenient to be able to store the line of words somewhere and then count the
    number of words.


    ## Assignment Statement


    A *variable* is a name that refers to a value. Whenever we later use a variable’s
    name, it gets substituted by what that variable refers to. To make a variable
    refer to a value, we use the *assignment statement*. An assignment statement consists
    of a variable, an equal sign (=), and an expression. Python evaluates the expression
    and makes the variable refer to the result. Here’s an example assignment statement:


    ```

    >>> dollars = 250

    ```


    Now, dollars is substituted by 250 whenever we use it:


    ```

    >>> dollars

    250

    >>> dollars + 10

    260

    >>> dollars

    250

    ```


    A variable refers to only one value at a time. Once we use an assignment statement
    to make a variable refer to another value, it no longer refers to the old value:


    ```

    >>> dollars = 250

    >>> dollars

    250

    >>> dollars = 300

    >>> dollars

    300

    ```


    We can have as many variables as we like. Large programs typically use hundreds
    of variables. Here’s an example of using two variables:


    ```

    >>> purchase_price1 = 58

    >>> purchase_price2 = 9

    >>> purchase_price1 + purchase_price2

    67

    ```


    Notice that I’ve chosen variable names that give some sense of what they’re storing.
    These two variables, for example, have to do with the prices of two purchases.
    Using variable names p1 and p2 would be easier to type, but in a few days we’d
    probably forget what the names mean!

    We can make variables refer to strings, too:


    ```

    >>> start = ''Monday''

    >>> end = ''Friday''

    >>> start

    ''Monday''

    >>> end

    ''Friday''

    ```


    As with variables that refer to numbers, we can use these in larger expressions:


    ```

    >>> start + ''-'' + end

    ''Monday-Friday''

    ```


    Python variable names should start with a lowercase letter and then can contain
    additional letters, underscores to separate words, and numbers.


    ## Changing Variable Values


    Suppose we have a variable dollars that refers to value 250:


    ```

    >>> dollars = 250

    ```


    Now we want to increase the value so that dollars refers to 251. This won’t work:


    ```

    >>> dollars + 1

    251

    ```


    The result is 251, but that value is gone, not stored anywhere:


    ```

    >>> dollars

    250

    ```


    What we need is an assignment statement that captures the result of dollars +
    1:


    ```

    >>> dollars = dollars + 1

    >>> dollars

    251

    >>> dollars = dollars + 1

    >>> dollars

    252

    ```


    It’s common for learners to think of the assignment symbol = as equality. But
    don’t do that! The assignment statement is a command to make a variable refer
    to the value of an expression, not a claim that two entities are equal.


    ## CONCEPT CHECK


    What is the value of y after the execution of the following code?


    ```

    >>> x = 37

    >>> y = x + 2

    >>> x = 20

    ```


    - A. 39

    - B. 22

    - C. 35

    - D. 20

    - E. 18


    > Answer: A. There’s only one assignment to y, and it makes y refer to the value
    39. The x = 20 assignment statement changes what x refers to, from 37 to 20, but
    this has no impact on the value referred to by y.


    ## Counting the Words Using a Variable


    Let’s take stock of our progress toward solving the Word Count problem:


    - We know about strings, and we can use a string to store the line of words.

    - We know about the string count method, which we can use to count the number
    of spaces in the line of words. That gives us one less than the output value that
    we need.

    - We know about integers, whose + operator we can use to add 1 to a number.

    - We know about variables and the assignment statement, which help us hold on
    to values so that we don’t lose them.


    Putting all of this together, we can make a variable refer to a string and then
    count the number of words:


    ```

    >>> line = ''this is a string with a few words''

    >>> total_words = line.count('' '') + 1

    >>> total_words

    8

    ```


    The line and total_words variables aren’t required here; here’s how we could do
    it without them:


    ```

    >>> ''this is a string with a few words''.count('' '') + 1

    8

    ```


    But using variables to capture intermediate results is a good practice for keeping
    code readable. Once our programs get longer than a few lines, variables will be
    indispensable.


    ## Reading Input


    One problem with the code that we’ve written is that it works only on the particular
    string that we’ve typed in. It tells us that there are eight words in ''this is
    a string with a few words'', but that’s all it can do. If we want to know how
    many words are in a different string, we’ll have to replace the current string
    with a new one. To solve Word Count, though, we need our program to work on *any*
    string provided as input to our program.


    To read a line of input, we use the `input` function. A *function* is similar
    to a method: we call it, perhaps with some arguments, and it returns a value to
    us. One difference between a method and a function is that a function does not
    use the dot operator. All information passed to functions is through arguments.


    Here’s an example of calling the `input` function and then typing some input—in
    this case, the word `testing`:


    ```

    >>> input()

    testing

    ''testing''

    ```


    When you type `input()` and press ENTER, you don’t get a `>>>` prompt back. Instead,
    Python waits for you to type something on the keyboard and press ENTER. The `input`
    function then returns the string you typed. As usual, if we don’t store that string
    anywhere, then it’s lost. Let’s use an assignment statement to store what we type:


    ```

    >>> result = input()

    testing

    >>> result

    ''testing''

    >>> result.upper()

    ''TESTING''

    ```


    Notice in the last line that I’ve used the `upper` method on the value returned
    by `input`. This is allowed because `input` returns a string, and `upper` is a
    string method.


    ## Writing Output


    You’ve seen that typing expressions at the Python shell causes their values to
    be displayed:


    A value on its own is the simplest kind of expression.

    The familiar mathematical operators work on integers. We have + for addition,
    - for subtraction, and * for multiplication. We can use these operators to write
    more complicated expressions.


    ```

    >>> 8 + 10

    18

    >>> 8 - 10

    -2

    >>> 8 * 10

    80

    ```


    Notice the spaces around the operators. While 8+10 and 8 + 10 are the same as
    far as Python is concerned, the latter makes the expression easier for us humans
    to read.

    Python has two division operators, not one! The // operator performs integer division,
    which throws away any remainder and rounds the result down:


    ```

    >>> 8 // 2

    4

    >>> 9 // 5

    1

    >>> -9 // 5

    -2

    ```


    If you want the remainder of the division, use the mod operator, written as %.
    For example, dividing 8 by 2 leaves no remainder:


    ```

    >>> 8 % 2

    0

    ```


    Dividing 8 by 3 leaves a remainder of 2:


    ```

    >>> 8 % 3

    2

    ```


    The / operator, in contrast to //, doesn’t do any rounding:


    ```

    >>> 8 / 2

    4.0

    >>> 9 / 5

    1.8

    >>> -9 / 5

    -1.8

    ```


    These result values are not integers! They have a decimal point and belong to
    a different Python type called *float* (for “floating-point numbers”). You can
    write float values by including a decimal point:


    ```

    >>> 12.5 * 2

    25.0

    ```


    We’ll focus on integers for now and return to floating-point numbers when we solve
    Cone Volume later in this chapter.


    When we use multiple operators in an expression, Python uses precedence rules
    to determine the order that operators are applied. Each operator has a precedence.
    Just like when we evaluate a mathematical expression on paper, Python performs
    multiplications and divisions (higher precedence) before additions and subtractions
    (lower precedence):


    ```

    >>> 50 + 10 * 2

    70

    ```


    Again, like on paper, operations inside parentheses have the highest precedence.
    We can use this to force Python to perform operations in our desired order:


    ```

    >>> (50 + 10) * 2

    120

    ```


    Programmers often add parentheses even when not technically required. That’s because
    Python has many operators, as we’ll see, and keeping track of their precedence
    is error-prone and not something that programmers typically do.


    If you’re wondering whether integer values and float values have methods, just
    like strings, they do! But they aren’t all that useful. For example, there’s a
    method that tells us how much of the computer’s memory is taken up by an integer.
    The bigger the integer, the more memory it requires:


    ```

    >>> (5).bit_length()

    3

    >>> (100).bit_length()

    7

    >>> (99999).bit_length()

    17

    ```


    We need the parentheses around the integers; otherwise, the dot operator gets
    confused with a decimal point, and we get a syntax error.'
  mdcn: '## 变量


    我们现在知道如何编写字符串和数值了。我们也会发现，能够存储它们以便稍后访问是很有价值的。在单词计数程序中，如果能将一行单词存储在某个地方，然后再计算单词数量，那将非常方便。


    ## 赋值语句


    *变量*是一个指向值的名称。每当我们稍后使用变量名时，它就会被该变量所指向的值替代。要让一个变量指向一个值，我们使用*赋值语句*。赋值语句由一个变量、一个等号（=）和一个表达式组成。Python
    会计算表达式，并让变量指向结果。下面是一个赋值语句的例子：


    ```

    >>> dollars = 250

    ```


    现在，每当我们使用 `dollars` 时，它都会被 250 替代：


    ```

    >>> dollars

    250

    >>> dollars + 10

    260

    >>> dollars

    250

    ```


    一个变量一次只能指向一个值。一旦我们使用赋值语句让一个变量指向另一个值，它就不再指向旧值了：


    ```

    >>> dollars = 250

    >>> dollars

    250

    >>> dollars = 300

    >>> dollars

    300

    ```


    我们可以拥有任意多的变量。大型程序通常使用数百个变量。下面是使用两个变量的例子：


    ```

    >>> purchase_price1 = 58

    >>> purchase_price2 = 9

    >>> purchase_price1 + purchase_price2

    67

    ```


    请注意，我选择的变量名能体现它们存储的内容。例如，这两个变量与两次购买的价格有关。使用 `p1` 和 `p2` 作为变量名会更容易输入，但过几天我们可能就忘了这些名字是什么意思了！

    我们也可以让变量指向字符串：


    ```

    >>> start = ''Monday''

    >>> end = ''Friday''

    >>> start

    ''Monday''

    >>> end

    ''Friday''

    ```


    与指向数字的变量一样，我们可以在更大的表达式中使用它们：


    ```

    >>> start + ''-'' + end

    ''Monday-Friday''

    ```


    Python 变量名应以小写字母开头，然后可以包含额外的字母、用于分隔单词的下划线和数字。


    ## 更改变量值


    假设我们有一个变量 `dollars`，它指向值 250：


    ```

    >>> dollars = 250

    ```


    现在我们想增加这个值，让 `dollars` 指向 251。这样做是不行的：


    ```

    >>> dollars + 1

    251

    ```


    结果是 251，但这个值消失了，没有存储在任何地方：


    ```

    >>> dollars

    250

    ```


    我们需要的是一个赋值语句来捕获 `dollars + 1` 的结果：


    ```

    >>> dollars = dollars + 1

    >>> dollars

    251

    >>> dollars = dollars + 1

    >>> dollars

    252

    ```


    学习者常把赋值符号 `=` 当作相等。但不要这样做！赋值语句是一个命令，让变量指向一个表达式的值，而不是声称两个实体相等。


    ## 概念检查


    执行以下代码后，`y` 的值是多少？


    ```

    >>> x = 37

    >>> y = x + 2

    >>> x = 20

    ```


    - A. 39

    - B. 22

    - C. 35

    - D. 20

    - E. 18


    > 答案：A。对 `y` 只有一次赋值，它让 `y` 指向值 39。`x = 20` 赋值语句改变了 `x` 指向的内容，从 37 变为 20，但这对 `y`
    所指向的值没有影响。


    ## 使用变量计数单词


    让我们盘点一下在解决单词计数问题上取得的进展：


    - 我们了解了字符串，可以用字符串存储一行单词。

    - 我们了解了字符串的 `count` 方法，可以用它来计算一行单词中的空格数。这比我们需要的输出值少一个。

    - 我们了解了整数，可以用它的 `+` 运算符给一个数字加 1。

    - 我们了解了变量和赋值语句，它们帮助我们保存值，这样我们就不会丢失它们。


    将所有这些结合起来，我们可以让一个变量指向一个字符串，然后计算单词数量：


    ```

    >>> line = ''this is a string with a few words''

    >>> total_words = line.count('' '') + 1

    >>> total_words

    8

    ```


    这里的 `line` 和 `total_words` 变量不是必需的；下面是如何在没有它们的情况下完成：


    ```

    >>> ''this is a string with a few words''.count('' '') + 1

    8

    ```


    但是，使用变量来捕获中间结果是保持代码可读性的好习惯。一旦我们的程序超过几行，变量就变得不可或缺了。


    ## 读取输入


    我们编写的代码有一个问题，它只适用于我们输入的特定字符串。它告诉我们 ''this is a string with a few words'' 中有八个单词，但仅此而已。如果我们想知道另一个字符串中有多少个单词，就必须用新的字符串替换当前的字符串。然而，要解决单词计数问题，我们需要程序能够处理作为程序输入的*任何*字符串。


    要读取一行输入，我们使用 `input` 函数。*函数*类似于方法：我们调用它，可能带有一些参数，它返回一个值给我们。方法和函数的一个区别是函数不使用点运算符。所有传递给函数的信息都是通过参数传递的。


    下面是调用 `input` 函数然后输入一些内容的例子——在这个例子中，是单词 `testing`：


    ```

    >>> input()

    testing

    ''testing''

    ```


    当你输入 `input()` 并按回车键时，你不会得到 `>>>` 提示符。相反，Python 会等待你在键盘上输入一些内容并按回车键。然后 `input`
    函数返回你输入的字符串。通常，如果我们不将该字符串存储在任何地方，它就会丢失。让我们使用赋值语句来存储我们输入的内容：


    ```

    >>> result = input()

    testing

    >>> result

    ''testing''

    >>> result.upper()

    ''TESTING''

    ```


    请注意最后一行，我在 `input` 返回的值上使用了 `upper` 方法。这是允许的，因为 `input` 返回一个字符串，而 `upper` 是一个字符串方法。


    ## 写入输出


    你已经看到，在 Python shell 中输入表达式会导致它们的值被显示出来：


    一个单独的值是最简单的表达式。

    熟悉的数学运算符适用于整数。我们有用于加法的 `+`，用于减法的 `-`，以及用于乘法的 `*`。我们可以使用这些运算符编写更复杂的表达式。


    ```

    >>> 8 + 10

    18

    >>> 8 - 10

    -2

    >>> 8 * 10

    80

    ```


    请注意运算符周围的空格。虽然 `8+10` 和 `8 + 10` 对 Python 来说是一样的，但后者使表达式对我们人类来说更容易阅读。

    Python 有两个除法运算符，而不是一个！`//` 运算符执行整数除法，它会丢弃任何余数并将结果向下取整：


    ```

    >>> 8 // 2

    4

    >>> 9 // 5

    1

    >>> -9 // 5

    -2

    ```


    如果你想得到除法的余数，使用取模运算符，写作 `%`。例如，8 除以 2 没有余数：


    ```

    >>> 8 % 2

    0

    ```


    8 除以 3 余数为 2：


    ```

    >>> 8 % 3

    2

    ```


    与 `//` 相比，`/` 运算符不做任何舍入：


    ```

    >>> 8 / 2

    4.0

    >>> 9 / 5

    1.8

    >>> -9 / 5

    -1.8

    ```


    这些结果值不是整数！它们有一个小数点，属于另一种 Python 类型，称为 *float*（“浮点数”）。你可以通过包含小数点来编写浮点值：


    ```

    >>> 12.5 * 2

    25.0

    ```


    我们现在将专注于整数，并在本章后面解决圆锥体积问题时再回到浮点数。


    当我们在表达式中使用多个运算符时，Python 使用优先级规则来确定运算符的应用顺序。每个运算符都有一个优先级。就像我们在纸上计算数学表达式一样，Python
    在执行加法和减法（较低优先级）之前执行乘法和除法（较高优先级）：


    ```

    >>> 50 + 10 * 2

    70

    ```


    同样，就像在纸上一样，括号内的操作具有最高优先级。我们可以利用这一点来强制 Python 按我们想要的顺序执行操作：


    ```

    >>> (50 + 10) * 2

    120

    ```


    程序员经常在技术上不需要的时候也添加括号。这是因为 Python 有很多运算符，正如我们将看到的，跟踪它们的优先级容易出错，而且程序员通常不会这样做。


    如果你想知道整数值和浮点值是否像字符串一样有方法，它们确实有！但它们并不那么有用。例如，有一个方法可以告诉我们整数占用了多少计算机内存。整数越大，需要的内存就越多：


    ```

    >>> (5).bit_length()

    3

    >>> (100).bit_length()

    7

    >>> (99999).bit_length()

    17

    ```


    我们需要在整数周围加上括号；否则，点运算符会与小数点混淆，导致语法错误。'
