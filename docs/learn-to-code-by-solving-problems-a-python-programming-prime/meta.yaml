    # Problem #6: Occupied Spaces


    We know how to loop through the characters of a string. But sometimes we need
    to know where we are in the string, not just the character that’s stored there.
    This problem is one such example.


    This is DMOJ problem ccc18j2.


    # The Challenge


    You supervise a parking lot with *n* parking spaces. Yesterday, you recorded whether
    each parking space was occupied by a car or was empty. Today, you again recorded
    whether each parking space was occupied by a car or was empty. Indicate the number
    of parking spaces that were occupied on both days.


    # Input


    The input consists of three lines.


    +   - The first line contains integer *n*, the number of parking spaces. *n* is
    between 1 and 100.

    - The second line contains a string of *n* characters for yesterday’s information,
    one character for each parking space. A C indicates an occupied parking space
    (C for car), and a . indicates an empty'
