    The built-in Python functions are general-purpose, designed to be used in a wide
    variety of settings. When we want a function to solve a problem-specific task,
    we’ll have to define it ourselves.


    # Functions Without Arguments


    To *define*, or create, a function, we use Python’s `def` keyword. Here’s the
    definition of a function that outputs three lines:


    ```

    >>> def intro():

    ...     print(''*********'')

    ...     print(''*WELCOME*'')

    ...     print(''*********'')

    ...

    ```


    The structure of a function definition mirrors that of an `if` statement or loop.
    The name after `def` is the name of the function that we’re defining; here, we’re
    defining a function named `intro`. Following the name of the function, we have
    a pair of empty parentheses, `()`. We’ll see later that we can include information
    in these parentheses to pass'
  - '[PAGE 188]


    arguments to functions. This intro function doesn’t take any arguments, which
    is why the parentheses are empty. Following the parentheses is a colon; as with
    if statements or loops, leaving out the colon is a syntax error. On the following
    lines, we provide an indented block of statements that will run each time the
    function is called.


    When you defined the intro function, you may have expected to see this as output:


    ```

    **********

    *WELCOME*

    **********

    ```


    But no: so far we’ve only defined the function, not called it. Defining a function
    has no observable effect; it simply stores the function in the computer’s memory
    so we can call it later. We call our own functions just like we call any of Python’s
    built-in functions. Since this intro function doesn’t take any arguments, we use
    an empty set of parentheses in the call:


    ```

    >>> intro()

    **********

    *WELCOME*

    **********

    ```


    You can call this function as many times as you like. It’s there as often as we
    need it.


    # Functions with Arguments


    Our intro function isn’t very flexible, as it does the same thing each time it’s
    called. We can change the function so that we can pass arguments to it, and the
    arguments we pass can influence what the function does. Here’s a new version of
    the intro function that allows us to pass a single argument:


    ```

    >>> def intro2(message):

    ...     line_length = len(message) + 2

    ...     print(''*'' * line_length)

    ...     print(f''*{message}*'')

    ...     print(''*'' * line_length)

    ...

    ```


    To call this function, we provide a string argument:'
