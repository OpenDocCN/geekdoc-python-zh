    \n开始吧：\n\n```python\n>>> search(list(range(1, 5001)), 5000)\n```\n\n在我的笔记本电脑上，这大约需要三秒钟运行。我们不需要精确计时；我们只是想大致了解随着列表长度增加会发生什么。\n\
    \n现在让我们创建一个包含从 1 到 10,000 整数的列表，并搜索 10000：\n\n```python\n>>> search(list(range(1,\
    \ 10001)), 10000)\n```\n\n在我的笔记本电脑上，这大约需要六秒钟。到目前为止的总结是，对于长度为 5000 的列表，需要三秒钟；将列表长度加倍到\
