    Let’s try reading from the file again, this time stripping out the newlines:


    ```

    >>> input_file = open(''word.in'', ''r'')

    >>> input_file.readline().rstrip()

    ''12 13''

    >>> input_file.readline().rstrip()

    ''perhaps better poetry will be written in the language of digital computers''

    ```


    At this point, we’ve read the two lines, so there’s nothing left to read from
    the file. The readline method signals this by returning an empty string.


    ```

    >>> input_file.readline().rstrip()

    ''''

    ```


    The empty string means that we’ve reached the end of the file. If we want to read
    the lines again, we must reopen the file to start at its beginning.

    Let’s do that, this time saving each line using variables:


    ```

    >>> input_file = open(''word.in'', ''r'')

    >>> first = input_file.readline().rstrip()

    >>> second = input_file.readline().rstrip()

    >>> first

    ''12 13''

    >>> second

    ''perhaps better poetry will be written in the language of digital computers''

    ```


    If we need to read all of the lines from a file, no matter how many there are,
    we can use a for loop. Files in Python act as sequences of lines, so we can loop
    over them just like we loop over strings and lists:


    ```

    >>> input_file = open(''word.in'', ''r'')

    >>> for line in input_file:

    ...     print(line.rstrip())

    ...

    ```'
