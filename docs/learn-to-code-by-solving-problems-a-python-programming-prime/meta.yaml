  - '[PAGE 153]


    # List Methods


    Time to make progress on Village Neighborhood. I can think of two operations on
    a list that would help us solve it.


    First, adding to a list. We’ll start off with no village positions and read them
    one at a time from the input. We therefore need a way to add each of these positions
    to a growing list: first the list will have nothing, and then it will have one
    village position in it, then two, and so on.


    Second, sorting a list. Once we’ve read in the village positions, we need to find
    the smallest neighborhood. This involves looking at each village position and
    the distance to its left and right neighbors. The village positions could come
    in any order, so in general it’s not easy to find the neighbors of a given village.
    Think back to the work we did in “Why Lists?” in this chapter. For each village,
    we had to scan the entire list to find its neighbors. It’d be so much easier if
    we had the villages ordered by position. Then we’d know exactly where the neighbors
    were: they’d be just to the left and just to the right of a village.


    For example, here are our sample villages in the order that we read them:


    ```

    20 50 4 19 15 1

    ```


    That’s a mess! On a real street, they’d come in order of position, like this:


    ```

    1 4 15 19 20 50

    ```


    Want the neighbors of the village at position 4? Just look immediately to the
    left and immediately to the right: 1 and 15. The neighbors of the village at 15?
    Boom, they’re right there—4 and 19. No more searching all over the place. We’ll
    sort the list of village positions to simplify our code.


    We can add to a list using the `append` method and sort a list using the `sort`
    method. We’ll learn these two methods, and a few others that you’ll likely find
    useful as you continue working with lists, and then we’ll come back to solve Village
    Neighborhood.'
  - '[PAGE 154]


    # Adding to a List


    The append method *appends* to a list, which means that it adds a value to the
    end of the values already there. Here’s append adding three village positions
    to an initially empty list:


    ```

    >>> positions = []

    >>> positions.append(20)

    >>> positions

    [20]

    >>> positions.append(50)

    >>> positions

    [20, 50]

    >>> positions.append(4)

    >>> positions

    [20, 50, 4]

    ```


    Notice that we’re using append without using an assignment statement. The append
    method doesn’t return a list; it modifies an existing list.


    It’s a common error to use an assignment statement with a method that changes
    a list. Making this error results in the list being lost, like this:


    ```

    >>> positions

    [20, 50, 4]

    >>> positions = positions.append(19)

    >>> positions

    ```


    Nothing is there! Technically, positions now refers to a None value; you can see
    that using print:


    ```

    >>> print(positions)

    None

    ```


    The None value is used to convey that no information is available. That’s absolutely
    not expected here—we wanted our four village positions!—but we’ve lost the list
    through an errant assignment statement.


    If your list is disappearing or you’re getting error messages related to the None
    value, make sure you’re not using an assignment statement with a method that simply
    modifies a list.


    The extend method is related to append. You use extend whenever you’d like to
    concatenate a list (not a single value) to the end of an existing list.'
  - '[PAGE 155]


    Here’s an example:


    ```

    >>> lst1 = [1, 2, 3]

    >>> lst2 = [4, 5, 6]

    >>> lst1.extend(lst2)

    >>> lst1

    [1, 2, 3, 4, 5, 6]

    >>> lst2

    [4, 5, 6]

    ```


    If you want to insert into a list at a position other than its end, you can use
    the `insert` method. It takes an index and a value and inserts the value at the
    index:


    ```

    >>> lst = [10, 20, 30, 40]

    >>> lst.insert(1, 99)

    >>> lst

    [10, 99, 20, 30, 40]

    ```


    # Sorting a List


    The `sort` method *sorts* a list, putting its values in order. If we call it with
    no arguments, it sorts from smallest to largest:


    ```

    >>> positions = [20, 50, 4, 19, 15, 1]

    >>> positions.sort()

    >>> positions

    [1, 4, 15, 19, 20, 50]

    ```


    If we call it with a `reverse` argument of value `True`, it sorts from largest
    to smallest:


    ```

    >>> positions.sort(reverse=True)

    >>> positions

    [50, 20, 19, 15, 4, 1]

    ```


    The syntax that I’ve used, `reverse=True`, is new. Based on how we’ve called methods
    and functions to this point in the book, you might expect that `True` by itself
    would work. But no: `sort` requires the whole `reverse=True` to be there, for
    reasons I’ll explain in Chapter 6.


