    \ he has 16MB total. He uses 12MB this month, so the excess that carries forward\
    \ is 16 – 12 = 4MB. In the third month, Pero is given 10MB more, so now he has\
    \ 14MB total. He uses 1MB this month, so the excess that carries forward is 14\
