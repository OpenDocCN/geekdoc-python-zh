    # Efficiency of Searching a Set


    Back to solving Email Addresses.


    Do we care about the order of our cleaned email addresses? No! All we care about
    is whether an email address is already in there or not.


    Do we need to allow duplicates in our cleaned email addresses? No again! In fact,
    we want to explicitly avoid storing duplicate email addresses.


    Order doesn’t matter, and duplicates are not allowed. These are the two ingredients
    that suggest that a set may be the right type to use.'
