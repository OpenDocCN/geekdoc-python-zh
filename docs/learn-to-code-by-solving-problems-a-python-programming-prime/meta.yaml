    \        for j in range(franchisees):\n            row[j] = int(row[j])\n    \
    \    grid.append(row)\n\n    bonuses = 0\n\n    ❷ for row in grid:\n        total\
    \ = sum(row)\n        if total % 13 == 0:\n            bonuses = bonuses + total\
    \ // 13\n\n    ❸ for col_index in range(franchisees):\n        total = 0\n   \
    \     for row_index in range(days):\n            total = total + grid[row_index][col_index]\n\
    \        if total % 13 == 0:\n            bonuses = bonuses + total // 13\n\n\
    \    print(bonuses)\n```\n\nWhat is the big O efficiency of this algorithm? There\
    \ are some nested loops in here, so a first guess is that this algorithm is $O(n^2)$.\
    \ But what is $n$?\n\nIn the problems we’ve discussed to this point in the chapter,\
    \ we used the single variable $n$ to represent the amount of input: $n$ could\
    \ be the number of swaps or the number of parking spaces or the number of email\
    \ addresses or the number of cows. But in the Baker Bonus problem, we’re dealing\
    \ with two-dimensional input, so we need *two* variables to represent its amount.\
    \ We’ll call the first variable $d$, the number of days; we’ll call the second\
    \ $f$, the number of franchisees. More formally, because there are multiple test\
    \ cases per input, we’ll let $d$ be the maximum number of days and $f$ the maximum\
    \ number of franchisees. We need to give the big O efficiency in terms of *both*\
    \ $d$ and $f$.\n\nOur algorithm consists of three major components: reading the\
    \ input, calculating the number of bonuses from the rows, and calculating the\
    \ number of bonuses from the columns. Let’s take a look at each of these.\n\n\
    To read the input ❶, we perform $d$ iterations of the outer loop. On each of these\
    \ iterations we read a row and call `split`, which takes about $f$ steps. We take\
    \ another $f$ steps to loop through the values and convert them to integers. In\
    \ total, then, each of the $d$ iterations performs a number of steps proportional\
    \ to $f$. Reading the input therefore takes $O(df)$ time.\n\nNow for the row bonuses\
    \ ❷. The outer loop here loops $d$ times. Each of these iterations calls `sum`,\
    \ which takes $f$ steps because it has to add up $f$ values. Like reading the\
    \ input, then, this part of the algorithm is $O(df)$.\n\nFinally, let’s look at\
    \ the code for the column bonuses ❸. The outer loop loops $f$ times. Each of those\
    \ iterations leads to the inner loop iterating $d$ times. The total here, again,\
    \ is $O(df)$.\n\nEach component of this algorithm is $O(df)$. Adding three $O(df)$\
    \ components together yields an $O(df)$ algorithm overall.\n\n## CONCEPT CHECK\n\
    \nWhat is the big O efficiency of the following algorithm?\n\n```\nfor i in range(m):\n\
    \    <do something that takes one step>\nfor j in range(n):\n    <do something\
    \ that takes one step>\n```\n\n- A. $O(1)$\n- B. $O(n)$\n- C. $O(n^2)$\n- D. $O(m+n)$\n\
    - E. $O(mn)$\n\nAnswer: D. The first loop depends on *m*, and the second depends\
    \ on *n*. The loops are sequential, not nested, so their work is added rather\
    \ than multiplied.\n\n## Log Time\n\nIn “Efficiency of Our Program” on page 255,\
    \ we discussed the difference between linear search and binary search. A linear\
    \ search finds a value in a list by searching the list from beginning to end.\
    \ That’s an *O(n)* algorithm. It works whether or not the list is sorted. A binary\
    \ search, by contrast, works only on a sorted list. But if you have a sorted list,\
    \ then binary search is blazingly fast.\n\nBinary search works by comparing the\
    \ value we’re searching for to the value at the middle of the list. If the value\
    \ at the middle of the list is larger than the value we’re searching for, we continue\
    \ searching in the left half of the list. If the value at the middle of the list\
    \ is smaller than the value we’re searching for, we continue searching in the\
    \ right half of the list. We keep doing this, ignoring half of the list each time,\
    \ until we find the value that we’re looking for.\n\nSuppose we use binary search\
    \ to find a value in a list of 512 values. How many steps does it take? Well,\
    \ after one step, we’ve ignored half the list, so we’re left with about 512 /\
    \ 2 = 256 values. (It doesn’t matter whether our value is larger than half of\
    \ the values in the list or smaller than half the values in the list; in each\
    \ case, we ignore one half of the list.) After two steps, we’re left with 256\
    \ / 2 = 128 values. After three steps, we’re left with 128 / 2 = 64 values. Continuing,\
    \ after four steps we have 32 values, after five steps we have 16 values, after\
    \ six steps we have 8 values, after seven steps we have 4 values, after eight\
    \ steps we have 2 values, and after nine steps we have only 1 value.\n\nNine steps—that’s\
    \ it! That’s way better than taking up to 512 steps using linear search. Binary\
    \ search does far less work than a linear-time algorithm. But what kind of algorithm\
    \ is it? It’s not constant time: while it takes very few steps, the number of\
    \ steps does increase a little as the amount of input increases.\n\nBinary search\
    \ is an example of a *logarithmic-time* or *log-time* algorithm. In big O notation,\
    \ we say that a logarithmic-time algorithm is *O(log n)*."
  mdcn: "答案：B。这里有两个嵌套循环，所以你的第一直觉可能是认为这是一个二次时间算法。不过要小心，因为外层的 `for` 循环只迭代 10 次，与 $n$\
    \ 的值无关。因此，该算法的总步骤数是 $10n$。这里没有 $n^2$；$10n$ 是线性的，就像 $n$ 一样。所以，这是一个线性时间算法，而不是二次时间算法。我们将其效率表示为\
    \ $O(n)$。\n\n## 概念检查\n\n以下算法的大 O 效率是多少？\n\n```\nfor i in range(n):\n    <以常数步骤处理输入\
    \ i>\nfor j in range(n):\n    <以常数步骤处理输入 j>\n```\n\n- A. $O(1)$\n- B. $O(n)$\n\
    - C. $O(n^2)$\n\n答案：B。这里有两个循环，它们都依赖于 $n$。那么，这难道不是二次时间吗？\n\n不是！这两个循环是顺序的，而不是嵌套的。第一个循环需要\
    \ $n$ 步，第二个循环也需要 $n$ 步，总共 $2n$ 步。因此，这是一个线性时间算法。\n\n## 替代形式\n\n当你看到两个嵌套循环，且每个循环都依赖于\
    \ $n$ 时，很可能你看到的是一个二次时间算法。但即使没有这样的嵌套循环，也可能出现二次时间算法。我们可以在电子邮件地址问题的第一个解决方案（清单 8-2）中找到这样的例子。我在此重现该解决方案：\n\
    \n```\n# 未显示清理函数\n\nfor dataset in range(10):\n    n = int(input())\n    addresses\
    \ = []\n    for i in range(n):\n        address = input()\n        ❶ address =\
    \ clean(address)\n        ❷ if not address in addresses:\n            addresses.append(address)\n\
    \nprint(len(addresses))\n```\n\n我们设 $n$ 为 10 个测试用例中看到的最大电子邮件地址数量。外层 `for` 循环迭代\
    \ 10 次；内层 `for` 循环最多迭代 $n$ 次。因此，我们最多处理 $10n$ 个电子邮件地址，这在 $n$ 上是线性的。\n\n清理电子邮件地址\
    \ ❶ 需要常数步骤，所以我们不需要担心这一点。但这仍然*不是*一个线性时间算法，因为内层 `for` 循环的每次迭代都需要超过常数步骤。具体来说，检查电子邮件地址是否已在我们的列表中\
    \ ❷ 需要与列表中已有的电子邮件地址数量成比例的工作，因为 Python 必须搜索列表。这本身就是一个线性时间操作！因此，我们处理 $10n$ 个电子邮件地址，每个地址需要\
    \ $n$ 的工作量，总共 $10n^2$，即二次时间的工作量。这种二次时间性能正是我们使用此代码时收到超时错误的原因，这促使我们使用集合而不是列表。\n\n\
    ## 立方时间\n\n如果一个循环可以导致线性时间，两个嵌套循环可以导致二次时间，那么三个嵌套循环呢？三个嵌套循环，每个都依赖于 $n$，会导致一个*立方时间*算法。在大\
    \ O 表示法中，我们说立方时间算法是 $O(n^3)$。\n\n如果你认为二次时间算法很慢，那就等着看立方时间算法有多慢吧。假设 $n$ 是 1,000。我们已经知道线性时间算法大约需要\
    \ 1,000 步，二次时间算法大约需要 1,000² = 1,000,000 步。立方时间算法将需要 1,000³ = 1,000,000,000 步。十亿步！但情况会更糟。例如，如果\
    \ *n* 是 10,000，这仍然是一个很小的输入量，那么立方时间算法将需要 1,000,000,000,000（一万亿）步。一万亿步将需要几分钟的计算时间。不开玩笑：立方时间算法几乎永远不够好。\n\
    \n当我们尝试使用立方时间算法解决清单 9-5 中的牛棒球问题时，它确实不够好。我在此重现该解决方案：\n\n```\ninput_file = open('baseball.in',\
    \ 'r')\noutput_file = open('baseball.out', 'w')\n\nn = int(input_file.readline())\n\
    \npositions = []\n\nfor i in range(n):\n    positions.append(int(input_file.readline()))\n\
    \ntotal = 0\n\n❶ for position1 in positions:\n    ❷ for position2 in positions:\n\
    \        first_two_diff = position2 - position1\n        if first_two_diff > 0:\n\
    \            low = position2 + first_two_diff\n            high = position2 +\
    \ first_two_diff * 2\n\n            ❸ for position3 in positions:\n          \
    \      if position3 >= low and position3 <= high:\n                    total =\
    \ total + 1\n\noutput_file.write(str(total) + '\\n')\n\ninput_file.close()\noutput_file.close()\n\
    ```\n\n你会在这段代码中看到立方时间的典型特征：三个嵌套循环 ❶ ❷ ❸，每个都依赖于输入量。如你所记得，该问题的时间限制是四秒，我们最多可以有 1,000\
    \ 头牛。一个处理十亿个三元组的立方时间算法太慢了。\n\n## 多个变量\n\n在第 5 章中，我们解决了面包师奖金问题。我在此重现清单 5-6 中的解决方案：\n\
    \n```\nfor dataset in range(10):\n    lst = input().split()\n    franchisees =\
    \ int(lst[0])\n    days = int(lst[1])\n\n    grid = []\n\n    ❶ for i in range(days):\n\
    \        row = input().split()\n        for j in range(franchisees):\n       \
    \     row[j] = int(row[j])\n        grid.append(row)\n\n    bonuses = 0\n\n  \
    \  ❷ for row in grid:\n        total = sum(row)\n        if total % 13 == 0:\n\
    \            bonuses = bonuses + total // 13\n\n    ❸ for col_index in range(franchisees):\n\
    \        total = 0\n        for row_index in range(days):\n            total =\
    \ total + grid[row_index][col_index]\n        if total % 13 == 0:\n          \
    \  bonuses = bonuses + total // 13\n\n    print(bonuses)\n```\n\n这个算法的大 O 效率是多少？这里有一些嵌套循环，所以第一个猜测是这个算法是\
    \ $O(n^2)$。但 $n$ 是什么？\n\n在本章到目前为止讨论的问题中，我们使用单个变量 $n$ 来表示输入量：$n$ 可以是交换次数、停车位数量、电子邮件地址数量或牛的数量。但在面包师奖金问题中，我们处理的是二维输入，所以我们需要*两个*变量来表示其数量。我们将第一个变量称为\
    \ $d$，表示天数；将第二个变量称为 $f$，表示加盟商数量。更正式地说，因为每个输入有多个测试用例，我们将 $d$ 设为最大天数，$f$ 设为最大加盟商数量。我们需要用\
    \ $d$ 和 $f$ *两者*来表示大 O 效率。\n\n我们的算法由三个主要部分组成：读取输入、计算行的奖金数量以及计算列的奖金数量。让我们逐一查看。\n\
    \n读取输入 ❶ 时，我们对外层循环执行 $d$ 次迭代。在每次迭代中，我们读取一行并调用 `split`，这大约需要 $f$ 步。我们还需要另外 $f$\
    \ 步来遍历值并将其转换为整数。因此，总共，$d$ 次迭代中的每一次都执行与 $f$ 成比例的步骤数。因此，读取输入需要 $O(df)$ 时间。\n\n现在来看行奖金\
    \ ❷。这里的外层循环循环 $d$ 次。每次迭代调用 `sum`，这需要 $f$ 步，因为它必须将 $f$ 个值相加。因此，与读取输入一样，算法的这一部分是\
    \ $O(df)$。\n\n最后，让我们看看列奖金的代码 ❸。外层循环循环 $f$ 次。每次迭代导致内层循环迭代 $d$ 次。这里的总数再次是 $O(df)$。\n\
    \n该算法的每个组件都是 $O(df)$。将三个 $O(df)$ 组件相加，整体得到一个 $O(df)$ 算法。\n\n## 概念检查\n\n以下算法的大\
    \ O 效率是多少？\n\n```\nfor i in range(m):\n    <执行需要一步的操作>\nfor j in range(n):\n \
    \   <执行需要一步的操作>\n```\n\n- A. $O(1)$\n- B. $O(n)$\n- C. $O(n^2)$\n- D. $O(m+n)$\n\
    - E. $O(mn)$\n\n答案：D。第一个循环依赖于 *m*，第二个依赖于 *n*。循环是顺序的，而不是嵌套的，因此它们的工作是相加而不是相乘。\n\n\
    ## 对数时间\n\n在第 255 页的“我们程序的效率”中，我们讨论了线性搜索和二分搜索之间的区别。线性搜索通过从头到尾搜索列表来查找列表中的值。这是一个\
    \ *O(n)* 算法。无论列表是否排序，它都有效。相比之下，二分搜索仅适用于已排序的列表。但如果你有一个已排序的列表，那么二分搜索速度极快。\n\n二分搜索通过将我们要搜索的值与列表中间的值进行比较来工作。如果列表中间的值大于我们要搜索的值，我们继续在列表的左半部分搜索。如果列表中间的值小于我们要搜索的值，我们继续在列表的右半部分搜索。我们不断这样做，每次忽略一半的列表，直到找到我们要找的值。\n\
    \n假设我们使用二分搜索在一个包含 512 个值的列表中查找一个值。这需要多少步？嗯，一步之后，我们忽略了一半的列表，所以我们剩下大约 512 / 2 =\
    \ 256 个值。（无论我们的值是大于列表中一半的值还是小于一半的值，都不重要；在每种情况下，我们都忽略一半的列表。）两步之后，我们剩下 256 / 2 =\
    \ 128 个值。三步之后，我们剩下 128 / 2 = 64 个值。继续下去，四步之后我们有 32 个值，五步之后我们有 16 个值，六步之后我们有 8\
    \ 个值，七步之后我们有 4 个值，八步之后我们有 2 个值，九步之后我们只有 1 个值。\n\n九步——仅此而已！这比使用线性搜索最多需要 512 步要好得多。二分搜索比线性时间算法做的工作少得多。但它是什么类型的算法呢？它不是常数时间：虽然它只需要很少的步骤，但随着输入量的增加，步骤数确实会略有增加。\n\
    \n二分搜索是*对数时间*或*log 时间*算法的一个例子。在大 O 表示法中，我们说对数时间算法是 *O(log n)*。"
