    \ add 26 / 13 = 2 bonuses to the total.\n- For every franchisee whose total sales\
    \ across all days is a multiple of 13, that multiple will be given as bonuses.\
    \ For example, a franchisee that sold a total of 39 baked goods will add 39 /\
