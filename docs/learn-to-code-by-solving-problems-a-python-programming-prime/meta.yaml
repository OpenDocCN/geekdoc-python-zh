    \n```\n>>> i = 0\n>>> while i <= len(s):\n...     print('We have ' + s[i])\n...\
    \     i = i + 1\n...\nWe have z\nWe have e\nWe have p\nWe have h\nWe have y\n\
    We have r\nTraceback (most recent call last):\n  File \"<stdin>\", line 2, in\
    \ <module>\nIndexError: string index out of range\n```\n\nThe length of the string\
    \ is 6. We get this error because the loop tries to access s[6], which is not\
    \ a valid index in the string.\n\nWant to loop through the string jumping by three\
    \ characters at a time instead of one? No problem; just increase i by 3 instead\
    \ of 1:\n\n```\n>>> i = 0\n>>> while i < len(s):\n...     print('We have ' + s[i])\n\
    ...     i = i + 3\n...\nWe have z\nWe have h\n```\n\nWe can also go from right\
