    \ stuck in an infinite loop. If it is, then it’ll never finish, no matter the\
    \ time limit. The judge terminates the program when the allotted time expires.\n\
    \nIf there’s no infinite loop, then the likely culprit is the *efficiency* of\
    \ our program itself. When programmers talk about efficiency, they’re referring\
    \ to how long it takes the program to run. A program that runs faster (takes less\
    \ time) is more efficient than a program that runs slower (takes more time). To\
    \ solve the test cases within the time limit, we’re going to make our program\
    \ more efficient.\n\n## Efficiency of Searching a List\n\nAppending to a Python\
    \ list is extremely fast. It doesn’t matter whether the list has only a few values\
    \ or many thousands; appending takes the same small amount of time.\n\nUsing the\
    \ `in` operator, however, is a different story. Our program uses the `in` operator\
    \ to determine whether a clean email address is already in our list of clean email\
    \ addresses. A test case might have as many as 100,000 email addresses. In the\
    \ worst case, then, our program could use `in` 100,000 times. It turns out that\
    \ `in` is very slow when used on a list with many values, and this ends up hurting\
    \ our program’s efficiency. To determine whether a value is in the list, `in`\
    \ searches the list from beginning to end, list value by list value. It does that\
    \ until it finds the value it’s looking for, or it runs out of list values to\
    \ check. The more values that `in` has to look through, the slower it is.\n\n\
    Let’s get a feel for the way that `in` slows down as the length of a list increases.\
    \ We’ll use a function that takes a list and a value and uses `in` to search the\
    \ list for the value. It searches for the value 50,000 times; if we searched only\
    \ once, it would be too fast for us to be able to see what’s going on.\n\nThe\
    \ function is in Listing 8-3. Enter its code into the Python shell.\n\n```python\n\
    def search(collection, value):\n    \"\"\"\n    search many times for value in\
    \ collection.\n    \"\"\"\n    for i in range(50000):\n        found = value in\
    \ collection\n```\n\n*Listing 8-3: Searching a collection many times*\n\nLet’s\
    \ create a list of the integers from 1 to 5,000 and search for 5000. By searching\
    \ for the rightmost value in the list, we make `in` take as much time as possible\
    \ on that list. Don’t worry that we’re exploring this using a list of integers\
    \ rather than a list of email addresses. The efficiency will be similar, and numbers\
    \ are so much easier to generate than email addresses!\n\nHere goes:\n\n```python\n\
    >>> search(list(range(1, 5001)), 5000)\n```\n\nOn my laptop, this takes about\
    \ three seconds to run. We don’t need precise timing here; we’re just looking\
    \ for a general picture of what happens as we increase the length of the list.\n\
    \nNow let’s create a list of the integers from 1 to 10,000 and search for 10000:\n\
    \n```python\n>>> search(list(range(1, 10001)), 10000)\n```\n\nOn my laptop, that\
    \ takes about six seconds. As a summary so far, for a list of length 5000, it\
    \ takes three seconds; double the list length to 10000, and the time doubles,\
    \ too, to six seconds.\n\nA list of length 20000? Give it a try:\n\n```python\n\
    >>> search(list(range(1, 20001)), 20000)\n```\n\nThis takes about 12 seconds on\
    \ my laptop. The time has doubled again. Try it on a list of length 50000. You’ll\
    \ be waiting a while. I just ran this on my laptop:\n\n```python\n>>> search(list(range(1,\
    \ 50001)), 50000)\n```\n\nIt took just over 30 seconds. Remember that our `search`\
    \ function is searching the list 50,000 times. So, it’s taking 30 seconds to search\
    \ a list of length 50000 a total of 50,000 times. We could have a test case that\
    \ requires this much searching. For example, suppose we add 100,000 unique email\
    \ addresses to our list, one at a time. Halfway through, we’ll have a list of\
    \ 50,000 values; from then on, the remaining 50,000 uses of `in` will be on a\
    \ list of at least 50,000 values. And that’s only for one of the 10 test cases!\
    \ We need to get through all 10 test cases within a total of 30 seconds. If one\
    \ test case can take about 30 seconds on its own, we have no chance. Searching\
    \ a list is just too slow. The Python list is the wrong type to use. We need a\
    \ type better suited to the job. We need a Python set. You’re not going to believe\
    \ how fast it is to search a set.\n\n## Sets\n\nA *set* is a Python type that\
    \ stores a collection of values, where repeated values are not allowed. We use\
    \ opening and closing curly brackets to delimit the set. Unlike a list, a set\
    \ might not maintain the values in the order you specify. Here’s a set of integers:\n\
    \n```python\n>>> {13, 15, 30, 45, 61}\n{45, 13, 15, 61, 30}\n```\n\nNotice that\
    \ Python jumbled the order of the values. You may see the values in a different\
    \ order on your computer. The important point is that you cannot rely on any particular\
    \ order of the values. If order matters to you, a set is not the type to use.\
    \ If we try to include multiple occurrences of a value, only one occurrence is\
    \ retained:\n\n```python\n>>> {1, 1, 3, 2, 3, 1, 3, 3, 3}\n{1, 2, 3}\n```\n\n\
    Sets are equal if they contain exactly the same values, even if we write them\
    \ in different orders:\n\n```python\n>>> {1, 2, 3} == {1, 2, 3}\nTrue\n>>> {1,\
    \ 1, 3, 2, 3, 1, 3, 3, 3} == {1, 2, 3}\nTrue\n>>> {1, 2} == {1, 2, 3}\nFalse\n\
    ```\n\nWe can create a set of strings, like this:\n\n```python\n>>> {'abc@d.e.f',\
    \ 'danielzingaro@gmail.com'}\n{'abc@d.e.f', 'danielzingaro@gmail.com'}\n```\n\n\
    We cannot create a set of lists:\n\n```python\n>>> {[1, 2], [3, 4]}\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError:\
    \ unhashable type: 'list'\n```\n\nValues in a set must be immutable, which explains\
    \ why we can’t put lists inside a set. The restriction has to do with how Python\
    \ searches a set for a value. When Python adds a value to a set, it uses the value\
    \ itself to determine where exactly it gets stored. Later, Python can find this\
    \ value by looking in the place where it should be located. If a value in the\
    \ set could change, then Python might look in the wrong place, failing to find\
    \ the value.\n\nWhile we can’t create a set of lists, there’s no problem with\
    \ a list of sets:\n\n```python\n>>> lst = [{1, 2, 3}, {4, 5, 6}]\n>>> lst\n[{1,\
    \ 2, 3}, {4, 5, 6}]\n>>> len(lst)\n2\n>>> lst[0]\n{1, 2, 3}\n```\n\nYou can use\
    \ the `len` function to determine the number of values in a set:\n\n```python\n\
    >>> len({2, 4, 6, 8})\n4\n```\n\nYou can also loop over the values in a set:\n\
    \n```python\n>>> for value in {2, 4, 6, 8}:\n...     print('I found', value)\n\
    ...\nI found 8\nI found 2\nI found 4\nI found 6\n```\n\nYou can't index or slice\
    \ a set, though. Values in a set don't have indices. To create an empty set, you\
    \ might expect to use an empty pair of curly brackets, `{}`. In an inconsistency\
    \ of Python syntax, that doesn't work:\n\n```python\n>>> type({2, 4, 6, 8})\n\
    <class 'set'>\n>>> {}\n{}\n>>> type({})\n<class 'dict'>\n```\n\nUsing `{}` gives\
    \ us the wrong type: a `dict` (dictionary) instead of a `set`. We'll talk about\
    \ dictionaries later in this chapter. To make an empty set, we use `set()`, like\
    \ this:\n\n```python\n>>> set()\nset()\n>>> type(set())\n<class 'set'>\n```\n\n\
    ## Set Methods\n\nSets are mutable, so we can add and remove values. We can perform\
    \ these tasks by using methods.\n\nYou can get a list of set methods by using\
    \ `dir(set())`. And you can get help on a specific set method by using `help`,\
    \ similar to how we use `help` to learn about string or list methods. For example,\
    \ to learn about the `add` method, type `help(set().add)`. The `add` method is\
    \ what we use to add a value to a set. It's the analog of `append` on lists:\n\
    \n```python\n>>> s = set()\n>>> s\nset()\n>>> s.add(2)\n>>> s\n{2}\n>>> s.add(4)\n\
    >>> s\n{2, 4}\n>>> s.add(6)\n>>> s\n{2, 4, 6}\n>>> s.add(8)\n>>> s\n{8, 2, 4,\
    \ 6}\n>>> s.add(8)\n>>> s\n{8, 2, 4, 6}\n```\n\nTo remove a value, we use the\
    \ `remove` method:\n\n```python\n>>> s.remove(4)\n>>> s\n{8, 2, 6}\n>>> s.remove(8)\n\
    >>> s\n{2, 6}\n>>> s = {2, 6}\n>>> s.remove(8)\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nKeyError: 8\n```\n\n### CONCEPT CHECK\n\
    \nUse `help` to learn about the set `update` and `intersection` methods."
