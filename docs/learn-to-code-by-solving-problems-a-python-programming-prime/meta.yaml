    ## if 语句


    我们现在将探讨 Python if 语句的几种变体。


    ### 单独的 if


    假设我们将最终得分保存在两个变量 `apple_total` 和 `banana_total` 中，并且我们希望在 `apple_total` 大于 `banana_total`
    时输出 A。我们可以这样做：


    ```

    >>> apple_total = 20

    >>> banana_total = 6

    >>> if apple_total > banana_total:

    ...     print(''A'')

    ...

    A

    ```


    正如我们所料，Python 输出了 A。


    if 语句以关键字 `if` 开始。*关键字*是对 Python 有特殊含义且不能用作变量名的词。关键字 `if` 后面跟着一个布尔表达式，然后是一个冒号，再然后是一个或多个缩进的语句。这些缩进的语句通常被称为
    if 语句的*代码块*。如果布尔表达式为 True，则执行该代码块；如果布尔表达式为 False，则跳过该代码块。


