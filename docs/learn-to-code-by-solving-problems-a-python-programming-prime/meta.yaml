    \ by closing the Python window.\n\nThe problem is that `num < 5` stays `True`\
    \ forever; nothing in the loop can ever make it `False`. This situation, where\
    \ a loop never terminates, is called an *infinite loop*. It’s surprisingly easy\
    \ to inadvertently produce infinite `while` loops. If you see the same values\
