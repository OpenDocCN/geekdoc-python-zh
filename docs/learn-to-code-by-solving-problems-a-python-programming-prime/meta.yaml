    \ `if` 语句中它之前的“else”部分都没有执行时，才会检查 `elif` 表达式。\n\n这个版本的代码等同于我们之前使用三个独立 `if` 语句的代码。如果我们想允许执行多个代码块的可能性，我们就必须使用三个独立的\
    \ `if` 语句，而不是一个带有 `elif` 块的 `if` 语句。\n\n## 使用 else 的 if\n\n我们可以使用 `else` 关键字在\
