- md: "## Solving the Problem\n\nBack to Three Cups. The structure we need is a for\
    \ loop to go through each swap, and a nested if statement to keep track of where\
    \ the ball is:\n\n```\nfor swap_type in swaps:\n    # Big if statement to keep\
    \ track of the ball\n```\n\nThere are three types of swaps (A, B, and C) and three\
    \ possible locations for the ball, so it’s tempting to conclude that we have to\
    \ write an if statement with 3 * 3 = 9 Boolean expressions (one after the if and\
    \ one after each of eight elifs). In fact, we need only six Boolean expressions.\
    \ Three of the nine don’t move the ball at all: swap type A when the ball is at\
    \ the right, swap type B when the ball is at the left, and swap type C when the\
    \ ball is at the middle.\n\nListing 3-1 has a solution to Three Cups.\n\n```\n\
    swaps = input()\n\nball_location = 1\n\nfor swap_type in swaps:\n    if swap_type\
    \ == 'A' and ball_location == 1:\n        ball_location = 2\n    elif swap_type\
    \ == 'A' and ball_location == 2:\n        ball_location = 1\n    elif swap_type\
    \ == 'B' and ball_location == 2:\n        ball_location = 3\n    elif swap_type\
    \ == 'B' and ball_location == 3:\n        ball_location = 2\n    elif swap_type\
    \ == 'C' and ball_location == 1:\n        ball_location = 3\n    elif swap_type\
    \ == 'C' and ball_location == 3:\n        ball_location = 1\n\nprint(ball_location)\n\
    ```\n\nListing 3-1: Solving Three Cups\n\nI’ve used input to assign the string\
    \ of swaps to the swaps variable. The for loop loops through these swaps. Each\
    \ swap is processed by the nested if statement. The if and elif branches each\
    \ encode what happens with a given type of swap and a given ball location and\
    \ then move the ball accordingly. For example, if the swap type is A and the ball\
    \ is at location 1, then the ball ends up at location 2.\n\nThis is a code example\
    \ where it matters whether we use multiple elifs (one big if statement) or multiple\
    \ ifs (multiple if statements). If we change the elifs to ifs, then our code is\
    \ no longer correct. Listing 3-2 shows the incorrect code.\n\n```\n# This code\
    \ is incorrect\n\nswaps = input()\n\nball_location = 1\n\nfor swap_type in swaps:\n\
    \    if swap_type == 'A' and ball_location == 1:\n        ball_location = 2\n\
    \    if swap_type == 'A' and ball_location == 2:\n        ball_location = 1\n\
    \    if swap_type == 'B' and ball_location == 2:\n        ball_location = 3\n\
    \    if swap_type == 'B' and ball_location == 3:\n        ball_location = 2\n\
    \    if swap_type == 'C' and ball_location == 1:\n        ball_location = 3\n\
    \    if swap_type == 'C' and ball_location == 3:\n        ball_location = 1\n\n\
    print(ball_location)\n```\n\n*Listing 3-2: Solving Three Cups incorrectly*\n\n\
    If we say that the code is incorrect, we’re claiming that it fails at least one\
    \ test case. Can you find a test case where this code produces the wrong answer?\n\
    \nHere’s one such test case:\n\n```\nA\n```\n\nIt may make sense to us that the\
    \ ball can move at most once per swap. But Python robotically runs the code you\
    \ have written, whether it matches what we expect or not. In this case, we have\
    \ only one swap, so the ball should move at most once. On the first and only iteration\
    \ of the for loop, Python checks the first if expression. It’s True, so Python\
    \ sets ball_location to 2. Then, Python checks the second if expression. Because\
    \ we just changed ball_location to 2, this expression is True! Python therefore\
    \ sets ball_location to 1. The output of the program is 1 when it should be 2.\n\
    \nThis is an example of a *logic error*: an error that causes a program to follow\
    \ the wrong logic and produce the wrong answer. A common term for logic error\
    \ is a *bug*. When programmers work through their code to fix bugs, it’s called\
    \ *debugging*.\n\nIt often takes only a simple test case to demonstrate when a\
    \ program is incorrect. When you’re trying to narrow down what’s going wrong with\
    \ your code, don’t start with long test cases. Such test case results are hard\
    \ to verify by hand and often set in motion complex execution paths from which\
    \ we may learn very little. A small test case, by contrast, doesn’t cause our\
    \ program to do much; if what it does is wrong, then we don’t have far to look\
    \ for the culprit. Devising small, targeted test cases is not always easy. It’s\
    \ a skill that you can hone through practice.\n\nSubmit our correct code to the\
    \ judge, and then let’s move on.\n\nBefore continuing, you might like to try solving\
    \ exercises 1 and 2 from “Chapter Exercises” on page 67.\n\n## Problem #6: Occupied\
    \ Spaces\n\nWe know how to loop through the characters of a string. But sometimes\
    \ we need to know where we are in the string, not just the character that’s stored\
    \ there. This problem is one such example.\n\nThis is DMOJ problem ccc18j2.\n\n\
    ### The Challenge\n\nYou supervise a parking lot with *n* parking spaces. Yesterday,\
    \ you recorded whether each parking space was occupied by a car or was empty.\
    \ Today, you again recorded whether each parking space was occupied by a car or\
    \ was empty. Indicate the number of parking spaces that were occupied on both\
    \ days.\n\n### Input\n\nThe input consists of three lines.\n\n- The first line\
    \ contains integer *n*, the number of parking spaces. *n* is between 1 and 100.\n\
    - The second line contains a string of *n* characters for yesterday’s information,\
    \ one character for each parking space. A C indicates an occupied parking space\
    \ (C for car), and a . indicates an empty parking space. For example, CC. means\
    \ that the first two parking spaces were occupied and the third was empty.\n-\
    \ The third line contains a string of *n* characters for today’s information,\
    \ in the same format as the second line.\n\n### Output\n\nOutput the number of\
    \ parking spaces that were occupied on both days.\n\n### A New Kind of Loop\n\n\
    We could have up to 100 parking spaces, so you may not be surprised that a loop\
    \ will show up here somewhere. The kind of for loop we learned when solving Three\
    \ Cups can certainly loop through a string of parking-space information:\n\n```\n\
    >>> yesterday = 'CC.'\n>>> for parking_space in yesterday:\n...     print('The\
    \ space is ' + parking_space)\n...\nThe space is C\nThe space is C\nThe space\
    \ is .\n```\n\nThat tells us whether each space was occupied yesterday. But we\
    \ also need to know whether each space was also occupied today.\n\nConsider this\
    \ test case:\n\n```\n3\nCC.\n.C.\n```\n\nThe first parking space was occupied\
    \ yesterday. Was that parking space occupied on both days? To answer that, we\
    \ need to look at the corresponding character in today’s string. It’s a . (empty),\
    \ so this parking space was not occupied on both days.\n\nWhat about the second\
    \ parking space? That one was also occupied yesterday. And, looking at the second\
    \ character of today’s string, it was also occupied today. So this *is* a parking\
    \ space that was occupied on both days. (This is the only such parking space;\
    \ the correct output for this test case is 1.)\n\nLooping through the characters\
    \ of one string doesn’t help us find the corresponding characters in the other\
    \ string. But if we could keep track of where we were in the string—we’re at the\
    \ first parking space, we’re at the second parking space, and so on—we could look\
    \ up the corresponding character from each string. The for loops we’ve learned\
    \ so far are not the way to do this. The way to do this is using indexing and\
    \ a new type of for loop.\n\n### Indexing\n\nEach character in a string has an\
    \ *index*, which indicates its location. The first character is at index 0, the\
    \ second character is at index 1, and so on. In natural language, we often start\
    \ counting at 1. In English, no one says “the character at position 0 of *hello*\
    \ is *h*.” But most programming languages, Python included, start at 0.\n\nTo\
    \ use indexing, we follow a string by an index in square brackets. Here are some\
    \ examples of indexing:\n\n```\n>>> word = 'splore'\n>>> word[0]\n's'\n>>> word[3]\n\
    'o'\n>>> word[5]\n'e'\n```\n\nIf we like, we can use variables in an index:\n\n\
    ```\n>>> where = 2\n>>> word[where]\n'l'\n>>> word[where + 2]\n'r'\n```\n\nThe\
    \ highest index that we can use on a nonempty string is its length minus 1. (There\
    \ is no valid index for an empty string.) For example, 'splore' is length 6, so\
    \ index 5 is its highest index. Any bigger and we get an error:\n\n```\n>>> word[len(word)]\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    IndexError: string index out of range\n```"
  mdcn: "## 解决问题\n\n回到三杯问题。我们需要的结构是一个 `for` 循环来遍历每次交换，以及一个嵌套的 `if` 语句来跟踪球的位置：\n\n\
    ```\nfor swap_type in swaps:\n    # 一个大的 if 语句来跟踪球的位置\n```\n\n交换类型有三种（A、B 和 C），球的位置也有三种可能，因此很容易得出结论：我们需要编写一个包含\
    \ 3 * 3 = 9 个布尔表达式的 `if` 语句（一个在 `if` 之后，另外八个在 `elif` 之后）。实际上，我们只需要六个布尔表达式。九个中有三个根本不会移动球：当球在右边时的\
    \ A 类型交换，当球在左边时的 B 类型交换，以及当球在中间时的 C 类型交换。\n\n清单 3-1 提供了三杯问题的解决方案。\n\n```\nswaps\
    \ = input()\n\nball_location = 1\n\nfor swap_type in swaps:\n    if swap_type\
    \ == 'A' and ball_location == 1:\n        ball_location = 2\n    elif swap_type\
    \ == 'A' and ball_location == 2:\n        ball_location = 1\n    elif swap_type\
    \ == 'B' and ball_location == 2:\n        ball_location = 3\n    elif swap_type\
    \ == 'B' and ball_location == 3:\n        ball_location = 2\n    elif swap_type\
    \ == 'C' and ball_location == 1:\n        ball_location = 3\n    elif swap_type\
    \ == 'C' and ball_location == 3:\n        ball_location = 1\n\nprint(ball_location)\n\
    ```\n\n清单 3-1：解决三杯问题\n\n我使用 `input` 将交换字符串赋值给 `swaps` 变量。`for` 循环遍历这些交换。每次交换都由嵌套的\
    \ `if` 语句处理。`if` 和 `elif` 分支分别编码了给定交换类型和给定球位置下发生的情况，然后相应地移动球。例如，如果交换类型是 A 且球在位置\
    \ 1，那么球最终会到达位置 2。\n\n这是一个代码示例，其中使用多个 `elif`（一个大的 `if` 语句）还是多个 `if`（多个 `if` 语句）很重要。如果我们把\
    \ `elif` 改成 `if`，那么我们的代码就不再正确了。清单 3-2 展示了不正确的代码。\n\n```\n# 此代码不正确\n\nswaps = input()\n\
    \nball_location = 1\n\nfor swap_type in swaps:\n    if swap_type == 'A' and ball_location\
    \ == 1:\n        ball_location = 2\n    if swap_type == 'A' and ball_location\
    \ == 2:\n        ball_location = 1\n    if swap_type == 'B' and ball_location\
    \ == 2:\n        ball_location = 3\n    if swap_type == 'B' and ball_location\
    \ == 3:\n        ball_location = 2\n    if swap_type == 'C' and ball_location\
    \ == 1:\n        ball_location = 3\n    if swap_type == 'C' and ball_location\
    \ == 3:\n        ball_location = 1\n\nprint(ball_location)\n```\n\n*清单 3-2：不正确地解决三杯问题*\n\
    \n如果我们说代码不正确，我们是在声称它至少在一个测试用例上失败了。你能找到一个这个代码产生错误答案的测试用例吗？\n\n这是一个这样的测试用例：\n\n\
    ```\nA\n```\n\n对我们来说，球在每次交换中最多移动一次可能是合理的。但 Python 会机械地运行你编写的代码，无论它是否符合我们的预期。在这种情况下，我们只有一次交换，所以球最多应该移动一次。在\
    \ `for` 循环的第一次也是唯一一次迭代中，Python 检查第一个 `if` 表达式。它是 `True`，所以 Python 将 `ball_location`\
    \ 设置为 2。然后，Python 检查第二个 `if` 表达式。因为我们刚刚将 `ball_location` 改为 2，所以这个表达式是 `True`！因此\
    \ Python 将 `ball_location` 设置为 1。程序的输出是 1，而它应该是 2。\n\n这是一个*逻辑错误*的例子：一种导致程序遵循错误逻辑并产生错误答案的错误。逻辑错误的一个常见术语是*bug*。当程序员通过代码来修复\
    \ bug 时，这被称为*调试*。\n\n通常只需要一个简单的测试用例就能证明程序是不正确的。当你试图缩小代码问题的范围时，不要从长的测试用例开始。这样的测试用例结果很难手动验证，并且通常会启动复杂的执行路径，我们从中可能学到的东西很少。相比之下，一个小的测试用例不会让我们的程序做太多事情；如果它做错了，那么我们就不必费力去寻找罪魁祸首。设计小的、有针对性的测试用例并不总是容易的。这是一项你可以通过练习来磨练的技能。\n\
    \n将我们正确的代码提交给评测系统，然后我们继续。\n\n在继续之前，你可能想尝试解决第 67 页“章节练习”中的练习 1 和 2。\n\n## 问题 #6：被占用的空间\n\
    \n我们知道如何遍历字符串的字符。但有时我们需要知道我们在字符串中的位置，而不仅仅是存储在那里的字符。这个问题就是一个这样的例子。\n\n这是 DMOJ 问题\
    \ ccc18j2。\n\n### 挑战\n\n你管理一个有 *n* 个停车位的停车场。昨天，你记录了每个停车位是被汽车占用还是空着。今天，你再次记录了每个停车位是被汽车占用还是空着。指出两天都被占用的停车位数量。\n\
    \n### 输入\n\n输入由三行组成。\n\n- 第一行包含整数 *n*，即停车位的数量。*n* 在 1 到 100 之间。\n- 第二行包含一个由 *n*\
    \ 个字符组成的字符串，表示昨天的信息，每个字符对应一个停车位。C 表示被占用的停车位（C 代表 car），. 表示空的停车位。例如，CC. 表示前两个停车位被占用，第三个是空的。\n\
    - 第三行包含一个由 *n* 个字符组成的字符串，表示今天的信息，格式与第二行相同。\n\n### 输出\n\n输出两天都被占用的停车位数量。\n\n###\
    \ 一种新型循环\n\n我们最多可能有 100 个停车位，所以你可能不会惊讶这里会出现循环。我们在解决三杯问题时学到的那种 `for` 循环当然可以遍历停车位信息字符串：\n\
    \n```\n>>> yesterday = 'CC.'\n>>> for parking_space in yesterday:\n...     print('The\
    \ space is ' + parking_space)\n...\nThe space is C\nThe space is C\nThe space\
    \ is .\n```\n\n这告诉我们昨天每个停车位是否被占用。但我们也需要知道每个停车位今天是否也被占用。\n\n考虑这个测试用例：\n\n```\n\
    3\nCC.\n.C.\n```\n\n第一个停车位昨天被占用。那个停车位两天都被占用吗？要回答这个问题，我们需要查看今天字符串中对应的字符。它是一个 .（空），所以这个停车位没有两天都被占用。\n\
    \n第二个停车位呢？那个停车位昨天也被占用。而且，查看今天字符串的第二个字符，它今天也被占用。所以这*确实*是一个两天都被占用的停车位。（这是唯一一个这样的停车位；这个测试用例的正确输出是\
    \ 1。）\n\n遍历一个字符串的字符无助于我们找到另一个字符串中的对应字符。但如果我们能跟踪我们在字符串中的位置——我们在第一个停车位，我们在第二个停车位，依此类推——我们就可以从每个字符串中查找对应的字符。我们目前学到的\
    \ `for` 循环不是实现这一点的方法。实现这一点的方法是使用索引和一种新型的 `for` 循环。\n\n### 索引\n\n字符串中的每个字符都有一个*索引*，它表示其位置。第一个字符在索引\
    \ 0，第二个字符在索引 1，依此类推。在自然语言中，我们通常从 1 开始计数。在英语中，没有人会说“*hello* 中位置 0 的字符是 *h*”。但大多数编程语言，包括\
    \ Python，都是从 0 开始的。\n\n要使用索引，我们在字符串后面跟一个方括号中的索引。以下是一些索引的示例：\n\n```\n>>> word =\
    \ 'splore'\n>>> word[0]\n's'\n>>> word[3]\n'o'\n>>> word[5]\n'e'\n```\n\n如果愿意，我们可以在索引中使用变量：\n\
    \n```\n>>> where = 2\n>>> word[where]\n'l'\n>>> word[where + 2]\n'r'\n```\n\n\
    我们可以对非空字符串使用的最高索引是其长度减 1。（空字符串没有有效的索引。）例如，'splore' 的长度是 6，所以索引 5 是它的最高索引。任何更大的索引都会导致错误：\n\
    \n```\n>>> word[len(word)]\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nIndexError: string index out of range\n```"
