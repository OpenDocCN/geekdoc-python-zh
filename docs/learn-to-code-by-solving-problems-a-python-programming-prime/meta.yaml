    # Solving the Problem


    Suppose that we’ve successfully read and sorted the village positions. Here’s
    what our list would look like at that point:


    ```

    >>> positions = [1, 4, 15, 19, 20, 50]

    >>> positions

    [1, 4, 15, 19, 20, 50]

