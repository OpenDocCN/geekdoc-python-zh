    \ book, but we won’t otherwise discuss OOP. For an introduction to OOP, and case\
    \ studies of OOP in practice, I recommend *Python Crash Course*, 2nd edition by\
    \ Eric Matthes (No Starch Press, 2019).\n\n# 7 READING AND WRITING FILES\n\nTo\
    \ this point, we’ve read all input using the `input` function and written all\
    \ output using the `print` function. These functions read from standard input\
    \ (defaulting to the keyboard) and write to standard output (defaulting to the\
