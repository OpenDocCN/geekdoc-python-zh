    ## 使用三重循环\n\n我们可以使用三重循环来考虑所有可能的三元组。我们将先查看代码，然后讨论其效率。\n\n## 代码\n\n在第 3 章的“嵌套”部分，我们学习了如何使用两个嵌套循环遍历所有值对。代码如下所示：\n\
