    \nThe maximum length of the line is 80 characters.\n\n## Output\n\nOutput the\
    \ number of words in the input line.\n\n## Strings\n\n*Values* are a fundamental\
    \ building block of Python programs. Each value has a *type*, and the type determines\
    \ the operations that can be performed on the value. In the Word Count problem,\
    \ we’re working with a line of text. Text is stored as a string value in Python,\
    \ so we’ll need to learn about strings. To solve the problem, we output the number\
    \ of words in the text, so we also need to learn about numeric values. Let’s begin\
    \ with strings.\n\n## Representing Strings\n\nA *string* is the Python type that’s\
    \ used to store and manipulate text. To write a string value, we place its characters\
    \ between single quotes. Follow along in the Python shell:\n\n```\n>>> 'hello'\n\
    'hello'\n>>> 'a bunch of words'\n'a bunch of words'\n```\n\nThe Python shell echoes\
    \ each string that I’ve typed. What happens when our string contains a single\
    \ quote as one of its characters?\n\n```\n>>> 'don't say that'\nFile \"<stdin>\"\
    , line 1\n    'don't say that'\n          ^\nSyntaxError: invalid syntax\n```\n\
    \nThe single quote in the word don't terminates the string. The rest of the line,\
    \ t say that', therefore doesn’t make sense, and that’s what generates the syntax\
    \ error. A *syntax error* means that we have violated the rules of Python and\
    \ have not written valid Python code. To fix this, we can take advantage of the\
    \ fact that double quotes can also be used to delimit strings:\n\n```\n>>> \"\
    don't say that\"\n\"don't say that\"\n```\n\nUnless the string in question has\
    \ a single quote, I won’t use double quotes in this book.\n\n## String Operators\n\
    \nWe can use a string to hold the text whose words we want to count. To count\
    \ the words—or to do anything else with strings—we need to learn how to work with\
    \ strings. Strings come with a rich variety of operations that we can perform.\
    \ Some of them use special symbols between their operands. For example, the +\
    \ operator is used for string concatenation:\n\n```\n>>> 'hello' + 'there'\n'hellothere'\n\
    ```\n\nOops—we need a space between those two words. Let’s add one to the end\
    \ of the first string:\n\n```\n>>> 'hello ' + 'there'\n'hello there'\n```\n\n\
    There’s also the * operator, which replicates a string a specified number of times:\n\
    \n```\n>>> '-' * 30\n'------------------------------'\n```\n\nThat 30 there is\
    \ an integer value. I’ll have more to say about integers shortly.\n\n### CONCEPT\
    \ CHECK\n\nWhat is the output of the following code?\n\n```\n>>> \"\" * 3\n```\n\
    \n- A. \"\"\"\n- B. \"\"\n- C. This code produces a syntax error (invalid Python\
    \ code)\n\nAnswer: B. \"\" is the empty string—a string of zero characters. Repeating\
    \ an empty string three times is still an empty string!\n\n## String Methods\n\
    \nA method is an operation specific to a type of value. Strings have a large number\
    \ of methods. For example, there’s a method called upper, which produces the uppercase\
    \ version of a string:\n\n```\n>>> 'hello'.upper()\n'HELLO'\n```\n\nThe information\
    \ we get back from a method is known as the method’s *return value*. For example,\
    \ we could say for the previous example that `upper` returned the string 'HELLO'.\n\
    \nPerforming a method on a value is known as *calling* the method. Calling a method\
    \ involves placing the *dot operator* (.) between the value and the method name.\
    \ It also requires parentheses after the method name. For some methods, we leave\
    \ those parentheses empty, as when calling `upper`.\n\nFor other methods, we can\
    \ optionally include information there. Still other methods require information\
    \ and won’t work at all without it. Information we include when calling a method\
    \ is referred to as the method’s *arguments*.\n\nFor example, strings have a `strip`\
    \ method. If called with no arguments, `strip` removes all leading and trailing\
    \ spaces from a string:\n\n```\n>>> '  abc'.strip()\n'abc'\n>>> '  abc  '.strip()\n\
    'abc'\n>>> 'abc'.strip()\n'abc'\n```\n\nBut we can also call it with a string\
