    \ if the result of the operator is already known. For and, if the first operand\
    \ is False, then we know that, no matter what the second operand is, and will\
    \ return False; Python therefore doesn’t evaluate the second operand. Similarly,\
    \ for or, if the first operand is True, then or is guaranteed to return True,\
    \ so Python doesn’t evaluate the second operand.\n\n## Solving the Problem\n\n\
