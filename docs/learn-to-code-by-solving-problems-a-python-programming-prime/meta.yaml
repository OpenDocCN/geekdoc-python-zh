    # Problem #22: Ski Hills


    Sometimes, the problem description makes it clear what we should search through
    in a complete-search solution. For example, in Lifeguards, we were asked to fire
    one lifeguard, so it made sense to try firing each one. Other times, we’ll have
    to be more creative to determine what to search through. As you read this next
    problem, think about what you would search in a complete-search solution.


    This is USACO 2014 January Bronze Contest problem Ski Course Design.


    # The Challenge


    Farmer John has *n* hills on his farm, each with a height between 0 and 100. He
    would like to register his farm as a ski training camp.


    A farm can be registered as a ski training camp only if the difference in height
    between the highest and lowest hills is 17 or less. Farmer John may therefore
    need to increase the heights of some of his hills and decrease the heights of
    others. He is able to change the heights only by integer amounts.


    The cost of changing a hill’s height by *x* units is *x*². For example, changing
    a hill from height 1 to height 4 costs (4 – 1)² = 9.


    Determine the minimum amount that Farmer John will need to pay to change the heights
    of hills so that he can register his farm as a ski training camp.


    # Input


    Read input from the file named *skidesign.in*.


    The input consists of the following lines:'
