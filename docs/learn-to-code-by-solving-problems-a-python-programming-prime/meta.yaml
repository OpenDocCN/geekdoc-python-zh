    \nWe can create functions with more than one parameter. Here’s a function that\
    \ takes two parameters, a message to print and the number of times to print it:\n\
    \n```\n>>> def intro3(message, num_times):\n...     for i in range(num_times):\n\
    ...         print(message)\n...\n```\n\nTo call this one, we provide two arguments.\
    \ Python works from left to right, assigning the first argument to the first parameter\
    \ and the second argument to the second parameter. In the following call, 'high'\
    \ is assigned to the `message` parameter and 5 is assigned to the `num_times`\
    \ parameter:\n\n```\n>>> intro3('high', 5)\nhigh\nhigh\nhigh\nhigh\nhigh\n```\n\
    \nBe sure to provide the correct number of arguments. For `intro3`, we need two\
    \ arguments. Anything else is an error:"
- md: "## Keyword Arguments\n\nIt’s possible to override the left-to-right correspondence\
    \ between arguments and parameters when calling a function. To do that, we use\
    \ the names of parameters in whatever order we like. An argument that uses the\
    \ name of a parameter is called a *keyword argument*. Here’s how it works:\n\n\
    ```python\n>>> def intro3(message, num_times):\n...     for i in range(num_times):\n\
    ...         print(message)\n...\n>>> intro3(message='high', num_times=3)\nhigh\n\
    high\nhigh\n>>> intro3(num_times=3, message='high')\nhigh\nhigh\nhigh\n```\n\n\
    Each function call here uses two keyword arguments. A keyword argument is written\
    \ as the name of a parameter, an equal sign, and its corresponding argument.\n\
    You can even start with regular arguments and finish with keyword arguments:\n\
    \n```python\n>>> intro3('high', num_times=3)\nhigh\nhigh\nhigh\n```\n\nBut once\
    \ you use a keyword argument, you can’t go back to regular ones:\n\n```python\n\
    >>> intro3(message='high', 3)\nFile \"<stdin>\", line 1\nSyntaxError: positional\
    \ argument follows keyword argument\n```\n\nIn “Sorting a List” in Chapter 5 we\
    \ used a reverse keyword argument when calling the sort method. The Python designers\
    \ decided that reverse would be a keyword-only parameter, which means that it’s\
    \ impossible to fill in its value without using a keyword argument. Python lets\
    \ us do that with our functions, too, but we won’t need that level of control\
    \ in this book.\n\n## Local Variables\n\nNames of parameters work like regular\
    \ variables, but are local to the function in which they’re defined. That is,\
    \ a function parameter doesn’t exist outside of its function:\n\n```python\n>>>\
    \ def intro2(message):\n...     line_length = len(message) + 2\n...     print('*'\
    \ * line_length)\n...     print(f'*{message}*')\n...     print('*' * line_length)\n\
    ...\n>>> intro2('hello')\n*******\n*hello*\n*******\n>>> message\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\nNameError: name\
    \ 'message' is not defined\n```\n\nWhat about that `line_length` variable—is it\
    \ local, too? It is:\n\n```python\n>>> line_length\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nNameError: name 'line_length'\
    \ is not defined\n```\n\nWhat happens if you have a variable and you call a function\
    \ that uses a parameter or local variable of the same name? Is your value lost?\
    \ Let’s see:\n\n```python\n>>> line_length = 999\n>>> intro2('hello')\n*******\n\
    *hello*\n*******\n>>> line_length\n999\n```\n\nPhew—it’s still 999, just as we\
    \ left it. Local variables are created when a function is called and destroyed\
    \ when the function terminates, all without affecting other variables with shared\
    \ names.\n\nA function can access a variable that was created outside of that\
    \ function. It’s ill-advised to rely on that, though, because then that function\
    \ isn’t self-contained, instead hoping that variables it expects to be there are\
    \ actually there. In this book, we’ll write functions so that they only use local\
    \ variables. All information that a function needs will be provided to the function\
    \ through its parameters.\n\n## Mutable Parameters\n\nSince a parameter is an\
    \ alias for its corresponding argument, it can be used to change a mutable value.\
    \ Here’s a function that removes all occurrences of `value` from a list `lst`:\n\
    \n```python\n>>> def remove_all(lst, value):\n...     while value in lst:\n...\
    \         lst.remove(value)\n...\n>>> lst = [5, 10, 20, 5, 45, 5, 9]\n>>> remove_all(lst,\
    \ 5)\n>>> lst\n[10, 20, 45, 9]\n```\n\nNotice that we passed a list to `remove_all`\
    \ by using a variable. This function won’t accomplish anything useful if you call\
    \ it with a list value directly (rather than with a variable referring to a list):\n\
    \n```python\n>>> remove_all([5, 10, 20, 5, 45, 5, 9], 5)\n```\n\nThe function\
    \ removed all the 5s from the list, but because we didn’t use a variable, we have\
    \ no way to refer to that list ever again.\n\n## CONCEPT CHECK\n\nWhat is the\
    \ output of the following code?\n\n```python\ndef mystery(s, lst):\n    s = s.upper()\n\
    \    lst = lst + [2]\n\ns = 'a'\nlst = [1]\nmystery(s, lst)\n\nprint(s, lst)\n\
    ```\n\n- A. a [1]\n- B. a [1, 2]\n- C. A [1]\n- D. A [1, 2]\n\nAnswer: A. When\
    \ `mystery` is called, its `s` parameter is made to reference whatever the `s`\
    \ argument refers to, which is the 'a' string. Similarly, its `lst` parameter\
    \ is made to reference whatever the `lst` argument refers to, which is the [1]\
    \ list. Inside of `mystery`, `s` and `lst` are local variables.\n\nNow let’s study\
    \ the two statements of the function itself.\n\nFirst, `s = s.upper()`. This makes\
    \ the local variable `s` refer to 'A' (uppercase). But it hasn't changed what\
    \ `s` refers to outside of the function. That still refers to 'a' (lowercase).\n\
    \nSecond, `lst = lst + [2]`. Using `+` with lists creates a new list (it doesn't\
    \ change an existing list!), so this makes the local variable `lst` refer to the\
    \ new list: [1, 2]. But, again, it hasn't changed what `lst` refers to outside\
    \ of the function; it's still [1].\n\nWhat gives—didn't I tell you previously\
    \ that functions can change a mutable parameter? I did; but to make that happen,\
    \ you really do need to change the value itself, not what a local variable refers\
    \ to. Compare the previous program with the next one, whose output is different:\n\
    \n```python\ndef mystery(s, lst):\n    s.upper() # upper creates a new string\n\
    \    lst.append(2) # append changes the list\n\ns = 'a'\nlst = [1]\nmystery(s,\
    \ lst)\n\nprint(s, lst)\n```\n\n## Return Values\n\nLet's come back to our Card\
    \ Game problem. Our goal is to define a function that tells us whether there are\
    \ no high cards in a list of cards. We'll name that function `no_high`. We haven't\
    \ written `no_high` yet, but we can still specify what we hope to accomplish.\
    \ Here's what we're after:\n\n```python\n>>> no_high(['two', 'six'])\nTrue\n>>>\
    \ no_high(['eight'])\nTrue\n>>> no_high(['two', 'jack', 'four'])\nFalse\n>>> no_high(['queen',\
    \ 'king', 'three', 'queen'])\nFalse\n```\n\nWe want the first two calls to return\
    \ `True`, because there are no high cards in those lists of cards. And we want\
    \ the third and fourth calls to return `False`, because there’s at least one high\
    \ card in those lists of cards.\nHow can we define a function that returns these\
    \ `True` and `False` values? That’s the final piece of the function puzzle.\n\
    To return a value from a function, we use Python’s `return` keyword. As soon as\
    \ a `return` is reached, execution of the function terminates, and the specified\
    \ value is returned to the caller.\nHere’s how we can write the `no_high` function:\n\
    \n```python\n>>> def no_high(lst):\n...     if 'jack' in lst:\n...         return\
    \ False\n...     if 'queen' in lst:\n...         return False\n...     if 'king'\
    \ in lst:\n...         return False\n...     if 'ace' in lst:\n...         return\
    \ False\n...     return True\n...\n```\n\nWe first check whether there are any\
    \ 'jack' cards in the list. If there are, then we know that the list contains\
    \ one or more high cards, so we immediately return `False`.\nIf we’re still here,\
    \ then we know that there are no jacks. But there could be other high cards, so\
    \ we need to check for them. The rest of the `if` statements check for queens,\
    \ kings, and aces, respectively, returning `False` if any of them is in the list.\n\
    If we don’t hit any of those four `return` statements, then there are no high\
    \ cards in the list. In that case, we return `True`.\nA `return` by itself, with\
    \ no value given, returns the value `None`. That’s useful if you’re writing a\
    \ function that doesn’t return anything useful and you need to terminate the function\
    \ before reaching the bottom of its code.\nIf a `return` is encountered inside\
    \ a loop, the function still terminates immediately, regardless of how deeply\
    \ nested it is. Here’s an example showing a `return` getting us out of a nested\
    \ loop:\n\n```python\n>>> def func():\n...     for i in range(10):\n...      \
    \   for j in range(10):\n```"
  mdcn: "## 关键字参数\n\n在调用函数时，可以覆盖参数与形参之间从左到右的对应关系。为此，我们可以按任意顺序使用形参的名称。使用形参名称的实参称为*关键字参数*。其工作原理如下：\n\
    \n```python\n>>> def intro3(message, num_times):\n...     for i in range(num_times):\n\
    ...         print(message)\n...\n>>> intro3(message='high', num_times=3)\nhigh\n\
    high\nhigh\n>>> intro3(num_times=3, message='high')\nhigh\nhigh\nhigh\n```\n\n\
    这里的每次函数调用都使用了两个关键字参数。关键字参数的写法是：形参名称、等号，以及其对应的实参。\n你甚至可以先使用常规参数，再使用关键字参数：\n\n```python\n\
    >>> intro3('high', num_times=3)\nhigh\nhigh\nhigh\n```\n\n但一旦使用了关键字参数，就不能再回到常规参数了：\n\
    \n```python\n>>> intro3(message='high', 3)\nFile \"<stdin>\", line 1\nSyntaxError:\
    \ positional argument follows keyword argument\n```\n\n在第5章的“列表排序”中，我们在调用 `sort`\
    \ 方法时使用了 `reverse` 关键字参数。Python 设计者决定将 `reverse` 设为仅限关键字参数，这意味着如果不使用关键字参数，就无法为其赋值。Python\
    \ 也允许我们在自己的函数中这样做，但本书中我们不需要这种级别的控制。\n\n## 局部变量\n\n形参的名称就像普通变量一样，但仅在定义它们的函数内部有效。也就是说，函数形参在其函数外部是不存在的：\n\
    \n```python\n>>> def intro2(message):\n...     line_length = len(message) + 2\n\
    ...     print('*' * line_length)\n...     print(f'*{message}*')\n...     print('*'\
    \ * line_length)\n...\n>>> intro2('hello')\n*******\n*hello*\n*******\n>>> message\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    NameError: name 'message' is not defined\n```\n\n那么 `line_length` 变量呢——它也是局部的吗？是的：\n\
    \n```python\n>>> line_length\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nNameError: name 'line_length' is not defined\n```\n\n如果你有一个变量，然后调用一个使用同名形参或局部变量的函数，会发生什么？你的值会丢失吗？让我们看看：\n\
    \n```python\n>>> line_length = 999\n>>> intro2('hello')\n*******\n*hello*\n*******\n\
    >>> line_length\n999\n```\n\n呼——它仍然是 999，就像我们离开时一样。局部变量在函数被调用时创建，在函数终止时销毁，所有这些都不会影响具有相同名称的其他变量。\n\
    \n函数可以访问在该函数外部创建的变量。不过，不建议依赖这一点，因为那样函数就不是自包含的了，而是期望它需要的变量确实存在。在本书中，我们将编写只使用局部变量的函数。函数需要的所有信息都将通过其参数提供给函数。\n\
    \n## 可变参数\n\n由于形参是其对应实参的别名，因此可以用来改变可变值。下面是一个从列表 `lst` 中移除所有 `value` 出现的函数：\n\n\
    ```python\n>>> def remove_all(lst, value):\n...     while value in lst:\n... \
    \        lst.remove(value)\n...\n>>> lst = [5, 10, 20, 5, 45, 5, 9]\n>>> remove_all(lst,\
    \ 5)\n>>> lst\n[10, 20, 45, 9]\n```\n\n注意，我们通过使用变量将列表传递给 `remove_all`。如果你直接使用列表值（而不是引用列表的变量）调用它，这个函数将无法完成任何有用的操作：\n\
    \n```python\n>>> remove_all([5, 10, 20, 5, 45, 5, 9], 5)\n```\n\n该函数从列表中移除了所有的\
    \ 5，但由于我们没有使用变量，我们再也无法引用该列表。\n\n## 概念检查\n\n以下代码的输出是什么？\n\n```python\ndef mystery(s,\
    \ lst):\n    s = s.upper()\n    lst = lst + [2]\n\ns = 'a'\nlst = [1]\nmystery(s,\
    \ lst)\n\nprint(s, lst)\n```\n\n- A. a [1]\n- B. a [1, 2]\n- C. A [1]\n- D. A\
    \ [1, 2]\n\n答案：A。当调用 `mystery` 时，其 `s` 参数被设置为引用 `s` 实参所引用的内容，即字符串 'a'。同样，其 `lst`\
    \ 参数被设置为引用 `lst` 实参所引用的内容，即列表 [1]。在 `mystery` 内部，`s` 和 `lst` 是局部变量。\n\n现在让我们研究函数本身的两个语句。\n\
    \n首先，`s = s.upper()`。这使得局部变量 `s` 引用 'A'（大写）。但它并没有改变函数外部 `s` 所引用的内容。它仍然引用 'a'（小写）。\n\
    \n其次，`lst = lst + [2]`。对列表使用 `+` 会创建一个新列表（它不会改变现有列表！），因此这使得局部变量 `lst` 引用新列表：[1,\
    \ 2]。但是，同样，它并没有改变函数外部 `lst` 所引用的内容；它仍然是 [1]。\n\n怎么回事——我之前不是告诉过你函数可以改变可变参数吗？我说过；但要实现这一点，你确实需要改变值本身，而不是局部变量所引用的内容。将前面的程序与下面这个输出不同的程序进行比较：\n\
    \n```python\ndef mystery(s, lst):\n    s.upper() # upper 创建一个新字符串\n    lst.append(2)\
    \ # append 改变列表\n\ns = 'a'\nlst = [1]\nmystery(s, lst)\n\nprint(s, lst)\n```\n\
    \n## 返回值\n\n让我们回到我们的纸牌游戏问题。我们的目标是定义一个函数，告诉我们一个牌列表中是否没有大牌。我们将这个函数命名为 `no_high`。我们还没有编写\
    \ `no_high`，但我们仍然可以指定我们希望实现的目标。以下是我们想要的：\n\n```python\n>>> no_high(['two', 'six'])\n\
    True\n>>> no_high(['eight'])\nTrue\n>>> no_high(['two', 'jack', 'four'])\nFalse\n\
    >>> no_high(['queen', 'king', 'three', 'queen'])\nFalse\n```\n\n我们希望前两次调用返回 `True`，因为这些牌列表中没有大牌。我们希望第三次和第四次调用返回\
    \ `False`，因为这些牌列表中至少有一张大牌。\n我们如何定义一个返回这些 `True` 和 `False` 值的函数？这是函数拼图的最后一块。\n\
    要从函数返回一个值，我们使用 Python 的 `return` 关键字。一旦执行到 `return`，函数的执行就会终止，并将指定的值返回给调用者。\n\
    以下是我们如何编写 `no_high` 函数：\n\n```python\n>>> def no_high(lst):\n...     if 'jack'\
    \ in lst:\n...         return False\n...     if 'queen' in lst:\n...         return\
    \ False\n...     if 'king' in lst:\n...         return False\n...     if 'ace'\
    \ in lst:\n...         return False\n...     return True\n...\n```\n\n我们首先检查列表中是否有任何\
    \ 'jack' 牌。如果有，那么我们知道该列表包含一张或多张大牌，所以我们立即返回 `False`。\n如果我们还在这里，那么我们知道没有 jack。但可能还有其他大牌，所以我们需要检查它们。其余的\
    \ `if` 语句分别检查 queen、king 和 ace，如果其中任何一张在列表中，则返回 `False`。\n如果我们没有遇到这四个 `return`\
    \ 语句中的任何一个，那么列表中就没有大牌。在这种情况下，我们返回 `True`。\n一个单独的 `return`，没有给出值，会返回值 `None`。如果你正在编写一个不返回任何有用内容的函数，并且需要在到达代码底部之前终止函数，这很有用。\n\
    如果在循环内部遇到 `return`，无论嵌套多深，函数仍会立即终止。以下是一个示例，展示 `return` 如何让我们跳出嵌套循环：\n\n```python\n\
    >>> def func():\n...     for i in range(10):\n...         for j in range(10):\n\
    ```"
