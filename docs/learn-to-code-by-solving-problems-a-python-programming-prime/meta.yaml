    \ be called before it does anything. The `random` module is an example of a well-behaved\
    \ module: it only starts giving us random things when we ask for them.\n\n## The\
    \ bisect Module\n\nNow we’re ready to play around with binary search. In Listing\
    \ 9-6, we had two `while` loops. They’re slow, so we want to get rid of them.\
    \ To do that, we’re going to replace each one with a call to a binary search function:\
    \ `bisect_left` for the first `while` loop and `bisect_right` for the second.\n\
    \nBoth of these functions are in the `bisect` module. Let’s import them:\n\n```\n\
    >>> from bisect import bisect_left, bisect_right\n```\n\nLet’s first discuss `bisect_left`.\
    \ We call it by providing a list sorted from smallest to largest and a value `x`.\
    \ It returns to us the index of the leftmost value in the list that’s greater\
    \ than or equal to `x`.\n\nIf the value is in the list, we get the index of its\
    \ leftmost occurrence:\n\n```\n>>> bisect_left([10, 50, 80, 80, 100], 10)\n0\n\
    >>> bisect_left([10, 50, 80, 80, 100], 80)\n2\n```\n\nIf the value isn’t in the\
    \ list, then we get the index of the first value that’s greater:\n\n```\n>>> bisect_left([10,\
    \ 50, 80, 80, 100], 15)\n1\n>>> bisect_left([10, 50, 80, 80, 100], 81)\n4\n```\n\
    \nIf we search for something that’s greater than every value in the list, we get\
    \ the list’s length:\n\n```\n>>> bisect_left([10, 50, 80, 80, 100], 986)\n5\n\
    ```\n\nLet’s use `bisect_left` on our list of seven positions from “Sorting First”\
    \ earlier in this chapter. We’ll find the index of the leftmost position that’s\
    \ greater than or equal to 16:\n\n```\n>>> positions = [1, 6, 11, 14, 16, 18,\
    \ 23]\n>>> bisect_left(positions, 16)\n4\n```\n\nPerfect: that’s exactly what\
    \ we need to replace the first `while` loop in Listing 9-6.\n\nTo replace the\
    \ second `while` loop, we’ll use `bisect_right` rather than `bisect_left`. We\
    \ call `bisect_right` just as we called `bisect_left`: with a sorted list and\
    \ a value `x`. Rather than returning the index of the leftmost value in the list\
    \ that’s greater than or equal to `x`, it returns the index of the leftmost value\
    \ that’s greater than `x`.\n\nLet’s compare `bisect_left` and `bisect_right`.\
    \ For a value that’s in the list, `bisect_right` returns an index greater than\
    \ that returned by `bisect_left`:\n\n```\n>>> bisect_left([10, 50, 80, 80, 100],\
    \ 10)\n0\n>>> bisect_right([10, 50, 80, 80, 100], 10)\n1\n>>> bisect_left([10,\
    \ 50, 80, 80, 100], 80)\n2\n>>> bisect_right([10, 50, 80, 80, 100], 80)\n4\n```\n\
    \nFor a value that isn’t in the list, `bisect_left` and `bisect_right` return\
    \ the same index:\n\n```\n>>> bisect_left([10, 50, 80, 80, 100], 15)\n1\n>>> bisect_right([10,\
    \ 50, 80, 80, 100], 15)\n1\n>>> bisect_left([10, 50, 80, 80, 100], 81)\n4\n>>>\
    \ bisect_right([10, 50, 80, 80, 100], 81)\n4\n>>> bisect_left([10, 50, 80, 80,\
    \ 100], 986)\n5\n>>> bisect_right([10, 50, 80, 80, 100], 986)\n5\n```\n\nLet’s\
    \ use `bisect_right` on our list of seven positions from “Sorting First” earlier\
    \ in this chapter. We’ll find the index of the leftmost position that’s greater\
    \ than 21:\n\n```\n>>> positions = [1, 6, 11, 14, 16, 18, 23]\n>>> bisect_right(positions,\
    \ 21)\n6\n```\n\nThere we go: that’s what we can use to replace the second `while`\
    \ loop in Listing 9-6.\n\nThe stunning speed of binary search is hard to appreciate\
    \ using these tiny examples. Time to get real. We’ll search one million times\
    \ for the rightmost value in a list of length 1000000. Don’t look away when you\
    \ run this code. You might miss it.\n\n```\n>>> lst = list(range(1, 1000001))\n\
    >>> for i in range(1000000):\n...     where = bisect_left(lst, 1000000)\n...\n\
    ```\n\nOn my computer, that takes about a second. You might be wondering what\
    \ would happen if you replaced the binary search with a call to the list `index`\
    \ method. If you try it, you’ll literally wait hours for the code to run. That’s\
    \ because `index`, like the `in` operator, does a linear search through the list.\
    \ (See “Efficiency of Searching a List” in Chapter 8 for more on this.) It has\
    \ no guarantee that the list is sorted, so it can’t perform a blazing-fast binary\
    \ search. It has to go through the values one by one, comparing each of them to\
    \ the value we’re searching for. If you have a sorted list and you want to find\
    \ values in it, binary search is unstoppable.\n\n## Solving the Problem\n\nWe’re\
    \ ready to solve Cow Baseball using binary search. See Listing 9-7 for the code.\n\
    \n```python\n❶ from bisect import bisect_left, bisect_right\n\ninput_file = open('baseball.in',\
    \ 'r')\noutput_file = open('baseball.out', 'w')\n\nn = int(input_file.readline())\n\
    \npositions = []\n\nfor i in range(n):\n    positions.append(int(input_file.readline()))\n\
    \npositions.sort()\n\ntotal = 0\n\nfor i in range(n):\n    for j in range(i +\
    \ 1, n):\n        first_two_diff = positions[j] - positions[i]\n        low =\
    \ positions[j] + first_two_diff\n        high = positions[j] + first_two_diff\
    \ * 2\n        ❷ left = bisect_left(positions, low)\n        ❸ right = bisect_right(positions,\
    \ high)\n        total = total + right - left\n\noutput_file.write(str(total)\
    \ + '\\n')\ninput_file.close()\noutput_file.close()\n```\n\nListing 9-7: Using\
    \ binary search\n\nTo begin, we import the `bisect_left` and `bisect_right` functions\
    \ from the `bisect` module so that we can call them ❶. The only other difference\
    \ compared to Listing 9-6 is that we now use `bisect_left` ❷ and `bisect_right`\
    \ ❸ instead of the `while` loops.\n\nIf you submit our code to the judge now,\
    \ you should pass all test cases within the time limit.\n\nThe arc that we followed\
    \ in this section is typical of that required to solve hard problems. We might\
    \ start with a complete-search solution that is correct but, alas, is also too\
    \ slow, not meeting the judge's time limits. We then make improvements, leading\
    \ us away from complete search and toward a more refined approach.\n\n### CONCEPT\
    \ CHECK\n\nSuppose we start with Listing 9-7 and use `bisect_left` in place of\
    \ `bisect_right`. That is, we take this line:\n\n```python\nright = bisect_right(positions,\
    \ high)\n```\n\nAnd we change it to the following:\n\n```python\nright = bisect_left(positions,\
    \ high)\n```\n\nDoes the program still produce the correct answers?\n\nA. It always\
    \ produces the correct answer, just as before.\nB. It sometimes produces the correct\
    \ answer; it depends on the test case.\nC. It never produces the correct answer."
