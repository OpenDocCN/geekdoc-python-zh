  md: 'Remember that the input function returns a string, no matter what the input
    looks like. If the input should be interpreted as an integer, we need to convert
    the string to an integer. If the input should be interpreted as a float, we need
    to convert the string to a float. And if the input should be interpreted as four
    floats? Well, then we had better split it up into individual floats before converting
    anything!


    The string split method splits a string into a list of its pieces. By default,
    split splits around spaces, which is exactly what we need for our four floats:


    ```

    >>> s = ''0.2 0.08 0.4 0.32''

    >>> s.split()

    [''0.2'', ''0.08'', ''0.4'', ''0.32'']

    ```


    The split method returns a list of strings, at which point we can access each
    one independently. Here, I save the list that split returns and then access two
    of its values:


    ```

    >>> proportions = s.split()

    >>> proportions

    [''0.2'', ''0.08'', ''0.4'', ''0.32'']

    >>> proportions[1]

    ''0.08''

    >>> proportions[2]

    ''0.4''

    ```


    Data in the wild is often comma-separated rather than space-separated. Piece of
    cake: we can call split with an argument that tells it what to use as a separator:


    ```

    >>> info = ''Toronto,Ontario,Canada''

    >>> info.split('','')

    [''Toronto'', ''Ontario'', ''Canada'']

    ```


    # Joining a List into a String


    To go the other way, from a list to a string rather than a string to a list, we
    can use the string join method. The string on which join is called is used as
    the separator between list values. Here are two examples:


    ```

    >>> lst = [''Toronto'', ''Ontario'', ''Canada'']

    >>> '',''.join(lst)

    ''Toronto,Ontario,Canada''

    ```'
