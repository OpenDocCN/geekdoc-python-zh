  md: '# INTRODUCTION


    ![](img/3e15323aee4cec3bf673834bfafe8024_20_0.png)


    We use computers to accomplish tasks and to solve problems. For example, perhaps
    you’ve used a word processor to write an essay or letter. Perhaps you’ve used
    a spreadsheet program to organize your finances. Perhaps you’ve used an image
    editor to touch up a picture. It’s hard to imagine doing these things these days
    without a computer. We get a lot of mileage out of our word processors and spreadsheet
    programs and image editors.


    Those programs are written as general-purpose tools to accomplish a wide variety
    of tasks. Ultimately, though, they’re programs written by others, not by us. What
    do we do when an off-the-shelf program doesn’t quite do what we need?


    In this book, our goal is to learn how to take control of our computer by going
    beyond what can be done by an end user using preexisting programs. We’re going
    to write our own programs. We won’t write a word processor or a spreadsheet or
    an image editor. Those are huge tasks that, fortunately, people have already done.
    Rather, we’re going to learn how to write small programs to solve problems that
    we otherwise wouldn’t be able to solve. I want to help you learn to communicate
    instructions to a computer; these instructions will tell the computer how to carry
    out your plan for solving a problem.


    To give instructions to a computer, we write code in a *programming language*.
    A programming language specifies the rules for the code we write and dictates
    what the computer does in response to that code.


    We’re going to learn to program in the Python programming language. That’s a concrete
    skill that you’ll take away from this book, one that you can put on your résumé.
    More than Python, though, you’ll learn the type of thinking required to solve
    problems using a computer. Programming languages come and go. The way that we
    solve problems'
  merge: -1
  pgno: 20
- img_proc: true
  md: 'does not. I hope that this book helps you on your way from end user to programmer
    and that you have fun exploring what’s possible.


    # Online Resources


    Supplementary resources for the book, including downloadable code and additional
    exercises, are available at https://nostarch.com/learn-code-solving-problems/.


    # Who This Book Is For


    This book is for anyone who wants to learn how to write computer programs to solve
    problems. I have three particular types of people in mind.


    First, you may have heard about the Python programming language and want to learn
    how to write code in Python. I’ll explain in the next section why Python is a
    great choice as a first programming language to learn. You’ll learn a lot about
    Python in this book, and you’ll be in a position to read more advanced books on
    Python if that’s your next step.


    Second, if you haven’t heard of Python or just want to learn what programming
    is all about, don’t worry: this book is for you, too! This book will teach you
    how to think about programming. Programmers have particular ways of breaking down
    problems into manageable pieces and expressing solutions to those pieces in code.
    At this level, it doesn’t matter what programming language is being used, because
    the way that programmers think is not tied to a particular language.


    Finally, you may be interested in learning some other programming language such
    as C++, Java, Go, or Rust. Much of what you learn as a byproduct of learning Python
    will be useful when you study those other programming languages. Plus, Python
    is certainly worth learning in its own right. Let’s turn to why next.


    # Why Learn Python?


    Years of teaching introductory programming have demonstrated to me that Python
    is a great choice for a first programming language. Compared to other languages,
    Python code is often more structured and readable. Once you get used to it, you
    might agree that parts of it almost'
  merge: -1
  pgno: 21
- img_proc: true
  md: 'read like English! Python also comes with many features that are not available
    in other languages, including powerful tools to manipulate and store data. We’ll
    use many of these features throughout the book.


    Not only is Python an excellent teaching language, but it’s also one of the most
    in-demand programming languages in the world. Programmers use it to write web
    applications, games, visualizations, machine learning software, and more.


    There we have it: a language well-suited for teaching that also carries a professional
    advantage for you. I can’t ask for any more than that!


    # Installing Python


    Before we can program in Python, we need to install it. Let’s do that now.


    There are two major versions of Python: Python 2 and Python 3. Python 2 is an
    older version of Python and is no longer supported. In this book, we use Python
    3, so you’ll need to install Python 3 on your computer.


    Python 3 was a major evolution from Python 2, but Python continues to change even
    within version 3. The first version of Python 3 was Python 3.0. Then Python 3.1
    was released, then Python 3.2, and so on. At the time of writing, the latest version
    of Python 3 is Python 3.9. Versions as old as Python 3.6 will suffice for this
    book, but I encourage you to install and work with the latest version of Python.


    Follow these steps for your operating system to install Python.


    # Windows


    Windows doesn’t come with Python by default. To install it, go to https://www.python.org/
    and click **Downloads**. This should offer you the option of downloading the latest
    version of Python for Windows. Click the link to download Python and then run
    the installer. On one of the first screens in the installation process, click
    either **Add Python 3.9 to PATH** or **Add Python to environment variables**;
    this makes running Python much easier. (If upgrading Python, you may need to click
    “Customize installation” to find this option.)


    # macOS'
  merge: -1
  pgno: 22
- img_proc: true
  md: 'macOS doesn’t come with Python 3 by default. To install it, go to https://www.python.org/
    and click **Downloads**. This should offer you the option of downloading the latest
    version of Python for macOS. Click the link to download Python and then run the
    installer.


    # Linux


    Linux comes with Python 3, but it may be an older version of Python 3. Installation
    instructions will vary depending on which Linux distribution you’re using, but
    you should be able to install the newest version of Python using your favorite
    package manager.


    # How to Read This Book


    Reading this book from cover to cover in one sitting is likely to teach you very
    little. It would be like trying to learn piano by inviting someone into your house
    to play piano for a few hours and then kicking them out, lowering the lights,
    and serenading. That’s not how a practice-based skill is learned.


    Here is my advice for making your way through the book:


    **Space out your work.** Massing your practice into a small number of sessions
    is far less effective than spacing your practice out. When you feel tired, take
    a break. No one can tell you how much time to work before taking a break. No one
    can tell you how long it should take you to finish the book. It’s up to your own
    mind and body.


    **Pause to test your understanding.** Reading about something can give us the
    illusion that we understand it better than we do. Applying the material forces
    what we know and what we think we know into alignment. For that reason, at key
    points in each chapter, I’ve included multiple-choice “concept check” questions
    that ask you to make a prediction. Take these seriously! Read each question and
    commit to a response without checking anything using your computer. Then, read
    my answer and explanation. This is an opportunity to confirm that you’re on the
    right track. If you answer incorrectly or answer correctly but for the wrong reason,
    take time to remedy your understanding before continuing. This could involve playing
    around a little more with the relevant Python feature being'
  merge: -1
  pgno: 23
- img_proc: true
  md: 'discussed, rereading material from the book, or searching for additional explanations
    and examples online.


    **Practice programming.** Making predictions while you read will help solidify
    your understanding of key concepts. But you need more than that to become an adept
    problem-solver and programmer. You need to practice using Python to solve new
    problems, whose solutions you haven’t read about in the book. Each chapter concludes
    with a list of practice exercises. Please work through as many of these exercises
    as you can.


    Learning how to program takes time. Don’t be discouraged if you progress slowly
    or make a lot of mistakes. Don’t be intimidated by any blustering peacocks that
    you might encounter online. Surround yourself with people and resources that can
    help you learn.


    # Using Programming Judges


    I’ve decided to structure this book around problems from *programming judge* websites.
    A programming judge website offers a repository of programming problems that can
    be solved by programmers around the world. You submit your solution—your Python
    code—and the site runs tests on your code. If your code produces the correct answer
    for each test case, then it’s likely that your solution is correct. If instead
    your code produces the wrong answer for one or more test cases, then your code
    is incorrect, and revisions are required.


    There are several reasons why I think programming judges are particularly suitable
    sites for learning programming:


    **Rapid feedback** Rapid, targeted feedback is crucial in the early stages of
    learning to program. Programming judges provide feedback as soon as you submit
    your code.


    **High-quality problems** I find the problems on programming judges to be high
    quality. Many problems are originally from competitive programming contests. Other
    problems are written by individuals who are associated with a programming judge
    or simply want to help others learn. See the Problem Credits appendix for the
    source of each problem that we’ll study.'
  merge: -1
  pgno: 24
- img_proc: true
  md: '**Quantity of problems** The programming judges contain hundreds of problems.
    I’ve selected only a small number for this book. If you need more practice, trust
    me: the programming judges can provide it.


    **Community features** The programming judges enable users to read and respond
    to comments. If you’re stuck on a problem, browse the comments for hints dropped
