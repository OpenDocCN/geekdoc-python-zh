  md: 'The reason we’re losing points is not because our program is wrong. Our program
    is fine. No matter the test case, it will output the correct number of unique
    email addresses.


    So if our program is correct, what’s the problem?


    The problem is that our program is too slow. The judge lets us know this by putting
    TLE at the start of each test case. TLE stands for time limit exceeded. For this
    problem, the judge has allocated 30 seconds to each batch of 10 test cases. If
    our program takes longer than 30 seconds, the judge terminates our program, and
    the remaining test cases in the batch are not allowed to run.


    This may be the first time limit exceeded error you’ve received, though it’s possible
    you’ve seen them as you completed exercises from previous chapters.


    The first thing to check when you receive this error is whether your program is
    getting stuck in an infinite loop. If it is, then it’ll never finish, no matter
    the time limit. The judge terminates the program when the allotted time expires.


    If there’s no infinite loop, then the likely culprit is the *efficiency* of our
    program itself. When programmers talk about efficiency, they’re referring to how
    long it takes the program to run. A program that runs faster (takes less time)
    is more efficient than a program that runs slower (takes more time). To solve
    the test cases within the time limit, we’re going to make our program more efficient.


    # Efficiency of Searching a List


