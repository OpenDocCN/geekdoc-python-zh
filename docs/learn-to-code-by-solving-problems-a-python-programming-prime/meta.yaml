    \ while 循环的迭代。如果表达式仍然为 True，那么 Python 再次执行一次迭代，依此类推，直到布尔表达式为 False。如果布尔表达式一开始就是\
    \ False，那么循环根本不会运行。\n\nwhile 循环是*不确定循环*：迭代次数可能事先未知。\n\n## 使用 while 循环\n\n让我们从以下\
