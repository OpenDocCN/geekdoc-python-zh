    any string. A string created with three quotes is called a *triple-quoted string*.
    (Three single quotes work as well, but Python convention is to use three double
    quotes.) They have the bonus of letting us add multiple lines of text to the string
    by just pressing ENTER after each line; strings created with '' or " can''t span
    lines like that. We use triple-quoted strings for docstrings so that we can include
    as many lines as we like.


    The docstring here tells us what `lst` is: it''s a list of strings representing
    cards. It also tells us that the function returns a `True` or `False` value and
    what each return value means. This is sufficient information to enable someone
    to call the function without having to look at its code. As long as someone knows
    what a function does, they can just use it. We''ve been using Python functions
    all along without ever having looked at their code. How does `print` work? How
