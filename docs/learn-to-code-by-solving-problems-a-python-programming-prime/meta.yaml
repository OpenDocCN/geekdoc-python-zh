    \ `set()`，像这样：\n\n```python\n>>> set()\nset()\n>>> type(set())\n<class 'set'>\n\
    ```\n\n## 集合方法\n\n集合是可变的，所以我们可以添加和删除值。我们可以通过使用方法来执行这些任务。\n\n你可以通过使用 `dir(set())`\
    \ 来获取集合方法的列表。你也可以使用 `help` 获取特定集合方法的帮助，类似于我们使用 `help` 来了解字符串或列表方法。例如，要了解 `add`\
    \ 方法，输入 `help(set().add)`。`add` 方法是我们用来向集合添加值的方法。它是列表上 `append` 的类似物：\n\n```python\n\
    >>> s = set()\n>>> s\nset()\n>>> s.add(2)\n>>> s\n{2}\n>>> s.add(4)\n>>> s\n{2,\
