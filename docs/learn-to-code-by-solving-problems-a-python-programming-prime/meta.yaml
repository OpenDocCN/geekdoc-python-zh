- md: "## Problem #25: Ribbon Painting\n\nHere’s another problem where the first algorithm\
    \ that we might come up with is too slow. We won’t waste much time on that algorithm,\
    \ though, because our big O analysis will tell us all we need to know before we\
    \ consider implementing the code. We’ll then spend our time designing a faster\
    \ algorithm.\n\nThis is DMOJ problem dmopc17c4p1.\n\n## The Challenge\n\nYou have\
    \ a purple ribbon whose length is $n$ units. The first unit goes from position\
    \ 0 up to but not including position 1, the second unit goes from position 1 up\
    \ to but not including position 2, and so on. You then carry out $q$ paint strokes,\
    \ each of which colors a segment of the ribbon blue.\n\nYour goal is to determine\
    \ the number of units of the ribbon that are still purple and the number of units\
    \ of the ribbon that are now blue.\n\n## Input\n\nThe input consists of the following\
    \ lines:\n\n- A line containing the integer ribbon length $n$ and integer number\
    \ of paint strokes $q$, separated by a space. $n$ and $q$ are each between 1 and\
    \ 100,000.\n- $q$ lines, one per paint stroke, containing two integers separated\
    \ by a space. The first integer gives the starting position of the paint stroke;\
    \ the second gives the ending position of the paint stroke. The starting position\
    \ is guaranteed to be less than the ending position; each integer is between 0\
    \ and $n$. The paint stroke goes from the starting position up to but not including\
    \ the ending position. As a quick example here, if a paint stroke has a starting\
    \ position of 5 and an ending position of 12, then the stroke paints the ribbon\
    \ from position 5 up to but not including position 12.\n\n## Output\n\nOutput\
    \ the number of units of the ribbon that are still purple, a space, and the number\
    \ of units of the ribbon that are now blue.\nThe time limit for solving the test\
    \ cases is 2 seconds.\n\n## Exploring a Test Case\n\nLet’s look at a small test\
    \ case. This test case will not only ensure that we’ve interpreted the problem\
    \ correctly but also highlight the perils of a naive algorithm. Here it is:\n\n\
    ```\n20 4\n18 19\n4 16\n4 14\n5 12\n```\n\nOur ribbon’s length is 20, and there\
    \ are four paint strokes. How much of the ribbon do our paint strokes turn blue?\n\
    The first paint stroke paints one unit blue, the one that starts at position 18.\n\
    The second paint stroke paints the units of ribbon starting at positions 4, 5,\
    \ 6, 7, and so on, all the way up to position 15. That’s 12 units painted blue\
    \ by this stroke, and 13 blue units in total.\nThe third paint stroke paints 10\
    \ units blue. But all of those units are already blue from the second paint stroke!\
    \ It would be a colossal waste of time indeed if we spent time “painting” anything\
    \ with this paint stroke. Whatever algorithm we come up with better not fall into\
    \ this time-wasting trap.\nThe fourth paint stroke paints 7 units blue. But again:\
    \ all of these units are already blue!\nNow we’re done painting, and we have 13\
    \ blue units. There are 20 – 13 = 7 remaining purple units, so the correct output\
    \ for this test case is:\n\n```\n7 13\n```\n\n## Solving the Problem\n\nThe maximum\
    \ length of the ribbon is 100,000, and the maximum number of paint strokes is\
    \ 100,000. Recall algorithm 1 from when we solved Longest Scarf, where we learned\
    \ that an $O(mn)$ algorithm was too slow with these bounds. Similarly, here, an\
    \ $O(nq)$ algorithm would be inadequate, as it would not finish within the time\
    \ limit on large test cases.\n\nThis means that we cannot afford to process each\
    \ unit that is painted by each paint stroke. It would be nice if we could more\
    \ easily focus on only the *new* units that are painted blue by a paint stroke.\
    \ Then we could go through each paint stroke and add up the number of blue units\
    \ that it contributes.\n\nFair enough, but how can we determine the contribution\
    \ of each paint stroke? That’s tricky, because bits and pieces of the next paint\
    \ stroke may have already been painted blue by previous paint strokes.\n\nThis\
    \ situation is made much simpler, however, if we sort the paint strokes first.\
    \ Remember from “n log n Time” earlier in this chapter that sorting is extremely\
    \ fast, taking only $O(n \\log n)$ time. There’s no efficiency concern in using\
    \ sorting, so let’s understand why sorting helps us here.\n\nSorting the paint\
    \ strokes from the test case in the prior section gives us the following list\
    \ of paint strokes:\n\n```\n4 14\n4 16\n5 12\n18 19\n```\n\nNow that the paint\
    \ strokes are sorted, we can efficiently process them. As we do so, we’ll store\
    \ the rightmost position of any paint stroke that we’ve processed so far. We’ll\
    \ start this rightmost position off at 0 to indicate that we haven’t painted anything.\n\
    \nOur first paint stroke paints $14 - 4 = 10$ units blue. Now our stored rightmost\
    \ position is 14.\n\nOur second paint stroke paints 12 units blue, yes, but how\
    \ many of those 12 does it turn from purple to blue? After all, it overlaps the\
    \ previous paint stroke, so some of these units were blue already. We can calculate\
    \ the number of new blue units by subtracting 14, our stored rightmost position,\
    \ from 16, the ending position of the current paint stroke. This is how we ignore\
    \ the units already painted blue by previous paint strokes. So, there are $16\
    \ - 14 = 2$ new blue units and 12 blue units in total. Crucially, we just figured\
    \ this out without processing the individual units of this paint stroke. Before\
    \ we continue, don’t forget to update our stored rightmost position to 16.\n\n\
    Our third paint stroke is like the second in that it starts prior to our stored\
    \ rightmost position. Unlike the second paint stroke, however, its ending position\
    \ does not extend past our stored rightmost position at all. So, this paint stroke\
    \ adds no new blue units, and our stored rightmost position is still 16. Again,\
    \ we figured this out without grinding through each of this paint stroke’s positions!\n\
    \nBe careful with the fourth paint stroke. It does *not* add 19 – 16 = 3 new blue\
    \ units. We have to treat this paint stroke differently because its starting position\
    \ is to the right of our stored rightmost position. In this case, we don’t use\
    \ the stored rightmost position at all, calculating instead 19 – 18 = 1 new blue\
    \ unit, and 13 blue units in total. We also update our stored rightmost position\
    \ to 19.\n\nThe only question is how we sort the paint strokes in our Python code.\
    \ We need to sort them by their starting position; if multiple paint strokes have\
    \ the same starting position, then we want to sort those by their ending position.\n\
    \nThat is, we want to take a list like this:\n\n```\n[[18, 19], [4, 16], [4, 14],\
    \ [5, 12]]\n```\n\nand produce this:\n\n```\n[[4, 14], [4, 16], [5, 12], [18,\
    \ 19]]\n```\n\nHappily, as we discovered in “Task 4: Sort Boxes” in Chapter 6,\
    \ the list `sort` method works in exactly this way. When given a list of lists,\
    \ `sort` sorts using the first values in each list; when those values are tied,\
    \ the lists are further sorted using the second values. Check it out:\n\n```\n\
    >>> strokes = [[18, 19], [4, 16], [4, 14], [5, 12]]\n>>> strokes.sort()\n>>> strokes\n\
    [[4, 14], [4, 16], [5, 12], [18, 19]]\n```\n\nAlgorithm: check. Sorting: check.\
    \ We’re in great shape! Just one more thing we’d like to know before we see the\
    \ code: what will be its big O efficiency? We need to read the *q* queries; that\
    \ takes *O(q)* time. Then we need to sort the queries; that takes *O(q log q)*\
    \ time. Finally, we need to process the queries; that takes $O(q)$ time. The slowest\
    \ of these is the $O(q \\log q)$ time for the sorting, so that’s our overall big\
    \ O efficiency.\nNow we have everything we need for a speedy solution. Check it\
    \ out in Listing 10-2.\n\n```\nlst = input().split()\nn = int(lst[0])\nq = int(lst[1])\n\
    \nstrokes = []\n\nfor i in range(q):\n    stroke = input().split()\n    strokes.append([int(stroke[0]),\
    \ int(stroke[1])])\n\nstrokes.sort()\n\nrightmost_position = 0\n\nblue = 0\n\n\
    for stroke in strokes:\n    stroke_start = stroke[0]\n    stroke_end = stroke[1]\n\
    \    if stroke_start <= rightmost_position:\n        if stroke_end > rightmost_position:\n\
    \            blue = blue + stroke_end - rightmost_position\n            rightmost_position\
    \ = stroke_end\n    else:\n        blue = blue + stroke_end - stroke_start\n \
    \       rightmost_position = stroke_end\n\nprint(n - blue, blue)\n```\n\n*Listing\
    \ 10-2: Solving Ribbon Painting*\n\nWe read each paint stroke, appending it as\
    \ a list of two values to our strokes list ❶. We then sort all of the paint strokes\
    \ ❷.\nWe next need to process each paint stroke from left to right. There are\
    \ two key variables that drive this processing: variable `rightmost_position`\
    \ stores the rightmost position that we have painted so far, and variable `blue`\
    \ stores the number of units that we have painted blue so far.\nTo process a paint\
    \ stroke, we need to know whether it starts before or after our stored rightmost\
    \ position. Let’s think about each of these cases in turn."
  mdcn: "## 问题 #25：彩带涂色\n\n这是另一个我们可能想到的第一个算法会太慢的问题。不过，我们不会在那个算法上浪费太多时间，因为在考虑实现代码之前，我们的大O分析就会告诉我们所有需要知道的信息。然后我们将把时间花在设计一个更快的算法上。\n\
    \n这是DMOJ问题 dmopc17c4p1。\n\n## 挑战\n\n你有一条长度为 $n$ 单位的紫色彩带。第一个单位从位置0开始，到位置1结束（不包括位置1），第二个单位从位置1开始，到位置2结束（不包括位置2），以此类推。然后你执行\
    \ $q$ 次涂色操作，每次操作将彩带的一段涂成蓝色。\n\n你的目标是确定彩带中仍然是紫色的单位数量，以及现在变成蓝色的单位数量。\n\n## 输入\n\n\
    输入包含以下几行：\n\n- 一行包含两个整数：彩带长度 $n$ 和涂色操作次数 $q$，用空格分隔。$n$ 和 $q$ 的值都在1到100,000之间。\n\
    - $q$ 行，每行对应一次涂色操作，包含两个用空格分隔的整数。第一个整数给出涂色操作的起始位置；第二个整数给出涂色操作的结束位置。起始位置保证小于结束位置；每个整数都在0到\
    \ $n$ 之间。涂色操作从起始位置开始，到结束位置结束（不包括结束位置）。这里举一个简单的例子，如果一次涂色操作的起始位置是5，结束位置是12，那么这次操作会将彩带从位置5开始，到位置12结束（不包括位置12）的部分涂色。\n\
    \n## 输出\n\n输出彩带中仍然是紫色的单位数量，一个空格，以及现在变成蓝色的单位数量。\n解决测试用例的时间限制为2秒。\n\n## 探索一个测试用例\n\
    \n让我们看一个小型测试用例。这个测试用例不仅能确保我们正确理解了问题，还能突出简单算法的危险。它是这样的：\n\n```\n20 4\n18 19\n4\
    \ 16\n4 14\n5 12\n```\n\n我们的彩带长度是20，有四次涂色操作。我们的涂色操作将多少彩带涂成了蓝色？\n第一次涂色操作将一个单位涂成蓝色，即从位置18开始的那个单位。\n\
    第二次涂色操作将从位置4、5、6、7等开始的彩带单位，一直到位置15，全部涂成蓝色。这次操作涂了12个单位，总共13个蓝色单位。\n第三次涂色操作涂了10个单位。但所有这些单位都已经被第二次涂色操作涂成蓝色了！如果我们花时间用这次涂色操作去“涂”任何东西，那确实是巨大的时间浪费。无论我们想出什么算法，最好都不要掉入这个浪费时间的陷阱。\n\
    第四次涂色操作涂了7个单位。但同样：所有这些单位都已经是蓝色了！\n现在我们涂色完成了，我们有13个蓝色单位。还剩下20 – 13 = 7个紫色单位，所以这个测试用例的正确输出是：\n\
    \n```\n7 13\n```\n\n## 解决问题\n\n彩带的最大长度是100,000，最大涂色操作次数是100,000。回想一下我们解决“最长围巾”问题时的算法1，我们了解到一个\
    \ $O(mn)$ 算法在这些限制下太慢了。同样地，这里一个 $O(nq)$ 算法将是不够的，因为它在大型测试用例上无法在时间限制内完成。\n\n这意味着我们无法承担处理每次涂色操作所涂的每个单位。如果我们能更容易地只关注一次涂色操作所涂的*新*单位，那就太好了。然后我们可以遍历每次涂色操作，并累加它贡献的蓝色单位数量。\n\
    \n这很合理，但我们如何确定每次涂色操作的贡献呢？这很棘手，因为下一次涂色操作的某些部分可能已经被之前的涂色操作涂成蓝色了。\n\n然而，如果我们先对涂色操作进行排序，这种情况就会变得简单得多。回想本章前面的“n\
    \ log n 时间”，排序极其快速，只需要 $O(n \\log n)$ 时间。使用排序没有效率问题，所以让我们理解为什么排序在这里对我们有帮助。\n\n\
    对上一节测试用例中的涂色操作进行排序，我们得到以下涂色操作列表：\n\n```\n4 14\n4 16\n5 12\n18 19\n```\n\n现在涂色操作已经排序，我们可以高效地处理它们。在处理过程中，我们将存储到目前为止处理过的任何涂色操作的最右位置。我们将这个最右位置初始化为0，表示我们还没有涂任何东西。\n\
    \n我们的第一次涂色操作将 $14 - 4 = 10$ 个单位涂成蓝色。现在我们存储的最右位置是14。\n\n我们的第二次涂色操作确实涂了12个单位，但是，这12个单位中有多少是从紫色变成蓝色的呢？毕竟，它与之前的涂色操作重叠，所以其中一些单位已经是蓝色了。我们可以通过从16（当前涂色操作的结束位置）中减去14（我们存储的最右位置）来计算新的蓝色单位数量。这就是我们忽略之前涂色操作已经涂成蓝色的单位的方法。所以，有\
    \ $16 - 14 = 2$ 个新的蓝色单位，总共12个蓝色单位。关键的是，我们无需处理这次涂色操作的各个单位就得出了这个结果。在我们继续之前，别忘了将我们存储的最右位置更新为16。\n\
    \n我们的第三次涂色操作与第二次类似，它在我们存储的最右位置之前开始。然而，与第二次涂色操作不同的是，它的结束位置完全没有超过我们存储的最右位置。所以，这次涂色操作没有增加新的蓝色单位，我们存储的最右位置仍然是16。同样，我们无需逐个处理这次涂色操作的每个位置就得出了这个结果！\n\
    \n小心第四次涂色操作。它*没有*增加 19 – 16 = 3 个新的蓝色单位。我们必须以不同的方式处理这次涂色操作，因为它的起始位置在我们存储的最右位置的右侧。在这种情况下，我们根本不使用存储的最右位置，而是计算\
    \ 19 – 18 = 1 个新的蓝色单位，总共13个蓝色单位。我们还将存储的最右位置更新为19。\n\n唯一的问题是我们如何在Python代码中对涂色操作进行排序。我们需要按它们的起始位置排序；如果多个涂色操作具有相同的起始位置，那么我们希望按它们的结束位置对这些进行排序。\n\
    \n也就是说，我们想将这样的列表：\n\n```\n[[18, 19], [4, 16], [4, 14], [5, 12]]\n```\n\n转换成这样：\n\
    \n```\n[[4, 14], [4, 16], [5, 12], [18, 19]]\n```\n\n令人高兴的是，正如我们在第6章“任务4：整理盒子”中发现的那样，列表的\
    \ `sort` 方法正是以这种方式工作的。当给定一个列表的列表时，`sort` 使用每个列表中的第一个值进行排序；当这些值相同时，列表会进一步使用第二个值进行排序。看看：\n\
    \n```\n>>> strokes = [[18, 19], [4, 16], [4, 14], [5, 12]]\n>>> strokes.sort()\n\
    >>> strokes\n[[4, 14], [4, 16], [5, 12], [18, 19]]\n```\n\n算法：搞定。排序：搞定。我们状态很好！在看代码之前，我们只想再知道一件事：它的大O效率是多少？我们需要读取\
    \ *q* 个查询；这需要 *O(q)* 时间。然后我们需要对查询进行排序；这需要 *O(q log q)* 时间。最后，我们需要处理查询；这需要 $O(q)$\
    \ 时间。其中最慢的是排序的 $O(q \\log q)$ 时间，所以这就是我们的整体大O效率。\n现在我们有了快速解决方案所需的一切。在清单10-2中查看它。\n\
    \n```\nlst = input().split()\nn = int(lst[0])\nq = int(lst[1])\n\nstrokes = []\n\
    \nfor i in range(q):\n    stroke = input().split()\n    strokes.append([int(stroke[0]),\
    \ int(stroke[1])])\n\nstrokes.sort()\n\nrightmost_position = 0\n\nblue = 0\n\n\
    for stroke in strokes:\n    stroke_start = stroke[0]\n    stroke_end = stroke[1]\n\
    \    if stroke_start <= rightmost_position:\n        if stroke_end > rightmost_position:\n\
    \            blue = blue + stroke_end - rightmost_position\n            rightmost_position\
    \ = stroke_end\n    else:\n        blue = blue + stroke_end - stroke_start\n \
    \       rightmost_position = stroke_end\n\nprint(n - blue, blue)\n```\n\n*清单 10-2：解决彩带涂色问题*\n\
    \n我们读取每次涂色操作，将其作为包含两个值的列表附加到我们的 strokes 列表 ❶。然后我们对所有涂色操作进行排序 ❷。\n接下来我们需要从左到右处理每次涂色操作。有两个关键变量驱动这个处理过程：变量\
    \ `rightmost_position` 存储我们到目前为止涂色的最右位置，变量 `blue` 存储我们到目前为止涂成蓝色的单位数量。\n要处理一次涂色操作，我们需要知道它是在我们存储的最右位置之前还是之后开始。让我们依次思考这两种情况。"
