    Since 450 is greater than 300, now you know that the number is in the first half
    of the book. It can’t be in the second half, because those numbers are even bigger
    than 450. You’ve reduced your work by half by checking only one number! You can
    now repeat this process on the first half of the book, flipping halfway between
    the beginning and middle of the book. You might find the number 200 there. Now
    you know that the 300 is on a later page, somewhere in the second quarter of the
    book. You can repeat this process until you find 300—and it won’t take long at
    all. This technique—repeatedly dividing the problem in half—is known as *binary
    search*. It’s shockingly fast. It blows away the linear search technique of searching
    one by one. Python has a binary search function that will put the finishing touches
    on Cow Baseball. That function, though, is inside of something called a *module*;
    we’ll need to discuss them first.


    # Python Modules


    A *module* is a self-contained collection of Python code. A module generally contains
    several functions that we can call.


    Python comes with a variety of modules that we can use to add functionality to
    our programs. There are modules for working with random numbers, dates and times,
    statistics, emails, web pages, audio files, and much more. It would take a separate
    book to cover them all! There are even modules that you can download should Python
    not come with the module that you need.


    I’ll focus in this section on one module—the `random` module. We’ll use it to
    learn what we need to know about modules. Then we’ll be all set for the binary
    search module in the next section.


    Have you ever wondered how people make computer games where things happen at random?
    Maybe it’s a game where you draw cards, where you roll dice, or where enemies
    spawn unpredictably. The key is the use of random numbers. Python gives us access
    to random-number generation through its `random` module.


    Before we can use what’s in a module, we must *import* it. One way to do this
    is to import the entire module using the `import` keyword, like this:'
