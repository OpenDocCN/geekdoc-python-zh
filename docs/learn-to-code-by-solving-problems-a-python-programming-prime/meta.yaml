    \n```\n>>> {[1, 2], [3, 4]}\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nTypeError: unhashable type: 'list'\n```\n\nValues in a\
    \ set must be immutable, which explains why we can’t put lists inside a set. The\
    \ restriction has to do with how Python searches a set for a value. When Python\
