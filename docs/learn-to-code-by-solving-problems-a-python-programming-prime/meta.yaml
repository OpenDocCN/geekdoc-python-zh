    \n## 问题 #1：单词计数\n\n现在是我们的第一个问题了！我们将使用Python编写一个简单的单词计数程序。我们将学习如何从用户那里读取输入，处理输入以解决问题，并输出结果。我们还将学习如何在程序中操作文本和数字，利用Python内置操作，并在解决问题的过程中存储中间结果。\n\
