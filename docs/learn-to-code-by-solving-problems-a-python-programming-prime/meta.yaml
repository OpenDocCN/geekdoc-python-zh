    \ will do to solve our test case:\n\n+   1. First, it will ignore the first lifeguard\
    \ and determine the number of units of time that the three remaining lifeguards\
    \ cover. It will obtain an answer of 16. It will remember 16 as the score to beat.\n\
    2. Next, it will ignore the second lifeguard and determine the number of units\
    \ of time that the three remaining lifeguards cover. It will obtain an answer\
    \ of 19. Since 19 is greater than 16, it will remember 19 as the score to beat.\n\
    3. Next, it will ignore the third lifeguard and determine the number of units\
