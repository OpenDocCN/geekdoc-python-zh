    ...     num = num + 1\n...\n0\n1\n2\n3\n4\n```\n\n在 for 循环中，循环变量是为我们创建的；我们不必在循环之前使用赋值语句来创建变量。但在\
    \ while 循环中，我们得不到任何免费的东西。如果我们需要一个变量在 while 循环中遍历值，那么我们必须自己创建该变量。我们在这里通过在循环之前让\
