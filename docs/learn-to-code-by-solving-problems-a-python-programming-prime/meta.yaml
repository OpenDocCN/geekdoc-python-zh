    We want the first two calls to return `True`, because there are no high cards
    in those lists of cards. And we want the third and fourth calls to return `False`,
    because there’s at least one high card in those lists of cards.

    How can we define a function that returns these `True` and `False` values? That’s
    the final piece of the function puzzle.

    To return a value from a function, we use Python’s `return` keyword. As soon as
    a `return` is reached, execution of the function terminates, and the specified
    value is returned to the caller.

    Here’s how we can write the `no_high` function:


    ```

    >>> def no_high(lst):

    ...     if ''jack'' in lst:

    ...         return False

    ...     if ''queen'' in lst:

    ...         return False

    ...     if ''king'' in lst:

    ...         return False

    ...     if ''ace'' in lst:

    ...         return False

    ...     return True

    ...

    ```


    We first check whether there are any ''jack'' cards in the list. If there are,
    then we know that the list contains one or more high cards, so we immediately
    return `False`.

    If we’re still here, then we know that there are no jacks. But there could be
    other high cards, so we need to check for them. The rest of the `if` statements
    check for queens, kings, and aces, respectively, returning `False` if any of them
    is in the list.

    If we don’t hit any of those four `return` statements, then there are no high
    cards in the list. In that case, we return `True`.

    A `return` by itself, with no value given, returns the value `None`. That’s useful
    if you’re writing a function that doesn’t return anything useful and you need
    to terminate the function before reaching the bottom of its code.

    If a `return` is encountered inside a loop, the function still terminates immediately,
    regardless of how deeply nested it is. Here’s an example showing a `return` getting
    us out of a nested loop:


    ```

    >>> def func():

    ...     for i in range(10):

    ...         for j in range(10):

    ```'
