    ## Chapter 5: Organizing Values Using Lists

    A Python list allows us to use a single name to refer to a whole sequence of data.
    Using a list helps us organize our data and leverage the powerful list operations
    (such as sorting and searching) that Python provides. In this chapter, we’ll learn
    all about lists.


    ## Chapter 6: Designing Programs with Functions

    A large program, with lots of code, can become unwieldy if we don’t organize it
    well. In this chapter, we’ll learn about functions, which help us design programs
    composed of small, self-contained chunks of code. Using functions leads to programs
    that are much easier to understand and modify. We’ll also learn about top-down
    design, an approach to designing programs with functions.


    ## Chapter 7: Reading and Writing Files

    Files are convenient for providing data to our programs or obtaining data from
    our programs. In this chapter, we’ll learn how to read data from and write data
    to files.


    ## Chapter 8: Organizing Values Using Sets and Dictionaries

    As we begin to solve increasingly challenging problems, it’s important that we
    think about how our data is stored. In this chapter, we’ll learn about two new
    ways to store data using Python: using a set and using a dictionary.


    ## Chapter 9: Designing Algorithms with Complete Search

    Programmers don’t start from scratch for each problem they solve. Instead, they
    think about whether a general solution pattern—a type of *algorithm*—can be used
    to solve it. In this chapter, we’ll learn about complete-search algorithms, which
    can be used to solve a wide range of problems.


    ## Chapter 10: Big O and Program Efficiency

    Sometimes we’ll manage to write a program that does the right thing but does so
    too slowly to be useful in practice. In this chapter, we’ll learn how to communicate
    about the efficiency of programs, and we’ll learn about tools we can use to write
    more efficient code.


    # 1 GETTING STARTED


    ![](img/3e15323aee4cec3bf673834bfafe8024_29_0.png)


    Programming involves writing code to solve a problem. As such, I want to solve
    problems with you from the outset. That is, rather than learning Python concept
    by concept and then solving a problem, we’re going to use a problem to dictate
    the concepts we need to learn.


    In this chapter, we’ll solve two problems: determining the number of words in
    a line (like the word-count feature in a word processor) and calculating the volume
    of a cone. Solving these problems requires a tour of quite a few Python concepts.
    You may feel that you need more details to fully understand some of what I introduce
    here and how it all fits together in the design of a Python program. Don’t worry:
    we’ll revisit and elaborate on the most important concepts in later chapters.


    ## What We’ll Be Doing


    As described in the introduction, we’ll be solving competitive programming problems
    using the Python programming language. The competitive programming problems can
    each be found on an online judge website. I assume that you’ve followed the instructions
    in the introduction to install Python and make your judge accounts.


    For each problem, we’ll write a program to solve it. Each problem specifies the
    kind of *input* that our program will be provided, and the kind of *output* (or
    result) that is expected. Our program correctly solves the problem if it can take
    any valid input and produce the correct output.


    In general, there will be millions or billions of possible inputs. Each such input
    is referred to as a *problem instance*. For example, in the first problem that
    we’ll solve, the input is a line of text, like `hello there` or `bbaabbb aa abab`.
    Our task will be to output the number of words in the line. One of the most powerful
    ideas in programming is that often a small amount of general-purpose code can
    solve a seemingly endless number of problem instances. Whether the line has 2
    words or 3 or 50, it won’t matter. Our program will get it right every time.


    Our programs will perform three tasks:


    **Read input** We need to determine the specific instance of the problem that
    we’re solving, so we first read the provided input.


    **Process** We process the input to determine the correct output.


    **Write output** Having solved the problem, we produce the desired output.


    The boundaries between these steps may not always be crisp—we might have to interleave
    some processing with producing some output, for example—but it will be helpful
    to keep these three broad steps in mind.


    You likely use programs on a daily basis that follow this input-process-output
    model. Consider a calculator program: you type in a formula (the input), the program
    crunches your numbers (process), and the program displays the answer (output).
    Or consider a web search engine: you type in a search query (input), the search
    engine determines the most relevant results (process), and it displays them (output).


    Contrast these kinds of programs with *interactive* programs, which fuse input,
    processing, and output. For example, I’m typing this book using a text editor.
    When I type a character, the editor responds by adding that character to my document.
    It doesn’t wait for me to type the entire document before displaying it to me;
    it interactively displays it as I build it. We won’t be writing interactive programs
    in this book. If you’re interested in writing such programs after studying this
    book, you’ll be happy to hear that Python is certainly up for the task.


    The text for each problem is found both here and on the online judge. However,
    the text won’t match, because I’ve rewritten it for purposes of consistency throughout
    the book. Don’t worry: what I’ve written conveys the same information as the official
    problem statement.


    ## The Python Shell


    For each problem in the book, we want to write a program and save it in a file.
    But that assumes we know what program to write! For many of the problems in the
    book, we’ll need to learn some new Python features before we can solve the problem.


    The best way to experiment with Python features is by using the Python shell.
    It’s an interactive environment where you type some Python code and press ENTER,
    and Python shows you the result. Once we learn enough to solve the current problem,
    we’ll stop using the shell and start typing our solution in a text file instead.


    To begin, create a new folder on your desktop called *programming*. We’ll use
    that folder to store all of the work that we do for this book.


    Now, we’ll navigate to this *programming* folder and launch the Python shell.
    Follow these steps for your operating system whenever you’d like to start the
    Python shell.


