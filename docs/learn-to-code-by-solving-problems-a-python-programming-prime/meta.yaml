    including time limits in the problem descriptions of Chapter 8, when we started
    running into programming problems where efficiency is a serious concern.) If our
    program exceeds the time limit, then the judge terminates our program with a time
    limit exceeded error. A time limit is designed to prevent solutions that are too
    slow from passing the test cases. For example, perhaps we come up with a complete-search
    solution but the author of the problem has worked out a solution that’s much faster.
    That faster solution may be a variation of complete search, as it was when we
    solved the Cow Baseball problem in Chapter 9, or it may be a different approach
    entirely. Regardless, the time limit may be set such that our complete-search
    solution will not finish in time. As such, in addition to being correct, we may
    need our programs to be fast.


    We can run a program to explore whether it is efficient enough. For example, think
    back to “Efficiency of Searching a List” in Chapter 8 when we tried to solve Email
    Addresses using a list. We ran code that used bigger and bigger lists to get a
    sense of the amount of time taken by list operations. This kind of testing can
    give us some understanding of the efficiency of our programs. If our program is
    too slow, according to the time limit for the problem, then we know that we need
    to optimize the current code or find a wholly new approach.


    The amount of time taken by a program depends on the computer it is being run
    on. We don’t know what kind of computer the judge is using, but running the program
    on our own computer is still informative because the judge is probably using a
    computer that’s at least as fast as ours. Say that we run our program on our laptop
    and it takes 30 seconds on some small test case. If the problem time limit is
    three seconds, we can be confident that our program is simply not fast enough.


    An exclusive focus on time limits, however, is limiting. Think about our first
    solution to Cow Baseball in Chapter 9. We didn’t need to run that code to determine
    how slow it would be. That’s because we were able to characterize the program
    in terms of the amount of work that it would do if we did run it. For example,
    in “Efficiency of Our Program” on page 253, we said that for $n$ cows, our program
    processes $n^3$ triples of cows. Notice that our focus here is not on the number
    of seconds our program would take to run, but on how much work it does in terms
    of the amount of input $n$.


    There are significant advantages to this kind of analysis compared to running
    our programs and recording execution times. Here are five:'
- md: "**Execution time depends on the computer** Timing our program tells us only\
    \ how long our program takes on one computer. That’s very specific information,\
    \ and it gives us little in the way of understanding what to expect when the program\
    \ is run on other computers. When working through the book, you may have also\
    \ noticed that the time taken by a program varies from run to run, even on the\
    \ same computer. For example, you might run a program on a test case and find\
    \ that it takes three seconds; you might then run it again, on the same test case,\
    \ and find that it takes two-and-a-half seconds or three-and-a-half seconds. The\
    \ reason for this difference is that your operating system is managing your computing\
    \ resources, shunting them around to different tasks as needed. The decisions\
    \ that your operating system makes influence the runtime of your program.\n\n\
    **Execution time depends on the test case** Timing our program on a test case\
    \ tells us only how long our program takes on that test case. Suppose that our\
    \ program takes three seconds to run on a small test case. That may seem fast,\
    \ but here’s the truth about small test cases: every reasonable solution for a\
    \ problem will quickly be able to solve those. If I ask you to tell me the number\
    \ of unique email addresses among 10 email addresses, or the number of triples\
    \ of cows among 10 cows, you can quickly do it with the first correct idea that\
    \ you have. What’s interesting, then, are large test cases. They are the ones\
    \ where algorithmic ingenuity pays off. How long will our program take on a large\
    \ test case or on a huge test case? We don’t know. We’d have to run our program\
    \ on those test cases, too. Even if we did that, there could be specific kinds\
    \ of test cases that trigger poorer performance. We may be led to believe that\
    \ our program is faster than it is.\n\n**The program requires implementation**\
    \ We can’t time something that we don’t implement. Suppose that we’re thinking\
    \ about a problem and come up with an idea for how to solve it. Is it fast? Although\
    \ we could implement it to find out, it would be nice to know, in advance, whether\
    \ or not the idea is likely to lead to a fast program. You would not implement\
    \ a program that you knew, at the outset, would be incorrect. It would similarly\
    \ be nice to know, at the outset, that a program would be too slow.\n\n**Timing\
    \ doesn’t explain slowness** If we find that our program is too slow, then our\
    \ next task is to design a faster one. However, simply timing a program gives\
    \ us no insight into why our program is slow. It just is. Further, if we manage\
    \ to think up a possible improvement to our program, we’d need to implement it\
    \ to see whether or not it helps.\n\n**Execution time is not easily communicated**\
    \ For many of the reasons listed, it’s difficult to use execution time to talk\
    \ to other people about the efficiency of algorithms. Execution time is too specific:\
    \ it depends on the computer, operating system, test case, programming language,\
    \ and particular implementation that’s used. We’d have to provide all of this\
    \ information to others interested in the efficiency of our algorithm.\n\nNot\
    \ to worry: computer scientists have devised a notation that addresses these shortcomings\
    \ of timing. It’s independent of the computer, independent of test case, and independent\
    \ of a particular implementation. It signals why a slow program is slow. It’s\
    \ easily communicated. It’s called *big O*, and it’s coming right up.\n\n## Big\
    \ O\n\nBig O is a notation that computer scientists use to concisely describe\
    \ the efficiency of algorithms. The key concept here is the *efficiency class*,\
    \ which tells you how fast an algorithm is or, equivalently, how much work it\
    \ does. The faster an algorithm, the less work it does; the slower an algorithm,\
    \ the more work it does. Each algorithm belongs to an efficiency class; the efficiency\
    \ class tells you how much work that algorithm does relative to the amount of\
    \ input that it must process. To understand big O, we need to understand these\
    \ efficiency classes. We’re now going to study seven of the most common ones.\
    \ We’ll see those that do the least amount of work, the ones you’ll hope your\
    \ algorithms fit into. We’ll also see those that do considerably more work, the\
    \ ones whose algorithms will probably give you time limit exceeded errors.\n\n\
    ## Constant Time\n\nThe most desirable algorithms are those that don’t do more\
    \ work as the amount of input increases. No matter the problem instance, such\
    \ an algorithm takes about the same number of steps. These are called *constant-time*\
    \ algorithms.\n\nThis is hard to believe, right? An algorithm that does about\
    \ the same amount of work, no matter what? Indeed, solving a problem with such\
    \ an algorithm is rare. But when you can do it, rejoice: you can’t do any better\
    \ than that.\n\nWe’ve managed to solve a few problems in this book using constant-time\
    \ algorithms. Think back to the Telemarketers problem in Chapter 2, where we had\
    \ to determine whether the provided phone number belongs to a telemarketer. I’ve\
    \ reproduced our solution from Listing 2-2 here:\n\n```\nnum1 = int(input())\n\
    num2 = int(input())\nnum3 = int(input())\nnum4 = int(input())\n\nif ((num1 ==\
    \ 8 or num1 == 9) and\n    (num4 == 8 or num4 == 9) and\n    (num2 == num3)):\n\
    \    print('ignore')\nelse:\n    print('answer')\n```\n\nOur solution does the\
    \ same amount of work no matter what the four digits of the phone number are.\
    \ The code starts by reading the input. Then it makes some comparisons with num1,\
    \ num2, num3, and num4. If the phone number belongs to a telemarketer, we output\
    \ something; if it doesn’t belong to a telemarketer, we output something else.\
    \ There’s no input that can make our program do more work than this.\n\nEarlier\
    \ in Chapter 2, we solved Winning Team. Did we solve that one in constant time,\
    \ too? We did! Here’s the solution from Listing 2-1:\n\n```\napple_three = int(input())\n\
    apple_two = int(input())\napple_one = int(input())\n\nbanana_three = int(input())\n\
    banana_two = int(input())\nbanana_one = int(input())\n\napple_total = apple_three\
    \ * 3 + apple_two * 2 + apple_one\nbanana_total = banana_three * 3 + banana_two\
    \ * 2 + banana_one\n\nif apple_total > banana_total:\n    print('A')\nelif banana_total\
    \ > apple_total:\n    print('B')\nelse:\n    print('T')\n```\n\nWe read the input,\
    \ compute the total points for the Apples, compute the total points for the Bananas,\
    \ compare those totals, and output a message. It doesn’t matter how many points\
    \ the Apples or Bananas have — our program always does the same amount of work.\n\
    \nHold on—what if the Apples scored zillions and zillions of three-point shots?\
    \ Surely, it takes longer for the computer to work with ginormous numbers than\
    \ small numbers like 10 or 50? While that’s true, we don’t have to worry about\
    \ that here. The problem description states that each team scores at most 100\
    \ of each type of play. We’re therefore working with small numbers, and it’s fair\
    \ to say that the computer can read or operate on these numbers in a constant\
    \ number of steps. In general, you can think of numbers up to a few billion as\
    \ “small.”\n\nIn big O notation, we say that a constant-time algorithm is $O(1)$.\
    \ The 1 doesn’t mean that you’re stuck performing only one step in a constant-time\
    \ algorithm. If you perform a fixed number of steps, like 10 or even 10,000, it’s\
    \ still constant time. But don’t write $O(10)$ or $O(10000)$—all constant-time\
    \ algorithms are denoted $O(1)$.\n\n## Linear Time\n\nMost algorithms are not\
    \ constant-time algorithms. Instead, they do an amount of work that depends on\
    \ the amount of input. For example, they do more work to process 1,000 values\
    \ than they do to process 10 values. What distinguishes these algorithms from\
    \ each other is the relationship between the amount of input and the amount of\
    \ work that the algorithm does.\n\nA *linear-time* algorithm is one with a linear\
    \ relationship between the amount of input and the amount of work done. Suppose\
    \ we run a linear-time algorithm on an input with 50 values, and then we run it\
    \ again on an input with 100 values. The algorithm will do about twice as much\
    \ work on the 100 values compared with on the 50 values.\n\nFor an example, let’s\
    \ look at the Three Cups problem from Chapter 3. We solved that problem in Listing\
    \ 3-1, and I’ve reproduced our solution here:\n\n```\nswaps = input()\n\nball_location\
    \ = 1\n```"
  mdcn: "**执行时间取决于计算机** 对我们的程序进行计时，只能告诉我们程序在一台计算机上运行需要多长时间。这是非常具体的信息，对于理解程序在其他计算机上运行时的表现帮助甚微。在学习本书的过程中，你可能也注意到，即使在同一台计算机上，程序每次运行所需的时间也会有所不同。例如，你可能在一个测试用例上运行程序，发现它需要三秒；然后你再次运行它，在同一个测试用例上，发现它需要两秒半或三秒半。造成这种差异的原因是，你的操作系统正在管理你的计算资源，根据需要将它们分配给不同的任务。操作系统所做的决策会影响你程序的运行时间。\n\
    \n**执行时间取决于测试用例** 在一个测试用例上对我们的程序进行计时，只能告诉我们程序在该测试用例上运行需要多长时间。假设我们的程序在一个小测试用例上运行需要三秒。这看起来可能很快，但关于小测试用例的真相是：对于一个问题，任何合理的解决方案都能快速解决它们。如果我让你告诉我10个电子邮件地址中有多少个不同的地址，或者10头奶牛中有多少个三元组，你可以用你想到的第一个正确方法快速完成。那么，有趣的是大测试用例。它们才是算法技巧发挥作用的地方。我们的程序在一个大测试用例或一个巨大的测试用例上需要多长时间？我们不知道。我们也必须在那些测试用例上运行我们的程序。即使我们那样做了，也可能存在特定类型的测试用例会触发较差的性能。我们可能会误以为我们的程序比实际更快。\n\
    \n**程序需要实现** 我们无法对未实现的东西进行计时。假设我们正在思考一个问题，并想出了解决它的方法。它快吗？虽然我们可以通过实现它来找出答案，但最好能提前知道这个想法是否可能产生一个快速的程序。你不会去实现一个你从一开始就知道是不正确的程序。同样，最好能从一开始就知道一个程序会太慢。\n\
    \n**计时无法解释慢的原因** 如果我们发现我们的程序太慢，那么我们的下一个任务就是设计一个更快的程序。然而，仅仅对程序进行计时并不能让我们洞察程序为什么慢。它就是慢。此外，如果我们设法想出了一个可能的改进方案，我们需要实现它来看看是否有帮助。\n\
    \n**执行时间不易传达** 由于上述许多原因，使用执行时间来与他人讨论算法效率是很困难的。执行时间太具体了：它取决于计算机、操作系统、测试用例、编程语言和所使用的特定实现。我们必须向所有对我们算法效率感兴趣的人提供所有这些信息。\n\
    \n不用担心：计算机科学家已经设计出一种符号来解决计时的这些缺点。它独立于计算机，独立于测试用例，也独立于特定的实现。它指出了慢程序为什么慢。它易于传达。它被称为\
    \ *大O*，马上就会介绍。\n\n## 大O\n\n大O是计算机科学家用来简洁描述算法效率的一种符号。这里的关键概念是 *效率类*，它告诉你一个算法有多快，或者等价地，它做了多少工作。算法越快，它做的工作就越少；算法越慢，它做的工作就越多。每个算法都属于一个效率类；效率类告诉你该算法相对于它必须处理的输入量做了多少工作。要理解大O，我们需要理解这些效率类。我们现在将研究七种最常见的效率类。我们将看到那些做最少工作的算法，也就是你希望你的算法能归入的类别。我们还将看到那些做相当多工作的算法，那些算法很可能会给你带来超时错误。\n\
    \n## 常数时间\n\n最理想的算法是那些不随输入量增加而做更多工作的算法。无论问题实例如何，这样的算法大约需要相同数量的步骤。这些被称为 *常数时间*\
    \ 算法。\n\n这很难相信，对吧？一个无论什么情况都做大约相同工作量的算法？确实，用这样的算法解决问题是罕见的。但当你能做到时，要高兴：你不可能做得更好了。\n\
    \n在本书中，我们设法用常数时间算法解决了几个问题。回想一下第2章中的电话推销员问题，我们需要确定提供的电话号码是否属于电话推销员。我在这里复制了我们来自代码清单2-2的解决方案：\n\
    \n```\nnum1 = int(input())\nnum2 = int(input())\nnum3 = int(input())\nnum4 = int(input())\n\
