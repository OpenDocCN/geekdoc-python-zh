    \n我们的程序是正确的。但如果你将其提交给评测系统，你会看到它效率不够高。对于这个问题以及许多竞赛编程问题，前几个测试用例都很小——只有几头牛、几个救生员或几个滑雪场。我们的程序应该能够及时解决这些用例。剩下的测试用例则越来越接近可接受输入的极限。我们的程序无法及时解决这些用例。它太慢了。\n\
