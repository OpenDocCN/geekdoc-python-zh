    \ range(n):\n    <process input j in a constant number of steps>\n```\n\n- A.\
    \ $O(1)$\n- B. $O(n)$\n- C. $O(n^2)$\n\nAnswer: B. We have two loops here, and\
    \ they both depend on $n$. Isn’t this quadratic time, then?\n\nNo! These two loops\
    \ are sequential, not nested. The first loop takes $n$ steps, and the second also\
    \ takes $n$ steps, for a total of $2n$ steps. This is therefore a linear-time\
    \ algorithm.\n\n## Alternate Form\n\nWhen you see two nested loops where each\
    \ depends on $n$, it’s a good bet that you’re looking at a quadratic-time algorithm.\
    \ But it’s possible for a quadratic-time algorithm to arise even in the absence\
    \ of such nested loops. We can find such an example in our first solution to the\
    \ Email Addresses problem, Listing 8-2. I’ve reproduced that solution here:\n\n\
    ```\n# clean function not shown\n\nfor dataset in range(10):\n    n = int(input())\n\
    \    addresses = []\n    for i in range(n):\n        address = input()\n     \
    \   ❶ address = clean(address)\n        ❷ if not address in addresses:\n     \
    \       addresses.append(address)\n\nprint(len(addresses))\n```\n\nWe’ll let $n$\
    \ be the maximum number of email addresses that we see in our 10 test cases. The\
    \ outer for loop iterates 10 times; the inner for loop iterates at most $n$ times.\
    \ We’re therefore processing at most $10n$ email addresses, which is linear in\
    \ $n$.\n\nCleaning an email address ❶ takes a constant number of steps, so we\
    \ don’t need to worry about that. But this is still *not* a linear-time algorithm,\
    \ because each iteration of the inner for loop takes more than a constant number\
    \ of steps. Specifically, checking whether an email address is already in our\
    \ list ❷ takes work proportional to the number of email addresses already in the\
    \ list, because Python has to search through the list. That’s a linear-time operation\
    \ on its own! So we’re processing $10n$ email addresses, each of which requires\
    \ $n$ work, for a total of $10n^2$, or quadratic-time, work. This quadratic-time\
    \ performance is precisely why we received a time limit exceeded error with this\
    \ code, leading us to use a set rather than a list.\n\n## Cubic Time\n\nIf one\
    \ loop can lead to linear time, and two nested loops can lead to quadratic time,\
    \ then what about three nested loops? Three nested loops, each of which depends\
    \ on $n$, leads to a *cubic-time* algorithm. In big O notation, we say that a\
    \ cubic-time algorithm is $O(n^3)$.\n\nIf you thought quadratic-time algorithms\
    \ were slow, wait till you see how slow cubic-time algorithms are. Suppose that\
    \ $n$ is 1,000. We already know that a linear-time algorithm will take about 1,000\
    \ steps and that a quadratic-time algorithm will take about 1,000² = 1,000,000\
    \ steps. A cubic-time algorithm will take 1,000³ = 1,000,000,000 steps. A billion\
    \ steps! But it gets worse. For example, if *n* is 10,000, which is still a small\
    \ amount of input, then a cubic-time algorithm will take 1,000,000,000,000 (that’s\
    \ one trillion) steps. One trillion steps would take many minutes of computing\
    \ time. No joke: a cubic-time algorithm is almost never good enough.\n\nIt certainly\
    \ wasn’t good enough when we tried to use a cubic-time algorithm to solve Cow\
    \ Baseball in Listing 9-5. I’ve reproduced that solution here:\n\n```\ninput_file\
    \ = open('baseball.in', 'r')\noutput_file = open('baseball.out', 'w')\n\nn = int(input_file.readline())\n\
    \npositions = []\n\nfor i in range(n):\n    positions.append(int(input_file.readline()))\n\
