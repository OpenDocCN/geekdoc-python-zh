    \ $p$ so that $2^p = 512$. Since $2^9 = 512$, we confirm that $\\log_2 512 = 9$.\n\
    \nIt’s shocking how slowly the logarithm function grows. For example, consider\
    \ a list of one million values. How many steps would binary search take to search\
    \ that? It takes $\\log_2 1,000,000$ steps, which is only about 20. Logarithmic-time\
    \ is much closer to constant-time than it is to linear-time. It’s a huge win any\
    \ time you can replace a linear-time algorithm by a logarithmic-time one.\n\n\
    # **n log n Time**\n\nIn Chapter 5, we solved the Village Neighborhood problem.\
    \ I’ve reproduced our solution from Listing 5-1 here:\n\n```\nn = int(input())\n\
    \npositions = []\n\nfor i in range(n):\n    positions.append(int(input()))\n\n\
    positions.sort()\n\nleft = (positions[1] - positions[0]) / 2\nright = (positions[2]\
    \ - positions[1]) / 2\nmin_size = left + right\nfor i in range(2, n - 1):\n  \
    \  left = (positions[i] - positions[i - 1]) / 2\n    right = (positions[i + 1]\
    \ - positions[i]) / 2\n    size = left + right\n    if size < min_size:\n    \
    \    min_size = size\n\nprint(min_size)\n```"
