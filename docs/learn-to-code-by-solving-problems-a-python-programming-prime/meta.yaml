  md: '# or Operator


    The or operator takes two Boolean expressions as its operands. It returns True
    if at least one operand is True, and False otherwise:


    ```

    >>> True or True

    True

    >>> True or False

    True

    >>> False or True

    True

    >>> False or False

    False

    ```


    The only way to get False out of the or operator is if both of its operands are
    False.

    We can use or to tell us whether a digit is an 8 or a 9:


    ```

    >>> digit = 8

    >>> digit == 8 or digit == 9

    True

    >>> digit = 3

    >>> digit == 8 or digit == 9

    False

    ```


    Remember from “Integer and Floating-Point Numbers” in Chapter 1 that Python uses
    operator precedence to determine the order that operators are applied. The precedence
    of or is lower than the precedence of relational operators, which means that we
    don’t often need parentheses around operands. For example, in digit == 8 or digit
    == 9, the two operands to or are digit == 8 and digit == 9. It’s the same as if
    we’d written it as (digit == 8) or (digit == 9).

    In English, it makes sense if someone says “if the digit is 8 or 9.” But writing
    that won’t work in Python:


