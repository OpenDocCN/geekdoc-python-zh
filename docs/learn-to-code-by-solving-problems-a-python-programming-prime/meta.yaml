    >>> for num1 in lst:\n...     for num2 in lst:\n...         for num3 in lst:\n\
    ...             print(num1, num2, num3)\n...\n1 1 1\n1 1 9\n1 9 1\n1 9 9\n9 1\
    \ 1\n9 1 9\n9 9 1\n9 9 9\n```\n\n使用这样的三重循环为我们解决“牛棒球”问题提供了一个起点。对于每个三元组，我们可以检查它是否符合农夫约翰的观察结果。代码见清单\
    \ 9-5。\n\n```\ninput_file = open('baseball.in', 'r')\noutput_file = open('baseball.out',\
