    # Range for Loops Through Indices


    Suppose we have strings giving yesterday’s and today’s parking-space information:


    ```

    >>> yesterday = ''CC.''

    >>> today = ''.C.''

    ```


    Given an index, we can look at yesterday’s and today’s information for that index:


    ```

    >>> yesterday[0]

    ''C''

    >>> today[0]

    ''.''

    ```


    We can use a range for loop through the indices to process each pair of corresponding
    characters. We know that yesterday and today are the same length. But that length
    could be anything from 1 to 100, so we can’t write something like range(3). We
    want to iterate with indices 0, 1, 2, and so on, all the way up to the length
    of the string minus 1. We can do that by using the length of one of the strings
    as the argument to range:


    ```

    >>> for index in range(len(yesterday)):

    ...     print(yesterday[index], today[index])

    ...

    C .

    C C

    ..

    ```


    I’ve called the loop variable index. Other popular names include i (the first
    letter of index) and ind. I’ll use i from here on out.


    Don’t call this loop variable status or information. Those names imply that it
    takes on ''C'' and ''.'' values, when really it takes on integers.


    # Solving the Problem


    With our range for loops, we’re ready to solve Occupied Spaces. Our strategy is
    to loop through each index from the beginning of the strings to the end. We can
    check what’s at each index in both yesterday’s information and today’s information.
    Using a nested if statement, we’ll determine whether the parking space was occupied
    on both days.'
