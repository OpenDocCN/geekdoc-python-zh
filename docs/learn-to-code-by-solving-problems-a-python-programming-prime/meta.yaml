    # Problem #4: Telemarketers


    Sometimes we need to encode more complex Boolean expressions than those that we
    have seen so far. In this problem, we’ll learn about Boolean operators that help
    us do this.

    This is DMOJ problem ccc18j1.


    # The Challenge


    In this problem, we’ll assume that phone numbers are four digits. A phone number
    belongs to a telemarketer if its four digits satisfy all three of the following
    properties:


    +   - The first digit is 8 or 9.

    - The fourth digit is 8 or 9.

    - The second and third digits are the same.


    For example, a phone number whose four digits are 8119 belongs to a telemarketer.

    Determine whether a phone number belongs to a telemarketer, and indicate whether
    we should answer the phone or ignore it.


    # Input


    There are four lines of input. These lines give the first, second, third, and
    fourth digits of the phone number, respectively. Each digit is an integer between
    0 and 9.


    # Output


    If the phone number belongs to a telemarketer, output `ignore`; otherwise, output
    `answer`.


    # Boolean Operators


    What has to be true about a phone number that belongs to a telemarketer? Its first
    digit has to be 8 *or* 9. *And*, its fourth digit has to be 8 *or* 9. *And*, the
    second and third digits have to be the same. We can encode this “or” and “and”
    logic using Python’s *Boolean operators*.'
- md: "## or Operator\n\nThe or operator takes two Boolean expressions as its operands.\
    \ It returns True if at least one operand is True, and False otherwise:\n\n```\n\
    >>> True or True\nTrue\n>>> True or False\nTrue\n>>> False or True\nTrue\n>>>\
    \ False or False\nFalse\n```\n\nThe only way to get False out of the or operator\
    \ is if both of its operands are False.\nWe can use or to tell us whether a digit\
    \ is an 8 or a 9:\n\n```\n>>> digit = 8\n>>> digit == 8 or digit == 9\nTrue\n\
    >>> digit = 3\n>>> digit == 8 or digit == 9\nFalse\n```\n\nRemember from \"Integer\
    \ and Floating-Point Numbers\" in Chapter 1 that Python uses operator precedence\
    \ to determine the order that operators are applied. The precedence of or is lower\
    \ than the precedence of relational operators, which means that we don't often\
    \ need parentheses around operands. For example, in digit == 8 or digit == 9,\
    \ the two operands to or are digit == 8 and digit == 9. It's the same as if we'd\
    \ written it as (digit == 8) or (digit == 9).\nIn English, it makes sense if someone\
    \ says \"if the digit is 8 or 9.\" But writing that won't work in Python:\n\n\
    ```\n>>> digit = 3\n>>> if digit == 8 or 9:\n...     print('yes!')\n...\nyes!\n\
    ```\n\nNotice that I've (incorrectly!) written the second operand as 9 instead\
    \ of digit == 9. Python responds by outputting yes!, which is certainly not what\
    \ we'd want given that digit refers to 3. The reason is that Python considers\
    \ nonzero numbers to be True. Since 9 is considered True, this makes the whole\
    \ or expression True. Carefully double-check your Boolean expressions to avoid\
    \ these kinds of mistakes when translating from natural language to Python.\n\n\
    ## and Operator\n\nThe and operator returns True if both of its operands are True,\
    \ and returns False otherwise:\n\n```\n>>> True and True\nTrue\n>>> True and False\n\
    False\n>>> False and True\nFalse\n>>> False and False\nFalse\n```\n\nThe only\
    \ way to get True out of the and operator is if both of its operands are True.\n\
    The precedence of and is higher than or. Here's an example of why this matters:\n\
    \n```\n>>> True or True and False\nTrue\n```\n\nPython interprets that expression\
    \ like this, with the and happening first:\n\n```\n>>> True or (True and False)\n\
    True\n```\n\nThe result is True because the first operand of or is True.\nWe can\
    \ force the or to happen first by including parentheses:\n\n```\n>>> (True or\
    \ True) and False\nFalse\n```\n\nThe result is False because the second operand\
    \ of and is False.\n\n## not Operator\n\nAnother important Boolean operator is\
    \ `not`. Unlike `or` and `and`, `not` takes only one operand (not two). If its\
    \ operand is `True`, `not` returns `False`, and vice versa:\n\n```\n>>> not True\n\
    False\n>>> not False\nTrue\n```\n\nThe precedence of `not` is higher than `or`\
    \ and `and`.\n\n### CONCEPT CHECK\n\nHere's an expression and versions of that\
    \ expression with parentheses. Which of them evaluates to `True`?\n\nA. `not True\
    \ and False`\nB. `(not True) and False`\nC. `not (True and False)`\nD. None of\
    \ the above\n\n---\n\nAnswer: C. The expression `(True and False)` evaluates to\
    \ `False`; the `not` therefore makes the full expression `True`.\n\n### CONCEPT\
    \ CHECK\n\nConsider the expression `not a or b`.\n\nWhich of the following makes\
    \ the expression `False`?\n\nA. `a False, b False`\nB. `a False, b True`\nC. `a\
    \ True, b False`\nD. `a True, b True`\nE. More than one of the above\n\nAnswer:\
    \ C. If a is True, then not a is False. Since b is False, too, both operands to\
    \ or are False, so the whole expression evaluates to False.\n\n## Solving the\
    \ Problem\n\nWith Boolean operators at the ready, we can tackle the Telemarketers\
    \ problem. Our solution is in Listing 2-2.\n\n```\nnum1 = int(input())\nnum2 =\
    \ int(input())\nnum3 = int(input())\nnum4 = int(input())\n\nif ((num1 == 8 or\
    \ num1 == 9) and\n    (num4 == 8 or num4 == 9) and\n    (num2 == num3)):\n   \
    \ print('ignore')\nelse:\n    print('answer')\n```\n\nListing 2-2: Solving Telemarketers\n\
    \nAs in Winning Team, we start by reading the input and converting it to integers.\n\
    \nThe high-level structure of our if statement is three expressions connected\
    \ by and operators; each of them must be True for the entire expression to be\
    \ True. We require that the first number be 8 or 9, that the fourth number be\
    \ 8 or 9, and that the second and third numbers be equal. If all three of these\
    \ conditions hold, then we know that the phone number belongs to a telemarketer,\
    \ and we output ignore. Otherwise, the phone number does not belong to a telemarketer,\
    \ and we output answer.\n\nI've split the Boolean expression over three lines.\
    \ This requires wrapping the entire expression in an additional pair of parentheses,\
    \ as I have done. (Without those parentheses, you'll get a syntax error, because\
    \ there's no indication to Python that the expression is continuing on the next\
    \ line.)\n\nPython style guides suggest that a line be no longer than 79 characters.\
    \ A line with the full Boolean expression would squeak in there at 76 characters.\
    \ But I think the three-line version is clearer, highlighting each condition that\
    \ must be True on its own line.\n\nWe have a good solution here. To explore a\
    \ little further, let's discuss some alternate approaches.\n\nOur code uses a\
    \ Boolean expression to detect when a phone number belongs to a telemarketer.\
    \ We could have also chosen to write code that detects when a phone number does\
    \ *not* belong to a telemarketer. If the phone number doesn't belong to a telemarketer,\
    \ we should output `answer`; otherwise, we should output `ignore`.\n\nIf the first\
    \ digit isn't 8 and isn't 9, then the phone number doesn't belong to a telemarketer.\
    \ Or, if the fourth digit isn't 8 and isn't 9, then the phone number doesn't belong\
    \ to a telemarketer. Or, if the second and third digits aren't equal, then the\
    \ phone number doesn't belong to a telemarketer. If even one of these expressions\
    \ is True, then the phone number doesn't belong to a telemarketer.\n\nSee Listing\
    \ 2-3 for a version of the code that captures this logic.\n\n```\nnum1 = int(input())\n\
    num2 = int(input())\nnum3 = int(input())\nnum4 = int(input())\n\nif ((num1 !=\
    \ 8 and num1 != 9) or\n    (num4 != 8 and num4 != 9) or\n    (num2 != num3)):\n\
    \    print('answer')\nelse:\n    print('ignore')\n```\n\nListing 2-3: Solving\
    \ Telemarketers, alternate approach\n\nIt's not easy getting all of those `!=`,\
    \ `or`, and `and` operators correct! Notice, for example, that we've had to change\
    \ all `==` operators to `!=`, all `or` operators to `and`, and all `and` operators\
    \ to `or`.\n\nAn alternate approach is to use the `not` operator to negate the\
    \ \"is a telemarketer\" expression in one shot. See Listing 2-4 for that code.\n\
    \n```\nnum1 = int(input())\nnum2 = int(input())\nnum3 = int(input())\nnum4 = int(input())\n\
    \nif not ((num1 == 8 or num1 == 9) and\n        (num4 == 8 or num4 == 9) and\n\
    \        (num2 == num3)):\n    print('answer')\nelse:\n    print('ignore')\n```\n\
    \nListing 2-4: Solving Telemarketers, not operator\n\nWhich of these solutions\
    \ do you find most intuitive? There's often more than one way to structure the\
    \ logic of an if statement, and we should use the one that's easiest to get right.\
    \ To me, Listing 2-2 is the most natural, but you may feel otherwise!\n\nChoose\
    \ your favorite version and submit it to the judge. You should see that all test\
    \ cases pass.\n\n## Comments\n\nWe should always strive to make our programs as\
    \ clear as possible. This helps to avoid introducing errors when programming and\
    \ makes it easier to fix our code when errors do slip in. Meaningful variable\
    \ names, spaces around operators, blank lines to segment the program into its\
    \ logical pieces, simple if statement logic: all of these practices can improve\
    \ the quality of the code we write. Another good habit is adding *comments* to\
    \ our code.\n\nA comment is introduced by the # character and continues until\
    \ the end of the line. Python ignores comments, so they have no impact on what\
    \ our program does. We add comments to remind ourselves, or others, about design\
    \ decisions that we've made. Assume that the person reading the code knows Python,\
    \ so avoid comments that simply restate what the code is doing. Here's code with\
    \ an unnecessary comment:\n\n```\n>>> x = 5\n>>> x = x + 1 # Increase x by 1\n\
    ```\n\nThat comment adds nothing beyond what we already know about assignment\
    \ statements.\n\nSee Listing 2-5 for a version of Listing 2-2 with comments."
  mdcn: "## or 运算符\n\nor 运算符接受两个布尔表达式作为其操作数。如果至少有一个操作数为 True，则返回 True，否则返回 False：\n\
    \n```\n>>> True or True\nTrue\n>>> True or False\nTrue\n>>> False or True\nTrue\n\
    >>> False or False\nFalse\n```\n\n要从 or 运算符得到 False，唯一的可能是它的两个操作数都为 False。\n我们可以使用\
    \ or 来判断一个数字是 8 还是 9：\n\n```\n>>> digit = 8\n>>> digit == 8 or digit == 9\nTrue\n\
    >>> digit = 3\n>>> digit == 8 or digit == 9\nFalse\n```\n\n回顾第 1 章“整数和浮点数”中的内容，Python\
    \ 使用运算符优先级来确定运算符的应用顺序。or 的优先级低于关系运算符，这意味着我们通常不需要在操作数周围加括号。例如，在 `digit == 8 or\
    \ digit == 9` 中，or 的两个操作数是 `digit == 8` 和 `digit == 9`。这等同于我们写成 `(digit == 8)\
    \ or (digit == 9)`。\n在英语中，如果有人说“如果数字是 8 或 9”，这是有意义的。但在 Python 中这样写是不行的：\n\n```\n\
    >>> digit = 3\n>>> if digit == 8 or 9:\n...     print('yes!')\n...\nyes!\n```\n\
    \n请注意，我（错误地！）将第二个操作数写成了 `9` 而不是 `digit == 9`。Python 输出了 `yes!`，考虑到 `digit` 指的是\
    \ 3，这肯定不是我们想要的。原因是 Python 将非零数字视为 True。由于 9 被视为 True，这使得整个 or 表达式为 True。在将自然语言翻译成\
    \ Python 时，请仔细检查你的布尔表达式，以避免这类错误。\n\n## and 运算符\n\nand 运算符在其两个操作数都为 True 时返回 True，否则返回\
    \ False：\n\n```\n>>> True and True\nTrue\n>>> True and False\nFalse\n>>> False\
    \ and True\nFalse\n>>> False and False\nFalse\n```\n\n要从 and 运算符得到 True，唯一的可能是它的两个操作数都为\
    \ True。\nand 的优先级高于 or。下面是一个例子说明为什么这很重要：\n\n```\n>>> True or True and False\n\
    True\n```\n\nPython 解释该表达式时，and 会先执行：\n\n```\n>>> True or (True and False)\nTrue\n\
    ```\n\n结果是 True，因为 or 的第一个操作数是 True。\n我们可以通过加括号来强制 or 先执行：\n\n```\n>>> (True or\
    \ True) and False\nFalse\n```\n\n结果是 False，因为 and 的第二个操作数是 False。\n\n## not 运算符\n\
    \n另一个重要的布尔运算符是 `not`。与 `or` 和 `and` 不同，`not` 只接受一个操作数（不是两个）。如果其操作数为 `True`，`not`\
    \ 返回 `False`，反之亦然：\n\n```\n>>> not True\nFalse\n>>> not False\nTrue\n```\n\n`not`\
    \ 的优先级高于 `or` 和 `and`。\n\n### 概念检查\n\n这里有一个表达式以及该表达式带括号的版本。其中哪一个的计算结果为 `True`？\n\
    \nA. `not True and False`\nB. `(not True) and False`\nC. `not (True and False)`\n\
    D. 以上都不是\n\n---\n\n答案：C。表达式 `(True and False)` 的计算结果为 `False`；因此 `not` 使整个表达式为\
    \ `True`。\n\n### 概念检查\n\n考虑表达式 `not a or b`。\n\n以下哪种情况会使表达式为 `False`？\n\nA. `a\
    \ 为 False，b 为 False`\nB. `a 为 False，b 为 True`\nC. `a 为 True，b 为 False`\nD. `a\
    \ 为 True，b 为 True`\nE. 以上不止一种情况\n\n答案：C。如果 a 为 True，那么 `not a` 为 False。由于 b 也为\
    \ False，or 的两个操作数都为 False，因此整个表达式计算结果为 False。\n\n## 解决问题\n\n有了布尔运算符，我们就可以解决电话推销员问题了。我们的解决方案在代码清单\
    \ 2-2 中。\n\n```\nnum1 = int(input())\nnum2 = int(input())\nnum3 = int(input())\n\
    num4 = int(input())\n\nif ((num1 == 8 or num1 == 9) and\n    (num4 == 8 or num4\
    \ == 9) and\n    (num2 == num3)):\n    print('ignore')\nelse:\n    print('answer')\n\
    ```\n\n代码清单 2-2：解决电话推销员问题\n\n与“获胜队伍”问题一样，我们首先读取输入并将其转换为整数。\n\n我们的 if 语句的高级结构是三个由\
    \ and 运算符连接的表达式；每个表达式都必须为 True，整个表达式才为 True。我们要求第一个数字是 8 或 9，第四个数字是 8 或 9，并且第二个和第三个数字相等。如果这三个条件都满足，那么我们就知道这个电话号码属于电话推销员，我们输出\
    \ `ignore`。否则，这个电话号码不属于电话推销员，我们输出 `answer`。\n\n我将布尔表达式分成了三行。这需要将整个表达式用一对额外的括号括起来，就像我做的那样。（如果没有这些括号，你会得到语法错误，因为\
    \ Python 无法知道表达式在下一行继续。）\n\nPython 风格指南建议一行不超过 79 个字符。包含完整布尔表达式的那一行刚好在 76 个字符以内。但我认为三行版本更清晰，突出了每个必须为\
    \ True 的条件。\n\n我们这里有一个很好的解决方案。为了进一步探讨，让我们讨论一些其他方法。\n\n我们的代码使用布尔表达式来检测电话号码何时属于电话推销员。我们也可以选择编写代码来检测电话号码何时*不*属于电话推销员。如果电话号码不属于电话推销员，我们应该输出\
    \ `answer`；否则，我们应该输出 `ignore`。\n\n如果第一个数字不是 8 也不是 9，那么电话号码就不属于电话推销员。或者，如果第四个数字不是\
    \ 8 也不是 9，那么电话号码就不属于电话推销员。或者，如果第二个和第三个数字不相等，那么电话号码就不属于电话推销员。如果这些表达式中有一个为 True，那么电话号码就不属于电话推销员。\n\
    \n代码清单 2-3 展示了实现此逻辑的代码版本。\n\n```\nnum1 = int(input())\nnum2 = int(input())\nnum3\
    \ = int(input())\nnum4 = int(input())\n\nif ((num1 != 8 and num1 != 9) or\n  \
    \  (num4 != 8 and num4 != 9) or\n    (num2 != num3)):\n    print('answer')\nelse:\n\
    \    print('ignore')\n```\n\n代码清单 2-3：解决电话推销员问题，另一种方法\n\n要正确使用所有这些 `!=`、`or` 和\
    \ `and` 运算符并不容易！例如，请注意，我们必须将所有 `==` 运算符改为 `!=`，所有 `or` 运算符改为 `and`，所有 `and` 运算符改为\
    \ `or`。\n\n另一种方法是使用 `not` 运算符一次性否定“是电话推销员”的表达式。代码清单 2-4 展示了该代码。\n\n```\nnum1 =\
    \ int(input())\nnum2 = int(input())\nnum3 = int(input())\nnum4 = int(input())\n\
    \nif not ((num1 == 8 or num1 == 9) and\n        (num4 == 8 or num4 == 9) and\n\
    \        (num2 == num3)):\n    print('answer')\nelse:\n    print('ignore')\n```\n\
    \n代码清单 2-4：解决电话推销员问题，使用 not 运算符\n\n你觉得这些解决方案中哪一个最直观？构建 if 语句的逻辑通常不止一种方式，我们应该使用最容易正确实现的方式。对我来说，代码清单\
    \ 2-2 是最自然的，但你可能有不同的看法！\n\n选择你最喜欢的版本并提交给评测系统。你应该能看到所有测试用例都通过了。\n\n## 注释\n\n我们应该始终努力使我们的程序尽可能清晰。这有助于避免在编程时引入错误，并在错误确实发生时更容易修复我们的代码。有意义的变量名、运算符周围的空格、将程序分成逻辑部分的空行、简单的\
    \ if 语句逻辑：所有这些实践都可以提高我们编写的代码质量。另一个好习惯是为我们的代码添加*注释*。\n\n注释以 `#` 字符开头，并持续到行尾。Python\
    \ 会忽略注释，因此它们对程序的功能没有影响。我们添加注释是为了提醒自己或他人我们所做的设计决策。假设阅读代码的人了解 Python，因此避免那些仅仅重述代码功能的注释。以下是一段带有不必要注释的代码：\n\
    \n```\n>>> x = 5\n>>> x = x + 1 # 将 x 增加 1\n```\n\n这个注释除了我们已经知道的赋值语句信息外，没有增加任何内容。\n\
    \n代码清单 2-5 展示了代码清单 2-2 带注释的版本。"
