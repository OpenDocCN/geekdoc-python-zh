  md: 'We can count up by a different *step size* by including a third argument. The
    default step size is 1, which counts up by one. Let’s try a couple of other step
    sizes:


    ```

    >>> for num in range(0, 10, 2):

    ...     print(num)

    ...

    0

    2

    4

    6

    8


    >>> for num in range(0, 10, 3):

    ...     print(num)

    ...

    0

    3

    6

    9

    ```


    We can count backward, too, but *not* like this:


    ```

    >>> for num in range(6, 2):

    ...     print(num)

    ...

    ```


    That doesn’t work, because by default `range` counts up. A step size of -1 lets
    us go backward, one at a time:


    ```

    >>> for num in range(6, 2, -1):

    ...     print(num)

    ...

    6

    5

    4

    3

    ```


    To count down from 6 to 0, including 0, we need a value of -1 for the second argument:


    ```

    >>> for num in range(6, -1, -1):

    ...     print(num)

    ...

    6

    5

    4

    3

    ```'
