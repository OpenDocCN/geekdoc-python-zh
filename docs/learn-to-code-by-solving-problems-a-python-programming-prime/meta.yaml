    # The Mod Operator


    In “Integer and Floating-Point Numbers” in Chapter 1, I introduced the mod (%)
    operator for calculating the remainder of an integer division. For example, 16
    divided by 5 has a remainder of 1:


    ```

    >>> 16 % 5

    1

    ```


    And 15 divided by 5 has a remainder of 0 (because 5 divides 15 exactly):


    ```

    >>> 15 % 5

    0

    ```


    The second operand dictates the range of values that % can possibly return. The
    possible return values are 0 up to but not including the second operand. For example,
    if the second operand is 3, then the only values that can be returned by % are
    0, 1, and 2. In addition, as we increase the first operand, we cycle through all
    possible return values. Here’s an example:


    ```

    >>> 0 % 3

    0

    >>> 1 % 3

    1

    >>> 2 % 3

    2

    >>> 3 % 3

    ```'
