  - '[PAGE 74]


    Another important Boolean operator is `not`. Unlike `or` and `and`, `not` takes
    only one operand (not two). If its operand is `True`, `not` returns `False`, and
    vice versa:


    ```

    >>> not True

    False

    >>> not False

    True

    ```


    The precedence of `not` is higher than `or` and `and`.


