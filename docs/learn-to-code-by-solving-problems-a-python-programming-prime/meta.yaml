    help you learn.


    # Using Programming Judges


    I’ve decided to structure this book around problems from *programming judge* websites.
    A programming judge website offers a repository of programming problems that can
    be solved by programmers around the world. You submit your solution—your Python
    code—and the site runs tests on your code. If your code produces the correct answer
    for each test case, then it’s likely that your solution is correct. If instead
    your code produces the wrong answer for one or more test cases, then your code
    is incorrect, and revisions are required.


    There are several reasons why I think programming judges are particularly suitable
    sites for learning programming:


    **Rapid feedback** Rapid, targeted feedback is crucial in the early stages of
    learning to program. Programming judges provide feedback as soon as you submit
    your code.


    **High-quality problems** I find the problems on programming judges to be high
    quality. Many problems are originally from competitive programming contests. Other
    problems are written by individuals who are associated with a programming judge
    or simply want to help others learn. See the Problem Credits appendix for the
    source of each problem that we’ll study.'
  - '[PAGE 25]


    **Quantity of problems** The programming judges contain hundreds of problems.
    I’ve selected only a small number for this book. If you need more practice, trust
    me: the programming judges can provide it.


    **Community features** The programming judges enable users to read and respond
    to comments. If you’re stuck on a problem, browse the comments for hints dropped
    there by others. If you’re still stuck, consider posting a comment of your own
    asking for help. Once you’ve successfully solved a problem, your learning is not
    done! Many programming judges allow you to view the code that others have submitted.
    Dig through a few such submissions to see how they compare to yours. There are
    always multiple ways to solve a problem. Perhaps your way is most intuitive to
    you right now, but opening yourself to other possibilities is an important step
    toward programming mastery.


