    \ 引用 0，所以布尔表达式为 True。因此我们运行循环块，输出 0，然后将 num 增加到 1 ❸。\n\n我们跳回循环顶部并再次评估 `num < 5`\
    \ 布尔表达式。由于 num 引用 1，表达式为 True。因此我们再次运行循环块，输出 1，然后将 num 增加到 2。\n\n回到循环顶部：`num <\
