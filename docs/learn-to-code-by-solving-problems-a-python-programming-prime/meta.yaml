    \ the number of bonuses from the rows, and calculating the number of bonuses from\
    \ the columns. Let’s take a look at each of these.\n\nTo read the input ❶, we\
    \ perform $d$ iterations of the outer loop. On each of these iterations we read\
    \ a row and call `split`, which takes about $f$ steps. We take another $f$ steps\
    \ to loop through the values and convert them to integers. In total, then, each\
    \ of the $d$ iterations performs a number of steps proportional to $f$. Reading\
    \ the input therefore takes $O(df)$ time.\n\nNow for the row bonuses ❷. The outer\
    \ loop here loops $d$ times. Each of these iterations calls `sum`, which takes\
    \ $f$ steps because it has to add up $f$ values. Like reading the input, then,\
    \ this part of the algorithm is $O(df)$.\n\nFinally, let’s look at the code for\
    \ the column bonuses ❸. The outer loop loops $f$ times. Each of those iterations\
    \ leads to the inner loop iterating $d$ times. The total here, again, is $O(df)$.\n\
    \nEach component of this algorithm is $O(df)$. Adding three $O(df)$ components\
    \ together yields an $O(df)$ algorithm overall.\n\n# CONCEPT CHECK\n\nWhat is\
    \ the big O efficiency of the following algorithm?\n\n```\nfor i in range(m):\n\
    \    <do something that takes one step>\nfor j in range(n):\n    <do something\
    \ that takes one step>\n```\n\n+   A. $O(1)$\nB. $O(n)$\nC. $O(n^2)$\nD. $O(m+n)$\n\
