  md: 'We were foiled in our attempt to use a list because searching a list is too
    slow. A set is going to be an improvement for us because we can search a set faster
    than we can search a list.


    We''ve already used the `search` function in Listing 8-3 to search a list. But
    that function doesn''t do anything that specifically requires a list! It uses
    the `in` operator, and `in` works on both lists and sets. So we can use that function,
    unchanged, to search a set, too.


    Enter the `search` function from Listing 8-3 into the Python shell. Follow along
    on your computer to get a sense of the difference between searching a long list
    and a big set:


    ```

    >>> search(list(range(1, 50001)), 50000)

    >>> search(set(range(1, 50001)), 50000)

    ```


    At ❶, I''ve used `set` to produce a set, not a list, of the integers from the
    range.


    On my laptop, searching the list takes about 30 seconds. Searching the set, by
    comparison, is bullet fast, almost instantaneous.


    Sets are unstoppable. Don''t try this on a list, but here we go, searching for
    something in a set of 500,000 values:


    ```

    >>> search(set(range(1, 500001)), 500000)

    ```


    Boom! Piece of cake.


    Python manages a list in such a way as to allow us to use any index at any time.
    Python has no flexibility to mess around with the order of values: the first value
    has to be at index 0, the second at index 1, and so on. But for a set, Python
    can store it in whatever way it wants, because it makes no promises of keeping
    things in order for us. And it''s that increased latitude that allows Python to
    optimize searches in a set for speed.


    For similar reasons, there are other operations that are extremely slow on large
    lists but extremely fast on large sets. For example, removing a value from a list
    is very slow, because Python must decrease the index of each value that''s to
    the right of that value. By contrast, removing a value from a set is very fast:
    there are no indices to update!


    # Solving the Problem'
