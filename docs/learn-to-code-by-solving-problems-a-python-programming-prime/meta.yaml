    of a string is at index 0, not 1. We can put that character at the end of the
    string like this:


    ```

    >>> songs = ''ABCDE''

    >>> songs = songs[1] + songs[2] + songs[3] + songs[4] + songs[0]

    >>> songs

    ''BCDEA''

    ```


    This is rather unwieldy and is specific to having exactly five songs. We can use
    string slicing to write more general and less error-prone code.


    *Slicing* is a Python feature that lets us refer to a substring of a string. (In
    fact, it works on any sequence, as we''ll see later in the book.) It takes two
    indices: the index where we want to start, and the index one to the right of where
    we want to end. If we use indices 4 and 8, for example, then we get the characters
    at indices 4, 5, 6, and 7. Slicing uses square brackets, with a colon between
    the two indices:


    ```

    >>> s = ''abcdefghijk''

    >>> s[4:8]

    ''efgh''

    ```


    The slicing doesn''t change what `s` refers to. We can make `s` refer to the slice
    by using an assignment statement:


    ```

    >>> s

    ''abcdefghijk''

    >>> s = s[4:8]

    >>> s

    ''efgh''

    ```


    It''s easy to make an off-by-one error here and think that `s[4:8]` includes the
    character at index 8. But it doesn''t, just like `range(4, 8)` doesn''t include
    the 8. So while this behavior may be a little counterintuitive, it''s applied
    consistently in both `range` and slicing.


    We must always include the colon when performing string slicing, but the start
    and end indices are optional. If we leave off the start index, Python starts slicing
    at index 0:


    ```

    >>> s = ''abcdefghijk''

    >>> s[:4]

    ''abcd''

    ```'
