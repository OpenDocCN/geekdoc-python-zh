    # Exploring a Test Case


    Let’s see if we can apply what we learned from Lifeguards to this problem. To
    solve Lifeguards, we separately fired each lifeguard to figure out the lifeguard
    that we should fire. To solve Ski Hills, perhaps there’s something analogous that
    we can do with each hill? For example, perhaps we can use each hill’s height as
    the low end in an allowed height range?

    We’ll give this a try using the following test case:


    ```

    4

    23

    40

    16

    2

    ```


    The smallest height of these four hills is 2, and the biggest height is 40. The
    difference between 40 and 2 is 38, greater than 17. Farmer John is going to have
    to pay to fix these hills!

    The first hill is height 23. If we use 23 as the low end of the range, then the
    high end is $23 + 17 = 40$. We need to calculate the cost to bring all hills into
    the range 23–40. There are two hills that are out of this range, the ones of heights
    16 and 2. Bringing them up to height 23 costs $(23 - 16)^2 + (23 - 2)^2 = 490$.
    A cost of 490 is the cost to beat.

    The second hill is height 40. The high end of this range is $40 + 17 = 57$, so
    we’re looking to get all hills into the range 40–57. The other three hills are
    out of this range, so each of them contributes to the total cost.'
