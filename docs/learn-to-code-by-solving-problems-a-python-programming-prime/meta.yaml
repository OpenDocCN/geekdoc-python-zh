    5\n>>> 'aaabcaa'.count('ab')\n1\n```\n\n如果参数的出现重叠，则只计算第一次出现：\n\n```\n>>> 'ababa'.count('aba')\n\
    1\n```\n\n与我描述的其他方法不同，`count`对我们解决单词计数问题直接有用。\n想象一个像'this is a string with a few\
    \ words'这样的字符串。注意每个单词后面都有一个空格。事实上，如果你必须手动计算单词数量，你可能会使用空格来判断每个单词在哪里结束。如果我们计算字符串中的空格数量会怎样？为此，我们可以将一个由单个空格字符组成的字符串传递给`count`。它看起来像这样：\n\
    \n```\n>>> 'this is a string with a few words'.count(' ')\n7\n```\n\n我们得到一个值7。这不完全是单词数量——该字符串有八个单词——但我们已经很接近了。为什么我们得到7而不是8？\n\
