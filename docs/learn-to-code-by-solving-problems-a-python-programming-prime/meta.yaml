    \n```\n>>> lst = ['one', 'two', 'hello']\n>>> lst[2]\n'hello'\n>>> lst[2][1]\n\
    'e'\n```\n\n## CONCEPT CHECK\n\nWhat does the following code store in the total\
    \ variable?\n\n```\nlst = [a list of numbers]\ntotal = 0\ni = 1\n\nwhile i <=\
    \ len(lst):\n    total = total + i\n    i = i + 1\n```\n\n- A. The sum of the\
    \ list\n- B. The sum of the list, not including its first value\n- C. The sum\
    \ of the list, not including its first and last values\n- D. This code causes\
    \ an error because it accesses an invalid index of the list\n- E. None of the\
    \ above\n\nAnswer: E. This code adds the numbers 1, 2, 3, and so on, up to the\
    \ length of the list. It doesn’t add numbers from the list or index the list at\
    \ all!\n\n## List Mutability\n\nStrings are *immutable*, which means they cannot\
    \ be modified. When it looks like we’re changing a string (for example, using\
