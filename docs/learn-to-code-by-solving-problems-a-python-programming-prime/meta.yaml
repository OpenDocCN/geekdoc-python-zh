    \ 4, 6, 8})\n4\n```\n\n你也可以遍历集合中的值：\n\n```python\n>>> for value in {2, 4, 6, 8}:\n\
    ...     print('I found', value)\n...\nI found 8\nI found 2\nI found 4\nI found\
