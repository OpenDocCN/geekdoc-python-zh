    >>> s\n{8, 2, 4, 6}\n```\n\n要删除一个值，我们使用 `remove` 方法：\n\n```python\n>>> s.remove(4)\n\
    >>> s\n{8, 2, 6}\n>>> s.remove(8)\n>>> s\n{2, 6}\n>>> s = {2, 6}\n>>> s.remove(8)\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    KeyError: 8\n```\n\n### 概念检查\n\n使用 `help` 来了解集合的 `update` 和 `intersection` 方法。"
