    \ = 'x'\nwhile line != \"\":\n    line = input_file.readline()\n    print(line.rstrip())\n\
    ```\n\nC.\n\n```\nline = input_file.readline()\nwhile line != \"\":\n    line\
    \ = input_file.readline()\n    print(line.rstrip())\n```\n\nD. All of the above\n\
    E. None of the above\n\nBefore looking at the answer, I encourage you to create\
