    \ than 4, so we have another iteration, this one assigning 4 to x and outputting\
    \ 4. And that’s it: 4 is not greater than 4, so the loop terminates.\n\n## Nesting\
    \ Loops in Loops\n\nWe can nest loops inside of while loops, much as we can nest\
    \ loops inside of for loops. In “Nesting” in Chapter 3, I noted that the inner\
    \ for loop completes all of its iterations before the next iteration of the outer\
    \ loop begins. The same holds for while loops. Here’s an example:\n\n```\n>>>\
    \ i = 0\n>>> while i < 3:\n...     j = 8\n...     while j < 11:\n...         print(i,\
    \ j)\n...         j = j + 1\n...     i = i + 1\n...\n0 8\n0 9\n0 10\n1 8\n1 9\n\
    1 10\n2 8\n2 9\n2 10\n```\n\nEach value of i is involved in three lines of output,\
    \ one for each iteration of the inner j loop.\n\n## CONCEPT CHECK\n\nHow many\
    \ lines are output by the following nested loop?\n\n```\nx = 0\ny = 1\nwhile x\
