- md: "## The Challenge\n\nFarmer John has $n$ cows. They are standing in a row, each\
    \ at a distinct integer position. They are having fun throwing a baseball around.\n\
    \nFarmer John is watching the antics. He observes that cow $x$ throws the ball\
    \ to some cow $y$ to its right, and then that cow $y$ throws the ball to some\
    \ cow $z$ to its right. He also knows that the distance of the second throw is\
    \ at least the distance of the first throw and at most twice the distance of the\
    \ first throw. (For example, if the first throw is distance 5, then the second\
    \ throw is at least distance 5 and at most distance 10.)\n\nDetermine the number\
    \ of $(x, y, z)$ triples of cows that satisfy Farmer John’s observations.\n\n\
    ## Input\n\nRead input from the file named `baseball.in`.\n\nThe input consists\
    \ of the following lines:\n\n- A line containing $n$, the number of cows. $n$\
    \ is between 3 and 1,000.\n- $n$ lines, each of which gives the position of a\
    \ cow. All positions are unique, and each is between 1 and 100,000,000.\n\n##\
    \ Output\n\nWrite output to the file named `baseball.out`.\n\nOutput the number\
    \ of triples of cows that satisfy Farmer John’s observations.\n\nThe time limit\
    \ for solving each test case is four seconds.\n\n## Using Three Nested Loops\n\
    \nWe can use three nested loops to consider all possible triples. We’ll start\
    \ by looking at the code and then discuss its efficiency.\n\n## The Code\n\nIn\
    \ “Nesting” in Chapter 3, we learned that we can loop through all pairs of values\
    \ using two nested loops. Doing so looks like this:\n\n```\n>>> lst = [1, 9]\n\
    >>> for num1 in lst:\n... for num2 in lst:\n...     print(num1, num2)\n...\n1\
    \ 1\n1 9\n9 1\n9 9\n```\n\nWe can similarly loop through all triples of values\
    \ using three nested loops, like this:\n\n```\n>>> for num1 in lst:\n...     for\
    \ num2 in lst:\n...         for num3 in lst:\n...             print(num1, num2,\
    \ num3)\n...\n1 1 1\n1 1 9\n1 9 1\n1 9 9\n9 1 1\n9 1 9\n9 9 1\n9 9 9\n```\n\n\
    Using three nested loops like this gives us a starting point for solving the Cow\
    \ Baseball problem. For each triple, we can check whether it matches Farmer John’s\
    \ observations. See Listing 9-5 for the code.\n\n```\ninput_file = open('baseball.in',\
    \ 'r')\noutput_file = open('baseball.out', 'w')\n\nn = int(input_file.readline())\n\
    \npositions = []\n\nfor i in range(n):\n    positions.append(int(input_file.readline()))\n\
    \ntotal = 0\n\nfor position1 in positions:\n    for position2 in positions:\n\
    \        first_two_diff = position2 - position1\n        if first_two_diff > 0:\n\
    \            low = position2 + first_two_diff\n            high = position2 +\
    \ first_two_diff * 2\n            for position3 in positions:\n              \
    \  if position3 >= low and position3 <= high:\n                    total = total\
    \ + 1\n\noutput_file.write(str(total) + '\\n')\n\ninput_file.close()\noutput_file.close()\n\
    ```\n\nListing 9-5: Using three nested for loops\n\nWe read all of the cow positions\
    \ into the `positions` list. We then loop over all positions in the list using\
    \ a `for` loop. For each of these positions, we loop through all positions in\
    \ the list using a nested `for` loop. At this point, `position1` and `position2`\
    \ refer to two positions from the list. We need a third nested loop, yes, but\
    \ not yet. We first need to calculate the difference between `position1` and `position2`\
    \ because that tells us the range of `position3`s that we’ll be looking for.\n\
    \nWe require from the problem description that `position2` be on the right of\
    \ `position1`. If it is, then we calculate the low end and high end of the range\
    \ for `position3` and store them using `low` and `high`, respectively. For example,\
    \ if `position1` is 1 and `position2` is 6, then we’ll calculate 6 + 5 = 11 for\
    \ `low` and 6 + 5 * 2 = 16 for `high`. Then we loop through the list with a third\
    \ nested `for` loop, looking for positions that are between `low` and `high`.\
    \ For each such `position3`, we increase our total by 1.\n\nFollowing the three\
    \ nested loops, we have calculated the total number of triples. We finish up by\
    \ outputting that number to the output file.\n\nLet’s try our program on a small\
    \ test case to make sure nothing weird is happening. Here it is:\n\n```\n7\n16\n\
    14\n23\n18\n1\n6\n11\n```\n\nThe correct answer for this test case is 11. The\
    \ 11 satisfying triples are as follows:\n\n- 14, 16, 18\n- 14, 18, 23\n- 1, 6,\
    \ 16\n- 1, 6, 14\n- 1, 6, 11\n- 1, 11, 23\n- 6, 14, 23\n- 6, 11, 16\n- 6, 11,\
    \ 18\n- 11, 16, 23\n- 11, 14, 18\n\nGood news: our program outputs 11 for this\
    \ test case! It does so because it eventually finds each satisfying triple. For\
    \ example, at some point, position1 will be 14, position2 will be 16, and position3\
    \ will be 18. That triple satisfies the distance requirements, so our program\
    \ will count it in our total. Don’t be worried about what will happen, later,\
    \ when position1 is 18, position2 is 16, and position3 is 14. We definitely don’t\
    \ want to count that one, because these throws are not going to the right. We’re\
    \ fine, though: the if statement prevents these triples from being processed.\n\
    \nOur program is correct. But as you’ll see if you submit it to the judge, it\
