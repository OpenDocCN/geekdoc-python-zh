    Searching a list is just too slow. The Python list is the wrong type to use. We
    need a type better suited to the job. We need a Python set. You’re not going to
    believe how fast it is to search a set.


    # Sets


    A *set* is a Python type that stores a collection of values, where repeated values
    are not allowed. We use opening and closing curly brackets to delimit the set.

    Unlike a list, a set might not maintain the values in the order you specify. Here’s
    a set of integers:


    ```

    >>> {13, 15, 30, 45, 61}

    {45, 13, 15, 61, 30}

    ```


    Notice that Python jumbled the order of the values. You may see the values in
    a different order on your computer. The important point is that you cannot rely
    on any particular order of the values. If order matters to you, a set is not the
    type to use.

    If we try to include multiple occurrences of a value, only one occurrence is retained:'
