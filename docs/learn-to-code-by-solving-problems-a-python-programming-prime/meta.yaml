- md: "## Building a List of Sizes\n\nAnother way to avoid the code duplication is\
    \ to store each neighborhood size in a list of sizes. Python has a built-in `min`\
    \ function that takes a sequence and returns its minimum:\n\n```\n>>> min('qwerty')\n\
    'e'\n>>> min([15.5, 7.0, 2.5, 7.5])\n2.5\n```\n\n(Python also has a `max` function\
    \ that returns the maximum of a sequence.)\n\nSee Listing 5-3 for a solution that\
    \ uses `min` on a list of neighborhood sizes.\n\n```\nn = int(input())\n\npositions\
    \ = []\n\nfor i in range(n):\n    positions.append(int(input()))\n\npositions.sort()\n\
    \nsizes = []\n\nfor i in range(1, n - 1):\n    left = (positions[i] - positions[i\
    \ - 1]) / 2\n    right = (positions[i + 1] - positions[i]) / 2\n    size = left\
    \ + right\n    sizes.append(size)\n\nmin_size = min(sizes)\nprint(min_size)\n\
    ```\n\nListing 5-3: Solving Village Neighborhood using min\n\nFeel free to submit\
    \ any of these solutions to the judge, whichever you like best!\n\nBefore continuing,\
    \ you might like to try solving exercise 1 from “Chapter Exercises” on page 134.\n\
    \n## Problem #12: School Trip\n\nMany problems you’ll encounter have input with\
    \ multiple integers or floats per line. We’ve avoided these problems until now,\
    \ but they are everywhere! We’ll now learn how we can use lists to process the\
    \ input for these kinds of problems.\n\nThis is DMOJ problem ecoo17r1p1.\n\n###\
    \ The Challenge\n\nStudents would like to go on a school trip at the end of the\
    \ year, but they need money to pay for it. To raise money, they have organized\
    \ a brunch. To attend the brunch, a student in their first year pays $12, a student\
    \ in their second year pays $10, a student in their third year pays $7, and a\
    \ student in their fourth year pays $5.\n\nOf all of the money raised at the brunch,\
    \ 50 percent of it can be used to pay for the school trip (the other 50 percent\
    \ is used to pay for the brunch itself).\n\nWe are told the cost of the school\
    \ trip, the proportion of students in each year, and the total number of students.\
    \ Determine whether the students need to raise more money for the school trip.\n\
    \n### Input\n\nThe input consists of 10 test cases, with three lines per test\
    \ case (30 lines in all). Here are the three lines for each test case:\n\n- The\
    \ first line contains the cost in dollars of the school trip; it’s an integer\
    \ between 50 and 50,000.\n- The second line contains four numbers indicating the\
    \ proportion of brunching students who are in first, second, third, and fourth\
    \ year, respectively. There is a space between each pair of numbers. Each number\
    \ is between 0 and 1, and their sum is 1 (for 100 percent).\n- The third line\
    \ contains integer $n$, the number of students attending the brunch. $n$ is between\
    \ 4 and 2,000.\n\n### Output\n\nFor each test case: if the students need to raise\
    \ more money for the school trip, output YES; otherwise, output NO.\n\n### A Catch\n\
    \nSuppose that there are 50 students and that 10 percent of them (a proportion\
    \ of 0.1) are in their fourth year. Then we can calculate that 50 * 0.1 = 5 students\
    \ are in their fourth year.\n\nNow suppose that there are 50 students, but that\
    \ 15 percent of them (a proportion of 0.15) are in their fourth year. If we multiply,\
    \ we get 50 * 0.15 = 7.5 students in their fourth year.\n\nHaving 7.5 students\
    \ doesn’t make any sense, and I haven’t told you what we should do in such a case.\
    \ The full problem description specifies that we are to round down—so we’d round\
    \ down to 7 here. This could result in the sum of the students in first year,\
    \ second year, third year, and fourth year not equaling the total number of students.\
    \ For the students who are not accounted for, we are to add them to the year with\
    \ the most students. It’s guaranteed that exactly one year will have the most\
    \ students (there won’t be a tie between multiple years).\n\nWe’ll first solve\
    \ the problem ignoring this catch. Then we’ll incorporate the catch to give us\
    \ a full solution.\n\n## Splitting Strings and Joining Lists\n\nThe second line\
    \ of each test case consists of four proportions, like this:\n\n```\n0.2 0.08\
    \ 0.4 0.32\n```\n\nWe need a way to extract those four numbers from a string for\
    \ further processing. We’ll learn about the string split method for splitting\
    \ a string into a list of its pieces. While we’re at it, we’ll also learn about\
    \ the string join method, which lets us go the other way and collapse a list into\
    \ a single string.\n\n### Splitting a String into a List\n\nRemember that the\
    \ input function returns a string, no matter what the input looks like. If the\
    \ input should be interpreted as an integer, we need to convert the string to\
    \ an integer. If the input should be interpreted as a float, we need to convert\
    \ the string to a float. And if the input should be interpreted as four floats?\
    \ Well, then we had better split it up into individual floats before converting\
    \ anything!\n\nThe string split method splits a string into a list of its pieces.\
    \ By default, split splits around spaces, which is exactly what we need for our\
    \ four floats:\n\n```\n>>> s = '0.2 0.08 0.4 0.32'\n>>> s.split()\n['0.2', '0.08',\
    \ '0.4', '0.32']\n```\n\nThe split method returns a list of strings, at which\
    \ point we can access each one independently. Here, I save the list that split\
    \ returns and then access two of its values:\n\n```\n>>> proportions = s.split()\n\
    >>> proportions\n['0.2', '0.08', '0.4', '0.32']\n>>> proportions[1]\n'0.08'\n\
    >>> proportions[2]\n'0.4'\n```\n\nData in the wild is often comma-separated rather\
    \ than space-separated. Piece of cake: we can call split with an argument that\
    \ tells it what to use as a separator:\n\n```\n>>> info = 'Toronto,Ontario,Canada'\n\
    >>> info.split(',')\n['Toronto', 'Ontario', 'Canada']\n```\n\n### Joining a List\
    \ into a String\n\nTo go the other way, from a list to a string rather than a\
    \ string to a list, we can use the string join method. The string on which join\
    \ is called is used as the separator between list values. Here are two examples:\n\
    \n```\n>>> lst = ['Toronto', 'Ontario', 'Canada']\n>>> ','.join(lst)\n'Toronto,Ontario,Canada'\n\
    >>> '**'.join(lst)\n'Toronto**Ontario**Canada'\n```\n\nTechnically, join can join\
    \ the values in any sequence, not just in a list. Here’s an example of joining\
    \ the characters from a string:\n\n```\n>>> '*'.join('abcd')\n'a*b*c*d'\n```\n\
    \n## Changing List Values\n\nWhen we use split on a string of four pieces, we\
    \ get a list of strings:\n\n```\n>>> s = '0.2 0.08 0.4 0.32'\n>>> proportions\
    \ = s.split()\n>>> proportions\n['0.2', '0.08', '0.4', '0.32']\n```\n\nIn “Converting\
    \ Between Strings and Integers” in Chapter 1, we learned that strings that look\
    \ like numbers can’t be used in numerical calculations. So, we need to convert\
    \ this list of strings to a list of floats.\n\nWe can convert a string to a float\
    \ using float, like this:\n\n```\n>>> float('45.6')\n45.6\n```\n\nThat’s just\
    \ one float. How can we convert a whole list of strings to a list of floats? It’s\
    \ awfully tempting to try to make that happen using the following loop:\n\n```\n\
    >>> for value in proportions:\n...     value = float(value)\n```\n\nThe logic\
    \ is that this should go through each value in the list and convert it to a float.\n\
    \nSadly, it doesn’t work. The list still refers to strings:\n\n```\n>>> proportions\n\
    ['0.2', '0.08', '0.4', '0.32']\n```\n\nWhat could be wrong? Is float not working?\
    \ We can see that float is doing just fine by looking at the type of value after\
    \ conversion:\n\n```\n>>> for value in proportions:\n...     value = float(value)\n\
    ...     type(value)\n...\n<class 'float'>\n<class 'float'>\n<class 'float'>\n\
    <class 'float'>\n```\n\nFour floats! But the list obdurately remains one of strings.\n\
    \nWhat’s happening here is that we’re not changing the values referred to in the\
    \ list. We’re changing what the variable value refers to, but that doesn’t change\
    \ the fact that the list refers to the old string values. To actually change the\
    \ values that the list references, we need to assign new values at the list’s\
    \ indices. Here’s how to do it:\n\n```\n>>> proportions\n['0.2', '0.08', '0.4',\
    \ '0.32']\n>>> for i in range(len(proportions)):\n...     proportions[i] = float(proportions[i])\n\
    ...\n>>> proportions\n[0.2, 0.08, 0.4, 0.32]\n```\n\nThe range for loop loops\
    \ through each index, and an assignment statement changes what’s referred to by\
    \ that index.\n\n## Solving Most of the Problem\n\nWe’re now in good shape to\
    \ solve the problem minus the catch.\n\nWe’ll start with an example to highlight\
    \ what our code will have to do. Then we’ll move onto the code itself.\n\n###\
    \ Exploring a Test Case\n\nThe input for this problem consists of 10 test cases,\
    \ but I’ll present only one here. If you type this test case from the keyboard,\
    \ you’ll see the answer. But the program won’t terminate there, because it’s waiting\
    \ for the next test case. If you use input redirection with this test case, you’ll\
    \ again see the answer. But then you’ll get an EOFError. EOF stands for “end of\
    \ file”; the error is caused by the program trying to read more input than is\
    \ available. Once your code is working for one test case, you"
  mdcn: "## 构建尺寸列表\n\n避免代码重复的另一种方法是将每个邻域尺寸存储在一个尺寸列表中。Python 有一个内置的 `min` 函数，它接受一个序列并返回其最小值：\n\
    \n```\n>>> min('qwerty')\n'e'\n>>> min([15.5, 7.0, 2.5, 7.5])\n2.5\n```\n\n（Python\
    \ 还有一个 `max` 函数，它返回序列的最大值。）\n\n参见清单 5-3，这是一个使用 `min` 处理邻域尺寸列表的解决方案。\n\n```\nn\
    \ = int(input())\n\npositions = []\n\nfor i in range(n):\n    positions.append(int(input()))\n\
    \npositions.sort()\n\nsizes = []\n\nfor i in range(1, n - 1):\n    left = (positions[i]\
    \ - positions[i - 1]) / 2\n    right = (positions[i + 1] - positions[i]) / 2\n\
    \    size = left + right\n    sizes.append(size)\n\nmin_size = min(sizes)\nprint(min_size)\n\
    ```\n\n清单 5-3：使用 min 解决村庄邻域问题\n\n请随意将这些解决方案中的任何一个提交给评测系统，选择你最喜欢的一个！\n\n在继续之前，你可能想尝试解决第\
    \ 134 页“章节练习”中的练习 1。\n\n## 问题 #12：学校旅行\n\n你遇到的许多问题，其输入每行包含多个整数或浮点数。我们之前避免了这些问题，但它们无处不在！现在我们将学习如何使用列表来处理这类问题的输入。\n\
    \n这是 DMOJ 问题 ecoo17r1p1。\n\n### 挑战\n\n学生们想在学年末去学校旅行，但他们需要钱来支付费用。为了筹款，他们组织了一次早午餐。参加早午餐，一年级学生支付\
    \ 12 美元，二年级学生支付 10 美元，三年级学生支付 7 美元，四年级学生支付 5 美元。\n\n在早午餐筹集的所有资金中，50% 可用于支付学校旅行费用（另外\
    \ 50% 用于支付早午餐本身）。\n\n我们被告知了学校旅行的费用、每个年级学生的比例以及学生总数。请确定学生们是否需要为学校旅行筹集更多资金。\n\n\
    ### 输入\n\n输入包含 10 个测试用例，每个测试用例三行（总共 30 行）。以下是每个测试用例的三行内容：\n\n- 第一行包含学校旅行的费用（以美元计）；它是一个介于\
    \ 50 到 50,000 之间的整数。\n- 第二行包含四个数字，分别表示参加早午餐的一年级、二年级、三年级和四年级学生的比例。每对数字之间有一个空格。每个数字介于\
    \ 0 和 1 之间，它们的总和为 1（即 100%）。\n- 第三行包含整数 $n$，即参加早午餐的学生人数。$n$ 介于 4 到 2,000 之间。\n\
    \n### 输出\n\n对于每个测试用例：如果学生需要为学校旅行筹集更多资金，输出 YES；否则，输出 NO。\n\n### 一个陷阱\n\n假设有 50\
    \ 名学生，其中 10%（比例为 0.1）是四年级学生。那么我们可以计算出 50 * 0.1 = 5 名学生是四年级学生。\n\n现在假设有 50 名学生，但其中\
    \ 15%（比例为 0.15）是四年级学生。如果我们相乘，得到 50 * 0.15 = 7.5 名四年级学生。\n\n有 7.5 名学生没有任何意义，我还没有告诉你在这种情况下我们应该怎么做。完整的问题描述规定我们要向下取整——所以这里我们向下取整到\
    \ 7。这可能导致一年级、二年级、三年级和四年级的学生总数不等于学生总数。对于未计入的学生，我们将他们添加到学生人数最多的年级。可以保证恰好有一个年级的学生人数最多（不会出现多个年级并列的情况）。\n\
    \n我们将首先忽略这个陷阱来解决问题。然后我们将结合这个陷阱给出完整的解决方案。\n\n## 分割字符串和连接列表\n\n每个测试用例的第二行由四个比例组成，像这样：\n\
    \n```\n0.2 0.08 0.4 0.32\n```\n\n我们需要一种方法从字符串中提取这四个数字以进行进一步处理。我们将学习字符串的 split\
    \ 方法，用于将字符串分割成其片段的列表。同时，我们还将学习字符串的 join 方法，它让我们可以反向操作，将列表合并成一个字符串。\n\n### 将字符串分割成列表\n\
    \n请记住，无论输入看起来如何，input 函数都返回一个字符串。如果输入应被解释为整数，我们需要将字符串转换为整数。如果输入应被解释为浮点数，我们需要将字符串转换为浮点数。那么，如果输入应被解释为四个浮点数呢？嗯，那么我们最好在转换任何内容之前将其分割成单个浮点数！\n\
    \n字符串的 split 方法将字符串分割成其片段的列表。默认情况下，split 按空格分割，这正是我们处理四个浮点数所需要的：\n\n```\n>>> s\
    \ = '0.2 0.08 0.4 0.32'\n>>> s.split()\n['0.2', '0.08', '0.4', '0.32']\n```\n\n\
    split 方法返回一个字符串列表，此时我们可以独立访问每个字符串。这里，我保存 split 返回的列表，然后访问其中的两个值：\n\n```\n>>> proportions\
    \ = s.split()\n>>> proportions\n['0.2', '0.08', '0.4', '0.32']\n>>> proportions[1]\n\
    '0.08'\n>>> proportions[2]\n'0.4'\n```\n\n现实世界中的数据通常是逗号分隔而不是空格分隔。小菜一碟：我们可以调用 split\
    \ 并传递一个参数来告诉它使用什么作为分隔符：\n\n```\n>>> info = 'Toronto,Ontario,Canada'\n>>> info.split(',')\n\
    ['Toronto', 'Ontario', 'Canada']\n```\n\n### 将列表连接成字符串\n\n要反向操作，从列表到字符串而不是从字符串到列表，我们可以使用字符串的\
    \ join 方法。调用 join 的字符串被用作列表值之间的分隔符。以下是两个例子：\n\n```\n>>> lst = ['Toronto', 'Ontario',\
    \ 'Canada']\n>>> ','.join(lst)\n'Toronto,Ontario,Canada'\n>>> '**'.join(lst)\n\
    'Toronto**Ontario**Canada'\n```\n\n从技术上讲，join 可以连接任何序列中的值，而不仅仅是列表。这是一个连接字符串中字符的例子：\n\
    \n```\n>>> '*'.join('abcd')\n'a*b*c*d'\n```\n\n## 更改列表值\n\n当我们对一个包含四个片段的字符串使用\
    \ split 时，我们得到一个字符串列表：\n\n```\n>>> s = '0.2 0.08 0.4 0.32'\n>>> proportions =\
    \ s.split()\n>>> proportions\n['0.2', '0.08', '0.4', '0.32']\n```\n\n在第 1 章的“在字符串和整数之间转换”中，我们了解到看起来像数字的字符串不能用于数值计算。因此，我们需要将这个字符串列表转换为浮点数列表。\n\
