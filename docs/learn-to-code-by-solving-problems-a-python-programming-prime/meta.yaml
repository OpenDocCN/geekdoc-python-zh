    \n```python\n>>> {1, 1, 3, 2, 3, 1, 3, 3, 3}\n{1, 2, 3}\n```\n\n如果两个集合包含完全相同的值，即使我们以不同的顺序书写它们，它们也是相等的：\n\
    \n```python\n>>> {1, 2, 3} == {1, 2, 3}\nTrue\n>>> {1, 1, 3, 2, 3, 1, 3, 3, 3}\
    \ == {1, 2, 3}\nTrue\n>>> {1, 2} == {1, 2, 3}\nFalse\n```\n\n我们可以创建一个字符串集合，像这样：\n\
    \n```python\n>>> {'abc@d.e.f', 'danielzingaro@gmail.com'}\n{'abc@d.e.f', 'danielzingaro@gmail.com'}\n\
    ```\n\n我们不能创建一个列表集合：\n\n```python\n>>> {[1, 2], [3, 4]}\nTraceback (most recent\
