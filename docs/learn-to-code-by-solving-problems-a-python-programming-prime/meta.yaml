  md: '# List Methods


    Time to make progress on Village Neighborhood. I can think of two operations on
    a list that would help us solve it.


    First, adding to a list. We’ll start off with no village positions and read them
    one at a time from the input. We therefore need a way to add each of these positions
    to a growing list: first the list will have nothing, and then it will have one
    village position in it, then two, and so on.


    Second, sorting a list. Once we’ve read in the village positions, we need to find
    the smallest neighborhood. This involves looking at each village position and
    the distance to its left and right neighbors. The village positions could come
    in any order, so in general it’s not easy to find the neighbors of a given village.
    Think back to the work we did in “Why Lists?” in this chapter. For each village,
    we had to scan the entire list to find its neighbors. It’d be so much easier if
    we had the villages ordered by position. Then we’d know exactly where the neighbors
    were: they’d be just to the left and just to the right of a village.


    For example, here are our sample villages in the order that we read them:


    ```

    20 50 4 19 15 1

    ```


    That’s a mess! On a real street, they’d come in order of position, like this:


    ```

    1 4 15 19 20 50

    ```


    Want the neighbors of the village at position 4? Just look immediately to the
    left and immediately to the right: 1 and 15. The neighbors of the village at 15?
    Boom, they’re right there—4 and 19. No more searching all over the place. We’ll
    sort the list of village positions to simplify our code.


    We can add to a list using the `append` method and sort a list using the `sort`
    method. We’ll learn these two methods, and a few others that you’ll likely find
    useful as you continue working with lists, and then we’ll come back to solve Village
    Neighborhood.'
