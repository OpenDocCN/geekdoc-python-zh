    \ the playlist. For example, if the playlist is currently A, B, C, D, E, then\
    \ it changes to E, A, B, C, D.\n- Button 3: Swaps the first two songs of the playlist.\
    \ For example, if the playlist is currently A, B, C, D, E, then it changes to\
    \ be B, A, C, D, E.\n- Button 4: Plays the playlist!\n\nWe’re provided a user’s\
    \ button presses. When the user presses button 4, output the order of songs in\
