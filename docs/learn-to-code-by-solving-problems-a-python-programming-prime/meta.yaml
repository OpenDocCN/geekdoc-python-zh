    \ num 引用 3，一次当 num 引用 4。当 num 引用 5 时，`num < 5` 布尔表达式最终为 `False`，这终止了循环。\n\n重要的是我们要记住增加\
    \ `num` ❸。`for` 循环会自动让我们的循环变量遍历适当的值。但是，同样，在 `while` 循环中我们得不到任何免费的东西，必须自己更新变量以使我们越来越接近循环终止。如果我们忘记增加\
    \ `num`，就会发生这种情况：\n\n```\n>>> num = 0\n>>> while num < 5:\n...     print(num)\n\
    ...\n0\n0\n0\n0\n0\n0\n0\n0\n... forever\n```\n\n如果你在你的计算机上运行这段代码，你的屏幕将充满零，你将不得不终止你的程序。你可以通过按\
