    >>> 'ababa'.count('aba')\n1\n```\n\nUnlike the other methods I’ve described, `count`\
    \ is directly useful to our Word Count problem.\nThink of a string like 'this\
    \ is a string with a few words'. Notice that a space comes after each word. In\
