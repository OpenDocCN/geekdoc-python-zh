    \n如果一个算法读取 *n* 个值，并在固定数量的步骤内处理每个值，那么它就是一个线性时间算法。\n\n我们不需要走远就能看到另一个线性时间算法——我们在第\
    \ 3 章中对“占用空间”问题的解决方案就是另一个这样的例子。我在这里复制了我们来自清单 3-3 的解决方案：\n\n```\nn = int(input())\n\
    yesterday = input()\ntoday = input()\n\noccupied = 0\n\nfor i in range(len(yesterday)):\n\
    \    if yesterday[i] == 'C' and today[i] == 'C':\n        occupied = occupied\
    \ + 1\n\nprint(occupied)\n```\n\n我们让 *n* 表示停车位的数量。模式与“三个杯子”问题相同：我们读取输入，然后对每个停车位执行固定数量的步骤。\n\
    \n## 概念检查\n\n在清单 1-1 中，我们解决了“单词计数”问题。这是该解决方案的代码。\n\n---\n\nline = input()\ntotal_words\
    \ = line.count(' ') + 1\n\n```\nprint(total_words)\n```\n\n我们算法的大 O 效率是多少？\n\n\
    +   A. $O(1)$\nB. $O(n)$\n\n答案：B。很容易认为这个算法是 $O(1)$。毕竟，代码中没有任何循环，而且看起来算法只执行三个步骤：读取输入、调用\
    \ `count` 来计算单词数量，以及输出单词数量。\n\n但这个算法是 $O(n)$，其中 $n$ 是输入中的字符数。`input` 函数读取输入需要线性时间，因为它必须逐个字符地读取输入。使用\
    \ `count` 方法也需要线性时间，因为它必须处理字符串的每个字符以查找匹配项。因此，这个算法执行线性量的工作来读取输入，并执行线性量的工作来计算单词。总体上，这是一个线性量的工作。\n\
    \n## 概念检查\n\n在清单 1-2 中，我们解决了“圆锥体积”问题。我在这里复制了该解决方案：\n\n```\nPI = 3.141592653589793\n\
    \nradius = int(input())\nheight = int(input())\n\nvolume = (PI * radius ** 2 *\
    \ height) / 3\n\nprint(volume)\n```\n\n我们算法的大 O 效率是多少？（回想一下，半径和高度的最大值是 100。）\n\
    \n+   A. $O(1)$\nB. $O(n)$\n\n答案：A。我们这里处理的是小数字，因此从输入读取它们需要常数时间。计算体积也需要常数时间：它只是一些数学运算。因此，我们在这里所做的只是几个常数时间的步骤。总体上，这是一个常数量的工作。\n\
    \n## 概念检查\n\n在清单 3-4 中，我们解决了“数据套餐”问题。我在这里复制了该解决方案：\n\n```\nmonthly_mb = int(input())\n\
    n = int(input())\n\nexcess = 0\n\nfor i in range(n):\n    used = int(input())\n\
    \    excess = excess + monthly_mb - used\n\nprint(excess + monthly_mb)\n```\n\n\
    我们算法的大 O 效率是多少？\n\n+   A. $O(1)$\nB. $O(n)$\n\n> 答案：B。这个算法的模式与我们对“三个杯子”或“占用空间”问题的解决方案类似，只是它将读取输入与处理输入交织在一起。我们让\
    \ *n* 表示每月兆字节数值的数量。程序对这 *n* 个输入值中的每一个都执行固定数量的步骤。因此，这是一个 *O(n)* 算法。\n\n## 二次时间\n\
    \n到目前为止，我们已经讨论了常数时间算法（那些不随输入量增加而做更多工作的算法）和线性时间算法（那些随输入量增加而线性地做更多工作的算法）。与线性时间算法类似，*二次时间*算法也会随输入量增加而做更多工作；例如，处理\
    \ 1,000 个值比处理 10 个值需要做更多工作。虽然我们可以对相对大量的输入使用线性时间算法，但对于二次时间算法，我们将被限制在更小的输入量上。我们接下来将看到原因。\n\
    \n## 典型形式\n\n典型的线性时间算法看起来像这样：\n\n```\nfor i in range(n):\n    <以固定数量的步骤处理输入 i>\n\
    ```\n\n相比之下，典型的二次时间算法看起来像这样：\n\n```\nfor i in range(n):\n    for j in range(n):\n\
    \        <以固定数量的步骤处理输入 i 和 j>\n```\n\n对于 *n* 个值的输入，每个算法处理多少个值？线性时间算法处理 *n* 个值，每次\
    \ `for` 循环迭代处理一个。相比之下，二次时间算法在外层 `for` 循环的*每次迭代*中处理 *n* 个值。\n\n在外层 `for` 循环的第一次迭代中，处理\
    \ *n* 个值（内层 `for` 循环每次迭代处理一个）；在外层 `for` 循环的第二次迭代中，再处理 *n* 个值（内层 `for` 循环每次迭代处理一个）；以此类推。由于外层\
    \ `for` 循环迭代 *n* 次，因此处理的总值数为 $n * n$，即 $n^2$。两个嵌套循环，每个都依赖于 $n$，就产生了一个二次时间算法。用大\
    \ O 表示法，我们说二次时间算法是 $O(n^2)$。\n\n让我们比较一下线性时间算法和二次时间算法所做的工作量。假设我们正在处理一个包含 1,000\
    \ 个值的输入，这意味着 $n$ 是 1,000。一个需要 $n$ 步的线性时间算法将需要 1,000 步。一个需要 $n^2$ 步的二次时间算法将需要 $1,000^2\
    \ = 1,000,000$ 步。一百万远大于一千。但谁在乎呢：计算机真的、真的很快，对吧？嗯，是的，对于 1,000 个值的输入，如果我们使用二次时间算法，我们可能没问题。在第\
    \ 253 页的“我们程序的效率”中，我给出了一个保守的规则，声称我们每秒可以执行大约五百万步。那么，一百万步应该可以在除最严格的时间限制之外的所有情况下完成。\n\
    \n但对二次时间算法的任何乐观都是短暂的。看看如果我们把输入值的数量从 1,000 增加到 10,000 会发生什么。线性时间算法只需要 10,000 步。二次时间算法需要\
    \ $10,000^2 = 100,000,000$ 步。嗯……如果我们使用二次时间算法，现在我们的计算机看起来就不那么快了。虽然线性时间算法仍然在毫秒内运行，但二次时间算法至少需要几秒钟。毫无疑问，这里会超时。\n\
    \n## 概念检查\n\n以下算法的大 O 效率是多少？\n\n```\nfor i in range(10):\n    for j in range(n):\n\
    \        <以固定数量的步骤处理输入 i 和 j>\n```\n\n+   A. $O(1)$\nB. $O(n)$\nC. $O(n^2)$"
