    # Inverting a Dictionary


    We’re close to being able to solve Common Words using dictionaries. Here’s the
    plan. We maintain a dictionary that maps from words to their number of occurrences.
    Whenever we process a word, we check whether that word is already in the dictionary.
    If it isn’t, then we add it with a value of 1. If it is, then we increase its
    value by 1.


    Here’s an example of adding two words, one that we have seen before and one that
    we haven’t:


    ```

    >>> d = {''storm'': 1, ''cut'': 1, ''magma'': 1}

    >>> word = ''cut'' # ''cut'' is already in the dictionary

    >>> if not word in d:

    ...     d[word] = 1

    ... else:

    ...     d[word] = d[word] + 1

    ...

    >>> d

    {''storm'': 1, ''cut'': 2, ''magma'': 1}

    >>> word = ''brook'' # ''brook'' is not in the dictionary

    >>> if not word in d:

    ...     d[word] = 1

    ... else:

    ...     d[word] = d[word] + 1

    ...

    >>> d

    {''storm'': 1, ''cut'': 2, ''magma'': 1, ''brook'': 1}

    ```


