- md: "## Dictionaries\n\nA *dictionary* is a Python type that stores a mapping from\
    \ one group of elements, called *keys*, to another group of elements, called *values*.\n\
    We use opening and closing curly brackets to delimit the dictionary. Those are\
    \ the same symbols that we use for a set, but Python can tell the difference between\
    \ a set and a dictionary because of what we put inside the curly brackets. For\
    \ a set, we list values; for a dictionary, we list key:value pairs.\nHere’s a\
    \ dictionary mapping some strings to numbers:\n\n```\n>>> {'cut':4, 'gully':3}\n\
    {'cut': 4, 'gully': 3}\n```\n\nIn this dictionary, the keys are 'cut' and 'gully',\
    \ and the values are 4 and 3. The key 'cut' is mapped to the value 4, and the\
    \ key 'gully' is mapped to the value 3.\nBased on our encounters with sets, you\
    \ might wonder whether dictionaries maintain the pairs in the order we enter them.\
    \ For example, you might wonder whether this could happen:\n\n```\n>>> {'cut':4,\
    \ 'gully':3}\n{'gully': 3, 'cut': 4}\n```\n\nAs of Python 3.7, the answer is no:\
    \ dictionaries retain the order in which you added pairs. In earlier versions\
    \ of Python, dictionaries did not maintain this order, so you could add pairs\
    \ in one order but get them back in another. It’s still a good idea to write code\
    \ that doesn’t rely on the Python 3.7 behavior, though, because older versions\
    \ of Python are likely to be in use for the foreseeable future.\nDictionaries\
    \ are equal if they contain the same key:value pairs, even if we write them in\
    \ different orders:\n\n```\n>>> {'cut':4, 'gully':3} == {'cut':4, 'gully':3}\n\
    True\n>>> {'cut':4, 'gully':3} == {'gully': 3, 'cut': 4}\nTrue\n>>> {'cut':4,\
    \ 'gully':3} == {'gully': 3, 'cut': 10}\nFalse\n>>> {'cut':4, 'gully':3} == {'cut':\
    \ 4}\nFalse\n```\n\nDictionary keys must be unique. If you try to include the\
    \ same key multiple times, only one pair involving that key is retained:\n\n```\n\
    >>> {'storm': 1, 'storm': 2}\n{'storm': 2}\n```\n\nRepeated values, by contrast,\
    \ are fine:\n\n```\n>>> {'storm': 2, 'brook': 2}\n{'storm': 2, 'brook': 2}\n```\n\
    \nKeys are required to be immutable values, such as numbers and strings. Values\
    \ can be immutable or mutable. This means that we can’t use a list as a key, but\
    \ we can use a list as a value:\n\n```\n>>> {['storm', 'brook']: 2}\nTraceback\
    \ (most recent call last):\n  File \"<stdin>\", line 1, in <module>\nTypeError:\
    \ unhashable type: 'list'\n>>> {2: ['storm', 'brook']}\n{2: ['storm', 'brook']}\n\
    ```\n\nThe len function gives us the number of key:value pairs in a dictionary:\n\
    \n```\n>>> len({'cut':4, 'gully':3})\n2\n>>> len({2: ['storm', 'brook']})\n1\n\
    ```\n\nTo create an empty dictionary, we use {}. That’s why we’re stuck with that\
    \ second-rate set() syntax to create a set—dictionaries got the nice syntax:\n\
    \n```\n>>> {}\n{}\n>>> type({})\n<class 'dict'>\n```\n\nThe type is called dict,\
    \ not dictionary.\nYou’ll see “dictionary” and “dict” used interchangeably in\
    \ Python resources and code, but I’ll stick with “dictionary” in this book.\n\n\
    ## CONCEPT CHECK\n\nWhich of the following is best suited for a dictionary rather\
    \ than a list or set?\n\n- A. The order in which people finish a race\n- B. The\
    \ ingredients necessary for a recipe\n- C. The names of countries and their capital\
    \ cities\n- D. 50 random integers\n\nAnswer: C. This is the only option that includes\
    \ a mapping between keys and values. Here, the keys could be the countries, and\
    \ the values could be their capital cities.\n\n## CONCEPT CHECK\n\nWhat is the\
    \ type of the values (ignoring the keys) in the following dictionary?\n\n```\n\
    {'MLB': {'Bluejays': [1992, 1993],\n         'Orioles': [1966, 1970, 1983]},\n\
    \ 'NFL': {'Patriots': ['too many']}}\n```\n\n- A. Integer\n- B. String\n- C. List\n\
    - D. Dictionary\n- E. More than one of the above\n\nAnswer: D. The value for each\
    \ key in the dictionary is itself a dictionary. For example, the key 'MLB' is\
    \ mapped to a dictionary; that dictionary has two key:value pairs of its own.\n\
    \n## Indexing Dictionaries\n\nWe can use square brackets to look up the value\
    \ that a key maps to. It’s similar to how we index a list, but with the keys serving\
    \ as the valid “indices”:\n\n```\n>>> d = {'cut':4, 'gully':3}\n>>> d\n{'cut':\
    \ 4, 'gully': 3}\n>>> d['cut']\n4\n>>> d['gully']\n3\n```\n\nIt’s an error to\
    \ use a key that doesn’t exist:\n\n```\n>>> d['storm']\nTraceback (most recent\
    \ call last):\n  File \"<stdin>\", line 1, in <module>\nKeyError: 'storm'\n```\n\
    \nWe can protect against that error by first using in to check whether a key is\
    \ in the dictionary. When used on a dictionary, the in operator checks only the\
    \ keys, not the values. Here’s how we can check that a key exists before trying\
    \ to find its value:\n\n```\n>>> if 'cut' in d:\n...     print(d['cut'])\n...\n\
    4\n>>> if 'storm' in d:\n...     print(d['storm'])\n...\n```\n\nIndexing and using\
    \ in on a dictionary are extremely fast operations. They don’t require searching\
    \ any kind of list, no matter how many keys are in the dictionary.\n\nIt’s sometimes\
    \ more convenient to use the get method rather than indexing to look up the value\
    \ for a key. The get method never produces an error, even if the key doesn’t exist:\n\
    \n```\n>>> print(d.get('cut'))\n4\n>>> print(d.get('storm'))\nNone\n```\n\nIf\
    \ the key exists, get returns its value. Otherwise, it returns None to signify\
    \ that the key does not exist.\nIn addition to looking up the value for a key,\
    \ we can use square brackets to add keys to a dictionary or change the value that\
    \ a key maps to. Here’s some code that shows how to do each of these, starting\
    \ with an empty dictionary:\n\n```\n>>> d = {}\n>>> d['gully'] = 1\n>>> d\n{'gully':\
    \ 1}\n>>> d['cut'] = 1\n>>> d\n{'gully': 1, 'cut': 1}\n>>> d['cut'] = 4\n>>> d\n\
    {'gully': 1, 'cut': 4}\n>>> d['gully'] = d['gully'] + 1\n>>> d\n{'gully': 2, 'cut':\
    \ 4}\n>>> d['gully'] = d['gully'] + 1\n>>> d\n{'gully': 3, 'cut': 4}\n```\n\n\
    ## CONCEPT CHECK\n\nUse help({}.get) to learn more about the dictionary get method.\n\
    What is the output of the following code?\n\n```\nd = {3: 4}\nd[5] = d.get(4,\
    \ 8)\nd[4] = d.get(3, 9)\nprint(d)\n```\n\n- A. {3: 4, 5: 8, 4: 9}\n- B. {3: 4,\
    \ 5: 8, 4: 4}\n- C. {3: 4, 5: 4, 4: 3}\n- D. Error caused by get\n\nAnswer: B.\
    \ The first call of `get` returns 8, because key 4 does not exist in the dictionary.\
    \ That line therefore adds key 5 with value 8.\n\nThe second call of `get` returns\
    \ 4: key 3 is in the dictionary already, so the second parameter, 9, is ignored.\
    \ That line therefore adds key 4 with value 4.\n\n## Looping Through Dictionaries\n\
    \nIf we use a for loop on a dictionary, we get the dictionary’s keys:\n\n```\n\
    >>> d = {'cut': 4, 'gully': 3, 'storm': 2, 'brook': 2}\n>>> for word in d:\n...\
    \     print('a key is', word)\n...\na key is cut\na key is gully\na key is storm\n\
    a key is brook\n```\n\nWe might also want to access the value associated with\
    \ each key, and we can do that by using each key as an index in the dictionary.\
    \ Here’s a loop that accesses both the key and its value:\n\n```\n>>> for word\
    \ in d:\n...     print('key', word, 'has value', d[word])\n...\nkey cut has value\
    \ 4\nkey gully has value 3\nkey storm has value 2\nkey brook has value 2\n```\n\
    \nDictionaries have methods that let us access the keys, values, or both.\nThe\
    \ `keys` method gives us the keys, and the `values` method gives us the values:\n\
    \n```\n>>> d.keys()\ndict_keys(['cut', 'gully', 'storm', 'brook'])\n>>> d.values()\n\
    dict_values([4, 3, 2, 2])\n```\n\nThese aren’t lists, but we can pass them to\
    \ `list` to convert them:\n\n```\n>>> keys = list(d.keys())\n>>> keys\n['cut',\
    \ 'gully', 'storm', 'brook']\n>>> values = list(d.values())\n>>> values\n[4, 3,\
    \ 2, 2]\n```\n\nWith the keys available as a list, we can sort the keys and then\
    \ loop through them in sorted order:\n\n```\n>>> keys.sort()\n>>> keys\n['brook',\
    \ 'cut', 'gully', 'storm']\n>>> for word in keys:\n...     print('key', word,\
    \ 'has value', d[word])\n...\nkey brook has value 2\nkey cut has value 4\nkey\
    \ gully has value 3\nkey storm has value 2\n```\n\nWe can also loop through the\
    \ values:\n\n```\n>>> for num in d.values():\n...     print('number', num)\n...\n\
    number 4\nnumber 3\nnumber 2\nnumber 2\n```\n\nLooping through keys is often preferred\
    \ over looping through values. It’s easy to go from a key to its value. As we’ll\
    \ see in the next subsection, though, it’s not as easy to go from a value back\
    \ to its key."
  mdcn: "## 字典\n\n*字典*是一种 Python 类型，用于存储从一组元素（称为*键*）到另一组元素（称为*值*）的映射。\n我们使用花括号来界定字典。这与集合使用的符号相同，但\
    \ Python 可以根据花括号内的内容区分集合和字典。对于集合，我们列出值；对于字典，我们列出键值对。\n这是一个将一些字符串映射到数字的字典：\n\n\
    ```\n>>> {'cut':4, 'gully':3}\n{'cut': 4, 'gully': 3}\n```\n\n在这个字典中，键是 'cut'\
    \ 和 'gully'，值是 4 和 3。键 'cut' 映射到值 4，键 'gully' 映射到值 3。\n根据我们对集合的了解，你可能会想知道字典是否保持我们输入键值对的顺序。例如，你可能会想是否会发生这种情况：\n\
    \n```\n>>> {'cut':4, 'gully':3}\n{'gully': 3, 'cut': 4}\n```\n\n从 Python 3.7 开始，答案是否定的：字典会保留你添加键值对的顺序。在早期版本的\
    \ Python 中，字典不保持这种顺序，因此你可能以一种顺序添加键值对，但以另一种顺序获取它们。不过，编写不依赖于 Python 3.7 行为的代码仍然是一个好主意，因为在可预见的未来，旧版本的\
    \ Python 可能仍在使用。\n如果字典包含相同的键值对，即使我们以不同的顺序书写它们，它们也是相等的：\n\n```\n>>> {'cut':4, 'gully':3}\
    \ == {'cut':4, 'gully':3}\nTrue\n>>> {'cut':4, 'gully':3} == {'gully': 3, 'cut':\
    \ 4}\nTrue\n>>> {'cut':4, 'gully':3} == {'gully': 3, 'cut': 10}\nFalse\n>>> {'cut':4,\
    \ 'gully':3} == {'cut': 4}\nFalse\n```\n\n字典的键必须是唯一的。如果你尝试多次包含相同的键，只有涉及该键的一个键值对会被保留：\n\
    \n```\n>>> {'storm': 1, 'storm': 2}\n{'storm': 2}\n```\n\n相比之下，重复的值是可以的：\n\n```\n\
    >>> {'storm': 2, 'brook': 2}\n{'storm': 2, 'brook': 2}\n```\n\n键必须是不可变的值，例如数字和字符串。值可以是不可变的或可变的。这意味着我们不能使用列表作为键，但可以使用列表作为值：\n\
