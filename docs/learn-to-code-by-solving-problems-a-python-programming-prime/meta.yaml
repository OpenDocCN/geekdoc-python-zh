    Python 程序员使用 TAB 键来缩进，但本书将只使用空格。


    一旦你输入 `print(''A'')` 并按回车键，你应该会看到另一个 `...` 提示符。由于我们没有其他内容要放入这个 if 语句，请再次按回车键以关闭此提示符并返回到
    `>>>` 提示符。这次额外的按回车键是 Python shell 的一个特点；当我们编写 Python 程序文件时，不需要这样的空行。


    让我们看一个在 if 语句的代码块中放置两个语句的例子：


    ```

    >>> apple_total = 20

    >>> banana_total = 6

    >>> if apple_total > banana_total:

    ...     print(''A'')

    ...     print(''Apples win!'')

    ...

    A

    Apples win!

    ```


    两个 print 调用都执行了，产生了两行输出。


    让我们尝试另一个 if 语句，这次布尔表达式为 False：


    ```

    >>> apple_total = 6

    >>> banana_total = 20

    >>> if apple_total > banana_total:

    ...     print(''A'')

    ...

    ```'
