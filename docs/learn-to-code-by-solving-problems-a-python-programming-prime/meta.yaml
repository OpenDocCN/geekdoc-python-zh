  md: 'Following the keyword `for`, we write the name of a *loop variable*. A loop
    variable is one that refers to different values as a loop progresses. In a `for`
    loop on a string, the loop variable refers to each of the string’s characters.


    I’ve chosen the variable name `char` (for “character”) to remind us that the variable
    refers to a character from the string. Sometimes, it’s clearer if we use a contextual
    variable name. For example, in Three Cups, we could instead use the name `swap_type`
    to remind us that it refers to a type of swap.


    After the variable name, we have the keyword `in` and then the string that we
    want to loop over. In our example, we’re looping over the string referred to by
    `secret_word`, which is `''olive''`.


    Like the `if`, `elif`, and `else` lines of an `if` statement, the `for` line ends
    with a colon (`:`). And, also like an `if` statement, a `for` statement has an
    indented block of one or more statements.


    An execution of the indented statements is referred to as an *iteration* of the
    loop. Here’s a walk-through of what our loop does on each iteration:


    +   - On the first iteration, Python sets `char` to refer to `''o''`, the first
    character of `''olive''`. It then runs the loop block, which consists only of
    the call to `print`. As `char` refers to `''o''`, the output produced is `Letter:
    o`.

    - On the second iteration, Python sets `char` to refer to `''l''`, the second
    character of `''olive''`. It then calls `print`, outputting `Letter: l`.

    - This process repeats three more times, once for each remaining character in
    `''olive''`.

    - The loop then terminates. We have no code after the loop, so our program has
    finished running. If there was additional code after the loop, then execution
    would continue with that code.


    You can put multiple statements in the block of a `for` loop. Here’s an example:


    ```

    >>> secret_word = ''olive''

    >>> for char in secret_word:

    ...     print(''Letter: '' + char)

    ...     print(''*'')

    ...

    Letter: o

    *

    Letter: l

    ```'
