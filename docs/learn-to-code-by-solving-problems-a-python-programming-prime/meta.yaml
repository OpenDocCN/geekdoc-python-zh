    \ input and standard output.\n\nIn this chapter, we’ll learn how to write programs\
    \ that manipulate text files. We’ll solve two problems using files: correctly\
    \ formatting an essay and seeding a farm to feed cows.\n\n## Problem #16: Essay\
    \ Formatting\n\nThere’s one important difference between this problem and all\
