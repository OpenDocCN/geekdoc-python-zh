    python has a big role to play. Below are the few important reasons for python’s
    use as a preferred language for network Programming.


    # Socket programming


    Sockets are the links through which the client and servers communicate with each
    other. For example when a browser is opened a socket is automatically created
    to connect with the server. Python has a socket module which an be used to implement
    various socket functionalities like binding an address or starting a listener
    port. Socket programming is fundamental to computer networking and python handles
    it well.


    # Client programming


    The client is the computer which requests for information and waits for the response.
    Python programs can be written to validate many client-side actions like parsing
    a URL, sending parameters with the URL while submitting a request, connect to
    a alternate URL if access to one URL becomes unsuccessful etc. These programs
    are run in the client programs and handle all the communication needs with the
    server even without using a browser. For example – you can provide an URL to the
    python program for downloading a file and it will get done by the program itself
    without taking help from the browser program.


    # Building web servers


    It is possible to create simple web servers which are good enough to run websites
    using python as a programming language. Python already has some inbuilt web servers
