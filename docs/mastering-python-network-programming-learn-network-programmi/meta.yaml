    - Offers the choice of various worker types/configurations and automatic worker
    process management

    - HTTP/1.0 and HTTP/1.1 (Keep-Alive) support through synchronous and asynchronous
    workers

    - Comes with SSL support

    - Extensible with hooks


    # CherryPy WSGI Server


    CherryPy is a self contained web framework as it can run on its own without the
    need of additional software. It has its own WSGI, HTTP/1.1-compliant web server.
    As it is a WSGI server, it can be used to serve any other WSGI Python application
    as well, without being bound to CherryPy''s application development framework.'
- md: "## Important Features\n\n- It can run any Python web applications running on\
    \ WSGI.\n- It can handle static files and it can just be used to serve files and\
    \ folders alone.\n- It is thread-pooled.\n- It comes with support for SSL.\n-\
    \ It is an easy to adapt, easy to use pure-Python alternative which is robust\
    \ and reliable.\n\n## Twisted Web\n\nIt is a web server that comes with the Twisted\
    \ networking library. Whereas Twisted itself is \"an event-driven networking engine\"\
    , the Twisted Web server runs on WSGI and it is capable of powering other Python\
    \ web applications.\n\n## Important Features\n\n- It runs WSGI Python applications\n\
    - It can act like a Python web server framework, allowing you to program it with\
    \ the language for custom HTTP serving purposes\n- It offers simple and fast prototyping\
    \ ability through Python Scripts (.rpy) which are executed upon HTTP requests\n\
    - It comes with proxy and reverse-proxy capabilities\n- It supports Virtual Hosts\n\
    - It can even serve Perl, PHP et cetera\n\n## Python - Uploading Data\n\nWe can\
    \ upload data to a server using python's module which handle ftp or File Transfer\
    \ Protocol.\n\nWe need to install the module **ftplib** to achieve this.\n\n```\n\
    pip install ftplib\n```\n\n## Using ftplib\n\nIn the below example we use FTP\
    \ method to connect to the server and then supply the user credentials. Next we\
    \ mention the name of the file and the storbinary method to send and store the\
    \ file in the server.\n\n```\nimport ftplib\n\nftp = ftplib.FTP(\"127.0.0.1\"\
    )\nftp.login(\"username\", \"password\")\nfile = open('index.html','rb')\nftp.storbinary(\"\
    STOR \" + file, open(file, \"rb\"))\nfile.close()\nftp.quit()\n```\n\nWhen we\
    \ run the above program, we observe that a copy of the file has been created in\
    \ the server.\n\n## Using ftpretty\n\nSimilar to ftplib we can use ftpretty to\
    \ connect securely to a remote server and upload file. We can also download file\
    \ using ftpretty. The below program illustrates the same.\n\n```\nfrom ftpretty\
    \ import ftpretty\n\n# Mention the host\nhost = \"127.0.0.1\"\n\n# Supply the\
    \ credentials\nf = ftpretty(host, user, pass )\n\n# Get a file, save it locally\n\
    f.get('someremote/file/on/server.txt', '/tmp/localcopy/server.txt')\n\n# Put a\
    \ local file to a remote location\n# non-existent subdirectories will be created\
    \ automatically\nf.put('/tmp/localcopy/data.txt', 'someremote/file/on/server.txt')\n\
    ```\n\nWhen we run the above program, we observe that a copy of the file has been\
    \ created in the server.\n\n## Python - Proxy Server\n\nProxy servers are used\
    \ to browse to some website through another server so that the browsing remains\
    \ anonymous. It can also be used to bypass the blocking of specific IP addresses.\n\
    \nWe use the urlopen method from the urllib module to access the website by passing\
    \ the proxy server address as a parameter.\n\n## Example\n\nIn the below example\
    \ we use a proxy address to access the website twitter.com for anonymous access.\
    \ The response status of OK proves the successful access through a proxy server.\n\
    \n```\nimport urllib\nURL = 'https://www.twitter.com'\nPROXY_ADDRESS = \"265.24.11.6:8080\"\
    \nif __name__ == '__main__':\n    resp = urllib.urlopen(URL, proxies = {\"http\"\
    \ : PROXY_ADDRESS})\nprint \"Proxy server returns response headers: %s \" %resp.headers\n\
    ```\n\nWhen we run the above program, we get the following output –\n\n```\nProxy\
    \ server returns response headers: cache-control: no-cache, no-store, must-revalidate,\
    \ pre-check=0, post-check=0\ncontent-length: 145960\ncontent-type: text/html;charset=utf-8\n\
