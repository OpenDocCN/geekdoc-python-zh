  md: '# Python - POP3


    The pop3 protocol is an email protocol to download messages from the email-server.
    These messages can be stored in the local machine.


    **Key Points**


    +   - POP is an application layer internet standard protocol.

    - Since POP supports offline access to the messages, thus requires less internet
    usage time.

    - POP does not allow search facility.

    - In order to access the messaged, it is necessary to download them.

    - It allows only one mailbox to be created on server.

    - It is not suitable for accessing non mail data.

    - POP commands are generally abbreviated into codes of three or four letters.
    Eg. STAT.


    # POP Commands


    The following table describes some of the POP commands:


    | S.N. | Command Description |

    |---|---|

    | 1 | **LOGIN**<br>This command opens the connection. |

    | 2 | **STAT**<br>It is used to display number of messages currently in the mailbox.
    |

    | 3 | **LIST** |'
