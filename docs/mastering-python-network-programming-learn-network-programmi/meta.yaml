- md: "## Python - Connection Re-use\n\nWhen a client makes a valid request to a server,\
    \ a temporary connection is established between them to complete the sending and\
    \ receiving process. But there are scenarios where the connection needs to be\
    \ kept alive as there is need of automatic requests and responses between the\
    \ programs which are communicating. Take for example an interactive webpage. After\
    \ the webpage is loaded there is a need of submitting a form data or downloading\
    \ further CSS and JavaScript components. The connection needs to be kept alive\
    \ for faster performance and an unbroken communication between the client and\
    \ the server.\n\nPython provides **urllib3** module which had methods to take\
    \ care of connection reuse between a client and a server. In the below example\
    \ we create a connection and make multiple requests by passing different parameters\
    \ with the GET request. We receive multiple responses but we also count the number\
    \ of connection that has been used in the process. As we see the number of connection\
    \ does not change implying the reuse of the connection.\n\n```python\nfrom urllib3\
    \ import HTTPConnectionPool\n\npool = HTTPConnectionPool('ajax.googleapis.com',\
    \ maxsize=1)\nr = pool.request('GET', '/ajax/services/search/web',\n         \
    \        fields={'q': 'python', 'v': '1.0'})\nprint 'Response Status:', r.status\n\
    \n# Header of the response\nprint 'Header: ',r.headers['content-type']\n\n# Content\
    \ of the response\nprint 'Python: ',len(r.data)\n\nr = pool.request('GET', '/ajax/services/search/web',\n\
    \                 fields={'q': 'php', 'v': '1.0'})\n\n# Content of the response\n\
    print 'php: ',len(r.data)\n\nprint 'Number of Connections: ',pool.num_connections\n\
    \nprint 'Number of requests: ',pool.num_requests\n```\n\nWhen we run the above\
    \ program, we get the following output –\n\n```\nResponse Status: 200\nHeader:\
    \ text/javascript; charset=utf-8\nPython: 211\nphp: 211\nNumber of Connections:\
    \ 1\nNumber of requests: 2\n```\n\n## Python - Network Interface\n\nWhen we have\
    \ multiple interfaces in a machine we need to keep track of their names, status\
    \ etc. In Python we can list the interfaces and their status.\n\n### Example\n\
    \nIn the below example we use the python module **netifaces** which gives the\
    \ details of the interfaces and their status. The methods used are very simple\
    \ and straight forward.\n\n```python\nimport netifaces\n\nprint (netifaces.interfaces())\n\
    \nprint (netifaces.ifaddresses('lo'))\n\nprint (netifaces.AF_LINK)\n\naddrs =\
    \ netifaces.ifaddresses('ens33')\nprint(addrs[netifaces.AF_INET])\n\nprint(addrs[netifaces.AF_LINK])\n\
    ```\n\nWhen we run the above program, we get the following output –\n\n```\n['lo',\
    \ 'ens33']\n{17: [{'peer': '00:00:00:00:00:00', 'addr': '00:00:00:00:00:00'}],\n\
    2: [{'peer': '127.0.0.1', 'addr': '127.0.0.1', 'netmask':\n'255.0.0.0'}], 10:\
    \ [{'addr': '::1', 'netmask':\n'ffff:ffff:ffff:ffff:ffff:ffff:ffff:ffff/128'}]}\n\
    \n17\n\n[{'netmask': '255.255.255.0', 'addr': '192.168.232.128',\n'broadcast':\
    \ '192.168.232.255'}]\n[{'addr': '00:0c:29:ea:13:0a', 'broadcast': 'ff:ff:ff:ff:ff:ff'}]\n\
    ```\n\n## Python - Sockets Programming\n\nPython provides two levels of access\
    \ to network services. At a low level, you can access the basic socket support\
    \ in the underlying operating system, which allows you to implement clients and\
    \ servers for both connection-oriented and connectionless protocols.\n\nPython\
    \ also has libraries that provide higher-level access to specific application-level\
    \ network protocols, such as FTP, HTTP, and so on.\n\nSockets are the endpoints\
    \ of a bidirectional communications channel. Sockets may communicate within a\
    \ process, between processes on the same machine, or between processes on different\
    \ continents. We use the socket module in python to create and use sockets.\n\n\
    Sockets have their own vocabulary –\n\n| Sr.No. | Term & Description |\n| :---\
    \ | :--- |\n| 1 | **Domain**<br><br>The family of protocols that is used as the\
    \ transport mechanism. These values are constants such as AF_INET, PF_INET, PF_UNIX,\
