  md: '# Python - FTP


    FTP or File Transfer Protocol is a well-known network protocol used to transfer
    files between computers in a network. It is created on client server architecture
    and can be used along with user authentication. It can also be used without authentication
    but that will be less secure. FTP connection which maintains a current working
    directory and other flags, and each transfer requires a secondary connection through
    which the data is transferred. Most common web browsers can retrieve files hosted
    on FTP servers.


    # The Methods in FTP class


    In python we use the module **ftplib** which has the below required methods to
    list the files as we will transfer the files.


    | Method | Description |

    |---|---|

    | pwd() | Current working directory. |

    | cwd() | Change current working directory to path. |

    | dir([path[,...[,cb]]]) | Displays directory listing of path. Optional call-back
    cb passed to retrlines(). |

    | storlines(cmd, f) | Uploads text file using given FTP cmd - for example, STOR
    file name. |

    | storbinary(cmd,f[, bs=8192]) | Similar to storlines() but is used for binary
    files. |

    | delete(path) | Deletes remote file located at path. |'
