    \ method sets up and start TCP listener. |\n| 3 | **s.accept()**<br><br>This passively\
    \ accept TCP client connection, waiting until connection arrives (blocking). |\n\
    \n### Client Socket Methods\n\n| Sr.No. | Method & Description |\n|---|---|\n\
