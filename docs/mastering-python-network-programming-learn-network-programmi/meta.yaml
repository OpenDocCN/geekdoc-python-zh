  md: "# Python - Directory Listing\n\nPython can be used to get the list of content\
    \ from a directory. We can make program to list the content of directory which\
    \ is in the same machine where python is running. We can also login to the remote\
    \ system and list the content from the remote directory.\n\n# Listing Local Directory\n\
    \nIn the below example we use the listdir() method to get the content of the current\
    \ directory. To also indicate the type of the content like file or directory,\
    \ we use more functions to evaluate the nature of the content.\n\n```\nfor name\
    \ in os.listdir('.'):\n    if os.path.isfile(name): print 'file: ', name\n   \
    \ elif os.path.isdir(name): print 'dir: ', name\n    elif os.path.islink(name):\
    \ print 'link: ', name\n    else: print 'unknown', name\n```\n\nWhen we run the\
    \ above program, we get the following output –\n\n```\nfile: abcl.htm\ndir: allbooks\n\
    link: ulink\n```\n\nPlease note the content above is specific to the system where\
    \ the python program was run. The result will vary depending on the system and\
    \ its content.\n\n# Listing Remote Directory\n\nWe can list the content of the\
    \ remote directory by using ftp to access the remote system. Once the connection\
    \ is established we can use commands that will list the directory contents in\
    \ a way similar to the listing of local directories.\n\n```\nfrom ftplib import\
    \ FTP\ndef main():\n    ftp = FTP('ftp.ibiblio.org')\n    ftp.login()\n```"
