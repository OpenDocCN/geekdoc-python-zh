  md: 'Here, you have placed a basic e-mail in message, using a triple quote, taking
    care to format the headers correctly. An e-mail requires a **From**, **To**, and
    a **Subject** header, separated from the body of the e-mail with a blank line.


    To send the mail you use *smtpObj* to connect to the SMTP server on the local
    machine. Then use the *sendmail* method along with the message, the from address,
    and the destination address as parameters (even though the from and to addresses
    are within the e-mail itself, these are not always used to route the mail).


    If you are not running an SMTP server on your local machine, you can use *smtplib*
    client to communicate with a remote SMTP server. Unless you are using a webmail
    service (such as gmail or Yahoo! Mail), your e-mail provider must have provided
    you with the outgoing mail server details that you can supply them, as follows
    –


    ```

    mail = smtplib.SMTP(''smtp.gmail.com'', 587)

    ```


    # Sending an HTML e-mail using Python


    When you send a text message using Python, then all the content is treated as
    simple text. Even if you include HTML tags in a text message, it is displayed
    as simple text and HTML tags will not be formatted according to the HTML syntax.
    However, Python provides an option to send an HTML message as actual HTML message.


    While sending an e-mail message, you can specify a Mime version, content type
    and the character set to send an HTML e-mail.


    # Example


    Following is an example to send the HTML content as an e-mail. Try it once –


    ```

    #!/usr/bin/python3


    import smtplib


    message = """From: From Person <from@fromdomain.com>

    To: To Person <to@todomain.com>

    MIME-Version: 1.0

    Content-type: text/html

    Subject: SMTP HTML e-mail test

    ```'
