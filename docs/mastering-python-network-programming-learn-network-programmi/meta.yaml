  md: '# Python - IMAP


    IMAP is an email retrieval protocol which does not download the emails. It just
    reads them and displays them. This is very useful in low bandwidth condition.
    Python’s client side library called **imaplib** is used for accessing emails over
    imap protocol.


    **IMAP** stands for **Internet Mail Access Protocol**. It was first proposed in
    1986.


    **Key Points:**


    +   - IMAP allows the client program to manipulate the e-mail message on the server
    without downloading them on the local computer.

    - The e-mail is hold and maintained by the remote server.

    - It enables us to take any action such as downloading, delete the mail without
    reading the mail.It enables us to create, manipulate and delete remote message
    folders called mail boxes.

    - IMAP enables the users to search the e-mails.

    - It allows concurrent access to multiple mailboxes on multiple mail servers.


    # IMAP Commands


    The following table describes some of the IMAP commands:


    | S.N. | Command Description |

    | :--- | :--- |

    | 1 | **IMAP_LOGIN**<br>This command opens the connection. |

    | 2 | **CAPABILITY**<br>This command requests for listing the capabilities that
    the server supports. |'
  merge: -1
  pgno: 77
