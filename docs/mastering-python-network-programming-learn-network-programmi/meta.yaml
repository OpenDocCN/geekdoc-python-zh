  md: "# Python - SFTP\n\nSFTP is also known as the SSH File Transfer Protocol. It\
    \ is a network protocol that provides file access, file transfer, and file management\
    \ over any reliable data stream. The program is run over a secure channel, such\
    \ as SSH, that the server has already authenticated the client, and that the identity\
    \ of the client user is available to the protocol.\n\nThe **pysftp** module is\
    \ a simple interface to SFTP. The module offers high level abstractions and task\
    \ based routines to handle the SFTP needs. So we install the module into our python\
    \ environment with the below command.\n\n```\npip install pysftp\n```\n\n# Example\n\
    \nIn the below example we login to a remote server using sftp and then get and\
    \ put some file in that directory.\n\n```\nimport pysftp\n\nwith pysftp.Connection('hostname',\
    \ username='me',\n    password='secret') as sftp:\n\n    with sftp.cd('/allcode'):\
    \          # temporarily chdir to\n        allcode\n        sftp.put('/pycode/filename')\
    \   # upload file to\n        allcode/pycode on remote\n        sftp.get('remote_file')\
    \        # get a remote file\n```\n\nWhen we run the above code we are able to\
    \ see the list of files present in the allcode directory and also put and get\
    \ some file in that directory."
