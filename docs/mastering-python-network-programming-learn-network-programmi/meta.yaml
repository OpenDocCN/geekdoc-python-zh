  mdcn: "## 警告\n\n*警告*通用头部用于携带关于消息状态或转换的附加信息，这些信息可能未在消息中体现。一个响应可以携带多个警告头部。\n\n```\n\
    Warning : warn-code SP warn-agent SP warn-text SP warn-date\n```\n\n## 示例\n\n\
    在下面的示例中，我们使用 urllib2 模块通过 urlopen 获取响应。接着，我们应用 info() 方法来获取该响应的头部信息。\n\n```python\n\
    import urllib2\nresponse = urllib2.urlopen('http://www.tutorialspoint.com/python')\n\
    html = response.info()\nprint html\n```\n\n当我们运行上述程序时，会得到以下输出 –\n\n```\nAccess-Control-Allow-Headers:\
    \ X-Requested-With\nAccess-Control-Allow-Origin: *\nCache-Control: max-age=2592000\n\
    Content-Type: text/html; charset=UTF-8\nDate: Mon, 02 Jul 2018 11:06:07 GMT\n\
    Expires: Wed, 01 Aug 2018 11:06:07 GMT\nLast-Modified: Sun, 01 Jul 2018 21:05:38\
    \ GMT\nServer: ECS (tir/CDD1)\nVary: Accept-Encoding\nX-Cache: HIT\nContent-Length:\
    \ 22063\nConnection: close\n```\n\n## Python - 自定义 HTTP 请求\n\n超文本传输协议（HTTP）是一种用于实现客户端和服务器之间通信的协议。它在客户端和服务器之间以请求-响应协议的方式工作。发起请求的设备称为客户端，发送响应的设备称为服务器。\n\
    \nurllib 是传统的 Python 库，用于在 Python 程序中处理 HTTP 请求。但现在有了 urllib3，它比 urllib 原有的功能更强大。我们导入\
    \ urllib3 库，看看 Python 如何使用它来发起 HTTP 请求并接收响应。我们可以通过选择请求方法来定制请求类型。\n\n```\npip install\
    \ urllib3\n```\n\n## 示例\n\n在下面的示例中，我们使用 `PoolManager()` 对象，它负责处理 HTTP 请求的连接细节。接着，我们使用\
    \ `request()` 对象以 POST 方法发起 HTTP 请求。最后，我们还使用 json 库以 JSON 格式打印接收到的值。\n\n```python\n\
    import urllib3\nimport json\n\nhttp = urllib3.PoolManager()\nr = http.request(\n\
    \    'POST',\n    'http://httpbin.org/post',\n    fields={'field': 'value'})\n\
    print json.loads(r.data.decode('utf-8'))['form']\n```\n\n当我们运行上述程序时，会得到以下输出 –\n\
    \n```\n{field': value'}\n```\n\n## 使用查询参数的 URL\n\n我们也可以传递查询参数来构建自定义 URL。在下面的示例中，请求方法使用查询字符串中的值来完成\
    \ URL，该 URL 可以被 Python 程序中的另一个函数进一步使用。\n\n```python\nimport requests\n\nquery\
    \ = {'q': 'river', 'order': 'popular', 'min_width': '800',\n'min_height': '600'}\n\
    req = requests.get('https://pixabay.com/en/photos/', params=query)\n\nprint(req.url)\n\
    ```\n\n当我们运行上述程序时，会得到以下输出 –\n\n```\nhttps://pixabay.com/en/photos/?q=river&min_width=800&min_height=600\n\
    &order=popular\n```\n\n## Python - 请求状态码\n\n服务器在接收并解释请求消息后，会用 HTTP 响应消息进行回复。响应消息包含一个状态码。它是一个三位整数，其中状态码的第一位数字定义了响应的类别，最后两位数字没有分类作用。第一位数字有\
    \ 5 个值：\n\n## 状态码\n\n| 序号 | 代码与描述 |\n|---|---|\n| 1 | **1xx: 信息性**<br>表示请求已接收，处理正在进行中。\
    \ |\n| 2 | **2xx: 成功**<br>表示操作已被成功接收、理解和接受。 |\n| 3 | **3xx: 重定向**<br>表示必须采取进一步操作才能完成请求。\
    \ |\n| 4 | **4xx: 客户端错误**<br>表示请求包含错误的语法或无法被满足。 |\n| 5 | **5xx: 服务器错误**<br>表示服务器未能满足一个显然有效的请求。\
    \ |\n\n## 成功响应\n\n在下面的示例中，我们从一个 URL 访问一个文件，响应是成功的。因此返回的状态码是 200。\n\n```python\n\
    import urllib3\nhttp = urllib3.PoolManager()\n\nresp = http.request('GET', 'http://tutorialspoint.com/robots.txt')\n\
    print resp.data\n\n# 获取响应状态\nprint resp.status\n```\n\n当我们运行上述程序时，会得到以下输出 –\n\n\
    ```\nUser-agent: *\nDisallow: /tmp\nDisallow: /logs\nDisallow: /rate/*\nDisallow:\
    \ /cgi-bin/*\nDisallow: /videotutorials/video_course_view.php?*\nDisallow: /videotutorials/course_view.php?*\n\
    Disallow: /videos/*\nDisallow: /*/*_question_bank/*\nDisallow: //*/ */ */ */src/*\n\
    \n200\n```\n\n## 不成功响应\n\n在下面的示例中，我们从一个不存在的 URL 访问一个文件。响应不成功。因此返回的状态码是 403。\n\n\
    ```python\nimport urllib3\nhttp = urllib3.PoolManager()\n\nresp = http.request('GET',\
    \ 'http://tutorialspoint.com/robot.txt')\nprint resp.data\n\n# 获取响应状态\nprint resp.status\n\
    ```\n\n当我们运行上述程序时，会得到以下输出 –\n\n```\n<!DOCTYPE HTML PUBLIC \"-//IETF//DTD HTML\
    \ 2.0//EN\">\n<html><head>\n<title>403 Forbidden</title>\n</head><body>\n<h1>Forbidden</h1>\n\
    <p>You don't have permission to access /robot.txt\non this server.</p>\n</body></html>\n\
    ```\n\n```\n403\n```\n\n## Python - HTTP 认证\n\n认证是确定请求是否来自有权使用系统的合法用户的过程。在计算机网络世界中，这是一个非常关键的要求，因为许多系统需要相互交互，必须有适当的机制来确保这些程序之间只发生有效的交互。\n\
    \nPython 模块 **requests** 具有内置功能，可以调用服务 Web 应用提供的各种 API，并附带用户凭证。这些凭证必须嵌入到调用程序中。如果\
    \ API 成功验证，则发生有效登录。\n\n## 安装 Requests\n\n我们安装名为 requests 的所需 Python 模块来运行认证程序。\n\
    \n```\npip install requests\n```\n\n## 认证到 Github\n\n下面我们看到一个仅涉及用户名和密码的简单认证机制。成功的响应表示有效登录。\n\
    \n```python\nimport requests\nr = requests.get('https://api.github.com/user',\
    \ auth=('user', 'pass'))\nprint r\n```\n\n当我们运行上述程序时，会得到以下输出 –\n\n## 认证到 Twitter\n\
    \n我们也可以运行一个程序来使用 Twitter 的 API，并通过使用以下代码实现成功登录。我们使用 requests 模块中可用的 OAuth1 方法来处理\
    \ Twitter API 所需的参数。正如我们所看到的，requests 模块能够处理涉及密钥和令牌的更复杂的认证机制，而不仅仅是用户名和密码机制。\n\n\
    ```python\nimport requests\nfrom requests_oauthlib import OAuth1\n\nurl = 'https://api.twitter.com/1.1/account/verify_credentials.json'\n\
    auth = OAuth1('YOUR_APP_KEY', 'YOUR_APP_SECRET',\n              'USER_OAUTH_TOKEN',\
    \ 'USER_OAUTH_TOKEN_SECRET')\n\nrequests.get(url, auth=auth)\n```\n\n当我们运行上述程序时，会得到以下输出\
    \ –\n\n```\n{\n    \"errors\": [\n        {\n            \"code\": 215,\n    \
    \        \"message\": \"Bad Authentication data.\"\n        }\n    ]\n}\n```\n\
    \n但是，使用 OAuth1 参数的正确值，你会得到成功的响应。\n\n## Python - HTTP 数据下载\n\n我们可以使用处理 FTP 或文件传输协议的\
    \ Python 模块从服务器下载数据。我们也可以读取数据，然后将其保存到本地系统。\n\n我们需要安装模块 **ftplib** 来实现这一点。\n\n\
    ```\npip install ftplib\n```\n\n## 获取文件\n\n我们可以使用 **getfile** 方法获取特定文件。此方法将文件的副本从远程系统移动到发起\
    \ FTP 连接的本地系统。\n\n```python\nimport ftplib\nimport sys\n\ndef getFile(ftp, filename):\n\
    \    try:\n        ftp.retrbinary(\"RETR \" + filename ,open(filename, 'wb').write)\n\
    \    except:\n        print \"Error\"\n\nftp = ftplib.FTP(\"ftp.nluug.nl\")\n\
    ftp.login(\"anonymous\", \"ftplib-example-1\")\n\nftp.cwd('/pub/')           #\
    \ 更改目录到 /pub/\ngetFile(ftp,'README.nluug')\n\nftp.quit()\n```\n\n当我们运行上述程序时，会发现文件\
    \ README.nluug 存在于发起连接的本地系统中。\n\n## 读取数据\n\n在下面的示例中，我们使用 urllib2 模块读取所需部分的数据，我们可以将其复制并保存到本地系统。\n\
    \n当我们运行上述程序时，会得到以下输出 –\n\n```python\nimport urllib2\nresponse = urllib2.urlopen('http://www.tutorialspoint.com/python')\n\
    ```"
