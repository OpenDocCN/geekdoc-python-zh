    defines the class of response and the last two digits do not have any categorization
    role. There are 5 values for the first digit:


    | S.N. | Code and Description |

    |---|---|

    | 1 | **1xx: Informational**<br>It means the request was received and the process
    is continuing. |

    | 2 | **2xx: Success**<br>It means the action was successfully received, understood,
    and accepted. |

    | 3 | **3xx: Redirection**<br>It means further action must be taken in order to
    complete the request. |

    | 4 | **4xx: Client Error**<br>It means the request contains incorrect syntax
    or cannot be fulfilled. |

    | 5 | **5xx: Server Error**<br>It means the server failed to fulfill an apparently
    valid request. |


    HTTP status codes are extensible and HTTP applications are not required to understand
    the meaning of all registered status codes.


