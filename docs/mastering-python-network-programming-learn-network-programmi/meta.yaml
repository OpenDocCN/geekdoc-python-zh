  md: "# Python - Connection Re-use\n\nWhen a client makes a valid request to a server,\
    \ a temporary connection is established between them to complete the sending and\
    \ receiving process. But there are scenarios where the connection needs to be\
    \ kept alive as there is need of automatic requests and responses between the\
    \ programs which are communicating. Take for example an interactive webpage. After\
    \ the webpage is loaded there is a need of submitting a form data or downloading\
    \ further CSS and JavaScript components. The connection needs to be kept alive\
    \ for faster performance and an unbroken communication between the client and\
    \ the server.\n\nPython provides **urllib3** module which had methods to take\
    \ care of connection reuse between a client and a server. In the below example\
    \ we create a connection and make multiple requests by passing different parameters\
    \ with the GET request. We receive multiple responses but we also count the number\
    \ of connection that has been used in the process. As we see the number of connection\
    \ does not change implying the reuse of the connection.\n\n```\nfrom urllib3 import\
    \ HTTPConnectionPool\n\npool = HTTPConnectionPool('ajax.googleapis.com', maxsize=1)\n\
    r = pool.request('GET', '/ajax/services/search/web',\n                 fields={'q':\
    \ 'python', 'v': '1.0'})\nprint 'Response Status:', r.status\n\n# Header of the\
    \ response\nprint 'Header: ',r.headers['content-type']\n\n# Content of the response\n\
    print 'Python: ',len(r.data)\n\nr = pool.request('GET', '/ajax/services/search/web',\n\
    \                 fields={'q': 'php', 'v': '1.0'})\n\n# Content of the response\n\
    print 'php: ',len(r.data)\n\nprint 'Number of Connections: ',pool.num_connections\n\
    \nprint 'Number of requests: ',pool.num_requests\n```\n\nWhen we run the above\
    \ program, we get the following output –"
