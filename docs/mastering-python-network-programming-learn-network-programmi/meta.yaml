    \ successfully\n```\n\n## Python - Telnet\n\nTelnet 是一种网络协议，它允许一台计算机上的用户登录到同一网络中的另一台计算机。telnet\
    \ 命令与主机名一起使用，然后输入用户凭证。成功登录后，远程用户可以像系统的常规用户一样访问应用程序和数据。当然，一些权限可以由设置和维护系统的系统管理员控制。\n\
    \n在 Python 中，telnet 由模块 telnetlib 实现，该模块包含 Telnet 类，该类具有建立连接所需的方法。在下面的示例中，我们还使用\
    \ getpass 模块来处理登录过程中的密码提示。我们假设连接是建立到一个 unix 主机。程序中使用的 telnetlib.Telnet 类的各种方法说明如下。\n\
    \n- Telnet.read_until - 读取直到遇到给定的字符串 expected，或者直到超时秒数过去。\n- Telnet.write - 将字符串写入套接字，将任何\
    \ IAC 字符加倍。如果连接被阻塞，这可能会阻塞。如果连接关闭，可能会引发 socket.error。\n- Telnet.read_all() - 读取所有数据直到\
    \ EOF；阻塞直到连接关闭。\n\n## 示例\n\n```python\nimport getpass\nimport telnetlib\n\nHOST\
    \ = \"http://localhost:8000/\"\nuser = raw_input(\"Enter your remote account:\
    \ \")\npassword = getpass.getpass()\n\ntn = telnetlib.Telnet(HOST)\n\ntn.read_until(\"\
    login: \")\ntn.write(user + \"\\n\")\nif password:\n    tn.read_until(\"Password:\
    \ \")\n    tn.write(password + \"\\n\")\n\ntn.write(\"ls\\n\")\ntn.write(\"exit\\\
    n\")\n\nprint tn.read_all()\n```\n\n当我们运行上述程序时，会得到以下输出 –\n\n```\n- lrwxrwxrwx\
    \    1 0        0              1 Nov 13  2012 ftp -> .\n- lrwxrwxrwx    1 0  \
    \      0              3 Nov 13  2012 mirror -> pub\n- drwxr-xr-x   23 0      \
    \  0           4096 Nov 27  2017 pub\n- drwxr-sr-x   88 0      450           4096\
    \ May 04 19:30 site\n- drwxr-xr-x    9 0        0           4096 Jan 23  2014\
    \ vol\n```\n\n请注意，此输出特定于运行程序时提交详细信息的远程计算机。\n\n## Python - 电子邮件消息\n\n电子邮件是一种服务，允许我们通过互联网以电子方式发送消息。它提供了一种高效、廉价且实时的信息分发方式。\n\
    \n## 电子邮件地址\n\n每个电子邮件用户都被分配一个用于其电子邮件帐户的唯一名称。此名称称为电子邮件地址。不同的用户可以根据电子邮件地址发送和接收消息。\n\
    \n电子邮件通常采用 username@domainname 的形式。例如，webmaster@michaeldavid.com 是一个电子邮件地址，其中\
    \ webmaster 是用户名，michaeldavidtech.com 是域名。\n\n- 用户名和域名由 @（at）符号分隔。\n- 电子邮件地址不区分大小写。\n\
    - 电子邮件地址中不允许有空格。\n\n电子邮件消息的前五行称为电子邮件标头。标头部分包含以下字段：\n\n- From\n- Date\n- To\n-\
    \ Subject\n- CC\n- BCC\n\n## From\n\n**From** 字段表示发件人的地址，即谁发送了电子邮件。\n\n## Date\n\
    \n**Date** 字段表示电子邮件发送的日期。\n\n## To\n\n**To** 字段表示收件人的地址，即电子邮件发送给谁。\n\n## Subject\n\
    \n**Subject** 字段表示电子邮件的目的。它应该精确且切题。\n\n## CC\n\n**CC** 代表抄送。它包括我们希望告知但并非确切收件人的那些收件人地址。\n\
    \n## BCC\n\n**BCC** 代表密送。当我们不希望一个或多个收件人知道消息被抄送给其他人时使用它。\n\n## 问候语\n\n问候语是实际消息的开头。例如。Hi\
    \ Sir 或 Hi Guys 等。\n\n## 正文\n\n它代表消息的实际内容。\n\n## 签名\n\n这是电子邮件消息的最后一部分。它包括发件人姓名、地址和联系电话。\n\
    \nPython 有 EmailMessage 类，可用于构建电子邮件消息。该类具有自定义电子邮件消息不同部分所需的方法，例如 - TO 和 FROM 标签、主题行以及电子邮件的内容。"
