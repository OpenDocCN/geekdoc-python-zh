  md: "# Python - RPC JSON Server\n\nJSON or JavaScript Object Notation is a lightweight\
    \ data-interchange format. It is easy for humans to read and write. It is easy\
    \ for machines to parse and generate. The RPC call made based on JSON is able\
    \ to send data in a much compact and efficient manner than the normal XML based\
    \ RPC call. The python module **jsonrpclib** is able to create a simple JSON based\
    \ server and client.\n\n# Example\n\nIn the below example we create a simple JSON\
    \ server and create a function in it. This function breaks a bigger list into\
    \ smaller lists mentioning the length of the argument as well as the argument\
    \ itself.\n\n```\n# server program\nfrom jsonrpclib.SimpleJSONRPCServer import\
    \ SimpleJSONRPCServer\n\ndef findlen(*args):\n    res = []\n    for arg in args:\n\
    \        try:\n            lenval = len(arg)\n        except TypeError:\n    \
    \        lenval = None\n        res.append((lenval, arg))\n    return res\n\n\
    def main():\n    server = SimpleJSONRPCServer(('localhost', 1006))\n    server.register_function(findlen)\n\
    \    print(\"Start server\")\n```"
  merge: -1
  pgno: 96
