  md: "# Python - Google Maps\n\nPython provides modules which can be used to translate\
    \ addresses available in google map directly to geographic coordinates. It is\
    \ helpful in finding business addresses and locating the closeness of different\
    \ addresses.\n\nWe use a module named **pygeocoder** which provides the functionalities\
    \ to receive addresses and geocodes. This module is installed through pip using\
    \ the following command.\n\n# Installing pygeocoder\n\n```\npip install pygeocoder\n\
    ```\n\n# Finding Business Address\n\nWe submit a business name as input and the\
    \ program gives the complete address as the output. The module uses data from\
    \ google maps in the background to retrieve the result.\n\n```\nfrom pygeocoder\
    \ import Geocoder\n\nbusiness_name = \"Workafella Business Centre - Hitec city\"\
    \nprint \"Searching %s\" %business_name\nresults = Geocoder.geocode(business_name)\n\
    for result in results:\n    print result\n```\n\nWhen we run the above program,\
    \ we get the following output –\n\n```\nSearching Workafella Business Centre -\
    \ Hitec city\nWestern pearl building 1st floor, Hitech City Rd,\nOpposite HDFC\
    \ Bank, Kondapur, Hyderabad, Telangana 500084, India\n```"
