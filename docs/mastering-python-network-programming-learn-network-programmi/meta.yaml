    \ remote system and list the content from the remote directory.\n\n# Listing Local\
    \ Directory\n\nIn the below example we use the listdir() method to get the content\
    \ of the current directory. To also indicate the type of the content like file\
    \ or directory, we use more functions to evaluate the nature of the content.\n\
    \n```\nfor name in os.listdir('.'):\n    if os.path.isfile(name): print 'file:\
    \ ', name\n    elif os.path.isdir(name): print 'dir: ', name\n    elif os.path.islink(name):\
    \ print 'link: ', name\n    else: print 'unknown', name\n```\n\nWhen we run the\
    \ above program, we get the following output –\n\n```\nfile: abcl.htm\ndir: allbooks\n\
    link: ulink\n```\n\nPlease note the content above is specific to the system where\
