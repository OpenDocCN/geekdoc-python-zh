  mdcn: "## Python - 连接重用\n\n当客户端向服务器发出有效请求时，它们之间会建立一个临时连接以完成发送和接收过程。但在某些场景下，由于通信程序之间需要自动化的请求和响应，连接需要保持活跃状态。以交互式网页为例，网页加载后，可能需要提交表单数据或下载额外的CSS和JavaScript组件。为了提升性能并保持客户端与服务器之间的通信不中断，连接需要保持活跃。\n\
