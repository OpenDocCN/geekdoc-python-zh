    \ file\n\nimport socket               # Import socket module\n\ns = socket.socket()\
    \         # Create a socket object\nhost = socket.gethostname() # Get local machine\
    \ name\nport = 12345                # Reserve a port for your service.\n\ns.connect((host,\
    \ port))\nprint s.recv(1024)\ns.close                     # Close the socket when\
    \ done\n```\n\nNow run this server.py in background and then run above client.py\
    \ to see the result.\n\n```\n# Following would start a server in background.\n\
    $ python server.py &\n\n# Once server is started run client as follows:\n$ python\
    \ client.py\n```\n\nThis would produce following result –\n\n```\nGot connection\
    \ from ('127.0.0.1', 48437)\nThank you for connecting\n```"
- md: "## Socket with Public URL\n\nIn the below example we use few methods from the\
    \ socket module to find the address information of server and host name details.\n\
    \n```python\nimport socket\nfrom pprint import pprint\n\n# get server address\n\
    addrinfo = socket.getaddrinfo('tutorialspoint.com', 'www')\n\npprint(addrinfo)\n\
    \n# get server hostname\nprint socket.gethostname()\n```\n\nWhen we run the above\
    \ program, we get the following output –\n\n```\n[(2, 1, 0, '', ('94.130.81.180',\
    \ 80))]\nDESKTOP-JXYKQCPLP\n```\n\n## Python - HTTP Client\n\nIn the http protocol,\
    \ the request from the client reaches the server and fetches some data and metadata\
    \ assuming it is a valid request. We can analyze this response from the server\
    \ using various functions available in the python requests module. Here the below\
    \ python programs run in the client side and display the result of the response\
    \ sent by the server.\n\n### Get Initial Response\n\nIn the below program the\
    \ get method from requests module fetches the data from a server and it is printed\
    \ in plain text format.\n\n```python\nimport requests\nr = requests.get('https://httpbin.org/')\n\
    print(r.text)[:200]\n```\n\nWhen we run the above program, we get the following\
    \ output –\n\n```\n<!DOCTYPE html >\n<html lang=\"en\">\n<head>\n  <meta charset=\"\
    UTF-8\">\n  <title>httpbin.org</title>\n  <link\nhref=\"https://fonts.googleapis.com/css?family=Open+Sans:400,700|Source+Code+Pro:300,600|Titillium+\n\
    ```\n\n### Get Session Object Response\n\nThe Session object allows you to persist\
    \ certain parameters across requests. It also persists cookies across all requests\
    \ made from the Session instance. If you’re making several requests to the same\
    \ host, the underlying TCP connection will be reused.\n\n```python\nimport requests\n\
    s = requests.Session()\n\ns.get('http://httpbin.org/cookies/set/sessioncookie/31251425')\n\
    r = s.get('http://httpbin.org/cookies')\n\nprint(r.text)\n```\n\nWhen we run the\
    \ above program, we get the following output –\n\n```\n{\"cookies\":{\"sessioncookie\"\
    :\"31251425\"}}\n```\n\n### Handling Error\n\nIn case some error is raised because\
    \ of issue in processing the request by the server, the python program can gracefully\
    \ handle the exception raised using the timeout parameter as shown below. The\
    \ program will wait for the defined value of the timeout error and then raise\
    \ the time out error.\n\n```python\nrequests.get('http://github.com', timeout=10.001)\n\
    ```\n\n## Python - HTTP Server\n\nPython standard library comes with a in-built\
    \ webserver which can be invoked for simple web client server communication. The\
    \ port number can be assigned programmatically and the web server is accessed\
    \ through this port. Though it is not a full featured web server which can parse\
    \ many kinds of file, it can parse simple static html files and serve them by\
    \ responding them with required response codes.\n\nThe below program starts a\
    \ simple web server and opens it up at port 8001. The successful running of the\
    \ server is indicated by the response code of 200 as shown in the program output.\n\
    \n```python\nimport SimpleHTTPServer\nimport SocketServer\n\nPORT = 8001\n\nHandler\
    \ = SimpleHTTPServer.SimpleHTTPRequestHandler\n\nhttpd = SocketServer.TCPServer((\"\
    \", PORT), Handler)\n\nprint \"serving at port\", PORT\nhttpd.serve_forever()\n\
    ```\n\nWhen we run the above program, we get the following output –\n\n```\nserving\
    \ at port 8001\n127.0.0.1 - - [14/Jun/2018 08:34:22] \"GET / HTTP/1.1\" 200 -\n\
    ```\n\n### Serving a localhost\n\nIf we decide to make the python server as a\
    \ local host serving only the local host, then we can use the following programm\
    \ to do that.\n\n```python\nimport sys\nimport BaseHTTPServer\nfrom SimpleHTTPServer\
    \ import SimpleHTTPRequestHandler\n\nHandlerClass = SimpleHTTPRequestHandler\n\
    ServerClass = BaseHTTPServer.HTTPServer\nProtocol = \"HTTP/1.0\"\n\nif sys.argv[1:]:\n\
    \    port = int(sys.argv[1])\nelse:\n    port = 8000\nserver_address = ('127.0.0.1',\
    \ port)\n\nHandlerClass.protocol_version = Protocol\nhttpd = ServerClass(server_address,\
    \ HandlerClass)\n\nsa = httpd.socket.getsockname()\nprint \"Serving HTTP on\"\
    , sa[0], \"port\", sa[1], \"...\"\nhttpd.serve_forever()\n```\n\nWhen we run the\
    \ above program, we get the following output –\n\n```\nServing HTTP on 127.0.0.1\
    \ port 8000 ...\n```\n\n## Python - Building URLs\n\nThe requests module can help\
    \ us build the URLS and manipulate the URL value dynamically. Any sub-directory\
    \ of the URL can be fetched programmatically and then some part of it can be substituted\
    \ with new values to build new URLs.\n\n### Build_URL\n\nThe below example uses\
    \ **urljoin** to fetch the different subfolders in the URL path. The urljoin method\
    \ is used to add new values to the base URL.\n\n```python\nfrom requests.compat\
    \ import urljoin\nbase='https://stackoverflow.com/questions/3764291'\nprint urljoin(base,'.')\n\
    print urljoin(base,'..')\nprint urljoin(base,'...')\nprint urljoin(base,'/3764299/')\n\
    url_query = urljoin(base,'?vers=1.0')\nprint url_query\nurl_sec = urljoin(url_query,'#section-5.4')\n\
    print url_sec\n```\n\nWhen we run the above program, we get the following output\
    \ –\n\n```\nhttps://stackoverflow.com/questions/\nhttps://stackoverflow.com/\n\
    https://stackoverflow.com/questions/...\nhttps://stackoverflow.com/3764299/\n\
    https://stackoverflow.com/questions/3764291?vers=1.0\nhttps://stackoverflow.com/questions/3764291?vers=1.0#section-5.4\n\
    ```\n\n### Split the URLS\n\nThe URLs can also be split into many parts beyond\
    \ the main address. The additional parameters which are used for a specific query\
    \ or tags attached to the URL are separated by using the urlparse method as shown\
    \ below.\n\n```python\nfrom requests.compat import urlparse\nurl1 = 'https://docs.python.org/2/py-modindex.html#cap-f'\n\
    url2='https://docs.python.org/2/search.html?q=urlparse'\nprint urlparse(url1)\n\
    print urlparse(url2)\n```\n\nWhen we run the above program, we get the following\
    \ output –\n\n```\nParseResult(scheme='https', netloc='docs.python.org', path='/2/py-modindex.html',\
    \ params='', query='', fragment='cap-f')\nParseResult(scheme='https', netloc='docs.python.org',\
    \ path='/2/search.html', params='', query='q=urlparse', fragment='')\n```\n\n\
    ## Python - WebForm Submission\n\nOften the interaction with a webpage needs some\
    \ data to be submitted to the server through the forms present in the html page.\
    \ These webforms are typically used for processes like signing up for a new account\
    \ or supplying some information like name or roll number to retrieve the result\
    \ of an examination. The **requests** module handles this gracefully using the\
    \ POST method with the required parameters.\n\n### Example\n\nIn the below example\
    \ we use the sign up form of a website by supplying the userid and password value.\
    \ After the submission of the values we print the response.\n\n```python\nimport\
    \ requests\n\nID_USERNAME = 'signup-user-name'\nID_PASSWORD = 'signup-user-password'\n\
    USERNAME = 'username'\nPASSWORD = 'yourpassword'\nSIGNUP_URL = 'http://codepad.org/login'\n\
    def submit_form():\n    \"\"\"Submit a form\"\"\"\n    payload = {ID_USERNAME\
    \ : USERNAME, ID_PASSWORD : PASSWORD,}\n\n    resp = requests.get(SIGNUP_URL)\n\
    \    print \"Response to GET request: %s\" %resp.content\n\n    resp = requests.post(SIGNUP_URL,\
    \ payload)\n    print \"Headers from a POST request response: %s\" %resp.headers\n\
    #print \"HTML Response: %s\" %resp.read()\n\nif __name__ == '__main__':\n    submit_form()\n\
    ```\n\nWhen we run the above program, we get the following output –\n\n```\nResponse\
    \ to GET request: <!DOCTYPE html>\n<html>\n\n<head>\n\n    <meta http-equiv=\"\
    content-type\" content=\"text/html; charset=UTF-8\">\n    <meta HTTP-EQUIV=\"\
    Pragma\" CONTENT=\"no-cache\">\n    <meta HTTP-EQUIV=\"Expires\" CONTENT=\"-1\"\
    >\n\n    <title>Login - codepad</title>\n\n    <link href=\"/main.css\" media=\"\
    screen\" rel=\"stylesheet\"\n    type=\"text/css\" />\n    <style type=\"text/css\"\
    >\n\n    </style>\n    <script src='https://www.google.com/recaptcha/api.js'></script>\n\
    \    <script>\n        function onRecaptcha(token) {\n            document.getElementById(\"\
    editor-form\").submit();\n        }\n    </script>\n</head>\n\n<body >\n\n   \
    \ ....................\n    ....................\n```\n\n## Python - Databases\
    \ and SQL\n\nThe Python programming language has powerful features for database\
    \ programming. Python supports various databases like SQLite, MySQL, Oracle, Sybase,\
    \ PostgreSQL, etc. Python also supports Data Definition Language (DDL), Data Manipulation\
    \ Language (DML) and Data Query Statements. The Python standard for database interfaces\
    \ is the Python DB-API. Most Python database interfaces adhere to this standard.\n\
    \nHere is the list of available Python database interfaces: [Python Database Interfaces\
    \ and APIs](https://www.tutorialspoint.com/python/python_database_access.htm).\
    \ You must download a separate DB API module for each database you need to access.\n\
    \nIn this chapter we will see the use of SQLite database in python programming\
    \ language. It is done by using python’s inbuilt, sqlite3 module. You should first\
    \ create a connection object that represents the database and then create some\
    \ cursor objects to execute SQL statements.\n\n### Connect To Database\n\nFollowing\
    \ Python code shows how to connect to an existing database. If the database does\
    \ not exist, then it will be created and finally a database object will be returned.\n\
    \n```python\n#!/usr/bin/python\n\nimport sqlite3\n\nconn = sqlite3.connect('test.db')\n\
    \nprint \"Opened database successfully\";\n```\n\nHere, you can also supply database\
    \ name as the special name **:memory:** to create a database in RAM. Now, let's\
    \ run the above program to create our database **test.db** in the current directory.\
    \ You can change your path as per your requirement. Keep the above code in sqlite.py\
    \ file and execute it as shown below. If the database is successfully created,\
    \ then it will display the following message.\n\n```\n$chmod +x sqlite.py\n$./sqlite.py\n\
    Open database successfully\n```"
  mdcn: "## 具有公共URL的套接字\n\n在下面的示例中，我们使用套接字模块中的几个方法来查找服务器的地址信息和主机名详情。\n\n```python\n\
