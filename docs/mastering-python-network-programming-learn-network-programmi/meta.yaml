    # Python - Email Messages


    Email is a service which allows us to send the message in electronic mode over
    the internet. It offers an efficient, inexpensive and real time mean of distributing
    information among people.


    # E-Mail Address


    Each user of email is assigned a unique name for his email account. This name
    is known as E-mail address. Different users can send and receive messages according
    to the e-mail address.


    E-mail is generally of the form username@domainname. For example, webmaster@michaeldavid.com
    is an e-mail address where webmaster is username and michaeldavidtech.com is domain
    name.


    +   - The username and the domain name are separated by @ (at) symbol.

    - E-mail addresses are not case sensitive.

    - Spaces are not allowed in e-mail address.


    The first five lines of an E-mail message is called E-mail header. The header
    part comprises of following fields:


    +   - From

    - Date

    - To

    - Subject

    - CC

    - BCC


    # From


    The **From** field indicates the sender’s address i.e. who sent the e-mail.'
  - '[PAGE 70]


    # Date


    The **Date** field indicates the date when the e-mail was sent.


    # To


    The **To** field indicates the recipient’s address i.e. to whom the e-mail is
    sent.


    # Subject


    The **Subject** field indicates the purpose of e-mail. It should be precise and
    to the point.


    # CC


    **CC** stands for Carbon copy. It includes those recipient addresses whom we want
    to keep informed but not exactly the intended recipient.


    # BCC


    **BCC** stands for Black Carbon Copy. It is used when we do not want one or more
    of the recipients to know that someone else was copied on the message.


    # Greeting


    Greeting is the opening of the actual message. Eg. Hi Sir or Hi Guys etc.


    # Text


    It represents the actual content of the message.


    # Signature


    This is the final part of an e-mail message. It includes Name of Sender, Address,
    and Contact Number.


    Python has EmailMessage class which can be used build email messages. This class
    ahs the required methods to customize different parts of the email message like
    - the TO and FROM tags, the Subject Line as well as the content of the email.'
- md: "## Example\n\nIn the below example we create an email message with all the\
    \ necessary parts of an email.\n\nOnce we print out the content of the message\
    \ we can see the complete email.\n\n```python\nimport email.message, email.policy,\
    \ email.utils, sys\ntext = \"\"\"Welcome to TutorialsPoint - Simple Easy Learning\"\
    \"\"\n\nmessage = email.message.EmailMessage(email.policy.SMTP)\nmessage['To']\
    \ = 'you@yourdomain.com'\nmessage['From'] = 'Learn '\nmessage['Subject'] = 'A\
    \ mail To you'\nmessage['Date'] = email.utils.formatdate(localtime=True)\nmessage['Message-ID']\
    \ = email.utils.make_msgid()\nmessage.set_content(text)\nsys.stdout.buffer.write(message.as_bytes())\n\
    ```\n\nWhen we run the above program, we get the following output –\n\n```\nTo:\
    \ you@yourdomain.com\nFrom: Learn\nSubject: A mail To you\nDate: Wed, 13 Jun 2018\
    \ 06:51:09 -0700\nMessage-ID: <152889786976.4106.5718297150260802709@ubuntu>\n\
    Content-Type: text/plain; charset=\"utf-8\"\nContent-Transfer-Encoding: 7bit\n\
    MIME-Version: 1.0\n```\n\n## Python - SMTP\n\nSimple Mail Transfer Protocol (SMTP)\
    \ is a protocol, which handles sending an e-mail and routing e-mail between mail\
    \ servers.\n\nPython provides **smtplib** module, which defines an SMTP client\
    \ session object that can be used to send mails to any Internet machine with an\
    \ SMTP or ESMTP listener daemon.\n\nAn SMTP object has an instance method called\
    \ **sendmail**, which is typically used to do the work of mailing a message. It\
    \ takes three parameters –\n\n- The *sender* – A string with the address of the\
    \ sender.\n- The *receivers* – A list of strings, one for each recipient.\n- The\
    \ *message* – A message as a string formatted as specified in the various RFCs.\n\
    \n## Example\n\nHere is a simple way to send one e-mail using Python script. Try\
    \ it once –\n\n```python\n#!/usr/bin/python3\n\nimport smtplib\n\nsender = 'from@fromdomain.com'\n\
    receivers = ['to@todomain.com']\n\nmessage = \"\"\"From: From Person <from@fromdomain.com>\n\
    To: To Person <to@todomain.com>\nSubject: SMTP e-mail test\n\nThis is a test e-mail\
    \ message.\n\"\"\"\n\ntry:\n   smtpObj = smtplib.SMTP('localhost')\n   smtpObj.sendmail(sender,\
    \ receivers, message)\n   print \"Successfully sent email\"\nexcept SMTPException:\n\
    \   print \"Error: unable to send email\"\n```\n\nHere, you have placed a basic\
    \ e-mail in message, using a triple quote, taking care to format the headers correctly.\
    \ An e-mail requires a **From**, **To**, and a **Subject** header, separated from\
    \ the body of the e-mail with a blank line.\n\nTo send the mail you use *smtpObj*\
    \ to connect to the SMTP server on the local machine. Then use the *sendmail*\
    \ method along with the message, the from address, and the destination address\
    \ as parameters (even though the from and to addresses are within the e-mail itself,\
    \ these are not always used to route the mail).\n\nIf you are not running an SMTP\
    \ server on your local machine, you can use *smtplib* client to communicate with\
    \ a remote SMTP server. Unless you are using a webmail service (such as gmail\
    \ or Yahoo! Mail), your e-mail provider must have provided you with the outgoing\
    \ mail server details that you can supply them, as follows –\n\n```python\nmail\
    \ = smtplib.SMTP('smtp.gmail.com', 587)\n```\n\n## Sending an HTML e-mail using\
    \ Python\n\nWhen you send a text message using Python, then all the content is\
    \ treated as simple text. Even if you include HTML tags in a text message, it\
    \ is displayed as simple text and HTML tags will not be formatted according to\
    \ the HTML syntax. However, Python provides an option to send an HTML message\
    \ as actual HTML message.\n\nWhile sending an e-mail message, you can specify\
    \ a Mime version, content type and the character set to send an HTML e-mail.\n\
    \n## Example\n\nFollowing is an example to send the HTML content as an e-mail.\
    \ Try it once –\n\n```python\n#!/usr/bin/python3\n\nimport smtplib\n\nmessage\
    \ = \"\"\"From: From Person <from@fromdomain.com>\nTo: To Person <to@todomain.com>\n\
    MIME-Version: 1.0\nContent-type: text/html\nSubject: SMTP HTML e-mail test\n\n\
    This is an e-mail message to be sent in HTML format\n\n<b>This is HTML message.</b>\n\
    <h1>This is headline.</h1>\n\"\"\"\n\ntry:\n    smtpObj = smtplib.SMTP('localhost')\n\
    \    smtpObj.sendmail(sender, receivers, message)\n    print \"Successfully sent\
    \ email\"\nexcept SMTPException:\n    print \"Error: unable to send email\"\n\
    ```\n\n## Python - POP3\n\nThe pop3 protocol is an email protocol to download\
    \ messages from the email-server. These messages can be stored in the local machine.\n\
    \n**Key Points**\n\n- POP is an application layer internet standard protocol.\n\
    - Since POP supports offline access to the messages, thus requires less internet\
    \ usage time.\n- POP does not allow search facility.\n- In order to access the\
    \ messages, it is necessary to download them.\n- It allows only one mailbox to\
    \ be created on server.\n- It is not suitable for accessing non mail data.\n-\
    \ POP commands are generally abbreviated into codes of three or four letters.\
    \ Eg. STAT.\n\n## POP Commands\n\nThe following table describes some of the POP\
    \ commands:\n\n| S.N. | Command Description |\n|---|---|\n| 1 | **LOGIN**<br>This\
    \ command opens the connection. |\n| 2 | **STAT**<br>It is used to display number\
    \ of messages currently in the mailbox. |\n| 3 | **LIST**<br>It is used to get\
    \ the summary of messages where each message summary is shown. |\n| 4 | **RETR**<br>This\
    \ command helps to select a mailbox to access the messages. |\n| 5 | **DELE**<br>It\
    \ is used to delete a message. |\n| 6 | **RSET**<br>It is used to reset the session\
    \ to its initial state. |\n| 7 | **QUIT**<br>It is used to log off the session.\
    \ |\n\nPython's **poplib** module provides classes named pop() and pop3_SSL()\
    \ which are used to achieve this requirement. We supply the hostname and port\
    \ number as argument. In the below example we connect to a gmail server and retrieve\
    \ the messages after supplying the login credentials.\n\n```python\nimport poplib\n\
    \nuser = 'username'\n# Connect to the mail box\nMailbox = poplib.POP3_SSL('pop.googlemail.com',\
    \ '995')\nMailbox.user(user)\nMailbox.pass_('password')\nNumofMessages = len(Mailbox.list()[1])\n\
    for i in range(NumofMessages):\n    for msg in Mailbox.retr(i+1)[1]:\n       \
    \ print msg\nMailbox.quit()\n```\n\nThe messages are retrieved when the above\
    \ program is run.\n\n## Python - IMAP\n\nIMAP is an email retrieval protocol which\
    \ does not download the emails. It just reads them and displays them. This is\
    \ very useful in low bandwidth condition. Python’s client side library called\
    \ **imaplib** is used for accessing emails over imap protocol.\n\n**IMAP** stands\
    \ for **Internet Mail Access Protocol**. It was first proposed in 1986.\n\n**Key\
    \ Points:**\n\n- IMAP allows the client program to manipulate the e-mail message\
    \ on the server without downloading them on the local computer.\n- The e-mail\
    \ is hold and maintained by the remote server.\n- It enables us to take any action\
    \ such as downloading, delete the mail without reading the mail. It enables us\
    \ to create, manipulate and delete remote message folders called mail boxes.\n\
    - IMAP enables the users to search the e-mails.\n- It allows concurrent access\
    \ to multiple mailboxes on multiple mail servers.\n\n## IMAP Commands\n\nThe following\
    \ table describes some of the IMAP commands:\n\n| S.N. | Command Description |\n\
    | :--- | :--- |\n| 1 | **IMAP_LOGIN**<br>This command opens the connection. |\n\
    | 2 | **CAPABILITY**<br>This command requests for listing the capabilities that\
    \ the server supports. |\n| 3 | **NOOP**<br>This command is used as a periodic\
    \ poll for new messages or message status updates during a period of inactivity.\
    \ |\n| 4 | **SELECT**<br>This command helps to select a mailbox to access the\
    \ messages. |\n| 5 | **EXAMINE**<br>It is same as SELECT command except no change\
    \ to the mailbox is permitted. |\n| 6 | **CREATE**<br>It is used to create mailbox\
    \ with a specified name. |\n| 7 | **DELETE**<br>It is used to permanently delete\
    \ a mailbox with a given name. |\n| 8 | **RENAME**<br>It is used to change the\
    \ name of a mailbox. |\n| 9 | **LOGOUT**<br>This command informs the server that\
    \ client is done with the session. The server must send BYE untagged response\
    \ before the OK response and then close the network connection. |\n\n## Example\n\
    \nIn the below example we login to a gmail server with user credentials. Then\
