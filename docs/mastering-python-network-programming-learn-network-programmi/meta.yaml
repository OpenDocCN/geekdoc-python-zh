    \ BouncerCompliant\nx-ua-compatible: IE=edge,chrome=1\nx-xss-protection: 1; mode=block;\n\
    report=https://twitter.com/i/xss_report\n```\n\n## Python - Directory Listing\n\
    \nPython can be used to get the list of content from a directory. We can make\
    \ program to list the content of directory which is in the same machine where\
    \ python is running. We can also login to the remote system and list the content\
    \ from the remote directory.\n\n## Listing Local Directory\n\nIn the below example\
    \ we use the listdir() method to get the content of the current directory. To\
    \ also indicate the type of the content like file or directory, we use more functions\
    \ to evaluate the nature of the content.\n\n```\nfor name in os.listdir('.'):\n\
    \    if os.path.isfile(name): print 'file: ', name\n    elif os.path.isdir(name):\
    \ print 'dir: ', name\n    elif os.path.islink(name): print 'link: ', name\n \
    \   else: print 'unknown', name\n```\n\nWhen we run the above program, we get\
    \ the following output –\n\n```\nfile: abcl.htm\ndir: allbooks\nlink: ulink\n\
    ```\n\nPlease note the content above is specific to the system where the python\
    \ program was run. The result will vary depending on the system and its content.\n\
    \n## Listing Remote Directory\n\nWe can list the content of the remote directory\
    \ by using ftp to access the remote system. Once the connection is established\
    \ we can use commands that will list the directory contents in a way similar to\
    \ the listing of local directories.\n\n```\nfrom ftplib import FTP\ndef main():\n\
    \    ftp = FTP('ftp.ibiblio.org')\n    ftp.login()\n    ftp.cwd('pub/academic/biology/')\
    \ # change to some other subject\n    entries = ftp.nlst()\n    ftp.quit()\n\n\
    \    print(len(entries), \"entries:\")\n    for entry in sorted(entries):\n  \
    \      print(entry)\n\nif __name__ == '__main__':\n    main()\n```\n\nWhen we\
    \ run the above program, we get the following output –\n\n```\n(6, 'entries:')\n\
    INDEX\nREADME\nacedb\ndna-mutations\necology+evolution\nmolbio\n```\n\n## Python\
    \ - Remote Procedure Call\n\nRemote Procedure Call (RPC) system enables you to\
    \ call a function available on a remote server using the same syntax which is\
    \ used when calling a function in a local library. This is useful in two situations.\n\
    \n- You can utilize the processing power from multiple machines using rpc without\
    \ changing the code for making the call to the programs located in the remote\
    \ systems.\n- The data needed for the processing is available only in the remote\
    \ system.\n\nSo in python we can treat one machine as a server and another machine\
    \ as a client which will make a call to the server to run the remote procedure.\
    \ In our example we will take the localhost and use it as both a server and client.\n\
    \n## Running a Server\n\nThe python language comes with an in-built server which\
    \ we can run as a local server. The script to run this server is located under\
    \ the bin folder of python installation and named as classic.py. We can run it\
    \ in the python prompt and check its running as a local server.\n\n```\npython\
    \ bin/classic.py\n```\n\nWhen we run the above program, we get the following output\
    \ –\n\n```\nINFO:SLAVE/18812:server started on [127.0.0.1]:18812\n```\n\n## Running\
    \ a Client\n\nNext we run the client using the rpyc module to execute a remote\
    \ procedure call. In the below example we execute the print function in the remote\
    \ server.\n\n```\nimport rpyc\nconn = rpyc.classic.connect(\"localhost\")\nconn.execute(\"\
    print('Hello from Tutorialspoint')\")\n```\n\nWhen we run the above program, we\
    \ get the following output –"
  mdcn: "## 重要特性\n\n-   它可以运行任何基于WSGI的Python Web应用程序。\n-   它可以处理静态文件，也可以单独用于提供文件和文件夹服务。\n\
    -   它采用线程池架构。\n-   它内置SSL支持。\n-   它是一个易于适配、易于使用的纯Python替代方案，既健壮又可靠。\n\n## Twisted\
    \ Web\n\n它是一个随Twisted网络库一起提供的Web服务器。Twisted本身是“一个事件驱动的网络引擎”，而Twisted Web服务器运行在WSGI之上，能够驱动其他Python\
    \ Web应用程序。\n\n## 重要特性\n\n-   它运行WSGI Python应用程序\n-   它可以像一个Python Web服务器框架一样工作，允许你使用该语言进行编程，以实现自定义HTTP服务目的\n\
    -   它通过Python脚本（.rpy）提供简单快速的原型开发能力，这些脚本在收到HTTP请求时执行\n-   它具备代理和反向代理功能\n-   它支持虚拟主机\n\
    -   它甚至可以提供Perl、PHP等服务\n\n## Python - 上传数据\n\n我们可以使用Python处理FTP（文件传输协议）的模块将数据上传到服务器。\n\
    \n我们需要安装**ftplib**模块来实现这一点。\n\n```\npip install ftplib\n```\n\n## 使用 ftplib\n\n\
    在下面的示例中，我们使用FTP方法连接到服务器，然后提供用户凭证。接着我们指定文件名和storbinary方法，以将文件发送并存储到服务器上。\n\n```\n\
    import ftplib\n\nftp = ftplib.FTP(\"127.0.0.1\")\nftp.login(\"username\", \"password\"\
    )\nfile = open('index.html','rb')\nftp.storbinary(\"STOR \" + file, open(file,\
    \ \"rb\"))\nfile.close()\nftp.quit()\n```\n\n当我们运行上述程序时，我们观察到服务器上已经创建了该文件的一个副本。\n\
    \n## 使用 ftpretty\n\n与ftplib类似，我们可以使用ftpretty安全地连接到远程服务器并上传文件。我们也可以使用ftpretty下载文件。下面的程序说明了这一点。\n\
    \n```\nfrom ftpretty import ftpretty\n\n# 指定主机\nhost = \"127.0.0.1\"\n\n# 提供凭证\n\
    f = ftpretty(host, user, pass )\n\n# 获取一个文件，保存到本地\nf.get('someremote/file/on/server.txt',\
    \ '/tmp/localcopy/server.txt')\n\n# 将本地文件放到远程位置\n# 不存在的子目录将自动创建\nf.put('/tmp/localcopy/data.txt',\
    \ 'someremote/file/on/server.txt')\n```\n\n当我们运行上述程序时，我们观察到服务器上已经创建了该文件的一个副本。\n\
    \n## Python - 代理服务器\n\n代理服务器用于通过另一台服务器浏览某个网站，以保持浏览的匿名性。它也可以用于绕过对特定IP地址的封锁。\n\n\
    我们使用urllib模块中的urlopen方法，通过将代理服务器地址作为参数传递来访问网站。\n\n## 示例\n\n在下面的示例中，我们使用一个代理地址来匿名访问网站twitter.com。响应状态为OK证明通过代理服务器成功访问。\n\
    \n```\nimport urllib\nURL = 'https://www.twitter.com'\nPROXY_ADDRESS = \"265.24.11.6:8080\"\
    \nif __name__ == '__main__':\n    resp = urllib.urlopen(URL, proxies = {\"http\"\
    \ : PROXY_ADDRESS})\nprint \"Proxy server returns response headers: %s \" %resp.headers\n\
    ```\n\n当我们运行上述程序时，我们得到以下输出 –\n\n```\nProxy server returns response headers: cache-control:\
    \ no-cache, no-store, must-revalidate, pre-check=0, post-check=0\ncontent-length:\
    \ 145960\ncontent-type: text/html;charset=utf-8\ndate: Mon, 02 Jul 2018 02:06:19\
