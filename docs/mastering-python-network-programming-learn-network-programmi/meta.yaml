    \ JSON based server and client.\n\n## Example\n\nIn the below example we create\
    \ a simple JSON server and create a function in it. This function breaks a bigger\
    \ list into smaller lists mentioning the length of the argument as well as the\
    \ argument itself.\n\n```python\n# server program\nfrom jsonrpclib.SimpleJSONRPCServer\
    \ import SimpleJSONRPCServer\n\ndef findlen(*args):\n    res = []\n    for arg\
