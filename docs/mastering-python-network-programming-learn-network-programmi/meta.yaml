  md: "# Python - SMTP\n\nSimple Mail Transfer Protocol (SMTP) is a protocol, which\
    \ handles sending an e-mail and routing e-mail between mail servers.\n\nPython\
    \ provides **smtplib** module, which defines an SMTP client session object that\
    \ can be used to send mails to any Internet machine with an SMTP or ESMTP listener\
    \ daemon.\n\nAn SMTP object has an instance method called **sendmail**, which\
    \ is typically used to do the work of mailing a message. It takes three parameters\
    \ –\n\n+   - The *sender* – A string with the address of the sender.\n- The *receivers*\
    \ – A list of strings, one for each recipient.\n- The *message* – A message as\
    \ a string formatted as specified in the various RFCs.\n\n# Example\n\nHere is\
    \ a simple way to send one e-mail using Python script. Try it once –\n\n```\n\
    #!/usr/bin/python3\n\nimport smtplib\n\nsender = 'from@fromdomain.com'\nreceivers\
    \ = ['to@todomain.com']\n\nmessage = \"\"\"From: From Person <from@fromdomain.com>\n\
    To: To Person <to@todomain.com>\nSubject: SMTP e-mail test\n\nThis is a test e-mail\
    \ message.\n\"\"\"\n\ntry:\n   smtpObj = smtplib.SMTP('localhost')\n   smtpObj.sendmail(sender,\
    \ receivers, message)\n   print \"Successfully sent email\"\nexcept SMTPException:\n\
    \   print \"Error: unable to send email\"\n```"
  merge: -1
