    \ of the webpage and increases the performance of the site considerably and further\
    \ enhancements or modifications become really straight forward. In python routing\
    \ is implemented in most of the web frame works. We will see the examples from\
    \ **flask** web framework in this chapter.\n\n# Routing in Flask\n\nThe **route()**\
    \ decorator in Flask is used to bind an URL to a function. As a result when the\
    \ URL is mentioned in the browser, the function is executed to give the result.\
    \ Here, URL '/hello' rule is bound to the **hello_world()** function. As a result,\
    \ if a user visits **http://localhost:5000/** URL, the output of the **hello_world()**\
    \ function will be rendered in the browser.\n\n```\nfrom flask import Flask\n\
    app = Flask(__name__)\n\n@app.route('/')\ndef hello_world():\n    return 'Hello\
