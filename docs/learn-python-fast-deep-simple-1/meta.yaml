    \ print anything!\nLet’s review the syntax of the if statement:\n\n![](img/2b9d07a40324ba64588fc622d9d72985_72_0.png)\n\
    \nWe need to write a condition after the if keyword. This condition usually checks\
    \ if two values are the same or not, so it must return a Boolean value, True or\
