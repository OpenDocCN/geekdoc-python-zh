  md: '# The range() function


    The `range()` function generates a List of numbers. This function accepts number
    or numbers and generates a sequence of numbers in a List. `range(1, 6)` generates
    a sequence of numbers in the given range:

    [1, 2, 3, 4, 5]

    We can also pass only one argument to this function, for example `range(6)` that
    generates a sequence of numbers that starts from 0 until 6:

    [0, 1, 2, 3, 4, 5]

    So if we pass only 1 argument to the `range()` function, the default start value
    will be 0.

    And also we can pass three arguments to the function, for example `range(1, 10,
    2)`. That the first argument defines start, the second argument defines the end
    and third argument defines the step. So the output of this `range()` function
    is:


    ![](img/2b9d07a40324ba64588fc622d9d72985_134_0.png)


    In other words, the step defines the incrementation. If we don''t specify the
    third argument, the default value will be 1.


    # Execute a code until a condition is true by using the While loop


    By using a For Loop, we can define how many times a code must be executed. But
    sometimes, there are situations that we don''t know the exact number of'
