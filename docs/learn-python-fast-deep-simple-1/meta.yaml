  - "[PAGE 135]\n\nrepetitions. In such a case, we should use While Loop. A While\
    \ Loop repeats a block of code as long as its condition is True:\n\n```\nnumber\
    \ = -1\n\nwhile number != 0:\n    number = input('Enter a number: ')\n    number\
    \ = int(number)\n    if number % 2 == 0:\n        print('{} is even.'.format(number))\n\
    \    else:\n        print('{} is odd.'.format(number))\n```\n\nThis program accepts\
    \ a number. If this number is even, then it executes line 7, and if the number\
    \ is odd, it executes line 9. This program runs indefinitely, unless we enter\
    \ 0. Because at line 3, we have defined while the number is not 0, run the While's\
    \ body (lines 4 to 9). Here is a sample output of this program:\n\n```\nEnter\
    \ a number: 2\n2 is even.\nEnter a number: 4\n4 is even.\nEnter a number: 5\n\
    5 is odd.\nEnter a number: 10\n10 is even.\nEnter a number: 0\n0 is even.\n```\n\
    \nWhen the condition of a while loop stays True forever, it executes its body\
    \ forever and is called infinite loop. So be careful about the condition."
  - "[PAGE 136]\n\nIn a nutshell, the While Loop helps us to run a block of code until\
    \ a condition is met. But if we need to iterate over a List, Tuple, Set or Dictionary,\
    \ For Loop is the better option.\n\n# Iterate over a collection of values\n\n\
    We can also use the For Loop and While Loop to iterate over a List, Tuple, Set\
    \ and Dictionary.\n\n# Iterate over a List\n\nYou already know how to iterate\
    \ over a List. Because the `range()` function generates a List and we iterated\
    \ over it in the previous examples.\nSo, we can simply iterate over a List by\
    \ using a For Loop. The For loop executes its body for as many elements as are\
    \ in the list. In this example, the list contains 3 items, so it executes the\
    \ For body (line 4) three times:\n\n```\npython\nfruites = ['\U0001F34E', '\U0001F34A\
    ', '\U0001F34B']\n\nfor fruit in fruites:\n    print(fruit)\n```\n\nWe can press\
    \ `Ctrl + .` to insert an emoji. *Consider each emoji as a character.*\n\n# Iterate\
    \ over a Tuple\n\nIterating over a Tuple is like Iterating over a List:"
  - '[PAGE 137]


    ![](img/2b9d07a40324ba64588fc622d9d72985_137_0.png)


    # # Iterating over a List of Lists


    We can also iterate over:


    +   - a List of Lists

    - or a List of Tuples

    - or a Tuple of Lists

    - or a Tuple of Tuples

    - ...


    The same pattern is true for Sets and Dictionaries.

    In this example, we have a List of Tuples and want to iterate over it. As you
    see, this List las 2 Tuples as its items:


    ![](img/2b9d07a40324ba64588fc622d9d72985_137_1.png)


    So, we use an outer loop (line 3) to iterate over tuples and use an inner loop
    (line 4) to iterate over items of each Tuple.

    Here is the Truth Table for this example:'
  - "[PAGE 138]\n\n| Iteration | a | b |\n| :--- | :--- | :--- |\n| **1th iteration\
    \ of outer loop** | ('\U0001F34E', '\U0001F34F') | '\U0001F34E' |\n| **1th iteration\
    \ of outer loop** | ('\U0001F34E', '\U0001F34F') | '\U0001F34F' |\n| **2th iteration\
    \ of outer loop** | ('\U0001F34A', '\U0001F34B') | '\U0001F34A' |\n| **2th iteration\
    \ of outer loop** | ('\U0001F34A', '\U0001F34B') | '\U0001F34B' |\n\nIn other\
    \ words, the outer Loop executes its body (line 4) two times and in each execution\
    \ (iteration), the inner loop executes its body (line 5) two times.\n\n# Iterating\
    \ over a Set\n\nIterating over a Set is like a List or Tuple:\n\n```\npython\n\
    fruites = {'\U0001F34E', '\U0001F34A', '\U0001F34B', '\U0001F34E'}\n\nfor fruit\
    \ in fruites:\n    print(fruit)\n```\n\nAs you remember, a Set removes duplicate\
    \ items automatically.\n\n# Iterating over a Dictionary\n\nAs you know, a Dictionary\
    \ is a collection of key-value pairs. When we use a For Loop to iterate over a\
    \ Dictionary, the For Loop assigns the key to the variable in each iteration.\
    \ That is why in this example it prints only the keys:"
- md: "We can get values by using keys. To do so, all we need to do is to use the\
    \ key name to get the value (line 4):\n\nOr we can directly iterate over the values\
    \ by using the `values()` function:\n\n## Python Break and Continue\n\nWe can\
    \ use Break and Continue to terminate or alter the normal flow of a Loop.\n\n\
    ## Break a Loop\n\nWe can use the *Break* statement to terminate a *For Loop*\
    \ or *While Loop* immediately if a certain condition is met. In this example,\
    \ we use the Break to finish an endless loop. This program accepts unlimited numbers\
    \ from us and adds them together. If we enter =, then it terminates the endless\
    \ loop by using the Break statement:\n\n```\nsum = 0\n\nwhile True:\n    value\
    \ = input('Enter a number (or = to quit): ')\n    if value == '=':\n        break\n\
    \    sum += int(value)\n\nprint('Sum is: {}'.format(sum))\n```\n\n**At line 1**\
    \ we defined a variable named sum that will hold the sum of the numbers\n\n**At\
    \ line 3** we defined an infinite loop. Because the condition is always True\n\
    \n**At line 4** we get a value from the user\n\n**At line 5** we check if the\
    \ value is =, then we must end the loop by using the **break** (line 6). Otherwise,\
    \ add the value to the current value of the sum\n\nThis is the output of this\
    \ app:\n\nSo, when a Break happens, the Loop ignores the remained iterations and\
    \ terminates the Loop.\n\n## Continue a Loop\n\nThe Continue statement ignores\
    \ the remained block code and returns the loop execution to the beginning of the\
    \ loop. For example, let’s check if the value is not a number, ends the current\
    \ iteration and returns to the beginning of the loop. We use `isnumeric()` method\
    \ to check if all the characters are numeric:\n\n```\npython\nsum = 0\n\nwhile\
    \ True:\n    value = input('Enter a number (or = to quit): ')\n    if value ==\
    \ '=':\n        break\n    elif value.isnumeric() == False:\n        continue\n\
    \    else:\n        sum += int(value)\n\nprint('Sum is: {}'.format(sum))\n```\n\
    \nThe output is like this:\n\nAt line 7 we check if the user enters a value that\
    \ is not numeric, then we ignore the rest of that iteration and moves to the next\
    \ iteration by using the Continue statement (line 8).\n\n> In a nutshell, the\
    \ Break statement ends a loop completely, but a Continue statement ends the current\
    \ iteration and moves to the next iteration if exist.\n\n## The Pass Statement\n\
    \nWe can use the Pass statement as a placeholder for a functionality we add later.\
    \ In other words, we know we need a body (for a function or loop), but for now,\
    \ we don't care about the implementation:\n\n```\npython\nfor i in range(6):\n\
    \    pass\n```\n\nSo, when the pass is executed, nothing happens. This is useful\
    \ when we need to implement the main structure of our program and then implement\
    \ the details.\n\n## Return multiple values from a function by using sequences\n\
    \nIf we need to return multiple values from a function, we can return a sequence\
    \ like List, Tuple, Set or Dictionary. For example, the following function returns\
    \ multiple temperatures by using a List:\n\n```\ndef getPizzaToppings():\n   \
    \ toppings = ['Bacon', 'Pepperoni', 'Mushrooms']\n    return toppings\n\ntoppings\
    \ = getPizzaToppings()\nprint(toppings)\n```\n\nBy doing so, we can simply return\
    \ multiple values instead of one value from a function:\n\n```\n['Bacon', 'Pepperoni',\
    \ 'Mushrooms']\n```\n\nIt is also possible to send sequences as arguments:\n\n\
    ```\npython\ndef printFavorites(name, foods):\n    print(f'{name} is interested\
    \ in {foods}')\n\nprintFavorites('Taylor', ['Pasta', 'Pizza', 'Rice'])\n\nprintFavorites('Alice',\
    \ ['Potato', ['Vegetables']])\n```\n\nThe output is\n\n```\nTaylor is interested\
    \ in ['Pasta', 'Pizza', 'Rice']\nAlice is interested in ['Potato', ['Vegetables']]\n\
    ```\n\n## Python Loops Exercises\n\nAre you ready to level up your Python skills?\
    \ Dive into a world of hands-on learning with the exercises I've carefully crafted\
    \ just for you.\n\nWhy just read about Python when you can put your knowledge\
    \ into action? These exercises are designed to reinforce your understanding of\
    \ key concepts, sharpen your problem-solving abilities, and ignite your creativity.\n\
    \nRemember, practice makes perfect. By actively engaging with these exercises,\
    \ you'll not only build proficiency but also develop a robust programming mindset.\
    \ Embrace the thrill of discovery, experiment with different approaches, and unlock\
    \ the true potential of Python.\n\nDon't just be a passive reader—be an active\
    \ learner!\n\n[Python Loops Exercises – Dejavu Code](https://dejavu-code.com)\n\
    \n## What’s next?\n\nLooking to get a deeper understanding of Python programming?\
    \ Look no further than my exclusive [Premium Python Course](Premium Python Course)!\
