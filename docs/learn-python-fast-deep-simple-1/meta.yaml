    \n### else 部分\n\nelse 部分是一个备选代码块，当之前的条件不为 True 时执行。假设我们需要在密码较弱时打印另一条消息。所以，像这样修改代码：\n\
    \n```python\npassword = input('Please enter your password: ')\n\nif len(password)\
