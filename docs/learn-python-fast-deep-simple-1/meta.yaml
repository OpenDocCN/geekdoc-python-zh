    with Numbers. Let’s see how they work with Strings.


    When the operands are of type String, the comparison operators compare the operands
    (Strings) letter by letter:


    ```

    1  password = "aBc"

    2  confirmedPassword = "aBc"

    3

    4  arePassSame = password == confirmedPassword

    5

    6  print(arePassSame)

    ```


    The result of **arePassSame** is True because the two operands are the same. In
    other words:


    ```

    1  password = "aBc"

    2  confirmedPassword = "aBc"

    ```


    ‘a’ is equal to ‘a’

    and ‘B’ is equal to ‘B’

    and ‘c’ is equal to ‘c’'
  - '[PAGE 58]


    So, when all the characters are the same, the final result is True. Otherwise,
    the result is False. For example, in this case, as ‘c’ is not equal with ‘d’,
    the result is False:


    ```

    1  password = "aBc"

    2  confirmedPassword = "aBd"

    3

    4  arePassSame = password == confirmedPassword

    5

    6  print(arePassSame)


    False

    ```


    Even the following program will print False, because ‘B’ is not equal with ‘b’
    as Python is a *case sensitive* programming language:


    ```

    1  password = "aBc"

    2  confirmedPassword = "abc"

    3

    4  arePassSame = password == confirmedPassword

    5

    6  print(arePassSame)


    False

    ```


    So, the Comparison Operators compares Strings letter by letter.


    # Boolean (Logical) operators


    Sometimes we have Boolean values to compare. To do so, we usually use these two
    Boolean operators:


    +   - and

    - or'
  - '[PAGE 59]


    Boolean operators return True or False.


    | Operator | Description |

    | :--- | :--- |

    | **and** | Evaluates down to True if both the operands are True |

    | **or** | Evaluates down to True even if one of the operands is True |


    The and operator takes two Boolean values or expressions and evaluates down to
    True if both the operands are True. Otherwise, it returns False:


    ![](img/2b9d07a40324ba64588fc622d9d72985_59_0.png)


    Note that the Boolean operators can work with expressions too. *An expression
    is a combination of operands and operators:*


    ![](img/2b9d07a40324ba64588fc622d9d72985_59_1.png)


    The or operator takes two Boolean values or expressions and evaluates down to
    False if both the operands are False. Otherwise, it returns True:'
  - '[PAGE 60]


    ![](img/2b9d07a40324ba64588fc622d9d72985_60_0.png)


    # Understanding the Operator Precedence


    In simple expressions that have one operator and two operands, the order is not
    important. But when we have multiple operators and operands in one expression,
    then we must be aware about a concept called Operator Precedence. *This precedence
    simply defines the order of execution.*


    To make it clear, I ask you to guess the output of this program:


    ![](img/2b9d07a40324ba64588fc622d9d72985_60_1.png)


    The result is 25:


    ![](img/2b9d07a40324ba64588fc622d9d72985_60_2.png)


    Why? Because Multiplication has a higher order than Addition. So, it first calculates
    2 * 10 and then adds the result with 5.


    Here is the order of operators in Python:'
  - '[PAGE 61]


    | Operator | Description |

    | :--- | :--- |

    | **()** | Parentheses |

    | **\*\*** | Exponent |

    | **\*, /, //, %** | Multiplication, Division, Floor division, Modulus |

    | **+, -** | Addition, Subtraction |

    | **==, !=, >, >=, <, <=** | Comparisons |

    | **and** | Logical AND |

    | **or** | Logical OR |


    Note that the operators with the same precedence have left-to-right associativity.
    For example, in an expression like this:


    5 + 2 – 3


    the Addition and Subtraction have the same precedence. So, it evaluates the expression
    from left to right.


    Also, you may have noticed that Parentheses have the highest precedence. We can
    use this feature of parentheses to simplify expressions:


    ![](img/2b9d07a40324ba64588fc622d9d72985_61_0.png)


    So now we, as humans, have a better understanding on how line 1 will be executed.


    Also, we can use parentheses to change the default precedence:'
