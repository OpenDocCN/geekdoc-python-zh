    \ 变量的内容：\n\n如你所知，`print()` 函数需要一个字符串来打印。在编程术语中，我们称之为参数。参数是我们向函数提供更多信息的一种方式。我们将参数放在函数的圆括号之间。有时函数可以在没有任何参数的情况下工作，比如\
    \ `input()`。然而，input 函数可以接受一个字符串作为参数，我稍后会谈到这一点：\n\n换句话说，`print()` 函数需要一个字符串来显示在控制台中。有时我们通过使用单引号来提供这个参数，有时我们从像\
    \ `input()` 这样的函数获取一个字符串，然后将 `input()` 函数的结果传递给 `print()` 函数。\n\n## Python 区分大小写\n\
    \nPython 是一种区分大小写的编程语言。这意味着 Python 对大写和小写字母的处理是不同的。因此，它区分大写和小写的变量：\n\n第 2 行生成了一条错误消息。因为\
