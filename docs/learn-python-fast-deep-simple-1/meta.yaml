    ```python\nemail = input(\"Please enter your email: \")\nconfirmedEmail = input(\"\
    Please enter your email again: \")\n\nareEmailsTheSame = email == confirmedEmail\n\
    \nprint(\"Are emails the same: {}\".format(areEmailsTheSame))\n```\n\nYou can\
    \ think about this code. Why this code doesn't meet our needs?\nBecause, our user\
    \ may enter her/his email in different formats:\nemail@gmail.com\nEmail@gmail.com\n\
    Email@Gmail.com\nAnd as we know, Python is Case-Sensitive. So, Python considers\
    \ the emails as three different texts:\n\n![](img/2b9d07a40324ba64588fc622d9d72985_67_0.png)\n\
    \nSo we need something like **upper()** or **lower()** to uppercase the inputs\
    \ or lowercase them and after that check if they’re the same:\n\n```python\nemail\
    \ = input(\"Please enter your email: \")\nconfirmedEmail = input(\"Please enter\
    \ your email again: \")\n\nareEmailsTheSame = email.lower() == confirmedEmail.lower()\n\
    \nprint(\"Are emails the same: {}\".format(areEmailsTheSame))\n```\n\nNow our\
    \ program works fine:\n\n![](img/2b9d07a40324ba64588fc622d9d72985_67_1.png)\n\n\
    Let’s see another example that directly prints the result of the **lower()** and\
    \ **upper()**:\n\n![](img/2b9d07a40324ba64588fc622d9d72985_68_0.png)\n\nYou may\
    \ have noticed that some functions comes after a period, like `lower()` and some\
    \ are called like `len()`.\n\n### find() function\n\nThis function is used to\
    \ search inside a String. This function returns the index of first occurrence\
    \ of a substring from the given String:\n\n![](img/2b9d07a40324ba64588fc622d9d72985_68_1.png)\n\
    \nThe output is 6, because first occurrence of ‘there’ is at index 6. As said\
    \ before, in Python counting starts from zero.\nIn other words, Python has found\
    \ ‘there’ at the 6th character in this string.\nPlease note that this function\
    \ is Case-Sensitive. So, for example, it can’t find ‘There’ as T is in uppercase.\
    \ When it can’t find anything, then it returns -1:\n\n```python\nsentence = \"\
    Hello there!\"\n\nresult = sentence.find(\"There\")\n\nprint(result)\n```\n\n\
    ```\n-1\n```\n\n## Section 7\n\n## Conditional Execution\n\nIt is time to learn\
    \ how to make decisions in our programs. As you’ve seen so far, the Python interpreter\
    \ normally executes the code in order from the top to the bottom. But We can use\
    \ conditional statements to execute different code blocks based on different conditions.\n\
    \n### The if statement\n\nThe simplest decision-making statement is if statement.\
    \ if is the most common flow control in Python. Let’s get a password from our\
    \ user and if it is a strong password, then prints ‘it is a strong password’:\n\
    \n```python\npassword = input('Please enter your password: ')\n\nif len(password)\
    \ >= 8:\n    print('Your password is strong!')\n```\n\nWe can read line 3 like\
    \ this: if the length of the password (variable) is greater than or equal to 8\
    \ then execute line 4 else skip line 4.\nRun this program two times. The first\
    \ time enter a password that its length is greater than or equal to 8 characters.\
    \ It will print a message that says ‘Your password is strong!’\n\n![](img/2b9d07a40324ba64588fc622d9d72985_71_0.png)\n\
