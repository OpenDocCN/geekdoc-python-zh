    So, we use () parentheses to create a new Tuple. That’s why the Console uses parentheses
    to display the result.

    As said earlier, Tuples are immutable (unchangeable). So, we can’t use functions
    that edit a Tuple like:


    +   - insert()

    - extend()

    - remove()

    - clear()

    - sort()


    But we can use the same functions that are used for retrieving items of a Tuple
    like:


