    # Section 9


    # Data Structures in Python


    In Python and other programming languages, a Data Structure defines the way that
    a group of related data can be stored under one name. In simple words, until now,
    we defined variables to store one value. But by using a Data Structure, we can
    store multiple values into one variable.


    ![](img/2b9d07a40324ba64588fc622d9d72985_97_0.png)


    In Python, we usually use these Data Structures:


    +   - List

    - Tuple'
  - '[PAGE 98]


    +   - Set

    - Dictionary

    - Array


    Each of these Data Structures has its own way of storing and retrieving data.
    Let me clarify one thing now. We have multiple Data Structures because each of
    them has its own way of storing and retrieving data. For example, Tuples in Python
    consumes less memory than Lists. So, when we have a large amount of data needs
    to be stored and *we know the exact number of these data*, it is better to use
    Tuples over Lists. *But sometimes we don''t know how many values we need to store.
    In this case, Lists are a good replacement for Tuples.*


    # List Data Structure in Python


    Lists are one of the main Data Structures in Python that we need to know.

    Let''s define a List that represents the temperature in Miami in the last 7 days
    (last week):


    ![](img/2b9d07a40324ba64588fc622d9d72985_98_0.png)


    ```

    python

    tempInMiami = [27, 29, 30, 30, 28, 29, 30]

    ```


    Now we have a variable named **tempInMiami** that have 7 values! **In technical
    terms, we have a list with 7 items.** So, to create a list we need to enclose
    the items in `[]` (square brackets) and each item needs to be separated by a `,`
    (comma).


    But we can store these 7 values into 7 variables! Is there any advantage with
    Data Structures like Lists?'
