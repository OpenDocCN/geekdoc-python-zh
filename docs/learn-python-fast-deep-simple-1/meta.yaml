    | **or** | Evaluates down to True even if one of the operands is True |


    The and operator takes two Boolean values or expressions and evaluates down to
    True if both the operands are True. Otherwise, it returns False:


    ![](img/2b9d07a40324ba64588fc622d9d72985_59_0.png)


