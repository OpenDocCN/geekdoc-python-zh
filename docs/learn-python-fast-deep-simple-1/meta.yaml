    \ninput() 函数的结果就是我们输入的字符串。但我们必须将这个 input() 函数的结果保存在某个地方以备后用。为此，我们需要使用一个变量。我们在程序中使用变量来记住信息。可以把变量想象成一个容器，它可以容纳一个值，并且上面有一个标签。所以，一个变量有一个值和一个名字。每当我们需要给变量赋值或获取其值时，只需调用它的名字即可。\n\
