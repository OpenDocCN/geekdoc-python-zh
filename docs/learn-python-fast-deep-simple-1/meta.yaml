    \ an input from user and assigns it to the `country` variable (line 2) and returns\
    \ the value of the `country` variable (line 3) A function can return any type\
    \ of value including strings, numbers or Booleans. We can even return the result\
    \ of input() function directly without using the country variable, but it is not\
    \ recommended as it decreases code readability.\n\n**At line 6** We first calls\
    \ the `get_country()`, so it executes this function and after the execution, returns\
    \ the value of the `country` variable. Returns to where? It returns to the place\
    \ that `get_country()` is called.\n\nSo, a function can return a value by using\
    \ the `return` keyword. *We usually put the return at the end of a function.*\
    \ Because a return ends the function execution and returns the result to the caller.\n\
    \nWhen we run this program, we will get the same result. Now let’s extract Task\
