- md: 'At the present time, we cannot use human languages like English to express
    our wishes to the computers. Instead, we must use a programming language like
    Python that computers know about it.


    By using a programming language, we’re able to write programs that instruct a
    computer on how, for example, our data must be processed and what kind of reports
    must be generated.


    ## What Python offers us?


    Python is a simple programming language that anyone can learn at any age. But
    at the same time, Python is a multi-purpose programming language that has a wide
    range of usages including:


    - Web Development

    - Desktop Development

    - Data Analysis

    - Data Visualization

    - Machine Learning and AI (artificial intelligence)

    - Game Development

    - Task automation and Everyday Tasks

    - Much more


    In addition, Python is recommended if you’re looking for an easy language to learn
    first. It is quite simple to understand for someone who’s new to programming.


    ## What makes Python powerful?


    One of the reasons Python is so powerful and vast is that there are so many libraries
    and frameworks for it. A programming library is a collection of prewritten codes
    that save us from needing to reinvent the wheel.


    For example, in Data Analysis programs, we display the results with numbers, graphs
    and charts as data visualization expresses the results better than textual numbers.
    To visualize the results, we have two options:


    1. **Reinvent the wheel:** In this case, we have to write everything from scratch.
    It means we have to write thousands of lines of code to visualize the data. So,
    we have to spend a lot of time and money on it.

    2. **Use libraries:** Or we can simply use existing libraries written by other
    companies or individuals. In this case, they have written the ins and outs of
    drawing charts and graphs. All we need to do is to simply use the library in our
    program with a few lines of code without any worries about bugs and errors!


    Therefore, we usually need to use Python along with libraries to write our programs
    in the most optimal way possible.


    Also, frameworks are similar to libraries in some ways. A framework is a set of
    codes usually written by other companies or individuals that can be used to define
    the structure and skeleton of our programs.


    So, both the libraries and frameworks are prewritten codes developed by other
    developers or companies that we use to save our time and money.


    ## The most popular Python libraries and frameworks


    There are lots of libraries and frameworks out there. But the most developers
    and companies usually use:


    - Python + Django to develop secure and maintainable websites

    - Python + Tkinter or PyQt to develop Graphical User Interfaces or GUI applications

    - Python + Pandas for data science

    - Python + Matplotlib for data visualization

    - Python + NumPy for AI and machine learning

    - Python + Pygame to create video games

    - Python + Requests or CSV or APScheduler or Selenium and many other libraries
    for task automation


    ## Best book | course | bootcamp to learn everything


    Even though there are lots of libraries and frameworks for Python, but you don’t
    need to learn all of them!


    In other words, it doesn’t make sense for one person to be a web developer, a
    software developer, a game developer, an AI developer or a data science developer
    at the same time! Instead, we should become a professional in one or two of these.


    So, there is no book or course or bootcamp that covers everything about Python.
    Instead, anyone who wants to enter in this field, must do two things:


    1. Learns the Python programming languages

    2. Learns libraries and frameworks that are related to his/her choice


    For example, if you want to be a data scientist developer, you must learn the
    Python language plus libraries like NumPy.


    ## What this book offers to you?


    So, in this book, you will get a strong understanding about the basics of Python
    programming language. After learning the basic concepts about Python, you can
    choose your desired field and based on your decision, choose another book or course
    which specifically teaches you a certain library or framework. *That is why we
    have lots of resources that each of which has addressed a specific field in Python.*
    Here is a list of books published just by Apress about Python and the libraries
    and frameworks that work with it:


    ## How to become a professional Python developer?


    As a conclusion, the best way to become a professional Python developer is to
    first learn and understand the foundation concepts about the Python. After that,
    focus on your favorite field (libraries and frameworks). Don’t rush and just focus
    on learning the Python programming language properly. This is what we’re going
    to do in this book.


    # Section 2


    ## Software requirements


    ## Does it matter what operating system I use?


    Fortunately, we can use Windows, Linux or Mac. However, it is possible to use
    Android or iOS devices to write Python programs, but I don’t recommend it.


    ## What computer program do people use to write code?


    The easiest option for a beginner is to use an online Python IDE (Integrated Development
    Environment). An IDE is a program that integrates several tools for software development.
    These tools help us to write, test and debug (find bugs) the programs. And as
    we want to write Python programs, so we need to have an IDE for this purpose.


    There are lots of online IDEs and code editors for Python development like [replit](https://replit.com/).
