    ## Operators in Python


    In mathematics and computer programming, an operator is a symbol or character
    that performs a specific operation. The important operators in Python are:


    - Arithmetic operators

    - Assignment operators

    - Comparison operators

    - Boolean (Logical) operators


    ## Arithmetic operators


    Sometimes we need to perform arithmetic calculations in our programs. To do so,
    we use these commonly used Arithmetic operators:


    | Operator | Description | Example |

    | :--- | :--- | :--- |

    | + | Addition | 10 + 5 = 15 |

    | - | Subtraction | 10 – 5 = 5 |

    | * | Multiplication | 10 * 5 = 50 |

