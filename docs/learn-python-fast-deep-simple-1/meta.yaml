    \ two integers or floats or Booleans or strings. Don't forget to put colon after\
    \ the condition. In the next line, press the Tab button and write the code that\
    \ you wish to be executed when the condition is met.\n\nWhen the result of the\
    \ condition is True, it executes the if body. *We can indicate the if body by\
    \ the indentation. A body can be a single line or multiple lines that are indented.*\n\
    \nAnd when the condition is not met, Python will execute the code after the if\
    \ body. That is why when we enter a password that its length is less than 8 characters,\
    \ it won't print the message.\n\nWe can hold the result of the condition in a\
    \ variable and use the variable as the condition:\n\n![](img/2b9d07a40324ba64588fc622d9d72985_72_1.png)\n\
    \nWhen **isEligible** is True, it runs line 5, otherwise it skips line 5.\nAs\
    \ said earlier, an if body can be a single line or multiple lines. Here is a two-lines\
    \ body:\n\n![](img/2b9d07a40324ba64588fc622d9d72985_73_0.png)\n\n### The else\
    \ part\n\nThe else part is an alternative code block that is executed if the previous\
    \ condition is not True. Suppose that we need to print another message when the\
    \ password is weak. So, change the code like this:\n\n```python\npassword = input('Please\
    \ enter your password: ')\n\nif len(password) >= 8:\n    print('Your password\
    \ is strong!')\n\nif len(password) < 8:\n    print('Your password is weak!')\n\
    ```\n\nNow we have two if statements. One of them checks if the password is greater\
    \ than or equal to 8 characters and prints the appropriate message when its conditions\
    \ is met and the other if statement (at line 6) checks if the password length\
    \ is less than 8 characters and if so, it prints another message."
