  mdcn: "我们可以通过键来获取值。为此，我们只需使用键名来获取值（第4行）：\n\n或者我们可以直接使用 `values()` 函数来遍历所有值：\n\n\
    ## Python 中的 Break 和 Continue\n\n我们可以使用 Break 和 Continue 来终止或改变循环的正常流程。\n\n##\
    \ 终止循环\n\n我们可以使用 *Break* 语句在满足特定条件时立即终止 *For 循环* 或 *While 循环*。在这个例子中，我们使用 Break\
    \ 来结束一个无限循环。这个程序可以接受我们输入的无限个数字并将它们相加。如果我们输入 =，它就会使用 Break 语句来终止无限循环：\n\n```\n\
    sum = 0\n\nwhile True:\n    value = input('Enter a number (or = to quit): ')\n\
    \    if value == '=':\n        break\n    sum += int(value)\n\nprint('Sum is:\
    \ {}'.format(sum))\n```\n\n**在第1行**，我们定义了一个名为 sum 的变量，它将用于存储数字的总和。\n\n**在第3行**，我们定义了一个无限循环。因为条件始终为\
    \ True。\n\n**在第4行**，我们从用户那里获取一个值。\n\n**在第5行**，我们检查该值是否为 =，如果是，那么我们必须使用 **break**（第6行）来结束循环。否则，将该值加到\
    \ sum 的当前值上。\n\n这是该程序的输出：\n\n因此，当 Break 发生时，循环会忽略剩余的迭代并终止循环。\n\n## 继续循环\n\nContinue\
    \ 语句会忽略剩余的代码块，并将循环执行返回到循环的开头。例如，让我们检查该值是否不是数字，如果是，则结束当前迭代并返回到循环的开头。我们使用 `isnumeric()`\
    \ 方法来检查所有字符是否都是数字：\n\n```\npython\nsum = 0\n\nwhile True:\n    value = input('Enter\
    \ a number (or = to quit): ')\n    if value == '=':\n        break\n    elif value.isnumeric()\
    \ == False:\n        continue\n    else:\n        sum += int(value)\n\nprint('Sum\
    \ is: {}'.format(sum))\n```\n\n输出如下：\n\n在第7行，我们检查用户输入的值是否不是数字，如果是，那么我们忽略该次迭代的剩余部分，并使用\
    \ Continue 语句（第8行）移动到下一次迭代。\n\n> 简而言之，Break 语句会完全结束一个循环，而 Continue 语句则会结束当前迭代，并在存在下一次迭代时移动到下一次迭代。\n\
    \n## Pass 语句\n\n我们可以使用 Pass 语句作为稍后添加的功能的占位符。换句话说，我们知道需要一个主体（用于函数或循环），但现在我们不关心具体实现：\n\
    \n```\npython\nfor i in range(6):\n    pass\n```\n\n因此，当 pass 被执行时，什么也不会发生。这在我们需要先实现程序的主要结构，然后再实现细节时非常有用。\n\
    \n## 使用序列从函数返回多个值\n\n如果我们需要从函数返回多个值，我们可以返回一个序列，如列表、元组、集合或字典。例如，以下函数使用列表返回多个温度值：\n\
    \n```\ndef getPizzaToppings():\n    toppings = ['Bacon', 'Pepperoni', 'Mushrooms']\n\
    \    return toppings\n\ntoppings = getPizzaToppings()\nprint(toppings)\n```\n\n\
    通过这样做，我们可以简单地从函数返回多个值，而不是一个值：\n\n```\n['Bacon', 'Pepperoni', 'Mushrooms']\n```\n\
    \n也可以将序列作为参数传递：\n\n```\npython\ndef printFavorites(name, foods):\n    print(f'{name}\
    \ is interested in {foods}')\n\nprintFavorites('Taylor', ['Pasta', 'Pizza', 'Rice'])\n\
    \nprintFavorites('Alice', ['Potato', ['Vegetables']])\n```\n\n输出是\n\n```\nTaylor\
    \ is interested in ['Pasta', 'Pizza', 'Rice']\nAlice is interested in ['Potato',\
    \ ['Vegetables']]\n```\n\n## Python 循环练习\n\n准备好提升你的 Python 技能了吗？深入我为你精心设计的实践学习世界。\n\
    \n既然可以将知识付诸实践，为什么只是阅读关于 Python 的内容呢？这些练习旨在巩固你对关键概念的理解，提高你解决问题的能力，并激发你的创造力。\n\n\
    记住，熟能生巧。通过积极参与这些练习，你不仅能建立熟练度，还能培养强大的编程思维。拥抱发现的兴奋感，尝试不同的方法，并释放 Python 的真正潜力。\n\n\
    不要只做一个被动的读者——要做一个主动的学习者！\n\n[Python 循环练习 – Dejavu Code](https://dejavu-code.com)\n\
    \n## 下一步是什么？\n\n想要更深入地了解 Python 编程吗？那就看看我独家的 [高级 Python 课程](Premium Python Course)\
    \ 吧！立即加入，解锁丰富的专家见解和前沿概念。"
