    ## Assignment operators


    You already know how the `=` (assignment operator) works. It assigns a value into
    a variable for later use:


    ![](img/2b9d07a40324ba64588fc622d9d72985_55_0.png)


    However, there’re times that we need to reassign a variable with a new value:


    ```python

    onlineCustomers = 102


    onlineCustomers = onlineCustomers + 3

    ```


    Python offers the Assignment operators. So, we can simply add 3 to the **onlineCustomers**
    by using `+=` operator without any repetition:


    ```python

    onlineCustomers = 102


    onlineCustomers += 3

    ```


    Let’s take a look at common Assignment operators in Python:


    | Operator | Example | Same As |

    | :--- | :--- | :--- |

    | = | x = 10 | x = 10 |

    | += | x += 2 | x = x + 2 |

    | -= | x -= 2 | x = x - 2 |

    | *= | x *= 2 | x = x * 2 |

    | /= | x /= 2 | x = x / 2 |

    | %= | x %= 2 | x = x % 2 |


    As you see, each Assignment operator like the Arithmetic operator needs two operands
    to work on.


    ## Comparison operators


    Comparison operators compare two values (operands) and evaluate down to a Boolean
    result, True or False. You already seen the == (Equal to) operator:


    ```python

    myShoeSize = 43


    shoeSize = 43


    isShoeFit = myShoeSize == shoeSize

    ```


    > The equal to == operator evaluates down to a Boolean result. In this case, the
    result is True.


    In Python, there are other Comparison Operators:


    | Operator | Meaning | Example | Result |

    | :--- | :--- | :--- | :--- |

    | == | Equal to | 10 == 10 | True |

    | != | Not equal to | 10 != 10 | False |

    | < | Less than | 10 < 10 | False |

    | > | Greater than | 10 > 10 | False |

    | <= | Less than or equal to | 10 <= 10 | True |

    | >= | Greater than or equal to | 10 >= 10 | True |


    The != (not equal to) evaluates to False when the operands (values on both sides)
    are the same.


    Another point about the comparison operators is that the operands can be Numbers
    or Strings or Boolean values. You already see how the comparison operators work
    with Numbers. Let’s see how they work with Strings.


    When the operands are of type String, the comparison operators compare the operands
    (Strings) letter by letter:


    ```python

