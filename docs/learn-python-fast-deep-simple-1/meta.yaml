    \    country = input('Please enter a country name: ')\n    return country\n\n\
    def country_to_capital():\n    country = get_country()\n\n    capital = ''\n\n\
    \    if country == 'France':\n        capital = 'Paris'\n    elif country == 'Germany':\n\
