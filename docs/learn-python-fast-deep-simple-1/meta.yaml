    ![](img/2b9d07a40324ba64588fc622d9d72985_60_1.png)


    结果是25：


    ![](img/2b9d07a40324ba64588fc622d9d72985_60_2.png)


    为什么？因为乘法的优先级高于加法。所以，它先计算2 * 10，然后将结果与5相加。


    以下是Python中运算符的优先级顺序：


    | 运算符 | 描述 |

    | :--- | :--- |

    | **()** | 圆括号 |

    | **\*\*** | 幂运算 |

    | **\*, /, //, %** | 乘法、除法、整除、取模 |

    | **+, -** | 加法、减法 |

    | **==, !=, >, >=, <, <=** | 比较 |

    | **and** | 逻辑与 |

    | **or** | 逻辑或 |


    请注意，具有相同优先级的运算符具有从左到右的结合性。例如，在像这样的表达式中：


    5 + 2 – 3


    加法和减法具有相同的优先级。因此，它从左到右计算表达式。


    另外，你可能已经注意到圆括号具有最高的优先级。我们可以利用圆括号的这个特性来简化表达式：


    ![](img/2b9d07a40324ba64588fc622d9d72985_61_0.png)


    所以现在，作为人类，我们能更好地理解第1行将如何执行。


