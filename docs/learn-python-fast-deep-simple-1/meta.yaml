    and ‘B’ is equal to ‘B’

    and ‘c’ is equal to ‘c’


    So, when all the characters are the same, the final result is True. Otherwise,
    the result is False. For example, in this case, as ‘c’ is not equal with ‘d’,
    the result is False:


    ```python

    password = "aBc"

    confirmedPassword = "aBd"


    arePassSame = password == confirmedPassword


    print(arePassSame)

    ```


    False


    Even the following program will print False, because ‘B’ is not equal with ‘b’
    as Python is a *case sensitive* programming language:


    ```python

    password = "aBc"

    confirmedPassword = "abc"


    arePassSame = password == confirmedPassword


    print(arePassSame)

    ```


    False


    So, the Comparison Operators compares Strings letter by letter.


