    # Understanding the Operator Precedence


    In simple expressions that have one operator and two operands, the order is not
    important. But when we have multiple operators and operands in one expression,
    then we must be aware about a concept called Operator Precedence. *This precedence
    simply defines the order of execution.*


    To make it clear, I ask you to guess the output of this program:


    ![](img/2b9d07a40324ba64588fc622d9d72985_60_1.png)


    The result is 25:


    ![](img/2b9d07a40324ba64588fc622d9d72985_60_2.png)


    Why? Because Multiplication has a higher order than Addition. So, it first calculates
    2 * 10 and then adds the result with 5.


    Here is the order of operators in Python:'
  merge: -1
  pgno: 60
- img_proc: true
  md: '| Operator | Description |

    | :--- | :--- |

    | **()** | Parentheses |

    | **\*\*** | Exponent |

    | **\*, /, //, %** | Multiplication, Division, Floor division, Modulus |

    | **+, -** | Addition, Subtraction |

    | **==, !=, >, >=, <, <=** | Comparisons |

    | **and** | Logical AND |

    | **or** | Logical OR |


    Note that the operators with the same precedence have left-to-right associativity.
    For example, in an expression like this:


    5 + 2 – 3


    the Addition and Subtraction have the same precedence. So, it evaluates the expression
    from left to right.


    Also, you may have noticed that Parentheses have the highest precedence. We can
    use this feature of parentheses to simplify expressions:


    ![](img/2b9d07a40324ba64588fc622d9d72985_61_0.png)


    So now we, as humans, have a better understanding on how line 1 will be executed.


    Also, we can use parentheses to change the default precedence:'
