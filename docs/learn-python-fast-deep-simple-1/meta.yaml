    # A String is like a List of Characters


    We can consider a String like a List of Characters and access each item of a String
    by using its index:


    ```

    lang = ''Python''

    print(lang[2])

    ```


    However, we can convert a String into a List of characters by using the `list()`
    function:


    ```

    lang = list(''Python'')

    print(lang)

    ```


    As you see, we have a List of Characters now.


    # Tuples in Python


    In Python, Tuples are like Lists. It means we can do what you learned about Lists
    on the Tuples. *The only difference is that Tuples are immutable (unchangeable).
    In other words, once a Tuple is assigned, we can''t modify the items of it.*


    To define a Tuple that holds the temperature of the last 7 days, we can use this
    syntax:'
