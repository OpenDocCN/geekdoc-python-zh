    ## Concatenating by using format() function


    We can also perform string concatenation by using **format()** function. This
    function helps us to do string concatenation in a clean way:


    ![](img/2b9d07a40324ba64588fc622d9d72985_43_1.png)


    The **format()** function replaces the value of the **followers** variable with
    {} placeholder.


    There is a shorter form of the **format()** function. In this form, we can simply
    put an **f** before the string and put the variable into the placeholder:


    ```

    python

    followers = 47


    print(f''You have {followers} followers!'')

    ```


    We can hold the result of the **format()** function in a variable and use it in
    the next lines:


    ```

    python

    followers = 47


    result = f''You have {followers} followers!''


    print(result)

    ```


    We can even use an expression instead of a variable:


    ```

    python

    online_users = 7

    all_users = 100


    print(f''{all_users - online_users} users are offline!'')

    ```


    The output is:


    ![](img/2b9d07a40324ba64588fc622d9d72985_45_0.png)


    If we need to use multiple variables inside a string, then we can use multiple
    placeholders:


    ```

    python

    online_users = 7

    all_users = 100


    print(f''{online_users} of the {all_users} users are online!'')

    ```


    Also here is another form of the **format()** function for the example:


    ```

    python

    online_users = 7

    all_users = 100


    print(''{} of the {} users are online!''.format(online_users, all_users))

    ```


    The output is:


    ![](img/2b9d07a40324ba64588fc622d9d72985_46_0.png)


    Let’s rewrite the year converter example by using the **format()** function:


    ```

    python

    years = input("Please enter number of years: ")

    months = input("Please enter number of months: ")


    days = int(years) * 365 + int(months) * 30


    result = "{} years and {} months are equal with {} days".format(years, months,
    days)


    print(result)

    ```


    So all we need is to put placeholders by using `{}` and pass the variables to
    the **format()** function to replace with the placeholders.

    The **format()** function has these advantages over using the **+** (plus) operator:


    - It is more readable

    - It doesn’t need any type conversion


