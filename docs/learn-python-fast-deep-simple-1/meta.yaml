  md: "repetitions. In such a case, we should use While Loop. A While Loop repeats\
    \ a block of code as long as its condition is True:\n\n```\nnumber = -1\n\nwhile\
    \ number != 0:\n    number = input('Enter a number: ')\n    number = int(number)\n\
    \    if number % 2 == 0:\n        print('{} is even.'.format(number))\n    else:\n\
    \        print('{} is odd.'.format(number))\n```\n\nThis program accepts a number.\
    \ If this number is even, then it executes line 7, and if the number is odd, it\
    \ executes line 9. This program runs indefinitely, unless we enter 0. Because\
    \ at line 3, we have defined while the number is not 0, run the While's body (lines\
    \ 4 to 9). Here is a sample output of this program:\n\n```\nEnter a number: 2\n\
    2 is even.\nEnter a number: 4\n4 is even.\nEnter a number: 5\n5 is odd.\nEnter\
    \ a number: 10\n10 is even.\nEnter a number: 0\n0 is even.\n```\n\nWhen the condition\
    \ of a while loop stays True forever, it executes its body forever and is called\
    \ infinite loop. So be careful about the condition."
