    但是当我们运行这个程序并输入年数和月数时，我们会得到一条错误信息：


    ![](img/2b9d07a40324ba64588fc622d9d72985_38_0.png)


    红色的行是错误信息。它告诉我们，嘿，Python 无法将一个*字符串*与一个*数字*拼接。在这种情况下，**days** 的类型是数值型。如果我们使用 **type()**
    函数来获取 **days** 变量的类型：


    ```

    python

    print(type(days))

    ```


    我们会得到类似这样的信息：


    ```

    text

    <class ''int''>

    ```


    int 代表整数。整数是没有小数点的数字。例如，这些数字是整数：


    - 100

    - -50

    - 0


    正如我们已经看到的，错误信息是这样的：


    ![](img/2b9d07a40324ba64588fc622d9d72985_39_0.png)


    它说：只能将 str（不是“int”）与 str 拼接。Python 试图告诉我们，它无法将字符串与整数拼接。

    解决方案是使用 `str()` 函数将整数转换为字符串。`str()` 函数接受一个数字作为参数，并将其转换为字符串：


    ![](img/2b9d07a40324ba64588fc622d9d72985_39_1.png)


    ```

    请输入年数：2

    请输入月数：3

    2 年和 3 个月等于 820 天

    ```


    我们也可以使用 float() 函数将整数转换为浮点数：


    ```

    price = 12


    price = float(price)


    print(price)

    ```


    如果你需要精确控制小数部分，例如，你需要保留两位小数，那么请使用 format() 函数：


    ```

    price = 12


    price = ''{:.2f}''.format(price)


    print(price)

    ```


    ## 类型转换


    到目前为止，你已经学习了一个名为类型转换的概念，它允许我们使用像 int() 或 str() 这样的函数来转换类型。


    ![](img/2b9d07a40324ba64588fc622d9d72985_41_0.png)


    Python 中还有另一个概念叫做类型转换。在类型转换中，Python 会自动将一种数据类型转换为另一种数据类型。


    ![](img/2b9d07a40324ba64588fc622d9d72985_41_1.png)


    在这个例子中，Python 为了执行加法运算，临时将 price 的数据类型从整数自动转换为浮点数：


    ![](img/2b9d07a40324ba64588fc622d9d72985_42_0.png)


    ## 将布尔值转换为整数


    我们也可以将布尔值转换为整数值。这在我们需要将布尔值存储到数据库时非常有用。当我们把 True 值转换为整数时，它返回 1；当我们把 False 值转换为整数时，它返回
    0：


    ![](img/2b9d07a40324ba64588fc622d9d72985_42_1.png)


    使用 `bool()` 函数，我们可以将整数转换为布尔值。这个函数对 0 返回 False，对任何非零数字返回 True：


    ![](img/2b9d07a40324ba64588fc622d9d72985_43_0.png)


    ## 使用 format() 函数进行拼接


    我们也可以使用 **format()** 函数来执行字符串拼接。这个函数帮助我们以一种简洁的方式进行字符串拼接：


    ![](img/2b9d07a40324ba64588fc622d9d72985_43_1.png)


    **format()** 函数用 **followers** 变量的值替换了 {} 占位符。


    **format()** 函数有一种更简短的形式。在这种形式中，我们可以在字符串前放一个 **f**，并将变量放入占位符中：


    ```

    python

    followers = 47


    print(f''你有 {followers} 个关注者！'')

    ```


    我们可以将 **format()** 函数的结果保存在一个变量中，并在后续行中使用它：


    ```

    python

    followers = 47


    result = f''你有 {followers} 个关注者！''


    print(result)

    ```


    我们甚至可以使用表达式而不是变量：


    ```

    python

    online_users = 7

    all_users = 100


    print(f''{all_users - online_users} 个用户离线！'')

    ```


    输出是：


    ![](img/2b9d07a40324ba64588fc622d9d72985_45_0.png)


    如果我们需要在字符串中使用多个变量，那么我们可以使用多个占位符：


    ```

    python

    online_users = 7

    all_users = 100


    print(f''{online_users} 个 {all_users} 用户在线！'')

    ```


    另外，这是 **format()** 函数的另一种形式：


    ```

    python

    online_users = 7

    all_users = 100


    print(''{} 个 {} 用户在线！''.format(online_users, all_users))

    ```


    输出是：


    ![](img/2b9d07a40324ba64588fc622d9d72985_46_0.png)


    让我们使用 **format()** 函数重写年份转换器的例子：


    ```

    python

    years = input("请输入年数：")

    months = input("请输入月数：")


    days = int(years) * 365 + int(months) * 30


    result = "{} 年和 {} 个月等于 {} 天".format(years, months, days)


    print(result)

    ```


    所以，我们只需要使用 `{}` 放置占位符，并将变量传递给 **format()** 函数来替换占位符。

    **format()** 函数相比使用 **+**（加号）运算符有以下优势：


    - 它更具可读性

    - 它不需要任何类型转换


    ## 浮点数据类型


    这种数据类型用于创建保存浮点数的变量，例如：


    - **3.14**

    - **0.02**

    - **100.00**


    ![](img/2b9d07a40324ba64588fc622d9d72985_47_0.png)


    如你所见，**pi** 变量是浮点类型。

    关于浮点数的另一点是，如果一个字符串包含浮点数，我们可以使用 **float()** 函数将字符串转换为浮点数：


    ![](img/2b9d07a40324ba64588fc622d9d72985_47_1.png)


    但我们期望的是 15.4，而不是 15.399999999999999！这是怎么回事？🤔


    ## 数字舍入


    这是计算机编程中的一个常见问题。因为浮点值没有精确的二进制表示。这就是为什么我们可能会遇到精度损失和意外结果。

    为了解决这个问题，我们需要像这样使用 **format()** 函数：


    ![](img/2b9d07a40324ba64588fc622d9d72985_48_0.png)


    这个函数用占位符 {} 替换结果。但在替换之前，它会使用我们在花括号内定义的格式来格式化数字。在这种情况下，我们定义了只显示一位小数的格式。


    所以 **format()** 函数对我们有两个用途：


    - 拼接字符串

    - 格式化数字


    ## 布尔数据类型


    到目前为止，你已经学习了字符串和整数数据类型。现在让我们来谈谈布尔数据类型。Python 中有另一种数据类型叫做布尔。布尔类型的变量只能接受两个可能的值，True
    或 False，不带引号。我们使用这种数据类型来保存两种状态的情况，例如：


    ```

    python

    eligible_to_vote = False


    is_load_completed = True

    ```


    再举一个例子，假设我们要从用户那里获取两个数字，并检查它们是否相等。我们使用等于 ==（等于）运算符来检查这种相等性。所以首先，让我们使用 **input()**
    函数获取两个数字：


    ```

    python

    num1 = input("请输入第一个数字：")

    num2 = input("请输入第二个数字：")

    ```


    现在，让我们检查这两个变量是否相等，然后打印结果。注意，我们需要将 **num1** 和 **num2** 转换为整数，然后使用 **==** 运算符进行比较：


    ```

    python

    num1 = input("请输入第一个数字：")

    num2 = input("请输入第二个数字：")


    areEqual = int(num1) == int(num2)


    print(areEqual)

    ```


    当我们运行这段代码，并输入两个相等的数字时，我们会得到 True：


    ![](img/2b9d07a40324ba64588fc622d9d72985_50_0.png)


    当我们输入两个不同的数字时，我们会得到 False：


    ![](img/2b9d07a40324ba64588fc622d9d72985_50_1.png)


    我们可以使用 not 运算符来反转布尔值。换句话说，not 使 True 变为 False，使 False 变为 True：


    ![](img/2b9d07a40324ba64588fc622d9d72985_50_2.png)


    在接下来的章节中，你将看到 ==（等于）运算符和其他比较运算符如何帮助我们根据条件运行代码。


