    ## Rounding numbers


    This is a common problem in computer programming. Because floating point values
    don’t have an exact binary representation. That’s why we may experience some loss
    of precision and unexpected results.

    To solve this, we need to use the **format()** function like this:


    ![](img/2b9d07a40324ba64588fc622d9d72985_48_0.png)


    This function replaces the result with the placeholder {}. But before replacing,
    it formats the number by using the format we''ve defined inside the curly braces.
    In this case, we''ve defined that format our number in a way that displays only
    1 decimal place.


    So the **format()** function has two usages for us:


    - Concatenating strings

    - Formatting numbers


    ## Boolean data type


    Until now, you learned about string and integer data types. Now let''s talk about
    Boolean data type. There is another data type in Python named Boolean. A variable
    of type Boolean can only accept two possible values, True or False without quotes.
    We use this data type to hold two state situations like:


    ```

    python

    eligible_to_vote = False


    is_load_completed = True

    ```


    As another example, suppose that we’re going to take two numbers from our user
    and check if they are equal or not. We check this equality by using the equal
    to == (equal to) operator. So first of all, let’s get two numbers by using the
    **input()** function:


    ```

    python

    num1 = input("Enter the first number: ")

    num2 = input("Enter the second number: ")

    ```


    Now, let’s check if the two variables are equal and then print the result. Note
    that we need to convert **num1** and **num2** to integer and then compare them
    by using the **==** operator:


    ```

    python

    num1 = input("Enter the first number: ")

    num2 = input("Enter the second number: ")


    areEqual = int(num1) == int(num2)


    print(areEqual)

    ```


    When we run this code, and enter two numbers that are equal, we will get True:


    ![](img/2b9d07a40324ba64588fc622d9d72985_50_0.png)


    And when we enter two different numbers, then we will get False:


    ![](img/2b9d07a40324ba64588fc622d9d72985_50_1.png)


    We can reverse a Boolean value by using the not operator. In other words, not
    makes True to False and makes False to True:


    ![](img/2b9d07a40324ba64588fc622d9d72985_50_2.png)


    In the next sections, you''ll see how the == (equal to) operator and other comparison
    operators help us to run our code based on conditions.


