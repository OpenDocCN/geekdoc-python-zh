- img_proc: true
  md: "# Break a Loop\n\nWe can use the *Break* statement to terminate a *For Loop*\
    \ or *While Loop* immediately if a certain condition is met. In this example,\
    \ we use the Break to finish an endless loop. This program accepts unlimited numbers\
    \ from us and adds them together. If we enter =, then it terminates the endless\
    \ loop by using the Break statement:\n\n```\nsum = 0\n\nwhile True:\n    value\
    \ = input('Enter a number (or = to quit): ')\n    if value == '=':\n        break\n\
    \    sum += int(value)\n\nprint('Sum is: {}'.format(sum))\n```\n\n**At line 1**\
    \ we defined a variable named sum that will hold the sum of the numbers\n\n**At\
    \ line 3** we defined an infinite loop. Because the condition is always True\n\
    \n**At line 4** we get a value from the user\n\n**At line 5** we check if the\
    \ value is =, then we must end the loop by using the **break** (line 6). Otherwise,\
    \ add the value to the current value of the sum\n\nThis is the output of this\
    \ app:"
  merge: -1
  pgno: 140
- img_proc: true
  md: "![](img/2b9d07a40324ba64588fc622d9d72985_141_0.png)\n\nSo, when a Break happens,\
    \ the Loop ignores the remained iterations and terminates the Loop.\n\n# ## Continue\
    \ a Loop\n\nThe Continue statement ignores the remained block code and returns\
    \ the loop execution to the beginning of the loop. For example, let’s check if\
    \ the value is not a number, ends the current iteration and returns to the beginning\
    \ of the loop. We use `isnumeric()` method to check if all the characters are\
    \ numeric:\n\n```\npython\nsum = 0\n\nwhile True:\n    value = input('Enter a\
    \ number (or = to quit): ')\n    if value == '=':\n        break\n    elif value.isnumeric()\
    \ == False:\n        continue\n    else:\n        sum += int(value)\n\nprint('Sum\
    \ is: {}'.format(sum))\n```\n\nThe output is like this:"
  merge: -1
  pgno: 141
- img_proc: true
  md: "![](img/2b9d07a40324ba64588fc622d9d72985_142_0.png)\n\nAt line 7 we check if\
    \ the user enters a value that is not numeric, then we ignore the rest of that\
    \ iteration and moves to the next iteration by using the Continue statement (line\
    \ 8).\n\n> In a nutshell, the Break statement ends a loop completely, but a Continue\
    \ statement ends the current iteration and moves to the next iteration if exist.\n\
    \n# The Pass Statement\n\nWe can use the Pass statement as a placeholder for a\
    \ functionality we add later. In other words, we know we need a body (for a function\
    \ or loop), but for now, we don't care about the implementation:\n\n```\npython\n\
    for i in range(6):\n    pass\n```\n\nSo, when the pass is executed, nothing happens.\
    \ This is useful when we need to implement the main structure of our program and\
    \ then implement the details."
