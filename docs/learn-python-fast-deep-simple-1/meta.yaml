    ## Section 4


    ## Data Types in Python


    In computer programming, a data type determines a set of possible values that
    a variable can have. Also, a data type determines a set of allowed operations
    on a variable.


    ### String data type


    Until now, we''ve worked with string data type. A string is a sequence of characters
    enclosed in single quotes or double quotes. In the following example, we have
    a variable of type string that is named **language** and its value is **Python**:


    ![](img/2b9d07a40324ba64588fc622d9d72985_31_0.png)


    So, the value of the **language** variable is **Python** that is consisted of
    6 characters. As you see, in programming world, we start counting from zero. So,
    a string like **Python** has 6 characters, but it starts counting from 0.


    ### type() function


    In python, we have a function named **type()**. This function returns the type
    of a variable. When we run the following code, it will print `<class ''str''>`
    in the console. str represents string:


    ![](img/2b9d07a40324ba64588fc622d9d72985_31_1.png)


    When the Python interpreter wants to execute the line 2, it first executes the
    **type()** function. As you see, the **type()** function accepts one argument.
    We can provide its argument by passing a variable name or even a value. Then the
    **type()** function returns the type of the **language** variable. And after that,
    the interpreter executes the **print()** function and prints what the **type()**
    has returned.


    In other words, the result of the **type()** function is an argument for the **print()**
    function.


    Let’s back to the main topic of this section; Data Types. In Python there are
    5 main data types including Sequences, Boolean, Dictionary, Set and Numeric:


    ![](img/2b9d07a40324ba64588fc622d9d72985_32_0.png)


    In this section, I’m going to talk about string, numeric and Boolean.


    ### Integer numbers


    We continue with numbers. In real world apps, we have to deal with numbers too.
    To define a variable that holds a number, we can simply assign our number without
    using single quotes or double quotes:


    ```python

    bookPages = 560

    ```


    Numbers like 560 that have no floating point are called integer numbers. We can
    also have expressions with numbers. In this example, we have an expression that
    calculates the remaining days of an account. We can use the – (minus) operator
    to subtract numbers:


    ```python

    remainedDays = 365 - 65


    print(remainedDays)

    ```


    **Output:**


    300


    There is a subtle point here. When we use the `input()` function to get a value
    and enter a number, the returned value is always of type string even when we enter
    a number:


    ```python

    steps = input(''how many steps you walked today? '')


    print(type(steps))

    ```


    Let’s enter a number. The type of `steps` is string:


    ![](img/2b9d07a40324ba64588fc622d9d72985_34_0.png)


    In other words, the input function returns ‘1000’ and not 1000.

    Let’s take another example to explain how to works. Suppose that we want to take
    two numbers from our user, a number that represents years and another one represents
    months. Then we need to convert them into days:


    ![](img/2b9d07a40324ba64588fc622d9d72985_34_1.png)


    To do this task, we need to take two values from the user and do some math operations
    on the numbers and print the final result:


    ![](img/2b9d07a40324ba64588fc622d9d72985_35_0.png)


    **At lines 1 and 2** we get two values from our user


    **At line 4** we convert years to days and months to days and assign it to the
    **days** variable


    **At line 6** we print the result


    But the result is *not* what we expected!


    ### Type Casting


    The previous program prints 2 for 365 times and prints 3 for 30 times! The reason
    is that *the input function returns a string*. So, if we enter 2 as years and
    3 as months, line 4 will be executed like this:


    ![](img/2b9d07a40324ba64588fc622d9d72985_35_1.png)


    In fact, it displays the string “2” for 365 times and the string “3” for 30 times:


    ![](img/2b9d07a40324ba64588fc622d9d72985_36_0.png)


    That is why we need to convert the string “2” into a number and the string “3”
    into a number. In fact, if we need to use years and months in mathematical operations,
    we must convert each of them to a numeric data type. *To convert a string type
    to an integer numeric type*, we must use the `int()` function. The `int()` function
    gets a value of type string and returns a value of type int as the result. In
    programming terms, we call this operation Type Casting. So, let’s rewrite line
    4 like this:


    ```python

    1  years = input("Please enter number of years: ")

    2  months = input("Please enter number of months: ")

    3

    4  days = int(years) * 365 + int(months) * 30

    5

    6  print(days)

    ```


    ![](img/2b9d07a40324ba64588fc622d9d72985_36_1.png)


    So now we can consider line 4 like this:


    ```python

    4  days = 2 * 365 + 3 * 30

    ```


