    **Option**: A financial derivative that grants the holder the right, but not the
    obligation, to purchase (call option) or sell (put option) an underlying asset
    at a predetermined price (strike price) before or on a specified date (expiration
    date). **Call Option**: A contract that gives the buyer the right to buy the underlying
    asset at the strike price within a specific timeframe. The buyer anticipates'
