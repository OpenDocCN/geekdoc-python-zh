  md: 'When navigating the options trading landscape, dividends from the underlying
    asset can have a significant impact on option values. The classic Black-Scholes
    Model assumes that there are no dividends paid on the underlying asset, which
    is an idealized situation. In practice, dividends can decrease the price of a
    call option and increase the price of a put option due to the expected decline
    in stock price on the ex-dividend date.


    To accommodate dividends, adjustments are made to the Black Scholes formula. Firstly,
    the stock price is discounted by the present value of dividends expected to be
    paid during the option''s lifespan. This adjusted stock price reflects the anticipated
    drop in the stock''s value when dividends are distributed.


    The call and put option prices are calculated using the adjusted stock price,
    strike price, risk-free interest rate, dividend yield, time to maturity, and the
    cumulative distribution function of the standard normal distribution. These calculations
    are performed using the following formulas:


    ```

    C = S * exp(-q * T) * N(d1) - K * exp(-r * T) * N(d2)


    P = K * exp(-r * T) * N(-d2) - S * exp(-q * T) * N(-d1)

    ```


    Where:


    +   - C is the call option price

    - P is the put option price

    - S is the current stock price

    - K is the strike price

    - r is the risk-free interest rate

    - q is the continuous dividend yield

    - T is the time to maturity

    - N(.) is the cumulative distribution function of the standard normal distribution

    - d1 and d2 are calculated as before, but with the adjusted stock price.'
