    \n## 揭秘布莱克-斯科尔斯公式：期权定价的精髓\n\n布莱克-斯科尔斯公式的推导标志着金融工程的一个关键时刻，揭示了一个彻底改变我们期权定价方法的工具。布莱克-斯科尔斯公式并非凭空出现；它源于在一个日益复杂的市场中发现公平高效的期权定价方法的探索。其核心是无套利原则，该原则断言在一个完全有效的市场中，不应存在无风险的获利机会。布莱克-斯科尔斯模型依赖于偏微分方程和市场力量概率表示的结合。它运用了伊藤引理——随机微积分中的一个基本定理——从布朗运动的随机性过渡到一个确定性的微分方程，通过求解该方程可以确定期权的价格。\n\
    \n```python\nfrom scipy.stats import norm\nimport math\n\n\"\"\"\n    Calculates\
    \ the Black Scholes formula for European call option price. S:\n    Current stock\
