    \ complex calculations.\n\n\\[ C(S, t) = S_t \\Phi(d_1) - Ke^{-rt} \\Phi(d_2)\
    \ \\]\n\n- \\( C(S, t) \\) represents the call option price\n- \\( S_t \\) is\
    \ the current stock price\n- \\( K \\) is the option's strike price\n- \\( r \\\
    ) is the risk-free interest rate\n- \\( t \\) indicates the time until expiration\n\
    - \\( \\Phi \\) refers to the cumulative distribution function of the standard\
    \ normal distribution\n- \\( d_1 \\) and \\( d_2 \\) are intermediate calculations\
    \ based on the aforementioned variables\n\n```python\nimport numpy as np\nfrom\
    \ scipy.stats import norm\n\n# Calculate the parameters, d1 and d2\nd1 = (np.log(S\
    \ / K) + (r + 0.5 * sigma ** 2) * t) / (sigma * np.sqrt(t))\nd2 = d1 - sigma *\
    \ np.sqrt(t)\n\n# Compute the call option price\ncall_price = (S * norm.cdf(d1))\
    \ - (K * np.exp(-r * t) * norm.cdf(d2))\nreturn call_price\n\n# Inputs for our\
