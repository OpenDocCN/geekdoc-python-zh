    ## Calendar and Diagonal Spreads


    Calendar and diagonal spreads are sophisticated options trading strategies that
    experienced traders frequently employ to capitalize on variations in volatility
    and the passage of time. These strategies involve options with distinct expiration
    dates and, in the case of diagonal spreads, potentially distinct strike prices
    as well. A calendar spread, also referred to as a time spread, is formed by establishing
    a long and short position on the same underlying asset and strike price, but with
    different expiration dates. The trader typically sells a short-term option and
    purchases a long-term option, expecting the value of the short-term option to
    decay at a faster rate compared to the long-term option. This strategy proves
    particularly effective in a market where the trader foresees low to moderate volatility
    in the short term.


    ```python

    import numpy as np

    import matplotlib.pyplot as plt


    # Calendar Spread

    strike_price = 50

    premium_at_short_term_expiry = 2

    premium_at_long_term_expiry = 4


    # Presume the stock price rests at the strike price at the expiration of the short-term
    option

    stock_price_at_short_term_expiry = strike_price


    # Profits

    gain_short_option = premium_at_short_term_expiry

    gain_long_option = np.maximum(strike_price - stock_prices, 0) - premium_at_long_term_expiry


    # Net profit from the calendar spread at short-term expiry

    net_gain_calendar = gain_short_option + gain_long_option


    # Illustrate the profit diagram

    plt.figure(figsize=(10, 5))

    plt.plot(stock_prices, net_gain_calendar, label=''Calendar Spread Profit at Short-term
    Expiry'')

    plt.axhline(0, color=''black'', lw=0.5)

    plt.axvline(strike_price, color=''r'', linestyle=''--'', label=''Strike Price'')

    plt.title(''Calendar Spread Strategy Profit Diagram'')

    plt.xlabel(''Stock Price at Expiration'')

    plt.ylabel(''Profit/Loss'')

    plt.legend()

    plt.grid()

    plt.show()

    ```


    The trader''s profit in a calendar spread is maximized if the stock price at the
    expiration of the short-term option closely aligns with the strike price. The
    long-term option retains time value, while the short-term option''s value diminishes,
    potentially enabling the trader to close the position with a net gain. Diagonal
    spreads extend the concept of a calendar spread by incorporating variations in
    both expiration dates and strike prices. This introduces an additional dimension
    to the strategy, allowing traders to benefit from movements in the price of the
    underlying asset, as well as time decay and changes in volatility. The bullish
    or bearish nature of a diagonal spread can be tailored according to the choice
    of strike prices.


    ```python

    # Diagonal Spread

    long_strike_price = 55

    short_strike_price = 50

    premium_at_short_term_expiry = 2

    premium_at_long_term_expiry = 5


    # Profits

    gain_short_option = np.maximum(short_strike_price - stock_prices, 0) + premium_at_short_term_expiry

    gain_long_option = np.maximum(stock_prices - long_strike_price, 0) - premium_at_long_term_expiry


    # Net profit from the diagonal spread at short-term expiry

    net_gain_diagonal = gain_short_option - gain_long_option


    # Illustrate the profit diagram

    plt.figure(figsize=(10, 5))

    plt.plot(stock_prices, net_gain_diagonal, label=''Diagonal Spread Profit at Short-term
    Expiry'')

    plt.axhline(0, color=''black'', lw=0.5)

    plt.axvline(long_strike_price, color=''r'', linestyle=''--'', label=''Long Strike
    Price'')

    plt.axvline(short_strike_price, color=''g'', linestyle=''--'', label=''Short Strike
    Price'')

    plt.title(''Diagonal Spread Strategy Profit Diagram'')

    plt.xlabel(''Stock Price at Expiration'')

    plt.ylabel(''Profit/Loss'')

    plt.legend()

    plt.grid()

    plt.show()

    ```


    In the diagram, the profit profile of a diagonal spread exemplifies the intricacy
