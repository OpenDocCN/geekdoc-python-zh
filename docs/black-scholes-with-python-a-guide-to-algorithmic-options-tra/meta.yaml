    ndarray, a multidimensional array object that supports fast array-oriented arithmetic
    operations and flexible broadcasting capabilities. This fundamental functionality
    enables analysts to perform vectorized operations that are efficient and syntactically
    clear. In the code snippet provided, we can observe the utilization of NumPy''s
