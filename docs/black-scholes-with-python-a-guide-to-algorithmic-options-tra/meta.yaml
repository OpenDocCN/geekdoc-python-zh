    of a constant, known risk-free interest rate throughout the option''s duration.
    This risk-free rate forms the basis of the model''s discounting mechanism, crucial
    for calculating the option''s present value at expiration. The model also assumes
    that the price of the underlying stock follows a geometric Brownian motion, with
    a constant volatility and a random walk with drift. This mathematical representation
