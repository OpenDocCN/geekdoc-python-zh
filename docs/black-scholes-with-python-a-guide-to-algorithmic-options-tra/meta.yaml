    ## 日历价差和对角价差


    日历价差和对角价差是复杂的期权交易策略，经验丰富的交易者经常使用它们来利用波动率的变化和时间的流逝。这些策略涉及具有不同到期日的期权，而在对角价差的情况下，可能还涉及不同的行权价。日历价差，也称为时间价差，是通过在相同标的资产和行权价上建立多头和空头头寸，但具有不同的到期日来形成的。交易者通常卖出短期期权并购买长期期权，预期短期期权的价值衰减速度比长期期权更快。这种策略在交易者预期短期内波动率较低至中等的市场中特别有效。


    ```python

    import numpy as np

    import matplotlib.pyplot as plt


    # 日历价差

    strike_price = 50

    premium_at_short_term_expiry = 2

    premium_at_long_term_expiry = 4


    # 假设在短期期权到期时，股票价格等于行权价

    stock_price_at_short_term_expiry = strike_price


    # 盈利

    gain_short_option = premium_at_short_term_expiry

    gain_long_option = np.maximum(strike_price - stock_prices, 0) - premium_at_long_term_expiry


    # 短期到期时日历价差的净利润

    net_gain_calendar = gain_short_option + gain_long_option


    # 绘制盈利图

    plt.figure(figsize=(10, 5))

    plt.plot(stock_prices, net_gain_calendar, label=''短期到期时日历价差盈利'')

    plt.axhline(0, color=''black'', lw=0.5)

    plt.axvline(strike_price, color=''r'', linestyle=''--'', label=''行权价'')

    plt.title(''日历价差策略盈利图'')

    plt.xlabel(''到期时股票价格'')

    plt.ylabel(''盈亏'')

    plt.legend()

    plt.grid()

    plt.show()

    ```


    如果在短期期权到期时，股票价格与行权价紧密对齐，则交易者在日历价差中的利润最大化。长期期权保留时间价值，而短期期权的价值减少，这可能使交易者能够以净收益平仓。对角价差通过结合到期日和行权价的变化，扩展了日历价差的概念。这为策略引入了额外的维度，使交易者能够从标的资产价格的变动、时间衰减以及波动率的变化中受益。对角价差的看涨或看跌性质可以根据行权价的选择进行定制。


    ```python

    # 对角价差

    long_strike_price = 55

    short_strike_price = 50

    premium_at_short_term_expiry = 2

    premium_at_long_term_expiry = 5


    # 盈利

    gain_short_option = np.maximum(short_strike_price - stock_prices, 0) + premium_at_short_term_expiry

    gain_long_option = np.maximum(stock_prices - long_strike_price, 0) - premium_at_long_term_expiry


    # 短期到期时对角价差的净利润

    net_gain_diagonal = gain_short_option - gain_long_option


    # 绘制盈利图

    plt.figure(figsize=(10, 5))

    plt.plot(stock_prices, net_gain_diagonal, label=''短期到期时对角价差盈利'')

    plt.axhline(0, color=''black'', lw=0.5)

