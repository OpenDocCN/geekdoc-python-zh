  mdcn: "它们本身已被证明是有用的，但其存在归功于对集合库进行功能化的需求。\n\n函数式编程的第二个反复出现的主题是并行化。简单来说，函数式编程为并行处理提供了更好的解决方案。因此，集合库得到了增强，以便在处理集合时能够利用多核\
