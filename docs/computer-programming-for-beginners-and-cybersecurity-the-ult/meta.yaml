  mdcn: '## C++ 编程


    **一份循序渐进的入门指南，助你掌握这门多范式编程语言的基础，并开始管理数据，包括如何编写你的第一个程序**


    艾伦·格里德


    ## 引言


    编程语言种类繁多，而 C++ 通常不被列入易于上手的语言之列。我们可能会发现使用这类语言有诸多好处，但与其它一些语言相比，它往往被认为更难掌握。


    正如我们将在本指南中探讨的，你会发现 C++ 实际上是一门非常出色的编程语言。它将为我们提供所需的一些最佳技巧和窍门，并向我们展示如何实际编写该语言中所需的各种代码。如果你正在寻找一种功能强大、可用于
    Web 应用、游戏等众多领域的编程语言，并且希望今天就学会如何使用它，那么这本指南就是为你准备的。


    在本书中，我们将学习关于 C++ 语言编程所需的一切知识。我们将从使用这门语言的一些基础知识开始，例如这门语言是什么、与其它语言相比使用它的一些优势，以及了解这门语言的一些历史背景。


    一旦我们掌握了 C++ 语言的一些基础知识，你就可以继续探索更多我们需要了解的内容。我们将深入研究这门语言的语法和基础知识。它与其它一些编程语言有些不同，因此学习如何掌握它非常重要，然后在此基础上编写我们的代码。我们还将探讨一些流行且与
    C++ 语言配合良好的不同库，这些库可以扩展我们能够看到的该语言的一些功能。


    至此，我们已经掌握了 C++ 编程的一些基础知识，并且对这门语言有了更全面的了解。现在是时候深入了解如何进行我们想要的一些编码了。我们能够专注于许多不同类型的代码，也能够使用这门语言处理许多不同的事情，我们将探讨这些内容、与之相关的代码等等。


    我们将在本指南的最后探讨如何进行这种语言所需的一些基本调试。有时，尤其是作为这门语言的初学者，代码可能无法按你希望的方式运行，或者会出现需要修复的错误。这对初学者来说可能很困难，因为他们希望能够处理这些代码并让程序运行起来，但可能不确定如何修复一些出现的错误。


    ## 什么是 C++？


    许多初学者将 C++ 归类为一门复杂的编程语言。无论原因如何，C++ 并非一门复杂的语言，而是一门对初学者缺乏优质资源的计算机语言。之所以如此，是因为它是一门在过去四十年中从另一门主要编程语言（C
    编程语言）演化而来的编程语言。


    > “C++ 是一门从 C 编程语言衍生出来的编程语言，增加了面向对象的原则，如继承和多态。C++ 是 C 的一个子集语言，它演变成了一个比预期更大的实例。”


    ## C++ 的历史


    在最初阶段，C++ 只是作为 C 的一个分支语言使用，并且在编译前需要转换回 C，因为当时没有直接的编译器。一个名为 Cfront 的编译器以完成这项工作而闻名。然而，几年后，使用
    C++ 的人们发现，在没有实际编译器的语言中编写代码太困难了。因此，一些开发者开始开发编译器，最终由比雅尼·斯特劳斯特鲁普完成了一个可工作的 C++ 编译器。


    在几年内实现了严格的语法结构后，C++ 于 1998 年被 ISO（国际标准化组织）认可。第一个更新版本在同年发布，人们对 C++ 开始提供的新附加功能感到惊讶。它开始使用先进的图灵技术来减少编译时间，并在第一个版本中引入了模板。所有这些强大的新功能帮助
    C++ 开发了支持系统编程的复杂软件。几年内，C++ 得到了极大的改进，并包含了许多可用于创建通用应用程序的高级功能。


    值得赞赏的是微软对 C++ 作为编程语言突然崛起的贡献。微软开始在其开发软件 Visual C++ 中使用 C++。许多为微软系统开发应用程序的程序员开始发现
    C++ 的可靠性和易用性。到 2009 年，C++ 标准库已经更新了各种复杂的系统、数学和时间函数。


    ## 为什么 C++ 取得了成功？


    C++ 的成功主要归功于其面向对象的特性。在 20 世纪 80 年代初，面向对象编程范式席卷了科技界。人们对其提供的适应性和简洁性印象深刻。当时许多内置的
    C 库可以轻松转换为 C++ 函数库。


    所有这些因素共同帮助 C++ 成为这十年来最受欢迎的高级编程语言之一。据估计，到 2025 年，15% 的机器人应用程序将使用 C++ 作为开发其资源的主要语言。


    ## 为不同操作系统设置 C++ 环境


    所有用于创建 C++ 软件的软件都包含一个代码编辑器和一个内置调试器，用于显示可能的错误。如果你是一个守旧的人，你可以简单地使用文本编辑器，并通过命令行环境运行程序。它仍然可以完美运行。然而，在本节中，我们将讨论可用于创建
    C++ 程序的高级集成开发环境软件。


    ## IDE 是如何工作的？


    IDE 结合了编辑程序、编译器链机制和调试功能来创建高效的程序。


    注意：


    请记住，如果你尝试在命令行执行程序上工作，C++ 不提供解释器。


    C++ 以其高级功能和简单的语法而闻名于程序员。即使受到 Java 和 Python 等高级编程语言的影响，C++ 也没有失去其魅力。本章对 C++ 编程语言及其历史进行了全面介绍，将帮助你详细理解这门流行编程语言的重要性和起源。在本书中，我们用通俗易懂的语言解释了各种复杂的编程主题。为了理解和欣赏大部分信息，理解
    C++ 作为一门编程语言的重要性至关重要。现在让我们详细了解一下 C++。


    ## 新版 C++ 有什么特别之处？


    较新版本的 C++ 是为了支持那些试图实现复杂现实世界项目的开发者而开发的。以下是 C++ 提供的一些值得注意的高级功能。


    ### a) 高级数据结构实现


    像树和链表这样的简单数据结构可以通过基本的 C++ 版本轻松实现。然而，使用旧版本无法实现像图和二叉树这样的高级数据结构。另一方面，较新的 C++ 版本提供了标准库，帮助我们实现映射和哈希值，这些可以进一步用于实现高级数据结构。


    ### b) 密码学功能


    较新版本的 C++ 提供了专用库，可用于在 Web 和移动应用程序中实现复杂的密码学功能。这些库也可用于创建处理密码和隐写术的软件。


    ### c) Lambda 实现


    Lambda 实现对于运行数据科学和机器学习应用程序至关重要。例如，当代的深度伪造软件使用 C++'
