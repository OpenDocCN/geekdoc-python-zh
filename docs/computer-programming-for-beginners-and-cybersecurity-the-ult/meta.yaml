    \ but it cannot erase them, however each stl container template class has a member\
    \ function called \"erase()\" operation for erasing the specified elements.\n\n\
    \    In other words, iterators can modify elements in containers but not the containers\
    \ themselves.\n\n    Therefore, to remove the duplicates, we apply the operation\
    \ erase() from the iterator \"my_unique\" till the end().\n    */\n    cout <<\
    \ \")\\n\\n Step.3 Erase out those repeated elements:\\n\";\n    data.erase(my_unique,\
    \ data.end());\n    cout << \" After the iterator has passed through erase() i.e.,\
    \ \\n Final:\\t( \";\n    for(auto element: data)\n        cout << element <<\
    \ \"; \";\n    cout << \")\\n\";\n}\n\nint main()\n{\n    illustrate_iterators();\n\
    \    just_pause();\n}\n```\n\n输出：\n\n迭代器的说明：\n\n给定向量：data =\n\n( 1111; 1134; 1134;\
    \ 1124; 1124; 1134; 1111; 1176; 1124; 1134; 1176; )\n\n让我们为此向量定义一个迭代器，比如 *it。\n\
    \n因此，*it = 1111，即 data[0]。\n\n迭代器可以递增，即 ++it。\n\n递增后 *it = 1134，即 data[1]\n\n\
    因此，迭代器 *it 通过向量 data 进行解引用。\n\n所以，让我们使用迭代器表示整个向量：\n\n( 1111; 1134; 1134; 1124;\
    \ 1124; 1134; 1111; 1176; 1124; 1134; 1176; )\n\n任务：由于此向量有重复的数字，\n\n我们能否只保留每个数字的一个副本并删除重复项？\n\
    \n是的，我们可以！\n\n为此，我们将迭代器传递给三种类型的 STL 算法，如下所示：\n\n步骤 1. 按升序排序：\n\n迭代器通过 sort() 后：\n\
