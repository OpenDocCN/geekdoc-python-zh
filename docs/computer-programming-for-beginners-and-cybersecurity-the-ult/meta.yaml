    # Memory Management


    C++ programming language provides a lot of options to users when it comes to managing
    the memory used by an executing program. In this chapter, we shall be exploring
    some of these frequently used options. We would also introduce some modern techniques
    aimed at reducing the memory management problems that have plagued C++ projects
    in the past.


    # Memory Available to C++ Programs


    Modern operating systems usually reserve a section of its memory for executing
    a program that allows the operating system to manage multiple program executions
    simultaneously. There are different operating systems which layout the memory
    of executing the program in different ways. However, the layout would include
    the following four sections.


    +   - Code: The program''s compiled executable instructions are held in the code
    section memory. While the program executes, the contents of the code section should
    never change. Also, during the program''s executions, the code segment does not
    change as well.

    - Data: Persistent variables and global variables are held in the data section
    of the memory as in static locals. Throughout the life span of the executing program
    is the variables of the data would exist. However, unless the data is a constant,
    the executing program may freely change their values. Although the values stored
    in the variables found in the data segment may change during the program''s execution,
    the size of the data segment wouldn''t change while the program is executing.
    It is so because the program''s source code precisely defines the numbers of global
    and static local'
