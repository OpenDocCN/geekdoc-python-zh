- md: "## CHAPTER 7: STL Algorithm\n\nThe STL algorithms are found in `<algorithms>`\
    \ header file, so we need to include it in our program. The algorithms can be\
    \ classified as:\n\n- Non-modifying algorithms: e.g. for each, count, search etc.\n\
    - Modifying algorithms: e.g copy, transform, etc.\n- Removing algorithms: remove,\
    \ remove if, etc.\n- Mutating algorithms: reverse, rotate, etc.\n- Sorting algorithms:\
    \ sort, partial sort, etc.\n- Sorted range algorithms: binary search, merge, etc.\n\
    - Numeric algorithms: accumulate, partial sum, inner product, etc.\n\nThe following\
    \ example shows how the `sort()` function works on arrays.\n\n### Program 13.11:\
    \ sorting of array using sort algorithm\n\n```cpp\n#include <iostream>\n#include\
    \ <algorithm>\nusing namespace std;\n\nint main()\n{\n    int a[] = {3,5,7,2,9};\n\
    \    sort(a, a + 5);\n    cout << \"Sorted Array:\" << endl;\n    for (int i =\
    \ 0; i < 5; i++)\n        cout << a[i] << \" \";\n    return 0;\n}\n```\n\nOutput:\n\
    Sorted Array:\n2 3 5 7 9\n\nIn the example above, when we pass array name `a`\
    \ as an argument, we are telling the function to sort at the beginning of the\
    \ array. If we wanted it to start the sort at the third element of the array,\
    \ we can use:\n\n```cpp\nsort(a+3, a+5);\n```\n\nWe have used `a+5` for the second\
    \ argument, which specifies that we want to sort to the last element in the array.\n\
    \nNow similar `sort()` function can work with vector container as shown in following\
    \ program. This shows that STL algorithms are generic.\n\n### Program 13.12: Sorting\
    \ of vector using sort algorithm\n\n```cpp\n#include <iostream>\n#include <algorithm>\n\
    #include <vector>\nusing namespace std;\n\nint main()\n{\n    int a[] = {5,3,7,6,2,9};\n\
    \    vector<int> v(a, a+6);\n    sort(v.begin(), v.end());\n    for (int i = 0;\
    \ i != v.size(); i++)\n        cout << v[i] << \" \";\n    cout << endl;\n   \
    \ return 0;\n}\n```\n\nOutput: 2 3 5 6 7 9\n\nAs you can see, the sorting function\
    \ works almost the same as on an array. The first parameter in `sort()` accepts\
    \ an iterator to the first element using `begin()` as it returns an iterator to\
    \ the first element. So it will start sorting at the first element in the vector.\
    \ Same way `end()` returns an iterator that points to 1 past the last element\
    \ in the container. Note that sort function sorts up to but not including what\
    \ we pass as the second parameter.\n\n### find() and count() algorithm\n\n`find()`\
    \ algorithm is helpful to find particular value from the container. `count()`\
    \ is used to count how many times a particular value appears in container.\n\n\
    ### Program 13.13: Finding value from vector using find algorithm\n\n```cpp\n\
    #include <iostream>\n#include <algorithm>\n#include <vector>\nusing namespace\
    \ std;\n\nint main()\n{\n    vector<int> v;\n    for(int i = 0; i < 10; i++)\n\
    \        v.push_back(i);\n\n    int a = 5;\n    vector<int>::iterator it;\n  \
    \  it = find(v.begin(),v.end(),a);\n    if(it != v.end()) {\n        cout << \"\
    found \" << a << endl;\n    }\n    else {\n        cout << \"could not find \"\
    \ << a << endl;\n    }\n\n    int c = count(v.begin(), v.end(), 6);\n    cout\
    \ << \"Number of 6 stored in vector:\" << c;\n    return 0;\n}\n```\n\nOutput:\
    \ found 5\nNumber of 6 stored in vector: 1\n\n### for_each()\n\nThis algorithm\
    \ applies a specified function object to each element in a container. Original\
