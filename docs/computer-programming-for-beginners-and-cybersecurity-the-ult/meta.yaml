    ## CHAPTER 2: Cybersecurity


    ### Types of Cybersecurity


    Does it seem that everything now depends on computers as well as the internet?
    Entertainment, communication, transportation, medicine, shopping, etc. Even banking
    institutions operate their company online.


    The realization that much of the planet is dependent on the internet should encourage
    us to challenge ourselves.


    - Simply just how much of my lifetime is driven by the net?

    - Simply just how much of my private info is stored on the web?

    - Simply just how much of my company is accessible over networks?

    - Simply just how much of my customers'' information is accessible over networks?


    With such a remarkable dependence on computer systems, neglecting the possibility
    of cybercrime in your company is incredibly risky and likely bad for you, your
    business, your employees, and your buyers.


    Without a feeling of security, your company is operating at extremely high risk
    for cyber-attacks.


    Below are numerous kinds of cybersecurity you need to become mindful of. This
    could help you construct a good foundation for an excellent security strategy.


    ### 1. Critical infrastructure security


    Critical infrastructure safety includes the cyber-physical systems which modern
    societies rely on.


    Common examples of critical infrastructure:


    - Power grid

    - Drinking water purification

    - Traffic lights


    Shopping centers, hospitals, having the infrastructure of an energy grid online
    leads to it being prone to cyber-attacks.


    Companies with responsibility for any critical infrastructure must do due diligence
    to realize the vulnerabilities and defend their company against them. The protection,
    in addition to the resilience of this critical infrastructure, is crucial to our
    society’s wellbeing and safety.


    Companies that are not responsible for the critical infrastructure; however, rely
    on it for a portion of their company, should certainly develop a contingency plan
    by analyzing precisely how an assault on critical infrastructure they rely on
    might affect them.


    ### 2. Application security


    You have to choose application protection as among the selection of must-have
    security methods adopted to protect your devices. Software safety uses software
    and hardware treatments to tackle outside threats, which can form in the development
    stage of an application.


    Apps are a great deal more accessible over networks, resulting in the adoption
    of safeguard steps through the development phase to be an imperative stage of
    the endeavor.


    Types of Application security:


    - Antivirus programs

    - Firewalls

    - Encryption


    These help to ensure that unauthorized access is stayed away from. Companies likewise
    could detect extremely vulnerable specific assets and protect them by certain
    system security procedures put on these data sets.


    ### 3. Network security


