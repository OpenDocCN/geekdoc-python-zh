    # Abstract—used to create abstract methods or classes


    # Abstract class


    When a class is declared as abstract, it means that you will never be able to
    instantiate the class. The only reason for declaring a class as abstract is to
    extend the class. You cannot declare a class to be both final and abstract, as
    you can’t possibly extend a final class. A class that uses abstract methods will
    have to be declared as abstract. Failure to do so will result in compile errors.


    # Abstract method


    As it is declared with no implementation, an abstract method derives its methods
    body from the subclass. Abstract methods cannot be declared as strict or final.
    Unless it is also an abstract class, a class extending an abstract class must
    adopt the abstract methods of the superclass. A class that contains at least one
    abstract method should be declared as an abstract class. On the other hand, an
    abstract class need not have abstract methods.


