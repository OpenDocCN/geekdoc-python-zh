    \n在代码末尾添加这个 else 语句，或者说“兜底”语句，是你需要考虑的重要事项。你不可能列出用户可能选择的所有不同颜色。你可能会花时间输入一百种不同的颜色（但这需要大量的时间和代码，你不会想这样做），但用户可能会选择你忘记的那一种颜色。如果你不在末尾添加这个\
