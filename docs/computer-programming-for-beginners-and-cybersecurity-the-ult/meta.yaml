    While instance attributes are unique to every object, the characteristics of a
    class are the same for all instances. In this case, all dogs.


    # Methods


    When you have attributes that belong to a class, you can proceed to define functions
    that will access the class attribute. These functions are referred to as methods.
    When you declare methods, you will want to provide the first argument to the method
    using a self-keyword.


    For instance, you can define a class Snake, which contains the attribute name
    and the method change_name. The method change name will accept an argument new_name
    plus the keyword self.


    Now, you can instantiate this class with a variable snake and change the name
    using the method change_name.


    ```

