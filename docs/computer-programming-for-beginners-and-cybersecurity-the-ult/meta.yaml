    它是最受欢迎的社区协议分析器之一。它评估用户工作设备上的易受攻击区域。Wireshark 可以收集或查看设备上数据和活动的记录。可以查看传入和传出的数据包以及传输中使用的协议。它能够捕获实时数据，并创建一个传统的分析表，有助于进行跟踪。


