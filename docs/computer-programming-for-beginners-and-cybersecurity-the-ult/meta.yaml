- md: "## CHAPTER 7: Object-Oriented Programming\n\nYou have learned earlier that\
    \ Java is an object-oriented programming language. As such, it supports the fundamental\
    \ principles of this programming paradigm.\n\nAn object refers to real entities\
    \ such as bag, car, chair, or pen. Object-oriented programming languages allow\
    \ programmers to design programs that use objects and classes. They provide and\
    \ support features that can simplify software development and maintenance. The\
    \ most important concepts of this programming paradigm are the following:\n\n\
    - Objects\n- Classes\n- Method\n- Instance\n- Inheritance\n- Abstraction\n- Polymorphism\n\
    - Message Parsing\n- Encapsulation\n\n## Objects\n\nIn the real world, you will\
    \ encounter objects such as humans, dogs, cars, and cats. These objects possess\
    \ state and behavior. For instance, when you think of a cat, its state can consist\
    \ of its breed, color, or name. Its behavior may consist of running, jumping,\
    \ or wagging its tail.\n\nA software object resembles a real-world object in terms\
    \ of these characteristics. Its state is saved in fields, and its behavior is\
    \ exhibited through methods.\n\nIn development, the methods are performed on an\
    \ object’s internal state, and the methods facilitate communication between objects.\n\
    \n## Classes\n\nClasses are used to set the definitions for objects. These specifications\
    \ serve as blueprints for creating objects. While they are not immediately applied\
    \ when classes are created, the definitions are available in case an object of\
    \ the class is instantiated. An object or class can have multiple copies or instances\
    \ within a program.\n\nFollowing is an example of a class definition for a class\
    \ named Cat:\n\n```java\npublic class Cat {\n    String breed;\n    int age;\n\
    \    String color;\n\n    void running() {\n    }\n\n    void sleeping() {\n \
    \   }\n\n    void jumping() {\n    }\n}\n```\n\nA class can have the following\
    \ types of variable:\n\n### Class variables\n\nClass variables are those that\
    \ are declared inside a class using the static modifier and outside any method.\n\
    \n### Local variables\n\nLocal variables are those that are defined within the\
    \ methods, blocks, or constructors. These variables are declared and instantiated\
    \ inside the method and are destroyed once the method had been carried out.\n\n\
    ### Instance variables\n\nInstance variables are those that are inside a class\
    \ but outside of the methods. They are initialized at the same time as the class.\
    \ They can be accessed from a method, block, or constructor of that specific class.\n\
    \nA class can contain as many methods as necessary to obtain the values it needs.\
    \ For example, the Cat class has three methods: running(), sleeping(), and jumping().\n\
    \n### Constructors\n\nA constructor is a method which is used to initialize an\
    \ object. A class must contain at least one constructor.\n\nThe following are\
    \ the important rules for constructors:\n\n- The name of the constructor should\
    \ match the name of the class.\n- It should have no explicit return type.\n\n\
    ### Types of Constructors\n\n- Default or no-arg constructor\n- Parameterized\
    \ constructor\n\n#### Default Constructor\n\nA constructor without a parameter\
    \ is called default constructor.\n\nHere's the syntax:\n\n```java\n<class_name>(){\
    \ }\n```\n\n#### Parameterized Constructor\n\nA parameterized constructor is a\
    \ constructor with parameters. It is used to supply values to specific objects.\n\
    \nThe following example shows both types of constructors. The first one is a default\
    \ constructor, and it doesn't have any parameter. The second constructor has one\
    \ parameter, the name.\n\n```java\npublic class Kitten {\n    public Kitten()\
    \ {\n    }\n\n    public Kitten(String name) {\n        // This constructor has\
    \ one parameter, name.\n    }\n}\n```\n\n### Creating Objects\n\nClasses provide\
    \ the template for objects. Objects are basically created from a class. To create\
    \ new objects, you will use the ‘new’ keyword.\n\nThe following steps are taken\
    \ to create a new object from a class:\n\n- Declaration—This refers to a variable\
    \ declaration where you will write the name of the variable and its object type.\n\
    - Instantiation—To create a new object; you will use the ‘new’ keyword.\n- Initialization—A\
    \ call to a constructor follows the ‘new’ keyword and initializes a new object.\n\
    \nThe following examples show the different steps taken to create a new object\
    \ from class:\n\n```java\npublic class Kitten {\n    public Kitten(String name)\
    \ {\n        // This constructor contains a parameter, the name.\n        System.out.println(\"\
    Passed Name is:\" + name);\n    }\n\n    public static void main(String[] args)\
    \ {\n        // Following statement would create an object myKitten\n        Kitten\
    \ myKitten = new Kitten(\"spotty\");\n    }\n}\n```\n\nHere’s the output:\n\n\
    ```\nPassed Name is: spotty\n```\n\n### How to Access Methods and Instance Variables\n\
    \nThe created objects are used to access methods and instance variables. To access\
    \ instance variables, you will use these steps:\n\nFirst, you must create an object:\n\
    \n```java\nObjectName = new Constructor();\n```\n\nNext, call a variable like:\n\
    \n```java\nObjectName.variableName;\n```\n\nTo call a class method:\n\n```java\n\
    ObjectName.MethodName();\n```\n\n## Java Package\n\nA package is simply a way\
    \ of grouping interfaces and classes. A Java package serves as container for classes.\
    \ The usual basis for grouping is functionality. The use of packages facilitates\
    \ code reusability. When interfaces and classes are categorized into packages,\
    \ you can easily access them for use in other programs. The use of packages also\
    \ helps prevent name conflicts among classes and interfaces.\n\nTo create a package,\
    \ use the package statement before the package name as the first statement.\n\n\
    Here’s an example:\n\n```java\npackage mypack;\npublic class students\n{\n   \
    \ ...statement;\n}\n```\n\n### Import Statement\n\nYou may use the import keyword\
    \ to import packages to your source file. An import statement makes it easy for\
    \ the compiler to find the location of a class or source code.\n\nYou may want\
    \ to import just one class from a package. You can use the dot operator to indicate\
    \ the package and the class. For example:\n\n```java\nimport java.util.Date;\n\
    class MyDate extends Date\n{\n    //statement.\n}\n```\n\nTo import all classes\
    \ from one package, you can use the wild character * after the dot operator. For\
    \ example:\n\n```java\nimport java.util.*;\n```"
  mdcn: "## 第七章：面向对象编程\n\n你之前已经了解到，Java 是一种面向对象编程语言。因此，它支持这种编程范式的基本原则。\n\n对象指的是现实世界中的实体，如包、汽车、椅子或笔。面向对象编程语言允许程序员设计使用对象和类的程序。它们提供并支持能够简化软件开发和维护的功能。这种编程范式最重要的概念如下：\n\
    \n- 对象\n- 类\n- 方法\n- 实例\n- 继承\n- 抽象\n- 多态\n- 消息解析\n- 封装\n\n## 对象\n\n在现实世界中，你会遇到诸如人、狗、汽车和猫等对象。这些对象具有状态和行为。例如，当你想到一只猫时，它的状态可以包括其品种、颜色或名字。它的行为可能包括奔跑、跳跃或摇尾巴。\n\
    \n软件对象在这些特征方面类似于现实世界的对象。其状态保存在字段中，其行为通过方法来展现。\n\n在开发中，方法作用于对象的内部状态，并且方法促进了对象之间的通信。\n\
    \n## 类\n\n类用于为对象设定定义。这些规范作为创建对象的蓝图。虽然它们在创建类时不会立即应用，但这些定义在类的对象被实例化时可用。一个对象或类在程序中可以有多个副本或实例。\n\
    \n以下是名为 Cat 的类的类定义示例：\n\n```java\npublic class Cat {\n    String breed;\n    int\
    \ age;\n    String color;\n\n    void running() {\n    }\n\n    void sleeping()\
    \ {\n    }\n\n    void jumping() {\n    }\n}\n```\n\n一个类可以包含以下类型的变量：\n\n### 类变量\n\
    \n类变量是在类内部使用 static 修饰符声明，并且在任何方法之外的变量。\n\n### 局部变量\n\n局部变量是在方法、块或构造函数内定义的变量。这些变量在方法内部声明和实例化，并在方法执行完毕后被销毁。\n\
    \n### 实例变量\n\n实例变量是在类内部但在方法之外的变量。它们在类初始化的同时被初始化。可以从该特定类的方法、块或构造函数中访问它们。\n\n一个类可以包含任意数量的方法以获取其所需的值。例如，Cat\
    \ 类有三个方法：running()、sleeping() 和 jumping()。\n\n### 构造函数\n\n构造函数是用于初始化对象的方法。一个类必须至少包含一个构造函数。\n\
    \n以下是构造函数的重要规则：\n\n- 构造函数的名称应与类的名称匹配。\n- 它不应有显式的返回类型。\n\n### 构造函数的类型\n\n- 默认或无参构造函数\n\
    - 带参构造函数\n\n#### 默认构造函数\n\n没有参数的构造函数称为默认构造函数。\n\n语法如下：\n\n```java\n<class_name>(){\
    \ }\n```\n\n#### 带参构造函数\n\n带参构造函数是带有参数的构造函数。它用于为特定对象提供值。\n\n以下示例展示了两种类型的构造函数。第一个是默认构造函数，它没有任何参数。第二个构造函数有一个参数，即名字。\n\
    \n```java\npublic class Kitten {\n    public Kitten() {\n    }\n\n    public Kitten(String\
    \ name) {\n        // 此构造函数有一个参数，name。\n    }\n}\n```\n\n### 创建对象\n\n类为对象提供了模板。对象基本上是从类创建的。要创建新对象，你将使用\
    \ 'new' 关键字。\n\n从类创建新对象需要采取以下步骤：\n\n- 声明——这指的是变量声明，你将写下变量的名称及其对象类型。\n- 实例化——要创建一个新对象；你将使用\
    \ 'new' 关键字。\n- 初始化——在 'new' 关键字之后调用一个构造函数，并初始化一个新对象。\n\n以下示例展示了从类创建新对象的不同步骤：\n\
    \n```java\npublic class Kitten {\n    public Kitten(String name) {\n        //\
    \ 此构造函数包含一个参数，name。\n        System.out.println(\"Passed Name is:\" + name);\n\
    \    }\n\n    public static void main(String[] args) {\n        // 以下语句将创建一个对象\
    \ myKitten\n        Kitten myKitten = new Kitten(\"spotty\");\n    }\n}\n```\n\
    \n输出如下：\n\n```\nPassed Name is: spotty\n```\n\n### 如何访问方法和实例变量\n\n创建的对象用于访问方法和实例变量。要访问实例变量，你将使用以下步骤：\n\
    \n首先，你必须创建一个对象：\n\n```java\nObjectName = new Constructor();\n```\n\n接下来，调用一个变量，如：\n\
    \n```java\nObjectName.variableName;\n```\n\n要调用一个类方法：\n\n```java\nObjectName.MethodName();\n\
    ```\n\n## Java 包\n\n包只是将接口和类分组的一种方式。Java 包作为类的容器。分组的通常依据是功能。使用包有助于代码重用。当接口和类被分类到包中时，你可以轻松地访问它们以在其他程序中使用。使用包还有助于防止类和接口之间的名称冲突。\n\
    \n要创建一个包，请在包名之前使用 package 语句作为第一条语句。\n\n示例如下：\n\n```java\npackage mypack;\npublic\
    \ class students\n{\n    ...语句;\n}\n```\n\n### 导入语句\n\n你可以使用 import 关键字将包导入到你的源文件中。导入语句使编译器更容易找到类或源代码的位置。\n\
    \n你可能只想从一个包中导入一个类。你可以使用点运算符来指定包和类。例如：\n\n```java\nimport java.util.Date;\nclass\
    \ MyDate extends Date\n{\n    //语句。\n}\n```\n\n要从一个包中导入所有类，你可以在点运算符后使用通配符 *。例如：\n\
    \n```java\nimport java.util.*;\n```"
