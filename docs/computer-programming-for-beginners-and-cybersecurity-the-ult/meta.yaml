    ## What is C++?


    A lot of beginners categorize C++ as a complicated programming language. Whatever
    the reason it may be, C++ is not a complicated language but a computer language
    that is with a lack of good resources for beginners. This is the way it is because
    it is a programming language that has evolved from another major programming language
    (C programming language) for the past four decades.


    > "C++ is a programming language that is a spinoff to C programming language with
    the addition of Object-oriented principles such as inheritance and polymorphism.
    C++ is a subset language of C that evolved into a much bigger instance that it
    is intended to be."


    ## History of C++


    In the initial days, C++ is just used as a fork language for C and is used to
    be converted back to C before compiling as there is no direct compiler. A compiler
    called Cfront is famous for doing this job. However, after a few years, people
    working with C++ have found it too difficult to create code in a language that
    doesn''t have an actual compiler. So, certain developers started developing a
    compiler, and the task is finally achieved by Bjarne Stroustrup with a working
    C++ compiler.


    With the implementation of strict syntactical structures within few years, C++
    has been recognized by ISO (International Standard Organization) in 1998. The
    first updated version was released in the same year, and people were surprised
    by the new additional features that C++ started to offer. It has started using
    advanced turing techniques to decrease the compile-time and has also introduced
    templates in the first version. All these robust new features have helped C++
    to develop complex software that supports system programming. Within a few years,
    C++ has improved tremendously and has included a lot of advanced features that
    can be used to create generic applications.


