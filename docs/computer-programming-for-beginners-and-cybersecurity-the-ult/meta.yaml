    7.  计算机技术也影响了超市行业。为了理解这一点，让我们举个例子，老年人与当地卖家有过很棒的互动。此外，卖家能够以个性化的方式满足客户的需求。但由于超市连锁店的出现和增加，这种关注现在消失了。但卖家能够借助数据分析与他们的客户进行沟通。

