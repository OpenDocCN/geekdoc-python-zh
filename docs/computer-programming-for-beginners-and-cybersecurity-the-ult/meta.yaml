  mdcn: "Java 变量在开始时可以不声明任何值；在这种情况下，Java 会选择为这些变量赋予一个特定的默认值，例如：\n\n```\nByte a;\n\
    Short num;\nBoolean answer;\n```\n\n将分别产生值 0、0 和 false。更完整的默认值列表如下：byte、short、int\
    \ 和 long 数据类型的默认值均为 0，而 float 和 double 数据类型的默认值为 0.0，char 数据类型的默认值为 ‘\\u0000’，字符串或任何其他对象的默认值为\
    \ null，所有布尔值的默认值均为 false。\n\n在 Java 中，变量在声明时是静态的，这意味着程序员必须定义变量将包含的数据类型。举例来说，如果我们希望使用变量\
    \ `num` 来存储一个数字，我们必须首先声明该变量：\"int num\"，然后才能为其赋值，例如 \"num = 10\"。\n\n上述过程通常被称为“赋值语句”，即为程序员声明的变量赋予一个值。然而，关于\
    \ Java 以及实际上大多数编程语言的工作方式，一个显著的特点是，在赋值语句中，例如我们的例子 `num = 10`，实际存储的值是等号右边的值，即 10，而\
    \ `num` 只是调用该存储值的“标记”。这就是为什么许多 Java 程序员倾向于使用“获取”值而不是“赋值”这个术语，尽管在大多数情况下，它们可以互换使用，并且在一些罕见场景之外，功能基本相同。\n\
    \n但请注意，一旦为变量赋值，就需要执行函数才能改变该变量内部数据的数据类型。\n\n## 命名变量\n\n创建变量是一项简单的任务，特别是考虑到 Java\
    \ 程序员倾向于根据数据类型或变量将存储的用途来创建和命名它们。然而，在命名这些变量时有一些规则，否则 Java 将无法识别它，并导致错误消息。变量名的主要限制是它不应以特殊字符开头，例如下划线或数字。但是，变量名可以由字母和数字等字符组成，甚至可以包含下划线，只要下划线不在开头即可。不能使用其他字符，例如\
    \ # 或 $，因为这些特殊字符在 Java 中有不同的用途，因此不会在变量名中被识别。\n\n虽然这些是主要规则，但这里有一些关于命名变量的技巧。变量名应该是描述性的，因为在较长的代码中，可能很难回忆起\
    \ \"x\" 是什么用途。拥有像 \"count\" 或 \"output\" 这样的变量名比使用通用的 \"x\" 或 \"y\" 更容易回忆，并有助于避免混淆。除了具有描述性之外，如果变量名保持相当简短，使用起来也会更容易。虽然像\
    \ banking information account records 这样的变量名非常具有描述性，但在程序中根据需要反复输入它会变得很累，并且较长的变量名会增加打字错误的机会，这将导致代码中的错误，从而导致运行时错误或代码无法按预期工作，或者虽然能工作但会引入错误。还要注意，Java\
    \ 变量通常用全小写字母书写，虽然对大小写没有限制，但保持小写可以简化事情，因为漏掉大写可能导致变量无法被识别，因为 Java 将大写字母视为与小写字母完全不同的字符。\n\
    \n## Java 基本类型\n\n## 方法命名约定\n\n我们将重新审视 Java 中的命名约定，因为您将使用成员方法。Java 编程中的方法执行操作，它们也接收调用者提供的任何参数，并且还可以将操作结果返回给调用者。以下是声明方法的语法：\n\
    \n```\n[访问控制修饰符] 返回类型 方法名 ([参数集]) {\n    // 方法体\n\n    ......\n}\n```\n\n在为您将编写的方法命名时，请记住以下几条规则。方法名始终是动词，或者更具体地说是动词短语（这意味着您可以使用多个单词来命名它们）。方法名的第一个单词应全部使用小写字母，而其余单词应遵循驼峰命名格式。以下是一个示例：\n\
    \n```\nwriteMethodNamesThisWay( )\n```\n\n现在，您应该记住，动词用于方法名，它们表示一个动作，而名词用于变量名，它们表示某个属性。\n\
    \n遵循声明方法的语法以及此 Java 构造的命名约定，以下是可用于计算圆面积的示例代码。\n\n```\npublic double computeCircleArea()\
    \ {\n\nreturn radius * radius * Math.PI;\n\n}\n```\n\n## 在代码中使用构造函数\n\n我们将简要介绍一些与面向对象编程相关的额外细节。如前所述，构造函数看起来像一个方法，您当然可以将其视为\
    \ Java 编程中一种特殊类型的方法。\n\n然而，构造函数在几个方面仍然与方法不同。构造函数的名称将与类名相同。使用关键字或运算符 \"new\" 来创建构造函数的新实例并对其进行初始化。以下是使用类\
    \ \"Employee\" 以及在代码中初始化它的多种方式的示例：\n\n```\nEmployee payrate1 = new Employee( );\n\
    \nEmployee payrate2 = new Employee(2.0);\n\nEmployee payrate3 = new Employee(3.0,\
    \ “regular”);\n```\n\n构造函数还会隐式返回 void——这仅仅意味着它没有返回类型。您不能在构造函数体内放置 return 语句，因为编译器会将其标记为错误。调用构造函数的唯一方法是通过使用\
    \ \"new\" 语句。我们已经在上面的示例中给出了几种调用构造函数的方法。\n\n最后一个区别是构造函数不能被继承。让我们回到上面提供的示例——第一行包含\
    \ \"Employee( );\"——这被称为默认构造函数。如您所见，它没有任何参数。默认构造函数的工作只是将成员变量初始化为特定的默认值。在上面的示例中，成员变量\
    \ payrate1 被初始化为其默认工资率和员工状态。\n\n构造函数也可以重载吗？是的，它们可以。构造函数的行为也像方法，这意味着您可以像重载方法一样重载构造函数。以下是您可以重载构造函数的一些示例。我们使用\
    \ Employee 类并使用不同的参数对其进行重载。\n\n```\nEmployee( )\n\nEmployee(int r)\n\nEmployee(int\
    \ r, String b)\n```\n\n## 如何初始化变量\n\n现在我们知道了如何声明变量，并且知道我们可以使用的各种类型的变量，接下来要做的是学习如何在所谓的“表达式”中使用这些变量。表达式是\
    \ Java 程序最常用的构建块，通常旨在产生一个新值作为结果，尽管在某些情况下，表达式用于为变量赋予新值。通常，表达式由值、变量、运算符和方法调用等组成。也有一些表达式不产生结果，而是影响另一个变量。一个例子是基于操作改变变量值的表达式：没有新值输出，也没有真正的新值“赋值”，而是产生所谓的副作用，导致变量值改变。\n\
    \n我们介绍的 \"Hello World\" 打印程序将原始值引入打印函数，也称为“硬编码”输出。然而，此时，我们应该尝试结合我们所学的关于变量的知识。变量的操作方式与原始值非常相似，因为它们只是引用计算机先前存储的值，因此程序员可以使用变量名而不是值。为了演示这一点，让我们回顾一下之前的\
    \ \"Hello World\" 程序：\n\n```\nprint (\"Hello World\") ;\n\ninput (\"\\n\\nPlease\
    \ press the return key to close this window.\") ;\n```\n\n现在，我们不再硬编码 \"Hello World\"\
    \ 字符串，而是可以简单地将其声明为一个变量，并让程序输出该变量。这最终应该看起来像：\n\n```\nString string = \"Hello World\"\
    \ ;\n\nprint(string) ;\n\ninput (\"\\n\\nPlease press the return key to close\
    \ this window.\") ;\n```\n\n这应该产生与之前程序相同的结果，看起来类似于：\n\nHello World\n\nPlease press\
    \ the return key to close this window."
