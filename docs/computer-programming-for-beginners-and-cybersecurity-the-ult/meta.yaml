- md: "## Switch\n\nIf you have a variable and different blocks of code need to be\
    \ executed for different values of that variable, the ideal construct that can\
    \ be used is the switch statement. The syntax for this construct is—\n\n```\n\
    switch(variable){\ncase <value1>:\n/*body*/\nbreak;\ncase <value2>:\n/*body*/\n\
    break;\ncase <value3>:\n/*body*/\nbreak;\ndefault:\n/*body*/\nbreak;\n}\n```\n\
    \nSample implementation for this construct is given below—\n\n```\npublic class\
    \ switchDemo {\n    public static void main(String args[]) {\n        int i =\
    \ 5;\n        switch (i) {\n            case 0:\n                System.out.print(0);\n\
    \                break;\n            case 2:\n                System.out.print(2);\n\
    \                break;\n            case 5:\n                System.out.print(5);\n\
    \                break;\n            default:\n                System.out.print(999);\n\
    \                break;\n        }\n    }\n}\n```\n\n## Conditional Operator\n\
    \nJava also supports the conditional operator, which is also known as the ?: operator.\
    \ This operator is used to replace the ‘if else’ construct. Its syntax is as follows—\n\
    \nExpression1? Expression2: Expression3\n\nHere, Expression1 is the condition\
    \ that is to be tested. If the condition is true, Expression2 is executed else\
    \ Expression3 is executed.\n\n## Loop Control\n\nThere are several situations\
    \ that require you to iterate the same set of instructions a number of times.\
    \ For instance, if you need to sort a set of numbers, you will need to scan and\
    \ rearrange the set several times to get the desired arrangement. This flow of\
    \ execution is known as loop control.\n\nSimply, a loop is a construct that allows\
    \ the execution of a block of code many times. Java supports several constructs\
    \ that can be used for implementing loops. These include a while loop, for loop,\
    \ and do while loop.\n\nA while loop executes a block of code iteratively until\
    \ the condition specified for the while loop is true. The moment this condition\
    \ fails, while loop stops.\n\nFor loop allows the programmer to manipulate the\
    \ condition and loop variable in the same construct. Therefore, you can initialize\
    \ a loop variable, increment/decrement it, and run the loop until a condition\
    \ on this variable is true.\n\nDo while loop is similar to while loop. However,\
    \ in the while loop, the condition is checked before executing the block code.\
    \ On the other hand, in a do while loop, the block of code is executed, and then\
    \ the condition is checked. If the condition is satisfied, the loop execution\
    \ is again initiated else the loop is terminated. It would not be wrong to state\
    \ that the do while loop, once implemented, will execute at least once.\n\n##\
    \ Loop statements\n\nThere are two keywords that are specifically used in connection\
    \ with loops and are also termed as control statements as they allow transfer\
    \ of control from one section of the code to a different section. These keywords\
    \ are—\n\n### Break\n\nThis keyword is used inside the loop at a point where you\
    \ want the execution flow to terminate the loop and directly start execution from\
    \ the first instruction that appears after the loop.\n\n### Continue\n\nThis keyword\
    \ is used inside the loop at a point where the programmer wants the computer to\
    \ overlook the rest of the loop and move the control to the first statement of\
    \ the loop.\n\nIn order to help you understand how loops are executed, let us\
    \ take an example and implement it using all the three types of loop control.\n\
    \n### For Loop Implementation\n\n```\npublic class forDemo {\n    public static\
    \ void main(String args[]) {\n        int [] numberArray = {100, 300, 500, 700,\
    \ 900};\n        for(int i=0; i<5; i++) {\n            System.out.print(numberArray[i]);\n\
    \            System.out.print(\",\");\n        }\n        System.out.print(\"\\\
    n\");\n    }\n}\n```\n\n### While Loop Implementation\n\n```\npublic class whileDemo\
    \ {\n    public static void main(String args[]) {\n        int [] numberArray\
    \ = {100, 300, 500, 700, 900};\n        int i = 0;\n        while(i<5) {\n   \
    \         System.out.print(numberArray[i]);\n            System.out.print(\",\"\
    );\n            i++;\n        }\n        System.out.print(\"\\n\");\n    }\n}\n\
    ```\n\n### Do While Loop Implementation\n\n```\npublic class doWhileDemo {\n \
    \   public static void main(String args[]) {\n        int [] numberArray = {100,\
    \ 300, 500, 700, 900};\n        int i = 0;\n        do {\n            System.out.print(numberArray[i]);\n\
    \            System.out.print(\",\");\n            i++;\n        } while (i<5);\n\
    \        System.out.print(\"\\n\");\n    }\n}\n```\n\n## Enhanced For Loop\n\n\
    Java also supports an enhanced loop structure, which can be used for array elements.\
    \ The syntax for this loop construct is—\n\n```\nfor(declaration : expression)\
    \ {\n    /*Body*/\n}\n```\n\nThe declaration part of the Enhanced for loop is\
    \ used to declare a variable. This variable shall be local to the ‘for loop’ and\
    \ must have the same type as the type of the array elements. The current value\
    \ of the variable is always equal to the array element that is being traversed\
    \ in the loop. The expression is an array or a method call that returns an array.\n\
    \nSample implementation of the enhanced for loop has been given below -\n\n```\n\
    public class forArrayDemo {\n    public static void main(String args[]) {\n  \
    \      int [] numberArray = {100, 300, 500, 700, 900};\n        for(int i : numberArray\
    \ ) {\n            System.out.print( i );\n            System.out.print(\",\"\
    );\n        }\n        System.out.print(\"\\n\");\n    }\n}\n```\n\n## Exception\
    \ Hierarchy\n\nJava has an inbuilt class named java.lang.Exception and all the\
    \ exceptions fall under this class. All the exception classes are subclasses of\
    \ this class. Moreover, the Throwable class is the superclass of the exception\
    \ class. Another subclass of the Throwable class is the Error class. All the errors\
    \ like stack overflow described above fall under this Error class.\n\nThe Exception\
    \ class has two subclasses, namely RuntimeException class and IOException class.\
    \ A list of the methods, for which definitions are available in Java, as part\
    \ of the Throwable class, is given below.\n\n```\npublic String getMessage()\n\
    ```\n\nWhen called, this message returns a detailed description of the exception\
    \ that has been encountered.\n\n```\npublic Throwable getCause()\n```\n\nThis\
    \ method, when called returns a message that contains the cause of the exception.\n\
    \n```\npublic String toString()\n```\n\nThis method returns the detailed description\
    \ of the exception concatenated with the name of the class.\n\n```\npublic void\
    \ printStackTrace()\n```\n\nThe result of toString(), along with a trace of the\
    \ stack, can be printed to the standard error stream, System.err, can be done\
    \ by calling this method.\n\n```\npublic StackTraceElement [] getStackTrace()\n\
    ```\n\nThere may be some scenarios where you may need to access different elements\
    \ of the stack trace. This method returns an array, with each element of the stack\
    \ trace saved to different elements of the array. The first element of the array\
    \ contains the top element of the stack trace, while the bottom of the stack trace\
    \ is saved to the last element of the array.\n\n```\npublic Throwable fillInStackTrace()\n\
    ```\n\nAppends the previous information in the stack trace with the current contents\
    \ of the stack trace and returns the same as an array.\n\n## Catching Exceptions\n\
    \nThe standard method to catch an exception is using the ‘try and catch’ keywords\
    \ along with their code implementations. This try and catch block needs to be\
    \ implemented in such a manner that it encloses the code that is expected to raise\
    \ an exception. It is also important to mention here that the code that is expected\
    \ to raise an exception is termed as protected code. The syntax for try and catch\
    \ block implementation is as follows—\n\n```\ntry {\n    /*Protected code*/\n\
    }catch(ExceptionName exc1) {\n    /*Catch code*/\n}\n```\n\nThe code that is expected\
