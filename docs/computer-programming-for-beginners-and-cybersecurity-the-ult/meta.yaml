    # CHAPTER 6:


    # Malware


    Let''s imagine a scenario where a client presents a file, and they are unsure
    if it''s malware and what capabilities it has.


    # Where does this malware fit in the kill chain?


    Is it the initial patient zero machine that will go online and download more malware
    code? What is this malware''s specimen capability?


    Understanding what the malware is capable of is one of the main purposes of malware
    analysis or reverse engineering. You also have to ask: What is the attacker''s
    intention?


    If it''s malware specifically for ransom, they are trying to encrypt for files
    and ask for money. If its purpose is to install other stolen PI data, then its
    intention is larger than just quick financial gain. Knowing the intention of the
    attacker helps you understand where else this malware is infecting your environment.


    # Types of Malware


    Malware is a very general category, and there are few subtypes within it:


    # Ransomware


    This malware is designed to freeze files and, as the name suggests, demand ransom
    from its victims in exchange for releasing the data; successful attackers realized
    that they could take it a step further by demanding money but not releasing the
    data. Instead, attackers demand another payment, and the cycle continues.


    Paying up might seem like the only solution to dealing with ransomware, but the
    fact is, once you pay, the attackers will keep asking for more.'
  - '[PAGE 347]


    # Adware


    This is Software that downloads, gathers, and presents unwanted ads or data while
    redirecting searches to certain websites.


    # Bots


    Bots are automatic scripts that take command of your system. Your computer is
    used as a "zombie" to carry out attacks online. Most of the time, you are not
    aware that your computer is carrying out these attacks.


    # Rootkits


    When a system is compromised, rootkits are designed to hide the fact that you
    have malware. Rootkits enable malware to operate in the open by imitating normal
    files.


    # Spyware


    Spyware transmits data from the hard drive without the target knowing about the
    information theft.


    # Remote Access Tool (RAT)


    After your system is compromised, RAT helps attackers remain in your systems and
    networks. RAT helps criminals to obtain your keystrokes, take photos with your
    camera, and/or expand to other machines. One of the most dominant features of
    this type permits the malware to transfer all of this information from the victim
    to the attacker in a protected way, so you are not even conscious you are being
    spied on.


    # Viruses


    A virus pushes a copy of itself into a device and becomes a part of another computer
    program. It can spread between computers, leaving infections as it travels.


    # Worms


    Similar to viruses, worms self-replicate, but they don''t need a host program
    or human to propagate. Worms utilize a vulnerability in the target system or make
    use of social engineering to fool users into executing the program.'
  - '[PAGE 348]


    # CHAPTER 7:


    # Cyber attacks


    # Web Attacks


    # SQL Injection


    SQL injection is also called as SQLI. SQL is a particular type of attack which
    uses malicious code for manipulating backend databases to attain data that was
    not wished-for display. Such data may consist of various items such as private
    customer details, private data of the company, and user lists.


    SQLI can cause destructive effects on a business. An effective SQLI attack can
    result in the deletion of complete tables, unsanctioned inspecting of user lists,
    and in few cases, the attacker can attain administrative access to a database,
    making it extremely destructive for a business. While calculating the expected
    price of SQLI, we must take into consideration the loss of customer faith in personal
    case information of the customer, such as details of credit card details, addresses,
    and phone numbers are stolen. Even though SQLI can be employed to attack any SQL
    database, the criminals frequently target websites.


    # Cross-Site Scripting


    Cross-site scripting (abbreviated as XSS) is a type of injection breach where
    the criminal transmits malign code into content from otherwise trustworthy websites.
    Such incidents take place when an uncertain source is permitted to attach its
    own (malign) code into different web applications, making the malign code bundled
    together with other content, which is then directed to the browser of the victim.


    Attackers normally send malign code in the form of fragments of the JavaScript
    code implemented by the browser of the victim. The exploits consist of malign
    executable scripts in various languages such as HTML,'
  - '[PAGE 349]


    Java, Flash, and Ajax. Cross-site scripting attacks can be extremely destructive;
    nonetheless, dealing with susceptibilities enabling such attacks is comparatively
    simple.


    # Distributed Denial-of-Service (DDoS) Attack


    The aim of Denial-of-service (DDoS) is to shut down a service or network, making
    it unreachable to its intended users. The attackers attain their aim through crushing
    the victim with the traffic load or else flooding it with data, which activates
    a crash. In both circumstances, the DoS attack denies genuine users like account
    holders, and company employees.


    The targets of DDoS attacks are often web servers of prestigious organizations
    like government and trade organizations, commerce, media companies, and banking.
    Even though such attacks don’t lead to theft or loss of crucial data or other
    assets, still such attacks can cost the target loads of time and money to mitigate.
    DDoS is frequently employed in combination to divert from attacks of another network


    # Password Attack


    A password attack is an effort to obtain or else decrypt the password of the user
    with maligned intentions. Different techniques are used by crackers such as dictionary
    attacks, password sniffers, and cracking programs in password attacks. Even though
    there are some defense mechanisms against such attacks, however normally, the
    method used is to inculcate a password policy which comprises a minimum length,
    distorted words, and frequent alterations.


    The recovery of the password is generally carried out by the continual guessing
    of the password by using a computer algorithm. The computer repeatedly tries various
    combinations until the successful discovery of the password.


    # Eavesdropping Attack


    These attacks initiate with the interference of network traffic. Another term
    used for Eavesdropping breach is sniffing or snooping. It is a type of a network
    security attack where the attacker attempts to steal the data send or received
    by computers, smartphones, or other digital devices. Eavesdropping'
- md: 'attacks are hard to detect as they do not cause anomalous data transmissions.

    Eavesdropping attacks aim at faded transmissions amid the server and the client,
    which allows the attacker to obtain network transmissions. Different network monitors
    such as sniffers on a server can be installed by the attacker to implement an
    eavesdropping attack and intercept data. Any device which is inside the transmission
    and reception network is a vulnerability point, including the initial as well
    as terminal devices. One method to guard against such attacks is having the information
    of devices connected to a specific network as well as information about software
    running on such devices.


    ## Brute-Force and Dictionary Network Attacks


    Brute-force and dictionary attacks are networking attacks in which an attacker
    tries to log into account of the user through systematically checking and exasperating
    all likely passwords until he finds the correct one.

    The ordinary way to carry out this type of attack is through the front door, as
    we must have a technique of logging in. If we have the necessary credentials,
    we can enter as a normal user without arising doubtful logs, or tripping IDS signatures,
    or requiring an unpatched entry.

    The meaning of brute-force is to overpower the system via repetition. During password
    hacking, the brute force needs dictionary software, which combines dictionary
    words with hundreds of diverse variations. This process is rather slow. Brute-force
    dictionary attacks can make 100 to 1000 attempts per minute.

    After trying for numerous hours or even days, such attacks can finally crack any
    password. These attacks restate the significance of best practices of passwords,
    particularly on critical resources like routers, network switches, and servers.


    ## Insider Threats


    An attack doesn''t need to be always performed by someone from outside an organization.
    At times, malicious attacks are carried out on a network or computer system by
    any individual sanctioned to access the system. Insiders executing such attacks
    have the advantage over outsider attackers as they have authorized system access.
    Moreover, they are most likely to understand network architecture and system policies.


    Additionally, normally there is minor security against insider attacks as the
    focus of the majority of organizations is to defend themselves against external
    attacks. Insider threats can leave an impact on all elements of computer security.
    Such attacks can range from injecting Trojan viruses to thieving private information
    from a system or network.


    ## Man-in-the-Middle (MITM) Attacks


    Man-in-the-middle (abbreviated as MITM) attacks are a kind of cybersecurity breach
    permitting an attacker/cracker to eavesdrop a communication amid two bodies. The
    attack takes place amid two genuinely communicating parties, allowing the attacker
    to capture communication, which they otherwise should not be able to access. This
    gives such attackers the name “man-in-the-middle.” The invader “listens” to the
    communication through capturing the public key message transmission and then retransmits
    the key message whereas switching the demanded key with his own.


    The two communicating parties continue to communicate routinely, without having
    any idea that the person who is sending messages is an unknown criminal who is
    trying to alter and access the message prior to its transmission to the receiver.
    Therefore, the intruder in this way controls the whole communication.


    ## AI-Powered Attacks


    The idea of a computer program learning on its own, constructing knowledge, and
    becoming more sophisticated in this process sounds scary (Adams 2017). We can
    easily dismiss artificial intelligence as another tech buzzword. Nevertheless,
    at present, it is being used in routinely applications with the help of an algorithmic
    process known as machine learning. Machine learning software aims to train a computer
    system to carry out a specific task on its own. Computers are trained to complete
    tasks by repeatedly doing them, whereby getting knowledge about particular hindrances
    that could hamper them.


    Hackers can make use of artificial intelligence to hack into various systems such
    as autonomous drones and vehicles, altering them into prospective weapons. AI
    makes several cyber-attacks like password cracking, and denial-of-service attacks,
    identity theft, automatic, more efficient and powerful. AI can even be used to
    injure or murder people, or cause them emotional distress or steal their money.
    Attacks on a larger scale can affect national security, cut power supplies to
    complete districts, and may shut down hospitals as well.


    # CHAPTER 8: Cyberwar


    Consider an employee’s W-2 form. Before the 2000s, the information on this form
    had a nominal value that approached the price of the paper on which it was printed.
    There was no easy way to monetize a stolen W-2 form. Today, there is a thriving
    black market for personally identifiable information. As of 2017, the going price
    for a W-2 is between $4 and $20, depending on the income of the wage earner. That
    may not seem like much, but it represents a massive increase from the two-cent
    value of a printed W-2 decades ago. Stealing even a single W-2 makes sense when
    attackers operate from a country where $20 is a full day’s wages. Stealing them
    by the hundreds or thousands using automated attacks against scores of unsuspecting
    and unprepared small businesses makes even more sense for criminals anywhere in
    the world.


    Having established why hackers are coming for your data, let’s look at the damage
    done when they strike. Continuing with the W-2 theft example, state and federal
    laws require employers to report cyber theft, also known as a data breach. Failing
    to disclose the breach opens the door to class-action lawsuits where juries can
    award unlimited damages to victims due to your negligence. Disclosing the breach
    helps shield you and the organization from claims of negligence and, in some cases,
    will prevent class-action suits. However, the organization will not be off the
    hook completely. Defending a non-class action lawsuit will cost tens of thousands
    of dollars, even if you win.


    Additional costs include losses the employee will suffer if their identity is
    used to open credit in their name, drain their bank accounts, etc. Worse, the
    threat of identity theft will follow them forever. Related, indirect costs to
    the employer include replacing the employee if he or she quits and a reduction
    in morale among peer employees. It may become harder and more expensive to hire
    good talent, and customers hearing of the breach may look at competitors they
    believe are more vigilant.


    A single stolen W-2 might net an attacker $20, but your organization and employees
    may be on the hook for tens or hundreds of thousands of dollars in damages. And
    this is just one example of how cyber-attacks wreak havoc on an organization.
    Black markets and cyber espionage make seemingly mundane data worth stealing and
    exploiting. Trade secrets, access to bank accounts, and private communication
    are very lucrative targets. Sometimes it is not your own data, but a client’s
    data accessible through you or your employees that is the target.


    Our highly connected, the digital world has ushered in a new era of cybercrime.
    One that is growing fast and changing constantly. Executives who stick their heads
    in the sand, try to keep a data breach a secret, pass off cybersecurity as just
    an IT problem, or wait for government protection will pay a steep price.


    Many executives in the 1990s were adamant that computers were a novel expense
    that would never add real value to their business models. The idea that they would
    elevate the discussion of computers to an executive-level was as absurd as typing
    their own email. Executives that clung to this view doomed their company to lose
    ground when competitors with forward-thinking executives raised technology to
    a boardroom discussion. Today cybersecurity is what computers were then. It is
    history, repeating itself, and we already know who wins. Organizations led by
    executives that are willing to buck old-school thinking and grapple with the Wild
    West of cybersecurity will come out on top.


    Today, the outdated view is thinking that cybersecurity is a technical problem
    best delegated to information technology (IT) experts. It goes hand-in-hand with
    the idea that cybersecurity involves only preventing attacks by anticipating them
    and implementing as many deterrents as possible. In contrast, a modern view of
    cybersecurity recognizes that countering every possible attack to achieve perfect
    security is financially unfeasible. This new mindset also considers what happens
    when attacks occur, because they will. Astute executives realize that spending
    every dime on prevention is futile and take a more holistic view of the problem.


    Finding the right balance among various preventive and preparatory measures is
    like building an investment portfolio of stocks, bonds, and real estate. The right
    mix depends on what the external markets are doing and your appetite'
  mdcn: '攻击之所以难以检测，是因为它们不会引起异常的数据传输。

    窃听攻击旨在截获服务器与客户端之间衰减的传输信号，使攻击者能够获取网络传输数据。攻击者可以在服务器上安装不同的网络监控器（如嗅探器）来实施窃听攻击并拦截数据。任何位于传输和接收网络内的设备都是一个漏洞点，包括初始设备和终端设备。防范此类攻击的一种方法是掌握连接到特定网络的设备信息以及这些设备上运行的软件信息。


    ## 暴力破解与字典网络攻击


    暴力破解和字典攻击是一种网络攻击，攻击者通过系统性地检查并穷举所有可能的密码，直到找到正确的密码，从而尝试登录用户账户。

    实施此类攻击的常见方式是通过“前门”，因为我们必须有一种登录技术。如果我们拥有必要的凭证，就可以作为普通用户登录，而不会引起可疑日志、触发入侵检测系统（IDS）特征，或需要未修补的入口。

    暴力破解的含义是通过重复尝试来压倒系统。在密码破解过程中，暴力破解需要字典软件，该软件将字典单词与数百种不同的变体相结合。这个过程相当缓慢。暴力破解字典攻击每分钟可以尝试100到1000次。

    经过数小时甚至数天的尝试，此类攻击最终可以破解任何密码。这些攻击再次强调了密码最佳实践的重要性，尤其是在路由器、网络交换机和服务器等关键资源上。


    ## 内部威胁


    攻击并不总是由组织外部的人员执行。有时，恶意攻击是由任何被授权访问系统的个人对网络或计算机系统实施的。执行此类攻击的内部人员比外部攻击者更具优势，因为他们拥有授权的系统访问权限。此外，他们很可能了解网络架构和系统策略。

    此外，通常对内部攻击的安全防护较少，因为大多数组织的重点是防御外部攻击。内部威胁可能影响计算机安全的所有方面。此类攻击的范围可以从注入特洛伊木马病毒到从系统或网络中窃取私人信息。


    ## 中间人（MITM）攻击


    中间人（缩写为MITM）攻击是一种网络安全漏洞，允许攻击者/破解者窃听两个实体之间的通信。攻击发生在两个真实通信方之间，使攻击者能够捕获他们原本无法访问的通信内容。这给了此类攻击者“中间人”的名称。入侵者通过捕获公钥消息传输来“监听”通信，然后重新传输密钥消息，同时用自己的密钥替换所需的密钥。

    通信双方继续正常通信，完全不知道发送消息的人是一个未知的罪犯，该罪犯试图在消息传输给接收者之前对其进行篡改和访问。因此，入侵者以这种方式控制了整个通信。


    ## 人工智能驱动的攻击


    计算机程序自主学习、构建知识并在此过程中变得更加复杂的想法听起来很可怕（Adams 2017）。我们很容易将人工智能视为另一个科技流行词。然而，目前它正借助一种称为机器学习的算法过程应用于日常应用中。机器学习软件旨在训练计算机系统自主执行特定任务。计算机通过反复执行任务来完成训练，从而获得关于可能阻碍它们的特定障碍的知识。

    黑客可以利用人工智能入侵各种系统，如自主无人机和车辆，将其转变为潜在的武器。人工智能使许多网络攻击（如密码破解、拒绝服务攻击、身份盗窃）自动化、更高效且更强大。人工智能甚至可以用来伤害或杀害他人，或造成他们情感困扰或窃取他们的钱财。大规模攻击可能影响国家安全，切断整个地区的电力供应，并可能关闭医院。


    # 第8章：网络战争


    考虑一下员工的W-2表格。在2000年代之前，这张表格上的信息价值微乎其微，接近于其印刷纸张的价格。没有简单的方法将被盗的W-2表格变现。如今，个人身份信息的黑市交易十分活跃。截至2017年，一份W-2的市价在4美元到20美元之间，具体取决于工资收入者的收入水平。这看起来可能不多，但这比几十年前印刷的W-2价值两美分有了巨大的增长。当攻击者来自一个20美元就是一天工资的国家时，即使窃取一份W-2也是有意义的。对于世界各地的犯罪分子来说，使用自动化攻击针对大量毫无防备且未做好准备的小企业，窃取数百或数千份W-2表格更有意义。


    既然我们已经确定了黑客为何要窃取你的数据，让我们来看看他们发动攻击时造成的损害。以W-2盗窃为例，州和联邦法律要求雇主报告网络盗窃，也称为数据泄露。未能披露泄露事件将为集体诉讼打开大门，陪审团可能会因你的疏忽而判给受害者无限赔偿。披露泄露事件有助于保护你和组织免受疏忽指控，并在某些情况下可以防止集体诉讼。然而，组织并不能完全摆脱责任。即使你赢了，为非集体诉讼辩护也将花费数万美元。

    额外的成本包括如果员工的身份被用于以其名义开设信贷、耗尽其银行账户等，员工将遭受的损失。更糟糕的是，身份盗窃的威胁将永远伴随着他们。相关的间接成本包括如果员工辞职需要替换员工，以及同事员工士气下降。招聘优秀人才可能变得更难、更昂贵，而听到泄露事件的客户可能会转向他们认为更警惕的竞争对手。


    一份被盗的W-2可能让攻击者获利20美元，但你的组织和员工可能需要承担数万或数十万美元的损害赔偿。而这仅仅是网络攻击如何对组织造成严重破坏的一个例子。黑市和网络间谍活动使得看似平凡的数据值得窃取和利用。商业秘密、银行账户访问权限和私人通信是非常有利可图的目标。有时，目标不是你自己的数据，而是通过你或你的员工可以访问的客户数据。


    我们高度互联的数字世界已经迎来了网络犯罪的新时代。这是一个快速发展且不断变化的时代。那些把头埋在沙子里、试图隐瞒数据泄露、将网络安全视为仅仅是IT问题，或等待政府保护的高管们将付出沉重的代价。

    20世纪90年代的许多高管坚称计算机是一种新奇的开支，永远不会为他们的商业模式增加真正的价值。将计算机讨论提升到高管层面的想法就像自己打电子邮件一样荒谬。坚持这种观点的高管注定会让他们的公司在竞争对手中失去优势，因为那些具有前瞻性思维的高管将技术提升到了董事会讨论的层面。如今，网络安全就是当时的计算机。历史在重演，我们已经知道谁会赢。由愿意打破传统思维并应对网络安全“狂野西部”的高管领导的组织将脱颖而出。


    如今，过时的观点认为网络安全是一个技术问题，最好委托给信息技术（IT）专家。这与网络安全仅涉及通过预测攻击并实施尽可能多的威慑措施来预防攻击的观点密不可分。相比之下，现代网络安全观认识到，为了实现完美安全而对抗每一次可能的攻击在经济上是不可行的。这种新思维还考虑了攻击发生时会发生什么，因为攻击总会发生。精明的高管意识到，将每一分钱都花在预防上是徒劳的，并采取更全面的视角来看待这个问题。


    在各种预防和准备措施之间找到正确的平衡，就像建立一个由股票、债券和房地产组成的投资组合。正确的组合取决于外部市场的表现以及你的风险偏好。'
