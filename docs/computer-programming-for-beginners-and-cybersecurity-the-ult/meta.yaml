- md: "proven useful in their own right but owe their existence to the need to functionalize\
    \ the Collections library.\n\nA second re-occurring theme in functional programming\
    \ is parallelization. Quite simply, functional programming offers a better mousetrap\
    \ for parallel processing. As a consequence, the Collections library has been\
    \ enriched to benefit from multi-core CPUs when processing collections. Together\
    \ with Streams, the Collections library is at center stage in bringing functional-style\
    \ parallel processing to Java.\n\nNow that we’ve studied Java’s standard functional\
    \ interfaces, we can begin to apply that knowledge to Collections. Let’s look\
    \ at what has become of the Collections library in Java 8.\n\n## Collection interface\n\
    \nWe start by looking at a brand new default method in the Collection interface\
    \ available to lists and sets. This is the forEach() method:\n\n```\n// Defined\
    \ in the Iterable interface and extended in Collection\ndefault void forEach(Consumer<?\
    \ super T> action)\n```\n\nThis method iterates through the entire collection\
    \ letting the Consumer decide what to do for each element. This is the concept\
    \ of internal iteration and a manifestation of declarative programming. The details\
    \ of how to iterate are not specified. This is in opposition to external iteration,\
    \ where the details of how to iterate as well as what to do with each element\
    \ are specified in code.\n\nWe will show examples of these functionalized collection\
    \ methods with the slapstick comedy trio from the golden age of Hollywood films:\
    \ Larry, Moe, and Curly of The Three Stooges fame. To start, let’s print the contents\
    \ of a collection:\n\n```\nCollection<String> stooges = Arrays.asList(\"Larry\"\
    , \"Moe\", \"Curly\");\n// Print the contents of the stooges collection\nstooges.forEach(System.out::println);\n\
    ```\n\nThe forEach() method has a very wide range of applicability. It is a much\
    \ more convenient way to iterate through collections and should be your de-facto\
    \ standard. However, being a declarative construct, there are some things you\
    \ will not be able to do. Most notably, you cannot change the state of local variables\
    \ like you could in a while-loop. Algorithms must be re-thought functionally.\
    \ For now, just know that forEach() is ideal for iterations that do not mutate\
    \ state.\n\nWe now look at another new method available in Collection:\n\n```\n\
    default boolean removeIf(Predicate<? super E> filter)\n```\n\nThe method removeIf()\
    \ internalizes the entire process of iterating, testing, and removing. It requires\
    \ only to be told what the condition for removal is.\n\nUsing the now-familiar\
    \ predicate functional interface, we can easily figure out what kind of lambda\
    \ to use.\n\n```\n// Remove all people not part of The Three Stooges comedy trio\n\
    List<String> theThreeStooges = new ArrayList<>\n    (Arrays.asList(\"Larry\",\
    \ \"Moe\", \"Curly\", \"Tom\", \"Dick\", \"Harry\"));\n\n// Create the predicate\
    \ that determines who is a stooge\nPredicate<String> isAStooge =\n    s -> \"\
    Larry\".equals(s) || \"Moe\".equals(s) || \"Curly\".equals(s);\n\n// Negate the\
    \ condition to remove non-stooges\ntheThreeStooges.removeIf(isAStooge.negate());\n\
    ```\n\nTo replace all contents of a List, we can use replaceAll():\n\n```\nList<String>\
    \ theThreeStooges = new ArrayList<>\n    (Arrays.asList(\"Larry\", \"Moe\", \"\
    Curly\"));\n\n// Create the lambda to feminize the names\nUnaryOperator<String>\
    \ feminize =\n    s -> \"Larry\".equals(s) ? \"Lara\" : \"Moe\".equals(s) ? \"\
    Maude\" : \"Shirley\";\n\n// Replace all male names with their female counterparts\n\
    theThreeStooges.replaceAll(feminize);\n```\n\nReplaceAll() uses a UnaryOperator\
    \ as its functional interface, which is a Function sub interface.\n\nBoth replaceIf()\
    \ and replaceAll() are available to all subclasses with one caveat: the underlying\
    \ class must support removal, or an exception will be thrown.\n\nThese examples\
    \ show the compactness of functional programming. Most of the work was done by\
    \ the function with the lambda providing the details.\n\n## Map interface\n\n\
    One of the biggest irritants of using lists as values in maps is the constant\
    \ need to check for the presence of the map before adding, updating, or removing\
    \ an element. First, you must try to extract the list and create it if it is not\
    \ found. For example, say we have a method that updates a movie database implemented\
    \ as a Map. The map’s key is the year of the movie, and its value is a list of\
    \ movies for that year. Pre-Java 8, the code would look like this:\n\n```\nprivate\
    \ Map<Integer, List<String>> movieDatabase = new HashMap<>();\n\nprivate void\
    \ addMovie(Integer year, String title) {\n    List<String> movies = movieDatabase.get(year);\n\
