    \n## CHAPTER 9: ADT, Data Structure, and Java Collections\n\n### Abstract data\
    \ type (ADT)\n\nAn abstract data type (ADT) is a logical description of the data\
    \ and the operations that are allowed on it. ADT is defined as a user point of\
    \ view of a data. ADT concerns about the possible values of the data and the interface\
    \ exposed by it. ADT does not concern about the actual implementation of the data\
    \ structure.\n\nFor example, a user wants to store some integers and find their\
    \ mean value. ADT for this data structure will support two functions, one for\
    \ adding integers and other to get mean value. ADT for this data structure does\
    \ not talk about how exactly it will be implemented.\n\n### Data-Structure\n\n\
    Data structures are concrete representations of data and are defined as a programmer\
    \ point of view of data. Data-structure represents how data will be stored in\
    \ memory. All data-structures have their own pros and cons. Depending upon the\
    \ type of problem, we choose a data-structure that is best suited for it.\n\n\
    For example, we can store data in an array, a linked-list, stack, queue, tree,\
    \ etc.\n\nNote: In this chapter, we will be studying various data structures and\
    \ their API. So that the user can use them without knowing their internal implementation.\n\
    \n### JAVA Collection Framework\n\nJAVA programming language provides a JAVA Collection\
    \ Framework, which is a set of high quality, high performance & reusable data-structures\
    \ and algorithms.\n\nThe following advantages of using a JAVA collection framework:\n\
    \n- 1. Programmers do not have to implement basic data structures and algorithms\
    \ repeatedly. Thereby it prevents the reinvention of the wheel. Thus, the programmer\
    \ can devote more effort in business logic.\n- 2. The JAVA Collection Framework\
    \ code is well-tested, high quality, high-performance code. Using them increase\
    \ the quality of the programs.\n- 3. Development cost is reduced as basic data\
    \ structures and algorithms are implemented in the Collections framework are reused.\n\
    - 4. Easy to review and understand programs written by other developers as most\
    \ of Java developers uses the Collection framework. In addition, the collection\
    \ framework is well documented.\n\n### Array\n\nArray represents a collection\
    \ of multiple elements of the same datatypes.\n\n### Array ADT Operations\n\n\
    Below is the API of the array:\n\n- 1. Adds an element at the kth position. Value\
    \ can be stored in an array at Kth position in O(1) constant time. We just need\
    \ to store value at arr[k].\n- 2. Reading the value stored at the kth position.\
    \ Accessing the value stored at some index in the array is also O(1) constant\
    \ time. We just need to read the value stored at arr[k].\n- 3. Substitution of\
    \ value stored in the kth position with a new value. Time complexity: O(1) constant\
    \ time.\n\nExample:\n\n```java\npublic class ArrayDemo {\n    public static void\
    \ main(String[] args) {\n        int[] arr = new int[10];\n        for (int i\
    \ = 0; i < 10; i++)\n        {\n            arr[i] = i;\n        }\n    }\n}\n\
    ```\n\nJAVA standard arrays are of fixed length. Sometimes we do not know how\
    \ much memory we need, so we create a bigger size array. Thereby wasting space.\
    \ If an array is already full and we want to add more values to it than we need\
    \ to create a new array, which has sufficient space and then copy the old array\
    \ to the new array. To avoid this manual reallocation and copy, we can use ArrayList\
    \ of JAVA Collection framework or Linked Lists to store data.\n\n### ArrayList\
    \ implementation in JAVA Collections\n\nArrayList<E> in JAVA Collections is a\
    \ data structure which implements List<E> interface, which means that it can have\
    \ duplicate elements in it. ArrayList is an implementation as a dynamic array\
    \ that can grow or shrink as needed. (Internally array is used when it is full\
    \ a bigger array is allocated, and the old array values are copied to it).\n\n\
    Example:\n\n```java\nimport java.util.ArrayList;\n\npublic class ArrayListDemo\
    \ {\n    public static void main(String[] args) {\n        ArrayList<Integer>\
    \ al = new ArrayList<Integer>();\n        al.add(1); // add 1 to the end of the\
    \ list\n        al.add(2); // add 2 to the end of the list\n        System.out.println(\"\
    Contents of Array: \" + al);\n        System.out.println(\"Array Size: \" + al.size());\n\
    \        System.out.println(\"Array IsEmpty: \" + al.isEmpty());\n        al.remove(al.size()\
    \ -1); // last element of array is removed.\n        al.removeAll(al); // all\
    \ the elements of array are removed.\n        System.out.println(\"Array IsEmpty:\
    \ \" + al.isEmpty());\n    }\n}\n```\n\nOutput:\n\nContents of Array: [1, 2]\n\
    \nArray Size: 2\n\nArray IsEmpty: false\n\nArray IsEmpty: true\n\n### Linked List\n\
    \nLinked lists are a dynamic data structure, and memory is allocated at run time.\
    \ The concept of the linked list is not to store data contiguously. Nodes of the\
    \ linked list contain a link that points to the next elements in the list.\n\n\
    Performance-wise linked lists are slower than arrays because there is no direct\
    \ access to linked list elements. Linked list is a useful data structure when\
    \ we do not know the number of elements to be stored ahead of time. There are\
    \ many types of linked lists: linear, circular, doubly, doubly circular, etc.\n\
    \n### Linked list ADT Operations\n\nBelow is the API of Linked list.\n\nInsert(k):\
    \ adds k to the start of the list\n\nInsert an element at the start of the list.\
    \ Just create a new element and move pointers. So that this new element becomes\
