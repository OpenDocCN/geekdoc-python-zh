- img_proc: true
  md: 'Though not mandatory, it''s a good idea to organize your own functions in the
    same way as supplied library functions.


    This allows you to use the functions in more than one program without having to
    respecify the code.


    In order to call library functions in a program, you must specify the header file
    that contains the appropriate function prototype.


    This is usually done at the beginning of a source file.


    But it must be done before the function is used by the program.


    Header files can be included in a program by using the #include preprocessor directive.


    This tells the preprocessor to open the named header file and insert its contents
    where the #include statement appears.


    ```

    #include <string>

    #include "myfuncs.h"

    ```


    You can name files in an #include statement in two ways, that is in double quotes
    or in angle brackets (<>).


    Filenames in angle brackets tell the preprocessor to look through a search path
    specified in the environment.


    ```

    #include <string>

    #include "myfuncs.h"

    ```


    Filenames in double quotes tell the preprocessor to search the current directory
    first, then the specified search path.


    An error is reported if a file cannot be found.


    ```

    #include <string>

    #include "myfuncs.h"

    ```


    The linker always searches for the compiled versions of any functions'
