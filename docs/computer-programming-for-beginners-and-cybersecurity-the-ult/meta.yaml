    它是一个多功能应用程序，解决了绝大多数电子邮件安全问题。它拥有来自 80 多个国家近 200 万个域名的信息。它同样以软件即服务（SAAS）的形式提供。它可以帮助保护用户的应用程序免受垃圾邮件、病毒、网络钓鱼和恶意软件的侵害。


