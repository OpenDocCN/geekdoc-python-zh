    \n```\ntup1 = (1, True, 7.5, 9)\n```\n\n你也可以使用 tuple() 函数来创建元组。访问元组的值是通过结构的经典索引完成的。因此，如果我们想访问元组的第三个元素，我们使用：\n\
    \n```\nIn []: tup1[2]\nOut []: 7.5\n```\n\n元组可能很有趣，因为它们占用的内存很少。另一方面，它们被用作返回多个值的函数的输出。作为结构的元组是对象。它们有简洁的方法。对于元组来说，这些方法很少：\n\
    \n```\nIn []: tup1.count(9)\nOut []: 1\n```\n\n我们通常更喜欢更灵活的列表。\n\n### 列表\n\n列表是\
    \ Python 中的参考结构。它是可修改的，可以包含任何对象。\n\n#### 创建列表\n\n我们使用方括号创建列表：\n\n```\nlist1 =\
    \ [3, 5, 6, True]\n```\n\n你也可以使用 list() 函数。列表的结构是可编辑的。它有许多方法：\n\n- .append()：在列表末尾添加值\n\
    - .insert(i, val)：将值插入到索引 i 处\n- .pop(i)：检索索引 i 处的值\n- .reverse()：反转列表\n- .extend()：用一个值列表扩展列表\n\
    \n注意——所有这些方法都会修改列表，用经典代码表示等价于：\n\n```\nliste1.extend(list2)\n等价于\nlist1 = list1\
