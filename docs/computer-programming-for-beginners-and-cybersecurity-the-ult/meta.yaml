    # Spliterator


    The Collections library is still subject to the same constraints regarding concurrent
    access. As always, you must choose the Collections library class that corresponds
    to your thread safety requirements. This is because the new methods shown above
    are just functional abstractions riding above the same underlying data structures.
    These methods are not particularly amenable to functional programming’s take on
    parallel processing because they are still based on the notion of multiple threads
    mutating the collection and synchronizing access to the underlying data. However,
    there exists a new Java 8 abstraction that is compatible. It is designed to iterate
    over data in parallel. The idea is embodied by the Spliterator interface. The
    premise of this interface is to partition the data and handoff chunks to different
    threads. Spliterators can be obtained from the Collection interface, including
    subinterfaces List and Set.


    Central to the Spliterator interface are these three methods:


    ```

    Spliterator<T> trySplit();


    default void forEachRemaining(Consumer<? super T> action) {...}


    boolean tryAdvance(Consumer<? super T> action);

    ```


    The method trySplit() partitions the underlying data in two. It creates a new
    Spliterator with half the data and keeps the other half in the original instance.
    Each can be given to a thread which, in turn, iterates over the partitioned data
    using forEachRemaining(). The method tryAdvance() is a one-at-a-time variant that
    returns the next element or null if the list has been exhausted.


    Spliterators do not handle parallel processing themselves but provide the abstraction
    to do so. Here’s the concept in action:'
