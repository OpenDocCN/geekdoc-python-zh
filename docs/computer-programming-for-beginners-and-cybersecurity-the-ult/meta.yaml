  md: 'That is how a linked list works. It is made of nodes. Each node has at least
    one variable that holds data (a text or number or object) and one variable (pointer)
    that holds the address of the next node. This system walks through the node list
    as you did in the puzzle. The pointer of the last node has null value, or it may
    point to the first node. Then we have a closed linked list.


    # ADD A NODE


    If you want to add a new node to the end of the linked list, you have to create
    a new node. Then point the pointer of the last node to the address of the new
    node and assign null to the new node pointer.


    ![](img/a8d6ec92209e49212ed71a37263c49f8_215_0.png)


    Figure Adding a node to the end of the linked list.


    If you want to add a new node to the beginning of the linked list, you have to
    create a new node. Point the pointer of the new node to the first node, and that
