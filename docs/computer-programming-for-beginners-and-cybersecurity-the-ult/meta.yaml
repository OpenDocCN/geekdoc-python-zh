    \ his garage\"\n```\n\n## 使用方法更改字符串大小写\n\n使用字符串时，你可以执行的一个简单任务是更改特定单词的大小写。你认为下面代码的输出会是什么？\n\
    \n```\nfull_name = \"johnson boris\"\nprint(full_name.title())\n```\n\n编写代码后，在运行之前将文件保存为\
