    Consumers have also become quite sensitive to cybersecurity, and it is reflected
    in their buying habits. Forward-thinking executives can capitalize on this trend
    too. A prominent example was Apple’s stance on personal privacy when the FBI demanded
    they decrypt an iPhone used in a terrorist event. Playing up their investments
    in encryption and demonstrating loyalty to a client even in the worst of times
