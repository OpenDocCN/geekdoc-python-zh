- md: '## CHAPTER 5: Securing Your Small Business Computer and Network Security


    As the internet has evolved over the past decade, so have hackers. Network security
    has become one of the most crucial factors companies consider because of the continuous
    growth of computer networks.


    Big corporations like Microsoft are constantly designing and building software
    products that need to be protected against hackers and foreign attackers because
    these are the kinds of people who will stop at nothing until they get what they
    want.


    The more network security an individual has, the less chance there is of a hacker
    accessing their data and files.


    Network security is the process by which measures are taken to prevent unauthorized
    access, misuse, or modification of information passed over a network. In other
    words, network security simply means that any computers accessing a private network
    are protected from any forms of cyber theft or manipulation.


    ## Network security


    There are three ways to better protect a network; these are intrusion detection
    systems, WPA/WPA2, which stands for ‘Wireless Protected Access,’ and Security
    Sockets Layer (SSL).


    ### Intrusion Detection Systems


    These systems are software programs designed to protect networks. They are intended
    to monitor server channels and detect malicious programs being sent across these
    servers. There are two types of IDS systems. The first is known as an active IDS,
    this is a more secure software that not only monitors server channels, but it
    can also block and remove any malicious programs it detects.


    This type of IDS system doesn’t need human involvement to protect a computer or
    network. The second kind of IDS is less protective in that it only monitors a
    server and alerts a user to a threat if one is found. These programs will not
    destroy or quarantine any malicious software.


    ### Wireless Protected Access


    Wireless protected access, also known as ‘WPA,’ is a form of network encryption.
    There are two types of this security system, WPA, and WPA2. Both are more secure
    than the traditional WEP security found on old routers, and WPA2 is the most secure.
    Most modern routers found in stores today offer WPA2 encryption levels. The reason
    why both security features are useful is because they make it more difficult for
    an attacker to get into a wireless network. WPA2 offers a higher and more complex
    security layer by using different key setups for network access. This means that
    WPA2 makes it harder for an attacker to crack a password for a wireless network.


    ### Security Sockets Layer


    A Security Sockets Layer (SSL) is a form of internet protection provided by encryption.
    Its purpose is to encrypt any data you send over a network to prevent anyone else
    on your network from seeing the actual information being transferred. SSLs are
    very important for anyone entering private information on a website. They work
    by verifying what is known as a website certificate. A certificate is what websites
    use to verify themselves. When you connect to a website, the server the website
    runs on sends you its certificate to verify its authenticity. A website can only
    acquire these certificates by applying for them, and they have to follow a strict
    set of security guidelines.


    So, to keep this from getting complicated, if a website has a credible website
    certificate using SSL, any information you send or receive from that site will
    be encrypted and safe from any possible attackers.


    Also, you can see if a website is secure by looking for the https in the URL at
    the top of your internet browser.


    ## Computer security


    Computer security, on the other hand, is the protection of data physically stored
    on a computer. This includes taking steps to prevent attacks under the triad of
    information security, also known as the CIA (confidentiality, integrity, and availability).


    A few of the basic methods below pertain to computer security and will cover passwords,
    software updates, firewalls, anti-virus or malware programs, ad-blockers, email
    encryption, and data backups.


    ### Having a good password


    A good password consists of three basic qualities: Its length, the characters
    used, and the combination of upper- and lower-case letters. The longer a password
    is, the harder it is to break. Some hackers try to use algorithms in which they
    send massive amounts of combinations, hoping that one is a match to the secret
    password. By increasing the length of a password, its chances of being cracked
    decreases.


    A mixture of letters and symbols, such as exclamation marks, help protect your
    password from being stolen. This also applies to add uppercase letters into your
    password. A password such as ‘password1’ is very weak in comparison to a password
    like ‘PasSWord2018!’ The combination of upper-case letters and symbols decreases
    the chances that a password can be hacked through brute force.


    Another method you can use to create incredibly secure passwords is getting a
    program like ‘LastPass’ or ‘Password Boss.’ These programs randomly create a password
    that is incredibly secure. Using a program like this will provide a unique password
    for everything a person uses. This means that if a hacker can get into one of
    an individual’s accounts, they will not have the password for the other programs
    or web services.


    ### Software updates


    Software updates are very important as they protect your computer or mobile device.
    Software updates are used to patch holes or bugs found in an operating system,
    and this will make your device more secure. Check your operating system often
    to see if a new update is available. Some operating software update automatically.


    ### Firewalls


    Firewalls are great protection for computers because they prevent unwanted data
    from getting to your computer. They monitor the flow of incoming data and run
    checks to see if the information that’s about to be received by your computer
    is harmful or not. For example, anytime a user downloads something from a website,
    the firewall will scan the file in question and determine if it is malicious or
    not. Not all firewalls are the same. Most operating systems come with a built-in
    firewall, so there is hardly a reason to install additional firewalls. Also, these
    OS companies are constantly updating their security features to make them more
    reliable. Firewalls prevent unauthorized access to or from a private network.


    ### Antivirus software


    One of the most effective and common methods of dealing with malware is anti-malware
    Software. Programs such as Windows Essentials, McAfee, and Bitdefender allow a
    user to run scans on a system to search for infected files. If any files are found
    to be corrupted, these programs alert the operator, allowing him or her to remove
    the files in question.


    This type of Software is also very useful as it can scan any downloaded items
    or email attachments before allowing the user to download them. This is a crucial
    protective barrier, as it prevents any malicious programs from installing itself
    on a device.


    These types of Software can also analyze what kind of virus, worm, or Trojan has
    infected the computer in question.


    This kind of protective Software will remove anything malicious automatically
    from the computer but will be unable to recognize threats such as ransomware or
    keyloggers.


    ### Ad blockers


    Most browsers have extensions that can be added to the browser, which blocks pesky
    advertisements. For example, the Google Chrome web store has a variety of additional
    extensions users can download and run while using the browser (not all being adblockers).


    Chrome has an adblocker made specifically for the Chrome browsers, which limit
    the number of ads that pop up while you visit websites. Ad blockers can also be
    downloaded directly onto the computer’s hard drive instead of a web browser.


    ### Email encryption


    Encryption protects emails by making the content of emails unreadable to any entity,
    besides the intended recipients. Popular email services such as Gmail have since
    added encryption of emails to their network. However, it only protects data that’s
    on their servers. This means that data is still vulnerable while it bounces around
    on other internet networks unless users implement client-side encryption. Most
    methods that allow this are complicated processes that require exchanging certificates
    with everyone who will be receiving or sending emails with one another.


    Fortunately, there is an alternative called Virtru that works with Gmail accounts
    as well as Outlook. This allows users real, client-side encryption without the
    prolonged process of exchanging certificates. Virtru is a plug-in that users can
    download onto their web browsers to freely send and accept emails from Outlook
    or Gmail accounts without any compatibility issues.


    ### Data backups


    Data backups are an important but overlooked aspect of computer security. By performing
    regular backups of all important data on a computer, the user protects themselves
    from the risk of a crash or virus and lose important data. Data backups typically
    upload data to an outside source, either to a cloud storage server, or a storage
    device.


    Any data that isn’t backed up can be completely lost if the computer hardware
    fails or data is corrupted. Like the old saying, “It is better to be safe than
    sorry.”


    ## Failed security


    If both security types fail, what could be put at risk? The types of information
    hackers may attempt to steal are divided into two categories: personal and financial.
    Regarding personal information, a hacker could use it to create fake web accounts,
    social media accounts, or a new identity altogether. The rampancy of identity
    theft today is fueled by the enormous amounts of information that can be collected
    from the internet. According to the identity'
  mdcn: '## 第五章：保障您的小型企业计算机与网络安全


    随着互联网在过去十年的演进，黑客技术也在不断发展。由于计算机网络的持续增长，网络安全已成为企业考虑的最关键因素之一。


    像微软这样的大公司不断设计和构建软件产品，这些产品需要防范黑客和外部攻击者，因为这些人会不择手段地达到目的。


    个人拥有的网络安全措施越多，黑客访问其数据和文件的机会就越少。


    网络安全是指采取措施防止未经授权访问、滥用或修改通过网络传输的信息的过程。换言之，网络安全简单来说就是确保任何访问私有网络的计算机都受到保护，免受任何形式的网络盗窃或操纵。


    ## 网络安全


    有三种方法可以更好地保护网络；它们是入侵检测系统、WPA/WPA2（代表“无线保护访问”）和安全套接层（SSL）。


    ### 入侵检测系统


    这些系统是旨在保护网络的软件程序。它们旨在监控服务器通道并检测通过这些服务器发送的恶意程序。IDS系统有两种类型。第一种是主动型IDS，这是一种更安全的软件，它不仅监控服务器通道，还能阻止并清除其检测到的任何恶意程序。


    这种类型的IDS系统无需人工干预即可保护计算机或网络。第二种IDS的保护性较弱，因为它只监控服务器，并在发现威胁时向用户发出警报。这些程序不会销毁或隔离任何恶意软件。


    ### 无线保护访问


    无线保护访问，也称为“WPA”，是一种网络加密形式。这种安全系统有两种类型：WPA和WPA2。两者都比旧路由器上传统的WEP安全更安全，而WPA2是最安全的。如今商店中大多数现代路由器都提供WPA2加密级别。这两种安全功能之所以有用，是因为它们使攻击者更难进入无线网络。WPA2通过使用不同的密钥设置进行网络访问，提供了更高、更复杂的安全层。这意味着WPA2使得攻击者更难破解无线网络的密码。


    ### 安全套接层


    安全套接层（SSL）是一种通过加密提供的互联网保护形式。其目的是加密您通过网络发送的任何数据，以防止网络上的其他人看到传输的实际信息。SSL对于在网站上输入私人信息的任何人来说都非常重要。它们通过验证所谓的网站证书来工作。证书是网站用来验证自身的工具。当您连接到一个网站时，该网站运行的服务器会向您发送其证书以验证其真实性。网站只能通过申请来获得这些证书，并且必须遵循一套严格的安全准则。


    因此，为了不让事情变得复杂，如果一个网站拥有使用SSL的可信网站证书，您从该网站发送或接收的任何信息都将被加密，并免受任何可能的攻击者侵害。


    此外，您可以通过查看互联网浏览器顶部URL中的https来判断网站是否安全。


    ## 计算机安全


    另一方面，计算机安全是指对物理存储在计算机上的数据的保护。这包括采取措施防止在信息安全三要素（也称为CIA：机密性、完整性和可用性）下的攻击。


    以下一些基本方法涉及计算机安全，将涵盖密码、软件更新、防火墙、防病毒或反恶意软件程序、广告拦截器、电子邮件加密和数据备份。


    ### 设置强密码


    一个强密码由三个基本要素组成：其长度、使用的字符以及大小写字母的组合。密码越长，就越难破解。一些黑客试图使用算法发送大量组合，希望其中一个能匹配秘密密码。通过增加密码的长度，其被破解的机会会降低。


    字母和符号（如感叹号）的混合有助于保护您的密码不被窃取。这也适用于在密码中加入大写字母。像“password1”这样的密码与“PasSWord2018!”这样的密码相比非常弱。大写字母和符号的组合降低了密码被暴力破解的可能性。


    您可以用来创建极其安全密码的另一种方法是使用像“LastPass”或“Password Boss”这样的程序。这些程序会随机生成一个极其安全的密码。使用这样的程序将为个人使用的每样东西提供一个唯一的密码。这意味着如果黑客能够进入个人的一个账户，他们将无法获得其他程序或网络服务的密码。


    ### 软件更新


    软件更新非常重要，因为它们可以保护您的计算机或移动设备。软件更新用于修补操作系统中发现的漏洞或错误，这将使您的设备更安全。经常检查您的操作系统是否有新的更新可用。一些操作系统软件会自动更新。


    ### 防火墙


    防火墙是计算机的绝佳保护，因为它们可以阻止不需要的数据到达您的计算机。它们监控传入数据的流动，并进行检查以确定即将被您的计算机接收的信息是否有害。例如，每当用户从网站下载内容时，防火墙都会扫描相关文件并确定其是否为恶意文件。并非所有的防火墙都相同。大多数操作系统都带有内置防火墙，因此几乎没有理由安装额外的防火墙。此外，这些操作系统公司不断更新其安全功能，使其更加可靠。防火墙防止未经授权访问私有网络或从私有网络向外访问。


    ### 防病毒软件


    处理恶意软件最有效和最常见的方法之一是反恶意软件软件。像Windows Essentials、McAfee和Bitdefender这样的程序允许用户对系统运行扫描以查找受感染的文件。如果发现任何文件已损坏，这些程序会提醒操作员，允许他或她删除相关文件。


    这类软件也非常有用，因为它可以在允许用户下载之前扫描任何下载的项目或电子邮件附件。这是一个关键的保护屏障，因为它可以防止任何恶意程序在设备上安装自身。


    这类软件还可以分析是哪种病毒、蠕虫或木马感染了相关计算机。


    这种保护软件会自动从计算机中删除任何恶意内容，但无法识别勒索软件或键盘记录器等威胁。


    ### 广告拦截器


    大多数浏览器都有可以添加到浏览器的扩展程序，用于阻止烦人的广告。例如，Google Chrome网上应用店有各种额外的扩展程序，用户可以在使用浏览器时下载和运行（并非所有都是广告拦截器）。


    Chrome有一个专门为Chrome浏览器制作的广告拦截器，它可以限制您访问网站时弹出的广告数量。广告拦截器也可以直接下载到计算机的硬盘驱动器上，而不是网络浏览器上。


    ### 电子邮件加密


    加密通过使电子邮件内容对除预期收件人以外的任何实体都不可读来保护电子邮件。像Gmail这样的流行电子邮件服务已在其网络中添加了电子邮件加密。但是，它只保护其服务器上的数据。这意味着数据在其他互联网网络上跳转时仍然容易受到攻击，除非用户实施客户端加密。大多数允许此操作的方法都是复杂的过程，需要与所有将要相互接收或发送电子邮件的人交换证书。


    幸运的是，有一个名为Virtru的替代方案，它适用于Gmail账户以及Outlook。这允许用户进行真正的客户端加密，而无需经历交换证书的漫长过程。Virtru是一个插件，用户可以将其下载到他们的网络浏览器上，以便自由地从Outlook或Gmail账户发送和接收电子邮件，而不会出现任何兼容性问题。


    ### 数据备份


    数据备份是计算机安全的一个重要但常被忽视的方面。通过对计算机上所有重要数据进行定期备份，用户可以保护自己免受崩溃或病毒导致重要数据丢失的风险。数据备份通常将数据上传到外部源，可以是云存储服务器或存储设备。


    任何未备份的数据在计算机硬件故障或数据损坏时都可能完全丢失。正如那句老话所说：“防患于未然总比事后后悔好。”


    ## 安全失败


    如果两种安全类型都失败了，什么可能会面临风险？黑客可能试图窃取的信息类型分为两类：个人和财务。关于个人信息，黑客可以利用它来创建虚假的网络账户、社交媒体账户或全新的身份。如今身份盗窃的猖獗是由可以从互联网收集的大量信息所助长的。根据身份'
