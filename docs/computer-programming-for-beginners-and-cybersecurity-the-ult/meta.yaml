    Among the five categories of iterators, each container defines any one of the
    three categories, viz.,


    Forward iterators:


    +   - Can read;

    - Can write;

    - Can be repeated read/write at a single location;

    - Can move forward (++), but cannot move backwards, thus the name forward iterator;
    and

    - Is used in: unordered associative containers and forward list, which are for
    the best space-efficient storage.

    - Bidirectional iterator:

    - Is same as the forward iterator, but it can also move backwards (so, ++ as well
    as --), thus is named bidirectional; and

    - Is used in containers: list, set, map, multiset, and multimap.

    - Random access iterator:

    - Is the same as the bidirectional iterator, but it can jump (+=N or -=N, where
    N is a whole number) instead of (+=1 or -=1, where +=1 is ++ and -=1 is --), thus
    is named random access iterator(jump iterator); and

    - Is used in containers: vector, string, deque and array<T,N>.


