- md: '## CHAPTER 3: Java Basics


    ## Java Development Kit


    The JDK provides the tools needed to build, test, and monitor robust Java-anchored
    applications. It allows developers to access software components and compile applications
    during Java programming operations. For example, a developer needs a JDK-powered
    environment to be able to write applets or implement methods.


    Since the JDK more or less performs the operations of a Software Development Kit
    (SDK), one could easily confuse the scope and operations of the two items. Whereas
    the JDK is specific to the Java programming language, an SDK has broader applicability.
    But a JDK still operates as a component of an SDK in a program development environment.
    This means that a developer would still need an SDK to provide certain tools with
    broader operational characteristics and that are not available within the JDK
    domain. Developer documentation and debugging utilities, as well as application
    servers, are some of the crucial tools that SDK supplies to a Java programming
    environment.


    The scope of JDK deployment depends on the nature of the tasks at hand, the supported
    versions, and the Java edition that is in use. For example, the Java Platform,
    Standard Edition (Java SE) Development Kit is designed for use with the Java Standard
    Edition. The Java Platform, Enterprise Edition (Java EE), and the Java Platform,
    Micro Edition (Java ME), are the other major subsets of the JDK. Details of each
    of these Java editions are described in detail in the subtopics below. The JDK
    has been a free platform since 2007, when it was uploaded to the OpenJDK portal.
    Its open-source status facilitates collaborations and allows communities of software
    developers to clone, hack, or contribute ideas for advancements and upgrades.


    ## Java SE


    The Java SE powers a wide variety of desktop and server applications. It supports
    the testing and deployment of the Java programming language within the development
    environment of these applications. Some of the documentations associated with
    the recent releases of Java SE include an advanced management console feature
    and a revamped set of Java deployment rules. Java SE 13.0.1 is the latest JDK
    version for the Java SE platform at the time of writing this book.


    The Java SE SDK is equipped with the core JRE capabilities alongside a portfolio
    of tools, class libraries, and implementation technologies that are designed for
    use in the development of desktop applications. These tools range from simple
    objects and types for Java program implementations to advanced class parameters
    that are suited for building applications with networking capabilities and impenetrable
    security characteristics. Java programmers can also apply this particular JDK
    on the development of Java applications used to simplify access to databases or
    to enhance GUI properties.


    ## Java EE


    The Java EE platform is an open-source product that is developed through the collaborative
    efforts of members of the Java community worldwide. Java EE is closely related
    to the Java SE because the former is built on top of the latter. This particular
    software is integrated with transformative innovations that are designed for use
    in enterprise solutions. The features and advancements that are introduced in
    new releases often reflect the inputs, requirements, and requests of members of
    the Java community. The Java EE actually offers more than twenty implementations
    that are compliant with Java programming.


    The Java EE SDK is meant for use in the construction of applications for large-scale
    operations. Just as its name suggests, this particular Java SDK was created to
    provide support for enterprise software solutions. The JDK features a powerful
    API and runtime properties that Java programmers require to build applications
    with scalable and networkable functionalities. Developers in need of developing
    multi-tiered applications could find this JDK useful as well.


    The Java EE 8 is the latest release at the time of writing this book. Java EE’s
    revised design provides enhanced technologies for enterprise solutions as well
    as modernized applications for security and management purposes. The release features
    several advancements that included greater REST API capabilities provided through
    the Client, JSON Binding, Servlet, and Security APIs. This version also features
    the Date and Time API as well as the Streams API, according to information published
    in the Oracle Corporate website as of December 2019.


    ## Java ME


    The Java ME platform deploys simplicity, portability, and dynamism to provide
    a versatile environment for building applications for small gadgets and devices.
    Java ME is known for having an outstanding application development environment,
    thanks to its interactive and user-friendly navigation interfaces, as well as
    built-in capabilities for implementing networking concepts. It is largely associated
    with the Internet of Things (IoT) and is useful when building applications designed
    for built-in technologies or connected devices that could be used to invent or
    implement futuristic concepts. Java ME’s portability and runtime attributes make
    it suitable for use in software applications for wearable gadgets, cell phones,
    cameras, sensors, and printers, among other items and equipment.


    The Java ME SDK is equipped with the requisite tools meant for use within an independent
    environment when developing software applications, testing functionalities, and
    implementing device simulations. According to information published in the Oracle
    Corporate website as of 2019, this JDK is well suited for accommodating “the Connected
    Limited Device Configuration (CLDC)” technology alongside “the Connected Device
    Configuration (CDC)” functionality. This results in a single and versatile environment
    for developing applications.


    There are several other Java ME solutions that support the deployment of the Java
    programming language in applications. Java ME Embedded provides a runtime environment
    integrating IoT capabilities in devices, while the Java ME embedded client facilitates
    the construction of software solutions that run and optimize the functionality
    of built-in programs. Java for Mobile makes use of the CLDC and the stack of Java
    ME developer tools to create innovative features for mobile devices.


    ## Java Runtime Environment


    Remember that there are certain conditions that must prevail for Java applications
    to run efficiently. The JRE contains the ingredients responsible for creating
    these requisite conditions. This includes the JVM and its corresponding files
    and class attributes. Although JRE operates as a component of the JDK, it is capable
    of operating independently, especially if the tasks are limited to run rather
    than build application instructions.


    The JRE lends important operational properties to different programs in the Java
    programming ecosystem. For example, a program is considered self-contained if
    it runs an independent JRE within it. This means that a program does not depend
    on other programs to access the JRE. This independence makes it possible for a
    program to achieve compatibility with different OS platforms.


    ## Java Virtual Machine


    The JVM operates as a specification for implementing Java in computer programs.
    It is the driving force behind the platform-independence characteristics of the
    Java language. This status is accentuated by JVM’s status as a program that is
    executed by other programs. The programs written to interact with and execute
    the JVM see it as a machine. It is for this reason that similar sets, libraries,
    and interfaces are used to write Java programs to be able to match every single
    JVM implementation to a particular OS. This facilitates the translation or interpretation
    of Java programs into runtime instructions in the local OS, and thereby eliminating
    the need for platform dependence in Java programming.


    As a developer, you must be wary of the vulnerability your development environment
    and applications have to cyber attacks and other threats. The JVM provides enhanced
    security features that protect you from such threats. The solid security foundation
    is attributable to its built-in syntax and structure limitations that reside in
    the operational codes of class files. But this does not translate to limitations
    on the scope of class files that the JVM can accommodate. The JVM actually accepts
    a variety of class files so long as they can be validated to be safe and secure.
    Therefore, the JVM is a viable complementary alternative for developing software
    in other programming languages.'
  mdcn: '## 第三章：Java 基础


    ## Java 开发工具包


    JDK 提供了构建、测试和监控健壮的 Java 应用程序所需的工具。它允许开发者在 Java 编程操作期间访问软件组件并编译应用程序。例如，开发者需要一个
    JDK 支持的环境才能编写小程序或实现方法。


    由于 JDK 在不同程度上执行了软件开发工具包（SDK）的操作，人们很容易混淆这两者的范围和操作。JDK 专门针对 Java 编程语言，而 SDK 的适用范围更广。但在程序开发环境中，JDK
    仍然作为 SDK 的一个组件运行。这意味着开发者仍然需要一个 SDK 来提供某些具有更广泛操作特性且在 JDK 领域内不可用的工具。开发者文档和调试工具，以及应用服务器，是
    SDK 为 Java 编程环境提供的一些关键工具。


    JDK 的部署范围取决于手头任务的性质、支持的版本以及正在使用的 Java 版本。例如，Java 平台标准版（Java SE）开发工具包设计用于与 Java
    标准版一起使用。Java 平台企业版（Java EE）和 Java 平台微型版（Java ME）是 JDK 的其他主要子集。每个 Java 版本的详细信息将在下面的子主题中详细描述。自
    2007 年上传到 OpenJDK 门户以来，JDK 一直是一个免费平台。其开源状态促进了协作，并允许软件开发者社区克隆、修改或贡献想法以进行改进和升级。


    ## Java SE


    Java SE 支持各种桌面和服务器应用程序。它支持在这些应用程序的开发环境中测试和部署 Java 编程语言。与 Java SE 最近版本相关的一些文档包括高级管理控制台功能和一套更新的
    Java 部署规则。在撰写本书时，Java SE 13.0.1 是 Java SE 平台的最新 JDK 版本。


    Java SE SDK 配备了核心 JRE 功能，以及一系列专为桌面应用程序开发设计的工具、类库和实现技术。这些工具范围从用于 Java 程序实现的简单对象和类型，到适用于构建具有网络功能和强大安全特性的应用程序的高级类参数。Java
    程序员也可以将这个特定的 JDK 应用于开发用于简化数据库访问或增强 GUI 属性的 Java 应用程序。


    ## Java EE


    Java EE 平台是一个开源产品，由全球 Java 社区成员协作开发。Java EE 与 Java SE 密切相关，因为前者建立在后者之上。这个特定的软件集成了旨在用于企业解决方案的变革性创新。新版本中引入的功能和改进通常反映了
    Java 社区成员的意见、需求和请求。Java EE 实际上提供了二十多种符合 Java 编程标准的实现。


    Java EE SDK 旨在用于构建大规模操作的应用程序。顾名思义，这个特定的 Java SDK 是为了支持企业软件解决方案而创建的。JDK 具有强大的 API
    和运行时特性，Java 程序员需要这些来构建具有可扩展性和网络功能的应用程序。需要开发多层应用程序的开发者也会发现这个 JDK 很有用。


    在撰写本书时，Java EE 8 是最新版本。Java EE 的修订设计为企业解决方案提供了增强的技术，以及用于安全和管理目的的现代化应用程序。该版本包含多项改进，包括通过客户端、JSON
    绑定、Servlet 和安全 API 提供的更强大的 REST API 功能。根据 Oracle 公司网站截至 2019 年 12 月发布的信息，此版本还具有日期和时间
    API 以及流 API。


    ## Java ME


    Java ME 平台部署了简单性、可移植性和动态性，为构建小型小工具和设备的应用程序提供了一个多功能环境。Java ME 以其出色的应用程序开发环境而闻名，这得益于其交互式和用户友好的导航界面，以及实现网络概念的内置功能。它主要与物联网（IoT）相关，在构建为内置技术或连接设备设计的应用程序时非常有用，这些设备可用于发明或实现未来概念。Java
    ME 的可移植性和运行时属性使其适用于可穿戴设备、手机、相机、传感器和打印机等软件应用程序。


    Java ME SDK 配备了在独立环境中开发软件应用程序、测试功能和实施设备模拟所需的必要工具。根据 Oracle 公司网站截至 2019 年发布的信息，此
    JDK 非常适合容纳“连接受限设备配置（CLDC）”技术以及“连接设备配置（CDC）”功能。这为开发应用程序提供了一个单一且多功能的环境。


    还有其他几种 Java ME 解决方案支持在应用程序中部署 Java 编程语言。Java ME Embedded 提供了一个将 IoT 功能集成到设备中的运行时环境，而
    Java ME embedded client 则有助于构建运行和优化内置程序功能的软件解决方案。Java for Mobile 利用 CLDC 和 Java
    ME 开发者工具栈为移动设备创建创新功能。


    ## Java 运行时环境


    请记住，Java 应用程序要高效运行，必须满足某些条件。JRE 包含负责创建这些必要条件的要素。这包括 JVM 及其相应的文件和类属性。虽然 JRE 作为
    JDK 的一个组件运行，但它能够独立运行，特别是当任务仅限于运行而非构建应用程序指令时。


    JRE 为 Java 编程生态系统中的不同程序提供了重要的操作属性。例如，如果一个程序在其内部运行一个独立的 JRE，则该程序被认为是自包含的。这意味着该程序不依赖其他程序来访问
    JRE。这种独立性使得程序能够与不同的操作系统平台兼容。


    ## Java 虚拟机


    JVM 作为在计算机程序中实现 Java 的规范运行。它是 Java 语言平台无关性特征的驱动力。JVM 作为由其他程序执行的程序这一地位，更加突显了这一状态。编写与
    JVM 交互并执行 JVM 的程序将其视为一台机器。正是由于这个原因，编写 Java 程序时使用了类似的集合、库和接口，以便能够将每个 JVM 实现与特定的操作系统相匹配。这促进了将
    Java 程序翻译或解释为本地操作系统中的运行时指令，从而消除了 Java 编程中对平台依赖性的需求。


    作为开发者，你必须警惕你的开发环境和应用程序容易受到网络攻击和其他威胁的漏洞。JVM 提供了增强的安全功能来保护你免受此类威胁。其坚实的安全基础归功于其内置在类文件操作代码中的语法和结构限制。但这并不意味着
    JVM 可以容纳的类文件范围受到限制。JVM 实际上接受各种类文件，只要它们可以被验证为安全可靠。因此，JVM 是用其他编程语言开发软件的一个可行的补充替代方案。'
