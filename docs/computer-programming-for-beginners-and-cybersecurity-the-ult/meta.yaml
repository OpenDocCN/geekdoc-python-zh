- img_proc: true
  md: 'view to linking new observations into such categories. On the other hand, the
    use of regression occurs when the outputs have a wide range of numerical values
    within a given subset. The goal in both examples is to ensure that machine learning
    utilizes a fixed set of training examples to make the necessary comparisons on
    how similar or different a collection of data may be in a given subset. The optimal
    scenarios in such data sets ensure that the algorithms can determine the class
    labels for all the unseen occurrences within such a subgroup.


    # Unsupervised Learning


    Machines learning may occur through unsupervised cluster analysis. The approach
    involves using a set of data that is made up of inputs, which is necessary for
    the development of a structure. The clustering of data points is an example of
    unsupervised learning. Unlike in the case of supervised learning, the test data
    in unsupervised learning does not have labels and is not within a specific classification.
    Unsupervised learning does not respond to feedback but instead focuses on the
    commonalities. The method seeks to identify the possibility of commonalities in
    a given set of data and use these commonalities to develop a pattern. Essentially,
    this means that the goal is to task a computer with learning how to do something
    without providing a logical approach to achieve this task. The unsupervised approach
    is, therefore, more complicated and more complex than the supervised process.
    This method means using a reward approach to affirm success in the achievement
    of the tasks without necessarily providing explicit instructions on how to achieve
    the set goals.


    The purpose of the unsupervised approach is more aligned towards the decision-making
    process as opposed to the mere classification of these data. Unsupervised learning
    trains the agent to act or respond to tasks based on the reward system or punishment
    built over time. A computer gradually learns how to navigate past commands without
    having prior information on the anticipated outcomes. This approach may be time-consuming
    and tedious. But unsupervised learning can be powerful because it operates from
    the point of trial and error, which may produce discoveries. Unsupervised learning
    does not consider any pre-classified information and therefore works from an aspect
    of the invention.'
