    \ the appendix for the complete listing.\n\n## Spliterator\n\nThe Collections\
    \ library is still subject to the same constraints regarding concurrent access.\
    \ As always, you must choose the Collections library class that corresponds to\
    \ your thread safety requirements. This is because the new methods shown above\
    \ are just functional abstractions riding above the same underlying data structures.\
    \ These methods are not particularly amenable to functional programming’s take\
    \ on parallel processing because they are still based on the notion of multiple\
