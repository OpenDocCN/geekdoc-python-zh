  mdcn: "## 第7章：STL算法\n\nSTL算法位于`<algorithms>`头文件中，因此我们需要在程序中包含它。这些算法可以分为：\n\n- 非修改算法：例如\
    \ `for_each`、`count`、`search` 等。\n- 修改算法：例如 `copy`、`transform` 等。\n- 删除算法：`remove`、`remove_if`\
    \ 等。\n- 变换算法：`reverse`、`rotate` 等。\n- 排序算法：`sort`、`partial_sort` 等。\n- 已排序范围算法：`binary_search`、`merge`\
    \ 等。\n- 数值算法：`accumulate`、`partial_sum`、`inner_product` 等。\n\n以下示例展示了 `sort()`\
    \ 函数如何对数组进行操作。\n\n### 程序 13.11：使用 sort 算法对数组排序\n\n```cpp\n#include <iostream>\n\
    #include <algorithm>\nusing namespace std;\n\nint main()\n{\n    int a[] = {3,5,7,2,9};\n\
    \    sort(a, a + 5);\n    cout << \"Sorted Array:\" << endl;\n    for (int i =\
    \ 0; i < 5; i++)\n        cout << a[i] << \" \";\n    return 0;\n}\n```\n\n输出：\n\
    Sorted Array:\n2 3 5 7 9\n\n在上面的例子中，当我们传递数组名 `a` 作为参数时，我们是在告诉函数从数组的开头开始排序。如果我们想从数组的第三个元素开始排序，可以使用：\n\
    \n```cpp\nsort(a+3, a+5);\n```\n\n我们使用了 `a+5` 作为第二个参数，这指定了我们希望排序到数组的最后一个元素。\n\n\
    现在，类似的 `sort()` 函数也可以用于 vector 容器，如下面的程序所示。这表明 STL 算法是通用的。\n\n### 程序 13.12：使用\
    \ sort 算法对 vector 排序\n\n```cpp\n#include <iostream>\n#include <algorithm>\n#include\
    \ <vector>\nusing namespace std;\n\nint main()\n{\n    int a[] = {5,3,7,6,2,9};\n\
    \    vector<int> v(a, a+6);\n    sort(v.begin(), v.end());\n    for (int i = 0;\
    \ i != v.size(); i++)\n        cout << v[i] << \" \";\n    cout << endl;\n   \
    \ return 0;\n}\n```\n\n输出：2 3 5 6 7 9\n\n如你所见，排序函数的工作方式与在数组上几乎相同。`sort()` 的第一个参数接受一个指向第一个元素的迭代器，使用\
    \ `begin()` 因为它返回一个指向第一个元素的迭代器。所以它将从 vector 的第一个元素开始排序。同样，`end()` 返回一个指向容器中最后一个元素之后位置的迭代器。请注意，排序函数会排序到但不包括我们作为第二个参数传递的位置。\n\
    \n### find() 和 count() 算法\n\n`find()` 算法有助于在容器中查找特定值。`count()` 用于计算特定值在容器中出现的次数。\n\
    \n### 程序 13.13：使用 find 算法在 vector 中查找值\n\n```cpp\n#include <iostream>\n#include\
    \ <algorithm>\n#include <vector>\nusing namespace std;\n\nint main()\n{\n    vector<int>\
    \ v;\n    for(int i = 0; i < 10; i++)\n        v.push_back(i);\n\n    int a =\
    \ 5;\n    vector<int>::iterator it;\n    it = find(v.begin(),v.end(),a);\n   \
    \ if(it != v.end()) {\n        cout << \"found \" << a << endl;\n    }\n    else\
    \ {\n        cout << \"could not find \" << a << endl;\n    }\n\n    int c = count(v.begin(),\
    \ v.end(), 6);\n    cout << \"Number of 6 stored in vector:\" << c;\n    return\
    \ 0;\n}\n```\n\n输出：found 5\nNumber of 6 stored in vector: 1\n\n### for_each()\n\
    \n此算法将指定的函数对象应用于容器中的每个元素。容器中的原始值不会改变，但它用于显示修改后的元素。它接受前两个参数作为起始和结束范围。第三个参数是一个函数对象的地址。\n\
    \n例如，`for_each()` 算法将数组的所有元素平方并显示它们。\n\n### 程序 13.14：使用 for_each 算法对数组所有元素求平方\n\
    \n```cpp\n#include <iostream>\n#include <vector>\n#include <algorithm>\nusing\
    \ namespace std;\n\nvoid square(int a)\n{\n    cout << a*a << endl;\n}\n\nint\
    \ main()\n{\n    int s[] = {1,2,3,4};\n    for_each(s, s+4, square);\n    return\
    \ 0;\n}\n```\n\n输出：\n1\n4\n9\n16\n\n## 第8章：库函数\n\n### C++中的库函数和用户自定义函数\n\n**学习目标**\n\
    \n完成本主题后，你应该能够简要说明C++中的库函数和用户自定义函数。\n\n#### 1. 库函数的引入\n\nC++程序员可以使用大量的库函数。\n\n\
    你只需包含包含相应函数原型的头文件名，就可以使用库中的任何函数。\n\n通常，库函数在一对文件中指定。\n\n函数定义包含在源文件中，该文件通常具有 `.c`\
    \ 或 `.cpp` 文件扩展名。\n\n**注意**\n\n通常，编译器不会提供库函数的源代码。\n\n相反，你会获得预编译的目标文件，这些文件可以链接到你的程序中。\n\
    \n函数原型包含在头文件中，头文件可能以 `.h`、`.hpp` 或 `.hxx` 文件扩展名区分。\n\n**注意**\n\n头文件还包含这些函数所需的各种数据类型和常量的定义。\n\
    \n虽然不是强制性的，但以与提供的库函数相同的方式组织你自己的函数是一个好主意。\n\n这允许你在多个程序中使用这些函数，而无需重新指定代码。\n\n为了在程序中调用库函数，你必须指定包含相应函数原型的头文件。\n\
    \n这通常在源文件的开头完成。\n\n但它必须在程序使用该函数之前完成。\n\n可以通过使用 `#include` 预处理指令将头文件包含在程序中。\n\n\
    这告诉预处理器打开指定的头文件并将其内容插入到 `#include` 语句出现的位置。\n\n```cpp\n#include <string>\n#include\
    \ \"myfuncs.h\"\n```\n\n你可以在 `#include` 语句中以两种方式命名文件，即使用双引号或尖括号（`<>`）。\n\n尖括号中的文件名告诉预处理器在环境中指定的搜索路径中查找。\n\
    \n```cpp\n#include <string>\n#include \"myfuncs.h\"\n```\n\n双引号中的文件名告诉预处理器首先搜索当前目录，然后搜索指定的搜索路径。\n\
    \n如果找不到文件，将报告错误。\n\n```cpp\n#include <string>\n#include \"myfuncs.h\"\n```\n\n\
    链接器总是搜索任何函数的编译版本"
