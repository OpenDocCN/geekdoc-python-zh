    :\n\n```\nif a is True:\n    print(\"it's true\")\n```\n\nThere is no exit from\
    \ the condition; it is the indentation that will allow to manage it. Generally,\
    \ we are also interested in the complement of this condition; we will use `else`\
    \ for that:\n\n```\nif a is True:\n    print(\"it's true\")\nelse:\n    print(\"\
    it's not true\")\n```\n\nWe can have another case if our variable `a` is not necessarily\
    \ a boolean, we use `elif`:\n\n```\nif a is True:\n    print(\"it's true\")\n\
    elif a is False:\n    print(\"it's wrong\")\nelse:\n    print(\"it's not a boolean\"\
    )\n```\n\n### The Loops\n\nLoops are central elements of most programming languages.\
    \ Python does not break this rule. However, you must be very careful with an interpreted\
