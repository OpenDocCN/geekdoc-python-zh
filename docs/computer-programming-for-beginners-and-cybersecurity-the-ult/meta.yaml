    \ \"johnson boris\"。变量名后面跟着方法 title()。在 Python 中，方法是对数据执行特定操作的动作。此外，变量名后面的点（.）告诉解释器允许\
    \ title() 方法与我们的变量名交互。方法后面总是跟着括号，因为它们需要额外的信息来执行其功能。title() 方法的功能是将每个单词的首字母改为大写。此外，Python\
    \ 允许我们将字符串全部改为小写或大写。\n\n```\nfull_name = \"Johnson Boris\"\nprint(full_name.lower())\n\
