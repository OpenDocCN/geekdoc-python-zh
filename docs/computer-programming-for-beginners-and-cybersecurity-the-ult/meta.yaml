  mdcn: "## 实现多个 catch 块\n\n一段代码可能会引发多种异常。为了满足这一需求，也允许实现多个 catch 块。这种实现的语法如下所示。\n\n\
    ```java\ntry {\n    /*Protected Code*/\n} catch(ExpType1 exp1) {\n    /*Catch\
