    \ However, there exists a new Java 8 abstraction that is compatible. It is designed\
    \ to iterate over data in parallel. The idea is embodied by the Spliterator interface.\
    \ The premise of this interface is to partition the data and handoff chunks to\
    \ different threads. Spliterators can be obtained from the Collection interface,\
    \ including subinterfaces List and Set.\n\nCentral to the Spliterator interface\
    \ are these three methods:\n\n```\nSpliterator<T> trySplit();\n\ndefault void\
    \ forEachRemaining(Consumer<? super T> action) {...}\n\nboolean tryAdvance(Consumer<?\
    \ super T> action);\n```\n\nThe method trySplit() partitions the underlying data\
    \ in two. It creates a new Spliterator with half the data and keeps the other\
    \ half in the original instance. Each can be given to a thread which, in turn,\
    \ iterates over the partitioned data using forEachRemaining(). The method tryAdvance()\
    \ is a one-at-a-time variant that returns the next element or null if the list\
    \ has been exhausted.\n\nSpliterators do not handle parallel processing themselves\
    \ but provide the abstraction to do so. Here’s the concept in action:\n\n```\n\
