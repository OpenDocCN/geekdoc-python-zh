    \ 岁，你不希望程序因为他们的年龄超过这个范围而没有任何输出就结束。这会在你希望之前结束程序，而且当代码结束时，你正在编写的程序看起来也不那么专业。这就是为什么你不会经常看到\
    \ if 语句的一个重要原因。\n\n但这就是我们将引入 if-else 语句并使用它们来解决这个问题的地方。这些语句采用了我们正在讨论的理念，我们提出的问题，并帮助我们处理它们。假设你正在使用我们之前的代码，并且你想确保"
