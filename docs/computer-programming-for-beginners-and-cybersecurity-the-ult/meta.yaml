    node *remove (node* p_tree, int key);\n```\n\n## Inserting\n\nWe’ll use a recursive\
    \ algorithm for inserting it into the tree. Recursion is fantastic for trees because\
    \ there are two small trees for each tree; that makes the entire tree recursive\
    \ by nature. The function takes a key and a tree that already exists (even an\
