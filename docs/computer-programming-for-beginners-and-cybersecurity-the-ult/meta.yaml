    In []: country_list.reverse()\n```\n\n```\nprint(country_list)\n['Switzerland',\
    \ 'Spain', 'France', 'United States', 'India', 'China']\n```\n\n## 列表推导式\n\n这些是迭代构建的列表。它们通常非常有用，因为它们比使用循环构建列表更高效。这里有一个简单的例子：\n\
    \n```\nIn []: list_init = [4, 6, 7, 8]\n       list_comp = [val ** 2 for val in\
