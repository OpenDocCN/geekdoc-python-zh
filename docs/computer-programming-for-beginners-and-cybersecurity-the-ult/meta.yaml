    \ 和 data.begin() 表示相同的元素，即元素 1，但 data[N] 和 data.end() 表示“无人区”，访问它可能导致运行时错误。然而，成员函数\
    \ end() 在迭代语句中制定条件时非常有用。\n\n以下代码说明了迭代器的这一基本属性：\n\n```cpp\n// iterators.cpp\n#include\
