    declared protected, but fields and methods outside of the interface can be declared
    protected. Classes should not be declared as protected.


    Default: Applicable when no modifier is provided—accessible to the package


    A method or variable that has been declared without a modifier is accessible to
    other classes within the package.


    The following table summarizes the different access modifiers and their effect:


    | Modifier | Inside class | Inside package | Outside package by subclass | Outside
    package |

    | :--- | :---: | :---: | :---: | :---: |

    | Private | Y | N | N | N |

    | Public | Y | Y | Y | Y |

    | Protected | Y | Y | Y | N |

    | Default | Y | Y | N | N |


    # Non-access Modifiers


    The non-access modifiers can be used to access various functionalities in Java.


    # Final—used to finalize implementations of variables, methods, and classes


    # Final variables


    You can only explicitly initialize a final variable once. When you declare a variable
    as final, you will never be able to reassign it to another object. Take note,
    however, that you can still change the data stored inside the object. This means
    that while you may change the object’s state, you will not be able to change the
    reference. The final modifier is commonly paired with static to create a class
    variable out of the constant value.


    # Final methods'
  - '[PAGE 147]


    subclasses.


    # Final classes


    The final modifier is used to prevent other classes from inheriting any feature
    from the class declared as a final class.


    # Static—used to create class methods or variables.


    You can use this keyword to create a unique variable (called a static variable
    or class variable) that will exist independently from other instances of the class.
    You cannot declare a local variable as static.


    You can also use the static keyword to create a method (called a static method
    or class method) that will exist independently from other instances of the class.
    Static methods recognize and work only on data from the arguments given without
    considering variables.


    You may access class methods and class variables by writing the variable or method
    name after the class name and a dot (.).


    # Abstract—used to create abstract methods or classes


    # Abstract class


    When a class is declared as abstract, it means that you will never be able to
    instantiate the class. The only reason for declaring a class as abstract is to
    extend the class. You cannot declare a class to be both final and abstract, as
    you can’t possibly extend a final class. A class that uses abstract methods will
    have to be declared as abstract. Failure to do so will result in compile errors.


    # Abstract method


    As it is declared with no implementation, an abstract method derives its methods
    body from the subclass. Abstract methods cannot be declared as strict or final.
    Unless it is also an abstract class, a class extending an abstract class must
    adopt the abstract methods of the superclass. A class that contains at least one
    abstract method should be declared as an abstract class. On the other hand, an
    abstract class need not have abstract methods.


