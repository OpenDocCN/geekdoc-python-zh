- md: "## Modifiers\n\nModifiers are keywords that alter the meaning of the definitions\
    \ in your code. Java provides several modifiers.\n\n## Access Modifiers\n\nThe\
    \ access modifiers are used to define access levels for methods, variables, classes,\
    \ and constructors.\n\n### Private—only accessible within the class\n\nWhen a\
    \ method, variable, class, or constructor is declared private, it means that it\
    \ is only available within the class. If the class, however, has public getter\
    \ methods, you may be able to access a private variable outside the class. The\
    \ private keyword indicates the highest access restriction. Take note that you\
    \ cannot declare interfaces and class as private.\n\n### Public—accessible to\
    \ the world\n\nA method, interface, constructor, class, etc. that has been defined\
    \ as public may be accessed from other classes. Similarly, blocks, methods, or\
    \ fields that have been defined inside a public class may be accessed from Java\
    \ class. This is true as long as they are in the same package. If you want to\
    \ access a public class from another package, you will have to import the public\
    \ class. Under the class inheritance concept, subclasses inherit all public variables\
    \ and methods of a class.\n\nTake note that an application’s main() method will\
    \ have to be declared public before the Java interpreter can call it to run the\
    \ class.\n\n### Protected—accessible to all subclasses and package\n\nDeclaring\
    \ a method, variable, or constructor as protected in a superclass makes it accessible\
    \ only to classes within its package or to its subclasses in another package.\
    \ This access type is used if you want to allow the subclass to use variable or\
    \ helper methods and prevent non-related classes from using them. Interfaces,\
    \ as well as the fields and methods under them, should not be declared protected,\
    \ but fields and methods outside of the interface can be declared protected. Classes\
    \ should not be declared as protected.\n\n### Default: Applicable when no modifier\
    \ is provided—accessible to the package\n\nA method or variable that has been\
    \ declared without a modifier is accessible to other classes within the package.\n\
    \nThe following table summarizes the different access modifiers and their effect:\n\
    \n| Modifier | Inside class | Inside package | Outside package by subclass | Outside\
    \ package |\n| :--- | :---: | :---: | :---: | :---: |\n| Private | Y | N | N |\
    \ N |\n| Public | Y | Y | Y | Y |\n| Protected | Y | Y | Y | N |\n| Default |\
    \ Y | Y | N | N |\n\n## Non-access Modifiers\n\nThe non-access modifiers can be\
    \ used to access various functionalities in Java.\n\n### Final—used to finalize\
    \ implementations of variables, methods, and classes\n\n#### Final variables\n\
    \nYou can only explicitly initialize a final variable once. When you declare a\
    \ variable as final, you will never be able to reassign it to another object.\
    \ Take note, however, that you can still change the data stored inside the object.\
    \ This means that while you may change the object’s state, you will not be able\
    \ to change the reference. The final modifier is commonly paired with static to\
    \ create a class variable out of the constant value.\n\n#### Final methods\n\n\
    subclasses.\n\n#### Final classes\n\nThe final modifier is used to prevent other\
    \ classes from inheriting any feature from the class declared as a final class.\n\
    \n### Static—used to create class methods or variables.\n\nYou can use this keyword\
    \ to create a unique variable (called a static variable or class variable) that\
    \ will exist independently from other instances of the class. You cannot declare\
    \ a local variable as static.\n\nYou can also use the static keyword to create\
    \ a method (called a static method or class method) that will exist independently\
    \ from other instances of the class. Static methods recognize and work only on\
    \ data from the arguments given without considering variables.\n\nYou may access\
    \ class methods and class variables by writing the variable or method name after\
    \ the class name and a dot (.).\n\n### Abstract—used to create abstract methods\
    \ or classes\n\n#### Abstract class\n\nWhen a class is declared as abstract, it\
    \ means that you will never be able to instantiate the class. The only reason\
    \ for declaring a class as abstract is to extend the class. You cannot declare\
    \ a class to be both final and abstract, as you can’t possibly extend a final\
    \ class. A class that uses abstract methods will have to be declared as abstract.\
    \ Failure to do so will result in compile errors.\n\n#### Abstract method\n\n\
    As it is declared with no implementation, an abstract method derives its methods\
    \ body from the subclass. Abstract methods cannot be declared as strict or final.\
    \ Unless it is also an abstract class, a class extending an abstract class must\
    \ adopt the abstract methods of the superclass. A class that contains at least\
    \ one abstract method should be declared as an abstract class. On the other hand,\
    \ an abstract class need not have abstract methods.\n\nExample:\n\n```java\nabstract\
    \ class Car {\n    private double price;\n    private String type;\n    private\
    \ String year;\n    public abstract void goFast(); // abstract method\n    public\
    \ abstract void changeColor();\n}\n```\n\n### Synchronized\n\nThe synchronized\
    \ modifier is used to indicate that only one thread can access a method at any\
    \ given time. You can use this keyword with any access level modifier.\n\nExample:\n\
    \n```java\npublic synchronized void showInfo() {\n    .......\n}\n```\n\n### Volatile\n\
    \nThis keyword is used to indicate that a thread accessing a volatile variable\
    \ should merge its private copy with the master copy stored in memory. In effect,\
    \ it synchronizes all cached copies of the variable with the main memory. You\
    \ may only use this modifier to define instance variables of the private or object\
    \ type.\n\nExample:\n\n```java\npublic class MyRunnable implements Runnable {\n\
    \    private volatile boolean active;\n\n    public void run() {\n        active\
    \ = true;\n        while (active) { // line 1\n            // code here\n    \
    \    }\n    }\n\n    public void stop() {\n        active = false; // line 2\n\
    \    }\n}\n```\n\n### Transient\n\nThe keyword transient is used to tell the compiler\
    \ to skip an instance variable when it is serializing the object that contains\
    \ the marked variable.\n\nExample:\n\n```java\npublic transient int limit = 50;\
    \ // will not persist\n```\n\n## CHAPTER 8: Decision Making and Loop Control\n\
    \nThe decision making structures are used in situations where a set of instructions\
    \ have to be executed if the condition is true and another set of instructions\
    \ have to be executed when the condition is determined to be false. There are\
    \ several constructs available in Java for programming such scenarios. These structures\
    \ include—\n\n### If statement\n\nThis statement is used in situations where a\
    \ condition needs to be tested, and if the condition is found true, the block\
    \ of code that follows this statement needs to be executed. The syntax for this\
    \ construct is—\n\n```java\nif(condition){\n\n/*Body*/\n\n}\n```\n\nSample implementation\
    \ for this construct is given below—\n\n```java\npublic class ifDemo {\n\npublic\
    \ static void main(String args[]) {\n\nint i = 10;\n\nint j = 1;\n\nif(i>j){\n\
    \nSystem.out.print(i);\n\n}\n}\n}\n```\n\n### If else statement\n\nThis statement\
    \ is used in situations where a condition needs to be tested, and if the condition\
    \ is found true, the block of code that follows this statement needs to be executed\
    \ else the block of code that follows the else statement is executed. The syntax\
    \ for this construct is—\n\n```java\nif(condition){\n/*Body*/\n}\nelse{\n/*Body*/\n\
    }\n```\n\nSample implementation for this construct is given below—\n\n```java\n\
    public class ifElseDemo {\npublic static void main(String args[]) {\nint i = 1;\n\
    int j = 0;\nif(i>j){\nSystem.out.print(i);\n}\nelse{\nSystem.out.print(j);\n}\n\
    }\n}\n```\n\n### Nested if statement\n\nThis statement is used in situations where\
    \ a condition needs to be tested, and if the condition is found true, the block\
    \ of code that follows this statement needs to be executed else the next condition\
    \ is tested. If this condition is found true, the block of code corresponding\
    \ to the if statement for this condition is executed. If none of the conditions\
    \ are found true, the block of code that follows the else statement is executed.\
    \ Multiple conditions can be tested using the nested if statements. The syntax\
    \ for this construct is—\n\n```java\nif(condition1) {\n\n/*Body*/\n\n}\n\nelse\
    \ if (condition2) {\n\n/*Body*/\n\n}\n\nelse {\n\n/*Body*/\n\n}\n```\n\nSample\
    \ implementation for this construct is given below—\n\n```java\npublic class nestedIfDemo\
    \ {\n\npublic static void main(String args[]) {\n\nint i = 0;\n\nint j = 0;\n\n\
    if(i>j){\n```"
  mdcn: "## 修饰符\n\n修饰符是用于改变代码中定义含义的关键字。Java 提供了多种修饰符。\n\n## 访问修饰符\n\n访问修饰符用于定义方法、变量、类和构造方法的访问级别。\n\
    \n### Private（私有）—仅在类内部可访问\n\n当方法、变量、类或构造方法被声明为私有时，意味着它仅在该类内部可用。但是，如果该类具有公共的 getter\
    \ 方法，你可能能够在类外部访问私有变量。`private` 关键字表示最高的访问限制。请注意，你不能将接口和类声明为私有。\n\n### Public（公共）—可被外部访问\n\
    \n被定义为公共的方法、接口、构造方法、类等，可以从其他类访问。类似地，在公共类内部定义的代码块、方法或字段，也可以从 Java 类访问。只要它们在同一个包内，此规则就适用。如果你想从另一个包访问公共类，你需要导入该公共类。根据类继承的概念，子类会继承父类的所有公共变量和方法。\n\
    \n请注意，应用程序的 `main()` 方法必须声明为公共，Java 解释器才能调用它来运行该类。\n\n### Protected（受保护）—可被所有子类和包内访问\n\
    \n在超类中将方法、变量或构造方法声明为受保护，使其仅对其所在包内的类或其在其他包中的子类可访问。如果你想允许子类使用变量或辅助方法，同时防止不相关的类使用它们，可以使用这种访问类型。接口及其下的字段和方法不应声明为受保护，但接口外部的字段和方法可以声明为受保护。类不应声明为受保护。\n\
    \n### 默认：未提供修饰符时适用—可被包内访问\n\n未使用修饰符声明的方法或变量，可被同一包内的其他类访问。\n\n下表总结了不同的访问修饰符及其效果：\n\
    \n| 修饰符 | 类内部 | 包内部 | 包外部（子类） | 包外部 |\n| :--- | :---: | :---: | :---: | :---:\
    \ |\n| Private | Y | N | N | N |\n| Public | Y | Y | Y | Y |\n| Protected | Y\
    \ | Y | Y | N |\n| 默认 | Y | Y | N | N |\n\n## 非访问修饰符\n\n非访问修饰符可用于访问 Java 中的各种功能。\n\
    \n### Final（最终）—用于确定变量、方法和类的最终实现\n\n#### Final 变量\n\n你只能显式初始化一个 final 变量一次。当你将变量声明为\
    \ final 时，你将永远无法将其重新赋值给另一个对象。但请注意，你仍然可以更改存储在对象内部的数据。这意味着虽然你可以更改对象的状态，但你无法更改引用。`final`\
    \ 修饰符通常与 `static` 结合使用，从常量值创建类变量。\n\n#### Final 方法\n\n子类。\n\n#### Final 类\n\n\
    `final` 修饰符用于防止其他类从声明为 final 的类继承任何特性。\n\n### Static（静态）—用于创建类方法或变量\n\n你可以使用此关键字创建一个独立于类其他实例存在的唯一变量（称为静态变量或类变量）。你不能将局部变量声明为静态。\n\
    \n你也可以使用 `static` 关键字创建一个独立于类其他实例存在的方法（称为静态方法或类方法）。静态方法仅识别并处理给定参数的数据，而不考虑变量。\n\
    \n你可以通过在类名后加上点号（`.`）再写变量或方法名来访问类方法和类变量。\n\n### Abstract（抽象）—用于创建抽象方法或类\n\n####\
    \ 抽象类\n\n当一个类被声明为抽象时，意味着你永远无法实例化该类。将类声明为抽象的唯一原因是为了扩展该类。你不能将一个类同时声明为 final 和 abstract，因为你不可能扩展一个\
    \ final 类。使用抽象方法的类必须声明为抽象类。否则将导致编译错误。\n\n#### 抽象方法\n\n由于抽象方法声明时没有实现，其方法体由子类提供。抽象方法不能声明为\
    \ strict 或 final。除非它本身也是一个抽象类，否则扩展抽象类的类必须采用超类的抽象方法。包含至少一个抽象方法的类应声明为抽象类。另一方面，抽象类不一定需要有抽象方法。\n\
    \n示例：\n\n```java\nabstract class Car {\n    private double price;\n    private\
    \ String type;\n    private String year;\n    public abstract void goFast(); //\
    \ abstract method\n    public abstract void changeColor();\n}\n```\n\n### Synchronized（同步）\n\
    \n`synchronized` 修饰符用于指示在任何给定时间只有一个线程可以访问一个方法。你可以将此关键字与任何访问级别修饰符一起使用。\n\n示例：\n\
    \n```java\npublic synchronized void showInfo() {\n    .......\n}\n```\n\n### Volatile（易变）\n\
    \n此关键字用于指示访问 volatile 变量的线程应将其私有副本与存储在内存中的主副本合并。实际上，它将变量的所有缓存副本与主内存同步。你只能使用此修饰符定义私有或对象类型的实例变量。\n\
    \n示例：\n\n```java\npublic class MyRunnable implements Runnable {\n    private volatile\
    \ boolean active;\n\n    public void run() {\n        active = true;\n       \
    \ while (active) { // line 1\n            // code here\n        }\n    }\n\n \
    \   public void stop() {\n        active = false; // line 2\n    }\n}\n```\n\n\
    ### Transient（瞬态）\n\n`transient` 关键字用于告诉编译器在序列化包含标记变量的对象时跳过该实例变量。\n\n示例：\n\n```java\n\
    public transient int limit = 50; // will not persist\n```\n\n## 第 8 章：决策与循环控制\n\
    \n决策结构用于需要在条件为真时执行一组指令，而在条件为假时执行另一组指令的情况。Java 中有几种可用于编程此类场景的结构。这些结构包括—\n\n###\
    \ If 语句\n\n此语句用于需要测试条件的情况，如果条件为真，则执行此语句后面的代码块。此结构的语法为—\n\n```java\nif(condition){\n\
    \n/*Body*/\n\n}\n```\n\n此结构的示例实现如下—\n\n```java\npublic class ifDemo {\n\npublic\
    \ static void main(String args[]) {\n\nint i = 10;\n\nint j = 1;\n\nif(i>j){\n\
    \nSystem.out.print(i);\n\n}\n}\n}\n```\n\n### If else 语句\n\n此语句用于需要测试条件的情况，如果条件为真，则执行此语句后面的代码块，否则执行\
    \ else 语句后面的代码块。此结构的语法为—\n\n```java\nif(condition){\n/*Body*/\n}\nelse{\n/*Body*/\n\
    }\n```\n\n此结构的示例实现如下—\n\n```java\npublic class ifElseDemo {\npublic static void\
    \ main(String args[]) {\nint i = 1;\nint j = 0;\nif(i>j){\nSystem.out.print(i);\n\
    }\nelse{\nSystem.out.print(j);\n}\n}\n}\n```\n\n### 嵌套 if 语句\n\n此语句用于需要测试条件的情况，如果条件为真，则执行此语句后面的代码块，否则测试下一个条件。如果此条件为真，则执行此条件对应的\
    \ if 语句的代码块。如果所有条件都不为真，则执行 else 语句后面的代码块。可以使用嵌套 if 语句测试多个条件。此结构的语法为—\n\n```java\n\
    if(condition1) {\n\n/*Body*/\n\n}\n\nelse if (condition2) {\n\n/*Body*/\n\n}\n\
    \nelse {\n\n/*Body*/\n\n}\n```\n\n此结构的示例实现如下—\n\n```java\npublic class nestedIfDemo\
    \ {\n\npublic static void main(String args[]) {\n\nint i = 0;\n\nint j = 0;\n\n\
    if(i>j){\n```"
