    A single stolen W-2 might net an attacker $20, but your organization and employees
    may be on the hook for tens or hundreds of thousands of dollars in damages. And
    this is just one example of how cyber-attacks wreak havoc on an organization.
    Black markets and cyber espionage make seemingly mundane data worth stealing and
    exploiting. Trade secrets, access to bank accounts, and private communication
    are very lucrative targets. Sometimes it is not your own data, but a client’s
    data accessible through you or your employees that is the target.


    Our highly connected, the digital world has ushered in a new era of cybercrime.
    One that is growing fast and changing constantly. Executives who stick their heads
    in the sand, try to keep a data breach a secret, pass off cybersecurity as just
    an IT problem, or wait for government protection will pay a steep price.


    Many executives in the 1990s were adamant that computers were a novel expense
    that would never add real value to their business models. The idea that they would
    elevate the discussion of computers to an executive-level was as absurd as typing
    their own email. Executives that clung to this view doomed their company to lose
    ground when competitors with forward-thinking executives raised technology to
    a boardroom discussion. Today cybersecurity is what computers were then. It is
    history, repeating itself, and we already know who wins. Organizations led by
    executives that are willing to buck old-school thinking and grapple with the Wild
    West of cybersecurity will come out on top.


    Today, the outdated view is thinking that cybersecurity is a technical problem
    best delegated to information technology (IT) experts. It goes hand-in-hand with
    the idea that cybersecurity involves only preventing attacks by anticipating them
    and implementing as many deterrents as possible. In contrast, a modern view of
    cybersecurity recognizes that countering every possible attack to achieve perfect
    security is financially unfeasible. This new mindset also considers what happens
    when attacks occur, because they will. Astute executives realize that spending
    every dime on prevention is futile and take a more holistic view of the problem.


    Finding the right balance among various preventive and preparatory measures is
    like building an investment portfolio of stocks, bonds, and real estate. The right
    mix depends on what the external markets are doing and your appetite'
