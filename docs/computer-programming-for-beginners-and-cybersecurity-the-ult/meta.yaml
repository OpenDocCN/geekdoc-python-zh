- md: '## File Handling


    Python provides a critical feature for reading data from the file and writing
    data into a file.


    In most programming languages, all the values or data are kept in some volatile
    variables.


    Since data will be stored in those variables during run-time only and will disappear
    once the program execution ends, therefore, it’s better to save these data permanently
    using files.


    Once you store data on a file, the next important thing is its retrieval process
    because it’s stored as bits of 1s and 0s, and in case the retrieval does not occur
    well, then it becomes completely useless, and that data is said to be corrupted.


    ## How Python Handles Files?


    If you’re working in an extensive software application where they execute a massive
    amount of data, then we can’t expect those data to be kept in a variable because
    variables are volatile.


    Therefore, when you want to deal with these situations, the role of files will
    come into the picture.


    Since files are non-volatile in nature, the data will remain permanently in a
    secondary device such as Hard Disk and using Python to deal with these files in
    your applications.


    ## Do You Consider How Python Will Handle These Files?


    Let’s assume how normal people will deal with these files. If you want to read
    the data from a file or write the data into a file, then you need to open the
    file or create a new file if the file doesn’t exist and then conduct the normal
    read/write operations, save the file and close it.


    Similarly, the same operations are accomplished in Python with the help of in-built
    applications.


    ## Types of Files in Python


    There are two kinds of files:


    - 1. Text files

    - 2. Binary files


    A file whose contents can be examined using a text editor is known as a text file.
    A text file refers to a sequence of ASCII characters. Python programs are examples
    of text files.


    A binary file stores the data in the same manner as stored in the memory. The
    mp3 files, word documents are some of the examples of binary files. You cannot
    read a binary file using a text editor.


    In Python language, file processing takes the following steps.


    - Open a file that returns a filehandle.

    - Use the handle to read or write action.

    - Close the filehandle.


    Before you perform a read or write operation to a file in Python, you must open
    it first. And as the read/write transaction finishes, you should close it to free
    the resources connected with the file.


    Let’s now look at each step in detail.


    Access_mode: This is represented with an integer e.g read, write, and append.
    The default setting is the read-only `<r>`.


    Buffering: The default value for buffering is 0. A zero value shows that buffering
    will not happen. If the value is 1, then the line buffering will happen while
    accessing the file. If it’s more than 1, then the buffering action will proceed
    based on the size.


    File_name: This is a string that represents the name of the file you want to access.


    ## File open modes in Python language


    - `<r>`

    - `<rb+>`

    - `<rb>`

    - `<w+>`

    - `<wb+>`

    - `<r+>`

    - `<w>`

    - `<wb>`


    ## Python File Object Properties


    Once you call the Python `open()` function, it returns an object, which is the
    filehandle. Additionally, you need to understand that Python files have different
    features. And you can take advantage of the filehandle to list the features of
    a file it belongs.


    ## Close a File in Python


    It is good always to close a file when you finish your work. However, Python has
    a garbage collector to clean up the unused objects. However, you need to do it
    on your own instead of leaving it for the GC.


    ## The Close Method


    Python offers the `<close()>` method to close a file.


    When you close a file, the system creates resources allocated to it. And it’s
    easy to accomplish.


    Closing a file releases essential system resources. If you forgot to close the
    file, Python will do it automatically when the program ends, or the file object
    is no longer referenced inside the program. However, in case your program is large,
    and you’re reading or writing multiple files that can consume a massive amount
    of resources on the system. If you continue opening new files carelessly, you
    might run out of resources.


    # CHAPTER 7: Development Tools


    ## How to Run Python


    Now before we start running our first python program, it is important that we
    understand how we can run python programs. Running or executing or deploying or
    firing a program simply means that we are making the computer process instructions/lines
    of codes.


    For example, if the lines of codes (program) require the computer to display some
    message, then it should. The following are the ways or modes of running python
    programs. The interpreter is a special program that is installed when installing
    the Python package and helps convert text code into a language that the computer
    understands and can act on it (executing).


    ## Immediate Mode


    It is a way of running python programs that are not written in a file. We get
    into the immediate mode by typing the word python in the command line and which
    will trigger the interpreter to switch to immediate mode. The immediate mode allows
    typing of expressions directly, and pressing enter generates the output. The sign
    below is the Python prompt:


    ```

    >>>

    ```


    The python prompt instructs the interpreter to accept input from the user. For
    instance, typing 2+2 and pressing enter will display 4 as the output. In a way,
    this prompt can be used as a calculator. If you need to exit the immediate mode,
    type `quit()` or `exit()`.


    Now type 5 +3, and press enter, the output should be 8. The next mode is the Script
    Mode.


    ## Script Mode


    The script mode is used to run a python program written in a file; the file is
    called a script.


    The scripts can be saved to external storage such as a disk for later use. All
    python scripts have the file extension `.py`, which implies that the filename
    ends with `.py`. An example is `myFirstProg.py`. We shall explain later how to
    write python scripts.


    ## What is the IDE?


    An IDE provides a convenient way of writing and running Python programs. One can
    also use text editors to create a python script file instead of an IDE by writing
    lines of codes and saving the file with a `.py` extension. However, using an IDE
    can simplify the process of writing and running Python programs. The IDLE present
    in the Python package is an example of an IDE with a graphical user interface
    and gets installed along with the Python language. The advantages of IDE include
    helping getting rid of repetitive tasks and simplify coding for beginners. IDE
    provides syntax highlighting, code hinting, and syntax checking, among other features.
    There also commercial IDE, such as the PyScripter IDE, that performs most of the
    mentioned functions.


    The IDE is going to be important to what we are able to do inside of our language.
    You need to have some kind of IDE or environment in place in order to handle any
    of the coding. Without this, you will find that the programs will not work.


    The good news is that the IDE is simple to install, and will not be too difficult
    to get to work with. And there are many Python IDEs that you will be able to choose
    from. It often depends on the features and other add-ons that you would like to
    have with the environment that you choose.


    Keep in mind that a few of these are going to cost a bit of money based on who
    designs them, and what kinds of features you find in them. You can choose whether
    those features are important to what you want to do or not.


    If you are looking to keep costs down, while still ensuring that you get a good
    IDE that has all of the features and more that you need, you can go visit the
    www.python.org website. This will ensure, along with the Python download, that
    you get the IDE and all of the other files that you need to make coding in Python
    easy.'
  mdcn: '## 文件处理


    Python 提供了一项关键功能，用于从文件读取数据和将数据写入文件。


    在大多数编程语言中，所有值或数据都存储在某些易失性变量中。


    由于数据仅在运行时存储在这些变量中，并且在程序执行结束后就会消失，因此最好使用文件将这些数据永久保存。


    一旦你将数据存储在文件中，下一个重要的事情是其检索过程，因为它以 1 和 0 的比特形式存储，如果检索不顺利，那么它就变得完全无用，该数据被称为已损坏。


    ## Python 如何处理文件？


    如果你正在处理一个执行大量数据的大型软件应用程序，那么我们不能期望这些数据被保存在变量中，因为变量是易失性的。


    因此，当你想处理这些情况时，文件的作用就会显现出来。


    由于文件本质上是非易失性的，数据将永久保留在硬盘等辅助设备中，并且可以使用 Python 在你的应用程序中处理这些文件。


    ## 你考虑过 Python 将如何处理这些文件吗？


    让我们假设普通人将如何处理这些文件。如果你想从文件读取数据或将数据写入文件，那么你需要打开文件，或者如果文件不存在则创建一个新文件，然后执行正常的读/写操作，保存文件并关闭它。


    同样，借助内置应用程序，Python 中也完成了相同的操作。


    ## Python 中的文件类型


    有两种文件：


    - 1. 文本文件

    - 2. 二进制文件


    内容可以使用文本编辑器检查的文件称为文本文件。文本文件指的是 ASCII 字符序列。Python 程序就是文本文件的例子。


    二进制文件以与内存中存储相同的方式存储数据。mp3 文件、Word 文档是二进制文件的一些例子。你无法使用文本编辑器读取二进制文件。


    在 Python 语言中，文件处理采取以下步骤。


    - 打开一个文件，返回一个文件句柄。

    - 使用该句柄进行读取或写入操作。

    - 关闭文件句柄。


    在你对 Python 中的文件执行读或写操作之前，你必须先打开它。并且当读/写事务完成时，你应该关闭它以释放与文件相关的资源。


    现在让我们详细看看每个步骤。


    Access_mode：这用一个整数表示，例如读取、写入和追加。默认设置是只读 `<r>`。


    Buffering：缓冲的默认值为 0。零值表示不会发生缓冲。如果值为 1，则在访问文件时会发生行缓冲。如果大于 1，则缓冲操作将根据大小进行。


    File_name：这是一个字符串，表示你要访问的文件的名称。


    ## Python 语言中的文件打开模式


    - `<r>`

    - `<rb+>`

    - `<rb>`

    - `<w+>`

    - `<wb+>`

    - `<r+>`

    - `<w>`

    - `<wb>`


    ## Python 文件对象属性


    一旦你调用 Python 的 `open()` 函数，它会返回一个对象，即文件句柄。此外，你需要了解 Python 文件具有不同的特性。你可以利用文件句柄来列出它所属文件的特性。


    ## 在 Python 中关闭文件


    完成工作后，最好始终关闭文件。然而，Python 有一个垃圾收集器来清理未使用的对象。但是，你需要自己完成，而不是留给 GC。


    ## Close 方法


    Python 提供了 `<close()>` 方法来关闭文件。


    当你关闭文件时，系统会释放分配给它的资源。这很容易完成。


    关闭文件会释放重要的系统资源。如果你忘记关闭文件，Python 会在程序结束或文件对象在程序内不再被引用时自动关闭它。但是，如果你的程序很大，并且你正在读取或写入多个文件，这可能会消耗系统上的大量资源。如果你继续不加注意地打开新文件，你可能会耗尽资源。


    # 第 7 章：开发工具


    ## 如何运行 Python


    现在，在我们开始运行第一个 Python 程序之前，重要的是我们要了解如何运行 Python 程序。运行、执行、部署或启动程序简单来说就是让计算机处理指令/代码行。


    例如，如果代码行（程序）要求计算机显示一些消息，那么它就应该显示。以下是运行 Python 程序的方式或模式。解释器是在安装 Python 包时安装的一个特殊程序，它有助于将文本代码转换为计算机可以理解并执行的语言（执行）。


    ## 即时模式


    这是一种运行未写入文件的 Python 程序的方式。我们通过在命令行中输入单词 python 进入即时模式，这将触发解释器切换到即时模式。即时模式允许直接输入表达式，按回车键会生成输出。下面的符号是
    Python 提示符：


    ```

    >>>

    ```


    Python 提示符指示解释器接受用户的输入。例如，输入 2+2 并按回车键将显示 4 作为输出。在某种程度上，这个提示符可以用作计算器。如果你需要退出即时模式，请输入
    `quit()` 或 `exit()`。


    现在输入 5 +3，然后按回车键，输出应该是 8。下一个模式是脚本模式。


    ## 脚本模式


    脚本模式用于运行写在文件中的 Python 程序；该文件称为脚本。


    脚本可以保存到外部存储（如磁盘）以供以后使用。所有 Python 脚本都有文件扩展名 `.py`，这意味着文件名以 `.py` 结尾。一个例子是 `myFirstProg.py`。我们稍后将解释如何编写
    Python 脚本。


    ## 什么是 IDE？


    IDE 提供了一种编写和运行 Python 程序的便捷方式。你也可以使用文本编辑器而不是 IDE 来创建 Python 脚本文件，方法是编写代码行并将文件保存为
    `.py` 扩展名。但是，使用 IDE 可以简化编写和运行 Python 程序的过程。Python 包中附带的 IDLE 就是一个带有图形用户界面的 IDE
    示例，它随 Python 语言一起安装。IDE 的优点包括帮助消除重复性任务并简化初学者的编码。IDE 提供语法高亮、代码提示和语法检查等功能。还有一些商业
    IDE，例如 PyScripter IDE，可以执行大多数上述功能。


    IDE 对于我们能够在语言内部做什么将很重要。你需要有某种 IDE 或环境来处理任何编码。没有这个，你会发现程序将无法工作。


    好消息是 IDE 很容易安装，并且使用起来不会太困难。而且有许多 Python IDE 可供你选择。这通常取决于你希望选择的环境具有的功能和其他附加组件。


    请记住，其中一些会根据设计者和你发现的功能类型而花费一些钱。你可以选择这些功能对你想要做的事情是否重要。


    如果你想降低成本，同时仍然确保获得一个具有所有你需要的功能甚至更多的良好 IDE，你可以访问 www.python.org 网站。这将确保，连同 Python
    下载，你获得 IDE 和所有其他文件，使 Python 编码变得容易。'
