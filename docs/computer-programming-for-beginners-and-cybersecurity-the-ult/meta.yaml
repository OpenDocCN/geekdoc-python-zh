    # CHAPTER 7:


    # Object-Oriented Programming


    You have learned earlier that Java is an object-oriented programming language.
    As such, it supports the fundamental principles of this programming paradigm.


    An object refers to real entities such as bag, car, chair, or pen. Object-oriented
    programming languages allow programmers to design programs that use objects and
    classes. They provide and support features that can simplify software development
    and maintenance. The most important concepts of this programming paradigm are
    the following:


    +   - Objects

    - Classes

    - Method

    - Instance

    - Inheritance

    - Abstraction

    - Polymorphism

    - Message Parsing

    - Encapsulation


    # Objects


    In the real world, you will encounter objects such as humans, dogs, cars, and
    cats. These objects possess state and behavior. For instance, when you think of
    a cat, its state can consist of its breed, color, or name. Its behavior may consist
    of running, jumping, or wagging its tail.


    A software object resembles a real-world object in terms of these characteristics.
    Its state is saved in fields, and its behavior is exhibited through methods.'
