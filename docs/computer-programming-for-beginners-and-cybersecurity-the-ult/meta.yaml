    \n## 编程\n\n### 条件语句\n\nPython中的条件语句非常容易实现；它是一个关键字。如前所述，Python语言基于代码的缩进。我们将使用四个空格作为此缩进的偏移量。幸运的是，像Spyder或Jupyter\
    \ notebooks这样的工具会自动生成此缩进。\n\n这是我们的第一个条件语句，意思是“如果a为真，则显示‘it is true’”：\n\n```\n\
    if a is True:\n    print(\"it's true\")\n```\n\n条件语句没有退出；是缩进来管理它。通常，我们也对这个条件的补集感兴趣；我们将为此使用\
    \ `else`：\n\n```\nif a is True:\n    print(\"it's true\")\nelse:\n    print(\"\
    it's not true\")\n```\n\n如果我们的变量 `a` 不一定是布尔值，我们可以有另一种情况，我们使用 `elif`：\n\n```\n\
    if a is True:\n    print(\"it's true\")\nelif a is False:\n    print(\"it's wrong\"\
    )\nelse:\n    print(\"it's not a boolean\")\n```\n\n### 循环\n\n循环是大多数编程语言的核心元素。Python也不例外。然而，对于像Python这样的解释型语言，你必须非常小心。实际上，Python中循环的处理很慢，我们将在迭代次数较少的循环中使用它。我们避免创建在数据数组的行上重复数千次的循环。然而，我们可以在数据表的列上使用循环，列数为几十列。\n\
    \n### for循环\n\nPython循环有一种稍微特定的格式；它是对结构元素的循环。我们将写：\n\n```\nfor elem in [1, 2]:\n\
    \    print(elem)\n```\n\n这段代码将允许你显示1和2。因此，循环的迭代器（在我们的例子中是 `elem`）取第二个位置（在 `in`\
    \ 之后）的结构元素的值。这些元素可能在不同的结构中，但通常首选列表。\n\n### range、zip和enumerate函数\n\n这三个函数是非常有用的函数，它们允许创建特定对象，这些对象可能在你的代码中用于循环。`range()`\
    \ 函数用于生成一个数字序列，从给定的数字或默认的0开始，到不包含的数字结束：\n\n```\nIn []: print(list(range(5)))\n\
    [0, 1, 2, 3, 4]\nIn []: print(list(range(2, 5)))\n[2, 3, 4]\nIn []: print(list(range(2,\
    \ 15, 2)))\n[2, 4, 6, 8, 10, 12, 14]\n```\n\n我们在这里看到，创建的range对象可以很容易地用 `list()`\
    \ 转换为列表。\n\n在循环中，这给出：\n\n```\nfor i in range(11):\n    print(i)\n```\n\n`zip`\
    \ 和 `enumerate` 函数也是循环中有用的函数，它们使用列表。\n\n`enumerate()` 函数返回列表的索引和元素。如果我们使用之前使用的国家列表：\n\
    \n```\nIn []: for i, a in enumerate(country_list):\n           print(i, a)\n```\n\
    \n```\n0 Switzerland\n1 Spain\n2 France\n3 United States\n4 India\n5 China\n```\n\
    \n`zip` 函数将允许链接多个列表并同时迭代这些列表的元素。\n\n例如，如果我们想同时增加天数和天气，我们可以使用：\n\n```\nIn []: for\
    \ day, weather in zip([\"Monday\", \"Tuesday\"], [\"beautiful\", \"bad\"]):\n\
    \           print(\"%s, it will make %s\" % (day.capitalize(), weather))\n```\n\
    \n```\nMonday, it will be beautiful\nTuesday, it will be bad\n```\n\n在此代码中，我们使用\
    \ `zip()` 在每次迭代中取一对值。第二部分是字符串操作。如果其中一个列表比另一个长，循环将在到达其中一个列表的末尾时停止。\n\n我们可以在一个代码中链接\
    \ `enumerate` 和 `zip`，例如：\n\n```\nIn []: for i, (day, weather) in enumerate(zip([\"\
    Monday\", \"Tuesday\"],\n           [\"good\", \"bad\"])):\n           print(\"\
    %i: %s, it will make %s\" % (i, day.capitalize(), weather))\n```\n\n```\n0: Monday,\
    \ it will be good\n1: Tuesday, it will be bad\n```\n\n我们在这里看到 `i` 是元素的位置。\n\n\
    注意——在字符串中替换。"
