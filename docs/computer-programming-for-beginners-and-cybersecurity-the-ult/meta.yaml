  mdcn: "## 赋值运算符：=\n\n关系运算符：\n\n!=, ==, <, <=, > 和 >=，以及 clear();\n\nO（变量）：\n\n-\
    \ Insert()、erase() 和 emplace()（它们在基于节点的容器中速度快，但在连续内存容器的（中间部分）速度慢）；以及\n- 构造函数（通常是类的组合，或者\n\
    - 它们的默认构造函数具有常数复杂度，但所有其他构造函数和析构函数可能具有线性复杂度）。\n\n注意：\n\na) 前向列表和无序关联容器使用前向迭代器，因此它们没有反向迭代器操作：emplace_back()、rbegin()、rend()、crbegin()\
    \ 和 crend()。\n\nb) 关联容器支持反向迭代器，但它们不支持 emplace_back。这是因为关联容器保持其元素处于排序状态，因此它不接受命令\
    \ emplace_back()，该命令坚持将新元素放置在容器的末尾。\n\n†前向列表：\n\n1. 不支持运算符 size()；\n2. 它提供 insert_after()、erase_after()\
    \ 和 emplace_after()，而不是 insert()、erase() 和 emplace()；\n3. 具有特殊的迭代器 before_begin()、cbefore_begin()，使得\n\
    \n- 前向列表中的一个操作：\n- my_fwd_list.insert_after\n- (my_fwd_list.before_begin(), inv_data.gold);\n\
    - 等效于列表中的以下操作：\n- my_list.insert\n- (my_list.begin(), inv_data.gold);\n- 注意：\n\
    - 没有容器可以在 end() 之外进行写入或读取，即，\n- my_fwd_list.insert_after\n- (my_fwd_list.end(),\
    \ inv_data.gold); 是一个错误！\n\n‡ shrink_to_fit() 请求移除未使用的内存容量，它仅适用于 vector、deque\
    \ 和 string。\n\n†† 无序容器不支持关系运算符：<、<=、> 和 >=。\n\n在上面的运算符列表中，O 代表复杂度。简而言之，尽管复杂度意味着函数的时间和/或空间复杂度，但在容器中它是时间复杂度；\n\
    \n- O(1) 代表常数时间复杂度；\n- O(log n) 代表对数时间复杂度；\n- O(n) 代表线性时间复杂度；\n\n相比之下，O(n) > O(log\
    \ n) > O(1)，这意味着 O(1) 是最快的操作；并且注意：这些是预期的或平均复杂度，标准库文档引用了某些运算符的最坏情况复杂度。\n\n有一些容器不支持迭代器，它们是：容器适配器、bitset\
    \ 和 valarray。注意：C++11 为 valarray 定义了迭代器 begin() 和 end()。\n\n# STL 迭代器\n\n迭代器、容器和算法是标准模板库的组成部分，由惠普公司的\
    \ Alexander Stepanov 等人在 1990 年代初编写，随后在标准库中合并并发展。\n\n迭代器是专门指针的抽象，它对给定容器（如 vector、map\
    \ 和用户创建的容器类）的元素进行解引用。\n\n每个容器类都包含用于生成迭代器的成员函数，例如，成员 begin() 和 end() 将分别返回第一个元素和最后一个元素之后的迭代器。\n\
