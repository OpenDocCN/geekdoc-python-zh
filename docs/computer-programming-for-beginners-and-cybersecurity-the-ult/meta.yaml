  mdcn: "元素的存在性，现在可以专注于真正重要的事情：定义如何创建列表以及如何向列表中添加元素。\n\nMap 接口已通过 `forEach()`、`replace()`\
    \ 和 `replaceAll()` 等其他函数式方法得到丰富，并使用了相同的代码内化原则。完整列表请参阅附录。\n\n## Spliterator\n\n\
    集合库在并发访问方面仍然受到相同的约束。与往常一样，你必须选择符合线程安全要求的集合库类。这是因为上面展示的新方法只是基于相同底层数据结构的函数式抽象。这些方法并不特别适合函数式编程对并行处理的看法，因为它们仍然基于多线程修改集合和同步访问底层数据的概念。然而，存在一种新的、兼容的\
    \ Java 8 抽象。它旨在并行迭代数据。这个想法由 Spliterator 接口体现。该接口的前提是将数据分区，并将数据块交给不同的线程。Spliterator\
    \ 可以从 Collection 接口获取，包括子接口 List 和 Set。\n\nSpliterator 接口的核心是这三个方法：\n\n```\nSpliterator<T>\
    \ trySplit();\n\ndefault void forEachRemaining(Consumer<? super T> action) {...}\n\
    \nboolean tryAdvance(Consumer<? super T> action);\n```\n\n`trySplit()` 方法将底层数据分成两部分。它创建一个包含一半数据的新\
    \ Spliterator，并将另一半保留在原始实例中。每个实例都可以交给一个线程，该线程随后使用 `forEachRemaining()` 迭代分区数据。`tryAdvance()`\
    \ 方法是一个逐个处理的变体，返回下一个元素，如果列表已耗尽则返回 null。\n\nSpliterator 本身不处理并行处理，而是提供进行并行处理的抽象。以下是实际应用的概念：\n\
    \n```\npublic static boolean isMovieInList(String title, List<String> movieList)\n\
    \    throws InterruptedException {\n    // 从电影列表中获取一个 spliterator\n    Spliterator<String>\
    \ s1 = movieList.spliterator();\n\n    // 将原始列表分成两半。\n    // 现在 s1 和 s2 各包含列表的一半。\n\
    \    Spliterator<String> s2 = s1.trySplit();\n\n    BooleanHolder booleanHolder\
    \ = new BooleanHolder();\n    if (s2 != null) {\n        Consumer<String> finder\
    \ =\n            movie -> {if (movie.equals(title)) booleanHolder.isFound = true;};\n\
    \n        // 每个线程并行搜索电影列表\n        Thread t1 = new Thread(() -> s1.forEachRemaining(finder));\n\
    \        Thread t2 = new Thread(() -> s2.forEachRemaining(finder));\n\n      \
    \  t1.start();\n        t2.start();\n        t1.join();\n        t2.join();\n\
    \    }\n\n    return booleanHolder.isFound;\n}\n\nprivate static class BooleanHolder\
    \ {\n    public boolean isFound = false;\n}\n```\n\n给定一个标题和一个电影列表，`isMovieInList()`\
    \ 方法并行化搜索以确定它是否包含在列表中。如果找到，它会将 `booleanHolder` 中的标志设置为 true。它从列表中获取一个 Spliterator\
    \ 实例，将其分成两半，并将一半交给每个线程。如果有更多线程可用，可以重复分割过程。\n\nSpliterator 也可以从其他集合类型以及 JDK 中的其他库获取。有许多针对不同特性设计的实现，包括有限/无限、有序/无序、排序/未排序以及可变/不可变。它们继承了其底层数据结构的特性。\n\
    \nSpliterator 是一种更底层的抽象，旨在让你对并行迭代进行更细粒度的控制。然而，该 API 缺少实现函数式友好算法所需的一些改进。在上面的例子中，我们需要将状态存储在\
    \ BooleanHolder 中以进行搜索。\n\n## 总结\n\n这完成了我们对新的、改进的 Java 8 集合库以及标准函数式接口的概述。正如标准\
    \ JDK 库中已有许多变化以支持函数式概念一样，预计第三方 API 也会发生重大变化。但最大的变化尚未到来。\n\n## 关键点\n\n- 新的 `java.util.function`\
    \ 包包含一组函数式接口。这些接口分为四个家族，每个家族由其原型表示：Consumer、Function、Predicate 和 Supplier。\n-\
    \ 每个函数式接口家族都定义了在类型和元数上特化的变体。\n- 函数式接口还定义了支持函数组合的方法。多个不同的 lambda 可以融合形成看起来像一个的超级函数。\n\
    - 集合库已经过改造并实现了函数化。这是通过在层次结构的顶层使用默认方法实现的，从而确保了向后兼容性。\n- 集合、列表、集合和映射中的新函数式方法在设计时考虑了内部迭代。以\
    \ lambda 和方法引用形式出现的行为参数被传递给迭代集合并对每个元素进行操作的方法。\n- 内部迭代是函数式编程基础的一种声明式编程形式。它使开发人员无需描述“如何”做，而是专注于“做什么”。\n\
    - Spliterator 旨在用于集合的并行迭代。数据被分区，每个数据块被交给不同的线程进行并行处理。\n\n一个数大于一且不是质数。\n\n## 结论\n\
    \nJDK 是 Java 开发工具包，它是编译、记录和打包 Java 程序所必需的工具。与 JRE 一起，JDK 内置了解释器或加载器、名为 javac 的编译器、归档工具（JAR）、Javadoc\
    \ 文档生成器以及许多其他成功进行 Java 开发所需的工具。\n\nJRE 是 Java 运行时环境。它是可以执行 Java 字节码的环境，用于实现 Java\
    \ 虚拟机。JRE 还为我们提供了 JVM 运行时所需的所有类库和许多其他支持文件。基本上，它是一个软件包，为我们提供了运行 Java 程序所需的一切，是\
    \ Java 虚拟机的物理实现。\n\nJVM 代表 Java 虚拟机。JVM 是一个抽象机器，一个规范，它为我们提供了执行字节码的 JRE。JVM 必须遵循这些规范——规范，描述\
    \ JVM 如何实现的文档；实现，满足 JVM 规范要求的程序；以及运行时实例，每当使用命令提示符编写 Java 命令并运行类时创建的 JVM 实例。\n\n\
