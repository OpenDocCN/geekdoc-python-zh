    \ catch 块。\n\n当执行此代码时，受保护的代码会被执行。如果发生异常，异常类型会与第一个 catch 块的异常类型进行匹配。但是，如果异常类型不匹配，则会忽略\
    \ catch 块 1，并尝试与第二个 catch 块的异常类型进行匹配。无论哪个 catch 块与引发的异常具有相同的异常类型，相应的 catch 块就会被执行。\n\
    \n## 第 9 章：抽象数据类型、数据结构与 Java 集合\n\n### 抽象数据类型（ADT）\n\n抽象数据类型（ADT）是对数据及其允许操作的逻辑描述。ADT\
    \ 被定义为用户视角下的数据。ADT 关注数据的可能取值及其暴露的接口。ADT 不关心数据结构的实际实现。\n\n例如，用户想要存储一些整数并求它们的平均值。该数据结构的\
    \ ADT 将支持两个功能：一个用于添加整数，另一个用于获取平均值。该数据结构的 ADT 不涉及它将如何具体实现。\n\n### 数据结构\n\n数据结构是数据的具体表示，被定义为程序员视角下的数据。数据结构表示数据将如何存储在内存中。所有数据结构都有各自的优缺点。根据问题的类型，我们选择最适合它的数据结构。\n\
    \n例如，我们可以将数据存储在数组、链表、栈、队列、树等结构中。\n\n注意：在本章中，我们将学习各种数据结构及其 API。以便用户可以在不了解其内部实现的情况下使用它们。\n\
    \n### JAVA 集合框架\n\nJAVA 编程语言提供了一个 JAVA 集合框架，它是一套高质量、高性能且可复用的数据结构和算法。\n\n使用 JAVA\
    \ 集合框架有以下优点：\n\n- 1. 程序员不必反复实现基本的数据结构和算法。从而避免了重复造轮子。因此，程序员可以将更多精力投入到业务逻辑中。\n-\
    \ 2. JAVA 集合框架的代码是经过充分测试、高质量、高性能的代码。使用它们可以提高程序的质量。\n- 3. 由于集合框架中实现的基本数据结构和算法可以被复用，因此降低了开发成本。\n\
    - 4. 由于大多数 Java 开发者都使用集合框架，因此更容易审查和理解其他开发者编写的程序。此外，集合框架有完善的文档。\n\n### 数组\n\n数组表示同一数据类型的多个元素的集合。\n\
    \n### 数组 ADT 操作\n\n以下是数组的 API：\n\n- 1. 在第 k 个位置添加元素。值可以在 O(1) 常数时间内存储在数组的第 K 个位置。我们只需要将值存储在\
    \ arr[k] 中。\n- 2. 读取存储在第 k 个位置的值。访问数组中某个索引处存储的值也是 O(1) 常数时间。我们只需要读取存储在 arr[k]\
    \ 中的值。\n- 3. 用新值替换存储在第 k 个位置的值。时间复杂度：O(1) 常数时间。\n\n示例：\n\n```java\npublic class\
    \ ArrayDemo {\n    public static void main(String[] args) {\n        int[] arr\
    \ = new int[10];\n        for (int i = 0; i < 10; i++)\n        {\n          \
    \  arr[i] = i;\n        }\n    }\n}\n```\n\nJAVA 标准数组是固定长度的。有时我们不知道需要多少内存，所以会创建一个更大尺寸的数组。从而浪费了空间。如果数组已满，而我们想添加更多值，就需要创建一个有足够空间的新数组，然后将旧数组复制到新数组。为了避免这种手动重新分配和复制，我们可以使用\
    \ JAVA 集合框架的 ArrayList 或链表来存储数据。\n\n### JAVA 集合中的 ArrayList 实现\n\nJAVA 集合中的 ArrayList<E>\
    \ 是一种实现了 List<E> 接口的数据结构，这意味着它可以包含重复元素。ArrayList 是作为动态数组实现的，可以根据需要增长或缩小。（内部使用数组，当数组满时，会分配一个更大的数组，并将旧数组的值复制到其中）。\n\
    \n示例：\n\n```java\nimport java.util.ArrayList;\n\npublic class ArrayListDemo {\n\
    \    public static void main(String[] args) {\n        ArrayList<Integer> al =\
    \ new ArrayList<Integer>();\n        al.add(1); // add 1 to the end of the list\n\
    \        al.add(2); // add 2 to the end of the list\n        System.out.println(\"\
    Contents of Array: \" + al);\n        System.out.println(\"Array Size: \" + al.size());\n\
    \        System.out.println(\"Array IsEmpty: \" + al.isEmpty());\n        al.remove(al.size()\
    \ -1); // last element of array is removed.\n        al.removeAll(al); // all\
    \ the elements of array are removed.\n        System.out.println(\"Array IsEmpty:\
    \ \" + al.isEmpty());\n    }\n}\n```\n\n输出：\n\nContents of Array: [1, 2]\n\nArray\
    \ Size: 2\n\nArray IsEmpty: false\n\nArray IsEmpty: true\n\n### 链表\n\n链表是一种动态数据结构，内存是在运行时分配的。链表的概念不是连续存储数据。链表的节点包含一个指向列表中下一个元素的链接。\n\
    \n从性能上讲，链表比数组慢，因为无法直接访问链表元素。当我们事先不知道要存储的元素数量时，链表是一种有用的数据结构。链表有多种类型：线性链表、循环链表、双向链表、双向循环链表等。\n\
    \n### 链表 ADT 操作\n\n以下是链表的 API。\n\nInsert(k)：将 k 添加到列表的开头\n\n在列表的开头插入一个元素。只需创建一个新元素并移动指针。使这个新元素成为列表的第一个元素。此操作将花费\
    \ O(1) 常数时间。\n\nDelete()：删除列表开头的元素\n\n删除列表开头的元素。我们只需要移动一个指针。此操作也将花费 O(1) 常数时间。\n\
    \nPrintList()：显示列表的所有元素。\n\n从第一个元素开始，然后跟随指针。此操作将花费 O(N) 时间。\n\nFind(k)：查找值为 k\
    \ 的元素的位置\n\n从第一个元素开始，跟随指针直到找到我们要找的值或到达列表末尾。此操作将花费 O(N) 时间。\n\n注意：二分查找不适用于链表。\n\
    \nFindKth(k)：查找位置 k 处的元素\n\n从第一个元素开始，跟随链接直到到达第 k 个元素。此操作将花费 O(N) 时间。\n\nIsEmpty()：检查列表中的元素数量是否为零。\n\
    \n只需检查列表的头指针，如果为 Null，则列表为空，否则不为空。此操作将花费 O(1) 时间。\n\n### JAVA 集合中的 LinkedList\
    \ 实现\n\nJAVA 集合中的 LinkedList<E> 也是一种实现了 List<E> 接口的数据结构。\n\n示例：\n\n```java\nimport\
    \ java.util.LinkedList;\n\npublic class LinkedListDemo {\n    public static void\
    \ main(String[] args) {\n        LinkedList<Integer> ll = new LinkedList<Integer>();\n\
    \        ll.addFirst(2); // 8 is added to the list\n        ll.addLast(10); //\
    \ 9 is added to last of the list.\n        ll.addFirst(1); // 7 is added to first\
    \ of the list.\n        ll.addLast(11); // 20 is added to last of the list\n \
    \       System.out.println(\"Contents of Linked List: \" + ll);\n        ll.removeFirst();\n\
    \        ll.removeLast();\n    }\n}\n```"
