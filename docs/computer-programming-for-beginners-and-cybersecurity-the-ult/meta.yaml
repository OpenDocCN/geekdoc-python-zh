    最终：( 1111; 1124; 1134; 1176; )\n\n上面介绍的程序演示了迭代器在算法中包含容器数据的有用性。\n\n正如我们所看到的，迭代器可用于打印容器的内容，因此让我们在头文件“my_essentials.hpp”中编写一个与容器无关的代码。这用于轻松打印具有一个类型名称的容器，如\
