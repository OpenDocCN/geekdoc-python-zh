    \ NULL )\n    {\n        node* p_new_tree = new node;\n        p_new_tree->p_left\
    \ = NULL;\n        p_new_tree->p_right = NULL;\n        p_new_tree->key_value\
    \ = key;\n        return p_new_tree;\n    }\n    // decide – left subtree or right\
    \ subtree for the insertion\n    // depending on the what the node value is\n\
    \    if( key < p_tree->key_value )\n    {\n        // build a new tree from p_tree->left,\
