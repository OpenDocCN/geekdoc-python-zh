    \nwhile 循环会迭代执行一块代码，直到为 while 循环指定的条件为真。一旦该条件不满足，while 循环就会停止。\n\nfor 循环允许程序员在同一个结构中操作条件和循环变量。因此，你可以初始化一个循环变量，对其进行递增/递减，并在此变量满足某个条件之前一直运行循环。\n\
