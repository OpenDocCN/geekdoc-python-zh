    Java variables can be declared without any value at the start; in cases such as
    these, Java chooses to declare these variables with a particular default value,
    for example:


    ```

    Byte a;

    Short num;

    Boolean answer;

    ```


    Will result in the values 0, 0, and false, respectively. A more complete list
    of default values is as follows: the byte, short, int, and long data types will
    all result in a default value of 0, while the float and double data types will
    have a default 0.0 value, the char data type will result in ‘\u0000’ value, a
    string or any other object will have a null default value, and all Booleans will
    begin with a false default value.


    In Java, variables are static when declared, meaning that the programmer must
    define the data type that the variable will be containing. To illustrate, if we
    wish to use a variable num to store a number, we would first have to declare the
    variable: "int num," before we can assign a value, such as "num = 10."


    The process above is usually known as and referred to as an "assignment statement,"
    where a value is assigned to the variable as declared by the programmer. However,
    one prominent thing about how Java, and in fact how most programming languages,
    works is that in the assignment statement, such as in our example of num = 10,
    the actual value stored is the one on the right side of the equals sign, the value
    of 10, and num is just the "marker" to call that stored value. This is why there
    are many Java programmers that tend to prefer the jargon of "getting" a value
    rather than "assigning," though for the most part, they may be employed interchangeably,
    and outside of some rare scenario, function mostly the same way.


    Note, however, that once values have been assigned to variables, functions need
    to be carried out in order for the data inside that variable to change its data
    type.


    # Naming a variable'
  - '[PAGE 99]


    Creating variables is an easy task, especially given how Java programmers tend
    to create and name them after the data type or the purpose of what the variable
    will store. However, there are a few rules when it comes to naming these variables,
    else Java will not recognize it, and an error message will result. The main restrictions
    around variable names are that it should not begin with a special character, such
    as an underscore or a number. However, variable names can consist of characters
    such as letters and numbers, and even an underscore, provided that the underscore
    is not placed at the start. No other characters may be used, such as the # or
    even $, as these special characters have different uses in Java, and thus will
    not be recognized in a variable name.


    While those are the major rules, here are some tips when it comes to naming variables.
    The variable name should be descriptive, as in longer codes it may be difficult
    to recall just what "x" is for. Having a variable name such as "count" or "output"
    is much easier to recall as compared to having a generic "x" or "y" and will help
    in avoiding confusion. In addition to being descriptive, variables will also be
    easier to use if their names are kept fairly short. While having a variable name
    such as banking information account records is very descriptive, typing it repeatedly
    as needed in the program will get exhausting, and having longer variable names
    increase the chances of typographical errors, which will lead to bugs in the code,
    resulting in a run - time error or the code not working as intended, or working,
    but introducing bugs along the way. Note as well that it has always been a practice
    for Java variables to be written in all lower—case letters, and while there is
    no restriction on capitalization, keeping things in lowercase simplifies things,
    as a missed capitalization may result in the variable not being recognized, as
    Java reads an upper—case letter as an entirely different character versus a lower—case
    letter.


    # Java primitive types


    # Method Naming Conventions


    We shall revisit the naming conventions in Java since you will be using member
    methods. Methods in Java programming perform operations, they also receive any
    argument provided by a caller, and it can also return a result of an operation
    to a caller. Here’s the syntax for declaring a method:'
