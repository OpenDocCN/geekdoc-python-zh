    \n```\nIn []: dict1[\"key4\"] = value4\n```\n\nYou can also delete a key (and\
    \ the associated value) in a dictionary:\n\n```\nIn []: del dict1[\"cle4\"]\n\
    ```\n\nAs soon as you are more experienced in Python, you will use more dictionaries.\
