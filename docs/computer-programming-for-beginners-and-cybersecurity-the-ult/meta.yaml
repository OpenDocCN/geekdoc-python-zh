    # 第三章：提高你的安全性


    ## 保护无线网络


    因此，人们学习如何保护他们的无线网络至关重要，以确保他们的机密信息不会落入错误的人手中。本章将简要介绍如何保护个人无线网络以及如何操作。在大多数示例中，将使用
    NETGEAR 路由器。如果用户使用不同的路由器，请记住有些事情会有所不同。


    ## 加密


    让我们从讨论基本加密开始。加密，当涉及通过网络的数据移动时，是将明文转换为混乱字符混合的过程。这降低了通过加密网络发送的信息被用于恶意目的的可能性。至于涉及无线路由器的加密，它是每次输入正确的登录凭据时生成加密身份验证密钥的过程，从而允许访问网络。更简单地说，每次用户登录到安全路由器时，都会生成一个唯一的密钥，该密钥允许访问该互联网连接。


    ## WPA


    Wi-Fi 保护访问或 WPA 是一种旨在取代 WEP 安全性的安全工具。有两种类型：WPA 和 WPA2。区别在于 WPA2 是 WPA 的更新、更安全的版本。每当用户必须登录无线网络时，无论是在家里还是在学校，他们很可能登录的是
    WPA/WPA2 加密网络。这些安全功能通过检查输入的登录凭据是否正确来工作，如果正确，则会生成该特定登录的唯一加密身份验证密钥。一旦生成此密钥，相应的网络就会对其进行检查，假设登录凭据匹配，则允许开始数据传输。现在我们已经了解了
    WPA 加密的基础知识，我们将讨论一些可以采取的基本步骤来保护个人无线网络。


    ## 无线路由器凭据


    当无线路由器首次设置时，更改默认登录凭据非常重要。大多数个人无线路由器都带有标准的登录用户名和密码，例如：


    用户名：admin

    密码：password


    黑客知道这些默认登录凭据，这意味着立即更改它们至关重要。使用包含大小写字母组合的长密码将为用户提供可靠的安全凭据。


    ## 服务集标识符


    服务集标识符（SSID）是指无线网络名称的计算机语言。例如，亚利桑那大学的无线网络被称为“UAWifi”。将个人网络的名称从默认值更改非常重要，因为黑客可能会针对具有默认名称的无线网络，认为它不太安全。为了进一步提高安全性，可以关闭
    SSID 广播。这意味着网络对外部人员将不可见。它仍然存在，如果搜索特定的 SSID，可以找到它。但是，任何扫描要连接的网络的人都将无法看到这个隐藏的网络。当你的邻居试图访问你的个人网络时，这尤其有用。


    ## 媒体访问控制


    媒体访问控制（MAC）是一组用于标识特定设备的数字。每个设备，无论是计算机、平板电脑还是手机，都有一个唯一的 MAC 地址。为了更好地保护网络，可以将路由器设置为仅允许特定的
    MAC 地址连接到该网络。这通过仅允许特定设备连接，为你的网络增加了另一层安全性。'
