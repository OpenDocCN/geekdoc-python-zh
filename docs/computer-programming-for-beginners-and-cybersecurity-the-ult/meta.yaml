    \n## 字符串——字符列表\n\nPython中的字符串默认（自Python 3起）以Unicode编码。你可以通过三种方式声明一个字符串：\n\n```\n\
    string1 = \"Python for the data scientist\"\nstring2 = 'Python for the data scientist'\n\
