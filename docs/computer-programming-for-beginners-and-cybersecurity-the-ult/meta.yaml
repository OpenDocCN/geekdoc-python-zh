    \ -> s1.forEachRemaining(finder));\n        Thread t2 = new Thread(() -> s2.forEachRemaining(finder));\n\
    \n        t1.start();\n        t2.start();\n        t1.join();\n        t2.join();\n\
    \    }\n\n    return booleanHolder.isFound;\n}\n\nprivate static class BooleanHolder\
