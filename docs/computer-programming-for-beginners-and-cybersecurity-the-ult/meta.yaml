    ```\n\n## 在字符串中使用变量\n\n在某些情况下，你可能决定使用一个变量，该变量包含一个字符串值。例如，你可能想使用两个变量分别保存一个人的名字和姓氏。此外，这两个变量必须组合起来才能产生这个人的全名。让我们看看在\
    \ Python 中如何实现这一点。\n\n```\nfirst_name = \"johnson\"\nlast_name = \"boris\"\nfull_name\
    \ = f\"{first_name} {last_name}\"\nprint(full_name)\n```\n\n如果你想将变量值插入字符串，你必须在开头的引号前直接添加字母\
    \ \"f\"。\n\n考虑下面的代码：\n\n```\nstate = 'United Nation!' #将变量 \"state\" 赋值为字符串 'New\
