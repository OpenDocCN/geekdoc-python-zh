  md: "percent of the entire tree and, when you search the tree for a value, the search\
    \ can eliminate 50 percent of the results each time it gets to a child node. So,\
    \ if you had a tree of 1000 elements, 500 would be immediately eliminated. Search\
    \ that tree again (it only has 50 elements now), and you can cut it by about 50\
    \ percent again. That way it doesn’t take long to find the value you want.\n\n\
    So, how many times must a tree be subdivided before you get to one element? The\
    \ answer to that is log2n (n is the number of elements the tree has). This is\
    \ a small value, even if your tree is large—if your tree had, say, 32 billion\
    \ elements, the value would be 32; almost 100 million times faster than a search\
    \ of a linked list of four billion elements, where every single one has to be\
    \ assessed.\n\nIf the tree isn’t balanced, you won’t be able to eliminate roughly\
    \ half of the elements; worst case, each node only has one child and that makes\
    \ the tree nothing more than a linked list with a few extra pointers, thus requiring\
    \ you to search all elements.\n\nSo, when a tree is balanced approximately, it’s\
    \ much faster and easier to search for nodes than the same search on a linked\
