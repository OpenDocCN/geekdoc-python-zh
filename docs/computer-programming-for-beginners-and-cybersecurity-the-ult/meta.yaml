- md: "## Stack\n\nStack is a special kind of data structure that follows the Last-In-First-Out\
    \ (LIFO) strategy. This means that the element that is added last will be the\
    \ first to be removed.\n\nThe various applications of the stack are:\n\n- Recursion:\
    \ recursive calls are implemented using system stack.\n- Postfix evaluation of\
    \ the expression.\n- Backtracking implemented using stack.\n- Depth-first search\
    \ of trees and graphs.\n- Converting a decimal number into a binary number etc.\n\
    \n## Stack ADT Operations\n\n- Push(k): Adds value k to the top of the stack.\n\
    - Pop(): Remove element from the top of the stack and return its value.\n- Top():\
    \ Returns the value of the element at the top of the stack.\n- Size(): Returns\
    \ the number of elements in the stack.\n- IsEmpty(): determines whether the stack\
    \ is empty. It returns true if the stack is empty otherwise return false.\n\n\
    Note: All the above stack operations are implemented in O(1) Time Complexity.\n\
    \n## Stack implementation in JAVA Collection\n\nThe stack is implemented by calling\
    \ push and pop methods of Stack <T> class.\n\nExample:\n\n```java\npublic class\
    \ StackDemo {\n    public static void main(String[] args) {\n        Stack<Integer>\
    \ stack = new Stack<Integer>();\n        int temp;\n        stack.push(1);\n \
    \       stack.push(2);\n        stack.push(3);\n        System.out.println(\"\
    Stack : \"+stack);\n        System.out.println(\"Stack size : \"+stack.size());\n\
    \        System.out.println(\"Stack pop : \"+stack.pop());\n        System.out.println(\"\
    Stack top : \"+stack.peek());\n        System.out.println(\"Stack isEmpty : \"\
    +stack.isEmpty());\n    }\n}\n```\n\nOutput:\n\nStack : [1, 2, 3]\n\nStack size\
    \ : 3\n\nStack pop : 3\n\nStack top : 2\n\nStack isEmpty : false\n\nStack is also\
    \ implemented by calling push and pop methods of ArrayDeque<T> class.\n\nJDK provides\
    \ both ArrayDeque<T> and Stack<T>. We can use both of these classes. But there\
    \ are some advantages of ArrayDeque<T>.\n\n- First reason is that Stack<T> does\
    \ not drive from Collection interface.\n- Second Stack<T> drives from Vector<T>\
    \ so random access is possible, so it brakes abstraction of a stack.\n- Third\
    \ ArrayDeque is more efficient as compared to Stack<T>.\n\n## Queue\n\nA queue\
    \ is a First-In-First-Out (FIFO) kind of data structure. The element that is added\
    \ to the queue first will be the first to be removed, and so on.\n\nQueue has\
    \ the following application uses:\n\n- Access to shared resources (e.g., printer)\n\
    - Multiprogramming\n- Message queue\n- BFS, breadth-first traversal of graph or\
    \ tree are implemented using queue.\n\nQueue ADT Operations:\n\n- Add(K): Adds\
    \ a new element k to the back of the queue.\n- Remove(): Removes an element from\
    \ the front of the queue and return its value.\n- Front(): Returns the value of\
    \ the element at the front of the queue.\n- Size(): Returns the number of elements\
    \ inside the queue.\n- IsEmpty(): Returns 1 if the queue is empty otherwise returns\
    \ 0.\n\nNote: All the above queue operations are implemented in O(1) Time Complexity.\n\
    \n## Queue implementation in JAVA Collection\n\nArrayDeque<T> is the class implementation\
    \ of a doubly ended queue. If we use add(), remove() and peek () it will behave\
    \ like a queue. (Moreover, if we use push(), pop(), and peekLast() it behave like\
    \ a stack.)\n\nExample:\n\n```java\nimport java.util.ArrayDeque;\n\npublic class\
    \ QueueDemo {\n    public static void main(String[] args) {\n        ArrayDeque<Integer>\
    \ que = new ArrayDeque<Integer>();\n        que.add(1);\n        que.add(2);\n\
    \        que.add(3);\n        System.out.println(\"Queue : \"+que);\n        System.out.println(\"\
    Queue size : \"+que.size());\n        System.out.println(\"Queue peek : \"+que.peek());\n\
    \        System.out.println(\"Queue remove : \"+que.remove());\n        System.out.println(\"\
    Queue isEmpty : \"+que.isEmpty());\n    }\n}\n```\n\nOutput:\n\nQueue : [1, 2,\
    \ 3]\n\nQueue size : 3\n\nQueue peek : 1\n\nQueue remove : 1\n\nQueue isEmpty\
    \ : false\n\n# CHAPTER 10: File Handling\n\nThis chapter discusses the details\
    \ of reading, writing, creating, and opening files. There are a wide array of\
    \ file I/O classes and methods to choose from.\n\n## Reading a text File\n\nReading\
    \ a text file is a crucial ability in Java and has many practical applications.\
    \ FileReader, BufferedReader, and Scanner are useful classes for reading a plain\
    \ text file in Java. Each of them possess specific qualities that make them uniquely\
    \ qualified to handle certain situations.\n\n## BufferedReader\n\nThis technique\
    \ reads text from a stream of character input. It buffers characters, arrays,\
    \ and rows to be read efficiently. You can specify the buffer type or use the\
    \ standard type. For most reasons, the default is big enough. In particular, each\
    \ read application produced from a Reader leads the fundamental personality or\
    \ byte stream to make a respective read application. Therefore, it is advisable\
    \ to wrap a BufferedReader around any Reader whose read() transactions, like FileReaders\
    \ and InputStreamReader, can be expensive.\n\nFor example:\n\n```java\nBufferedReader\
