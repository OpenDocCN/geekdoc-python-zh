    # Defining a Class in Python


    Below is a simple class definition in Python:'
  - '[PAGE 56]


    +   - Class Dog (object)

    - Pass


    When defining a class in Python, you begin with the class keyword to show that
    you’re writing a class, then you follow it with the name of the class. In the
    above example, Dog is the name of the class. The above class definition has the
    Python keyword pass; this is normally used as a placeholder where code will finally
    go. Why this keyword has been used is to avoid the code from throwing an error.


    The object section enclosed in parentheses demonstrates the parent class that
    you’re inheriting from. But this is no longer required in Python 3 because it’s
    the implicit default.


    # Objects Attributes


    All classes define objects, and all objects have properties known as attributes.
    The _init_ () method is used to specify an object’s original properties by outlining
    their default value. This method requires at least one argument as the self-variable,
    which describes the object itself.


    ![](img/a8d6ec92209e49212ed71a37263c49f8_56_0.png)


    In the following example, each dog has a unique name and age, which is critical
    to know, especially when you begin to define different dogs. Don’t forget that
    the class is only defining the Dog, and not creating objects of individual dogs
    with unique names and ages.


    Similarly, the self-variable also belongs to an instance of the class. Because
    class instance has different values, you can write Dog.name = name instead of
    self.name = name.'
