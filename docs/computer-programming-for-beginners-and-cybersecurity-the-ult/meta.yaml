    ```\nIn []: for i, a in enumerate(country_list):\n           print(i, a)\n```\n\
    \n```\n0 Switzerland\n1 Spain\n2 France\n3 United States\n4 India\n5 China\n```\n\
    \nThe `zip` function will allow linking many lists and simultaneously iterating\
