    \n```\nIn []: print(string1[:6])\n       print(string1[-14:])\n       print(string1[3:20])\n\
    ```\n\n## 面向数据科学家的Python\n\n数据字符串可以轻松转换为列表：\n\n```\nIn []: # 我们使用空格分隔元素\n    \
    \   list1 = string1.split()\n       print(list1)\n       ['Python', 'for', 'the',\
    \ 'Data', 'Scientist']\nIn []: # 我们用空格连接元素\n       string1bis = \"\".join(list1)\n\
    \       print(string1bis)\n```\n\n## 字典\n\n字典构成了Python中需要掌握的第三个核心结构。它们允许键值存储。到目前为止，我们使用的是基于数字索引的项目。因此，在列表中，你使用其位置\
    \ `list1[0]` 访问元素。在字典中，我们将使用创建字典时定义的键来访问元素。我们用花括号定义字典：\n\n```\ndict1 = {\"cle1\"\
    : value1, \"cle2\": value2, \"cle3\": value3}\n```\n\n这种结构不要求值具有任何类型同质性。因此，我们可以有一个像\
    \ `value1` 这样的列表，一个像 `value2` 这样的布尔值，以及一个像 `value3` 这样的整数。\n\n要访问字典的元素，我们使用：\n\
    \n```\nIn []: dict1[\"cle2\"]\nOut []: value2\n```\n\n要显示字典的所有键，我们使用：\n\n```\n\
    In []: dict1.keys()\nOut []: (\"cle1\", \"cle2\", \"cle3\")\n```\n\n要显示字典的所有值，我们使用：\n\
