    ;\n    sort(data.begin(), data.end());\n    cout << \" After the iterator has\
    \ passed through sort(): \\n\\t( \";\n    for(auto element: data)\n        cout\
    \ << element << \"; \";\n    cout << \")\\n\\n Step.2 Move the adjacent repeated\
    \ elements to the left hand side:\\n\";\n    auto my_unique = unique(data.begin(),\
    \ data.end());\n    cout << \" After the iterator has passed through unique():\
    \ \\n\\t( \";\n    for(auto element: data)\n        cout << element << \"; \"\
    ;\n    /*\n    The function unique() has returned an iterator to the identifier\
    \ \"my_unique\" starting from which the repeated elements are pushed up to one\
