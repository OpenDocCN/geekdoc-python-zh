    ## CHAPTER 6: Malware


    Let''s imagine a scenario where a client presents a file, and they are unsure
    if it''s malware and what capabilities it has.


    ### Where does this malware fit in the kill chain?


    Is it the initial patient zero machine that will go online and download more malware
    code? What is this malware''s specimen capability?


    Understanding what the malware is capable of is one of the main purposes of malware
    analysis or reverse engineering. You also have to ask: What is the attacker''s
    intention?


    If it''s malware specifically for ransom, they are trying to encrypt for files
    and ask for money. If its purpose is to install other stolen PI data, then its
    intention is larger than just quick financial gain. Knowing the intention of the
    attacker helps you understand where else this malware is infecting your environment.


    ### Types of Malware


    Malware is a very general category, and there are few subtypes within it:


    #### Ransomware


    This malware is designed to freeze files and, as the name suggests, demand ransom
    from its victims in exchange for releasing the data; successful attackers realized
    that they could take it a step further by demanding money but not releasing the
    data. Instead, attackers demand another payment, and the cycle continues.


    Paying up might seem like the only solution to dealing with ransomware, but the
    fact is, once you pay, the attackers will keep asking for more.


    #### Adware


    This is software that downloads, gathers, and presents unwanted ads or data while
    redirecting searches to certain websites.


    #### Bots


    Bots are automatic scripts that take command of your system. Your computer is
    used as a "zombie" to carry out attacks online. Most of the time, you are not
    aware that your computer is carrying out these attacks.


    #### Rootkits


    When a system is compromised, rootkits are designed to hide the fact that you
    have malware. Rootkits enable malware to operate in the open by imitating normal
    files.


    #### Spyware


    Spyware transmits data from the hard drive without the target knowing about the
    information theft.


    #### Remote Access Tool (RAT)


    After your system is compromised, RAT helps attackers remain in your systems and
    networks. RAT helps criminals to obtain your keystrokes, take photos with your
    camera, and/or expand to other machines. One of the most dominant features of
    this type permits the malware to transfer all of this information from the victim
    to the attacker in a protected way, so you are not even conscious you are being
    spied on.


    #### Viruses


    A virus pushes a copy of itself into a device and becomes a part of another computer
    program. It can spread between computers, leaving infections as it travels.


    #### Worms


    Similar to viruses, worms self-replicate, but they don''t need a host program
    or human to propagate. Worms utilize a vulnerability in the target system or make
    use of social engineering to fool users into executing the program.


    ## CHAPTER 7: Cyber Attacks


    ### Web Attacks


    #### SQL Injection


    SQL injection is also called SQLI. SQL injection is a particular type of attack
    which uses malicious code for manipulating backend databases to attain data that
    was not wished-for display. Such data may consist of various items such as private
    customer details, private data of the company, and user lists.


    SQLI can cause destructive effects on a business. An effective SQLI attack can
    result in the deletion of complete tables, unsanctioned inspecting of user lists,
    and in few cases, the attacker can attain administrative access to a database,
    making it extremely destructive for a business. While calculating the expected
    price of SQLI, we must take into consideration the loss of customer faith in personal
    case information of the customer, such as details of credit card details, addresses,
    and phone numbers are stolen. Even though SQLI can be employed to attack any SQL
    database, the criminals frequently target websites.


    #### Cross-Site Scripting


    Cross-site scripting (abbreviated as XSS) is a type of injection breach where
    the criminal transmits malign code into content from otherwise trustworthy websites.
    Such incidents take place when an uncertain source is permitted to attach its
    own (malign) code into different web applications, making the malign code bundled
    together with other content, which is then directed to the browser of the victim.


    Attackers normally send malign code in the form of fragments of the JavaScript
    code implemented by the browser of the victim. The exploits consist of malign
    executable scripts in various languages such as HTML, Java, Flash, and Ajax. Cross-site
    scripting attacks can be extremely destructive; nonetheless, dealing with susceptibilities
    enabling such attacks is comparatively simple.


    #### Distributed Denial-of-Service (DDoS) Attack


    The aim of Denial-of-service (DDoS) is to shut down a service or network, making
    it unreachable to its intended users. The attackers attain their aim through crushing
    the victim with the traffic load or else flooding it with data, which activates
    a crash. In both circumstances, the DoS attack denies genuine users like account
    holders, and company employees.


    The targets of DDoS attacks are often web servers of prestigious organizations
    like government and trade organizations, commerce, media companies, and banking.
    Even though such attacks don’t lead to theft or loss of crucial data or other
    assets, still such attacks can cost the target loads of time and money to mitigate.
    DDoS is frequently employed in combination to divert from attacks of another network.


    #### Password Attack


    A password attack is an effort to obtain or else decrypt the password of the user
    with maligned intentions. Different techniques are used by crackers such as dictionary
    attacks, password sniffers, and cracking programs in password attacks. Even though
    there are some defense mechanisms against such attacks, however normally, the
    method used is to inculcate a password policy which comprises a minimum length,
    distorted words, and frequent alterations.


    The recovery of the password is generally carried out by the continual guessing
    of the password by using a computer algorithm. The computer repeatedly tries various
    combinations until the successful discovery of the password.


    #### Eavesdropping Attack


    These attacks initiate with the interference of network traffic. Another term
    used for Eavesdropping breach is sniffing or snooping. It is a type of a network
    security attack where the attacker attempts to steal the data sent or received
    by computers, smartphones, or other digital devices.'
