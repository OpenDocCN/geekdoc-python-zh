    \n## 图 链表\n\n在上表中，你可以看到每个盒子都有一个编号。你可能会猜这些编号是解开谜题的关键。第一个盒子里有字母 T，正面写着数字 5。取出写有字母\
    \ T 的卡片放在一边。数字 5 可能指向下一个字母。数盒子，第五个盒子里有字母 ‘E’。取出写有 ‘E’ 的卡片放在 T 旁边，你会得到 \"TE\"。装有字母\
    \ ‘E’ 的盒子侧面写着数字 2。所以，取出第 2 个盒子里的卡片放在 \"TE\" 旁边，你会得到 \"TEC\"。\n\n装有字母 ‘C’ 的盒子写着数字\
    \ 10，所以取出第 10 个盒子里的卡片，你会得到 \"TECH\"。装有字母 ‘H’ 的盒子写着数字 4，所以取出第 4 个盒子里的卡片，你会得到 \"\
    TECHN\"。继续按照数字找下去，你会得到整个单词：TECHNOLOGY。\n\n这就是链表的工作原理。它由节点组成。每个节点至少有一个变量用于存储数据（文本、数字或对象），还有一个变量（指针）用于存储下一个节点的地址。这个系统就像你在谜题中做的那样遍历节点列表。最后一个节点的指针值为\
    \ null，或者它可能指向第一个节点，这样我们就得到了一个循环链表。\n\n## 添加节点\n\n如果你想在链表末尾添加一个新节点，你需要创建一个新节点。然后将最后一个节点的指针指向新节点的地址，并将新节点的指针赋值为\
    \ null。\n\n![](img/a8d6ec92209e49212ed71a37263c49f8_215_0.png)\n\n图 在链表末尾添加节点。\n\
    \n如果你想在链表开头添加一个新节点，你需要创建一个新节点。将新节点的指针指向第一个节点，就这样。\n\n![](img/a8d6ec92209e49212ed71a37263c49f8_215_1.png)\n\
    \n图 在链表头部添加节点。\n\n如果你需要在链表中间添加一个节点，你需要创建一个新节点，然后断开链条：将断点前的节点重定向到新节点，并将新节点的指针指向断点后的下一个节点。\n\
    \n![](img/a8d6ec92209e49212ed71a37263c49f8_215_2.png)\n\n图 在链表中间添加节点。\n\n## 删除节点\n\
    \n要删除具有特定键的节点，你需要遍历列表直到找到该键。然后将键节点赋值给临时节点。接着将键节点前的节点指向键节点后的节点。参见图 60。结果，临时键节点就从列表中孤立出来了。现在你可以删除临时节点。\n\
    \n![](img/a8d6ec92209e49212ed71a37263c49f8_216_0.png)\n\n图 删除节点。\n\n下面是 Node 类的代码。为简单起见，我创建了一个存储整数和指向下一个节点的节点指针的节点。两个类成员变量都声明为私有。不使用全局变量是良好的编程实践，因为私有成员在类外部不可见。我们仍然需要设置和读取这些私有成员变量。公共函数\
    \ set 和 get 将完成这项工作。\n\n## 第三章：二叉树\n\n二叉树是所有基本数据结构中最有用的之一，也是迄今为止最有趣的。它们是递归和指针如何用于完成一些非常有用任务的完美示例。\n\
    \n创建事物列表的最佳技术之一是链表，但在列表中查找元素可能需要一些时间。而且，如果你有大量非结构化数据，数组也帮不上多大忙。你可以尝试对数组进行排序，但即便如此，向其中插入项目仍然很困难。如果你想保持数组有序，插入新元素将需要大量调整！尽可能快地在列表中查找事物非常重要，尤其是在以下场景中：\n\
    \n- 你正在构建一个 MMORPG 游戏，玩家需要能够快速登录——这涉及快速查找玩家\n- 你正在构建处理信用卡的软件，每小时需要处理数百万笔交易——需要非常快速地找到信用卡余额\n\
    - 你正在使用低功耗设备，如平板电脑或智能手机，并向用户显示通讯录。你不希望用户因为你的数据结构缓慢而一直等待。\n\n本节将讨论克服这些问题所需的工具以及更多内容。\n\
    \n解决方案的想法是能够像链表一样将元素存储在结构中，使用指针帮助组织内存，但比链表更简单。这样做要求内存具有比简单列表更多的结构。\n\n那么，组织数据意味着什么？当我们开始这段旅程时，我们只有数组，但这些数组从未真正给我们提供除顺序列表之外使用数据结构的能力。链表使用指针逐步增长顺序列表，但没有利用指针的灵活性来构建更复杂的结构。\n\
    \n内存中这些更复杂的结构是什么？在任何给定时间持有多个“下一个节点”的结构就是一个很好的例子。但为什么你会想要这个？很简单。如果你有两个“下一个节点”，一个可以用来表示比当前元素更大的元素。这被称为二叉树。\n\
    \n它们之所以得名，是因为每个节点总有一个或两个分支。每个下一个节点都是子节点，链接到子节点的节点是父节点。\n\n二叉树可能看起来像这样：\n\n```\n\
    10\n\n6 14\n\n5 8 11 18\n```\n\n在树中，每个元素的左子节点小于该元素，右子节点大于该元素。10 是整棵树的父节点，6 和 14\
    \ 的子节点都是各自小树的父节点，称为子树。\n\n二叉树有一个非常重要的特性：每个子节点都是一棵完整的树。结合左子节点较小、右子节点较大的规则，你就有了一个定义算法来定位树中特定节点的简单方法。\n\
    \n首先，查看当前节点值。如果它等于搜索目标，就完成了。如果它大于搜索目标，向左走；否则，向右走。这之所以有效，是因为树中每个节点左侧的值都小于当前节点值，右侧的值都大于当前节点值。\n\
    \n在理想情况下，你的二叉树将是平衡的，两侧的节点数量完全相同。在这种情况下，每个子树大约占整棵树的 50%，当你搜索树中的值时，每次到达子节点时都可以消除\
    \ 50% 的结果。所以，如果你有一棵包含 1000 个元素的树，500 个元素会被立即排除。再次搜索该树（现在只有 500 个元素），你可以再次减少大约\
    \ 50%。这样，找到你想要的值就不需要很长时间了。\n\n那么，一棵树需要细分多少次才能到达一个元素？答案是 log2n（n 是树中元素的数量）。即使你的树很大，这也是一个很小的值——如果你的树有，比如说，320\
    \ 亿个元素，这个值将是 32；这比搜索包含 40 亿个元素的链表快了近 1 亿倍，因为链表中的每个元素都必须被评估。\n\n如果树不平衡，你将无法消除大约一半的元素；最坏的情况下，每个节点只有一个子节点，这使得树只不过是一个带有一些额外指针的链表，因此需要你搜索所有元素。\n\
    \n所以，当一棵树大致平衡时，搜索节点比在链表上进行相同的搜索要快得多，也容易得多。这是因为你可以按照你想要的方式组织内存。\n\n## 实现二叉树\n\n\
    要实现二叉树，首先声明节点结构：\n\n```\nStruct node\n{\n    int key_value;\n    node *p_left;\n\
    \    node *p_right;\n};\n```\n\n节点可以存储简单的整数值 key_value，并有两个子树——p_left 和 p_right。"
