    may not seem like much, but it represents a massive increase from the two-cent
    value of a printed W-2 decades ago. Stealing even a single W-2 makes sense when
    attackers operate from a country where $20 is a full day’s wages. Stealing them
    by the hundreds or thousands using automated attacks against scores of unsuspecting
    and unprepared small businesses makes even more sense for criminals anywhere in
    the world.


    Having established why hackers are coming for your data, let’s look at the damage
    done when they strike. Continuing with the W-2 theft example, state and federal
    laws require employers to report cyber theft, also known as a data breach. Failing
    to disclose the breach opens the door to class-action lawsuits where juries can
    award unlimited damages to victims due to your negligence. Disclosing the breach
    helps shield you and the organization from claims of negligence and, in some cases,
    will prevent class-action suits. However, the organization will not be off the
    hook completely. Defending a non-class action lawsuit will cost tens of thousands
    of dollars, even if you win.


    Additional costs include losses the employee will suffer if their identity is
    used to open credit in their name, drain their bank accounts, etc. Worse, the
    threat of identity theft will follow them forever. Related, indirect costs to
    the employer include replacing the employee if he or she quits and a reduction
    in morale among peer employees. It may become harder and more expensive to hire
    good talent, and customers hearing of the breach may look at competitors they
    believe are more vigilant.'
