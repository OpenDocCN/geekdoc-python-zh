    # Modifiers


    Modifiers are keywords that alter the meaning of the definitions in your code.
    Java provides several modifiers.


    # Access Modifiers


    The access modifiers are used to define access levels for methods, variables,
    classes, and constructors.


    # Private—only accessible within the class


    When a method, variable, class, or constructor is declared private, it means that
    it is only available within the class. If the class, however, has public getter
    methods, you may be able to access a private variable outside the class. The private
    keyword indicates the highest access restriction. Take note that you cannot declare
    interfaces and class as private.


    # Public—accessible to the world


    A method, interface, constructor, class, etc. that has been defined as public
    may be accessed from other classes. Similarly, blocks, methods, or fields that
    have been defined inside a public class may be accessed from Java class. This
    is true as long as they are in the same package. If you want to access a public
    class from another package, you will have to import the public class. Under the
    class inheritance concept, subclasses inherit all public variables and methods
    of a class.


    Take note that an application’s main() method will have to be declared public
    before the Java interpreter can call it to run the class.


    # Protected—accessible to all subclasses and package


    Declaring a method, variable, or constructor as protected in a superclass makes
    it accessible only to classes within its package or to its subclasses in another
    package. This access type is used if you want to allow the subclass to use variable
    or helper methods and prevent non-related classes from using them. Interfaces,
    as well as the fields and methods under them, should not be'
