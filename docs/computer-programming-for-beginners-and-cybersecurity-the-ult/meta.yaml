    # What does it mean to be an ethical hacker?


    All the things we mentioned earlier in this chapter referred to hackers in'
  - '[PAGE 359]


    general. The real goal, however, is to learn how to be an ethical hacker and explore
    the skills you should have.


    Ethical hackers are people who are usually employed by organizations to test their
    security. They usually work through direct employment or through temporary contracts.
    The key is that they use the same skills as all other hackers, but there is one
    big difference: they are allowed to attack the system directly from the system
    owner. In addition, an ethical hacker means that you reveal the weaknesses of
    the system you have evaluated (because every system in the world has them) only
    to the owner and no one else. In addition, organizations or individuals hiring
    ethical hackers use very strict contracts that specify which parts of the system
    are authorized for an attack and which are prohibited. The role of an ethical
    hacker also depends on the job to which he or she is entitled, i.e., the needs
    of the employer. Today, some organizations have permanent staff teams, and their
    job is to conduct ethical hacking activities.


    Hackers can be divided into 5 categories. Keep in mind that this format may vary,
    but we can say these are the most common:


    +   - The first category is also referred to as "Script Kiddies." These hackers
    usually have no training or do, but very limited. They know how to use just some
    of the basic hacking tools and techniques, and since they are not competent enough,
    they may sometimes not fully understand their activities or the consequences of
    their work.

    - The second category concerns hackers known as "White Hat hackers." They attack
    the computer system, but they are the good guys, which means they don''t harm
    their work. These types of hackers are usually ethical hackers, but they can also
    be pentesters.

    - "Gray Hat Hackers" are the third hacker category. As their name suggests, they
    are between good and bad, but their final decision is to choose the right side.
    Still, these types of hacker’s struggle to gain trust because they can be suspicious.

    - The fourth category we mention in this section is referred to as'
- md: 'the "Black Hat Hackers." This category refers to the hackers we mentioned earlier
    in this chapter. These people usually work on the ''other side'' of the law and
    are usually associated with criminal activities.


    -   Last but not least are the "Suicide hackers." They are called that because
    their goal is to prove the point, which is why they want to take out their target.
    These hackers don''t have to worry about getting caught, because their goal is
    not to hide, but to prove, so that they are easier to find.


    ## Responsibilities of an Ethical Hacker


    The most important thing that an ethical hacker should learn and never forget
    is that he or she should always have permission for any kind of system attack.
    The ethical code that you, as an ethical hacker, must implement in every task
    says that no network or system should be tested or targeted if you do not own
    it or if you do not have permission to do so. Otherwise, you may be found guilty
    of multiple crimes that may have occurred in the meantime. First, it can hurt
    your career, and second, if it''s something really serious, it can even threaten
    your freedom.


    The smartest thing is to get a contract from your employer the moment you test
    or attack the required target. The contract is a written authorization, but you
    should keep in mind that you should only examine the parts of the system specified
    in that contract. So, if your employer wants to give you permission to hack additional
    parts of the system or remove authorization for some, he should first change the
    contract and you shouldn''t continue working until you get the new permit. Note
    that the only thing that distinguishes an ethical hacker from the cybercriminal
    is the contract. Therefore, you should always pay special attention to the vocabulary
    related to privacy and confidentiality issues, as it often happens that you come
    across intimate information from your client, both business and personal.


    That''s one more reason why your contract should include who you can talk to about
    the things you found while researching the system and who are forbidden from hearing
    updates from you. In general, customers usually want to be the only people who
    know everything you eventually find out.


    An organization known as the EC Council (International Council of Electronic Commerce
    Consultants) is one of the most important organizations when it comes to regulating
    these issues. According to them, an ethical hacker should keep all information
    obtained on the job private and treat it as confidential. This is indicated in
    particular for the customer''s personal information, which means that you are
    not allowed to transfer, give, sell, collect or do any of the customer''s information,
    such as social security number, etc. -mail address, home address, unique identification,
    name, and so on. The only way you can give this type of information to a third
    party is by having written permission from your employer (client).


    While some may argue about the distinction between hackers and ethical hackers,
    the division is quite simple: hackers are separated by their intentions. This
    means that those who plan to harm and use their skills to access data without
    permission are labeled as black hats, while those who work with their client''s
    permission are considered white hat hackers. Naming these two categories of "the
    bad" and "the good" can be controversial, so we''ll try to follow these expressions
    in the following way:


    -   Black hats usually operate outside the law, which means they do not have permission
    from the person called "the customer" to consent to their activities.


    On the contrary, white hats have permission and permission from the person called
    “client,” and they even keep the information they have between client and white
    hats only.


    Gray hats, on the other hand, enter both areas and use both types of action in
    different periods.


    Hacktivists are a category of hackers that we have not mentioned before. They
    belong to the movement known as Hacktivism, which refers to action’s hackers use
    to influence the general public by promoting a particular political agenda. So
    far, hacktivists have been involved with agencies, large companies, and governments.


    ## Hacker Ethics and Code of Conduct


    Like any other profession, hacking has its Code of Conduct that establishes rules
    that can help customers (individuals or organizations) evaluate whether the person
    who interacts with their networks and computer systems is generally reliable.
    The organization that implemented this Code has already been identified and is
    known as the EC Council. Obtaining a CEH reference from the EC Council means that
    you fully understand the expectations you must meet. We''ve provided some parts
    of the code, so make sure you read it and get familiar with it.


    -   Information you gain during your professional work should be kept confidential
    and private (especially personal information)

    -   Unless you have your customer''s permission, you may not give, transfer or
    sell the customer''s home address, name, or other unique identifying information.

    -   You must protect the intellectual property, yours and others, by using skills
    that you have acquired yourself so that all benefits go to the original creator.

    -   Be sure to disclose to authorize personnel any danger that you suspect may
    be from the Internet community, electronic transactions, or other hardware and
    software indicators.

    -   Make sure that the services you provide are within your area of expertise
    so that you work honestly while aware of any limitations that may be a result
    of your education or experience.

    -   You may only work on projects for which you are qualified and carry out tasks
    that match your training, education, and work experience skills.

    -   You must not knowingly use software that has been obtained illegally or has
    been stored unethically.

    -   You may not participate in financial practices that may be considered misleading,
    such as double billing, bribery, etc.

    -   Make sure you use the customer''s property properly, without exceeding the
    limits set in your contract.

    -   You must disclose a potential conflict of interest to all parties involved,
    especially if that conflict cannot be avoided.

    -   Make sure that you manage the entire project you are working on, including
    promotion and risk disclosure activities.


    # CHAPTER 10: Mistakes Made in Cybersecurity


