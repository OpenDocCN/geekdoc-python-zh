    # Securing Mobile Devices


    This chapter will explain the security risks mobile devices face and how to better
    protect your data on mobile phones or tablets.


    # Security risks


    There are three main security risks for mobile devices: physical theft, internet
    theft, and application permissions.


    # Physical theft


    The physical theft of a device can allow a person to access the device and snoop
    through all personal information that was stored.


    That could be anything from passwords, text messages, photos, emails, and so on.


    # Internet theft


    This applies to any data stolen or seen while browsing the internet on a mobile
    device, whether it’s on a wireless network or a mobile carrier service.


    # Application permissions


    This is probably the biggest security threat to mobile device owners for one simple
    reason. People do not read what permissions an application has when downloading
    the app. Business Insider published a recent study which found that in 2017, 90%
    of consumers accepted legal terms and conditions without'
  - '[PAGE 330]


    reading through them. This is where the security risks come into play.


    # The basics


    Listed below are six methods that can be used to better protect mobile device
    security. These are up-to-date operating systems, app privileges, geo-tracking
    awareness, lock screens, Wi-Fi or Bluetooth safety, and internet browsing.


    # Operating systems


    An operating system is the basis of a mobile device that manages all networks
    and Software. For example, Apple uses iOS, while Android uses Android OS. Maintaining
    up-to-date Software for all types of mobile operating systems aid in keeping a
    mobile device safer. As the developers of these operating systems learn of security
    flaws, they are patched, and an update is sent out worldwide. This is one of the
    easiest methods to protect yourself from upcoming malicious Software or security
    weaknesses.


    # Applications


    We all love apps, whether they come from the Apple Store or the Google Play Store,
    but what most people do not know is the information these apps can access via
    a user’s mobile phone. Most people never bother to read the fine print when they
    are downloading the new Candy Crush game or when they’re updating their Instagram
    app. Therefore, phones are incredibly easy targets for hackers.


    Many applications request far too much data from a phone, which may not even be
    related to the app’s actual purpose. For example, in Candy Crush’s license agreement
    under section 10, it clearly states that the developers may use any personal data
    collected in any way that follows their privacy policy. They also go on to state
    that if users link their account to a social media site, they will use all personal
    data available from those sites as well to identify the user.


    # Geo-tracking


    Most mobile device users have absolutely no idea how frequently their locations
    are being pinged and stored in a company’s servers. Many free applications available
    for download in the Apple Store or Google Play Store'
  - '[PAGE 331]


    are not actually free. There is a growing trend among app developers to collect
    your location using your phone or tablet’s GPS system, this is known as geo-tracking.
    This information is gathered in huge quantities and is bought by large business
    entities who utilize this data to study and accurately predict consumer behavior.


    Advertisers are always looking for new ways to capture your attention so that
    you will buy their product. If an app developer collects GPS locations from an
    individual on a daily basis, he or she could look at it and say, “Wow, this person
    seems to drive by a certain store every day.” This app developer then takes this
    information and sells it to the store that the individual in question drives by
    every day so that the individual can be targeted with advertisements. These advertisements
    could come in the form of emails or spam text messages. How can these stores know
    how to direct ads at specific individuals? The answer to this is that more than
    just the individual’s location data can be used for marketing. This app developer
    could have permissions that he or she will gain access to the phone’s personal
    information like contacts, emails, etc. This allows the app developer to not only
    sell an individual’s daily transit routes, as well as the information needed for
    advertisers to reach them specifically.


    # Passwords


    This is one of the easiest methods to protecting data on a mobile phone. A simple
    lock screen password can prevent someone from gaining access to your phone or
    tablet if it is stolen. Think about all the applications, text messages, emails,
    and photos that are on a person’s phone or tablet. Then think about someone being
    able to access all that information without even needing a password.


    # Wi-Fi safety


    To avoid hackers seeing information sent from a user’s mobile device, the user
    needs to be careful when using Wi-Fi. According to Lawyers’ Professional Indemnity
    Company (LAWPRO), here are some tips on how you can do this:


    +   1. First and foremost, only use wireless networks that are known and trusted.
    Avoid public wireless networks altogether, if'
  - '[PAGE 332]


    possible. Public networks are usually not secure, making it easy for someone on
    the same network to pick up the information you sent.


    +   2. If using a public network is a must, login to a Virtual Private Network
    (VPN) to secure the data you are transmitting. A VPN works by sending encrypted
    data through a tunnel that is safe from being accessed by anyone on the same network.

    3. Make sure the network being used is running some form of WPA encryption. Most
    home company networks run WPA2 encryption, unlike public networks which have no
    security at all.

    4. If you’re connected to a network that isn’t your own, make sure that the device
    sharing settings are turned off to avoid unknown devices from connecting with
    yours. This creates a link between devices designed to share data easier. However,
    this is also an effortless way for a hacker to connect to the user’s device.


    # Bluetooth safety


    +   1. Most Bluetooth capable devices are shipped by the manufacturer in unprotected
    mode. Also known as ‘discovery mode.’ This mode allows the device to be seen by
    others, making it easier to connect with.

    2. If you are not using your Bluetooth, make sure to turn it off to avoid any
    connections to other unwanted devices. Turning your Bluetooth off when it’s not
    in use eliminates all chances of an attacker’s device connecting to yours.

    3. If possible, change your device settings, so it requires user confirmation
    before it pairs with another device. This eliminates the possibility of another
    device secretly connecting.

    4. Do not connect to unknown devices. Only pair with devices that are known and
    trusted.

    5. The maximum range of Bluetooth connections can differ based on the power of
    the device itself, and by setting the range to the'
  - '[PAGE 333]


    lowest possible setting, the risk of an attacker reaching the device is reduced.


    # Internet browsing


    +   1. Internet browsing can still be dangerous, even on an iPad. Here are a few
    dos and don’ts from the McAfee Security Advice Center when it comes to surfing
    the web on a mobile device:

    2. Install antivirus software, if possible, to run scans on any downloaded content
    on your device.

    3. Always look at the URL of the web pages you visit. Make sure that you check
    the https security feature.

    4. Fake websites tend to have some errors ranging from the overall look of the
    page to improper grammar.

    5. If the URL of the website you wanted to visit is known, enter it directly to
    avoid any possible fake copies of the website.

    6. Avoid clicking on advertisements as these can lead to malicious websites designed
    to install dangerous Software on your device.'
- md: '## CHAPTER 4: Enhancing Physical Security


    ## Early Detection is the Game Changer


    The Study on Global Megatrends in Cybersecurity, sponsored by Raytheon and independently
    conducted by Ponemon Institute, provides new insights into the most critical cyber-threat
    trends emerging over the next three years through the eyes of those on the frontline
    of cybersecurity.1


    More than 1,110 senior information-technology practitioners around the world were
    surveyed.


    The study revealed key insights and predictions from the expert practitioners
    for the next three years, such as:


    Cyber extortion and data breaches impacting shareholder value will increase.


    - 67 percent said the risk of cyber extortion, such as ransomware, will increase
    in frequency and payout.

    - 60 percent predicted state-sponsored attacks would become even worse.

    - Only 41 percent said their organization would be able to minimize Internet of
    Things (IoT) risks.


    The frequency of cyber extortion, nation-state attacks, and attacks against industrial
    controls were predicted to increase by double-digits.


    - 19 percent said cyber extortion is very frequent today, while 42 percent said
    this threat would be very frequent over the next three years.

    - 26 percent said nation-state attacks are very frequent today, while 45 percent
    said this would be very frequent over the next three years.

    - 40 percent said attacks against industrial controls and supervisory control
    and data acquisition (SCADA) systems are very frequent today, while 54 percent
    said this would be very frequent over the next three years.


    The loss or theft of data from unsecured Internet of Things (IoT) devices is likely
    to happen and is a significant cybersecurity challenge.


    - 82 percent said it is very likely, likely, or somewhat likely that their organization
    will have a loss or theft of data caused by an unsecured IoT device or application.

    - 80 percent said likelihood of a security incident related to an unsecured IoT
    device or application could be catastrophic.


    In summary, Raytheon and Ponemon Institute’s Study on Global Megatrends in Cybersecurity
    provides several predictions from cybersecurity practitioners across the globe,
    who are on the frontline defending against the cyber attackers daily. Among them,
    over the next three years, even with all of the increased spending on cybersecurity:


    - Cyber extortion and data breaches will greatly increase in frequency. This trend
    will largely be driven by sophisticated state-sponsored cyber attackers or organized
    groups.

    - IoT devices, in particular, are very susceptible and will be targets that will
    be exploited.


    So, it is not a question of IF, but WHEN the cyber attackers will break-in. And
    when the cyber attackers break-in, they will remain undetected for many months.


    The median or mean number of days the cyber attackers remain undetected varies
    based on the source. Examples are:


    - Mandiant’s M-Trends Report;

    - Verizon’s Data Breach Investigations Report;

    - IBM and Ponemon Institute’s Cost of a Data Breach Study.


    One thing is certain, however. The cyber attackers are able to hide for many months,
    and the longer it takes to detect the cyber attackers, the more the cost the organization
    ends up suffering.


    Based on a research into dozens and dozens of cases, I have identified signals
    in the Cyber Attack Chain that every organization should understand and look for.
    When researching the cases, it became evident that in each case, the cyber attackers
    took steps that fit into one of the steps as I have outlined in the Cyber Attack
    Chain. It was also clear that in each step, there were signals of the cyber attackers
    at work, but that these signals were not detected by the organization.


    It is time for every organization to understand what the Cyber Attack Signals
    are, and implement them as part of their cybersecurity program. By doing so, they
    will transform the defense into offense and detect the cyber attackers early.
    A Cyber Attack Signal is a high-probability signal of cyber attackers at work,
    trying to hide and avoid detection, while performing one of the tasks in the Cyber
    Attack Chain. They are at work to accomplish their ultimate objective—the theft
    of data or intellectual property (IP) or other compromise, harm, or disruption.
    A Cyber Attack Signal focuses on cyber attackers’ behavior. I have identified
    15 Cyber Attack Signals that, as a minimum, every organization should focus its
    monitoring on. These Top 15 signals relate to cyber attackers’ behavior. They
    are timely signals, before the cyberattack is executed, occurring at the intrusion,
    lateral movement, or command and control steps of the Cyber Attack Chain, and
    are, therefore, of greatest value. This is not an exhaustive list, and there will
    probably be other signals relevant to an organization based on its risk profile
    and its Crown Jewels that may indicate the cyber attackers at work. As such, each
    organization should tailor its list of Cyber Attack Signals for monitoring.


    ## Intrusion


    ### Patch window


    This is the time period a vulnerability remains unpatched and also how attackers
    could exploit it, providing an alert about Crown Jewels possibly impacted, probable
    attack timeline, and expected attacker behavior.


    ### Web shell


    This is the attempted installation or installation of a web shell to a web server.


    It would exploit server or application vulnerabilities or configuration weaknesses
    to make the intrusion.


    ## Lateral movement


    ### Abnormal logons


    These are anomalies in logons compared to normal logon patterns.


    ### Privileged users’ behavior


    These are anomalies in the behavior of privileged users (users with greater access
    levels and capabilities) compared to normal behavior.


    ### WMI anomalies


    This is an abnormal activity with Windows Management Instrumentation (WMI), a
    set of tools for system administrators to manage Windows systems locally and remotely.


    ### Internal reconnaissance signals


    These are anomalies in scripts or batch scripts running on email, web and file
    servers or domain controller or hosts, or scanning of servers and ports.


    ### Malware signals


    These are anomalies from normal behavior patterns in terms of users, files, processes,
    tasks, sources, and destinations to indicate initial malware installation or propagation.


    ### Ransomware signals


    This is anomalous activity to indicate initial ransomware installation or propagation,
    such as the installation of new .dll file or attempted communication with a TOR
    website (i.e., server on the TOR network, a service used to provide anonymity
    over the Internet.)


    ### Malicious PowerShell


    This is an abnormal activity with PowerShell, a scripting language for system
    administrators to automate tasks, such as odd characters (e.g., + ‘$ %) added
    in the scripts, use of “powershell.exe” by abnormal users at unusual times or
    locations or scripts containing command parameters.


    ### RDP signals


    These are anomalies with Remote Desktop Protocol (RDP), which enables a user (e.g.,
    as help-desk staff) to use a graphical interface to connect to another computer
    in a network, such as abnormal RDP users, source or destination logons.


    ### SMB anomalies


    These are anomalies with Server Message Block (SMB), a protocol in Microsoft Windows
    that enables remotely managing files, file sharing, printing, and directory share,
    among other functions in a network.


    ### Unusual logs behavior


    These are anomalies in event logs, such as event logs removed, stopped, or cleared
    with details (user details, date, time, type of log, the command executed, asset
    impacted, source, and destination).


    ## Command and control


    ### C&C communications


    This is anomalous activity indicating attempted communication or communications
    with a command and control (C&C) server, such as a request to an unusual domain
    name or a one-off domain name, a request to the numeric IP address as the domain
    name for the host, requests to certain IP addresses or hosts with a certain frequency
    (hourly, daily or other).


    ### ICMP packets


    These are anomalies with Internet Control Message Protocol (ICMP) packets, such
    as abnormal size, frequency, source, or destination.


    ### Hidden tunnels'
  mdcn: '## 第四章：增强物理安全


    ## 早期检测是改变游戏规则的关键


    由雷神公司赞助、彭博研究所独立进行的《全球网络安全宏观趋势研究》，通过网络安全前线人员的视角，对未来三年最关键的网络威胁趋势提供了新的见解。


    该研究调查了全球超过1,110名高级信息技术从业人员。


    研究揭示了专家从业者对未来三年的关键见解和预测，例如：


    影响股东价值的网络勒索和数据泄露事件将会增加。


    - 67%的受访者表示，网络勒索（如勒索软件）的风险在频率和支付金额上都将增加。

    - 60%的受访者预测，国家级攻击将变得更加严重。

    - 仅有41%的受访者表示其组织能够将物联网（IoT）风险降至最低。


    网络勒索、国家级攻击以及针对工业控制系统的攻击频率预计将呈两位数增长。


    - 19%的受访者表示网络勒索目前非常频繁，而42%的受访者表示这种威胁在未来三年内将非常频繁。

    - 26%的受访者表示国家级攻击目前非常频繁，而45%的受访者表示这在未来三年内将非常频繁。

    - 40%的受访者表示针对工业控制系统和监控与数据采集（SCADA）系统的攻击目前非常频繁，而54%的受访者表示这在未来三年内将非常频繁。


    来自不安全物联网（IoT）设备的数据丢失或被盗很可能发生，并且是一个重大的网络安全挑战。


    - 82%的受访者表示，其组织因不安全的物联网设备或应用程序导致数据丢失或被盗的可能性非常大、大或较大。

    - 80%的受访者表示，与不安全的物联网设备或应用程序相关的安全事件可能是灾难性的。


    总而言之，雷神公司和彭博研究所的《全球网络安全宏观趋势研究》提供了全球网络安全从业者的多项预测，他们每天都在前线抵御网络攻击者。其中，即使未来三年网络安全支出增加：


    - 网络勒索和数据泄露的频率将大幅增加。这一趋势主要由复杂的国家级网络攻击者或有组织的团体驱动。

    - 物联网设备尤其容易受到攻击，将成为被利用的目标。


    因此，问题不在于网络攻击者是否会入侵，而在于何时入侵。而当网络攻击者入侵时，他们可能会在数月内不被发现。


    网络攻击者未被发现的中位数或平均天数因来源而异。例如：


    - Mandiant的M-Trends报告；

    - Verizon的数据泄露调查报告；

    - IBM和彭博研究所的数据泄露成本研究。


    然而，有一点是肯定的。网络攻击者能够隐藏数月之久，而检测到网络攻击者所需的时间越长，组织最终遭受的损失就越大。


    基于对大量案例的研究，我在网络攻击链中识别出了每个组织都应了解和寻找的信号。在研究这些案例时，很明显，在每个案例中，网络攻击者采取的步骤都符合我概述的网络攻击链中的某个步骤。同样明显的是，在每个步骤中，都有网络攻击者活动的信号，但这些信号并未被组织检测到。


    现在是每个组织理解什么是网络攻击信号，并将其作为网络安全计划的一部分加以实施的时候了。通过这样做，他们将把防御转变为进攻，并尽早检测到网络攻击者。网络攻击信号是网络攻击者活动的高概率信号，他们在试图隐藏和避免检测的同时，执行网络攻击链中的某项任务。他们的目标是实现其最终目的——窃取数据或知识产权（IP），或其他形式的破坏、损害或干扰。网络攻击信号侧重于网络攻击者的行为。我识别出了15个网络攻击信号，每个组织至少应将其监控重点放在这些信号上。这15个主要信号与网络攻击者的行为有关。它们是及时的信号，在网络攻击执行之前出现，发生在网络攻击链的入侵、横向移动或命令与控制步骤中，因此具有最大价值。这不是一个详尽的列表，根据组织的风险状况和“皇冠上的宝石”，可能还有其他与组织相关的信号可以表明网络攻击者正在活动。因此，每个组织都应根据自身情况定制其用于监控的网络攻击信号列表。


    ## 入侵


    ### 补丁窗口


    这是漏洞未修补的时间段，也是攻击者可能利用它的方式，提供关于“皇冠上的宝石”可能受影响、可能的攻击时间线以及预期攻击者行为的警报。


    ### Web shell


    这是尝试安装或已安装Web shell到Web服务器的行为。


    它将利用服务器或应用程序漏洞或配置弱点进行入侵。


    ## 横向移动


    ### 异常登录


    这些是与正常登录模式相比的登录异常。


    ### 特权用户行为


    这些是特权用户（具有更高访问级别和能力的用户）行为与正常行为相比的异常。


    ### WMI异常


    这是与Windows管理规范（WMI）相关的异常活动，WMI是一组供系统管理员本地和远程管理Windows系统的工具。


    ### 内部侦察信号


    这些是在电子邮件、Web和文件服务器或域控制器或主机上运行的脚本或批处理脚本的异常，或服务器和端口的扫描。


    ### 恶意软件信号


    这些是用户、文件、进程、任务、来源和目的地方面偏离正常行为模式的异常，表明初始恶意软件安装或传播。


    ### 勒索软件信号


    这是表明初始勒索软件安装或传播的异常活动，例如安装新的.dll文件或尝试与TOR网站（即TOR网络上的服务器，一种用于在互联网上提供匿名性的服务）通信。


    ### 恶意PowerShell


    这是与PowerShell相关的异常活动，PowerShell是一种供系统管理员自动化任务的脚本语言，例如脚本中添加了奇怪的字符（如 + ‘$ %），异常用户在异常时间或位置使用“powershell.exe”，或脚本包含命令参数。


    ### RDP信号


    这些是与远程桌面协议（RDP）相关的异常，RDP使用户（例如帮助台人员）能够使用图形界面连接到网络中的另一台计算机，例如异常的RDP用户、来源或目的地登录。


    ### SMB异常


    这些是与服务器消息块（SMB）相关的异常，SMB是Microsoft Windows中的一种协议，支持远程管理文件、文件共享、打印和目录共享以及网络中的其他功能。


    ### 异常日志行为


    这些是事件日志中的异常，例如事件日志被删除、停止或清除，并包含详细信息（用户详细信息、日期、时间、日志类型、执行的命令、受影响的资产、来源和目的地）。


    ## 命令与控制


    ### C&C通信


    这是表明尝试与命令与控制（C&C）服务器进行通信或已进行通信的异常活动，例如请求异常域名或一次性域名，请求将数字IP地址作为主机的域名，以特定频率（每小时、每天或其他）请求某些IP地址或主机。


    ### ICMP数据包


    这些是与Internet控制消息协议（ICMP）数据包相关的异常，例如异常的大小、频率、来源或目的地。


    ### 隐藏隧道'
