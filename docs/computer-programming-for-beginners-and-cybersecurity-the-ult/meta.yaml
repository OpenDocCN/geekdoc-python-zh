    if (age <= 18):\n    print(\"You are not eligible for voting, try next election!\"\
    )\n    print(\"Program ends\")\n```\n\n一旦你将这个条件语句添加到你的编译器中，我们需要探讨上面的代码会发生什么。如果用户确实进入了程序的这一部分，并且他们说自己未满\
