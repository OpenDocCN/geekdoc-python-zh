    # Available files


    The C standard library provides a collection of functions for performing common
    tasks such as:


    +   - String handling

    - Character and type conversion

    - Mathematics

    - Input and output


    A wide variety of C++ library files are also available.


    The ANSI standard for C++ libraries was ratified in 1998.


    The iostream file is probably the most common and generic of all C++ library files.


    Most C++ programs include this header file.


    The iostream file provides a large range of input/output functions and other I/O
    stream information.


    For example, this is where cin and cout data and functions are prototyped.


    # Note


    C++ I/O occurs in streams of bytes, where a stream is simply a sequence of bytes.


    There are many variations of C++ libraries available to programmers.


    And these libraries originate from a number of sources.


    For example, some libraries come with C++ application development software.


    C++ function libraries may also be supplied by sources such as device driver manufacturers,
    and C++ programming web sites and bulletin boards.


    Your best source of reference is usually the manuals and help files included with
    your C++ application development software.'
