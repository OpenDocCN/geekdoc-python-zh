    - Make sure you use the customer''s property properly, without exceeding the limits
    set in your contract.

    - You must disclose a potential conflict of interest to all parties'
  merge: -1
  pgno: 362
- img_proc: true
  md: 'involved, especially if that conflict cannot be avoided.


    +   - Make sure that you manage the entire project you are working on, including
    promotion and risk disclosure activities.'
  merge: -1
  pgno: 363
- img_proc: true
  md: '# CHAPTER 10:


    # Mistakes Made in Cybersecurity


    Stolen information and data will not lead to the end of the business. It is not
    a great sign for the business either. Studies and research indicate that a data
    breach in an organization''s network can lead to a loss of $15.4 million, and
    the amount increases each year. People do not want to lose their money because
    of some issues or vulnerabilities in the system, do they? Indeed, businesses and
    organizations cannot make mistakes. These mistakes can lead to the loss of data,
    but a large organization is bound to make such mistakes. What the organization
    must do is to learn from those mistakes. You cannot expect your organization to
    do the exact thing repeatedly only because the outcome may change at one point.
    This chapter covers the different mistakes organizations make. You must protect
    your organization from making such mistakes during these times.


    # Failing to Map Data


    Every organization must focus on understanding how and where the data flows. It
    should also look at where the data is saved. Remember, data is the livelihood
    of your company. It is only when you assess and identify the flow of data that
    you can see where it must be protected. You must know if the data is flowing out
    of your organization and who it is shared with. When you have visibility, you
    will know what ends the hacker can attack. You will also know where you can catch
    the hacker.


    # Neglecting Security Testing


    Vulnerabilities will reside across the database, systems, applications, and network.
    These vulnerabilities now extend to various devices like the IoT or Internet of
    Things and smartphones. Organizations must test these devices and connections
    regularly to scan for any vulnerabilities. You can also perform some penetration
    tests to learn about the vulnerabilities. Remember,'
  merge: -1
  pgno: 364
- img_proc: true
  md: 'you cannot guess the vulnerabilities, and will only find them when you test
    them.


    # Concentrating on Wrong Aspects


    It is true that prevention is not an anachronism. As technology advances, so make
    the threats against it. Remember, a hacker will find a way to enter the border.
    A firewall will not always protect your systems if you have an employee who does
    not know what he is doing. Once a hacker is inside the system, he can acquire
    privileged information. He can also pretend to be an employee of the organization.
    Hackers can evade any security scans for a long time. If you have better visibility,
    you can find a hacker and reduce the chances of data leaks.


    # Forgetting the Basics


    Often, it is the simple things you can use to overcome and threats to the system.
    You must train all your employees. Help them understand the type of password they
    must use. They must perform the right actions as well. It is only when this happens
    that you can maintain the network components properly and minimize the risk of
    data loss. You can also find ways to configure the data to prevent any changes
    adequately.


    # Avoiding Training


    Remember to train your employees to know what they must do to prevent any attacks.
    The most common form of hack is a social engineering attack. The hacker will send
    information from a malicious source and mask the information to seem legit. He
    can then use the information the employee feeds into the website, and attack the
    configuration of the system and network. Make sure to train your staff about protecting
    their systems and how to identify social engineering attacks.


    # Security Monitoring


    Most businesses cannot set up their security operations center or center of excellence
    since they lack the budget. This does not mean you cannot monitor the security
    of the systems and network. You must investigate the'
  merge: -1
  pgno: 365
- img_proc: true
  md: 'network and look for any threats or vulnerabilities. You can use these methods
    to minimize the effect of an attack on the data and security.


    # Avoiding Vendor Risk Assessments


    From earlier, you know vendor risks are the reasons for numerous data breaches.
    Hackers can enter the organization''s systems through the vendor''s application
    or network. Therefore, you must have a plan to help you assess the risks in third-party
    systems. You can also read the reports they share about their systems to learn
    more about their security.


    # Ignoring Shadow IT


    Remember, the end-points in any network are often connected to other networks,
    and this makes it hard to control the flow of data through the network. Most employees
    access shadow devices and applications from their laptops and desktops. The IT
    department in most organizations does not support the use of such applications.
    If you do not know how to stop it, you must find a way to hide it. You can block
    these applications and websites.


    # It is not only about Malware


    Most hackers use malware to establish their presence in a system or network. Once
    they are inside the network or system, they will use different strategies to perform
    the hack and move through your network. So, you need to find hack into the system
    in a legitimate way and perform the hack to detect any vulnerabilities.


    # Breaches won’t Happen


    This is one of the biggest mistakes most companies make. Some organizations do
    not protect their business and network since they believe cybercriminals do show
    mercy. This is never going to happen. Cybercriminals will attack any company,
    regardless of its size. You must prepare your defenses and identify the response
    to an attack. This will help you minimize the damage and react faster to any threats
    if the day does come.


    # Forgetting about the Management'
  merge: -1
  pgno: 366
- img_proc: true
  md: 'You must understand that security must mature over time, and this is one of
    the primary objectives of an information security professional. In some instances
    where businesses have reached high levels of maturity, security is a part of the
    organization''s culture. You must obtain permissions and approvals from the management
    before you investigate any attacks or the systems.


    # Doing it on Your Own


    Regardless of whether you own a small business or are a part of a larger organization
    that lacks security skills, you must find someone to help you with testing your
    network and systems. Hire an ethical hacker to test the networks and systems.
    You can also partner with security service providers. Alternatively, you can speak
    to your management and hire the right professionals, or you can train the employees
    in your firm. You must avoid making these mistakes if you want to improve the
    security of your organization''s systems and networks.


    # Tips to Keep Your Organization Secure


    In this chapter, we will look at some tips to help you protect your organization
    from being a victim. Speak to the IT professionals and other stakeholders in the
    business to learn more about what you can do to prevent any cyber-attacks.


    # Creating an Information Security Policy


    Every business must have a clearly defined security policy. This policy should
    provide information on the processes and actions every employee in the organization
    must follow. You must enforce this policy and train employees to perform the right
    actions. Remember to include the following in your information security policy:


    +   - Best Practices for encryption

    - Password requirements

    - Usage of devices

    - Email access'
  merge: -1
  pgno: 367
- img_proc: true
  md: 'You must update this policy frequently, and let every employee in the organization
    know about the changes made to the policy.


    # Educating Employees


    This is a very important aspect to consider. If you have a security policy, but
    your employees do not know what they must do, then it is a lost cause. Help your
    employees understand the different protocols they must perform. You need to have
    the training and let people know what they must do. This is one of the easiest
    ways to protect data.


    # Using Secure Passwords


    Remember, passwords are important to maintain cybersecurity. Instruct your employees
    to choose passwords that are difficult for a hacker to guess. You must avoid the
    usage of dates and names in your password since hackers can easily connect you
    with those words. You must also instruct them to change passwords regularly. You
    can also use a multi-factor authentication system to add an extra layer of protection
    to the accounts.


    # Ensure Software is Updated


    If you have outdated software in your systems, it can lead to a security risk.
    You should always update the software with the latest patches. For example, if
    you use the Windows Operating System, you must allow the updates to run so that
    you can cover any vulnerabilities or gaps.


    # Secure the Network


    You must use firewalls to protect the network used in the system. Make sure to
    use encryption, so you make it harder for a hacker or any other user to access
    the data.


    You must be careful when you use Wi-Fi since most hackers target those connections.
    Let employees know they should not use public Wi-Fi.


    Ask them to use VPN connections to secure the transmission of data. Make sure
    to protect the router using a strong password.


    # Back-Up the Data


    Regardless of how vigilant you are, a hacker can choose to target your system'
  merge: -1
  pgno: 368
- img_proc: true
  md: 'or network. Store the data on a disk in the event of such an attack. Let the
    system store the data automatically in a secure place. You could also store the
    data in a separate data center.


    # Control Access


    You must ensure to maintain some control over the devices used by employees as
    well. Employees must be careful about the information on their screen, and should
    never leave it unlocked. If they leave their station or desk for a minute, they
    must log out of that system. Since anyone can walk away with a laptop, employees
    should be told never to leave it unattended. Since more business is conducted
    on tablets and smartphones, hackers target these devices. Employees must secure
    their data on the phone and protect their phones using a password. They must report
    the loss or theft of the device promptly.


    # Cybersecurity Training


    Organizations can always reduce the risk of cyber-attacks by training their employees.
    They can use Target Solutions Cybersecurity Training for employees. This training
    material will provide dynamic courses to check the user’s knowledge about cybersecurity.'
  merge: -1
  pgno: 369
- img_proc: true
  md: '# CHAPTER 11:


    # Economic Impact of Cybersecurity


    # The Business of Cybersecurity


    Funding higher levels of cybersecurity is part of the business problem executives
    must address. Small and medium businesses often operate on razor-thin margins.
    Therefore, it is important to ensure every cybersecurity dollar is spent wisely.
    Failure to do so not only leaves gaps in security, but overspending can destroy
    a competitive edge on cost. When allocating funds, it is important to decide which
    cybersecurity expenses are treated as a cost of goods sold and which to consider
    as investments for improving profits and winning market share. It is the same
    problem executives faced during the rise of computers and the Internet decades
    ago: “Is this newfangled stuff to be treated as an expense or an investment?”
    We argue that it is both and will help you understand both perspectives.


    It is particularly hard for busy leaders of small companies to prioritize risk
    management planning. They want to jump to the part where they buy cybersecurity
    solutions and get back to running their business as quickly as possible. Taking
    time to think about strategy, for a small company, seems like a waste of time
    when there are customers waiting to be served. But nothing could be further from
    the truth, and we also understand that it can be daunting to think about cybersecurity
    when everything is so technical. We use the terms strategy and tactical to identify
    those areas that need your attention and which to consider delegating or outsourcing.


    Before we dive into our step-by-step explanation of your role, let’s examine several
    of the contributions and benefits to executive involvement. Most of these functions
    are impossible to outsource because they require expertise and authority that
    only top management possesses. That doesn’t mean you cannot use tools and advisors
    to help you along the way; it just means you cannot relinquish responsibility
    for them.'
  merge: -1
  pgno: 370
- img_proc: true
  md: 'Stating and controlling direction. Goal setting starts at the top and reflects
    the needs of the business. Goals and objectives provide context for tactical planning,
    and communicating them clearly to a diverse team of expert tactical advisors keep
    everyone focu5sed, and on the same page.


    Allocating budget. Business owners understand that cybersecurity measures will
    cost time and money, and as an executive, it is your responsibility to decide
    where the money will go. Your IT guru recommends a new firewall. Then your insurance
    agent recommends adding a cyber insurance policy. If you buy both (and you should
    buy both), how do you divide up the limited budget between all the possible solutions?
    If cybersecurity is relegated to just a tactical IT problem, you will have a fantastic
    firewall but no protection when a hacker finds their way around it.


    Authorizing company-wide policies. Whether it’s enforcing bring-your-own-device
    policies or using strong passwords, someone should be in control of what’s being
    done and how well policies are being followed. The ability to authorize new cybersecurity
    measures comes from the top in any organization. The people-driven aspects of
    cybersecurity are absolutely a business problem that you, as the top manager,
    need to oversee.


    Maintaining compliance. Once authorized, policies and procedures must be carried
    out. Failure to do so will be construed as negligence, which leads to prosecution
    and regulatory fines. Cyber insurance, citing “failure to follow” exclusions,
    will also deny coverage if you fail to maintain your own security standards. Your
    authority and your ability to develop a culture of compliance are critical to
    avoiding these catastrophic mistakes.


    Empathy in a crisis. When a data breach happens, despite every effort to prevent
    it, clients and employees will be more forgiving if they believe top management
    was paying attention and making an effort. Even when responsibility for a breach
    can be traced to an individual or external actor, clients and employees want to
    know that you were being vigilant.


    Justify spending. The return on investment for cybersecurity is obscured. It is
    hard to measure how bad things could have been if you did not invest in something
    that prevents or reduces loss, but that does not mean it is impossible. Risk management
    tools and techniques that have been adapted to cybersecurity can rationalize spending.
    Whether you report to yourself or'
  merge: -1
  pgno: 371
- img_proc: true
  md: 'another stakeholder in the company, you can invest with confidence when you
    can articulate the value.


    We will not go deeply into tactical details that can be delegated to staff and
    vendors, although we will explain what they are and how they get used so you can
    manage them effectively.


    # Bonus: How to Stop Identity Theft on Facebook and Other Social Media


    Sharing is a core value of social media and a key reason for the wild growth and
    success of companies such as Facebook, Twitter, YouTube, and LinkedIn. For some
    of us, it’s fun to post comments, articles, photos, and videos for our friends
    and social media followers. Many people participate passively, watching, and reading
    others’ posts but rarely sharing their own. Never have humans had such open and
    easy access to tell their personal stories or share their ideas, experiences,
    and feelings.


    But like much about the Internet, all this sharing can draw unwanted and dangerous
    attention. You don’t want the "bad guys" watching you. And any social media platform
    you use potentially connects you to mind-boggling numbers of people. Over a billion
    people worldwide have a Facebook account2, 307 million people actively use Twitter3,
    and the number of Instagram users exceeds 500 million. 4 That’s why you must exercise
    complete control over your digital life, and you do that on social media by keeping
    a sharp eye on your privacy settings. Nearly all social media sites let you control
    who sees your information. When you review your privacy controls regularly, you
    ensure that you have the strongest security in place.


    # Who Can See Your Profile?


    Social media networks continue to grow and allow you to connect with family, friends,
    colleagues, and classmates, but sharing without thinking about who sees your information
    just invites trouble.


    We often ask people we meet if they’ve checked their social media privacy settings
    lately—many have no idea. That usually means the public can view their open profiles—posts,
    photos, likes, friends, and other activities. You may be OK with that openness,
    but you should be concerned.'
  merge: -1
  pgno: 372
- img_proc: true
  md: 'Scammers can "scrape" or copy your profile, learn more about you, and use that
    information to perpetrate any variety of scams, frauds, and hacks. For example,
    say you post a photo of your dog in your backyard and write a caption such as
    "Look at Buddy soaking up the sun." A scammer who reads that post now has a good
    chance of answering the password reset question on your email account if you selected:
    "What’s your pet’s name?" An open profile gives hackers the important details
    they need to hack your life—whether it’s seizing your email account, assuming
    your identity in credit-card fraud, or cracking your bank account. 5 Strong privacy
    settings block hackers from seeing your profiles.


    # Know Your Privacy Settings and Your Friends


    You can still enjoy social media and maintain good security; you just need to
    strike the right balance by knowing how privacy settings work at different sites.
    A simple Google search on a website’s name and "privacy settings" will get you
    started. All social media sites will give you some measure of control over who
    sees your profile and activities. Your biggest decision will be selecting a security
    level that allows you to share with friends while keeping your privacy. Thankfully,
    it won’t involve much effort.


    In addition to beefing up your privacy settings, you’ll also need to review your
    "friends" to make sure you still want them to see your social media activities.
    For example, should the friend of a friend know when you are on vacation because
    they can see your photos? It’s important to remember that your posts have a larger
    audience than you realize. Also, social media companies frequently change their
    privacy policies and default settings. Pay attention to privacy updates you receive
    from Facebook and other sites: They’re not just "fine print" and often contain
    important changes that need your attention if you want to keep strong privacy
    on social media.


    We think most people should follow this rule: Do not leave your profile open for
    everyone to see. A study by antivirus firm Norton found that four in every ten
    social media users have suffered fraud.6 Open profiles essentially hand over your
    personal information to scammers and hackers without much effort. Don’t make their
    job easy. Think twice about what you share and with whom—a key rule to hack-proofing
    your life.'
  merge: -1
  pgno: 373
- img_proc: true
  md: '# Conclusion


    The United States has complained that Russian hackers had meddled with the 2016
    presidential elections. It was a major incident. Russian hackers hacked into Democratic
    National Committee and published some pretty confidential emails during the 2016
    presidential elections in the United States. This episode produced quite a stir
    in the legislative corridors of the United States. The power and impact of cybersecurity
    were revisited, and the importance of cybersecurity was elevated, and for the
    first time, cybersecurity was seen through the context of international relations.
    The incident was not normal as it had the potential to push the two countries
    into a kind of conflict. The level of the attack was unprecedented in nature,
    not only in the United States but also across the globe. People had started seeing
    cybersecurity from a different lens. The incident of Sony Pictures started spinning
    before the eyes of lots of people who responded with mixed sentiments. Some of
    them showed a bit of surprise, and others showed extreme concern, while a few
    showed no reaction at all.


    The United States had accused a state of cyberattack in the past in the wake of
    the attack on Sony Picture Entertainment, but the scale and the impact of this
    attack were unprecedented. It meant that anyone with a computer could change the
    course of an election of the most powerful country in the world. But for seasoned
    cybersecurity experts, this development is not news. Since the advent of the internet
    back in the mid-1990s, the cyberspace has witnessed some pretty amazing growth
    that filled the pockets of millions of people due to rapid commercialization but
    also pushed people into the depths of the crisis. Cybersecurity has now climbed
    up the ladder and has reached the heads of the state who have started seeing the
    security of the world in a different way. Scholars of international relations
    see this new discipline as a subfield of security studies with a special focus
    on the implications of technology for international security. This takes into
    account its effects on the sovereignty, power, and world governance.


    Cybersecurity has gained considerable attention for the past few years on the
    back of the fact that the attacker is usually not known. This creates a lot of
    confusion and suspicion that are very unhealthy for a peaceful international'
  merge: -1
  pgno: 374
- img_proc: true
  md: 'environment. Large nations sometimes use proxies to wage cyberattacks and afterward
    label them as a rogue to avoid direct confrontation with the power they are dealing
    with. We have seen this in the North Koran attack on Sony Pictures. North Korea
    denounced the attack by appreciated their deed as patriotic. Similarly, when the
    Russian hackers meddled in the US elections, Vladimir Putin, the Russian president,
    denies any involvement of the state in the attack but added to the tail of his
    speech that some patriotic minded Russian hackers might have committed that deed.
    He appeared to have been appreciating what the hackers had done to the country
    that had a long history of enmity with Russia.


    Had Putin claimed the attack, there would have been an all-out war between the
    two superpowers of the world. Cybersecurity is playing a crucial role in international
    relations because the threat of nuclear war and the mutual assured destruction
    as a result of the war have negatively affected the world''s strategic scenario.
    Humans, by nature, cannot live without a contest. Physical war is not possible
    as the threat of nuclear war keeps looming over the participants of the war. We
    can see this in the subcontinent where India and Pakistan, the two nuclear powers,
    have made the subcontinent a nuclear flashpoint in the area. Despite the fact
    that the possibility of a conflict remains high, the idea of a hot war is not
    usually pursued by the two countries. So, if countries must go into a conflict,
