- md: "## Lists\n\nLet us imagine a puzzle. You have a row of boxes. Each box contains\
    \ a card with one letter. You have to figure out the sequence of the letters,\
    \ so that the letters compose a word.\n\n![](img/a8d6ec92209e49212ed71a37263c49f8_214_1.png)\n\
    \n## Figure A linked list\n\nIn the table above, you can see that each box has\
    \ a number. You may guess that these numbers are the key to the puzzle. The first\
    \ box has a letter T inside and number 5 on the front side. Take a card with the\
    \ letter T and put it aside. The number 5 may point to the next letter. Count\
    \ boxes. The fifth box has the letter ‘E.’ Take the card with the ‘E’ letter and\
    \ place it next to T. You will get \"TE.\" The box with the letter ‘E’ has number\
    \ 2 on its side. So, take the card from the 2nd box and place it next to \"TE.\"\
    \ You will get \"TEC.\"\n\nThe box with the letter ‘C’ has the number 10, so take\
    \ the card from the 10th box. You will get \"TECH.\" The box with the letter ‘H’\
    \ has number 4, so take the card from the 4th box. You got \"TECHN.\" Continue\
    \ following the numbers, and you will get the whole word: TECHNOLOGY.\n\nThat\
    \ is how a linked list works. It is made of nodes. Each node has at least one\
    \ variable that holds data (a text or number or object) and one variable (pointer)\
    \ that holds the address of the next node. This system walks through the node\
    \ list as you did in the puzzle. The pointer of the last node has null value,\
    \ or it may point to the first node. Then we have a closed linked list.\n\n##\
    \ ADD A NODE\n\nIf you want to add a new node to the end of the linked list, you\
    \ have to create a new node. Then point the pointer of the last node to the address\
    \ of the new node and assign null to the new node pointer.\n\n![](img/a8d6ec92209e49212ed71a37263c49f8_215_0.png)\n\
    \nFigure Adding a node to the end of the linked list.\n\nIf you want to add a\
    \ new node to the beginning of the linked list, you have to create a new node.\
    \ Point the pointer of the new node to the first node, and that is it.\n\n![](img/a8d6ec92209e49212ed71a37263c49f8_215_1.png)\n\
    \nFigure Adding a node to the head of the linked list.\n\nIf you need to add a\
    \ node in the middle of the linked list, you have to create a new node, and then\
    \ break the chain: redirect the node (previous to the break), to a new node and\
    \ point the pointer of the new node to the next node (the one after the break).\n\
    \n![](img/a8d6ec92209e49212ed71a37263c49f8_215_2.png)\n\nFigure Adding a node\
    \ in the middle of the linked list.\n\n## DELETE A NODE\n\nTo delete a node with\
    \ a certain key, you walk along with the list until you find the key. Then you\
    \ assign the key node to the temp node. Then you point the node previous to the\
    \ key node to the node next to the key node. See Figure 60. As a result, the temp\
    \ key becomes isolated from the list. Now you can delete the temp.\n\n![](img/a8d6ec92209e49212ed71a37263c49f8_216_0.png)\n\
    \nFigure Delete a node.\n\nBelow is a code for Node class. For simplicity sake,\
    \ I created a node that holds an integer and node pointer to the next node. Both\
    \ class member variables are declared as private. It is good programming practice\
    \ not to use global variables, because private members cannot be seen from the\
    \ outside of the class. We still need to set and to read these private member\
    \ variables. The public functions set and will do the job.\n\n## CHAPTER 3: Binary\
    \ trees\n\nBinary trees are one of the most useful of all the basic data structures\
    \ and are by far the most interesting. They are the perfect example of how recursion\
    \ and pointers can be used to do some very useful things.\n\nOne of the best techniques\
    \ for creating lists of things is the linked list, but finding an element in the\
    \ list can take a while. And, if you have a large amount of unstructured data,\
    \ an array won’t help much either. You can try sorting the array but, even so,\
    \ inserting items into it will still be difficult. If you have an array that you\
    \ want to keep sorted, inserting new elements will take a lot of shuffling! And\
    \ trying to find things in a list as quickly as possible is quite important, especially\
    \ in scenarios like these:\n\n- You’re building an MMORPG game and players need\
    \ to be able to sign in quickly—that involves quickly looking players up\n- You’re\
    \ building software to process credit cards and millions of transactions need\
    \ to be handled hourly—credit card balances need to found very quickly\n- You’re\
    \ using a low-power device, such as a tablet or smartphone, and showing your users\
    \ an address book. You don’t want your users to keep hanging because your data\
    \ structure is slow.\n\nThis section will discuss the tools needed to overcome\
    \ these problems and more.\n\nThe idea of the solution is to be able to store\
    \ elements in a structure like a linked list, using pointers to help structure\
    \ the memory, but in an easier way than the linked list. Doing this requires that\
    \ the memory have more structure than a simple list.\n\nSo what does structuring\
    \ data mean? When we started this journey, we only had arrays, but these never\
    \ really gave us the ability to use data structures other than sequential lists.\
    \ Linked lists use pointers to grow sequential lists incrementally but don’t use\
    \ the flexibility of the pointer to build more sophisticated structures.\n\nWhat\
    \ are these more sophisticated structures in memory? Structures that hold more\
    \ than a single next node at any given time are a good example. But why would\
    \ you want this? Simple. If you have two “next nodes,” one can be used to represent\
    \ elements that are more than the current element. This is called a binary tree.\n\
    \nThese are named because there are always one or two branches from every node.\
    \ Each of the next nodes is a child, and the node that links to the child is the\
    \ parent node.\n\nThis is what a binary tree might look like:\n\n```\n10\n\n6\
    \ 14\n\n5 8 11 18\n```\n\nIn the tree, the left child on each of the elements\
    \ is smaller than the element, and the right child is larger. 10 is the parent\
    \ node for the whole tree, and the child nodes of 6 and 14 are both parent nodes\
    \ to their own small trees, called subtrees.\n\nBinary trees have one very important\
    \ property: each child is an entire tree. Combine this with the rule of the left\
    \ child being smaller and the right child being larger, and you have an easy way\
    \ of defining algorithms that locate specific nodes in the tree.\n\nFirst, look\
    \ at the current node value. If it equals the search target, it’s done. If it’s\
    \ more than the search target, go left; otherwise, go right. This works because\
    \ each node to the left of the tree is less than the current mode value, and each\
    \ on the right is more.\n\nIn an ideal world, your binary tree will be balanced\
    \ with the exact same number of nodes on both sides. In such cases, every child\
    \ tree is roughly 50 percent of the entire tree and, when you search the tree\
    \ for a value, the search can eliminate 50 percent of the results each time it\
    \ gets to a child node. So, if you had a tree of 1000 elements, 500 would be immediately\
    \ eliminated. Search that tree again (it only has 50 elements now), and you can\
    \ cut it by about 50 percent again. That way it doesn’t take long to find the\
    \ value you want.\n\nSo, how many times must a tree be subdivided before you get\
    \ to one element? The answer to that is log2n (n is the number of elements the\
    \ tree has). This is a small value, even if your tree is large—if your tree had,\
    \ say, 32 billion elements, the value would be 32; almost 100 million times faster\
    \ than a search of a linked list of four billion elements, where every single\
    \ one has to be assessed.\n\nIf the tree isn’t balanced, you won’t be able to\
    \ eliminate roughly half of the elements; worst case, each node only has one child\
    \ and that makes the tree nothing more than a linked list with a few extra pointers,\
    \ thus requiring you to search all elements.\n\nSo, when a tree is balanced approximately,\
    \ it’s much faster and easier to search for nodes than the same search on a linked\
    \ list. This is because you can structure the memory of how you want it.\n\n##\
    \ Implementing a Binary Tree\n\nTo implement a binary tree, begin by declaring\
    \ the node structure:\n\n```\nStruct node\n{\n    int key_value;\n    node *p_left;\n\
    \    node *p_right;\n};\n```\n\nThe node can store values as a simple integer,\
    \ key_value, and has two child trees —p_left, and p_right."
