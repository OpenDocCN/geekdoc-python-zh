- md: "## d) Advanced Object-oriented features\n\nWe all know that C++ is an object-oriented\
    \ language. The basic versions only support single inheritance, whereas the newer\
    \ versions can provide multiple inheritances to your projects. With the newer\
    \ versions, we will also be able to use multiple operating overloading and complex\
    \ polymorphism features.\n\n## CHAPTER 1: How to Work on Your First Program\n\n\
    Once you have downloaded the C++ environment that you would like to use, we are\
    \ going to start right in with your first code. The code that you would have to\
    \ use to make this work includes the following:\n\n```cpp\n#include <iostream>\n\
    \nusing namespace std;\n\nint main ()\n{\n    cout << \"Use This One!\";\n   \
    \ return 0;\n}\n```\n\nYou have a few options available when it comes to writing\
    \ this out. You can choose to write this out in your compiler, which will be available\
    \ in your environment, or you can choose to write it out and save it to your computer.\
    \ The second option is sometimes nice because then you have the code saved and\
    \ could copy and paste it any time that you would need it in your code.\n\nEither\
    \ way, you should carefully consider the type of text editor that you want to\
    \ work with. Most of them are going to be device-specific, so you need to look\
    \ for the one that goes well with your particular computer. Some of the options\
    \ that you can go with are Windows Notepad, vim, vi, Brief, and EMACS. If you\
    \ would like to have an editor that is compatible with more than one platform,\
    \ then the vim and vi options are the best ones to choose.\n\nWhen you write out\
    \ your own codes, you should write them out in the text editor first to get a\
    \ rough draft on the program, and then you can move them over to your compiler\
    \ later on. This makes it easier for you to check your work and avoid mistakes\
    \ with the code that you are currently working with.\n\n## C++ compilers\n\nJust\
    \ like with the text editors, there are many compilers out there that you can\
    \ work with. The problem is that while you do get a lot of choices to pick from,\
    \ many of these compilers are pretty expensive. That is because most of the compilers\
    \ that you will come across are meant for elite hackers who have mastered what\
    \ was in the other lower-level compilers, and now they want to make sure they\
    \ can take it to the next level.\n\nThe good news is that there are some compilers\
    \ that you can get for free. You just need to be careful and watch out, just make\
    \ sure that you are getting ones that are good and will have all the features\
    \ that you are looking for. One compiler that works out well with C++ and can\
    \ be good for a beginner to use is GNU. It is best when used with the Linux systems,\
    \ and you may already have this one on your system. To check whether the GNU compiler\
    \ is available on your system, use the following code:\n\n```bash\n$ g++ -v\n\
    ```\n\n## Basic syntax\n\nThe C++ language can be defined as a program that will\
    \ use objects to help keep everything organized and will allow the code to communicate\
    \ and complete other functions using various methods. There are four important\
    \ parts that come with the C++ language and these include:\n\n- **Classes**: These\
    \ are the organizational tools for your language. They can be seen as boxes that\
    \ can hold onto or store objects and will sort out similar ones. You can label\
    \ your class anything that you would like, but it is good coding practice to place\
    \ objects that, in one way or another, have similar characteristics into the same\
    \ class.\n\n- **Object**: Objects are things in your code that have states and\
    \ behaviors. These could be things such as colors, texture, shapes, and so on.\
    \ You will usually classify these objects into classes that have similar objects.\
    \ So, if you had a class that was about dogs, you may put the different types\
    \ of dogs in that same class.\n\n- **Method**: This is a term used in coding for\
    \ behavior. There can be as many or as few methods as you would like to work with.\
    \ This is how you can manipulate the data, and actions will be played out based\
    \ on the method that you are working with or using. Without using the right method,\
    \ your program won’t know exactly what it’s supposed to do.\n\n- **Instant variable**:\
    \ These refer to the individual objects that you are working with. Each one is\
    \ classified using a unique set of variables that act like the fingerprints to\
    \ identify your object. You can use some values to assign the right variable to\
    \ the object when you create it.\n\nAnd that is the basics of writing a code in\
    \ C++. You should take some time to write out the code above in your compiler\
    \ to gain a little bit of practice to understand what it is that you should be\
    \ doing here. We will have a look at some of the things that you can do with these\
    \ codes later on, but this is a great place to start.\n\n## The C++ Data Types\n\
    \nJust like with some of the other coding languages that you may want to work\
    \ with along the way, there are going to be quite a few data points that show\
    \ up in your code as well with C++. You will often be working with variables,\
    \ for example, which are just going to be spots that you reserve in the memory\
    \ of your computer so that the different parts of the code will stay safe. There\
    \ are a lot of data points that we are able to focus on when it comes to working\
    \ in the C++ language, and these will include:\n\n1. Boolean\n2. Double floating\
    \ point\n3. Floating point\n4. Integer\n5. Character\n6. Valueless\n7. Wide character\n\
