    of variables that we are going to work within this language will include the local
    variable and the global variable.


    There are some big differences that are going to show up when we are talking about
    these variables. To start with is the global variable. This is mainly going to
    mean that we are looking at a variable that the rest of the program, or any part
    of the program, is able to declare. It doesn’t matter where that part of the program
    is located; it will be able to use and rely on that global variable when it would
    like to.


    Sometimes this is a good thing and will allow your modules to declare the variables
    that they want, even when they are not near one another. But other times, this
    is going to cause some issues. If the wrong part of the code tries to declare
