    # Library Functions


    # Library functions and user-defined functions in C++


    Learning objective


    After completing this topic, you should be able to give a brief account of library
    functions and user-defined functions in C++.


    1. Incorporation of library functions


    The C++ programmer has access to a large selection of library functions.


    You can use any function in the library by simply including the name of the header
    file that contains the appropriate function prototype.


    Generally, library functions are specified in a pair of files.


    The function definition is contained in a source file that usually has a .c or
    .cpp file extension.


    Note


    Usually, you are not supplied with the source code for library functions with
    a compiler.


    Instead, you are supplied with precompiled object files that can be linked to
    your program.


    The function prototype is contained in a header file, which may be distinguished
    by an .h, .hpp, or .hxx file extension.


    Note


    Header files also contain definitions of various data types and constants needed
    by those functions.'
