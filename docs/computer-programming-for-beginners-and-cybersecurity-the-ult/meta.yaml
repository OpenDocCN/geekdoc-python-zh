    \ \"\\n\";\n}\n```\n\n## CHAPTER 9: I/O\n\n### I/O basic knowledge\n\n- Neither\
    \ C++ nor C has built input and output in the language. They use functions(C)\
    \ or other I/O objects (C++) in language library.\n- C++ I/O class and header\
    \ file\n\n1. Iofs stand for three header files `<iostream>`, `<fstream>` and `<sstream>`.\
    \ `<iostream>` includes `<ios>` automatically. They are three main header files\
    \ you should include in your C++ application.\n2. Classes: iostream(streambuf),\
    \ fstream(filebuf), stringstream(stringbuf) and four pre-defined objects: cin,\
    \ cout, clog and cerr.\n3. Clog is just like cerr, but it buffers its output.\n\
    4. C++ normally flushes the input buffer when you press enter. For output to the\
    \ display, C++ program normally flushes the output buffer when you transmit a\
    \ newline character, or reaches an input statement.\n5. `>>` and `<<` don’t need\
    \ to format string, C++ will automatically convert it. It’s better than printf\
    \ and scanf in C language.\n6. Through inheritance, fstream and cin(cout) share\
    \ the same usage. All the knowledge can be used directly in fstream. I like it\
    \ the most.\n\n### Input basic knowledge\n\n- For Input, you need to master one\
    \ basic idea, two languages, and three data types.\n- One basic idea: In order\
    \ to make continuous input, you need to use `while(inputMethod)`. When two things\
    \ happen:\n    1. User wants to end input (ctrl+D) or read the end of File;\n\
    \    2. Read fails (for example, `cin >> int`, but input letter 'a').\n\n`inputMethod`\
    \ will return false. Then you need to use some flag or status to tell the difference\
    \ between EOF and error inside of while loop.\n\n- Two languages are C and C++,\
    \ they use different input methods. Three data types are: number and word (no\
    \ space in middle), character (white), and string (include space in middle).\n\
    - Two languages common used input methods:\n\n| Data Type | C | C++ |\n| :---\
    \ | :--- | :--- |\n| Number and non-white character word | `scanf(\"%d %f %c %s\"\
    , &i, &f, &c);` | `cin >> i >> f >> c >> w;` |\n| Character (including white-character)\
    \ | `int a = getchar();` | `cin.get(char & c);`<br>`ch = cin.get();` |\n| String\
    \ (line) | `fgets(stdin, char *p, n)` | `cin.get(char *p, n);`<br>`cin.getline(char\
    \ *p, n);`<br>`getline(cin, string);` |\n\n- In scanf, you need to specify exact\
    \ data type when you read.\n    1. `h`: short int or short unsigned. Example:\
    \ `%hd` or `%hu`.\n    2. `l`: a long int or long unsigned, or double (for `%f`\
    \ conversions.) Example: `%ld`, `%lu`, or `%lf`.\n    3. `L`: The value to be\
    \ parsed is a long for integer types or long double for float types. Example:\
    \ `%Ld`, `%Lu`, or `%Lf`.\n    4. `*`: Tells scanf() to do the conversion specified,\
    \ but not store it anywhere. This is what you use if you want scanf() to eat"
