    ```

    Employee payrate1 = new Employee( );


    Employee payrate2 = new Employee(2.0);


    Employee payrate3 = new Employee(3.0, “regular”);

    ```


    A constructor will also implicitly return void—that simply means it doesn’t have
    a return type. You can’t put a return statement inside the body of a constructor
    since it will be flagged by compilers as an error. The only way you can invoke
    a constructor is via the use of the “new” statement. We have already given you
    several ways how you can invoke constructors in the samples above.


    One final difference is that constructors can’t be inherited. Let’s go back to
    the examples provided above—the first line includes “Employee( );”—that is called
    a default constructor. As you can see, it has no parameters whatsoever. The job
    of a default constructor is to simply initialize the member variables to a specific
    default value. In the example above, the member variable payrate1 was initialized
    to its default pay rate and employee status.


    Can constructors be overloaded too? Yes, they can. Constructors behave like methods
    too, so that means you can overload a constructor just the same way you overload
    a method. Here are a few examples of how you can overload a constructor. We use
    the Employee class and overload it using different parameters.


    ```

    Employee( )


    Employee(int r)


    Employee(int r, String b)

    ```


    # How to initialize a variable


    Now that we know how to declare variables, and we know the various types of variables
    that are available to us, the next thing to do is to learn how to make use of
    these variables, in something called “expressions.” Expressions are the most used
    building blocks of a Java program, generally meant to produce a new value as a
    result, though in some cases, expressions are used to assign a new value to a
    variable. Generally, expressions are made up of'
  - '[PAGE 102]


    things such as values, variables, operators, and method calls. There are also
    some expressions that produce no result, but rather affect another variable. One
    example would be an expression that changes the value of a variable based on an
    operation: there is no new value output, and there is no true “assignment” of
    a new value, but rather there is what is called a side effect that results in
    a changed variable value.


    The "Hello World" printing program, we introduced raw values into the print function,
    also known as "hard coding" the output. However, at this point, we should try
    to incorporate what we have learned about variables. Variables operate much the
    same way as raw values, as they simply reference a previously stored value by
    the computer, and as such, the programmer can just use the variable name instead
    of the value. In order to demonstrate this, let us remember the previous "Hello
    World" program:


    ```

    print ("Hello World") ;


    input ("\n\nPlease press the return key to close this window.") ;

    ```


    Now, instead of hard—coding the "Hello World" string, we can simply declare it
    into a variable and have the program output that variable. This should end up
    looking as:


    ```

    String = "Hello World" ;


    print(string) ;


    input ("\n\nPlease press the return key to close this window.") ;

    ```


    This should come out with the same result as the previous program, looking something
