    \        destroy_tree( p_tree->p_right );\n        cout << \"Deleting node: \"\
    \ << p_tree->key_value;\n        delete p_tree;\n    }\n}\n```\n\nAs you can see,\
    \ the tree is deleted from the bottom up. Nodes 5 and 8 go first, then 6, before\
