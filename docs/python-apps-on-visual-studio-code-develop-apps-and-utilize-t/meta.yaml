    \ CPython3.10.3.final.0-64 in 9996ms\n  creator CPython3Windows(dest=X:\\FlaskApp\\\
    env, clear=False, no_vcs_ignore=False, global=False)\n  seeder FromAppData(download=False,\
    \ pip=bundle, setuptools=bundle, wheel=bundle, via=copy, app_data_dir=C:\\Users\\\
    HP\\AppData\\Local\\pypa\\virtualenv)\n    added seed packages: pip==23.1.2, setuptools==67.7.2,\
    \ wheel==0.40.0\n  activators BashActivator,BatchActivator,FishActivator,NushellActivator,PowerShellActivator,PythonActivator\n\
    ```\n\n图 11.2：创建虚拟环境\n\n此命令将创建一个新的虚拟环境并将其放置在当前目录中。\n\n激活虚拟环境：创建虚拟环境后，你需要激活它。为此，打开一个命令行窗口并输入以下内容：\n\
    \n```\nMac OS/Linux: source env/bin/activate\n```\n\n```\nWindows: env\\Scripts\\\
    activate\n```\n\n确保将 `env` 替换为你创建的环境名称。这将激活虚拟环境，你会在命令提示符旁边看到环境名称。在我们的例子中，它将是："
