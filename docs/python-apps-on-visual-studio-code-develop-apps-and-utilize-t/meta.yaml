    ## Continuous data


    Continuous data can take on any value within a range. Examples of continuous data
    include weight, temperature, time, and speed. They are measured and not counted,
    often represented by a continuous line graph. An example is the Cumulative Grade
    Point Average (CGPA) in a 5-point grading system that defines first-class students
    as those whose CGPA falls under 4.5 - 5.0, upper second-class as 3.50 - 4.49,
    lower second-class as 2.50 - 3.49, third class as 1.5 - 2.49, pass class as 1.00
    - 1.49 and fails as 0.00 - 0.9. Continuous data is uncountable finite.


    Continuous data can be subdivided into two types: interval and ratio data.


    ## Interval data


    Interval data is continuous quantitative data where the difference between two
    values has meaning. This data type is measured on an equal interval scale, meaning
    the difference between each set of values is consistently equal across the data
    set. Examples of interval data include temperature, height, and time. Interval
    data is numerical values that can take up only addition and subtraction operations.


    For example, the temperature measured in degrees Celsius (or Fahrenheit) is considered
    interval data, and this temperature does not have a zero point.


    Trend analysis on interval data is conducted by capturing data using an interval
    scale survey using the same question. It is one of the most popular analysis techniques
    to plot trends and insights by presenting data over a certain period. In Figure
    4.7 let us see the 5-year percentage trend in revenue (in USD) for Infosys:


    ![](img/9d64daa418450477b4b5cccad74a5f4b_229_0.png)


    ![](img/9d64daa418450477b4b5cccad74a5f4b_229_1.png)


    | | 2017 | 2018 | 2019 | 2020 | 2021 |

    |---|---|---|---|---|---|

    | Revenue | $10.2B | $10.9B | $11.8B | $12.8B | $13.6 B |

    | Revenue Growth % | 100% Base year | 107% | 108% | 108% | 106% |

    | Net Income | $2.1B | $2.5B | $2.2B | $2.3B | $2.6B |

    | Net Income Growth % | 100% Base year | 116% | 88% | 106% | 112% |


    Figure 4.7: 5-year trend example


    ## Ratio data


    Ratio data is continuous data with a zero point, for example, the temperature
    measured in Kelvin. Suppose we measure the temperature of two things as 10°C and
    20°C, respectively; it doesn’t mean that the second thing has two times higher
    temperature than the first one because 0°C doesn’t mean the absence of temperature.


    Cross-tabulation analysis technique can be a method to understand the relationship
    between multiple variables. The contingency table (or a crosstab) is used to establish
    a correlation between multiple ratio data variables in a tabular format. An example
    of a crosstab is shown in Figure 4.8. Crosstab can be used with any data level:
    ordinal or nominal; and it treats all data as nominal data (nominal data is not
    measured but categorized). For example, you can analyze the relation between two
    categorical variables like age and purchase made.


    Figure 4.8 shows a crosstab analysis based on two questions:


    What is the age of the respondent?


    Which electronic gadgets are they likely to buy in the next 1 month?


    | Age | Laptop | Phone | Tablet | Digital Camera |

    |---|---|---|---|---|

    | 20-25 | 38% | 29% | 31% | 12% |

    | 25-30 | 19% | 15% | 24% | 17% |

    | 30-35 | 23% | 19% | 11% | 27% |

    | 35-40 | 19% | 12% | 9% | 30% |

    | above 40 | 12% | 17% | 5% | 31% |


    ## Figure 4.8: Example of Cross Tabulation


    General characteristics/features of numerical data:


    - Numerical data is quantitative in nature.

    - You can perform arithmetic operations like addition and multiplication.

    - They can be both estimated and precise.

    - The difference between each interval on a numerical data scale is equal.

    - Numerical data can be visualized in different ways, depending on scatter plots,
    dot plots, stacked dot plots, histograms, and so on.


    ## Categorical data (or Qualitative data)


    Categorical data can be classified into distinct categories or groups, for example,
    gender, social class, ethnicity, and hometown. It is non-quantitative and great
    for grouping individuals or ideas with similar attributes, helping machine-learning
    models streamline data analysis.


    This can be further classified as nominal and ordinal data.


    ## Nominal data


    Nominal data represents values (or categories) that can be put in any order. It
    represents only the individual category or name and only represents quality and
    not information about the size of the difference. Values have no specific order
    and can be written in any order. Examples of such data are as follows:


    - {Male, Female}

    - {North Zone, South Zone, East Zone, West Zone}

    - {Maruti, Tata Motors, Mahindra, Toyota, Ford}


    ## Ordinal data


    Ordinals are categorical where the value follows some order and we can determine
    the direction of the difference of a variable, but we cannot determine the size
    of the difference. There is a meaning in the order, like Very Good would be greater
    than Good, but these are categorical because we do not know by how many times
    Very Good is greater than Good.


    For examples, refer to the various options mentioned here:


    Table 4.4: Students’ grade


    Table 4.5: Preferences


    We know the order in the ordinal data is like this:


    Excellent > Good


    The order is maintained no matter what value we assign to them. Categorical data
    can be summarized in a table that lists individual categories and their respective
    frequency count, for example, frequency distribution.


    One can also use a relative frequency distribution that lists the categories and
    proportion with which each occurs. Figure 4.9 depicts the frequency and relative
    frequency of the placement data of a business school. For example, it indicates
    that 73 students were placed in an accounting role, which constituted 28.9% of
    the entire student population.


    ### EXAMPLE: STUDENT PLACEMENT


    | Area | Frequency | Relative Frequency |

    | :--- | :--- | :--- |

    | Accounting | 73 | 28.9% |

    | Finance | 52 | 20.6% |

    | General Management | 36 | 14.2% |

    | Marketing / Sales | 64 | 25.3% |

    | Other | 28 | 11.1% |

    | **Total** | **253** | **100%** |


    Figure 4.9: Frequency Distribution Table


    Frequency and relative frequency distributions can also be summarized as bar and
    pie charts, respectively. Refer to Figure 4.10 for the visualization:


    ![](img/9d64daa418450477b4b5cccad74a5f4b_236_0.png)


    ![](img/9d64daa418450477b4b5cccad74a5f4b_236_1.png)


    Figure 4.10: Bar graph and pie chart from frequency distribution table


    ## Visualization for Data Analysis


    In this section, we will learn to use Matplotlib and Seaborn to visualize the
    data. The first plot we will discuss is scatter plot. A scatter plot shows the
    relationship between two datasets represented on the X and Y axes. They can be
    used to show trends, clusters, patterns, and relationships in a cloud of data
    points, especially a very large one.


    Problem: What causes Job Stress for Managers in Software Industry?


    Software engineers experience psychosocial work stress that may negatively affect
    physical and mental health over time. A researcher wants to study the impact of
    various factors on job stress for managers working in the software industry. They
    have identified three factors, family support, work-family conflict, and sleep,
    that can impact stress levels. They worked with 3683 respondents and documented
    the findings in They want to check if these factors can help us predict software
    engineers’ stress levels. Let us analyze the data using Python. Refer to the following
    steps:


    Define the problem


    Presented here are a few examples of the problem statement. You can develop your
    problem statements based on questions like the following:


    - Which factors help us influence the stress levels of managers in the software
    industry?

    - Can we predict the stress levels of managers working in the software industry
    based on family support, work-family conflict and sleep as factors?'
