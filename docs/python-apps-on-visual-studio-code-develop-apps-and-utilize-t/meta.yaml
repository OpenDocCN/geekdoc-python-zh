    \ == \"X\"):\n                print(\"You have already got that wrong.\")\n  \
    \          else:\n                print(\"You totally missed my battleship!\"\
    )\n                battle_pattern[input_row][input_col] = \"X \"\n           \
    \ print(\"Attempt : \",option + 1)\n            display(battle_pattern)\n```\n\
