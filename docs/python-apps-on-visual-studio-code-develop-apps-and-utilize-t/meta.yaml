    All disabled extensions remain disabled until the users choose to enable them.
    Users can re-enable the extensions with the enable or enable (workspace) commands
    available in the dropdown menu. To enable all extensions, you can choose the option
    from the command palette or from more actions which provides a dropdown menu.
    This is the quickest way to enable all the extensions.


