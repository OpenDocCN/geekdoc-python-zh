  md: '# Installing Python extension


    We will install the Python extension, which is a must to run Python programs from
    VS Code. The Python extension is helpful; it is what converts the lightweight
    VS Code editor into a powerful editor. It not only supports the Python language
    (for all actively supported versions of the language: >=3.7) but also includes
    features like IntelliSense (Pylance), linting, debugging, code navigation, code
    formatting, refactoring, variable explorer, and test explorer. We discussed these
    features in Chapter 1, Introduction to Visual Studio so if you missed it and are
    wondering what they means, you can revisit the previous chapter.


    You can run a Python file from VS Code by taking the Python interpreter’s help
    and ignoring the VS Code’s capabilities. Open your VS Code editor and select New
    File from the File menu. Type the following code in the editor:


