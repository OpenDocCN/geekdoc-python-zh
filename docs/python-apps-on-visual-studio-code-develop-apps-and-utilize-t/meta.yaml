  - '[PAGE 69]


    # Introduction


    The first chapter aimed to introduce you to the VS Code, and this chapter is about
    getting started. You must be excited to do the first program in Python on VS Code.
    That will also help us understand different concepts well. This chapter will use
    simple programming concepts to revise basic Python programs and VS Code features
    like task running, editing the default settings, getting to know keyboard shortcuts,
    and running a Python program. The first thing we must do is set up a working development
    environment. We will start with Python installation and VS Code installation,
    and then we will set up the Python environment. The second part of the chapter
    is about understanding the what and how of the global and virtual environment.
    You must be excited to build and debug our first Python program. Let us get started!'
- md: '## Structure


    In this chapter, we will discuss the following topics:


    - Setting up a working development environment

    - Installing Python extension

    - Project Work: Design a Simple Battleship Game

    - Setting up and configuring the editor

    - Keyboard arguments


    ## Objectives


    The objective of this chapter is to introduce simple programming concepts to revise
    basic Python programs, but before that, we need to familiarize ourselves with
    the VS Code features. You will look at tasks like debugging, task running, and
    version control, to name a few. We will demonstrate the concepts with the help
    of programs.


    ## Setting up a working development environment


    This section focuses on downloading and installing the VS Code, setting up the
    VS Code environment, setting up the Python environment, and writing our first
    program.


    ## Setting up a Python environment


    First, the Python interpreter needs to be installed. We must connect to python.org
    and select the correct installer based on your operating system. Python is also
    available in the Microsoft Store on Windows devices. If you are on Linux, you
    might have Python3. You can verify if Python is already installed on your computer
    by typing `python3 --version` in a terminal. If it gives an error, it means you
    need to install it.


    Follow these steps to install the software:


    Open your favorite browser, type download Python, and click on the first link
    that appears on your search result – it should take you to the Python website.
    Alternatively, you can directly enter the following address in the browser: https://www.python.org/downloads/


    Python interpreter is available for all the major platforms, including Windows,
    macOS, and Linux. Refer to the following figure:


    ![Screenshot from Python download web page](img/9d64daa418450477b4b5cccad74a5f4b_73_0.png)


    Figure: Screenshot from Python download web page


    ## Installing on Windows


    You can directly click on Download Python 3.11.0 or navigate to the Python Releases
    for Windows section and click the download link to get the latest Python 3 release.
    As of today, the latest version is Python 3.11.0. Select the Python installer
    executable for 32-bit or 64-bit and click on download. When the download is finished,
    move to the next step.


    Run the downloaded installer file by double-clicking on it. A dialog box similar
    to the one shown in Figure 2.2 will appear:


    ![Python interpreter installer](img/9d64daa418450477b4b5cccad74a5f4b_74_0.png)


    Figure: Python interpreter installer


    There are a few things one needs to know before clicking on Install Now to move
    ahead:


    Install Now shows where Python will be installed and run from.


    The Customize installation option customizes the location and additional installation
    features. We can also manage this later using the pip command.


    The Install launcher for all users (recommended) box is checked by default on
    the dialog box. It can be unchecked to restrict other users from launching Python.


    Add Python.exe to PATH (unchecked by default). Python allows the installation
    of multiple versions on a single machine, and different projects can connect to
    different versions of Python. This is possible by creating multiple virtual environments.
    We also create a global environment by adding Python.exe to PATH (under environment
    variables). If you are installing for the first time, then checking this option
    is recommended.


    Make the customization based on your needs and then click Install. Wait for the
    installation to complete. Refer to the following figure:


    ![Successful installation](img/9d64daa418450477b4b5cccad74a5f4b_76_0.png)


    Figure: Successful installation


    Now you have Python installed on your machine. We are ready to code Python!


    ## Installing on macOS


    Older macOS versions (up until macOS Catalina) came with Python 2 (an old and
    phased-out version). Python needs to be installed on new Mac machines. Installing
    Python from www.python.org (the official website) is the most reliable method.


    You can navigate to the Python Releases for macOS section and click the download
    link for the latest Python 3 release. As of today, the latest version is Python
    3.11.0. Click on download. When the download is finished, move to the next step.


    Run the macOS installer by double-clicking the file that was downloaded. You must
    click the Continue button a few times before agreeing to the software license
    agreement presented on the screen. Accept the agreement, and a window will pop
    up with details like install destination and how much space it will take, among
    other options. You can continue with the default location and click Install to
    proceed. The installer will finish copying files; you know this when you see the
    Close option. Click on Close to close the installer window. Congratulations! Python
    3 is now installed on your macOS computer.


    You can refer to the online tutorial to install Python interpreters on Linux/UNIX
    machines.


    ## Setting up VS Code Environment


    Let us shift our focus to installing and setting up VS Code environments. First,
    we will see how to download the VS Code and install it. Let us go step by step:


    Open your favorite browser and type download visual studio code. The first link
    you will see is https://code.visualstudio.com/


    Go to the link and choose the installer based on the operating system, as discussed
    in Chapter 1, Introduction to VS Code. VS Code is available for Windows, macOS,
    and Linux. Click on download based on the OS and the machine type. Refer to the
    following figure:


    ![VS Code download page](img/9d64daa418450477b4b5cccad74a5f4b_78_0.png)


    After the download is complete, install it like any other application. It is lightweight;
    the file size is less than 100 MB for Windows and Linux machines, and the Mac
    file could be about 200 MB. It is lightning fast to install. Refer to the following
    figure:


    ![Installing on Windows 10](img/9d64daa418450477b4b5cccad74a5f4b_79_0.png)


    Figure 2.5: Installing on Windows 10


    VS Code is now installed on your computer. Now you are ready to program.


    If you are planning to program in HTML, then you are ready to go, but we need
    to install a Python extension to develop Python applications.


    ## Installing Python extension


    We will install the Python extension, which is a must to run Python programs from
    VS Code. The Python extension is helpful; it is what converts the lightweight
    VS Code editor into a powerful editor. It not only supports the Python language
    (for all actively supported versions of the language: >=3.7) but also includes
    features like IntelliSense (Pylance), linting, debugging, code navigation, code
    formatting, refactoring, variable explorer, and test explorer. We discussed these
    features in Chapter 1, Introduction to Visual Studio Code, so if you missed it
    and are wondering what they mean, you can revisit the previous chapter.


    You can run a Python file from VS Code by taking the Python interpreter’s help
    and ignoring the VS Code’s capabilities. Open your VS Code editor and select New
    File from the File menu. Type the following code in the editor:


    ```python

    print("Hello from VS Code")

    ```


    Now, save this file to your desktop as Python files have the .py extension, so
    save it in this format.


    Next, click on the Terminal menu in VS Code, and you will see the Terminal window
    open at the bottom of your screen, similar to what you see in Figure 2.6.


    ![VS Code screen with Python code and Terminal open](img/9d64daa418450477b4b5cccad74a5f4b_81_0.png)


    Figure: VS Code screen with Python code and Terminal open


    In the terminal window, browse to desktop since our program is saved there. Then,
    type the following:


    ```bash

    py myfile1.py

    ```


    You will see the following output printed on the screen:


    ```

    Hello from VS Code

    ```


    This is shown in Figure 2.7.


    ![Screenshot of Terminal running Python program](img/9d64daa418450477b4b5cccad74a5f4b_82_0.png)


    Figure 2.7: Screenshot of Terminal running Python program


    In this example, we used the VS Code as a simple editor to write code and execute
    it on Terminal by calling the Python interpreter. This can be achieved using Notepad
    editor as well. In the next few sections, we will see how to install the Python
    extension on VS Code and use its features to enhance our code efficiency.


    Go to the extension tab (on the left side of the screen) and search for the Python
    extension. The first result, as shown in Figure 2.8, is what we need to install.
    Click on the Install option that would be displayed next to the extension. As
    soon as you do that, the Python extension gets installed.'
  mdcn: '## 结构


    本章将讨论以下主题：


    -   搭建可用的开发环境

    -   安装 Python 扩展

    -   项目实践：设计一个简单的战舰游戏

    -   设置和配置编辑器

    -   键盘参数


    ## 目标


    本章的目标是介绍简单的编程概念，以复习基础的 Python 程序，但在此之前，我们需要熟悉 VS Code 的功能。你将了解诸如调试、任务运行和版本控制等任务，仅举几例。我们将借助程序来演示这些概念。


    ## 搭建可用的开发环境


    本节重点介绍下载和安装 VS Code、设置 VS Code 环境、设置 Python 环境以及编写我们的第一个程序。


    ## 设置 Python 环境


    首先，需要安装 Python 解释器。我们必须访问 python.org，并根据你的操作系统选择正确的安装程序。在 Windows 设备上，也可以从 Microsoft
    Store 获取 Python。如果你使用的是 Linux，可能已经安装了 Python3。你可以通过在终端中输入 `python3 --version`
    来验证计算机上是否已安装 Python。如果出现错误，则表示你需要安装它。


    请按照以下步骤安装软件：


    打开你常用的浏览器，输入“下载 Python”，然后点击搜索结果中出现的第一个链接——它应该会带你到 Python 网站。或者，你可以直接在浏览器中输入以下地址：https://www.python.org/downloads/


    Python 解释器适用于所有主要平台，包括 Windows、macOS 和 Linux。请参考下图：


    ![Python 下载网页截图](img/9d64daa418450477b4b5cccad74a5f4b_73_0.png)


    图：Python 下载网页截图


    ## 在 Windows 上安装


    你可以直接点击“下载 Python 3.11.0”，或者导航到“Windows 版 Python 发布”部分，点击下载链接以获取最新的 Python 3 版本。截至今天，最新版本是
    Python 3.11.0。选择适用于 32 位或 64 位的 Python 安装程序可执行文件，然后点击下载。下载完成后，进入下一步。


    双击下载的安装程序文件以运行它。将出现一个类似于图 2.2 所示的对话框：


    ![Python 解释器安装程序](img/9d64daa418450477b4b5cccad74a5f4b_74_0.png)


    图：Python 解释器安装程序


    在点击“立即安装”以继续之前，有几件事需要了解：


    “立即安装”显示了 Python 的安装位置和运行位置。


    “自定义安装”选项可自定义位置和附加安装功能。我们也可以稍后使用 `pip` 命令来管理这些。


    对话框中的“为所有用户安装启动器（推荐）”框默认是选中的。可以取消选中以限制其他用户启动 Python。


    “将 Python.exe 添加到 PATH”（默认未选中）。Python 允许在单台机器上安装多个版本，不同的项目可以连接到不同版本的 Python。这是通过创建多个虚拟环境来实现的。我们也可以通过将
    Python.exe 添加到 PATH（在环境变量下）来创建全局环境。如果是首次安装，建议选中此选项。


    根据你的需求进行自定义，然后点击“安装”。等待安装完成。请参考下图：


    ![安装成功](img/9d64daa418450477b4b5cccad74a5f4b_76_0.png)


    图：安装成功


    现在你的机器上已经安装了 Python。我们准备好编写 Python 代码了！


    ## 在 macOS 上安装


    旧版本的 macOS（直到 macOS Catalina）自带 Python 2（一个旧的、已淘汰的版本）。新的 Mac 机器需要安装 Python。从 www.python.org（官方网站）安装
    Python 是最可靠的方法。


    你可以导航到“macOS 版 Python 发布”部分，点击最新 Python 3 版本的下载链接。截至今天，最新版本是 Python 3.11.0。点击下载。下载完成后，进入下一步。


    双击下载的文件以运行 macOS 安装程序。在同意屏幕上显示的软件许可协议之前，你必须点击几次“继续”按钮。接受协议后，将弹出一个窗口，其中包含诸如安装目标位置和所需空间等详细信息，以及其他选项。你可以使用默认位置，然后点击“安装”继续。安装程序将完成文件复制；当你看到“关闭”选项时，就知道完成了。点击“关闭”以关闭安装程序窗口。恭喜！Python
    3 现在已安装在你的 macOS 计算机上。


    你可以参考在线教程在 Linux/UNIX 机器上安装 Python 解释器。


    ## 设置 VS Code 环境


    让我们将重点转移到安装和设置 VS Code 环境上。首先，我们将了解如何下载和安装 VS Code。让我们一步一步来：


    打开你常用的浏览器，输入“下载 visual studio code”。你将看到的第一个链接是 https://code.visualstudio.com/


    访问该链接，并根据操作系统选择安装程序，如第 1 章“VS Code 简介”中所述。VS Code 适用于 Windows、macOS 和 Linux。根据操作系统和机器类型点击下载。请参考下图：


    ![VS Code 下载页面](img/9d64daa418450477b4b5cccad74a5f4b_78_0.png)


    下载完成后，像安装任何其他应用程序一样安装它。它很轻量；Windows 和 Linux 机器的文件大小小于 100 MB，Mac 文件可能约为 200 MB。安装速度极快。请参考下图：


    ![在 Windows 10 上安装](img/9d64daa418450477b4b5cccad74a5f4b_79_0.png)


    图 2.5：在 Windows 10 上安装


    VS Code 现在已安装在你的计算机上。现在你已准备好进行编程。


    如果你计划用 HTML 编程，那么你已经准备就绪，但我们需要安装 Python 扩展来开发 Python 应用程序。


    ## 安装 Python 扩展


    我们将安装 Python 扩展，这是从 VS Code 运行 Python 程序所必需的。Python 扩展很有用；它正是将轻量级的 VS Code 编辑器转变为强大编辑器的关键。它不仅支持
    Python 语言（支持所有当前受支持的版本：>=3.7），还包括诸如 IntelliSense（Pylance）、代码检查、调试、代码导航、代码格式化、重构、变量资源管理器和测试资源管理器等功能。我们在第
    1 章“Visual Studio Code 简介”中讨论了这些功能，因此如果你错过了并想知道它们的含义，可以回顾上一章。


    你可以借助 Python 解释器的帮助，忽略 VS Code 的功能，从 VS Code 运行 Python 文件。打开你的 VS Code 编辑器，从“文件”菜单中选择“新建文件”。在编辑器中输入以下代码：


    ```python

    print("Hello from VS Code")

    ```


    现在，将此文件保存到你的桌面，因为 Python 文件的扩展名是 `.py`，所以请以此格式保存。


    接下来，点击 VS Code 中的“终端”菜单，你将看到终端窗口在屏幕底部打开，类似于你在图 2.6 中看到的。


    ![带有 Python 代码和打开的终端的 VS Code 屏幕](img/9d64daa418450477b4b5cccad74a5f4b_81_0.png)


    图：带有 Python 代码和打开的终端的 VS Code 屏幕


    在终端窗口中，浏览到桌面，因为我们的程序保存在那里。然后，输入以下内容：


    ```bash

    py myfile1.py

    ```


    你将看到以下输出打印在屏幕上：


    ```

    Hello from VS Code

    ```


    这在图 2.7 中显示。


    ![运行 Python 程序的终端截图](img/9d64daa418450477b4b5cccad74a5f4b_82_0.png)


    图 2.7：运行 Python 程序的终端截图


    在这个例子中，我们将 VS Code 用作一个简单的编辑器来编写代码，并通过调用 Python 解释器在终端上执行它。使用记事本编辑器也可以实现这一点。在接下来的几节中，我们将了解如何在
    VS Code 上安装 Python 扩展，并使用其功能来提高我们的代码效率。


    转到扩展选项卡（在屏幕左侧）并搜索 Python 扩展。如图 2.8 所示的第一个结果就是我们需要安装的。点击扩展旁边显示的“安装”选项。一旦你这样做，Python
    扩展就会被安装。'
