- md: "If-blocks are logic statements used to control the flow of a program. They\
    \ are used to test conditions and execute different code depending on the result\
    \ of the test. An if-block consists of an if statement, followed by one or more\
    \ optional elif (else if) statements and an optional else statement.\n\nGenerally,\
    \ the syntax for an if-block in Python is as follows:\n\n```\nif condition1:\n\
    \    statement1\nelif condition2:\n    statement2\n    ...\nelse:\n    statementN\n\
    ```\n\nThe if statement contains a condition (condition1). If the condition evaluates\
    \ to True, the associated statement (statement1) is executed.\n\nIf the condition\
    \ evaluates to False, the statement is not executed, and the elif or else statement\
    \ is tested. If the condition in the elif statement evaluates to True, the associated\
    \ statement (statement2) is executed. This process is repeated until a condition\
    \ is found to be True or the else statement is reached.\n\nThe else statement\
    \ is optional and is used to execute code when no other condition evaluates to\
    \ True. If no conditions are found to be True, the code in the else block is executed.\n\
    \nAn if-block can contain any valid Python statements, including loops, function\
