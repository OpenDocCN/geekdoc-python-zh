    it:


    To insert a new node into a binary search tree, we first need to find the correct
    position of the new node. We do this by starting at the root node and then comparing
    the new node’s value to the root node’s value. If the new node is smaller than
    the root node, we move to the left subtree. If it is more extensive, we move to
    the right subtree. We repeat this process until we find an empty spot where the
    new node can be inserted.'
