    \ > 0:\n                    cnt += 1\n                i += 1\n        j += 1\n\
    \n    if ans > n:\n        return \"\"\n    return mainstr[start:start+ans]\n\
    ```"
  mdcn: "## 问题\n\n编写一个程序，在给定字符串中找到包含另一个字符串所有字符的最小窗口。\n\n## 理解问题\n\n当用户提供两个字符串，即主字符串和模式字符串时，任务是找到主字符串中包含模式字符串所有字符的最小子串。我们需要读取给定字符串的所有字符，并生成所有包含模式字符的子串。然后，我们需要打印出包含模式所有字符的最小子串。\n\
    \n## 示例\n\n我正在进行海鲜饮食。我看到食物就吃。\n\n模式：**fast**\n\n窗口：seafood diet\n\n窗口的最小长度为12。\n\
    \n所有正确的组合如图所示。给定字符串中具有该模式的最小子串是 seafood diet：\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_324_0.png)\n\
    \n图：所有正确的组合，其中长度最小的已高亮显示。\n\n## 所需数据结构\n\n我们将使用一个列表来处理数据，该列表将像一个映射一样工作，表示模式中可能输入的所有256个字符。索引将是字符，值将是计数。图6.2展示了该映射：\n\
    \n![](img/9d64daa418450477b4b5cccad74a5f4b_325_0.png)\n\n图：表示256个字符的映射。\n\n##\
    \ 算法\n\n这个问题看起来可能很简单。你会想到创建所有可能的子数组（长度可变），然后逐一检查它们，与模式进行比较。然后，在所有匹配的方式中，你会寻找长度，长度最小的那个就是我们的答案。然而，这将花费大量时间。就时间复杂度而言，创建不同的子数组需要\
    \ O(N*N) 的时间。然后，搜索模式还需要 O(N) 的时间。时间复杂度是算法完成其任务所需的时间。大O表示法是衡量算法时间复杂度的一种方式。它表示为\
    \ O(f(n))，其中 n 是完成算法所需的操作数。\n\n在后面的章节中，我们将看到如何使用大O表示法来比较两个算法的相对性能：第一个是我们刚才讨论的算法，另一个是滑动窗口技术。滑动窗口算法在这种情况下是首选算法，因为它\
    \ O(N) 的时间复杂度优于 O(N*N)。\n\n滑动窗口技术是一种算法设计技术，用于解决涉及序列的问题，例如字符串匹配，它将序列分解成小块，并每次移动一定数量的元素。滑动窗口算法听起来很复杂，但它是在你的数据部分上形成的一个窗口或段，在我们的例子中，数据是一个字符串。我们以增量方式在数据上移动这个窗口以执行一些计算，即找到最小窗口子串。这种技术有助于在大型数据集中找到模式，并解决有时间约束的问题。\n\
    \n窗口或段是一个可变长度的组，它从第一个值匹配的位置开始增加，一直增加到最后一个匹配点。我们每次将窗口大小增加一个元素。如图所示，当在主字符串中找到第一个字符匹配时，我们开始形成窗口，并一直增加到最后一个字符匹配。这里，当在索引2处找到\
    \ 'a' 时，发现了第一个匹配。一个窗口开始形成并增加，直到找到 't'。这是一个子数组，也是一个可能的解决方案。接下来，我们开始缩小这个窗口，从后面移除元素，直到找到下一个匹配。这次，我们得到了另一个从索引12到21的子数组。这是另一个子数组，并且它比第一个是更好的解决方案，因为这个子数组的大小是我们目前得到的最小值。我们继续构建窗口并改变它们的大小，直到所有元素都被考虑。\n\
    \n![](img/9d64daa418450477b4b5cccad74a5f4b_326_0.png)\n\n图：滑动窗口的工作原理。\n\n让我们使用我们的字符串和模式，逐步演练该算法：\n\
    \n让我们创建一个映射，以便在遍历主字符串时生成模式中所有字符的计数；我们将知道已经看到了多少个字符。我们得到 F=1, A=1, S=1, T=1。\n\n\
    我们需要使用几个不同的变量：\n\n首先，我们将声明 i 和 j 指针，指向索引 = 0。\n\n变量 count 将初始化为模式中唯一字符的数量，我们可以从映射中获取。所以，我们设置\
    \ count = 4（对应 FAST）。\n\n初始化一个 left 和 right 变量，用于在遍历字符串时跟踪我们遇到的最小子串位置。\n\nminlength\
    \ 变量用于跟踪 right 和 left 指针之间的差值，这将给我们字符串中的子串。最初，我们将它设置为比字符串长度大1，因为这表示一个非高效的解决方案。该步骤如图所示。\n\
    \nSTRING: i am on a seafood diet. i see food and i eat it.\n\nPATTERN: **fast**\n\
    \n**Count** = 4\n\n**i,j** = 0,0\n\nminLength = 14\n\n| Character | Count |\n\
    |---|---|\n| F | 1 |\n| A | 1 |\n| S | 1 |\n| T | 1 |\n\n**MAP**\n\n图：所有变量已初始化。\n\
    \nj 指针将从主字符串的索引0开始，当与映射中的变量匹配时停止。在我们的例子中，当 j 到达索引2时，有一个匹配（找到字符 A）。我们需要将映射中该字符的值减1。如果该值达到零，我们也将\
    \ count 减1，现在等于3。我们得到 A = 0 和 count = 3。我们需要继续寻找 T (=1) 以找到成功的最小窗口。\n\n我们继续移动\
    \ j 指针，寻找映射中的其他字符。j 将继续移动，直到索引21。当 j 到达索引8时，有另一个匹配；将 A 的计数减1，所以现在是 -1。count 值在这里不受影响，因为它只在映射中的值达到0时才减少，而不是其他任何数字（在这种情况下是\
    \ -1）。\n\n现在 j 移动到10，再次匹配。这次，S 的值变为0，所以 count 减1，现在是2。\n\nj 移动到12，映射中 A 的值变为 -2。\n\
    \n现在，j 移动到13，再次匹配。这次，F 的值变为零，所以 count 减1，现在变为1。\n\n现在 j 继续移动，直到索引21；T 变为0，count\
    \ 也变为0。这意味着我们找到了一个子数组。\n\n由于 i 小于21，它移动直到找到第一个匹配（在索引2处）。现在，映射中匹配字符 A 的计数增加1（现在为\
    \ -1）。计算 minlength 作为潜在解决方案。由于 A 是负数，表明还有另一个 A 值将具有更短的子数组。i 移动到10（A=0, count=0），现在\
    \ i 到达12，即映射中 A 值变为1且 count 设置为1时。这是第一个潜在解决方案（当 count 变为正数时）。计算 minlength 为 21-12\
    \ = 9（j=21, i=12），子数组是 \"seafood diet\"。\n\n此后，j 继续执行，重复相同的步骤，找到所有可能的子数组及其对应的长度。如果找到的下一个子数组长度小于前一个子数组，那么当前子数组成为潜在解决方案；否则，我们坚持之前的结果。当\
    \ j 到达字符串末尾时，算法结束。\n\n这就是滑动窗口算法如何在单个循环内找到解决方案；因此，时间复杂度是 O(N)。\n\n现在，让我们使用 Python\
    \ 代码实现上述逻辑：\n\n```python\ntotal_chars = 256\n#total 256 all possible characters\n\
    \ndef smallestWindow(mainstr, pattern):\n    n = len(mainstr)\n    if n < len(pattern):\n\
    \        return \"\"\n    mp = [0] * total_chars\n\n    # Starting index of ans\n\
    \    start = 0\n\n    # Length of ans\n    ans = n + 1\n    cnt = 0\n\n    # creating\
    \ map\n    for i in pattern:\n        mp[ord(i)] += 1\n        if mp[ord(i)] ==\
    \ 1:\n            cnt += 1\n\n    # References of Window: j will move by each\
    \ character\n    #i will be used to remove the duplicate entry\n    i, j = 0,\
    \ 0\n\n    # Traversing the window\n    while j < n:\n        # Calculating\n\
    \        mp[ord(mainstr[j])] -= 1\n        if mp[ord(mainstr[j])] == 0:\n    \
    \        cnt -= 1\n\n        # Condition matching\n        if cnt == 0:\n    \
    \        while i <= j and cnt == 0:\n                if j - i + 1 < ans:\n   \
    \                 ans = j - i + 1\n                    start = i\n           \
    \     mp[ord(mainstr[i])] += 1\n                if mp[ord(mainstr[i])] > 0:\n\
    \                    cnt += 1\n                i += 1\n        j += 1\n\n    if\
    \ ans > n:\n        return \"\"\n    return mainstr[start:start+ans]\n```"
