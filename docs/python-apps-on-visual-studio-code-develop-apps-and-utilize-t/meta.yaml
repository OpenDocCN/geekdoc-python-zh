    \ is complete. In Figure the Python extension has a gearbox indicating that it\
    \ is already installed on the local machine, whereas the C/C++ option has the\
    \ install option, which means it has not been installed. Clicking the install\
    \ button will install the C/C++ extension to run C/C++ programs on VS Code.\n\n\
    ## Step 4: Manage extensions"
  mdcn: "## 图 2.24：打开语言特定设置\n\n语言特定设置将仅显示该特定语言的可配置选项。我们将在第 3 章《VS Code 中的顶级扩展》中查看\
    \ Python 特定设置。\n\n## 设置与安全\n\n某些设置允许指定一个可执行的 VS Code，以便运行来执行某些操作。该设置允许选择集成终端将使用的\
    \ shell。可以理解的是，出于各种安全原因，此类设置只能在用户设置中定义，而不能在多个用户可以使用的工作区范围中定义。其他一些设置在工作区范围中也不可用，例如和。\n\
    \n## 键盘参数\n\n直观的键盘快捷键、易于自定义以及社区贡献的键盘快捷键映射，让你可以轻松地浏览代码。VS Code 提供了丰富、可定制且易于编辑的键盘快捷键。显示选项后，可以使用可用操作轻松更改、删除和重置其键绑定。显示键绑定列表也很容易；可以使用顶部的搜索框完成。搜索框有助于查找命令或键绑定并直接导航到它们。在\
    \ Windows 平台上使用 VS Code 的用户可以通过直接转到“首选项”|“键盘”菜单来打开此编辑器（macOS 用户可以通过转到“键盘”来完成）。\n\
    \n键映射扩展是一项很棒的功能，它将帮助其他编辑器的用户快速开始使用 VS Code 编辑器。任何想查看流行键映射扩展列表的人都可以转到“从...迁移键盘快捷键”。这将显示流行键映射扩展的列表。这些扩展修改了\
    \ VS Code 快捷键以匹配其他编辑器的快捷键，因此在切换到 VS Code 时，你不需要学习新的键盘快捷键。\n\n@recommended:keymaps\n\
