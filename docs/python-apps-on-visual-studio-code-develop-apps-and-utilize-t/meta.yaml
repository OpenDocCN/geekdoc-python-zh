    \ 50, text=\"问答游戏\")\n    # 第二个栏用于消息和接受输入\n    cs1 = Canvas(first)\n    cs1.create_text(200,\
    \ 100, text=\"你的姓名:\")\n    # 在文本框中接受姓名\n    name = Entry(first)\n```\n\n```python\n\
    # 添加按钮及其上的文本\nsub = Button(first, text=\"提交\", command=start_game)\nfirst.mainloop()\n\
    ```\n\n```python\n# 第二个窗口的开始\nif player_name:\n    root = Tk()\n```\n\n```python\n\
