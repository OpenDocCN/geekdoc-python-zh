    \ at the terminal, type the following:\n\n```bash\npip install voila\n```\n\n\
    Then, run the following command at the terminal to launch the dashboard in a web\
    \ browser:\n\n```bash\nvoila path/to/your/notebookfilename.ipynb\n```\n\nApart\
    \ from Panel and Voila, which we have used earlier, there are two popular dashboarding\
    \ frameworks available in Python: Streamlit and Plotly Dash. Readers are encouraged\
    \ to practice two other frameworks as well. Here is a brief description to just\
    \ understand these frameworks:\n\n- **Streamlit**: It turns Python scripts into\
    \ interactive dashboard applications, which are shareable as well.\n- **Dash**:\
    \ Dash is built on top of a JavaScript library for creating interactive, web-based\
    \ data visualizations. With Dash, users can create interactive, data-driven dashboards\
    \ and data visualizations that are responsive and look great on any device. Dash\
    \ also provides a wide range of user-friendly features, such as a drag-and-drop\
    \ GUI, built-in user authentication, and a range of powerful data manipulation\
    \ and plotting tools.\n- **Voilà**: It converts Jupyter Notebooks into standalone\
    \ interactive web-based dashboard applications, along with the exploratory data\
    \ analysis phase.\n- **Panel**: It is a flexible dashboard framework that works\
    \ the same in Python script files and Jupyter Notebook.\n\n## Conclusion\n\nIn\
    \ this chapter, we learnt to work with Jupyter Notebook and to create interactive\
    \ and shareable dashboard. Dashboards allow us to quickly identify areas with\
    \ high concentrations of cases, compare countries, and track the impact of interventions.\
