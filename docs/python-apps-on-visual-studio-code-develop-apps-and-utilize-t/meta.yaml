  md: '# Types of errors


    Errors in Python programs occur when the program encounters an unexpected situation
    that is beyond its capacity to handle. These errors can stem from syntax issues,
    runtime problems, or logical flaws. Programmers and developers tend to make three
    types of errors:


    Syntax Syntax errors are the basic type of error and occur when the programmer
    fails to follow the proper syntax for the language. This type of error will produce
    a Syntax error exception when the code is run. Examples of syntax errors include
    missing parentheses, incorrect indentation, and misspelled keywords.


    Runtime Runtime errors occur when the code is syntactically correct but fails
    to execute properly. These errors usually occur when the code tries to perform
    an action that it cannot, such as dividing by zero. These errors will produce
    a runtime error exception when the code is run.


    Logical errors: Logical errors occur when the code is syntactically correct and
    executes without producing any runtime errors, but the result is not what was
    intended. These errors are usually caused by incorrect logic in the code or incorrect
    assumptions about the data. These types of errors are often difficult to track
    down and fix.


    Now, that we understand the types of errors that can occur, let us look at how
    to debug in Python.'
  merge: -1
  pgno: 480
- img_proc: true
  md: '# Checking your code syntax


    When debugging a Python program, there are a few basic steps you can take to check
    your code syntax and identify any errors.


    Check your indentation: Python relies on indentation to denote the scope of code
    blocks and functions. Therefore, it is important to make sure all indentation
    is correct. If there are any errors in the indentation, your program may not run
    as expected.


    Check your variable names: It is important to make sure that all your variable
    names are correct and match up with the correct objects. This can help avoid errors
    such as trying to assign a value to a variable that does not exist.


    Check your syntax: Make sure all the syntax in your program is correct. This includes
    ensuring that all punctuation, brackets, and quotes are in the right places.


    Check your logic: Make sure the logic of your program is sound. This includes
    ensuring that loops are running correctly and conditions are checked correctly.


    Check your functions: Make sure all your functions are being called correctly
    and returning the expected results.


    Jupyter helps fix most of these things by highlighting the error in the code.'
  merge: -1
  pgno: 481
- img_proc: true
  md: '# Verifying the output


    Always test your program’s output by giving known values and verify that it works
    fine. While testing, make sure the following techniques are kept in mind:


    Functional tests: Functional tests are usually done by manually executing the
    application and verifying that the expected results are produced. Functional tests
    often involve a combination of manual and automated tests, such as test scripts,
    to ensure that all aspects of the system are tested.


    Algorithmic tests: Algorithmic tests are tests used to assess a person’s ability
    to think logically and solve complex problems. Check if the logic has been correctly
    and efficiently implemented.


    Positive tests: Positive testing is a form of software testing that aims to verifies
    that the functionality of a system or application confirms to its predetermined
    specifications. It involves testing the system with valid input to see if the
    expected output is produced. Positive testing, also known as confirmation testing,
    is used to ensure that a system works as expected.


    Negative tests: Negative testing is a type of software testing that involves testing
    the system by providing invalid or unexpected inputs to ensure that the system
    handles the input correctly. This type of testing helps ensure that the system
    can detect invalid inputs and respond accordingly. Negative testing is often used
    to identify boundary conditions, errors in input validation, and unexpected system
    behaviour.'
  merge: -1
  pgno: 482
- img_proc: true
  md: 'Boundary tests: Boundary tests (or edge case tests) verify the behaviour of
    a program or system when the inputs are at the boundaries of the range of valid
    inputs. These tests are designed to check how the system behaves when given values
    that are slightly beyond the normal range of inputs.


    Debugging can be a complicated process, but it will get easier with practice.
    We are suggesting some easy tips to follow to debug your program easily:


    Use print statements: Print statements are one of the most helpful tools when
    debugging in Python. By adding print statements to your code, you can see what
    is happening and determine where the error is occurring.


    Use a is a tool that allows you to step through your code line by line, which
    helps you to identify exactly where the error is occurring.


    Check for typos: Typos can often be the cause of errors. Make sure you double-check
    your code for any typos before running it.


    Simplify the code: If you are having trouble finding the error, try simplifying
    the code. This means removing any unnecessary code and making the code as simple
    as possible.


    With these tips, you can debug your code quickly and efficiently!'
