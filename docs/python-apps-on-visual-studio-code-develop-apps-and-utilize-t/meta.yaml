- md: '## Conclusion


    Threading in Python is used to run multiple threads (tasks, function calls) at
    the same time. This does not mean that they are executed on different CPUs. Python
    threads will not make your program faster if it already uses 100% CPU time. In
    that case, you probably want to look into parallel programming.


    Python threads are used in cases where the execution of a task involves some waiting.
    One example would be interaction with a service hosted on another computer, such
    as a web server. Threading allows Python to execute other code while waiting;
    this is easily simulated with the sleep function.


    Running several threads is similar to running several different programs concurrently,
    but with the following benefits:


    - Multiple threads within a process share the same data space with the main thread
    and can therefore, share information or communicate with each other more easily
    than if they were separate processes.

    - Threads are sometimes called light-weight processes, and do not require much
    memory overhead; they come cheaper than processes.

    - A thread has a beginning, an execution sequence, and a conclusion. It has an
    instruction pointer that keeps track of where within its context it is currently
    running.

    - It can be pre-empted (interrupted).

    - It can temporarily be put on hold (also known as sleeping) while other threads
    are running; this is called yielding.


    In conclusion, multi-threading is a useful way to improve the performance of an
    application by running multiple tasks simultaneously. It can be implemented at
    both the hardware and software levels and can help improve the efficiency of the
    program.


    Now, it is time to add some color to our work. In the next chapter, we will cover
    the building of an interactive dashboard. An interactive dashboard is important
    because it allows users to gain insights into their data quickly and efficiently.
    With dashboards, users can quickly visualize their data in simple, easy-to-read
    graphics. This allows them to quickly spot trends, outliers, or any other patterns
    that might not be apparent from simply looking at tables or lists of raw data.


    Join our book’s Discord space


    Join the book’s Discord Workspace for Latest updates, Offers, Tech happenings
    around the world, New Release and Sessions with the Authors:


    https://discord.bponline.com


    ![](img/9d64daa418450477b4b5cccad74a5f4b_414_0.png)


    ## Chapter 8


    ## Building an Interactive Dashboard using Jupyter Notebook


    Data-driven dashboards are the key to unlocking the powerful insights that can
    drive success.


    > — Satya Nadella, CEO of Microsoft


    ## Introduction


    Dashboards are the best way to analyze business data because they provide a comprehensive
    overview in an easy-to-understand, visual format. Dashboards present data in a
    way that is easy to digest and can provide insights that may not be obvious when
    looking at raw data. Dashboards also provide an interactive platform, allowing
    users to drill down into the data and view more detailed information or create
    reports. Dashboards can be customized to display the data that is most relevant
    to a business, allowing users to quickly identify issues and make informed decisions.
    They also provide a way to track performance over time, allowing businesses to
    quickly identify changes in trends or performance gaps.


    Jupyter Notebook with VS Code is a powerful combination for creating interactive
    dashboards. With Jupyter Notebook, you can easily create and share documents that
    contain live code, equations, visualizations, and explanatory text.


    ## Structure


    In this chapter, we will discuss the following topics:


    - Introduction to Jupyter Notebook

    - Setting up a Jupyter Notebook environment on VS code

    - Working with widgets and visualizations in Jupyter Notebook

    - Developing sample program using widgets and visualization

    - Project: Covid-19 Interactive dashboard


    ## Objectives


    The objective of this chapter is to introduce you to Jupyter Notebook on VS Code
    and create interactive dashboards using widgets. In this chapter, we will learn
    to create a COVID-19 dashboard that can help us access, understand, and share
    information about the coronavirus pandemic quickly and easily. In the process,
    we learn about libraries like Matplotlib, Seaborn and dashboarding frameworks
    like Panel and Voila. We will also learn to connect to the data sources, clean
    the data before using, and perform exploratory data analysis to understand more
    about the data.


    ## Introduction to Jupyter Notebook


    Jupyter Notebook is a web-based, open-source tool that allows you to create and
    share documents containing live code, equations, visualizations, and narrative
    text. It supports various programming languages, including Python, R, Julia, and
    Scala, and is widely used in data science, scientific computing, and machine learning.
    It is used by some of the world’s leading companies to power their data science
    and machine learning workflows. Jupyter Notebook provides an interactive environment
    with various features, including the following:


    - Code execution: You can execute code directly in your browser and see the results
    in real time.

    - Visualizations: Rich graphical outputs are supported, including interactive
    plots and maps.

    - Collaboration: Jupyter Notebook supports collaboration, allowing multiple users
    to work on the same notebook.

    - Notebook You can share your notebooks with others via the web or email.

    - Documentation: You can write narrative text, equations, and other information
    directly in your notebook, making it easier to document and share your work.


    Overall, Jupyter Notebook is a powerful tool for data science, scientific computing,
    and machine learning. It is easy to use, allows collaboration, and enables rapid
    prototyping and testing of ideas.


    ## Setting up a Jupyter Notebook environment on VS code


    You can use Jupyter Notebook in Visual Studio Code. Visual Studio Code has an
    extension for Jupyter Notebooks that allows you to easily create and edit Jupyter
    Notebooks. This extension allows you to easily access the Jupyter Notebook environment
    directly from Visual Studio Code, making it easier to work with large notebooks
    and complex code.


    The following are the steps to install Jupyter Notebook in a VS code:


    1. Open Visual Studio Code.

    2. Navigate to the Extensions tab in the left sidebar (or press Ctrl + Shift +
    X).

    3. Search for Jupyter in the search bar.

    4. Select the Jupyter extension from the list of results and click Install.

    5. After the installation is complete, click Reload to activate the extension.

    6. Open the Command Palette by pressing Ctrl + Shift + P.

    7. In the Command Palette, type Jupyter and select the Jupyter: Launch Notebook
    option.

    8. Select a directory to save the notebook, give it a name, and click Create.

    9. A new tab will open with the Jupyter Notebook, as shown in Figure 8.1.


    ![](img/9d64daa418450477b4b5cccad74a5f4b_422_0.png)


    Figure 8.1: Launching Jupyter notebook on VS Code


    You will see an option to create a new Jupyter notebook as shown in Figure 8.1.
    Click on Create New Jupyter Notebook to create a new file and save it as a .ipynb
    file.


    Then, write the code for your program in the cell of the newly created Jupyter
    Notebook.


    To execute the program, press the Run button at the top of the Notebook.


    The program will be executed, and you will be able to see the output in the output
    cell. A sample program and the output is shown in Figure 8.2.


    Save the Notebook.


    The running program will look as shown in the following figure:


    ![](img/9d64daa418450477b4b5cccad74a5f4b_423_0.png)


    Figure 8.2: An example program running in Jupyter notebook on VS Code


    Now we are ready to work with Jupyter Notebook in VS Code.


    Note: The mentioned installation steps may be slightly different if you are using
    macOS. On macOS, create a virtual environment (venv) and then install the Jupyter
    package. Once it is installed successfully, you can execute the Jupyter Notebook.


    ## Working with widgets and visualizations in Jupyter Notebook


    Widgets are interactive elements in Jupyter Notebooks that allow users to manipulate
    and visualize data in real time. By using widgets, users can interact with visualizations,
    plots, and images; filter and sort data; and even control the execution of code.
    Widgets are a part of the ipywidgets library, which is installed automatically
    when you install Jupyter Notebook. They are easy to use and can be used to quickly
    build interactive applications with very little code. In addition, widgets can
    be used with other libraries like matplotlib, pandas, and scikit-learn. They allow
    users to control the behavior of their code and the visualization of the data
    they are working with, making it easier to explore and understand the data.


    You need to import ipywidgets to use these widgets in the programs. In case you
    get a module not found error while running the widgets program, you will have
    to install ipywidgets library. Follow these steps to install the library:


    1. Install: Open the integrated terminal (Terminal > New Terminal or Ctrl + `)
    in VS Code and run the following command:


    ```

    pip install ipywidgets

    ```


    2. Enable: In the terminal, run this command:


    ```

    jupyter nbextension enable --py --sys-prefix widgetsnbextension

    ```


    3. Restart the kernel: Finally, you will need to restart the kernel to ensure
    that the extension is properly loaded. In the notebook, open the Kernel menu and
    select Restart.'
  mdcn: '## 结论


    Python 中的线程用于同时运行多个线程（任务、函数调用）。这并不意味着它们在不同的 CPU 上执行。如果程序已经使用了 100% 的 CPU 时间，Python
    线程不会让你的程序变得更快。在这种情况下，你可能需要研究并行编程。


    Python 线程用于任务执行涉及某些等待的情况。一个例子是与托管在另一台计算机上的服务进行交互，例如 Web 服务器。线程允许 Python 在等待时执行其他代码；这可以使用
    sleep 函数轻松模拟。


    运行多个线程类似于同时运行多个不同的程序，但具有以下优势：


    - 进程内的多个线程与主线程共享相同的数据空间，因此可以比独立进程更容易地共享信息或相互通信。

    - 线程有时被称为轻量级进程，不需要太多的内存开销；它们比进程更经济。

    - 线程有一个开始、一个执行序列和一个结束。它有一个指令指针，用于跟踪其上下文内当前正在运行的位置。

    - 它可以被抢占（中断）。

    - 它可以在其他线程运行时暂时挂起（也称为休眠）；这被称为让出。


    总之，多线程是通过同时运行多个任务来提高应用程序性能的有用方法。它可以在硬件和软件层面实现，并有助于提高程序的效率。


    现在，是时候为我们的工作增添一些色彩了。在下一章中，我们将介绍构建交互式仪表板。交互式仪表板很重要，因为它允许用户快速高效地洞察其数据。通过仪表板，用户可以快速以简单易读的图形可视化其数据。这使他们能够快速发现趋势、异常值或任何其他可能无法仅通过查看原始数据表格或列表明显看出的模式。


    加入我们书籍的 Discord 空间


    加入书籍的 Discord 工作区，获取最新更新、优惠、全球科技动态、新书发布以及与作者的交流会：


    https://discord.bponline.com


    ![](img/9d64daa418450477b4b5cccad74a5f4b_414_0.png)


    ## 第 8 章


    ## 使用 Jupyter Notebook 构建交互式仪表板


    数据驱动的仪表板是释放强大洞察力的关键，这些洞察力可以推动成功。


    > —— 萨提亚·纳德拉，微软首席执行官


    ## 简介


    仪表板是分析业务数据的最佳方式，因为它们以易于理解的视觉格式提供全面的概述。仪表板以易于消化的方式呈现数据，并可以提供在查看原始数据时可能不明显的洞察。仪表板还提供了一个交互式平台，允许用户深入查看数据，查看更详细的信息或创建报告。仪表板可以自定义以显示与业务最相关的数据，使用户能够快速识别问题并做出明智的决策。它们还提供了一种跟踪随时间变化的绩效的方式，使企业能够快速识别趋势变化或绩效差距。


    Jupyter Notebook 与 VS Code 的结合是创建交互式仪表板的强大组合。使用 Jupyter Notebook，你可以轻松创建和共享包含实时代码、方程式、可视化和解释性文本的文档。


    ## 结构


    在本章中，我们将讨论以下主题：


    - Jupyter Notebook 简介

    - 在 VS Code 上设置 Jupyter Notebook 环境

    - 在 Jupyter Notebook 中使用小部件和可视化

    - 使用小部件和可视化开发示例程序

    - 项目：Covid-19 交互式仪表板


    ## 目标


    本章的目标是向你介绍 VS Code 上的 Jupyter Notebook，并使用小部件创建交互式仪表板。在本章中，我们将学习创建一个 COVID-19
    仪表板，该仪表板可以帮助我们快速轻松地访问、理解和分享有关冠状病毒大流行的信息。在此过程中，我们将了解 Matplotlib、Seaborn 等库以及 Panel
    和 Voila 等仪表板框架。我们还将学习连接数据源、在使用前清理数据，并执行探索性数据分析以更深入地了解数据。


    ## Jupyter Notebook 简介


    Jupyter Notebook 是一个基于 Web 的开源工具，允许你创建和共享包含实时代码、方程式、可视化和叙述性文本的文档。它支持多种编程语言，包括
    Python、R、Julia 和 Scala，广泛应用于数据科学、科学计算和机器学习。它被一些世界领先的公司用于支持其数据科学和机器学习工作流程。Jupyter
    Notebook 提供了一个交互式环境，具有多种功能，包括以下内容：


    - 代码执行：你可以直接在浏览器中执行代码并实时查看结果。

    - 可视化：支持丰富的图形输出，包括交互式图表和地图。

    - 协作：Jupyter Notebook 支持协作，允许多个用户在同一个笔记本上工作。

    - 笔记本共享：你可以通过网络或电子邮件与他人共享你的笔记本。

    - 文档：你可以直接在笔记本中编写叙述性文本、方程式和其他信息，使记录和共享你的工作更容易。


    总的来说，Jupyter Notebook 是数据科学、科学计算和机器学习的强大工具。它易于使用，允许协作，并能快速原型设计和测试想法。


    ## 在 VS Code 上设置 Jupyter Notebook 环境


    你可以在 Visual Studio Code 中使用 Jupyter Notebook。Visual Studio Code 有一个用于 Jupyter
    Notebooks 的扩展，允许你轻松创建和编辑 Jupyter Notebooks。此扩展允许你直接从 Visual Studio Code 轻松访问 Jupyter
    Notebook 环境，使处理大型笔记本和复杂代码变得更容易。


    以下是在 VS Code 中安装 Jupyter Notebook 的步骤：


    1. 打开 Visual Studio Code。

    2. 导航到左侧边栏的“扩展”选项卡（或按 Ctrl + Shift + X）。

    3. 在搜索栏中搜索 Jupyter。

    4. 从结果列表中选择 Jupyter 扩展，然后单击“安装”。

    5. 安装完成后，单击“重新加载”以激活扩展。

    6. 按 Ctrl + Shift + P 打开命令面板。

    7. 在命令面板中，输入 Jupyter 并选择“Jupyter：启动笔记本”选项。

    8. 选择一个目录来保存笔记本，为其命名，然后单击“创建”。

    9. 将打开一个新选项卡，其中包含 Jupyter Notebook，如图 8.1 所示。


    ![](img/9d64daa418450477b4b5cccad74a5f4b_422_0.png)


    图 8.1：在 VS Code 上启动 Jupyter notebook


    你将看到一个创建新 Jupyter notebook 的选项，如图 8.1 所示。单击“创建新的 Jupyter Notebook”以创建一个新文件并将其保存为
    .ipynb 文件。


    然后，在新创建的 Jupyter Notebook 的单元格中编写程序代码。


    要执行程序，请按笔记本顶部的“运行”按钮。


    程序将被执行，你将能够在输出单元格中看到输出。示例程序和输出如图 8.2 所示。


    保存笔记本。


    运行的程序将如下图所示：


    ![](img/9d64daa418450477b4b5cccad74a5f4b_423_0.png)


    图 8.2：在 VS Code 上的 Jupyter notebook 中运行的示例程序


    现在我们已经准备好在 VS Code 中使用 Jupyter Notebook。


    注意：如果你使用的是 macOS，提到的安装步骤可能会略有不同。在 macOS 上，创建一个虚拟环境（venv），然后安装 Jupyter 包。成功安装后，你就可以执行
    Jupyter Notebook 了。


    ## 在 Jupyter Notebook 中使用小部件和可视化


    小部件是 Jupyter Notebooks 中的交互式元素，允许用户实时操作和可视化数据。通过使用小部件，用户可以与可视化、图表和图像交互；过滤和排序数据；甚至控制代码的执行。小部件是
    ipywidgets 库的一部分，当你安装 Jupyter Notebook 时会自动安装。它们易于使用，只需很少的代码即可快速构建交互式应用程序。此外，小部件可以与
    matplotlib、pandas 和 scikit-learn 等其他库一起使用。它们允许用户控制其代码的行为和正在处理的数据的可视化，使探索和理解数据变得更容易。


    你需要导入 ipywidgets 才能在程序中使用这些小部件。如果在运行小部件程序时遇到模块未找到错误，你将需要安装 ipywidgets 库。请按照以下步骤安装该库：


    1. 安装：在 VS Code 中打开集成终端（终端 > 新建终端或 Ctrl + `）并运行以下命令：


    ```

    pip install ipywidgets

    ```


    2. 启用：在终端中，运行此命令：


    ```

    jupyter nbextension enable --py --sys-prefix widgetsnbextension

    ```


    3. 重启内核：最后，你需要重启内核以确保扩展正确加载。在笔记本中，打开“内核”菜单并选择“重启”。'
