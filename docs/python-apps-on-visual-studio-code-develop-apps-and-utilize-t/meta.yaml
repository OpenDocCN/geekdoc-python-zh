    \ corruption. Reading data does not cause any harm but writing/editing can give\
    \ unexpected result. The readers-writers problem is a classic example of a multithreading\
    \ synchronization problem. It describes a situation wherein multiple threads try\
    \ to access a shared resource. The problem is that either readers or writers can\
    \ access the resource, but not both at the same time. This generally leads to\
    \ a condition in which writers need to wait for readers to finish before they\
    \ can write, or readers have to wait for writers to finish before they can read.\
    \ This results in one type of thread accessing a resource while it is locked or\
    \ blocked by another type. Let us take a simple implementation of the readers-writers\
    \ problem here. Consider the following Python program that lets both readers and\
    \ writers perform their tasks. When we run the following code multiple times,\
    \ we get different outputs:\n\n```python\nimport threading as thread\nimport time\n\
    \nglobal val #Shared value\nval = 0\n\ndef Reader():\n    global val\n    print(f\"\
    is Reading Shared Value: {val}\")\n\ndef Writer():\n    global val\n    print(f\"\
    is increasing value of val by\")\n    val += 1 #Write on the shared value\n  \
    \  print(f\"done: {val}\")\n\n#Driver code\nif __name__ == \"__main__\":\n   \
    \ for i in range(2):\n        ThreadA = thread.Thread(target=Reader)\n       \
    \ ThreadA.start()\n        ThreadB = thread.Thread(target=Writer)\n        ThreadB.start()\n\
    \n        ThreadA.join()\n        ThreadB.join()\n```\n\nNow, we will rewrite\
    \ the same code, treating the reading and writing portions of the code as critical\
