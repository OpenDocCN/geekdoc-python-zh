- md: 'Since we are not covering the basic programming concepts in detail in this
    book, readers are encouraged to refer to the basic programming textbook to understand
    these concepts. We recommend *Learn and Practice Python* by Swapnil but you can
    choose any other as well.


    ## Setting and configuring the editor


    VS Code can be customized to the core. It allows almost every component of the
    user interface and functional behavior to be customized to the programmer’s preferences
    through its various setting options. There are two important settings that one
    notices when the workspace is opened:


    - User Settings that care for users’ preferences are applied globally to any instance
    of VS Code the same user opens.

    - Workspace Settings specific to the particular workspace are stored inside the
    workspace, which are applied when the workspace is opened.


    Let us see how one can customize these settings.


    ## User setting


    User settings are customized by editing the settings editor settings. Here are
    the steps you can follow to open the settings editor:


    - Windows/Linux: Goto File | Preferences | Settings

    - macOS: Goto Code | Preferences | Settings


    A screen similar to Figure 2.15 will open:


    ![](img/9d64daa418450477b4b5cccad74a5f4b_105_0.png)


    Figure 2.15: Screenshot of User Settings


    One can also use the keyboard shortcut to open the settings editor by typing:
    in Windows and Command + , (comma) in Mac.


    In the search bar, one can discover the settings they want. While searching in
    the bar, one will notice that it will not only show and highlight the settings
    matching the criteria but also apply a filter to remove those not matching. This
    makes the search quick and easy to use.


    All the editor-related settings, such as settings groups, search, and filtering
    behave the same for user and workspace settings. For a given project workspace
    editor-related settings are given preference over user settings. Still, some application-related
    settings, such as updates and security, cannot be overridden by workspace settings.
    For this reason, one will not even be able to access these settings in workspace
    settings but are very much available in the user settings. One can see the list
    of settings available by clicking on the respective tabs for user and workspace,
    as shown in Figure


    Figure 2.16 shows all the options for font search results. When one changes here,
    it is applied to the VS Code immediately. One can also see all the settings that
    have been modified as they are indicated with a blue color box.


    ![](img/9d64daa418450477b4b5cccad74a5f4b_107_0.png)


    Figure 2.16: Search result for Font in User Settings


    Clicking on the gear icon will open a context menu with the option to reset the
    setting to its default value. This will undo all the changes made to the settings.
    This can also be used to copy the setting ID or JSON name-value pair.


    ![](img/9d64daa418450477b4b5cccad74a5f4b_107_1.png)


    Figure Gear icon presents reset setting to default and other options


    Settings generally have three options using which edits can be made. Settings
    can be edited by selecting given values from a checkbox or a dropdown or even
    entering the value using an input to change to the desired settings. Related settings
    are added together in groups and presented in a tree view so that it is easy to
    find and navigate to. Groups that show popular customizations are generally at
    the top. To the right of the search bar, one can see a funnel and filter buttons.
    Users can add several filters to the search bar to manage settings easier, as
    shown in Figure


    ![](img/9d64daa418450477b4b5cccad74a5f4b_108_0.png)


    Figure 2.18: Different filter options added to search bar


    The @modified filter is added in the Search bar shows the settings that have been
    configured. If the editor is not behaving as expected and the developer wants
    to check if this is because of customization or wrong configuration, this filter
    is useful.


    The following is the list of other VS Code filters:


    - Edit settings specific to any extension

    - Edit settings specific to a features subgroup, for example, File explorer

    - Find a setting based on the setting ID, for example, @id:workbench.activityBar.visible

    - Apply a language filter. Figure 2.19 shows the Filters in the Search bar:


    - @ext:

    - @feature:comments

    - @feature:debug

    - @feature:explorer

    - @feature:extensions

    - @feature:notebook

    - @feature:output

    - @feature:problems

    - @feature:remote

    - @feature:scm

    - @feature:search

    - @feature:task


    Figure 2.19: Filters included in the search bar


    VS Code extensions can also be edited with custom settings. These settings are
    visible under an extensions section. One can also review an extension’s settings.
    This can be done from the extensions view by selecting the extension and clicking
    on reviewing the feature contributions tab.


    So far, we are trying to edit the settings in UI, but there is a settings file
    where we can edit the values directly. The file is called To open the settings.json
    file, go to Preferences: Open Settings (JSON) command in the Command Palette (Ctrl+Shift+P).
    This is shown in Figure


    ![](img/9d64daa418450477b4b5cccad74a5f4b_111_0.png)


    Figure How to open JSON Settings in the Command Palette (Ctrl+Shift+P)


    One can review and edit this file. Figure 2.21 shows a sample settings.json file:


    ![](img/9d64daa418450477b4b5cccad74a5f4b_112_0.png)


    Figure Sample Settings (JSON) file


    Once the file is open in an editor, settings can be written in the JSON format.
    The JSON format has setting ID and its corresponding value. For example, Figure
    2.20 shows the applied theme in One can edit/delete/add a new ID and corresponding
    value to the settings. VS Code can return to the default settings when all the
    content between the two curly braces {} is deleted and the file is saved. Like
    code editor, the settings.json file also has full IntelliSense with smart completions
    settings. If any error creeps in due to an incorrect JSON style, the portion of
    the code also gets highlighted, just like a Python code. Some settings, such as
    Workbench: Color can only be edited in In Figure colorCustomization has been set
    to #4000ff, making line numbers appear in blue (hex equivalent color code).


    ![](img/9d64daa418450477b4b5cccad74a5f4b_113_0.png)


    Figure 2.22: colorCustomizations in Settings (JSON) file


    Earlier, we discussed that Settings will open the settings editor UI, but those
    who prefer to always work directly with the settings.json file can set the workbench.settings.editor:
    json option so that Preferences| Settings and keybinding Ctrl+ will always take
    you to the settings.json file.


    You can look for user settings file here:


    - On Windows platform: %APPDATA%\Code\User\settings.json

    - On macOS platform: $HOME/Library/Application\ Support/Code/User/settings.json

    - On Linux platform: $HOME/.config/Code/User/settings.json


    ## Workspace settings


    Workspace settings, unlike user settings, are not global; they are specific to
    a project. This allows settings to be shared across developers working on the
    same project. Workspace settings are always designed to override user settings.
    You can edit via the settings editor Workspace tab or open that tab directly with
    the preferences: open Workspace Settings command.


    ![](img/9d64daa418450477b4b5cccad74a5f4b_114_0.png)


    Figure Workspace settings


    Workspace Settings are stored in a settings.json file, just like user settings.
    This can be edited directly via the Preferences: Open Workspace Settings (JSON)
    command. If you are looking for the workspace settings file, you can find it in
    the folder in your root location. When a workspace settings


    settings.json file is added to the project or the source control, the settings
    for the project are shared with all the users of that project.


    We have been talking about workspace, but what is it? Workspace in VS Code is
    usually just your project root folder. All the workspace settings and configurations,
    like debugging and task configurations, are also stored at the root itself, in
    the .vscode folder. It is possible to have more than one root folder in a VS Code
    workspace through a feature called multi-root workspaces.


    Let us now turn our discussion toward language-specific editor settings. There
    are two different ways to open language-specific editor settings and customize
    them:


    - The first method is opening the settings editor, clicking the Filter button,
    and selecting the language option to add a language filter based on the programming
    languages.

    - The second available option is to directly type a language filter of the @lang:languageId
    form into the search widget option.


