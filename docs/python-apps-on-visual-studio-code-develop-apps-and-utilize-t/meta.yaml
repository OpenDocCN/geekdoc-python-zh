- md: "## Thread pooling with Python\n\nThread pooling is a way of executing multiple\
    \ threads simultaneously in a single application. It involves creating a pool\
    \ of threads that can be reused to execute a variety of tasks. This is useful\
    \ for applications that need to handle a large number of tasks concurrently, such\
    \ as web servers. The main advantage of thread pooling is that it allows efficient\
    \ utilization of system resources, such as CPU and memory, by avoiding the overhead\
    \ associated with creating and managing a large number of threads.\n\nThe pool\
    \ manages a fixed number of threads and controls when the threads are created,\
    \ such as just-in-time, when they are needed. The pool also decides what a thread\
    \ does when not in use, for example, making them wait without letting them consume\
    \ computational resources.\n\nThreads in the pool are called worker threads. Each\
    \ worker thread is agnostic to the type of tasks that are executed. They are designed\
    \ for reuse once the task is completed. It provides protection against the unexpected\
    \ failure of the task, like raising an exception, with no impact on the worker\
    \ thread itself. It is much more efficient to use a thread pool over the manual\
    \ process of starting, managing, and closing threads, more so when there are a\
    \ large number of tasks.\n\nPython provides a thread pool via the ThreadPool and\
    \ ThreadPoolExecutor classes. The main difference between the two is that ThreadPool\
    \ is a module from the Python standard library, while ThreadPoolExecutor is a\
    \ class from the concurrent.futures module, which is part of the Python 3.2+ standard\
    \ library. ThreadPool is a high-level interface that abstracts away the process\
    \ of creating and managing threads, making it easier to use. It provides a pool\
    \ of threads that can be used for executing tasks. The number of threads are created\
    \ at the time of class instantiation.\n\nThreadPoolExecutor is a more low-level\
    \ interface. It provides an executor that can be used to manage threads. It allows\
    \ more control over the thread pool, such as setting the maximum number of threads,\
    \ the minimum number of threads, and the maximum number of tasks that can be queued\
    \ up. It also provides methods for submitting tasks and retrieving the results.\n\
    \nThreadPoolExecutor class has three methods:\n\n- It takes a task to execute.\n\
    - It executes a task by element (iterable).\n- It shuts down the execution.\n\n\
    ThreadPool has many methods. Essentially, they work in four stages: create, submit,\
    \ wait, and shutdown.\n\nLet us implement a simple task to check whether the given\
    \ Wikipedia page exists. First, we will check without using thread, and then we\
    \ will run both ThreadPool and ThreadPoolExecutor. We will also record the time\
    \ taken to execute the program.\n\nHere are the libraries that we need:\n\n```python\n\
    from multiprocessing.pool import ThreadPool\nfrom concurrent.futures import ThreadPoolExecutor,\
    \ as_completed\nimport time\nimport requests\n```\n\nLet us write the function\
    \ (task) first, which looks something like the one that follows. Python List url_list\
    \ has the list of Uniform Resource Locator (URL) for which we will verify whether\
    \ pages for them exist or not.\n\n```python\nurl_list = [...]\n```\n\n```python\n\
    def is_wiki_page_exist(url):\n    response = requests.get(url)\n    page_status\
    \ = \"unknown\"\n    if response.status_code == 200:\n        page_status = \"\
    Exists\"\n    elif response.status_code == 404:\n        page_status = \"Can not\
    \ find\"\n    return url + \" - \" + page_status\n```\n\nNow, we will execute\
    \ the program without creating a thread:\n\n```python\n# 1: Running without threads\n\
    method1_start = time.time()\nfor url in url_list:\n    print(is_wiki_page_exist(url))\n\
    method1_end = time.time()\nprint(\"Time taken without threads:\", method1_end\
    \ - method1_start)\n```\n\nLet us see how we can manage the thread pool using\
    \ ThreadPoolExecutor:\n\n```python\n# 2: Using ThreadPoolExecutor\nmethod2_start\
    \ = time.time()\nwith ThreadPoolExecutor() as executor:\n    futures = []\n  \
    \  for url in url_list:\n        urls = url_list\n        futures.append(executor.submit(is_wiki_page_exist,\
    \ url))\n    for future in as_completed(futures):\n        print(future.result())\n\
    method2_end = time.time()\nprint(\"Time taken with ThreadPoolExecutor:\", method2_end\
    \ - method2_start)\n```\n\nLet us see how we can manage the thread pool using\
    \ ThreadPool:\n\n```python\n# 3: Using ThreadPool\nmethod3_start = time.time()\n\
    # create the thread pool: count exists\nwith ThreadPool() as pool:\n    # creating\
    \ the arguments\n    urls = []\n    for url in url_list:\n        args = [(url,)\
    \ for url in urls]\n    # dispatch all tasks\n    results = pool.starmap(is_wiki_page_exist,\
    \ args)\n    # report results in order\n    for result in results:\n        print(result)\n\
    method3_end = time.time()\nprint(\"Time taken with ThreadPool:\", method3_end\
    \ - method3_start)\n```\n\nUsing threads made the program dramatically faster.\
    \ Even for a small program where we are checking eight pages, we can see so much\
    \ improvement. Output from the code will be in the format shown in Figure.\n\n\
    ```\nTime taken without threads: 2.8822784423828125\nTime taken with ThreadPoolExecutor:\
    \ 0.6651451587677002\nTime taken with ThreadPool: 0.7278456687927246\n```\n\n\
    Figure: Time taken by the program to execute with no thread management and with\
    \ ThreadPool.\n\n## Multithreaded priority queue\n\nIt is a thread-safe implementation\
    \ of a priority queue in Python, which allows multiple threads to access and manipulate\
    \ the queue without any interference or race conditions. Priority queues in threading\
    \ are used to ensure that items with higher priority are processed first. For\
    \ example, in a web server, requests with higher priority can be processed first,\
    \ and requests with lower priority can wait until the higher priority requests\
    \ have been serviced. Priority queues in threading also provide an efficient way\
    \ to store and retrieve data in a multi-threaded application.\n\nA multithreaded\
    \ priority queue in Python can be implemented using the queue class from the Python\
    \ standard library. We will look at an example, where we create a random value\
    \ and random priority in producer() function. In this example, consumer() function\
    \ will consume the value with the highest priority first (which is the one with\
    \ the lowest priority number). Let us implement this with an example; the explanation\
    \ is given along with the code. As with any Python program, step 1 is to import\
    \ the required libraries.\n\n### Step 1: Import the required libraries\n\n```python\n\
    from queue import PriorityQueue\nfrom random import random, randint\nfrom threading\
    \ import Thread\nfrom time import sleep\n```\n\n### Step 2: Create the producer()\
    \ to generate random values and priority\n\nThe task here is to iterate 10 times\
    \ in a for loop, where each iteration will generate a new random value (using\
    \ `random()`) and priority, which is a random integer (created using `randint(0,\
    \ 10)`). The value and priority are paired into a tuple and passed to the priority\
    \ queue. Once the task is complete, the `join()` function blocks on the queue\
    \ until all items have been processed and marked as done by the consumer. This\
    \ is called a sentinel value and is a common way for threads to communicate via\
    \ queues to signal an important event, like a shutdown. It is important that we\
    \ send this signal after all items have been processed, as it will not be comparable\
    \ with our tuples, resulting in an exception. Now, let us look at the implementation:\n\
    \n```python\n# generates random numbers\ndef producer(pqueue):\n    # method is\
    \ running\n    # generate value\n    for i in range(10):\n        # creating work:\
    \ generating a random number\n        value = random()\n        # generating a\
    \ priority\n        priority = randint(0, 10)\n        print(f\"Value: {value}\
    \ : Priority = {priority}\")\n        # create tuple with priority and value\n\
    \        item = (priority, value)\n        # adding to the priority queue\n  \
    \      pqueue.put(item)\n    # wait for all items to be processed\n    pqueue.join()\n\
    \    # send sentinel value\n    pqueue.put(None)\n```"
  mdcn: "## 使用Python进行线程池管理\n\n线程池是在单个应用程序中同时执行多个线程的一种方式。它涉及创建一个可重复使用的线程池来执行各种任务。这对于需要同时处理大量任务的应用程序（如Web服务器）非常有用。线程池的主要优势在于，通过避免创建和管理大量线程所带来的开销，它能够高效地利用系统资源（如CPU和内存）。\n\
    \n线程池管理固定数量的线程，并控制线程的创建时机（例如在需要时即时创建）。线程池还决定线程在未使用时的行为，例如让它们等待而不消耗计算资源。\n\n池中的线程称为工作线程。每个工作线程对执行的任务类型是无关的。它们被设计为在任务完成后可重复使用。它提供了针对任务意外失败（如引发异常）的保护，而不会影响工作线程本身。与手动启动、管理和关闭线程的过程相比，使用线程池效率要高得多，尤其是在有大量任务时。\n\
    \nPython通过`ThreadPool`和`ThreadPoolExecutor`类提供线程池。两者的主要区别在于，`ThreadPool`是Python标准库中的一个模块，而`ThreadPoolExecutor`是`concurrent.futures`模块中的一个类，该模块是Python\
    \ 3.2+标准库的一部分。`ThreadPool`是一个高级接口，抽象了创建和管理线程的过程，使其更易于使用。它提供了一个可用于执行任务的线程池。线程数量在类实例化时创建。\n\
    \n`ThreadPoolExecutor`是一个更底层的接口。它提供了一个可用于管理线程的执行器。它允许对线程池进行更多控制，例如设置最大线程数、最小线程数以及可以排队的最大任务数。它还提供了提交任务和检索结果的方法。\n\
    \n`ThreadPoolExecutor`类有三个主要方法：\n\n-   它接受一个要执行的任务。\n-   它按元素（可迭代对象）执行任务。\n- \
    \  它关闭执行器。\n\n`ThreadPool`有许多方法。本质上，它们在四个阶段工作：创建、提交、等待和关闭。\n\n让我们实现一个简单的任务来检查给定的维基百科页面是否存在。首先，我们将在不使用线程的情况下进行检查，然后我们将同时运行`ThreadPool`和`ThreadPoolExecutor`。我们还将记录执行程序所需的时间。\n\
    \n以下是我们需要的库：\n\n```python\nfrom multiprocessing.pool import ThreadPool\nfrom concurrent.futures\
    \ import ThreadPoolExecutor, as_completed\nimport time\nimport requests\n```\n\
