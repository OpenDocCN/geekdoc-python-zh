- md: "## Create the Update() function\n\nAdd the update function to read the changes\
    \ in the widgets and update the dashboard:\n\n```python\ndef update_map(country,\
    \ category):\n    # Filter the dataframe based on the selected country and category\n\
    \    df_filtered = df_vaccination[\n        (df_vaccination['COUNTRY'] == country)\
    \ &\n        (df_vaccination['CATEGORY'] == category)\n    ]\n\n    # Get unique\
    \ values for the widgets\n    latitude = 60\n    longitude = 20\n    df_country\
    \ = df_filtered['COUNTRY'].unique()\n    df_category = df_filtered['CATEGORY'].unique()\n\
    \    cat_unique = df_filtered['WHO_REGION'].unique()\n    country_unique = df_filtered['COUNTRY'].unique()\n\
    \n    # Create the figure and axes\n    fig, (ax1, ax2) = plt.subplots(1, 2, figsize=(15,\
    \ 6))\n\n    # Create map and display it\n    country_map = folium.Map(location=[latitude,\
    \ longitude], zoom_start=2)\n    country_count = plugins.MarkerCluster().add_to(country_map)\n\
    \n    # Loop through the dataframe and add each data point to the mark cluster\n\
    \    for lat, lng, label in zip(df_filtered['LATITUDE'], df_filtered['LONGITUDE'],\
    \ df_filtered['COUNTRY']):\n        folium.Marker(\n            location=[lat,\
    \ lng],\n            popup=label\n        ).add_to(country_count)\n\n    # Show\
    \ map\n    display(country_map)\n\n    # Bar graph to show Fully Vaccinated Person\
    \ per 100\n    ax2.bar(country_unique, df_filtered['DOSES_ADMINISTERED_PER100'])\n\
    \    ax2.set_title('Vaccinated Person per 100')\n    ax2.set_xlabel('Country')\n\
    \    ax2.set_ylabel('Vaccinated Person per 100')\n    plt.xticks(rotation=45)\n\
    \    plt.tight_layout()\n    plt.show()\n```\n\nExecute the dashboard\n\nDisplay\
    \ the dashboard using the interactive() function of ipywidgets:\n\n```python\n\
    widgets.interactive(update_map, country=country_unique, category=cat_unique)\n\
