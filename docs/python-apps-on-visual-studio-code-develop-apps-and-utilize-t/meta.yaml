    )\n    else:\n        #C is higher than B\n        print(\"C variable is greatest!\"\
    )\nprint(\"Thank you for using our program\")\n```\n\nIn the preceding example,\
    \ we used Nested-IF condition. Nested if statements are if statements that are\
    \ the target of another if statement. They are useful when you want to check multiple\
    \ conditions at the same time. Nested if conditions are a frequently used piece\
    \ of code where the evaluation of one condition is necessary before a decision\
    \ can be made on another condition. In other words, nested if conditions are used\
    \ when a certain condition needs to be met before a certain action happens.\n\n\
    Here is how you can handle nested if conditions step-by-step:\n\nFirst, create\
    \ an If-Else statement and determine the condition you will be evaluating.\n\n\
    Next, inside the body of the If-Else statement, include an additional If-Else\
    \ statement. This nested If-Else statement should contain a second condition you\
    \ need to evaluate, which depends on the result of the first If-Else statement.\n\
    \nThen, add the code that will be executed if both Conditions 1 and 2 are met.\n\
    \nNext, include the necessary Else statements for Condition 1 and Condition 2,\
    \ which will be executed if either Condition 1 or Condition 2 is not met.\n\n\
    Finally, end the nested If-Else statement, and end the containing code block with\
    \ an end statement.\n\nAfter these steps, the nested if condition should be fully\
    \ functional and set up correctly, and the block of code should execute correctly.\n\
    \n## Iterating using Loop\n\nThere would be a situation while developing a logic\
    \ where there is a requirement of iterating over a sequence of code multiple times.\
    \ This is called a loop in programming terminology and Python, and it is achieved\
    \ using keywords WHILE and FOR. The while loop statement is when we do not know\
    \ how many times the statements need to be repeated but we have a condition until\
    \ which we need to execute the same block of code. A while state can sometimes\
    \ have an else clause, but that is not mandatory.\n\nWhen the number of times\
    \ statements need to be repeated is known, we prefer the for..in statement. The\
    \ range() function can be used to generate sequence to repeat. Range(5) will generate\
    \ values: 0,1,2,3,4 (0 is the starting value when not mentioned, the default increment\
    \ value is 1, and ending value always excludes the given number).\n\nBoth For\
    \ and While have defined ways to stop the iteration when work is done, but at\
    \ times, we have to stop the loop before that assigned value. This is where the\
    \ break statement comes into the picture. When the break statement is encountered,\
    \ the loop stops execution even if the while loop condition has not become false\
    \ or the for loop has not yet completed iteration over the sequences.\n\nThe continue\
    \ statement is used where there is a need to inform Python to skip executing the\
    \ rest of the statements in the current loop and go back to the beginning of the\
    \ loop.\n\nThe program will exit when it encounters the exit function without\
    \ continuing.\n\nLet us practice a program that uses the while loop to check the\
    \ size of the entered text:\n\n```\nwhile True:\n    #Directly using True instead\
    \ of a conditional statement\n    # will make it an infinite running loop\n  \
    \  s = input('Enter something: ')\n    if s.lower() == 'quit':\n        #lower()\
    \ will convert s content into lowercase\n        break\n    print(\"Length of\
    \ the given text is \", len(s))\nprint(\"Goodbye\")\n```\n\nThe preceding program\
    \ will continue to print the size of the text entered until it encounters the\
    \ quit statement. The lower function will convert the input variable into a small\
    \ case irrespective of what the user entered.\n\n## User-Defined Functions (UDFs)\n\
    \nFunctions are written once but are used in multiple places, so we call them\
    \ reusable pieces of programs. First, the function must be defined and named to\
    \ a block of statements. The def keyword is placed before the function name, followed\
    \ by an identifier name. Identifier is followed by a pair of parentheses that\
    \ may enclose some variables’ names (optional), and it ends with a colon. Next\
    \ comes the block of statements that are part of this function. Defining alone\
    \ does not make a function work; we need to call the function by name to run that\
    \ block. We have already seen the workings of many built-in functions, such as\
    \ print() and input(). In the battleship program, we created the get_random_row()\
    \ and get_random_col() user-defined functions to get values from the user. Let\
    \ us see an example:\n\n```\n#Define the function\ndef greet(name):\n    print(\"\
    Hello, \" + name + \". Have a good day!\")\n\n#calling the function\ngreet(\"\
    Sachin Tendulkar\")\n```\n\nThe preceding function is used to greet a person.\
    \ This function greets the person whose name is passed in as parameter to the\
    \ greet() function.\n\n## Using list in Python\n\nA list is a data structure that\
    \ holds an ordered collection of items, that is, you can store a sequence of items\
    \ in a list. The values are separated (comma) and enclosed within a pair of square\
    \ braces. Consider this example:\n\n```\nvar1 = [5,10,15,20] #List\n```\n\nSome\
    \ of the popular list methods are listed in the following table:\n\n| Method |\
    \ Description |\n| --- | --- |\n| append() | Adds an element at the end of the\
    \ list |\n| clear() | Removes all the elements from the list |\n| copy() | Returns\
    \ a copy of the list |\n| count() | Returns the number of elements with the specified\
    \ value |\n| extend() | Add the elements of a list (or any iterable), to the end\
    \ of the current list |\n| index() | Returns the index of the first element with\
    \ the specified value |\n| insert() | Adds an element at the specified position\
    \ |\n| pop() | Removes the element at the specified position |\n| remove() | Removes\
    \ the first item with the specified value |\n| reverse() | Reverses the order\
    \ of the list |\n| sort() | Sorts the list |\n\nTable 2.2: Important methods of\
    \ List datastructure\n\nLet us write a program and understand the list concepts:\n\
    \n```\nmonths = [\n    'January', 'February','March',\n    'April','May','June',\n\
    \    'July','August','September',\n    'October','November','December'\n]\nendings\
    \ = ['st', 'nd', 'rd'] + 17 * ['th'] + ['st', 'nd', 'rd'] + 7 * ['th'] + ['st']\n\
    year = input(\"Enter Year: \")\nmonth = int(input(\"Enter Month: \"))\nday = int(input(\"\
    Enter the Day: \"))\nmonth_no = months[month - 1]\ndays = str(day) + endings[day\
    \ - 1]\nprint(\"The date you have entered is \", days, \" \", month_no, \" \"\
    , year)\n```\n\nThe preceding program reads the date in year, month and day format\
    \ then returns it in a combined format, with the month number converted to words.\n\
    \n![Figure 2.14: Output of List Program](img/9d64daa418450477b4b5cccad74a5f4b_102_0.png)"
  mdcn: "If语句块是用于控制程序流程的逻辑语句。它们用于测试条件，并根据测试结果执行不同的代码。一个if语句块由一个if语句、一个或多个可选的elif（else\
    \ if）语句以及一个可选的else语句组成。\n\n通常，Python中if语句块的语法如下：\n\n```\nif condition1:\n    statement1\n\
    elif condition2:\n    statement2\n    ...\nelse:\n    statementN\n```\n\nif语句包含一个条件（condition1）。如果该条件求值为True，则执行关联的语句（statement1）。\n\
    \n如果条件求值为False，则不执行该语句，转而测试elif或else语句。如果elif语句中的条件求值为True，则执行关联的语句（statement2）。此过程会重复进行，直到找到一个求值为True的条件或到达else语句。\n\
    \nelse语句是可选的，用于在没有其他条件求值为True时执行代码。如果没有条件被发现为True，则执行else块中的代码。\n\n一个if语句块可以包含任何有效的Python语句，包括循环、函数调用和变量赋值。也可以嵌套if语句块，以实现更复杂的逻辑。\n\
    \n要检查单个条件，只需使用if语句；elif和else用于处理多个条件。\n\n让我们看一个例子，找出三个数中的最大值。该算法通过代码中添加的注释进行解释：\n\
    \n```\n#在3个变量中找出最大值\na,b,c = 55,44,33\nif a >= b:\n    if a >= c:\n        #A等于或大于所有给定值\n\
    \        print(\"A变量是最大的！\")\n    else:\n        #C更大，因此C是最大的\n        print(\"\
    C变量是最大的！\")\nelse:\n    #意味着B大于A\n    if b >= c:\n        #B是最大的\n        print(\"\
    B变量是最大的！\")\n    else:\n        #C大于B\n        print(\"C变量是最大的！\")\nprint(\"感谢使用我们的程序\"\
    )\n```\n\n在前面的例子中，我们使用了嵌套IF条件。嵌套if语句是指作为另一个if语句目标的if语句。当你想同时检查多个条件时，它们非常有用。嵌套if条件是一段常用的代码，其中在对另一个条件做出决策之前，必须先对一个条件进行求值。换句话说，当某个条件需要在某个动作发生之前被满足时，就会使用嵌套if条件。\n\
    \n以下是如何逐步处理嵌套if条件的方法：\n\n首先，创建一个If-Else语句，并确定你将要评估的条件。\n\n接下来，在If-Else语句的主体内，包含一个额外的If-Else语句。这个嵌套的If-Else语句应包含你需要评估的第二个条件，该条件取决于第一个If-Else语句的结果。\n\
    \n然后，添加当条件1和条件2都满足时将执行的代码。\n\n接下来，为条件1和条件2包含必要的Else语句，这些语句将在条件1或条件2不满足时执行。\n\n\
    最后，结束嵌套的If-Else语句，并用一个结束语句结束包含它的代码块。\n\n完成这些步骤后，嵌套的if条件应该已完全功能正常并正确设置，代码块应该能正确执行。\n\
    \n## 使用循环进行迭代\n\n在开发逻辑时，可能会遇到需要多次迭代一段代码序列的情况。这在编程术语和Python中称为循环，它通过关键字WHILE和FOR实现。while循环语句用于我们不知道语句需要重复多少次，但有一个条件需要执行相同代码块的情况。while语句有时可以有一个else子句，但这不是必需的。\n\
    \n当需要重复的语句次数已知时，我们更倾向于使用for..in语句。range()函数可用于生成要重复的序列。Range(5)将生成值：0,1,2,3,4（未提及起始值时默认为0，默认增量值为1，结束值始终不包括给定的数字）。\n\
    \nFor和While都有定义好的方式在工作完成时停止迭代，但有时我们必须在达到指定值之前停止循环。这就是break语句发挥作用的地方。当遇到break语句时，即使while循环条件尚未变为False或for循环尚未完成对序列的迭代，循环也会停止执行。\n\
    \ncontinue语句用于需要通知Python跳过执行当前循环中剩余语句并返回循环开头的情况。\n\n程序遇到exit函数时将退出，不再继续执行。\n\n\
    让我们练习一个使用while循环检查输入文本大小的程序：\n\n```\nwhile True:\n    #直接使用True而不是条件语句\n    #将使其成为一个无限运行的循环\n\
    \    s = input('请输入内容： ')\n    if s.lower() == 'quit':\n        #lower()会将s的内容转换为小写\n\
    \        break\n    print(\"给定文本的长度是 \", len(s))\nprint(\"再见\")\n```\n\n前面的程序将继续打印输入文本的大小，直到遇到quit语句。lower函数会将输入变量转换为小写，无论用户输入了什么。\n\
    \n## 用户定义函数（UDF）\n\n函数编写一次但可在多个地方使用，因此我们称它们为可重用的程序片段。首先，必须定义函数并为其命名一个语句块。def关键字放在函数名称之前，后跟一个标识符名称。标识符后跟一对括号，括号内可以包含一些变量名（可选），并以冒号结束。接下来是属于该函数的语句块。仅定义并不能使函数工作；我们需要通过名称调用函数来运行该语句块。我们已经看到了许多内置函数的工作原理，例如print()和input()。在战舰程序中，我们创建了get_random_row()和get_random_col()用户定义函数来从用户那里获取值。让我们看一个例子：\n\
    \n```\n#定义函数\ndef greet(name):\n    print(\"你好，\" + name + \"。祝你有美好的一天！\")\n\n\
    #调用函数\ngreet(\"Sachin Tendulkar\")\n```\n\n前面的函数用于问候一个人。该函数问候作为参数传递给greet()函数的人。\n\
    \n## 在Python中使用列表\n\n列表是一种数据结构，用于保存项目的有序集合，即你可以在列表中存储一系列项目。值用逗号分隔，并包含在一对方括号内。考虑这个例子：\n\
    \n```\nvar1 = [5,10,15,20] #列表\n```\n\n一些流行的列表方法列在下表中：\n\n| 方法 | 描述 |\n| --- |\
    \ --- |\n| append() | 在列表末尾添加一个元素 |\n| clear() | 从列表中移除所有元素 |\n| copy() | 返回列表的副本\
    \ |\n| count() | 返回具有指定值的元素数量 |\n| extend() | 将一个列表（或任何可迭代对象）的元素添加到当前列表的末尾 |\n\
    | index() | 返回具有指定值的第一个元素的索引 |\n| insert() | 在指定位置添加一个元素 |\n| pop() | 移除指定位置的元素\
    \ |\n| remove() | 移除第一个具有指定值的项目 |\n| reverse() | 反转列表的顺序 |\n| sort() | 对列表进行排序\
    \ |\n\n表2.2：列表数据结构的重要方法\n\n让我们编写一个程序来理解列表的概念：\n\n```\nmonths = [\n    'January',\
    \ 'February','March',\n    'April','May','June',\n    'July','August','September',\n\
    \    'October','November','December'\n]\nendings = ['st', 'nd', 'rd'] + 17 * ['th']\
    \ + ['st', 'nd', 'rd'] + 7 * ['th'] + ['st']\nyear = input(\"请输入年份： \")\nmonth\
    \ = int(input(\"请输入月份： \"))\nday = int(input(\"请输入日期： \"))\nmonth_no = months[month\
    \ - 1]\ndays = str(day) + endings[day - 1]\nprint(\"您输入的日期是 \", days, \" \", month_no,\
    \ \" \", year)\n```\n\n前面的程序以年、月、日格式读取日期，然后以组合格式返回，其中月份数字被转换为单词。\n\n![图2.14：列表程序的输出](img/9d64daa418450477b4b5cccad74a5f4b_102_0.png)"
