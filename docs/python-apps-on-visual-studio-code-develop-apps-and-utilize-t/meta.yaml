- md: "## Data abstraction\n\nData abstraction is the process of hiding the implementation\
    \ details from the user and providing only the functionality to the user. In Python,\
    \ data abstraction is provided by abstract classes and interfaces. Abstract classes\
    \ contain one or more abstract methods. Abstract methods must be implemented by\
    \ any non-abstract subclass. An interface class contains only abstract methods.\n\
    \nLet us consider an example to understand data abstraction. We have a class called\
    \ Shape which is an abstract class. It contains three methods: get_area(), get_perimeter(),\
    \ and draw(). The get_area() and get_perimeter() methods are abstract methods,\
    \ since they are not implemented in the Shape class. The draw() method is a concrete\
    \ method, as it is implemented in the Shape class:\n\n```python\nclass Shape:\n\
    \n    def get_area(self):\n        pass\n\n    def get_perimeter(self):\n    \
    \    pass\n\n    def draw(self):\n        print(\"Drawing a shape\")\n```\n\n\
    Now, let us create a subclass of Shape called Square. It implements the get_area()\
    \ and get_perimeter() methods, which are abstract methods of the Shape class:\n\
    \n```python\nclass Square(Shape):\n\n    def __init__(self, side):\n        self.side\
    \ = side\n\n    def get_area(self):\n        return self.side * self.side\n\n\
    \    def get_perimeter(self):\n        return 4 * self.side\n```\n\nIn this example,\
    \ the Square class implements the abstract methods of the Shape class. The user\
    \ of the Square class will only know that it is a shape and will not know how\
    \ it is implemented. This is data abstraction.\n\n## Encapsulation\n\nEncapsulation\
    \ is a mechanism of wrapping the data and the functions that operate on that data\
    \ within a single unit. This allows the programmer to protect the data from outside\
    \ interference and misuse and to easily reuse the code.\n\nFor example, let us\
    \ say we want to create a class that represents a vehicle. We can create a class\
    \ called Vehicle and add two data members to it: one for the make and one for\
    \ the model of the vehicle. We can also add a method to the class to calculate\
    \ the total cost of the vehicle:\n\n```python\nclass Vehicle:\n\n    def __init__(self,\
    \ make, model):\n        self.make = make\n        self.model = model\n\n    def\
    \ calculate_total_cost(self):\n        # calculate total cost here\n        return\
    \ 100\n```\n\nNow that we have our class, we can create an instance of the Vehicle\
    \ class and use it to represent a specific vehicle:\n\n```python\nmy_car = Vehicle(\"\
    Honda\", \"Civic\")\ntotal_cost = my_car.calculate_total_cost()\n```\n\nIn this\
    \ example, we have encapsulated the data (make and model) and the methods inside\
    \ the Vehicle class. This allows us to easily reuse the code and protect the data\
    \ from outside interference. Encapsulation is an important feature of object-oriented\
    \ programming, as it allows the programmer to create a well-structured, maintainable\
    \ program. It also allows the programmer to easily reuse code and protect data\
    \ from outside interference.\n\n## Modules\n\nThe module is a Python file that\
    \ contains code to perform a set of related tasks. A Python module may contain\
    \ variables, functions, classes, etc. Let us say your friend has written some\
    \ wonderful functions and classes, and you want to use the code from them. You\
    \ can ask them for the .py file and put that in the same folder as your file.\
    \ You can start using it by simply importing it into your code.\n\nLet us create\
    \ a dummy but working module ourselves by writing the following code in a file\
    \ called aboutme.py:\n\n```python\n# defining a class AboutMe\nclass AboutMe:\n\
    \    # defining the __init__ method\n    def __init__(self, name, city):\n   \
    \     self.name = name\n        self.city = city\n\n    # defining the getCity\
    \ method\n    def getCity(self):\n        return self.name + \" lives in the city\
    \ \" + self.city\n\n    # defining the function hello\n    def hobbies(self):\n\
    \        return \"I love playing badminton and have my interest in \" \\\n   \
    \            \"Creative arts, including writing and painting.\"\n\n# creating\
    \ a variable\nwork = 'I am a Technoculturist'\n\nif __name__ == \"__main__\":\n\
    \    print(\"This module is being invoked directly\")\n    # calling the function\
    \ hobbies()\n    hobbies()\n    # creating the object captain\n    captain = AboutMe(\"\
    Captain\", \"Mumbai\")\n    # calling the getCity() method for the object\n  \
    \  captain.getCity()\n    # printing the variable work present in aboutme.py\n\
    \    print(work)\n```\n\nWhen you execute the aboutme.py file, the content inside\
    \ the if condition will be executed. `__name__ == \"__main__\"` will result to\
    \ true because the Python interpreter reads the source file before executing and\
    \ defines a few special variables. One such variable is `__name__` which is set\
    \ to value `__main__` for the file that is directly called. When we execute the\
    \ condition becomes true, but when the same file is referenced from another Python\
    \ file, `__name__` will be set to the module’s name. The module’s name is available\
    \ as value to `__name__` global variable.\n\nNow, let us use this as a module\
    \ and call its member from a different file. Create another file though the name\
    \ does not matter in this case. Type the following code to call the members from\
    \ the aboutme.py file:\n\n```python\n# importing the module aboutme.py\n# Class,\
    \ Function and Variable all are now imported\nimport aboutme\n\n# calling the\
    \ function hobbies() from aboutme.py\naboutme.hobbies()\n\n# creating the object\
    \ captain of class AboutMe\ncaptain = aboutme.AboutMe(\"Captain\", \"Mumbai\"\
    )\n\n# calling the getCity() method for the object\ncaptain.getCity()\n\n# printing\
    \ the variable work present in aboutme.py\nprint(aboutme.work)\n```\n\nThe output\
    \ displayed is shown in Figure.\n\n![Figure Output of calling a module](img/9d64daa418450477b4b5cccad74a5f4b_194_0.png)\n\
    \nWe have seen how to add classes, variables, and functions to a module. Now,\
    \ let us see how modules are added together in a package.\n\n## Packages\n\nWe\
    \ all will work on big projects at some point in time, and that means dealing\
    \ with large amounts of code. Writing everything together in a single file will\
    \ make our code complex to handle. The recommended way is to separate the code\
    \ into multiple files, keep related codes together in packages, and use the package\
    \ when required in the projects. This is a great way to reuse the codes.\n\nOne\
    \ possible organization of packages and modules while developing a game could\
    \ look as shown in Figure.\n\n![Figure Package structure](img/9d64daa418450477b4b5cccad74a5f4b_195_0.png)\n\
    \nThe FunDo game directory has a file named `__init__.py` which is a must for\
    \ Python to consider it as a package. The developer has the option to leave this\
    \ file empty, but generally, they place the initialization code for the given\
    \ package in the `__init__.py` file.\n\nOne can import modules from packages using\
    \ the dot operator. For example, if we want to import the outfit module in the\
    \ preceding example, it can be done as follows:\n\n```python\nimport FunDo.Graphics.outfit\n\
    ```\n\nNow, if this module contains a function named `change_shoes`, we must use\
    \ the full name to reference it.\n\n```python\nFunDo.Graphics.outfit.change_shoes(\"\
    blues\")\n```\n\nThere is an alternate way to call the functions without giving\
    \ a lengthy name. This time, we give an alias to the import package, as follows:\n\
    \n```python\nimport FunDo.Graphics.outfit as fgo\n```\n\nWe now reference it as\
    \ follows:\n\n```python\nfgo.change_shoes(\"blues\")\n```\n\nWe can also call\
    \ them differently than what we have named, so that we do not have to give the\
    \ full package name while referencing, as follows:\n\n```python\nfrom FunDo.Graphics\
    \ import outfit\n```\n\nWe can now call the function simply as follows:\n\n```python\n\
    outfit.change_shoes(\"blues\")\n```\n\nAnother way of importing is to call the\
    \ required function from a module, as follows:\n\n```python\nfrom FunDo.Graphics.outfit\
    \ import change_shoes\n```\n\nNow we can directly call this function:\n\n```python\n\
    change_shoes(\"blues\")\n```\n\nAlthough this might look easier, it is not recommended.\
    \ Using the full namespace avoids confusion and prevents two same identifier names\
    \ from colliding."
  mdcn: "## 数据抽象\n\n数据抽象是向用户隐藏实现细节，仅向用户提供功能的过程。在Python中，数据抽象通过抽象类和接口来提供。抽象类包含一个或多个抽象方法。抽象方法必须由任何非抽象子类实现。接口类仅包含抽象方法。\n\
    \n让我们通过一个例子来理解数据抽象。我们有一个名为`Shape`的类，它是一个抽象类。它包含三个方法：`get_area()`、`get_perimeter()`和`draw()`。`get_area()`和`get_perimeter()`方法是抽象方法，因为它们在`Shape`类中没有实现。`draw()`方法是一个具体方法，因为它在`Shape`类中已经实现：\n\
    \n```python\nclass Shape:\n\n    def get_area(self):\n        pass\n\n    def\
    \ get_perimeter(self):\n        pass\n\n    def draw(self):\n        print(\"\
    Drawing a shape\")\n```\n\n现在，让我们创建一个`Shape`的子类，名为`Square`。它实现了`Shape`类的抽象方法`get_area()`和`get_perimeter()`：\n\
    \n```python\nclass Square(Shape):\n\n    def __init__(self, side):\n        self.side\
    \ = side\n\n    def get_area(self):\n        return self.side * self.side\n\n\
    \    def get_perimeter(self):\n        return 4 * self.side\n```\n\n在这个例子中，`Square`类实现了`Shape`类的抽象方法。`Square`类的用户只会知道它是一个形状，而不会知道它是如何实现的。这就是数据抽象。\n\
    \n## 封装\n\n封装是将数据和操作这些数据的函数包装在单个单元中的机制。这允许程序员保护数据免受外部干扰和误用，并轻松重用代码。\n\n例如，假设我们想创建一个表示车辆的类。我们可以创建一个名为`Vehicle`的类，并向其添加两个数据成员：一个用于车辆的品牌，一个用于车辆的型号。我们还可以向该类添加一个方法来计算车辆的总成本：\n\
    \n```python\nclass Vehicle:\n\n    def __init__(self, make, model):\n        self.make\
    \ = make\n        self.model = model\n\n    def calculate_total_cost(self):\n\
    \        # 在此处计算总成本\n        return 100\n```\n\n现在我们有了类，就可以创建`Vehicle`类的一个实例，并用它来表示一个特定的车辆：\n\
    \n```python\nmy_car = Vehicle(\"Honda\", \"Civic\")\ntotal_cost = my_car.calculate_total_cost()\n\
    ```\n\n在这个例子中，我们将数据（品牌和型号）和方法封装在`Vehicle`类内部。这使我们能够轻松重用代码并保护数据免受外部干扰。封装是面向对象编程的一个重要特性，因为它允许程序员创建结构良好、易于维护的程序。它还允许程序员轻松重用代码并保护数据免受外部干扰。\n\
    \n## 模块\n\n模块是一个Python文件，包含执行一组相关任务的代码。一个Python模块可以包含变量、函数、类等。假设你的朋友编写了一些出色的函数和类，你想使用他们的代码。你可以向他们索要`.py`文件，并将其放在与你的文件相同的文件夹中。你只需将其导入到你的代码中即可开始使用。\n\
    \n让我们通过在一个名为`aboutme.py`的文件中编写以下代码，来创建一个虚拟但可工作的模块：\n\n```python\n# 定义一个类 AboutMe\n\
    class AboutMe:\n    # 定义 __init__ 方法\n    def __init__(self, name, city):\n  \
    \      self.name = name\n        self.city = city\n\n    # 定义 getCity 方法\n   \
    \ def getCity(self):\n        return self.name + \" lives in the city \" + self.city\n\
    \n    # 定义函数 hello\n    def hobbies(self):\n        return \"I love playing badminton\
    \ and have my interest in \" \\\n               \"Creative arts, including writing\
    \ and painting.\"\n\n# 创建一个变量\nwork = 'I am a Technoculturist'\n\nif __name__\
    \ == \"__main__\":\n    print(\"This module is being invoked directly\")\n   \
    \ # 调用函数 hobbies()\n    hobbies()\n    # 创建对象 captain\n    captain = AboutMe(\"\
    Captain\", \"Mumbai\")\n    # 调用对象的 getCity() 方法\n    captain.getCity()\n    #\
    \ 打印 aboutme.py 中存在的变量 work\n    print(work)\n```\n\n当你执行`aboutme.py`文件时，`if`条件内的内容将被执行。`__name__\
    \ == \"__main__\"`的结果将为真，因为Python解释器在执行前会读取源文件并定义一些特殊变量。其中一个变量是`__name__`，对于直接调用的文件，它被设置为值`__main__`。当我们执行时，条件变为真，但当同一个文件被另一个Python文件引用时，`__name__`将被设置为模块的名称。模块的名称作为值提供给`__name__`全局变量。\n\
    \n现在，让我们将其用作模块，并从不同的文件调用其成员。创建另一个文件（尽管在这种情况下名称无关紧要）。输入以下代码以从`aboutme.py`文件调用成员：\n\
    \n```python\n# 导入模块 aboutme.py\n# 类、函数和变量现在都已导入\nimport aboutme\n\n# 从 aboutme.py\
    \ 调用函数 hobbies()\naboutme.hobbies()\n\n# 创建类 AboutMe 的对象 captain\ncaptain = aboutme.AboutMe(\"\
    Captain\", \"Mumbai\")\n\n# 调用对象的 getCity() 方法\ncaptain.getCity()\n\n# 打印 aboutme.py\
    \ 中存在的变量 work\nprint(aboutme.work)\n```\n\n显示的输出如图所示。\n\n![图 调用模块的输出](img/9d64daa418450477b4b5cccad74a5f4b_194_0.png)\n\
    \n我们已经了解了如何向模块添加类、变量和函数。现在，让我们看看如何将模块添加到包中。\n\n## 包\n\n我们都会在某个时候处理大型项目，这意味着要处理大量的代码。将所有内容写在一个文件中会使我们的代码变得复杂且难以处理。推荐的方法是将代码分离到多个文件中，将相关代码保留在包中，并在项目需要时使用该包。这是重用代码的好方法。\n\
    \n在开发游戏时，包和模块的一种可能组织方式如图所示。\n\n![图 包结构](img/9d64daa418450477b4b5cccad74a5f4b_195_0.png)\n\
    \nFunDo游戏目录中有一个名为`__init__.py`的文件，这是Python将其视为包所必需的。开发者可以选择将此文件留空，但通常，他们会在`__init__.py`文件中放置给定包的初始化代码。\n\
    \n可以使用点运算符从包中导入模块。例如，如果我们想导入前面示例中的`outfit`模块，可以这样做：\n\n```python\nimport FunDo.Graphics.outfit\n\
    ```\n\n现在，如果此模块包含一个名为`change_shoes`的函数，我们必须使用全名来引用它。\n\n```python\nFunDo.Graphics.outfit.change_shoes(\"\
    blues\")\n```\n\n有另一种方法可以调用函数而无需给出冗长的名称。这次，我们给导入的包一个别名，如下所示：\n\n```python\nimport\
    \ FunDo.Graphics.outfit as fgo\n```\n\n我们现在可以这样引用它：\n\n```python\nfgo.change_shoes(\"\
    blues\")\n```\n\n我们也可以用不同于我们命名的方式来调用它们，这样在引用时就不必给出完整的包名，如下所示：\n\n```python\nfrom\
    \ FunDo.Graphics import outfit\n```\n\n我们现在可以简单地调用该函数：\n\n```python\noutfit.change_shoes(\"\
    blues\")\n```\n\n另一种导入方式是从模块中调用所需的函数，如下所示：\n\n```python\nfrom FunDo.Graphics.outfit\
    \ import change_shoes\n```\n\n现在我们可以直接调用此函数：\n\n```python\nchange_shoes(\"blues\"\
    )\n```\n\n尽管这看起来更容易，但不推荐这样做。使用完整的命名空间可以避免混淆，并防止两个相同的标识符名称发生冲突。"
