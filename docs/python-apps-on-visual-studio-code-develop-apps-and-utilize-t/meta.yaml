    There are four important pillars of class and objects:\n\n- Inheritance\n- Polymorphism\n\
    - Data abstraction\n- Encapsulation\n\n## Inheritance\n\nInheritance is a process\
    \ by which objects of one class acquire the properties of the objects of another\
    \ class. Inheritance provides code reusability, makes it easier to create and\
    \ maintain an application. In this section, we will cover the basics of inheritance.\n\
    \n### What is inheritance in Python?\n\nInheritance is a way of creating a new\
    \ class (called a child class) from an existing class (called a parent class).\
    \ The child class will have the same properties and behaviors as the parent class,\
    \ but it can also have its own unique properties and behaviors. Inheritance provides\
    \ a way to reuse code from the parent class and extend it.\n\n### Syntax of Inheritance\n\
    \nIn Python, inheritance is specified using the following syntax:\n\n```python\n\
    class ChildClass(ParentClass):\n    # code\n```\n\nHere, `ChildClass` is the name\
    \ of the child class and `ParentClass` is the name of the parent class.\n\n###\
    \ How does inheritance work in Python?\n\nInheritance works by allowing a child\
    \ class to inherit the properties and behaviors of a parent class. When a child\
    \ class inherits a parent class, it automatically inherits the methods and attributes\
    \ of the parent class. This means the child class can use the inherited methods\
    \ and attributes without having to define them again.\n\nFor example, suppose\
    \ we have a class called `Animal` which has an attribute called `name` and a method\
    \ called `speak`. We can create a new class called `Dog` which inherits from `Animal`.\n\
    \n```python\n# Example of Inheritance in Python\n\nclass Animal:\n    def __init__(self,\
    \ name):\n        self.name = name\n\n    def speak(self):\n        print(\"%s\
    \ says 'hello!'\" % self.name)\n\nclass Dog(Animal):\n    def bark(self):\n  \
    \      print(\"%s barks 'woof!'\" % self.name)\n\n# Create an instance of the\
    \ Dog class\nd = Dog(\"Fido\")\n\n# Call the speak() method\nd.speak()\n# Output\n\
    # Fido says 'hello!'\n\n# Call the bark() method\nd.bark()\n# Output\n# Fido barks\
    \ 'woof!'\n```\n\nIn this example, we defined a class named `Animal` which has\
    \ an attribute called `name` and a method called `speak`. We then created a class\
    \ called `Dog` which inherits from `Animal`. This means that the `Dog` class gets\
    \ the methods and attributes of the `Animal` class automatically.\n\nWhen we create\
    \ an instance of the `Dog` class, we can call the `speak()` method inherited from\
    \ the `Animal` class, as well as the `bark()` method defined in the `Dog` class.\
    \ This is how inheritance works in Python.\n\nInheritance provides a number of\
    \ advantages, including the following:\n\n- **Code Reusability**: Inheritance\
    \ allows us to reuse existing code instead of having to write it from scratch.\
    \ This saves time and makes the code easier to maintain.\n- **Extensibility**:\
    \ Inheritance makes it easier to extend existing code instead of having to rewrite\
