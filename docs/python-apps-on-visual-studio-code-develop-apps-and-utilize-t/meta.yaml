- md: '## VS Code: Development view


    The development or implementation view illustrates a software system from a programmer’s
    perspective and is about software management. In this section, we will look at
    the architecture and software development process, how the code is structured,
    and how design and testing are performed.


    VS Code has a layered and modular core (folder location at github: These can be
    extended while using extensions. Extensions run in a separate process called the
    extension host and are implemented by utilizing the extension API. Built-in extensions
    are available in the extensions folder. Six core layers work together to make
    VS Code a powerful editor. These layers are shown in Figure


    ![](img/9d64daa418450477b4b5cccad74a5f4b_48_0.png)


    Figure VS Code Module Diagram


    Let us now understand the purpose of these layers:


    This folder has user interface building blocks and general utilities, which any
    other layer can use. This common environment approach provides, among others,
    the structure to handle errors, process events, and do other web-related things.
    In the common environment, the code ranges widely, from simple functions to reduce
    code duplication, such as returning a hash value for an object, to complex code
    that handles asynchronous processes. It also has other functionalities, such as:


    - Reading the configuration files,

    - Handling the checksum for encryption,

    - Character encoding and decoding,

    - Operating system functionalities for directory and file manipulation, and

    - Network handling to interact with the web.


    This layer defines service injection support and the base services for VS Code
    that are shared across layers, and it excludes editor or workbench-specific code
    or services. Most of the services around which the VS Code project is organized
    are defined in the platform layer. The platform layer builds upon the base layer,
    creates instances, and registers services for almost everything. Extensions are
    all instantiated and registered through the platform layer. The workbench layer
    is built upon the platform layer, which initializes much more details, like CSS,
    that are not handled by the platform.


    By now, we know that VS Code has a high-productivity code editor, which gives
    the power of an IDE and the efficiency of a text editor. Now, let us look how
    this is possible at all! The power behind VS Code editor is Monaco editor. Monaco
    started as a project at Microsoft’s Switzerland lab, which was part of a plan
    to build online development tools. It was built using TypeScript and launched
    in 2013. The first job of Monaco editor was as Azure’s website editing tool, and
    it was also used as the editor for Office 365’s extension development site. The
    editor layer handles everything from syntax highlighting for different languages
    to user input, like copying, pasting, and selecting text. Services defined in
    the editor layer can be used by the controllers to fetch certain data. One of
    these services is TextMate, which interprets grammar files for text highlighting.
    The final part of the editor layer is contributions. Contributions extend functionalities
    like hiding and unhiding (blocking) comments, code indentation, and the usage
    of links.


    It contains the Monaco editor and code notebooks. It also provides the framework
    for panels like the Explorer, Status Bar, or Menu Bar. It leverages the Electron
    framework to implement the VS Code desktop application and browser APIs for VS
    Code for the web. The actual GUI of the workbench is implemented using the electron-browser
    environment. When the main component fires up the workbench, the shell component
    is called first. The shell component has five components that constitute the actual
    workbench:


    - It handles the workbench in case of a crash.

    - It saves the settings of the workbench.

    - It handles the different keybindings that can be used in the workbench.

    - It handles the different extensions installed in the workbench.

    - It handles all sorts of actions that can be done in the workbench, such as zooming
    in/out, switching from the window, and opening a new window.


    It puts Electron main file, shared process, and the CLI together and forms the
    entry point to the desktop app.


    This forms the entry point to the server app for remote development.


    Extensions use the extension API and run in a separate process called the extension
    host. Inside each layer, VS Code is organized by the target runtime environment
    to ensure that only the runtime-specific APIs are used. The VS Code project has
    the following target environments:


    - Source code that needs only basic JavaScript APIs and runs in all the other
    target environments

    - Source code that requires the browser APIs

    - Source code that requires Nodejs APIs

    - Source code that requires the Electron renderer-process APIs

    - Source code that requires the Electron main-process APIs


    There are advantages to such a layered approach. It becomes easy to inject a service
    into VS Code.


    ## Standardization


    VS Code has a large, vibrant community of developers that helps find and resolve
    software bugs. Without following a standard process for coding and testing, it
    would become a mess to manage the code base. In this section, we will briefly
    see how a contributor can suggest new features, submit bug details, build extensions,
    comment on new ideas, or submit pull requests.


    But before you can proceed as a contributor, you need to understand the standard
    very well. VS Code has a wiki where developers can find information about the
    code base and instructions on how to work with the source code. A detailed explanation
    of how you can contribute and coding guidelines are listed on the wiki. It defines
    how code should be written to keep every file readable and maintainable.


    Visual Studio Code uses tools, called linters, to enforce the coding guidelines.
    These tools have configuration files and are set up in the Git root of VS Code.
    By installing these linters as extensions in Visual Studio Code, developers get
    notified by visualized errors and other kind-of messages in the editor.


    Visual Studio Code is tested by using the JavaScript testing framework Mocha.
    A smoke test is performed before each release. This smoke test is carried out
    to ensure that all major functionalities work as intended. VS Code uses Travis
    CI and Appveyor for continuous integration on GitHub. Travis CI is used for testing
    Linux and Mac OS builds, whereas AppVeyor runs the build test on Windows.


    ## Technical Debt


    Technical debt, also known as design debt or code debt in the software engineering
    world, is a concept that shows and reflects the extra development work that is
    a result of software developers choosing limited or easy development work to address
    an issue instead of using a better approach that would take longer time and possibly
    delay the release. Technical debt can also arise from implementing poor programming
    syntaxes, leading to poor code readability and difficulty in maintaining code
    later. The term ‘technical debt’ was coined by software developer Ward Cunningham,
    one of the 17 Agile Manifesto authors who created the first wiki. He first used
    the technical debt metaphor to explain the non-technical stakeholders at WyCash
    why they should invest in resources for code refactoring to improve the existing
    code and add new features.


    VS Code has multiple extensions available for the users to catch poor code, and
    manage and reduce technical debt. These extensions can be installed on demand.
    Some extensions that help in achieving better and efficient code are Stepsize,
    TODO Highlight, SonarLint, and Code Runner. A linter (or simple Lint) derives
    its name from a Unix utility originally written to manage C language source code,
    and it is a static code analysis tool. Linters highlight programming errors, bugs,
    coding standard errors, and possible construct errors. In the linters, the rules
    for naming conventions, type casting, and code styles are written to ensure that
    the contributors do not increase technical debt. If a developer pushing the code
    to VS Code GitHub, does not install linters, then they get notified by the pre-commit
    checks for the same. If these pre-commit checks fail,'
  mdcn: '## VS Code：开发视图


    开发或实现视图从程序员的角度展示软件系统，涉及软件管理。在本节中，我们将探讨架构和软件开发流程、代码结构以及设计和测试的执行方式。


    VS Code 拥有分层和模块化的核心（文件夹位置在 GitHub：这些可以通过扩展进行扩展。扩展在名为扩展宿主的独立进程中运行，并通过扩展 API 实现。内置扩展位于扩展文件夹中。六个核心层协同工作，使
    VS Code 成为一个强大的编辑器。这些层如图所示


    ![](img/9d64daa418450477b4b5cccad74a5f4b_48_0.png)


    图 VS Code 模块图


    现在让我们了解这些层的用途：


    此文件夹包含用户界面构建块和通用工具，任何其他层都可以使用。这种通用环境方法提供了，除其他外，处理错误、处理事件以及执行其他 Web 相关任务的结构。在通用环境中，代码范围广泛，从简单的函数以减少代码重复（例如为对象返回哈希值），到处理异步过程的复杂代码。它还具有其他功能，例如：


    - 读取配置文件，

    - 处理加密的校验和，

    - 字符编码和解码，

    - 用于目录和文件操作的操作系统功能，以及

    - 用于与 Web 交互的网络处理。


    此层定义了服务注入支持和 VS Code 的基础服务，这些服务跨层共享，并排除了编辑器或工作台特定的代码或服务。VS Code 项目围绕的大多数服务都在平台层中定义。平台层建立在基础层之上，创建实例并为几乎所有内容注册服务。扩展全部通过平台层实例化和注册。工作台层建立在平台层之上，初始化了更多细节，例如
    CSS，这些细节不由平台处理。


    到目前为止，我们知道 VS Code 拥有高生产力的代码编辑器，它提供了 IDE 的强大功能和文本编辑器的效率。现在，让我们看看这一切是如何可能的！VS Code
    编辑器背后的强大功能是 Monaco 编辑器。Monaco 最初是微软瑞士实验室的一个项目，是构建在线开发工具计划的一部分。它使用 TypeScript 构建，并于
    2013 年推出。Monaco 编辑器的第一个工作是作为 Azure 的网站编辑工具，它也被用作 Office 365 扩展开发站点的编辑器。编辑器层处理从不同语言的语法高亮到用户输入（如复制、粘贴和选择文本）的所有内容。编辑器层中定义的服务可供控制器用来获取某些数据。其中一项服务是
    TextMate，它解释用于文本高亮的语法文件。编辑器层的最后一部分是贡献。贡献扩展了诸如隐藏和取消隐藏（阻止）注释、代码缩进以及链接使用等功能。


    它包含 Monaco 编辑器和代码笔记本。它还为资源管理器、状态栏或菜单栏等面板提供框架。它利用 Electron 框架来实现 VS Code 桌面应用程序和用于
    Web 的 VS Code 的浏览器 API。工作台的实际 GUI 是使用 electron-browser 环境实现的。当主组件启动工作台时，首先调用 shell
    组件。shell 组件有五个组件构成实际的工作台：


    - 它在崩溃时处理工作台。

    - 它保存工作台的设置。

    - 它处理可在工作台中使用的不同键绑定。

    - 它处理安装在工作台中的不同扩展。

    - 它处理可在工作台中执行的各种操作，例如放大/缩小、切换窗口和打开新窗口。


    它将 Electron 主文件、共享进程和 CLI 组合在一起，形成桌面应用程序的入口点。


    这构成了用于远程开发的服务器应用程序的入口点。


    扩展使用扩展 API 并在名为扩展宿主的独立进程中运行。在每一层内部，VS Code 按目标运行时环境组织，以确保仅使用特定于运行时的 API。VS Code
    项目具有以下目标环境：


    - 仅需要基本 JavaScript API 并在所有其他目标环境中运行的源代码

    - 需要浏览器 API 的源代码

    - 需要 Nodejs API 的源代码

    - 需要 Electron 渲染器进程 API 的源代码

    - 需要 Electron 主进程 API 的源代码


    这种分层方法有其优势。将服务注入 VS Code 变得容易。


    ## 标准化


    VS Code 拥有一个庞大而活跃的开发者社区，帮助发现和解决软件缺陷。如果不遵循编码和测试的标准流程，管理代码库将变得一团糟。在本节中，我们将简要了解贡献者如何建议新功能、提交缺陷详情、构建扩展、评论新想法或提交拉取请求。


    但在您作为贡献者继续之前，您需要很好地理解标准。VS Code 有一个维基，开发者可以在其中找到有关代码库的信息以及如何使用源代码的说明。维基上列出了您可以如何贡献的详细说明和编码准则。它定义了应如何编写代码以保持每个文件的可读性和可维护性。


    Visual Studio Code 使用称为 linter 的工具来强制执行编码准则。这些工具具有配置文件，并在 VS Code 的 Git 根目录中设置。通过在
    Visual Studio Code 中将这些 linter 安装为扩展，开发者会在编辑器中收到可视化的错误和其他类型的消息通知。


    Visual Studio Code 使用 JavaScript 测试框架 Mocha 进行测试。在每次发布之前都会执行冒烟测试。执行此冒烟测试是为了确保所有主要功能按预期工作。VS
    Code 使用 Travis CI 和 Appveyor 在 GitHub 上进行持续集成。Travis CI 用于测试 Linux 和 Mac OS 构建，而
    AppVeyor 在 Windows 上运行构建测试。


    ## 技术债务


    技术债务，在软件工程领域也称为设计债务或代码债务，是一个概念，它显示并反映了由于软件开发人员选择有限或简单的开发工作来解决问题，而不是使用可能耗时更长并可能延迟发布的更好方法而导致的额外开发工作。技术债务也可能源于实现不良的编程语法，导致代码可读性差以及后续维护代码困难。术语“技术债务”由软件开发者
    Ward Cunningham 创造，他是创建第一个维基的 17 位敏捷宣言作者之一。他首次使用技术债务隐喻向 WyCash 的非技术利益相关者解释为什么他们应该投资资源进行代码重构以改进现有代码并添加新功能。


    VS Code 有多个扩展可供用户使用，以捕获不良代码，并管理和减少技术债务。这些扩展可以按需安装。一些有助于实现更好和更高效代码的扩展是 Stepsize、TODO
    Highlight、SonarLint 和 Code Runner。Linter（或简称 Lint）的名称源自最初用于管理 C 语言源代码的 Unix 工具，它是一个静态代码分析工具。Linter
    突出显示编程错误、错误、编码标准错误和可能的构造错误。在 linter 中，命名约定、类型转换和代码样式的规则被编写，以确保贡献者不会增加技术债务。如果开发者将代码推送到
    VS Code GitHub 时未安装 linter，那么他们会收到预提交检查的相同通知。如果这些预提交检查失败，'
