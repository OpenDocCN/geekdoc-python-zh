  md: '# Performance and Scalability


    The source code for any software can get much larger and more complex. Code editors’
    performance and scalability have become very important considerations for the
    development team. Performance is an indication of the responsiveness of a system
    to execute any action within a given time interval, while scalability is the ability
    of a system either to handle increases in load without impact on performance or
    for to increase the available resources. Let us look at a few factors considered
    while choosing VS Code over other editors.'
  merge: -1
  pgno: 58
- img_proc: true
  md: '# Desired quality


    The desired quality of Visual Studio Code is to be a lightweight code editor while
    supporting multiple programming languages. Language support will include debugging,
    implementation, and displaying results regardless of the type of application.'
  merge: -1
  pgno: 59
- img_proc: true
  md: '# Applicability


    It is recommended to use a processor of 1.6GHz or faster and at least 1 GB of
    RAM. Though the performance of Visual Studio Code itself is tested and known,
    there are elements like extensions, whose performance is unknown. This is so because
    the extensions available on the marketplace are developed by third-party developers
    and they do not necessarily test on various platforms and different conditions.'
  merge: -1
  pgno: 60
- img_proc: true
  md: '# Concerns


    One of the biggest concerns for Visual Studio Code is the response time. It is
    important that users do not have to wait long to open files, since this reduces
    the time they can spend on productive tasks like software development. This response
    time can be combined with the peak load behavior when large files are opened.
    This causes third-party behavior concerns since the whole file needs to be loaded
    at once. To reduce these concerns, Visual Studio Code tries to tackle the predictability
    concern by providing stable releases every month.'
  merge: -1
  pgno: 61
- img_proc: true
  md: '# Tactics


    Tactics in Visual Studio Code refer to a set of strategies or techniques that
    can be used to improve productivity and efficiency while working with the code
    editor. Visual Studio Code tries to optimize processing is by spending an entire
    week after a release to test and optimize the implementation. Some parts of the
    code may be rushed to ship with the release. Since Visual Studio Code depends
    on certain frameworks such as IntelliSense, which can make large files difficult
    to handle. In such cases, prioritization of code becomes important. Modules are
    divided into different layers, base and common, to minimize the use of shared
    resources. Visual Studio Code uses asynchronous processing in the form of a worker.
    Workers can be used to run desired processes in the background, which do not affect
    the performance of the current page of Visual Studio Code. Tactics, along with
    various extensions and customization options available in Visual Studio Code,
    can significantly enhance your coding experience and productivity.'
  merge: -1
  pgno: 62
