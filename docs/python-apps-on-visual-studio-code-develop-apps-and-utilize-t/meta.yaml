- md: "## Figure 2.24: Opening language-specific settings\n\nThe language-specific\
    \ settings will show only the configurable options for that specific language.\
    \ We will look at Python-specific settings in Chapter 3, Top Extensions in VS\
    \ Code.\n\n## Settings and security\n\nSome settings allow specifying an executable\
    \ VS Code that can run to perform certain operations. The setting allows choosing\
    \ the shell that the integrated terminal would use. Understandably, for various\
    \ security reasons, such settings can be defined only in the user settings and\
    \ not in the workspace scope that multiple users can use. A few other settings\
    \ are not available in the workspace scope, like and.\n\n## Keyboard arguments\n\
    \nIntuitive keyboard shortcuts, easy customization, and community-contributed\
    \ keyboard shortcut mappings let you easily navigate your code. VS Code provides\
    \ rich, customized and easy-to-edit keyboard shortcuts. After displaying the options,\
    \ one can easily change, remove, and reset their keybindings using the available\
    \ actions. Displaying a list of keybindings is also easy; it can be done using\
    \ a search box on the top. The search box helps find commands or keybindings and\
    \ directly navigate to them. Those using VS Code on Windows platform can open\
    \ this editor by going straight to the menu under Preferences| Keyboard (macOS\
    \ users can do so by going to Keyboard).\n\nKeymap extensions are a great feature\
    \ that will help the users of other editors to start using VS Code editor quickly.\
    \ Anyone who wants to see the list of popular keymap extensions can go to Migrate\
    \ Keyboard Shortcuts from... This will bring up the list of popular keymap extensions.\
    \ These extensions modify the VS Code shortcuts to match those of other editors,\
    \ so you do not need to learn new keyboard shortcuts while switching to VS Code.\n\
