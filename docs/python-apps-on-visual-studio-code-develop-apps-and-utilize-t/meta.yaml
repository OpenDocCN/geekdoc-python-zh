- md: "It is easy to manage the extensions in VS Code. VS Code allows the users to\
    \ install/enable/disable/update or uninstall extensions through the extensions\
    \ view, the command palette, or command-line switches. Commands have the Extensions:\
    \ as a prefix in the command palette.\n\n## How to list installed extensions\n\
    \nWhen a user launches VS Code, by default, the extensions view is presented with\
    \ the extensions that are currently installed and enabled, all recommended extensions,\
    \ and a collapsed view of the extensions disabled by the user.\n\n## How to uninstall\
    \ an extension\n\nUsers can select the manage gear button of an extension and\
    \ then choose the uninstall option from the dropdown menu to uninstall an existing\
    \ extension. This action will also prompt the user to reload VS Code.\n\n## How\
    \ to disable an extension\n\nUninstalling permanently removes the extension, but\
    \ in case a user wants to remove the extension temporarily, they can choose the\
    \ disable option in the gear button. The user has the option to disable an extension\
    \ globally or for the current workspace, as shown in Figure Disable extension\
    \ will also prompt to reload VS Code. There is also an option named disable all\
    \ installed extensions command available under more actions in the command palette\
    \ dropdown menu.\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_132_0.png)\n\nFigure\
    \ Disable option in the each extension\n\n## Enable an extension\n\nAll disabled\
    \ extensions remain disabled until the users choose to enable them. Users can\
    \ re-enable the extensions with the enable or enable (workspace) commands available\
    \ in the dropdown menu. To enable all extensions, you can choose the option from\
    \ the command palette or from more actions which provides a dropdown menu. This\
    \ is the quickest way to enable all the extensions.\n\n## Extension auto-update\n\
    \nVS Code constantly checks for extension updates and installs them automatically\
    \ if the auto-update option is checked. Users are asked to reload VS Code if any\
    \ extension has been updated. Some users prefer to update the extensions manually,\
    \ in which case they have to disable the auto-update option with the disable auto-updating\
    \ extensions command that sets the extensions.autoUpdate setting to false. Auto-update\
    \ is shown in Figure\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_133_0.png)\n\n\
    Figure Auto update option for extensions\n\n## Update an extension manually\n\n\
    Users can look for the extensions that have updates available by using the show\
    \ outdated extensions command that uses the outdated filter. Then, by clicking\
    \ the update button for the outdated extension, the update will be installed.\
    \ The update all extensions command can be used to update all your outdated extensions\
    \ at the same time.\n\n## Recommended extensions\n\nUsers also see a list of recommended\
    \ extensions by default or can look for recommended extensions by setting recommended\
    \ filter active. Recommendations can be based on the following:\n\n- Workspace\
    \ Based on other users of the workspace\n- Other Based on recently opened files\n\
    \nUsers can list, install, and uninstall extensions from the command line, which\
    \ helps in automation. One has to keep in mind that to find an extension, one\
    \ has to provide the full name, along with its for example,\n\nHere is an example:\n\
    \nSetting the root path for an extension:\n\n```\ncode --extensions-dir\n```\n\
    \nListing the already installed extensions:\n\n```\ncode –list-extensions\n```\n\
    \nTo see the versions of already installed extensions use:\n\n```\n--list-extension\n\
    ```\n\nShow versions:\n\n```\ncode --show-versions\n```\n\nInstalls an extension:\n\
    \n```\ncode --install-extension ( | )\n```\n\nUninstalls an extension:\n\n```\n\
    code --uninstall-extension ( | )\n```\n\nEnables proposed API features for extensions:\n\
    \n```\ncode --enable-proposed-api ()\n```\n\nNow we will move to the list of some\
    \ of the important extensions that will help in Python programming.\n\n## Pylance\n\
    \nPylance by Microsoft can massively enhance your productivity. Pylance is a Python\
    \ language server, offering enhancements to IntelliSense, syntax highlighting,\
    \ and a host of other features for an amazing development experience for Python\
    \ developers. IntelliSense is more like a generic name for various code editing\
    \ features that would include code completion, parameter info, quick info, and\
    \ member lists. IntelliSense features are also known by names like code completion,\
    \ content assist, and code hinting. IntelliSense quickly shows the probable methods,\
    \ class members, and documentation you may want to use as you type. One can trigger\
    \ completions at any time with Ctrl+Space. Pylance enhances the help provided\
    \ by IntelliSense. Some of the features provided by Pylance are as follows:\n\n\
    - Docstrings\n- Signature help and type information\n- Parameter suggestions\n\
    - Code completion\n- Auto-imports (add and remove import)\n- As-you-type reporting\
    \ of code errors and warnings\n- Code outline\n- Code navigation\n- Type checking\
    \ mode\n- Native multi-root workspace support\n- IntelliCode compatibility\n-\
    \ Jupyter notebooks compatibility\n- Semantic highlighting\n\nLet us move to see\
    \ the top three most popular features in the next section.\n\n## Auto-imports\n\
    \nThe Pylance extension has a feature that automatically adds imports to the top\
    \ of the Python files whenever a reference to a dependency is made in the environment.\
    \ It does not install the dependency, but if it is already installed and available\
    \ in the Python environment, then it adds it. At the same time, it removes the\
    \ reference if it is no longer used in the program. One can see a lightbulb icon\
    \ with suggestions to add or remove imports depending on the scenario.\n\n## Semantic\
    \ highlighting\n\nSemantic highlighting highlights (that is, colors) classes,\
    \ functions, properties, and other Python object types to make them more readable.\n\
    \n## Type checking\n\nThere is a new concept called type hinting, which is the\
    \ practice of specifying expected data types for variables or functions or even\
    \ for classes. Type hinting is new to Python, and even though Python does not\
    \ enforce it, most programmers consider it as a best practice. Pylance helps developers\
    \ to understand if their code violates any documented type hints if it has a type-checking\
    \ setting enabled.\n\nOne has to make the required settings change to make this\
    \ enabled. Figure 3.6 shows the steps to edit the settings:\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_140_0.png)\n\
    \nThe following text can be added to settings.json to enable the type hinting:\n\
    \n```json\n{\n    \"python.analysis.typeCheckingMode\": \"basic\"\n}\n```\n\n\
    Type-checking mode can take either basic or strict:\n\n- Basic: Checking basic\
    \ datatype\n- Strict: Highest error severity, all type checking rules\n\nIt is\
    \ recommended to have a basic setting at the moment.\n\nFigure 3.7 shows the implementation.\
    \ Look at the error message, it says the Expression of the type is and it also\
    \ refers to the Pylance extension.\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_141_0.png)\n\
    \nFigure Type error when trying to assign an integer value to a string variable\n\
    \n## Code Runner\n\nThe second must-have extension based on our recommendation\
    \ is Code Runner. It runs the code instantaneously and supports multiple programming\
    \ languages. The view of Code Runner extension is shown in Figure\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_142_0.png)\n\
    \nFigure Installing Code Runner extension\n\nCode by default, is set to use its\
    \ panel for showing the results of the Python script. It is recommended to be\
    \ set up in a way that will show the results of the integrated terminal. Follow\
    \ these steps to change the settings so that the results can be displayed in the\
    \ terminal:\n\n- Press ctrl+ or click on the gearbox located in the bottom-left\
    \ corner of the screen to open the settings panel.\n- To open the settings, type\
    \ code runner terminal on the search bar.\n- You will now see an option, Code-runner:\
    \ Run In\n- Tick the option to enable it, and you are done. This looks very much\
    \ like the option shown in Figure\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_143_0.png)\n\
    \nFigure Change the settings of Code Runner so that the results can be displayed\
    \ in the terminal\n\nLet us run a program and see the output in the Terminal,\
    \ as shown in Figure\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_143_1.png)"
  mdcn: "在 VS Code 中管理扩展非常简单。用户可以通过扩展视图、命令面板或命令行开关来安装/启用/禁用/更新或卸载扩展。在命令面板中，相关命令均以\
    \ `Extensions:` 为前缀。\n\n## 如何列出已安装的扩展\n\n当用户启动 VS Code 时，默认情况下，扩展视图会显示当前已安装并启用的扩展、所有推荐的扩展，以及用户禁用的扩展的折叠视图。\n\
    \n## 如何卸载扩展\n\n用户可以选择某个扩展的管理齿轮按钮，然后从下拉菜单中选择卸载选项来卸载现有扩展。此操作还会提示用户重新加载 VS Code。\n\
    \n## 如何禁用扩展\n\n卸载会永久移除扩展，但如果用户想临时移除扩展，可以选择齿轮按钮中的禁用选项。用户可以选择全局禁用扩展或仅对当前工作区禁用，如图所示。禁用扩展也会提示重新加载\
    \ VS Code。在命令面板下拉菜单的“更多操作”中，还有一个名为“禁用所有已安装扩展”的命令可用。\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_132_0.png)\n\
    \n图 每个扩展中的禁用选项\n\n## 启用扩展\n\n所有被禁用的扩展将保持禁用状态，直到用户选择启用它们。用户可以使用下拉菜单中可用的“启用”或“启用（工作区）”命令重新启用扩展。要启用所有扩展，您可以从命令面板或提供下拉菜单的“更多操作”中选择相应选项。这是启用所有扩展的最快方式。\n\
    \n## 扩展自动更新\n\nVS Code 会持续检查扩展更新，并在自动更新选项被勾选时自动安装更新。如果有任何扩展被更新，系统会提示用户重新加载 VS\
    \ Code。有些用户更喜欢手动更新扩展，在这种情况下，他们需要使用“禁用自动更新扩展”命令来禁用自动更新选项，该命令会将 `extensions.autoUpdate`\
    \ 设置为 `false`。自动更新如图所示。\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_133_0.png)\n\
    \n图 扩展的自动更新选项\n\n## 手动更新扩展\n\n用户可以使用“显示过时扩展”命令（该命令使用 `outdated` 过滤器）来查找有可用更新的扩展。然后，通过点击过时扩展的更新按钮，即可安装更新。“更新所有扩展”命令可用于同时更新所有过时的扩展。\n\
    \n## 推荐扩展\n\n用户默认也会看到一个推荐扩展列表，或者可以通过设置 `recommended` 过滤器为活动状态来查找推荐扩展。推荐可能基于以下因素：\n\
    \n- 工作区：基于工作区的其他用户\n- 其他：基于最近打开的文件\n\n用户可以从命令行列出、安装和卸载扩展，这有助于实现自动化。需要注意的是，要查找扩展，必须提供其全名，例如：\n\
    \n以下是一个示例：\n\n设置扩展的根路径：\n\n```\ncode --extensions-dir\n```\n\n列出已安装的扩展：\n\n```\n\
    code –list-extensions\n```\n\n要查看已安装扩展的版本，请使用：\n\n```\n--list-extension\n```\n\
    \n显示版本：\n\n```\ncode --show-versions\n```\n\n安装扩展：\n\n```\ncode --install-extension\
    \ ( | )\n```\n\n卸载扩展：\n\n```\ncode --uninstall-extension ( | )\n```\n\n为扩展启用提议的\
    \ API 功能：\n\n```\ncode --enable-proposed-api ()\n```\n\n现在，我们将转向一些有助于 Python 编程的重要扩展列表。\n\
    \n## Pylance\n\n微软的 Pylance 可以极大地提高您的生产力。Pylance 是一个 Python 语言服务器，它增强了 IntelliSense、语法高亮以及许多其他功能，为\
    \ Python 开发者提供了出色的开发体验。IntelliSense 更像是各种代码编辑功能的通用名称，包括代码补全、参数信息、快速信息和成员列表。IntelliSense\
    \ 功能也被称为代码补全、内容辅助和代码提示。IntelliSense 会在您输入时快速显示您可能想要使用的方法、类成员和文档。您可以随时使用 `Ctrl+Space`\
    \ 触发补全。Pylance 增强了 IntelliSense 提供的帮助。Pylance 提供的一些功能如下：\n\n- 文档字符串\n- 签名帮助和类型信息\n\
    - 参数建议\n- 代码补全\n- 自动导入（添加和移除导入）\n- 输入时报告代码错误和警告\n- 代码大纲\n- 代码导航\n- 类型检查模式\n- 原生多根工作区支持\n\
    - IntelliCode 兼容性\n- Jupyter notebooks 兼容性\n- 语义高亮\n\n让我们在下一节中看看最受欢迎的三大功能。\n\n\
    ## 自动导入\n\nPylance 扩展有一个功能，当在环境中引用依赖项时，它会自动将导入添加到 Python 文件的顶部。它不会安装依赖项，但如果依赖项已经安装并在\
    \ Python 环境中可用，它就会添加它。同时，如果程序中不再使用该引用，它会将其移除。根据场景，您可以看到一个灯泡图标，其中包含添加或移除导入的建议。\n\
    \n## 语义高亮\n\n语义高亮会突出显示（即着色）类、函数、属性和其他 Python 对象类型，使其更具可读性。\n\n## 类型检查\n\n有一个新概念叫做类型提示，即为变量、函数甚至类指定预期数据类型的做法。类型提示对\
    \ Python 来说是新的，尽管 Python 不强制执行它，但大多数程序员认为这是一种最佳实践。如果启用了类型检查设置，Pylance 可以帮助开发者了解他们的代码是否违反了任何已记录的类型提示。\n\
    \n必须进行所需的设置更改才能启用此功能。图 3.6 显示了编辑设置的步骤：\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_140_0.png)\n\
    \n可以将以下文本添加到 `settings.json` 以启用类型提示：\n\n```json\n{\n    \"python.analysis.typeCheckingMode\"\
    : \"basic\"\n}\n```\n\n类型检查模式可以是 `basic` 或 `strict`：\n\n- `basic`：检查基本数据类型\n-\
    \ `strict`：最高错误严重性，所有类型检查规则\n\n目前建议使用 `basic` 设置。\n\n图 3.7 显示了实现。查看错误消息，它说“表达式的类型是...”，并且它也引用了\
    \ Pylance 扩展。\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_141_0.png)\n\n图 尝试将整数值赋给字符串变量时的类型错误\n\
    \n## Code Runner\n\n根据我们的推荐，第二个必备扩展是 Code Runner。它可以即时运行代码并支持多种编程语言。Code Runner\
    \ 扩展的视图如图所示。\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_142_0.png)\n\n图 安装 Code\
    \ Runner 扩展\n\nCode Runner 默认设置为使用其面板显示 Python 脚本的结果。建议将其设置为显示集成终端的结果。请按照以下步骤更改设置，以便在终端中显示结果：\n\
    \n- 按 `ctrl+` 或点击屏幕左下角的齿轮图标打开设置面板。\n- 要打开设置，请在搜索栏中输入 `code runner terminal`。\n\
    - 现在您将看到一个选项 `Code-runner: Run In Terminal`。\n- 勾选该选项以启用它，设置完成。这看起来非常像图中所示的选项。\n\
    \n![](img/9d64daa418450477b4b5cccad74a5f4b_143_0.png)\n\n图 更改 Code Runner 的设置，以便在终端中显示结果\n\
    \n让我们运行一个程序并在终端中查看输出，如图所示。\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_143_1.png)"
