  mdcn: "## 步骤 3：创建 consumer() 函数以按优先级消耗值\n\n`consumer()` 函数以队列实例作为参数。在每次迭代中，它从队列中获取一个项目，如果没有可用项目则阻塞。当从队列中检索到的项目值为\
    \ `none` 时，任务将中断循环并终止线程。实现如下：\n\n```python\n# consume the work generated by producer\n\
    def consumer(pqueue):\n    # consuming the work\n    while True:\n        # get\
    \ a unit of work\n        item = pqueue.get()\n        # check for stop\n    \
    \    if item is None:\n            break\n        # block\n        # report\n\
    \        print(f'==> Consuming: {item}')\n        # mark it as processed\n   \
    \     pqueue.task_done()\n    # all done\n    print('Consumer is done')\n```\n\
    \n## 步骤 4：执行程序\n\n我们现在已配置生产者线程的启动以生成任务。这些任务被添加到优先队列中，供消费者访问。主线程等待（阻塞），直到生产者和消费者线程终止；然后，主线程自行终止。让我们看看这段代码：\n\
    \n```python\n# create the shared queue\npq = PriorityQueue()\n# start the producer\n\
    producer = threading.Thread(target=producer, args=(pq,))\nproducer.start()\n#\
    \ start the consumer\nconsumer = threading.Thread(target=consumer, args=(pq,))\n\
    consumer.start()\nproducer.join()\nconsumer.join()\n```\n\n当你运行前面的程序时，你会看到优先级数字较低的任务总是优先于其数字较高的对应任务被消耗。这就是多线程优先队列的实现方式。\n\
    \n## 优化 Python 线程以提升性能\n\n使用线程的程序应该比循环执行得更好，但如果你在自己的电脑上尝试，可能看不到差异；事实上，你可能会看到循环比多线程程序执行得更好。这是因为\
    \ Python 中的线程受全局解释器锁（GIL）的限制。\n\nGIL 是 Python 中使用的一种机制，用于确保在任何给定时间只能有一个线程执行。这个锁是必要的，因为\
    \ Python 解释器不是线程安全的，所以如果多个线程同时执行 Python 代码，可能会导致意外行为。GIL 的实现方式是在执行任何 Python 字节码之前获取锁，并在执行完成后释放锁。这确保了在任何给定时间只能有一个线程执行，防止任何并发问题。GIL\
    \ 只允许运行一些 X 条 Python 指令，然后才将 GIL 释放给另一个线程。这就是为什么对于简单操作，创建线程、加锁和上下文切换的成本远大于简单计算的成本。然而，如果你的程序中有大量计算，它就能很好地工作。\n\
