  md: 'Figure All the correct combinations, along with the one with the minimum length
    highlighted


    # Data structure required


    We will handle the data using a list that will work like a map representing all
    possible 256 characters that can be entered in a pattern. The index will be the
    character, and the value will be the count. Figure 6.2 shows the map:


    ![](img/9d64daa418450477b4b5cccad74a5f4b_325_0.png)


    Figure Map representing 256 characters


    # Algorithm


    The problem might look easy. You will think of creating all the possible subarrays
    (with variable lengths) and then go over each of them, comparing the pattern.
    Then, among all the matched ways, you will look for the length, and the one with
    the smallest length will be our answer. However, this would take a lot of time.
    Regarding time complexity, it will take O(N*N) or to create different subarrays.
    Then, searching the pattern would take another resulting in Time complexity is
    the time required for an algorithm to complete its task. The Big O notation is
    a way to measure the time complexity of an algorithm. It is expressed as where
    n is the number of operations required to complete the algorithm.


    In a later section, we will see how Big O notation is used to compare the relative
    performance of two algorithms: first algorithm that we just discussed and the
    other one is sliding window technique. Sliding window algorithm is'
