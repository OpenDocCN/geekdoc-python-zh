- md: "## Indent Rainbow\n\nIndent Rainbow is a simple yet powerful extension that\
    \ colorizes each tab space to make indentation more visible and readable for the\
    \ programmers. The image of the extension is shown in Figure\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_145_0.png)\n\
    \nFigure Indent Rainbow extension\n\nIndent Rainbow helps make code more readable\
    \ by displaying different indentation levels with different colors. It helps you\
    \ spot indentation errors and visualize the structure of the code, as shown in\
    \ Figure\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_145_1.png)\n\nFigure Program\
    \ running in the terminal\n\nBy default, Indent Rainbow uses VIBGYOR color, hence\
    \ the name Rainbow; but we can always change the default settings by editing the\
    \ User The following code is an example that shows how you can edit the Indent\
    \ Rainbow color settings:\n\n```\n\"indentRainbow.colors\": [\n\n\"rgba(245, 40,\
    \ 145,0.1)\",\n\n\"rgba(245, 40, 145,0.3)\",\n\n\"rgba(245, 40, 145,0.6)\",\n\n\
    \"rgba(245, 40, 145,0.8)\",\n\n\"rgba(245, 40, 145,0.2)\"\n\n]\n```\n\nYou can\
    \ pick your color from here:\n\nhttps://rgbacolorpicker.com/\n\n## Path Intellisense\n\
    \nPath Intellisense is a Visual Studio Code extension that autocompletes filenames\
    \ for you when you are typing in file paths. Figure 3.13 shows the view of the\
    \ extension. It helps you save time and increase productivity by providing you\
    \ with the ability to quickly find, open, and insert the right files in your project.\
    \ It also provides an easy way to quickly add new files to your project.\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_147_0.png)\n\
    \nFigure Path Intellisense extension\n\nPath Intellisense is the VS Code plugin\
    \ that autocompletes filenames. Figure 3.14 shows the suggestions made by Path\
    \ Intellisense when we select a folder:\n\n```\nD: > PythonFiles > practicePy.py\
    \ > ...\n1  # A Python program to read a text file and displays\n2  # first 300\
    \ characters on the screen\n3  # Opening a file \"Poem1.txt\"\n4  file1 = open(\"\
    Poems/\")\n5  \n6  print(\"Reading first\n7  print(file1.read(300))\n8  print()\n\
    9  # Closing the file\n10 file1.close()\n11\n```\n\nFigure Suggestions are shown\
    \ by Path Intellisense extension\n\nVS Code supports both relative and absolute\
    \ paths. The absolute path is the complete path, including the drive name. The\
    \ relative path takes the path from the location mentioned in the terminal. Here\
    \ is an example of how a terminal might look:\n\nC:\\Users\\hp\n\n## Tabnine AI\
    \ Autocomplete\n\nTabnine AI Autocomplete in VSCode is a powerful code autocompletion\
    \ tool powered by artificial intelligence. This extension uses machine learning\
    \ algorithms to understand the context in which the code is used and suggest the\
    \ best code completion options. It integrates seamlessly with Visual Studio Code\
    \ and can help developers quickly complete their code with fewer errors. The extension\
    \ looks as shown in Figure\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_149_0.png)\n\
    \nFigure 3.15: Tabnine AI Autocomplete extension\n\nTabnine is better than most\
    \ of the other autocomplete extensions because it can predict and complete the\
    \ whole line based on context and syntax and also suggest your next lines of code.\
    \ Figure 3.16 shows the difference between suggestions made with and without Tabnine:\n\
    \n![](img/9d64daa418450477b4b5cccad74a5f4b_149_1.png)\n\nFigure Tabnine AI Autocomplete\
    \ even adds file1.read\n\n## Python Indent\n\nPython indent in VSCode is a setting\
    \ that gives the ability to set the number of spaces used for indenting code blocks.\
    \ This is useful for keeping your code neat and organized and for making it easier\
    \ to read. The extension looks as shown in Figure\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_150_0.png)\n\
    \nFigure Python Indent extension\n\nIn the default settings, every time you hit\
    \ the Enter key in a piece of Python code, the cursor will go to the beginning\
    \ of the next line. The Python Indent extension parses the Python file up to the\
    \ location of the cursor. As seen in Figure this extension can determine exactly\
    \ how much the next line should be indented and how much other lines should be\
    \ un-indented.\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_150_1.png)\n\nFigure\
    \ Python Indent extension indenting better than the default settings\n\n## Jupyter\n\
    \nJupyter Extension in VS Code is an extension that allows you to write and execute\
    \ Jupyter notebooks directly in the VS Code editor. It includes support for debugging,\
    \ embedded Git Control, syntax highlighting, intelligent code completion, snippets,\
    \ and code refactoring. The extension also allows you to easily switch between\
    \ Python and R programming languages, and other languages such as Julia, C++,\
    \ and Go. Figure 3.19 is a screenshot of the Jupyter extension:\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_152_0.png)\n\
    \nFigure Jupyter extension\n\nJupyter, earlier known as IPython Notebook, is an\
    \ open-source project that helps us combine markdown text and executable Python\
    \ code onto a single platform called a notebook. Jupyter extension is available\
    \ in VS Code, using which we can run programs in the notebook. To work with Jupyter,\
    \ one has to install the Jupyter extension, and then to open or create a notebook,\
    \ one has to open the command palette and select Create: New Jupyter as shown\
    \ in Figure\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_152_1.png)\n\nFigure Creating\
    \ a new file in Jupyter\n\nExecuting the Jupyter Notebook program:\n\nType your\
    \ program code in the editor. Run your program by clicking on the run icon to\
    \ the left of the code cell or by using the shortcut The output appears directly\
    \ below the code cell.\n\nOne can run multiple cells by clicking the Run All option.\
    \ One can even select run all above or run all\n\nUsing the Export option, Python\
    \ code can be exported to PDF or HTML format. Export option is shown in Figure\n\
    \nTo save your Jupyter click on the file option and then select the save option\
    \ or use the shortcut\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_153_0.png)\n\
    \nFigure Various options available in Jupyter Notebook\n\n## Error Lens\n\nThe\
    \ Error Lens Extension in VS Code displays errors and warnings in the editor’s\
    \ ‘problem’ area and in the editor gutter. It helps identify and fix errors quickly\
    \ and easily. It can be used to navigate to the source of the problem. Figure\
    \ 3.22 is a screenshot of Error Lens extension:\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_154_0.png)\n\
    \nFigure Error Lens extension\n\nThe Error Lens extension displays the error,\
    \ warning, and diagnostic messages in line with the code itself. It eliminates\
    \ the need for developers to hover over or click any other options or execute\
    \ the code to see the error. This extension also highlights the code line with\
    \ different colors to provide better visualization of errors, differentiating\
    \ between errors and warnings easily. We can see the difference in Figure\n\n\
    ![](img/9d64daa418450477b4b5cccad74a5f4b_154_1.png)\n\nFigure Error message appearing\
    \ along with the code with Error Lens\n\n## Better Comments\n\nThe best comment\
    \ extension for Visual Studio Code is the ‘Better Comments’ extension. This extension\
    \ provides a variety of comment types, such as alerts, queries, todos, and highlights.\
    \ It also allows you to easily adjust the colors of these comment types, making\
    \ it easier to differentiate between them. Figure 3.24 is a screenshot of the\
    \ Better Comments extension:\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_156_0.png)\n\
    \nFigure Better Comments extension\n\nAs the name suggests, it improves the comment\
    \ by giving the capability to customize different colors for comments. Comment\
    \ can be classified using the following properties:\n\n- ! for alerts /important\
    \ comments\n- ? for questions\n- TODO for the task\n\nThe mentioned properties\
    \ of the Better Comments extension are shown in Figure\n\n```\n1  #This is default\
    \ way of Commenting\n2  #ToDo: For task related comment\n3  #?: Ask questions\
    \ to this way\n4  #! IMPORTANT NOTE: Do not delete this comment\n5  \n6  \"\"\"\
    \n7  ! Important Note in multi line comment\n8  ? Question test in multi line\
    \ comment\n9  TODO: Task in multi line comment\n10 \"\"\"\n11 \n```\n\nFigure\
    \ Better Comments extension"
  mdcn: "## 缩进彩虹\n\n缩进彩虹是一个简单而强大的扩展，它为每个制表符空格着色，使程序员的缩进更加清晰易读。该扩展的图像如图所示\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_145_0.png)\n\
    \n图 缩进彩虹扩展\n\n缩进彩虹通过用不同颜色显示不同的缩进级别，帮助使代码更具可读性。它帮助你发现缩进错误并可视化代码结构，如图所示\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_145_1.png)\n\
    \n图 在终端中运行的程序\n\n默认情况下，缩进彩虹使用 VIBGYOR 颜色，因此得名彩虹；但我们总是可以通过编辑用户设置来更改默认设置。以下代码示例展示了如何编辑缩进彩虹的颜色设置：\n\
    \n```\n\"indentRainbow.colors\": [\n\n\"rgba(245, 40, 145,0.1)\",\n\n\"rgba(245,\
    \ 40, 145,0.3)\",\n\n\"rgba(245, 40, 145,0.6)\",\n\n\"rgba(245, 40, 145,0.8)\"\
    ,\n\n\"rgba(245, 40, 145,0.2)\"\n\n]\n```\n\n你可以从这里选择你的颜色：\n\nhttps://rgbacolorpicker.com/\n\
    \n## 路径智能提示\n\n路径智能提示是一个 Visual Studio Code 扩展，当你在输入文件路径时，它会自动补全文件名。图 3.13 展示了该扩展的视图。它通过提供快速查找、打开和插入项目中正确文件的能力，帮助你节省时间并提高生产力。它还提供了一种简便的方法来快速向项目中添加新文件。\n\
    \n![](img/9d64daa418450477b4b5cccad74a5f4b_147_0.png)\n\n图 路径智能提示扩展\n\n路径智能提示是\
    \ VS Code 的自动补全文件名的插件。图 3.14 展示了当我们选择一个文件夹时，路径智能提示给出的建议：\n\n```\nD: > PythonFiles\
    \ > practicePy.py > ...\n1  # A Python program to read a text file and displays\n\
    2  # first 300 characters on the screen\n3  # Opening a file \"Poem1.txt\"\n4\
    \  file1 = open(\"Poems/\")\n5  \n6  print(\"Reading first\n7  print(file1.read(300))\n\
    8  print()\n9  # Closing the file\n10 file1.close()\n11\n```\n\n图 路径智能提示扩展显示的建议\n\
    \nVS Code 支持相对路径和绝对路径。绝对路径是完整的路径，包括驱动器名称。相对路径从终端中提到的位置开始。以下是终端可能的样子示例：\n\nC:\\\
    Users\\hp\n\n## Tabnine AI 自动补全\n\nVSCode 中的 Tabnine AI 自动补全是一个由人工智能驱动的强大代码自动补全工具。此扩展使用机器学习算法来理解代码使用的上下文，并建议最佳的代码补全选项。它与\
    \ Visual Studio Code 无缝集成，可以帮助开发者快速完成代码并减少错误。该扩展的外观如图所示\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_149_0.png)\n\
    \n图 3.15：Tabnine AI 自动补全扩展\n\nTabnine 优于大多数其他自动补全扩展，因为它可以根据上下文和语法预测并补全整行代码，还能建议你的下一行代码。图\
    \ 3.16 展示了使用和不使用 Tabnine 时建议的差异：\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_149_1.png)\n\
    \n图 Tabnine AI 自动补全甚至添加了 file1.read\n\n## Python 缩进\n\nVSCode 中的 Python 缩进是一个设置，允许你设置用于缩进代码块的空格数。这对于保持代码整洁有序以及使其更易于阅读非常有用。该扩展的外观如图所示\n\
    \n![](img/9d64daa418450477b4b5cccad74a5f4b_150_0.png)\n\n图 Python 缩进扩展\n\n在默认设置中，每次在\
    \ Python 代码中按 Enter 键时，光标都会移动到下一行的开头。Python 缩进扩展会解析 Python 文件直到光标的位置。如图所示，此扩展可以精确确定下一行应该缩进多少，以及其他行应该取消缩进多少。\n\
    \n![](img/9d64daa418450477b4b5cccad74a5f4b_150_1.png)\n\n图 Python 缩进扩展比默认设置缩进得更好\n\
    \n## Jupyter\n\nVS Code 中的 Jupyter 扩展是一个允许你直接在 VS Code 编辑器中编写和执行 Jupyter 笔记本的扩展。它包括对调试、嵌入式\
    \ Git 控制、语法高亮、智能代码补全、代码片段和代码重构的支持。该扩展还允许你轻松地在 Python 和 R 编程语言之间切换，以及其他语言如 Julia、C++\
    \ 和 Go。图 3.19 是 Jupyter 扩展的截图：\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_152_0.png)\n\
    \n图 Jupyter 扩展\n\nJupyter，以前称为 IPython Notebook，是一个开源项目，帮助我们将 Markdown 文本和可执行的\
    \ Python 代码组合到一个称为笔记本的单一平台上。Jupyter 扩展在 VS Code 中可用，使用它我们可以在笔记本中运行程序。要使用 Jupyter，必须安装\
    \ Jupyter 扩展，然后要打开或创建笔记本，必须打开命令面板并选择“创建：新建 Jupyter”，如图所示\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_152_1.png)\n\
    \n图 在 Jupyter 中创建新文件\n\n执行 Jupyter Notebook 程序：\n\n在编辑器中输入你的程序代码。通过点击代码单元格左侧的运行图标或使用快捷键来运行你的程序。输出直接显示在代码单元格下方。\n\
    \n可以通过点击“全部运行”选项来运行多个单元格。甚至可以选择“运行上方所有”或“运行所有”\n\n使用“导出”选项，Python 代码可以导出为 PDF\
    \ 或 HTML 格式。导出选项如图所示\n\n要保存你的 Jupyter 笔记本，请点击文件选项，然后选择保存选项或使用快捷键\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_153_0.png)\n\
    \n图 Jupyter Notebook 中可用的各种选项\n\n## 错误透镜\n\nVS Code 中的错误透镜扩展在编辑器的“问题”区域和编辑器边栏中显示错误和警告。它有助于快速轻松地识别和修复错误。它可以用于导航到问题的根源。图\
    \ 3.22 是错误透镜扩展的截图：\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_154_0.png)\n\n\
    图 错误透镜扩展\n\n错误透镜扩展在代码行本身中显示错误、警告和诊断消息。它消除了开发者需要悬停或点击任何其他选项或执行代码才能看到错误的需要。此扩展还用不同的颜色突出显示代码行，以提供更好的错误可视化，轻松区分错误和警告。我们可以在图中看到差异\n\
    \n![](img/9d64daa418450477b4b5cccad74a5f4b_154_1.png)\n\n图 使用错误透镜时错误消息与代码一起出现\n\
    \n## 更好的注释\n\nVisual Studio Code 最好的注释扩展是“更好的注释”扩展。此扩展提供多种注释类型，例如警报、查询、待办事项和高亮。它还允许你轻松调整这些注释类型的颜色，使其更容易区分。图\
    \ 3.24 是更好的注释扩展的截图：\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_156_0.png)\n\n\
    图 更好的注释扩展\n\n顾名思义，它通过提供为注释自定义不同颜色的能力来改进注释。注释可以使用以下属性进行分类：\n\n- ! 用于警报/重要注释\n-\
    \ ? 用于问题\n- TODO 用于任务\n\n更好的注释扩展的上述属性如图所示\n\n```\n1  #This is default way of Commenting\n\
    2  #ToDo: For task related comment\n3  #?: Ask questions to this way\n4  #! IMPORTANT\
    \ NOTE: Do not delete this comment\n5  \n6  \"\"\"\n7  ! Important Note in multi\
    \ line comment\n8  ? Question test in multi line comment\n9  TODO: Task in multi\
    \ line comment\n10 \"\"\"\n11 \n```\n\n图 更好的注释扩展"
