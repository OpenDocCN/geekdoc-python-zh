    # Log


    Now, we have an idea of which folder will have specific views. So far, we have
    only created views in core and added the home page.


    The index.html file is the main page of a Flask application. In the index.html
    file, the user will typically find a page with links to the other views or pages
    of the app. It can also include text, graphics, and other content. The file can
    be edited to customize the design of the main page of the app. Before we create
    our index.html file, it is recommended to create a base.html file that will have
    header and footer content common to all the main pages. Creating a base.html template
    in Flask helps ensure a consistent look for your web app. This is beneficial for
    maintaining the visual style of the web app, enabling faster development when
    making changes to the design. Additionally, by using you can easily add elements
    such as headers, footers, and navigation menus that appear on every page within
    your web application.


    The base.html file (under templates folder) will look like this:


    Section First part of any HTML file is, of course, the part. We are not adding
    the head section code here. You can refer to the full code for reference, but
    feel free to design your own version.'
  - '[PAGE 567]


    Section Now we are looking at the body section. First, the header content is added
    to the HTML code. Jinja template language is used in the code to make it more
    dynamic. Jinja is a Python-based templating engine used by Flask that allows you
    to dynamically generate HTML code. The most common usage of the variable code
    in an HTML file is to output values from Python code into the rendered template.
    This can be done using double curly braces {{ For example, if you have a variable
    name in your Flask route, you can output its value in the HTML template as {{
    name When Flask renders this template, it will replace {{ name }} with the actual
    value of the name variable passed from the route. Besides outputting variable
    values, Jinja provides features for control structures like loops and conditionals,
    allowing you to dynamically change the structure and content of the HTML based
    on the provided data from Flask.


