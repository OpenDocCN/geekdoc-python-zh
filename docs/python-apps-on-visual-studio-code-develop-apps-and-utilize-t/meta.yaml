  md: '# Problem statement


    This project aims to develop a Graphical User Interface quiz application that
    allows users to answer multiple-choice questions and receive immediate feedback
    on their answers. The application should also provide users with a score summary
    of their performance and allow them to navigate between questions easily. Furthermore,
    the application should provide some kind of animation to make the application
    look interesting. So, we will add some concepts from Zango tower-making game to
    this. For each correct answer, a block will be added to the tower. A player will
    have maximum three lives to play the game.'
