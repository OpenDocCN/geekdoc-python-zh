    ## 使用 Tkinter 创建菜单和工具栏


    菜单和工具栏是任何 GUI 的基本组成部分。它们为用户提供了一种导航程序、访问重要功能和执行任务的方式。本节将教我们如何使用 Tkinter（标准的 Python
    GUI 工具包）创建菜单和工具栏。我们将介绍创建菜单和工具栏的基础知识，并学习如何添加项目和自定义外观。在本教程结束时，你应该能更好地理解如何使用 Tkinter
    创建和自定义菜单和工具栏。


    一旦我们使用 `Tk()` 函数创建了一个窗口对象，我们将使用这个窗口对象来创建我们的菜单。要创建菜单，我们必须首先创建一个 `Menu` 对象。这可以使用以下代码行完成：


    ```

    menu = Menu(window)

    ```


    `Menu` 对象接受一个参数，即我们之前创建的窗口对象。一旦创建了 `Menu` 对象，我们就可以使用 `add_command()` 方法添加项目。此方法接受两个参数：一个
    `label`，这是将在菜单上显示的字符串；以及一个 `command`，这是在选择项目时将调用的函数。例如，要创建一个带有“打开”标签和 `open_file()`
    命令的项目，我们将使用以下代码行：


    ```

    menu.add_command(label="Open", command=open_file)

    ```


    我们还可以使用 `add_separator()` 方法向菜单添加分隔符。此方法不接受任何参数。一旦所有项目都已添加到菜单中，我们就可以使用窗口对象的 `configure()`
    方法来显示它。此方法接受一个参数，即我们之前创建的菜单对象。


    例如，要在窗口上显示菜单，我们将使用以下代码行：


    ```

    window.configure(menu=menu)

    ```


    ## 使用 Tkinter 创建工具栏


    使用 Tkinter 创建工具栏就像创建菜单一样。要创建工具栏，我们必须首先创建一个 `Toolbar` 对象。这可以使用以下代码行完成：


    ```

    toolbar = Toolbar(window)

    ```


    `Toolbar` 对象接受一个参数，即我们之前创建的窗口对象。一旦创建了 `Toolbar` 对象，我们就可以使用 `add_button()` 方法添加按钮。此方法接受三个参数：一个
    `image`，这是用作按钮图标的位图图像；一个 `command`，这是在点击按钮时将调用的函数；以及一个 `tooltip`，这是当用户将鼠标悬停在按钮上时将显示的字符串。


    例如，要创建一个带有图像 `icon.gif`、命令 `open_file` 和工具提示“打开文件”的按钮，我们将使用以下代码行：


    ```

    toolbar.add_button(image="icon.gif", command=open_file, tooltip="Open File")

    ```


    一旦所有按钮都已添加到工具栏中，我们就可以使用窗口对象的 `configure()` 方法来显示所有这些按钮。此方法接受一个参数，即我们之前创建的工具栏对象。例如，要在窗口上显示工具栏，我们将使用以下代码行：


    ```

    window.configure(toolbar=toolbar)

    ```


    ## 自定义菜单和工具栏


    一旦创建了菜单和工具栏，就可以使用 `configure()` 方法根据用户需求进行自定义。此方法接受两个参数：一个 `option`，这是指定要配置的选项的字符串；以及一个
    `value`，这是要为该选项设置的值。例如，要将菜单的字体大小设置为 12，我们将使用以下代码行：


    ```

    menu.configure(fontsize=12)

    ```


