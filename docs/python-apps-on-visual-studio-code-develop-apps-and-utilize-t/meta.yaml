    \nFigure Help|Keyboard Shortcut Reference: to get a condensed PDF list of keyboard\
    \ shortcuts\n\n## Conclusion\n\nWe are at the end of the chapter and have done\
    \ a great job writing and building our first Python program. Whenever we move\
    \ to a new environment, it always makes sense to spend some time trying to understand\
    \ the nuts and bolts of the environment; that was our goal for this chapter. We\
    \ have successfully installed Python and VS Code, set up Python environment using\
    \ Python extension, installed default extensions along with it, and learned about\
    \ editing settings. Spend some more time working with settings, edit your font\
    \ to your liking, and get the theme of your choice so that you love working with\
    \ the editor.\n\nNow, it is time to move on to the next chapter. In the next chapter,\
    \ we will learn about more useful Python extensions and edit Python-related settings.\n\
    \n# Chapter 3\n\n## Top Extensions in VS Code for Python\n\n> Technology is nothing.\
    \ What’s important is that you have a faith in people, that they’re basically\
    \ good and smart, and if you give them tools, they’ll do wonderful things with\
    \ them.\n\n— Steve Jobs\n\n## Introduction\n\nExtensions to VS Code editor are\
    \ invaluable. They help improve code quality and speed up the development work\
    \ too. We will look at some general-purpose extensions that are must-haves. Two\
    \ big areas where Python programming is used are data science and web development.\
    \ We will also look at the popular extensions that apply to data scientists and\
    \ web developers. In this chapter, we will explain the functionality of popular\
    \ extensions and how to find them in the VS Code marketplace, and we will install\
    \ and manage these extensions. No doubt, these extensions are what make VS Code\
    \ the most popular IDE, so we added this chapter to benefit all. Apart from that,\
    \ we will discuss functions, modules, and packages in Python. These concepts help\
    \ us manage lengthy code easily and efficiently.\n\n## Structure\n\nWe are going\
    \ to cover the following topics in this chapter:\n\n- Top VS Code extensions\n\
    - Python-specific settings\n- Installing and using Python packages\n- Functions,\
    \ modules, and packages in Python\n\nNow, let us dive deep into these topics.\n\
    \n## Objectives\n\nThe objective of this chapter is to provide an overview of\
    \ the top extensions for Python programming in Visual Studio Code and explain\
    \ how to install and use these extensions. We will also talk about their purpose\
    \ and characteristics. Extensions add more functionality to VS Code for Python,\
    \ such as linting, debugging, and code formatting. Additionally, many popular\
    \ extensions provide IntelliSense, which provides smarter code completion based\
    \ on variable types, function definitions, and imported modules. This makes it\
    \ easier and faster to write and understand code. We will also learn about functions,\
    \ classes and modules and look at the implementation of these concepts in Python.\n\
    \n## Top VS Code extensions\n\nSo, you have installed VS Code now and maybe even\
    \ created your first program if you have followed our chapters. There are a few\
    \ extensions that will simply increase the power of your VS Code. Using VS Code\
    \ extensions, you can add different language support (we did that in Chapter 2,\
    \ Setting Up the debuggers, and various other tools to make your development experience\
    \ better. By creating extensions, developers take advantage of VS Code’s rich\
    \ extensibility, which allows them to plug their extensions directly into the\
    \ VS Code UI, making it available to VS Code users. To start using the extensions,\
    \ take the following steps to download any extension:\n\nStep 1: Browse for extensions\n\
    \nThe first step is to find these extensions in the marketplace. One can easily\
    \ browse and install extensions from VS Code itself. Clicking on the extension’s\
    \ icon in the activity bar or by typing the extensions command will bring up the\
    \ extensions view, which looks like the icon shown in Figure.\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_127_0.png)\n\
    \nFigure Extensions icon\n\nYou can filter the search results using the filter\
    \ option available at the top-left of the screen, as shown in Figure.\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_128_0.png)\n\
    \nFigure Extension search result with filter option\n\nA popular list of extensions\
    \ can be seen in Figure.\n\nFile Edit Selection View Go Run\n\nEXTENSIONS: MARK...\n\
    \n@popular\n\n| Extension | Description | Publisher |\n| :--- | :--- | :--- |\n\
    | Python | IntelliSense (Pylance), Linting, ... | Microsoft |\n| Jupyter | Jupyter\
    \ notebook support, inte... | Microsoft |\n| Pylance | A performant, feature-rich\
    \ lang... | Microsoft |\n| C/C++ | C/C++ IntelliSense, debugging,... | Microsoft\
    \ |\n| Jupyter Keymap | Jupyter keymaps for notebooks | Microsoft |\n| Jupyter\
    \ Notebook Renderers | Renderers for Jupyter Noteboo... | |\n\n## Figure 3.3:\
    \ Popular extensions list\n\nEach result in the list will include a brief description\
    \ of the extension, the publisher of that extension, the total number of downloads,\
    \ and the rating on a 5-star scale. When the extension is selected, the extension’s\
    \ details page is displayed, where one can learn more.\n\n## Step 2: Search for\
    \ an extension\n\nOne can search for an extension by typing the extension name\
    \ in the search box at the top of the extensions view. Clear the existing text\
    \ if any and type in the complete or part of the extension name you are looking\
    \ for. So, if you type Python, it will bring up a list of Python language extensions.\
    \ Knowing the extension ID can help if there are many extensions with similar\
    \ names. For example, wayou.vscode-todo-highlight is the ID for the TODO Highlight\
    \ extension. One can directly type the ID in the search box as well.\n\n## Step\
    \ 3: Install the extension\n\nTo install the extension of your choice, click the\
