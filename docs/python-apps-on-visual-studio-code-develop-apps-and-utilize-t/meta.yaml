- md: "## Conclusion\n\nare what make VS Code efficient for Python programming. We\
    \ have learned about the top 10 popular extensions used by developers across the\
    \ world and the powerful features of these extensions. Python extension for VS\
    \ Code is highly configurable, so it makes sense to configure it to make the development\
    \ of applications easy. For that purpose, we looked at some of the Python-specific\
    \ settings, which can be edited in VS Code. We learned how to install packages\
    \ available in Python Package Index which is the official third-party repository\
    \ for Python packages. In the last section of the chapter, we focused on understanding\
    \ how to create functions, modules, and packages for application development.\
    \ We are getting closer to developing amazing applications.\n\nIn the next chapter,\
    \ we will build our first Python app using all the basic concepts, but before\
    \ that, we will learn to handle 2D data using numpy, scientific calculation using\
    \ scipy, and table structure using pandas. We will also solve a business problem\
    \ using data visualization; in the last section, we will learn to work with\n\n\
    ## Chapter 4\n\n## Developing Visualizing Python App in VS Code\n\n> If I can’t\
    \ picture it, I can’t understand it.\n— Albert Einstein\n\n## Introduction\n\n\
    People like visuals and the importance of visuals, as it helps us visualize simple\
    \ and complex concepts, interact with the presented data, and bring everyone on\
    \ the same page, regardless of their level of expertise. Every industry wields\
    \ data and analytics as competitive weapons, operational accelerants, and innovation\
    \ catalysts. Data-Driven Decision-making is about using facts, metrics, and data\
    \ to make strategic business decisions aligned with organizational goals, objectives,\
    \ and initiatives. Based on historical and current data, businesses use predictive\
    \ analytics, statistics, and modeling to determine potential outcomes and future\
    \ performance. But at the same time, it is getting difficult to make sense of\
    \ trillions of data rows created daily. This is where visualization is playing\
    \ an increasingly key role. Experts use data visualization to tell stories that\
    \ everybody in the organization can understand. They do this by curating data\
    \ into an easily understood form, highlighting the trends and outliers. In this\
    \ chapter, we will look at a couple of examples of visualization that tell a story\
    \ by removing the noise from data and highlighting useful information, and then\
    \ showing how this can help the business make decisions.\n\nThis chapter assumes\
    \ that the readers have some knowledge of Python topics like Numpy, Scipy, Pandas,\
    \ Matplotlib, and Seaborn. We will get an overview of these topics in this chapter,\
    \ so even if you have no working knowledge, it should be fine.\n\nWe will also\
    \ look at using the basics of Git version control in Visual Studio Code. We will\
    \ learn about integrated Git support and understand how to work with remote repositories.\
    \ We will conclude the chapter by learning how to debug the application.\n\nRefer\
    \ to the GitHub location to access the dataset.\n\n## Structure\n\nIn this chapter,\
    \ we will cover the following topics:\n\n- Virtual Environment Concept\n- Python\
    \ topics:\n  - Learning the basics of statistics\n  - Visualization for Data Analysis\n\
    - Working with GitHub\n\nNow, let us dive deep into the topics.\n\n## Virtual\
    \ Environment Concept\n\nBefore we get into the Python topics, let us understand\
    \ the concept of virtual environment. This is the right time to discuss it. Creating\
    \ a virtual environment is a great way to keep your Python projects organized\
    \ and separate from each other. It allows you to install libraries and dependencies\
    \ specific to a project without affecting your global Python installation. Here\
    \ is how you can create a virtual environment and install libraries in it:\n\n\
    1. Open your command line or terminal.\n2. Install the virtualenv package if you\
    \ don’t have it already. You can do this by running the `pip install virtualenv`\
    \ command.\n3. Once virtualenv is installed, navigate to the directory where you\
    \ want to create your virtual environment.\n4. Run the command to create a new\
    \ virtual environment called `myenv`. You can choose any name you like. This command\
    \ creates a new directory with the same name as your virtual environment within\
    \ the current directory.\n5. Activate the virtual environment by running the appropriate\
    \ command for your operating system:\n    - On Windows: `myenv\\Scripts\\activate`\n\
    \    - On macOS/Linux: `source myenv/bin/activate`\n\nOnce the virtual environment\
    \ is activated, your command-line prompt will change to indicate that you are\
    \ now working within the virtual environment.\n\nYou can now install libraries\
    \ into your virtual environment. For example, to install the `numpy` library,\
    \ run the `pip install numpy` command. This will download and install the library\
    \ into your virtual environment.\n\nYou can install multiple libraries by running\
    \ additional `pip install` commands.\n\nYou can check the installed libraries\
    \ in your virtual environment by running the `pip list` command.\n\nWhen you are\
    \ done working in your virtual environment, you can deactivate it by running the\
    \ `deactivate` command. This will restore your global Python environment.\n\n\
    By creating and using virtual environments, you can easily manage your Python\
    \ projects and their dependencies with minimal conflicts or interference between\
    \ them.\n\n## Python topics\n\nNumpy, Scipy, Pandas, Matplotlib and Seaborn are\
    \ popular Python libraries used for data analysis and manipulation:\n\n- Numpy\
    \ is used for scientific computing, array manipulation, and linear algebra.\n\
    - Scipy is used for scientific and technical computing, statistics, and more.\n\
    - Pandas is used for data manipulation and analysis, data cleaning, and data wrangling.\n\
    - Matplotlib is used for data visualization and plotting.\n- Seaborn is used for\
    \ statistical data visualization and plotting.\n\nThese libraries are important\
    \ because they make it easier to manipulate, analyze, and visualize data, which\
    \ is critical for data science and machine learning applications. Let’s learn\
    \ about them in detail.\n\n## Numpy\n\nNumerical Python is used for working with\
    \ arrays in Python. It has functions for linear algebra, Fourier, and so on. NumPy\
    \ arrays are stored in memory at one continuous place so that processes can access\
    \ and manipulate them efficiently. Numpy is used in Python programming after installing\
    \ and importing the numpy library in your Python applications. Numpy can be installed\
    \ using pip command and imported in the program using the import keyword. In the\
    \ following example, we have imported Numpy and then created an alias np while\
    \ importing:\n\n```python\nimport numpy as np\n```\n\nThe preceding the statement\
    \ will import NumPy and make it ready to use. In the next line, we will see how\
    \ to create a list to Numpy array:\n\n```python\narray1 = numpy.array([10, 20,\
    \ 30, 40, 50])\nprint(array1)\n```\n\nndarray is the array object of NumPy that\
    \ is used to work with arrays. NumPy ndarray object is created using the array()\
