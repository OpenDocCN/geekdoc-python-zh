    , command=option_c)\nb4 = Button(root, text=\"D\", command=option_d)\n```\n\n\
    ```python\n# 塔楼代码\ncanvas_tower = Canvas(root)\nimg2 = Image.open(\"tower.png\"\
    )\nresized_image2 = img2.resize((100, tower_height), Image.LANCZOS)\nnew_image2\
    \ = ImageTk.PhotoImage(resized_image2)\n```\n\n```python\n# 分数标签位置\ncurrent_score_canvas\
