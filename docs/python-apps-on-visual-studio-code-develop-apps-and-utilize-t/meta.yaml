  md: 'If-blocks are logic statements used to control the flow of a program. They
    are used to test conditions and execute different code depending on the result
    of the test. An if-block consists of an if statement, followed by one or more
    optional elif (else if) statements and an optional else statement.


    Generally, the syntax for an if-block in Python is as follows:


    ```

    if condition1:


    statement1


    elif condition2:


    statement2


    ...


    else:


    statementN

    ```


    The if statement contains a condition (condition1). If the condition evaluates
    to True, the associated statement (statement1) is executed.


    If the condition evaluates to False, the statement is not executed, and the elif
    or else statement is tested. If the condition in the elif statement evaluates
    to True, the associated statement (statement2) is executed. This process is repeated
    until a condition is found to be True or the else statement is reached.'
  merge: -1
