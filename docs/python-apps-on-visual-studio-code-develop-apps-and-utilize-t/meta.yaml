  - '[PAGE 131]


    It is easy to manage the extensions in VS Code. VS Code allows the users to install/enable/disable/update
    or uninstall extensions through the extensions view, the command palette, or command-line
    switches. Commands have the Extensions: as a prefix in the command palette.


    # How to list installed extensions


    When a user launches VS Code, by default, the extensions view is presented with
    the extensions that are currently installed and enabled, all recommended extensions,
    and a collapsed view of the extensions disabled by the user.


    # How to uninstall an extension


    Users can select the manage gear button of an extension and then choose the uninstall
    option from the dropdown menu to uninstall an existing extension. This action
    will also prompt the user to reload VS Code.


    # How to disable an extension


    Uninstalling permanently removes the extension, but in case a user wants to remove
    the extension temporarily, they can choose the disable option in the gear button.
    The user has the option to disable an extension globally or for the current workspace,
    as shown in Figure Disable extension will also prompt to reload VS Code. There
    is also an option named disable all installed extensions command available under
    more actions in the command palette dropdown menu.'
