    # Optimizing Python threads for performance


    Programs using threads are supposed to perform better than loops, but if you try
    on your computer, you may not see the difference; in fact, you might see loops
    performing better than multi-threading programs. This is because threads in Python
    are subject to the Global Interpreter Lock


    GIL is a mechanism used in Python to ensure that only one thread can execute at
    any given time. This lock is necessary because the Python interpreter is not thread-safe,
    so if multiple threads were to execute Python code simultaneously, it could lead
    to unexpected behavior. The GIL is implemented by acquiring a lock before executing
    any Python bytecode and releasing the lock when the execution is finished. This
    ensures that only one thread can execute at any given time, preventing any concurrency
    issues. GIL are only allowed to run some X Python instructions before releasing
    the GIL to another thread. That is why for simple operations, the cost of creating
    a thread, locking, and context switching is much bigger than the cost of simple
    computation. However, it works well if you have large number of computations in
    a program.'
