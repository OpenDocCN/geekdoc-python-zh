- md: "## Problem\n\nWrite a program to find the smallest window in a given string\
    \ containing all characters of the other string.\n\n## Understand the Problem\n\
    \nWhen a user provides two strings, that is, string and pattern, the task is to\
    \ find the main string’s smallest substring containing all the input pattern’s\
    \ characters. We need to read all the characters of the given string and generate\
    \ all substrings of the string containing the pattern character. And then we need\
    \ to print the smallest substring containing all characters of the pattern.\n\n\
    ## Example\n\nI am on a seafood diet. i see food and i eat it.\n\nPattern: **fast**\n\
    \nWindow: seafood diet\n\nThe minimum length of the window is 12.\n\nAll the correct\
    \ combinations are shown in Figure. The smallest substring of the given string\
    \ that has the pattern is seafood diet:\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_324_0.png)\n\
    \nFigure: All the correct combinations, along with the one with the minimum length\
    \ highlighted.\n\n## Data Structure Required\n\nWe will handle the data using\
    \ a list that will work like a map representing all possible 256 characters that\
    \ can be entered in a pattern. The index will be the character, and the value\
    \ will be the count. Figure 6.2 shows the map:\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_325_0.png)\n\
    \nFigure: Map representing 256 characters.\n\n## Algorithm\n\nThe problem might\
    \ look easy. You will think of creating all the possible subarrays (with variable\
    \ lengths) and then go over each of them, comparing the pattern. Then, among all\
    \ the matched ways, you will look for the length, and the one with the smallest\
    \ length will be our answer. However, this would take a lot of time. Regarding\
    \ time complexity, it will take O(N*N) to create different subarrays. Then, searching\
    \ the pattern would take another O(N). Time complexity is the time required for\
    \ an algorithm to complete its task. The Big O notation is a way to measure the\
    \ time complexity of an algorithm. It is expressed as O(f(n)) where n is the number\
    \ of operations required to complete the algorithm.\n\nIn a later section, we\
    \ will see how Big O notation is used to compare the relative performance of two\
    \ algorithms: first algorithm that we just discussed and the other one is sliding\
    \ window technique. Sliding window algorithm is the preferred algorithm in this\
    \ case because its time complexity of O(N) is better than O(N*N).\n\nThe sliding\
    \ window technique is an algorithm design technique used to solve problems involving\
    \ sequences, such as string matching, by breaking the line down into small chunks\
    \ and shifting the piece by a certain number of elements at a time. The sliding\
    \ window algorithm sounds complicated, but it is a window or section formed over\
    \ parts of your data, and in our case, data is a string. We move this window in\
    \ increments over our data to perform some computation, which would be finding\
    \ the minimum window substring. This technique helps find patterns in large datasets\
    \ and solve problems with time constraints.\n\nWindow or section is a variable\
    \ length group that starts increasing from where the first value is met and rises\
    \ to the point of the last match. We increase the size of the window by one element\
    \ at a time. As demonstrated in Figure, we form the window when the first character\
    \ match is found in the main string and goes up to the last character match. Here,\
    \ the first match is found when 'a' is located at index 2. A window starts to\
    \ form and increases up to when 't' is found. This is one subarray and also a\
    \ possible solution. Next, we begin reducing this window by eliminating it from\
    \ behind till the next match is found. This time, we get another subarray from\
    \ index 12 to 21. This is another subarray, and it is a better solution than the\
    \ first one, as the size of this subarray is the minimum of what we got so far.\
    \ We continue to build windows and change their size until all the elements have\
    \ been considered.\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_326_0.png)\n\n\
    Figure: Working of sliding window.\n\nLet us do a step-by-step walkthrough of\
    \ the algorithm using our string and pattern:\n\nLet us create a map to generate\
    \ a count of all the characters in the pattern as we iterate through the main\
    \ string; we will know how many characters we have seen. We get F=1, A=1, S=1,\
    \ T=1.\n\nWe need a couple of different variables to be used:\n\nTo begin with,\
    \ we will declare i and j pointers, pointing at index = 0.\n\nThe variable count\
    \ will be initialized to the number of unique characters in the pattern, which\
    \ we can get from the map. So, we make count = 4 (for FAST).\n\nInitialize a left\
    \ and right variable, which will be used to keep track of the minimum substring\
    \ positions we come across as we iterate through the string.\n\nThe minlength\
    \ variable is used to keep track of the difference between the right and left\
    \ pointer, which will give us the substring from the string. Initially, we will\
    \ make it one more than the string length, as it would indicate a non-efficient\
    \ solution. The step is illustrated in Figure.\n\nSTRING: i am on a seafood diet.\
    \ i see food and i eat it.\n\nPATTERN: **fast**\n\n**Count** = 4\n\n**i,j** =\
    \ 0,0\n\nminLength = 14\n\n| Character | Count |\n|---|---|\n| F | 1 |\n| A |\
    \ 1 |\n| S | 1 |\n| T | 1 |\n\n**MAP**\n\nFigure: Variables all initialized.\n\
    \nThe j pointer will start from index 0 of the main string and stop when there\
    \ is a match with the variable in the map. In our case, when j reaches index 2,\
    \ there is a match (character A is found). We need to decrease the value of the\
    \ character by 1 in the map. If the case value reaches zero, we also decrease\
    \ count by 1, now equal to 3. We get A = 0 and count = 3. We need to continue\
    \ looking for T (=1) to find a successful minimum window.\n\nWe continue to move\
    \ the j pointer ahead looking for other characters from the map. j will continue\
    \ to move until index 21. When j reaches index 8, there is another match; decrease\
    \ the count of A by 1, so now it is -1. The count value is not affected here because\
    \ it is only decreased when the value in the map reaches 0, not for any other\
    \ number (-1 in this case).\n\nNow j moves to 10, and there is a match again.\
    \ This time, the value of S goes to 0, so count is decreased by 1 and is now 2.\n\
    \nj moves to 12 and the map value of A goes to -2.\n\nNow, j moves to 13 and there\
    \ is a match again. This time, the value of F goes to zero, so count is decreased\
    \ by 1 and now it becomes 1.\n\nNow j keeps moving until index 21; T is made 0\
    \ and count also becomes 0. That means we have found a subarray.\n\nSince i is\
