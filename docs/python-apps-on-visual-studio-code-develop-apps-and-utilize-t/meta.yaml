- md: '## Types of errors


    Errors in Python programs occur when the program encounters an unexpected situation
    that is beyond its capacity to handle. These errors can stem from syntax issues,
    runtime problems, or logical flaws. Programmers and developers tend to make three
    types of errors:


    Syntax errors are the basic type of error and occur when the programmer fails
    to follow the proper syntax for the language. This type of error will produce
    a Syntax error exception when the code is run. Examples of syntax errors include
    missing parentheses, incorrect indentation, and misspelled keywords.


    Runtime errors occur when the code is syntactically correct but fails to execute
    properly. These errors usually occur when the code tries to perform an action
    that it cannot, such as dividing by zero. These errors will produce a runtime
    error exception when the code is run.


    Logical errors occur when the code is syntactically correct and executes without
    producing any runtime errors, but the result is not what was intended. These errors
    are usually caused by incorrect logic in the code or incorrect assumptions about
    the data. These types of errors are often difficult to track down and fix.


    Now, that we understand the types of errors that can occur, let us look at how
    to debug in Python.


    ## Checking your code syntax


    When debugging a Python program, there are a few basic steps you can take to check
    your code syntax and identify any errors.


    Check your indentation: Python relies on indentation to denote the scope of code
    blocks and functions. Therefore, it is important to make sure all indentation
    is correct. If there are any errors in the indentation, your program may not run
    as expected.


    Check your variable names: It is important to make sure that all your variable
    names are correct and match up with the correct objects. This can help avoid errors
    such as trying to assign a value to a variable that does not exist.


    Check your syntax: Make sure all the syntax in your program is correct. This includes
    ensuring that all punctuation, brackets, and quotes are in the right places.


    Check your logic: Make sure the logic of your program is sound. This includes
    ensuring that loops are running correctly and conditions are checked correctly.


    Check your functions: Make sure all your functions are being called correctly
    and returning the expected results.


    Jupyter helps fix most of these things by highlighting the error in the code.


    ## Verifying the output


    Always test your program’s output by giving known values and verify that it works
    fine. While testing, make sure the following techniques are kept in mind:


    Functional tests: Functional tests are usually done by manually executing the
    application and verifying that the expected results are produced. Functional tests
    often involve a combination of manual and automated tests, such as test scripts,
    to ensure that all aspects of the system are tested.


    Algorithmic tests: Algorithmic tests are tests used to assess a person’s ability
    to think logically and solve complex problems. Check if the logic has been correctly
    and efficiently implemented.


    Positive tests: Positive testing is a form of software testing that aims to verify
    that the functionality of a system or application conforms to its predetermined
    specifications. It involves testing the system with valid input to see if the
    expected output is produced. Positive testing, also known as confirmation testing,
    is used to ensure that a system works as expected.


    Negative tests: Negative testing is a type of software testing that involves testing
    the system by providing invalid or unexpected inputs to ensure that the system
    handles the input correctly. This type of testing helps ensure that the system
    can detect invalid inputs and respond accordingly. Negative testing is often used
    to identify boundary conditions, errors in input validation, and unexpected system
    behaviour.


    Boundary tests: Boundary tests (or edge case tests) verify the behaviour of a
    program or system when the inputs are at the boundaries of the range of valid
    inputs. These tests are designed to check how the system behaves when given values
    that are slightly beyond the normal range of inputs.


    Debugging can be a complicated process, but it will get easier with practice.
    We are suggesting some easy tips to follow to debug your program easily:


    - Use print statements: Print statements are one of the most helpful tools when
    debugging in Python. By adding print statements to your code, you can see what
    is happening and determine where the error is occurring.

    - Use a debugger: A debugger is a tool that allows you to step through your code
    line by line, which helps you to identify exactly where the error is occurring.

    - Check for typos: Typos can often be the cause of errors. Make sure you double-check
    your code for any typos before running it.

    - Simplify the code: If you are having trouble finding the error, try simplifying
    the code. This means removing any unnecessary code and making the code as simple
    as possible.


    With these tips, you can debug your code quickly and efficiently!


    ## Conclusion


    In this chapter, we have seen the basics of debugging in Jupyter Notebook running
    in VS Code. Debugging is the process of finding and fixing errors in a program.
    The purpose of editing and debugging in programming is to ensure that the code
    is error-free and follows the language’s syntax. Editing also makes the code more
    readable, allowing others to understand it better. Debugging a Jupyter Notebook
    file using VS Code is a great way to find and fix errors in your code. VS Code
    provides an interactive debugging environment where you can set breakpoints, inspect
    variables, view the stack trace, and step through code. It also integrates with
    the Jupyter Notebook, allowing you to debug code within Jupyter Notebooks as well.


    By using VS Code for debugging, you can quickly and easily find and fix errors
    in your Jupyter Notebook files.


    In the next chapter, we will build graphical user interface applications using
    Tkinter. Tkinter is a Python library used for building GUI. It provides a set
    of tools and widgets for creating windows, buttons, menus, dialog boxes, and more.
    Tkinter is included with the standard Python distribution and is easy to learn
    and use, making it a popular choice for GUI development in Python.


    ## Chapter 10


    ## Mastering Tkinter GUI Capabilities using VS Code


    The graphical user interface is the point of contact between people and computers,
    and it should be designed to let people get the most out of their machines.


    > — John Maeda, a popular contemporary American graphic designer and also a renowned
    author and computer scientist.


    ## Introduction


    Tkinter is a Python library that allows Python applications to create Graphical
    User Interfaces. It is a thin object-oriented layer on top of Tcl/Tk. Tcl/Tk is
    an open-source, cross-platform GUI toolkit that provides powerful GUI elements,
    such as buttons, labels, frames, and menus. It is commonly used for creating graphical
    user interfaces, rapid prototyping, and scripting. Tkinter provides various controls,
    such as buttons, labels, and text boxes used in a graphical user interface to
    interact with a user. It is the most popular and easy-to-use GUI library for Python,
    making it a great choice for developing desktop applications.


    Tkinter provides various widgets, such as labels, buttons, frames, checkboxes,
    radio buttons, list boxes, and scroll bars. These widgets are used as building
    blocks for creating a graphical user interface. They can be used to create interactive
    applications with a graphical interface. Widgets can be arranged in a window using
    various layout managers, such as pack, grid, and place. Tkinter also provides
    a mechanism for binding events to user interface elements, such as mouse clicks,
    keypresses, and other events.


    Tkinter is a popular choice for developing GUI applications in Python due to its
    simplicity and ease of use. It is also available as part of the standard Python
    distribution, making it easy to create a graphical user interface in Python. It
    is also well supported by a wide range of third-party libraries and resources.'
  mdcn: '## 错误类型


    Python程序中的错误发生在程序遇到超出其处理能力的意外情况时。这些错误可能源于语法问题、运行时问题或逻辑缺陷。程序员和开发者通常会犯三种类型的错误：


    语法错误是最基本的错误类型，当程序员未能遵循语言的正确语法时就会发生。这类错误在代码运行时会产生语法错误异常。语法错误的例子包括缺少括号、缩进不正确以及关键字拼写错误。


    运行时错误发生在代码语法正确但无法正确执行时。这些错误通常发生在代码尝试执行其无法完成的操作时，例如除以零。这些错误在代码运行时会产生运行时错误异常。


    逻辑错误发生在代码语法正确且执行时未产生任何运行时错误，但结果并非预期的情况。这些错误通常是由代码中的逻辑不正确或对数据的错误假设引起的。这类错误通常难以追踪和修复。


    现在，我们已经了解了可能发生的错误类型，接下来让我们看看如何在Python中进行调试。


    ## 检查代码语法


    在调试Python程序时，你可以采取一些基本步骤来检查代码语法并识别任何错误。


    检查缩进：Python依赖缩进来表示代码块和函数的范围。因此，确保所有缩进正确非常重要。如果缩进有任何错误，你的程序可能无法按预期运行。


    检查变量名：确保所有变量名正确并与正确的对象匹配非常重要。这有助于避免尝试为不存在的变量赋值等错误。


    检查语法：确保程序中的所有语法正确。这包括确保所有标点符号、括号和引号都在正确的位置。


    检查逻辑：确保程序的逻辑合理。这包括确保循环正确运行且条件被正确检查。


    检查函数：确保所有函数都被正确调用并返回预期的结果。


    Jupyter通过突出显示代码中的错误来帮助修复大多数这些问题。


    ## 验证输出


    始终通过提供已知值来测试程序的输出，并验证其是否正常工作。在测试时，请确保牢记以下技术：


    功能测试：功能测试通常通过手动执行应用程序并验证是否产生预期结果来进行。功能测试通常涉及手动和自动化测试的组合，例如测试脚本，以确保系统的各个方面都经过测试。


    算法测试：算法测试用于评估一个人逻辑思考和解决复杂问题的能力。检查逻辑是否已正确且高效地实现。


    正向测试：正向测试是一种软件测试形式，旨在验证系统或应用程序的功能是否符合其预定规范。它涉及使用有效输入测试系统，以查看是否产生预期输出。正向测试，也称为确认测试，用于确保系统按预期工作。


    负向测试：负向测试是一种软件测试类型，涉及通过提供无效或意外输入来测试系统，以确保系统正确处理输入。这种测试有助于确保系统能够检测无效输入并做出相应响应。负向测试通常用于识别边界条件、输入验证中的错误以及意外的系统行为。


    边界测试：边界测试（或边缘案例测试）验证当输入处于有效输入范围的边界时程序或系统的行为。这些测试旨在检查当给定略超出正常输入范围的值时系统的行为。


    调试可能是一个复杂的过程，但通过实践会变得更容易。我们建议一些简单的技巧，以便轻松调试你的程序：


    - 使用打印语句：打印语句是Python调试中最有用的工具之一。通过在代码中添加打印语句，你可以查看正在发生的事情并确定错误发生的位置。

    - 使用调试器：调试器是一种允许你逐行执行代码的工具，这有助于你准确识别错误发生的位置。

