- img_proc: true
  md: '# Technical Debt


    Technical debt, also known as design debt or code debt in the software engineering
    world, is a concept that shows and reflects the extra development work that is
    a result of software developers choosing limited or easy development work to address
    an issue instead of using a better approach that would take longer time and possibly
    delay the release. Technical debt can also arise from implementing poor programming
    syntaxes, leading to poor code readability and difficulty in maintaining code
    later. The term ‘technical debt’ was coined by software developer Ward Cunningham,
    one of the 17 Agile Manifesto authors who created the first wiki. He first used
    the technical debt metaphor to explain the non-technical stakeholders at WyCash
    why they should invest in resources for code refactoring to improve the existing
    code and add new features.


    VS Code has multiple extensions available for the users to catch poor code, and
    manage and reduce technical debt. These extensions can be installed on demand.
    Some extensions that help in achieving better and efficient code are Stepsize,
    TODO Highlight, SonarLint, and Code Runner. A linter (or simple Lint) derives
    its name from a Unix utility originally written to manage C language source code,
    and it is a static code analysis tool. Linters highlight programming errors, bugs,
    coding standard errors, and possible construct errors. In the linters, the rules
    for naming conventions, type casting, and code styles are written to ensure that
    the contributors do not increase technical debt. If a developer pushing the code
    to VS Code GitHub, does not install linters, then they get notified by the pre-commit
    checks for the same. If these pre-commit checks fail,'
  merge: -1
  pgno: 53
- img_proc: true
  md: some technical debt must be fixed before being able to commit and push the desired
    contribution.
