    # Figure 9.1: Output from the program


    There are two ways to debug a Jupyter Notebook:


    Run by line - a simpler mode


    Full debugging mode


    To debug in any of these modes, make sure you have the following:


    Need to have installed: ipykernel 6+ in the environment


    Need to have kernel based on Python 3.7+


    VS Code version should be v1.60+


    Jupyter extension version should be v2021.9+


    Follow these steps to install ipykernel:


    Open the terminal and activate the Notebook environment.


    Run: pip install -U ipykernel


    Close and reopen VS Code. Now, when you open a Jupyter notebook file, you should
    be able to select the kernel you just installed from the kernel'
- md: 'dropdown menu (top-right corner of the notebook interface). In case of any
    problem, go to The Developer: Reload Window command and reload it.


    Note: This installation may look different if you are using macOS.


    ## Debug the program line by line


    Run by line allows you to execute a cell one line at a time without being distracted
    by other VS Code debug features.


    ![](img/9d64daa418450477b4b5cccad74a5f4b_471_0.png)


    Figure 9.2: Line-by-line options


    Follow these steps to debug the program line by line in Jupyter notebook:


    To begin, click the Run by Line button in the cell toolbar. This will open the
    debug control which will let you step through the code line-by-line.


    You can also set breakpoints, examine variables, and more without leaving the
    cell. You can use the same Run by Line button to advance to the next statement
    in your code. To stop before the end of the cell, click the Stop button. To continue
    running to the end of the cell, click the Continue the toolbar.


    Launch the debugger by clicking on the Run by Line option or hitting


    When the debugger is running, you will notice another option available, which
    is to Continue Execution or use the shortcut option


    The original options are shown in Figure 9.2, and the in-progress option is shown
    in Figure


    ![](img/9d64daa418450477b4b5cccad74a5f4b_472_0.png)


    Figure 9.3: Line by line debugging in-progress


    Follow these simple steps to debug:


    Run the program by pressing the Run Cell button.


    If the program does not produce the expected output, go back and check the logic
    of each line of the program.


    If you find any mistakes in the logic, correct them and then run the program again.


    If the program produces the expected output, go back and check the input values
    to ensure that they are correct.


    If the input values are incorrect, correct them and then run the program again.


    If the program still does not produce the expected output, use the print() statement
    to print out the intermediate results of each step of the program. This will help
    you identify the bug.


    Once you have identified the bug, correct it and then run the program again.


    If the program produces the expected output, you can be sure that the has been
    successfully debugged.


    ## Full debugging option


    The full set of debugging features supported in VS Code can be used. Some of the
    features available here are breakpoints, the ability to step into other cells,
    and the ability to step into imported modules.


    Follow these steps to debug the program thoroughly:


    Open VSCode and the Python file containing the code you want to debug.


    Click on the Debug tab at the top of the window, as shown in Figure


    ![](img/9d64daa418450477b4b5cccad74a5f4b_474_0.png)


    Figure 9.4: Option to start full debugging


    On the Debug tab, select Python: Attach to Jupyter Kernel from the drop-down list.


    Click the green play button to start the debugger.


    Set breakpoints in the code by clicking in the left gutter of the code editor.


    Run the code in Jupyter, and the debugger will hit the breakpoints when encountered.


    If you are new to VS Code, you will see many new things here, as shown in Figure


    ![](img/9d64daa418450477b4b5cccad74a5f4b_475_0.png)


    Figure 9.5: Full debugging option in action


    Let us understand them to get some clarity on their purpose.


    Variables pane: You can easily inspect the variables that are created while debugging
    is in progress. You can see the entire list of variables with their current values
    stored. You can also see the difference between global and local variables. The
    local variables are the ones that have limited scope, for example, variables in
    the function.


    Watch This pane is like a subset of the variables pane, which shows only the variables
    you are interested in and not the entire list. You can add the variables you are
    interested in to the watch pane by clicking on the + icon when we hover over the
    pane. The watch pane is a great way to watch and monitor only the variables that
    seem not to work.


    Call stack Consider a situation where you have multiple inner methods to debug
    to precisely reach the line of code that is throwing the error or not working
    as expected. The call stack pane helps in such cases to navigate deep inside a
    stack data structure where the output of the functions is stored and helps by
    precisely identifying the area from which the error came.


    We discussed earlier as well that breakpoints are a very important concept while
    debugging. In normal execution, you do not define or specify any breakpoints as
    you want the program to run without any stoppage and give us the desired outcome.
    But when there is an error, the execution stops at the line that caused the error.
    However, while debugging you might want to control the execution of a program
    earlier and monitor the state of the variables at a particular point to understand
    what could have caused the error. So, you can place a breakpoint by simply clicking
    to the left of the line number in the editor. The created breakpoint will be indicated
    by a red dot, similar to what we see in Figure The advantage of running the script
    with breakpoints is that it will stop at the breakpoint and watch what has happened
    to the program.


    Use the debugger controls to step through the code line by line, inspect variables
    and evaluate expressions. Other options available here are as listed here:


    - It executes the next line of code in the current function. If there is no next
    line of code, the execution jumps to the next statement outside the current function.

    - Step It executes the next line of code in the current function. If it encounters
    a function or method call, the debugger will enter the code of that function or
    method.

    - Step It executes the next line of code in the current function. If it encounters
    a function or method call, the debugger will execute that line of code without
    entering the code of that function or method.

    - Step It exits the current function and executes the next line of code outside
    the function.

    - Set Breakpoint: It sets a breakpoint at the specified line of code. The debugger
    will pause the execution of the program when it reaches the breakpoint.

    - Clear Breakpoint: It removes breakpoint from the specified line of code. The
    debugger will no longer pause the execution of the program when it reaches the
    breakpoint.


    When finished, click the red stop button to end the debugging session.


    You can use the Debug Debug and other options as well from the Debug Toolbar as
    you normally would in VS Code.


    We learned about adding breakpoints and using them to check the program’s status.
    It is important to know that VS Code has three different types of breakpoints,
    each one for a different purpose. To select one of these, first you need to create
    a normal breakpoint, and then right-click on it and select Edit as shown in Figure


    ![](img/9d64daa418450477b4b5cccad74a5f4b_478_0.png)


    Figure Breakpoint options available after creating one


    Now, let us understand the purpose and characteristics of the different types
    of breakpoints:


    - Expression: This is the normal breakpoint, which triggers and stops the code’s
    execution when the condition is met. The condition can be seen in the watch pane
    or the variable pane. You can set the code to stop executing when the given condition
    is met. Also, this type of breakpoint is characterized by having “=” in the breakpoint
    red dot. Expression breakpoints allow you to set a breakpoint based on an expression.
    This expression can be a variable, an object, or a function. When the expression
    evaluates to be accurate, the breakpoint will be triggered. Expression breakpoints
    can be set in the debugger and used in conjunction with other types of breakpoints.
    Figure 9.7 shows how to add Expression breakpoint:


    ![](img/9d64daa418450477b4b5cccad74a5f4b_479_0.png)


    Figure 9.7: Types of Breakpoint options to choose


    - Hit Count: A hit count breakpoint allow you to set a breakpoint that will be
    triggered after a line of code has been executed a certain number of times. This
    breakpoint is helpful for debugging code that has a loop or is executed a set
    number of times.


    - Log Message: Log message breakpoints allow you to set a breakpoint that will
    be triggered when a certain message is logged in the console. This type of breakpoint
    is helpful in monitoring a program’s progress or debugging an issue related to
    a particular message. A log message breakpoint can be set in the debugger and
    used in conjunction with other types of breakpoints. This breakpoint does not
    stop the execution; instead, it is used for printing out some message to the log
    in the debug console.


    A breakpoint can be disabled by right-clicking it and selecting Disable


    These are the different options available to debug a Python program for Jupyter
    in VS Code.'
