  md: '# Creating toolbars with Tkinter


    Creating toolbars with Tkinter is just like creating menus. To create a toolbar,
    we must first create a Toolbar object. This can be done using the following line
    of code:


    ```

    toolbar = Toolbar(window)

    ```


    The Toolbar object takes one argument, which is the window object we created earlier.
    Once the Toolbar object has been created, we can add buttons using the method.
    This method takes three arguments: an which is a bitmap image to be used as the
    button’s icon; a which is a function that will be called when the button is clicked;
    and a which is a string that will be displayed when the user hovers over the button.


    For example, to create a button with the image the command and the tooltip Open
    we would use the following line of code:


    ```

    toolbar.add_button(image="icon.gif", command=open_file, tooltip="Open File")

    ```


    Once all the buttons have been added to the toolbar, we can display all of these
    buttons using the window object’s configure() method. This method takes one argument,
    which is the toolbar object we created earlier. For example, to display the toolbar
    on the window, we would use the following line of code:


    ```

    window.configure(toolbar=toolbar)

    ```'
