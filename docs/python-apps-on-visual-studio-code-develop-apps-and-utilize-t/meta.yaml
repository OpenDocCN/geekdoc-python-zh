- md: '## Performance and Scalability


    The source code for any software can get much larger and more complex. Code editors’
    performance and scalability have become very important considerations for the
    development team. Performance is an indication of the responsiveness of a system
    to execute any action within a given time interval, while scalability is the ability
    of a system either to handle increases in load without impact on performance or
    to increase the available resources. Let us look at a few factors considered while
    choosing VS Code over other editors.


    ## Desired quality


    The desired quality of Visual Studio Code is to be a lightweight code editor while
    supporting multiple programming languages. Language support will include debugging,
    implementation, and displaying results regardless of the type of application.


    ## Applicability


    It is recommended to use a processor of 1.6GHz or faster and at least 1 GB of
    RAM. Though the performance of Visual Studio Code itself is tested and known,
    there are elements like extensions, whose performance is unknown. This is so because
    the extensions available on the marketplace are developed by third-party developers
    and they do not necessarily test on various platforms and different conditions.


    ## Concerns


    One of the biggest concerns for Visual Studio Code is the response time. It is
    important that users do not have to wait long to open files, since this reduces
    the time they can spend on productive tasks like software development. This response
    time can be combined with the peak load behavior when large files are opened.
    This causes third-party behavior concerns since the whole file needs to be loaded
    at once. To reduce these concerns, Visual Studio Code tries to tackle the predictability
    concern by providing stable releases every month.


    ## Tactics


    Tactics in Visual Studio Code refer to a set of strategies or techniques that
    can be used to improve productivity and efficiency while working with the code
    editor. Visual Studio Code tries to optimize processing by spending an entire
    week after a release to test and optimize the implementation. Some parts of the
    code may be rushed to ship with the release. Since Visual Studio Code depends
    on certain frameworks such as IntelliSense, which can make large files difficult
    to handle. In such cases, prioritization of code becomes important. Modules are
    divided into different layers, base and common, to minimize the use of shared
    resources. Visual Studio Code uses asynchronous processing in the form of a worker.
    Workers can be used to run desired processes in the background, which do not affect
    the performance of the current page of Visual Studio Code. Tactics, along with
    various extensions and customization options available in Visual Studio Code,
    can significantly enhance your coding experience and productivity.


    ## VS Code vs Visual Studio


    Visual Studio Code and Visual Studio are Microsoft-made products with similar-sounding
    names, but that is where the similarity ends. They have different features and
    uses. We have already seen that Visual Studio is a full-fledged Integrated Development
    Environment with many features that are loved by millions of developers worldwide.
    But VS Code is proving to be a tough competitor to Visual Studio. Let us get into
    the details to understand when to use VS Code and when to use Visual Studio.


    Visual Studio helps develop desktop applications, web applications, web services,
    and mobile applications with the help of Microsoft’s software development platform,
    that is, Windows API, Windows Presentation Foundation, Windows Forms, Microsoft
    Silverlight, and Windows Store. They help produce and manage the code. VS Code
    is used to write, edit, and debug the code in a single editor, without requiring
    any web support. Everything that is required is built-in.


    To develop programs using Visual Studio, developers do not need to install any
    special software. VS Code is very powerful, but you need to know the right tools
    to be installed before you realize their benefits.


    Looking at the license cost, VS Code wins hands down. VS Code is free, while Visual
    Studio can cost you around $45 per month. You can refer to the Visual Studio website
    for detailed pricing.


    Visual Studio is available for Windows and macOS but not for Linux platforms,
    whereas VS Code is available for all three platforms.


    Let us look at a few situations where Visual Studio can be used:


    - Since Visual Studio is functionally feature-rich, developers do not need to
    install extensions or plugins. So, when you do not want to keep looking for the
    right plugin, this is your choice of IDE.

    - Visual Studio provides the right collaboration platform where the entire team
    can come together and debug the code; collaboration is super smooth.

    - For heavy-duty code analysis, Visual Studio has no match. It has incredible
    options for debugging and performance profiling.

    - Game development, Augmented Reality / Virtual Reality industries prefer Visual
    Studio because they can work effortlessly to build cross-platform applications.
    UNITY, a multi-platform environment, is integrated with Visual Studio.


    Now, let us look at a few situations where Visual Studio Code should be preferred:


    - VS Code is a lightweight application that doesn’t require a lot of computing
    power or hard disk space.

    - VS Code works faster as compared to Visual Studio.

    - The code generated by VS Code is incredibly flexible and can be moved to another
    platform easily.

    - Visual Studio Code is the number #1 choice for web development.


    ## Conclusion


    New technologies are emerging every day, and new frameworks are developed to use
    these technologies efficiently and effectively for our work. With the focus of
    software developers in today’s times, and more so with cloud computing booming,
    the shift has focused on developing applications faster and more securely. It
    is a sure thing to learn this new framework thoroughly to make the best of it;
    this is where VS Code scores over other code editors.


    This chapter introduced readers to the open-source project Visual Studio code
    and helped them understand its architecture. We discussed why VS Code is programmers’
    favorite choice of tool for developing different types of applications. We looked
    at the different layers of VS Code, which makes it powerful and, at the same time,
    retains its lightweight nature. We also looked at VS Code from different perspectives
    like context view, development view, performance and scalability, and technical
    debt.


    Another thing we can say for sure is that as new frameworks are developed in the
    future, these will be made available to VS Code using extensions. This would bring
    into play a great variety of code effectiveness and help programmers, testers,
    and data administrators—experienced and newbies—to write better and more effective
    code faster. The community drives Visual Studio Code development, prioritization
    of features comes from issue tracking, and a feature is implemented and optimized
    by the internal development team every week.


    In the next chapter, we will see how to install VS Code and Python extension and
    set up the path so that we are ready to code our applications.


    ## Join our book’s Discord space


    Join the book’s Discord Workspace for Latest updates, Offers, Tech happenings
    around the world, New Release and Sessions with the Authors:


    https://discord.bpbonline.com


    ![](img/9d64daa418450477b4b5cccad74a5f4b_67_0.png)


    ## Chapter 2

    Setting up the Environment


    > I will prepare and someday my chance will come.

    — Abraham Lincoln


    ## Introduction


    The first chapter aimed to introduce you to the VS Code, and this chapter is about
    getting started. You must be excited to do the first program in Python on VS Code.
    That will also help us understand different concepts well. This chapter will use
    simple programming concepts to revise basic Python programs and VS Code features
    like task running, editing the default settings, getting to know keyboard shortcuts,
    and running a Python program. The first thing we must do is set up a working development
    environment. We will start with Python installation and VS Code installation,
    and then we will set up the Python environment. The second part of the chapter
    is about understanding the what and how of the global and virtual environment.
    You must be excited to build and debug our first Python program. Let us get started!'
  mdcn: '## 性能与可扩展性


    任何软件的源代码都可能变得非常庞大和复杂。代码编辑器的性能和可扩展性已成为开发团队非常重要的考量因素。性能是指系统在给定时间间隔内执行任何操作的响应能力，而可扩展性则是指系统在不影响性能的情况下处理负载增加的能力，或增加可用资源的能力。让我们看看在选择
    VS Code 而非其他编辑器时考虑的几个因素。


    ## 期望质量


    Visual Studio Code 的期望质量是成为一个轻量级的代码编辑器，同时支持多种编程语言。语言支持将包括调试、实现和结果显示，无论应用程序类型如何。


    ## 适用性


    建议使用 1.6GHz 或更快的处理器以及至少 1 GB 的 RAM。虽然 Visual Studio Code 本身的性能经过测试且已知，但存在一些性能未知的元素，例如扩展。这是因为市场上可用的扩展由第三方开发者开发，他们不一定在各种平台和不同条件下进行测试。


    ## 关注点


    Visual Studio Code 最大的关注点之一是响应时间。用户不必等待很长时间来打开文件非常重要，因为这减少了他们可以花在软件开发等生产性任务上的时间。这个响应时间可以与打开大文件时的峰值负载行为相结合。这引发了第三方行为方面的担忧，因为整个文件需要一次性加载。为了减少这些担忧，Visual
    Studio Code 试图通过每月提供稳定版本来解决可预测性问题。


    ## 策略


    Visual Studio Code 中的策略是指一套可用于在使用代码编辑器时提高生产力和效率的策略或技术。Visual Studio Code 试图通过在发布后花费整整一周时间来测试和优化实现来优化处理。代码的某些部分可能为了随版本发布而仓促完成。由于
    Visual Studio Code 依赖于某些框架（如 IntelliSense），这可能使大文件难以处理。在这种情况下，代码的优先级变得很重要。模块被划分为不同的层（基础层和公共层），以最小化共享资源的使用。Visual
    Studio Code 使用异步处理形式的工作进程。工作进程可用于在后台运行所需进程，而不会影响 Visual Studio Code 当前页面的性能。策略，连同
    Visual Studio Code 中可用的各种扩展和自定义选项，可以显著增强您的编码体验和生产力。


    ## VS Code 与 Visual Studio


    Visual Studio Code 和 Visual Studio 是微软制造的产品，名称听起来相似，但仅此而已。它们具有不同的功能和用途。我们已经看到
    Visual Studio 是一个功能齐全的集成开发环境，拥有全球数百万开发者喜爱的许多功能。但 VS Code 正被证明是 Visual Studio 的强劲竞争对手。让我们深入了解细节，以理解何时使用
    VS Code，何时使用 Visual Studio。


    Visual Studio 帮助开发桌面应用程序、Web 应用程序、Web 服务和移动应用程序，借助微软的软件开发平台，即 Windows API、Windows
    Presentation Foundation、Windows Forms、Microsoft Silverlight 和 Windows Store。它们帮助生成和管理代码。VS
    Code 用于在单个编辑器中编写、编辑和调试代码，无需任何 Web 支持。所需的一切都是内置的。


    使用 Visual Studio 开发程序，开发者无需安装任何特殊软件。VS Code 功能非常强大，但您需要知道在实现其优势之前安装正确的工具。


    从许可成本来看，VS Code 胜出。VS Code 是免费的，而 Visual Studio 每月可能花费您约 45 美元。您可以参考 Visual Studio
    网站了解详细定价。


    Visual Studio 适用于 Windows 和 macOS，但不适用于 Linux 平台，而 VS Code 适用于所有三个平台。


    让我们看看可以使用 Visual Studio 的几种情况：


    - 由于 Visual Studio 功能丰富，开发者无需安装扩展或插件。因此，当您不想一直寻找合适的插件时，这是您选择的 IDE。

    - Visual Studio 提供了正确的协作平台，整个团队可以一起调试代码；协作非常顺畅。

    - 对于繁重的代码分析，Visual Studio 无与伦比。它拥有令人难以置信的调试和性能分析选项。

    - 游戏开发、增强现实/虚拟现实行业更喜欢 Visual Studio，因为他们可以轻松构建跨平台应用程序。UNITY，一个多平台环境，与 Visual Studio
    集成。


    现在，让我们看看应该优先选择 Visual Studio Code 的几种情况：


    - VS Code 是一个轻量级应用程序，不需要大量的计算能力或硬盘空间。

    - 与 Visual Studio 相比，VS Code 运行更快。

    - VS Code 生成的代码非常灵活，可以轻松移动到另一个平台。

    - Visual Studio Code 是 Web 开发的首选。


    ## 结论


    新技术每天都在涌现，新的框架被开发出来，以便高效有效地利用这些技术为我们的工作服务。随着当今软件开发者的关注点，以及云计算的蓬勃发展，重点已转向更快、更安全地开发应用程序。彻底学习这个新框架以充分利用它是一件肯定的事情；这就是
    VS Code 优于其他代码编辑器的地方。


    本章向读者介绍了开源项目 Visual Studio Code，并帮助他们理解其架构。我们讨论了为什么 VS Code 是程序员开发不同类型应用程序的首选工具。我们探讨了
    VS Code 的不同层次，这使其功能强大，同时保持其轻量级特性。我们还从不同的角度审视了 VS Code，如上下文视图、开发视图、性能和可扩展性以及技术债务。


    另一件我们可以肯定的事情是，随着未来新框架的开发，这些框架将通过扩展提供给 VS Code。这将带来各种各样的代码效率，并帮助程序员、测试人员和数据管理员——无论是经验丰富的还是新手——更快地编写更好、更有效的代码。社区驱动着
    Visual Studio Code 的开发，功能的优先级来自问题跟踪，内部开发团队每周都会实现和优化一个功能。


    在下一章中，我们将看到如何安装 VS Code 和 Python 扩展，并设置路径，以便我们准备好编写应用程序代码。


    ## 加入本书的 Discord 空间


    加入本书的 Discord 工作区，获取最新更新、优惠、全球科技动态、新书发布以及与作者的交流会：


    https://discord.bpbonline.com


    ![](img/9d64daa418450477b4b5cccad74a5f4b_67_0.png)


    ## 第 2 章

    设置环境


    > 我会做好准备，总有一天我的机会会到来。

    — 亚伯拉罕·林肯


    ## 引言


    第一章旨在向您介绍 VS Code，本章是关于入门。您一定很兴奋能在 VS Code 上用 Python 编写第一个程序。这也将帮助我们更好地理解不同的概念。本章将使用简单的编程概念来复习基本的
    Python 程序和 VS Code 功能，如任务运行、编辑默认设置、了解键盘快捷键以及运行 Python 程序。我们必须做的第一件事是设置一个工作开发环境。我们将从
    Python 安装和 VS Code 安装开始，然后设置 Python 环境。本章的第二部分是关于理解全局环境和虚拟环境的“是什么”和“如何做”。您一定很兴奋能构建和调试我们的第一个
    Python 程序。让我们开始吧！'
