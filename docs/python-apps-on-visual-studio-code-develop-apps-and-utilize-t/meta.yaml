  - '[PAGE 138]


    # Auto-imports


    The Pylance extension has a feature that automatically adds imports to the top
    of the Python files whenever a reference to a dependency is made in the environment.
    It does not install the dependency, but if it is already installed and available
    in the Python environment, then it adds it. At the same time, it removes the reference
    if it is no longer used in the program. One can see a lightbulb icon with suggestions
    to add or remove imports depending on the scenario.'
  - '[PAGE 139]


    # Semantic highlighting


    Semantic highlighting highlights (that is, colors) classes, functions, properties,
    and other Python object types to make them more readable.'
  - '[PAGE 140]


    # Type checking


    There is a new concept called type hinting, which is the practice of specifying
    expected data types for variables or functions or even for classes. Type hinting
    is new to Python, and even though Python does not enforce it, most programmers
    consider it as a best practice. Pylance helps developers to understand if their
    code violates any documented type hints if it has a type-checking setting enabled.


    One has to make the required settings change to make this enabled. Figure 3.6
    shows the steps to edit the settings:


    ![](img/9d64daa418450477b4b5cccad74a5f4b_140_0.png)


    The following text can be added to settings.json to enable the type hinting:


    ```

    json

    {

    ```'
