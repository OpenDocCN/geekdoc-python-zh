    ![Discord](img/9d64daa418450477b4b5cccad74a5f4b_462_0.png)\n\n## Chapter 9: Editing\
    \ and Debugging Jupyter Notebook\n\n> Program testing can be used to show the\
    \ presence of bugs, but never to show their absence.\n>\n> — Edsger W. Dijkstra,\
    \ Computer Scientist\n\n## Introduction\n\nEditing and debugging are two important\
    \ tasks that need to be done when writing computer code. Editing is correcting\
    \ errors in the code and making it more readable, while debugging is the process\
    \ of finding and fixing errors in the code. In Chapter 8, Jupyter Covid-19 Interactive\
    \ Dashboard, we built an application using Jupyter Notebook, and now we will learn\
    \ how to debug a Jupyter Notebook program in Visual Studio Code (VS Code).\n\n\
    This chapter introduces the process of debugging a Jupyter Notebook file in VS\
    \ Code. Debugging is an essential skill for any software professional, and Jupyter\
    \ Notebook is a popular open-source tool for interactive computing, data analysis,\
    \ and scientific computing. VS Code is a popular source code editor with a wide\
    \ array of features and extensions, making it a great choice for debugging Jupyter\
    \ Notebook files.\n\nThis chapter covers the basics of debugging Jupyter Notebook\
    \ files in VS Code. First, we will discuss the basics of configuring VS Code for\
    \ debugging. This includes setting up breakpoints, inspecting variables, and creating\
    \ and managing launch configurations. Then, we will discuss how to debug a Jupyter\
    \ Notebook file in VS Code. We will also cover the roles of the Python Interactive\
    \ Window and the Debug Console, and we will look at debugging tips and best practices.\
    \ Finally, we will discuss how to debug Jupyter Notebook files without using VS\
    \ Code.\n\n## Structure\n\nIn this chapter, we will discuss the following topics:\n\
    \n- Introduction to debugging in Jupyter Notebook\n- Types of errors\n- Checking\
    \ your code syntax\n- Verifying the output\n\n## Objectives\n\nContinuing with\
    \ the interactive dashboard application from the previous chapter, in this chapter,\
    \ you will learn how to use VS Code interface to edit and debug in Jupyter Notebook.\
    \ You will learn how to edit and arrange cells. In the Notebook environment, you\
    \ will learn about editing features like code completion, definition, declaration,\
    \ and formatting. By the end of this chapter, you should have a solid understanding\
    \ of how to debug a Jupyter Notebook file in VS Code.\n\n## Introduction to debugging\
    \ in Jupyter Notebook\n\nA good program to practice debugging is the classic FizzBuzz.\
    \ It prints out numbers from 1 to 100, replacing any number divisible by 3 with\
    \ the word Fizz and any number divisible by 5 with the word Buzz. Any number divisible\
    \ by both 3 and 5 should be replaced with FizzBuzz.\n\nThis program is simple\
    \ enough to understand and complex enough to require debugging. Writing the code\
    \ out and debugging should give you the practice you need to become a better programmer.\n\
    \nThe program goes like this:\n\n```python\nclass MyFizzBuzz:\n    def __init__(self,\
    \ start, end):\n        self.start = start\n        self.end = end\n\n    def\
    \ run(self):\n        for value in range(self.start, self.end + 1):\n        \
    \    if value % 3 == 0 and value % 5 == 0:\n                print(\"FizzBuzz\"\
    )\n            elif value % 3 == 0:\n                print(\"Fizz\")\n       \
    \     elif value % 5 == 0:\n                print(\"Buzz\")\n            else:\n\
    \                print(value)\n\nfb = MyFizzBuzz(1, 100)\nfb.run()\n```\n\nThe\
    \ expected output is as follows:\n\n```\n1\n2\nFizz\n4\nBuzz\nFizz\n...\n```\n\
    \n**Figure 9.1: Output from the program**\n\nThere are two ways to debug a Jupyter\
    \ Notebook:\n\n- Run by line - a simpler mode\n- Full debugging mode\n\nTo debug\
    \ in any of these modes, make sure you have the following:\n\n- Need to have installed:\
    \ ipykernel 6+ in the environment\n- Need to have kernel based on Python 3.7+\n\
    - VS Code version should be v1.60+\n- Jupyter extension version should be v2021.9+\n\
    \nFollow these steps to install ipykernel:\n\n1. Open the terminal and activate\
    \ the Notebook environment.\n2. Run: `pip install -U ipykernel`\n3. Close and\
    \ reopen VS Code. Now, when you open a Jupyter notebook file, you should be able\
    \ to select the kernel you just installed from the kernel selector."
