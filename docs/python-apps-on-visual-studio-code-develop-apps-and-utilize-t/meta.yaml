    # VS Code: Development view


    The development or implementation view illustrates a software system from a programmer’s
    perspective and is about software management. In this section, we will look at
    the architecture and software development process, how the code is structured,
    and how design and testing are performed.


    VS Code has a layered and modular core (folder location at github: These can be
    extended while using extensions. Extensions run in a separate process called the
    extension host and are implemented by utilizing the extension API. Built-in extensions
    are available in the extensions folder. Six core layers work together to make
    VS Code a powerful editor. These layers are shown in Figure'
  - '[PAGE 48]


    ![](img/9d64daa418450477b4b5cccad74a5f4b_48_0.png)


    Figure VS Code Module Diagram


    Let us now understand the purpose of these layers:


    This folder has user interface building blocks and general utilities, which any
    other layer can use. This common environment approach provides, among others,
    the structure to handle errors, process events, and do other web-related things.
    In the common environment, the code ranges widely, from simple functions to reduce
    code duplication, such as returning a hash value for an'
  - '[PAGE 49]


    object, to complex code that handles asynchronous processes. It also has other
    functionalities, such as:


    Reading the configuration files,


    Handling the checksum for encryption,


    Character encoding and decoding,


    Operating system functionalities for directory and file manipulation, and


    Network handling to interact with the web.


    This layer defines service injection support and the base services for VS Code
    that are shared across layers, and it excludes editor or workbench-specific code
    or services. Most of the services around which the VS Code project is organized
    are defined in the platform layer. The platform layer builds upon the base layer,
    creates instances, and registers services for almost everything. Extensions are
    all instantiated and registered through the platform layer. The workbench layer
    is built upon the platform layer, which initializes much more details, like CSS,
    that are not handled by the platform.


    By now, we know that VS Code has a high-productivity code editor, which gives
    the power of an IDE and the efficiency of a text editor. Now, let us look at how
    this is possible at all! The power behind VS Code editor is Monaco editor. Monaco
    started as a project at Microsoft’s Switzerland lab, which was part of a plan
    to build online development tools. It was built using TypeScript and launched
    in 2013. The first job of Monaco editor was as Azure’s website editing tool, and
    it was also used as the editor for Office 365’s extension development site. The
    editor layer handles everything from syntax'
  - '[PAGE 50]


    highlighting for different languages to user input, like copying, pasting, and
    selecting text. Services defined in the editor layer can be used by the controllers
    to fetch certain data. One of these services is TextMate, which interprets grammar
    files for text highlighting. The final part of the editor layer is contributions.
    Contributions extend functionalities like hiding and unhiding (blocking) comments,
    code indentation, and the usage of links.


    It contains the Monaco editor and code notebooks. It also provides the framework
    for panels like the Explorer, Status Bar, or Menu Bar. It leverages the Electron
    framework to implement the VS Code desktop application and browser APIs for VS
    Code for the web. The actual GUI of the workbench is implemented using the electron-browser
    environment. When the main component fires up the workbench, the shell component
    is called first. The shell component has five components that constitute the actual
    workbench:


    It handles the workbench in case of a crash.


    It saves the settings of the workbench.


    It handles the different keybindings that can be used in the workbench.


    It handles the different extensions installed in the workbench.


    It handles all sorts of actions that can be done in the workbench, such as zooming
    in/out, switching from the window, and opening a new window.


    It puts Electron main file, shared process, and the CLI together and forms the
    entry point to the desktop app.


    This forms the entry point to the server app for remote development.'
  - '[PAGE 51]


    Extensions use the extension API and run in a separate process called the extension
    host. Inside each layer, VS Code is organized by the target runtime environment
    to ensure that only the runtime-specific APIs are used. The VS Code project has
    the following target environments:


    Source code that needs only basic JavaScript APIs and runs in all the other target
    environments


    Source code that requires the browser APIs


    Source code that requires Nodejs APIs


    Source code that requires the Electron renderer-process APIs


    Source code that requires the Electron main-process APIs


    There are advantages to such a layered approach. It becomes easy to inject a service
    into VS Code.'
