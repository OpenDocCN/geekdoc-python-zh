    \nbattle_pattern = []\n\nfor i in range(5):\n    battle_pattern.append(['O ']\
    \ * 5)\n\ndef display(pattern):\n    for p in pattern:\n        print(\" \".join(p))\n\
    \nprint(\"Battleship Challenge - GAME ON!\")\ndisplay(battle_pattern)\n\ndef get_random_row(pattern):\n\
