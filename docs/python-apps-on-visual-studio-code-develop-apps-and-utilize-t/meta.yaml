    ## Creating menus and toolbars with Tkinter


    Menus and toolbars are essential components of any GUI. They provide users with
    a way to navigate a program, access important features, and carry out tasks. This
    section will teach us to create menus and toolbars with Tkinter, the standard
    Python GUI toolkit. We will go through the basics of how to create menus and toolbars,
    and we will also learn how to add items and customize the look and feel. By the
    end of this tutorial, you should have a better understanding of how to create
    and customize menus and toolbars with Tkinter.


    Once we have created a window object using the Tk() function, we will use this
    window object to create our menu. To create a menu, we must first create a Menu
    object. This can be done using the following line of code:


    ```

    menu = Menu(window)

    ```


    The Menu object takes one argument, which is the window object we created earlier.
    Once the Menu object is created, we can add items using the method. This method
    takes two arguments: a label, which is a string that will be displayed on the
    menu; and a command, which is a function that will be called when the item is
    selected. For example, to create an item with the Open label and the open_file()
    command, we would use the following line of code:


    ```

    menu.add_command(label="Open", command=open_file)

    ```


    We can also add separators to our menu using the add_separator() method. This
    method takes no arguments. Once all the items have been added to the menu, we
    can display it using the window object’s method. This method takes one argument,
    which is the menu object we created earlier.


    For example, to display the menu on the window, we would use the following line
    of code:


    ```

    window.configure(menu=menu)

    ```


    ## Creating toolbars with Tkinter


    Creating toolbars with Tkinter is just like creating menus. To create a toolbar,
    we must first create a Toolbar object. This can be done using the following line
    of code:


    ```

    toolbar = Toolbar(window)

    ```


    The Toolbar object takes one argument, which is the window object we created earlier.
    Once the Toolbar object has been created, we can add buttons using the method.
    This method takes three arguments: an which is a bitmap image to be used as the
    button’s icon; a which is a function that will be called when the button is clicked;
    and a which is a string that will be displayed when the user hovers over the button.


    For example, to create a button with the image the command and the tooltip Open
    we would use the following line of code:


    ```

    toolbar.add_button(image="icon.gif", command=open_file, tooltip="Open File")

    ```


    Once all the buttons have been added to the toolbar, we can display all of these
    buttons using the window object’s configure() method. This method takes one argument,
    which is the toolbar object we created earlier. For example, to display the toolbar
    on the window, we would use the following line of code:


    ```

    window.configure(toolbar=toolbar)

    ```


    ## Customizing menus and toolbars


    Once menus and toolbars have been created, they can be customized to suit the
    user’s needs using the configure() method. This method takes two arguments: an
    option, which is a string specifying the option to be configured; and a value,
    which is the value to be set for the option. For example, to select the font size
    of a menu to 12, we would use the following line of code:


    ```

    menu.configure(fontsize=12)

    ```


