    \ makes a sound!\")\n\nclass Dog(Animal):\n    def make_sound(self):\n       \
    \ print(\"Woof!\")\n\nclass Cat(Animal):\n    def make_sound(self):\n        print(\"\
    Meow!\")\n\ndog = Dog()\ncat = Cat()\n```"
  mdcn: "## 方法\n\n方法是与对象关联的函数。在 Python 中，方法并非类实例所独有。任何对象类型都可以拥有方法。对象可以使用属于它们的变量（也称为字段）来存储数据。对象也可以通过使用方法来获得功能。方法是在类中定义的函数。从定义上看，函数和方法是相似的，区别在于函数是独立的，而方法属于一个类或对象。类是使用\
    \ `class` 关键字创建的。类的字段和方法列在一个缩进的代码块中。\n\n让我们在 Python 中创建一个示例类，并了解其工作原理：\n\n这是一个声明类的示例：\n\
    \n```python\nclass Book:\n    \"\"\"Represents a Book class example\"\"\"\n  \
