    \ called while creating objects\nbook1 = Book(\"A to Z of Retail\")\nbook2 = Book(\"\
    Python and Practice\")\nbook3 = Book(\"Learn Python\")\n\n# calling class variable\
    \ using classname\nBook.print_book_count()\n\n# Calling functions\nbook1.say_hi()\n\
    book2.remove()\n\n# calling class variable using object\nbook1.print_book_count()\n\
    ```\n\n我们在前面的示例中使用了 `__init__()` 方法来初始化变量。让我们理解这个方法的重要性。\n\n## init 方法\n\n在 Python\
    \ 类中，有一些方法具有特殊意义，包括 init 方法。`__init__`（双下划线 init 双下划线）方法在类的对象被实例化时立即执行。由于该方法是自动调用的，因此它用于初始化对象。\n\
    \n注意：双下划线位于 init 的开头和结尾。\n\n## 关于类和对象的更多信息\n\n类变量（由类拥有）是共享的，可以被该类的所有实例访问。类变量只有一个副本，这与对象变量不同，对象变量为每个对象复制一份。当任何一个对象对类变量进行更改时，由于只有一个副本，所有其他实例都会看到该更改。\n\
    \n对象变量属于类的每个对象/实例。每个对象都有自己的字段副本，即它们不共享，并且与不同实例中同名的字段没有任何关系。\n\n`classmethod()`\
    \ 是 Python 中的一个内置函数，它将方法的所有权建立给给定的类。类方法可以被类和对象调用。\n\n在前面的示例中，`book_count` 属于 Book\
    \ 类，因此是一个类变量。`title` 变量属于对象，并使用 `self.title` 赋值。类变量被引用为 `Book.book_count`，而不是\
    \ `self.book_count`。对象变量名在对象的方法中使用 `self.title` 表示法引用。除了 `self.title`，它也可以被引用为\
    \ `self.__class__.title`，因为每个对象都可以通过 `self.__class__` 属性引用其类。\n\n`__init__` 方法用于用名称初始化书籍实例，并且由于添加了一本书，我们将\
    \ `book_count` 增加 1。在 `remove()` 方法中，我们简单地将 `Book.book_count` 减少 1。所有类成员都是公共的，这意味着它们可以从任何类甚至从主程序访问。如果数据成员的名称以双下划线为前缀，例如\
    \ `__variable`，Python 使用名称修饰来有效地使其成为私有变量。任何仅应在类或对象内部使用的变量，其名称应以下划线开头，所有其他名称都是公共的，可以被其他类/对象使用。这只是一个约定，并非由\
    \ Python 强制执行（双下划线前缀除外，它是为了使成员私有）。\n\n类和对象有四个重要支柱：\n\n- 继承\n- 多态\n- 数据抽象\n- 封装\n\
    \n## 继承\n\n继承是一个过程，通过这个过程，一个类的对象获取另一个类的对象的属性。继承提供了代码重用性，使创建和维护应用程序变得更容易。在本节中，我们将介绍继承的基础知识。\n\
    \n### 什么是 Python 中的继承？\n\n继承是从现有类（称为父类）创建新类（称为子类）的一种方式。子类将具有与父类相同的属性和行为，但它也可以拥有自己独特的属性和行为。继承提供了一种重用父类代码并扩展它的方法。\n\
    \n### 继承的语法\n\n在 Python 中，继承使用以下语法指定：\n\n```python\nclass ChildClass(ParentClass):\n\
    \    # code\n```\n\n这里，`ChildClass` 是子类的名称，`ParentClass` 是父类的名称。\n\n### 继承在 Python\
    \ 中是如何工作的？\n\n继承通过允许子类继承父类的属性和行为来工作。当子类继承父类时，它会自动继承父类的方法和属性。这意味着子类可以使用继承的方法和属性，而无需再次定义它们。\n\
    \n例如，假设我们有一个名为 `Animal` 的类，它有一个名为 `name` 的属性和一个名为 `speak` 的方法。我们可以创建一个名为 `Dog`\
    \ 的新类，它继承自 `Animal`。\n\n```python\n# Example of Inheritance in Python\n\nclass\
    \ Animal:\n    def __init__(self, name):\n        self.name = name\n\n    def\
    \ speak(self):\n        print(\"%s says 'hello!'\" % self.name)\n\nclass Dog(Animal):\n\
    \    def bark(self):\n        print(\"%s barks 'woof!'\" % self.name)\n\n# Create\
    \ an instance of the Dog class\nd = Dog(\"Fido\")\n\n# Call the speak() method\n\
    d.speak()\n# Output\n# Fido says 'hello!'\n\n# Call the bark() method\nd.bark()\n\
    # Output\n# Fido barks 'woof!'\n```\n\n在这个例子中，我们定义了一个名为 `Animal` 的类，它有一个名为 `name`\
    \ 的属性和一个名为 `speak` 的方法。然后我们创建了一个名为 `Dog` 的类，它继承自 `Animal`。这意味着 `Dog` 类自动获得了 `Animal`\
    \ 类的方法和属性。\n\n当我们创建 `Dog` 类的实例时，我们可以调用从 `Animal` 类继承的 `speak()` 方法，以及在 `Dog` 类中定义的\
    \ `bark()` 方法。这就是继承在 Python 中的工作方式。\n\n继承提供了许多优势，包括以下几点：\n\n- **代码重用性**：继承允许我们重用现有代码，而不必从头开始编写。这节省了时间，并使代码更易于维护。\n\
    - **可扩展性**：继承使得扩展现有代码变得更容易，而不必重写它。这使代码更简单，更容易理解。\n- **可维护性**：继承使得在不修改任何现有代码的情况下向现有类添加新功能成为可能。这使得根据需要扩展应用程序变得更容易。\n\
    \n## 多态\n\n多态允许程序在不同的上下文中执行不同的行为；例如，考虑以下代码：\n\n```python\nclass Animal:\n    def\
    \ make_sound(self):\n        print(\"This animal makes a sound!\")\n\nclass Dog(Animal):\n\
    \    def make_sound(self):\n        print(\"Woof!\")\n\nclass Cat(Animal):\n \
    \   def make_sound(self):\n        print(\"Meow!\")\n\ndog = Dog()\ncat = Cat()\n\
    ```"
