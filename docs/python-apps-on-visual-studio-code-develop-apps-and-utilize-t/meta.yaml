- md: '## Main IDE/Editor 100+


    ![](img/9d64daa418450477b4b5cccad74a5f4b_38_0.png)


    Figure Main IDE/Editor (source: JetBrains/Python Software Foundation)


    According to a report published by Visual Studio Magazine (July 2022), the Python
    extension for Visual Studio Code has seen over 60 million installs, which is,
    by far, the highest number of installs. Jupyter has (40.8 million), Pylance (33.5
    million), and Jupyter Keymap (23.4 million), with these extensions (also related
    to Python), taking the second, third, and fifth positions, respectively. But,
    this did not happen overnight. Visual Studio Code, along with GitHub, Codespaces,
    and Azure Machine Learning, have been investing substantially into tools and platforms
    to make the lives of Python data scientists easier (source: EuroPython show 2021).
    The amazing thing is that we will cover all these in the later chapters of this
    book, so rest assured that you will learn the best tools available today.


    Let us look at some of its features and why it has become programmers’ favourite
    code editor:


    - It is a free open-source (under the MIT License) cross-platform application.

    - It is easy to use.

    - It is a lightweight, fast but powerful source code editor.

    - It can be integrated with scripting tools and perform common tasks like developing
    everyday workflows.

    - It comes with built-in support for tools like IntelliSense code completion,
    code refactoring, parameter hints, multi-cursor editing, and rich semantic code
    understanding, which takes programming to the next level. For example, if the
    user forgets to declare a certain variable before being used in the program, IntelliSense
    will declare that variable. A sample screenshot is shown in the Figure.


    ![](img/9d64daa418450477b4b5cccad74a5f4b_40_0.png)


    Figure Auto completion in VS Code using IntelliSense


    - It has an integrated interactive debugger, which helps step through the code,
    inspect values of variables, and view call stacks. It can also execute commands
    in the console. Figure 1.3 shows the various options of integrated interactive
    debugger marked on the image:


    ![](img/9d64daa418450477b4b5cccad74a5f4b_40_1.png)


    ## Figure Debugging in VS Code


    - It runs on a desktop and is available for Windows, macOS, and Linux. Earlier,
    editors used to support one of the operating systems, Windows, Linux, or Mac.
    But VS Code is cross-platform, so it can easily work on all three platforms.

    - It is fully customizable to fit any developer’s preferences and project requirements.

    - It has great support from the community and tons of extensions. So, if a programmer
    cannot find support for a given programming language, they can easily download
    the extension and continue working.

    - It has built-in support for web programming languages like JavaScript, TypeScript,
    and Node.js. It also has an ecosystem of extensions for multiple other languages
    and runtimes, such as C++, C#, Java, Python, PHP, Go, and .NET. These are just
    a few of more than 30 languages that are supported. This has another advantage
    here; VS Code can easily detect if there is any fault in the cross-language reference.

    - It can be configured to anybody’s liking through its various settings: language,
    user, and workspace. Several scopes for settings are provided by VS Code, which
    enables us to modify almost every part of Code’s editor, user interface, and functional
    behavior.

    - It provides comprehensive facilities to computer programmers to be instantly
    productive with features like syntax highlighting, bracket-matching, auto-indentation,
    box-selection, snippets, and many more.

    - It has support for Git, which means the programmers can work with source control
    without leaving the editor, even for viewing pending changes differences.

    - It supports multiple projects. It is possible to work with projects containing
    multiple files/folders that can be opened simultaneously. These projects or folders
    can even be unrelated to each other.

    - It provides an inbuilt terminal/console, so the user need not switch between
    VS Code and command prompt or terminal.

    - It is liked by front-end and back-end developers because of the multiple language
    support. Along with this, common zoom-in, zoom-out, brightness, and theme selection
    features are also available.

    - It is updated monthly with new features and bug fixes.


    ## What is VS Code?


    Now, let us understand why VS Code is probably a better choice among all the code
    editors available right now. First, it is free to use and has very useful features
    that fully featured IDEs generally have. It enables a programmer to write code,
    debug, and autocomplete or correct the code. It is difficult for a code editor
    to have such features, but since VS Code has IntelliSense integrated with itself,
    it makes this possible. In this section, we will learn what the VS Code editor
    is and how VS Code can integrate such powerful features. Figure 1.4 shows a sample
    program running on VS Code editor:


    ![](img/9d64daa418450477b4b5cccad74a5f4b_43_0.png)


    VS Code is developed with the Electron Framework and made open-source by Microsoft
    to create a lightweight alternative to Microsoft’s Visual Studio, a complex, fully
    featured Integrated Development Environment. There are differences between an
    IDE and Code Editor. IDEs are robust and self-contained software aimed at making
    programming easier. All the tools of an IDE are integrated. On the other hand,
    a code editor is a text editor, which has robust built-in features. IDEs also
    have code editors built into themselves where the developers write their code.
    The source-code of VS Code is under the MIT License and is maintained at the VS
    Code repository at GitHub. Though VS Code ships under a standard Microsoft product
    license, it’s free to use. The commercial license is attached because it has a
    small percentage of Microsoft-specific customizations. As it is open-source, developers
    can contribute to improving VS Code by adding issues or making pull requests from
    the GitHub location. Electron’s open-source framework, maintained by GitHub, is
    designed to develop desktop-based applications using web technologies like HTML,
    Javascript, and CSS.


    ## VS Code: Context view


    In this section, we will look at the context diagram of VS Code. A System Context
    Diagram is a block or engineering diagram that defines the boundary of the system
    and its environment and represents all the external entities that interact with
    the system. This provides a high-level understanding of the system. The objective
    of creating and understanding a system context diagram is to understand and focus
    on external components and events considered in developing the entire system.
    Figure 1.5 shows the context view diagram; we identify different entities and
    see how they connect to Visual Studio Code:


    ![](img/9d64daa418450477b4b5cccad74a5f4b_45_0.png)


    Figure Context Diagram for Visual Studio Code


    The preceding Figure 1.5 shows multiple stakeholders and external processes that
    are involved with the development, maintenance, and use of VS Code. The VS Code
    project is built using the Electron framework. This framework uses programming
    languages like HTML, Javascript, CSS, and TypeScript, and it builds the installers
    for different operating systems. The VS Code website then distributes the installers
    for each of the three operating systems. VS Code website also provides documentation
    (Docs), updates on new releases (Updates), VS Code Community Discussion (Blog),
    documentation related to APIs (API), and a list of extensions available (Extensions).
    The use of extensions can also help personalize the VS Code editor, for example,
    choosing your own font type and size for the editor.


    GitHub provides a cloud-based Git repository that provides software development
    and version control services. VS Code’s code and issues/bugs are managed and tracked
    by developers at GitHub, where they are solved through contributions made by the
    community. The wiki contains information such as project structure, how one can
    contribute to the code, and links to various resources.


    Next in the context diagram are the main stakeholders. Microsoft developed the
    VS Code. Developers contribute to adding new features or fixing bugs identified
    by the community. Atom, Vim, Emacs, and Sublime Text are some of the editors identified
    as the competitors, as these are also lightweight text editors used to develop
    applications. We do not consider IDEs like Visual Studio, Pycharm, or IntelliJ
    as competitors, as these are more complex than code editors.'
  mdcn: '## 主流 IDE/编辑器 100+


    ![](img/9d64daa418450477b4b5cccad74a5f4b_38_0.png)


    图 主流 IDE/编辑器（来源：JetBrains/Python 软件基金会）


    根据 Visual Studio Magazine（2022年7月）发布的一份报告，Visual Studio Code 的 Python 扩展安装量已超过
    6000 万次，这无疑是目前最高的安装量。Jupyter（4080 万次）、Pylance（3350 万次）和 Jupyter Keymap（2340 万次）这些（同样与
    Python 相关的）扩展分别占据了第二、第三和第五位。但是，这并非一蹴而就。Visual Studio Code 与 GitHub、Codespaces
    和 Azure Machine Learning 一起，一直在大力投资工具和平台，以让 Python 数据科学家的生活更轻松（来源：EuroPython show
    2021）。令人欣喜的是，我们将在本书的后续章节中涵盖所有这些内容，因此请放心，你将学到当今可用的最佳工具。


    让我们来看看它的一些特性，以及它为何成为程序员最喜爱的代码编辑器：


    - 它是一个免费的开源（基于 MIT 许可证）跨平台应用程序。

    - 它易于使用。

    - 它是一个轻量级、快速但功能强大的源代码编辑器。

    - 它可以与脚本工具集成，并执行诸如开发日常工作流等常见任务。

    - 它内置了对 IntelliSense 代码补全、代码重构、参数提示、多光标编辑和丰富的语义代码理解等工具的支持，将编程提升到了一个新的水平。例如，如果用户在程序中使用某个变量之前忘记声明它，IntelliSense
    会声明该变量。示例截图如图所示。


    ![](img/9d64daa418450477b4b5cccad74a5f4b_40_0.png)


    图 在 VS Code 中使用 IntelliSense 进行自动补全


    - 它具有集成的交互式调试器，可帮助逐步执行代码、检查变量值和查看调用堆栈。它还可以在控制台中执行命令。图 1.3 显示了集成交互式调试器在图像上标记的各种选项：


    ![](img/9d64daa418450477b4b5cccad74a5f4b_40_1.png)


    ## 图 在 VS Code 中调试


    - 它在桌面运行，适用于 Windows、macOS 和 Linux。以前，编辑器通常只支持 Windows、Linux 或 Mac 中的一种操作系统。但
    VS Code 是跨平台的，因此它可以轻松地在所有三个平台上工作。

    - 它完全可定制，以适应任何开发者的偏好和项目需求。

    - 它拥有社区的大力支持和大量的扩展。因此，如果程序员找不到对某种特定编程语言的支持，他们可以轻松下载扩展并继续工作。

    - 它内置了对 JavaScript、TypeScript 和 Node.js 等 Web 编程语言的支持。它还拥有一个针对多种其他语言和运行时的扩展生态系统，例如
    C++、C#、Java、Python、PHP、Go 和 .NET。这只是支持的 30 多种语言中的一部分。这里还有另一个优势；VS Code 可以轻松检测跨语言引用中是否存在任何错误。

    - 可以通过其各种设置（语言、用户和工作区）配置为任何人的喜好。VS Code 提供了多个设置范围，使我们能够修改 Code 编辑器、用户界面和功能行为的几乎每个部分。

    - 它为计算机程序员提供了全面的设施，通过语法高亮、括号匹配、自动缩进、框选、代码片段等众多功能，使其能够立即投入工作。

    - 它支持 Git，这意味着程序员无需离开编辑器即可使用源代码管理，甚至可以查看待处理的更改差异。

    - 它支持多个项目。可以同时打开包含多个文件/文件夹的项目并进行工作。这些项目或文件夹甚至可以彼此无关。

    - 它提供内置终端/控制台，因此用户无需在 VS Code 和命令提示符或终端之间切换。

    - 它受到前端和后端开发者的喜爱，因为它支持多种语言。除此之外，还提供了常见的放大、缩小、亮度和主题选择功能。

    - 它每月更新，包含新功能和错误修复。


    ## 什么是 VS Code？


    现在，让我们理解为什么 VS Code 可能是当前所有可用代码编辑器中更好的选择。首先，它是免费使用的，并且具有全功能 IDE 通常才有的非常有用的功能。它使程序员能够编写代码、调试、自动补全或纠正代码。代码编辑器很难拥有这样的功能，但由于
    VS Code 集成了 IntelliSense，这使得它成为可能。在本节中，我们将了解 VS Code 编辑器是什么，以及 VS Code 如何集成如此强大的功能。图
    1.4 显示了在 VS Code 编辑器上运行的示例程序：


    ![](img/9d64daa418450477b4b5cccad74a5f4b_43_0.png)


    VS Code 使用 Electron 框架开发，并由 Microsoft 开源，旨在创建一个轻量级的替代方案，以替代 Microsoft 的 Visual
    Studio（一个复杂的、全功能的集成开发环境）。IDE 和代码编辑器之间存在差异。IDE 是健壮且自包含的软件，旨在使编程更容易。IDE 的所有工具都是集成的。另一方面，代码编辑器是一个文本编辑器，具有强大的内置功能。IDE
    也内置了代码编辑器，开发者在其中编写代码。VS Code 的源代码在 MIT 许可证下，并在 GitHub 的 VS Code 仓库中维护。尽管 VS Code
    以标准的 Microsoft 产品许可证发布，但它是免费使用的。商业许可证被附加是因为它包含一小部分 Microsoft 特定的定制。由于它是开源的，开发者可以通过在
    GitHub 位置添加问题或发起拉取请求来为改进 VS Code 做出贡献。Electron 的开源框架由 GitHub 维护，旨在使用 HTML、Javascript
    和 CSS 等 Web 技术开发基于桌面的应用程序。


    ## VS Code：上下文视图


    在本节中，我们将查看 VS Code 的上下文图。系统上下文图是一个块或工程图，它定义了系统及其环境的边界，并表示与系统交互的所有外部实体。这提供了对系统的高层次理解。创建和理解系统上下文图的目标是理解并关注在开发整个系统时考虑的外部组件和事件。图
    1.5 显示了上下文视图图；我们识别不同的实体，并查看它们如何连接到 Visual Studio Code：


    ![](img/9d64daa48450477b4b5cccad74a5f4b_45_0.png)


    图 Visual Studio Code 的上下文图


    前面的图 1.5 显示了与 VS Code 的开发、维护和使用相关的多个利益相关者和外部流程。VS Code 项目使用 Electron 框架构建。该框架使用
    HTML、Javascript、CSS 和 TypeScript 等编程语言，并为不同的操作系统构建安装程序。VS Code 网站随后分发这三个操作系统的安装程序。VS
    Code 网站还提供文档（Docs）、新版本更新（Updates）、VS Code 社区讨论（Blog）、与 API 相关的文档（API）以及可用扩展列表（Extensions）。扩展的使用也有助于个性化
    VS Code 编辑器，例如，为编辑器选择自己的字体类型和大小。


    GitHub 提供了一个基于云的 Git 仓库，提供软件开发和版本控制服务。VS Code 的代码和问题/错误由 GitHub 上的开发者管理和跟踪，并通过社区的贡献来解决。Wiki
    包含诸如项目结构、如何为代码做贡献以及指向各种资源的链接等信息。


    上下文图中的下一个主要利益相关者。Microsoft 开发了 VS Code。开发者为添加新功能或修复社区发现的错误做出贡献。Atom、Vim、Emacs
    和 Sublime Text 被确定为竞争对手，因为它们也是用于开发应用程序的轻量级文本编辑器。我们不将 Visual Studio、Pycharm 或 IntelliJ
    等 IDE 视为竞争对手，因为它们比代码编辑器更复杂。'
