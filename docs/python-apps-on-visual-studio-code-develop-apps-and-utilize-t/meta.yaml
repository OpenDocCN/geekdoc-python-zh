- md: "## Divide and conquer\n\nAlgorithms like the greedy method, dynamic programming,\
    \ and divide and conquer are fundamental techniques that have various applications.\
    \ In this section, we will use the divide and conquer technique to solve examples.\
    \ The general idea behind this technique is to solve a problem by breaking it\
    \ down into subproblems that are easier to solve.\n\nFor example, the merge sort\
    \ algorithm is a divide and conquer algorithm. It works by taking a list of numbers\
    \ and breaking the list into two halves until the list only contains one number.\
    \ It then sorts the two halves and merges them together in the correct order.\
    \ This process is repeated until the entire list is sorted.\n\nBinary search is\
    \ another classic example of a divide-and-conquer algorithm. It works by dividing\
    \ a sorted array in half and then comparing the target value to the value in the\
    \ middle of the array. If the target is less than the value in the middle, then\
    \ the algorithm searches the left side of the array. If the target is more than\
    \ the value in the middle, it searches the array’s right side. This process is\
    \ repeated until the target is found or there are no more elements to search.\n\
    \nQuick sort is another example of a divide and conquer algorithm. It works by\
    \ choosing a pivot element from the list and then partitioning the list into two\
    \ halves based on the pivot. The elements less than the pivot are placed on one\
    \ side of the list, and those more significant than the pivot are placed on the\
    \ other. This process is repeated on each partition until all elements are sorted.\n\
    \n### Exponential problem solving using divide and conquer\n\nTraditionally, this\
    \ is solved using a loop that would perform x * x * x ... * x and so on. This\
    \ algorithm runs in the linear order of n, as shown in the following code:\n\n\
    ```python\nexp = 1\nfor i in range(n):\n    exp *= x\nprint(f\"12 to the power\
    \ of {n} = {exp}\")\n```\n\nThe preceding program runs a for loop to calculate\
    \ 12 to the power of 5. The time complexity of this algorithm is O(n). We look\
    \ to improve the running time of the algorithm using divide and conquer. In the\
    \ divide and conquer approach, the exponential of x^n is achieved by creating\
    \ subproblems of size n/2. This is demonstrated in Figure 9.1.\n\n![Figure 9.1:\
    \ Exponential calculation using divide and conquer](img/9d64daa418450477b4b5cccad74a5f4b_334_0.png)\n\
    \nThe exponential calculation is shown in Figure 9.2.\n\n![Figure 9.2: Exponential\
    \ calculation representation using divide-and-conquer technique](img/9d64daa418450477b4b5cccad74a5f4b_335_0.png)\n\
    \nNow, let us see the implementation of the preceding logic using Python code:\n\
    \n```python\ndef calc_pow(x, n):\n    \"\"\"\n    Exponential value calculation\
    \ using Divide and Conquer technique\n    :param x: number\n    :param n: power\n\
    \    :return: multiplication of x and n\n    \"\"\"\n    if n == 0:\n        return\
    \ 1\n    elif n % 2 == 0:\n        return calc_pow(x, n // 2) * calc_pow(x, n\
    \ // 2)\n    else:\n        return x * calc_pow(x, n // 2) * calc_pow(x, n //\
    \ 2)\n\nexp_val = calc_pow(12, 5)\nprint(f\"12 to the power of 5 = {exp_val}\"\
    )\n```\n\nExponential value calculation is done by breaking the logic into smaller,\
    \ more manageable pieces. It works by dividing the problem into smaller subproblems,\
    \ solving each subproblem recursively, and then combining the solutions of the\
    \ subproblems to form the final solution. In this example, divide and conquer\
    \ can be used to reduce the time complexity of the calculation. The algorithm\
    \ works by breaking the problem into smaller parts, computing the exponential\
    \ value of each part, and then combining the results to form the overall answer.\
    \ The size of each subproblem can be chosen based on the desired accuracy of the\
    \ result. By breaking the problem down into smaller pieces, the computation time\
    \ can be significantly reduced to O(log n).\n\n## Backtracking\n\nBacktracking\
    \ is a type of algorithm that tries different solutions until it finds the right\
    \ one. It is a systematic, step-by-step approach that incrementally builds candidates\
    \ to the solutions. It is used to find all possible solutions to a problem by\
    \ exploring all possible paths. It works by repeatedly making choices, backtracking\
    \ when a choice leads to a dead end, and tracking the best solution found so far.\
    \ This process is repeated until a solution is found or all possibilities are\
    \ exhausted.\n\nThese algorithms can be applied to different types of problems.\
    \ For example, a backtracking algorithm can be used to solve a maze, by trying\
    \ different paths until the end is reached. It can also be used to solve a Sudoku\
    \ puzzle, by testing each possible number in each empty cell. Even though it can\
    \ be a tedious process, it provides an efficient way to solve complex problems.\n\
    \nTo illustrate how backtracking works, consider the following example:\n\nWe\
    \ have an array of numbers, and we want to find a subset of the numbers that add\
    \ up to a given sum. Let us say we have the array [1, 3, 7, 5, 9, 11], and we\
    \ want to find a subset that adds up to 12.\n\nTo solve this problem using a backtracking\
    \ algorithm, we start by looking at the first number in the array: 1. We add 1\
    \ to our running total and move on to the second number: 3. We add 3 to our running\
    \ total, then move on to the third number: 5. We add 5 to our running total and\
    \ now have a total of 9. Since 9 is less than 12, we continue to the following\
    \ number: 7. We add 7 to our running total and now have 16. Since 16 is greater\
    \ than 12, we backtrack to the previous number, 5, and remove it from our running\
    \ total. We now have a total of 4. We continue this process until we find a subset\
    \ of numbers that gives the sum of 12. In this case, the subset of numbers that\
    \ adds up to 12 is [1, 11], [3, 9], and [7, 5].\n\nLet us look at the Python implementation\
    \ of the mentioned problem:\n\n```python\nclass find_subset_sum:\n    \"\"\"\n\
    \    Class to implement a method to find\n    whether or not there exists any\
    \ subset\n    of array that sum up to targetSum\n    \"\"\"\n    def __init__(self):\n\
    \        self.count = 0  # to count the total possibilities\n        self.subsets\
    \ = []  # to store the valid values for subset\n\n    # BACKTRACKING ALGORITHM\n\
    \    def backtrack(self, st_idx, current_sum, target, list_val):\n        if target\
    \ == current_sum:\n            self.count += 1\n            self.subsets.append(list_val[:st_idx])\n\
    \            return\n\n        if st_idx >= len(list_val) or current_sum > target:\n\
    \            return\n\n        # generate nodes\n        for i in range(st_idx,\
    \ len(list_val)):\n            # store to find sum\n            current_sum +=\
    \ list_val[i]\n            self.backtrack(i + 1, current_sum, target, list_val)\n\
    \            # remove as now longer valid\n            current_sum -= list_val[i]\n\
    \n# Driving code\nc1 = find_subset_sum()\nc1.backtrack(0, 0, 10, [1, 2, 7, 3,\
    \ 5])\nprint(f\"Subset => {c1.subsets}\")\nprint(f\"Result: {c1.count}\")\n\n\
    c2 = find_subset_sum()\nc2.backtrack(0, 0, 12, [1, 3, 7, 5, 9, 11])\nprint(f\"\
    Subset => {c2.subsets}\")\nprint(f\"Result: {c2.count}\")\n```\n\nOutput\n\nSubset\
    \ => [[1, 2, 7], [3, 5, 2], [3, 7]]\nResult: 3\n\nSubset => [[1, 11], [3, 9],\
    \ [7, 5]]\nResult: 3\n\nSome of the applications of the backtracking algorithm\
    \ are as follows:\n\n- **Solving problems that require decision-making**: It is\
    \ widely used to solve problems that require decision-making. Examples include\
    \ the famous 8 queen problem, the Hamiltonian circuit problem, the knapsack problem,\
    \ and the Sudoku puzzle."
