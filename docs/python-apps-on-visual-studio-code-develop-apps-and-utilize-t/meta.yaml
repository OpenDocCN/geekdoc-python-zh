  md: '# Conclusion


    Threading in Python is used to run multiple threads (tasks, function calls) at
    the same time. This does not mean that they are executed on different CPUs. Python
    threads will not make your program faster if it already uses 100% CPU time. In
    that case, you probably want to look into parallel programming.


    Python threads are used in cases where the execution of a task involves some waiting.
    One example would be interaction with a service hosted on another computer, such
    as a web server. Threading allows Python to execute other code while waiting;
    this is easily simulated with the sleep function.


    Running several threads is similar to running several different programs concurrently,
    but with the following benefits:


    Multiple threads within a process share the same data space with the main thread
    and can therefore, share information or communicate with each other more easily
    than if they were separate processes.


    Threads are sometimes called light-weight processes, and do not require much memory
    overhead; they come cheaper than processes.


    A thread has a beginning, an execution sequence, and a conclusion. It has an instruction
    pointer that keeps track of where within its context it is currently running.'
