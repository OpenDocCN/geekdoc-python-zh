  - '[PAGE 136]


    # Pylance


    Pylance by Microsoft can massively enhance your productivity. Pylance is a Python
    language server, offering enhancements to IntelliSense, syntax highlighting, and
    a host of other features for an amazing development experience for Python developers.
    IntelliSense is more like a generic name for various code editing features that
    would include code completion, parameter info, quick info, and member lists. IntelliSense
    features are also known by names like code completion, content assist, and code
    hinting. IntelliSense quickly shows the probable methods, class members, and documentation
    you may want to use as you type. One can trigger completions at any time with
    Ctrl+Space. Pylance enhances the help provided by IntelliSense. Some of the features
    provided by Pylance are as follows:


    +   - Docstrings

    - Signature help and type information

    - Parameter suggestions

    - Code completion

    - Auto-imports (add and remove import)

    - As-you-type reporting of code errors and warnings

    - Code outline'
