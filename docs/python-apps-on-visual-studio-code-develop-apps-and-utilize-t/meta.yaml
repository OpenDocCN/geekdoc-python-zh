- md: "## Lightrun\n\n[Lightrun](https://lightrun.com) is an open-source Visual Studio\
    \ Code extension that provides an easy way to run and debug programs from within\
    \ the text editor. Lightrun is available for other programming languages, like\
    \ Python, Java, C, C++, and Rust. With Light Runner, you can quickly test and\
    \ debug code without needing to leave the editor or manually set breakpoints.\
    \ Figure 3.26 is a screenshot of the Lightrun extension:\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_158_0.png)\n\
    \nFigure Lightrun extension\n\nWe are introducing a real-time debugging platform:\
    \ Lightrun. It supports multiple languages apart from Python. The reason for its\
    \ popularity is that it has an intuitive interface for the developers to add logs,\
    \ traces, and metrics in production for debugging the code in real time. One can\
    \ debug by exploring the stack trace and variables after adding Lightrun snapshots\
    \ in real time and on demand. It supports multi-instance too. The community edition\
    \ of Lightrun is free to use, but its professional edition costs for the additional\
    \ capabilities it provides.\n\n## Python Test Explorer\n\nThe Python Test Explorer\
    \ extension in VS Code is a plugin that enables developers to quickly and easily\
    \ run unit tests, check code coverage, and debug test failures in Python projects.\
    \ With this extension, developers can quickly assess the quality of their code,\
    \ identify areas that need improvement, and make sure their code is bug-free before\
    \ pushing it to production. Figure 3.27 is a screenshot of Python Test Explorer\
    \ extension:\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_159_0.png)\n\nFigure\
    \ Python Test Explorer extension\n\nThe Python Test Explorer extension for VS\
    \ Code offers various user-friendly features, such as the ability to run Unittest,\
    \ Pytest, or Testplan tests. The sidebar of the extension shows a complete view\
    \ of the tests and test suites with their state, which helps the developer focus\
    \ on tests that failed.\n\n## Python-specific settings\n\nThe Python extension\
    \ required to execute Python code is a highly configurable extension that provides\
    \ users with the power to customize entire setting options. Overall, in the version\
    \ that was available at the time of writing this book, there are 79 settings available.\
    \ We will look at the important ones in Table\n\n| | |\n|---|---|\n| | |\n| |\
    \ |\n\n| | |\n|---|---|\n| | |\n| | |\n\nTable Python extension settings value\n\
    \n## Installing and using Python packages\n\nOne of the main reasons why Python\
    \ programming language is so popular is because it supports various packages,\
    \ which can be downloaded from PyPI. Let us now write a program that will use\
    \ the matplotlib and numpy packages to create a graph. Matplotlib is a standard\
    \ library for creating static or animated or interactive visualizations in Python.\
    \ Figure 3.28 shows how to import packages or modules and the error if those libraries\
    \ are not installed:\n\n```\n1 import matplotlib.pyplot as plt    Import \"matplotlib.pyplot\"\
    \ could not be resolved\n2 import numpy as np    Import \"numpy\" could not be\
    \ resolved\n3 from matplotlib import colors    Import \"matplotlib\" could not\
    \ be resolved\n4 from matplotlib.ticker import PercentFormatter    Import \"matplotlib.ticker\"\
    \ could not be resolved\n```\n\nFigure Error for libraries not installed\n\nUnless\
    \ you have a previously installed matplotlib package, you would get the message,\
    \ No module named matplotlib, as shown in Figure This error message indicates\
    \ that the required package is not available in the system. To install the matplotlib\
    \ package, use the command palette to run terminal: create new terminal This command\
    \ opens a command prompt for your selected interpreter.\n\nIt is not recommended\
    \ to avoid the packages in a global interpreter environment. One should use a\
    \ project-specific virtual environment, as it helps isolate the installed packages\
    \ from other environments and create version-specific conflicts. One can use the\
    \ following commands to create a virtual environment and then install the required\
    \ packages:\n\nWindows:\n\n```\npy -m venv .venv\n```\n\n```\n.venv\\scripts\\\
    activate\n```\n\nMacOS/Linux:\n\n```\npython3 -m venv .venv\n```\n\n```\nsource\
    \ .venv/bin/activate\n```\n\nWhen a new virtual environment is created, VS Code\
    \ prompts you to set it as the default for the current workspace folder. Select\
    \ your new environment using the Python: Select interpreter command from the command\
    \ palette, as shown in Figure\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_162_0.png)\n\
    \nFigure Selecting interpreter path\n\nHere are the ways to install the packages\
    \ on various operating systems:\n\n### MacOS\n\n```\npython3 -m pip install matplotlib\n\
    ```\n\n### Windows\n\n```\npython -m pip install matplotlib\n```\n\n### Linux\
    \ (Debian)\n\n```\napt-get install python3-tk\n```\n\n```\npython3 -m pip install\
    \ matplotlib\n```\n\nRerun the program now, and the errors will be resolved.\n\
    \n## Functions, modules, and packages in Python\n\nTo begin with, we need to understand\
    \ that a package is a collection of modules, and a module contains functions and\
    \ classes. As depicted in Figure we can say that functions are the subset of and\
    \ Modules are the subset of\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_164_0.png)\n\
    \nFigure Functions, modules, and packages\n\n## Functions\n\nA function is a block\
    \ of code put together under one name, and it only runs when it is called. One\
    \ can pass data (known as parameters) into a function, and the function can return\
    \ data to where it is called.\n\nFigure 3.31 shows the types of functions we come\
    \ across in Python:\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_165_0.png)\n\n\
    Figure Types of Python functions\n\nThere are two types of functions: one which\
    \ is already built and available for use and called Built-in functions, and the\
    \ other wherein the user has to write the code for the function from scratch known\
    \ as user-defined functions. Let’s understand them better:\n\nBuilt-in Functions:\
    \ There are several built-in functions in Python that are readily available for\
    \ use. Listed here are a few of them:\n\n```\nthem: them: them: them: them: them:\
    \ them: them: them: them: them:\nthem: them: them: them: them: them: them: them:\
    \ them: them: them:\nthem: them: them: them: them: them: them: them: them: them:\
    \ them:\nthem: them: them: them: them: them: them: them: them: them: them:\nthem:\
    \ them: them: them: them: them: them: them: them: them: them:\nthem: them: them:\
    \ them: them: them: them: them: them: them: them:\n```\n\nThe dir(builtins) in\
    \ Python returns a list of all the names in the built-in module The builtins module\
    \ contains functions and variables that are built-in in Python and can be used\
    \ without being imported. The dir() function, in general, returns a sorted list\
    \ of names in the specified namespace. The following code can help you view the\
    \ list:\n\n```\nimport builtins\nprint(dir(builtins))\n```\n\nLet us execute a\
    \ few of these functions; readers are encouraged to run them and see the results:\n\
    \n- Printing on the screen:\n\n```\nprint(\"Welcome to Python World\")\n```\n\n\
    - Print the eval result:\n\n```\nprint(eval(\"4+5*2\"))\nbin(50)\na=input(\"Enter\
    \ Your Name: \")\nabs(-789)\n```\n\nUser-defined functions: Functions that we\
    \ create ourselves to perform specific tasks are referred to as user-defined functions.\
    \ Functions in Python are defined using the def keyword, followed by with a pair\
    \ of parentheses. There may be variable names enclosed within the parentheses\
    \ and a colon at the end of the line; what follows under indentation is the block\
    \ of statements that are added for this function. When the function is called,\
    \ the values are passed as arguments; in the same way, we define parameters.\n\
    \nLet’s build our first user-defined function now. We will name the function\n\
    \nNote: The names given in the function definition are called parameters, and\
    \ the values supplied to the function call are called arguments.\n\nCode will\
    \ look something similar to the following:\n\n```\n#Function definition\n\ndef\
    \ func(x):\n\nis\n```\n\n```\noutput = \"Changed X locally to \" + + \" in the\
    \ function\"\n\nreturn output\n\nresult = func(x)\n\nis still\n```\n\nIn the preceding\
    \ program example, we defined a function named which takes one parameter x and\
    \ returns one variable output. In this example, if the value for argument x is\
    \ not provided while calling, it would result in an error, so the x is the required\
    \ argument.\n\nIn the following example, we are specifying default argument values\
    \ for parameters. The default value is added by appending the assignment operator\
    \ to the parameter name in the function definition, followed by the default value,\
    \ as demonstrated in the following example:\n\nHere is the function definition:\n\
    \n```\ndef displayinfo(name, city=\"Delhi\"):\n    # Printing a passed info in\
    \ this function\n    print(\"Name: \",name, \"\\nCity \", city)\n    return\n\
    ```\n\nNow you can call the printinfo function:"
  mdcn: "## Lightrun\n\n[Lightrun](https://lightrun.com) 是一个开源的 Visual Studio Code\
    \ 扩展，它提供了一种简便的方式，让你可以在文本编辑器内运行和调试程序。Lightrun 支持其他编程语言，如 Python、Java、C、C++ 和 Rust。借助\
    \ Light Runner，你可以快速测试和调试代码，无需离开编辑器或手动设置断点。图 3.26 是 Lightrun 扩展的截图：\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_158_0.png)\n\
    \n图 Lightrun 扩展\n\n我们正在介绍一个实时调试平台：Lightrun。它除了 Python 之外，还支持多种语言。它之所以受欢迎，是因为它为开发者提供了一个直观的界面，可以在生产环境中添加日志、跟踪和指标，以实时调试代码。通过实时按需添加\
    \ Lightrun 快照，可以探索堆栈跟踪和变量来进行调试。它也支持多实例。Lightrun 的社区版是免费使用的，但其专业版则需要付费，以获取其提供的额外功能。\n\
    \n## Python Test Explorer\n\nVS Code 中的 Python Test Explorer 扩展是一个插件，使开发者能够快速、轻松地在\
    \ Python 项目中运行单元测试、检查代码覆盖率并调试测试失败。借助此扩展，开发者可以快速评估代码质量，识别需要改进的领域，并确保代码在推送到生产环境之前没有错误。图\
    \ 3.27 是 Python Test Explorer 扩展的截图：\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_159_0.png)\n\
    \n图 Python Test Explorer 扩展\n\nVS Code 的 Python Test Explorer 扩展提供了各种用户友好的功能，例如运行\
    \ Unittest、Pytest 或 Testplan 测试的能力。扩展的侧边栏显示了测试和测试套件及其状态的完整视图，这有助于开发者专注于失败的测试。\n\
    \n## Python 特定设置\n\n执行 Python 代码所需的 Python 扩展是一个高度可配置的扩展，为用户提供了自定义整个设置选项的能力。总体而言，在撰写本书时可用的版本中，有\
    \ 79 个可用设置。我们将在表中查看重要的设置。\n\n| | |\n|---|---|\n| | |\n| | |\n\n| | |\n|---|---|\n\
    | | |\n| | |\n\n表 Python 扩展设置值\n\n## 安装和使用 Python 包\n\nPython 编程语言如此流行的主要原因之一是它支持各种包，这些包可以从\
    \ PyPI 下载。现在让我们编写一个程序，该程序将使用 matplotlib 和 numpy 包来创建一个图表。Matplotlib 是 Python 中用于创建静态、动画或交互式可视化的标准库。图\
    \ 3.28 展示了如何导入包或模块，以及如果这些库未安装时会出现的错误：\n\n```\n1 import matplotlib.pyplot as plt\
    \    Import \"matplotlib.pyplot\" could not be resolved\n2 import numpy as np\
    \    Import \"numpy\" could not be resolved\n3 from matplotlib import colors \
    \   Import \"matplotlib\" could not be resolved\n4 from matplotlib.ticker import\
    \ PercentFormatter    Import \"matplotlib.ticker\" could not be resolved\n```\n\
