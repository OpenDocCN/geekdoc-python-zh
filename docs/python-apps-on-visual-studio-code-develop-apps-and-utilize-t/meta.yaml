  md: '# Introduction


    Welcome to the first chapter of this book, Python Apps on Visual Studio You would
    have guessed correctly by now that we will build lots of Python applications in
    this book. But why Visual Studio Code or VS Code? The first step to learning any
    programming language is to pick a code editor and learn the tips and tricks to
    get the most out of your code editor. You will come across many code editors to
    program in Python from, but the most popular, and my favourite, is VS Code. Do
    not confuse VS Code with Visual Studio. VS Code is a free, open-source platform,
    and you will learn more about this editor in this chapter.


    Over a decade ago, Simon Sinek in his TedTalk, had said, People don’t buy what
    you do, they buy why you do It is stuck in my mind till today. So, the first thing
    we will talk about is why we should use VS Code for Python. Next, we will discuss
    what VS Code is and how to use it.


    Visual Studio Code is an open-source code editor that is free to use and fully
    supports development in Python programming language. It has useful features, such
    as real-time collaboration with other programmers around the world. This chapter
    is meant to introduce VS Code to help you understand its development process and
    its different components. This chapter is for readers who have not yet heard about
    VS Code and wonder why they should even consider it for their development work.
    This chapter will provide information about VS Code; we will discuss why it is
    probably the most popular code editor, look at its features, and discuss the different
    components of VS Code. We will look at the architecture of VS Code to understand
    why it is a perfect tool for software development'
  merge: -1
