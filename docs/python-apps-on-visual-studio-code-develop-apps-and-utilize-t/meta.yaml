  md: '# Synchronizing threads


    It refers to the process of ensuring that multiple threads of execution are performing
    operations in a coordinated manner. This is typically used to ensure that critical
    sections of code cannot be accessed by more than one thread at a time, preventing
    race conditions and ensuring data integrity. A critical section is part of a multithreaded
    application that accesses a shared resource and must be executed in a thread-safe
    way. A synchronization object such as a mutex, semaphore, or spinlock usually
    protects the critical section. The critical section allows only one thread to
    enter at a time, ensuring that the shared resource is not corrupted by simultaneous
    access from multiple threads. Figure 7.1 is an illustration of the critical region
    being accessed by threads A, B, and C:


    ![](img/9d64daa418450477b4b5cccad74a5f4b_382_0.png)


    Figure Three critical sections: Threads accessing shared resources at the same
    time


    A race condition occurs when two or more threads or processes compete for a shared
    resource (such as a critical section of code, a data item, a hardware device,
    or a network connection) and the behavior of the program or system'
  merge: -1
  pgno: 382
- img_proc: true
  md: "depends on the timing of events that occur while the threads or processes are\
    \ executing. In other words, the outcome of the program may vary depending on\
    \ the order in which the threads or processes access the shared resource. Race\
    \ conditions can cause unexpected or incorrect results in programs, such as deadlocks\
    \ or data corruption. Reading data does not cause any harm but writing/editing\
    \ can give unexpected result. The readers-writers problem is a classic example\
    \ of a multithreading synchronization problem. It describes a situation wherein\
    \ multiple threads try to access a shared resource. The problem is that either\
    \ readers or writers can access the resource, but not both at the same time. This\
    \ generally leads to a condition in which writers need to wait for readers to\
    \ finish before they can write, or readers have to wait for writers to finish\
    \ before they can read. This results in one type of thread accessing a resource\
    \ while it is locked or blocked by another type. Let us take a simple implementation\
    \ of the readers-writers problem here. Consider the following Python program that\
