- md: "## Conclusion\n\nAlgorithms are like tools; they help us accomplish tasks more\
    \ efficiently and effectively, and they also help increase our productivity. They\
    \ can help us perform tasks that would otherwise be difficult or impossible to\
    \ do by manual effort. You can use specialized or general-purpose tools to do\
    \ your work. They are designed to perform one specific task or a set of related\
    \ tasks. They tend to be designed for efficiency so that they can do the job quickly\
    \ and accurately. However, they tend to be expensive or not at all versatile when\
    \ used for tasks for which they are not intended. General-purpose tools are designed\
    \ to perform a wide range of tasks. They are usually more affordable than specialized\
    \ tools and are often more versatile because they can be used for a variety of\
    \ tasks. However, they may not be as efficient as specialized tools. We discussed\
    \ both types of algorithms in this chapter. We looked at specialized algorithms\
    \ like sliding window and general-purpose fundamental algorithms like divide and\
    \ conquer. We also looked at tree-type data structures and graph-type data structures.\
    \ There is only one way to master these concepts, and that is by practice. Practice\
    \ these concepts as much as you can.\n\nIn the next chapter, we will learn to\
    \ build multi-threading applications. Multi-threading is a process that allows\
    \ a single process to have multiple threads of execution running concurrently.\
    \ This means that multiple pieces of code can be running at the same time within\
    \ a single process, enabling more efficient utilization of resources and faster\
    \ completion of tasks. Multi-threading also allows better responsiveness and scalability,\
    \ as multiple threads can be used to handle more concurrent requests. In addition,\
    \ it can provide better fault tolerance, as one thread can take over the work\
    \ of another if it fails.\n\nJoin our book’s Discord space\n\nJoin the book’s\
    \ Discord Workspace for Latest updates, Offers, Tech happenings around the world,\
    \ New Release and Sessions with the Authors:\n\nhttps://discord.bpbonline.com\n\
    \n![](img/9d64daa418450477b4b5cccad74a5f4b_372_0.png)\n\n## Chapter 7\n\n## Building\
    \ Multithreading Application\n\n> Everybody who learns concurrency thinks they\
    \ understand it, ends up finding mysterious races they thought weren’t possible,\
    \ and discovers that they didn’t actually understand it yet after all.\n\n— Herb\
    \ Sutter, chair of the ISO C++ standards committee, Microsoft\n\n## Introduction\n\
    \nMultithreading is a programming technique that allows a program to execute multiple\
    \ threads (or tasks) concurrently. Each thread runs independently and can work\
    \ on its task while sharing resources with other threads in the same program.\
    \ It is used in many applications and different ways. It can be used to improve\
    \ performance and scalability, to provide a better user experience, or to make\
    \ programming easier. For example, a web server can use multiple threads to handle\
    \ multiple requests at once. This improves the web server’s performance since\
    \ it can process multiple requests at once.\n\nThis chapter will look at the concept\
    \ of multithreading and its implementation in Python. We will cover topics like\
    \ the differences between multithreading and multi-processing, the use of the\
    \ threading module, synchronization techniques, and strategies for utilizing multiple\
    \ cores of a processor. It will also explain techniques like thread pooling and\
    \ parallel processing, and it will provide examples of their use. Parallel processing\
    \ is a technique in which multiple threads are executed concurrently to increase\
    \ the speed and performance of a program. These threads can run independently,\
    \ in parallel, and share resources like memory and processors. Finally, it will\
    \ discuss best practices for programming with threads in Python, such as handling\
    \ thread errors in a safe and effective manner.\n\nMultithreading in Python can\
    \ be used to improve the performance of a program. For example, it can be used\
    \ to process multiple streams of data simultaneously, run multiple tasks simultaneously,\
    \ or execute multiple pieces of code concurrently. This can be achieved using\
    \ the threading module, which provides the basic functions for creating and running\
    \ threads.\n\nPython threads can also communicate with each other using shared\
    \ memory. This communication is called inter-thread communication, allowing threads\
    \ to exchange data and synchronize their execution. This can be used to coordinate\
    \ tasks and achieve greater efficiency.\n\nIt can also make programs more responsive,\
    \ as threads can handle user input while other threads run in the background.\
    \ This can help reduce latency and improve the user experience.\n\nOverall, multithreading\
    \ in Python can achieve greater performance and responsiveness in programs.\n\n\
    ## Structure\n\nIn this chapter, we will discuss the following topics:\n\n- Introduction\
    \ to the multithreading concepts\n- Synchronizing threads\n- Inter-thread communication\
    \ in Python\n- Thread pooling with Python\n- Multithreaded priority queue\n- Optimizing\
    \ Python threads for performance\n- Snake Game: Using multithreading and turtle\n\
    \nNow, let us dive deep into the topics.\n\n## Objectives\n\nThe main objective\
    \ of learning multi-threading in this chapter is to enable developers to write\
    \ code that will increase performance, reduce latency by spreading out tasks across\
    \ multiple threads, improve reliability, and ensure easier program maintenance.\
    \ The topics covered here are in accordance with this objective.\n\n## Introduction\
    \ to multithreading concepts\n\nMultithreading is the process of running multiple\
    \ threads at once. It is a way to improve the performance of an application by\
    \ running multiple tasks simultaneously. Threads are lightweight processes that\
    \ share the same memory space and can therefore, communicate with each other easily.\n\
    \nMultithreading is achieved by allowing multiple threads to run concurrently.\
    \ This is done by dividing the program code into multiple small tasks or processes.\
    \ Each process is given its thread, and each thread can execute its own instructions.\
    \ By doing this, the program can use multiple processors or cores in a single\
    \ computer. Let us look at an example.\n\n## Starting a new Thread\n\nBy default,\
    \ every program will have one main thread running. If you want to spawn a second\
    \ thread, you can do by calling the Thread() method available in the threading\
    \ module:\n\n```\nthreading.Thread(target=function).start()\n```\n\nThe start()\
    \ method will begin executing the thread. Then there is another method, which\
    \ waits for a thread/process to terminate. This will make the main thread wait\
    \ until it completes the execution. To see the difference, run the following program\
    \ and then run it again after uncommenting the join() method:\n\n```\nimport threading\n\
    \ndef thread_action():\n    for x in range(5):\n        print(\"Hello from child\
    \ thread\")\n\nthread1 = threading.Thread(target=thread_action)\nthread1.start()\n\
    #thread1.join()\nprint(\"Hello from main thread\")\n```\n\nNote: If you are using\
    \ a powerful computer with high RAM then you may not see the difference.\n\nIn\
    \ the preceding program, we see that the child and main thread run almost simultaneously\
    \ in the first run, but when we call the join() method, the main thread waits\
    \ until the child thread completes execution.\n\nMultithreading can help improve\
    \ the efficiency of the program by allowing it to take advantage of the extra\
    \ computing power available. This is because each thread can be assigned to a\
    \ different processor or core, allowing more tasks to be done simultaneously.\
    \ It also allows the program to use resources more efficiently, as there is no\
    \ need to wait for a single process to finish before starting another. Let us\
    \ look at another Python program, as follows:\n\n```\nimport time\nimport threading\
    \ as th\n\ndef cal_square(list_num):\n    print(\"SQUARE OF NUMBERS:\")\n    for\
    \ i in list_num:\n        time.sleep(1)\n        print(f\"Square: {i*i}\")\n\n\
    def cal_cube(list_num):\n    print(\"CUBE OF NUMBERS:\")\n    for i in list_num:\n\
    \        time.sleep(1)\n        print(f\"Cube: {i*i*i}\")\n\n#Main calling\nnum\
    \ = [1, 2, 3, 4]\nthread1 = th.Thread(target=cal_square, args=(num,))\nthread2\
    \ = th.Thread(target=cal_cube, args=(num,))\n```"
  mdcn: "## 结论\n\n算法就像工具；它们帮助我们更高效、更有效地完成任务，也帮助我们提高生产力。它们可以帮助我们执行那些仅靠人力难以或无法完成的任务。你可以使用专用工具或通用工具来完成工作。它们被设计用来执行一项特定任务或一组相关任务。它们往往为效率而设计，以便能够快速、准确地完成工作。然而，当用于非其设计意图的任务时，它们往往价格昂贵或完全不适用。通用工具被设计用来执行广泛的任务。它们通常比专用工具更经济实惠，并且通常更通用，因为它们可以用于各种任务。然而，它们可能不如专用工具高效。我们在本章中讨论了这两种类型的算法。我们研究了像滑动窗口这样的专用算法，以及像分治法这样的通用基础算法。我们还研究了树型数据结构和图型数据结构。掌握这些概念只有一个方法，那就是通过实践。尽可能多地练习这些概念。\n\
    \n在下一章中，我们将学习构建多线程应用程序。多线程是一个允许单个进程拥有多个并发运行的执行线程的过程。这意味着多个代码段可以在单个进程内同时运行，从而实现更高效的资源利用和更快的任务完成。多线程还允许更好的响应性和可扩展性，因为可以使用多个线程来处理更多的并发请求。此外，它可以提供更好的容错性，因为如果一个线程失败，另一个线程可以接管其工作。\n\
