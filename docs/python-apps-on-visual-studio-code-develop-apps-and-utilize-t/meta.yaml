  md: '# Debugging in VS Code


    Debugging is an important part of programming, as it helps identify and remove
    any errors or bugs from the code. This helps ensure that the code runs as expected,
    without any unexpected behavior or errors. We generally come across three types
    of errors in programming:


    Syntax This is easiest of all the errors to identify. This is because Python is
    designed so well and the error messages are very well commented, which helps us
    know where and what went wrong in terms of syntax.


    Runtime Runtime errors are mistakes that occur during the execution of a program
    and can cause the program to crash or produce incorrect results. For example,
    trying to convert text containing alphabets into an integer or dividing a number
    by zero.


    Logical These are the mistakes in a program’s source code that result in incorrect
    or unexpected program behavior. These errors are caused by a programmer’s incorrect
    assumptions or misunderstandings about the program’s environment, or by mistakes
    in the program’s logic.


    Logical and runtime errors are typically more difficult to detect and fix than
    syntax errors, since the program may appear syntactically correct despite the
    incorrect logic. This is where programmers need to use their debugging skills
    to figure out the piece of code responsible for those errors. VS Code provide
    us an option to debug the code.


    Here is how to perform debugging of Python code in VS Code:'
