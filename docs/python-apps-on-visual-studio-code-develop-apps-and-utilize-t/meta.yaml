- md: '## Chapter 5


    ## Developing Desktop Application using Database


    Errors using inadequate data are much less than those using no data at all.


    > — Charles Babbage


    ## Introduction


    This chapter will teach us to develop an application using database skills. Databases
    are an important part of any application and provide a way of storing and managing
    efficient and secure data. This chapter will explore the fundamentals of working
    with a database application.


    Database design is the process of creating a detailed data model of a database.
    It defines the logical structure of a database and determines how data will be
    stored, organized, and accessed. Database design involves classifying data and
    identifying relationships among the data items. The goal of database design is
    to produce a model that correctly represents the data and is flexible, efficient,
    and easy to maintain.


    We will look at the different types of databases, the different ways of accessing
    them using Python, and the tools Python provides to manage the database. We will
    also examine the basics of designing and implementing a database application.
    Finally, we will discuss the importance of testing and maintaining a database
    application.


    ## Structure


    In this chapter, we will discuss the following topics:


    - Database introduction and RDBMS

    - Problem statement: Developing an application

    - Working with MYSQL

    - Executing the Project: Performing CRUD operations

    - Debugging in VS Code


    ## Database introduction and RDBMS


    A database is a data collection organized for easy storage, access, and manipulation.
    It is usually managed by a Database Management System which provides users with
    a systematic way to create, retrieve, update, and manage data. The data in a database
    is typically organized into tables, fields, and records.


    There are different types of databases in use; some of them are as follows:


    Relational This type of database stores data in structured tables with rows and
    columns. It follows a predefined schema and uses Structured Query Language for
    querying and managing data. Examples include Oracle, MySQL, and SQL Server.


    Object-oriented This type of database stores data in objects, which can contain
    both data and behavior. It is useful for storing complex, interconnected data
    structures and supports inheritance and polymorphism. Examples include MongoDB
    and Couchbase.


    Hierarchical This type of database organizes data in a tree-like structure, with
    parent-child relationships between data elements. It is mainly used for storing
    hierarchical data, such as file systems. Examples include IBM’s Information Management
    System and Windows Registry.


    Network This type of database stores data with complex relationships, using a
    network data model. It is similar to the hierarchical database but enables more
    flexible relationships between data elements. Examples include Integrated Data
    Store and Integrated Definition Language.


    NoSQL This term refers to a class of databases that do not adhere to a strict
    tabular structure, like in relational databases. NoSQL databases are designed
    for scalability, high performance, and handling unstructured and semi-structured
    data. Some popular types of NoSQL databases are document databases (example, MongoDB),
    key-value stores (example, Redis), columnar databases (example, Cassandra), and
    graph databases (example, Neo4j).


    Time-series This type of database is optimized for handling time series data,
    which is data that is recorded with a timestamp. It is commonly used in fields
    like financial services, IoT, and log analysis to store and analyze large volumes
    of time-stamped data efficiently. Examples include InfluxDB and TimescaleDB.


    Graph This type of database is designed to store and analyze highly interconnected
    data, such as social networks, recommendation engines, and fraud detection systems.
    It stores data as nodes (entities) and edges (relationships), allowing efficient
    traversal and querying of complex relationships. Examples include Neo4j and Amazon
    Neptune.


    Spatial This type of database is specialized for storing and querying spatial
    or geographic data. It supports indexing and analysis of 2D and 3D data types,
    such as points, lines, polygons, and spatial relationships. Examples include PostGIS
    and Oracle Spatial.


    In-memory This type of database stores data entirely in memory, rather than on
    disk, for faster access and processing. It is used in situations where speed is
    crucial, such as real-time analytics and high-speed trading. Examples include
    SAP HANA and VoltDB.


    Cloud This term refers to databases that are hosted and provided as a service
    through a cloud computing platform. These databases are scalable, highly available,
    and accessible from anywhere via the internet. Popular examples include Amazon
    Web Services RDS, Microsoft Azure Cosmos DB, and Google Cloud Firestore.


    In this chapter, we will develop an application with Relational Database Management
    Systems. RDBMSes are used to store and manage data in structured tables. They
    are popular because they offer the ability to easily query data, join data from
    multiple tables, and enforce data integrity. They also offer features such as
    transactions, data security, and scalability. Relational databases are used in
    many applications, such as financial systems, customer relationship management
    systems, and e-commerce sites.


    Some of the popular RDBMS databases are as follows:


    - Oracle

    - MySQL

    - Microsoft SQL Server

    - PostgreSQL

    - IBM DB2

    - MariaDB

    - Sybase

    - Informix

    - Firebird

    - Apache Derby


    In this chapter, we will develop a working Library Management System with MYSQL
    database as the back end. MySQL is an open-source Relational Database Management
    System that uses Structured Query Language to add, access, and manage data. It
    is one of the most popular databases in the world and is used in a wide range
    of applications, from small web applications to large enterprise applications.
    Many popular websites, including Facebook, Google, Twitter, and YouTube, also
    use MySQL.


    ## Problem statement: Developing an application


    Before we begin building the application, let us understand the requirements.
    A Library Management System is software used to track items in a library, such
    as books, periodicals, audio-visual materials, and electronic documents. It provides
    a centralized system for cataloguing, organizing, and tracking library materials
    and managing library materials’ circulation to library patrons. Library management
    systems automate library activities and processes, such as cataloguing and circulating
    materials. In this example, we will develop a mini LMS system with the following
    options:


    - BOOK ISSUE

    - BOOK DEPOSIT

    - ADMINISTRATION MENU

    - CREATE STUDENT RECORD

    - DISPLAY ALL STUDENTS RECORD

    - DISPLAY SPECIFIC STUDENT RECORD

    - MODIFY STUDENT RECORD

    - DELETE STUDENT RECORD'
  mdcn: '## 第5章


    ## 使用数据库开发桌面应用程序


    使用不充分数据所犯的错误远少于完全不使用数据所犯的错误。


    > —— 查尔斯·巴贝奇


    ## 简介


    本章将指导我们如何运用数据库技能开发应用程序。数据库是任何应用程序的重要组成部分，它提供了一种高效、安全地存储和管理数据的方式。本章将探讨数据库应用程序的基础知识。


    数据库设计是创建数据库详细数据模型的过程。它定义了数据库的逻辑结构，并决定数据将如何被存储、组织和访问。数据库设计涉及对数据进行分类以及识别数据项之间的关系。数据库设计的目标是生成一个能够正确表示数据，并且灵活、高效、易于维护的模型。


    我们将了解不同类型的数据库、使用Python访问它们的不同方式，以及Python提供的用于管理数据库的工具。我们还将研究设计和实现数据库应用程序的基础知识。最后，我们将讨论测试和维护数据库应用程序的重要性。


    ## 结构


    在本章中，我们将讨论以下主题：


    - 数据库简介与关系数据库管理系统

    - 问题陈述：开发一个应用程序

    - 使用MYSQL

    - 执行项目：执行CRUD操作

    - 在VS Code中调试


    ## 数据库简介与关系数据库管理系统


    数据库是为了便于存储、访问和操作而组织的数据集合。它通常由数据库管理系统管理，该系统为用户提供了一种系统化的方式来创建、检索、更新和管理数据。数据库中的数据通常被组织成表、字段和记录。


    目前有不同类型的数据库在使用；其中一些如下：


    关系型 这种类型的数据库将数据存储在具有行和列的结构化表中。它遵循预定义的模式，并使用结构化查询语言来查询和管理数据。示例包括Oracle、MySQL和SQL
    Server。


    面向对象 这种类型的数据库将数据存储在对象中，对象可以包含数据和行为。它适用于存储复杂的、相互关联的数据结构，并支持继承和多态。示例包括MongoDB和Couchbase。


    层次型 这种类型的数据库将数据组织成树状结构，数据元素之间存在父子关系。它主要用于存储层次数据，例如文件系统。示例包括IBM的信息管理系统和Windows注册表。


    网络型 这种类型的数据库使用网络数据模型存储具有复杂关系的数据。它类似于层次数据库，但允许数据元素之间建立更灵活的关系。示例包括集成数据存储和集成定义语言。


    NoSQL 这个术语指的是不遵循严格表格结构（如关系数据库中那样）的一类数据库。NoSQL数据库旨在实现可扩展性、高性能，并处理非结构化和半结构化数据。一些流行的NoSQL数据库类型包括文档数据库（例如MongoDB）、键值存储（例如Redis）、列族数据库（例如Cassandra）和图数据库（例如Neo4j）。


    时序型 这种类型的数据库针对处理时序数据进行了优化，时序数据是带有时间戳记录的数据。它通常用于金融服务、物联网和日志分析等领域，以高效地存储和分析大量带时间戳的数据。示例包括InfluxDB和TimescaleDB。


    图 这种类型的数据库旨在存储和分析高度互联的数据，例如社交网络、推荐引擎和欺诈检测系统。它将数据存储为节点（实体）和边（关系），允许高效地遍历和查询复杂关系。示例包括Neo4j和Amazon
    Neptune。


    空间 这种类型的数据库专门用于存储和查询空间或地理数据。它支持对2D和3D数据类型（如点、线、多边形和空间关系）进行索引和分析。示例包括PostGIS和Oracle
    Spatial。


    内存型 这种类型的数据库将数据完全存储在内存中，而不是磁盘上，以实现更快的访问和处理。它用于速度至关重要的情况，例如实时分析和高速交易。示例包括SAP HANA和VoltDB。


    云 这个术语指的是通过云计算平台托管并作为服务提供的数据库。这些数据库具有可扩展性、高可用性，并且可以通过互联网从任何地方访问。流行的示例包括Amazon
    Web Services RDS、Microsoft Azure Cosmos DB和Google Cloud Firestore。


    在本章中，我们将使用关系数据库管理系统开发一个应用程序。关系数据库管理系统用于在结构化表中存储和管理数据。它们之所以流行，是因为它们提供了轻松查询数据、连接多个表中的数据以及强制数据完整性的能力。它们还提供事务、数据安全性和可扩展性等功能。关系数据库用于许多应用程序，例如金融系统、客户关系管理系统和电子商务网站。


    一些流行的关系数据库管理系统如下：


    - Oracle

    - MySQL

    - Microsoft SQL Server

    - PostgreSQL

    - IBM DB2

    - MariaDB

    - Sybase

    - Informix

    - Firebird

    - Apache Derby


    在本章中，我们将使用MYSQL数据库作为后端开发一个可运行的图书馆管理系统。MySQL是一个开源的关系数据库管理系统，它使用结构化查询语言来添加、访问和管理数据。它是世界上最流行的数据库之一，广泛应用于从小型Web应用程序到大型企业应用程序的各种场景。许多流行的网站，包括Facebook、Google、Twitter和YouTube，也使用MySQL。


    ## 问题陈述：开发一个应用程序


    在我们开始构建应用程序之前，让我们先了解需求。图书馆管理系统是一种用于跟踪图书馆馆藏项目的软件，例如书籍、期刊、视听资料和电子文档。它提供了一个集中式系统，用于编目、组织和跟踪图书馆资料，并管理图书馆资料向读者的流通。图书馆管理系统使图书馆活动和流程自动化，例如资料编目和流通。在这个示例中，我们将开发一个具有以下选项的迷你LMS系统：


    - 图书借出

    - 图书归还

    - 管理菜单

    - 创建学生记录

    - 显示所有学生记录

    - 显示特定学生记录

    - 修改学生记录

    - 删除学生记录'
