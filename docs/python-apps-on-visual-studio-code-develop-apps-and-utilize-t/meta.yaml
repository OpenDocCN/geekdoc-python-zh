  md: 'First, create an If-Else statement and determine the condition you will be
    evaluating.


    Next, inside the body of the If-Else statement, include an additional If-Else
    statement. This nested If-Else statement should contain a second condition you
    need to evaluate, which depends on the result of the first If-Else statement.


    Then, add the code that will be executed if both Conditions 1 and 2 are met.


    Next, include the necessary Else statements for Condition 1 and Condition 2, which
    will be executed if either Condition 1 or Condition 2 is not met.


    Finally, end the nested If-Else statement, and end the containing code block with
    an end statement.


    After these steps, the nested if condition should be fully functional and set
    up correctly, and the block of code should execute correctly.


