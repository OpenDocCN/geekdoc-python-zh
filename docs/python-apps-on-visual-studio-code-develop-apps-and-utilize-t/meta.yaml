    \ `kwargs`。\n\n让我们实现一个函数 `total`，它接受可变数量的参数，既可以是元组也可以是字典。这是一个简单的示例，它接受参数并在函数体中打印它们：\n\
    \n```\ndef total(initial=5, *numbers, **keywords):\n    count = initial\n    for\
    \ num in numbers:\n        count += num\n    for key in keywords:\n        count\
    \ += keywords[key]\n    return count\n```\n\n函数具有处理文档的内置机制。这个概念称为文档字符串（DocString）。它们是\
    \ Python 语言的重要组成部分，用于使代码更具可读性、可维护性和可重用性。\n\n## 文档字符串\n\n文档字符串是一个字符串值，作为函数、类、方法或模块定义中的第一条语句出现。当模块、函数、类或方法被调用时，解释器会扫描定义以查找文档字符串，如果找到，它将作为第一个参数传递给函数。文档字符串用于记录函数功能的简要说明，虽然它是可选的，但总是推荐使用。文档字符串是紧接在函数头下方添加的注释。通常使用三引号，以便描述可以扩展到多行。文档字符串作为函数的\
    \ `__doc__` 属性对我们可用。让我们在程序中实现文档字符串。在下面的函数 `greet` 中，三引号（`\"\"\"`）中给出的第一行就是文档字符串：\n\
    \n```\ndef greet(name):\n    \"\"\" This function is used to greet a person.\n\
    \    This function greets to the person passed in as\n    a parameter \"\"\"\n\
    \    print(\"Hello, \" + name + \". Have a good day!\")\n```\n\n你可以在任何时候显示任何函数的文档字符串内容。编写代码来检查我们上面创建的函数\
    \ `greet()` 的文档字符串：\n\n```\nprint(greet.__doc__)\n```\n\n现在，让我们检查内置函数 `print()`\
    \ 的文档字符串：\n\n```\nprint(print.__doc__)\n```\n\n文档字符串用于记录函数、方法、类或模块的目的，并提供使用示例和其他有用信息。\n\
    \nPython 还有第三种类型的函数，称为单行函数或 Lambda 函数。对于整个逻辑可以用一行构建的情况，为了使代码简短简单，更倾向于使用它：\n\n\
    ### Lambda\n\nLambda 运算符或 Lambda 函数用于在 Python 中创建小型、一次性、匿名的函数对象。其基本语法如下：\n\n```\n\
    lambda arguments : expression\n```\n\nLambda 运算符可以接受任意数量的参数，但它只能有一个表达式。它不能包含任何语句，并返回一个可以赋值给任何变量的函数对象；例如，在下面的示例中，`add`\
    \ 代表 Lambda 函数。\n\n这是一个演示使用 Lambda 运算符的函数的程序：\n\n```\nadd = lambda x, y: x **\
    \ y\na = add(2, 3)\nprint(a)\n```\n\n通常，前面的程序会写成如下形式：\n\n```\ndef power(x, y):\n\
    \    return x ** y\n```\n\n调用函数：\n\n```\na = power(2, 3)\nprint(a)\n```\n\n现在，让我们看看如何在\
    \ Python 中实现递归函数：\n\n### 递归函数\n\nPython 中的递归函数是调用自身的函数。它是一种调用自身的算法，使用其自身输入的更新版本，直到达到解决方案。这种类型的函数对于解决可以分解为更小部分的复杂问题非常强大。递归函数可用于遍历数据结构、实现数学算法，甚至解决游戏。递归是一种编码方式，其中函数在其主体中一次或多次调用自身，通常作为函数调用的返回值，该函数称为递归函数。\n\
    \n如果问题的解决方案缩小并朝着基本情况移动，递归函数就会终止。基本情况是指可以在没有进一步递归的情况下解决问题的情况。如果在调用中未满足基本情况，递归可能会导致无限循环。\n\
    \n让我们考虑一个递归最适合的情况：计算一个数的阶乘。4 的阶乘将是 1 到 4 之间所有数字的乘积。例如：\n\n4! = 4 * 3 * 2 * 1\n\
    \n或者，我们可以这样写：\n\n4! = 4 * 3!\n3! = 3 * 2!\n2! = 2 * 1\n\n这是使用递归概念的经典场景。终止条件将是我们尝试计算\
    \ 1 或更小值的阶乘时，这被称为基本情况。\n\n让我们编写一个程序，使用递归实现一个数的阶乘。可以通过在前面的函数定义中添加两个 `print()` 函数来跟踪中间步骤：\n\
    \n```\ndef factorial(n):\n    print(\"factorial has been called with n = \" +\
    \ str(n))\n    if n == 1:\n        return 1\n    else:\n        res = n * factorial(n-1)\n\
    \        print(\"track \" + str(n) + \" * factorial(\" + str(n-1) + \"): \" +\
    \ str(res))\n        return res\n```\n\n现在，测试该函数：\n\n```\nprint(factorial(5))\n\
    ```\n\n输出如图所示。\n\n```\nfactorial has been called with n = 5\nfactorial has been\
    \ called with n = 4\nfactorial has been called with n = 3\nfactorial has been\
    \ called with n = 2\nfactorial has been called with n = 1\ntrack  2  * factorial(\
    \ 1 ):  2\ntrack  3  * factorial( 2 ):  6\ntrack  4  * factorial( 3 ):  24\ntrack\
    \  5  * factorial( 4 ):  120\n120\n```\n\n图：阶乘递归程序的输出\n\n## 类\n\n类是 Python 中面向对象编程（OOP）的构建块。OOP\
    \ 是一种使用类和对象来创建现实世界对象及其交互模型的编程范式。它是一种组织和构建代码的方式，使其更具可读性、可维护性和可重用性。Python 中的 OOP\
    \ 包括类定义、继承、封装、抽象和多态。它允许开发人员创建具有特定属性和行为的对象，然后可以使用这些对象来创建应用程序和程序。\n\n现在，让我们检查在讨论\
    \ OOP 时会遇到的术语：\n\n- **对象**：对象是具有状态和行为的实体。它可以是物理的或逻辑的。例如，鼠标、键盘、椅子、桌子、笔等。Python\
    \ 中的一切都是对象，几乎所有东西都有属性和方法。\n- **类**：类可以定义为对象的集合。它是一个具有特定属性和方法的逻辑实体。例如，如果你有一个学生类，那么它应该包含属性和方法，即电子邮件\
    \ ID、姓名、年龄、学号等。\n\n类创建一个新的数据类型，其中对象是该类的实例。对象被定义为与问题域相关的现实世界实体，具有清晰定义的边界。对象封装了属性（在\
    \ Python 中称为字段）和行为或服务（在 Python 中称为方法）。\n\n图 3.33 显示了一个类的成员。Python 中类的成员包括属性、方法（服务）和类变量。属性用于定义类的属性，例如其数据和行为。方法是与特定类相关联的函数，可用于操作该类的数据和行为。最后，类变量是在类的所有实例之间共享的变量，可用于存储适用于所有实例的信息。\n\
    \n![图 类示例](img/9d64daa418450477b4b5cccad74a5f4b_176_0.png)\n\n图：类示例\n\n如图所示，`patient`\
    \ 是一个类，它有自己的一组成员。患者可以是住院患者或门诊患者。"
