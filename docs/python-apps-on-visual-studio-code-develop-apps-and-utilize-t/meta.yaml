    \ Stu...\n  Alphabot Security\n  [安装]\n\n图 支持从其迁移键盘快捷键的部分编辑器列表\n\n键盘快捷键的可打印版本可以从“键盘快捷键参考”下载（参考图）。它提供了一个针对你所使用平台生成的精简\
    \ PDF 文档。此文档可以打印并贴在显示器附近，以便于参考。\n\n![](img/9d64daa418450477b4b5cccad74a5f4b_120_0.png)\n\
    \n图 帮助|键盘快捷键参考：获取精简的 PDF 键盘快捷键列表\n\n## 结论\n\n我们已经到了本章的结尾，并且在编写和构建我们的第一个 Python\
    \ 程序方面做得很好。每当我们进入一个新环境时，花一些时间尝试了解环境的细节总是有意义的；这就是我们本章的目标。我们已经成功安装了 Python 和 VS\
    \ Code，使用 Python 扩展设置了 Python 环境，安装了默认扩展，并了解了编辑设置。花更多时间处理设置，根据你的喜好编辑字体，并选择你喜欢的主题，这样你就会喜欢使用这个编辑器。\n\
    \n现在，是时候进入下一章了。在下一章中，我们将学习更多有用的 Python 扩展并编辑 Python 相关设置。\n\n# 第 3 章\n\n## VS\
    \ Code 中用于 Python 的顶级扩展\n\n> 技术本身并不重要。重要的是你对人有信心，他们基本上是善良和聪明的，如果你给他们工具，他们会用它们做出美妙的事情。\n\
    \n— 史蒂夫·乔布斯\n\n## 引言\n\nVS Code 编辑器的扩展是无价的。它们有助于提高代码质量并加速开发工作。我们将看一些必备的通用扩展。Python\
    \ 编程使用的两个主要领域是数据科学和网络开发。我们还将看一些适用于数据科学家和网络开发人员的流行扩展。在本章中，我们将解释流行扩展的功能以及如何在 VS\
    \ Code 市场中找到它们，并且我们将安装和管理这些扩展。毫无疑问，这些扩展使 VS Code 成为最受欢迎的 IDE，因此我们添加了这一章以使所有人受益。除此之外，我们将讨论\
    \ Python 中的函数、模块和包。这些概念帮助我们轻松高效地管理冗长的代码。\n\n## 结构\n\n我们将在本章中涵盖以下主题：\n\n- 顶级 VS\
    \ Code 扩展\n- Python 特定设置\n- 安装和使用 Python 包\n- Python 中的函数、模块和包\n\n现在，让我们深入探讨这些主题。\n\
    \n## 目标\n\n本章的目标是概述 Visual Studio Code 中用于 Python 编程的顶级扩展，并解释如何安装和使用这些扩展。我们还将讨论它们的目的和特点。扩展为\
    \ VS Code 添加了更多 Python 功能，例如代码检查、调试和代码格式化。此外，许多流行扩展提供 IntelliSense，它基于变量类型、函数定义和导入的模块提供更智能的代码补全。这使得编写和理解代码变得更容易、更快。我们还将学习函数、类和模块，并了解这些概念在\
    \ Python 中的实现。\n\n## 顶级 VS Code 扩展\n\n所以，你现在已经安装了 VS Code，如果你按照我们的章节操作，可能甚至已经创建了你的第一个程序。有一些扩展会简单地增强你的\
    \ VS Code 的功能。使用 VS Code 扩展，你可以添加不同的语言支持（我们在第 2 章《设置调试器》中做了这件事）、调试器以及各种其他工具，以改善你的开发体验。通过创建扩展，开发人员利用了\
    \ VS Code 丰富的可扩展性，这允许他们将扩展直接插入 VS Code UI，使其对 VS Code 用户可用。要开始使用扩展，请按照以下步骤下载任何扩展：\n\
    \n步骤 1：浏览扩展\n\n第一步是在市场中找到这些扩展。可以轻松地从 VS Code 本身浏览和安装扩展。单击活动栏中的扩展图标或键入扩展命令将打开扩展视图，其外观如图所示。\n\
    \n![](img/9d64daa418450477b4b5cccad74a5f4b_127_0.png)\n\n图 扩展图标\n\n你可以使用屏幕左上角的筛选选项来筛选搜索结果，如图所示。\n\
    \n![](img/9d64daa418450477b4b5cccad74a5f4b_128_0.png)\n\n图 带有筛选选项的扩展搜索结果\n\n流行的扩展列表如图所示。\n\
    \n文件 编辑 选择 视图 转到 运行\n\n扩展：MARK...\n\n@popular\n\n| 扩展 | 描述 | 发布者 |\n| :--- | :---\
    \ | :--- |\n| Python | IntelliSense (Pylance), Linting, ... | Microsoft |\n| Jupyter\
    \ | Jupyter notebook support, inte... | Microsoft |\n| Pylance | A performant,\
    \ feature-rich lang... | Microsoft |\n| C/C++ | C/C++ IntelliSense, debugging,...\
    \ | Microsoft |\n| Jupyter Keymap | Jupyter keymaps for notebooks | Microsoft\
    \ |\n| Jupyter Notebook Renderers | Renderers for Jupyter Noteboo... | |\n\n##\
    \ 图 3.3：流行扩展列表\n\n列表中的每个结果都将包括扩展的简要描述、该扩展的发布者、总下载量以及 5 星制的评分。选择扩展后，将显示扩展的详细信息页面，用户可以在其中了解更多信息。\n\
    \n## 步骤 2：搜索扩展\n\n可以通过在扩展视图顶部的搜索框中键入扩展名称来搜索扩展。清除任何现有文本，然后键入你要查找的扩展名称的全部或部分。因此，如果你键入\
    \ Python，它将显示 Python 语言扩展的列表。如果存在许多名称相似的扩展，知道扩展 ID 会有所帮助。例如，wayou.vscode-todo-highlight\
    \ 是 TODO Highlight 扩展的 ID。也可以直接在搜索框中键入 ID。\n\n## 步骤 3：安装扩展\n\n要安装你选择的扩展，请单击安装按钮。安装完成后，它将转换为管理齿轮按钮。在图中，Python\
    \ 扩展有一个齿轮箱，表示它已安装在本地计算机上，而 C/C++ 选项有安装选项，表示它尚未安装。单击安装按钮将安装 C/C++ 扩展，以便在 VS Code\
    \ 上运行 C/C++ 程序。\n\n## 步骤 4：管理扩展"
