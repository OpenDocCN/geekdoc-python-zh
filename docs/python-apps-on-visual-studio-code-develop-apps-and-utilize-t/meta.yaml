  md: '# Standardization


    VS Code has a large, vibrant community of developers that helps find and resolve
    software bugs. Without following a standard process for coding and testing, it
    would become a mess to manage the code base. In this section, we will briefly
    see how a contributor can suggest new features, submit bug details, build extensions,
    comment on new ideas, or submit pull requests.


    But before you can proceed as a contributor, you need to understand the standard
    very well. VS Code has a wiki where developers can find information about the
    code base and instructions on how to work with the source code. A detailed explanation
    of how you can contribute and coding guidelines are listed on the wiki. It defines
    how code should be written to keep every file readable and maintainable.


    Visual Studio Code uses tools, called linters, to enforce the coding guidelines.
    These tools have configuration files and are set up in the Git root of VS Code.
    By installing these linters as extensions in Visual Studio Code, developers get
    notified by visualized errors and other kind-of messages in the editor.


    Visual Studio Code is tested by using the JavaScript testing framework Mocha.
    A smoke test is performed before each release. This smoke test is carried out
    to ensure that all major functionalities work as intended. VS Code uses Travis
    CI and Appveyor for continuous integration on GitHub. Travis CI is used for testing
    Linux and Mac OS builds. whereas AppVeyor runs the build test on Windows.'
  merge: -1
