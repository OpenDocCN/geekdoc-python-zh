  md: '# Develop a Profile Application


    We will learn the concepts of Flask application by developing an application.
    Let us call this application My Profile Application and describe the requirements:


    The website will have the following web pages: Home, Education, Expertise, Projects,
    and Testimonials.


    Home will be a static page, whereas Education, Expertise, Projects, and Testimonials
    will display the details from the database.


    The website should have a user login page with username/password authentication
    for access.


    Only the admin users should be able to add content to the database for education,
    expertise, and projects; any registered user should be able to add testimonials
    to the page.


    Admin should also be able to control the Testimonial page from the back end.


    Flask applications have Views are functions in a Flask application controller
    responsible for processing user requests and returning response data to the user.
    The views are responsible for communicating with the model to retrieve, edit,
    create, and delete data from a database and for formatting this data as a response
    to the user. Views are typically written as Python functions that take an HTTP
    request object and an optional array of parameters as arguments. Figure 11.8 depicts
    the Views or Functions that we will create and add to this website:'
  merge: -1
  pgno: 554
- img_proc: true
  md: '![](img/9d64daa418450477b4b5cccad74a5f4b_555_0.png)


    Figure 11.8: Features available in the application


    The functionalities shown under the core are to display the content to everyone.
    Functionalities (or Views) under Users like login, logout, register, account,
    and post testimonials are to be handled for registered users. Testimonials functionalities
    are to make edits to Testimonials.


    Let us start coding the application in the upcoming sections. But before that,
    let us create a folder called where your app.py file is placed, as shown in Figure
    All the files related to the My Profile application will be added to this folder.


