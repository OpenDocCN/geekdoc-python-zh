    ## Data Structures


    A data structure may be selected in computer programming or designed to store
    data for the purpose of working with different algorithms on it. Every other data
    structure includes the data values, data relationships, and functions between
    the data that can be applied to the data and information.


    ### Features of data structures


    Sometimes, data structures are categorized according to their characteristics.
    Possible functions are:


    -   Linear or non-linear: This feature defines how the data objects are organized
    in a sequential series, like a list or in an unordered sequence, like a table.

    -   Homogeneous or non-homogeneous: This function defines how all data objects
    in a collection are of the same type or of different kinds.

    -   Static or dynamic: This technique determines to show to assemble the data
    structures. Static data structures at compilation time have fixed sizes, structures,
    and destinations in the memory. Dynamic data types have dimensions, mechanisms,
    and destinations of memory that may shrink or expand depending on the application.


    ### Data structure Types


    Types of the data structure are determined by what sorts of operations will be
    needed or what kinds of algorithms will be implemented. This includes:


    Arrays: An array stores a list of memory items at adjacent locations. Components
    of the same category are located together since each element''s position can be
    easily calculated or accessed. Arrays can be fixed in size or flexible in length.


    Stacks: A stack holds a set of objects in linear order added to operations. This
    order may be past due in first out (LIFO) or first-out (FIFO).


    Queues: A queue stores a stack-like selection of elements; however, the sequence
    of activity can only be first in the first out. Linked lists: In a linear order,
    a linked list stores a selection of items. In a linked list, every unit or node
    includes a data item as well as a reference or relation to the next element in
    the list.


    Trees: A tree stocks an abstract, hierarchical collection of items. Each node
    is connected to other nodes and can have several sub-values, also known as a child.


    Graphs: A graph stores a non-linear design group of items. Graphs consist of a
    limited set of nodes, also called vertices, and lines connecting them, also known
    as edges. They are useful for describing processes in real life, such as networked
    computers.


    Tries: A tria or query tree is often a data structure that stores strings as data
    files, which can be arranged in a visual graph.


    Hash tables: A hash table or hash chart is contained in a relational list that
    labels the keys to variables. A hash table uses a hashing algorithm to transform
    an index into an array of containers containing the desired item of data. These
    data systems are called complex because they can contain vast quantities of interconnected
    data. Examples of primal, or fundamental, data structures are integer, float,
    boolean, and character.


    ### Utilization of data structures


    Data structures are generally used to incorporate the data types in physical forms.
    This can be interpreted into a wide range of applications, including a binary
    tree showing a database table. Data structures are used in the programming languages
    to organize code and information in digital storage. Python databases and dictionaries,
    or JavaScript array and objects, are popular coding systems used to gather and
    analyze data. Also, data structures are a vital part of effective software design.
    Significance of Databases Data systems is necessary to effectively handle vast
    volumes of data, such as data stored in libraries, or indexing services.


    Accurate data configuration management requires memory allocation identifier,
    data interconnections, and data processes, all of which support the data structures.
    In addition, it is important to not only use data structures but also to select
    the correct data structure for each assignment.'
  mdcn: '## 第九章 数据科学


    ## 数据科学及其重要性


    数据科学在过去几年中取得了长足发展，因此，它成为理解多家公司运作方式的重要因素。以下是几个解释，证明数据科学仍将是全球市场不可或缺的一部分。


    1.  借助数据科学，公司能够以更高效、更高级的方式了解其客户。满意的客户是每家公司的基石，他们在公司的成功或失败中扮演着重要角色。数据科学使公司能够以先进的方式与客户互动，从而证明产品性能和实力的提升。

    2.  数据科学使品牌能够提供强大且引人入胜的视觉效果。这是它闻名的原因之一。当产品和公司充分利用这些数据时，他们可以与受众分享经验，从而与产品建立更好的关系。

    3.  也许数据科学的一个重要特征是其结果可以推广到几乎所有行业，例如旅游业、医疗保健和教育。公司可以借助数据科学快速确定其问题，并能充分解决这些问题。

    4.  目前，数据科学几乎在所有行业都可获得，如今，世界上存在着海量数据，如果使用得当，它可能导致任何项目的成功或失败。如果数据使用得当，它将在未来对于实现产品目标至关重要。

    5.  大数据始终在增长和发展。大数据使企业能够利用日常构建的不同资源，有效且快速地解决复杂的业务、人力资本和资本管理问题。

    6.  数据科学在每个其他领域都迅速普及，因此在每个产品的运作和性能中都扮演着重要角色。因此，数据科学家的角色也得到了提升，因为他们将执行管理数据和为特定问题提供解决方案的基本功能。

    7.  计算机技术也影响了超市行业。要理解这一点，让我们举个例子：过去，老年人与本地卖家有着极好的互动。此外，卖家能够以个性化的方式满足客户的需求。但由于超市连锁店的出现和增加，这种关注现在已经消失。但卖家现在能够借助数据分析与客户进行沟通。

    8.  数据科学帮助公司建立那种客户联系。借助数据科学，公司及其产品将能够更好地、更深入地了解客户如何利用他们的服务。


    数据技术的未来：与其他领域不断演变一样，数据技术的重要性也日益增长。数据科学影响了不同领域。其影响可见于许多行业，例如零售、医疗保健和教育。在医疗保健领域，新的治疗方法和技术不断被发现，并且需要高质量的患者护理。医疗保健行业可以借助数据科学技术找到解决方案，帮助患者得到照顾。教育是另一个可以清楚看到数据科学优势的领域。现在，像手机和笔记本电脑这样的新创新已成为教育系统的一个基本特征。此外，借助数据科学，学生正在创造更大的机会，从而提高他们的知识水平。


    ## 数据结构


    在计算机编程中，可以选择或设计一种数据结构来存储数据，以便对其执行不同的算法。每种数据结构都包含数据值、数据关系以及可以应用于数据和信息的函数。


    ### 数据结构的特征


    有时，数据结构根据其特征进行分类。可能的功能包括：


    -   线性或非线性：此特征定义了数据对象是如何组织成顺序序列（如列表）或无序序列（如表格）的。

    -   同质或异质：此功能定义了集合中的所有数据对象是相同类型还是不同类型。

    -   静态或动态：此技术决定了如何组装数据结构。静态数据结构在编译时具有固定的大小、结构和内存中的位置。动态数据类型的维度、机制和内存位置可能会根据应用程序而缩小或扩展。


    ### 数据结构类型


    数据结构的类型取决于需要执行哪些操作或实现哪些算法。这包括：


    数组：数组在相邻位置存储一系列内存项。相同类别的元素位于一起，因为每个元素的位置可以轻松计算或访问。数组可以是固定大小的，也可以是灵活长度的。


    栈：栈以线性顺序保存一组对象，该顺序遵循后进先出（LIFO）或先进先出（FIFO）的操作原则。


    队列：队列存储类似栈的元素集合；但是，活动顺序只能是先进先出。链表：链表以线性顺序存储一组项目。在链表中，每个单元或节点包含一个数据项以及对列表中下一个元素的引用或关系。


    树：树存储一个抽象的、分层的项目集合。每个节点都与其他节点连接，并且可以有多个子值，也称为子节点。


    图：图存储一个非线性的设计项目组。图由有限的节点集（也称为顶点）和连接它们的线（也称为边）组成。它们对于描述现实生活中的过程非常有用，例如联网的计算机。


    字典树（Trie）：字典树或查询树通常是一种将字符串存储为数据文件的数据结构，这些数据文件可以排列在可视图中。


    哈希表：哈希表或哈希图包含一个关系列表，该列表将键映射到变量。哈希表使用哈希算法将索引转换为包含所需数据项的容器数组。这些数据系统被称为复杂的，因为它们可以包含大量相互关联的数据。原始或基本数据结构的例子包括整数、浮点数、布尔值和字符。


    ### 数据结构的利用


    数据结构通常用于将数据类型以物理形式整合。这可以解释为广泛的应用，包括显示数据库表的二叉树。数据结构在编程语言中用于组织数字存储中的代码和信息。Python的数据库和字典，或JavaScript的数组和对象，是用于收集和分析数据的流行编码系统。此外，数据结构是高效软件设计的重要组成部分。数据库的重要性：数据系统对于有效处理海量数据是必要的，例如存储在图书馆或索引服务中的数据。


    准确的数据配置管理需要内存分配标识符、数据互连和数据处理，所有这些都支持数据结构。此外，不仅使用数据结构很重要，而且为每项任务选择正确的数据结构也很重要。'
