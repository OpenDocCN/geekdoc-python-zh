    ## 第五章. 理解程序的结构


    本书的这一部分旨在让你快速开始编码的基础知识，教你第一步：理解程序的结构。


    ### 程序结构


    在我们的示例中，我们有一个简单的程序，它打印出 hello 和 goodbye。语法告诉我们，我们创建了两个不同的函数，每个函数都有自己的数据和逻辑。它通常被称为过程式编程，因为它有独立的过程，可以在任何时间以任何顺序执行。


    ### 编程变量简介


    如上所述，每种编程语言都有自己的一套规则和特点，但它们都有一个共同点：变量。


    ### 变量数据类型


    数据类型定义了值在变量中的存储方式。在我们上面的示例中，使用的变量是整数和字符串。每个变量代表特定的值或比特序列。int 代表整数，而 string 代表文本。除了数据类型之外，每个变量都包含自己的值，并且可以在通过计算机编译器运行时由程序员更改。例如：


    ```

    1.23 + 4.56 = 5.79

    ```


    当你将 1.23 和 4.56 相加时，你会得到 5.79，但我们不是将其存储为 5.79，而是将其存储在一个变量中。这就像手头有 1 美元，然后说“我有一美元”，只不过你会说“$1”而不是“一美元”。请注意，每种编程语言都有自己的变量术语，例如
    int、string 或 float 等。


    在接下来的教程中，当我们学习如何操作变量时，我们将更详细地介绍。


    ### 理解程序的结构：子程序函数


    我们上面的示例被称为过程式编程，因为它有独立的过程，可以在任何时间以任何顺序执行。在这个例子中，我们有一个主函数，它首先被执行。这是我们程序的开始，在编程术语中，它被称为主过程。程序可以调用一系列子程序（函数），这些子程序随后可以在任何时间执行。每个过程都有自己的值和逻辑，可以供其自身或其他函数使用。


    ### 命令与逻辑


    我们使用命令来指导解释器（计算机）如何执行我们的程序。命令是你告诉程序管理的确切指令。编程中常用的一些命令包括 print、input、if、else 和
    while。


    除了指令之外，还使用了逻辑。逻辑告诉计算机根据特定条件执行特定命令。例如，if 语句允许我们检查某些条件，并指示解释器（计算机）执行一个或多个操作。


    ### 理解程序的结构：数据访问器


    在我们的示例中，我们有一个主函数，可以调用一系列子程序。这些被称为数据访问器，因为它们回答了“这个变量是什么？”的问题。数据访问器就像你程序的一个入口点，帮助你响应这个变量。对于程序中的每个变量，都需要有一个且仅有一个该变量的数据访问器。如果你创建两个或多个具有各自独立数据访问器的变量，你的程序将无法正确运行。


    ### 编程特点和技巧


    在开始编程时，有一些特点需要记住。例如，如果你想创建一个询问用户姓名的程序，不要将用户姓名放在引号中。这是因为每个变量都必须以字母或下划线 ( _ ) 开头。因此，“Alice”将不起作用，因为它将被解释为字符串字面量，而不是变量。如果你需要询问用户的姓名，你应该使用像“username”这样的变量名。下划线字符
    ( _ ) 用于分隔不同的变量，以免它们混淆。还有一种叫做作用域的东西。这是一个你可能已经知道的基本概念。作用域允许我们的程序知道程序中定义了哪些变量以及它们在哪里定义。它们的位置决定了这一点，因此任何代码行上的第一个变量被称为局部作用域，可以在不需要写出该变量名称的情况下访问。但如果你开始在子程序之外打印变量，你将需要写出它们的名称。


    ### 编程术语


    类、对象、变量和函数。


    面向对象的编程方法在计算机程序中创建了一种更结构化、更有序的数据存储方式。面向对象编程基于我们在高中和大学所学的知识，但在现实世界中的应用方式不同。这种方法创建了旨在与现实世界对象相似的对象类。


    类是一种将你的程序组织成具有相似值、相似方法或操作（函数）以及相似属性的不同组的方式。类源自一组称为属性的值。属性可以是任何东西，从数字到字符串，或内置变量，如位置、大小、速度、时间等...
    在我们上面的程序中，我们有一个名为 main 的类，它有一个名为 EXE 的属性。也就是说，EXE 变量在程序中被定义。


    通过创建一个类，我们可以创建继承这个类的对象。例如，在我们的程序中，我们创建了一个名为“Main”的类，它继承自“Main”类。然后我们可以使用这个类创建一个名为
    main 的对象（它将被称为主函数）。'
