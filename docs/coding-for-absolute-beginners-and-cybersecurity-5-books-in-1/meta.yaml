  md: '# What does it mean to be an ethical hacker?


    All the things we mentioned earlier in this chapter referred to hackers in general.
    The real goal, however, is to learn how to be an ethical hacker and explore the
    skills you should have.


    Ethical hackers are people who are usually employed by organizations to test their
    security. They usually work through direct employment or through temporary contracts.
    The key is that they use the same skills as all other hackers, but there is one
    big difference: they are allowed to attack the system directly from the system
    owner. In addition, an ethical hacker means that you reveal the weaknesses of
    the system you have evaluated (because every system in the world has them) only
    to the owner and no one else. In addition, organizations or individuals hiring
    ethical hackers use very strict contracts that specify which parts of the system
    are authorized for an attack and which are prohibited. The role of an ethical
    hacker also depends on the job to which he or she is entitled, i.e., the needs
    of the employer. Today, some organizations have permanent staff teams, and their
    job is to conduct ethical hacking activities.


    Hackers can be divided into 5 categories. Keep in mind that this format may vary,
    but we can say these are the most common:


    +   - The first category is also referred to as "Script Kiddies." These hackers
    usually have no training or do, but very limited. They know how to use just some
    of the basic hacking tools and techniques, and since they are not competent enough,
    they may sometimes not fully understand their activities or the consequences of
    their work.

    - The second category concerns hackers known as "White Hat hackers." They attack
    the computer system, but they are the good guys, which means they don''t harm
    their work. These types of hackers are usually ethical hackers, but they can also
    be pentesters.'
  merge: -1
  pgno: 553
- img_proc: true
  md: '+   - "Gray Hat Hackers" are the third hacker category. As their name suggests,
    they are between good and bad, but their final decision is to choose the right
    side. Still, these types of hacker’s struggle to gain trust because they can be
    suspicious.

    - The fourth category we mention in this section is referred to as the "Black
    Hat Hackers." This category refers to the hackers we mentioned earlier in this
    chapter. These people usually work on the ''other side'' of the law and are usually
    associated with criminal activities.

    - Last but not least are the "Suicide hackers." They are called that because their
    goal is to prove the point, which is why they want to take out their target. These
    hackers don''t have to worry about getting caught, because their goal is not to
    hide, but to prove, so that they are easier to find.'
  merge: -1
