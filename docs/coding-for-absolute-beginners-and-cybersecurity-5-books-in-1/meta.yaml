    \n## 输入\n\n### 输入基础知识\n\n- 对于输入，你需要掌握一个基本思想、两种语言和三种数据类型。\n- 一个基本思想：为了进行连续输入，你需要使用while(inputMethod)，当发生两件事时：\n\
