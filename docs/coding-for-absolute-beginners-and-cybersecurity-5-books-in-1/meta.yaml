  md: '# # Introduction


    Computer technology has evolved in unimaginable sophistication and innovation
    ever since its inception. The majority of the advancements, reach, and the power
    of the internet has aided the popularity of information technology. Today, almost
    any industry or individual uses computer systems and networks for some purpose
    or another.


    The measures that are taken to protect computer systems, networks and devices
    against cyber-attacks are categorized as cybersecurity. Although computer technology
    has evolved leaps and bounds, the same can''t be said about cybersecurity.


    Cyber-attacks have become increasingly complex and deceptive, with highly skilled
    cyber-criminals dedicating enormous amounts of time, resources, and energy into
    launching serious cyber-attacks. However, the means for protecting individuals
    and organizations from such attacks have been slow to catch up.


    Various security measures are discussed at length, including the proper use of
    passwords and PINs, creating routine back-ups, practicing caution when connecting
    to public networks, and much more. The discussion also includes how to put those
    countermeasures into effect without affecting one''s lifestyle, productivity,
    and budget.


    The internet has changed the way companies do business. Computers and networks
    have changed many processes of businesses from manufacturing, operations, communications
    to finance, distribution, marketing, and customer service. It is common to find
    the presence of the use of computer systems and the internet in almost all processes
    related to businesses in one way or another.


    The advancements in computer technology, cheaper hardware, and the popularity
    of the internet have paved the way for the next big thing in technology: The Internet
    of Things. Objects that used to be "dumb" and needed human intervention have been
    made "smart" by giving such objects the ability to collect and transmit data and
    respond to remote commands. The Internet of Things is predicted to continue to
    grow rapidly while changing the daily lives of humans and the operations of businesses.'
