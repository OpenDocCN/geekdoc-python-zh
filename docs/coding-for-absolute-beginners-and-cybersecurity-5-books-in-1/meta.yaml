    ## The Coding Standard


    Coding style is a byproduct of how you view memory, how you view variables, and
    how you view file I/O. Coding style will make your life easier if it is similar
    to that which others use. However, coding style may cause aggravation if it differs
    from that which others use. Basically, there are two ways to approach this: obsess
    over very small details or err on the side of caution when making changes. Most
    of us fall somewhere in between, and it''s a matter of what works best for you.


    The style I tend to use is to use as few curly braces as possible and avoid the
    occasional parenthesis use. In contrast, most people tend to use every curly brace
    they can get their hands on and add new parentheses wherever they think they are
    necessary. There is almost always a way to accomplish what you want without using
    the unneeded parenthesis. Secondly, never ''parentheses yourself into the ground''
    with unnecessary brackets and braces unless you (or someone else) have told you
