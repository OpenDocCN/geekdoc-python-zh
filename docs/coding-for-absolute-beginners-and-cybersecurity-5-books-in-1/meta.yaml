  - '[PAGE 547]


    A single stolen W-2 might net an attacker $20, but your organization and employees
    may be on the hook for tens or hundreds of thousands of dollars in damages. And
    this is just one example of how cyber-attacks wreak havoc on an organization.
    Black markets and cyber espionage make seemingly mundane data worth stealing and
    exploiting. Trade secrets, access to bank accounts, and private communication
    are very lucrative targets. Sometimes it is not your own data, but a client’s
    data accessible through you or your employees that is the target.


    Our highly connected, the digital world has ushered in a new era of cybercrime.
    One that is growing fast and changing constantly. Executives who stick their heads
    in the sand, try to keep a data breach a secret, pass off cybersecurity as just
    an IT problem, or wait for government protection will pay a steep price.


    Many executives in the 1990s were adamant that computers were a novel expense
    that would never add real value to their business models. The idea that they would
    elevate the discussion of computers to an executive-level was as absurd as typing
    their own email. Executives that clung to this view doomed their company to lose
    ground when competitors with forward-thinking executives raised technology to
    a boardroom discussion. Today cybersecurity is what computers were then. It is
    history, repeating itself, and we already know who wins. Organizations led by
    executives that are willing to buck old-school thinking and grapple with the Wild
    West of cybersecurity will come out on top.


    Today, the outdated view is thinking that cybersecurity is a technical problem
    best delegated to information technology (IT) experts. It goes hand-in-hand with
    the idea that cybersecurity involves only preventing attacks by anticipating them
    and implementing as many deterrents as possible. In contrast, a modern view of
    cybersecurity recognizes that countering every possible attack to achieve perfect
    security is financially unfeasible. This new mindset also considers what happens
    when attacks occur, because they will. Astute executives realize that spending
    every dime on prevention is futile and take a more holistic view of the problem.'
  - '[PAGE 548]


    Finding the right balance among various preventive and preparatory measures is
    like building an investment portfolio of stocks, bonds, and real estate. The right
    mix depends on what the external markets are doing and your appetite for taking
    risks. As time goes on, the markets will change, and your life circumstances change.
    Allocations in your portfolio adjust accordingly. This book is a guide to making
    investments in cybersecurity that reflect the external threat landscape, internal
    business strategy, and the organization’s appetite for risk.


    Despite having excellent cybersecurity teams and multi-million-dollar budgets,
    large companies have learned that cybersecurity is a business problem that must
    be managed from the top. They have realized that outsourcing and delegation only
    go so far when building a comprehensive cybersecurity plan and keeping it up to
    date as internal and external circumstances change. For the foreseeable future,
    the management of cybersecurity as a business problem will rest upon the shoulders
    of top management. Unless you embrace this new role, your organization will be
    a cybersecurity have-not in a time where data privacy and security are of increasing
    concern among clients and suppliers.


    What happens if you do not step up to the plate? Well, according to a 2017 report,
    nearly one-quarter of small businesses that suffered a ransomware attack were
    forced to immediately stop their operations. How long can your organization survive
    if revenue-generating operations stopped abruptly while payroll and other expenses
    continued? What will long-term damage be done to your clients’ perception of your
    organization’s ability to offer uninterrupted service?


    Savvy competitors simply wait for your market share to open up as a result of
    your inattention. On the flip side, effective management of cybersecurity is necessary
    just to stay on par with forward-thinking competitors. Having a comprehensive
    cybersecurity plan in place can position your company to survive the same attacks
    that will bankrupt (or severely disrupt) your peers. When that happens, you can
    pick up their market share and grow your company.'
  - '[PAGE 549]


    Another reason to take cybersecurity seriously at the executive level is that
    larger, cyber-savvy companies are often direct, or indirect, clients who take
    the security of their supply chain very seriously. Studies show that as many as
    63 percent of data breaches are linked to a third-party because weak downstream
    suppliers make great back doors into otherwise secure systems. In response to
    this, the NIST Cybersecurity Framework (a technical implementation guide) was
    recently revised to add emphasis to supply chain scrutiny, and an executive order
    from the White House drove this same point home for government agencies. The government,
    their downstream contractors, and large private sector companies will begin culling
    lax suppliers and awarding business to those who demonstrate they take cybersecurity
    seriously. Nimble executives who address cybersecurity at their core will have
    an advantage—one that differentiates a company from its competitors and may command
    a premium. If you insist that your plate is full just managing what you already
    have, you will miss the opportunity to rise above your competitors, just like
    the old-school executives who refused to see technology as anything more than
    an expense.


    Consumers have also become quite sensitive to cybersecurity, and it is reflected
    in their buying habits. Forward-thinking executives can capitalize on this trend
    too. A prominent example was Apple’s stance on personal privacy when the FBI demanded
    they decrypt an iPhone used in a terrorist event. Playing up their investments
    in encryption and demonstrating loyalty to a client even in the worst of times
    helped solidify consumer trust in Apple products. We would never advocate brinksmanship
    with the FBI, but Apple’s response was a brilliant way to gain confidence among
    consumers. Learning to manage cybersecurity from a business perspective means
    you can spot and leverage opportunities like this too.'
  - '[PAGE 550]


    # Chapter 9. Ethical Hacking


    When it comes to security, being a hacker is one of the most commonly used terms.
    It appears everywhere, and even the entertainment industry and many authors often
    use it in their movies, books, TV shows, and other media forms. Therefore, the
    word "hacker" is usually seen as a bad profession and always associated with dark
    or real criminal activity. So, when people hear that someone is involved in hacking,
    they immediately see that person as someone who has no good intentions. They are
    usually presented as "operators from the shadows," even antisocial. On the other
    hand, they are also seen as a social activist. This label became especially popular
    after a few things like WikiLeaks. Many hackers were involved in obtaining many
    important documents from governments, politicians, and companies that showed information
    that was very different from the information given to the public. Organized groups
    such as Anonymous or Lizard Squad have also had a huge impact on the hacking experience
    in recent years.'
  - '[PAGE 551]


    # Examples: Mischief or Criminal?


    +   - Hacking is by no means a phenomenon that has appeared overnight. It existed
    in various forms and evolved all the way from the 1960s. However, it was never
    tackled as a criminal activity at first. We''ll look at some cases that will take
    a closer look at some of the attacks, and generic examples that have gradually
    changed that picture.

    - Access services or resources that you do not have permission to use. This is
    usually called stealing usernames and passwords. In some cases, obtaining this
    information without permission is considered a cybercrime, even if you do not
    use it or as accounts of friends or family members.

    - There is a form of digital offense called network intrusion that is also considered
    a cybercrime. In essence, as with ordinary offenses, this means that you went
    somewhere without permission to enter (or in this case, access). So, in case someone
    gets access to a system or group of systems without permission, we can say that
    the person violated the network and thereby committed cybercrime. However, some
    network intrusions can take place without using hacker tools. Sometimes logging
    in to guest accounts without prior permission can be seen as cybercrime.

    - One of the most complex yet simplest forms of hacking is to go after the most
    vulnerable element in the system—people. This type of cybercrime is known as social
    engineering, and we say it can be simple because the person is a much more accessible
    part of the system than any other, and it''s easier to deal with. However, people
    can provide clues that are difficult to understand, whether spoken or not, making
    it difficult for the hacker to get the information they need.

    - The issue of posting or sending illegal material has generally become difficult
    to address, especially in the past decade. Social media received a lot of attention,
    and many other internet-related services increased in use and popularity. This
    allowed many illegal materials to move from one place to another in the shortest
    possible time, allowing it to spread very quickly'
- md: '## What does it mean to be an ethical hacker?


    All the things we mentioned earlier in this chapter referred to hackers in general.
    The real goal, however, is to learn how to be an ethical hacker and explore the
    skills you should have.


    Ethical hackers are people who are usually employed by organizations to test their
    security. They usually work through direct employment or through temporary contracts.
    The key is that they use the same skills as all other hackers, but there is one
    big difference: they are allowed to attack the system directly from the system
    owner. In addition, an ethical hacker means that you reveal the weaknesses of
    the system you have evaluated (because every system in the world has them) only
    to the owner and no one else. In addition, organizations or individuals hiring
    ethical hackers use very strict contracts that specify which parts of the system
    are authorized for an attack and which are prohibited. The role of an ethical
    hacker also depends on the job to which he or she is entitled, i.e., the needs
    of the employer. Today, some organizations have permanent staff teams, and their
    job is to conduct ethical hacking activities.


    Hackers can be divided into 5 categories. Keep in mind that this format may vary,
    but we can say these are the most common:


    - The first category is also referred to as "Script Kiddies." These hackers usually
    have no training or do, but very limited. They know how to use just some of the
    basic hacking tools and techniques, and since they are not competent enough, they
    may sometimes not fully understand their activities or the consequences of their
    work.

    - The second category concerns hackers known as "White Hat hackers." They attack
    the computer system, but they are the good guys, which means they don''t harm
    their work. These types of hackers are usually ethical hackers, but they can also
    be pentesters.

    - "Gray Hat Hackers" are the third hacker category. As their name suggests, they
    are between good and bad, but their final decision is to choose the right side.
    Still, these types of hacker’s struggle to gain trust because they can be suspicious.

    - The fourth category we mention in this section is referred to as the "Black
    Hat Hackers." This category refers to the hackers we mentioned earlier in this
    chapter. These people usually work on the ''other side'' of the law and are usually
    associated with criminal activities.

    - Last but not least are the "Suicide hackers." They are called that because their
    goal is to prove the point, which is why they want to take out their target. These
    hackers don''t have to worry about getting caught, because their goal is not to
    hide, but to prove, so that they are easier to find.


    Fraud is also common, especially on the internet, and is also considered a cybercrime.
    Like the original term, fraud in cyberspace also means that a party or parties
    have usually been misled for financial gain or harm.


    ## Responsibilities of an Ethical Hacker


    The most important thing that an ethical hacker should learn and never forget
    is that he or she should always have permission for any kind of system attack.
    The ethical code that you, as an ethical hacker, must implement in every task
    says that no network or system should be tested or targeted if you do not own
    it or if you do not have permission to do so. Otherwise, you may be found guilty
    of multiple crimes that may have occurred in the meantime. First, it can hurt
    your career, and second, if it''s something really serious, it can even threaten
    your freedom.


    The smartest thing is to get a contract from your employer the moment you test
    or attack the required target. The contract is a written authorization, but you
    should keep in mind that you should only examine the parts of the system specified
    in that contract. So, if your employer wants to give you permission to hack additional
    parts of the system or remove authorization for some, he should first change the
    contract and you shouldn''t continue working until you get the new permit. Note
    that the only thing that distinguishes an ethical hacker from the cybercriminal
    is the contract. Therefore, you should always pay special attention to the vocabulary
    related to privacy and confidentiality issues, as it often happens that you come
    across intimate information from your client, both business and personal.


    That''s one more reason why your contract should include who you can talk to about
    the things you found while researching the system and who are forbidden from hearing
    updates from you. In general, customers usually want to be the only people who
    know everything you eventually find out.


    An organization known as the EC Council (International Council of Electronic Commerce
    Consultants) is one of the most important organizations when it comes to regulating
    these issues. According to them, an ethical hacker should keep all information
    obtained on the job private and treat it as confidential. This is indicated in
    particular for the customer''s personal information, which means that you are
    not allowed to transfer, give, sell, collect or do any of the customer''s information,
    such as social security number, etc. -mail address, home address, unique identification,
    name, and so on. The only way you can give this type of information to a third
    party is by having written permission from your employer (client).


    While some may argue about the distinction between hackers and ethical hackers,
    the division is quite simple: hackers are separated by their intentions. This
    means that those who plan to harm and use their skills to access data without
    permission are labeled as black hats, while those who work with their client''s
    permission are considered white hat hackers. Naming these two categories of "the
    bad" and "the good" can be controversial, so we''ll try to follow these expressions
    in the following way:


    - Black hats usually operate outside the law, which means they do not have permission
    from the person called "the customer" to consent to their activities.

    - On the contrary, white hats have permission and permission from the person called
    “client,” and they even keep the information they have between client and white
    hats only.

    - Gray hats, on the other hand, enter both areas and use both types of action
    in different periods.


    Hacktivists are a category of hackers that we have not mentioned before. They
    belong to the movement known as Hacktivism, which refers to action’s hackers use
    to influence the general public by promoting a particular political agenda. So
    far, hacktivists have been involved with agencies, large companies, and governments.


    ## Hacker Ethics and Code of Conduct


    Like any other profession, hacking has its Code of Conduct that establishes rules
    that can help customers (individuals or organizations) evaluate whether the person
    who interacts with their networks and computer systems is generally reliable.
    The organization that implemented this Code has already been identified and is
    known as the EC Council. Obtaining a CEH reference from the EC Council means that
    you fully understand the expectations you must meet. We''ve provided some parts
    of the code, so make sure you read it and get familiar with it.


    - Information you gain during your professional work should be kept confidential
    and private (especially personal information)

    - Unless you have your customer''s permission, you may not give, transfer or sell
    the customer''s home address, name, or other unique identifying information.

    - You must protect the intellectual property, yours and others, by using skills
    that you have acquired yourself so that all benefits go to the original creator.

    - Be sure to disclose to authorize personnel any danger that you suspect may be
    from the Internet community, electronic transactions, or other hardware and software
    indicators.

    - Make sure that the services you provide are within your area of expertise so
    that you work honestly while aware of any limitations that may be a result of
    your education or experience.

    - You may only work on projects for which you are qualified and carry out tasks
    that match your training, education, and work experience skills.

    - You must not knowingly use software that has been obtained illegally or has
    been stored unethically.

    - You may not participate in financial practices that may be considered misleading,
    such as double billing, bribery, etc.

    - Make sure you use the customer''s property properly, without exceeding the limits
    set in your contract.

    - You must disclose a potential conflict of interest to all parties involved,
    especially if that conflict cannot be avoided.'
  mdcn: '## 成为一名道德黑客意味着什么？


    本章前面提到的所有内容都是针对一般意义上的黑客。然而，真正的目标是学习如何成为一名道德黑客，并探索你应该具备的技能。


    道德黑客通常是受雇于组织来测试其安全性的人员。他们通常通过直接雇佣或临时合同工作。关键在于，他们使用与其他所有黑客相同的技能，但有一个重大区别：他们获得了系统所有者的许可，可以直接攻击系统。此外，道德黑客意味着你只向所有者（而非其他人）披露你所评估系统的弱点（因为世界上每个系统都有弱点）。此外，雇佣道德黑客的组织或个人会使用非常严格的合同，明确规定系统的哪些部分被授权攻击，哪些部分被禁止。道德黑客的角色也取决于他或她被赋予的工作，即雇主的需求。如今，一些组织拥有常设员工团队，他们的工作就是进行道德黑客活动。


    黑客可以分为5类。请记住，这种分类方式可能有所不同，但我们可以说这些是最常见的：


    - 第一类也被称为“脚本小子”。这些黑客通常没有受过训练，或者训练非常有限。他们只知道如何使用一些基本的黑客工具和技术，而且由于能力不足，他们有时可能无法完全理解自己的活动或其工作的后果。

    - 第二类涉及被称为“白帽黑客”的黑客。他们攻击计算机系统，但他们是好人，这意味着他们的工作不会造成伤害。这类黑客通常是道德黑客，但他们也可以是渗透测试者。

    - “灰帽黑客”是第三类黑客。顾名思义，他们介于好与坏之间，但他们的最终选择是站在正确的一边。尽管如此，这类黑客很难获得信任，因为他们可能令人怀疑。

    - 我们在本节中提到的第四类被称为“黑帽黑客”。这一类指的是我们本章前面提到的那些黑客。这些人通常在法律的“另一面”工作，并且通常与犯罪活动有关。

    - 最后但同样重要的是“自杀式黑客”。他们之所以被这样称呼，是因为他们的目标是证明某个观点，这就是他们想要干掉目标的原因。这些黑客不必担心被抓，因为他们的目标不是隐藏，而是证明，所以他们更容易被找到。


    欺诈也很常见，尤其是在互联网上，它也被视为一种网络犯罪。就像原始术语一样，网络空间中的欺诈也意味着一方或多方通常因经济利益或损害而被误导。


    ## 道德黑客的职责


    道德黑客应该学习并永远记住的最重要的事情是，他或她应该始终为任何类型的系统攻击获得许可。你作为道德黑客必须在每项任务中执行的道德准则规定，如果你不拥有或没有许可，就不应测试或针对任何网络或系统。否则，你可能会被认定犯有在此期间可能发生的多项罪行。首先，这会损害你的职业生涯；其次，如果事情真的很严重，甚至可能威胁到你的自由。


    最明智的做法是在你测试或攻击所需目标的那一刻，就从你的雇主那里获得一份合同。合同是书面授权，但你应该记住，你只应检查合同中指定的系统部分。因此，如果你的雇主想给你许可去攻击系统的其他部分，或者取消对某些部分的授权，他应该首先修改合同，在你获得新的许可之前，你不应继续工作。请注意，区分道德黑客和网络犯罪分子的唯一东西就是合同。因此，你应该始终特别注意与隐私和保密问题相关的词汇，因为你经常会遇到客户的机密信息，无论是商业信息还是个人信息。


    这又是一个原因，说明为什么你的合同应该包括你可以与谁讨论你在研究系统时发现的事情，以及禁止谁从你那里听取更新信息。通常，客户通常希望成为唯一知道你最终发现的所有事情的人。


    一个名为EC-Council（国际电子商务顾问委员会）的组织在规范这些问题方面是最重要的组织之一。根据他们的说法，道德黑客应将工作中获得的所有信息保密，并将其视为机密。特别是对于客户的个人信息，这意味着你不允许转让、给予、出售、收集或对客户的任何信息（如社会安全号码、电子邮件地址、家庭地址、唯一标识、姓名等）进行任何操作。你将此类信息提供给第三方的唯一方式是获得雇主（客户）的书面许可。


    虽然有些人可能会争论黑客和道德黑客之间的区别，但这种划分相当简单：黑客是根据他们的意图来区分的。这意味着那些计划造成伤害并使用他们的技能未经授权访问数据的人被标记为黑帽，而那些在客户许可下工作的人被认为是白帽黑客。将这两类命名为“坏人”和“好人”可能具有争议性，因此我们将尝试遵循以下方式来使用这些表达：


    - 黑帽通常在法律之外运作，这意味着他们没有获得被称为“客户”的人的许可来同意他们的活动。

    - 相反，白帽拥有被称为“客户”的人的许可和授权，他们甚至将信息仅保留在客户和白帽之间。

    - 另一方面，灰帽则涉足两个领域，并在不同时期使用两种类型的行动。


    黑客行动主义者是我们之前没有提到的一类黑客。他们属于被称为黑客行动主义的运动，指的是黑客用来通过推动特定政治议程来影响公众的行动。到目前为止，黑客行动主义者已经与机构、大公司和政府打过交道。


    ## 黑客道德与行为准则


    与任何其他职业一样，黑客也有其行为准则，该准则制定了规则，可以帮助客户（个人或组织）评估与他们的网络和计算机系统交互的人是否通常可靠。实施该准则的组织已经被确定，被称为EC-Council。从EC-Council获得CEH认证意味着你完全理解你必须满足的期望。我们提供了一些准则的部分内容，因此请确保你阅读并熟悉它。


    - 你在专业工作中获得的信息应保密和私密（尤其是个人信息）

    - 除非你获得客户的许可，否则你不得给予、转让或出售客户的家庭地址、姓名或其他唯一识别信息。

    - 你必须保护知识产权，无论是你自己的还是他人的，通过使用你自己获得的技能，使所有利益都归于原始创作者。

    - 务必向授权人员披露你怀疑可能来自互联网社区、电子交易或其他硬件和软件指标的任何危险。

    - 确保你提供的服务在你的专业领域内，以便你在诚实工作的同时，意识到可能因你的教育或经验而产生的任何限制。

    - 你只能从事你有资格的项目，并执行与你的培训、教育和工作经验技能相匹配的任务。

    - 你不得故意使用非法获得或不道德存储的软件。

    - 你不得参与可能被视为误导性的财务行为，如重复计费、贿赂等。

    - 确保你正确使用客户的财产，不超出合同中设定的限制。

    - 你必须向所有相关方披露潜在的利益冲突，特别是如果该冲突无法避免。'
