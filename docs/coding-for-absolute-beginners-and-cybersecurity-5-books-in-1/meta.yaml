    # # Chapter 4. Dealing with Local vs. Global in Python


    Now we need to take a look at some of the different types of variables that you
    are able to work with when it is time to handle them in Python. The two main types
    of variables that we are going to work within this language will include the local
    variable and the global variable.


    There are some big differences that are going to show up when we are talking about
    these variables. To start with is the global variable. This is mainly going to
    mean that we are looking at a variable that the rest of the program, or any part
    of the program, is able to declare. It doesn’t matter where that part of the program
    is located; it will be able to use and rely on that global variable when it would
    like to.


    Sometimes this is a good thing and will allow your modules to declare the variables
    that they want, even when they are not near one another. But other times, this
    is going to cause some issues. If the wrong part of the code tries to declare
    some of the variables that it shouldn’t, it can cause the code to not behave the
    way that you want, and some of the variables are going to get declared at the
    wrong time. This is never a good thing, and it is going to require you to take
    some chances if you want to avoid this issue.


    The solution to this issue is going to be the local variables. These are the ones
    that can’t be accessed throughout the code. These are the variables that are only
    going to be declared in a specific method or function that you determine ahead
    of time. This will make sure that the variable is going to only be used in the
    manner that you would like, and nowhere else.'
