- md: "## Chapter 2 Basic Facilities\n\n## Array\n\nThe Array is a data structure\
    \ that holds a sequential collection of elements of the same data type.\n\nFor\
    \ example, in the code below I declared two arrays of different data type: an\
    \ array of characters and an array of integers.\n\n```cpp\n#include \"stdafx.h\"\
    \n#include <iostream>\n\nint main(int argc, char* argv[])\n{\n    int i;\n   \
    \ int length;\n    int sum = 0;\n    char char_array[10] = { 'p', 's', 'y', 'c',\
    \ 'h', 'o', 'l', 'o', 'g', 'y' };\n    // total number of bytes allocated for\
    \ that array\n    //one char is one byte: the number of elements = number of bytes\n\
    \    length = sizeof(char_array);\n    std::cout << \"Size of array of characters\
    \ is \" << length << std::endl;\n    for (i = 0; i<length; i++)\n    std::cout\
    \ << char_array[i];\n    std::cout << '\\n';\n    std::cout << '\\n';\n    std::cout\
    \ << '\\n';\n\n    int numbers[10] = { 1, 5, 9, 4, 2, 7, 6, 3, 8, 0 };\n    //the\
    \ total number of bytes allocated for that array.\n    length = sizeof(numbers);\n\
    \    std::cout << \"Size of numbers array=\" << length << std::endl;\n    //the\
    \ total number of bytes allocated for array/number of bytes allocated for one\
    \ element\n    length = sizeof(numbers) / sizeof(numbers[0]);\n    std::cout <<\
    \ \"Numbers of elements=\" << length << std::endl;\n    for (i = 0; i<length;\
    \ i++)\n    {\n        sum = sum + numbers[i];\n        std::cout << \"Sum of\
    \ numbers=\" << sum << std::endl;\n    }\n    int *p = numbers;\n    std::cout\
    \ << \"Address of the first element is \" << p << std::endl;\n    std::cout <<\
    \ \"The value in the address is \" << *p << std::endl;\n    p++; //move pointer\
    \ to the next element\n    std::cout << \"Address of the second element is \"\
    \ << p << std::endl;\n    std::cout << \"The value in the address is \" << *p\
    \ << std::endl;\n    int hold = 1;\n    std::cin >> hold;\n    return 0;\n}\n\
    ```\n\nThe function sizeof returns the number of bytes allocated for the array.\
    \ Since char data type occupies one byte, the number of bytes returned by the\
    \ sizeof function equals to the number of elements of the char array.\n\nThe integer\
    \ data type occupies 4 bytes in the memory, and an array of 10 integers is stored\
    \ in 40 bytes. As a result, the sizeof the array function returns 40 bytes for\
    \ the integer array of 10 elements.\n\nTo calculate how many elements are stored\
    \ in an array we can divide the number of bytes allocated for the whole array\
    \ by the number of bytes allocated to one element of the array;\n\n```cpp\nlength=sizeof(numbers)\
    \ / sizeof(numbers[0]);\n40 / 4 = 10\n```\n\nTo access the value of a single element,\
    \ we have to use the array index. The index of array in C++ starts from 0.\n\n\
    The index of the first element is 0, the index of the second element is 1, and\
    \ so on.\n\nTo access all elements of an array, we have to use for loop.\n\n```cpp\n\
    for(i=0; i<length; i++)\ncout<<char_array[i];\n```\n\nIf we declare a pointer\
    \ and assign the array to the pointer, the pointer will hold the address of the\
    \ first element of the array:\n\n```cpp\nint *p =numbers;\ncout<<\"Address of\
    \ the first element is \"<<p<<endl;\n```\n\nThe output of that line of code is:\n\
    \nAddress of the first element is 0059F710\n\nTo access the value stored in the\
    \ address of the first element of the array using the pointer, run the following\
    \ line of code:\n\n```cpp\ncout<<\"The value in the address is \"<<*p<<endl;\n\
    ```\n\nThe output of the code is:\n\nThe value in the address is 1.\n\nTo move\
    \ to the next element of the array, you have to increase p-value.\n\np++;\n\n\
    Now it will point to the second element of the array:\n\ncout<<\"Address of the\
    \ second element is \" <<p<<endl;\n\ncout<<\"The value in the address is\"<<*p<<endl;\n\
    \nThe output is:\n\nThe address of the second element of the numbers array on\
    \ my PC is 0059F714\n\nThe value in the address of the second element is 5.\n\n\
    ![](img/d5bcf187e3573f6b3164f4d4615fafd7_370_0.png)\n\nFigure The array program\
    \ output.\n\n## String\n\n### String functions\n\nI will show you how to use some\
    \ of the string functions.\n\nstrcpy_s () - copies the content of a string to\
    \ another.\n\nstrcat_s() - appends a copy of the source string to the destination\
    \ string.\n\nstrlen() - returns the length of a string.\n\nOur application will\
    \ read the string from user input, copy it to another string, then copy the original\
    \ string characters in the reverse sequence to the temporary string and concatenate\
    \ the copy and the reversed copy in one string.\n\nFor example, if user enters\
    \ string ‘Concatenation’ then the application will output\n\n‘ConcatenationnoitanetacnoC’\n\
    \nThe following header files must be included in the main.cpp file:\n\n```cpp\n\
    #include \"stdafx.h\"\n#include <stdio.h>\n#include <cctype>\n#include <iostream>\n\
    #include <cstring>\n```\n\nThe <cstring> header is needed for the string functions:\
    \ strcpy_s(), strcat_s() and strlen(). The cctype header file is needed for the\
    \ toupper() function.\n\nI want to explain how I copied characters from the original\
    \ string to a temporary string in reversed order.\n\nFirst, I got the length of\
    \ the original string, using the strlen() function.\n\n```cpp\nlength=strlen(aWord);\n\
    ```\n\nThen in the loop, I copied the last character of the original string to\
    \ the first place of the temporary string and so on.\n\nLet us examine the code\
    \ in the loop.\n\n```cpp\nfor(i=0; i <length; i++)\n```\n\n```cpp\ntemp[i]=aWord[length-(i+1)];\n\
    ```\n\nIf an user enters the word ‘Concatenation’ then the word length will be\
    \ 13. The index of the first character in a string is 0, then the index of the\
    \ last character of the string will be 12. It means that the index of the last\
    \ character is length -1.\n\nA line of code that I placed in the loop is\n\n```cpp\n\
    temp[i]=aWord[length-(i+1)];\n```\n\nWhen i =0, temp[i] will refer to the first\
    \ character of the temp string.\n\nAt the same time (when i =0) the aWord [length-(i+1)]\
    \ will refer to the aWord[13 – (0 + 1)] character and it will be aWord[12] that\
    \ is the last character of the ‘Concatenation’ string.\n\nWhen i=1, the temp [1]\
    \ will refer to the second character of the temp string and aWord [13-(1+1)] will\
    \ refer to the second from the end character of the ‘Concatenation’ string.\n\n\
    That way, we can copy all characters in reversed order.\n\nWhen we have copied\
    \ all the characters from the original string to the temp string, we need to add\
    \ null to the end of the temp string, because a string in C++ must be terminated\
    \ with null.\n\nThe line of code temp[length]='\\0'; will do the job.\n\nThe whole\
    \ code is included in [visual_studio_2017.zip](visual_studio_2017.zip).\n\n```cpp\n\
    #include \"stdafx.h\"\n#include <stdio.h>\n#include <cctype>\n#include <cstring>\n\
    #include <iostream>\n\nint main()\n{\n    char more = 'Y';\n    char prompt1[]\
    \ = \"\\nEnter a word not more than 20 characters and press enter.\\n\";\n   \
    \ char prompt3[] = \"\\nDo you want to continue? Y/N\\n\";\n    char aWord[20];\n\
    \    char aCopy[40];\n    int length = 0;\n    char temp[20];\n    int i;\n  \
    \  while (toupper(more) == 'Y')\n    {\n        std::cout << prompt1;\n      \
    \  std::cin >> aWord;\n        std::cout << \"aWord=\" << aWord << std::endl;\n\
    \        strcpy_s(aCopy, aWord);\n        std::cout << \"aCopy=\" << aCopy <<\
    \ std::endl;\n        length = strlen(aWord);\n        std::cout << \"length=\"\
    \ << length << std::endl;\n        //fill temp[] array with the word characters\
    \ in opposite order.\n        for (i = 0; i <length; i++)\n        temp[i] = aWord[length\
    \ - (i + 1)];\n        temp[length] = '\\0';\n        std::cout << \"Temp=\" <<\
    \ temp <<std::endl;\n        strcat_s(aCopy, temp);\n        std::cout << \"aCopy\
    \ after concatenation of temp=\" << aCopy << std::endl;\n        std::cout <<\
    \ prompt3;\n        std::cin >> more;\n    }\n    return 0;\n}\n```\n\nOutput:\n\
    \n![](img/d5bcf187e3573f6b3164f4d4615fafd7_375_0.png)\n\nFigure String manipulation.\n\
    \n## Lists\n\nLet us imagine a puzzle. You have a row of boxes. Each box contains\
    \ a card with one letter. You have to figure out the sequence of the letters,\
    \ so that the letters compose a word.\n\n| T | C | O | N | E | L | Y | G | O |\
    \ H |\n|---|---|---|---|---|---|---|---|---|---|\n| 5 | 10 | 6 | 3 | 2 | 9 | 1\
    \ | 7 | 8 | 4 |\n\n### Figure A linked list\n\nIn the table above, you can see\
    \ that each box has a number. You may guess that these numbers are the key to\
    \ the puzzle. The first box has a letter T inside and number 5 on the front side.\
    \ Take a card with the letter T and put it aside. The number 5 may point to the\
    \ next letter. Count boxes. The fifth box has the letter ‘E.’ Take the card with\
    \ the ‘E’ letter and place it next to T. You will get \"TE.\" The box with the\
    \ letter ‘E’ has number 2 on its side. So, take the card from the 2nd box and\
    \ place it next to \"TE.\" You will get \"TEC.\"\n\nThe box with the letter ‘C’\
    \ has the number 10, so take the card from the 10th box. You will get \"TECH.\"\
    \ The box with the letter ‘H’ has number 4, so take the card from the 4th box.\
    \ You got \"TECHN.\" Continue following the numbers, and you will get the whole\
    \ word: TECHNOLOGY.\n\nThat is how a linked list works. It is made of nodes. Each\
    \ node has at least one variable that holds data (a text or number or object)\
    \ and one variable (pointer) that holds the address of the next node. This system\
    \ walks through the node list as you did in the puzzle. The pointer of the last\
    \ node has null value, or it may point to the first node. Then we have a closed\
    \ linked list.\n\n### ADD A NODE\n\nIf you want to add a new node to the end of\
    \ the linked list, you have to create a new node. Then point the pointer of the\
    \ last node to the address of the new node and assign null to the new node pointer."
  mdcn: "## 第二章 基础设施\n\n## 数组\n\n数组是一种数据结构，用于存储相同数据类型元素的顺序集合。\n\n例如，在下面的代码中，我声明了两个不同数据类型的数组：一个字符数组和一个整数数组。\n\
    \n```cpp\n#include \"stdafx.h\"\n#include <iostream>\n\nint main(int argc, char*\
    \ argv[])\n{\n    int i;\n    int length;\n    int sum = 0;\n    char char_array[10]\
    \ = { 'p', 's', 'y', 'c', 'h', 'o', 'l', 'o', 'g', 'y' };\n    // 为该数组分配的总字节数\n\
    \    //一个字符占一个字节：元素数量 = 字节数\n    length = sizeof(char_array);\n    std::cout <<\
    \ \"Size of array of characters is \" << length << std::endl;\n    for (i = 0;\
    \ i<length; i++)\n    std::cout << char_array[i];\n    std::cout << '\\n';\n \
    \   std::cout << '\\n';\n    std::cout << '\\n';\n\n    int numbers[10] = { 1,\
    \ 5, 9, 4, 2, 7, 6, 3, 8, 0 };\n    //为该数组分配的总字节数。\n    length = sizeof(numbers);\n\
    \    std::cout << \"Size of numbers array=\" << length << std::endl;\n    //数组分配的总字节数\
    \ / 一个元素分配的字节数\n    length = sizeof(numbers) / sizeof(numbers[0]);\n    std::cout\
    \ << \"Numbers of elements=\" << length << std::endl;\n    for (i = 0; i<length;\
    \ i++)\n    {\n        sum = sum + numbers[i];\n        std::cout << \"Sum of\
    \ numbers=\" << sum << std::endl;\n    }\n    int *p = numbers;\n    std::cout\
    \ << \"Address of the first element is \" << p << std::endl;\n    std::cout <<\
    \ \"The value in the address is \" << *p << std::endl;\n    p++; //将指针移动到下一个元素\n\
    \    std::cout << \"Address of the second element is \" << p << std::endl;\n \
    \   std::cout << \"The value in the address is \" << *p << std::endl;\n    int\
    \ hold = 1;\n    std::cin >> hold;\n    return 0;\n}\n```\n\n`sizeof` 函数返回为数组分配的字节数。由于\
    \ `char` 数据类型占用一个字节，因此 `sizeof` 函数返回的字节数等于字符数组的元素数量。\n\n整数数据类型在内存中占用 4 个字节，一个包含\
    \ 10 个整数的数组存储在 40 个字节中。因此，对于包含 10 个元素的整数数组，`sizeof` 数组函数返回 40 个字节。\n\n要计算数组中存储了多少个元素，我们可以将为整个数组分配的字节数除以为数组的一个元素分配的字节数：\n\
    \n```cpp\nlength=sizeof(numbers) / sizeof(numbers[0]);\n40 / 4 = 10\n```\n\n要访问单个元素的值，我们必须使用数组索引。C++\
    \ 中数组的索引从 0 开始。\n\n第一个元素的索引是 0，第二个元素的索引是 1，依此类推。\n\n要访问数组的所有元素，我们必须使用 `for` 循环。\n\
    \n```cpp\nfor(i=0; i<length; i++)\ncout<<char_array[i];\n```\n\n如果我们声明一个指针并将数组赋值给该指针，该指针将保存数组第一个元素的地址：\n\
    \n```cpp\nint *p =numbers;\ncout<<\"Address of the first element is \"<<p<<endl;\n\
    ```\n\n该行代码的输出为：\n\nAddress of the first element is 0059F710\n\n要使用指针访问存储在数组第一个元素地址中的值，请运行以下代码行：\n\
    \n```cpp\ncout<<\"The value in the address is \"<<*p<<endl;\n```\n\n代码的输出为：\n\n\
    The value in the address is 1.\n\n要移动到数组的下一个元素，必须增加 `p` 的值。\n\np++;\n\n现在它将指向数组的第二个元素：\n\
    \ncout<<\"Address of the second element is \" <<p<<endl;\n\ncout<<\"The value\
    \ in the address is\"<<*p<<endl;\n\n输出为：\n\nThe address of the second element\
    \ of the numbers array on my PC is 0059F714\n\nThe value in the address of the\
    \ second element is 5.\n\n![](img/d5bcf187e3573f6b3164f4d4615fafd7_370_0.png)\n\
    \n图 数组程序输出。\n\n## 字符串\n\n### 字符串函数\n\n我将向您展示如何使用一些字符串函数。\n\nstrcpy_s() - 将一个字符串的内容复制到另一个字符串。\n\
    \nstrcat_s() - 将源字符串的副本附加到目标字符串。\n\nstrlen() - 返回字符串的长度。\n\n我们的应用程序将从用户输入中读取字符串，将其复制到另一个字符串，然后将原始字符串的字符按相反顺序复制到临时字符串中，并将副本和反转的副本连接成一个字符串。\n\
    \n例如，如果用户输入字符串 'Concatenation'，则应用程序将输出\n\n'ConcatenationnoitanetacnoC'\n\n必须在\
    \ main.cpp 文件中包含以下头文件：\n\n```cpp\n#include \"stdafx.h\"\n#include <stdio.h>\n\
    #include <cctype>\n#include <iostream>\n#include <cstring>\n```\n\n字符串函数 `strcpy_s()`、`strcat_s()`\
    \ 和 `strlen()` 需要 `<cstring>` 头文件。`toupper()` 函数需要 `cctype` 头文件。\n\n我想解释一下我是如何将字符从原始字符串按相反顺序复制到临时字符串的。\n\
    \n首先，我使用 `strlen()` 函数获取原始字符串的长度。\n\n```cpp\nlength=strlen(aWord);\n```\n\n然后在循环中，我将原始字符串的最后一个字符复制到临时字符串的第一个位置，依此类推。\n\
    \n让我们检查循环中的代码。\n\n```cpp\nfor(i=0; i <length; i++)\n```\n\n```cpp\ntemp[i]=aWord[length-(i+1)];\n\
    ```\n\n如果用户输入单词 'Concatenation'，则单词长度将为 13。字符串中第一个字符的索引是 0，那么字符串最后一个字符的索引将是 12。这意味着最后一个字符的索引是\
    \ length - 1。\n\n我在循环中放置的一行代码是\n\n```cpp\ntemp[i]=aWord[length-(i+1)];\n```\n\n\
    当 i = 0 时，`temp[i]` 将引用 `temp` 字符串的第一个字符。\n\n同时（当 i = 0 时），`aWord [length-(i+1)]`\
    \ 将引用 `aWord[13 – (0 + 1)]` 字符，它将是 `aWord[12]`，即 'Concatenation' 字符串的最后一个字符。\n\
    \n当 i=1 时，`temp [1]` 将引用 `temp` 字符串的第二个字符，而 `aWord [13-(1+1)]` 将引用 'Concatenation'\
    \ 字符串的倒数第二个字符。\n\n这样，我们就可以按相反顺序复制所有字符。\n\n当我们已经将所有字符从原始字符串复制到 `temp` 字符串后，我们需要在\
    \ `temp` 字符串的末尾添加 null，因为 C++ 中的字符串必须以 null 终止。\n\n代码行 `temp[length]='\\0';` 将完成这项工作。\n\
    \n整个代码包含在 [visual_studio_2017.zip](visual_studio_2017.zip) 中。\n\n```cpp\n#include\
    \ \"stdafx.h\"\n#include <stdio.h>\n#include <cctype>\n#include <cstring>\n#include\
    \ <iostream>\n\nint main()\n{\n    char more = 'Y';\n    char prompt1[] = \"\\\
    nEnter a word not more than 20 characters and press enter.\\n\";\n    char prompt3[]\
    \ = \"\\nDo you want to continue? Y/N\\n\";\n    char aWord[20];\n    char aCopy[40];\n\
    \    int length = 0;\n    char temp[20];\n    int i;\n    while (toupper(more)\
    \ == 'Y')\n    {\n        std::cout << prompt1;\n        std::cin >> aWord;\n\
    \        std::cout << \"aWord=\" << aWord << std::endl;\n        strcpy_s(aCopy,\
    \ aWord);\n        std::cout << \"aCopy=\" << aCopy << std::endl;\n        length\
    \ = strlen(aWord);\n        std::cout << \"length=\" << length << std::endl;\n\
    \        //用单词字符按相反顺序填充 temp[] 数组。\n        for (i = 0; i <length; i++)\n    \
    \    temp[i] = aWord[length - (i + 1)];\n        temp[length] = '\\0';\n     \
    \   std::cout << \"Temp=\" << temp <<std::endl;\n        strcat_s(aCopy, temp);\n\
    \        std::cout << \"aCopy after concatenation of temp=\" << aCopy << std::endl;\n\
    \        std::cout << prompt3;\n        std::cin >> more;\n    }\n    return 0;\n\
    }\n```\n\n输出：\n\n![](img/d5bcf187e3573f6b3164f4d4615fafd7_375_0.png)\n\n图 字符串操作。\n\
    \n## 链表\n\n让我们想象一个谜题。你有一排盒子。每个盒子里都有一张写有一个字母的卡片。你必须找出字母的顺序，以便这些字母组成一个单词。\n\n| T\
    \ | C | O | N | E | L | Y | G | O | H |\n|---|---|---|---|---|---|---|---|---|---|\n\
    | 5 | 10 | 6 | 3 | 2 | 9 | 1 | 7 | 8 | 4 |\n\n### 图 链表\n\n在上表中，你可以看到每个盒子都有一个数字。你可能猜到这些数字是解谜的关键。第一个盒子里有一个字母\
    \ T，正面有一个数字 5。拿一张写有字母 T 的卡片放在一边。数字 5 可能指向下一个字母。数盒子。第五个盒子里有字母 'E'。拿一张写有 'E' 的卡片放在\
    \ T 旁边。你会得到 \"TE\"。带有字母 'E' 的盒子侧面有数字 2。所以，从第 2 个盒子里拿卡片放在 \"TE\" 旁边。你会得到 \"TEC\"\
    。\n\n带有字母 'C' 的盒子有数字 10，所以从第 10 个盒子里拿卡片。你会得到 \"TECH\"。带有字母 'H' 的盒子有数字 4，所以从第 4\
    \ 个盒子里拿卡片。你得到了 \"TECHN\"。继续按照数字走，你会得到整个单词：TECHNOLOGY。\n\n这就是链表的工作原理。它由节点组成。每个节点至少有一个变量保存数据（文本、数字或对象）和一个变量（指针）保存下一个节点的地址。这个系统遍历节点列表，就像你在谜题中做的那样。最后一个节点的指针具有\
    \ null 值，或者它可能指向第一个节点。那么我们就有了一个封闭的链表。\n\n### 添加节点\n\n如果你想在链表的末尾添加一个新节点，你必须创建一个新节点。然后将最后一个节点的指针指向新节点的地址，并将新节点指针赋值为\
    \ null。"
