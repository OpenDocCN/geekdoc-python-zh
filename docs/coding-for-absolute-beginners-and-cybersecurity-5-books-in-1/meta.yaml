    \    }\n}\n```\n\n返回 1\n\n## 第6章 STL容器和迭代器\n\n### 容器\n\n容器是STL的主要贡献，用于存储和访问一系列对象。STL提供了不同类型的容器，如向量、列表、映射和哈希表。然而，根据数据排列的特性，STL容器被分为三大类：\n\
    \n1. 序列容器，如向量、固定大小数组、列表、前向列表和双端队列；\n2. 关联容器：\n   a) 有序（已排序）关联容器，如集合、多重集合、映射和多重映射；\n\
