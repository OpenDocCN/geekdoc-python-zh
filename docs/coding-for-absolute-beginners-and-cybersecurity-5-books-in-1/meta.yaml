    \ Hello World 的文件夹。\n  - 例如，将每个单词的首字母大写，并在每个单词之间加一个空格，就像 Hello World 项目一样。\n-\
    \ 在本书的帮助下，将 DIYJava.jar 添加到你创建的 Java 项目中。\n  - DIYJava.jar 是一个外部 JAR 文件。\n  -\
