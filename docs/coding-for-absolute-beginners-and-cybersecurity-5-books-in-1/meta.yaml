    # Chapter 5. Modules in Python


    ## What are the Modules?


    In Python, a module is a portion of a program (an extension file) that can be
    invoked through other programs without having to write them in every program used.
    Besides, they can define classes and variables. These modules contain related
    sentences between them and can be used at any time. The use of the modules is
    based on using a code (program body, functions, variables) already stored on it
    called import. With the use of the modules, it can be observed that Python allows
    simplifying the programs a lot because it allows us to simplify the problems into
    a smaller one to make the code shorter so that programmers do not get lost when
    looking for something in hundreds of coding lines when making codes.


    ## How to Create a Module?


    To create a module in Python, we don''t need a lot; it''s very simple.


    For example: if you want to create a module that prints a city, we write our code
    in the editor and save it as "mycity.py."


    Once this is done, we will know that this will be the name of our module (omitting
    the .py sentence), which will be assigned to the global variable __city__.


    But, beyond that, we can see that the file "mycity.py" is pretty simple and not
    complicated at all, since the only thing inside is a function called "print_city"
    which will have a string as a parameter, and what it will do is to print "Hello,
    welcome to," and this will concatenate with the string that was entered as a parameter.'
  mdcn: '局部变量是指在代码中，其声明语句之后的任何文本位置都不需要引用的变量。此外，我们必须记住，当我们在同一个代码块中时，绝不能有两个同名的变量。这样做会导致错误出现，并且基本上会混淆你正在编写的代码。然而，可以在一条语句中声明多个相同类型的局部变量，并对其进行初始化。


    在类的方法中，如果你发现一个局部变量的命名方式与其字段相似，你会发现该局部变量会隐藏该字段，同时仍然可以在方法内部访问它。通常，使用局部变量比使用字段更高效。


    ## 查看全局变量


    我们需要在这里了解的另一件事是全局变量是什么。这是一种我们将在任何函数之外声明的变量，这意味着你编写的程序中的所有函数都可以轻松访问它。一组这样的变量被称为全局环境或全局状态，因为当它们组合在一起时，它们将定义程序运行时程序或环境的各个方面。


    全局变量是在所有其他函数之上声明的变量，通常最好将其保持在最低限度。这是因为所有函数都能够在程序运行期间操作这些变量。对于大多数你想用这种语言处理的程序来说，这可能是危险的，因为它们有可能被意外更改，从而导致系统出现错误。


    顾名思义，全局变量是我们可以在全局范围内，或在整个程序中任何地方访问的变量。一旦我们完成声明它们的过程，这些变量将在程序运行期间一直保留在内存中。这意味着我们可以在程序运行时的任何时候，使用任何我们想要的函数来更改它们，这肯定会对整个程序造成一些问题。


    在计算机可以使用的早期，由于内存有限，全局变量被视为不良实践，因为它们会占用大量宝贵的信息和内存，而且程序员更容易失去对他们所处理的值的跟踪，尤其是在较长的程序中。基本上，它给程序带来了很多难以定位和修复的错误。


    当元素的作用域有限时，源代码总是更容易使用和理解。当我们使用全局变量时，这很难做到，因为它们不是局部的，而且很难弄清楚这些变量在哪里被更改，甚至最初更改它们的原因。


    即使有这种负面看法，当我们处理的函数之间没有所谓的调用者和被调用者关系时，这些全局变量仍然非常有价值。这意味着该函数不会有信号处理程序或任何类型的并发线程。除了那些在受保护内存中声明为只读值的全局变量外，代码需要确保它们能够部署适当的封装，以便在过程中被视为线程安全。


    正如我们在这里看到的，使用这种变量有一些好处，甚至也有一些缺点。使用它仍然有一些用途，这就是为什么我们花了一些时间来研究它们并弄清楚它们为什么重要，但在大多数情况下，局部变量更好，并且能让你编写的代码保持更多的控制。


    ## 综合运用


    一开始这可能看起来有点令人困惑，但好消息是，当需要处理这两种变量时，我们能够做很多事情。为了帮助我们更好地理解全局变量和局部变量在下面程序中的区别：


    1. 变量“f”将是一个具有全局作用域的变量，它将被赋值为101，并在输出中打印。

    2. 变量f也将在一个函数中声明，并具有局部作用域。它将被赋予一个值，在这种情况下，它将被赋值为“I am learning Python.”，然后作为输出打印出来。这个变量与我们之前尝试定义的全局变量f不同。

    3. 一旦我们调用该函数，局部变量f将被销毁。在第12行，当我们再次打印f的值时，它将显示全局变量f = 101。


    然后我们可以使用global关键字，这将确保我们能够在函数内部引用全局变量。我们可以遵循的一些事项包括：


    1. 变量“f”将具有全局作用域，然后它将被赋予值101，该值将作为输出打印。

    2. 当我们使用global关键字时，将声明同一个变量。这不是这里的局部变量，而是我们之前能够声明的同一个全局变量。这意味着当我们打印出该值时，我们将得到的输出是101。

    3. 然后我们更改了函数内部的‘f’值。一旦我们完成函数调用，变量“f”的更改值将保留。在第12行，当我们再次打印“f”的值时，我们将得到的值是“changing
    a global variable”。


    很多时候，你将能够使用全局变量和局部变量的概念。了解每种变量的工作方式，以及在需要时每种变量何时是最重要的部分。


    # 第5章 Python中的模块


    ## 什么是模块？


    在Python中，模块是程序的一部分（一个扩展文件），可以通过其他程序调用，而无需在每个使用的程序中编写它们。此外，它们可以定义类和变量。这些模块包含相互关联的语句，可以随时使用。模块的使用基于使用已经存储在其中的代码（程序主体、函数、变量），称为import。通过使用模块，可以观察到Python允许大大简化程序，因为它允许我们将问题简化为更小的问题，使代码更短，这样程序员在编写代码时就不会在数百行代码中迷失方向。


    ## 如何创建模块？


    在Python中创建模块，我们不需要很多东西；这非常简单。


    例如：如果你想创建一个打印城市的模块，我们在编辑器中编写代码并将其保存为“mycity.py”。


    完成后，我们将知道这将是我们的模块名称（省略.py语句），它将被分配给全局变量__city__。


    但是，除此之外，我们可以看到文件“mycity.py”非常简单，一点也不复杂，因为里面唯一的东西是一个名为“print_city”的函数，它将一个字符串作为参数，它的作用是打印“Hello,
    welcome to,”，然后与作为参数输入的字符串连接。'
