- md: '## Keywords


    In Java, the Boolean type refers to false or true values. Java finds out if it
    is true or false using the reserved keywords. Therefore, a Boolean expression
    type will assume one of these values.


    An example to demonstrate include:


    There are a few things to note about this program.


    First, the println(), displays a boolean value. Secondly, the boolean values control
    the flow of an if statement.


    You don’t need to go a long way in writing the boolean type this way: if (b ==
    true)


    The result shown by the operator, such as < is boolean. It is one of the reasons
    why we have the expression 11 > 8 showing the value true.


    In addition, the other pair of parentheses near the 11 > 8 is important since
    plus comes before the >.


    ## Identifiers


    The top layer of the diagram above is for the identifier or name.


    This top layer is the name you give to a class. The name should specifically identify
    and also describe the type of object as seen or experienced by the user.


    In simple terms, the name or identifier should identify the class.


    ## Operators


    Java has an extensive list of operator environment.


    If you are wondering what an operator is, you can look at it as a symbol that
    conveys a specific message to the compiler to carry out a logical or mathematical
    operation. In Java, you will interact with four classes of operators.


    The four classes include:


    - Logical operator

    - Bitwise operator

    - Relational operator

    - Arithmetic operator


    Like other computer languages, Java has a defined list of additional operators
    to take care of certain specific scenarios.


    When it comes to learning JAVA programming language, or any programming language
    for that matter, there are five basic concepts you must understand before you
    get started.


    These five basic concepts include:


    - Variables

    - Data Structures

    - Control Structures

    - Syntax

    - Tools


    Each of these concepts will be thoroughly explained on a beginner’s level to ensure
    that they are understood.


    ## Separators


    They are not suitable for high-level abstraction: note that a lot of these programs
    make use of low-level constructs which are primarily used for low-level abstraction.


    The usual approach with these programming languages is that they focus on the
    machine—how to make a computer do something rather than how these functions can
    help solve the issues of a user.


    These languages deal with the minute details, which is already beyond the scope
    of high-level abstraction, which is the more common approach that we see today.


    In low-level abstraction, data structures and algorithms are taken separately,
    whereas these are taken as a whole in high-level abstraction.


    ## Literals


    When it comes to literals in Java, we mean the fixed values which appear in the
    form in which human beings can read. We can say the number 200 is literal. Most
    of the time, literals can be constants.


    Literals are important in a program. In fact, most Java programs use literals.
    Some of the programs we have already discussed in this book use literals.


    Literals in Java can fall on various primitive data types.


    The manner in which every literal is shown is determined by its type. Like it
    was mentioned some time back, we enclose character constants in single quotes
    such as ‘c’ and ‘%.’


    We define literals in integers without involving the fractional part. For instance,
    12 and -30 are integer literals. A floating-point literal should contain the decimal
    point plus the fractional part. 12.389 is a floating literal.


    Java further permits for one to apply the scientific notation for the floating-point
    literals.


    Integer literals contain int value, and anyone can initialize them with a variable
    of short, byte, and char.


    ## Comments


    When this occurs, we call the grey’s comments. In the running stages of the program,
    the grey’s (comments) are moot.


    This is to means that you can use the comment feature to state or explain what
    the code you are creating wants to achieve.


    You can achieve this by typing two slashes and then the comment. Here is a sample.


    ```

    //Place your single line comment here

    ```


    You can have more than one comment line by doing either of the following:


    ```

    //We are going to

    //spread the comments into two

    ```


    Or


    ```

    /*

    This comment spreads over two lines

    */

    ```


    If you look at the comment above, you will notice that it starts with /* but ends
    with */


    Additionally, if you look at the previous image (figure 8, you will notice that
    there are comments that begin with a single forward slash and two asterisks (/**),
    but end with one asterisk and one forwards slash; this is called a Javadoc comment.


    ## Chapter 2 Variables


    ### What are variables?


    A variable, on the other hand, is an "object" that contains a specific data type
    and it''s assigned or received value. It is called a variable because the value
    contained can change according to how it is used in the code, how the coder can
    declare its value, or even how the user of the program chooses to interact with
    it. A variable, in short, is a storage unit for a data type. Having access to
    variables allow programmers to conveniently label and call stored values at hand.


    ## Types of variables in Java


    Java requires the programmer to use declaration statements, lines of code used
    to declare variables and define them by specifying the particular data type and
    name. Java has a specific way of treating variables, by defining variables as
    containers that contain a certain type and value of information, unlike some languages
    such as python, which only requires a declaration of a variable, and the variable
    can dynamically change its type; Java variables are static, which retain their
    type once declared.


    ```

    Int number = 20;

    Boolean completed = true;

    String hello = “Hello World!”

    ```


    The syntax in declaring is seen in the previous examples, with the type of the
    variable coming first, then the name of the variable, then the value. Note as
    well that the declaration statement can be composed of multiple declarations in
    one line, as in the following example:


    ```

    Int number = 20, Boolean completed = true, string hello = “Hello World!”;

    ```


    Java variables can be declared without any value at the start; in cases such as
    these, Java chooses to declare these variables with a particular default value,
    for example:


    ```

    Byte a;

    Short num;

    Boolean answer;

    ```


    Will result in the values 0, 0, and false, respectively. A more complete list
    of default values is as follows: the byte, short, int, and long data types will
    all result in a default value of 0, while the float and double data types will
    have a default 0.0 value, the char data type will result in ‘\u0000’ value, a
    string or any other object will have a null default value, and all Booleans will
    begin with a false default value.


    In Java, variables are static when declared, meaning that the programmer must
    define the data type that the variable will be containing. To illustrate, if we
    wish to use a variable num to store a number, we would first have to declare the
    variable: "int num," before we can assign a value, such as "num = 10."


    The process above is usually known as and referred to as an "assignment statement,"
    where a value is assigned to the variable as declared by the programmer. However,
    one prominent thing about how Java, and in fact how most programming languages,
    works is that in the assignment statement, such as in our example of num = 10,
    the actual value stored is the one on the right side of the equals sign, the value
    of 10, and num is just the "marker" to call that stored value. This is why there
    are many Java programmers that tend to prefer the jargon of "getting" a value
    rather than "assigning," though for the most part, they may be employed interchangeably,
    and outside of some rare scenario, function mostly the same way.


    Note, however, that once values have been assigned to variables, functions need
    to be carried out in order for the data inside that variable to change its data
    type.'
