- md: '## Securing Mobile Devices


    This chapter will explain the security risks mobile devices face and how to better
    protect your data on mobile phones or tablets.


    ### Security risks


    There are three main security risks for mobile devices: physical theft, internet
    theft, and application permissions.


    ### Physical theft


    The physical theft of a device can allow a person to access the device and snoop
    through all personal information that was stored. That could be anything from
    passwords, text messages, photos, emails, and so on.


    ### Internet theft


    This applies to any data stolen or seen while browsing the internet on a mobile
    device, whether it’s on a wireless network or a mobile carrier service.


    ### Application permissions


    This is probably the biggest security threat to mobile device owners for one simple
    reason. People do not read what permissions an application has when downloading
    the app. Business Insider published a recent study which found that in 2017, 90%
    of consumers accepted legal terms and conditions without reading through them.
    This is where the security risks come into play.


    ### The basics


    Listed below are six methods that can be used to better protect mobile device
    security. These are up-to-date operating systems, app privileges, geo-tracking
    awareness, lock screens, Wi-Fi or Bluetooth safety, and internet browsing.


    ### Operating systems


    An operating system is the basis of a mobile device that manages all networks
    and software. For example, Apple uses iOS, while Android uses Android OS. Maintaining
    up-to-date software for all types of mobile operating systems aid in keeping a
    mobile device safer. As the developers of these operating systems learn of security
    flaws, they are patched, and an update is sent out worldwide. This is one of the
    easiest methods to protect yourself from upcoming malicious software or security
    weaknesses.


    ### Applications


    We all love apps, whether they come from the Apple Store or the Google Play Store,
    but what most people do not know is the information these apps can access via
    a user’s mobile phone. Most people never bother to read the fine print when they
    are downloading the new Candy Crush game or when they’re updating their Instagram
    app. Therefore, phones are incredibly easy targets for hackers.


    Many applications request far too much data from a phone, which may not even be
    related to the app’s actual purpose. For example, in Candy Crush’s license agreement
    under section 10, it clearly states that the developers may use any personal data
    collected in any way that follows their privacy policy. They also go on to state
    that if users link their account to a social media site, they will use all personal
    data available from those sites as well to identify the user.


    ### Geo-tracking


    Most mobile device users have absolutely no idea how frequently their locations
    are being pinged and stored in a company’s servers. Many free applications available
    for download in the Apple Store or Google Play Store are not actually free. There
    is a growing trend among app developers to collect your location using your phone
    or tablet’s GPS system, this is known as geo-tracking. This information is gathered
    in huge quantities and is bought by large business entities who utilize this data
    to study and accurately predict consumer behavior.


    Advertisers are always looking for new ways to capture your attention so that
    you will buy their product. If an app developer collects GPS locations from an
    individual on a daily basis, he or she could look at it and say, “Wow, this person
    seems to drive by a certain store every day.” This app developer then takes this
    information and sells it to the store that the individual in question drives by
    every day so that the individual can be targeted with advertisements. These advertisements
    could come in the form of emails or spam text messages. How can these stores know
    how to direct ads at specific individuals? The answer to this is that more than
    just the individual’s location data can be used for marketing. This app developer
    could have permissions that he or she will gain access to the phone’s personal
    information like contacts, emails, etc. This allows the app developer to not only
    sell an individual’s daily transit routes, as well as the information needed for
    advertisers to reach them specifically.


    ### Passwords


    This is one of the easiest methods to protecting data on a mobile phone. A simple
    lock screen password can prevent someone from gaining access to your phone or
    tablet if it is stolen. Think about all the applications, text messages, emails,
    and photos that are on a person’s phone or tablet. Then think about someone being
    able to access all that information without even needing a password.


    ### Wi-Fi safety


    To avoid hackers seeing information sent from a user’s mobile device, the user
    needs to be careful when using Wi-Fi. According to Lawyers’ Professional Indemnity
    Company (LAWPRO), here are some tips on how you can do this:


    - First and foremost, only use wireless networks that are known and trusted. Avoid
    public wireless networks altogether, if possible. Public networks are usually
    not secure, making it easy for someone on the same network to pick up the information
    you sent.

    - If using a public network is a must, login to a Virtual Private Network (VPN)
    to secure the data you are transmitting. A VPN works by sending encrypted data
    through a tunnel that is safe from being accessed by anyone on the same network.

    - Make sure the network being used is running some form of WPA encryption. Most
    home company networks run WPA2 encryption, unlike public networks which have no
    security at all.

    - If you’re connected to a network that isn’t your own, make sure that the device
    sharing settings are turned off to avoid unknown devices from connecting with
    yours. This creates a link between devices designed to share data easier. However,
    this is also an effortless way for a hacker to connect to the user’s device.


    ### Bluetooth safety


    - Most Bluetooth capable devices are shipped by the manufacturer in unprotected
    mode. Also known as ‘discovery mode.’ This mode allows the device to be seen by
    others, making it easier to connect with.

    - If you are not using your Bluetooth, make sure to turn it off to avoid any connections
    to other unwanted devices. Turning your Bluetooth off when it’s not in use eliminates
    all chances of an attacker’s device connecting to yours.

    - If possible, change your device settings, so it requires user confirmation before
    it pairs with another device. This eliminates the possibility of another device
    secretly connecting.

    - Do not connect to unknown devices. Only pair with devices that are known and
    trusted.


    A Service Set Identifier (SSID) refers to the computer language for the name of
    a wireless network. For example, the University of Arizona’s wireless network
    is known as ‘UAWifi.’ It is important to change the name of a personal network
    from the default, as hackers may target a wireless network with a default name,
    thinking it is less secure. To further improve security, SSID broadcasting can
    be turned off. This means that the network will not be visible to outsiders. It
    will still be there, and if the specific SSID is searched for, it can be found.
    However, anyone scanning for a network to connect to won’t be able to see this
    hidden network. This is especially useful when you have neighbors who are trying
    to gain access to your personal network.


    ## Media Access Control


    Media Access Control (MAC) is a set of numbers used to identify a specific device.
    Every device, whether it’s a computer, tablet, or phone has a unique MAC address.
    To better protect a network, the router can be set to only allow specific MAC
    addresses to connect to that network. This adds another layer of security to your
    network by only permitting specific devices to connect. While this is a useful
    security feature, it is important to at least mention that there are software
    programs available that allow hackers to fake MAC addresses, allowing them to
    pretend to be the same device that’s on your network.


    The last tip we have for securing a router is the most effective method of keeping
    personal networks secure, turn the router off. If you’re going on vacation or
    you simply won’t be using their network for an extended period, turning off the
    router is the best way to avoid hackers from getting into the network. They cannot
    access something that is not powered on and transmitting data.'
  mdcn: '## 保护移动设备


    本章将解释移动设备面临的安全风险，以及如何更好地保护手机或平板电脑上的数据。


    ### 安全风险


    移动设备主要面临三种安全风险：物理盗窃、网络盗窃和应用程序权限。


    ### 物理盗窃


    设备的物理盗窃可能使他人能够访问设备并窥探其中存储的所有个人信息。这可能包括密码、短信、照片、电子邮件等等。


    ### 网络盗窃


    这适用于在移动设备上浏览互联网时被窃取或看到的任何数据，无论是在无线网络还是移动运营商服务上。


    ### 应用程序权限


    这可能是移动设备所有者面临的最大安全威胁，原因很简单。人们在下载应用程序时不会阅读该应用拥有哪些权限。Business Insider 最近发表的一项研究发现，2017年，90%的消费者在未阅读的情况下就接受了法律条款和条件。这就是安全风险所在。


    ### 基础知识


    以下列出了六种可用于更好地保护移动设备安全的方法。它们是：保持操作系统最新、应用程序权限、地理定位感知、锁屏、Wi-Fi 或蓝牙安全以及互联网浏览。


    ### 操作系统


    操作系统是移动设备的基础，管理所有网络和软件。例如，苹果使用 iOS，而安卓使用 Android OS。为所有类型的移动操作系统保持软件更新有助于使移动设备更安全。当这些操作系统的开发者发现安全漏洞时，会进行修补，并向全球发送更新。这是保护自己免受即将到来的恶意软件或安全漏洞侵害的最简单方法之一。


    ### 应用程序


    我们都喜欢应用程序，无论它们来自 Apple Store 还是 Google Play Store，但大多数人不知道的是，这些应用程序可以通过用户的手机访问哪些信息。大多数人在下载新的
    Candy Crush 游戏或更新 Instagram 应用时，从不费心阅读细则。因此，手机成为黑客极其容易的目标。


    许多应用程序从手机请求的数据过多，这些数据甚至可能与应用程序的实际目的无关。例如，在 Candy Crush 的许可协议第 10 节中，明确规定开发者可以按照其隐私政策以任何方式使用收集的任何个人数据。他们还进一步声明，如果用户将其帐户链接到社交媒体网站，他们也将使用这些网站上所有可用的个人数据来识别用户。


    ### 地理定位


    大多数移动设备用户完全不知道他们的位置被多么频繁地定位并存储在公司的服务器中。在 Apple Store 或 Google Play Store 中可供下载的许多免费应用程序实际上并非免费。应用程序开发者中存在一种日益增长的趋势，即使用手机或平板电脑的
    GPS 系统收集您的位置信息，这被称为地理定位。这些信息被大量收集，并被大型商业实体购买，他们利用这些数据来研究和准确预测消费者行为。


    广告商总是在寻找新的方法来吸引您的注意力，以便您购买他们的产品。如果一个应用程序开发者每天收集一个人的 GPS 位置，他或她可能会看着它说：“哇，这个人似乎每天都开车经过某家商店。”然后，这个应用程序开发者将此信息出售给那个人每天经过的商店，以便该个人可以被定向投放广告。这些广告可能以电子邮件或垃圾短信的形式出现。这些商店如何知道如何向特定个人投放广告？答案是，不仅仅是个体的位置数据可用于营销。这个应用程序开发者可能拥有权限，可以访问手机的个人信息，如联系人、电子邮件等。这使得应用程序开发者不仅可以出售个人的日常出行路线，还可以出售广告商专门联系他们所需的信息。


    ### 密码


    这是保护手机上数据最简单的方法之一。简单的锁屏密码可以防止他人在手机或平板电脑被盗时访问您的设备。想想一个人手机或平板电脑上的所有应用程序、短信、电子邮件和照片。然后想想有人甚至不需要密码就能访问所有这些信息。


    ### Wi-Fi 安全


    为避免黑客看到从用户移动设备发送的信息，用户在使用 Wi-Fi 时需要小心。根据 Lawyers'' Professional Indemnity Company
    (LAWPRO)，以下是一些操作提示：


    -   首先，只使用已知且受信任的无线网络。如果可能，完全避免使用公共无线网络。公共网络通常不安全，使得同一网络上的某人很容易截获您发送的信息。

    -   如果必须使用公共网络，请登录虚拟专用网络 (VPN) 以保护您传输的数据。VPN 通过一个安全的隧道发送加密数据，该隧道不会被同一网络上的任何人访问。

    -   确保所使用的网络运行某种形式的 WPA 加密。大多数家庭或公司网络运行 WPA2 加密，而公共网络则完全没有安全性。

    -   如果您连接到非您自己的网络，请确保设备共享设置已关闭，以避免未知设备与您的设备连接。这会在设备之间创建一个旨在更轻松共享数据的链接。然而，这也是黑客连接到用户设备的一种简单方式。


    ### 蓝牙安全


    -   大多数具有蓝牙功能的设备在出厂时处于未保护模式，也称为“发现模式”。此模式允许设备被他人看到，使其更容易连接。

    -   如果您不使用蓝牙，请确保将其关闭，以避免与任何其他不需要的设备建立连接。在不使用时关闭蓝牙可以消除攻击者设备连接到您的设备的所有可能性。

    -   如果可能，更改您的设备设置，使其在与另一设备配对之前需要用户确认。这消除了另一设备秘密连接的可能性。

    -   不要连接到未知设备。只与已知且受信任的设备配对。


    服务集标识符 (SSID) 指的是无线网络名称的计算机语言。例如，亚利桑那大学的无线网络被称为“UAWifi”。将个人网络的名称从默认值更改非常重要，因为黑客可能会针对具有默认名称的无线网络，认为其安全性较低。为了进一步提高安全性，可以关闭
    SSID 广播。这意味着网络对外部人员将不可见。它仍然存在，如果搜索特定的 SSID，可以找到它。但是，任何扫描网络进行连接的人都将无法看到这个隐藏的网络。当您有邻居试图访问您的个人网络时，这尤其有用。


    ## 媒体访问控制


    媒体访问控制 (MAC) 是一组用于识别特定设备的数字。每个设备，无论是计算机、平板电脑还是手机，都有一个唯一的 MAC 地址。为了更好地保护网络，可以将路由器设置为仅允许特定的
    MAC 地址连接到该网络。这通过仅允许特定设备连接，为您的网络增加了另一层安全性。虽然这是一个有用的安全功能，但至少需要提及的是，存在一些软件程序允许黑客伪造
    MAC 地址，使他们能够假装成您网络上的同一设备。


    我们关于保护路由器的最后一个提示是保持个人网络安全最有效的方法：关闭路由器。如果您要去度假或者只是长时间不使用网络，关闭路由器是避免黑客入侵网络的最佳方式。他们无法访问未通电且未传输数据的东西。'
