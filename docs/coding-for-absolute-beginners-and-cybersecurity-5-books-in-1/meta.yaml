  md: '# Chapter 1. Common Terms and Their Definition


    Coding: Converting a problem into code, or a string of symbols and language that
    a computer can process.


    HTML: Hypertext markup language, or how the information on your site is presented
    to users. HTML is used for formatting text, pictures, links, video, and audio.


    JavaScript: A programming language used for web development makes it easier to
    build interactive websites and add effects like scrolling boxes and drop-down
    menus. JavaScript allows you to create more dynamic pages that work faster than
    the static pages produced from pure HTML can achieve.

    Node.js: A JavaScript framework that allows you to build powerful real-time applications
    using an event-driven and non-blocking I/O model.

    jQuery: A JavaScript library that simplifies HTML document traversing, event handling,
    animating, and Ajax interactions for rapid web development.

    Responsive Design: Making a website adapt its design to different screen sizes
    (smartphones, tablets, laptops, etc.) without affecting the layout or functionality
    of the website.

    Test-Driven Development: Automated software testing method or framework based
    on creating test cases from an incomplete specification. It asserts that developers
    should specify code before writing it.

    Basic words used in coding.


    +   1. Abbreviation: Shortened form of text or a group of words. Everyday use
    is to give organizations a short and memorable name so that people can remember
    them easily. It is also used as an informal way to express complicated concepts
    or ideas by using only some part of the whole world, which helps save time when
    reading the abbreviation and typing it. For example, "Max" in "Maxwell" can also
    be used to describe a variable in math formulas, and similarly, "X1000" may be
    describing a million (1000x) rather than being an actual number (1x1000).'
  merge: -1
  pgno: 16
- img_proc: true
  md: '+   2. Accessibility: The ease of accessing content on a website or other media.
    Many different aspects make up a website''s accessibility, including design, content,
    and technology.


    +   3. API: Application programming interface. A set of routines, protocols, and
    tools for building software applications


    +   4. Cache: Temporary storage available on the web browser of your computer
    or mobile device that stores data in a faster or more efficient manner than it
    is retrieved from the site itself. It allows the browser to load websites more
    quickly by storing commonly accessed web page elements like text, graphics, and
    sounds. Caching also enables users to access online information even if there
    is no Internet connection available at the time.


    +   4. Challenge-response authentication: A type of security protocol where a
    user is first challenged to provide some information about them and then presented
    with a response calculated on that original information that they must enter or
    re-enter to proceed.


    +   5. Character encoding: The mechanism for representing textual data by converting
    it into a sequence of (usually) 8-bit characters using an alphabet and/or character
    set.


    +   6. Command line: In computing, command lines are a text-based way to communicate
    with a computer''s operating system, programs, and applications through typed
    commands. It is mainly used for programming or performing simple tasks like compiling
    code or opening programs on the command line instead of using the mouse or graphical
    interfaces.


    +   7. Configuration: The process of identifying and defining settings that a
    device communicates with when operating.


    +   8. CYA: (Also known as CAPS) Courtesy, yet another acronym meant all the above.
    It is often used in user interface design.


    +   9. Contextual Accessibility: The ease by which a person can gain access to
    content on a website or other media, given its current context (location,'
  merge: -1
  pgno: 17
- img_proc: true
  md: 'time, task). Contextual accessibility is about recognizing the context in which
    people are using technology at any given moment of their lives while they''re
    online and using it to meet their needs appropriately—according to their current
    needs and interests.


    10. Digital Divide: The gap between individuals, households and communities that
    have access to the internet and the digital resources available online, and those
    that does not.


    11. Encoding: The method in which information is converted into strings of symbols
    can be transmitted, stored or processed by a computer. A common example of encoding
    is ASCII, representing text as a sequence of numbers ranging from 0 to 255.


    12. File Extension: The suffix at the end of a file name after the period/dot
    symbol (ex: .html). It identifies what type of file it is like .html for HTML
    files.


    13. Globalization: The process of adapting content (including, but not limited
    to, information and software) from one language and cultural context to another.


    15. Hyperlink: A type of reference (a link) between two or more locations on the
    same site. Usually, a hyperlink will open either a new window or new tab in a
    web browser that reads the referenced text or image at that location.


    15. Internet Explorer: A series of graphical user interface (GUI) web browsers
    developed by Microsoft for Windows systems that support HTML 4 and CSS 2 selectors
    and ActiveX controls.


    16. Internet search engine: A form of web search that does not directly retrieve
    text data from a specific source but instead searches the entire World Wide Web
    for documents that contain the relevant keywords and returns those that are most
    likely to include this information.'
  merge: -1
  pgno: 18
- img_proc: true
  md: '17. JavaScript: A programming language designed by Netscape and first released
    in 1995. It is an object-oriented scripting language that can be embedded into
    client-side web pages or as standalone programs, which creates interactive experiences
    on the client-side of the browser.


    18. Java: (JavaScript) is a programming language that enables developers to write
    dynamic web pages and applications and run them inside a browser.


    19. Macro: Computer code that is executed automatically when some other code is
    triggered by the user by using hotkeys in a word processing program or by pressing
    a button on a mouse. Some macro features come built into certain operating systems
    (e.g., Microsoft Office, Apple iTunes, Mac OS X). In computer aided design (CAD)
    software, macros are used to automate repetitive tasks in the software so that
    fewer mouse movements or keystrokes are required.'
  merge: -1
