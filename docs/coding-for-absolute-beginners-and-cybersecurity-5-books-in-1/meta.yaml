    \ number to a text.\n\nLine 5 to 7: Change text to a number.\n\nLine 9 to end:\
    \ C language method. In line 12, you can see \"*s\", it means input will be ignored.\
    \ So str = Yan, i = 41."
  mdcn: "## 输入模式\n\n- 在条件/循环语句的外部测试流，然后在内部进行读写操作，这种做法是不妥的。因为读取操作可能会使流失效。通常更好的做法是将读取作为测试的一部分。\n\
    \n```\nwhile(!cin.fail()) { // 这是不良的编程风格\n    cin>>i; // 这里可能使流失效。\n    .....\
    \ // 然后 i 就不是有效值了\n}\n```\n\n- 如果你只是想输入，不想处理 EOF 或 failbit，可以使用以下方式：\n\n```\n\
    while(scanf(\"%d\",&i) != 1)\nwhile((int c = getchar())!=EOF)\nwhile( fgets(line,\
    \ sizeof(line), fp) != NULL )\n// 在 C 语言中，使用这些方式退出循环！\nwhile(cin>>input)\nwhile(cin.get(p,\
    \ 20) )\nwhile(getline(ifstream, string)) {\n    // 在 C++ 语言中，使用布尔运算符退出循环。\n \
    \   // 执行一些有用的操作。 // 输入正确。\n}\n```\n\n- 如果你想知道 EOF 或处理错误，可以使用下面的代码。当你按下回车键时，读取会结束。当你输入字母时，它会丢弃这个字母，直到你输入数字。\n\
    \n```\nwhile(true) // 使用 break 退出循环；\n{\n    cin>>i// 或 getline(ifstream, string);\n\
    \    if(cin.eof()){ // 如果是 EOF\n        cout<<\"遇到 EOF\"<<endl;\n        //break;\n\
    \    }\n    if(cin.fail()) // 处理无效输入\n    {\n        cin.clear(); // 重要。清除状态和缓冲区\n\
    \        while(cin.get()!='\\n') // 丢弃行中剩余部分，\n            continue ;\n      \
    \  cout<<\"请输入一个数字\"<<endl;\n        continue;\n    }\n    ... // 输入正确。执行一些有用的操作。\n\
    }\n```\n\n- 在前面的例子中，为什么我们需要区分 EOF 和 fail？当 fail 发生时，缓冲区中可能有无效字符。清除缓冲区后，我可以继续从输入缓冲区读取输入。三种清除缓冲区中无效字符的方法。\n\
    \n```\ncin.clear(); // 重要。清除状态和缓冲区\n\nwhile(cin.get()!='\\n')\n    continue ;\
    \ // 方法 1\n\nwhile(!isspace(cin.get()))\n    continue; // 方法 2\n\nbasic_istream&\
    \ ignore(streamsize _Count = 1, int_type _Delim = traits_type::eof()); // 方法 3\n\
    \ncin.ignore(5, 'a');\n\ncin.ignore(numeric_limits<streamsize>::max(), '\\n');\n\
    ```\n\n- 你可以使用 istream_iterator，它可以省去你判断 EOF 的一些麻烦。\n\n```\nclass A{\nprivate:\n\
    \    int x,y;\n    friend istream& operator>>(istream& in, A&);\n    friend ostream&\
    \ operator<<(ostream& out, const A&);\n};\nistream& operator>>(istream& in, A&\
    \ a){\n    in>>a.x>>a.y;\n    return in;\n}\nostream& operator<<(ostream& out,\
    \ const A& a){\n    out<<a.x<< \" \" <<a.y;\n    return out;\n}\nvector<A> v;\n\
    copy(istream_iterator<A>(cin), istream_iterator<A>(),\n     back_inserter(v));\n\
    copy(v.begin(), v.end(),ostream_iterator<A>(cout, \"\\n\"));\n```\n\n- 总之，最好只使用判断来退出循环。如果你需要针对\
    \ EOF 或错误采取不同的具体操作，可以使用 while(true)，然后在 C++ 和 C 中使用 eof()、feof()、fail() 或 clear()\
    \ 函数来处理并跳出循环。\n\n- 对于 cout，它可以自动识别类型，并且是可扩展的，你可以重定义 << 运算符，以便 cout 能识别你的数据类型。\n\
    \n```\nclass Foo{\n    friend ostream & operator<<(ostream& s,const Foo &r);\n\
    };\nostream & operator<<(ostream& s, const Foo &r){\n    s<<Foo.a<<Foo.b<<endl;\n\
    }\n```\n\n- 如何在 C 和 C++ 中打印指针地址？\n\n```\nchar* amount = \"dozen\";\n\ncout<< amount\
    \ ; // 打印 \"dozen\" 字符串\n\ncout<<(void*) amount;// 打印指针的地址\n\nprintf(\"%p\", (void*)\
    \ p);\n```\n\n- 格式是输出的关键。你需要了解常见的操纵符来控制输出格式。\n- 数字进制操纵符：hex、oct 和 dec；字段宽度：Width、fill、precision、Setf()\n\
    - 你不需要了解细节，只需知道它们的名字。当你想使用它们时，去参考网站查找。详细的格式操纵符可以在 C++ Primer 第 1090 页看到。你需要包含\
