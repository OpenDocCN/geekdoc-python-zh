    ## Chapter 5. Understanding the Structure of a Program


    This part of the book aims to get you quickly started on the basics of coding,
    teaching you the first step: understanding the structure of a program.


    ### The Program Structure


    In our example, we have a program that simply prints hello and goodbye. The syntax
    tells us that we create two different functions with their data and logic for
    each. It is often referred to as procedural programming because it has separate
    procedures which can be executed at any time in any order.


    ### Introduction to Programming Variables


    As mentioned above, every programming language has its own set of rules and quirks,
    but they all share one thing in common: variables.


    ### Variable Data Types


    The data types define how values are stored within a variable. In our example
    above, the variables used are integer and string. Each represents specific values
    or bit sequences of bits. The int represents integers, while the string represents
    text. In addition to the data type, each variable contains a value of its own
    and can be changed by the programmer when run through the computer''s compiler.
    As an example:


    ```

    1.23 + 4.56 = 5.79

    ```


    When you add 1.23 and 4.56, you get 5.79, but instead of storing it as 5.79, we
    store it in a variable. It would be like having 1 dollar on hand and saying, "I
    have one dollar," except you''ll say "$1" instead of "one dollar." Please note
    that every programming language has its jargon for variables such as int or string
    or float and so on.


    We will go into more detail when we learn how to manipulate variables in our following
    tutorial.


    ### Understanding the Structure of a Program: Subroutine Function


    Our example above is known as procedural programming because it has separate procedures
    which can be executed at any time in any order. In this example, we have the primary
    function, which is executed first. This is the beginning of our program, and in
    programming jargon, it''s known as the primary procedure. The program can call
    upon a series of subroutines (functions) that will then be executed at any time.
    Each process has its values and logic that can be used by it or with other functions.


    ### Commands & Logic


    We use commands to direct the interpreter (computer) on how to execute our program.
    Commands are the exact instructions you''re telling your program to manage. Some
    common commands used in programming are print, input, if, else and while.


    In addition to instructions, logic is also used. Logic tells the computer to execute
    a specific command based on certain conditions. For example, the if statement
    allows us to check certain conditions and instruct the interpreter (computer)
    to perform one or more actions.


    ### Understanding the Structure of a Program: Data Assessor


    In our example, we have a main function that can call upon a series of subroutines.
    These are called data assessors as they answer the question, "what is this variable?"
    A data assessor is like an entry point to your program that helps you respond
    to this variable. For each variable in your program, there needs to be one and
    only one data accessor for that variable. If you create two or more variables
    with their own separate data accessors, your program will not run correctly.


    ### Programming Quirks and Tips


    There are a few quirks to keep in mind as you start programming. For example,
    if you want to create a program that asks the user for their name, don''t put
    the user''s name in quotes. This is because every single variable has to start
    with a letter or an underscore ( _ ). So "Alice" will not work as it will be interpreted
    as a string literal, not a variable. If you need to ask the user for their name,
    you should use a variable name like "username." The underscore character ( _ )
    is used to separate different variables from one another, so they are not mixed
    up. There is also something called scope. This is a fundamental concept that you
    probably already know. The scope allows our program to know what variables are
    defined in the program and where they are defined. Their position determines this,
    so the first variable on any line of code is called the local scope and can be
    accessed without needing to write out the name of that variable. But if you start
    to print out variables outside of your subroutines, you will need to write out
    their names.


    ### Programming Terminology


    Classes, Objects, Variables, and Functions.


    The object-oriented programming methodology creates a more structured and orderly
    way to store data within your computer programs. Object-oriented programming is
    based on what we learn in high school and college, but is used differently in
    the real world. This methodology creates classes of objects that are designed
    to be similar to the real world objects.


    A class is a way of organizing your program into different groups with similar
    values, similar methods or actions (functions), and similar properties. A class
    is derived from a set of values that are known as attributes. The attributes can
    be anything from numbers to strings or built-in variables such as location, size,
    speed, time, etc... In our program above, we have one class called main, which
    has one attribute called EXE. That is, the EXE variable is defined in the program.


    By creating a class, we can make objects that inherit this class. For example,
    in our program, we created a class called "Main," which inherits from the "Main"
    class. We can then create an object called main using this class (it will be called
    main).'
