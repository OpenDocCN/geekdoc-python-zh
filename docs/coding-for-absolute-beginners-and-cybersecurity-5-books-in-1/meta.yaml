- md: "## Chapter 5 Advanced Basics\n\n## Pointers\n\nPointers have been mentioned\
    \ previously, and they are the memory address of a variable, this is much like\
    \ a house address for a person. These can be passed around a parameter and allow\
    \ the effects of passing by reference mentioned previously.\n\nThe program below\
    \ will show the address of a variable:\n\n```c\n#include <stdio.h>\n\nint main()\n\
    {\n    int var;\n    printf(\"The address is: %x\\n\", &var);\n    return 0;\n\
    }\n```\n\nOutput:\n\n> The address is: 10ffa2c\n\nNote: This will be different\
    \ almost every time you run.\n\nNote the highlighted statement, the ‘&’ (Reference\
    \ Operator) is used to return the memory location of the variable and allows certain\
    \ statements to access the data in that location. The ‘%x’ is used because a memory\
    \ location is in hexadecimal.\n\nTo create a pointer, we use the dereferencing\
    \ operator (*), this will create a pointer variable that is designed to hold a\
    \ memory locations address. Below is a program that creates a pointer and uses\
    \ reference operator (&) to store another regular variable’s address in the newly\
    \ created pointer. The dereferencing operator (*) is also used to access or change\
    \ the actual data in that memory location.\n\n- Dereferencing operator (*) is\
    \ used to create a pointer, it is also used when changing the actual value.\n\
    - Referencing operator (&) is used when obtaining the memory location of a pointer.\n\
    \n```c\n//Regular variable\nint var = 10;\n\n//Pointer\nint* pointer;\n\n//Storing\
    \ of var memory location\npointer = &var;\n\n//Pointer is now effectively 'var'\
    \ so\n//things like this can happen\n*pointer = 20;\nprintf(\"Var's value is now:\
    \ %d\", var);\n```\n\nOutput:\n> Var's value is now: 20\n\n## NULL pointers\n\n\
    When you create a pointer, it is initially not given anything to point at, this\
    \ is dangerous because the pointer when created it references random memory, and\
    \ changing this data in the memory location can crash the program. To prevent\
    \ this, when we create a pointer we assign it to NULL like so:\n\n```c\nint* pointer\
    \ = NULL;\n```\n\nThis means the pointer has an address of ‘0’, this is a reserved\
    \ memory location to identify a null pointer. A null pointer can be checked by\
    \ an if statement:\n\n```c\nif (pointer) {}\n```\n\nThis will succeed if the pointer\
    \ isn’t null.\n\n## Using pointers\n\nNow some real-world uses of pointers are\
    \ passing them as parameters and effectively passing them by reference. The example\
    \ below will show the effect:\n\n```c\nvoid Change_Value(int* reference)\n{\n\
    \    //Changes the value in the memory location\n    *reference = 20;\n}\n\nint\
    \ main()\n{\n    //Creates pointer to variable\n    int var = 10;\n    int* pointer\
    \ = &var;\n    printf(\"The value before call: %d\\n\", var);\n    //Method call\n\
    \    Change_Value(pointer);\n    //Prints new value\n    printf(\"The value after\
    \ call: %d\\n\", var);\n    return 0;\n}\n```\n\nOutput:\n\n> The value before\
    \ call: 10\n\n> The value after call: 20\n\nThis passes the memory location, not\
    \ the value of the variable, meaning you have the location where you can make\
    \ changes.\n\nNote the parameter is int* this is the pointer type, so for an example\
    \ of a pointer to a char would be char*.\n\n## Pointer Arithmetic\n\nThere are\
    \ times when moving a pointer along to another memory location might be useful;\
    \ this is where pointer arithmetic comes into use. If we were to execute say ptr++\
    \ and the ptr was an integer pointer it would now move 4bytes (Size of an int)\
    \ along, and we were to run it again, another 4bytes etc. This can mean pointer\
    \ (if pointing to valid array structures) can act much like an array can. An example\
    \ is below:\n\n```c\nint arrayInt[] = { 10, 20, 30 };\nsize_t arrayInt_Size =\
    \ 3;\n\n//Will point to the first array index\nint* ptr = &arrayInt;\n\nfor (int\
    \ i = 0; i < arrayInt_Size; i++)\n{\n    //Remember, *ptr gets the value in the\
    \ memory location\n    printf(\"Value of arrayInt[%d] = %d\\n\", i, *ptr);\n \
    \   ptr++;\n}\n```\n\nOutput:\n> Value of arrayInt[0] = 10\n> Value of arrayInt[1]\
    \ = 20\n> Value of arrayInt[2] = 30\n\nThis shows that a pointer to the first\
    \ address of the array can be incremented along the addresses of the array (Remember\
    \ each value of an array is stored in neighbouring memory locations).\n\nYou can\
    \ do the opposite and decrement a pointer i.e. make the pointers value decrease.\n\
    \nThere is also way to compare pointers using relational operators such as ==,\
    \ < and >. The most common use for this is checking if two pointer point to the\
    \ same location:\n\n```c\nint value;\n\n//Assigns ptr1 and ptr2 the same value\n\
    int* ptr1 = &value;\nint* ptr2 = &value;\n\n//ptr3 is assigned another value\n\
    int* ptr3 = NULL;\n\nif (ptr1 == ptr2)\n{\n    printf(\"ptr1 and ptr2 are equal!\\\
    n\");\n}\n\nif (!ptr1 == ptr3)\n{\n    printf(\"ptr1 is not equal to ptr3\\n\"\
    );\n}\n```\n\nThis checks if the various pointers are equal. The same can be done\
    \ with > and <.\n\n## Function pointers\n\nMuch like you can do with variables,\
    \ you can also do the same with functions; below is a snippet of code that shows\
    \ a function pointer being defined. Key sections will be highlighted:\n\n```c\n\
    void printAddition(int value1, int value2)\n{\n    int result = value1 + value2;\n\
    \    printf(\"The result is: %d\", result);\n}\n\nint main()\n{\n    //Function\
    \ pointer definition\n    //<returnType>(*<Name>)(<Parameters>)\n    void(*functionPtr)(int,\
    \ int);\n    functionPtr = &printAddition;\n\n    //Invoking call to pointer function\n\
    \    (*functionPtr)(100, 200);\n    return 0;\n}\n```\n\nThe basic structure for\
    \ defining a function pointer is like so:\n\n```\n<Return_Type> (*<Name>) (<Parameters>)\n\
    ```\n\nWhere in this case:\n\n```\n<Return_Type> = void\n<Name> = functionPtr\n\
    <Parameters> = int, int\n```\n\nThis function pointer can now be passed as a parameter\
    \ and used in situations where you would want to change the behaviour of code\
    \ but with almost the same code.\n\nAn example could be dynamically choosing what\
    \ operation a calculator should perform (Note: this is complex code and should\
    \ be used a rough example, so don’t worry if you don’t fully understand):\n\n\
    ```c\nvoid calculator(int value1, int value2, int(*opp)(int,int))\n{\n    int\
    \ result = (*opp)(value1, value2);\n    printf(\"The result from the operation:\
    \ %d\\n\", result);\n}\n\n//Adds two values\nint add(int num1, int num2)\n{\n\
    \    return num1 + num2;\n}\n\n//Subtracts two values\nint sub(int num1, int num2)\n\
    {\n    return num1 - num2;\n}\n\nint main()\n{\n    calculator(10, 20, &add);\n\
    \    calculator(10, 20, &sub);\n    return 0;\n}\n```\n\nHere what is happening\
    \ we are passing the function ‘add’ and ‘sub’ as parameters for the function calculator,\
    \ as you see from the highlight the function parameter is defined like it is above\
    \ with the return type, name and parameters being defined, all that is passed\
    \ into calculator is &add and &sub for the function pointers. The calculator function\
    \ then goes on to invoke the pointer and passes in the values and returns the\
    \ result.\n\n## Storage Classifications\n\nIn C each variable can be given a storage\
    \ class that can define certain characteristics.\n\nThe classes are:\n\n- Automatic\
    \ variables\n- Static variables\n- Register variables\n- External variables\n\n\
    ## Automatic variables\n\nEvery variable we have defined so far has been an automatic\
    \ variable; they are created when a function is called and automatically destroyed\
    \ when a function exits. These variables are also known as local variables.\n\n\
    ```c\nauto int value;\n\n// Is the same as\n\nint value;\n```\n\n## Static variables\n\
    \nStatic is used when you want to keep the variable from being destroyed when\
    \ it goes out of scope; this variable will persist until the program is complete.\
    \ The static variable is created only once throughout the lifetime of the program.\
    \ Below is an example of a static variable in use:\n\n```c\nvoid tick()\n{\n \
    \   //This will run once\n    static int count = 0;\n    count++;\n    printf(\"\
    The count is now: %d\\n\", count);\n}\n\nint main()\n{\n    tick();\n    tick();\n\
    \    tick();\n}\n```\n\nOutput:\n> The count is now: 1\n> The count is now: 2\n\
    > The count is now: 3\n\nThe area highlighted section is the static definition\
    \ and will only run once.\n\n## Register variables\n\nThe register is used to\
    \ define a variable that is to be stored in register memory opposed to regular\
    \ memory, the benefits register memory has is it is much much quicker to access;\
    \ however, there is only space for a few variables.\n\nDefining a register variable\
    \ is done like so:\n\n```c\nregister int value;\n```\n\n## External variable"
  mdcn: "## 第五章 高级基础\n\n## 指针\n\n指针之前已经提及，它们是变量的内存地址，这很像一个人的房屋地址。这些地址可以作为参数传递，并允许实现前面提到的按引用传递的效果。\n\
    \n下面的程序将显示一个变量的地址：\n\n```c\n#include <stdio.h>\n\nint main()\n{\n    int var;\n\
    \    printf(\"The address is: %x\\n\", &var);\n    return 0;\n}\n```\n\n输出：\n\n\
    > The address is: 10ffa2c\n\n注意：每次运行时，这个地址几乎都会不同。\n\n注意高亮显示的语句，`&`（取地址运算符）用于返回变量的内存位置，并允许某些语句访问该位置的数据。使用`%x`是因为内存位置是以十六进制表示的。\n\
    \n要创建一个指针，我们使用解引用运算符（`*`），这将创建一个旨在保存内存地址的指针变量。下面是一个程序，它创建一个指针，并使用取地址运算符（`&`）将另一个普通变量的地址存储在新创建的指针中。解引用运算符（`*`）也用于访问或更改该内存位置中的实际数据。\n\
    \n- 解引用运算符（`*`）用于创建指针，也用于更改实际值。\n- 取地址运算符（`&`）用于获取指针的内存位置。\n\n```c\n//普通变量\nint\
    \ var = 10;\n\n//指针\nint* pointer;\n\n//存储 var 的内存位置\npointer = &var;\n\n//指针现在实际上就是\
    \ 'var'，所以\n//可以发生这样的事情\n*pointer = 20;\nprintf(\"Var's value is now: %d\", var);\n\
    ```\n\n输出：\n> Var's value is now: 20\n\n## NULL 指针\n\n当你创建一个指针时，它最初没有指向任何东西，这是危险的，因为指针在创建时引用的是随机内存，更改该内存位置的数据可能会导致程序崩溃。为了防止这种情况，我们在创建指针时将其赋值为\
    \ NULL，如下所示：\n\n```c\nint* pointer = NULL;\n```\n\n这意味着指针的地址为‘0’，这是一个保留的内存位置，用于标识空指针。空指针可以通过\
    \ if 语句来检查：\n\n```c\nif (pointer) {}\n```\n\n如果指针不为空，此语句将成功执行。\n\n## 使用指针\n\n\
    现在，指针的一些实际用途是将它们作为参数传递，并有效地按引用传递它们。下面的示例将展示其效果：\n\n```c\nvoid Change_Value(int*\
    \ reference)\n{\n    //更改内存位置中的值\n    *reference = 20;\n}\n\nint main()\n{\n \
    \   //创建指向变量的指针\n    int var = 10;\n    int* pointer = &var;\n    printf(\"The\
    \ value before call: %d\\n\", var);\n    //方法调用\n    Change_Value(pointer);\n\
    \    //打印新值\n    printf(\"The value after call: %d\\n\", var);\n    return 0;\n\
    }\n```\n\n输出：\n\n> The value before call: 10\n\n> The value after call: 20\n\n\
    这传递的是内存位置，而不是变量的值，这意味着你拥有了可以进行更改的位置。\n\n注意参数是 `int*`，这是指针类型，因此，例如指向 `char` 的指针将是\
    \ `char*`。\n\n## 指针算术\n\n有时，将指针移动到另一个内存位置可能很有用；这就是指针算术的用武之地。如果我们执行 `ptr++`，并且\
    \ `ptr` 是一个整型指针，那么它现在将向前移动 4 字节（`int` 的大小），如果我们再次运行它，又会移动 4 字节，依此类推。这意味着指针（如果指向有效的数组结构）可以像数组一样发挥作用。下面是一个例子：\n\
    \n```c\nint arrayInt[] = { 10, 20, 30 };\nsize_t arrayInt_Size = 3;\n\n//将指向第一个数组索引\n\
    int* ptr = &arrayInt;\n\nfor (int i = 0; i < arrayInt_Size; i++)\n{\n    //记住，*ptr\
    \ 获取内存位置中的值\n    printf(\"Value of arrayInt[%d] = %d\\n\", i, *ptr);\n    ptr++;\n\
    }\n```\n\n输出：\n> Value of arrayInt[0] = 10\n> Value of arrayInt[1] = 20\n> Value\
    \ of arrayInt[2] = 30\n\n这表明，指向数组第一个地址的指针可以沿着数组的地址递增（记住，数组的每个值都存储在相邻的内存位置中）。\n\
    \n你也可以做相反的操作，即递减指针，也就是减小指针的值。\n\n还可以使用关系运算符（如 `==`、`<` 和 `>`）来比较指针。最常见的用途是检查两个指针是否指向同一个位置：\n\
    \n```c\nint value;\n\n//将 ptr1 和 ptr2 赋值为相同的值\nint* ptr1 = &value;\nint* ptr2\
    \ = &value;\n\n//ptr3 被赋值为另一个值\nint* ptr3 = NULL;\n\nif (ptr1 == ptr2)\n{\n  \
    \  printf(\"ptr1 and ptr2 are equal!\\n\");\n}\n\nif (!ptr1 == ptr3)\n{\n    printf(\"\
    ptr1 is not equal to ptr3\\n\");\n}\n```\n\n这检查了各个指针是否相等。同样可以使用 `>` 和 `<` 进行比较。\n\
    \n## 函数指针\n\n就像你可以对变量做的那样，你也可以对函数做同样的事情；下面是一段代码片段，展示了如何定义一个函数指针。关键部分将被高亮显示：\n\n\
    ```c\nvoid printAddition(int value1, int value2)\n{\n    int result = value1 +\
    \ value2;\n    printf(\"The result is: %d\", result);\n}\n\nint main()\n{\n  \
    \  //函数指针定义\n    //<返回类型>(*<名称>)(<参数>)\n    void(*functionPtr)(int, int);\n  \
    \  functionPtr = &printAddition;\n\n    //调用指针函数\n    (*functionPtr)(100, 200);\n\
    \    return 0;\n}\n```\n\n定义函数指针的基本结构如下：\n\n```\n<返回类型> (*<名称>) (<参数>)\n```\n\n\
    在本例中：\n\n```\n<返回类型> = void\n<名称> = functionPtr\n<参数> = int, int\n```\n\n这个函数指针现在可以作为参数传递，并在你想要改变代码行为但使用几乎相同代码的情况下使用。\n\
    \n一个例子可以是动态选择计算器应该执行的操作（注意：这是复杂的代码，应作为粗略示例，所以如果你不完全理解，请不要担心）：\n\n```c\nvoid calculator(int\
    \ value1, int value2, int(*opp)(int,int))\n{\n    int result = (*opp)(value1,\
    \ value2);\n    printf(\"The result from the operation: %d\\n\", result);\n}\n\
    \n//将两个值相加\nint add(int num1, int num2)\n{\n    return num1 + num2;\n}\n\n//将两个值相减\n\
    int sub(int num1, int num2)\n{\n    return num1 - num2;\n}\n\nint main()\n{\n\
    \    calculator(10, 20, &add);\n    calculator(10, 20, &sub);\n    return 0;\n\
    }\n```\n\n这里发生的是，我们将函数 `add` 和 `sub` 作为参数传递给 `calculator` 函数，正如你从高亮部分看到的，函数参数的定义方式与上面相同，定义了返回类型、名称和参数，传递给\
    \ `calculator` 的只是函数指针 `&add` 和 `&sub`。然后 `calculator` 函数继续调用该指针，传入值并返回结果。\n\n\
    ## 存储分类\n\n在 C 语言中，每个变量都可以被赋予一个存储类，该类可以定义某些特性。\n\n这些类包括：\n\n- 自动变量\n- 静态变量\n-\
    \ 寄存器变量\n- 外部变量\n\n## 自动变量\n\n到目前为止我们定义的每个变量都是自动变量；它们在函数被调用时创建，在函数退出时自动销毁。这些变量也称为局部变量。\n\
    \n```c\nauto int value;\n\n// 等同于\n\nint value;\n```\n\n## 静态变量\n\n当你希望变量在超出作用域时不被销毁时，使用\
    \ `static`；这个变量将一直持续到程序结束。静态变量在程序的整个生命周期中只创建一次。下面是一个静态变量使用的例子：\n\n```c\nvoid tick()\n\
    {\n    //这将只运行一次\n    static int count = 0;\n    count++;\n    printf(\"The count\
    \ is now: %d\\n\", count);\n}\n\nint main()\n{\n    tick();\n    tick();\n   \
    \ tick();\n}\n```\n\n输出：\n> The count is now: 1\n> The count is now: 2\n> The\
    \ count is now: 3\n\n高亮部分是静态定义，只会运行一次。\n\n## 寄存器变量\n\n`register` 用于定义一个存储在寄存器内存中而不是常规内存中的变量，寄存器内存的好处是访问速度要快得多；然而，只有空间容纳少数几个变量。\n\
    \n定义寄存器变量的方法如下：\n\n```c\nregister int value;\n```\n\n## 外部变量"
