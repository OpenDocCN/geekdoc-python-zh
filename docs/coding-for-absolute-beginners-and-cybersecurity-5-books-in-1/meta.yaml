    # # Dictionaries


    The dictionaries constitute a third central structure to develop in Python. They
    allow key-value storage. So far, we have used items based on numerical indexing.
    So in a list, you access an element using its position list1 [0]. In a dictionary,
    we will access an element using a key defined when creating the dictionary. We
    define a dictionary with braces:


    ```

    dict1 = {"cle1": value1, "cle2": value2, "cle3": value3}

    ```


    This structure does not require any homogeneity of type in the values. From this,
    we can have a list like value1, a boolean like value2, and an integer a value3.


    To access an element of a dictionary, we use:


    ```

    In []: dict1 ["cle2"]

    Out []: value2

    ```


    To display all the keys of a dictionary, we use:


    ```

    In []: dict1.keys

    Out []: ("cle1," "cle2," "cle3")

    ```


    To display all the values of a dictionary, we use:


    ```

    In []: dict1.items ()

    Out []: (value1, value2, value3)

    ```


    One can easily modify or add a key to a dictionary:


    ```

    In []: dict1 ["key4"] = value4

    ```


    You can also delete a key (and the associated value) in a dictionary:


    ```

    In []: del dict1 ["cle4"]

    ```'
- md: "As soon as you are more experienced in Python, you will use more dictionaries.\
    \ At first, we tend to favor lists over dictionaries because they are often more\
    \ intuitive (with numerical indexing). However, more expert Pythonists will quickly\
    \ realize the usefulness of dictionaries. In particular, we will be able to store\
    \ the data as well as the parameters of a model in a very simple way. Plus, the\
    \ flexibility of Python's for loop adapts very well to dictionaries and makes\
    \ them very effective when they are well built.\n\n## Programming\n\n### The Conditions\n\
    \nA condition in Python is very simple to implement; it is a keyword. As mentioned\
    \ before, the Python language is based on the indentation of your code. We will\
    \ use an offset for this indentation with four spaces. Fortunately, tools like\
    \ Spyder or Jupyter notebooks will automatically generate this indentation.\n\n\
    Here is our first condition, which means \"if a is true, then display it is true\"\
    :\n\n```\nif a is True:\n    print(\"it's true\")\n```\n\nThere is no exit from\
    \ the condition; it is the indentation that will allow to manage it. Generally,\
    \ we are also interested in the complement of this condition; we will use else\
    \ for that:\n\n```\nif a is True:\n    print(\"it's true\")\nelse:\n    print(\"\
    it's not true\")\n```\n\nWe can have another case if our variable a is not necessarily\
    \ a boolean, we use elif:\n\n```\nif a is True:\n    print(\"it's true\")\nelif\
    \ a is False:\n    print(\"it's wrong\")\nelse:\n    print(\"it's not a boolean\"\
    )\n```\n\n### The Loops\n\nLoops are central elements of most programming languages.\
    \ Python does not break this rule. However, you must be very careful with an interpreted\
    \ language such as Python. Indeed, the treatment of loops is slow in Python, and\
    \ we will use it in loops with few iterations. We avoid creating a loop repeating\
    \ itself thousands of times on the lines of an array of data. However, we can\
    \ use a loop on the columns of a data table to a few dozen columns.\n\n### The\
    \ for loop\n\nThe Python loop has a somewhat specific format; it is a loop on\
    \ the elements of a structure. We will write:\n\n```\nfor elem in [1, 2]:\n  \
    \  print(elem)\n```\n\nThis piece of code will allow you to display 1 and 2. So\
    \ the iterator of the loop (elem in our case) thus takes the values of the elements\
    \ of the structure in the second position (after the in). These elements may be\
    \ in different structures, but lists will generally be preferred.\n\n#### Range,\
    \ zip and enumerate functions\n\nThese three functions are very useful functions,\
    \ they make it possible to create specific objects that may be useful in your\
    \ code for your loops. The range() function is used to generate a sequence of\
    \ numbers, starting from a given number or 0 by default and up to a number not\
    \ included:\n\n```\nIn []: print(list(range(5)))\n[0, 1, 2, 3, 4]\nIn []: print(list(range(2,5)))\n\
    [2, 3, 4]\nIn []: print(list(range(2,15,2)))\n[2, 4, 6, 8, 10, 12, 14]\n```\n\n\
    We see here that the created range object can be easily transformed into a list\
    \ with the list().\n\nIn a loop, this gives:\n\n```\nfor i in range(11):\n   \
    \ print(i)\n```\n\nThe zip and enumerate functions are also useful functions in\
    \ loops and they use lists.\n\nThe enumerate() function returns the index and\
    \ the element of a list. If we take our list of countries used earlier:\n\n```\n\
    In []: for i, a in enumerate(country_list):\n    print(i, a)\n```\n\n1. Swiss\n\
    2. Spain\n3. France\n4. United States\n5. India\n6. China\n\nThe zip function\
    \ will allow linking many lists and simultaneously iterating elements of these\
    \ lists.\n\nIf, for example, we want to simultaneously increment days and weather,\
    \ we may use:\n\n```\nIn []: for day, weather in zip([\"Monday\", \"Tuesday\"\
    ], [\"beautiful\", \"bad\"]):\n    print(\"%s, it will be %s\" % (day.capitalize(),\
    \ weather))\n```\n\nMonday, it will be beautiful\nTuesday, it will be bad\n\n\
    In this code, we use zip() to take a pair of values at each iteration. The second\
    \ part is a manipulation of the character strings. If one of the lists is longer\
    \ than the other, the loop will stop as soon as it arrives at the end of one of\
    \ them.\n\nWe can link enumerate and zip in one code, for example:\n\n```\nIn\
    \ []: for i, (day, weather) in enumerate(zip([\"Monday\", \"Tuesday\"],\n[\"good\"\
    , \"bad\"])):\n    print(\"%i: %s, it will be %s\" % (i, day.capitalize(), weather))\n\
    ```\n\n0: Monday, it will be good\n1: Tuesday, it will be bad\n\nWe see here that\
    \ i is the position of the element i.\n\nNote—Replace in a string.\n\n### While\
    \ loop\n\nPython also allows you to use a while() loop that is less used and looks\
    \ a lot like the while loop that we can cross in other languages. To exit this\
    \ loop, we can use a break with a condition. Warning, we must increment the index\
    \ in the loop, at the risk of being in a case of an infinite loop.\n\nWe can have:\n\
    \n```\ni = 1\n\nwhile i < 100:\n    i += 1\n    if i > val_stop:\n        break\n\
    \    print(i)\n```\n\nThis code adds one to i to each loop and stops when i reaches\
    \ either val_stop, that is 100.\n\nNote—The incrementation in Python can take\
    \ several forms i = i + 1 or i += 1.\n\nBoth approaches are equivalent in terms\
    \ of performance; it's about choosing the one that suits you best.\n\n## Chapter\
    \ 4. Dealing with Local vs. Global in Python\n\nNow we need to take a look at\
    \ some of the different types of variables that you are able to work with when\
    \ it is time to handle them in Python. The two main types of variables that we\
    \ are going to work within this language will include the local variable and the\
    \ global variable.\n\nThere are some big differences that are going to show up\
    \ when we are talking about these variables. To start with is the global variable.\
    \ This is mainly going to mean that we are looking at a variable that the rest\
    \ of the program, or any part of the program, is able to declare. It doesn’t matter\
    \ where that part of the program is located; it will be able to use and rely on\
    \ that global variable when it would like to.\n\nSometimes this is a good thing\
    \ and will allow your modules to declare the variables that they want, even when\
    \ they are not near one another. But other times, this is going to cause some\
    \ issues. If the wrong part of the code tries to declare some of the variables\
    \ that it shouldn’t, it can cause the code to not behave the way that you want,\
    \ and some of the variables are going to get declared at the wrong time. This\
    \ is never a good thing, and it is going to require you to take some chances if\
    \ you want to avoid this issue.\n\nThe solution to this issue is going to be the\
    \ local variables. These are the ones that can’t be accessed throughout the code.\
    \ These are the variables that are only going to be declared in a specific method\
    \ or function that you determine ahead of time. This will make sure that the variable\
    \ is going to only be used in the manner that you would like, and nowhere else.\n\
    \n### The Local Variable\n\nThe first option that we are going to take some time\
    \ to look at is the local variable. This is going to be similar to what we will\
    \ see with a local variable in other languages, and it is going to be the one\
    \ that is declared at the beginning of the block that the variable is supposed\
    \ to be local to at that time. It can also show up when we are working with a\
    \ statement, a switch statement, and more depending on your needs.\n\nThe local\
    \ variable is going to have a declaration with it that can explicitly define the\
    \ type of the variable that has been declared along with some of the identifiers\
    \ that will name out the variable at the same time. We will recognize the local\
    \ variable as a type of variable that we are able to use where the scope and the\
    \ extent of the variable are within the method or the statement block in which\
    \ it is declared.\n\nWe are able to use these local variables more like an iteration\
    \ variable in the foreach statement, the exception variable in the specific catch\
    \ clause, and the resource variable when we are doing the using statement. It\
    \ can also be used as a type of constant whose value can’t be modified within\
    \ the method or the statement block in which we declare it.\n\nA local variable\
    \ that is implicitly typed whose type is going to be inferred by the computer\
    \ from the expression on its right is going to be useful when you would like to\
    \ deal with the language-integrated queries. These are going to be the types of\
    \ queries that will return to us some anonymous types in creating a custom type\
    \ for each of the sets of results that you have.\n\nThe memory allocation that\
    \ you are going to find with this kind of a variable is often going to be based\
    \ on the type of variable that you are working with. If you are working with something\
    \ like an integer or a structure, then the entirety of the contents will be stored\
    \ in a stack. But if you are using a reference type of variable, it is going to\
    \ be placed in the reference portion of the stack, and the contents will be in\
    \ the heap that goes with it."
  mdcn: "一旦你在Python方面更有经验，你就会更多地使用字典。起初，我们倾向于使用列表而不是字典，因为它们通常更直观（使用数字索引）。然而，更有经验的Python开发者会很快意识到字典的实用性。特别是，我们将能够以一种非常简单的方式存储数据以及模型的参数。此外，Python的for循环的灵活性非常适合字典，并且在构建良好时使它们非常有效。\n\
    \n## 编程\n\n### 条件语句\n\nPython中的条件语句实现起来非常简单；它是一个关键字。如前所述，Python语言基于代码的缩进。我们将使用四个空格作为此缩进的偏移量。幸运的是，像Spyder或Jupyter\
    \ notebooks这样的工具会自动生成这种缩进。\n\n这是我们的第一个条件语句，意思是“如果a为真，那么显示它为真”：\n\n```\nif a is\
    \ True:\n    print(\"it's true\")\n```\n\n条件语句没有退出；是缩进来管理它的。通常，我们也对这个条件的补集感兴趣；我们将为此使用else：\n\
    \n```\nif a is True:\n    print(\"it's true\")\nelse:\n    print(\"it's not true\"\
    )\n```\n\n如果我们的变量a不一定是布尔值，我们可以有另一种情况，我们使用elif：\n\n```\nif a is True:\n    print(\"\
    it's true\")\nelif a is False:\n    print(\"it's wrong\")\nelse:\n    print(\"\
    it's not a boolean\")\n```\n\n### 循环\n\n循环是大多数编程语言的核心元素。Python也不例外。然而，对于像Python这样的解释型语言，你必须非常小心。实际上，Python中循环的处理速度较慢，我们将在迭代次数较少的循环中使用它。我们避免创建一个在数据数组的行上重复数千次的循环。然而，我们可以对数据表的列使用循环，列数在几十列以内。\n\
    \n### for循环\n\nPython循环有一种稍微特定的格式；它是对结构元素的循环。我们将这样写：\n\n```\nfor elem in [1, 2]:\n\
    \    print(elem)\n```\n\n这段代码将允许你显示1和2。因此，循环的迭代器（在我们的例子中是elem）取第二个位置（在in之后）的结构元素的值。这些元素可能在不同的结构中，但通常首选列表。\n\
    \n#### range、zip和enumerate函数\n\n这三个函数是非常有用的函数，它们允许创建特定的对象，这些对象可能在你的代码中用于你的循环。range()函数用于生成一个数字序列，从给定的数字或默认的0开始，直到一个不包含的数字：\n\
    \n```\nIn []: print(list(range(5)))\n[0, 1, 2, 3, 4]\nIn []: print(list(range(2,5)))\n\
    [2, 3, 4]\nIn []: print(list(range(2,15,2)))\n[2, 4, 6, 8, 10, 12, 14]\n```\n\n\
    我们在这里看到，创建的range对象可以很容易地用list()转换成列表。\n\n在循环中，这给出：\n\n```\nfor i in range(11):\n\
    \    print(i)\n```\n\nzip和enumerate函数也是循环中有用的函数，它们使用列表。\n\nenumerate()函数返回列表的索引和元素。如果我们使用之前使用的国家列表：\n\
    \n```\nIn []: for i, a in enumerate(country_list):\n    print(i, a)\n```\n\n1.\
    \ Swiss\n2. Spain\n3. France\n4. United States\n5. India\n6. China\n\nzip函数将允许链接多个列表并同时迭代这些列表的元素。\n\
    \n例如，如果我们想同时增加天数和天气，我们可以使用：\n\n```\nIn []: for day, weather in zip([\"Monday\"\
    , \"Tuesday\"], [\"beautiful\", \"bad\"]):\n    print(\"%s, it will be %s\" %\
    \ (day.capitalize(), weather))\n```\n\nMonday, it will be beautiful\nTuesday,\
    \ it will be bad\n\n在这段代码中，我们使用zip()在每次迭代中取一对值。第二部分是字符串操作。如果其中一个列表比另一个长，循环将在到达其中一个列表的末尾时停止。\n\
    \n我们可以在一个代码中链接enumerate和zip，例如：\n\n```\nIn []: for i, (day, weather) in enumerate(zip([\"\
    Monday\", \"Tuesday\"],\n[\"good\", \"bad\"])):\n    print(\"%i: %s, it will be\
    \ %s\" % (i, day.capitalize(), weather))\n```\n\n0: Monday, it will be good\n\
    1: Tuesday, it will be bad\n\n我们在这里看到i是元素i的位置。\n\n注意——在字符串中替换。\n\n### while循环\n\
    \nPython还允许你使用while()循环，这种循环使用较少，看起来很像我们可能在其他语言中遇到的while循环。要退出这个循环，我们可以使用带有条件的break。警告，我们必须在循环中递增索引，否则可能会陷入无限循环。\n\
    \n我们可以有：\n\n```\ni = 1\n\nwhile i < 100:\n    i += 1\n    if i > val_stop:\n \
    \       break\n    print(i)\n```\n\n这段代码在每次循环中将i加一，并在i达到val_stop（即100）时停止。\n\n\
    注意——Python中的递增可以有多种形式i = i + 1或i += 1。\n\n两种方法在性能上是等效的；这是关于选择最适合你的方法。\n\n## 第4章\
    \ 处理Python中的局部变量与全局变量\n\n现在我们需要看看在Python中处理变量时能够使用的不同类型的变量。我们将在这门语言中处理的两种主要变量类型包括局部变量和全局变量。\n\
    \n当我们谈论这些变量时，会出现一些很大的差异。首先是全局变量。这主要意味着我们正在查看一个变量，程序的其余部分或程序的任何部分都能够声明它。无论程序的那部分位于何处；当它愿意时，它将能够使用和依赖该全局变量。\n\
    \n有时这是一件好事，它将允许你的模块声明它们想要的变量，即使它们彼此不靠近。但有时，这将导致一些问题。如果代码的错误部分试图声明一些它不应该声明的变量，它可能导致代码的行为不符合你的预期，并且一些变量将在错误的时间被声明。这从来都不是一件好事，如果你想避免这个问题，你需要承担一些风险。\n\
    \n这个问题的解决方案将是局部变量。这些是无法在整个代码中访问的变量。这些变量只会在你事先确定的特定方法或函数中声明。这将确保变量只以你希望的方式使用，而不会在其他地方使用。\n\
    \n### 局部变量\n\n我们将花一些时间研究的第一个选项是局部变量。这将类似于我们在其他语言中看到的局部变量，它将是在变量应该是局部的块的开头声明的变量。它也可以在我们处理语句、switch语句等时出现，具体取决于你的需求。\n\
    \n局部变量将有一个声明，可以显式定义已声明变量的类型以及一些同时命名该变量的标识符。我们将把局部变量识别为一种变量类型，我们可以在其作用域和范围在声明它的方法或语句块内的地方使用它。\n\
    \n我们能够使用这些局部变量，更像foreach语句中的迭代变量、特定catch子句中的异常变量以及使用语句时的资源变量。它也可以用作一种常量类型，其值不能在声明它的方法或语句块内修改。\n\
    \n隐式类型的局部变量，其类型将由计算机从其右侧的表达式推断出来，当你想要处理语言集成查询时将很有用。这些将是返回给我们一些匿名类型，为你的每组结果创建自定义类型的查询。\n\
