- md: '## Chapter 14. What Is Object-Oriented Programming?


    Object-Oriented Programming (OOP) is a programming paradigm that makes use of
    objects and their interactions. Objects are data structures containing both the
    data and functions that operate on it, which contrasts with pure procedural programming.


    ### What Does Object-Oriented Programming Mean?


    Object-oriented programming is the technique of breaking down complex algorithms
    into more straightforward, more manageable parts to simplify development. The
    complexity of OOP comes from the relationship between these objects and how they
    interact with each other, instead of how they process information internally.


    ### What Does Object Oriented Programming Not Mean?


    In contrast with OOP, is an often misunderstood approach to programming that advocates
    the programming of every object as if it was a real object when it isn''t. OOP
    is a term that refers to the type of programming used in object-oriented applications.
    It does not refer to the language or the methodology - each language and design
    technique can be used independently of others - only how objects are treated.

    An object-oriented program may use any language as long as it supports data abstraction
    and inheritance concepts. However, in addition to these fundamental purposes,
    OOP also provides several advantages over traditional approaches to building software.


    ### What Are the Advantages of Object-Oriented Programming?


    OOP has several distinct advantages, including:


    - 1. OOP Encourages Modular Development. The whole idea behind OOP is to break
    down programs into smaller, more manageable parts. This allows each component
    to be implemented in minimum time and with easy maintenance after that. The relationship
    between these parts is designed so that rather than having objects inherit from
    a base class, each object is easily identifiable with a single function - e.g.
    Class.new() called on the class name - which is invoked by passing in one or more
    parameters - e.g. "objectId".<functionName>().

    - 2. Object-oriented interfaces reveal unnecessary complexity. OOP has the advantage
    of showing unnecessary complexity in an object-oriented system based on inheritance
    and polymorphic behavior. For example, when a programmer creates a new object
    in C++, the programmer must either define all of the internal functions or leave
    them undefined. If he leaves them undefined, they will most likely create bugs
    in the program; however, he is duplicating functionality if he defines them all,
    there is no way for that newly created object to communicate appropriately with
    other objects.

    - 3. Transparency of data helps avoid bugs. Transparency of data also helps in
    avoiding bugs. For example, in an object-oriented program, if a programmer is
    checking whether a variable is less than five, it is easier to say if (x < 5)
    than if (x <= 5). This is because the first expression shows the intention of
    the programmer clearly. The second expression requires the reader to infer what
    it really means.

    - 4. OOP Encourages Code Reuse. OOP allows objects to be combined and inherited
    from other objects, which increases code reuse. In procedural programming, the
    programmer must write the program twice, once for each case. Also, with OOP, the
    programmer can use a library of previously written code and then only have to
    rewrite a small section to interface with his own code.

    - 5. OOP is easy to update. With procedural programming, any change in the code
    will also require changes for all functions calling that code. In OOP, if a function
    or method is changed or added then only that function or procedure needs to be
    changed.

    - 6. Modularity and easy-to-understand modular decomposition make OOP easy to
    learn and use. With OOP, the programmer is encouraged to think of objects and
    their relationships and functions as modular sets of reusable parts.

    - 7. OOP Encourages Good Code Design. OOP encourages good coding practice by providing
    structures that encourage good programming practice. For example, there are separating
    (sealed) classes for representing data and operations on that data in C++, and
    in Java, there is a corresponding package for the same purpose.

    - 8. Modularity reduces the chance of errors caused by a single error. Because
    OOP allows modularization, if an error occurs in one module, it will not affect
    other modules because each module has its own different interface to other modules
    so each module can work independently of the others.

    - 9. OOP is easier to debug and maintain. This is because the programmer''s code
