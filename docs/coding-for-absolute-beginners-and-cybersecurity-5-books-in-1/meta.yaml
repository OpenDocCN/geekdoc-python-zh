    to understand instructions. It might have to make a little interpretation on one
    or two of them, but for the most part, it can follow these instructions and do
    what you ask.


    # Why Do We Code?


    Programming languages are used to make software. Software is vital because it
    lets us do things like automate processes in factories or connect devices in our
    homes to control them from anywhere else in the world. This kind of software is
    commonly called "apps," short for applications.

    So coding is necessary because it gives us the ability to make apps of our own
    to help us do what we want. But coding is more than just the language: it''s about
    what you can do with that language.'
- md: 'Coding is also a creative process, and that''s where all the best apps come
    from. Successful apps are those that are useful, interesting, or just downright
    fun to use. Some of them have changed how we live our lives, like Uber or Facebook;
    others have profoundly affected how we communicate with each other, like Skype
    or WhatsApp. And they''ve all been made possible because someone somewhere had
    an idea and was able to translate it into code.


    ## What Can You Do with It?


    Anything you can think of. Coding gives you the ability to make something out
    of nothing. You give it a few lines of code and it turns into a program that does
    something on your computer, across your network, or even the World Wide Web.


    You might think that all coding is the same, but there are several different kinds.
    Some coding languages are used to build simple websites. Others are used to build
    operating systems, which makes them complicated. Some people learn how to write
    code in high school or college to write programs for big companies like Google
    and Microsoft; others learn how to code for themselves or their friends to make
    their software without much money.


    Here in this book, you''re going to learn how to build software for your computer
    using a popular programming language called Python. This is a great language to
    learn because there are lots of resources out there for learning it. There are
    also lots of apps out there that were made using Python so you can see how they
    work, play with them, and even copy them to use as your projects.


    You might think that some of these websites and apps cost money or require special
    equipment, but all you need is a computer. And right now, that''s all you need
    to learn to code: just a computer with an internet connection and the ability
    to read, type, and do some simple math.


    ## How to Read This Book


    Programming is a complicated subject. Even if you''re entirely new to computers,
    it''s pretty likely you already know at least some programming languages. That''s
    why I wrote this book so that people who have no experience coding can still understand
    what they''re reading. Here are the steps you need to take to use this book:


    1.  Download and install Python 2 on your computer if you don''t already have
    it installed. (Python 3 is very similar and many of the examples will work with
    either version.)

    2.  Open a web browser on your computer and enter this address: [https://codecademy.com/courses/learn-python?action=start](https://codecademy.com/courses/learn-python?action=start).

    3.  Follow along as you read the chapters. You should type in the code and follow
    the instructions for each chapter. (If you don''t see any code or instructions,
    then click "Start a new lesson.")

    4.  Continue with this book until the end. You''ll want to practice what you learn
    so that it sticks in your memory!


    ## Where to Learn More


    Once you finish this book, you''re going to want to learn more about Python and
    coding. Here are some resources I recommend:


    -   **Codecademy** – Codecademy is an interactive website where you can learn
    how to code in dozens of languages, including Python, by completing activities
    and challenges on their platform. They even have video tutorials!

    -   **Udacity** – This is like Codecademy, except it''s a college level course
    and the program you learn here can be applied to most jobs. The site also has
    many videos showing you how the modules work and how to use them.

    -   **Books and YouTube** – These are two great ways to learn, and they''re all
    free! You can learn Python through many books or online courses. You can also
    search YouTube videos on Python to see how people have used it in their projects.


    ## Chapter 3. Why Do We Need a Programming Language?


    The most common use for a computer is to store and retrieve data. Computers can
    read information stored on the memory chips and turn it into text, video, or any
    other format that we can view. However, they cannot understand or process the
    information itself—it''s just a bunch of electronic impulses. So what does that
    mean? It means that it needs us, humans, to tell it what to do for the computer
    to do anything at all. Now, this is where programming languages come in handy
    because they enable us, humans, to tell computers how to process the data we store
    on them. Yes, this does require us to know how to write a program that tells the
    computer what to do. However, writing a program by hand isn''t an option if we
    want the computer to do anything! Computers can only operate in eight different
    modes; they can only understand English or binary code.


    So, we need a way for computers to understand and process human languages of all
    kinds. Programming languages have been developed so that anyone with minimal training
    can write programs — everything from simple webpages and word processors to complex
    games like Quake III Arena and World of Warcraft. It is the same type of language
    used in everything from chat rooms and music players on our computers to mobile
    phones and digital cameras. If you want to move beyond just writing small programs
    for your use, you will need to learn how to program to create the software that
    makes all this possible.


    ## How to explain Coding to a kid?


    Programming is making choices about what data the computer should process to achieve
    the desired result. There are many kinds of programming languages, some more complicated
    than others, but all have something in common. They all require us to choose a
    set of instructions that tell the computer exactly how we want it to operate.
    Sounds simple—it is!


    Let''s look at an example: You have just bought an iPod and want it to play music
    from your computer via iTunes. You have a couple of songs stored on your computer''s
    hard drive, but you want it to take those songs and play them over the iPod. How
    do you tell iTunes to do this? Just plug in the iPod and select it from iTunes''
    menu, right? Well, that works—but maybe you want to think about what is even happening
    here. If the only thing we know is that we need iTunes to transfer songs into
    our iPod, then why aren''t we just hooking up our computer directly via USB instead?


    If we start thinking like a programmer here, we can see some choices we need to
    make. First of all, we have to decide which songs we want to transfer over. Second,
    we need to tell iTunes that those are the songs that we want it to transfer over.
    And third, iTunes needs to know how we want it to transfer them—iPod or computer?


    How do you do this? Well, iTunes is a relatively simple program that the user
    can easily control with just a few clicks of a mouse. However, underneath this
    easy-to-use interface is a somewhat more complex set of instructions that tell
    iTunes exactly how to work. This is what programming languages do for computers—they
    let us type out those instructions and then translate them into the commands the
    computer can understand and process.


    ## What''s Coding Like?


    Programming is not the same as just typing in lots of random numbers and letters.
    Instead, it can be a bit like solving a puzzle. You are trying to figure out how
    to tell the computer what you want it to do, without relying on knowing how all
    of that stuff works — just like solving a puzzle!


    So what are some examples of coding problems that you might come across? Well,
    computers use different types of data that they need to process according to their
    programming language. For example, some computers will have straightforward graphical
    user interfaces (GUIs) where the whole purpose is to draw pictures or read aloud
    information from files on your hard disk. These computers will not understand
    commands that you type into a text editor or even an email application. Other
    computers are more like your typical old typewriter—they do have a user interface,
    but it''s deficient level and doesn''t understand anything other than text. You
    can ask these computers to type out information, but they will only understand
    the text you typed in.'
  mdcn: '编程同样是一个创造性的过程，所有优秀的应用程序都源于此。成功的应用程序是那些实用、有趣或使用起来极其愉快的应用。其中一些改变了我们的生活方式，比如优步或脸书；另一些则深刻影响了我们的交流方式，比如Skype或WhatsApp。这一切之所以成为可能，是因为某处某人有了一个想法，并能够将其转化为代码。


    ## 你能用它做什么？


    任何你能想到的事情。编程赋予你从无到有创造的能力。你只需给它几行代码，它就能变成一个程序，在你的计算机上、网络上，甚至整个万维网上执行某些操作。


    你可能认为所有编程都是一样的，但实际上有几种不同的类型。有些编程语言用于构建简单的网站，而另一些则用于构建操作系统，这使得它们变得复杂。有些人在高中或大学学习如何编写代码，为谷歌和微软这样的大公司编写程序；另一些人则为自己或朋友学习编程，以便在没有太多资金的情况下制作自己的软件。


    在这本书中，你将学习如何使用一种名为Python的流行编程语言为你的计算机构建软件。这是一门很棒的语言，因为有很多资源可以用来学习它。还有很多使用Python制作的应用程序，因此你可以了解它们的工作原理，尝试使用它们，甚至复制它们作为你的项目。


    你可能认为其中一些网站和应用程序需要花钱或需要特殊设备，但你只需要一台计算机。而现在，学习编程只需要一台连接互联网的计算机，以及阅读、打字和进行一些简单数学运算的能力。


    ## 如何阅读本书


    编程是一个复杂的主题。即使你对计算机完全陌生，你也可能已经知道至少一些编程语言。这就是为什么我写这本书，以便没有编程经验的人仍然能够理解他们所读的内容。以下是使用本书需要采取的步骤：


    1.  如果你的计算机上尚未安装Python 2，请下载并安装它。（Python 3非常相似，许多示例适用于任一版本。）

    2.  在你的计算机上打开一个网页浏览器，并输入以下地址：[https://codecademy.com/courses/learn-python?action=start](https://codecademy.com/courses/learn-python?action=start)。

    3.  在阅读章节时跟随操作。你应该输入代码并遵循每章的说明。（如果你没有看到任何代码或说明，请点击“开始新课程”。）

    4.  继续阅读本书直到结束。你需要练习所学内容，以便它牢固地记在你的记忆中！


    ## 在哪里了解更多


    一旦你读完这本书，你会想了解更多关于Python和编程的知识。以下是我推荐的一些资源：


    -   **Codecademy** – Codecademy是一个互动网站，你可以通过完成平台上的活动和挑战来学习如何用几十种语言编程，包括Python。他们甚至有视频教程！

    -   **Udacity** – 这类似于Codecademy，但它是大学水平的课程，你在这里学到的程序可以应用于大多数工作。该网站还有许多视频向你展示模块如何工作以及如何使用它们。

    -   **书籍和YouTube** – 这是两种很好的学习方式，而且都是免费的！你可以通过许多书籍或在线课程学习Python。你也可以在YouTube上搜索Python视频，看看人们如何在他们的项目中使用它。


    ## 第3章 为什么我们需要编程语言？


    计算机最常见的用途是存储和检索数据。计算机可以读取存储在内存芯片上的信息，并将其转换为文本、视频或我们可以查看的任何其他格式。然而，它们无法理解或处理信息本身——它只是一堆电子脉冲。那么这意味着什么？这意味着它需要我们人类告诉它该做什么，计算机才能做任何事情。现在，这就是编程语言派上用场的地方，因为它们使我们人类能够告诉计算机如何处理我们存储在其中的数据。是的，这确实需要我们知道如何编写一个程序来告诉计算机该做什么。然而，如果我们想让计算机做任何事情，手动编写程序并不是一个选择！计算机只能以八种不同的模式运行；它们只能理解英语或二进制代码。


    因此，我们需要一种让计算机理解和处理各种人类语言的方法。编程语言的发展使得任何经过最少培训的人都可以编写程序——从简单的网页和文字处理器到像《雷神之锤III竞技场》和《魔兽世界》这样的复杂游戏。这是同一种类型的语言，用于从我们计算机上的聊天室和音乐播放器到手机和数码相机的所有东西。如果你想超越仅仅为自己编写小程序，你需要学习如何编程，以创建使这一切成为可能的软件。


    ## 如何向孩子解释编程？


    编程是关于选择计算机应该处理哪些数据以达到预期结果的决策过程。有许多种编程语言，有些比其他语言更复杂，但它们都有一个共同点。它们都需要我们选择一组指令，这些指令告诉计算机我们希望它如何操作。听起来很简单——确实如此！


    让我们看一个例子：你刚买了一台iPod，想让它通过iTunes播放计算机上的音乐。你的计算机硬盘上存储了几首歌曲，但你想让它将这些歌曲传输到iPod上播放。你如何告诉iTunes这样做？只需插入iPod并从iTunes菜单中选择它，对吧？嗯，这确实有效——但也许你想思考一下这里到底发生了什么。如果我们唯一知道的是我们需要iTunes将歌曲传输到我们的iPod中，那么为什么我们不直接通过USB连接计算机呢？


    如果我们开始像程序员一样思考，我们可以看到我们需要做出一些选择。首先，我们必须决定要传输哪些歌曲。其次，我们需要告诉iTunes这些是我们想要它传输的歌曲。第三，iTunes需要知道我们希望它如何传输它们——通过iPod还是计算机？


    你如何做到这一点？嗯，iTunes是一个相对简单的程序，用户只需点击几下鼠标就可以轻松控制。然而，在这个易于使用的界面之下，是一组更复杂的指令，这些指令告诉iTunes如何工作。这就是编程语言为计算机所做的——它们让我们输入这些指令，然后将它们翻译成计算机可以理解和处理的命令。


    ## 编程是什么样的？


    编程不仅仅是输入大量随机数字和字母。相反，它有点像解决一个谜题。你试图弄清楚如何告诉计算机你希望它做什么，而无需依赖于知道所有这些东西是如何工作的——就像解决一个谜题一样！


    那么，你可能会遇到哪些编程问题的例子呢？嗯，计算机使用不同类型的数据，它们需要根据其编程语言进行处理。例如，有些计算机具有直接的图形用户界面（GUI），其全部目的是绘制图片或朗读硬盘上文件中的信息。这些计算机不会理解你输入到文本编辑器甚至电子邮件应用程序中的命令。其他计算机更像你典型的老式打字机——它们确实有一个用户界面，但它处于初级水平，除了文本之外不理解任何东西。你可以要求这些计算机输入信息，但它们只会理解你输入的文本。'
