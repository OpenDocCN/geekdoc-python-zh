    由位于马萨诸塞州波士顿的 Rapid7 创建。它被认为是用于检查漏洞的最佳开源框架。它是一个命令 shell，因为它在 UNIX 内运行；因此用户能够使用他们的手和自动指令来检查和运行脚本。Metasploit
    Framework 有一些内置的，也有一些第三方接口，可用于利用受影响区域。


    ### 9. SolarWinds Mail Assure


    它是一个多功能应用程序，解决了绝大多数电子邮件安全问题。它拥有来自 85 个国家的近 200 万个域名的信息。它同样以软件即服务（SAAS）的形式提供。它能够帮助保护用户的应用程序免受垃圾邮件、病毒、网络钓鱼和恶意软件的侵害。


    还有许多其他网络安全工具可以帮助消除上述列表中的风险。它们如下：


    - Aircrack-ng

    - Call Manager

    - MailControl


    ## 第三章. 提高你的安全性


    ## 保护无线网络


    因此，人们学习如何保护他们的无线网络至关重要，以确保他们的机密信息不会落入错误的人手中。本章将简要介绍如何保护个人无线网络以及如何操作。在大多数示例中，将使用
    NETGEAR 路由器。如果用户使用不同的路由器，请注意有些事情会有所不同。


    ## 加密


    让我们从讨论基本加密开始。加密，当涉及通过网络传输数据时，是将明文转换为混乱字符混合的过程。这降低了通过加密网络发送的信息被用于恶意目的的可能性。至于涉及无线路由器的加密，它是每次输入正确的登录凭据时生成加密身份验证密钥的过程，从而允许访问网络。简单地说，每次用户登录到安全路由器时，都会生成一个唯一的密钥，允许访问该互联网连接。


    ## WPA


    Wi-Fi 保护访问或 WPA 是一种旨在取代 WEP 安全性的安全工具。有两种类型：WPA 和 WPA2。区别在于 WPA2 是更新、更安全的 WPA 版本。每当用户需要登录无线网络时，无论是在家里还是在学校，他们很可能登录的是
    WPA/WPA2 加密网络。这些安全功能通过检查输入的登录凭据是否正确来工作，如果正确，则会生成该特定登录的唯一加密身份验证密钥。一旦生成此密钥，相应的网络就会对其进行检查，假设登录凭据匹配，则允许开始数据传输。现在我们已经了解了
    WPA 加密的基础知识，我们将讨论一些可以采取的基本步骤来保护个人无线网络。


    ## 无线路由器凭据


    当无线路由器首次设置时，更改默认登录凭据非常重要。大多数个人无线路由器都带有标准的登录用户名和密码，例如：


    用户名：admin


    密码：password


    黑客知道这些默认登录凭据，这意味着立即更改它们至关重要。使用包含大小写字母组合的长密码将为用户提供可靠的安全凭据。


