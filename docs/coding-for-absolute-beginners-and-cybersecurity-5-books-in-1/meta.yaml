    现在，添加你的第一行代码：\n\n1. 按照此处所示，向构造函数和主()方法添加代码。对代码的更改在清单中始终以粗体显示。\n\n清单1-3，来自HelloWorld.java\n\
    \n```\npackage annette.godtland.helloworld;\nimport com.godtsoft.diyjava.DIYWindow;\n\
    public class HelloWorld extends DIYWindow {\n    public HelloWorld() {\n     \
