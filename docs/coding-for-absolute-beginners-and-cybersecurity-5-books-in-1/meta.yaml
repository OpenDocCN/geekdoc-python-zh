    \ the rest of the letters are lowercase.\n- Classes can have one or more constructors.\n\
    - The class constructor is named the same as the class and must be declared as\
    \ public. Constructors will be explained more in later lessons.\n- A constructor\
    \ is called by using new, followed by the name of the constructor and parentheses.\
    \ For example, new HelloWord() in the main() method calls the HelloWorld constructor.\n\
    - Blocks of code are enclosed in curly brackets, { }, and each line of code ends\
    \ with a semicolon;\n- Every Java program runs the main() method first.\n- The\
    \ main() method calls the class constructor in all the programs in this book.\
    \ Therefore, the main() method will run first, followed by the class constructor.\n\
    - Each statement within the curly brackets is run, one at a time, in the order\
