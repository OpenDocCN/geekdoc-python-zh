    # # String


    # ## String functions


    I will show you how to use some of the string functions.


    strcpy_s () - copies the content of a string to another.


    strcat_s() - appends a copy of the source string to the destination string.


    strlen() - returns the length of a string.


    Our application will read the string from user input, copy it to another string,
    then copy the original string characters in the reverse sequence to the temporary
    string and concatenate the copy and the reversed copy in one string.


    For example, if user enters string ‘Concatenation’ then the application will output


    ‘ConcatenationnoitanetacnoC’


