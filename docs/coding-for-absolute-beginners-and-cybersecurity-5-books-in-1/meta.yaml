    ## 第 8 章. 正确安装


    ## 安装 Python (Windows)


    开始使用 Python 的一部分是在你的 Windows 系统上安装 Python。安装的第一步，你需要从下面的链接下载你首选版本的安装包：https://www.python.org/downloads/


    访问此链接，你将被引导到一个页面。在该页面上，你需要在 Python 2 和 3 的两个最新版本之间做出选择：Python 3.8.1 和 Python 2.7.17。


