    # # Lists


    Let us imagine a puzzle. You have a row of boxes. Each box contains a card with
    one letter. You have to figure out the sequence of the letters, so that the letters
    compose a word.


    | T | C | O | N | E | L | Y | G | O | H |

    |---|---|---|---|---|---|---|---|---|---|

    | 5 | 10 | 6 | 3 | 2 | 9 | 1 | 7 | 8 | 4 |


    # ## Figure A linked list


    In the table above, you can see that each box has a number. You may guess that
    these numbers are the key to the puzzle. The first box has a letter T inside and
    number 5 on the front side. Take a card with the letter T and put it aside. The
    number 5 may point to the next letter. Count boxes. The fifth box has the letter
    ‘E.’ Take the card with the ‘E’ letter and place it next to T. You will get "TE."
    The box with the letter ‘E’ has number 2 on its side. So, take the card from the
    2nd box and place it next to "TE." You will get "TEC."


    The box with the letter ‘C’ has the number 10, so take the card from the 10th
    box. You will get "TECH." The box with the letter ‘H’ has number 4, so take the
    card from the 4th box. You got "TECHN." Continue following the numbers, and you
    will get the whole word: TECHNOLOGY.


    That is how a linked list works. It is made of nodes. Each node has at least one
    variable that holds data (a text or number or object) and one variable (pointer)
    that holds the address of the next node. This system walks through the node list
    as you did in the puzzle. The pointer of the last node has null value, or it may
    point to the first node. Then we have a closed linked list.


    # ## ADD A NODE


    If you want to add a new node to the end of the linked list, you have to create
    a new node. Then point the pointer of the last node to the address of the new
    node and assign null to the new node pointer.'
- md: "## Chapter 3 Binary trees\n\nBinary trees are one of the most useful of all\
    \ the basic data structures and are by far the most interesting. They are the\
    \ perfect example of how recursion and pointers can be used to do some very useful\
    \ things.\n\nOne of the best techniques for creating lists of things is the linked\
    \ list, but finding an element in the list can take a while. And, if you have\
    \ a large amount of unstructured data, an array won’t help much either. You can\
    \ try sorting the array but, even so, inserting items into it will still be difficult.\
    \ If you have an array that you want to keep sorted, inserting new elements will\
    \ take a lot of shuffling! And trying to find things in a list as quickly as possible\
    \ is quite important, especially in scenarios like these:\n\n- You’re building\
    \ an MMORPG game and players need to be able to sign in quickly—that involves\
    \ quickly looking players up\n- You’re building software to process credit cards\
    \ and millions of transactions need to be handled hourly—credit card balances\
    \ need to found very quickly\n- You’re using a low-power device, such as a tablet\
    \ or smartphone, and showing your users an address book. You don’t want your users\
    \ to keep hanging because your data structure is slow.\n\nThis section will discuss\
    \ the tools needed to overcome these problems and more.\n\nThe idea of the solution\
    \ is to be able to store elements in a structure like a linked list, using pointers\
    \ to help structure the memory, but in an easier way than the linked list. Doing\
    \ this requires that the memory have more structure than a simple list.\n\nSo\
    \ what does structuring data mean? When we started this journey, we only had arrays,\
    \ but these never really gave us the ability to use data structures other than\
    \ sequential lists. Linked lists use pointers to grow sequential lists incrementally\
    \ but don’t use the flexibility of the pointer to build more sophisticated structures.\n\
    \nWhat are these more sophisticated structures in memory? Structures that hold\
    \ more than a single next node at any given time are a good example. But why would\
    \ you want this? Simple. If you have two “next nodes,” one can be used to represent\
    \ elements that are more than the current element. This is called a binary tree.\n\
    \nThese are named because there are always one or two branches from every node.\
    \ Each of the next nodes is a child, and the node that links to the child is the\
    \ parent node.\n\nThis is what a binary tree might look like:\n\n```\n10\n\n6\
    \ 14\n\n5 8 11 18\n```\n\nIn the tree, the left child on each of the elements\
    \ is smaller than the element, and the right child is larger. 10 is the parent\
    \ node for the whole tree, and the child nodes of 6 and 14 are both parent nodes\
    \ to their own small trees, called subtrees.\n\nBinary trees have one very important\
    \ property: each child is an entire tree. Combine this with the rule of the left\
    \ child being smaller and the right child being larger, and you have an easy way\
    \ of defining algorithms that locate specific nodes in the tree.\n\nFirst, look\
    \ at the current node value. If it equals the search target, it’s done. If it’s\
    \ more than the search target, go left; otherwise, go right. This works because\
    \ each node to the left of the tree is less than the current mode value, and each\
    \ on the right is more.\n\nIn an ideal world, your binary tree will be balanced\
    \ with the exact same number of nodes on both sides. In such cases, every child\
    \ tree is roughly 50 percent of the entire tree and, when you search the tree\
    \ for a value, the search can eliminate 50 percent of the results each time it\
    \ gets to a child node. So, if you had a tree of 1000 elements, 500 would be immediately\
    \ eliminated. Search that tree again (it only has 50 elements now), and you can\
    \ cut it by about 50 percent again. That way it doesn’t take long to find the\
    \ value you want.\n\nSo, how many times must a tree be subdivided before you get\
    \ to one element? The answer to that is log2n (n is the number of elements the\
    \ tree has). This is a small value, even if your tree is large—if your tree had,\
    \ say, 32 billion elements, the value would be 32; almost 100 million times faster\
    \ than a search of a linked list of four billion elements, where every single\
    \ one has to be assessed.\n\nIf the tree isn’t balanced, you won’t be able to\
    \ eliminate roughly half of the elements; worst case, each node only has one child\
    \ and that makes the tree nothing more than a linked list with a few extra pointers,\
    \ thus requiring you to search all elements.\n\nSo, when a tree is balanced approximately,\
    \ it’s much faster and easier to search for nodes than the same search on a linked\
    \ list. This is because you can structure the memory of how you want it.\n\n##\
    \ Implementing a Binary Tree\n\nTo implement a binary tree, begin by declaring\
    \ the node structure:\n\n```c\nstruct node\n{\n    int key_value;\n    node *p_left;\n\
    \    node *p_right;\n};\n```\n\nThe node can store values as a simple integer,\
    \ key_value, and has two child trees —p_left, and p_right.\n\nThere are some common\
    \ functions that you want on your binary tree: inserting, searching, removing,\
    \ and destroying:\n\n```c\nnode* insert (node* p_tree, int key);\nnode *search\
    \ (node* p_tree, int key);\nvoid destroyTree (node* p_tree);\nnode *remove (node*\
    \ p_tree, int key);\n```\n\n### Inserting\n\nWe’ll use a recursive algorithm for\
    \ inserting it into the tree. Recursion is fantastic for trees because there are\
    \ two small trees for each tree; that makes the entire tree recursive by nature.\
    \ The function takes a key and a tree that already exists (even an empty one)\
    \ and returns a new tree that has the inserted value.\n\n```c\nnode* insert (node\
    \ *p_tree, int key)\n{\n    // base case--we have got to an empty tree and our\
    \ new node\n    // needs to be inserted here\n    if ( p_tree == NULL )\n    {\n\
    \        node* p_new_tree = new node;\n        p_new_tree->p_left = NULL;\n  \
    \      p_new_tree->p_right = NULL;\n        p_new_tree->key_value = key;\n   \
    \     return p_new_tree;\n    }\n    // decide – left subtree or right subtree\
    \ for the insertion\n    // depending on the what the node value is\n    if( key\
    \ < p_tree->key_value )\n    {\n        // build a new tree from p_tree->left,\
    \ and add in the key\n        // replace existing p_tree->left pointer with a\
    \ pointer\n        // to new tree. Set the p_tree->p_left pointer\n        //\
    \ in case p_tree->left is NULL. (If it isn't NULL,\n        // p_tree->p_left\
    \ won't change but it set it just\n        // to make sure.)\n        p_tree->p_left\
    \ = insert( p_tree->p_left, key );\n    }\n    else\n    {\n        // Insertion\
    \ into the right side is symmetric to the\n        // insertion in the left\n\
    \        p_tree->p_right = insert( p_tree->p_right, key );\n    }\n    return\
    \ p_tree;\n}\n```\n\nThe basic logic here is this: if you have an empty tree,\
    \ you create a new one. If not, the value for insertion goes to the left subtree\
    \ if it’s more than the current node, and the left subtree is then replaced with\
    \ the new one. Otherwise, insert it into the right subtree and replace it.\n\n\
    When it comes to seeing it in action, build an empty tree into a tree with a couple\
    \ of nodes. If the value 10 is inserted in the empty tree (NULL), immediately\
    \ we will hit base case, and the result will be a tree of:\n\n1\n\nAnd both of\
    \ the child trees will point to NULL.\n\nThen insert 5 into the tree and make\
    \ the following call:\n\ninsert(a tree with a parent , 5)\n\n## DELETE A NODE\n\
    \nTo delete a node with a certain key, you walk along with the list until you\
    \ find the key. Then you assign the key node to the temp node. Then you point\
    \ the node previous to the key node to the node next to the key node. See Figure\
    \ 60. As a result, the temp key becomes isolated from the list. Now you can delete\
    \ the temp.\n\nBelow is a code for Node class. For simplicity sake, I created\
    \ a node that holds an integer and node pointer to the next node. Both class member\
    \ variables are declared as private. It is good programming practice not to use\
    \ global variables, because private members cannot be seen from the outside of\
    \ the class. We still need to set and to read these private member variables.\
    \ The public functions set and will do the job."
  mdcn: "## 第三章 二叉树\n\n二叉树是所有基础数据结构中最有用的一种，也是迄今为止最有趣的。它们完美地展示了如何利用递归和指针来完成一些非常有用的任务。\n\
    \n创建事物列表的最佳技术之一是链表，但在列表中查找元素可能需要一些时间。而且，如果你有大量非结构化数据，数组也帮不上太大忙。你可以尝试对数组进行排序，但即便如此，向其中插入项目仍然很困难。如果你想保持数组有序，插入新元素将需要大量的移动操作！而尽可能快地在列表中查找事物非常重要，尤其是在以下场景中：\n\
    \n- 你正在构建一款MMORPG游戏，玩家需要能够快速登录——这涉及快速查找玩家信息\n- 你正在构建处理信用卡的软件，每小时需要处理数百万笔交易——需要非常快速地找到信用卡余额\n\
    - 你正在使用低功耗设备，如平板电脑或智能手机，并向用户展示通讯录。你不希望用户因为你的数据结构缓慢而一直等待。\n\n本节将讨论克服这些问题所需的工具以及更多内容。\n\
    \n解决方案的思路是能够将元素存储在类似链表的结构中，使用指针来帮助组织内存，但比链表更简单。这样做要求内存具有比简单列表更多的结构。\n\n那么，组织数据意味着什么？当我们开始这段旅程时，我们只有数组，但这些数组从未真正赋予我们使用顺序列表以外的数据结构的能力。链表使用指针来增量地增长顺序列表，但没有利用指针的灵活性来构建更复杂的结构。\n\
    \n内存中这些更复杂的结构是什么？例如，在任何给定时间能容纳多个“下一个节点”的结构就是一个很好的例子。但为什么你会想要这样呢？很简单。如果你有两个“下一个节点”，一个可以用来表示比当前元素更大的元素。这被称为二叉树。\n\
    \n它们之所以得名，是因为每个节点总有一个或两个分支。每个“下一个节点”都是一个子节点，而链接到子节点的节点是父节点。\n\n二叉树可能看起来像这样：\n\n\
    ```\n10\n\n6 14\n\n5 8 11 18\n```\n\n在树中，每个元素的左子节点小于该元素，右子节点大于该元素。10是整棵树的父节点，而6和14的子节点分别是它们各自小树的父节点，这些小树称为子树。\n\
    \n二叉树有一个非常重要的特性：每个子节点都是一棵完整的树。结合左子节点较小、右子节点较大的规则，你就有了一个简单的方法来定义在树中定位特定节点的算法。\n\
    \n首先，查看当前节点值。如果它等于搜索目标，就完成了。如果它大于搜索目标，就向左走；否则，向右走。这之所以有效，是因为树中每个节点左侧的值都小于当前节点值，而右侧的每个值都大于当前节点值。\n\
    \n在理想情况下，你的二叉树将是平衡的，两侧的节点数量完全相同。在这种情况下，每个子树大约占整棵树的50%，当你在树中搜索一个值时，每次到达子节点时都可以排除50%的结果。所以，如果你有一棵包含1000个元素的树，500个元素会立即被排除。再次搜索这棵树（现在只有500个元素），你可以再次排除大约50%。这样，找到你想要的值就不会花太长时间。\n\
    \n那么，一棵树需要细分多少次才能到达一个元素？答案是log2n（n是树中元素的数量）。即使你的树很大，这也是一个很小的值——如果你的树有，比如说，320亿个元素，这个值将是32；这比搜索一个包含40亿个元素的链表快了近1亿倍，因为链表中的每个元素都必须被评估。\n\
    \n如果树不平衡，你就无法排除大约一半的元素；最坏的情况下，每个节点只有一个子节点，这使得树只不过是一个带有一些额外指针的链表，因此需要你搜索所有元素。\n\
    \n所以，当一棵树大致平衡时，搜索节点比在链表上进行相同的搜索要快得多，也容易得多。这是因为你可以按照自己的意愿来组织内存。\n\n## 实现二叉树\n\n\
    要实现二叉树，首先声明节点结构：\n\n```c\nstruct node\n{\n    int key_value;\n    node *p_left;\n\
    \    node *p_right;\n};\n```\n\n节点可以存储一个简单的整数值`key_value`，并有两个子树——`p_left`和`p_right`。\n\
    \n你希望在二叉树上有一些常用函数：插入、搜索、删除和销毁：\n\n```c\nnode* insert (node* p_tree, int key);\n\
    node *search (node* p_tree, int key);\nvoid destroyTree (node* p_tree);\nnode\
    \ *remove (node* p_tree, int key);\n```\n\n### 插入\n\n我们将使用递归算法将其插入树中。递归对于树来说非常棒，因为每棵树都有两棵小树；这使得整棵树本质上是递归的。该函数接受一个键值和一个已存在的树（即使是空的），并返回一个包含插入值的新树。\n\
    \n```c\nnode* insert (node *p_tree, int key)\n{\n    // 基本情况--我们到达了一棵空树，我们的新节点\n\
    \    // 需要插入在这里\n    if ( p_tree == NULL )\n    {\n        node* p_new_tree =\
    \ new node;\n        p_new_tree->p_left = NULL;\n        p_new_tree->p_right =\
    \ NULL;\n        p_new_tree->key_value = key;\n        return p_new_tree;\n  \
    \  }\n    // 决定 -- 插入左子树还是右子树\n    // 取决于节点值是什么\n    if( key < p_tree->key_value\
    \ )\n    {\n        // 从p_tree->left构建一棵新树，并添加键值\n        // 用指向新树的指针替换现有的p_tree->left指针。\n\
    \        // 设置p_tree->p_left指针\n        // 以防p_tree->left为NULL。（如果不是NULL，\n  \
