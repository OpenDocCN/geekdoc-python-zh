  md: '# # Linked List


    Linked lists are a dynamic data structure, and memory is allocated at run time.
    The concept of the linked list is not to store data contiguously. Nodes of the
    linked list contain a link that points to the next elements in the list.


    Performance-wise linked lists are slower than arrays because there is no direct
    access to linked list elements. Linked list is a useful data structure when we
    do not know the number of elements to be stored ahead of time. There are many
    types of linked lists: linear, circular, doubly, doubly circulare, etc.


    # # Linked list ADT Operations


    Below is the API of Linked list.


    Insert(k): adds k to the start of the list


    Insert an element at the start of the list. Just create a new element and move
    pointers. So that this new element becomes the first element of the list. This
    operation will take O(1) constant time.


    Delete(): Delete the element at the start of the list


    Delete an element at the start of the list. We just need to move one pointer.
    This operation will also take O(1) constant time.


    PrintList(): Display all the elements of the list.


    Start with the first element and then follow the pointers. This operation will
    take O(N) time.


    Find(k): Find the position of the element with value k


    Start with the first element and follow the pointer until we get the value we
    are looking for or reach the end of the list. This operation will take O(N) time.


    Note: Binary search does not work on linked lists.'
