    # Memory Management


    C++ programming language provides a lot of options to users when it comes to managing
    the memory used by an executing program. In this chapter, we shall be exploring
    some of these frequently used options. We would also introduce some modern techniques
    aimed at reducing the memory management problems that have plagued C++ projects
    in the past.'
  - '[PAGE 471]


    # Memory Available to C++ Programs


    Modern operating systems usually reserve a section of its memory for executing
    a program that allows the operating system to manage multiple program executions
    simultaneously. There are different operating systems which layout the memory
    of executing the program in different ways. However, the layout would include
    the following four sections.


    +   - Code: The program''s compiled executable instructions are held in the code
    section memory. While the program executes, the contents of the code section should
    never change. Also, during the program''s executions, the code segment does not
    change as well.

    - Data: Persistent variables and global variables are held in the data section
    of the memory as in static locals. Throughout the life span of the executing program
    is the variables of the data would exist. However, unless the data is a constant,
    the executing program may freely change their values. Although the values stored
    in the variables found in the data segment may change during the program''s execution,
    the size of the data segment wouldn''t change while the program is executing.
    It is so because the program''s source code precisely defines the numbers of global
    and static local variables. It is also possible for the compiler to compute the
    exact size of the data segment.

    - Heap: The section where the executing program obtains dynamic memory is called
    the heap. Using the new operator gets the memory from the heap, and the delete
    operator returns the previously allocated memory back to the heap. The size of
    the heap shrinks and fries during the program''s execution as the program deallocates
    and allocates dynamic memory using the delete and new.

    - Stack: Function parameters and local variables are always stored in the stack.
    Function parameters and local variables disappear when the function returns and
    appears when a function is called. The size of the stack also shrinks and grows
    during the program''s execution as various functions execute.'
  - '[PAGE 472]


    Generally, operating systems limit the size of the stack. Deep recursion can consume
    a considerable amount of stack space. For example, let''s consider an improperly
    written recursive function of one that omits the base case and thus exhibits an
    "infinite" recursion that would consume all the space that is available on the
    stack. A situation such as this is known as a stack overflow. Modern operating
    systems terminate any process that consumes a lot of the stack space. However,
    on some embedded systems, this stack overflow may go undetected. Typically, heap
    space is plentiful, and operating systems can use virtual memory to provide more
    space than it''s available in real memory for an executing program. The extra
    space for the virtual memory comes from a disk drive, and the operating system
    shuttles data from the disk to real memory as needed by the executing program.
    Programs that make use of a virtual memory run a lot more slowly than programs
    that make use of little virtual memory.'
  - '[PAGE 473]


    # Manual Memory Management


    Frequent memory management issues with delete and new are the majorly difficult
    to find and fix the source of the logic error. Programmers have to adhere strictly
    to the following tenets:


    +   - Everything you call new, it should always have an associated call to delete
    provided the allocated memory isn''t longer needed. It may sound simple, but it
    isn''t always clear when delete should be used, but the function below shows a
    memory leak:


    ```

    void calc(int n) {


    // ...


    // Do some stuff


    // ...


    int *x = new int[n];


    // ...


    // Do some stuff with x


    // ...


    // Exit function without deleting x''s memory


    }

    ```


    Provided a program calls on the calc function enough times, the program will eventually
    run out of memory. In the calc function, x is a local variable. In that light,
    x lives on the stack. So when a user uses a particular call to calc completes,
    the function’s clean up code automatically releases the space helped by the variable
    x. Because all functions automatically manage the memory for their local and parameter
    variables. The problem with x is assigned via new to point to memory allocated
    from the heap and not the stack. Function executions manage to which x pointed
    is no deallocated automatically.'
  - '[PAGE 474]


    +   - Then operator delete should never be used to free up memory that has not
    been allocated from its previous call to new. The code fragment below illustrates
    one such example:


    ```

    int list[10], *x = list; // x points to list


    // ...


    // Do some stuff


    // ... delete [ ] x; // Logic error, attempt to deallocate x''s memory

    ```


    The space references by the pointer x were not allocated by the operator new,
    so the operator delete should not be used to attempt to free the memory. When
    you attempt to delete a memory that is not allocated with new, it results in an
    undefined behavior that proves a logic error.


    +   - The operator delete must not be used to deallocate the same memory more
    than once. This case is common when two pointers refer to the same memory. Pointers
    like this are called aliases. The following code fragment below illustrates this
    situation better:


    ```

    int *p = new int[10], *y = x; // y aliases x


    // ...


    // Do some stuff with x and/or y


    // ...


    delete [ ] x; // Free up x''s memory


    // ...


    // Do some other stuff


    // ...


    delete [ ] y; // Logic error, y''s memory already freed!

    ```'
  - '[PAGE 475]


    Since the pointer x and pointer y point to the same memory, then x and y are aliases
    of each other. If you deallocate a memory that is referenced by one of them, then
    the other memory is also deallocated since it is the same memory.


    +   - When you deallocating previous memory with delete, they should never accessed.
    When you attempt to access deleted memory result, it would result in an undefined
    behaviors which represent a logical error.


    ```

    int *list = new int[10];


    // ... // Use list, then


    // ... delete [ ] list;


    // Deallocate list''s memory


    // ... // Sometime later


    // ... int x = list[2]; // Logic error, but sometimes works!

    ```


    The code fragment above illustrates how such a situation could arise. For the
    purpose of efficiency, the delete operator makes heap space as available without
    modifying the contents in the memory.'
  - "[PAGE 476]\n\n# # Resource Management\n\nIt is essential that programmers call\
    \ clear internationally when they finish with a linked list object. Take a look\
    \ at the following definition:\n\n```\nvoid x() {\n    IntList1 my_list; // Constructor\
    \ called here\n\n    // Add some numbers to the list\n    my_list.insert(12);\n\
    \    my_list.insert(7);\n    my_list.insert(-14);\n\n    // Print the list\n \
    \   my_list.print();\n} // Oops! Forgot to call my list.clear!\n```\n\nIn the\
    \ code above, the variable my list is local to function x. When the function x\
    \ finishes executing the variable my list, it will go out of scope. At this stage,\
    \ the space on the stack-allocated for the local IntList1 variable named my list\
    \ is reclaimed. Although the list’s head-allocated elements space remains, the\
    \ only access the program can have to the memory is through my list.head, but\
    \ my list no longer exists. This is a classic example of a memory leak. Observe\
    \ that none of the classes we have designed so gat apart from the IntList1 have\
    \ this problem. However, C++ offers a way out for class designers to specify actions\
    \ that have to occur at the end of an object’s lifespan. A constructor that executes\
    \ a code at the beginning of an object’s existence is known as a destructor. A\
    \ destructor is a special method that executes immediately before the object stops\
    \ existing. A destructor can also have the same name as its class with a tilde\
    \ ~ prefix. Additionally, a destructor does not accept arguments. Code 9.2 shows\
    \ how to add a destructor to a code and also ass the previously suggested optimization\
    \ of the length and clear methods."
