    of a country. These kinds of attacks typically are aimed at retrieving information
    from the victim. There are lots of things that remain the same when it comes to
    espionage through a cyberattack, including monitoring of communication running
    on the cyberspace. There is another popular technique in espionage known as stealing
    secrets. Earlier on, this task came into the domain of individuals who physically
    penetrated the space and compromised certain assets that are found inside the
