- md: "## STL Iterators\n\nIterators, containers, and algorithms are components of\
    \ the Standard Template Library written by Alexander Stepanov et al., of Hewlett-Packard\
    \ in the early 1990s and subsequently merged and advanced in the Standard Library.\n\
    \nAn iterator is an abstraction of a specialized pointer that dereferences over\
    \ elements of a given container (such as vector, map, and user made container\
