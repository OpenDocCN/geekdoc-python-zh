    has been recognized by ISO (International standard organization) in 1998. The
    first updated version was released in the same year, and people were surprised
    by the new additional features that C++ started to offer. It has started using
    advanced turing techniques to decrease the compile-time and has also introduced
    templates in the first version. All these robust new features have helped C++
    to develop complex software that supports system programming. Within a few years,
    C++ has improved tremendously and has included a lot of advanced features that
    can be used to create generic applications.


    It is important to appreciate Microsoft for the sudden up rise of C++ as a programming
    language. Microsoft started to use C++ for its development software Visual C++.
    A lot of programmers developing applications for Microsoft systems started to
    find how reliable and comfortable C++ is to work with. By 2009, C++ standard library
    has been updated with various complex systems, mathematical and time functions.'
  - '[PAGE 352]


    # # Why has C++ become successful?


    The success of C++ is mainly due to its object-oriented nature. In the early 1980s,
    the object-oriented programming paradigm took the technological world by storm.
    People were impressed with the adaptability and simplicity it offers. A lot of
    built C libraries at that time can be easily transformed into C++ functional libraries.


    All of these factors combinedly helped C++ to become one of the popular high-level
    programming languages of this decade. It is estimated that by 2025, 15% of the
    Robotic applications will use C++ as a primary language to develop their resources.'
  - '[PAGE 353]


    # Setting up a C++ environment for different operating systems


    All of the software that is used to create C++ software consists of a code editor
    and an inbuilt debugger to show possible errors. If you are an old cliched guy,
    you can simply use a text editor and run the program using the command-line environments.
    It still works perfectly. However, for this section, we will discuss advanced
    integrated development environment software that can be used to create C++ programs.'
  - '[PAGE 354]


    # # How does the IDE work?


    IDE''s use the combination of the editing program, Compiler chain mechanism, and
    debugging to create efficient programs.


    Note:


    Remember that C++ doesn''t provide an interpreter if you are trying to work on
    the command line execution program.


    C++ is famous among programmers for its advanced capabilities and easy syntax.
    Even with the impact of high-level programming languages such as Java and Python,
    C++ does not lose its charm. This chapter, a comprehensive introduction to C++
    programming language and its history, will help you understand the importance
    and origins of one of the popular programming languages in detail. In this book,
    we have explained various complex programming topics in Layman''s terms. To understand
    and appreciate much of the information, it is important to understand the importance
    of C++ as a programming language. Let us learn in detail about C++ now.'
  - '[PAGE 355]


    # What is special about the New C++ version?


    The newer versions of C++ are developed to support developers who are trying to
    implement complex real-world projects. Here are some of the notable advanced features
    that C++ provides.


    # a) Advanced data structure implementation


    Simple data structures such as Tress and Linked lists can be easily implemented
    through basic C++ versions. However, it is impossible to implement advanced data
    structures such as graphs and binary trees using the older versions. Newer C++
    versions, on the other hand, provide standard libraries that help us to implement
    map and hash values which can be further used to implement advanced data structures.


    # b) Cryptography features


    The newer versions of C++ provide dedicated libraries that can be used to implement
    complex cryptography features in both web and mobile applications. These libraries
    can also be used to create software that deals with ciphers and stenography.


    # c) Lambda implementation


    Lambda implementation is essential to run data science and machine learning applications.
    For example, contemporary deep fake software use C++ rendering libraries that
    are built using lambda expressions.


    # d) Advanced Object-oriented features'
  - '[PAGE 356]


    We all know that C++ is an object-oriented language. The basic versions only support
    single inheritance, whereas the newer versions can provide multiple inheritances
    to your projects. With the newer versions, we will also be able to use multiple
    operating overloading and complex polymorphism features.'
  - '[PAGE 357]


    # # Chapter 1 How to Work on Your First Program


    Once you have downloaded the C++ environment that you would like to use, we are
    going to start right in with your first code. The code that you would have to
    use to make this work includes the following:


    ```

    #include <iostream>

    using namespace std;

    int main ()

    {

    court << “Use This One!”;

    return 0;

    }

    ```


    You have a few options available when it comes to writing this out. You can choose
    to write this out in your compiler, which will be available in your environment,
    or you can choose to write it out and save it to your computer. The second option
    is sometimes nice because then you have the code saved and could copy and paste
    it any time that you would need it in your code.


    Either way, you should carefully consider the type of text editor that you want
    to work with. Most of them are going to be device-specific, so you need to look
    for the one that goes well with your particular computer. Some of the options
    that you can go with are Windows Notepad, vlm, vl, Brief, and EMACS. If you would
    like to have an editor that is compatible with more than one platform, then the
    vlm and vl options are the best ones to choose.'
  - '[PAGE 358]


    When you write out your own codes, you should write them out in the text editor
    first to get a rough draft on the program, and then you can move them over to
    your compiler later on. This makes it easier for you to check your work and avoid
    mistakes with the code that you are currently working with.'
  - '[PAGE 359]


    # # C++ compilers


    Just like with the text editors, there are many compilers out there that you can
    work with. The problem is that while you do get a lot of choices to pick from,
    many of these compilers are pretty expensive. That is because most of the compilers
    that you will come across are meant for elite hackers who have mastered what was
    in the other lower-level compilers, and now they want to make sure they can take
    it to the next level.


    The good news is that there are some compilers that you can get for free. You
    just need to be careful and watch out, just make sure that you are getting ones
    that are good and will have all the features that you are looking for. One compiler
    that works out well with C++ and can be good for a beginner to use is GNU. It
    is best when used with the Linux systems, and you may already have this one on
    your system. To check whether the GNU compiler is available on your system, use
    the following code:


    ```

    $ g++ -v

    ```'
- md: '## Basic syntax


    The C++ language can be defined as a program that will use objects to help keep
    everything organized and will allow the code to communicate and complete other
    functions using various methods. There are four important parts that come with
    the C++ language and these include:


    - **Classes**: These are the organizational tools for your language. They can
    be seen as boxes that can hold onto or store objects and will sort out similar
    ones. You can label your class anything that you would like, but it is good coding
    practice to place objects that, in one way or another, have similar characteristics
    into the same class.


    - **Object**: Objects are things in your code that have states and behaviors.
    These could be things such as colors, texture, shapes, and so on. You will usually
    classify these objects into classes that have similar objects. So, if you had
    a class that was about dogs, you may put the different types of dogs in that same
    class.


    - **Method**: This is a term used in coding for behavior. There can be as many
    or as few methods as you would like to work with. This is how you can manipulate
    the data, and actions will be played out based on the method that you are working
    with or using. Without using the right method, your program won’t know exactly
    what it’s supposed to do.


    - **Instant variable**: These refer to the individual objects that you are working
    with. Each one is classified using a unique set of variables that act like the
    fingerprints to identify your object. You can use some values to assign the right
    variable to the object when you create it.


    And that is the basics of writing a code in C++. You should take some time to
    write out the code above in your compiler to gain a little bit of practice to
    understand what it is that you should be doing here. We will have a look at some
    of the things that you can do with these codes later on, but this is a great place
    to start.


    ## The C++ Data Types


    Just like with some of the other coding languages that you may want to work with
    along the way, there are going to be quite a few data points that show up in your
    code as well with C++. You will often be working with variables, for example,
    which are just going to be spots that you reserve in the memory of your computer
    so that the different parts of the code will stay safe. There are a lot of data
    points that we are able to focus on when it comes to working in the C++ language,
    and these will include:


    1. Boolean

    2. Double floating point

    3. Floating point

    4. Integer

    5. Character

    6. Valueless

    7. Wide character


    ## The C++ Functions


    We also need to take a look at some of the functions that are going to come up
    when we are working with the C++ language. A function is pretty simple and is
    just going to be a group of statements in order to perform a task. Each program
    that you want to write out in C++ is going to have a minimum of a function, which
    can be known as the main() function, but it is possible that you will need to
    add in some more functions to get their code to work the way that we would like.


    You will be able to do this in a number of different ways. First, we have the
    option of choosing to divide up our code so that it is in several functions based
    on what we would like to see it work. How you decide to divide up the code and
    how many functions you use will depend on you, and what you are trying to write
    out on your code. But most programmers are going to divide it up in a manner so
    that each function is going to work on its own task.


    A function declaration is going to tell the compiler about a function name, the
    parameters that come with the function, and the return type that we are going
    to see. Keep in mind though that the definition that we are going to see with
    the function though is going to be found in the actual body of this function.


    The standard library that we are going to see with the C++ library will be able
    to provide us with numerous functions that are already built into the program
    that we are also able to call up any time that we want. For example, if we are
    working with the function for strcat(), it can be used in order to help us to
    concatenate two strings. Then we are able to work with the memcpy() to help us
    to copy one location of our memory over to another one. These are just a few of
    the different types of functions that you are able to work with, and you will
    find that each of them is going to work out in a similar manner.


    With this in mind, we need to take this a bit further and actually see how we
    can apply the function in C++. The code that you will be able to use in order
    to define the function will include:


    ```

    Return type function name (parameter list) {

    Body of the function

    }

    ```


    These function definitions will consist of a function header and a function body.
    The parts of the function will include the following:


    - **Return type**: The function that you are working on may return a value, and
    you will use the value of return type in order to get something to return here.
    Some functions will be able to do the operations that you want without returning
    value to you. With the syntax that we used above, you would end up with an answer
    to the void.

    - **Function name**: This is the name that you will give to the function. When
    you add in the name of the function with the parameter, you will get what is called
    the function signature.

    - **Parameters**: The parameter is a placeholder. When you invoke the function,
    you are passing a value over to the parameter. This value will be referred to
    as the actual parameter or as the argument. The parameter list will then be able
    to refer to the number, order, and type of the parameters of the function. It
    is possible to work on a function that does not have any parameters at all.

    - **Function body**: And finally, the function body is going to contain a collection
    of statements that are able to define what the function does.


    There are a lot of times when we are going to be able to use the functions to
    help us get some parts of our code done and to ensure that we get it all set up
    and ready to handle. Make sure to practice these functions to see how they are
    going to work for our needs.


    ## The Types of Modifiers


    Any time that you are working with some of the codes that you want to do in C++,
    you will find that you will be able to use char, double, and int in order to allow
    the modifier that shows up before it to be there. The modifier that we are talking
    about here is going to be used to help us alter up the meaning of that base type
    so that it is going to fit into any program or situation that we are trying to
    create. There are going to be different types of modifiers of the data that we
    are able to work with. These include signed, unsigned, long, and short.


    These four modifiers are going to be applicable to any of the base types of integers
    that we have. You are able to take the signed and unsigned, for example, in order
    to work with a char, and then long can be used on a double for example. C++ is
    also going to make it easier for us to work with shorthand notation to help with
    these integers. This means that they are able to use those words without needing
    to add in the “int” part since this is always implied in the coding.


    There are also different types of qualifiers in order to get things to work on
    your C++ code. The following types of qualifiers that you will be able to use
    in order to provide some additional information about the variables that precede
    include:


    - **Const**: Objects that have the “const” will not have the ability to be changed
    by the program while you are executing it.

    - **Volatile**: The modifier of volatility will tell the compiler that you are
    able to change the value but these changes may not be explicitly specified by
    the program.

    - **Restrict**: A pointer that has been qualified by restricting is initially
    the only means by which an object it points to can be accessed.'
  mdcn: '## 基本语法


    C++语言可以被定义为一种使用对象来帮助组织一切、并允许代码通过各种方法进行通信和完成其他功能的程序。C++语言包含四个重要部分：


    - **类**：这些是语言的组织工具。它们可以被视为能够容纳或存储对象的盒子，并会对相似的对象进行分类。你可以将类命名为任何你喜欢的名字，但良好的编码实践是将具有某种相似特性的对象放入同一个类中。


    - **对象**：对象是代码中具有状态和行为的事物。这些可能是颜色、纹理、形状等。你通常会将这些对象分类到具有相似对象的类中。因此，如果你有一个关于狗的类，你可能会将不同类型的狗放在同一个类中。


    - **方法**：这是编码中用于表示行为的术语。你可以根据需要使用任意数量的方法。这是你操作数据的方式，操作将根据你正在使用的方法来执行。如果不使用正确的方法，你的程序将不知道它应该做什么。


    - **实例变量**：这些指的是你正在处理的单个对象。每个对象都使用一组唯一的变量进行分类，这些变量就像识别对象的指纹。你可以在创建对象时使用一些值来为对象分配正确的变量。


    以上就是用C++编写代码的基础知识。你应该花一些时间在编译器中写出上面的代码，以获得一些实践，理解你应该在这里做什么。我们稍后会看看你可以用这些代码做些什么，但这是一个很好的起点。


    ## C++ 数据类型


    就像你可能想要使用的其他一些编程语言一样，C++代码中也会出现相当多的数据点。例如，你经常会处理变量，这些变量只是你在计算机内存中保留的位置，以便代码的不同部分保持安全。在使用C++语言时，我们可以关注很多数据点，这些包括：


    1. 布尔型

    2. 双精度浮点型

    3. 浮点型

    4. 整型

    5. 字符型

    6. 无值型

    7. 宽字符型


    ## C++ 函数


    我们还需要看看在使用C++语言时会出现的一些函数。函数很简单，只是一组用于执行任务的语句。你想要编写的每个C++程序至少有一个函数，可以称为main()函数，但你可能需要添加更多函数才能让代码按我们希望的方式工作。


    你可以通过多种不同的方式来实现这一点。首先，我们可以选择根据我们希望看到的工作方式将代码分成几个函数。你决定如何划分代码以及使用多少函数取决于你自己，以及你试图在代码中编写什么。但大多数程序员会以每个函数处理自己的任务的方式来划分它。


    函数声明将告诉编译器函数名称、函数的参数以及我们将看到的返回类型。但请记住，我们将在函数的实际主体中找到函数的定义。


    C++库的标准库将为我们提供许多已经内置在程序中的函数，我们也可以随时调用它们。例如，如果我们使用strcat()函数，它可以用来帮助我们连接两个字符串。然后我们可以使用memcpy()来帮助我们将一个内存位置的内容复制到另一个位置。这些只是你可以使用的几种不同类型的函数，你会发现它们的工作方式都类似。


    考虑到这一点，我们需要更进一步，实际看看如何在C++中应用函数。你将能够用来定义函数的代码包括：


    ```

    返回类型 函数名 (参数列表) {

    函数体

    }

    ```


    这些函数定义将由函数头和函数体组成。函数的各部分包括：


    - **返回类型**：你正在处理的函数可能会返回一个值，你将使用返回类型的值来获取返回的内容。有些函数可以在不返回值的情况下执行你想要的操作。使用我们上面使用的语法，你最终会得到一个void的答案。

    - **函数名**：这是你将给函数的名称。当你将函数名与参数一起添加时，你会得到所谓的函数签名。

    - **参数**：参数是一个占位符。当你调用函数时，你将一个值传递给参数。这个值将被称为实际参数或实参。参数列表将能够引用函数参数的数量、顺序和类型。可以处理一个没有任何参数的函数。

    - **函数体**：最后，函数体将包含一组能够定义函数功能的语句。


    很多时候，我们将能够使用函数来帮助我们完成代码的某些部分，并确保我们将其全部设置好并准备好处理。确保练习这些函数，看看它们将如何满足我们的需求。


    ## 修饰符类型


    任何时候当你在C++中使用一些你想要的代码时，你会发现你可以使用char、double和int来允许出现在它前面的修饰符存在。我们这里谈论的修饰符将用于帮助我们改变基本类型的含义，以便它能够适应我们试图创建的任何程序或情况。我们将能够处理不同类型的修饰符。这些包括signed、unsigned、long和short。


    这四种修饰符将适用于我们拥有的任何整数基本类型。例如，你可以使用signed和unsigned来处理char，然后long可以用于double。C++还将使我们更容易使用简写符号来帮助处理这些整数。这意味着它们可以使用这些词而不需要添加“int”部分，因为在编码中这总是隐含的。


    还有不同类型的限定符，以便让你的C++代码工作。以下是你将能够用来提供有关前面变量的额外信息的限定符类型：


    - **Const**：具有“const”的对象在执行时将无法被程序更改。

    - **Volatile**：volatile修饰符将告诉编译器你可以更改值，但这些更改可能未被程序明确指定。

    - **Restrict**：通过restrict限定的指针最初是访问其指向对象的唯一方式。'
