  md: '# Loop Control


    There are several situations that require you to iterate the same set of instructions
    a number of times. For instance, if you need to sort a set of numbers, you will
    need to scan and rearrange the set several times to get the desired arrangement.
    This flow of execution is known as loop control.


    Simply, a loop is a construct that allows the execution of a block of code many
    times. Java supports several constructs that can be used for implementing loops.
    These include a while loop, for loop, and do while loop.


    A while loop executes a block of code iteratively until the condition specified
    for the while loop is true. The moment this condition fails, while loop stops.


    For loop allows the programmer to manipulate the condition and loop variable in
    the same construct. Therefore, you can initialize a loop variable, increment/decrement
    it, and run the loop until a condition on this variable is true.


    Do while loop is similar to while loop. However, in the while loop, the condition
    is checked before executing the block code. On the other hand, in a do while loop,
    the block of code is executed, and then the condition is checked. If the condition
    is satisfied, the loop execution is again initiated else the loop is terminated.
    It would not be wrong to state that the do while loop, once implemented, will
    execute at least once.'
  merge: -1
