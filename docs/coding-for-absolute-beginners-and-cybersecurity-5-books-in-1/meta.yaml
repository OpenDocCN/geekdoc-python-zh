    when changing the actual value

    - Referencing operator (&) is used when obtaining the memory location of a pointer


    ```

    //Regular variable

    int var = 10;


    //Pointer

    int* pointer;


    //Storing of var memory location

    pointer = &var;


    //Pointer is now effectively ''var'' so

