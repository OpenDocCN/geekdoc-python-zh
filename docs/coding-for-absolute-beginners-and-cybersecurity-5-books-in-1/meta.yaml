  md: 'Let’s assume how normal people will deal with these files. If you want to read
    the data from a file or write the data into a file, then you need to open the
    file or create a new file if the file doesn’t exist and then conduct the normal
    read/write operations, save the file and close it.


    Similarly, the same operations are accomplished in Python with the help of in-built
    applications.


    # Types of Files in Python


    There are two kinds of files:


    +   1. Text files

    2. Binary files


    A file whose contents can be examined using a text editor is known as a text file.
    A text file refers to a sequence of ASCII characters. Python programs are examples
    of text files.


    A binary file stores the data in the same manner as stored in the memory. The
    mp3 files, word documents are some of the examples of binary files. You cannot
    read a binary file using a text editor.


    In Python language, file processing takes the following steps.


    +   - Open a file that returns a filehandle.

    - Use the handle to read or write action.

    - Close the filehandle.


    Before you perform a read or write operation to a file in Python, you must open
    it first. And as the read/write transaction finishes, you should close it to free
    the resources connected with the file.


    Let’s now look at each step in detail.


    Access_mode: This is represented with an integer e.g read, write, and append.
    The default setting is the read-only <r>.'
