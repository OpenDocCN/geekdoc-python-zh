    ```


    This is one way, which uses a single line "IF" statement. The other way, which
    uses two lines to write the same statement, looks like this:


    ```

    30 IF n<0 THEN GOTO 80

    ```


    The computer is programmed to read the line by starting at the beginning of each
    line of code and looking at it row by row. This means that when it finds the "THEN,"
    it will stop reading that line and carry on with whatever follows after. This
    is why the two ways of writing this statement are called different programming
    languages: BASIC or Visual Basic.


    ```

    PRINT "Hello World"

    PRINT "Hello world"

    PRINT "Hello, World"

    END

    ```


    A question that was asked earlier about programs such as this was why we needed
    to put line numbers after the first line. As you''ve seen, the program is written
    to read each line of code from left to right. The computer can therefore read
    the lines in any order it wants. Often programmers find it more convenient to
    use line numbers to know exactly where they are in the overall program.


    ## Textboxes


    Most Visual Basic programs will contain many lines of code. Sometimes you want
    to refer to a particular line, or you might mean something in particular within
    the program. For example, you might want to refer back to a specific part of the
    program, or you might want to display a list of some sort. Textboxes are one way
    of doing this. They allow you to write text as if it was part of your code and
    be able to access it later on by using the commands such as "PRINT", "PRINTA"
    and so on, which were described above.


    ## Chapter 9. What Are Program Statements?


    Program statements are the individual instructions that you, as the programmer,
    give to your computer.


    Code is often written in a programming language. A programming language is a set
    of symbols and rules used to create commands for computers to execute. Each line
    of code in a program statement needs to be spaced out with one space between each
    word and wrapped at 80 characters so the code can be easily read by humans and
    machines alike.


    We all know how frustrating it can be when you want something done but don''t
    know how or where to start. I''ll take you from the beginning, explaining everything
    you need to know to create your programs. I''ll show you how to write, compile
    and run a program. Each section will give you another skill, which will build
    on the previous skills and knowledge and give you an ever-increasing understanding
    of programming.


    I want to make programming easy for beginners just like me! You see, I started
    my first programming course at university with absolutely no prior experience
    in coding whatsoever. I had no idea what the lecturer was talking about or how
    he expected us to do our coursework. This frustration led me on a mission to find
    out how others had been taught programming or how they had learned themselves,
    and what difficulties they had come across. I found out that many people started
    learning by themselves as well, but they quickly became defeated and stumbled
    across a difficult hurdle. This hurdle is what I''m here to help you get over.


    So let''s get coding!


    ### What is a Program?


    A computer program is simply a list of instructions for the computer to follow,
    just like any other list. You can have shopping lists, day-to-day tasks, or even
    schoolwork - it all has the same common feature; they''re all lists of things
    to do. These instructions are called "statements," and each statement in your
    program will help tell the computer how to accomplish your task.


    Some statements are simple, such as writing one letter to the screen, whereas
    other statements are more complex and include lots of things, all happening simultaneously!


    Our main program will be called ''Program.BAS,'' so it needs a unique name. It
    must also be saved in its folder called ''Videos,'' and the file extension must
    be ''.BAS.'' Without this, you won''t be able to run your program.


    All of these factors need to match, or else your program can''t run correctly
