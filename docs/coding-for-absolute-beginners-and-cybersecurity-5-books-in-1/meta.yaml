- md: "## Final methods\n\nThe final keyword is used to prevent a method from being\
    \ changed by subclasses.\n\n## Final classes\n\nThe final modifier is used to\
    \ prevent other classes from inheriting any feature from the class declared as\
    \ a final class.\n\n## Static—used to create class methods or variables.\n\nYou\
    \ can use this keyword to create a unique variable (called a static variable or\
    \ class variable) that will exist independently from other instances of the class.\
    \ You cannot declare a local variable as static.\n\nYou can also use the static\
    \ keyword to create a method (called a static method or class method) that will\
    \ exist independently from other instances of the class. Static methods recognize\
    \ and work only on data from the arguments given without considering variables.\n\
    \nYou may access class methods and class variables by writing the variable or\
    \ method name after the class name and a dot (.).\n\n## Abstract—used to create\
    \ abstract methods or classes\n\n### Abstract class\n\nWhen a class is declared\
    \ as abstract, it means that you will never be able to instantiate the class.\
    \ The only reason for declaring a class as abstract is to extend the class. You\
    \ cannot declare a class to be both final and abstract, as you can’t possibly\
    \ extend a final class. A class that uses abstract methods will have to be declared\
    \ as abstract. Failure to do so will result in compile errors.\n\n### Abstract\
    \ method\n\nAs it is declared with no implementation, an abstract method derives\
    \ its methods body from the subclass. Abstract methods cannot be declared as strict\
    \ or final. Unless it is also an abstract class, a class extending an abstract\
    \ class must adopt the abstract methods of the superclass. A class that contains\
    \ at least one abstract method should be declared as an abstract class. On the\
    \ other hand, an abstract class need not have abstract methods.\n\n```java\nabstract\
    \ class Car {\n    private double price;\n    private String type;\n    private\
    \ String year;\n    public abstract void goFast(); // abstract method\n    public\
    \ abstract void changeColor();\n}\n```\n\nExample:\n\n## Synchronized\n\nThe synchronized\
    \ modifier is used to indicate that only one thread can access a method at any\
    \ given time. You can use this keyword with any access level modifier.\n\n```java\n\
    public synchronized void showInfo() {\n    ......\n}\n```\n\nExample:\n\n## Volatile\n\
    \nThis keyword is used to indicate that a thread accessing a volatile variable\
    \ should merge its private copy with the master copy stored in memory. In effect,\
    \ it synchronizes all cached copies of the variable with the main memory. You\
    \ may only use this modifier to define instance variables of the private or object\
    \ type.\n\n```java\npublic class MyRunnable implements Runnable {\n    private\
    \ volatile boolean active;\n\n    public void run() {\n        active = true;\n\
    \        while (active) { // line 1\n            // code here\n        }\n   \
    \ }\n\n    public void stop() {\n        active = false; // line 2\n    }\n}\n\
    ```\n\nExample:\n\n## Transient\n\nThe keyword transient is used to tell the compiler\
    \ to skip an instance variable when it is serializing the object that contains\
    \ the marked variable.\n\n```java\npublic transient int limit = 50; // will not\
    \ persist\n```\n\nExample:\n\n## Chapter 8. Decision Making and Loop Control\n\
    \nThe decision making structures are used in situations where a set of instructions\
    \ have to be executed if the condition is true and another set of instructions\
    \ have to be executed when the condition is determined to be false. There are\
    \ several constructs available in Java for programming such scenarios. These structures\
    \ include—\n\n### If statement\n\nThis statement is used in situations where a\
    \ condition needs to be tested, and if the condition is found true, the block\
    \ of code that follows this statement needs to be executed. The syntax for this\
    \ construct is—\n\n```java\nif(condition){\n/*Body*/\n}\n```\n\nSample implementation\
    \ for this construct is given below—\n\n```java\npublic class ifDemo {\n    public\
    \ static void main(String args[]) {\n        int i = 10;\n        int j = 1;\n\
    \        if(i>j){\n            System.out.print(i);\n        }\n    }\n}\n```\n\
    \n### If else statement\n\nThis statement is used in situations where a condition\
    \ needs to be tested, and if the condition is found true, the block of code that\
    \ follows this statement needs to be executed else the block of code that follows\
    \ the else statement is executed. The syntax for this construct is—\n\n```java\n\
    if(condition){\n/*Body*/\n}\nelse{\n/*Body*/\n}\n```\n\nSample implementation\
    \ for this construct is given below—\n\n```java\npublic class ifElseDemo {\n \
    \   public static void main(String args[]) {\n        int i = 1;\n        int\
    \ j = 0;\n        if(i>j){\n            System.out.print(i);\n        }\n    \
    \    else{\n            System.out.print(j);\n        }\n    }\n}\n```\n\n###\
    \ Nested if statement\n\nThis statement is used in situations where a condition\
    \ needs to be tested, and if the condition is found true, the block of code that\
    \ follows this statement needs to be executed else the next condition is tested.\
    \ If this condition is found true, the block of code corresponding to the if statement\
    \ for this condition is executed. If none of the conditions are found true, the\
    \ block of code that follows the else statement is executed. Multiple conditions\
    \ can be tested using the nested if statements. The syntax for this construct\
    \ is—\n\n```java\nif(condition1) {\n/*Body*/\n}\nelse if (condition2) {\n/*Body*/\n\
    }\nelse {\n/*Body*/\n}\n```\n\nSample implementation for this construct is given\
    \ below—\n\n```java\npublic class nestedIfDemo {\n    public static void main(String\
    \ args[]) {\n        int i = 0;\n        int j = 0;\n        if(i>j){\n      \
    \      System.out.print(i);\n        }\n        else if(j>i) {\n            System.out.print(j);\n\
    \        }\n        else {\n            System.out.print(\"Equal\");\n       \
    \ }\n    }\n}\n```\n\n### Switch\n\nIf you have a variable and different blocks\
    \ of code need to be executed for different values of that variable, the ideal\
    \ construct that can be used is the switch statement. The syntax for this construct\
    \ is—\n\n```java\nswitch(variable){\n    case <value1>:\n        /*body*/\n  \
    \      break;\n    case <value2>:\n        /*body*/\n        break;\n    case\
    \ <value3>:\n        /*body*/\n        break;\n    default:\n        /*body*/\n\
    \        break;\n}\n```\n\nSample implementation for this construct is given below—\n\
    \n```java\npublic class switchDemo {\n    public static void main(String args[])\
    \ {\n        int i = 5;\n        switch (i) {\n            case 0:\n         \
    \       System.out.print(0);\n                break;\n            case 2:\n  \
    \              System.out.print(2);\n                break;\n            case\
    \ 5:\n                System.out.print(5);\n                break;\n         \
    \   default:\n                System.out.print(999);\n                break;\n\
    \        }\n    }\n}\n```\n\n### Conditional Operator\n\nJava also supports the\
    \ conditional operator, which is also known as the ?: operator. This operator\
    \ is used to replace the ‘if else’ construct. Its syntax is as follows—\n\nExpression1\
    \ ? Expression2 : Expression3\n\nHere, Expression1 is the condition that is to\
    \ be tested. If the condition is true, Expression2 is executed else Expression3\
    \ is executed.\n\n## Loop Control\n\nThere are several situations that require\
    \ you to iterate the same set of instructions a number of times. For instance,\
    \ if you need to sort a set of numbers, you will need to scan and rearrange the\
    \ set several times to get the desired arrangement. This flow of execution is\
    \ known as loop control.\n\nSimply, a loop is a construct that allows the execution\
    \ of a block of code many times. Java supports several constructs that can be\
    \ used for implementing loops. These include a while loop, for loop, and do while\
    \ loop.\n\nA while loop executes a block of code iteratively until the condition\
    \ specified for the while loop is true. The moment this condition fails, while\
    \ loop stops.\n\nFor loop allows the programmer to manipulate the condition and\
    \ loop variable in the same construct. Therefore, you can initialize a loop variable,\
    \ increment/decrement it, and run the loop until a condition on this variable\
    \ is true.\n\nDo while loop is similar to while loop. However, in the while loop,\
    \ the condition is checked before executing the block code. On the other hand,\
    \ in a do while loop, the block of code is executed, and then the condition is\
    \ checked. If the condition is satisfied, the loop execution is again initiated\
    \ else the loop is terminated. It would not be wrong to state that the do while\
    \ loop, once implemented, will execute at least once."
  mdcn: "## Final 方法\n\n`final` 关键字用于防止方法被子类修改。\n\n## Final 类\n\n`final` 修饰符用于防止其他类从声明为\
    \ final 的类中继承任何特性。\n\n## Static——用于创建类方法或变量。\n\n你可以使用此关键字创建一个独立于类其他实例存在的唯一变量（称为静态变量或类变量）。你不能将局部变量声明为\
    \ static。\n\n你也可以使用 `static` 关键字创建一个独立于类其他实例存在的方法（称为静态方法或类方法）。静态方法仅识别并处理给定参数中的数据，而不考虑变量。\n\
    \n你可以通过在类名后加上点号（`.`）再写变量或方法名来访问类方法和类变量。\n\n## Abstract——用于创建抽象方法或类\n\n### 抽象类\n\
    \n当一个类被声明为抽象类时，意味着你将永远无法实例化该类。将类声明为抽象类的唯一原因是为了扩展该类。你不能将一个类同时声明为 final 和 abstract，因为你不可能扩展一个\
    \ final 类。使用抽象方法的类必须被声明为抽象类。否则将导致编译错误。\n\n### 抽象方法\n\n由于抽象方法没有实现，其方法体派生自子类。抽象方法不能被声明为\
    \ strict 或 final。除非它本身也是一个抽象类，否则扩展抽象类的类必须采用超类的抽象方法。包含至少一个抽象方法的类应被声明为抽象类。另一方面，抽象类不一定需要有抽象方法。\n\
    \n```java\nabstract class Car {\n    private double price;\n    private String\
    \ type;\n    private String year;\n    public abstract void goFast(); // abstract\
    \ method\n    public abstract void changeColor();\n}\n```\n\n示例：\n\n## Synchronized\n\
    \n`synchronized` 修饰符用于指示在任何给定时间只有一个线程可以访问一个方法。你可以将此关键字与任何访问级别修饰符一起使用。\n\n```java\n\
    public synchronized void showInfo() {\n    ......\n}\n```\n\n示例：\n\n## Volatile\n\
    \n此关键字用于指示访问 volatile 变量的线程应将其私有副本与存储在内存中的主副本合并。实际上，它将变量的所有缓存副本与主内存同步。你只能使用此修饰符来定义私有或对象类型的实例变量。\n\
    \n```java\npublic class MyRunnable implements Runnable {\n    private volatile\
    \ boolean active;\n\n    public void run() {\n        active = true;\n       \
    \ while (active) { // line 1\n            // code here\n        }\n    }\n\n \
    \   public void stop() {\n        active = false; // line 2\n    }\n}\n```\n\n\
    示例：\n\n## Transient\n\n`transient` 关键字用于告诉编译器在序列化包含标记变量的对象时跳过该实例变量。\n\n```java\n\
    public transient int limit = 50; // will not persist\n```\n\n示例：\n\n## 第8章 决策与循环控制\n\
    \n决策结构用于这样的情景：当条件为真时执行一组指令，而当条件为假时执行另一组指令。Java 中有几种可用于编程此类场景的结构。这些结构包括——\n\n###\
    \ If 语句\n\n此语句用于需要测试一个条件的情景，如果条件为真，则执行此语句之后的代码块。此结构的语法为——\n\n```java\nif(condition){\n\
    /*Body*/\n}\n```\n\n此结构的示例实现如下——\n\n```java\npublic class ifDemo {\n    public\
    \ static void main(String args[]) {\n        int i = 10;\n        int j = 1;\n\
    \        if(i>j){\n            System.out.print(i);\n        }\n    }\n}\n```\n\
    \n### If else 语句\n\n此语句用于需要测试一个条件的情景，如果条件为真，则执行此语句之后的代码块，否则执行 else 语句之后的代码块。此结构的语法为——\n\
    \n```java\nif(condition){\n/*Body*/\n}\nelse{\n/*Body*/\n}\n```\n\n此结构的示例实现如下——\n\
    \n```java\npublic class ifElseDemo {\n    public static void main(String args[])\
    \ {\n        int i = 1;\n        int j = 0;\n        if(i>j){\n            System.out.print(i);\n\
    \        }\n        else{\n            System.out.print(j);\n        }\n    }\n\
    }\n```\n\n### 嵌套 if 语句\n\n此语句用于需要测试一个条件的情景，如果条件为真，则执行此语句之后的代码块，否则测试下一个条件。如果此条件为真，则执行此条件对应的\
    \ if 语句的代码块。如果所有条件都不为真，则执行 else 语句之后的代码块。可以使用嵌套 if 语句测试多个条件。此结构的语法为——\n\n```java\n\
    if(condition1) {\n/*Body*/\n}\nelse if (condition2) {\n/*Body*/\n}\nelse {\n/*Body*/\n\
    }\n```\n\n此结构的示例实现如下——\n\n```java\npublic class nestedIfDemo {\n    public static\
    \ void main(String args[]) {\n        int i = 0;\n        int j = 0;\n       \
    \ if(i>j){\n            System.out.print(i);\n        }\n        else if(j>i)\
    \ {\n            System.out.print(j);\n        }\n        else {\n           \
    \ System.out.print(\"Equal\");\n        }\n    }\n}\n```\n\n### Switch\n\n如果你有一个变量，并且需要为该变量的不同值执行不同的代码块，那么理想的选择是使用\
    \ switch 语句。此结构的语法为——\n\n```java\nswitch(variable){\n    case <value1>:\n    \
    \    /*body*/\n        break;\n    case <value2>:\n        /*body*/\n        break;\n\
    \    case <value3>:\n        /*body*/\n        break;\n    default:\n        /*body*/\n\
    \        break;\n}\n```\n\n此结构的示例实现如下——\n\n```java\npublic class switchDemo {\n\
    \    public static void main(String args[]) {\n        int i = 5;\n        switch\
    \ (i) {\n            case 0:\n                System.out.print(0);\n         \
    \       break;\n            case 2:\n                System.out.print(2);\n  \
    \              break;\n            case 5:\n                System.out.print(5);\n\
    \                break;\n            default:\n                System.out.print(999);\n\
    \                break;\n        }\n    }\n}\n```\n\n### 条件运算符\n\nJava 还支持条件运算符，也称为\
    \ ?: 运算符。此运算符用于替代 'if else' 结构。其语法如下——\n\n表达式1 ? 表达式2 : 表达式3\n\n这里，表达式1 是要测试的条件。如果条件为真，则执行表达式2，否则执行表达式3。\n\
    \n## 循环控制\n\n有许多情况需要你多次迭代同一组指令。例如，如果你需要对一组数字进行排序，你将需要多次扫描和重新排列这组数字以获得所需的排列。这种执行流程称为循环控制。\n\
    \n简单来说，循环是一种允许多次执行代码块的结构。Java 支持多种可用于实现循环的结构。这些包括 while 循环、for 循环和 do while 循环。\n\
    \nwhile 循环会迭代执行一个代码块，直到为 while 循环指定的条件为真。一旦此条件不满足，while 循环就会停止。\n\nfor 循环允许程序员在同一个结构中操作条件和循环变量。因此，你可以初始化一个循环变量，对其进行递增/递减，并在此变量满足条件之前运行循环。\n\
    \ndo while 循环类似于 while 循环。然而，在 while 循环中，条件是在执行代码块之前检查的。另一方面，在 do while 循环中，代码块先被执行，然后检查条件。如果条件满足，则再次启动循环执行，否则终止循环。可以说，do\
    \ while 循环一旦实现，至少会执行一次。"
