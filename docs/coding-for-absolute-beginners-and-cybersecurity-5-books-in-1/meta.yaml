- md: "## Loop statements\n\nThere are two keywords that are specifically used in\
    \ connection with loops and are also termed as control statements as they allow\
    \ transfer of control from one section of the code to a different section. These\
    \ keywords are—\n\n### Break\n\nThis keyword is used inside the loop at a point\
    \ where you want the execution flow to terminate the loop and directly start execution\
    \ from the first instruction that appears after the loop.\n\n### Continue\n\n\
    This keyword is used inside the loop at a point where the programmer wants the\
    \ computer to overlook the rest of the loop and move the control to the first\
    \ statement of the loop.\n\nIn order to help you understand how loops are executed,\
    \ let us take an example and implement it using all the three types of loop control.\n\
    \n### For Loop Implementation\n\n```java\npublic class forDemo {\n    public static\
    \ void main(String args[]) {\n        int [] numberArray = {100, 300, 500, 700,\
    \ 900};\n        for(int i=0; i<5; i++) {\n            System.out.print(numberArray[i]);\n\
    \            System.out.print(\"\");\n        }\n        System.out.print(\"\\\
    n\");\n    }\n}\n```\n\n### While Loop Implementation\n\n```java\npublic class\
    \ whileDemo {\n    public static void main(String args[]) {\n        int [] numberArray\
    \ = {100, 300, 500, 700, 900};\n        int i = 0;\n        while(i<5) {\n   \
    \         System.out.print(numberArray[i]);\n            System.out.print(\",\"\
    );\n            i++;\n        }\n        System.out.print(\"\\n\");\n    }\n}\n\
    ```\n\n### Do While Loop Implementation\n\n```java\npublic class doWhileDemo {\n\
    \    public static void main(String args[]) {\n        int [] numberArray = {100,\
    \ 300, 500, 700, 900};\n        int i = 0;\n        do {\n            System.out.print(numberArray[i]);\n\
    \            System.out.print(\",\");\n            i++;\n        } while (i<5);\n\
    \        System.out.print(\"\\n\");\n    }\n}\n```\n\n### Enhanced For Loop\n\n\
    Java also supports an enhanced loop structure, which can be used for array elements.\
    \ The syntax for this loop construct is—\n\n```java\nfor(declaration : expression)\
    \ {\n/*Body*/\n}\n```\n\nThe declaration part of the Enhanced for loop is used\
    \ to declare a variable. This variable shall be local to the ‘for loop’ and must\
    \ have the same type as the type of the array elements. The current value of the\
    \ variable is always equal to the array element that is being traversed in the\
    \ loop. The expression is an array or a method call that returns an array.\n\n\
    Sample implementation of the enhanced for loop has been given below -\n\n```java\n\
    public class forArrayDemo {\n    public static void main(String args[]) {\n  \
    \      int [] numberArray = {100, 300, 500, 700, 900};\n        for(int i : numberArray\
    \ ) {\n            System.out.print( i );\n            System.out.print(\",\"\
    );\n        }\n        System.out.print(\"\\n\");\n    }\n}\n```\n\n### Exception\
    \ Hierarchy\n\nJava has an inbuilt class named java.lang.Exception and all the\
    \ exceptions fall under this class. All the exception classes are subclasses of\
    \ this class. Moreover, the Throwable class is the superclass of the exception\
    \ class. Another subclass of the Throwable class is the Error class. All the errors\
    \ like stack overflow described above fall under this Error class.\n\nThe Exception\
    \ class has two subclasses, namely RuntimeException class and IOException class.\
    \ A list of the methods, for which definitions are available in Java, as part\
    \ of the Throwable class, is given below.\n\n```java\npublic String getMessage()\n\
    ```\n\nWhen called, this message returns a detailed description of the exception\
    \ that has been encountered.\n\n```java\npublic Throwable getCause()\n```\n\n\
    This method, when called returns a message that contains the cause of the exception.\n\
    \n```java\npublic String toString()\n```\n\nThis method returns the detailed description\
    \ of the exception concatenated with the name of the class.\n\n```java\npublic\
    \ void printStackTrace()\n```\n\nThe result of toString(), along with a trace\
    \ of the stack, can be printed to the standard error stream, System.err, can be\
    \ done by calling this method.\n\n```java\npublic StackTraceElement [] getStackTrace()\n\
    ```\n\nThere may be some scenarios where you may need to access different elements\
    \ of the stack trace. This method returns an array, with each element of the stack\
    \ trace saved to different elements of the array. The first element of the array\
    \ contains the top element of the stack trace, while the bottom of the stack trace\
    \ is saved to the last element of the array.\n\n```java\npublic Throwable fillInStackTrace()\n\
    ```\n\nAppends the previous information in the stack trace with the current contents\
    \ of the stack trace and returns the same as an array.\n\n### Catching Exceptions\n\
    \nThe standard method to catch an exception is using the ‘try and catch’ keywords\
    \ along with their code implementations. This try and catch block needs to be\
    \ implemented in such a manner that it encloses the code that is expected to raise\
    \ an exception. It is also important to mention here that the code that is expected\
    \ to raise an exception is termed as protected code. The syntax for try and catch\
    \ block implementation is as follows—\n\n```java\ntry {\n    /*Protected code*/\n\
    } catch(ExceptionName exc1) {\n    /*Catch code*/\n}\n```\n\nThe code that is\
    \ expected to raise an exception is placed inside the try block. If the exception\
    \ is raised, then the corresponding action to be performed for exception handling\
    \ is implemented in the catch block. It is imperative for every try block to either\
    \ have a catch block or a final block.\n\nAs part of the catch statement, the\
    \ exception, which is expected to be raised needs to be declared. In the event\
    \ that an exception occurs, the execution is transferred to the catch block. If\
    \ the raised exception matches the exception defined in the catch block, the catch\
    \ block is executed.\n\nA sample implementation of the try and catch block is\
    \ given below. The code implements an array with 2 elements. However, the code\
    \ tries to access the third element, which does not exist. As a result, an exception\
    \ is raised.\n\n```java\nimport java.io.*;\n\npublic class demoException {\n \
    \   public static void main(String args[]) {\n        try {\n            int arr[]\
    \ = new int[2];\n            System.out.println(\"Accesing the 3rd element of\
    \ the array:\" + arr[3]);\n        } catch(ArrayIndexOutOfBoundsException exp)\
    \ {\n            System.out.println(\"Catching Exception:\" + exp);\n        }\n\
    \        System.out.println(\"Reached outside catch block\");\n    }\n}\n```\n\
    \n### Implementing Multiple Catch Blocks\n\nA block of code may lead to multiple\
    \ exceptions. In order to cater for this requirement, implementation of multiple\
    \ catch blocks is also allowed. The syntax for such implementation is given below.\n\
    \n```java\ntry {\n    /*Protected Code*/\n} catch(ExpType1 exp1) {\n    /*Catch\
    \ block 1*/\n} catch(ExpType2 exp2) {\n    /*Catch block 2*/\n} catch(ExpType3\
    \ exp3) {\n    /*Catch block 3*/\n}\n```\n\nThe syntax shown above has illustrated\
    \ the implementation of three catch blocks. However, you can implement as many\
    \ catch blocks as you want. When this code is executed, the protected is executed.\
    \ If an exception occurs, the type of exception is matched with the exception\
    \ of the first catch block. However, if the exception type does not match, the\
    \ catch block 1 is ignored, and the exception type for the second catch block\
    \ is tried for matching. Whichever catch block has the same exception type as\
    \ that of the raised exception; the corresponding catch block is executed.\n\n\
    ## Chapter 9. ADT, Data Structure, and Java Collections\n\n### Abstract data type\
    \ (ADT)\n\nAn abstract data type (ADT) is a logical description of the data and\
    \ the operations that are allowed on it. ADT is defined as a user point of view\
    \ of a data. ADT concerns about the possible values of the data and the interface\
    \ exposed by it. ADT does not concern about the actual implementation of the data\
    \ structure.\n\nFor example, a user wants to store some integers and find their\
    \ mean value. ADT for this data structure will support two functions, one for\
    \ adding integers and other to get mean value. ADT for this data structure does\
    \ not talk about how exactly it will be implemented.\n\n![](img/d5bcf187e3573f6b3164f4d4615fafd7_306_0.png)"
  mdcn: "## 循环语句\n\n有两个关键字专门用于循环，也被称为控制语句，因为它们允许将控制权从代码的一个部分转移到另一个不同的部分。这两个关键字是——\n\
    \n### Break\n\n此关键字在循环内部使用，用于在你希望执行流程终止循环并直接从循环后的第一条指令开始执行的位置。\n\n### Continue\n\
    \n此关键字在循环内部使用，用于在程序员希望计算机忽略循环的其余部分并将控制权转移到循环的第一条语句的位置。\n\n为了帮助你理解循环是如何执行的，让我们举一个例子，并使用所有三种类型的循环控制来实现它。\n\
    \n### For 循环实现\n\n```java\npublic class forDemo {\n    public static void main(String\
    \ args[]) {\n        int [] numberArray = {100, 300, 500, 700, 900};\n       \
    \ for(int i=0; i<5; i++) {\n            System.out.print(numberArray[i]);\n  \
    \          System.out.print(\"\");\n        }\n        System.out.print(\"\\n\"\
    );\n    }\n}\n```\n\n### While 循环实现\n\n```java\npublic class whileDemo {\n   \
    \ public static void main(String args[]) {\n        int [] numberArray = {100,\
    \ 300, 500, 700, 900};\n        int i = 0;\n        while(i<5) {\n           \
    \ System.out.print(numberArray[i]);\n            System.out.print(\",\");\n  \
    \          i++;\n        }\n        System.out.print(\"\\n\");\n    }\n}\n```\n\
    \n### Do While 循环实现\n\n```java\npublic class doWhileDemo {\n    public static\
    \ void main(String args[]) {\n        int [] numberArray = {100, 300, 500, 700,\
    \ 900};\n        int i = 0;\n        do {\n            System.out.print(numberArray[i]);\n\
    \            System.out.print(\",\");\n            i++;\n        } while (i<5);\n\
    \        System.out.print(\"\\n\");\n    }\n}\n```\n\n### 增强型 For 循环\n\nJava 还支持一种增强型循环结构，可用于数组元素。此循环构造的语法是——\n\
    \n```java\nfor(declaration : expression) {\n/*Body*/\n}\n```\n\n增强型 for 循环的声明部分用于声明一个变量。此变量应局部于‘for\
    \ 循环’，并且必须与数组元素的类型相同。变量的当前值始终等于循环中正在遍历的数组元素。表达式是一个数组或返回数组的方法调用。\n\n增强型 for 循环的示例实现如下\
    \ -\n\n```java\npublic class forArrayDemo {\n    public static void main(String\
    \ args[]) {\n        int [] numberArray = {100, 300, 500, 700, 900};\n       \
    \ for(int i : numberArray ) {\n            System.out.print( i );\n          \
    \  System.out.print(\",\");\n        }\n        System.out.print(\"\\n\");\n \
    \   }\n}\n```\n\n### 异常层次结构\n\nJava 有一个名为 `java.lang.Exception` 的内置类，所有异常都属于此类。所有异常类都是此类的子类。此外，`Throwable`\
    \ 类是异常类的超类。`Throwable` 类的另一个子类是 `Error` 类。所有错误，如上文描述的栈溢出，都属于此 `Error` 类。\n\n`Exception`\
    \ 类有两个子类，即 `RuntimeException` 类和 `IOException` 类。下面列出了作为 `Throwable` 类一部分在 Java\
    \ 中定义的方法列表。\n\n```java\npublic String getMessage()\n```\n\n调用时，此消息返回遇到的异常的详细描述。\n\
    \n```java\npublic Throwable getCause()\n```\n\n调用此方法时，返回包含异常原因的消息。\n\n```java\n\
    public String toString()\n```\n\n此方法返回异常的详细描述与类名的连接。\n\n```java\npublic void printStackTrace()\n\
    ```\n\n可以通过调用此方法将 `toString()` 的结果以及堆栈跟踪打印到标准错误流 `System.err`。\n\n```java\npublic\
    \ StackTraceElement [] getStackTrace()\n```\n\n在某些情况下，你可能需要访问堆栈跟踪的不同元素。此方法返回一个数组，堆栈跟踪的每个元素都保存到数组的不同元素中。数组的第一个元素包含堆栈跟踪的顶部元素，而堆栈跟踪的底部保存到数组的最后一个元素。\n\
    \n```java\npublic Throwable fillInStackTrace()\n```\n\n将堆栈跟踪中的先前信息与当前堆栈跟踪内容连接起来，并将其作为数组返回。\n\
    \n### 捕获异常\n\n捕获异常的标准方法是使用 `try` 和 `catch` 关键字及其代码实现。此 `try` 和 `catch` 块需要以这样的方式实现：它包含预期会引发异常的代码。这里还需要提及的是，预期会引发异常的代码被称为受保护代码。`try`\
    \ 和 `catch` 块实现的语法如下——\n\n```java\ntry {\n    /*Protected code*/\n} catch(ExceptionName\
    \ exc1) {\n    /*Catch code*/\n}\n```\n\n预期会引发异常的代码放在 `try` 块内。如果引发异常，则在 `catch`\
    \ 块中实现异常处理的相应操作。每个 `try` 块都必须有一个 `catch` 块或一个 `finally` 块。\n\n作为 `catch` 语句的一部分，需要声明预期引发的异常。如果发生异常，执行将转移到\
    \ `catch` 块。如果引发的异常与 `catch` 块中定义的异常匹配，则执行 `catch` 块。\n\n下面给出了 `try` 和 `catch`\
    \ 块的示例实现。该代码实现了一个包含 2 个元素的数组。但是，代码尝试访问不存在的第三个元素。结果，引发了一个异常。\n\n```java\nimport\
    \ java.io.*;\n\npublic class demoException {\n    public static void main(String\
    \ args[]) {\n        try {\n            int arr[] = new int[2];\n            System.out.println(\"\
    Accesing the 3rd element of the array:\" + arr[3]);\n        } catch(ArrayIndexOutOfBoundsException\
    \ exp) {\n            System.out.println(\"Catching Exception:\" + exp);\n   \
    \     }\n        System.out.println(\"Reached outside catch block\");\n    }\n\
    }\n```\n\n### 实现多个 Catch 块\n\n一段代码可能导致多个异常。为了满足此要求，也允许实现多个 `catch` 块。此类实现的语法如下。\n\
    \n```java\ntry {\n    /*Protected Code*/\n} catch(ExpType1 exp1) {\n    /*Catch\
    \ block 1*/\n} catch(ExpType2 exp2) {\n    /*Catch block 2*/\n} catch(ExpType3\
    \ exp3) {\n    /*Catch block 3*/\n}\n```\n\n上面显示的语法说明了三个 `catch` 块的实现。但是，你可以根据需要实现任意数量的\
    \ `catch` 块。当执行此代码时，受保护的代码被执行。如果发生异常，则将异常类型与第一个 `catch` 块的异常进行匹配。但是，如果异常类型不匹配，则忽略\
    \ `catch` 块 1，并尝试匹配第二个 `catch` 块的异常类型。哪个 `catch` 块与引发的异常具有相同的异常类型；就执行相应的 `catch`\
    \ 块。\n\n## 第 9 章. ADT、数据结构和 Java 集合\n\n### 抽象数据类型 (ADT)\n\n抽象数据类型 (ADT) 是对数据及其允许操作的逻辑描述。ADT\
    \ 被定义为用户对数据的视角。ADT 关注数据的可能值及其暴露的接口。ADT 不关心数据结构的实际实现。\n\n例如，用户想要存储一些整数并找到它们的平均值。此数据结构的\
    \ ADT 将支持两个函数，一个用于添加整数，另一个用于获取平均值。此数据结构的 ADT 不讨论它将如何具体实现。\n\n![](img/d5bcf187e3573f6b3164f4d4615fafd7_306_0.png)"
