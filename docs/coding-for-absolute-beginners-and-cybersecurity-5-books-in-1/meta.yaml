    \ mentioned previously.\n\nThe program below will show the address of a variable:\n\
    \n```\n#include <stdio.h>\n\nint main()\n{\n    int var;\n    printf(\"The address\
    \ is: %x\\n\", &var);\n    return 0;\n}\n```\n\nOutput:\n\n> > The address is:\
    \ 10ffa2c\n\nNote: This will be different almost every time you run\n\nNote the\
    \ highlighted statement, the ‘&’ (Reference Operator) is used to return the memory\
    \ location of the variable and allows certain statements to access the data in\
    \ that location. The ‘%x’ is used because a memory location is in hexadecimal.\n\
    \nTo create a pointer, we use the dereferencing operator (*), this will create\
    \ a pointer variable that is designed to hold a memory locations address. Below\
    \ is a program that creates a pointer and uses reference operator (&) to store\
    \ another regular variable’s address in the newly created pointer. The dereferencing\
    \ operator (*) is also used to access or change the actual data in that memory\
    \ location."
