- md: "## Chapter 7 STL Algorithm\n\nThe STL algorithms are found in `<algorithms>`\
    \ header file, so we need to include it in our program.\n\nThe algorithms can\
    \ be classified as:\n\n- Non-modifying algorithms: e.g. for each, count, search\
    \ etc.\n- Modifying algorithms: e.g copy, transform, etc.\n- Removing algorithms:\
    \ remove, remove if, etc.\n- Mutating algorithms: reverse, rotate, etc.\n- Sorting\
    \ algorithms: sort, partial sort, etc.\n- Sorted range algorithms: binary search,\
    \ merge, etc.\n- Numeric algorithms: accumulate, partial sum, inner product, etc.\n\
    \nThe following example shows how the `sort()` function works on arrays.\n\nProgram\
    \ 13.11: sorting of array using sort algorithm\n\n```cpp\n#include <iostream>\n\
    #include <algorithm>\nusing namespace std;\n\nint main()\n{\n    int a[] = {3,5,7,2,9};\n\
    \    sort(a, a + 5);\n    cout << \"Sorted Array:\" << endl;\n    for (int i =\
    \ 0; i < 5; i++)\n        cout << a[i] << \" \";\n    return 0;\n}\n```\n\nOutput:\n\
    Sorted Array:\n2 3 5 7 9\n\nIn the example above, when we pass array name `a`\
    \ as an argument, we are telling the function to sort from the beginning of the\
    \ array. If we wanted it to start the sort at the third element of the array,\
    \ we can use,\n\n```cpp\nsort(a+3, a+5);\n```\n\nWe have used `a+5` for the second\
    \ argument, which specifies that we want to sort up to the last element in the\
    \ array.\n\nNow similar `sort()` function can work with vector container as shown\
    \ in following program. This shows that STL algorithms are generic.\n\nProgram\
    \ 13.12: Sorting of vector using sort algorithm\n\n```cpp\n#include <iostream>\n\
    #include <algorithm>\n#include <vector>\nusing namespace std;\n\nint main()\n\
    {\n    int a[] = {5,3,7,6,2,9};\n    vector<int> v(a, a+6);\n    sort(v.begin(),\
    \ v.end());\n    for (int i = 0; i != v.size(); i++)\n        cout << v[i] <<\
    \ \" \";\n    cout << endl;\n    return 0;\n}\n```\n\nOutput: 2 3 5 6 7 9\n\n\
    As you can see, the sorting function works almost the same as on an array. The\
    \ first parameter in `sort()` accepts an iterator to the first element using `begin()`\
    \ as it returns an iterator to the first element. So it will start sorting at\
    \ the first element in the vector. Same way `end()` returns an iterator that points\
    \ to 1 past the last element in the container. Note that sort function sorts up\
    \ to but not including what we pass as the second parameter.\n\n`find()` and `count()`\
    \ algorithm\n\n`find()` algorithm is helpful to find a particular value from the\
    \ container. `count()` is used to count how many times a particular value appears\
    \ in container.\n\nProgram 13.13: Finding value from vector using find algorithm\n\
    \n```cpp\n#include <iostream>\n#include <algorithm>\n#include <vector>\nusing\
    \ namespace std;\n\nint main()\n{\n    vector<int> v;\n    for(int i = 0; i <\
    \ 10; i++)\n        v.push_back(i);\n    int a = 5;\n    vector<int>::iterator\
    \ it;\n    it = find(v.begin(), v.end(), a);\n    if(it != v.end()) {\n      \
    \  cout << \"found \" << a << endl;\n    }\n    else {\n        cout << \"could\
    \ not find \" << a << endl;\n    }\n    int c = count(v.begin(), v.end(), 6);\n\
    \    cout << \"Number of 6 stored in vector:\" << c;\n    return 0;\n}\n```\n\n\
    Output: found 5\nNumber of 6 stored in vector: 1\n\n`for_each()`\n\nThis algorithm\
    \ applies a specified function object to each element in a container. Original\
    \ values in container will not change, but it is used for display modified elements.\
    \ It takes the first two arguments as the start and end range. The third argument\
    \ is an address of a function object.\n\nFor example, `for_each()` algorithm squares\
    \ all elements of the array and displays them.\n\nProgram 13.14: To square all\
    \ elements of array using for each algorithm\n\n```cpp\n#include <iostream>\n\
    #include <vector>\n#include <algorithm>\nusing namespace std;\n\nvoid square(int\
    \ a)\n{\n    cout << a*a << endl;\n}\n\nint main()\n{\n    int s[] = {1,2,3,4};\n\
    \    for_each(s, s+4, square);\n    return 0;\n}\n```\n\nOutput:\n1\n4\n9\n16\n\
    \n## Chapter 8 Library Functions\n\n## Library functions and user-defined functions\
    \ in C++\n\n### Learning objective\n\nAfter completing this topic, you should\
    \ be able to give a brief account of library functions and user-defined functions\
    \ in C++.\n\n### 1. Incorporation of library functions\n\nThe C++ programmer has\
    \ access to a large selection of library functions.\n\nYou can use any function\
    \ in the library by simply including the name of the header file that contains\
    \ the appropriate function prototype.\n\nGenerally, library functions are specified\
    \ in a pair of files.\n\nThe function definition is contained in a source file\
    \ that usually has a `.c` or `.cpp` file extension.\n\n### Note\n\nUsually, you\
    \ are not supplied with the source code for library functions with a compiler.\n\
    \nInstead, you are supplied with precompiled object files that can be linked to\
    \ your program.\n\nThe function prototype is contained in a header file, which\
    \ may be distinguished by an `.h`, `.hpp`, or `.hxx` file extension.\n\n### Note\n\
    \nHeader files also contain definitions of various data types and constants needed\
    \ by those functions.\n\nThough not mandatory, it's a good idea to organize your\
    \ own functions in the same way as supplied library functions.\n\nThis allows\
    \ you to use the functions in more than one program without having to respecify\
    \ the code.\n\nIn order to call library functions in a program, you must specify\
    \ the header file that contains the appropriate function prototype.\n\nThis is\
    \ usually done at the beginning of a source file.\n\nBut it must be done before\
    \ the function is used by the program.\n\nHeader files can be included in a program\
    \ by using the `#include` preprocessor directive.\n\nThis tells the preprocessor\
    \ to open the named header file and insert its contents where the `#include` statement\
    \ appears.\n\n```cpp\n#include <string>\n#include \"myfuncs.h\"\n```\n\nYou can\
    \ name files in an `#include` statement in two ways, that is in double quotes\
    \ or in angle brackets (`<>`).\n\nFilenames in angle brackets tell the preprocessor\
    \ to look through a search path specified in the environment.\n\n```cpp\n#include\
    \ <string>\n#include \"myfuncs.h\"\n```\n\nFilenames in double quotes tell the\
    \ preprocessor to search the current directory first, then the specified search\
    \ path.\n\nAn error is reported if a file cannot be found.\n\n```cpp\n#include\
    \ <string>\n#include \"myfuncs.h\"\n```\n\nThe linker always searches for the\
    \ compiled versions of any functions specified in an included header file.\n\n\
    ### Available files\n\nThe C standard library provides a collection of functions\
    \ for performing common tasks such as:\n\n- String handling\n- Character and type\
    \ conversion\n- Mathematics\n- Input and output\n\nA wide variety of C++ library\
    \ files are also available.\n\nThe ANSI standard for C++ libraries was ratified\
    \ in 1998.\n\nThe `iostream` file is probably the most common and generic of all\
    \ C++ library files.\n\nMost C++ programs include this header file.\n\nThe `iostream`\
    \ file provides a large range of input/output functions and other I/O stream information.\n\
    \nFor example, this is where `cin` and `cout` data and functions are prototyped.\n\
    \n### Note\n\nC++ I/O occurs in streams of bytes, where a stream is simply a sequence\
    \ of bytes.\n\nThere are many variations of C++ libraries available to programmers.\n\
    \nAnd these libraries originate from a number of sources.\n\nFor example, some\
    \ libraries come with C++ application development software.\n\nC++ function libraries\
    \ may also be supplied by sources such as device driver manufacturers, and C++\
    \ programming web sites and bulletin boards."
  mdcn: "## 第7章 STL算法\n\nSTL算法位于`<algorithms>`头文件中，因此我们需要在程序中包含它。\n\n这些算法可以分为：\n\n\
    - 非修改算法：例如 `for_each`、`count`、`search` 等。\n- 修改算法：例如 `copy`、`transform` 等。\n-\
    \ 删除算法：`remove`、`remove_if` 等。\n- 变换算法：`reverse`、`rotate` 等。\n- 排序算法：`sort`、`partial_sort`\
    \ 等。\n- 已排序范围算法：`binary_search`、`merge` 等。\n- 数值算法：`accumulate`、`partial_sum`、`inner_product`\
    \ 等。\n\n以下示例展示了 `sort()` 函数如何对数组进行操作。\n\n程序 13.11：使用排序算法对数组进行排序\n\n```cpp\n#include\
    \ <iostream>\n#include <algorithm>\nusing namespace std;\n\nint main()\n{\n  \
    \  int a[] = {3,5,7,2,9};\n    sort(a, a + 5);\n    cout << \"Sorted Array:\"\
    \ << endl;\n    for (int i = 0; i < 5; i++)\n        cout << a[i] << \" \";\n\
    \    return 0;\n}\n```\n\n输出：\nSorted Array:\n2 3 5 7 9\n\n在上面的例子中，当我们传递数组名 `a`\
    \ 作为参数时，我们是在告诉函数从数组的开头开始排序。如果我们想从数组的第三个元素开始排序，可以使用：\n\n```cpp\nsort(a+3, a+5);\n\
    ```\n\n我们使用了 `a+5` 作为第二个参数，这指定了我们希望排序到数组的最后一个元素。\n\n现在，类似的 `sort()` 函数也可以用于 `vector`\
    \ 容器，如下面的程序所示。这表明 STL 算法是通用的。\n\n程序 13.12：使用排序算法对 vector 进行排序\n\n```cpp\n#include\
    \ <iostream>\n#include <algorithm>\n#include <vector>\nusing namespace std;\n\n\
    int main()\n{\n    int a[] = {5,3,7,6,2,9};\n    vector<int> v(a, a+6);\n    sort(v.begin(),\
    \ v.end());\n    for (int i = 0; i != v.size(); i++)\n        cout << v[i] <<\
    \ \" \";\n    cout << endl;\n    return 0;\n}\n```\n\n输出：2 3 5 6 7 9\n\n如你所见，排序函数的工作方式与在数组上几乎相同。`sort()`\
    \ 的第一个参数接受一个指向第一个元素的迭代器，使用 `begin()` 因为它返回一个指向第一个元素的迭代器。所以它将从 vector 的第一个元素开始排序。同样，`end()`\
    \ 返回一个指向容器中最后一个元素之后位置的迭代器。请注意，排序函数会排序到但不包括我们作为第二个参数传递的位置。\n\n`find()` 和 `count()`\
    \ 算法\n\n`find()` 算法有助于在容器中查找特定值。`count()` 用于计算特定值在容器中出现的次数。\n\n程序 13.13：使用 find\
    \ 算法在 vector 中查找值\n\n```cpp\n#include <iostream>\n#include <algorithm>\n#include\
    \ <vector>\nusing namespace std;\n\nint main()\n{\n    vector<int> v;\n    for(int\
    \ i = 0; i < 10; i++)\n        v.push_back(i);\n    int a = 5;\n    vector<int>::iterator\
    \ it;\n    it = find(v.begin(), v.end(), a);\n    if(it != v.end()) {\n      \
    \  cout << \"found \" << a << endl;\n    }\n    else {\n        cout << \"could\
    \ not find \" << a << endl;\n    }\n    int c = count(v.begin(), v.end(), 6);\n\
    \    cout << \"Number of 6 stored in vector:\" << c;\n    return 0;\n}\n```\n\n\
    输出：found 5\nNumber of 6 stored in vector: 1\n\n`for_each()`\n\n此算法将指定的函数对象应用于容器中的每个元素。容器中的原始值不会改变，但它用于显示修改后的元素。它接受前两个参数作为起始和结束范围。第三个参数是一个函数对象的地址。\n\
    \n例如，`for_each()` 算法将数组的所有元素平方并显示它们。\n\n程序 13.14：使用 for_each 算法对数组所有元素求平方\n\n\
    ```cpp\n#include <iostream>\n#include <vector>\n#include <algorithm>\nusing namespace\
    \ std;\n\nvoid square(int a)\n{\n    cout << a*a << endl;\n}\n\nint main()\n{\n\
    \    int s[] = {1,2,3,4};\n    for_each(s, s+4, square);\n    return 0;\n}\n```\n\
    \n输出：\n1\n4\n9\n16\n\n## 第8章 库函数\n\n## C++中的库函数和用户定义函数\n\n### 学习目标\n\n完成本主题后，你应该能够简要说明C++中的库函数和用户定义函数。\n\
    \n### 1. 库函数的引入\n\nC++程序员可以使用大量的库函数。\n\n你只需包含包含相应函数原型的头文件名，就可以使用库中的任何函数。\n\n通常，库函数在一对文件中指定。\n\
    \n函数定义包含在一个源文件中，该文件通常具有 `.c` 或 `.cpp` 文件扩展名。\n\n### 注意\n\n通常，编译器不会提供库函数的源代码。\n\
    \n相反，你会获得预编译的目标文件，这些文件可以链接到你的程序中。\n\n函数原型包含在一个头文件中，该文件可能以 `.h`、`.hpp` 或 `.hxx`\
    \ 文件扩展名区分。\n\n### 注意\n\n头文件还包含这些函数所需的各种数据类型和常量的定义。\n\n虽然不是强制性的，但以与提供的库函数相同的方式组织你自己的函数是一个好主意。\n\
    \n这允许你在多个程序中使用这些函数，而无需重新指定代码。\n\n为了在程序中调用库函数，你必须指定包含相应函数原型的头文件。\n\n这通常在源文件的开头完成。\n\
    \n但它必须在程序使用该函数之前完成。\n\n可以通过使用 `#include` 预处理指令将头文件包含在程序中。\n\n这告诉预处理器打开指定的头文件并将其内容插入到\
    \ `#include` 语句出现的位置。\n\n```cpp\n#include <string>\n#include \"myfuncs.h\"\n```\n\
    \n你可以在 `#include` 语句中以两种方式命名文件，即使用双引号或尖括号（`<>`）。\n\n尖括号中的文件名告诉预处理器在环境中指定的搜索路径中查找。\n\
    \n```cpp\n#include <string>\n#include \"myfuncs.h\"\n```\n\n双引号中的文件名告诉预处理器首先搜索当前目录，然后搜索指定的搜索路径。\n\
    \n如果找不到文件，则会报告错误。\n\n```cpp\n#include <string>\n#include \"myfuncs.h\"\n```\n\n\
    链接器总是搜索包含头文件中指定的任何函数的编译版本。\n\n### 可用文件\n\nC标准库提供了一组用于执行常见任务的函数，例如：\n\n- 字符串处理\n\
    - 字符和类型转换\n- 数学运算\n- 输入和输出\n\n还有各种各样的C++库文件可用。\n\nC++库的ANSI标准于1998年获得批准。\n\n`iostream`\
    \ 文件可能是所有C++库文件中最常见和通用的。\n\n大多数C++程序都包含这个头文件。\n\n`iostream` 文件提供了大量的输入/输出函数和其他I/O流信息。\n\
    \n例如，`cin` 和 `cout` 数据和函数就是在这里定义的。\n\n### 注意\n\nC++ I/O以字节流的形式发生，其中流只是字节的序列。\n\
    \n程序员可以使用多种C++库变体。\n\n这些库源自多个来源。\n\n例如，一些库随C++应用开发软件一起提供。\n\nC++函数库也可以由设备驱动程序制造商、C++编程网站和公告板等来源提供。"
