  md: '# So Then What is Inheritance?


    Inheritance is a concept wherein we can define a class to inherit the properties
    and methods of another class. This helps in not having the need to define the
    class again or having the properties and methods defined again.


    Let’s say that we had a class called ‘Person,’ which had a property of ‘Name’
    and a method of ‘Display.’ Then through inheritance, we can define a class called
    Student, which could inherit the Person class. The Student class would automatically
    get the ID member and the Display function. The Student class could then define
    its own additional members if required.


    To define an inherited class, we use the following syntax.


    ```

    Derived class:Base class

    ```


    Here the ‘Derived class’ is the class that will inherit the properties of the
    other class, known as the ‘Base class.’


    So if we had a base class with a property and a function as shown below.


    ```

    Base class

    {

    Public or protected:

    Property1;

    }

    ```


    Then when we define the derived class from the base class, the derived class will
    have access to the property. Note that the property and function need to have
    the access modifier as public or protected. We will look at access modifiers in
    greater detail later on.


    ```

    Derived class: Base Class

    {

    ```'
