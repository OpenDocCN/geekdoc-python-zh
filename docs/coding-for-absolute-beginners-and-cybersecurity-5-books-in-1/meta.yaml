    from Hollywood. If you are a fan of Tom Cruise and his spy thrillers, you might
    for sure be acquainted with the character of Ethan, who was always on some kind
    of mission to infiltrate a facility and steal some important documents that could
    turn the tables on the bad guys. Spy is the word that they use for such kind of
    person. Nowadays, things are different. There is hardly anything left in the physical
    domain. The craft of stealing an important bunch of information is more about
    being electric. Computers have the capacity to consume billions of files that
    were once stored in the company’s ledgers and on loads of papers.'
  - '[PAGE 494]


    # # Espionage


    Espionage attacks are getting more sophisticated nowadays. Most of them are state-sponsored
    or are financed by the corporate sector. Some professional groups act as independent
    contractors to spy for profit. Espionage is considered as a secretive activity
    in which attackers formulate a plan to avoid detection and achieve their objectives
    of collecting important information about the targeted company or individual.
    Spies are the most persistent attackers who keep on working until they achieve
    their objective. They keep on trying a number of techniques until they accomplish
    their mission. Even if they are detected, they don’t stop their activities and
    go on until the completion of the mission.


    In most cases, the initial worker is indirect, such as a trusted third-party in
    the form of an employee who has access to the computer system you want to target.
    Once the attacker has access inside the system, he will have to move through the
    systems of the organization and also make his way to the data stores of the company.
    If you are running a financial consultancy firm, the most important data should
    be informed about your company’s clients. Once the attacker has access to the
    documents, he will be in a position to blackmail you.'
  - '[PAGE 495]


    # Profit


    The second most common motivation of a hacker is financial gains. They aim at
    making heavy profits by the attack. The methods of profit-driven attackers vary.
    Usually, if the data stolen pertains to credit card and debit card details, it
    is understood that the objective of the cybercrime is financial gain. The information
    cybercriminals steal afterward sold on the dark web to make a hefty profit. This
    is the greatest motivator in today’s world in which locating the net worth of
    everyone is so easy. The transparency in financial transactions and details makes
    money as the single most important objective of a cyberattack. Everyone needs
    money, and no shortage of cybercriminals wouldn’t hesitate to share a pie from
    the money.


    Different hackers use different types of methods that lead to some monetary gain.
    Cybercriminals use a wide range of methods using financial malware such as Dridex,
    Shifu, Carbanak, and Rovnix to siphon off loads of swag from the bank accounts
    of the victim. Another method to rob victims is to by using ransomware such as
    Tesla. Denial of service attacks (DDoS) is another profit-motivated attack that
    has become pretty top-notch in popularity over the past years.


    Whether you are the owner of a consultancy firm or a retailer of clothes, you
    are at a high risk of a serious cyber threat if you conduct your transactions
    online. They are always after user and financial details that could lead him to
    the source of your finances as well as your customers’ finances. If they loot
    you, you are devastated because you will not have precious capital to hold grounds.
    If they loot your customers, you will lose your hard-earned reputation in the
    market that is equally devastating for your business. In both ways, you are at
    great risk of losing your business. Attackers, at the height of rage, can use
    a malware that can target your point of sale (POS) systems.'
  - '[PAGE 496]


    Sometimes, profit alone is the sole objective of an attacker. For example, your
    company has secured a contract from the Pentagon to produce sophisticated weapons,
    and you are on your way to producing them. Hackers can target your company’s database
    to compromise sensitive information that can be of strategic and police use of
    the attacker. The attacker can be a country that needs this strategic information
    to update her defense assets. It can be used by politicians to shape up their
    political campaigns. The chances are high that the state sponsors this kind of
