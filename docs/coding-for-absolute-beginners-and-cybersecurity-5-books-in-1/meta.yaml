  md: '# # Chapter 20. Programming for Mobile Devices


    Coding is a skill of immense value and interest, but it can seem a daunting task.
    In this post, we''ll go over the basics of coding for mobile devices using HTML5.
    It''s intimidating at first, but once you get to know the language, it can give
