    \nPython 是一种强大的编程语言，支持面向对象编程。你将使用 Python 语言定义一个包含属性和方法的类，之后可以调用它。Python 相比其他语言有额外优势。首先，该语言是动态的且具有高级数据类型。这意味着开发速度比\
    \ Java 更快。它不需要程序员声明变量类型和参数。这使得 Python 对初学者来说易于学习。其代码更直观且可读性强。\n\n重要的是要记住，类基本上提供了结构。这是一个蓝图，概述了某事物需要如何定义。然而，它不提供任何实际内容。例如，shape()\
    \ 类可能指定形状的大小和名称，但不会指明形状的确切名称。\n\n你可以将类视为某事物应如何执行的概念。\n\n## Python 对象\n\n虽然类是蓝图，但对象或实例是给定类的成员。它不再是一个概念。它是一个实际的形状，比如一个有三条边的三角形。\n\
    \n换句话说；类就像一份问卷。它会定义所需的信息。一旦你填写完表格，你的实际副本就是该类的一个实例。它包含与你相关的原始信息。\n\n你可以填写不同的副本以获得多个实例，但如果没有表格，你会迷失方向，不知道需要哪种信息。因此，在创建单个对象之前，你需要定义类的要求。\n\
    \n## 在 Python 中定义类\n\n以下是 Python 中一个简单的类定义：\n\n```python\nclass Dog(object):\n\
    \    pass\n```\n\n在 Python 中定义类时，你以 `class` 关键字开头，表示你正在编写一个类，然后是类的名称。在上面的例子中，`Dog`\
    \ 是类的名称。\n\n上面的类定义中包含了 Python 关键字 `pass`；这通常用作最终代码将放置位置的占位符。使用这个关键字是为了避免代码抛出错误。\n\
    \n括号中的 `object` 部分表示你正在继承的父类。但这在 Python 3 中不再是必需的，因为它是隐式默认的。\n\n## 对象属性\n\n所有类都定义对象，所有对象都有称为属性的属性。`__init__()`\
    \ 方法用于通过概述其默认值来指定对象的原始属性。此方法\n\n```python\nclass Dog:\n    # 初始化器 / 实例属性\n   \
    \ def __init__(self, name, age):\n        self.name = name\n        self.age =\
    \ age\n```\n\n至少需要一个参数作为 `self` 变量，它描述对象本身。\n\n在下面的例子中，每只狗都有一个独特的名字和年龄，这在开始定义不同的狗时至关重要。不要忘记类只是定义了\
    \ Dog，而不是创建具有独特名字和年龄的单个狗对象。\n\n同样，`self` 变量也属于类的一个实例。因为类实例具有不同的值，你可以写 `Dog.name\
    \ = name` 而不是 `self.name = name`。\n\n## 类属性\n\n虽然实例属性对每个对象都是唯一的，但类的特征对所有实例都是相同的。在这种情况下，所有狗都是如此。\n\
    \n## 方法\n\n当你拥有属于类的属性时，你可以继续定义将访问类属性的函数。这些函数被称为方法。当你声明方法时，你会希望使用 `self` 关键字为方法提供第一个参数。\n\
    \n例如，你可以定义一个名为 Snake 的类，它包含属性 `name` 和方法 `change_name`。方法 `change_name` 将接受一个参数\
    \ `new_name` 加上关键字 `self`。\n\n现在，你可以用变量 `snake` 实例化这个类，并使用方法 `change_name` 更改名称。\n\
    \n```python\n>>> # 实例化类\n>>> snake = Snake()\n\n>>> # 打印当前对象名称\n>>> print(snake.name)\n\
    python\n\n>>> # 使用 change_name 方法更改名称\n>>> snake.change_name(\"anaconda\")\n>>>\
    \ print(snake.name)\nanaconda\n```\n\n## 实例属性和 init 方法\n\n你仍然可以在运行时提供属性的值。这是通过在\
    \ init 方法内定义属性来实现的\n\n```python\nclass Snake:\n    def __init__(self, name):\n\
    \        self.name = name\n\n    def change_name(self, new_name):\n        self.name\
    \ = new_name\n```\n\n查看下面的例子：\n\n现在你可以继续为不同的对象直接定义不同的属性值。\n\n到目前为止，你知道如何定义 Python\
    \ 类、方法、实例化对象以及调用实例方法。当你想解决复杂问题时，这些技能将非常有用。\n\n通过面向对象编程，随着程序的扩展，你的代码复杂性会增加。你将拥有不同的类、对象、实例方法和子类。你会希望维护你的代码并确保其保持可读性。为此，你需要遵循设计模式。这些是帮助人们避免不良设计的原则。每个模式都代表一个在面向对象编程中总是反复出现的特定程序，并描述了该问题的解决方案，然后可以重复使用。\n\
    \n## 文件处理\n\nPython 提供了一个关键功能，用于从文件读取数据和将数据写入文件。\n\n在大多数编程语言中，所有值或数据都保存在一些易失性变量中。\n\
    \n由于数据仅在运行时存储在这些变量中，并且在程序执行结束后会消失，因此最好使用文件永久保存这些数据。\n\n一旦你将数据存储在文件中，下一个重要的事情是其检索过程，因为它以\
    \ 1 和 0 的位形式存储，如果检索不顺利，那么它就完全无用了，该数据被称为已损坏。\n\n## Python 如何处理文件？\n\n如果你正在处理一个执行大量数据的大型软件应用程序，那么我们不能期望这些数据保存在变量中，因为变量是易失性的。\n\
    \n因此，当你想处理这些情况时，文件的作用就会显现出来。\n\n由于文件本质上是非易失性的，数据将永久保留在硬盘等辅助设备中，并使用 Python 在你的应用程序中处理这些文件。\n\
    \n## 你考虑过 Python 将如何处理这些文件吗？\n\n让我们假设普通人将如何处理这些文件。如果你想从文件读取数据或将数据写入文件，那么你需要打开文件或在文件不存在时创建一个新文件，然后执行正常的读/写操作，保存文件并关闭它。\n\
    \n同样，相同的操作在 Python 中借助内置应用程序完成。\n\n## Python 中的文件类型\n\n有两种文件：\n\n- 1. 文本文件\n-\
    \ 2. 二进制文件\n\n内容可以使用文本编辑器检查的文件称为文本文件。文本文件是指一系列 ASCII 字符。Python 程序是文本文件的例子。\n\n\
    二进制文件以与内存中存储相同的方式存储数据。mp3 文件、Word 文档是二进制文件的一些例子。你无法使用文本编辑器读取二进制文件。\n\n在 Python\
    \ 语言中，文件处理采取以下步骤：\n\n- 打开一个文件，返回一个文件句柄。\n- 使用句柄进行读或写操作。\n- 关闭文件句柄。\n\n在 Python\
    \ 中对文件执行读或写操作之前，你必须先打开它。并且当读/写事务完成时，你应该关闭它以释放与文件相关的资源。\n\n现在让我们详细看看每个步骤。\n\nAccess_mode：这用一个整数表示，例如读取、写入和追加。默认设置是只读\
    \ `<r>`。"
