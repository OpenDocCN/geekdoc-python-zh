    # # Insider Threats


    An attack doesn''t need to be always performed by someone from outside an organization.
    At times, malicious attacks are carried out on a network or computer system by
    any individual sanctioned to access the system. Insiders executing such attacks
    have the advantage over outsider attackers as they have authorized system access.
    Moreover, they are most likely to understand network architecture and system policies.


    Additionally, normally there is minor security against insider attacks as the
    focus of the majority of organizations is to defend themselves against external
    attacks. Insider threats can leave an impact on all elements of computer security.
    Such attacks can range from injecting Trojan viruses to thieving private information
    from a system or network.


    # # Man-in-the-Middle (MITM) Attacks


    Man-in-the-middle (abbreviated as MITM) attacks are a kind of cybersecurity breach
    permitting an attacker/cracker to eavesdrop a communication amid two bodies. The
    attack takes place amid two genuinely communicating parties, allowing the attacker
    to capture communication, which they otherwise should not be able to access. This
    gives such attackers the name “man-in-the-middle.” The invader “listens” to the
    communication through capturing the public key message transmission and then retransmits
    the key message whereas switching the demanded key with his own.


    The two communicating parties continue to communicate routinely, without having
    any idea that the person who is sending messages is an unknown criminal who is
    trying to alter and access the message prior to its transmission to the receiver.
    Therefore, the intruder in this way controls the whole communication.


