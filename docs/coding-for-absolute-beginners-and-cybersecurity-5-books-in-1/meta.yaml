  md: 'Class modifiers can be used to define the visibility of properties and methods
    in a class. Below are the various modifiers available.


    +   - Private—With private, the properties and methods are only available to the
    class itself.

    - Protected—With protected, the properties and methods are only available to the
    class itself and subclasses derived from that class.

    - Public—With public, the properties and methods are available to all classes.


    Let’s say we had the following structure for a class.


    ```

    Class classname

    {

    Private:

    Property1;

    Fucntion1;

    }

    ```


    Both ‘property1’ and ‘function1’ would not be accessible anywhere else except
    the class it is defined in. If you try to access any of these properties or functions
    from the main program, you will get a compile-time error.


    Now let’s define the class below, but this time we’ll use the protected access
    modifier.


    ```

    Class classname1

    {

    Protected:

    Property1;

    Fucntion1;

    }

    ```'
