    OF THE MAIN LANGUAGES LIKE:'
  - '[PAGE 12]


    # PYTHON, JAVA, AND C++


    ALAN GRID'
  - '[PAGE 13]


    # Introduction


    So, you''re interested in learning to code but don''t know where to start? This
    book is going to be your one-stop shop for everything coding. We will give you
    a brief overview of what coding is and how it can make a difference in any industry,
    then we''ll go into why it''s essential for everyone from high school students
    to seniors. We''ll also provide some resources on learning for free and teaching
    yourself more advanced skills on your own time.


    # What is coding?


    Coding is the process where you put instructions into a particular computer language.
    The computer can understand this code, and the code can control how the computer
    functions, which in turn helps people, accomplish their goals. Coding is one of
    the fastest-growing and highest-paying jobs in America. (Bureau of Labour Statistics,
    2015) If you''ve ever used an ATM or used a credit card to pay for something,
    coding was used to help make that happen.


    # How does it work?


    A programmer writes code using special programs on your computer keyboard or a
    text editor, such as Notepad on Windows or TextEdit on OS X. The code tells the
    computer what to do or how to function, like the instructions on a piece of paper
    that you are writing. This code can help a person do anything that requires programming
    skills like making games, connecting electronic devices, programming robots, and
    so much more. Why is it important? Programming skills are essential in every industry.
    Many jobs in technology require coding such as software engineers, technicians,
    and IT specialists. Even more than these jobs, other positions in tech fields
    don''t have programming skills at all but instead require expertise in specific
    programs and languages. In schools, coding is often used to teach students all
    the skills needed for success in many different industries. Coding can give students
    the experience they need to make something happen, learn how to be independent
    and creative, and work well under pressure. It''s nothing to be afraid of; it''s
    just programming!'
  - '[PAGE 14]


    # Where can I learn?


    There are plenty of resources out there on the internet to get you started. There
    are many resources available online for free or for a small fee, such as Codecademy,
    Code Academy, Lynda.com, and Udemy. You may even want to try your own hands at
    creating code from scratch - you might have some ideas already. All you need is
    a computer, an internet connection, and some motivation.


    # Code your goals!


    This is only the beginning of where coding can take you in your life! You''ll
    be able to use this knowledge to learn more advanced skills that will have more
    meaning for you on your own time - teaching yourself how to use more advanced
    software languages like C++ or Python. Maybe you''ll become a web designer and
    create your sites or applications to help you learn more about your skills. This
    is the time of your life - take it!


    Coding is just a small step in the larger technology industry, and anyone can
    take that step with you. It''s truly as fun as it sounds and will teach you things
    that can be applied throughout life. If you''re ready to dive in, we''ll see you
    there!'
- md: '## Chapter 1. Common Terms and Their Definition


    Coding: Converting a problem into code, or a string of symbols and language that
    a computer can process.


    HTML: Hypertext markup language, or how the information on your site is presented
    to users. HTML is used for formatting text, pictures, links, video, and audio.


    JavaScript: A programming language used for web development makes it easier to
    build interactive websites and add effects like scrolling boxes and drop-down
    menus. JavaScript allows you to create more dynamic pages that work faster than
    the static pages produced from pure HTML can achieve.


    Node.js: A JavaScript framework that allows you to build powerful real-time applications
    using an event-driven and non-blocking I/O model.


    jQuery: A JavaScript library that simplifies HTML document traversing, event handling,
    animating, and Ajax interactions for rapid web development.


    Responsive Design: Making a website adapt its design to different screen sizes
    (smartphones, tablets, laptops, etc.) without affecting the layout or functionality
    of the website.


    Test-Driven Development: Automated software testing method or framework based
    on creating test cases from an incomplete specification. It asserts that developers
    should specify code before writing it.


    Basic words used in coding.


    - 1. Abbreviation: Shortened form of text or a group of words. Everyday use is
    to give organizations a short and memorable name so that people can remember them
    easily. It is also used as an informal way to express complicated concepts or
    ideas by using only some part of the whole word, which helps save time when reading
    the abbreviation and typing it. For example, "Max" in "Maxwell" can also be used
    to describe a variable in math formulas, and similarly, "X1000" may be describing
    a million (1000x) rather than being an actual number (1x1000).


    - 2. Accessibility: The ease of accessing content on a website or other media.
    Many different aspects make up a website''s accessibility, including design, content,
    and technology.


    - 3. API: Application programming interface. A set of routines, protocols, and
    tools for building software applications.


    - 4. Cache: Temporary storage available on the web browser of your computer or
    mobile device that stores data in a faster or more efficient manner than it is
    retrieved from the site itself. It allows the browser to load websites more quickly
    by storing commonly accessed web page elements like text, graphics, and sounds.
    Caching also enables users to access online information even if there is no Internet
    connection available at the time.


    - 5. Challenge-response authentication: A type of security protocol where a user
    is first challenged to provide some information about them and then presented
    with a response calculated on that original information that they must enter or
    re-enter to proceed.


    - 6. Character encoding: The mechanism for representing textual data by converting
    it into a sequence of (usually) 8-bit characters using an alphabet and/or character
    set.


    - 7. Command line: In computing, command lines are a text-based way to communicate
    with a computer''s operating system, programs, and applications through typed
    commands. It is mainly used for programming or performing simple tasks like compiling
    code or opening programs on the command line instead of using the mouse or graphical
    interfaces.


    - 8. Configuration: The process of identifying and defining settings that a device
    communicates with when operating.


    - 9. CYA: (Also known as CAPS) Courtesy, yet another acronym meant all the above.
    It is often used in user interface design.


    - 10. Contextual Accessibility: The ease by which a person can gain access to
    content on a website or other media, given its current context (location, time,
    task). Contextual accessibility is about recognizing the context in which people
    are using technology at any given moment of their lives while they''re online
    and using it to meet their needs appropriately—according to their current needs
    and interests.


    - 11. Digital Divide: The gap between individuals, households and communities
    that have access to the internet and the digital resources available online, and
    those that do not.


    - 12. Encoding: The method in which information is converted into strings of symbols
    can be transmitted, stored or processed by a computer. A common example of encoding
    is ASCII, representing text as a sequence of numbers ranging from 0 to 255.


    - 13. File Extension: The suffix at the end of a file name after the period/dot
    symbol (ex: .html). It identifies what type of file it is like .html for HTML
    files.


    - 14. Globalization: The process of adapting content (including, but not limited
    to, information and software) from one language and cultural context to another.


    - 15. Hyperlink: A type of reference (a link) between two or more locations on
    the same site. Usually, a hyperlink will open either a new window or new tab in
    a web browser that reads the referenced text or image at that location.


    - 16. Internet Explorer: A series of graphical user interface (GUI) web browsers
    developed by Microsoft for Windows systems that support HTML 4 and CSS 2 selectors
    and ActiveX controls.


    - 17. Internet search engine: A form of web search that does not directly retrieve
    text data from a specific source but instead searches the entire World Wide Web
    for documents that contain the relevant keywords and returns those that are most
    likely to include this information.


    - 18. JavaScript: A programming language designed by Netscape and first released
    in 1995. It is an object-oriented scripting language that can be embedded into
    client-side web pages or as standalone programs, which creates interactive experiences
    on the client-side of the browser.


    - 19. Java: (JavaScript) is a programming language that enables developers to
    write dynamic web pages and applications and run them inside a browser.


    - 20. Macro: Computer code that is executed automatically when some other code
    is triggered by the user by using hotkeys in a word processing program or by pressing
    a button on a mouse. Some macro features come built into certain operating systems
    (e.g., Microsoft Office, Apple iTunes, Mac OS X). In computer aided design (CAD)
    software, macros are used to automate repetitive tasks in the software so that
    fewer mouse movements or keystrokes are required.


    ## Chapter 2. What Is a Programming Language?


    The first thing you need to know is that a programming language is a set of instructions
    for the computer. These are often called code. The goal is to make computers do
    what they need to do, ranging from making calculators to processing NASA images
    of nearby galaxies. But the hard part about programming languages is that they''re
    often not designed for people who don''t already know how to program. It''s like
    trying to teach someone Spanish in a first-grade class. Most people aren''t going
    to be able to understand what you''re saying.


    That''s why this book is for absolute beginners who don''t know any programming
    languages at all. It doesn''t matter how much experience you have in other languages;
    you''ll still need basic knowledge of computers to pick up this language and use
    it effectively. (If you want more information about these topics, check out my
    other books on web development.)


    ## What Is Coding?


    You can think of code as instructions that tell the computer what to do. If I
    say to the computer, "draw a picture," it will draw a picture on the screen. The
    laptop has a great deal of programming power built into it, including the ability
    to understand instructions. It might have to make a little interpretation on one
    or two of them, but for the most part, it can follow these instructions and do
    what you ask.


    ## Why Do We Code?


    Programming languages are used to make software. Software is vital because it
    lets us do things like automate processes in factories or connect devices in our
    homes to control them from anywhere else in the world. This kind of software is
    commonly called "apps," short for applications.


    So coding is necessary because it gives us the ability to make apps of our own
    to help us do what we want. But coding is more than just the language: it''s about
    what you can do with that language.'
  mdcn: '## 第一章 常用术语及其定义


    编码：将问题转化为代码，或转化为计算机可处理的符号和语言字符串。


    HTML：超文本标记语言，即网站信息呈现给用户的方式。HTML用于格式化文本、图片、链接、视频和音频。


    JavaScript：一种用于Web开发的编程语言，它使得构建交互式网站和添加滚动框、下拉菜单等效果变得更加容易。JavaScript允许你创建更动态的页面，其运行速度比纯HTML生成的静态页面更快。


    Node.js：一个JavaScript框架，允许你使用事件驱动和非阻塞I/O模型构建强大的实时应用程序。


    jQuery：一个JavaScript库，它简化了HTML文档遍历、事件处理、动画和Ajax交互，以实现快速的Web开发。


    响应式设计：使网站能够适应不同的屏幕尺寸（智能手机、平板电脑、笔记本电脑等），而不影响网站的布局或功能。


    测试驱动开发：一种基于从不完整规范创建测试用例的自动化软件测试方法或框架。它主张开发者应在编写代码之前先指定代码。


    编码中使用的基本词汇。


    - 1. 缩写：文本或一组单词的缩略形式。日常使用中，它为组织提供一个简短且易于记忆的名称，以便人们轻松记住。它也用作一种非正式的方式，通过仅使用整个单词的一部分来表达复杂的概念或想法，这有助于在阅读缩写和输入时节省时间。例如，“Maxwell”中的“Max”也可用于描述数学公式中的变量，同样，“X1000”可能描述的是百万（1000倍），而不是一个实际的数字（1x1000）。


    - 2. 可访问性：访问网站或其他媒体上内容的难易程度。网站的可访问性由许多不同方面构成，包括设计、内容和技术。


    - 3. API：应用程序编程接口。一组用于构建软件应用程序的例程、协议和工具。


    - 4. 缓存：计算机或移动设备Web浏览器上可用的临时存储，它以比从网站本身检索更快或更高效的方式存储数据。它允许浏览器通过存储常用的网页元素（如文本、图形和声音）来更快地加载网站。缓存还使用户即使在当时没有互联网连接的情况下也能访问在线信息。


    - 5. 挑战-响应认证：一种安全协议，用户首先被要求提供一些关于他们自己的信息，然后系统会根据该原始信息计算出一个响应，用户必须输入或重新输入该响应才能继续。


    - 6. 字符编码：通过使用字母表和/或字符集将文本数据转换为（通常是）8位字符序列来表示文本数据的机制。


    - 7. 命令行：在计算中，命令行是一种基于文本的方式，通过键入命令与计算机的操作系统、程序和应用程序进行通信。它主要用于编程或执行简单任务，如编译代码或在命令行上打开程序，而不是使用鼠标或图形界面。


    - 8. 配置：识别和定义设备在运行时与其通信的设置的过程。


    - 9. CYA：（也称为CAPS）礼貌用语，又一个首字母缩写，意指以上所有内容。它常用于用户界面设计。


    - 10. 上下文可访问性：在给定当前上下文（位置、时间、任务）的情况下，一个人访问网站或其他媒体上内容的难易程度。上下文可访问性关乎识别人们在在线时任何特定时刻使用技术的上下文，并利用它来适当地满足他们的需求——根据他们当前的需求和兴趣。


    - 11. 数字鸿沟：能够访问互联网和在线数字资源的个人、家庭和社区与无法访问者之间的差距。


    - 12. 编码：将信息转换为符号字符串的方法，以便计算机可以传输、存储或处理。编码的一个常见例子是ASCII，它将文本表示为0到255范围内的数字序列。


    - 13. 文件扩展名：文件名中句点/点符号（例如：.html）之后的后缀。它标识文件的类型，例如.html表示HTML文件。


    - 14. 全球化：将内容（包括但不限于信息和软件）从一种语言和文化背景适应到另一种语言和文化背景的过程。


    - 15. 超链接：同一站点上两个或多个位置之间的一种引用（链接）。通常，超链接会在Web浏览器中打开一个新窗口或新标签页，该窗口或标签页会读取该位置的引用文本或图像。


    - 16. Internet Explorer：微软为Windows系统开发的一系列图形用户界面（GUI）Web浏览器，支持HTML 4和CSS 2选择器以及ActiveX控件。


    - 17. 互联网搜索引擎：一种网络搜索形式，它不直接从特定来源检索文本数据，而是搜索整个万维网以查找包含相关关键词的文档，并返回最有可能包含此信息的文档。


    - 18. JavaScript：由Netscape设计并于1995年首次发布的编程语言。它是一种面向对象的脚本语言，可以嵌入客户端网页或作为独立程序，在浏览器的客户端创建交互式体验。


    - 19. Java：（JavaScript）是一种编程语言，使开发人员能够编写动态网页和应用程序，并在浏览器内运行它们。


    - 20. 宏：当用户通过在文字处理程序中使用热键或按下鼠标按钮触发其他代码时，自动执行的计算机代码。一些宏功能内置于某些操作系统中（例如，Microsoft
    Office、Apple iTunes、Mac OS X）。在计算机辅助设计（CAD）软件中，宏用于自动化软件中的重复性任务，从而减少鼠标移动或击键次数。


    ## 第二章 什么是编程语言？


    你需要知道的第一件事是，编程语言是给计算机的一套指令。这些通常被称为代码。目标是让计算机做它们需要做的事情，从制作计算器到处理美国宇航局（NASA）的邻近星系图像。但编程语言的难点在于，它们通常不是为那些还不知道如何编程的人设计的。这就像试图在一年级课堂上教某人西班牙语。大多数人将无法理解你在说什么。


    这就是为什么这本书是为完全不懂任何编程语言的初学者准备的。你在其他语言方面有多少经验并不重要；你仍然需要基本的计算机知识才能掌握这门语言并有效地使用它。（如果你想了解更多关于这些主题的信息，请查看我关于Web开发的其他书籍。）


    ## 什么是编码？


    你可以将代码视为告诉计算机做什么的指令。如果我对计算机说“画一幅画”，它就会在屏幕上画一幅画。笔记本电脑内置了大量的编程能力，包括理解指令的能力。它可能需要对其中一两个指令进行一点解释，但在大多数情况下，它可以遵循这些指令并执行你要求的操作。


    ## 我们为什么要编码？


    编程语言用于制作软件。软件至关重要，因为它让我们能够做诸如自动化工厂流程或将家中设备连接起来以便从世界任何其他地方控制它们之类的事情。这种软件通常被称为“应用程序”，是“applications”的缩写。


    所以编码是必要的，因为它赋予我们制作自己的应用程序的能力，以帮助我们做我们想做的事情。但编码不仅仅是语言本身：它关乎你能用这种语言做什么。'
