    \ `erase()` i.e.,\n\nFinal: ( 1111; 1124; 1134; 1176; )\n\nThe program presented\
    \ above demonstrates the usefulness of iterators incorporating container data\
    \ in algorithms.\n\nAs we saw, the iterators can be used for printing the contents\
