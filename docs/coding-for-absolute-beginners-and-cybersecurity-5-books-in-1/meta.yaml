  md: '# # Looking at a Global Variable


    The other thing that we need to take a look at here is what a global variable
    is all about. This is going to be a type of variable that we will declare outside
    of any of our functions, which means that it is easy to access by all of the functions
    that are found in the program that you are writing. A group of these variables
    is called a global environment or a global state, because when they are combined,
    and they are going to define various aspects of a program or an environment when
    the program is going to run.


    A global variable is going to be the one that is declared on top of all the other
    functions, and it is usually best if we can keep this to a minimum. This is because
    all of the functions will be able to manipulate these variables during the run
    time of the program. For most of the programs that you want to handle in this
    language, this can be dangerous because there is the possibility that they can
    be changed on accident, and that causes bugs in the system.


    Global variables, as we can guess by the name, will be some variables that we
    can access globally, or everywhere throughout the program. Once we go through
    the process of declaring them, these are going to stay in the memory throughout
    the runtime of the program. This means that we are able to get them changed with
    any function that we want, at any time when the program is running, and this can
    definitely cause some issues with the program as a whole.


    During some of the earlier years when computers can be used, but they had a limited
    amount of memory, these global variables were seen as bad practice because they
    would take up a lot of valuable information and memory, and it was easier for
    the programmer to start losing track of the values they worked with, especially
    in longer programs. And basically, it brought in a lot of bugs to the program
    that was hard to locate and fix.'
