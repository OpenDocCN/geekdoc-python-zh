  - '[PAGE 486]


    # Cyber Attacks and Vulnerabilities


    A weakness in the design, implementation, internal control, or the operations
    of a computer, hardware, smart device, Software, or a network results in the exposure
    to cyber-attacks. The Common Vulnerabilities and Exposures is a database that
    documents such known vulnerabilities to cyber threats. At least one active attack
    or an exploit that exists is called an exploitable vulnerability. Various manual
    and automated tools are used to identify vulnerabilities to cyber-attacks.


    When it comes to computers and networks, attacks largely attempt to expose, disable,
    alter, steal, destroy, or gain access to the use of assets. Any such offensive
    maneuver that tries to target computer systems, networks, infrastructures, and
    personal devices can be called a cyber-attack. A cyber-attack can be carried out
    by an individual or a group with malicious intent putting hardware, data, and
    functionalities at risk.


    Cyber-attacks can be categorized as cyber warfare or cyberterrorism, depending
    on the nature of the attack and its threat. Furthermore, cyber-attacks can be
    carried out by various societies and sovereign states operating in anonymity.
    During a cyberattack, susceptible systems and devices are hacked into while achieving
    the malicious intents of the attacker or the attackers. The scale of a cyberattack
    may also vary from a single computer, device, individual, or company is the primary
    target to infrastructures of entire nations.'
  - '[PAGE 487]


    # Information Security Culture


    The behavior of employees plays a key role in establishing cybersecurity in companies.
    Changes and improvements of a company''s culture and practices can help employees
    effectively work towards achieving information security. Employees sometimes do
    not realize that they are an integral part of a company''s effort towards achieving
    satisfactory levels of cybersecurity. Their actions may sometimes not align with
    the cybersecurity goals of a company as a result.


    A company should continuously make improvements to its information security culture
    while making sure that employees understand the role they need to play. The process
    is never-ending with an ongoing cycle of change, evaluation, and maintenance.
    The five steps involved in managing a company''s information security culture
    are pre-evaluation, strategic planning, operative planning, implementing, and
    post-evaluation.


    Pre-evaluation brings awareness regarding the company''s current information security
    culture and policy while highlighting behavior that might make it vulnerable against
    cyber threats. The next step in the process, which is strategic planning, then
    creates a program towards increasing awareness with a clear target to achieve
    as a company. Operative planning involves working towards a better culture by
    improving internal communication, security awareness, and training.


    Implementing is a step that consists of four phases, which are the commitment
    of management, communication with employees, providing courses for employees,
    and the commitment of the employees. Managers first commit to implementing better
    information security practices within the company and then communicates the company''s
    intentions to the employees. Then the employees are provided with education and
    training regarding information security.


    Finally, the employees of the company committed to bringing about an improved
    and satisfactory information security culture. The final step, which is Post-Evaluation,
    assesses how well the planning and implementation went and identifies any areas
    that remain to be unresolved.'
  - '[PAGE 488]


    # Systems That Are Vulnerable to Cyber-Attacks


    The number of individuals, businesses, and organizations relying on computer systems
    has grown rapidly. It has resulted in increasing the number of systems that are
    at risk of cyber-attacks. Such vulnerable entities are scattered across various
    industries, with almost all industries out there being vulnerable at different
    levels.'
  - '[PAGE 489]


    # Financial Systems


    Computer systems belonging to financial institutions and regulators have a high
    risk of being targeted by hackers. The U.S. Securities and Exchange Commission,
    investment banks, and commercial banks are prime targets of hackers seeking illicit
    gains and market manipulation. Furthermore, any website or mobile application
    that store or accept credit card numbers, bank account information, and brokerage
    accounts are also under the risk of being hacked.


    Hackers and hacker groups take a high interest in attacking the networks and websites
    of such institutions since they can enjoy immediate financial spoils by making
    purchases, transferring money, and selling acquired data to interested parties
    in the black market. ATMs and in-store payment systems have also been targeted
    by hackers who aim to gather customer PIN codes and account details.'
  - '[PAGE 490]


    # Dark Web


    The dark web sounds scary and almost sends shivers down the spine of most people.
    The dark web is well-known for harboring illegal activity that lots of people
    don’t want to engage in. The question starts spinning in our heads that if the
    dark web is a place for illegal activity, then why does it exist in the first
    place and who allows it to run without any kind of restrictions. Is there any
    purpose behind the existence and flourishing of the dark web, or is the place
    being handled by a strong bunch of lot? There are three major parts of the internet
    known as the deep web, surface web, and dark web. Let me discuss each type individually
    and in detail.


    The surface web consists of around ten percent of the entire internet, and it
    includes things such as Google and other search engines. You can use keywords
    to search for different things to read, sell, or buy. Then comes the deep web
    that is the place where you can store the information that is unavailable to most
    users. This includes things that you have protected by a password such as a bank
    account subscription services as well as certain medical information. A majority
    of the webspace consists of this type of information. The third spot belongs to
    the dark web that is not accessible by a standard internet user. You cannot access
    this webspace through Firefox, Opera, and Google Chrome, and it can have any kind
    of information. The word dark is attributed to this web space because of its limited
    accessibility.


    You might be wondering if the dark web is completely illegal for a common user.
    Thankfully, the answer is no. Mere entering the dark web doesn’t count as an illegal
    activity, but what you do in the dark web can be categorized as legal or illegal.
    You can access the dark web through Tor anonymous browser. You can download it
    just like Google Chrome and Firefox. The difference is that it works in a different
    manner. You have to travel through different overlay networks when you are using
    Tor or The Onion Router. Just like an onion, it has a number of layers to pass
    through. The speed of Tor is usually slower than other browsers. If you can get
    your hands on a Virtual Private Network, it is better to ensure maximum security.'
  - '[PAGE 491]


    To clear the longstanding confusion, Tor is not a dark web but a tool to access
    the dark web. Also, Tor can be used to access general webspace such as Google
    and Yahoo, and your travel through the surface web will be more secure. Rather
    than a place for illegal activities, the dark web is considered as a place for
    a high level of online privacy. You can buy illegal drugs through on the dark
    web and get them delivered to your postal address without giving anyone a hint
    to what was in the package. The ultimate objective to achieve by using dark web
    depends on what you need, whether you are ready to take the risk of committing
    an illegal act.


    Residents of countries such as Iran where the government control over the internet
    is touching extreme levels, the dark web becomes a necessity. Residents from these
    countries access Facebook and Twitter through the dark web. They log into their
    onion versions that have been officially launched for users who are subjected
    to censorship.'
- md: '## Chapter 1. Common Cyberattacks


    Cyberattacks are getting highly sophisticated as hackers are coming up with the
    latest and innovative methods to stage an attack and threaten the security of
    different computer networks. The attacks are getting so much sophisticated that
    they are getting tougher to detect. Consequently, the attacks are getting more
    lethal than they were ever before.


    Cybersecurity doesn’t depend on the size of your organization. Whether you have
    a start-up business or a multimillion-dollar company, you should be able to be
    aware of how risky a cyberattack can be. The rise of cyberattacks gives room to
    the question of why do hackers attack a cyberspace? What is the motivation behind
    such heinous attacks? A general perception is that financial gain drives them
    to stage high profile cyberattacks on the computer systems of big corporations.
    Some also do that for espionage purposes. This chapter will shed light on the
    motivations that hackers have on their backs to penetrate an individual computer
    or an enterprise computer.


    Most of the time, the attack is a kind of breach that aims at infiltrating the
    credit and debit card details. This information is then sold on the dark web later
    on to bag heavy profit. The story doesn’t end here. In a majority of cases, profit
    is just a smokescreen to hide something bigger and deeper.


    Espionage is also linked to a breach of data of a corporation or an official website
    of a country. These kinds of attacks typically are aimed at retrieving information
    from the victim. There are lots of things that remain the same when it comes to
    espionage through a cyberattack, including monitoring of communication running
    on the cyberspace. There is another popular technique in espionage known as stealing
    secrets. Earlier on, this task came into the domain of individuals who physically
    penetrated the space and compromised certain assets that are found inside the
    organization. To give you a taste of how it all happened, I’ll state an example
    from Hollywood. If you are a fan of Tom Cruise and his spy thrillers, you might
    for sure be acquainted with the character of Ethan, who was always on some kind
    of mission to infiltrate a facility and steal some important documents that could
    turn the tables on the bad guys. Spy is the word that they use for such kind of
    person. Nowadays, things are different. There is hardly anything left in the physical
    domain. The craft of stealing an important bunch of information is more about
    being electric. Computers have the capacity to consume billions of files that
    were once stored in the company’s ledgers and on loads of papers.


    ## Espionage


    Espionage attacks are getting more sophisticated nowadays. Most of them are state-sponsored
    or are financed by the corporate sector. Some professional groups act as independent
    contractors to spy for profit. Espionage is considered as a secretive activity
    in which attackers formulate a plan to avoid detection and achieve their objectives
    of collecting important information about the targeted company or individual.
    Spies are the most persistent attackers who keep on working until they achieve
    their objective. They keep on trying a number of techniques until they accomplish
    their mission. Even if they are detected, they don’t stop their activities and
    go on until the completion of the mission.


    In most cases, the initial worker is indirect, such as a trusted third-party in
    the form of an employee who has access to the computer system you want to target.
    Once the attacker has access inside the system, he will have to move through the
    systems of the organization and also make his way to the data stores of the company.
    If you are running a financial consultancy firm, the most important data should
    be informed about your company’s clients. Once the attacker has access to the
    documents, he will be in a position to blackmail you.


    ## Profit


    The second most common motivation of a hacker is financial gains. They aim at
    making heavy profits by the attack. The methods of profit-driven attackers vary.
    Usually, if the data stolen pertains to credit card and debit card details, it
    is understood that the objective of the cybercrime is financial gain. The information
    cybercriminals steal afterward sold on the dark web to make a hefty profit. This
    is the greatest motivator in today’s world in which locating the net worth of
    everyone is so easy. The transparency in financial transactions and details makes
    money as the single most important objective of a cyberattack. Everyone needs
    money, and no shortage of cybercriminals wouldn’t hesitate to share a pie from
    the money.


    Different hackers use different types of methods that lead to some monetary gain.
    Cybercriminals use a wide range of methods using financial malware such as Dridex,
    Shifu, Carbanak, and Rovnix to siphon off loads of swag from the bank accounts
    of the victim. Another method to rob victims is to by using ransomware such as
    Tesla. Denial of service attacks (DDoS) is another profit-motivated attack that
    has become pretty top-notch in popularity over the past years.


    Whether you are the owner of a consultancy firm or a retailer of clothes, you
    are at a high risk of a serious cyber threat if you conduct your transactions
    online. They are always after user and financial details that could lead him to
    the source of your finances as well as your customers’ finances. If they loot
    you, you are devastated because you will not have precious capital to hold grounds.
    If they loot your customers, you will lose your hard-earned reputation in the
    market that is equally devastating for your business. In both ways, you are at
    great risk of losing your business. Attackers, at the height of rage, can use
    a malware that can target your point of sale (POS) systems.


    Sometimes, profit alone is the sole objective of an attacker. For example, your
    company has secured a contract from the Pentagon to produce sophisticated weapons,
    and you are on your way to producing them. Hackers can target your company’s database
    to compromise sensitive information that can be of strategic and police use of
    the attacker. The attacker can be a country that needs this strategic information
    to update her defense assets. It can be used by politicians to shape up their
    political campaigns. The chances are high that the state sponsors this kind of
    attack. Usually, states conduct this kind of classified mission through state-backed
    resources, but sometimes lack of resources can come in their way, and they have
    to outsource this kind of mission to experts. Let’s take a look at the most breached
    industries across the world.


    Virtually all business is at a considerable risk of a cyberattack, but some industries
    seem to be more vulnerable to these cyberattacks than the rest of the lot. The
    type of data that these companies hold makes them more vulnerable to cyberattacks.
    The very first industry on the line is the health industry.


    ## Health


    The health sector tops the list of cyberattacks in the United States, and there
    are some valid reasons for that. The health sector carries personal information
    such as names, addresses, information about the income of people, social security
    numbers, and email IDs. Hackers break into the databases at hospitals and access
    this information to exploit it later on. Their mode of attack is to gain a kind
    of unauthorized access to medical programs and an effort to get prescription drugs.
    Most of the threat has its origins inside the organization while some of the attacks
    are due to some kind of human error such as leakage of information about a patient
    by an employee of the hospital. The employee might not have suspected that the
    information could be manipulated by an individual or an organization.


    ## Public Sector


    The second vulnerable sector is public administration. Public administration,
    such as government departments carry details about the employees, such as names,
    addresses, bank account numbers, and other personal information that can be compromised
    and misused if it comes in the hands of bad guys. Another reason why hackers highly
    target the public sector is that it suffers from a lack of funding in the cybersecurity
    realm that makes it weak and a potential target of cybercriminals. Personal information
    of high-ups and confidential information is at the top of the list of a hacker’s
    to-do chart. Confidential information can be sold on the dark web for a heavy
    price. It can also be sold to a state for bigger profits.'
  mdcn: '## 第一章 常见网络攻击


    随着黑客们不断推出最新、最具创新性的攻击方法，威胁着不同计算机网络的安全，网络攻击正变得高度复杂。这些攻击变得如此复杂，以至于越来越难以检测。因此，这些攻击比以往任何时候都更具致命性。


    网络安全并不取决于你组织的规模。无论你是初创企业还是价值数百万美元的公司，你都应该意识到网络攻击可能带来的风险有多大。网络攻击的兴起引出了一个问题：黑客为什么要攻击网络空间？这种恶性攻击背后的动机是什么？普遍的看法是，经济利益驱使他们对大公司的计算机系统进行高调的网络攻击。有些人这样做也是出于间谍目的。本章将揭示黑客渗透个人计算机或企业计算机背后的动机。


    大多数情况下，攻击是一种旨在渗透信用卡和借记卡详细信息的违规行为。这些信息随后会在暗网上出售，以获取巨额利润。故事并未就此结束。在大多数情况下，利润只是一个掩盖更大、更深层次问题的烟幕。


    间谍活动也与公司或国家官方网站的数据泄露有关。这类攻击通常旨在从受害者那里获取信息。在通过网络攻击进行间谍活动方面，有许多事情保持不变，包括监控网络空间上的通信。间谍活动中还有另一种流行的技术，称为窃取机密。早些时候，这项任务属于那些物理渗透到空间并破坏组织内部某些资产的个人领域。为了让你了解这一切是如何发生的，我将举一个好莱坞的例子。如果你是汤姆·克鲁斯及其间谍惊悚片的粉丝，你肯定熟悉伊森这个角色，他总是执行某种任务，渗透到某个设施并窃取一些可能扭转局势的重要文件。间谍就是他们用来形容这种人的词。如今，情况不同了。物理领域几乎没有什么东西了。窃取重要信息群的技术更多地与电子化有关。计算机有能力处理数十亿个曾经存储在公司账簿和大量纸张上的文件。


    ## 间谍活动


    如今，间谍攻击正变得越来越复杂。其中大多数是国家资助的或由企业部门资助的。一些专业团体作为独立承包商为利润而进行间谍活动。间谍活动被认为是一种秘密活动，攻击者制定计划以避免被发现，并实现收集有关目标公司或个人的重要信息的目标。间谍是最执着的攻击者，他们会一直工作直到实现目标。他们会尝试多种技术，直到完成任务。即使被发现，他们也不会停止活动，而是继续进行直到任务完成。


    在大多数情况下，最初的工作者是间接的，例如一个可信赖的第三方，形式为一个有权访问你想要瞄准的计算机系统的员工。一旦攻击者进入系统内部，他就必须穿过组织的系统，并找到通往公司数据存储的路径。如果你经营一家金融咨询公司，最重要的数据应该是关于你公司客户的信息。一旦攻击者访问到这些文件，他就有能力敲诈你。


    ## 利润


    黑客的第二个最常见动机是经济利益。他们旨在通过攻击获取巨额利润。利润驱动型攻击者的方法各不相同。通常，如果被盗数据涉及信用卡和借记卡详细信息，可以理解网络犯罪的目的是经济利益。网络罪犯窃取的信息随后在暗网上出售，以获取巨额利润。这是当今世界最大的驱动力，在这个世界里，确定每个人的净资产如此容易。金融交易和细节的透明度使得金钱成为网络攻击的唯一最重要的目标。每个人都需要钱，没有哪个网络罪犯会犹豫不决地分享这笔钱的一部分。


    不同的黑客使用不同类型的手段来获取一些经济利益。网络罪犯使用各种方法，利用金融恶意软件如 Dridex、Shifu、Carbanak 和 Rovnix，从受害者的银行账户中窃取大量财物。另一种抢劫受害者的方法是使用勒索软件，如
    Tesla。拒绝服务攻击（DDoS）是另一种以利润为动机的攻击，近年来其受欢迎程度已变得相当高。


    无论你是咨询公司的所有者还是服装零售商，如果你在线进行交易，你都面临着严重的网络威胁的高风险。他们总是觊觎用户和财务细节，这些细节可能引导他们找到你的资金来源以及你客户的资金来源。如果他们抢劫你，你会崩溃，因为你将没有宝贵的资金来维持业务。如果他们抢劫你的客户，你将失去辛苦赢得的市场声誉，这对你的业务同样具有毁灭性。无论哪种方式，你都面临着失去业务的巨大风险。攻击者在极度愤怒时，可以使用针对你销售点（POS）系统的恶意软件。


    有时，利润本身是攻击者的唯一目标。例如，你的公司已获得五角大楼的合同，生产精密武器，而你正在生产过程中。黑客可以针对你公司的数据库，破坏可能对攻击者具有战略和警察用途的敏感信息。攻击者可能是一个需要这些战略信息来更新其国防资产的国家。它也可能被政客用来塑造他们的政治竞选活动。国家资助这类攻击的可能性很高。通常，国家通过国家支持的资源进行这种机密任务，但有时资源不足会阻碍他们，他们不得不将这种任务外包给专家。让我们看看全球最容易受到攻击的行业。


    实际上，所有业务都面临着网络攻击的相当大的风险，但某些行业似乎比其他行业更容易受到这些网络攻击的影响。这些公司所持有的数据类型使它们更容易受到网络攻击。首当其冲的行业是医疗保健行业。


    ## 医疗保健


    医疗保健行业在美国网络攻击名单上名列前茅，这有一些充分的理由。医疗保健行业包含个人信息，如姓名、地址、人们收入信息、社会安全号码和电子邮件 ID。黑客闯入医院的数据库并访问这些信息，以便日后利用。他们的攻击模式是获得对医疗程序的某种未经授权的访问，并试图获取处方药。大多数威胁源于组织内部，而一些攻击是由于某种人为错误，例如医院员工泄露患者信息。员工可能没有怀疑这些信息可能被个人或组织操纵。


    ## 公共部门


    第二个脆弱的部门是公共管理。公共管理部门，如政府部门，包含员工的详细信息，如姓名、地址、银行账户号码和其他个人信息，如果落入坏人手中，这些信息可能被破坏和滥用。黑客高度针对公共部门的另一个原因是，它在网络安全领域缺乏资金，这使其变得脆弱，并成为网络罪犯的潜在目标。高层人士的个人信息和机密信息是黑客待办事项清单上的首要任务。机密信息可以在暗网上以高价出售。它也可以卖给一个国家以获取更大的利润。'
