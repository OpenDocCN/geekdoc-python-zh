    be very limiting; especially if you plan on sending strings thousands or millions
    of miles between devices. This is where the idea of "encoding" comes in.'
- md: 'Encoding is the process of changing a string''s content into something that
    a computer can use more efficiently for sending and storage. To understand how
    encoding works, you need to look at this simple example.


    Let''s say that there is an application which has been programmed to send a command
    to all of the devices in Earth''s environment: "Save all data." The application
    which sends this command would look something like this:


    ```

    here(s = ''Save all data.'') >>> s.encode(''UTF8'') >>> print(s) Save+all+data.

    ```


    One of the important things to understand about encoding is that it happens in
    both directions. Before an encoded string can be sent anywhere, it needs to be
    decoded. In other words, in order for our application above to be able to execute
    the command "Save all data.", it needs to know how to receive and decode a string
    like we''ve made here:


    save''all''data .


    The second important thing you need to understand is that encodings have names;
    and the name of the encoding we used above is UTF-8. An encoding is exactly like
    a programming language; it has a name, an interpreter and it can be used to communicate
    with foreign entities. Now that you''ve learned how encodings work and how strings
    are used to represent commands, we can talk about how we can interpret the command
    "Save all data." in Python using just a string. Translation: Take our string "Save
    all data." and convert it into an ASCII string, then decode the string so it can
    be used as a command. We need first to convert the string into an ASCII format
    because Python 3 uses the ascii encoding which converts strings to uppercase letters.
    Remember that strings can contain any amount of pieces of text, so we need to
    make sure that our command is only going to contain letters or digits in order
    for it to be understood correctly. Once we have the ASCII string, we need to decode
    it to an actual command.


    To make sure our strings can easily be converted and decoded, we will always use
    a "private" string referring to the encoding. Let''s look at that code again:


    ```

    here(s = ''Save all data.'') >>> s.encode(''UTF8'') >>> print(s) Save+all+data.

    >>> s.decode() Save all data.

    ```


    If we go over this code step by step, you''ll see that the first time it runs
    it converts a Python string into an ascii string then it decodes the ascii string
    into a Python object called a ''string''. Then it can be used like any other command.


    The next time around, we can just use the string object''s "encode" method to
    convert the string into a Python string that is UTF-8 for saving all data. Also,
    remember that strings also have methods that can be used for converting between
    multiple different encodings in addition to the convert between ASCII and UTF-8
    that we used in this exercise. Let''s look at another example:


    ```

    here(s = ''ananas'') >>> s.encode(''UTF8'') >>> print(s) ananas >>> s.decode()

    ananas >>> s.encode(''ASCII'') ananas

    ```


    The last thing you need to know about encoding is that Python uses a number of
    encodings as defined by the variable "encoding". These encodings are:


    ```

    ascii = ''ASCII''


    iso_8859_1 = ''latin1''


    utf_8 = ''utf-8''

    ```


    Now that you know everything you need to know about encoding, let''s talk about
    how we can use this knowledge to make our own program more efficient when sending
    and receiving strings.

    Let''s take a look at the following data:


    ```

    data = [''test'',''joke'',''name'']

    ```


    ```

    print(''All'',data,''of'',len(data),''with'',len(data),''no'',len(data),''newlines.'')

    ```


    The code above gets the length of a list and outputs it in multiple ways. So why
    is this a big deal? Well, if we were to add one new item to our list, how many
    lines of output would we get? Let''s find out. Here''s what we''ll do: add one
    new item to our list, then run the code above. Here''s the code:


    ```

    data = [''test'',''joke'',''name'',''newline'']

    ```


    ```

    print(''All'',data,''of'',len(data),''with'',len(data),''no'',len(data),''newlines.'')

    ```


    We get the following output: All 4 of 5 with 0 newlines. . If you''re observant,
    you might have noticed that we got one more line than before. This is because
    the list was empty and so when it printed len(data) , it added a newline because
    newlines aren''t allowed in Python, but they are allowed in some programming languages
    such as C++.


    ## Chapter 12. Iterative Programming


    Iterative programming is a powerful technique for transitioning from vague, undefined
    systems to more specific and refined ones through repeated development cycles.
    The process typically begins with an initial set of requirements that is then
    implemented quickly and imperfectly. The system is then evaluated and improved
    based on the initial goal to meet or exceed this target.


    The process repeats until the system approaches perfection regarding its original
    specifications—at which point maintenance takes over to keep things running smoothly.
    This style of development initiates a cycle called the "iteration," which starts
    again after completion with a new set of requirements or objectives (hence "iterative").
    It is well suited for software systems in which conditions are constantly changing
    or added as a product matures.


    There are several iterations within the iteration (i.e., a hierarchy of iterations)
    that add detail to the system in a step-by-step fashion. Building an iterative
    approach into an organization''s development cycle typically requires planning
    upfront so that time can be set aside throughout the project to implement and
    evaluate each iteration; allowing flexibility for changes; defining what constitutes
    successful completion of an iteration as well as project completion, so that there
    are consistent goals at all levels; and providing structure in the form of a framework
    to communicate what the system does and doesn''t do.


    Iterative methods are generally designed to help a team develop a solution incrementally,
    in small portions, and interactively. This is opposed to waterfall methodologies
    that impose an entire solution in one go from the very beginning.


    The focus of iterative methodologies is on being "continuously improving" rather
    than "frequently shipped"; thus, the term iterative here does not necessarily
    refer to the cyclical nature of the methodological approach but rather about continuous
    improvement. In this sense, the adjective "iterative" means that systems are built
    as small modules that can be incrementally evaluated and improved. It is an incremental
    approach to delivering solutions that enables modular implementation.


    The iterative approach is a common practice in product design and development,
    particularly in the computer industry. It is also relevant to project management
    and other areas. By applying the framework of an iteration to project management,
    projects can be planned with a short-term goal (or milestone). Each major phase
    or iteration of the project then adds some critical functionality that users need
    in order for the system to be useful. The iterative approach in project management
    enables problems and issues to be spotted early on and allows planning for time
    contingencies. This is crucial because it helps ensure that deliverables from
    each iteration are actually practical and usable by end-users.


    The iterative approach also works well in a project environment with changing
    requirements. Project managers can plan on using the iterative approach when they
    expect the end-user to dictate system functionality. Plus, by baselining requirements
    at the beginning of each iteration, project managers can control how features
    get implemented and ensure that they are coordinated with other features planned
    for future iterations.


    The key to an effective iterative development process is identifying potential
    issues early, allowing time and budget for corrective action so that delivery
    dates are not jeopardized. This is also important because it helps make sure that
    deliverables from each iteration are actually practical and usable by end-users.


    For example, a project manager should consider the following issues when planning
    an iteration:

    This helps ensure that deliverables from each iteration are valuable and usable
    by end-users. For example, if the requirements for a new feature change at the
    last moment, the team can work to accommodate changes and still meet the budget/schedule.
    This is vital because it helps ensure that deliverables from each iteration are
    practical and usable by end-users.


    The iterative approach to development also works well in a project environment
    with changing requirements. Project managers can plan on using the iterative approach
    when they expect the end-user to dictate system functionality. Plus, by baselining
    requirements at the beginning of each iteration, project managers can control
    how features get implemented and ensure that they are coordinated with other features
    planned for future iterations.'
  mdcn: '编码是将字符串内容转换为计算机能更高效地用于发送和存储的形式的过程。要理解编码的工作原理，你需要看这个简单的例子。


    假设有一个应用程序，它被编程为向地球环境中的所有设备发送一条命令：“保存所有数据。”发送此命令的应用程序看起来会像这样：


    ```

    here(s = ''Save all data.'') >>> s.encode(''UTF8'') >>> print(s) Save+all+data.

    ```


    关于编码，需要理解的重要一点是它是双向发生的。在编码后的字符串可以发送到任何地方之前，它需要被解码。换句话说，为了让我们的上述应用程序能够执行“保存所有数据。”命令，它需要知道如何接收和解码我们在这里创建的这样的字符串：


    save''all''data .


    你需要理解的第二个重要事项是编码有名称；我们上面使用的编码名称是UTF-8。编码就像一种编程语言；它有一个名称、一个解释器，并且可以用于与外部实体通信。既然你已经了解了编码的工作原理以及字符串如何用于表示命令，我们就可以讨论如何在Python中仅使用字符串来解释“保存所有数据。”命令了。翻译：将我们的字符串“保存所有数据。”转换为ASCII字符串，然后解码该字符串，以便它可以作为命令使用。我们需要首先将字符串转换为ASCII格式，因为Python
    3使用ASCII编码，它将字符串转换为大写字母。请记住，字符串可以包含任意数量的文本片段，因此我们需要确保我们的命令只包含字母或数字，以便它能被正确理解。一旦我们有了ASCII字符串，我们需要将其解码为实际的命令。


    为了确保我们的字符串可以轻松地转换和解码，我们将始终使用一个“私有”字符串来引用编码。让我们再看一下那段代码：


    ```

    here(s = ''Save all data.'') >>> s.encode(''UTF8'') >>> print(s) Save+all+data.

    >>> s.decode() Save all data.

    ```


    如果我们逐步查看这段代码，你会看到它第一次运行时将一个Python字符串转换为ASCII字符串，然后将ASCII字符串解码为一个名为“string”的Python对象。然后它就可以像任何其他命令一样使用了。


    下一次，我们可以直接使用字符串对象的“encode”方法将字符串转换为用于保存所有数据的UTF-8 Python字符串。另外，请记住，字符串也有方法可用于在多种不同编码之间进行转换，而不仅仅是我们在本练习中使用的ASCII和UTF-8之间的转换。让我们看另一个例子：


    ```

    here(s = ''ananas'') >>> s.encode(''UTF8'') >>> print(s) ananas >>> s.decode()

    ananas >>> s.encode(''ASCII'') ananas

    ```


    关于编码，你需要知道的最后一件事是Python使用由变量“encoding”定义的多种编码。这些编码是：


    ```

    ascii = ''ASCII''


    iso_8859_1 = ''latin1''


    utf_8 = ''utf-8''

    ```


    既然你已经了解了关于编码的所有知识，让我们谈谈如何利用这些知识使我们自己的程序在发送和接收字符串时更高效。

    让我们看看以下数据：


    ```

    data = [''test'',''joke'',''name'']

    ```


    ```

    print(''All'',data,''of'',len(data),''with'',len(data),''no'',len(data),''newlines.'')

    ```


    上面的代码获取列表的长度并以多种方式输出它。那么为什么这很重要呢？嗯，如果我们向列表中添加一个新项目，我们会得到多少行输出？让我们找出答案。我们将这样做：向列表中添加一个新项目，然后运行上面的代码。代码如下：


    ```

    data = [''test'',''joke'',''name'',''newline'']

    ```


    ```

    print(''All'',data,''of'',len(data),''with'',len(data),''no'',len(data),''newlines.'')

    ```


    我们得到以下输出：All 4 of 5 with 0 newlines. . 如果你观察仔细，你可能已经注意到我们比之前多了一行。这是因为列表之前是空的，所以当它打印len(data)时，它添加了一个换行符，因为Python中不允许使用换行符，但在一些编程语言如C++中是允许的。


    ## 第12章 迭代式编程


    迭代式编程是一种强大的技术，通过重复的开发周期，将模糊、未定义的系统转变为更具体、更完善的系统。该过程通常从一组初始需求开始，然后快速且不完美地实现。然后根据初始目标评估和改进系统，以达到或超过该目标。


    该过程重复进行，直到系统在其原始规范方面接近完美——此时维护接管以保持一切顺利运行。这种开发风格启动了一个称为“迭代”的循环，该循环在完成后以一组新的需求或目标重新开始（因此称为“迭代”）。它非常适合那些在产品成熟过程中条件不断变化或增加的软件系统。


    迭代内部还有几个迭代（即迭代的层次结构），它们以逐步的方式为系统增加细节。将迭代方法纳入组织的开发周期通常需要提前规划，以便在整个项目中留出时间来实施和评估每个迭代；允许灵活性以进行更改；定义什么构成迭代的成功完成以及项目的完成，以便在所有级别都有一致的目标；并以框架的形式提供结构来沟通系统做什么和不做什么。


    迭代方法通常旨在帮助团队以增量、小部分和交互式的方式开发解决方案。这与瀑布方法形成对比，后者从一开始就一次性强加整个解决方案。


    迭代方法的重点是“持续改进”而非“频繁发布”；因此，这里的术语“迭代”不一定指方法论的循环性质，而是关于持续改进。从这个意义上说，形容词“迭代”意味着系统被构建为可以增量评估和改进的小模块。这是一种增量交付解决方案的方法，支持模块化实施。


    迭代方法是产品设计和开发中的常见做法，尤其是在计算机行业。它也与项目管理和其他领域相关。通过将迭代框架应用于项目管理，项目可以规划一个短期目标（或里程碑）。然后项目的每个主要阶段或迭代都会添加一些用户需要的关键功能，以使系统有用。项目管理中的迭代方法能够及早发现问题和议题，并允许为时间意外情况做计划。这至关重要，因为它有助于确保每个迭代的交付物对最终用户来说是实际可用的。


    迭代方法在需求不断变化的项目环境中也表现良好。当项目经理预期最终用户将决定系统功能时，他们可以计划使用迭代方法。此外，通过在每个迭代开始时确定需求基线，项目经理可以控制功能的实现方式，并确保它们与为未来迭代计划的其他功能相协调。


    有效迭代开发过程的关键是及早识别潜在问题，为纠正措施留出时间和预算，以免危及交付日期。这一点也很重要，因为它有助于确保每个迭代的交付物对最终用户来说是实际可用的。


    例如，项目经理在规划迭代时应考虑以下问题：

    这有助于确保每个迭代的交付物对最终用户来说是有价值且可用的。例如，如果新功能的需求在最后一刻发生变化，团队可以努力适应变化，同时仍然满足预算/进度。这至关重要，因为它有助于确保每个迭代的交付物对最终用户来说是实际可用的。


    开发的迭代方法在需求不断变化的项目环境中也表现良好。当项目经理预期最终用户将决定系统功能时，他们可以计划使用迭代方法。此外，通过在每个迭代开始时确定需求基线，项目经理可以控制功能的实现方式，并确保它们与为未来迭代计划的其他功能相协调。'
