  md: '# # Why Java?


    Of course, one of the key reasons to use Java is its focus on Object-oriented
    programming.


    Object-oriented programming, or “OOP” is a type of programming language model
    which allows the program’s code to be organized around data, rather than functions
    and logic, which is known as procedural programming.


    These “data clusters” are organized into things called “objects,” hence the moniker
    of “object-oriented programming.”


    These objects are created by something called “classes,” understood here in the
    traditional sense of how classes are: types of objects, allowing the programmer
    to “classify” them according to two major criteria: attributes and methods.


    The attributes of a class are the raw data that will create the object: these
    are its descriptors, such as the values that it possesses, and other relevant
    data that will make up the object. The second criterion is the “method” of the
    object.


    This “method” is the behavior, or the logical sequences contained within the class,
    describing how it interacts or can be interacted with natively.'
