    A program consists of three parts: input, transformation, and output (or simply
    just "input", "transformation", and "output"). These three steps must be completed
    in order to compile a program written in Java successfully. This means that in
    order to make the program work, you need to follow these steps:


    - 1. The first step is input. This means that the program needs data from the
    user, which is usually entered by telling the computer what you want to be done
    and how you want it done. If you have a variable called "x", then it would be
    entered as something like this:

    int x = 1;

    This way, the computer knows that it should interpret this as an integer (i.e.:
    a whole number) value (1). The values that we put into data-driven programs are
    known as inputs.


    - 2. The second step is transformation. This means that the program must take
    the variable and do something with it. This is a much more complicated step, but
    what it really means is that we need to show our users how things are changing
    based on the input they give us (or, in other words, offering them information).
    If you had a variable called "myAge" and you wanted to write your name based on
    its value, then you could do this by doing something like this:


    ```

    System.out.println("Hello myAge")

    ```


    This would change what was output by the program every time myAge changed (i.e.
    every time the user changed their age). The values that we put into programs are
    known as outputs.


    - 3. The third and last step is output. This means that the program needs to save
    or print out the data it has worked with so that it can be stored somewhere else
    (usually on a hard drive, memory stick, etc.). This step is pretty easy because
    all you have to do is use something like this:


    ```

    System.out.println("Hello myAge")

    ```


