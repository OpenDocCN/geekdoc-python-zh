  md: '# Manual Memory Management


    Frequent memory management issues with delete and new are the majorly difficult
    to find and fix the source of the logic error. Programmers have to adhere strictly
    to the following tenets:


    +   - Everything you call new, it should always have an associated call to delete
    provided the allocated memory isn''t longer needed. It may sound simple, but it
    isn''t always clear when delete should be used, but the function below shows a
    memory leak:


    ```

    void calc(int n) {


    // ...


    // Do some stuff


    // ...


    int *x = new int[n];


    // ...


    // Do some stuff with x


    // ...


    // Exit function without deleting x''s memory


    }

    ```


    Provided a program calls on the calc function enough times, the program will eventually
    run out of memory. In the calc function, x is a local variable. In that light,
    x lives on the stack. So when a user uses a particular call to calc completes,
    the function’s clean up code automatically releases the space helped by the variable
    x. Because all functions automatically manage the memory for their local and parameter
    variables. The problem with x is assigned via new to point to memory allocated
    from the heap and not the stack. Function executions manage to which x pointed
    is no deallocated automatically.'
  merge: -1
  pgno: 473
- img_proc: true
  md: '+   - Then operator delete should never be used to free up memory that has
    not been allocated from its previous call to new. The code fragment below illustrates
    one such example:


    ```

    int list[10], *x = list; // x points to list


    // ...


    // Do some stuff


    // ... delete [ ] x; // Logic error, attempt to deallocate x''s memory

    ```


    The space references by the pointer x were not allocated by the operator new,
    so the operator delete should not be used to attempt to free the memory. When
    you attempt to delete a memory that is not allocated with new, it results in an
    undefined behavior that proves a logic error.


    +   - The operator delete must not be used to deallocate the same memory more
    than once. This case is common when two pointers refer to the same memory. Pointers
    like this are called aliases. The following code fragment below illustrates this
    situation better:


    ```

    int *p = new int[10], *y = x; // y aliases x


    // ...


    // Do some stuff with x and/or y


    // ...


    delete [ ] x; // Free up x''s memory


    // ...


    // Do some other stuff


    // ...


    delete [ ] y; // Logic error, y''s memory already freed!

    ```'
