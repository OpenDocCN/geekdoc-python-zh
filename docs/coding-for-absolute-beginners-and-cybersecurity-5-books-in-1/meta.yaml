  md: '# Introduction


    So, you''re interested in learning to code but don''t know where to start? This
    book is going to be your one-stop shop for everything coding. We will give you
    a brief overview of what coding is and how it can make a difference in any industry,
    then we''ll go into why it''s essential for everyone from high school students
    to seniors. We''ll also provide some resources on learning for free and teaching
    yourself more advanced skills on your own time.


    # What is coding?


    Coding is the process where you put instructions into a particular computer language.
    The computer can understand this code, and the code can control how the computer
    functions, which in turn helps people, accomplish their goals. Coding is one of
    the fastest-growing and highest-paying jobs in America. (Bureau of Labour Statistics,
    2015) If you''ve ever used an ATM or used a credit card to pay for something,
    coding was used to help make that happen.


    # How does it work?


    A programmer writes code using special programs on your computer keyboard or a
    text editor, such as Notepad on Windows or TextEdit on OS X. The code tells the
    computer what to do or how to function, like the instructions on a piece of paper
    that you are writing. This code can help a person do anything that requires programming
    skills like making games, connecting electronic devices, programming robots, and
    so much more. Why is it important? Programming skills are essential in every industry.
    Many jobs in technology require coding such as software engineers, technicians,
    and IT specialists. Even more than these jobs, other positions in tech fields
    don''t have programming skills at all but instead require expertise in specific
    programs and languages. In schools, coding is often used to teach students all
    the skills needed for success in many different industries. Coding can give students
    the experience they need to make something happen, learn how to be independent
    and creative, and work well under pressure. It''s nothing to be afraid of; it''s
    just programming!'
  merge: -1
  pgno: 13
- img_proc: true
  md: '# Where can I learn?


    There are plenty of resources out there on the internet to get you started. There
    are many resources available online for free or for a small fee, such as Codecademy,
    Code Academy, Lynda.com, and Udemy. You may even want to try your own hands at
    creating code from scratch - you might have some ideas already. All you need is
    a computer, an internet connection, and some motivation.


    # Code your goals!


    This is only the beginning of where coding can take you in your life! You''ll
    be able to use this knowledge to learn more advanced skills that will have more
    meaning for you on your own time - teaching yourself how to use more advanced
    software languages like C++ or Python. Maybe you''ll become a web designer and
    create your sites or applications to help you learn more about your skills. This
    is the time of your life - take it!


    Coding is just a small step in the larger technology industry, and anyone can
    take that step with you. It''s truly as fun as it sounds and will teach you things
    that can be applied throughout life. If you''re ready to dive in, we''ll see you
    there!'
  merge: -1
