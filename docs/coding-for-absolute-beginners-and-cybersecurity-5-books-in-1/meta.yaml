    ## Chapter 16. Logging in Programs


    Programs are the basic building blocks for coding. Programs can be run without
    a computer by writing them down on paper, typing them into an online editor, or
    talking through their steps aloud.

    Most programs consist of two parts: (1) telling the computer what you want it
    to do and (2) instructing the computer on how to do it. The first part is called
    the command and tells the computer what operations to perform, for example, adding
    two numbers or erasing a file. The second part is called the instruction method
    and tells how to perform these operations, e.g., addition or using an erase function
    in a word processing program.

    To begin, you should learn a simple program to introduce the differences between
    commands and instructions.


    Command: "Hello World" (i.e., "Write your name on the screen.")


    Instructions: (1) from what line of your program do you write your name, (2) is
    it centered or justified, and (3) does it have any special formatting?

    Commands are one word. They tell the computer what to do. For example, one command
    might say: "Write your name on the screen." You don''t want to worry about how
    computer memory space is organized or how to format things for output on display!
    The computer just does them for you. In fact, the computer does all the work for
    you.


    In contrast, instructions tell the computer what to do. For example: "Write your
    name on the screen." This tells the computer how to make your name appear on the
    screen. Some instructions require a bit more detail. For example:


    (1) from what line of your program do you write your name, (2) is it centered
    or justified, and (3) does it have any special formatting?

    Instructions tell not only what to do but also how to do it! Therefore, they are
    called "instructions." For example: "Write your name on the screen. Center justified."
    This tells the computer to:

    Write your name Center justified.


    There are many kinds of instructions. If you want to add a number, you can write
    something like this:


    number = number + 1 Or you could directly express the instruction like this:

    number = number + 1 Write your name Center justified. Add one to the number line.


    In programs, it bothers me when you don''t write the complete step-by-step procedure
    in one command or instruction. Instead, each piece of information is usually separated
    into several more minor instructions called statements. For example, in the examples
    above, there are two separate instructions: (1) "Write your name" and (2) "Center
    justified. Write your name." But they are really one statement that you have divided
    up into smaller pieces.


    In code or computer programs, the "commands" and "instruction methods" can be
    represented as statements or lines of code. Line by line, a program is composed
    of separate instructions and commands. This is how programs work; one line does
    one thing.


    When you write your programs on paper or type them into an online editor like
    Notepad++, you should divide up your instructions into multiple steps so that
    each line has only one instruction. It is important to keep each instruction on
    a different line of code to show what the computer is doing. For example, if your
    program has the instruction "Add one to the number line," this is too long to
    use on one line. Instead, it would be best if you wrote something like this:


    number = number + 1


    Or if your program has the instruction "Write your name," this is too short of
    using on one line. Instead, it would help if you wrote something like this:


    Write your name, what to do.


    When each statement is on a separate line of code, it becomes clear what the computer
    is doing. Later, when we start writing programs in Python and Ruby, you will learn
    which command tells the computer what it wants to do, and which lines specify
    how it does it.'
