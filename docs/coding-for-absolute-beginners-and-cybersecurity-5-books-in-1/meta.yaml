    as part of the improvement cycle, deploying on an early production system.


    One of the more difficult re-engineering parts involves decommissioning legacy
    systems, typically not many years old, and replacing them with new or upgraded
    systems. As the project looks to replace the old system, it should be determined
    what will be the benefit gained from each decision made and then addressed accordingly.'
