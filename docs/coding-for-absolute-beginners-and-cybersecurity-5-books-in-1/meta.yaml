    程序员也可以将此特定 JDK 应用于开发用于简化数据库访问或增强 GUI 属性的 Java 应用程序。


    ## Java EE


    Java EE 平台是一个开源产品，由全球 Java 社区成员协作开发。Java EE 与 Java SE 密切相关，因为前者构建在后者之上。此特定软件集成了旨在用于企业解决方案的变革性创新。新版本中引入的功能和改进通常反映了
    Java 社区成员的意见、需求和请求。Java EE 实际上提供了超过二十种符合 Java 编程标准的实现。


    Java EE SDK 旨在用于构建大规模运营的应用程序。顾名思义，此特定 Java SDK 的创建是为了提供对企业软件解决方案的支持。该 JDK 具有强大的
    API 和运行时属性，Java 程序员需要这些来构建具有可扩展和网络功能的应用程序。需要开发多层应用程序的开发人员也会发现此 JDK 很有用。


    在撰写本书时，Java EE 8 是最新版本。Java EE 的修订设计为企业解决方案提供了增强的技术，以及用于安全和管理目的的现代化应用程序。此版本包含多项改进，包括通过
    Client、JSON Binding、Servlet 和 Security API 提供的更强大的 REST API 功能。根据 Oracle 公司网站截至
    2019 年 12 月发布的信息，此版本还具有 Date and Time API 以及 Streams API。


    ## Java ME


    Java ME 平台部署了简单性、可移植性和动态性，为构建小型小工具和设备的应用程序提供了一个多功能环境。Java ME 以其出色的应用程序开发环境而闻名，这得益于其交互式和用户友好的导航界面，以及实现网络概念的内置功能。它主要与物联网相关联，并且在构建为内置技术或连接设备设计的应用程序时非常有用，这些设备可用于发明或实现未来概念。Java
    ME 的可移植性和运行时属性使其适用于可穿戴设备、手机、相机、传感器和打印机等软件应用程序。


    Java ME SDK 配备了在独立环境中开发软件应用程序、测试功能和实施设备模拟所需的必要工具。根据 Oracle 公司网站截至 2019 年发布的信息，此
    JDK 非常适合容纳“连接受限设备配置”技术以及“连接设备配置”功能。这为开发应用程序提供了一个单一且多功能的环境。


    还有其他几种 Java ME 解决方案支持在应用程序中部署 Java 编程语言。Java ME Embedded 提供了一个运行时环境，将物联网功能集成到设备中，而
    Java ME embedded client 则有助于构建运行和优化内置程序功能的软件解决方案。Java for Mobile 利用 CLDC 和 Java
    ME 开发人员工具堆栈为移动设备创建创新功能。


    ## Java Runtime Environment


    请记住，Java 应用程序要高效运行，必须满足某些条件。JRE 包含负责创建这些必要条件的要素。这包括 JVM 及其相应的文件和类属性。尽管 JRE 作为
    JDK 的一个组件运行，但它能够独立运行，特别是当任务仅限于运行而非构建应用程序指令时。


    JRE 为 Java 编程生态系统中的不同程序提供重要的操作属性。例如，如果一个程序在其内部运行一个独立的 JRE，则该程序被认为是自包含的。这意味着该程序不依赖其他程序来访问
    JRE。这种独立性使得程序能够与不同的操作系统平台兼容。


    ## Java Virtual Machine


    JVM 作为在计算机程序中实现 Java 的规范运行。它是 Java 语言平台独立性特征的驱动力。JVM 作为由其他程序执行的程序的地位进一步强调了这一点。编写与
    JVM 交互并执行 JVM 的程序将其视为一台机器。正是由于这个原因，使用类似的集合、库和接口来编写 Java 程序，以便能够将每个 JVM 实现与特定的操作系统相匹配。这有助于将
    Java 程序翻译或解释为本地操作系统中的运行时指令，从而消除了 Java 编程中对平台依赖性的需求。


    作为开发人员，您必须警惕您的开发环境和应用程序容易受到网络攻击和其他威胁的漏洞。JVM 提供了增强的安全功能，可以保护您免受此类威胁。其坚实的安全基础归功于其内置的语法和结构限制，这些限制存在于类文件的操作代码中。但这并不意味着
    JVM 可以容纳的类文件范围受到限制。实际上，JVM 接受各种类文件，只要它们可以被验证为安全可靠。因此，JVM 是使用其他编程语言开发软件的可行补充替代方案。


    JVM 通常作为移植功能包含在各种软件应用程序和硬件安装中。它通过 Oracle 或任何其他提供商确定的算法来实现。因此，JVM 提供了一个开放的实现平台。JVM
    实际上包含运行时实例作为其命令操作的核心属性。例如，创建一个 JVM 实例只需在命令提示符下编写一条指令，该指令随后运行 Java 的类属性。


    Java 程序员需要熟悉 JVM 的关键领域，例如用于运行时操作的类加载器和数据部分，以及负责执行程序的引擎。还有一些与性能相关的组件，例如垃圾收集器和堆维度工具，它们对
    JVM 的部署同样重要。JVM 和字节码之间有着密切的联系。


    ## Bytecodes


    字节码本质上是 JVM 命令，包含在类文件中，以及其他信息，包括符号表。它们作为后台语言程序运行，负责促进 JVM 操作的解释和执行。字节码实际上是本机代码的替代品，因为
    Java 不提供后者。JVM 寄存器的结构使其包含方法，而这些方法又容纳字节码流——即 JVM 的指令集。换句话说，每个 Java 类内部都有方法，而类文件加载过程会为任何给定方法执行单个字节码流。当程序开始运行时，方法的激活会自动触发一个字节码。


    字节码的另一个重要特性是即时编译器，它在运行时操作期间运行，用于编译可执行的代码。该功能实际上作为 HotSpot JIT 编译器存在于 JVM 生态系统中。它与
    Java 运行时操作并发执行代码，因为它具有在优化级别运行的能力以及扩展和适应不断增长的指令流量的灵活性。以前，JIT 编译器需要频繁调优以消除冗余程序并刷新其内存。调优是一个必要的过程，以确保
    JIT 编译器提供最佳性能。然而，Java 新版本中的频繁升级逐渐引入了自动内存刷新机制，消除了定期调优的需要。'
