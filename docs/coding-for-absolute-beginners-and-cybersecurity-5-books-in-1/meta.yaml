    There are also different types of qualifiers in order to get things to work on
    your C++ code. The following types of qualifiers that you will be able to use
    in order to provide some additional information about the variables the precede
    include:


    +   - Const: Objects that have the “const” will not have the ability to be changed
    by the program while you are executing it.

    - Volatile: The modifier of volatility will tell the compiler that you are able
    to change the value but these changes may not be explicitly specified by the program.


    Restrict: a pointer that has been qualified by restricting is initially the only
    means by which an object it points to can be accessed'
