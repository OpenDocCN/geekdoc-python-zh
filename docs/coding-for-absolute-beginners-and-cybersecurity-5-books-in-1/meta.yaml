    Re-engineering is the process of transforming, improving or redesigning a software
    system, based on analysis and feedback that reveals opportunities to improve functionality,
    efficiency or quality or to respond to changes in the marketplace. In specific
    terms, it is used concerning software projects. Early rethinking of requirements
    (prioritizing), scope and architecture through rapid prototyping.


