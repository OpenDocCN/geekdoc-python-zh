  md: '# # Chapter 8. How Is a Program Executed?


    The first thing with any program is translating it from the original programming
    language (usually in something like C++ or Java) into machine code (zeros and
    ones). This is done by a program called the compiler.


    A program always starts with what is called "statements" or "instructions," which
    tell the computer what to do, either sequentially or in parallel (i.e., by doing
    them at the same time). For example, if you want the program to print out "Hello"
    followed by "World," you would give it the instruction: print("Hello") print("World")


    In machine code, this is written as:


    ```

    0x420000 Hello 0x420001 World 0x420002

    ```


    Where "0x" represents a hexadecimal number (the kind used in computers to describe
    numbers). This shows how each line of code is broken up into its instructions.
    Each instruction looks like a single letter of the alphabet so that the computer
    will know what to do with it. (This is called "coding.")


    BASIC (which stands for "Beginner''s All-purpose Symbolic Instruction Code") was
    designed to be as easy as possible to learn for people who have never programmed
    before. It uses only a few characters that can be typed using a standard keyboard
    to write each line of code. BASIC has been around since the late 1950s and is
    still in use today by programming hobbyists and in many schools, where it is used
    to introduce programming languages in general. You don''t need any special equipment
    or software to learn about or try out programs written using BASIC.


    The most straightforward BASIC programs are written using a few keywords which
    come from the original version of the language, back in the 1960s; they are:'
  merge: -1
  pgno: 38
- img_proc: true
  md: 'PRINT : Prints a line of text on the screen STORE : Stores a number into a
    variable (a name for an area of memory) READ : Reads a line of text from the keyboard
    INTO : Stores or prints out one value that comes from several numbers and/or variables.
    LOOP : Repeats the next line of code until something true is no longer valid.
    GOTO: Jumps to another part of code (instrumental when writing programs) END:
    Ends program.


    These keywords are used in combination to make a complete program. For example,
    the program below prints out the text, "Hello World" on the screen, followed by
    a number between 0 and 10:

    10 PRINT "Hello World" 20 INPUT n 30 IF n<0 THEN GOTO 80 40 PRINT n 50 GOTO 30
    80 END


    The first line tells the computer to start reading instruction from the beginning
    of the following line. The computer, therefore, processes the second line (#10).
    Notice that the number is prefixed with an apostrophe once again, as in the earlier
    "Hello World" program. This is so that the computer knows to read the line as
    a number.


    The third line (#20) tells the computer what to do if it finds something called
    a "conditional" statement, which is used to make sure that something is true before
    carrying on with whatever comes after it. In this case, it checks whether or not
    the user has pressed a key on their keyboard. If they have pressed a key, whatever
    comes between brackets (the lines below) will be processed by the computer. If
    not, then the computer will carry on with the rest of line #20.


    The fourth line (#30) checks if the number that comes after is less than zero
    (i.e., it has a "negative sign"). If so, it jumps back to line #80. This is where
    everything will be repeated as long as that number is negative.


    Therefore, the fourth line (#30) tells the computer that whatever it can see before
    this point in the program should be repeated until it sees a bar called "End."
    If you wanted the computer to carry on until it saw a "Stop" or "End," which might
    be used for debugging, then you would write this:

    30 IF n<0 THEN GOTO 80 40 PRINT n 50 GOTO 30 80 END.'
  merge: -1
  pgno: 39
- img_proc: true
  md: 'This is called a program that "loops." It means that whatever happens happened
    again and again. If everything was printed out when you step through this loop
    (by pressing the "Enter" key), it looks like this:

    As can be seen from these examples, there are several ways to write BASIC programs.
    For example, there are two different ways of writing the line (#30), which checks
    if the number is less than zero.


    ```

    30 IF n<0 THEN GOTO 80

    ```'
  merge: -1
  pgno: 40
- img_proc: true
  md: 'This is one way, which uses a single line "IF" statement. The other way, which
    uses two lines to write the same statement, looks like this:


    ```

    30 IF n<0THEN GOTO 80

    ```


    The computer is programmed to read the line by starting at the beginning of each
    line of code and looking at it row by row. This means that when it finds the "THEN,"
    it will stop reading that line and carry on with whatever follows after. This
    is why the two ways of writing this statement are called different programming
    languages: BASIC or Visual Basic.


    PRINT "Hello World" PRINT "Hello world" PRINT "Hello, World" END A question that
    was asked earlier about programs such as this was why we needed to put line numbers
    after the first line. As you''ve seen, the program is written to read each line
    of code from left to right. The computer can therefore read the lines in any order
    it wants. Often programmers find it more convenient to use line numbers to know
    exactly where they are in the overall program.


    # Textboxes


    Most Visual Basic programs will contain many lines of code. Sometimes you want
    to refer to a particular line, or you might mean something in particular within
    the program. For example, you might want to refer back to a specific part of the
    program, or you might want to display a list of some sort. Textboxes are one way
    of doing this. They allow you to write text as if it was part of your code and
    be able to access it later on by using the commands such as "PRINT", "PRINTA"
    and so on, which were described above.'
  merge: -1
  pgno: 41
- img_proc: true
  md: '# # Chapter 9. What Are Program Statements?


    Program statements are the individual instructions that you, as the programmer,
    give to your computer.

    Code is often written in a programming language. A programming language is a set
    of symbols and rules used to create commands for computers to execute. Each line
    of code in a program statement needs to be spaced out with one space between each
    word and wrapped at 80 characters so the code can be easily read by humans and
    machines alike.

    We all know how frustrating it can be when you want something done but don''t
    know how or where to start. I''ll take you from the beginning, explaining everything
    you need to know to create your programs. I''ll show you how to write, compile
    and run a program. Each section will give you another skill, which will build
    on the previous skills and knowledge and give you an ever-increasing understanding
    of programming.


    I want to make programming easy for beginners just like me! You see, I started
    my first programming course at university with absolutely no prior experience
    in coding whatsoever. I had no idea what the lecturer was talking about or how
    he expected us to do our coursework. This frustration led me on a mission to find
    out how others had been taught programming or how they had learned themselves,
    and what difficulties they had come across. I found out that many people started
