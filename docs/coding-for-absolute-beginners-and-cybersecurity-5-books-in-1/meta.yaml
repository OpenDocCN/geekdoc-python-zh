    Data scientists are required to build applications to work on data, among other
    things. This chapter will explore the basics of object-oriented programming in
    Python.


    Object-Oriented Programming abbreviated as OOP has several advantages over other
    design patterns. The development process is faster and cheaper, with great software
    maintainability. This, in turn, results in better software, which is also filled
    with new attributes and methods. The learning curve, is; however, complex. The
    idea might be complicated for newbies. In terms of computation, OOP is slower
    and consumes a lot of memory because more lines of code have been written.


    Object-oriented programming relies on the important programming concept, which
    makes use of statements to change a program’s state. It concentrates on illustrating
    how a program should operate. Examples of imperative programming languages are
    Java, C++, C, Ruby, and Python. This is different from declarative programming,
    which deals with the type of computer program that should achieve, without detailing
    how. Examples consist of database query languages such as XQuery and SQL.


    OOP relies on the property of classes and objects. A class can be considered as
    a ‘blueprint’ for objects. These can feature their own characteristics and methods
