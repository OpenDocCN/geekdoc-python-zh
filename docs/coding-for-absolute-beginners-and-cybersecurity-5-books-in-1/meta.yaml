  md: '# STL Iterators


    Iterators, containers, and algorithms are components of the Standard Template
    Library written by Alexander Stepanov et al., of Hewlett-Packard in the early
    1990s and subsequently merged and advanced in the Standard Library.


    An iterator is an abstraction of a specialized pointer that dereferences over
    elements of a given container (such as vector, map, and user made container classes).


    Each container class would contain member functions for generating iterators,
    for example, members begin (), and end () would return iterator for the first
    element, and for one after its last element, respectively.


    The following figure depicts the relation between an iterator (*it) and its container
    (vector<int>data {1111, 1134, 1134, 1124, 1124, 1134, 1111, 1176, 1124, 1134,
    1176}).


    Then, the iterator can incorporate those elements of the container in algorithmic
    operations (such as sort, accumulate, and user made algorithm functions).


    In other words, an iterator associates a container with an algorithm.


    The most frequently used iterators are from begin () and end (). This is illustrated
    in the figure below:


