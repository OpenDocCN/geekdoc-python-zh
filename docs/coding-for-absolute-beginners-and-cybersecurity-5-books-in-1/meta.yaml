    \ 的一个对象。\n- 你可以使用 `cout<<flush` 来强制刷新输出缓冲区。\n- `cout.write` 可以用来输出字符串；它会输出指定长度的字符串，即使到达字符串末尾。\n\
    \n## 其他流\n\n## 文件\n\n- 当你很好地学习了 cin 和 cout 后，你会发现文件操作非常简单。只需将 cin 或 cout 替换为你的\
    \ ifstream、ofstream 或 fstream 对象。\n\n```\nstd::fstream ifs;\nifs.open (\"test.txt\"\
