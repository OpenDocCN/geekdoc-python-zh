    # # Chapter 7. Object-Oriented Programming


    You have learned earlier that Java is an object-oriented programming language.
    As such, it supports the fundamental principles of this programming paradigm.


    An object refers to real entities such as bag, car, chair, or pen. Object-oriented
    programming languages allow programmers to design programs that use objects and
    classes. They provide and support features that can simplify software development
    and maintenance. The most important concepts of this programming paradigm are
    the following:


    +   - Objects

    - Classes

    - Method

    - Instance

    - Inheritance

    - Abstraction

    - Polymorphism

    - Message Parsing

    - Encapsulation


    # # Objects


    In the real world, you will encounter objects such as humans, dogs, cars, and
    cats. These objects possess state and behavior. For instance, when you think of
    a cat, its state can consist of its breed, color, or name. Its behavior may consist
    of running, jumping, or wagging its tail.


    A software object resembles a real-world object in terms of these characteristics.
    Its state is saved in fields, and its behavior is exhibited through methods.


    In development, the methods are performed on an object’s internal state, and the
    methods facilitate communication between objects.'
- md: "## Classes\n\nClasses are used to set the definitions for objects. These specifications\
    \ serve as blueprints for creating objects. While they are not immediately applied\
    \ when classes are created, the definitions are available in case an object of\
    \ the class is instantiated. An object or class can have multiple copies or instances\
    \ within a program.\n\n```java\npublic class Cat {\n    String breed;\n    int\
    \ age;\n    String color;\n\n    void running() {\n    }\n\n    void sleeping()\
    \ {\n    }\n\n    void jumping() {\n    }\n}\n```\n\nFollowing is an example of\
    \ a class definition for a class named Cat:\n\nA class can have the following\
    \ types of variable:\n\n## Class variables\n\nClass variables are those that are\
    \ declared inside a class using the static modifier and outside any method.\n\n\
    ## Local variables\n\nLocal variables are those that are defined within the methods,\
    \ blocks, or constructors. These variables are declared and instantiated inside\
    \ the method and are destroyed once the method has been carried out.\n\n## Instance\
    \ variables\n\nInstance variables are those that are inside a class but outside\
    \ of the methods. They are initialized at the same time as the class. They can\
    \ be accessed from a method, block, or constructor of that specific class.\n\n\
    A class can contain as many methods as necessary to obtain the values it needs.\
    \ For example, the Cat class has three methods: running(), sleeping(), and jumping().\n\
    \n## Constructors\n\nA constructor is a method which is used to initialize an\
    \ object. A class must contain at least one constructor.\n\nThe following are\
    \ the important rules for constructors:\n- The name of the constructor should\
    \ match the name of the class.\n- It should have no explicit return type.\n\n\
    ## Types of Constructors\n\n- Default or no-arg constructor\n- Parameterized constructor\n\
    \n### Default Constructor\n\nA constructor without a parameter is called default\
    \ constructor.\n\n`<class_name>()` Here's the syntax:\n\n## Parameterized Constructor\n\
    \nA parameterized constructor is a constructor with parameters. It is used to\
    \ supply values to specific objects.\n\nThe following example shows both types\
    \ of constructors. The first one is a default constructor, and it doesn't have\
    \ any parameter. The second constructor has one parameter, the name.\n\n```java\n\
    public class Kitten {\n    public Kitten() {\n    }\n\n    public Kitten(String\
    \ name) {\n        // This constructor has one parameter, name.\n    }\n}\n```\n\
    \n## Creating Objects\n\nClasses provide the template for objects. Objects are\
    \ basically created from a class. To create new objects, you will use the ‘new’\
    \ keyword.\n\nThe following steps are taken to create a new object from a class:\n\
    \n- Declaration—This refers to a variable declaration where you will write the\
    \ name of the variable and its object type.\n- Instantiation—To create a new object;\
    \ you will use the ‘new’ keyword.\n- Initialization—A call to a constructor follows\
    \ the ‘new’ keyword and initializes a new object.\n\nThe following examples show\
    \ the different steps taken to create a new object from a class:\n\n```java\n\
    public class Kitten {\n    public Kitten(String name) {\n        // This constructor\
    \ contains a parameter, the name.\n        System.out.println(\"Passed Name is:\"\
    \ + name);\n    }\n\n    public static void main(String[] args) {\n        //\
    \ Following statement would create an object myKitten\n        Kitten myKitten\
    \ = new Kitten(\"spotty\");\n    }\n}\n```\n\nHere’s the output:\n\n```\nPassed\
    \ Name is: spotty\n```\n\n## How to Access Methods and Instance Variables\n\n\
    The created objects are used to access methods and instance variables. To access\
    \ instance variables, you will use these steps:\n\nFirst, you must create an object:\n\
    \n```java\nObjectName = new Constructor();\n```\n\nNext, call a variable like:\n\
    \n```java\nObjectName.variableName;\n```\n\nTo call a class method:\n\n```java\n\
    ObjectName.MethodName();\n```\n\n## Java Package\n\nA package is simply a way\
    \ of grouping interfaces and classes. A Java package serves as a container for\
    \ classes. The usual basis for grouping is functionality. The use of packages\
    \ facilitates code reusability. When interfaces and classes are categorized into\
    \ packages, you can easily access them for use in other programs. The use of packages\
    \ also helps prevent name conflicts among classes and interfaces.\n\nTo create\
    \ a package, use the package statement before the package name as the first statement.\n\
    \n```java\npackage mypack;\npublic class students {\n    // statement;\n}\n```\n\
    \nHere’s an example:\n\n## Import Statement\n\nYou may use the import keyword\
    \ to import packages to your source file. An import statement makes it easy for\
    \ the compiler to find the location of a class or source code.\n\nYou may want\
    \ to import just one class from a package. You can use the dot operator to indicate\
    \ the package and the class. For example:\n\n```java\nimport java.util.Date;\n\
    class MyDate extends Date {\n    // statement.\n}\n```\n\nTo import all classes\
    \ from one package, you can use the wild character * after the dot operator. For\
    \ example:\n\n```java\nimport java.io.*;\n```\n\n## Modifiers\n\nModifiers are\
    \ keywords that alter the meaning of the definitions in your code. Java provides\
    \ several modifiers.\n\n## Access Modifiers\n\nThe access modifiers are used to\
    \ define access levels for methods, variables, classes, and constructors.\n\n\
    ### Private—only accessible within the class\n\nWhen a method, variable, class,\
    \ or constructor is declared private, it means that it is only available within\
    \ the class. If the class, however, has public getter methods, you may be able\
    \ to access a private variable outside the class. The private keyword indicates\
    \ the highest access restriction. Take note that you cannot declare interfaces\
    \ and class as private.\n\n### Public—accessible to the world\n\nA method, interface,\
    \ constructor, class, etc. that has been defined as public may be accessed from\
    \ other classes. Similarly, blocks, methods, or fields that have been defined\
    \ inside a public class may be accessed from Java class. This is true as long\
    \ as they are in the same package. If you want to access a public class from another\
    \ package, you will have to import the public class. Under the class inheritance\
    \ concept, subclasses inherit all public variables and methods of a class.\n\n\
    Take note that an application’s main() method will have to be declared public\
    \ before the Java interpreter can call it to run the class.\n\n### Protected—accessible\
    \ to all subclasses and package\n\nDeclaring a method, variable, or constructor\
    \ as protected in a superclass makes it accessible only to classes within its\
    \ package or to its subclasses in another package. This access type is used if\
    \ you want to allow the subclass to use variable or helper methods and prevent\
    \ non-related classes from using them. Interfaces, as well as the fields and methods\
    \ under them, should not be declared protected, but fields and methods outside\
    \ of the interface can be declared protected. Classes should not be declared as\
    \ protected.\n\n### Default: Applicable when no modifier is provided—accessible\
    \ to the package\n\nA method or variable that has been declared without a modifier\
    \ is accessible to other classes within the package.\n\nThe following table summarizes\
    \ the different access modifiers and their effect:\n\n| Modifier | Inside class\
    \ | Inside package | Outside package by subclass | Outside package |\n| :--- |\
    \ :---: | :---: | :---: | :---: |\n| Private | Y | N | N | N |\n| Public | Y |\
    \ Y | Y | Y |\n| Protected | Y | Y | Y | N |\n| Default | Y | Y | N | N |\n\n\
    ## Non-access Modifiers\n\nThe non-access modifiers can be used to access various\
    \ functionalities in Java.\n\n### Final—used to finalize implementations of variables,\
    \ methods, and classes\n\n#### Final variables\n\nYou can only explicitly initialize\
    \ a final variable once. When you declare a variable as final, you will never\
    \ be able to reassign it to another object. Take note, however, that you can still\
    \ change the data stored inside the object. This means that while you may change\
    \ the object’s state, you will not be able to change the reference. The final\
    \ modifier is commonly paired with static to create a class variable out of the\
    \ constant value."
