- md: "## Manipulate stream\n\n1. Peek return the next character from input without\
    \ extracting from the input stream. For example, you want to read input up to\
    \ the first newline or period.\n\n```cpp\nchar input[80];\nint i = 0;\nwhile(\
    \ (ch=cin.peek()) != '.' && ch != '\\n')\n    cin.get(input[i++]);\ninput[i] =\
    \ '\\0';\n```\n\n2. Gcount() method returns the number of characters read by the\
    \ last unformatted extraction method. That means character read by the a get(),\
    \ getline(), ignore(), or read(), but not extraction operator.\n\n3. Putback()\
    \ function inserts a character back in the input buffer.\n\n## Chapter 10 Memory\
    \ and Resources\n\n## Memory Management\n\nC++ programming language provides a\
    \ lot of options to users when it comes to managing the memory used by an executing\
    \ program. In this chapter, we shall be exploring some of these frequently used\
    \ options. We would also introduce some modern techniques aimed at reducing the\
    \ memory management problems that have plagued C++ projects in the past.\n\n##\
    \ Memory Available to C++ Programs\n\nModern operating systems usually reserve\
    \ a section of its memory for executing a program that allows the operating system\
    \ to manage multiple program executions simultaneously. There are different operating\
    \ systems which layout the memory of executing the program in different ways.\
    \ However, the layout would include the following four sections.\n\n- Code: The\
    \ program's compiled executable instructions are held in the code section memory.\
    \ While the program executes, the contents of the code section should never change.\
    \ Also, during the program's executions, the code segment does not change as well.\n\
    - Data: Persistent variables and global variables are held in the data section\
    \ of the memory as in static locals. Throughout the life span of the executing\
    \ program is the variables of the data would exist. However, unless the data is\
    \ a constant, the executing program may freely change their values. Although the\
    \ values stored in the variables found in the data segment may change during the\
    \ program's execution, the size of the data segment wouldn't change while the\
    \ program is executing. It is so because the program's source code precisely defines\
    \ the numbers of global and static local variables. It is also possible for the\
    \ compiler to compute the exact size of the data segment.\n- Heap: The section\
    \ where the executing program obtains dynamic memory is called the heap. Using\
    \ the new operator gets the memory from the heap, and the delete operator returns\
    \ the previously allocated memory back to the heap. The size of the heap shrinks\
    \ and fries during the program's execution as the program deallocates and allocates\
    \ dynamic memory using the delete and new.\n- Stack: Function parameters and local\
    \ variables are always stored in the stack. Function parameters and local variables\
    \ disappear when the function returns and appears when a function is called. The\
    \ size of the stack also shrinks and grows during the program's execution as various\
    \ functions execute.\n\nGenerally, operating systems limit the size of the stack.\
    \ Deep recursion can consume a considerable amount of stack space. For example,\
    \ let's consider an improperly written recursive function of one that omits the\
    \ base case and thus exhibits an \"infinite\" recursion that would consume all\
    \ the space that is available on the stack. A situation such as this is known\
    \ as a stack overflow. Modern operating systems terminate any process that consumes\
    \ a lot of the stack space. However, on some embedded systems, this stack overflow\
    \ may go undetected. Typically, heap space is plentiful, and operating systems\
    \ can use virtual memory to provide more space than it's available in real memory\
    \ for an executing program. The extra space for the virtual memory comes from\
    \ a disk drive, and the operating system shuttles data from the disk to real memory\
    \ as needed by the executing program. Programs that make use of a virtual memory\
    \ run a lot more slowly than programs that make use of little virtual memory.\n\
    \n## Manual Memory Management\n\nFrequent memory management issues with delete\
    \ and new are the majorly difficult to find and fix the source of the logic error.\
    \ Programmers have to adhere strictly to the following tenets:\n\n- Everything\
    \ you call new, it should always have an associated call to delete provided the\
    \ allocated memory isn't longer needed. It may sound simple, but it isn't always\
    \ clear when delete should be used, but the function below shows a memory leak:\n\
    \n```cpp\nvoid calc(int n) {\n\n// ...\n\n// Do some stuff\n\n// ...\n\nint *x\
    \ = new int[n];\n\n// ...\n\n// Do some stuff with x\n\n// ...\n\n// Exit function\
    \ without deleting x's memory\n\n}\n```\n\nProvided a program calls on the calc\
    \ function enough times, the program will eventually run out of memory. In the\
    \ calc function, x is a local variable. In that light, x lives on the stack. So\
    \ when a user uses a particular call to calc completes, the function’s clean up\
    \ code automatically releases the space helped by the variable x. Because all\
    \ functions automatically manage the memory for their local and parameter variables.\
    \ The problem with x is assigned via new to point to memory allocated from the\
    \ heap and not the stack. Function executions manage to which x pointed is no\
    \ deallocated automatically.\n\n- Then operator delete should never be used to\
    \ free up memory that has not been allocated from its previous call to new. The\
    \ code fragment below illustrates one such example:\n\n```cpp\nint list[10], *x\
    \ = list; // x points to list\n\n// ...\n\n// Do some stuff\n\n// ... delete [\
    \ ] x; // Logic error, attempt to deallocate x's memory\n```\n\nThe space references\
    \ by the pointer x were not allocated by the operator new, so the operator delete\
    \ should not be used to attempt to free the memory. When you attempt to delete\
    \ a memory that is not allocated with new, it results in an undefined behavior\
    \ that proves a logic error.\n\n- The operator delete must not be used to deallocate\
    \ the same memory more than once. This case is common when two pointers refer\
    \ to the same memory. Pointers like this are called aliases. The following code\
    \ fragment below illustrates this situation better:\n\n```cpp\nint *p = new int[10],\
    \ *y = x; // y aliases x\n\n// ...\n\n// Do some stuff with x and/or y\n\n// ...\n\
    \ndelete [ ] x; // Free up x's memory\n\n// ...\n\n// Do some other stuff\n\n\
    // ...\n\ndelete [ ] y; // Logic error, y's memory already freed!\n```\n\nSince\
    \ the pointer x and pointer y point to the same memory, then x and y are aliases\
    \ of each other. If you deallocate a memory that is referenced by one of them,\
    \ then the other memory is also deallocated since it is the same memory.\n\n-\
    \ When you deallocating previous memory with delete, they should never accessed.\
    \ When you attempt to access deleted memory result, it would result in an undefined\
    \ behaviors which represent a logical error.\n\n```cpp\nint *list = new int[10];\n\
    \n// ... // Use list, then\n\n// ... delete [ ] list;\n\n// Deallocate list's\
    \ memory\n\n// ... // Sometime later\n\n// ... int x = list[2]; // Logic error,\
    \ but sometimes works!\n```\n\nThe code fragment above illustrates how such a\
    \ situation could arise. For the purpose of efficiency, the delete operator makes\
    \ heap space as available without modifying the contents in the memory.\n\n##\
    \ Resource Management\n\nIt is essential that programmers call clear internationally\
    \ when they finish with a linked list object. Take a look at the following definition:\n\
    \n```cpp\nvoid x() {\n    IntList1 my_list; // Constructor called here\n\n   \
    \ // Add some numbers to the list\n    my_list.insert(12);\n    my_list.insert(7);\n\
    \    my_list.insert(-14);\n\n    // Print the list\n    my_list.print();\n} //\
    \ Oops! Forgot to call my list.clear!\n```\n\nIn the code above, the variable\
    \ my list is local to function x. When the function x finishes executing the variable\
    \ my list, it will go out of scope. At this stage, the space on the stack-allocated\
    \ for the local IntList1 variable named my list is reclaimed. Although the list’s\
    \ head-allocated elements space remains, the only access the program can have\
    \ to the memory is through my list.head, but my list no longer exists. This is\
    \ a classic example of a memory leak. Observe that none of the classes we have\
    \ designed so gat apart from the IntList1 have this problem. However, C++ offers\
    \ a way out for class designers to specify actions that have to occur at the end\
    \ of an object’s lifespan. A constructor that executes a code at the beginning\
    \ of an object’s existence is known as a destructor. A destructor is a special\
    \ method that executes immediately before the object stops existing. A destructor\
    \ can also have the same name as its class with a tilde ~ prefix. Additionally,\
    \ a destructor does not accept arguments. Code 9.2 shows how to add a destructor\
    \ to a code and also ass the previously suggested optimization of the length and\
    \ clear methods."
  mdcn: "## 操作流\n\n1.  `Peek` 返回输入流中的下一个字符，但不将其从输入流中提取出来。例如，你想要读取输入直到遇到第一个换行符或句点。\n\
    \n```cpp\nchar input[80];\nint i = 0;\nwhile( (ch=cin.peek()) != '.' && ch !=\
    \ '\\n')\n    cin.get(input[i++]);\ninput[i] = '\\0';\n```\n\n2.  `Gcount()` 方法返回上次非格式化提取方法读取的字符数。这意味着由\
    \ `get()`、`getline()`、`ignore()` 或 `read()` 读取的字符，但不包括提取运算符。\n\n3.  `Putback()`\
    \ 函数将一个字符插回输入缓冲区。\n\n## 第10章 内存与资源\n\n## 内存管理\n\nC++编程语言在管理执行程序所使用的内存方面为用户提供了许多选择。在本章中，我们将探讨其中一些常用选项。我们还将介绍一些旨在减少过去困扰C++项目的内存管理问题的现代技术。\n\
    \n## C++程序可用的内存\n\n现代操作系统通常为其执行的程序保留一部分内存，以允许操作系统同时管理多个程序的执行。不同的操作系统以不同的方式布局执行程序的内存。然而，布局通常包括以下四个部分。\n\
    \n-   代码：程序的编译后可执行指令存储在代码段内存中。在程序执行期间，代码段的内容应永不改变。同样，在程序执行期间，代码段也不会改变。\n-   数据：持久变量和全局变量存储在内存的数据段中，就像静态局部变量一样。在执行程序的整个生命周期内，数据段的变量都会存在。然而，除非数据是常量，否则执行程序可以自由地更改其值。尽管在程序执行期间，数据段中变量存储的值可能会改变，但数据段的大小在程序执行期间不会改变。这是因为程序的源代码精确定义了全局和静态局部变量的数量。编译器也能够计算出数据段的确切大小。\n\
    -   堆：执行程序获取动态内存的部分称为堆。使用 `new` 运算符从堆中获取内存，而 `delete` 运算符将先前分配的内存返回给堆。在程序执行期间，随着程序使用\
    \ `delete` 和 `new` 释放和分配动态内存，堆的大小会收缩和增长。\n-   栈：函数参数和局部变量总是存储在栈中。函数参数和局部变量在函数返回时消失，在函数被调用时出现。栈的大小在程序执行期间也会随着各种函数的执行而收缩和增长。\n\
    \n通常，操作系统会限制栈的大小。深度递归会消耗大量的栈空间。例如，让我们考虑一个编写不当的递归函数，它省略了基本情况，从而表现出“无限”递归，这将消耗栈上所有可用的空间。这种情况被称为栈溢出。现代操作系统会终止任何消耗大量栈空间的进程。然而，在一些嵌入式系统上，这种栈溢出可能无法被检测到。通常，堆空间是充足的，操作系统可以使用虚拟内存为执行程序提供比实际内存中可用的更多的空间。虚拟内存的额外空间来自磁盘驱动器，操作系统根据执行程序的需要将数据从磁盘传输到实际内存。使用虚拟内存的程序比使用少量虚拟内存的程序运行得慢得多。\n\
    \n## 手动内存管理\n\n使用 `delete` 和 `new` 时频繁出现的内存管理问题主要是难以找到和修复逻辑错误的根源。程序员必须严格遵守以下原则：\n\
    \n-   每次调用 `new` 时，如果分配的内存不再需要，都应该有一个相关的 `delete` 调用。这听起来很简单，但并不总是清楚何时应该使用 `delete`，但下面的函数显示了一个内存泄漏：\n\
    \n```cpp\nvoid calc(int n) {\n\n// ...\n\n// 做一些事情\n\n// ...\n\nint *x = new int[n];\n\
    \n// ...\n\n// 对 x 做一些事情\n\n// ...\n\n// 退出函数而没有释放 x 的内存\n\n}\n```\n\n假设程序多次调用\
    \ `calc` 函数，程序最终将耗尽内存。在 `calc` 函数中，`x` 是一个局部变量。因此，`x` 存在于栈上。所以当用户对特定 `calc` 调用完成时，函数的清理代码会自动释放变量\
    \ `x` 所占用的空间。因为所有函数都会自动管理其局部变量和参数变量的内存。`x` 的问题在于它通过 `new` 被赋值为指向从堆中分配的内存，而不是栈。函数执行结束后，`x`\
    \ 所指向的内存不会被自动释放。\n\n-   `delete` 运算符绝不应用于释放未通过先前调用 `new` 分配的内存。下面的代码片段说明了一个这样的例子：\n\
    \n```cpp\nint list[10], *x = list; // x 指向 list\n\n// ...\n\n// 做一些事情\n\n// ...\
    \ delete [ ] x; // 逻辑错误，尝试释放 x 的内存\n```\n\n指针 `x` 引用的空间不是由 `new` 运算符分配的，因此不应使用\
    \ `delete` 运算符尝试释放内存。当你尝试删除未通过 `new` 分配的内存时，会导致未定义行为，这证明是一个逻辑错误。\n\n-   `delete`\
    \ 运算符不得用于多次释放同一块内存。当两个指针引用同一块内存时，这种情况很常见。这样的指针被称为别名。下面的代码片段更好地说明了这种情况：\n\n```cpp\n\
    int *p = new int[10], *y = x; // y 是 x 的别名\n\n// ...\n\n// 对 x 和/或 y 做一些事情\n\n\
    // ...\n\ndelete [ ] x; // 释放 x 的内存\n\n// ...\n\n// 做一些其他事情\n\n// ...\n\ndelete\
    \ [ ] y; // 逻辑错误，y 的内存已经释放了！\n```\n\n由于指针 `x` 和指针 `y` 指向同一块内存，因此 `x` 和 `y` 彼此是别名。如果你释放了其中一个引用的内存，那么另一个内存也会被释放，因为它们是同一块内存。\n\
    \n-   当你使用 `delete` 释放先前的内存后，绝不应再访问它们。当你尝试访问已删除的内存时，会导致未定义行为，这代表一个逻辑错误。\n\n```cpp\n\
    int *list = new int[10];\n\n// ... // 使用 list，然后\n\n// ... delete [ ] list;\n\n\
    // 释放 list 的内存\n\n// ... // 过一段时间后\n\n// ... int x = list[2]; // 逻辑错误，但有时能工作！\n\
    ```\n\n上面的代码片段说明了这种情况是如何发生的。为了提高效率，`delete` 运算符使堆空间可用，而不修改内存中的内容。\n\n## 资源管理\n\
    \n程序员在完成链表对象的操作后，必须调用 `clear` 方法。请看以下定义：\n\n```cpp\nvoid x() {\n    IntList1 my_list;\
    \ // 这里调用构造函数\n\n    // 向列表中添加一些数字\n    my_list.insert(12);\n    my_list.insert(7);\n\
    \    my_list.insert(-14);\n\n    // 打印列表\n    my_list.print();\n} // 糟糕！忘记调用 my_list.clear\
    \ 了！\n```\n\n在上面的代码中，变量 `my_list` 是函数 `x` 的局部变量。当函数 `x` 执行完毕时，变量 `my_list` 将超出作用域。此时，为名为\
    \ `my_list` 的局部 `IntList1` 变量分配的栈空间被回收。尽管列表头部分配的元素空间仍然存在，但程序访问该内存的唯一途径是通过 `my_list.head`，但\
    \ `my_list` 已经不存在了。这是一个经典的内存泄漏例子。请注意，到目前为止我们设计的所有类中，除了 `IntList1`，都没有这个问题。然而，C++为类设计者提供了一种方法，可以指定在对象生命周期结束时必须执行的操作。在对象存在开始时执行代码的构造函数被称为析构函数。析构函数是一种特殊的方法，在对象停止存在之前立即执行。析构函数也可以与其类同名，但带有波浪号\
    \ `~` 前缀。此外，析构函数不接受参数。代码9.2展示了如何向代码添加析构函数，以及如何实现之前建议的 `length` 和 `clear` 方法的优化。"
