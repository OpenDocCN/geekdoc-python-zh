    # NULL pointers


    When you create a pointer, is it initially not given anything to point at, this
    is dangerous because the pointer when created it references random memory, and
    changing this data in the memory location can crash the program. To prevent this,
    when we create a pointer we assign it to NULL like so:


    ```

    int* pointer = NULL;

    ```'
