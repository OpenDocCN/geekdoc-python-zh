    我倾向于使用的风格是尽可能少地使用花括号，并避免偶尔使用括号。相比之下，大多数人倾向于尽可能多地使用花括号，并在他们认为必要的地方添加新的括号。几乎总是有办法在不使用不需要的括号的情况下完成你想要的事情。其次，除非你（或别人）告诉你这对于他们特定的程序或库是必要的，否则永远不要用不必要的括号和花括号“把自己困住”。（这是你的生活，你的选择，但要意识到它们的存在是有原因的。）


