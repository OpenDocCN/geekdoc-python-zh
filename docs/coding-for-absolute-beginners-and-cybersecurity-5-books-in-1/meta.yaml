- md: "## Input Pattern\n\n- It is a bad idea to test the stream on the outside and\
    \ then read/write to it inside the body of the conditional/loop statement. This\
    \ is because the act of reading may make the stream bad. It is usually better\
    \ to do the read as part of the test.\n\n```\nwhile(!cin.fail()) { // that is\
    \ bad programming style\n    cin>>i; //here may make stream fail().\n    .....\
    \ //then i is not valid value\n}\n```\n\n- If you just want to input, you don't\
    \ want to know eof or deal with failbit. You can use below:\n\n```\nwhile(scanf(\"\
    %d\",&i) != 1)\nwhile((int c = getchar())!=EOF)\nwhile( fgets(line, sizeof(line),\
    \ fp) != NULL )\n//in c language, use these to exit loop!\nwhile(cin>>input)\n\
    while(cin.get(p, 20) )\nwhile(getline(ifstream, string)) {\n    //in C++ language,\
    \ use bool operator to exit loop.\n    //do some useful things. //input is right.\n\
    }\n```\n\n- If you want to know eof or deal with the error. You can use the below\
    \ code. When you press enter, the read will end. When you input letter, it will\
    \ get rid of this letter until you input number.\n\n```\nwhile(true) //use break\
    \ to exit loop;\n{\n    cin>>i//or getline(ifstream, string);\n    if(cin.eof()){\
    \ //If it's EOF\n        cout<<\"EOF encountered\"<<endl;\n        //break;\n\
    \    }\n    if(cin.fail()) //deal with Invalid input\n    {\n        cin.clear();\
    \ //Important. clear state and buffer\n        while(cin.get()!='\\n') //get rid\
    \ rest of line,\n            continue ;\n        cout<<\"please input a number\"\
    <<endl;\n        continue;\n    }\n    ... // input is right.do some useful things.\n\
    }\n```\n\n- In the previous example, why do we need to distinguish eof and fail?\
    \ When fail happen, maybe there are invalid character in buffer. After clean the\
    \ buffer, I can continue to read input from input buffer. Three methods to clean\
    \ invalid character in the buffer.\n\n```\ncin.clear(); //Important. clear state\
    \ and buffer\n\nwhile(cin.get()!='\\n')\n    continue ; // method 1\n\nwhile(!isspace(cin.get()))\n\
    \    continue; //method 2\n\nbasic_istream& ignore(streamsize _Count = 1, int_type\
    \ _Delim = traits_type::eof()); //method 3\n\ncin.ignore(5, 'a');\n\ncin.ignore(numeric_limits<streamsize>::max(),\
    \ '\\n');\n```\n\n- You can use istream_iterator, It can save you some trouble\
    \ to judge EOF.\n\n```\nclass A{\nprivate:\n    int x,y;\n    friend istream&\
    \ operator>>(istream& in, A&);\n    friend ostream& operator<<(ostream& out, const\
    \ A&);\n};\nistream& operator>>(istream& in, A& a){\n    in>>a.x>>a.y;\n    return\
    \ in;\n}\nostream& operator<<(ostream& out, const A& a){\n    out<<a.x<< \" \"\
    \ <<a.y;\n    return out;\n}\nvector<A> v;\ncopy(istream_iterator<A>(cin), istream_iterator<A>(),\n\
    \     back_inserter(v));\ncopy(v.begin(), v.end(),ostream_iterator<A>(cout, \"\
    \\n\"));\n```\n\n- In summary, its better just use judgment to exit end loop.\
    \ If you need to different specific action to take to deal with EOF or error.\
    \ Use while(true), then use eof() of feof() fail() or clear() functions in c++\
    \ and c to deal with and break the loop;\n\n- For cout, It can recognize type\
    \ automatically, and It is extensible, you can redefine << operator so that cout\
    \ can recognize you data type.\n\n```\nclass Foo{\n    friend ostream & operator<<(ostream&\
    \ s,const Foo &r);\n};\nostream & operator<<(ostream& s, const Foo &r){\n    s<<Foo.a<<Foo.b<<endl;\n\
    }\n```\n\n- How to print pointer address in C and C++?\n\n```\nchar* amount =\
    \ \"dozen\";\n\ncout<< amount ; //print \"dozen\" string\n\ncout<<(void*) amount;//prints\
    \ the address of pointer\n\nprintf(\"%p\", (void*) p);\n```\n\n- Format is key\
    \ point for Output. You need to know the common manipulator to control the output\
    \ format.\n- Number base manipulators: hex, oct and dec; Field widths: Width,\
    \ fill, precision Setf()\n- You don’t need to know the details, just name of them.\
    \ When you want to use them, go to reference website to look. A detail format\
    \ manipulators can be seen on C++ primer P1090. You need to include <iomanip>\n\
    - << is a bitwise left-shift operator in C language, but in C++, we overloaded\
    \ it in ostream class, cout is an object of ostream,\n- You can use cout<<flush\
    \ to force flushing the output buffer\n- cout.write can be used to output a string;\
    \ It will output certain length string, even reach the end of string.\n\n## Other\
    \ stream\n\n## File\n\n- When you studied cin and cout very well, you will find\
    \ that file operation is so easy. Just change cin or cout to your ifstream , ofstream\
    \ or fstream object.\n\n```\nstd::fstream ifs;\nifs.open (\"test.txt\", ios_base::in|\
    \ ios_base::binary);\nif(!ifs.is_open())\n    exit(1);\nchar c = ifs.get();\n\
    // use all previous input methods\nifs.close();\n```\n\n- Only read ifsteam; only\
    \ write ofsteam; write and read fstream.\n- For ios_base::binary mode, use write()\
    \ and read() function.\n- For writing, pay attention to the difference between\
    \ ios_base:: trunc and ios_base:: app\n- Random access is used mostly on binary\
    \ file. Because the position can be pinpointed exactly. For seekg() for input,\
    \ and seekp() for output.(p is put, g is get) It moves the pointer. tellp() and\
    \ tellg() function. It tells the position of pointer.\n\n## Buffer and string\
    \ buffer\n\n- Stringstream is a convenient way to manipulate strings like an independent\
    \ I/O device. Sometimes it is very convenient to use stringstream to convert between\
    \ strings and other numerical types. The usage of stringstream are much the same\
    \ with iostream, so it is not a burden to learn.\n- You need to build a stringstream\
    \ from a string, or convert a stringstream back to a string.\n\n```\nstringstream\
    \ outstr;\noutstr<<\"salary _ value\"<<123333.00<<endl;\nstring str = outstr.str()\
