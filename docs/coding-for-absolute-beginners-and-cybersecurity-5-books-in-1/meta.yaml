  - '[PAGE 492]


    # # Chapter 1. Common Cyberattacks


    Cyberattacks are getting highly sophisticated as hackers are coming up with the
    latest and innovative methods to stage an attack and threaten the security of
    different computer networks. The attacks are getting so much sophisticated that
    they are getting tougher to detect. Consequently, the attacks are getting more
    lethal than they were ever before.


    Cybersecurity doesn’t depend on the size of your organization. Whether you have
    a start-up business or a multimillion-dollar company, you should be able to be
    aware of how risky a cyberattack can be. The rise of cyberattacks gives room to
    the question of why do hackers attack a cyberspace? What is the motivation behind
    such heinous attacks? A general perception is that financial gain drives them
    to stage high profile cyberattacks on the computer systems of big corporations.
    Some also do that for espionage purposes. This chapter will shed light on the
    motivations that hackers have on their backs to penetrate an individual computer
    or an enterprise computer.


    Most of the time, the attack is a kind of breach that aims at infiltrating the
    credit and debit card details. This information is then sold on the dark web later
    on to bag heavy profit. The story doesn’t end here. In a majority of cases, profit
    is just a smokescreen to hide something bigger and deeper.'
