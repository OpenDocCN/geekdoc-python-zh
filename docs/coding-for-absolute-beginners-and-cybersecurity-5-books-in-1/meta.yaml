    3. 单击“浏览超类”。\n   a. 输入“diy”作为类型，选择 DIYWindow，如下图所示，然后单击“确定”。\n4. 你想创建哪些 [方法存根](https://example.com/method-stubs)？选择以下选项，如下图所示：\n\
