- md: "## Data-Structure\n\nData structures are concrete representations of data and\
    \ are defined as a programmer point of view of data. Data-structure represents\
    \ how data will be stored in memory. All data-structures have their own pros and\
    \ cons. Depending upon the type of problem, we choose a data-structure that is\
    \ best suited for it.\n\nFor example, we can store data in an array, a linked-list,\
    \ stack, queue, tree, etc.\n\nNote: In this chapter, we will be studying various\
    \ data structures and their API. So that the user can use them without knowing\
    \ their internal implementation.\n\n## JAVA Collection Framework\n\nJAVA programming\
    \ language provides a JAVA Collection Framework, which is a set of high quality,\
    \ high performance & reusable data-structures and algorithms.\n\n![](img/d5bcf187e3573f6b3164f4d4615fafd7_307_0.png)\n\
    \nThe following advantages of using a JAVA collection framework:\n\n- 1. Programmers\
    \ do not have to implement basic data structures and algorithms repeatedly. Thereby\
    \ it prevents the reinvention of the wheel. Thus, the programmer can devote more\
    \ effort in business logic.\n- 2. The JAVA Collection Framework code is well-tested,\
    \ high quality, high-performance code. Using them increase the quality of the\
    \ programs.\n- 3. Development cost is reduced as basic data structures and algorithms\
    \ are implemented in the Collections framework are reused.\n- 4. Easy to review\
    \ and understand programs written by other developers as most of Java developers\
    \ uses the Collection framework. In addition, the collection framework is well\
    \ documented.\n\n## Array\n\nArray represents a collection of multiple elements\
    \ of the same datatypes.\n\n### Array ADT Operations\n\nBelow is the API of the\
    \ array:\n\n- 1. Adds an element at the kth position. Value can be stored in an\
    \ array at Kth position in O(1) constant time. We just need to store value at\
    \ arr[k].\n- 2. Reading the value stored at the kth position. Accessing the value\
    \ stored at some index in the array is also O(1) constant time. We just need to\
    \ read the value stored at arr[k].\n- 3. Substitution of value stored in the kth\
    \ position with a new value. Time complexity: O(1) constant time.\n\nExample:\n\
    \n```java\npublic class ArrayDemo {\n    public static void main(String[] args)\
    \ {\n        int[] arr = new int[10];\n        for (int i = 0; i < 10; i++)\n\
    \        {\n            arr[i] = i;\n        }\n    }\n}\n```\n\nJAVA standard\
    \ arrays are of fixed length. Sometimes we do not know how much memory we need,\
    \ so we create a bigger size array. Thereby wasting space. If an array is already\
    \ full and we want to add more values to it than we need to create a new array,\
    \ which has sufficient space and then copy the old array to the new array. To\
    \ avoid this manual reallocation and copy, we can use ArrayList of JAVA Collection\
    \ framework or Linked Lists to store data.\n\n### ArrayList implementation in\
    \ JAVA Collections\n\nArrayList<E> in JAVA Collections is a data structure which\
    \ implements List<E> interface, which means that it can have duplicate elements\
    \ in it. ArrayList is an implementation as a dynamic array that can grow or shrink\
    \ as needed. (Internally array is used when it is full a bigger array is allocated,\
    \ and the old array values are copied to it).\n\nExample:\n\n```java\nimport java.util.ArrayList;\n\
    \npublic class ArrayListDemo {\n    public static void main(String[] args) {\n\
    \        ArrayList<Integer> al = new ArrayList<Integer>();\n        al.add(1);\
    \ // add 1 to the end of the list\n        al.add(2); // add 2 to the end of the\
    \ list\n        System.out.println(\"Contents of Array: \" + al);\n        System.out.println(\"\
    Array Size: \" + al.size());\n        System.out.println(\"Array IsEmpty: \" +\
    \ al.isEmpty());\n        al.remove(al.size() - 1); // last element of array is\
    \ removed.\n        al.removeAll(al); // all the elements of array are removed.\n\
    \        System.out.println(\"Array IsEmpty: \" + al.isEmpty());\n    }\n}\n```\n\
    \nOutput:\n\nContents of Array: [1, 2]\n\nArray Size: 2\n\nArray IsEmpty: false\n\
    \n![](img/d5bcf187e3573f6b3164f4d4615fafd7_311_0.png)\n\nArray IsEmpty: true\n\
    \n## Linked List\n\nLinked lists are a dynamic data structure, and memory is allocated\
    \ at run time. The concept of the linked list is not to store data contiguously.\
    \ Nodes of the linked list contain a link that points to the next elements in\
    \ the list.\n\nPerformance-wise linked lists are slower than arrays because there\
    \ is no direct access to linked list elements. Linked list is a useful data structure\
    \ when we do not know the number of elements to be stored ahead of time. There\
    \ are many types of linked lists: linear, circular, doubly, doubly circular, etc.\n\
    \n### Linked list ADT Operations\n\nBelow is the API of Linked list.\n\n- Insert(k):\
    \ adds k to the start of the list. Insert an element at the start of the list.\
    \ Just create a new element and move pointers. So that this new element becomes\
    \ the first element of the list. This operation will take O(1) constant time.\n\
    - Delete(): Delete the element at the start of the list. Delete an element at\
    \ the start of the list. We just need to move one pointer. This operation will\
    \ also take O(1) constant time.\n- PrintList(): Display all the elements of the\
    \ list. Start with the first element and then follow the pointers. This operation\
    \ will take O(N) time.\n- Find(k): Find the position of the element with value\
    \ k. Start with the first element and follow the pointer until we get the value\
    \ we are looking for or reach the end of the list. This operation will take O(N)\
    \ time.\n\nNote: Binary search does not work on linked lists.\n\n- FindKth(k):\
    \ Find element at position k. Start from the first element and follow the links\
    \ until you reach the kth element. This operation will take O(N) time.\n- IsEmpty():\
    \ Check if the number of elements in the list are zero. Just check the head pointer\
    \ of the list, if it is Null, then the list is empty otherwise not empty. This\
    \ operation will take O(1) time.\n\n### LinkedList implementation in JAVA Collections\n\
    \nLinkedList<E> in by JAVA Collections is a data structure that also implements\
    \ List<E> interface.\n\nExample:\n\n```java\nimport java.util.LinkedList;\n\n\
    public class LinkedListDemo {\n    public static void main(String[] args) {\n\
    \        LinkedList<Integer> ll = new LinkedList<Integer>();\n        ll.addFirst(2);\
    \ // 2 is added to the list\n        ll.addLast(10); // 10 is added to last of\
    \ the list.\n        ll.addFirst(1); // 1 is added to first of the list.\n   \
    \     ll.addLast(11); // 11 is added to last of the list\n        System.out.println(\"\
    Contents of Linked List: \" + ll);\n        ll.removeFirst();\n        ll.removeLast();\n\
    \        System.out.println(\"Contents of Linked List: \" + ll);\n    }\n}\n```\n\
    \nOutput:\n\nContents of Linked List: [1, 2, 10, 11]\n\nContents of Linked List:\
    \ [2, 10]\n\n## Stack\n\n![](img/d5bcf187e3573f6b3164f4d4615fafd7_315_0.png)\n\
    \nStack is a special kind of data structure that follows the Last-In-First-Out\
    \ (LIFO) strategy. This means that the element that is added last will be the\
    \ first to be removed.\n\nThe various applications of the stack are:\n\n- Recursion:\
    \ recursive calls are implemented using system stack.\n- 1. Postfix evaluation\
    \ of the expression.\n- 2. Backtracking implemented using stack.\n- 3. Depth-first\
    \ search of trees and graphs.\n- 4. Converting a decimal number into a binary\
    \ number etc.\n\n### Stack ADT Operations\n\n- Push(k): Adds value k to the top\
    \ of the stack.\n- Pop(): Remove element from the top of the stack and return\
    \ its value.\n- Top(): Returns the value of the element at the top of the stack.\n\
    - Size(): Returns the number of elements in the stack.\n- IsEmpty(): determines\
    \ whether the stack is empty. It returns true if the stack is empty otherwise\
    \ return false.\n\nNote: All the above stack operations are implemented in O(1)\
    \ Time Complexity.\n\n### Stack implementation in JAVA Collection\n\nThe stack\
    \ is implemented by calling push and pop methods of Stack <T> class.\n\nExample:\n\
    \n```java\npublic class StackDemo {\n    public static void main(String[] args)\
    \ {\n        Stack<Integer> stack = new Stack<Integer>();\n        int temp;\n\
    \        stack.push(1);\n        stack.push(2);\n        stack.push(3);\n    \
    \    System.out.println(\"Stack : \"+stack);\n        System.out.println(\"Stack\
    \ size : \"+stack.size());\n        System.out.println(\"Stack pop : \"+stack.pop());\n\
    \        System.out.println(\"Stack top : \"+stack.peek());\n        System.out.println(\"\
    Stack isEmpty : \"+stack.isEmpty());\n    }\n}\n```\n\nOutput:\n\nStack : [1,\
    \ 2, 3]\n\nStack size : 3\n\nStack pop : 3"
  mdcn: "## 数据结构\n\n数据结构是数据的具体表示形式，被定义为程序员视角下的数据。数据结构表示数据在内存中的存储方式。所有数据结构都有各自的优缺点。根据问题的类型，我们会选择最适合的数据结构。\n\
    \n例如，我们可以将数据存储在数组、链表、栈、队列、树等结构中。\n\n注意：在本章中，我们将学习各种数据结构及其API。这样用户就可以在不了解其内部实现的情况下使用它们。\n\
    \n## JAVA集合框架\n\nJAVA编程语言提供了一个JAVA集合框架，它是一套高质量、高性能且可复用的数据结构和算法。\n\n![](img/d5bcf187e3573f6b3164f4d4615fafd7_307_0.png)\n\
    \n使用JAVA集合框架有以下优点：\n\n- 1. 程序员不必反复实现基本的数据结构和算法。从而避免了重复造轮子。因此，程序员可以将更多精力投入到业务逻辑中。\n\
    - 2. JAVA集合框架的代码是经过充分测试、高质量、高性能的代码。使用它们可以提高程序的质量。\n- 3. 由于集合框架中实现的基本数据结构和算法可以被重用，因此降低了开发成本。\n\
    - 4. 由于大多数Java开发者都使用集合框架，因此更容易审查和理解其他开发者编写的程序。此外，集合框架有完善的文档。\n\n## 数组\n\n数组表示同一数据类型的多个元素的集合。\n\
    \n### 数组抽象数据类型操作\n\n以下是数组的API：\n\n- 1. 在第k个位置添加一个元素。值可以在O(1)常数时间内存储在数组的第K个位置。我们只需要将值存储在arr[k]中。\n\
    - 2. 读取存储在第k个位置的值。访问数组中某个索引处存储的值也是O(1)常数时间。我们只需要读取存储在arr[k]中的值。\n- 3. 用新值替换存储在第k个位置的值。时间复杂度：O(1)常数时间。\n\
    \n示例：\n\n```java\npublic class ArrayDemo {\n    public static void main(String[]\
    \ args) {\n        int[] arr = new int[10];\n        for (int i = 0; i < 10; i++)\n\
    \        {\n            arr[i] = i;\n        }\n    }\n}\n```\n\nJAVA标准数组是固定长度的。有时我们不知道需要多少内存，所以会创建一个更大的数组。从而浪费了空间。如果一个数组已经满了，而我们想添加更多的值，那么我们需要创建一个有足够空间的新数组，然后将旧数组复制到新数组。为了避免这种手动重新分配和复制，我们可以使用JAVA集合框架的ArrayList或链表来存储数据。\n\
    \n### JAVA集合中的ArrayList实现\n\nJAVA集合中的ArrayList<E>是一个实现了List<E>接口的数据结构，这意味着它可以包含重复的元素。ArrayList是一个动态数组的实现，可以根据需要增长或缩小。（内部使用数组，当数组满时，会分配一个更大的数组，并将旧数组的值复制到其中）。\n\
    \n示例：\n\n```java\nimport java.util.ArrayList;\n\npublic class ArrayListDemo {\n\
    \    public static void main(String[] args) {\n        ArrayList<Integer> al =\
    \ new ArrayList<Integer>();\n        al.add(1); // 将1添加到列表末尾\n        al.add(2);\
    \ // 将2添加到列表末尾\n        System.out.println(\"Contents of Array: \" + al);\n  \
    \      System.out.println(\"Array Size: \" + al.size());\n        System.out.println(\"\
    Array IsEmpty: \" + al.isEmpty());\n        al.remove(al.size() - 1); // 移除数组的最后一个元素。\n\
    \        al.removeAll(al); // 移除数组的所有元素。\n        System.out.println(\"Array IsEmpty:\
    \ \" + al.isEmpty());\n    }\n}\n```\n\n输出：\n\nContents of Array: [1, 2]\n\nArray\
    \ Size: 2\n\nArray IsEmpty: false\n\n![](img/d5bcf187e3573f6b3164f4d4615fafd7_311_0.png)\n\
    \nArray IsEmpty: true\n\n## 链表\n\n链表是一种动态数据结构，内存是在运行时分配的。链表的概念不是连续存储数据。链表的节点包含一个指向列表中下一个元素的链接。\n\
    \n在性能方面，链表比数组慢，因为无法直接访问链表元素。当我们事先不知道要存储的元素数量时，链表是一种有用的数据结构。链表有很多种类型：线性链表、循环链表、双向链表、双向循环链表等。\n\
    \n### 链表抽象数据类型操作\n\n以下是链表的API。\n\n- Insert(k)：将k添加到列表的开头。在列表的开头插入一个元素。只需创建一个新元素并移动指针。这样这个新元素就成为了列表的第一个元素。此操作将花费O(1)常数时间。\n\
    - Delete()：删除列表开头的元素。删除列表开头的元素。我们只需要移动一个指针。此操作也将花费O(1)常数时间。\n- PrintList()：显示列表的所有元素。从第一个元素开始，然后跟随指针。此操作将花费O(N)时间。\n\
    - Find(k)：查找值为k的元素的位置。从第一个元素开始，跟随指针，直到找到我们要找的值或到达列表的末尾。此操作将花费O(N)时间。\n\n注意：二分查找不适用于链表。\n\
    \n- FindKth(k)：查找位置k处的元素。从第一个元素开始，跟随链接，直到到达第k个元素。此操作将花费O(N)时间。\n- IsEmpty()：检查列表中的元素数量是否为零。只需检查列表的头指针，如果为Null，则列表为空，否则不为空。此操作将花费O(1)时间。\n\
    \n### JAVA集合中的LinkedList实现\n\nJAVA集合中的LinkedList<E>也是一个实现了List<E>接口的数据结构。\n\n\
    示例：\n\n```java\nimport java.util.LinkedList;\n\npublic class LinkedListDemo {\n\
    \    public static void main(String[] args) {\n        LinkedList<Integer> ll\
    \ = new LinkedList<Integer>();\n        ll.addFirst(2); // 将2添加到列表\n        ll.addLast(10);\
    \ // 将10添加到列表末尾。\n        ll.addFirst(1); // 将1添加到列表开头。\n        ll.addLast(11);\
    \ // 将11添加到列表末尾\n        System.out.println(\"Contents of Linked List: \" + ll);\n\
    \        ll.removeFirst();\n        ll.removeLast();\n        System.out.println(\"\
    Contents of Linked List: \" + ll);\n    }\n}\n```\n\n输出：\n\nContents of Linked\
    \ List: [1, 2, 10, 11]\n\nContents of Linked List: [2, 10]\n\n## 栈\n\n![](img/d5bcf187e3573f6b3164f4d4615fafd7_315_0.png)\n\
    \n栈是一种特殊的数据结构，遵循后进先出（LIFO）策略。这意味着最后添加的元素将最先被移除。\n\n栈的各种应用包括：\n\n- 递归：递归调用是使用系统栈实现的。\n\
    - 1. 表达式的后缀求值。\n- 2. 使用栈实现回溯。\n- 3. 树和图的深度优先搜索。\n- 4. 将十进制数转换为二进制数等。\n\n### 栈抽象数据类型操作\n\
    \n- Push(k)：将值k添加到栈顶。\n- Pop()：从栈顶移除元素并返回其值。\n- Top()：返回栈顶元素的值。\n- Size()：返回栈中的元素数量。\n\
    - IsEmpty()：确定栈是否为空。如果栈为空则返回true，否则返回false。\n\n注意：所有上述栈操作的时间复杂度均为O(1)。\n\n###\
    \ JAVA集合中的栈实现\n\n栈是通过调用Stack <T>类的push和pop方法实现的。\n\n示例：\n\n```java\npublic class\
    \ StackDemo {\n    public static void main(String[] args) {\n        Stack<Integer>\
    \ stack = new Stack<Integer>();\n        int temp;\n        stack.push(1);\n \
    \       stack.push(2);\n        stack.push(3);\n        System.out.println(\"\
    Stack : \"+stack);\n        System.out.println(\"Stack size : \"+stack.size());\n\
    \        System.out.println(\"Stack pop : \"+stack.pop());\n        System.out.println(\"\
    Stack top : \"+stack.peek());\n        System.out.println(\"Stack isEmpty : \"\
    +stack.isEmpty());\n    }\n}\n```\n\n输出：\n\nStack : [1, 2, 3]\n\nStack size :\
    \ 3\n\nStack pop : 3"
