    Stack is a special kind of data structure that follows the Last-In-First-Out (LIFO)
    strategy. This means that the element that is added last will be the first to
    be removed.


    The various applications of the stack are:


    Recursion: recursive calls are implemented using system stack.


    +   1. Postfix evaluation of the expression.

    2. Backtracking implemented using stack.

    3. Depth-first search of trees and graphs.

    4. Converting a decimal number into a binary number etc.


    # # Stack ADT Operations


    Push(k): Adds value k to the top of the stack


    Pop(): Remove element from the top of the stack and return its value.


    Top(): Returns the value of the element at the top of the stack


    Size(): Returns the number of elements in the stack


    IsEmpty(): determines whether the stack is empty. It returns true if the stack
    is empty otherwise return false.


    Note: All the above stack operations are implemented in O(1) Time Complexity.'
