    # Note


    Usually, you are not supplied with the source code for library functions with
    a compiler.


    Instead, you are supplied with precompiled object files that can be linked to
    your program.


    The function prototype is contained in a header file, which may be distinguished
    by an .h, .hpp, or .hxx file extension.


    # Note


    Header files also contain definitions of various data types and constants needed
    by those functions.'
  - '[PAGE 448]


    Though not mandatory, it''s a good idea to organize your own functions in the
    same way as supplied library functions.


    This allows you to use the functions in more than one program without having to
    respecify the code.


    In order to call library functions in a program, you must specify the header file
    that contains the appropriate function prototype.


    This is usually done at the beginning of a source file.


    But it must be done before the function is used by the program.


    Header files can be included in a program by using the #include preprocessor directive.


    This tells the preprocessor to open the named header file and insert its contents
    where the #include statement appears.


    ```

    #include <string>

    #include "myfuncs.h"

    ```


    You can name files in an #include statement in two ways, that is in double quotes
    or in angle brackets (<>).


    Filenames in angle brackets tell the preprocessor to look through a search path
    specified in the environment.


    ```

    #include <string>

    #include "myfuncs.h"

    ```


    Filenames in double quotes tell the preprocessor to search the current directory
    first, then the specified search path.


    An error is reported if a file cannot be found.


    ```

    #include <string>

    #include "myfuncs.h"

    ```


    The linker always searches for the compiled versions of any functions specified
    in an included header file.'
  - '[PAGE 449]


    # Available files


    The C standard library provides a collection of functions for performing common
    tasks such as:


    +   - String handling

    - Character and type conversion

    - Mathematics

    - Input and output


    A wide variety of C++ library files are also available.


    The ANSI standard for C++ libraries was ratified in 1998.


    The iostream file is probably the most common and generic of all C++ library files.


    Most C++ programs include this header file.


    The iostream file provides a large range of input/output functions and other I/O
    stream information.


    For example, this is where cin and cout data and functions are prototyped.


    # Note


    C++ I/O occurs in streams of bytes, where a stream is simply a sequence of bytes.


    There are many variations of C++ libraries available to programmers.


    And these libraries originate from a number of sources.


    For example, some libraries come with C++ application development software.


    C++ function libraries may also be supplied by sources such as device driver manufacturers,
    and C++ programming web sites and bulletin boards.'
