    # # Spliterator


    The Collections library is still subject to the same constraints regarding concurrent
    access. As always, you must choose the Collections library class that corresponds
    to your thread safety requirements. This is because the new methods shown above
    are just functional abstractions riding above the same underlying data structures.
    These methods are not particularly amenable to functional programming’s take on
    parallel processing because they are still based on the notion of multiple threads
    mutating the collection and synchronizing access to the underlying data. However,
    there exists a new Java 8 abstraction that is compatible. It is designed to iterate
    over data in parallel. The idea is embodied by the Spliterator interface. The
    premise of this interface is to partition the data and handoff chunks to different
    threads. Spliterators can be obtained from the Collection interface, including
    subinterfaces List and Set.


    Central to the Spliterator interface are these three methods:


    ```

    java

    Spliterator<T> trySplit();


    default void forEachRemaining(Consumer<? super T> action) {...}


    boolean tryAdvance(Consumer<? super T> action);

    ```


    The method trySplit() partitions the underlying data in two. It creates a new
    Spliterator with half the data and keeps the other half in the original instance.
    Each can be given to a thread which, in turn, iterates over the partitioned data
    using forEachRemaining(). The method tryAdvance() is a one-at-a-time variant that
    returns the next element or null if the list has been exhausted.


    Spliterators do not handle parallel processing themselves but provide the abstraction
    to do so. Here’s the concept in action:'
  - "[PAGE 340]\n\n```\npublic static boolean isMovieInList(String title, List<String>\
    \ movieList)\n    throws InterruptedException {\n    // Obtain a spliterator from\
    \ the movie list\n    Spliterator<String> s1 = movieList.spliterator();\n\n  \
    \  // Split the original list in half.\n    // Now s1 and s2 each contains half\
    \ the list.\n    Spliterator<String> s2 = s1.trySplit();\n\n    BooleanHolder\
    \ booleanHolder = new BooleanHolder();\n    if (s2 != null) {\n        Consumer<String>\
    \ finder =\n            movie -> {if (movie.equals(title)) booleanHolder.isFound\
    \ = true;};\n\n        // Each thread searches the movie list in parallel\n  \
    \      Thread t1 = new Thread(() -> s1.forEachRemaining(finder));\n        Thread\
    \ t2 = new Thread(() -> s2.forEachRemaining(finder));\n\n        t1.start();\n\
    \        t2.start();\n        t1.join();\n        t2.join();\n    }\n\n    return\
    \ booleanHolder.isFound;\n}\n\nprivate static class BooleanHolder {\n    public\
    \ boolean isFound = false;\n}\n```\n\nGiven a title and a list of movies, the\
    \ method isMovieInList() parallelizes the search to determine if it is contained\
    \ in the list. It sets the flag in booleanHolder to true if found. It obtains\
    \ a Spliterator instance from the list, splits it in half, and handsoff one half\
    \ to each thread. The splitting process can be repeated if further threads are\
    \ available.\n\nSpliterators can be obtained from other Collection types as well\
    \ as other libraries in the JDK. There are many implementations designed that\
    \ deal with different characteristics, including finite/infinite, ordered/non-ordered,\
    \ sorted/non-sorted, and mutable/immutable. They inherit the qualities of their\
    \ underlying data structure."
- md: '## Wrap up


    This completes our overview of the new and improved Java 8 Collections library
    as well as the standard functional interfaces. Just as there have been many changes
    in the standard JDK libraries to support functional concepts, expect major changes
    from 3rd party APIs. But the biggest change is yet to come.


    ## Key points


    The new package java.util.function contains a set of functional interfaces. These
    are grouped into four families, each represented by their archetypes: Consumer,
    Function, Predicate, and Supplier.


    Each family of functional interfaces defines variants that specialize in types
    and arity.


    Functional interfaces also define methods that enable functional composition.
    Multiple disparate lambdas can be fused to form super functions that appear as
    one.


    The Collections library has been revamped and functionalized. This has been achieved
    using default methods at top levels of the hierarchy, thereby ensuring backward
    compatibility.


    The new functional methods in Collections, Lists, Sets, and Maps have been designed
    with internal iteration in mind. Behavioral parameters in the form of lambdas
    and method references are given to methods that iterate over collections and act
    upon each element.


    An internal iteration is a form of declarative programming that is fundamental
    to functional programming. It relieves the developer from having to describe the
    “how” to do it and focuses instead on the “what” to do.


    Spliterators are designed for parallel iteration over collections. Data is partitioned,
    and each chunk is handed to different threads for parallel processing.


    A number is greater than one that is not prime.


    ## Conclusion


    The JDK is the Java Development Kit, and it is a necessary tool required for compiling,
    documenting, and packaging Java programs. Together with JRE, an interpreter or
    loader is built-into the JDK, a compiler called javac, an archiver (JAR), the
    Javadoc document generator, and many other tools required for successful Java
    development.


    The JRE is the Java Runtime Environment. It is the environment in which the Java
    bytecode may be executed, and it is used for implementing the Java Virtual Machine.
    The JRE also provides us with all the class libraries and many other support files
    required at runtime by the JVM. It is, in basic terms, a software package that
    provides us with everything we need for running Java programs, a physical implementation
    of the Java Virtual machine.


    JVM stands for Java Virtual Machine. The JVM is an abstract machine, a specification
    that provides us with the JRE in which our bytecode is executed. The JVM must
    follow these notations— Specification, which is a document describing how the
    JVM is implemented, Implementation, which is a program meeting the JVM specification
    requirements, and Runtime Instance, which is the JVM instance that gets created
    whenever the command prompt is used to write a Java command and run a class.


    All three are inextricably linked, and each relies on the others to work.


