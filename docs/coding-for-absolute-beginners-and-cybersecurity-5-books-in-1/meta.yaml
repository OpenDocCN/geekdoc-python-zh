  md: '# Using Constructors in Your Code


    We’ll just go over some additional details as they relate to object-oriented programming.
    As stated earlier, a constructor will look like a method, and you can certainly
    think of it and treat it like a special kind of method in Java programming.


    However, a constructor will still be different from a method in several ways.
    The name of a constructor will be the same as the class name. Use the keyword
    or operator “new” to create a new instance of the constructor and also to initialize
    it. Here’s an example using the class “Employee” and a variety of ways to initialize
    it in your code:


    ```

    Employee payrate1 = new Employee( );


    Employee payrate2 = new Employee(2.0);


    Employee payrate3 = new Employee(3.0, “regular”);

    ```


    A constructor will also implicitly return void—that simply means it doesn’t have
    a return type. You can’t put a return statement inside the body of a constructor
    since it will be flagged by compilers as an error. The only way you can invoke
    a constructor is via the use of the “new” statement. We have already given you
    several ways how you can invoke constructors in the samples above.


    One final difference is that constructors can’t be inherited. Let’s go back to
    the examples provided above—the first line includes “Employee( );”—that is called
    a default constructor. As you can see, it has no parameters whatsoever. The job
    of a default constructor is to simply initialize the member variables to a specific
    default value. In the example above, the member variable payrate1 was initialized
    to its default pay rate and employee status.'
