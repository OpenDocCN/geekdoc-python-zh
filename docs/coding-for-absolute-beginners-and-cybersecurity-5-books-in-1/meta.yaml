  md: '# # Lists


    Let us imagine a puzzle. You have a row of boxes. Each box contains a card with
    one letter. You have to figure out the sequence of the letters, so that the letters
    compose a word.


    | T | C | O | N | E | L | Y | G | O | H |

    |---|---|---|---|---|---|---|---|---|---|

    | 5 | 10 | 6 | 3 | 2 | 9 | 1 | 7 | 8 | 4 |


    # ## Figure A linked list


    In the table above, you can see that each box has a number. You may guess that
    these numbers are the key to the puzzle. The first box has a letter T inside and
    number 5 on the front side. Take a card with the letter T and put it aside. The
    number 5 may point to the next letter. Count boxes. The fifth box has the letter
    ‘E.’ Take the card with the ‘E’ letter and place it next to T. You will get "TE."
    The box with the letter ‘E’ has number 2 on its side. So, take the card from the
    2nd box and place it next to "TE." You will get "TEC."


    The box with the letter ‘C’ has the number 10, so take the card from the 10th
    box. You will get "TECH." The box with the letter ‘H’ has number 4, so take the
    card from the 4th box. You got "TECHN." Continue following the numbers, and you
    will get the whole word: TECHNOLOGY.


    That is how a linked list works. It is made of nodes. Each node has at least one
    variable that holds data (a text or number or object) and one variable (pointer)
    that holds the address of the next node. This system walks through the node list
    as you did in the puzzle. The pointer of the last node has null value, or it may
    point to the first node. Then we have a closed linked list.


    # ## ADD A NODE


    If you want to add a new node to the end of the linked list, you have to create
    a new node. Then point the pointer of the last node to the address of the new
    node and assign null to the new node pointer.'
