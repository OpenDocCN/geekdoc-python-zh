- md: '## Invoking and Instantiating a Generic Type


    To mention the generic box category within your system, a generic type invocation
    must be performed that brings T with a certain concrete value, such as Integer:


    ```

    Box<Integer> integerBox;

    ```


    You may believe that an invocation of a generic sort is comparable to a normal
    process invocation, but instead of adding an assertion to a procedure, you transfer
    a type argument—Integer, in this case—to the box category itself.


    Many designers interchangeably use the words "type parameter" and "type statement,"
    but not the same definitions. When coding, to generate a parameterized type, one
    offers sort arguments. The T in Foo < T > is, therefore, a type parameter, and
    the Foo < String > f string is a type contention. In using these words, this class
    follows this concept.


    Like any other statement of variable, this software does not generate a fresh
    item of the box. It merely states that integerBox will have a reference to an
    "Integer Box," which is how it reads Box < Integer>. A generic type invocation
    is usually referred to as a parameterized type.


    To instantiate this class, use the new keyword, as usual, but place <Integer>
    between the class name and the parenthesis:


    ```

    Box<Integer> integerBox = new Box<Integer>();

    ```


    ## The Diamond


    In the latest versions of Java, you can replace the type arguments needed to invoke
    a generic class constructor with an empty set of type arguments (<>) as long as
    the compiler can determine, or infer from the context, the type arguments. This
    angle bracket couple, <>, is called “The Diamond loosely.” For example, you can
    use the previous declaration to generate an instance of Box < Integer>:


    ```

    Box<Integer> integerBox = new Box<>();

    ```


    ## Generic Methods


    Generic techniques are techniques which implement parameters of their own sort.
    This is similar to a generic type declaration, but the scope of the type parameter
    is limited to the method in which it is declared. In addition to generic class
    constructors, static and non-static generic techniques are permitted.


    The syntax for a generic technique involves a list of parameters of type inside
    angle brackets that appear before the return type of the procedure. The type parameter
    segment must occur before the return type of the method for static generic techniques.
    The Util class involves, compare, a generic technique comparing two Pair items.


    ```

    Pair<Integer, String> ex1 = new Pair<>(49, "string1");


    Pair<Integer, String> ex2 = new Pair<>(64, "string2");


    boolean comparison = Util.<Integer, String>compare(ex1, ex2);

    ```


    ## Bounded Type Parameters


    Sometimes you want to limit the kinds that can be used in a parameterized type
    as form statements. For instance, a technique that works on figures could only
    recognize Number cases or its subclasses. That''s what limit parameters of the
    sort are for.


    List the name of the type parameter to indicate a defined type parameter, accompanied
    by the extension''s keyword, followed by the upper bound, which is Number in this
    instance. Note that expands is generally used in this context to mean either "extends"
    (as in courses) or "implements" (as in interfaces).


    ## Multiple Bounds


    Type parameters can have more than one bound. A type variable with multiple bounds
    is a subtype of all the types listed in the bound. If one of the bounds is a class,
    it must be specified first. For example:


    ```

    Class X { /* ... */ }

    interface Y { /* ... */ }

    interface Z { /* ... */ }

    class R <T extends X & Y & Z> { /* ... */ }

    ```


    If bound X is not specified first, you get a compile-time error:


    ```

    class R <T extends Y & X & Z> { /* ... */ } // compile-time error

    ```


    ## Chapter 11. Collections


    ## Functionalizing Collections


    When we externalize code, we expose every step. This is the hallmark of imperative
    programming. However, one of the re-occurring themes of functional programming
    is the idea of doing the exact opposite: internalizing code. The act of internalizing
    code is to hide the details inside a function. But functional programming pushes
    this idea further by turning micro-patterns of everyday programming into functions.
    For example, iterating over data, be it with iterators, for-loops, or while-loops,
    is one of those micro-patterns. Functional programming changes the way we think
    about them.


    Java’s functionalization effort would not be complete without a revamp of its
    Collections library, namely the Collection, Map, List, and Set interfaces. This
    is because iteration is often done over collections, and they are the very fabric
    of Java programs. It is a natural place for the functionalization effort to occur.
    But making any kind of significant changes, like adding new methods to the Collection
    interface, would break backward compatibility to all programs written pre-Java
    8. This includes not only the JDK’s own hierarchy extending the Collection interface
    but any open or closed source 3rd party library and in-house classes. Java’s designers
    never have and will never adopt such a strategy. Yet changes were necessary; the
    library was introduced in 1998, eons in software industry years, and was showing
    its age.


    The motivation for the introduction of default methods was ushered by the need
    to modernize and functionalize the Collections library. Default methods are just
    the right tonic because they permit behavior to be added at the root of the hierarchy
    without disturbing dependent classes. Subclasses can either inherit or override
    the behavior. Unlike adding new interface methods, subclasses can automatically
    accept new default methods without recompilation. Instant compatibility is achieved.
    Default methods have proven useful in their own right but owe their existence
    to the need to functionalize the Collections library.


    A second re-occurring theme in functional programming is parallelization. Quite
    simply, functional programming offers a better mousetrap for parallel processing.
    As a consequence, the Collections library has been enriched to benefit from multi-core
    CPUs when processing collections. Together with Streams, the Collections library
    is at center stage in bringing functional-style parallel processing to Java.


    Now that we’ve studied Java’s standard functional interfaces, we can begin to
    apply that knowledge to Collections. Let’s look at what has become of the Collections
    library in Java 8.


    ## Collection interface


    We start by looking at a brand new default method in the Collection interface
    available to lists and sets. This is the forEach() method:


    ```

    // Defined in the Iterable interface and extended in Collection

    default void forEach (Consumer<? super T> action)

    ```


    This method iterates through the entire collection letting the Consumer decide
    what to do for each element. This is the concept of internal iteration and a manifestation
    of declarative programming. The details of how to iterate are not specified. This
    is in opposition to external iteration, where the details of how to iterate as
    well as what to do with each element are specified in code.


    We will show examples of these functionalized collection methods with the slapstick
    comedy trio from the golden age of Hollywood films: Larry, Moe, and Curly of The
    Three Stooges fame. To start, let’s print the contents of a collection:


    ```

    Collection<String> stooges = Arrays.asList("Larry", "Moe", "Curly");

    // Print the contents of the stooges collection

    stooges.forEach(System.out::println);

    ```


    The forEach() method has a very wide range of applicability. It is a much more
    convenient way to iterate through collections and should be your de-facto standard.
    However, being a declarative construct, there are some things you will not be
    able to do. Most notably, you cannot change the state of local variables like
    you could in a while-loop. Algorithms must be re-thought functionally. For now,
    just know that forEach() is ideal for iterations that do not mutate state.


    We now look at another new method available in Collection:


    ```

    default boolean removeIf(Predicate<? super E> filter)

    ```


    The method removeIf() internalizes the entire process of iterating, testing, and
    removing. It requires only to be told what the condition for removal is.'
  mdcn: '## 调用和实例化泛型类型


    要在系统中提及泛型盒装类别，必须执行泛型类型调用，将 `T` 与某个具体值（例如 `Integer`）一起引入：


    ```

    Box<Integer> integerBox;

    ```


    你可能认为泛型类型的调用类似于普通过程调用，但不同之处在于，你不是向过程添加断言，而是向盒装类别本身传递一个类型参数——本例中是 `Integer`。


    许多设计者交替使用“类型参数”和“类型声明”这两个术语，但它们的定义并不相同。在编码时，为了生成参数化类型，需要提供类型参数。因此，`Foo<T>` 中的
    `T` 是一个类型参数，而 `Foo<String> f` 是一个类型声明。在使用这些术语时，本类遵循这一概念。


    与任何其他变量声明一样，此代码不会生成盒装类别的新实例。它仅表明 `integerBox` 将引用一个“Integer Box”，即 `Box<Integer>`
    的读法。泛型类型调用通常被称为参数化类型。


    要实例化此类，请像往常一样使用 `new` 关键字，但在类名和括号之间放置 `<Integer>`：


    ```

    Box<Integer> integerBox = new Box<Integer>();

    ```


    ## 菱形操作符


    在 Java 的最新版本中，只要编译器能够从上下文中确定或推断出类型参数，就可以用空类型参数集（`<>`）替换调用泛型类构造函数所需的类型参数。这对尖括号
    `<>` 被非正式地称为“菱形操作符”。例如，你可以使用之前的声明来生成 `Box<Integer>` 的实例：


    ```

    Box<Integer> integerBox = new Box<>();

    ```


    ## 泛型方法


    泛型方法是实现自身类型参数的方法。这类似于泛型类型声明，但类型参数的范围仅限于声明它的方法。除了泛型类构造函数外，还允许静态和非静态泛型方法。


    泛型方法的语法涉及在过程返回类型之前出现的尖括号内的类型参数列表。对于静态泛型方法，类型参数部分必须出现在方法的返回类型之前。`Util` 类包含一个比较两个
    `Pair` 项目的泛型方法 `compare`。


    ```

    Pair<Integer, String> ex1 = new Pair<>(49, "string1");


    Pair<Integer, String> ex2 = new Pair<>(64, "string2");


    boolean comparison = Util.<Integer, String>compare(ex1, ex2);

    ```


    ## 有界类型参数


    有时你希望限制可用于参数化类型的形式参数的种类。例如，一个处理数字的方法可能只接受 `Number` 类或其子类的实例。这就是类型参数有界的作用。


    要声明有界类型参数，请列出类型参数的名称，后跟 `extends` 关键字，然后是上界（本例中为 `Number`）。请注意，在此上下文中，`extends`
    通常既表示“扩展”（如类）也表示“实现”（如接口）。


    ## 多重边界


    类型参数可以有多个边界。具有多个边界类型变量是所有边界中列出的类型的子类型。如果其中一个边界是类，则必须首先指定它。例如：


    ```

    Class X { /* ... */ }

    interface Y { /* ... */ }

    interface Z { /* ... */ }

    class R <T extends X & Y & Z> { /* ... */ }

    ```


    如果未首先指定边界 `X`，则会出现编译时错误：


    ```

    class R <T extends Y & X & Z> { /* ... */ } // 编译时错误

    ```


    ## 第 11 章 集合


    ## 集合的函数化


    当我们外部化代码时，我们暴露了每一步。这是命令式编程的标志。然而，函数式编程的一个反复出现的主题是做完全相反的事情：内部化代码。内部化代码的行为是将细节隐藏在函数内部。但函数式编程更进一步，将日常编程中的微模式转化为函数。例如，遍历数据，无论是使用迭代器、`for`
    循环还是 `while` 循环，都是这些微模式之一。函数式编程改变了我们思考它们的方式。


    Java 的函数化努力若没有对其集合库（即 `Collection`、`Map`、`List` 和 `Set` 接口）的彻底改造，就不会完整。这是因为迭代通常是在集合上进行的，它们是
    Java 程序的基石。这是函数化努力发生的自然场所。但进行任何重大更改，例如向 `Collection` 接口添加新方法，都会破坏所有在 Java 8 之前编写的程序的向后兼容性。这不仅包括
    JDK 自身扩展 `Collection` 接口的层次结构，还包括任何开源或闭源的第三方库以及内部类。Java 的设计者过去没有，将来也不会采用这种策略。然而，更改是必要的；该库于
    1998 年引入，在软件行业年份中已是久远的历史，并且正在显现出其年代感。


    引入默认方法的动机源于现代化和函数化集合库的需求。默认方法正是合适的良方，因为它们允许在层次结构的根部添加行为，而不干扰依赖类。子类可以继承或覆盖该行为。与添加新的接口方法不同，子类可以自动接受新的默认方法而无需重新编译。即时兼容性得以实现。默认方法本身已被证明是有用的，但它们的存在归功于函数化集合库的需求。


    函数式编程的第二个反复出现的主题是并行化。简单地说，函数式编程为并行处理提供了更好的解决方案。因此，集合库得到了丰富，以便在处理集合时受益于多核 CPU。与流（Streams）一起，集合库成为将函数式风格并行处理引入
    Java 的核心舞台。


    既然我们已经研究了 Java 的标准函数式接口，我们就可以开始将这些知识应用于集合。让我们看看 Java 8 中集合库的变化。


    ## Collection 接口


    我们首先看看 `Collection` 接口中一个全新的默认方法，该方法可用于列表和集合。这就是 `forEach()` 方法：


    ```

    // 在 Iterable 接口中定义，并在 Collection 中扩展

    default void forEach (Consumer<? super T> action)

    ```


    此方法遍历整个集合，让 `Consumer` 决定对每个元素执行什么操作。这是内部迭代的概念，也是声明式编程的一种体现。未指定如何迭代的细节。这与外部迭代相反，在外部迭代中，如何迭代以及对每个元素执行什么操作的细节都在代码中指定。


    我们将使用好莱坞电影黄金时代的滑稽喜剧三人组——来自“三个臭皮匠”（The Three Stooges）的拉里（Larry）、莫（Moe）和柯利（Curly）——来展示这些函数化集合方法的示例。首先，让我们打印集合的内容：


    ```

    Collection<String> stooges = Arrays.asList("Larry", "Moe", "Curly");

    // 打印 stooges 集合的内容

    stooges.forEach(System.out::println);

    ```


    `forEach()` 方法具有非常广泛的适用性。它是遍历集合的一种更方便的方式，应该是你的事实标准。然而，作为一种声明式构造，有些事情你将无法做到。最值得注意的是，你无法像在
    `while` 循环中那样更改变量的状态。算法必须以函数式的方式重新思考。目前，只需知道 `forEach()` 非常适合不改变状态的迭代。


    我们现在看看 `Collection` 中另一个可用的新方法：


    ```

    default boolean removeIf(Predicate<? super E> filter)

    ```


    `removeIf()` 方法将整个迭代、测试和移除过程内部化。它只需要被告知移除的条件是什么。'
