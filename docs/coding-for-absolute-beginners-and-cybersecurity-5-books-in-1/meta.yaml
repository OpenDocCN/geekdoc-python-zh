    Each instruction will say to the computer to do something specific, just like
    how a sentence has different words for different situations.


    All of our program''s commands will be written between these brackets, { } . Brackets
    simply contain everything for our program, so anything written within them will
    be read by the computer and acted upon.


    ## Statements - what should go here?


    So what goes in between the brackets? Every line of code can contain one or more
    statements, and each statement runs independently from every other. If you remove
    one of your statements, then the program will still run without any problems.


    Without your program statements, you can''t run any of your programs. Programming
    languages allow you to format your code however you like as long as you follow
    the rules. If you want to add more instructions or some conditional statement
    then add more code between those brackets! The computer will ignore it, though,
    so don''t worry about it too much - go ahead and write that "IF...


    # Chapter 10. Data Types, Variables and Operators


    Data Types, Variables and Operators are two of the three fundamental pieces of
    programming that help you understand how to code. This book will cover data types,
    variables, and operators with a focus on the basics. Variables are containers
    for storing data (such as numbers), while Operators are for performing actions
    on the data in those containers. Data types help you manage your program''s memory
    usage by telling it what sort of things it can store.


    **Variables:**


    A variable is a container for storing information in your program (such as numbers).
    The computer stores all kinds of information about your program and its environment
    in memory, like warehouses or storage areas. When your program needs to use that
    information, it asks the computer for it.


    **Operators:**


    An operator is a symbol used in programming to change how a value is used in your
    program. For example, = means that you are assigning a number to an existing variable.
    The equals sign can also be used as an assignment operator. 15 = 15 tells the
    computer that when you say 15, assign it to the variable named 15.


    **The Key Concepts:**


    We now need to discuss what variables are for and how they work their magic. The
    computer will use a certain amount of memory for your program and left to its
    own devices, it will keep using that memory until you tell it to stop. When that
    happens, your program won''t work correctly. The computer won''t store all of
    the information about what you are doing in the program. So how do you tell the
    computer when you need a new piece of memory?


    **The Basic Rule:**


    First, create variables (or place data in variables) and then use them in your
    programs! This is going to sound slightly contradictory. However, this means that
    you write code to handle all of the information in your program and when it needs
    to find a new piece of memory for your program, you tell it where to find that
    recent memory. For this process to work, you need to understand about data types.


    **Data Types:**


    When you create a variable, you tell the computer how much memory is needed and
    what kind of data it can store. This tells the computer that if the variable contains
    some kind of information, it will know precisely how to access it and display
    it on your screen (or do other things). Without this information, the computer
    cannot understand what you want it to do and will be forced to shut down.


    **Data Types are Like:**


    Let''s say you are running a clothing store. Since you sell clothes, you decide
    to use an inventory system that counts how many different items of clothing you
    have in stock. You can visualize your inventory system as a large shelf with many
    other boxes all over the place filled with clothes. If your program needs some
    clothes, it can go over to the shelf, grab a box and take it back to the dressing
    room for someone to try on. These boxes are like variables because they store
    information about lists of things in the world (like your stock of clothes).


    **Data Types are Not Like:**


    There is a big difference between these variables boxes and the sheets of paper
    used to keep inventory. These boxes also have places on each of them to label
    what they contain. However, there is no way to know what the box contains without
    opening it and checking for yourself. If you want the computer to know that box
    1 contains dresses, then your program will need to open that box, look at the
    label added by you, and figure out what became your clothes when you opened the
    box.


    To tell the computer about a variable''s data type, put a + sign in front of it
    (these signs are called prefixes because they come before other signs or symbols).
    Your inventory system should have a label on each box that tells you what is inside
    of it. The computer will see the + sign and use it to figure out what type of
    clothes you have in each box (this process is called data typing). In programming,
    the boxes are variables. Adding a prefix makes the variable data typed, meaning
    that the computer knows how to use that variable.


    Here''s an example: You are using a variable named bob and you want the computer
    to know that this variable contains employees in your program. Then you would
    type bob+, which means employee. You can create as many variables as you want
    by changing the bob+ with another word such as clerk+ or cashier+. Since you have
    done this, the computer knows that bob is an employee. It has no idea what it
    is holding at this point, just that bob contains individual employees and that
    it can display these employees in your program the same way it displays clothing
    or any other kind of inventory.


    Another way to tell a variable what kind of information it can hold is to use
    a - sign in front of the variable''s name. This will tell the computer that the
    variable can store any information (called general). Let''s say you are a teacher
    and have many grades to give in your program. You can create a variable named
    grades+ which will allow your program to take any kind of grade, print it out
    on the screen and then add an appropriate + sign in front of it. This is how the
    computer takes an ordinary letter grade, such as B+.


    There are also special symbols called prefixes that come before other signs or
    symbols. While these don''t tell the computer what kind of information is being
    stored in the variables (at least not directly), they say to the computer what
    it can do with it.


    # Chapter 11. The Importance of Strings


    When it comes to writing programs that communicate with one another, there are
    many different types of computer programming languages. Some programming languages
    use keywords and numbers, others use symbols and a combination of both, and then
    there are those that happily take up the majority of their space with strings.


    The string type is useful because it can be used to represent any kind of detailed
    element in any graphical interface. For example, the command "Move ten meters
    East" written in Python would look something like this: "move(''10m'',''E'')".
    As you know, the Python text editor is straightforward. The only thing it needs
    to figure out is how to move something.


    If you were writing a program that could be used to manipulate some part of the
    user interface, you would probably not want to use numbers. You would want some
    way to tell your program what buttons should be pressed or what coordinates a
    mouse''s movement should correspond to. And in order for a command string like
    "Move ten meters East" or anything else to do anything useful, the information
    it contained must be stored somewhere and associated with some other kind of entity.
    This is where strings are so helpful: They can store any amount of information
    that can be transmitted between two applications. Our "Move ten meters East" command
    would be represented as:


    ```

    move(''10m'',''E'')

    ```


    Now, if a program like the Python editor were to ask for a list of coordinates
    or button commands, all it would need to do is create a string with each element
    in the list. This way, when you are reading an element from the string you can
    treat it exactly like any other entry in an array. When it comes to using strings
    for commands and data, having just one kind of information stored in them can
    be very limiting; especially if you plan on sending strings thousands or millions
    of miles between devices. This is where the idea of "encoding" comes in.'
  mdcn: '当你编写程序时，你是在为计算机编写需要遵循的独立指令。你将逐行编写这些代码。程序语句等同于口语中的句子。如果说话者在手机上写下这句话，他们会写成“我要去商店买些面包。”


    语句通常可以同时包含多条指令。这些指令按顺序执行，因此如果我们想告诉计算机“买些面包”，我们会这样编写该语句：


    请大家注意每条指令之间有多少空格，以及每条指令有多少字符。同时，请注意该语句如何换行，以及指令长度为80个字符。如果你使用其他程序编写代码，这可能不适用——只需编写易于人类阅读且计算机能正确运行的代码即可。


    ## 语言结构


    既然我们知道了什么是程序语句，接下来让我们看看BASIC编程语言是如何工作的。


    语法精确地告诉计算机我们希望程序如何编写，应该使用什么语法，以及所有内容应该如何排列间距。它还告诉我们每条指令从哪里开始、到哪里结束。


    程序语句本身就是程序。它们可能告诉计算机运行程序中的其他语句，或指示计算机执行某些操作。每条指令都会告诉计算机执行特定操作，就像句子在不同情境下使用不同的词语一样。


    我们程序的所有命令都将写在这些花括号 { } 之间。花括号只是包含程序的所有内容，因此写在其中的任何内容都会被计算机读取并执行。


    ## 语句——这里应该放什么？


    那么花括号之间应该放什么呢？每一行代码可以包含一个或多个语句，每个语句独立运行。如果你删除其中一个语句，程序仍然可以正常运行。


    没有程序语句，你就无法运行任何程序。编程语言允许你按照自己的方式格式化代码，只要遵循规则即可。如果你想添加更多指令或某些条件语句，就在那些花括号之间添加更多代码！不过计算机可能会忽略它，所以不必太担心——尽管去写那个“IF...”吧。


    # 第10章 数据类型、变量和运算符


    数据类型、变量和运算符是编程的三大基础要素中的两个，它们帮助你理解如何编码。本书将重点介绍数据类型、变量和运算符的基础知识。变量是存储数据（如数字）的容器，而运算符用于对这些容器中的数据执行操作。数据类型通过告诉计算机它可以存储什么类型的数据，帮助你管理程序的内存使用。


    **变量：**


    变量是程序中存储信息（如数字）的容器。计算机将程序及其环境的所有信息存储在内存中，就像仓库或存储区域。当你的程序需要使用这些信息时，它会向计算机请求。


    **运算符：**


    运算符是编程中用于改变值在程序中使用方式的符号。例如，= 表示你正在将一个数字赋值给一个现有变量。等号也可以用作赋值运算符。15 = 15 告诉计算机，当你说15时，将其赋值给名为15的变量。


    **关键概念：**


    我们现在需要讨论变量的用途以及它们如何发挥作用。计算机会为你的程序使用一定量的内存，如果不加干预，它会持续使用该内存，直到你告诉它停止。当这种情况发生时，你的程序将无法正常工作。计算机不会存储关于你在程序中所做操作的所有信息。那么，当你需要新的内存空间时，如何告诉计算机呢？


    **基本规则：**


    首先，创建变量（或将数据放入变量），然后在程序中使用它们！这听起来可能有些矛盾。然而，这意味着你需要编写代码来处理程序中的所有信息，当程序需要寻找新的内存空间时，你需要告诉它在哪里找到这块新内存。为了使这个过程正常工作，你需要了解数据类型。


    **数据类型：**


    当你创建一个变量时，你需要告诉计算机需要多少内存以及它可以存储什么类型的数据。这告诉计算机，如果变量包含某种信息，它将确切知道如何访问它并将其显示在屏幕上（或执行其他操作）。没有这些信息，计算机无法理解你想要它做什么，并将被迫关闭。


    **数据类型就像：**


    假设你正在经营一家服装店。由于你销售服装，你决定使用一个库存系统来统计你有多少件不同的服装库存。你可以将你的库存系统想象成一个大架子，上面放着许多装满衣服的盒子。如果你的程序需要一些衣服，它可以走到架子前，拿起一个盒子，把它带回试衣间供人试穿。这些盒子就像变量，因为它们存储了关于世界上事物列表的信息（比如你的服装库存）。


    **数据类型不像：**


    这些变量盒子与用于记录库存的纸张有很大区别。这些盒子上也有标签来标明它们的内容。然而，如果不打开盒子亲自检查，就无法知道盒子里装的是什么。如果你想让计算机知道1号盒子里装的是连衣裙，那么你的程序需要打开那个盒子，查看你添加的标签，并弄清楚当你打开盒子时里面变成了什么衣服。


    要告诉计算机变量的数据类型，请在变量前加上 + 号（这些符号称为前缀，因为它们出现在其他符号之前）。你的库存系统应该在每个盒子上都有一个标签，告诉你里面是什么。计算机会看到
    + 号，并用它来弄清楚每个盒子里装的是什么类型的衣服（这个过程称为数据类型化）。在编程中，盒子就是变量。添加前缀使变量具有数据类型，这意味着计算机知道如何使用该变量。


    举个例子：你正在使用一个名为 bob 的变量，你希望计算机知道这个变量包含你程序中的员工。那么你会输入 bob+，表示员工。你可以通过将 bob+ 更改为另一个词（如
    clerk+ 或 cashier+）来创建任意数量的变量。由于你这样做了，计算机知道 bob 是一名员工。此时它并不知道里面具体是什么，只知道 bob 包含单个员工，并且它可以像显示服装或任何其他库存一样在你的程序中显示这些员工。


    另一种告诉变量它可以存储什么类型信息的方法是在变量名前使用 - 号。这将告诉计算机该变量可以存储任何信息（称为通用类型）。假设你是一名老师，需要在程序中给出许多成绩。你可以创建一个名为
    grades+ 的变量，它将允许你的程序接受任何类型的成绩，将其打印在屏幕上，然后在前面添加适当的 + 号。这就是计算机获取普通字母成绩（如 B+）的方式。


    还有一些特殊的符号称为前缀，它们出现在其他符号之前。虽然这些前缀并不直接告诉计算机变量中存储了什么类型的信息，但它们告诉计算机可以对这些信息做什么。


    # 第11章 字符串的重要性


    当涉及到编写相互通信的程序时，有许多不同类型的计算机编程语言。一些编程语言使用关键字和数字，另一些使用符号和两者的组合，还有一些则愉快地将大部分空间用于字符串。


    字符串类型很有用，因为它可以用于表示任何图形界面中的任何详细元素。例如，用Python编写的命令“向东移动十米”看起来像这样："move(''10m'',''E'')"。如你所知，Python文本编辑器非常直接。它唯一需要弄清楚的是如何移动某个东西。


    如果你正在编写一个可用于操作用户界面某个部分的程序，你可能不想使用数字。你需要某种方式告诉你的程序应该按下哪些按钮，或者鼠标的移动应该对应哪些坐标。为了让像“向东移动十米”这样的命令字符串或其他任何命令执行有用的操作，它包含的信息必须存储在某个地方，并与某种其他类型的实体关联起来。这就是字符串如此有用的地方：它们可以存储可以在两个应用程序之间传输的任何数量的信息。我们的“向东移动十米”命令将表示为：


    ```

    move(''10m'',''E'')

    ```


    现在，如果像Python编辑器这样的程序要请求坐标列表或按钮命令列表，它只需要为列表中的每个元素创建一个字符串。这样，当你从字符串中读取一个元素时，你可以像处理数组中的任何其他条目一样处理它。当涉及到将字符串用于命令和数据时，只存储一种类型的信息可能会非常受限；特别是如果你计划在设备之间传输数千或数百万英里的字符串。这就是“编码”概念的由来。'
