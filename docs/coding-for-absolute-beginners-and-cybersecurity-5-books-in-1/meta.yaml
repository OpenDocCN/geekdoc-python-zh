  md: '# File Handling


    Python provides a critical feature for reading data from the file and writing
    data into a file.


    In most programming languages, all the values or data are kept in some volatile
    variables.


    Since data will be stored in those variables during run-time only and will disappear
    once the program execution ends, therefore, it’s better to save these data permanently
    using files.


    Once you store data on a file, the next important thing is its retrieval process
    because it’s stored as bits of 1s and 0s, and in case the retrieval does not occur
    well, then it becomes completely useless, and that data is said to be corrupted.


    # How Python Handles Files?


    If you’re working in an extensive software application where they execute a massive
    amount of data, then we can’t expect those data to be kept in a variable because
    variables are volatile.


    Therefore, when you want to deal with these situations, the role of files will
    come into the picture.


    Since files are non-volatile in nature, the data will remain permanently in a
    secondary device such as Hard Disk and using Python to deal with these files in
    your applications.


    # Do You Consider How Python Will Handle These Files?'
  merge: -1
