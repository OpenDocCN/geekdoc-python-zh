    # # Chapter 8. Cyberwar


    Consider an employee’s W-2 form. Before the 2000s, the information on this form
    had a nominal value that approached the price of the paper on which it was printed.
    There was no easy way to monetize a stolen W-2 form. Today, there is a thriving
    black market for personally identifiable information. As of 2017, the going price
    for a W-2 is between $4 and $20, depending on the income of the wage earner. That
    may not seem like much, but it represents a massive increase from the two-cent
    value of a printed W-2 decades ago. Stealing even a single W-2 makes sense when
    attackers operate from a country where $20 is a full day’s wages. Stealing them
    by the hundreds or thousands using automated attacks against scores of unsuspecting
    and unprepared small businesses makes even more sense for criminals anywhere in
    the world.


    Having established why hackers are coming for your data, let’s look at the damage
    done when they strike. Continuing with the W-2 theft example, state and federal
    laws require employers to report cyber theft, also known as a data breach. Failing
    to disclose the breach opens the door to class-action lawsuits where juries can
    award unlimited damages to victims due to your negligence. Disclosing the breach
    helps shield you and the organization from claims of negligence and, in some cases,
    will prevent class-action suits. However, the organization will not be off the
    hook completely. Defending a non-class action lawsuit will cost tens of thousands
    of dollars, even if you win.


    Additional costs include losses the employee will suffer if their identity is
    used to open credit in their name, drain their bank accounts, etc. Worse, the
    threat of identity theft will follow them forever. Related, indirect costs to
    the employer include replacing the employee if he or she quits and a reduction
    in morale among peer employees. It may become harder and more expensive to hire
    good talent, and customers hearing of the breach may look at competitors they
    believe are more vigilant.'
- md: 'Our highly connected digital world has ushered in a new era of cybercrime.
    One that is growing fast and changing constantly. Executives who stick their heads
    in the sand, try to keep a data breach a secret, pass off cybersecurity as just
    an IT problem, or wait for government protection will pay a steep price.


    Many executives in the 1990s were adamant that computers were a novel expense
    that would never add real value to their business models. The idea that they would
    elevate the discussion of computers to an executive-level was as absurd as typing
    their own email. Executives that clung to this view doomed their company to lose
    ground when competitors with forward-thinking executives raised technology to
    a boardroom discussion. Today cybersecurity is what computers were then. It is
    history, repeating itself, and we already know who wins. Organizations led by
    executives that are willing to buck old-school thinking and grapple with the Wild
    West of cybersecurity will come out on top.


    Today, the outdated view is thinking that cybersecurity is a technical problem
    best delegated to information technology (IT) experts. It goes hand-in-hand with
    the idea that cybersecurity involves only preventing attacks by anticipating them
    and implementing as many deterrents as possible. In contrast, a modern view of
    cybersecurity recognizes that countering every possible attack to achieve perfect
    security is financially unfeasible. This new mindset also considers what happens
    when attacks occur, because they will. Astute executives realize that spending
    every dime on prevention is futile and take a more holistic view of the problem.


    Finding the right balance among various preventive and preparatory measures is
    like building an investment portfolio of stocks, bonds, and real estate. The right
    mix depends on what the external markets are doing and your appetite for taking
    risks. As time goes on, the markets will change, and your life circumstances change.
    Allocations in your portfolio adjust accordingly. This book is a guide to making
    investments in cybersecurity that reflect the external threat landscape, internal
    business strategy, and the organization’s appetite for risk.


    Despite having excellent cybersecurity teams and multi-million-dollar budgets,
    large companies have learned that cybersecurity is a business problem that must
    be managed from the top. They have realized that outsourcing and delegation only
    go so far when building a comprehensive cybersecurity plan and keeping it up to
    date as internal and external circumstances change. For the foreseeable future,
    the management of cybersecurity as a business problem will rest upon the shoulders
    of top management. Unless you embrace this new role, your organization will be
    a cybersecurity have-not in a time where data privacy and security are of increasing
    concern among clients and suppliers.


    What happens if you do not step up to the plate? Well, according to a 2017 report,
    nearly one-quarter of small businesses that suffered a ransomware attack were
    forced to immediately stop their operations. How long can your organization survive
    if revenue-generating operations stopped abruptly while payroll and other expenses
    continued? What will long-term damage be done to your clients’ perception of your
    organization’s ability to offer uninterrupted service?


    Savvy competitors simply wait for your market share to open up as a result of
    your inattention. On the flip side, effective management of cybersecurity is necessary
    just to stay on par with forward-thinking competitors. Having a comprehensive
    cybersecurity plan in place can position your company to survive the same attacks
    that will bankrupt (or severely disrupt) your peers. When that happens, you can
    pick up their market share and grow your company.


    Another reason to take cybersecurity seriously at the executive level is that
    larger, cyber-savvy companies are often direct, or indirect, clients who take
    the security of their supply chain very seriously. Studies show that as many as
    63 percent of data breaches are linked to a third-party because weak downstream
    suppliers make great back doors into otherwise secure systems. In response to
    this, the NIST Cybersecurity Framework (a technical implementation guide) was
    recently revised to add emphasis to supply chain scrutiny, and an executive order
    from the White House drove this same point home for government agencies. The government,
    their downstream contractors, and large private sector companies will begin culling
    lax suppliers and awarding business to those who demonstrate they take cybersecurity
    seriously. Nimble executives who address cybersecurity at their core will have
    an advantage—one that differentiates a company from its competitors and may command
    a premium. If you insist that your plate is full just managing what you already
    have, you will miss the opportunity to rise above your competitors, just like
    the old-school executives who refused to see technology as anything more than
    an expense.


    Consumers have also become quite sensitive to cybersecurity, and it is reflected
    in their buying habits. Forward-thinking executives can capitalize on this trend
    too. A prominent example was Apple’s stance on personal privacy when the FBI demanded
    they decrypt an iPhone used in a terrorist event. Playing up their investments
    in encryption and demonstrating loyalty to a client even in the worst of times
    helped solidify consumer trust in Apple products. We would never advocate brinksmanship
    with the FBI, but Apple’s response was a brilliant way to gain confidence among
    consumers. Learning to manage cybersecurity from a business perspective means
    you can spot and leverage opportunities like this too.


    ## Chapter 9. Ethical Hacking


    When it comes to security, being a hacker is one of the most commonly used terms.
    It appears everywhere, and even the entertainment industry and many authors often
    use it in their movies, books, TV shows, and other media forms. Therefore, the
    word "hacker" is usually seen as a bad profession and always associated with dark
    or real criminal activity. So, when people hear that someone is involved in hacking,
    they immediately see that person as someone who has no good intentions. They are
    usually presented as "operators from the shadows," even antisocial. On the other
    hand, they are also seen as a social activist. This label became especially popular
    after a few things like WikiLeaks. Many hackers were involved in obtaining many
    important documents from governments, politicians, and companies that showed information
    that was very different from the information given to the public. Organized groups
    such as Anonymous or Lizard Squad have also had a huge impact on the hacking experience
    in recent years.


    ### Examples: Mischief or Criminal?


    Hacking is by no means a phenomenon that has appeared overnight. It existed in
    various forms and evolved all the way from the 1960s. However, it was never tackled
    as a criminal activity at first. We''ll look at some cases that will take a closer
    look at some of the attacks, and generic examples that have gradually changed
    that picture.


    - Access services or resources that you do not have permission to use. This is
    usually called stealing usernames and passwords. In some cases, obtaining this
    information without permission is considered a cybercrime, even if you do not
    use it or as accounts of friends or family members.

    - There is a form of digital offense called network intrusion that is also considered
    a cybercrime. In essence, as with ordinary offenses, this means that you went
    somewhere without permission to enter (or in this case, access). So, in case someone
    gets access to a system or group of systems without permission, we can say that
    the person violated the network and thereby committed cybercrime. However, some
    network intrusions can take place without using hacker tools. Sometimes logging
    in to guest accounts without prior permission can be seen as cybercrime.

    - One of the most complex yet simplest forms of hacking is to go after the most
    vulnerable element in the system—people. This type of cybercrime is known as social
    engineering, and we say it can be simple because the person is a much more accessible
    part of the system than any other, and it''s easier to deal with. However, people
    can provide clues that are difficult to understand, whether spoken or not, making
    it difficult for the hacker to get the information they need.

    - The issue of posting or sending illegal material has generally become difficult
    to address, especially in the past decade. Social media received a lot of attention,
    and many other internet-related services increased in use and popularity. This
    allowed many illegal materials to move from one place to another in the shortest
    possible time, allowing it to spread very quickly.'
  mdcn: '我们高度互联的数字世界已迎来网络犯罪的新时代。这个时代发展迅速且不断变化。那些将头埋进沙子里、试图隐瞒数据泄露、将网络安全仅仅视为IT问题，或坐等政府保护的高管们，将付出沉重代价。


    20世纪90年代的许多高管曾坚信，计算机只是一种新奇的开支，永远不会为他们的商业模式带来真正的价值。将计算机问题提升到高管层面讨论的想法，就像让他们自己打邮件一样荒谬。那些固守此观点的高管，注定会让公司在竞争对手面前落于下风——那些拥有前瞻性思维的高管已将技术提升为董事会层面的议题。如今的网络安全，就如同当年的计算机。历史正在重演，而我们已经知道谁会胜出。那些愿意摒弃陈旧思维、直面网络安全这片“狂野西部”的高管所领导的组织，将脱颖而出。


    如今，过时的观点认为网络安全是一个技术问题，最好委托给信息技术（IT）专家处理。这与“网络安全仅涉及通过预测攻击并实施尽可能多的威慑手段来预防攻击”的想法如出一辙。相比之下，现代网络安全观认识到，为应对每一种可能的攻击以实现完美安全，在经济上是不可行的。这种新思维也考虑了攻击发生时的情况——因为攻击总会发生。精明的高管意识到，将每一分钱都花在预防上是徒劳的，他们需要更全面地看待这个问题。


    在各种预防和准备措施之间找到恰当的平衡，就像构建一个包含股票、债券和房地产的投资组合。正确的组合取决于外部市场的动向以及你的风险承受意愿。随着时间的推移，市场会变化，你的生活状况也会改变。投资组合中的配置会相应调整。本书是一本指南，旨在帮助你进行网络安全投资，使其反映外部威胁环境、内部业务战略以及组织的风险承受能力。


    尽管拥有优秀的网络安全团队和数百万美元的预算，大型企业已经认识到，网络安全是一个必须从最高层管理的业务问题。他们意识到，在制定全面的网络安全计划并随着内外部环境变化保持其更新时，外包和授权的作用是有限的。在可预见的未来，将网络安全作为业务问题进行管理的重任将落在最高管理层的肩上。除非你接受这一新角色，否则在客户和供应商日益关注数据隐私和安全的时代，你的组织将成为网络安全领域的“无产者”。


    如果你不挺身而出会怎样？根据一份2017年的报告，近四分之一遭受勒索软件攻击的小型企业被迫立即停止运营。如果创收业务突然中断，而工资和其他支出仍在继续，你的组织能存活多久？这对客户对你组织提供不间断服务能力的认知将造成长期怎样的损害？


    精明的竞争对手只会坐等你的市场份额因你的疏忽而拱手相让。另一方面，有效管理网络安全对于与具有前瞻性思维的竞争对手保持同等水平也是必要的。制定全面的网络安全计划，可以使你的公司在遭遇同样会令同行破产（或严重扰乱）的攻击时得以幸存。届时，你就可以夺取他们的市场份额，壮大你的公司。


    在高管层面重视网络安全的另一个原因是，规模更大、精通网络的公司通常是直接或间接的客户，他们非常重视其供应链的安全。研究表明，多达63%的数据泄露与第三方有关，因为薄弱的下游供应商为原本安全的系统提供了绝佳的后门。为此，美国国家标准与技术研究院（NIST）网络安全框架（一份技术实施指南）最近进行了修订，强调了对供应链的审查，白宫的一项行政命令也向政府机构强调了同一点。政府、其下游承包商以及大型私营企业将开始淘汰那些管理松懈的供应商，并将业务授予那些证明自己重视网络安全的供应商。那些从核心层面解决网络安全问题的灵活高管将获得优势——这种优势能使公司脱颖而出，并可能获得溢价。如果你坚持认为光是管理现有事务就已经让你分身乏术，你将错失超越竞争对手的机会，就像那些拒绝将技术视为不仅仅是开支的守旧高管一样。


    消费者也对网络安全变得相当敏感，这反映在他们的购买习惯中。具有前瞻性思维的高管也可以利用这一趋势。一个突出的例子是苹果公司在FBI要求其解锁一起恐怖事件中使用的iPhone时所采取的立场。强调其在加密方面的投入，并在最糟糕的时刻也表现出对客户的忠诚，这有助于巩固消费者对苹果产品的信任。我们绝不是主张与FBI对抗，但苹果的回应是赢得消费者信心的绝妙方式。学会从商业角度管理网络安全，意味着你也能发现并利用这样的机会。


    ## 第9章 道德黑客


    谈到安全，“黑客”是最常用的术语之一。它无处不在，甚至娱乐业和许多作者也经常在他们的电影、书籍、电视节目和其他媒体形式中使用它。因此，“黑客”一词通常被视为一个不好的职业，总是与黑暗或真实的犯罪活动联系在一起。所以，当人们听说某人参与黑客活动时，他们立刻会认为那个人心怀不轨。他们通常被描绘成“来自阴影的操作者”，甚至是反社会的。另一方面，他们也被视为社会活动家。在“维基解密”等事件之后，这个标签变得尤为流行。许多黑客参与获取了来自政府、政客和公司的大量重要文件，这些文件显示的信息与提供给公众的信息大相径庭。像“匿名者”或“蜥蜴小队”这样的有组织团体近年来也对黑客体验产生了巨大影响。


    ### 例子：恶作剧还是犯罪？


    黑客绝非一夜之间出现的现象。它以各种形式存在，并从20世纪60年代一路演变而来。然而，起初它从未被视为犯罪活动。我们将通过一些案例来更仔细地审视一些攻击，以及逐渐改变这一图景的常见例子。


    -   访问你无权使用的服务或资源。这通常被称为窃取用户名和密码。在某些情况下，未经许可获取这些信息被视为网络犯罪，即使你没有使用它，或者这些账户属于朋友或家人。

    -   有一种称为网络入侵的数字攻击形式，也被视为网络犯罪。本质上，与普通犯罪一样，这意味着你未经许可进入了某个地方（或在此情况下，访问了某个地方）。因此，如果有人未经许可访问了一个系统或一组系统，我们可以说此人侵犯了网络，从而犯下了网络犯罪。然而，一些网络入侵可以在不使用黑客工具的情况下发生。有时，未经事先许可登录访客账户也可能被视为网络犯罪。

    -   黑客最复杂但也最简单的形式之一是针对系统中最脆弱的元素——人。这种类型的网络犯罪被称为社会工程学，我们说它简单，是因为人是系统中比任何其他部分都更容易接触和处理的部分。然而，人们可能提供难以理解的线索，无论是否说出口，这使得黑客难以获取他们所需的信息。

    -   发布或发送非法材料的问题在过去十年中变得尤为棘手。社交媒体受到了大量关注，许多其他与互联网相关的服务的使用和普及度也大幅增加。这使得许多非法材料能够在最短的时间内从一个地方转移到另一个地方，从而使其传播得非常迅速。'
