  md: "# Pointer Arithmetic\n\nThere are times when moving a pointer along to another\
    \ memory location might be useful; this is where pointer arithmetic comes into\
    \ use. If we were to execute say ptr++ and the ptr was an integer pointer it would\
    \ now move 4bytes (Size of an int) along, and we were to run it again, another\
    \ 4bytes etc. This can mean pointer (if pointing to valid array structures) can\
    \ act much like an array can. An example is below:\n\n```\nint arrayInt[] = {\
    \ 10, 20, 30 };\nsize_t arrayInt_Size = 3;\n\n//Will point to the first array\
    \ index\nint* ptr = &arrayInt;\n\nfor (int i = 0; i < arrayInt_Size; i++)\n{\n\
    \    //Remember, *ptr gets the value in the memory location\n    printf(\"Value\
    \ of arrayInt[%d] = %d\\n\", i, *ptr);\n    ptr++;\n}\n```\n\nOutput:\n>Value\
    \ of arrayInt[0] = 10\n>Value of arrayInt[1] = 20\n>Value of arrayInt[2] = 30\n\
    \nThis shows that a pointer to the first address of the array can be incremented\
    \ along the addresses of the array (Remember each value of an array is stored\
    \ in neighbouring memory locations)"
