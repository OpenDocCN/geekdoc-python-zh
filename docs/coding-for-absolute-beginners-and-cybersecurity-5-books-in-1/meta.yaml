    ## Chapter 2. Cybersecurity


    ### Types of Cybersecurity


    Does it seem that everything now depends on computers as well as the internet?
    Entertainment, communication, transportation, medicine, shopping, etc. Even banking
    institutions operate the company online of theirs.


    The realization that many the planet is dependent on the internet should encourage
