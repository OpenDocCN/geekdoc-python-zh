    \n1. 从此类中删除自动生成的注释行，即在下面的清单中显示（此处已删除代码）的地方。\n\n清单1-2，来自HelloWorld.java\n\n```\n\
    package annette.godtland.helloworld;\nimport com.godtsoft.diyjava.DIYWindow;\n\
