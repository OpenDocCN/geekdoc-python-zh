    The Basics: The Language of Code

    Coding is often thought of as an exclusive jargon used by expert programmers.
    However, in reality, they''re just using their own language!


    Programming languages are simply languages in which people describe how software
    should function. When people speak English, French, or Spanish, they''re using
    natural languages. Programming languages are artificial languages whose purpose
    is to communicate with the software itself. In this post, we''ll be using HTML5
    to code for mobile devices.


    HTML5 is a markup language used in creating web pages. You might already use HTML5
    to make your Facebook posts and Twitter messages. This language is used to create
    websites that all computers (not just mobile ones) can access on the internet.
    Since it''s a standard, you won''t ever have to worry about your HTML5 code not
    working on someone else''s device.


    The Basics: What is HTML?


    HTML stands for Hypertext Markup Language. It''s also known as a web markup language
    or plain old markup language (PLA). It was first created in the nineties and can
    be seen in many of the online magazines and newspapers on the internet today.
    You''re probably familiar with this language because it''s used to create all
    of those fancy websites, we get to see every day! You might have even written
    your own basic websites using HTML before...but the basics are just that. Let''s
    get to the juicy stuff!


    HTML5 comes with a handful of new features, which allow you to create more interactive
    websites. We''ll only be using a couple of these, but feel'
  merge: -1
