    \ `ios_base::trunc` 和 `ios_base::app` 之间的区别。\n- 随机访问主要用于二进制文件。因为位置可以精确定位。`seekg()`\
    \ 用于输入，`seekp()` 用于输出。（p 代表 put，g 代表 get）它移动指针。`tellp()` 和 `tellg()` 函数。它告诉你指针的位置。\n\
    \n## 缓冲区和字符串缓冲区\n\n- stringstream 是一种方便的方式，可以像操作独立 I/O 设备一样操作字符串。有时使用 stringstream\
    \ 在字符串和其他数值类型之间转换非常方便。stringstream 的用法与 iostream 非常相似，所以学习起来并不费力。\n- 你需要从一个字符串构建一个\
    \ stringstream，或者将一个 stringstream 转换回一个字符串。\n\n```\nstringstream outstr;\noutstr<<\"\
