  md: '# # Chapter 10. Data Types, Variables and Operators


    Data Types: Variables and Operators are two of the three fundamental pieces of
    programming that help you understand how to code. This book will cover data types,
    variables, and operators with a focus on the basics. Variables are containers
    for storing data (such as numbers), while Operators are for performing actions
    on the data in those containers. Data types help you manage your program''s memory
    usage by telling it what sort of things it can store.


    **Variables:**


    A variable is a container for storing information in your program (such as numbers).
    The computer stores all kinds of information about your program and its environment
    in memory, like warehouses or storage areas. When your program needs to use that
    information, it asks the computer for it.


    Operators: An operator is a symbol used in programming to change how a value is
    used in your program. For example, = means that you are assigning a number to
    an existing variable. The equals sign can also be used as an assignment operator.
    15 = 15 tells the computer that when you say 15, assign it to the variable named
    15.


    The Key Concepts: We now need to discuss what variables are for and how they work
    their magic. The computer will use a certain amount of memory for your program
    and left to its own devices, it will keep using that memory until you tell it
    to stop. When that happens, your program won''t work correctly. The computer won''t
    store all of the information about what you are doing in the program. So how do
    you tell the computer when you need a new piece of memory?


    The Basic Rule: First, create variables (or place data in variables) and then
    use them in your programs! This is going to sound slightly contradictory. However,
    this means that you write code to handle all of the information in your program
    and when it needs to find a new piece of memory for your'
  merge: -1
  pgno: 46
- img_proc: true
  md: 'program, you tell it where to find that recent memory. For this process to
    work, you need to understand about data types.


    Data Types: When you create a variable, you tell the computer how much memory
    is needed and what kind of data it can store. This tells the computer that if
    the variable contains some kind of information, it will know precisely how to
    access it and display it on your screen (or do other things). Without this information,
    the computer cannot understand what you want it to do and will be forced to shut
    down.


    Data Types are Like: let''s say you are running a clothing store. Since you sell
    clothes, you decide to use an inventory system that counts how many different
    items of clothing you have in stock. You can visualize your inventory system as
    a large shelf with many other boxes all over the place filled with clothes. If
    your program needs some clothes, it can go over to the shelf, grab a box and take
    it back to the dressing room for someone to try on. These boxes are like variables
    because they store information about lists of things in the world (like your stock
    of clothes).


    Data Types are Not Like: There is a big difference between these variables boxes
