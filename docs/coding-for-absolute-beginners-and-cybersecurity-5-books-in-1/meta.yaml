    # # How to initialize a variable


    Now that we know how to declare variables, and we know the various types of variables
    that are available to us, the next thing to do is to learn how to make use of
    these variables, in something called “expressions.” Expressions are the most used
    building blocks of a Java program, generally meant to produce a new value as a
    result, though in some cases, expressions are used to assign a new value to a
    variable. Generally, expressions are made up of things such as values, variables,
    operators, and method calls. There are also some expressions that produce no result,
    but rather affect another variable. One example would be an expression that changes
    the value of a variable based on an operation: there is no new value output, and
    there is no true “assignment” of a new value, but rather there is what is called
    a side effect that results in a changed variable value.


    The "Hello World" printing program, we introduced raw values into the print function,
    also known as "hard coding" the output. However, at this point, we should try
    to incorporate what we have learned about variables. Variables operate much the
    same way as raw values, as they simply reference a previously stored value by
    the computer, and as such, the programmer can just use the variable name instead
    of the value. In order to demonstrate this, let us remember the previous "Hello
    World" program:


    ```

    print ("Hello World") ;


    input ("\n\nPlease press the return key to close this window.") ;

    ```


    Now, instead of hard—coding the "Hello World" string, we can simply declare it
    into a variable and have the program output that variable. This should end up
    looking as:


    ```

    String = "Hello World" ;


    print(string) ;


    input ("\n\nPlease press the return key to close this window.") ;

    ```


