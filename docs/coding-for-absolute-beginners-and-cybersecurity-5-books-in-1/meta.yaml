    Social media networks continue to grow and allow you to connect with family, friends,
    colleagues, and classmates, but sharing without thinking about who sees your information
    just invites trouble.


    We often ask people we meet if they’ve checked their social media privacy settings
    lately—many have no idea. That usually means the public can view their open profiles—posts,
    photos, likes, friends, and other activities. You may be OK with that openness,
    but you should be concerned.


    Scammers can "scrape" or copy your profile, learn more about you, and use that
    information to perpetrate any variety of scams, frauds, and hacks. For example,
    say you post a photo of your dog in your backyard and write a caption such as
    "Look at Buddy soaking up the sun." A scammer who reads that post now has a good
    chance of answering the password reset question on your email account if you selected:
    "What’s your pet’s name?" An open profile gives hackers the important details
    they need to hack your life—whether it’s seizing your email account, assuming
    your identity in credit-card fraud, or cracking your bank account. 5 Strong privacy
    settings block hackers from seeing your profiles.'
  - '[PAGE 581]


    # # Know Your Privacy Settings and Your Friends


    You can still enjoy social media and maintain good security; you just need to
    strike the right balance by knowing how privacy settings work at different sites.
    A simple Google search on a website’s name and "privacy settings" will get you
    started. All social media sites will give you some measure of control over who
    sees your profile and activities. Your biggest decision will be selecting a security
    level that allows you to share with friends while keeping your privacy. Thankfully,
    it won’t involve much effort.


    In addition to beefing up your privacy settings, you’ll also need to review your
    "friends" to make sure you still want them to see your social media activities.
    For example, should the friend of a friend know when you are on vacation because
    they can see your photos? It’s important to remember that your posts have a larger
    audience than you realize. Also, social media companies frequently change their
    privacy policies and default settings. Pay attention to privacy updates you receive
    from Facebook and other sites: They’re not just "fine print" and often contain
    important changes that need your attention if you want to keep strong privacy
    on social media.


    We think most people should follow this rule: Do not leave your profile open for
    everyone to see. A study by antivirus firm Norton found that four in every ten
    social media users have suffered fraud.6 Open profiles essentially hand over your
    personal information to scammers and hackers without much effort. Don’t make their
    job easy. Think twice about what you share and with whom—a key rule to hack-proofing
    your life.'
  - '[PAGE 582]


    # Conclusion


    The United States has complained that Russian hackers had meddled with the 2016
    presidential elections. It was a major incident. Russian hackers hacked into Democratic
    National Committee and published some pretty confidential emails during the 2016
    presidential elections in the United States. This episode produced quite a stir
    in the legislative corridors of the United States. The power and impact of cybersecurity
    were revisited, and the importance of cybersecurity was elevated, and for the
    first time, cybersecurity was seen through the context of international relations.
    The incident was not normal as it had the potential to push the two countries
    into a kind of conflict. The level of the attack was unprecedented in nature,
    not only in the United States but also across the globe. People had started seeing
    cybersecurity from a different lens. The incident of Sony Pictures started spinning
    before the eyes of lots of people who responded with mixed sentiments. Some of
    them showed a bit of surprise, and others showed extreme concern, while a few
    showed no reaction at all.


    The United States had accused a state of cyberattack in the past in the wake of
    the attack on Sony Picture Entertainment, but the scale and the impact of this
    attack were unprecedented. It meant that anyone with a computer could change the
    course of an election of the most powerful country in the world. But for seasoned
    cybersecurity experts, this development is not news. Since the advent of the internet
    back in the mid-1990s, the cyberspace has witnessed some pretty amazing growth
    that filled the pockets of millions of people due to rapid commercialization but
    also pushed people into the depths of the crisis. Cybersecurity has now climbed
    up the ladder and has reached the heads of the state who have started seeing the
    security of the world in a different way. Scholars of international relations
    see this new discipline as a subfield of security studies with a special focus
    on the implications of technology for international security. This takes into
    account its effects on the sovereignty, power, and world governance.'
  - '[PAGE 583]


    Cybersecurity has gained considerable attention for the past few years on the
    back of the fact that the attacker is usually not known. This creates a lot of
    confusion and suspicion that are very unhealthy for a peaceful international environment.
    Large nations sometimes use proxies to wage cyberattacks and afterward label them
    as a rogue to avoid direct confrontation with the power they are dealing with.
    We have seen this in the North Koran attack on Sony Pictures. North Korea denounced
    the attack by appreciated their deed as patriotic. Similarly, when the Russian
    hackers meddled in the US elections, Vladimir Putin, the Russian president, denies
    any involvement of the state in the attack but added to the tail of his speech
    that some patriotic minded Russian hackers might have committed that deed. He
    appeared to have been appreciating what the hackers had done to the country that
    had a long history of enmity with Russia.


    Had Putin claimed the attack, there would have been an all-out war between the
    two superpowers of the world. Cybersecurity is playing a crucial role in international
    relations because the threat of nuclear war and the mutual assured destruction
    as a result of the war have negatively affected the world''s strategic scenario.
    Humans, by nature, cannot live without a contest. Physical war is not possible
    as the threat of nuclear war keeps looming over the participants of the war. We
    can see this in the subcontinent where India and Pakistan, the two nuclear powers,
    have made the subcontinent a nuclear flashpoint in the area. Despite the fact
    that the possibility of a conflict remains high, the idea of a hot war is not
    usually pursued by the two countries. So, if countries must go into a conflict,
    they choose the cyber realm to fight each other. Cyberwarfare is an advanced mode
    of cold wars. I have quoted the example of a scenario in which India responded
    with a hacking attack after the Pulwama attack. Similarly, North Korea attacked
    Sony Pictures through a cyber-security breach because it didn’t have the power
    to confront the United States, and also it had to give a befitting response to
    Sony Pictures for making the movie that was a spoof of an assassination attempt
    on Kim Jong-un.


    Cybersecurity issues are becoming more lethal day by day, and it remains doubtful
    that it will help improve international relations. Up till now, it has shown great
    potential in complicating and destroying international relations.'
  - '[PAGE 584]


    This book has explained all the necessary details on the subject of cybersecurity.
    You have learned what the basics of cybersecurity are. You have also learned what
    the general motivations are behind an act of cybercriminal. I have discussed in
    detail was social engineering is and how it is used by malicious hackers to infiltrate
    a facility. Then I moved on to explain cyber terrorism, its types, and its adverse
    effects on the modern world, such as the relations between countries and the general
    peace of the country.'
