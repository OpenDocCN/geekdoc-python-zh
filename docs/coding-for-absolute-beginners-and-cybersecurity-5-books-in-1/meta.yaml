    out a project at the Dutch research institute CWI, but it was later discontinued.
    Guido has successfully used a number of basic languages, the so-called ABC language,
    to work on the Python. According to Van Rossum, the strength of the python language
    is that you can either keep it simple or extend it to more platforms to support
    many platforms at once. The design allowed the system to easily communicate with
    the libraries and various file formats.


