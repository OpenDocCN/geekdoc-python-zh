    \ many programmers around the world are trying to solve this problem by making\
    \ the interpreting speed faster. It is hopeful that Python will run at the same\
    \ rate or even faster than C and C++ soon.\n\n### • Python is not available in\
    \ most mobile browsers\n\nWhile Python works well for those who have regular computers\
    \ and is accessible on many server platforms and desktops to help individuals\
    \ create the codes they are looking for, it is not yet ready for mobile computing.\
    \ Programmers are trying to transition the program to mobile computing to cater\
    \ to today's large numbers of people who use cell phones.\n\n### • Limited design\n\
    \nPython program is not a better option for programmers looking for a program\
    \ with many design options. For example, the design language is not available\
    \ in some other options; so, you will need more time to test, and sometimes, a\
    \ lot of errors can occur when you run the program.\n\n## Chapter 1. Python Basics\n\
    \nOnce you have the software installed on your system, it is time to begin your\
    \ programming adventure with Python. I will start with the fundamentals such as\
    \ variables, strings, and keywords. Now, you will learn and write your very first\
    \ program in Python, the different data you can work with, how to use variables,\
    \ and keywords. Let us begin with the basics to get your coding started right\
    \ away.\n\n### Keywords\n\n| async | assert | as | and |\n|-------|--------|----|-----|\n\
    | def | from | nonlocal | while |\n| continue | for | lambda | try |\n| elif |\
    \ if | or | yield |\n| else | import | pass | |\n| global | not | with | del |\n\
    | in | raise | false | await |\n| return | none | break | except |\n| true | class\
    \ | finally | Is |\n\nLet us begin with the fundamental \"Hello\" program that\
    \ is the first step for any programmer.\n\n```\nPrint (\"Hello, Welcome to Python\
    \ Programming!\")\n```\n\nWhen this program code is run, your output will be:\n\
    \n```\nHello, Welcome to Python Programming!\n```\n\nPython programs always end\
    \ with the extension .py. Let us save this program as Hello.py. Please always\
    \ remember to save each example using its name in order to recall them when necessary.\
    \ When you use your editor or IDE, the file is run via the interpreter, which\
    \ then determines the words used in the program. For instance, in the program\
    \ below, the interpreter will see the word encircled in parenthesis and prints\
    \ what is inside the parentheses. In the course of writing Python codes, the editor\
    \ may highlight certain parts of the program. For instance, it recognizes that\
    \ print () is a function name and uses a particular color to differentiate it.\
    \ However, when it gets to the word \"Hello Welcome to Python Programming!\" it\
    \ recognizes that it is a Python program code. Therefore, it uses a different\
    \ color to differentiate it from the other code. This unique feature is known\
    \ as syntax highlighting and is useful for beginners.\n\n### Indentation and Lines\n\
    \nThere is nothing like braces to indicate a block of code for function and class\
    \ in Python. Normally, a block of code is represented by a line indentation that\
    \ gets enforced in a strong manner. Importantly, the spaces in the indentation\
    \ vary; however, every statement in the block must have the same amount of indentation.\
    \ For instance,\n\n```\nif False:\n    print \"False\"\nelse:\n    print \"True\"\
    \n```\n\nHowever, the block of the statement below will generate an error\n\n\
    ```\nif False:\nprint \"Result\"\nprint \"False\"\nelse:\nprint \"Result\"\nprint\
    \ \"True\"\n```\n\nConsequently, all continuous lines you indent using the same\
    \ number of spaces will for a block. Let us use another example to show various\
    \ statement blocks. I will advise you not to try to understand the logic of the\
    \ program. However, your aim is to understand the various blocks irrespective\
    \ of their structure.\n\n```\nimport sys\ntry:\n    # open file stream\n    file\
    \ = open(fileName, \"w\")\nexcept IOError:\n    print \"Error when writing to,\"\
    \ fileName\n    sys.exit()\nprint \"Enter ',\" fileFinish,\nprint \"\" When finished\"\
    \nwhile fileText != fileFinish:\n    fileText = real_input(\"Enter text you want:\
    \ \")\n    if fileText == fileFinish:\n        # close the file\n        file.close\n\
    \        break\n    file.write(file_text)\n    file.write(\"\\n\")\nfile.close()\n\
    fileText = real_input(\"Enter filename: \")\nif len(fileName) == 0:\n    print\
    \ \"Next time input something\"\n    sys.exit()\ntry:\n    file = open(fileName,\
    \ \"r\")\nexcept IOError:\n    print \"Error reading file requested\"\n    sys.exit()\n\
    ```"
  mdcn: "## Python 语言的优势\n\n使用 Python 程序相比 C++ 和 Java 等其他编程语言具有许多优势。您会很高兴地看到 Python\
    \ 程序的可用性以及学习和使用的便捷性。理想情况下，这些是您现在可以使用的最佳编程语言，尤其是如果您是初学者的话。以下是使用 Python 语言的一些优势：\n\
    \n### • 易于使用、编写和阅读\n\n许多程序员在使用 Java 和 C++ 等编程语言时会面临一些挑战。由于它们的设计，这些语言难以查看。人们必须花费大量时间学习括号的使用，并且不容易识别这些编程语言中使用的一些单词。这些单词可能会吓到您，特别是如果您刚开始接触编程语言。与\
    \ Java 和 C++ 语言不同，Python 不使用复杂的括号。它只使用缩进，使得页面易于阅读。它使用英语，使得理解字符变得容易。\n\n除了使用缩进，Python\
    \ 还使用大量空格，使得学习和阅读所需内容变得容易。它包含许多注释，以便您在程序让您困惑时理解或获得澄清。所以，试一试，您会发现使用 Python 编程语言是多么容易。\n\
    \n### • 它以英语为主要语言\n\n使用 Python 很容易，因为主要语言是英语。作为初学者，您将花费更少的时间来阅读和理解 Python 编程中使用的基本单词。因此，无论您是英语母语者还是非母语者，Python\
    \ 都非常适合您，因为大多数单词都简单易懂。\n\n### • Python 已在某些计算机上预装\n\n某些计算机，如 macOS 系统和 Ubuntu，预装了\
    \ Python。在这种情况下，您只需下载文本解释器即可开始 Python 编程。但是，如果您使用的是 Windows 计算机，则必须在计算机上下载该程序。事实上，即使您一开始没有安装\
    \ Python，它也能正常工作。\n\n### • Python 可与其他编程语言完美配合\n\n起初，您将单独使用 Python。但是，随着您继续编程，您会发现\
    \ Python 可以与其他语言配合使用。一些可以与 Python 配合使用的编程语言包括 C++ 和 JavaScript。尝试了解更多关于 Python\
    \ 的知识及其实际功能。随着时间的推移，您将能够发现许多事情。\n\n### • Python 可用于测试许多事物\n\n下载 Python 后，您需要下载测试解释器。测试解释器在使\
    \ Python 能够读取信息方面发挥着重要作用。最好使用 Windows 中提供的简单产品（如记事本）或其他解释器。\n\n## 使用 Python 编程的缺点\n\
    \n虽然使用 Python 有许多优势，但必须认识到使用它的一些不利影响。由于 Python 的以下负面影响，一些人更喜欢使用其他编程语言（如 C++ 和\
    \ JavaScript）来替代 Python。\n\n### • Python 速度较慢\n\n虽然 Python 可以与其他编程语言很好地配合使用，并且适合初学者，但遗憾的是，Python\
    \ 对于寻求高速程序的程序员来说并不理想，因为它是一种比其他选项更慢的解释型语言。速度水平取决于您翻译的内容，因为一些使用 Python 代码的基准测试比其他代码运行得更快。目前，世界各地的许多程序员正在尝试通过提高解释速度来解决这个问题。希望\
    \ Python 能够很快以与 C 和 C++ 相同甚至更快的速度运行。\n\n### • Python 在大多数移动浏览器中不可用\n\n虽然 Python\
    \ 对于拥有普通计算机的人来说运行良好，并且可以在许多服务器平台和桌面上访问，以帮助个人创建他们所需的代码，但它尚未准备好用于移动计算。程序员正在尝试将程序过渡到移动计算，以满足当今大量使用手机的人群。\n\
    \n### • 设计有限\n\nPython 程序对于寻求具有许多设计选项的程序的程序员来说不是一个更好的选择。例如，设计语言在其他一些选项中不可用；因此，您需要更多时间进行测试，有时在运行程序时可能会发生很多错误。\n\
    \n## 第 1 章 Python 基础\n\n一旦您在系统上安装了软件，就可以开始您的 Python 编程之旅了。我将从变量、字符串和关键字等基础知识开始。现在，您将学习并编写您的第一个\
    \ Python 程序，了解您可以处理的不同数据、如何使用变量和关键字。让我们从基础开始，立即开始您的编码之旅。\n\n### 关键字\n\n| async\
    \ | assert | as | and |\n|-------|--------|----|-----|\n| def | from | nonlocal\
    \ | while |\n| continue | for | lambda | try |\n| elif | if | or | yield |\n|\
    \ else | import | pass | |\n| global | not | with | del |\n| in | raise | false\
    \ | await |\n| return | none | break | except |\n| true | class | finally | Is\
    \ |\n\n让我们从基本的 \"Hello\" 程序开始，这是任何程序员的第一步。\n\n```\nPrint (\"Hello, Welcome to\
    \ Python Programming!\")\n```\n\n运行此程序代码时，您的输出将是：\n\n```\nHello, Welcome to Python\
    \ Programming!\n```\n\nPython 程序始终以扩展名 .py 结尾。让我们将此程序保存为 Hello.py。请始终记住使用其名称保存每个示例，以便在需要时回忆它们。当您使用编辑器或\
    \ IDE 时，文件通过解释器运行，解释器随后确定程序中使用的单词。例如，在下面的程序中，解释器将看到括号中圈出的单词并打印括号内的内容。在编写 Python\
    \ 代码的过程中，编辑器可能会突出显示程序的某些部分。例如，它识别出 print () 是一个函数名称，并使用特定颜色来区分它。但是，当它遇到 \"Hello\
    \ Welcome to Python Programming!\" 这个单词时，它识别出这是一个 Python 程序代码。因此，它使用不同的颜色将其与其他代码区分开来。这个独特的功能被称为语法高亮，对初学者很有用。\n\
    \n### 缩进和行\n\n在 Python 中，没有像大括号那样表示函数和类的代码块。通常，代码块由行缩进表示，该缩进被强制执行。重要的是，缩进中的空格数量可以不同；但是，块中的每个语句必须具有相同数量的缩进。例如，\n\
    \n```\nif False:\n    print \"False\"\nelse:\n    print \"True\"\n```\n\n但是，下面的语句块将生成错误\n\
    \n```\nif False:\nprint \"Result\"\nprint \"False\"\nelse:\nprint \"Result\"\n\
    print \"True\"\n```\n\n因此，所有使用相同数量空格缩进的连续行将形成一个块。让我们用另一个例子来展示各种语句块。我建议您不要试图理解程序的逻辑。然而，您的目标是理解各种块，无论它们的结构如何。\n\
    \n```\nimport sys\ntry:\n    # open file stream\n    file = open(fileName, \"\
    w\")\nexcept IOError:\n    print \"Error when writing to,\" fileName\n    sys.exit()\n\
    print \"Enter ',\" fileFinish,\nprint \"\" When finished\"\nwhile fileText !=\
    \ fileFinish:\n    fileText = real_input(\"Enter text you want: \")\n    if fileText\
    \ == fileFinish:\n        # close the file\n        file.close\n        break\n\
    \    file.write(file_text)\n    file.write(\"\\n\")\nfile.close()\nfileText =\
    \ real_input(\"Enter filename: \")\nif len(fileName) == 0:\n    print \"Next time\
    \ input something\"\n    sys.exit()\ntry:\n    file = open(fileName, \"r\")\n\
    except IOError:\n    print \"Error reading file requested\"\n    sys.exit()\n\
    ```"
