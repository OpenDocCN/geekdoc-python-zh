    我们都知道，当你想完成某事却不知道如何或从哪里开始时，这会有多令人沮丧。我将带你从头开始，解释创建程序所需知道的一切。我将向你展示如何编写、编译和运行程序。每一节将给你另一项技能，这将建立在先前的技能和知识之上，并让你对编程的理解不断增加。


