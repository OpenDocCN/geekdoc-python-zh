    \n### 构造函数\n\n每个类都会有一个构造函数；如果你省略它，编译器会构建一个默认的构造函数。当你创建一个新对象时，至少必须调用一个构造函数。通常，构造函数的名称必须与类的名称相同，并且一个类可以有任意数量的构造函数。\n\
