    Virtually all business is at a considerable risk of a cyberattack, but some industries
    seem to be more vulnerable to these cyberattacks than the rest of the lot. The
    type of data that these companies hold makes them more vulnerable to cyberattacks.
    The very first industry on the line is the health industry.'
