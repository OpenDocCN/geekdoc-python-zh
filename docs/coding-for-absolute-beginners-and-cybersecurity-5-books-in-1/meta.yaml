    \ 3\nQueue peek : 1\nQueue remove : 1\nQueue isEmpty : false\n\n## 第 10 章 文件处理\n\
    \n本章讨论读取、写入、创建和打开文件的细节。有各种各样的文件 I/O 类和方法可供选择。\n\n## 读取文本文件\n\n读取文本文件是 Java 中的一项关键能力，具有许多实际应用。`FileReader`、`BufferedReader`\
    \ 和 `Scanner` 是在 Java 中读取纯文本文件的有用类。它们各自具有特定的品质，使其在处理某些情况时具有独特的优势。\n\n## BufferedReader\n\
    \n此技术从字符输入流中读取文本。它缓冲字符、数组和行，以便高效读取。你可以指定缓冲区类型或使用标准类型。对于大多数情况，默认值已经足够大。特别是，从 `Reader`\
    \ 产生的每个读取请求都会导致底层字符或字节流执行相应的读取操作。因此，建议将 `BufferedReader` 包装在任何读取操作（如 `FileReader`\
    \ 和 `InputStreamReader`）可能开销较大的 `Reader` 周围。\n\n例如：\n\n```java\nBufferedReader\
    \ in = new BufferedReader(Reader in, int size)\n```\n\n## FileReader\n\n用于读取字符文档的便捷类。此类的构造方法假定默认字符格式和默认字节缓冲区大小是合适的。\n\
    \n## Scanner\n\n一个简单的文本扫描器，使用正则表达式解析基本类型和字符串。`Scanner` 使用分隔符模式将其输入分解为标记，默认情况下按空白字符分割。使用不同的\
    \ `next` 方法，生成的标记随后可以转换为不同类型的值。\n\n```java\nimport java.io.File;\nimport java.util.Scanner;\n\
    public class ReadFromFileUsingScanner\n{\n    public static void main(String[]\
    \ args) throws Exception\n    {\n        // filepath is set as a parameter now\
