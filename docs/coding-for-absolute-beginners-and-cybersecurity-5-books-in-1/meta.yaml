  md: '# # Supervised Learning


    Supervised learning occurs where the algorithms create a function that maps raw
    data into desired outputs. Supervised learning is one of the most common paradigms
    for machine learning. It is easy to comprehend. The process of implementation
    of supervised learning may be achieved through systems from the training dataset.
    The training data or examples contain more than one input and the desired output.
    The output is also known as a regulatory signal, which is represented within the
    mathematical model. An array of vectors represents the training example. When
    provided with data in the form of illustrations, the algorithms may be useful
    in the prediction of each name. Forecasting takes place in the process of giving
    a response on whether the answers were right or wrong. The approach allows the
    algorithms a chance to learn to make approximations over time that allow for the
    distinction between the labels and the examples. The method makes supervised learning
    a common option in the process of finding solutions...


    The most common supervised learning approaches include classification and regression.
    In the case of classification, the use of supervised learning occurs where the
    outputs may have restrictions on a fixed number of values. Classification typically
    deals with the identification in a given data set with a view to linking new observations
    into such categories. On the other hand, the use of regression occurs when the
    outputs have a wide range of numerical values within a given subset. The goal
    in both examples is to ensure that machine learning utilizes a fixed set of training
    examples to make the necessary comparisons on how similar or different a collection
    of data may be in a given subset. The optimal scenarios in such data sets ensure
    that the algorithms can determine the class labels for all the unseen occurrences
    within such a subgroup.'
