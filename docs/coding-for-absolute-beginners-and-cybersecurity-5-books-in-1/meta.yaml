  md: '# Chapter 3 Binary trees


    Binary trees are one of the most useful of all the basic data structures and are
    by far the most interesting. They are the perfect example of how recursion and
    pointers can be used to do some very useful things.


    One of the best techniques for creating lists of things is the linked list, but
    finding an element in the list can take a while. And, if you have a large amount
    of unstructured data, an array won’t help much either. You can try sorting the
    array but, even so, inserting items into it will still be difficult. If you have
    an array that you want to keep sorted, inserting new elements will take a lot
    of shuffling! And trying to find things in a list as quickly as possible is quite
    important, especially in scenarios like these:


    +   - You’re building an MMORPG game and players need to be able to sign in quickly—that
    involves quickly looking players up

    - You’re building software to process credit cards and millions of transactions
    need to be handled hourly—credit card balances need to found very quickly

    - You’re using a low-power device, such as a tablet or smartphone, and showing
    your users an address book. You don’t want your users to keep hanging because
    your data structure is slow.


    This section will discuss the tools needed to overcome these problems and more.


    The idea of the solution is to be able to store elements in a structure like a
    linked list, using pointers to help structure the memory, but in an easier way
    than the linked list. Doing this requires that the memory have more structure
    than a simple list.


    So what does structuring data mean? When we started this journey, we only had
    arrays, but these never really gave us the ability to use data structures other
    than sequential lists. Linked lists use pointers to grow sequential lists incrementally
    but don’t use the flexibility of the pointer to build more sophisticated structures.'
  merge: -1
  pgno: 379
- img_proc: true
  md: 'What are these more sophisticated structures in memory? Structures that hold
    more than a single next node at any given time are a good example. But why would
    you want this? Simple. If you have two “next nodes,” one can be used to represent
    elements that are more than the current element. This is called a binary tree.


    These are named because there are always one or two branches from every node.
    Each of the next nodes is a child, and the node that links to the child is the
    parent node.


    This is what a binary tree might look like:


    ```

    10


    6 14


    5 8 11 18

    ```


    In the tree, the left child on each of the elements is smaller than the element,
    and the right child is larger. 10 is the parent node for the whole tree, and the
    child nodes of 6 and 14 are both parent nodes to their own small trees, called
    subtrees.


    Binary trees have one very important property: each child is an entire tree. Combine
    this with the rule of the left child being smaller and the right child being larger,
    and you have an easy way of defining algorithms that locate specific nodes in
    the tree.


    First, look at the current node value. If it equals the search target, it’s done.
    If it’s more than the search target, go left; otherwise, go right. This works
    because each node to the left of the tree is less than the current mode value,
    and each on the right is more.


    In an ideal world, your binary tree will be balanced with the exact same number
    of nodes on both sides. In such cases, every child tree is roughly 50 percent
    of the entire tree and, when you search the tree for a value, the search can eliminate
    50 percent of the results each time it gets to a child node. So, if you had a
    tree of 1000 elements, 500 would be immediately eliminated. Search that tree again
    (it only has 50 elements now), and you can cut it by about 50 percent again. That
    way it doesn’t take long to find the value you want.'
  merge: -1
  pgno: 380
- img_proc: true
  md: 'So, how many times must a tree be subdivided before you get to one element?
    The answer to that is log2n (n is the number of elements the tree has). This is
    a small value, even if your tree is large—if your tree had, say, 32 billion elements,
    the value would be 32; almost 100 million times faster than a search of a linked
    list of four billion elements, where every single one has to be assessed.


    If the tree isn’t balanced, you won’t be able to eliminate roughly half of the
    elements; worst case, each node only has one child and that makes the tree nothing
    more than a linked list with a few extra pointers, thus requiring you to search
    all elements.


    So, when a tree is balanced approximately, it’s much faster and easier to search
    for nodes than the same search on a linked list. This is because you can structure
    the memory of how you want it.'
