    \ 有数据类型来定义各种操作和存储这些数据类型的方法。Python 中有五种数据类型；它们是：\n\n- 字符串\n- 数字\n- 元组\n- 列表\n-\
    \ 字典\n\n## 字符串\n\n这是一系列用引号括起来的字符。在 Python 中，引号中的任何内容都被视为一个独特的字符。单引号和双引号都可以用来在\
