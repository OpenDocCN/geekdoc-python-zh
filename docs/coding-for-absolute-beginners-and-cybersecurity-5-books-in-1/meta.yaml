    \n3. 单击“完成”。\n\n“包资源管理器”窗格现在显示了你在 Hello World 项目中创建的包，如下图所示：\n\n![](img/d5bcf187e3573f6b3164f4d4615fafd7_257_1.png)\n\
    \n### 关键点和更多\n\n- 在“包资源管理器”窗格中右键单击以创建 Java 项目和包。\n- 为每个程序创建一个不同的 Java 项目。\n- Eclipse\
