    There are many kinds of instructions. If you want to add a number, you can write
    something like this:


    number = number + 1 Or you could directly express the instruction like this:

    number = number + 1 Write your name Center justified. Add one to the number line.


    In programs, it bothers me when you don''t write the complete step-by-step procedure
    in one command or instruction. Instead, each piece of information is usually separated
    into several more minor instructions called statements. For example, in the examples
    above, there are two separate instructions: (1) "Write your name" and (2) "Center
    justified. Write your name." But they are really one statement that you have divided
    up into smaller pieces.


    In code or computer programs, the "commands" and "instruction methods" can be
    represented as statements or lines of code. Line by line, a program is composed
    of separate instructions and commands. This is how programs work; one line does
    one thing.


    When you write your programs on paper or type them into an online editor like
    Notepad++, you should divide up your instructions into multiple steps so that
    each line has only one instruction. It is important to keep each instruction on
    a different line of code to show what the computer is doing. For example, if your
    program has the instruction "Add one to the number line," this is too long to
    use on one line. Instead, it would be best if you wrote something like this:


    number = number + 1


    Or if your program has the instruction "Write your name," this is too short of
    using on one line. Instead, it would help if you wrote something like this:


    Write your name, what to do.'
