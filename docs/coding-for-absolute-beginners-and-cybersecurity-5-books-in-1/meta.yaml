    \ `static` 修饰符声明，并且位于任何方法之外的变量。\n\n## 局部变量\n\n局部变量是在方法、代码块或构造函数内部定义的变量。这些变量在方法内部声明和实例化，并在方法执行完毕后销毁。\n\
    \n## 实例变量\n\n实例变量是位于类内部但在方法之外的变量。它们在类初始化的同时被初始化。可以从该特定类的方法、代码块或构造函数中访问它们。\n\n\
    一个类可以包含任意数量的方法以获取其所需的值。例如，Cat 类有三个方法：`running()`、`sleeping()` 和 `jumping()`。\n\
    \n## 构造函数\n\n构造函数是用于初始化对象的方法。一个类必须至少包含一个构造函数。\n\n以下是构造函数的重要规则：\n- 构造函数的名称应与类的名称匹配。\n\
    - 它不应有显式的返回类型。\n\n## 构造函数类型\n\n- 默认或无参构造函数\n- 带参构造函数\n\n### 默认构造函数\n\n没有参数的构造函数称为默认构造函数。\n\
    \n`<class_name>()` 以下是语法：\n\n## 带参构造函数\n\n带参构造函数是带有参数的构造函数。它用于为特定对象提供值。\n\n以下示例展示了两种类型的构造函数。第一个是默认构造函数，它没有任何参数。第二个构造函数有一个参数，即名称。\n\
    \n```java\npublic class Kitten {\n    public Kitten() {\n    }\n\n    public Kitten(String\
    \ name) {\n        // 此构造函数有一个参数，name。\n    }\n}\n```\n\n## 创建对象\n\n类为对象提供模板。对象基本上是从类创建的。要创建新对象，你将使用\
    \ `new` 关键字。\n\n从类创建新对象需要采取以下步骤：\n\n- 声明——这指的是变量声明，你将写下变量的名称及其对象类型。\n- 实例化——要创建一个新对象；你将使用\
    \ `new` 关键字。\n- 初始化——在 `new` 关键字之后调用一个构造函数，并初始化一个新对象。\n\n以下示例展示了从类创建新对象所采取的不同步骤：\n\
    \n```java\npublic class Kitten {\n    public Kitten(String name) {\n        //\
    \ 此构造函数包含一个参数，name。\n        System.out.println(\"Passed Name is:\" + name);\n\
    \    }\n\n    public static void main(String[] args) {\n        // 以下语句将创建一个对象\
    \ myKitten\n        Kitten myKitten = new Kitten(\"spotty\");\n    }\n}\n```\n\
    \n以下是输出：\n\n```\nPassed Name is: spotty\n```\n\n## 如何访问方法和实例变量\n\n创建的对象用于访问方法和实例变量。要访问实例变量，你将使用以下步骤：\n\
    \n首先，你必须创建一个对象：\n\n```java\nObjectName = new Constructor();\n```\n\n接下来，调用一个变量，如：\n\
    \n```java\nObjectName.variableName;\n```\n\n要调用一个类方法：\n\n```java\nObjectName.MethodName();\n\
    ```\n\n## Java 包\n\n包只是对接口和类进行分组的一种方式。Java 包作为类的容器。通常的分组依据是功能。使用包有助于代码重用。当接口和类被分类到包中时，你可以轻松地访问它们以在其他程序中使用。使用包还有助于防止类和接口之间的名称冲突。\n\
    \n要创建一个包，请在包名之前使用 `package` 语句作为第一条语句。\n\n```java\npackage mypack;\npublic class\
    \ students {\n    // 语句;\n}\n```\n\n以下是示例：\n\n## 导入语句\n\n你可以使用 `import` 关键字将包导入到你的源文件中。导入语句使编译器更容易找到类或源代码的位置。\n\
    \n你可能只想从一个包中导入一个类。你可以使用点运算符来指定包和类。例如：\n\n```java\nimport java.util.Date;\nclass\
    \ MyDate extends Date {\n    // 语句。\n}\n```\n\n要从一个包中导入所有类，你可以在点运算符后使用通配符 `*`。例如：\n\
    \n```java\nimport java.io.*;\n```\n\n## 修饰符\n\n修饰符是改变代码中定义含义的关键字。Java 提供了几种修饰符。\n\
    \n## 访问修饰符\n\n访问修饰符用于定义方法、变量、类和构造函数的访问级别。\n\n### Private（私有）——仅在类内部可访问\n\n当方法、变量、类或构造函数被声明为\
    \ `private` 时，这意味着它仅在类内部可用。但是，如果类具有公共的 getter 方法，你可能能够在类外部访问私有变量。`private` 关键字表示最高的访问限制。请注意，你不能将接口和类声明为\
    \ `private`。\n\n### Public（公共）——可被世界访问\n\n被定义为 `public` 的方法、接口、构造函数、类等可以从其他类访问。类似地，在公共类内部定义的代码块、方法或字段可以从\
    \ Java 类访问。只要它们在同一个包中，这就是正确的。如果你想从另一个包访问一个公共类，你将必须导入该公共类。根据类继承的概念，子类继承类的所有公共变量和方法。\n\
    \n请注意，应用程序的 `main()` 方法必须声明为 `public`，Java 解释器才能调用它来运行该类。\n\n### Protected（受保护）——可被所有子类和包访问\n\
    \n在超类中将方法、变量或构造函数声明为 `protected`，使其仅对其所在包内的类或其在另一个包中的子类可访问。如果你想允许子类使用变量或辅助方法，并防止不相关的类使用它们，则使用此访问类型。接口及其下的字段和方法不应声明为\
    \ `protected`，但接口外部的字段和方法可以声明为 `protected`。类不应声明为 `protected`。\n\n### 默认：未提供修饰符时适用——可被包访问\n\
    \n未使用修饰符声明的方法或变量可被同一包内的其他类访问。\n\n下表总结了不同的访问修饰符及其效果：\n\n| 修饰符 | 类内部 | 包内部 | 包外部（子类）\
    \ | 包外部 |\n| :--- | :---: | :---: | :---: | :---: |\n| Private | Y | N | N | N\
    \ |\n| Public | Y | Y | Y | Y |\n| Protected | Y | Y | Y | N |\n| Default | Y\
    \ | Y | N | N |\n\n## 非访问修饰符\n\n非访问修饰符可用于访问 Java 中的各种功能。\n\n### Final（最终）——用于最终确定变量、方法和类的实现\n\
    \n#### Final 变量\n\n你只能显式初始化一个 `final` 变量一次。当你将一个变量声明为 `final` 时，你将永远无法将其重新赋值给另一个对象。但是，请注意，你仍然可以更改存储在对象内部的数据。这意味着虽然你可以更改对象的状态，但你将无法更改引用。`final`\
    \ 修饰符通常与 `static` 配对，从常量值创建类变量。"
