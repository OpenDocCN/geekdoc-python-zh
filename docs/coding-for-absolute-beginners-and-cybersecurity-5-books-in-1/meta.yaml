  md: '# Chapter 21. Difference Between Java, Python and C++


    Python is an object-oriented programming language often used for web development
    or scripting purposes. It is different from other high-level languages like Java
    and C++ because it mixes procedural and dynamic typing with syntax that resembles
    English words. On the other hand, Java is a statically typed object-oriented language
    oriented towards distributed computing systems that web developers can use for
    server-side applications or system software.


    In contrast to Python''s English-like syntax, C++ has its own set of rules for
    declaring variables using keywords such as "int," "float" and "char". So how do
    these three programming languages differ from each other? A simple answer would
    be to state that Python focuses on the code while Java and C++ concentrate on
    the compiler. Let us briefly analyze this statement in regards to each programming
    language.


    In Python, the code is considered primary and is given more importance than the
    compiler. For instance, there are no strict rules for naming conventions in Python,
    unlike Java where all classes have to be named after a class name and its respective
    package name, e.g. java.util.ArrayList . All that matters in Python is that a
    class or function is present.


    Python recognizes the existence of objects and executes them rather than the syntax.
    Also, there are no strict rules for indentation in Python, which means that indentations
    do not affect code execution. A programmer can write code with multiple nested
    loops and levels of functions without worrying about the number of spaces used
    in-between.


    In Java, on the other hand, compiler rules are considered more important than
    the code itself which leads to a limited number of things a programmer can do
    compared to programmers working with Python or C++. In particular, object-oriented
    programming is emphasized heavily in Java as opposed to procedural programming
    which is illustrated through C++''s templates and macros features. The way a programmer
    writes the code is'
  merge: -1
  pgno: 86
- img_proc: true
  md: 'given more importance than the way the code can be executed, leading to confusing
    Java developers who are used to coding in Python.


    In conclusion, Python focuses on the code, Java focuses on compiler rules and
    C++ focuses on both. In terms of language design, an experienced programmer is
    better off learning C++ because he/she will be able to understand how a compiler
    works at a low level but will have problems with learning object-oriented programming
    in Java. As for an inexperienced programmer looking for a more accessible programming
    language to learn, Python would be better than Java and C++ because of its short
    syntax lengths.'
