  md: '# # Data-Structure


    Data structures are concrete representations of data and are defined as a programmer
    point of view of data. Data-structure represents how data will be stored in memory.
    All data-structures have their own pros and cons. Depending upon the type of problem,
    we choose a data-structure that is best suited for it.


    For example, we can store data in an array, a linked-list, stack, queue, tree,
    etc.


    Note: In this chapter, we will be studying various data structures and their API.
    So that the user can use them without knowing their internal implementation.


    # # JAVA Collection Framework


    JAVA programming language provides a JAVA Collection Framework, which is a set
    of high quality, high performance & reusable data-structures and algorithms.


    ![](img/d5bcf187e3573f6b3164f4d4615fafd7_307_0.png)


