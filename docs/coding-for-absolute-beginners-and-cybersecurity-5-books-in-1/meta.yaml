    # ## Break


    This keyword is used inside the loop at a point where you want the execution flow
    to terminate the loop and directly start execution from the first instruction
    that appears after the loop.


    # ## Continue


    This keyword is used inside the loop at a point where the programmer wants the
    computer to overlook the rest of the loop and move the control to the first statement
    of the loop.


    In order to help you understand how loops are executed, let us take an example
    and implement it using all the three types of loop control.'
