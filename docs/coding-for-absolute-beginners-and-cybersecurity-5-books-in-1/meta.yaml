    # # What are variables?


    A variable, on the other hand, is an "object" that contains a specific data type
    and it''s assigned or received value. It is called a variable because the value
    contained can change according to how it is used in the code, how the coder can
    declare its value, or even how the user of the program chooses to interact with
    it. A variable, in short, is a storage unit for a data type. Having access to
    variables allow programmers to conveniently label and call stored values at hand.'
  - '[PAGE 221]


    # Types of variables in Java


    Java requires the programmer to use declaration statements, lines of code used
    to declare variables and define them by specifying the particular data type and
    name. Java has a specific way of treating variables, by defining variables as
    containers that contain a certain type and value of information, unlike some languages
    such as python, which only requires a declaration of a variable, and the variable
    can dynamically change its type; Java variables are static, which retain their
    type once declared.


    ```

    Int number = 20;

    Boolean completed = true;

    String hello = “Hello World!”

    ```


    The syntax in declaring is seen in the previous examples, with the type of the
    variable coming first, then the name of the variable, then the value. Note as
    well that the declaration statement can be composed of multiple declarations in
    one line, as in the following example:


    ```

    Int number = 20, Boolean completed = true, string hello = “Hello World!”;

    ```


    Java variables can be declared without any value at the start; in cases such as
    these, Java chooses to declare these variables with a particular default value,
    for example:


    ```

    Byte a;

    Short num;

    Boolean answer;

    ```


    Will result in the values 0, 0, and false, respectively. A more complete list
    of default values is as follows: the byte, short, int, and long data types will
    all result in a default value of 0, while the float and double data types will
    have a default 0.0 value, the char data type will result in ‘\u0000’ value, a
    string or any other object will have a null default value, and all Booleans will
    begin with a false default value.'
  - '[PAGE 222]


    In Java, variables are static when declared, meaning that the programmer must
    define the data type that the variable will be containing. To illustrate, if we
    wish to use a variable num to store a number, we would first have to declare the
    variable: "int num," before we can assign a value, such as "num = 10."


    The process above is usually known as and referred to as an "assignment statement,"
    where a value is assigned to the variable as declared by the programmer. However,
    one prominent thing about how Java, and in fact how most programming languages,
    works is that in the assignment statement, such as in our example of num = 10,
    the actual value stored is the one on the right side of the equals sign, the value
    of 10, and num is just the "marker" to call that stored value. This is why there
    are many Java programmers that tend to prefer the jargon of "getting" a value
    rather than "assigning," though for the most part, they may be employed interchangeably,
    and outside of some rare scenario, function mostly the same way.


    Note, however, that once values have been assigned to variables, functions need
    to be carried out in order for the data inside that variable to change its data
    type.'
- md: "## Naming a variable\n\nCreating variables is an easy task, especially given\
    \ how Java programmers tend to create and name them after the data type or the\
    \ purpose of what the variable will store. However, there are a few rules when\
    \ it comes to naming these variables, else Java will not recognize it, and an\
    \ error message will result. The main restrictions around variable names are that\
    \ it should not begin with a special character, such as an underscore or a number.\
    \ However, variable names can consist of characters such as letters and numbers,\
    \ and even an underscore, provided that the underscore is not placed at the start.\
    \ No other characters may be used, such as the # or even $, as these special characters\
    \ have different uses in Java, and thus will not be recognized in a variable name.\n\
    \nWhile those are the major rules, here are some tips when it comes to naming\
    \ variables. The variable name should be descriptive, as in longer codes it may\
    \ be difficult to recall just what \"x\" is for. Having a variable name such as\
    \ \"count\" or \"output\" is much easier to recall as compared to having a generic\
    \ \"x\" or \"y\" and will help in avoiding confusion. In addition to being descriptive,\
    \ variables will also be easier to use if their names are kept fairly short. While\
    \ having a variable name such as banking information account records is very descriptive,\
    \ typing it repeatedly as needed in the program will get exhausting, and having\
    \ longer variable names increase the chances of typographical errors, which will\
    \ lead to bugs in the code, resulting in a run-time error or the code not working\
    \ as intended, or working, but introducing bugs along the way. Note as well that\
    \ it has always been a practice for Java variables to be written in all lower-case\
    \ letters, and while there is no restriction on capitalization, keeping things\
    \ in lowercase simplifies things, as a missed capitalization may result in the\
    \ variable not being recognized, as Java reads an upper-case letter as an entirely\
    \ different character versus a lower-case letter.\n\n## Java primitive types\n\
    \n## Method Naming Conventions\n\nWe shall revisit the naming conventions in Java\
    \ since you will be using member methods. Methods in Java programming perform\
    \ operations, they also receive any argument provided by a caller, and it can\
    \ also return a result of an operation to a caller. Here’s the syntax for declaring\
    \ a method:\n\n```\n[Access Control Modifier] Return Type methodName ([set of\
    \ parameters])\n{\n    // body of the method\n    ......\n}\n```\n\nHere are a\
    \ few rules to remember when you make the names for the methods that you will\
    \ write. Method names are always verbs or more specifically verb phrases (which\
    \ means you can use multiple words to name them). The first word of the method\
    \ name should all be in lower case letters, while the rest of the words should\
    \ follow a camel case format. Here is an example:\n\n```\nwriteMethodNamesThisWay(\
    \ )\n```\n\nNow, you should remember that verbs are used for method names, and\
    \ they indicate an action while nouns are used for variable names, and they denote\
    \ a certain attribute.\n\nFollowing the syntax for declaring a method and following\
    \ the name conventions for this Java construct, here’s a sample code that can\
    \ be used to compute the area of a circle.\n\n```\npublic double computeCircleArea()\
    \ {\n    return radius * radius * Math.PI;\n}\n```\n\n## Using Constructors in\
    \ Your Code\n\nWe’ll just go over some additional details as they relate to object-oriented\
    \ programming. As stated earlier, a constructor will look like a method, and you\
    \ can certainly think of it and treat it like a special kind of method in Java\
    \ programming.\n\nHowever, a constructor will still be different from a method\
    \ in several ways. The name of a constructor will be the same as the class name.\
    \ Use the keyword or operator “new” to create a new instance of the constructor\
    \ and also to initialize it. Here’s an example using the class “Employee” and\
    \ a variety of ways to initialize it in your code:\n\n```\nEmployee payrate1 =\
    \ new Employee( );\n\nEmployee payrate2 = new Employee(2.0);\n\nEmployee payrate3\
    \ = new Employee(3.0, “regular”);\n```\n\nA constructor will also implicitly return\
    \ void—that simply means it doesn’t have a return type. You can’t put a return\
    \ statement inside the body of a constructor since it will be flagged by compilers\
    \ as an error. The only way you can invoke a constructor is via the use of the\
    \ “new” statement. We have already given you several ways how you can invoke constructors\
    \ in the samples above.\n\nOne final difference is that constructors can’t be\
    \ inherited. Let’s go back to the examples provided above—the first line includes\
    \ “Employee( );”—that is called a default constructor. As you can see, it has\
    \ no parameters whatsoever. The job of a default constructor is to simply initialize\
    \ the member variables to a specific default value. In the example above, the\
    \ member variable payrate1 was initialized to its default pay rate and employee\
    \ status.\n\nCan constructors be overloaded too? Yes, they can. Constructors behave\
    \ like methods too, so that means you can overload a constructor just the same\
    \ way you overload a method. Here are a few examples of how you can overload a\
    \ constructor. We use the Employee class and overload it using different parameters.\n\
    \n```\nEmployee( )\nEmployee(int r)\nEmployee(int r, String b)\n```\n\n## How\
    \ to initialize a variable\n\nNow that we know how to declare variables, and we\
    \ know the various types of variables that are available to us, the next thing\
    \ to do is to learn how to make use of these variables, in something called “expressions.”\
    \ Expressions are the most used building blocks of a Java program, generally meant\
    \ to produce a new value as a result, though in some cases, expressions are used\
    \ to assign a new value to a variable. Generally, expressions are made up of things\
    \ such as values, variables, operators, and method calls. There are also some\
    \ expressions that produce no result, but rather affect another variable. One\
    \ example would be an expression that changes the value of a variable based on\
    \ an operation: there is no new value output, and there is no true “assignment”\
    \ of a new value, but rather there is what is called a side effect that results\
    \ in a changed variable value.\n\nThe \"Hello World\" printing program, we introduced\
    \ raw values into the print function, also known as \"hard coding\" the output.\
    \ However, at this point, we should try to incorporate what we have learned about\
    \ variables. Variables operate much the same way as raw values, as they simply\
    \ reference a previously stored value by the computer, and as such, the programmer\
    \ can just use the variable name instead of the value. In order to demonstrate\
    \ this, let us remember the previous \"Hello World\" program:\n\n```\nprint (\"\
    Hello World\") ;\n\ninput (\"\\n\\nPlease press the return key to close this window.\"\
    ) ;\n```\n\nNow, instead of hard-coding the \"Hello World\" string, we can simply\
    \ declare it into a variable and have the program output that variable. This should\
    \ end up looking as:\n\n```\nString string = \"Hello World\" ;\n\nprint(string)\
    \ ;\n\ninput (\"\\n\\nPlease press the return key to close this window.\") ;\n\
    ```\n\nThis should come out with the same result as the previous program, looking\
    \ something similar to:\n\nHello World\n\nPlease press the return key to close\
    \ this window.\n\n## Chapter 3. Java Basics\n\n## Java Development Kit\n\nThe\
    \ JDK provides the tools needed to build, test, and monitor robust Java-anchored\
    \ applications. It allows developers to access software components and compile\
    \ applications during Java programming operations. For example, a developer needs\
    \ a JDK-powered environment to be able to write applets or implement methods.\n\
    \nSince the JDK more or less performs the operations of a Software Development\
    \ Kit (SDK), one could easily confuse the scope and operations of the two items.\
    \ Whereas the JDK is specific to the Java programming language, an SDK has broader\
    \ applicability. But a JDK still operates as a component of an SDK in a program\
    \ development environment. This means that a developer would still need an SDK\
    \ to provide certain tools with broader operational characteristics and that are\
    \ not available within the JDK domain. Developer documentation and debugging utilities,\
    \ as well as application servers, are some of the crucial tools that SDK supplies\
    \ to a Java programming environment.\n\nThe scope of JDK deployment depends on\
    \ the nature of the tasks at hand, the supported versions, and the Java edition\
    \ that is in use. For example, the Java Platform, Standard Edition (Java SE) Development\
    \ Kit is designed for use with the Java Standard Edition. The Java Platform, Enterprise\
    \ Edition (Java EE), and the Java Platform, Macro Edition (Java ME), are the other\
    \ major subsets of the JDK. Details of each of these Java editions are described\
    \ in detail in the subtopics below. The JDK has been a free platform since 2007,\
    \ when it was uploaded to the OpenJDK portal. Its open-source status facilitates\
    \ collaborations and allows communities of software developers to clone, hack,\
    \ or contribute ideas for advancements and upgrades."
  mdcn: "## 变量命名\n\n创建变量是一项简单的任务，尤其是考虑到 Java 程序员倾向于根据数据类型或变量将要存储的内容的用途来创建和命名它们。然而，在命名这些变量时有一些规则，否则\
    \ Java 将无法识别它，并导致错误消息。变量名的主要限制是它不应以特殊字符开头，例如下划线或数字。但是，变量名可以由字母和数字等字符组成，甚至可以包含下划线，只要下划线不放在开头即可。不能使用其他字符，例如\
    \ # 甚至 $，因为这些特殊字符在 Java 中有不同的用途，因此不会在变量名中被识别。\n\n虽然这些是主要规则，但在命名变量时这里有一些提示。变量名应该是描述性的，因为在较长的代码中，可能很难回忆起\
    \ \"x\" 是什么用途。拥有像 \"count\" 或 \"output\" 这样的变量名比拥有通用的 \"x\" 或 \"y\" 更容易回忆，并且有助于避免混淆。除了具有描述性之外，如果变量名保持相当简短，变量也会更容易使用。虽然拥有像\
    \ banking information account records 这样的变量名非常具有描述性，但在程序中根据需要反复输入它会变得令人筋疲力尽，并且较长的变量名会增加打字错误的机会，这将导致代码中的错误，从而导致运行时错误或代码无法按预期工作，或者可以工作，但会引入错误。还要注意，Java\
    \ 变量一直以全小写字母书写的惯例，虽然对大小写没有限制，但将所有内容保持为小写可以简化事情，因为遗漏大写可能导致变量无法被识别，因为 Java 将大写字母读取为与小写字母完全不同的字符。\n\
    \n## Java 基本类型\n\n## 方法命名约定\n\n我们将重新审视 Java 中的命名约定，因为您将使用成员方法。Java 编程中的方法执行操作，它们还接收调用者提供的任何参数，并且还可以将操作结果返回给调用者。以下是声明方法的语法：\n\
    \n```\n[Access Control Modifier] Return Type methodName ([set of parameters])\n\
    {\n    // body of the method\n    ......\n}\n```\n\n在为您将要编写的方法命名时，请记住以下几条规则。方法名始终是动词，或者更具体地说是动词短语（这意味着您可以使用多个单词来命名它们）。方法名的第一个单词应全部使用小写字母，而其余单词应遵循驼峰命名格式。以下是一个示例：\n\
    \n```\nwriteMethodNamesThisWay( )\n```\n\n现在，您应该记住，动词用于方法名，它们表示一个动作，而名词用于变量名，它们表示某个属性。\n\
    \n遵循声明方法的语法以及此 Java 构造的命名约定，以下是可用于计算圆面积的示例代码。\n\n```\npublic double computeCircleArea()\
    \ {\n    return radius * radius * Math.PI;\n}\n```\n\n## 在代码中使用构造函数\n\n我们将回顾一些与面向对象编程相关的额外细节。如前所述，构造函数看起来像一个方法，您当然可以将其视为\
    \ Java 编程中一种特殊类型的方法。\n\n然而，构造函数在几个方面仍然与方法不同。构造函数的名称将与类名相同。使用关键字或运算符 \"new\" 来创建构造函数的新实例并初始化它。以下是使用类\
    \ \"Employee\" 以及在代码中初始化它的各种方式的示例：\n\n```\nEmployee payrate1 = new Employee( );\n\
    \nEmployee payrate2 = new Employee(2.0);\n\nEmployee payrate3 = new Employee(3.0,\
    \ “regular”);\n```\n\n构造函数还将隐式返回 void——这仅仅意味着它没有返回类型。您不能在构造函数的主体中放置 return 语句，因为编译器会将其标记为错误。调用构造函数的唯一方法是通过使用\
    \ \"new\" 语句。我们已经在上面的示例中向您展示了如何调用构造函数的几种方式。\n\n最后一个区别是构造函数不能被继承。让我们回到上面提供的示例——第一行包括\
    \ \"Employee( );\"——这被称为默认构造函数。如您所见，它没有任何参数。默认构造函数的工作只是将成员变量初始化为特定的默认值。在上面的示例中，成员变量\
    \ payrate1 被初始化为其默认工资率和员工状态。\n\n构造函数也可以重载吗？是的，它们可以。构造函数的行为也像方法，这意味着您可以像重载方法一样重载构造函数。以下是您可以重载构造函数的一些示例。我们使用\
    \ Employee 类并使用不同的参数对其进行重载。\n\n```\nEmployee( )\nEmployee(int r)\nEmployee(int\
    \ r, String b)\n```\n\n## 如何初始化变量\n\n现在我们知道如何声明变量，并且我们知道可用的各种类型的变量，接下来要做的是学习如何在所谓的\
    \ \"表达式\" 中使用这些变量。表达式是 Java 程序最常用的构建块，通常旨在产生一个新值作为结果，尽管在某些情况下，表达式用于为变量分配一个新值。通常，表达式由值、变量、运算符和方法调用等组成。还有一些表达式不产生结果，而是影响另一个变量。一个例子是基于操作改变变量值的表达式：没有新值输出，也没有真正的\
    \ \"赋值\" 新值，而是产生所谓的副作用，导致变量值改变。\n\n我们之前介绍的 \"Hello World\" 打印程序，我们在打印函数中引入了原始值，也称为\
    \ \"硬编码\" 输出。然而，在这一点上，我们应该尝试整合我们所学的关于变量的知识。变量的操作方式与原始值非常相似，因为它们只是引用计算机先前存储的值，因此程序员可以只使用变量名而不是值。为了演示这一点，让我们回顾一下之前的\
    \ \"Hello World\" 程序：\n\n```\nprint (\"Hello World\") ;\n\ninput (\"\\n\\nPlease\
    \ press the return key to close this window.\") ;\n```\n\n现在，我们不再硬编码 \"Hello World\"\
    \ 字符串，而是可以简单地将其声明到一个变量中，并让程序输出该变量。这最终应该看起来像：\n\n```\nString string = \"Hello World\"\
    \ ;\n\nprint(string) ;\n\ninput (\"\\n\\nPlease press the return key to close\
    \ this window.\") ;\n```\n\n这应该产生与之前程序相同的结果，看起来类似于：\n\nHello World\n\nPlease press\
    \ the return key to close this window.\n\n## 第 3 章. Java 基础\n\n## Java 开发工具包\n\
    \nJDK 提供了构建、测试和监控健壮的 Java 应用程序所需的工具。它允许开发人员在 Java 编程操作期间访问软件组件和编译应用程序。例如，开发人员需要\
    \ JDK 支持的环境才能编写小程序或实现方法。\n\n由于 JDK 在某种程度上执行软件开发工具包 (SDK) 的操作，因此人们很容易混淆这两项的范围和操作。虽然\
    \ JDK 专门针对 Java 编程语言，但 SDK 具有更广泛的适用性。但 JDK 在程序开发环境中仍然作为 SDK 的一个组件运行。这意味着开发人员仍然需要\
    \ SDK 来提供某些具有更广泛操作特性且在 JDK 领域内不可用的工具。开发人员文档和调试实用程序，以及应用程序服务器，是 SDK 提供给 Java 编程环境的一些关键工具。\n\
    \nJDK 部署的范围取决于手头任务的性质、支持的版本以及正在使用的 Java 版本。例如，Java 平台标准版 (Java SE) 开发工具包设计用于与\
    \ Java 标准版一起使用。Java 平台企业版 (Java EE) 和 Java 平台微型版 (Java ME) 是 JDK 的其他主要子集。这些 Java\
    \ 版本的详细信息将在下面的子主题中详细描述。自 2007 年上传到 OpenJDK 门户以来，JDK 一直是一个免费平台。其开源状态促进了协作，并允许软件开发人员社区克隆、修改或贡献想法以进行改进和升级。"
