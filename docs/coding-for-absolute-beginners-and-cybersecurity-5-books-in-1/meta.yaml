  md: '# Naming a variable


    Creating variables is an easy task, especially given how Java programmers tend
    to create and name them after the data type or the purpose of what the variable
    will store. However, there are a few rules when it comes to naming these variables,
    else Java will not recognize it, and an error message will result. The main restrictions
    around variable names are that it should not begin with a special character, such
    as an underscore or a number. However, variable names can consist of characters
    such as letters and numbers, and even an underscore, provided that the underscore
    is not placed at the start. No other characters may be used, such as the # or
    even $, as these special characters have different uses in Java, and thus will
    not be recognized in a variable name.


    While those are the major rules, here are some tips when it comes to naming variables.
    The variable name should be descriptive, as in longer codes it may be difficult
    to recall just what "x" is for. Having a variable name such as "count" or "output"
    is much easier to recall as compared to having a generic "x" or "y" and will help
    in avoiding confusion. In addition to being descriptive, variables will also be
    easier to use if their names are kept fairly short. While having a variable name
    such as banking information account records is very descriptive, typing it repeatedly
    as needed in the program will get exhausting, and having longer variable names
    increase the chances of typographical errors, which will lead to bugs in the code,
    resulting in a run - time error or the code not working as intended, or working,
    but introducing bugs along the way. Note as well that it has always been a practice
    for Java variables to be written in all lower—case letters, and while there is
    no restriction on capitalization, keeping things in lowercase simplifies things,
    as a missed capitalization may result in the variable not being recognized, as
    Java reads an upper—case letter as an entirely different character versus a lower—case
    letter.'
  merge: -1
