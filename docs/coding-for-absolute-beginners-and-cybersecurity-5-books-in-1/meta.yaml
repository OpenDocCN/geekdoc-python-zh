    ## Chapter 13. Logical Grouping of Code


    Java is a language that has curly braces, semicolons, and a variety of keywords.
    It is broken down into logical groupings of code.

    A "logical grouping of code" is a phrase used to describe an independent section
    of computer instructions in Java (which are usually surrounded by curly braces).
    The following statements would be valid examples:


    ```

    int x = 1;

    int y = 0;

    int z = y * x;

    ```


    The statements here are being used to show how there can be multiple lines in
    a single logical grouping. These particular examples do not do anything more than
    just set the values for variables (x, y, and z).

    Ideally, these lines of code should be placed together because they are related
    to the same problem. Consider if we changed x to two and then y to 9:


    ```

    int x = 2;

    int y = 9;

    int z = y * x;

    ```


    There is the logic being applied here. The variable z will be equal to 18, instead
    of randomly assigning values for x and y (such as a=3 and b=9); there is a connection
    between them. This makes maintaining code much easier in the future when someone
    else must come along and try to make sense out of what you did.


    The only thing holding you back when writing code is the fact that you can''t
    read it yourself. Don''t be discouraged just because it seems too complex or too
    big to understand at first. Just keep going at it, learn by doing, and you''ll
    get the hang of it!


    It is important to know that good programmers do not write a lot of code during
    a project. They are much more focused on the overall design of their program in
    order to get a general idea about what they are working on before they write the
    lines of code for it.

    A good programmer is willing to take a second and consider the simplicity of what
    they are trying to do, the possibilities, and if there are much better ways of
    going about doing things. This results in better developed code and a lot more
    flexibility when it comes to making changes.

    Code should be developed in smaller segments that focus on lots of different areas.
    Smaller segments allow for more flexible coding, which can be used as a base for
    future projects and can make updates easier to do later down the line. These segments
    should not become cumbersome, as that would defeat the purpose of creating them
    in the first place.

    When you are beginning a new program, you must understand the fundamental basics
    in order to build off of them later on. If you keep trying to solve everything
    simultaneously, you''ll end up in an endless loop and not getting anywhere. Start
    by setting some initial parameters for the program that can be used as a starting
    point (or a base) for your code.

    For example, let''s say we want to write a program that will control our car''s
    radio based on its speed. We should be able to define a variable that we can use
    to control the speed of our radio and have it output that data back into the program
    on the computer screen.


    "Let''s see how things go" is a phrase heard very often in programming.

    Rather than getting frustrated with something, take your time and see if you can
    figure out what you need to do or solve the problem when you are presented with
    it. Code is meant to be worked with, and you should not feel like you need to
    do everything perfectly from the beginning.

    It is better to take your time trying to solve a problem than just rushing through
    it. However, there are cases where we need the computer to wait in order for us
    to accomplish something:


    ```

    System.out.println("I''m Waiting"); // Do something.

    ```


    This will cause the program that is currently running on our computer screen to
    pause its normal execution and wait for us to tell it what we want it to do next.

    Here''s an example of how this could be used: while (x != 0) { //do something
    x = x / 2; } // System.out.println("I''m done");


    During the above program, x equals 2, so we will go through and divide it by 2
    each time through the loop (the while). This will then give us a value of 1 for
    y, which is then put into a variable called z. You can then use z to control the
    frequency on your radio''s display.


