    like Python or Java. These languages are easier for beginners because they do
    not require prior knowledge of any other programming language to get started with
    them. Once you''ve mastered these two languages, you''ll probably want to try
    your hand at C++ or PHP (or something else entirely).


    If you have already learned one or more programming languages, but are looking
    for something new to try, then you''ll probably want to try a new language that
    takes different approaches from the ones that you already know. This means that
    C++ and Java might be a good place to start. These languages are similar enough
    to others that you can make the transition from them relatively easy (once you
    know another language).


    If you''re already an experienced coder, then there''s no need to replace your
    current development environment with something new. However, it can still help
    if you switch over JS just long enough to get familiar with a different approach.
    Once this happens, it will be easier for you to learn other languages in the future.


    Knowledge of the Internet: If you''re new to programming, you''ll want to make
    sure that you understand how the internet works before you begin your new adventure.
    Although it might sound overwhelming at first, the internet isn''t that hard to
    understand. It might not be necessary for you to learn HTML and CSS before you
    start learning web development (they''re pretty simple languages, after all),
    but it will help if you do.


    ## Learn About the Internet:


    Don''t Wait To Learn To Code: The best time to learn is now. It doesn''t matter
    if you''re 100 years old or ten years old, or even somewhere in-between. There
    are no limits on who can learn how things work. If you know how to read, you can
    learn how things work. If you are ready to start learning programming languages,
    or if you have already started, then it''s time for you to get yourself one of
    the above books and begin your journey into the world of coding.


    This doesn''t mean that everything will be easy going from here on in.


    There are always new challenges ahead, but if learning to code interests you,
    then the journey will be worth it. The best way for things to become more accessible
    is for more people to learn how things work. The more people that know how to
    code, the easier it will be for you to learn. So, what are you waiting for?


    ## Chapter 7. How Is a Program Built?


    There are several different approaches to building a program, but in this beginner''s
    guide, we will focus on one strategy: top-down design. Top-down design is a method
    of programming where the highest-level modules are designed first and then the
    lower-level modules are designed based on these high-level modules. This approach
    works great for beginners as they can easily break their program down into logical
    pieces.


    ### Step One: Planning Out Your Program


    Before you get started, it''s crucial to have an idea of what your program should
    do. You might want to think about things like the input and output for your programs
    and what data it will process. Once you believe you have a good idea, it''s time
    to get started!


    ### Step Two: Creating a Data Structure for Your Program


    The first thing we''ll do is create our data structure. In this case, we''re going
    to use an array. We will store three numbers within this array: a list of integers
    and two floating-point numbers. These will represent some user input that we''ll
    process within our program later on.


    ### Step Three: Building the Main Program Loop


    Now that we have a place to store the data and know what our program needs to
    do, it''s time to build the main program loop (also known as the main function).


    ### Step Four: Building the Processors


    The processors are a series of functions that will run in sequence. These processors
    receive the data and do something with it, like adding numbers, taking away numbers,
    or converting bytes to integers.


    ### Step Five: Building the Final Program Loop


    Now that we''ve seen what the processors should do, we can build our final program
    loop (also known as the main function). When you''re finished writing this program,
    you will have a C++ program looking like this:


    ```

    #include <stdio.h>

    int main()

    ```


    ### Step Six: Creating a Data Structure


    Now that we have the main program loop, we need to create our data structure.
    Since we kept track of our data from the previous step, this is easy to do:


    ```

    int main()

    ```


    ### Step Seven: Building the Processors


    Now that we have created our data structure, it''s time to start building the
    processors. The first processor should receive some input from the user and convert
    it to an integer to be added to the list of integers. To get started, you will
    want to write your first processor function. This will be called convert_to_integer().


    Since you''ll be receiving input from the user, you will want to have an if statement
    to verify that the information is a number.


    ### Step Eight: Building the Final Program Loop


    Now that we have our convert_to_integer() processor function created, we can add
    it to the main program loop. Now that you''ve added convert_to_integer() to your
    main program loop, it''s time to build your next processor function. This will
    be called add_numbers(). Inside your new add_numbers() processor function, you''ll
    need another if statement (or else statement) since you should only add numbers
    and not convert an integer to a floating-point number.


    ### Step Nine: Building the Final Program Loop


    Now that you have your add_numbers() processor function created, you can add it
    to your main program loop. The final processor will be called display_numbers().
    This program will output the number list and the sum so let''s get started! You
    will want to check that the user has entered at least two numbers because they
    won''t be able to add anything together if they didn''t.


    ### Step Ten: Creating a Data Structure


    Now that we have our final program loop complete, let''s create a data structure.
    This will store our list of numbers and our sum so we can output them later on.


    Save your program and compile it. If there are no errors, you should be ready
    to run your finished program! The first thing the user will want to do is enter
    some data to make sure they can. When the user runs our program, they will see
    our prompt asking for some data. Once they enter a number, we will write it to
    an array and then ask the user for another number. This process will repeat until
    the user enters zero numbers or a negative number.


    ### Step Eleven: Building the Final Program Loop


    Now that we have confirmed that the user entered numbers, we''re ready to build
    our final program loop (also known as main function).


    After the user enters data into our processor, we will assign that data to our
    list of integers and then we will add all those numbers together. Finally, let''s
    output the array of numbers and the sum to make sure everything worked as expected.


    ## Appendix C: Easy C++ Programming Tips


    Coding is fun but it can be frustrating too. While you might be tempted to throw
    your hands up and go back to the drawing board, there are a few things you can
    do to help with those programming headaches. We saved the best for last, so let''s
    get to reviewing!


    ### Coding Tips Are Your Best Friend


    It doesn''t matter if your program works. If it''s impossible that anyone would
    ever use it, then it''s not a great program. Think of all the times people have
    been let down by programs they believed would help them but ended up being useless.'
