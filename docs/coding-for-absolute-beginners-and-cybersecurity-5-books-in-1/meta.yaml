    \n### Containers\n\nContainers are the primary contribution of the STL, and they\
    \ are for holding and accessing a sequence of objects. The STL provides different\
    \ types of containers, such as vector, list, map, and hash tables. However, based\
    \ on the characteristics of data arrangement, the STL containers are categorized\
    \ into three major sections:\n\n1. Sequence containers such as vector, fixed-size\
    \ array, list, forward_list, and deque;\n2. Associative containers:\n   a) Ordered\
    \ (sorted) associative containers such as set, multiset, map, and multimap;\n\
    \   b) Unordered (unsorted) associative containers such as unordered_set, unordered_multiset,\
    \ unordered_map and unordered_multimap; and\n3. Container adapters such as stack,\
    \ queue, and priority_queue.\n\nIn addition to these fully qualified containers,\
    \ C++ provides three almost qualified containers, viz., string, built-in-array\
    \ and valarray.\n\nEach of the containers are sophisticated template classes with\
    \ the default constructor, constructor from arguments, copy constructor, assignment\
    \ operator, and definite destructor. Apart from that, most of the containers define\
    \ its own iterator, and every container has its own operation member functions.\n\
    \n### Container iterators\n\nFrom those sections, we know that each container\
    \ provides its own iterator and using that iterator operations are performed on\
    \ the elements of the container.\n\nAmong the five categories of iterators, each\
    \ container defines any one of the three categories, viz.,\n\nForward iterators:\n\
    \n- Can read;\n- Can write;\n- Can be repeated read/write at a single location;\n\
    - Can move forward (++), but cannot move backwards, thus the name forward iterator;\
    \ and\n- Is used in: unordered associative containers and forward list, which\
