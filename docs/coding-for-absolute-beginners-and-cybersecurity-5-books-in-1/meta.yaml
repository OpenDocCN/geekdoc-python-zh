- md: '## The Elif Statements


    The other two options of conditional statements are going to be important for
    a lot of the codes that you would like to work with. The if statement is a good
    one to learn as a beginner getting into these statements, and they will help you
    to mostly get a good idea of how the conditional statements are supposed to work.
    These if statements are going to have a basis on the idea of the answer being
    either true or false.


    In this case, if the answer received from the user is seen as true based on the
    conditions that you add to the code, then the program will see this and continue
    on its path. But if the condition is seen to be false, then the program is not
    going to have anything set up, and it is going to end. This is a simple idea to
    work with and is a good way to learn more about the conditional statements, but
    for many of the codes that you want to write out in Python, it is not going to
    give you the results that you want.


    Then we took a look at the if-else statements. These took this idea a bit further,
    and it understood that the ideas that come with the original if statements are
    going to be too simple. These if-else statements can help us handle any answer
    that the user will give to the system, and ensure that the program doesn''t just
    stop. We even took a look at an example code that shows us how these kinds of
    statements work.


    From here, we need to spend some time working on the elif statements. This is
    going to handle things a bit different than what the other two did, but it is
    still going to be useful and can add an element of fun and something different
    to your code. The elif statement is going to give the user a chance to pick from
    a few options that you present to them. And then, the answer that the user chooses
    is going to provide them with a predetermined statement that you added into the
    code.


    There are different places where you can see these conditional statements. The
    elif statement is a unique code for the Python language, and it is often going
    to be used for many games, or for a different program that you would like to have
    with the menu style of choices for the user. These statements are going to be
    used most often if the computer programmer would like to provide their user with
    some options rather than just one or two.


    ## Chapter 3. Data Structures


    Python is based on three reference structures: tuples, lists, and dictionaries.
    These structures are actually objects that may contain other objects. They have
    quite different utilities and allow you to store information of all types.


    These structures have a number of common features:


    - To extract one or more objects from a structure, we always use the []

    - For numerically indexed structures (tuples and lists), the structures are indexed
    to 0 (the first position is position 0)


    ### The Tuples


    This is a structure that groups multiple objects in indexed order. Its form is
    not modifiable (immutable) once created and is defined using parentheses. It has
    only one dimension. Any type of object can be stored in a tuple. For example,
    if you want to create a tuple with different objects, we use:


    ```

    tup1 = (1, True, 7.5, 9)

    ```


    You can also create a tuple by using the tuple() function. Access to the values
    of a tuple is done by the classical indexing of structures. Thus, if we want to
    access the third element of our tuple, we use:


    ```

    In []: tup1[2]


    Out []: 7.5

    ```


    Tuples can be interesting because they require little memory. Else, on the other
    hand, they are used as outputs of functions returning several values. Tuples as
    structures are objects. They have methods that are clean. These are few for a
    tuple:


    ```

    In []: tup1.count(9)


    Out []: 1

    ```


    We often prefer lists that are more flexible.


    ### Lists


    The list is the reference structure in Python. It is modifiable and can contain
    any object.


    #### Creating a list


    We create a list using square brackets:


    ```

    list1 = [3, 5, 6, True]

    ```


    You can also use the list() function. The structure of a list is editable. It
    has many methods:


    - .append(): add value at the end of the list

    - .insert(i, val): insert value to the index i

    - .pop(i): retrieves the value of the index i

    - .reverse(): reverse the list

    - .extend(): extends the list with a list of values


    Note—All of these methods modify the list, the equivalent in terms of classic
    code would be the following:


    ```

    liste1.extend(list2)


    equivalent to


    list1 = list1 + list2

    ```


    Lists have other methods including:


    - .index(val): returns the index of the value val

    - .count(val): returns the number of occurrences of val

    - .remove(val): remove the first occurrence of the value val from the list


    #### Extract an Item from a List


    As we have seen above, it is possible to extract an element using the brackets:


    ```

    list1[0]

    ```


    We are often interested in the extraction of several elements. It is done by using
    the two points:


    ```

    list1[0:2] or list1[:2]

    ```


    In this example, we see that this system extracts two elements: the indexed element
    in 0 and the one indexed in position 1. So we have as a rule that i: j goes from
    the element i included to element j not included. Here are some other examples:


    ```

    # Extract the last element

    list1[-1]

    # Extract the last 3 elements

    list1[-3:-1] or list1[-3:]

    ```


    #### A concrete example


    Suppose we wanted to create a list of countries. These countries are ordered in
    the list according to their population. We will try to extract the first three
    and the last three.


    ```

    In []: country_list = ["China", "India", "United States", "France", "Spain", "Switzerland"]

    In []: print(country_list[:3])

    [''China'', ''India'', ''United States'']

    In []: print(country_list[-3:])

    [''France'', ''Spain'', ''Switzerland'']

    ```


    ```

    In []: country_list.reverse()

    print(country_list)

    [''Switzerland'', ''Spain'', ''France'', ''United States'', ''India'', ''China'']

    ```


    #### The Comprehension Lists


    These are lists built iteratively. They are often very useful because they are
    more efficient than using loops to build lists. Here is a simple example:


    ```

    In []: list_init = [4, 6, 7, 8]

    list_comp = [val ** 2 for val in list_init if val % 2 == 0]

    ```


    The list comp_list allows you to store the even elements of list_init set to the
    square.


    We will have:


    ```

    In []: print(list_comp)

    [16, 36, 64]

    ```


    This notion of comprehension list is very effective. It avoids useless code (loops
    on a list) and performs better than creating a list iteratively. It also exists
    in dictionaries but not on tuples that are unchangeable. We will be able to use
    comprehension lists in the framework of the manipulation of data tables.


    #### Strings—Character Lists


    Strings in Python are encoded by default (since Python 3) in Unicode. You can
    declare a string of characters in three ways:


    ```

    string1 = "Python for the data scientist"

    string2 = ''Python for the data scientist''

    string3 = """ "Python for the data scientist" """

    ```


    The last one allows having strings on several lines. We will most often use the
    first. A string is actually a list of characters, and we will be able to work
    on the elements of a string as on those of a list:


    ```

    In []: print(string1[:6])

    print(string1[-14:])

    print(string1[3:20])

    ```


    #### Python for the Data Scientist


    Data strings can be easily transformed into lists:


    ```

    In []: # we separate the elements using space

    list1 = string1.split()

    print(list1)

    [''Python'', ''for'', ''the'', ''Data'', ''Scientist'']

    In []: # we join the elements with space

    string1bis = "".join(list1)

    print(string1bis)

    ```


    ### Dictionaries


    The dictionaries constitute a third central structure to develop in Python. They
    allow key-value storage. So far, we have used items based on numerical indexing.
    So in a list, you access an element using its position list1[0]. In a dictionary,
    we will access an element using a key defined when creating the dictionary. We
    define a dictionary with braces:


    ```

    dict1 = {"cle1": value1, "cle2": value2, "cle3": value3}

    ```


    This structure does not require any homogeneity of type in the values. From this,
    we can have a list like value1, a boolean like value2, and an integer as value3.


    To access an element of a dictionary, we use:


    ```

    In []: dict1["cle2"]

    Out []: value2

    ```


    To display all the keys of a dictionary, we use:


    ```

    In []: dict1.keys()

    Out []: ("cle1", "cle2", "cle3")

    ```


    To display all the values of a dictionary, we use:


    ```

    In []: dict1.items()

    Out []: (value1, value2, value3)

    ```


    One can easily modify or add a key to a dictionary:


    ```

    In []: dict1["key4"] = value4

    ```


    You can also delete a key (and the associated value) in a dictionary:


    ```

    In []: del dict1["cle4"]

    ```'
  mdcn: '## Elif 语句


    条件语句的另外两个选项对于你想要编写的许多代码都很重要。if 语句是初学者学习这些语句的好起点，它能帮助你大致理解条件语句的工作原理。这些 if 语句基于答案为真或假的概念。


    在这种情况下，如果根据你在代码中添加的条件，从用户那里收到的答案被视为真，那么程序会识别这一点并继续执行。但如果条件被视为假，那么程序将没有任何设置，它将结束。这是一个简单的概念，是学习更多关于条件语句的好方法，但对于你想用
    Python 编写的许多代码来说，它不会给你想要的结果。


    然后我们看了 if-else 语句。这些语句将这个概念更进一步，它理解原始 if 语句附带的想法可能过于简单。这些 if-else 语句可以帮助我们处理用户给系统的任何答案，并确保程序不会只是停止。我们甚至看了一个示例代码，展示了这类语句是如何工作的。


    从这里开始，我们需要花一些时间研究 elif 语句。这将与前两种处理方式有所不同，但它仍然有用，并且可以为你的代码增添一些乐趣和不同的元素。elif 语句将给用户一个从你提供给他们的几个选项中选择的机会。然后，用户选择的答案将提供他们一个你添加到代码中的预定义语句。


    你可以在不同的地方看到这些条件语句。elif 语句是 Python 语言的独特代码，它通常用于许多游戏，或者用于你想要为用户提供菜单式选择的不同程序。如果计算机程序员想为用户提供一些选项而不仅仅是一两个，那么这些语句将最常被使用。


    ## 第 3 章 数据结构


    Python 基于三种引用结构：元组、列表和字典。这些结构实际上是可能包含其他对象的对象。它们具有相当不同的用途，并允许你存储各种类型的信息。


    这些结构有许多共同特点：


    - 要从结构中提取一个或多个对象，我们总是使用 `[]`

    - 对于数字索引结构（元组和列表），结构索引从 0 开始（第一个位置是位置 0）


    ### 元组


    这是一种将多个对象按索引顺序分组的结构。其形式一旦创建就不可修改（不可变），并使用括号定义。它只有一维。任何类型的对象都可以存储在元组中。例如，如果你想创建一个包含不同对象的元组，我们使用：


    ```

    tup1 = (1, True, 7.5, 9)

    ```


    你也可以使用 `tuple()` 函数创建元组。访问元组的值是通过结构的经典索引完成的。因此，如果我们想访问元组的第三个元素，我们使用：


    ```

    In []: tup1[2]


    Out []: 7.5

    ```


    元组可能很有趣，因为它们占用的内存很少。另一方面，它们被用作返回多个值的函数的输出。元组作为结构是对象。它们有干净的方法。对于元组来说，这些方法很少：


    ```

    In []: tup1.count(9)


    Out []: 1

    ```


    我们通常更喜欢更灵活的列表。


    ### 列表


    列表是 Python 中的参考结构。它是可修改的，可以包含任何对象。


    #### 创建列表


    我们使用方括号创建列表：


    ```

    list1 = [3, 5, 6, True]

    ```


    你也可以使用 `list()` 函数。列表的结构是可编辑的。它有许多方法：


    - `.append()`：在列表末尾添加值

    - `.insert(i, val)`：将值插入到索引 `i`

    - `.pop(i)`：检索索引 `i` 的值

    - `.reverse()`：反转列表

    - `.extend()`：用值列表扩展列表


    注意——所有这些方法都会修改列表，经典代码中的等效操作如下：


    ```

    liste1.extend(list2)


    等同于


    list1 = list1 + list2

    ```


    列表还有其他方法，包括：


    - `.index(val)`：返回值 `val` 的索引

    - `.count(val)`：返回 `val` 出现的次数

    - `.remove(val)`：从列表中删除值 `val` 的第一次出现


    #### 从列表中提取项目


    正如我们上面看到的，可以使用方括号提取元素：


    ```

    list1[0]

    ```


    我们通常对提取多个元素感兴趣。这是通过使用冒号完成的：


    ```

    list1[0:2] 或 list1[:2]

    ```


    在这个例子中，我们看到这个系统提取了两个元素：索引为 0 的元素和索引为位置 1 的元素。所以我们有一个规则，`i:j` 从包含元素 `i` 到不包含元素
    `j`。这里有一些其他例子：


    ```

    # 提取最后一个元素

    list1[-1]

    # 提取最后 3 个元素

    list1[-3:-1] 或 list1[-3:]

    ```


    #### 一个具体的例子


    假设我们想创建一个国家列表。这些国家在列表中按人口排序。我们将尝试提取前三个和后三个。


    ```

    In []: country_list = ["China", "India", "United States", "France", "Spain", "Switzerland"]

    In []: print(country_list[:3])

    [''China'', ''India'', ''United States'']

    In []: print(country_list[-3:])

    [''France'', ''Spain'', ''Switzerland'']

    ```


    ```

    In []: country_list.reverse()

    print(country_list)

    [''Switzerland'', ''Spain'', ''France'', ''United States'', ''India'', ''China'']

    ```


    #### 列表推导式


    这些是迭代构建的列表。它们通常非常有用，因为它们比使用循环构建列表更高效。这里有一个简单的例子：


    ```

    In []: list_init = [4, 6, 7, 8]

    list_comp = [val ** 2 for val in list_init if val % 2 == 0]

    ```


    列表 `comp_list` 允许你存储 `list_init` 中偶数元素的平方。


    我们将得到：


    ```

    In []: print(list_comp)

    [16, 36, 64]

    ```


    列表推导式的概念非常有效。它避免了无用的代码（对列表的循环），并且比迭代创建列表执行得更好。它也存在于字典中，但不存在于不可变的元组中。我们将在数据表操作的框架中使用列表推导式。


    #### 字符串——字符列表


    Python 中的字符串默认（自 Python 3 起）以 Unicode 编码。你可以用三种方式声明一个字符串：


    ```

    string1 = "Python for the data scientist"

    string2 = ''Python for the data scientist''

    string3 = """ "Python for the data scientist" """

    ```


    最后一个允许多行字符串。我们最常使用第一个。字符串实际上是一个字符列表，我们可以像处理列表元素一样处理字符串的元素：


    ```

    In []: print(string1[:6])

    print(string1[-14:])

    print(string1[3:20])

    ```


    #### 数据科学家的 Python


    数据字符串可以轻松转换为列表：


    ```

    In []: # 我们使用空格分隔元素

    list1 = string1.split()

    print(list1)

    [''Python'', ''for'', ''the'', ''Data'', ''Scientist'']

    In []: # 我们用空格连接元素

    string1bis = "".join(list1)

    print(string1bis)

    ```


    ### 字典


    字典构成了 Python 中开发的第三个核心结构。它们允许键值存储。到目前为止，我们使用的是基于数字索引的项目。所以在列表中，你使用其位置 `list1[0]`
    访问元素。在字典中，我们将使用创建字典时定义的键来访问元素。我们用花括号定义字典：


    ```

    dict1 = {"cle1": value1, "cle2": value2, "cle3": value3}

    ```


    这种结构不需要值具有任何类型同质性。因此，我们可以有一个像 `value1` 这样的列表，一个像 `value2` 这样的布尔值，以及一个作为 `value3`
    的整数。


    要访问字典的元素，我们使用：


    ```

    In []: dict1["cle2"]

    Out []: value2

    ```


    要显示字典的所有键，我们使用：


    ```

    In []: dict1.keys()

    Out []: ("cle1", "cle2", "cle3")

    ```


    要显示字典的所有值，我们使用：


    ```

    In []: dict1.items()

    Out []: (value1, value2, value3)

    ```


    可以轻松修改或向字典添加键：


    ```

    In []: dict1["key4"] = value4

    ```


    你也可以删除字典中的键（及关联的值）：


    ```

    In []: del dict1["cle4"]

    ```'
