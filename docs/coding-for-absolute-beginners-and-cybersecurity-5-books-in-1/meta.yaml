  md: '# Abstract data type (ADT)


    An abstract data type (ADT) is a logical description of the data and the operations
    that are allowed on it. ADT is defined as a user point of view of a data. ADT
    concerns about the possible values of the data and the interface exposed by it.
    ADT does not concern about the actual implementation of the data structure.


    For example, a user wants to store some integers and find their mean value. ADT
    for this data structure will support two functions, one for adding integers and
    other to get mean value. ADT for this data structure does not talk about how exactly
    it will be implemented.


