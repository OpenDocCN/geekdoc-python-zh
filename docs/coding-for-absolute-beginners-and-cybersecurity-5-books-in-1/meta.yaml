- md: '## Let''s Get Started: <!DOCTYPE HTML>


    The first thing that you need to know is how to create a primary HTML5 document.
    Don''t panic! To start out, it''s easier than you might imagine. HTML5 is a lot
    simpler to use than HTML4, which takes advantage of more complicated tags and
    syntax. HTML5 uses semantic tags, which are self-explanatory.


    To create a new HTML document, the first line of code that you need to write is:


    ```

    <!DOCTYPE html>

    ```


    HTML5 actually comes with several different doctypes (instructions for how the
    documents are being created). The most universally accepted doctype for creating
    web pages is the one above. This code has just two letters (html) in all lowercase
    without any suffixes or prefixes. It just stands as "HTML" to the rest of the
    world.


    When you write it like this, it looks almost like English. This is because HTML5
    preserves what other languages call case: upper case letters, capital letter in
    between two lower case letters, and so on. However, there are some exceptions:


    - All cross-references (links) in HTML have < instead of &#39;.

    - Proper nouns are capitalized (i.e. Nyan Cat).

    - Punctuation marks have their entire character set selected (a handful like the
    full stop or the question mark).

    - Emphasis is represented with *asterisks* instead of italics.

    - Hyphens are used for breaking spaces (e.g.) like 11.*1234*.


    Even if you don''t follow this exact syntax, you can still use many of the syntax
    rules it dictates to create websites. The most important one is that every nook
    and cranny of a webpage should have an appropriate tag identifying what it is.
    Just as we would speak to each other in English, we turn to language for communication
    on the internet.


    ## Let''s get on with HTML5! The <HEAD> Section


    HTML5 makes use of an <head> section, which processes information before the actual
    document begins to be displayed on a screen. Think of the <head> section like
    a preface where you list all of the important information about your text.


    ### HTML5: The Basics


    Let''s get started with our first HTML document! This is how the <HEAD> section
    would look like:


    ```

    <!DOCTYPE html>

    <html lang=en>

    <head>

    The title of your website should be listed here in both English and in your chosen
    programming language.

    </head>

    </html>

    ```


    The general convention for writing <title> tags is that it should be capitalized,
    followed by a space, then its name. This should then go at the top of your webpage
    (in between the <html></head> tags). If you''re attempting to create a mobile
    website, keep in mind that only the first <title> tag should be used. This will
    enable your page to have its own unique ID called a Web Title. Since HTML5 has
    a new way of doing this with a meta tag called "data-web-title=", it''s important
    that you keep track of this value for future references (you''ll be doing this
    for all the other tags that you''ll be using).


    The only other important thing to mention is how the title of your webpage works.
    In HTML4, the concept of "page" was very different from our modern knowledge of
    it. It referred to what we call today, "web pages". In that case, the title was
    more of a "title tag", and it was not dependent on the document you were reading.


    In HTML5, the Web Title and Page Title are different!


    To start with, a Web Title is used to create an identification value that is unique
    for each page of your website. This is necessary to prevent multiple pages from
    using the same name (like what might happen if you made a mistake while writing
    your webpage). For this reason, every web page has its own unique ID (called a
    web title) which will be listed in the <title> tag.


    The <title> tag will be placed above the opening <html></head> and before any
    other content.


    ## Chapter 21. Difference Between Java, Python and C++


    Python is an object-oriented programming language often used for web development
    or scripting purposes. It is different from other high-level languages like Java
    and C++ because it mixes procedural and dynamic typing with syntax that resembles
    English words. On the other hand, Java is a statically typed object-oriented language
    oriented towards distributed computing systems that web developers can use for
    server-side applications or system software.


    In contrast to Python''s English-like syntax, C++ has its own set of rules for
    declaring variables using keywords such as "int," "float" and "char". So how do
    these three programming languages differ from each other? A simple answer would
    be to state that Python focuses on the code while Java and C++ concentrate on
    the compiler. Let us briefly analyze this statement in regards to each programming
    language.


    In Python, the code is considered primary and is given more importance than the
    compiler. For instance, there are no strict rules for naming conventions in Python,
    unlike Java where all classes have to be named after a class name and its respective
    package name, e.g. java.util.ArrayList. All that matters in Python is that a class
    or function is present.


    Python recognizes the existence of objects and executes them rather than the syntax.
    Also, there are no strict rules for indentation in Python, which means that indentations
    do not affect code execution. A programmer can write code with multiple nested
    loops and levels of functions without worrying about the number of spaces used
    in-between.


    In Java, on the other hand, compiler rules are considered more important than
    the code itself which leads to a limited number of things a programmer can do
    compared to programmers working with Python or C++. In particular, object-oriented
    programming is emphasized heavily in Java as opposed to procedural programming
    which is illustrated through C++''s templates and macros features. The way a programmer
    writes the code is given more importance than the way the code can be executed,
    leading to confusing Java developers who are used to coding in Python.


    In conclusion, Python focuses on the code, Java focuses on compiler rules and
    C++ focuses on both. In terms of language design, an experienced programmer is
    better off learning C++ because he/she will be able to understand how a compiler
    works at a low level but will have problems with learning object-oriented programming
    in Java. As for an inexperienced programmer looking for a more accessible programming
    language to learn, Python would be better than Java and C++ because of its short
    syntax lengths.


