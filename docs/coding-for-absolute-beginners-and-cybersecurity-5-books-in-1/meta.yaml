    Many things go into making a computer program which we like to call "coding."
    Coding isn''t just what you''re doing right now. It''s the act of taking a program
    from your head and turning it into something the computer can understand.


    All of this coding will be done using a programming language such as Python, C#,
    C++ or Basic - there are thousands of different languages and they all have their
    features.


    Our program will be coded in Microsoft''s BASIC programming language, which is
    relatively simple to learn, and is an easy way to begin coding if you have no
    experience of what it involves.


    If you already know how to code another language, this tutorial probably won''t
    help you teach you anything new.


