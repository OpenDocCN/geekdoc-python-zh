  md: "# Destroying\n\nThis should also be a recursive function. Before deleting the\
    \ current node, the algorithm destroys both of the subtrees that are at the current\
    \ node.\n\n```\nvoid destroy_tree (node *p_tree)\n{\n    if ( p_tree != NULL )\n\
    \    {\n        destroy_tree( p_tree->p_left );\n        destroy_tree( p_tree->p_right\
    \ );\n        delete p_tree;\n    }\n}\n```\n\nAs a way of better understanding\
    \ this, let’s say that the value of the node was printed before the node was deleted:\n\
    \n```\nvoid destroy_tree (node *p_tree)\n{\n    if ( p_tree != NULL )\n    {\n\
    \        destroy_tree( p_tree->p_left );\n        destroy_tree( p_tree->p_right\
