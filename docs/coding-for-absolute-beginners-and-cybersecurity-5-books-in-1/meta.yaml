    {\nString example1 =\nexample(\"C:\\\\Users\\\\userName\\\\Desktop\\\\example.java\"\
    );\nSystem.out.println(example1);\n}\n}\n```\n\n## 写入文本文件\n\n你可以使用其中一种写入方法将字节或行写入文件。写入方法包括：\n\
    \n-   Write(Path, byte[], OpenOption...)\n-   Write(Path, Iterable< extends CharSequence>,\
    \ Charset, OpenOption...)\n\n## 重命名和删除文件\n\n### 重命名\n\n在 Java 中，`File` 类中有一个名为\
    \ `renameTo(fileName)` 的方法，我们可以用它来重命名文件。\n\n### 删除文件\n\n使用 Java 程序保存的文件将被永久删除，而不会移动到回收站。使用\
    \ `java.io.File.delete` 会从文件系统中删除此抽象路径名。使用 `java.nio.file.Files.deleteIfExists`\
    \ 将删除文件夹（如果存在）。如果文件夹未被占用，它也会删除路径中列出的文件夹。\n\n## Java 高级主题\n\n### 泛型\n\n在任何非平凡的软件项目中，缺陷（bug）都是生活中不可避免的事实。仔细的规划、编程和测试可能有助于减少它们的普遍性，但不知何故，它们总会找到进入你系统某个地方的方法。随着新功能的引入以及代码库规模和复杂性的增加，这一点变得尤为明显。\n\
    \n幸运的是，检测某些缺陷比检测其他缺陷更容易。例如，编译时缺陷可以很快被识别出来；你可以使用编译器的错误代码来确定问题所在并立即解决它。然而，运行时缺陷可能要困难得多；它们并不总是立即发生，即使发生，也可能发生在程序中远离问题真正原因的位置。泛型通过使在编译时识别更多缺陷成为可能，从而帮助稳定你的软件。\n\
    \n简而言之，泛型允许在定义类、接口和方法时为类型（类和对象）设置参数。就像在方法声明中使用的更熟悉的形参一样，类型参数为你提供了重用相同代码的不同输出。区别在于，值是形参的输入，而类型是类型参数的答案。使用泛型的代码比非泛型代码具有许多优势。通过使用泛型，程序员可以引入泛型算法，这些算法可以操作不同类型的集合，可以定制，并且安全且更易于阅读。\n\
    \n### 泛型类型\n\n泛型类型是类型参数化的泛型类或接口。可以通过修改一个简单的盒子类来展示这个概念。考虑一个适用于任何类型对象的非泛型盒子类。它只需要提供两个方法：`set()`（将项目添加到盒子中）和\
    \ `get()`（检索它）。由于其方法接受或返回一个对象，你可以自由地传入任何你想要的东西，只要它不是基本类型之一。在编译时无法检查类的使用方式。软件的一部分可能将一个整数放入盒子中并期望从中获取整数，而软件的另一部分可能错误地传入一个字符串，导致运行时错误。\n\
    \n类型参数部分，由尖括号（`<>`）表示，显示类的标题。它表示形式的参数（也称为类型的因子）T1、T2，直到 T。你通过将文件“public class\
    \ Box”更改为“public class Box <T>”来更新盒子类以使用泛型，从而生成泛型类型声明。这引入了类型变量 T，可以在类内部的任何地方使用。这将所有\
    \ Object 实例替换为 T。你指定的任何非基本类型都可以是类型变量：任何类类型、任何接口类型、任何数组类型，甚至其他类型变量。同样的方法可以应用于泛型接口。\n\
    \n类型名称按惯例是单个大写字母。这与你已经了解的变量命名惯例形成鲜明对比，并且有充分的理由：如果没有这个惯例，很难区分类型变量和普通类或对象名称。\n\n\
    最常用的类型参数名称是：\n\n-   E - 元素（被 Java 集合框架广泛使用）\n-   K - 键\n-   N - 数字\n-   T - 类型\n\
    -   V - 值\n-   S、U、V 等——第 2、第 3、第 4 种类型\n\n你会在整个 JDK 和 API 中看到这些名称的使用。"
