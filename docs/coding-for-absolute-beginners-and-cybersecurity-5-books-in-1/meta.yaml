    学习的进程是进一步深入 Python 编程语言。实际上，Python 是一种适应性强且功能强大的语言，可以从多个角度使用。这仅仅意味着当需要逐行测试代码或声明，或者当你正在研究其特性时，可以智能地使用
    Python。令人难以置信的是，Python 可以在内容模式下使用，尤其是在你想要解释整个声明文件或应用程序时。


    然而，使用 Python 需要极其谨慎——尤其是在你与之交互或连接时。这种谨慎对于每种编程语言也是如此。为了智能地与 Python 交互，可以使用命令行窗口或
    IDLE 开发环境。


    由于你是编程或使用 Python 的新手，你将有不同的方式来与 Python 编程语言进行交互和协作。以下是与 Python 快速协作的基本操作亮点：


    ## 命令行交互


    对于初学者来说，连接到命令行是最简单的工作方式。通过观察 Python 如何响应在 `>>>` 提示符上输入的每个完成的命令，可以简单地了解它的工作原理。命令行可能不是与
    Python 交互的首选方式；然而，多年来，它已被证明是初学者探索 Python 工作原理的最简单方法。


    ## 使用命令行启动 Python


    如果你使用的是 macOS、GNU/Linux 和 UNIX 系统，你应该运行终端工具来访问命令行。另一方面，如果你使用的是 Windows，你可以通过右键单击“开始”菜单并启动
    Windows PowerShell 来访问 Python 命令行。


    由于编程指令需要输入命令，当你需要 Python 为你做某事时，你将通过输入它知道的指令来指示它以获得相同的输出。指令的改变可能会产生理想的输出；请小心。


    通过这种方式，Python 将把这些指令翻译成你的计算机或设备可以理解和执行的指令。


    让我们看一些指南来了解 Python 的工作原理。请注意，你可以使用 `print` 命令打印通用程序 "Heydays, Savants!"。


    - 1. 首先，打开 Python 的命令行。

    - 2. 然后，在 `>>>` 提示符下，输入以下内容（不要在 `print` 和括号之间留空格）：`print ("Heydays, Savants!")`

    - 3. 现在，你应该按回车键，以告诉 Python 你已完成该指令。立即，命令行窗口将显示 `Heydays, Savants!`。同时，Python 已按照它能理解的书面格式进行了响应。另一方面，要了解当你要求它使用错误的
    `print` 命令语法打印相同的字符串时它会如何错误响应，请在 Python 命令提示符下输入并输入以下指令：`Print("Heydays, Savants!")`


    结果将是：`Syntax error: invalid language structure`


    这是当你使用无效或不完整的声明时会得到的示例。请注意，Python 是一种区分大小写的编程语言，所以当你收到错误消息时，可能是你将 `print` 写成了大写字母。当然，`print`
    命令有一个选项；你可以简单地将你的声明放在引号内，像这样：`"Primes, Savants!"` 请注意，声明是你希望在给出命令时显示的单词；可以放入的单词不限于此处给出的示例。


    ## 离开 Python 命令行的方法


    要退出 Python，你可以输入以下任一命令：`quit()` 或 `exit()`。随后，按住 `Control-Z`，然后按 `Enter`；Python
    应该会退出。


    你对 Python 编程的熟悉程度现在应该变得有趣了；还有很多东西要学习，耐心会有回报。


    ## IDLE 的位置：Python 的集成开发环境 (IDE)


    Python 最有趣的部分之一是 IDLE（集成开发和学习环境）工具。尽管这个特定的工具包含在 Python 的安装包中，但你也可以下载更复杂的第三方 IDE。IDLE
    工具为你提供了一个更强大的平台来编写代码并与 Python 进行有趣的交互。要访问 IDLE，你可以进入与命令行图标相同的文件夹，或者在“开始”菜单上（正如你从命令行交互中学到的那样）。当你点击
    IDLE 图标时，你将被引导到 Python Shell 窗口。这将带我们进入与 Python Shell 窗口交互的部分。


    ## 与 Python Shell 窗口交互


    当你进入 Python Shell 窗口时，你会看到一个下拉菜单和一个 `>>>` 提示符，类似于你在命令行窗口（讨论的第一个连接）中看到的那样。IDLE
    有一个特定的编辑功能，用于交互过去的命令。现在，你将使用相同的 IDLE 编辑菜单来回顾你过去的指令，剪切、复制和粘贴过去的声明，并总体上进行任何类型的编辑。显然，IDLE
    更像是从命令行连接的一次飞跃。令人难以置信的是，在 Python Shell 窗口的菜单下拉菜单中有以下菜单项：文件、窗口、帮助、Shell、选项、编辑和调试。所有这些菜单都有不同的功能。Shell
    和 Debug 菜单在创建更大的项目时使用，因为它们提供了对过程的访问功能。然而，Shell 菜单允许你重启 shell 或查看 shell 的日志以获取最新的重置，而
    Debug 菜单有许多有用的功能，用于跟踪异常的源文件并突出显示错误行。通过 Debugger 选项，你将能够启动一个交互式调试器窗口，该窗口将允许你停止并查看
    Python 上正在运行的程序。窗口的 Options 菜单允许你编辑和设置 IDLE 以适应你自己的 Python 工作偏好。


    此外，在 Help 菜单中，你可以选择 Python 帮助和文档。'
