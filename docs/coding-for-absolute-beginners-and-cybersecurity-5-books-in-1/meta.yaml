  md: '# Functionalizing Collections


    When we externalize code, we expose every step. This is the hallmark of imperative
    programming. However, one of the re-occurring themes of functional programming
    is the idea of doing the exact opposite: internalizing code. The act of internalizing
    code is to hide the details inside a function. But functional programming pushes
    this idea further by turning micro-patterns of everyday programming into functions.
    For example, iterating over data, be it with iterators, for-loops, or while-loops,
    is one of those micro-patterns. Functional programming changes the way we think
    about them.


    Java’s functionalization effort would not be complete without a revamp of its
    Collections library, namely the Collection, Map, List, and Set interfaces. This
    is because iteration is often done over collections, and they are the very fabric
    of Java programs. It is a natural place for the functionalization effort to occur.
    But making any kind of significant changes, like adding new methods to the Collection
    interface, would break backward compatibility to all programs written pre-Java
    8. This includes not only the JDK’s own hierarchy extending the Collection interface
    but any open or closed source 3rd party library and in-house classes. Java’s designers
    never have and will never adopt such a strategy. Yet changes were necessary; the
    library was introduced in 1998, eons in software industry years, and was showing
    its age.


    The motivation for the introduction of default methods was ushered by the need
    to modernize and functionalize the Collections library. Default methods are just
    the right tonic because they permit behavior to be added at the root of the hierarchy
    without disturbing dependent classes. Subclasses can either inherit or override
    the behavior. Unlike adding new interface methods, subclasses can automatically
    accept new default methods without recompilation. Instant compatibility is achieved.
    Default methods have proven useful in their own right but owe their existence
    to the need to functionalize the Collections library.'
