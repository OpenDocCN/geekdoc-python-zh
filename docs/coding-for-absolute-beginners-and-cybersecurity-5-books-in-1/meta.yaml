    # # What is Cyber Security?


    The protection of a computer system or network from the adverse effects such as
    theft or damages to the computer hardware, Software, data, or the services provided
    by those elements is known as cybersecurity. Cybersecurity is also known as Computer
    Security and IT Security (Information Technology Security). The field of cybersecurity
    has fast evolved over the years due to the rapid increase in the use and reliance
    on the internet, computers, and wireless networks.


    The use of devices that are also prone to cyber-attacks such as smart mobile phones,
    smart televisions, and devices falling under the category of the "Internet of
    Things" (IoT) has also contributed to the need for the rapid evolution of cybersecurity.
    The technology and politics that surround the use of the internet, computers,
    networks, and smart devices are complex that pose many challenges to the world
    of cybersecurity.


    Due to the fast-changing nature of technology and other factors, cybersecurity
    is always evolving. Cybersecurity approaches, tools, risk management methods,
    technologies, best practices, and training are always changing as a result. Threats
    to cybersecurity also advance with the evolution of technology and the use of
    devices, Software, and networks that are prone to those threats. Many organizations
    and even individuals put high levels of emphasis on cybersecurity to protect their
    valuable hardware, Software, data, services, and organizational objectives.


    Cybersecurity has been a huge focus for businesses due to the risk of data breaches
    that can cripple them in many ways. Such breaches often lead to the loss of highly
    sensitive data that costs companies their revenues, competitive advantage, reputation,
    and consumer trust. A data breach is estimated to cost a company around $3.6 million,
    making cybersecurity a high priority for any business.'
- md: '## Cyber Attacks and Vulnerabilities


    A weakness in the design, implementation, internal control, or the operations
    of a computer, hardware, smart device, software, or a network results in the exposure
    to cyber-attacks. The Common Vulnerabilities and Exposures is a database that
    documents such known vulnerabilities to cyber threats. At least one active attack
    or an exploit that exists is called an exploitable vulnerability. Various manual
    and automated tools are used to identify vulnerabilities to cyber-attacks.


    When it comes to computers and networks, attacks largely attempt to expose, disable,
    alter, steal, destroy, or gain access to the use of assets. Any such offensive
    maneuver that tries to target computer systems, networks, infrastructures, and
    personal devices can be called a cyber-attack. A cyber-attack can be carried out
    by an individual or a group with malicious intent putting hardware, data, and
    functionalities at risk.


    Cyber-attacks can be categorized as cyber warfare or cyberterrorism, depending
    on the nature of the attack and its threat. Furthermore, cyber-attacks can be
    carried out by various societies and sovereign states operating in anonymity.
    During a cyberattack, susceptible systems and devices are hacked into while achieving
    the malicious intents of the attacker or the attackers. The scale of a cyberattack
    may also vary from a single computer, device, individual, or company is the primary
    target to infrastructures of entire nations.


    ## Information Security Culture


    The behavior of employees plays a key role in establishing cybersecurity in companies.
    Changes and improvements of a company''s culture and practices can help employees
    effectively work towards achieving information security. Employees sometimes do
    not realize that they are an integral part of a company''s effort towards achieving
    satisfactory levels of cybersecurity. Their actions may sometimes not align with
    the cybersecurity goals of a company as a result.


    A company should continuously make improvements to its information security culture
    while making sure that employees understand the role they need to play. The process
    is never-ending with an ongoing cycle of change, evaluation, and maintenance.
    The five steps involved in managing a company''s information security culture
    are pre-evaluation, strategic planning, operative planning, implementing, and
    post-evaluation.


    Pre-evaluation brings awareness regarding the company''s current information security
    culture and policy while highlighting behavior that might make it vulnerable against
    cyber threats. The next step in the process, which is strategic planning, then
    creates a program towards increasing awareness with a clear target to achieve
    as a company. Operative planning involves working towards a better culture by
    improving internal communication, security awareness, and training.


    Implementing is a step that consists of four phases, which are the commitment
    of management, communication with employees, providing courses for employees,
    and the commitment of the employees. Managers first commit to implementing better
    information security practices within the company and then communicates the company''s
    intentions to the employees. Then the employees are provided with education and
    training regarding information security.


    Finally, the employees of the company committed to bringing about an improved
    and satisfactory information security culture. The final step, which is Post-Evaluation,
    assesses how well the planning and implementation went and identifies any areas
    that remain to be unresolved.


    ## Systems That Are Vulnerable to Cyber-Attacks


    The number of individuals, businesses, and organizations relying on computer systems
    has grown rapidly. It has resulted in increasing the number of systems that are
    at risk of cyber-attacks. Such vulnerable entities are scattered across various
    industries, with almost all industries out there being vulnerable at different
    levels.


    ## Financial Systems


    Computer systems belonging to financial institutions and regulators have a high
    risk of being targeted by hackers. The U.S. Securities and Exchange Commission,
    investment banks, and commercial banks are prime targets of hackers seeking illicit
    gains and market manipulation. Furthermore, any website or mobile application
    that store or accept credit card numbers, bank account information, and brokerage
    accounts are also under the risk of being hacked.


    Hackers and hacker groups take a high interest in attacking the networks and websites
    of such institutions since they can enjoy immediate financial spoils by making
    purchases, transferring money, and selling acquired data to interested parties
    in the black market. ATMs and in-store payment systems have also been targeted
    by hackers who aim to gather customer PIN codes and account details.


    ## Dark Web


    The dark web sounds scary and almost sends shivers down the spine of most people.
    The dark web is well-known for harboring illegal activity that lots of people
    don''t want to engage in. The question starts spinning in our heads that if the
    dark web is a place for illegal activity, then why does it exist in the first
    place and who allows it to run without any kind of restrictions. Is there any
    purpose behind the existence and flourishing of the dark web, or is the place
    being handled by a strong bunch of lot? There are three major parts of the internet
    known as the deep web, surface web, and dark web. Let me discuss each type individually
    and in detail.


    The surface web consists of around ten percent of the entire internet, and it
    includes things such as Google and other search engines. You can use keywords
    to search for different things to read, sell, or buy. Then comes the deep web
    that is the place where you can store the information that is unavailable to most
    users. This includes things that you have protected by a password such as a bank
    account subscription services as well as certain medical information. A majority
    of the webspace consists of this type of information. The third spot belongs to
    the dark web that is not accessible by a standard internet user. You cannot access
    this webspace through Firefox, Opera, and Google Chrome, and it can have any kind
    of information. The word dark is attributed to this web space because of its limited
    accessibility.


    You might be wondering if the dark web is completely illegal for a common user.
    Thankfully, the answer is no. Mere entering the dark web doesn''t count as an
    illegal activity, but what you do in the dark web can be categorized as legal
    or illegal. You can access the dark web through Tor anonymous browser. You can
    download it just like Google Chrome and Firefox. The difference is that it works
    in a different manner. You have to travel through different overlay networks when
    you are using Tor or The Onion Router. Just like an onion, it has a number of
    layers to pass through. The speed of Tor is usually slower than other browsers.
    If you can get your hands on a Virtual Private Network, it is better to ensure
    maximum security.


    To clear the longstanding confusion, Tor is not a dark web but a tool to access
    the dark web. Also, Tor can be used to access general webspace such as Google
    and Yahoo, and your travel through the surface web will be more secure. Rather
    than a place for illegal activities, the dark web is considered as a place for
    a high level of online privacy. You can buy illegal drugs through on the dark
    web and get them delivered to your postal address without giving anyone a hint
    to what was in the package. The ultimate objective to achieve by using dark web
    depends on what you need, whether you are ready to take the risk of committing
    an illegal act.


    Residents of countries such as Iran where the government control over the internet
    is touching extreme levels, the dark web becomes a necessity. Residents from these
    countries access Facebook and Twitter through the dark web. They log into their
    onion versions that have been officially launched for users who are subjected
    to censorship.'
  mdcn: '## 网络攻击与漏洞


    计算机、硬件、智能设备、软件或网络在设计、实施、内部控制或运营方面的弱点，会导致其暴露于网络攻击之下。**通用漏洞披露**是一个记录此类已知网络威胁漏洞的数据库。至少存在一个活跃攻击或利用方式的漏洞被称为可利用漏洞。人们使用各种手动和自动工具来识别网络攻击漏洞。


    就计算机和网络而言，攻击主要试图暴露、禁用、篡改、窃取、破坏资产或获取资产的使用权。任何试图针对计算机系统、网络、基础设施和个人设备的此类攻击性操作，都可称为网络攻击。网络攻击可由个人或怀有恶意的团体实施，这会使硬件、数据和功能面临风险。


    根据攻击的性质及其威胁程度，网络攻击可分为网络战争或网络恐怖主义。此外，网络攻击可由各种在匿名状态下运作的团体和主权国家实施。在一次网络攻击中，易受攻击的系统和设备会被入侵，以实现攻击者或攻击者团体的恶意目的。网络攻击的规模也可能各不相同，从以单台计算机、设备、个人或公司为主要目标，到针对整个国家的基础设施。


    ## 信息安全文化


    员工的行为在建立公司网络安全方面起着关键作用。公司文化和实践的变革与改进，可以帮助员工有效地为实现信息安全目标而努力。员工有时并未意识到，他们是公司为达到满意网络安全水平所做努力中不可或缺的一部分。因此，他们的行为有时可能与公司的网络安全目标不一致。


    公司应持续改进其信息安全文化，同时确保员工理解他们需要扮演的角色。这是一个永无止境的过程，包含持续的变革、评估和维护循环。管理公司信息安全文化的五个步骤是：预评估、战略规划、运营规划、实施和后评估。


    预评估旨在提高对公司当前信息安全文化和政策的认识，同时指出可能使其在网络威胁面前变得脆弱的行为。该过程的下一步是战略规划，旨在制定一个提高意识的计划，并设定一个公司需要实现的明确目标。运营规划则致力于通过改善内部沟通、安全意识和培训来建立更好的文化。


    实施是一个包含四个阶段的步骤，即管理层的承诺、与员工的沟通、为员工提供课程以及员工的承诺。管理者首先承诺在公司内部实施更好的信息安全实践，然后向员工传达公司的意图。接着，员工会接受关于信息安全的教育和培训。


    最后，公司的员工致力于建立一种改进的、令人满意的信息信息安全文化。最后一步是后评估，它评估规划和实施的效果，并找出任何尚未解决的问题。


    ## 易受网络攻击的系统


    依赖计算机系统的个人、企业和组织数量迅速增长。这导致面临网络攻击风险的系统数量不断增加。此类易受攻击的实体遍布各行各业，几乎所有行业都在不同程度上存在漏洞。


    ## 金融系统


    金融机构和监管机构的计算机系统面临被黑客攻击的高风险。美国证券交易委员会、投资银行和商业银行是寻求非法利益和市场操纵的黑客的主要目标。此外，任何存储或接受信用卡号、银行账户信息和经纪账户的网站或移动应用程序，也面临被黑客攻击的风险。


    黑客和黑客组织对攻击这些机构的网络和网站非常感兴趣，因为他们可以通过购物、转账以及在黑市上向相关方出售获取的数据来立即获得经济利益。自动取款机和店内支付系统也成为黑客的目标，他们旨在收集客户的个人识别码和账户详情。


    ## 暗网


    暗网听起来很可怕，几乎让大多数人不寒而栗。暗网因窝藏许多人不愿参与的非法活动而臭名昭著。问题开始在我们脑海中盘旋：如果暗网是一个进行非法活动的地方，那么它最初为何存在？是谁允许它在没有任何限制的情况下运行？暗网的存在和繁荣背后是否有任何目的，还是这个地方被一群强大的人所掌控？互联网主要有三个部分，即深网、表层网和暗网。让我逐一详细讨论每种类型。


    表层网约占整个互联网的百分之十，包括谷歌和其他搜索引擎等事物。你可以使用关键词搜索不同的内容进行阅读、出售或购买。接下来是深网，这是你可以存储大多数用户无法访问的信息的地方。这包括你通过密码保护的内容，例如银行账户、订阅服务以及某些医疗信息。大部分网络空间由这类信息组成。第三个是暗网，标准互联网用户无法访问。你无法通过火狐浏览器、Opera和谷歌浏览器访问这个网络空间，它可以包含任何类型的信息。这个词之所以被称为“暗”，是因为其访问受限。


    你可能想知道暗网对普通用户来说是否完全非法。幸运的是，答案是否定的。仅仅进入暗网并不算非法活动，但你在暗网中的行为可以被归类为合法或非法。你可以通过Tor匿名浏览器访问暗网。你可以像下载谷歌浏览器和火狐浏览器一样下载它。不同之处在于它的工作方式不同。使用Tor或洋葱路由器时，你必须穿越不同的覆盖网络。就像洋葱一样，它有多层需要穿越。Tor的速度通常比其他浏览器慢。如果你能使用虚拟专用网络，最好以确保最大安全性。


    为了澄清长期以来的困惑，Tor不是暗网，而是访问暗网的工具。此外，Tor可用于访问谷歌和雅虎等通用网络空间，你在表层网上的浏览将更加安全。暗网与其说是非法活动的场所，不如说是一个高度在线隐私的地方。你可以在暗网上购买非法药物，并将其送到你的邮政地址，而不会让任何人知道包裹里是什么。使用暗网要实现的最终目标取决于你的需求，以及你是否愿意承担实施非法行为的风险。


    在伊朗等政府对互联网的控制达到极端水平的国家，暗网成为一种必需品。这些国家的居民通过暗网访问Facebook和Twitter。他们登录为受审查用户正式推出的洋葱版本。'
