  md: '# Information Security Culture


    The behavior of employees plays a key role in establishing cybersecurity in companies.
    Changes and improvements of a company''s culture and practices can help employees
    effectively work towards achieving information security. Employees sometimes do
    not realize that they are an integral part of a company''s effort towards achieving
    satisfactory levels of cybersecurity. Their actions may sometimes not align with
    the cybersecurity goals of a company as a result.


    A company should continuously make improvements to its information security culture
    while making sure that employees understand the role they need to play. The process
    is never-ending with an ongoing cycle of change, evaluation, and maintenance.
    The five steps involved in managing a company''s information security culture
    are pre-evaluation, strategic planning, operative planning, implementing, and
    post-evaluation.


    Pre-evaluation brings awareness regarding the company''s current information security
    culture and policy while highlighting behavior that might make it vulnerable against
    cyber threats. The next step in the process, which is strategic planning, then
    creates a program towards increasing awareness with a clear target to achieve
    as a company. Operative planning involves working towards a better culture by
    improving internal communication, security awareness, and training.


    Implementing is a step that consists of four phases, which are the commitment
    of management, communication with employees, providing courses for employees,
    and the commitment of the employees. Managers first commit to implementing better
    information security practices within the company and then communicates the company''s
    intentions to the employees. Then the employees are provided with education and
    training regarding information security.


    Finally, the employees of the company committed to bringing about an improved
    and satisfactory information security culture. The final step, which is Post-Evaluation,
    assesses how well the planning and implementation went and identifies any areas
    that remain to be unresolved.'
  merge: -1
