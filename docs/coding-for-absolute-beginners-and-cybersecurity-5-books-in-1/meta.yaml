    QRadar 跟踪位置。它收集信息，并将在线、离线和设备内部的信息与该代码关联起来。当事件发生时，它会制定一种技术来添加它；然后消除威胁。这是目前使用的最佳网络事件响应安全计划之一。


    ### 2. Wireshark


    它是最受欢迎的网络协议分析器之一。它评估用户正在使用的设备上的脆弱区域。Wireshark 可以收集或查看设备上发生的数据和活动的记录。可以查看传入和传出的数据包以及传输中使用的协议。它能够捕获实时数据，并创建一个传统的分析表，以协助进行跟踪。


    ### 3. Cryptostopper


    它是目前网上防止勒索软件或恶意软件攻击的最佳工具之一。CryptoStopper 的作用是找到正在加密文档的机器人并将其删除。它为威胁创建一个设计或诱饵方式，使其附着在设备上；当它附着时，CryptoStopper
    会检测并删除该代码。Cryptostopper 的制造者倾向于承诺在九秒内检测并消除威胁。它隔离工作站和设备的受影响区域，使勒索软件无法影响越来越多的区域。


    ### 4. NMAP


    它是为网络安全创建的众多主要开源工具之一。NMAP 不仅适用于小型网络，也适用于大型网络。它识别设备上的主机和接收器。此外，它还使用操作系统的分布。它能够在一瞬间扫描网络上的数百甚至数千台设备。


    ### 5. Burp Suite


    这是另一个网络扫描算法安全程序，允许你浏览在线应用。这个特定工具的主要目的是检查和渗透受损的方法。它检查可能受影响的表面以及发送方和目的地的响应和请求是否存在风险。如果发现任何威胁，它可以被隔离或消除。


    ### 6. OpenVAS


    Nessus 的一个工具，但与 Nessus 和 Metasploit 有相当大的不同，尽管它们做的是同样的事情，但各有特点。它被认为是目前网上最稳定、漏洞最少、使用最广泛的网络安全工具之一。


    OpenVAS 有两个主要组件：


    - **扫描器：** 它检查不安全区域，并向其主管提交一份包含所有内容的编译报告。

    - **管理器：** 它编译从扫描器获取的请求，然后能够生成所有此类事件的报告。


    ### 7. Nessus


    Nessus 是另一个检查恶意黑客的单元。它检查设备上的计算机，寻找试图利用来自网络的信息的未授权黑客。通常认为 Nessus 扫描未授权访问多达 1200
    次。与其他工具不同，它不假设特定端口仅用于 Web 服务器，例如端口 80 仅用于 Web 服务器。此外，它是一个开源单元，提供不安全补丁援助中心，这进一步有助于为受影响区域提供可行的解决方案。


