    # Health


    The health sector tops the list of cyberattacks in the United States, and there
    are some valid reasons for that. The health sector carries personal information
    such as names, addresses, information about the income of people, social security
    numbers, and email IDs. Hackers break into the databases at hospitals and access
    this information to exploit it later on. Their mode of attack is to gain a kind
    of unauthorized access to medical programs and an effort to get prescription drugs.
    Most of the threat has its origins inside the organization while some of the attacks
