  mdcn: "## 面向对象编程示例\n\n以一个名为 Dog 的类为例。不要将其视为某只特定的狗或你自己的狗。我们是在描述狗的一般特征和行为。狗有年龄和名字，这些是实例属性。狗也会吠叫，这是一种方法。\n\
