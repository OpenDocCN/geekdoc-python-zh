    # Let''s get on with HTML5! The <HEAD> Section


    HTML5 makes use of an <head> section, which processes information before the actual
    document begins to be displayed on a screen. Think of the <head> section like
    a preface where you list all of the important information about your text. HTML5:
    The Basics

    Let''s get started with our first HTML document! This is how the <HEAD> section
    would look like:


    ```

    <!DOCTYPE html> <html lang=en> <head> The title of your website should be listed
    here in both English and in your chosen programming language. </head> </html>

    ```


    The general convention for writing <title> tags is that it should be capitalized,
    followed by a space, then its name. This should then go at the top of your webpage
    (in between the <html></head> tags). If you''re attempting to create a mobile
    website, keep in mind that only the first <title> tag should be used. This will
    enable your page to have its own unique ID called a Web Title. Since HTML5 has
    a new way of doing this with a meta tag called "data-web-title=" , it''s important
    that you keep track of this value for future references (you''ll be doing this
    for all the other tags that you''ll be using).


    The only other important thing to mention is how the title of your webpage works.
    In HTML4, the concept of "page" was very different from our modern knowledge of
    it. It referred to what we call today, "web pages". In that case, the title was
    more of a "title tag", and it was not dependent on the document you were reading.


    In HTML5, the Web Title and Page Title are different!


    To start with, a Web Title is used to create an identification value that is unique
    for each page of your website. This is necessary to prevent multiple pages from
    using the same name (like what might happen if you made a mistake while writing
    your webpage). For this reason, every web page has its own unique ID (called a
    web title) which will be listed in the <title> tag.'
