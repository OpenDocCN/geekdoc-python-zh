  md: '# Dark Web


    The dark web sounds scary and almost sends shivers down the spine of most people.
    The dark web is well-known for harboring illegal activity that lots of people
    don’t want to engage in. The question starts spinning in our heads that if the
    dark web is a place for illegal activity, then why does it exist in the first
    place and who allows it to run without any kind of restrictions. Is there any
    purpose behind the existence and flourishing of the dark web, or is the place
    being handled by a strong bunch of lot? There are three major parts of the internet
    known as the deep web, surface web, and dark web. Let me discuss each type individually
    and in detail.


    The surface web consists of around ten percent of the entire internet, and it
    includes things such as Google and other search engines. You can use keywords
    to search for different things to read, sell, or buy. Then comes the deep web
    that is the place where you can store the information that is unavailable to most
    users. This includes things that you have protected by a password such as a bank
    account subscription services as well as certain medical information. A majority
