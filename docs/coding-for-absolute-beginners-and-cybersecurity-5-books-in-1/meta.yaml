  md: '# Chapter 1. Java Basics


    Of course, one of the key reasons to use Java is its focus on Object-oriented
    programming. Object-oriented programming, or “OOP” is a type of programming language
    model which allows the program’s code to be organized around data, rather than
    functions and logic, which is known as procedural programming.


    These objects are created by something called “classes,” understood here in the
    traditional sense of how classes are types of objects, allowing the programmer
    to “classify” them according to two major criteria: attributes and methods.


    The attributes of a class are the raw data that will create the object: these
    are its descriptors, such as the values that it possesses, and other relevant
    data that will make up the object.


    The second criterion is the “method” of the object.


    In order to make this clearer, say that there is a class “Human.” This “class”
    will have attributes such as height, weight, gender, and race. The “human” class
    can also have methods such as “run,” “walk,” “talk.” These theoretical components
    make up the “human” class, a blueprint for an object.


    Now that the class has been defined, the programmer, if they so wish, can create
    an object using the “human” class as a blueprint.


    They can invoke the class “Human” and “populate” its attributes, giving it a specific
    height, weight, gender, and race. In addition, the object already has built-in
    functions such as “run,” “walk,” and “talk,” so upon the creation of an object,
    let’s say named “Mike” from the “Human” class, it already contains the functions
    to run, walk, and talk, without need for the programmer to code those specific
    functions again, as they are already “inherent” in the created object.'
  merge: -1
  pgno: 209
- img_proc: true
  md: 'In a nutshell, that is what Object-oriented programming is meant to be: a way
    of programming that allows the programmer to draw on pre-defined classes so that
    it will be easier to describe them and use their internal, or built-in functions
    in order to operate them.


    Assuming that the reader is not a total newbie to programming, and has been introduced
    to the world of programming using C or another procedural—heavy language, the
    next logical question would be: why even use object-oriented programming?


    Well, one of its main advantages is that in the long run, it saves time.


    Procedural programming is usually much quicker and more straightforward in simpler
    algorithms and programs; rather than having to construct and define a class, and
    create an object based on that class, all the programmer really has to do is to
    simply declare the necessary variables and write the functions, and create the
    algorithm in order to solve the problem that they need the code to address.


    However, when it comes to more complex programs, needing more complex solutions,
    this is where object-oriented programming begins to shine, and this is where it
    starts to show its strength.


    In a lot of programs, there will be times that there will be a number of “objects”
    or data clusters that have to be grouped together, and that the programmer will
    be treated in a certain way.


    This is what “classes” are meant to address.


    Instead of declaring a new set of variables per data cluster, they can simply
    draw on a pre-made “class” and create a new “object.”


    Let’s see how this would work in practice.


    If a programmer were to code a chess game in procedural fashion, then they would
    have to manually describe each and every piece, all sixteen pawns, four bishops
    and four knights, four rooks, two queens, and two kings. In addition, they will
    have to write the functions that allow each piece to move in its own separate
    way.'
  merge: -1
  pgno: 210
- img_proc: true
  md: 'However, if the programmer makes use of object-oriented programming, instead
    of having to code sixteen pawns, four bishops, four knights, four rooks, two queens,
    two kings, they simply have to code six classes: one class to describe each piece
    on the board.


    The programmer can now simply include the movement functions within each class,
    and have the attributes describe their position: whether they’re white king’s
    pawn, or black queen’s pawn, these are all things that can be inserted through
    the “attributes” portion of the “pawn” class. Instead of thirty—two clusters of
    code, the programmer only has to do six.


    Now it’s much easier, much shorter, and also much more elegant.'
  merge: -1
