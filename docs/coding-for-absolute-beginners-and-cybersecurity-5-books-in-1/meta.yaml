    \ = NULL;\n        p_new_tree->key_value = key;\n        return p_new_tree;\n\
    \    }\n    // decide – left subtree or right subtree for the insertion\n    //\
    \ depending on the what the node value is\n    if( key < p_tree->key_value )\n\
