    # ## Generics


    In any non-trivial software project, bugs are simply a fact of life. Careful planning,
    programming, and testing may help diminish their omnipresence, but somehow they
    will always find a way to enter your system somewhere. This becomes especially
    apparent as new features are introduced, and your code base''s magnitude and complexity
    increases.


    Fortunately, it is easier to detect some bugs than others. Compile-time bugs,
    for instance, can be identified soon; you can use the compiler''s error codes
    to determine what the issue is and solve it, right then and there. Runtime bugs,
    however, can be much harder; they do not always occur instantly, and when they
    do, they may be at a point in the program far apart from the true cause of the
    problem. Generics help stabilize your software by creating it feasible at compile
    time to identify more of your bugs.


    Generics, in a nutshell, allow parameters for kinds (classes and objects) when
    defining courses, interfaces, and techniques. Like the more familiar formal parameters
    used in declarations of methods, type parameters provide you with distinct outputs
    to re-use the same code. The distinction is that values are the inputs to formal
    parameters, while kinds are the answers to type parameters. Code using generics
    has many advantages over the non-generic code. Through the use of generics, programmers
    can introduce generic algorithms that operate on distinct kinds of collections,
    can be tailored, and are secure and simpler to read form.


