    \nSize()：返回队列内的元素数量。\n\nIsEmpty()：如果队列为空则返回 1，否则返回 0。\n\n注意：所有上述队列操作的时间复杂度均为 O(1)。\n\
    \n## Java 集合中的队列实现\n\n`ArrayDeque<T>` 是双端队列的类实现。如果我们使用 `add()`、`remove()` 和 `peek()`，它的行为就像一个队列。（此外，如果我们使用\
