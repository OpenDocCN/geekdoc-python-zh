- img_proc: true
  md: '# Chapter 2. What Is a Programming Language?


    The first thing you need to know is that a programming language is a set of instructions
    for the computer. These are often called code. The goal is to make computers do
    what they need to do, ranging from making calculators to processing NASA images
    of nearby galaxies. But the hard part about programming languages is that they''re
    often not designed for people who don''t already know how to program. It''s like
    trying to teach someone Spanish in a first-grade class. Most people aren''t going
    to be able to understand what you''re saying.

    That''s why this book is for absolute beginners who don''t know any programming
    languages at all. It doesn''t matter how much experience you have in other languages;
    you''ll still need basic knowledge of computers to pick up this language and use
    it effectively. (If you want more information about these topics, check out my
    other books on web development.)


    # What Is Coding?


    You can think of code as instructions that tell the computer what to do. If I
    say to the computer, "draw a picture," it will draw a picture on the screen. The
    laptop has a great deal of programming power built into it, including the ability
    to understand instructions. It might have to make a little interpretation on one
    or two of them, but for the most part, it can follow these instructions and do
    what you ask.


    # Why Do We Code?


    Programming languages are used to make software. Software is vital because it
    lets us do things like automate processes in factories or connect devices in our
    homes to control them from anywhere else in the world. This kind of software is
    commonly called "apps," short for applications.

    So coding is necessary because it gives us the ability to make apps of our own
    to help us do what we want. But coding is more than just the language: it''s about
    what you can do with that language.'
  merge: -1
  pgno: 20
- img_proc: true
  md: 'Coding is also a creative process, and that''s where all the best apps come
    from. Successful apps are those that are useful, interesting, or just downright
    fun to use. Some of them have changed how we live our lives, like Uber or Facebook;
    others have profoundly affected how we communicate with each other, like Skype
    or WhatsApp. And they''ve all been made possible because someone somewhere had
    an idea and was able to translate it into code.


    # What Can You Do with It?


    Anything you can think of. Coding gives you the ability to make something out
    of nothing. You give it a few lines of code and it turns into a program that does
    something on your computer, across your network, or even the World Wide Web.

    You might think that all coding is the same, but there are several different kinds.
    Some coding languages are used to build simple websites. Others are used to build
    operating systems, which makes them complicated. Some people learn how to write
    code in high school or college to write programs for big companies like Google
    and Microsoft; others learn how to code for themselves or their friends to make
    their software without much money.

    Here in this book, you''re going to learn how to build software for your computer
    using a popular programming language called Python. This is a great language to
    learn because there are lots of resources out there for learning it. There are
    also lots of apps out there that were made using Python so you can see how they
    work, play with them, and even copy them to use as your projects.

    You might think that some of these websites and apps cost money or require special
    equipment, but all you need is a computer. And right now, that''s all you need
    to learn to code : just a computer with an internet connection and the ability
    to read, type, and do some simple math.


    # How to Read This Book


    Programming is a complicated subject. Even if you''re entirely new to computers,
    it''s pretty likely you already know at least some programming languages. That''s
    why I wrote this book so that people who have no experience coding can still understand
    what they''re reading. Here are the steps you need to take to use this book:'
  merge: -1
  pgno: 21
- img_proc: true
  md: '+   1. Download and install Python 2 on your computer if you don''t already
    have it installed. (Python 3 is very similar and many of the examples will work
    with either version.)

    2. Open a web browser on your computer and enter this address: [https://codecademy.com/courses/learn-python?action=start](https://codecademy.com/courses/learn-python?action=start).

    3. Follow along as you read the chapters. You should type in the code and follow
    the instructions for each chapter. (If you don''t see any code or instructions,
    then click "Start a new lesson.")

    4. Continue with this book until the end. You''ll want to practice what you learn
    so that it sticks in your memory!


    # Where to Learn More


    Once you finish this book, you''re going to want to learn more about Python and
    coding. Here are some resources I recommend:

    Codecademy – Codecademy is an interactive website where you can learn how to code
    in dozens of languages, including Python, by completing activities and challenges
    on their platform. They even have video tutorials!

    Codecademy is an interactive website where you can learn how to code in dozens
    of languages, including Python, by completing activities and challenges on their
    platform. They even have video tutorials! Udacity.


    This is like Codecademy, except it''s a college level course and the program you
    learn here can be applied to most jobs. The site also has many videos showing
    you how the modules work and how to use them. Books and YouTube – These are two
    great ways to learn, and they''re all free! You can learn Python through many
