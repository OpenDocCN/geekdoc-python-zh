  md: '# # Chapter 16. Logging in Programs


    Programs are the basic building blocks for coding. Programs can be run without
    a computer by writing them down on paper, typing them into an online editor, or
    talking through their steps aloud.

    Most programs consist of two parts: (1) telling the computer what you want it
    to do and (2) instructing the computer on how to do it. The first part is called
    the command and tells the computer what operations to perform, for example, adding
    two numbers or erasing a file. The second part is called the instruction method
    and tells how to perform these operations, e.g., addition or using an erase function
    in a word processing program.

    To begin, you should learn a simple program to introduce the differences between
    commands and instructions.


    Command: "Hello World" (i.e., "Write your name on the screen.")


    Instructions: (1) from what line of your program do you write your name, (2) is
    it centered or justified, and (3) does it have any special formatting?

    Commands are one word. They tell the computer what to do. For example, one command
    might say: "Write your name on the screen." You don''t want to worry about how
    computer memory space is organized or how to format things for output on display!
    The computer just does them for you. In fact, the computer does all the work for
    you.


    In contrast, instructions tell the computer what to do. For example: "Write your
    name on the screen." This tells the computer how to make your name appear on the
    screen. Some instructions require a bit more detail. For example:


    (1) from what line of your program do you write your name, (2) is it centered
    or justified, and (3) does it have any special formatting?

    Instructions tell not only what to do but also how to do it! Therefore, they are
    called "instructions." For example: "Write your name on the screen. Center justified."
    This tells the computer to:

    Write your name Center justified.'
  merge: -1
