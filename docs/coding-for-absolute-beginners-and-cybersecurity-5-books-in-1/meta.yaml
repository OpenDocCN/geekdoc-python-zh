    至此，我们对全新改进的 Java 8 集合库以及标准函数式接口的概述就完成了。正如标准 JDK 库为支持函数式概念而发生了诸多变化一样，第三方 API 也预计将发生重大变革。但最大的变化尚未到来。


    ## 关键点


    新的 `java.util.function` 包包含一组函数式接口。这些接口分为四个家族，每个家族由其原型代表：`Consumer`、`Function`、`Predicate`
    和 `Supplier`。


    每个函数式接口家族都定义了在类型和元数上特化的变体。


    函数式接口还定义了支持函数式组合的方法。多个不同的 lambda 表达式可以融合形成一个看起来像单一函数的超级函数。


    集合库已经过全面改造并实现了函数化。这是通过在层次结构的顶层使用默认方法实现的，从而确保了向后兼容性。


    集合、列表、集合和映射中的新函数式方法在设计时就考虑了内部迭代。以 lambda 表达式和方法引用形式出现的行为参数被传递给遍历集合并作用于每个元素的方法。


    内部迭代是声明式编程的一种形式，是函数式编程的基础。它使开发者无需描述“如何”去做，而是专注于“做什么”。


    `Spliterator` 旨在用于集合的并行迭代。数据被分区，每个块被交给不同的线程进行并行处理。


    一个大于一的数如果不是质数，就是合数。


    ## 结论


    JDK 是 Java 开发工具包，它是编译、文档化和打包 Java 程序所必需的工具。与 JRE 一起，JDK 内置了解释器或加载器、名为 `javac`
    的编译器、归档工具（JAR）、Javadoc 文档生成器以及许多其他成功进行 Java 开发所需的工具。


    JRE 是 Java 运行时环境。它是 Java 字节码可以执行的环境，用于实现 Java 虚拟机。JRE 还为我们提供了 JVM 运行时所需的所有类库和许多其他支持文件。简而言之，它是一个软件包，为我们提供了运行
    Java 程序所需的一切，是 Java 虚拟机的物理实现。


    JVM 代表 Java 虚拟机。JVM 是一个抽象机器，一个规范，它为我们提供了执行字节码的 JRE。JVM 必须遵循这些规范——规范是描述 JVM 如何实现的文档，实现是满足
    JVM 规范要求的程序，运行时实例是在使用命令提示符编写 Java 命令并运行类时创建的 JVM 实例。


