  md: '# Exception Hierarchy


    Java has an inbuilt class named java.lang.Exception and all the exceptions fall
    under this class. All the exception classes are subclasses of this class. Moreover,
    the Throwable class is the superclass of the exception class. Another subclass
    of the Throwable class is the Error class. All the errors like stack overflow
    described above fall under this Error class.


    The Exception class has two subclasses, namely RuntimeException class and IOException
    class. A list of the methods, for which definitions are available in Java, as
    part of the Throwable class, is given below.


    ```

    public String getMessage()

    ```


    When called, this message returns a detailed description of the exception that
    has been encountered.


    ```

    public Throwable getCause()

    ```


    This method, when called returns a message that contains the cause of the exception.


    ```

    public String toString()

    ```


    This method returns the detailed description of the exception concatenated with
    the name of the class.


    ```

    public void printStackTrace()

    ```


    The result of toString(), along with a trace of the stack, can be printed to the
    standard error stream, System.err, can be done by calling this method.


    ```

    public StackTraceElement [] getStackTrace()

    ```


