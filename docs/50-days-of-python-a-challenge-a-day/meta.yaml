  md: "# Day 18\n\nIn this challenge, you get to know about **\\*args**. You can use\
    \ any word you want as a parameter as long as you use the \\* sign at the beginning\
    \ of the word. However, it's a common convention to use **args**. The **\\*args**\
    \ simply tells the function that we are not sure how many arguments we will need,\
    \ so the function lets us add as many arguments as possible. In the example below,\
    \ we add two numbers as arguments. However, we can add as many numbers as we want\
    \ and the function will work just fine. The **\\*args** make functions more flexible.\n\
    \n```\ndef any_num (*args):\n    ave = sum(args)/len(args)\n    return f'The average\
    \ is {ave}'\n\nprint(any_num(12, 90))\n```\n\n**Output:**\n`The average is 51.0`\n\
    \nIn this function, we have added more arguments.\n\n```\ndef any_num (*args):\n\
    \    ave = sum(args)/len(args)\n    return f'The average is {ave}'\n\nprint(any_num(12,\
    \ 90, 12, 34))\n```\n\n**Output:**\n`The average is 37.0`"
