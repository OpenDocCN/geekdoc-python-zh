  - "[PAGE 131]\n\n# Day 48\n\nThe first step to solving a binary problem is to ensure\
    \ that the list is **sorted**. A binary search does not work on a list that is\
    \ not sorted. For this challenge, the first thing you had to do was sort the array\
    \ or list. At its basic form, the binary search looks for the middle element in\
    \ a list. If the list middle element is not what you are searching for, it will\
    \ check whether the element you are searching for is **greater** than or **less**\
    \ than the middle element. If it is greater, then it will search the middle element\
    \ of the **upper half** of the list, if it is less, then it will search for the\
    \ middle element of the lower part of the list. This process is repeated until\
    \ the element is found. So, it picks a portion of the list and searches for the\
    \ middle element. We use the iterative method for this challenge.\n\n```\ndef\
    \ search_binary(list1, x):\n    low = 0\n    high = len(list1) - 1\n    mid_index\
    \ = 0\n\n    while low <= high:\n        mid_index = (high + low) // 2\n\n   \
    \     if list1[mid_index] == x:\n            return mid_index\n        # if an\
    \ element is lower than the middle index\n        # then search the lower part\
    \ of the list\n        elif list1[mid_index] > x:\n            high = mid_index\
    \ - 1\n        # if an element is higher than the middle index\n        # then\
    \ search the upper part of the list\n        elif list1[mid_index] < x:\n    \
    \        low = mid_index + 1\n\n    # if an element is not found, return -1\n\
    \    return 'no element'\n\nlist1 = [12, 34, 56, 78, 98, 22, 45, 13]\nlist1 =\
    \ sorted(list1)\nnumber = 22\n\nresults = search_binary(list1, number)\nif results\
    \ == 'no element':\n    print('Element is not in the list')\nelse:\n    print(f'The\
    \ element index is {results}')\n```\n\nOutput:\nThe element index is 2"
