    \ * 525600\n            return f'You are {age:,} minutes old.'\n\nprint(your_age())\n\
    ```"
- md: "## Day 13\n\nIn this challenge, you get to use **typecasting**, the **input()**\
    \ function, and the **try** and **except** blocks to handle errors. The **input**\
    \ from the user is always in string format, so we use the **int()** function to\
    \ convert it into an integer. The **except** block ensures that we handle the\
    \ **ValueError**. We have added the while loop to ensure that the code runs until\
    \ valid numbers are entered.\n\n```python\ndef your_vat():\n    while True:\n\
    \        try:\n            price = int(input(\"Enter the price of item: \"))\n\
    \            vat = int(input('Enter vat: '))\n        except ValueError:\n   \
    \         print(\"Enter a valid number\")\n        else:\n            total_price\
    \ = price + (price * vat / 100 + 1) - 1\n            return 'The price VAT inclusive\
    \ is', total_price\n\nprint(your_vat())\n```\n\n**Output:**\n```\n('The price\
    \ VAT inclusive is', 253.0)\n```\n\n## Extra Challenge: Pyramid of Snakes\n\n\
    With this challenge, we use loops to create a Pyramid of snakes. We import the\
    \ emoji library to get the snake emoji. See code below:\n\n```python\nfrom emoji\
    \ import emojize\n\ndef Python_snakes(n: int):\n    # the loop to determine the\
    \ number of rows of the pyramid\n    for i in range(0, n):\n        # The loop\
    \ that determines number of columns\n        for j in range(n, i, -1):\n     \
    \       # print space between the snake signs\n            print(end=\" \")\n\
    \        for k in range(0, i):\n            # printing the snake emoji\n     \
    \       print(emojize(':snake:'), end=\" \")\n        print(\"\\n\")\n\nmoney_pyramid(7)\n\
    ```\n\n**Output:**\n\n## Day 14\n\nNotice how we use nested **for loops** in the\
    \ code below? The first **for loop** access the outer list, and the inner **for\
    \ loop** access the inner list. Once we access the elements of the inner list,\
    \ we append them to **list1**. With this small code, we have flattened the list.\n\
    \n```python\ndef convert_list(lst1: list):\n    list1 = []\n    for items in lst1:\n\
    \        for i in items:\n            list1.append(i)\n    return list1\n\nprint(convert_list([[2,\
    \ 4, 5, 6]]))\n```\n\n**Output:**\n```\n[2, 4, 5, 6]\n```\n\n## Extra Challenge:\
    \ Teacher’s Salary\n\nThe output below assumes that the user inputs – name: John\
    \ Kelly, periods 105 and rate of $20.\n\n```python\ndef your_salary():\n    name\
    \ = input('Enter the name of the teacher: ')\n    rate = int(input('Enter rate\
    \ per period: '))\n    period = int(input('Enter the number of periods taught:\
    \ '))\n\n    if period <= 100:\n        gross_salary = rate * period\n    else:\n\
    \        gross_salary = (rate * 100) + ((period-100) * (rate + 5))\n\n    return\
    \ f'Teacher: {name}, \\nPeriods: {period} \\nGross salary:{gross_salary:,}'\n\n\
    print(your_salary())\n```\n\n**Output:**\n```\nTeacher: John Kelly,\nPeriods:\
    \ 105\nGross salary:2,125\n```\n\n## Day 15\n\nThis challenge tests your ability\
    \ to use negative string **slicing**, **if statements**, and **operators** in\
    \ Python. The [::-1] reverses the string and the == operator compares the original\
    \ string to the reversed string.\n\n```python\ndef same_in_reverse(a):\n    if\
    \ a == a[::-1]:\n        return True\n    else:\n        return False\n\nprint(same_in_reverse('mad'))\n\
    ```\n\n**Output:**\n```\nFalse\n```\n\n## Extra Challenge: What’s My Age?\n\n\
    This challenge is about working with dictionaries. Since all the keys in the dictionary\
    \ are **lowercase**, convert the input from user to lowercase. Then, we iterate\
    \ over the dictionary to see if the input name exists in our database. Once we\
    \ find it, we use the **get** method to access the dictionary value (which is\
    \ the age of the person). If the name is not in the dictionary, we use the **while\
    \ loop** to update the dictionary with the new information from the user. Once\
    \ we update the dictionary, we return the updated information to the user. See\
    \ code below:\n\n```python\nnames_age = {\"jane\": 23, \"kerry\": 45, \"tim\"\
    : 34, \"peter\": 27}\n\ndef your_age():\n    # Convert name to lowercase letters\n\
    \    name = input(\"Please enter your name: \").lower()\n    # Use for loop to\
    \ iterate over the dictionary\n    for key in names_age.keys():\n        if key\
    \ == name:\n            # use the get method to access a specific value.\n   \
    \         return f'Hi, {name}! You are {names_age.get(key)} years old'\n    else:\n\
    \        # if name not in the dictionary\n        while name not in names_age.keys():\n\
    \            age = input(\"Your name is not in the dictionary, \"\n          \
    \              \"please enter your age? \").lower()\n            # Update the\
    \ dictionary with name and age.\n            names_age.update({name: age})\n \
    \           return f'Hi, {name}! You are {names_age.get(name)} years old'\n\n\
    print(your_age())\n```\n\n## Day 16\n\nIn this exercise, we use the **for loop**\
    \ to flatten the nested lists. We have created a variable called counta. Every\
    \ number in the list is added to the **count**. By the end of the iteration, all\
    \ the numbers will be added to the counter.\n\n```python\ndef sum_list(lst1: list):\n\
    \    counta = 0\n    for items in lst1:\n        for i in items:\n           \
    \ counta += i\n    return 'The sum is ', counta\n\nprint(sum_list([[2, 4, 5, 6],\
    \ [2, 3, 5, 6]]))\n```\n\n**Output:**\n```\n('The sum is ', 33)\n```\n\n## Extra\
    \ Challenge: Unpack a Nest\n\nFor this challenge we need to write a **nested loop**\
    \ to access the inner list of the nested list. We then create a new list of all\
    \ the numbers that we need from the list.\n\n```python\nnested_list = [[12, 34,\
    \ 56, 67], [34, 68, 78]]\n\nnew_list = []\n# A nested for loop to access the inner\
    \ list\nfor arr in nested_list:\n    for num in arr:\n        # Create a list\
    \ of numbers wanted\n        if num in [34, 67, 78]:\n            # Checking if\
    \ number already\n            # exists before appending\n            if num not\
    \ in new_list:\n                new_list.append(num)\nprint(new_list)\n```\n\n\
    **Output:**\n```\n[34, 67, 78]\n```\n\n## Day 17\n\nIn this exercise, you get\
    \ to use the **random module**. Every time you call the function, the random module\
    \ issues a random number between 0 and 10. This number is added to the end of\
    \ the name using the + sign. We use slicing [::-1] to reverse the name. Another\
    \ way around it would have been to use the **reverse()** method to reverse the\
    \ name.\n\n```python\nimport random\n\nnum = random.randint(0,10)\n\ndef user_name():\n\
    \    name = input('Enter name: ')\n    name = name[::-1]\n    username = name\
    \ + str(num)\n    return username\nprint(user_name())\n```\n\n## Extra Challenge:\
    \ Sort by Length\n\nFor this challenge, we find the longest word and then we swap\
    \ them with the shorter words. The shorter words come first, and the longer words\
    \ comes later.\n\n```python\ndef sort_length(arr: list):\n    for item in range(len(arr)):\n\
    \        for j in range(len(arr) - 1):\n            # Check if any of the words\
    \ is longer than the other\n            if len(arr[j]) > len(arr[j + 1]):\n  \
    \              # swap the longest for the shortest\n                arr[j], arr[j\
    \ + 1] = arr[j + 1], arr[j]\n\n    return arr\n\nnames = [\"Peter\", \"Jon\",\
    \ \"Andrew\"]\n\nprint(sort_length(names))\n```\n\n**Output:**\n```\n['Jon', 'Peter',\
    \ 'Andrew']\n```\n\n## Day 18\n\nIn this challenge, you get to know about **\\\
    *args**. You can use any word you want as a parameter as long as you use the \\\
    * sign at the beginning of the word. However, it's a common convention to use\
    \ **args**. The **\\*args** simply tells the function that we are not sure how\
    \ many arguments we will need, so the function lets us add as many arguments as\
    \ possible. In the example below, we add two numbers as arguments. However, we\
    \ can add as many numbers as we want and the function will work just fine. The\
    \ **\\*args** make functions more flexible.\n\n```python\ndef any_num (*args):\n\
    \    ave = sum(args)/len(args)\n    return f'The average is {ave}'\n\nprint(any_num(12,\
    \ 90))\n```\n\n**Output:**\n```\nThe average is 51.0\n```\n\nIn this function,\
    \ we have added more arguments.\n\n```python\ndef any_num (*args):\n    ave =\
    \ sum(args)/len(args)\n    return f'The average is {ave}'\n\nprint(any_num(12,\
    \ 90, 12, 34))\n```\n\n**Output:**\n```\nThe average is 37.0\n```\n\n## Extra\
    \ Challenge: Add and Reverse\n\nThis challenge is best solved using the **range()**\
    \ function. The first step is to check if the list are of equal lengths; we use\
    \ the **len()** function for that. Once we confirm that the lists are of equal\
    \ lengths, we use the range function to get the index of each element in the list.\
    \ We then add and append the results to the empty list we created. We then apply\
    \ the list method **reverse()** to our new list, to reverse the content of the\
    \ list.\n\n```python\ndef add_reverse(n:list, k:list):\n    # Creating an empty\
    \ list\n    new_list = []\n    if len(n) == len(k):\n        for i in range(0,\
    \ len(n)):\n            # adding and appending corresponding numbers\n       \
    \     new_list.append(n[i] + k[i])\n            # Reversing new list\n       \
    \     new_list.reverse()\n        return new_list\n    else:\n        return f'Lists\
    \ have different lengths'\n\n# Lists to add and reverse\nlist1 = [10, 12, 34]\n\
    list2 = [12, 56, 78]\n\nprint(add_reverse(list1, list2))\n```\n\n**Output:**\n\
    ```\n[112, 22, 68]\n```"
  mdcn: "## 第13天\n\n在这个挑战中，你将使用**类型转换**、**input()**函数以及**try**和**except**代码块来处理错误。用户的**输入**始终是字符串格式，因此我们使用**int()**函数将其转换为整数。**except**代码块确保我们处理**ValueError**。我们添加了while循环，以确保代码持续运行，直到输入有效的数字。\n\
    \n```python\ndef your_vat():\n    while True:\n        try:\n            price\
