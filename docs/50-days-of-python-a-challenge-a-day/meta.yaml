  md: "# Day 50\n\nThe first part of the challenge is to create the backend end of\
    \ the app. The backend of the app is powered by Python. With Just a few lines\
    \ of code, Flask will have the app running. When you install Flask you will have\
    \ to import it into your file. You will have to import **Flask** and **render_templates**.\
    \ The render_templates is used to render or generate our HTML templates. Below\
    \ is the script that runs the app. This file is saved as **app.py**.\n\n```\n\
    from flask import Flask, render_template\n\napp = Flask(__name__)\n\n@app.route('/')\n\
    def index():\n    return render_template('index.html')\n\n@app.route('/about')\n\
    def about():\n    return render_template('about.html')\n\nif __name__ == '__main__':\n\
    \    app.run(debug=True)\n```"
  merge: -1
