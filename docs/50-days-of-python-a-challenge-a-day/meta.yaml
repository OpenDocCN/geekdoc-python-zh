- md: '## Day 21: List of Tuples


    Write a function called `make_tuples` that takes two lists, **equal lists**, and
    combines them into a list of tuples. For example, if list **a** is `[1,2,3,4]`
    and list **b** is `[5,6,7,8]`, your function should return `[(1,5), (2,6), (3,7),
    (4,8)]`.


    ### Extra Challenge: Even Number or Average


    Write a function called `even_or_average` that ask a user to input five numbers.
    Once the user is done, the code should return the largest even number in the inputted
    numbers. If there is no even number in the list, the code should return the average
    of all the five numbers.


    ## Day 22: Add Under_Score


    Create **three** functions. The first called `add_hash` takes a string and adds
    a hash # between the words. The second function called `add_underscore` removes
    the hash (#) and replaces it with an underscore "_" The third function called
    `remove_underscore`, removes the underscore and replaces it with nothing. if you
    pass ''Python'' as an argument for the three functions, and you call them at the
    same time like:

    `print(remove_underscore(add_underscore(add_hash(''Python''))))`

    it should return ''Python''.


    ## Day 23: Simple Calculator


    Create a simple calculator. The calculator should be able to perform basic math
    operations, **add**, **subtract**, **divide** and **multiply**. The calculator
    should take input from users. The calculator should be able to handle **ZeroDivisionError**,
    **NameError**, and **ValueError**.


    ### Extra Challenge: Multiply Words


    ```

    s = "love live and laugh"

    ```


    Write a function called `multiply_words` that takes a string as an argument and
    multiplies the length of each word in the string by the length of other words
    in the string. For example, the string above should return **240 - love (4) live
    (4) and (3) laugh (5)**. However, your function should only multiply words will
    all lowercase letters. If a word has one upper case letter, it should be ignored.
    For example, the following string:


    ```

    s = "Hate war love Peace" should return 12 – war (3) love (4). Hate and Peace
    will be ignored because they have at least one uppercase letter.

    ```


    ## Day 24: Average Calories


    Create a function called `average_calories` that calculates the average calories
    intake of a user. The function should ask the user to input their calories intake
    for **any** number of days and once they hit **''done''** it should calculate
    and **return** the average intake.


    ### Extra Challenge: Create a Nested List


    Write a function called `nested_lists` that takes any number of lists and creates
    a 2-dimensional nested list of lists. For example, if you pass the following lists
    as arguments: `[1, 2, 3, 5]`, `[1, 2, 3, 4]`, `[1, 3, 4, 5]`.

    Your code should return: `[[1, 2, 3, 5], [1, 2, 3, 4], [1, 3, 4, 5]]`


    ## Day 25: All the Same


    Create a function called `all_the_same` that takes one argument, a **string**,
    a **list**, or a **tuple** and checks if all the elements are the same. If the
    elements are the same, the function should return **True**. If not, it should
    return **False**. For example, `[''Mary'', ''Mary'', ''Mary'']` should return
    **True**.


    ### Extra Challenge: Reverse a String


    ```

    str1 = "the love is real"

    ```


    Write a function called `read_backwards` that takes a string as an argument and
    reverses it. For example, the string above should return: **"real is love the"**


    ## Day 26: Sort Words


    Write a function called **sort_words** that takes a string of words as an argument,
    removes the whitespaces, and returns a list of letters sorted in alphabetical
    order. Letters will be separated by commas. All letters should appear once in
    the list. This means that you sort and remove duplicates. For example **''love
    life''** should return as [''e,f,i,l,o,v''].


    ### Extra Challenge: Length of Words


    s = ''Hi my name is Richard''


    Write a function called **string_length** that takes a string of words (words
    and spaces) as argument. This function should return the length of all the words
    in the string. Return the results in a form of a dictionary. The string above
    should return:


    **{''Hi'': 2, ''my'': 2, ''name'': 4, ''is'': 2, ''Richard'': 7}**


    ## Day 27: Unique Numbers


    Write a function called `unique_numbers` that takes a list of numbers as an argument.
    Your function is going to find all the unique numbers in the list. It will then
    sum up the unique numbers. You will calculate the difference between the **sum
    of all the numbers in the original list** and the **sum of unique numbers in the
    list**. If the difference is an **even** number, your function should return the
    **original list**. If the difference is an **odd** number, your function should
    return a **list with unique numbers only**. For example **[1, 2, 4, 5, 6, 7, 8,
    8]** should return **[1, 2, 4, 5, 6, 7, 8, 8]**.


    ### Extra Challenge: Difference of two Lists


    Write a function called `difference` that takes **two** lists as arguments. This
    function should return all the elements that are in list **a** but not in list
    **b** and all the elements in list **b** not in list **a**. **For example:**


    ```

    list1 = [1, 2, 4, 5, 6]

    list2 = [1, 2, 5, 7, 9]

    should return:

    [4, 6, 7, 9]

    ```


    Use **list comprehension** in your function.


    ## Day 28: Return Indexes


    Write a function called `index_position`. This function takes a string as a parameter
    and returns the positions or indexes of all lower letters in the string. For example,
    ‘LovE’ should return [1,2].


    ### Extra Challenge: Largest Number


    Write a function called `largest_number` that takes a list of integers and re-arrange
    the individual digits to create the largest number possible. For example, if you
    pass the following as an argument: list1 = [3, 67, 87, 9, 2]. Your code should
    return the number in this exact format: 9,877,632 as the largest number.


    ## Day 29: Middle Figure


    Write a function called `middle_figure` that takes two parameters **a**, and **b**.
    The two parameters are strings. The function **joins** the two strings and finds
    the **middle element**. If the combined string has a middle element, the function
    should return the **element**, otherwise, return ''**no middle figure**''. Use
    ''**make love**'' as an argument for **a** and ''**not wars**'' as an argument
    for **b**. Your function should return ''**e**'' as the middle element. Whitespaces
    should be removed.


    ## Day 30: Most Repeated Name


    Write a function called `repeated_name` that finds the most repeated name in the
    following list.


    ```

    name = ["John", "Peter", "John", "Peter", "Jones", "Peter"]

    ```


    ### Extra Challenge: Sort by Last Name


    You work for a local school in your area. The school has a list of names of students
    saved in a list. The school has asked you to write a program that takes a list
    of names and sorts them alphabetically. The names should be sorted by last names.
    Here is a list of names:


    [''Beyonce Knowles'', ''Alicia Keys'', ''Katie Perry'', ''Chris Brown'', ''Tom
    Cruise'']


    Your code should not just sort them alphabetically, but it should also switch
    the names (the last name must be the first). Here is how your code output should
    look:


    [''Brown Chris'', ''Cruise Tom'', ''Keys Alicia'', ''Perry Katie'', ''Knowles
    Beyonce'']


    Write a function called `sorted_names`.


    ## Day 31: Longest Word


    Write a function that has one parameter and takes a list of words as an argument.
    The function returns the longest word from the list. Name the function `longest_word`.
    The function should return the longest word and the number of letters in that
    word. For example, if you pass `[''Java'', ''JavaScript'', ''Python'']`, your
    function should return `[10, JavaScript]` as the longest word.


    ### Extra Challenge: Create User


    Write a function called `create_user`. This function asks the user to enter their
    **name**, **age**, and **password**. The function saves this information in a
    dictionary. For example, if the use enters name as **Peter**, age - **18** and
    password - **love**. The function should save the information as: `{''name'':
    ''Peter'', ''age'': 18, ''password'': ''love''}`


    Once the information is saved. The function should print to the user that - "**User
    saved. Please login**"


    The function should then ask the user to **re-enter** their name and password.
    If the name and password match with what is saved in the dictionary, the function
    should return "**Logged in successfully**". If the name and password do not match
    with what is saved in the dictionary, the function should print (''**Wrong password
    or user name. Please try again**''. The function should keep running until the
    user enters correct logging details.'
