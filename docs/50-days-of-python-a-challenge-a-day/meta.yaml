    ```\n\n**输出：**\n```\n[34, 67, 78]\n```\n\n## 第17天\n\n在这个练习中，你将使用**random模块**。每次调用该函数时，random模块会生成一个0到10之间的随机数。这个数字使用`+`号添加到姓名的末尾。我们使用切片`[::-1]`来反转姓名。另一种方法是使用**reverse()**方法来反转姓名。\n\
    \n```python\nimport random\n\nnum = random.randint(0,10)\n\ndef user_name():\n\
    \    name = input('Enter name: ')\n    name = name[::-1]\n    username = name\
    \ + str(num)\n    return username\nprint(user_name())\n```\n\n## 额外挑战：按长度排序\n\n\
    对于这个挑战，我们找到最长的单词，然后将其与较短的单词交换位置。较短的单词排在前面，较长的单词排在后面。\n\n```python\ndef sort_length(arr:\
    \ list):\n    for item in range(len(arr)):\n        for j in range(len(arr) -\
    \ 1):\n            # 检查是否有单词比另一个长\n            if len(arr[j]) > len(arr[j + 1]):\n\
    \                # 交换最长的和最短的\n                arr[j], arr[j + 1] = arr[j + 1],\
    \ arr[j]\n\n    return arr\n\nnames = [\"Peter\", \"Jon\", \"Andrew\"]\n\nprint(sort_length(names))\n\
    ```\n\n**输出：**\n```\n['Jon', 'Peter', 'Andrew']\n```\n\n## 第18天\n\n在这个挑战中，你将了解**\\\
    *args**。你可以使用任何你想要的单词作为参数，只要在单词开头使用`*`号即可。然而，使用**args**是常见的约定。**\\*args**只是告诉函数我们不确定需要多少个参数，因此函数允许我们添加尽可能多的参数。在下面的例子中，我们添加了两个数字作为参数。然而，我们可以添加任意多的数字，函数都能正常工作。**\\\
    *args**使函数更加灵活。\n\n```python\ndef any_num (*args):\n    ave = sum(args)/len(args)\n\
    \    return f'The average is {ave}'\n\nprint(any_num(12, 90))\n```\n\n**输出：**\n\
    ```\nThe average is 51.0\n```\n\n在这个函数中，我们添加了更多参数。\n\n```python\ndef any_num (*args):\n\
    \    ave = sum(args)/len(args)\n    return f'The average is {ave}'\n\nprint(any_num(12,\
    \ 90, 12, 34))\n```\n\n**输出：**\n```\nThe average is 37.0\n```\n\n## 额外挑战：相加并反转\n\
    \n这个挑战最好使用**range()**函数来解决。第一步是检查列表是否具有相同的长度；我们为此使用**len()**函数。一旦确认列表长度相同，我们就使用range函数获取列表中每个元素的索引。然后，我们将结果相加并追加到我们创建的空列表中。接着，我们对新列表应用列表方法**reverse()**，以反转列表的内容。\n\
    \n```python\ndef add_reverse(n:list, k:list):\n    # 创建一个空列表\n    new_list = []\n\
    \    if len(n) == len(k):\n        for i in range(0, len(n)):\n            # 相加并追加对应的数字\n\
    \            new_list.append(n[i] + k[i])\n            # 反转新列表\n            new_list.reverse()\n\
    \        return new_list\n    else:\n        return f'Lists have different lengths'\n\
    \n# 要相加并反转的列表\nlist1 = [10, 12, 34]\nlist2 = [12, 56, 78]\n\nprint(add_reverse(list1,\
    \ list2))\n```\n\n**输出：**\n```\n[112, 22, 68]\n```"
