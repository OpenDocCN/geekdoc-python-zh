  md: '# Introduction


    Challenges in general are the building blocks to a strong character. What does
    not kill you makes you stronger, they say. Apply the same principle to your Python
    learning journey and you will be unstoppable. Challenges are what this book is
    about. Your ability to solve them is what you are about. This book presents you
    with an opportunity to master some of the most important concepts and fundamentals
    of the Python language by solving challenges. There are more than 80 challenges
    in this book, and you are required to solve them in 50 days. Solve one challenge
    or two a day and go on about your business and by the end of 50 days, you will
    have mastered Python fundamentals.


    # Why Solve challenges?


    A programmer''s job is to write code to solve problems. When you solve a challenge,
    not only do you get to cement your knowledge, but you master the invaluable skill
    of finding solutions to problems. Solving challenges helps you think. By solving
    challenges, you get to see how your code can solve real-life situations that programmers
    face.


    # How to Use this Book?


    To get the best out of this book, you have to try your level best to solve the
    problem on your own. Do not rush to look up the answer. Remember, you have the
    whole day to solve one problem. Some problems may be easy to solve depending on
    your level of experience. Most of the problems in this book are for people that
    are beginning (beginners and intermediate) their Python journey. Remember that,
    in most instances, there is more than one way to solve a problem. Your solution
