  md: "# Day 49\n\nCreating and saving the movies to the database. The first step\
    \ is to **import SQLite** and create a database(**movies.db**). Then we create\
    \ a table called **movies** with all the columns that we need (**year, title,\
    \ and genre**). There are two ways to upload data to our database. The first one\
    \ is using the command **cur.execute**. This method only uploads one item at a\
    \ time. Since we want to upload many items at once, we use **cur.executemany**.\
    \ To do this we create a list with all the movies that we want to upload (movies\
    \ variable). Once we upload, we need to commit and close to make those changes\
    \ permanent.\n\n```\nimport sqlite3\n\ncon = sqlite3.connect('movies.db')\ncur\
    \ = con.cursor()\n\n# Creating a table in the database\ncur.execute('CREATE TABLE\
    \ movies(year,title, genre)')\n\n# Creating a variable of all the movies\nmovies\
    \ = [(2009, 'Brothers', 'Drama'),\n          (2002, 'Spider-Man', 'Sci-fi'),\n\
    \          (2009, 'WatchMen', 'Drama'),\n          (2010, 'Inception', 'Sci-fi'),\n\
    \          (2009, 'Avatar', 'Fantasy')]\n\ncur .executemany('''INSERT INTO movies\
    \ VALUES(?, ?, ?);\n''', movies)\n\n# commit and close\ncon.commit()\ncon.close()\n\
    ```"
  merge: -1
  pgno: 132
- img_proc: true
  md: "a. Creating a query to see all the movies in the table. First, we connect back\
    \ to the database and then we run the query below:\n\n```\ncon = sqlite3.connect('movies.db')\n\
    cur = con.cursor()\n\nrow = cur.fetchall()\nfor row in cur.execute('SELECT * FROM\
    \ Movies;'):\n    print(row)\n```\n\nOutput:\n\n```\n(2009, 'Brothers', 'Drama')\n\
    (2002, 'Spider-Man', 'Sci-fi')\n(2009, 'WatchMen', 'Drama')\n(2010, 'Inception',\
    \ 'Sci-fi')\n(2009, 'Avatar', 'Fantasy')\n```\n\nb. To see the movie ‘Brothers’\
    \ we add **WHERE** to our SQL query. WHERE is a conditional statement.\n\n```\n\
    con = sqlite3.connect('movies.db')\ncur = con.cursor()\n\nrow = cur.fetchall()\n\
    for row in cur.execute('SELECT * FROM Movies WHERE '\n                      'title\
    \ =\"Brothers\";'):\n    print(row)\n```\n\nOutput:\n\n```\n(2009, 'Brothers',\
    \ 'Drama')\n```"
  merge: -1
  pgno: 133
- img_proc: true
  md: "c. For this query, we want to see movies released in **2009**. Here is that\
    \ SQL query to make it happen.\n\n```\ncon = sqlite3.connect('movies.db')\ncur\
    \ = con.cursor()\n\nrow = cur.fetchall()\nfor row in cur.execute('SELECT * FROM\
    \ Movies WHERE '\n                      'year = 2009'):\n    print(row)\n```\n\
    \n**Output:**\n\n```\n2009, 'WatchMen', 'Drama')\n(2009, 'Avatar', 'Fantasy')\n\
    ```\n\nd. This question requires that we put multiple conditions in our query.\
    \ We need movies that are in the **'Drama'** and **'Fantasy'** genres. Here is\
    \ the query below:\n\n```\ncon = sqlite3.connect('movies.db')\ncur = con.cursor()\n\
    \nrow = cur.fetchall()\nfor row in cur.execute('SELECT * FROM Movies WHERE '\n\
    \                      'genre = \"Fantasy\" OR genre = \"Drama\";'):\n    print(row)\n\
    ```\n\n**Output:**\n\n```\n(2009, 'Brothers', 'Drama')\n(2009, 'WatchMen', 'Drama')\n\
    (2009, 'Avatar', 'Fantasy')\n```"
