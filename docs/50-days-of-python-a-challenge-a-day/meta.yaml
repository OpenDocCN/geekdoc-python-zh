    \ then we search for all the elements that start with ‘S’. Using the dictionary\
    \ method – **update**, we update the empty dictionary with the results of our\
    \ search.\n\n```python\nnames = [\"Joseph\", \"Nathan\", \"Sasha\", \"Kelly\"\
    ,\n        \"Muhammad\", \"Jabulani\", \"Sera\", \"Patel\", \"Sera\"]\n\nd = {}\
    \  # Creating an empty dictionary\nfor name in names:\n    if name.startswith('S'):\n\
    \        # Using the dictionary update method\n        d.update({name: names.count(name)})\n\
    print(d)\n```\n\n**Output:**\n`{'Sasha': 1, 'Sera': 2}`\n\n### Second Method\n\
    \nAnother method would be to use the **Counter** class from the collections module.\
    \ The Counter class keeps track of elements and their count and stores the results\
    \ in a dictionary. It returns the name of the element as a key and its count as\
    \ value. See code below:\n\n```python\nfrom collections import Counter\n\ncount\
    \ = []  # Creating an empty list\nfor name in names:\n    if name.startswith(\"\
    S\"):\n        # Appending names that start with S to the list\n        count.append(name)\n\
    \        # Using the counter method to return a dictionary\n        names = Counter(count)\n\
    print(names)\n```\n\n**Output:**\n`Counter({'Sera': 2, 'Sasha': 1})`\n\n## Day\
    \ 8\n\nIn this challenge, we use the modulus operator to find even and odd in\
