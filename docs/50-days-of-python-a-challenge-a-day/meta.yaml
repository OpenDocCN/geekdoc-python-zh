    print(multiply_words(str3))\n```\n\n**Output:**\n\n```\n('The prod of the word\
    \ lengths is', 240)\n('The prod of the word lengths is', 12)\n```\n\n## Day 24\n\
    \nThis simple average calorie calculator will run until the user enters ‘**done**’,\
    \ then it will calculate the average calories. The input from the user is added\
