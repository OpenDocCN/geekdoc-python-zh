    \ We use the **str()** function to convert x into a string before calling the\
    \ **join()** function to join the string with dots.\n\n```python\ndef string_range(num:\
    \ int):\n    x = [str(i) for i in range(num)]\n    # Using join method to add\
    \ dots\n    x = \".\".join(x)\n    return x\n\nprint(string_range(6))\n```\n\n\
    **Output:**\n0.1.2.3.4.5\n\n## Extra Challenge: Dictionary of names\n\nIn this\
    \ challenge we are asked to create a dictionary of names that start with ‘S’.\
    \ So, first we need to find all the names in the list that start with ‘S’, then\
    \ we need to return these results in a dictionary. The easy way to find the names\
    \ is to use the **startswith** method. This method will return all names that\
