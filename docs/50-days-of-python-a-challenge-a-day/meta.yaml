    print(nested_lists([1, 2, 3, 5], [1, 2, 3, 4], [1, 3, 4, 5]))\n```\n\n**Output:**\n\
    \n```\n[[1, 2, 3, 5], [1, 2, 3, 4], [1, 3, 4, 5]]\n```\n\n## Day 25\n\nWe are\
    \ using the in-built **all()** function. The **all()** function will return **True**\
    \ if all the elements of iterable are true.\n\n```python\ndef all_the_same(a):\n\
    \    a = all(i == a[0] for i in a)\n    return a\n\nprint(all_the_same(['Mary',\
    \ 'Mary', 'Mary']))\n```\n\nOutput:\nTrue\n\nWe can also use the built-in **enumerate()**\
    \ function. The enumerate function will return an item and its index. We can use\
