    \ user guesses the right number or when they run out of guesses. The user gets\
    \ a maximum of three (3) guesses.\n\n```\nimport random\n\nrandom_number = random.randint(0,10)\n\
    \ndef guess_number():\n    c = 0\n    while c < 4:\n        guess = int(input(\"\
    Guess a number \"\n                         \"between 1 and 10: \"))\n       \
    \ c += 1\n        if c == 3:\n            print(\"You have run out of guesses.\
