    \ to a list. We then use the **join()** method to join the elements in our output\
    \ list into a single string.\n\n```python\ndef capitalize(a: str):\n    upper\
    \ = []\n    for i, word in enumerate(a.split()):\n        if word[0].islower():\n\
    \            upper.append(word.capitalize())\n        else:\n            upper.append(word)\n\
