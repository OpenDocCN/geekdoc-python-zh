    \ = (rate * 100) + ((period-100) * (rate + 5))\n\n    return f'Teacher: {name},\
    \ \\nPeriods: {period} \\nGross salary:{gross_salary:,}'\n\nprint(your_salary())\n\
    ```\n\n**输出：**\n```\nTeacher: John Kelly,\nPeriods: 105\nGross salary:2,125\n\
    ```\n\n## 第15天\n\n这个挑战测试你在Python中使用负数字符串**切片**、**if语句**和**运算符**的能力。`[::-1]`反转字符串，而`==`运算符将原始字符串与反转后的字符串进行比较。\n\
    \n```python\ndef same_in_reverse(a):\n    if a == a[::-1]:\n        return True\n\
    \    else:\n        return False\n\nprint(same_in_reverse('mad'))\n```\n\n**输出：**\n\
    ```\nFalse\n```\n\n## 额外挑战：我的年龄是多少？\n\n这个挑战是关于使用字典的。由于字典中的所有键都是**小写**的，因此将用户的输入转换为小写。然后，我们遍历字典以查看输入的姓名是否存在于我们的数据库中。一旦找到，我们就使用**get**方法访问字典值（即该人的年龄）。如果姓名不在字典中，我们使用**while循环**用用户提供的新信息更新字典。更新字典后，我们将更新后的信息返回给用户。请参阅以下代码：\n\
    \n```python\nnames_age = {\"jane\": 23, \"kerry\": 45, \"tim\": 34, \"peter\"\
    : 27}\n\ndef your_age():\n    # 将姓名转换为小写字母\n    name = input(\"Please enter your\
