    **''done''**，它应该计算并**返回**平均摄入量。


    ### 额外挑战：创建嵌套列表


    编写一个名为 `nested_lists` 的函数，该函数接受任意数量的列表，并创建一个二维嵌套列表。例如，如果你将以下列表作为参数传递：`[1, 2, 3,
    5]`、`[1, 2, 3, 4]`、`[1, 3, 4, 5]`。

    你的代码应该返回：`[[1, 2, 3, 5], [1, 2, 3, 4], [1, 3, 4, 5]]`


    ## 第25天：全部相同


    创建一个名为 `all_the_same` 的函数，该函数接受一个参数，可以是**字符串**、**列表**或**元组**，并检查所有元素是否相同。如果元素相同，函数应该返回
    **True**。否则，它应该返回 **False**。例如，`[''Mary'', ''Mary'', ''Mary'']` 应该返回 **True**。


    ### 额外挑战：反转字符串


    ```

    str1 = "the love is real"

    ```


    编写一个名为 `read_backwards` 的函数，该函数接受一个字符串作为参数并将其反转。例如，上面的字符串应该返回：**"real is love
    the"**


    ## 第26天：单词排序


    编写一个名为 **sort_words** 的函数，该函数接受一个单词字符串作为参数，移除空格，并返回一个按字母顺序排序的字母列表。字母之间用逗号分隔。所有字母在列表中只出现一次。这意味着你需要排序并去重。例如
    **''love life''** 应该返回 [''e,f,i,l,o,v'']。


    ### 额外挑战：单词长度


    s = ''Hi my name is Richard''


    编写一个名为 **string_length** 的函数，该函数接受一个单词字符串（单词和空格）作为参数。此函数应该返回字符串中所有单词的长度。以字典形式返回结果。上面的字符串应该返回：


    **{''Hi'': 2, ''my'': 2, ''name'': 4, ''is'': 2, ''Richard'': 7}**


    ## 第27天：唯一数字


    编写一个名为 `unique_numbers` 的函数，该函数接受一个数字列表作为参数。你的函数将找到列表中所有唯一的数字。然后它将对这些唯一数字求和。你将计算**原始列表中所有数字的总和**与**列表中唯一数字的总和**之间的差值。如果差值是**偶数**，你的函数应该返回**原始列表**。如果差值是**奇数**，你的函数应该返回一个**仅包含唯一数字的列表**。例如
    **[1, 2, 4, 5, 6, 7, 8, 8]** 应该返回 **[1, 2, 4, 5, 6, 7, 8, 8]**。


    ### 额外挑战：两个列表的差集


    编写一个名为 `difference` 的函数，该函数接受**两个**列表作为参数。此函数应该返回所有在列表 **a** 中但不在列表 **b** 中的元素，以及所有在列表
    **b** 中但不在列表 **a** 中的元素。**例如：**


    ```

    list1 = [1, 2, 4, 5, 6]

    list2 = [1, 2, 5, 7, 9]

    应该返回：

    [4, 6, 7, 9]

    ```


    在你的函数中使用**列表推导式**。


    ## 第28天：返回索引


    编写一个名为 `index_position` 的函数。此函数接受一个字符串作为参数，并返回字符串中所有小写字母的位置或索引。例如，‘LovE’ 应该返回
    [1,2]。


    ### 额外挑战：最大数字


    编写一个名为 `largest_number` 的函数，该函数接受一个整数列表，并重新排列各个数字以创建可能的最大数字。例如，如果你将以下内容作为参数传递：list1
    = [3, 67, 87, 9, 2]。你的代码应该以这种精确格式返回数字：9,877,632 作为最大数字。


    ## 第29天：中间元素


    编写一个名为 `middle_figure` 的函数，该函数接受两个参数 **a** 和 **b**。这两个参数是字符串。函数**连接**这两个字符串并找到**中间元素**。如果组合后的字符串有中间元素，函数应该返回该**元素**，否则，返回
    ''**no middle figure**''。使用 ''**make love**'' 作为 **a** 的参数，使用 ''**not wars**''
    作为 **b** 的参数。你的函数应该返回 ''**e**'' 作为中间元素。应移除空格。


    ## 第30天：最常重复的名字


    编写一个名为 `repeated_name` 的函数，在以下列表中找到最常重复的名字。


    ```

    name = ["John", "Peter", "John", "Peter", "Jones", "Peter"]

    ```


    ### 额外挑战：按姓氏排序


    你在当地一所学校工作。学校有一个保存学生姓名的列表。学校要求你编写一个程序，该程序接受一个姓名列表并按字母顺序排序。姓名应按姓氏排序。以下是姓名列表：


    [''Beyonce Knowles'', ''Alicia Keys'', ''Katie Perry'', ''Chris Brown'', ''Tom
    Cruise'']


    你的代码不仅应该按字母顺序排序，还应该交换姓名（姓氏必须在前）。你的代码输出应如下所示：


    [''Brown Chris'', ''Cruise Tom'', ''Keys Alicia'', ''Perry Katie'', ''Knowles
    Beyonce'']


    编写一个名为 `sorted_names` 的函数。


    ## 第31天：最长单词


    编写一个具有一个参数的函数，该函数接受一个单词列表作为参数。函数返回列表中最长的单词。将函数命名为 `longest_word`。函数应该返回最长的单词以及该单词中的字母数。例如，如果你传递
    `[''Java'', ''JavaScript'', ''Python'']`，你的函数应该返回 `[10, JavaScript]` 作为最长的单词。


    ### 额外挑战：创建用户


    编写一个名为 `create_user` 的函数。此函数要求用户输入他们的**姓名**、**年龄**和**密码**。函数将此信息保存在字典中。例如，如果用户输入姓名为
    **Peter**，年龄 - **18**，密码 - **love**。函数应将信息保存为：`{''name'': ''Peter'', ''age'':
    18, ''password'': ''love''}`


    信息保存后。函数应向用户打印 "**User saved. Please login**"。


    然后函数应要求用户**重新输入**他们的姓名和密码。如果姓名和密码与字典中保存的信息匹配，函数应返回 "**Logged in successfully**"。如果姓名和密码与字典中保存的信息不匹配，函数应打印
    ''**Wrong password or user name. Please try again**''。函数应持续运行，直到用户输入正确的登录信息。'
