    \            # 打印蛇形表情符号\n            print(emojize(':snake:'), end=\" \")\n  \
    \      print(\"\\n\")\n\nmoney_pyramid(7)\n```\n\n**输出：**\n\n## 第14天\n\n注意到我们在下面的代码中如何使用嵌套的**for循环**了吗？第一个**for循环**访问外层列表，内部的**for循环**访问内层列表。一旦我们访问到内层列表的元素，就将它们追加到**list1**中。通过这段简短的代码，我们展平了列表。\n\
    \n```python\ndef convert_list(lst1: list):\n    list1 = []\n    for items in lst1:\n\
