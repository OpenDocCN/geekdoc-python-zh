- md: "## Setting up Python and Pygame\n\nWelcome to the world of PyGame and Python\
    \ programming! This book will provide you with a comprehensive introduction to\
    \ the PyGame library and teach you how to create your own, custom games using\
    \ the Python language. We will start with a basic overview of Python and the PyGame\
    \ library, before moving on to designing, writing, and debugging our own game.\
    \ From adding graphics and sounds, to creating animations and power-ups, we will\
    \ cover everything that you need to know to create your own rich, interactive\
    \ game. Finally, we will go through the process of debugging and testing our game,\
    \ before publishing it for the world to enjoy. So, let’s get started and learn\
    \ how to make your own game with PyGame and Python!\n\n## Getting Started\n\n\
    ### Installing Python\n\nYou can find the latest version of Python at [Python.org](https://www.python.org/downloads/)¹.\
    \ There are both 32-bit and 64-bit versions available. Once you have clicked on\
    \ the Download button, run the executable that you downloaded and follow the instructions\
    \ to install the latest Python on your machine.\n\n¹https://www.python.org/downloads/\n\
    \n### Installing VSCode\n\nVisual Studio Code is available for Windows, MacOS,\
    \ Linux operating systems. You can download Visual Studio Code from https://code.visualstudio.com/download.\
    \ Choose the appropriate download for your OS and then run the installation. Once\
    \ you’ve installed Visual Studio Code, you’ll want to install Python and Pylance\
    \ extensions.\n\n**Python Extension:**\n\nThe Python extension for Visual Studio\
    \ Code provides a wide range of features to help make Python development in VS\
    \ Code easier, including linting, debugging, IntelliSense code completion, code\
    \ formatting, refactoring, unit testing, and more. The extension is open source\
    \ and available for free, and it can be installed by searching for it in the VS\
    \ Code extension market. With the Python extension, developers can quickly and\
    \ easily create and manage their Python projects, and also take advantage of a\
    \ wide range of advanced features.\n\n**Pylance Extension:**\n\nPylance is a Visual\
    \ Studio Code extension that provides an enhanced Python language support, including\
    \ fast feature-rich IntelliSense, linting, project-wide analysis, and debugging.\
    \ Pylance uses the Language Server Protocol (LSP) to communicate with the language\
    \ server, and it supports a wide range of features such as autocomplete, code\
    \ refactoring, code navigation, and error diagnostics. Pylance also provides an\
    \ auto-import feature which can automatically add imports for symbols when you\
    \ type them in your code. Pylance is a great tool for Python developers to quickly\
    \ and efficiently write code.\n\nTo install the extensions, go to the extensions\
    \ symbol on the left hand bar of Visual Studio Code and search the marketplace\
    \ for Pylance. Click on it and install the extension into Visual Studio Code.\
    \ Also look for an extension called Python and install that as well.\n\n### Installing\
    \ Pygame\n\nPygame is an open source library for making games in Python. It has\
    \ a wide range of features and functions that make it easy to get started making\
    \ games.\n\nYou can find the documentation for Pygame at [pygame.org](http://pygame.org).\n\
    \nTo get started using Pygame, you will need to install it. The easiest way to\
    \ install Pygame is from the terminal inside of VSCode. Click the terminal at\
    \ the top of the menu and type the following line:\n\n```\npip install pygame\n\
    ```\n\nIf you don't have pip already installed, you will have to go to https://bootstrap.pypa.io/get-pip.py\
    \ and download the file into your Python application directory. To figure out\
    \ where Python is installed, you can actually ask Python! Go to the terminal in\
    \ Visual Code and type\n\n```\npython\n```\n\nYou'll see the `>>>` prompt. Put\
    \ in the following code\n\n```\n>>> import os\n>>> import sys\n>>> os.path.dirname(sys.executable)\n\
    ```\n\nThis will spit out the path where you'll place your get-pip.py file.\n\n\
    e.g. `C:\\Python310` on Windows\n\nPlace get-pip.py in the revealed path and then\
    \ run\n\n```\npy get-pip.py\n```\n\n> Note: You may need to add the Python path\
    \ to your environment variables path.\n\nThe two paths I have are shown below\n\
    \n![](img/8145adbe7df11d992ef844f05cbb3fe0_7_0.png)\n\n## Intro To Python\n\n\
    In the chapters to follow, we will be programming in Python, so we need to give\
    \ you the foundation to understand the language constructs we will be using as\
    \ well as how to run them. The following chapter will guide you through the use\
    \ of the most common pieces of the language and what we will be utilizing to build\
    \ our game. First let’s answer a few common questions about Python.\n\n### History\
    \ of Python\n\nPython was created by Guido van Rossum and first released in 1991.\
    \ Python is a high-level, interpreted, general-purpose programming language. Python\
    \ has become popular due to its clear syntax and readability. Python also supports\
    \ modules and packages, which allows for code reusability.\n\nPython is an interpreted\
    \ language, which means that it is compiled at run-time. This allows Python code\
    \ to be more forgiving of errors and makes debugging easier. Python also supports\
    \ a number of open source systems and frameworks, such as Django and Flask.\n\n\
    Python is often used for scientific computing, web development, machine learning,\
    \ and automation. Python has a large and active community, making it easy to find\
    \ help and support online. Python is used by organizations such as Google, Yahoo,\
    \ and NASA.\n\n### What makes Python Different than other languages?\n\nPython\
    \ is an interpreted language, which makes it easier to get started with than other\
    \ languages such as C or Java. It is also dynamically typed, meaning you don't\
    \ need to declare a type when creating a variable. This makes the language more\
    \ expressive and can reduce the complexity of some applications. Python is also\
    \ highly extensible, which means that it can be extended with existing libraries\
    \ and new modules written in C, C++, or other languages. Additionally, Python's\
    \ syntax is relatively simple and easy to learn.\n\n### What types of applications\
    \ are built with Python?\n\nPython is used in a wide variety of applications,\
    \ including desktop GUI applications, web applications, software development,\
    \ scientific and numeric computing, and artificial intelligence and machine learning.\
    \ Many of the most popular websites and services such as YouTube, Instagram, Quora,\
    \ and Dropbox were built using Python.\n\n### Why should I learn Python?\n\nAs\
    \ discussed, Python is a powerful and versatile programming language with a wide\
    \ range of applications and uses. It is easy to learn and has a high readability\
    \ level, making it a great choice for beginners, yet it is also popular with experienced\
    \ developers. It is a versatile language, meaning it can be used for a variety\
    \ of tasks - from web development to data science and machine learning. Python\
    \ also has a strong community of developers and users, so there is always support\
    \ and new tools available. Additionally, Python is an open-source language, meaning\
    \ that it can be used for free and is accessible to anyone with internet access.\n\
    \nNow that you know a little bit about the language, let’s create our first Python\
    \ program, just to get your feet wet. We are going to jump into Python.\n\nLet’s\
    \ start with a simple program that prints Hello World:\nCreate a New Folder in\
    \ VSCode called **HelloWorld**. Then create a new file called **HelloWorld.py**\
    \ and add the following line.\n\n```\nprint(\"Hello World\")\n```\n\nSave your\
    \ file. Go to your terminal in VSCode (the bash terminal) and run the Python with\
    \ the following command:\n\n```\npy -m HelloWorld\n```\n\nYou should see the following\
    \ output in your terminal window:\n\n```\nHello World\n```\n\nNot Bad! If you\
    \ got this far, you are up and running. Let’s turn up the dial a little bit. Let’s\
    \ write a program that writes Hello World 10 times. For this we will use a for\
    \ loop. A for loop lets us loop through a range of values and each time through\
    \ the loop print ‘Hello World’. Alter your HelloWorld.py file to the code below\
    \ and run.\n\n```\nfor number in range(5):\n    print ('Hello World')\n```\n\n\
    This program produces the following output"
  mdcn: "## 设置 Python 和 Pygame\n\n欢迎来到 PyGame 和 Python 编程的世界！本书将为你全面介绍 PyGame 库，并教你如何使用\
    \ Python 语言创建自己的定制游戏。我们将从 Python 和 PyGame 库的基本概述开始，然后逐步深入到我们自己的游戏的设计、编写和调试。从添加图形和声音，到创建动画和增强道具，我们将涵盖创建丰富、互动游戏所需了解的一切。最后，我们将经历调试和测试游戏的过程，然后将其发布供全世界欣赏。那么，让我们开始学习如何使用\
    \ PyGame 和 Python 制作你自己的游戏吧！\n\n## 入门\n\n### 安装 Python\n\n你可以在 [Python.org](https://www.python.org/downloads/)¹\
    \ 找到最新版本的 Python。有 32 位和 64 位版本可供选择。点击下载按钮后，运行你下载的可执行文件，并按照说明在你的机器上安装最新的 Python。\n\
    \n¹https://www.python.org/downloads/\n\n### 安装 VSCode\n\nVisual Studio Code 可用于\
    \ Windows、MacOS 和 Linux 操作系统。你可以从 https://code.visualstudio.com/download 下载 Visual\
    \ Studio Code。选择适合你操作系统的版本，然后运行安装程序。安装 Visual Studio Code 后，你需要安装 Python 和 Pylance\
    \ 扩展。\n\n**Python 扩展：**\n\nVisual Studio Code 的 Python 扩展提供了广泛的功能，旨在简化 VS Code\
    \ 中的 Python 开发，包括代码检查、调试、IntelliSense 代码补全、代码格式化、重构、单元测试等。该扩展是开源且免费的，可以通过在 VS\
    \ Code 扩展市场中搜索来安装。借助 Python 扩展，开发者可以快速轻松地创建和管理他们的 Python 项目，并利用各种高级功能。\n\n**Pylance\
    \ 扩展：**\n\nPylance 是一个 Visual Studio Code 扩展，提供增强的 Python 语言支持，包括快速、功能丰富的 IntelliSense、代码检查、项目范围分析和调试。Pylance\
    \ 使用语言服务器协议与语言服务器通信，并支持自动完成、代码重构、代码导航和错误诊断等广泛功能。Pylance 还提供自动导入功能，当你在代码中输入符号时，它可以自动添加导入语句。Pylance\
    \ 是 Python 开发者快速高效编写代码的绝佳工具。\n\n要安装扩展，请转到 Visual Studio Code 左侧栏的扩展图标，在市场中搜索 Pylance。点击它并将扩展安装到\
    \ Visual Studio Code 中。同时，也请查找名为 Python 的扩展并安装它。\n\n### 安装 Pygame\n\nPygame 是一个用于在\
    \ Python 中制作游戏的开源库。它具有广泛的功能和函数，使得入门制作游戏变得容易。\n\n你可以在 [pygame.org](http://pygame.org)\
    \ 找到 Pygame 的文档。\n\n要开始使用 Pygame，你需要安装它。安装 Pygame 最简单的方法是在 VSCode 内的终端中进行。点击菜单顶部的终端，然后输入以下命令：\n\
    \n```\npip install pygame\n```\n\n如果你还没有安装 pip，你需要前往 https://bootstrap.pypa.io/get-pip.py\
    \ 并将文件下载到你的 Python 应用程序目录中。要找出 Python 的安装位置，你实际上可以询问 Python！转到 Visual Code 中的终端并输入\n\
    \n```\npython\n```\n\n你会看到 `>>>` 提示符。输入以下代码\n\n```\n>>> import os\n>>> import\
    \ sys\n>>> os.path.dirname(sys.executable)\n```\n\n这将输出你放置 get-pip.py 文件的路径。\n\
    \n例如，在 Windows 上是 `C:\\Python310`\n\n将 get-pip.py 放在显示的路径中，然后运行\n\n```\npy get-pip.py\n\
    ```\n\n> 注意：你可能需要将 Python 路径添加到你的环境变量路径中。\n\n我拥有的两个路径如下所示\n\n![](img/8145adbe7df11d992ef844f05cbb3fe0_7_0.png)\n\
    \n## Python 简介\n\n在接下来的章节中，我们将使用 Python 进行编程，因此我们需要为你提供基础，以理解我们将使用的语言结构以及如何运行它们。下一章将指导你使用该语言最常见的部分，以及我们将用于构建游戏的内容。首先，让我们回答一些关于\
    \ Python 的常见问题。\n\n### Python 的历史\n\nPython 由 Guido van Rossum 创建，于 1991 年首次发布。Python\
    \ 是一种高级、解释型、通用编程语言。Python 因其清晰的语法和可读性而广受欢迎。Python 还支持模块和包，这允许代码重用。\n\nPython 是一种解释型语言，这意味着它在运行时编译。这使得\
    \ Python 代码对错误更具容忍性，并使调试更容易。Python 还支持许多开源系统和框架，例如 Django 和 Flask。\n\nPython 通常用于科学计算、Web\
    \ 开发、机器学习和自动化。Python 拥有一个庞大且活跃的社区，使得在网上寻求帮助和支持变得容易。Google、Yahoo 和 NASA 等组织都在使用\
