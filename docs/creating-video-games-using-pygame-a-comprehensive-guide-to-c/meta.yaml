  md: '# # Space Invasion in PyGame


    # ## Introduction


    Space Invaders is a classic video game developed by Taito Corporation in 1978.
    The game was designed by Tomohiro Nishikado, who was inspired by the hit game
    Breakout and the sci-fi classic movie “Star Wars”.


    The game was initially released in Japan, but it quickly gained popularity around
    the world, becoming a cultural phenomenon in the 1980s. Its simple gameplay and
    iconic 8-bit graphics made it a favorite among players and established it as a
    classic of the arcade era.


    In the game, players control a spaceship that must defeat waves of alien invaders
    that descend from the top of the screen. The game’s difficulty increases as the
    player progresses, with faster and more aggressive alien attacks.


    Space Invaders was not only a hit in arcades but also helped launch the video
    game industry and sparked a wave of space-themed games. It has been ported to
    numerous platforms over the years, including home consoles and personal computers,
    ensuring its continued popularity and status as a gaming icon.


    In this chapter, we’ll describe how to recreate the classic game using pygame.'
  merge: -1
