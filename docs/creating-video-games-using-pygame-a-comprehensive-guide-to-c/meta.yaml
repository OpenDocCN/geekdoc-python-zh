    \ - 180 + i * 50, 0))\n\n    def update_lives(self, lives):\n        self.lives\
    \ = lives\n```\n\n我们可以使用与玩家角色相同的图像作为生命值指示器，只需使用 `pygame.transform.scale` 方法将其缩小即可。\n\
