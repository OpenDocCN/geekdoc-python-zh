    # Detecting Collisions


    There is a built in function called **rect.colliderect** to detect collisions
    between sprites. We can loop through all the stones on the board and use the colliderect
    function to determine if one of the stones collides with the player rect on the
    board.


    The function we will create is called detect_collisions and it takes three arguments:


    **playerSprite**: a PlayerSprite object that represents the player character.
    **group**: a group of StoneSprites representing the stones on the board **piece_size**:
    an integer that represents the length and width of each sprite measured in number
    of pixels.


    The purpose of the function is to check if the player sprite has collided with
    any of the sprites in the group.


    The function starts by looping over all the sprites in the group using the .sprites()
    method. For each sprite, it creates a rectangle representation of the player sprite
    (playerRect) using the **pygame.Rect** constructor. The position of the player
    sprite is calculated by multiplying its row and column properties by piece_size,
    and the size of the rectangle is set to (piece_size, piece_size).


    The colliderect method of the playerRect object is then called on the rect property
    of the current StoneSprite being looped over. This method returns True if the
    player sprite rectangle and the current sprite rectangle intersect, meaning that
    a collision has occurred.'
