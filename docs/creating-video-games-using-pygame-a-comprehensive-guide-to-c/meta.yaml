    is trying to go off the board because we don''t want the player going beyond the
    game board. In the case of key up arrow, we limit the player to the third row
    of the grid so the player doesn''t start moving onto the game statistics. Once
    we determine that the player is within the game board, then we move the player
    one cell in the direction of the key that was pressed. For an up arrow, we subtract
    one from the player row to move them up a row in the game board grid.'
