  md: '# The Main Loop


    Similar to how we set up our main loop for the stone eater game, we need to do
    the same sort of thing for space invasion. The loop consists of responding to
    keyboard events in the game as well as drawing the various sprites and detecting
    collisions between them. To make the main loop easier to read, we’ve broken down
    the code to several high level functions.


    The first high level function, **process_events**, processes the keyboard events
    for the player moving and shooting. Here are the other high level functions and
    their descriptions:


    **handle_scoring** - updates the current score on the screen based on the players
    score. This function also updates the high score, and the lives indicator.


    **handle_alien_movement** - This function guides the aliens across the screen
    and helps the aliens reverse direction when they hit the edge of the screen. They
    also move down every time they hit the edge.


    **handle_player_movement** - handles player movement according to the arrow key
    they are pressing. The left arrow moves the player left until they release the
    key and same with the right arrow.


    **handle_bullet** - This function handles an active bullet coming from the player
    trying to hit the aliens. It moves the bullet up the screen at a certain speed
    each time through the game loop. It also checks to see if the bullet has collided
    with an alien with the function **handle_alien_hit**.


    **check_for_bomb_activation** - this function checks based on a randomly generated
    value whether or not an alien has released a bomb. If an alien has released a
    bomb it is recorded in an array to handle its movement later.


    **handle_active_bombs** loops through the bomb array and draws the active bombs.
    Also checks to see if the bomb hit the player by'
