    new concepts in our game. In this chapter we’ll learn how to handle keyboard events,
    animate our player character, and play sound to add another dimension to our game.


    # The Game Design


    # The Classes


    We will take advantage of classes for our game. There are multiple sprite classes
    we will use in the game, each sprite representing a game object. There will be
    a sprite used to draw the stone-eater as well as a sprite used to draw all the
    gems in the game. Also we will have sprites for each of the stats we use in the
    game: score, hi score, coordinates, and time. We will also create a general message
    sprite to post text like “play again?” Also, as we did in tic-tac-toe, we’ll create
    a game board class that will control all the game logic and game state for when
    a player eats a stone. Below are list of the classes we just mentioned:


    PlayerSprite StoneSprite GameBoard ScoreSprite HiScoreSprite TimeSprite CoordinateSprite
    MessageSprite


    # Game Layout


    Like Tic-Tac-Toe, the stone eater game is layed out like a grid. The game board
    in this game is a 20x20 grid with each cell having a width of 20 pixels. When
    the player moves up, down, left, or right, the stone eater moves to the next adjacent
    cell in the grid. Gems are also placed randomly inside the grid in different cells.


    Although the game board is a 20 x 20 grid, we only use the bottom 17 rows to leave
    room for the scoring sprites at the top of the game.'
