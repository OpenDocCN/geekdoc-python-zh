  - "[PAGE 139]\n\nIn summary, the `handle_saucer_movement` function ensures that\
    \ the saucer moves across the screen, updates its position, and switches its images\
    \ while active. When the saucer is dead, it shows the score for a set duration\
    \ before setting it to inactive.\n\n# Checking if we hit the saucer\n\nWhen we\
    \ shoot a bullet from our player, the bullet can either hit an alien, hit the\
    \ saucer, or go all the way to the top of the screen. We need to handle the case\
    \ where the bullet hits the saucer moving across the screen:\n\nInside of the\
    \ `handle_bullet` function, we need to check if the bullet collided with the saucer:\n\
    \n```\n1 def handle_bullet(bullet, bullet_active):\n2     ...\n3 \n4     if (handle_saucer_hit(bullet_x,\
    \ bullet_y)):\n5         bullet_active = False\n6         bullet.position = (0,\
    \ 0)\n```\n\nThe `handle_saucer_hit` function checks for saucer collision with\
    \ the bullet. If it collides, the function calls the kill function on the SaucerSprite.\
    \ The kill function, puts the saucer in a dead state which allows the saucer to\
    \ show the score for a few seconds after it was shot. This function also plays\
    \ a sound to indicate the saucer was hit and it adds the score from the saucer\
    \ bonus points."
  - '[PAGE 140]


    ```

    1 def handle_saucer_hit(bullet_x, bullet_y):

    2     global player_score, bullet, saucer

    3     (x, y) = saucer.position

    4     # check if bullet collides with saucer

    5     if bullet_x > x

    6         and bullet_x < x + saucer.get_width()

    7         and bullet_y > y

    8         and bullet_y < y + saucer.get_height():

    9             saucer.kill()

    10            saucer_dying.play()

    11            player_score += saucer.points

    12        return True

    13    return False

    ```


    # Conclusion


    In this chapter, we delved into the development of a dynamic first-person 2D shooter
    game, Space Invasion. Our journey encompassed essential game components such as
    user input, sound design, enemy movement, collision detection, and captivating
    animation.


    Though Space Invasion is slightly more intricate compared to our previous projects,
    it serves as an excellent blueprint for crafting your own real-time gaming experiences.
    As you design unique sprites, you can unleash your creativity by combining and
    adapting them across a multitude of game genres and concepts. This endeavor not
    only expands your skillset but also opens up a world of possibilities for innovation
    in the gaming landscape.'
