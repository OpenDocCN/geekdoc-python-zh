    called PlayerSprite that extends ImageSprite. The PlayerSprite class represents
    a player-controlled sprite that can move left or right, be killed, and explode.
    It has the following attributes:


    **dead**: a Boolean flag indicating whether the sprite is dead or not. **speed**:
    a float representing the speed at which the sprite moves left or right. **death_time**:
    an integer representing the time at which the sprite was killed. **animate_explosion**:
    a PygAnim object representing an animation of the sprite exploding.


    The PlayerSprite class has the following methods:


    **init(self, name, x, y)**: the constructor for the PlayerSprite class. It initializes
    the sprite’s position and sets its attributes to their initial values. **update**:
    a method that updates the sprite’s position. **kill**: a method that kills the
    sprite, triggering an explosion animation. **draw**: a method that draws the sprite
    on a given surface. If the sprite is not dead, it calls the superclass’s draw()
    method to draw the sprite image. If the sprite is dead, it plays the explosion
    animation and checks if enough time has passed for the explosion to be complete.
    **move_left**: a method that moves the sprite to the left by adjusting its position.
    **move_right**: a method that moves the sprite to the right by adjusting its position.'
