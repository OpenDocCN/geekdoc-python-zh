    \nIn the previous chapter we created a tic-tac-toe game to play against the computer.\
    \ Stone Eater is a game you play against the clock! The object of the game is\
    \ to eat as many valuable stones as you can before the clock runs out. Each stone\
    \ is worth either 1, 2, or 3 points, so you'll want to eat stones that have a\
    \ higher value. Stone Eater introduces a few new concepts in our game. In this\
    \ chapter we'll learn how to handle keyboard events, animate our player character,\
    \ and play sound to add another dimension to our game.\n\n### The Game Design\n\
    \n### The Classes\n\nWe will take advantage of classes for our game. There are\
    \ multiple sprite classes we will use in the game, each sprite representing a\
    \ game object. There will be a sprite used to draw the stone-eater as well as\
    \ a sprite used to draw all the gems in the game. Also we will have sprites for\
    \ each of the stats we use in the game: score, hi score, coordinates, and time.\
    \ We will also create a general message sprite to post text like \"play again?\"\
    \ Also, as we did in tic-tac-toe, we'll create a game board class that will control\
