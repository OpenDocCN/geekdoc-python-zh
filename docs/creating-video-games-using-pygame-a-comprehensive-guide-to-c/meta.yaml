  md: '```

    1 Hello World #1

    2 Hello World #2

    3 Hello World #3

    4 Hello World #4

    5 Hello World #5

    ```


    # The if statement


    What if we only wanted to print out even ''Hello World''s? We can now introduce
    the if statement which allows us to make some decisions of which of the Hello
    Worlds gets printed


    ```

    1 for number in range(5):

    2     numberToPrint = number + 1

    3     if numberToPrint % 2 == 0:

    4         print (f''Even Hello World #{numberToPrint}'')

    ```


    This code introduces the if statement for making decisions. In this case, the
    if statement uses the mod function (%) to determine if there are any remainders
