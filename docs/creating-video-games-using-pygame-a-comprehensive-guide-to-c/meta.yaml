- md: "## Player Explosion\n\nThe animate_explosion object uses the pyganim library\
    \ to handle the animating the ship explosion by quickly drawing each of the 8\
    \ frames of the explosion once through. The animation is initialized with all\
    \ the information it needs to play the explosion frames and how long each frame\
    \ will be shown:\n\n```python\nself.animate_explosion = pyganim.PygAnimation(\n\
    \    [(\"images/shipexplosion/frame1.gif\", 250),\n     (\"images/shipexplosion/frame2.gif\"\
    , 250),\n     (\"images/shipexplosion/frame3.gif\", 250),\n     (\"images/shipexplosion/frame4.gif\"\
    , 250),\n     (\"images/shipexplosion/frame5.gif\", 250),\n     (\"images/shipexplosion/frame6.gif\"\
    , 250),\n     (\"images/shipexplosion/frame7.gif\", 250),\n     (\"images/shipexplosion/frame8.gif\"\
    , 250),],\n    loop=False)\n```\n\nTo play the animation, we simply call the **play**\
    \ method on animate_explosion inside our kill method:\n\n```python\ndef kill(self):\n\
    \    self.animate_explosion.play()\n    self.dead = True\n    self.death_time\
    \ = pygame.time.get_ticks()\n```\n\n## Invader Sprite\n\nNext lets take a look\
    \ at the InvaderSprite that draws the animated alien moving across the screen.\
    \ The InvaderSprite class inherits from pygame.sprite.Sprite, which is a base\
    \ class for all sprites in Pygame. The **init()** method initializes various instance\
    \ variables such as the two image sprites (name1 and name2) that are used to draw\
    \ and animate the alien, the explosion image sprite, the parent row represented\
    \ by a sprite group, the speed of the alien, its current direction (either left\
    \ or right), its initial position, and its points. The **update()** method updates\
    \ the position of the two image sprites representing the alien based on its current\
    \ position. The draw() method draws the current image sprite on the game surface.\
    \ The **move_left()**, **move_right()**, and **move_down()** methods move the\
    \ alien left, right, or down respectively. The **switch_image()** method switches\
    \ between the two image sprites of the alien depending on the image number passed\
    \ into this method. The **get_width()** and **get_height()** methods return the\
    \ width and height of the current image sprite of the alien. The **kill()** method\
    \ switches the image sprite to the explosion sprite and marks the alien as dead.\n\
    \n```python\nimport pygame\nfrom ImageSprite import ImageSprite\nfrom BombSprite\
    \ import BombSprite\n\nclass InvaderSprite(pygame.sprite.Sprite):\n    def __init__(self,\
    \ name1, name2, x, y, parent, points):\n        super().__init__()\n        self.imageSprite1\
    \ = ImageSprite(name1, x, y)\n        self.imageSprite2 = ImageSprite(name2, x,\
    \ y)\n        self.explosion = ImageSprite('explosion', x, y)\n        self.imageSprite\
    \ = self.imageSprite1\n        self.parent = parent\n        self.speed = .01\n\
    \        self.currentDirection = 'right'\n        self.position = (x, y)\n   \
    \     self.rect = self.imageSprite.image.get_rect().move(self.position)\n    \
    \    self.dead = False\n        self.death_time = 0\n        self.bomb_active\
    \ = False\n        self.points = points\n\n    # update the position of the 2\
    \ sprites\n    # representing the alien\n    def update(self):\n        self.imageSprite.rect\
    \ = self.imageSprite.image.get_rect().move(self.position)\n        self.imageSprite1.rect\
    \ = self.imageSprite.rect\n        self.imageSprite2.rect = self.imageSprite.rect\n\
    \n    # Draw the sprite on the screen\n    def draw(self, surface):\n        self.imageSprite.draw(surface)\n\
    \n    def move_left(self):\n        (x, y) = self.position\n        self.position\
    \ = (x - self.speed, y)\n\n    def move_right(self):\n        (x, y) = self.position\n\
    \        self.position = (x + self.speed, y)\n\n    def move_down(self):\n   \
    \     (x, y) = self.position\n        self.position = (x, y + 10)\n\n    # switch\
    \ between the 2 images representing the alien\n    def switch_image(self, imageNumber):\n\
    \        if self.dead == True: return\n        if (imageNumber == 1):\n      \
    \      self.imageSprite = self.imageSprite1\n        else:\n            self.imageSprite\
    \ = self.imageSprite2\n\n    def get_width(self):\n        return self.imageSprite.get_width()\n\
    \n    def get_height(self):\n        return self.imageSprite.get_height()\n\n\
    \    def kill(self):\n        self.imageSprite = self.explosion\n        self.imageSprite.draw(self.imageSprite.image)\n\
    \        self.imageSprite.update()\n        self.dead = True\n        self.death_time\
    \ = pygame.time.get_ticks()\n```\n\n### How is the alien animated as it moves?\n\
    \nThe InvaderSprite class uses a trick here to perform the animation of the open\
    \ close of the alien. At any given time, the self.imageSprite property holds a\
    \ reference to either the alien open claw image or the alien closed claw image.\
    \ The program either passes a 1 or 0 into the **switch_image** method and assigns\
    \ the image sprite accordingly to one of the two images. When it comes time to\
    \ draw the alien, whatever the imageSprite is assigned to at the time, will be\
    \ the one that gets drawn on the surface.\n\n## Bullet Sprite\n\nWhen the player\
    \ hits the up arrow, a green bullet is made active that can shoot an alien if\
    \ it collides with one. The bullet image is created simply by filling the bullet's\
    \ rectangular surface with green color.\n\n```python\nclass BulletSprite(pygame.sprite.Sprite):\n\
    \    def __init__(self, x, y, bullet_width,\n            bullet_height, speed):\n\
    \        super().__init__()\n        WHITE = (255, 255, 255)\n        GREEN =\
    \ (0, 255, 0)\n        BLACK = (0, 0, 0)\n        small_font = pygame.font.Font(None,\
    \ 16)\n\n        self.position = (x, y)\n        self.speed = speed\n\n      \
    \  # Create a surface for the sprite\n        self.image = pygame.Surface(\n \
    \           [bullet_width, bullet_height])\n        self.image.fill(GREEN)\n\n\
    \        # Draw the rectangle to the sprite surface\n        self.rect = self.image.get_rect().move(x,\
    \ y)\n\n    # move the sprite according to the bullet's position\n    def update(self):\n\
    \        (x, y) = self.position\n        self.rect = self.image.get_rect().move(x,\
    \ y)\n\n    # Draw the sprite on the screen\n    def draw(self, surface):\n  \
    \      surface.blit(self.image, self.rect)\n```\n\n## Bomb Sprite\n\nThe bomb\
    \ sprite is the sprite that drops down from the aliens. It is drawn to the image\
    \ surface as a series of diagonal white lines used to form the shape of a lightning\
    \ bolt.\n\n```python\nclass BombSprite(pygame.sprite.Sprite):\n    def __init__(self,\
    \ x, y, bullet_width,\n        bullet_height, speed, parent):\n        super().__init__()\n\
    \        WHITE = (255, 255, 255)\n        GREEN = (0, 255, 0)\n        BLACK =\
    \ (0, 0, 0)\n        small_font = pygame.font.Font(None, 16)\n\n        self.position\
    \ = (x, y)\n        self.speed = speed\n        self.parent = parent\n\n     \
    \   # Create a surface for the sprite\n        self.image = pygame.Surface(\n\
    \            [bullet_width, bullet_height])\n\n        pygame.draw.lines(self.image,\
    \ WHITE, True,\n            [(0, 0), (5, 5), (0, 10), (10, 15)], 1)\n\n      \
    \  # Draw the rectangle to the sprite surface\n        self.rect = self.image.get_rect().move(x,\
    \ y)\n\n    # update the bomb according to the current position\n    def update(self):\n\
    \        (x, y) = self.position\n        self.rect = self.image.get_rect().move(x,\
    \ y)\n\n    # Draw the sprite on the screen\n    def draw(self, surface):\n  \
    \      surface.blit(self.image, self.rect)\n```\n\n## Moving the Player\n\n![](img/8145adbe7df11d992ef844f05cbb3fe0_110_0.png)\n\
    \nNow that we have our player sprite, we can move the player according to key\
    \ presses. In our process_events method we'll capture the key presses. If the\
    \ user hits the left arrow, we'll mark a flag that says the player is moving left.\
    \ When they release the left arrow, the flag will be cleared. The same thing happens\
    \ for the right arrow. If the user hits the right arrow, a flag will be marked\
    \ to indicate the player is moving right. Once the user releases the right arrow,\
    \ this flag will be cleared."
