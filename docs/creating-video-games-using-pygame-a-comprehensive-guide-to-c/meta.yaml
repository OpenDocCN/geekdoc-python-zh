    \ - start_time\n```\n\n## Game Sprites\n\nAs with the stone eater, its easiest\
    \ to build space invasion by creating sprites. This game contains the following\
    \ sprites.\n\n**ImageSprite** - The base class for all sprites that load an image\
    \ and track position\n**PlayerSprite** - The player cannon you control for shooting\
    \ aliens\n**BombSprite** - The sprite representing the image of the bomb dropped\
    \ by an alien\n**BulletSprite** - The sprite showing the bullet that is shot at\
    \ the invaders\n**InvaderSprite** - Draws the invader using two images to animate\
    \ its movement.\n**MessageSprite** - Used to draw the game over message\n**ScoreSprite**\
    \ - Draws the score of the game at the top of the screen\n**HighScoreSprite**\
    \ - Same sprite we used in the stone eater to track the high score\n**LivesSprite**\
    \ - Draws the number of lives left for the player\n\n## Player Sprite\n\nLet’s\
