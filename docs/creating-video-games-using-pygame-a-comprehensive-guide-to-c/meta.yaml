    \ we need to check if the bullet collided with the saucer:\n\n```\ndef handle_bullet(bullet,\
    \ bullet_active):\n    ...\n\n    if (handle_saucer_hit(bullet_x, bullet_y)):\n\
    \        bullet_active = False\n        bullet.position = (0, 0)\n```\n\nThe `handle_saucer_hit`\
    \ function checks for saucer collision with the bullet. If it collides, the function\
    \ calls the kill function on the SaucerSprite. The kill function puts the saucer\
    \ in a dead state which allows the saucer to show the score for a few seconds\
