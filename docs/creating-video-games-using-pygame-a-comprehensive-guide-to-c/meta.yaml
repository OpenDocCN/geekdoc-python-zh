  md: '# # Intro To Python


    In the chapters to file, we will be programming in Python, so we need to give
    you the foundation to understand the language constructs we will be using as well
    as how to run them. The following chapter will guide you through the use of the
    most common pieces of the language and what we will be utilizing to build our
    game. First let’s answer a few common questions about Python.


    # ## History of Python


    Python was created by Guido van Rossum and first released in 1991. Python is a
    high-level, interpreted, general-purpose programming language. Python has become
    popular due to its clear syntax and readability. Python also supports modules
    and packages, which allows for code reusability.


    Python is an interpreted language, which means that it is compiled at run-time.
    This allows Python code to be more forgiving of errors and makes debugging easier.
    Python also supports a number of open source systems and frameworks, such as Django
    and Flask.


    Python is often used for scientific computing, web development, machine learning,
    and automation. Python has a large and active community, making it easy to find
    help and support online. Python is used by organizations such as Google, Yahoo,
    and NASA.'
