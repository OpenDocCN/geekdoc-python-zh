    \ `factor` 参数，所有组中所有外星人的速度将增加一个固定的因子0.01。由于所有外星人的初始速度是0.01，第一次 *加速* 会使外星人的速度翻倍。\n\
    \n函数 **speed_up_aliens** 首先遍历 `alien_groups` 列表中的每个 `alien_group`，该列表代表外星人的每一行。在每个\
