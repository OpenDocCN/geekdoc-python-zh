    \ Worlds gets printed\n\n```python\nfor number in range(5):\n    numberToPrint\
    \ = number + 1\n    if numberToPrint % 2 == 0:\n        print(f'Even Hello World\
    \ #{numberToPrint}')\n```\n\nThis code introduces the if statement for making\
    \ decisions. In this case, the if statement uses the mod function (%) to determine\
