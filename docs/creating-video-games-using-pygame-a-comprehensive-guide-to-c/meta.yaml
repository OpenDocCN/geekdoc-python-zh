    **kill**：杀死精灵的方法，触发爆炸动画。\n**draw**：在给定表面上绘制精灵的方法。如果精灵未死亡，它会调用超类的draw()方法来绘制精灵图像。如果精灵已死亡，它会播放爆炸动画并检查爆炸是否已完成足够的时间。\n\
