  md: 'saucer (or UFO) from a Space Invaders-like game. It also handles the case when
    the saucer is “dead” (hit by a projectile, for instance).


    Here’s a step-by-step explanation of the code:


    +   1. **saucer_show_score_time = 1000**: This line sets a variable that represents
    the time (in milliseconds) for which the saucer’s score will be shown on the screen
    after it has been killed.

    2. **if saucer.active**: This condition checks if the saucer is active (visible
    and moving on the screen).

    3. **saucer.move_left()**: If the saucer is active, this method moves the saucer
    to the left.

    4. **saucer.update()**: This method updates the saucer’s position and its image
    sprites.

    5. **saucer.draw(window)**: The saucer is drawn on the given surface (the window).

    6. **saucer.switch_image(int(game_time/saucer_blink_speed) % 3)**: This line switches
    the saucer’s image sprite based on the current game time and a variable called
    saucer_blink_speed, creating an animation effect.

    7. The next lines check if the saucer has moved off the screen (to the left).
    If so, the saucer is considered dead, and its position is reset to (0, 0).

    8. **if saucer.dead**: This condition checks if the saucer is dead.

    9. **current_saucer_death_time = pygame.time.get_ticks() - saucer.death_time**:
    This line calculates the time elapsed since the saucer was killed.


    **if current_saucer_death_time > saucer_show_score_time**: This condition checks
    if the time elapsed since the saucer’s death is greater than the time for which
    the saucer’s score should be shown. If true, the saucer is set to inactive (saucer.active
    = False), meaning it will not be displayed or updated until it’s reset and activated
    again.'
