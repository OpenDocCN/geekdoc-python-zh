- md: "## Speeding up the aliens\n\nAs we are progressing through the game, we want\
    \ to challenge the player by threatening to land the aliens faster as they traverse\
    \ across the screen. We created a method called **handle_alien_speedup** and call\
    \ it in the main loop to increase the speed of the aliens based on how many aliens\
    \ are left. The code below will retrieve the total number of aliens by calling\
    \ **total_aliens**, and based on this total, we'll change the speed of the aliens.\
    \ If the aliens have reached a total of 20, 5, or 1, the speed of the aliens will\
    \ be increased as well as the animation speed of the alien opening and closing\
    \ their claws (this makes the aliens seem more menacing!)\n\n```python\ndef handle_alien_speedup(total_aliens):\n\
    \    global blink_speed, bomb_frequency, \\\n        first_speed_up, second_speed_up,\
    \ third_speed_up\n\n    if (total_aliens() == 20):\n        if first_speed_up\
    \ == False:\n            blink_speed = 200\n            bomb_frequency = 10\n\
    \            speed_up_aliens()\n            first_speed_up = True\n\n    if (total_aliens()\
    \ == 5):\n        if second_speed_up == False:\n            blink_speed = 100\n\
    \            bomb_frequency = 20\n            speed_up_aliens()\n            second_speed_up\
    \ = True\n\n    if (total_aliens() == 1):\n        if third_speed_up == False:\n\
    \            bomb_frequency = 40\n            blink_speed = 50\n            speed_up_aliens(2.0)\n\
    \            third_speed_up = True\n```\n\nThe code provided defines a function\
    \ called **speed_up_aliens**, which takes an optional argument factor with a default\
    \ value of 1.0. This function loops through all the aliens that exist in different\
    \ alien groups, and increases their speed by a factor that is calculated using\
    \ the given factor parameter. If no factor parameter is passed, the speed of all\
    \ aliens in all groups will be increased by a fixed factor of 0.01. Since the\
    \ initial speed of all aliens is .01, the first *speed up* doubles the speed of\
    \ the aliens.\n\nThe function **speed_up_aliens** first loops through each alien_group\
    \ in alien_groups list which represents each row of aliens. Within each alien_group,\
    \ the function loops through each alien in that group, and then updates the speed\
    \ attribute of the alien by adding the result of 0.01 multiplied by the factor\
    \ value to the current speed. The result of this calculation will be added to\
    \ the current value of the alien.speed attribute, effectively increasing the speed\
    \ of the alien by the calculated factor.\n\nNote that the factor parameter is\
    \ optional, and the function will still work even if no argument is passed. In\
    \ this case, the default factor value of 1.0 will be used, and all aliens will\
    \ have their speed increased by .01 * 1.0 or .01. If a factor value is passed\
    \ to the function, the speed of all aliens will be increased by that factor instead.\
    \ The last alien is sped up 3 times its original speed (.01 + .01 * 2.0)\n\n```python\n\
    def speed_up_aliens(factor = 1.0):\n    for alien_group in alien_groups:\n   \
    \     for alien in alien_group:\n            alien.speed = alien.speed + .01 *\
    \ factor\n```\n\n## Adding in Scoring\n\nAs we play the game, we'd like to track\
    \ certain statistics for the user and display them. In the space invasion game,\
    \ we'll track Score, High Score, and Lives. We already created Score and HiScore\
    \ Sprites in our stone eater game and we can use the same classes in our space\
    \ invasion game. Lives is the only new class and is shown below. This class will\
    \ show how many lives are remaining in the form of 3 ship badges displayed in\
    \ the upper right hand corner. As a ship is destroyed, one ship badge is removed\
    \ until there are none left, at which point the game is over.\n\n```python\nimport\
    \ pygame\n\nclass LivesSprite(pygame.sprite.Sprite):\n    def __init__(self, window_width):\n\
    \        super().__init__()\n        WHITE = (255, 255, 255)\n        self.window_width\
    \ = window_width\n        self.lives = 3\n        self.livesImage = pygame.image.load(\n\
    \            'images/man.gif')\n        self.livesImage = \\\n            pygame.transform.scale(self.livesImage,\n\
    \                (40, 32))\n        self.rect = pygame.Rect(0, 0, 0, 0)\n    \
    \    self.small_font = pygame.font.Font(None, 32)\n        self.image = self.small_font.render(\n\
    \            f'Lives: {self.lives}', True, WHITE)\n\n    # Draw the sprite on\
    \ the screen\n    def update(self):\n        WHITE = (255, 255, 255)\n       \
    \ self.image = self.small_font.render(\n            f'Lives:', True, WHITE)\n\
    \        self.rect = self.image.get_rect() \\\n            .move(self.window_width\
    \ - 250, 0)\n\n    def draw(self, surface):\n        surface.blit(self.image,\
    \ self.rect)\n        for i in range(self.lives):\n            surface.blit(self.livesImage,\n\
    \                (self.window_width - 180 + i * 50, 0))\n\n    def update_lives(self,\
    \ lives):\n        self.lives = lives\n```\n\nWe can use the same image that we\
    \ use for our player, as we do for our lives indicator, we just need to shrink\
    \ it down using the pygame.transform.scale method.\n\nHere is a detailed explanation\
    \ of the code:\n\n1. **class LivesSprite(pygame.sprite.Sprite):** defines a new\
    \ class called LivesSprite that inherits from pygame.sprite.Sprite.\n2. **def\
    \ init(self, window_width):** defines the constructor for the LivesSprite class.\
    \ It takes the window width as a parameter to help determine where to place the\
    \ indicator at the top of the screen.\n3. **super().init()** initializes the superclass\
    \ (pygame.sprite.Sprite) to ensure that the LivesSprite class inherits all necessary\
    \ attributes and methods.\n4. **WHITE = (255, 255, 255)** defines a white color\
    \ tuple used for text rendering.\n5. **self.window_width = window_width** stores\
    \ the window width in an instance variable.\n6. **self.lives = 3** initializes\
    \ the number of lives to 3.\n7. **self.livesImage = pygame.image.load('images/man.gif')**\
    \ loads the image for the player's life representation from the 'images/man.gif'\
    \ file.\n8. **self.livesImage = pygame.transform.scale(self.livesImage, (40, 32))**\
    \ shrinks the life image to the size (40, 32).\n9. **self.rect = pygame.Rect(0,\
    \ 0, 0, 0)** initializes a rectangular area for the lives display text.\n10. **self.small_font\
    \ = pygame.font.Font(None, 32)** creates a font object of size 32 for rendering\
    \ the text *Lives*.\n11. **self.image = self.small_font.render(f'Lives: {self.lives}',\
    \ True, WHITE)** renders the initial text for the lives display.\n12. **def update(self):**\
    \ defines the update method, which updates the *Lives* display text.\n13. **def\
    \ draw(self, surface):** defines the draw method, which draws the lives display\
    \ text and the life images on the screen. The surface parameter is the surface\
    \ on which to draw the lives display.\n14. **def update_lives(self, lives):**\
    \ defines the update_lives method, which updates the number of lives which is\
    \ updated from the main loop when a player dies. The lives parameter is the new\
    \ number of lives.\n15. In summary, the LivesSprite class is responsible for displaying\
    \ the number of lives a player has in a Space Invaders game. It handles the rendering\
    \ of both the text and the life images on the game screen."
