    # Detecting Key Strokes


    Inside our event loop, we check to see if the user pressed any of the arrow keys
    so we can move the stone eater left, right, up, or down depending on which arrow
    key the player pressed. We do this by looping through all the events in the pygame
    event queue and see if any of them are keydown. If they are, then we check to
    see which keyboard key was chosen and compare it to the keys we are interested
    in. For example we look to see if the up arrow (pygame.K_UP) was chosen.


    Once we determined they picked an up arrow, we also check to see if the player
    is trying to go off the board because we don''t want the player going beyond the
    game board. In the case of key up arrow, we limit the player to the third row
    of the grid so the player doesn''t start moving onto the game statistics. Once
    we determine that the player is within the game board, then we move the player
    one cell in the direction of the key that was pressed. For an up arrow, we subtract
    one from the player row to move them up a row in the game board grid.'
