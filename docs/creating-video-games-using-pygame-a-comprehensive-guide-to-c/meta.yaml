    \ cannon controlled by the player. The player must move the cannon left or right\
    \ to dodge the alien’s attacks and to line up shots. The cannon can only fire\
    \ one bullet at a time, so players need to time their shots carefully to avoid\
    \ being overwhelmed.\n\nThe aliens move back and forth across the screen and gradually\
    \ move closer to the player’s cannon. If the aliens reach the bottom of the screen,\
    \ the game is over. The player must try to destroy all the aliens before they\
    \ reach the bottom to progress to the next level.\n\nAs the player progresses\
    \ through the levels, the aliens become faster and more aggressive, and new types\
    \ of aliens with different abilities appear. Some aliens move more quickly or\
    \ unpredictably, while others require multiple shots to be defeated.\n\nThe game\
    \ has a limited number of lives, so players must try to avoid being hit by the\
    \ alien’s attacks. If the player’s cannon is hit by an alien’s laser beam, they\
    \ lose a life, and the game ends when all lives are lost.\n\nOverall, Space Invaders\
    \ is a simple but addictive game that requires quick reflexes and precise timing\
    \ to succeed.\n\nSpace Invasion in PyGame\n\n94\n\n![](img/8145adbe7df11d992ef844f05cbb3fe0_97_0.png)\n\
    \n## The Main Loop\n\nSimilar to how we set up our main loop for the stone eater\
    \ game, we need to do the same sort of thing for space invasion. The loop consists\
    \ of responding to keyboard events in the game as well as drawing the various\
    \ sprites and detecting collisions between them. To make the main loop easier\
    \ to read, we’ve broken down the code to several high level functions.\n\nThe\
    \ first high level function, **process_events**, processes the keyboard events\
    \ for the player moving and shooting. Here are the other high level functions\
    \ and their descriptions:\n\n**handle_scoring** - updates the current score on\
    \ the screen based on the players score. This function also updates the high score,\
    \ and the lives indicator.\n\n**handle_alien_movement** - This function guides\
    \ the aliens across the screen and helps the aliens reverse direction when they\
    \ hit the edge of the screen. They also move down every time they hit the edge.\n\
    \n**handle_player_movement** - handles player movement according to the arrow\
    \ key they are pressing. The left arrow moves the player left until they release\
    \ the key and same with the right arrow.\n\n**handle_bullet** - This function\
    \ handles an active bullet coming from the player trying to hit the aliens. It\
    \ moves the bullet up the screen at a certain speed each time through the game\
    \ loop. It also checks to see if the bullet has collided with an alien with the\
    \ function **handle_alien_hit**.\n\n**check_for_bomb_activation** - this function\
    \ checks based on a randomly generated value whether or not an alien has released\
    \ a bomb. If an alien has released a bomb it is recorded in an array to handle\
    \ its movement later.\n\n**handle_active_bombs** loops through the bomb array\
    \ and draws the active bombs. Also checks to see if the bomb hit the player by\
    \ calling **handle_player_hit**\n\n**draw_aliens** - Draws all the aliens. Aliens\
    \ are drawn by looping through the rows of aliens stored in **alien_groups** and\
    \ then looping through each alien in the row. A row is a pygame group.\n\n**handle_alien_speedup**\
    \ - As the player kills more and more aliens, the aliens speed up after a certain\
    \ threshold. Currently that threshold is when there are only 25 aliens, then when\
    \ there are only 5 aliens and finally when there is just 1 alien left.\n\n```\n\
    while running:\n    (player_x, player_y) = player.position\n    window.fill(BLACK)\n\
    \n    running = process_events()  # process the keyboard\n\n    if (game_over):\n\
    \        show_game_over_prompt()\n        pygame.display.flip()\n        continue\n\
    \n    # scoring\n    handle_scoring(window, score, player_score)\n\n    # move\
