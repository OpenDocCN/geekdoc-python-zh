    # # List Comprehension


    List comprehension is a concise way to create lists in Python. It is a syntactic
    construct that allows you to create a new list by specifying the elements you
    want to include, often derived from existing lists or other iterable objects.
    List comprehensions can also include optional conditions to filter the elements.
    They are more readable and often faster than equivalent code using loops.


    # ## Mapping a list


    Suppose you have a list of numbers and you want to create a new list with the
    squares of those numbers. Using list comprehension:


    ```

    python

    numbers = [1, 2, 3, 4, 5]


    squares = [x**2 for x in numbers]

    print(squares)

    ```


    output: [1, 4, 9, 16, 25]


    Using list comprehension to create a new list by squaring each number from an
    existing list is equivalent to looping over the numbers, squaring them, and appending
    the result to a new list, but list comprehension provides a more compact and concise
    syntax.


    # ## Filtering a list


    If you want to create a new list containing only the even numbers from the original
    list, you can add a filtering condition to the list comprehension. Below is an
    example to extract all the even numbers from the numbers list.


    ```

    python

    even_numbers = [x for x in numbers if x % 2 == 0]

    print(even_numbers)

    ```


    output: [2, 4]'
