- img_proc: true
  md: '# # How to play


    The goal of the game is to defeat waves of alien invaders that are descending
    from the top of the screen by shooting them with a laser cannon controlled by
    the player. The player must move the cannon left or right to dodge the alien’s
    attacks and to line up shots. The cannon can only fire one bullet at a time, so
    players need to time their shots carefully to avoid being overwhelmed.


    The aliens move back and forth across the screen and gradually move closer to
    the player’s cannon. If the aliens reach the bottom of the screen, the game is
    over. The player must try to destroy all the aliens before they reach the bottom
    to progress to the next level.


    As the player progresses through the levels, the aliens become faster and more
    aggressive, and new types of aliens with different abilities appear. Some aliens
    move more quickly or unpredictably, while others require multiple shots to be
    defeated.


    The game has a limited number of lives, so players must try to avoid being hit
    by the alien’s attacks. If the player’s cannon is hit by an alien’s laser beam,
    they lose a life, and the game ends when all lives are lost.


    Overall, Space Invaders is a simple but addictive game that requires quick reflexes
    and precise timing to succeed.'
