    # ## 11.3.3 Histograms


    Finally, let''s apply some of the same ideas from Section 11.3.2 to visualize
    the distribution of 1000 random values drawn from the standard normal distribution:


    ```

    >>> values = rng.standard_normal(1000)

    ```


    A common way to get a sense of what these values look like is to make a fixed
    number of "bins" and plot how many values fit into each bin. The resulting plot
    is known as a *histogram*, and can be generated automatically using Matplotlib''s
    `hist()` method:'
  - '[PAGE 371]


    ![](img/b3303452eae4d7974600cd38b159398e_371_0.png)


    **Figure 11.16:** A histogram of normally distributed random values.


    ```

    >>> fig, ax = plt.subplots()

    >>> ax.hist(values)

    >>> plt.show()

    ```


    The result is a good approximation of a “bell curve”, as seen in Figure 11.16.


    The default number of bins is **10**, but we can investigate the result of different
    bin sizes by passing a **bins** argument to **hist()**, say **bins=20**:


    ```

    >>> fig, ax = plt.subplots()

    >>> ax.hist(values, bins=20)

    >>> plt.show()

    ```


    In this case, the result is a finer-grained version of the distribution (Figure
    11.17).


    Because Matplotlib is a general system for plotting and data visualization, there’s
    practically no end to the things you can do with it. Although we’ve now covered
    the basics of what we’ll need for the rest of this tutorial, I encourage you to
    explore further, and the Matplotlib documentation is a good place to start.'
