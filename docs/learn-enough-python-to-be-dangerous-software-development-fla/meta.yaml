    \ **next()** 会生成序列中的下一个元素，直到到达末尾，这由特殊的 **StopIteration** 异常指示。\n\n我们为 **Phrase**\
    \ 类添加迭代器的策略如下：\n\n- 1. 在 **\\_\\_iter\\_\\_** 中，使用 **iter()** 基于 **content** 属性创建一个短语迭代器，然后按照\
    \ Python 迭代器工作方式的要求返回 **self**。\n- 2. 在 **\\_\\_next\\_\\_** 中，对短语迭代器调用 **next()**\
    \ 并返回结果。\n\n将这些步骤转换为代码，得到清单 7.8 中的结果。\n\n## 清单 7.8：为 **Phrase** 类添加迭代器。\n\n*palindrome.py*\n\
    \n```python\nclass Phrase:\n    \"\"\"A class to represent phrases.\"\"\"\n\n\
    \    def __init__(self, content):\n        self.content = content\n\n    def ispalindrome(self):\n\
    \        \"\"\"Return True for a palindrome, False otherwise.\"\"\"\n        processed_content\
    \ = self.content.lower()\n        return processed_content == reverse(processed_content)\n\
    \n    def __iter__(self):\n        self.phrase_iterator = iter(self.content)\n\
    \        return self\n\n    def __next__(self):\n        return next(self.phrase_iterator)\n\
    \ndef reverse(string):\n    \"\"\"Reverse a string.\"\"\"\n    return \"\".join(reversed(string))\n\
    ```\n\n使用清单 7.8 中的代码，我们可以重新加载 **palindrome** 模块以查看它是否有效：\n\n```python\n>>> reload(palindrome)\n\
    >>> phrase = palindrome.Phrase(\"Racecar\")\n>>> for c in phrase:\n...     print(c)\n\
    R\na\nc\ne\nc\na\nr\n```\n\n是的！我们现在可以遍历 **Phrase** 对象，而无需显式指定 **content** 属性。\n\
    \n## 7.2.1 练习\n\n- 1. 使用 REPL，确定在如清单 7.8 所示定义自定义迭代器后，**list(phrase)** 是否有效。使用空字符串连接\
    \ **\"\".join(phrase)** 呢？\n\n## 7.3 继承\n\n在学习 Python 类时，使用 **\\_\\_class\\_\\\
    _** 和 **\\_\\_mro\\_\\_** 属性来研究*类层次结构*很有用，后者代表*方法解析顺序*，结果会打印出我们需要的确切层次结构。\n\n\
    让我们看一个熟悉类型对象（字符串）的例子：\n\n```python\n>>> s = \"foobar\"\n>>> type(s)          #\
    \ one way to get the class\n<class 'str'>\n>>> s.__class__      # another way\
    \ to get the class\n<class 'str'>\n>>> s.__class__.__mro__\n(<class 'str'>, <class\
    \ 'object'>)\n```\n\n这告诉我们，字符串属于 **str** 类，而 **str** 类又属于 **object** 类型。后者被称为*超类*，因为它通常被认为在\
    \ **str** 类“之上”。\n\n由此产生的类层次结构图如图 7.3 所示。我们在这里看到 **str** 的超类是 **object**，层次结构到此结束。这种模式对每个\
    \ Python 对象都成立：追溯类层次结构足够远，你总会到达 **object**，它本身没有超类。\n\nPython 类层次结构的工作方式是，每个类*继承*层次结构中更靠上的类的属性和方法。例如，我们刚刚看到了如何找到\
    \ **str** 类型对象的类：\n\n```python\n>>> \"honey badger\".__class__\n<class 'str'>\n\
    ```\n\n但 **\\_\\_class\\_\\_** 属性来自哪里？答案是 **str** 从 **object** 本身继承了 **\\_\\_class\\\
    _\\_**：\n\n```python\n>>> object().__class__\n<class 'object'>\n```\n\n每个以 **object**\
    \ 为超类的对象的类，都将其类名存储在 **\\_\\_class\\_\\_** 中。"
