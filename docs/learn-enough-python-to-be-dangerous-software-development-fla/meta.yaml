    **Figure 11.32:** A portrait of Harry Elkins Widener inside Widener Library at\
    \ Harvard University.\n\n## 11.7 Machine Learning with scikit-learn\n\nThis section\
    \ contains a brief introduction to *machine learning*, which is a field of computing\
    \ involving programs that “learn” in response to data inputs. Although opinions\
    \ differ over whether machine learning is part of “data science” per se, at the\
    \ very least it's a closely related field, and is therefore suitable for inclusion\
    \ in an introduction such as this one.\n\nMachine learning is a giant subject,\
    \ and in this section we can only scratch the surface. As with the other sections\
    \ in this chapter, the main value is in developing a basic familiarity with a\
    \ relevant Python package, which in this case is known as scikit-learn.\n\nBuilding\
    \ on the *Titanic* analysis in Section 11.6, we'll first look at an example of\
    \ *linear regression* (Section 11.7.1), and we'll then consider more sophisticated\
    \ machine-learning models (Section 11.7.2). We'll end with an example of a *clustering\
    \ algorithm* as just one example of the many additional subjects at which scikit-learn\
    \ excels.\n\n### 11.7.1 Linear Regression\n\nIn this section, we'll use scikit-learn\
    \ to perform a *linear regression*, which finds the best fit to a set of data\
    \ (for a suitable definition of “best”).<sup>31</sup> Referring to linear regression\
    \ as “machine learning” is sometimes considered a sort of inside joke because\
    \ the technique is relatively simple and has been in use for many years. Nevertheless,\
    \ it's a great place to start.\n\nAs with Section 11.6, we'll use the survival\
    \ data from *Titanic*. We'll start by importing the necessary libraries and creating\
    \ a **titanic** DataFrame:\n\n```python\n>>> import numpy as np\n>>> import pandas\
    \ as pd\n>>> import matplotlib.pyplot as plt\n>>> URL = \"https://learnenough.s3.amazonaws.com/titanic.csv\"\
    \n>>> titanic = pd.read_csv(URL)\n```\n\nOur goal is to consider the effect of\
    \ age on survival rate. We'll start by making a scatter plot (Section 11.3.2)\
    \ of survival rate vs. age and then find the best linear fit to the data using\
    \ scikit-learn.\n\nWe'll first select just the **\"Age\"** and **\"Survived\"\
    ** columns, since those are the columns of interest. Then, as a basic matter of\
    \ data cleaning, we'll consider only passengers with known age, so we'll use **dropna()**\
    \ (Section 11.4.1) to drop the NaN values:\n\n```python\n>>> passenger_age = titanic[[\"\
    Age\", \"Survived\"]].dropna()\n>>> passenger_age.head()\n   Age  Survived\n0\
    \  22.0         0\n1  38.0         1\n2  26.0         1\n3  35.0         1\n4\
