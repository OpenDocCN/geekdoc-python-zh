  md: 'We can also use **list()** to look at the elements directly:


    ```

    >>> list(reversed("foobar"))

    [''r'', ''a'', ''b'', ''o'', ''o'', ''f'']

    ```


    We see here that **list()** runs through the reversed iterator and gives us the
    actual list of characters. Note that, unlike the code in Listing 5.15, using **list()**
    creates the full object in memory. For a small list like the one here it makes
    little difference, but for large lists the difference could be significant.⁸


    We saw in Section 3.4.4 how to use **join()** to combine such a list (in this
    case, on the empty space ""):


    ```

    >>> "".join(list(reversed("foobar")))

    ''raboof''

    ```


    This is excellent progress toward being able to detect palindromes, as we now
    have a way to find the reverse of a string, but it turns out that **join()** also
    automatically runs through an iterable object, so we can actually eliminate the
    intermediate call to **list()**:


    ```

    >>> "".join(reversed("foobar"))

    ''raboof''

    ```


    At this point, we''re in a position to test for a palindrome by comparing a string
    with its own reverse:


    ```

    >>> "foobar" == "".join(reversed("foobar"))

    False

    >>> "racecar" == "".join(reversed("racecar"))

    True

    ```


    With this technique in our toolkit, we''re ready to write the first version of
    our palindrome method.


    Let''s put our function for detecting palindromes into its own file, which we''ll
    call **palindrome.py**:


    ```

    (venv) $ touch palindrome.py

    ```


