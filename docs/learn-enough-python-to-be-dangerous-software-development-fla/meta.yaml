    \ to simple fractions of a period of $\\cos x$.\n\n```\n>>> np.arange(5)\narray([0,\
    \ 1, 2, 3, 4])\n>>> angles = math.tau * np.arange(5) / 4\n>>> angles\narray([0.\
    \        , 1.57079633, 3.14159265, 4.71238898, 6.28318531])\n```\n\nNote that\
    \ the values of the `angles` array in Listing 11.5 are simply the numerical equivalents\
    \ of 0, $\\tau/4$, $\\tau/2$, $3\\tau/4$, and $\\tau$. Applying `cos()` to these\
    \ angles doesn't work for the `math` version of cosine but does for the NumPy\
    \ version (Listing 11.6).\n\n**Listing 11.6:** Applying `cos()` to an array of\
    \ angles.\n\n```\n>>> math.cos(angles)\nTraceback (most recent call last):\n \
    \ File \"<stdin>\", line 1, in <module>\nTypeError: only size-1 arrays can be\
    \ converted to Python scalars\n>>> a = np.cos(angles)\n>>> a\narray([ 1.00000000e+00,\
    \  6.12323400e-17, -1.00000000e+00, -1.83697020e-16,\n        1.00000000e+00])\n\
    ```\n\nNote that, due to floating-point roundoff errors, the zeros of $\\cos x$\
    \ in Listing 11.6 appear as tiny numbers rather than as 0 (though such behavior\
    \ is often system-dependent, so your exact results may differ). We can get rid\
    \ of these using NumPy's `isclose()` function, which returns `True` if a number\
    \ is \"close\" to the given number (essentially, within the margin of error of\
    \ the system's floating-point arithmetic):\n\n```\n>>> np.isclose(0.01, 0)\nFalse\n\
    >>> np.isclose(10**(-16), 0)\nTrue\n>>> np.isclose(a, 0)\narray([False,  True,\
    \ False,  True, False])\n```\n\nWe can actually pass this array of boolean values\
    \ to the original array itself and set the elements corresponding to `True` exactly\
    \ to 0 (Listing 11.7).\n\n**Listing 11.7:** Using `isclose()` to zero out values\
    \ close to 0.\n\n```\n>>> a[np.isclose(a, 0)]\narray([ 6.1232340e-17, -1.8369702e-16])\n\
    >>> a[np.isclose(a, 0)] = 0\n>>> a\narray([ 1.,  0., -1.,  0.,  1.])\n```\n\n\
    In Listing 11.5, we divided the `arange(5)` by 4 when generating the angles, but\
    \ for technical reasons (related to numerical roundoff error) the preferred way\
    \ to make such sequences is with `linspace()` (\"linearly space(d)\"). The most\
    \ common arguments to the `linspace()` function are the beginning, end, and total\
    \ number of points desired. For example, we can use `linspace()` to make an array\
    \ of the four quarters of a period (with 5 total points since we're including\
    \ 0):\n\n```\n>>> angles = np.linspace(0, math.tau, 5)\n>>> angles\narray([0.\
    \        , 1.57079633, 3.14159265, 4.71238898, 6.28318531])\n>>> a = np.cos(angles)\n\
    >>> a[np.isclose(a, 0)] = 0\n>>> a\narray([ 1.,  0., -1.,  0.,  1.])\n```\n\n\
    The `linspace()` function is often used to create an array with much finer spacing\
