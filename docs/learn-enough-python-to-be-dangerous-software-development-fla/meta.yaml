    \ [ 9],\n       [10],\n       [11],\n       [12],\n       [13],\n       [14],\n\
    \       [15]])\n```\n\n# 11.2.3 Constants, Functions, and Linear Spacing\n\nLike\
    \ the **math** library discussed in Section 4.1, NumPy comes equipped with mathematical\
    \ constants, such as Euler’s number *e*:\n\n```\n>>> import math\n>>> math.e\n\
    2.718281828459045\n>>> np.e\n2.718281828459045\n>>> math.e == np.e\nTrue\n```"
