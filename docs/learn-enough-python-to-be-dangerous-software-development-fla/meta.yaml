    \ 11.36:** Some random blobs.\n\n```python\n>>> centers = kmeans.cluster_centers_\n\
    >>> centers\narray([[ 4.7182049,  2.04179676],\n       [-8.87357218,  7.17458342],\n\
    \       [-6.83235205, -6.83045748],\n       [-2.70981136,  8.97143336]])\n```\n\
    \n(Note the same trailing-underscore convention mentioned in Section 11.7.1 to\
    \ indicate an attribute that is defined only after calling `fit()`.) The result\
    \ is an array of points whose meaning we can interpret by plotting the second\
