    When the dictionaries have no overlapping keys, merging them simply involves combining
    all key–value pairs. But if the second dictionary does have one or more keys in
    common, then its values take precedence. In this case, we can think of *updating*
    the first dictionary with the contents of the second.⁷ For example, suppose we
    combine the tests into a single variable using a merge:


    ```

    >>> test_scores = tests1 | tests2

    {''Math'': 75, ''Physics'': 99, ''History'': 77, ''English'': 93}

    ```


    Now suppose the student is allowed to retake tests for the two lowest scores:


    ```

    >>> retests = {"Math": 97, "History": 94}

    ```


    At this point, we can update the original test scores with the updated values
    from the retests (Listing 4.8).


    **Listing 4.8:** Updating a dictionary using a merge.


    ```

    >>> test_scores | retests

    {''Math'': 97, ''Physics'': 99, ''History'': 94, ''English'': 93}

    ```


    We see that the **"Math"** and **"History"** scores have been updated with the
    values from the second dictionary.


