    \n# 第7章\n## 对象与类\n\n到目前为止，在本教程中，我们已经看到了许多Python对象的例子。在本章中，我们将学习如何使用Python*类*来创建我们自己的对象，这些对象既有数据（属性）也有函数（方法）附加在上面。我们还将学习如何为我们的类定义一个自定义迭代器。最后，我们将学习如何使用*继承*来重用功能。\n\
    \n### 7.1 定义类\n\n类是将数据和函数组织成一个单一便捷对象的一种方式。在Python中，我们可以使用两个基本元素来创建自己的类：\n\n- 1.\
