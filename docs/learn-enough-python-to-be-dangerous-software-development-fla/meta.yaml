    Note that the index convention is the same: To select elements with indices **2**
    and **3**, we include a final range that is one *more* than the value of the final
    index in the slice (in this case, 3 + 1 = 4).


    In the case of our current list, **4** is the length of the list, so in effect
    we are slicing from the element with index **2** to the end. This is such a common
    task that Python has a special notation for it—we just leave the second index
    off entirely:


    ```

    >>> a[2:]    # Pythonic

    [17, 99]

    ```


    As you might guess, the same basic notation works to slice from the *front* of
    the list:


    ```

    >>> a[:2]    # Pythonic

    [42, 8]

    ```


    The general pattern here is that **a[start:end]** selects from index **start**
    to index **end-1**, where either can be omitted to select from the start or to
    the end. Python also supports an extension to this syntax taking the form **a[start:end:step]**,
    which is the same as regular list slicing except taken **step** at a time. For
    example, we can select numbers from a range **3** at a time as follows:


