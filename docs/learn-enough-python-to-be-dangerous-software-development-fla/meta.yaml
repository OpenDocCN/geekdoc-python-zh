    (for "English") to the `html` tag in Listing 10.22 and confirm using a web inspector
    that it appears correctly on all three pages.

    2. Make a commit and deploy the changes.


    # 10.4 Template Engine


    Now that we''ve defined a proper layout, in this section we''ll use the Jinja
    template language (first seen in Listing 10.22) to add a couple of nice refinements
    to our site: *variable titles* and *navigation*. Variable titles are HTML `title`
    tag contents that vary from'
