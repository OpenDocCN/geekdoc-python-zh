    based in part on PEP 8 – Style Guide for Python Code:

    >

    > - Indent code to indicate block structure. As noted above, this is required
    by Python. Python technically allows either spaces or tabs, but tabs are generally
    considered a Bad Thing, and using spaces (typically via emulated tabs (https://www.learnenough.com/text-editor-tutorial/advanced_text_editing#sec-indenting_and_dedenting))
    is strongly recommended.

    > - Use four spaces for indentation. Although some Python style guides, such as
    Google''s Python course, indent two spaces at a time, the official PEP 8 guideline
    is to use four spaces.

    > - Add newlines to indicate logical structure. One thing I particularly like
    to do is add an extra newline after a series of variable assignments, in order
    to give a visual indication that the setup is done and the real coding can begin.
    An example appears in Listing 4.12.

    > - Limit code lines to 79 characters (also called “columns”), and limit comment
    lines or docstrings to 72 characters. These rules, which are recommended by PEP
    8, are even more cautious than the 80-character constraint used in other Learn
    Enough tutorials and which dates back to the early days of 80-character-width
    terminals. Many modern developers routinely violate this constraint, considering
    it outdated, but in my experience using a conservative character limit is a good
    source of discipline, and will save your neck when using command-line programs
    like less (or when using your code in a document with more stringent width requirements,
    such as a book). A line that breaks the character limit is a hint that you should
