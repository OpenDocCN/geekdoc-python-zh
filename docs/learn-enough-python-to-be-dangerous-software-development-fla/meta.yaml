    # CHAPTER 2

    Strings


    *Strings* are probably the most important data structure for everyday computing.
    They’re used in practically every kind of program imaginable, and are also the
    raw material of the Web. As a result, strings make an excellent place to start
    our Python programming journey.


    # 2.1 String Basics


    Strings are made up of sequences of characters in a particular order.¹ We’ve already
    seen several examples in the context of our “hello, world” programs in Chapter
    1. Let’s see what happens if we type a string by itself (without `print()`) into
    the Python REPL:


    ```

    $ source venv/bin/activate

    (venv) $ python3

    >>> "hello, world!"

    ''hello, world!''

    ```


    A sequence of characters typed literally is called a *string literal*, which we’ve
    created here using the double-quote character ". The REPL prints the result of
    *evaluating* the line, which in the case of a string literal is just the string
    itself.

    A particularly important string is one with no content, consisting simply of two
    quotes. This is known as an *empty string* (or sometimes *the* empty string):


    1. Like many other high-level languages, such as JavaScript and Ruby, Python “characters”
    are just strings of length one. This stands in contrast to lower-level languages
    like C and Java, which have a special type just for characters.'
