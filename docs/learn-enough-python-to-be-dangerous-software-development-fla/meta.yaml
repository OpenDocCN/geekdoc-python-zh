    \ the Nobel data declines to specify an exact “birth” date.\n\nThis complicates\
    \ matters somewhat because we can't just drop Not Available values like NaN and\
    \ NaT. Luckily, pandas has an option to force, or coerce, such values when making\
    \ the conversion. We can convert in place (thereby overwriting the old data) like\
    \ this:\n\n```\n>>> nobel[\"born\"] = pd.to_datetime(nobel[\"born\"], errors=\"\
    coerce\")\n>>> nobel[\"died\"] = pd.to_datetime(nobel[\"died\"], errors=\"coerce\"\
    )\n```\n\nNow we can double-check the value for the Institute of International\
