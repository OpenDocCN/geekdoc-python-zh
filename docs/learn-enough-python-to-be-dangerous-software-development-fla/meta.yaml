    # 11.5 pandas Example: Nobel Laureates


    In Section 11.4, we got a glimpse of how to use pandas and what good it does us,
    but doing anything interesting typically requires bigger datasets, which are cumbersome
    to create by hand. Instead, the most common practice is to load data from external
    files and then take the analysis from there. Accordingly, in this section and
    the next (Section 11.6), we’ll read the initial data from what is probably the
    most common input format, CSV files (for “comma-separated values”).


    Our first step is to download a dataset on winners of the Nobel Prize, who are
    typically known as *laureates* (a reference to the ancient practice of using wreaths
    from a laurel tree to honor great accomplishments).<sup>17</sup> We can do this
    by using the `curl` command-line command in the same directory being used for
    the data analysis:<sup>18</sup>


    ```

    (venv) $ curl -OL https://cdn.learnenough.com/laureates.csv

    ```


    We can then read the data using pandas’ `read_csv()` function:


    ```

    >>> nobel = pd.read_csv("laureates.csv")

    ```


    The statistics for the numeric columns aren’t very meaningful, so `describe()`
    doesn’t tell us much:


