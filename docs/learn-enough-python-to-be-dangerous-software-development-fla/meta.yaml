    3     foo\n5     bar\ndtype: object\n```\n\nThe second command here shows how\
    \ to clean the data a bit using the **dropna()** method, which drops any “Not\
    \ Available” values, such as **None**, **NaN**, or **NaT** (“Not a Time”).\n\n\
