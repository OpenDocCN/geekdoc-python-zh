    \n结果如预期是2 × 2单位矩阵。（注意，由于数值舍入误差，某些元素可能接近但不完全为零；更多信息请参见第11.2.3节。）\n\n一个特别有用的处理矩阵对象的方法是**reshape()**，它允许我们将（例如）一维数组更改为二维数组。**reshape()**的参数是一个元组（第3.6节），包含目标维度：\n\
    \n```python\n>>> a = np.arange(16)\n>>> a.reshape((2, 8))\n>>> a\narray([[ 0,\
