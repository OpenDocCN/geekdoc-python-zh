    Which design to adopt depends on our preferences as programmers and the general
    practices of the corresponding programming community. In particular, different
    language communities vary in their enthusiasm for inheriting from built-in objects
    like **str**. For example, such a practice is common in the Ruby community, even
    to the point of adding methods to the base **String**⁶ class itself.


    In contrast, many members of the Python community prefer to use composition in
    this case. In my survey of Pythonistas, some considered inheriting from **str**
    to be fine, but a majority considered it to be unPythonic, with one even stating
    that it seemed like a “Ruby developer writing Python.” Perhaps the best test is
    that I actually implemented it when preparing this chapter; having **Phrase**
    inherit from **str** was fairly straightforward, but having **TranslatedPhrase**
    inherit from **Phrase** (Section 7.4) was *extremely* tricky (whereas the Ruby
    and even JavaScript versions were much easier). In order to avoid this complexity,
    and in accordance with my perception of generally preferred Python practices,
    this chapter uses composition instead of inheritance.


    6. **String** is the Ruby analogue of Python’s **str** class.'
