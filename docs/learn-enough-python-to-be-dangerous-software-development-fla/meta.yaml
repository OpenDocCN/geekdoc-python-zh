    Python supports more advanced mathematical operations via the **math** object
    (which is technically a *module*, a special kind of object we''ll learn more about
    starting in Chapter 7). The **math** module has utilities for things like mathematical
    constants, roots, and trigonometric functions:


    ```

    >>> import math

    >>> math.pi

    3.141592653589793

    >>> math.sqrt(2)

    1.4142135623730951

    >>> math.cos(0)

    1.0

    >>> math.cos(2*math.pi)

    1.0

    ```


    We see here that the way to use the **math** module is to load it using **import
    math** and then access the module contents using **math.** (the module name followed
    by a dot). This is a general pattern with Python modules; the use of the **math.**
    prefix is known as a *namespace*.


    There is one gotcha for those coming from high school (and even college) textbooks
    that use ln *x* for the natural logarithm (base *e*). Like most other programming
    languages, Python uses log *x* instead:¹


    1. It is unclear why introductory math textbooks settled on using ln *x* for the
    natural logarithm when mathematicians generally write it as log *x*, and even
    when they write it as ln *x* they still often *pronounce* it as “log *x*”.'
  - '[PAGE 113]


    ```

    >>> math.log(math.e)

    1

    >>> math.log(10)

    2.302585092994046

    ```


    Mathematicians typically indicate base-ten logarithms using log₁₀, and Python
    follows suit with **log10**:


    ```

    >>> math.log10(10)

    1.0

    >>> math.log10(1000000)

    6.0

    >>> math.log10(1_000_000)

    6.0

    >>> math.log10(math.e)

    0.4342944819032518

    ```


    Note here that we can use underscores in a number as a separator to make it easier
    to read—thus, **1000000** and **1_000_000** both represent the number one million.

    Finally, Python also supports exponentiation via the ** operator:


    ```

    >>> 2**3

    8

    >>> math.e**100

    2.6881171418161212e+43

    ```


    The final result here, using a number followed by **e+43**, is Python''s way of
    expressing the scientific notation for e¹⁰⁰ ≈ 2.6881171418161212 × 10⁴³.

    The **math** documentation (https://docs.python.org/3/library/math.html) includes
    a more comprehensive list of further operations.


    # 4.1.2 Math to String


    We discussed in Chapter 3 how to get from strings to arrays (and vice versa) using
    **split()** and **join()**. Similarly, Python allows us to convert between numbers
    and strings.

    Probably the most common way to convert from a number to a string is using the
    **str()** function, which we saw briefly before in Section 3.4.4. For example,
    Listing 4.1 shows how to use **str()** to convert the circle constant **tau**
    (Box 4.1 and Figure 4.1) to a string.'
  - '[PAGE 114]


    # Listing 4.1: Using **tau** for the circle constant.


    ```

    >>> math.tau

    6.283185307179586

    >>> str(math.tau)

    ''6.283185307179586''

    ```


    > Box 4.1: The rise of tau


    In the corresponding math sections of *Learn Enough JavaScript to Be Dangerous*
    (https://www.learnenough.com/javascript) and *Learn Enough Ruby to Be Dangerous*
    (https://www.learnenough.com/ruby), I had to add the definition of tau by hand,
    but in Listing 4.1 note that math.tau is part of Python''s official math library.


    This is a point of particular satisfaction for me, since the use of tau (τ) to
    represent the circle constant C/r = 6.283185... was proposed in a math essay I
    published in 2010 called *The Tau Manifesto* (https://tauday.com/tau-manifesto)
    (which also established the math holiday Tau Day (https://tauday.com/)). Up until
    that point, the constant C/r had no commonly used name (other than "2π"), but
    τ has seen increasing adoption over the years, including support in Google''s
    online calculator, Khan Academy, and computer languages such as Microsoft .NET,
    Julia, and Rust (and of course Python!) (https://tauday.com/state-of-the-tau).


    Although adding tau to Python was not without controversy, ultimately it was included
    in Python 3.6 (and later) as an Easter egg for the kinds of math, science, and
    computer nerds who enjoy that sort of thing. I hope you might be one of them!


    The **str()** function also works on bare numbers:


    ```

    >>> str(6.283185307179586)

    ''6.283185307179586''

    ```


    To go the other direction, we can use the **int()** ("integer") and **float()**
    functions:


    ```

    >>> int("6")

    6

    >>> float("6.283185307179586")

    6.283185307179586

    ```'
- md: '## 4.1.3 Exercises


    +   1. What happens when you call `float()` on the string "1.24e6"? What about
    if you call `str()` on the result?

    2. Show that `int(6.28)` and `int(6.98)` both equal 6. This is the same behavior
    as the *floor function* (written in mathematics as ⌊x⌋). Show that Python''s `math`
    module has a `floor()` function with the same effect as `int()`.


    ## 4.2 Times and Datetimes


    Other frequently used built-in objects are the closely related `time` and `datetime`
    modules. For example, we can get the current time using the `time()` method:


    ```

    >>> import time

    >>> time.time()

    1661191145.946213

    ```


    This returns the number of seconds since the *epoch*, defined as January 1, 1970.
    We can get a more conveniently formatted string using the `ctime()` method (the
    documentation doesn''t say, but this probably stands for "convert time"):


    ```

    >>> time.ctime()

    ''Mon Aug 22 11:00:32 2022''

    ```


    Python puts a lot of other useful methods in the `datetime` module. As with other
    Python objects, `datetime` objects include a variety of methods:


    ```

    >>> import datetime

    >>> now = datetime.datetime.now()

    >>> now.year

    2022

    >>> now.month

    8

    >>> now.day

    22

    >>> now.hour

    16

    ```


    Because many useful methods are defined on the separate `datetime` object within
    the `datetime` module, it''s often more convenient to use `from` to import just
    that one object (using the same basic syntax seen in Listing 4.2):


    ```

    >>> from datetime import datetime

    >>> now = datetime.now()

    >>> now.year

    2022

    >>> now.day

    22

    >>> now.month

    8

    >>> now.hour

    16

    ```


    This can be a bit confusing, and indeed it''s quite unusual for a module to define
    an object with exactly the same name as the module itself.


    It''s also possible to initialize `datetime` objects with specific dates and times,
    such as the first Moon landing (Figure 4.2²):


    ```

    >>> moon_landing = datetime(1969, 7, 20, 20, 17, 40)

    1969-07-20 20:17:40 -0700

    >>> moon_landing.day

    20

    ```


    By default, `datetime` uses the local time zone, but this introduces weird location
    dependence to the operations, so it''s a good practice to use UTC instead:³


    2. Image courtesy of Castleski/Shutterstock.

    3. For most practical purposes, Coordinated Universal Time (UTC) is the same as
    Greenwich Mean Time. But why call it UTC? From the NIST Time and Frequency FAQ:
    **Q:** Why is UTC used as the acronym for Coordinated Universal Time instead of
    CUT? **A:** In 1970 the Coordinated Universal Time system was devised by an international
    advisory group of technical experts within the International Telecommunication
    Union (ITU). The ITU felt it was best to designate a single abbreviation for use
    in all languages in order to minimize confusion. Since unanimous agreement could
    not be achieved on using either the English word order, CUT, or the French word
    order, TUC, the acronym UTC was chosen as a compromise.


    **Figure 4.2:** Buzz Aldrin and Neil Armstrong somehow got to the Moon (and back!)
    without Python.


    ```

    >>> from datetime import timezone

    >>> now = datetime.now(timezone.utc)

    >>> print(now)

    2022-08-22 18:28:03.943097+00:00

    ```


    To make a `datetime` object for the Moon landing, we need to pass the time zone
    as a *keyword argument* (first seen in Section 2.3 and discussed further in Section
    5.1.2) using `tzinfo` (short for “time zone information”):


    ```

    >>> moon_landing = datetime(1969, 7, 20, 20, 17, 40, tzinfo=timezone.utc)

    >>> print(moon_landing)

    1969-07-20 20:17:40+00:00

    ```


    Finally, `datetime` objects can be subtracted from each other:


    ```

    >>> print(now - moon_landing)

    19390 days, 22:15:36.779053

    ```


    The result here is the number of days, hours, minutes, and seconds since the day
    and time of the Moon landing. (Your results, of course, will vary, because time
    marches on, and your value for **datetime.now** will differ.)


    You may have noticed that the month and day are returned as *unit-offset* values,
    which differs from the zero-offset indexing used for lists (Section 3.2). For
    example, in the eighth month (August), the return value of **now.month()** is
    **8** rather than 7 (as it would be if months were being treated like indices
    of a zero-offset list). There is one important value that *is* returned as a zero-offset
    index, though:


    ```

    >>> moon_landing.weekday()

    6

    ```


    Here **weekday** returns the index of the weekday, and because it''s zero-offset
    the **6** index indicates that the Moon landing happened on the seventh day of
    the week.


    We have to be careful here, because in many places (including the United States)
    day **0** is Sunday, and indeed some programming languages (such as JavaScript
    and Ruby) follow this convention. But the official international standard is that
    Monday is the first day, and Python follows this convention instead.


    As a result, we can get the name of the day of the week by making a list of strings
    for the days of the week (assigned to an ALL CAPS identifier, a common Python
    convention indicating a constant), and then using the return value of **weekday**
    as an index in the list with the square bracket notation (Section 3.1):


    ```

    >>> DAYNAMES = ["Monday", "Tuesday", "Wednesday",

    ...             "Thursday", "Friday", "Saturday", "Sunday"]

    >>> DAYNAMES[moon_landing.weekday()]

    ''Sunday''

    >>> DAYNAMES[datetime.now().weekday()]

    ''Monday''

    ```


    (These day names are actually available as part of the **calendar** module via
    **calendar.day_name**. You just have to run **import calendar** to load the module.
    See Section 4.2.1 for an example.) Your results for the last line will vary, of
    course, unless you happen to be reading this on a Monday.


    As a final exercise, let''s update our Flask hello app from Listing 1.11 with
    a greeting including the day of the week. The code appears in Listing 4.3, with
    the result as shown in Figure 4.3. (Refer to Section 1.5 for the commands to run
    the Flask app.) Note that Listing 4.3 follows the convention of importing system
    libraries first (e.g., **datetime**), followed by third-party libraries (e.g.,
    **flask**), separated by newlines and'
