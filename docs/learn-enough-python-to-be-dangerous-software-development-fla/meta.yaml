    使用 log *x* 代替：¹


    1. 目前尚不清楚为什么入门数学教科书决定使用 ln *x* 表示自然对数，而数学家通常将其写为 log *x*，即使他们将其写为 ln *x*，他们仍然经常将其*发音*为“log
