    philosophy of always doing things “for real”, even as early as Chapter 1 we''ll
    deploy a (very simple) dynamic Python application to the live Web. This chapter
    also includes pointers to the latest setup and installation instructions via *Learn
    Enough Dev Environment to Be Dangerous* (https://www.learnenough.com/dev-environment),
    which is available for free online and as a free downloadable ebook.


    After mastering “hello, world”, we''ll take a tour of some Python *objects*, including
    strings (Chapter 2), lists (Chapter 3), and other native objects like dates, dictionaries,
    and regular expressions (Chapter 4). Taken together, these chapters constitute
    a gentle introduction to *object-oriented programming* with Python.


    In Chapter 5, we''ll learn the basics of *functions*, an essential subject for
    virtually every programming language. We''ll then apply this knowledge to an elegant
    and powerful style of coding known as *functional programming*, including an introduction
    to *comprehensions* (Chapter 6).


    Having covered the basics of built-in Python objects, in Chapter 7 we''ll learn
    how to make objects of our own. In particular, we''ll define an object for a *phrase*,
    and then develop a method for determining whether or not the phrase is a *palindrome*
    (the same read forward and backward).


    Our initial palindrome implementation will be rather rudimentary, but we''ll extend
    it in Chapter 8 using a powerful technique called *test-driven development* (TDD).
    In the process, we''ll learn more about testing generally, as well as how to create
    and publish a Python package.


    In Chapter 9, we''ll learn how to write nontrivial *shell scripts*, one of Python''s
    biggest strengths. Examples include reading from both files and URLs, with a final
    example showing how to manipulate a downloaded file as if it were an HTML web
    page.


    In Chapter 10, we''ll develop our first full Python web application: a site for
    detecting palindromes. This will give us a chance to learn about *routes*, *layouts*,
    *embedded Python*, and *form handling*, together with a second application of
    TDD. As a capstone to our work, we''ll deploy our palindrome detector to the live
    Web.


    Finally, in Chapter 11, we''ll get an introduction to Python tools used in the
    booming field of *data science*. Topics include numerical calculations with NumPy,
    data'
  - '[PAGE 15]


    visualization with Matplotlib, data analysis with pandas, and machine learning
    with scikit-learn.


    # Additional Features


    In addition to the main tutorial material, *Learn Enough Python to Be Dangerous*
    includes a large number of exercises to help you test your understanding and to
    extend the material in the main text. The exercises include frequent hints and
    often include the expected answers, with community solutions available by separate
    subscription at www.learnenough.com.


    # Final Thoughts


    *Learn Enough Python to Be Dangerous* gives you a practical introduction to the
    fundamentals of Python, both as a general-purpose programming language and as
    a specialist language for web development and data science. After learning the
    techniques covered in this tutorial, and especially after developing your technical
    sophistication, you''ll know everything you need to write shell scripts, publish
    Python packages, deploy dynamic web applications, and use key Python data-science
    tools. You''ll also be ready for a huge variety of other resources, including
    books, blog posts, and online documentation.


    # Learn Enough Scholarships


    Learn Enough is committed to making a technical education available to as wide
    a variety of people as possible. As part of this commitment, in 2016 we created
    the Learn Enough Scholarship program.¹ Scholarship recipients get free or deeply
    discounted access to the Learn Enough All Access subscription, which includes
    all of the Learn Enough online book content, embedded videos, exercises, and community
    exercise answers.


    As noted in a 2019 RailsConf Lightning Talk,² the Learn Enough Scholarship application
    process is incredibly simple: Just fill out a confidential text area telling us
    a little about your situation. The scholarship criteria are generous and flexible—we
    understand that there are an enormous number of reasons for wanting a scholarship,
    from being a student, to being between jobs, to living in a country with an unfavorable


    1. https://www.learnenough.com/scholarship

    2. https://www.learnenough.com/scholarship-talk'
  - '[PAGE 16]


    exchange rate against the U.S. dollar. Chances are that, if you feel like you''ve
    got a good reason, we''ll think so, too.


    So far, Learn Enough has awarded more than 2,500 scholarships to aspiring developers
    around the country and around the world. To apply, visit the Learn Enough Scholarship
    page at www.learnenough.com/scholarship. Maybe the next scholarship recipient
    could be you!'
- md: '# Acknowledgments


    Thanks to Paul Logston, Tom Repetti, and Ron Lee for their helpful comments on
    drafts of *Learn Enough Python to Be Dangerous*. Thanks also to Prof. Jetson Leder-Luis
    of Boston University and data scientist Amadeo Bellotti for their helpful feedback
    and assistance in preparing Chapter 11. Any errors that remain in the text are
    entirely the fault of these fine gentlemen.


    As always, thanks to Debra Williams Cauley for shepherding the production process
    at Pearson.


    # About the Author


    **Michael Hartl** (www.michaelhartl.com) is the creator of the *Ruby on Rails™
    Tutorial* (www.railstutorial.org), one of the leading introductions to web development,
    and is cofounder and principal author at Learn Enough (www.learnenough.com). Previously,
    he was a physics instructor at the California Institute of Technology (Caltech),
    where he received a Lifetime Achievement Award for Excellence in Teaching. He
    is a graduate of Harvard College, has a Ph.D. in Physics from Caltech, and is
    an alumnus of the Y Combinator entrepreneur program.


    # CHAPTER 1

    Hello, World!


    Welcome to *Learn Enough Python to Be Dangerous*!


    This tutorial is designed to get you started writing practical and modern Python
    programs as fast as possible, with a focus on the real tools used every day by
    software developers. You’ll see how everything fits together by learning skills
    like testing and test-driven development, publishing packages, beginning web development,
    and data science. As a result, *Learn Enough Python to Be Dangerous* can serve
    either as a standalone introduction or as an excellent prerequisite for longer
    and more syntax-heavy Python tutorials, of which there are many excellent ones.


    Python is one of the world’s most popular programming languages, and for good
    reason. Python has a clean syntax, flexible data types, a wealth of useful libraries,
    and a powerful and elegant design that supports multiple styles of programming.
    Python has seen particularly robust adoption for command-line programs (also known
    as *scripting*, as discussed in Chapter 9), web development (via frameworks like
    *Flask* (Chapter 10) and *Django*), and data science (especially data analysis
    using *pandas* and machine learning with libraries like *scikit-learn* (Chapter
    11)).


    Just about the only things Python isn’t good for are running inside a web browser
    (for which JavaScript (https://www.learnenough.com/javascript-tutorial) is necessary)
    and writing programs where speed is of the essence. And even in the latter case,
    specialized libraries like NumPy (Section 11.2) can give us the speed of a lower-level
    language like C with the power and flexibility of a higher-level language like
    Python.¹


    1. “Higher-level” languages like Python, JavaScript, and Ruby generally have greater
    support for abstraction and perform automatic memory management.


    *Learn Enough Python to Be Dangerous* broadly follows the same structure as *Learn
    Enough JavaScript to Be Dangerous* (https://www.learnenough.com/javascript) and
    *Learn Enough Ruby to Be Dangerous* (https://www.learnenough.com/ruby), either
    of which can be studied either before or after this tutorial. Because many of
    the examples are the same, the tutorials reinforce each other nicely—there are
    few things more instructive in computer programming than seeing the same basic
    problems solved in two or more different languages.² As noted in Box 1.1, though,
    we’ll definitely be writing *Python*, not JavaScript or Ruby translated into Python.


    > ## Box 1.1: Pythonic programming


    More so even than users of other languages, Python programmers—sometimes known
    as *Pythonistas*—tend to have strongly held opinions on what constitutes proper
    programming style. For example, as noted by Python contributor Tim Peters in “The
    Zen of Python” (Section 1.2.1): “There should be one—and preferably only one—obvious
    way to do it.” (This stands in contrast to a famous principle associated with
    the Perl programming language known as “TMTOWTDI”: There’s More Than One Way To
    Do It.)


    Code that adheres to good programming practices (as judged by Pythonistas) is
    known as *Pythonic* code. This includes proper code formatting (especially the
    practices in PEP 8 – Style Guide for Python Code (https://peps.python.org/pep-0008/)),
    using built-in Python facilities like `enumerate()` (Section 3.5) and `items()`
    (Section 4.4.1), and using characteristic idioms like list and dictionary comprehensions
    (Chapter 6). (As noted in the official documentation (https://peps.python.org/pep-0001/),
    “PEP stands for Python Enhancement Proposal. A PEP is a design document providing
    information to the Python community, or describing a new feature for Python or
    its processes or environment.” PEP 8 is the PEP specifically concerned with Python
    code style and formatting.)


    The code in this tutorial generally strives to be as Pythonic as possible given
    the material introduced at the given point in the exposition. In addition, we
    will often begin by introducing a series of intentionally *unPythonic* examples,
    culminating in a fully Pythonic version. In such cases, the distinction between
    unPythonic and Pythonic code will be carefully noted.


    Pythonistas have been known to be a bit harsh in their judgment of unPythonic
    code, which can lead beginners to become overly concerned about programming


    2. See Rosetta Code (https://rosettacode.org/wiki/Rosetta_Code) for a huge compilation
    of such examples.


    Pythonically. But “Pythonic” is a sliding scale, depending on how much experience
    you have in the language. Moreover, programming is fundamentally about *solving
    problems*, so don’t let worries about programming Pythonically stop you from solving
    the problems *you* face in your role as a Python programmer and software developer.


    There are no programming prerequisites for *Learn Enough Python to Be Dangerous*,
    although it certainly won’t hurt if you’ve programmed before. What is important
    is that you’ve started developing your *technical sophistication* (Box 1.2), either
    on your own or using the preceding Learn Enough tutorials (https://www.learnenough.com/courses).
    These tutorials include the following, which together make a good list of prerequisites
    for this book:


    - 1. *Learn Enough Command Line to Be Dangerous* (https://www.learnenough.com/command-line)

    - 2. *Learn Enough Text Editor to Be Dangerous* (https://www.learnenough.com/text-editor)

    - 3. *Learn Enough Git to Be Dangerous* (https://www.learnenough.com/git)


    All of these tutorials are available as print or digital books or online for individual
    purchase, and we offer a subscription service—the Learn Enough All Access subscription
    (https://www.learnenough.com/all-access)—with access to all the corresponding
    online courses.


    > **Box 1.2: Technical sophistication**


    An essential aspect of using computers is the ability to figure things out and
    troubleshoot on your own, a skill we at Learn Enough (https://www.learnenough.com/)
    call *technical sophistication*.


    Developing technical sophistication means not only following systematic tutorials
    like *Learn Enough Python to Be Dangerous*, but also knowing when it’s time to
    break free of a structured presentation and just start Googling around for a solution.


    *Learn Enough Python to Be Dangerous* will give us ample opportunity to practice
    this essential technical skill.


    In particular, as alluded to above, there is a wealth of Python reference material
    on the Web, but it can be hard to use unless you already basically know what you''re
    doing. One goal of this tutorial is to be the key that unlocks the documentation.
    This will include lots of pointers to the official Python site.


    Especially as the exposition gets more advanced, I''ll also sometimes include
    the web searches you could use to figure out how to accomplish the particular
    task at hand. For example, how do you use Python to manipulate a Document Object
    Model (DOM)? Like this: python dom manipulation.


    You won''t learn everything there is to know about Python in this tutorial—that
    would take thousands of pages and centuries of effort—but you will learn enough
    Python to be *dangerous* (Figure 1.1³). Let''s take a look at what that means.


    In Chapter 1, we''ll begin at the beginning with a series of simple “hello, world”
    programs using several different techniques, including an introduction to an interactive
    command-line program for evaluating Python code. In line with the Learn Enough
    philosophy of always doing things “for real”, even as early as the first chapter
    we''ll deploy a (very simple) dynamic Python application to the live Web. You''ll


    ![](img/b3303452eae4d7974600cd38b159398e_24_0.png)


    **Figure 1.1:** Python knowledge, like Rome, wasn''t built in a day.


    3. Image courtesy of Kirk Fisher/Shutterstock.'
  mdcn: '# 致谢


    感谢保罗·洛格斯顿、汤姆·雷佩蒂和罗恩·李对《*Learn Enough Python to Be Dangerous*》书稿提出的宝贵意见。同时感谢波士顿大学的杰特森·莱德-路易斯教授和数据科学家阿马德奥·贝洛蒂在第11章准备过程中提供的有益反馈和协助。文中若仍有任何错误，责任完全在于这些优秀的绅士们。


    一如既往，感谢黛布拉·威廉姆斯·考利在培生出版社的制作过程中给予的指导。


    # 关于作者


    **迈克尔·哈特尔**（www.michaelhartl.com）是《*Ruby on Rails™ Tutorial*》（www.railstutorial.org）的创建者，这是Web开发领域的领先入门教程之一，同时也是Learn
    Enough（www.learnenough.com）的联合创始人和主要作者。此前，他曾是加州理工学院（Caltech）的物理学讲师，并因卓越的教学获得终身成就奖。他毕业于哈佛大学，拥有加州理工学院物理学博士学位，并且是Y
    Combinator企业家项目的校友。


    # 第1章

    你好，世界！


    欢迎来到《*Learn Enough Python to Be Dangerous*》！


    本教程旨在让你尽快开始编写实用且现代的Python程序，重点介绍软件开发者日常使用的真实工具。你将通过学习测试和测试驱动开发、发布包、Web开发入门以及数据科学等技能，了解所有内容如何协同工作。因此，《*Learn
    Enough Python to Be Dangerous*》既可以作为独立的入门教程，也可以作为更长、更注重语法的Python教程的绝佳预备课程，而后者有许多优秀的版本。


    Python是世界上最流行的编程语言之一，这是有充分理由的。Python语法简洁、数据类型灵活、拥有丰富的有用库，并且其强大而优雅的设计支持多种编程风格。Python在命令行程序（也称为*脚本*，如第9章所述）、Web开发（通过*Flask*（第10章）和*Django*等框架）以及数据科学（特别是使用*pandas*进行数据分析和使用*scikit-learn*（第11章）等库进行机器学习）方面尤其受到广泛采用。


    Python几乎唯一不擅长的是在Web浏览器中运行（这需要JavaScript（https://www.learnenough.com/javascript-tutorial））以及编写对速度要求极高的程序。即使在后一种情况下，像NumPy（第11.2节）这样的专用库也能让我们获得像C这样的低级语言的速度，同时兼具像Python这样的高级语言的强大功能和灵活性。¹


    1. 像Python、JavaScript和Ruby这样的“高级”语言通常对抽象有更强的支持，并执行自动内存管理。


    《*Learn Enough Python to Be Dangerous*》大致遵循与《*Learn Enough JavaScript to Be Dangerous*》（https://www.learnenough.com/javascript）和《*Learn
    Enough Ruby to Be Dangerous*》（https://www.learnenough.com/ruby）相同的结构，这两本教程可以在本教程之前或之后学习。由于许多示例相同，这些教程相互补充得很好——在计算机编程中，很少有比看到相同的基本问题用两种或更多不同语言解决更具启发性的事情了。²
    然而，如框1.1所述，我们肯定会编写*Python*代码，而不是将JavaScript或Ruby翻译成Python。


    > ## 框1.1：Pythonic编程


    与其他语言的用户相比，Python程序员——有时被称为*Pythonistas*——往往对什么构成正确的编程风格持有强烈的意见。例如，正如Python贡献者蒂姆·彼得斯在“Python之禅”（第1.2.1节）中所指出的：“应该有一种——最好只有一种——显而易见的方法来做这件事。”（这与Perl编程语言相关的一个著名原则“TMTOWTDI”形成对比：不止一种方法可以做到。）


    遵循良好编程实践（由Pythonistas判断）的代码被称为*Pythonic*代码。这包括正确的代码格式（特别是PEP 8 – Python代码风格指南（https://peps.python.org/pep-0008/）中的实践）、使用内置Python功能如`enumerate()`（第3.5节）和`items()`（第4.4.1节），以及使用特征性习语如列表和字典推导式（第6章）。（如官方文档（https://peps.python.org/pep-0001/）所述，“PEP代表Python增强提案。PEP是向Python社区提供信息或描述Python新特性或其流程或环境的设计文档。”PEP
    8是专门关注Python代码风格和格式的PEP。）


    本教程中的代码通常力求在给定讲解点所介绍的材料范围内尽可能Pythonic。此外，我们通常会先介绍一系列故意*非Pythonic*的示例，最终以一个完全Pythonic的版本结束。在这种情况下，非Pythonic和Pythonic代码之间的区别将被仔细注明。


    众所周知，Pythonistas对非Pythonic代码的评判可能有点严厉，这可能导致初学者过度关注以Pythonic的方式编程。但“Pythonic”是一个滑动的尺度，取决于你在该语言中的经验。此外，编程从根本上说是关于*解决问题*，所以不要让对Pythonic编程的担忧阻止你解决作为Python程序员和软件开发者所面临的*你自己的*问题。


    《*Learn Enough Python to Be Dangerous*》没有编程先决条件，尽管如果你以前编程过当然没有坏处。重要的是，你已经开始培养你的*技术素养*（框1.2），无论是自学还是使用之前的Learn
    Enough教程（https://www.learnenough.com/courses）。这些教程包括以下内容，它们共同构成了本书的良好先决条件列表：


    - 1. *Learn Enough Command Line to Be Dangerous*（https://www.learnenough.com/command-line）

    - 2. *Learn Enough Text Editor to Be Dangerous*（https://www.learnenough.com/text-editor）

    - 3. *Learn Enough Git to Be Dangerous*（https://www.learnenough.com/git）


    所有这些教程都可以作为印刷版或数字版书籍购买，也可以在线单独购买，我们还提供订阅服务——Learn Enough All Access订阅（https://www.learnenough.com/all-access）——可以访问所有相应的在线课程。


    > **框1.2：技术素养**


    使用计算机的一个重要方面是能够自己弄清楚问题并进行故障排除，这项技能在Learn Enough（https://www.learnenough.com/）被称为*技术素养*。


    培养技术素养不仅意味着遵循像《*Learn Enough Python to Be Dangerous*》这样的系统教程，还意味着知道何时该摆脱结构化的讲解，直接开始在网上搜索解决方案。


    《*Learn Enough Python to Be Dangerous*》将为我们提供大量机会来练习这项基本的技术技能。


    特别是，如上所述，网上有丰富的Python参考资料，但除非你基本上已经知道自己在做什么，否则可能很难使用。本教程的一个目标是成为解锁文档的钥匙。这将包括大量指向Python官方网站的指引。


    随着讲解的深入，我有时还会包含你可以用来弄清楚如何完成手头特定任务的网络搜索。例如，如何使用Python操作文档对象模型（DOM）？像这样：python dom
    manipulation。


    你不会在本教程中学到关于Python的所有知识——那需要数千页和几个世纪的努力——但你会学到足够的Python知识，从而变得*危险*（图1.1³）。让我们看看这意味着什么。


    在第1章中，我们将从头开始，使用几种不同的技术编写一系列简单的“hello, world”程序，包括介绍一个用于评估Python代码的交互式命令行程序。按照Learn
    Enough始终“真实”做事的理念，即使在第一章，我们也会将一个（非常简单的）动态Python应用程序部署到实时Web上。你将


    ![](img/b3303452eae4d7974600cd38b159398e_24_0.png)


    **图1.1：** Python知识，如同罗马，非一日建成。


    3. 图片由Kirk Fisher/Shutterstock提供。'
