    \n```python\n>>> A = a[:2, :2]\n>>> A\narray([[1, 2],\n       [4, 5]])\n```\n\n\
    NumPy包含大量对常见数值操作的支持，例如线性代数，在这种情况下使用了经过超级优化和实战检验的包，如BLAS和LAPACK。这些例程主要用C和Fortran编写，但我们不必了解这些语言，因为它们通过`linalg`库被Python封装。⁷\n\
