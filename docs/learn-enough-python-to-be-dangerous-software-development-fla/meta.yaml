    \ 8   Fare          891 non-null    float64\n 9   Cabin         204 non-null \
    \   object \n 10  Embarked      889 non-null    object \ndtypes: float64(2), int64(5),\
    \ object(4)\n```\n\n从生存率的角度来看，最有趣的列可能是乘客等级（\"**Pclass**\"）、性别（\"**Sex**\"）和年龄（\"\
    **Age**\"）。\n\n我们可以使用 pandas 发现乘客等级包含三个类别：\n\n```\n>>> titanic[\"Pclass\"].unique()\n\
