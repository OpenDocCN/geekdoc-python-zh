  md: '# 5.1 Function Definitions


    We see in Listing 5.4 that a Python function starts with the **def** keyword followed
    by the function name and any arguments; next, there’s an optional but highly recommended
    *docstring* (not usually used in the REPL but included here for reasons we’ll
    see in a moment); then, there’s the function *body*, which determines the return
    value of the function using the **return** keyword (which in this case is the
    *only* line in the body, not counting the docstring); finally, the function is
    ended by a newline. Note that this final fact contrasts with nearly all other
    programming languages, which typically end function definitions with a closing
    curly brace (e.g., C, C++, Perl, PHP, Java, and JavaScript), a closing parenthesis
    (most varieties of Lisp), or a special keyword like **end** (e.g., Ruby).


    We can test the newly defined function as follows:


    ```

    >>> dayname(datetime.now())

    ''Thursday''

    ```


    This might not seem like a big improvement, but note that it’s conceptually simpler
    because we don’t have to think about the implementation (i.e., finding the element
    of an object corresponding to the value of *weekday()*). This sort of *abstraction
    layer* between function name and implementation is useful even if the function
    definition is only one or two lines. (Indeed, I consider one- or two-line functions
    to be a sign of good program design.) We’ll put this function to good use in Section
    5.2 to simplify the customized greeting in our hello app (Listing 4.3).


    As noted in Section 2.1, including a triple-quoted docstring as in Listing 5.4
    is a standard practice with Python functions.² In addition to being useful to
    people reading the code, the docstring itself is available in the REPL via the
    **help()** function:


    ```

    >>> help(dayname)

    ```


    The result of running **help()** is system-dependent; on my system, running **help(dayname)**
    in a terminal gives the result shown in Figure 5.2. (This uses the **less** interface
    covered (https://www.learnenough.com/command-line-tutorial/inspecting_files#sec-less_is_more)
    in *Learn Enough Command Line to Be Dangerous* (https://www.learnenough.com/command-line),
    so I typed **q** to quit.)


    2. Python docstrings typically use the imperative mood, so “Return the name” rather
    than “Returns the name”.'
