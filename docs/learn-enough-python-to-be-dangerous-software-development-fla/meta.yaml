    The second command here shows how to clean the data a bit using the **dropna()**
    method, which drops any “Not Available” values, such as **None**, **NaN**, or
    **NaT** (“Not a Time”).


    By default, Series axis labels are numbered just like array indices (in this case,
    0–5). The set of axes is known as the *index* of the Series:


    ```

    >>> pd.Series([1, 2, 3, "foo", np.nan, "bar"]).index

    RangeIndex(start=0, stop=6, step=1)

    ```


    It’s also possible to define our own axis labels, which must have the same number
    of elements as the Series:


    ```

    >>> from numpy.random import default_rng

    >>> rng = default_rng()

    >>> s = pd.Series(rng.standard_normal(5), index=["a", "b", "c", "d", "e"])

    >>> s

    a    0.770407

    b   -0.698040

    c    1.977234

    d   -1.559065

    e   -0.713496

    dtype: float64

    ```


    Series act both like NumPy ndarrays and like regular Python dictionaries:


    ```

    >>> s[0]                    # Acting like an ndarray

    0.7704065892197263

    >>> s[1:3]                  # Supports slicing

    b   -0.698040

    c    1.977234

    dtype: float64

    >>> s["c"]                  # Access by axis label

    1.977233512910388

    >>> s.keys()                # Keys are just the Series index.

    Index([''a'', ''b'', ''c'', ''d'', ''e''], dtype=''object'')

    >>> s.index

    Index([''a'', ''b'', ''c'', ''d'', ''e''], dtype=''object'')

    ```'
