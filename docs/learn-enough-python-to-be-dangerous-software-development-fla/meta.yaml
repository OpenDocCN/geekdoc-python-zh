  md: '# 4.4 Dictionaries


    It is possible (and often convenient) to use this syntax to define dictionaries
    directly:


    ```

    >>> moonman = {"first_name": "Buzz", "last_name": "Aldrin"}

    >>> moonman

    {''first_name'': ''Buzz'', ''last_name'': ''Aldrin''}

    ```


    Let''s take a look at a bigger dictionary consisting of keys equal to prominent
    moonwalkers and values corresponding to the dates of their first moonwalks:


    ```

    >>> moonwalks = {"Neil Armstrong": 1969,

    ...             "Buzz Aldrin": 1969,

    ...             "Alan Shepard": 1971,

    ...             "Eugene Cernan": 1972,

    ...             "Michael Jackson": 1983}

    ```


    We can look at the keys and values separately, which (as of Python 3.6 and later)
    are stored *in order* in special-purpose Python objects:


    ```

    >>> moonwalks.keys()

    dict_keys([''Neil Armstrong'', ''Buzz Aldrin'', ''Alan Shepard'',

    ''Eugene Cernan'', ''Michael Jackson''])

    >>> moonwalks.values()

    dict_values([1969, 1969, 1971, 1972, 1983])

    ```


    Note that earlier versions of Python didn''t order dictionary elements, so you
    should take care when making any assumptions about ordering.

    Like a list index, a dictionary key maps to only one value at a time. This means
    that we can replace the value corresponding to a key but we can''t have two identical
    keys. As a result, it''s sometimes useful to think of dictionary keys as being
    like an ordered set, since (like sets) they can''t have repeated elements. Indeed,
    the special-purpose **keys()** object mentioned above, technically known as a
    *view*, can be treated like a set in some contexts; for example, the following
    code performs a set intersection as in Section 3.6:


    ```

    >>> apollo_11 = {"Neil Armstrong", "Buzz Aldrin"}

    >>> moonwalks.keys() & apollo_11

    {''Neil Armstrong'', ''Buzz Aldrin''}

    ```'
