  md: '# 11.8 Further Resources and Conclusion


    Congratulations—now you *really* know enough Python to be dangerous! In addition
    to the core material, you now have a good grounding in some of the most important
    tools for data science with Python.


    There are a million directions to go from here; here are a few of the possibilities:


    +   - The official pandas documentation includes 10 minutes to pandas followed
    by a large amount of additional tutorial material. The official documentation
    for NumPy, Matplotlib, and scikit-learn are also excellent resources. Finally,
    the SciPy and SageMath projects are worth knowing about; Sage in particular includes
    the ability to do symbolic as well as numerical computations (much like *Mathematica*
    or Maple).

    - "Python for Scientific Computing": Although not for data science per se, this
    resource covers a lot of the same material needed for the subject. Among other
    things, "Python for Scientific Computing" was the inspiration for the section
    using Nobel Prize data (Section 11.5).

    - *Python Data Science Handbook* by Jake VanderPlas: This book takes a similar
    approach to this chapter and is available for free online.

    - *Data Science from Scratch* by Joel Grus: This book is basically the polar opposite
    of this chapter, taking a first-principles approach to data science that focuses
    on the foundational ideas of the subject. This approach is impossible in a space
    as short as ours but is an excellent way to go if you''re interested in becoming
    a professional data scientist.

    - Bloom Institute of Technology''s Data Science Course: This online course is
    aimed at serious students interested in a career in data science.

    - *Hands-On Machine Learning with Scikit-Learn, Keras, and TensorFlow* by Aurélien
    Géron: A much more advanced introduction to machine learning than Section 11.7,
    including Keras, a Python interface to Google''s TensorFlow library.


    For completeness, here are the general Python resources recommended in Section
    10.6:


    +   - Replit''s 100 days of code: This is a guided introduction to Python programming
    using Replit''s amazing collaborative browser-based IDE.'
  merge: -1
