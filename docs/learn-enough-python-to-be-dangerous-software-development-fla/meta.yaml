    Beautiful is better than ugly.

    Explicit is better than implicit.

    Simple is better than complex.

    Complex is better than complicated.

    Flat is better than nested.

    Sparse is better than dense.

    Readability counts.

    Special cases aren''t special enough to break the rules.

    Although practicality beats purity.

    Errors should never pass silently.

    Unless explicitly silenced.

    In the face of ambiguity, refuse the temptation to guess.

    There should be one-- and preferably only one --obvious way to do it.

    Although that way may not be obvious at first unless you''re Dutch.

    Now is better than never.

    Although never is often better than *right* now.

    If the implementation is hard to explain, it''s a bad idea.

    If the implementation is easy to explain, it may be a good idea.

    Namespaces are one honking great idea -- let''s do more of those!

    ```


    - 2. What happens if you use `print("hello, world!", end="")` in place of `print()`
    by itself? (The `end=""` is known as a *keyword argument* (Section 5.1.2).) How
    would you change the `end` argument to get the result to match Listing 1.5? *Hint:*
    Recall (https://www.learnenough.com/command-line-tutorial/basics#sec-exercises_man)
    that `\n` is the typical way to represent a newline character.


    ## 1.3 Python in a File


    As convenient as it is to be able to explore Python interactively, most Real Programming™
    takes place in text files created with a text editor. In this section, we''ll
    show how to create and execute a Python file with the same "hello, world" program
    we''ve discussed in Section 1.2. The result will be a simplified prototype of
    the reusable Python files we''ll start learning about in Section 5.2.


    We''ll start by creating a directory for this tutorial and a Python file (with
    a `.py` file extension) for our `hello` program (be sure to exit the interpreter
