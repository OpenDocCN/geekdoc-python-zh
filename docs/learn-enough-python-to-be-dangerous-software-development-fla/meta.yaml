    ## 3.4 More List Techniques


    There are many other things we can do with lists other than accessing and selecting
    elements. In this section we''ll discuss element inclusion, sorting and reversing,
    and appending and popping.


    ### 3.4.1 Element Inclusion


    As with strings (Section 2.5), lists support testing for element inclusion using
    the `in` keyword:


    ```

    >>> a = [42, 8, 17, 99]

    [42, 8, 17, 99]

    >>> 42 in a

    True

    >>> "foo" in a

    False

    ```


    ### 3.4.2 Sorting and Reversing


    Python has powerful facilities for *sorting* and *reversing* lists. They come
    in two general types: *in-place* and *generators*. Let''s take a look at some
    examples to see what this means.


    We''ll start by sorting a list in place—an excellent trick that in ye olden days
    of C often required a custom implementation.³ In Python, we just call `sort()`:


    ```

    >>> a = [42, 8, 17, 99]

    >>> a.sort()

    >>> a

    [8, 17, 42, 99]

    ```


    As you might expect for a list of integers, `a.sort()` sorts the list numerically
    (unlike, e.g., JavaScript, which confusingly sorts them "alphabetically", so that
    17 comes before 8). We also see that (unlike Ruby but *like* JavaScript) sorting
    a list changes, or *mutates*, the list itself. (We''ll see in a moment that it
    returns `None`.)


    > 3. This isn''t entirely fair to C: Python itself is written in C, so `sort()`
    actually is just such a "custom implementation"!


    We can use **reverse()** to reverse the elements in a list:


    ```

    >>> a.reverse()

    >>> a

    [99, 42, 17, 8]

    ```


    As with **sort()**, note that **reverse()** mutates the list itself.


    Such mutating methods can help demonstrate a common gotcha about Python lists
    involving list assignment. Suppose we have a list **a1** and want a copy called
    **a2** (Listing 3.5).


    #### Listing 3.5: A dangerous assignment.


    ```

    >>> a1 = [42, 8, 17, 99]

    >>> a2 = a1    # Dangerous!

    ```


    The assignment in the second line is dangerous because **a2** points to the same
    location in the computer''s memory as **a1**, which means that if we mutate **a1**
    it changes **a2** as well:


    ```

    >>> a1.sort()

    >>> a1

    [8, 17, 42, 99]

    >>> a2

    [8, 17, 42, 99]

    ```


    We see here that **a2** has changed even though we didn''t do anything to it directly.
    (You can avoid this using the **list()** function or the **copy()** method, as
    in **a2 = list(a1)** or **a2 = a1.copy()**.)


    Python in-place methods are highly efficient, but usually more convenient are
    the related **sorted()** and **reversed()** functions. For example, we can obtain
    a sorted list as follows:


    ```

    >>> a = [42, 8, 17, 99]

    >>> sorted(a)    # Pythonic

    [8, 17, 42, 99]

    >>> a

    [42, 8, 17, 99]

    ```


    Here, unlike the case of **sort()**, the original list is unchanged.


    Similarly, we can (almost) obtain a reversed list using **reversed()**:


    ```

    >>> a

    [42, 8, 17, 99]

    >>> reversed(a)

    <list_reverseiterator object at 0x109561910>

    ```


    Unfortunately, the parallel structure with **sorted()** is slightly broken, at
    least as of this writing. Rather than returning a list, the **reversed()** function
    returns an *iterator*, which is a special type of Python object designed to be
    (you guessed it) iterated over. This isn''t usually a problem because we''ll usually
    be joining or looping over the reversed elements, in which case the generator
    will serve just fine (Section 5.3), but when we really need a list we can call
    the **list()** function directly (Section 3.1):


    ```

    >>> list(reversed(a))

    [99, 42, 17, 8]

    ```


    As noted, this minor wart rarely makes a difference since the generator''s behavior
    is effectively identical to the list version when being iterated over.⁴


    ### Comparison


    Lists support the same basic equality and inequality comparisons as strings (Chapter
    2):


    ```

    >>> a = [1, 2, 3]

    >>> b = [1, 2, 3]

    >>> a == b

    True

    >>> a != b

    False

    ```


    Python also supports **is**, which tests whether two variables represent the same
    object. Because **a** and **b**, although they contain the same elements, are
    not the same object in Python''s memory system, **==** and **is** return different
    results in this case:


    ```

    >>> a == b

    True

    >>> a is b

    False

    ```


    In contrast, the lists **a1** and **a2** from Listing 3.5 are equal using both
    comparisons:


    ```

    >>> a1 == a2

    True

    >>> a1 is a2

    True

    ```


    The second **True** value follows because **a1** and **a2** truly are the exact
    same object. This behavior is effectively the same as the **===** syntax supported
    by many other languages, such as Ruby and JavaScript.


    According to the PEP 8 style guide, **is** should always be used when comparing
    with **None**. For example, we can use **is** to confirm that the list methods
    for reversing and sorting in place return **None**:


    ```

    >>> a.reverse() == None    # Not Pythonic

    True

    >>> a.sort() == None       # Not Pythonic

    True

    >>> a.reverse() is None    # Pythonic

    True

    >>> a.sort() is None       # Pythonic

    True

    ```


    ### 3.4.3 Appending and Popping


    One useful pair of list methods is **append()** and **pop()**—**append()** lets
    us append an element to the end of a list, while **pop()** removes it and returns
    the value:


    ```

    >>> a = sorted([42, 8, 17, 99])

    >>> a

    [8, 17, 42, 99]

    >>> a.append(6)             # Appending to a list

    >>> a

    [8, 17, 42, 99, 6]

