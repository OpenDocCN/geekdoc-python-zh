    o


    b

    e

    .

    .

    .

    t

    i

    o

    n

    :

    ```


    As noted previously, there are often alternatives to looping, but the **for**
    style of looping is still an excellent place to start. As we''ll see in Chapter
    8, one powerful technique is to write a *test* for the functionality we want,
    then get it passing any way we can, and then *refactor* the code to use a more
    elegant method. The second step in this process (called *test-driven development*,
    or TDD) often involves writing inelegant but easy-to-understand code—a task at
    which the humble **for** loop excels.


