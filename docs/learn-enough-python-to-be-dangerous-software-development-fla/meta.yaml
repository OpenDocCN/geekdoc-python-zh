  md: 'Because Python can naturally iterate over a string''s characters, this technique
    is rarely needed explicitly; instead, we''ll typically use *iterators*, which
    we''ll learn about in Section 5.3.


    Perhaps the most common use of `split()` is with *no* arguments; in this case,
    the default behavior is to split on *whitespace* (such as spaces, tabs, or newlines):


    ```

    >>> "ant bat cat".split()

    [''ant'', ''bat'', ''cat'']

    >>> "ant\tbat\tcat\n    duck".split()

    [''ant'', ''bat'', ''cat'', ''duck'']

    ```


    We''ll investigate this case more closely when discussing *regular expressions*
    in Section 4.3.


    # 3.1.1 Exercises


    +   1. Assign `a` to the result of splitting the string “A man, a plan, a canal,
    Panama” on comma-space. How many elements does the resulting list have?

    2. Can you guess the method to reverse `a` in place? (Google around if necessary.)


    # 3.2 List Access


    Having connected strings with lists via the `split()` method, we''ll now discover
    a second close connection as well. Let''s start by assigning a variable to a list
    of characters created using `list()`:


    ```

    >>> a = list("badger")

    [''b'', ''a'', ''d'', ''g'', ''e'', ''r'']

    ```


    Here we''ve followed tradition and called the variable `a`, both because it''s
    the first letter of the alphabet and as a nod to the array type that lists so
    closely resemble.


    We can access particular elements of `a` using the same bracket notation we first
    encountered in the context of strings in Section 2.6, as seen in Listing 3.3.


    **Listing 3.3:** List access with the bracket notation.


    ```

    >>> a[0]

    ''b''

    >>> a[1]

    ```'
