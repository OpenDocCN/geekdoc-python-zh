  md: '# Box 11.2: Matplotlib mechanics


    The exact mechanics of getting Matplotlib plots to display varies widely depending
    on the exact details of your setup. The most explicit way to show plots, which
    works on most systems from the REPL, is to use the show() method:


    ```

    >>> import numpy as np

    >>> import matplotlib.pyplot as plt

    >>> x = np.linspace(-2, 2, 100)

    >>> fig, ax = plt.subplots(1, 1)

    >>> ax.plot(x, x*x)

    >>> plt.show()

    ```


    On many systems, this will spawn a window like Figure 11.7 with the result of
    the plot.


    In Jupyter notebooks, the environment can be configured to show Matplotlib plots
    automatically (“inline”, i.e., right in the notebook) by executing this command
    in a notebook cell:


    ```

    %matplotlib inline

    ```


    As far as I can tell, on some systems (including mine) this setting is on by default,
    with plots appearing automatically when the corresponding Jupyter cells are evaluated
    (Figure 11.8).


    In an environment such as the cloud IDE, it’s possible to switch to a non-graphical
    back-end, write out to a file, and then view the file in the browser. See this
    Stack Overflow thread (https://bit.ly/cloud-plot) if you’d like to go this route,
    but the recommended solution is to set up Jupyter on the cloud IDE as described
    in Box 11.1. In that case, you can set up inline plot display as described above
    (if in fact it’s not available automatically).


    # 11.3.1 Plotting


    We’ll start by reviewing the final example from Section 11.2, which defined a
    linearly spaced array with 100 points from 0 to τ:


    ```

    (venv) $ python3

    >>> import numpy as np

    >>> import matplotlib.pyplot as plt

    >>> from math import tau

    >>> x = np.linspace(0, tau, 100)

    ```'
