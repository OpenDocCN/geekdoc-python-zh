    @app.route(\"/\")\ndef hello_world():\n    return greeting(datetime.now())\n```\n\
    \n## 5.3 迭代器\n\n在本节中，我们将开始开发引言（第 1 章）中提到的回文主题。我们的目标是编写一个名为 `ispalindrome()` 的函数，如果其参数正向和反向相同则返回\
    \ `True`，否则返回 `False`。\n\n我们可以将回文最简单的定义表达为“一个字符串等于其反转的字符串。”（我们将随着时间的推移逐步扩展这个定义。）为了做到这一点，我们需要能够反转一个字符串。\n\
    \n反转字符串的一种直接方法是将 `list()` 和 `join()` 函数（第 3.4.4 节）与使用 `reverse()` 反转列表的能力（第 3.4.2\
