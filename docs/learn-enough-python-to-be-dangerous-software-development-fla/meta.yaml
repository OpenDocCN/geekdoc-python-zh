    # ## 8.1 Package Setup


    We saw as early as Section 1.5 that the Python ecosystem includes a large number
    of self-contained software packages. In this section, we''ll create a package
    based on the palindrome detector developed in Chapter 7. As part of this, we''ll
    set up the beginnings of a *test suite* to test our code.


    Python packages have a standard structure that can be visualized as shown in Listing
    8.1 (which contains both generic elements like `pyproject.toml` and non-generic
    elements like `palindrome_YOUR_USERNAME_HERE`). The structure includes some configuration
    files (discussed in just a moment) and two directories: a `src` (source) directory
    and a `tests` directory. The `src` directory in turn contains a directory for
    the palindrome package, which includes a special required file called `__init__.py`'
