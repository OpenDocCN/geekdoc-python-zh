    \n```python\n>>> Ainv = np.linalg.inv(A)           # 矩阵的逆\n>>> Ainv\narray([[-1.66666667,\
    \  0.66666667],\n       [ 1.33333333, -0.33333333]])\n```\n\n我们可以尝试使用`+`和`*`分别进行矩阵加法和乘法：\n\
    \n```python\n>>> A + Ainv\narray([[-0.66666667,  2.66666667],\n       [ 5.33333333,\
