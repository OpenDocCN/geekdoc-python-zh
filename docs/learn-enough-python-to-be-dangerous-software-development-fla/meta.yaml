  md: '# 11.2 Numerical Computations with NumPy


    Although Python has a reputation for being a “slow language”, in fact Python is
    written in C, one of the fastest languages in existence. The occasional slowness
    of Python is mostly a consequence of the things that also make it dynamic, which
    often involves layers of abstraction above the underlying C code. The NumPy library
    makes the underlying speed directly available to numerical computations by rewriting
    the most time-intensive parts directly in C.


    NumPy (pronounced “NUM-pie”, for “Numerical Python”) was originally part of the
    large and powerful SciPy (“SIE-pie”) library for scientific computing in Python
    but was factored out as a separate library because of its broad applicability.
    Indeed, data science is a great example: The core Python data-science library,
    pandas (Section 11.4), doesn’t need SciPy but relies heavily on NumPy for numerical
    computations. As a result, although a complete mastery of NumPy isn’t necessary
    for data science, it’s important to at least know the basics.


    Once NumPy has been installed (Listing 11.3), it can be included in a program,
    in the REPL, or in a Jupyter notebook as usual using `import`. The near-universal
    convention in data science and closely related communities is to import `numpy`
    as `np` for convenience:


    ```

    >>> import numpy as np

    ```


    (Most of the examples in this chapter include the REPL prompt >>>, but if you
    use Jupyter notebooks no prompt will be present, as seen in, e.g., Figure 11.1.)


    # 11.2.1 Arrays


    The combination SciPy + NumPy + Matplotlib (Section 11.3) represents an open-source
    alternative to the proprietary MATLAB system. Like MATLAB, NumPy is array-based,
    with the core data structure being an `ndarray` (short for “n-dimensional array”):


    ```

    >>> np.array([1, 2, 3])

    array([1, 2, 3])

    ```'
