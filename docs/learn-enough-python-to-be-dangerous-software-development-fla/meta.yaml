    \ 分组，就可以看到生存率的变化：\n\n```\n>>> titanic.groupby(\"Pclass\")[\"Survived\"].mean()\n\
    Pclass\n1    0.629630\n2    0.472826\n3    0.242363\n```\n\n因此我们看到生存率因等级而异，一等舱乘客的生存率为\
    \ 62.9%，而三等舱乘客的生存率仅为 24.2%。\n\n我们可以通过绘制生存率的条形图来可视化这一结果。每个 pandas Series 对象都有一个\
    \ **plot** 属性，允许我们调用 **bar()** 来制作条形图，它会自动包含条形标签。高度由每个分类变量的高度给出，在本例中就是我们刚刚计算的生存率：\n\
    \n![](img/b3303452eae4d7974600cd38b159398e_401_0.png)\n\n**图 11.29：** 按乘客等级划分的泰坦尼克号生存率。\n\
    \n```\n>>> survival_rates = titanic.groupby(\"Pclass\")[\"Survived\"].mean()\n\
    >>> survival_rates.plot.bar()\n>>> plt.show()\n```\n\n结果如图 11.29 所示。\n\n我们可以将类似的技术应用于分类变量\
    \ \"Sex\"（性别）：\n\n```\n>>> titanic[\"Sex\"].unique()\narray(['male', 'female'],\
    \ dtype=object)\n```\n\n制作条形图的代码基本相同，只是分组依据从 \"Pclass\" 改为 \"Sex\"：\n\n```\n>>>\
    \ survival_rates = titanic.groupby(\"Sex\")[\"Survived\"].mean()\n>>> survival_rates.plot.bar()\n\
    >>> plt.subplots_adjust(bottom=0.20)\n>>> plt.show()\n```\n\n![](img/b3303452eae4d7974600cd38b159398e_402_0.png)\n\
    \n**图 11.30：** 按性别划分的 *泰坦尼克号* 生存率。\n\n这里的 `subplots_adjust()` 行可能是必要的，以便在某些系统上为\
    \ x 轴标签的显示留出足够空间（在我的系统上是必要的）。结果应如图 11.30 所示。我们看到女性乘客的生存率明显高于男性乘客。\n\n现在我们来看第三个可能感兴趣的主要变量：年龄。等级和性别变量是分类变量，这使得制作条形图很容易，但\
    \ \"Age\"（年龄）变量是数值型的，因此我们必须对数据进行分箱，类似于制作直方图（第 11.3.3 节）。\n\n*泰坦尼克号* 乘客的年龄范围从婴儿到\
    \ 80 岁：\n\n```\n>>> titanic[\"Age\"].min()\n0.42\n>>> titanic[\"Age\"].max()\n\
    80.0\n```\n\n此时，我们必须决定使用多少个分箱。使用 7 个分箱，第一个分箱的顶部年龄大约为 11 岁：\n\n```\n>>> (titanic[\"\
    Age\"].max() - titanic[\"Age\"].min())/7\n11.368571428571428\n```\n\n这是一个合理的 \"\
    儿童\" 截断点。\n\n下一步是对数据进行分箱，我们可以使用 pandas 的 **cut()** 方法来完成。首先，我们需要只选择年龄有效的乘客，这可以通过\
    \ **notna()** 方法来实现，以确保年龄 *不是* 缺失值（代码清单 11.20）。\n\n**代码清单 11.20：** 仅选择 *不是* 缺失值的值。\n\
    \n```\n>>> titanic[\"Age\"].notna()\nName\nBraund, Mr. Owen Harris           \
    \                     True\nCumings, Mrs. John Bradley (Florence Briggs Thayer)\
    \    True\nHeikkinen, Miss. Laina                                 True\nFutrelle,\
    \ Mrs. Jacques Heath (Lily May Peel)           True\nAllen, Mr. William Henry\
    \                               True\n...\nMontvila, Rev. Juozas             \
    \                     True\nGraham, Miss. Margaret Edith                     \
    \      True\nJohnston, Miss. Catherine Helen \"Carrie\"               False\n\
    Behr, Mr. Karl Howell                                  True\nDooley, Mr. Patrick\
    \                                    True\nName: Age, Length: 891, dtype: bool\n\
    >>> valid_ages = titanic[titanic[\"Age\"].notna()]\n```\n\n**titanic[\"Age\"].notna()**\
    \ 的值包含布尔值，如果年龄有效则为 **True**，然后我们可以将其用作 **titanic** 对象的索引来仅选择年龄有效的乘客（代码清单 11.20\
    \ 中的最后一行）。\n\n接下来，我们需要按年龄对数据进行分组和排序，以便在分箱之前将年龄相似的行放在一起：\n\n```\n>>> sorted_by_age\
    \ = valid_ages.sort_values(by=\"Age\")\n```\n\n这是必要的，因为否则我们将基于乘客姓名对年龄进行分箱，这毫无意义，因为它会将年龄完全不相关的乘客混合在同一个分箱中。\n\
    \n此时，我们准备好使用 **cut()** 将数据放入所需数量的分箱中：\n\n```\n>>> sorted_by_age[\"Age range\"\
    ] = pd.cut(sorted_by_age[\"Age\"], 7)\n```\n\n最后，我们通过按分箱分组并计算 \"**Survived**\"\
    （是否生还）列的 **mean()**（平均值）来计算每个分箱的生存率（记住，这之所以有效，是因为二元预测变量通常使用 1=生还，0=未生还的编码）：\n\n\
    ```\n>>> survival_rates = sorted_by_age.groupby(\"Age range\")[\"Survived\"].mean()\n\
    ```\n\n此时，我们可以使用与 \"**Pclass**\" 和 \"**Sex**\" 相同的条形图技术（并进行底部调整以使标签适应）：\n\n```\n\
    >>> survival_rates.plot.bar()\n>>> plt.subplots_adjust(bottom=0.33)\n>>> plt.show()\n\
    ```\n\n结果如图 11.31 所示。\n\n![](img/b3303452eae4d7974600cd38b159398e_404_0.png)\n\
    \n**图 11.31：** 按年龄划分的 *泰坦尼克号* 生存率。\n\n从图 11.31 我们看到，最年轻乘客的生存率最高，大多数成年人的生存率大致恒定，然后在最高年龄段急剧下降。但男性乘客的年龄也更大：\n\
    \n```\n>>> titanic[titanic[\"Sex\"] == \"male\"][\"Age\"].mean()\n30.72664459161148\n\
    >>> titanic[titanic[\"Sex\"] == \"female\"][\"Age\"].mean()\n27.915708812260537\n\
    ```\n\n从图 11.30 我们知道男性乘客的生存率也较低，因此这可能是年龄差异的部分原因。我们将在第 11.7 节看到一种分别检查每个变量相对贡献的方法。\n\
    \n### 11.6.1 练习\n\n1.  使用代码清单 11.21 中的代码确认，三等舱女性乘客的 *泰坦尼克号* 生存率为 50%。这与一等舱 *男性*\
