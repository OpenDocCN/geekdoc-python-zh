  mdcn: "接下来，我们将初始化仓库：\n\n```\n(venv) $ git init\n(venv) $ git add -A\n(venv) $ git\
    \ commit -m \"Initialize repository\"\n```\n\n我建议此时也在 GitHub 上创建一个新仓库。\n同时，如同第\
    \ 1.5.1 节所述，我们将安装 Gunicorn 服务器：\n\n```\n(venv) $ pip install gunicorn==20.1.0\n\
    ```\n\n然后，为了在 Fly.io 上部署，我们将创建 **requirements.txt** 文件（清单 10.6）。\n\n## **清单 10.6：**\
    \ 指定我们应用的依赖项。\n*requirements.txt*\n\n```\nclick==8.1.3\nFlask==2.2.2\ngunicorn==20.1.0\n\
    itsdangerous==2.1.2\nJinja2==3.1.2\nMarkupSafe==2.1.1\nWerkzeug==2.2.2\n```\n\n\
    现在登录（清单 10.7）并“启动”应用以创建生产环境配置（清单 10.8）。编辑生成的 **Procfile** 文件，使用回文检测器应用的名称（清单 10.9）。\n\
    \n## **清单 10.7：** 登录 Fly.io。\n\n```\n(venv) $ flyctl auth login --interactive\n\
    ```\n\n## **清单 10.8：** “启动”应用（这仅是本地配置）。\n\n```\n(venv) $ flyctl launch\n```\n\n\
    ## **清单 10.9：** *Procfile*\n\n```\nweb: gunicorn palindrome_detector:app\n```\n\
    \n![](img/b3303452eae4d7974600cd38b159398e_281_0.png)\n\n**图 10.2：** 在 Fly.io\
    \ 上删除一个应用。\n\n此时，我们几乎准备好部署到生产环境了。唯一的问题是，你很可能已经有一个在第 1.5.1 节中定义的应用，并且截至撰写本文时，Fly.io\
    \ 的免费套餐只允许一个应用。因此，你可能需要删除旧应用，你可以在 Fly.io 控制面板上找到它（图 10.2）：点击应用名称 > 设置 > 删除应用。（不过，你可以重复使用构建器，因此无需删除它。）\n\
    \n我建议你将配置更改提交到 Git（并在本章中持续进行提交和推送）：\n\n```\n(venv) $ git add -A\n(venv) $ git\
    \ commit -m \"Add configuration\"\n```\n\n我们现在准备好进行实际部署了：\n\n```\n(venv) $ flyctl\
    \ deploy\n(venv) $ flyctl open    # 在云端 IDE 上无法使用，因此请使用显示的 URL\n```\n\n结果是一个在生产环境中运行的应用，如图\
    \ 10.3 所示。虽然为了简洁，我将省略直到第 10.5.1 节之前的进一步部署，但我建议在学习本章的过程中定期部署，以便尽快发现任何生产环境问题。\n\n\
    ![](img/b3303452eae4d7974600cd38b159398e_282_0.png)\n\n**图 10.3：** 我们在生产环境中的初始应用。\n\
    \n## 10.1.1 练习\n\n- 1. 使用 `pip -r` 从生成的 `requirements.txt` 文件安装应用的所有依赖项有一个很好的技巧。确认清单\
    \ 10.10 中所示的步骤能恢复并运行一个正常工作的应用。\n\n**清单 10.10：** 拆卸并重建应用环境。\n\n```\n(venv) $ deactivate\n\
    $ rm -rf venv/\n$ python3 -m venv venv\n$ source venv/bin/activate\n(venv) $ pip\
    \ install -r requirements.txt\n(venv) $ flask --app palindrome_detector --debug\
    \ run\n* Running on http://127.0.0.1:5000/\n```\n\n## 10.2 网站页面\n\n既然我们已经处理了设置和部署回文检测器应用的所有前期工作，我们现在可以朝着最终应用快速推进了。我们将从为网站创建三个页面开始：主页、关于页面和回文检测器页面。与我们之前仅通过返回字符串来响应\
    \ GET 请求的 Flask 应用不同，对于我们的完整应用，我们将使用一种更强大的技术，称为 *模板*。最初，这些模板将由静态 HTML 组成，但我们将在第\
    \ 10.3 节中添加代码以消除重复，并在第 10.4 节开始添加动态内容。\n\n为了准备填充网站页面，让我们在命令行创建（目前为空的）模板文件，它们应该位于\
    \ **palindrome_detector** 应用目录内的一个名为 **templates** 的目录中：\n\n```\n(venv) $ mkdir\
    \ palindrome_detector/templates\n(venv) $ cd palindrome_detector/templates\n(venv)\
    \ $ touch index.html about.html palindrome.html\n(venv) $ cd -\n```\n\n（如 *Learn\
    \ Enough Command Line to Be Dangerous* (https://www.learnenough.com/command-line)\
    \ 中所述 (https://www.learnenough.com/command-line-tutorial/directories#sec-navigating_directories)，`cd\
    \ -` 命令会切换到上一个目录，无论它是哪个；在本例中，它是 **palindrome_app**，即我们 Web 应用的基础目录。）\n\n最初，这些模板实际上只是静态\
    \ HTML，但我们将在第 10.4 节开始看到如何使用它们动态生成 HTML。在 Flask 应用中渲染模板的方法是使用 `render_template`\
    \ 函数。例如，要在根 URL / 上渲染索引页，我们可以编写\n\n```\n@app.route(\"/\")\ndef index():\n    return\
    \ render_template(\"index.html\")\n```\n\n这段代码使 Flask 在 **templates** 目录中查找 **index.html**。\n\
    \n因为渲染所有三个模板的代码基本相同，我们将同时添加它们，如清单 10.11 所示。请注意，除了 Flask 类本身，我们还添加了一条额外的语句来从 **flask**\
    \ 包中导入 `render_template`。\n\n## 清单 10.11：渲染三个模板。\n\npalindrome_app/palindrome_detector/__init__.py\n\
    \n```\nimport os\n\nfrom flask import Flask, render_template\n\ndef create_app(test_config=None):\n\
    \    \"\"\"Create and configure the app.\"\"\"\n    app = Flask(__name__, instance_relative_config=True)\n\
    \    .\n    .\n    .\n\n    @app.route(\"/\")\n    def index():\n        return\
    \ render_template(\"index.html\")\n\n    @app.route(\"/about\")\n    def about():\n\
    \        return render_template(\"about.html\")\n\n    @app.route(\"/palindrome\"\
    )\n    def palindrome():\n        return render_template(\"palindrome.html\")\n\
    \n    return app\n\napp = create_app()\n```\n\n清单 10.11 中的文件实际上是一个 *控制器*，它协调应用程序的不同部分，定义应用程序支持的\
    \ URL（或 *路由*），响应请求等。与此同时，模板有时被称为 *视图*，它们决定实际返回给浏览器的 HTML。视图和控制器共同构成了开发 Web 应用程序的\
    \ *模型-视图-控制器* 架构 (https://www.railstutorial.org/book/beginning#sec-mvc) 的三分之二，也称为\
    \ *MVC*。\n\n下一步是用 HTML 填充这三个模板文件；这很简单但很繁琐，所以我建议你从清单 10.12、清单 10.13 和清单 10.14 中复制粘贴。如果你不是在线阅读本文，请注意你可以在第\
    \ 1 章简要提到的参考网站上找到这些以及所有其他清单的源代码：https://github.com/learnenough/learn_enough_python_code_listings。顺便说一下，`body`\
    \ 标签内材料的缩进深度不对，但我们将在第 10.3 节看到原因。另请注意，我们使用两个空格进行缩进，这在 HTML 标记中很常见，而不是 Python 代码中传统使用的四个空格。\n\
    \n值得注意的是，超链接引用（`href`）URL 是硬编码的，像这样：\n\n```\n<link rel=\"stylesheet\" type=\"\
    text/css\" href=\"/static/stylesheets/main.css\">\n```\n\n这对于像本章中的这样的小型应用程序来说是可以的，但要了解更强大（但也更复杂）的方法，请参阅\
    \ Flask 关于 `url_for` 的文档 (https://flask.palletsprojects.com/en/2.2.x/api/#flask.Flask.url_for)\
    \ 以及这个关于该主题的有用的 Stack Overflow 评论 (https://stackoverflow.com/questions/7478366/create-dynamic-urls-in-flask-with-url-for/35936261#35936261)。\n\
    \n## **清单 10.12：** 初始的主页（索引）视图。\n\n*palindrome_detector/templates/index.html*\n\
    \n```\n<!DOCTYPE html>\n<html>\n  <head>\n    <meta charset=\"utf-8\">\n    <title>Learn\
    \ Enough Python Sample App</title>\n    <link rel=\"stylesheet\" type=\"text/css\"\
    \ href=\"/static/stylesheets/main.css\">\n    <link href=\"https://fonts.googleapis.com/css?family=Open+Sans:300,400\"\
    \n          rel=\"stylesheet\">\n  </head>\n  <body>\n    <a href=\"/\" class=\"\
    header-logo\">\n      <img src=\"/static/images/logo_b.png\" alt=\"Learn Enough\
    \ logo\">\n    </a>\n    <div class=\"container\">\n      <div class=\"content\"\
    >\n\n<h1>Sample Flask App</h1>\n\n<p>\n  This is the sample Flask app for\n  <a\
    \ href=\"https://www.learnenough.com/python-tutorial\"><em>Learn Enough Python\n\
    \  to Be Dangerous</em></a>. Learn more on the <a href=\"/about\">About</a> page.\n\
    </p>\n\n<p>\n  Click the <a href=\"https://en.wikipedia.org/wiki/Sator_Square\"\
    >Sator\n  Square</a> below to run the custom <a href=\"/palindrome\">Palindrome\n\
    \  Detector</a>.\n</p>\n```"
