    >>> numbers[0:20:3]    # Not Pythonic

    [0, 3, 6, 9, 12, 15, 18]

    ```


    Or we could start at, say, index **5** and end at index **17**:


    ```

    >>> numbers[5:17:3]

    [5, 8, 11, 14]

    ```'
