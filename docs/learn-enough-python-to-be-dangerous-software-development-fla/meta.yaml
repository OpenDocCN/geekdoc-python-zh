  mdcn: "## 9.3.1 练习\n\n1.  通过移动文件或更改系统配置，将 **wikp** 脚本添加到你的环境 PATH 中。（你可能会发现 *Learn\
    \ Enough Text Editor to Be Dangerous* 中的步骤（https://www.learnenough.com/text-editor-tutorial/advanced_text_editing#sec-writing_an_executable_script）很有帮助。）确认你可以在不使用\
    \ `./` 前缀的情况下运行 **wikp**。*注意：* 如果你因为学习 *Learn Enough JavaScript to Be Dangerous*\
    \ 或 *Learn Enough Ruby to Be Dangerous*（https://www.learnenough.com/ruby）而有一个同名的\
    \ **wikp** 程序，我建议替换它——这体现了文件名是用户界面，而实现可以更改语言而不影响用户的原则。\n2.  如果你运行 **wikp** 时没有参数会发生什么？在你的脚本中添加代码来检测命令行参数的缺失，并输出适当的用法说明。*提示：*\
    \ 打印用法说明后，你需要*退出*，你可以通过搜索“python how to exit script”来学习如何做到这一点。\n3.  文中提到的“管道到\
    \ **pbcopy**”技巧仅在 macOS 上有效，但任何兼容 Unix 的系统都可以将输出重定向到文件。将 **wikp** 的输出重定向到名为 **article.txt**\
    \ 的文件的命令是什么？（然后你可以打开此文件，全选并复制内容，这与管道到 **pbcopy** 具有相同的基本效果。）\n\n## 第 10 章\n一个实时的\
    \ Web 应用程序\n\n本章将使用在第 1.5 节引入并在第 5.2 节进一步应用的 Flask 框架，在 Python 中开发一个动态 Web 应用程序。虽然简单，但\
    \ Flask 并非玩具——它是一个生产就绪的 Web 框架，被 Netflix、Lyft 和 reddit 等公司使用。Flask 也是为更复杂的框架（如\
    \ Django）做准备的优秀轻量级工具。在本章结束时，你将基本理解 Web 应用程序的工作原理，包括布局（第 10.3 节）、模板（第 10.4 节）、测试和部署。¹\n\
    \n我们的示例 Web 应用程序将通过开发一个基于 Web 的*回文检测器*，充分利用第 8 章开发的自定义 Python 包。在此过程中，我们将学习如何使用\
    \ *Python 模板*创建动态内容。\n\n从 Web 检测回文需要使用后端 Web 应用程序来处理*表单提交*，这是 Flask 擅长的任务。我们的回文应用还将包含另外两个页面——主页和关于页——这将让我们有机会学习如何使用基于\
    \ Flask 的站点布局。作为其中的一部分，我们将应用并扩展第 8 章的工作，为我们的应用编写自动化测试。\n\n最后，与第 1.5 节一样，我们还将把完整的回文应用部署到实时\
    \ Web 上。我们将以指向 Python、Flask 以及其他主题（如 JavaScript 和 Django）的更多资源的指针作为结束。\n\n1. \
    \ 主要需要学习的额外主题是如何使用数据库存储和检索信息，这代表了一种新技术，但不涉及任何根本性的新原则。你可以在 Flask 和功能更全面的框架（如 Django）中使用数据库。\n\
    \n## 10.1 设置\n\n我们的第一步是将应用设置为概念验证并将其部署到生产环境。我们将首先为其创建一个目录：\n\n```\n$ cd ~/repos\
    \            # 在云 IDE 上为 cd ~/environments/repos\n$ mkdir palindrome_app\n$ cd\
    \ palindrome_app/\n```\n\n接下来，我们将为 Flask 开发配置系统，并为回文检测器本身创建一个子目录：\n\n```\n$ python3\
    \ -m venv venv\n$ source venv/bin/activate\n(venv) $ pip install --upgrade pip\n\
    (venv) $ pip install Flask==2.2.2\n(venv) $ mkdir palindrome_detector\n(venv)\
    \ $ touch palindrome_detector/__init__.py\n(venv) $ touch setup.py\n(venv) $ touch\
    \ MANIFEST.in\n```\n\n此目录结构大致与官方 Flask 教程平行，并允许比第 1.5 节中的“hello, world”应用（它只是用于其他用途的目录中的单个文件）更复杂的设计实践（如模板和测试）。\n\
    \n作为应用设置的一部分，我们还需要填写几个设置文件。特别要注意的是，在撰写本文时，Flask 文档包含 `setup.py` 和 `MANIFEST.in`\
    \ 文件（清单 10.1 和清单 10.2），而不是遵循将配置设置整合到 `pyproject.toml` 中的“最佳实践”（如我们在第 8 章所做的）；实践经验表明，偏离官方文档，尤其是在部署应用程序时，是非常不明智的，但请注意\
    \ Flask 自身的惯例可能自本文撰写以来已经改变。另外，如果你不理解它，也不必担心，因为我也一样；与阅读文档一样，选择性无知绝对是技术成熟度的一部分（Box\
    \ 1.2）。\n\n## 10.1 设置\n\n清单 10.1：一个设置文件。\n\nsetup.py\n\n```\nfrom setuptools import\
    \ find_packages, setup\n\nsetup(\n    name='palindrome_detector',\n    version='1.0.0',\n\
    \    packages=find_packages(),\n    include_package_data=True,\n    zip_safe=False,\n\
    \    install_requires=[\n        'flask',\n    ],\n)\n```\n\n清单 10.2：一个清单文件。\n\
    \nMANIFEST.in\n\n```\ngraft palindrome_detector/static\ngraft palindrome_detector/templates\n\
    global-exclude *.pyc\n```\n\n要开始应用本身，让我们编写“hello, world!”，如清单 10.3 所示。² 清单 10.3\
    \ 的大部分内容是 Flask 样板代码，同样主要来自官方文档，所以不要担心细节。顺便说一下，函数定义前的 `@app.route(\"/\")` 语法称为装饰器，除了定义\
    \ Flask 路由外，它在 Python 中还有许多其他用途。\n\n清单 10.3：在 Flask 中编写“hello, world!”。\n\n```\n\
    import os\n\nfrom flask import Flask\n\ndef create_app(test_config=None):\n```\n\
    \n2.  os 包包含用于处理底层操作系统（OS）的实用程序。\n\n```\n\"\"\"Create and configure the app.\"\
    \"\"\napp = Flask(__name__, instance_relative_config=True)\n\nif test_config is\
    \ None:\n    # Load the instance config, if it exists, when not testing.\n   \
    \ app.config.from_pyfile(\"config.py\", silent=True)\nelse:\n    # Load the test\
