    \  , 60.  , 61.  , 62.  , 63.  , 64.  ,\n       65.  , 66.  , 70.  , 70.5 , 71.\
    \  , 74.  , 80.  ])\n```\n\nAt this point, we're ready to calculate the survival\
    \ rate for each age:\n\n```python\n>>> survival_rate = passenger_age.groupby(\"\
