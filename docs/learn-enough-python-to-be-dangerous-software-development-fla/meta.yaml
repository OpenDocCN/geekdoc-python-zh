    \ from C and C++ to JavaScript, Perl, and PHP. Unlike those languages, though,\
    \ which explicitly increment a counter variable, Python defines a range of values\
    \ directly via a special Range data type.\n\nListing 2.24 is arguably a little\
    \ more elegant than the equivalent “classic” **for** loop seen in *Learn Enough\
    \ JavaScript to Be Dangerous* (Listing 2.25), but it's still not very good Python.\n\
    \n# **Listing 2.25:** A **for** loop in JavaScript.\n\n```\njavascript\n> for\
    \ (i = 0; i < 5; i++) {\n    console.log(i);\n}\n0\n1\n2\n3\n4\n```\n\nAs a language\
    \ and as a community, Python is especially vigilant about avoiding plain **for**\
    \ loops. As computer scientist (and personal friend) Mike Vanier (Figure 2.11¹⁹)\
