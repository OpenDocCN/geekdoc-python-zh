    \n```html\n<!DOCTYPE html>\n<html>\n  <head>\n    <meta charset=\"utf-8\">\n \
    \   <title>Learn Enough Python 示例应用</title>\n    <link rel=\"stylesheet\" type=\"\
    text/css\" href=\"/static/stylesheets/main.css\">\n    <link href=\"https://fonts.googleapis.com/css?family=Open+Sans:300,400\"\
    \n          rel=\"stylesheet\">\n  </head>\n  <body>\n    <a href=\"/\" class=\"\
    header-logo\">\n      <img src=\"/static/images/logo_b.png\" alt=\"Learn Enough\
    \ logo\">\n    </a>\n    <div class=\"container\">\n      <div class=\"content\"\
    >\n\n<h1>回文检测器</h1>\n\n<p>这将是回文检测器。</p>\n\n      </div>\n    </div>\n  </body>\n\
    </html>\n```\n\n访问 127.0.0.1:5000 会导致 Flask 提供默认（索引）页面，如图 10.4 所示。要进入“关于”页面，我们可以在浏览器地址栏中输入\
    \ 127.0.0.1:5000/about，如图 10.5 所示。\n\n图 10.4 和图 10.5 显示页面基本可以工作，但代码清单 10.12 及后续清单包含图像和\
    \ CSS 文件，而这些文件目前在本地系统中并不存在。我们可以通过从 Learn Enough CDN 下载所需文件并将其放入 `static` 目录来改变这种情况，该目录是存放此类静态资源的标准选择。\n\
    \n方法是使用 `curl` 获取一个 `tarball`，它类似于 ZIP 文件，在 Unix 兼容系统上很常见：\n\n```\n(venv) $ curl\
    \ -OL https://cdn.learnenough.com/le_python_palindrome_static.tar.gz\n```\n\n\
    **图 10.4：** 初始的主页。\n\n这类文件由 `tar`（即“tape archive”，磁带归档）创建，其名称是对过去使用外部磁带进行大型备份时代的怀旧。同时，`gz`\
    \ 扩展名指的是重要的 `gzip` 文件压缩方法。\n\n解压文件的方法是使用 `tar zxvf`，它代表“**tape archive gzip extract\
    \ verbose file**”（如第 8.5.2 节简要提到的，反斜杠 \\ 是一个*续行符*，应原样输入，但右尖括号 > 应由你的 shell 程序自动添加，不应手动输入）：³\n\
    \n```\n(venv) $ tar zxvf le_python_palindrome_static.tar.gz \\\n> --directory\
    \ palindrome_detector/\n```\n\n3. 我使用命令 `tar zcf <filename>.tar.gz` 创建了这个 tarball，其中\
    \ `c` 代表 `create`。\n\n**图 10.5：** 初始的“关于”页面。\n\n```\nx static/\nx static/static/images/\n\
    x static/static/stylesheets/\nx static/static/stylesheets/main.css\nx static/static/images/sator_square.jpg\n\
    x static/static/images/logo_b.png\n(venv) $ rm -f le_python_palindrome_static.tar.gz\n\
    ```\n\n有了经验后，你可能更喜欢省略 `v` 标志，但我建议最初使用详细输出，以便你能看到解压过程中发生的情况。顺便说一下，注意 `tar` 标志只是单独的字母，不像大多数其他\
    \ Unix 命令那样前面有连字符。在许多系统上，你实际上可以使用连字符，例如 `tar -z -x -v -f <filename>`，但出于我未知的原因，`tar`\
    \ 的通常惯例是省略它们。\n\n**图 10.6：** 一个更好看的“关于”页面。\n\n从上面的详细输出可以看出，解压文件创建了一个 **static**\
    \ 目录：\n\n```\n(venv) $ ls palindrome_detector/static\nimages       stylesheets\n\
    ```\n\n刷新“关于”页面确认 logo 图像和 CSS 现在可以工作了（图 10.6）。主页的改进更为显著，如图 10.7 所示。\n\n### 10.2.1\
    \ 练习\n\n- 1. 访问 /palindrome URL 并确认 CSS 和图像正常工作。\n- 2. 进行一次提交并部署更改。\n\n**图 10.7：**\
    \ 大幅改进的主页。\n\n## 10.3 布局\n\n此时，我们的应用看起来相当不错，但有两个明显的缺陷：三个页面的 HTML 代码高度重复，并且手动在页面间导航相当繁琐。我们将在本节解决第一个缺陷，在第\
    \ 10.4 节解决第二个。（当然，我们的应用尚未检测回文，这是第 10.5 节的主题。）\n\n如果你学习过 *Learn Enough CSS & Layout\
    \ to Be Dangerous* (https://www.learnenough.com/css-and-layout)，你会知道标题中的 *Layout*\
    \ 通常指页面布局——使用层叠样式表在页面上移动元素、正确对齐它们等——但我们也看到 (https://www.learnenough.com/css-and-layout-tutorial/struct-layout#cha-struct-layout)\
    \ 要正确做到这一点，需要定义*布局模板*来捕获常见模式并消除重复。\n\n在当前情况下，我们网站的每个页面都具有相同的基本结构，如代码清单 10.15 所示。\n\
    \n## 代码清单 10.15：我们网站页面的 HTML 结构。\n\n```html\n<!DOCTYPE html>\n<html>\n  <head>\n\
    \    <meta charset=\"utf-8\">\n    <title>Learn Enough Python 示例应用</title>\n \
    \   <link rel=\"stylesheet\" type=\"text/css\" href=\"/static/stylesheets/main.css\"\
    >\n    <link href=\"https://fonts.googleapis.com/css?family=Open+Sans:300,400\"\
    \n          rel=\"stylesheet\">\n  </head>\n  <body>\n    <a href=\"/\" class=\"\
    header-logo\">\n      <img src=\"/static/images/logo_b.png\" alt=\"Learn Enough\
    \ logo\">\n    </a>\n    <div class=\"container\">\n      <div class=\"content\"\
    >\n        <!-- 页面特定内容 -->\n      </div>\n    </div>\n  </body>\n</html>\n```\n\
    \n除了页面特定内容（由高亮的 HTML 注释指示）之外，每个页面上的所有内容都是相同的。在 *Learn Enough CSS & Layout to Be\
    \ Dangerous* 中，我们使用 Jekyll 模板 (https://www.learnenough.com/css-and-layout-tutorial/struct-layout#sec-jekyll-templates)\
    \ 消除了这种重复；在本教程中，我们将使用 *Jinja 模板引擎*，它是 Flask 的默认模板系统。\n\n目前，我们的网站在当前开发阶段是正常工作的，每个页面都有正确的内容。我们即将进行一项涉及移动和删除大量\
    \ HTML 的更改，我们希望在不破坏网站的情况下完成。这听起来是不是很熟悉？\n\n确实如此。这正是我们在第 8 章开发并重构回文包时所面临的问题。在那种情况下，我们编写了自动化测试来捕获任何回归，而在这里我们将做同样的事情。（我在自动化测试\
    \ Web 应用成为可能甚至成为标准之前就开始制作网站了，相信我，自动化测试比手动测试 Web 应用有了*巨大的*改进。）\n\n首先，我们将像第 8.1\
    \ 节那样添加 **pytest**：\n\n```\n(venv) $ pip install pytest==7.1.3\n```\n\n（根据设计，我们的测试将尽可能简单；更复杂的测试，请参阅\
    \ pytest-flask 项目 (https://pytest-flask.readthedocs.io/en/latest/index.html)。）\n\
    \n为了让我们的测试工作，我们必须将我们的应用作为可编辑的 Python 包本地安装。如果不安装，你可能会得到如下错误：\n\n```\nE   ModuleNotFoundError:\
    \ No module named 'palindrome_detector'\n```\n\n为防止此问题，请运行与代码清单 8.18 相同的命令，如代码清单\
    \ 10.16 所示。\n\n## 代码清单 10.16：将应用安装为可编辑包。\n\n```\n$ pip install -e .\n```\n\n我们将把测试本身放在一个\
    \ **tests** 目录中，开始时有一个测试文件：\n\n```\n(venv) $ mkdir tests\n(venv) $ touch tests/test_site_pages.py\n\
    ```\n\n我们将在第 10.5.1 节添加第二个测试文件。\n\n我们为 Web 应用编写测试的关键工具是 **client** 对象，它有一个 **get()**\
    \ 方法，用于向 URL 发出 GET 请求，从而模拟在 Web 浏览器中访问相应页面。此类请求的结果是一个 **response** 对象，它具有各种有用的属性，包括\
    \ **status_code**（指示请求返回的 HTTP 响应代码）和 **text**（包含我们应用程序返回的 HTML 文本）。我们可以在标准配置文件\
    \ **conftest.py** 中定义这样的 **client** 对象：\n\n```\n(venv) $ touch tests/conftest.py\n\
    ```\n\n代码本身出现在代码清单 10.17 中。（与本章其余配置代码一样，代码清单 10.17 仅改编自 Flask 文档。）"
