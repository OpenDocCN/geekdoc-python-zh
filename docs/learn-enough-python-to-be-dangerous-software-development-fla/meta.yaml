    # Box 5.1: Debugging Python


    One skill that''s an essential part of technical sophistication is *debugging*:
    the art of finding and correcting errors in computer programs. While there''s
    no substitute for experience, here are some techniques that should give you a
    leg up when tracking down the inevitable glitches in your code:


    +   - *Trace the execution with print.* When trying to figure out why a particular
    program is going awry, it''s often helpful to display variable values with temporary
    print statements, which can be removed when the bug is fixed. This technique is
    especially useful when combined with the `repr()` function, which returns a literal
    representation of the object (Section 4.3), as in `print(repr(a))`.

    - *Comment out code.* It''s sometimes a good idea to comment out code you suspect
    is unrelated to the problem to allow you to focus on the code that isn''t working.

    - *Use the REPL.* Firing up the Python interpreter and pasting in the problematic
    code is frequently an excellent way to isolate the problem. When debugging a script,
    calling it with `python3 -i script.py` will drop you into the REPL when an error
    is reached. (A more advanced version of the REPL technique is *pdb*, the Python
    Debugger.)

    - *Google it.* Googling error messages or other search terms related to the bug
    (which often leads to helpful threads at Stack Overflow) is an essential skill
    for every modern software developer (Figure 5.6).'
