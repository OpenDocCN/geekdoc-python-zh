    ```\n\n# 8.3 Red\n\nIn this section, we'll take the important first step toward\
    \ being able to detect more complex palindromes like “Madam, I'm Adam.” and “A\
    \ man, a plan, a canal—Panama!”. Unlike the previous strings we've encountered,\
    \ these phrases—which contain both spaces and punctuation—aren't strictly palindromes\
    \ in a literal sense, even if we ignore capitalization. Instead of testing the\
    \ strings as they are, we have to figure out a way to select only the letters,\
    \ and then see if the resulting letters are the same forward and backward.\n\n\
    The code to do this is fairly tricky, but the tests for it are simple. This is\
    \ one of the situations where test-driven development particularly shines (Box\
    \ 8.1). We can write our simple tests, thereby getting to RED, and then write\
    \ the application code any way we want to get to GREEN (Section 8.4). At that\
    \ point, with the tests protecting us against undiscovered errors, we can change\
    \ the application code with confidence (Section 8.5).\n\n> **Box 8.1: When to\
    \ test**\n\nWhen deciding when and how to test, it's helpful to understand *why*\
    \ to test. In my view, writing automated tests has three main benefits:\n\n1.\
    \ Tests protect against *regressions*, where a functioning feature stops working\
    \ for some reason.\n2. Tests allow code to be *refactored* (i.e., changing its\
    \ form without changing its function) with greater confidence.\n3. Tests act as\
    \ a *client* for the application code, thereby helping determine its design and\
    \ its interface with other parts of the system."
