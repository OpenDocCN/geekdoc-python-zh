    # CHAPTER 3

    Lists


    In Chapter 2, we saw that strings can be thought of as sequences of characters
    in a particular order. In this chapter, we''ll learn about the *list* data type,
    which is the general Python container for a list of arbitrary elements in a particular
    order. Python lists are similar to the *array* data type in other languages (such
    as JavaScript and Ruby), so programmers familiar with other languages can probably
    guess a lot about how Python lists behave. (Although Python does have a built-in
    array type, in this tutorial “array” always refers to the *ndarray* data type
    defined by the NumPy library, which is covered in Section 11.2.)


    We''ll start by explicitly connecting strings and lists via the **split()** method
    (Section 3.1), and then learn about various other list methods and techniques
    throughout the rest of the chapter. In Section 3.6, we''ll also take a quick look
    at two closely related data types, Python *tuples* and *sets*.


    # 3.1 Splitting


    So far we''ve spent a lot of time understanding strings, and there''s a natural
    way to get from strings to lists via the **split()** method:


    ```

    $ source venv/bin/activate

    (venv) $ python3

    >>> "ant bat cat".split(" ")    # Split a string into a three-element list.

    [''ant'', ''bat'', ''cat'']

    ```


    We see from this result that **split()** returns a list of the strings that are
    separated from each other by a space in the original string.'
