    # 1.2 Python in a REPL


    Our first example of a “hello, world” program involves a Read-Eval-Print Loop,
    or REPL (pronounced “repple”). A REPL is a program that **reads** input, **evaluates**
    it, **prints** out the result (if any), and then **loops** back to the read step.
    Most modern programming languages provide a REPL, and Python is no exception;
    in Python’s case, the REPL is often known as the Python *interpreter* because
    it directly executes (or “interprets”) user commands. (A third common term is
    the Python *shell*, in analogy with the Bash and Zsh programs used to run command-line
    shell programs.)


    Learning to use the REPL well is a valuable skill for every aspiring Python programmer.
    As noted Python author David Beazley put it:


    > Although there are many non-shell environments where you can code Python, you
    will be a stronger Python programmer if you are able to run, debug, and interact
    with Python at the terminal [i.e., the REPL]. This is Python’s native environment.
    If you are able to use Python here, you will be able to use it everywhere else.


