    # ## 8.5.1 Publishing the Python Package


    As a final step, and in line with our philosophy of shipping (Box 1.5), in this
    final section we’ll publish our `palindrome` package to the Python Package Index,
    also known as PyPI.


    Unusually among programming languages, Python actually has a dedicated test package
    index called TestPyPI, which means we can publish (and use) our test package without
    uploading to a real package index. Before proceeding, you’ll need to register
    an account at TestPyPI and verify your email address.


    Once you’ve set up your account, you’ll be ready to build and publish your package.
    To do this, we’ll be using the `build` and `twine` packages, which you should
    install at this time:


    ```

    bash

    (venv) $ pip install build==0.8.0

    (venv) $ pip install twine==4.0.1

    ```'
  - '[PAGE 245]


    The first step is to build the package as follows:


    ```

    (venv) $ python3 -m build

    ```


    This uses the information in **pyproject.toml** (Listing 8.3) to create a **dist**
    (“distribution”) directory with files based on the name and version number of
    your package. For example, on my system the **dist** directory looks like this:


    ```

    (venv) $ ls dist

    palindrome\_mhartl-0.0.1.tar.gz

    palindrome_mhartl-0.0.1-py3-none-any.whl

    ```


    These are a tarball and wheel file, respectively, but the truth is that you don’t
    need to know anything about these files specifically; all you need to know is
    that the **build** step is necessary to publish a package to TestPyPI. (Being
    comfortable with ignoring these sorts of details is a good sign of technical sophistication.)


    Actually publishing the package involves using the **twine** command, which looks
    like this (and is just copied from the TestPyPI documentation):<sup>10</sup>


    ```

    (venv) $ twine upload --repository testpypi dist/*

    ```


    (For future uploads, you may need to remove older versions of your package using
    **rm** because TestPyPI doesn’t let you reuse filenames.)


    At this point, your package is published and you can test it by installing it
    on your local system. Because we already have an editable and testable version
    of the package in our main venv (Listing 8.18), it’s a good idea to spin up a
    new venv in a temp directory:


    ```

    $ cd

    $ mkdir -p tmp/test_palindrome

    $ cd tmp/test_palindrome

    $ python3 -m venv venv

    $ source venv/bin/activate

    (venv) $

    ```


    10. At this point, you will be prompted either for a username and password or
    for an API key. For the latter, see the TestPyPI page on tokens for more information.'
