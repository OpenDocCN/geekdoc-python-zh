    # 5.3.1 Generators


    A *generator*, which we first saw in Section 3.4.2, is a special kind of iterator
    built using a special operation called **yield**. The effect of **yield** is to
    produce each element of the sequence in turn.

    For example, we can create a string generator by yielding each character in the
    string:


    ```

    >>> def characters(string):

    ...     for c in string:

    ...         yield c

    ...     return None

    ...

    >>> characters("foobar")

    <generator object characters at 0x11f9c1540>

    ```


    (We''ve returned **None** here, but we''ll see in Listing 5.21 that we can actually
    leave off **return** since **None** is the default.)

    Now calling **characters()** on a string returns a generator object, which we
    can iterate over as usual:


    ```

    >>> for c in characters("foobar"):

    ...     print(c)

    ...

    ```'
