- md: "![](img/b3303452eae4d7974600cd38b159398e_300_0.png)\n\n**Figure 10.8:** Our\
    \ Home page, now created using a layout.\n\n## 10.3.1 Exercises\n\n1.  As you\
    \ can confirm by running the source of any page through an HTML validator, the\
    \ current pages are valid HTML, but there's a warning with a suggestion to add\
    \ a `lang` (language) attribute to the `html` tag. Add the attribute `lang=\"\
    en\"` (for \"English\") to the `html` tag in Listing 10.22 and confirm using a\
    \ web inspector that it appears correctly on all three pages.\n2.  Make a commit\
    \ and deploy the changes.\n\n## 10.4 Template Engine\n\nNow that we've defined\
    \ a proper layout, in this section we'll use the Jinja template language (first\
    \ seen in Listing 10.22) to add a couple of nice refinements to our site: *variable\
    \ titles* and *navigation*. Variable titles are HTML `title` tag contents that\
    \ vary from page to page, giving each page a nice polish of customization. Navigation,\
    \ meanwhile, saves us the hassle of having to type each subpage in by hand—certainly\
    \ not the kind of user experience we're trying to create.\n\n### 10.4.1 Variable\
    \ Titles\n\nOur variable titles will combine a *base title*, which is the same\
    \ on each page, with a piece that varies based on the page's name. In particular,\
    \ for our Home, About, and Palindrome Detector pages, we want the titles to look\
    \ something like this:\n\n```\n<title>Learn Enough Python Sample App | Home</title>\n\
    ```\n\n```\n<title>Learn Enough Python Sample App | About</title>\n```\n\n```\n\
    <title>Learn Enough Python Sample App | Palindrome Detector</title>\n```\n\nOur\
    \ strategy has three steps:\n\n1.  Write GREEN tests for the current page title.\n\
    2.  Write RED tests for the variable titles.\n3.  Get to GREEN by adding the variable\
    \ component of the title.\n\nNote that Steps 2 & 3 constitute test-driven development.\
    \ And indeed writing the tests for the variable title is easier than getting them\
    \ to pass, which is one of the cases for TDD described in Box 8.1.\n\nTo get started\
    \ with Step 1, we'll modify the `title` assertions defined in Listing 10.20 to\
    \ include the current base title. For convenience in the next step, we'll define\
    \ a `base_title` variable and use interpolation to form the title using\n\n```\n\
    base_title = \"Learn Enough Python Sample App\"\ntitle = f\"<title>{base_title}</title>\"\
    \n```\n\nand then assert that the title appears in the response text. The result\
    \ for all three site pages appears in Listing 10.27.\n\n**Listing 10.27:** Adding\
    \ assertions for the base title content. GREEN\n\ntests/test_site_pages.py\n\n\
    ```\ndef test_index(client):\n    response = client.get(\"/\")\n    assert response.status_code\
    \ == 200\n    base_title = \"Learn Enough Python Sample App\"\n    title = f\"\
    <title>{base_title}</title>\"\n    assert title in response.text\n    assert \"\
    <h1>\" in response.text\n\ndef test_about(client):\n    response = client.get(\"\
    /about\")\n    assert response.status_code == 200\n    base_title = \"Learn Enough\
    \ Python Sample App\"\n    title = f\"<title>{base_title}</title>\"\n    assert\
    \ title in response.text\n    assert \"<h1>\" in response.text\n\ndef test_palindrome(client):\n\
    \    response = client.get(\"/palindrome\")\n    assert response.status_code ==\
    \ 200\n    base_title = \"Learn Enough Python Sample App\"\n    title = f\"<title>{base_title}</title>\"\
    \n    assert title in response.text\n    assert \"<h1>\" in response.text\n```\n\
    \nNote that there is a lot of repetition in Listing 10.27. Some of this repetition\
    \ will disappear when we add the variable component to the titles; eliminating\
    \ the rest of the repetition is left as an exercise (Section 10.4.3).\nAs required\
    \ for tests of working code, the test suite is currently GREEN:\n\n**Listing 10.28:**\
    \ GREEN\n\n```\n(venv) $ pytest\n============================= test session starts\
    \ =============================\ncollected 3 items\n\ntests/test_site_pages.py\
    \ ...                                              [100%]\n\n==============================\
    \ 3 passed in 0.01s ================================\n```\n\nNow we're ready for\
    \ Step 2. All we need to do is add the vertical bar | and the page-specific titles,\
    \ as shown in Listing 10.29.\n\n**Listing 10.29:** Adding assertions for the variable\
    \ title content. RED\n\ntests/test_site_pages.py\n\n```\ndef test_index(client):\n\
    \    response = client.get(\"/\")\n    assert response.status_code == 200\n  \
    \  base_title = \"Learn Enough Python Sample App\"\n    title = f\"<title>{base_title}\
    \ | Home</title>\"\n    assert title in response.text\n    assert \"<h1>\" in\
    \ response.text\n\ndef test_about(client):\n    response = client.get(\"/about\"\
    )\n    assert response.status_code == 200\n    base_title = \"Learn Enough Python\
    \ Sample App\"\n    title = f\"<title>{base_title} | About</title>\"\n    assert\
    \ title in response.text\n    assert \"<h1>\" in response.text\n\ndef test_palindrome(client):\n\
    \    response = client.get(\"/palindrome\")\n    assert response.status_code ==\
    \ 200\n    base_title = \"Learn Enough Python Sample App\"\n    title = f\"<title>{base_title}\
    \ | Palindrome Detector</title>\"\n    assert title in response.text\n    assert\
    \ \"<h1>\" in response.text\n```\n\nBecause we haven't updated the application\
    \ code, the tests are now RED:\n\n**Listing 10.30:** RED\n\n```\n(venv) $ pytest\n\
    ============================= test session starts =============================\n\
    collected 3 items\n\ntests/test_site_pages.py FFF                            \
    \                  [100%]\n\n================================= FAILURES ==================================\n\
    ________________________________ test_index _________________________________\n\
    .\n.\n.\n=========================== short test summary info ===========================\n\
    FAILED tests/test_site_pages.py::test_index - assert '<title>Learn Enough Pyt...\n\
    FAILED tests/test_site_pages.py::test_about - assert '<title>Learn Enough Pyt...\n\
    FAILED tests/test_site_pages.py::test_palindrome - assert '<title>Learn Enoug...\n\
    ============================= 3 failed in 0.03s ==============================\n\
    ```\n\nNow for Step 3. The trick is to pass a different `page_title` option from\
    \ each of our app's functions and then render the result on the page layout. The\
    \ way Jinja templates work is that we can pass a keyword argument (Section 5.1.2)\
    \ to the template using\n\n```\nrender_template(\"index.html\", page_title=\"\
    Home\")\n```\n\nand automatically get access to a variable called `page_title`\
    \ in the template (in this case, with the value \"Home\"). The result for our\
    \ desired variable titles appears in Listing 10.31.\n\n**Listing 10.31:** Adding\
    \ `page_title` variables to each page. GREEN\n\n`palindrome_app/palindrome_detector/__init__.py`\n\
    \n```\nimport os\n\nfrom flask import Flask, render_template\n\ndef create_app(test_config=None):\n\
    \    \"\"\"Create and configure the app.\"\"\"\n    app = Flask(__name__, instance_relative_config=True)\n\
    \n    if test_config is None:\n        # Load the instance config, if it exists,\
    \ when not testing.\n        app.config.from_pyfile(\"config.py\", silent=True)\n\
    \    else:\n        # Load the test config if passed in.\n        app.config.from_mapping(test_config)\n\
    \n    # Ensure the instance folder exists.\n    try:\n        os.makedirs(app.instance_path)\n\
    \    except OSError:\n        pass\n\n    @app.route(\"/\")\n    def index():\n\
    \        return render_template(\"index.html\", page_title=\"Home\")\n\n    @app.route(\"\
    /about\")\n    def about():\n        return render_template(\"about.html\", page_title=\"\
    About\")\n\n    @app.route(\"/palindrome\")\n    def palindrome():\n        return\
    \ render_template(\"palindrome.html\",\n                               page_title=\"\
    Palindrome Detector\")\n\n    return app\n\napp = create_app()\n```\n\nOnce we\
    \ have a variable inside a template using the code in Listing 10.31, we can insert\
    \ it using the special syntax {{ ... }} used by Jinja templates:⁷\n\n```\n{{ page_title\
    \ }}\n```\n\nThis tells Jinja to insert the contents of **page_title** into the\
    \ HTML template at that location. In particular, this means we can add the variable\
    \ component of the title using the code shown in Listing 10.32.\n\n**Listing 10.32:**\
    \ Adding a variable component to the title. RED\n\n*palindrome_detector/templates/layout.html*\n\
    \n```\n<!DOCTYPE html>\n<html>\n  <head>\n    <meta charset=\"utf-8\">\n    <title>Learn\
    \ Enough Python Sample App | {{ page_title }}</title>\n    .\n    .\n    .\n```\n\
    \nWhen **page_title** is \"Home\", the layout title will become\n\n```\n<title>Learn\
    \ Enough Python Sample App | Home</title>\n```\n\nand so on for the other variable\
    \ titles.\nBecause the variable title in Listing 10.31 matches the ones in the\
    \ test from Listing 10.29, our test suite should be GREEN:\n\n7. As with {% ...\
    \ %}, the {{ ... }} syntax is commonly used in other templating systems as well,\
    \ such as Liquid and Mustache."
