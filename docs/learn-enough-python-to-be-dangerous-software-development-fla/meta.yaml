    \n```\n(venv) $ pip install palindrome_mhartl --index-url https://test.pypi.org/simple/\n\
    ```\n\n**Listing 9.2:** Including the shebang line and package.\n`palindrome_file`\n\
    \n```python\n#!/usr/bin/env python3\nfrom palindrome_mhartl.phrase import Phrase\n\
    \nprint(\"hello, world!\")\n```\n\nThe final line in Listing 9.2 is a habit I\
    \ have of always making sure a script is in a working state before writing any\
    \ more code:\n\n```\n(venv) $ ./palindrome_file\nhello, world!\n```\n\nIn earlier\
