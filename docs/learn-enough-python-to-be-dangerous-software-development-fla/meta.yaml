    ## Preface


    *Learn Enough Python to Be Dangerous* teaches you to write practical and modern
    programs using the elegant and powerful Python programming language. You''ll learn
    how to use Python for both general-purpose programming and for beginning web-application
    development. Although mastering Python can be a long journey, you don''t have
    to learn everything to get started . . . you just have to learn enough to be *dangerous*.


    You''ll begin by exploring the core concepts of Python programming using a combination
    of the interactive Python interpreter and text files run at the command line.
    The result is a solid understanding of both *object-oriented programming* and
    *functional programming* in Python. You''ll then build on this foundation to develop
    and publish a simple self-contained Python package. You''ll then use this package
    in a simple dynamic web application built using the *Flask* web framework, which
    you''ll also deploy to the live Web. As a result, *Learn Enough Python to Be Dangerous*
    is especially appropriate as a prerequisite to learning web development with Python.


    In addition to teaching you specific skills, *Learn Enough Python to Be Dangerous*
    also helps you develop *technical sophistication*—the seemingly magical ability
    to solve practically any technical problem. Technical sophistication includes
    concrete skills like version control and coding, as well as fuzzier skills like
    Googling the error message and knowing when to just reboot the darn thing. Throughout
    *Learn Enough Python to Be Dangerous*, we''ll have abundant opportunities to develop
    technical sophistication in the context of real-world examples.


    ## Chapter by Chapter


    In order to learn enough Python to be dangerous, we''ll begin at the beginning
    with a series of simple “hello, world” programs using several different techniques
    (Chapter 1), including an introduction to the Python interpreter, an interactive
    command-line program for evaluating Python code. In line with the Learn Enough
    philosophy of always doing things “for real”, even as early as Chapter 1 we''ll
    deploy a (very simple) dynamic Python application to the live Web. This chapter
    also includes pointers to the latest setup and installation instructions via *Learn
    Enough Dev Environment to Be Dangerous* (https://www.learnenough.com/dev-environment),
    which is available for free online and as a free downloadable ebook.


    After mastering “hello, world”, we''ll take a tour of some Python *objects*, including
    strings (Chapter 2), lists (Chapter 3), and other native objects like dates, dictionaries,
    and regular expressions (Chapter 4). Taken together, these chapters constitute
    a gentle introduction to *object-oriented programming* with Python.


    In Chapter 5, we''ll learn the basics of *functions*, an essential subject for
    virtually every programming language. We''ll then apply this knowledge to an elegant
    and powerful style of coding known as *functional programming*, including an introduction
    to *comprehensions* (Chapter 6).


    Having covered the basics of built-in Python objects, in Chapter 7 we''ll learn
    how to make objects of our own. In particular, we''ll define an object for a *phrase*,
    and then develop a method for determining whether or not the phrase is a *palindrome*
    (the same read forward and backward).


    Our initial palindrome implementation will be rather rudimentary, but we''ll extend
    it in Chapter 8 using a powerful technique called *test-driven development* (TDD).
    In the process, we''ll learn more about testing generally, as well as how to create
    and publish a Python package.


    In Chapter 9, we''ll learn how to write nontrivial *shell scripts*, one of Python''s
    biggest strengths. Examples include reading from both files and URLs, with a final
    example showing how to manipulate a downloaded file as if it were an HTML web
    page.


    In Chapter 10, we''ll develop our first full Python web application: a site for
    detecting palindromes. This will give us a chance to learn about *routes*, *layouts*,
    *embedded Python*, and *form handling*, together with a second application of
    TDD. As a capstone to our work, we''ll deploy our palindrome detector to the live
    Web.


    Finally, in Chapter 11, we''ll get an introduction to Python tools used in the
    booming field of *data science*. Topics include numerical calculations with NumPy,
    data visualization with Matplotlib, data analysis with pandas, and machine learning
    with scikit-learn.


    ## Additional Features


    In addition to the main tutorial material, *Learn Enough Python to Be Dangerous*
    includes a large number of exercises to help you test your understanding and to
    extend the material in the main text. The exercises include frequent hints and
    often include the expected answers, with community solutions available by separate
    subscription at www.learnenough.com.


    ## Final Thoughts


    *Learn Enough Python to Be Dangerous* gives you a practical introduction to the
    fundamentals of Python, both as a general-purpose programming language and as
    a specialist language for web development and data science. After learning the
    techniques covered in this tutorial, and especially after developing your technical
    sophistication, you''ll know everything you need to write shell scripts, publish
    Python packages, deploy dynamic web applications, and use key Python data-science
    tools. You''ll also be ready for a huge variety of other resources, including
    books, blog posts, and online documentation.


    ## Learn Enough Scholarships


    Learn Enough is committed to making a technical education available to as wide
    a variety of people as possible. As part of this commitment, in 2016 we created
    the Learn Enough Scholarship program.¹ Scholarship recipients get free or deeply
    discounted access to the Learn Enough All Access subscription, which includes
    all of the Learn Enough online book content, embedded videos, exercises, and community
    exercise answers.


    As noted in a 2019 RailsConf Lightning Talk,² the Learn Enough Scholarship application
    process is incredibly simple: Just fill out a confidential text area telling us
    a little about your situation. The scholarship criteria are generous and flexible—we
    understand that there are an enormous number of reasons for wanting a scholarship,
    from being a student, to being between jobs, to living in a country with an unfavorable
    exchange rate against the U.S. dollar. Chances are that, if you feel like you''ve
    got a good reason, we''ll think so, too.


    So far, Learn Enough has awarded more than 2,500 scholarships to aspiring developers
    around the country and around the world. To apply, visit the Learn Enough Scholarship
    page at www.learnenough.com/scholarship. Maybe the next scholarship recipient
    could be you!


    1. https://www.learnenough.com/scholarship

    2. https://www.learnenough.com/scholarship-talk'
