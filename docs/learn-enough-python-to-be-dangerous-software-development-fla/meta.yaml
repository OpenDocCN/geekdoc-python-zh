  md: '# 10.1 Setup


    Our first step is to set up our app as a proof-of-concept and deploy it to production.
    We''ll start by making a directory for it:


    ```

    $ cd ~/repos            # cd ~/environments/repos on the cloud IDE

    $ mkdir palindrome_app

    $ cd palindrome_app/

    ```


    Next, we''ll configure our system for Flask development and make a subdirectory
    for the palindrome detector itself:


    ```

    $ python3 -m venv venv

    $ source venv/bin/activate

    (venv) $ pip install --upgrade pip

    (venv) $ pip install Flask==2.2.2

    (venv) $ mkdir palindrome_detector

    (venv) $ touch palindrome_detector/__init__.py

    (venv) $ touch setup.py

    (venv) $ touch MANIFEST.in

    ```


    This directory structure broadly parallels the official Flask tutorial, and allows
    for more sophisticated design practices (such as templates and testing) than the
    “hello, world” app from Section 1.5 (which was just a single file in a directory
    used for other things as well).


    As part of the app setup, we also need to fill a couple of setup files. Note in
    particular that, as of this writing, the Flask documentation includes `setup.py`
    and `MANIFEST.in` files (Listing 10.1 and Listing 10.2) rather than following
    the “best practice” of consolidating configuration settings in `pyproject.toml`
    (as we did in Chapter 8); practical experience shows that deviating from official
    documentation, especially when deploying applications, is most unwise, but beware
    that Flask’s own convention may have changed since this writing. Also, don’t worry
    if you don’t understand it, because neither do I; as with reading the documentation,
    selective ignorance is definitely part of technical sophistication (Box 1.2).'
