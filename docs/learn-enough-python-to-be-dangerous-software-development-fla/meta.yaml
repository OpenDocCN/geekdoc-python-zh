    page to page, giving each page a nice polish of customization. Navigation, meanwhile,
    saves us the hassle of having to type each subpage in by hand—certainly not the
    kind of user experience we''re trying to create.


    # 10.4.1 Variable Titles


    Our variable titles will combine a *base title*, which is the same on each page,
    with a piece that varies based on the page''s name. In particular, for our Home,
    About, and Palindrome Detector pages, we want the titles to look something like
    this:


    ```

    <title>Learn Enough Python Sample App | Home</title>

    ```


    ```

    <title>Learn Enough Python Sample App | About</title>

    ```


    ```

    <title>Learn Enough Python Sample App | Palindrome Detector</title>

    ```


    Our strategy has three steps:


    +   1. Write GREEN tests for the current page title.

    2. Write RED tests for the variable titles.

    3. Get to GREEN by adding the variable component of the title.


    Note that Steps 2 & 3 constitute test-driven development. And indeed writing the
    tests for the variable title is easier than getting them to pass, which is one
    of the cases for TDD described in Box 8.1.


    To get started with Step 1, we''ll modify the `title` assertions defined in Listing
    10.20 to include the current base title. For convenience in the next step, we''ll
    define a `base_title` variable and use interpolation to form the title using


    ```

    base_title = "Learn Enough Python Sample App"

    title = f"<title>{base_title}</title>"

    ```


    and then assert that the title appears in the response text. The result for all
    three site pages appears in Listing 10.27.'
