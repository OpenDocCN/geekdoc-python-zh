  md: '> We can indicate updates by incrementing the middle number in the version,
    e.g., from 0.1.0 to 0.2.0, 0.3.0, etc. Bugfixes are represented by incrementing
    the rightmost number, as in 0.2.1, 0.2.2, etc., and a mature version (suitable
    for use by others, and which may not be backward-compatible with prior versions)
    is indicated by version 1.0.0.


    After reaching version 1.0.0, further changes follow this same general pattern:
    1.0.1 would represent minor changes (a “patch release”), 1.1.0 would represent
    new (but backward-compatible) features (a “minor release”), and 2.0.0 would represent
    major or backward-incompatible changes (a “major release”).


    These numbering conventions are known as *semantic versioning*, or *semver* for
    short. For more information, see semver.org.


    Finally, if you ever go on to develop a package that isn’t just a test like the
    one in this chapter, you can publish it to the real Python Package Index (PyPI).
    Although there is ample PyPI documentation, there is little doubt in such a case
    that you will also have ample opportunity to apply your technical sophistication.


