    \ Section 11.4, pandas uses Matplotlib under the hood.) The result appears in\
    \ Figure 11.35.\n\n## Cross-Validation\n\nAs previously noted, we split the data\
    \ into training and test datasets as one guard against overfitting. Another common\
    \ technique to avoid \"fitting an elephant\" (per von Neumann's quip) is known\
    \ as *cross-validation*. The basic idea is to artificially break the original\
    \ training data into new training and test datasets, train the model on the training\
    \ data, and then use the model to predict the test data. If doing this on several\
    \ different random choices for training and test subsets yields fairly consistent\
    \ results, we can be more confident that the model actually works.\n\nBecause\
    \ this is such a common technique, scikit-learn comes with a predefined routine\
    \ for performing cross-validations called **cross_val_score**:\n\n![](img/b3303452eae4d7974600cd38b159398e_419_0.png)\n\
    \n**Figure 11.35:** The importance of each factor in *Titanic* survival rates.\n\
    \n```python\n>>> from sklearn.model_selection import cross_val_score\n```\n\n\
    This method implements so-called *K*-fold cross-validation, which involves breaking\
    \ the data into *K* pieces, or “folds”, using *K*−1 folds to train the model,\
    \ and then predicting the values of the final fold to assess accuracy. The default\
    \ value is **5**, which is fine for our purposes, so we need only pass the function\
    \ the classifier instance and the training data. We’ll use Random Forest since\
    \ it was tied for first (and, as previously noted, has an especially cool name):\n\
    \n```python\n>>> random_forest = RandomForestClassifier(random_state=1)\n>>> scores\
    \ = cross_val_score(random_forest, X, Y)\n>>> scores\narray([0.75524476, 0.8041958,\
    \ 0.82517483, 0.83216783, 0.83098592])\n>>> scores.mean()\n0.8095538264552349\n\
    >>> scores.std()\n0.028958338744358988\n```\n\nWith scores that are nearly 81%\
