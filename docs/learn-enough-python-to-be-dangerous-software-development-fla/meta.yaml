    \           # Pythonic\n    print(key)\n```\n\nIt would be nice if we could do\
    \ the same thing with a **Phrase** instance, like this:\n\n```python\nphrase =\
    \ palindrome.Phrase(\"Racecar\")\nfor c in phrase:\n    print(c)\n```\n\nWe can\
    \ do this with a custom iterator. The general requirements for an iterator are\
    \ twofold:\n\n- 1. An **\\_\\_iter\\_\\_** method that does any necessary setup\
