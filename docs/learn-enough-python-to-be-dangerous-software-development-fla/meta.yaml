    \ `request` from the `flask` package, which we'll be using in this section to\
    \ handle form submissions.\n\nSince we'll be deploying the app to production,\
    \ we should also update the app requirements to include the palindrome detector.\
    \ The result for one version of my particular detector is shown in Listing 1.15,\
    \ though you are encouraged to use your own. Also note that Listing 10.44 includes\
    \ an extra line so that Fly.io knows to look for packages at the Test Python Package\
    \ Index as well as the regular index.\n\n## Listing 10.44: Adding a Test Python\
    \ Package Index lookup URL.\n\nrequirements.txt\n\n```\n--extra-index-url https://testpypi.python.org/pypi\n\
    palindrome_mhartl==0.0.12\nclick==8.1.3\nFlask==2.2.2\n.\n.\n.\n```\n\nWith that\
    \ prep work done, we're now ready to add a form to our Palindrome Detector page,\
    \ which is currently just a placeholder (Figure 10.12). The form consists of three\
    \ principal parts: a **form** tag to define the form, a **textarea** for entering\
    \ a phrase, and a **button** for submitting the phrase to the server.\n\n![The\
    \ current state of the palindrome page.](img/b3303452eae4d7974600cd38b159398e_315_0.png)\n\
    \n**Figure 10.12:** The current state of the palindrome page.\n\nLet's work inside\
    \ out. The **button** has two attributes—a CSS class for styling and a **type**\
    \ indicating that it's designed to submit information:\n\n```\nhtml\n<button class=\"\
    form-submit\" type=\"submit\">Is it a palindrome?</button>\n```\n\nThe **textarea**\
    \ has three attributes—a **name** attribute, which as we'll see in a moment passes\
    \ important information back to the server, along with **rows** and **cols** to\
    \ define the size of the textarea box:\n\n```\nhtml\n<textarea name=\"phrase\"\
    \ rows=\"10\" cols=\"60\"></textarea>\n```\n\nThe **textarea** tag's content is\
    \ the default text displayed in the browser, which in this case is just blank.\n\
    \nFinally, the **form** tag itself has three attributes—a CSS **id**, which isn't\
    \ used here but is conventional to include; an **action**, which specifies the\
    \ action to take when submitting the form; and a **method** indicating the HTTP\
    \ request method to use (in this case, POST):\n\n```\n<form id=\"palindrome_tester\"\
    \ action=\"/check\" method=\"post\">\n```\n\nPutting the above discussion together\
    \ (and adding a **br** tag to add a line break) yields the form shown in Listing\
    \ 10.45. Our updated Palindrome Detector page appears in Figure 10.13.\n\n## Listing\
