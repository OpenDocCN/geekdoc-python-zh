    **Figure 11.7:** A window spawned by a call to `show()`.


    Matplotlib has two key objects, **Figure** and **Axes**. Roughly speaking, **Figure**
    is a container for the elements that make up the image and **Axes** is the data
    representing the elements. Don''t worry too much about exactly what this means,
    though; in practice, using Matplotlib often reduces to assigning figure and axes
    objects (conventionally called **fig** and **ax**) to the result of calling the
    **subplots()** function:


    ```

    >>> fig, ax = plt.subplots()

    ```


    This somewhat obscure syntax comes right from the Matplotlib documentation.¹¹


    11. In this chapter, we use the so-called “object-oriented” interface to Matplotlib,
    which is generally preferred by the Matplotlib project itself. There is a second
    interface, though, which is designed to behave like the plotting features in MATLAB.
    See the article “Pyplot vs Object Oriented Interface” (https://matplotlib.org/matplotlibblog/posts/pyplot-vs-object-oriented-interface/)
    for more information.'
