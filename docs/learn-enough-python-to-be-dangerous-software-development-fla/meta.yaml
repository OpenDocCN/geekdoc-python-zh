    # 3.4.4 Undoing a Split


    A final example of a list method, one that brings us full circle from Section
    3.1, is **join()**. Just as **split()** splits a string into list elements, **join()**
    joins list elements into a string (Listing 3.6).


    **Listing 3.6:** Different ways to join.


    ```

    >>> a = ["ant", "bat", "cat", "42"]

    [''ant'', ''bat'', ''cat'', ''42'']

    >>> "".join(a) # Join on empty space.

    ''antbatcat42''

    >>> ", ".join(a) # Join on comma-space.

    ''ant, bat, cat, 42''

    >>> " -- ".join(a) # Join on double dashes.

    ''ant -- bat -- cat -- 42''

    ```


