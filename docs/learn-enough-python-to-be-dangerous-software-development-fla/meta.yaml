    ## 11.5 pandas Example: Nobel Laureates\n\nIn Section 11.4, we got a glimpse of\
    \ how to use pandas and what good it does us, but doing anything interesting typically\
    \ requires bigger datasets, which are cumbersome to create by hand. Instead, the\
    \ most common practice is to load data from external files and then take the analysis\
    \ from there. Accordingly, in this section and the next (Section 11.6), we’ll\
    \ read the initial data from what is probably the most common input format, CSV\
    \ files (for “comma-separated values”).\n\nOur first step is to download a dataset\
    \ on winners of the Nobel Prize, who are typically known as *laureates* (a reference\
    \ to the ancient practice of using wreaths from a laurel tree to honor great accomplishments).<sup>17</sup>\
    \ We can do this by using the `curl` command-line command in the same directory\
    \ being used for the data analysis:<sup>18</sup>\n\n```\n(venv) $ curl -OL https://cdn.learnenough.com/laureates.csv\n\
    ```\n\nWe can then read the data using pandas’ `read_csv()` function:\n\n```\n\
    >>> nobel = pd.read_csv(\"laureates.csv\")\n```\n\nThe statistics for the numeric\
    \ columns aren’t very meaningful, so `describe()` doesn’t tell us much:\n\n```\n\
    >>> nobel.describe()\n            id         year       share\ncount  975.000000\
    \  975.000000  975.000000\nmean   496.221538  1972.471795    2.014359\nstd   \
    \ 290.594353    34.058064    0.943909\nmin      1.000000  1901.000000    1.000000\n\
    25%    244.500000  1948.500000    1.000000\n50%    488.000000  1978.000000   \
    \ 2.000000\n75%    746.500000  2001.000000    3.000000\nmax   1009.000000  2021.000000\
    \    4.000000\n```\n\nWe can get something a little more useful with **head()**\
    \ (Listing 11.13).\n\n### Listing 11.13: Looking at the **head()** of the Nobel\
    \ Prize data.\n\n```\n>>> nobel.head()\n   id      firstname ...        city \
    \      country\n0   1  Wilhelm Conrad ...       Munich       Germany\n1   2  \
    \     Hendrik A. ...       Leiden  the Netherlands\n2   3           Pieter ...\
    \  Amsterdam  the Netherlands\n3   4            Henri ...        Paris       \
    \   France\n4   5           Pierre ...        Paris          France\n[5 rows x\
    \ 20 columns]\n```\n\nHere we've used the **head()** method to take a peek at\
    \ the first few entries; in a Jupyter notebook, you can scroll to see all of the\
    \ columns, but in the terminal we see only a few. We can get more useful info\
    \ using **info()**:\n\n```\n>>> nobel.info()\n<class 'pandas.core.frame.DataFrame'>\n\
    RangeIndex: 975 entries, 0 to 974\nData columns (total 20 columns):\n #   Column\
    \            Non-Null Count  Dtype \n---  ------            --------------  -----\
    \ \n 0   id                975 non-null    int64 \n 1   firstname         975\
    \ non-null    object\n 2   surname           945 non-null    object\n 3   born\
    \              974 non-null    object\n 4   died              975 non-null   \
    \ object\n 5   bornCountry       946 non-null    object\n 6   bornCountryCode\
    \   946 non-null    object\n 7   bornCity          943 non-null    object\n 8\
    \   diedCountry       640 non-null    object\n 9   diedCountryCode   640 non-null\
    \    object\n 10  diedCity          634 non-null    object\n 11  gender      \
    \      975 non-null    object\n 12  year              975 non-null    int64\n\
    \ 13  category          975 non-null    object\n 14  overallMotivation 23 non-null\
    \     object\n 15  share             975 non-null    int64\n 16  motivation  \
    \      975 non-null    object\n 17  name              717 non-null    object\n\
    \ 18  city              712 non-null    object\n 19  country           713 non-null\
    \    object\ndtypes: int64(3), object(17)\nmemory usage: 152.5+ KB\n```\n\nHere\
    \ we see a complete list of the column names, together with the number of non-null\
    \ values for each one.\n\n## Locating Data\n\nOne of the most useful tasks in\
    \ pandas is locating data that satisfies desired criteria. For example, we can\
    \ locate a Nobel laureate with a particular surname. As a Caltech graduate, I\
    \ am contractually obligated to use one of Caltech’s most beloved figures, physicist\
    \ Richard Feynman (pronounced “FINE-mən”). In addition to his groundbreaking work\
    \ in theoretical physics (especially quantum electrodynamics and its associated\
    \ Feynman diagrams), Feynman is known for *The Feynman Lectures on Physics*, which\
    \ covers the elementary physics curriculum (mechanics, thermal physics, electrodynamics,\
    \ etc.) in an unusually entertaining and insightful way.\n\nLet’s use square brackets\
    \ and a boolean criterion on the **\"surname\"** column to find Feynman’s record\
    \ in the laureates data:¹⁹\n\n```\n>>> nobel[nobel[\"surname\"] == \"Feynman\"\
    ]\n    id  firstname ... city country\n86  86  Richard P. ... Pasadena CA  USA\n\
    ```\n\nThis array-style notation returns the full record, which allows us to determine\
    \ the year Feynman won his Nobel Prize. In a Jupyter notebook, you can probably\
    \ just scroll to the side and read it off (Figure 11.23), but in the REPL we can\
    \ look directly at the **year** attribute:\n\n> 19. From here on out, unimportant\
    \ output such as **[1 rows x 20 columns]** and **Name: year, dtype: int64** will\
    \ generally be omitted for brevity.\n\n![](img/b3303452eae4d7974600cd38b159398e_384_0.png)\n\
    \n**Figure 11.23:** Examining a pandas record in a Jupyter notebook.\n\n```\n\
    >>> nobel[nobel[\"surname\"] == \"Feynman\"].year\n86    1965\n```\n\nThis method\
    \ also allows us to, e.g., assign it to a variable, which is potentially more\
    \ useful than inspecting it by eye.\n\nBy the way, the syntax\n\n```\n>>> nobel[nobel[\"\
    surname\"] == \"Feynman\"]\n```\n\ncan be a little confusing since it might not\
    \ be clear why we have to refer to **nobel** twice. The answer is that the inner\
    \ part of the syntax returns a Series (Section 11.4.1) consisting of boolean values\
    \ for every laureate, with **True** if the surname is equal to **\"Feynman\"**\
    \ and **False** otherwise:\n\n```\n>>> nobel[\"surname\"] == \"Feynman\"\n0  \
    \      False\n1        False\n2        False\n3        False\n4        False\n\
    ...\n970      False\n971      False\n972      False\n973      False\n974     \
    \ False\n```\n\nBy using the correct index (i.e., **86**), we can confirm that\
    \ the value in that case is **True**:\n\n```\n>>> (nobel[\"surname\"] == \"Feynman\"\
    )[86]\nTrue\n```\n\nIn this way, we arrange for\n\n```\n>>> nobel[nobel[\"surname\"\
    ] == \"Feynman\"]\n```\n\nto select only the values of **nobel** where **nobel[\"\
    surname\"] == \"Feynman\"** is **True**. This is similar to the **isclose()**\
    \ trick shown in Listing 11.7, where we used an ndarray of booleans to select\
    \ the elements in a matrix close to 0 (and set them to exactly 0).\n\nAnother\
    \ method for getting the year is by specifying the column along with the boolean\
    \ criterion, which we might try like this (only the most relevant line of output\
    \ is shown):\n\n```\n>>> nobel[nobel[\"surname\"] == \"Feynman\", \"year\"]\n\
    pandas.errors.InvalidIndexError\n```\n\nThis doesn't work, but we can accomplish\
    \ what we want using the **loc** (\"location\") attribute:²⁰\n\n```\n>>> nobel.loc[nobel[\"\
    surname\"] == \"Feynman\", \"year\"]\n86 1965\n```\n\nThis returns just the overall\
    \ id (in this case, **86**) and the column of interest. The **loc** attribute\
    \ can be used in place of brackets in many places and is generally a more flexible\
    \ way to pull out data items of interest.\n\nAfter I finished my Ph.D., I was\
    \ recruited to work on a *Feynman Lectures* project (https://www.michaelhartl.com/feynman-lectures/)\
    \ by Kip Thorne, who was one of my mentors at Caltech (Figure 11.24²¹). Kip went\
    \ on to win a Nobel Prize himself, so let's figure out which year.\n\nWe could\
    \ search by surname as we did with Feynman, but Kip insists on being called \"\
    Kip\", so let's search by first name instead:\n\n```\n>>> nobel.loc[nobel[\"firstname\"\
    ] == \"Kip\"]\nEmpty DataFrame\n```\n\nHmm, the result is empty. Looking back\
    \ at the **head()** in Listing 11.13, we can guess why; for example, the entry\
    \ for Hendrik Lorentz includes a middle initial, so perhaps\n\n> 20. More specifically,\
    \ **loc** is a *property*, which is a special kind of attribute created using\
    \ a property decorator.\n> 21. Image copyright © 2012 Michael Hartl."
