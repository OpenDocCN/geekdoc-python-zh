    > **Box 11.1: Running Jupyter on the cloud IDE**


    Perhaps surprisingly, it''s possible to get Jupyter notebooks to work on the cloud
    IDE recommended in *Learn Enough Dev Environment to Be Dangerous*. (At least,
    it was surprising to me.) The first step is to generate a configuration file as
    follows (be sure to run this and all commands in the `jupyter_data_science` directory
    created in Listing 11.1 and inside a virtual environment):


    ```

    $ jupyter notebook --generate-config

    ```


