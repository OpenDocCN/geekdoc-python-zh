    Visit **informit.com/learn-enough** for a complete list of available publications.


    The **Learn Enough** series teaches you the developer tools, Web technologies,
    and programming skills needed to launch your own applications, get a job as a
    programmer, and maybe even start a company of your own. Along the way, you’ll
    learn technical sophistication, which is the ability to solve technical problems
    yourself. And Learn Enough always focuses on the most important parts of each
