    \    assert Phrase(\"racecar\").ispalindrome()\n\ndef test_mixed_case_palindrome():\n\
    \    assert Phrase(\"RaceCar\").ispalindrome()\n\ndef test_palindrome_with_punctuation():\n\
    \    assert Phrase(\"Madam, I'm Adam.\").ispalindrome()\n\ndef test_letters_and_digits():\n\
    \    assert Phrase(\"Madam, I'm Adam.\").letters_and_digits() == \"MadamImAdam\"\
    \n\ndef test_integer_non_palindrome():\n    FILL_IN Phrase(12345).ispalindrome()\n\
    \ndef test_integer_palindrome():\n    FILL_IN Phrase(12321).ispalindrome()\n```\n\
    \n**Listing 8.39:** Adding detection of integer palindromes. GREEN\n`src/palindrome/phrase.py`\n\
    \n```python\nimport re\n\nclass Phrase:\n    \"\"\"A class to represent phrases.\"\
    \"\"\n\n    def __init__(self, content):\n        self.content = str(content)\n\
    \n    def ispalindrome(self):\n        \"\"\"Return True for a palindrome, False\
    \ otherwise.\"\"\"\n        return self.processed_content() == reverse(self.processed_content())\n\
    \n    def processed_content(self):\n        \"\"\"Return content for palindrome\
    \ testing.\"\"\"\n        return self.letters_and_digits().lower()\n\n    def\
    \ letters_and_digits(self):\n        \"\"\"Return the letters and digits in the\
    \ content.\"\"\"\n        return \"\".join(re.findall(r\"[a-zA-Z]\", self.content))\n\
    \ndef reverse(string):\n    \"\"\"Reverse a string.\"\"\"\n    return \"\".join(reversed(string))\n\
    ```\n\n**Listing 8.40:** Upgrading the test package.\n\n```\n(venv) $ pip install\
    \ --your-package \\\n> --index-url https://test.pypi.org/simple/\n```\n\n## 8.5\
    \ Refactor\n\nWe can indicate updates by incrementing the middle number in the\
    \ version, e.g., from 0.1.0 to 0.2.0, 0.3.0, etc. Bugfixes are represented by\
    \ incrementing the rightmost number, as in 0.2.1, 0.2.2, etc., and a mature version\
    \ (suitable for use by others, and which may not be backward-compatible with prior\
    \ versions) is indicated by version 1.0.0.\n\nAfter reaching version 1.0.0, further\
    \ changes follow this same general pattern: 1.0.1 would represent minor changes\
    \ (a “patch release”), 1.1.0 would represent new (but backward-compatible) features\
    \ (a “minor release”), and 2.0.0 would represent major or backward-incompatible\
    \ changes (a “major release”).\n\nThese numbering conventions are known as *semantic\
    \ versioning*, or *semver* for short. For more information, see semver.org.\n\n\
    Finally, if you ever go on to develop a package that isn’t just a test like the\
    \ one in this chapter, you can publish it to the real Python Package Index (PyPI).\
    \ Although there is ample PyPI documentation, there is little doubt in such a\
    \ case that you will also have ample opportunity to apply your technical sophistication.\n\
    \n# CHAPTER 9\n## Shell Scripts\n\nIn this chapter, we'll build on the foundation\
    \ laid in Section 1.4 and write three *shell scripts* of increasing sophistication.\
    \ In the first two programs (Section 9.1 and Section 9.2), we'll take the Python\
    \ package developed in Chapter 8 and put it to work detecting palindromes drawn\
    \ from two different sources: a file, and the Web. In the process, we'll learn\
    \ how to read and write from files with Python, and also how to read from a live\
    \ Web URL. Finally, in Section 9.3, we'll write a real-life utility program adapted\
    \ from one I once wrote for myself. It includes an introduction to manipulation\
    \ of the Document Object Model (or *DOM*) in a context outside a web browser.¹\n\
    \n## 9.1 Reading from Files\n\nOur first task is to read and process the contents\
    \ of a file. The example is simple by design, but it demonstrates the necessary\
    \ principles, and gives you the background needed to read more advanced documentation.\n\
    \nWe'll start by using `curl` to download a file of simple phrases (note that\
    \ this should be in the `python_tutorial` directory we used prior to Chapter 8,\
    \ not the palindrome package directory):\n\n```\n$ cd ~/repos/python_tutorial/\n\
    $ curl -OL https://cdn.learnenough.com/phrases.txt\n```\n\n> 1. The Document Object\
    \ Model was introduced (https://www.learnenough.com/css-and-layout-tutorial/introduction#sec-start_stylin)\
    \ in *Learn Enough CSS & Layout to Be Dangerous* (https://www.learnenough.com/css-and-layout)\
    \ and is explored (https://www.learnenough.com/javascript-tutorial/dom_manipulation#cha-dom_manipulation)\
    \ in more depth in *Learn Enough JavaScript to Be Dangerous* (https://www.learnenough.com/javascript).\n\
    \nAs you can confirm by running `less phrases.txt` at the command line, this file\
    \ contains a large number of phrases—some of which (surprise!) happen to be palindromes.\n\
    \nOur specific task is to write a palindrome detector that iterates through each\
    \ line in this file and prints out any phrases that are palindromes (while ignoring\
    \ others). To do this, we'll need to open the file and read its contents. We'll\
    \ then use the package developed in Chapter 8 to determine which phrases are palindromes.\n\
    \nPython handles file operations natively through the `open()` function, which\
    \ we can use to create an open file, read the file contents with `read()`, and\
    \ then close it with `close()`, as shown in Listing 9.1.²\n\n**Listing 9.1:**\
    \ Opening a file in the REPL.\n\n```\n$ source venv/bin/activate\n(venv) $ python3\n\
    >>> file = open(\"phrases.txt\")    # Not fully Pythonic\n>>> text = file.read()\n\
    >>> file.close()\n```\n\nThis reads the contents of `phrases.txt` and puts it\
    \ in the `text` variable.\n\nWe can confirm that the assignment worked using the\
    \ `splitlines()` method introduced in Section 3.1 (Listing 3.2):\n\n```\n>>> len(text)\n\
    1373\n>>> text.splitlines()[0]    # Split on newlines and extract the 1st phrase.\n\
    'A butt tuba'\n```\n\nThe second command here splits the text on the newline character\
    \ `\\n` and selects the zeroth element, revealing the enigmatic first line of\
    \ the file, “A butt tuba”.\n\nAs noted in Listing 9.1, opening a file as shown\
    \ isn't fully Pythonic. The reason is that we have to remember to close the file\
    \ every time we open one, which can cause unpredictable behavior if we forget.\
    \ We can avoid such issues by using the special `with` keyword, together with\
    \ `as` and the desired filename:\n\n```\n>>> with open(\"phrases.txt\") as file:\
    \     # Pythonic\n...     text = file.read()\n...\n>>> len(text)\n1373\n```\n\n\
    This code arranges to close the file automatically at the end of the `with` statement,\
    \ and the result is the same as before.\n\nLet's take the ideas from the Python\
    \ interpreter and put them in a script to detect the palindromes in `phrases.txt`:\n\
    \n```\n(venv) $ touch palindrome_file\n(venv) $ chmod +x palindrome_file\n```\n\
    \nWe'll then put in the necessary shebang line (Section 1.4) and require the palindrome\
