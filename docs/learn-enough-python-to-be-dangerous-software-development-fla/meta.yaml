    truly—often require practice to get good at being okay with not being good right
    away. Meta-reps, as it were.)

    Give yourself a break, get in your reps, and watch your technical sophistication
    grow by the day.


    Our general technique for approaching functional programming will be to perform
    a task involving a sequence of commands (called “imperative programming”,¹ which
    is what we’ve mostly been doing so far), and then show how to do the same thing
    using functional programming.

    For convenience, we’ll create a file for our explorations, rather than typing
    everything at the REPL:


    ```

    (venv) $ touch functional.py

    ```


    # 6.1 List Comprehensions


    We begin our study of functional programming with a technique that will give you
    an Einstein-level comprehension of Python (Figure 6.1²). This technique, known
    as *list comprehensions*, lets us use functions to build up lists using a single
    command. Its effects are broadly similar to the `map` function covered in *Learn
    Enough JavaScript to Be Dangerous* (https://www.learenough.com/javascript) and
    *Learn Enough Ruby to Be Dangerous* (https://www.learnenough.com/ruby)—indeed,
    Python itself supports `map`, but list comprehensions are much more Pythonic.

    Let’s look at a concrete example. Suppose we had a list of mixed-case strings,
    and we wanted to create a corresponding list of lowercase strings joined on a
    hyphen (making the result appropriate for use in URLs), like this:


    ```

    "North Dakota" -> "north-dakota"

    ```


    Using previous techniques from this tutorial, we could do this as follows:


    +   1. Define a variable containing a list of strings.

    2. Define a second variable (initially empty) for the URL-friendly list of strings.


    1. From Latin *imperātīvus*, “proceeding from a command.”

