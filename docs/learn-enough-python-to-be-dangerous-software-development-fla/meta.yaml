    # CHAPTER 10

    A Live Web Application


    This chapter develops a dynamic web application in Python using the same Flask
    framework introduced in Section 1.5 and applied further in Section 5.2. Although
    simple, Flask is not a toy—it’s a production-ready web framework used by companies
    like Netflix, Lyft, and reddit. Flask also serves as excellent lightweight preparation
    for a more complex framework like Django. By the end of this chapter, you’ll basically
    understand how web apps work, including layouts (Section 10.3), templates (Section
    10.4), testing, and deployment.¹


    Our example web app will put the custom Python package developed in Chapter 8
    to good use through the development of a web-based *palindrome detector*. Along
    the way, we’ll learn how to create dynamic content using *Python templates*.


    Detecting palindromes from the Web requires using a back-end web application to
    handle *form submission*, a task at which Flask excels. Our palindrome app will
    also feature two other pages—Home and About—which will give us an opportunity
    to learn how to use a Flask-based site layout. As part of this, we’ll apply and
    extend the work in Chapter 8 to write automated tests for our app.


    Finally, as in Section 1.5, we will also deploy our full palindrome app to the
    live Web. We’ll end with pointers to further resources for Python, Flask, and
    other topics like JavaScript and Django.


    1. The main additional subject to learn is how to store and retrieve information
    using a database, which represents a new technology but doesn’t involve any fundamentally
    new principles. You can use databases both with Flask and with a fuller-featured
    framework like Django.'
