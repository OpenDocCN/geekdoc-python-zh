    ![](img/b3303452eae4d7974600cd38b159398e_281_0.png)


    **Figure 10.2:** Deleting an app at Fly.io.


    At this point, we''re nearly ready to deploy to production. The only issue is
    that you''re likely to have an app already defined from Section 1.5.1, and as
    of this writing Fly.io allows only one app when using its free tier. As a result,
    you will probably have to delete the old app, which you can find on your Fly.io
    dashboard (Figure 10.2): Click app name > Settings > Delete app. (You can reuse
    the builder, though, so there is no need to delete that as well.)


    I recommend you commit the configuration changes to Git (and continue making commits
    and pushes throughout this chapter):


    ```


    (venv) $ git add -A

    (venv) $ git commit -m "Add configuration"

    ```


    We''re now ready for the actual deployment:


    ```


    (venv) $ flyctl deploy

    (venv) $ flyctl open    # won''t work on the cloud IDE, so use displayed URL

    ```


    The result is a working app in production, as seen in Figure 10.3. Although for
    brevity I''ll omit further deployments until Section 10.5.1, I recommend deploying
    regularly as you work through the chapter to turn up any production issues as
    quickly as possible.'
