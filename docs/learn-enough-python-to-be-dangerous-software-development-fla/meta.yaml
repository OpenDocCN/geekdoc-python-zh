    # Box 11.2: Matplotlib mechanics


    The exact mechanics of getting Matplotlib plots to display varies widely depending
    on the exact details of your setup. The most explicit way to show plots, which
    works on most systems from the REPL, is to use the show() method:


    ```

    >>> import numpy as np

    >>> import matplotlib.pyplot as plt

    >>> x = np.linspace(-2, 2, 100)

    >>> fig, ax = plt.subplots(1, 1)

    >>> ax.plot(x, x*x)

    >>> plt.show()

    ```


    On many systems, this will spawn a window like Figure 11.7 with the result of
    the plot.


    In Jupyter notebooks, the environment can be configured to show Matplotlib plots
    automatically (“inline”, i.e., right in the notebook) by executing this command
    in a notebook cell:


    ```

    %matplotlib inline

    ```


    As far as I can tell, on some systems (including mine) this setting is on by default,
    with plots appearing automatically when the corresponding Jupyter cells are evaluated
    (Figure 11.8).


    In an environment such as the cloud IDE, it’s possible to switch to a non-graphical
    back-end, write out to a file, and then view the file in the browser. See this
    Stack Overflow thread (https://bit.ly/cloud-plot) if you’d like to go this route,
    but the recommended solution is to set up Jupyter on the cloud IDE as described
    in Box 11.1. In that case, you can set up inline plot display as described above
    (if in fact it’s not available automatically).


    # 11.3.1 Plotting


    We’ll start by reviewing the final example from Section 11.2, which defined a
    linearly spaced array with 100 points from 0 to τ:


    ```

    (venv) $ python3

    >>> import numpy as np

    >>> import matplotlib.pyplot as plt

    >>> from math import tau

    >>> x = np.linspace(0, tau, 100)

    ```'
- md: "## 11.3.1 Line Plots\n\nMatplotlib has two key objects, **Figure** and **Axes**.\
    \ Roughly speaking, **Figure** is a container for the elements that make up the\
    \ image and **Axes** is the data representing the elements. Don't worry too much\
    \ about exactly what this means, though; in practice, using Matplotlib often reduces\
    \ to assigning figure and axes objects (conventionally called **fig** and **ax**)\
    \ to the result of calling the **subplots()** function:\n\n```python\n>>> fig,\
    \ ax = plt.subplots()\n```\n\nThis somewhat obscure syntax comes right from the\
    \ Matplotlib documentation.¹¹\n\n¹¹ In this chapter, we use the so-called \"object-oriented\"\
    \ interface to Matplotlib, which is generally preferred by the Matplotlib project\
    \ itself. There is a second interface, though, which is designed to behave like\
    \ the plotting features in MATLAB. See the article \"Pyplot vs Object Oriented\
    \ Interface\" (https://matplotlib.org/matplotlibblog/posts/pyplot-vs-object-oriented-interface/)\
    \ for more information.\n\n```python\n[4]: x = np.linspace(-1, 6, 100)\nplt.plot(x,\
    \ wien(x));\nplt.plot(x, 0*x);\n```\n\nWe'll find the root's numerical value by\
    \ solving Wien(x) = (x - 5)e^x + 5 = 0 using several different methods:\n\n- `find_root`\
    \ from Sage\n- `fsolve` from `scipy.optimize` to find all the roots given initial\
    \ guesses\n- `brentq` from `scipy.optimize` to find the single root closest to\
    \ 5\n\n```python\n[5]: var('x')\nfind_root(wien(x) == 0, 1, 6)\n[5]: 4.965114231744276\n\
    ```\n\n**Figure 11.8:** A plot appearing automatically in a Jupyter notebook.\n\
    \nTo make a plot of the cosine function, we can then call the `ax` object's `plot()`\
    \ method with `x` (horizontal) values equal to our 100 linearly spaced points\
    \ and `y` (vertical) values given by calling `np.cos` on `x`:\n\n```python\n>>>\
    \ ax.plot(x, np.cos(x))\n>>> plt.show()\n```\n\nAs noted in Box 11.2, the step\
    \ to view the plot will depend on your exact setup, so we'll use `plt.show()`\
    \ as a shorthand for \"whatever the corresponding command is on your system.\"\
    \ (Note in particular that the `fig` object won't generally be needed unless you're\
    \ saving the figure to disk; `ax` is where most of the action is.) The result\
    \ in this case is the nice basic cosine plot shown in Figure 11.9.\n\nFor most\
    \ of the remaining examples, I'll be leaving off the `>>>` prompt so that you\
    \ can more easily copy and paste if you want. This is mainly because building\
    \ up plots can be a bit cumbersome since you have to rerun all the commands every\
    \ time. One big advantage of Jupyter notebooks is that you can avoid this by building\
    \ up the plot incrementally in a single cell and then repeatedly execute the code\
    \ using Shift-Return.\n\nAs a next step, let's include ticks for the x- and y-axes\
    \ (using **set_xticks()** and **set_yticks()**) and add an overall grid (using\
    \ **plt.grid()**):\n\n```python\nfig, ax = plt.subplots()\nax.set_xticks([0, tau/4,\
