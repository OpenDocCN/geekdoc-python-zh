    # CHAPTER 6

    Functional Programming


    Having learned how to define functions and apply them in a couple of different
    contexts, now we''re going to take our programming to the next level by learning
    the basics of *functional programming*, a style of programming that emphasizes—you
    guessed it—functions. As we''ll see, functional programming in Python frequently
    employs a powerful (and very Pythonic) class of techniques called *comprehensions*,
    which typically involve using functions to conveniently construct Python objects
    with particular elements. The most common comprehensions are *list comprehensions*
    and *dictionary comprehensions*, which make lists and dictionaries, respectively.
    We''ll also see an example of how to use *generator comprehensions* to replicate
    the results of Section 5.3.1, as well as a brief introduction to *set comprehensions*.


    This is a challenging chapter, and you may have to get in some reps to fully grok
    it (Box 6.1), but the rewards are rich indeed.


    > **Box 6.1: Getting in your reps**


    In contexts ranging from martial arts to chess to language learning, practitioners
    will reach a point where no amount of analysis or reflection will help them improve—they
    just need to get in some more repetitions, or “reps”.


    It''s amazing how much you can improve by trying something, kinda-sorta (but maybe
    not quite) getting it, and then just *doing it again*. In the context of a tutorial
    like this one, sometimes that means rereading a particularly tricky section or
    chapter. Some people (including yours truly) will even reread an entire book.


    One important aspect of getting in your reps is *suspending self-judgment*—allow
    yourself not to be good right away. (Many people—including, again, yours'
