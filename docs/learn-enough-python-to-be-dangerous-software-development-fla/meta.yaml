  md: "In effect, the **-1** is a placeholder that says “use the dimensionality needed\
    \ to make the total number of elements correct.”\n\nAmong other things, this **-1**\
    \ technique can be used to convert a multidimensional array to an array of arrays\
    \ of *one* element, which can be accomplished using the argument **(-1, 1)** (Listing\
