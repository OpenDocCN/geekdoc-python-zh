    , sonnet)\nprint(Counter(words))\n```\n\n## CHAPTER 5\nFunctions and Iterators\n\
    \nSo far in this tutorial, we've seen several examples of Python functions, which\
    \ are one of the most important ideas in Python, and indeed in all of computing.\
    \ In this chapter, we'll learn how to define functions of our own (Figure 5.1).\
    \ We'll also learn a bit more about iterators (mentioned briefly in Section 3.4.2),\
    \ both because Python often uses such objects as the return values of built-in\
    \ functions and because they're important in their own right.\n\nIn case you're\
    \ not running the Python shell already, you should activate the virtual environment\
    \ and start the REPL as usual:\n\n```\n$ source venv/bin/activate\n(venv) $ python3\n\
    ```\n\n![](img/b3303452eae4d7974600cd38b159398e_141_0.png)\n\n**Figure 5.1:**\
    \ Time to level up.\n\n### 5.1 Function Definitions\n\nAs we've seen with functions\
    \ like `print()` (Section 2.3), `len()` (Section 2.4), and `sorted()` and `reversed()`\
    \ (Section 3.4.2), function calls in Python consist of a *name* and zero or more\
    \ arguments in parentheses:\n\n```\nprint(\"hello, world!\")\n```\n\nOne of the\
    \ most important tasks in programming involves defining our own functions, which\
    \ in Python can be done using the **def** keyword. (As discussed in Section 2.5,\
    \ functions attached to objects (such as **split()** and **islower()**) are also\
    \ called *methods*. We'll learn how to define methods of our own in Chapter 7.)\n\
    \nLet's take a look at a simple example of a function definition in the REPL.\
    \ We'll start with a function that takes a single numerical argument and returns\
    \ the square, as shown in Listing 5.1.¹\n\n**Listing 5.1:** Defining a function.\n\
    \n```\n>>> def square(x):\n...     return x*x\n...\n>>> square(10)\n100\n```\n\
    \n(Here we could also use **x**\\*\\*2, which would be the same thing.) The function\
    \ ends with the **return** keyword followed by the return value for the function.\n\
    \nIn the case of **square()**, the ending of the function was also the beginning\
    \ because it's only one line. But, as you might expect, a function can also consist\
    \ of multiple steps, such as the function shown in Listing 5.2 to return a list\
    \ of squares from 0 up to **(n-1)**\\*\\*2 (in accordance with the usual behavior\
    \ of **range()**).\n\n**Listing 5.2:** Returning a list of squares.\n\n```\n>>>\
    \ def squares_list(n):\n...     squares = []\n...     for i in range(n+1):\n...\
    \         squares.append(i**2)\n...     return squares\n...\n>>> squares_list(11)\n\
    [0, 1, 4, 9, 16, 25, 36, 49, 64, 81, 100]\n```\n\nListing 5.2 includes a common\
    \ pattern of initializing a variable, changing it, and then returning the changed\
    \ value. We'll see how to replace this pattern with a more compact version in\
    \ Chapter 6.\n\n1. Python doesn't have a type mechanism to enforce, say, numerical\
    \ arguments to functions. There is a **typing** library, though, with support\
    \ for type hints.\n\nIt's worth noting that **return** acts immediately, much\
    \ like the **break** keyword we saw in Listing 3.11, so we can use it to interrupt\
    \ a loop. Indeed, **return** interrupts the entire *function*, so as soon as Python\
    \ sees an occurrence of **return** it leaves the function entirely. For example,\
    \ we can write a function to return the first number in a list bigger than 10,\
    \ or **None** if no such number exists, as shown in Listing 5.3.\n\n**Listing\
    \ 5.3:** Using **return** to return immediately from a **for** loop.\n\n```\n\
    >>> def bigger_than_10(numbers):\n...     for n in numbers:\n...         if n\
    \ > 10:\n...             return n\n...     return None\n...\n>>> bigger_than_10(squares_list(11))\n\
    16\n```\n\nNote that we've included an explicit **return None** in Listing 5.3,\
