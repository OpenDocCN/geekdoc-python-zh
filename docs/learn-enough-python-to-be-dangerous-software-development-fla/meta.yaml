    \       \"\"\"Return True for a palindrome, False otherwise.\"\"\"\n        processed_content\
    \ = self.content.lower()\n        return processed_content == reverse(processed_content)\n\
    \n    def __iter__(self):\n        self.phrase_iterator = iter(self.content)\n\
    \        return self\n\n    def __next__(self):\n        return next(self.phrase_iterator)\n\
    \ndef reverse(string):\n    \"\"\"Reverse a string.\"\"\"\n    return \"\".join(reversed(string))\n\
    ```\n\nWith the code in Listing 7.8, we can reload the **palindrome** module to\
    \ see if it worked:\n\n```python\n>>> reload(palindrome)\n>>> phrase = palindrome.Phrase(\"\
    Racecar\")\n>>> for c in phrase:\n...     print(c)\nR\na\nc\ne\nc\na\nr\n```\n\
    \nYup! We can now iterate through a **Phrase** object without having to specify\
    \ the **content** attribute explicitly.\n\n## 7.2.1 Exercise\n\n- 1. Using the\
    \ REPL, determine if **list(phrase)** works after the custom iterator has been\
    \ defined as in Listing 7.8. What about joining on the empty string using **\"\
    \".join(phrase)**?\n\n## 7.3 Inheritance\n\nWhen learning about Python classes,\
    \ it's useful to investigate the *class hierarchy* using the **\\_\\_class\\_\\\
    _** and **\\_\\_mro\\_\\_** attributes, where the latter stands for *method resolution\
    \ order*, which turns out to print the exact hierarchy we need.\n\nLet's look\
    \ at an example of what this means in the case of a familiar type of object, a\
    \ string:\n\n```python\n>>> s = \"foobar\"\n>>> type(s)          # one way to\
    \ get the class\n<class 'str'>\n>>> s.__class__      # another way to get the\
    \ class\n<class 'str'>\n>>> s.__class__.__mro__\n(<class 'str'>, <class 'object'>)\n\
    ```\n\nWhat this tells us is that a string is of class **str**, which in turn\
    \ is of type **object**. The latter is known as a *superclass* because it is usually\
    \ thought of as being “above” the **str** class.\n\nA diagram of the resulting\
    \ class hierarchy appears in Figure 7.3. We see here that the superclass of **str**\
    \ is **object**, which is where the hierarchy ends. This pattern is true of every\
    \ Python object: Trace back the class hierarchy far enough and you’ll always reach\
    \ **object**, which has no superclass itself.\n\nThe way Python’s class hierarchy\
    \ works is that each class *inherits* the attributes and methods of classes further\
    \ up in the hierarchy. For example, we’ve just seen how to find the class of an\
    \ object of type **str**:\n\n```python\n>>> \"honey badger\".__class__\n<class\
