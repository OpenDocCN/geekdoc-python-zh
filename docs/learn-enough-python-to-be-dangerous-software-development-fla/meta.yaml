    \ scikit-learn 执行*线性回归*，该算法为一组数据找到最佳拟合（基于“最佳”的合适定义）。<sup>31</sup> 将线性回归称为“机器学习”有时被认为是一种内部笑话，因为该技术相对简单且已使用多年。尽管如此，它仍是一个很好的起点。\n\
    \n与第 11.6 节一样，我们将使用*泰坦尼克号*的生存数据。我们将首先导入必要的库并创建一个 **titanic** DataFrame：\n\n```python\n\
    >>> import numpy as np\n>>> import pandas as pd\n>>> import matplotlib.pyplot\
    \ as plt\n>>> URL = \"https://learnenough.s3.amazonaws.com/titanic.csv\"\n>>>\
    \ titanic = pd.read_csv(URL)\n```\n\n我们的目标是考虑年龄对生存率的影响。我们将首先绘制生存率与年龄的散点图（第 11.3.2\
