    \ subject of Section 11.3.\n\n### 11.2.4 Exercises\n\n1. What happens if the dimensions\
    \ in `reshape()` don't match the array size (e.g., `np.arange(16).reshape((4,\
    \ 17))`)?\n2. Confirm that `A = np.random.rand(5, 5)` lets you define a 5 × 5\
    \ random matrix.\n3. Find the inverse `Ainv` of the 5 × 5 matrix in the previous\
    \ exercise. (Calculating the inverse of a 2 × 2 matrix as in Section 11.2.2 is\
    \ fairly simple by hand, but the task rapidly gets harder as the matrix size increases,\
    \ in which case a computational system like NumPy is indispensable.)\n4. What\
    \ is the matrix product `I = A @ Ainv` of the matrices in the previous two exercises?\
    \ Use the same `isclose()` trick from Listing 11.7 to zero out the elements of\
    \ `I` close to zero and confirm that the resulting matrix is indeed the 5 × 5\
    \ identity matrix.\n\n## 11.3 Data Visualization with Matplotlib\n\nMatplotlib\
    \ is a powerful visualization tool for Python that can do an absurdly large number\
    \ of awesome things.¹⁰ In this section, we’ll start with a simple two-dimensional\
    \ plot based on the work we did in Section 11.2 and incrementally include additional\
    \ features, eventually reaching the figure shown in Figure 11.6. We’ll then cover\
    \ a couple of other important cases (scatter plots and histograms), which are\
    \ important for data analysis with pandas (Section 11.4). The exact mechanics\
    \ of displaying Matplotlib plots depends on the particular setup; refer to Box\
    \ 11.2 to get the display of Matplotlib plots working on your system.\n\n![](img/b3303452eae4d7974600cd38b159398e_358_0.png)\n\
    \n**Figure 11.6:** A fancy plot showing off features of Matplotlib.\n\n10. It’s\
    \ worth noting that many Python data scientists also use seaborn, which is a data-visualization\
    \ library built on Matplotlib. Although learning seaborn is certainly not necessary\
    \ to be *dangerous*, it would make a natural follow-on to this section. The official\
    \ seaborn tutorial would be a good place to start.\n\n### Box 11.2: Matplotlib\
    \ mechanics\n\nThe exact mechanics of getting Matplotlib plots to display varies\
    \ widely depending on the exact details of your setup. The most explicit way to\
    \ show plots, which works on most systems from the REPL, is to use the show()\
    \ method:\n\n```\n>>> import numpy as np\n>>> import matplotlib.pyplot as plt\n\
    >>> x = np.linspace(-2, 2, 100)\n>>> fig, ax = plt.subplots(1, 1)\n>>> ax.plot(x,\
    \ x*x)\n>>> plt.show()\n```\n\nOn many systems, this will spawn a window like\
    \ Figure 11.7 with the result of the plot.\n\nIn Jupyter notebooks, the environment\
    \ can be configured to show Matplotlib plots automatically (\"inline\", i.e.,\
    \ right in the notebook) by executing this command in a notebook cell:\n\n```\n\
    %matplotlib inline\n```\n\nAs far as I can tell, on some systems (including mine)\
    \ this setting is on by default, with plots appearing automatically when the corresponding\
    \ Jupyter cells are evaluated (Figure 11.8).\n\nIn an environment such as the\
    \ cloud IDE, it’s possible to switch to a non-graphical back-end, write out to\
    \ a file, and then view the file in the browser. See this Stack Overflow thread\
    \ (https://bit.ly/cloud-plot) if you’d like to go this route, but the recommended\
    \ solution is to set up Jupyter on the cloud IDE as described in Box 11.1. In\
    \ that case, you can set up inline plot display as described above (if in fact\
    \ it’s not available automatically).\n\n### 11.3.1 Plotting\n\nWe’ll start by\
    \ reviewing the final example from Section 11.2, which defined a linearly spaced\
    \ array with 100 points from 0 to τ:\n\n```\n(venv) $ python3\n>>> import numpy\
    \ as np\n>>> import matplotlib.pyplot as plt\n>>> from math import tau\n>>> x\
    \ = np.linspace(0, tau, 100)\n```"
