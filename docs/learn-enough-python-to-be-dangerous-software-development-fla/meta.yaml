  md: 'One of the most important tasks in programming involves defining our own functions,
    which in Python can be done using the **def** keyword. (As discussed in Section
    2.5, functions attached to objects (such as **split()** and **islower()**) are
    also called *methods*. We''ll learn how to define methods of our own in Chapter
    7.)


    Let''s take a look at a simple example of a function definition in the REPL. We''ll
    start with a function that takes a single numerical argument and returns the square,
    as shown in Listing 5.1.¹


    **Listing 5.1:** Defining a function.


    ```

    >>> def square(x):

    ...     return x*x

    ...

    >>> square(10)

    100

    ```


    (Here we could also use **x**\*\*2, which would be the same thing.) The function
    ends with the **return** keyword followed by the return value for the function.


    In the case of **square()**, the ending of the function was also the beginning
    because it''s only one line. But, as you might expect, a function can also consist
    of multiple steps, such as the function shown in Listing 5.2 to return a list
    of squares from 0 up to **(n-1)**\*\*2 (in accordance with the usual behavior
    of **range()**).


    **Listing 5.2:** Returning a list of squares.


    ```

    >>> def squares_list(n):

    ...     squares = []

    ...     for i in range(n+1):

    ...         squares.append(i**2)

    ...     return squares

    ...

    >>> squares_list(11)

    [0, 1, 4, 9, 16, 25, 36, 49, 64, 81, 100]

    ```


    Listing 5.2 includes a common pattern of initializing a variable, changing it,
    and then returning the changed value. We''ll see how to replace this pattern with
    a more compact version in Chapter 6.


    1. Python doesn''t have a type mechanism to enforce, say, numerical arguments
    to functions. There is a **typing** library, though, with support for type hints.'
