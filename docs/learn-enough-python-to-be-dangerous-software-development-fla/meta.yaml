    \nfig.set_dpi(150)\n\nax.plot(x, np.cos(x), color=\"red\", linestyle=\"dashed\"\
    )\nax.plot(x, np.sin(x), color=\"blue\", linestyle=\"dotted\")\nplt.show()\n```\n\
    \n# 11.3.2 Scatter Plots\n\nThe plot in Section 11.3.1 introduced some of the\
    \ key ideas of Matplotlib, and from this point there are a million possible ways\
    \ to go. In this section and the next, we'll focus on two kinds of visualizations\
    \ especially important in data science: *scatter*"
- md: "## 11.3.2 Scatter Plots\n\n*plots* and *histograms*. Don't worry if everything\
    \ doesn't sink in right away; we'll have ample opportunity to see further examples\
    \ of both scatter plots and histograms in Section 11.5, Section 11.6, and Section\
    \ 11.7.\n\nA scatter plot just plots a bunch of discrete function values against\
    \ the corresponding points, which is a great way to get an overall sense of what\
    \ relationships the function values might satisfy. Let's take a look at a concrete\
    \ example to see what this means.\n\nWe'll begin by generating some random points\
    \ chosen from the *standard normal* distribution,¹⁴ which is a normal distribution\
    \ (or \"bell curve\") with an average value (mean) of 0 and a spread (standard\
    \ deviation) of 1.¹⁵ We can obtain these values using\n\n14. There's nothing \"\
    abnormal\" about other distributions; use of the word \"normal\" is in large part\
    \ an idiosyncrasy of history.\n\n15. The functional form of the standard normal\
    \ distribution is given by the probability density $P(x) = \\frac{1}{\\sqrt{\\\
    tau}} e^{-\\frac{1}{2}x^2}$, where $1/\\sqrt{\\tau} = 1/\\sqrt{2\\pi}$ is a normalization\
    \ factor to ensure that the total probability $\\int_{-\\infty}^{\\infty} P(x)\
    \ dx$ is equal to 1. The density function for a general normal distribution with\
    \ mean $\\mu$ and standard deviation $\\sigma$ is $P(x; \\mu, \\sigma) = \\frac{1}{\\\
    sigma\\sqrt{\\tau}} e^{-\\frac{1}{2}\\left(\\frac{x-\\mu}{\\sigma}\\right)^2}$;\
    \ setting $\\mu = 0$ and $\\sigma = 1$ then yields the standard normal.\n\nNumPy's\
    \ **random** library, which includes a default random number generator called\
    \ **default_rng()** (Listing 11.9).\n\n### Listing 11.9: Generating random values\
    \ using the standard normal distribution.\n\n```python\n>>> from numpy.random\
    \ import default_rng\n>>> rng = default_rng()\n>>> n_pts = 50\n>>> x = rng.standard_normal(n_pts)\n\
    >>> x\narray([ 0.41256003,  0.67594205,  1.264653  ,  1.16351491, -0.41594407,\n\
    \       -0.60157015,  0.84889823, -0.59984223,  0.24374326,  0.06055498,\n   \
    \    -0.48512829,  1.02253594, -1.10982933, -0.40609179,  0.55076245,\n      \
    \  0.13046238,  0.86712869,  0.06139358, -2.26538163,  1.45785923,\n       -0.56220574,\
    \ -1.38775239, -2.39643977, -0.77498392,  1.16794796,\n       -0.6588802 ,  1.66343434,\
    \  1.57475219, -0.03374501, -0.62757059,\n       -0.99378175,  0.69259747, -1.04555996,\
    \  0.62653116, -0.9042063 ,\n       -0.32565268, -0.99762804, -0.4270288 ,  0.69940045,\
    \ -0.46574267,\n        1.82225132,  0.23925201, -1.0443741 , -0.54779683,  1.17466477,\n\
    \       -2.54906663, -0.31495622,  0.25224765, -1.20869217, -1.02737145])\n```\n\
    \n(You may see code like **random.standard_normal(50)** in tutorial examples online,\
    \ but this variant is now deprecated, and the technique shown in Listing 11.9\
    \ is the current preferred method for generating random values with NumPy.)\n\n\
    With those *x* values in hand, let's create a set of *y* values by adding a constant\
    \ multiple (the slope) of 5 times *x* plus another random factor:\n\n```python\n\
    >>> y = 5*x + rng.standard_normal(n_pts)\n```\n\nThis broadly follows the pattern\
    \ of the equation for a line, *y = mx + b*, only with random values for *x* and\
    \ *b*. Because the functional form of *y* is essentially linear, a plot of *y*\
    \ vs. *x* should look roughly like a line, which we can confirm with a scatter\
    \ plot as follows:\n\n**Figure 11.15: A Matplotlib scatter plot.**\n\n```python\n\
    >>> fig, ax = plt.subplots()\n>>> ax.scatter(x, y)\n>>> plt.show()\n```\n\nAs\
    \ seen in Figure 11.15, our guess was correct. (Because we didn't fix a particular\
    \ seed value for the random number generator, your exact results will differ.)\n\
    \n## 11.3.3 Histograms\n\nFinally, let's apply some of the same ideas from Section\
    \ 11.3.2 to visualize the distribution of 1000 random values drawn from the standard\
    \ normal distribution:\n\n```python\n>>> values = rng.standard_normal(1000)\n\
    ```\n\nA common way to get a sense of what these values look like is to make a\
    \ fixed number of \"bins\" and plot how many values fit into each bin. The resulting\
    \ plot is known as a *histogram*, and can be generated automatically using Matplotlib's\
    \ `hist()` method:\n\n**Figure 11.16:** A histogram of normally distributed random\
    \ values.\n\n```python\n>>> fig, ax = plt.subplots()\n>>> ax.hist(values)\n>>>\
    \ plt.show()\n```\n\nThe result is a good approximation of a \"bell curve\", as\
    \ seen in Figure 11.16.\n\nThe default number of bins is **10**, but we can investigate\
    \ the result of different bin sizes by passing a **bins** argument to **hist()**,\
    \ say **bins=20**:\n\n```python\n>>> fig, ax = plt.subplots()\n>>> ax.hist(values,\
    \ bins=20)\n>>> plt.show()\n```\n\nIn this case, the result is a finer-grained\
    \ version of the distribution (Figure 11.17).\n\nBecause Matplotlib is a general\
    \ system for plotting and data visualization, there's practically no end to the\
    \ things you can do with it. Although we've now covered the basics of what we'll\
    \ need for the rest of this tutorial, I encourage you to explore further, and\
    \ the Matplotlib documentation is a good place to start.\n\n**Figure 11.17:**\
    \ A rebinned version of Figure 11.16.\n\n## 11.3.4 Exercises\n\n- 1. Add a title\
    \ and axis labels to the plot shown in Figure 11.15.\n- 2. Add titles to the histograms\
    \ in Section 11.3.3.\n- 3. One common plotting task is including multiple subplots\
    \ in the same figure. Show that the code in Listing 11.10 creates vertically stacked\
    \ subplots, as shown in Figure 11.18. (Here the `suptitle()` method produces a\
    \ \"supertitle\" that sits above both plots. See the Matplotlib documentation\
    \ on subplots for other ways to create multiple subplots.)\n- 4. Add a plot of\
    \ the function cos(x − τ/8) to the plot in Figure 11.14 with color \"orange\"\
    \ and linestyle \"dashdot\". *Extra credit:* Add an annotation as well. (The extra-credit\
    \ step is *much* easier in an interactive Jupyter notebook, especially when finding\
    \ the right coordinates for the annotation label and arrow.)\n\n### Listing 11.10:\
    \ Stacking subplots.\n\n```python\n>>> x = np.linspace(0, tau, 100)\n>>> fig,\
    \ (ax1, ax2) = plt.subplots(2)\n>>> fig.suptitle(r\"Vertically stacked plots of\
    \ $\\cos\\theta$ and $\\sin\\theta$.\")\n>>> ax1.plot(x, np.cos(x))\n>>> ax2.plot(x,\
    \ np.sin(x))\n```\n\nVertically stacked plots of cos θ and sin θ.\n\n**Figure\
    \ 11.18:** Vertically stacked plots.\n\n## 11.4 Introduction to Data Analysis\
    \ with pandas\n\nOne of the most heavily used tools in Python data science is\
    \ *pandas*, a powerful library for analyzing data. In essence, pandas (from \"\
    **panel data**\") lets us perform many of the same tasks as a spreadsheet or Structured\
    \ Query Language (SQL), only with the power and flexibility of a full-strength,\
    \ general-purpose programming language under the hood (Figure 11.19¹⁶).\n\n**Figure\
    \ 11.19:** Pandas are famous for their love of bamboo and their remarkable aptitude\
    \ for data science.\n\nThe pandas interface can take some getting used to, and\
    \ there's no substitute for seeing lots of examples. Thus, this chapter covers\
    \ three cases of increasing sophistication, starting with simplified handcrafted\
    \ examples (Section 11.4.1) and then showing more complex analysis techniques\
    \ using two real-world datasets: Nobel Prizes (Section 11.5) and survival rates\
    \ from *Titanic* (Section 11.6). (The second of these datasets will also serve\
    \ as our main source of examples on machine learning in Section 11.7.)\n\nIn addition,\
    \ there's *really* no substitute for asking and answering questions for yourself.\
    \ In my experience, following tutorials such as this one can give you a great\
    \ start, and often yields easy-looking results like Figure 11.20. But the minute\
    \ you deviate even a millimeter from carefully chosen examples and try to answer\
    \ something for yourself, you end up with things that look like Figure 11.21.\n\
    \n16. Image courtesy of San Hoyano/Shutterstock."
  mdcn: "## 11.3.2 散点图\n\n*图表*和*直方图*。如果一开始不能完全理解，也不必担心；我们将在第11.5节、第11.6节和第11.7节中有大量机会看到散点图和直方图的更多示例。\n\
    \n散点图只是将一系列离散的函数值绘制在对应的点上，这是整体感知函数值可能满足何种关系的好方法。让我们看一个具体的例子来理解其含义。\n\n我们将首先从*标准正态*分布¹⁴中生成一些随机点，这是一种平均值（均值）为0、离散度（标准差）为1的正态分布（或“钟形曲线”）。¹⁵\
    \ 我们可以使用\n\n14. 其他分布并无“不正常”之处；使用“正态”一词在很大程度上是历史沿袭的特殊用法。\n\n15. 标准正态分布的函数形式由概率密度\
    \ $P(x) = \\frac{1}{\\sqrt{\\tau}} e^{-\\frac{1}{2}x^2}$ 给出，其中 $1/\\sqrt{\\tau}\
    \ = 1/\\sqrt{2\\pi}$ 是一个归一化因子，用于确保总概率 $\\int_{-\\infty}^{\\infty} P(x) dx$ 等于1。对于均值为\
    \ $\\mu$、标准差为 $\\sigma$ 的一般正态分布，其密度函数为 $P(x; \\mu, \\sigma) = \\frac{1}{\\sigma\\\
    sqrt{\\tau}} e^{-\\frac{1}{2}\\left(\\frac{x-\\mu}{\\sigma}\\right)^2}$；令 $\\\
    mu = 0$ 和 $\\sigma = 1$ 即可得到标准正态分布。\n\nNumPy的**random**库来获取这些值，该库包含一个名为**default_rng()**的默认随机数生成器（代码清单11.9）。\n\
    \n### 代码清单11.9：使用标准正态分布生成随机值。\n\n```python\n>>> from numpy.random import default_rng\n\
    >>> rng = default_rng()\n>>> n_pts = 50\n>>> x = rng.standard_normal(n_pts)\n\
    >>> x\narray([ 0.41256003,  0.67594205,  1.264653  ,  1.16351491, -0.41594407,\n\
    \       -0.60157015,  0.84889823, -0.59984223,  0.24374326,  0.06055498,\n   \
    \    -0.48512829,  1.02253594, -1.10982933, -0.40609179,  0.55076245,\n      \
    \  0.13046238,  0.86712869,  0.06139358, -2.26538163,  1.45785923,\n       -0.56220574,\
    \ -1.38775239, -2.39643977, -0.77498392,  1.16794796,\n       -0.6588802 ,  1.66343434,\
    \  1.57475219, -0.03374501, -0.62757059,\n       -0.99378175,  0.69259747, -1.04555996,\
    \  0.62653116, -0.9042063 ,\n       -0.32565268, -0.99762804, -0.4270288 ,  0.69940045,\
    \ -0.46574267,\n        1.82225132,  0.23925201, -1.0443741 , -0.54779683,  1.17466477,\n\
    \       -2.54906663, -0.31495622,  0.25224765, -1.20869217, -1.02737145])\n```\n\
    \n（你可能会在网上教程示例中看到类似**random.standard_normal(50)**的代码，但这种变体现已弃用，代码清单11.9中展示的技术是当前使用NumPy生成随机值的首选方法。）\n\
    \n有了这些*x*值，我们通过添加5倍*x*的常数倍（斜率）加上另一个随机因子来创建一组*y*值：\n\n```python\n>>> y = 5*x +\
    \ rng.standard_normal(n_pts)\n```\n\n这大致遵循直线方程*y = mx + b*的模式，只是*x*和*b*使用了随机值。由于*y*的函数形式本质上是线性的，*y*对*x*的图应该大致像一条直线，我们可以通过散点图确认如下：\n\
    \n**图11.15：一个Matplotlib散点图。**\n\n```python\n>>> fig, ax = plt.subplots()\n>>>\
    \ ax.scatter(x, y)\n>>> plt.show()\n```\n\n如图11.15所示，我们的猜测是正确的。（因为我们没有为随机数生成器设置特定的种子值，所以你的具体结果会有所不同。）\n\
    \n## 11.3.3 直方图\n\n最后，让我们应用第11.3.2节中的一些相同思想，来可视化从标准正态分布中抽取的1000个随机值的分布：\n\n```python\n\
    >>> values = rng.standard_normal(1000)\n```\n\n了解这些值外观的一种常见方法是创建固定数量的“箱”，并绘制每个箱中有多少值。由此产生的图称为*直方图*，可以使用Matplotlib的`hist()`方法自动生成：\n\
    \n**图11.16：** 正态分布随机值的直方图。\n\n```python\n>>> fig, ax = plt.subplots()\n>>> ax.hist(values)\n\
    >>> plt.show()\n```\n\n结果是对“钟形曲线”的良好近似，如图11.16所示。\n\n默认的箱数是**10**，但我们可以通过向**hist()**传递一个**bins**参数来研究不同箱大小的结果，例如**bins=20**：\n\
    \n```python\n>>> fig, ax = plt.subplots()\n>>> ax.hist(values, bins=20)\n>>> plt.show()\n\
    ```\n\n在这种情况下，结果是分布的更细粒度版本（图11.17）。\n\n由于Matplotlib是一个通用的绘图和数据可视化系统，你可以用它做的事情几乎无穷无尽。虽然我们现在已经涵盖了本教程其余部分所需的基础知识，但我鼓励你进一步探索，Matplotlib文档是一个很好的起点。\n\
    \n**图11.17：** 图11.16的重新分箱版本。\n\n## 11.3.4 练习\n\n- 1. 为图11.15中显示的图添加标题和坐标轴标签。\n\
    - 2. 为第11.3.3节中的直方图添加标题。\n- 3. 一个常见的绘图任务是在同一图形中包含多个子图。证明代码清单11.10创建了垂直堆叠的子图，如图11.18所示。（这里的`suptitle()`方法生成一个位于两个图上方的“总标题”。有关创建多个子图的其他方法，请参阅Matplotlib关于子图的文档。）\n\
    - 4. 在图11.14的图中添加函数cos(x − τ/8)的图，颜色为“orange”，线型为“dashdot”。*额外加分：* 同时添加注释。（额外加分步骤在交互式Jupyter笔记本中*容易得多*，尤其是在为注释标签和箭头找到正确坐标时。）\n\
    \n### 代码清单11.10：堆叠子图。\n\n```python\n>>> x = np.linspace(0, tau, 100)\n>>> fig,\
    \ (ax1, ax2) = plt.subplots(2)\n>>> fig.suptitle(r\"Vertically stacked plots of\
    \ $\\cos\\theta$ and $\\sin\\theta$.\")\n>>> ax1.plot(x, np.cos(x))\n>>> ax2.plot(x,\
    \ np.sin(x))\n```\n\ncos θ 和 sin θ 的垂直堆叠图。\n\n**图11.18：** 垂直堆叠图。\n\n## 11.4 使用pandas进行数据分析简介\n\
    \nPython数据科学中使用最频繁的工具之一是*pandas*，一个用于分析数据的强大库。本质上，pandas（源自“**面板数据**”）让我们能够执行许多与电子表格或结构化查询语言（SQL）相同的任务，只是底层拥有全功能通用编程语言的强大和灵活性（图11.19¹⁶）。\n\
    \n**图11.19：** 熊猫以其对竹子的喜爱和在数据科学方面的卓越才能而闻名。\n\npandas的界面可能需要一些时间来适应，没有比看大量示例更好的替代方法了。因此，本章涵盖了三个复杂度递增的案例，从简化的手工示例（第11.4.1节）开始，然后展示使用两个真实世界数据集的更复杂分析技术：诺贝尔奖（第11.5节）和*泰坦尼克号*的存活率（第11.6节）。（第二个数据集也将作为我们在第11.7节中关于机器学习的主要示例来源。）\n\
    \n此外，*真的*没有比自己提问和回答问题更好的替代方法了。根据我的经验，遵循像本教程这样的教程可以给你一个很好的开始，并且通常会产生像图11.20这样看起来简单易得的结果。但只要你偏离精心挑选的示例哪怕一毫米，试图自己回答一些问题，你最终得到的东西就会像图11.21。\n\
    \n16. 图片由San Hoyano/Shutterstock提供。"
