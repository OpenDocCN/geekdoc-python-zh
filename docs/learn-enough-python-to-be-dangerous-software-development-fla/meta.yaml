    \ this:\n\n```\n>>> nobel[\"born\"] = pd.to_datetime(nobel[\"born\"], errors=\"\
    coerce\")\n>>> nobel[\"died\"] = pd.to_datetime(nobel[\"died\"], errors=\"coerce\"\
    )\n```\n\nNow we can double-check the value for the Institute of International\
    \ Law:\n\n```\n>>> nobel.iloc[465].born\nNaT\n```\n\nSo the coercion converted\
    \ the invalid date to Not a Time, which is perfect for our purposes because such\
    \ values are ignored automatically when plotting histograms.\n\nAt this point,\
    \ we're ready to calculate the laureates' lifespans by subtracting datetimes and\
    \ dividing by NumPy's magic time delta:\n\n```\n>>> nobel[\"lifespan\"] = (nobel[\"\
    died\"] - nobel[\"born\"])/np.timedelta64(1, \"Y\")\n```\n\nNote that this dynamically\
    \ creates a new \"lifespan\" column in our nobel DataFrame. We can do a reality\
    \ check by making sure we've replicated the calculation we did for Bethe:"
  - '[PAGE 396]


    ```

    >>> bethe = nobel.loc[nobel["surname"] == "Bethe"]

    >>> bethe["lifespan"]

    88    98.679644

    ```


    So Hans Bethe''s lifespan checks out from our previous calculation.

    We''re now finally ready to make the histogram. With all the work we''ve done,
    it''s as simple as calling **hist()** with the **"lifespan"** column (Listing
    11.17).


    **Listing 11.17:** The code to make a lifespan histogram.


    ```

    >>> nobel.hist(column="lifespan")

    array([[<AxesSubplot:title={''center'':''lifespan''}>]], dtype=object)

    >>> plt.show()

    ```


    The result appears in Figure 11.27. As expected from the research on the subject,
    the lifespans of the Nobel laureates are skewed toward the upper end of the usual
    range.


    ![](img/b3303452eae4d7974600cd38b159398e_396_0.png)


    **Figure 11.27:** A histogram of Nobel laureates'' lifespans.'
