  md: 'The resulting **doc** variable is a Beautiful Soup document, in this case with
    two paragraphs, one of which contains a **sup** (superscript) tag with CSS class
    **reference**.


    Beautiful Soup documents can be manipulated in any number of ways. My favorite
    method for selecting elements is **find_all**, which lets us pull out HTML tags
    (beautiful soup select html tag) using an intuitive syntax. For example:


    ```

    >>> doc.find_all("p")

    [<p>lorem<sup class="reference">1</sup></p>, <p>ipsum</p>]

    ```


    This operation is so common that it''s the default when we pass an argument directly
    to a document object:


    ```

    >>> doc("p")

    [<p>lorem<sup class="reference">1</sup></p>, <p>ipsum</p>]

    >>> len(doc("p"))

    2

    >>> doc("p")[0].text

    ''lorem1''

    ```


    We see from the final line that we can get the text of a particular result using
    the **text** property, which in this case includes the reference number **1**.
    Meanwhile, we can grab the elements (in this case, only one) with a "**reference**"
    class using the **class_** option:⁸


    ```

    >>> doc("sup", class_="reference")

    [<sup class="reference">1</sup>]

    >>> len(doc("sup", class_="reference"))

    1

    ```


    Perhaps you can see where we''re going with this. We''re now in a position to
    parse an HTML document and select all the paragraphs and all the references (assuming,
    of course, they have class **reference**). All we need now is a way to *remove*
    the references from the document. As it happens, this is not hard at all using
    the **decompose()** method (beautiful soup remove element), as seen in Listing
    9.13.


