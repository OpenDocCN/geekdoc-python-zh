- md: '## Chapter 11: Data Science


    As noted in the introduction, I also highly recommend using Jupyter (pronounced
    “Jupiter”, like the planet or Roman god),³, which provides a *notebook interface*
    to a version of Python, typically a powerful variant known as *IPython* (Interactive
    Python). Notebooks consist of *cells* where you can type and execute code, seeing
    the results interactively (much like the REPL), which is especially convenient
    for visualizing plots. (Also like the REPL, Jupyter notebooks are often a good
    first step toward self-contained Python programs like the ones discussed in previous
    chapters.) After a while, your notebook might look something like Figure 11.1.


    I suggest installing and using Jupyter via *JupyterLab*, which conveniently wraps
    multiple Jupyter notebooks and is also the interface recommended by the Jupyter
    project itself:


    > 3. The name is a reference to the three main languages supported by the notebook
    interface: Julia, Python, and R.


    ## 11.1 Data Science Setup


    ```

    (venv) $ pip install jupyterlab==3.4.8

    ```


    JupyterLab can be started using the following command:⁴


    ```

    (venv) $ jupyter-lab

    ```


    The result of this is a Jupyter server running on the local system, typically
    at the address http://localhost:8889/lab (though details may differ). On my system,
    the **jupyter-lab** command automatically spawns a new browser window, with a
    directory tree and an interface for creating a new notebook (Figure 11.2).


    **Figure 11.2:** A directory tree and interface for creating a new notebook.


    > 4. It is unclear why the library and package are JupyterLab and **jupyterlab**
    (no hyphen) while the command-line command is **jupyter-lab** (with a hyphen),
    but that''s the way it is.


    **Figure 11.3:** The “classic” Jupyter interface.


    You may also sometimes encounter the “classic” Jupyter interface, which comes
    from installing the **jupyter** package by itself and running **jupyter notebook**
    at the command line (Figure 11.3).


    Each Jupyter notebook runs inside an ordinary web browser and consists of cells
    of Python code that can be executed using the graphical user interface or (more
    conveniently) the keyboard shortcut Shift-Return.⁵ On my system, Jupyter launches
    in whatever directory I happen to run the **jupyter-lab** command in, though this
    behavior may be system-dependent.


    By the way, Jupyter doesn’t autoload modules by default, which can be annoying.
    The following code can be used to change this default behavior:


    ```

    python

    %load_ext autoreload

    %autoreload 2

    ```


    > 5. Users of *Mathematica*, from which Jupyter draws heavy inspiration, will
    find this notebook interface especially familiar.


    Throughout the rest of this chapter, we''ll mainly be using examples from the
    Python prompt because I don''t want to assume you''ve installed Jupyter.⁶ That
    being said, I strongly recommend installing and learning Jupyter at some point
    since it is a standard tool in Python data analysis and scientific computing.
    In particular, Jupyter can be used on the cloud IDE recommended in *Learn Enough
    Dev Environment to Be Dangerous* (https://www.learnenough.com/dev-environment)
    by following the steps in Box 11.1. Another option is CoCalc, a commercial service
