    To get started, we''ll add **pytest** as we did in Section 8.1:


    ```

    (venv) $ pip install pytest==7.1.3

    ```


    (By design, our tests will be as simple as possible; for more sophisticated tests,
    see the pytest-flask project (https://pytest-flask.readthedocs.io/en/latest/index.html).)

    In order to get our tests to work, we have to install our app locally as an editable
    Python package. Without the installation, you''ll probably get an error that looks
    like this:


    ```

    E   ModuleNotFoundError: No module named ''palindrome_detector''

    ```


    To prevent this, run the same command as in Listing 8.18, shown again in Listing
    10.16.


    **Listing 10.16:** Installing the app as an editable package.


    ```

    $ pip install -e .

    ```


    We''ll put the tests themselves in a **tests** directory, with one test file to
    start:


    ```

    (venv) $ mkdir tests

    (venv) $ touch tests/test_site_pages.py

    ```


    We''ll add a second test file in Section 10.5.1.

    Our key tool in writing tests for our web app is the **client** object, which
    has a **get()** method that issues a GET request to a URL, thereby simulating
    visiting the corresponding page in a web browser. The result of such a request
    is a **response** object, which has a variety of useful attributes, including
    **status_code** (indicating the HTTP response code returned by the request) and
    **text** (which contains the text of the HTML returned by our application). We
    can define such a **client** object in the standard configuration file **conftest.py**:


    ```

    (venv) $ touch tests/conftest.py

    ```


    The code itself appears in Listing 10.17. (As with the rest of the configuration
    code in this chapter, Listing 10.17 is simply adapted from the Flask documentation.)'
- md: "## Listing 10.17: Creating the client object.\n\ntests/conftest.py\n\n```python\n\
    import pytest\n\nfrom palindrome_detector import create_app\n\n@pytest.fixture\n\
    def app():\n    return create_app()\n\n@pytest.fixture\ndef client(app):\n   \
    \ return app.test_client()\n```\n\nWe'll start with super-basic tests making sure\
    \ that the app serves up *something*, as indicated by the response code 200 (OK),\
    \ which we can do like this:\n\n```python\ndef test_index(client):\n    response\
    \ = client.get(\"/\")\n    assert response.status_code == 200\n```\n\nHere we\
    \ use the `get()` method in the test to issue a GET request to the root URL /,\
    \ verifying using the `assert` function introduced in Chapter 8 that the code\
    \ is correct.\n\nApplying the above discussion to the About and Palindrome Detector\
    \ pages as well, we arrive at our initial test suite, shown in Listing 10.18.\n\
    \n## Listing 10.18: Our initial test suite. GREEN\n\ntests/test_site_pages.py\n\
    \n```python\ndef test_index(client):\n    response = client.get(\"/\")\n    assert\
    \ response.status_code == 200\n\ndef test_about(client):\n    response = client.get(\"\
    /about\")\n    assert response.status_code == 200\n\ndef test_palindrome(client):\n\
    \    response = client.get(\"/palindrome\")\n    assert response.status_code ==\
    \ 200\n```\n\nBecause the tests in Listing 10.18 are for code that's already working,\
    \ the test suite should be GREEN:\n\n```\nListing 10.19: GREEN\n(venv) $ pytest\n\
    ============================= test session starts =============================\n\
    collected 3 items\ntests/test_site_pages.py ...                              \
    \                [100%]\n============================== 3 passed in 0.01s ================================\n\
    ```\n\nThe tests in Listing 10.18 are a fine start, but they really only check\
    \ if the pages are there at all. It would be nice to have a slightly more stringent\
    \ test of the HTML content, though not *too* stringent—we don't want our tests\
    \ to make it hard to make changes in the future. As a middle ground, we'll check\
    \ that each page in the site has a **title** tag and an **h1** tag somewhere in\
    \ the document.\n\nAlthough more sophisticated techniques are certainly possible,⁴\
    \ we'll take the simplest approach that works and apply the **in** operator introduced\
    \ in Section 2.5 to the **response.text** attribute. For example, to check for\
    \ a **<title>** tag, we can use this:⁵\n\n```python\nassert \"<title>\" in response.text\n\
    ```\n\nAdding such code for both **title** and **h1** tags to the test for each\
    \ page in our site yields the updated test suite shown in Listing 10.20.\n\n##\
    \ Listing 10.20: Adding assertions for the presence of some HTML tags. GREEN\n\
    \ntests/test_site_pages.py\n\n```python\ndef test_index(client):\n    response\
    \ = client.get(\"/\")\n    assert response.status_code == 200\n    assert \"<title>\"\
    \ in response.text\n    assert \"<h1>\" in response.text\n\ndef test_about(client):\n\
    \    response = client.get(\"/about\")\n    assert response.status_code == 200\n\
    \    assert \"<title>\" in response.text\n    assert \"<h1>\" in response.text\n\
    \ndef test_palindrome(client):\n    response = client.get(\"/palindrome\")\n \
    \   assert response.status_code == 200\n    assert \"<title>\" in response.text\n\
    \    assert \"<h1>\" in response.text\n```\n\nBy the way, some programmers adopt\
    \ the convention of only ever having one assertion per test, whereas in Listing\
    \ 10.20 we have two. In my experience, the overhead associated with setting up\
    \ the right state (e.g., duplicating the calls to `get()`) makes this convention\
    \ inconvenient, and I've never run into any trouble from including multiple assertions\
    \ in a test.\n\nThe tests in Listing 10.20 should now be GREEN as required:\n\n\
    ## Listing 10.21: GREEN\n\n```\n(venv) $ pytest\n=============================\
    \ test session starts =============================\ncollected 3 items\n\ntests/test_site_pages.py\
    \ ...                                               [100%]\n\n==============================\
    \ 3 passed in 0.01s ================================\n```\n\nAt this point, we're\
