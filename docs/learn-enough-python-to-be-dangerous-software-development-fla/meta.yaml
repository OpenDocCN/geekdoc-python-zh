    \ first performed a moonwalk in 1972\n5. Michael Jackson first performed a moonwalk\
    \ in 1983\n```\n\n## 4.5 应用：唯一词\n\n让我们将第 4.4 节的字典知识应用于一个具有挑战性的练习，这是我们迄今为止最长的程序。我们的任务是从一段相当长的文本中提取所有唯一的单词，并统计每个单词出现的次数。\n\
    \n由于命令序列相当广泛，我们的主要工具将是一个 Python 文件（第 1.3 节），使用 `python3` 命令执行。（我们不打算像第 1.4 节那样将其做成一个独立的\
    \ shell 脚本，因为我们不打算将其作为通用实用程序。）在每个阶段，如果你对某个命令的效果有任何疑问，我建议使用 Python 交互式执行代码。\n\n\
    让我们从创建文件开始：\n\n```\n(venv) $ touch count.py\n```\n\n现在用一个包含文本的字符串填充它，我们选择莎士比亚的十四行诗\
    \ 116⁸（图 4.9⁹），它借鉴自清单 4.6，并在清单 4.10 中再次展示。\n\n8.  注意，在莎士比亚时代使用的原始发音中，像 \"love\"\
    \ 和 \"remove\" 这样的词是押韵的，\"come\" 和 \"doom\" 也是如此。\n9.  图片由 Psychoshadowmaker/123RF\
    \ 提供。\n\n![](img/b3303452eae4d7974600cd38b159398e_136_0.png)\n\n**图 4.9：** 十四行诗\
    \ 116 将爱情的恒久比作迷途船只的导航星。\n\n### 清单 4.10：添加一些文本。\n\n*count.py*\n\n```\npython\n\
    import re\n\nsonnet = \"\"\"Let me not to the marriage of true minds\nAdmit impediments.\
    \ Love is not love\nWhich alters when it alteration finds,\nOr bends with the\
    \ remover to remove.\nO no, it is an ever-fixed mark\nThat looks on tempests and\
    \ is never shaken\nIt is the star to every wand'ring bark,\nWhose worth's unknown,\
    \ although his height be taken.\nLove's not time's fool, though rosy lips and\
    \ cheeks\nWithin his bending sickle's compass come:\nLove alters not with his\
    \ brief hours and weeks,\nBut bears it out even to the edge of doom.\n    If this\
    \ be error and upon me proved,\n    I never writ, nor no man ever loved.\"\"\"\
    \n```\n\n我们的计划是使用一个名为 **uniques** 的字典，其键等于唯一的单词，值等于在文本中出现的次数：\n\n```\nuniques\
    \ = {}\n```\n\n出于本练习的目的，我们将“单词”定义为一个或多个*单词字符*（即字母或数字，尽管当前文本中没有后者）的序列。这种匹配可以通过正则表达式（第\
    \ 4.3 节）来完成，其中包含一个模式 (\\w) 正好用于这种情况（图 4.5）：\n\n```\nwords = re.findall(r\"\\w+\"\
    , sonnet)\n```\n\n这使用了第 4.3 节中的 **findall()** 方法，返回一个包含所有匹配“一个或多个连续单词字符”的字符串列表。（将此模式扩展以包含撇号（以便它也能匹配，例如，“wand'ring”）留作练习（第\
    \ 4.5.1 节）。）\n\n此时，文件应如清单 4.11 所示。\n\n### 清单 4.11：添加对象和匹配的单词。\n\n*count.py*\n\n\
    ```\nimport re\n\nsonnet = \"\"\"Let me not to the marriage of true minds\nAdmit\
    \ impediments. Love is not love\nWhich alters when it alteration finds,\nOr bends\
    \ with the remover to remove.\nO no, it is an ever-fixed mark\nThat looks on tempests\
    \ and is never shaken\nIt is the star to every wand'ring bark,\nWhose worth's\
    \ unknown, although his height be taken.\nLove's not time's fool, though rosy\
    \ lips and cheeks\nWithin his bending sickle's compass come:\nLove alters not\
    \ with his brief hours and weeks,\nBut bears it out even to the edge of doom.\n\
    \    If this be error and upon me proved,\n    I never writ, nor no man ever loved.\"\
    \"\"\n\nuniques = {}\nwords = re.findall(r\"\\w+\", sonnet)\n```\n\n现在进入程序的核心。我们将遍历\
    \ **words** 列表并执行以下操作：\n\n1.  如果该单词在 **uniques** 对象中已有条目，则将其计数增加 **1**。\n2.  如果该单词在\
    \ **uniques** 中尚无条目，则将其初始化为 **1**。\n\n结果，使用我们在第 4.3 节简要介绍的 `+=` 运算符，如下所示：\n\n\
    ```\nfor word in words:\n    if word in uniques:\n        uniques[word] += 1\n\
