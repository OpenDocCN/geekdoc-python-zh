    \ multiple (the slope) of 5 times *x* plus another random factor:\n\n```\n>>>\
    \ y = 5*x + rng.standard_normal(n_pts)\n```\n\nThis broadly follows the pattern\
    \ of the equation for a line, *y = mx + b*, only with random values for *x* and\
    \ *b*. Because the functional form of *y* is essentially linear, a plot of *y*\
    \ vs. *x* should look roughly like a line, which we can confirm with a scatter\
    \ plot as follows:\n\n$\\int_{-\\infty}^{\\infty} P(x) dx$ is equal to 1. The\
    \ density function for a general normal distribution with mean $\\mu$ and standard\
    \ deviation $\\sigma$ is $P(x; \\mu, \\sigma) = \\frac{1}{\\sigma\\sqrt{\\tau}}\
    \ e^{-\\frac{1}{2}\\left(\\frac{x-\\mu}{\\sigma}\\right)^2}$; setting $\\mu =\
