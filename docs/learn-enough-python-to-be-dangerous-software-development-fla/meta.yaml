    \ index=[\"a\", \"b\", \"c\", \"d\", \"e\"])\n>>> s\na    0.770407\nb   -0.698040\n\
    c    1.977234\nd   -1.559065\ne   -0.713496\ndtype: float64\n```\n\nSeries act\
    \ both like NumPy ndarrays and like regular Python dictionaries:\n\n```python\n\
