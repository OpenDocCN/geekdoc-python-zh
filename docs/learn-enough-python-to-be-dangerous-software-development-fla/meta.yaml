    \ 2.1³）：\n\n```python\n>>> 'It's not easy being green'\n  File \"<stdin>\", line\
    \ 1\n    'It's not easy being green'\n          ^\nSyntaxError: invalid syntax\n\
    ```\n\n![img](img/b3303452eae4d7974600cd38b159398e_56_0.png)\n\n**图 2.1：** 有时当\
    \ REPL 生成语法错误时，事情就不那么简单了。\n\n因为 REPL 将 'It' 解释为一个字符串，而最后的 ' 作为第二个字符串的开头，结果就是语法错误。（另一个结果，如上所示，是语法高亮看起来很奇怪——这种副作用通常作为语法错误的视觉提示很有用。）\n\
    \n根据 PEP-8 风格指南，以这种方式包含引号的首选方法是简单地使用另一种引号来定义字符串（代码清单 2.1）。\n\n**代码清单 2.1：** 在双引号内包含单引号。\n\
    \n```python\n>>> \"It's not easy being green\"\n\"It's not easy being green\"\n\
    ```\n\n请注意，这里的 REPL 遵循了与我们相同的惯例，对于包含单引号的字符串切换到双引号。\n\n最后，Python 支持*三引号字符串*，这很不寻常：\n\
    \n```python\n>>> \"\"\"Return the function value.\"\"\"\n'Return the function\
    \ value.'\n```\n\n当它们适合放在一行时，这些字符串的行为与单引号和双引号字符串完全一样，但我们也可以在其中添加换行符：\n\n```python\n\
    >>> \"\"\"This is a string.\n...\n... We can add newlines inside,\n... which is\
    \ pretty cool.\n... \"\"\"\n'This is a string.\\nWe can add newlines inside,\\\
    nwhich is pretty cool.\\n'\n```\n\n三引号字符串因其在*文档字符串*中的使用而闻名，文档字符串是 Python 函数（第\
    \ 5 章）和类（第 7 章）中使用的特殊文档字符串。因此，它们在 Python 编程中被大量使用。\n\n一般来说，PEP 8 指出，只要保持一致，单引号和双引号字符串都是可以接受的，但三引号字符串应始终使用双引号变体：⁴\n\
    \n> 在 Python 中，单引号字符串和双引号字符串是相同的。本 PEP 不对此提出建议。选择一个规则并坚持下去。但是，当字符串包含单引号或双引号字符时，请使用另一种引号以避免字符串中的反斜杠。这提高了可读性。\n\
    > 对于三引号字符串，始终使用双引号字符以与 PEP 257 中的文档字符串惯例保持一致。\n\n本教程将双引号字符串标准化，以与此三引号惯例保持一致，并与《*Learn\
    \ Enough JavaScript to Be Dangerous*》(https://www.learnenough.com/javascript)\
    \ 和《*Learn Enough Ruby to Be Dangerous*》(https://www.learnenough.com/ruby) 中使用的惯例相匹配，但当然，如果您愿意，您可以自由选择相反的惯例。\n\
    \n### 2.1.1 练习\n\n1.  确认我们可以使用反斜杠转义引号，例如 `'It\\'s not easy being green'`。如果字符串同时包含单引号和双引号（在这种情况下，代码清单\
    \ 2.1 中的技巧不起作用），这会很方便。REPL 如何处理 `'It\\'s not \"easy\" being green'`？\n2.  Python\
    \ 支持常见的特殊字符，如制表符 (`\\t`) 和换行符 (`\\n`)，它们是两种不同形式的所谓*空白字符*。证明 `\\t` 和 `\\n` 在单引号和双引号字符串内都被解释为特殊字符。如果在其中一个字符串前加上字母\
    \ `r` 会发生什么？*提示：* 在 REPL 中，尝试执行如代码清单 2.2 所示的命令。我们将在第 2.2.2 节中了解更多关于特殊 `r` 行为的信息。\n\
    \n**代码清单 2.2：** 一些包含特殊字符的字符串。\n\n```python\n>>> print('hello\\tgoodbye')\n>>>\
    \ print('hello\\ngoodbye')\n>>> print(\"hello\\tgoodbye\")\n>>> print(\"hello\\\
    ngoodbye\")\n>>> print(r\"hello\\ngoodbye\")\n```\n\n## 2.2 连接和插值\n\n两个最重要的字符串操作是*连接*（将字符串连接在一起）和*插值*（将变量内容放入字符串中）。我们将从连接开始，可以使用\
    \ + 运算符完成：⁵\n\n```python\n(venv) $ python3\n>>> \"foo\" + \"bar\"            #\
    \ 字符串连接\n'foobar'\n>>> \"ant\" + \"bat\" + \"cat\"    # 多个字符串可以一次连接。\n'antbatcat'\n\
    ```\n\n这里计算 \"**foo**\" 加 \"**bar**\" 的结果是字符串 \"**foobar**\"。（奇怪的名字“foo”和“bar”的含义在《*Learn\
    \ Enough Command Line to Be Dangerous*》(https://www.learnenough.com/command-line)\
    \ 中进行了讨论 (https://www.learnenough.com/command-line-tutorial/manipulating_files#aside-foo_bar)。）还要注意*注释*，使用井号\
    \ # 表示，您可以自由忽略它们，Python 在任何情况下都会忽略它们。\n\n让我们在*变量*的背景下再次查看字符串连接，您可以将变量视为包含某些值的命名框（如《*Learn\
    \ Enough CSS & Layout to Be Dangerous*》(https://www.learnenough.com/css-and-layout)\
    \ 中提到的 (https://www.learnenough.com/css-and-layout-tutorial/templates_and_frontmatter#aside-variable)，并在框\
    \ 2.1 中进一步讨论）。\n\n> **框 2.1：变量和标识符**\n>\n> 如果您以前从未编写过计算机程序，您可能不熟悉**变量**这个术语，这是计算机科学中的一个基本概念。您可以将变量视为一个可以容纳不同（或“可变”）内容的命名框。\n\
    >\n> 作为一个具体的类比，考虑许多小学为学生提供的用于存放衣物、书籍、背包等的带标签的盒子（图 2.2⁶）。变量是盒子的位置，盒子的标签是变量名（也称为*标识符*），盒子的内容是变量值。\n\
    >\n> 在实践中，这些不同的定义经常被混淆，“变量”通常用于这三个概念（位置、标签或值）中的任何一个。\n\n![img](img/b3303452eae4d7974600cd38b159398e_60_0.png)\n\
    \n**图 2.2：** 计算机变量的具体体现。\n\n作为一个具体的例子，我们可以使用 = 号为名字和姓氏创建变量，如代码清单 2.3 所示。\n\n**代码清单\
    \ 2.3：** 使用 = 赋值变量。\n\n```python\n>>> first_name = \"Michael\"\n>>> last_name\
    \ = \"Hartl\"\n```\n\n这里 = 将标识符 **first_name** 与字符串 \"**Michael**\" 关联起来，将标识符\
    \ **last_name** 与字符串 \"**Hartl**\" 关联起来。\n\n代码清单 2.3 中的标识符 **first_name** 和 **last_name**\
    \ 采用所谓的蛇形命名法（snake case），^7 其名称起源模糊，但可能是 Python 变量名最常见的惯例（图 2.3^8）。（相比之下，Python\
    \ 类使用驼峰命名法（CamelCase），这在第 7 章中有更详细的描述。）\n\n---\n*脚注：*\n2.  这与 Ruby 形成对比，Ruby 使用单引号字符串作为*原始字符串*；如第\
    \ 2.2.2 节所述，Python 的惯例是在前面加上字母 r。\n3.  图片由 LorraineHudgins/Shutterstock 提供。\n\
    4.  这里的术语是标准的，但有点混乱：“单引号”和“双引号”指的是字符本身的引号数量（' 与 \"），而“三引号”指的是定义字符串时每侧使用的此类字符的数量（\"\
    \"\"...\")。\n5.  这种使用 + 进行字符串连接的方式在编程语言中很常见，但从某一方面来说，这是一个不幸的选择，因为加法是数学中典型的交换运算：*a\
    \ + b = b + a*。（相比之下，乘法在某些情况下是非交换的；例如，当矩阵相乘时，通常 *AB ≠ BA*。）然而，在字符串连接的情况下，+ 绝对*不是*一个交换运算，因为，例如，\"\
    **foo**\" + \"**bar**\" 是 \"**foobar**\"，而 \"**bar**\" + \"**foo**\" 是 \"**barfoo**\"\
    。部分出于这个原因，一些语言（如 PHP）使用不同的符号进行连接，例如点 .（产生 \"**foo**\" . \"**bar**\"）。\n6.  图片由\
    \ Africa Studio/Shutterstock 提供。\n7.  特别是，“蛇形命名法”并不是指 Python 本身；蛇形命名变量名在名称与蛇无关的语言中很常见，例如\
    \ C、Perl、PHP、JavaScript 和 Ruby。\n8.  图片由 rafaelbenari/123RF 提供。"
