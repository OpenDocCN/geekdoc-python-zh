  mdcn: "## 11.5 pandas 示例：诺贝尔奖得主\n\n![](img/b3303452eae4d7974600cd38b159398e_386_0.png)\n\
    \n**图 11.24：** 作者与诺贝尔奖得主基普·索恩和斯蒂芬·霍金。\n\n基普在 DataFrame 中的条目情况相同。基普的中间名首字母是\"S.\"\
    （代表斯蒂芬），所以让我们在比较中包含它：\n\n```\n>>> nobel.loc[nobel[\"firstname\"] == \"Kip S.\"\
    ]\n    id firstname surname  ...                     name city country\n916  943\
    \    Kip S.  Thorne  ...  LIGO/VIRGO Collaboration  NaN     NaN\n```\n\n找到了。现在我们可以像查找费曼的条目一样查找年份：\n\
    \n```\n>>> nobel.loc[nobel[\"firstname\"] == \"Kip S.\"].year\n2017\n```\n\n但如果我们碰巧不知道基普的中间名首字母（并且没想到去维查维基百科）呢？如果能搜索所有名字中包含字符串\"\
    Kip\"的记录就好了。我们可以使用 **Series.str** 来实现，它允许我们对 Series 使用字符串函数，再结合 **contains()**\
    \ 来搜索子字符串（代码清单 11.14）。\n\n### 代码清单 11.14：通过子字符串查找记录。\n\n```\n>>> nobel.loc[nobel[\"\
    firstname\"].str.contains(\"Kip\")]\n    id firstname surname ...            \
    \    name city country\n916  943    Kip S.  Thorne ...  LIGO/VIRGO Collaboration\
    \  NaN     NaN\n```\n\n也许并不令人惊讶，由于这是一个相当罕见的名字，数据集中只有一个\"Kip\"。那还有其他姓费曼的吗？我们可以尝试用\
    \ **\"surname\"** 代替 **\"firstname\"**：\n\n```\n>>> nobel.loc[nobel[\"surname\"\
    ].str.contains(\"Feynman\")]\nValueError: Cannot mask with non-boolean array containing\
    \ NA / NaN values\n```\n\n哎呀，我们得到了一个错误。这是因为诺贝尔和平奖获奖组织中存在大量 NaN 值：\n\n```\n>>>\
    \ nobel.loc[nobel[\"surname\"].isnull()]\n    id                             \
    \           firstname ... city country\n465  467                     Institute\
    \ of International Law ...  NaN     NaN\n474  477                   Permanent\
    \ International Peace Bureau ...  NaN     NaN\n479  482              International\
    \ Committee of the Red Cross ...  NaN     NaN\n480  482              International\
    \ Committee of the Red Cross ...  NaN     NaN\n.\n```\n\n我们可以通过向 **contains()**\
    \ 传递选项 **na=False** 来过滤掉 NaN 和其他不可用值：\n\n```\n>>> nobel.loc[nobel[\"surname\"\
    ].str.contains(\"Feynman\", na=False)]\n    id  firstname ...          city country\n\
    86  86  Richard P. ...  Pasadena CA     USA\n```\n\n看起来只有一个结果，我们可以通过 **len()**\
    \ 来确认：\n\n```\n>>> len(nobel.loc[nobel[\"surname\"].str.contains(\"Feynman\",\
    \ na=False)])\n1\n```\n\n尽管只有一位名叫“费曼”的诺贝尔奖得主，但众所周知，有好几位姓“居里”的得主，如代码清单 11.15 所示。\n\
    \n### 代码清单 11.15：在 `laureates.csv` 数据集中查找居里。\n\n```\n>>> curies = nobel.loc[nobel[\"\
    surname\"].str.contains(\"Curie\", na=False)]\n>>> curies\n   id firstname  ...\
    \    city country\n4   5    Pierre  ...   Paris   France\n5   6     Marie  ...\
    \     NaN      NaN\n6   6     Marie  ...   Paris   France\n191 194    Irène  ...\
    \   Paris   France\n```\n\n这里我们将结果赋值给变量 `curies` 以方便使用。例如，我们可以如下获取每位居里奖得主的名字和姓氏：\n\
    \n```\n>>> curies[[\"firstname\", \"surname\"]]\n4    Pierre           Curie\n\
    5     Marie           Curie\n6     Marie           Curie\n191    Irène  Joliot-Curie\n\
    ```\n\n我们看到玛丽·居里（也被称为玛丽亚·斯克沃多夫斯卡-居里）<sup>22</sup>获得了两次诺贝尔奖（图 11.25<sup>23</sup>）。其他居里奖得主是玛丽的丈夫皮埃尔·居里，以及他们的女儿之一伊雷娜·约里奥-居里。（事实上，在这个成就斐然的居里家族中，甚至还有另一位诺贝尔奖得主；详情请参见第\
    \ 11.5.1 节。）\n\n玛丽亚·斯克沃多夫斯卡-居里是唯一一位因两个不同科学领域获得诺贝尔奖的人。让我们用 pandas 看看是否还有其他多次获得诺贝尔奖的人。研究这个问题的一种方法是使用\
    \ `groupby()` 按姓名对获奖者进行分组，然后使用 `size()` 方法查看每个姓名有多少人：\n\n22. 尽管在英语资料中通常只被称为“玛丽·居里”，但玛丽本人更喜欢使用她名字中的波兰语部分，许多欧洲资料（包括波兰资料）也遵循这一惯例。\n\
    23. 图片由 Morphant Creation/Shutterstock 提供。\n\n![](img/b3303452eae4d7974600cd38b159398e_389_0.png)\n\
    \n图 11.25：玛丽亚·斯克沃多夫斯卡-居里与她的丈夫兼共同获奖者皮埃尔·居里。\n\n```\n>>> nobel.groupby([\"firstname\"\
    , \"surname\"]).size()\nfirstname  surname\nA. Michael  Spence         1\nAage\
    \ N.     Bohr           1\nAaron       Ciechanover    1\n            Klug    \
    \       1\nAbdulrazak  Gurnah         1\n            ..\nYouyou      Tu      \
    \       1\nYuan T.     Lee            1\nYves        Chauvin        1\nZhores\
    \      Alferov        1\nÉlie        Ducommun       1\n```\n\n这里显示的所有值都是 1，但我们可以使用\
    \ sort_values() 对它们进行排序，以找到任何多次获奖者：\n\n```\n>>> nobel.groupby([\"firstname\",\
    \ \"surname\"]).size().sort_values()\nfirstname      surname\nA. Michael     Spence\
    \          1\nNicolay G.     Basov           1\nNiels          Bohr          \
    \  1\nNiels K.       Jerne           1\nNiels Ryberg   Finsen          1\n..\n\
    Élie           Ducommun        1\nLinus          Pauling         2\nJohn     \
    \      Bardeen         2\nFrederick      Sanger          2\nMarie          Curie\
    \           2\n```\n\n这得到了四位多次获奖者。\n\n尽管 **sort_values()** 这个技巧很好，但如果多次获奖者太多，它可能会失败。一种更通用的选择获得超过一次奖项的获奖者的方法是直接使用布尔条件。我们可以通过相同的按大小分组结合条件\
    \ **size > 1** 来实现（代码清单 11.16）。请注意，我们在 **groupby()** 中添加了 **\"id\"**，以考虑（不太可能但有可能）同名不同人都获得诺贝尔奖的情况。\n\
    \n### 代码清单 11.16：查找多次诺贝尔奖得主。\n\n```\n>>> laureates = nobel.groupby([\"id\", \"\
    firstname\", \"surname\"])\n>>> sizes = laureates.size()\n>>> sizes[sizes > 1]\n\
    id    firstname  surname\n6     Marie      Curie          2\n66    John      \
    \ Bardeen        2\n217   Linus      Pauling        2\n222   Frederick  Sanger\
    \         2\n```\n\n从代码清单 11.16 我们可以看到，在构建此数据集时，只有四个人曾获得过不止一次诺贝尔奖：弗雷德里克·桑格（化学奖）、约翰·巴丁（物理学奖）、莱纳斯·鲍林（化学奖与和平奖），当然还有玛丽·居里（物理学奖与化学奖）。（2022\
    \ 年，当 K·巴里·沙普利斯第二次获得诺贝尔化学奖时，出现了第五位多次获奖者。）\n\n## 选择日期\n\npandas 最强大的功能之一是其处理时间和*时间序列*的能力，所以让我们从查看如何选择日期开始。我们可以通过将确切的生日作为字符串来搜索获奖者：\n\
    \n```\n>>> nobel.loc[nobel[\"born\"] == \"1879-03-14\"]\n    id firstname ...\
    \     city  country\n25  26    Albert ...  Berlin  Germany\n```\n\n你可能怀疑一位出生于\
    \ 1879 年的诺贝尔奖得主“阿尔伯特”可能是阿尔伯特·爱因斯坦，你是对的，我们可以通过检查 **\"surname\"** 字段来确认：²⁴\n\n```\n\
    >>> nobel.loc[nobel[\"born\"] == \"1879-03-14\"][\"surname\"]\nEinstein\n```\n\
    \n仔细观察，我们发现爱因斯坦出生于 3 月 14 日，这一天有时被称为圆周率日，因为 03-14（或美国历法系统中的 3/14）与 π ≈ 3.14 的前三位数字相似。圆周率日的爱好者们很快指出这有多棒。\n\
    \n作为圆周率日（https://tauday.com/）的创始人，我自然有兴趣找到一些出生于 06-28（6/28）的伟大诺贝尔奖得主，以匹配 τ ≈ 6.28\
    \ 的前三位数字。我们似乎已经解决了这个通过子字符串搜索的问题（例如，如代码清单 11.14），所以让我们尝试用 **\"born\"** 字段来实现：\n\
    \n```\n>>> nobel.loc[nobel[\"born\"].str.contains(\"06-08\", na=False)]\n    id\
    \  firstname ...          city  country\n79   79      Maria ...    San Diego CA\
    \      USA\n125  126      Klaus ...      Stuttgart  Germany\n281  283 F. Sherwood\
    \ ...       Irvine CA      USA\n304  306      Alexis ...     New York NY     \
    \ USA\n598  607       Luigi ...             NaN       NaN\n790  809   Muhammad\
    \ ...             NaN       NaN\n889  916  William C. ...     Madison NJ     \
    \ USA\n\n[7 rows x 20 columns]\n```\n\n有 7 行。让我们通过使用 & 运算符执行逻辑*与*（请注意，此语法与 Python\
    \ 本身不同（第 2.4.1 节））将结果限制为诺贝尔物理学奖得主来缩小范围：\n\n24. 如果你使用 Jupyter，你可能可以直接从单元格的计算结果中读出全名。"
