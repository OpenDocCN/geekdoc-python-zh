  md: 'With scores that are nearly 81% accurate on average with a standard deviation
    of just under 3%, we can reasonably conclude the Random Forest model is an accurate
    predictor of *Titanic* survival data.


    # 11.7.3 *k*-Means Clustering


    As a final example, we’ll take a look at a *clustering algorithm*, which is but
    one of the many amazing things that scikit-learn can do.³⁵ We’ll start by importing
    a utility method commonly used when demonstrating clustering algorithms called
    `make_blobs()`, in this case consisting of 300 points divided into 4 blobs:


    ```

    >>> from sklearn.datasets import make_blobs

    >>> X, _ = make_blobs(n_samples=300, centers=4, random_state=42)

    ```


    Note that we’ve also passed a `random_state` parameter, which serves as the seed
    for the blobs and ensures consistent results (which can vary quite a lot).

    We can see what’s “bloblike” about the data created by `make_blobs()` by plotting
    the second column against the first:


    ```

    >>> fig, ax = plt.subplots()

    >>> ax.scatter(X[:, 0], X[:, 1])

    >>> plt.show()

    ```


    The result appears in Figure 11.36.

    We can find a good fit for the 4 blobs using an algorithm called *k*-means clustering:


    ```

    >>> from sklearn.cluster import KMeans

    >>> kmeans = KMeans(n_clusters=4)

    >>> kmeans.fit(X)

    ```


    Note how similar the steps are to the model fits in Section 11.7.2. We can find
    the model’s estimate for the center of each cluster using the `cluster_centers_`
    attribute:'
