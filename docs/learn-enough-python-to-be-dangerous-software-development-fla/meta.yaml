    Boolean values are especially useful for *control flow*, which lets us take actions
    based on the result of a comparison (Listing 2.7). In Listing 2.7, the three dots
    ... are inserted by the Python interpreter and shouldn''t be copied literally.


    ### Listing 2.7: Control flow with `if`.


