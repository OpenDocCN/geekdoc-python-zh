- md: "# Learn Enough Python to Be Dangerous\n\nSoftware Development, Flask Web Apps,\
    \ and Beginning Data Science with Python\n\nMichael Hartl\n\n## Praise for Learn\
    \ Enough Tutorials\n\n> “Just started the #100DaysOfCode journey. Today marks\
    \ day 1. I have completed @mhartl’s great Ruby tutorial at @LearnEnough and am\
    \ looking forward to starting on Ruby on Rails from tomorrow. Onwards and upwards.”\n\
    > —Optimize Prime (@_optimize), Twitter post\n\n> “Ruby and Sinatra and Heroku,\
    \ oh my! Almost done with this live web application. It may be a simple palindrome\
    \ app, but it’s also simply exciting! #100DaysOfCode #ruby @LearnEnough #ABC #AlwaysBeCoding\
    \ #sinatra #heroku”\n> —Tonia Del Priore (@toninjaa), Twitter post; Software Engineer\
    \ for a FinTech Startup for 3+ years\n\n> “I have nothing but fantastic things\
    \ to say about @LearnEnough courses. I am just about finished with the #javascript\
    \ course. I must say, the videos are mandatory because @mhartl will play the novice\
    \ and share in the joy of having something you wrote actually work!”\n> —Claudia\
    \ Vizena\n\n> “I must say, this Learn Enough series is a masterpiece of education.\
    \ Thank you for this incredible work!”\n> —Michael King\n\n> “I want to thank\
    \ you for the amazing job you have done with the tutorials. They are likely the\
    \ best tutorials I have ever read.”\n> —Pedro Iatzky\n\n## Learn Enough Series\
    \ from Michael Hartl\n\nVisit **informit.com/learn-enough** for a complete list\
    \ of available publications.\n\nThe **Learn Enough** series teaches you the developer\
    \ tools, Web technologies, and programming skills needed to launch your own applications,\
    \ get a job as a programmer, and maybe even start a company of your own. Along\
    \ the way, you’ll learn technical sophistication, which is the ability to solve\
    \ technical problems yourself. And Learn Enough always focuses on the most important\
    \ parts of each subject, so you don’t have to learn everything to get started—you\
    \ just have to learn enough to be dangerous. The Learn Enough series includes\
    \ books and video courses so you get to choose the learning style that works best\
    \ for you.\n\n## LEARN ENOUGH PYTHON TO BE DANGEROUS\n\nSoftware Development,\
    \ Flask Web Apps, and Beginning Data Science with Python\n\nMichael Hartl\n\n\
    ▲Addison-Wesley\nBoston • Columbus • New York • San Francisco • Amsterdam • Cape\
    \ Town\nDubai • London • Madrid • Milan • Munich • Paris • Montreal • Toronto\
    \ • Delhi • Mexico City\nSão Paulo • Sydney • Hong Kong • Seoul • Singapore •\
