    Perhaps even cooler, we can pass functions as arguments to other functions. For
    example, we can create a function to apply another function and then add 1 like
    this:


    ```

    >>> def function_adder(x, f):

    ...     return f(x) + 1

    ...

    >>>

    ```


    We can then pass **square** as an argument (*without* parentheses, so not **square()**):


    ```

    >>> function_adder(10, square)

    101

    ```


    Built-in Python functions work the same way:


    ```

    >>> import math

    >>> function_adder(100, math.log10)

    3.0

    ```


    This last result follows because $\log_{10} 100 = \log_{10} 10^2 = 2$ and $2 +
    1 = 3$. (Why does Python display it as **3.0**?)$^3$


