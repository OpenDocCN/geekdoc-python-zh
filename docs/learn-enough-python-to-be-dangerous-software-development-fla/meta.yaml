    By the way, you may wonder why the call to `range()` in Listing 5.21 doesn''t
    just create exactly the list we''re trying to avoid. The answer is that it used
    to, and you had to use `xrange()` to avoid creating the whole thing in memory.
    But as of Python 3, the `range()` function does precisely what we want, producing
    the next element in the range only when needed. This pattern is known as *lazy
    evaluation*, and indeed is exactly the behavior produced by a generator as well.


    With the final assignment in Listing 5.21, we''re ready to find the first square
    containing all the digits:


