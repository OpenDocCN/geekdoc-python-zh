    ## 3.4 更多列表技术


    除了访问和选择元素之外，我们还可以对列表做许多其他事情。在本节中，我们将讨论元素包含、排序和反转，以及追加和弹出。


    ### 3.4.1 元素包含


    与字符串（第 2.5 节）一样，列表支持使用 `in` 关键字测试元素包含：


    ```

    >>> a = [42, 8, 17, 99]

    [42, 8, 17, 99]

    >>> 42 in a

    True

    >>> "foo" in a

    False

    ```


    ### 3.4.2 排序和反转


    Python 具有强大的*排序*和*反转*列表的功能。它们通常分为两种类型：*原地*和*生成器*。让我们看一些例子来了解这意味着什么。


    我们将从原地排序列表开始——这是一个极好的技巧，在 C 的古老时代通常需要自定义实现。³ 在 Python 中，我们只需调用 `sort()`：


    ```

    >>> a = [42, 8, 17, 99]

    >>> a.sort()

    >>> a

    [8, 17, 42, 99]

    ```


    正如你可能对整数列表所期望的那样，`a.sort()` 按数字顺序对列表进行排序（不像，例如，JavaScript，它令人困惑地按“字母顺序”排序，因此 17
    排在 8 之前）。我们还看到（与 Ruby 不同，但*像* JavaScript 一样）对列表进行排序会改变或*修改*列表本身。（我们稍后会看到它返回 `None`。）


    > 3. 这对 C 并不完全公平：Python 本身是用 C 编写的，所以 `sort()` 实际上就是这样一个“自定义实现”！


    我们可以使用 **reverse()** 来反转列表中的元素：


    ```

    >>> a.reverse()

    >>> a

    [99, 42, 17, 8]

    ```


    与 **sort()** 一样，请注意 **reverse()** 会修改列表本身。


    这种修改方法可以帮助演示关于 Python 列表的一个常见陷阱，涉及列表赋值。假设我们有一个列表 **a1**，并想要一个名为 **a2** 的副本（清单
    3.5）。


    #### 清单 3.5：危险的赋值。


    ```

    >>> a1 = [42, 8, 17, 99]

    >>> a2 = a1    # 危险！

    ```


    第二行中的赋值是危险的，因为 **a2** 指向与 **a1** 相同的计算机内存位置，这意味着如果我们修改 **a1**，它也会改变 **a2**：


    ```

    >>> a1.sort()

    >>> a1

    [8, 17, 42, 99]

    >>> a2

    [8, 17, 42, 99]

    ```


    我们在这里看到 **a2** 已经改变，即使我们没有直接对它做任何事情。（你可以使用 **list()** 函数或 **copy()** 方法来避免这种情况，例如
    **a2 = list(a1)** 或 **a2 = a1.copy()**。）


    Python 的原地方法效率很高，但通常更方便的是相关的 **sorted()** 和 **reversed()** 函数。例如，我们可以按如下方式获取排序后的列表：


    ```

    >>> a = [42, 8, 17, 99]

    >>> sorted(a)    # Pythonic

    [8, 17, 42, 99]

    >>> a

    [42, 8, 17, 99]

    ```


    这里，与 **sort()** 的情况不同，原始列表未更改。


    类似地，我们可以（几乎）使用 **reversed()** 获取反转的列表：


    ```

    >>> a

    [42, 8, 17, 99]

    >>> reversed(a)

    <list_reverseiterator object at 0x109561910>

    ```


    不幸的是，与 **sorted()** 的并行结构略有破坏，至少在撰写本文时是这样。**reversed()** 函数返回一个*迭代器*，而不是列表，这是一种特殊类型的
    Python 对象，旨在（你猜对了）被迭代。这通常不是问题，因为我们通常会连接或循环遍历反转的元素，在这种情况下生成器将很好地工作（第 5.3 节），但当我们真正需要一个列表时，我们可以直接调用
    **list()** 函数（第 3.1 节）：


    ```

    >>> list(reversed(a))

    [99, 42, 17, 8]

    ```


    如前所述，这个小缺陷很少造成影响，因为生成器在迭代时的行为与列表版本实际上相同。⁴


    ### 比较


    列表支持与字符串（第 2 章）相同的基本相等和不等比较：


    ```

    >>> a = [1, 2, 3]

    >>> b = [1, 2, 3]

    >>> a == b

    True

    >>> a != b

    False

    ```


    Python 还支持 **is**，它测试两个变量是否表示同一个对象。因为 **a** 和 **b** 虽然包含相同的元素，但在 Python 的内存系统中不是同一个对象，所以
    **==** 和 **is** 在这种情况下返回不同的结果：


    ```

    >>> a == b

    True

    >>> a is b

    False

    ```


    相比之下，清单 3.5 中的列表 **a1** 和 **a2** 使用两种比较都是相等的：


    ```

    >>> a1 == a2

    True

    >>> a1 is a2

    True

    ```


    第二个 **True** 值是因为 **a1** 和 **a2** 确实是完全相同的对象。这种行为与许多其他语言（如 Ruby 和 JavaScript）支持的
    **===** 语法实际上相同。


    根据 PEP 8 风格指南，与 **None** 比较时应始终使用 **is**。例如，我们可以使用 **is** 来确认用于原地反转和排序的列表方法返回
    **None**：


    ```

    >>> a.reverse() == None    # Not Pythonic

    True

    >>> a.sort() == None       # Not Pythonic

    True

    >>> a.reverse() is None    # Pythonic

    True

    >>> a.sort() is None       # Pythonic

    True

    ```


    ### 3.4.3 追加和弹出


    一对有用的列表方法是 **append()** 和 **pop()**——**append()** 让我们将一个元素追加到列表的末尾，而 **pop()**
    则将其移除并返回该值：


    ```

    >>> a = sorted([42, 8, 17, 99])

    >>> a

    [8, 17, 42, 99]

    >>> a.append(6)             # 追加到列表

    >>> a

    [8, 17, 42, 99, 6]

    >>> a.append("foo")

    >>> a

    [8, 17, 42, 99, 6, ''foo'']

    >>> a.pop()                 # 弹出一个元素

    ''foo''

    ```'
