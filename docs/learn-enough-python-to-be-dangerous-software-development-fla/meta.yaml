    \n**Figure 11.24:** The author with Nobel laureate Kip Thorne and Stephen Hawking.\n\
    \nthe same is the case for Kip's entry in the DataFrame. Kip's middle initial\
    \ is \"S.\" (for Stephen), so let's include that in our comparison:\n\n```\n>>>\
    \ nobel.loc[nobel[\"firstname\"] == \"Kip S.\"]\n    id firstname surname  ...\
    \                     name city country\n916  943    Kip S.  Thorne  ...  LIGO/VIRGO\
    \ Collaboration  NaN     NaN\n```\n\nBingo. Now we can look for the year as with\
    \ Feynman's entry:\n\n```\n>>> nobel.loc[nobel[\"firstname\"] == \"Kip S.\"].year\n\
    2017\n```\n\nBut what if we didn't happen to know Kip's middle initial (and didn't\
    \ think to check Wikipedia for it)? It would be nice to be able to search all\
    \ the first names for the string \"Kip\". We can do this using **Series.str**,\
    \ which allows us to use string functions on a Series, together with **contains()**\
    \ to search for a substring (Listing 11.14).\n\n### Listing 11.14: Finding a record\
    \ by substring.\n\n```\n>>> nobel.loc[nobel[\"firstname\"].str.contains(\"Kip\"\
    )]\n    id firstname surname ...                name city country\n916  943  \
    \  Kip S.  Thorne ...  LIGO/VIRGO Collaboration  NaN     NaN\n```\n\nPerhaps unsurprisingly,\
    \ since it's a fairly uncommon name, there's only one \"Kip\" in the dataset.\
    \ What about any other Feynmans? We can try again with **\"surname\"** in place\
    \ of **\"firstname\"**:\n\n```\n>>> nobel.loc[nobel[\"surname\"].str.contains(\"\
    Feynman\")]\nValueError: Cannot mask with non-boolean array containing NA / NaN\
    \ values\n```\n\nOops, we got an error. This is because of a large number of NaNs\
    \ from organizations that have won the Nobel Prize for Peace:\n\n```\n>>> nobel.loc[nobel[\"\
    surname\"].isnull()]\n    id                                        firstname\
    \ ... city country\n465  467                     Institute of International Law\
    \ ...  NaN     NaN\n474  477                   Permanent International Peace Bureau\
    \ ...  NaN     NaN\n479  482              International Committee of the Red Cross\
    \ ...  NaN     NaN\n480  482              International Committee of the Red Cross\
    \ ...  NaN     NaN\n.\n```\n\nWe can filter out NaNs and other Not Available values\
    \ by passing the option **na=False** to **contains()**:\n\n```\n>>> nobel.loc[nobel[\"\
    surname\"].str.contains(\"Feynman\", na=False)]\n    id  firstname ...       \
    \   city country\n86  86  Richard P. ...  Pasadena CA     USA\n```\n\nIt looks\
    \ like there's only one result, which we can confirm with **len()**:\n\n```\n\
    >>> len(nobel.loc[nobel[\"surname\"].str.contains(\"Feynman\", na=False)])\n1\n\
    ```\n\nAlthough there's only one Nobel laureate named “Feynman”, there are famously\
    \ several named “Curie”, as seen in Listing 11.15.\n\n### Listing 11.15: Finding\
    \ Curies in the `laureates.csv` dataset.\n\n```\n>>> curies = nobel.loc[nobel[\"\
    surname\"].str.contains(\"Curie\", na=False)]\n>>> curies\n   id firstname  ...\
    \    city country\n4   5    Pierre  ...   Paris   France\n5   6     Marie  ...\
    \     NaN      NaN\n6   6     Marie  ...   Paris   France\n191 194    Irène  ...\
    \   Paris   France\n```\n\nHere we've assigned the result to the variable `curies`\
    \ for convenience. For example, we can get the first name and surname for each\
    \ Curie laureate as follows:\n\n```\n>>> curies[[\"firstname\", \"surname\"]]\n\
    4    Pierre           Curie\n5     Marie           Curie\n6     Marie        \
    \   Curie\n191    Irène  Joliot-Curie\n```\n\nWe see that Marie Curie (also known\
    \ as Marie Skłodowska-Curie)<sup>22</sup> won two Nobel Prizes (Figure 11.25<sup>23</sup>).\
    \ The other Curie laureates are Pierre Curie, Marie's husband, and Irène Joliot-Curie,\
    \ one of their daughters. (In fact, there's even one more Nobel laureate in the\
    \ absurdly accomplished Curie family; see Section 11.5.1 for more.)\n\nMarie Skłodowska-Curie\
    \ is the only person to win a Nobel Prize for two different sciences. Let's use\
    \ pandas to see if there are any other multiple Nobel prizewinners. One way to\
    \ investigate this question is to use `groupby()` to group the winners by name\
    \ and then use the `size()` method to see how many there are:\n\n22. Although\
    \ typically known only as “Marie Curie” in English-language sources, Marie herself\
    \ preferred to use the Polish part of her name as well, and many European sources\
    \ (including Polish ones) follow this convention.\n23. Image courtesy of Morphant\
    \ Creation/Shutterstock.\n\n![](img/b3303452eae4d7974600cd38b159398e_389_0.png)\n\
    \nFigure 11.25: Marie Skłodowska-Curie with her husband and co-laureate Pierre\
    \ Curie.\n\n```\n>>> nobel.groupby([\"firstname\", \"surname\"]).size()\nfirstname\
    \  surname\nA. Michael  Spence         1\nAage N.     Bohr           1\nAaron\
    \       Ciechanover    1\n            Klug           1\nAbdulrazak  Gurnah   \
    \      1\n            ..\nYouyou      Tu             1\nYuan T.     Lee      \
    \      1\nYves        Chauvin        1\nZhores      Alferov        1\nÉlie   \
    \     Ducommun       1\n```\n\nAll the displayed values here are 1, but we can\
    \ sort them using sort_values() to find any multiple laureates:\n\n```\n>>> nobel.groupby([\"\
    firstname\", \"surname\"]).size().sort_values()\nfirstname      surname\nA. Michael\
    \     Spence          1\nNicolay G.     Basov           1\nNiels          Bohr\
    \            1\nNiels K.       Jerne           1\nNiels Ryberg   Finsen      \
    \    1\n..\nÉlie           Ducommun        1\nLinus          Pauling         2\n\
    John           Bardeen         2\nFrederick      Sanger          2\nMarie    \
    \      Curie           2\n```\n\nThis yields four multiple winners.\n\nAlthough\
    \ the **sort_values()** trick is nice, it would have failed if there had been\
    \ too many multiple laureates. A more general way to select winners of more than\
    \ one Prize is to use a boolean criterion directly. We can do this with the same\
    \ grouping by size combined with the criterion **size > 1** (Listing 11.16). Note\
    \ that we've added **\"id\"** to **groupby()** to take into account the (unlikely\
    \ but possible) case of different people with the same name both winning Nobel\
    \ Prizes.\n\n### Listing 11.16: Finding winners of multiple Nobel Prizes.\n\n\
    ```\n>>> laureates = nobel.groupby([\"id\", \"firstname\", \"surname\"])\n>>>\
    \ sizes = laureates.size()\n>>> sizes[sizes > 1]\nid    firstname  surname\n6\
    \     Marie      Curie          2\n66    John       Bardeen        2\n217   Linus\
    \      Pauling        2\n222   Frederick  Sanger         2\n```\n\nWe see from\
    \ Listing 11.16 that, at the time this dataset was assembled, only four people\
    \ had ever won more than one Nobel Prize: Frederick Sanger (Chemistry), John Bardeen\
    \ (Physics), Linus Pauling (Chemistry and Peace), and of course Marie Curie (Physics\
    \ and Chemistry). (2022 saw the emergence of a fifth multiple-laureate when K.\
    \ Barry Sharpless won his second Nobel Prize for Chemistry.)\n\n## Selecting Dates\n\
    \nOne of pandas' greatest strengths is its ability to deal with times and *time\
    \ series*, so let's start by taking a look at selecting dates. One way we can\
    \ do this is by searching for laureates by exact birthday as a string:\n\n```\n\
    >>> nobel.loc[nobel[\"born\"] == \"1879-03-14\"]\n    id firstname ...     city\
    \  country\n25  26    Albert ...  Berlin  Germany\n```\n\nYou might suspect that\
    \ a Nobel Prize–winning “Albert” born in 1879 might be Albert Einstein, and you'd\
    \ be right, as we can see by checking the **\"surname\"** field:²⁴\n\n```\n>>>\
    \ nobel.loc[nobel[\"born\"] == \"1879-03-14\"][\"surname\"]\nEinstein\n```\n\n\
    Looking closely, we see that Einstein was born on March 14, which is sometimes\
    \ known as Pi Day because of the resemblance between 03-14 (or 3/14 in the American\
    \ calendar system) and the first three digits of π ≈ 3.14. Fans of Pi Day are\
    \ quick to point out how great this is.\n\nAs the founder of Tau Day (https://tauday.com/),\
    \ I was naturally interested in finding some great Nobel laureate who was born\
