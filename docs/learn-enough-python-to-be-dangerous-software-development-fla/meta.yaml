    >>> for i in range(5):\n...     print(i)\n...\n0\n1\n2\n3\n4\n```\n\nHere we’ve\
    \ used the range(5) function, which as we see creates an object with numbers in\
    \ the range 0–4.\n\nListing 2.24 is Python's version of the classic “for loop”\
