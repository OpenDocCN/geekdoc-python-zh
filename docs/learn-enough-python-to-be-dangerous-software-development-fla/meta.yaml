    \ iterator\n>>> type(phrase_iterator)             # use type() to find the type\n\
    <class 'str_iterator'>\n>>> next(phrase_iterator)\n'f'\n>>> next(phrase_iterator)\n\
    'o'\n>>> next(phrase_iterator)\n'o'\n>>> next(phrase_iterator)\nTraceback (most\
    \ recent call last):\n  File \"<stdin>\", line 1, in <module>\nStopIteration\n\
    ```\n\nWe see from the **type()** function that **iter()** takes in a string and\
    \ returns a string iterator. Calling **next()** on the iterator yields the next\
    \ element in the sequence until it reaches the end, as indicated by the special\
    \ **StopIteration** exception.\n\nOur strategy for adding an iterator to the **Phrase**\
    \ class looks like this:\n\n- 1. In **\\_\\_iter\\_\\_**, create a phrase iterator\
    \ based on the **content** attribute using **iter()**, and then return **self**\
    \ as required by the way Python iterators work.\n- 2. In **\\_\\_next\\_\\_**,\
    \ call **next()** on the phrase iterator and return the result.\n\nConverting\
