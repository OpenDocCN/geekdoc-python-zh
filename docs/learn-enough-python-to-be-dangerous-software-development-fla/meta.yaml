    # 4.3.1 Splitting on Regexes


    Our final example of regexes combines the power of pattern matching with the `split`
    method we saw in Section 3.1. In that section, we saw how to split on spaces,
    like this:


    ```

    >>> "ant bat cat duck".split(" ")

    [''ant'', ''bat'', ''cat'', ''duck'']

