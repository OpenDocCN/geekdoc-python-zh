  - '[PAGE 200]


    ```

    >>> s.__class__.__mro__

    (<class ''str''>, <class ''object''>)

    ```


    What this tells us is that a string is of class **str**, which in turn is of type
    **object**. The latter is known as a *superclass* because it is usually thought
    of as being “above” the **str** class.


    A diagram of the resulting class hierarchy appears in Figure 7.3. We see here
    that the superclass of **str** is **object**, which is where the hierarchy ends.
    This pattern is true of every Python object: Trace back the class hierarchy far
    enough and you’ll always reach **object**, which has no superclass itself.


    The way Python’s class hierarchy works is that each class *inherits* the attributes
    and methods of classes further up in the hierarchy. For example, we’ve just seen
    how to find the class of an object of type **str**:


    ```

    >>> "honey badger".__class__

    <class ''str''>

    ```


    But where does the **__class__** attribute come from? The answer is that **str**
    inherits **__class__** from **object** itself:


    ```

    >>> object().__class__

    <class ''object''>

    ```


    The class of each object with **object** as superclass stores its class name in
    **__class__**.


