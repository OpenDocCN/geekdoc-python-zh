    \ the result (Figure 11.22) is essentially the same as the histogram we created\
    \ directly in Section 11.3.3 (Figure 11.16).\n\n# DataFrame\n\nThe other main\
    \ pandas object type, known as a **DataFrame** object, is the heart of Python\
    \ data analysis. A DataFrame can be thought of as a two-dimensional grid of cells\
    \ containing arbitrary data types—roughly equivalent to an Excel worksheet. In\
    \ this section, we’ll create a few simple DataFrames by hand just to get a sense\
    \ of how they work, but it’s worth bearing in mind that most real-world DataFrame\
    \ objects are created by importing data from files (or even from live URLs), a\
    \ technique we'll cover starting in Section 11.5.\n\nThere are a large number\
    \ of ways to initialize or build DataFrames appropriate to a correspondingly large\
    \ number of circumstances. For example, one option is to initialize it with a\
