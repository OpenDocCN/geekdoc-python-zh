    ## 1.4 Shell 脚本中的 Python


    尽管第 1.3 节中的代码功能完全正常，但在编写要在命令行 shell（https://www.learnenough.com/command-line-tutorial/basics#sec-man_pages）中执行的程序时，通常最好使用
    *Learn Enough Text Editor to Be Dangerous* 中讨论的那种*可执行脚本*。


    让我们看看如何使用 Python 制作可执行脚本。我们将从创建一个名为 **hello** 的文件开始：


    ```

    (venv) $ touch hello

    ```


    请注意，我们*没有*包含 **.py** 扩展名——这是因为文件名本身就是用户界面，没有理由向用户暴露实现语言。实际上，有理由不这样做：通过使用名称 **hello**，我们给自己提供了以后用不同语言重写脚本的选项，而无需更改程序用户必须输入的命令。（虽然在这个简单案例中这并不重要，但原则应该很清楚。我们将在第
    9.3 节看到一个更实际的例子。）


    编写一个可工作的脚本有两个步骤。第一步是使用我们之前见过的相同命令（清单 1.7），前面加上一个“shebang”行，告诉我们的系统使用 Python 来执行该脚本。


    通常，确切的 shebang 行取决于系统（如 *Learn Enough Text Editor to Be Dangerous* 中的 Bash 和 *Learn
    Enough JavaScript to Be Dangerous* 中的 JavaScript（https://www.learnenough.com/javascript-tutorial/hello_world#sec-js_shell）所示），但对于
    Python，我们可以让 shell 本身提供正确的命令。诀窍是使用以下行来使用 shell *环境*（env）中可用的 **python** 可执行文件：


    ```

    #!/usr/bin/env python3

    ```


    使用此行作为 shebang 行，得到清单 1.9 所示的 shell 脚本。


    **清单 1.9：** 一个 "hello, world" shell 脚本。

    *hello*


    ```

    #!/usr/bin/env python3


    print("hello, world!")

    ```


