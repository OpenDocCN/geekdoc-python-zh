    # 2.1 String Basics


    Because the REPL interprets ''It'' as a string, and the final '' as the opening
    of a second string, the result is a syntax error. (Another result, as seen above,
    is that the syntax highlighting looks odd—a side effect that is frequently useful
    as a visual hint of a syntax error.)


    According to the PEP-8 style guide, the preferred method for including a quote
    in this manner is simply to use the other kind of quote for defining the string
    (Listing 2.1).


    **Listing 2.1:** Including a single quote inside a double quote.


    ```

    >>> "It''s not easy being green"

    "It''s not easy being green"

    ```


    Note that the REPL here obeys the same convention we did, switching to double
    quotes for a string containing a single quote.


    Finally, Python is unusual in supporting *triple-quoted strings*:


    ```

    >>> """Return the function value."""

    ''Return the function value.''

    ```


    When they fit on one line, these strings behave just like single- and double-quoted
    strings, but we can also add newlines inside them:


    ```

    >>> """This is a string.

    ...

    ... We can add newlines inside,

    ... which is pretty cool.

    ... """

    ''This is a string.\nWe can add newlines inside,\nwhich is pretty cool.\n''

    ```


    Triple-quoted strings are notable for their use in *docstrings*, which are special
    documentation strings used in Python functions (Chapter 5) and classes (Chapter
    7). As such, they are used heavily in Python programming.


    In general, PEP 8 indicates that single- and double-quoted strings are both acceptable
    as long as you''re consistent, but triple-quoted strings should always use the
    double-quoted variant:⁴


    4. The terminology here is standard but a little muddled: “single-quoted” and
    “double-quoted” refer to the number of quotes in the characters themselves (''
    vs. "), whereas “triple-quoted” refers to the number of such characters used on
    each side when defining a string ("""...").'
  - '[PAGE 58]


    In Python, single-quoted strings and double-quoted strings are the same. This
    PEP does not make a recommendation for this. Pick a rule and stick to it. When
    a string contains single or double quote characters, however, use the other one
    to avoid backslashes in the string. It improves readability.

    For triple-quoted strings, always use double quote characters to be consistent
    with the docstring convention in PEP 257.


    This tutorial standardizes on double-quoted strings for consistency with this
    triple-quoted convention and to match the convention used in *Learn Enough JavaScript
    to Be Dangerous* (https://www.learnenough.com/javascript) and *Learn Enough Ruby
    to Be Dangerous* (https://www.learnenough.com/ruby), but of course you are free
    to choose the opposite convention if you like.


    # 2.1.1 Exercises


    +   1. Confirm that we can escape out quotes using a backslash, as in `''It\''s
    not easy being green''`. This can be convenient if a string contains both single
    and double quotes (in which case the trick from Listing 2.1 doesn''t work). How
    does the REPL handle `''It\''s not "easy" being green''`?

    2. Python supports common special characters such as tabs (`\t`) and newlines
    (`\n`), which are two different forms of so-called *whitespace*. Show that `\t`
    and `\n` are interpreted as special characters inside both single- and double-quoted
    strings. What happens if you put the letter `r` in front of one of the strings?
    *Hint:* In the REPL, try executing commands like the ones shown in Listing 2.2.
    We''ll learn more about the special `r` behavior in Section 2.2.2.


    **Listing 2.2:** Some strings with special characters.


    ```

    >>> print(''hello\tgoodbye'')

    >>> print(''hello\ngoodbye'')

    >>> print("hello\tgoodbye")

    >>> print("hello\ngoodbye")

    >>> print(r"hello\ngoodbye")

    ```


    # 2.2 Concatenation and Interpolation


    Two of the most important string operations are *concatenation* (joining strings
    together) and *interpolation* (putting variable content into strings). We''ll
    start with concatenation,'
  - '[PAGE 59]


    which we can accomplish using the + operator:⁵


    ```

    (venv) $ python3

    >>> "foo" + "bar"            # String concatenation

    ''foobar''

    >>> "ant" + "bat" + "cat"    # Multiple strings can be concatenated at once.

    ''antbatcat''

    ```


    Here the result of evaluating "**foo**" plus "**bar**" is the string "**foobar**".
    (The meaning of the odd names “foo” and “bar” is discussed (https://www.learnenough.com/command-line-tutorial/manipulating_files#aside-foo_bar)
    in *Learn Enough Command Line to Be Dangerous* (https://www.learnenough.com/command-line).)
    Also note the *comments*, indicated using the hash symbol #, which you are free
    to ignore and will be ignored by Python in any case.


    Let’s take another look at string concatenation in the context of *variables*,
    which you can think of as named boxes that contain some value (as mentioned (https://www.learnenough.com/css-and-layout-tutorial/templates_and_frontmatter#aside-variable)
    in *Learn Enough CSS & Layout to Be Dangerous* (https://www.learnenough.com/css-and-layout)
    and discussed further in Box 2.1).


    > **Box 2.1: Variables and identifiers**


    If you’ve never programmed a computer before, you may be unfamiliar with the term
    **variable**, which is an essential idea in computer science. You can think of
    a variable as a named box that can hold different (or “variable”) content.


    As a concrete analogy, consider the labeled boxes that many elementary schools
    provide for students to store clothing, books, backpacks, etc. (Figure 2.2⁶).
    The variable is the location of the box, the label for the box is the variable
    name (also called an *identifier*), and the content of the box is the variable
    value.


    In practice, these different definitions are frequently conflated, and “variable”
    is often used for any of the three concepts (location, label, or value).


    5. This use of + for string concatenation is common in programming languages,
    but in one respect it’s an unfortunate choice, because addition is the canonical
    commutative operation in mathematics: *a + b = b + a*. (In contrast, multiplication
    is in some cases non-commutative; for example, when multiplying matrices it’s
    often the case that *AB ≠ BA*.) In the case of string concatenation, though, +
    is most definitely *not* a commutative operation, since, e.g., "**foo**" + "**bar**"
    is "**foobar**", whereas "**bar**" + "**foo**" is "**barfoo**". Partially for
    this reason, some languages (such as PHP) use a different symbol for concatenation,
    such as a dot . (yielding "**foo**" . "**bar**").


