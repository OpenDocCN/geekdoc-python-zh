    # 第 11 章

    数据科学


    数据科学是一个快速发展的领域，它结合了计算和统计工具，从数据中创造洞察并得出结论。这个描述可能听起来有点模糊，而且确实没有普遍接受的该领域定义；例如，有些人认为“数据科学”只是“统计学”的一个花哨术语，而另一些人则认为统计学是数据科学中*最不*重要的部分。


    幸运的是，无论数据科学的确切定义是什么，人们*普遍*认同 Python 是一个优秀的工具。¹ 对于哪些特定的 Python 工具对该学科最有用，也存在普遍共识。本章的目的就是介绍其中一些工具，并利用它们来研究
    Python 特别适合的数据科学的某些方面。


    这些主题包括用于交互式计算的 Jupyter notebooks（第 11.1 节）、用于数值计算的 NumPy（第 11.2 节）、用于数据可视化的 Matplotlib（第
    11.3 节）、用于数据分析的 pandas（第 11.4、11.5 和 11.6 节），以及用于机器学习的 scikit-learn（第 11.7 节）。²
    几乎所有其他 Python 数据科学工具（如 PySpark、Databricks 等）也都建立在本章介绍的库之上。


    数据科学领域过于庞大，无法在如此有限的篇幅内完全涵盖，但本章将为你进一步学习该学科打下坚实的基础。第 11.8 节包含一些建议和进一步资源，如果你决定想更深入地学习数据科学。


    1. Python 在该领域的主要开源竞争对手是 R，它最初由统计学家开发。Python 的优势在于它也是一种通用编程语言，这也是许多数据科学家越来越偏爱它的原因之一。尽管如此，R
    无疑是强大的，并且有许多学习数据科学的资源实际上同时涵盖了 Python 和 R。如果出于任何原因了解 R 对你很重要，我建议使用这些资源之一。

    2. 所有这些资源都是开源软件。


    ## 11.1 数据科学环境设置


    第一步是为进行数据科学调查设置我们的环境。以下是 Python 数据科学最重要工具的一些概述：


    - IPython 和 Jupyter：提供许多使用 Python 的数据科学家工作的计算环境的软件包。

    - NumPy：一个使各种数学和统计操作更容易的库；它也是 pandas 库许多功能的基础。

    - Matplotlib：一个可视化库，可以快速轻松地从我们的数据生成图形和图表。

    - pandas：一个专门为方便处理数据而创建的 Python 库。这是许多 Python 数据科学工作的核心。

    - scikit-learn：可能是 Python 中最受欢迎的机器学习库。


    由于使用 IPython 和 Jupyter 在技术上是可选的，我们将首先安装无论你的环境如何都需要的软件包。为方便起见，我建议创建一个新目录并设置一个全新的虚拟环境，如清单
    11.1 所示。


    **清单 11.1：** 设置数据科学环境。


    ```

    $ cd ~/repos

    $ mkdir python_data_science

    $ cd python_data_science/

    $ python3 -m venv venv

    $ source venv/bin/activate

    (venv) $

    ```


    我还建议使用 Git 将你的项目置于版本控制之下，并在 GitHub 或你选择的其他代码托管平台设置一个远程仓库。如果你选择这条路线，可以使用清单 11.2
    所示的 `.gitignore` 文件，其中包含一行用于忽略不需要的 Jupyter 更改。


    **清单 11.2：** 用于 Python 数据科学的 `.gitignore` 文件。


    ```

    .gitignore


    venv/


    *.pyc

    __pycache__/


    instance/


    .pytest_cache/

    .coverage

    htmlcov/


    dist/

    build/

    *.egg-info/


    .ipynb_checkpoints


    .DS_Store

    ```


    此时，我们已准备好安装必要的软件包。与本教程的其余部分一样，我们将安装精确版本以实现最大的未来兼容性，但你可以尝试最新版本，只需省略 `==<版本号>` 部分即可。只需准备好应对不可预测的结果。完整的必要软件包集如清单
    11.3 所示。


    **清单 11.3：** 安装 Python 数据科学软件包。


    ```

    (venv) $ pip install numpy==1.23.3

    (venv) $ pip install matplotlib==3.6.1

    (venv) $ pip install pandas==1.5.0

    (venv) $ pip install scikit-learn==1.1.2

    ```


    我们在第 1.3 节就看到，许多 Python 开发者更喜欢使用 Conda 系统来管理软件包。如果有的话，在 Python 数据科学家中这种情况甚至更为普遍。但正如第
    1.3 节也指出的，Conda 对环境的更改更广泛，并且（至少根据我的经验）如果你需要重置系统，更难逆转或拆除。随着你在系统上使用 Python 经验的增加，我建议重新审视
    Conda，看看它是否满足你的需求。'
