  md: '#sec-wordcount_and_pipes) the results to **pbcopy**, which automatically copies
    the results to the macOS **pasteboard** (also called the “clipboard”):


    ```

    $ ./wikp https://es.wikipedia.org/wiki/Python | pbcopy

    ```


    At this point, pasting into Google Translate (or anywhere else) will paste the
    full text.


    Consider how remarkable an accomplishment this is. The script in Listing 9.18
    is a little tricky—and to get such a thing working completely on your own might
    involve quite a bit of Googling and more than a few **print** statements as you
    go along—but it’s really only six lines of code: not exactly rocket science. And
    yet, it’s genuinely useful, something that (if you’re active in foreign-language
    learning) you might well use all the time. Moreover, the basic skills involved—including
    not just the programming, but also the technical sophistication (<cough>Googling</cough>)—unlock
    a huge number of potential applications.


