    The two expressions shown in Listing 2.5 are equivalent, but I generally prefer
    the interpolated version because having to add the single space " " in between
    strings feels a bit awkward (and, as noted, Pythonistas generally agree).


    It''s worth noting that formatted strings were added in Python 3.6. If for some
    reason you need to use an earlier version of Python, you can use either % formatting
    or **str.format()** instead. Specifically, the following three lines give the
    same result:


    ```

    >>> f"First Name: {first_name}, Last Name: {last_name}"

    ''First Name: Michael, Last Name: Hartl''

    >>> "First Name: {}, Last Name: {}".format(first_name, last_name)

    ''First Name: Michael, Last Name: Hartl''

    >>> "First Name: %s, Last Name: %s" % (first_name, last_name)

    ''First Name: Michael, Last Name: Hartl''

    ```


    Using **format()** in particular has possible advantages that can be useful even
    when formatted strings are available. See the article "Python 3''s f-Strings:
    An Improved String Formatting Syntax" (https://realpython.com/python-f-strings/)
    for more information.


