    ![](img/b3303452eae4d7974600cd38b159398e_73_0.png)


    **Figure 2.6:** Turns out I only wanted fries.


    In addition to **and** and **or**, Python supports *negation* via the “not” operator
    **not**, which just converts **True** to **False** and **False** to **True** (Listing
    2.15).


    **Listing 2.15:** The truth table for **not**.


    ```

    >>> not True

    False

    >>> not False

    True

    ```


    We can use **not** in a conditional as shown in Listing 2.16. Note that parentheses
    *are* required in this case, because otherwise we’re asking if **not len(x)**
    is equal to **0**.


    **Listing 2.16:** Using the **not** operator in a conditional.


    ```

    >>> if not (len(x) == 0):    # Not Pythonic

    ...     print("x is not empty.")

    ... else:

    ...     print("x is empty.")

    ...

    x is not empty.

    ```'
- md: '## 2.4.2 Boolean Context


    Not all booleans are the result of comparisons, and in fact every Python object
    has a value of either `True` or `False` in a boolean context. We can force Python
    to use such a boolean context with the `bool()` function. Naturally, both `True`
    and `False` are just equal to themselves in a boolean context:


    ```

    >>> bool(True)

    True

    >>> bool(False)

    False

    ```


    Using `bool()` allows us to see that a string like `"foo"` is `True` in a boolean
    context:


    ```

    >>> bool("foo")

    True

    ```


    Almost all Python strings are **True** in a boolean context; the only exception
    is the empty string, which is **False**:<sup>14</sup>


    ```

    >>> bool("")

    False

    ```


    Most other things that are “empty” in any sense are **False** in Python. This
    includes the number **0**:


    ```

    >>> bool(0)

    False

    ```


    and **None**:


    ```

    >>> bool(None)

    False

    ```


    As we’ll see later, empty lists (Chapter 3), empty tuples (Section 3.6), and empty
    dictionaries (Section 4.4) are also **False**.


    It’s important to understand that using **bool()** is just for purposes of illustration;
    in real programs, we’ll almost always rely on the presence of a keyword such as
    **if** or **elif**, which automatically converts all objects to their boolean
    equivalents. For example, because "" is **False** in a boolean context, we can
    replace **len(x) != 0** in Listing 2.17 with **x** itself, as seen in Listing
    2.18.


    **Listing 2.18:** Using a string in a boolean context.


    ```

    >>> if x:                    # Pythonic

    ...     print("x is not empty.")

    ... else:

    ...     print("x is empty.")

    ...

    x is not empty.

    ```


    In Listing 2.18, **if x:** converts **x** to **False** if it’s the empty string
    and **True** otherwise.


    We can use the same property to rewrite code like Listing 2.12 as shown in Listing
    2.19.


    **Listing 2.19:** Using boolean methods.


    ```

    >>> if x or y:

    ...     print("At least one of the strings is nonempty.")

    ... else:

    ...     print("Both strings are empty!")

    ...

    At least one of the strings is nonempty.

    ```


    14. This is the sort of detail that varies from language to language. For example,
    the empty string is true in Ruby.


    ## 2.4.3 Exercises


    - 1. If x is "foo" and y is "" (the empty string), what is the value of x and
    y? Verify using bool() that x and y is true in a boolean context.

    - 2. Show that we can define a string of length 50 using the convenient code in
    Listing 2.20, which uses the asterisk * to "multiply" the string "a" by 50. Go
    through the steps in Listing 2.10 again with the new password to verify that Python
    prints out "Password is too long."


    **Listing 2.20:** Defining a password that is too long.


    ```

    >>> password = "a" * 50

    >>> password

    ''aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa''

    ```


    ## 2.5 Methods


    We saw in Section 2.4 that we can call the len() function to get the length of
    a string. This follows the same basic pattern as the print() function discussed
    in Section 2.3: We type the name of the function with an argument in parentheses.

    There is a second important class of functions that are effectively attached to
    the object under consideration—in the case of this chapter, a string object. Such
    functions are known as methods. In Python (and in many other languages that support
    object-oriented programming), methods are indicated by typing the object followed
    by a dot and then the name of the method. For example, Python strings have a method
    called capitalize() that capitalizes the given string:


    ```

    >>> "michael".capitalize()

    ''Michael''

    ```


    Note that we include parentheses to indicate that **capitalize()** is a method
    (in this case, with zero arguments). Leaving off the parentheses causes Python
    to return the raw method:


    ```

    >>> "michael".capitalize

    <built-in method capitalize of str object at 0x1014487b0>

    ```


    This is why we generally include parentheses in method names like **capitalize()**.
    One important class of methods is *boolean methods*, which return **True** or
    **False**. In Python, such methods are frequently indicated using the word “is”
    as the first part of the method:


    ```

    >>> "badger".islower()

    True

    >>> "BADGER".islower()

    False

    >>> "bAdGEr".islower()

    False

    ```


    Here we see that **islower()** returns **True** if the string is all lowercase
    and **False** otherwise. Strings also respond to a wealth of methods that return
    transformed versions of the string’s content. One example is the **capitalize()**
    method seen above. Strings also have a **lower()** method, which (surprise!) converts
    the string to all lowercase letters (Figure 2.7<sup>15</sup>):


    ```

    >>> "HONEY BADGER".lower()

    ''honey badger''

    ```


    Note that the **lower()** method returns a *new* string, without changing (or
    *mutating*) the original:


    ```

    >>> animal = "HONEY BADGER"

    >>> animal.lower()

    ''honey badger''

    >>> animal

    ''HONEY BADGER''

    ```


    This is the sort of method that could be useful, for example, when standardizing
    on lowercase letters in an email address:


    ```

    >>> first_name = "Michael"

    >>> username = first_name.lower()

    >>> f"{username}@example.com"    # Sample email address

    ''michael@example.com''

    ```


    As you might be able to guess, Python supports the opposite operation as well;
    before looking at the example below, see if you can guess the method for converting
    a string to uppercase (Figure 2.8<sup>16</sup>).

    I''m betting you got the right answer (or at least came close):


    ```

    >>> last_name.upper()

    ''HARTL''

    ```


    **Figure 2.8:** Early typesetters kept large letters in the “upper case” and small
    letters in the “lower case”.


    Being able to guess answers like this is a hallmark of technical sophistication,
    but as noted in Box 1.2 another key skill is being able to use the documentation.
    In particular, the Python documentation page on `str` has a long list of useful
    string methods.<sup>17</sup> Let’s take a look at some of them (Figure 2.9).


    Inspecting the methods in Figure 2.9, we see one that looks like this:


    ```

    python

    str.find(sub[, start[, end]])

    Return the lowest index in the string where substring *sub* is found within the
    slice *s[start:end]*. Optional arguments *start* and *end* are interpreted as
    in slice notation. Return -1 if *sub* is not found.

    ```


    This indicates that the `find()` method takes an *argument*, `sub`, and returns
    the location where the substring starts:


    ```

    >>> "hello".find("lo")

    3

    >>> "hello".find("ol")

    -1

    ```


    (Note that **3** corresponds to the *fourth* letter, not the third, a convention
    known as "zero offset" or "zero-based indexing"; see Section 2.6.)


    The result for a nonexistent substring means that we can test whether a string
    contains a substring by comparing to **-1**:


    ### String Methods


    Strings implement all of the common sequence operations, along with the additional
    methods described below.


    Strings also support two styles of string formatting, one providing a large degree
    of flexibility and customization (see `str.format()`, `Format String Syntax` and
    `Custom String Formatting`) and the other based on C `printf` style formatting
    that handles a narrower range of types and is slightly harder to use correctly,
    but is often faster for the cases it can handle (`printf-style String Formatting`).


    The `Text Processing Services` section of the standard library covers a number
    of other modules that provide various text related utilities (including regular
    expression support in the `re` module).


    **`str.capitalize()`**

    Return a copy of the string with its first character capitalized and the rest
    lowercased.


    *Changed in version 3.8:* The first character is now put into titlecase rather
    than uppercase. This means that characters like digraphs will only have their
    first letter capitalized, instead of the full character.


    **`str.casefold()`**

    Return a casefolded copy of the string. Casefolded strings may be used for caseless
    matching.


    Casefolding is similar to lowercasing but more aggressive because it is intended
    to remove all case distinctions in a string. For example, the German lowercase
    letter `''ß''` is equivalent to `"ss"`. Since it is already lowercase, `lower()`
    would do nothing to `''ß''`; `casefold()` converts it to `"ss"`.


    The casefolding algorithm is described in section 3.13 of the Unicode Standard.


    *New in version 3.3.*


    **`str.center(width[, fillchar])`**

    Return centered in a string of length *width*. Padding is done using the specified
    *fillchar* (default is an ASCII space). The original string is returned if *width*
    is less than or equal to `len(a)`.


    **`str.count(sub[, start[, end]])`**

    Return the number of non-overlapping occurrences of substring *sub* in the range
    `[start, end]`. Optional arguments *start* and *end* are interpreted as in slice
    notation.


    **Figure 2.9: Some Python string methods.**


    15. Image courtesy of Pavel Kovaricek/Shutterstock.

    16. Image courtesy of Pavel Kovaricek/Shutterstock.

    17. You can find such pages by going directly to the official Python documentation,
    but the truth is that I nearly always find such pages by Googling things like
    “python string”. Be mindful of the version number—although Python is quite stable
    at this point, if you notice any discrepancies make sure you’re using documentation
    compatible with your own version of Python.'
  mdcn: '## 2.4.2 布尔上下文


    并非所有布尔值都来自比较，实际上，每个 Python 对象在布尔上下文中都有一个 `True` 或 `False` 的值。我们可以使用 `bool()` 函数强制
    Python 使用这种布尔上下文。自然，在布尔上下文中，`True` 和 `False` 都等于它们自身：


    ```

    >>> bool(True)

    True

    >>> bool(False)

    False

    ```


    使用 `bool()` 让我们看到像 `"foo"` 这样的字符串在布尔上下文中是 `True`：


    ```

    >>> bool("foo")

    True

    ```


    几乎所有 Python 字符串在布尔上下文中都是 **True**；唯一的例外是空字符串，它是 **False**：<sup>14</sup>


    ```

    >>> bool("")

    False

    ```


    大多数其他在任何意义上“空”的东西在 Python 中都是 **False**。这包括数字 **0**：


    ```

    >>> bool(0)

    False

    ```


    以及 **None**：


    ```

    >>> bool(None)

    False

    ```


    正如我们稍后将看到的，空列表（第 3 章）、空元组（第 3.6 节）和空字典（第 4.4 节）也是 **False**。


    重要的是要理解，使用 **bool()** 只是为了说明目的；在实际程序中，我们几乎总是依赖于 **if** 或 **elif** 等关键字的存在，这些关键字会自动将所有对象转换为其布尔等价物。例如，因为
    "" 在布尔上下文中是 **False**，我们可以用 **x** 本身替换清单 2.17 中的 **len(x) != 0**，如清单 2.18 所示。


    **清单 2.18：** 在布尔上下文中使用字符串。


    ```

    >>> if x:                    # Pythonic

    ...     print("x is not empty.")

    ... else:

    ...     print("x is empty.")

    ...

    x is not empty.

    ```


    在清单 2.18 中，**if x:** 如果 **x** 是空字符串则将其转换为 **False**，否则转换为 **True**。


    我们可以使用相同的属性来重写像清单 2.12 这样的代码，如清单 2.19 所示。


    **清单 2.19：** 使用布尔方法。


    ```

    >>> if x or y:

    ...     print("At least one of the strings is nonempty.")

    ... else:

    ...     print("Both strings are empty!")

    ...

    At least one of the strings is nonempty.

    ```


    14. 这是那种因语言而异的细节。例如，在 Ruby 中，空字符串是 true。


    ## 2.4.3 练习


    - 1. 如果 x 是 "foo"，y 是 ""（空字符串），那么 x 和 y 的值是什么？使用 bool() 验证 x 和 y 在布尔上下文中是否为 true。

    - 2. 证明我们可以使用清单 2.20 中的便捷代码定义一个长度为 50 的字符串，该代码使用星号 * 将字符串 "a" "乘以" 50。使用新密码再次执行清单
    2.10 中的步骤，以验证 Python 打印出 "Password is too long."。


    **清单 2.20：** 定义一个过长的密码。


    ```

    >>> password = "a" * 50

    >>> password

    ''aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa''

    ```


    ## 2.5 方法


    我们在第 2.4 节中看到，我们可以调用 len() 函数来获取字符串的长度。这遵循与第 2.3 节讨论的 print() 函数相同的基本模式：我们输入函数名，并在括号中提供一个参数。

    还有第二类重要的函数，它们实际上附着在所讨论的对象上——在本章的情况下，是一个字符串对象。这样的函数被称为方法。在 Python（以及许多其他支持面向对象编程的语言）中，方法通过输入对象，后跟一个点，然后是方法名来表示。例如，Python
    字符串有一个名为 capitalize() 的方法，它将给定字符串的首字母大写：


    ```

    >>> "michael".capitalize()

    ''Michael''

    ```


    注意，我们包含括号以表明 **capitalize()** 是一个方法（在这种情况下，没有参数）。省略括号会导致 Python 返回原始方法：


    ```

    >>> "michael".capitalize

    <built-in method capitalize of str object at 0x1014487b0>

    ```


    这就是为什么我们通常在像 **capitalize()** 这样的方法名中包含括号。一个重要的方法类别是 *布尔方法*，它们返回 **True** 或 **False**。在
    Python 中，此类方法通常使用单词“is”作为方法名的第一部分来表示：


    ```

    >>> "badger".islower()

    True

    >>> "BADGER".islower()

    False

    >>> "bAdGEr".islower()

    False

    ```


    这里我们看到，如果字符串全是小写字母，**islower()** 返回 **True**，否则返回 **False**。字符串还响应许多返回字符串内容转换版本的方法。一个例子是上面看到的
    **capitalize()** 方法。字符串还有一个 **lower()** 方法，它（惊喜！）将字符串转换为全小写字母（图 2.7<sup>15</sup>）：


    ```

    >>> "HONEY BADGER".lower()

    ''honey badger''

    ```


    注意，**lower()** 方法返回一个 *新* 字符串，而不会更改（或 *修改*）原始字符串：


    ```

    >>> animal = "HONEY BADGER"

    >>> animal.lower()

    ''honey badger''

    >>> animal

    ''HONEY BADGER''

    ```


    这种方法可能很有用，例如，在标准化电子邮件地址中的小写字母时：


    ```

    >>> first_name = "Michael"

    >>> username = first_name.lower()

    >>> f"{username}@example.com"    # 示例电子邮件地址

    ''michael@example.com''

    ```


    正如你可能猜到的，Python 也支持相反的操作；在查看下面的示例之前，看看你是否能猜出将字符串转换为大写的方法（图 2.8<sup>16</sup>）。

    我打赌你得到了正确的答案（或者至少很接近）：


    ```

    >>> last_name.upper()

    ''HARTL''

    ```


    **图 2.8：** 早期的排字工人将大写字母放在“上层盒子”，小写字母放在“下层盒子”。


    能够猜出这样的答案是技术熟练的标志，但正如框 1.2 中指出的，另一个关键技能是能够使用文档。特别是，Python 文档页面 `str` 有一个很长的有用字符串方法列表。<sup>17</sup>
    让我们看看其中的一些（图 2.9）。


    检查图 2.9 中的方法，我们看到一个看起来像这样的：


    ```

    python

    str.find(sub[, start[, end]])

    Return the lowest index in the string where substring *sub* is found within the
    slice *s[start:end]*. Optional arguments *start* and *end* are interpreted as
    in slice notation. Return -1 if *sub* is not found.

    ```


    这表明 `find()` 方法接受一个 *参数* `sub`，并返回子字符串开始的位置：


    ```

    >>> "hello".find("lo")

    3

    >>> "hello".find("ol")

    -1

    ```


    （注意 **3** 对应于 *第四个* 字母，而不是第三个，这种约定称为“零偏移”或“基于零的索引”；参见第 2.6 节。）


    对于不存在的子字符串的结果意味着我们可以通过与 **-1** 比较来测试字符串是否包含子字符串：


    ### 字符串方法


    字符串实现了所有常见的序列操作，以及下面描述的附加方法。


    字符串还支持两种风格的字符串格式化，一种提供高度的灵活性和自定义（参见 `str.format()`、`Format String Syntax` 和 `Custom
    String Formatting`），另一种基于 C `printf` 风格的格式化，处理的类型范围较窄，使用起来稍微困难一些，但对于它能处理的情况通常更快（`printf-style
    String Formatting`）。


    标准库的 `Text Processing Services` 部分涵盖了许多其他提供各种文本相关实用程序的模块（包括 `re` 模块中的正则表达式支持）。


    **`str.capitalize()`**

    返回字符串的副本，其首字母大写，其余字母小写。


    *在版本 3.8 中更改：* 首字母现在被置于标题大小写而不是大写。这意味着像双字母这样的字符只会将其首字母大写，而不是整个字符。


    **`str.casefold()`**

    返回字符串的 casefolded 副本。casefolded 字符串可用于不区分大小写的匹配。


    Casefolding 类似于小写化，但更激进，因为它旨在消除字符串中的所有大小写区别。例如，德语小写字母 `''ß''` 等同于 `"ss"`。由于它已经是小写，`lower()`
    对 `''ß''` 不起作用；`casefold()` 将其转换为 `"ss"`。


    casefolding 算法在 Unicode 标准的第 3.13 节中有描述。


    *在版本 3.3 中新增。*


    **`str.center(width[, fillchar])`**

    返回一个长度为 *width* 的字符串，原字符串居中。使用指定的 *fillchar*（默认为 ASCII 空格）进行填充。如果 *width* 小于或等于
    `len(a)`，则返回原始字符串。


    **`str.count(sub[, start[, end]])`**

    返回在范围 `[start, end]` 内子字符串 *sub* 的非重叠出现次数。可选参数 *start* 和 *end* 的解释与切片表示法相同。


    **图 2.9：一些 Python 字符串方法。**


    15. 图片由 Pavel Kovaricek/Shutterstock 提供。

    16. 图片由 Pavel Kovaricek/Shutterstock 提供。

    17. 你可以直接访问官方 Python 文档来找到这样的页面，但事实是我几乎总是通过谷歌搜索“python string”之类的东西来找到这样的页面。注意版本号——尽管
    Python 在这一点上相当稳定，但如果你注意到任何差异，请确保你使用的是与你自己的 Python 版本兼容的文档。'
