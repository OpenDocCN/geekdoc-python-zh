    进行 Web 开发的完美入门，同时也为像 Django 这样“功能齐全”的框架提供了极好的准备。


    我们将首先使用 pip（一个递归缩写，代表“pip installs packages”）安装 Flask 包。**pip** 命令作为虚拟环境的一部分自动提供，因此我们可以通过在命令行输入
