    \ listings use the Jinja function **extends** to tell the system to use the template\
    \ **layout.html**, and then **{% block content %}** defines the content to be\
    \ inserted in Listing 10.22.\n\n## Listing 10.23: The core Home (index) view.\n\
    \n*palindrome_detector/templates/index.html*\n\n```html\n{% extends \"layout.html\"\
    \ %}\n\n{% block content %}\n  <h1>Sample Flask App</h1>\n\n  <p>\n    This is\
    \ the sample Flask app for\n    <a href=\"https://www.learnenough.com/python-tutorial\"\
    ><em>Learn Enough Python\n    to Be Dangerous</em></a>. Learn more on the <a href=\"\
    /about\">About</a> page.\n  </p>\n\n  <p>\n    Click the <a href=\"https://en.wikipedia.org/wiki/Sator_Square\"\
    >Sator\n    Square</a> below to run the custom <a href=\"/palindrome\">Palindrome\n\
    \    Detector</a>.\n  </p>\n\n  <a class=\"sator-square\" href=\"/palindrome\"\
    >\n    <img src=\"/static/images/sator_square.jpg\" alt=\"Sator Square\">\n  </a>\n\
    {% endblock %}\n```\n\n## Listing 10.24: The core About view.\n\n*palindrome_detector/templates/about.html*\n\
    \n```html\n{% extends \"layout.html\" %}\n\n{% block content %}\n  <h1>About</h1>\n\
    \n  <p>\n    This site is the final application in\n    <a href=\"https://www.learnenough.com/python-tutorial\"\
    ><em>Learn Enough Python\n    to Be Dangerous</em></a>\n    by <a href=\"https://www.michaelhartl.com/\"\
    >Michael Hartl</a>,\n    a tutorial introduction to the\n    <a href=\"https://www.python.org/\"\
    >Python programming language</a> that\n    is part of\n    <a href=\"https://www.learnenough.com/\"\
    >LearnEnough.com</a>.\n  </p>\n{% endblock %}\n```\n\n## Listing 10.25: The core\
    \ Palindrome Detector view.\n\n*palindrome_detector/templates/palindrome.html*\n\
    \n```html\n{% extends \"layout.html\" %}\n\n{% block content %}\n  <h1>Palindrome\
