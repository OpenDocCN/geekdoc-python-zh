    \n# CHAPTER 8\nTesting and Test-Driven Development\n\nAlthough rarely covered\
    \ in introductory programming tutorials, *automated testing* is one of the most\
    \ important subjects in modern software development. Accordingly, this chapter\
    \ includes an introduction to testing in Python, including a first look at *test-driven\
    \ development*, or TDD.\n\nTest-driven development came up briefly in Section\
    \ 6.5.1, which promised that we would use testing techniques to add an important\
    \ capability to finding palindromes, namely, being able to detect complicated\
    \ palindromes such as “A man, a plan, a canal—Panama!” (Figure 6.5) or “Madam,\
    \ I’m Adam.” (Figure 8.1¹). This chapter fulfills that promise.\n\nAs it turns\
    \ out, learning how to write Python tests will also give us a chance to learn\
    \ how to create (and publish!) a Python package, another exceptionally useful\
    \ Python skill rarely covered in introductory tutorials.\n\nHere’s our strategy\
    \ for testing the current palindrome code and extending it to more complicated\
    \ phrases:\n\n1. Set up our initial package (Section 8.1).\n2. Write automated\
    \ tests for the existing `ispalindrome()` functionality (Section 8.2).\n3. Write\
    \ a *failing* test for the enhanced palindrome detector (RED) (Section 8.3).\n\
    \n1. “The Temptation of Adam” by Tintoretto. Image courtesy of Album/Alamy Stock\
    \ Photo.\n\n**Figure 8.1:** The Garden of Eden had it all—even palindromes.\n\n\
    4. Write (possibly ugly) code to get the test *passing* (GREEN) (Section 8.4).\n\
    5. *Refactor* the code to make it prettier, while ensuring that the test suite\
    \ stays GREEN (Section 8.5).\n\n## 8.1 Package Setup\n\nWe saw as early as Section\
    \ 1.5 that the Python ecosystem includes a large number of self-contained software\
    \ packages. In this section, we'll create a package based on the palindrome detector\
    \ developed in Chapter 7. As part of this, we'll set up the beginnings of a *test\
    \ suite* to test our code.\n\nPython packages have a standard structure that can\
    \ be visualized as shown in Listing 8.1 (which contains both generic elements\
    \ like `pyproject.toml` and non-generic elements like `palindrome_YOUR_USERNAME_HERE`).\
    \ The structure includes some configuration files (discussed in just a moment)\
    \ and two directories: a `src` (source) directory and a `tests` directory. The\
    \ `src` directory in turn contains a directory for the palindrome package, which\
    \ includes a special required file called `__init__.py` and the `palindrome_YOUR_USERNAME_HERE`\
    \ module itself.² (It is possible to flatten the directory structure by eliminating\
    \ the package directory, but the structure in Listing 8.1 is fairly standard and\
    \ is designed to mirror the official Packaging Python Projects documentation.)\
    \ The result of the structure in Listing 8.1 will be the ability to include the\
    \ `Phrase` class developed in Chapter 7 using the code\n\n```python\nfrom palindrome_mhartl.phrase\
    \ import Phrase\n```\n\n**Listing 8.1:** File and directory structure for a sample\
    \ Python package.\n\n```\npython_package_tutorial/\n├── LICENSE\n├── pyproject.toml\n\
    ├── README.md\n├── src/\n│   └── palindrome_YOUR_USERNAME_HERE/\n│       ├── __init__.py\n\
    │       └── phrase.py\n└── tests/\n    └── test_phrase.py\n```\n\nWe can create\
    \ the structure in Listing 8.1 by hand using a combination of `mkdir` and `touch`,\
    \ as shown in Listing 8.2.\n\n**Listing 8.2:** Setting up a Python package.\n\n\
    ```\n$ cd ~/repos    # Use ~/environment/repos on Cloud9\n$ mkdir python_package_tutorial\n\
    $ cd python_package_tutorial\n$ touch LICENSE pyproject.toml README.md\n$ mkdir\
    \ -p src/palindrome_YOUR_USERNAME_HERE\n$ touch src/palindrome_YOUR_USERNAME_HERE/__init__.py\n\
    $ touch src/palindrome_YOUR_USERNAME_HERE/phrase.py\n$ mkdir tests\n$ touch tests/test_phrase.py\n\
    ```\n\n> 2. Technically, there are various distinctions between *packages* and\
    \ *modules* in Python, but they are rarely important. See this Stack Overflow\
    \ comment (https://stackoverflow.com/questions/7948494/whats-the-difference-between-a-python-module-and-a-python-package/49420164#49420164)\
    \ for some of the minutiae on the subject."
