    So far in this tutorial, we''ve seen several examples of Python functions, which
    are one of the most important ideas in Python, and indeed in all of computing.
    In this chapter, we''ll learn how to define functions of our own (Figure 5.1).
    We''ll also learn a bit more about iterators (mentioned briefly in Section 3.4.2),
    both because Python often uses such objects as the return values of built-in functions
    and because they''re important in their own right.


