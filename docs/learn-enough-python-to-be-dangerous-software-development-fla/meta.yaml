    If you’re familiar with other programming languages (such as PHP or JavaScript),
    you may have noticed that Listing 1.5 lacks a terminating semicolon to mark the
    end of the line. Indeed, Python is unusual among programming languages in that
    its syntax depends on things like newlines (Section 1.2.1) and spaces. We’ll see
    many more examples of Python’s unique syntax as this tutorial progresses.


