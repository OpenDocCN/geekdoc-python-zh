    \ 11.19：** 设置自定义索引列。\n\n```\n>>> titanic = pd.read_csv(URL, index_col=\"Name\"\
    )\n>>> titanic.head()\n\nName\n```\n\n```\n>>> titanic.info()\n<class 'pandas.core.frame.DataFrame'>\n\
