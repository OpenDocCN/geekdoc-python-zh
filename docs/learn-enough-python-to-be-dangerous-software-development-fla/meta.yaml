    \ been installed. (Some resources recommend redirecting (https://www.learnenough.com/command-line-tutorial/manipulating_files#sec-redirecting_and_appending)\
    \ the output of `pip freeze` using `pip freeze > requirements.txt` to create the\
    \ file in Listing 1.15, but this approach can lead to unnecessary or invalid packages\
    \ being required.)\n\n**Listing 1.15:** Specifying the requirements for our app.\n\
    *requirements.txt*\n\n```\nclick==8.1.3\nFlask==2.2.2\ngunicorn==20.1.0\nitsdangerous==2.1.2\n\
    Jinja2==3.1.2\nMarkupSafe==2.1.1\nWerkzeug==2.2.2\n```\n\nThe current recommended\
    \ practice for Python package management is to use a `pyproject.toml` file to\
    \ specify the build system for the project. This step is not required when deploying\
    \ to Fly.io, but we will follow this practice when we make a package of our own\
    \ in Chapter 8.\n\nWith the configuration in Listing 1.15, we have set up our\
    \ system for Fly.io to detect the presence of a Flask app automatically. Here\
    \ are the steps for getting started:\n\n1. Sign up (https://fly.io/app/sign-up)\
    \ for Fly.io. Take care to click the link for the free tier, which can be a little\
    \ tricky to find (Figure 1.11). Free accounts are limited to two deployment servers,\
    \ which is perfect for us since that's the number in this tutorial (here and in\
    \ Chapter 10).\n2. Install Fly Control (`flyctl`), a command-line program for\
    \ interacting with Fly.io. Options for macOS and for Linux (including the cloud\
    \ IDE) are shown in Listing 1.16 and Listing 1.17, respectively. For the latter,\
    \ take care to add any lines to your `.bash_profile` or `.zshrc` file as instructed\
    \ (Listing 1.18), and then run `source ~/.bash_profile` (or `source ~/.zshrc`)\
    \ to update the configuration. Note that the vertical dots in Listing 1.18 indicate\
    \ omitted lines.\n3. Sign in to Fly.io at the command line (Listing 1.19).\n\n\
    11. I discovered accidentally that `flyctl` is aliased to `fly`, at least on my\
    \ system; I suggest seeing if you can be similarly `fly` on your system as well.\n\
    \n![](img/b3303452eae4d7974600cd38b159398e_49_0.png)\n\n**Figure 1.11:** The Fly.io\
    \ free tier.\n\n**Listing 1.16:** Installing `flyctl` on macOS using Homebrew.\n\
    \n```bash\n(venv) $ brew install flyctl\n```\n\n**Listing 1.17:** Installing `flyctl`\
    \ on Linux.\n\n```bash\n(venv) $ curl -L https://fly.io/install.sh | sh\n```\n\
    \n**Listing 1.18:** Adding configuration lines for **flyctl**.\n\n```\n~/.bash_profile\
    \ or ~/.zshrc\n\n.\n.\n.\nexport FLYCTL_INSTALL=\"/home/ubuntu/.fly\"\nexport\
    \ PATH=\"$FLYCTL_INSTALL/bin:$PATH\"\n```\n\n**Listing 1.19:** Signing in to Fly.io.¹²\n\
    \n```\n(venv) $ flyctl auth login --interactive\n```\n\nOnce you've signed in\
    \ to Fly.io, follow these steps to deploy the hello app:\n\n1. Run **flyctl launch**\
    \ (Listing 1.20) and accept the autogenerated name and the default options (i.e.,\
    \ no database).\n2. Edit the generated **Procfile** and fill it with the contents\
    \ shown in Listing 1.21. You'll probably have to make only one change by updating\
    \ the app name from **server** to **hello_app**.\n3. Deploy the application with\
    \ **flyctl deploy** (Listing 1.22).¹³\n\n**Listing 1.20:** “Launching” the app\
    \ (which is just local configuration).\n\n```\n(venv) $ flyctl launch\n```\n\n\
    **Listing 1.21:** *Procfile*\n\n```\nweb: gunicorn hello_app:app\n```\n\n12. Listing\
    \ 1.19 includes the **--interactive** option to prevent **flyctl** from spawning\
    \ a browser window, which works both on native systems and on the cloud IDE. If\
    \ you're using a native system, feel free to omit that option.\n\n13. In my testing,\
    \ **flyctl deploy** fails when running a Virtual Private Network (VPN), so if\
    \ you use a VPN I suggest you disable it for this step.\n\n**Listing 1.22:** Deploying\
    \ the app to Fly.io.\n\n```\n(venv) $ flyctl deploy\n```\n\nAfter the deployment\
    \ step has finished, you can run the command in Listing 1.23 to see the status\
    \ of the app. (If anything goes wrong, you may find **flyctl logs** helpful in\
    \ debugging.)\n\n**Listing 1.23:** Viewing the status of the deployed app.\n\n\
    ```\n(venv) $ flyctl status    # Details will vary\nApp\n  Name      = restless-sun-9514\n\
    \  Owner     = personal\n  Version   = 2\n  Status    = running\n\nHostname =\
    \ crimson-shadow-1161.fly.dev  # Your URL will differ.\nPlatform = nomad\n\nDeployment\
    \ Status\n  ID          = 051e253a-e322-4b2c-96ec-bc2758763328\n  Version    \
    \ = v2\n  Status      = successful\n  Description = Deployment completed successfully\n\
    \  Instances   = 1 desired, 1 placed, 1 healthy, 0 unhealthy\n```\n\nThe highlighted\
    \ line in Listing 1.23 indicates the URL of the live app, which you can open automatically\
    \ as follows:\n\n```\n(venv) $ flyctl open    # won't work on the cloud IDE, so\
    \ use displayed URL\n```\n\nAs noted, the **flyctl open** command won't work on\
    \ the cloud IDE because it needs to spawn a new browser window, but in that case\
    \ you can just copy and paste the URL from your version of Listing 1.23 into your\
    \ browser's address bar to obtain the same result.\n\nAnd that's it! Our hello\
    \ app is now running in production (Figure 1.12). \"It's alive!\" (Figure 1.13¹⁴).\n\
    \n14. Image courtesy of Niday Picture Library/Alamy Stock Photo.\n\n![](img/b3303452eae4d7974600cd38b159398e_52_0.png)\n\
    \n**Figure 1.12:** The hello app running in production.\n\n![](img/b3303452eae4d7974600cd38b159398e_52_1.png)\n\
    \n**Figure 1.13:** Bringing a site to life is easier than it used to be.\n\nAlthough\
    \ there were quite a few steps involved in this section, being able to deploy\
    \ a site so early is nothing short of miraculous. It may be a simple app, but\
    \ it’s a real one, and being able to deploy it to production is an enormous step.\n\
    \nBy the way, you might have noticed that deploying to Fly.io didn’t require a\
    \ Git commit (in contrast to, say, GitHub Pages or a hosting service like Heroku).\
    \ As a result, it’s probably a good idea to make one final commit now and push\
    \ the result up to GitHub:\n\n```\n(venv) $ git add -A\n(venv) $ git commit -m\
    \ \"Configure hello app for deployment\"\n(venv) $ git push\n```\n\n### 1.5.2\
    \ Exercises\n\n1. Change “hello, world!” to “goodbye, world!” in **hello_app.py**\
    \ running locally. Does the updated text display right away? What about after\
    \ refreshing the browser?\n2. Deploy your updated app to Fly.io and confirm that\
    \ the new text appears as expected.\n\n# CHAPTER 2\nStrings\n\n*Strings* are probably\
    \ the most important data structure for everyday computing. They’re used in practically\
    \ every kind of program imaginable, and are also the raw material of the Web.\
    \ As a result, strings make an excellent place to start our Python programming\
    \ journey.\n\n## 2.1 String Basics\n\nStrings are made up of sequences of characters\
    \ in a particular order.¹ We’ve already seen several examples in the context of\
    \ our “hello, world” programs in Chapter 1. Let’s see what happens if we type\
    \ a string by itself (without `print()`) into the Python REPL:\n\n```\n$ source\
    \ venv/bin/activate\n(venv) $ python3\n>>> \"hello, world!\"\n'hello, world!'\n\
    ```\n\nA sequence of characters typed literally is called a *string literal*,\
    \ which we’ve created here using the double-quote character \". The REPL prints\
    \ the result of *evaluating* the line, which in the case of a string literal is\
    \ just the string itself.\n\nA particularly important string is one with no content,\
    \ consisting simply of two quotes. This is known as an *empty string* (or sometimes\
    \ *the* empty string):\n\n1. Like many other high-level languages, such as JavaScript\
    \ and Ruby, Python “characters” are just strings of length one. This stands in\
    \ contrast to lower-level languages like C and Java, which have a special type\
    \ just for characters."
