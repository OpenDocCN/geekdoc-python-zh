  md: "Although none of the above benefits *require* that tests be written first,\
    \ there are many circumstances where test-driven development (TDD) is a valuable\
    \ tool to have in your kit. Deciding when and how to test depends in part on how\
    \ comfortable you are writing tests; many developers find that, as they get better\
    \ at writing tests, they are more inclined to write them first. It also depends\
    \ on how difficult the test is relative to the application code, how precisely\
    \ the desired features are known, and how likely the feature is to break in the\
    \ future.\n\nIn this context, it's helpful to have a set of guidelines on when\
    \ we should test first (or test at all). Here are some suggestions based on my\
    \ own experience:\n\n+   - When a test is especially short or simple compared\
    \ to the application code it tests, lean toward writing the test first.\n- When\
    \ the desired behavior isn't yet crystal clear, lean toward writing the application\
    \ code first, then write a test to codify the result.\n- Whenever a bug is found,\
    \ write a test to reproduce it and protect against regressions, then write the\
    \ application code to fix it.\n- Write tests before refactoring code, focusing\
    \ on testing error-prone code that's especially likely to break.\n\nWe'll start\
    \ by writing a test for a palindrome with punctuation, which just parallels the\
    \ tests from Listing 8.19:\n\n```\ndef test_palindrome_with_punctuation():\n \
