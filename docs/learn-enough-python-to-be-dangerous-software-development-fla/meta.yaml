    \napp = Flask(__name__)\n\n@app.route(\"/\")\ndef hello_world():\n    return greeting(datetime.now())\n\
    ```\n\n## 5.3 Iterators\n\nIn this section, we'll start developing the palindrome\
    \ theme mentioned in the introduction (Chapter 1). Our goal is to write a function\
    \ called `ispalindrome()` that returns `True` if its argument is the same forward\
    \ and backward, and `False` otherwise.\n\nWe can express the simplest possible\
    \ definition of a palindrome as “a string is equal to the string reversed.” (We’ll\
    \ steadily expand this definition over time.) In order to do this, we need to\
    \ be able to reverse a string.\n\nOne straightforward way to reverse a string\
    \ would be to combine the `list()` and `join()` functions (Section 3.4.4) with\
    \ the ability to reverse a list using `reverse()` (Section 3.4.2):\n\n```python\n\
    >>> s = \"foobar\"\n>>> a = list(s)\n>>> a.reverse()\n>>> \"\".join(a)\n'raboof'\n\
    ```\n\nThis would work, but a far more elegant method comes from observing that\
    \ the `reversed()` function, which we saw applied to lists in Section 3.4.2, also\
    \ works on strings:\n\n```python\n>>> reversed(\"foobar\")\n<reversed object at\
    \ 0x104858d60>\n```\n\nAs noted in the Python documentation, `reversed()` returns\
    \ a reverse *iterator*. An iterator is a powerful Python facility that represents\
    \ a stream of data—in this case, a string of characters—that gets accessed in\
    \ sequence. We’ll see how to define a special kind of iterator known as a *generator*\
    \ in Section 5.3.1, and we’ll implement a full custom iterator in Section 7.2.\n\
    \nOne way to see the result of `reversed()` is to iterate through the reversed\
    \ object using `for` (Listing 5.15):\n\n**Listing 5.15:** Using a `for` loop on\
    \ an iterator.\n\n```python\n>>> for c in reversed(\"foobar\"):\n...     print(c)\n\
    ...\nr\na\nb\no\no\nf\n```"
