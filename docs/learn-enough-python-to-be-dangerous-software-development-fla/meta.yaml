    In this way, we arrange for


    ```

    >>> nobel[nobel["surname"] == "Feynman"]

    ```


    to select only the values of **nobel** where **nobel["surname"] == "Feynman"**
    is **True**. This is similar to the **isclose()** trick shown in Listing 11.7,
    where we used an ndarray of booleans to select the elements in a matrix close
    to 0 (and set them to exactly 0).


    Another method for getting the year is by specifying the column along with the
    boolean criterion, which we might try like this (only the most relevant line of
    output is shown):


    ```

    >>> nobel[nobel["surname"] == "Feynman", "year"]

    pandas.errors.InvalidIndexError

    ```


    This doesn''t work, but we can accomplish what we want using the **loc** ("location")
    attribute:²⁰


    ```

    >>> nobel.loc[nobel["surname"] == "Feynman", "year"]

    86 1965

    ```


    This returns just the overall id (in this case, **86**) and the column of interest.
    The **loc** attribute can be used in place of brackets in many places and is generally
    a more flexible way to pull out data items of interest.


