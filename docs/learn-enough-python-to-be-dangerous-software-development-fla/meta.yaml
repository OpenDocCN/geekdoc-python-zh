  md: 'As you can confirm by running `less phrases.txt` at the command line, this
    file contains a large number of phrases—some of which (surprise!) happen to be
    palindromes.


    Our specific task is to write a palindrome detector that iterates through each
    line in this file and prints out any phrases that are palindromes (while ignoring
    others). To do this, we''ll need to open the file and read its contents. We''ll
    then use the package developed in Chapter 8 to determine which phrases are palindromes.


    Python handles file operations natively through the `open()` function, which we
    can use to create an open file, read the file contents with `read()`, and then
    close it with `close()`, as shown in Listing 9.1.²


    # Listing 9.1: Opening a file in the REPL.


    ```

    $ source venv/bin/activate

    (venv) $ python3

    >>> file = open("phrases.txt")    # Not fully Pythonic

    >>> text = file.read()

    >>> file.close()

    ```


    This reads the contents of `phrases.txt` and puts it in the `text` variable.


    We can confirm that the assignment worked using the `splitlines()` method introduced
    in Section 3.1 (Listing 3.2):


    ```

    >>> len(text)

    1373

    >>> text.splitlines()[0]    # Split on newlines and extract the 1st phrase.

    ''A butt tuba''

    ```


    The second command here splits the text on the newline character `\n` and selects
    the zeroth element, revealing the enigmatic first line of the file, “A butt tuba”.


    As noted in Listing 9.1, opening a file as shown isn''t fully Pythonic. The reason
    is that we have to remember to close the file every time we open one, which can
    cause unpredictable behavior if we forget. We can avoid such issues by using the
    special `with` keyword, together with `as` and the desired filename:'
