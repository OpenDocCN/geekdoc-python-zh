    \ -1.66666667]])\n```\n\n尽管数组和**A + Ainv**在此上下文中没有特定的数学意义，但我们看到元素是根据NumPy向量化操作（第11.2.1节）相加的。类似地，数组积**A\
    \ * Ainv**也是逐项计算的。这可能是一个混淆的来源，因为在某些系统（特别是MATLAB）中，`*`运算符在此上下文中执行*矩阵乘法*，产生预期的结果$AA^{-1}\
    \ = I$。在NumPy中，执行矩阵乘法最方便的方式是使用`@`运算符：⁸\n\n```python\n>>> A @ Ainv\narray([[1.,\
