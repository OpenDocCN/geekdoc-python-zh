    Élie           Ducommun        1

    Linus          Pauling         2

    John           Bardeen         2

    Frederick      Sanger          2

    Marie          Curie           2

    ```


    This yields four multiple winners.


    Although the **sort_values()** trick is nice, it would have failed if there had
    been too many multiple laureates. A more general way to select winners of more
    than one Prize is to use a boolean criterion directly. We can do this with the
    same grouping by size combined with the criterion **size > 1** (Listing 11.16).
    Note that we''ve added **"id"** to **groupby()** to take into account the (unlikely
    but possible) case of different people with the same name both winning Nobel Prizes.


    # **Listing 11.16:** Finding winners of multiple Nobel Prizes.


    ```

    >>> laureates = nobel.groupby(["id", "firstname", "surname"])

    >>> sizes = laureates.size()

    >>> sizes[sizes > 1]

    id    firstname  surname

    6     Marie      Curie          2

    66    John       Bardeen        2

    217   Linus      Pauling        2

    222   Frederick  Sanger         2

    ```


    We see from Listing 11.16 that, at the time this dataset was assembled, only four
    people had ever won more than one Nobel Prize: Frederick Sanger (Chemistry), John
    Bardeen (Physics), Linus Pauling (Chemistry and Peace), and of course Marie Curie
    (Physics and Chemistry). (2022 saw the emergence of a fifth multiple-laureate
    when K. Barry Sharpless won his second Nobel Prize for Chemistry.)'
