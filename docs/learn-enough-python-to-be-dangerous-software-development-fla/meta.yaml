  md: 'We can express the simplest possible definition of a palindrome as “a string
    is equal to the string reversed.” (We’ll steadily expand this definition over
    time.) In order to do this, we need to be able to reverse a string.


    One straightforward way to reverse a string would be to combine the `list()` and
    `join()` functions (Section 3.4.4) with the ability to reverse a list using `reverse()`
    (Section 3.4.2):


    ```

    >>> s = "foobar"

    >>> a = list(s)

    >>> a.reverse()

    >>> "".join(a)

    ''raboof''

    ```


    This would work, but a far more elegant method comes from observing that the `reversed()`
    function, which we saw applied to lists in Section 3.4.2, also works on strings:


    ```

    >>> reversed("foobar")

    <reversed object at 0x104858d60>

    ```


    As noted in the Python documentation, `reversed()` returns a reverse *iterator*.
    An iterator is a powerful Python facility that represents a stream of data—in
    this case, a string of characters—that gets accessed in sequence. We’ll see how
    to define a special kind of iterator known as a *generator* in Section 5.3.1,
    and we’ll implement a full custom iterator in Section 7.2.


    One way to see the result of `reversed()` is to iterate through the reversed object
    using `for` (Listing 5.15):


    **Listing 5.15:** Using a `for` loop on an iterator.


    ```

    >>> for c in reversed("foobar"):

    ...     print(c)

    ...

    r

    a

    b

    o

    o

    f

    ```'
