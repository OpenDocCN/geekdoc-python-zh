- md: "## Listing 10.50: Handling a palindrome form submission.\n\npalindrome_app/palindrome_detector/__init__.py\n\
    \n```python\nimport os\n\nfrom flask import Flask, render_template, request\n\n\
    from palindrome_mhartl.phrase import Phrase\n\n\ndef create_app(test_config=None):\n\
    \    \"\"\"Create and configure the app.\"\"\"\n    app = Flask(__name__, instance_relative_config=True)\n\
    \n    if test_config is None:\n        # Load the instance config, if it exists,\
    \ when not testing.\n        app.config.from_pyfile(\"config.py\", silent=True)\n\
    \    else:\n        # Load the test config if passed in.\n        app.config.from_mapping(test_config)\n\
    \n    # Ensure the instance folder exists.\n    try:\n        os.makedirs(app.instance_path)\n\
    \    except OSError:\n        pass\n\n    @app.route(\"/\")\n    def index():\n\
    \        return render_template(\"index.html\", page_title=\"Home\")\n\n    @app.route(\"\
    /about\")\n    def about():\n        return render_template(\"about.html\", page_title=\"\
    About\")\n\n    @app.route(\"/palindrome\")\n    def palindrome():\n        return\
    \ render_template(\"palindrome.html\",\n                               page_title=\"\
    Palindrome Detector\")\n\n    @app.route(\"/check\", methods=(\"POST\",))\n  \
    \  def check():\n        return render_template(\"result.html\",\n           \
    \                    Phrase=Phrase,\n                               phrase=request.form[\"\
    phrase\"])\n\n    return app\n\napp = create_app()\n```\n\nThe code in Listing\
    \ 10.49 is the most straightforward translation of the Python code from Listing\
    \ 10.47, but it involves passing a full **Phrase** class to the template in Listing\
    \ 10.50. Many developers prefer to pass only variables to templates, and we’ll\
    \ refactor the code to use this convention in Section 10.5.1.\n\nAt this point,\
    \ our palindrome detector should be working! The result of submitting a non-palindrome\
    \ is shown in Figure 10.15.\n\nNow let’s see if our detector can correctly identify\
    \ one of the most ancient palindromes, the so-called Sator Square first found\
    \ in the ruins of Pompeii (Figure 10.16⁸). (Authorities differ on the exact meaning\
    \ of the Latin words in the square, but the likeliest translation is “The sower\
    \ [farmer] Arepo holds the wheels with effort.”)\n\nEntering the text “SATOR AREPO\
    \ TENET OPERA ROTAS” (Figure 10.17) and submitting it leads to the result shown\
    \ in Figure 10.18. It works!\n\n### 10.5.1 Form Tests\n\nOur application is now\
    \ working, but note that testing a *second* palindrome requires clicking on “IS\
    \ IT A PALINDROME?” It would be more convenient if we included the same submission\
    \ form on the result page as well.\n\n![](img/b3303452eae4d7974600cd38b159398e_323_0.png)\n\
    \n**Figure 10.15:** The result for a non-palindrome.\n\nTo do this, we'll first\
    \ add a simple test for the presence of a `form` tag on the palindrome page. Because\
    \ the tests we'll be adding are specific to that page, we'll create a new test\
    \ file to contain them:\n\n```bash\n(venv) $ touch tests/test_palindrome.py\n\
    ```\n\nThe test itself is closely analogous to the `h1` and `title` test in Listing\
    \ 10.20, as shown in Listing 10.51. Note that we've defined a `form_tag()` helper\
    \ function in anticipation of testing for the form on the result page as well\
    \ (compare with the `full_title()` helper in Listing 10.42).\n\n![](img/b3303452eae4d7974600cd38b159398e_324_0.png)\n\
    \n**Figure 10.16:** A Latin palindrome from the lost city of Pompeii.\n\n![](img/b3303452eae4d7974600cd38b159398e_324_1.png)\n\
    \n**Figure 10.17:** A Latin palindrome?\n\n![](img/b3303452eae4d7974600cd38b159398e_325_0.png)\n\
    \n**Figure 10.18:** A Latin palindrome!\n\n**Listing 10.51:** Testing for the\
    \ presence of a form tag. GREEN\n\ntests/test_palindrome.py\n\n```python\ndef\
    \ test_palindrome_page(client):\n    response = client.get(\"/palindrome\")\n\
    \    assert form_tag() in response.text\n\ndef form_tag():\n    return '<form\
    \ id=\"palindrome_tester\" action=\"/check\" method=\"post\">'\n```\n\nNow we'll\
    \ add tests for the existing form submission for both non-palindromes and palindromes.\
    \ Just as `get()` in tests issues a GET request, `post()` in tests issues a POST\
    \ request. The first argument of `post()` is the URL, and the second is the `data`\
    \ hash (which gives rise to the contents of `response.form`):\n\n```python\nclient.post(\"\
    /check\", data={\"phrase\": \"Not a palindrome\"})\n```\n\nTo test the response,\
    \ we'll verify that the text in the page's paragraph tag includes the right result.\
    \ Taking the ideas above and applying them to both non-palindromes and palindromes\
    \ gives the tests shown in Listing 10.52.\n\n## Listing 10.52: Adding tests for\
    \ form submission. GREEN\n\ntests/test_palindrome.py\n\n```python\ndef test_palindrome_page(client):\n\
    \    response = client.get(\"/palindrome\")\n    assert form_tag() in response.text\n\
    \ndef test_non_palindrome_submission(client):\n    phrase = \"Not a palindrome.\"\
    \n    response = client.post(\"/check\", data={\"phrase\": phrase})\n    assert\
    \ f'<p>\"{phrase}\" isn\\'t a palindrome.</p>' in response.text\n\ndef test_palindrome_submission(client):\n\
    \    phrase = \"Sator Arepo tenet opera rotas.\"\n    response = client.post(\"\
    /check\", data={\"phrase\": phrase})\n    assert f'<p>\"{phrase}\" is a palindrome!</p>'\
    \ in response.text\n\ndef form_tag():\n    return '<form id=\"palindrome_tester\"\
    \ action=\"/check\" method=\"post\">'\n```\n\n(Be careful when using sample phrases\
    \ that contain non-alphanumeric characters like quotes or apostrophes; by default,\
    \ Jinja escapes these out in ways that make them very difficult to test, which\
    \ is why Listing 10.52 uses the Sator Square palindrome instead of, say, Madam,\
    \ I'm Adam. To see what the escaped HTML looks like in the latter case, you can\
    \ temporarily set phrase to Madam, I'm Adam and then include print(response.text)\
    \ in the test to output the result.)\n\nBecause we were testing existing functionality,\
    \ the tests in Listing 10.52 should already be GREEN:\n\n## Listing 10.53: GREEN\n\
