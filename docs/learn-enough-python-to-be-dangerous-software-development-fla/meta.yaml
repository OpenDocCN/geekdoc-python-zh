    \ navigation to every page is easy. The nav code appears in Listing 10.34, with\
    \ the result shown in Figure 10.10.\n\n**Listing 10.34:** Adding site navigation.\n\
    *palindrome_detector/templates/layout.html*\n\n```html\n<!DOCTYPE html>\n<html>\n\
    \  <head>\n    <meta charset=\"utf-8\">\n    <title>Learn Enough Python Sample\
    \ App | {{ page_title }}</title>\n    <link rel=\"stylesheet\" type=\"text/css\"\
    \ href=\"/static/stylesheets/main.css\">\n    <link href=\"https://fonts.googleapis.com/css?family=Open+Sans:300,400\"\
    \n          rel=\"stylesheet\">\n  </head>\n  <body>\n    <a href=\"/\" class=\"\
    header-logo\">\n      <img src=\"/static/images/logo_b.png\" alt=\"Learn Enough\
    \ logo\">\n    </a>\n    <div class=\"container\">\n      <header class=\"header\"\
    >\n        <nav>\n          <ul class=\"header-nav\">\n            <li><a href=\"\
    /\">Home</a></li>\n            <li><a href=\"/palindrome\">Is It a Palindrome?</a></li>\n\
    \            <li><a href=\"/about\">About</a></li>\n          </ul>\n        </nav>\n\
    \      </header>\n      <div class=\"content\">\n        {% block content %}{%\
    \ endblock %}\n      </div>\n    </div>\n  </body>\n</html>\n```\n\nAs a final\
    \ flourish, we'll factor the navigation from Listing 10.34 into a separate template,\
    \ sometimes called a *partial template* (or *partial* for short) because it represents\
    \ only a partial page. This will lead to a nicely clean and tidy layout page.\n\
    \nBecause this involves refactoring the site, we'll add a simple test (per Box\
