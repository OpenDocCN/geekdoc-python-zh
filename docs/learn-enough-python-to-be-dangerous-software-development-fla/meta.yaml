    # Cross-Validation


    As previously noted, we split the data into training and test datasets as one
    guard against overfitting. Another common technique to avoid "fitting an elephant"
    (per von Neumann''s quip) is known as *cross-validation*. The basic idea is to
    artificially break the original training data into new training and test datasets,
    train the model on the training data, and then use the model to predict the test
    data. If doing this on several different random choices for training and test
    subsets yields fairly consistent results, we can be more confident that the model
    actually works.


    Because this is such a common technique, scikit-learn comes with a predefined
    routine for performing cross-validations called **cross_val_score**:'
  - '[PAGE 419]


    ![](img/b3303452eae4d7974600cd38b159398e_419_0.png)


    **Figure 11.35:** The importance of each factor in *Titanic* survival rates.


    ```

    >>> from sklearn.model_selection import cross_val_score

    ```


    This method implements so-called *K*-fold cross-validation, which involves breaking
    the data into *K* pieces, or “folds”, using *K*−1 folds to train the model, and
    then predicting the values of the final fold to assess accuracy. The default value
    is **5**, which is fine for our purposes, so we need only pass the function the
    classifier instance and the training data. We’ll use Random Forest since it was
    tied for first (and, as previously noted, has an especially cool name):


    ```

    >>> random_forest = RandomForestClassifier(random_state=1)

