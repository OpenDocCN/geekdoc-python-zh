    \n## 10.3.1 练习\n\n1.  你可以通过将任何页面的源代码运行通过 HTML 验证器来确认，当前页面是有效的 HTML，但有一个警告，建议在\
    \ `html` 标签中添加 `lang`（语言）属性。在清单 10.22 中的 `html` 标签中添加属性 `lang=\"en\"`（表示“英语”），并使用网页检查器确认它在所有三个页面上都正确显示。\n\
    2.  进行一次提交并部署更改。\n\n## 10.4 模板引擎\n\n既然我们已经定义了一个合适的布局，在本节中，我们将使用 Jinja 模板语言（首次在清单\
    \ 10.22 中出现）为我们的网站添加一些不错的改进：*可变标题*和*导航*。可变标题是 HTML `title` 标签的内容，它因页面而异，为每个页面提供良好的自定义感。而导航则省去了我们手动输入每个子页面的麻烦——这肯定不是我们试图创建的那种用户体验。\n\
    \n### 10.4.1 可变标题\n\n我们的可变标题将结合一个*基础标题*（每个页面相同）和一个根据页面名称变化的部分。具体来说，对于我们的主页、关于页面和回文检测器页面，我们希望标题看起来像这样：\n\
    \n```\n<title>Learn Enough Python Sample App | Home</title>\n```\n\n```\n<title>Learn\
    \ Enough Python Sample App | About</title>\n```\n\n```\n<title>Learn Enough Python\
    \ Sample App | Palindrome Detector</title>\n```\n\n我们的策略有三个步骤：\n\n1.  为当前页面标题编写\
    \ GREEN 测试。\n2.  为可变标题编写 RED 测试。\n3.  通过添加标题的可变部分来达到 GREEN。\n\n注意，步骤 2 和 3 构成了测试驱动开发。事实上，为可变标题编写测试比让它们通过更容易，这是第\
    \ 8.1 节中描述的 TDD 案例之一。\n\n为了开始步骤 1，我们将修改清单 10.20 中定义的 `title` 断言，以包含当前的基础标题。为了方便下一步，我们将定义一个\
    \ `base_title` 变量，并使用插值来形成标题：\n\n```\nbase_title = \"Learn Enough Python Sample\
    \ App\"\ntitle = f\"<title>{base_title}</title>\"\n```\n\n然后断言标题出现在响应文本中。所有三个网站页面的结果出现在清单\
    \ 10.27 中。\n\n**清单 10.27：** 添加基础标题内容的断言。GREEN\n\ntests/test_site_pages.py\n\n\
    ```\ndef test_index(client):\n    response = client.get(\"/\")\n    assert response.status_code\
    \ == 200\n    base_title = \"Learn Enough Python Sample App\"\n    title = f\"\
    <title>{base_title}</title>\"\n    assert title in response.text\n    assert \"\
    <h1>\" in response.text\n\ndef test_about(client):\n    response = client.get(\"\
    /about\")\n    assert response.status_code == 200\n    base_title = \"Learn Enough\
    \ Python Sample App\"\n    title = f\"<title>{base_title}</title>\"\n    assert\
    \ title in response.text\n    assert \"<h1>\" in response.text\n\ndef test_palindrome(client):\n\
    \    response = client.get(\"/palindrome\")\n    assert response.status_code ==\
    \ 200\n    base_title = \"Learn Enough Python Sample App\"\n    title = f\"<title>{base_title}</title>\"\
    \n    assert title in response.text\n    assert \"<h1>\" in response.text\n```\n\
    \n注意清单 10.27 中有很多重复。当我们为标题添加可变部分时，其中一些重复将会消失；消除其余的重复则留作练习（第 10.4.3 节）。\n正如对工作代码的测试所要求的，测试套件当前是\
    \ GREEN：\n\n**清单 10.28：** GREEN\n\n```\n(venv) $ pytest\n=============================\
    \ test session starts =============================\ncollected 3 items\n\ntests/test_site_pages.py\
    \ ...                                              [100%]\n\n==============================\
    \ 3 passed in 0.01s ================================\n```\n\n现在我们准备好进行步骤 2。我们需要做的就是添加竖线\
    \ | 和特定于页面的标题，如清单 10.29 所示。\n\n**清单 10.29：** 添加可变标题内容的断言。RED\n\ntests/test_site_pages.py\n\
    \n```\ndef test_index(client):\n    response = client.get(\"/\")\n    assert response.status_code\
    \ == 200\n    base_title = \"Learn Enough Python Sample App\"\n    title = f\"\
    <title>{base_title} | Home</title>\"\n    assert title in response.text\n    assert\
    \ \"<h1>\" in response.text\n\ndef test_about(client):\n    response = client.get(\"\
    /about\")\n    assert response.status_code == 200\n    base_title = \"Learn Enough\
    \ Python Sample App\"\n    title = f\"<title>{base_title} | About</title>\"\n\
    \    assert title in response.text\n    assert \"<h1>\" in response.text\n\ndef\
    \ test_palindrome(client):\n    response = client.get(\"/palindrome\")\n    assert\
    \ response.status_code == 200\n    base_title = \"Learn Enough Python Sample App\"\
    \n    title = f\"<title>{base_title} | Palindrome Detector</title>\"\n    assert\
    \ title in response.text\n    assert \"<h1>\" in response.text\n```\n\n因为我们还没有更新应用程序代码，所以测试现在是\
    \ RED：\n\n**清单 10.30：** RED\n\n```\n(venv) $ pytest\n=============================\
    \ test session starts =============================\ncollected 3 items\n\ntests/test_site_pages.py\
    \ FFF                                              [100%]\n\n=================================\
    \ FAILURES ==================================\n________________________________\
    \ test_index _________________________________\n.\n.\n.\n===========================\
    \ short test summary info ===========================\nFAILED tests/test_site_pages.py::test_index\
    \ - assert '<title>Learn Enough Pyt...\nFAILED tests/test_site_pages.py::test_about\
    \ - assert '<title>Learn Enough Pyt...\nFAILED tests/test_site_pages.py::test_palindrome\
    \ - assert '<title>Learn Enoug...\n============================= 3 failed in 0.03s\
    \ ==============================\n```\n\n现在进行步骤 3。诀窍是从我们的每个应用程序函数传递一个不同的 `page_title`\
    \ 选项，然后在页面布局上渲染结果。Jinja 模板的工作方式是，我们可以使用以下方式向模板传递一个关键字参数（第 5.1.2 节）：\n\n```\nrender_template(\"\
    index.html\", page_title=\"Home\")\n```\n\n并自动在模板中访问一个名为 `page_title` 的变量（在这种情况下，值为“Home”）。我们想要的可变标题的结果出现在清单\
    \ 10.31 中。\n\n**清单 10.31：** 为每个页面添加 `page_title` 变量。GREEN\n\n`palindrome_app/palindrome_detector/__init__.py`\n\
    \n```\nimport os\n\nfrom flask import Flask, render_template\n\ndef create_app(test_config=None):\n\
    \    \"\"\"Create and configure the app.\"\"\"\n    app = Flask(__name__, instance_relative_config=True)\n\
    \n    if test_config is None:\n        # Load the instance config, if it exists,\
    \ when not testing.\n        app.config.from_pyfile(\"config.py\", silent=True)\n\
    \    else:\n        # Load the test config if passed in.\n        app.config.from_mapping(test_config)\n\
    \n    # Ensure the instance folder exists.\n    try:\n        os.makedirs(app.instance_path)\n\
    \    except OSError:\n        pass\n\n    @app.route(\"/\")\n    def index():\n\
    \        return render_template(\"index.html\", page_title=\"Home\")\n\n    @app.route(\"\
    /about\")\n    def about():\n        return render_template(\"about.html\", page_title=\"\
    About\")\n\n    @app.route(\"/palindrome\")\n    def palindrome():\n        return\
    \ render_template(\"palindrome.html\",\n                               page_title=\"\
    Palindrome Detector\")\n\n    return app\n\napp = create_app()\n```\n\n一旦我们使用清单\
    \ 10.31 中的代码在模板中有了一个变量，我们就可以使用 Jinja 模板使用的特殊语法 {{ ... }} 来插入它：⁷\n\n```\n{{ page_title\
    \ }}\n```\n\n这告诉 Jinja 将 **page_title** 的内容插入到 HTML 模板中的该位置。具体来说，这意味着我们可以使用清单\
    \ 10.32 中所示的代码添加标题的可变部分。\n\n**清单 10.32：** 为标题添加可变部分。RED\n\n*palindrome_detector/templates/layout.html*\n\
    \n```\n<!DOCTYPE html>\n<html>\n  <head>\n    <meta charset=\"utf-8\">\n    <title>Learn\
    \ Enough Python Sample App | {{ page_title }}</title>\n    .\n    .\n    .\n```\n\
    \n当 **page_title** 是“Home”时，布局标题将变为\n\n```\n<title>Learn Enough Python Sample\
    \ App | Home</title>\n```\n\n其他可变标题也类似。\n因为清单 10.31 中的可变标题与清单 10.29 中的测试相匹配，所以我们的测试套件应该是\
    \ GREEN：\n\n7. 与 {% ... %} 一样，{{ ... }} 语法也常用于其他模板系统，例如 Liquid 和 Mustache。"
