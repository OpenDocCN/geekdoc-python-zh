  md: 'Now you can install your package by using the `--index-url` option to tell
    `pip` to use the test index instead of the real one:


    ```

    (venv) $ pip install <package> --index-url https://test.pypi.org/simple/

    ```


    For example, I can install my version of the test package, which is called `palindrome_mhartl`,
    as follows:¹¹


    ```

    (venv) $ pip install palindrome_mhartl --index-url https://test.pypi.org/simple/

    ```


    To test the installation, you can load the package in the REPL:


    ```

    (venv) $ python3

    >>> from palindrome_mhartl.phrase import Phrase

    >>> Phrase("Madam, I''m Adam.").ispalindrome()

    True

    ```


    It works! (If it doesn''t work for you—which is a real possibility since so many
    things can go wrong—the only recourse is to use your technical sophistication
    to resolve the discrepancy.)


    For a general Python package, you can continue adding features and making new
    releases. All you need to do is increment the version number in `pyproject.toml`
    to reflect the changes you''ve made. For more guidance on how to increment the
    versions, I suggest learning a bit about the rules of so-called *semantic versioning*,
    or *semver* (Box 8.2).


    > **Box 8.2: Semver**


    You might have noticed in this section that we''ve used the version number 0.1.0
    for our new package. The leading zero indicates that our package is at an early
    stage, often called “beta” (or even “alpha” for very early-stage projects).


    11. The `_mhartl` part comes from the `name` setting in `pyproject.toml`, which
    for me is `palindrome_mhartl`. If you install my version of the package, you may
    notice that the version number is higher than 0.0.1, which is due to the aforementioned
    issue regarding package-name reuse. Because I''ve made quite a few changes in
    the course of developing this tutorial, I''ve incremented the version number (`version`
    in `pyproject.toml`) several times.'
