- md: "## 11.6 pandas Example: Titanic\n\n![](img/b3303452eae4d7974600cd38b159398e_398_0.png)\n\
    \n**Figure 11.28:** The ill-fated RMS *Titanic*.\n\n**Listing 11.18:** Reading\
    \ data right from a (raw S3) URL.\n\n```\n>>> URL = \"https://learnenough.s3.amazonaws.com/titanic.csv\"\
    \n>>> titanic = pd.read_csv(URL)\n```\n\nWe see that the data is indexed by **PassengerId**,\
    \ but that's not very meaningful, and we can give it a more personal touch by\
    \ rereading the data and indexing on **Name** instead. The way to do this is by\
    \ specifying an index column using **index_col** (Listing 11.19).\n\n**Listing\
    \ 11.19:** Setting a custom index column.\n\n```\n>>> titanic = pd.read_csv(URL,\
    \ index_col=\"Name\")\n>>> titanic.head()\n\nName\n```\n\n```\n>>> titanic.info()\n\
    <class 'pandas.core.frame.DataFrame'>\nIndex: 891 entries, Braund, Mr. Owen Harris\
    \ to Dooley, Mr. Patrick\nData columns (total 11 columns):\n #   Column      \
    \  Non-Null Count  Dtype  \n---  ------        --------------  -----  \n 0   PassengerId\
    \   891 non-null    int64  \n 1   Survived      891 non-null    int64  \n 2  \
    \ Pclass        891 non-null    int64  \n 3   Sex           891 non-null    object\
    \ \n 4   Age           714 non-null    float64\n 5   SibSp         891 non-null\
    \    int64  \n 6   Parch         891 non-null    int64  \n 7   Ticket        891\
    \ non-null    object \n 8   Fare          891 non-null    float64\n 9   Cabin\
    \         204 non-null    object \n 10  Embarked      889 non-null    object \n\
    dtypes: float64(2), int64(5), object(4)\n```\n\nThe most interesting columns from\
    \ the perspective of survival rate are probably passenger class (\"**Pclass**\"\
    ), sex (\"**Sex**\"), and age (\"**Age**\").\n\nWe can use pandas to discover\
    \ that passenger class consists of three categories:\n\n```\n>>> titanic[\"Pclass\"\
    ].unique()\narray([3, 1, 2])\n```\n\nThese represent first-, second-, and third-class\
    \ tickets, which correspond to accommodation quality from the highest to the lowest.\n\
    \nIf we **groupby()** class we can see how survival rates vary:\n\n```\n>>> titanic.groupby(\"\
    Pclass\")[\"Survived\"].mean()\nPclass\n1    0.629630\n2    0.472826\n3    0.242363\n\
    ```\n\nSo we see that the survival rate varies strongly by class, with first-class\
    \ passengers surviving at a rate of 62.9% and third-class passengers surviving\
    \ at only 24.2%.\n\nWe can visualize this result by plotting a bar chart of survival\
    \ rate. Each pandas Series object has a **plot** attribute that lets us call **bar()**\
    \ to make a bar chart, which includes the bar labels automatically. Heights are\
    \ given by the height of each categorical variable, in this case the survival\
    \ rates we just calculated:\n\n![](img/b3303452eae4d7974600cd38b159398e_401_0.png)\n\
    \n**Figure 11.29:** Titanic survival rates by passenger class.\n\n```\n>>> survival_rates\
    \ = titanic.groupby(\"Pclass\")[\"Survived\"].mean()\n>>> survival_rates.plot.bar()\n\
    >>> plt.show()\n```\n\nThe result appears in Figure 11.29.\n\nWe can apply similar\
    \ techniques to the categorical variable \"Sex\":\n\n```\n>>> titanic[\"Sex\"\
    ].unique()\narray(['male', 'female'], dtype=object)\n```\n\nThe code to make the\
    \ bar chart is essentially the same but with grouping by \"Sex\" instead of \"\
    Pclass\":\n\n```\n>>> survival_rates = titanic.groupby(\"Sex\")[\"Survived\"].mean()\n\
    >>> survival_rates.plot.bar()\n>>> plt.subplots_adjust(bottom=0.20)\n>>> plt.show()\n\
    ```\n\n![](img/b3303452eae4d7974600cd38b159398e_402_0.png)\n\n**Figure 11.30:**\
    \ *Titanic* survival rates by sex.\n\nThe `subplots_adjust()` line here may be\
    \ necessary to create enough room for the labels on the x-axis to display properly\
    \ on some systems (it was on mine). The result should appear as in Figure 11.30.\
    \ We see that the survival rate for female passengers was significantly higher\
    \ than that for male passengers.\n\nWe come now to the third major variable of\
    \ likely interest, age. The class and sex variables are categorical, which made\
    \ creating a bar chart easy, but the \"Age\" variable is numeric, so we have to\
    \ bin the data, similar to making a histogram (Section 11.3.3).\n\nThe ages of\
    \ *Titanic* passengers ranged from infants to 80:\n\n```\n>>> titanic[\"Age\"\
    ].min()\n0.42\n>>> titanic[\"Age\"].max()\n80.0\n```\n\nAt this point, we have\
    \ to decide how many bins to use. Using 7 gives an age of approximately 11 for\
    \ the top of the first bin:\n\n```\n>>> (titanic[\"Age\"].max() - titanic[\"Age\"\
    ].min())/7\n11.368571428571428\n```\n\nThis is a reasonable cutoff for a \"child\"\
    .\n\nThe next step is to bin the data, which we can do with a pandas method called\
    \ **cut()**. First, we need to select only passengers with valid ages, which we\
    \ can accomplish with the **notna()** method to ensure that age is *not* Not Available\
    \ (Listing 11.20).\n\n**Listing 11.20:** Selecting only values that are *not*\
    \ Not Available.\n\n```\n>>> titanic[\"Age\"].notna()\nName\nBraund, Mr. Owen\
    \ Harris                                True\nCumings, Mrs. John Bradley (Florence\
    \ Briggs Thayer)    True\nHeikkinen, Miss. Laina                             \
    \    True\nFutrelle, Mrs. Jacques Heath (Lily May Peel)           True\nAllen,\
    \ Mr. William Henry                               True\n...\nMontvila, Rev. Juozas\
    \                                  True\nGraham, Miss. Margaret Edith        \
    \                   True\nJohnston, Miss. Catherine Helen \"Carrie\"         \
    \      False\nBehr, Mr. Karl Howell                                  True\nDooley,\
    \ Mr. Patrick                                    True\nName: Age, Length: 891,\
    \ dtype: bool\n>>> valid_ages = titanic[titanic[\"Age\"].notna()]\n```\n\nThe\
    \ values of **titanic[\"Age\"].notna()** include booleans that are **True** if\
    \ the age is valid, which we can then use as an index to the **titanic** object\
    \ to select only the passengers with valid ages (the final line in Listing 11.20).\n\
    \nNext, we need to group the data by age and sort it to bring rows with similar\
    \ ages next to each other before binning:\n\n```\n>>> sorted_by_age = valid_ages.sort_values(by=\"\
    Age\")\n```\n\nThis is necessary because otherwise we would be binning ages based\
    \ on passenger name, which doesn't make any sense since it would mix passengers\
    \ of completely unrelated ages in the same bin.\n\nAt this point, we're ready\
    \ to use **cut()** to put the data into the desired number of bins:\n\n```\n>>>\
    \ sorted_by_age[\"Age range\"] = pd.cut(sorted_by_age[\"Age\"], 7)\n```\n\nFinally,\
    \ we calculate the survival rate per bin by grouping by bins and finding the **mean()**\
    \ of the \"**Survived**\" column (remember, this works because of the 1=Survived,\
    \ 0=Didn't Survive encoding typically used for binary predictors):\n\n```\n>>>\
    \ survival_rates = sorted_by_age.groupby(\"Age range\")[\"Survived\"].mean()\n\
    ```\n\nAt this point, we can use the same bar chart technique used for \"**Pclass**\"\
    \ and \"**Sex**\" (with a bottom adjustment to get the labels to fit):\n\n```\n\
    >>> survival_rates.plot.bar()\n>>> plt.subplots_adjust(bottom=0.33)\n>>> plt.show()\n\
    ```\n\nThe result appears as shown in Figure 11.31.\n\n![](img/b3303452eae4d7974600cd38b159398e_404_0.png)\n\
    \n**Figure 11.31:** *Titanic survival rates by age.*\n\nWe see from Figure 11.31\
    \ that the survival rate was highest for the youngest passengers, was approximately\
    \ constant for most adults, and then fell off sharply in the highest age range.\
    \ But the male passengers were also older:\n\n```\n>>> titanic[titanic[\"Sex\"\
    ] == \"male\"][\"Age\"].mean()\n30.72664459161148\n>>> titanic[titanic[\"Sex\"\
    ] == \"female\"][\"Age\"].mean()\n27.915708812260537\n```\n\nWe know from Figure\
    \ 11.30 that male passengers also had lower survival rates, so this could account\
    \ for some of the age disparity. We'll see in Section 11.7 one way to examine\
    \ the relative contribution of each variable separately.\n\n### 11.6.1 Exercises\n\
    \n1.  Confirm using the code in Listing 11.21 that the *Titanic* survival rate\
