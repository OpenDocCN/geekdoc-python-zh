    \ appear as in Figure 1.8 (the only difference with Figure 1.5 is the URL).\n\n\
    Just getting a web app to work, even locally, is a huge accomplishment. But the\
    \ real *pièce de résistance* is deploying the app to the live Web. This is the\
    \ goal of Section 1.5.1.\n\n### 1.5.1 Deployment\n\nNow that we've got our app\
    \ running locally, we're ready to deploy it to a production environment. This\
    \ used to be practically impossible to do in a beginning tutorial, but the technology\
    \ landscape has matured significantly in recent years, to the point where we actually\
    \ have an abundance of choices. The result will be a production version of the\
    \ application from Section 1.5.\n\n## 1.5 Python in a Web Browser\n\n![](img/b3303452eae4d7974600cd38b159398e_43_0.png)\n\
    \n**Figure 1.7:** Previewing the hello app.\n\nThere's a bit of overhead involved\
    \ in deploying something the first time, but deploying early and often is a core\
    \ part of the Learn Enough philosophy of *shipping* (Box 1.5). Moreover, a simple\
    \ app like “hello, world” is the best kind of app for first-time deployment, because\
    \ there's so much less that can go wrong.\n\nAs with the GitHub Pages deployment\
    \ option used in previous tutorials (*Learn Enough CSS & Layout to Be Dangerous*\
    \ (https://www.learnenough.com/css-and-layout) and *Learn Enough JavaScript to\
    \ Be Dangerous* among them), our first step is to put our project under version\
    \ control with Git (as covered (https://www.learnenough.com/git-tutorial/getting_started#sec-initializing_the_repo)\
    \ in *Learn Enough Git to Be Dangerous*). While this is not strictly necessary\
    \ for the deployment solution used in this section, it's always a good idea to\
    \ have a fully versioned project so that we can more easily recover from any errors.\n\
    \n![](img/b3303452eae4d7974600cd38b159398e_44_0.png)\n\n**Figure 1.8:** The hello\
    \ app running on the cloud IDE.\n\n> **Box 1.5: Real artists ship**\n>\n> As legendary\
    \ Apple cofounder Steve Jobs once said: *Real artists ship*. What he meant was\
    \ that, as tempting as it is to privately polish in perpetuity, makers must *ship*\
    \ their work—that is, actually finish it and get it out into the world. This can\
    \ be scary, because shipping means exposing your work not only to fans but also\
    \ to critics. “What if people don’t like what I’ve made?” *Real artists ship*.\n\
    >\n> It’s important to understand that shipping is a separate skill from making.\
    \ Many makers get good at making things but never learn to ship. To keep this\
    \ from happening to us, we’ll follow the practice started in *Learn Enough Git\
    \ to Be Dangerous* and ship several things in this tutorial. Shipping the “hello,\
    \ world” app in this section is only the beginning!\n\nOur first step is to create\
    \ a **.gitignore** file to tell Git to ignore files and directories we don't want\
    \ to version. Use **touch .gitignore** (or any other method you prefer) to create\
    \ the file and then fill it with the contents shown in Listing 1.14.<sup>10</sup>\n\
    \n**Listing 1.14:** Ignoring certain files and directories.\n\n```\n.gitignore\n\
    \nvenv/\n\n*.pyc\n__pycache__/\n\ninstance/\n\n.pytest_cache/\n.coverage\nhtmlcov/\n\
    \ndist/\nbuild/\n*.egg-info/\n\n.DS_Store\n```\n\nNext, initialize the repository:\n\
    \n```\n(venv) $ git init\n(venv) $ git add -A\n(venv) $ git commit -m \"Initialize\
    \ repository\"\n```\n\nIt's also a good idea to push any newly initialized repository\
    \ up to a remote backup. As in previous Learn Enough tutorials, we'll use GitHub\
    \ for this purpose (Figure 1.9).\n\nBecause web apps sometimes include sensitive\
    \ information like passwords or API keys, I like to err on the side of caution\
    \ and use a *private* repository. Accordingly, be sure to select the Private option\
    \ when creating the new repository at GitHub, as shown in Figure 1.10. (By the\
    \ way, it's still a bad idea to include passwords or API keys, even in a private\
    \ repo; the best practice is to use environment variables or the like instead.)\n\
    \n10. This file is based in part on the example from the Flask documentation itself.\n\
    \n## Chapter 1: Hello, World!\n\n![](img/b3303452eae4d7974600cd38b159398e_46_0.png)\n\
    \n**Figure 1.9:** Creating a new repository at GitHub.\n\nNext, tell your local\
    \ system about the remote repository (taking care to fill in <username> with your\
    \ GitHub username) and then push it up:\n\n```\n(venv) $ git remote add origin\
    \ https://github.com/<username>/python_tutorial.git\n(venv) $ git push -u origin\
    \ main\n```\n\nThe service we'll be using for Flask deployment is Fly.io. We'll\
