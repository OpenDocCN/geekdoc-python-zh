    \ **arrowprops** determines the properties of the annotation arrow.\n\n![](img/b3303452eae4d7974600cd38b159398e_366_0.png)\n\
    \n**Figure 11.13:** Adding annotations."
  - "[PAGE 367]\n\nFinally, let's add custom colors and line styles, plus a higher\
    \ resolution (in dots per inch, or **dpi**). For convenience, the resulting code,\
    \ shown in Listing 11.8, includes all of the commands needed to create the full\
    \ figure (Figure 11.14) from scratch.\n\n# **Listing 11.8:** The code for a fancy\
    \ sinusoidal plot.\n\n```\nfrom math import tau\n\nimport numpy as np\nimport\
    \ matplotlib.pyplot as plt\n\nx = np.linspace(0, tau, 100)\n\nfig, ax = plt.subplots()\n\
    \nax.set_xticks([0, tau/4, tau/2, 3*tau/4, tau])\nax.set_yticks([-1, -1/2, 0,\
