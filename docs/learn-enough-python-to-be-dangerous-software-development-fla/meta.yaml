    \ get a different result from the one we got in Listing 7.12, as shown in Listing\
    \ 7.14.\n\n**Listing 7.14:** Calling `ispalindrome()` after overriding `processed_content()`.\n\
    \n```python\n>>> reload(palindrome)\n>>> frase = palindrome.TranslatedPhrase(\"\
    recognize\", \"reconocer\")\n>>> frase.ispalindrome()\nTrue\n```\n\nThe resulting\
    \ inheritance hierarchy appears as in Figure 7.6.\n\nThis practice of overriding\
    \ gives us great flexibility. We can trace the execution of `frase.ispalindrome()`\
    \ for the two different cases:\n\nCase 1: Listing 7.11 and Listing 7.12\n\n- 1.\
    \ `frase.ispalindrome()` calls `ispalindrome()` on the `frase` instance, which\
    \ is a `TranslatedPhrase`. Since there is no `ispalindrome()` method in the `TranslatedPhrase`\
    \ object, Python uses the one from `Phrase`."
