    **Figure 1.8:** The hello app running on the cloud IDE.


    > **Box 1.5: Real artists ship**


    As legendary Apple cofounder Steve Jobs once said: *Real artists ship*. What he
    meant was that, as tempting as it is to privately polish in perpetuity, makers
    must *ship* their work—that is, actually finish it and get it out into the world.
    This can be scary, because shipping means exposing your work not only to fans
    but also to critics. “What if people don’t like what I’ve made?” *Real artists
    ship*.


    It’s important to understand that shipping is a separate skill from making. Many
    makers get good at making things but never learn to ship. To keep this from happening
    to us, we’ll follow the practice started in *Learn Enough Git to Be Dangerous*
    and ship several things in this tutorial. Shipping the “hello, world” app in this
    section is only the beginning!'
