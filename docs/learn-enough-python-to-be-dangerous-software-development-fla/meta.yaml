    +   1. 当你对字符串 "1.24e6" 调用 `float()` 时会发生什么？如果对结果再调用 `str()` 呢？

    2.  证明 `int(6.28)` 和 `int(6.98)` 都等于 6。这与 *向下取整函数*（在数学中写作 ⌊x⌋）的行为相同。证明 Python
    的 `math` 模块中有一个 `floor()` 函数，其效果与 `int()` 相同。


    ## 4.2 时间与日期时间


    其他常用的内置对象是密切相关的 `time` 和 `datetime` 模块。例如，我们可以使用 `time()` 方法获取当前时间：


    ```

    >>> import time

    >>> time.time()

    1661191145.946213

    ```


    这返回自 *纪元*（定义为 1970 年 1 月 1 日）以来的秒数。我们可以使用 `ctime()` 方法获取格式更方便的字符串（文档中没有说明，但这可能代表“转换时间”）：


    ```

    >>> time.ctime()

    ''Mon Aug 22 11:00:32 2022''

    ```


    Python 在 `datetime` 模块中提供了许多其他有用的方法。与其他 Python 对象一样，`datetime` 对象包含多种方法：


    ```

    >>> import datetime

    >>> now = datetime.datetime.now()

    >>> now.year

    2022

    >>> now.month

    8

    >>> now.day

    22

    >>> now.hour

    16

    ```


    因为许多有用的方法定义在 `datetime` 模块内的单独 `datetime` 对象上，所以使用 `from` 只导入该对象通常更方便（使用与清单 4.2
    中相同的基本语法）：


    ```

    >>> from datetime import datetime

    >>> now = datetime.now()

    >>> now.year

    2022

    >>> now.day

    22

    >>> now.month

    8

    >>> now.hour

    16

    ```


    这可能会有点令人困惑，确实，一个模块定义一个与模块本身同名的对象是相当不寻常的。


    也可以使用特定的日期和时间初始化 `datetime` 对象，例如首次登月（图 4.2²）：


    ```

    >>> moon_landing = datetime(1969, 7, 20, 20, 17, 40)

    1969-07-20 20:17:40 -0700

    >>> moon_landing.day

    20

    ```


    默认情况下，`datetime` 使用本地时区，但这会给操作带来奇怪的地点依赖性，因此最好使用 UTC：³


    2. 图片由 Castleski/Shutterstock 提供。

    3. 对于大多数实际目的，协调世界时（UTC）与格林威治标准时间相同。但为什么叫 UTC？根据美国国家标准与技术研究院（NIST）时间和频率常见问题解答：**问：**
    为什么使用 UTC 作为协调世界时的缩写，而不是 CUT？**答：** 1970 年，国际电信联盟（ITU）内的一个国际技术专家咨询小组设计了协调世界时系统。ITU
    认为最好指定一个单一的缩写，以便在所有语言中使用，从而最大限度地减少混淆。由于无法就使用英语词序 CUT 或法语词序 TUC 达成一致，因此选择了缩写 UTC
    作为折中方案。


    **图 4.2：** 巴兹·奥尔德林和尼尔·阿姆斯特朗不知怎么就到了月球（并且回来了！），而且没有用 Python。


    ```

    >>> from datetime import timezone

    >>> now = datetime.now(timezone.utc)

    >>> print(now)

    2022-08-22 18:28:03.943097+00:00

    ```


    要创建一个用于登月的 `datetime` 对象，我们需要使用 `tzinfo`（“时区信息”的缩写）传递时区作为 *关键字参数*（首次在第 2.3 节中看到，并在第
    5.1.2 节中进一步讨论）：


    ```

    >>> moon_landing = datetime(1969, 7, 20, 20, 17, 40, tzinfo=timezone.utc)

    >>> print(moon_landing)

    1969-07-20 20:17:40+00:00

    ```


    最后，`datetime` 对象可以相互减去：


    ```

    >>> print(now - moon_landing)

    19390 days, 22:15:36.779053

    ```


    这里的结果是自登月之日起的天数、小时数、分钟数和秒数。（当然，你的结果会有所不同，因为时间在流逝，你的 **datetime.now** 的值也会不同。）


    你可能已经注意到，月份和日期是以 *单位偏移* 值返回的，这与列表使用的零偏移索引（第 3.2 节）不同。例如，在第八个月（八月），**now.month()**
    的返回值是 **8** 而不是 7（如果月份被视为零偏移列表的索引，它应该是 7）。但是，有一个重要的值 *确实* 是作为零偏移索引返回的：


    ```

    >>> moon_landing.weekday()

    6

    ```


    这里 **weekday** 返回星期几的索引，因为它是零偏移的，所以索引 **6** 表示登月发生在星期的第七天。


    我们必须小心，因为在许多地方（包括美国），星期日是第 0 天，确实一些编程语言（如 JavaScript 和 Ruby）遵循这个惯例。但官方的国际标准是星期一是第一天，Python
    遵循这个惯例。


    因此，我们可以通过创建一个包含星期几名称的字符串列表（分配给一个全大写标识符，这是 Python 中表示常量的常见惯例），然后使用 **weekday**
    的返回值作为列表的索引（使用方括号表示法，第 3.1 节）来获取星期几的名称：


    ```

    >>> DAYNAMES = ["Monday", "Tuesday", "Wednesday",

    ...             "Thursday", "Friday", "Saturday", "Sunday"]

    >>> DAYNAMES[moon_landing.weekday()]

    ''Sunday''

    >>> DAYNAMES[datetime.now().weekday()]

    ''Monday''

    ```


    （这些星期几的名称实际上作为 **calendar** 模块的一部分通过 **calendar.day_name** 提供。你只需运行 **import calendar**
    来加载模块。参见第 4.2.1 节中的示例。）当然，你最后一行的结果会有所不同，除非你恰好在星期一阅读本文。


    作为最后的练习，让我们用包含星期几的问候语更新清单 1.11 中的 Flask hello 应用。代码出现在清单 4.3 中，结果如图 4.3 所示。（有关运行
