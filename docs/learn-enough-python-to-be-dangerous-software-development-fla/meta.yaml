  md: "# Selecting Dates\n\nOne of pandas' greatest strengths is its ability to deal\
    \ with times and *time series*, so let's start by taking a look at selecting dates.\
    \ One way we can do this is by searching for laureates by exact birthday as a\
    \ string:\n\n```\n>>> nobel.loc[nobel[\"born\"] == \"1879-03-14\"]\n    id firstname\
    \ ...     city  country\n25  26    Albert ...  Berlin  Germany\n```\n\nYou might\
    \ suspect that a Nobel Prize–winning “Albert” born in 1879 might be Albert Einstein,\
    \ and you'd be right, as we can see by checking the **\"surname\"** field:²⁴\n\
    \n```\n>>> nobel.loc[nobel[\"born\"] == \"1879-03-14\"][\"surname\"]\nEinstein\n\
    ```\n\nLooking closely, we see that Einstein was born on March 14, which is sometimes\
    \ known as Pi Day because of the resemblance between 03-14 (or 3/14 in the American\
    \ calendar system) and the first three digits of π ≈ 3.14. Fans of Pi Day are\
    \ quick to point out how great this is.\n\nAs the founder of Tau Day (https://tauday.com/),\
    \ I was naturally interested in finding some great Nobel laureate who was born\
    \ on 06-28 (6/28) to match the first three digits of τ ≈ 6.28. We've seemingly\
    \ already solved this problem of searching by substring (as in, e.g., Listing\
    \ 11.14), so let's try it out with the **\"born\"** field:\n\n```\n>>> nobel.loc[nobel[\"\
    born\"].str.contains(\"06-08\", na=False)]\n    id  firstname ...          city\
    \  country\n79   79      Maria ...    San Diego CA      USA\n125 126      Klaus\
    \ ...      Stuttgart  Germany\n281 283 F. Sherwood ...       Irvine CA      USA\n\
    304 306      Alexis ...     New York NY      USA\n598 607       Luigi ...    \
    \         NaN       NaN\n790 809   Muhammad ...             NaN       NaN\n889\
    \ 916  William C. ...     Madison NJ      USA\n\n[7 rows x 20 columns]\n```\n\n\
    That's 7 rows. Let's narrow it down by restricting the results to Nobel laureates\
    \ in Physics using the & operator to perform a logical *and* (note that this syntax\
    \ differs from Python itself (Section 2.4.1)):\n\n24. If you're using Jupyter,\
    \ you can probably just read off the full name from the result of evaluating the\
