    \ plus a special (and commonly encountered) value known as *NaN* (“Not a Number”):\n\
    \n```python\n>>> pd.Series([1, 2, 3, \"foo\", np.nan, \"bar\"])\n0       1\n1\
    \       2\n2       3\n3     foo\n4     NaN\n5     bar\ndtype: object\n>>> pd.Series([1,\
