    \ at 0x104858d60>\n```\n\n正如 Python 文档中所述，`reversed()` 返回一个反向 *迭代器*。迭代器是 Python\
    \ 的一个强大工具，它表示一个数据流——在这种情况下，是一个按顺序访问的字符序列。我们将在第 5.3.1 节看到如何定义一种称为 *生成器* 的特殊迭代器，并在第\
    \ 7.2 节实现一个完整的自定义迭代器。\n\n查看 `reversed()` 结果的一种方法是使用 `for` 循环遍历反转对象（清单 5.15）：\n\
    \n**清单 5.15：** 在迭代器上使用 `for` 循环。\n\n```python\n>>> for c in reversed(\"foobar\"\
    ):\n...     print(c)\n...\nr\na\nb\no\no\nf\n```"
