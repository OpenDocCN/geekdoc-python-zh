  - '[PAGE 128]


    We can obtain the same result in a more robust way by splitting on whitespace.
    Consulting the quick reference (Figure 4.5), we find that the regex for whitespace
    is \s, and the way to indicate “one or more” is with the plus sign +. Thus, we
    can split on whitespace as follows:


    ```

    >>> re.split(r"\s+", "ant bat cat duck")

    ["ant", "bat", "cat", "duck"]

    ```


    The reason this is so nice is that now we can get the same result if the strings
    are separated by multiple spaces, tabs, newlines, etc.:


    ```

    >>> re.split(r"\s+", "ant    bat\tcat\nduck")

    ["ant", "bat", "cat", "duck"]

    ```


    As we saw in Section 3.1, this pattern is so useful that it’s actually the default
    behavior for split(). When we call split() with zero arguments, Python splits
    on whitespace automatically:


    ```

    >>> "ant    bat\tcat\nduck".split()

    ["ant", "bat", "cat", "duck"]

    ```


