  md: "# 11.2 Numerical Computations with NumPy\n\nNumPy includes lots of support\
    \ for common numerical operations such as linear algebra, in this case using super-optimized\
    \ and battle-tested packages like BLAS and LAPACK. These routines are mostly written\
    \ in C and Fortran, but we don't have to know those languages because they are\
    \ wrapped by Python via the `linalg` library.⁷\n\nLet's take a look at a quick\
    \ example of NumPy's linear algebra support. The sub-array **A** that we just\
    \ defined is a square matrix (the same number of rows and columns), which means\
    \ that we can try calculating its matrix inverse. The inverse of an invertible\
    \ matrix, written as $A^{-1}$ (\"A inverse\"), satisfies the relations $AA^{-1}\
    \ = A^{-1}A = I$, where $I$ is the $n \\times n$ identity matrix (1s on the diagonal,\
    \ 0s everywhere else). Matrix inversion is available in NumPy via `linalg.inv()`:\
    \ \n\n```\n>>> Ainv = np.linalg.inv(A)           # inverse of a matrix\n>>> Ainv\n\
    array([[-1.66666667,  0.66666667],\n       [ 1.33333333, -0.33333333]])\n```\n\
    \nWe can try adding and multiplying the matrices using `+` and `*`, respectively:\n\
    \n```\n>>> A + Ainv\narray([[-0.66666667,  2.66666667],\n       [ 5.33333333,\
    \  4.66666667]])\n>>> A * Ainv\narray([[-1.66666667,  1.33333333],\n       [ 5.33333333,\
    \ -1.66666667]])\n```\n\nAlthough the array sum **A + Ainv** has no particular\
    \ mathematical significance in this context, we see that the elements have been\
    \ added in accordance with NumPy vectorized operations (Section 11.2.1). Similarly,\
    \ the array product **A * Ainv** has also been calculated term by term. This is\
    \ a possible source of confusion because in some systems (notably MATLAB) the\
    \ `*` operator performs *matrix multiplication* in this context, yielding the\
    \ expected result $AA^{-1} = I$. In NumPy, the most convenient way to perform\
    \ matrix multiplication is with the `@` operator:⁸\n\n```\n>>> A @ Ainv\narray([[1.,\
    \ 0.],\n       [0., 1.]])\n```\n\n7. Although I did end up doing a lot of C programming\
    \ in graduate school anyway, I was able to achieve my childhood dream of never\
    \ having to learn Fortran.\n8. The `matmul()` function works as well; with `numpy`\
    \ imported as `np`, this would appear as `np.matmul(A, Ainv)` and is equivalent\
    \ to `A @ Ainv`."
  merge: -1
