    ... else:

    ...     print("Neither of the strings is empty.")

    ...

    At least one of the strings is empty!

    ```


    Note from Listing 2.13 that **or** isn''t *exclusive*, meaning that the result
    is true even when *both* statements are true. This stands in contrast to colloquial
    usage, where a statement like "I want fries or a baked potato" implies that you
    want either fries *or* a baked potato, but you don''t want both (Figure 2.6<sup>13</sup>).


    13. Image courtesy of Rikaphoto/Shutterstock.'
