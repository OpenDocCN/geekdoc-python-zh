  md: "# 11.2.2 Multidimensional Arrays\n\nNumPy also includes support for multidimensional\
    \ arrays:\n\n```\n>>> a = np.array([[1, 2, 3], [4, 5, 6]])\n>>> a\narray([[1,\
    \ 2, 3],\n       [4, 5, 6]])\n```\n\nNumPy arrays have an attribute called **shape**\
    \ that returns the number of rows and columns:\n\n```\n>>> a.shape\n(2, 3)\n```\n\
    \nHere **(2, 3)** corresponds to the 2 rows (**[1, 2, 3]** and **[4, 5, 6]**)\
    \ and the 3 columns (**[1, 4]**, **[2, 5]**, and **[3, 6]**). You can think of\
    \ this as a 2 × 3 matrix.\nIn analogy with list slicing (Section 3.3), NumPy supports\
    \ array slicing for ndarrays of all dimensions. The colon notation introduced\
    \ in Section 3.3 is especially useful for selecting full rows or columns by using\
    \ a single colon by itself:\n\n```\n>>> a[0, :]        # first row\narray([1,\
    \ 2, 3])\n>>> a[:, 0]        # first column\narray([1, 4])\n```\n\nBy combining\
    \ colons with number ranges, we can slice out a subarray:\n\n```\n>>> A = a[0:2,\
    \ 0:2]\n>>> A\narray([[1, 2],\n       [4, 5]])\n```\n\nAs with list slicing, you\
    \ can omit the beginning or end of the range and get the same result:\n\n```\n\
    >>> A = a[:2, :2]\n>>> A\narray([[1, 2],\n       [4, 5]])\n```"
