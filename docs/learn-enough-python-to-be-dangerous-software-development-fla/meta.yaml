  md: '# CHAPTER 1

    Hello, World!


    Welcome to *Learn Enough Python to Be Dangerous*!


    This tutorial is designed to get you started writing practical and modern Python
    programs as fast as possible, with a focus on the real tools used every day by
    software developers. You’ll see how everything fits together by learning skills
    like testing and test-driven development, publishing packages, beginning web development,
    and data science. As a result, *Learn Enough Python to Be Dangerous* can serve
    either as a standalone introduction or as an excellent prerequisite for longer
    and more syntax-heavy Python tutorials, of which there are many excellent ones.


    Python is one of the world’s most popular programming languages, and for good
    reason. Python has a clean syntax, flexible data types, a wealth of useful libraries,
    and a powerful and elegant design that supports multiple styles of programming.
    Python has seen particularly robust adoption for command-line programs (also known
    as *scripting*, as discussed in Chapter 9), web development (via frameworks like
    *Flask* (Chapter 10) and *Django*), and data science (especially data analysis
    using *pandas* and machine learning with libraries like *scikit-learn* (Chapter
    11)).


    Just about the only things Python isn’t good for are running inside a web browser
    (for which JavaScript (https://www.learnenough.com/javascript-tutorial) is necessary)
    and writing programs where speed is of the essence. And even in the latter case,
    specialized libraries like NumPy (Section 11.2) can give us the speed of a lower-level
    language like C with the power and flexibility of a higher-level language like
    Python.¹


    1. “Higher-level” languages like Python, JavaScript, and Ruby generally have greater
    support for abstraction and perform automatic memory management.'
