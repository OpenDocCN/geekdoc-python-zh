    # CHAPTER 11

    Data Science


    Data science is a rapidly developing field that combines tools from computation
    and statistics to create insights and draw conclusions from data. That description
    may sound a little vague, and indeed there is no universally accepted definition
    of the field; for example, some people think “data science” is just a fancy term
    for “statistics”, while others hold that statistics is the *least* important part
    of data science.


    Luckily, there *is* broad agreement that Python is an excellent tool for data
    science, whatever it is exactly.¹ There is also a general consensus about which
    specific Python tools are most useful for the subject. The purpose of this chapter
    is to introduce some of those tools and use them to investigate some aspects of
    data science for which Python is especially well-suited.


    These subjects include Jupyter notebooks for interactive calculations (Section
    11.1), NumPy for numerical computations (Section 11.2), Matplotlib for data visualization
    (Section 11.3), pandas for data analysis (Section 11.4, Section 11.5, and Section
    11.6), and scikit-learn for machine learning (Section 11.7).² Almost all other
    Python data-science tools (such as PySpark, Databricks, and others) also build
    on the libraries in this chapter.


    Data science is far too big to cover in so small a space, but this chapter will
    give you a great foundation for learning more about the subject. Section 11.8
    includes some suggestions and further resources if you decide you''d like to pursue
    data science further.


    1. Python’s main open-source rival in this space is R, which was originally developed
    by statisticians. Python has the advantage of being a general-purpose programming
    language as well, which is part of why many data scientists have come to prefer
    it. Nevertheless, R is undeniably powerful, and there are many resources for learning
    data science that actually cover both Python and R at the same time. I recommend
    using one of those resources if for any reason it is important for you to know
    R.

    2. All of these resources are open-source software.


    ## 11.1 Data Science Setup


    The first step is setting up our environment for doing data-science investigations.
    Here is an overview of some of the most important tools for Python data science:


    - IPython and Jupyter: Packages that provide the computational environment in
    which many Python-using data scientists work.

    - NumPy: A library that makes a variety of mathematical and statistical operations
    easier; it is also the basis for many features of the pandas library.

    - Matplotlib: A visualization library that makes it quick and easy to generate
    graphs and charts from our data.

    - pandas: A Python library created specifically to facilitate working with data.
    This is the bread and butter of a lot of Python data-science work.

    - scikit-learn: Probably the most popular library for machine learning in Python.


    Because the use of IPython and Jupyter is technically optional, we''ll start by
    installing the packages that will be needed no matter what your environment looks
    like. For convenience, I suggest creating a new directory and setting up a fresh
    virtual environment, as shown in Listing 11.1.


    **Listing 11.1:** Setting up a data-science environment.


    ```

    $ cd ~/repos

    $ mkdir python_data_science

    $ cd python_data_science/

    $ python3 -m venv venv

    $ source venv/bin/activate

    (venv) $

    ```


    I also recommend putting your project under version control with Git and setting
    up a remote repository at GitHub or another repository host of your choice. If
    you go this route, you can use the `.gitignore` file shown in Listing 11.2, which
    includes an extra line for ignoring unneeded Jupyter changes.


    **Listing 11.2:** A `.gitignore` file for Python data science.


    ```

    .gitignore


    venv/


    *.pyc

    __pycache__/


    instance/


    .pytest_cache/

    .coverage

    htmlcov/


    dist/

    build/

    *.egg-info/


    .ipynb_checkpoints


    .DS_Store

    ```


    At this point, we''re ready to install the necessary packages. As with the rest
    of this tutorial, we''ll install exact versions for maximum future compatibility,
    but feel free to try the latest versions by leaving off the `==<version number>`
    part. Just be prepared for unpredictable results. The full set of necessary packages
    is shown in Listing 11.3.


    **Listing 11.3:** Installing packages for Python data science.


    ```

    (venv) $ pip install numpy==1.23.3

    (venv) $ pip install matplotlib==3.6.1

    (venv) $ pip install pandas==1.5.0

    (venv) $ pip install scikit-learn==1.1.2

    ```


    We saw as early as Section 1.3 that many Python developers prefer the Conda system
    for managing packages. If anything, this is even more the case among Python data
    scientists. But as also noted in Section 1.3, Conda makes more extensive changes
    to the environment and is (at least in my experience) harder to reverse or tear
    down if you need to reset the system. As you gain experience with using Python
    on your system, I suggest taking another look at Conda to see if it meets your
    needs.'
