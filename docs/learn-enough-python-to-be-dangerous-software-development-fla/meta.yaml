    行的用途。）相反，我们将遵循上面提到的两个步骤中的第二步，使用 **chmod**（“更改模式”）命令结合 **+x**（“添加可执行权限”）使文件本身可执行：


    ```

    (venv) $ chmod +x hello

    ```


    此时，该文件应该是可执行的，我们可以通过在命令前加上 **./** 来执行它，这告诉我们的系统在当前目录（点 = .）中查找可执行文件。（将 **hello**
    脚本放在 PATH（https://www.learnenough.com/text-editor-tutorial/advanced_text_editing#code-export_path）上，以便可以从任何目录调用它，这留作练习。）结果如下所示：


    ```

    (venv) $ ./hello

    hello, world!

    ```


    成功！我们现在编写了一个可工作的 Python shell 脚本，适合进行扩展和细化。如上文简要提到的，我们将在第 9.3 节看到一个实际实用脚本的例子。


