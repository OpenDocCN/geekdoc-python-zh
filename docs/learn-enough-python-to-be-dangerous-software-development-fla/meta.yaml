  md: '# CHAPTER 8

    Testing and Test-Driven Development


    Although rarely covered in introductory programming tutorials, *automated testing*
    is one of the most important subjects in modern software development. Accordingly,
    this chapter includes an introduction to testing in Python, including a first
    look at *test-driven development*, or TDD.


    Test-driven development came up briefly in Section 6.5.1, which promised that
    we would use testing techniques to add an important capability to finding palindromes,
    namely, being able to detect complicated palindromes such as “A man, a plan, a
    canal—Panama!” (Figure 6.5) or “Madam, I’m Adam.” (Figure 8.1¹). This chapter
    fulfills that promise.


    As it turns out, learning how to write Python tests will also give us a chance
    to learn how to create (and publish!) a Python package, another exceptionally
    useful Python skill rarely covered in introductory tutorials.


    Here’s our strategy for testing the current palindrome code and extending it to
    more complicated phrases:


    +   1. Set up our initial package (Section 8.1).

    2. Write automated tests for the existing `ispalindrome()` functionality (Section
    8.2).

    3. Write a *failing* test for the enhanced palindrome detector (RED) (Section
    8.3).


    1. “The Temptation of Adam” by Tintoretto. Image courtesy of Album/Alamy Stock
    Photo.'
