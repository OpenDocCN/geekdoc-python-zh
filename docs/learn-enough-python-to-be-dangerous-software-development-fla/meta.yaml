    \ test session starts =============================\ncollected 3 items\n\ntests/test_site_pages.py\
    \ ...                                          [100%]\n\n==============================\
    \ 3 passed in 0.01s ================================\n```\n\nA quick check in\
    \ the browser confirms that things are working as expected (Figure 10.8).\n\n\
    But of course many things could have gone wrong in the refactoring we just did,\
    \ and our test suite would have caught the problem immediately. Moreover, it would\
    \ catch errors even on pages we didn't happen to check; for example, Figure 10.8\
    \ shows the index page, but how do we know the About page is working as well?\
    \ The answer is that we don't, and the test suite saves us the trouble of checking\
