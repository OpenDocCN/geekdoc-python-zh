    \ act as a *client* for the application code, thereby helping determine its design\
    \ and its interface with other parts of the system.\n\nAlthough none of the above\
    \ benefits *require* that tests be written first, there are many circumstances\
    \ where test-driven development (TDD) is a valuable tool to have in your kit.\
    \ Deciding when and how to test depends in part on how comfortable you are writing\
    \ tests; many developers find that, as they get better at writing tests, they\
    \ are more inclined to write them first. It also depends on how difficult the\
    \ test is relative to the application code, how precisely the desired features\
    \ are known, and how likely the feature is to break in the future.\n\nIn this\
    \ context, it's helpful to have a set of guidelines on when we should test first\
