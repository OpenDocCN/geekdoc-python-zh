    \ define a layout template for the repeated code:\n\n```\n(venv) $ touch palindrome_detector/templates/layout.html\n\
    ```\n\nThe contents of `layout.html` are the common HTML structure identified\
    \ in Listing 10.15 combined with the special `block` function supplied by the\
    \ Jinja template system. This involves replacing the HTML comment\n\n<!-- page-specific\
    \ content -->\n\nin Listing 10.15 with the Jinja code\n\n{% block content %}{%\
    \ endblock %}\n\nThe `{% ... %}` syntax is used by Jinja to indicate code inside\
    \ an HTML document.⁶ This particular code inserts the text in a variable called\
    \ **content** (which we'll define for each page in just a moment). The resulting\
    \ template appears as in Listing 10.22.\n\n## Listing 10.22: A layout with shared\
    \ HTML structure.\n\n*palindrome_detector/templates/layout.html*\n\n```html\n\
    <!DOCTYPE html>\n<html>\n  <head>\n    <meta charset=\"utf-8\">\n    <title>Learn\
    \ Enough Python Sample App</title>\n    <link rel=\"stylesheet\" type=\"text/css\"\
    \ href=\"/static/stylesheets/main.css\">\n    <link href=\"https://fonts.googleapis.com/css?family=Open+Sans:300,400\"\
    \n          rel=\"stylesheet\">\n  </head>\n  <body>\n    <a href=\"/\" class=\"\
    header-logo\">\n      <img src=\"/static/images/logo_b.png\" alt=\"Learn Enough\
    \ logo\">\n    </a>\n    <div class=\"container\">\n      <div class=\"content\"\
    >\n        {% block content %}{% endblock %}\n      </div>\n    </div>\n  </body>\n\
    </html>\n```\n\nAt this point, we can remove the shared material from our pages,\
    \ leaving only the core content, as shown in Listing 10.23, Listing 10.24, and\
