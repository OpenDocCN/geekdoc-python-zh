    \ 5.6：** 定义一个同时包含 *args 和 **kwargs 的函数。\n\n```\n>>> def foo(*args, **kwargs):\n\
    ...     print(args)\n...     print(kwargs)\n...\n>>> foo(\"This\", \"is a bunch\"\
    , \"of arguments\", \"to the function\",\n...     a=\"hello\", b=\"world\", bar=\"\
    good day!\")\n```\n\n## 5.2 文件中的函数\n\n虽然在 REPL 中定义函数对于演示目的很方便，但有点繁琐，更好的做法是将它们放在文件中（就像我们在第\
    \ 4.5 节中对脚本所做的那样）。我们将首先把第 5.1 节中定义的函数移动到 hello_app.py 中，然后将其移动到更方便的外部文件中。\n\n\
    使用这样的外部资源需要一个名为 __init__.py 的有点神秘的文件，它使 Python 将我们的项目目录解释为一个包。该文件不必有任何内容——它只需要存在，我们可以通过\
    \ touch 来安排：\n\n```\n(venv) $ touch __init__.py\n```\n\n（当我们制作一个正式的包时，我们将进一步了解这个文件要求。）这样，我们就可以像第\
    \ 1.5 节那样在命令行运行我们的 Flask 应用了：\n\n```\n(venv) $ flask --app hello_app.py --debug\
    \ run\n```\n\n让我们回顾一下我们 hello 应用程序的当前状态，它看起来像清单 5.7。（这与清单 4.3 相同；如果你完成了第 4.2.1\
    \ 节的练习，你的代码可能有所不同。）\n\n**清单 5.7：** 我们 hello 应用程序的当前状态。\n*hello_app.py*\n\n```\n\
