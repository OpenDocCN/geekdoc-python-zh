    \ result appears in Figure 11.36.\nWe can find a good fit for the 4 blobs using\
    \ an algorithm called *k*-means clustering:\n\n```python\n>>> from sklearn.cluster\
    \ import KMeans\n>>> kmeans = KMeans(n_clusters=4)\n>>> kmeans.fit(X)\n```\n\n\
    Note how similar the steps are to the model fits in Section 11.7.2. We can find\
    \ the model’s estimate for the center of each cluster using the `cluster_centers_`\
