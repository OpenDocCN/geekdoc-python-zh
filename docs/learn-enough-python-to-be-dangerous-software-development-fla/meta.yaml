    Suppose we wanted to write a function to find numbers that contain all of the
    digits 0–9. One clever way of doing this is noting that the **set()** function
    introduced in Section 3.6 can actually take a string as an argument, and returns
    the set of characters that make up the string:


    ```

    >>> set("1231231234")

    {''2'', ''4'', ''3'', ''1''}

    ```


    Note that, as required for sets, repeated elements are simply ignored. (Also recall
    that the order of the elements doesn''t matter.)


    This observation suggests that we can detect a number having all ten digits by
    converting it to a string as in Section 4.1.2 and then comparing it to the set
    corresponding to all digits:


    ```

    >>> str(132459360782)

    ''132459360782''

    >>> set(str(132459360782))

    {''8'', ''7'', ''9'', ''3'', ''4'', ''0'', ''2'', ''6'', ''1'', ''5''}

    >>> set(str(130245936782)) == set("0123456789")

    True

    ```


