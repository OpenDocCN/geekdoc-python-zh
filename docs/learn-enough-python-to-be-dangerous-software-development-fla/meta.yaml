    \ understand is a classic hallmark of technical sophistication (Box 1.2).\n\n\
    We'll put our \"hello, world\" app in a file called `hello_app.py`:\n\n```\n(venv)\
    \ $ touch hello_app.py\n```\n\nThe code itself closely parallels the program in\
    \ Figure 1.4, as seen in Listing 1.11.\n\n**Listing 1.11:** A \"hello, world\"\
    \ web app.\n`python_tutorial/hello_app.py`\n\n```python\nfrom flask import Flask\n\
    \napp = Flask(__name__)\n\n@app.route(\"/\")\ndef hello_world():\n    return \"\
    <p>hello, world!</p>\"\n```\n\n![](img/b3303452eae4d7974600cd38b159398e_40_0.png)\n\
    \nThe code in Listing 1.11 defines the behavior for the *root* URL / when responding\
    \ to an ordinary browser request (known as GET). The response itself is the required\
    \ “hello, world!” string, which will be returned to the browser as a (very simple)\
    \ web page.\n\nTo run the web application in Listing 1.11, all we need to do is\
