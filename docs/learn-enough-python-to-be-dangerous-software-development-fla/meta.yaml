    \     <img src=\"/static/images/logo_b.png\" alt=\"Learn Enough logo\">\n    </a>\n\
    \    <div class=\"container\">\n        <div class=\"content\">\n\n<h1>About</h1>\n\
    \n<p>\n    This site is the final application in\n    <a href=\"https://www.learnenough.com/python-tutorial\"\
    ><em>Learn Enough Python to Be Dangerous</em></a>\n    by <a href=\"https://www.michaelhartl.com/\"\
    >Michael Hartl</a>,\n    a tutorial introduction to the\n    <a href=\"https://www.python.org/\"\
    >Python programming language</a> that\n    is part of\n    <a href=\"https://www.learnenough.com/\"\
    >LearnEnough.com</a>.\n</p>\n        </div>\n    </div>\n</body>\n</html>\n```\n\
    \n## Listing 10.14: The initial Palindrome Detector template.\n\npalindrome_detector/templates/palindrome.html\n\
    \n```html\n<!DOCTYPE html>\n<html>\n  <head>\n    <meta charset=\"utf-8\">\n \
    \   <title>Learn Enough Python Sample App</title>\n    <link rel=\"stylesheet\"\
    \ type=\"text/css\" href=\"/static/stylesheets/main.css\">\n    <link href=\"\
    https://fonts.googleapis.com/css?family=Open+Sans:300,400\"\n          rel=\"\
    stylesheet\">\n  </head>\n  <body>\n    <a href=\"/\" class=\"header-logo\">\n\
    \      <img src=\"/static/images/logo_b.png\" alt=\"Learn Enough logo\">\n   \
    \ </a>\n    <div class=\"container\">\n      <div class=\"content\">\n\n<h1>Palindrome\
    \ Detector</h1>\n\n<p>This will be the palindrome detector.</p>\n\n      </div>\n\
    \    </div>\n  </body>\n</html>\n```\n\nVisiting 127.0.0.1:5000 causes Flask to\
    \ serve up the default (index) page, as shown in Figure 10.4. To get to the About\
    \ page, we can type 127.0.0.1:5000/about into the browser address bar, as seen\
    \ in Figure 10.5.\n\nFigure 10.4 and Figure 10.5 show that the pages are basically\
    \ working, but Listing 10.12 and subsequent listings include both images and a\
    \ CSS file, which aren't currently present on the local system. We can change\
    \ this situation by downloading the needed files from the Learn Enough CDN and\
    \ putting them in the `static` directory, which is a standard choice for such\
    \ static assets.\n\nThe way to do this is to use `curl` to fetch a `tarball`,\
    \ which is similar to a ZIP file and is common on Unix-compatible systems:\n\n\
    ```\n(venv) $ curl -OL https://cdn.learnenough.com/le_python_palindrome_static.tar.gz\n\
    ```\n\n**Figure 10.4:** The initial Home page.\n\nThis kind of file is created\
    \ by `tar`, or “tape archive”, whose name is an old-school throwback to the time\
    \ when external tapes were routinely used for large backups. Meanwhile, the `gz`\
    \ extension refers to the important `gzip` method for compressing files.\n\nThe\
    \ way to unzip the file is to use `tar zxvf`, which stands for “**tape archive\
    \ gzip extract verbose file**” (as noted briefly in Section 8.5.2, the backslash\
    \ \\ is a *continuation character* and should be typed literally, but the right\
    \ angle bracket > should be added by your shell program automatically and should\
    \ not be typed):³\n\n```\n(venv) $ tar zxvf le_python_palindrome_static.tar.gz\
    \ \\\n> --directory palindrome_detector/\n```\n\n3. I created this tarball using\
    \ the command `tar zcf <filename>.tar.gz`, where `c` stands for `create`.\n\n\
    **Figure 10.5:** The initial About page.\n\n```\nx static/\nx static/static/images/\n\
    x static/static/stylesheets/\nx static/static/stylesheets/main.css\nx static/static/images/sator_square.jpg\n\
    x static/static/images/logo_b.png\n(venv) $ rm -f le_python_palindrome_static.tar.gz\n\
    ```\n\nWith experience, you may prefer to omit the `v` flag, but I suggest using\
    \ verbose output initially so that you can see what's going on during the extraction\
    \ process. By the way, note that `tar` flags are just letters by themselves, with\
    \ no preceding hyphens as in most other Unix commands. On many systems, you can\
    \ in fact use hyphens, as in `tar -z -x -v -f <filename>`, but for reasons unknown\
    \ to me the usual convention with `tar` is to omit them.\n\n**Figure 10.6:** A\
    \ nicer-looking About page.\n\nAs seen from the verbose output above, unzipping\
    \ the file has created a **static** directory:\n\n```\n(venv) $ ls palindrome_detector/static\n\
    images       stylesheets\n```\n\nRefreshing the About page confirms that the logo\
    \ image and CSS are now working (Figure 10.6). The improvement on the Home page\
    \ is even more dramatic, as seen in Figure 10.7.\n\n### 10.2.1 Exercises\n\n-\
    \ 1. Visit the /palindrome URL and confirm that the CSS and images are working.\n\
    - 2. Make a commit and deploy the changes.\n\n**Figure 10.7:** A much-improved\
    \ Home page.\n\n## 10.3 Layouts\n\nAt this point, our app is looking pretty good,\
    \ but there are two significant blemishes: The HTML code for the three pages is\
    \ highly repetitive, and navigating by hand from page to page is rather cumbersome.\
    \ We'll fix the first blemish in this section, and the second in Section 10.4.\
    \ (And of course our app doesn't yet detect palindromes, which is the subject\
    \ of Section 10.5.)\n\nIf you followed *Learn Enough CSS & Layout to Be Dangerous*\
    \ (https://www.learnenough.com/css-and-layout), you'll know that the *Layout*\
    \ in the title referred to page layout generally—using Cascading Style Sheets\
    \ to move elements around on the page, align them properly, etc.—but we also saw\
    \ (https://www.learnenough.com/css-and-layout-tutorial/struct-layout#cha-struct-layout)\
    \ that doing this properly requires defining *layout templates* that capture common\
    \ patterns and eliminate duplication.\n\nIn the present case, each of our site's\
    \ pages has the same basic structure, as shown in Listing 10.15.\n\n## Listing\
    \ 10.15: The HTML structure of our site's pages.\n\n```html\n<!DOCTYPE html>\n\
    <html>\n  <head>\n    <meta charset=\"utf-8\">\n    <title>Learn Enough Python\
    \ Sample App</title>\n    <link rel=\"stylesheet\" type=\"text/css\" href=\"/static/stylesheets/main.css\"\
    >\n    <link href=\"https://fonts.googleapis.com/css?family=Open+Sans:300,400\"\
    \n          rel=\"stylesheet\">\n  </head>\n  <body>\n    <a href=\"/\" class=\"\
    header-logo\">\n      <img src=\"/static/images/logo_b.png\" alt=\"Learn Enough\
    \ logo\">\n    </a>\n    <div class=\"container\">\n      <div class=\"content\"\
    >\n        <!-- page-specific content -->\n      </div>\n    </div>\n  </body>\n\
    </html>\n```\n\nEverything except the page-specific content (indicated by the\
    \ highlighted HTML comment) is the same on each page. In *Learn Enough CSS & Layout\
    \ to Be Dangerous*, we eliminated this duplication using Jekyll templates (https://www.learnenough.com/css-and-layout-tutorial/struct-layout#sec-jekyll-templates);\
    \ in this tutorial, we'll use the *Jinja templating engine* instead, which is\
    \ the default template system for Flask.\n\nRight now, our site is currently working,\
    \ in the sense that each page has the proper content at this stage of development.\
    \ We're about to make a change that involves moving around and deleting a bunch\
    \ of HTML, and we'd like to do this without breaking the site. Does that sound\
    \ like something we've seen before?\n\nIt does indeed. This is exactly the kind\
    \ of problem we faced in Chapter 8 when we developed and then refactored the palindrome\
    \ package. In that case, we wrote automated tests to catch any regressions, and\
    \ in this case we're going to do the same. (I started making websites long before\
    \ automated testing of web applications was possible, much less the norm, and\
    \ believe me, automated tests are a *huge* improvement over testing web apps by\
    \ hand.)\n\nTo get started, we'll add **pytest** as we did in Section 8.1:\n\n\
    ```\n(venv) $ pip install pytest==7.1.3\n```\n\n(By design, our tests will be\
    \ as simple as possible; for more sophisticated tests, see the pytest-flask project\
    \ (https://pytest-flask.readthedocs.io/en/latest/index.html).)\n\nIn order to\
    \ get our tests to work, we have to install our app locally as an editable Python\
    \ package. Without the installation, you'll probably get an error that looks like\
    \ this:\n\n```\nE   ModuleNotFoundError: No module named 'palindrome_detector'\n\
    ```\n\nTo prevent this, run the same command as in Listing 8.18, shown again in\
    \ Listing 10.16.\n\n## Listing 10.16: Installing the app as an editable package.\n\
    \n```\n$ pip install -e .\n```\n\nWe'll put the tests themselves in a **tests**\
    \ directory, with one test file to start:\n\n```\n(venv) $ mkdir tests\n(venv)\
    \ $ touch tests/test_site_pages.py\n```\n\nWe'll add a second test file in Section\
    \ 10.5.1.\n\nOur key tool in writing tests for our web app is the **client** object,\
    \ which has a **get()** method that issues a GET request to a URL, thereby simulating\
    \ visiting the corresponding page in a web browser. The result of such a request\
    \ is a **response** object, which has a variety of useful attributes, including\
    \ **status_code** (indicating the HTTP response code returned by the request)\
    \ and **text** (which contains the text of the HTML returned by our application).\
    \ We can define such a **client** object in the standard configuration file **conftest.py**:\n\
    \n```\n(venv) $ touch tests/conftest.py\n```\n\nThe code itself appears in Listing\
    \ 10.17. (As with the rest of the configuration code in this chapter, Listing\
    \ 10.17 is simply adapted from the Flask documentation.)"
