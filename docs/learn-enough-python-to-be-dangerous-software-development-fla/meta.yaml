  md: 'OK, the dates are being stored as strings, so it''s not surprising that simple
    subtraction didn''t work. Let''s try converting to **datetime** objects:


    ```

    >>> diff = pd.to_datetime(bethe["died"]) - pd.to_datetime(bethe["born"])

    >>> diff

    88    36042 days

    dtype: timedelta64[ns]

    ```


    That''s much more promising, but it''s a Series of **timedelta64** objects, though,
    rather than floats. We can fix this by using **dt** to gain access to the datetime
    directly and **days** to find the number of days:


    ```

    >>> diff.dt.days

    88    36042

    dtype: int64

    ```


    At this point, we could then divide by 365 (or 365.25) to get the approximate
    number of years, which is probably good enough for a histogram, but it isn''t
    quite right because of leap years, the number of which will vary based on the
    exact date range. Luckily, NumPy comes with a method called **timedelta64** that
    handles this automatically:


    ```

    >>> diff/np.timedelta64(1, "Y")

    88    98.679644

    dtype: float64

    ```


    Here **1**, **"Y"** refers to a time delta (change) of "1 Year".

    Now let''s apply the same idea to the full list of Nobel laureates:


    ```

    >>> nobel["born"] = pd.to_datetime(nobel["born"])

    dateutil.parser._parser.ParserError: month must be in 1..12: 1873-00-00

    ```


    Here there''s an error because at least one of the **"born"** dates has **00-00**
    for the month and year. Why?'
