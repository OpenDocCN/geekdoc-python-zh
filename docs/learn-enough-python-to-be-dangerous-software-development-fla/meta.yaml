    \ 1.5 的唯一区别是 URL）。\n\n仅仅让一个 Web 应用工作，即使是在本地，也是一项巨大的成就。但真正的*重头戏*是将应用部署到实际的 Web\
    \ 上。这是第 1.5.1 节的目标。\n\n### 1.5.1 部署\n\n既然我们已经让应用在本地运行，我们就可以将其部署到生产环境了。这在入门教程中过去几乎是不可能的，但近年来技术格局已经显著成熟，以至于我们实际上有丰富的选择。结果将是第\
    \ 1.5 节中应用的生产版本。\n\n## 1.5 在 Web 浏览器中运行 Python\n\n![](img/b3303452eae4d7974600cd38b159398e_43_0.png)\n\
    \n**图 1.7：** 预览 hello 应用。\n\n首次部署会有一些开销，但尽早并频繁地部署是 Learn Enough *交付*（Box 1.5）理念的核心部分。此外，像“hello,\
    \ world”这样的简单应用是首次部署的最佳类型，因为出错的可能性要小得多。\n\n与之前教程（包括 *Learn Enough CSS & Layout\
    \ to Be Dangerous* (https://www.learnenough.com/css-and-layout) 和 *Learn Enough\
    \ JavaScript to Be Dangerous*）中使用的 GitHub Pages 部署选项一样，我们的第一步是使用 Git 将项目置于版本控制之下（如\
    \ *Learn Enough Git to Be Dangerous* (https://www.learnenough.com/git-tutorial/getting_started#sec-initializing_the_repo)\
    \ 中所述）。虽然对于本节使用的部署解决方案来说，这并非严格必要，但拥有一个完全版本化的项目总是一个好主意，这样我们就能更容易地从任何错误中恢复。\n\n\
    ![](img/b3303452eae4d7974600cd38b159398e_44_0.png)\n\n**图 1.8：** 在云 IDE 上运行的 hello\
    \ 应用。\n\n> **框 1.5：真正的艺术家懂得交付**\n>\n> 正如传奇的苹果联合创始人史蒂夫·乔布斯曾经说过：*真正的艺术家懂得交付*。他的意思是，尽管无休止地私下打磨作品很诱人，但创作者必须*交付*他们的作品——也就是说，真正完成它并将其推向世界。这可能很可怕，因为交付意味着将你的作品不仅展示给粉丝，也展示给批评家。“如果人们不喜欢我做的东西怎么办？”*真正的艺术家懂得交付*。\n\
    >\n> 重要的是要理解，交付是一项与创作不同的技能。许多创作者擅长制作东西，但从未学会交付。为了防止这种情况发生在我们身上，我们将遵循 *Learn Enough\
    \ Git to Be Dangerous* 中开始的做法，并在本教程中交付几样东西。在本节中交付“hello, world”应用仅仅是个开始！\n\n我们的第一步是创建一个\
    \ **.gitignore** 文件，告诉 Git 忽略我们不想版本控制的文件和目录。使用 **touch .gitignore**（或任何你喜欢的其他方法）创建文件，然后填入清单\
    \ 1.14 所示的内容。<sup>10</sup>\n\n**清单 1.14：** 忽略某些文件和目录。\n\n```\n.gitignore\n\nvenv/\n\
    \n*.pyc\n__pycache__/\n\ninstance/\n\n.pytest_cache/\n.coverage\nhtmlcov/\n\n\
    dist/\nbuild/\n*.egg-info/\n\n.DS_Store\n```\n\n接下来，初始化仓库：\n\n```\n(venv) $ git\
    \ init\n(venv) $ git add -A\n(venv) $ git commit -m \"Initialize repository\"\n\
