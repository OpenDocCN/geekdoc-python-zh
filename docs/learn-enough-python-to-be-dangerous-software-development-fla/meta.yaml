    **Figure 2.2:** A concrete manifestation of computer variables.


    As a concrete example, we can create variables for a first name and a last name
    using the = sign, as shown in Listing 2.3.


    **Listing 2.3:** Using = to assign variables.


    ```

    >>> first_name = "Michael"

    >>> last_name = "Hartl"

    ```


    Here = associates the identifier **first_name** with the string "**Michael**"
    and the identifier **last_name** with the string "**Hartl**".


    The identifiers **first_name** and **last_name** in Listing 2.3 are written in
    so-called snake case,^7 whose name origins are obscure but which is probably the
    most common convention for Python variable names (Figure 2.3^8). (In contrast,
    Python classes use the CamelCase convention, which is described in more detail
    in Chapter 7.)


    7. In particular, "snake case" is not a reference to Python itself; snake-case
    variable names are common in languages whose names, unlike Python''s, have nothing
    to do with snakes, such C, Perl, PHP, JavaScript, and Ruby.


