    random_forest.fit(X_train, Y_train)\naccuracy_random_forest = random_forest.score(X_test,\
    \ Y_test)\n```\n\nLet's make a DataFrame to hold and display the results (again\
    \ omitting the prompt for easier copying):\n\n```\nresults = pd.DataFrame({\n\
    \    \"Model\": [\"Logistic Regression\", \"Naive Bayes\", \"Perceptron\",\n \
    \             \"Decision Tree\", \"Random Forest\"],\n    \"Score\": [accuracy_logreg,\
    \ accuracy_naive_bayes, accuracy_perceptron,\n              accuracy_decision_tree,\
    \ accuracy_random_forest]})\nresult_df = results.sort_values(by=\"Score\", ascending=False)\n\
    result_df = result_df.set_index(\"Score\")\nresult_df\n```\n\nThe result appears\
    \ in Listing 11.25.\n\n**Listing 11.25:** The model accuracy results.\n\nModel\n\
    Score\n0.854749 Decision Tree\n0.854749 Random Forest\n0.787709 Logistic Regression\n\
