    \ laureates have been the subject of some scientific research over the years.<sup>26</sup>\
    \ Although we are not in a position to draw any conclusions about the effect (if\
    \ any) of winning a Nobel Prize on longevity, we can make a histogram of the laureates'\
    \ ages to get a sense of the distribution.\n\nLet's begin by finding the record\
    \ for Hans Bethe (\"BAY-tuh\"), one of the longest-lived Nobel laureates:<sup>27</sup>\n\
    \n> 25. Image courtesy of Archive PL/Alamy Alamy Stock Photo.\n> 26. See, for\
    \ example, Matthew D. Rablen and Andrew J. Oswald, \"Mortality and immortality:\
    \ The Nobel Prize as an experiment into the effect of status upon longevity\"\
    . *Journal of Health Economics*, Volume 27, Issue 6, December 2008, pp. 1462–1471.\n\
    > 27. Bethe was already a famous physicist in the 1930s due to his groundbreaking\
    \ series of papers on nuclear theory. He later served as the head of the theoretical\
    \ division at Los Alamos during the making of the atomic bomb. And yet he lived\
    \ so long that I had a chance to meet him in the early 2000s when he came to give\
    \ an astrophysics talk at Caltech.\n\n![](img/b3303452eae4d7974600cd38b159398e_393_0.png)\n\
    \n**Figure 11.26:** Maria Goeppert Mayer, Nobel laureate and official physicist\
    \ of Tau Day.\n\n```python\n>>> bethe = nobel.loc[nobel[\"surname\"] == \"Bethe\"\
    ]\n>>> bethe[\"born\"]\n88    1906-07-02\n>>> bethe[\"died\"]\n88    2005-03-06\n\
    ```\n\nBy subtracting in our heads, we can see that Bethe lived to be 98, but\
    \ doing this one by one for all the laureates would be most impractical.\nLet's\
    \ see if we can calculate Bethe's age by pure subtraction:\n\n```python\n>>> bethe[\"\
    died\"] - bethe[\"born\"]\nTypeError: unsupported operand type(s) for -: 'str'\
    \ and 'str'\n```\n\nOK, the dates are being stored as strings, so it's not surprising\
    \ that simple subtraction didn't work. Let's try converting to **datetime** objects:\n\
    \n```python\n>>> diff = pd.to_datetime(bethe[\"died\"]) - pd.to_datetime(bethe[\"\
    born\"])\n>>> diff\n88    36042 days\ndtype: timedelta64[ns]\n```\n\nThat's much\
    \ more promising, but it's a Series of **timedelta64** objects, though, rather\
    \ than floats. We can fix this by using **dt** to gain access to the datetime\
    \ directly and **days** to find the number of days:\n\n```python\n>>> diff.dt.days\n\
    88    36042\ndtype: int64\n```\n\nAt this point, we could then divide by 365 (or\
    \ 365.25) to get the approximate number of years, which is probably good enough\
    \ for a histogram, but it isn't quite right because of leap years, the number\
    \ of which will vary based on the exact date range. Luckily, NumPy comes with\
    \ a method called **timedelta64** that handles this automatically:\n\n```python\n\
    >>> diff/np.timedelta64(1, \"Y\")\n88    98.679644\ndtype: float64\n```\n\nHere\
    \ **1**, **\"Y\"** refers to a time delta (change) of \"1 Year\".\nNow let's apply\
    \ the same idea to the full list of Nobel laureates:\n\n```python\n>>> nobel[\"\
    born\"] = pd.to_datetime(nobel[\"born\"])\ndateutil.parser._parser.ParserError:\
    \ month must be in 1..12: 1873-00-00\n```\n\nHere there's an error because at\
    \ least one of the **\"born\"** dates has **00-00** for the month and year. Why?\n\
    \n```python\n>>> nobel.loc[nobel[\"born\"] == \"1873-00-00\"]\n    id        \
    \      firstname surname  ... name city country\n465  467  Institute of International\
    \ Law  NaN  ...  NaN  NaN     NaN\n\n[1 rows x 20 columns]\n>>> nobel.iloc[465].born\n\
    >>> nobel.iloc[465].category\n465    peace\nName: category, dtype: object\n>>>\
    \ nobel.iloc[465].year\n465    1904\nName: year, dtype: int64\n```\n\nAh, so an\
    \ organization called the Institute of International Law won the Nobel Prize for\
    \ Peace in 1904. As you might guess from the \"born\" date, it was founded in\
    \ 1873, but because it's not a person the Nobel data declines to specify an exact\
    \ \"birth\" date.\n\nThis complicates matters somewhat because we can't just drop\
    \ Not Available values like NaN and NaT. Luckily, pandas has an option to force,\
    \ or coerce, such values when making the conversion. We can convert in place (thereby\
    \ overwriting the old data) like this:\n\n```python\n>>> nobel[\"born\"] = pd.to_datetime(nobel[\"\
    born\"], errors=\"coerce\")\n>>> nobel[\"died\"] = pd.to_datetime(nobel[\"died\"\
    ], errors=\"coerce\")\n```\n\nNow we can double-check the value for the Institute\
    \ of International Law:\n\n```python\n>>> nobel.iloc[465].born\nNaT\n```\n\nSo\
    \ the coercion converted the invalid date to Not a Time, which is perfect for\
    \ our purposes because such values are ignored automatically when plotting histograms.\n\
    \nAt this point, we're ready to calculate the laureates' lifespans by subtracting\
    \ datetimes and dividing by NumPy's magic time delta:\n\n```python\n>>> nobel[\"\
    lifespan\"] = (nobel[\"died\"] - nobel[\"born\"])/np.timedelta64(1, \"Y\")\n```\n\
    \nNote that this dynamically creates a new \"lifespan\" column in our nobel DataFrame.\
    \ We can do a reality check by making sure we've replicated the calculation we\
    \ did for Bethe:\n\n```python\n>>> bethe = nobel.loc[nobel[\"surname\"] == \"\
    Bethe\"]\n>>> bethe[\"lifespan\"]\n88    98.679644\n```\n\nSo Hans Bethe's lifespan\
    \ checks out from our previous calculation.\nWe're now finally ready to make the\
    \ histogram. With all the work we've done, it's as simple as calling **hist()**\
    \ with the **\"lifespan\"** column (Listing 11.17).\n\n**Listing 11.17:** The\
    \ code to make a lifespan histogram.\n\n```python\n>>> nobel.hist(column=\"lifespan\"\
    )\narray([[<AxesSubplot:title={'center':'lifespan'}>]], dtype=object)\n>>> plt.show()\n\
    ```\n\nThe result appears in Figure 11.27. As expected from the research on the\
    \ subject, the lifespans of the Nobel laureates are skewed toward the upper end\
    \ of the usual range.\n\n![](img/b3303452eae4d7974600cd38b159398e_396_0.png)\n\
    \n**Figure 11.27:** A histogram of Nobel laureates' lifespans.\n\n### 11.5.1 Exercises\n\
