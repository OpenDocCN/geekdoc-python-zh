    Here are some of the notable differences between Python and most other languages:


    +   - Use `print` for printing (Section 1.2).

    - Use `#!/usr/bin/env python3` for the shebang line in shell scripts (Section
    1.4).

    - Single- and double-quoted strings are effectively identical (Section 2.1).

    - Use formatted strings (f-strings) and curly braces for string interpolation,
    e.g., `f"foo {bar} baz"` for strings "foo" and "baz" and variable `bar` (Section
    2.2).

    - Use `r"..."` for raw strings (Section 2.2.2).

    - Python doesn''t have an `obj.length` attribute or an `obj.length()` method;
    instead, use `len(obj)` to calculate object lengths (Section 2.4).

    - Whitespace is significant (Section 2.4). Lines are typically ended by newlines
    or colons, and block structure is indicated using indentation (generally four
    spaces per block level).

    - Use `elif` for `else if` (Section 2.4).

    - In a boolean context, all Python objects are `True` except `0`, `None`, "empty"
    objects (`""`, `[]`, `{}`, etc.), and `False` itself (Section 2.4.2 and later
    sections).

    - Use `[...]` for lists (Chapter 3) and `{key: value, ...}` for hashes (called
    *dictionaries* in Python) (Section 4.4).

    - Python makes extensive use of *namespaces*, so importing a library like `math`
    leads to accessing methods through a library object by default (e.g., `math.sqrt(2)`)
    (Section 4.1.1).


