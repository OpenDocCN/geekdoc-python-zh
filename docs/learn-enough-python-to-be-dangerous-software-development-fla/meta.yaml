- md: "## 2.2.1 Formatted Strings\n\nThe most Pythonic way (Box 1.1) to build up strings\
    \ is via *interpolation* using so-called *formatted strings*, or *f-strings*,\
    \ which combine the letter **f** (for “formatted”) and curly braces to insert\
    \ variable values:\n\n```\n>>> f\"{first_name} is my first name.\"    # Pythonic\n\
    'Michael is my first name.'\n```\n\nHere Python automatically inserts, or *interpolates*,\
    \ the value of the variable **first_name** into the string at the appropriate\
    \ place.⁹ Indeed, any code inside the curly braces will simply be evaluated by\
    \ Python and inserted in place.\n\nWe can use interpolation to replicate the result\
    \ of Listing 2.4, as shown in Listing 2.5.\n\n### Listing 2.5: Concatenation review,\
    \ then interpolating.\n\n```\n>>> first_name + \" \" + last_name      # Concatenation\
    \ (not Pythonic)\n'Michael Hartl'\n>>> f\"{first_name} {last_name}\"        #\
    \ Interpolation (Pythonic)\n'Michael Hartl'\n```\n\nThe two expressions shown\
    \ in Listing 2.5 are equivalent, but I generally prefer the interpolated version\
    \ because having to add the single space \" \" in between strings feels a bit\
    \ awkward (and, as noted, Pythonistas generally agree).\n\nIt's worth noting that\
    \ formatted strings were added in Python 3.6. If for some reason you need to use\
    \ an earlier version of Python, you can use either % formatting or **str.format()**\
    \ instead. Specifically, the following three lines give the same result:\n\n```\n\
    >>> f\"First Name: {first_name}, Last Name: {last_name}\"\n'First Name: Michael,\
    \ Last Name: Hartl'\n>>> \"First Name: {}, Last Name: {}\".format(first_name,\
    \ last_name)\n'First Name: Michael, Last Name: Hartl'\n>>> \"First Name: %s, Last\
    \ Name: %s\" % (first_name, last_name)\n'First Name: Michael, Last Name: Hartl'\n\
    ```\n\nUsing **format()** in particular has possible advantages that can be useful\
    \ even when formatted strings are available. See the article \"Python 3's f-Strings:\
    \ An Improved String Formatting Syntax\" (https://realpython.com/python-f-strings/)\
    \ for more information.\n\n### 2.2.2 Raw Strings\n\nIn addition to ordinary strings\
    \ and formatted strings, Python also supports so-called *raw strings*. For many\
    \ uses, the two types of strings are effectively identical:\n\n9. Programmers\
    \ familiar with Perl or PHP should compare this to the automatic interpolation\
    \ of dollar sign variables in expressions like **\"Michael $last_name\"**.\n\n\
    ```\n>>> r\"foo\"\n'foo'\n>>> r\"foo\" + r\"bar\"\n'foobar'\n```\n\nThere are\
    \ important differences, though. For example, Python won't interpolate into raw\
    \ strings:\n\n```\n>>> r\"{first_name} {last_name}\"    # No interpolation!\n\
    '{first_name} {last_name}'\n```\n\nThis isn't that surprising, though, since Python\
    \ won't interpolate into regular strings, either:\n\n```\n>>> \"{first_name} {last_name}\"\
    \    # No interpolation!\n'{first_name} {last_name}'\n```\n\nIf regular strings\
    \ can do everything that raw strings can do, what's the point of raw strings?\
    \ They are often useful because they are truly literal, containing exactly the\
    \ characters you type. For example, the \"backslash\" character is special on\
    \ most systems, as in the literal newline \\n. If you want a variable to contain\
    \ a literal backslash, raw strings make it easier:\n\n```\n>>> r\"\\n\"    # A\
    \ literal 'backslash n' combination\n'\\n'\n```\n\nNote that Python REPL needs\
    \ to escape the backslash with an additional backslash; inside regular strings,\
    \ a literal backslash is represented with *two* backslashes. For a small example\
    \ like this, there's not much savings, but if there are lots of things to escape\
    \ it can be a real help:\n\n```\n>>> r\"Newlines (\\n) and tabs (\\t) both use\
    \ the backslash character: \\.\"\n'Newlines (\\n) and tabs (\\t) both use the\
    \ backslash character: \\. '\n```\n\nProbably the most common use of raw strings\
    \ is in defining regular expressions (Section 4.3), but they will also make an\
    \ appearance when labeling plots in Section 11.3.\n\nThe practice of escaping\
    \ out characters is unnecessary inside raw strings, *except* for quotes of the\
    \ same kind used to define the string. For example, if you define a raw string\
    \ using single quotes, ordinarily it works just fine:\n\n```\n>>> r'Newlines (\\\
    n) and tabs (\\t) both use the backslash character: \\.'\n'Newlines (\\n) and\
    \ tabs (\\t) both use the backslash character: \\.'\n```\n\nAs with regular strings,\
    \ if a raw string defined using single quotes itself contains a single quote,\
    \ we get a syntax error instead:\n\n```\n>>> r'It's not easy being green'\n  File\
    \ \"<stdin>\", line 1\n    'It's not easy being green'\n          ^\nSyntaxError:\
    \ invalid syntax\n```\n\n### 2.2.3 Exercises\n\n- 1. Assign variables **city**\
    \ and **state** to your current city and state of residence. (If residing outside\
    \ the U.S., substitute the analogous quantities.) Using interpolation, print a\
    \ string consisting of the city and state separated by a comma and a space, as\
    \ in “Los Angeles, CA”.\n- 2. Repeat the previous exercise but with the city and\
    \ state separated by a tab character.\n- 3. Do triple-quoted strings (Section\
    \ 2.1) support interpolation?\n\n## 2.3 Printing\n\nAs we saw in Section 1.2 and\
    \ subsequent sections, the Python way to print a string to the screen is to use\
    \ the **print()** function:\n\n```\n>>> print(\"hello, world!\")    # Print output\n\
    hello, world!\n```\n\nHere **print()** takes in a string as an *argument* and\
    \ then prints the result to the screen. The **print()** function operates as a\
