  md: 'The original competition that inspired this example involved supplying training
    data for creating models, which was then applied to test data not available to
    participants in the competition. Because this section isn''t part of that competition,
    we''ll split the given data into separate training and test datasets ourselves.
    Using such separate datasets helps guard against overfitting, which involves using
    so many free parameters that the model doesn''t have predictive value beyond the
    original datasets—as the great John von Neumann once reportedly quipped, “With
    four parameters I can fit an elephant, and with five I can make him wiggle his
    trunk.” (We''ll cover a second guard against overfitting called cross-validation
    as well.)


    The main scikit-learn method for doing a train/test split is called, appropriately
    enough, `train_test_split()`, which returns four values consisting of a training
    and test variable for each of X and Y:


    ```

    from sklearn.model_selection import train_test_split

    (X_train, X_test, Y_train, Y_test) = train_test_split(X, Y, random_state=1)

    ```


    Because `train_test_split()` shuffles the data before doing the split, we''ve
    set the `random_state` option so that your results will be consistent with those
    shown in the text.


    At this point, we''re ready to try the various models out on the training data
    and see how accurate their fits are when applied to the test data. Our strategy
    is to define an instance of each of the models imported in Listing 11.24, calculate
    the `fit()` on the training data, and then look at the `score()` of the model
    on the test data. We''ll then compare the scores to compare the accuracy of the
    models.


    First up is Logistic Regression:


    ```

    logreg = LogisticRegression()

    logreg.fit(X_train, Y_train)

    accuracy_logreg = logreg.score(X_test, Y_test)

    ```


    Next is (Gaussian) Naive Bayes:


    ```

    naive_bayes = GaussianNB()

    naive_bayes.fit(X_train, Y_train)

    accuracy_naive_bayes = naive_bayes.score(X_test, Y_test)

    ```'
