    ...     print("Password is just right!")

    ... else:

    ...     print("Password is too long.")

    ...

    Password is just right!

    ```


    ### 2.4.1 Combining and Inverting Booleans


    Booleans can be combined or inverted using the `and`, `or`, and `not` operators.


    Let''s start with `and`. When comparing two booleans with `and`, *both* have to
    be `True` for the combination to be `True`. For example, if I said I wanted both
    french fries *and* a baked potato, the only way the combination could be true
    is if I could answer “yes” (true) to both the questions “Do you want french fries?”
    and “Do you want a baked potato?” If my answer to either of those is false, then
    the combination must be false as well. The resulting combinations of possibilities
    are collectively known as a *truth table*; the truth table for `and` appears in
    Listing 2.11.


    ### Listing 2.11: The truth table for `and`.


    ```python

    >>> True and False

    False

    >>> False and True

    False

    >>> False and False

    False

    >>> True and True

    True

    ```


    We can apply this to a conditional as shown in Listing 2.12.


    ### Listing 2.12: Using the `and` operator in a conditional.


    ```python

    >>> x = "foo"

    >>> y = ""

    >>> if len(x) == 0 and len(y) == 0:

    ...     print("Both strings are empty!")

    ... else:

    ...     print("At least one of the strings is nonempty.")

    ...

    At least one of the strings is nonempty.

    ```


    In Listing 2.12, **len(y)** is in fact **0**, but **len(x)** isn''t, so the combination
    is **False** (in agreement with Listing 2.11), and Python evaluates the **else**
    branch.


    In contrast to **and**, **or** lets us take action if *either* comparison (or
    both) is true (Listing 2.13).


    ### Listing 2.13: The truth table for `or`.


    ```python

    >>> True or False

    True

    >>> False or True

    True

    >>> True or True

    True

    >>> False or False

    False

    ```


    We can use **or** in a conditional as shown in Listing 2.14.


    ### Listing 2.14: Using the `or` operator in a conditional.


    ```python

    >>> if len(x) == 0 or len(y) == 0:

    ...     print("At least one of the strings is empty!")

    ... else:

    ...     print("Neither of the strings is empty.")

    ...

    At least one of the strings is empty!

    ```


    Note from Listing 2.13 that **or** isn''t *exclusive*, meaning that the result
    is true even when *both* statements are true. This stands in contrast to colloquial
    usage, where a statement like "I want fries or a baked potato" implies that you
    want either fries *or* a baked potato, but you don''t want both (Figure 2.6<sup>13</sup>).


    13. Image courtesy of Rikaphoto/Shutterstock.


    ![](img/b3303452eae4d7974600cd38b159398e_73_0.png)


    **Figure 2.6:** Turns out I only wanted fries.


    In addition to **and** and **or**, Python supports *negation* via the “not” operator
    **not**, which just converts **True** to **False** and **False** to **True** (Listing
    2.15).


    ### Listing 2.15: The truth table for `not`.


    ```python

    >>> not True

    False

    >>> not False

    True

    ```


    We can use **not** in a conditional as shown in Listing 2.16. Note that parentheses
    *are* required in this case, because otherwise we’re asking if **not len(x)**
    is equal to **0**.


    ### Listing 2.16: Using the `not` operator in a conditional.


    ```python

    >>> if not (len(x) == 0):    # Not Pythonic

    ...     print("x is not empty.")

    ... else:

    ...     print("x is empty.")

    ...

    x is not empty.

    ```'
