    \ comes equipped with mathematical constants, such as Euler’s number *e*:\n\n\
    ```\n>>> import math\n>>> math.e\n2.718281828459045\n>>> np.e\n2.718281828459045\n\
    >>> math.e == np.e\nTrue\n```"
  - "[PAGE 354]\n\nNumPy also defines **pi** but unfortunately doesn't have **tau**\
    \ as of this writing:\n\n```\n>>> np.pi\n3.141592653589793\n>>> np.tau\nTraceback\
    \ (most recent call last):\n  raise AttributeError(\"module {!r} has no attribute\
    \ \"\nAttributeError: module 'numpy' has no attribute 'tau'\n```\n\nWe can still\
    \ use the one in **math**, though:\n\n```\n>>> math.tau\n6.283185307179586\n>>>\
    \ math.tau == 2 * np.pi\nTrue\n```\n\nAlso like **math**, NumPy has operations\
    \ like trigonometric functions and logarithms (see below for an explanation of\
    \ the strange result of **np.sin(math.tau)**):\n\n```\n>>> np.cos(math.tau)\n\
    1.0\n>>> np.sin(math.tau)\n-2.4492935982947064e-16\n>>> np.log(np.e)\n1.0\n>>>\
    \ np.log10(np.e)\n0.4342944819032518\n```\n\nNote that, again as with **math**,\
    \ and like most programming languages, NumPy uses **log()** to denote the natural\
    \ logarithm and **log10()** for base-ten logs.\n\nAt this point, you may wonder\
    \ what the point is of including definitions in NumPy that duplicate those in\
    \ **math**. For constants like *e* and *π* it's mainly for completeness, but with\
    \ the functions there's actually a meaningful difference: Unlike **math** functions,\
    \ NumPy's functions can be threaded over arrays using the same vectorized operations\
    \ we first saw in Section 11.2.1.\n\nConsider, for example, one period of cos\
    \ *x*, with angles ranging from 0 to *τ* (Listing 11.5).⁹\n\n9. I prefer to use\
    \ cosine instead of sine as the canonical example because it's more intuitive\
    \ from the perspective of simple harmonic motion, which is one of the most important\
    \ examples of sinusoidal functions. Because the cosine function starts at 1, it\
    \ corresponds naturally to an oscillator moved some distance from equilibrium\
    \ and released from rest. In contrast, using sine involves giving a kick or flick\
    \ to such an oscillator so that it starts with a nonzero velocity at equilibrium,\
    \ which is a much less common way of initiating such motion."
