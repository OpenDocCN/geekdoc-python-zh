    \ 5.1 中定义的 `square()` 函数：\n\n### 5.1.2 可变参数和关键字参数\n\n除了常规参数外，Python 函数还支持可变长度参数和关键字参数。虽然在本教程中我们不需要定义带有这类参数的函数，但在某些地方我们会用到它们，因为许多内置的\
    \ Python 函数都使用它们。它们对于更高级的 Python 工作也很有价值。让我们快速了解一下它们的工作原理。\n\n假设我们定义一个带有两个参数 `bar`\
    \ 和 `baz` 的函数 `foo()`：\n\n```\n>>> def foo(bar, baz):\n...     print((bar, baz))\n\
    ...\n>>> foo(\"hello\", \"world\")\n('hello', 'world')\n```\n\n这里我们打印出了一个包含两个参数的元组（第\
    \ 3.6 节），以此来展示它们的值。\n\n但如果我们不知道想要多少个参数呢？例如，这将不起作用：\n\n```\n>>> foo(\"hello\",\
    \ \"world\", \"good day!\")\n  File \"<stdin>\", line 1, in <module>\nTypeError:\
    \ foo() takes 2 positional arguments but 3 were given\n```\n\nPython 通过特殊的星号或“星号”语法\
    \ `*args`（通常读作“star args”）支持可变数量的参数：⁴\n\n```\n>>> def foo(*args):\n...     print(args)\n\
    ...\n>>> foo(\"hello\", \"world\", \"good day!\")\n('hello', 'world', 'good day!')\n\
    ```\n\n我们在这里看到 Python 自动创建了一个参数元组，这适用于任何数量：\n\n```\n>>> foo(\"This\", \"is a bunch\"\
    , \"of arguments\", \"to the function\")\n('This', 'is a bunch', 'of arguments',\
    \ 'to the function')\n```\n\n一个相关的构造使用双星号或双星号语法表示*关键字*，这些是用等号分隔的键值对。在这种情况下，`*args`\
    \ 的类似物被称为 **kwargs（通常读作“star star kwargs”或“star star keyword args”）；如果 *args 产生一个元组，看看你是否能猜出\
    \ **kwargs 做什么：\n\n```\n>>> def foo(**kwargs):\n...     print(kwargs)\n...\n>>>\
    \ foo(a=\"hello\", b=\"world\", bar=\"good day!\")\n{'a': 'hello', 'b': 'world',\
    \ 'bar': 'good day!'}\n```\n\n正如你可能猜到的，**kwargs 自动将参数中的键值对转换为 Python 的标准数据类型，即字典（第\
    \ 4.4 节）。\n\n一个常见的模式是结合 *args 和 **kwargs，从而能够接受多种类型的参数。一个简单的例子出现在第 5.1.3 节。\n\n\
    > 4. 你可以使用 `*anything`，但 `*args` 是惯例。\n\n### 5.1.3 练习\n\n1. 在 Python 解释器中运行 help(len)\
    \ 以确认 help() 也适用于内置函数。运行命令 help(print) 的结果是什么？（在这种情况下，结果被称为多行文档字符串。）\n2. 定义一个如清单\
    \ 5.5 所示的 deriver() 函数，该函数接受一个函数并返回它在小区间 h 内的变化量。确认你得到的结果与第 5.1.1 节开头提到的 square()\
    \ 函数（最初在清单 5.1 中定义）所示的结果一致。计算 deriver(math.cos, math.tau/2) 的结果是什么？⁵\n3. 定义一个同时包含\
    \ *args 和 **kwargs 的函数 foo()，如清单 5.6 所示。当你执行清单 5.6 最后一条语句所示的函数时，你会得到什么？（注意，在调用\
    \ foo() 时不应输入 ...；正如我们在定义函数时看到的，这些是 Python 解释器自动添加的续行符。）\n\n> 5. 一些细心的读者可能认出 deriver()\
