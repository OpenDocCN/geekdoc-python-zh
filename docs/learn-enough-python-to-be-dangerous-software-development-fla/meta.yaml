    \n```\n>>> np.cos(math.tau)\n1.0\n>>> np.sin(math.tau)\n-2.4492935982947064e-16\n\
    >>> np.log(np.e)\n1.0\n>>> np.log10(np.e)\n0.4342944819032518\n```\n\nNote that,\
    \ again as with **math**, and like most programming languages, NumPy uses **log()**\
    \ to denote the natural logarithm and **log10()** for base-ten logs.\n\nAt this\
    \ point, you may wonder what the point is of including definitions in NumPy that\
    \ duplicate those in **math**. For constants like *e* and *π* it's mainly for\
