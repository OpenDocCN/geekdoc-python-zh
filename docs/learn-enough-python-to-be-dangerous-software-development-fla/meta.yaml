    # 10.3 Layouts


    At this point, our app is looking pretty good, but there are two significant blemishes:
    The HTML code for the three pages is highly repetitive, and navigating by hand
    from page to page is rather cumbersome. We''ll fix the first blemish in this section,
    and the second in Section 10.4. (And of course our app doesn''t yet detect palindromes,
    which is the subject of Section 10.5.)


    If you followed *Learn Enough CSS & Layout to Be Dangerous* (https://www.learnenough.com/css-and-layout),
    you''ll know that the *Layout* in the title referred to page layout generally—using
    Cascading Style Sheets to move elements around on the page, align them properly,
    etc.—but we also saw (https://www.learnenough.com/css-and-layout-tutorial/struct-layout#cha-struct-layout)
    that doing this properly requires defining *layout templates* that capture common
    patterns and eliminate duplication.'
