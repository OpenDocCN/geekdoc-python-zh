    understandably reluctant to change to the functional version.


    My favorite technique for managing this challenge is *test-driven development*
    (TDD), which involves writing an *automated test* that captures the desired behavior
    in code. We can then get the test to pass using any method we want, including
    an ugly but easy-to-understand imperative solution. At that point, we can *refactor*
    the code—changing its form but not its function—to use a more concise functional
    solution. As long as the test still passes, we can be confident that the code
    still works.


