    # 1.5 Python in a Web Browser


    Although it wasn’t initially designed for web development, Python’s elegant and
    powerful design has led to its widespread use in making web applications. In recognition
    of this, our final example of a “hello, world” program will be a live web application,
    written in the simple but powerful *Flask* micro-framework (Figure 1.3⁸). Because
    of its simplicity, Flask is a perfect introduction to web development with Python
    while also serving as excellent preparation for a “batteries included” framework
    like Django.


    We’ll begin by installing the Flask package using pip (a recursive acronym that
    stands for “pip installs packages”). The **pip** command comes automatically as
    part of the virtual environment, so we can access it by typing **pip** at the
    command line (or **pip3** on some systems—try the latter if the former doesn’t
    work). As a first step, it’s a good idea to upgrade pip to ensure we’re running
    the latest version:


    ```

    (venv) $ pip install --upgrade pip

    ```


    ![](img/b3303452eae4d7974600cd38b159398e_38_0.png)'
