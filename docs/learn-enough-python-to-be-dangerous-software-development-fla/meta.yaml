    \ suppose we combine the tests into a single variable using a merge:\n\n```\n\
    >>> test_scores = tests1 | tests2\n{'Math': 75, 'Physics': 99, 'History': 77,\
    \ 'English': 93}\n```\n\nNow suppose the student is allowed to retake tests for\
    \ the two lowest scores:\n\n```\n>>> retests = {\"Math\": 97, \"History\": 94}\n\
    ```\n\nAt this point, we can update the original test scores with the updated\
