    # ## 8.5.1 Publishing the Python Package


    As a final step, and in line with our philosophy of shipping (Box 1.5), in this
    final section we’ll publish our `palindrome` package to the Python Package Index,
    also known as PyPI.


    Unusually among programming languages, Python actually has a dedicated test package
    index called TestPyPI, which means we can publish (and use) our test package without
    uploading to a real package index. Before proceeding, you’ll need to register
    an account at TestPyPI and verify your email address.


    Once you’ve set up your account, you’ll be ready to build and publish your package.
    To do this, we’ll be using the `build` and `twine` packages, which you should
    install at this time:


    ```

    bash

    (venv) $ pip install build==0.8.0

    (venv) $ pip install twine==4.0.1

    ```'
