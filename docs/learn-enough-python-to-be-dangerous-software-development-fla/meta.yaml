    female\") &\n        (titanic[\"Pclass\"] == 3)][\"Survived\"].mean()\n```"
  mdcn: "## 11.6 pandas 示例：泰坦尼克号\n\n![](img/b3303452eae4d7974600cd38b159398e_398_0.png)\n\
    \n**图 11.28：** 命运多舛的皇家邮轮 *泰坦尼克号*。\n\n**代码清单 11.18：** 直接从（原始 S3）URL 读取数据。\n\n```\n\
