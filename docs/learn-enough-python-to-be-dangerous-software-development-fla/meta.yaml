    \ 的值也应该接近 0。同时，x² 的导数是 2x，这解释了清单 5.5 中当 x = 3 时 square() 函数所示的值。\n\n**清单 5.5：**\
    \ 推导小区间上的变化率。\n\n```\n>>> def deriver(f, x):\n...     h = 0.00001\n...     return\
