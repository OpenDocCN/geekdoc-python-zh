    \ dividing by NumPy's magic time delta:\n\n```\n>>> nobel[\"lifespan\"] = (nobel[\"\
    died\"] - nobel[\"born\"])/np.timedelta64(1, \"Y\")\n```\n\nNote that this dynamically\
    \ creates a new \"lifespan\" column in our nobel DataFrame. We can do a reality\
