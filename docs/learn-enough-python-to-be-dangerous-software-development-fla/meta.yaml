    # 1.4 Python in a Shell Script


    Although the code in Section 1.3 is perfectly functional, when writing a program
    to be executed in the command-line shell (https://www.learnenough.com/command-line-tutorial/basics#sec-man_pages)
    it''s often better to use an *executable script* of the sort discussed in *Learn
    Enough Text Editor to Be Dangerous*.


    Let''s see how to make an executable script using Python. We''ll start by creating
    a file called **hello**:


    ```

    (venv) $ touch hello

    ```


    Note that we *didn''t* include the **.py** extension—this is because the filename
    itself is the user interface, and there''s no reason to expose the implementation
    language to the user. Indeed, there''s a reason not to: By using the name **hello**,
    we give ourselves the option to rewrite our script in a different language down
    the line, without changing the command our program''s users have to type. (Not
    that it matters in this simple case, but the principle should be clear. We''ll
    see a more realistic example in Section 9.3.)


    There are two steps to writing a working script. The first is to use the same
    command we''ve seen before (Listing 1.7), preceded by a "shebang" line telling
    our system to use Python to execute the script.


    Ordinarily, the exact shebang line is system-dependent (as seen with Bash in *Learn
    Enough Text Editor to Be Dangerous* and with JavaScript (https://www.learnenough.com/javascript-tutorial/hello_world#sec-js_shell)
    in *Learn Enough JavaScript to Be Dangerous*), but with Python we can ask the
    shell itself to supply the proper command. The trick is to use the following line
    to use the **python** executable available as part of the shell''s *environment*
    (env):


    ```

    #!/usr/bin/env python3

    ```


    Using this for the shebang line gives the shell script shown in Listing 1.9.


    **Listing 1.9:** A "hello, world" shell script.

    *hello*


    ```

    #!/usr/bin/env python3


    print("hello, world!")

    ```'
  - '[PAGE 37]


    We could execute this file directly using the **python** command as in Section
    1.3, but a true shell script should be executable without the use of an auxiliary
    program. (That''s what the shebang line is for.) Instead, we''ll follow the second
    of the two steps mentioned above and make the file itself executable using the
    **chmod** ("change mode") command combined with **+x** ("plus executable"):


    ```

    (venv) $ chmod +x hello

    ```


    At this point, the file should be executable, and we can execute it by preceding
    the command with **./**, which tells our system to look in the current directory
    (dot = .) for the executable file. (Putting the **hello** script on the PATH (https://www.learnenough.com/text-editor-tutorial/advanced_text_editing#code-export_path),
    so that it can be called from any directory, is left as an exercise.) The result
    looks like this:


    ```

    (venv) $ ./hello

    hello, world!

    ```


    Success! We''ve now written a working Python shell script suitable for extension
    and elaboration. As mentioned briefly above, we''ll see an example of a real-life
    utility script in Section 9.3.


    Throughout the rest of this tutorial, we''ll mainly use the Python interpreter
    for initial investigations, but the eventual goal will almost always be to create
    a file containing Python.


    # 1.4.1 Exercise


