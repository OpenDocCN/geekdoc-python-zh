    ```\n\n完整的程序（添加了注释）如清单 4.12 所示。\n\n### 清单 4.12：统计文本中单词的程序。\n\n*count.py*\n\n```\n\
    sonnet = \"\"\"Let me not to the marriage of true minds\nAdmit impediments. Love\
