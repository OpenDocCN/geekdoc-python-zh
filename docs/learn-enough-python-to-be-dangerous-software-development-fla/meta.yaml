    # 11.3 Data Visualization with Matplotlib


    Matplotlib is a powerful visualization tool for Python that can do an absurdly
    large number of awesome things.¹⁰ In this section, we’ll start with a simple two-dimensional
    plot based on the work we did in Section 11.2 and incrementally include additional
    features, eventually reaching the figure shown in Figure 11.6. We’ll then cover
    a couple of other important cases (scatter plots and histograms), which are important
    for data analysis with pandas (Section 11.4). The exact mechanics of displaying
    Matplotlib plots depends on the particular setup; refer to Box 11.2 to get the
    display of Matplotlib plots working on your system.


    ![](img/b3303452eae4d7974600cd38b159398e_358_0.png)


    **Figure 11.6:** A fancy plot showing off features of Matplotlib.


    10. It’s worth noting that many Python data scientists also use seaborn, which
    is a data-visualization library built on Matplotlib. Although learning seaborn
    is certainly not necessary to be *dangerous*, it would make a natural follow-on
    to this section. The official seaborn tutorial would be a good place to start.'
