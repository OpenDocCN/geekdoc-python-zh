    \ **.gitignore** 文件来告诉 Git 哪些文件和目录需要忽略（清单 10.5）。\n\n![](img/b3303452eae4d7974600cd38b159398e_279_0.png)\n\
    \n**图 10.1：** 我们的初始应用。\n\n**清单 10.5：** 忽略某些文件和目录。\n\n```\n\n.gitignore\n\nvenv/\n\
    \n*.pyc\n__pycache__/\n\ninstance/\n\n.pytest_cache/\n.coverage\nhtmlcov/\n\n\
    dist/\nbuild/\n*.egg-info/\n\n.DS_Store\n```"
