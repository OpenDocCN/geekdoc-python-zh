    The results of this calculation include the coefficient of determination, also
    called $R^2$ (for technical reasons), which is the square of the Pearson correlation
    coefficient and can take any value between $-1$ and $1$, with $1$ being perfect
    correlation and $-1$ being perfect anti-correlation. $R^2$ is available as the
    **score()** of the model:


    ```

    >>> model.score(X, Y)    # coefficient of determination R^2

    0.13539675574075116

    ```


    An $R^2$ value of 0.135 is small but not negligible, though it''s important to
    bear in mind the difficulty of interpreting $R^2$.


    We can get a visual indication of the fit by plotting the regression line itself.
    The slope and y-intercept of the line are available via the **coef_** and **intercept_**
    attributes of the model:


    ```

    >>> m = model.coef_

    >>> b = model.intercept_

    ```


    Here the trailing underscores on the names are a scikit-learn convention for attributes
    that are available only after the model has been applied using **model.score()**.


    We''ve named the slope and intercept using the standard names **m** and **b**
    for describing a line in the $xy$-plane:


    $y = mx + b$ equation of a line.


    We can combine a plot of this line with the scatter plot from Figure 11.33 to
    visualize the fit (included here without the REPL prompt for ease of copying):


    ```

    fig, ax = plt.subplots()

    ax.scatter(passenger_ages, survival_rate)

    ax.plot(passenger_ages, m * passenger_ages + b, color="orange")

    ax.set_xlabel("Age")

    ax.set_ylabel("Survival Rate")

    ax.set_title("Titanic survival rates by age")

    plt.show()

    ```'
