    # CHAPTER 9

    Shell Scripts


    In this chapter, we''ll build on the foundation laid in Section 1.4 and write
    three *shell scripts* of increasing sophistication. In the first two programs
    (Section 9.1 and Section 9.2), we''ll take the Python package developed in Chapter
    8 and put it to work detecting palindromes drawn from two different sources: a
    file, and the Web. In the process, we''ll learn how to read and write from files
    with Python, and also how to read from a live Web URL. Finally, in Section 9.3,
    we''ll write a real-life utility program adapted from one I once wrote for myself.
    It includes an introduction to manipulation of the Document Object Model (or *DOM*)
    in a context outside a web browser.¹


    # 9.1 Reading from Files


    Our first task is to read and process the contents of a file. The example is simple
    by design, but it demonstrates the necessary principles, and gives you the background
    needed to read more advanced documentation.


    We''ll start by using `curl` to download a file of simple phrases (note that this
    should be in the `python_tutorial` directory we used prior to Chapter 8, not the
    palindrome package directory):


    ```

    $ cd ~/repos/python_tutorial/

    $ curl -OL https://cdn.learnenough.com/phrases.txt

    ```


    > 1. The Document Object Model was introduced (https://www.learnenough.com/css-and-layout-tutorial/introduction#sec-start_stylin)
    in *Learn Enough CSS & Layout to Be Dangerous* (https://www.learnenough.com/css-and-layout)
    and is explored (https://www.learnenough.com/javascript-tutorial/dom_manipulation#cha-dom_manipulation)
    in more depth in *Learn Enough JavaScript to Be Dangerous* (https://www.learnenough.com/javascript).'
