  md: "# 10.2 Site Pages\n\nNow that we've taken care of all the overhead involved\
    \ in setting up and deploying the palindrome app, we're in a position to make\
    \ rapid progress toward our final application. We'll start by making three pages\
    \ for our site: Home, About, and Palindrome Detector. In contrast to our previous\
    \ Flask apps, which have operated by simply returning strings in response to GET\
    \ requests, for our full app we'll use a more powerful technique known as *templates*.\
    \ Initially, these templates will consist of static HTML, but we'll add code to\
    \ eliminate duplication in Section 10.3 and then add dynamic content starting\
    \ in Section 10.4.\n\nIn preparation for filling in the site pages, let's create\
    \ the (currently empty) template files at the command line, which should be located\
    \ in a directory called **templates** inside the **palindrome_detector** app directory:\n\
    \n```\n(venv) $ mkdir palindrome_detector/templates\n(venv) $ cd palindrome_detector/templates\n\
    (venv) $ touch index.html about.html palindrome.html\n(venv) $ cd -\n```\n\n(As\
    \ noted (https://www.learnenough.com/command-line-tutorial/directories#sec-navigating_directories)\
    \ in *Learn Enough Command Line to Be Dangerous* (https://www.learnenough.com/command-line),\
    \ the `cd -` command changes to the previous directory, whichever it was; in this\
    \ case, it's **palindrome_app**, i.e., the base directory for our web application.)\n\
    \nInitially, these templates will actually just be static HTML, but we'll see\
    \ starting in Section 10.4 how to use them to generate HTML dynamically. The way\
    \ to render a template inside a Flask app is with the `render_template` function.\
    \ For example, to render the index page on the root URL /, we can write\n\n```\n\
    @app.route(\"/\")\ndef index():\n    return render_template(\"index.html\")\n\
    ```\n\nThis code causes Flask to look for **index.html** in the **templates**\
    \ directory.\n\nBecause the code to render all three templates is basically the\
    \ same, we'll add them all at the same time, as shown in Listing 10.11. Note that\
    \ we've added an extra statement to import `render_template` from the **flask**\
    \ package in addition to the Flask class itself."
  merge: -1
  pgno: 283
- img_proc: true
  md: "# Listing 10.11: Rendering three templates.\n\npalindrome_app/palindrome_detector/__init__.py\n\
    \n```\nimport os\n\nfrom flask import Flask, render_template\n\ndef create_app(test_config=None):\n\
    \    \"\"\"Create and configure the app.\"\"\"\n    app = Flask(__name__, instance_relative_config=True)\n\
    \    .\n    .\n    .\n\n    @app.route(\"/\")\n    def index():\n        return\
    \ render_template(\"index.html\")\n\n    @app.route(\"/about\")\n    def about():\n\
    \        return render_template(\"about.html\")\n\n    @app.route(\"/palindrome\"\
    )\n    def palindrome():\n        return render_template(\"palindrome.html\")\n\
    \n    return app\n\napp = create_app()\n```\n\nThe file in Listing 10.11 is in\
    \ effect a *controller*, which coordinates between different parts of the application,\
    \ defines the URLs (or *routes*) supported by the app, responds to requests, etc.\
    \ The templates, meanwhile, are sometimes called *views*, which determine the\
    \ HTML that actually gets returned to the browser. Together, the views and controllers\
    \ are two-thirds of the *Model-View-Controller* architecture (https://www.railstutorial.org/book/beginning#sec-mvc)\
    \ for developing web applications, also known as *MVC*.\n\nThe next step is to\
    \ fill the three template files with HTML; this is straightforward but tedious,\
    \ so I suggest you copy and paste from Listing 10.12, Listing 10.13, and Listing\
    \ 10.14. In case you're not reading this online, note that you can find the source\
    \ for these and all other listings at the reference site mentioned briefly in\
    \ Chapter 1: https://github.com/learnenough/learn_enough_python_code_listings.\
    \ By the way, the indentation of the material inside the `body` tags is at the\
    \ wrong depth, but we'll see in Section 10.3 why this is. Also note that we use\
    \ two spaces for indentation,"
