    dtypes: int64(3), object(17)\nmemory usage: 152.5+ KB\n```\n\n这里我们看到了完整的列名列表，以及每列的非空值数量。\n\
    \n## 定位数据\n\npandas 中最有用的任务之一是定位满足所需条件的数据。例如，我们可以定位具有特定姓氏的诺贝尔奖得主。作为加州理工学院的毕业生，我有义务使用加州理工学院最受爱戴的人物之一——物理学家理查德·费曼（发音为“FINE-mən”）。除了在理论物理（特别是量子电动力学及其相关的费曼图）方面的开创性工作外，费曼还以《费曼物理学讲义》闻名，该书以异常有趣和富有洞察力的方式涵盖了基础物理课程（力学、热物理学、电动力学等）。\n\
    \n让我们使用方括号和布尔条件在 **\"surname\"** 列上查找费曼在获奖者数据中的记录：¹⁹\n\n```\n>>> nobel[nobel[\"\
    surname\"] == \"Feynman\"]\n    id  firstname ... city country\n86  86  Richard\
    \ P. ... Pasadena CA  USA\n```\n\n这种数组风格的表示法返回完整记录，使我们能够确定费曼获得诺贝尔奖的年份。在 Jupyter\
    \ notebook 中，你可能只需滚动到旁边就能读出（图11.23），但在 REPL 中，我们可以直接查看 **year** 属性：\n\n> 19. 从这里开始，为了简洁起见，通常会省略不重要的输出，如\
    \ **[1 rows x 20 columns]** 和 **Name: year, dtype: int64**。\n\n![](img/b3303452eae4d7974600cd38b159398e_384_0.png)\n\
    \n**图11.23：** 在 Jupyter notebook 中检查 pandas 记录。\n\n```\n>>> nobel[nobel[\"surname\"\
    ] == \"Feynman\"].year\n86    1965\n```\n\n这种方法还允许我们，例如，将其赋值给一个变量，这可能比目视检查更有用。\n\
    \n顺便说一下，语法\n\n```\n>>> nobel[nobel[\"surname\"] == \"Feynman\"]\n```\n\n可能有点令人困惑，因为可能不清楚为什么我们必须引用\
    \ **nobel** 两次。答案是，该语法的内部部分返回一个 Series（第11.4.1节），其中包含每个获奖者的布尔值，如果姓氏等于 **\"Feynman\"\
    ** 则为 **True**，否则为 **False**：\n\n```\n>>> nobel[\"surname\"] == \"Feynman\"\n\
    0        False\n1        False\n2        False\n3        False\n4        False\n\
    ...\n970      False\n971      False\n972      False\n973      False\n974     \
    \ False\n```\n\n通过使用正确的索引（即 **86**），我们可以确认该情况下的值为 **True**：\n\n```\n>>> (nobel[\"\
    surname\"] == \"Feynman\")[86]\nTrue\n```\n\n通过这种方式，我们安排\n\n```\n>>> nobel[nobel[\"\
    surname\"] == \"Feynman\"]\n```\n\n仅选择 **nobel[\"surname\"] == \"Feynman\"** 为\
    \ **True** 的 **nobel** 值。这类似于清单11.7中展示的 **isclose()** 技巧，我们使用布尔值的 ndarray 来选择矩阵中接近0的元素（并将它们精确设置为0）。\n\
    \n获取年份的另一种方法是指定列以及布尔条件，我们可以这样尝试（仅显示最相关的输出行）：\n\n```\n>>> nobel[nobel[\"surname\"\
    ] == \"Feynman\", \"year\"]\npandas.errors.InvalidIndexError\n```\n\n这行不通，但我们可以使用\
    \ **loc**（“位置”）属性来实现我们想要的功能：²⁰\n\n```\n>>> nobel.loc[nobel[\"surname\"] == \"\
    Feynman\", \"year\"]\n86 1965\n```\n\n这仅返回总体id（本例中为 **86**）和感兴趣的列。**loc** 属性可以在许多地方代替方括号使用，通常是提取感兴趣数据项的更灵活的方式。\n\
    \n我完成博士学位后，被招募参与一个*费曼讲义*项目（https://www.michaelhartl.com/feynman-lectures/），该项目由我在加州理工学院的导师之一基普·索恩（Kip\
    \ Thorne）领导（图11.24²¹）。基普后来自己也获得了诺贝尔奖，所以我们来找出是哪一年。\n\n我们可以像查找费曼那样按姓氏搜索，但基普坚持被称为“Kip”，所以我们改为按名字搜索：\n\
    \n```\n>>> nobel.loc[nobel[\"firstname\"] == \"Kip\"]\nEmpty DataFrame\n```\n\n\
    嗯，结果是空的。回顾清单11.13中的 **head()**，我们可以猜测原因；例如，亨德里克·洛伦兹的条目包含中间名首字母，所以也许\n\n> 20. 更具体地说，**loc**\
    \ 是一个*属性*，这是一种使用属性装饰器创建的特殊属性。\n> 21. 图片版权 © 2012 Michael Hartl。"
