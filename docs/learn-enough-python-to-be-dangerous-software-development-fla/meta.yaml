    \n![](img/b3303452eae4d7974600cd38b159398e_191_0.png)\n\n**图7.1：** 驼峰命名法的起源。\n\
    \n因为它只是一个单词，但我们将在第7.3节更清楚地看到这个原则，该节定义了一个名为**TranslatedPhrase**的类。\n\n最终，我们将使用**Phrase**来表示像“Madam,\
    \ I'm Adam.”这样的短语，即使它不是字面上的前后相同，也可以算作回文。但起初，我们所做的只是定义一个**Phrase**初始化函数，它接受一个参数（**content**）并设置一个名为**content**的*数据属性*。²\
    \ 正如我们将看到的，我们可以使用与方法相同的点表示法来访问对象的属性。\n\n为了添加属性，我们首先需要定义在使用**Phrase()**初始化对象时被调用的**\\\
    _\\_init\\_\\**方法（代码清单7.2）。双下划线的使用是Python中的一个约定，用于表示内部用于定义对象行为的“魔法”方法。我们将在第7.2节看到更多此类魔法或“双下划线”（**double-underscore**）方法的例子。（下划线，无论是双下划线还是单下划线，对Python属性和方法都有特殊含义；更多信息请参见第7.4.1节。）\n\
