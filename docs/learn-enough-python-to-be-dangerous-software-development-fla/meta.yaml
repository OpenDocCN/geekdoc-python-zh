    \n```\n{% extends \"layout.html\" %}\n\n{% block content %}\n  <h1>Palindrome\
    \ Detector</h1>\n\n  <form id=\"palindrome_tester\" action=\"/check\" method=\"\
    post\">\n    <textarea name=\"phrase\" rows=\"10\" cols=\"60\"></textarea>\n \
    \   <br>\n    <button class=\"form-submit\" type=\"submit\">Is it a palindrome?</button>\n\
    \  </form>\n{% endblock %}\n```\n\nThe form in Listing 10.45 is, apart from cosmetic\
    \ details, identical to the analogous form (https://www.learnenough.com/javascript-tutorial/dom_manipulation#code-form_tag)\
    \ developed in *Learn Enough JavaScript to Be Dangerous* (https://www.learnenough.com/javascript):\n\
    \n```\n<form id=\"palindromeTester\">\n  <textarea name=\"phrase\" rows=\"10\"\
    \ cols=\"30\"></textarea>\n  <br>\n  <button type=\"submit\">Is it a palindrome?</button>\n\
    </form>\n```\n\n![The new palindrome form.](img/b3303452eae4d7974600cd38b159398e_317_0.png)\n\
    \n**Figure 10.13:** The new palindrome form.\n\nIn that case, though, we “cheated”\
    \ by using a JavaScript event listener to intercept (https://www.learnenough.com/javascript-tutorial/dom_manipulation#code-form_event_target)\
    \ the submit request from the form, and no information ever got sent from the\
    \ client (browser) to the server. (It’s important to understand that, when developing\
    \ web applications on a local computer, the client and server are the same physical\
    \ machine, but in general they are different.)\n\nThis time, we won’t cheat: The\
    \ request will really go all the way to the server, which means we’ll have to\
    \ handle the POST request on the back-end. By default, a Flask function responds\
    \ to GET requests, but we can arrange to respond to POST requests instead using\
    \ the `method` keyword argument with value equal to a tuple of the methods to\
    \ respond to. Because there’s only one method in this case (namely, POST), we\
    \ have to use the trailing-comma syntax mentioned in Section 3.6 for a tuple of\
    \ one element:\n\n```\n@app.route(\"/check\", methods=(\"POST\",))\ndef check():\n\
    \    # Do something to handle the submission\n```\n\nHere the name of the URL\
    \ path, `/check`, matches the value of the **action** parameter in the form (Listing\
    \ 10.45).\n\nIt turns out that the **request** include in Listing 10.43 has a\
    \ **form** attribute that contains useful information, so let's **return** it\
    \ as shown in Listing 10.46 and then submit the form to see what happens (Figure\
    \ 10.14).\n\n## Listing 10.46: Investigating the effects of a form submission.\n\
    \npalindrome_app/palindrome_detector/__init__.py\n\n```\nimport os\n\nfrom flask\
    \ import Flask, render_template, request\n\nfrom palindrome_mhartl.phrase import\
    \ Phrase\n\ndef create_app(test_config=None):\n    .\n    .\n    .\n    @app.route(\"\
    /\")\n    def index():\n        return render_template(\"index.html\", page_title=\"\
    Home\")\n\n    @app.route(\"/about\")\n    def about():\n        return render_template(\"\
    about.html\", page_title=\"About\")\n\n    @app.route(\"/palindrome\")\n    def\
    \ palindrome():\n        return render_template(\"palindrome.html\",\n       \
    \                        page_title=\"Palindrome Detector\")\n\n    @app.route(\"\
    /check\", methods=(\"POST\",))\n    def check():\n        return request.form\n\
    \n    return app\n\napp = create_app()\n```\n\n![The result of submitting a form.](img/b3303452eae4d7974600cd38b159398e_319_0.png)\n\
    \n**Figure 10.14:** The result of submitting a form.\n\nAs seen in Figure 10.14,\
    \ **request.form** is a dictionary (Section 4.4), with key **\"phrase\"** and\
    \ value **\"Madam, I'm Adam.\"**:\n\n```\n{\n    \"phrase\": \"Madam, I'm Adam.\"\
    \n}\n```\n\nThis dictionary is created automatically by Flask according to the\
    \ key–value pairs in the form (Listing 10.45). In this case, we have only one\
    \ such pair, with key given by the **name** attribute of the **textarea** (\"\
    phrase\") and value given by the string entered by the user. This means that we\
    \ can use the code\n\n```\npython\nphrase = request.form[\"phrase\"]\n```\n\n\
    to extract the value of the phrase.\n\nNow that we know about the existence and\
    \ contents of **request.form**, we can use **ispalindrome()** to detect palindromes\
    \ as in previous chapters. In plain Python, this would look something like Listing\
    \ 10.47.\n\n## Listing 10.47: What our palindrome results might look like in plain\
    \ Python.\n\n```\npython\nif Phrase(phrase).ispalindrome():\n    print(f'\"{phrase}\"\
    \ is a palindrome!')\nelse:\n    print(f'\"{phrase}\" isn\\'t a palindrome.')\n\
    ```\n\nWe can do the same basic thing in our web application using the Jinja template\
    \ language, only using `{{ ... }}` instead of interpolation and surrounding any\
    \ other code in `{% ... %}` tags, as shown schematically in Listing 10.48.\n\n\
    ## Listing 10.48: Schematic code for the palindrome result.\n\n```\njinja\n{%\
    \ if Phrase(phrase).ispalindrome() %}\n    \"{{ phrase }}\" is a palindrome!\n\
    {% else %}\n    \"{{ phrase }}\" isn't a palindrome.\n{% endif %}\n```\n\nLet's\
    \ create a template file called **result.html** to display our results:\n\n```\n\
    bash\n(venv) $ touch palindrome_detector/templates/result.html\n```\n\nThe template\
    \ code itself is an expanded version of Listing 10.48 with a few more HTML tags\
    \ for a better appearance, as shown in Listing 10.49.\n\n## Listing 10.49: Displaying\
    \ the palindrome result with Jinja.\n\npalindrome_detector/templates/result.html\n\
    \n```\njinja\n{% extends \"layout.html\" %}\n\n{% block content %}\n    <h1>Palindrome\
    \ Result</h1>\n\n    {% if Phrase(phrase).ispalindrome() %}\n        <div class=\"\
    result result-success\">\n```"
