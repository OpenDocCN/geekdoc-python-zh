    We can add a second behavior using `else`, which serves as the default result
    if the first comparison is `False` (Listing 2.9).


    ### Listing 2.9: Control flow with `if` and `else`.


    ```python

    >>> password = "foobar"

    >>> if len(password) < 6:

    ...     print("Password is too short.")

    ... else:

    ...     print("Password is long enough.")

    ...

    Password is long enough.

    ```


    The first line in Listing 2.9 *redefines* **password** by assigning it a new value.
    After reassignment, the **password** variable has length 6, so **len(password)
    < 6** is **False**. As a result, the **if** part of the statement (known as the
    **if branch**) doesn''t get evaluated; instead, Python evaluates the **else**
    branch, resulting in a message indicating that the password is long enough.


    Rather than the more conventional **else if** control flow, Python has a special
    **elif** keyword that means the same thing, as shown in Listing 2.10 (Figure 2.5<sup>12</sup>).


