    \ is that they can be treated as regular variables in many ways (sometimes referred\
    \ to as *first-class objects*). For example, let's take another look at the `square()`\
    \ function defined in Listing 5.1:\n\n```\n>>> def square(x):\n...     return\
    \ x*x\n...\n>>> square(10)\n100\n```\n\nWe can actually assign this to a new variable\
    \ and call it just as before:\n\n```\n>>> pow2 = square\n>>> pow2(7)\n49\n```\n\
    \nPerhaps even cooler, we can pass functions as arguments to other functions.\
    \ For example, we can create a function to apply another function and then add\
    \ 1 like this:\n\n```\n>>> def function_adder(x, f):\n...     return f(x) + 1\n\
    ...\n>>>\n```\n\nWe can then pass **square** as an argument (*without* parentheses,\
    \ so not **square()**):\n\n```\n>>> function_adder(10, square)\n101\n```\n\nBuilt-in\
    \ Python functions work the same way:\n\n```\n>>> import math\n>>> function_adder(100,\
    \ math.log10)\n3.0\n```\n\nThis last result follows because $\\log_{10} 100 =\
    \ \\log_{10} 10^2 = 2$ and $2 + 1 = 3$. (Why does Python display it as **3.0**?)$^3$\n\
    \n> 3. *Answer:* The **math.log10()** function returns floating-point values rather\
    \ than integers.\n\n### 5.1.1 First-Class Functions\n\nOne possibly surprising\
    \ feature of Python functions is that they can be treated as regular variables\
    \ in many ways (sometimes referred to as *first-class objects*). For example,\
    \ let's take another look at the `square()` function defined in Listing 5.1:\n\
    \n### 5.1.2 Variable and Keyword Arguments\n\nIn addition to regular arguments,\
    \ Python functions support variable-length arguments and keyword arguments. While\
    \ we won't need to define functions with these sorts of arguments in this tutorial,\
    \ we will need them in a few places since many built-in Python functions use them.\
    \ They are also valuable for more advanced work in Python. Let's take a quick\
    \ look at how they work.\n\nSuppose we define a function `foo()` with two arguments,\
    \ `bar` and `baz`:\n\n```\n>>> def foo(bar, baz):\n...     print((bar, baz))\n\
    ...\n>>> foo(\"hello\", \"world\")\n('hello', 'world')\n```\n\nHere we've printed\
    \ out a tuple (Section 3.6) of the two arguments as a way of showing what their\
    \ values are.\n\nBut what if we didn't know how many arguments we wanted? For\
    \ example, this won't work:\n\n```\n>>> foo(\"hello\", \"world\", \"good day!\"\
    )\n  File \"<stdin>\", line 1, in <module>\nTypeError: foo() takes 2 positional\
    \ arguments but 3 were given\n```\n\nPython supports a variable number of arguments\
    \ via the special asterisk or “star” syntax `*args` (often pronounced “star args”):⁴\n\
    \n```\n>>> def foo(*args):\n...     print(args)\n...\n>>> foo(\"hello\", \"world\"\
    , \"good day!\")\n('hello', 'world', 'good day!')\n```\n\nWe see here that Python\
    \ has automatically created a tuple of the arguments, which works for any number:\n\
    \n```\n>>> foo(\"This\", \"is a bunch\", \"of arguments\", \"to the function\"\
    )\n('This', 'is a bunch', 'of arguments', 'to the function')\n```\n\nA related\
    \ construction uses a double-asterisk or double-star syntax for *keywords*, which\
    \ are key-value pairs separated with an equals sign. The analogue of `*args` in\
    \ this case is called **kwargs (often pronounced “star star kwargs” or “star star\
    \ keyword args”); if *args results in a tuple, see if you can guess what **kwargs\
    \ does:\n\n```\n>>> def foo(**kwargs):\n...     print(kwargs)\n...\n>>> foo(a=\"\
    hello\", b=\"world\", bar=\"good day!\")\n{'a': 'hello', 'b': 'world', 'bar':\
    \ 'good day!'}\n```\n\nAs you might have guessed, **kwargs automatically converts\
    \ the key-value pairs in the argument into Python’s standard data type for such\
    \ pairs, namely, a dictionary (Section 4.4).\n\nOne common pattern is to combine\
    \ *args and **kwargs, resulting in the ability to accept a large variety of argument\
    \ types. A simple example appears in Section 5.1.3.\n\n> 4. You could use `*anything`,\
    \ but `*args` is conventional.\n\n### 5.1.3 Exercises\n\n1. Run help(len) in the\
    \ Python interpreter to confirm that help() works on built-in functions as well.\
    \ What is the result of running the command help(print)? (The result in this case\
    \ is called a multi-line docstring.)\n2. Define a deriver() function as shown\
    \ in Listing 5.5 that takes in a function and returns how much it changes over\
    \ a small interval h. Confirm that you get the result shown for the square() function\
    \ mentioned at the beginning of Section 5.1.1 (which was first defined in Listing\
    \ 5.1). What is the result of evaluating deriver(math.cos, math.tau/2)?⁵\n3. Define\
    \ a function foo() with both *args and **kwargs as shown in Listing 5.6. What\
    \ do you get when you execute the function as shown in the final statement of\
    \ Listing 5.6? (Note that you should not type ... in the call to foo(); as we\
    \ have seen when defining functions, those are continuation characters added automatically\
    \ by the Python interpreter.)\n\n> 5. Some alert readers may recognize deriver()\
    \ as the quotient that approaches the derivative as h → 0. Since the derivative\
    \ of cos x is 0 at τ/2 (corresponding to a minimum), the value of deriver(math.cos,\
    \ math.tau/2) should be close to 0 as well. The derivative of x², meanwhile, is\
    \ 2x, which accounts for the value shown in Listing 5.5 for the square() function\
    \ when x = 3.\n\n**Listing 5.5:** Deriving the rate of change over a small interval.\n\
    \n```\n>>> def deriver(f, x):\n...     h = 0.00001\n...     return (f(x+h) - f(x))/h\n\
    ...\n>>> deriver(square, 3)\n6.000009999951316\n```\n\n**Listing 5.6:** Defining\
    \ a function with both *args and **kwargs.\n\n```\n>>> def foo(*args, **kwargs):\n\
    ...     print(args)\n...     print(kwargs)\n...\n>>> foo(\"This\", \"is a bunch\"\
    , \"of arguments\", \"to the function\",\n...     a=\"hello\", b=\"world\", bar=\"\
    good day!\")\n```\n\n## 5.2 Functions in a File\n\nAlthough defining functions\
    \ in a REPL is convenient for demonstration purposes, it's a bit cumbersome, and\
    \ a better practice is to put them in a file (as we did with the script in Section\
    \ 4.5). We'll start by moving the function defined in Section 5.1 into hello_app.py,\
    \ and we'll then move it to an even more convenient external file.\n\nUsing such\
    \ an external resource requires the presence of a somewhat mysterious file called\
    \ __init__.py, which causes Python to interpret our project directory as a package.\
    \ The file doesn't have to have any content, though—it just has to exist, which\
    \ we can arrange with touch:\n\n```\n(venv) $ touch __init__.py\n```\n\n(We'll\
    \ learn a little more about this file requirement when we make a proper package\
    \ in Chapter 8.) With that, we're ready to run our Flask app at the command line\
    \ as in Section 1.5:\n\n```\n(venv) $ flask --app hello_app.py --debug run\n```\n\
    \nLet's recall the current state of our hello application, which looks like Listing\
    \ 5.7. (This is the same as Listing 4.3; your code may differ if you solved the\
    \ exercises in Section 4.2.1.)\n\n**Listing 5.7:** The current state of our hello\
    \ app.\n*hello_app.py*\n\n```\nfrom datetime import datetime\n\nfrom flask import\
    \ Flask\n\napp = Flask(__name__)\n\n@app.route(\"/\")\ndef hello_world():\n  \
    \  DAYNAMES = [\"Monday\", \"Tuesday\", \"Wednesday\",\n                \"Thursday\"\
    , \"Friday\", \"Saturday\", \"Sunday\"]\n    dayname = DAYNAMES[datetime.now().weekday()]\n\
    \    return f\"<p>Hello, world! Happy {dayname}.</p>\"\n```\n\nOur first step\
    \ is to put the function definition from Section 5.1 into this file, as shown\
    \ in Listing 5.8.\n\n**Listing 5.8:** Adding a function for the day of the week.\n\
    *hello_app.py*\n\n```\nfrom datetime import datetime\nimport calendar\n\nfrom\
    \ flask import Flask\n\ndef dayname(time):\n    \"\"\"Return the name of the day\
    \ of the week for the given time.\"\"\"\n    return calendar.day_name[time.weekday()]\n\
    \napp = Flask(__name__)\n\n@app.route(\"/\")\ndef hello_world():\n    DAYNAMES\
    \ = [\"Monday\", \"Tuesday\", \"Wednesday\",\n                \"Thursday\", \"\
    Friday\", \"Saturday\", \"Sunday\"]\n    dayname = DAYNAMES[datetime.now().weekday()]\n\
    \    return f\"<p>Hello, world! Happy {dayname}.</p>\"\n```"
  mdcn: "## 5.1 函数定义\n\nPython 函数的一个可能令人惊讶的特性是，它们在许多方面可以像普通变量一样被处理（有时被称为*一等对象*）。例如，让我们再次查看清单\
    \ 5.1 中定义的 `square()` 函数：\n\n```\n>>> def square(x):\n...     return x*x\n...\n\
    >>> square(10)\n100\n```\n\n我们实际上可以将其赋值给一个新变量，并像以前一样调用它：\n\n```\n>>> pow2 = square\n\
    >>> pow2(7)\n49\n```\n\n也许更酷的是，我们可以将函数作为参数传递给其他函数。例如，我们可以创建一个函数来应用另一个函数，然后加 1，如下所示：\n\
    \n```\n>>> def function_adder(x, f):\n...     return f(x) + 1\n...\n>>>\n```\n\
    \n然后我们可以将 **square** 作为参数传递（*不带*括号，所以不是 **square()**）：\n\n```\n>>> function_adder(10,\
    \ square)\n101\n```\n\n内置的 Python 函数工作方式相同：\n\n```\n>>> import math\n>>> function_adder(100,\
    \ math.log10)\n3.0\n```\n\n最后一个结果成立是因为 $\\log_{10} 100 = \\log_{10} 10^2 = 2$\
