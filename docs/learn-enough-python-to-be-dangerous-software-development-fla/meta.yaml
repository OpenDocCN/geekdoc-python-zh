- md: "## CHAPTER 3\nLists\n\nIn Chapter 2, we saw that strings can be thought of\
    \ as sequences of characters in a particular order. In this chapter, we'll learn\
    \ about the *list* data type, which is the general Python container for a list\
    \ of arbitrary elements in a particular order. Python lists are similar to the\
    \ *array* data type in other languages (such as JavaScript and Ruby), so programmers\
    \ familiar with other languages can probably guess a lot about how Python lists\
    \ behave. (Although Python does have a built-in array type, in this tutorial “array”\
    \ always refers to the *ndarray* data type defined by the NumPy library, which\
    \ is covered in Section 11.2.)\n\nWe'll start by explicitly connecting strings\
    \ and lists via the **split()** method (Section 3.1), and then learn about various\
    \ other list methods and techniques throughout the rest of the chapter. In Section\
    \ 3.6, we'll also take a quick look at two closely related data types, Python\
    \ *tuples* and *sets*.\n\n## 3.1 Splitting\n\nSo far we've spent a lot of time\
    \ understanding strings, and there's a natural way to get from strings to lists\
    \ via the **split()** method:\n\n```\n$ source venv/bin/activate\n(venv) $ python3\n\
    >>> \"ant bat cat\".split(\" \")    # Split a string into a three-element list.\n\
    ['ant', 'bat', 'cat']\n```\n\nWe see from this result that **split()** returns\
    \ a list of the strings that are separated from each other by a space in the original\
    \ string.\n\nSplitting on space is one of the most common operations, but we can\
    \ split on nearly anything else as well (Listing 3.1).\n\n### Listing 3.1: Splitting\
    \ on arbitrary strings.\n\n```\n>>> \"ant,bat,cat\".split(\",\")\n['ant', 'bat',\
    \ 'cat']\n>>> \"ant, bat, cat\".split(\", \")\n['ant', 'bat', 'cat']\n>>> \"antheybatheycat\"\
    .split(\"hey\")\n['ant', 'bat', 'cat']\n```\n\nMany languages support this sort\
    \ of splitting, but note that Python includes an empty string in the final case\
    \ illustrated above, which some languages (such as Ruby) trim automatically. We\
    \ can avoid this extra string in the common case of splitting on newlines using\
    \ **splitlines()** instead (Listing 3.2).\n\n### Listing 3.2: Splitting on newlines\
    \ vs. **splitlines()**.\n\n```\n>>> s = \"This is a line.\\nAnd this is another\
    \ line.\\n\"\n>>> s.split(\"\\n\")\n['This is a line.', 'And this is another line.',\
    \ '']\n>>> s.splitlines()\n['This is a line.', 'And this is another line.']\n\
    ```\n\nMany languages allow us to split a string into its component characters\
    \ by splitting on the empty string, but this doesn't work in Python:\n\n```\n\
    >>> \"badger\".split(\"\")\n\"badger\".split(\"\")\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nValueError: empty separator\n\
    ```\n\nIn Python, the best way to do this is using the **list()** function directly\
    \ on the string:\n\n```\n>>> list(\"badger\")\n['b', 'a', 'd', 'g', 'e', 'r']\n\
    ```\n\nBecause Python can naturally iterate over a string's characters, this technique\
    \ is rarely needed explicitly; instead, we'll typically use *iterators*, which\
    \ we'll learn about in Section 5.3.\n\nPerhaps the most common use of `split()`\
    \ is with *no* arguments; in this case, the default behavior is to split on *whitespace*\
    \ (such as spaces, tabs, or newlines):\n\n```\n>>> \"ant bat cat\".split()\n['ant',\
    \ 'bat', 'cat']\n>>> \"ant\\tbat\\tcat\\n    duck\".split()\n['ant', 'bat', 'cat',\
    \ 'duck']\n```\n\nWe'll investigate this case more closely when discussing *regular\
    \ expressions* in Section 4.3.\n\n### 3.1.1 Exercises\n\n- 1. Assign `a` to the\
    \ result of splitting the string “A man, a plan, a canal, Panama” on comma-space.\
    \ How many elements does the resulting list have?\n- 2. Can you guess the method\
    \ to reverse `a` in place? (Google around if necessary.)\n\n## 3.2 List Access\n\
    \nHaving connected strings with lists via the `split()` method, we'll now discover\
    \ a second close connection as well. Let's start by assigning a variable to a\
    \ list of characters created using `list()`:\n\n```\n>>> a = list(\"badger\")\n\
    ['b', 'a', 'd', 'g', 'e', 'r']\n```\n\nHere we've followed tradition and called\
    \ the variable `a`, both because it's the first letter of the alphabet and as\
    \ a nod to the array type that lists so closely resemble.\n\nWe can access particular\
    \ elements of `a` using the same bracket notation we first encountered in the\
    \ context of strings in Section 2.6, as seen in Listing 3.3.\n\n### Listing 3.3:\
    \ List access with the bracket notation.\n\n```\n>>> a[0]\n'b'\n>>> a[1]\n'a'\n\
    >>> a[2]\n'd'\n```\n\nWe see from Listing 3.3 that, as with strings, lists are\
    \ *zero-offset*, meaning that the “first” element has index **0**, the second\
    \ has index **1**, and so on. This convention can be confusing, and in fact it’s\
    \ common to refer to the initial element for zero-offset lists as the “zeroth”\
    \ element as a reminder that the indexing starts at **0**. This convention can\
    \ also be confusing when using multiple languages (some of which start list indexing\
    \ at **1**), as illustrated in the xkcd comic strip “Donald Knuth”.\n\nSo far\
    \ we’ve dealt exclusively with lists of characters, but Python lists can contain\
    \ all types of elements (Listing 3.4).\n\n### Listing 3.4: Creating a list with\
    \ several types of elements.\n\n```\n>>> soliloquy = \"To be, or not to be, that\
    \ is the question:\"\n>>> a = [\"badger\", 42, \"To be\" in soliloquy]\n>>> a\n\
    ['badger', 42, True]\n>>> a[2]\nTrue\n>>> a[3]\nTraceback (most recent call last):\n\
    \  File \"<stdin>\", line 1, in <module>\nIndexError: list index out of range\n\
    ```\n\nWe see here that the square bracket access notation works as usual for\
    \ a list of mixed types, which shouldn’t come as a surprise. We also see that\
    \ trying to access a list index outside the defined range raises an error if we\
    \ try to access an element that’s out of range.\n\nAnother convenient feature\
    \ of Python bracket notation is supporting *negative* indices, which count from\
    \ the end of the list:\n\n```\n>>> a[-2]\n42\n```\n\n1. This particular xkcd strip\
    \ takes its name from renowned computer scientist Donald Knuth (pronounced “kuh-NOOTH”),\
    \ author of *The Art of Computer Programming* and creator of the TeX typesetting\
    \ system used to prepare many technical documents, including this one.\n\nAmong\
    \ other things, negative indices give us a compact way to select the *last* element\
    \ in a list. Because `len()` (Section 2.4) works on lists as well as strings,\
    \ we could do it directly by subtracting 1 from the length (which we have to do\
    \ because lists are zero-offset):\n\n```\n>>> a[len(a) - 1]\nTrue\n```\n\nBut\
    \ it's even easier like this:\n\n```\n>>> a[-1]\nTrue\n```\n\nA final common case\
    \ is where we want to access the final element and remove it at the same time.\
    \ We'll cover the method for doing this in Section 3.4.3.\n\nBy the way, starting\
    \ in Listing 3.4, we used a literal square-bracket syntax to define lists by hand.\
    \ This notation is so natural that you probably didn't even notice it, and indeed\
    \ it's the same format the REPL uses when printing out lists.\n\nWe can use this\
    \ same notation to define the *empty list* `[]`, which just evaluates to itself:\n\
    \n```\n>>> []\n[]\n```\n\nYou may recall from Section 2.4.2 that empty or nonexistent\
    \ things like `\"\"`, `0`, and `None` are `False` in a boolean context. This pattern\
    \ holds for the empty list as well:\n\n```\n>>> bool([])\nFalse\n```\n\n### 3.2.1\
    \ Exercises\n\n- 1. We've seen that `list(str)` returns a list of the characters\
    \ in a string. How can we make a list consisting of the numbers in the range 0–4?\
    \ *Hint:* Recall the `range()` function first encountered in Listing 2.24.\n-\
    \ 2. Show that you can create a list of numbers in the range 17–41 using `list()`\
    \ with `range(17, 42)`.\n\n![](img/b3303452eae4d7974600cd38b159398e_94_0.png)\n\
    \n**Figure 3.1:** Python is unusually good at slicing.\n\n## 3.3 List Slicing\n\
    \nIn addition to supporting the bracket notation described in Section 3.2, Python\
    \ excels at a technique known as *list slicing* (Figure 3.1²) for accessing multiple\
    \ elements at a time. In anticipation of learning to *sort* in Section 3.4.2,\
    \ let’s redefine our list **a** to have purely numerical elements:\n\n```\n>>>\
    \ a = [42, 8, 17, 99]\n[42, 8, 17, 99]\n```\n\nOne way to slice a list is to use\
    \ the **slice()** function and provide two arguments corresponding to the index\
    \ number where the slice should start and where it should end. For example, **slice(2,\
    \ 4)** lets us pull out the elements with index **2** and **3**, ending at **4**:\n\
    \n```\n>>> a[slice(2, 4)]    # Not Pythonic\n[17, 99]\n```\n\nThis can be a little\
    \ tricky to understand since there is no element with index **4** due to lists\
    \ being zero-offset. We can understand this better by imagining a pointer that"
  mdcn: "## 第三章\n列表\n\n在第二章中，我们了解到字符串可以被视为特定顺序的字符序列。在本章中，我们将学习*列表*数据类型，它是Python中用于存储特定顺序任意元素列表的通用容器。Python列表类似于其他语言（如JavaScript和Ruby）中的*数组*数据类型，因此熟悉其他语言的程序员可能能猜到很多关于Python列表行为的特点。（尽管Python确实有一个内置的数组类型，但在本教程中，“数组”始终指由NumPy库定义的*ndarray*数据类型，该类型将在第11.2节中介绍。）\n\
    \n我们将首先通过**split()**方法（第3.1节）明确连接字符串和列表，然后在本章的其余部分学习各种其他列表方法和技术。在第3.6节中，我们还将快速了解两种密切相关的数据类型：Python*元组*和*集合*。\n\
    \n## 3.1 分割\n\n到目前为止，我们花了大量时间理解字符串，而通过**split()**方法从字符串到列表有一个自然的方式：\n\n```\n$\
    \ source venv/bin/activate\n(venv) $ python3\n>>> \"ant bat cat\".split(\" \"\
    )    # 将字符串分割成一个包含三个元素的列表。\n['ant', 'bat', 'cat']\n```\n\n从这个结果我们可以看到，**split()**返回一个列表，其中的字符串是由原始字符串中用空格分隔的各个部分。\n\
    \n按空格分割是最常见的操作之一，但我们也可以按几乎任何其他内容进行分割（代码清单3.1）。\n\n### 代码清单3.1：按任意字符串分割。\n\n```\n\
    >>> \"ant,bat,cat\".split(\",\")\n['ant', 'bat', 'cat']\n>>> \"ant, bat, cat\"\
    .split(\", \")\n['ant', 'bat', 'cat']\n>>> \"antheybatheycat\".split(\"hey\")\n\
    ['ant', 'bat', 'cat']\n```\n\n许多语言支持这种分割，但请注意，Python在上面说明的最后一种情况中包含了一个空字符串，而一些语言（如Ruby）会自动去除它。在按换行符分割的常见情况下，我们可以使用**splitlines()**来避免这个额外的字符串（代码清单3.2）。\n\
    \n### 代码清单3.2：按换行符分割与**splitlines()**。\n\n```\n>>> s = \"This is a line.\\nAnd\
    \ this is another line.\\n\"\n>>> s.split(\"\\n\")\n['This is a line.', 'And this\
    \ is another line.', '']\n>>> s.splitlines()\n['This is a line.', 'And this is\
    \ another line.']\n```\n\n许多语言允许我们通过按空字符串分割来将字符串拆分为其组成字符，但这在Python中不起作用：\n\n```\n\
    >>> \"badger\".split(\"\")\n\"badger\".split(\"\")\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nValueError: empty separator\n\
    ```\n\n在Python中，最好的方法是直接对字符串使用**list()**函数：\n\n```\n>>> list(\"badger\")\n['b',\
    \ 'a', 'd', 'g', 'e', 'r']\n```\n\n因为Python可以自然地迭代字符串的字符，所以很少需要显式使用这种技术；相反，我们通常会使用*迭代器*，我们将在第5.3节中学习。\n\
    \n也许`split()`最常见的用法是*不带*参数；在这种情况下，默认行为是按*空白字符*（如空格、制表符或换行符）分割：\n\n```\n>>> \"\
    ant bat cat\".split()\n['ant', 'bat', 'cat']\n>>> \"ant\\tbat\\tcat\\n    duck\"\
