    Meanwhile, the `gz` extension refers to the important `gzip` method for compressing
    files.


    The way to unzip the file is to use `tar zxvf`, which stands for “**tape archive
    gzip extract verbose file**” (as noted briefly in Section 8.5.2, the backslash
    \ is a *continuation character* and should be typed literally, but the right angle
    bracket > should be added by your shell program automatically and should not be
    typed):³


    ```

    bash

    (venv) $ tar zxvf le_python_palindrome_static.tar.gz \n> --directory palindrome_detector/

    ```


