  md: 'It''s worth noting that **return** acts immediately, much like the **break**
    keyword we saw in Listing 3.11, so we can use it to interrupt a loop. Indeed,
    **return** interrupts the entire *function*, so as soon as Python sees an occurrence
    of **return** it leaves the function entirely. For example, we can write a function
    to return the first number in a list bigger than 10, or **None** if no such number
    exists, as shown in Listing 5.3.


    **Listing 5.3:** Using **return** to return immediately from a **for** loop.


    ```

    >>> def bigger_than_10(numbers):

    ...     for n in numbers:

    ...         if n > 10:

    ...             return n

    ...     return None

    ...

    >>> bigger_than_10(squares_list(11))

    16

    ```


    Note that we''ve included an explicit **return None** in Listing 5.3, but in fact
    returning **None** is the default, so you can actually leave that step off. We''ll
    include it for now but we''ll drop it starting in Listing 5.21.


    Now that we''ve seen a few example functions, let''s write a function that we''ll
    actually use in an application—in this case, the Flask web app created in Section
    1.5. In particular, we''ll define a function called **dayname()** that takes a
    single **datetime** argument (Section 4.2) and returns the day of the week represented
    by the given time.


