  md: 'Although Listing 2.26 works just fine, it is not Pythonic. Instead, the most
    Pythonic way to iterate through string characters is to use **for** by itself,
    because it turns out that the default behavior of **for** applied to a string
    is simply to consider each character in turn, as seen in Listing 2.27.


    # **Listing 2.27:** Looping through a string with **for**.


    ```

    >>> for c in soliloquy:    # Pythonic

    ...     print(c)

    ...

