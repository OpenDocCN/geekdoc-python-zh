    \n## 7.4 Derived Classes\n\nLet's build on the techniques in Section 7.3 to make\
    \ a class that inherits from **Phrase**, which we'll call **TranslatedPhrase**.\
    \ The purpose of this so-called *derived class* (or *subclass*) is to reuse as\
    \ much of **Phrase** as possible while giving us the flexibility to, say, test\
    \ if a *translation* is a palindrome.\n\nWe'll start by factoring **processed_content()**\
    \ into a separate method, as shown in Listing 7.10. We'll see in a moment why\
    \ this is useful in the current context, though it's a nice refinement in any\
    \ case. Note that Listing 7.10 also eliminates the custom iterator from Section\
    \ 7.2 for brevity, though you are welcome to retain it.\n\n**Listing 7.10:** Factoring\
    \ **processed_content()** into a method.\n*palindrome.py*\n\n```python\nclass\
    \ Phrase:\n    \"\"\"A class to represent phrases.\"\"\"\n\n    def __init__(self,\
    \ content):\n        self.content = content\n\n    def ispalindrome(self):\n \
    \       \"\"\"Return True for a palindrome, False otherwise.\"\"\"\n        return\
    \ self.processed_content() == reverse(self.processed_content())\n\n    def processed_content(self):\n\
    \        \"\"\"Process content for palindrome testing.\"\"\"\n        return self.content.lower()\n\
    \ndef reverse(string):\n    \"\"\"Reverse a string.\"\"\"\n    return \"\".join(reversed(string))\n\
    ```\n\nNow we're ready to inherit from **Phrase**. We'll start by including the\
    \ name of the superclass as an argument to the *derived* class:\n\n```python\n\
    class TranslatedPhrase(Phrase):\n    \"\"\"A class to represent phrases with translation.\"\
    \"\"\n    pass\n```\n\nOur plan is to use **TranslatedPhrase** like this:\n\n\
    ```python\nTranslatedPhrase(\"recognize\", \"reconocer\")\n```\n\nwhere the first\
    \ argument is the **Phrase** content and the second argument is the translation.\
    \ As a result, a **TranslatedPhrase** instance needs a **translation** attribute,\
    \ which we'll create using **__init__** as with **content** in Listing 7.2:\n\n\
    ```python\nclass TranslatedPhrase(Phrase):\n    \"\"\"A class to represent phrases\
    \ with translation.\"\"\"\n\n    def __init__(self, content, translation):\n \
    \       # Handle content here.\n        self.translation = translation\n```\n\n\
    Note that **__init__** takes *two* arguments, **content** and **translation**.\
    \ We've handled **translation** like a normal attribute, but what to do about\
    \ **content**? The answer is a special Python function called **super()**:\n\n\
    ```python\nclass TranslatedPhrase(Phrase):\n    \"\"\"A class to represent phrases\
    \ with translation.\"\"\"\n\n    def __init__(self, content, translation):\n \
    \       super().__init__(content)\n        self.translation = translation\n```\n\
    \nThis calls the **__init__** method for the superclass—in this case, **Phrase**.\
    \ The result is that the **content** attribute gets set as in Listing 7.10.\n\
    Putting everything together gives the **TranslatedPhrase** class shown in Listing\
    \ 7.11.\n\n**Listing 7.11:** Defining **TranslatedPhrase**.\n*palindrome.py*\n\
    \n```python\nclass Phrase:\n    \"\"\"A class to represent phrases.\"\"\"\n\n\
    \    def __init__(self, content):\n        self.content = content\n\n    def ispalindrome(self):\n\
    \        \"\"\"Return True for a palindrome, False otherwise.\"\"\"\n        return\
    \ self.processed_content() == reverse(self.processed_content())\n\n    def processed_content(self):\n\
    \        return self.content.lower()\n\nclass TranslatedPhrase(Phrase):\n    \"\
    \"\"A class to represent phrases with translation.\"\"\"\n\n    def __init__(self,\
    \ content, translation):\n        super().__init__(content)\n        self.translation\
    \ = translation\n\ndef reverse(string):\n    \"\"\"Reverse a string.\"\"\"\n \
    \   return \"\".join(reversed(string))\n```\n\nBecause **TranslatedPhrase** inherits\
    \ from the **Phrase** object, an instance of **TranslatedPhrase** automatically\
    \ has all the methods of a **Phrase** instance, including **ispalindrome()**.\
    \ Let's create a variable called **frase** (pronounced \"FRAH-seh\", Spanish for\
    \ \"phrase\") to see how it works (Listing 7.12).\n\n**Listing 7.12:** Defining\
    \ a **TranslatedPhrase**.\n\n```python\n>>> reload(palindrome)\n>>> frase = palindrome.TranslatedPhrase(\"\
    recognize\", \"reconocer\")\n>>> frase.ispalindrome()\nFalse\n```\n\nWe see that\
    \ **frase** has an **ispalindrome()** method as claimed, and that it returns **False**\
    \ because \"recognize\" isn't a palindrome.\n\nBut what if we wanted to use the\
    \ *translation* instead of the content for determining whether the translated\
    \ phrase is a palindrome or not? Because we factored **processed_content()** into\
    \ a separate method (Listing 7.10), we can do this by *overriding* the **processed_content()**\
    \ method in **TranslatedPhrase**, as seen in Listing 7.13.\n\n**Listing 7.13:**\
    \ Overriding a method.\n*palindrome.py*\n\n```python\nclass Phrase:\n    \"\"\"\
    A class to represent phrases.\"\"\"\n\n    def __init__(self, content):\n    \
    \    self.content = content\n\n    def processed_content(self):\n        \"\"\"\
    Process the content for palindrome testing.\"\"\"\n        return self.content.lower()\n\
    \n    def ispalindrome(self):\n        \"\"\"Return True for a palindrome, False\
    \ otherwise.\"\"\"\n        return self.processed_content() == reverse(self.processed_content())\n\
    \nclass TranslatedPhrase(Phrase):\n    \"\"\"A class to represent phrases with\
    \ translation.\"\"\"\n\n    def __init__(self, content, translation):\n      \
    \  super().__init__(content)\n        self.translation = translation\n\n    def\
    \ processed_content(self):\n        \"\"\"Override superclass method to use translation.\"\
    \"\"\n        return self.translation.lower()\n\ndef reverse(string):\n    \"\"\
    \"Reverse a string.\"\"\"\n    return \"\".join(reversed(string))\n```\n\nThe\
    \ key point in Listing 7.13 is that we're using `self.translation` in the `TranslatedPhrase`\
    \ version of `processed_content()`, so Python knows to use that one instead of\
