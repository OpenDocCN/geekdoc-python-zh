    \ calculated a linear regression for survival rates as a function of age, but\
    \ the predictive capability of the linear regression model was fairly modest.\
    \ In this section, we'll look at significantly more sophisticated learning models\
    \ that yield correspondingly better predictions.³⁴\n\nAs in previous sections,\
    \ we'll import the necessary packages and create the necessary DataFrame (shown\
    \ without the REPL prompt for ease of copying):\n\n```python\nimport numpy as\
    \ np\nimport pandas as pd\nimport matplotlib.pyplot as plt\n\nURL = \"https://learnenough.s3.amazonaws.com/titanic.csv\"\
    \ntitanic = pd.read_csv(URL)\n```\n\nThere is a large variety of different models\
    \ supported by scikit-learn that we might try. A detailed discussion of such models\
    \ is beyond the scope of this tutorial, but here is a selection of the models\
    \ we'll be considering in this section with links for more information:\n\n- Logistic\
    \ Regression (https://stats.stackexchange.com/questions/389395/why-uppercase-for-x-and-lowercase-for-y)\n\
    - Naive Bayes (https://en.wikipedia.org/wiki/Naive_Bayes_classifier)\n- Perceptron\
    \ (https://en.wikipedia.org/wiki/Perceptron)\n- Decision Tree (https://en.wikipedia.org/wiki/Decision_tree)\n\
    - Random Forest (https://en.wikipedia.org/wiki/Random_forest)\n\nThese models\
    \ were chosen as representative samples of different kinds of candidate algorithms.\
    \ The only exception is Random Forest, which in the case of our dataset will turn\
    \ out to be equivalent to Decision Tree, but was retained because “Random Forest”\
    \ sounds really cool. (In all seriousness, seeing when and by how much Random\
    \ Forest differs from Decision Tree is discussed in an exercise (Section 11.7.4).)\n\
    \n³⁴ The analysis here is based in part on the article “Predicting the Survival\
    \ of Titanic Passengers”, which uses data from the popular Machine Learning from\
    \ Disaster contest run by machine-learning site Kaggle (a subsidiary of Google).\
    \ The Kaggle dataset includes both training and test data; the purpose of the\
    \ contest is to use the training data to train models and then submit predictions\
    \ based on the test data. Unfortunately, this step isn’t clear in “Predicting\
    \ the Survival of Titanic Passengers”, which uses scikit-learn’s predict() method\
    \ to calculate predictions but then doesn’t do anything with them. For participants\
    \ in the contest, those predictions would be used to create the submissions required\
    \ by Kaggle.\n\nTo use the various models on our training DataFrame, we first\
    \ need to import them from scikit-learn, which is available via the **sklearn**\
    \ package (Listing 11.24).\n\n### **Listing 11.24:** Importing learning models.\n\
    \n```python\nfrom sklearn.linear_model import LogisticRegression\nfrom sklearn.naive_bayes\
    \ import GaussianNB\nfrom sklearn.linear_model import Perceptron\nfrom sklearn.tree\
    \ import DecisionTreeClassifier\nfrom sklearn.ensemble import RandomForestClassifier\n\
    ```\n\nNote the similarity between these import statements and the one used for\
    \ linear regressions in Section 11.7.1 (Listing 11.23).\n\nAt this point, we need\
    \ to bring our data into the format required for input into scikit-learn's learning\
    \ models. Because we've decided to focus on the effects of class, sex, and age\
    \ on survival rates, our first step is to drop the columns that we won't be considering.\
    \ For convenience, we'll spell out the corresponding column names in a list and\
    \ then iterate over it, using the pandas **drop()** method to drop the corresponding\
    \ column (which by convention is **axis=1**; the default value of **axis=0** would\
    \ try to drop a row instead):\n\n```python\ndropped_columns = [\"PassengerId\"\
    , \"Name\", \"Cabin\", \"Embarked\",\n                   \"SibSp\", \"Parch\"\
    , \"Ticket\", \"Fare\"]\n\nfor column in dropped_columns:\n    titanic = titanic.drop(column,\
    \ axis=1)\n```\n\nUnlike things like histogram plots, which typically ignore Not\
    \ Available values like NaNs and NaTs, the learning models will croak if given\
    \ invalid values. To avoid this unfortunate circumstance, we'll use the same trick\
    \ seen in Listing 11.20 and redefine our DataFrames to include only values that\
