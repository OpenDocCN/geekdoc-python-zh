    After Ruby on Rails came out, I ended up getting more involved in the Ruby language
    (eventually leading to the *Ruby on Rails Tutorial*), but I never lost my interest
    in Python. I''ve been impressed by how Python''s syntax has continued to mature
    and become even more elegant, particularly with the advent of Python 3. I was
    especially pleased to see Python incorporate tau, the mathematical constant I
    proposed in *The Tau Manifesto* (https://tauday.com/tau-manifesto). Finally, I''ve
    watched in amazement as Python''s capabilities expanded into areas like numerical
    computing, plotting, and data analysis (all of which are discussed in Chapter
    11), as well as into scientific and mathematical computing (e.g., SciPy and Sage).
    The power of Python-based systems now genuinely rivals proprietary systems like
    *MATLAB*, *Maple*, and *Mathematica*; especially given Python''s open-source nature,
    it seems likely that this trend will continue.


    The future looks bright for Python, and I for one expect to use Python frequently
    in the years to come. As a result, making this tutorial has been a great opportunity
    for me to reconnect with my Python roots, and I''m glad you''re joining me on
    the journey.


    In order to give you the best broad-range introduction to programming with Python,
    *Learn Enough Python to Be Dangerous* uses four main methods:


    +   1. An interactive prompt with a Read-Eval-Print Loop (REPL)

    2. Standalone Python files

    3. Shell scripts (as introduced (https://www.learnenough.com/text-editor-tutorial/advanced_text_editing#sec-writing_an_executable_script)
    in *Learn Enough Text Editor to Be Dangerous*)

    4. Python web applications running in a web server


    We''ll begin our study of Python with four variations on the time-honored theme
    of a "hello, world" program, a tradition that dates back to the early days of
    the C programming language. The main purpose of "hello, world" is to confirm that
    our system is correctly configured to execute a simple program that prints the
    string "**hello, world!**" (or some close variant) to the screen. By design, the
    program is simple, allowing us to focus on the challenge of getting the program
    to run in the first place.


    Because one of the most common applications of Python is writing shell scripts
    for execution at the command line, we''ll start by writing a series of programs
    to display a greeting in a command-line terminal: first in a REPL; then in a'
- md: '## 1.1.1 System Setup and Installation


    Throughout what follows, I''ll assume that you have access to a Unix-compatible
    system like macOS or Linux (including the Linux-based Cloud9 IDE (https://www.learnenough.com/dev-environment-tutorial#sec-cloud_ide),
    as described in the free tutorial *Learn Enough Dev Environment to Be Dangerous*).
    The cloud IDE is especially well-suited to beginners and is recommended for those
    looking to streamline their setup process or who run into difficulties configuring
    their native system.


    If you use the cloud IDE, I recommend creating a development environment (https://www.learnenough.com/dev-environment-tutorial#fig-cloud9_page_aws)
    called **python-tutorial**. The cloud IDE uses the Bash shell program by default;
    Linux and Mac users can use whichever shell program they prefer—this tutorial
    should work with either Bash or macOS''s default Z shell (Zsh). You can use the
    following command to figure out which one is running on your system:


    ```

    $ echo $SHELL

    ```


    When updating your system settings (as in Section 1.5.1), be sure to use the profile
    file corresponding to your shell program (**.bash_profile** or **.zshrc**). See
    "Using Z Shell on Macs with the Learn Enough Tutorials (https://news.learnenough.com/macos-bash-zshell)"
    for more information.


    This tutorial standardizes on Python 3.10, although the vast majority of code
    will work with any version after 3.7. You can check to see if Python is already
    installed by running **python3 --version** at the command line to get the version
    number (Listing 1.1).⁵


    ### Listing 1.1: Checking the Python version.


    ```

    $ python3 --version

    Python 3.10.6

    ```


    5. All of the listings in *Learn Enough Python to Be Dangerous* can be found online
    at github.com/learnenough/learn_enough_python_code_listings.


    If instead you get a result like


    ```

    $ python3 --version

    -bash: python3: command not found

    ```


    or you get a version number earlier than 3.10 then you should install a more recent
    version of Python.


    The details of installing Python vary by system and can require applying a little
    technical sophistication (Box 1.2). The different possibilities are covered in
    *Learn Enough Dev Environment to Be Dangerous*, which you should take a look at
    now if you don''t already have Python on your system. In particular, if you end
    up using the cloud IDE recommended by *Learn Enough Dev Environment to Be Dangerous*,
    you can update the Python version as shown in Listing 1.2. Note that the steps
    in Listing 1.2 should work on any Linux system that supports the APT package manager.
    On macOS systems, Python can be installed using Homebrew as shown in Listing 1.3.


    ### Listing 1.2: Installing Python on a Linux system like the cloud IDE.


    ```

    $ sudo add-apt-repository -y ppa:deadsnakes/ppa

    $ sudo apt-get install -y python3.10

    $ sudo apt-get install -y python3.10-venv

    $ sudo ln -sf /usr/bin/python3.10 /usr/bin/python3

    ```


    ### Listing 1.3: Installing Python on macOS using Homebrew.


    ```

    $ brew install python@3.10

    ```


    Whichever way you go, the result should be an executable version of Python (or
    more specifically, Python 3):


    ```

    $ python3 --version

    Python 3.10.6

    ```


    (Exact version numbers may differ.)


    For historical reasons, many systems include copies of both Python 3 and an earlier
    version of Python known as Python 2. You can often get away with using the python
    command (without the 3), especially when working in a virtual environment (Section
    1.3). As you level up as a Python programmer, you may find yourself using the
    plain python command more often, secure in the knowledge that the correct version
    is being used. This route is more error-prone, though, so we’ll stick with python3
    in this tutorial since it makes the version number explicit, with negligible risk
    of accidentally using Python 2.


    ## 1.2 Python in a REPL


    Our first example of a “hello, world” program involves a Read-Eval-Print Loop,
    or REPL (pronounced “repple”). A REPL is a program that **reads** input, **evaluates**
    it, **prints** out the result (if any), and then **loops** back to the read step.
    Most modern programming languages provide a REPL, and Python is no exception;
    in Python’s case, the REPL is often known as the Python *interpreter* because
    it directly executes (or “interprets”) user commands. (A third common term is
    the Python *shell*, in analogy with the Bash and Zsh programs used to run command-line
    shell programs.)


    Learning to use the REPL well is a valuable skill for every aspiring Python programmer.
    As noted Python author David Beazley put it:


    > Although there are many non-shell environments where you can code Python, you
    will be a stronger Python programmer if you are able to run, debug, and interact
    with Python at the terminal [i.e., the REPL]. This is Python’s native environment.
    If you are able to use Python here, you will be able to use it everywhere else.


    The Python REPL can be started with the Python command **python3**, so we can
    run it at the command line as shown in Listing 1.4.


    ### Listing 1.4: Bringing up the interactive Python prompt at the command line.


    ```

    $ python3

    >>>

    ```


    Here **>>>** represents a generic Python prompt waiting for input from the user.


    We’re now ready to write our first Python program using the **print()** command,
    as seen in Listing 1.5. (Here **"hello, world!"** is a *string*; we’ll start learning
    more about strings in Chapter 2.)


    ### Listing 1.5: A “hello, world” program in the REPL.


    ```

    >>> print("hello, world!")

    hello, world!

    ```


