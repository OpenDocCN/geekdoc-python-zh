    \ the code in Listing 8.32 is now working, as evidenced by our GREEN test suite,\
    \ it relies on a rather cumbersome **for** loop that appends to a list rather\
    \ than creating it all at once. In this section, we’ll *refactor* our code, which\
    \ is the process of changing the form of code without changing its function.\n\
    \nBy running our test suite after any significant changes, we’ll catch any regressions\
    \ quickly, thereby giving us confidence that the final form of the refactored\
    \ code is still correct. Throughout this section, I suggest making changes incrementally\
    \ and running the test suite after each change to confirm that the suite is still\
    \ GREEN.\n\nPer Chapter 6, a more Pythonic way of creating a list of the sort\
    \ in Listing 8.32 is to use a list comprehension. In particular, the loop in Listing\
    \ 8.32 bears a strong resemblance to the **imperative_singles()** function from\
    \ Listing 6.4:\n\n```\nstates = [\"Kansas\", \"Nebraska\", \"North Dakota\", \"\
    South Dakota\"]\n.\n.\n.\n# singles: Imperative version\ndef imperative_singles(states):\n\
    \    singles = []\n    for state in states:\n        if len(state.split()) ==\
    \ 1:\n            singles.append(state)\n    return singles\n```\n\nAs we saw\
    \ in Listing 6.5, this can be replaced using a list comprehension with a condition:\n\
    \n```\n# singles: Functional version\ndef functional_singles(states):\n    return\
    \ [state for state in states if len(state.split()) == 1]\n```"
