  md: 'We see that Decision Tree and Random Forest are tied for the most accurate
    score, followed by Logistic Regression and Naive Bayes neck-and-neck, with Perceptron
    bringing up the rear. The models are close enough, though, that different values
    for **random_state** could easily affect their order (Section 11.7.4).


    Once we''ve performed the **fit()**, we can look at how important each factor
    was in determining the results of the model. For example, for the Random Forest
    model, the importances are as follows:


    ```

    >>> random_forest.feature_importances_

    array([0.16946036, 0.35821155, 0.47232809])

    >>> X_train.columns

    Index([''Pclass'', ''Sex'', ''Age''], dtype=''object'')

    ```


    Comparing the columns to the importances, we see that "**Age**" was the biggest
    factor, followed closely by "**Sex**", with "**Pclass**" being a distant third
    (half as important as the second-highest factor). We can visualize the result
    as a bar chart as well:


    ```

    >>> fig, ax = plt.subplots()

    >>> ax.bar(X_train.columns, random_forest.feature_importances_)

    <BarContainer object of 3 artists>

    >>> plt.show()

    ```


    Previous examples of **bar()** have gone through the pandas interface, but here
    we see that Matplotlib also supports bar charts directly. (This isn''t surprising
    since, as noted in Section 11.4, pandas uses Matplotlib under the hood.) The result
    appears in Figure 11.35.


    # Cross-Validation


    As previously noted, we split the data into training and test datasets as one
    guard against overfitting. Another common technique to avoid "fitting an elephant"
    (per von Neumann''s quip) is known as *cross-validation*. The basic idea is to
    artificially break the original training data into new training and test datasets,
    train the model on the training data, and then use the model to predict the test
    data. If doing this on several different random choices for training and test
    subsets yields fairly consistent results, we can be more confident that the model
    actually works.


    Because this is such a common technique, scikit-learn comes with a predefined
    routine for performing cross-validations called **cross_val_score**:'
  merge: -1
  pgno: 418
- img_proc: true
  md: '![](img/b3303452eae4d7974600cd38b159398e_419_0.png)


    **Figure 11.35:** The importance of each factor in *Titanic* survival rates.


    ```

    >>> from sklearn.model_selection import cross_val_score

    ```


    This method implements so-called *K*-fold cross-validation, which involves breaking
    the data into *K* pieces, or “folds”, using *K*−1 folds to train the model, and
    then predicting the values of the final fold to assess accuracy. The default value
    is **5**, which is fine for our purposes, so we need only pass the function the
    classifier instance and the training data. We’ll use Random Forest since it was
    tied for first (and, as previously noted, has an especially cool name):


    ```

    >>> random_forest = RandomForestClassifier(random_state=1)

    >>> scores = cross_val_score(random_forest, X, Y)

    >>> scores

    array([0.75524476, 0.8041958, 0.82517483, 0.83216783, 0.83098592])

    >>> scores.mean()

    0.8095538264552349

    >>> scores.std()

    0.028958338744358988

    ```'
