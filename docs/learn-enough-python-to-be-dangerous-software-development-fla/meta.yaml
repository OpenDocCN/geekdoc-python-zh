    we’ll definitely be writing *Python*, not JavaScript or Ruby translated into Python.


    > ## Box 1.1: Pythonic programming


    More so even than users of other languages, Python programmers—sometimes known
    as *Pythonistas*—tend to have strongly held opinions on what constitutes proper
    programming style. For example, as noted by Python contributor Tim Peters in “The
    Zen of Python” (Section 1.2.1): “There should be one—and preferably only one—obvious
    way to do it.” (This stands in contrast to a famous principle associated with
    the Perl programming language known as “TMTOWTDI”: There’s More Than One Way To
    Do It.)


    Code that adheres to good programming practices (as judged by Pythonistas) is
    known as *Pythonic* code. This includes proper code formatting (especially the
    practices in PEP 8 – Style Guide for Python Code (https://peps.python.org/pep-0008/)),
    using built-in Python facilities like `enumerate()` (Section 3.5) and `items()`
    (Section 4.4.1), and using characteristic idioms like list and dictionary comprehensions
    (Chapter 6). (As noted in the official documentation (https://peps.python.org/pep-0001/),
    “PEP stands for Python Enhancement Proposal. A PEP is a design document providing
    information to the Python community, or describing a new feature for Python or
    its processes or environment.” PEP 8 is the PEP specifically concerned with Python
    code style and formatting.)


    The code in this tutorial generally strives to be as Pythonic as possible given
    the material introduced at the given point in the exposition. In addition, we
    will often begin by introducing a series of intentionally *unPythonic* examples,
    culminating in a fully Pythonic version. In such cases, the distinction between
    unPythonic and Pythonic code will be carefully noted.


    Pythonistas have been known to be a bit harsh in their judgment of unPythonic
    code, which can lead beginners to become overly concerned about programming


