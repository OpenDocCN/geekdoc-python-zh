    \ to the information provided. Any trademarks which are used are done so without\
    \ consent and any use of the same does not imply consent or permission was gained\
    \ from the owner.\nAny trademarks or brands found within are purely used for clarification\
    \ purposes and no owners are in anyway affiliated with this work.\n\n## Python\
    \ Basic Programs\n\n- 1. Write a python program to print hello world.\n\n```python\n\
    print('Hello world')\n```\n\n### OUTPUT\n\nHello world\n\n- 2. Write a python\
    \ program to find area of a triangle.\n\n```python\na = float(input('Enter first\
    \ side: '))\nb = float(input('Enter second side: '))\nc = float(input('Enter third\
    \ side: '))\nsemiPerimeter = (a + b + c) / 2\narea = (semiPerimeter*(semiPerimeter-a)*(semiPerimeter-b)*(semiPerimeter-c))\
    \ ** 0.5\nprint('The area of the triangle is %0.2f' %area)\n```\n\n### OUTPUT\n\
    \nEnter first side: 5\nEnter second side: 6\nEnter third side: 7\nThe area of\
    \ the triangle is 14.70\n\n- 3. Write a python program to swap two variables without\
    \ using a third variable.\n\n```python\nP = int(input(\"Please enter value for\
    \ P: \"))\nQ = int(input(\"Please enter value for Q: \"))\n\nP, Q = Q, P\n\nprint(\"\
    The Value of P after swapping: \", P)\nprint(\"The Value of Q after swapping:\
    \ \", Q)\n```\n\n### OUTPUT\n\nPlease enter value for P: 10\nPlease enter value\
    \ for Q: 20\nThe Value of P after swapping: 20\nThe Value of Q after swapping:\
    \ 10\n\n- 4. Write a python program to generate a random number.\n\n```python\n\
    import random\nn = random.random()\nprint(n)\n```\n\n### OUTPUT\n\n0.8642851895556201\n\
    \n- 5. Write a python program to check if a number is positive, negative or zero.\n\
    \n```python\ndef NumberCheck(a):\n    if a > 0:\n        print(\"Number given\
    \ by you is Positive\")\n    elif a < 0:\n        print(\"Number given by you\
    \ is Negative\")\n    else:\n        print(\"Number given by you is zero\")\n\
    a = float(input(\"Enter a number as input value: \"))\nNumberCheck(a)\n```\n\n\
    ### OUTPUT\n\nEnter a number as input value: 5\nNumber given by you is Positive\n\
    \n- 6. Write a python program to check if a number is odd or even.\n\n```python\n\
    num = int(input(\"Enter a number: \"))\nif (num % 2) == 0:\n    print(\"{0} is\
    \ Even number\".format(num))\nelse:\n    print(\"{0} is Odd number\".format(num))\n\
    ```\n\n### OUTPUT\n\nEnter a number: 10\n10 is Even number\n\n- 7. Write a python\
    \ program to find factorial of a number.\n\n```python\nnum = int(input(\"Enter\
    \ a number: \"))\nfactorial = 1\nif num < 0:\n    print(\"Factorial does not exist\
    \ for negative numbers\")\nelif num == 0:\n    print(\"The factorial of 0 is 1\"\
    )\nelse:\n    for i in range(1, num + 1):\n        factorial = factorial*i\n \
    \   print(\"The factorial of\", num, \"is\", factorial)\n```\n\n### OUTPUT\n\n\
    Enter a number: 8\nThe factorial of 8 is 40320\n\n- 8. Write a python program\
    \ to find lcm.\n\n```python\ndef calculate_lcm(x, y):\n    if x > y:\n       \
    \ greater = x\n    else:\n        greater = y\n    while(True):\n        if((greater\
    \ % x == 0) and (greater % y == 0)):\n            lcm = greater\n            break\n\
    \        greater += 1\n    return lcm\nnum1 = int(input(\"Enter first number:\
    \ \"))\nnum2 = int(input(\"Enter second number: \"))\nprint(\"The L.C.M. of\"\
    , num1, \"and\", num2, \"is\", calculate_lcm(num1, num2))\n```\n\n### OUTPUT\n\
    \nEnter first number: 5\nEnter second number: 3\nThe L.C.M. of 5 and 3 is 15\n\
    \n- 9. Write a python program to find HCF.\n\n```python\ndef calculate_hcf(x,\
    \ y):\n    if x > y:\n        smaller = y\n    else:\n        smaller = x\n  \
    \  for i in range(1, smaller + 1):\n        if((x % i == 0) and (y % i == 0)):\n\
    \            hcf = i\n    return hcf\nnum1 = int(input(\"Enter first number: \"\
    ))\nnum2 = int(input(\"Enter second number: \"))\nprint(\"The H.C.F. of\", num1,\
    \ \"and\", num2, \"is\", calculate_hcf(num1, num2))\n```\n\n### OUTPUT\n\nEnter\
    \ first number: 6\nEnter second number: 12\nThe H.C.F. of 6 and 12 is 6\n\n- 10.\
    \ Write a python program to find factorial of a number using recursion.\n\n```python\n\
    def recur_factorial(n):\n    if n == 1:\n        return n\n    else:\n       \
    \ return n*recur_factorial(n-1)\nnum = int(input(\"Enter a number: \"))\nif num\
    \ < 0:\n    print(\"Sorry, factorial does not exist for negative numbers\")\n\
    elif num == 0:\n    print(\"The factorial of 0 is 1\")\nelse:\n    print(\"The\
    \ factorial of\", num, \"is\", recur_factorial(num))\n```\n\n### OUTPUT\n\nEnter\
    \ a number: -6\nSorry, factorial does not exist for negative numbers\n\n## Python\
    \ Array Programs\n\n- 1. Write a python program to print the elements of an array.\n\
    \n```python\narr = [1, 2, 3, 4, 5];\nprint(\"Elements of given array: \");\nfor\
    \ i in range(0, len(arr)):\n    print(arr[i], end=\" \");\n```\n\n### OUTPUT\n\
    \nElements of given array: \n1 2 3 4 5\n\n- 2. Write a python program to copy\
    \ all the elements of one array into another array.\n\n```python\narr1 = [1, 2,\
    \ 3, 4, 5];\narr2 = [None] * len(arr1);\nfor i in range(0, len(arr1)):\n    arr2[i]\
    \ = arr1[i];\nprint(\"Elements of original array: \");\nfor i in range(0, len(arr1)):\n\
    \    print(arr1[i], end=\" \");\nprint();\nprint(\"Elements of new array: \");\n\
    for i in range(0, len(arr2)):\n    print(arr2[i], end=\" \");\n```\n\n### OUTPUT\n\
    \nElements of original array: \n1 2 3 4 5 \nElements of new array: \n1 2 3 4 5\n\
    \n- 3. Write a python program to find the largest element in an array.\n\n```python\n\
    arr = [25, 11, 7, 75, 56];\nmax = arr[0];\nfor i in range(0, len(arr)):\n    if(arr[i]\
    \ > max):\n        max = arr[i];\nprint(\"Largest element present in given array:\
    \ \" + str(max));\n```\n\n### OUTPUT\n\nLargest element present in given array:\
    \ 75\n\n- 4. Write a python program to find the smallest element in an array.\n\
    \n```python\narr = [25, 11, 7, 75, 56];\nmin = arr[0];\nfor i in range(0, len(arr)):\n\
    \    if(arr[i] < min):\n        min = arr[i];\nprint(\"Smallest element present\
    \ in given array: \" + str(min));\n```\n\n### OUTPUT\n\nSmallest element present\
    \ in given array: 7\n\n- 5. Write a python program to print the sum of all elements\
    \ in an array.\n\n```python\narr = [1, 2, 3, 4, 5];\nsum = 0;\nfor i in range(0,\
    \ len(arr)):\n    sum = sum + arr[i];\nprint(\"Sum of all the elements of an array:\
    \ \" + str(sum));\n```\n\n### OUTPUT\n\nSum of all the elements of an array: 15\n\
    \n- 6. Write a python program to print the elements of an array in reverse order.\n\
    \n```python\narr = [1, 2, 3, 4, 5];\nprint(\"Original array: \");\nfor i in range(0,\
    \ len(arr)):\n    print(arr[i], end=\" \");\nprint(\"Array in reverse order: \"\
    );\nfor i in range(len(arr)-1, -1, -1):\n    print(arr[i], end=\" \");\n```\n\n\
    ### OUTPUT\n\nOriginal array: \n1 2 3 4 5 \nArray in reverse order: \n5 4 3 2\
    \ 1\n\n- 7. Write a python program to sort the elements of an array in ascending\
    \ order.\n\n```python\narr = [5, 2, 8, 7, 1];\ntemp = 0;\nprint(\"Elements of\
    \ original array: \");\nfor i in range(0, len(arr)):\n    print(arr[i], end=\"\
    \ \");\nfor i in range(0, len(arr)):\n    for j in range(i+1, len(arr)):\n   \
    \     if(arr[i] > arr[j]):\n            temp = arr[i];\n            arr[i] = arr[j];\n\
    \            arr[j] = temp;\nprint();\nprint(\"Elements of array sorted in ascending\
    \ order: \");\nfor i in range(0, len(arr)):\n    print(arr[i], end=\" \");\n```\n\
    \n### OUTPUT\n\nElements of original array: \n5 2 8 7 1 \nElements of array sorted\
    \ in ascending order: \n1 2 5 7 8\n\n- 8. Write a python program to sort the elements\
    \ of an array in descending order.\n\n```python\narr = [5, 2, 8, 7, 1];\ntemp\
    \ = 0;\nprint(\"Elements of original array: \");\nfor i in range(0, len(arr)):\n\
    \    print(arr[i], end=\" \");\nfor i in range(0, len(arr)):\n    for j in range(i+1,\
    \ len(arr)):\n        if(arr[i] < arr[j]):\n            temp = arr[i];\n     \
    \       arr[i] = arr[j];\n            arr[j] = temp;\nprint();\nprint(\"Elements\
    \ of array sorted in descending order: \");\nfor i in range(0, len(arr)):\n  \
    \  print(arr[i], end=\" \");\n```\n\n### OUTPUT\n\nElements of original array:\
    \ \n5 2 8 7 1 \nElements of array sorted in descending order: \n8 7 5 2 1\n\n\
    ## Python String Programs\n\n- 1. Write a python program to reverse a string."
