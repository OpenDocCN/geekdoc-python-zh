    , factorial)\n```\n\n### 输出\n\nEnter a number: 8\nThe factorial of 8 is 40320\n\
    \n- 8. 编写一个Python程序求最小公倍数。\n\n```python\ndef calculate_lcm(x, y):\n    if x >\
