  mdcn: '## 面向儿童的Python，Codecademy


    Learn Python 是 Codecademy 推出的一门全面的 Python 基础课程。Codecademy 是在线编程教育的先驱，拥有一个非常受欢迎的平台。学生在提供即时反馈的在线编码环境中完成一系列互动课程。


    这门课程并非专门为儿童设计，但课程内容应该适合大多数高中生和部分初中生。


    ## Udemy


    面向儿童的编程课程，Udemy


    Udemy 是一个在线课程平台，任何学科专家都可以利用它来创建和发布教育内容。潜在的讲师提交他们的课程想法，这些想法会经过评估，并且必须获得 Udemy 的批准。


    ## 使用实践教程——最适合儿童的在线Python教程


    - Trinket

    - TechRocket

    - Practice Python


    ### Trinket


    面向儿童的Python，Trinket


    Trinket 的 "Hour of Python" 是一系列面向完全初学者以及更有经验的儿童的 Python 教程、挑战和练习。许多挑战是根据专业程序员必须解决的简单现实世界问题建模的。


