  mdcn: "# 模块\n\nPython 模块是包含一组代码的文件，你可以将其包含在你的应用程序中。你可以使用 Python 的内置模块，也可以编写自己的模块。例如，你可以导入\
    \ math 模块来使用其中已有的 `sqrt()` 函数，而不是自己编写一个计算平方根的函数。\n\n为了展示语法可以多么清晰，可以看看这些定义和示例。\n\
    \n更详细地说：\n\n变量用于存储信息，所以孩子们可以把变量想象成可以存放物品的盒子。\n\n示例：为了记住盒子里放了什么，他们会赋予一个描述性的名称，比如：\n\
    \n```\nnumber_of_doughnuts\n```\n\n在这种情况下，孩子们现在有办法记住一旦盒子装满后会放多少甜甜圈，这就引出了...\n\n\
    # 初始化变量\n\n给变量命名后，你需要给它一个值。给这个赋值就像把盒子装满。\n\n示例：如果孩子们有 3 个甜甜圈，他们会将 `number_of_doughnuts`\
    \ 设置为 3，像这样：\n\n```\nnumber_of_doughnuts = 3\n```\n\n将这个值 \"3\" 赋给变量的过程称为初始化。\n\
    \n# 打印变量\n\n为了让孩子们在运行程序时能够看到变量的值，他们需要打印它。（不，这不会把任何东西发送到打印机！）。下面会更多地介绍打印，但现在，这个过程看起来很简单：\n\
    \n```\nprint(number_of_doughnuts)\n```\n\n# 字符串\n\n变量可以存储数字以外的数据；它们也可以存储单词。程序员将单词变量称为“字符串”。\n\
    \n示例：所以，如果你的孩子给他们的盒装甜甜圈之一命名，会是什么名字呢？\n\n```\ndoughnut_name = \"Doughy\"\n\nprint(doughnut_name)\n\
    ```\n\n如你所见，创建字符串变量时，其值必须在引号内。\n\n# 布尔变量\n\n你也可以使用变量来表示某事是真还是假。这种类型的数据称为布尔值。\n\
    \n示例：所以，在这种情况下，你会创建一个变量来表示甜甜圈是否存在。\n\n```\ndoughnuts_exist = True\n```\n\n```\n\
    print(doughnuts_exist)\n```\n\n你也可以将其设置为非真，就像你的孩子吃了甜甜圈，甜甜圈不再存在的情况一样。\n\n这就像将变量更改为以下内容一样简单：\n\
    \n```\ndoughnuts_exist = False\n```\n\n总结一下：\n\n孩子们会使用变量来存储不同类型的数据，以便在程序中稍后使用：\n\
    \n```\nstring_variable = \"value\"\n```\n\n```\nnumber_variable = 3\n```\n\n```\n\
    boolean_variable = True\n```\n\n# 编写打印语句\n\n要从程序获取输出，孩子们会使用打印语句，它包含几个不同的步骤。\n\n\
    例如，孩子们会首先输入单词：print\n\n然后，他们会输入一个左括号和一个左引号：print(\"\n\n接着，他们写下任何想要显示的文本：print(\"\
    什么？我可以写任何东西？！\n\n当文本完成后，他们放上第二个引号和一个右括号：print(\"什么？我可以写任何东西？！\")\n\n一旦执行，输出将简单地是：什么？我可以写任何东西？！\n\
    \n# 整数\n\n你也可以使用打印语句进行简单的数学运算，例如：\n\n```\nprint(4 + 5)\n\nprint(10 - 2)\n\nprint(3\
    \ + 1 - 4)\n```\n\n屏幕上会打印出什么？方程式的答案（9、8 等）。\n\n# 条件语句\n\n条件语句有助于引导程序的流程。它通过让代码的某些部分仅在特定场景下运行来实现这一点。\n\
    \n具体来说，条件语句的求值结果为真或假，这个值决定了特定的代码是否会运行。\n\n条件语句总是使用关键字 `if`、`else` 和 `elif`（“else\
    \ if”的缩写）。\n\n例如，如果你的孩子正在制作一个游戏，并且他们的玩家拥有满血或满生命值，那么当该玩家被击中时会发生什么？\n\n首先，他们会为生命值创建一个变量，然后将其设置为\
    \ 3：\n\n```\nlife = 3\n```\n\n然后，如果玩家被击中，玩家将失去生命值或一个生命点。要从生命值中减去，他们只需说：\n\n```\n\
    life -= 1\n```\n\n然后打印生命变量：\n\n```\nprint(life)\n```\n\n并运行代码以查看结果！\n\n（如果以上内容令人困惑，“life\
    \ -=1”只是 `life = life -1` 的简写，它将生命值设置为比之前少一。你可以根据偏好编写任一版本。）\n\n更进一步，生命值只能减去这么多，对吧？意思是，玩家的生命值通常不会降到零以下。因此，需要使用一个条件来防止这种情况发生。\n\
    \n具体来说，将使用一个 `if` 语句来防止生命值降到零以下。\n\n```\nif life > 0:\n    life -= 1\n```\n\n\
    在这里，`if` 语句仅在它们后面的条件为真时，才会运行其下方缩进的代码。因此，只有当生命值大于零时，`life -=1` 才会被执行。\n\n# Elif\
    \ 语句\n\n当第一个 `if` 语句不为真，但你想检查另一个条件时，使用 `elif` 语句来执行某些操作。\n\n```\nelif life ==\
    \ 0:\n    print(\"The player ran out of life!\")\n```\n\n注意之前提到的 \"=\" 和这里的 \"\
    ==\" 之间的区别；`life = 3` 和 `life == 3` 是非常不同的！\n\n当你给变量 `life` 赋值时，写 `life = 3`：“生命值为\
    \ 3。”\n\n在条件语句中写 `life == 3`：“生命值是否等于 3？”\n\n# Else 语句\n\n此外，当 `if` 和 `elif` 语句都不为真时，孩子们会使用\
    \ `else` 语句来执行某些操作。此语句没有条件，因此它会捕获前面语句未涵盖的所有情况。\n\n# While 循环\n\n在编程中，循环允许你重复执行一段代码多次。那么，`while`\
    \ 循环会重复执行代码，直到满足特定条件。\n\n例如，也许有一个像右边这样的问题——这棵树有多少片叶子？\n\n那么，需要多少次尝试才能猜对？\n\n1\
    \ 次猜测？2 次猜测？4 次猜测？100 次猜测？\n\n当一段代码需要运行不确定或非特定次数时，你会使用 `while` 循环。\n\n`while`\
    \ 循环由一个循环控制变量（首先创建）、一个条件语句（循环运行必须满足的条件）和一个循环体（将要运行的实际代码）组成。\n\n# For 循环\n\n另一方面，`for`\
    \ 循环用于在你知道代码需要运行多少次的情况下重复执行一段代码。如果你知道有多少个元素，`for` 循环可以帮助你对多个元素执行操作。\n\n# 函数\n\n\
    很多时候，你想执行一系列操作，而不是每次都重复编写这些语句，你可以使用函数！\n\n非常直接，对吧？\n\n# 最佳在线儿童 Python 课程\n\n在线课程可能是当今孩子们学习\
    \ Python 最流行的方式，这是有充分理由的。孩子们可以在舒适的家中学习，父母也可以避免长途来回奔波。大多数儿童 Python 课程都采用一些游戏化元素，使学习变得有趣。它们还以简短的片段呈现内容，许多课程引导学生完成构建有趣且有用的项目的过程。\n\
    \n- CodeWizardsHQ\n- Tynker\n- Codecademy\n- Udemy\n\n# CodeWizardsHQ：儿童 Python\n\
    \n蓝色 CodeWizardsHQ 标志\n\nCodeWizardsHQ 的在线儿童编程课程结合了促进学生参与的元素和帮助孩子建立扎实编程技能的策略。一位真人讲师通过基于项目的课程指导学生。儿童\
    \ Python 课程和项目基于孩子们喜欢的主题，如超级英雄、视频和应用程序。\n\n该课程包括一个浏览器内代码编辑器，供孩子们尝试代码并提交作业供讲师审阅。儿童\
