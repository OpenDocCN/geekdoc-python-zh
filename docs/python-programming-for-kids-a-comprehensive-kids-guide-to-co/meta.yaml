  md: 'ZeroDivisionError: integer division or modulo by zero


    When the interpreter reaches this line, your program execution stops completely!
    However, using the try-except block can help avoiding the same.


    ```

    >>> try:

    ...     x = 1/0

    ... except:

    ...     print "Some error occurred"

    ...

    Some error occurred

    ```'
