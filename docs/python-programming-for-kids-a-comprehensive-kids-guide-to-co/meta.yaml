- md: "# Modules\n\nPython modules are files that contain a set of code which you\
    \ can include in your application. You can use Python’s in-built modules or write\
    \ your own. For example, you can import the math module in order to use the sqrt()\
    \ function that exists there, instead of writing your own function to calculate\
    \ the square root.\n\nTo show just how clear the syntax can be, consider these\
    \ definitions and examples.\n\nIn more detail:\n\nVariables are used to store\
    \ information, so kids can think of variables like boxes they can store items\
    \ in.\n\nExample: And in order to remember what was put in the box, they assign\
    \ a descriptive name, like:\n\n```\nnumber_of_doughnuts\n```\n\nIn this case,\
    \ kids now have the means to remember how many doughnuts will go in the box once\
    \ that box is filled, which leads us to...\n\n# Initializing Variables\n\nAfter\
    \ a variable is given a name, you give it a value. Assigning this value is like\
    \ filling the box.\n\nExample: if kids had 3 doughnuts, they would set number_of_doughnuts\
    \ equal to 3, like so:\n\n```\nnumber_of_doughnuts = 3\n```\n\nAssigning this\
    \ value of “3” to the variable is called initializing.\n\n# Printing Variables\n\
    \nFor kids to be able to see the value of their variable when they run their program,\
    \ they’ll need to print it. (No, it won't send anything to the printer!). There\
    \ will be more on printing below, but for now, the process would simply look like:\n\
    \n```\nprint(number_of_doughnuts)\n```\n\n# Strings\n\nVariables can hold data\
    \ besides just numbers; they can hold words as well. Programmers call word variables\
    \ “strings.”\n\nExample: So if your kids named one of their boxed doughnuts, what\
    \ would it be?\n\n```\ndoughnut_name = \"Doughy\"\n\nprint(doughnut_name)\n```\n\
    \nAs you can see, when creating string variables, their value must be inside quotation\
    \ marks.\n\n# Boolean Variables\n\nYou can also use variables to show if something\
    \ is true or false. This type of data is called a boolean.\n\nExample: So, you'd\
    \ create a variable in this case in order to indicate whether doughnuts exist.\n\
    \n```\ndoughnuts_exist = True\n```\n\n```\nprint(doughnuts_exist)\n```\n\nYou\
    \ can also set it to be not true, as would be the case if your kid ate the doughnut\
    \ and thus the doughnut wasn't there anymore.\n\nIt's as simple as changing the\
    \ variable to the following:\n\n```\ndoughnuts_exist = False\n```\n\nTo put it\
    \ all together:\n\nKids would use variables to store different types of data that\
    \ they can use later in their programs:\n\n```\nstring_variable = \"value\"\n\
    ```\n\n```\nnumber_variable = 3\n```\n\n```\nboolean_variable = True\n```\n\n\
    # Making a print statement\n\nTo get the output from the program, kids would use\
    \ the print statement, which includes a few different procedures.\n\nFor example,\
    \ kids would start by typing the word: print\n\nAfter that, they'd type an opening\
    \ parentheses and an opening quotation mark: print(\"\n\nThen they'd write any\
    \ text they want displayed: print(\"What? I can write anything?!\n\nWhen the text\
    \ is finished, they put a second quotation mark and a closing parentheses: print(\"\
    What? I can write anything?!\")\n\nOnce executed, the output would simply be:\
    \ What? I can write anything?!\n\n# Integers\n\nYou can also use print statements\
    \ to do simple math, for instance:\n\n```\nprint(4 + 5)\n\nprint(10 - 2)\n\nprint(3\
    \ + 1 - 4)\n```\n\nWhat prints to the screen? The answers to the equations (9,\
    \ 8, etc.).\n\n# Conditionals\n\nA conditional statement helps direct the flow\
    \ of a program. It does this by having some portions of the code only run under\
    \ specific scenarios.\n\nSpecifically, conditional statements evaluate to either\
    \ true or false, and this value determines if a specific piece of code will run.\n\
    \nConditionals always use the keywords if, else, and elif (short for \"else if\"\
    ).\n\nFor example, if your child is making a game and their player has full health\
    \ or life, what should happen when that player gets hit?\n\nTo start, they'd make\
    \ a variable for life and then set it equal to 3:\n\n```\nlife = 3\n```\n\nThen,\
    \ if the player gets hit, the player will lose life, or a life point. To subtract\
    \ from life, they'd simply say:\n\n```\nlife -= 1\n```\n\nThe life variable is\
    \ then printed:\n\n```\nprint(life)\n```\n\nAnd code is run to see the result!\n\
    \n(If the above is confusing, “life -=1” is just shorthand for life = life -1,\
    \ which sets life to one less than what it was before. You can write either version,\
    \ depending on preference.)\n\nTo go one step further, you can only subtract so\
    \ much life, right? Meaning, a player’s life doesn’t typically drop below zero.\
    \ So, a condition would need to be used to prevent that scenario.\n\nAn if statement\
    \ specifically would be used to prevent life from dropping under zero.\n\n```\n\
    if life > 0:\n    life -= 1\n```\n\nHere, if statements will run the code indented\
    \ beneath them only when the condition after them is true. So, only when life\
    \ is greater than zero will life -=1 be executed.\n\n# Elif Statements\n\nUse\
    \ an elif statement to do something when the first if statement isn't true, but\
    \ you want to check for another condition.\n\n```\nelif life == 0:\n    print(\"\
    The player ran out of life!\")\n```\n\nNote the difference between \"=\" mentioned\
    \ earlier and \"==\" here; life = 3 and life == 3 are very different!\n\nWrite\
    \ life = 3 when you're assigning a value to the variable life: \"Life has the\
    \ value 3.\"\n\nWrite life == 3 in conditional statements: \"Is life equal to\
    \ 3?\"\n\n# Else Statements\n\nAdditionally, kids would use an else statement\
    \ to do something when the if and elif statements aren't true. This statement\
    \ has no conditions, so it will catch anything that isn't covered by the previous\
    \ statements.\n\n# While Loops\n\nIn programming, loops allow you to repeat a\
    \ block of code a number of times. While loops, then, repeat code until a specific\
    \ condition is met.\n\nFor example, maybe there's a question like the one to the\
    \ right—how many leaves does the tree have?\n\nWell, how many tries will it take\
    \ to guess?\n\n1 guess? 2 guesses? 4 guesses? 100 guesses?\n\nFor times when a\
    \ block of code needs to run an uncertain or non-specific amount of times, you\
    \ use a while loop.\n\nWhile loops are made of a loop control variable (made first),\
    \ a conditional statement (the conditions that must be met for the loop to run),\
    \ and a loop body (the actual code that will run).\n\n# For Loops\n\nOn the other\
    \ hand, for loops are used to repeat a block of code if you know how many times\
    \ it needs to run. For loops help you perform an action on multiple elements,\
    \ if you know how many there are.\n\n# Functions\n\nThere are many times where\
    \ you'd want to perform a series of actions, and instead of writing those statements\
    \ over and over every time, you can use a function!\n\nPretty straightforward,\
    \ right?\n\n# BEST ONLINE PYTHON CLASSES FOR KIDS\n\nOnline classes might be the\
