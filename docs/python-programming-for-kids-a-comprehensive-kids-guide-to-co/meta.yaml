    >>> from subprocess import call\n>>> call(['ls', '-l'])\n```\n\n```\ntotal 16\n\
    -rw-------@ 1 donny staff 439 Oct 21 16:06 chess.csv\n-rw-r--r-- 1 donny staff\
    \ 72 Mar 1 17:28 read.py\n```\n\n0\n\n为了检查当发生错误时这个 0 会发生什么，我们可以在一个非 git 仓库中运行\
    \ git 命令：\n\n```python\n>>> from subprocess import call\n>>> call(['git', 'status'])\n\
    ```\n\n```\nfatal: Not a git repository (or any of the parent directories): .git\n\
    ```\n\n128\n\n在输出中，第二行是命令的输出，而 128 是退出码。\n\n## 4. 处理异常\n\nPython 是一种解释型语言，这意味着代码是逐行执行的。如果在某一行遇到错误，代码的进一步执行就会停止。但是，你可以使用\
    \ try-except 块来处理 Python 中已知的异常。让我们看一个简单的例子，通过产生一个除以 0 的运行时错误：\n\n```python\n\
    >>> x = 1/0\n```\n\n```\nTraceback (most recent call last):\n  File \"<stdin>\"\
    , line 1, in <module>\nZeroDivisionError: integer division or modulo by zero\n\
    ```\n\n当解释器到达这一行时，你的程序执行会完全停止！然而，使用 try-except 块可以帮助避免这种情况。\n\n```python\n>>>\
    \ try:\n...     x = 1/0\n... except:\n...     print \"Some error occurred\"\n\
    ...\nSome error occurred\n```\n\n当 try 块内发生此类错误时，解释器只会执行 except 块。except 块可以通过捕获单个错误来进一步扩展：\n\
    \n```python\n>>> try:\n...     x = 1/0\n... except ZeroDivisionError:\n...   \
    \  print \"You tried to divide by zero\"\n... except:\n...     print \"Some unknown\
    \ error occurred\"\n...\nYou tried to divide by zero\n```\n\n你可以更进一步，捕获异常并进一步处理它（例如将错误记录到某处），方法是修改\
    \ except 块：\n\n```python\n>>> try:\n...     x = 1/0\n... except Exception as e:\n\
    ...     print \"Exception occurred: \" + str(e)\n...\nException occurred: integer\
    \ division or modulo by zero\n```\n\n## 5. 使用模块\n\n在查看他人的代码时，你经常会遇到这段代码：\n\n```python\n\
    def some_function():\n    ...\n\nif __name__ == '__main__':\n    ...\n```\n\n\
    当你在 Python 中创建模块时，这经常被使用。理想情况下，最后一个块中的代码通常演示了上面函数的一些基本用法。当你在终端中运行文件时，这段代码会被执行。但是，如果你在另一个文件中使用这个模块来使用函数，这个块就不会执行。感到困惑吗？让我们通过一个例子来更好地理解这一点：\n\
    \n```python\n# File print.py\n\ndef print_me():\n    print \"me\"\n\n# demonstrating\
    \ use of print_me\nprint_me()\n```\n\n现在，如果我导入这个文件以在新文件中使用该函数，看看会发生什么：\n\n```python\n\
    >>> import print_me\n>>>\n```\n\n一旦你导入文件，该函数就会被执行。为了避免这种情况，我们将函数放在 `if __name__\
    \ == '__main__':` 块下：\n\n```python\n# File print.py\n\ndef print_me():\n    print\
    \ \"me\"\n\nif __name__ == '__main__':\n    # demonstrating use of print_me\n\
    \    print_me()\n```\n\n当我们修改代码后，`print_me()` 函数仅在你将其作为文件运行时执行，而不会在你将其作为模块导入时执行：\n\
    \n```python\n>>> import print\n>>>\n```\n\n# 最后的思考\n\n如果 Python 不是你的第一门编程语言，你需要一些时间来适应它的做事方式。\n\
    \n# 教孩子编程有什么好处？\n\n## 学前班和幼儿园：从错误中学习和解决问题\n\n编程有助于加强学龄前儿童和幼儿园儿童从失败中学习和恢复的能力，因为在编码时犯错是“免费的”，因为孩子们总是可以删除并重试。\n\
    \n得益于朗读功能，不识字的孩子也能真正学习如何编程！这帮助他们学习宝贵的解决问题的技能，例如弄清楚如何让屏幕上的物体穿过不同的障碍物。\n\n## 小学：创造力\n\
    \n小学生，特别是十岁的孩子，喜欢通过完成自己的项目来锻炼独立性，而不需要成人的帮助。我通过 CodeMonkey 的“Meet the Game Builder”博客系列第一次注意到了这一点。几乎所有接受采访的学生都是十岁。我起初以为这是巧合，但那些与学生一起使用过\
    \ Game Builder 的老师说，他们的四年级学生对这个平台最感兴趣。为什么？因为在这个年龄，学生最渴望尝试和创造。\n\n## 初中：算法、计算和顺序思维\n\
    \n在数学技能方面，编程帮助学生学习算法思维，换句话说，就是如何制定策略，将哪些公式应用于其他实例，以便为各种其他问题提供快速解决方案。初中生处于充分利用这些技能的理想认知阶段。\n\
    \n编程帮助学生学习计算思维，这有助于识别数据模式，并以类似于计算机系统化的方式行事。\n\n通过编程，初中生可以更好地理解逻辑以及顺序或命令顺序的重要性。\n\
    \n给所有老师和家长的有趣事实——这些技能也体现在标准化考试中数学和阅读成绩的提高上！\n\n## 高中及以后：掌握编程技能\n\n早期学习编程的学生在进入高中后就准备好参加\
    \ AP 计算机科学课程。那些参加过 AP 计算机科学课程的学生后来被发现在统计学和 AP 微积分考试中表现优于同龄人。毕业后，这些学生完全具备了在职场中日益受到重视的\
    \ 21 世纪技能。\n\n需要注意的是，计算机科学技能的发展也取决于学生的个人进度和完成编程课程所投入的时间。最终掌握这些好处还取决于孩子的学校是否提供编程课程。\n\
    \n那么，有编程背景的学生在高中毕业后还能享受哪些额外的好处呢？\n\n有计算机编程经验的大学毕业生更有可能直接获得高薪工作。平均而言，计算机科学专业的学生比没有学习计算机科学的同龄人多赚\
    \ 40%。\n\n计算机编程也有助于成年人在日常任务中提高效率。无论他们是在厨房还是在为孩子准备上学，由计算机编程强化的敏锐的顺序思维能力，都有助于成年人以最短、最有效的方式战略性地规划日常任务。这样想——在基于文本的代码中使用的一个非常基本的计算机编程技能是循环。循环帮助程序员以最短、最清晰、最简洁的方式编写程序。这种思维可以帮助程序员养成提前规划和保持条理的习惯。"
