    \ main command as a list. For instance, to run the command `ls -l`, the following\
    \ needs to be done:\n\n```python\n>>> from subprocess import call\n>>> call(['ls',\
    \ '-l'])\n```\n\n```\ntotal 16\n-rw-------@ 1 donny staff 439 Oct 21 16:06 chess.csv\n\
    -rw-r--r-- 1 donny staff 72 Mar 1 17:28 read.py\n```\n\n0\n\nTo check what happens\
    \ to the 0 when something wrong happens, we can run a git command in a non git\
    \ repository:\n\n```python\n>>> from subprocess import call\n>>> call(['git',\
    \ 'status'])\n```\n\n```\nfatal: Not a git repository (or any of the parent directories):\
    \ .git\n```\n\n128\n\nIn the output, the second line is the output of the command,\
    \ whereas 128 is the exit code.\n\n## 4. Working with Exceptions\n\nPython is\
    \ an interpreted language, which means that the code is executed line by line.\
    \ If an error is encountered on a line, further execution of the code stops. However,\
    \ you can handle known exceptions in Python using the try-except block. Let’s\
    \ look at a simple example, by generating a runtime error of dividing by 0:\n\n\
    ```python\n>>> x = 1/0\n```\n\n```\nTraceback (most recent call last):\n  File\
    \ \"<stdin>\", line 1, in <module>\nZeroDivisionError: integer division or modulo\
    \ by zero\n```\n\nWhen the interpreter reaches this line, your program execution\
    \ stops completely! However, using the try-except block can help avoiding the\
    \ same.\n\n```python\n>>> try:\n...     x = 1/0\n... except:\n...     print \"\
    Some error occurred\"\n...\nSome error occurred\n```\n\nWhen such an error occurs\
    \ within the try block, the interpreter just executes the except block. The except\
    \ block can further be extended by catching individual errors:\n\n```python\n\
    >>> try:\n...     x = 1/0\n... except ZeroDivisionError:\n...     print \"You\
    \ tried to divide by zero\"\n... except:\n...     print \"Some unknown error occurred\"\
    \n...\nYou tried to divide by zero\n```\n\nYou can go one step ahead, catch the\
    \ exception and further process it (like log the error somewhere) by modifying\
    \ the except block:\n\n```python\n>>> try:\n...     x = 1/0\n... except Exception\
    \ as e:\n...     print \"Exception occurred: \" + str(e)\n...\nException occurred:\
    \ integer division or modulo by zero\n```\n\n## 5. Working with Modules\n\nWhile\
    \ looking at the code of others, you'll often encounter this block of code:\n\n\
    ```python\ndef some_function():\n    ...\n\nif __name__ == '__main__':\n    ...\n\
    ```\n\nThis is used frequently when you create modules in Python. Ideally, the\
    \ code in the last block usually demonstrates some basic usage of the function(s)\
    \ above. When you run the file in the terminal, this code is executed. However,\
    \ if you use this module in a different file for the purpose of using the function,\
    \ this block is not executed. Confusing? Let's understand this better through\
    \ an example:\n\n```python\n# File print.py\n\ndef print_me():\n    print \"me\"\
    \n\n# demonstrating use of print_me\nprint_me()\n```\n\nNow, if I import this\
    \ file to use the function in a new file, watch what happens:\n\n```python\n>>>\
    \ import print_me\n>>>\n```\n\nThe function gets executed as soon as you import\
    \ the file. To avoid this, we put the function under a `if __name__ == '__main__':`\
    \ block:\n\n```python\n# File print.py\n\ndef print_me():\n    print \"me\"\n\n\
    if __name__ == '__main__':\n    # demonstrating use of print_me\n    print_me()\n\
    ```\n\nWhen we modify the code, the `print_me()` function is executed only when\
    \ you run it as a file, but not when you import it as a module:\n\n```python\n\
    >>> import print\n>>>\n```\n\n# Final Thoughts\n\nIf Python isn’t your first programming\
    \ language, it’s going to take some time to adjust to its way of doing things.\n\
    \n# WHAT ARE THE BENEFITS OF TEACHING KIDS TO CODE?\n\n## Preschool and Kindergarten:\
    \ Learning from Mistakes and Problem Solving\n\nCoding helps strengthen the ability\
    \ of preschoolers and kindergartners to learn and recover from failure since making\
    \ a mistake while coding is ‘free’ since kids can always delete and try again.\n\
    \nThanks to read out loud features, non-readers are able to learn how to code\
    \ for real! This helps them learn valuable problem solving skills, such as figuring\
    \ out how to move an object on the screen through different obstacles.\n\n## Elementary\
    \ School: Creativity\n\nElementary students, specifically ten-year-olds, love\
    \ to exercise independence through completing their own projects without the help\
    \ of an adult. I noticed this first-hand through CodeMonkey’s Meet the Game Builder\
    \ blog series. Almost all of the students interviewed are ten-years-old. I thought\
    \ at first it was a coincidence, but teachers who have used Game Builder with\
    \ their students said that their fourth graders were the most excited about this\
    \ platform. Why? Because at this age, students are the most eager to experiment\
    \ and create.\n\n## Middle School: Algorithmic, Computational and Sequential Thinking\n\
    \nIn terms of math skills, coding helps students learn algorithmic thinking or\
    \ in other words, how to strategize which formulas can be applied to other instances\
    \ in order to come up with quick solutions for various other problems. Middle\
    \ Schoolers are at an ideal cognitive stage to fully utilize these skills.\n\n\
    Coding helps students learn computational thinking which helps with recognizing\
    \ data patterns and behave similarly to the systematic way in which a computer\
    \ behaves.\n\nThrough coding, middle schoolers can better understand logic and\
    \ how important sequencing, or the order of commands, is.\n\nFun fact for all\
    \ teachers and parents – these skills also carry over to better performance in\
    \ math and reading grades on standardized tests!\n\n## High School and Beyond:\
    \ Mastering of Coding Skills\n\nStudents who learn how to code early on are ready\
    \ to take AP Computer Science once they reach high school. Those who have taken\
    \ AP Computer Science have been found to later outperform their fellow peers in\
    \ Statistics and AP Calculus exams. After graduation, these students are fully\
    \ equipped with 21st century skills that are increasingly valued in the workplace.\n\
    \nIt is important to note that the development of computer science skills are\
    \ also subjective to individual student progress and the amount of time dedicated\
    \ to completing coding courses. The eventual mastering of these benefits also\
    \ depends on whether a child’s school offers coding classes.\n\nSo, what additional\
    \ benefits do students with a background in coding enjoy after high school?\n\n\
    Students who have experience with computer programming are more likely to get\
    \ a high-paying job straight out of college. On average, computer science majors\
    \ earn 40% more than peers who have not studied computer science.\n\nComputer\
    \ programming also helps adults to be more efficient in their daily tasks. Whether\
    \ they are in the kitchen or getting their kids ready for school, the sharp skills\
    \ of sequential thinking strengthened by computer programming helps adults strategically\
    \ plan daily tasks in the shortest and most efficient way possible. Think of it\
    \ this way – a very basic computer programming skill used in text-based code is\
    \ the use of loops. Loops help the coder write their program in the shortest,\
    \ clearest and most concise way possible. This kind of thinking can help coders\
    \ get into the habit of planning ahead and staying organized."
