  md: '# WHAT ARE THE BENEFITS OF TEACHING KIDS TO CODE?


    Preschool and Kindergarten: Learning from Mistakes and Problem Solving


    Coding helps strengthen the ability of preschoolers and kindergartners to learn
    and recover from failure since making a mistake while coding is ‘free’ since kids
    can always delete and try again.


    Thanks to read out loud features, non-readers are able to learn how to code for
    real! This helps them learn valuable problem solving skills, such'
  merge: -1
  pgno: 133
- img_proc: true
  md: 'as figuring out how to move an object on the screen through different obstacles.


    # Elementary School: Creativity


    Elementary students, specifically ten-year-olds, love to exercise independence
    through completing their own projects without the help of an adult. I noticed
    this first-hand through CodeMonkey’s Meet the Game Builder blog series. Almost
    all of the students interviewed are ten-years-old. I thought at first it was a
    coincidence, but teachers who have'
  merge: -1
  pgno: 134
- img_proc: true
  md: 'used Game Builder with their students said that their fourth graders were the
    most excited about this platform. Why? Because at this age, students are the most
    eager to experiment and create.


    # Middle School: Algorithmic, Computational and Sequential Thinking


    In terms of math skills, coding helps students learn algorithmic thinking or in
    other words, how to strategize which formulas can be applied to'
  merge: -1
  pgno: 135
- img_proc: true
  md: 'other instances in order to come up with quick solutions for various other
    problems. Middle Schoolers are at an ideal cognitive stage to fully utilize these
    skills.


    Coding helps students learn computational thinking which helps with recognizing
    data patterns and behave similarly to the systematic way in which a computer behaves.


    Through coding, middle schoolers can better understand logic and how important
    sequencing, or the order of commands, is.'
  merge: -1
  pgno: 136
- img_proc: true
  md: 'Fun fact for all teachers and parents – these skills also carry over to better
    performance in math and reading grades on standardized tests!


    # High School and Beyond: Mastering of Coding Skills


    Students who learn how to code early on are ready to take AP Computer Science
    once they reach high school. Those who have taken AP Computer Science have been
    found to later outperform their fellow peers in Statistics and AP Calculus exams.
    After graduation, these students are'
