  md: '# 4. Working with Exceptions


    Python is an interpreted language, which means that the code is executed line
    by line. If an error is encountered on a line, further execution of the code stops.
    However, you can handle known exceptions in Python using the try-except block.
    Let’s look at a simple example, by generating a runtime error of dividing by 0:


