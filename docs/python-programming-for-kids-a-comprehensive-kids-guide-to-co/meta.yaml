  md: '# PYTHON FOR BEGINNERS


    Welcome! Are you completely new to programming? If not then we presume you will
    be looking for information about why and how to get started with Python.


    In today''s world, the ability to code continues to grow in importance. Coding
    is no longer the sole domain of computer scientists and programmers, but rather
    a useful skill to have in any career.


    Kids with an eye to their future know that learning to code is important, but'
