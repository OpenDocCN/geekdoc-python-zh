    ### CheckIO


    面向儿童的Python，CheckIO


    在这个基于浏览器的游戏中，孩子们可以在尝试用自己的代码完成“任务”之前，先查看 Python 示例。游戏的大部分内容比 CodeCombat 更偏向文本，但每个任务中的问题解决起来可能相当有趣。


    ### PyGame


    面向儿童的Python，Raspberry Pi


    有抱负的程序员可以在这个简易编程课程合集中实际构建一个游戏。所有代码都已提供，供孩子们逐步跟随。好奇的孩子可能想要调整其中的部分代码，看看会发生什么。


    "Scary Spot the Difference" 向学习者介绍了 PyGame。PyGame 是一个专门为游戏开发创建的 Python 文件库，适合对构建游戏感兴趣的孩子。


    ## 一些其他的儿童Python书籍


    在线课程、游戏和教程视频是儿童学习 Python 的有用工具。这些互动资源有助于保持孩子的积极性，并且可能非常有趣，但研究表明，实体书在教育中仍然占有一席之地。


    阅读技能对于学业和职业成功至关重要。在美国，统计数据显示，大多数在三年级时阅读落后的孩子永远无法追上。另一方面，最近的一项研究表明，在拥有大量书籍的家庭中长大的孩子，可能比那些书籍较少的同学领先多达三年。


    对于学习 Python 的孩子来说，书籍也比数字媒体更有优势。通过剩余未读页数的减少，很容易看到进度。孩子们可以翻到书的任何一页，跳着看，略读，并按照自己的节奏阅读。


    大多数孩子阅读的速度比视频中的人说话的速度快得多。这意味着在相同的时间内，他们通过阅读可以消化更多的内容。


