    ## INSTALLING PYTHON


    Installing Python is generally easy, and nowadays many Linux and UNIX distributions
    include a recent Python. Even some Windows computers (notably those from HP) now
    come with Python already installed. If you do need to install Python and aren''t
    confident about the task you can find a few notes on the BeginnersGuide/Download
    wiki page, but installation is unremarkable on most platforms.


    Installing Python is fairly straightforward. Follow the steps for installing it
    on Windows, Mac OS X, or Ubuntu.


    If you wish to use only the embedded Python interpreter, just jump to Your First
    Program section.


    When installing Python, you''ll also set up a shortcut for the IDLE program, which
    is the Integrated DeveLopment Environment that lets you write programs for Python.


    Just follow the instructions below, depending on your OS, and skip the others.


    Python installed by entering python in a command line window. If you see a response
    from a Python interpreter it will include a version number in its initial display.
    Generally any Python 3.x version will do, as Python makes every attempt to maintain
    backwards compatibility within major Python versions. Python 2.x and Python 3.x
    are intentionally not fully compatible. If python starts a Python 2.x interpreter,
    try entering python3 and see if an up to date version is already installed.


    On Windows, try py first - this is the relatively recent Python Launcher, which
    has a better chance of avoiding some of the path problems that might occur because
    on Windows programs don''t install into any of the small set of common locations
    that are searched by default. The Python launcher can also let you select any
    of the various versions you may have installed from a single command.


    If you need to install Python, you may as well download the most recent stable
    version. This is the one with the highest number that isn''t marked as an alpha
    or beta release. Please see the Python downloads page for the most up to date
    versions of Python. They are available via the yellow download buttons on that
    page.


    ## Windows


    The most stable Windows downloads are available from the Python for Windows page.
    On Windows you have a choice between 32-bit (labeled x86) and 64-bit (labeled
    x86-64) versions, and several flavors of installer for each. The Python core team
    thinks there should be a default you don''t have to stop and think about, so the
    yellow download button on the main download page gets you the "x86 executable
    installer" choice. This is actually a fine choice: you don''t need the 64-bit
    version even if you have 64-bit Windows, the 32-bit Python will work just fine.


    If you''re running Windows XP: a complete guide to installing ActivePython is
    at Python on XP: 7 Minutes To "Hello World!". ShowMeDo has two videos for downloading,
    installing and getting started with Python on a Windows XP machine - this series
    talks you through the Python, ActivePython and SciPy distributions. Note that
    the python.org releases only support versions of Windows that are supported by
    Microsoft (at the time of the release), so no recent release from python.org can
    be used on Windows XP.


    ### Installing Python on Windows


    Go to http://www.python.org/downloads/.


    Click the button labeled Download Python 3.8.2. (This is the latest version of
    Python 3 at the time of this writing, but you might see a later version. Install
    the most recent version.)


    Python will begin to download. If you’re asked to choose between saving or opening
    the file, select Save File.


    When the installer has downloaded, click it. If a dialog pops up asking whether
    you want to run the file, click Run.


    When the installer opens, select the Add Python 3.8 to Path checkbox, as shown
    at the bottom of the following picture. Then click Install Now.


    ## Mac


    See the Python for Mac OS X page. MacOS from 10.2 (Jaguar) to 10.15 (Catalina)
    includes a system version of Python 2, but it is best not to consider this the
    Python to use for your programming tasks - install a current Python 3.x version
    instead. MacOS after 10.15 (Catalina) will not include a default system Python.


    ### Installing Python on Mac OS X


    If you’re using a Mac, you should find a version of Python preinstalled, but it’s
    probably an older version of the language Python 2, which was discontinued in
    January 2020.


    We need Python 3 to follow this and all the following articles. To install it
    follow the steps:


    Go to http://www.python.org/downloads/.


    Click the button labeled Download Python 3.8.2. (This is the latest version of
    Python 3 at the time of this writing, but you might see a later version. Install
    the most recent version.)


    When the installer has downloaded, click it. it should have a .pkg format (the
    filename is something similar to python-3.8.2-macosx10.9.pkg).


    When the installer opens a similar popup like the image below will be shown. Just
    keep selecting "Continue" to proceed (at some point just the "Accept" button to
    accept the program license to continue). Just follow the installer instructions,
    it''s quite straightforward.


    ## Linux


    For Red Hat, CentOS or Fedora, install the python3 and python3-devel packages.


    For Debian or Ubuntu, install the python3.x and python3.x-dev packages.


    ### Installing Python on Ubuntu


    This step is advanced for children, if you don''t know how to do it, ask an adult
    to help you.


    Open the Terminal app and run


    ```

    $ sudo apt-get update

    ```


    ```

    $ sudo apt-get install python3 idle3

    ```


    If you are using other Linux distribution, chances are you already have Python
    3 pre-installed as well. If not, use your distribution''s package manager. For
    example on Fedora, you would use dnf:


    ```

    $ sudo dnf install python3 idle3

    ```


    For Gentoo, install the ''=python-3.x*'' ebuild (you may have to unmask it first).


    These 5 are core concepts that your child can learn to build a solid foundation
    in Python.


    1. Data Types

    2. Variables

    3. Functions

    4. Loops

    5. Modules


    ## Data Types


    A data type is a classification of data that tells the compiler how to use a piece
    of data. It determines what values an object can have and the operations that
    can be performed on it. Most programming languages support basic data types such
    as numbers, characters, and booleans.


    In Python there are standard data types kids should be familiar with:


    Integer: 20


    Float: 20.5


    String: "CodeWizardsHQ"


    List: ["apple", "banana", "cherry"]


    Tuple: ("apple", "banana", "cherry")


    Dictionary: {"name" : "John", "age" : 36}


    The full list of built-in Python data types includes:


    Text Type: str


    Numeric Types: int, float, complex


    Sequence Types: list, tuple, range


    Mapping Type: dict


    Set Types: set, frozenset


    Boolean Type: bool


    Binary Types: bytes, bytearray, memoryview


    To see the data type of an object, use the type() method in Python.


    ```

    type()

    ```


    ## Variables


    Variables are containers that hold a value, such as a piece of text or a number.
    You might remember these from math class. Variables are powerful because they
    can be reused and changed easily.


    You can assign a value to a variable, like x or y, using the equal sign.


    Variable names cannot:


    - start with a number

    - contain spaces.

    - contain special characters except "_" (underscore)

    - have same name as another variable


    ## Functions


    A function is a block of code which performs an action when it is called. You
    can add arguments to pass data into a function. A function can return data as
    a result.


    ## Loops


    A loop is a block of code that runs over and over. In Python there are two types
    of loops: for loops and while loops.


    A for loop repeats a series of commands over a sequence of data, like a list.


    A while loop repeats a series of commands as long as certain conditions are true.'
  mdcn: '我们需要一个特定的功能。这种模块化特性使Python保持灵活性，同时也让你能够利用他人的库轻松构建一些有趣（且好玩！）的初始项目。


    ## 安装Python


    安装Python通常很简单，如今许多Linux和UNIX发行版都包含了较新的Python版本。甚至一些Windows电脑（特别是惠普的）现在也预装了Python。如果你确实需要安装Python且对此任务不太自信，可以在BeginnersGuide/Download维基页面找到一些说明，但在大多数平台上安装过程都很普通。


    安装Python相当直接。请按照在Windows、Mac OS X或Ubuntu上安装的步骤操作。


    如果你只想使用嵌入式Python解释器，可以直接跳转到“你的第一个程序”部分。


    安装Python时，你还会为IDLE程序设置一个快捷方式，IDLE是集成开发环境，让你可以编写Python程序。


    请根据你的操作系统遵循以下说明，并跳过其他部分。


    通过在命令行窗口中输入`python`来验证Python是否已安装。如果你看到Python解释器的响应，其初始显示中会包含版本号。通常任何Python 3.x版本都可以，因为Python会尽力在主要版本内保持向后兼容性。Python
    2.x和Python 3.x故意不完全兼容。如果`python`启动的是Python 2.x解释器，尝试输入`python3`看看是否已安装了最新版本。


    在Windows上，首先尝试`py`——这是相对较新的Python启动器，它更有可能避免一些路径问题，因为Windows程序不会安装到默认搜索的少数几个常见位置中。Python启动器还可以让你从单个命令中选择你可能已安装的任何版本。


    如果你需要安装Python，不妨下载最新的稳定版本。这是版本号最高且未标记为alpha或beta发布的版本。请访问Python下载页面获取最新的Python版本。它们可通过该页面上的黄色下载按钮获取。


    ## Windows


    最稳定的Windows下载可从Python for Windows页面获取。在Windows上，你可以选择32位（标记为x86）和64位（标记为x86-64）版本，以及每种版本的几种安装程序类型。Python核心团队认为应该有一个默认选项，你无需停下来思考，因此主下载页面上的黄色下载按钮会为你提供“x86可执行安装程序”选项。这实际上是一个不错的选择：即使你使用的是64位Windows，也不需要64位版本，32位Python也能正常工作。


    如果你运行的是Windows XP：安装ActivePython的完整指南可在Python on XP: 7 Minutes To "Hello World!"中找到。ShowMeDo有两个视频，介绍在Windows
    XP机器上下载、安装和开始使用Python——该系列会引导你了解Python、ActivePython和SciPy发行版。请注意，python.org的发布仅支持微软在发布时支持的Windows版本，因此python.org的任何近期版本都无法在Windows
    XP上使用。


    ### 在Windows上安装Python


    访问 http://www.python.org/downloads/。


    点击标记为“Download Python 3.8.2”的按钮。（这是撰写本文时Python 3的最新版本，但你可能会看到更新的版本。请安装最新版本。）


    Python将开始下载。如果被要求在保存或打开文件之间选择，请选择“保存文件”。


    下载安装程序后，点击它。如果弹出对话框询问是否要运行文件，请点击“运行”。


    安装程序打开后，选择“Add Python 3.8 to Path”复选框，如下图底部所示。然后点击“Install Now”。


    ## Mac


    请参阅Python for Mac OS X页面。从10.2（Jaguar）到10.15（Catalina）的MacOS包含系统版本的Python 2，但最好不要将其视为用于编程任务的Python——请改为安装当前的Python
    3.x版本。10.15（Catalina）之后的MacOS将不包含默认系统Python。


    ### 在Mac OS X上安装Python


    如果你使用的是Mac，应该会找到预装的Python版本，但它可能是较旧的Python 2语言版本，该版本已于2020年1月停止支持。


    我们需要Python 3来跟随本文及所有后续文章。要安装它，请遵循以下步骤：


    访问 http://www.python.org/downloads/。


    点击标记为“Download Python 3.8.2”的按钮。（这是撰写本文时Python 3的最新版本，但你可能会看到更新的版本。请安装最新版本。）


    下载安装程序后，点击它。它应该具有.pkg格式（文件名类似于python-3.8.2-macosx10.9.pkg）。


    安装程序打开后，将显示类似下图的弹出窗口。只需不断选择“Continue”继续（在某个时候只需点击“Accept”按钮接受程序许可即可继续）。只需遵循安装程序说明，这非常直接。


    ## Linux


    对于Red Hat、CentOS或Fedora，安装python3和python3-devel包。


    对于Debian或Ubuntu，安装python3.x和python3.x-dev包。


    ### 在Ubuntu上安装Python


    此步骤对儿童来说是高级的，如果你不知道如何操作，请让成年人帮助你。


    打开终端应用程序并运行


    ```

    $ sudo apt-get update

    ```


    ```

    $ sudo apt-get install python3 idle3

    ```


    如果你使用其他Linux发行版，很可能你已经预装了Python 3。如果没有，请使用你的发行版的包管理器。例如在Fedora上，你会使用dnf：


    ```

    $ sudo dnf install python3 idle3

    ```


    对于Gentoo，安装`=python-3.x*` ebuild（你可能需要先取消屏蔽它）。


    这5个是你的孩子可以学习以在Python中打下坚实基础的核心概念。


    1. 数据类型

    2. 变量

    3. 函数

    4. 循环

    5. 模块


    ## 数据类型


    数据类型是对数据的分类，它告诉编译器如何使用一段数据。它决定了对象可以具有的值以及可以对其执行的操作。大多数编程语言支持基本数据类型，如数字、字符和布尔值。


    在Python中，孩子们应该熟悉以下标准数据类型：


    整数：20


    浮点数：20.5


    字符串："CodeWizardsHQ"


    列表：["apple", "banana", "cherry"]


    元组：("apple", "banana", "cherry")


    字典：{"name" : "John", "age" : 36}


    Python内置数据类型的完整列表包括：


    文本类型：str


    数字类型：int, float, complex


    序列类型：list, tuple, range


    映射类型：dict


    集合类型：set, frozenset


    布尔类型：bool


    二进制类型：bytes, bytearray, memoryview


    要查看对象的数据类型，请在Python中使用`type()`方法。


    ```

    type()

    ```


    ## 变量


    变量是保存值的容器，例如一段文本或一个数字。你可能在数学课上记得这些。变量很强大，因为它们可以轻松重用和更改。


    你可以使用等号为变量（如x或y）赋值。


    变量名不能：


    - 以数字开头

    - 包含空格。

    - 包含除“_”（下划线）以外的特殊字符

    - 与另一个变量同名


    ## 函数


    函数是一段代码块，当被调用时执行一个操作。你可以添加参数将数据传递给函数。函数可以返回数据作为结果。


    ## 循环


    循环是一段反复运行的代码块。在Python中，有两种类型的循环：for循环和while循环。


    for循环在一系列数据（如列表）上重复一系列命令。


    while循环只要某些条件为真，就重复一系列命令。'
