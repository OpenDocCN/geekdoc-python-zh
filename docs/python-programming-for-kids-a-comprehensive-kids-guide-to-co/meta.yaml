- md: '## Kids Who Are Learning Python Should Teach Python.


    Richard Feynman, one of the most brilliant physicists and teachers of the twentieth
    century, developed a powerful learning method now known as the Feynman Technique.
    The core idea in the Feynman Technique is “to learn something thoroughly, you
    should try to teach it to someone else.”


    In doing so, concepts you don’t completely grasp become apparent, so you can easily
    identify areas you need to work on. Kids can build stronger coding skills by teaching,
    whether that means demonstrating ideas to their peers or trying to teach adults.
    The whiteboard is a handy teaching tool.


    ## Flashcards Help Kids Remember.


    Recall practice is an important step in the learning process. Kids need to access
    the information they''ve learned frequently to keep it fresh and remember it when
    they need it. Flashcards are perfect for this kind of mental exercise, and the
    Coding is Good flashcard set from MathandCoding.org is designed specifically for
    Python learners.


    ## Interacting with Real-World Objects in Python is Exciting


    The Internet of Things is growing rapidly. Robots, drones and a myriad of other
    devices can interact through Bluetooth or wireless networks. For aspiring engineers
    and mechanically apt kids, these devices offer unlimited opportunities for exploration.


    One of the most popular Internet of Things gadgets is the Raspberry Pi, a small,
    Python-programmable computer. A Google search for “Raspberry Pi” shows the vast
    possibilities with this little gizmo, from automation to robotics and more.


    ## Your Child Can Learn Python Programming


    With dedication and practice, it’s possible for your child to learn python programming.
    It''s a unique skill that not only benefits him or her now, but also builds technical
    skills for the future. So, pick your favorite Python game, book, or app and start
    coding!


    ## Coding Exercise: Hello World


    Hello World Robot. Author: Auksaporn Rattanamuk


    ## Interactive Shell


    If you chose to install Python on your local machine, follow this step:


    If you are Windows you should now have an icon on your Desktop with the label
    IDLE, open it.


    If you are using Mac OS X, go to Launchpad and search for an app called IDLE,
    open it.


    If you’re using Ubuntu, in the Applications menu, you should see a new group named
    Programming with the application IDLE, open it.


    Windows 10 Python Shell. MacOS X and Linux versions are identical, except for
    the window bar.


    This is the Python shell, which is part of Python’s integrated development environment
    (IDLE). The three greater-than signs — >>> — are called the prompt. It allows
    you to run python code, line by line.


    Let’s enter some commands at the prompt. Make sure to include the phrase around
    the quotes (‘ ‘), it can also be double quotes (“ “). Press enter on your keyboard
    when you’re finished typing the line. If you’ve entered the command correctly,
    you should see something like this:


    ```

    >>> print(''Hello World'')

    Hello World

    >>>

    ```


    The prompt should reappear to let you know that the Python shell is ready to accept
    more commands.


    Congratulations! You''ve just created your first Python program!


    ## Using the Embedded Python Interpreter


    If you didn''t install the python environment, or even if you do, you can run
    the program using the embedded Python interpreter below, just hit the Play button
    at top of it.


    If everything worked you should now see "Hello World" displayed on the output
    console shell.


    Congratulations!


    Feel free to change the sentence surrounded by the quotation marks hit play again
    to see what happens.


    What exactly did we do?


    The word print is a type of Python command called a function, and it prints out
    whatever is inside the parentheses to the screen.


    In essence, you have given the computer an instruction to display the words "Hello
    World". The instruction is converted by the Python interpreter to the language
    the machine understands, machine code and then it is displayed on the console.


    In Python every textual information surrounded by either single quotation marks,
    or double quotation marks, is called a string. Strings are important Python''s
    built-in types that we will cover in detail in later articles.


    To the Python interpreter, "Hello World" and ''Hello World'' are the same thing.
    The first and last quotation marks are ignored and used only to define the string.


    So in this exercise, we pass to the function print the string “Hello World”.


    And what is a function?


    A function in programming is a set of code encapsulated that can receive information,
    perform an operation and return new information. You don''t need to know anything
    about the internal function code or logic to use it, you just need to know what
    you can pass to the function and what it returns.


    Illustration of a Function. Source: Olin College of Engineering


    You put something in, you get something out — It’s pretty basic like a machine,
    as the illustration above suggests, you put something IN, your function does something
    to it, and you get something OUT.


    Python provides a set of functions ready to be used, called built-in functions.
    They are part of the programming language, like the print function — and you will
    learn more about others later.


    From now on, every time I refer to a function, I will append parenthesis () at
    the end of the function name, just denote it. For example, print function will
    be referenced as print(). Whenever you read print(), read it as “print function”.


    And do not worry, the details of functions and how you can create your own functions
    will be covered in later articles.


    ## Saving Your Python Program


    The Python shell is amazing to test small python code or snippets, but programs
    wouldn''t be very useful if you needed to rewrite them every time you wanted to
    use them.


    Luckily, we can save our programs for future use. To save a new program, open
    IDLE and choose File New Window.


    An empty window will appear, with *untitled* in the menu bar. Enter the following
    code into the new window:


    Now, choose File ▸ Save. When prompted for a filename, enter hello.py, and save
    the file to your Desktop area.'
  mdcn: '## 学习Python的孩子应该教Python。


    理查德·费曼，二十世纪最杰出的物理学家和教育家之一，创立了一种强大的学习方法，如今被称为费曼技巧。费曼技巧的核心思想是：“要彻底学会某样东西，你应该尝试把它教给别人。”


    这样做时，你没有完全掌握的概念就会显现出来，这样你就能轻松识别出需要努力的领域。孩子们可以通过教学来建立更强的编码技能，无论是向同龄人演示概念，还是尝试教成年人。白板是一个方便的教学工具。


    ## 抽认卡帮助孩子记忆。


    回忆练习是学习过程中的一个重要步骤。孩子们需要经常访问他们学过的信息，以保持记忆的新鲜度，并在需要时能够记起。抽认卡非常适合这种思维训练，而来自MathandCoding.org的“Coding
    is Good”抽认卡套装就是专门为Python学习者设计的。


    ## 在Python中与真实世界物体交互令人兴奋


    物联网正在迅速发展。机器人、无人机和无数其他设备可以通过蓝牙或无线网络进行交互。对于有抱负的工程师和有机械天赋的孩子来说，这些设备提供了无限的探索机会。


    最受欢迎的物联网设备之一是树莓派，一台小型的、可编程Python的计算机。在谷歌上搜索“树莓派”，你会看到这个小玩意儿的无限可能，从自动化到机器人技术等等。


    ## 你的孩子可以学习Python编程


    通过专注和练习，你的孩子完全有可能学会Python编程。这是一项独特的技能，不仅对他或她现在有益，也为未来构建技术技能。所以，选择你最喜欢的Python游戏、书籍或应用，开始编码吧！


    ## 编码练习：Hello World


    Hello World机器人。作者：Auksaporn Rattanamuk


    ## 交互式解释器


    如果你选择在本地机器上安装Python，请按照以下步骤操作：


    如果你使用的是Windows，现在你的桌面上应该有一个标有IDLE的图标，打开它。


    如果你使用的是Mac OS X，前往启动台，搜索名为IDLE的应用程序，打开它。


    如果你使用的是Ubuntu，在应用程序菜单中，你应该能看到一个名为“Programming”的新组，其中包含IDLE应用程序，打开它。


    Windows 10 Python Shell。MacOS X和Linux版本除了窗口栏外，其他完全相同。


    这是Python shell，它是Python集成开发环境（IDLE）的一部分。三个大于号——>>>——被称为提示符。它允许你逐行运行Python代码。


    让我们在提示符处输入一些命令。确保将短语包含在引号（‘ ’）内，也可以使用双引号（“ ”）。输入完一行后，按键盘上的回车键。如果你输入的命令正确，你应该会看到类似这样的内容：


    ```

    >>> print(''Hello World'')

    Hello World

    >>>

    ```


    提示符应该会重新出现，让你知道Python shell已准备好接受更多命令。


    恭喜！你刚刚创建了你的第一个Python程序！


    ## 使用嵌入式Python解释器


    如果你没有安装Python环境，或者即使安装了，你也可以使用下面的嵌入式Python解释器来运行程序，只需点击顶部的播放按钮。


    如果一切正常，你现在应该会在输出控制台shell上看到“Hello World”显示。


    恭喜！


    随意更改引号内的句子，再次点击播放，看看会发生什么。


    我们到底做了什么？


    print这个词是一种Python命令，称为函数，它将括号内的任何内容打印到屏幕上。


    本质上，你给了计算机一个指令来显示“Hello World”这个词。这个指令被Python解释器转换成机器能理解的语言——机器代码，然后显示在控制台上。


    在Python中，任何被单引号或双引号包围的文本信息都称为字符串。字符串是Python重要的内置类型，我们将在后续文章中详细介绍。


    对于Python解释器来说，“Hello World”和''Hello World''是一回事。第一个和最后一个引号被忽略，仅用于定义字符串。


    所以在这个练习中，我们将字符串“Hello World”传递给了print函数。


    那么，什么是函数？


    编程中的函数是一组封装好的代码，它可以接收信息，执行操作，并返回新信息。你不需要了解函数内部的代码或逻辑就可以使用它，你只需要知道你可以传递什么给函数以及它返回什么。


    函数示意图。来源：奥林工程学院


    你放入一些东西，你得到一些东西出来——这就像一台机器一样基本，如上图所示，你放入一些东西（IN），你的函数对它做一些处理，然后你得到一些东西出来（OUT）。


    Python提供了一组现成的函数，称为内置函数。它们是编程语言的一部分，比如print函数——你将在后面了解更多关于其他函数的内容。


    从现在起，每当我提到一个函数时，我都会在函数名后附加括号()，只是为了表示它。例如，print函数将被引用为print()。每当你读到print()时，就把它读作“print函数”。


    别担心，函数的细节以及如何创建自己的函数将在后续文章中介绍。


    ## 保存你的Python程序


    Python shell非常适合测试小段Python代码或代码片段，但如果你每次使用程序都需要重写它们，程序就不会非常有用。


    幸运的是，我们可以保存我们的程序以备将来使用。要保存一个新程序，打开IDLE并选择File ▸ New Window。


    一个空窗口将会出现，菜单栏中显示*untitled*。在新窗口中输入以下代码：


    现在，选择File ▸ Save。当提示输入文件名时，输入hello.py，并将文件保存到你的桌面区域。'
