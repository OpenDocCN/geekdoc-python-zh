    \n## 172. CHECK IF A STRING IS A VALID PASSWORD\n\nThe **is_valid_password** function\
    \ checks if a string is a valid password (at least 8 characters, with a digit\
    \ and special character).\n\n```python\nimport re\ndef is_valid_password(password):\n\
    \    # Regex pattern for a valid password:\n    # - At least 8 characters\n  \
    \  # - At least one uppercase letter, one lowercase letter, one digit, and one\
    \ special character from @$!%*?&\n    pattern = r\"^(?=.*[A-Z])(?=.*[a-z])(?=.*\\\
    d)(?=.*[@$!%*?&])[A-Za-z\\d@$!%*?&]{8,}$\"\n    return bool(re.match(pattern,\
    \ password))\n\n# Test cases\nprint(is_valid_password(\"P@ssw0rd\"))\n# Output:\
    \ True\nprint(is_valid_password(\"password123\"))\n# Output: False\n```\n\n##\
