    \n## 172. 检查字符串是否为有效密码\n\n**is_valid_password** 函数检查一个字符串是否是有效的密码（至少8个字符，包含一个数字和一个特殊字符）。\n\
    \n```python\nimport re\ndef is_valid_password(password):\n    # Regex pattern\
