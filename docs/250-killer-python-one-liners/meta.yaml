    \    return bool(re.match(r'^\\d{3}-\\d{3}-\\d{4}$', phone))\n# Example usage:\n\
    print(is_valid_phone_number(\"555-123-4567\"))\n# Output: True\nprint(is_valid_phone_number(\"\
    123-4567\"))\n# Output: False\n```\n\n## 161. FIND THE SUM OF THE FIRST N NATURAL\
    \ NUMBERS\n\nThe **sum_of_naturals** function finds the sum of the first n natural\
    \ numbers.\n\n```python\ndef sum_of_naturals(n):\n    return (n * (n + 1)) //\
    \ 2\n\n# Example usage:\nprint(sum_of_naturals(10))\n# Output: 55\n```\n\n## 162.\
    \ VOWEL DASHER\n\nThe **dashed** function in the **StringDasher** class takes\
    \ a string as input and returns the modified string with dashes added around each\
    \ vowel.\n\n```python\nimport re\ndef dashed(string):\n    return re.sub(r'[aeiouAEIOU]',\
