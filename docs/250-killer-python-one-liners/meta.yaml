- md: "## 159. COLLATZ SEQUENCE ANALYZER\n\nThe **Collatz** method takes a positive\
    \ integer as input and returns the number of steps required to reach 1 in the\
    \ Collatz sequence.\n\n```python\ndef collatz(num):\n    count = 0\n    while\
    \ num != 1:\n        num = num // 2 if num % 2 == 0 else 3 * num + 1\n       \
    \ count += 1\n    return count\n\n# Example usage:\nnum = 27\nsteps = collatz(num)\n\
    print(f\"Number of steps to reach 1 in Collatz sequence for {num}: {steps}\")\n\
    # Output: Number of steps to reach 1 in Collatz sequence for 27: 111\n```\n\n\
    ## 160. CHECK IF A STRING IS A VALID PHONE NUMBER (NORTH AMERICAN FORMAT)\n\n\
