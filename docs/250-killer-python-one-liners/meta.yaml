    \ variable.\n\n```\ndef swap_without_temp(a, b):\n    return b, a\n\nresult =\
    \ swap_without_temp(5, 10)\nprint(f\"After swapping: a = {result[1]}, b = {result[0]}\"\
    )\n# Output: After swapping: a = 10, b = 5\n```\n\n## 3. CONVERT RGB TO HEX\n\n\
    The **rgb_to_hex** function combines the red, green, and blue (RGB) values into\
    \ a single hexadecimal color code.\n\n```\ndef rgb_to_hex(r, g, b): return f\"\
