  md: "# 4. TRANSPOSE OF A MATRIX\n\nThe **transpose_matrix** function computes the\
    \ transpose of a given matrix.\n\n```\ndef transpose_matrix(matrix):\n    return\
    \ [list(row) for row in zip(*matrix)]\n\nmatrix = [\n    [1, 2, 3],\n    [4, 5,\
    \ 6],\n    [7, 8, 9]\n]\n\nprint(\"\\n\".join(\", \".join(map(str, row)) for row\
    \ in transpose_matrix(matrix)))\n\n# Output:\n# 1, 4, 7\n# 2, 5, 8\n# 3, 6, 9\n\
    ```"
