  md: '# 5. CHECK IF DATE IS VALID


    The **is_date_valid** function checks if a date is valid.


    ```

    from datetime import datetime

    def is_date_valid(val): return datetime.strptime(val, "%B %d, %Y %H:%M:%S") if
    val else False

    print(is_date_valid("December 17, 1995 03:24:00"))

    # 1995-12-17 03:24:00

    ```'
  merge: -1
  pgno: 26
