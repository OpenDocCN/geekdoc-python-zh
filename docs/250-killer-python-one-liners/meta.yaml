    \n# 测试用例\nprint(get_ascii_value('A'))\n# 输出: 65\n```\n\n## 258. 检查字符串是否为等位字母词（无重复字符）\n\
    \n**IsIsogram** 函数检查一个字符串是否为等位字母词（无重复字符）。\n\n```python\ndef is_isogram(string):\n\
    \    return len(set(string.lower())) == len(string)\n\n# 测试用例\nprint(is_isogram(\"\
    hello\"))\n# 输出: False\nprint(is_isogram(\"world\"))\n# 输出: True\n```\n\n## 259.\
    \ 计算两个等长字符串的汉明距离\n\n**hamming_distance** 函数计算两个等长字符串的汉明距离。\n\n```python\ndef hamming_distance(str1,\
    \ str2):\n    if len(str1) != len(str2):\n        raise ValueError(\"Strings must\
    \ have equal length\")\n    return sum(c1 != c2 for c1, c2 in zip(str1, str2))\n\
    \n# 测试用例\nprint(hamming_distance(\"karolin\", \"kathrin\"))\n# 输出: 3\n```\n\n\
    ## 260. 计算二维平面中两点之间的距离\n\n**calculate_distance** 函数计算二维平面中两点之间的距离。\n\n```python\n\
    import math\n\ndef calculate_distance(point1, point2):\n    x1, y1 = point1\n\
    \    x2, y2 = point2\n    return math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2)\n\n\
    # 测试用例\nprint(calculate_distance([0, 0], [3, 4]))\n# 输出: 5\n```\n\n## 261. 检查字符串是否为正数（不允许符号或小数）\n\
    \n**is_positive_number** 函数检查一个字符串是否为正数（不允许符号或小数）。\n\n```python\nimport re\n\n\
