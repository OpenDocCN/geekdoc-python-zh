    \ ssn))\n# Test cases\nprint(is_valid_ssn(\"123-45-6789\"))\n# Output: True\n\
    print(is_valid_ssn(\"123-45-678\"))\n# Output: False\n```\n\n## 166. GENERATE\
    \ AN ARRAY OF RANDOM NUMBERS WITHIN A RANGE\n\nThe **random_array_in_range** function\
    \ generates an array of random numbers within a range.\n\n```python\nimport random\n\
    def random_array_in_range(min_val, max_val, length):\n    return [random.randint(min_val,\
