    \ 165. CHECK IF A STRING IS A VALID SOCIAL SECURITY NUMBER (SSN)\n\nThe **is_valid_ssn**\
    \ function checks whether a given string is a valid Social Security Number (SSN)\
    \ in the format \"XXX-XX-XXXX\", where X represents a digit.\n\n```python\nimport\
