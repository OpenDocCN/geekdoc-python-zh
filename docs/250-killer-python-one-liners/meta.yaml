  md: "# 2. SWAP TWO VARIABLES\n\nThe **swap_without_temp** function swaps the values\
    \ of two variables **a** and **b** without using a temporary variable.\n\n```\n\
    def swap_without_temp(a, b):\n    return b, a\n\nresult = swap_without_temp(5,\
    \ 10)\nprint(f\"After swapping: a = {result[1]}, b = {result[0]}\")\n# Output:\
    \ After swapping: a = 10, b = 5\n```"
