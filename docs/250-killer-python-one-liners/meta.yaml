    111. 261. 检查字符串是否为正数（不允许符号或小数）\n112. 262. 查找字符串中第一个不重复的字符\n113. 263. 计算风筝面积\n\
    114. 264. 计算扇形面积\n\n本书从零开始编写，旨在帮助您掌握这门优美语言的复杂性。您将发现一系列强大、简洁的代码片段，它们将改进您编写和思考代码的方式。\n\
    \n我们将一起深化创造代码的艺术，以最有趣、最优雅、最高效的方式解决复杂问题！\n\n## 1. 将摄氏度转换为华氏度\n\n**celsius_to_fahrenheit**\
    \ 函数将摄氏度转换为华氏度。\n\n```\ndef celsius_to_fahrenheit(celsius): return (celsius *\
    \ 9/5) + 32\nprint(celsius_to_fahrenheit(25))\n# Output: 77.0°F (25°C converted\
    \ to Fahrenheit)\n```\n\n## 2. 交换两个变量\n\n**swap_without_temp** 函数在不使用临时变量的情况下交换两个变量\
    \ **a** 和 **b** 的值。\n\n```\ndef swap_without_temp(a, b):\n    return b, a\n\n\
    result = swap_without_temp(5, 10)\nprint(f\"After swapping: a = {result[1]}, b\
    \ = {result[0]}\")\n# Output: After swapping: a = 10, b = 5\n```\n\n## 3. 将RGB转换为十六进制\n\
    \n**rgb_to_hex** 函数将红色、绿色和蓝色（RGB）值组合成一个十六进制颜色代码。\n\n```\ndef rgb_to_hex(r, g,\
    \ b): return f\"#{((r << 16) + (g << 8) + b):06X}\"\n\nprint(rgb_to_hex(0, 51,\
    \ 255))\n# Output: #0033FF\n```\n\n## 4. 矩阵的转置\n\n**transpose_matrix** 函数计算给定矩阵的转置。\n\
    \n```\ndef transpose_matrix(matrix):\n    return [list(row) for row in zip(*matrix)]\n\
    \nmatrix = [\n    [1, 2, 3],\n    [4, 5, 6],\n    [7, 8, 9]\n]\n\nprint(\"\\n\"\
    .join(\", \".join(map(str, row)) for row in transpose_matrix(matrix)))\n\n# Output:\n\
    # 1, 4, 7\n# 2, 5, 8\n# 3, 6, 9\n```\n\n## 5. 检查日期是否有效\n\n**is_date_valid** 函数检查日期是否有效。\n\
    \n```\nfrom datetime import datetime\ndef is_date_valid(val): return datetime.strptime(val,\
    \ \"%B %d, %Y %H:%M:%S\") if val else False\nprint(is_date_valid(\"December 17,\
    \ 1995 03:24:00\"))\n# 1995-12-17 03:24:00\n```"
