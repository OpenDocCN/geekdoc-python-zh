- md: "## CHAPTER 6\n\n## RECURSION AND COMBINATORICS\n\nThis chapter consists of\
    \ two main sections, the first of which contains various Python code samples that\
    \ illustrate how to use recursion in Python. In addition to the typical form of\
    \ recursion you will also learn how to use tail recursion in Python. The other\
    \ significant section introduces you to some concepts in combinatorics, such as\
    \ combination and permutations of objects.\n\nThe first part of this chapter contains\
    \ a gentle introduction to recursion that you will learn through the Python code\
    \ samples. For example, you will learn how to calculate the sum of an arithmetic\
