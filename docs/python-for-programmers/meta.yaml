- md: "矩阵乘法与加法或减法的工作方式不同：如果 A 是一个 m×n 矩阵，你想将 A（在 A 的右侧）乘以 B，那么 B 必须是一个 n×p 矩阵。矩阵乘法的规则如下：A\
    \ 的列数必须等于 B 的行数。\n\n此外，矩阵 A 的*转置*是另一个矩阵 Aᵀ，其中行和列互换。因此，如果 A 是一个 m×n 矩阵，那么 Aᵀ 是一个\
    \ n×m 矩阵。如果 A = Aᵀ，则矩阵 A 是*对称*的。如果主对角线（从左上到右下）上的值为 1，其他值为 0，则矩阵 A 是*单位矩阵* I。\n\
    \n如果存在一个矩阵 B 使得 A*B = B*A = I，则矩阵 A 是*可逆*的。基于之前关于两个矩阵乘积的讨论，A 和 B 必须是具有相同行数和列数的方阵。\n\
    \n既然你已经了解了矩阵的一些基本操作，以下小节将说明如何在 Python 中对矩阵执行各种任务。\n\n## 矩阵的转置\n\n提醒一下，矩阵 A 的转置是矩阵\
    \ Aᵀ，其中 A 的行和列分别是矩阵 Aᵀ 的列和行。\n\n清单 4.22 展示了 `mat_transpose.py` 的内容，该文件说明了如何求一个\
    \ m×n 矩阵的转置。\n\n*清单 4.22: mat_transpose.py*\n\n```python\nimport numpy as np\n\
    \n# the transpose of a matrix is a 90 degree rotation\ndef transpose(A,rows,cols):\n\
    \    for i in range(0,rows):\n        for j in range(i,cols):\n            #print(\"\
    switching\",A[i,j],\"and\",A[j,i])\n            temp = A[i,j]\n            A[i,j]\
    \ = A[j,i]\n            A[j,i] = temp\n    return A\n\nA = np.array([[100,3],[500,7]])\n\
    print(\"=> original:\")\nprint(A)\nAt = transpose(A, 2, 2)\nprint(\"=> transpose:\"\
    )\nprint(At)\nprint()\n\n# example 2:\nA = np.array([[100,3,-1],[30,500,7],[123,456,789]])\n\
