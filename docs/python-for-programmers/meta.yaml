    \ = ClassC()\n\n    print\n    print 'instanceA:'\n    instanceA.func()\n    print\
    \ 'instanceB:'\n    instanceB.func()\n    print 'instanceC:'\n    instanceC.func()\n\
    ```\n\n清单 5.15 包含的代码与上一节的代码非常相似，只是在这种情况下，ClassC 是自定义类 ClassA 和 ClassB 的派生类。此外，ClassA\
