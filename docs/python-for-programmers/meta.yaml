    \n其次，涉及递归的Python代码示例假设你已经理解了递归（可能是在不同的编程语言中）。然而，如果你对递归不熟悉（或感到不适应），可以考虑阅读第6章的前半部分，其中包含了对该主题更温和的介绍以及更简单的代码示例。\n\
    \n第三，本章中的代码示例旨在解决一系列有趣且多样的任务；但是，请随意关注本章中你立即感兴趣的代码示例，你总可以在未来的某个时候阅读其他代码示例。\n\n\
    ## 时间和空间复杂度\n\n算法的评估基于算法完成执行所需的空间量（基于输入大小）和时间量，这通过“大O”符号表示。时间复杂度有三种类型：最佳情况、平均情况和最差情况。请记住，一个具有非常好最佳情况性能的算法可能具有相对较差的最差情况性能。\n\
    \n回想一下，O(n)表示算法以线性时间执行，因为其复杂度被线性函数上下限制。例如，如果三个算法分别需要2*n、5*n或n/2次操作，那么它们都具有O(n)复杂度。\n\
    \n此外，如果线性搜索的最佳、平均和最差时间性能分别为1、n/2和n次操作，那么它们分别等于O(1)、O(n)和O(n)。\n\n时间-空间权衡指的是减少执行算法所需的时间量或内存量，这涉及选择以下之一：\n\
    \n-   用更少的时间和更多的内存执行\n-   用更多的时间和更少的内存执行\n\n虽然同时减少时间和内存是可取的，但这也是一个更具挑战性的任务。例如，通过迭代算法计算斐波那契数比递归解决方案高效得多，但前者还需要一个数组来存储中间值。迭代解决方案的内存需求高于递归解决方案。\n\
    \n另一点需要记住的是，对于任何正整数n > 1，以下不等式成立（对数可以是任何大于或等于2的底数）：\nO(log n) < O(n) < O(n*log\
    \ n)\n此外，以下涉及n的幂、2的幂和阶乘值的不等式也成立：\nO(n**2) < O(n**3) < O(2**n) < O(n!)\n如果你对上述任何不等式不确定，请在线搜索提供必要细节的教程。\n\
    \n## 任务：整数的最大和最小幂\n\n清单4.1展示了`max_min_power_k2.py`的内容，该文件说明了如何计算一个数的最大（最小）幂，其底数为k，且该幂小于（大于）给定数字。因此，如果num和k是正整数，该任务是双重的：\n\
    \n-   找到*最大*的数，使得k**powk <= num\n-   找到*最小*的数，使得k**powk >= num\n\n例如，16是小于24的*最大*的2的幂，32是大于24的*最小*的2的幂。\n\
    另一个例子是，625是小于1000的最大的5的幂，3125是大于1000的最小的5的幂。\n\n**清单4.1：max_min_power_k2.py**\n\
    \n```python\ndef max_min_powerk(num, k):\n    powk = 1\n    while (powk <= num):\n\
    \        powk *= k\n    if (powk > num):\n        powk /= k\n    return int(powk),\
    \ int(powk*k)\n\nnums = [24, 17, 1000]\npowers = [2, 3, 4, 5]\n\nfor num in nums:\n\
    \    for k in powers:\n        lowerk,upperk = max_min_powerk(num, k)\n      \
    \  print(\"num:\",num,\"power:\",k,\"lower\",lowerk,\n              \"upper:\"\
    ,upperk)\n    print()\n```\n\n清单4.1以函数`max_min_powerk()`开始，该函数包含一个循环，该循环将局部变量`powk`（初始化为值1）反复乘以`k`。当`powk`的值大于`num`的当前值时，`powk`除以`k`，这样我们就得到了下界解。\n\
    \n请注意，此函数返回`powk`和`powk*k`，它们是此任务的下界和上界解。运行清单4.1中的代码，你将看到以下输出：\n\n```\nnum: 24\
