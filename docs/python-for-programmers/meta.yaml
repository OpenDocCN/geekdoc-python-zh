    \ `div`。`while` 循环将 `num` 除以 `div`，如果余数为 0，则打印 `div` 的值，然后将 `num` 除以 `div`；如果值不为\
    \ 0，则 `div` 增加 1。只要 `num` 的值大于 1，这个 `while` 循环就会继续。\n\n将值 12 传递给函数 `divisors()`\
    \ 后，清单 2.10 的输出如下：\n\n```\ndivisor:  2\ndivisor:  2\ndivisor:  3\n** finished\
