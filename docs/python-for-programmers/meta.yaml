    examples that involve scalars and strings, followed by examples involving vectors
    (explained further at the end of this introduction), and then examples involving
    2D matrices.


    The first part of this chapter contains a quick review of the time complexity
    of algorithms, followed by various Python code samples for solving well-known
    tasks, such as finding palindromes, reversing strings, and determining if the
    characters in a string are unique.


    The second part of this chapter discusses 2D arrays, along with NumPy-based code
    samples that illustrate various operations that can be performed on 2D matrices.
    This section also discusses 2D matrices, which are 2D arrays, along with some
    tasks that you can perform on them. This section also discusses multidimensional
    arrays, which have properties that are analogous to lower-dimensional arrays.


    The third part of this chapter introduces search algorithms, such as linear search
    and binary search, followed by some well-known sorting algorithms, such as the
    bubble sort, the merge sort, and the quick sort.


    One other detail to keep in mind pertains to the terms *vectors* and *arrays*.
    In mathematics, a *vector* is a one-dimensional construct, whereas an *array*
    has at least two dimensions. In software development, an array can refer to a
    one-dimensional array or a higher-dimensional array (depending on the speaker).
