    You can use this type of code when you want to display the contents of a text
    file in a single line instead of multiple lines.


    Python also provides the built-in `reversed()` function that reverses the direction
    of the loop, as shown here:


    ```

    >>> a = [1, 2, 3, 4, 5]

    >>> for x in reversed(a):

    ...     print(x)

