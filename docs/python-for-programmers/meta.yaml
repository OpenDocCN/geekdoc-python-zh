  mdcn: "本书中有很多这样的模块），可以使用 `easy_install` 或 `pip`，语法如下：\n\n```\neasy_install <module-name>\n\
    pip install <module-name>\n```\n\n> 注意：基于 Python 的模块更容易安装，而用 C 语言编写的模块通常运行速度更快，但安装起来更困难。\n\
    \n## virtualenv\n\n`virtualenv` 工具使你能够创建隔离的 Python 环境，其主页在这里：\n\nhttp://www.virtualenv.org/en/latest/virtualenv.html\n\
    \n`virtualenv` 解决了为不同应用程序保留正确的依赖关系和版本（以及间接的权限）的问题。如果你是 Python 新手，现在可能还不需要 `virtualenv`，但请记住这个工具。\n\
    \n## IPython\n\n另一个非常好的工具是 IPython（它获得了 Jolt 奖），其主页在这里：\n\nhttp://ipython.org/install.html\n\
    \n在命令行中输入 `ipython` 来调用 IPython：\n\n```\nipython\n```\n\n上述命令将显示以下输出：\n\n```\n\
    Python 3.9.13 (main, May 24 2022, 21:28:12)\nType 'copyright', 'credits' or 'license'\
    \ for more information\nIPython 7.22.0 -- An enhanced Interactive Python. Type\
    \ '?' for help.\n\nIn [1]:\n```\n\n在提示符处输入问号（\"?\"），你将看到一些有用的信息，其中一部分如下：\n\n#\
    \ IPython -- An enhanced Interactive Python\n========================================\n\
    \nIPython 提供了与标准 Python 解释器完全兼容的替代品，并具有便捷的 shell 功能、特殊命令、命令历史机制和输出结果缓存。\n\n在系统命令行中，输入\
    \ 'ipython -h' 以查看可用的命令行选项。本文档仅描述交互功能。\n\n## 获取帮助\n\n在 IPython 中，你有多种方式获取帮助：\n\
    \n```\n?           -> IPython 功能的介绍和概述（此屏幕）。\nobject?     -> 关于 'object' 的详细信息。\n\
    object??    -> 关于 'object' 的更详细、更详细的信息。\n%quickref   -> 所有 IPython 特定语法和魔术命令的快速参考。\n\
    help        -> 访问 Python 自身的帮助系统。\n```\n\n如果你在终端 IPython 中，可以按 `q` 退出此屏幕。\n\n\
    最后，只需在命令提示符处输入 quit()，你将退出 ipython shell。\n\n下一节将向你展示如何检查你的机器上是否安装了 Python，以及在哪里可以下载\
    \ Python。\n\n## PYTHON 安装\n\n在下载任何内容之前，请通过在命令 shell 中输入以下命令来检查你的机器上是否已安装 `Python`（如果你使用的是\
    \ Macbook 或 Linux 机器，这很有可能）：\n\n```\npython -V\n```\n\n本书中使用的 Macbook 的输出如下：\n\
    \n```\nPython 3.9.1\n```\n\n> 在你的机器上安装 Python 3.9.13（或尽可能接近此版本），这样你将拥有与本书中用于测试\
    \ `Python` 脚本的相同版本的 `Python`。\n\n如果你需要在你的机器上安装 `Python`，请导航到 `Python` 主页并选择下载链接，或直接导航到此网站：\n\
    \nhttp://www.python.org/download/\n\n此外，PythonWin 可用于 Windows，其主页在这里：\n\nhttp://www.cgl.ucsf.edu/Outreach/pc204/pythonwin.html\n\
    \n使用任何可以创建、编辑和保存 `Python` 脚本的文本编辑器，并将它们保存为纯文本文件（不要使用 Microsoft Word）。\n\n在你的机器上安装并配置好\
    \ `Python` 后，你就可以开始使用本书中的 `Python` 脚本了。\n\n## 设置 PATH 环境变量（仅限 Windows）\n\n`PATH`\
    \ 环境变量指定了一个目录列表，每当你在命令行中指定可执行程序时，都会搜索这些目录。设置环境以便在每个命令 shell 中始终可以使用 `Python` 可执行文件的一个好指南是遵循此处的说明：\n\
    \nhttp://www.blog.pythonlibrary.org/2011/11/24/python-101-setting-up-python-on-windows/\n\
    \n## 在你的机器上启动 Python\n\n有三种不同的方式启动 Python：\n\n- 使用 Python 交互式解释器\n- 从命令行启动 Python\
    \ 脚本\n- 使用 IDE\n\n下一节将向你展示如何从命令行启动 `Python` 解释器，本章后面你将学习如何从命令行启动 Python 脚本以及关于\
    \ `Python` IDE 的知识。\n\n> 注意：本书的重点是从命令行启动 `Python` 脚本或在 `Python` 解释器中输入代码。\n\n\
    ### Python 交互式解释器\n\n通过打开命令 shell 并输入以下命令，从命令行启动 `Python` 交互式解释器：\n\n```\npython\n\
    ```\n\n你将看到以下提示符（或类似的内容）：\n\n```\nPython 3.9.1 (v3.9.1:1e5d33e9b9, Dec  7 2020,\
    \ 12:44:01)\n[Clang 12.0.0 (clang-1200.0.32.27)] on darwin\nType \"help\", \"\
    copyright\", \"credits\" or \"license\" for more information.\n>>>\n```\n\n在提示符处输入表达式\
    \ `2 + 7`：\n\n```\n>>> 2 + 7\n```\n\nPython 显示以下结果：\n\n```\n9\n>>>\n```\n\n按 `ctrl-d`\
    \ 退出 Python shell。\n\n你可以通过在命令行中以 \"python\" 一词开头来启动任何 `Python` 脚本。例如，如果你有一个包含\
    \ `Python` 命令的 `Python` 脚本 `myscript.py`，请按如下方式启动该脚本：\n\n```\npython myscript.py\n\
    ```\n\n作为一个简单的示例，假设 Python 脚本 `myscript.py` 包含以下 Python 代码：\n\n```\nprint('Hello\
    \ World from Python')\nprint('2 + 7 = ', 2+7)\n```\n\n当你启动上述 Python 脚本时，你将看到以下输出：\n\
    \n```\nHello World from Python\n2 + 7 = 9\n```\n\n## PYTHON 标识符\n\nPython 标识符是变量、函数、类、模块或其他\
    \ Python 对象的名称，有效的标识符符合以下规则：\n\n- 它以字母 A 到 Z、a 到 z 或下划线 (_) 开头\n- 它包含零个或多个字母、下划线和数字\
    \ (0 到 9)\n\n> **注意** Python 标识符不能包含 @、$ 和 % 等字符。\n\nPython 是一种区分大小写的语言，因此 `Abc`\
    \ 和 `abc` 在 Python 中是不同的标识符。\n\n此外，Python 具有以下命名约定：\n\n- 类名以大写字母开头，所有其他标识符以小写字母开头\n\
    - 前导下划线用于私有标识符\n- 两个前导下划线用于强私有标识符\n\n具有两个前导下划线和两个尾随下划线字符的 Python 标识符表示语言定义的特殊名称。\n\
    \n## 行、缩进和多行\n\n与其他编程语言（如 Java 或 Objective-C）不同，Python 使用缩进而不是花括号来表示代码块。代码块中的缩进必须一致，如下所示：\n\
    \n```\nif True:\n    print(\"ABC\")\n    print(\"DEF\")\n```\n\n```\nelse:\n \
    \   print(\"ABC\")\nprint(\"DEF\")\n```\n\nPython 中的多行语句可以以换行符或反斜杠 (\"\\\") 字符结束，如下所示：\n\
    \n```\ntotal = x1 + \\\n        x2 + \\\n        x3\n```\n\n显然，你可以将 x1、x2 和 x3\
    \ 放在同一行，因此没有理由使用三行；但是，如果你需要添加一组不适合放在单行上的变量，此功能可用。\n\n你可以通过使用分号 (\";\") 分隔每个语句来在一行中指定多个语句，如下所示：\n\
    \n```\na=10; b=5; print(a); print(a+b)\n```\n\n上述代码片段的输出如下：\n\n```\n10\n15\n```\n\
    \n> 在 Python 中不鼓励使用分号和续行符。\n\n## PYTHON 中的引号和注释\n\nPython 允许使用单引号 (')、双引号 (\"\"\
