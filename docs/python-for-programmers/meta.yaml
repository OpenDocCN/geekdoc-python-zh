    Now that you have seen some examples involving arithmetic expressions, let''s
    turn to geometric series, which is the topic of the next section.


    # GEOMETRIC SERIES


    This section shows you how to calculate the geometric series of a set of positive
    integers, such as the numbers from 1 to n inclusive. The first algorithm uses
    an iterative approach and the second algorithm uses recursion.


    Before delving into the code samples, there is a simple way to calculate the closed
    form sum of the geometric series of integers from 1 to n inclusive, where r is
    the ratio of consecutive terms in the geometric series. Let S denote the sum,
    which we can express as follows:


    ```

    S   = 1+ r + r^2 + r^3 + . . . + r^(n-1) + r^n

    r*S =     r + r^2 + r^3 + . . . + r^(n-1) + r^n + r^(n+1)

    ```


    Subtract each term in the second row above from the corresponding term in the
    first row, and we have the following result:


    ```

    S - r*S = 1 - r^(n+1)

    ```


    Factor S from both terms on the left side of the preceding equation and we get
    the following result:


    ```

    S*(1 - r) = 1 - r^(n+1)

    ```


    Divide both sides of the preceding equation by the term (1-r) to get the formula
    for the sum of the geometric series of the first n positive integers:


    ```

    S = [1 - r^(n+1)] / (1-r)

    ```


    If r = 1 then the preceding equation returns an infinite value, which makes sense
    because S is the sum of an infinite number of occurrences of the number 1.


    # Calculating a Geometric Series (Iterative)


    Listing 6.4 displays the contents of the `geom_sum.py` that illustrates how to
    calculate the sum of the numbers from 1 to n inclusive using an iterative approach.'
