    \n本书中的代码示例导入了上述一个或多个模块，以及其他 Python 模块。\n\n## help() 和 dir() 函数\n\n在互联网上搜索与 Python\
    \ 相关的主题通常会返回许多包含有用信息的链接。或者，你可以查看 Python 官方文档网站：docs.python.org\n\n此外，Python 提供了\
    \ `help()` 和 `dir()` 函数，可以从 Python 解释器中访问。`help()` 函数显示文档字符串，而 `dir()` 函数显示已定义的符号。\n\
    \n例如，如果你输入 `help(sys)`，你将看到 sys 模块的文档，而 `dir(sys)` 则显示已定义符号的列表。\n\n在 Python 解释器中输入以下命令以显示\
    \ Python 中与字符串相关的方法：\n\n```\n>>> dir(str)\n```\n\n上述命令生成以下输出：\n\n```\n['__add__',\
