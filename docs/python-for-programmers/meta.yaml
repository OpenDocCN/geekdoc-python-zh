    \n## 单继承\n\n在编程语言中，你会遇到两种类型的单继承。一种常见类型称为“经典”*基于类的继承*，你会在执行变量编译时检查的强类型语言（如 Java\
    \ 和 C++）中遇到。第二种类型是*基于原型的继承*，你会在 JavaScript 等函数式语言中遇到。\n\nPython 中的类机制略微接近 C++，部分原因是两者都支持多重继承（将在下一节讨论）。另一方面，Java\
