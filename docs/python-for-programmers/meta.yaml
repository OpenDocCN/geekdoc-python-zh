- md: "## DICTIONARIES\n\nPython has a key/value structure called a dictionary (dict)\
    \ that is a hash table. A dictionary (and hash tables in general) can retrieve\
    \ the value of a key in constant time, regardless of the number of entries in\
    \ the dictionary (and the same is true for sets). You can think of a set as essentially\
    \ just the keys (not the values) of a dict implementation.\n\nThe contents of\
    \ dict can be written as a series of key:value pairs, as shown here:\n\n```\n\
    dict1 = {key1:value1, key2:value2, ... }\n```\n\nThe “empty dict” is just an empty\
    \ pair of curly braces {}.\n\n## Creating a Dictionary\n\nA dictionary (or hash\
    \ table) contains of colon-separated key/value bindings inside a pair of curly\
    \ braces:\n\n```\ndict1 = {}\ndict1 = {'x' : 1, 'y' : 2}\n```\n\nThe preceding\
    \ code snippet defines dict1 as an empty dictionary, and then adds two key/value\
    \ bindings.\n\n## Displaying the Contents of a Dictionary\n\nYou can display the\
    \ contents of dict1 with the following code:\n\n```\n>>> dict1 = {'x':1,'y':2}\n\
    >>> dict1\n{'y': 2, 'x': 1}\n>>> dict1['x']\n1\n>>> dict1['y']\n2\n>>> dict1['z']\n\
    Traceback (most recent call last):\n  File \"<stdin>\", line 1, in <module>\n\
    KeyError: 'z'\n```\n\n> The key/value bindings for `dict` and a set are not necessarily\
    \ stored in the same order that you defined them.\n\nDictionaries also use the\
    \ `get` method to retrieve key values:\n\n```\n>>> dict1.get('x')\n1\n>>> dict1.get('y')\n\
    2\n>>> dict1.get('z')\n```\n\nThe `get()` method returns `None` (which is displayed\
    \ as an empty string) instead of an error when referencing a key that is not defined\
    \ in a dictionary.\n\nYou can also use `dict` comprehensions to create dictionaries\
    \ from expressions, as shown here:\n\n```\n>>> {x: x**3 for x in (1, 2, 3)}\n\
    {1: 1, 2: 8, 3: 27}\n```\n\n## Checking for Keys in a Dictionary\n\nYou can check\
    \ for the presence of a key in a dictionary:\n\n```\n>>> 'x' in dict1\nTrue\n\
    >>> 'z' in dict1\nFalse\n```\n\nUse square brackets for finding or setting a value\
    \ in a dictionary. For example, `dict['abc']` finds the value associated with\
    \ the key 'abc'. You can use strings, numbers, and tuples work as key values,\
    \ and you can use any type as the value.\n\nIf you access a value that is not\
    \ in the `dict`, Python throws a `KeyError`. Consequently, use the `in` operator\
    \ to check if the key is in the dictionary.\n\nAlternatively, use `dict.get(key)`,\
    \ which returns the value or `None` if the key is not present. You can even use\
    \ the expression `get(key, not-found-string)` to specify the value to return if\
    \ a key is not found.\n\n## Deleting Keys From a Dictionary\n\nLaunch the Python\
    \ interpreter and enter the following commands:\n\n```\n>>> MyDict = {'x' : 5,\
    \ 'y' : 7}\n>>> MyDict['z'] = 13\n>>> MyDict\n{'y': 7, 'x': 5, 'z': 13}\n>>> del\
    \ MyDict['x']\n>>> MyDict\n{'y': 7, 'z': 13}\n>>> MyDict.keys()\n['y', 'z']\n\
    >>> MyDict.values()\n[13, 7]\n>>> 'z' in MyDict\nTrue\n```\n\n## Iterating Through\
    \ a Dictionary\n\nThe following code snippet shows you how to iterate through\
    \ a dictionary:\n\n```\nMyDict = {'x' : 5, 'y' : 7, 'z' : 13}\n\nfor key, value\
    \ in MyDict.iteritems():\n    print key, value\n```\n\nThe output from the preceding\
    \ code block is as follows:\n\n```\ny 7\nx 5\nz 13\n```\n\n## Interpolating Data\
    \ From a Dictionary\n\nThe `%` operator substitutes values from a dictionary into\
    \ a string by name. Listing 3.10 contains an example of doing so.\n\n### Listing\
    \ 3.10: InterpolateDict1.py\n\n```\nhash = {}\nhash['beverage'] = 'coffee'\nhash['count']\
    \ = 3\n\n# %d for int, %s for string\ns = 'Today I drank %(count)d cups of %(beverage)s'\
    \ % hash\nprint('s:', s)\n```\n\nThe output from Listing 3.10 is here:\nToday\
    \ I drank 3 cups of coffee\n\n## DICTIONARY FUNCTIONS AND METHODS\n\nPython provides\
    \ various functions and methods, such as `cmp()`, `len()`, and `str()`, that compare\
    \ two dictionaries, return the length of a dictionary, and display a string representation\
    \ of a dictionary, respectively.\nYou can also manipulate the contents of a dictionary\
    \ using the functions `clear()` to remove all elements, `copy()` to return a copy,\
    \ `get()` to retrieve the value of a key, `items()` to display the (key, value)\
    \ pairs of a dictionary, `keys()` to display the keys of a dictionary, and `values()`\
    \ to return the list of values of a dictionary.\n\n## ORDERED DICTIONARIES\n\n\
    Regular dictionaries iterate over key/value pairs in arbitrary order. Python 2.7\
    \ introduced a new `OrderedDict` class in the collections module. The `OrderedDict`\
    \ API provides the same interface as regular dictionaries but iterates over keys\
    \ and values in a guaranteed order depending on when a key was first inserted:\n\
    \n```\n>>> from collections import OrderedDict\n>>> d = OrderedDict([('first',\
    \ 1),\n...                   ('second', 2),\n...                   ('third', 3)])\n\
    >>> d.items()\n[('first', 1), ('second', 2), ('third', 3)]\n```\n\nIf a new entry\
    \ overwrites an existing entry, the original insertion position is left unchanged:\n\
    \n```\n>>> d['second'] = 4\n>>> d.items()\n[('first', 1), ('second', 4), ('third',\
    \ 3)]\n```\n\nDeleting an entry and reinserting it will move it to the end:\n\n\
    ```\n>>> del d['second']\n>>> d['second'] = 5\n>>> d.items()\n[('first', 1), ('third',\
    \ 3), ('second', 5)]\n```\n\n## Sorting Dictionaries\n\nPython enables you to\
    \ support the entries in a dictionary. For example, you can modify the code in\
    \ the preceding section to display the alphabetically sorted words and their associated\
    \ word count.\n\n## Dictionary Formatting\n\nThe % operator works conveniently\
    \ to substitute values from a dictionary into a string by name:\n\n```\n#create\
    \ a dictionary\n>>> h = {}\n#add a key/value pair\n>>> h['item'] = 'beer'\n>>>\
    \ h['count'] = 4\n#interpolate using %d for int, %s for string\n>>> s = 'I want\
    \ %(count)d bottles of %(item)s' % h\n>>> s\n'I want 4 bottles of beer'\n```\n\
    \n## Python Multi Dictionaries\n\nYou can define entries in a dictionary so that\
    \ they reference lists or other types of structures. Listing 3.11 shows the content\
    \ of MultiDictionary1.py that illustrates how to define more complex dictionaries.\n\
    \n### Listing 3.11: MultiDictionary1.py\n\n```\nfrom collections import defaultdict\n\
    \nd = {'a' : [1, 2, 3], 'b' : [4, 5]}\nprint 'firsts:',d\n\nd = defaultdict(list)\n\
    d['a'].append(1)\nd['a'].append(2)\nd['b'].append(4)\nprint 'second:',d\n\nd =\
    \ defaultdict(set)\nd['a'].add(1)\nd['a'].add(2)\nd['b'].add(4)\nprint 'third:',d\n\
    ```\n\nListing 3.11 starts by defining the dictionary d and printing its contents.\
    \ The next portion of Listing 3.11 specifies a list-oriented dictionary, and then\
    \ modifies the values for the keys a and b. The final portion of Listing 3.11\
    \ specifies a set-oriented dictionary, and then modifies the values for the keys\
    \ a and b as well.\n\nThe output from Listing 3.11 is here:\n\n```\nfirst: {'a':\
    \ [1, 2, 3], 'b': [4, 5]}\nsecond: defaultdict(<type 'list'>, {'a': [1, 2], 'b':\
    \ [4]})\nthird: defaultdict(<type 'set'>, {'a': set([1, 2]),\n'b': set([4])})\n\
    ```\n\n## OTHER SEQUENCE TYPES IN PYTHON\n\nPython supports seven sequence types:\
    \ str, unicode, list, tuple, bytearray, buffer, and xrange.\n\nYou can iterate\
    \ through a sequence and retrieve the position index and corresponding value at\
    \ the same time using the enumerate() function.\n\n```\n>>> for i, v in enumerate(['x',\
    \ 'y', 'z']):\n...     print i, v\n...\n0 x\n1 y\n2 z\n```\n\nBytearray objects\
    \ are created with the built-in function `bytearray()`. Although buffer objects\
    \ are not directly supported by Python syntax, you can create them via the built-in\
    \ `buffer()` function.\n\nObjects of type `xrange` are created with the `xrange()`\
    \ function. An `xrange` object is similar to a buffer in the sense that there\
    \ is no specific syntax to create them. Moreover, `xrange` objects do not support\
    \ operations such as slicing, concatenation, or repetition.\n\nAt this point,\
    \ you have seen all the Python types that you will encounter in the remaining\
    \ chapters of this book. In addition, it makes sense to discuss mutable and immutable\
    \ types, which is the topic of the next section.\n\n## MUTABLE AND IMMUTABLE TYPES\
    \ IN PYTHON\n\nPython represents its data as objects. Some of these objects (such\
    \ as lists and dictionaries) are *mutable*, which means you can change their content\
    \ without changing their identity. Objects such as integers, floats, strings,\
    \ and tuples are objects that cannot be changed.\n\nThere is a difference between\
    \ changing the value versus assigning a new value to an object: you cannot change\
    \ a string, but you can assign it a different value. This detail can be verified\
    \ by checking the `id` value of an object, as shown in Listing 3.12.\n\n### Listing\
    \ 3.12: Mutability.py\n\n```\ns = \"abc\"\nprint('id #1:', id(s))\nprint('first\
    \ char:', s[0])\n\ntry:\n    s[0] = \"o\"\nexcept:\n```"
  mdcn: "## 字典\n\nPython 有一种称为字典（dict）的键/值结构，它是一个哈希表。字典（以及一般的哈希表）可以在常数时间内检索键的值，无论字典中有多少条目（集合也是如此）。你可以将集合本质上视为字典实现的键（而非值）。\n\
