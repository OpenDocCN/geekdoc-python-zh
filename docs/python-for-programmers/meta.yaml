    \ 的函数开始，每个函数都接受一个数值参数。`cube()` 函数返回其参数的立方，而 `fourth()` 函数返回其参数的四次方。\n\n清单 5.1\
    \ 的下一部分包含两次 `map()` 函数的调用。第一次调用将 `cube()` 函数指定为第一个参数，并通过 `range()` 函数将 1 到 4 之间的整数（包含\
