    # CLASSES, FUNCTIONS, AND METHODS IN PYTHON


    In high-level terms, a Python *function* is a block of code that:


    +   - is called by name

    - can be passed data to operate on (i.e., the parameters)

    - can optionally return data (the return value)


    All data that is passed to a function is explicitly passed. Contrastingly, a *method*
    is a block of code that


    +   - is called by name

    - is associated with an object


    A method differs from a function in two ways:


    +   - A method is implicitly passed the object for which it was called.

    - A method is able to operate on data that is contained within the class.


    Keep in mind that that an object is always an instance of a class. If you think
    of a class as the “definition,” then the object is an instance of that definition.


    *Instance variables* in an object have values that are local to that object; in
    other words, two instances of the same class maintain distinct values for their
    variables.


    However, the value of *class variables* is the same for all the objects that are
    instances of the same class. In the Java world, a variable that is declared as
    static is a class variable: if you change its value in one object, its new value
    is visible among all objects that are instances of the same class.


    By way of comparison, methods in C++ are called member functions, and Java contains
    only methods (not functions). A method can manipulate private data that is defined
    in a class.'
