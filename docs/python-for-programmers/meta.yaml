    the first name and last name, respectively, of the previously split field.


    The next code snippet in Listing A.24 converts the `year` and `month` fields to
    strings, and then concatenates them with a “#” as a delimiter. Yet another code
    snippet populates the `hdate2` field with the concatenation of the year and month
    fields.'
