    changeme(mylist)\nprint(\"Values outside the function: \", mylist)\n```\n\n这里我们维护了传递对象的引用，并在同一个对象中追加了值，结果显示如下：\n\
    函数内部的值：[10, 20, 30, [1, 2, 3, 4]]\n函数外部的值：[10, 20, 30, [1, 2, 3, 4]]\n值按引用传递这一事实引出了第3章讨论的可变性与不可变性的概念。\n\
    \n## 参数与形参\n\nPython 区分了函数的实参和函数中的形参声明：位置参数（必需）和关键字参数（可选/默认值）。这个概念很重要，因为 Python\
    \ 有用于打包和解包这类参数的运算符。\nPython 从一个可迭代对象中解包位置参数，如下所示：\n\n```python\n>>> def foo(x,\
    \ y):\n...     return x - y\n...\n>>> data = 4,5\n>>> foo(data) # only passed\
    \ one arg\nTraceback (most recent call last):\n  File \"<stdin>\", line 1, in\
    \ <module>\nTypeError: foo() takes exactly 2 arguments (1 given)\n>>> foo(*data)\
    \ # passed however many args are in tuple\n-1\n```\n\n## 使用 while 循环查找一个数的因数\n\
    \n清单 2.10 包含一个 while 循环、条件逻辑和 `%`（取模）运算符，用于查找任何大于 1 的整数的因数。\n\n### 清单 2.10：Divisors.py\n\
    \n```python\ndef divisors(num):\n    div = 2\n    while(num > 1):\n        if(num\
