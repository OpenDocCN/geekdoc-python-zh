    \ iterates through the words in the string `text1` and checks if each of those\
    \ words is also a word in the string `text2`. If a nonmatch occurs, the variable\
    \ `subStr` is set to “False,” followed by the break statement that causes an early\
    \ exit from the loop. The final portion of Listing 2.7 prints the appropriate\
    \ message based on the value of `subStr`. The output from Listing 2.7 is as follows:\n\
    \n```\ntext1 is not a substring of text2\nEvery word in text1 is a word in text2\n\
    ```\n\n# USING THE SPLIT() FUNCTION TO DISPLAY CHARACTERS IN A STRING\n\nListing\
    \ 2.8 shows the content of `StringChars1.py`, which illustrates how to print the\
    \ characters in a text string.\n\n**Listing 2.8: StringChars1.py**\n\n```\ntext\
    \ = 'abcdef'\nfor ch in text:\n    print('char:', ch, 'ord value:', ord(ch))\n\
    print()\n```\n\nListing 2.8 is straightforward: A `for` loop iterates through\
    \ the characters in the string `text` and then prints the character and its `ord`\
    \ value. The output from Listing 2.8 is here:\n\n```\n('char:', 'a', 'ord value:',\
    \ 97)\n('char:', 'b', 'ord value:', 98)\n('char:', 'c', 'ord value:', 99)\n('char:',\
    \ 'd', 'ord value:', 100)\n('char:', 'e', 'ord value:', 101)\n('char:', 'f', 'ord\
    \ value:', 102)\n```"
- md: "## THE JOIN() FUNCTION\n\nAnother way to remove extraneous spaces is to use\
    \ the `join()` function:\n\n```\ntext1 = '   there are    extra   spaces   '\n\
    print('text1:',text1)\n\ntext2 = ' '.join(text1.split())\nprint('text2:',text2)\n\
    \ntext2 = 'XYZ'.join(text1.split())\nprint('text2:',text2)\n```\n\nThe `split()`\
    \ function “splits” a text string into a set of words, and also removes the extraneous\
    \ white spaces. Next, the `join()` function “joins” together the words in the\
    \ string `text1`, using a single white space as the delimiter. The last code portion\
    \ of the preceding code block uses the string XYZ as the delimiter instead of\
    \ a single white space. The output of the preceding code block is as follows:\n\
    \n```\ntext1:    there are    extra   spaces   \ntext2: there are extra spaces\n\
    text2: thereXYZareXYZextraXYZspaces\n```\n\n## PYTHON WHILE LOOPS\n\nYou can define\
    \ a `while` loop to iterate through a set of numbers, as shown in the following\
    \ examples:\n\n```\n>>> x = 0\n>>> while x < 5:\n...     print(x)\n...     x =\
    \ x + 1\n...\n0\n1\n2\n3\n4\n5\n```\n\nPython uses indentations instead of the\
    \ curly braces that are used in other languages such as JavaScript and Java. Although\
    \ the list data structure is not discussed until later in this chapter, the following\
    \ simple code block contains a variant of the preceding while loop that you can\
    \ use when working with lists:\n\n```\nlst = [1,2,3,4]\n\nwhile lst:\n    print('list:',lst)\n\
    \    print('item:',lst.pop())\n```\n\nThe preceding while loop terminates when\
    \ the lst variable is empty, and there is no need to explicitly test for an empty\
    \ list. The output from the preceding code is here:\n\n```\nlist: [1, 2, 3, 4]\n\
    item: 4\nlist: [1, 2, 3]\nitem: 3\nlist: [1, 2]\nitem: 2\nlist: [1]\nitem: 1\n\
    ```\n\nThis concludes the examples that use the split() function to process words\
    \ and characters in a text string. The next part of this chapter shows examples\
    \ of using conditional logic.\n\n## CONDITIONAL LOGIC IN PYTHON\n\nIf you have\
    \ written code in other programming languages, you have undoubtedly seen if/then/else\
    \ (or if-elseif-else) conditional statements. Although the syntax varies between\
    \ languages, the logic is essentially the same. The following example shows you\
    \ how to use if/elif statements:\n\n```\n>>> x = 25\n>>> if x < 0:\n...     print('negative')\n\
    ... elif x < 25:\n...     print('under 25')\n... elif x == 25:\n...     print('exactly\
    \ 25')\n... else:\n...     print('over 25')\n...\nexactly 25\n```\n\nThe preceding\
    \ code block illustrates how to use multiple conditional statements, and the output\
    \ is exactly what you expected.\n\n## THE BREAK/CONTINUE/PASS STATEMENTS\n\nThe\
    \ `break` statement enables you to perform an “early exit” from a loop, whereas\
    \ the `continue` statement essentially returns to the top of the loop and continues\
    \ with the next value of the loop variable. The `pass` statement is essentially\
    \ a “do nothing” statement.\nListing 2.9 shows the content of `BreakContinuePass.py`\
    \ that illustrates the use of these three statements.\n\n**Listing 2.9: BreakContinuePass.py**\n\
    \n```\nprint('first loop')\nfor x in range(1,4):\n    if(x == 2):\n        break\n\
    \    print(x)\n\nprint('second loop')\nfor x in range(1,4):\n    if(x == 2):\n\
    \        continue\n    print(x)\n\nprint('third loop')\nfor x in range(1,4):\n\
    \    if (x == 2):\n        pass\n    print(x)\n```\n\nThe output of Listing 2.9\
    \ is as follows:\n\n```\nfirst loop\n1\nsecond loop\n1\n3\nthird loop\n1\n2\n\
    3\n```\n\n## COMPARISON AND BOOLEAN OPERATORS\n\nPython supports a variety of\
    \ Boolean operators, such as `in`, `not in`, `is`, `is not`, `and`, `or`, and\
    \ `not`. The next several sections discuss these operators and provide some examples\
    \ of how to use them.\n\n### The in/not in/is/is not Comparison Operators\n\n\
    The `in` and `not in` operators are used with sequences to check whether a value\
    \ occurs or does not occur in a sequence. The operators `is` and `is not` determine\
    \ whether two objects are the same object, which is important for mutable objects\
    \ such as lists. All comparison operators have the same priority, which is lower\
    \ than that of all numerical operators. Comparisons can also be chained. For example,\
    \ `a < b == c` tests whether `a` is less than `b` and moreover `b` equals `c`.\n\
    \n### The and, or, and not Boolean Operators\n\nThe Boolean operators `and`, `or`,\
    \ and `not` have lower priority than comparison operators. The Boolean `and` and\
    \ `or` are binary operators whereas the Boolean `not` operator is a unary operator.\
    \ Here are some examples:\n\n- `A and B` can only be true if both A and B are\
    \ true\n- `A or B` is true if either A or B is true\n- `not (A)` is true if and\
    \ only if A is false\n\nYou can also assign the result of a comparison or other\
    \ Boolean expression to a variable, as shown here:\n\n```\n>>> string1, string2,\
    \ string3 = '', 'b', 'cd'\n>>> str4 = string1 or string2 or string3\n>>> str4\n\
    'b'\n```\n\nThe preceding code block initializes the variables `string1`, `string2`,\
    \ and `string3`, where `string1` is an empty string. Next, `str4` is initialized\
    \ via the `or` operator, and since the first nonnull value is `string2`, the value\
    \ of `str4` is equal to `string2`.\n\n## LOCAL AND GLOBAL VARIABLES\n\nPython\
    \ variables can be local or global. A variable is local to a function if the following\
    \ are true:\n\n- a parameter of the function\n- on the left-side of a statement\
    \ in the function\n- bound to a control structure (such as `for`, `with`, and\
    \ `except`)\n\nA variable that is referenced in a function but is not local (according\
    \ to the previous list) is a nonlocal variable. You can specify a variable as\
    \ nonlocal with this snippet:\n\n```\nnonlocal z\n```\n\nA variable can be explicitly\
    \ declared as global with this statement:\n\n```\nglobal z\n```\n\nThe following\
    \ code block illustrates the behavior of a global versus a local variable:\n\n\
    ```\nglobal z\nz = 3\n\ndef changeVar(z):\n    z = 4\n    print('z in function:',\
    \ z)\n\nprint('first global z:',z)\n\nif __name__ == '__main__':\n    changeVar(z)\n\
    \    print('second global z:',z)\n```\n\nThe output from the preceding code block\
    \ is here:\n\n```\nfirst global z: 3\nz in function: 4\nsecond global z: 3\n```\n\
    \n## SCOPE OF VARIABLES\n\nThe accessibility or scope of a variable depends on\
    \ where that variable has been defined. Python provides two scopes: global and\
    \ local, with the added “twist” that global is actually module-level scope (i.e.,\
    \ the current file), and therefore you can have a variable with the same name\
    \ in different files and they will be treated differently.\n\nLocal variables\
    \ are straightforward: They are defined inside a function, and they can only be\
    \ accessed inside the function where they are defined. Any variables that are\
    \ not local variables have a global scope, which means that those variables are\
    \ “global” *only* with respect to the file where it has been defined, and they\
    \ can be accessed anywhere in a file.\n\nThere are two scenarios to consider regarding\
    \ variables. First, suppose two files (aka modules) `file1.py` and `file2.py`\
    \ have a variable called x, and `file1.py` also imports `file2.py`. The question\
    \ is how to disambiguate between the x in the two different modules. As an example,\
    \ suppose that `file2.py` contains the following two lines of code:\n\n```\nx\
    \ = 3\nprint('unscoped x in file2:',x)\n```\n\nSuppose that `file1.py` contains\
    \ the following code:\n\n```\nimport file2 as file2\n\nx = 5\nprint('unscoped\
    \ x in file1:',x)\nprint('scoped x from file2:',file2.x)\n```\n\nLaunch `file1.py`\
    \ from the command line, and you will see the following output:\n\n```\nunscoped\
    \ x in file2: 3\nunscoped x in file1: 5\nscoped x from file2: 3\n```\n\nThe second\
    \ scenario involves a program that contains a local variable and a global variable\
    \ with the same name. According to the earlier rule, the local variable is used\
    \ in the function where it is defined, and the global variable is used outside\
    \ of that function.\n\nThe following code block illustrates the use of a global\
    \ and local variable with the same name:\n\n```\n#!/usr/bin/python\n# a global\
    \ variable:\ntotal = 0;\n\ndef sum(x1, x2):\n    # this total is local:\n    total\
    \ = x1+x2;\n\n    print(\"Local total : \", total)\n    return total\n\n# invoke\
    \ the sum function\nsum(2,3);\nprint(\"Global total : \", total)\n```\n\nWhen\
    \ the above code is executed, it produces following result:\n\n```\nLocal total\
    \ :  5\nGlobal total :  0\n```\n\nWhat about unscoped variables, such as specifying\
    \ the variable `x` without a module prefix? The answer consists of the following\
    \ sequence of steps that Python will perform:\n\n1. Check the local scope for\
    \ the name.\n2. Ascend the enclosing scopes and check for the name."
  mdcn: "## JOIN() 函数\n\n另一种去除多余空格的方法是使用 `join()` 函数：\n\n```\ntext1 = '   there are\
    \    extra   spaces   '\nprint('text1:',text1)\n\ntext2 = ' '.join(text1.split())\n\
    print('text2:',text2)\n\ntext2 = 'XYZ'.join(text1.split())\nprint('text2:',text2)\n\
    ```\n\n`split()` 函数将文本字符串“分割”成一组单词，同时也会去除多余的空白字符。接着，`join()` 函数使用单个空格作为分隔符，将字符串\
    \ `text1` 中的单词“连接”在一起。前面代码块的最后一部分使用字符串 XYZ 作为分隔符，而不是单个空格。前面代码块的输出如下：\n\n```\n\
    text1:    there are    extra   spaces   \ntext2: there are extra spaces\ntext2:\
    \ thereXYZareXYZextraXYZspaces\n```\n\n## PYTHON WHILE 循环\n\n你可以定义一个 `while` 循环来遍历一组数字，如下例所示：\n\
    \n```\n>>> x = 0\n>>> while x < 5:\n...     print(x)\n...     x = x + 1\n...\n\
    0\n1\n2\n3\n4\n5\n```\n\nPython 使用缩进，而不是像 JavaScript 和 Java 等其他语言中使用的花括号。虽然列表数据结构要到本章后面才会讨论，但以下简单的代码块包含了一个前面\
    \ while 循环的变体，你可以在处理列表时使用：\n\n```\nlst = [1,2,3,4]\n\nwhile lst:\n    print('list:',lst)\n\
    \    print('item:',lst.pop())\n```\n\n前面的 while 循环在 `lst` 变量为空时终止，无需显式测试空列表。前面代码的输出如下：\n\
    \n```\nlist: [1, 2, 3, 4]\nitem: 4\nlist: [1, 2, 3]\nitem: 3\nlist: [1, 2]\nitem:\
    \ 2\nlist: [1]\nitem: 1\n```\n\n至此，使用 `split()` 函数处理文本字符串中的单词和字符的示例就结束了。本章的下一部分将展示使用条件逻辑的示例。\n\
    \n## PYTHON 中的条件逻辑\n\n如果你在其他编程语言中编写过代码，你肯定见过 if/then/else（或 if-elseif-else）条件语句。尽管语法因语言而异，但逻辑本质上是相同的。以下示例向你展示如何使用\
    \ if/elif 语句：\n\n```\n>>> x = 25\n>>> if x < 0:\n...     print('negative')\n...\
    \ elif x < 25:\n...     print('under 25')\n... elif x == 25:\n...     print('exactly\
    \ 25')\n... else:\n...     print('over 25')\n...\nexactly 25\n```\n\n前面的代码块说明了如何使用多个条件语句，输出结果完全符合预期。\n\
    \n## BREAK/CONTINUE/PASS 语句\n\n`break` 语句使你能够从循环中“提前退出”，而 `continue` 语句本质上是返回到循环顶部并继续处理循环变量的下一个值。`pass`\
    \ 语句本质上是一个“什么都不做”的语句。\n清单 2.9 展示了 `BreakContinuePass.py` 的内容，说明了这三个语句的用法。\n\n\
    **清单 2.9: BreakContinuePass.py**\n\n```\nprint('first loop')\nfor x in range(1,4):\n\
    \    if(x == 2):\n        break\n    print(x)\n\nprint('second loop')\nfor x in\
    \ range(1,4):\n    if(x == 2):\n        continue\n    print(x)\n\nprint('third\
    \ loop')\nfor x in range(1,4):\n    if (x == 2):\n        pass\n    print(x)\n\
    ```\n\n清单 2.9 的输出如下：\n\n```\nfirst loop\n1\nsecond loop\n1\n3\nthird loop\n1\n\
    2\n3\n```\n\n## 比较和布尔运算符\n\nPython 支持多种布尔运算符，例如 `in`、`not in`、`is`、`is not`、`and`、`or`\
    \ 和 `not`。接下来的几个小节将讨论这些运算符，并提供一些使用示例。\n\n### in/not in/is/is not 比较运算符\n\n`in`\
    \ 和 `not in` 运算符用于序列，以检查一个值是否出现在序列中或未出现在序列中。`is` 和 `is not` 运算符用于确定两个对象是否是同一个对象，这对于可变对象（如列表）很重要。所有比较运算符具有相同的优先级，低于所有数值运算符。比较也可以链式进行。例如，`a\
    \ < b == c` 测试 `a` 是否小于 `b`，并且 `b` 等于 `c`。\n\n### and、or 和 not 布尔运算符\n\n布尔运算符\
    \ `and`、`or` 和 `not` 的优先级低于比较运算符。布尔 `and` 和 `or` 是二元运算符，而布尔 `not` 运算符是一元运算符。以下是一些示例：\n\
    \n- `A and B` 只有在 A 和 B 都为真时才为真\n- `A or B` 在 A 或 B 为真时为真\n- `not (A)` 当且仅当 A\
    \ 为假时为真\n\n你也可以将比较或其他布尔表达式的结果赋值给一个变量，如下所示：\n\n```\n>>> string1, string2, string3\
    \ = '', 'b', 'cd'\n>>> str4 = string1 or string2 or string3\n>>> str4\n'b'\n```\n\
    \n前面的代码块初始化了变量 `string1`、`string2` 和 `string3`，其中 `string1` 是一个空字符串。接下来，`str4`\
    \ 通过 `or` 运算符初始化，由于第一个非空值是 `string2`，因此 `str4` 的值等于 `string2`。\n\n## 局部变量和全局变量\n\
    \nPython 变量可以是局部的或全局的。如果满足以下条件，则变量是函数的局部变量：\n\n- 是函数的参数\n- 位于函数内语句的左侧\n- 绑定到控制结构（如\
    \ `for`、`with` 和 `except`）\n\n在函数中引用但不是局部变量（根据前面的列表）的变量是非局部变量。你可以使用以下代码片段将变量指定为非局部变量：\n\
    \n```\nnonlocal z\n```\n\n可以使用以下语句将变量显式声明为全局变量：\n\n```\nglobal z\n```\n\n以下代码块说明了全局变量与局部变量的行为：\n\
    \n```\nglobal z\nz = 3\n\ndef changeVar(z):\n    z = 4\n    print('z in function:',\
    \ z)\n\nprint('first global z:',z)\n\nif __name__ == '__main__':\n    changeVar(z)\n\
    \    print('second global z:',z)\n```\n\n前面代码块的输出如下：\n\n```\nfirst global z: 3\n\
    z in function: 4\nsecond global z: 3\n```\n\n## 变量的作用域\n\n变量的可访问性或作用域取决于该变量的定义位置。Python\
    \ 提供两种作用域：全局和局部，并有一个额外的“转折”：全局实际上是模块级作用域（即当前文件），因此你可以在不同的文件中拥有同名变量，它们会被区别对待。\n\
    \n局部变量很简单：它们在函数内部定义，只能在定义它们的函数内部访问。任何不是局部变量的变量都具有全局作用域，这意味着这些变量仅在定义它的文件中是“全局”的，并且可以在文件中的任何地方访问。\n\
    \n关于变量，有两种情况需要考虑。首先，假设两个文件（即模块）`file1.py` 和 `file2.py` 有一个名为 x 的变量，并且 `file1.py`\
    \ 还导入了 `file2.py`。问题是如何区分两个不同模块中的 x。例如，假设 `file2.py` 包含以下两行代码：\n\n```\nx = 3\n\
    print('unscoped x in file2:',x)\n```\n\n假设 `file1.py` 包含以下代码：\n\n```\nimport file2\
    \ as file2\n\nx = 5\nprint('unscoped x in file1:',x)\nprint('scoped x from file2:',file2.x)\n\
    ```\n\n从命令行启动 `file1.py`，你将看到以下输出：\n\n```\nunscoped x in file2: 3\nunscoped x\
    \ in file1: 5\nscoped x from file2: 3\n```\n\n第二种情况涉及一个程序，其中包含一个同名的局部变量和全局变量。根据前面的规则，局部变量在定义它的函数中使用，而全局变量在该函数外部使用。\n\
    \n以下代码块说明了同名全局变量和局部变量的用法：\n\n```\n#!/usr/bin/python\n# a global variable:\ntotal\
    \ = 0;\n\ndef sum(x1, x2):\n    # this total is local:\n    total = x1+x2;\n\n\
    \    print(\"Local total : \", total)\n    return total\n\n# invoke the sum function\n\
    sum(2,3);\nprint(\"Global total : \", total)\n```\n\n当执行上述代码时，会产生以下结果：\n\n```\n\
    Local total :  5\nGlobal total :  0\n```\n\n那么，对于没有作用域限定的变量，例如指定变量 `x` 而没有模块前缀，该怎么办呢？答案包括\
    \ Python 将执行的以下步骤序列：\n\n1. 在局部作用域中检查该名称。\n2. 向上遍历封闭作用域并检查该名称。"
