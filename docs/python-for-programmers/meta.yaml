  md: "# SAVING YOUR CODE IN A MODULE\n\nEarlier you saw how to launch the Python\
    \ interpreter from the command line and then enter Python commands. However, that\
    \ everything that you type in the Python interpreter is only valid for the current\
    \ session: If you exit the interpreter and then launch the interpreter again,\
    \ your previous definitions are no longer valid. Fortunately, Python enables you\
    \ to store code in a text file, as discussed in the next section.\n\nA module\
    \ in Python is a text file that contains Python statements. In the previous section,\
    \ you saw how the Python interpreter enables you to test code snippets whose definitions\
    \ are valid for the current session. If you want to retain the code snippets and\
    \ other definitions, place them in a text file so that you can execute that code\
    \ outside of the Python interpreter.\n\nThe outermost statements in a Python are\
    \ executed from top to bottom when the module is imported for the first time,\
    \ which will then set up its variables and functions.\n\nA Python module can be\
    \ run directly from the command line, as shown here:\n\n```\npython first.py\n\
    ```\n\nAs an illustration, place the following two statements in a text file called\
    \ first.py:\n\n```\nx = 3\nprint(x)\n```\n\nType the following command:\n\n```\n\
    python first.py\n```\n\nThe output from the preceding command is 3, which is the\
    \ same as executing the preceding code from the Python interpreter.\n\nWhen a\
    \ Python module is run directly, the special variable __name__ is set to __main__.\
    \ You will often see the following type of code in a Python module:\n\n```\nif\
    \ __name__ == '__main__':\n    # do something here\n    print('Running directly')\n\
    ```\n\nThe preceding code snippet enables Python to determine if a Python module\
    \ was launched from the command line or imported into another Python module."
