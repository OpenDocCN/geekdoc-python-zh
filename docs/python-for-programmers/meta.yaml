  md: "# COMPILE TIME AND RUNTIME CODE CHECKING\n\nPython performs some compile-time\
    \ checking, but most checks (including type, name, and so forth) are *deferred*\
    \ until code execution. Consequently, if your Python code references a user-defined\
    \ function that that does not exist, the code will compile successfully. In fact,\
    \ the code will fail with an exception *only* when the code execution path references\
    \ the nonexistent function.\n\nAs a simple example, consider the following Python\
    \ function `myFunc` that references the nonexistent function called `DoesNotExist`:\n\
    \n```\ndef myFunc(x):\n    if x == 3:\n        print(DoesNotExist(x))\n    else:\n\
    \        print('x: ', x)\n```\n\nThe preceding code will only fail when the `myFunc`\
    \ function is passed the value 3, after which Python raises an error.\n\nYou should\
    \ now have an understanding of some basic concepts, such as how to use the Python\
    \ interpreter and how to launch your custom Python modules. The next section discusses\
    \ primitive data types in Python.\n\n# SIMPLE DATA TYPES IN PYTHON\n\nPython supports\
    \ primitive data types, such as numbers (integers, floating point numbers, and\
    \ exponential numbers), strings, and dates. Python also supports more complex\
    \ data types, such as lists (or arrays), tuples, and dictionaries. The next several\
    \ sections discuss some of the Python primitive data types, along with code snippets\
    \ that show you how to perform various operations on those data types.\n\n# WORKING\
    \ WITH NUMBERS\n\nPython provides arithmetic operations for manipulating numbers\
    \ in a straightforward manner that is similar to other programming languages.\
    \ The following examples involve arithmetic operations on integers:\n\n```\n>>>\
    \ 2+2\n4\n>>> 4/3\n```"
