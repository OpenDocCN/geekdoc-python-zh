  md: '# Working With Combinations


    Let''s look at a slightly different question: How many ways can you select three
    books from those six books? Here''s the first approximation:


    +   - position #1: six choices

    - position #2: five choices

    - position #3: four choices


    Since the number of books in any position is independent of the other positions,
    the first answer might be 6x5x4 = 120. However, this answer is incorrect because
    it includes different orderings of three books, but the sequence of books (A,B,C)
    is the same as (B,A,C) and every other recording of the letters A, B, and C.


    As a concrete example, suppose that the books are labeled sequentially as book
    #1, book #2, . . . , book #6, and suppose that you also select book #1, book #2,
    and book #3 (i.e., the first three books). Here list a list of all the different
    orderings of those three books:


    +   123

    132

    213

    231

    312

    321


    The number of different orderings of three books is 3x2x1 = 3! = 6. However, from
    the standpoint of purely selecting three books, we must treat all six orderings
    as the same. Hence the correct answer is 6x5x4/[3x2x1] = 120/3! = 120/6 = 20.


    Now let''s multiply the numerator and the denominator by 3x2x1, which gives us
    this number: 6x5x4x3x2x1/[3x2x1 * 3x2x1] = 6!/[3! * 3!]


    If we perform the preceding task of selecting three books from eight books instead
    of six books, we get this result:


    ```

    8x7x6/[3x2x1] = 8x7x6x5x4x3x2x1/[3x2x1 * 5x4x3x2x1] = 8!/[3! * 5!]

    ```


    Suppose you select 12 books from a set of 30 books. The number of ways that this
    can be done is shown here:


    ```

    30x29x28x...x19/[12x11x...x2x1]

    ```'
