    其次，存在“面向接口编程”的概念，这本质上意味着你将基类指定为方法的参数，以便可以传入该基类的任何派生类。在 Java 世界中，你将接口指定为方法的参数，这样你就可以传入实现该指定接口的任何具体类。\n\
