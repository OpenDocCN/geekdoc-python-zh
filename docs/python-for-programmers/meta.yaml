  md: '# WHAT IS RECURSION?


    Recursion-based algorithms can provide very elegant solutions to tasks that would
    be difficult to implement via iterative algorithms. For some tasks, such as calculating
    factorial values, the recursive solution and the iterative solution have comparable
    code complexity.


    As a simple example, suppose that we want to add the integers from 1 to n (inclusive),
    and let n = 10 so that we have a concrete example. If we denote S as the partial
    sum of successively adding consecutive integers, then we have the following:


    ```

    S = 1

    S = 1 + 2

    S = 1 + 2 + 3

    . . .

    S = 1 + 2 + 3 + . . . + 10

    ```


    Let''s generalize the preceding sequence and denote S(n) as the sum of the first
    n positive integers, which leads to the following relationship:


    ```

    S(1) = 1

    S(n) = S(n-1) + n for n > 1

    ```


    With the preceding observations in mind, the next section contains code samples
    for calculating the sum of the first n positive integers using an iterative approach
    and then with recursion.


    # ARITHMETIC SERIES


    This section shows you how to calculate the sum of a set of positive integers,
    such as the numbers from 1 to n inclusive. The first algorithm uses an iterative
    approach and the second algorithm uses recursion.


    Before delving into the code samples, there is a simple way to calculate the closed
    form sum of the integers from 1 to n inclusive, which we will denote as S. Then
    there are two ways to calculate S, as shown here:


    ```

    S = 1 + 2 + 3 + . . . + (n-1) + n

    S = n + (n-1) + (n-2) + . . . + 2 + 1

    ```


    There are n columns, and each column has the sum equal to (n+1), and therefore
    the sum of the right-side of the equals sign is n*(n+1). Since the left-side of
    the equals sign has the sum 2*S, we have the following result:


    ```

    2*S = n*(n+1)

    ```'
