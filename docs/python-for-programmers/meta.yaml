  md: '# CONSTRUCTION AND INITIALIZATION OF OBJECTS


    In the previous section, you saw an example of the `__init__` function, which
    is one of the “magic” methods that exist in Python. Three magic methods are shown
    here:


    +   - `__init__`

    - `__new__`

    - `__del__`


    In brief, the `__new__` method is invoked in order to create an instance of a
    class, which occurs when you invoke the following type of statement:


    ```

    myObj = MyClass()

    ```


    Next, any arguments during creation time are passed to the “initializer” method
    `__init__`, which specifies the behavior of an object during initialization. You
    can think of the `__new__` method and the `__init__` methods as the “constructor”
    of an object.


    For example, consider the following snippet:


    ```

    myObj = MyClass(''pizza'', 25);

    ```


    In the preceding code snippet, the values `pizza` and `25` are passed as arguments
    to the `__init__` method.


    Finally, when an object is deleted, the “destructor” method `__del__` is invoked
    and it defines behavior during garbage collection. This method is useful when
    additional resources need to be deallocated. However, there is no guarantee that
