  md: '# Pandas Data Frames


    In simplified terms, a Pandas data frame is a two-dimensional data structure,
    and it''s convenient to think of the data structure in terms of rows and columns.
    Data frames can be labeled (rows as well as columns), and the columns can contain
    different data types. The source of the dataset for a Pandas data frame can be
    a data file, a database table, and a Web service. The data frame features include


    +   - data frame methods

    - data frame statistics

    - grouping, pivoting, and reshaping

    - handle missing data

    - join data frames


    The code samples in this appendix show you almost all the features in the preceding
    list.


    # Data Frames and Data Cleaning Tasks


    The specific tasks that you need to perform depend on the structure and contents
    of a dataset. In general, you will perform a workflow with the following steps,
    not necessarily always in this order (and some might be optional). All of the
    following steps can be performed with a Pandas data frame:


    +   - Read data into a data frame

    - Display top of data frame

    - Display column data types

    - Display missing values

    - Replace NA with a value

    - Iterate through the columns

    - Statistics for each column

    - Find missing values

    - Total missing values

    - Percentage of missing values

    - Sort table values

    - Print summary information

    - Columns with > 50% missing

    - Rename columns


    This appendix contains sections that illustrate how to perform many of the steps
    in the preceding list.'
