  md: '# ACCESSORS AND MUTATORS VERSUS @PROPERTY


    Object-oriented languages such as Java encourage the use of accessors and mutators
    (often called getters and setters) rather than direct access to a property. For
    example, if x is a property of a custom class, then the accessor method getX()
    returns the value of x and the mutator method setX() sets the value of x (you
    would also specify an argument in the case of the setX() method).


    By contrast, Python has a @property decorator that lets you add getters and setters
    retroactively for attribute access. Consider the following example:


    ```

    >>> class Foo(object):

    ...     @property

    ...     def foo(self):

    ...         return 4

    >>> obj = Foo()

    >>> obj.foo

    4

    ```


    The preceding code defines a class Foo with a method called foo(). The variable
    obj is an instance of the class Foo, and notice how it’s possible to write obj.foo
    in order to obtain the result (4). This functionality is possible because of the
    @property decorator in Python.


    Consequently, you can define your custom Python classes by “allowing” attribute
    access, and if it becomes necessary to add get/set methods later on, you can do
    so without breaking any existing code.


    > Accessors and mutators are common in languages such as Java, whereas direct
    access is preferred in Python.


