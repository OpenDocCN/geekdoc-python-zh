  md: '# WELL-KNOWN SORTING ALGORITHMS


    There are numerous sorting algorithms, each of which have a best case, average
    case, and worst case in terms of performance. Interestingly, some algorithms can
    perform the worst when a given array is already sorted.

    The following subsections contain code samples for the following well-known sort
    algorithms:


    +   - bubble sort

    - merge sort

    - quick sort


    If you want to explore sorting algorithms in more depth, perform an internet search
    for additional sorting algorithms.


    # Bubble Sort


    A *bubble sort* involves a nested loop whereby each element of an array is compared
    with the elements to the right of the given element. If an array element is less
    than the current element, the values are “swapped,” which means that the contents
    of the array will eventually be sorted from smallest to largest value.

    Here is an example:


    ```

    arr1 = np.array([40, 10, 30, 20]);

    Item = 40;

    Step 1: 40 > 10 so switch these elements:

    arr1 = np.array([10, 40, 30, 20]);

    Item = 40;

    Step 2: 40 > 30 so switch these elements:

    arr1 = np.array([10, 30, 40, 20]);

    Item = 40;

    Step 3: 40 > 20 so switch these elements:

    arr1 = np.array([10, 30, 20, 40]);

    ```


    As you can see, the smallest element is in the left-most position of the array
    arr1. Now repeat this process by comparing the second position (which is index
    1) with the right-side elements.


    ```

    arr1 = np.array([10, 30, 20, 40]);

    Item = 30;

    Step 4: 30 > 20 so switch these elements:

    arr1 = np.array([10, 20, 30, 40]);

    ```'
