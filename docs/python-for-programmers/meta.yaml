    \ `func()`。\n\n再举一个例子，假设 `ClassC` 是 `ClassA1`、`ClassA2` 和 `ClassA3`（按此顺序）的子类（从左到右），并且方法\
    \ `func()` 仅在 `ClassA2` 和 `ClassA3` 中定义，而不在 `ClassA1` 或 `ClassC` 中定义。再次考虑以下片段，其中\
