    # PYTHON FUNCTIONS VERSUS METHODS


    A method is a function, but a function is not necessarily a method. A method is
    a function that is “attached” to an object or `Class`. Thus, `str.upper()` is
    a method, whereas `sorted()` is a function.


    In addition, functions can be available as methods, which happens to be the case
    for the functions in the `re` module: `re.sub` is a function, and if you make
    a regex object by compiling a pattern, many of the module functions are also available
    as methods on the resulting object. An example is here:


    ```

    >>> import re

    >>> regex = re.compile("\d+")

    >>> regex.sub # this is a method

    >>> re.sub # this is a function

    ```


    The distinction between function and method is whether the function is defined
    in a class or not. Functions in a module are just functions, functions in class
    are methods of the class or methods of the resulting objects.'
