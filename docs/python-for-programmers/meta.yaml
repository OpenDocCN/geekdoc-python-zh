  - '[PAGE 241]


    # WHAT IS COMBINATORICS?


    In simple terms, combinatorics involves finding formulas for counting the number
    of objects in a set. For example, how many different ways can five books can be
    ordered (i.e., displayed) on a book shelf? The answer involves permutations, which
    in turn is a factorial value; in this case, the answer is 5! = 120.


    As a second example, suppose how many different ways can you select three books
    from a shelf that contains five books? The answer to this question involves combinations.
    Keep in mind that if you select three books labeled A, B, and C, then any permutation
    of these three books is considered the same (the set A, B, and C and the set B,
    A, and C are considered the same selection).


    As a third example, how many 5-digit binary numbers contain exactly three 1 values?
    The answer to this question also involves calculating a combinatorial value. The
    answer is C(5, 3) = 5! / [3! * 2!] = 10, provided that we allow for leading zeroes.
    In fact, this is also the answer to the preceding question about selecting different
    subsets of books.


    You can generalize the previous question by asking how many 4-digit, 5-digit,
    and 6-digit numbers contain exactly three 1s? The answer is the sum of these values
    (provided that leading zeroes are permitted):


    ```

    C(4, 3) + C(5, 3) + C(6, 3) = 4 + 10 + 20 = 34

    ```


    # Working With Permutations


    Consider the following task: Given six books, how many ways can you display them
    side-by-side? The possibilities are listed here:


    +   - position #1: six choices

    - position #2: five choices

    - position #3: four choices

    - position #4: three choices

    - position #5: two choices

    - position #6: one choice


    The answer is 6x5x4x3x2x1 = 6! = 720. In general, if you have n books, there are
    n! different ways that you can order them (i.e., display them side-by-side).'
