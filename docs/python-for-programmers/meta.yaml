    \ performance can have a relatively poor worst case performance.\n\nRecall that\
    \ O(n) means that an algorithm executes in linear time because its complexity\
    \ is bounded above and below by a linear function. For example, if three algorithms\
    \ require 2*n, 5*n, or n/2 operations, respectively, then all of them have O(n)\
    \ complexity.\n\nMoreover, if the best, average, and worst time performance for\
    \ a linear search is 1, n/2, and n operations, respectively, which in turn equals\
    \ O(1), O(n), and O(n), respectively.\n\nThe time-space trade-off refers to reducing\
    \ either the amount of time or the amount of memory that is required for executing\
    \ an algorithm, which involves choosing one of the following:\n\n- execute in\
    \ less time and more memory\n- execute in more time and less memory\n\nAlthough\
    \ reducing both time and memory is desirable, it’s also a more challenging task.\
