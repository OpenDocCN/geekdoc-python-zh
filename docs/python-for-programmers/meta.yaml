  md: '# CHAPTER 5


    # BUILT-IN FUNCTIONS AND CUSTOM CLASSES


    This chapter introduces you to some Python built-in functions, how to create custom
    classes in Python, and object-oriented concepts such as inheritance and polymorphism.


    The first part of this chapter discusses the Python functions such as the `filter()`
    function, the `map()` function, and the `reduce()` function. You will also learn
    something about `lambda` functions, which are often used in conjunction with these
    same Python functions. The second part of this chapter shows you how to define
    custom classes, and how to manage lists of objects that are instances of your
    custom Python classes.


    The final portion of this chapter contains a light introduction to encapsulation,
    single and multiple inheritance, and polymorphism in Python. There are many subtle
    points involving inheritance and object-oriented programming, and after you have
    read this chapter you can perform a “deep dive” into this topics in order to write
    object-oriented Python code.


    # A PYTHON MODULE VERSUS PACKAGE


    A module generally contains definitions, functions, and Python code, and it “lives”
    in a file with a `.py` extension. A module can also import other modules, and
    by convention, the `import` statements are placed at the top of the file (but
    this is not a strict requirement). Note that `zip` files and `DLL` files can also
    be modules.


    However, when a module imports a directory, the presence of the file `__init__.py`
    is significant because Python will then treat the directory as a package. The
    file `__init__.py` can contain some initialization code for the'
  merge: -1
