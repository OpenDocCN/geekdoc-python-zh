    \ `while` 循环完成后返回 `divList` 的值。清单 2.11 的输出如下：\n\n```\nThe divisors of 12 are:\
    \ 2 2 3\n```\n\n## 使用 while 循环查找质数\n\n清单 2.12 展示了 `Divisors3.py` 的内容，它包含一个 `while`\
    \ 循环、条件逻辑和 `%`（取模）运算符，用于计算任何大于 1 的整数的质因数数量。如果一个数只有一个因数，那么这个数就是质数。\n\n### 清单 2.12：Divisors3.py\n\
    \n```python\ndef divisors(num):\n    count = 1\n    div = 2\n    while(div < num):\n\
    \        if(num % div == 0):\n            count = count + 1\n        div = div\
    \ + 1\n    return count\n\nresult = divisors(12)\n\nif(result == 1):\n    print('12\
    \ is prime')\nelse:\n    print('12 is not prime')\n```\n\n运行清单 2.12 中的代码，你将看到以下输出：\n\
    \n```\n12 is not prime\n```\n\n## Python 中的用户自定义函数\n\nPython 提供了内置函数，也允许你定义自己的函数。你可以定义函数来提供所需的功能。以下是定义函数的简单规则：\n\
    \n- 函数块以关键字 `def` 开头，后跟函数名和圆括号。\n- 任何输入参数都应放在这些圆括号内。\n- 函数的第一条语句可以是可选的语句——函数的文档字符串或\
    \ `docstring`。\n- 每个函数内的代码块以冒号（`:`）开头并缩进。\n- 语句 `return [expression]` 退出函数，可选择将表达式返回给调用者。没有参数的\
    \ `return` 语句等同于 `return None`。\n- 如果函数没有指定 `return` 语句，函数会自动返回 `None`，这是一个特殊类型的值。\n\
    \n一个非常简单的自定义 Python 函数如下：\n\n```python\n>>> def func():\n...     print 3\n...\n\
    >>> func()\n3\n```\n\n前面的函数很简单，但它确实说明了定义自定义函数的语法。下面的例子稍微更有用一些：\n\n```python\n\
    >>> def func(x):\n...     for i in range(0,x):\n...         print(i)\n...\n>>>\
    \ func(5)\n0\n1\n2\n3\n4\n```\n\n## 在函数中指定默认值\n\n清单 2.13 展示了 `DefaultValues.py`\
    \ 的内容，它说明了如何在函数中指定默认值。\n\n### 清单 2.13：DefaultValues.py\n\n```python\ndef numberFunc(a,\
    \ b=10):\n    print (a,b)\n\ndef stringFunc(a, b='xyz'):\n    print (a,b)\n\n\
    def collectionFunc(a, b=None):\n    if(b is None):\n        print('No value assigned\
    \ to b')\n\nnumberFunc(3)\nstringFunc('one')\ncollectionFunc([1,2,3])\n```\n\n\
    清单 2.13 定义了三个函数，然后调用了每个函数。函数 `numberFunc()` 和 `stringFunc()` 打印一个包含其两个参数值的列表，而\
    \ `collectionFunc()` 在第二个参数为 `None` 时显示一条消息。清单 2.13 的输出如下：\n\n```\n(3, 10)\n('one',\
    \ 'xyz')\nNo value assigned to b\n```\n\n## 从函数返回多个值\n\n这个任务由清单 2.14 中的代码完成，它展示了\
    \ `MultipleValues.py` 的内容。\n\n### 清单 2.14：MultipleValues.py\n\n```python\ndef\
    \ MultipleValues():\n    return 'a', 'b', 'c'\n\nx, y, z = MultipleValues()\n\n\
    print('x:', x)\nprint('y:', y)\nprint('z:', z)\n```\n\n清单 2.14 的输出如下：\n\n```\n\
    x: a\ny: b\nz: c\n```\n\n## 具有可变数量参数的函数\n\nPython 允许你定义具有可变数量参数的函数。此功能在许多情况下都很有用，例如计算一组数字的总和、平均值或乘积。例如，以下代码块计算两个数字的总和：\n\
