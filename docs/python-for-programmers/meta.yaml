    \ customer).\n\nThe example in this section uses accessors for accessing property\
    \ values as well as direct access so that you can see how to use both techniques.\n\
    \nListing 5.7 displays the contents of the custom Python class Employee.py that\
    \ keeps track of an employee’s first name, last name, and title.\n\n### Listing\
