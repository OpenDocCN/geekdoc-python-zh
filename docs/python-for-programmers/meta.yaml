    ## PREFACE


    ## WHAT IS THE PRIMARY VALUE PROPOSITION FOR THIS BOOK?


    This book contains a fast-paced introduction to Python and Python-based solutions
    to various tasks. Some topics are presented in a high-level manner for two main
    reasons. First, it''s important that you be exposed to these concepts. In some
    cases you will find topics that might pique your interest, and hence motivate
    you to learn more about them through self-study; in other cases you will probably
    be satisfied with a brief introduction. In other words, you will decide whether
    or not to delve into more detail regarding the topics in this book.


    Second, a full treatment of all the topics that are covered in this book would
    significantly increase the size of this book, and few people are interested in
    reading technical tomes.


    ## THE TARGET AUDIENCE


    This book is intended primarily for developers who have little or no experience
    with Python and are interested in learning about Python as well as an introduction
    to Pandas.


    This book is also intended to reach an international audience of readers with
    highly diverse backgrounds in various age groups. While many readers know how
    to read English, their native spoken language is not English (which could be their
    second, third, or even fourth language). Consequently, this book uses standard
    English rather than colloquial expressions that might be confusing to those readers.
    As you know, many people learn by different types of imitation, which includes
    reading, writing, or hearing new material. This book takes these points into consideration
    in order to provide a comfortable and meaningful learning experience for the intended
    readers.


    ## WHAT WILL I LEARN FROM THIS BOOK?


    The first chapter contains a quick tour of basic Python3, followed by a chapter
    that shows you how to work with loops and conditional logic in Python. The third
    chapter discusses data structures in Python, followed by a chapter that contains
    code samples for tasks that involve strings and arrays in Python. The fifth chapter
    contains fundamental concepts in OOP (object-oriented programming), along with
    code samples that illustrate how they are implemented in Python. The sixth chapter
    introduces you to recursion and some fundamental topics in combinatorics. Finally,
    the Appendix contains an introduction to Pandas.


    ## GETTING THE MOST FROM THIS BOOK


    Some programmers learn well from prose, others learn well from sample code (and
    lots of it), which means that there''s no single style that can be used for everyone.
    Moreover, some programmers want to run the code first, see what it does, and then
    return to the code to delve into the details (and others use the opposite approach).
    Consequently, there are various types of code samples in this book: some are short,
    some are long, and other code samples “build” from earlier code samples.


    ## WHAT DO I NEED TO KNOW FOR THIS BOOK?


    Current knowledge of Python 3.x is the most helpful skill. Knowledge of other
    programming languages (such as Java) can also be helpful because of the exposure
    to programming concepts and constructs. The less technical knowledge that you
    have, the more diligence will be required in order to understand the various topics
    that are covered.


    > If you want to be sure that you can grasp the material in this book, glance
    through some of the code samples to get an idea of how much is familiar to you
    and how much is new for you.


    ## DON''T THE COMPANION FILES OBVIATE THE NEED FOR THIS BOOK?


    The companion files contain all the code samples to save you time and effort from
    the error-prone process of manually typing code into a text file. In addition,
    there are situations in which you might not have easy access to the files. Furthermore,
    the code samples in the book provide explanations that are not available on the
    companion files.


    ## DOES THIS BOOK CONTAIN PRODUCTION-LEVEL CODE SAMPLES?


    The primary purpose of the code samples in this book is to show you Python-based
    libraries for solving a variety of data-related tasks in conjunction with acquiring
    a rudimentary understanding of statistical concepts. Clarity has higher priority
    than writing more compact code that is more difficult to understand (and possibly
    more prone to bugs). If you decide to use any of the code in this book in a production
    website, you ought to subject that code to the same rigorous analysis as the other
    parts of your code base.


    ## WHAT ARE THE NON-TECHNICAL PREREQUISITES FOR THIS BOOK?


    Although the answer to this question is more difficult to quantify, it''s very
    important to have strong desire to learn about Python, along with the motivation
    and discipline to read and understand the code samples.


    ## HOW DO I SET UP A COMMAND SHELL?


    If you are a Mac user, there are three ways to do so. The first method is to use
    `Finder` to navigate to `Applications > Utilities` and then double click on the
    `Utilities` application. Next, if you already have a command shell available,
    you can launch a new command shell by typing the following command:


    ```

    open /Applications/Utilities/Terminal.app

    ```


    A second method for Mac users is to open a new command shell on a MacBook from
    a command shell that is already visible simply by clicking `command+n` in that
    command shell, and your Mac will launch another command shell.


    If you are a PC user, you can install Cygwin (open source https://cygwin.com/)
    that simulates bash commands, or use another toolkit such as MKS (a commercial
    product). Please read the online documentation that describes the download and
    installation process. Note that custom aliases are not automatically set if they
    are defined in a file other than the main start-up file (such as `.bash_login`).


    ## COMPANION FILES


    All the code samples and figures in this book may be obtained by writing to the
    publisher at info@merclearning.com.


    ## WHAT ARE THE “NEXT STEPS” AFTER FINISHING THIS BOOK?


    The answer to this question varies widely, mainly because the answer depends heavily
    on your objectives. If you are primarily interested in machine learning, there
    are some subfields of machine learning, such as deep learning and reinforcement
    learning (and deep reinforcement learning) that might appeal to you. Fortunately,
    there are many resources available, and you can perform an Internet search for
    those resources. One other point: the aspects of machine learning for you to learn
    depend on who you are: the needs of a machine learning engineer, data scientist,
    manager, student or software developer are all different.


