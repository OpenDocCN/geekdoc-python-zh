    \n    print 'instanceR:'\n    calcPerimeter(instanceR)\n    print 'instanceS:'\n\
    \    calcPerimeter(instanceS)\n```\n\n清单 5.16 首先定义了自定义 Python 类 Rect 和 Square，每个类都定义了一个\
