    # INHERITANCE AND OVERRIDING METHODS


    If class A is a subclass (also called a “derived” class) of class B, then everything
    in B is accessible in A. In addition, class A can define methods that:


    +   1. are unavailable in B

    2. override methods in B


    If class B and class A both contain a method called `func()`, then `func()` in
    class B can override the `func()` in class A. As strange as it might seem, a method
    of class A can call another method in class A that in turn can invoke a method
    of class B that overrides it. Python has two built-in functions that work with
    inheritance:


    +   * the `isinstance()` method checks the type of an instance

    * the `issubclass()` method checks class inheritance


    For example, `isinstance(myObj, int)` evaluates to `True` only if `myObj.__class__`
    is `int` or a subclass of `int`, whereas `issubclass(bool, int)` evaluates to
    `True` because `bool` is a subclass of `int`. On the other hand, `issubclass(unicode,
    str)` evaluates to `False` because `unicode` is not a subclass of `str`.


    # MULTIPLE INHERITANCE


    The previous section showed you how to work with single inheritance and this section
    briefly discusses multiple inheritance in Python. *Multiple inheritance* means
    that a class can have more than one parent class.'
