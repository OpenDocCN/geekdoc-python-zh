    作为另一个具体示例，清单 5.16 展示了 Polymorphism1.py 的内容，该文件定义了两个自定义 Python 类和一个可以用这两个自定义 Python\
    \ 类的实例调用的方法。\n\n### 清单 5.16: Polymorphism1.py\n\n```\nclass Rect:\n    def perimeter(self):\n\
