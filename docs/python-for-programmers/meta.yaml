    \ 的自由形式和静态类型语言的更严格强制之间提供了一种中间解决方案。\n\n尽管这是一个高级主题（实际上超出了本书的预期范围），但有关 Python abc\
    \ 模块的更多信息请参见：\nhttp://docs.python.org/2/library/abc.html\n\n## 总结\n\n本章向你介绍了一些有用的\
