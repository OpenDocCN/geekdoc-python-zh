- md: "## SAVING YOUR CODE IN A MODULE\n\nEarlier you saw how to launch the Python\
    \ interpreter from the command line and then enter Python commands. However, that\
    \ everything that you type in the Python interpreter is only valid for the current\
    \ session: If you exit the interpreter and then launch the interpreter again,\
    \ your previous definitions are no longer valid. Fortunately, Python enables you\
    \ to store code in a text file, as discussed in the next section.\n\nA module\
    \ in Python is a text file that contains Python statements. In the previous section,\
    \ you saw how the Python interpreter enables you to test code snippets whose definitions\
    \ are valid for the current session. If you want to retain the code snippets and\
    \ other definitions, place them in a text file so that you can execute that code\
    \ outside of the Python interpreter.\n\nThe outermost statements in a Python are\
    \ executed from top to bottom when the module is imported for the first time,\
    \ which will then set up its variables and functions.\n\nA Python module can be\
    \ run directly from the command line, as shown here:\n\n```\npython first.py\n\
    ```\n\nAs an illustration, place the following two statements in a text file called\
    \ first.py:\n\n```\nx = 3\nprint(x)\n```\n\nType the following command:\n\n```\n\
    python first.py\n```\n\nThe output from the preceding command is 3, which is the\
    \ same as executing the preceding code from the Python interpreter.\n\nWhen a\
    \ Python module is run directly, the special variable `__name__` is set to `__main__`.\
    \ You will often see the following type of code in a Python module:\n\n```\nif\
    \ __name__ == '__main__':\n    # do something here\n    print('Running directly')\n\
    ```\n\nThe preceding code snippet enables Python to determine if a Python module\
    \ was launched from the command line or imported into another Python module.\n\
    \n## SOME STANDARD MODULES IN PYTHON\n\nThe Python Standard Library provides many\
    \ modules that can simplify your own Python scripts. A list of the Standard Library\
    \ modules is here:\n\nhttp://www.python.org/doc/\n\nSome of the most important\
    \ Python modules include cgi, math, os, pickle, random, re, socket, sys, time,\
    \ and urllib.\n\nThe code samples in this book use the modules math, os, random,\
    \ re, socket, sys, time, and urllib. You need to import these modules in order\
    \ to use them in your code. For example, the following code block shows you how\
    \ to import four standard Python modules:\n\n```\nimport datetime\nimport re\n\
    import sys\nimport time\n```\n\nThe code samples in this book import one or more\
    \ of the preceding modules, as well as other Python modules.\n\n## THE HELP()\
    \ AND DIR() FUNCTIONS\n\nAn internet search for Python-related topics usually\
    \ returns a number of links with useful information. Alternatively, you can check\
    \ the official Python documentation site: docs.python.org\n\nIn addition, Python\
    \ provides the `help()` and `dir()` functions that are accessible from the Python\
    \ interpreter. The `help()` function displays documentation strings, whereas the\
    \ `dir()` function displays defined symbols.\n\nFor example, if you type `help(sys)`\
    \ you will see documentation for the sys module, whereas `dir(sys)` displays a\
    \ list of the defined symbols.\n\nType the following command in the Python interpreter\
    \ to display the string-related methods in Python:\n\n```\n>>> dir(str)\n```\n\
    \nThe preceding command generates the following output:\n\n```\n['__add__', '__class__',\
    \ '__contains__', '__delattr__',\n'__doc__', '__eq__', '__format__', '__ge__',\
    \ '__\ngetattribute__', '__getitem__', '__getnewargs__',\n'__getslice__', '__gt__',\
    \ '__hash__', '__init__',\n'__le__', '__len__', '__lt__', '__mod__', '__mul__',\n\
    '__ne__', '__new__', '__reduce__', '__reduce_ex__',\n'__repr__', '__rmod__', '__rmul__',\
    \ '__setattr__',\n'__sizeof__', '__str__', '__subclasshook__',\n'_formatter_field_name_split',\
    \ '_formatter_parser',\n'capitalize', 'center', 'count', 'decode', 'encode',\n\
    'endswith', 'expandtabs', 'find', 'format', 'index',\n'isalnum', 'isalpha', 'isdigit',\
    \ 'islower', 'isspace',\n'istitle', 'isupper', 'join', 'ljust', 'lower',\n'lstrip',\
    \ 'partition', 'replace', 'rfind', 'rindex',\n'rjust', 'rpartition', 'rsplit',\
    \ 'rstrip', 'split',\n'splitlines', 'startswith', 'strip', 'swapcase',\n'title',\
    \ 'translate', 'upper', 'zfill']\n```\n\nThe preceding list gives you a consolidated\
    \ \"dump\" of built-in functions (including some that are discussed later in this\
    \ chapter). Although the `max()` function obviously returns the maximum value\
    \ of its arguments, the purpose of other functions such as `filter()` or `map()`\
    \ is not immediately apparent (unless you have used them in other programming\
    \ languages). In any case, the preceding list provides a starting point for finding\
    \ out more about various Python built-in functions that are not discussed in this\
    \ chapter.\n\nAlthough `dir()` does not list the names of built-in functions and\
    \ variables, you can obtain this information from the standard module `__builtin__`\
    \ that is automatically imported under the name `__builtins__`:\n\n```\n>>> dir(__builtins__)\n\
    ```\n\nThe following command shows you how to get more information about a function:\n\
    \n```\nhelp(str.lower)\n```\n\nThe output from the preceding command is here:\n\
    \n```\nHelp on method_descriptor:\n\nlower(...)\n    S.lower() -> string\n\n \
    \   Return a copy of the string S converted to lowercase.\n\n(END)\n```\n\nCheck\
    \ the online documentation and also experiment with `help()` and `dir()` when\
    \ you need additional information about a particular function or module.\n\n##\
    \ COMPILE TIME AND RUNTIME CODE CHECKING\n\nPython performs some compile-time\
    \ checking, but most checks (including type, name, and so forth) are *deferred*\
    \ until code execution. Consequently, if your Python code references a user-defined\
    \ function that does not exist, the code will compile successfully. In fact, the\
    \ code will fail with an exception *only* when the code execution path references\
    \ the nonexistent function.\n\nAs a simple example, consider the following Python\
    \ function `myFunc` that references the nonexistent function called `DoesNotExist`:\n\
    \n```\ndef myFunc(x):\n    if x == 3:\n        print(DoesNotExist(x))\n    else:\n\
    \        print('x: ', x)\n```\n\nThe preceding code will only fail when the `myFunc`\
    \ function is passed the value 3, after which Python raises an error.\n\nYou should\
    \ now have an understanding of some basic concepts, such as how to use the Python\
    \ interpreter and how to launch your custom Python modules. The next section discusses\
    \ primitive data types in Python.\n\n## SIMPLE DATA TYPES IN PYTHON\n\nPython\
    \ supports primitive data types, such as numbers (integers, floating point numbers,\
    \ and exponential numbers), strings, and dates. Python also supports more complex\
    \ data types, such as lists (or arrays), tuples, and dictionaries. The next several\
    \ sections discuss some of the Python primitive data types, along with code snippets\
    \ that show you how to perform various operations on those data types.\n\n## WORKING\
    \ WITH NUMBERS\n\nPython provides arithmetic operations for manipulating numbers\
    \ in a straightforward manner that is similar to other programming languages.\
    \ The following examples involve arithmetic operations on integers:\n\n```\n>>>\
    \ 2+2\n4\n>>> 4/3\n```"
  mdcn: "## 将代码保存在模块中\n\n之前你已经了解了如何从命令行启动 Python 解释器，然后输入 Python 命令。然而，你在 Python 解释器中输入的所有内容仅在当前会话中有效：如果你退出解释器并再次启动，之前的定义将不再有效。幸运的是，Python\
    \ 允许你将代码存储在文本文件中，这将在下一节中讨论。\n\nPython 中的模块是一个包含 Python 语句的文本文件。在上一节中，你了解了 Python\
    \ 解释器如何让你测试仅在当前会话中有效的代码片段。如果你想保留这些代码片段和其他定义，请将它们放入文本文件中，以便你可以在 Python 解释器之外执行这些代码。\n\
    \n当模块首次被导入时，Python 模块中最外层的语句会从上到下执行，这将设置其变量和函数。\n\nPython 模块可以直接从命令行运行，如下所示：\n\
    \n```\npython first.py\n```\n\n作为示例，将以下两条语句放入名为 `first.py` 的文本文件中：\n\n```\nx =\
    \ 3\nprint(x)\n```\n\n输入以下命令：\n\n```\npython first.py\n```\n\n上述命令的输出是 3，这与从 Python\
    \ 解释器执行上述代码的结果相同。\n\n当 Python 模块直接运行时，特殊变量 `__name__` 会被设置为 `__main__`。你经常会看到\
