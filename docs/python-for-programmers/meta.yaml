- md: "## Working With Other Bases\n\nNumbers in Python are in base 10 (the default),\
    \ but you can easily convert numbers to other bases. For example, the following\
    \ code block initializes the variable x with the value 1234, and then displays\
    \ that number in base 2, 8, and 16, respectively:\n\n```\n>>> x = 1234\n>>> bin(x)\n\
    '0b10011010010'\n>>> oct(x)\n'0o2322'\n>>> hex(x)\n'0x4d2'\n```\n\nUse the format()\
    \ function if you want to suppress the 0b, 0o, or 0x prefixes, as shown here:\n\
    \n```\n>>> format(x, 'b')\n'10011010010'\n>>> format(x, 'o')\n'2322'\n>>> format(x,\
    \ 'x')\n'4d2'\n```\n\nNegative integers are displayed with a negative sign:\n\n\
    ```\n>>> x = -1234\n>>> format(x, 'b')\n'-10011010010'\n>>> format(x, 'x')\n'-4d2'\n\
    ```\n\n## The chr() Function\n\nThe Python chr() function takes a positive integer\
    \ as a parameter and converts it to its corresponding alphabetic value (if one\
    \ exists). The letters A through Z have decimal representation of 65 through 91\
    \ (which corresponds to hexadecimal 41 through 5b), and the lowercase letters\
    \ a through z have decimal representation 97 through 122 (hexadecimal 61 through\
    \ 7a). Here is an example of using the chr() function to print uppercase A:\n\n\
    ```\n>>> x=chr(65)\n>>> x\n'A'\n```\n\nThe following code block prints the ASCII\
    \ values for a range of integers:\n\n```\nresult = \"\"\nfor x in range(65,91):\n\
    \    print(x, chr(x))\n    result = result+chr(x)+' '\nprint(\"result: \",result)\n\
    ```\n\nYou can represent a range of characters with the following line:\n\n```\n\
    for x in range(65,91):\n```\n\nHowever, the following equivalent code snippet\
    \ is more intuitive:\n\n```\nfor x in range(ord('A'), ord('Z')):\n```\n\nIf you\
    \ want to display the result for lowercase letters, change the preceding range\
    \ from (65,91) to either of the following statements:\n\n```\nfor x in range(97,123):\n\
    for x in range(ord('a'), ord('z')):\n```\n\n## The round() Function in Python\n\
    \nThe Python round() function enables you to round decimal values to the nearest\
    \ precision:\n\n```\n>>> round(1.23, 1)\n1.2\n>>> round(-3.42,1)\n-3.4\n```\n\n\
    ## Formatting Numbers in Python\n\nPython allows you to specify the number of\
    \ decimal places of precision to use when printing decimal numbers, as shown here:\n\
    \n```\n>>> x = 1.23456\n>>> format(x, '0.2f')\n'1.23'\n>>> format(x, '0.3f')\n\
    '1.235'\n>>> 'value is {:0.3f}'.format(x)\n'value is 1.235'\n>>> from decimal\
    \ import Decimal\n>>> a = Decimal('4.2')\n>>> b = Decimal('2.1')\n>>> a + b\n\
    Decimal('6.3')\n>>> print(a + b)\n6.3\n>>> (a + b) == Decimal('6.3')\nTrue\n>>>\
    \ x = 1234.56789\n>>> # Two decimal places of accuracy\n>>> format(x, '0.2f')\n\
    '1234.57'\n>>> # Right justified in 10 chars, one-digit accuracy\n>>> format(x,\
    \ '>10.1f')\n' 1234.6'\n>>> # Left justified\n>>> format(x, '<10.1f')\n'1234.6\
    \ '\n>>> # Centered\n>>> format(x, '^10.1f')\n' 1234.6 '\n>>> # Inclusion of thousands\
