    # SERIALIZE AND DESERIALIZE DATA


    Pickling is the process whereby a Python object hierarchy is converted into a
    byte stream. Generally you can pickle (serialize) any object if you can pickle
    every attribute of that object. Keep in mind that you cannot pickle classes, functions,
    and methods.


    With pickle protocol v1, you cannot pickle open file objects, network connections,
    or database connections; however, you can pickle open file objects with pickle
    protocol v2.


    Python enables you to pickle data in lists, dictionaries, and so forth, after
    which you can “depickle” (deserialize) that data.


    > NOTE Pickle files can be hacked, so be careful if you receive a raw pickle file
    over the network, because it could contain malicious code to run arbitrary Python
    when you attempt to depickle it.


    Listing 5.12 displays the contents of Serialize1.py that illustrates how to serialize
    and then deserialize a Python object.


    # Listing 5.12: Serialize1.py


    ```

    import pickle


    # Some Python object

    data = [1,2,3,4,5]

    print ''original data:'', data


    f = open(''testfile'', ''wb'')

    pickle.dump(data, f)


    s = pickle.dumps(data)


    # Restore from a file

    f = open(''testfile'', ''rb'')

    data = pickle.load(f)


    # Restore from a string

    data = pickle.loads(s)


    print ''restored data:'', data

    ```


    Listing 5.12 starts with an import statement, followed by the data variable that
    is initialized as a list containing five numbers. Next, the file testfile'
- md: "is created and the pickled contents of data are stored in that file. The remainder\
    \ of Listing 5.12 reverses the process and prints the depickled contents that\
    \ match the original contents of the `data` variable. The output from Listing\
    \ 5.12 is here:\n\n```\noriginal data: [1, 2, 3, 4, 5]\nrestored data: [1, 2,\
    \ 3, 4, 5]\n```\n\nA minimalistic example of pickling a class is here:\n\n```\n\
    import pickle\n\nclass MyClass:\n    attribute = 'a simple attribute'\n\npicklestring\
    \ = pickle.dumps(MyClass)\n```\n\n## ENCAPSULATION\n\nOne of the main reasons\
    \ for public accessors and mutators is their ability to retrieve and update the\
    \ values of private variables. The ability to “shield” instances of other classes\
    \ from the internal implementation details of a given class is called *encapsulation*.\n\
    \nThe advantage of encapsulation is the ability to change the inner workings of\
    \ a class without changing the signature of the API. As a result, instances of\
    \ other classes, as well as public APIs, can continue working correctly without\
    \ worrying about updating the signature of the API (provided that the method is\
    \ not deprecated and replaced with a new method that has a different signature).\n\
    \n## SINGLE INHERITANCE\n\nThere are two types of single inheritance that you\
    \ will encounter in programming languages. One common type is called “classical”\
    \ *class-based inheritance* that you will encounter in strongly typed languages\
    \ that perform compile-time checking for variables (such as Java and C++). The\
    \ second type is *prototype-based inheritance* that you will encounter in functional\
    \ languages such as JavaScript.\n\nClass mechanisms in Python are slightly closer\
    \ to C++, partly because both support multiple inheritance (discussed in the next\
    \ section). On the other hand, Java supports only single class inheritance (but\
    \ a Java class can implement multiple interfaces). However, all methods in Python\
    \ and Java are virtual.\n\nLanguages such as JavaScript treat functions as “first\
    \ class citizens” in the sense that they have the same “parity” as objects, whereas\
    \ methods have a “subordinate” role in classic languages such as Java and C++\
    \ because methods only exist as part of a class definition.\n\nAnother consideration\
    \ is whether or not functions (and methods) have so-called side effects, such\
    \ as modifying the value of global or static variables. In the XSLT world all\
    \ variables are treated as read-only variables, which eliminates the problems\
    \ associated with side effects, but at the same time, XSLT is a specialized functional\
    \ programming language that is arguably more difficult to master than imperative\
    \ languages such as Java and C++.\n\nAs a simple example, Listing 5.13 displays\
    \ the contents of SingleInherit1.py that illustrates inheritance in Python.\n\n\
    ### Listing 5.13: SingleInherit1.py\n\n```\nclass ClassA:\n    def __init__(self):\n\
    \        print 'Hello from A'\n\n    def func(self):\n        print 'Hello again\
    \ from A'\n\nclass ClassB(ClassA):\n    def __init__(self):\n        print 'Hello\
    \ from B'\n\n    #def func(self):\n    #    print 'Hello again from B'\n\nif __name__\
    \ == '__main__':\n    instanceA = ClassA()\n    instanceB = ClassB()\n\n    print\n\
    \    print 'instanceA:'\n    instanceA.func()\n    print 'instanceB:'\n    instanceB.func()\n\
    ```\n\nListing 5.13 defines `ClassA` with a `print()` statement in the function\
    \ `__init__` as well as a `print()` statement in function `func()`. Next, `ClassB`\
    \ is defined as a subclass or derived class of `ClassA`. Notice that `func()`\
    \ is “commented out” in `ClassB`, and that the `__init__` function also contains\
    \ a print statement.\n\nThe final code block in Listing 5.13 instantiates `instanceA`\
    \ of `ClassA` and `instanceB` of `ClassB`, followed by some `print` statements.\
    \ The output from Listing 5.13 is here:\n\n```\nHello from A\nHello from B\n\n\
    instanceA:\nHello again from A\ninstanceB:\nHello again from A\n```\n\n## A CONCRETE\
    \ EXAMPLE OF INHERITANCE\n\nListing 5.14 displays the contents of `SingleInherit1.py`\
    \ that contains an abstract base class (i.e., it cannot be instantiated) and two\
    \ subclasses `Vegetarian` and `Carnivore`, along with various relevant methods.\n\
    \n### Listing 5.14: SingleInherit1.py\n\n```\nimport numpy as np\n\nclass FoodPrefs:\n\
    \    def __init__(self):\n        print(\"Inside __init__ of FoodPrefs\")\n\n\
    \    def add(self, items):\n        raise NotImplementedError\n\n    def remove(self,\
    \ items):\n        raise NotImplementedError\n\n    def show_list(self):\n   \
    \     raise NotImplementedError\n\n    def blocked_list(self):\n        raise\
    \ NotImplementedError\n\nclass Vegetarian(FoodPrefs):\n    def __init__(self):\n\
    \        super().__init__()\n        self.myprefs = np.array([])\n        print(\"\
    [vegetarian] myprefs = \",self.myprefs)\n        self.blocked_items = np.array([\"\
