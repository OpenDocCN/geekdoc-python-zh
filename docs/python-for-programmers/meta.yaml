- md: "## COMMAND-LINE ARGUMENTS\n\nPython provides a `getopt` module to parse command-line\
    \ options and arguments, and the Python `sys` module provides access to any command-line\
    \ arguments via the `sys.argv`. This serves two purposes:\n\n- `sys.argv` is the\
    \ list of command-line arguments\n- `len(sys.argv)` is the number of command-line\
    \ arguments\n\nHere `sys.argv[0]` is the program name, so if the Python program\
    \ is called `test.py`, it matches the value of `sys.argv[0]`.\nNow you can provide\
    \ input values for a Python program on the command line instead of providing input\
    \ values by prompting users for their input. As an example, consider the script\
    \ `test.py` shown here:\n\n```\n#!/usr/bin/python\nimport sys\nprint('Number of\
    \ arguments:', len(sys.argv), 'arguments')\nprint('Argument List:', str(sys.argv))\n\
    ```\n\nRun above script as follows:\n`python test.py arg1 arg2 arg3`\nThis will\
    \ produce following result:\n\n```\nNumber of arguments: 4 arguments.\nArgument\
    \ List: ['test.py', 'arg1', 'arg2', 'arg3']\n```\n\nThe ability to specify input\
    \ values from the command line provides useful functionality. For example, suppose\
    \ that you have a custom Python class that contains the methods `add` and `subtract`\
    \ to add and subtract a pair of numbers.\nYou can use command-line arguments in\
    \ order to specify which method to execute on a pair of numbers, as shown here:\n\
    \n```\npython MyClass add 3 5\npython MyClass subtract 3 5\n```\n\nThis functionality\
    \ is very useful because you can programmatically execute different methods in\
    \ a Python class, which means that you can write unit tests for your code as well.\n\
    Listing 1.14 displays the contents of `Hello.py` that shows you how to use `sys.argv`\
    \ to check the number of command line parameters.\n\n## Listing 1.14: Hello.py\n\
    \n```\nimport sys\n\ndef main():\n    if len(sys.argv) >= 2:\n        name = sys.argv[1]\n\
    \    else:\n        name = 'World'\n    print('Hello', name)\n\n# Standard boilerplate\
    \ to invoke the main() function\nif __name__ == '__main__':\n    main()\n```\n\
    \nListing 1.14 defines the `main()` function that checks the number of command-line\
    \ parameters: if this value is at least 2, then the variable `name` is assigned\
    \ the value of the second parameter (the first parameter is `Hello.py`), otherwise\
    \ `name` is assigned the value `Hello`. The `print()` statement then prints the\
    \ value of the variable `name`.\nThe final portion of Listing 1.14 uses conditional\
    \ logic to determine whether or not to execute the `main()` function.\n\n## SUMMARY\n\
    \nThis chapter showed you how to execute Python programs, as well as how to work\
    \ with numbers and perform arithmetic operations on numbers in Python. Next, you\
    \ learned how to work with strings and use string operations.\nIn addition, you\
    \ learned about the difference between Unicode and ASCII in `Python 3` and `Python\
    \ 2`, respectively. Then you saw how to slice and splice strings, how to replace\
    \ a string with another string, and also how to remove leading and trailing characters\
    \ in a string.\nFinally, you learned how to work with dates in `Python`, and then\
    \ how to handle exceptions that can arise from user input.\n\n## CHAPTER 2\n\n\
    ## CONDITIONAL LOGIC IN PYTHON\n\nThis chapter is a continuation of the previous\
    \ chapter, which discusses conditional logic, for loops, and while loops. Various\
    \ code samples are included to illustrate each of these topics in Python.\nThe\
    \ first part of this chapter briefly discusses precedence of operators as well\
    \ as reserved words in Python. Next are Python-based code samples of various types\
    \ of loops, including nested loops.\nThe second part of this chapter discusses\
    \ conditional logic, as well as control structures and user-defined functions.\
    \ Virtually every Python program that performs useful calculations requires some\
    \ type of conditional logic or control structure (or both). Although the syntax\
    \ for these features is slightly different from other languages, the functionality\
    \ will be familiar to you.\n\n> NOTE: The scripts in this book are for Python\
    \ 3.x.\n\n## PRECEDENCE OF OPERATORS IN PYTHON\n\nWhen you have an expression\
    \ involving numbers, you might remember that multiplication (*) and division (/)\
    \ have higher precedence than addition (+) or subtraction (-). Exponentiation\
    \ has even higher precedence than these four arithmetic operators.\nHowever, instead\
    \ of relying on precedence rules, it's simpler (as well as safer) to use parentheses.\
    \ For example, (x/y)+10 is clearer than x/y+10, even though they are equivalent\
    \ expressions. As another example, the following two arithmetic expressions are\
    \ the equivalent, but the second is less error prone than the first:\n\n```\n\
    x/y+3*z/8+x*y/z-3*x\n(x/y) + (3*z) /8+ (x*y) / z- (3*x)\n```\n\nThe following\
    \ website contains precedence rules for operators in Python: http://www.mathcs.emory.edu/~valerie/courses/fall10/155/resources/op_precedence.html\n\
    \n## PYTHON RESERVED WORDS\n\nEvery programming language has a set of reserved\
    \ words that cannot be used as identifiers, and Python is no exception. Python’s\
    \ reserved words are: and, exec, not, assert, finally, or, break, for, pass, class,\
    \ from, print, continue, global, raise, def, if, return, del, import, try, elif,\
    \ in, while, else, is, with, except, lambda, and yield.\n\nIf you inadvertently\
    \ use a reserved word as a variable, you will see an “invalid syntax” error message\
    \ instead of a “reserved word” error message. For example, suppose you create\
    \ a script test1.py with the following code:\n\n```\nbreak = 2\nprint('break =',\
    \ break)\n```\n\nIf you run the preceding code, you will see the following output:\n\
    \n```\nFile \"test1.py\", line 2\n    break = 2\n          ^\nSyntaxError: invalid\
    \ syntax\n```\n\nHowever, a quick inspection of the code reveals that you are\
    \ attempting to use the reserved word break as a variable.\n\n## WORKING WITH\
    \ LOOPS IN PYTHON\n\nPython supports for loops, while loops, and range() statements.\
    \ The following subsections illustrate how you can use each of these constructs.\n\
    \n### Python for Loops\n\nPython supports the for loop whose syntax is slightly\
    \ different from other languages (such as JavaScript and Java). The following\
    \ code block shows you how to use a for loop to iterate through the elements in\
    \ a list:\n\n```\n>>> x = ['a', 'b', 'c']\n>>> for w in x:\n...     print(w)\n\
    ...\na\nb\nc\n```\n\nThe preceding code snippet prints three letters on three\
    \ separate lines. You can force the output to be displayed on the same line (which\
    \ will “wrap” if you specify a large enough number of characters) by appending\
    \ a comma (“,”) in the `print()` statement, as shown here:\n\n```\n>>> x = ['a',\
    \ 'b', 'c']\n>>> for w in x:\n...     print(w, end=' ')\n...\na b c\n```\n\nYou\
    \ can use this type of code when you want to display the contents of a text file\
    \ in a single line instead of multiple lines.\n\nPython also provides the built-in\
    \ `reversed()` function that reverses the direction of the loop, as shown here:\n\
    \n```\n>>> a = [1, 2, 3, 4, 5]\n>>> for x in reversed(a):\n...     print(x)\n\
    5\n4\n3\n2\n1\n```\n\nNote that reversed iteration only works if the size of the\
    \ current object can be determined or if the object implements a `__reversed__()`\
    \ special method.\n\n### A For Loop with try/except in Python\n\nListing 2.1 shows\
    \ the content of `StringToNums.py` that illustrates how to calculate the sum of\
    \ a set of integers that have been converted from strings.\n\n## Listing 2.1:\
    \ StringToNums.py\n\n```\nline = '1 2 3 4 10e abc'\nsum  = 0\ninvalidStr = \"\"\
    \n\nprint('String of numbers:',line)\n\nfor str in line.split(\" \"):\n    try:\n\
    \        sum = sum + eval(str)\n    except:\n        invalidStr = invalidStr +\
    \ str + ' '\n\nprint('sum:', sum)\nif(invalidStr != \"\"):\n    print('Invalid\
    \ strings:',invalidStr)\nelse:\n    print('All substrings are valid numbers')\n\
    ```\n\nListing 2.1 initializes the variables `line`, `sum`, and `invalidStr`,\
    \ and then displays the contents of line. The next portion of Listing 2.1 splits\
    \ the contents of `line` into words, and then uses a `try` block in order to add\
    \ the numeric value of each word to the variable sum. If an exception occurs,\
    \ the contents of the current `str` are appended to the variable `invalidStr`.\n\
    \nWhen the loop has finished execution, Listing 2.1 displays the sum of the numeric\
    \ words, followed by the list of words that are not numbers. The output from Listing\
    \ 2.1 is here:\n\n```\nString of numbers: 1 2 3 4 10e abc\nsum: 10\nInvalid strings:\
    \ 10e abc\n```\n\n### Numeric Exponents in Python\n\nListing 2.2 shows the content\
    \ of `Nth_exponent.py` that illustrates how to calculate intermediate powers of\
    \ a set of integers."
  mdcn: "## 命令行参数\n\nPython 提供了 `getopt` 模块来解析命令行选项和参数，而 Python 的 `sys` 模块则通过 `sys.argv`\
    \ 提供了对任何命令行参数的访问。这有两个用途：\n\n- `sys.argv` 是命令行参数的列表\n- `len(sys.argv)` 是命令行参数的数量\n\
    \n这里 `sys.argv[0]` 是程序名称，因此如果 Python 程序名为 `test.py`，它就与 `sys.argv[0]` 的值匹配。\n\
    现在，你可以在命令行上为 Python 程序提供输入值，而不是通过提示用户输入来提供输入值。例如，考虑下面显示的脚本 `test.py`：\n\n```\n\
    #!/usr/bin/python\nimport sys\nprint('Number of arguments:', len(sys.argv), 'arguments')\n\
    print('Argument List:', str(sys.argv))\n```\n\n按如下方式运行上述脚本：\n`python test.py arg1\
    \ arg2 arg3`\n这将产生以下结果：\n\n```\nNumber of arguments: 4 arguments.\nArgument List:\
