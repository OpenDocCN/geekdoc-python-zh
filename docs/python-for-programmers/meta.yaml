    \ [ 80 100 200]\nMERGED items1: [20 30 50 80 100 200 300]\n```\n\n## Quick Sort\n\
    \nQuick sort is a divide-and-conquer sorting algorithm that selects a so-called\
    \ “pivot” element that splits an array into two parts (i.e., the elements on the\
    \ left side and the elements on the right side of the pivot element). The pivot\
    \ element can be selected in various ways, such as:\n\n- the first element\n-\
    \ the last element\n- a random element\n\nThe key idea regarding the quick sort\
    \ algorithm is to select a pivot element x and then perform the following in linear\
    \ time:\n\n- Determine the correct location for x in the array.\n- Place smaller\
    \ elements on the left side of x.\n- Place larger elements on the right side of\
    \ x.\n\nListing 4.31 displays the contents of the Python file `quick_sort.py`\
    \ that illustrates how to perform a quick sort on an array of numbers.\n\n## Listing\
    \ 4.31: quick_sort.py\n\n```python\ndef partition(left_idx, right_idx, array):\n\
    \    # initialize pivot's index to left_idx\n    pivot_idx = left_idx\n    pivot_val\
    \ = array[pivot_idx]\n\n    # when left_idx pointer crosses right_idx pointer\n\
    \    # then swap the pivot with right_idx pointer\n    while left_idx < right_idx:\n\
    \        # increment left_idx pointer till it exceeds pivot\n        while left_idx\
    \ < len(array) and array[left_idx] <= pivot_val:\n            left_idx += 1\n\n\
    \        # decrement right_idx pointer till it's less than pivot\n        while\
    \ array[right_idx] > pivot_val:\n            right_idx -= 1\n\n        # if left_idx\
    \ and right_idx have not crossed\n        # swap the numbers on left_idx and right_idx\n\
    \        if(left_idx < right_idx):\n            array[left_idx], array[right_idx]\
