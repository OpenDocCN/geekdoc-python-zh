    # FACTORIAL VALUES


    This section contains three code samples for calculating factorial values: One
    code samples uses a loop and the other two code samples use recursion.


    As a reminder, the *factorial* value of a positive integer n is the product of
    all the numbers from 1 to n (inclusive). Hence, we have the following values:


    ```

    Factorial(2) = 2*1 = 2

    Factorial(3) = 3*2*1 = 6

    Factorial(4) = 4*3*2*1 = 24

    Factorial(5) = 5*4*3*2*1 = 120

    Factorial(6) = 6*5*4*3*2*1 = 720

    Factorial(7) = 7*6*5*4*3*2*1 = 5040

    ```


    If you look at the preceding list of calculations, you can see some interesting
    relationships among factorial numbers:


    ```

    Factorial(3) = 3 * Factorial(2)

    Factorial(4) = 4 * Factorial(3)

    Factorial(5) = 5 * Factorial(4)

    Factorial(6) = 6 * Factorial(5)

    Factorial(7) = 7 * Factorial(6)

    ```


    Based on the preceding observations, it''s reasonably intuitive to infer the following
    relationship for factorial numbers:


    ```

    Factorial(1) = 1

    Factorial(n) = n * Factorial(n-1) for n > 1

    ```'
