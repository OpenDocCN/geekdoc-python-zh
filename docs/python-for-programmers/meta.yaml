    There are several points to keep in mind when you work with polymorphism in your
    custom Python code. First, other languages might require Rect and Square to be
    derived classes of a common class. In this example, squares and rectangles are
    also parallelograms, so you could define the parent class PGram that contains
    properties of a parallelogram.


    Second, there is the notion of “coding to an interface,” which essentially means
    that you specify a base class as the argument of a method so that you can pass
    in any derived class of the base class. In the Java world, you specify an interface
    as an argument to a method, and that way you can pass in any concrete class that
    implements the specified interface.


    A third point is that polymorphic behavior in idiomatic Python relies on “duck-typing”
    that is described succinctly here:


    https://en.wikipedia.org/wiki/Duck_typing


    # THE PYTHON ABC MODULE


    Although Python does not provide interfaces (such as Java) or contracts, the Python
    abc (abstract base class) module provides abstract base classes a mechanism for
    specifying what methods must be implemented by implementation subclasses.


    For example, you would expect that the semantics of a print() method involve printing
    some data, and not deleting data. The use of ABCs provides a sort of “understanding”
    about methods and their expected behavior. Thus, ABCs provide an intermediate
    solution between the free-form of Python and the stricter enforcement of statically
    typed languages.'
