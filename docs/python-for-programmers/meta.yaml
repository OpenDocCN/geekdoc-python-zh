    \ = {}\ndict1 = {'x' : 1, 'y' : 2}\n```\n\n前面的代码片段将 `dict1` 定义为空字典，然后添加了两个键/值绑定。\n\
    \n## 显示字典的内容\n\n你可以使用以下代码显示 `dict1` 的内容：\n\n```\n>>> dict1 = {'x':1,'y':2}\n>>>\
