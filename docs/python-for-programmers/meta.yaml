    \ existing code.\n\n> Accessors and mutators are common in languages such as Java,\
    \ whereas direct access is preferred in Python.\n\n## CREATING AN EMPLOYEE CUSTOM\
    \ CLASS\n\nThis section contains an example of defining a custom Python class\
