  md: 'package (in fact, it can even be empty), and such a file appears in each subdirectory
    that must be treated as a package by Python.


    As you have seen in previous chapters, a module uses the `import` statement to
    import a module, and this can be accomplished in various ways. You can import
    a single module from a package, as shown here:


    ```

    import myutils.xmlparse

    ```


    The preceding code imports the `xml` submodule `myutils.xml`, and it must be fully-qualified
    in your code:


