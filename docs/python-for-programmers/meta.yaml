  md: "Multiplication of matrices works differently from addition or subtraction:\
    \ if A is an mxn matrix that you want to multiply (on the right of A) by B, then\
    \ B must be an nxp matrix. The rule for matrix multiplication is as follows: the\
    \ number of columns of A must equal the number of rows of B.\n\nIn addition, the\
    \ *transpose* of matrix A is another matrix At such that the rows and columns\
    \ are interchanged. Thus, if A is an mxn matrix then At is an nxm matrix. The\
    \ matrix A is *symmetric* if A = At. The matrix A is the *identity matrix* I if\
    \ the values in the main diagonal (upper left to lower right) are 1 and the other\
