    \ '__rmod__', '__rmul__', '__setattr__',\n'__sizeof__', '__str__', '__subclasshook__',\n\
    '_formatter_field_name_split', '_formatter_parser',\n'capitalize', 'center', 'count',\
    \ 'decode', 'encode',\n'endswith', 'expandtabs', 'find', 'format', 'index',\n\
    'isalnum', 'isalpha', 'isdigit', 'islower', 'isspace',\n'istitle', 'isupper',\
    \ 'join', 'ljust', 'lower',\n'lstrip', 'partition', 'replace', 'rfind', 'rindex',\n\
    'rjust', 'rpartition', 'rsplit', 'rstrip', 'split',\n'splitlines', 'startswith',\
    \ 'strip', 'swapcase',\n'title', 'translate', 'upper', 'zfill']\n```\n\n上述列表为你提供了一个内置函数的汇总“转储”（包括本章稍后讨论的一些函数）。虽然\
    \ `max()` 函数显然返回其参数的最大值，但其他函数（如 `filter()` 或 `map()`）的目的并不立即明显（除非你在其他编程语言中使用过它们）。无论如何，上述列表为你提供了一个起点，可以进一步了解本章未讨论的各种\
    \ Python 内置函数。\n\n虽然 `dir()` 不列出内置函数和变量的名称，但你可以从标准模块 `__builtin__` 中获取此信息，该模块会自动以\
    \ `__builtins__` 的名称导入：\n\n```\n>>> dir(__builtins__)\n```\n\n以下命令展示了如何获取有关某个函数的更多信息：\n\
    \n```\nhelp(str.lower)\n```\n\n上述命令的输出如下：\n\n```\nHelp on method_descriptor:\n\
    \nlower(...)\n    S.lower() -> string\n\n    Return a copy of the string S converted\
    \ to lowercase.\n\n(END)\n```\n\n当你需要有关特定函数或模块的更多信息时，请查阅在线文档，并尝试使用 `help()` 和\
    \ `dir()`。\n\n## 编译时和运行时代码检查\n\nPython 执行一些编译时检查，但大多数检查（包括类型、名称等）是*延迟*到代码执行时进行的。因此，如果你的\
    \ Python 代码引用了一个不存在的用户定义函数，代码将成功编译。事实上，*只有*当代码执行路径引用了不存在的函数时，代码才会因异常而失败。\n\n作为一个简单的例子，考虑以下\
    \ Python 函数 `myFunc`，它引用了一个名为 `DoesNotExist` 的不存在函数：\n\n```\ndef myFunc(x):\n\
    \    if x == 3:\n        print(DoesNotExist(x))\n    else:\n        print('x:\
    \ ', x)\n```\n\n上述代码只有在 `myFunc` 函数被传递值 3 时才会失败，之后 Python 会引发错误。\n\n你现在应该对一些基本概念有了理解，例如如何使用\
    \ Python 解释器以及如何启动自定义 Python 模块。下一节将讨论 Python 中的原始数据类型。\n\n## Python 中的简单数据类型\n\
    \nPython 支持原始数据类型，例如数字（整数、浮点数和指数）、字符串和日期。Python 还支持更复杂的数据类型，例如列表（或数组）、元组和字典。接下来的几节将讨论一些\
    \ Python 原始数据类型，以及展示如何对这些数据类型执行各种操作的代码片段。\n\n## 处理数字\n\nPython 提供了算术运算来以类似于其他编程语言的直接方式操作数字。以下示例涉及整数的算术运算：\n\
    \n```\n>>> 2+2\n4\n>>> 4/3\n```"
