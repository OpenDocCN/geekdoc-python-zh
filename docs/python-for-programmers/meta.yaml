  md: '# CHAPTER 1


    # INTRODUCTION TO PYTHON


    This chapter contains an introduction to Python, with information about useful
    tools for installing Python modules, basic Python constructs, and how to work
    with some data types in Python.

    The first part of this chapter covers how to install Python, some Python environment
    variables, and how to use the Python interpreter. You will see Python code samples
    and also how to save Python code in text files that you can launch from the command
    line. The second part of this chapter shows you how to work with simple data types,
    such as numbers, fractions, and strings. The final part of this chapter discusses
    exceptions and how to use them in Python scripts.


    > NOTE: The Python scripts in this book are for Python 3.


    # TOOLS FOR PYTHON


    The Anaconda Python distribution available for Windows, Linux, and Mac is downloadable
    here:

    http://continuum.io/downloads

    Anaconda is well-suited for libraries such as NumPy (discussed in Chapter 3) and
    SciPy (not discussed in this book). Also, if you are a Windows user, Anaconda
    appears to be a better alternative.


    # easy_install and pip


    Both easy_install and pip are very easy to use when you need to install Python
    modules. Whenever you need to install a Python module (and there'
  merge: -1
  pgno: 17
- img_proc: true
  md: 'are many in this book), use either `easy_install` or `pip` with the following
    syntax:


    ```

    easy_install <module-name>

    pip install <module-name>

    ```


    > NOTE: Python-based modules are easier to install, whereas modules with code
    written in C are usually faster but more difficult in terms of installation.


    # virtualenv


    The `virtualenv` tool enables you to create isolated Python environments, and
    its home page is here:


    http://www.virtualenv.org/en/latest/virtualenv.html


    `virtualenv` addresses the problem of preserving the correct dependencies and
    versions (and indirectly permissions) for different applications. If you are a
    Python novice you might not need `virtualenv` right now, but keep this tool in
    mind.


    # IPython


    Another very good tool is IPython (which won a Jolt award), and its home page
    is here:


    http://ipython.org/install.html


