    # TIME AND SPACE COMPLEXITY


    Algorithms are assessed in terms of the amount of space (based on input size)
    and the amount of time required for the algorithms to complete their execution,
    which is represented by “big O” notation. There are three types of time complexity:
    best case, average case, and worst case. Keep in mind that an algorithm with very
    good best case performance can have a relatively poor worst case performance.


    Recall that O(n) means that an algorithm executes in linear time because its complexity
    is bounded above and below by a linear function. For example, if three algorithms
    require 2*n, 5*n, or n/2 operations, respectively, then all of them have O(n)
    complexity.


    Moreover, if the best, average, and worst time performance for a linear search
    is 1, n/2, and n operations, respectively, which in turn equals O(1), O(n), and
    O(n), respectively.


    The time-space trade-off refers to reducing either the amount of time or the amount
    of memory that is required for executing an algorithm, which involves choosing
    one of the following:


    +   - execute in less time and more memory

    - execute in more time and less memory


    Although reducing both time and memory is desirable, it’s also a more challenging
    task. For example, the calculation of Fibonacci numbers is much more efficient
    via an iterative algorithm than a recursive solution, but the former also requires
    an array to store intermediate values. The iterative solution has a higher memory
    requirement than a recursive solution.'
