  md: 'Note that if you sort a list of character strings, the output is case sensitive,
    and that uppercase letters appear before lowercase letters. This is due to the
    fact that the collating sequence for ASCII places uppercase letters (decimal 65
    through decimal 91) before lowercase letters (decimal 97 through decimal 127).
    The following example provides an illustration:


    ```

    >>> list1 = [''a'', ''A'', ''b'', ''B'', ''Z'']

    >>> print sorted(list1)

    [''A'', ''B'', ''Z'', ''a'', ''b'']

    ```


    You can also specify the reverse option so that the list is sorted in reverse
    order:


    ```

    >>> list1 = [''a'', ''A'', ''b'', ''B'', ''Z'']

    >>> print sorted(list1, reverse=True)

    [''b'', ''a'', ''Z'', ''B'', ''A'']

    ```


    You can even sort a list based on the length of the items in the list:


    ```

    >>> list1 = [''a'', ''AA'', ''bbb'', ''BBBBB'', ''ZZZZZZZ'']

    >>> print sorted(list1, key=len)

    [''a'', ''AA'', ''bbb'', ''BBBBB'', ''ZZZZZZZ'']

