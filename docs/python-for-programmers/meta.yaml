    \ with how to calculate factorial values and Fibonacci numbers. In some cases,\
    \ there are closed form solutions and also iterative solutions for these tasks.\n\
    \nIf you are new to recursion, some of this material might be slightly daunting,\
    \ but don't be alarmed. Usually, several iterations of reading the material and\
    \ code samples will lead to a better understanding of recursion.\n\nThe second\
    \ part of this chapter discusses concepts in combinatorics, such as permutations\
    \ and combinations. Since a detailed coverage of combinatorics can fill an entire\
    \ undergraduate course in mathematics, this section focuses on some rudimentary\
    \ concepts in combinatorics.\n\nIf you prefer, you can read the material regarding\
    \ combinatorics before the material for recursion. Perhaps you don't need recursion\
    \ in your current tasks, so the first half of this chapter has limited relevance.\
    \ However, keep in mind that recursion is unavoidable if you ever need to work\
    \ with algorithms for trees and graphs. In fact, almost every algorithm that creates,\
    \ updates, deletes elements (called nodes) in a tree structure or a graph involves\
    \ recursion.\n\n## WHAT IS RECURSION?\n\nRecursion-based algorithms can provide\
    \ very elegant solutions to tasks that would be difficult to implement via iterative\
    \ algorithms. For some tasks, such as calculating factorial values, the recursive\
    \ solution and the iterative solution have comparable code complexity.\n\nAs a\
    \ simple example, suppose that we want to add the integers from 1 to n (inclusive),\
    \ and let n = 10 so that we have a concrete example. If we denote S as the partial\
    \ sum of successively adding consecutive integers, then we have the following:\n\
    \n```\nS = 1\nS = 1 + 2\nS = 1 + 2 + 3\n. . .\nS = 1 + 2 + 3 + . . . + 10\n```\n\
    \nLet's generalize the preceding sequence and denote S(n) as the sum of the first\
    \ n positive integers, which leads to the following relationship:\n\n```\nS(1)\
    \ = 1\nS(n) = S(n-1) + n for n > 1\n```\n\nWith the preceding observations in\
    \ mind, the next section contains code samples for calculating the sum of the\
    \ first n positive integers using an iterative approach and then with recursion.\n\
    \n## ARITHMETIC SERIES\n\nThis section shows you how to calculate the sum of a\
    \ set of positive integers, such as the numbers from 1 to n inclusive. The first\
    \ algorithm uses an iterative approach and the second algorithm uses recursion.\n\
    \nBefore delving into the code samples, there is a simple way to calculate the\
    \ closed form sum of the integers from 1 to n inclusive, which we will denote\
    \ as S. Then there are two ways to calculate S, as shown here:\n\n```\nS = 1 +\
    \ 2 + 3 + . . . + (n-1) + n\nS = n + (n-1) + (n-2) + . . . + 2 + 1\n```\n\nThere\
    \ are n columns, and each column has the sum equal to (n+1), and therefore the\
    \ sum of the right-side of the equals sign is n*(n+1). Since the left-side of\
    \ the equals sign has the sum 2*S, we have the following result:\n\n```\n2*S =\
    \ n*(n+1)\n```\n\nDivide both sides by 2 and we get the well-known formula for\
    \ the arithmetic sum of the first n positive integers:\n\n```\nS = n*(n+1)/2\n\
    ```\n\nIncidentally, the preceding formula was derived by a young student who\
    \ was bored with performing the calculation manually: that student was Karl F.\
    \ Gauss (in third grade).\n\n### Calculating Arithmetic Series (Iterative)\n\n\
    Listing 6.1 displays the contents of the `arith_sum.py` that illustrates how to\
    \ calculate the sum of the numbers from 1 to n inclusive using an iterative approach.\n\
    \n**Listing 6.1: arith_sum.py**\n\n```python\ndef arith_sum(n):\n    sum = 0\n\
    \    for i in range(1,n+1):\n        sum += i\n    return sum\n\nmax = 20\nfor\
    \ j in range(2,max+1):\n    sum = arith_sum(j)\n    print(\"sum from 1 to\",j,\"\
    =\",sum)\n```\n\nListing 6.1 starts with the function `arith_sum()` that contains\
    \ a loop that literally adds the numbers from 1 to n. The next portion of Listing\
    \ 6.1 also contains a loop that iterates through the numbers from 2 to 20 inclusive,\
    \ and then invokes `arith_sum()` with each value of the loop variable to calculate\
    \ the sum of the integers from 1 to that value. Launch the code in Listing 6.1\
    \ and you will see the following output:\n\n```\nsum from 1 to 2 = 3\nsum from\
    \ 1 to 3 = 6\nsum from 1 to 4 = 10\nsum from 1 to 5 = 15\nsum from 1 to 6 = 21\n\
    sum from 1 to 7 = 28\nsum from 1 to 8 = 36\nsum from 1 to 9 = 45\nsum from 1 to\
    \ 10 = 55\nsum from 1 to 11 = 66\nsum from 1 to 12 = 78\nsum from 1 to 13 = 91\n\
    sum from 1 to 14 = 105\nsum from 1 to 15 = 120\nsum from 1 to 16 = 136\nsum from\
    \ 1 to 17 = 153\nsum from 1 to 18 = 171\nsum from 1 to 19 = 190\nsum from 1 to\
    \ 20 = 210\n```\n\nModify the code in Listing 6.1 to calculate the sum of the\
    \ squares, cubes, and fourth powers of the numbers from 1 to n, along with your\
    \ own variations of the code.\n\n### Calculating Arithmetic Series (Recursive)\n\
    \nListing 6.2 displays the contents of the `arith_sum_recursive.py` that illustrates\
    \ how to calculate the sum of the numbers from 1 to n inclusive using a recursion.\n\
    \n**Listing 6.2: arith_sum_recursive.py**\n\n```python\ndef arith_sum(n):\n  \
    \  if(n == 0):\n        return n\n    else:\n        return n + arith_sum(n-1)\n\
    \nmax = 20\nfor j in range(2,max+1):\n    sum = arith_sum(j)\n    print(\"sum\
    \ from 1 to\",j,\"=\",sum)\n```\n\nListing 6.2 starts with the recursive function\
    \ `arith_sum()` that uses conditional logic to return n if n equals the value\
    \ 0 (which is the terminating case); otherwise the code returns the value of n\
    \ *plus* the value of `arith_sum(n-1)`.\n\nLaunch the code in Listing 6.2 and\
    \ you will see the same output as the previous section.\n\n### Calculating Partial\
    \ Arithmetic Series\n\nListing 6.3 displays the contents of the `arith_partial_sum.py`\
    \ that illustrates how to calculate the sum of the numbers from m to n inclusive,\
    \ where m and n are two positive integers such that m <= n, using an iterative\
    \ approach.\n\n**Listing 6.3: arith_partial_sum.py**\n\n```python\ndef arith_partial_sum(m,n):\n\
    \    if (m >= n):\n        return 0\n    else:\n        return n*(n+1)/2 - m*(m+1)/2\n\
    \nmax = 20\nfor j in range(2,max+1):\n    sum = arith_partial_sum(j)\n    print(\"\
    sum from 1 to\",j,\"=\",sum)\n```\n\nListing 6.3 is straightforward: The function\
    \ `arith_partial_sum()` returns the sum of squares from 1 to n *minus* the sum\
    \ of squares from 1 to m. This function is invoked in a loop in the second part\
    \ of Listing 6.3, which calculates the difference of the sum of squares from 2\
    \ to 20. Launch the code in Listing 6.3 and you will see the following output:\n\
    \n```\narithmetic sum from 2 to 2 = 2\narithmetic sum from 2 to 3 = 3\narithmetic\
    \ sum from 2 to 4 = 7\narithmetic sum from 2 to 5 = 12\narithmetic sum from 2\
    \ to 6 = 18\narithmetic sum from 3 to 3 = 3\narithmetic sum from 3 to 4 = 4\n\
    arithmetic sum from 3 to 5 = 9\narithmetic sum from 3 to 6 = 15\narithmetic sum\
    \ from 4 to 4 = 4\narithmetic sum from 4 to 5 = 5\narithmetic sum from 4 to 6\
    \ = 11\narithmetic sum from 5 to 5 = 5\narithmetic sum from 5 to 6 = 6\n```\n\n\
    Now that you have seen some examples involving arithmetic expressions, let's turn\
    \ to geometric series, which is the topic of the next section.\n\n## GEOMETRIC\
    \ SERIES\n\nThis section shows you how to calculate the geometric series of a\
    \ set of positive integers, such as the numbers from 1 to n inclusive. The first\
    \ algorithm uses an iterative approach and the second algorithm uses recursion.\n\
    \nBefore delving into the code samples, there is a simple way to calculate the\
    \ closed form sum of the geometric series of integers from 1 to n inclusive, where\
    \ r is the ratio of consecutive terms in the geometric series. Let S denote the\
    \ sum, which we can express as follows:\n\n```\nS   = 1+ r + r^2 + r^3 + . . .\
    \ + r^(n-1) + r^n\nr*S =     r + r^2 + r^3 + . . . + r^(n-1) + r^n + r^(n+1)\n\
    ```\n\nSubtract each term in the second row above from the corresponding term\
    \ in the first row, and we have the following result:\n\n```\nS - r*S = 1 - r^(n+1)\n\
    ```\n\nFactor S from both terms on the left side of the preceding equation and\
    \ we get the following result:\n\n```\nS*(1 - r) = 1 - r^(n+1)\n```\n\nDivide\
    \ both sides of the preceding equation by the term (1-r) to get the formula for\
    \ the sum of the geometric series of the first n positive integers:\n\n```\nS\
    \ = [1 - r^(n+1)] / (1-r)\n```\n\nIf r = 1 then the preceding equation returns\
    \ an infinite value, which makes sense because S is the sum of an infinite number\
    \ of occurrences of the number 1.\n\n### Calculating a Geometric Series (Iterative)\n\
    \nListing 6.4 displays the contents of the `geom_sum.py` that illustrates how\
    \ to calculate the sum of the numbers from 1 to n inclusive using an iterative\
    \ approach."
