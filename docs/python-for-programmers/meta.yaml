    \n## INHERITANCE AND OVERRIDING METHODS\n\nIf class A is a subclass (also called\
    \ a “derived” class) of class B, then everything in B is accessible in A. In addition,\
    \ class A can define methods that:\n\n- 1. are unavailable in B\n- 2. override\
    \ methods in B\n\nIf class B and class A both contain a method called `func()`,\
    \ then `func()` in class B can override the `func()` in class A. As strange as\
    \ it might seem, a method of class A can call another method in class A that in\
    \ turn can invoke a method of class B that overrides it. Python has two built-in\
    \ functions that work with inheritance:\n\n- the `isinstance()` method checks\
    \ the type of an instance\n- the `issubclass()` method checks class inheritance\n\
    \nFor example, `isinstance(myObj, int)` evaluates to `True` only if `myObj.__class__`\
    \ is `int` or a subclass of `int`, whereas `issubclass(bool, int)` evaluates to\
    \ `True` because `bool` is a subclass of `int`. On the other hand, `issubclass(unicode,\
    \ str)` evaluates to `False` because `unicode` is not a subclass of `str`.\n\n\
    ## MULTIPLE INHERITANCE\n\nThe previous section showed you how to work with single\
    \ inheritance and this section briefly discusses multiple inheritance in Python.\
    \ *Multiple inheritance* means that a class can have more than one parent class.\n\
    \nIf you do decide to use multiple inheritance, keep the following point in mind.\
    \ Suppose that `ClassC` is a subclass of `ClassA` and `ClassB` as follows:\n\n\
    ```\nclass ClassC(ClassA, ClassB):\n```\n\nIn addition, suppose that Class A and\
    \ Class B *both* contain a function called `func()` that is not defined in `ClassC`.\
    \ Now consider the following code snippet, where `classC` is an instance of `ClassC`.\n\
    \n```\nclassC.func()\n```\n\nSince `ClassC` does not contain the definition of\
    \ the function `func()`, Python searches for `func()` in the parent classes. Since\
    \ the search is performed in a left-to-right fashion, the preceding code snippet\
    \ execute the method `func()` that is defined in `ClassA` and not the method `func()`\
    \ in `ClassB`.\n\nAs another example, suppose that `ClassC` is a subclass (from\
    \ left to right) of `ClassA1`, `ClassA2`, and `ClassA3` (in this order), and that\
    \ the method `func()` is defined only in `ClassA2` and `ClassA3` but not in `ClassA1`\
    \ or in `ClassC`. Again consider the following snippet, where `classC` is an instance\
    \ of `ClassC`:\n\n```\nclassC.func()\n```\n\nBecause of the left-to-right search\
    \ rule, the preceding code snippet invokes the method `func()` in `ClassA2` and\
    \ not the function `func()` in `ClassA3`. Make sure that you remember this fact\
    \ when you define classes that contain more than one parent class.\n\nAs a concrete\
    \ example, Listing 5.15 displays the contents of the Python file `MultipleInherit1.py`\
    \ that illustrates multiple inheritance in Python.\n\n### Listing 5.15: MultipleInherit1.py\n\
    \n```\nclass ClassA:\n    def __init__(self):\n        print 'Hello from A'\n\n\
    \    def func(self):\n        print 'Hello again from A'\n\nclass ClassB:\n  \
    \  def __init__(self):\n        print 'Hello from B'\n\n    def func(self):\n\
    \        print 'Hello again from B'\n\nclass ClassC(ClassA, ClassB):\n    def\
    \ __init__(self):\n        print 'Hello from C'\n\nif __name__ == '__main__':\n\
    \    instanceA = ClassA()\n    instanceB = ClassB()\n    instanceC = ClassC()\n\
    \n    print\n    print 'instanceA:'\n    instanceA.func()\n    print 'instanceB:'\n\
    \    instanceB.func()\n    print 'instanceC:'\n    instanceC.func()\n```\n\nListing\
    \ 5.15 contains code that is very similar to the code in the previous section,\
    \ except that in this case ClassC is a derived class of the custom classes ClassA\
    \ and ClassB. In addition, both ClassA and ClassB contain a function func() that\
    \ is not defined in ClassC. The output from Listing 5.15 is here:\n\n```\nHello\
    \ from A\nHello from B\nHello from C\n\ninstanceA:\nHello again from A\ninstanceB:\n\
    Hello again from B\ninstanceC:\nHello again from A\n```\n\nNow reverse the order\
    \ of the parent classes in the definition of ClassC:\n\n```\nclass ClassC(ClassB,\
    \ ClassA):\n```\n\nThe only difference in the output is the final print statement,\
    \ as shown here:\n```\ninstanceC:\nHello again from B\n```\n\nAlthough there is\
    \ no reason for the following class definition, Python allows you to specify multiple\
    \ occurrences of the same parent class:\n```\nclass ClassC(ClassA, ClassB, ClassA,\
    \ ClassB):\n```\n\n## POLYMORPHISM\n\nIn very simplified terms, Python polymorphism\
    \ allows you to define methods that “accept” instances of different classes (as\
    \ parameters) and yet perform the intended calculations correctly.\nAs another\
    \ concrete example, Listing 5.16 displays the contents of Polymorphism1.py that\
    \ defines two custom Python classes and a method that can be invoked with instances\
    \ of both custom Python classes.\n\n### Listing 5.16: Polymorphism1.py\n\n```\n\
    class Rect:\n    def perimeter(self):\n        print 'Perimeter of a rectangle'\n\
    \nclass Square:\n    def perimeter(self):\n        print 'Perimeter of a square'\n\
    \ndef calcPerimeter(obj):\n    obj.perimeter()\n\nif __name__ == '__main__':\n\
    \    instanceR = Rect()\n    instanceS = Square()\n\n    print 'instanceR:'\n\
    \    calcPerimeter(instanceR)\n    print 'instanceS:'\n    calcPerimeter(instanceS)\n\
    ```\n\nListing 5.16 starts with the definition of the custom Python classes Rect\
    \ and Square, each of which defines a perimeter() method. Next the function calcPerimeter()\
    \ is defined, which takes one argument that can be an instance of the Rect class\
    \ or the Square class.\n\nThe final portion of Listing 5.16 defines instanceR\
    \ and instanceS that are instances of the custom classes Rect and Square, respectively.\
    \ The calcPerimeter() method is invoke with each of these instances, and the correct\
    \ method is invoked in both cases. The output from Listing 5.16 is here:\n\n```\n\
    instanceR:\nPerimeter of a rectangle\ninstanceS:\nPerimeter of a square\n```\n\
    \nThere are several points to keep in mind when you work with polymorphism in\
    \ your custom Python code. First, other languages might require Rect and Square\
    \ to be derived classes of a common class. In this example, squares and rectangles\
    \ are also parallelograms, so you could define the parent class PGram that contains\
    \ properties of a parallelogram.\n\nSecond, there is the notion of “coding to\
    \ an interface,” which essentially means that you specify a base class as the\
    \ argument of a method so that you can pass in any derived class of the base class.\
    \ In the Java world, you specify an interface as an argument to a method, and\
    \ that way you can pass in any concrete class that implements the specified interface.\n\
    \nA third point is that polymorphic behavior in idiomatic Python relies on “duck-typing”\
    \ that is described succinctly here:\n\nhttps://en.wikipedia.org/wiki/Duck_typing\n\
    \n## THE PYTHON ABC MODULE\n\nAlthough Python does not provide interfaces (such\
    \ as Java) or contracts, the Python abc (abstract base class) module provides\
    \ abstract base classes a mechanism for specifying what methods must be implemented\
    \ by implementation subclasses.\n\nFor example, you would expect that the semantics\
    \ of a print() method involve printing some data, and not deleting data. The use\
    \ of ABCs provides a sort of “understanding” about methods and their expected\
    \ behavior. Thus, ABCs provide an intermediate solution between the free-form\
    \ of Python and the stricter enforcement of statically typed languages.\n\nAlthough\
    \ this is an advanced topic (and actually beyond the intended scope of this book),\
    \ more information about the Python abc module is here:\nhttp://docs.python.org/2/library/abc.html\n\
    \n## SUMMARY\n\nThis chapter introduced you to some useful Python functions that\
    \ can simplify your custom Python code. Next you learned how to create your own\
    \ custom Python classes in Python, and also how to work with linked lists in Python.\
    \ You also got an introduction to encapsulation, single inheritance, multiple\
    \ inheritance, and polymorphism in Python."
