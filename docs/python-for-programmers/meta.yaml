    \ 方法被调用以创建类的实例，这发生在你调用以下类型的语句时：\n\n```\nmyObj = MyClass()\n```\n\n接下来，创建时的任何参数都会传递给“初始化器”方法\
    \ `__init`，该方法指定对象在初始化期间的行为。你可以将 `__new__` 方法和 `__init__` 方法视为对象的“构造函数”。\n\n例如，考虑以下代码片段：\n\
    \n```\nmyObj = MyClass('pizza', 25);\n```\n\n在前面的代码片段中，值 `pizza` 和 `25` 作为参数传递给\
