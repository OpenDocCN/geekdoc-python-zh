    are many in this book), use either `easy_install` or `pip` with the following
    syntax:


    ```

    easy_install <module-name>

    pip install <module-name>

    ```


    > NOTE: Python-based modules are easier to install, whereas modules with code
    written in C are usually faster but more difficult in terms of installation.


    # virtualenv


    The `virtualenv` tool enables you to create isolated Python environments, and
    its home page is here:


    http://www.virtualenv.org/en/latest/virtualenv.html


    `virtualenv` addresses the problem of preserving the correct dependencies and
    versions (and indirectly permissions) for different applications. If you are a
    Python novice you might not need `virtualenv` right now, but keep this tool in
    mind.


    # IPython


    Another very good tool is IPython (which won a Jolt award), and its home page
    is here:


    http://ipython.org/install.html


    Type `ipython` to invoke IPython from the command line:


    ```

    ipython

    ```


    The preceding command displays the following output:


    ```

    Python 3.9.13 (main, May 24 2022, 21:28:12)

    Type ''copyright'', ''credits'' or ''license'' for more information

    IPython 7.22.0 -- An enhanced Interactive Python. Type ''?'' for help.


    In [1]:

    ```


    Type a question mark ("?") at the prompt and you will see some useful information,
    a portion of which is here:'
  - '[PAGE 19]


    # IPython -- An enhanced Interactive Python

    ========================================


    IPython offers a fully compatible replacement for the standard Python interpreter,
    with convenient shell features, special commands, command history mechanism and
    output results caching.


    At your system command line, type ''ipython -h'' to see the command line options
    available. This document only describes interactive features.


    # GETTING HELP

    ------------


    Within IPython you have various way to access help:


    ```

    ?           -> Introduction and overview of IPython''s features (this screen).

    object?     -> Details about ''object''.

    object??    -> More detailed, verbose information about ''object''.

    %quickref   -> Quick reference of all IPython specific syntax and magics.

    help        -> Access Python''s own help system.

    ```


    If you are in terminal IPython you can quit this screen by pressing `q`.


    Finally, simply type quit() at the command prompt and you will exit the ipython
    shell.


    The next section shows you how to check whether or not Python is installed on
    your machine, and also where you can download Python.'
  - '[PAGE 20]


    # PYTHON INSTALLATION


    Before you download anything, check if you have `Python` already installed on
    your machine (which is likely if you have a Macbook or a Linux machine) by typing
    the following command in a command shell:


    ```

    python -V

    ```


    The output for the Macbook used in this book is here:


    ```

    Python 3.9.1

    ```


    > Install Python 3.9.13 (or as close as possible to this version) on your machine
    so that you will have the same version of `Python` that was used to test the `Python`
    scripts in this book.


    If you need to install `Python` on your machine, navigate to the `Python` home
    page and select the downloads link or navigate directly to this website:


    http://www.python.org/download/


    In addition, PythonWin is available for Windows, and its home page is here:


    http://www.cgl.ucsf.edu/Outreach/pc204/pythonwin.html


    Use any text editor that can create, edit, and save `Python` scripts and save
    them as plain text files (don''t use Microsoft Word).


    After you have `Python` installed and configured on your machine, you are ready
    to work with the `Python` scripts in this book.


    # SETTING THE PATH ENVIRONMENT VARIABLE (WINDOWS ONLY)


    The `PATH` environment variable specifies a list of directories that are searched
    whenever you specify an executable program from the command line. A good guide
    to setting up your environment so that the `Python` executable is always available
    in every command shell is to follow the instructions here:


    http://www.blog.pythonlibrary.org/2011/11/24/python-101-setting-up-python-on-windows/'
  - '[PAGE 21]


    # LAUNCHING PYTHON ON YOUR MACHINE


    There are three different ways to launch Python:


    +   - Use the Python Interactive Interpreter

    - Launch Python scripts from the command line

    - Use an IDE


    The next section shows you how to launch the `Python` interpreter from the command
    line, and later in this chapter you will learn how to launch Python scripts from
    the command line and also about `Python` IDEs.


    > NOTE: The emphasis in this book is to launch `Python` scripts from the command
    line or to enter code in the `Python` interpreter.


    # The Python Interactive Interpreter


    Launch the `Python` interactive interpreter from the command line by opening a
    command shell and typing the following command:


    ```

    python

    ```


    You will see the following prompt (or something similar):


    ```

    Python 3.9.1 (v3.9.1:1e5d33e9b9, Dec  7 2020, 12:44:01)

    [Clang 12.0.0 (clang-1200.0.32.27)] on darwin

    Type "help", "copyright", "credits" or "license" for more information.

    >>>

    ```


    Type the expression `2 + 7` at the prompt:


    ```

    >>> 2 + 7

    ```


    Python displays the following result:


    ```

    9

    >>>

    ```


    Press `ctrl-d` to exit the Python shell.

    You can launch any `Python` script from the command line by preceding it with
    the word "python." For example, if you have a `Python` script `myscript.py` that
    contains `Python` commands, launch the script as follows:


    ```

    python myscript.py

    ```'
