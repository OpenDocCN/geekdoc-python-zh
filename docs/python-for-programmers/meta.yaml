    \ 1 的整数的因数。\n\n### 清单 2.11：Divisors2.py\n\n```python\ndef divisors(num):\n   \
    \ divList= \"\"\n    primes = \"\"\n    div = 2\n\n    while(num > 1):\n     \
    \   if(num % div == 0):\n            divList = divList + str(div) + ' '\n    \
    \        num = num / div\n        else:\n            div = div + 1\n    return\
    \ divList\n\nresult = divisors(12)\nprint('The divisors of',12,'are:',result)\n\
