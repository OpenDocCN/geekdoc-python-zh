    \ 语句。如果 `try` 块中发生错误，第一个 `except` 语句会与发生的异常类型进行比较。如果匹配，则执行后续的 print 语句，然后程序终止。如果不匹配，则对第二个\
    \ `except` 语句执行类似的测试。如果两个 `except` 语句都不匹配该异常，则第三个 `except` 语句处理该异常，包括打印一条消息，然后“引发”一个异常。\n\
    \n请注意，你也可以在单个语句中指定多个异常类型，如下所示：\n\n```\nexcept (NameError, RuntimeError, TypeError):\n\
    \    print('One of three error types occurred')\n```\n\n前面的代码块更紧凑，但你不知道具体发生了三种错误类型中的哪一种。Python\
    \ 允许你定义自定义异常，但这个主题超出了本书的范围。\n\n## 处理用户输入\n\nPython 允许你通过 `input()` 函数或 `raw_input()`\
    \ 函数从命令行读取用户输入。通常，你会将用户输入赋值给一个变量，该变量将包含用户从键盘输入的所有字符。当用户按下 `<return>` 键时，用户输入结束（该键包含在输入字符中）。清单\
    \ 1.11 展示了 `UserInput1.py` 的内容，该脚本提示用户输入姓名，然后使用插值显示响应。\n\n### 清单 1.11：UserInput1.py\n\
    \n```\nuserInput = input(\"Enter your name: \")\nprint (\"Hello %s, my name is\
    \ Python\" % userInput)\n```\n\n清单 1.11 的输出如下（假设用户输入了单词 Dave）：\n\n```\nHello Dave,\
    \ my name is Python\n```\n\n清单 1.11 中的 `print()` 语句使用了通过 `%s` 进行的字符串插值，它将 `%`\
    \ 符号后的变量值替换进去。当你想要指定在运行时确定的内容时，此功能显然很有用。\n\n用户输入可能导致异常（取决于你的代码执行的操作），因此包含异常处理代码非常重要。\n\
    \n清单 1.12 展示了 `UserInput2.py` 的内容，该脚本提示用户输入一个字符串，并在 `try/except` 块中尝试将该字符串转换为数字。\n\
    \n### 清单 1.12：UserInput2.py\n\n```\nuserInput = input(\"Enter something: \")\n\
    \ntry:\n    x = 0 + eval(userInput)\n    print('you entered the number:',userInput)\n\
    except:\n    print(userInput,'is a string')\n```\n\n清单 1.12 将数字 0 与用户输入转换为数字的结果相加。如果转换成功，则显示包含用户输入的消息。如果转换失败，`except`\
    \ 代码块包含一个 `print` 语句，显示一条消息。\n\n> 注意：此代码示例使用了 `eval()` 函数，应避免使用，以确保你的代码不会执行任意（且可能具有破坏性的）命令。\n\
    \n清单 1.13 展示了 `UserInput3.py` 的内容，该脚本提示用户输入两个数字，并在一对 `try`/`except` 块中尝试计算它们的和。\n\
    \n### 清单 1.13：UserInput3.py\n\n```\nsum = 0\n\nmsg = 'Enter a number:'\nval1 =\
    \ input(msg)\n\ntry:\n    sum = sum + eval(val1)\nexcept:\n    print(val1, 'is\
    \ a string')\n\nmsg = 'Enter a number:'\nval2 = input(msg)\n\ntry:\n    sum =\
    \ sum + eval(val2)\nexcept:\n    print(val2, 'is a string')\n\nprint('The sum\
    \ of', val1, 'and', val2, 'is', sum)\n```\n\n清单 1.13 包含两个 `try` 块，每个 `try` 块后跟一个\
    \ `except` 语句。第一个 `try` 块尝试将用户提供的第一个数字加到变量 `sum` 上，第二个 `try` 块尝试将用户提供的第二个数字加到先前输入的数字上。如果任一输入字符串不是有效数字，则会出现错误消息；如果两者都是有效数字，则显示一条包含输入数字及其和的消息。请务必阅读本章前面提到的关于\
    \ `eval()` 函数的注意事项。"
