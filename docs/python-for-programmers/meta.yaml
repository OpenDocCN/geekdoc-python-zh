    # The Python lambda Operator


    The lambda operator (or lambda function) enables you to define “anonymous” functions
    that are often used in combination with the functions `filter()`, `map()`, and
    `reduce()`. An example of a lambda function that adds two arguments is here:


    ```

    >>> f = lambda x,y : x + y

    >>> f(2,3)

    5

    ```


    The next section shows you how to use this lambda function with the `reduce()`
    function in Python.


    # The Python reduce() Function


    The `reduce(func, seq)` function returns a single value constructed by calling
    the binary function `func` on the first two items of the sequence `seq` to compute
    a result, and then applies `func` on that result and the *next* item in `seq`,
    and so on until a single value is returned. Thus the `reduce()` function repeatedly
    performs a pair-wise reduction (and hence its name) on a sequence until a single
    value is computed.'
