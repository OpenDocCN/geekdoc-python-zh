    \ file2: 3\n```\n\nThe second scenario involves a program that contains a local\
    \ variable and a global variable with the same name. According to the earlier\
    \ rule, the local variable is used in the function where it is defined, and the\
    \ global variable is used outside of that function.\n\nThe following code block\
    \ illustrates the use of a global and local variable with the same name:\n\n```\n\
    #!/usr/bin/python\n# a global variable:\ntotal = 0;\n\ndef sum(x1, x2):\n    #\
    \ this total is local:\n    total = x1+x2;\n\n    print(\"Local total : \", total)\n\
    \    return total\n\n# invoke the sum function\nsum(2,3);\nprint(\"Global total\
    \ : \", total)\n```\n\nWhen the above code is executed, it produces following\
    \ result:\n\n```\nLocal total :  5\nGlobal total :  0\n```\n\nWhat about unscoped\
    \ variables, such as specifying the variable `x` without a module prefix? The\
    \ answer consists of the following sequence of steps that Python will perform:\n\
    \n+   1. Check the local scope for the name.\n2. Ascend the enclosing scopes and\
    \ check for the name."
- md: "## PASS BY REFERENCE VERSUS VALUE\n\nAll parameters in the Python language\
    \ are passed by reference. Therefore, if you change the value of a parameter inside\
    \ a function, the change is reflected in the calling function. For example:\n\n\
    ```python\ndef changeme(mylist):\n    #This changes a passed list into this function\n\
    \    mylist.append([1,2,3,4])\n    print(\"Values inside the function: \", mylist)\n\
    \    return\n\n# Now you can call changeme function\nmylist = [10,20,30]\nchangeme(mylist)\n\
    print(\"Values outside the function: \", mylist)\n```\n\nHere we are maintaining\
    \ reference of the passed object and appending values in the same object, and\
    \ the result is shown here:\nValues inside the function: [10, 20, 30, [1, 2, 3,\
    \ 4]]\nValues outside the function: [10, 20, 30, [1, 2, 3, 4]]\nThe fact that\
    \ values are passed by reference gives rise to the notion of mutability versus\
    \ immutability that is discussed in Chapter 3.\n\n## ARGUMENTS AND PARAMETERS\n\
    \nPython differentiates between arguments to functions and parameter declarations\
    \ in functions: a positional (mandatory) and keyword (optional/default value).\
    \ This concept is important because Python has operators for packing and unpacking\
    \ these kinds of arguments.\nPython unpacks positional arguments from an iterable,\
    \ as shown here:\n\n```python\n>>> def foo(x, y):\n...     return x - y\n...\n\
    >>> data = 4,5\n>>> foo(data) # only passed one arg\nTraceback (most recent call\
    \ last):\n  File \"<stdin>\", line 1, in <module>\nTypeError: foo() takes exactly\
    \ 2 arguments (1 given)\n>>> foo(*data) # passed however many args are in tuple\n\
    -1\n```\n\n## USING A WHILE LOOP TO FIND THE DIVISORS OF A NUMBER\n\nListing 2.10\
    \ contains a while loop, conditional logic, and the % (modulus) operator in order\
    \ to find the factors of any integer greater than 1.\n\n### Listing 2.10: Divisors.py\n\
    \n```python\ndef divisors(num):\n    div = 2\n    while(num > 1):\n        if(num\
    \ % div == 0):\n            print(\"divisor: \", div)\n            num = num /\
    \ div\n        else:\n            div = div + 1\n    print(\"** finished **\"\
    )\n\ndivisors(12)\n```\n\nListing 2.10 defines a function `divisors()` that takes\
    \ an integer value `num` and then initializes the variable `div` with the value\
    \ 2. The `while` loop divides `num` by `div` and if the remainder is 0, it prints\
    \ the value of `div` and then it divides `num` by `div`; if the value is not 0,\
    \ then `div` is incremented by 1. This `while` loop continues as long as the value\
    \ of `num` is greater than 1.\n\nThe output from Listing 2.10 passing in the value\
    \ 12 to the function `divisors()` is as follows:\n\n```\ndivisor:  2\ndivisor:\
    \  2\ndivisor:  3\n** finished **\n```\n\nListing 2.11 shows the content of `Divisors2.py`,\
    \ which contains a `while` loop, conditional logic, and the `%` (modulus) operator\
    \ in order to find the factors of any integer greater than 1.\n\n### Listing 2.11:\
    \ Divisors2.py\n\n```python\ndef divisors(num):\n    divList= \"\"\n    primes\
    \ = \"\"\n    div = 2\n\n    while(num > 1):\n        if(num % div == 0):\n  \
    \          divList = divList + str(div) + ' '\n            num = num / div\n \
    \       else:\n            div = div + 1\n    return divList\n\nresult = divisors(12)\n\
    print('The divisors of',12,'are:',result)\n```\n\nListing 2.11 is very similar\
    \ to Listing 2.10. The main difference is that Listing 2.11 constructs the variable\
    \ `divList` (which is a concatenated list of the divisors of a number) in the\
    \ `while` loop, and then returns the value of `divList` when the `while` loop\
    \ has completed. The output from Listing 2.11 is as follows:\n\n```\nThe divisors\
    \ of 12 are: 2 2 3\n```\n\n## Using a while Loop to Find Prime Numbers\n\nListing\
    \ 2.12 shows the content of `Divisors3.py`, which contains a `while` loop, conditional\
    \ logic, and the `%` (modulus) operator to count the number of prime factors of\
    \ any integer greater than 1. If there is only one divisor for a number, then\
    \ that number is a prime number.\n\n### Listing 2.12: Divisors3.py\n\n```python\n\
    def divisors(num):\n    count = 1\n    div = 2\n    while(div < num):\n      \
    \  if(num % div == 0):\n            count = count + 1\n        div = div + 1\n\
    \    return count\n\nresult = divisors(12)\n\nif(result == 1):\n    print('12\
    \ is prime')\nelse:\n    print('12 is not prime')\n```\n\nLaunch the code in Listing\
    \ 2.12 and you will see the following output:\n\n```\n12 is not prime\n```\n\n\
    ## USER-DEFINED FUNCTIONS IN PYTHON\n\nPython provides built-in functions and\
    \ also enables you to define your own functions. You can define functions to provide\
    \ the required functionality. Here are simple rules to define a function:\n\n\
    - Function blocks begin with the keyword `def` followed by the function name and\
    \ parentheses.\n- Any input arguments should be placed within these parentheses.\n\
    - The first statement of a function can be an optional statement—the documentation\
    \ string of the function or `docstring`.\n- The code block within every function\
    \ starts with a colon (`:`) and is indented.\n- The statement `return [expression]`\
    \ exits a function, optionally passing back an expression to the caller. A return\
    \ statement with no arguments is the same as `return None`.\n- If a function does\
    \ not specify return statement, the function automatically returns `None`, which\
    \ is a special type of value.\n\nA very simple custom Python function is here:\n\
    \n```python\n>>> def func():\n...     print 3\n...\n>>> func()\n3\n```\n\nThe\
    \ preceding function is trivial, but it does illustrate the syntax for defining\
    \ custom functions. The following example is slightly more useful:\n\n```python\n\
    >>> def func(x):\n...     for i in range(0,x):\n...         print(i)\n...\n>>>\
    \ func(5)\n0\n1\n2\n3\n4\n```\n\n## SPECIFYING DEFAULT VALUES IN A FUNCTION\n\n\
    Listing 2.13 shows the content of `DefaultValues.py`, which illustrates how to\
    \ specify default values in a function.\n\n### Listing 2.13: DefaultValues.py\n\
    \n```python\ndef numberFunc(a, b=10):\n    print (a,b)\n\ndef stringFunc(a, b='xyz'):\n\
    \    print (a,b)\n\ndef collectionFunc(a, b=None):\n    if(b is None):\n     \
    \   print('No value assigned to b')\n\nnumberFunc(3)\nstringFunc('one')\ncollectionFunc([1,2,3])\n\
    ```\n\nListing 2.13 defines three functions, followed by an invocation of each\
    \ of those functions. The functions `numberFunc()` and `stringFunc()` print a\
    \ list contain the values of their two parameters, and `collectionFunc()` displays\
    \ a message if the second parameter is `None`. The output from Listing 2.13 is\
    \ here:\n\n```\n(3, 10)\n('one', 'xyz')\nNo value assigned to b\n```\n\n## Returning\
    \ Multiple Values From a Function\n\nThis task is accomplished by the code in\
    \ Listing 2.14, which shows the content of `MultipleValues.py`.\n\n### Listing\
    \ 2.14: MultipleValues.py\n\n```python\ndef MultipleValues():\n    return 'a',\
    \ 'b', 'c'\n\nx, y, z = MultipleValues()\n\nprint('x:', x)\nprint('y:', y)\nprint('z:',\
    \ z)\n```\n\nThe output from Listing 2.14 is as follows:\n\n```\nx: a\ny: b\n\
    z: c\n```\n\n## FUNCTIONS WITH A VARIABLE NUMBER OF ARGUMENTS\n\nPython enables\
    \ you to define functions with a variable number of arguments. This functionality\
    \ is useful in many situations, such as computing the sum, average, or product\
    \ of a set of numbers. For example, the following code block computes the sum\
    \ of two numbers:\n\n```python\ndef sum(a, b):\n    return a + b\n\nvalues = (1,\
    \ 2)\ns1 = sum(*values)\nprint('s1 = ', s1)\n```\n\nThe output of the preceding\
    \ code block is as follows:\n\n```\ns1 = 3\n```\n\nHowever, the `sum()` function\
    \ in the preceding code block can only be used for two numeric values. Listing\
    \ 2.15 shows the content of `VariableSum1.py`, which illustrates how to compute\
    \ the sum of a variable number of numbers.\n\n### Listing 2.15: VariableSum1.py\n\
    \n```python\ndef sum(*values):\n    sum = 0\n    for x in values:\n        sum\
    \ = sum + x\n    return sum\n```"
  mdcn: "## 按引用传递与按值传递\n\nPython 语言中的所有参数都是按引用传递的。因此，如果你在函数内部更改了参数的值，该更改会反映在调用函数中。例如：\n\
    \n```python\ndef changeme(mylist):\n    #This changes a passed list into this\
