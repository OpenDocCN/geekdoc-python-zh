    \ here:\n\n```\nimport pickle\n\nclass MyClass:\n    attribute = 'a simple attribute'\n\
    \npicklestring = pickle.dumps(MyClass)\n```\n\n# ENCAPSULATION\n\nOne of the main\
    \ reasons for public accessors and mutators is their ability to retrieve and update\
    \ the values of private variables. The ability to “shield” instances of other\
    \ classes from the internal implementation details of a given class is called\
    \ *encapsulation*.\n\nThe advantage of encapsulation is the ability to change\
    \ the inner workings of a class without changing the signature of the API. As\
    \ a result, instances of other classes, as well as public APIs, can continue working\
    \ correctly without worrying about updating the signature of the API (provided\
    \ that the method is not deprecated and replaced with a new method that has a\
    \ different signature).\n\n# SINGLE INHERITANCE\n\nThere are two types of single\
    \ inheritance that you will encounter in programming languages. One common type\
    \ is called “classical” *class-based inheritance* that you will encounter in strongly\
    \ typed languages that perform compile-time checking for variables (such as Java\
    \ and C++). The second type is *prototype-based inheritance* that you will encounter\
    \ in functional languages such as JavaScript."
