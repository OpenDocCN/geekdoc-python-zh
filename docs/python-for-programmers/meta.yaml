    UTF-8 (Unicode Transformation Format) is perhaps the most common, and it''s also
    the default encoding for many systems. The digit 8 in UTF-8 indicates that the
    encoding uses 8-bit numbers, whereas UTF-16 uses 16-bit numbers (but this encoding
    is less common).

