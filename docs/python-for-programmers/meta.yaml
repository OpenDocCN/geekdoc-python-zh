    # CONDITIONAL LOGIC IN PYTHON


    This chapter is a continuation of the previous chapter, which discusses conditional
    logic, for loops, and while loops. Various code samples are included to illustrate
    each of these topics in Python.

    The first part of this chapter briefly discusses precedence of operators as well
    as reserved words in Python. Next are Python-based code samples of various types
    of loops, including nested loops.

    The second part of this chapter discusses conditional logic, as well as control
    structures and user-defined functions. Virtually every Python program that performs
    useful calculations requires some type of conditional logic or control structure
    (or both). Although the syntax for these features is slightly different from other
    languages, the functionality will be familiar to you.


    > NOTE: The scripts in this book are for Python 3.x.


    # PRECEDENCE OF OPERATORS IN PYTHON


    When you have an expression involving numbers, you might remember that multiplication
    (*) and division (/) have higher precedence than addition (+) or subtraction (-).
    Exponentiation has even higher precedence than these four arithmetic operators.

    However, instead of relying on precedence rules, it''s simpler (as well as safer)
    to use parentheses. For example, (x/y)+10 is clearer than x/y+10, even though
    they are equivalent expressions. As another example, the following two arithmetic
    expressions are the equivalent, but the second is less error prone than the first:


    ```

    x/y+3*z/8+x*y/z-3*x

    (x/y) + (3*z) /8+ (x*y) / z- (3*x)

    ```'
