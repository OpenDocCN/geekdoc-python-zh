  - "[PAGE 70]\n\n```\nprint('first global z:',z)\n\nif __name__ == '__main__':\n\
    \    changeVar(z)\n    print('second global z:',z)\n```\n\nThe output from the\
    \ preceding code block is here:\n\n```\nfirst global z: 3\nz in function: 4\n\
    second global z: 3\n```\n\n# SCOPE OF VARIABLES\n\nThe accessibility or scope\
    \ of a variable depends on where that variable has been defined. Python provides\
    \ two scopes: global and local, with the added “twist” that global is actually\
    \ module-level scope (i.e., the current file), and therefore you can have a variable\
    \ with the same name in different files and they will be treated differently.\n\
    \nLocal variables are straightforward: They are defined inside a function, and\
    \ they can only be accessed inside the function where they are defined. Any variables\
    \ that are not local variables have a global scope, which means that those variables\
    \ are “global” *only* with respect to the file where it has been defined, and\
    \ they can be accessed anywhere in a file.\n\nThere are two scenarios to consider\
    \ regarding variables. First, suppose two files (aka modules) `file1.py` and `file2.py`\
    \ have a variable called x, and `file1.py` also imports `file2.py`. The question\
    \ is how to disambiguate between the x in the two different modules. As an example,\
    \ suppose that `file2.py` contains the following two lines of code:\n\n```\nx\
    \ = 3\nprint('unscoped x in file2:',x)\n```\n\nSuppose that `file1.py` contains\
    \ the following code:\n\n```\nimport file2 as file2\n\nx = 5\nprint('unscoped\
    \ x in file1:',x)\nprint('scoped x from file2:',file2.x)\n```"
  - "[PAGE 71]\n\nLaunch `file1.py` from the command line, and you will see the following\
