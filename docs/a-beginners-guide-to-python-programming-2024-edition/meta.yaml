- md: "For example, `name = input(\"Enter your name: \")` prompts the user to enter\
    \ their name, which is then stored in the `name` variable.\n\n## Output\n\nThe\
    \ `print()` function is used to output data to the screen.\n\nYou can print strings,\
    \ numbers, or variables. You can also format strings in various ways to make the\
    \ output more readable.\n\nThis chapter covers the fundamental concepts you need\
    \ to start programming in Python. Understanding these basics is crucial for progressing\
    \ to more complex topics.\n\n## Chapter 3: Control Structures\n\n### Conditional\
    \ Statements\n\nConditional statements let your program execute different actions\
    \ based on certain conditions. Python uses `if`, `elif` (else if), and `else`\
    \ statements for this purpose.\n\n### if Statement\n\nThe `if` statement is used\
    \ to test a condition and execute a block of code if the condition is `True`.\n\
    \nSyntax:\n```python\nif condition:\n    # code to execute if condition is True\n\
    ```\n\n### elif and else Statements\n\n`elif` allows you to check multiple conditions.\
    \ If the `if` condition is `False`, it checks the `elif` condition, and so on.\n\
    \n`else` executes a block of code if none of the preceding conditions are `True`.\n\
    \nSyntax:\n```python\nif condition1:\n    # code if condition1 is True\nelif condition2:\n\
    \    # code if condition2 is True\nelse:\n    # code if none of the conditions\
    \ are True\n```\n\n**Example:**\n```python\nage = 18\nif age < 13:\n    print(\"\
    Child\")\nelif age < 20:\n    print(\"Teenager\")\nelse:\n    print(\"Adult\"\
    )\n```\n\n### Loops\n\nLoops are used to execute a block of code repeatedly under\
    \ certain conditions. Python provides `for` and `while` loops for this purpose.\n\
    \n### for Loop\n\nThe `for` loop is used to iterate over a sequence (like a list,\
    \ tuple, dictionary, or string) and execute a block of code for each item.\n\n\
    Syntax:\n```python\nfor item in sequence:\n    # code to execute\n```\n\n### while\
    \ Loop\n\nThe `while` loop executes as long as a condition is `True`.\n\nSyntax:\n\
    ```python\nwhile condition:\n    # code to execute\n```\n\n### Controlling Loop\
    \ Execution\n\n- **break**: Exits the loop.\n- **continue**: Skips the rest of\
    \ the code inside the loop for the current iteration and moves to the next iteration.\n\
    \n**Example:**\n```python\nfor i in range(5):  # range(5) generates a sequence\
    \ of numbers from 0 to 4\n    if i == 3:\n        break  # Exit the loop when\
    \ i is 3\n    print(i)\n```\n\nThis chapter introduces you to making decisions\
    \ and automating repetitive tasks in your Python programs using conditional statements\
    \ and loops. Mastering these control structures is crucial for creating flexible\
    \ and efficient Python scripts.\n\n## Chapter 4: Data Structures\n\n### Lists\n\
    \nLists are one of the most versatile data structures in Python. They are ordered\
    \ collections of items (which can be of any type) and are mutable, meaning you\
    \ can change their content.\n\n### Creating and Accessing Lists\n\nLists are defined\
    \ by enclosing values in square brackets `[]`, separated by commas.\n\nAccess\
    \ list items by their index using `list[index]`. Note that indices in Python start\
    \ at 0.\n\n**Example:**\n```python\nfruits = [\"apple\", \"banana\", \"cherry\"\
    ]\nprint(fruits[1])  # Outputs: banana\n```\n\n### Modifying Lists\n\nAdd items\
    \ using the `append()` method or the `+` operator to concatenate lists.\n\nRemove\
    \ items with the `remove()` method or the `del` statement.\n\n### Tuples\n\nTuples\
    \ are similar to lists but are immutable, meaning their content cannot be changed\
    \ after creation. Tuples are often used for data that should not be altered.\n\
    \n### Creating and Accessing Tuples\n\nTuples are defined by enclosing values\
    \ in parentheses `()`, separated by commas.\n\nAccess tuple items by their index,\
    \ just like with lists.\n\n**Example:**\n```python\ncoordinates = (10, 20)\nprint(coordinates[0])\
    \  # Outputs: 10\n```\n\n### Dictionaries\n\nDictionaries are key-value pairs,\
    \ which are unordered, mutable, and indexed by keys. They are incredibly useful\
    \ for storing and retrieving data without needing to remember an index.\n\n###\
    \ Creating and Using Dictionaries\n\nDictionaries are defined by enclosing key-value\
    \ pairs in curly braces `{}`, with keys and values separated by colons.\n\nAccess\
    \ values by their keys using `dictionary[key]`.\n\n**Example:**\n```python\nperson\
    \ = {\"name\": \"John\", \"age\": 30}\nprint(person[\"name\"])  # Outputs: John\n\
    ```\n\n### Sets\n\nSets are unordered collections of unique elements. They are\
    \ mutable and are useful for membership testing, removing duplicates from a sequence,\
    \ and mathematical operations like unions, intersections, and differences.\n\n\
    ### Creating and Using Sets\n\nSets are defined by enclosing values in curly braces\
    \ `{}` or by using the `set()` function.\n\nSince sets are unordered, you cannot\
    \ access items by index.\n\n**Example:**\n```python\ncolors = {\"red\", \"green\"\
    , \"blue\"}\nprint(\"red\" in colors)  # Outputs: True\n```\n\nThis chapter introduces\
    \ the core data structures in Python, essential for storing and organizing data\
    \ efficiently in your programs. Each structure serves a unique purpose and has\
    \ its own set of methods for manipulation.\n\n## Chapter 5: Functions\n\n### Defining\
    \ Functions\n\nFunctions are defined using the `def` keyword, followed by the\
    \ function name and parentheses `()` which may include parameters. The code block\
    \ within every function starts with a colon `:` and is indented.\n\n**Syntax:**\n\
    ```python\ndef function_name(parameters):\n    # function body\n```\n\n**Example:**\n\
    ```python\ndef greet(name):\n    print(f\"Hello, {name}!\")\n```\n\n### Parameters\
    \ and Return Values\n\n**Parameters** are variables listed inside the parentheses\
    \ in the function definition, which act as placeholders for the data you can pass\
    \ into the function. **Return values** are used to send back output from the function\
    \ to the caller using the `return` statement.\n\n**Example:**\n```python\ndef\
    \ add_numbers(x, y):\n    return x + y\n\nresult = add_numbers(5, 3)\nprint(result)\
    \  # Outputs: 8\n```\n\n### Scope and Lifetime of Variables\n\nVariables declared\
    \ inside a function have a local scope, meaning they are only accessible within\
    \ the function. The lifetime of a local variable spans the time during which the\
    \ function executes.\n\nVariables declared outside of all functions have a global\
    \ scope, meaning they are accessible throughout the file.\n\n**Example:**\n```python\n\
    def my_func():\n    local_var = 10  # local variable\n    print(local_var)\n\n\
    my_func()\n# print(local_var)  # This would raise an error because local_var is\
    \ not accessible here\n```\n\n### Function Arguments\n\nYou can pass data, known\
    \ as arguments, into functions. Python supports various types of arguments:\n\n\
    - **Positional arguments** must be in order and match the parameters declared\
    \ in the function.\n- **Keyword arguments** are passed to the function by explicitly\
    \ specifying which parameter they correspond to.\n- **Default arguments** are\
    \ specified in the function definition and used if no argument is passed for that\
    \ parameter.\n\n**Example:**\n```python\ndef introduce(name, age=30):\n    print(f\"\
    My name is {name} and I am {age} years old.\")\n\nintroduce(\"John\", 25)  # Positional\
    \ arguments\nintroduce(age=40, name=\"Doe\")  # Keyword arguments\nintroduce(\"\
    Jane\")  # Default argument for age is used\n```\n\nFunctions in Python enhance\
