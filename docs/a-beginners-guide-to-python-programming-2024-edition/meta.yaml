    \n### 创建和使用集合\n\n集合通过将值括在花括号 `{}` 中或使用 `set()` 函数来定义。\n\n由于集合是无序的，你无法通过索引访问项目。\n\
    \n**示例：**\n```python\ncolors = {\"red\", \"green\", \"blue\"}\nprint(\"red\" in\
