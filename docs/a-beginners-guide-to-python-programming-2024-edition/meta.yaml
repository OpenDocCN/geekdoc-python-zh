- img_proc: true
  md: '# # Chapter 2: Python Basics


    # ## Variables and Data Types


    In Python, variables are used to store information that can be used and manipulated
    throughout your program. Think of variables as containers for storing data. The
    data stored in variables can be of various types, and Python automatically determines
    the data type based on the value assigned to a variable.


    # ### Creating Variables :


    Variables in Python are created the moment you first assign a value to them. For
    example, `x = 5` creates a variable named `x` and stores the integer `5` in it.


    Python uses dynamic typing, which means you can reassign variables to different
    data types. For example, `x = "Hello"` changes the value of `x` to a string containing
    "Hello".'
  merge: -1
  pgno: 8
- img_proc: true
  md: '# Data Types :


    **Integers :** Whole numbers without a fractional part. Example: `age = 25`


    **Floats :** Numbers with a decimal point or in exponential form. Example: `height
    = 5.9`


    **Strings :** A sequence of characters enclosed in quotes. Example: `name = "John"`


    **Booleans :** Represents two values: True or False. Example: `is_student = True`


    # Operators


    Operators are symbols that perform operations on variables and values. Python
    supports a variety of operators, which can be categorized as follows:


    **Arithmetic Operators :** Perform mathematical operations like addition, subtraction,
    multiplication, etc.'
  merge: -1
  pgno: 9
