    \n使用 `remove()` 方法或 `del` 语句删除项目。\n\n### 元组\n\n元组与列表类似，但不可变，这意味着其内容在创建后无法更改。元组通常用于不应更改的数据。\n\
    \n### 创建和访问元组\n\n元组通过将值括在圆括号 `()` 中并用逗号分隔来定义。\n\n像列表一样，通过索引访问元组项。\n\n**示例：**\n\
    ```python\ncoordinates = (10, 20)\nprint(coordinates[0])  # 输出：10\n```\n\n###\
