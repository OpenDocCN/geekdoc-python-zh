    字典通过将键值对括在花括号 `{}` 中来定义，键和值用冒号分隔。\n\n使用 `dictionary[key]` 通过键访问值。\n\n**示例：**\n\
    ```python\nperson = {\"name\": \"John\", \"age\": 30}\nprint(person[\"name\"])\
