    for i in range(len(weekly_temperatures)):\n    weekly_temperatures[i] = (weekly_temperatures[i]\
    \ * 9/5) + 32\n```\n\n在这段代码中，我们遍历数组，对每个温度应用转换公式并就地更新元素。\n\n### 总结\n\n在本章中，我们深入探讨了Python中修改数组元素的艺术。我们探索了更改单个和多个元素的技术，以及替换数组中所有元素的方法。我们还讨论了修改嵌套数组中的元素。\n\
