    slice_end = my_array[2:] # 检索索引 2、3 和 4 处的元素\n```\n\n在 `slice_start` 中，我们检索从开头到（但不包括）索引\
    \ 3 的元素，得到 `[10, 20, 30]`。在 `slice_end` 中，我们检索从索引 2 到末尾的元素，得到 `[30, 40, 50]`。\n\
    \n```python\nmy_array = [10, 20, 30, 40, 50, 60, 70]\nsliced_strided = my_array[1:6:2]\
