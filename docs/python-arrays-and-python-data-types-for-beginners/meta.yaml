    \n```python\n# 成员运算符示例\nfruits = [\"apple\", \"banana\", \"orange\"]\nis_apple_present\
    \ = \"apple\" in fruits\n```\n\n在此代码片段中，如果 \"apple\" 在 `fruits` 列表中，则 `is_apple_present`\
