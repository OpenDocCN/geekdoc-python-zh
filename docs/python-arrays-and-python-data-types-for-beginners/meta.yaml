    \n```python\nmy_array = [10, 20, 30, 40, 50]\nelements = my_array[1:4] # 访问索引\
    \ 1、2 和 3 处的元素\n```\n\n在这段代码中，`my_array[1:4]` 提取索引 1、2 和 3 处的元素，结果为 `[20, 30,\
    \ 40]`。\n\n### 避免陷阱：处理超出范围的索引\n\n在访问数组中的元素时，考虑数组的边界以避免索引错误至关重要。如果你尝试使用超出数组有效索引范围的索引访问元素，Python\
    \ 将引发 \"IndexError\"。\n\n例如，如果你有一个包含五个元素的数组，并尝试访问 `my_array[5]`，你将遇到 IndexError，因为该数组的有效索引是\
