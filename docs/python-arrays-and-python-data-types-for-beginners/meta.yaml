    x, y = point

    print(f"x: {x}, y: {y}")

    ```


    在这个例子中，`x, y = point` 将元组 `point` 的值解包到变量 `x` 和 `y` 中。输出将是 "x: 5, y: 9"，展示了元组解包的简单性和清晰性。


    ## 结合列表与元组：数据结构的交响乐


    在 Python 数据结构的宏大交响乐中，列表和元组经常合作，各自为表演带来其独特的优势。


