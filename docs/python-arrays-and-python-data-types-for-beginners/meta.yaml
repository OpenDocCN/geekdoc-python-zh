    # ### Avoiding Pitfalls: Copying vs. Referencing


    When modifying elements in arrays, it''s crucial to understand the difference
    between copying and referencing. Modifying a referenced array can affect other
    variables that point to the same array. Let''s explore this concept with examples.


    # #### Modifying a Referenced Array


    Consider the following code:


    ```

    python

    array_a = [1, 2, 3]

    array_b = array_a # array_b references the same array as array_a

    array_b[1] = 99 # Modifying array_b also affects array_a

    ```


    In this code, `array_b` is assigned the same array as `array_a`, not a copy of
    it. Therefore, when we modify an element in `array_b`, it also changes in `array_a`.
    After the modification, both `array_a` and `array_b` will be `[1, 99, 3]`.'
