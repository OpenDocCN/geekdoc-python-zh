    \ you try to access `my_array[5]`, you'll encounter an IndexError because the\
    \ valid indices for this array are 0 to 4.\n\nTo avoid these errors, you can check\
    \ the length of the array before attempting to access an element with a particular\
    \ index. This way, you ensure that the index is within the valid range.\n\n```\n\
    python\nmy_array = [10, 20, 30, 40, 50]\nindex_to_access = 5\n\nif 0 <= index_to_access\
    \ < len(my_array):\n    element = my_array[index_to_access]\nelse:\n    element\
    \ = None # Handle the out-of-range case gracefully\n```"
