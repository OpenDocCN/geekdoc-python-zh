    # 第四章：列表与元组：驾驭有序数据结构


    欢迎来到有序数据结构的领域，列表和元组在此占据中心舞台。在本章中，我们将踏上探索这些多功能实体的旅程，深入了解它们的细微差别、应用以及驾驭 Python 有序景观的艺术。


    ## 列表的交响乐


    在 Python 中，列表类似于管弦乐队中的多才多艺的合奏。它们是有序的集合，可以容纳各种数据类型，创造出和谐的序列，为你的代码增添旋律。


    ```python

    # List Examples

    fruits = ["apple", "banana", "orange"]

    numbers = [1, 2, 3, 4, 5]

    mixed_list = ["python", 3.14, 42, True]

    ```


    在这个代码片段中，`fruits` 是一个字符串列表，`numbers` 是一个整数列表，而 `mixed_list` 是不同数据类型的异构混合。列表用方括号
    `[]` 括起来，在存储和组织数据方面提供了灵活性。


    ## 访问元素：索引探险


    要驾驭列表的交响乐，我们需要理解索引的艺术。在 Python 中，索引从 0 开始，这意味着列表的第一个元素在索引 0，第二个在索引 1，依此类推。


    ```python

    # Indexing Example

    colors = ["red", "green", "blue"]

    first_color = colors[0]

    print(first_color)

    ```


    在这个例子中，`colors[0]` 检索列表 `colors` 的第一个元素，即 "red"。输出将是 "red"，展示了列表索引的简单性。


    ## 列表的切片与分割


    就像我们对字符串进行切片和分割一样，列表也提供了类似的能力。列表切片的过程涉及提取列表的特定部分，允许更集中的操作。


    ```python

    # List Slicing Example

    numbers = [1, 2, 3, 4, 5]

    subset = numbers[1:4]

    print(subset)

    ```


    在这个例子中，`numbers[1:4]` 提取了从索引 1 到 3 的元素，结果子集为 [2, 3, 4]。列表切片为处理较大列表中的部分数据提供了强大的工具。


    ## 修改列表：可变性的大师


    列表的定义特征之一是其可变性——创建后可以修改的能力。这一特性使列表成为动态实体，能够适应和演变。


    ```python

    # Modifying Lists Example

    fruits = ["apple", "banana", "orange"]

    fruits[1] = "grape"

    print(fruits)

    ```


    在这个代码片段中，`fruits[1] = "grape"` 将列表 `fruits` 的第二个元素从 "banana" 修改为 "grape"。输出将是
    ["apple", "grape", "orange"]，展示了列表的可变性。


    ## 元组的优雅


    如果说列表是可变性的大师，那么元组则代表了不可变性的优雅。元组是类似于列表的有序集合，但一旦创建，其元素就不能更改。


    ```python

    # Tuple Example

    coordinates = (3, 7)

    ```


    在这个例子中，`coordinates` 是一个保存两个值的元组。元组用圆括号 `()` 定义，以区别于列表。元组的不可变性使其适用于数据应保持不变的情况。


    ## 元组解包：开场表演


    要充分欣赏元组的优雅，我们必须探索解包的概念。解包允许我们在一行富有表现力的代码中将元组的值分配给多个变量。


    ```python

