  md: '# # Chapter 3: Accessing Array Elements


    In the previous chapters, we explored the foundations of Python arrays, including
    their creation and initialization. Now, as we venture into Chapter 3, we''re ready
    to unveil the art of accessing array elements. Think of this chapter as your key
    to unlocking the treasure trove of data stored within arrays. By the end of this
    journey, you''ll possess the skills to navigate arrays with confidence and precision.


    # ### The Power of Indexing


    Accessing array elements is a fundamental operation, akin to opening a door to
    a room full of valuable information. Each element in an array is uniquely identified
    by its index, a numerical identifier that indicates its position within the array.
    In Python, indexing starts at 0 for the first element, 1 for the second, and so
    on.


    Let''s begin our exploration of array element access with some simple examples:


    # #### Accessing Single Elements'
  merge: -1
  pgno: 25
- img_proc: true
  md: 'To access a single element in an array, you use the array name followed by
    square brackets containing the index of the element you want to retrieve. Here''s
    an example:


    ```

    python

    my_array = [10, 20, 30, 40, 50]

    element = my_array[2] # Accessing the element at index 2

    ```


    In this code, `my_array[2]` retrieves the element at index 2, which is 30. The
    result is stored in the variable `element`.


    # #### Negative Indexing


    Python also allows negative indexing, which starts from the end of the array.
    For example:


    ```

    python

    my_array = [10, 20, 30, 40, 50]

    element = my_array[-1] # Accessing the last element

    ```'
  merge: -1
  pgno: 26
- img_proc: true
  md: 'In this case, `my_array[-1]` retrieves the last element, which is 50. Negative
    indexing can be a useful shortcut when you need to access elements from the end
    of an array without knowing its length.


    # #### Accessing Multiple Elements: Slicing


    Slicing is a powerful technique that allows you to access multiple elements from
    an array by specifying a range of indices. The basic syntax for slicing is `[start:end]`,
    where `start` is the index of the first element you want to include, and `end`
    is the index of the first element you want to exclude.


    Here''s an example of slicing an array:


    ```

    python

    my_array = [10, 20, 30, 40, 50]

    slice_result = my_array[1:4] # Slicing from index 1 to 3

    ```'
  merge: -1
  pgno: 27
- img_proc: true
  md: 'In this code, `my_array[1:4]` retrieves the elements at indices 1, 2, and 3,
    which are 20, 30, and 40, respectively. The result is stored in the variable `slice_result`.


    # #### Omitting Start or End in Slicing


    You can omit the `start` or `end` index in slicing, which has a specific behavior:


    +   - If you omit the `start` index, Python assumes you want to start from the
    beginning of the array.

    - If you omit the `end` index, Python assumes you want to go until the end of
    the array.


    Here are examples:


    ```

    python

    my_array = [10, 20, 30, 40, 50]


    # Omitting start index (starts from the beginning)

    slice_start = my_array[:3] # Retrieves elements at indices 0, 1, and 2

    ```'
  merge: -1
  pgno: 28
- img_proc: true
  md: '```

    # Omitting end index (goes until the end)

    slice_end = my_array[2:] # Retrieves elements at indices 2, 3, and 4

    ```


    In `slice_start`, we retrieve elements from the beginning up to (but not including)
    index 3, which gives us `[10, 20, 30]`. In `slice_end`, we retrieve elements from
    index 2 to the end, which gives us `[30, 40, 50]`.


    # #### Slicing with Strides


    You can also specify a step or stride value in slicing to skip elements. The syntax
    is `[start:end:step]`, where `step` indicates how many elements to skip between
    each included element. Here''s an example:


    ```

    python

    my_array = [10, 20, 30, 40, 50, 60, 70]

    slice_strided = my_array[1:6:2] # Slicing from index 1 to 5 with a step of 2

    ```'
