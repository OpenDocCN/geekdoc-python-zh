    \ example:\n\n```python\nmy_array = [10, 20, 30, 40, 50]\nelement = my_array[2]\
    \ # Accessing the element at index 2\n```\n\nIn this code, `my_array[2]` retrieves\
    \ the element at index 2, which is 30. The element at index 2 represents the third\
    \ element in the array, counting from 0.\n\n#### Negative Indexing\n\nPython also\
    \ supports negative indexing, which starts from the end of the array. For example:\n\
    \n```python\nmy_array = [10, 20, 30, 40, 50]\nelement = my_array[-1] # Accessing\
    \ the last element\n```\n\nIn this case, `my_array[-1]` retrieves the last element,\
    \ which is 50. Negative indexing can be a useful shortcut when you need to access\
    \ elements from the end of an array without knowing its length.\n\n#### Accessing\
    \ Multiple Elements: Slicing with Indices\n\nWhile slicing was introduced earlier\
    \ as a method of extracting a range of elements, it can also be used to access\
