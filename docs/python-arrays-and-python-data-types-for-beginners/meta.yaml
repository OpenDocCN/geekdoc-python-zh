    ## 第 11 章：组合与拆分数组


    在数据处理和分析领域，处理多个数组是很常见的，无论这些数组包含来自不同来源的数据，还是代表问题的不同方面。将这些数组组合成一个更大的数组，或者将它们拆分成更小的部分，是一项基本操作，它使你能够有效地组织和处理数据。在第
    11 章中，我们将深入探讨使用 NumPy 在 Python 中组合和拆分数组的艺术，探索相关技术、函数和实际应用。


    ### 组合数组


    组合数组涉及将两个或多个数组合并成一个更大的数组。此操作对于数据集成、合并数据集以及为分析或建模准备数据等任务至关重要。NumPy 提供了几种组合数组的方法，每种方法都针对特定的用例量身定制。


    ### 使用 `np.concatenate()` 进行连接


    `np.concatenate()` 函数允许你沿着指定的轴（维度）连接数组。你可以使用它来垂直（沿行）或水平（沿列）组合数组。


    ```python

    import numpy as np


    # 创建两个数组

    array1 = np.array([1, 2, 3])

    array2 = np.array([4, 5, 6])


    # 垂直连接它们（沿行）

    result_vertical = np.concatenate((array1, array2))


    # 水平连接它们（沿列）

    result_horizontal = np.concatenate((array1, array2), axis=0)

    ```


    在此示例中，`result_vertical` 包含 `[1, 2, 3, 4, 5, 6]`，而 `result_horizontal` 与之相同。`axis`
    参数控制数组连接的轴。


    ### 使用 `np.stack()` 进行堆叠


    `np.stack()` 函数允许你沿着新轴堆叠数组，从而创建一个更高维度的数组。当你想要组合数组同时保持其各自结构时，此函数非常有用。


    ```python

    import numpy as np


    # 创建两个数组

    array1 = np.array([1, 2, 3])

    array2 = np.array([4, 5, 6])


    # 沿新轴堆叠它们（结果为一个二维数组）

    stacked_array = np.stack((array1, array2))

    ```


    在此示例中，`stacked_array` 是一个具有两行的二维数组，其中每一行对应一个输入数组。


    ### 垂直和水平堆叠


    对于专门的垂直和水平堆叠，你可以分别使用 `np.vstack()` 和 `np.hstack()` 函数。


    - `np.vstack()`：垂直堆叠数组（沿行）。


    ```python

    import numpy as np


    # 创建两个数组

    array1 = np.array([1, 2, 3])

    array2 = np.array([4, 5, 6])


    # 垂直堆叠它们

    stacked_vertical = np.vstack((array1, array2))

    ```


    - `np.hstack()`：水平堆叠数组（沿列）。


    ```python

    import numpy as np


    # 创建两个数组

    array1 = np.array([1, 2, 3])

    array2 = np.array([4, 5, 6])


    # 水平堆叠它们

    stacked_horizontal = np.hstack((array1, array2))

    ```


    `stacked_vertical` 和 `stacked_horizontal` 都组合了输入数组，同时保持了它们的形状。


    ### 拆分数组


    拆分数组涉及将单个数组划分为更小、更易于管理的部分。此操作对于数据预处理、数据集分区和并行处理等任务至关重要。NumPy 提供了函数，可以沿着指定的轴将数组拆分成更小的数组。


    ### 使用 `np.split()` 进行拆分


    `np.split()` 函数允许你沿着指定的轴将数组拆分成多个子数组。你提供拆分数组的索引，它会返回一个子数组列表。


    ```python

    import numpy as np


    # 创建一个数组

    array = np.array([1, 2, 3, 4, 5, 6])


    # 将其拆分为三个相等的部分

    subarrays = np.split(array, 3)

    ```'
