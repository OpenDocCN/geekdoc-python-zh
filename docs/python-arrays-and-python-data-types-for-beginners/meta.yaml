  md: 'Lambda functions, also known as anonymous functions, offer a compact way to
    define small, one-time-use functions.


    ```

    python

    # Lambda Function Example

    square = lambda x: x ** 2


    result = square(3)

    print(result) # Output: 9

    ```


    Here, the lambda function calculates the square of a number in a concise manner.


    # ## Map, Filter, and Reduce: Functional Programming Tools


    The `map`, `filter`, and `reduce` functions are functional programming tools that
    operate on iterables.


    ```

    python

    # Map, Filter, and Reduce Example

    numbers = [1, 2, 3, 4, 5]


    # Map: Squaring each element

    ```'
