  mdcn: "在此示例中，`subarrays` 包含三个子数组：`[1, 2]`、`[3, 4]` 和 `[5, 6]`。\n\n## 垂直与水平分割\n\n\
    具体到垂直和水平分割，你可以分别使用 `np.vsplit()` 和 `np.hsplit()` 函数。\n\n- `np.vsplit()`：将数组垂直（沿行）分割成多个子数组。\n\
    \n```python\nimport numpy as np\n\n# 创建一个二维数组\nmatrix = np.array([[1, 2], [3,\
    \ 4], [5, 6]])\n\n# 沿行将其分割成两个子数组\nsubarrays = np.vsplit(matrix, 2)\n```\n\n- `np.hsplit()`：将数组水平（沿列）分割成多个子数组。\n\
    \n```python\nimport numpy as np\n\n# 创建一个二维数组\nmatrix = np.array([[1, 2, 3], [4,\
    \ 5, 6]])\n\n# 沿列将其分割成三个子数组\nsubarrays = np.hsplit(matrix, 3)\n```\n\n`np.vsplit()`\
    \ 和 `np.hsplit()` 都返回子数组的列表，沿指定轴分割原始数组。\n\n## 按索引分割\n\n你也可以使用 `np.array_split()`\
    \ 通过指定分割点的索引来分割数组。\n\n```python\nimport numpy as np\n\n# 创建一个数组\narray = np.array([1,\
    \ 2, 3, 4, 5, 6, 7])\n\n# 在索引 2 和 5 处将其分割成子数组\nsubarrays = np.array_split(array,\
    \ [2, 5])\n```\n\n在此示例中，`subarrays` 包含三个子数组：`[1, 2]`、`[3, 4, 5]` 和 `[6, 7]`。\n\
    \n### 实际应用\n\n组合和分割数组是数据分析、机器学习和图像处理等多个领域的常见操作。以下是一些实际应用：\n\n## 数据整合\n\n在数据分析中，数据集通常来自多个来源。组合数组允许你整合这些数据集以进行综合分析。例如，你可以将来自一个来源的客户人口统计数据与来自另一个来源的购买历史结合起来，以深入了解客户行为。\n\
    \n## 训练-测试集划分\n\n在机器学习中，将数据划分为训练集和测试集对于模型评估至关重要。你可以使用数组分割技术将数据集分成两部分，一部分用于训练模型，另一部分用于测试其性能。\n\
    \n```python\nimport numpy as np\nfrom sklearn.model_selection import train_test_split\n\
    \n# 创建一个数据集\ndata = np.random.rand(100, 5) # 100 个样本，5 个特征\n\n# 将其划分为训练集和测试集\n\
    train_data, test_data = train_test_split(data, test_size=0.2)\n```\n\n## 图像处理\n\
    \n在图像处理中，图像被表示为像素值的数组。组合和分割数组对于裁剪图像、将多张图像合并为一张图像，或将图像分割成更小的块进行分析等任务非常有用。\n\n```python\n\
    import numpy as np\nimport cv2 # 用于图像处理的 OpenCV 库\n\n# 加载一张图像\nimage = cv2.imread('image.jpg')\n\
    \n# 通过分割数组来裁剪图像\ncropped_image = image[100:300, 200:400]\n\n# 将图像分割成更小的块\npatches\
    \ = np.array_split(image, 4) # 分割成 4 个相等的部分\n```\n\n### 结论\n\n组合和分割数组是基础操作，在数据操作、分析和处理中扮演着至关重要的角色。无论你是在处理数据整合、机器学习还是图像处理，这些操作都提供了有效构建和处理数据的灵活性。\n\
    \n在本章中，我们探讨了组合数组的各种技术，包括连接、堆叠、垂直和水平堆叠，以及在数据整合和机器学习中的实际应用。我们还研究了使用 `np.split()`、`np.vsplit()`、`np.hsplit()`\
    \ 和 `np.array_split` 等函数分割数组，以及它们在训练-测试集划分和图像处理中的应用。\n\n# 第 12 章：数组操作技术\n\n数组操作是\
    \ Python 中处理数据的关键方面，尤其是在科学计算、数据分析和机器学习中。在本章中，我们将使用 NumPy（一个强大的 Python 数值计算库）来探索各种数组操作技术。这些技术包括重塑数组、转置和翻转数组，以及掩码和过滤元素。牢固掌握这些技术，你将拥有高效处理和转换数据数组的工具。\n\
    \n### 重塑数组\n\n重塑数组涉及更改其维度，可以是修改行数和列数，也可以是将多维数组转换为一维数组。当你需要为特定操作准备数据，或者使用需要特定形状数据的机器学习算法时，此过程特别有用。\n\
    \n## 使用 `reshape()` 重塑\n\nNumPy 中的 `reshape()` 方法允许你在保持元素总数不变的情况下更改数组的维度。你可以将所需的形状指定为维度的元组。\n\
    \n```python\nimport numpy as np\n\n# 创建一个包含 12 个元素的一维数组\narray = np.arange(12)\n\
    \n# 将其重塑为 3x4 的二维数组\nreshaped_array = array.reshape(3, 4)\n```\n\n在此示例中，原始的一维数组被转换为\
    \ 3x4 的二维数组。元素数量保持不变（12），但它们的排列方式发生了变化。\n\n## 展平数组\n\n相反，你可以使用 `flatten()` 方法或\
    \ `ravel()` 函数将多维数组展平以创建一维数组。\n\n```python\nimport numpy as np\n\n# 创建一个二维数组\n\
    matrix = np.array([[1, 2, 3], [4, 5, 6]])\n\n# 使用 'flatten()' 展平\nflattened_array\
    \ = matrix.flatten()\n\n# 使用 'ravel()' 展平\nraveled_array = matrix.ravel()\n```\n\
    \n`flatten()` 和 `ravel()` 都会生成一个一维数组，其中包含原始多维数组的所有元素。\n\n### 转置数组\n\n转置是交换二维数组中行和列的操作，实际上相当于将其旋转\
    \ 90 度。此操作是线性代数的基础，常用于矩阵运算。\n\n## 使用 `T` 转置\n\n在 NumPy 中，你可以使用 `T` 属性来转置数组。\n\n\
    ```python\nimport numpy as np\n\n# 创建一个二维数组\nmatrix = np.array([[1, 2, 3], [4,\
    \ 5, 6]])\n\n# 转置数组\ntransposed_matrix = matrix.T\n```\n\n转置后，`matrix` 变为：\n\n\
    ```\n[[1, 4],\n [2, 5],\n [3, 6]]\n```\n\n行变成了列，反之亦然。\n\n### 翻转数组\n\n翻转数组涉及沿一个或多个维度反转元素的顺序。NumPy\
    \ 提供了水平、垂直或同时水平和垂直翻转数组的函数。\n\n## 使用 `flip()` 水平翻转\n\n要水平翻转数组（沿列），你可以使用 `flip()`\
    \ 函数。\n\n```python\nimport numpy as np\n\n# 创建一个二维数组\nmatrix = np.array([[1, 2,\
    \ 3], [4, 5, 6]])\n\n# 水平翻转\nflipped_horizontal = np.flip(matrix, axis=1)\n```\n\
    \n水平翻转后，`matrix` 变为：\n\n```\n[[3, 2, 1],\n [6, 5, 4]]\n```\n\n## 使用 `flip()` 垂直翻转\n\
    \n要垂直翻转数组（沿行），你可以使用 `flip()` 函数并设置 `axis=0`。\n\n```python\nimport numpy as np\n\
    \n# 创建一个二维数组\nmatrix = np.array([[1, 2, 3], [4, 5, 6]])\n\n# 垂直翻转\nflipped_vertical\
    \ = np.flip(matrix, axis=0)\n```\n\n垂直翻转后，`matrix` 变为：\n\n```\n[[4, 5, 6],\n [1,\
    \ 2, 3]]\n```\n\n## 使用 `flip()` 同时水平和垂直翻转\n\n要同时水平和垂直翻转数组，你可以使用 `flip()` 函数并设置\
    \ `axis=None`。\n\n```python\nimport numpy as np\n\n# 创建一个二维数组\nmatrix = np.array([[1,\
    \ 2, 3], [4, 5, 6]])\n\n# 同时水平和垂直翻转\nflipped_both = np.flip(matrix, axis=None)\n\
    ```\n\n同时水平和垂直翻转后，`matrix` 变为：\n\n```\n[[6, 5, 4],\n [3, 2, 1]]\n```\n\n### 掩码和过滤数组\n\
    \n掩码和过滤数组是根据特定条件或标准选择和操作元素的基本技术。这些技术使你能够专注于对分析最重要的数据。\n\n## 使用布尔数组进行掩码\n\n掩码涉及创建一个布尔数组，该数组充当过滤器，根据条件从原始数组中选择元素。结果数组仅包含满足条件的元素。"
