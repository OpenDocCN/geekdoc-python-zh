    \nBinary search is an efficient searching technique that requires a sorted array.\
    \ It works by repeatedly dividing the search interval in half and comparing the\
    \ middle element with the target value. Depending on the comparison result, it\
    \ narrows down the search to the left or right half of the array. Binary search\
    \ has a time complexity of O(log n).\n\nHere's an example of binary search:\n\n\
    ```\npython\ndef binary_search(arr, target):\n    left, right = 0, len(arr) -\
