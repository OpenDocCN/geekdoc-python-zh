  md: "In this example, attempting to divide by zero triggers a `ZeroDivisionError`.\
    \ The `except` block catches this exception and prints an error message.\n\n#\
    \ ## The Try-Except Block: Catching Exceptions\n\nThe `try-except` block is the\
    \ fundamental structure for handling exceptions in Python. It allows you to wrap\
    \ code that might raise an exception within the `try` block and specify how to\
    \ handle the exception in the `except` block.\n\n```\npython\n# Basic Try-Except\
    \ Block\ntry:\n    # Code that might raise an exception\n    result = 10 / 0\n\
    except ZeroDivisionError as e:\n    # Handling the specific exception\n    print(f\"\
    Error: {e}\")\n```\n\nThis construct enables your program to gracefully handle\
    \ errors, preventing them from causing the program to crash.\n\n# ## Handling\
    \ Multiple Exceptions"
