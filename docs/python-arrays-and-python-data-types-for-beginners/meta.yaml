    \ `[20, 40, 60]`。步长值为 2 会跳过偶数索引的元素。\n\n### 索引：访问特定元素\n\n索引就像在夜空中定位一颗特定的星星——它允许你访问数组中的特定元素。理解如何有效使用索引对于精确的数据操作至关重要。\n\
    \n#### 访问单个元素\n\n要访问数组中的单个元素，你可以使用数组名称，后跟包含要检索元素索引的方括号。以下是一个示例：\n\n```python\n\
    my_array = [10, 20, 30, 40, 50]\nelement = my_array[2] # 访问索引 2 处的元素\n```\n\n\
    在这段代码中，`my_array[2]` 检索索引 2 处的元素，即 30。索引 2 处的元素代表数组中的第三个元素（从 0 开始计数）。\n\n####\
    \ 负索引\n\nPython 还支持负索引，它从数组的末尾开始。例如：\n\n```python\nmy_array = [10, 20, 30, 40,\
    \ 50]\nelement = my_array[-1] # 访问最后一个元素\n```\n\n在这种情况下，`my_array[-1]` 检索最后一个元素，即\
