    # ### Sorting Algorithms


    Under the hood, Python''s sorting methods use efficient sorting algorithms. The
    most commonly used algorithm for sorting is called Timsort, which is a hybrid
    sorting algorithm derived from merge sort and insertion sort. Timsort is known
    for its stability (maintaining the relative order of equal elements) and adaptiveness
    (performing well on partially sorted data).


    # #### Merge Sort


    Merge sort is one of the foundational sorting algorithms. It works by recursively
    dividing the array into smaller subarrays until each subarray contains one or
    zero elements. Then, it merges these subarrays in sorted order to produce a fully
    sorted array. Merge sort has a time complexity of O(n log n), making it efficient
    for large datasets.


    # #### Quick Sort


    Quick sort is another widely used sorting algorithm known for its efficiency.
    It operates by selecting a "pivot" element from the array and partitioning the
    other elements into two subarrays based on whether they are less than or greater
    than the pivot. The subarrays are then recursively sorted. Quick sort can have
    an average time complexity of O(n log n) but may degrade to O(n^2) in the worst
    case.'
