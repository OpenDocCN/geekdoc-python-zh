    # 第 13 章：函数：组织代码以实现可重用性\n\n欢迎来到 Python 函数的世界，在这里，代码组织与可重用性相遇，模块化编程的力量得以彰显。在本章中，我们将深入探讨函数的概念，探索其语法、用途，以及它们如何将你的代码提升到效率和可维护性的新高度。\n\
    \n## 函数的本质\n\n函数就像是程序中的小程序，封装了一组特定的操作，可以通过调用函数名来执行。这种模块化的编程方法提供了几个优势，包括代码重用、更轻松的调试和增强的可读性。\n\
    \n## 定义函数：简化语法\n\n在 Python 中定义函数的语法很简单。函数通常以 `def` 关键字开头，后跟函数名和一对括号。函数所需的任何参数都列在括号内。\n\
    \n```python\n# 函数定义示例\ndef greet(name):\n    print(f\"你好, {name}!\")\n\n# 调用函数\n\
    greet(\"Alice\") # 输出: 你好, Alice!\n```\n\n在这个例子中，我们定义了一个名为 `greet` 的函数，它接受一个参数\
    \ `name` 并打印问候语。然后我们调用该函数，传递参数 \"Alice\"。\n\n## 函数参数：实现灵活性\n\n参数允许函数接受输入，使其成为各种任务的多功能工具。一个函数可以有多个参数，每个参数用逗号分隔。\n\
    \n```python\n# 带有多个参数的函数示例\ndef add_numbers(a, b):\n    result = a + b\n    print(f\"\
    {a} 和 {b} 的和是: {result}\")\n\n# 调用函数\nadd_numbers(5, 7) # 输出: 5 和 7 的和是: 12\n\
    ```\n\n在这个例子中，函数 `add_numbers` 接受两个参数 `a` 和 `b`，并打印它们的和。\n\n## Return 语句：捕获输出\n\
    \n虽然在函数内打印很有用，但有时你希望函数将结果返回给调用它的代码。这就是 `return` 语句发挥作用的地方。\n\n```python\n# 带有\
    \ Return 语句的函数示例\ndef square(x):\n    return x ** 2\n\n# 调用函数\nresult = square(4)\n\
    print(f\"4 的平方是: {result}\") # 输出: 4 的平方是: 16\n```\n\n在这个代码片段中，函数 `square` 计算一个数字的平方并返回结果，允许调用代码捕获并使用输出。\n\
    \n## 默认参数：增加灵活性\n\n默认参数提供了一种通过分配默认值使某些函数参数可选的方法。\n\n```python\n# 带有默认参数的函数示例\n\
    def greet_with_message(name, message=\"欢迎\"):\n    print(f\"{message}, {name}!\"\
    )\n\n# 调用函数\ngreet_with_message(\"Bob\") # 输出: 欢迎, Bob!\ngreet_with_message(\"\
    Alice\", \"问候\") # 输出: 问候, Alice!\n```\n\n这里，函数 `greet_with_message` 有一个默认参数 `message`\
    \ 设置为 \"欢迎\"。如果在函数调用期间未提供消息，则使用默认值。\n\n## 关键字参数：增强清晰度"
