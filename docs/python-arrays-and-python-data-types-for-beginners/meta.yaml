    # ### Understanding Multidimensional Arrays


    A multidimensional array is an array of arrays, where each element in the outer
    array is itself an array. These arrays allow you to organize data in a grid-like
    structure, with rows and columns. Multidimensional arrays can be thought of as
    tables, matrices, or even three-dimensional cubes, depending on their dimensions.


    The most common type of multidimensional array is a two-dimensional array, often
    referred to as a matrix. A matrix consists of rows and columns, making it suitable
    for representing data with two axes, such as spreadsheet data, images, or game
    boards.


    # #### Declaring and Creating Multidimensional Arrays'
