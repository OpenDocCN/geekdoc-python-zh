    \ # 非空字符串是真值\nfalsy_example = \"\" # 空字符串是假值\n```\n\n在此代码片段中，`truthy_example`\
    \ 是一个真值，因为它是一个非空字符串，而 `falsy_example` 是假值，因为它代表一个空字符串。理解真值和假值对于基于布尔值的决策制定至关重要。\n\
    \n## 条件语句：由布尔值引导\n\n条件语句是 Python 程序的导游，根据布尔条件引导代码的流程。if、elif 和 else 关键字允许在代码中进行分支和决策制定。\n\
    \n```python\n# 条件语句示例\ntemperature = 25\n\nif temperature > 30:\n    print(\"\
