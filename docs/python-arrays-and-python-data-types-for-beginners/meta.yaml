    \    if age < 0:\n        raise ValueError(\"Age cannot be negative\")\n\n# 调用函数\n\
    try:\n    validate_age(-5)\nexcept ValueError as e:\n    print(f\"Error: {e}\"\
    )\n```\n\n在此示例中，如果提供的年龄为负数，`validate_age` 函数会引发一个 `ValueError`。\n\n## 断言：自信地调试\n\
    \n断言是一种调试辅助工具，它测试一个条件是否为真，如果为假则触发错误。它们在开发过程中识别逻辑错误时非常有用。\n\n```python\n# 断言示例\n\
    def calculate_percentage(value, total):\n    assert total != 0, \"Total should\
    \ not be zero\"\n    return (value / total) * 100\n\n# 调用函数\nresult = calculate_percentage(20,\
    \ 0)\n```\n\n在此，`assert` 语句检查 `total` 是否不为零。如果为零，则会引发一个带有指定消息的 `AssertionError`。\n\
    \n## 自定义异常：根据需求定制错误\n\n创建自定义异常允许你定义与程序逻辑和需求相符的特定错误类型。\n\n```python\n# 自定义异常示例\n\
    class NegativeValueError(ValueError):\n    pass\n\ndef process_positive_value(value):\n\
    \    if value < 0:\n        raise NegativeValueError(\"Value must be positive\"\
    )\n\n# 调用函数\ntry:\n    process_positive_value(-5)\nexcept NegativeValueError as\
    \ e:\n    print(f\"Error: {e}\")\n```\n\n在此，`NegativeValueError` 类是一个自定义异常，当遇到负值时引发。\n\
    \n## 记录异常：洞察错误\n\n记录异常对于诊断生产环境中的问题至关重要。Python 内置的 `logging` 模块提供了一个强大的机制来记录和分析错误。\n\
    \n```python\n# 记录异常示例\nimport logging\n\ndef divide_numbers(a, b):\n    try:\n\
    \        result = a / b\n    except ZeroDivisionError as e:\n        logging.error(f\"\
    Error: {e}\")\n        result = float('inf') # 将无穷大赋值给结果\n    \n    return result\n\
    \n# 调用函数\nresult = divide_numbers(10, 0)\n```\n\n在此，`logging.error` 语句将错误消息记录到日志中，为调试提供了宝贵的信息。\n\
    \n## 处理文件操作：常见的错误来源\n\n文件操作容易出错，例如文件未找到或权限问题。适当的异常处理可确保优雅地处理这些情况。\n\n```python\n\
    # 使用异常处理进行文件操作\ntry:\n    with open(\"nonexistent_file.txt\", \"r\") as file:\n\
    \        content = file.read()\nexcept FileNotFoundError as e:\n    print(f\"\
    Error: {e}\")\nelse:\n    print(\"File read successfully.\")\n```\n\n在此示例中，如果未找到指定文件，则会捕获\
    \ `FileNotFoundError` 并打印错误消息。\n\n## 结论\n\n在本章中，我们探索了 Python 中错误处理的领域——这是编写健壮且有弹性程序的一个重要方面。理解如何优雅地处理异常，可以使你的代码能够应对意外情况，从而提高其可靠性和用户体验。\n\
    \n# 第15章：高级概念：生成器、装饰器等\n\n欢迎来到 Python 编程的高级领域！在本章中，我们将深入探讨将你的编码技能提升到新水平的概念——生成器、装饰器和其他高级技术。这些工具使你能够编写更高效、更易读、更灵活的代码。\n\
    \n## 生成器：优雅地流式处理数据\n\n生成器是在 Python 中创建迭代器的一种强大方式，允许你遍历潜在的无限序列项，而无需在内存中创建整个序列。\n\
    \n```python\n# 生成器函数示例\ndef countdown(n):\n    while n > 0:\n        yield n\n\
    \        n -= 1\n```\n\n# 使用生成器\n\n```python\nfor num in countdown(5):\n    print(num)\n\
    ```\n\n在此示例中，`countdown` 函数是一个生成器，它从给定数字开始生成倒计时。`yield` 语句暂停函数并将当前值返回给调用者，在调用之间保持函数的状态。\n\
    \n## Yield：生成器背后的魔法\n\n`yield` 语句是生成器的核心，允许它们随时间产生一系列值。当生成器函数遇到 `yield` 时，它会将值返回给调用者，但函数的状态被保留。下次调用生成器时，它会从上次中断的地方恢复执行。\n\
    \n```python\n# Yield 语句实战\ndef simple_generator():\n    yield 1\n    yield 2\n\
    \    yield 3\n\n# 使用生成器\n```\n\n```python\ngen = simple_generator()\nprint(next(gen))\
    \ # 输出：1\nprint(next(gen)) # 输出：2\nprint(next(gen)) # 输出：3\n```\n\n在此示例中，`simple_generator`\
    \ 在使用 `next()` 调用时连续产生三个值。\n\n## 装饰器：动态增强函数\n\n装饰器是修改或扩展 Python 中函数行为的一种强大而优雅的方式。它们允许你用额外的功能包装函数，为代码增强提供了一种干净且可重用的机制。\n\
    \n```python\n# 装饰器示例\ndef greeting_decorator(func):\n    def wrapper(name):\n\
    \        print(\"Before greeting\")\n        func(name)\n        print(\"After\
    \ greeting\")\n    return wrapper\n```\n\n```python\n# 应用装饰器\n@greeting_decorator\n\
    def greet(name):\n    print(f\"Hello, {name}!\")\n\n# 使用装饰后的函数\ngreet(\"Alice\"\
    )\n```\n\n在此示例中，`greeting_decorator` 函数是一个装饰器，它在原始 `greet` 函数周围添加了问候前后的消息。\n\n\
    ## @ 语法：应用装饰器的语法糖\n\n`@` 语法提供了一种将装饰器应用于函数的便捷方式。它是一种简写，使代码更具可读性。\n\n```python\n\
    # 使用 @ 语法应用装饰器\n@greeting_decorator\ndef greet(name):\n    print(f\"Hello, {name}!\"\
    )\n```\n\n这等同于前面没有使用 `@` 语法的示例。\n\n## 多个装饰器：功能分层\n\n你可以将多个装饰器应用于单个函数，创建功能堆栈。应用装饰器的顺序很重要，因为它会影响包装层次结构。\n\
    \n```python\n# 多个装饰器示例\ndef uppercase_decorator(func):\n    def wrapper(name):\n\
    \        func(name.upper())\n    return wrapper\n\n# 应用多个装饰器\n@uppercase_decorator\n\
    @greeting_decorator\ndef greet(name):\n    print(f\"Hello, {name}!\")\n```\n\n\
    ```python\n# 使用装饰后的函数\ngreet(\"Alice\")\n```\n\n在此示例中，`uppercase_decorator` 在\
    \ `greeting_decorator` 之前应用，导致名称在问候之前被转换为大写。\n\n## 上下文管理器：高效管理资源\n\n上下文管理器通过 `with`\
    \ 语句实现，允许你通过自动获取和释放资源来高效地管理资源。\n\n```python\n# 上下文管理器示例\nwith open(\"example.txt\"\
    , \"w\") as file:\n    file.write(\"Hello, context managers!\")\n```\n\n在此，`open`\
    \ 函数是一个上下文管理器，当退出 `with` 语句内的代码块时，它会自动关闭文件。\n\n## Contextlib 模块：简化上下文管理器\n\n`contextlib`\
    \ 模块提供了用于处理上下文管理器的实用工具。`contextmanager` 装饰器对于创建简单的上下文管理器特别有用，无需完整的类实现。\n\n```python\n\
    # 使用 contextlib 中的 contextmanager\nfrom contextlib import contextmanager\n\n@contextmanager\n\
    def simple_context():\n    print(\"Entering the context\")\n    yield\n    print(\"\
    Exiting the context\")\n\n# 使用上下文管理器\nwith simple_context():\n    print(\"Inside\
    \ the context\")\n```"
