- md: '## Aggregation and Reduction


    NumPy provides functions for aggregating and reducing data within arrays. These
    functions allow you to calculate statistics such as sum, mean, minimum, maximum,
    and more.


    ### Aggregation Functions


    - `np.sum()`: Calculates the sum of all elements in an array.


    ```python

    import numpy as np


    array = np.array([1, 2, 3, 4, 5])

    total = np.sum(array) # Calculates the sum (15)

    ```


    - `np.mean()`: Computes the mean (average) of the elements.


    ```python

    import numpy as np


    array = np.array([1, 2, 3, 4, 5])

    average = np.mean(array) # Calculates the mean (3.0)

    ```


    - `np.min()` and `np.max()`: Find the minimum and maximum values.


    ```python

    import numpy as np


    array = np.array([1, 2, 3, 4, 5])

    minimum = np.min(array) # Finds the minimum (1)

    maximum = np.max(array) # Finds the maximum (5)

    ```


    ### Reduction Functions


    Reduction functions allow you to apply aggregation along specific axes or dimensions
    of multidimensional arrays.


    - `np.sum(axis)`: Aggregates along the specified axis.


    ```python

    import numpy as np


    matrix = np.array([[1, 2, 3], [4, 5, 6]])

    column_sums = np.sum(matrix, axis=0) # Sums along columns


    # ''column_sums'' contains [5, 7, 9]

    ```


    - `np.mean(axis)`: Computes the mean along the specified axis.


    ```python

    import numpy as np


    matrix = np.array([[1, 2, 3], [4, 5, 6]])

    row_means = np.mean(matrix, axis=1) # Means along rows


    # ''row_means'' contains [2.0, 5.0]

    ```


    These aggregation and reduction functions are essential for data analysis and
    statistical computations.


    ### Universal Functions (ufuncs)


    Universal functions, or ufuncs, are a core feature of NumPy that provide element-wise
    operations on arrays. Ufuncs are implemented in compiled C code, making them incredibly
    efficient for large datasets. They cover a wide range of mathematical, trigonometric,
    and logical operations.


    Here are some examples of common ufuncs:


    - `np.add()`: Element-wise addition.


    ```python

    import numpy as np


    array1 = np.array([1, 2, 3])

    array2 = np.array([4, 5, 6])

    result = np.add(array1, array2) # Element-wise addition

    ```


    - `np.square()`: Calculates the square of each element.


    ```python

    import numpy as np


    array = np.array([1, 2, 3, 4, 5])

    squared = np.square(array) # Element-wise square

    ```


    - `np.sqrt()`: Computes the square root of each element.


    ```python

    import numpy as np


    array = np.array([1, 4, 9, 16, 25])

    square_root = np.sqrt(array) # Element-wise square root

    ```


    Ufuncs are efficient and versatile, enabling you to perform complex operations
    on arrays with ease.


