    \n# 第14章\n\n## 内置组件的局限性：何时需要超越\n\nPython的Tkinter库提供了一种开发具有图形用户界面（GUI）的桌面应用程序的便捷方式。虽然Tkinter提供了一系列内置组件，如按钮、标签和输入框，但在某些情况下，这些组件可能无法完全满足应用程序的需求。在这种情况下，就有必要通过创建自定义组件和探索内置组件之外的其他选项来扩展Tkinter的功能。\n\
