    button2 = tk.Button(root, text="Button 2", bg="lightyellow")


    # 将控件放置在重叠的位置

    label1.place(x=50, y=50)

    label2.place(x=50, y=50)

    button1.place(x=100, y=100)

    button2.place(x=100, y=100)


