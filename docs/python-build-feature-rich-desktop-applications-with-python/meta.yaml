    # Create the main application window

    root = tk.Tk()

    root.title("Binding Events Example")


    # Create a button widget

    button = tk.Button(root, text="Click Me")

    button.pack()


    # Bind the button click event to the on_button_click function

    button.bind("<Button-1>", on_button_click)


    # Run the application

    root.mainloop()

    ```


    In this example:


    +   - We define a function `on_button_click(event)` to change the button''s text
    when clicked.

    - The `<Button-1>` event represents a left mouse button click.

    - We bind the button click event to the `on_button_click` function using the `bind()`
    method.

    - When the button is clicked, the `on_button_click` function is executed, changing
    the button''s text to "Button Clicked!".


