    min_entry.pack(side=tk.LEFT)\n\nmax_label = tk.Label(root, text=\"Max:\")\nmax_label.pack(side=tk.LEFT)\n\
    max_entry = tk.Entry(root, width=5)\nmax_entry.pack(side=tk.LEFT)\n\n# Button\
