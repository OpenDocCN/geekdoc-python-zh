    \ \"Button Clicked!\"。这种行为是通过使用 `command` 参数将 `on_button_click()` 函数与按钮的点击事件关联起来实现的。\n\
    \n让我们分解一下这个例子中事件是如何处理的：\n\n1.  **控件创建：** 我们创建一个按钮控件 (`button`)，并将 `on_button_click()`\
    \ 函数作为按钮被点击时要执行的命令传递。\n2.  **事件绑定：** 当按钮被点击时，Tkinter 生成一个“按钮点击”事件，该事件触发 `on_button_click()`\
