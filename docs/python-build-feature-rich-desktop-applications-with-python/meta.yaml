    In this example, we''ve created a simple interactive application with event handling
    using Tkinter. Let''s break down the key components:


    1. Defining Event Handlers: We define four event handler functions:


    +   - `on_button_click`: Responds to a button click event by updating the label
    text to indicate that the button has been clicked.

    - `on_key_press`: Reacts to key presses by updating the label text to display
    the pressed key.

    - `on_mouse_enter`: Updates the label text when the mouse cursor enters the application
    window.

    - `on_mouse_leave`: Updates the label text when the mouse cursor leaves the application
    window.


    2. Creating Widgets: We create a label widget (`label`) to display instructions
    to the user and a button widget (`button`) for the user to interact with.'
