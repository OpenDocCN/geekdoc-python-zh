    -   `<Button-1>` 事件表示鼠标左键点击。\n-   我们使用 `bind()` 方法将按钮点击事件绑定到 `on_button_click`\
    \ 函数。\n-   当按钮被点击时，`on_button_click` 函数被执行，将按钮的文本更改为 \"Button Clicked!\"。\n\n\
    ### 绑定键盘事件：\n\n我们也可以将键盘事件绑定到控件。例如，让我们绑定一个按键事件，以便在按下特定键时更改按钮的文本：\n\n```python\n\
    import tkinter as tk\n\ndef on_key_press(event):\n    if event.keysym == 'Return':\
    \  # Check if the Enter key is pressed\n        button.config(text=\"Enter Pressed!\"\
    )\n\n# Create the main application window\nroot = tk.Tk()\nroot.title(\"Binding\
    \ Keyboard Events Example\")\n\n# Create a button widget\nbutton = tk.Button(root,\
    \ text=\"Click Me\")\nbutton.pack()\n\n# Connect the key press event to the on_key_press\
    \ function\nroot.bind(\"<Return>\", on_key_press)\n\n# Run the application\nroot.mainloop()\n\
    ```\n\n在这个例子中，当按下回车键时，`on_key_press` 函数会将按钮的文本更改为 \"Enter Pressed!\"。"
