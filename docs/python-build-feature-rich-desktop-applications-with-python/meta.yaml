    )\nlabel.pack()\n\n# 启动事件循环\nwindow.mainloop()\n```\n\n在这个示例中，我们使用Python内置的GUI库Tkinter创建了一个带有标签的简单窗口。代码直接且易于理解，非常适合快速原型设计和迭代开发。\n\
    \n### 广泛的库支持\n\nPython拥有庞大的库和框架生态系统，专门针对GUI开发。Tkinter、PyQt、wxPython和Kivy只是Python中可用GUI工具包的几个例子，每个都提供独特的功能和能力。\n\
    \n```python\n# 示例：创建一个PyQt应用程序\nimport sys\nfrom PyQt5.QtWidgets import QApplication,\
    \ QWidget, QLabel\n\nclass MyApp(QWidget):\n    def __init__(self):\n        super().__init__()\n\
    \        self.initUI()\n\n    def initUI(self):\n        self.setWindowTitle('你好，PyQt！')\n\
    \        self.setGeometry(100, 100, 300, 200)\n\n        label = QLabel('欢迎来到PyQt\
