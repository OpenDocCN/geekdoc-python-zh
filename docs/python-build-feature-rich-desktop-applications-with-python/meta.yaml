    \ as tk\n\nroot = tk.Tk() # 建立主窗口\nroot.title(\"My Tkinter App\") # 设置窗口标题\n```\n\
    \n## 向窗口添加控件\n\n现在，让我们探讨如何向窗口添加各种 Tkinter 控件：\n\n### 1. 标签\n\n标签用于显示文本或图像。以下是创建标签的方法：\n\
    \n```python\nlabel = tk.Label(root, text=\"Hello, Tkinter!\") # 创建一个标签控件\nlabel.pack()\
    \ # 将标签添加到窗口\n```\n\n### 2. 输入框\n\n输入框允许用户输入文本。以下是创建输入框的方法：\n\n```python\nentry\
