    \n## 事件处理\n\n事件处理是响应由用户输入触发的用户交互或系统事件的过程。事件可以包括鼠标点击、键盘输入、窗口大小调整等。在 GUI 开发中，使用事件驱动编程来处理这些事件并触发相应的操作或响应。\n\
