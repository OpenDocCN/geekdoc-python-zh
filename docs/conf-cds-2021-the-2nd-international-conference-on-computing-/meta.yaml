    The shifting hydraulic buffer valve group is composed of hydraulic buffer valve,
    hydraulic control reversing valve and solenoid valve. The on-off of the hydraulic
    buffer valve is controlled by the hydraulic control reversing valve, and the solenoid
    valve controls the on-off of the hydraulic control reversing valve. According
    to the structure of the valve group, the AMESim simulation platform is used to
    establish a model of the shifting hydraulic buffer valve group. The model is shown
    in Figure 3


    # 3 THE DESIGN PROGRAM OF BUFFER VALVE


    The above is the structural composition and simulation model of the pressure relief
    buffer valve, and the process of establishing the simulation model of the overflow
    buffer valve is similar to it, which is not repeated here. The simulation models
    of these two types of shift hydraulic buffer valves are established in AMESim
    to software to form a model library. The buffer valve design program is established
    based on Python language to call the model library, and the forward design of
    the shift buffer valve is carried out by using human-computer interaction.


    # 2.1 The Structure of Buffer Valve


    The structure of the traditional pressure relief buffer valve is shown in Figure
    1. When the vehicle is shifting, the pressure changes at the outlet A of the control
    valve with the cooperation of the buffer valve core 1, buffer spring 7 and plunger
    5, so as to control the oil pressure in the clutch for smooth shifting.


    # 2.2 AMESim Simulation Model of Buffer Valve


    The hydraulic buffer valve is an important component of the clutch pressure control
    circuit. Because it is normally open, it should be used with other hydraulic valves.
    Usually, these hydraulic valves are designed as plug-ins to form a valve group.
    Figure 2 shows the structure of the valve block used in a current vehicle.


    # 3.1 The overall structure of the program


    The program adopts a modular design as a whole, and various functions are managed
    and applied through module division. The function framework of the program is
    shown in Figure 4The design procedure of shift buffer valve includes four modules
    as a whole: model library module, parameter setting module, calculation running
    module and data processing module. The model library template can import various
    types of shift buffer valves, mainly


