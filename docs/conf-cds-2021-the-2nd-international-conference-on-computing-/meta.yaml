  md: '# Research on Design Program of Buffer Valve based on Python


    Meihua Li

    School of Science, Jiangxi University of Science and Technology, Ganzhou, China

    limeihua@jxust.edu.cn


    Keqing Wu

    School of Science, Jiangxi University of Science and Technology, Ganzhou, China,
    wukeqing@jxust.edu.cn,

    Corresponding author


    Yiming Chen

    Educational Information Technology Center, Jiangxi University of Science and Technology,
    Ganzhou, China

    chenyiming@jxust.edu.cn


    # ABSTRACT


    Buffering valve is an important component to control clutch oil pressure in vehicle
    transmission devices. Its structure is various, but different buffering valves
    have similar structures. In the design of the buffering valve, the similar calculation
    process is inevitable. In order to simplify the design process, the buffering
    valve is classified, and the key structural parameters are extracted from the
    same type of buffering valve in this paper. A valve simulation model library is
    established based on AMESim platform. A buffer valve design program is developed
    based on the API functions provided by AMESim by python. The results show that
    the developed program can simplify the simulation research of the model, solve
    the repeated calculation, improve the work efficiency of scientific research and
    shorten the design period. The AMESim model of the buffer valve is verified by
    the test. The buffer phase time of the test and simulation are 1.062s and 1.032s
    respectively, and the relative error is 2.9%. After buffering, compared with the
    valve output pressure, the test and simulation results are 2.053 MPa and 2.103
    MPa respectively, and the relative error is 5%.


    # CCS CONCEPTS


    +   • Computing methodologies → Modeling and simulation; Model development and
    analysis; Modeling methodologies.


    # KEYWORDS


    Python, AMESim, buffering valve, design


    ACM Reference Format:

    Meihua Li, Keqing Wu, and Yiming Chen. 2021. Research on Design Program of Buffer
    Valve based on Python. In *The 2nd International Conference on Computing and Data
    Science (CONF CDS 2021)*, January 28–30, 2021, Stanford, CA, USA. ACM, New York,
    NY, USA, 6 pages. https://doi.org/10.1145/3448734.3450466


    # 1 INTRODUCTION


    When the vehicle is shifting, the shift shock is likely to cause the vehicle speed
    transition to be unstable, which makes the passengers feel uncomfortable. Usually,
    the hydraulic buffer valves are introduced into the high-power automatic transmission
    to adjust the oil pressure in the clutch, so that the pressure changes slowly
    to reduce the shock, thereby improving the shift quality of the vehicle [1].Shift
    buffer valve plays a vital role in high-power automatic transmission, so the design
    of shift buffer valve also directly affects the shift quality of vehicle.


    The traditional design method adopts the steady-state design method [2], that
    is, the buffer valve is theoretically analyzed to obtain the calculation expressions
    of key parameters, and finally the corresponding values are obtained through calculation.
    This method requires theoretical analysis and calculation of different types of
    buffer valves, which often has great workload and long development cycle. With
    the development of computer technology, computer-aided design has been widely
    used in the field of hydraulics, especially the introduction of various commercial
    software, such as Matlab, ANSYS and AMESim. These software provide perfect functions
    for the design of hydraulic valves [3-5], and have also been recognized by scientific
    researchers.


    Wu et al. from Yanshan University used Matlab to design a new type of hydraulic
    buffer valve [6]. Wang from Jinggong Hydraulic Company also used Matlab to assist
    the design and calculation of the pilot buffer valve [7]. Gong et al. from Beijing
    University of Technology designed an electronically controlled hydraulic buffer
    valve based on AMESim [8]. Cai et al. from Zhejiang Gaoyu Company carried out
    the structural improvement design of the buffer valve for loaders with AMESim
    [9]. In these literatures, only software is used to simulate, design and analyze
    a certain type of buffer valve, in this way, the design of different types of
    buffer valve needs to go through many similar research processes, which can be
    completed by computer software, thereby shortening the workload and improving
    efficiency.


    Python is a widely used language in recent years, and is not constrained by the
    operating system. AMESim embeds the complete Python software into the platform,
    which can not only use script commands [10-11] for batch processing, or post-process
    the results, and can be used for secondary development to develop complete applications
    [12].


    # 2 THE STRUCTURE AND WORKING PRINCIPLE OF BUFFER VALVE


    There are various types of buffer valves, from the traditional hydraulic shift
    buffer valve to the electro-hydraulic buffer valve [13-14]. This paper mainly
    discusses the traditional hydraulic shift buffer valve. There are also many types
    of traditional shift buffer valves, but they can be divided into decompression
    type [15] and overflow type [16]. The structure of the same type of buffer valve
    is generally similar, and a decompression type shift buffer valve is taken as
    an example.


