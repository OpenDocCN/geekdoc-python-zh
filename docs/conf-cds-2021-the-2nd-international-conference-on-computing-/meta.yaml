    # 4.2 Simulation model test verification


    The program is based on the AMESim model of the buffer valve group. Therefore,
    on the one hand, to verify the feasibility of the design program, and on the other
    hand to verify the accuracy of the simulation model, a test platform for the buffer
    valve is built. The schematic diagram of the buffer valve characteristic test
    scheme is shown in Figure 11 In the test, the inlet of the buffer valve is connected
    to the outlet of the overflow valve of the system. The pressure of the overflow
    valve is set to 2MPa, and the pressure can be read out from the pressure table
    1. The outlet of the buffer valve is connected to the pressure sensor. The sensor
    transmits the signal to the oscilloscope, which can be displayed and recorded
    by the oscilloscope. Comparison of test results and program simulation results
    are shown in Figure 12 It can be seen from Figure 12 that the test and simulation
    results of buffer valve buffer characteristics are consistent, and this simulation
    model can reflect the characteristics of the valve. The time data of the buffer
    valve in the buffer stage were analyzed, and the measured value was 1.062s, the
    simulation value was 1.032s, and the relative error was 2.9%. After the buffering,
    the valve output pressure is compared, the test is 2.053MPa, and the simulation
    result is 2.103MPa, the relative error is 5%.


