    the buffer valve is determined, different key parameters can obtain different
    buffer characteristics, so it is necessary to determine the size of each key parameter.
    The design program is used to study the influence of structural parameters on
    the buffer characteristics of the buffer valve, so as to determine the setting
    range of parameters.


