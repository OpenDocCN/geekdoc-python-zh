    types of shift buffer valves, mainly


    ![](img/c142aa29d750f64941906c73b661e93e_1_1.png)'
- md: 'including pressure relief buffer valve and overflow buffer valve. The parameter
    setting module is to set the simulation parameters of the imported AMESim model.
    The calculation running module is to calculate the models by calling the functions,
    and save the calculated data.


    ## 3.2 Design of Main Modules


    - **Model Library**

    The model library module is the foundation of the program and is the collection
    and arrangement of the underlying data. This part of the work is the most complicated
    and critical. Existing buffer valves need to be analyzed and modeled, and the
    workflow is shown in Figure 5. The structure of the valve is analyzed to obtain
    the key structural parameters of the designed valve. This process is the key in
    the parameter setting module.


    - **Parameter Setting**

    The parameter setting module is one of the important modules of human-computer
    interaction in this program. It is the interface between the input data and the
    parameter setting in the simulation model. The key structural parameters of the
    valve are set as the key variables of the simulation model. These key variables
    need to be set as a global variable, which can be saved in a dictionary when programming
    with python. Take the buffer valve in Figure 2 as an example, the key variables
    for setting the valve are shown in Table 1.


    - **Other Modules**

    AMESim not only provides complete python software, but also provides python API
    (Application Programming Interface), which can be written using other python programming
    platforms, such as PyCharm. When programming using the API provided by AMESim,
    firstly initialize the interface, and import the ame_apy module in the main file.
    The ame_apy module contains the python interface provided by the AMESim software,
    such as the AMESetRunParameter() function and AMERunSimulation() function which
    used in the calculation module. AMESetRunParameter() function is used to set the
    operating parameters of simulation calculation, including simulation time, step
    length, error, etc., which AMERunSimulation() function is used to calculate simulation
    model; in data handling module, AMEGetVariableValues() function is used to obtain
    calculation results, and save the obtained results in the dictionary, which is
    convenient for drawing and generating design reports. The flowchart of report
    generation is shown in Figure 6.


    ## Table 1: Buffer Valve Key Parameter Comparison Table


    | Valve structural parameters | Global variable name of corresponding model |
    Unit |

    | :--- | :--- | :--- |

    | Parameters of buffer valve | Quality of valve core | CusMass_OF | g |

    | | Diameter of valve core | CusDiam_OF | mm |

    | | Spring stiffness | CusStif_OF | N/m |

    | | Initial tension of spring | CusPreF_OF | N |

    | | Diameter of orifice | CusHolD_OF | mm |

    | | Initial coverage | CusCove_OF | mm |

    | Parameters of Hydraulic control valve | Quality of valve core | RevMass_OF |
    g |

    | | Diameter of valve core | RevDiam_OF | mm |

    | | Initial tension of spring | RevPreF_OF | N |

    | | Spring stiffness | RevStif_OF | N/m |


    ## 4 PROGRAM EXAMPLE AND MODEL TEST VERIFICATION


    ### 4.1 Program Example


    The buffer valve design program is based on the AMESim platform, the underlying
    language uses python, and the Graphical User interface (GUI) uses the Qt library,
    which is a cross-platform GUI application development framework, and it has a
    rich visualization toolkit and application classes, combined with the python language,
    greatly improve the development efficiency, based on these platforms, the interface
    of the buffer valve design program developed in this paper is shown in Figure
    7. The program interface includes the design of pressure reducing and overflow
    buffer valves. The example takes the pressure reducing buffer valve as an example.
    The design interface of the pressure reducing buffer valve contains 4 tabs, namely
    “model selection”, “system parameters”, “valve parameters” and “result analysis”.
    The model selection tab bar is used to select the shock valve simulation model,
    and the interface is shown in Figure 8. In the “model selection” setting interface,
    the simulation models of different structural types of pressure reducing buffer
    valves can be selected, and the simulation models can also be expanded. The “system
    parameter” setting is mainly to set the parameters of the hydraulic pump, solenoid
    valve and other components involved in the simulation model, as shown in Figure
    9. After the parameters of the system are set, the parameters of the buffer valve
    need to be set, including the parameters of the hydraulic buffer valve and the
    buffer valve. The setting interface is shown in Figure 7. After setting the simulation
    model parameters, run the simulation and display the results, as shown in Figure
    10. The result analysis interface shows the calculation progress of the buffer
    valve simulation model, and the simulation result curve will be displayed, and
    the test result data can be imported and plotted, so that the simulation and test
    results can be compared. After the structure of the buffer valve is determined,
    different key parameters can obtain different buffer characteristics, so it is
    necessary to determine the size of each key parameter. The design program is used
    to study the influence of structural parameters on the buffer characteristics
    of the buffer valve, so as to determine the setting range of parameters.


    ### 4.2 Simulation model test verification


    The program is based on the AMESim model of the buffer valve group. Therefore,
    on the one hand, to verify the feasibility of the design program, and on the other
    hand to verify the accuracy of the simulation model, a test platform for the buffer
    valve is built. The schematic diagram of the buffer valve characteristic test
    scheme is shown in Figure 11. In the test, the inlet of the buffer valve is connected
    to the outlet of the overflow valve of the system. The pressure of the overflow
    valve is set to 2MPa, and the pressure can be read out from the pressure table
    1. The outlet of the buffer valve is connected to the pressure sensor. The sensor
    transmits the signal to the oscilloscope, which can be displayed and recorded
    by the oscilloscope. Comparison of test results and program simulation results
    are shown in Figure 12. It can be seen from Figure 12 that the test and simulation
    results of buffer valve buffer characteristics are consistent, and this simulation
    model can reflect the characteristics of the valve. The time data of the buffer
    valve in the buffer stage were analyzed, and the measured value was 1.062s, the
    simulation value was 1.032s, and the relative error was 2.9%. After the buffering,
    the valve output pressure is compared, the test is 2.053MPa, and the simulation
    result is 2.103MPa, the relative error is 5%.


    ## 5 CONCLUSION


    This paper describes the development process and component modules of the design
    program. Under the AMESim platform, the hydraulic buffer valve model is constructed
    using the HCD (Hydraulic Component Design) library. The valve design program is
    developed using python language, and the correctness of the AMESim model of the
    buffer valve is verified by experiments. Draw the following conclusion:


    - 1) Use python to program based on the API function provided by AMESim to construct
    the design program of the buffer valve, and to study the influence of structural
    parameters on the buffer characteristics of the valve, and the buffer valve meets
    the requirements is designed.

    - 2) The results analysis module in the program can compare and analyze the data,
    and compare the data of simulation and test results. In this paper, the AMESim
    model of the buffer valve is verified by experiments. The buffer stage time of
    the buffer valve is 1.062s and 1.032s respectively, and the relative error is
    2.9%. At the end of the buffer, comparing the output pressure of the valve, the
    test and simulation results are 2.053MPa and 2.103MPa respectively, and the relative
    error is 5%.

    - 3) The AMESim simulation model of different types of buffer valve is processed,
    so that the design program can read the simulation model, so as to expand the
    scope of use of the program and strengthen the versatility of the program. The
    Python-based design program is also of great significance to the study of the
    characteristics of the buffer valve, which can not only simplify the simulation
    of the model, but also improve the efficiency of scientific research.


