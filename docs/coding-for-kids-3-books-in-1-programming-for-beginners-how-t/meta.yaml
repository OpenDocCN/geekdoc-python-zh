    ## 第15章：数据类型和变量的重要性


    现在，让我们花点时间来看看使用 Python 语言自带的数据类型和变量可以完成的一些工作。这两者都很重要，并且在开始使用 Python 语言时会告诉我们很多信息。如果我们无法学习一些不同的数据类型，也无法很好地理解变量的工作原理，那么我们想要进行的一些编程工作将无法取得很大进展。让我们来看看
    Python 自带的一些不同数据类型，以及这些变量是如何工作的，这样我们就能将它们整合在一起，并在这个过程中看到一些出色的结果。


    ### Python 数据类型


    我们首先需要关注的是 Python 自带的数据类型。我们将在 Python 中处理的每个值都将有一个数据类型。由于这种编程语言中的所有东西都是一个对象，因此数据类型实际上是类，而变量则是这些类的实例或对象。这就是所有工作如何联系在一起的方式。


    现在，你会发现 Python 中可以出现各种类型的数据。其中最重要的一些，以及你可能会在 Python 中花费大部分时间处理的类型，将在下面进行介绍：


