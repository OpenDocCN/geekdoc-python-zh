    # What Is a Bug?


    Bugs must be the most hated creatures a programmer can have. A bug in the programmer’s
    eyes is a bug in a program. These bugs can cause errors or unintended consequences.
    Many times, a bug can be fixed after the fact. There are, of course, irremediable
    lessons. The European Ariane 5 rocket exploded within a minute of its first launch.
    An after-action investigation revealed that a floating-point number in the navigator
    was to be converted to an integer, but the value was too large to overflow. In
    addition, a British helicopter crashed in 1994, killing 29 people. The investigation
    revealed that the helicopter’s software system was “full of flaws.” In the 2001
    movie: “A Space Odyssey,” the supercomputer HAL kills almost all of the astronauts
    because of two goals in its program conflict.


    In English, bug means defect. Engineers have long used the term bug to refer to
    mechanical defects. And there’s a little story about using the word bug in software
    development. A moth once flew into an early computer and caused a computer error.
    Since then, bugs have been used to refer to bugs. The moth was later posted in
    a journal and is still on display at the National Museum of American History.


