    # The “If” Conditional Statements


    The first thing we are going to look at is regular “if” statement. This keeps
    things simple and will ensure that we are set and ready to handle some of the
    basics of these conditional statements. This one is based on the idea that the
    answer the user gives is true or it is false, depending on what conditions you
    have set. If the user adds in'
