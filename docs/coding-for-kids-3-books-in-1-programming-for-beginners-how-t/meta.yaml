    # HTTP Communication Protocol


    Communication is a wonderful thing. It allows information to be passed between
    individuals. The animals send out the chemical element and mating messages. People
    say sweet things to express their love to their lovers. The hunters whistled and
    quietly rounded up their prey. The waiter barked to the kitchen for two sets of
    fried chicken and beer. Traffic lights direct traffic, television commercials
    broadcast, and the Pharaoh’s pyramids bear the curse of forbidden entry. With
    communication, everyone is connected to the world around them. In the mysterious
    process of communication, the individuals involved always abide by a specific
    protocol. In our daily conversation, we use a set grammar. If two people use different
    grammars, then they communicate with different protocols, and eventually, they
    don’t know what they’re talking about.


    Communication between computers is the transfer of information between different
    computers. Therefore, computer communication should also follow the Communication
    Protocol Conference. In order to achieve multi-level global Internet communication,
    computer communication also has a multi-level protocol system. HTTP Protocol is
    the most common type of network protocol. Its full name is the Hypertext Transfer
    Protocol.


    The HTTP protocol enables the transfer of files, especially hypertext. In the
    Internet age, it is the most widely used Internet Protocol. In fact, when we visit
    a Web site, we usually type an HTTP URL into'
  merge: -1
  pgno: 29
- img_proc: true
  md: 'the browser, such as http://www.google.com, for example, it says that you need
    to use the HTTP protocol to access your site.


    HTTP works as a fast-food order:


    +   1. **Request**: A customer makes a request to the waiter for a chicken burger.

    2. **Response**: The server responds to the request of the customer according
    to the situation.


    Depending on the situation, the waiter may respond in a number of ways, such as:


    +   - The waiter prepares the Drumstick Burger and hands it to the customer. (Everything
    is OK)

    - The waitress found herself working at the dessert stand. He sent his customers
    to the official counter to take orders. (Redirects)

    - The waiter told the customer that the Drumstick hamburger was out. (Cannot be
    found)


    When the transaction is over, the waiter puts the transaction behind him and prepares
    to serve the next customer.


    ```

    GET /start.html HTTP/3.0

    Host: www.mywebsite.com

    ```


    In the starting line, there are three messages:


    +   - Get method. Describes the operation that you want the server to perform.

    - / start. The path to the html resource. These points to the index on the server.
    HTML file.

    - HTTP 3.0. The first widely used version of HTTP was 3.0, and the current version
    is 3.3.'
