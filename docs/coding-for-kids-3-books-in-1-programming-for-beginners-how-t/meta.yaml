    \ Query 应用程序也用作电子表格中的嵌入式工具。\n\n## 12. 异常处理\n\n### 什么是 Bug？\n\nBug 一定是程序员最讨厌的东西。在程序员眼中，bug\
    \ 就是程序中的缺陷。这些 bug 可能会导致错误或意外后果。很多时候，bug 可以在事后修复。当然，也有无法补救的教训。欧洲阿丽亚娜 5 型火箭在首次发射后一分钟内爆炸。事后调查发现，导航仪中的一个浮点数需要转换为整数，但该值太大导致溢出。此外，一架英国直升机在\
    \ 1994 年坠毁，造成 29 人死亡。调查显示，该直升机的软件系统“充满缺陷”。在 2001 年的电影《2001太空漫游》中，超级计算机 HAL 因为其程序中的两个目标冲突而杀死了几乎所有宇航员。\n\
    \n在英语中，bug 意为缺陷。工程师们长期以来一直使用 bug 这个术语来指代机械缺陷。关于在软件开发中使用 bug 这个词还有一个小故事。一只飞蛾曾飞进一台早期计算机并导致计算机错误。从那时起，bug\
    \ 就被用来指代程序错误。这只飞蛾后来被贴在一本期刊上，至今仍在国家美国历史博物馆展出。\n\n代码：\n\n```python\nfor result in\
