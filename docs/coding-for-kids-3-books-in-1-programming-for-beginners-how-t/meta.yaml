    ## How Websites Work


    我们已经了解了Web开发涉及的不同领域；我认为，让你对网站如何工作有个大致了解是合适的。首先，什么是Web开发？对于开发者或科技行业的人来说，这应该是不言而喻的。但并非我们所有人都在科技行业工作。所以在接下来的几行中，我们将探讨这个话题，当然，首先会有一些小背景知识。


