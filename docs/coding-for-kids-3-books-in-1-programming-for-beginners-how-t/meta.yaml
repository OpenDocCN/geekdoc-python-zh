    The emphasis of Machine Learning is to learn from interacting with different inputs
    and use patterns. From such interaction, Machine Learning Models can produce better
    output the longer it learns, and the more interaction it receives. To aid this
    cause, you must also try to provide as many new data as possible.


    When you realize that the output presented is not what you needed, you must retrain
    the Machine Learning Model to deliver a better output. Therefore, for a system
    that should work without human intervention, you will still have to be present
    from time to time.


    In Deep Learning, your presence is not needed. All the nested layers within the
    neural networks process data at different levels. In the process, however, the
    model might encounter errors and learn from them.


    This is the same way that the human brain works. As you grow up, you learn a lot
    of important life skills through trial and error. By making mistakes, your brain
    learns the difference between positive and negative feedback, and you strive to
    achieve positive results whenever you can.


    To be fair, even in Deep Learning, your input will still be required. You cannot
    confidently assume that the output will always be perfect. This particularly applies
    when your input data is insufficient for the kind of output you demand from the
    model.


    The underlying factor here is that both Machine Learning and Deep Learning must
    all use data. The quality of data you have will make a lasting impact on the results
    you get from these models. Speaking of data, you cannot just use any data you
    come across. To use either of these models effectively, you must learn how to
    inspect data and make sure you are using the correct format for the model you
    prefer.'
  - '[PAGE 45]


    Machine Learning Algorithms will often need labelled, structured data. For this
    reason, they are not the best option if you need to find solutions to sophisticated
    problems that need massive chunks of data.


    In the example we used to identify trucks from bicycles, we tried to solve a very
    simple issue in a theoretical concept. In the real world, however, Deep Learning
    models are applied in more complex models. If you think about the processes involved,
    from the concepts to hierarchical data handling and the different number of layers
    that data must pass through, using Deep Learning models to solve simple problems
    would be a waste of resources.


    While all these classes of AI need data to help in conducting the intelligence
    we require, Deep Learning models need significantly wider access to data than
    Machine Learning Algorithms. This is important because Deep Learning Algorithms
    must prove beyond a reasonable doubt that the output is perfect before it is passed.'
  - '[PAGE 46]


    # 7.


    # Algorithms in Programming


    While variables are the data stores in programming, algorithms are the building
    blocks. It is through algorithms that the software you use can fetch the data
    you need. Algorithms are the bridge between normal language and computer language.
    Your challenges are translated into the unique language running your software,
    before it is translated back to a language you can understand and interpret.


    The easiest way to conceptualize an algorithm is a cooking recipe. Recipes outline
    every procedure of the way from food preparation to the point the meal is ready
    to serve. This is what algorithms do. They outline the necessary procedures your
    computer must follow to achieve your intended goals.


    While still on the recipe example, in programming, we would refer to recipes as
    procedures, ingredients as inputs, and the final outcome of your recipe as an
    output. Algorithms describe how to perform a task, and each time that algorithm
    is executed, your computer will perform it in the same manner.


    To prevent confusion, we must mention that algorithms are not computer code. Algorithms
    are written in plain language that you understand. It could be English, Korean,
    Chinese, you name it. Algorithms are precise and have three sections: the start,
    the middle, and the end. When writing an algorithm, you will actually indicate
    start for the first procedure, and end for the last procedure.


    Algorithms must only include the necessary information to complete a task. They
    must be precise so that they lead you to an efficient solution. When writing algorithms,
    it is wise to number your procedures, though it is not mandatory. Some programmers
    use'
  - '[PAGE 47]


    pseudo-code, a semi-programming language that explains the procedures followed
    in an algorithm.


    Here is an example of an algorithm that requests user email addresses:


    +   - **Procedure 1:** Start

    - **Procedure 2:** Create variable to receive user email address

    - **Procedure 3:** Clear variable if not empty

    - **Procedure 4:** Request user email address

    - **Procedure 5:** Store response in variable

    - **Procedure 6:** Verify if email address is valid

    - **Procedure 7:** Invalid address? Back to Procedure 3

    - **Procedure 8:** End


