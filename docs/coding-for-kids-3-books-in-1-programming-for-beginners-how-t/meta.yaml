  mdcn: "意味着用高级编程语言编写的代码可以在任何机器或计算机上运行。\n\n现代编程世界中使用的几乎每种编程语言都是高级语言。这些语言使用语句来指示计算机执行一系列指令。以下是使用现代编程语言计算两个数字之和的示例：\n\
