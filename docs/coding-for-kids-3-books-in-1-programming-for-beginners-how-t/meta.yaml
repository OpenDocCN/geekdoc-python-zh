    ## Introduction


    Coding is a good and useful skill that every child should learn. In later years,
    this skill may be used to create and develop great things. These things may be
    intended for entertainment during the childhood and teenage years. But, many of
    these things raise an interest in programming that can later be a solid basis
    for a career in computer science, engineering, or some other computer-related
    profession. These professions today are very popular among young people.


    There are so many different programming languages, intended for creating different
    sorts of programs. The general rule is that any language can be used to make any
    kind of program. But, is it true? We will discover the answer to this question
    in this book. Some of these programming languages can be hard to learn, while
    others are as simple as the alphabet we learned as small children. Just keep in
    mind that every person (and this applies to children also) is an individual. Consider
    allowing them input when it comes to deciding which of the programming languages
    they like best. You should present them with a few, for example, Ruby, Python,
    and Java, explain to them the advantages and disadvantages are for each of them.
    Then, to keep it interesting, you might give them examples of programs and platforms
    they are familiar with and explain to them which programming language they are
    based on. For example, if you tell a child who has an account on Twitter that
    this social network was built using the Ruby programming language, they may become
    interested in learning more about Ruby, because this language is what made their
    favorite pastime possible. By learning about the programming languages that made
    their favorite games, applications, and social networks possible, they will also
    learn how to behave safely when it comes to computers and data they post on the
    Internet. So, this is another good thing that will come out of the first coding
    course.'
