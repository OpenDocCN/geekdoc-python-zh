    You will find that when these inheritances come out, we are going to see some
    of the beauty that is there with the OOP languages that we talked about before,
    and we can actually go through and reuse parts of the code that we want to work
    with.


    One of the most important out of all the concepts that come with OOP languages
    is that of the inheritance.


    This idea is going to make it easier for us to define a class based on the terms
    of another class in our code.


    This is useful because it allows us to have an easier way to create and maintain
    one of the applications that we want to work with.


    It is also going to be useful in providing an opportunity for us to reuse the
    functionality of the code and to get the implementation done faster than ever
    before.


    Any time that we want to go through and create a class, rather than having to
    go through and write out brand new members of data and members of functions each
    time that you do it, the programmer is able to designate that the new class is
    supposed to inherit the members of a class that is already found in the code.


    This can make it a lot easier than having to redefine the members and the functions
    as you go through the code again and again.'
