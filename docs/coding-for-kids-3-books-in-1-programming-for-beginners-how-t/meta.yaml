    # File Pointer


    Whenever you access a file, Program sets the file pointer.

    The file pointer is like your word processor’s cursor.

    Any operation on the file starts at where the file pointer is.

    When you open a file, and when it is set to the default access mode, which is
    “r” (read-only), the file pointer is set at the beginning of the file.

    To know the current position of the file pointer, you can use the tell() method.


    For example:


    ```

    >>> file1 = open(“sampleFile.txt”)

    >>> file1.tell()

    0

    >>> _

    ```


    Most of the actions you perform on the file move the file pointer.

    For example:


    ```

    >>> file1 = open(“sampleFile.txt”)

    >>> file1.tell()

    0

    ```'
