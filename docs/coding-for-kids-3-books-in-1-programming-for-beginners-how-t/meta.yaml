  md: '# # 1. What Is a Programming Language and Popular Programming Languages


    There are three main categories of computer programming language:


    # ## Machine Language


    This is the default computer language that is built in primitive instructions
    represented to the computer in binary code. Thus, if you want to instruct a computer,
    you must write in binary code. Here is an example of ‘hello world’ in binary:


    ```

    01001000 01100101 01101100 01101100 01101111 00100000 01110111 01101111 01110010
    01101100 01100100

    ```


    # ## Assembly Language


    Assembly languages are alternatives to machine languages. They use mnemonics to
    represent machine language instructions. Since computers cannot understand assembly
    language, we use a program called an assembler to convert assembly language code
    into machine language code. Compared to machine languages, assembly languages
    are relatively easier to learn and use, but they are still tedious because they
    are closer to machine language.


    # ## High-Level Programming Languages


    The late 1990s ushered in the development of a new generation of computer programming
    languages called high-level programming languages.


    High-level programming languages are English-like computer programming languages
    that are platform-independent, which'
  merge: -1
