    \n我们肯定会看到的一件事是，大量工作将被取代。我们已经看到能够像人类工人一样高效地堆叠和管理仓库的机器人。它们尚未在实际场景中部署，但事实是这只是时间问题。其次，我们已经看到能够从事许多体力劳动工作的机器人的发展。其中最著名的是一个能够在快餐店烹饪汉堡的机器人。对于那些推动这类工作获得每小时15美元工资的人来说，这可能是不幸的，因为目前机器人成本太高，不切实际。但如果你继续推动，在某个时候，机器人将成为一项具有成本效益的投资。无论工资情况如何，技术带来的成本下降压力几乎确保了从事体力劳动的机器人将在未来5到10年内接管大量工作。\n\
