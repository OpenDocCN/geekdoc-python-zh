  mdcn: "它会陷入自身循环并导致计算机死机。在运行程序前，请务必仔细检查条件是否已正确设置。\n\n当你开始使用 Python 编写自己的代码时，会遇到几种不同的循环类型。实际上选项很多，但我们需要重点关注三种主要类型：`while`\
    \ 循环、`for` 循环和嵌套循环。\n\n## While 循环\n\n我们要学习的第一种循环是 `while` 循环。当你明确知道代码需要循环执行的次数时，可以选择使用这种循环。例如，用它来完成从一数到十的计数。这种循环最终需要一个条件来确保它在正确的位置停止，而不是无限运行下去。如果你希望循环在进入代码下一部分之前至少执行一次，这也是一个不错的选择。`while`\
    \ 循环的一个好例子是以下代码：\n\n```python\n#calculation of simple interest. Ask the user to\
    \ input the principal,\n#rate of interest, number of years.\n\ncounter = 1\n\n\
    while (counter <= 3):\n\n    principal = int(input(\"Enter the principal amount:\
    \ \"))\n\n    numberofyears = int(input(\"Enter the number of years: \"))\n\n\
    \    rateofinterest = float(input(\"Enter the rate of interest: \"))\n\n    simpleinterest\
    \ = principal * numberofyears * rateofinterest / 100\n\n    print(\"Simple interest\
    \ = %.2f\" % simpleinterest)\n\n    #increase the counter by 1\n    counter =\
    \ counter + 1\n\nprint(\"You have calculated simple interest for 3 times!\")\n\
    ```\n\n通过上面的例子，你会发现用户可以输入对他们和程序最有意义的信息。然后，代码会根据用户提供的信息计算出利率。在这个例子中，我们在代码开头设置了\
    \ `while` 循环，并告诉它最多只循环三次。你也可以修改代码，让它按照你想要的次数进行循环。\n\n## 使用 For 循环\n\n`while` 循环可以帮助我们完成代码中循环部分的许多不同任务。除了处理\
    \ `while` 循环能做的一些工作外，我们还可以使用 `for` 循环。当你使用 `for` 循环时，你使用的是两种循环中更传统的一种，你甚至可以将其作为你一直使用的选项。\n\
    \n当你使用 `for` 循环时，用户不会向代码提供信息然后循环才开始。相反，`for` 循环被设置为按照元素在屏幕上出现的顺序进行迭代。它不需要用户输入，因为它会一直持续迭代直到结束。一个展示\
    \ `for` 循环工作原理的代码示例如下：\n\n```python\n# Measure strings word to:\nwords = ['apple',\
    \ 'mango', 'banana', 'orange']\nfor w in words:\n    print(w, len(w))\n```\n\n\
    将这段代码写入你的编译器并执行。`for` 循环将确保上面一行中的所有单词都按照你编写的方式显示在屏幕上。如果你想让它们以不同的顺序显示，你需要在编写代码时就做好安排，而不是之后再改。你可以在这个循环中添加任何你想要显示的单词或其他信息，只需确保从一开始顺序就是正确的。\n\
    \n## 嵌套循环\n\n我们还可以通过了解嵌套循环的工作原理来结束这部分内容。这是一种更高级的循环类型，它将两种其他循环类型组合在一起，使它们能够同时运行。在许多情况下你都可以使用这种嵌套循环，这通常取决于你想要完成的代码类型以及你希望从中得到什么。\n\
    \n我们在这里能够使用的第三种循环类型被称为嵌套循环。任何时候你使用这种循环，你基本上是将一种其他类型的循环放置在另一个不同的循环内部。这两个循环最终会在代码中同时运行，并且它们都会持续运行直到完成。在许多情况下，你会希望专注于这些嵌套循环来帮助你完成代码。\n\
    \n例如，你可能会发现你想要创建一个新的乘法表，嵌套循环将是完成这项任务的好选择。为了满足我们的需求并了解嵌套循环如何工作，我们需要使用的代码如下：\n\n\
    ```python\n#write a multiplication table from 1 to 10\n\nfor x in range(1, 11):\n\
    \    for y in range(1, 11):\n        print('%d * %d = %d' % (x, y, x * y))\n```\n\
    \n当你得到这个程序的输出时，它看起来会类似于这样：\n\n1*1 = 1\n1*2 = 2\n1*3 = 3\n1*4 = 4\n\n一直到 1*10 =\
