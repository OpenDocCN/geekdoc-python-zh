  md: '# 3.


    # Functions, Input, Output


    # Functions


    In this phase, you will know how to write functions easily in a program. Functions
    are a line of codes, which are designed to perform a particular job. When you
    want to write a program that will perform a specific task, then you have to define
    the function and call the function. Furthermore, I will teach you how to pass
    information to functions and display them on the screen.


    At times, the best way to explain a thing is to provide an example. The program
    below is a welcome program that prints a message.


    ```

    def welcome_user():

    """ Transmit a Welcome Message."""

    Print("Welcome to Learning Programming.")

    welcome_user()

    ```


    In this example, it shows the simplest structure of how a function works. The
    first line uses the keyword “def” to tell the interpreter that you want to define
    a function. Therefore, whenever you see the word “def” and the word following
    it, it signifies a function definition. The parenthesis does the job of holding
    the information you need. Then after the parentheses, the function definition
    ends with a colon.


    Whenever you see an indented line after defining a function, which is the body
    of the function. The second line is known as a docstring, although it is a comment
    and describes the purpose of the function.'
