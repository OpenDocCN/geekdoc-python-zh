    Output:

    IndexError: list index out of range


    The above type of Error that the compiler finds only at Runtime is called the
    Runtime Error. Because Python is a dynamic language, many operations must be performed
    at run time, such as determining the type of a variable. As a result, Python is
    more prone to run-time errors than a static language.


    There is also a type of Error called a Semantic Error. The compiler thinks that
    your program is fine and can run normally. But when you examine the program, it
    turns out that it’s not what you want to do. In general, such errors are the most
    insidious and the most difficult to correct. For example, here’s a program that
    prints the first element of a list.


    ```

    mix = [“first”, “second”, “third”]


    print(mix[1])

    ```


    There is no error in the program, normal print. But what you find is that you
    print out the second element, B, instead of the first element. This is because
    the Python list starts with a subscript from 0, so to refer to the first element,
    the subscript should be 0, not 1.


