    path, we just simply import a module by its name. The reason for this is that
    Python has a module that looks for paths called ‘search path module.’ This module
    is used specifically to find the path of module files that are imported by the
    import statements.


    In some cases, you might need to configure the path search of modules to be able
    to use new modules that are not part of the standard library. You need to customize
    it to include these new modules. The search path is simply the concatenation of
    the home directory, directories of PYTHONPATH, directories of the standard library,
    and optionally if the content of files with extension .pth when they exist. The
    home directory is set automatically by the system to a directory of Python executable
    when launched from the interactive session, or it can be modified to the working
    directory where your program is saved. This directory is the first to be searched
    when import a module is run without a path. Hence, if your home directory points
    to a directory that includes your program along with the modules, importing these
    modules does not require any path specification.


    The directory of the standard library is also searched automatically. This directory
    contains all default libraries that come with Python. The directories of PYTHONPATH
    can be set to point toward the directory of new modules that are developed. In
    fact, PTYHONPATH is an environment variable that contains a list of directories
    that contains Python files. When PTYHONPATH is set, all these paths are included
    in the Python environment, and the search path directory would search these directories
    too when importing modules. Python also allows defining a file with .pth extension
    that contains directories, one in each line. This file serves the same as PTYHONPATH
    when included appropriately in a directory. You can'
  - '[PAGE 191]


    check the directories’ paths included when you run Python using sys.path. You
    simply print sys.path to get the list of the directories that Python will be searching
    for.


    Remember, when importing a module, we just use the name of the module without
    its extension. When Python is searching for a module in its environment paths,
    it selects the first name that matches the module name regardless of the extension.
    Because Python allows using packages that are coded in other languages, it does
    not simply select a module with .py extension but a file name or even a zip file
    name that matches the module name being imported. Therefore, you should name your
    modules distinctly and configure the search path in a manner that makes it obvious
    to choose a module.


    When Python finds the source code of the module file with a name that corresponds
    to the name in the import statement, it will compile it into byte code in case
    it is required. This step is skipped if Python finds an already byte code file
    with no source code. If the source code has been modified, another byte code file
    is automatically regenerated by Python while the program runs in other further
    executions. Byte code files have typically .pyc extension. When Python is searching
    and finds the module file name, it will load the byte code file that corresponds
    to the latest version of the source code with .py extension. If the source code
    is newer than the byte code file, it will generate a new one by compiling the
    source code file. Note that only imported files have corresponding files with
    .pyc extension. These files, the byte code files, are stored on your machine to
    make the imports faster in future use.


    The third step of the import statement is running the module’s byte code. Each
    statement and each assignment in the file are executed. This allows generating
    any function, data objects, and so on defined in the module. The functions and
    all attributes are accessed within the program via importers. During this step,
    you will see print statements if they exist. The ‘def ‘ statement will create
    a function object to be used in the main program.


    To summarize the import statement, it involves searching for the file, compiling
    it, and running the byte code file. All other import'
  - '[PAGE 192]


    statements use the module stored in memory and ignore all the three steps. When
    first imported, Python will look in the search path module to select the module.
    Hence, it is important to configure correctly the path environment variable to
    point to the directory that contains new defined modules. Now that you have the
    big picture and the concept of modules, let’s explore how we can define and develop
    new modules.'
