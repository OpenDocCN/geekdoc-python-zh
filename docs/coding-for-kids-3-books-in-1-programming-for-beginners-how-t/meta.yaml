    \n它还创建了一个call()方法用于手机拨号，这个方法将显示一条消息，说明手机正在拨号。\n\n要实例化一个子类，我们所做的是写一个变量，它将是手机类，我们插入不同的参数，例如华为品牌、ARM处理器以及其他特性。然后我们将调用call()方法，以便我们的手机拨号，最后，我们想查看我们手机的品牌是什么。"
