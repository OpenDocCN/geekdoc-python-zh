    correct, and that also doesn’t lead to bugs or crashes. But, they may generate
    the wrong answers. This can be a problem because these logic errors might be hard
    to track down or even recognize. Sometimes, the erroneous assumptions that the
    programmer has in their mind are programmed into the computer.'
