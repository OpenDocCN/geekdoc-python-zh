  md: 'The official version of Python mainly provides compiler/interpreter functionality.
    Other unofficial versions have richer features and interfaces, such as a more
    user-friendly graphical interface, a text editor for Python, or an easier to use
    module management system for you to find a variety of extension modules. In unofficial
    Python, the two most commonly used are:


    +   1) Anaconda

    2) Thought Python Distribution (EPD)


    Both versions are easier to install and use than the official version of Python.
    With the help of a module management system, programmers can also avoid annoying
    problems with module installation. So, it’s highly recommended for beginners.
    Anaconda is free, and EPD is free for students and researchers. Because of the
    graphical interface provided, their use method is also quite intuitive. I strongly
    recommend that beginners choose one of these two versions to use. The exact usage
    can be found in the official documentation and will not be repeated here.


    # Virtualenv


    You can install multiple versions of Python on a single computer, and using virtualenv
    creates a virtual environment for each version of Python. Here’s how to install
    virtualenv using Python’s included pip.


    ```

    $pip install virtualenv

    ```


    You can create a virtual space for a version of Python on your computer, such
    as:


    ```

    $virtualenv –p /usr/bin/Python3.5 virtualPythonexample

    ```


    In the above command, /usr/bin/Python3.5 is where the interpreter is located,
    and virtualPythonexample is the name of the newly created virtual environment.


    The following command can start using the MYENV virtual environment:


    ```

    $source virtualPythonexample/bin/activate

    ```


    To exit the virtual environment, use the following command:


    ```

    $deactivate

    ```'
