  md: '# CHAPTER 4:


    # Debugging


    Debugging is the process or technique used to detect and eliminate problems that
    arise during writing and execution of a program. Since its incorporation in the
    1940s, computer debugging has become one of the techniques used to prevent errors,
    bugs as well as mistakes arising during programming processes. The direct opposite
    of the term is anti-debugging, which entails reversing the method of detecting
    and removing such errors with tools like modified codes, API-based and timing,
