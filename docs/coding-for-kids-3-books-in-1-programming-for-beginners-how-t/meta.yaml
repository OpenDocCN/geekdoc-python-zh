    #!/usr/bin/env Python

    In the terminal, change the installation.py to executable:

    $chmod installation.py

    Then, on the command line, type the name of the program file, and you’re ready
    to run it using the specified interpreter:

    $./installation.py

    If the installation.py is in the default path, then the system can automatically
    search for the executable and run it in any path:

