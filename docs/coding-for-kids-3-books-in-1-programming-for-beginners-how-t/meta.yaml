    SQL programming, especially for putting it into practice in creating databases
    and tables, allows you to advance your learning skills.


    ## Creating Your First Database and Table Using Command Line


    You use SQL commands and statements to create databases and tables. The same applies
    to SQL Server Management Studio like the above guide, but commands and statements
    are used to give instructions to the system to perform a given function. As to
    build your first database, you use the command `SELECT DATABASE (database_name)`
    and hitting the execute button to create the program. The message on the screen
    should, therefore, be ''Command(s) completed successfully,'' showing that your
    database has been created.


    As to use the database, run the command `USE (database_name)`, which tells the
    query window to run the new database program. On the other hand, creating a new
    table entails running the command `CREATE TABLE (table_name)`. Entering data follows
    the command `INSERT DATA INTO (table_name), VALUES (table_name)`, and repeating
    the same process for all the datasets you have. The same also allows for viewing
    the data you saved and includes the command format `SELECT * FROM (table_name)`.
    All the above commands are the critical ones when it comes to maneuvering through
    different SQL databases. As such, it is always essential to learn about each SQL
    basic commands to execute programs readily.


    ## 11. Working with Popular Apps


    Machines have different applications that run independently or dependent on other
    programs without damaging other programs in the system unless triggered. When
    you open one app, for instance, it tends to perform its essential functions with
    limited hindrance to other programs already running. This phase will then discuss
    popular applications used as programming language tools, especially in database
    management systems. You should note that computer applications come from different
    developers, with some designing more than one, such as significant companies like
    Microsoft. Therefore, using various computer programs tend to differ more so on
    functionality and design.


    ### Using SQLite


    Unlike other database management systems, SQLite is a relational database system
    (RDBMS) but not a client-server database. The software program was developed by
    Richard Hipp and first released in August 2000. SQLite is crucial as an embedded
    database application essential as a storage application for both client and local
    on platforms such as web browsers. As such, it is mostly used in database engines
    as it readily binds to different programming languages. It is, therefore, crucial
    for operating systems, embedded systems, and web browsers.


    When compared to other databases such as MySQL, Oracle, and SQL Servers, SQLite
    functions differently as it may purpose is to solve a unique problem when it comes
    to local data storage for individual use. In this case, SQLite is suitable for
    the internet of things and embedded gadgets such as smartphones as it lacks an
    administrative function as well as thriving in network edges. As already mentioned,
    SQLite is also essential in websites for medium and low traffic sites on database
    usage. It is also applicable in file formatting as an on-disk and data analysis
    for more massive datasets by use of the SQLite3 command-line shell. Other applications
    include caching of enterprise data, informational transfer, archiving files, ad
    hoc replacement, and as a training tool for educational purposes.


    ### Using Apache OpenOffice Base


    Apache OpenOffice is another database system and a successor of OpenOffice.org
    consisting of a word processor, spreadsheet, presentation software, drawing application,
    database management software, and formula editor. Apache OpenOffice can write
    different file formats, including Microsoft office, while being compatible with
    Linux, Windows, and macOS. It is a product of the Apache Software Foundation initially
    released in May 2018. Besides, it is an open office productivity software and
    easy to use as it incorporates all other file formats, used immediately on the
    acquisition, and supported by thousands of enthusiasts.


    ### Using PostgreSQL


    Also known as Postgre, PostgreSQL is another free and open-source RDBMS designed
    to handle significant workloads from individual computers commercial use. It focuses
    on extensibility, and technical standards primarily create for Mac users. However,
    versions of Linux, Windows, and other operating systems are available. PostgreSQL
    was first introduced in the market in July 1996, developed by PostgreSQL Global
    Development Group. As a database management system, this software allows for the
    isolation of transactions as well as the atomicity and consistency of data handling.
    Development began in 1982 with the current modifications allowing for user-friendly
    interfaces suitable for the addition of custom functions essential for programming
    languages such as Python, JavaScript, and C/C++.


    ### Using Adobe ColdFusion


    First released in 1995, ColdFusion is commercial use software primarily for web
    application development. It was created by J. J. Allaire and enhanced by Adobe
    Systems Incorporated as a programming language to link HTML pages to databases
    and included IDE in 1996. Using Adobe ColdFusion allows you to experience a new
    system full of unique features to handle different types of data. It accompanies
    an expressive and powerful function making the creation and designing of modern
    web application software much higher when compared to other programming languages.
    As a database management system, Adobe ColdFusion allows users to access simplified
    databases accompanied by other benefits such as client/server management, code
    generation, and operational graphics, among others.


    ### Using PHP


    PHP (Hypertext Preprocessor) is a multipurpose scripting computer language designed
    by Rasmus Lerdorf in 1994 and released in 1995. It was previously referred to
    as Personal Home Pages used to develop Static and Dynamic websites as well as
    web applications. The scripts created and designed by PHP can only be read and
    interpreted by servers that have a PHP program installed. Using PHP is one of
    the ways to learn how to code values, which results in the development of newer
    versions of web applications. PHP ran on web servers, command lines, client-side
    graphical user interface, and supported on various web hosting platforms. The
    way it enables users to operate readily, build, customize, and have an extension
    of their own when working with PHP.


    ### Using IBM Db2


    Db2 is a group of database products such as servers developed by IBM and was first
    released in 1993. It is compatible with Linux, Windows, and UNIX operating systems
    written in C/C++, Java, and assembly computer languages. It supports different
    functions, which include object-relational and non-relational features such as
    XML. When compared to SQL, Db2 also accompanies tables but includes objects, for
    instance, indexes significant data containers, for example, table''s spaces. While
    SQL is a standard computer programming tool that focuses on data tables accessed
    in a relational database; Db2 family consists of databases, warehouses, BigSQL,
    event store, and cloud-oriented objects such as warehouse on the cloud. The use
    of IBM Db2 allows for data storage, analysis, and immediate retrieval when the
    need arises as it fit with oriented features crucial for system functionality.


    ### Using Oracle Express


    Oracle Express is a web-based software that runs on Oracle database systems developed
    by Oracle Corporation with the first release in 2004. It supports different operating
    systems such as Linux, Oracle Solaris, and HP-UX essential for the creation of
    complex web applications used in modern web browsers. The Oracle Express application
    includes the system menu commands and database home pages, which help in the production
    of environments that facilitates its functions. System menu commands allow users
    to access the original features of the database, while home pages are crucial
    for performing different database administrative functions. Some of the functions
    include monitoring of database storage and sessions and initialization parameters.
    The use of Oracle Express allows a user to, therefore, run values which help in
    computer languages crucial for modern web browsers.


    ### Using MariaDB


    MariaDB is a form of MySQL relational database management system as well free
    and open-source application. Released in October 2009, MariaDB was designed to
    be highly compatible with the MySQL database. However, the compatibility has risen
    to become a drop-in replacement of the use of MySQL over time. In comparison,
    however, MariaDB is quite faster and secure with recent updates of up to two times
    when compared to MySQL. More so, you can integrate data from MariaDB while using
    one node timely with other database systems. MariaDB can again connect to the
    different databases but take various processes depending on the operating system.'
  mdcn: '用于组织或管理目的。通常，对SQL编程有一个大致的了解，特别是将其应用于创建数据库和表，能够提升你的学习技能。


    ## 使用命令行创建你的第一个数据库和表


    你使用SQL命令和语句来创建数据库和表。这与上述指南中的SQL Server Management Studio类似，但命令和语句用于向系统发出指令以执行特定功能。要构建你的第一个数据库，你可以使用命令
    `SELECT DATABASE (database_name)` 并点击执行按钮来创建程序。因此，屏幕上应显示“命令已成功完成”，表明你的数据库已创建。


    要使用该数据库，运行命令 `USE (database_name)`，这会告诉查询窗口运行新的数据库程序。另一方面，创建新表需要运行命令 `CREATE TABLE
    (table_name)`。输入数据则遵循命令 `INSERT DATA INTO (table_name), VALUES (table_name)`，并对所有数据集重复相同的过程。同样的，要查看你保存的数据，可以使用命令格式
    `SELECT * FROM (table_name)`。以上所有命令对于操作不同的SQL数据库至关重要。因此，学习每个SQL基本命令以轻松执行程序总是非常重要的。


    ## 11. 使用流行应用程序


    机器有不同的应用程序，它们可以独立运行，也可以依赖其他程序运行，除非被触发，否则不会损坏系统中的其他程序。例如，当你打开一个应用程序时，它倾向于执行其基本功能，对已经运行的其他程序干扰有限。本节将讨论用作编程语言工具的流行应用程序，特别是在数据库管理系统中。你应该注意，计算机应用程序来自不同的开发者，有些开发者设计了多个应用程序，例如像微软这样的大公司。因此，使用不同的计算机程序往往在功能和设计上差异更大。


    ### 使用 SQLite


    与其他数据库管理系统不同，SQLite是一个关系数据库系统（RDBMS），但不是客户端-服务器数据库。该软件程序由Richard Hipp开发，于2000年8月首次发布。SQLite作为一个嵌入式数据库应用程序至关重要，它在Web浏览器等平台上是客户端和本地存储应用程序。因此，它主要用于数据库引擎，因为它可以轻松绑定到不同的编程语言。因此，它对于操作系统、嵌入式系统和Web浏览器至关重要。


    与MySQL、Oracle和SQL Server等其他数据库相比，SQLite的功能不同，因为它的目的是解决个人使用本地数据存储的独特问题。在这种情况下，SQLite适用于物联网和智能手机等嵌入式设备，因为它缺乏管理功能，并且在网络边缘也能良好运行。如前所述，SQLite对于中低流量网站的数据库使用也很重要。它也适用于文件格式化，作为磁盘上的文件，以及通过使用SQLite3命令行shell对更大数据集进行数据分析。其他应用包括企业数据缓存、信息传输、文件归档、临时替换以及作为教育目的的培训工具。


    ### 使用 Apache OpenOffice Base


    Apache OpenOffice是另一个数据库系统，是OpenOffice.org的后继者，包含文字处理器、电子表格、演示软件、绘图应用程序、数据库管理软件和公式编辑器。Apache
    OpenOffice可以写入不同的文件格式，包括Microsoft Office，同时兼容Linux、Windows和macOS。它是Apache软件基金会的产品，于2018年5月首次发布。此外，它是一款开源办公生产力软件，易于使用，因为它集成了所有其他文件格式，获取后即可立即使用，并得到数千名爱好者的支持。


    ### 使用 PostgreSQL


    也称为Postgre，PostgreSQL是另一个免费的开源RDBMS，旨在处理从个人计算机到商业使用的大量工作负载。它专注于可扩展性，技术标准主要为Mac用户创建。但是，也有适用于Linux、Windows和其他操作系统的版本。PostgreSQL于1996年7月首次推向市场，由PostgreSQL全球开发组开发。作为数据库管理系统，该软件允许事务隔离以及数据处理的原子性和一致性。开发始于1982年，当前的修改允许用户友好的界面，适合添加对Python、JavaScript和C/C++等编程语言至关重要的自定义函数。


    ### 使用 Adobe ColdFusion


    ColdFusion于1995年首次发布，是一款主要用于Web应用程序开发的商业软件。它由J. J. Allaire创建，并由Adobe Systems Incorporated增强，于1996年成为一种将HTML页面链接到数据库的编程语言，并包含IDE。使用Adobe
    ColdFusion，你可以体验一个充满独特功能的新系统，以处理不同类型的数据。它伴随着表达力强且功能强大的功能，使得创建和设计现代Web应用程序软件比其他编程语言更高。作为数据库管理系统，Adobe
    ColdFusion允许用户访问简化的数据库，并附带其他好处，如客户端/服务器管理、代码生成和操作图形等。


    ### 使用 PHP


    PHP（超文本预处理器）是一种多用途脚本计算机语言，由Rasmus Lerdorf于1994年设计，1995年发布。它以前被称为个人主页，用于开发静态和动态网站以及Web应用程序。由PHP创建和设计的脚本只能由安装了PHP程序的服务器读取和解释。使用PHP是学习如何编码值的方法之一，从而导致开发更新版本的Web应用程序。PHP可以在Web服务器、命令行、客户端图形用户界面上运行，并支持各种Web托管平台。它使用户能够轻松操作、构建、自定义，并在使用PHP时拥有自己的扩展。


    ### 使用 IBM Db2


    Db2是IBM开发的一组数据库产品，如服务器，于1993年首次发布。它兼容Linux、Windows和UNIX操作系统，使用C/C++、Java和汇编计算机语言编写。它支持不同的功能，包括对象关系和非关系特性，如XML。与SQL相比，Db2也包含表，但包括对象，例如索引等重要数据容器，例如表空间。而SQL是一种标准的计算机编程工具，专注于在关系数据库中访问的数据表；Db2系列包括数据库、数据仓库、BigSQL、事件存储和面向云的对象，如云上数据仓库。使用IBM
    Db2允许数据存储、分析和在需要时立即检索，因为它配备了对系统功能至关重要的面向对象特性。


    ### 使用 Oracle Express


    Oracle Express是一款基于Web的软件，运行在Oracle数据库系统上，由Oracle公司开发，于2004年首次发布。它支持不同的操作系统，如Linux、Oracle
    Solaris和HP-UX，这些对于创建在现代Web浏览器中使用的复杂Web应用程序至关重要。Oracle Express应用程序包括系统菜单命令和数据库主页，这些有助于创建促进其功能的环境。系统菜单命令允许用户访问数据库的原始功能，而主页对于执行不同的数据库管理功能至关重要。一些功能包括监控数据库存储和会话以及初始化参数。因此，使用Oracle
    Express允许用户运行对现代Web浏览器至关重要的计算机语言值。


    ### 使用 MariaDB


    MariaDB是MySQL关系数据库管理系统的一种形式，也是一个免费的开源应用程序。MariaDB于2009年10月发布，旨在与MySQL数据库高度兼容。然而，随着时间的推移，这种兼容性已经上升到可以替代MySQL的使用。相比之下，MariaDB更快、更安全，最近的更新速度是MySQL的两倍。更重要的是，你可以使用一个节点及时地从MariaDB集成数据，并与其他数据库系统集成。MariaDB还可以连接到不同的数据库，但根据操作系统采取不同的过程。'
