- md: '## Syntax in SQL


    A line in computer programming contains just tabs, spaces, and possibly a comment
    called a blank line, which is usually ignored by the Python''s interpreter. While
    a physical line, on the other hand, is a sequence of characters that is terminated
    at the end-of-line sequence. The Python syntax uses words known as reserved words,
    and these words are as follows: false, class, finally, none, continue, for, from,
    global, as, assert, break, etcetera.


    Lua syntax is a high-level multi-paradigm that contains a lot of instructions
    that were created for a specific use and execution of a task. The Lua program
    allows programmers to implement namespaces, classes, and other features. Lua is
    simple and flexible; Haskell syntax is a multi-dimensional language, and here
    are the few reasons why it is so. Haskell syntax is a language that is suitable
    for any kind of program, which is why Haskell syntax is addressed as a general-purpose
    language.


    Aside from its ability to fit into any program, it is also a statically typed
    language. The Haskell program is divided into two phases, the compile time and
    the run time. When each of your variables has a type that indicates the kind of
    data that variable is allowed to hold, it is a compile-time phase. Java and C
    syntax are examples of statically typed languages.


    In addition, Haskell can allow you to create anonymous functions, get them stored
    in variables, and pass them to other functions as an argument. The functions of
    the Haskell language will always produce the same result and value.


    I believe by now, you already have an overview of what syntax is all about. Syntax
    is simply sticking to grammar and rules guiding the programming languages. Every
    language has its own syntax, likewise SQL. Every punctuation, symbol, and character
    has a meaning when used in SQL. Every command in SQL must end with a semicolon.
    When writing a command, whether while using SQL or another programming language,
    it is effective that you learn and do things according to the rules. Leaving too
    much space, using a capital letter can cause a syntax error, if it is the punctuation
    or letters used wrongly. Preventing syntax error is possible if you always create
    a clean and concise programming command.


    ## Creating Your First Database


    Before having a successful database with practical tables in SQL programming,
    both the creation of a database and then a table is required. However, there are
    several SQL data application software out there, but all have almost a similar
    step of creating a new database and tables. When you create your first database
    system, you will then have to design a table where you will feed your data and
    store it more securely and effectively. SQL offers a free graphical user interface,
    and it is easy to create. The following is a step-by-step guide on how to create
    your first SQL database and tables before thinking of feeding your data.


    ### Steps


    ### Step 1: SQL Server Management Studio Software Installation


    The first step in creating your first database and table is by acquiring the SQL
    software available for free online from Microsoft. This software comes fully packed,
    allowing you to interact and manage the SQL server with limited command-line instructions.
    Besides, it is crucial when it comes to using databases when in remote regions.
    Mac users can, however, utilize open-source programs, for instance, SQuirrel SQL,
    to maneuver through the database system.


    ### Step 2: Launch the SQL Studio


    When you launch the SQL studio, the software occasionally requests for a server
    at first that you will prefer using all along or the one you are using presently.
    If you have an already existing one, you may choose to input the permissions,
    authenticate, and connect. Some may prefer local database systems by setting a
    new name, authenticate using a preferred name or address. Launching the SQL server
    management studio begins the process of interacting with the software and a path
    to creating your first database and table.


    ### Step 3: Identify Database Folder


    Immediately after the connection is made on either the local or remote, a window
    will open on the left of the screen. On top, there will be a server where it will
    connect to. If not, you may click on the icon ‘+,’ which will display multiple
    elements, including the option to create a new database. In some versions, you
    may see the icon for creating a new database immediately on the left drop-down
    window. You can then click on ‘Create New Database.’


    ### Step 4: Create a New Database


    As mentioned in step 3, the drop-down menu will fully display multiple options,
    including the one to create a new database. First, you will configure the database
    according to your parameters as well as providing the name for ease of identification.
    Most users prefer leaving the settings in their default, but you can change them
    if you are familiar with how they impact your process of data storage in the system.
    Note that when you create the database name, two files will generate automatically:
    the data file and log file. Data files are responsible for the storage of data
    while log files track all the changes, modifications, and other alterations made
    in the database.


    ### Step 5: Create Your Tables


    Databases often do not store data unless structures in forms of rows and tables
    are created for that data to remain organized. Tables are the primary storage
    units where data is held, but initially, you have to create the table before you
    insert the information. Similar to creating a new database, tables are also straightforward
    when creating. In the Databases folder, expand the window then right-click on
    Tables and choose ‘New Table.’ Windows will open, displaying a table that can
    be easily manipulated towards the number of rows and columns, titles, and how
    you want to organize your work. In this step, you will succeed in creating both
    the database and table, therefore, moving forward in organizing your task.


    ### Step 6: Developing the Primary Key


    The primary key plays a significant role in databases as it acts as a record number
    or ID for easy identification and remembrance when you view the page later. As
    such, it is highly recommended creating these keys in the first column. There
    are many ways to do this and include entering the ID in the column field by typing
    ‘int’ and deselecting the ‘Allow Nulls.’ Select the key icon found in the toolbar
    and mark it as the Primary key.


    ### Step 7: Structure the Tables


    Tables typically have multiple columns, also referred to as fields, and each column
    represents one element of data entries. When creating your table, you initially
    structure it to fit the number of data entries, therefore essential for each dataset
    as other primary keys. Thus, the structuring process will entail identifying each
    column with a given set of data. For example, First name column, Last name, and
    address column, among others.


    ### Step 8: Creating Other Columns


    Immediately you create the columns for primary keys; you will notice that there
    appear more columns below it. These are not for primary keys but essential for
    the insertion of other information. As such, ensure you input the correct data
    for each column to avoid filling the table with the wrong information. In the
    column, you will enter the ‘nchar,’ which is a data type for text, ‘int’ used
    for whole numbers, and ‘decimal’ for storage of decimal numbers.


    ### Step 9: Saving the Table


    After you finish creating the content in each field, you will notice that your
    table will consist of rows and columns. However, you will need to first save the
    table before entering the information. This can be done by selecting the Save
    icon also in the toolbar and name your table. When naming your table, ensure that
    you create a name that you can easily relate to the content or recognize. Besides,
    databases with different tables should have different names so that they can be
    identified easily.


    ### Step 10: Add Data


    Once the table is saved, you can now add the data into the system feeding each
    field with relevant information. However, you can confirm if the table is saved
    by expanding the Tables Folder and try to see if our table name is listed. If
    not, use the Table Folder to refresh the tables, and you will see your table.
    Back in the table, Right-click on the table where a drop dialog box will appear
    and select ‘Edit Top 200 Rows’. The Window will then display fields for you to
    add data but ignore the primary keys as they will fill automatically. Continue
    with the same process until when you enter the last data in the table.


    ### Step 11: Running the Table


    After you have finished working on the table, you have to save the content so
    that you do not lose your work. As the table is already saved, click on ‘Execute
    SQL’ on the toolbar when you have finished entering data, and it will execute
    the process of feeding each data you entered into the columns. The parsing process
    may take a few seconds, depending on a load of data. If there are any errors in
    the feeding process, the system will show you where you input data incorrectly.
    More so, you can execute the program parsing of all the data by using the combination
    of ‘ctrl’ and ‘R.’


    ### Step 12: Data Querying


    At this step, you have created your first database and table and successfully
    saved the information through SQL language programming. The database is now fully
    functional, and you henceforth create more tables within a single database. However,
    there is a limit on how many tables per database, but many users do not worry
    about this rule. You can, therefore, create new database systems you want and
    create more tables. At this end, you can query your data for reports or any relevant
    purposes, such as'
  mdcn: '## SQL 中的语法


    计算机编程中的一行仅包含制表符、空格，以及可能被称为注释的内容，Python 解释器通常会忽略这些内容。而物理行则是在行尾序列处终止的字符序列。Python
    语法使用被称为保留字的词语，这些词语如下：false、class、finally、none、continue、for、from、global、as、assert、break
    等等。


    Lua 语法是一种高级多范式语言，包含许多为特定用途和任务执行而创建的指令。Lua 程序允许程序员实现命名空间、类和其他功能。Lua 简单而灵活；Haskell
    语法是一种多维语言，以下是其如此的几个原因。Haskell 语法是一种适用于任何类型程序的语言，这就是为什么 Haskell 语法被称为通用语言。


    除了能够适应任何程序外，它还是一种静态类型语言。Haskell 程序分为两个阶段：编译时和运行时。当你的每个变量都有一个类型，表明该变量允许保存的数据种类时，这就是编译时阶段。Java
    和 C 语法是静态类型语言的例子。


    此外，Haskell 允许你创建匿名函数，将它们存储在变量中，并将它们作为参数传递给其他函数。Haskell 语言的函数总是产生相同的结果和值。


    我相信到现在，你已经对语法有了一个概览。语法就是遵循指导编程语言的语法规则。每种语言都有自己的语法，SQL 也不例外。在 SQL 中使用的每个标点符号、符号和字符都有其含义。SQL
    中的每个命令都必须以分号结尾。在编写命令时，无论是使用 SQL 还是其他编程语言，学习并按照规则行事都是有效的。留出太多空格、使用大写字母，如果标点符号或字母使用错误，都可能导致语法错误。如果你总是创建简洁明了的编程命令，就可以防止语法错误。


    ## 创建你的第一个数据库


    在 SQL 编程中，要拥有一个包含实际表的成功数据库，需要先创建数据库，然后创建表。然而，市面上有几种 SQL 数据应用软件，但它们创建新数据库和表的步骤几乎相似。当你创建第一个数据库系统时，你将需要设计一个表，在其中输入数据并更安全有效地存储它。SQL
    提供了一个免费的图形用户界面，易于创建。以下是在考虑输入数据之前，如何创建第一个 SQL 数据库和表的分步指南。


    ### 步骤


    ### 步骤 1：安装 SQL Server Management Studio 软件


    创建第一个数据库和表的第一步是从 Microsoft 免费在线获取 SQL 软件。该软件功能齐全，允许你使用有限的命令行指令与 SQL 服务器进行交互和管理。此外，它在远程地区使用数据库时至关重要。然而，Mac
    用户可以利用开源程序，例如 SQuirrel SQL，来操作数据库系统。


    ### 步骤 2：启动 SQL Studio


    当你启动 SQL Studio 时，软件偶尔会首先请求一个你将一直使用的服务器或你当前正在使用的服务器。如果已经存在一个，你可以选择输入权限、进行身份验证并连接。有些人可能更喜欢通过设置新名称、使用首选名称或地址进行身份验证来使用本地数据库系统。启动
    SQL Server Management Studio 开始了与软件交互的过程，并为创建第一个数据库和表铺平了道路。


    ### 步骤 3：识别数据库文件夹


    在本地或远程连接建立后，屏幕左侧将立即打开一个窗口。顶部将有一个它将连接到的服务器。如果没有，你可以点击“+”图标，这将显示多个元素，包括创建新数据库的选项。在某些版本中，你可能会在左侧下拉窗口中立即看到创建新数据库的图标。然后你可以点击“创建新数据库”。


    ### 步骤 4：创建新数据库


    如步骤 3 所述，下拉菜单将完全显示多个选项，包括创建新数据库的选项。首先，你将根据你的参数配置数据库，并提供名称以便于识别。大多数用户更喜欢将设置保持为默认值，但如果你熟悉它们如何影响系统中的数据存储过程，你可以更改它们。请注意，当你创建数据库名称时，将自动生成两个文件：数据文件和日志文件。数据文件负责存储数据，而日志文件跟踪数据库中进行的所有更改、修改和其他更改。


    ### 步骤 5：创建你的表


    数据库通常不存储数据，除非为该数据创建了行和表形式的结构以保持其组织性。表是存储数据的主要单元，但最初，你必须在插入信息之前创建表。与创建新数据库类似，表的创建也很简单。在“数据库”文件夹中，展开窗口，然后右键单击“表”并选择“新建表”。将打开一个窗口，显示一个可以轻松操作行数和列数、标题以及你希望如何组织工作的表。在这一步中，你将成功创建数据库和表，从而继续组织你的任务。


    ### 步骤 6：开发主键


    主键在数据库中起着重要作用，因为它充当记录号或 ID，便于以后查看页面时识别和记忆。因此，强烈建议在第一列中创建这些键。有多种方法可以做到这一点，包括在列字段中输入
    ID，方法是键入“int”并取消选中“允许空值”。选择工具栏中找到的键图标，并将其标记为主键。


    ### 步骤 7：构建表结构


    表通常有多个列，也称为字段，每列代表一个数据条目元素。在创建表时，你最初会构建它以适应数据条目的数量，因此对于每个数据集来说，其他主键也是必不可少的。因此，构建过程将涉及用给定的数据集标识每一列。例如，名字列、姓氏和地址列等。


    ### 步骤 8：创建其他列


    一旦你为主键创建了列，你就会注意到下面出现了更多列。这些不是为主键准备的，但对于插入其他信息至关重要。因此，请确保为每列输入正确的数据，以避免用错误的信息填充表。在列中，你将输入“nchar”（一种用于文本的数据类型）、“int”（用于整数）和“decimal”（用于存储小数）。


    ### 步骤 9：保存表


    在完成每个字段的内容创建后，你会注意到你的表将由行和列组成。但是，你需要在输入信息之前先保存表。这可以通过选择工具栏中的“保存”图标并为表命名来完成。在为表命名时，请确保创建一个你可以轻松关联内容或识别的名称。此外，具有不同表的数据库应具有不同的名称，以便于识别。


    ### 步骤 10：添加数据


    表保存后，你现在可以将数据添加到系统中，为每个字段提供相关信息。但是，你可以通过展开“表”文件夹并尝试查看我们的表名是否列出，来确认表是否已保存。如果没有，请使用“表”文件夹刷新表，你将看到你的表。回到表中，右键单击表，将出现一个下拉对话框，选择“编辑前
    200 行”。然后窗口将显示字段供你添加数据，但忽略主键，因为它们会自动填充。继续相同的过程，直到你将最后一条数据输入表中。


    ### 步骤 11：运行表


    完成表的工作后，你必须保存内容，以免丢失工作。由于表已经保存，在输入数据后，点击工具栏上的“执行 SQL”，它将执行将你输入的每个数据填充到列中的过程。解析过程可能需要几秒钟，具体取决于数据量。如果在填充过程中有任何错误，系统将向你显示输入数据不正确的位置。此外，你可以通过使用“ctrl”和“R”的组合来执行所有数据的程序解析。


    ### 步骤 12：数据查询


    在这一步中，你已经创建了第一个数据库和表，并通过 SQL 语言编程成功保存了信息。数据库现在功能齐全，因此你可以在单个数据库中创建更多表。但是，每个数据库的表数量有限制，但许多用户并不担心这个规则。因此，你可以创建想要的新数据库系统并创建更多表。最后，你可以查询你的数据以生成报告或任何相关目的，例如'
