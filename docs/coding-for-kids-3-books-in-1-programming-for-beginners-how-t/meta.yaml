    it is responsible for catching all of the answers that are left that the user
    could potentially give to you. If you don’t have this statement placed in the
    code, or not in the right part of the code, it is not going to be able to catch
    all of the other possible inputs of the user as you would like.


    Now that we have had a chance to talk about the “if” statement and the “if else”
    statement, it is time for us to move on to our “elif” statements. These are a
