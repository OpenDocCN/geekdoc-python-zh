  md: '# CHAPTER 6:


    # What Programming Language Should You Learn?


    So we’ve seen what could be said to be the basics. What coding is and what it
    is not, programming language, markup and styling languages, and perhaps many other
    things in-between. So now, I believe you’re ready to learn code. And you’ve learned
    enough terminologies so that the words we use here will not fly past your head.
    And even if they do, it’s okay; this is a book and not a test; therefore, you
    could always go back and relearn. That’s actually one of the things you’ll learn
    as a coder. You’ll actually never arrive at the place where you can say that you
    know it all. As far as coding is concerned, there’s always something new, some
    update, or the other. It could be a new programming language or just a new way
    to do old things, faster, better, and perhaps cooler.


    So, where does one start? There are so many programming languages. Which is the
    best? What programming language should you learn? These are some of the questions
    people ask the most when it comes to coding. I remember telling my friend to teach
    me how to code. And he asked me a question along these lines.


    Fact is told, there are no best programming languages; at least we don’t look
    at them that way. Programming languages are tools to enable us to achieve certain
    objectives. And depending on the task at hand, we’ll pick the tool that we think
    we are most deft with or that is most efficient for the task at hand. Now that’s
    the way you should look at coding.


    So to answer the question, what tool should you learn first? Well, it all depends
    on the task that you’ll want to carry out.


