  md: '# Introduction


    Welcome to the world of computer programming for kids, or the act of writing a
    program to tell your computer what to do. Programs are written using a series
    of instructions in a particular language, three of which I will be talking about
    here – Java, SQL, and C++.


    Computer programming is not as difficult as it first looks, and it can be a lot
    of fun, as long as you do it properly. I have prepared a basic “Hello, World!”
    tutorial for each of the three languages, just to give you an idea of how it all
    works. Apart from this, I have also enclosed some useful tips for beginners and
    the common mistakes that newbies tend to make while programming.


    Simply, programming environment is a software that will allow you to create, compile,
    and execute computer programs on the system. It is an interface between the programmer
    and the computer, which will convert the programs that you will write into the
    computer’s language and ask it to execute the same for you. Therefore, before
    you pick up any programming language, be sure to enquire about the required programming
    environment and how the same can be set up on the computer that you intend to
    use for your programming course.


    Digging deeper into the programming environment and its setup, it is made up of
    three basic elements, namely text editor, compiler, and interpreter. In all probability,
    you will need all these three components for your course. So, before you go searching
    for them, let us help you understand what they exactly are and why you will need
    them.


    # Text Editor


    A text editor is a simple text program that will allow you to create text files
    in which you will write your code. Depending on the programming language you are
    working on, the extension of the text'
