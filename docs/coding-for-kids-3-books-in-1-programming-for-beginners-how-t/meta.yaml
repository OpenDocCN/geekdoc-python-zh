    the browser, such as http://www.google.com, for example, it says that you need
    to use the HTTP protocol to access your site.


    HTTP works as a fast-food order:


    +   1. **Request**: A customer makes a request to the waiter for a chicken burger.

    2. **Response**: The server responds to the request of the customer according
    to the situation.


    Depending on the situation, the waiter may respond in a number of ways, such as:


    +   - The waiter prepares the Drumstick Burger and hands it to the customer. (Everything
    is OK)

    - The waitress found herself working at the dessert stand. He sent his customers
    to the official counter to take orders. (Redirects)

    - The waiter told the customer that the Drumstick hamburger was out. (Cannot be
    found)


    When the transaction is over, the waiter puts the transaction behind him and prepares
    to serve the next customer.


    ```

    GET /start.html HTTP/3.0

    Host: www.mywebsite.com

    ```


    In the starting line, there are three messages:


    +   - Get method. Describes the operation that you want the server to perform.

    - / start. The path to the html resource. These points to the index on the server.
    HTML file.

    - HTTP 3.0. The first widely used version of HTTP was 3.0, and the current version
    is 3.3.'
  - '[PAGE 31]


    The early HTTP protocol had only the GET method. Following the HTTP protocol,
    the server receives the GET request and passes the specific resource to the client.
    This is similar to the process of ordering and getting a Burger from a customer.
    In addition to the GET method, the most common method is the POST method. It is
    used to submit data from the client to the server, with the data to be submitted
    appended to the request. The server does some processing of the data submitted
    by the POST method. The sample request has a header message. The type of header
    information is Host, which indicates the address of the server you want to access.


    After receiving the request, the server will generate a response to the request,
    such as:


    ```

    HTTP/3.0 200 OK

    Content-type: text/plain

    Content-length: 10

    Jesus Christ

    ```


    The first line of the reply contains three messages:


    +   - HTTP 3.0: Protocol version

    - 200: Status Code

    - Ok: Status Description


    OK is a textual description of the status code 200, which is just for human readability.
    The computer only cares about three-digit status codes. Status Code, which is
    200 here. 200 means everything is OK, and the resource returns normally. The status
    code represents the class that the server responded to.


    There are many other common status codes, such as:


    +   - 302, Redirect: I don''t have the resources you''re looking for here, but
    I know another place where xxx does. You can find it there.'
  - '[PAGE 32]


    +   - 404, Not Found: I can''t find the resources you''re looking for.


    The next line, Content-type, indicates the type of resource that the body contains.
    Depending on the type, the client can start different handlers (such as displaying
    image files, playing sound files, and so on). Content-length indicates the length
    of the body part, in bytes. The rest is the body of the reply, which contains
    the main text data.


