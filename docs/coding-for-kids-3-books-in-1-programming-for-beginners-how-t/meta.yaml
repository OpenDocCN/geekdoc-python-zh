  md: '# CHAPTER 12:


    # The Future of Machine Learning


    Machine Learning has been one of the most exciting developments to come out of
    computer science and artificial intelligence in a very long time. Of course, Machine
    Learning began its long road to its present form many decades ago. But it’s only
    recently that we’ve seen Machine Learning getting widespread application to the
    extent that it’s actually changing the way that society is operating. Understanding
    these changes is going to be one of the most important things going forward for
    the data science community and society at large. I try to stay optimistic, there
    are some reasons for concern, but I have to keep believing that Machine Learning
    is going to provide many tools that are going to help improve people’s lives.
    Every tool development Machine Learning doesn’t have to be the most dramatic and
    breakthrough development of that man has ever seen. We can probably go through
    history, and I would have to say that people like Nicholas Tesla or Thomas Edison
    we’re probably a lot more impactful on society than a lot of the new technologies
    that we see today. I would say that’s the truth for any given individual technology.
    However, when you take a look at the sum total of the changes that we are seen
    from Machine Learning, society is going to be transformed a great deal in the
    coming decades.


    One of the things that we are definitely going to see is there are going to be
    a great deal of jobs that are eliminated. We have already seen the development
    of robots that can stack and manage warehouse just as well as any human worker.
    They haven’t yet been deployed in a real situation, but the fact is it’s only
    a matter of time before that happens. Second, we’ve already seen the developments
    of robots that can do many menial labor jobs. The most famous of these is a robot
    which is able to cook hamburgers in a fast-food'
  merge: -1
  pgno: 157
- img_proc: true
  md: 'restaurant. This may be unfortunate for those pushing for a $15 an hour wage
    for that type of work because right now, the robot is too expensive to be practical.
    But if you keep pushing it at some point, the robot becomes a cost-effective investment.
    Regardless of what happens, regarding the wages, the downward pressure on costs
    that usually happens with technology almost ensures that robots that do menial
    labor are going to be taking a lot of jobs over the next 5 to 10 years.


    Remember that this is nothing new, however. I hate to bring it up yet again, but
    people in the 18th Century had great fears of losing their jobs to the new machines
    that were then making their way throughout society. The concerns of those people
    turned out totally misguided. In fact, they were dead wrong. Of course, that doesn’t
