    \n任何时候你需要让一个循环在另一个循环内部运行时，嵌套循环都能帮助你完成。你可以根据代码内部想要完成的任务，组合使用 `for` 循环、`while` 循环，或者它们的任意组合。但这确实向你展示了这些循环能在代码中节省多少时间和空间。上面的乘法表只用了四行代码就写出来了，却得到了一个巨大的表格。想想如果你必须写出表格的每一部分需要多长时间！\n\
