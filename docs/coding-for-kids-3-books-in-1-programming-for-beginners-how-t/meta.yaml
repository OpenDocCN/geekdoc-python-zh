    # Linux


    Linux systems are similar to MAC systems, and most come preloaded with Python.
    There are many Linux systems that offer something like Homebrew’s software manager,
    which, for example, is installed under Ubuntu using the following command:

    $sudo apt-get install Python

    Under Linux, Python is used and run in much the same way as on the MAC, and I
    won’t go into that again.


    # Windows Operating System


    For the Windows operating system, you need to download the installation package
    from the official Python Website. If you don’t have access to Python’s website,
    search engines for keywords like “Python Windows download” to find other download
    sources. The installation process is similar to installing other Windows software.
    In the install screen, Customize the installation by selecting Customize, in addition
    to selecting Python components, check:


    # Add python.exe to Path


    Once installed, you can open the Windows command line and use Python as you would
    on a Mac.


