    # Statement


    # Statements: What Are They?


    Before I begin explaining what a statement is, let me pose you a simple question.
    When was the last time you had to choose between two things, depending on the
    elements like what you prefer, what you can afford, what is near, and what isn’t?
    Whenever we make decisions, we take into account quite a few components and elements
    which will eventually influence our decision accordingly. Similarly, to help us
    with such issues, we use statements, and that is exactly what we will be looking
    into.


    In the simplest definition, Statements are nothing more than instructions that
    Program interpreter understands and executes, we have been writing some ourselves
    when we set values to variables.


    Statements, where we assign values to variables, are called assignment statements.
    However, as long as Program is being discussed, generally, statements refer to
    ‘if’ statements.


    The ‘if’ statement is what provides Programs with a situation and allows Program
    to take appropriate action ‘if’ a given situation is true, otherwise, it takes
    another route. Sounds easy and it is actually interesting too. Let us see how
    we can create our very first ‘if’ statement.


    Here’s the situation. A user wishes to sign in using their account. The prompt
    asks for the passcode only. If the user inputs the right, case-sensitive, passcode,
    he should be allowed access. If the user enters the wrong password, it should
    not go through and inform the user that the entered password was incorrect.'
  merge: -1
  pgno: 12
- img_proc: true
  md: 'To do that, we first need to establish a password. You can either come up with
    your own pre-defined one or ask the user to create a new passcode and then re-enter
    it. I leave the choice up to you.


    ```

    password = input("Create a password: ")


    print("Welcome to the portal")

    ```


    So far, I have only asked the user to enter a password of their choice. If you
    wish, you can set any string or numbers as a password. Next, I created a little
    welcome greeting. Now, we shall ask the user to enter their password:


    ```

    password_check = input("Please enter your password: ")

    ```


    The only thing worth noting here is that I changed the name of the variable. If
    you are wondering why, that is because had I used the same variable name; it would
    have updated the password, instead of comparing it. Since we wish to verify the
    password, we will need to use a different variable.


    Now, the customer has given us two pieces of information. Here, we tell Programming
    what to do if the password matches.


    ```

    if password_check == password:


    print("Successful! Welcome back!")

    ```


    There are two things to notice here. Whenever you type in ‘if’ as your first word,
    PyCharm will detect that you wish to create an ‘if’ statement. The color of ‘if’
    will change to denote the same. After ‘if,’ we need to define our condition. To
    do that, you may have observed that I used “==” instead of a single equals sign.
    These signs are called Operators, which we will discuss later. All you need to
    know here is this:


    ‘=’ is used to assign a value


    ‘==’ is used to either equate two variables or compare to see if the two are exactly
    the same.'
