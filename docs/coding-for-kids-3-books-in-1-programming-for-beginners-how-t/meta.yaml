    go through and write out brand new members of data and members of functions each
    time that you do it, the programmer is able to designate that the new class is
    supposed to inherit the members of a class that is already found in the code.


    This can make it a lot easier than having to redefine the members and the functions
    as you go through the code again and again.'
  - '[PAGE 53]


    The class that we are basing our work on, or the existing class, is going to be
    known as the base class.


    Then the new class that we are trying to create, and the one that will take that
    information and the data or the functions out of the base class, is going to be
    known as the derived class.


    The idea that we are going to see with the inheritance is that it implements the
    “is a” relationship.


    For example, it can work with the idea of a mammal is an animal; the dog is a
    mammal; hence dog is an animal as well.


    This is going to kind of simplify the process that we are working with here, but
    still, give us a good idea of what we are working with along the way.


    # The Access Control of Our Inheritance


    The next thing that we need to take a look at is access control and inheritance.


    A derived class is able to access all of the parts of the base class that are
    not private at the time.


    This means that the members of the base class that should not be accessible to
    all of the member functions of the derived classes, are going to be declared as
    private for the base class when we are doing this as well.


    You will notice as we go through this that the derived class is going to be able
    to inherit all of the base class methods.


    There are going to be a few different exceptions that we are able to use with
    this one based on what results we are hoping to get. Some of the exceptions that
    we need to remember include:


    +   1. The friend functions that are found with our base class.'
  - '[PAGE 54]


    +   2. The overloaded operators that are there with our base class.

    3. The destructors, the constructors, and any of the copy constructors that are
    going to happen with our base class.


    We need to make sure that we pay special attention to some of the different parts
    that show up with our access control.


    If some restrictions are found in our base class, then this is going to step in
    and cause some issues with the inheritance that we are working with as well.


    And the child or the derived class is going to notice this along the way.


    # Type of Inheritances


    While we are here, we need to take a closer look at the types of inheritances
    that we are able to work with.


    When we try to derive a class from one of our base classes in the first place,
    then the base class has the possibility of being inherited through a private,
    a protected, or a public inheritance.


    The type of inheritance that you use is going to be specified through the access-specifier,
    as we talked about above.


    Now, you will find that it is not common for us to work with an inheritance that
    is private or protected, though it is possible to do this.


    Just be aware that there are going to be some issues along the way, and these
    are not as easy to work with.


    The method that we are most likely to work with here will be a public inheritance.


    Even though the public option is going to be the most common for us to work with,
    we need to take a look at some of the rules that are'
- md: '## The Public Inheritance


    When we want to derive a new class from a public base class, the public members
    that are found in our base, or original class, are going to become public members
    of the derived class.


    And then the protected members that are found in our base class will also become
    protected members of some of the derived classes that we make out of it as well.


    - a. As we could guess here, we are going to find that the private members that
    are found with our base class are never going to be accessible directly from the
    derived class.

    - b. We can access them through here.

    - c. We just need to do some calls to the protected and the public members of
    our base class to make this happen.


    ## The Protected Inheritance


    The second option that we are able to work with is protected inheritance.


    When we want to derive a new class from a base class that is protected, the protected
    and the public members of the base class are going to end up as protected members
    of the derived class that we want to work with.


    ## Private Inheritance


    The final type of inheritance that we are going to work with is private inheritance.


    When we are trying to derive a new class from a private base class, both of the
    protected and the public members of our base class are going to go over to the
    derived class, but then these are going to be turned into some of the private
    members instead.


    As we can see, all of these are going to be a bit different from one another.


    And this is why we need to be careful about the kind of inheritances that we are
    going to work with.


    If you are in a different type of inheritance, then the members are not always
    going to work the way that you want.


    Double-check what you are in, and make sure that this is set to the right kind
    so that it actually works the way that you want.


    ## 9. Syntax


    Syntax is known as the grammar and spelling of a computer programming language.
    The computer has its own specific language, and the computer can only perform
    an action if it is typed in the language that it understands. This language is
    called Syntax. Syntax of a computer programming is also defined as a set of rules
    that describes the combinations of computer symbols that are part of any element
    in a computer language or known to be an appropriately structured document. Syntax
    programming usually contains strings that are like words; if these strings are
    properly synthesized, it produces correct and valid sentences. Communication flow
    may differ because of the difference in programs, however, Syntax remains the
    communication flow between programmers and their computers. It defines how a program
    should be written and interpreted, and if the language of a program is not well
    understood by a programmer, Syntax error is bound to occur.


    ## The Importance of Syntax in Computer Programming


    Syntax is simply the use of structured language that the computer can interpret,
    and when a user fails to use a language that the computer can understand, it can
    cause errors and the execution of the programming command will be unsuccessful.
    The Syntax is also referred to as a bridge or a means of communication between
    your computer and you. The essence of Syntax is to be able to work on the computer
    effectively without any error.


    Furthermore, the quality of Syntax makes a task easier and simpler. It also makes
    reading or understanding code easier.


    ## What is a Syntax Error?


    A Syntax Error may occur when the sequence of characters are not written correctly,
    or the compiler or interpreter cannot understand the source code, so as to generate
    a machine code. It may also occur if there is a presence of invalid equation.


    ## Levels of Syntax


    ### Lexical Syntax


    Lexical Syntax contains all the basic symbols of the programming language in use.
    In the computer, a sequence of characters is known as a Lexeme. A Lexical Syntax
    is, however, a rational language, which consists of grammar rules that defines
    a set of Lexemes.


    ### Concrete Syntax


    Concrete Syntax is a set of rules for writing expressions, programs, and statements
    and how they should be interpreted. It describes how the elements of language
    have been displayed and edited. The Concrete Syntax describes how the program
    looks to the programmer.


    ### Abstract Syntax


    Abstract Syntax is defined as the internal representation of specific programs
    by the simplicity of their grammar. The implementation of a language is known
    as Abstract Syntax. The Abstract Syntax describes the way the program looks to
    the evaluator or compiler.


    ## Types of Syntax Programming


    There are various Syntax Programming Languages, and they are all distinct from
    each other.


    Prolog Syntax and Semantics are a set of rules that describe how the prolog program
    should be written and interpreted. A Prolog is a logic and declarative language;
    hence the programmer has to think about the programs in a different way. Prolog
    Syntax is one of the first languages to be created, and it is still popular among
    other languages today. It has been proven useful for things like theorem proving,
    expert systems, term rewriting, automated planning, and natural language planning.


    Perl Syntax borrows Syntax language from other languages like Bourne Shell, Lisp,
    Smalltalk. The Perl Syntax is a flexible form of language, which can be edited,
    or manipulated, in whatever form the programmer wants. The Perl Syntax contains
    both sequences of declarations and statements, and in Perl language, every statement
    must end with a semicolon. It is also a case sensitive programming language, and
    does not allow characters and punctuations like @, $, or %.


    PHP Syntax and Semantics form a set of rules that describe how the PHP program
    can be written and interpreted. The PHP Syntax was developed to follow the C Syntax
    format, so it can be used in web development.


    C Syntax is basically a set of rules that a programmer must bear in mind when
    writing the C program. The C program consists of elements like header files, main
    function, and program code. C Syntax is a case sensitive language, so a programmer
    must follow the rules for the C program to prevent Syntax Error.


    All C statements must end with a semicolon, and every C instruction should be
    written in lower case letters. The C language is represented by numbers in three
    forms, the integral, real, and complex form.


    C++ Syntax is a programming language developed by a Danish computer scientist,
    Bjarne Stroustrup, to be an extension of the C programming language. C++ Syntax
    is used in varieties of application domains, which makes it a general-purpose
    language and a standard by the International Organization for Standardization.
    Although the C++ inherits most of C''s Syntax features, however, it offers efficient
    hardware access and abstractions compared to other languages.


    Java Syntax is the set of rules that describes how the Java program should be
    written and interpreted. However, Java was derived from both C and C++ Syntax.
    Despite these derivations, here are few differences between these languages: in
    Java, there are no available variables or global functions, but there are data
    members which are considered as global variables.


    JavaScript Syntax is the set of rules that a programmer must bear in mind before
    writing a JavaScript program or interpreting it. The JavaScript defines two types
    of values, namely: fixed values called literals, and variable values that are
    called variables. JavaScript literals are important rules that define how fixed
    values should be written, and the rules guiding the values are as follow:


    - Numbers are to be written with or without decimals.

    - Strings are text or words written between a single quote and a double quote.


    While JavaScript variables are used to store data values, the var keyword is used
    by JavaScript to declare variables. The var keyword simply means a variable, and
    a variable can be changed at any time.


    Java derives some of its features from Java Syntax, and also inherits some features
    from Awk and Perl. Despite having a bit of similarities with Java Syntax, it is
    a totally different language from JavaScript Syntax. JavaScript is case sensitive,
    and a programmer must always bear that in mind when constructing a statement.


    Python Syntax and Semantics are a set of rules that governs how the Python Program
    will be written and interpreted. The Python Program was developed with a high
    level of readability, and it uses English keywords more and even frequently, than
    other languages. Moreover, the Python language has a few similarities to Perl,
    C, and Java Syntax, and also some distinct differences between these languages.
    A Python program is, however, divided into a logical line that is created from
    one or two physical lines. When this logical line is terminated, it is usually
    done by the token newline.'
  mdcn: '## 公有继承


    当我们想从一个公有基类派生一个新类时，基类（或原始类）中的公有成员将成为派生类的公有成员。


    同样，基类中的保护成员也将成为我们从中派生出的某些派生类的保护成员。


    -   a. 正如我们可能猜测的那样，我们会发现基类中的私有成员永远无法从派生类直接访问。

    -   b. 我们可以通过这里访问它们。

    -   c. 我们只需要对基类的保护成员和公有成员进行一些调用即可实现这一点。


    ## 保护继承


    我们能够使用的第二种选项是保护继承。


    当我们想从一个受保护的基类派生一个新类时，基类的保护成员和公有成员最终将成为我们想要使用的派生类的保护成员。


    ## 私有继承


    我们将要处理的最后一种继承类型是私有继承。


    当我们试图从一个私有基类派生一个新类时，基类的保护成员和公有成员都将转移到派生类，但随后它们将转变为私有成员。


    正如我们所看到的，所有这些类型彼此之间都会有些不同。


    这就是为什么我们需要谨慎选择要使用的继承类型。


    如果你处于不同类型的继承中，那么成员并不总是会按照你期望的方式工作。


    仔细检查你所处的继承类型，并确保它被设置为正确的类型，以便它实际上能按照你期望的方式工作。


    ## 9. 语法


    语法被称为计算机编程语言的语法和拼写。计算机有其特定的语言，计算机只有在输入它能理解的语言时才能执行操作。这种语言被称为语法。计算机编程的语法也被定义为一组规则，这些规则描述了计算机符号的组合，这些符号是计算机语言中任何元素的一部分，或被认为是一个结构适当的文档。语法编程通常包含类似单词的字符串；如果这些字符串被正确地组合，就会产生正确且有效的句子。由于程序的不同，通信流程可能会有所不同，然而，语法仍然是程序员与其计算机之间的通信流程。它定义了程序应如何编写和解释，如果程序员没有很好地理解程序的语言，语法错误就必然会发生。


    ## 语法在计算机编程中的重要性


    语法仅仅是使用计算机可以解释的结构化语言，当用户未能使用计算机能理解的语言时，可能会导致错误，并且编程命令的执行将不成功。语法也被称为你与计算机之间的桥梁或沟通手段。语法的本质是能够在计算机上有效且无误地工作。


    此外，语法的质量使任务变得更容易、更简单。它也使阅读或理解代码变得更容易。


    ## 什么是语法错误？


    当字符序列书写不正确，或者编译器或解释器无法理解源代码以生成机器代码时，可能会发生语法错误。如果存在无效的方程式，也可能发生语法错误。


    ## 语法的层次


    ### 词法语法


    词法语法包含所使用编程语言的所有基本符号。在计算机中，字符序列被称为词素。然而，词法语法是一种合理的语言，它由定义一组词素的语法规则组成。


    ### 具体语法


    具体语法是编写表达式、程序和语句以及它们应如何解释的一组规则。它描述了语言元素是如何显示和编辑的。具体语法描述了程序在程序员眼中的样子。


    ### 抽象语法


    抽象语法被定义为特定程序通过其语法的简单性进行的内部表示。语言的实现被称为抽象语法。抽象语法描述了程序在评估者或编译器眼中的样子。


    ## 语法编程的类型


    有各种语法编程语言，它们彼此各不相同。


    Prolog 语法和语义是一组规则，描述了 Prolog 程序应如何编写和解释。Prolog 是一种逻辑和声明式语言；因此，程序员必须以不同的方式思考程序。Prolog
    语法是最早创建的语言之一，至今在其他语言中仍然很受欢迎。它已被证明在定理证明、专家系统、项重写、自动规划和自然语言规划等方面很有用。


    Perl 语法从其他语言（如 Bourne Shell、Lisp、Smalltalk）借鉴了语法语言。Perl 语法是一种灵活的语言形式，可以根据程序员想要的任何形式进行编辑或操作。Perl
    语法包含声明和语句的序列，在 Perl 语言中，每个语句必须以分号结尾。它也是一种区分大小写的编程语言，不允许使用 @、$ 或 % 等字符和标点符号。


    PHP 语法和语义形成了一组规则，描述了 PHP 程序应如何编写和解释。PHP 语法的开发遵循了 C 语法格式，因此可用于 Web 开发。


    C 语法基本上是程序员在编写 C 程序时必须牢记的一组规则。C 程序由头文件、主函数和程序代码等元素组成。C 语法是一种区分大小写的语言，因此程序员必须遵循规则以防止语法错误。


    所有 C 语句必须以分号结尾，并且每条 C 指令都应使用小写字母编写。C 语言以三种形式表示数字：整数形式、实数形式和复数形式。


    C++ 语法是由丹麦计算机科学家 Bjarne Stroustrup 开发的一种编程语言，作为 C 编程语言的扩展。C++ 语法用于各种应用领域，使其成为一种通用语言，并成为国际标准化组织的标准。尽管
    C++ 继承了 C 的大部分语法特性，但与其他语言相比，它提供了高效的硬件访问和抽象。


    Java 语法是描述 Java 程序应如何编写和解释的一组规则。然而，Java 源自 C 和 C++ 语法。尽管有这些衍生关系，但这些语言之间存在一些差异：在
    Java 中，没有可用的变量或全局函数，但有被视为全局变量的数据成员。


    JavaScript 语法是程序员在编写或解释 JavaScript 程序之前必须牢记的一组规则。JavaScript 定义了两种类型的值：称为字面量的固定值和称为变量的可变值。JavaScript
    字面量是定义固定值应如何编写的重要规则，指导这些值的规则如下：


    -   数字可以带小数点书写，也可以不带。

    -   字符串是写在单引号和双引号之间的文本或单词。


    而 JavaScript 变量用于存储数据值，JavaScript 使用 var 关键字来声明变量。var 关键字简单地表示一个变量，变量可以随时更改。


    Java 从 Java 语法中派生了一些特性，也继承了 Awk 和 Perl 的一些特性。尽管与 Java 语法有一些相似之处，但它与 JavaScript
    语法是完全不同的语言。JavaScript 区分大小写，程序员在构造语句时必须始终牢记这一点。


    Python 语法和语义是管理 Python 程序如何编写和解释的一组规则。Python 程序的开发具有高度的可读性，并且比其他语言更多、更频繁地使用英语关键字。此外，Python
    语言与 Perl、C 和 Java 语法有一些相似之处，也与这些语言有一些明显的不同。然而，Python 程序被划分为由一个或两个物理行创建的逻辑行。当这个逻辑行终止时，通常通过换行符标记完成。'
