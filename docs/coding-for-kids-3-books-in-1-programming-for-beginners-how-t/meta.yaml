- md: 'While some disadvantages can add to additional work in the implementation of
    decision trees, the advantages still outweigh them by far.


    ## Classification and Regression Trees


    Decision trees need to be divided into classification and regression trees. They
    handle different problems; however, they are similar in some ways since they are
    both types of decision trees.

    Take note that classification decision trees are implemented when there’s a categorical
    dependent variable. On the other side, a regression tree is only implemented in
    the case of a continuous dependent variable. Furthermore, in the case of a classification
    tree, the result from the training data is the mode of the total relevant observations.
    This means that any observations that we cannot define will be predicted based
    on this value, which represents the observation which we identify most frequently.


    Regression trees, on the other hand, work slightly differently. The value that
    results from the training stage is not the mode value, but the mean of the total
    observations. This way, the unidentified observations are declared with the mean
    value, which results from the known observations.


    Both types of decision trees undergo a binary split, however, going from the top
    to bottom. This means that the observations in one area will spawn two branches
    that are then divided inside the predictor space. This is also known as a greedy
    approach because the learning algorithm is seeking the most relevant variable
    in the split while ignoring the future splits that could lead to the development
    of an even more powerful and accurate decision tree.


    As you can see, there are some differences as well as similarities between the
    two. However, what you should note from all of this is that the splitting is what
    has the most effect on the accuracy scores of the decision tree implementation.
    Decision tree nodes are divided into sub-nodes, no matter the type of tree. This
    tree split is performed to lead to a more uniform set of nodes.


    Now that you understand the fundamentals behind decision trees, let’s dig a bit
    deeper into the problem of overfitting.


    ## The Overfitting Problem


    You learned earlier that overfitting is one of the main problems when working
    with decision trees, and sometimes it can have a severe impact on the results.
    Decision trees can lead to a 100% accuracy score for the training set if we do
    not impose any limits. However, the major downside here is that overfitting creeps
    in when the algorithm seeks to eliminate the training errors, but by doing so,
    it actually increases the testing errors. This imbalance, despite the score, leads
    to terrible prediction accuracy in the result. Why does this happen? In this case,
    the decision trees grow many branches, and that’s the cause of overfitting. To
    solve this use, you need to impose limitations on how much the decision tree can
    develop and how many branches it can spawn. Furthermore, you can also prune the
    tree to keep it under control, much like how you would do with a real tree in
    order to make sure it produces plenty of fruit.

    To limit the size of the decision tree, you need to determine new parameters during
    the definition of the tree. Let’s analyze these parameters:


    - 1. **min_samples_split**: The first thing you can do is change this parameter
    to specify how many observations a node will require to be able to perform the
    splitting. You can declare anything with a range of one sample to maximum samples.
    Just keep in mind that to limit the training model from determining the connections
    that are very common to a particular decision tree, you need to increase the value.
    In other words, you can limit the decision tree with higher values.

    - 2. **min_samples_leaf**: This is the parameter you need to tweak to determine
    how many observations are required by a node, or in other words, a leaf. The overfitting
    control mechanism works the same way as for the samples split parameter.

    - 3. **max_features**: Adjust this parameter in order to control the features
    that are selected randomly. These features are the ones that are used to perform
    the best split. To determine the most efficient value, you should calculate the
    square root of the total features. Just keep in mind that in this case, the higher
    value tends to lead to the overfitting problem we are trying to fix. Therefore,
    you should experiment with the value you set. Furthermore, not all cases are the
    same. Sometimes a higher value will work without resulting in overfitting.

    - 4. **max_depth**: Finally, we have the depth parameter, which consists of the
    depth value of the decision tree. To limit the overfitting problem, however, we
    are only interested in the maximum depth value. Take note that a high value translates
    to a high number of splits, therefore a high amount of information. By tweaking
    this value, you will have control over how the training model learns the connections
    in a sample.


    Modifying these parameters is only one aspect of gaining control of our decision
    trees in order to reduce overfitting and boost performance and accuracy. The next
    step after applying these limits is to prune the trees.


    ## Pruning


    This technique might sound too silly to be real; however, it is a legitimate Machine
    Learning concept that is used to improve your decision tree by nearly eliminating
    the overfitting issue. As with real trees, what pruning does is reduce the size
    of the trees in order to focus the resources on providing highly accurate results.
    However, you should keep in mind that the segments that are pruned are not entirely
    randomly selected, which is a good thing. The sections that are eliminated are
    those that don’t help with the classification process and don''t lead to any performance
    boosts. Less complex decision trees lead to a better-optimized model.


    ## Conclusion


    This is the end of the guidebook. The next milestone is to make the best use of
    your new-found wisdom of Python programming, Data Science, Data Analysis, and
    Machine Learning that have resulted in the birth of the powerhouse, which is the
    “Silicon Valley.” So many companies, that span a lot of different industries,
    are able to benefit when they work with data analysis. This allows them to get
    a lot of the power and control that they want for their respective industries
    and will ensure that they will be able to really impress their customers and get
    some good results in the process. Learning how to use a data analysis is going
    to change the game in how you do business, as long as it is used in the proper
    manner.


    This guidebook has been organized well to explore what data analysis is all about,
    and how we are able to use this for our benefits as well. There are a lot of business
    tools out there, but data analysis is designed to help us focus on finding the
    hidden patterns and insights that are in our data, making it easier to base our
    decisions on data, rather than intuition and guessing as we did in the past. And
    when it comes to making sure that we complete the data analysis in the right manner,
    nothing is better than working with the Python coding language to get things done.


    There are so many aspects that need to come into play when we are working with
    our own data analysis, and it is important that we take the time to learn how
    these works, and how to put it all together. And that is exactly what we will
    do in this guidebook. When you are ready to learn more about Python data analysis,
    and all of the different parts that come together to help us with understanding
    our data and how to run our business, make sure to recheck this guide to help
    you.


    Now that you have finished reading this book and mastered the use of Python programming,
    you are all set to start developing your own Python-based Machine Learning model
    as well as performing big data analysis using all the open sources readily available
    and explicitly described in this book. You can position yourself to use your deep
    knowledge and understanding of all the cutting edge technologies obtained from
    this book to contribute to the growth of any company and land yourself a new high
    paying and rewarding job!


    Remember, however, – and wherever – you are teaching, foster a good learning environment.
    Trial and error is all part of learning when it comes to coding. Children like
    it when adults make mistakes, so when you know that they have a good understanding
    of what you are teaching them, then you can make mistakes too. Does your child
    notice this and pick up on it?


    If you are working at home with your child, then work together rather than leaving
    them to play by themselves. If possible, involve other family members, too. Coding
    doesn’t have to be a boring, dry, academic subject. Foster that creativity in
    your children by being creative yourself. Have fun and enjoy bonding with your
    child!'
  mdcn: '尽管某些缺点可能会在决策树的实施过程中增加额外的工作量，但其优点仍然远远超过这些缺点。


    ## 分类与回归树


    决策树需要分为分类树和回归树。它们处理不同的问题；然而，由于两者都是决策树的类型，它们在某些方面是相似的。

    请注意，当存在分类因变量时，会实施分类决策树。另一方面，回归树仅在连续因变量的情况下实施。此外，在分类树的情况下，训练数据的结果是所有相关观测值的众数。这意味着任何我们无法定义的观测值都将基于此值进行预测，该值代表我们最频繁识别的观测值。


    另一方面，回归树的工作方式略有不同。训练阶段得出的值不是众数值，而是所有观测值的均值。这样，未识别的观测值就用均值来表示，该均值来自已知的观测值。


    两种类型的决策树都经历二元分裂，但是从上到下进行。这意味着一个区域中的观测值将生成两个分支，然后在预测空间内进行划分。这也被称为贪婪方法，因为学习算法在分裂时寻找最相关的变量，而忽略了可能导致开发更强大、更准确的决策树的未来分裂。


    正如你所看到的，两者之间存在一些差异和相似之处。然而，你应该从所有这些中注意到的是，分裂对决策树实施的准确性分数影响最大。无论树的类型如何，决策树节点都会被划分为子节点。这种树分裂的执行是为了导致更均匀的节点集。


    现在你已经了解了决策树背后的基础知识，让我们更深入地探讨过拟合问题。


    ## 过拟合问题


    你之前了解到过拟合是使用决策树时的主要问题之一，有时它会对结果产生严重影响。如果我们不施加任何限制，决策树可以达到训练集100%的准确率。然而，这里的主要缺点是，当算法试图消除训练误差时，过拟合就会悄然出现，但这样做实际上增加了测试误差。这种不平衡，尽管分数很高，却导致结果中的预测准确性极差。为什么会发生这种情况？在这种情况下，决策树会生长许多分支，这就是过拟合的原因。为了解决这个问题，你需要对决策树的发展程度和可以生成的分支数量施加限制。此外，你还可以修剪树以控制它，就像你对真实的树所做的那样，以确保它能结出大量果实。

    为了限制决策树的大小，你需要在定义树时确定新的参数。让我们分析这些参数：


    - 1. **min_samples_split**：你可以做的第一件事是更改此参数，以指定节点执行分裂所需的观测值数量。你可以声明从一个样本到最大样本范围内的任何值。请记住，为了限制训练模型确定对特定决策树非常常见的连接，你需要增加该值。换句话说，你可以用更高的值来限制决策树。

    - 2. **min_samples_leaf**：这是你需要调整的参数，以确定节点（或换句话说，叶节点）所需的观测值数量。过拟合控制机制的工作方式与样本分裂参数相同。

    - 3. **max_features**：调整此参数以控制随机选择的特征。这些特征是用于执行最佳分裂的特征。为了确定最有效的值，你应该计算总特征的平方根。请记住，在这种情况下，较高的值往往会导致我们试图解决的过拟合问题。因此，你应该尝试你设置的值。此外，并非所有情况都相同。有时较高的值可以正常工作而不会导致过拟合。

    - 4. **max_depth**：最后，我们有深度参数，它由决策树的深度值组成。然而，为了限制过拟合问题，我们只对最大深度值感兴趣。请注意，较高的值意味着较多的分裂，因此信息量也较大。通过调整此值，你将能够控制训练模型如何学习样本中的连接。


    修改这些参数只是控制决策树以减少过拟合并提高性能和准确性的一个方面。应用这些限制后的下一步是修剪树。


    ## 修剪


    这项技术听起来可能太傻了，不像是真的；然而，它是一个合法的机器学习概念，用于通过几乎消除过拟合问题来改进你的决策树。与真实的树一样，修剪的作用是减小树的大小，以便将资源集中在提供高度准确的结果上。然而，你应该记住，被修剪的部分并非完全随机选择，这是一件好事。被消除的部分是那些对分类过程没有帮助且不会带来任何性能提升的部分。复杂度较低的决策树会导致模型优化得更好。


    ## 结论


    本指南到此结束。下一个里程碑是充分利用你新获得的Python编程、数据科学、数据分析和机器学习知识，这些知识催生了“硅谷”这个强大的存在。许多跨越不同行业的公司都能在数据分析方面受益。这使他们能够获得他们各自行业所需的大量权力和控制力，并确保他们能够真正给客户留下深刻印象并在此过程中取得一些好结果。只要使用得当，学习如何使用数据分析将改变你开展业务的方式。


    本指南组织良好，旨在探索数据分析的全部内容，以及我们如何能够利用它为我们谋利。市面上有很多商业工具，但数据分析旨在帮助我们专注于发现数据中隐藏的模式和见解，使我们更容易基于数据做出决策，而不是像过去那样基于直觉和猜测。而当涉及到确保我们以正确的方式完成数据分析时，没有什么比使用Python编码语言来完成任务更好的了。


    在我们进行自己的数据分析时，有许多方面需要发挥作用，重要的是我们要花时间了解这些工作原理，以及如何将它们整合在一起。这正是我们将在本指南中做的。当你准备好了解更多关于Python数据分析以及所有不同部分如何共同帮助我们理解数据和如何运营我们的业务时，请务必重新查阅本指南以获取帮助。


    现在你已经读完这本书并掌握了Python编程的使用，你已经准备好开始开发自己的基于Python的机器学习模型，以及使用本书中明确描述的所有现成开源工具进行大数据分析。你可以定位自己，利用从本书中获得的所有尖端技术的深入知识和理解，为任何公司的增长做出贡献，并为自己找到一份高薪且有回报的新工作！


    然而，请记住，无论你在哪里教学，都要营造一个良好的学习环境。在编码方面，试错是学习的一部分。孩子们喜欢大人犯错，所以当你知道他们对你所教的内容有很好的理解时，你也可以犯错。你的孩子注意到这一点并学会了吗？


    如果你和孩子一起在家工作，那么请一起工作，而不是让他们自己玩。如果可能的话，也邀请其他家庭成员参与。编码不一定是一门枯燥、乏味的学术科目。通过自己发挥创造力来培养孩子的创造力。玩得开心，享受与孩子建立联系的乐趣！'
