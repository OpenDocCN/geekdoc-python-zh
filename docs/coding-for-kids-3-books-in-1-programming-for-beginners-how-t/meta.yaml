    Exception handling can also improve program fault tolerance. The following procedure\
    \ uses the exception handling:\n\nThe program that requires exception handling\
    \ is wrapped in a try structure. Except explains how the program should respond\
    \ when a particular error occurs. Program, input() is a built-in function to receive\
