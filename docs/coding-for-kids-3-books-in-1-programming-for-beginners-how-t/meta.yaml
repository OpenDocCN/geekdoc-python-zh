- md: '## Sorting Algorithms


    - Merge sort

    - Counting sort

    - Heap sort

    - Bucket sort

    - Quick sort


    The knowledge of these algorithms is not enough. What is more important is knowing
    how, where, and when they are necessary.


    ## Search Algorithms


    There are two popular types of search algorithms: breadth-first search as used
    in group data structures and binary search used in linear data structures. Binary
    searches are recommended when you need an efficient search on a dataset that is
    sorted. The concept here is to continually halve the dataset until you narrow
    your options down to a solitary item. A common use of this algorithm is when you
    search for the name of a film in an assorted list of movies. The algorithm conducts
    a binary search by string matching to deliver the right result.


    The search algorithm comes in handy in your map when you need to find the shortest
    possible route from one point to the other, especially if you have many options.
    It is also used to create intelligent bots in AI. Search engines are some of the
    biggest users of search algorithms, by trawling the internet for appropriate results
    before they are displayed.


    ## String Matching and Parsing


    One of the biggest problems you will solve in your life as a software programmer
    is pattern searching and matching. To do this, you need proper knowledge of the
    following:


    - String matching (KMP algorithm)


    The Knuth-Morris-Pratt (KMP) algorithm is applicable in instances where you need
    to match short patterns in long strings. One common example is executing a Ctrl+F
    command for a keyword. Basically, what you are doing is pattern matching the keyword
    pattern all through the document.


    - **String parsing (Regular expression)**


    You will also learn to parse over predefined restrictions to validate strings
    in development, especially for parsing and matching URLs in web development.


    ## Hashing Algorithms


    Hash algorithms are some of the most popular algorithms used today, especially
    when looking for a specific ID or key in reference to some dataset. Data retrieved
    through hashing algorithms is identified by its unique index. Before hashing algorithms
    were available, such searches were conducted through a combination of binary and
    sorting search algorithms.


    Hashing algorithms help you search a list of items to determine whether a specific
    value is already present within. Routers also use this algorithm to identify and
    store IP addresses of devices connected to it. This way, no two devices can be
    assigned the same IP address on the network.


    ## Dynamic Programming


    Dynamic programming algorithms help you solve problems by breaking down the complex
    concerns into smaller discernable units. Once this is done, each small unit is
    solved independently of the others, and the solutions stored to memory. Once all
    the small units are solved, the solutions help you work your way up to the ultimate
    solution to the complex problem that necessitated the algorithm.


    Think about it this way, when you write down 2+2+2+2+2, you know the answer is
    10. If you add another +2 at the end, you immediately calculate that the answer
    is 12. You arrive at 12 so fast because in your memory, you already know the answer
    to the first set, so you only need to add one set of 2. This is how a dynamic
    programming algorithm works.


    ## Primality Testing Algorithms


    In order to figure out whether some random number is a prime number or not, you
    can use probabilities or deterministic methods. This algorithm is commonly used
    in cryptography, especially in encryption and decryption. They are also used in
    hash tables as hash functions.


    ## Exponentiation by Squaring


    Try calculating 2^32. By default, you must perform 32 calculations involving the
    number 2. This is too much work. However, through this algorithm, you only need
    to do this 5 times. This algorithm is also referred to as binary exponentiation.


    In binary exponentiation, you can compute large positive integer powers very fast
    in the format O(log2N). The example we have provided is one of the simplest. Binary
    exponentiation can also be used to compute square matrices and polynomial powers.


    ## Working with Inheritance


    The next thing that we are going to take a look at here is going to be the inheritances.


    These are a bit more complex than some of the other stuff in this guidebook, but
    at this point, you are ready to take it on and really work with something that
    is more advanced.


    You will find that when these inheritances come out, we are going to see some
    of the beauty that is there with the OOP languages that we talked about before,
    and we can actually go through and reuse parts of the code that we want to work
    with.


    One of the most important out of all the concepts that come with OOP languages
    is that of the inheritance.


    This idea is going to make it easier for us to define a class based on the terms
    of another class in our code.


    This is useful because it allows us to have an easier way to create and maintain
    one of the applications that we want to work with.


    It is also going to be useful in providing an opportunity for us to reuse the
    functionality of the code and to get the implementation done faster than ever
    before.


    Any time that we want to go through and create a class, rather than having to
    go through and write out brand new members of data and members of functions each
    time that you do it, the programmer is able to designate that the new class is
    supposed to inherit the members of a class that is already found in the code.


    This can make it a lot easier than having to redefine the members and the functions
    as you go through the code again and again.


    The class that we are basing our work on, or the existing class, is going to be
    known as the base class.


    Then the new class that we are trying to create, and the one that will take that
    information and the data or the functions out of the base class, is going to be
    known as the derived class.


    The idea that we are going to see with the inheritance is that it implements the
    “is a” relationship.


    For example, it can work with the idea of a mammal is an animal; the dog is a
    mammal; hence dog is an animal as well.


    This is going to kind of simplify the process that we are working with here, but
    still, give us a good idea of what we are working with along the way.


    ## The Access Control of Our Inheritance


    The next thing that we need to take a look at is access control and inheritance.


    A derived class is able to access all of the parts of the base class that are
    not private at the time.


    This means that the members of the base class that should not be accessible to
    all of the member functions of the derived classes, are going to be declared as
    private for the base class when we are doing this as well.


    You will notice as we go through this that the derived class is going to be able
    to inherit all of the base class methods.


    There are going to be a few different exceptions that we are able to use with
    this one based on what results we are hoping to get. Some of the exceptions that
    we need to remember include:


    1. The friend functions that are found with our base class.

    2. The overloaded operators that are there with our base class.

    3. The destructors, the constructors, and any of the copy constructors that are
    going to happen with our base class.


    We need to make sure that we pay special attention to some of the different parts
    that show up with our access control.


    If some restrictions are found in our base class, then this is going to step in
    and cause some issues with the inheritance that we are working with as well.


    And the child or the derived class is going to notice this along the way.


    ## Type of Inheritances


    While we are here, we need to take a closer look at the types of inheritances
    that we are able to work with.


    When we try to derive a class from one of our base classes in the first place,
    then the base class has the possibility of being inherited through a private,
    a protected, or a public inheritance.


    The type of inheritance that you use is going to be specified through the access-specifier,
    as we talked about above.


    Now, you will find that it is not common for us to work with an inheritance that
    is private or protected, though it is possible to do this.


    Just be aware that there are going to be some issues along the way, and these
    are not as easy to work with.


    The method that we are most likely to work with here will be a public inheritance.


    Even though the public option is going to be the most common for us to work with,
    we need to take a look at some of the rules that are'
  mdcn: '## 排序算法


    - 归并排序

    - 计数排序

    - 堆排序

    - 桶排序

    - 快速排序


    仅仅了解这些算法是不够的。更重要的是要知道它们**如何**、**在哪里**以及**何时**是必要的。


    ## 搜索算法


    搜索算法主要有两种流行类型：用于图数据结构的**广度优先搜索**，以及用于线性数据结构的**二分查找**。当需要在已排序的数据集上进行高效搜索时，推荐使用二分查找。其核心思想是不断将数据集一分为二，直到将选择范围缩小到单个元素。该算法的一个常见应用是在已排序的电影列表中搜索电影名称。算法通过字符串匹配执行二分查找，从而返回正确结果。


    当你需要在地图上找到从一点到另一点的最短路径时，尤其是在有多种选择的情况下，搜索算法就派上了用场。它也用于在人工智能中创建智能机器人。搜索引擎是搜索算法的最大用户之一，它们在显示结果之前会先在互联网上抓取合适的内容。


    ## 字符串匹配与解析


    作为软件程序员，你一生中将要解决的最大问题之一就是模式搜索与匹配。为此，你需要具备以下方面的知识：


    - 字符串匹配（KMP算法）


    克努特-莫里斯-普拉特（KMP）算法适用于需要在长字符串中匹配短模式的情况。一个常见的例子是执行 `Ctrl+F` 命令来搜索关键词。本质上，你所做的就是在整个文档中对关键词模式进行匹配。


    - **字符串解析（正则表达式）**


    你还将学习在开发中解析预定义的限制条件以验证字符串，特别是在Web开发中解析和匹配URL。


    ## 哈希算法


    哈希算法是当今最流行的算法之一，尤其是在根据某个数据集查找特定ID或键时。通过哈希算法检索的数据通过其唯一的索引来标识。在哈希算法出现之前，此类搜索是通过结合二分查找和排序算法来进行的。


    哈希算法帮助你搜索一个项目列表，以确定其中是否已存在特定值。路由器也使用此算法来识别和存储与其连接的设备的IP地址。这样，网络上就不会有两个设备被分配相同的IP地址。


    ## 动态规划


    动态规划算法通过将复杂问题分解为更小的、可识别的单元来帮助你解决问题。一旦完成，每个小单元都独立于其他单元进行求解，并将解决方案存储到内存中。当所有小单元都解决后，这些解决方案将帮助你逐步推导出导致该算法产生的复杂问题的最终解决方案。


    可以这样理解：当你写下 `2+2+2+2+2` 时，你知道答案是10。如果在末尾再加一个 `+2`，你会立即计算出答案是12。你能如此快速地得出12，是因为在你的记忆中，你已经知道第一组的答案，所以你只需要再加一组2。这就是动态规划算法的工作原理。


    ## 素性测试算法


    为了确定某个随机数是否是素数，你可以使用概率方法或确定性方法。该算法通常用于密码学，特别是在加密和解密中。它们也用作哈希表中的哈希函数。


    ## 平方求幂


    尝试计算 `2^32`。默认情况下，你必须执行32次涉及数字2的计算。这工作量太大了。然而，通过这个算法，你只需要做5次。该算法也称为二进制幂算法。


    在二进制幂算法中，你可以以 `O(log2N)` 的时间复杂度非常快速地计算大正整数的幂。我们提供的例子是最简单的之一。二进制幂算法也可用于计算方阵和多项式的幂。


    ## 使用继承


    接下来我们要看的是继承。


    这比本指南中的其他一些内容要复杂一些，但此时，你已经准备好迎接挑战，并真正处理一些更高级的内容。


    你会发现，当这些继承出现时，我们将看到之前讨论过的面向对象编程语言的一些美妙之处，我们实际上可以重用我们想要使用的代码部分。


    面向对象编程语言所有概念中最重要的概念之一就是继承。


    这个概念将使我们能够基于代码中另一个类的术语来定义一个类。


    这很有用，因为它让我们能够以更简单的方式创建和维护我们想要开发的应用程序之一。


    它还将有助于提供一个机会，让我们重用代码的功能，并比以往更快地完成实现。


    任何时候，当我们想要创建一个类时，程序员可以指定新类应该继承代码中已存在的类的成员，而不必每次都重新编写全新的数据成员和函数成员。


    这比一遍又一遍地重新定义成员和函数要容易得多。


    我们基于其工作的类，即现有类，将被称为**基类**。


    然后，我们试图创建的新类，即那个将从基类中获取信息、数据或函数的类，将被称为**派生类**。


    我们将看到的继承的概念是它实现了“**是一个**”的关系。


    例如，它可以处理这样的概念：哺乳动物是动物；狗是哺乳动物；因此狗也是动物。


    这将简化我们在此处处理的过程，同时仍然让我们对正在处理的内容有一个清晰的认识。


    ## 我们继承的访问控制


    接下来我们需要看的是访问控制和继承。


    派生类能够访问基类中所有非私有的部分。


    这意味着，基类中不应该被所有派生类的成员函数访问的成员，在我们进行此操作时，将被声明为基类的私有成员。


    你会注意到，在我们进行此操作时，派生类将能够继承所有基类方法。


    根据我们希望获得的结果，有一些不同的例外情况可以使用。我们需要记住的一些例外情况包括：


    1. 基类中的友元函数。

    2. 基类中的重载运算符。

    3. 基类中的析构函数、构造函数以及任何复制构造函数。


    我们需要确保特别注意访问控制中出现的一些不同部分。


    如果在我们的基类中发现一些限制，那么这将介入并导致我们正在处理的继承出现一些问题。


    子类或派生类在此过程中会注意到这一点。


    ## 继承的类型


    既然我们在这里，我们需要更仔细地了解我们可以使用的继承类型。


    当我们尝试从一个基类派生一个类时，基类有可能通过私有、保护或公共继承被继承。


    你使用的继承类型将通过访问说明符来指定，正如我们上面讨论的那样。


    现在，你会发现我们通常不使用私有或保护继承，尽管这是可能的。


    只需注意，这过程中会有一些问题，而且这些问题处理起来并不容易。


    我们最可能使用的方法将是公共继承。


    即使公共选项是我们最常用的，我们也需要看一些规则，'
