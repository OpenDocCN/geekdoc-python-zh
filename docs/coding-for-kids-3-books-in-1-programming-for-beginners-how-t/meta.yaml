    enough terminologies so that the words we use here will not fly past your head.
    And even if they do, it’s okay; this is a book and not a test; therefore, you
    could always go back and relearn. That’s actually one of the things you’ll learn
    as a coder. You’ll actually never arrive at the place where you can say that you
    know it all. As far as coding is concerned, there’s always something new, some
