    # The First Computer Languages


    One of the first high-level languages that were developed is called Fortran. The
    purpose of this language was (and still is) to build programs for scientific purposes.
    Although it was first developed in the late 1950s, Fortran is still used today
    in many places. Fortran is really good at doing numerical calculations, and it
    is pretty easy to learn.


    After Fortran was developed, some other languages were created to extend what
    high-level languages can do and to make coding easier. The first of these is a
    language called C. Like Fortran, C was developed largely for scientific and engineering
    purposes, but it is'
- md: 'more sophisticated than Fortran. Since C can do a lot more, it quickly became
    more popular than Fortran.


    Basic is another computer language that was developed at about the same time.
    The name is appropriate since the goal of creating Basic was to make a very easy
    to use computer language. Many who were using computers in business gravitated
    toward Basic since it was easy to learn and use. Basic is a very suitable programming
    language for children to learn on, but it is not nearly as popular as it once
    was.


    As time went on, people who design computer languages and study computer science
    wanted to be able to better represent objects in the real world. This required
    them to change the way that computer languages were structured. This led them
    to create “object-oriented languages.” The first of these that was developed is
    called C++. This became a pretty popular language, and it was based on the older
    C language, but it can model real-world objects like cars and airplanes (and even
    people) in computer code that languages like C can’t. This language is still pretty
    popular, but other languages like Java were invented later, in some cases, to
    help people program the internet.


    Python has become one of the most popular programming languages. It is a very
    simple language, building on the ideas behind the Basic language. However, it’s
    a lot more sophisticated than Basic, and yet it maintains a lot of simplicity.
    Python is definitely suitable for use by children who are learning how to code.
    It is freely available for use on most computer systems.


    ## Logic Errors


    One of the most famous sayings in the computer programming world is garbage-in,
    garbage-out. It is possible to make errors in a computer program that are syntactically
    correct, and that also doesn’t lead to bugs or crashes. But, they may generate
    the wrong answers. This can be a problem because these logic errors might be hard
    to track down or even recognize. Sometimes, the erroneous assumptions that the
    programmer has in their mind are programmed into the computer.


    ## High-Level Tools for Video Games


    Video games are one of the easiest ways to get children excited about coding.
    Since they enjoy playing video games, it’s a natural fit for many to want to make
    them as well. There are many high-level tools for video games that let you draw
    out the video game on the screen. As you draw out each scene, you can add objects
    to the scene, exactly as you want them to appear in the game. Then you specify
    how each object should behave when the game is running.


    Several tools are available that are quite similar to Scratch in the overall structure
    and function. They have scenes that can be drawn on the screen, and characters
    and objects can be positioned and moved around. Then the game designer can set
    up rules for each of the objects in the scene.


    One of the first tools built in this way is called Game Salad. Game Salad is used
    as an educational tool to help teach children about computer science, and it can
    be used in a K-12 curriculum. But Game Salad is a real tool, and it can be used
    to create real games for devices like the iPhone. Game Salad lets you draw the
    game on the screen, and then set up rules for each object behind the scenes. Game
    Salad is actually quite similar to Scratch, and after a child has mastered Scratch,
    if they are in middle school or high school years using Game Salad will seem like
    a natural transition.


    Another game building tool that some people use is called Corona. It uses a simple
    programming language called Lua. Corona is more coding based than the other tools
    we are describing in this phase; in fact, it is completely coding based. Many
    people prefer using this method, but these days being able to visualize your scenes
    and set them up without having to write code is a big step forward that saves
    a lot of work. That also helps the game developer focus on the actual design of
    the game itself, while with Lua, they are going to be getting lost in the coding
    details just to position objects on the screen and have them move about.


    After Game Salad, more sophisticated game building tools were developed that are
    visually oriented. Buildbox is a very easy tool to use that is excellent for children.
    They can learn how to create games without coding at all, but they can also use
    “scripts” to specialize the code behind the scenes for their own games. Buildbox
    has been used to develop some of the most frequently downloaded apps on the Apple
    app store. A game is divided into a series of scenes, and you design each scene
    as if you were using PowerPoint or Keynote, specifying the properties of each
    object on the scene. It then compiles it into a working game for you. Buildbox
    comes in 2D and 3D versions. When using the 2D version, ordinary graphics can
    be imported into the development environment to set up backgrounds, characters,
    objects, and enemies. The design can actually get quite sophisticated using logic
    tools, and many different templates can help the designer build game mechanics
    that are similar to many successful chart-topping games.


    The 3D version of the Buildbox is a little more sophisticated. Since it’s a true
    3D system, the objects in the games are actually meshes rather than image files.
    This version of Buildbox also lets designers get under the hood. Mind maps let
    you build up the behaviors of characters and other objects in the game, and you
    can actually work with the coding scripts of each element in the mind map. Those
    who master coding will be able to take advantage of these features in order to
    build up more sophisticated and complex games.


    Unity 3D is the most sophisticated and popular tool used to build games for multiple
    platforms, including mobile, tablets, desktop computers, Apple TV, and Xbox. Unity
    is a middle ground tool, you build scenes visually on the screen, and set properties,
    but it also has coding behind it using a derivative of the C programming language
    called C# (C sharp). Unity developers are in high demand by the video gaming industry,
    so any children who are interested in careers as video game programmers can benefit
    by learning Unity, once they have learned to code very well in other contexts.
    Unity is powerful but a bit complicated. However, older children can begin learning
    Unity by following a careful course.


    ## CHAPTER 4: Debugging


    Debugging is the process or technique used to detect and eliminate problems that
    arise during writing and execution of a program. Since its incorporation in the
    1940s, computer debugging has become one of the techniques used to prevent errors,
    bugs as well as mistakes arising during programming processes. The direct opposite
    of the term is anti-debugging, which entails reversing the method of detecting
    and removing such errors with tools like modified codes, API-based and timing,
    and latency.


    In Python, the software also includes debugging but primarily depends on Python
    interpreter to reading, recognize, and eliminate problems. In some cases, Python
    debugging is quite effective and enables programmers to engage in the creation
    of programs after every breakpoint. When writing codes, you may continually input
    your codes without recognizing errors, bugs, or even typos that may affect your
    outcome. Therefore, debuggers tend to indicate these problems and may either provide
    solutions instantly or take a breaking point for you to correct it.


    ### Process of Computer Debugging


    ### Problems Identification and Reproduction


    When writing codes, you begin writing from the command line, and you may either
    write continuously or the computer executing each command when a line is done.
    In this case, you may run into errors, and the debuggers are hence helpful. In
    this step, debuggers tend to recognize these mistakes and reproduce the problem
    to identify its viability. Either nontrivial or other bugs can be readily identified
    and later replicated to ascertain how they work and affect your coding processes.'
