    \ 应用程序。只需启动终端，在命令提示符下输入：“idle”。现在你已经启动了 Python，是时候开始编码了。\n\n现在，让我们在 Python 中创建我们的第一个程序。按照以下步骤编写你的第一个\
    \ Python 程序：\n\n- 打开 Python IDLE。\n- 在 IDLE 窗口中编写 Python 语言语句（指令）。\n- 运行程序\n\n\
    就是这样！很简单。不是吗？\n\n现在，这里有一个快速的方法来实际查看编程过程……继续操作，将以下代码复制/粘贴到你的 Python IDLE 窗口中。\n\
    \n```\nprint (“Hello World! This is my first Machine Learning program”)\n```\n\
    \n运行程序。你看到的输出是什么？\n\n嗯，出现了短语“Hello World! This is my first Machine Learning program”。\n\
    \n恭喜！你刚刚写下了你的第一行 Python 代码。我知道你现在很兴奋，想要开始编写机器学习系统。不要过于担心语句的含义。如果你是机器学习新手，掌握一些\
    \ Python 编程概念将帮助你理解如何设计机器学习应用。\n\n接下来，让我们一起深入了解 Python 编程的基础知识。\n\n## Python 概述\n\
    \n既然你已经执行了你的第一个 Python 程序，你还需要知道什么？嗯，现在是时候了解任何 Python 代码的关键组成部分了，包括其结构。所有 Python\
    \ 程序都具有以下结构：\n\n```\nimport sys\ndef main ():\n    main ()\n    {\n        Program\
    \ statements\n    }\n```\n\n正如你从这个程序结构中看到的，所有 Python 代码都应该始终以关键字“import”开头。那么，我们导入的是什么？Python\
    \ 语言是面向对象的。因此，它具有所有面向对象编程语言的组件。其中一个特性是继承，或者简单地说，是代码重用。Python 中继承代码特性的能力允许程序员重用在其他地方编写的代码片段。\n\
    \n从技术上讲，import 语句告诉 Python 解释器声明已经在其他 Python 包中使用的类，而无需引用它们的完整包名。例如，语句：“import\
    \ sys”告知解释器在 Python 程序启动时包含所有系统库，例如 print。\n\n### 语句“def main ( ):”是什么意思？\n\n\
    每当 Python 程序被加载和执行时，计算机的内存——随机存取存储器——包含带有函数定义的对象。函数定义为程序员提供了指示控制单元将函数对象放置到计算机内存适当部分的能力。换句话说，就像指示控制单元检查主内存并初始化需要执行的程序一样。\n\
    \n内存中的函数对象可以使用名称来指定。这就是语句“def main ( ):”的用武之地。它只是告诉控制单元开始执行紧接在语句“def main ( ):”之后的\
    \ Python 代码语句。\n\n例如，下面的 Python 代码创建了一个函数对象并将其命名为“main”：\n\n```\ndef main ():\n\
    \    if len (sys.argv) == 10:\n        name = sys.argv [2]\n    else:\n      \
    \  name = \"Introduction to Machine Learning.\"\n    print (\"Hello\"), name\n\
    ```\n\n在上面的代码中，Python 解释器将通过将一组函数对象放入内存并将每个函数对象与命名空间链接起来，来运行 Python 文件中的所有函数语句。这将在程序通过\
    \ import 语句初始化时发生。\n\n但更根本的是，“Python 代码有哪些不同的元素？”嗯，所有 Python 程序都具有以下组成部分：\n\n\
    - **记录程序。** 程序中任何以“#”开头的语句（第一个除外）都被视为命令行或注释行，并在执行期间被忽略。这将允许你对代码部分进行注释，以便正确记录。\n\
    - **关键字。** 关键字是解释器识别和理解的指令。例如，前面程序中的单词“print”就是一个关键字。在 Python 中，关键字主要有两种类型：函数和控制关键字。函数是简单的动词，如\
    \ print，告诉解释器要做什么，而控制关键字控制执行流程。\n- **模块。** Python 程序附带大量模块，这些模块增加了其功能。模块将帮助你以易于调试和控制代码的方式组织代码。\n\
    - **程序语句。** 程序语句是告诉控制单元执行给定操作的句子或指令。与大多数编程语言不同，Python 语句不需要在末尾加分号。\n- **空白。**\
    \ 空白是制表符、空格和换行符/回车符的统称。Python 语言对代码中空白的位置要求严格。\n- **转义序列。** 转义序列是用于输出的特殊字符。例如：程序中的序列“\\\
    n”告诉 Python 在新行上输出。\n\n## Python 变量\n\n每当你运行程序时，计算机的主内存中都会发生很多事情。理解变量和数据类型的概念将帮助你编写高效的程序。\n\
    \n程序只是一系列指令（语句），指导你的计算机执行特定任务。例如，前面的程序在执行时在屏幕上打印了短语“Hello World! This is my first\
    \ program”。但在你能在屏幕上看到输出之前，一些数据必须保存在计算机的内存中。\n\n数据的使用适用于所有编程语言——包括 Python——因此，理解计算机内存中数据管理的机制是开发健壮、高效和强大应用程序的第一步。\n\
    \n变量可以被设想为计算机主内存中的一个临时存储位置，特别是随机存取存储器中的一个临时存储位置。这个临时存储位置将保存你希望在程序中使用的数据。换句话说，变量是程序执行时保存数据的内存位置。因此，每当你定义一个变量时，你实际上是在计算机内存中保留一个临时存储位置。\n\
    \n你定义的所有变量都必须有名称和相应的数据类型——一种对变量进行分类的类型，指定变量应保存的值的类型。数据类型有助于指定你可以对变量应用哪些类型的数学、关系甚至逻辑操作，而不会导致错误。理想情况下，当你将变量分配给数据类型时，你就可以开始在计算机的主内存中存储数字、字符甚至常量。\n\
    \n由于 Python 语言是一种面向对象的编程语言，它不是“静态类型”的。这意味着解释器将每个变量视为一个对象。因此，你必须在程序中使用变量之前声明它们。那么，你如何在\
    \ Python 中声明变量呢？\n\n名称或标识符通常用于声明 Python 变量。就像你迄今为止学习的任何其他编程语言一样，必须严格遵守变量命名约定。以下是你在声明变量时应遵循的一些命名约定：\n\
    \n- 所有变量名应始终以字母（A 到 Z）或下划线开头。例如，“age”是一个有效的变量名，而“–age”则不是有效的变量名。\n- 你声明的任何变量名都不能以数字开头。例如，9age\
    \ 不是有效的变量名。\n- 声明变量名时不应使用特殊符号。例如，@name 不允许作为变量名。\n- 你的变量名使用的最大字符数不应超过 255。\n\n\
    要以变量的名义保留一个临时内存位置，你不必像其他编程语言那样使用显式声明。如果你有其他编程语言（如 Pascal 或 C）的经验，我相信你知道在赋值之前显式声明变量是必须的。\n\
    \n在 Python 中，变量的声明通常在你为其赋值的那一刻自动发生。例如，语句：\n\n```\nage=10\n```\n\n自动在内存空间中保留一个名为“age”的临时存储位置，并将\
    \ 10 赋值给它。\n\n也可以同时将单个值赋给多个变量。例如，下面的语句保留"
