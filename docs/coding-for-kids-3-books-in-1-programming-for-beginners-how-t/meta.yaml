    # Environment Setup


    Since computers lack the ability to understand high-level programming languages
    directly, we use translator or convertor where we write our code and then translate
    it to machine code. We call this a development environment.


    Although it is not a programming element by itself, setting up your development
    environment is usually the very first step to working with every programming language.
    It mainly comprises of installing a certain type of software on your computer
    so that you can create computer code and translate this code into the language
    your computer can understand.


    With most high-level programming languages, the most notable tools necessary to
    create a conventional programming environment are:


    # Text Editor


    A text editor is a piece of software we use to write computer code in plain text
    without formatting. Microsoft Windows has Notepad as its'
