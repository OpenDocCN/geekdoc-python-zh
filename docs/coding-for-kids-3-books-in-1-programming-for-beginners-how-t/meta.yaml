    # Compiler


    Now that you have written the program and you are all ready to test if you have
    written it correctly or not, you have to give it to the computer and see if it
    understands what you are trying to communicate. However, the computer only understands
    binary language, and what you have written is far from what it can directly digest.
    Therefore, this file needs to be converted into a binary format.


    If you have made syntactical errors and not followed the rules of the programming
    language, the compiler will not be able to make this conversion smoothly and will
    raise an error message for you. Therefore, the compiler is a program that checks
    if you have followed the syntactical rules of the chosen programming language
    and converts the text file into its binary form. Moreover, this process of conversion
    is referred to as compilation.


    Most programming languages like C, Java, C++, and Pascal, besides many others,
    require compilation, and you will need to install their respective compilers before
    you can execute any programs written using them.


