    \n### 函数\n\n在这一阶段，你将了解如何在程序中轻松编写函数。函数是一行代码，旨在执行特定的任务。当你想编写一个执行特定任务的程序时，你必须定义函数并调用该函数。此外，我将教你如何将信息传递给函数并将其显示在屏幕上。\n\
    \n有时，解释某事的最佳方式是提供一个例子。下面的程序是一个欢迎程序，它打印一条消息。\n\n```python\ndef welcome_user():\n\
    \    \"\"\" Transmit a Welcome Message.\"\"\"\n    print(\"Welcome to Learning\
    \ Programming.\")\n\nwelcome_user()\n```\n\n在这个例子中，它展示了函数工作的最简单结构。第一行使用关键字“def”告诉解释器你想定义一个函数。因此，每当你看到“def”这个词以及它后面的词时，它就表示一个函数定义。括号用于保存你需要的信息。然后在括号之后，函数定义以冒号结束。\n\
    \n每当你在定义函数后看到缩进的行，那就是函数体。第二行被称为文档字符串，虽然它是一个注释，但描述了函数的目的。\n\n文档字符串通常用三个引号括起来。此外，第三行打印语句“Welcome\
    \ to Learning Programming.”。这一行包含了函数的主要信息。这意味着欢迎用户的主要工作是打印“Welcome to Learning\
    \ Programming.”。\n\n如果你想调用一个函数，你必须在函数名后跟上括号和冒号。我们的程序输出将如下所示：\n\n```\nWelcome to\
    \ Learning Programming.\n```\n\n### 如何将信息传递给函数\n\n我们将修改我们的例子来解释如何将信息传递给函数。我们可以这样做，使程序不仅说“Welcome\
    \ to Learning Programming”，还包括用户名。为此，我们必须请求用户输入他们的名字。\n\n```python\ndef welcome_user(name):\n\
    \    \"\"\"Transmit a Welcome Message.\"\"\"\n    print(f\"Welcome to Learning\
    \ Programming, {name.title()}!\")\n\nwelcome_user(\"Thomas\")\n```\n\n当我们输入 `welcome_user(\"\
    Thomas\")` 时，它调用函数 `welcome_user()` 并将名字“Thomas”传递给函数以执行打印命令。这样，我们的输出将是：\n\n```\n\
    Welcome to Learning Programming, Thomas!\n```\n\n### 参数与实参\n\n我们定义了一个函数，它要求用户为变量\
    \ `username` 输入一个值。一旦你调用该函数并为其赋值；它就会打印 `print()` 函数中的消息。我们的函数内部有一个变量。这个变量是程序中参数的一个例子，而\
    \ Thomas 是实参。实参是包含信息的值，从函数调用传递到函数。例如，当我们调用函数时，我们在函数内部放置了一个值。在这个场景中，我们的实参是“Thomas”，我们将信息传递给了函数。\n\
    \n注意：人们可以互换使用这两个术语。因此，当你看到函数的定义被称为实参或反之亦然时。\n\n### 如何在程序中传递实参\n\n由于函数定义可以有多个参数，函数调用也可能需要多个实参。这意味着你可以通过多种方式将实参传递给函数。你可以使用关键字实参或位置实参。在后者中，实参的顺序必须与参数的顺序相同，而在前者中，每个实参由一个变量名及其对应的值组成。\n\
    \n### 位置实参\n\n这种实参是在程序中传递实参的最简单方式，因为函数中的每个实参必须与函数声明部分中的参数匹配。为了了解这是如何工作的，让我们编写一个显示动物信息的程序。在这种情况下，函数告诉我们特定的动物类型和宠物的名字。\n\
    \n```python\ndef animal_list(animal_kind, pet_name):\n    \"\"\"Display Details\
    \ About Animal.\"\"\"\n    print(f\"\\nThis is a {animal_kind}.\")\n    print(f\"\
    My {animal_kind}'s name is {pet_name.title()}.\")\n```"
