    \n一个清晰的例子是，我们有计算机类，它可以有一个品牌、一种颜色、一个RAM内存、一个ROM内存、一个处理器等等，这些就是我们类的属性；然后是计算机可以执行的操作，比如浏览、开机、关机、发声等等，这些就是我们类的方法。\n\
    \n为了创建一个类，在这种情况下是计算机类，让我们看下面的例子：\n\n```python\nclass PC():\n    manufacturer=\"\
