  md: '# CHAPTER 14:


    # Installation and Running of Python


    # Official Version Installation


    # Mac


    Python is already pre-installed on the Mac and can be used directly. If you want
    to use other versions of Python, we recommend using the Homebrew installation.
    Open the Terminal and enter the following command at a command-line prompt, which
    brings you to Python’s Interactive Command Line:


    ```

    $python

    ```


    The Python input above is usually a soft link to a version of a Python command,
    such as version 3.5. If the corresponding version is already installed, you can
    run it in the following manner:


    ```

    $python3.5

    ```


    The terminal will display information about Python, such as its version number,
    followed by a command-line prompt for Python. If you want to exit Python, type:


    ```

    >>>exit()

    ```


    If you want to run a Python Program in your current directory, append the name
    to Python or Python 3:


    ```

    $python installation.py

    ```


    If the file is not in the current directory, you need to specify the full path
    of the file, such as:


    ```

    $python/home/authorname/installation.py

    ```


    We can also change the installation.py to an executable script. Just add the Python
    interpreter you want to use to the first line of the'
