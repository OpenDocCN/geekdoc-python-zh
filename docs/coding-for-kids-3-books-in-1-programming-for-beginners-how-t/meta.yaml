    # CHAPTER 3:


    # Programming Languages and IDEs


    In this phase, we are going to discuss some of the many computer languages and
    programming IDEs that are available to use. At this point, this information is
    for setting up the long-term direction of children who are learning to code. These
    are tools that are used in real-world applications, but in many cases, there is
    no reason why children can’t start learning to use these tools early. The same
    approach to programming can be used, starting off doing basic tasks and building
    up as time goes on, and children gain more experience. In the first phase, we
    will talk about the different computer languages that are used to give some familiarity
    with what’s out there.


    You can take this section with a little bit of a grain of salt. The reason I say
    that is computer languages are constantly evolving, and preferences and fads can
    come and go. That said, there are some core fundamental languages that should
    be learned at more advanced ages if the child is hoping to have some kind of career
    as a computer programmer or scientist.


    The first is C++. This was probably the first object-oriented programming language,
    and it is still widely used. There are some aspects of the language that make
    it hard to learn for some people, but the advantage of learning it is that not
    only will you gain a valuable skill that is still used in a wide range of applications,
    but it also serves as a solid training ground that makes picking up other computer
    languages quite easy.


    Java is also good to know. This is a language that is used in a lot of different
    applications, and its offshoot JavaScript is often used in web programming. Java
    was chosen as the language for apps made for the Android operating system, so
    knowing it is certainly going to'
