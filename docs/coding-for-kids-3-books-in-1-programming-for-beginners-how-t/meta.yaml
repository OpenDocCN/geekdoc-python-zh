    # Introduction


    Welcome to the world of computer programming for kids, or the act of writing a
    program to tell your computer what to do. Programs are written using a series
    of instructions in a particular language, three of which I will be talking about
    here – Java, SQL, and C++.


    Computer programming is not as difficult as it first looks, and it can be a lot
    of fun, as long as you do it properly. I have prepared a basic “Hello, World!”
    tutorial for each of the three languages, just to give you an idea of how it all
    works. Apart from this, I have also enclosed some useful tips for beginners and
    the common mistakes that newbies tend to make while programming.


    Simply, programming environment is a software that will allow you to create, compile,
    and execute computer programs on the system. It is an interface between the programmer
    and the computer, which will convert the programs that you will write into the
    computer’s language and ask it to execute the same for you. Therefore, before
    you pick up any programming language, be sure to enquire about the required programming
    environment and how the same can be set up on the computer that you intend to
    use for your programming course.


    Digging deeper into the programming environment and its setup, it is made up of
    three basic elements, namely text editor, compiler, and interpreter. In all probability,
    you will need all these three components for your course. So, before you go searching
    for them, let us help you understand what they exactly are and why you will need
    them.


    # Text Editor


    A text editor is a simple text program that will allow you to create text files
    in which you will write your code. Depending on the programming language you are
    working on, the extension of the text file will change, for instance, if you’re
    programming in C language, your text files will have the extension .c.


    If you are working on a Windows machine, you can simply search for Notepad in
    the search bar and use it as a text editor for your programs. You can also explore
    Notepad++ for some advanced options. It is freely available and you will just
    need to download and install it on your machine. On the other hand, if you are
    a Mac user, you can explore text editor options like BBEdit and TextEdit.


    # Compiler


    Now that you have written the program and you are all ready to test if you have
    written it correctly or not, you have to give it to the computer and see if it
    understands what you are trying to communicate. However, the computer only understands
    binary language, and what you have written is far from what it can directly digest.
    Therefore, this file needs to be converted into a binary format.


    If you have made syntactical errors and not followed the rules of the programming
    language, the compiler will not be able to make this conversion smoothly and will
    raise an error message for you. Therefore, the compiler is a program that checks
    if you have followed the syntactical rules of the chosen programming language
    and converts the text file into its binary form. Moreover, this process of conversion
    is referred to as compilation.


    Most programming languages like C, Java, C++, and Pascal, besides many others,
    require compilation, and you will need to install their respective compilers before
    you can execute any programs written using them.


    # Interpreter


    Unlike the programming languages mentioned above, there are some other programming
    languages like Python and Perl that do not require a compiler. Therefore, instead
    of a compiler, they need an interpreter, which is also software. The interpreter
    simply reads the program from the text file and as it parses the file, it converts
    the contents of the file and executes them. If you are working on any such programming
    languages, remember to install the corresponding interpreter on your system before
    starting.


    If you haven''t worked with a computer before or have little to no experience
    in installing software on the computer, technical advice from an expert is recommended.
    However, be sure to do the installation yourself, as it will help you build an
    acquaintance with the device that you will work with in the near future.


    Besides this, if your computer does not support the installation of any of the
    programming environment elements, you can also make use of the online compilers
    and interpreters that are available for all the different programming languages
    nowadays. All you need is a good Internet connection and a web browser to open
    these online facilities and get started with your programming lessons and practice
    sessions right away.


    # 1. What Is a Programming Language and Popular Programming Languages


    There are three main categories of computer programming language:


    ## Machine Language


    This is the default computer language that is built in primitive instructions
    represented to the computer in binary code. Thus, if you want to instruct a computer,
    you must write in binary code. Here is an example of ‘hello world’ in binary:


    ```

    01001000 01100101 01101100 01101100 01101111 00100000 01110111 01101111 01110010
    01101100 01100100

    ```


    ## Assembly Language


    Assembly languages are alternatives to machine languages. They use mnemonics to
    represent machine language instructions. Since computers cannot understand assembly
    language, we use a program called an assembler to convert assembly language code
    into machine language code. Compared to machine languages, assembly languages
    are relatively easier to learn and use, but they are still tedious because they
    are closer to machine language.


    ## High-Level Programming Languages


    The late 1990s ushered in the development of a new generation of computer programming
    languages called high-level programming languages.


    High-level programming languages are English-like computer programming languages
    that are platform-independent, which'
