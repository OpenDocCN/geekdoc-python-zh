    \n正如我们在这个例子中看到的，我们创建了PC类，品牌是Dell，拥有4 Gb的RAM，512 Gb的ROM和一个Intel i5处理器，这就是我们创建一个只有属性的类的方式，但要使用这个类，我们需要创建一个对象，这将在下面解释。\n\
    \n对象特性：\n\n- **对象：** 对象是类的一个实例。这个实体是一组属性、特性、行为或功能的集合，它们对程序中发生的事件做出反应。\n- **方法：**\
