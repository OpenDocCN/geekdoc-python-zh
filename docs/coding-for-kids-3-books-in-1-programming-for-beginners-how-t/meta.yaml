  md: '# CHAPTER 25:


    # Decision Trees


    Decision trees are built similarly to support vector machines, meaning they are
    a category of supervised Machine Learning algorithms that are capable of solving
    both regression and classification problems. They are powerful and used when working
    with a great deal of data.

    You need to learn beyond the barebones basics so that you can process large and
    complex datasets. Furthermore, decision trees are used in creating random forests,
    which is arguably the most powerful learning algorithm. In this phase, we are
    going to exclusively focus on decision trees explicitly because of their popular
    use and efficiency.


    # An Overview on Decision Trees


    Decision trees are essentially a tool that supports a decision that will influence
    all the other decisions that will be made. This means that everything from the
    predicted outcomes to consequences and resource usage will be influenced in some
    way. Take note that decision trees are usually represented in a graph, which can
    be described as some kind of chart where the training tests appear as a node.
    For instance, the node can be the toss of a coin, which can have two different
    results. Furthermore, branches sprout to individually represent the results, and
    they also have leaves, which are the class labels. Now you see why this algorithm
    is called a decision tree. The structure resembles an actual tree. As you probably
    guessed, random forests are exactly what they sound like. They are collections
    of decision trees, but enough about them.'
  merge: -1
  pgno: 235
- img_proc: true
  md: 'Decision trees are one of the most powerful supervised learning methods you
    can use, especially as a beginner. Unlike other more complex algorithms, they
    are fairly easy to implement and they have a lot to offer. A decision tree can
    perform any common data science task, and the results you obtain at the end of
    the training process are highly accurate. With that in mind, let’s analyze a few
    other advantages, as well as disadvantages, to gain a better understanding of
    their use and implementation.


    Let’s begin with the positives:


    +   1. Decision trees are simple in design and, therefore, easy to implement even
    if you are a beginner without a formal education in data science or Machine Learning.
    The concept behind this algorithm can be summarized with a sort of a formula that
    follows a common type of programming statement: If this, then that, else that.
    Furthermore, the results you will obtain are very easy to interpret, especially
    due to the graphic representation.

    2. The second advantage is that a decision tree is one of the most efficient methods
    in exploring and determining the most important variables, as well as discovering
    the connection between then. Also, you can build new features easily to gain better
    measurements and predictions. Don’t forget that data exploration is one of the
    most important stages in working with data, especially when there is a large number
    of variables involved. You need to be able to detect the most valuable ones in
    order to avoid a time-consuming process, and decision trees excel at this.

    3. Another benefit of implementing decision trees is the fact that they are excellent
    at clearing up some of the outliers in your data. Don’t forget that outliers are
    noise that reduces the accuracy of your predictions. In addition, decision trees
    aren’t that strongly'
  merge: -1
  pgno: 236
- img_proc: true
  md: 'affected by noise. In many cases, outliers have such a small impact on this
    algorithm that you can even choose to ignore them if you don’t need to maximize
    the accuracy scores.


    Finally, there’s the fact that decision trees can work with both numerical as
    well as categorical variables. Decision trees, on the other hand, are proven to
    be versatile and handle a much more varied set of tasks.

    As you can see, decision trees are powerful, versatile, and easy to implement,
    so why should we ever bother using anything else? As usual, nothing is perfect,
    so let’s discuss the negative side of working with this type of algorithm:


    +   1. One of the biggest issues encountered during a decision tree implementation
    is overfitting. Take note that this algorithm tends to sometimes create very complicated
    decision trees that will have issues generalizing data due to their complexity.
    This is known as over fitting, and it is encountered when implementing other learning
    algorithms as well, however, not to the same degree. Fortunately, this doesn’t
    mean you should stay away from using decision trees. All you need to do is invest
    some time to implement certain parameter limitations to reduce the impact of overfitting.

    2. Decision trees can have issues with continuous variables. When continuous numerical
    variables are involved, the decision trees lose a certain amount of information.
    This problem occurs when the variables are categorized. If you aren’t familiar
    with these variables, a continuous variable can be a value that is set to be within
    a range of numbers. For example, if people between ages 18 and 26 are considered
    of student age, then this numerical range becomes a continuous variable because
    it can hold any value between the declared minimum and maximum.'
  merge: -1
  pgno: 237
- img_proc: true
  md: 'While some disadvantages can add to additional work in the implementation of
    decision trees, the advantages still outweigh them by far.


    # Classification and Regression Trees


    Decision trees need to be divided into classification and regression trees. They
    handle different problems; however, they are similar in some ways since they are
    both types of decision trees.

    Take note that classification decision trees are implemented when there’s a categorical
    dependent variable. On the other side, a regression tree is only implemented in
    the case of a continuous dependent variable. Furthermore, in the case of a classification
    tree, the result from the training data is the mode of the total relevant observations.
    This means that any observations that we cannot define will be predicted based
    on this value, which represents the observation which we identify most frequently.


    Regression trees, on the other hand, work slightly differently. The value that
    results from the training stage is not the mode value, but the mean of the total
    observations. This way, the unidentified observations are declared with the mean
    value, which results from the known observations.


    Both types of decision trees undergo a binary split, however, going from the top
    to bottom. This means that the observations in one area will spawn two branches
    that are then divided inside the predictor space. This is also known as a greedy
    approach because the learning algorithm is seeking the most relevant variable
    in the split while ignoring the future splits that could lead to the development
    of an even more powerful and accurate decision tree.


    As you can see, there are some differences as well as similarities between the
    two. However, what you should note from all of this is that the splitting is what
    has the most effect on the accuracy scores of the decision tree implementation.
    Decision tree nodes are divided into sub-nodes, no matter the type of tree. This
    tree split is performed to lead to a more uniform set of nodes.'
  merge: -1
  pgno: 238
- img_proc: true
  md: 'Now that you understand the fundamentals behind decision trees, let’s dig a
    bit deeper into the problem of overfitting.


    # The Overfitting Problem


    You learned earlier that overfitting is one of the main problems when working
    with decision trees, and sometimes it can have a severe impact on the results.
    Decision trees can lead to a 100% accuracy score for the training set if we do
    not impose any limits. However, the major downside here is that overfitting creeps
    in when the algorithm seeks to eliminate the training errors, but by doing so,
    it actually increases the testing errors. This imbalance, despite the score, leads
    to terrible prediction accuracy in the result. Why does this happen? In this case,
    the decision trees grow many branches, and that’s the cause of overfitting. To
    solve this use, you need to impose limitations on how much the decision tree can
    develop and how many branches it can spawn. Furthermore, you can also prune the
    tree to keep it under control, much like how you would do with a real tree in
    order to make sure it produces plenty of fruit.

    To limit the size of the decision tree, you need to determine new parameters during
    the definition of the tree. Let’s analyze these parameters:


    +   1. **min_samples_split**: The first thing you can do is change this parameter
    to specify how many observations a node will require to be able to perform the
    splitting. You can declare anything with a range of one sample to maximum samples.
    Just keep in mind that to limit the training model from determining the connections
    that are very common to a particular decision tree, you need to increase the value.
    In other words, you can limit the decision tree with higher values.

    2. **min_samples_leaf**: This is the parameter you need to tweak to determine
    how many observations are required by a node, or in other words, a leaf. The'
  merge: -1
  pgno: 239
- img_proc: true
  md: 'overfitting control mechanism works the same way as for the samples split parameter.


    +   3. **max_features**: Adjust this parameter in order to control the features
    that are selected randomly. These features are the ones that are used to perform
    the best split. To determine the most efficient value, you should calculate the
    square root of the total features. Just keep in mind that in this case, the higher
    value tends to lead to the overfitting problem we are trying to fix. Therefore,
    you should experiment with the value you set. Furthermore, not all cases are the
    same. Sometimes a higher value will work without resulting in overfitting.

    4. **max_depth**: Finally, we have the depth parameter, which consists of the
    depth value of the decision tree. To limit the overfitting problem, however, we
    are only interested in the maximum depth value. Take note that a high value translates
    to a high number of splits, therefore a high amount of information. By tweaking
    this value, you will have control over how the training model learns the connections
    in a sample.


    Modifying these parameters is only one aspect of gaining control of our decision
    trees in order to reduce overfitting and boost performance and accuracy. The next
    step after applying these limits is to prune the trees.


    # Pruning


    This technique might sound too silly to be real; however, it is a legitimate Machine
    Learning concept that is used to improve your decision tree by nearly eliminating
    the overfitting issue. As with real trees, what pruning does is reduce the size
    of the trees in order to focus the resources on providing highly accurate results.
    However, you should keep in mind that the segments that are pruned are not entirely
    randomly selected, which is a good thing. The sections that are eliminated are
    those that don’t help with the classification'
  merge: -1
  pgno: 240
- img_proc: true
  md: process and don't lead to any performance boosts. Less complex decision trees
    lead to a better-optimized model.
  merge: -1
