    ## How Websites Work


    We’ve seen the different fields involved in web development; it’s only apt, I
    think, that you get a rough idea of how a website works. First things first, what
    is web development. For a developer or someone in tech, this is supposed to be
    a no brainer. But not all of us work in tech. So in the next few lines, we’ll
    be exploring this topic, of course, first with some little background.


    Just the same way every individual person is unique, but share the basic functions
    of the human body such as reproductive systems, respiratory systems, this is also
    a way one can describe websites.


    Each website could be said to be unique in its own individual way. However, there
    are basic components every website has. These are:


    **Client:** This is the device in which you are using to access the internet at
    a particular time. So this could be your desktop, laptop, phone, or tablet.


    **Server:** This is some sort of hard disk, or computer, a remote one though that
    contains all the files and codes that make a website run.


    **Database:** This is also part of the remote server, it stores dynamic information
    used or generated on a website. So account information of website users, log in
    details, and all of that. Here’s a way to explain the working of websites and
    the internet.


    So let’s assume Mike wants to visit Quora.com.


    - Mike types Quora website into the browser of his phone (the client).

    - His phone generates and sends a request to the remote server.

    - The server acts on the request, takes data from the database, and then sends
    it back to the server. All these happen at the Back-end.

    - Next, the server uses the data and produces a response with the use of front-end
    code.

    - Finally, the response is sent to the client (Mike’s phone), where it is then
    seen as Quora’s home page.


    ## CHAPTER 7: Pre-Schoolers Offline Coding


    Nowadays, it feels like babies are born with the ability to work a computer. Indeed,
    my youngest child was able to download apps and play them by himself by the age
    of about two and a half, simply by watching his older brother and copying what
    he did on his tablet.


    However, I wouldn’t recommend sitting a child as young as two or three down in
    front of a computer to teach them a computer programming language and expect them
    to pick it up. Indeed, even with older children, it is far better to learn the
    basics in a way that is hands-on. In fact, you don’t even need a computer to teach
    children the basics of coding. I know, it sounds crazy, right? Offline coding
    allows children to explore the concepts in a way that is fun and allows them to
    process it in their own way, relating them to real-life experiences.


    Another benefit of offline coding is that you can add these experiences into their
    everyday lives or in a school setting. They can be an added dimension to, say,
    a mathematics or English lesson.


    Offline coding can get a child interested in computer programming that may not
    otherwise want to sit in front of a computer and look at jargon for hours on end.


    Plus, there’s no guilt about how much time children spend in front of a computer,
    which means you can add in coding experiences more regularly during the day or
    week, and children don’t even have to know that they are learning coding unless
    you wish to tell them.


