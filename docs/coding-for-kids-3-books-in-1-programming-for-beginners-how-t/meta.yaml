- md: "## Using MySQL\n\nMySQL is another open-source RDBMS and cofounded by Michael\
    \ Widenius utilizing the concept of SQL programming. MySQL is used in different\
    \ popular websites such as Facebook, YouTube, and Flickr as well as database-driven\
    \ web programs such as phpBB, WordPress, and Drupal, among others. The initial\
    \ release was made in May 1995, written in C and C++ language with modifications\
    \ made on its vast range of features. As to use the MySQL database, you initially\
    \ have to install the application with the required configurations, run and launch\
    \ the program. Subsequently, you can connect to the MySQL database using different\
    \ steps, depending on the operating system.\n\n## Using Microsoft Access\n\nMicrosoft\
    \ Access was developed, designed, and modified by Microsoft and was first released\
    \ in November 1992. With its ability to link and access data stored in other programs\
    \ and databases, the application has gained popularity and used mostly for individual\
    \ use. It has also helped software developers and engineers, data architects,\
    \ and power users to create other programs. Microsoft Access remains supported\
    \ by Visual Basic for Applications, and ActiveX Data Objects, making it used in\
    \ the form of reports.\n\n## Using Microsoft SQL Server\n\nMicrosoft has also\
    \ incorporated Microsoft SQL Server, which is another relational database management\
    \ system used as a software product for the storage and retrieval of data when\
    \ requested by software applications. Different audiences use the software on\
    \ both small-scale and large internet facing programs, including other concurrent\
    \ users. Microsoft SQL Server was first released in April 1989 with currently\
    \ available in different editions to suit various needs such as web, enterprise,\
    \ express, and business intelligence. There exist also special editions, which\
