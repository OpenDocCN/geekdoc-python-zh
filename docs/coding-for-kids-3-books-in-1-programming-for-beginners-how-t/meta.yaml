    bit sizes. Object-Oriented Programming, on the one hand, is a different ball game
    altogether. It adopts a bottom to top problem-solving approach that looks for
    blueprints to the solution from the onset, thereby leaving implementation to a
    much later time.


    To develop you as a professional Python programmer, constructing objects, building
