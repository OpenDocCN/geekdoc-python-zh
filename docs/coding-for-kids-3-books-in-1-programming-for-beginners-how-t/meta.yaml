  md: '# Creating a List


    It is easy to create a list.


    ```

    >>> shopping_list = [''detergent'', ''deodorant'', ''shampoo'', ''body wash'']

    ```


    # Modifying a List


    A new value can be added to a list using the assignment operator.


    ```

    >>> shopping_list[1] = ''candles''

    >>> shopping_list

    [''detergent'', ''candles'', ''deodorant'', ''shampoo'', ''body wash'']

    ```


    # Stacks and Queues


    You can use lists to store and retrieve data or variables in a specific order
    since lists are ordered data types. The main models that one can use to do this
    are by using stacks and queues. A stack uses the last in first out (LIFO) approach.
    A real-world example of this approach is how the discard pile is used in a card
    game. You add cards to the top of the pile and remove the card from the top. You
    can include items into a stack using the list.append() function and remove the
    items from a stack using the pop() function. There are no additional index arguments
    that you will need to include when you use these functions, so the last item in
    the list is removed.


    ```

    >>> shopping_list.append(''brush'')

    >>> shopping_list.pop()

    ''candles''

    >>> shopping_list

    [''detergent'', ''deodorant'', ''shampoo'', ''body wash'']

    ```


    The second approach is to create the first in first out (FIFO) structure. A queue
    uses this type of approach. This method works like a pipe where the first item
    is pushed out of the pipe before the remaining items. You can use the same functions,
    append() and pop(), to either push items into the queue or remove them from the'
