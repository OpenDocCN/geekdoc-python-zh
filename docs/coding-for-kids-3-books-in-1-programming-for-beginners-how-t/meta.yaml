  md: '# High-Level Tools for Video Games


    Video games are one of the easiest ways to get children excited about coding.
    Since they enjoy playing video games, it’s a natural fit for many to want to make
    them as well. There are many high-level tools for video games that let you draw
    out the video game on the screen. As you draw out each scene, you can add objects
    to the scene, exactly as you want them to appear in the game. Then you specify
    how each object should behave when the game is running.


    Several tools are available that are quite similar to Scratch in the overall structure
    and function. They have scenes that can be drawn on the screen, and characters
    and objects can be position and moved around. Then the game designer can set up
    rules for each of the objects in the scene.


    One of the first tools build in this way is called Game Salad. Game Salad is used
    as an educational tool to help teach children about computer science, and it can
    be used in a k-12 curriculum. But Game Salad is a real tool, and it can be used
    to create real games for devices like the iPhone. Game Salad lets you draw the
    game on the screen, and then set up rules for each object behind the scenes. Game
    Salad is actually quite similar to Scratch, and after a child has mastered Scratch,
    if they are in middle school or high school years using Game Salad will seem like
    a natural transition.


    Another game building tool that some people use is called Corona. It uses a simple
    programming language call Lua. Corona is more coding based than the other tools
    we are describing in this phase; in fact, it is completely coding based. Many
    people prefer using this method, but these days being able to visualize your scenes
    and set them up without having to write code is a big step forward that saves
    a lot of work. That also helps the game developer focus on the actual design of
    the game itself, while with Lua, they are going to be getting lost in the coding
    details just to position objects on the screen and have them move about.


    After Game Salad, more sophisticated game building tools were developed that are
    visually oriented. Buildbox is a very easy tool to'
  merge: -1
  pgno: 101
- img_proc: true
  md: 'use that is excellent for children. They can learn how to create games without
    coding at all, but they can also use “scripts” to specialize the code behind the
    scenes for their own games. Buildbox has been used to develop some of the most
    frequently downloaded apps on the Apple app store. A game is divided into a series
    of scenes, and you design each scene as if you were using PowerPoint or Keynote,
    specifying the properties of each object on the scene. It then compiles it into
    a working game for you. Buildbox comes in 2D and 3D versions. When using the 2D
    version, ordinary graphics can be imported into the development environment to
    set up backgrounds, characters, objects, and enemies. The design can actually
    get quite sophisticated using logic tools, and many different templates can help
    the designer build game mechanics that are similar to many successful chart-topping
    games.


    The 3D version of the Buildbox is a little more sophisticated. Since it’s a true
    3D system, the objects in the games are actually meshes rather than image files.
    This version of Buildbox also lets designers get under the hood. Mind maps let
    you build up the behaviors of characters and other objects in the game, and you
    can actually work with the coding scripts of each element in the mind map. Those
    who master coding will be able to take advantage of these features in order to
    build up more sophisticated and complex games.


    Unity 3D is the most sophisticated and popular tool used to build games for multiple
    platforms, including mobile, tablets, desktop computers, Apple TV, and Xbox. Unity
    is a middle ground tool, you build scenes visually on the screen, and set properties,
