    ## CHAPTER 14: Installation and Running of Python


    ### Official Version Installation


    #### Mac


    Python is already pre-installed on the Mac and can be used directly. If you want
    to use other versions of Python, we recommend using the Homebrew installation.
    Open the Terminal and enter the following command at a command-line prompt, which
    brings you to Python’s Interactive Command Line:


    ```

    $python

    ```


    The Python input above is usually a soft link to a version of a Python command,
    such as version 3.5. If the corresponding version is already installed, you can
    run it in the following manner:


    ```

    $python3.5

    ```


    The terminal will display information about Python, such as its version number,
    followed by a command-line prompt for Python. If you want to exit Python, type:


    ```

    >>>exit()

    ```


    If you want to run a Python Program in your current directory, append the name
    to Python or Python 3:


    ```

    $python installation.py

    ```


    If the file is not in the current directory, you need to specify the full path
    of the file, such as:


    ```

    $python /home/authorname/installation.py

    ```


    We can also change the installation.py to an executable script. Just add the Python
    interpreter you want to use to the first line of the installation.py:


    ```

    #!/usr/bin/env Python

    ```


    In the terminal, change the installation.py to executable:


    ```

    $chmod +x installation.py

    ```


    Then, on the command line, type the name of the program file, and you’re ready
    to run it using the specified interpreter:


    ```

    $./installation.py

    ```


    If the installation.py is in the default path, then the system can automatically
    search for the executable and run it in any path:


    ```

    $installation.py

    ```


    #### Linux


    Linux systems are similar to Mac systems, and most come preloaded with Python.
    There are many Linux systems that offer something like Homebrew’s software manager,
    which, for example, is installed under Ubuntu using the following command:


    ```

    $sudo apt-get install Python

    ```


    Under Linux, Python is used and run in much the same way as on the Mac, and I
    won’t go into that again.


    #### Windows Operating System


    For the Windows operating system, you need to download the installation package
    from the official Python Website. If you don’t have access to Python’s website,
    search engines for keywords like “Python Windows download” to find other download
    sources. The installation process is similar to installing other Windows software.
    In the install screen, Customize the installation by selecting Customize, in addition
    to selecting Python components, check:


    - Add python.exe to Path


    Once installed, you can open the Windows command line and use Python as you would
    on a Mac.


    ### Other Python Versions


    The official version of Python mainly provides compiler/interpreter functionality.
    Other unofficial versions have richer features and interfaces, such as a more
    user-friendly graphical interface, a text editor for Python, or an easier to use
    module management system for you to find a variety of extension modules. In unofficial
    Python, the two most commonly used are:


    - 1) Anaconda

    - 2) Thought Python Distribution (EPD)


    Both versions are easier to install and use than the official version of Python.
    With the help of a module management system, programmers can also avoid annoying
    problems with module installation. So, it’s highly recommended for beginners.
    Anaconda is free, and EPD is free for students and researchers. Because of the
    graphical interface provided, their use method is also quite intuitive. I strongly
    recommend that beginners choose one of these two versions to use. The exact usage
    can be found in the official documentation and will not be repeated here.


    ### Virtualenv


    You can install multiple versions of Python on a single computer, and using virtualenv
    creates a virtual environment for each version of Python. Here’s how to install
    virtualenv using Python’s included pip.


    ```

    $pip install virtualenv

    ```


    You can create a virtual space for a version of Python on your computer, such
    as:


    ```

    $virtualenv –p /usr/bin/Python3.5 virtualPythonexample

    ```


    In the above command, /usr/bin/Python3.5 is where the interpreter is located,
    and virtualPythonexample is the name of the newly created virtual environment.


    The following command can start using the MYENV virtual environment:


    ```

    $source virtualPythonexample/bin/activate

    ```


    To exit the virtual environment, use the following command:


    ```

    $deactivate

    ```


    ## CHAPTER 15: The Importance of Data Types and Variables


    Now it is time for us to take a moment to look at some of the work that can be
    done with the data types and the variables that come with the Python language.
    Both of these are going to be important and will tell us a lot when it is time
    to work with the Python language as well. We are not going to get very far in
    some of the programmings that we want to do if we aren’t able to learn some of
    the different types of data that are out there, and we aren’t able to have a good
    understanding of how the variables work as well. Let’s take a look at some of
    the different types of data that come with Python, and how these variables work,
    so we are able to put it all together and see some great results in the process.


    ### The Python Data Types


    The first thing that we need to focus on here is the data types that come with
    Python. Each of the values that we are going to work within Python is going to
    have a data type. Since everything in this programming language is going to be
    an object, the types of data are actually going to be classes, and then the variables
    are going to be instances, or objects, of these classes. This is how all of the
    work is going to be tied in together.


    Now, you will find that there are various types of data that can show up in Python.
    Some of the ones that are the most important ones, and the ones that you are likely
    going to spend the majority of your time on in Python will be tackled below:


    First on the list is the Python numbers. These are going to include floating-point
    numbers, complex numbers, and integers. These are going to be brought out with
    the help of the function of type(), which can help us to know which class a variable
    or our value is going to belong to. This helps us to make sure that we are able
    to pull out the numbers that we would like in this coding language.


    We can also send out the Python list. This list is going to simply be an ordered
    sequence of items that we can work with. It is going to actually be the type of
    data that we are able to work within Python that is used the most, and it is very
    flexible. All of the items that are on the list do not need to end up being the
    same type of data either. In addition, the lists are going to be mutable, which
    simply means that the elements that are on the list can be altered in any way
    that you want.


    The Python tuple is also going to be important. The tuple is going to be an ordered
    sequence of items just the same as we see with the list. The biggest difference
    that you are going to see with these tuples is that they are immutable. Once you
    create one of these tuples, you are not able to make modifications to them. Tuples
    are going to be there to help us write/protect the data, and are usually going
    to perform faster than a list because it is not going to change dynamically at
    all.


    The Python string is the next thing that we are able to focus some attention on.
    The string is basically going to be a sequence of Unicode characters. We are going
    to have the option of working with either a single quote or a double quote to
