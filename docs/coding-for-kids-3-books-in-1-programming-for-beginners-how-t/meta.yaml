    # Execution


    When it comes to programming, iteration means the repetition of lines of code.
    It’s an essential property in computer programming that helps find solutions to
    problems. Iteration and conditional execution are the main stems of algorithm
    development.


    Let us start with the:


    # While Statement


    Say you want to write a program that can count to 10,000, how will you approach
    this problem? Will you sit down and write 10,000 printing statements? Although
    you can, that is going to consume a lot of your time. However, counting is frequent
    in computers, in fact, computers can count extraordinary values. So, there must
    be a way out. What you need to do is to print the value of a variable, and repeat
    the process until you reach 10,000. The method of executing the same code repeatedly
    is known as looping. Program language has two special statements, while and for,
    that handle iteration.'
