  md: 'default text editor. Source code is the name we use to refer to the Code written
    and saved by text editor.


    # Translators


    We use translators to convert source code into binary language. The binary code
    translated then becomes what programmers refer to as ‘object code.’ Translators
    can be:


    +   1. **Assemblers:** We use these to convert low-level languages into machine
    code.

    2. **Compilers:** Compilers convert source code to binary code and then execute
    the binary. If the program runs into an error during the execution process, the
    compilation stops without creating a binary. The most popular compiled languages
    are C, C++, Objective-C, Swift, and Pascal.

    3. **Interpreters:** Interpreters are similar to compilers but instead of running
    the entire program, they convert the code line by line. This means that every
    line of code runs until an error occurs. Once the program returns an error, the
    interpreter automatically stops and reports the error. The most popular interpreted
    languages are Python, Ruby, JavaScript, and Perl.

    4. **Hybrid Translators:** Hybrid translators are a combination of compilers and
    interpreters. They convert the source code into Bytecode. Runtime engines then
    translate and execute the bytecode. The main example here is Java that uses the
    Java Virtual Machine (JVM).


    **NOTE:** Set up your programming environment depending on the various instructions
    given by each of the three programming languages we shall be working with—and
    each language has different environment setup instructions.'
