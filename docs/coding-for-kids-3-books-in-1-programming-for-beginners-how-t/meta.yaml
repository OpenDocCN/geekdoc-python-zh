    programmer,” “I’m learning to code websites,” or “I can program very well with
    JavaScript.” The fact is that these two words —coding and programming—have been
    used interchangeably and will continue that way for a long time. Now the question
    is, are they actually the same thing, the exact same thing?


    # What is Programming?


    We’ve defined the coding, right? Okay, so a definition of programming will give
    us an idea of what it is and what it is not. Let’s use a very simple analogy.
    You have a digital phone, and I can assume that you set the alarm. You perhaps
    set the alarm to ring at the same time every day except on weekends.


    Maybe you muted a particular word on your Twitter so that anytime that word is
    mentioned, you don’t see it.


    Basically, this is what you did. You said to your devices if this happens, you
    do this. When its 5 am Mondays to Fridays, the alarm rings, once this particular
    number calls, block it. Once this word is mentioned, mute, I don’t want to see
    it.


    You see. It could be said that you programmed your device to behave in certain
    ways in certain situations. There were already instructions available from the
    manufacturer of the device; all you did was just tell your phone to obey the instructions
