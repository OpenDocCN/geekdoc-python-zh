  - '[PAGE 120]


    I will add in a note about pre-schoolers here because even though parents often
    say they aren’t going to let their toddlers use computers or tablets, there is
    no denying that some of these products are becoming geared toward this age group.
    I’m not going to go into the pros and cons of it or start a debate about whether
    a two-year-old should be bought a tablet or not, but I do believe there are benefits
    if they are used in moderation.


    While I didn’t grow up with a computer in my hand, I feel that my children’s generation
    is being brought up that way and that it does benefit them to know how to use
    computers; the future is becoming more and more technology-based and, therefore,
    their generation is going to be engrossed in it.


    Computers weren’t really used when I was a child, so as a teenager we were taught
    the very basics, such as how to turn the computer on, open Word Documents or set
    up a spreadsheet, and so on. While this may still be taught in ICT lessons, I
    think the presumption is that most children understand how to turn on a computer
    and open a program. Tablets are becoming more common in classroom settings, and
    I can only presume that eventually it will be assumed that children can do the
    basics and what is taught in schools will start a bit further along, therefore
    teaching them at a young age at home means they won’t be at a disadvantage.


    Again, this doesn’t mean I would recommend sitting down a toddler and teaching
    them Scratch or using computer jargon with them. You aren’t physically going to
    teach your toddler and pre-schooler coding, but you can teach them logical thinking
    and problem solving, which are skills needed for coding, and this can be done
    with inset puzzles and floor puzzles. These are, in essence, problem-solving tasks
    that allow children to examine smaller pieces to make a bigger picture; a foundation
    of coding is the ability to break a big problem down into small steps.


    # TangRams


    TangRams are also great for exploring shapes and solving problems; can children
    make a certain shape or picture? You can start by'
  - '[PAGE 121]


    getting younger children to match up the shapes to a board and talk with them
    about what the picture is. Then move on to have them copy a pattern or picture
    that you make. Then have them making up their own pictures and patterns.


    # Building Blocks


    Building blocks are also a great toy for budding engineers and computer programmers.
    After all, building something out of blocks takes a lot of determination and patience,
    especially for a toddler who is just starting to refine their motor skills. It
    also requires logical thinking to figure out how blocks can be placed, which pieces
    fit on top of each other, and which ones don’t. If it topples, they have to rebuild
    it, but work out a way that they can do so without it falling down again. Learning
    patience will be an extremely helpful skill for coding.


    # Dominos


    Domino chains help children to understand cause and effect. Stand the dominos
    on their sides to make a line or a pattern on the floor, what happens if one falls?


    At this age and stage of a child’s development, you don’t even need to relate
    it to coding and computers, you are just trying to install patience and logical
    thinking for the future.


    Games like Simon Says, Mother May I? As well as board games can help children
    think logically and follow instructions.


    Reading stories can help pre-schoolers understand sequencing.


    These types of toys can be used for teaching older children just by extending
    them, which will be explained in more detail later.


    # Copying Games


    # Back to Back Copying'
  - '[PAGE 122]


    These games are great for learning to give step by step directions and learning
    how to break these down into small steps, as well as showing the importance of
    giving these steps in a methodical way.


    One person gives an instruction and the other one copies. The goal is to replicate
    something that the person giving the instructions is looking at. This can be a
    model that they have made out of Lego, wooden blocks, a 2D shape picture, or a
    simple drawing.


    This game is best played in pairs. The players sit back to back or have a board
    between them so they can’t see what the other person is doing. The child can make
    the model or picture first, or you can give it to them. Again, this depends on
    context, age, and ability.


    Let’s say you are playing at home with your child using wooden blocks. You have
    made a structure. Now you have to describe this to the child for them to replicate,
    so you might say first place a blue cuboid/rectangle on its end, next place a
    cube/square on top. You can specify color or just use shape.


    While it sounds like an easy game, if the person giving the instructions isn’t
    exact, the person following can end up with an entirely different structure.


    # Learning Objectives


    This teaches the importance of giving instructions precisely and in the correct
    order and demonstrates what happens if something isn’t sequenced correctly.


    It is a fun game that also consolidates mathematical concepts such as positional
    language and shape names.


    # Color on Command


    For this game, you need a stack of cards with different directions written on
    them. These can be as simple as arrows.


    Give the child some graph paper with large squares or just draw squares on yourself.
    The bigger the squares, the quicker the game will be; the smaller the squares,
    the longer it will last, so this will'
  - '[PAGE 123]


    again be dependent on age. You can draw the squares by hand or do it on the computer.


    Let the child choose where to start. This can be a square in the middle of the
    piece of paper or at an edge or corner. When they have collared it in, they pick
    a card and follow the direction, so if it is an arrow that says forward one, then
    they color the next square along. If it says turn right or left, they choose a
    square to the right or left of the one they have just collared.


    You can add in ‘debugging’ concepts if they pick a card that then takes them off
    the edge of the page. Simply say something like, “Uh-oh, there’s a bug, we need
    to re-program the pen by choosing a different card.”


    If you want to make this more challenging, then you can add in “If”/Then statements
    such as “If you choose a card that is forwards THEN you color the square in red.”
    “If you choose a card that says turn THEN you color the square in blue.”


    # Math Codes


    You can add in a bit of mathematics practice while playing these coding games,
    as well. This can be either as part of a treasure hunt or just written down on
    paper for the fun of solving them. You can add in an extra challenge by saying,
    “How many can you solve in three/five/ten minutes?” and setting a timer.


    For example, using the numbers instead of a letters code, where A = 1 and B =
    2, you can leave spaces or draw a line for each letter and underneath write a
    maths sum. The child works out the sum, which gives them a number, which they
    then have to translate into a letter.


    An example of I LOVE YOU would be:


    ```

    ___ ___________ _____ _____ _____

    3x3 15-3 5x311x2 10-530-5 30-15 20 – 1

    ```'
  - '[PAGE 124]


    So 3x3 = 9, this corresponds to the letter I. 15 – 3 = 12, which corresponds to
    the letter L and so on. Of course, these are just examples. Make the sums as easy
    or difficult as you want, depending on the age and ability of the children. For
    five and six year Old’s, you may want to use minus and addition sums; for older
    children who are familiar with multiplication and division, you can start using
    those.


    # Learning Outcomes


    By working out written codes, children are problem-solving and refining their
    logical thinking skills. There is an element of literacy and mathematics if using
    number, letter, or symbol codes. They are also working in a methodical way. For
    example, to decipher your code with a code wheel, they need to try different options
    until the correct one is apparent.


    At home, working with a sibling or an adult or in a classroom situation, children
    who are working together to solve these puzzles and codes are also using their
    collaboration and teamwork skills.


    Encouraging children to design their own codes helps them be creative.'
- md: '## CHAPTER 8: Working with Files


    Programs are made with input and output in mind. You input data to the program,
    the program processes the input, and it ultimately provides you with output. For
    example, a calculator will take in numbers and operations you want. It will then
    process the operation you wanted. And then, it will display the result to you
    as its output.


    There are multiple ways for a program to receive input and to produce output.
    One of those ways is to read and write data on files. To start learning how to
    work with files, you need to learn the `open()` function.


    The `open()` function has one required parameter and two optional parameters.
    The first and required parameter is the file name. The second parameter is the
    access mode. And the third parameter is buffering or buffer size.


    The filename parameter requires string data. The access mode requires string data,
    but there is a set of string values that you can use and is defaulted to "r".
    The buffer size parameter requires an integer and is defaulted to 0.


    To practice using the `open()` function, create a file with the name `sampleFile.txt`
    inside your Program directory.


    Try this sample code:


    ```

    >>> file1 = open("sampleFile.txt")

    >>> _

    ```


    Note that the file function returns a file object. The statement in the example
    assigns the file object to variable `file1`. The file object has multiple attributes,
    and three of them are:


    - Name: This contains the name of the file.

    - Mode: This contains the access mode you used to access the file.

    - Closed: This returns `False` if the file has been opened and `True` if the file
    is closed. When you use the `open()` function, the file is set to open.


    Now, access those attributes.


    ```

    >>> file1 = open("sampleFile.txt")

    >>> file1.name

    ''sampleFile.txt''

    >>> file1.mode

    ''r''

    >>> file1.closed

    False

    >>> _

    ```


    Whenever you are finished with a file, close them using the `close()` method.


    ```

    >>> file1 = open("sampleFile.txt")

    >>> file1.closed

    False

    >>> file1.close()

    >>> file1.closed

    True

    >>> _

    ```


    Remember that closing the file does not delete the variable or object. To reopen
    the file, just open and reassign the file object. For example:


    ```

    >>> file1 = open("sampleFile.txt")

    >>> file1.close()

    >>> file1 = open(file1.name)

    >>> file1.closed

    False

    >>> _

    ```


    ## Reading from a File


    Before proceeding, open the `sampleFile.txt` in your text editor. Type "Hello
    World" in it and save. Go back to Program. To read the contents of the file, use
    the `read()` method.


    For example:


    ```

    >>> file1 = open("sampleFile.txt")

    >>> file1.read()

    ''Hello World''

    >>> _

    ```


    ## File Pointer


    Whenever you access a file, Program sets the file pointer. The file pointer is
    like your word processor''s cursor. Any operation on the file starts at where
    the file pointer is. When you open a file, and when it is set to the default access
    mode, which is "r" (read-only), the file pointer is set at the beginning of the
    file. To know the current position of the file pointer, you can use the `tell()`
    method.


    For example:


    ```

    >>> file1 = open("sampleFile.txt")

    >>> file1.tell()

    0

    >>> _

    ```


    Most of the actions you perform on the file move the file pointer. For example:


    ```

    >>> file1 = open("sampleFile.txt")

    >>> file1.tell()

    0

    >>> file1.read()

    ''Hello World''

    >>> file1.tell()

    11

    >>> file1.read()

    ''''

    >>> _

    ```


    To move the file pointer to a position you desire, you can use the `seek()` function.


    For example:


    ```

    >>> file1 = open("sampleFile.txt")

    >>> file1.tell()

    0

    >>> file1.read()

    ''Hello World''

    >>> file1.tell()

    11

    >>> file1.seek(0)

    0

    >>> file1.read()

    ''Hello World''

    >>> file1.seek(1)

    1

    >>> file1.read()

    ''ello World''

    >>> _

    ```


    The `seek()` method has two parameters. The first is `offset`, which sets the
    pointer''s position depending on the second parameter. Also, argument for this
    parameter is required. The second parameter is optional. It is for `whence`, which
    dictates where the "seek" will start. It is set to 0 by default.


    - If set to 0, Program will set the pointer''s position to the offset argument.

    - If set to 1, Program will set the pointer''s position relative or in addition
    to the current position of the pointer.

    - If set to 2, Program will set the pointer''s position relative or in addition
    to the file''s end.


    Note that the last two options require the access mode to have binary access.
    If the access mode does not have binary access, the last two options will be useful
    to determine the current position of the pointer `[seek(0, 1)]` and the position
    at the end of the file `[seek(0, 2)]`.


    For example:


    ```

    >>> file1 = open("sampleFile.txt")

    >>> file1.tell()

    0

    >>> file1.seek(1)

    1

    >>> file1.seek(0, 1)

    0

    >>> file1.seek(0, 2)

    11

    >>> _

    ```


    ## File Access Modes


    To write to a file, you will need to know more about file access modes in Program.


    There are three types of file operations: reading, writing, and appending.


    Reading allows you to access and copy any part of the file''s content.


    Writing allows you to overwrite a file''s contents and create a new one.


    Appending allows you to write on the file while keeping the other content intact.


    There are two types of file access modes: string and binary.


    String access allows you to access a file''s content as if you are opening a text
    file.


    Binary access allows you to access a file on its rawest form: binary.


    In your sample file, accessing it using string access allows you to read the line
    "Hello World." Accessing the file using binary access will let you read "Hello
    World" in binary, which will be `b''Hello World''`.


    For example:


    ```

    >>> x = open("sampleFile.txt", "rb")

    >>> x.read()

    b''Hello World''

    >>> _

    ```


    String access is useful for editing text files. Binary access is useful for anything
    else, like pictures, compressed files, and executables. In this book, you will
    only be taught how to handle text files.


    There are multiple values that you can enter in the file access mode parameter
    of the `open()` function. But you do not need to memorize the combination. You
    just need to know the letter combinations. Each letter and symbol stands for an
    access mode and operation. For example:


    - `r` = read-only—file pointer placed at the beginning

    - `r+` = read and write

    - `a` = append—file pointer placed at the end

    - `a+` = read and append

    - `w` = overwrite/create—file pointer set to 0 since you create the file

    - `w+` = read and overwrite/create

    - `b` = binary


    By default, file access mode is set to string. You need to add `b` to allow binary
    access. For example: "rb".


    ## Writing to a File


    When writing to a file, you must always remember that Program overwrites and not
    insert file.


    For example:


    ```

    >>> x = open("sampleFile.txt", "r+")

    >>> x.read()

    ''Hello World''

    >>> x.tell()

    0

    >>> x.write("text")

    4

    >>> x.tell()

    4

    >>> x.read()

    ''o World''

    >>> x.seek(0)

    0

    >>> x.read()

    ''texto World''

    >>> _

    ```


    You might have expected that the resulting text will be "textHello World". The
    write method of the file object replaces each character one by one, starting from
    the current position of the pointer.


    ## Practice Exercise


    For practice, you need to perform the following tasks:


    - Create a new file named `test.txt`.

    - Write the entire practice exercise instructions on the file.

    - Close the file and reopen it.

    - Read the file and set the cursor back to 0.

    - Close the file and open it using append access mode.

    - Add a rewritten version of these instructions at the end of the file.

    - Create a new file and put similar content to it by copying the contents of the
    `test.txt` file.


    ## Summary


    Working with files in Program is easy to understand but difficult to implement.
    As you already saw, there are only a few things that you need to remember. The
    hard part is when you are actually accessing the file. Remember that the key things
    that you should master are the access modes and the management of the file pointer.
    It is easy to get lost in a file that contains a thousand characters. Aside from
    being versed with the file operations, you should also supplement your learning
    with the functions and methods of the `str` class in Program. Most of the time,
    you will be dealing with strings if you need to work on a file.'
  mdcn: '## 第八章：文件操作


    程序的设计始终围绕着输入与输出。你向程序输入数据，程序处理这些输入，最终为你提供输出。例如，计算器会接收你输入的数字和运算符，然后处理你想要的运算，最后将结果显示给你。


    程序接收输入和产生输出的方式有多种。其中一种方式就是读写文件。要开始学习如何操作文件，你需要先了解 `open()` 函数。


    `open()` 函数有一个必需参数和两个可选参数。第一个必需参数是文件名。第二个参数是访问模式。第三个参数是缓冲区或缓冲区大小。


    文件名参数需要字符串数据。访问模式参数也需要字符串数据，但有一组可用的字符串值，默认值为 `"r"`。缓冲区大小参数需要一个整数，默认值为 `0`。


    为了练习使用 `open()` 函数，请在你的 Program 目录下创建一个名为 `sampleFile.txt` 的文件。


    尝试以下示例代码：


    ```

    >>> file1 = open("sampleFile.txt")

    >>> _

    ```


    请注意，该文件函数返回一个文件对象。示例中的语句将文件对象赋值给了变量 `file1`。文件对象有多个属性，其中三个是：


    -   Name：包含文件的名称。

    -   Mode：包含你用于访问文件的访问模式。

    -   Closed：如果文件已打开则返回 `False`，如果文件已关闭则返回 `True`。当你使用 `open()` 函数时，文件会被设置为打开状态。


    现在，访问这些属性。


    ```

    >>> file1 = open("sampleFile.txt")

    >>> file1.name

    ''sampleFile.txt''

    >>> file1.mode

    ''r''

    >>> file1.closed

    False

    >>> _

    ```


    每当你完成文件操作后，请使用 `close()` 方法关闭它们。


    ```

    >>> file1 = open("sampleFile.txt")

    >>> file1.closed

    False

    >>> file1.close()

    >>> file1.closed

    True

    >>> _

    ```


    请记住，关闭文件并不会删除变量或对象。要重新打开文件，只需打开并重新赋值文件对象即可。例如：


    ```

    >>> file1 = open("sampleFile.txt")

    >>> file1.close()

    >>> file1 = open(file1.name)

    >>> file1.closed

    False

    >>> _

    ```


    ## 从文件读取


    在继续之前，请在你的文本编辑器中打开 `sampleFile.txt`。在其中输入 "Hello World" 并保存。回到 Program。要读取文件内容，请使用
    `read()` 方法。


    例如：


    ```

    >>> file1 = open("sampleFile.txt")

    >>> file1.read()

    ''Hello World''

    >>> _

    ```


    ## 文件指针


    每当你访问一个文件时，Program 会设置文件指针。文件指针就像你的文字处理软件中的光标。对文件的任何操作都从文件指针所在的位置开始。当你打开一个文件，并且使用默认的访问模式（即
    `"r"`，只读模式）时，文件指针会被设置在文件的开头。要了解文件指针的当前位置，你可以使用 `tell()` 方法。


    例如：


    ```

    >>> file1 = open("sampleFile.txt")

    >>> file1.tell()

    0

    >>> _

    ```


    你对文件执行的大多数操作都会移动文件指针。例如：


    ```

    >>> file1 = open("sampleFile.txt")

    >>> file1.tell()

    0

    >>> file1.read()

    ''Hello World''

    >>> file1.tell()

    11

    >>> file1.read()

    ''''

    >>> _

    ```


    要将文件指针移动到你期望的位置，你可以使用 `seek()` 函数。


    例如：


    ```

    >>> file1 = open("sampleFile.txt")

    >>> file1.tell()

    0

    >>> file1.read()

    ''Hello World''

    >>> file1.tell()

    11

    >>> file1.seek(0)

    0

    >>> file1.read()

    ''Hello World''

    >>> file1.seek(1)

    1

    >>> file1.read()

    ''ello World''

    >>> _

    ```


    `seek()` 方法有两个参数。第一个是 `offset`，它根据第二个参数设置指针的位置。此外，此参数的参数是必需的。第二个参数是可选的。它用于 `whence`，它决定了“查找”从哪里开始。默认值为
    `0`。


    -   如果设置为 `0`，Program 将指针的位置设置为 offset 参数的值。

    -   如果设置为 `1`，Program 将指针的位置设置为相对于或加上指针当前位置的值。

    -   如果设置为 `2`，Program 将指针的位置设置为相对于或加上文件末尾的值。


    请注意，后两个选项要求访问模式具有二进制访问权限。如果访问模式没有二进制访问权限，后两个选项将用于确定指针的当前位置 `[seek(0, 1)]` 和文件末尾的位置
    `[seek(0, 2)]`。


    例如：


    ```

    >>> file1 = open("sampleFile.txt")

    >>> file1.tell()

    0

    >>> file1.seek(1)

    1

    >>> file1.seek(0, 1)

    0

    >>> file1.seek(0, 2)

    11

    >>> _

    ```


    ## 文件访问模式


    要写入文件，你需要更多地了解 Program 中的文件访问模式。


    文件操作有三种类型：读取、写入和追加。


    读取允许你访问和复制文件内容的任何部分。


    写入允许你覆盖文件内容并创建一个新文件。


    追加允许你在写入文件的同时保持其他内容不变。


    文件访问模式有两种类型：字符串和二进制。


    字符串访问允许你像打开文本文件一样访问文件内容。


    二进制访问允许你以最原始的形式访问文件：二进制。


    在你的示例文件中，使用字符串访问可以让你读取 "Hello World" 这一行。使用二进制访问文件将让你以二进制形式读取 "Hello World"，即
    `b''Hello World''`。


    例如：


    ```

    >>> x = open("sampleFile.txt", "rb")

    >>> x.read()

    b''Hello World''

    >>> _

    ```


    字符串访问对于编辑文本文件很有用。二进制访问对于其他任何事情都很有用，比如图片、压缩文件和可执行文件。在本书中，你将只学习如何处理文本文件。


    在 `open()` 函数的文件访问模式参数中，你可以输入多个值。但你不需要记住这些组合。你只需要知道字母组合。每个字母和符号代表一种访问模式和操作。例如：


    -   `r` = 只读——文件指针置于开头

    -   `r+` = 读写

    -   `a` = 追加——文件指针置于末尾

    -   `a+` = 读取和追加

    -   `w` = 覆盖/创建——由于你创建了文件，文件指针设置为 0

    -   `w+` = 读取和覆盖/创建

    -   `b` = 二进制


    默认情况下，文件访问模式设置为字符串。你需要添加 `b` 以允许二进制访问。例如："rb"。


    ## 写入文件


    写入文件时，你必须始终记住 Program 是覆盖而不是插入文件。


    例如：


    ```

    >>> x = open("sampleFile.txt", "r+")

    >>> x.read()

    ''Hello World''

    >>> x.tell()

    0

    >>> x.write("text")

    4

    >>> x.tell()

    4

    >>> x.read()

    ''o World''

    >>> x.seek(0)

    0

    >>> x.read()

    ''texto World''

    >>> _

    ```


    你可能预期结果文本会是 "textHello World"。文件对象的 write 方法从指针的当前位置开始，逐个替换每个字符。


    ## 练习


    为了练习，你需要执行以下任务：


    -   创建一个名为 `test.txt` 的新文件。

    -   将整个练习说明写入该文件。

    -   关闭文件并重新打开它。

    -   读取文件并将光标移回 0。

    -   关闭文件并使用追加访问模式打开它。

    -   在文件末尾添加这些说明的改写版本。

    -   创建一个新文件，并通过复制 `test.txt` 文件的内容为其放入类似内容。


    ## 总结


    在 Program 中操作文件易于理解但难以实现。正如你已经看到的，你需要记住的东西并不多。困难的部分在于你实际访问文件的时候。请记住，你应该掌握的关键是访问模式和文件指针的管理。在一个包含数千个字符的文件中很容易迷失方向。除了精通文件操作外，你还应该通过
    Program 中 `str` 类的函数和方法来补充你的学习。大多数时候，如果你需要处理文件，你将处理字符串。'
