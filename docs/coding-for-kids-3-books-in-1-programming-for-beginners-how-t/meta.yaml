  mdcn: "## If-Else 条件语句\n\n这就是为什么我们要继续学习 if-else 语句。这种语句比我们之前看到的“if”语句使用得更频繁，它能够处理一些我们在“if”语句中遇到的问题。这种语句将结合我们之前讨论的一些主题，并进行一些修改以解决这些问题，确保一切正常运行。\n\
    \n假设我们仍然在处理与上面相同的程序。但这一次，我们希望确保无论用户输入什么答案，屏幕上都能显示某种结果。因此，我们将根据用户的年龄将他们分为两组：一组是18岁以上，另一组是18岁以下，并根据此给出系统的响应。我们可以用来帮助编写自己的“if\
    \ else”语句的代码如下：\n\n```\nage = int(input(\"Enter your age:\"))\nif (age <= 18):\n\
    \    print(\"You are not eligible for voting, try next election!\")\nelse:\n \
    \   print(\"Congratulations! You are eligible to vote. Check out your local polling\
    \ station to find out more information!\")\nprint(\"Program ends\")\n```\n\n如你所见，这确实为你的代码增加了更多选项，并确保无论用户给出什么结果，你都能得到一个答案。你也可以更改消息内容，但无论用户给出什么答案，基本思路都是一样的。你还可以添加更多可能性。你并不局限于上面所示的两个选项。如果这对你的程序来说已经足够，那就直接使用。但如果你需要使用超过两个选项，你也可以扩展它。例如，将上面的选项扩展为几个不同的年龄组。也许你想为18岁以下、18至30岁之间以及30岁以上的人提供不同的选项。你可以这样分类，当程序从用户那里获得答案时，它将执行你想要的部分。这样做的好处在于，我们可以编写许多不同的选项和程序来配合使用。也许我们想创建自己的程序，让用户可以选择他们最喜欢的糖果类型。糖果种类繁多，名称各异，很难提前全部列出并做好准备。但“if\
    \ else”语句可以帮助我们处理所有这些情况。\n\n在这种情况下，我们只需选择一定数量的糖果选项，比如前六种，然后列出相应的响应。然后，我们在最后使用“if\
    \ else”语句来捕获所有不符合我们最初列出的六种选项的答案。这确保了无论用户向系统输入什么，他们都能从过程中得到某种响应。在所有这些中，else 语句是一个重要的部分，必须确保它的存在，因为它负责捕获用户可能给出的所有剩余答案。如果你没有在代码中放置这个语句，或者没有放在正确的位置，它将无法像你希望的那样捕获所有其他可能的用户输入。\n\
    \n现在我们已经有机会讨论了“if”语句和“if else”语句，是时候继续学习“elif”语句了。这些是 Python 语言编程中的独特部分，它们将帮助我们为能够使用的条件语句增加另一个层次。这种条件语句将允许用户从你提供的几个选项中进行选择，然后根据用户选择的答案或选项，程序将执行相应的代码并提供与该答案匹配的结果。\n\
    \n## Elif 条件语句\n\n你会发现这些“elif”语句会出现在许多不同的地方。一个例子是它们出现在你玩的游戏中。如果你曾经玩过游戏或使用过其他类型的程序，其中提供了菜单式的选择，那么你已经体验过这些“elif”语句的工作了。\n\
