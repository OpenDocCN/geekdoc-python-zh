    # Dictionaries


    A dictionary is much like an address book. If you know the name of the person
    you wish to contact, you can obtain the details of that person. The name of the
    person is the key, while the details of the person are the value.


    The key that you use in a dictionary should be an immutable data type; that is,
    it can be a number, tuple, or string. The value can be anything. A dictionary
    is a mutable data type, and it is for this reason that you can add, modify, or
    remove any pairs from the dictionary. The keys are mapped to an object, and it
    is for this reason that a dictionary is also known as mappings. This will show
    you that a dictionary behaves different to a sequence.


    A dictionary can be used anywhere you want to store a value or attribute that
    will describe an entity or a concept. For instance, you can use a dictionary to
    count the number of instances of a specific state or object. Since every key has
    a unique identifier, you cannot have duplicate values for the same key. Therefore,
    the key can be used to store the items in the input data, and the values can store
