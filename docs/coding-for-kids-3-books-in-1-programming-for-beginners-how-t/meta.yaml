  md: '# CHAPTER 10:


    # OOP (Object-Oriented Programming)


    Object-oriented programming is a form of programming in which we can observe in
    a more real way than the things that occur to us at the time of programming. This
    is a paradigm, which refers to theories, models, and methods that allow us to
    solve more quickly and efficiently any problem that may arise.


    As its name implies, object-oriented programming is based on the object model,
    where the object itself is the main element that will contain all its characteristics
    and behavior, making it independent, but at the same time relating it to elements
    of a class.


    This type of programming differs from structured programming since its main objective
    is that through some input data, produce an output.


    Some of the benefits of working with OOP are:


