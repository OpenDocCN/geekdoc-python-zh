    # CHAPTER 16:


    # Strings, Lists, Dictionaries, and Tuples


    Programmers often use strings, lists, dictionaries, and tuples when they write
    a script in Python. These data types are known as data structures. Strings are
    pieces of text that are grouped, while tuples and lists are groups of individual
    data items that have been grouped. A dictionary is a group of pairs that have
    the highest considerations. The different methods that are used to access the
    data in these structures are the same.

    You can also look at these data types differently, depending on whether the values
    that the variable holds can be modified. This is called the mutability of the
    data type. A string and tuple cannot be modified, but they can be used to create
    new tuples and strings. A list is mutable, which means that you can either remove
    or add items to it.


    # Items in Sequences


    You can fetch individual items in a sequence using an index. This index will indicate
    the position of the element. The index is often an integer that is written in
    square brackets immediately after the name of the variable. So, you can obtain
    the variable in a list by specifying the name of the list, followed by the index.
    You can also access a single character in a string.


    ```

    >>> vegetable = ''pumpkin''

    >>> vegetable [0]

    ''p''

    Or an item in a list:

    >>>vegetable = [''pumpkins'', ''potatoes'', ''onions'', ''eggplant'']

    ```'
