    ## Programming vs. Coding


    We often hear such phrases such as, “I’m learning to code,” “My boyfriend is a
    programmer,” “I’m learning to code websites,” or “I can program very well with
    JavaScript.” The fact is that these two words —coding and programming—have been
    used interchangeably and will continue that way for a long time. Now the question
    is, are they actually the same thing, the exact same thing?


    ## What is Programming?


    We’ve defined the coding, right? Okay, so a definition of programming will give
    us an idea of what it is and what it is not. Let’s use a very simple analogy.
    You have a digital phone, and I can assume that you set the alarm. You perhaps
    set the alarm to ring at the same time every day except on weekends.


    Maybe you muted a particular word on your Twitter so that anytime that word is
    mentioned, you don’t see it.


    Basically, this is what you did. You said to your devices if this happens, you
    do this. When its 5 am Mondays to Fridays, the alarm rings, once this particular
    number calls, block it. Once this word is mentioned, mute, I don’t want to see
    it.


    You see. It could be said that you programmed your device to behave in certain
    ways in certain situations. There were already instructions available from the
    manufacturer of the device; all you did was just tell your phone to obey the instructions
    in certain situations.


    Programming could be said to be providing instructions for something or someone
    to follow. For example, soldiers at the sound of certain commands will perform
    certain manoeuvres. It could be to march, charge, and withdraw, etc. Therefore,
    programming deals with the creation of a way (a program) that provides executable
    instructions for a machine to carry out, making it behave in a certain way.


    So the process of creating those instructions which your phone followed is coding,
    and then making your device do what those instructions have said is programming.


    A programmer is more like an engineer. A client wants a car that can fly. The
    engineer designs it, and then a technologist builds it based on the design the
    engineer has provided.


    So coding is about writing codes, while a programmer does many other things. These
    include problem-solving, planning, conceptualization, leadership, critical thinking,
    understanding data structures, implementing algorithms, and many more. A programmer
    looks for the best way a project (be it an app, a website, or something else)
    can be done the fastest and easier way. He breaks them down into bite-sized chunks,
    and then it can then be distributed amongst different coders as they work on several
    parts.


    This is way beyond learning or writing code. It actually takes years of practice
    to acquire this skill. It’s very much easier to code than to program. Of course,
    programmers know code, always knew code, but the same can’t be said for coders,
    especially those who are just learning. Programming is used in a broader sense
    and coding is just one of the many processes of programming.


    Coding is like writing a chapter, whereas programming is writing a book.


    Programming involves deciding the right instructions and then providing instructions
    for a machine to carry it out, of course, with the expectation of a certain result,
    whereas coding is translating those predetermined instructions into a language
    the computer can understand.


