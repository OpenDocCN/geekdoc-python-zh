    ```

    >>>vegetable [1]

    ‘Pumpkins’

    ```


    You will notice that indexing in Python is zero-based. This means that you can
    only start counting the variables at zero. An index with the number 3 in the square
    brackets will look at the fourth item in the list since the first item will be
    indexed as zero. So, you can use any number of integers beginning from zero to
    index the variables in your data set. A negative index will count the list from
    the end to the beginning:


    ```

    >>>vegetable [-1]

    ‘eggplant’

    ```


    Slices can be used to grab the different sections in any sequence. This method
    is used to fetch many items in a sequence. A slice is written using the same notation
    as an index, the only difference is that a colon separates the integers. The first
    value is the starting point, and this value is included. The second number in
    the notation is the endpoint of the slice, and it is exclusive. If you look at
    s[0:2], the compiler will slice the list from the variable with the index zero
    and stop exactly before the variable with the index two. You do not necessarily
    have to use the third value, and this is an additional step. This can be negative;
    therefore, you can retrieve all the other items instead of picking this item from
    the sequential list. Alternatively, you can retrieve items backward as well. So,
    s [i: j: step] will give you the slice that begins from the variable i, but will
    not include the variable j. Here, s is the sequence.


    If you ignore the initial point, the slice will always start at the beginning
    of the sequence. If you forget the end, the slice will continue to the end of
    the original or main sequence. Slicing and indexing do not change the original
    sequence, they will develop a new sequence. The actual data items in the sequence
    will be the same. So, if you want to modify an individual item in the sequence,
    you will see that the item has changed in the slice as well.


