    ## CHAPTER 2: What Is Coding


    Some people say coding is hard; some say it is easy. It’s all subjective. However,
    coding can be a bit complicated, especially when you are starting from Scratch.
    So you need to understand how code works. Exactly what happens when you code?
    Do you know the mechanics behind coding? That’s the reason for this introduction.


    Coding/writing computer programs are not new. It’s been around for quite some
    time, about 50 years ago. Bill Gates, the world’s richest man, wrote codes for
    fun on his IBM, before a lot of us were born or even dreamt about codes. At the
    moment, coding is a favorite pastime of many, just the same way that the skill
    has enabled some people to be able to do very cool and useful things and earn
    a lot of money doing them.


    Coding runs the world today as we know it. Although a lot of people don’t know
    this, there’s coding embedded into virtually all the gadgets we use today. From
    your television sets to air conditioners, microwaves, phones, projectors, and
    many more items, all these have been programmed to do something. This is not just
    limited to electronic gadgets; even mechanical devices like your car also have
