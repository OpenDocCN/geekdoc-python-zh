    Today, there are some double degrees in computer engineering and mathematics (Autonomous
    University of Madrid, Granada, Polytechnic University of Madrid, Polytechnic University
    of Catalonia, and Complutense, Murcia Autonomous University of Barcelona) or in
    computer science and statistics (University of Valladolid) that seem the best
    option if we consider this specialization.


    ## Postgraduate


    The postgraduate is a very diverse world. We can find postgraduate, masters, or
    specialization courses in almost all universities and a truly excessive private
    offer.

    To give some examples, we have postgraduate degrees at the UGR, the UAB, the UAM,
    the UPM, or the Pompeu Fabra. However, in postgraduate course, it is more difficult
    to recommend a specific course.

    What we can find in the postgraduate training that we cannot find in the previous
    training is the ‘business orientation’ component.

    We must not forget that most of the work of data scientists is in companies that
    seek to make their databases profitable, because what market orientation is highly
    recommended.

    In fact, many of the masters in ‘big data’ are offered by business schools such
    as OEI or Institute Empress.


    ## MOOCs


    One of the most interesting resources you can find are the MOOCs (you know, the
    Massive Open Online Courses). In fact, recently, we saw that this self-training
    option could have a lot of future.

    Starting with the specialization program in Big Data of Coursera, we can find
    online courses from the best universities in the world, all this without mentioning
    the numerous tools to learn languages like Python or R.


    ## What Languages Should Be Learned?


    In reality, as any initiate knows, in programming the choice of one language or
    another is always complicated. In this election, they intervene from technical
    or formative factors to simple personal preferences. What is clear is that there
    are some languages more popular than others.

    Although common sense tells us that each language is better for certain things,
    in practice there is a certain rivalry. Personally, I use R, but I usually recommend
    Python. Not only because it is prettier, but because it is multipurpose and that
    is always an advantage.


    ## Other tools


    A fireproof


    - **Excel:** It is not a language and usually does not like those who work with
    professional data. Or so they say when asked why polls say otherwise: 59% percent
    of respondents routinely use excel. So, finally, the application of Office spreadsheets
    is still a lot of war.


    ## The corporate brother and other languages and programs


    - Some languages or environments enjoy some success driven by corporate inertia:
    it is the case of the classic MATLAB but progressively, it is losing weight and
    use up to only 6%.

    - If we examine the surveys, we can find many more languages that obey more particular
    needs of the practice of data scientists (or the programs they use): Scala (17%),
    Slack (10%), Perl (12%), and C# (6%), Mahout (3%), Apache Hadoop (13%) or Java
    (23%).

    - Also, although it is possible that we should talk about them separately, there
    are many specific programs (free or proprietary) that are used in data science
    with different uses. For example, we could talk about Tableau, Rapid Miner, or
    Weka.


    ## The labor market: salaries and opportunities


    Salaries, as in general in the world of software development, change a lot depending
    on the place, the functions, and the employer. However, right now, it is a well-paid
    expertise. On a general level and according to the annual KdNuggets survey, salaries/incomes
    average $141,000 for freelancers, 107,000 for employees, 90,000 for government
    workers, or in the non-profit sector, 70,000 dollars for work in universities.


    However, these average salaries must be taken with great caution. While the average
    salary in the United States is between $103,000 and $131,000, in Western Europe
    it is between $54,000 and $82,000. In Spain, we are in similar numbers because,
    despite our (increasingly smaller) deficit of product companies, we have large
    companies (especially banks) that have turned in this field.


    ## CHAPTER 25: Decision Trees


    Decision trees are built similarly to support vector machines, meaning they are
    a category of supervised Machine Learning algorithms that are capable of solving
    both regression and classification problems. They are powerful and used when working
    with a great deal of data.

    You need to learn beyond the barebones basics so that you can process large and
    complex datasets. Furthermore, decision trees are used in creating random forests,
    which is arguably the most powerful learning algorithm. In this phase, we are
    going to exclusively focus on decision trees explicitly because of their popular
    use and efficiency.


    ## An Overview on Decision Trees


    Decision trees are essentially a tool that supports a decision that will influence
    all the other decisions that will be made. This means that everything from the
    predicted outcomes to consequences and resource usage will be influenced in some
    way. Take note that decision trees are usually represented in a graph, which can
    be described as some kind of chart where the training tests appear as a node.
    For instance, the node can be the toss of a coin, which can have two different
    results. Furthermore, branches sprout to individually represent the results, and
    they also have leaves, which are the class labels. Now you see why this algorithm
    is called a decision tree. The structure resembles an actual tree. As you probably
    guessed, random forests are exactly what they sound like. They are collections
    of decision trees, but enough about them.


    Decision trees are one of the most powerful supervised learning methods you can
    use, especially as a beginner. Unlike other more complex algorithms, they are
    fairly easy to implement and they have a lot to offer. A decision tree can perform
    any common data science task, and the results you obtain at the end of the training
    process are highly accurate. With that in mind, let’s analyze a few other advantages,
    as well as disadvantages, to gain a better understanding of their use and implementation.


    Let’s begin with the positives:


    1. Decision trees are simple in design and, therefore, easy to implement even
    if you are a beginner without a formal education in data science or Machine Learning.
    The concept behind this algorithm can be summarized with a sort of a formula that
    follows a common type of programming statement: If this, then that, else that.
    Furthermore, the results you will obtain are very easy to interpret, especially
    due to the graphic representation.

    2. The second advantage is that a decision tree is one of the most efficient methods
    in exploring and determining the most important variables, as well as discovering
    the connection between them. Also, you can build new features easily to gain better
    measurements and predictions. Don’t forget that data exploration is one of the
    most important stages in working with data, especially when there is a large number
    of variables involved. You need to be able to detect the most valuable ones in
    order to avoid a time-consuming process, and decision trees excel at this.

    3. Another benefit of implementing decision trees is the fact that they are excellent
    at clearing up some of the outliers in your data. Don’t forget that outliers are
    noise that reduces the accuracy of your predictions. In addition, decision trees
    aren’t that strongly affected by noise. In many cases, outliers have such a small
    impact on this algorithm that you can even choose to ignore them if you don’t
    need to maximize the accuracy scores.


    Finally, there’s the fact that decision trees can work with both numerical as
    well as categorical variables. Decision trees, on the other hand, are proven to
    be versatile and handle a much more varied set of tasks.

    As you can see, decision trees are powerful, versatile, and easy to implement,
    so why should we ever bother using anything else? As usual, nothing is perfect,
    so let’s discuss the negative side of working with this type of algorithm:


    1. One of the biggest issues encountered during a decision tree implementation
    is overfitting. Take note that this algorithm tends to sometimes create very complicated
    decision trees that will have issues generalizing data due to their complexity.
    This is known as overfitting, and it is encountered when implementing other learning
    algorithms as well, however, not to the same degree. Fortunately, this doesn’t
    mean you should stay away from using decision trees. All you need to do is invest
    some time to implement certain parameter limitations to reduce the impact of overfitting.

    2. Decision trees can have issues with continuous variables. When continuous numerical
    variables are involved, the decision trees lose a certain amount of information.
    This problem occurs when the variables are categorized. If you aren’t familiar
    with these variables, a continuous variable can be a value that is set to be within
    a range of numbers. For example, if people between ages 18 and 26 are considered
    of student age, then this numerical range becomes a continuous variable because
    it can hold any value between the declared minimum and maximum.'
  mdcn: '## 如何进行培训


    ## 学位


    目前，一些大学开设了计算机工程与数学的双学位课程（马德里自治大学、格拉纳达大学、马德里理工大学、加泰罗尼亚理工大学、马德里康普顿斯大学、穆尔西亚自治大学、巴塞罗那自治大学），或者计算机科学与统计学的双学位课程（巴利亚多利德大学）。如果考虑这一专业方向，这些似乎是最佳选择。


    ## 研究生教育


    研究生教育是一个非常多样化的领域。我们几乎可以在所有大学找到研究生课程、硕士课程或专业课程，此外还有数量过多的私立教育机构提供的课程。

    举一些例子，我们可以在格拉纳达大学、巴塞罗那自治大学、马德里自治大学、马德里理工大学或庞培法布拉大学攻读研究生学位。然而，在研究生课程层面，推荐一个具体的课程更为困难。

    在研究生培训中，我们能找到而在之前的培训中找不到的是“商业导向”这一组成部分。

    我们不能忘记，数据科学家的大部分工作是在公司中进行的，这些公司寻求使其数据库产生效益，因此市场导向是高度推荐的。

    事实上，许多“大数据”硕士课程是由商学院提供的，例如OEI或Institute Empress。


    ## MOOCs（大规模开放在线课程）


    你能找到的最有趣的资源之一是MOOCs（你知道，即大规模开放在线课程）。事实上，最近我们看到这种自我培训选项可能有很大的发展前景。

    以Coursera的大数据专项课程为例，我们可以找到世界顶尖大学的在线课程，更不用说众多用于学习Python或R等语言的工具了。


    ## 应该学习哪些语言？


    实际上，正如任何初学者所知，在编程中选择一种语言还是另一种总是很复杂的。在这个选择中，技术或培训因素以及简单的个人偏好都会介入。明确的是，有些语言比其他语言更受欢迎。

    虽然常识告诉我们每种语言在某些方面更胜一筹，但在实践中存在一定的竞争。就个人而言，我使用R，但我通常推荐Python。不仅因为它更美观，而且因为它用途广泛，这总是一个优势。


    ## 其他工具


    一个必备工具


    - **Excel：** 它不是一种语言，通常不受那些从事专业数据工作的人喜欢。或者当被问及为什么民调显示情况相反时，他们会这么说：59%的受访者经常使用Excel。所以，最终，Office电子表格应用程序仍然很有市场。


    ## 企业兄弟及其他语言和程序


    - 一些语言或环境在企业惯性的推动下获得了一定的成功：经典的MATLAB就是这种情况，但它的权重和使用率正在逐渐下降，目前仅占6%。

    - 如果我们查看调查，可以发现更多语言，它们满足数据科学家实践（或他们使用的程序）的特定需求：Scala（17%）、Slack（10%）、Perl（12%）和C#（6%）、Mahout（3%）、Apache
    Hadoop（13%）或Java（23%）。

    - 此外，尽管我们可能应该单独讨论它们，但在数据科学中使用着许多特定程序（免费或专有），用途各不例如，我们可以谈谈Tableau、Rapid Miner或Weka。


    ## 劳动力市场：薪资与机会


    薪资，就像软件开发领域通常的情况一样，因地点、职能和雇主的不同而有很大差异。然而，目前，这是一项报酬丰厚的专业技能。根据KdNuggets的年度调查，从总体水平来看，自由职业者的平均薪资/收入为141,000美元，雇员为107,000美元，政府工作人员或非营利领域为90,000美元，在大学工作为70,000美元。


    然而，这些平均薪资必须非常谨慎地看待。虽然美国的平均薪资在103,000美元到131,000美元之间，但在西欧，这一数字在54,000美元到82,000美元之间。在西班牙，我们的情况类似，因为尽管我们的产品公司赤字（越来越小），但我们有大型公司（尤其是银行）已经转向了这个领域。


    ## 第25章：决策树


    决策树的构建方式与支持向量机类似，这意味着它们是一类监督机器学习算法，能够解决回归和分类问题。它们功能强大，在处理大量数据时被使用。

    你需要学习超越最基础的知识，以便能够处理大型和复杂的数据集。此外，决策树用于创建随机森林，这可以说是最强大的学习算法。在本阶段，我们将专门关注决策树，因为它们的广泛使用和高效性。


    ## 决策树概述


    决策树本质上是一种支持决策的工具，该决策将影响所有后续决策。这意味着从预测结果到后果和资源使用的一切都会以某种方式受到影响。请注意，决策树通常以图形表示，可以描述为某种图表，其中训练测试显示为节点。例如，节点可以是抛硬币，它可能有两种不同的结果。此外，分支会萌发出来以单独表示结果，它们还有叶子，即类别标签。现在你明白为什么这个算法被称为决策树了。它的结构类似于一棵真正的树。你可能已经猜到，随机森林正如其名。它们是决策树的集合，但关于它们就说到这里。


    决策树是你能使用的最强大的监督学习方法之一，尤其适合初学者。与其他更复杂的算法不同，它们相当容易实现，并且能提供很多功能。决策树可以执行任何常见的数据科学任务，并且在训练过程结束时获得的结果高度准确。考虑到这一点，让我们分析一些其他优点和缺点，以便更好地理解它们的使用和实现。


    让我们从优点开始：


    1.  决策树设计简单，因此即使你是没有数据科学或机器学习正规教育背景的初学者，也很容易实现。这个算法背后的概念可以用一种遵循常见编程语句类型的公式来概括：如果这样，那么那样，否则那样。此外，你将获得的结果非常容易解释，尤其是由于图形表示。

    2.  第二个优点是，决策树是探索和确定最重要变量以及发现它们之间联系的最有效方法之一。此外，你可以轻松构建新特征以获得更好的度量和预测。不要忘记，数据探索是处理数据最重要的阶段之一，尤其是在涉及大量变量时。你需要能够检测出最有价值的变量，以避免耗时的过程，而决策树在这方面表现出色。

    3.  实现决策树的另一个好处是，它们非常擅长清除数据中的一些异常值。不要忘记，异常值是降低预测准确性的噪声。此外，决策树受噪声的影响并不那么强烈。在许多情况下，异常值对这个算法的影响很小，如果你不需要最大化准确性分数，你甚至可以选择忽略它们。


    最后，决策树可以同时处理数值变量和分类变量。另一方面，决策树被证明是通用的，可以处理更多样化的任务。

    如你所见，决策树功能强大、用途广泛且易于实现，那么我们为什么还要费心使用其他东西呢？一如既往，没有完美的事物，所以让我们讨论一下使用这类算法的负面方面：


    1.  在实现决策树时遇到的最大问题之一是过拟合。请注意，这个算法有时会创建非常复杂的决策树，由于其复杂性，在泛化数据时会遇到问题。这被称为过拟合，在实现其他学习算法时也会遇到，但程度不同。幸运的是，这并不意味着你应该避免使用决策树。你所需要做的就是投入一些时间来实现某些参数限制，以减少过拟合的影响。

    2.  决策树在处理连续变量时可能会有问题。当涉及连续数值变量时，决策树会丢失一定量的信息。当变量被分类时，就会出现这个问题。如果你不熟悉这些变量，连续变量可以是设定在某个数值范围内的值。例如，如果18至26岁的人被认为是学生年龄，那么这个数值范围就成为一个连续变量，因为它可以包含声明的最小值和最大值之间的任何值。'
