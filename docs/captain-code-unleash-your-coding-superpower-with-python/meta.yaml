- img_proc: true
  md: 'There''s one catch: Pygame can''t display text with line breaks, so to create
    a display like this, you''ll need a second set of objects: another SysFont, another
    render(), another rectangle, and so on. And then you''ll blit the new text.


    To make things easier, you can actually just make a copy of the game over block
    and change the object names (fontGameOver2, textGameOver2, etc., for example).
    That''ll make for a more interesting (and useful) closing screen. (Just make sure
    you use different placement values, or your second line of text will be drawn
    over the first.)


    But if you really want to up your game (bad pun intended), you could also display
    the high score, like this:


    ![](img/1725feec73e591598339fc549aaff885_377_0.png)


    Doing this requires the following workflow:


    +   1. The player plays the game.

    2. When the game is over, check to see if there is a high score already saved.

    3. If there is no high score saved, then the current game''s score is the high
    score.'
  merge: -1
  pgno: 377
- img_proc: true
  md: '4. If there is a saved high score, read it from the save file and compare it
    to the current game score. If the current score is greater than the saved high
    score, then the current game score becomes the new high score.


    5. Display the high score on the screen.


    6. Save the high score to the save file so you have it for the next game.


    Displaying the high score is much like displaying the current score. You need
    new font and text objects, which you can use to draw the text to the display.


    How do you read and save high score files? Refer to the “Saving and Restoring”
    section in Chapter 18.


