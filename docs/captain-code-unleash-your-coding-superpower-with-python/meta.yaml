- img_proc: true
  md: 'Functions like this promote reuse. Write the function once, test it, and then
    use it all over the place. That saves time.


    But, more importantly, a function like this is easier to maintain. If you had
    to fix a bug, or needed to add a feature, you''d just change the function itself,
    and all of your code that uses the function would benefit from the changes.


    > **NEW TERM**


    **Scope** Earlier we mentioned that arguments passed to a function create local
    variables, meaning variables that only exist within the function itself.


    The truth is that this doesn''t just apply to arguments; it''s also true of all
    variables. The `inp` variable we created in `inputNumber()` only exists while
    that function is being executed—not before and not after.


    This is referred to as *scope*, meaning the visibility of a variable. A variable
    with local scope can only be seen inside of the function to which it is local.
    And, yes, there are other scopes, as we''ll see in future chapters.


    # CHALLENGE 11.1


    Superheroes often need to travel great distances, and depending on where they
    go they''ll need to measure those distances in miles or kilometers. Create two
    functions:


