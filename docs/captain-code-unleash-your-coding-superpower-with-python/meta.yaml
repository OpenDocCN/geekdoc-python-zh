  md: '# Initializing Lists


    Like all data types in Python, lists are actually a class named—you guessed it—list.
    When you use code like this:


    ```

    animals=[]

    ```


    internally Python is creating a list and initializing it with no values. It does
    this by using a method named init(). This means you can do the same thing yourself.
    The line of code that creates the empty list could be written like this:


    ```

    animals=list()

    ```


    Both of these lines of code do exactly the same thing.


    # Accessing List Items


    Lists are designed to store, well, lists, like our list of animals. For a list
    to be useful, you need to be able to access the items stored in it. To do this,
    you once again use square brackets, specifying the item number you want.


    Let’s try that. Create file List2.py. Here’s the code:


    ```

    # Create a list

    animals = ["ant","bat","cat","dog","eel"]

    # Display a list item

    print(animals[1])

    ```


    Save and run the code. What animal gets displayed? The position of an item in
    a list is called an index. In the print() function, we specified the index 1,
