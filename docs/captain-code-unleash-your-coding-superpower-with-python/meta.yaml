    # "3" Is Not 3


    Before we go further, there''s an important topic we need to discuss. Did you
    notice any differences in how we type variable names'' values? Here''s a reminder:
    these are all snippets of code that you''ve already used:


    ```

    lastName = "Forta"

    fullName = firstName + " " + lastName

    name=input("What is your name? ")

