  - "[PAGE 136]\n\nNext comes the `input()` prompt, which you've seen before.\n\n\
    Once we have input from the user, we want to make sure they actually typed a number.\
    \ Why is this important? Well, for starters, we should always give the user useful\
    \ feedback, and if they were to enter something incorrectly, we should tell them\
    \ so. But, more importantly, we need to be able to compare numbers later in the\
    \ code, and the code will break if we compare numbers to strings.\n\nSo, we include\
    \ the following:\n\n```\n# Make sure the user typed a valid number\nif not userInput.isnumeric():\n\
    \    # Input was not a number\n    print(userInput, \"is not a valid number!\"\
    )\n```\n\nRemember those string class methods `upper()` and `strip()`? `isnumeric()`\
    \ is another string method. It returns `True` if the string is all numbers and\
    \ `False` if not.\n\nAnd what is that `not` doing in there? `if userInput.isnumeric()`\
    \ would check to see if the string is a number, and the `not` turns that around\
    \ and checks to see if `userInput` is NOT a number. `if not userInput.isnumeric()`\
    \ checks to see if the user didn't enter a number, and the indented `print()`\
    \ tells them so.\n\nThen comes the `else` statement. Any code indented beneath\
    \ `else` gets executed only if the user enters a valid number.\n\nAnd then we\
    \ have this code:\n\n```\n# Convert the input text to a number\nuserGuess=int(userInput)\n\
    ```\n\nWhat does this do? Remember when we briefly discussed data types back in\
    \ Chapter 3? Back then, we explained that variables can have types. We also showed\
    \ you that a string with a number (like \"3\") is not a numeric type, and it can't\
    \ be really used for math calculations or operations.\n\nThis is a problem for\
    \ us. `input()` always returns what users enter as strings. Even if the user types\
    \ a number, `userInput` will be a string with that number in it. And we need a\
    \ number."
- md: "## not Negates\n\nWhat does the following code do?\n\n```\nif userInput.isnumeric():\n\
    ```\n\nThis code checks to see if `isnumeric()` returns True. It is actually shorthand\
    \ for this:\n\n```\nif userInput.isnumeric() == True:\n```\n\nIf you don't tell\
    \ an `if` statement what you are comparing to, it'll assume that you are comparing\
    \ to True.\n\n`not` changes a condition to its exact opposite. Coders say that\
    \ it *negates* the condition. So by adding `not`:\n\n```\nif not userInput.isnumeric():\n\
    ```\n\nthe code checks to see that `isnumeric()` returns False.\n\nThat said,\
    \ there is always more than one way to write a line of code. This code could have\
    \ been written like this:\n\n```\nif userInput.isnumeric() == False:\n```\n\n\
    Both versions do the exact same thing.\n\nSo what to do? We need to convert the\
    \ string to a number.\n\nYou saw the `int()` function briefly in Chapter 4. As\
    \ a reminder, `int()` turns a string data type into a numeric data type; you pass\
    \ it a string as an argument, and it returns a number. Here the code `userGuess=int(userInput)`\
    \ tells Python to look at the `userInput` string, get the number that is in it,\
    \ convert it to a number, and save it to `userGuess`. This way, `userInput` remains\
    \ a string—it does not change at all—and `userGuess` is the number that was in\
    \ that string. So if `userInput` was \"3\", `userGuess` will be 3, which is exactly\
    \ what we need.\n\nBy the way, using `int()` with a string that isn't actually\
    \ a number would throw an ugly error. We avoided that by validating the input\
    \ previously.\n\nNext comes a set of if elif and else statements:\n\n```\n# Check\
    \ the number\nif userGuess < randNum:\n    print(\"Too low. Try again.\")\nelif\
    \ userGuess > randNum:\n    print(\"Too high. Try again.\")\nelse:\n    print(\"\
    You got it!\")\n```\n\nThe first statement checks to see if userGuess is less\
    \ than the number we want. The second one checks to see if it is greater. As for\
    \ the else, if the guess is neither greater nor less than the target number, then\
    \ it must be right. Right? Right.\n\nWe know this is a lot of code, but it should\
    \ all make sense to you (especially as most is code you've seen before).\n\nFeel\
    \ free to run the program a few times just to make sure it is working properly.\n\
    \n## Putting It All Together\n\nThat works well. But we can make a few improvements.\n\
    \nFirst of all, we need a way to tell the user how many guesses they took.\n\n\
    Also, putting the range (1 and 100) in the code as we did is a really bad idea.\
    \ Why? As we noted earlier, code should be written so that you don't inadvertently\
    \ break things. If you needed to change the range to 10 and 50 or 1 and 1000,\
    \ you'd need to change multiple places. And you are going to make mistakes. What\
    \ we did? That's hard coding, something we told you about in Chapter 6, and something\
    \ coders try to avoid.\n\nSo, here's an updated version of the code:\n\n```\n\
    # Guess the number between a specified range.\n# User is told if the number guess\
    \ is too high or too low.\n# Game tells the user how many guesses were needed\n\
    \n# Imports\nimport random\n\n# Define variables\nguesses = 0     # To keep track\
    \ of how many guesses\nnumMin = 1      # Start of number range\nnumMax = 100 \
    \   # End of number range\nuserInput = \"\"  # This holds the user's input\nuserGuess\
    \ = 0   # This holds the user's input as a number\n\n# Generate random number\n\
    randNum = random.randrange(numMin, numMax+1)\n\n# Instructions for user\nprint(\"\
    I am thinking of a number between\", numMin, \"and\", numMax)\nprint(\"Can you\
    \ guess the number?\")\n\n# Loop until the user has guessed it\nwhile randNum\
    \ != userGuess:\n    # Get user guess\n    userInput=input(\"Your guess: \").strip()\n\
    \    # Make sure the user typed a valid number\n    if not userInput.isnumeric():\n\
    \        # Input was not a number\n        print(userInput, \"is not a valid number!\"\
    )\n    else:\n        # Input was a number, good to proceed\n        # Increment\
    \ guess counter\n        guesses=guesses+1\n        # Convert the input text to\
    \ a number\n        userGuess=int(userInput)\n        # Check the number\n   \
    \     if userGuess < numMin or userGuess > numMax:\n            print(userGuess,\
    \ \"is not between\", numMin, \"and\", numMax)\n        elif userGuess < randNum:\n\
    \            print(\"Too low. Try again.\")\n        elif userGuess > randNum:\n\
    \            print(\"Too high. Try again.\")\nelse:\n    print(\"You got it in\"\
    , guesses, \"tries\")\n\n# Goodbye message\nprint(\"Thanks for playing!\")\n```\n\
    \nMost of the code is the same, so we'll just highlight the changes.\n\nAt the\
    \ top, we create three new variables:\n\n```\nguesses = 0    # To keep track of\
    \ how many guesses\nnumMin = 1      # Start of number range\nnumMax = 100    #\
    \ End of number range\n```\n\nThe first line creates a variable that will keep\
    \ count of how many guesses the user made. We initialize it to 0 for now, and\
    \ we'll add 1 each time the user makes a guess.\n\nThe next two lines define two\
    \ new variables, which are the range of numbers we want for the game: numMin is\
    \ the minimum (the start of the range), and numMax is the maximum (the end of\
    \ the range). If you want to change the game, you only need to change these numbers,\
    \ and all the code below (generating the number, giving instructions) will all\
    \ be correct.\n\nHow? Because the number generation code has been changed to this:\n\
    \n```\n# Generate random number\nrandNum = random.randrange(numMin, numMax+1)\n\
    ```\n\nnumMin sets the range start, and numMax+1 sets the range end. You'll recall\
    \ that randrange() does not include the end range number, so if numMax were 100,\
    \ the greatest randomly generated number would be 99, not 100. By adding 1 we\
    \ make the range end 101, and that way 100 is included.\n\nThe print() statements\
    \ with instructions also use numMin and numMax; that way they always reflect the\
    \ right instructions.\n\nInside the main loop is this code:\n\n```\n# Increment\
    \ guess counter\nguesses=guesses+1\n```\n\n## Incrementing Variables\n\nThis code\
    \ increases guesses by 1. It does this by overwriting the variable with the current\
    \ value + 1:\n\n```\nguesses=guesses+1\n```\n\nHere is another way to do the same\
    \ thing:\n\n```\nguesses+=1\n```\n\nThe second example looks a little odd, we\
    \ know. It's a shortcut that tells Python that guesses is to update itself by\
    \ 1.\n\nBoth lines of code do the same thing.\n\nAnd you can use this type of\
    \ shortcut for more than addition. -=5 subtracts 5, *=3 multiplies by 3, you get\
    \ the idea.\n\nSome coders prefer the second format as it is shorter, it doesn't\
    \ repeat the variable name, and there are fewer places for typos (as we said,\
    \ coders hate duplication).\n\nThis increments (increases the value of) guesses\
    \ by 1. If guesses was 0, then after this line of code, it will be 1. And then\
    \ next time, it will be 2, and so on. This is how we keep track of how many guesses\
    \ the user made.\n\nWe also added a new if statement that checks to see if the\
    \ user entered a number outside of the range (greater than 100, for example):\n\
    \n```\nif userGuess < numMin or userGuess > numMax:\n    print(userGuess, \"is\
    \ not between\", numMin, \"and\", numMax)\n```\n\nThis checks to see if userGuess\
    \ is too low (less than numMin) or too high (greater than numMax), and if it is,\
    \ it gives the user instructions with the right numbers.\n\n> **TIP**\n> **Don't\
    \ Hard Code Values** See how useful those variables are? This is exactly why we\
    \ don't hard code values. We can set the variables once and don't have to change\
    \ any other code in the game. It just works.\n\nAnd finally, we updated the `You\
    \ got it!` `print()` statement as follows:\n\n```\nprint(\"You got it in\", guesses,\
    \ \"tries\")\n```\n\n`guesses` stores the number of guesses made, and `print()`\
    \ displays that number.\n\n## CHALLENGE 7.2\n\nThis one is tricky, but you can\
    \ do it. Can you provide more feedback? Instead of always displaying `Too low`\
    \ or `Too high`, can you display `Too low` or `Too high` if they are close and\
    \ `Much too high` and `Much too low` if they are way off? Think about it.\n\n\
    ## Summary\n\nIn this chapter we built on the prior chapter and learned about\
    \ looping based on conditions. In the next two chapters we'll use all of the lessons\
    \ you've learned thus far to build a more sophisticated app."
