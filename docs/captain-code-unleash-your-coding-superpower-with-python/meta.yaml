- img_proc: true
  md: "Each item in a dictionary is defined as a key:value pair. The key is the name\
    \ of the item, and it is always a string enclosed within quotes. The value is\
    \ any value; it can be strings and numbers, as we used here, but can potentially\
    \ be lists, dictionaries, and more, too.\n\nThis pet dictionary contains four\
    \ items. You can verify this by adding this code to Dict1.py:\n\n```\nprint(len(pet))\n\
    ```\n\nSave and run the code, and it'll print 4, the value returned by len(pet).\n\
    \nIf you want to access a specific item in the dictionary, you must refer to it\
    \ by its key. For example:\n\n```\npet = {\n    \"animal\":\"Iguana\",\n    \"\
    name\":\"Iggy\",\n    \"food\":\"Veggies\",\n    \"mealsPerDay\":1\n}\n\nprint(pet[\"\
    name\"], \"the\", pet[\"animal\"])\nprint(\"eats\", pet[\"mealsPerDay\"], \"times\
    \ a day\")\n```\n\nSave and run this updated code. What does it display?\n\npet[\"\
    animal\"] means get the value for key \"animal\", which is Iguana.\npet[\"name\"\
    ] means get the value for key \"name\", which is Iggy. And so on.\n\nSo the code\
    \ will display:\n\n```\nIggy the Iguana\neats 1 times a day\n```\n\n# Working\
    \ with Dictionaries\n\nAs you can see, dictionaries are perfect for grouping different\
    \ but related information."
