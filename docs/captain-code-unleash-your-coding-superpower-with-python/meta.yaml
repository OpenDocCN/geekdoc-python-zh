    98 **CAPTAIN CODE**: Unleash Your Coding Superpower with Python


    > **Longer Keys Are Better**

    This type of encryption can be broken by looking for patterns and repeats. A short
    key will result in lots of repeats, and a longer key in fewer ones, so the longer
    your key, the harder it will be for your nemesis to decrypt your secret plans.
    You have been warned!


    But what if your text is longer than the key? Say you were encrypting the text
    Hello World. The key has 6 digits in it, we need 11 digits (because the space
    value has an ASCII value, too). What to do?


    The answer is reuse the key. If the key is 6 digits long, we use these 6 digits
    for the first 6 letters to be encrypted. And then we start over: For letter 7,
    we use the first digit in the key, for letter 8 the second, and keep reusing the
    key over and over as needed.


    How do we figure out which digit to use? We use division and look at the remainder.
    For the 8th character (we need the second number from the key), we just divide
    the character index (8, as this is the 8th character) by the key length (6), and
    the remainder is 2. In Chapter 3 we introduced the modulus operator (%), which
    finds a remainder. It is used like this:


    ```

    print(8%6)

    ```


    Here 8 is divided by 6, and the remainder is 2.


    Using modulus, we can always divide the character position (8 for the 8th character,
    42 for the 42nd, and so on) by the key length, and the remainder will point to
    a valid key digit to use.


