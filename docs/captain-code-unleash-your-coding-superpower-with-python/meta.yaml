- img_proc: true
  md: "# Up, Down, Left, Right\n\nWe're moving our sprite in one direction, passing\
    \ a vertical value but not a horizontal one. We could pass both, which would effectively\
    \ move the sprite diagonally. We could also pass negative values: -5 for the first\
    \ value would move left 5 pixels, and -5 for the second value would move up 5\
    \ pixels.\n\nWhy is this happening? `move_ip()` keeps moving the enemy by 5 pixels,\
    \ exactly as coded. It doesn't care if the sprite is visible or not. The enemy\
    \ keeps going and going off into nonvisible space.\n\nWhat should happen is that\
    \ when an enemy reaches the bottom of the screen, we move it back to the top.\
    \ That way, it'll look like one car has passed us and a new one is heading our\
    \ way. To do this, we'll need to check the position of the enemy each time we\
    \ move it to see if it has reached the bottom of the screen.\n\nWe can do this\
    \ with a simple `if` statement. Add this code right after the `move_ip()` line:\n\
    \n```\n# Check didn't go off edge of screen\nif (enemy.rect.bottom > IMG_ROAD.get_height()):\n\
    \    # At bottom, so move back to top\n    enemy.rect.top = 0\n```\n\nSave and\
    \ run the code. The enemy car drives down the screen, and when it reaches the\
    \ bottom, it moves back to the top.\n\nHow does this work? You will recall that\
    \ sprites have rectangles around them that Pygame uses to keep track of where\
    \ they are. Each time we call `move_ip()`, Pygame updates the rectangle so that\
    \ `enemy.rect` always contains the exact location of the enemy sprite. `enemy.rect.bottom`\
    \ contains the exact location of the bottom of the enemy sprite. The `if` statement\
    \ simply checks to see if the bottom of enemy is greater than the height of the\
    \ road. If yes, then we've gone off the screen, and the code then sets `enemy.rect.top`\
    \ to 0, which moves it back to the top of the screen.\n\nPretty cool, huh?"
