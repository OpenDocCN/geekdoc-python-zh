    - 你可能想在游戏启动时检查是否有任何保存的游戏。如果检测到保存的游戏，询问用户是否要恢复它。\n\n## 总结\n\n在本章中，我们介绍了很多想法和技术，你可以用它们真正将你的文字冒险游戏提升到一个新的水平。在第三部分，我们将使用这些技能来处理基于图形的游戏。\n\
