    \ any time to execute code only if the user has the key, like this:\n\n```\nif\
    \ hasStructureKey():\n```\n\nhasStructureKey() returns True or False, which makes\
    \ it really useful in if statements like this one.\n\nThese wrapper functions\
    \ are entirely optional. After all, you can always access dictionary items directly.\
    \ But, wrappers can make the code much easier to use and read.\n\n# Creating an\
    \ Inventory\n\nOk, let’s create our inventory system. We actually only need the\
