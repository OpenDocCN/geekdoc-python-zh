    \ daze, recalling nothing useful.\")\n    print(\"Stumbling you reach for the\
    \ door, it opens in anticipation.\")\n    print(\"You step outside. Nothing is\
    \ familiar.\")\n    print(\"The landscape is dusty, vast, tinged red, barren.\"\
    )\n    print(\"You notice that you are wearing a spacesuit. Huh?\")\n```\n\nWe\
    \ can turn it into something like this:\n\n```\n# Welcome the player\ndef doWelcome():\n\
    \    # Display text\n    print(functionThatGetsTheString())\n```\n\nObviously,\
    \ this doWelcome() function can't be executed as is; it calls a function that\
    \ doesn't exist. But, conceptually, this is how things could work. Instead of\
    \ using lots of print() statements with hard-coded text, we can have a single\
    \ print() statement that calls a function and prints whatever that function returns.\n\
    \nIncidentally, when coders are thinking through ideas, they often use dummy code\
    \ like this—fake code meant for them during development. They call this *pseudocode*.\n\
    \n> **NEW TERM**\n> **Pseudocode** *Pseudocode* is fake code. It's not actual\
    \ code that a computer can understand but text meant for humans to read and understand\
    \ while they think through their code.\n\nCreate a new file (in the Adventure\
    \ folder) named Strings.py. Here's the code:\n\n```\n###############################################\n\
    # Strings.py\n# Externalized strings\n###############################################\n\
    \ndef get(id):\n    if id == \"Welcome\":\n        return (\"Welcome adventurer!\\\
    n\"\n                \"You wake in a daze, recalling nothing useful.\\n\"\n  \
    \              \"Stumbling, you reach for the door, it opens in \"\n         \
    \       \"anticipation.\\nYou step outside. Nothing is \"\n                \"\
    familiar.\\nThe landscape is dusty, vast, tinged \"\n                \"red, barren.\\\
    nYou notice that you are wearing \"\n                \"a spacesuit. Huh?\")\n\
    \    elif id == \"Start\":\n        return (\"You look around. Red dust, a pile\
    \ of boulders, \"\n                \"more dust.\\nThere's an odd octagon shaped\
    \ \"\n                \"structure in front of you.\\nYou hear beeping \"\n   \
    \             \"nearby. It stopped. No, it didn't.\")\n    elif id == \"Boulders\"\
    :\n        return (\"Seriously? They are boulders.\\n\"\n                \"Big,\
    \ heavy, boring boulders.\")\n    elif id == \"Structure\":\n        return (\"\
    You examine the odd structure.\\n\"\n                \"Eerily unearthly sounds\
    \ seem to be coming from \"\n                \"inside.\\nYou see no doors or windows.\\\
    nWell, that \"\n                \"outline might be a door, good luck opening it.\\\
    n\"\n                \"And that beeping. Where is it coming from?\")\n    elif\
    \ id == \"StructureDoor\":\n        return (\"The door appears to be locked.\\\
    nYou see a small \"\n                \"circular hole. Is that the keyhole?\")\n\
    \    elif id == \"StructureDoorNoKey\":\n        return (\"You move your hand\
    \ towards it, it flashes blue \"\n                \"and closes!\\nWell, that didn't\
    \ work as planned.\")\n    elif id == \"Run\":\n        return (\"You run, for\
    \ a moment.\\n\"\n                \"And then you are floating. Down down down.\\\
    n\"\n                \"You've fallen into a chasm, never to be seen \"\n     \
    \           \"again.\\nNot very brave, are you?\")\n    elif id == \"GameOver\"\
    :\n        return \"Game over!\"\n    else:\n        return \"\"\n```\n\nThere\
    \ is only one function in this file, defined like this:\n\n```\ndef get(id):\n\
    ```\n\nFunction get() accepts an identifier (a variable named id). So when get()\
    \ is called, an id must be passed to it.\n\nThe rest of the code is a big if elif\
    \ else statement. It first checks:\n\n```\nif id == \"Welcome\":\n```\n\nIf Welcome\
    \ was passed to get(), then that condition will be True, and the code indented\
    \ beneath it will be executed. What does that code do? It simply returns a block\
    \ of text:\n\n```\nreturn (\"Welcome adventurer!\\n\"\n        \"You wake in a\
    \ daze, recalling nothing useful.\\n\"\n        \"Stumbling, you reach for the\
    \ door, it opens in anticipation.\\n\"\n        \"You step outside. Nothing is\
    \ familiar.\\n\"\n        \"The landscape is dusty, vast, tinged red, barren.\\\
    n\"\n        \"You notice that you are wearing a spacesuit. Huh?\")\n```\n\nThe\
    \ remaining elif statements do the same thing: check the id and return text.\n\
    \nThe final else statement is just to be safe:\n\n```\nelse:\n    return \"\"\n\
    ```\n\nIf an invalid id gets passed to get(), the function will return an empty\
    \ string.\n\nget() doesn't display text—there is no print() in there—but simply\
    \ returns it to your code. It's up to your code to decide what to do with the\
    \ text, and the code could indeed print it if so desired.\n\nIf the function is\
    \ called with get(\"Welcome\"), it will return the Welcome message. Same for any\
    \ other needed strings. Want to test that it's working? Add this to the bottom\
    \ of Strings.py:\n\n```\nprint(get(\"Welcome\"))\n```\n\n> **Multiline Text**\n\
    > Two comments about multiline text.\n>\n> First, long blocks of text can be broken\
    \ over multiple lines. Just put quotes around the text on each line. Python will\
    \ treat the text as if it were one long block of text.\n>\n> Second, notice the\
    \ \\n in the middle of some of the text. That’s a newline character (which we\
    \ mentioned previously). It forces a line break in the Terminal output.\n\nIf\
    \ you run the code, the test associated with Welcome will be printed. How? get(\"\
    Welcome\") returns the text, and print(), ...well, it prints.\n\nYou can try other\
    \ ids just to make sure it’s working. And then remove the test print() when you\
    \ are done testing.\n\nEach time a new block of text is needed in the game, a\
    \ section can be added to this function. Each section has a unique id. Call get()\
    \ with that id, and the right text is returned.\n\nOh, notice the return statements.\
    \ Most functions have a single return statement at the end of the function. Here\
    \ we have a return for each string, and each return stops function processing\
    \ and returns the result. This way, we don’t have to save the text to a variable\
    \ and then return that. But, within the if statements, you could indeed save the\
    \ text to a variable and return that. Either way works.\n\n## Using Externalized\
    \ Strings\n\nSo, how do we use this new Strings file and get() function? We import\
    \ it as a library. Yes, our Strings.py file is a Python library.\n\nAdd this to\
    \ the top of Main.py:\n\n```\n# Imports\nimport Strings\n```\n\n> **Careful with\
    \ Library Naming**\n> We called the file Strings.py, so the library is named Strings.\
    \ As you will recall, Python has a built-in library named String. If we had named\
    \ the file String.py, we’d have overwritten the built-in library, but Strings.py\
    \ is safe.\n\n**String Storage**\nHere we moved display strings from the core\
    \ code into a large if statement. This works for tens—or even hundreds—of strings.\
    \ For larger applications, coders would never do this. They would store the text\
    \ in a database of some kind and retrieve the strings as needed.\n\nUsing a database\
    \ is conceptually similar to using a Python file. Strings are externalized and\
    \ retrieved as needed. You can pick a storage option based on your specific needs.\n\
    \nTo use the get() function, we replace the hard-coded text with the function\
    \ call. Let's start with doWelcome(). Remove all of the print() statements and\
    \ replace them with this code:\n\n```\n# Welcome the player\ndef doWelcome():\n\
    \    # Display text\n    print(Strings.get(\"Welcome\"))\n```\n\nStrings.get()\
    \ is our get() function in Strings.py. As this is the doWelcome() function, we\
    \ use Strings.get(\"Welcome\"), which tells get() to return the \"Welcome\" text,\
    \ as you saw previously. That text is passed to print().\n\ndoWelcome() is now\
    \ a single line of code. As you can see, this is much cleaner and tighter.\n\n\
    **CHALLENGE 13.1**\nExternalize all of the strings in your application. At a minimum,\
    \ externalize the display text. If you'd like, you can even externalize option\
    \ prompts and any other displayed text.\n\n## Summary\n\nIn this chapter, we introduced\
    \ string externalization as a way to clean up code. Our application now is made\
    \ up of two files, and in the next chapter, we'll add a third as we introduce\
    \ another really important optimization."
  mdcn: "## 字符串外部化\n\n字符串外部化是代码优化的重要组成部分，原因如前所述。如何实现呢？方法有很多，但一个简单的选择是将所有文本移至另一个文件，并创建一个函数，在需要时返回所需的文本。\n\
