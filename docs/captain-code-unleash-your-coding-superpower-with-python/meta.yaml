- img_proc: true
  md: 'Next comes a for loop, which checks to see if any events have occurred that
    we need to respond to in our game. What are events? They could be a key pressed
    or a mouse button clicked. If those occurred, your code would need to respond
    accordingly. The only event we need to respond to right now is the QUIT event,
    which means the player closed the game window.


    pygame.event.get() returns a list of events that need to be responded to (if there
    are any), and that gets passed to a for loop, which iterates through those events,
    like this:


    ```

    for event in pygame.event.get():

    ```


    Within the for loop, a variable named event will contain the details of an event
    to be responded to. We need to check for the QUIT event, so we use this if statement:


    ```

    # Did the player quit?

    if event.type == pygame.QUIT:

    ```


    If the player did indeed quit, then we need to shut down Pygame and close the
    computer window it was running in. That’s what these two lines do:


    ```

    # Quit pygame

    pygame.quit()

    sys.exit()

    ```


    The second line of code uses the sys library, which contains methods used to work
    with the environment Python runs in. To use this, you’ll need add an import to
    the top of your code:


    ```

    import sys

    ```


    And finally, the last line of code in the game loop should always be a display
    update, like this:


    ```

    # Update screen

    pygame.display.update()

    ```'
