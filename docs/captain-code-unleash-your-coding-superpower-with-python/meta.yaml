  mdcn: "## 总结\n\n哇，这一章你学到了很多！你学会了如何使用库，特别是 `random` 库及其两个函数。你了解了数据类型。你还学会了如何为代码添加注释。接下来，我们将学习如何让代码做出决策。\n\
