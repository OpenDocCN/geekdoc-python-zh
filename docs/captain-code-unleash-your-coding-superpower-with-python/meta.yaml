    is a 6. As both tests are comparing values against today.weekday() we can write
    the if statement another way.


    Look at this if statement:


    ```

    if today.weekday() in [5,6]:

    ```


    You saw [ ] used in Chapter 3; it creates a list of items. Here we''ve created
    a list of two values, 5 and 6. Python lets us use a special test called in, and
    it returns True if the value we are looking for is anywhere in the list. So, if
    today.weekday() is 5 or 6, then it is in the list, and the test will return True.
    If today.weekday() is any other value, it won''t be in the list, and the if statement
    will return False.


