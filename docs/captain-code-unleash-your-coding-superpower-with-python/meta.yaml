    screen = pygame.display.set_mode(IMG_ROAD.get_size())

    ```


    We previously loaded Road.png into the IMG_ROAD surface. IMG_ROAD knows all about
    the image, including how big it is. So, rather than hard code the size (hard code
    = bad, right?), we use IMG_ROAD.get_size(). This way, the game window will be
    sized to match the road background image size (which, coincidentally, just happens
