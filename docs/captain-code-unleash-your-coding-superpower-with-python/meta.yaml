    ... a programming language.


    Yes, Python is a language, and it is used to provide instructions to a computer.
    Python is not a new programming language, it’s actually been around for 30 years
    or so. But it is super popular, and even powers some of your favorite sites and
    apps. Why is Python so popular?


    +   - Python is really easy to use, no complicated tools or setups, just write
    a few lines of code and off you go. Really! In fact, you’ll have written code
