    \ in what order. This one is pretty simple:\n\n- Get the birthday (not date of\
    \ birth, you need the date of the next birthday).\n- You'll also need today's\
    \ date.\n- Then you can use simple math to calculate the days between those two\
    \ dates.\n\n> **No Cheating, but...**\n> There is no single right way to write\
    \ this program (or any of the programs in this chapter). You should create your\
    \ own solution.\n>\n> But, if you need help or want to see one way to solve each\
    \ problem, you'll find our solutions on the book website by using this QR code.\n\
    \n![](img/1725feec73e591598339fc549aaff885_172_0.png)\n\n### Some Tips\n\nAs you\
    \ will recall, you'll want to import `datetime` if you are going to use dates.\n\
    \nHow do you get today's date? We did that back in Chapter 3:\n\n```\ntoday=datetime.datetime.now()\n\
    ```\n\nIn this example, `today` is now a variable of type `datetime`.\n\nSo how\
    \ do you create your own `datetime` variable with your own date? You can do this:\n\
    \n```\npiday=datetime.datetime(2022, 3, 14)\n```\n\nYou pass year, month, and\
    \ day as arguments to `datetime`, and it will create the variable for you.\n\n\
    You can use `print(piday)` to verify that it worked.\n\nWe should point out that\
    \ here we hard-coded the date. If you prompt the user for year, month, and day,\
    \ you'd pass the variables with those values instead, like this:\n\n```\nbirthday=datetime.datetime(yy,\
    \ mm, dd)\n```\n\nAs for the math, calculating the difference between dates? Python\
    \ makes this super easy. Assuming you have two variables, `today` (containing\
    \ today's date) and `birthday` (containing your next birthday), you can calculate\
    \ the days in between by using simple math, like this:\n\n```\ndaysUntilBirthday\
    \ = birthday - today\n```\n\n> **Initializing Dates**\n> When you create a `datetime`\
    \ variable, you pass it the year, month, and day, as you saw here. These values\
