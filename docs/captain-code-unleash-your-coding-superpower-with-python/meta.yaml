    # Cracking the Code


    Now that you know how to use loops, let''s create programs to encrypt and decrypt
    text. Yes, we''ll create two programs. The first will ask the user for some text
    and will display an encrypted version of that text. The other will ask the user
    for encrypted text and will decrypt it and display the original text. And so long
    as the same secret key (more on that in a moment) is used for encryption and decryption,
    all will work well.


    So, if you receive this text:


    ```

    Fphjsp#jw!hxrm%

    ```


    you could decrypt it and it''ll say...um, nope, can''t tell you, sorry! You''ll
    find out soon....


    Ok, a warning. The following code may look complicated. But don''t panic: It is
    using stuff you''ve already learned. Ready?


    > **Encoding Versus Encryption**

    Technically, what we''re doing here isn''t really encryption. Real encryption
    code is a bit too complex for what we need here, so we''re using a process called
    *encoding*, which replaces characters in text with secret characters. And we''re
    going to use a key to make it a little harder to decode.


    If you want to perform real encryption with Python, that''s very doable, and there
    are lots of greater libraries that can help you do it.'
- md: "## Encrypting Characters\n\nReplacing characters with their encrypted version\
    \ requires doing a little math. Math, you say? Letters aren’t numbers, so how\
    \ can you do math on them?\n\nWell, as it so happens, inside of your computer\
    \ letters are indeed numbers. Every single letter and character has an internal\
    \ number. You don’t usually care about these; to us, letter A is just A, b is\
    \ just b, and 3 is just 3. But inside of your computer, the letter displayed as\
    \ A is character number 65, b is 98, and the character for number 3 is 51. Every\
    \ single character has its own number; so a and A have different numbers because\
    \ they are different characters.\n\nYep, this sounds odd, but just accept it for\
    \ now. Every character has a number (called an ASCII Character Code) that can\
    \ be used to refer to it.\n\n> **TIP**\n> **Use Test Files** Every coder has dozens\
    \ of test files (usually named test42.py, or something like that). Sometimes coders\
    \ have whole test folders (yep, often named test). Test files are great places\
    \ to tinker and try stuff out.\n\nIn Python you can get the ASCII code for any\
    \ character by using the ord() function. Run this code. (You have test Python\
    \ files, right? They are perfect for this):\n\n```\nprint(ord('A'))\n```\n\nand\
    \ it will display 65, the ASCII code for A. Change that A to a B, and it’ll display\
    \ 66. And so on.\n\n> **ASCII Character Codes**\n> ASCII (pronounced “ASS-key”!)\
    \ stands for American Standard Code for Information Interchange. It is a character\
    \ encoding standard for electronic communication, and it predates the Internet\
    \ and all modern devices.\n\nAs ord() returns a number, you can do math with it.\
    \ Not that this next example is particularly useful, but this code:\n\n```\nprint(ord('A')\
    \ + 1)\n```\n\nwill display 66 : ord('A') returns 65, and the program adds 1 and\
    \ you get 66.\n\nSo how do you turn this number back into a character? The opposite\
    \ of the ord() function is the chr() function. This code:\n\n```\nprint(chr(65))\n\
    ```\n\nwill display the letter A.\n\nSo, if you wanted to add 1 to A to get B,\
    \ you could do this:\n\n```\nprint(chr(ord('A')+1))\n```\n\nWhat does this do?\
    \ It is easiest to read it from the inside working outward. ord('A') returns 65,\
    \ as you saw previously. Add 1 and the total is 66. That sum, 66, gets passed\
    \ to chr(), which returns B.\n\nWe can use this technique to encrypt your text.\
    \ To encrypt the text HELLO, we just need to know how much to add to (or subtract\
    \ from) the ASCII value of each character. If we add 10, then HELLO becomes encrypted\
    \ as ROV VY (H becomes R, E becomes O, and so on). Subtract 10 from each letter\
    \ in ROV VY, and you get the decrypted HELLO.\n\n## Modulus Math\n\nIn the example\
    \ we just saw, 10 is the magic number—the encryption key. It is what we use to\
    \ change each letter.\n\nBut it’s not very safe to use a simple number like this\
    \ for encryption. Users could try 1 and then 2 and then 3 and eventually guess\
    \ your code. To make this safer, you’d want to use different keys.\n\nFor example,\
    \ what if the key was 314159? To encrypt HELLO, we’d use 3 for the H, 1 for the\
    \ E, 4 for the first L, 1 for the second L, and 5 for the O. So HELLO becomes\
    \ KFPMT. Guessing this is much harder because a different key is used for each\
    \ letter.\n\n98 **CAPTAIN CODE**: Unleash Your Coding Superpower with Python\n\
    \n> **Longer Keys Are Better**\n> This type of encryption can be broken by looking\
    \ for patterns and repeats. A short key will result in lots of repeats, and a\
    \ longer key in fewer ones, so the longer your key, the harder it will be for\
    \ your nemesis to decrypt your secret plans. You have been warned!\n\nBut what\
    \ if your text is longer than the key? Say you were encrypting the text Hello\
    \ World. The key has 6 digits in it, we need 11 digits (because the space value\
    \ has an ASCII value, too). What to do?\n\nThe answer is reuse the key. If the\
    \ key is 6 digits long, we use these 6 digits for the first 6 letters to be encrypted.\
    \ And then we start over: For letter 7, we use the first digit in the key, for\
    \ letter 8 the second, and keep reusing the key over and over as needed.\n\nHow\
    \ do we figure out which digit to use? We use division and look at the remainder.\
    \ For the 8th character (we need the second number from the key), we just divide\
    \ the character index (8, as this is the 8th character) by the key length (6),\
    \ and the remainder is 2. In Chapter 3 we introduced the modulus operator (%),\
    \ which finds a remainder. It is used like this:\n\n```\nprint(8%6)\n```\n\nHere\
    \ 8 is divided by 6, and the remainder is 2.\n\nUsing modulus, we can always divide\
    \ the character position (8 for the 8th character, 42 for the 42nd, and so on)\
    \ by the key length, and the remainder will point to a valid key digit to use.\n\
    \n## Encryption Code\n\nOk, here’s the code for file Encrypt.py:\n\n```\n# ASCII\
    \ range of usable characters - anything out of this range could throw errors\n\
    asciiMin = 32   # Represents the space character - \" \"\nasciiMax = 126  # Represents\
    \ the tilde character - \"~\"\n\n# Secret key\nkey = 314159    # Top secret! This\
    \ is the encryption key!\nkey = str(key)  # Convert to string so can access individual\
    \ digits\n\n# Get input message\nmessage = input(\"Enter message to be encrypted:\
    \ \")\n\n# Initialize variable for encrypted message\nmessEncr = \"\"\n\n# Loop\
    \ through message\nfor index in range(0, len(message)):\n    # Get the ASCII value\
    \ for this character\n    char = ord(message[index])\n    # Is this character\
    \ out of range?\n    if char < asciiMin or char > asciiMax:\n        # Yes, not\
    \ safe to encrypt, leave as is\n        messEncr += message[index]\n    else:\n\
