    ```

    print(ord(''A'') + 1)

    ```


    will display 66 : ord(''A'') returns 65, and the program adds 1 and you get 66.


    So how do you turn this number back into a character? The opposite of the ord()
    function is the chr() function. This code:


    ```

    print(chr(65))

    ```


    will display the letter A.


    So, if you wanted to add 1 to A to get B, you could do this:


    ```

    print(chr(ord(''A'')+1))

    ```


    What does this do? It is easiest to read it from the inside working outward. ord(''A'')
    returns 65, as you saw previously. Add 1 and the total is 66. That sum, 66, gets
    passed to chr(), which returns B.


    We can use this technique to encrypt your text. To encrypt the text HELLO, we
    just need to know how much to add to (or subtract from) the ASCII value of each
    character. If we add 10, then HELLO becomes encrypted as ROV VY (H becomes R,
    E becomes O, and so on). Subtract 10 from each letter in ROV VY, and you get the
    decrypted HELLO.


    # Modulus Math


    In the example we just saw, 10 is the magic number—the encryption key. It is what
    we use to change each letter.


    But it’s not very safe to use a simple number like this for encryption. Users
    could try 1 and then 2 and then 3 and eventually guess your code. To make this
    safer, you’d want to use different keys.


    For example, what if the key was 314159? To encrypt HELLO, we’d use 3 for the
    H, 1 for the E, 4 for the first L, 1 for the second L, and 5 for the O. So HELLO
    becomes KFPMT. Guessing this is much harder because a different key is used for
    each letter.'
