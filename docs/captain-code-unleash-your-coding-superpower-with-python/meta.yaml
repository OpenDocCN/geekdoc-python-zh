    ## CHAPTER 1

    Getting Started


    Hello, and welcome. We love coding, and by the time you''re done with this book
    we think you will, too. We''re going to help you learn to code the way that we
    learned, by doing—no long lectures, no reading lots of instructions, and no drawn-out
    explanations. In every chapter you''ll get to do stuff, and you''ll learn while
    doing.


    Except for this chapter, sorry. :-( Before you start developing your coding superpowers
    it''s really important to understand what coding actually is, so we''ll spend
    just a few minutes reviewing that. And then we''ll help you install the software
    you''ll need to get started. But, after that, it''s all doing. Promise.


    ## Understanding Computer Programming


    Let’s start by taking a few minutes to understand what computer programming actually
    is, and to do that we need to talk about computers.


    ## What is a computer?


    You’ve seen computers, and they are all basically the same; they have screens,
    a keyboard, mouse or touchpad, and some fold in half, like a notebook. Right?
