  md: "# Conditional Loops\n\nYou now know how to use for loops. As a reminder, these\
    \ are used to loop through a finite set of options.\n\nConditional loops loop\
    \ based on a condition. They are the more powerful and flexible type of loops,\
    \ and they also tend to be the one you'll use most.\n\nLet's start with a simple\
    \ (and useless) example. Create file Loop4.py and type the following:\n\n```\n\
    # Get some input\nuserInput=input(\"Say something, say STOP to stop: \").upper().strip()\n\
    \n# Loop until the user says STOP\nwhile userInput != \"STOP\":\n    userInput=input(\"\
    Say something, say STOP to stop: \").upper().strip()\n```\n\nSave the file and\
    \ run it. You'll be prompted to type some text in the Terminal window. Then you'll\
    \ be prompted to do so again. And again. And you'll keep being prompted until\
    \ you type STOP.\n\nThe first line of code is an input() much like you've seen\
    \ already. And like we saw in Chapter 4, it uses .upper().strip() to convert the\
    \ user input to upper-case and strip any extraneous whitespace.\n\nThen comes\
    \ this line:\n\n```\nwhile userInput != \"STOP\":\n```\n\nwhile creates a loop.\
    \ But unlike for loops, while takes a condition (much like the conditions we passed\
    \ to if statements in Chapter 4). This condition checks the userInput variable\
    \ to make sure that it is not equal to STOP (!= means not equal and is the opposite\
    \ of ==).\n\nJust like if and for, a while statement ends with a colon, and whatever\
    \ is indented beneath it will get called over and over until the loop ends. Here\
    \ the indented code again asks for input from the user.\n\nAnd when will the while\
    \ loop end? When the user types STOP. Then the while condition will be False (because\
    \ userInput will no longer be not equal to STOP)."
