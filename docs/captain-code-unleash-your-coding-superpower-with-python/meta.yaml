- img_proc: true
  md: 'What do we do if the player presses the left or right arrow key? We use the
    move_ip() function to move the player sprite, just as we did the enemy sprite:


    +   - If the right arrow key was pressed, we execute player.rect.move_ip(moveSpeed,
    0), which moves the player 5 pixels to the right (and 0 pixels vertically).

    - If the left arrow key was pressed, we move by -moveSpeed, which moves the player
    5 pixels to the left (but not vertically). Notice the minus sign there: moveSpeed
    is 5, so -moveSpeed is -5, as we explained previously.


    Save the changes and run the game. You can now move your player left and right.


    And you can move them right off the screen! It''s the same problem we had with
    enemy going too far.


    So, what to do? With enemy, we moved the sprite back to the top of the screen.
    But that doesn''t make sense for the player sprite. What would that do? Move the
    player sprite back to the center? Nah! You could do it Pac-Man style: Go off one
    side of the screen and reappear on the other.


    But, for us, a better option is to not let the player sprite go too far in the
    first place.


    Update the if statement that checks for the left arrow key as follows:


    ```

    if keys[K_LEFT] and player.rect.left > 0:

    ```


    Now the if statement checks to see if the left arrow key was pressed and determines
    whether the left side of the player rectangle is greater than 0. If left is 0,
    then the player is already all the way to the left and won''t be able to move
    further.


