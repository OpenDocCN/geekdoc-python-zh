  md: '# Using Libraries


    We briefly mentioned libraries back in Chapter 1. You can think of libraries as
    collections of code—usually functions (like the `print()` and `input()` functions
    you’ve already used). Libraries are easy to use. You just tell Python what library
    you need, and you get to use the functions in it. Simple as that. Yes, someone
    else did the hard work, and you get to just use it. Nice, huh?


    Python comes with lots of libraries included. There is one called `datetime` that
    provides all sorts of functions for working with dates. `math` is used for mathematical
    operations. There are libraries for working with files on your computer, accessing
    Internet sites, working with cryptography, and many more. And libraries can contain
    more than just functions, too, as you’ll see.


    And if Python doesn’t have the libraries you need, they may exist online for you
    to download and use. We’ll look at using 3rd party libraries (which means libraries
    that come from someone else, as opposed to ones included with Python) in Part
    III of this book.


    # The random Library


    The first library we are going to look at is called `random`, and, as its name
    suggests, it is used to add randomness to your code. Want to pick a random number
    between 1 and 100? `random` can help. Creating a game and need enemies to appear
    at random intervals and with random levels of health? You use `random` for that,
    too. Even something as simple as simulating a coin toss can be achieved by using
    `random`.


    Ok, so how do you tell Python what library you want to use? You use the `import`
    statement. Let’s try that. Create a new file named `Random1.py` and type the following:


    ```

    import random

    ```


    > **Get to Know PyPI**

    The official repository for Python libraries is called PyPI, which is home to
    more than 300,000 libraries!'
