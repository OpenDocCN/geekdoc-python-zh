  md: "# The Inventory System\n\nOk, so now you know how to use dictionaries. And,\
    \ yes, they are ideal for our inventory system. We could create an inventory like\
    \ this:\n\n```\ninv = {\n    \"StructureKey\": False,\n    \"Coins\": 0\n}\n```\n\
    \nThis way, for example, we could check inv[\"StructureKey\"] to see if the player\
    \ has the key and respond accordingly. And when the user finds the key, we just\
    \ need to set inv[\"StructureKey\"] = True.\n\nThat works, but we can improve\
    \ things a little bit by providing *wrapper functions*.\n\n> **NEW TERM**\n**Wrapper\
    \ Function** A *wrapper function* is a function whose purpose is just to call\
    \ some other code. It wraps the code, and thus the name.\n\nWhat does that mean?\
    \ Look at this code snippet:\n\n```\ninv = {\n    \"StructureKey\": False,\n \
    \   \"Coins\": 0\n}\n\ndef takeStructureKey():\n    inv[\"StructureKey\"] = True\n\
    \ndef hasStructureKey():\n    return inv[\"StructureKey\"]\n```"
