- md: "Python and Other Languages\nAs we noted earlier, different languages have different\
    \ uses. Python is great for general-purpose use, and it powers all sorts of websites,\
    \ too. But you’d not use it, for example, to build a mobile app, as there are\
    \ other languages far better suited to that task. That said, the techniques you’ll\
    \ master while learning Python will absolutely be relevant and useful if, for\
    \ example, you decide to use Java or Swift to create Android or iOS apps, respectively.\n\
    \n## Setting Things Up\n\nOk, enough talking. Let’s get things set up so you can\
    \ start coding, and to do that you’ll need two things: the Python language and\
    \ an editor. And, yes, we know there are quite a few steps, but you only have\
    \ to do this once. Promise.\n\n> TIP\nWatch for the QR Codes All of the links\
    \ and downloads referred to below can be found on the book web page, at https://forta.com/books/0137653573/\
    \ (or just scan the QR code at right). You’ll find QR codes throughout the book,\
    \ scan them for downloads, tips, and more.\n\n## Installing Python\n\nMost computers\
    \ don’t come with the Python language installed, so the first thing you’ll need\
    \ to do is to install Python (which is free for the download). To do this:\n\n\
    1. Open your web browser and go to https://python.org.\n2. Click on the Downloads\
    \ link at the top of the screen.\n\nUsing a Chromebook?\nIf you are using a Chromebook,\
    \ you can still use Python, but the installation steps are a bit more involved.\
    \ You’ll find details on the book’s web page by scanning this QR code.\n\n3. You’ll\
    \ be presented with an option to download Python. There are different installers\
    \ for Windows and Mac OSX and the download screen should automatically show the\
    \ right one (if not, click to select it manually).\n\nDownload the latest version\
    \ of Python (3.9 something while this book was being written).\n\n4. When the\
    \ download has completed, double-click on the downloaded file to run the installer.\
    \ You should be able to just click all the default options and the installer will\
    \ do its thing.\n\n> **TIP**\n**Using Windows?** During installation, you might\
    \ see a checkbox that says something like Add Python to PATH. If you see this,\
    \ be sure to check this box; it’ll make things easier for you in the future.\n\
    \nWhen the installation has completed, you should have Python on your computer\
    \ ready to use. But, before we start coding, there are two more steps needed.\n\
    \n## Installing and Configuring Visual Studio Code\n\nIf you want to write a document,\
    \ you need an editor like Google Docs or Microsoft Word. If you want to create\
    \ a video, you need a tool to capture and edit video. Right? Coding is much the\
    \ same—to write code, you need an *editor*, which is an application you use to\
    \ write and edit code.\n\nThere are lots of editors out there, and they let you\
    \ create and open files, type code, and save the files. Not very exciting, and\
    \ so most coders use special editors that do a whole lot more. These special editors\
    \ are called IDEs (which stands for *integrated development environments*). An\
    \ IDE is an editor in that it lets you open and edit and save files, but it also\
    \ does other really useful things. It can highlight errors in your code (not that\
    \ you’ll ever make any), it colors your code making it easier to read, and much\
    \ more. So, yeah, you want an IDE.\n\nPython comes with a built-in IDE called\
    \ IDLE, and it’s ok, kinda. It works, but there are much better options. The one\
    \ we like a lot is called Microsoft Visual Studio Code (or VS Code, for short).\
    \ That’s what we use, and we recommend that you do, too.\n\nVisual Studio Code\n\
    VS Code is the little brother of Microsoft Visual Studio, which is a paid for\
    \ IDE. If you happen to have access to the full version of Visual Studio, you\
    \ are free to use that instead of VS Code.\n\nUsing a Chromebook?\nIf you are\
    \ using a Chromebook, you can use VS Code only if your Chromebook supports Linux.\
    \ For details on how to check for Linux support and how to install VS Code on\
    \ Chromebook, go to the book's web page by scanning this QR code.\n\n![](img/1725feec73e591598339fc549aaff885_33_0.png)\n\
    \nWhy do we like VS Code? Lots of reasons. It's fast. It provides lots of built-in\
    \ help and syntax support. It supports all sorts of languages, including Python.\
    \ Oh, and it's free. Thank you, Microsoft!\n\nTo install VS Code, follow these\
    \ steps:\n\n1. Open your web browser and go to https://code.visualstudio.com/.\n\
    2. Click on the blue **Download** button. Like before, there are different installers\
    \ for Windows and macOS, and the download screen should automatically show the\
    \ right one. (If not, click the down arrow next to the **Download** button to\
    \ select it manually.)\n3. Download the latest version of VS Code (it'll probably\
    \ be called \"Stable Build\").\n4. When the download has completed, double-click\
    \ on the downloaded file to run the installer.\n5. If you are prompted with a\
    \ checkbox that says **Edit with Code**, check it. Other than that, you should\
    \ be able to just leave all the default options.\n6. When the installer is finished,\
    \ make sure **Launch Visual Studio Code** is checked and click **Finish**. The\
    \ installer will close, and VS Code will start.\n\nWe're almost done. Remember,\
    \ VS Code supports all sorts of languages. We are going to use it with Python,\
    \ so the last thing we need to do is to let VS Code know that. Once VS Code knows\
    \ that we'll be using Python, it may install extra software so that we'll have\
    \ all the Python support we'll need.\n\n## CAPTAIN CODE: Unleash Your Coding Superpower\
    \ with Python\n\nWhen VS Code starts, it shows a Welcome screen with links to\
    \ tutorials, files, and more. On the upper-left edge of the VS Code screen, you'll\
    \ see these icons:\n\n![](img/1725feec73e591598339fc549aaff885_34_0.png)\n\nYou'll\
    \ use these icons extensively, but for now the icon we care about is the bottom\
    \ one. Click on it. This displays the Extensions panel. What are Extensions? They\
    \ are additional pieces of software that can be installed into VS Code. That's\
    \ actually how VS Code can support so many different languages. Each time you\
    \ need support for a new language, you can just install the right extension, and\
    \ you're good to go. The Extensions panel will look something like this:\n\n![](img/1725feec73e591598339fc549aaff885_34_1.png)\n\
    \nAt the top of the Extensions panel is a section named INSTALLED. It'll probably\
    \ have a 0 next to it, as no extensions are installed yet.\n\nIf the number next\
    \ to INSTALLED is not 0, and if you see Python listed in the INSTALLED section,\
    \ then the Python extension is already installed. Lucky you!\n\nIf the Python\
    \ extension is not yet installed (it probably won't be), then you'll need to install\
    \ it. This is super easy to do. In the POPULAR section, you'll see **Python**\
    \ listed. (Python is indeed very popular.) Just click on the blue Install link\
    \ to the right of Python, and you'll see it get installed. Python will now be\
    \ listed in the INSTALLED section, and VS Code may display a new Python Welcome\
    \ page.\n\n## Creating a Work Folder\n\nProgrammers organize their code in folders.\
    \ They usually have a main folder for all of their projects, and create subfolders\
    \ within it for each specific project or application. So, let's do that now.\n\
    \n## Windows users\n\nWindows users have a Documents folder, which is where all\
    \ work gets stored. This is a great place to store your code, too. Follow these\
