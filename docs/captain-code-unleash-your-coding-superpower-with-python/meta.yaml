    \ The planning is critical, and the more you plan, the easier it'll be to actually\
    \ write your code. But, even with the best planning, once you start coding, you\
    \ are inevitably going to discover ways to improve your code.\n\nWhat type of\
    \ improvements? Things like:\n\n- Processing that can be moved elsewhere to make\
    \ your code cleaner and simpler\n- Removing duplicated code\n- Identifying functionality\
    \ that can be isolated from your main code so that it can be reused\n- Improving\
    \ specific processing for simplicity or performance\n\nThese are just a few types\
    \ of improvements, and there are many more.\n\nWith time and experience, coders\
    \ learn to write better code in the first place. But, the truth is that even the\
    \ most experienced coders are continuously looking for ways to improve their code.\n\
    \nFor now, let's look at an example of the first type of improvement we mentioned:\
    \ moving code elsewhere to make everything clearer and simpler.\n\n`Main.py` is\
    \ the main file of our game. As you've seen, it is made up of lots of functions.\
    \ But what are those functions made up of? Let's look at a couple starting with\
    \ the `doWelcome()` function:\n\n```python\n# Welcome the player\ndef doWelcome():\n\
    \    # Display text\n    print(\"Welcome adventurer!\")\n    print(\"You wake\
    \ in a daze, recalling nothing useful.\")\n    print(\"Stumbling you reach for\
    \ the door, it opens in anticipation.\")\n    print(\"You step outside. Nothing\
    \ is familiar.\")\n    print(\"The landscape is dusty, vast, tinged red, barren.\"\
    )\n    print(\"You notice that you are wearing a spacesuit. Huh?\")\n```\n\nWhat\
    \ do you notice about this function? It’s all `print()` statements, right? Lots\
    \ and lots of text.\n\nLet’s look at part of the `doStart()` function:\n\n```python\n\
    # Location: Start\ndef doStart():\n    # Display text\n    print(\"You look around.\
    \ Red dust, a pile of boulders, more dust.\")\n    print(\"There's an odd octagon\
    \ shaped structure in front of you.\")\n    print(\"You hear beeping nearby. It\
    \ stopped. No, it didn't.\")\n```\n\nLots of `print()` statements and text, too.\
    \ Same for `doRun()`:\n\n```python\n# Player ran\ndef doRun():\n    # Display\
    \ text\n    print(\"You run, for a moment.\")\n    print(\"And then you are floating.\
    \ Down down down.\")\n    print(\"You've fallen into a chasm, never to be seen\
    \ again.\")\n    print(\"Not very brave, are you?\")\n```\n\nActually, if you\
    \ look at all of the code in `Main.py`, you’ll probably find that displayed text\
    \ by `print()` functions makes up a significant part of it.\n\nIs having all of\
    \ this text right inside the core code a problem? Consider the following:\n\n\
    - Story text spread all over the place is hard to maintain. Keeping spelling consistent\
    \ and ensuring a common voice and tone is challenging if text is scattered all\
    \ over the place.\n- Making changes is harder. Renaming a character, tweaking\
    \ descriptions and adjectives, and so on...if you need to do this in multiple\
    \ places, you’ll inevitably miss some.\n- Imagine that your program is so popular\
    \ that you decide to release it in other languages. Translating text that is broken\
    \ into little bits in different places is difficult."
