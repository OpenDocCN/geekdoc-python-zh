  md: '# ALL CAPS


    You''ll notice that the color variables we defined are capitalized—for example,
    BLACK instead of black or Black. As you know, Python is case sensitive, so if
    you create a variable named BLACK, you must refer to it that way exactly. So why
    did we create these variables in all capitals? Python coders have adopted this
    convention to denote variables that should not be changed. As our colors should
    never change, we used this naming convention.


    We''ve frequently used mixed case for variable names, for example, lightGreen.
    If the variable is all caps, it will make it hard to separate words, as in LIGHTGREEN.
    For this reason, coders often use an underscore (_) to separate words, as in LIGHT_GREEN.


    # RGB Values


    Colors on a computer screen are created by mixing different amounts of red, green,
    and blue light. Yep, when your screen displays yellow, it is actually displaying
    lots of red and green and no blue. Seriously!


    Because all colors are created using combinations of red, green, and blue, a color
    value is called an RGB value (R for red, G for green, B for blue), and it is made
    up of three numbers that specify how much of each color is present. The amount
    of each color is a number between 0 (for none of that color at all) and 255 (for
    all of that color).


    This means that 255, 0, 0 will display red; the R value is 255 (full intensity),
    and the G and B are 0 (no light at all). Magenta (or purple) will be 255, 0, 255:
    full red and blue and no green. Black is 0, 0, 0: all three with no light at all.
    White is 255, 255, 255: all three at full intensity.


    Partial values can be used, too. Which means that there are over 16 million (that''s
    256 to the power of 3) color combinations possible.


    Colors provided to code (including Python) as well as graphic and illustration
    software all use RGB values like this.


    Next comes the actual library initialization. Before Pygame can be used, it must
    be initialized (just like the Colorama library that we used in Chapter 17). This
    is done with a single line of code:


    ```

    # Initialize Pygame

    pygame.init()

    ```'
