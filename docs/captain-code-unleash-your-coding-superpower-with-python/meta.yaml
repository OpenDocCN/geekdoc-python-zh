  - '[PAGE 316]


    Games created in Pygame can run in different modes, including full screen or in
    a window. This line tells Pygame that our game runs in a window, and it sets the
    window size to 500 pixels wide and 800 pixels high. The set_mode() method returns
    the game area, which we save to a variable named screen.


    Now if you were to save and run the code, you''d see a black box (exactly 500
    pixels wide and 800 pixels high) briefly flash on the screen.


    We''re making progress!


    # Displaying Stuff


    We now have a game area (called a *surface*) to work with. Everything that happens
    in the game—displaying items, moving them, and so on—happens on the game surface.


    > **NEW TERM**

    **Surface** A *surface* is an object that represents an area of the screen where
    you display images, text, and more. You place items on the surface, and then Pygame
    can display them.


    Let''s update the game area. The surface is accessed via the screen variable we
    created. We can fill the background with a solid color. In this case, we''ll make
    it white, using the fill() method. Add this to the bottom of your file:


    ```

    # Set background color

    screen.fill(WHITE)

    ```


    > **Pixel**

    A pixel (short for *picture element*, *pix* = picture, *el* = element) is the
    smallest item that can be displayed on a screen. Each pixel is a tiny dot that
    is entirely one RGB color. Larger images or videos are actually made up of lots
    and lots of pixels. When pixels are super small and there are lots of them, you
    don''t notice the individual pixel dots and just see the combined image.


    This is why 1080 images look better than 720 images. 1080 has more pixels in the
    same space as a 720 image, and the individual pixels are smaller and less apparent.
    4K has far more pixels than 1080, which is why 4K images look even smoother.'
  - '[PAGE 317]


    As its name suggests, `fill()` fills the screen with a color, and here we are
    passing it the WHITE color we previously defined. Note that WHITE only works because
    we created it. If you tried to use BLUE now, you''d get an error as we have not
    defined BLUE.


    Save and run the code. Well, that didn''t work. The box briefly flashed on the
    screen, but it was still black. What happened to our `fill(WHITE)`?


    Well, here''s the important thing to know about gaming engines—and this is true
    of all gaming engines, not just Pygame: Graphical games typically update the display
    a lot, and they do it very frequently. And often there are lots of changes that
    need to be made all at once. Updating the display takes time, so game engines
    typically remember all the changes that need to be made, but they don''t actually
    make them until you tell them to do so. It''s an extra step for you, but it makes
    for much faster and more responsive games.


    And that''s what happened here. We told Pygame to set the background color using
    `fill(WHITE)`, and Pygame updated its own internal list of changes with that color
    change. But we never told Pygame to update the display, so, well, it didn''t.


    How do we update the display? Add this below the `fill()` method:


    ```

    # Update screen

    pygame.display.update()

    ```


    Save and test the code. This time, the box that flashes on the screen will be
    white.


    `display.update()` does exactly what you''d expect: It updates the display with
    any pending changes.


    # The Game Loop


    Our game (yeah, we know calling it a game right now is a bit of a stretch) starts
    and then quits right away. That''s because, as you will recall, Python executes
    your code line by line, and once it has processed the final line of code, the
    application terminates.'
