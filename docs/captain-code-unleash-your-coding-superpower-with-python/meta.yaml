  md: '# CAPTAIN CODE: Unleash Your Coding Superpower with Python


    For starters, not everyone needs to work as a coder. That makes about as much
    sense as everyone being a doctor, or everyone being a chef, or everyone being
    a teacher, or everyone being a pilot, or everyone being a plumber running through
    pipes to save a princess...you get the idea. To function properly, society needs
    lots of different people doing lots of different things. Sorry, but humanity just
    does not need 8 billion coders.


    In addition, the tech space (and that includes coding) changes really quickly.
    What coders do now is not the same as what they did 10 years ago, and what they’ll
    do 10 years from now will be even more different. So, what you learn today is
    not what you’ll be doing as a coder in the future. The best coders never stop
    learning, evolving, or developing skills. The basics you’ll learn in this book
    will remain relevant and useful, but the specifics change, and frequently. With
    coding there’s no learn-it-and-done; it’ll be a mistake to invest time and energy
    assuming otherwise.


    But most importantly, if you’re interested in coding primarily from a future career
    perspective, it’ll feel like work rather than fun. If it’s not fun then you won’t
    enjoy it; you’ll be unlikely to stick with it, and you definitely won’t be motivated
    to really give it your all. And that would be a shame, because coding really is
    a lot of fun.


    That’s not to say there aren’t good jobs in coding. There are, and there will
    be for many decades to come. But a future career should not be the only reason
    to become a coder.


    So, why should you learn to code? And should everyone do so? We believe everyone
    should learn to code, even if they have no intentions of pursuing careers in coding.
    We believe this just like we believe that everyone should draw and sketch, and
    everyone should play an instrument, and everyone should cook, and everyone should
    take pictures and shoot videos, and more. All of these are creative endeavors,
    which means that they are ways to actually create stuff, and creating stuff is
    incredibly rewarding and satisfying. Sure, it’s fun to spend hours on your phone
    looking at what other people have created; but that’s nothing compared to the
    joy and satisfaction of creating stuff that other people consume and use.


    And, on top of that, when you learn to code, you develop all sorts of invaluable
    skills and traits beyond just coding. These include planning, problem solving,
    communication, logic, empathy, attention to detail, patience, resilience, persistence,
    and creativity.'
  merge: -1
  pgno: 16
- img_proc: true
  md: 'Oh, and back to jobs and careers—it turns out that these skills (especially
    creativity and creative problem solving) are some of the most in demand out there.
    So, yes, coding will indeed help your future career, even if you don’t become
    a coder.


    Great, so you should learn coding. But where to start? In our experience, too
    many books, videos, and lessons overly focus on the mechanics of coding—things
    like syntax and exact details of how to use specific language elements. They get
    caught up in the minute details of specific projects. It all feels a whole lot
    like being talked to, as opposed to being encouraged to tinker and play. And that’s
    boring. As in really enthusiasm-draining, soul-crushingly, yawn-inducingly boring.
    It’s kinda like spending hours and hours learning dictionary words and grammar
    and then getting to use those by copying someone else’s writing, and not being
    given the chance to find your own words and voice. That’s crazy, right? And yet
    that’s how most people are first introduced to coding.


    We’ve been teaching coding for many years. In fact, we’ve helped over a million
    people become coders, including lots of young people your age. And we know how
    to help you develop these skills—we do it the same way we taught ourselves to
    code. It’s fast, fun, results oriented, and it works.


    And that’s why we wrote this book, to help you learn to code; and, more importantly,
    to discover your coding superpower and turn you into a coder.


    # What’s in This Book


    In this book we don’t just teach you how to code; lots of books do that. Some
    even do a pretty good job of it, too.


    No, learning to code is not enough. Instead, we’re going to help you learn how
    to think like a coder, analyze problems like a coder, plan like a coder, progressively
    iterate like a coder, craft elegant solutions like a coder ... In fact, when we’re
    done we’ll have morphed you into <drumroll> a coder!


    To that end, this book is quite different from others you may have read. We built
    it to help you become a coder quickly while having fun, too.


    We divided this book into three sections that build upon each other. Here’s how
    it all works.'
  merge: -1
