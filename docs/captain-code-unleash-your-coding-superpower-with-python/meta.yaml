    ---\")\n```\n\nStart with this and create the pictures needed for each wrong guess.\n\
    \nYou'll need an if statement to decide which picture to show.\n\nAnd, here's\
    \ a tip. If you plan your print() and if statements carefully, you can do this\
    \ without having to create a different picture for each number of lives. You can\
    \ have one picture and change what gets shown on each line based on the number\
    \ of lives left.\n\nOh, watch for backslash characters (the \\ character). That's\
    \ a special character in Python. If you actually want to display \\ as part of\
