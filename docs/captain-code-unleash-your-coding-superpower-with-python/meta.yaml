  md: '# not Negates


    What does the following code do?


    ```

    if userInput.isnumeric():

    ```


    This code checks to see if `isnumeric()` returns True. It is actually shorthand
    for this:


    ```

    if userInput.isnumeric() == True:

    ```


    If you don''t tell an `if` statement what you are comparing to, it''ll assume
    that you are comparing to True.


    `not` changes a condition to its exact opposite. Coders say that it *negates*
    the condition. So by adding `not`:


    ```

    if not userInput.isnumeric():

    ```


    the code checks to see that `isnumeric()` returns False.


    That said, there is always more than one way to write a line of code. This code
    could have been written like this:


    ```

    if userInput.isnumeric() == False:

    ```


    Both versions do the exact same thing.


    So what to do? We need to convert the string to a number.


    You saw the `int()` function briefly in Chapter 4. As a reminder, `int()` turns
    a string data type into a numeric data type; you pass it a string as an argument,
    and it returns a number. Here the code `userGuess=int(userInput)` tells Python
    to look at the `userInput` string, get the number that is in it, convert it to
    a number, and save it to `userGuess`. This way, `userInput` remains a string—it
    does not change at all—and `userGuess` is the number that was in that string.
    So if `userInput` was "3", `userGuess` will be 3, which is exactly what we need.


    By the way, using `int()` with a string that isn''t actually a number would throw
    an ugly error. We avoided that by validating the input previously.'
