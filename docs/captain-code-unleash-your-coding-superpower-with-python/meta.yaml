    Here we are passing our two sprites, player and enemy, to collide_rect(). So long\
    \ as you avoid oncoming cars, the two sprites won't overlap, so no collision occurs,\
    \ and the function returns False. But if (or should that be when?) you crash,\
    \ the sprites will overlap, and the function will return True. When that happens,\
