  md: "while **Conditions**\nIn Chapter 4, you learned about different conditions\
    \ and operators used in if statements. All of them apply to while conditions,\
    \ too.\n\nSo, question, what is the fewest number of times that the indented code\
    \ inside of the while loop will run? The answer is 0. If the user types STOP right\
    \ away in response to the first input(), the while condition will never be True—not\
    \ even once—and the indented code will never be run.\n\n> **TIP**\n**if and while**\
    \ Here’s another way to look at it. if statements and while statements are very\
    \ similar in that they both take conditions, which, if True, execute the code\
    \ indented below. The difference is that when the condition is True, the if statement\
    \ executes its code once, as opposed to while statements which execute the indented\
    \ code over and over (until the condition is no longer True).\n\nWe point this\
    \ out because while this example works, it will make most professional coders\
    \ cringe (or even puke). Why? Coders hate duplicated code, and here the two input()\
    \ lines are completely and utterly identical. Why is that bad? Well, it’s not\
    \ that big of a deal here, but in bigger and more complex programs, the risk of\
    \ them going out of sync is really high. At some point, you’ll make a change to\
    \ one and forget to change the other. That’s asking for future trouble.\n\nSo\
    \ let’s rewrite this code with only one input() line. How can we do that? Like\
    \ this:\n\n```\n# Initialize the input variable\nuserInput=\"\"\n\n# Loop until\
    \ the user says STOP\nwhile userInput != \"STOP\":\n    userInput=input(\"Say\
    \ something, say STOP to stop: \").upper().strip()\n```"
