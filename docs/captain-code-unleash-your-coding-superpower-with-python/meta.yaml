    \ is not (bye bye, character). Or allowing a user to take selfies until they hit\
    \ Send, the loop allows the camera to be used and pictures to be taken so long\
    \ as the condition (user has not clicked Send yet) is True; as soon as they click\
    \ Send, the condition becomes False, and the loop ends. In this type of loop,\
    \ the number of iterations is not known; the loop just keeps going and going and\
    \ going until the condition changes. We'll look at this type of loop in the next\
    \ chapter.\n\n# Looping Through Items\n\nLet's start with the simplest of loops,\
    \ looping through a list of items:\n\n```\nanimals=[\"ant\",\"bat\",\"cat\",\"\
    dog\",\"eel\"]\n```\n\nYou know what this is: It's a list called `animals` containing\
    \ five items in it.\n\nEarlier in this chapter, we saw how to access individual\
    \ list items. But what if you want to loop through the list so as to print each\
    \ one individually? Tada! Loops to the rescue!\n\nCreate a new file named `Loop1.py`\
    \ and type the following:\n\n```\n# List of animals\nanimals=[\"ant\",\"bat\"\
    ,\"cat\",\"dog\",\"eel\"]\n\n# Loop through the list\nfor animal in animals:\n\
    \    # Display one per loop iteration\n    print(animal)\n```\n\nSave and run\
    \ this code. You should see output like this:\n\n```\nant\nbat\ncat\ndog\neel\n\
    ```"
  - "[PAGE 113]\n\nYou know what the first line of code does, so let's look at the\
    \ loop code. This line:\n\n```\nfor animal in animals:\n```\n\ntells Python to\
    \ loop through animals and, in each iteration, to put the next item in a variable\
    \ named animal. Note that there are now two variables used here: animal and animals.\
    \ animals is the list we created, but what is animal? We didn't explicitly create\
    \ the animal variable; the for loop code did that for us, and the loop changes\
    \ the value of animal automatically on each iteration. We told the for loop what\
    \ to name the variable by specifying for animal. (We could have named the variable\
    \ anything, but animal seemed like a good choice for a variable that holds one\
    \ animal from a list of animals.)\n\n> **NEW TERM**\n**Iteration** Each cycle\
    \ of a loop is called an *iteration*. You may also hear coders say *the code iterates*,\
    \ which means it loops.\n\nJust like if statements, loops end with a colon (the\
    \ : character), and then whatever is indented beneath the loop is what gets called\
    \ once per iteration.\n\nSo, in our example, how many times does the print() statements\
    \ get called? Five—because there are five items in the list animals. Try adding\
    \ an item or a few, and run the code again. The indented code will always be called\
    \ once per item in the list.\n\nAnd just like with if statements, you need to\
    \ be careful with indentation. Mess it up, and the loop won't work as intended.\
    \ For example, if the loop code looked like this:\n\n```\n# Loop through the list\n\
    for animal in animals:\n    # Display one per loop iteration\n    print(\"Here\
    \ is the next animal:\")\nprint(animal)\n```"
  - "[PAGE 114]\n\nthe output would look like this:\n\n```\nHere is the next animal:\n\
    Here is the next animal:\nHere is the next animal:\nHere is the next animal:\n\
    Here is the next animal:\neel\n```\n\nWhy? The indented `print()` statement will\
    \ be called once per iteration, so five times. But the last `print()` statement\
    \ is not indented (coders will say that it is *outside of the loop*), so it isn’t\
    \ processed until loop processing has completed. Therefore, that last `print()`\
