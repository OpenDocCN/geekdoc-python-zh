    # Planning the Inventory System


    Every adventure game requires that the player obtain and use items. Maybe you
    need to collect coins to buy an item from a story. The coins you collect are items,
    as is whatever you buy. Or perhaps you encounter a door that is locked, and it’ll
    only open if you have found a particular item: a key. Items can be maps, food,
    potions, weapons, you name it.


    In your game, for example, the structure has a door. It won’t open yet. Try to
    open the door, and you see this:


    ```

    What do you want to do? [SDBR]: d

    The door appears to be locked.

    You see a small circular hole. Is that the keyhole?

    You move your hand towards it, it flashes blue and closes!

    Well, that didn’t work as planned.

    ```


    The game doesn’t actually tell the player to find a key. That’s implied, and they’ll
    need to do so to continue.


    Working with items requires that your code have a way to store and access them
    during game play. And that’s the job of an inventory system.


    The question is how to store this information? You could create a bunch of variables:


    ```

    # Inventory

    coins = 0

    sonicKey = False

    jetPack = False

    food = 100

    ```


    This way, as players get more coins, you can just add them to the coins variable.
    If they were to find the key or jetpack, you’d set those flags to True. And food
    starts with 100 and gets used over time (so you subtract from the food variable)
    unless the user finds more (in which case you add to the variable).


    That could work, but dealing with lots of individual variables isn’t ideal. You
    couldn’t easily loop through them all, saving and restoring would be onerous,
    and you’d always run the risk of accidentally overwriting variables.'
