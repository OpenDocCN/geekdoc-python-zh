    4. 最后需要关注的重要事项是代码上方、右上角的绿色箭头。那是用来运行你的代码的。（如果你将鼠标悬停在绿色箭头上，屏幕会显示*在终端中运行 Python 文件*。你可以将鼠标悬停在
