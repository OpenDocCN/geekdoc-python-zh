  pgno: 145
- img_proc: true
  md: 'Again, coding is much the same. You need to start looking for the bits you
    can create in isolation (meaning outside of your main application).


    Why? There are a few advantages:


    +   - Testing your code when it is part of a huge app is really hard. Just running
    a program until you get to where your code snippet is can be time-consuming. And
    if there are dependencies (user input, menu selections, and so on), it’s even
    harder. Professional coders try to write whole sections of code independently.
    This way, they can experiment, test, iterate, perfect, and do it all outside of
    the main application.

    - This type of coding is also great for reuse. As you start to build smaller blocks
    of code, you’ll find that they can be used in other programs, too. This saves
    time because you are not always starting from scratch. And it also saves time
    because it’s always better to start with code that you know has already been used
    and tested.

    - But most importantly, it is so much easier to solve lots of small problems and
    challenges than big giant scary ones.


    And so that is where we are going to start: thinking small.


    # Game Components


    In this chapter and the next, we are going to create a Hangman game. You know
    Hangman, right? It’s usually played with pen and paper. Someone picks a word and
    draws marks indicating how many letters long the word is. Someone else guesses
    letters and tries to figure out the word. Every wrong guess builds part of the
    hangman’s gallows. The game is over when the player correctly guesses the word
    or when there are too many wrong tries.


    Most of the game is inputs and checking letters—stuff we’ve done before.


    But there are a couple of parts of the game that are different and which should
    be carefully planned. Let’s look at a few:


    +   - Players need to guess one letter at a time. As we’ve seen, `input()` accepts
    text input from a user, but it doesn’t limit text; users can type whatever they
    want. We’ll need a way to handle the inevitable situation where users type too
    much text (more than a single letter).'
