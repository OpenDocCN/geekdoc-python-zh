    \ .6 miles in a kilometer (rounded to keep things simple).\n\n## Summary\n\nIn\
    \ this chapter, you’ve learned how to create your own functions and how to pass\
    \ arguments and return results. You’ll be creating functions in just about every\
    \ upcoming chapter.\n\n# CHAPTER 12\n## Exploring\n\nNow that you know how to\
