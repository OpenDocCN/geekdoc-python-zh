    like this:


    ```

    tipAmount = billAmount / 100 * tipPercent

    total = billAmount + tipAmount

    ```


    print() those values to make sure the math is correct.


    And then add the print() statements to display the results. You’ll probably want
    to display the bill amount, the tip amount, and the total.


