    \ place somewhere in space. It starts with the player stranded and trying to understand\
    \ where they are. We’re going to start with a very simple game structure and will\
    \ add functionality and complexity in the next chapters.\n\n> Text-Based Adventure\
    \ Games\nThe very first text-based adventure game was called *Colossal Cave Adventure*,\
    \ and it was created way back in 1976 (at about the same time that the Internet\
    \ was being invented). The game was all text, and started with:\n\nYOU ARE STANDING\
    \ AT THE END OF A ROAD BEFORE A SMALL BRICK BUILDING. AROUND YOU IS A FOREST.\
    \ A SMALL STREAM FLOWS OUT OF THE BUILDING AND DOWN A GULLY.\n\nThe player would\
    \ then type what they wanted to do—for example, `look` or `go east`—and the game\
    \ would respond with more text. Players would need to find items, solve puzzles,\
    \ and more, to win.\n\nOne year later, Zork (which was inspired by Colossal Cave\
    \ Adventure) was released by Infocom. Zork was the first commercial (as in sold)\
    \ text-based game, and it was so popular that it became a series of 10 titles.\
    \ Yep, sequels are nothing new! Infocom went on to create dozens of text-based\
    \ adventure games, including *The Hitchhiker’s Guide to the Galaxy* (which we\
