    # Birthday Countdown


    We all love our birthdays (until we are adults...and then not so much). Let''s
    write a program that calculates how many days until your next birthday.


    We''re not going to give you the code. Rather, we are going to help you understand
    the problem. And we''ll give you some tips and pointers.


    # Program Requirements


    We always start by clearly defining what the program needs to do. This program
    has few requirements, but let''s list them anyway:


    +   - You need the current date.

    - You also need the upcoming birthday date.


    Simple enough.


    # Program Flow


    Next, we define the program flow, meaning, what it does, and in what order. This
    one is pretty simple:


    +   - Get the birthday (not date of birth, you need the date of the next birthday).

    - You''ll also need today''s date.

    - Then you can use simple math to calculate the days between those two dates.


    > **No Cheating, but...**

    There is no single right way to write this program (or any of the programs in
    this chapter). You should create your own solution.


    But, if you need help or want to see one way to solve each problem, you''ll find
    our solutions on the book website by using this QR code.


