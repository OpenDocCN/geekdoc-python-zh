  md: "There's a lot of code here, but most of it should be self-explanatory.\n\n\
    The code first defines lots of functions. doWelcome(), doStart(), doStructure(),\
    \ etc. are all locations in the game. As explained before, each is its own function.\
    \ doWelcome() introduces the game with a series of print() functions. doStart()\
    \ is the game starting location; it displays text and also prompts for a user\
    \ choice and then sends the user to the appropriate function.\n\nDefining functions\
    \ doesn't execute them. When you use def, you are creating and naming a new function\
    \ for future use. But Python will do nothing with the new function until you actually\
    \ call it. That's why the code ends with:\n\n```\n# Actual game starts here\n\
    # Display welcome\ndoWelcome()\n# Game start location\ndoStart()\n```\n\nOnce\
    \ all the functions have been defined, doWelcome() calls the doWelcome() function,\
    \ which welcomes the user, and doStart() starts the actual game play.\n\nOh, there\
    \ is one new statement here that we should mention. Look at this code:\n\n```\n\
    # Explore beeping\ndef doBeeping():\n    pass\n```\n\nWhat does pass do? Python\
    \ does not like empty functions. If you use def to create a function, then something\
    \ must be indented beneath it. If you have nothing indented, Python will display\
    \ an error message. pass does, well, absolutely nothing at all. It's a placeholder.\
    \ You can put it in your code so that Python stops displaying error messages until\
    \ you are ready to actually write the function code. pass is thus really useful\
    \ while you are working (but useless in your finished code)."
