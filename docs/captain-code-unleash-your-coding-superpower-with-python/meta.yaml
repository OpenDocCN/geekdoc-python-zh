    ## Choosing a Random Item


    Now you know how to generate random numbers. But what if you want to do something
    else, like toss a coin? In that case, you''d want to randomly return Heads or
    Tails, not a number, so `randrange()` wouldn''t be able to help you. But worry
    not; you can do this by using another function in the `random` library.


    > **Careful with Ranges**

    `randrange(1, 11)` returns a random number between 1 and 10. Why 10? The second
    argument, which is 11, means less than 11. It''s a bit confusing because the first
    argument (the 1) is included in the range, but the second (the 11) is not. This
    means that if you want a number between 3 and 8, you''d use `randrange(3, 9)`.
    The good news is that this behavior is consistent with other Python functions,
    so you''ll get used to it.


    Create a new file named `Random2.py` and type the following:


    ```python

    import random


    choices="HT"

    coinToss=random.choice(choices)

    print("It''s", coinToss)

    ```


    Save the file and run it. Each time you run the code, you''ll see It''s H (for
    Heads) or It''s T (for Tails) displayed in the Terminal window.


    So what is this code doing? You know what the first and last lines do.


    The code `choices="HT"` creates a variable called `choices` and stores the text
    "HT" in it.


    The next line randomly picks H (for Heads) or T (for Tails). It does this by using
    the `choice()` function, another function in the `random` library. Unlike `randrange()`,
    which accepts a range of numbers as an argument, `choice()` accepts a single argument
    with a list of choices. Here we pass it our `choices` variable, which contains
    "HT", so `choice()` will return one of those options: H or T.


    Simple, huh?


    Ok, so what if you want to display Heads or Tails instead of H or T? You can''t
    just pass the text Heads and Tails as choices, like this:


    ```python

    choices="HeadsTails"

    coinToss=random.choice(choices)

    ```


    > **Another Option**

    We could have written the same code without the `choices` variable. How? By passing
    "HT" to `choice()` directly, like this:


    `coinToss=random.choice("HT")`


    In this example, the end result is the same.


    Why? Because choice() will treat that as 10 options: the letter H, the letter
    e, the letter a, and so on. You could end up with a returned value of i, not what
    you’d want.


    There are a few ways to do this. We’ll show you one option, using a special type
    of variable.


    You’ll recall from Chapter 2 that variables contain values. And we mentioned then
    that there are special variables that can contain multiple values. We’ll use these
    extensively in later lessons, but for now, here’s how we can use these special
    variables to solve the Heads or Tails challenge.


    Make just one change to your code. Edit this line:


    ```python

    choices="HT"

    ```


    so that it looks like this:


    ```python

    choices=["Heads", "Tails"]

    ```


    Save the code and run it. Now the output will be It’s Heads or It’s Tails.


    So what happens when you change that line of code? The [ and ] characters are
    used to create a list in Python. A list is exactly what it sounds like: a list
    of items. [10, 20, 33] would create a list with three items in it: the three specified
    numbers. Similarly, ["ant", "bat", "cat", "dog", "eel"] would create a list of
    five animals.


    We’ll use lots of lists in future chapters, but for now just know that lists store
    multiple items, and each item is separated by a comma.


    Ok, now back to our code. choices=["Heads", "Tails"] creates a list with two items
    in it: the text Heads and the text Tails. We don’t have to change any other code
    in this case because the random.choice() function is pretty smart. Pass it some
    text, and it knows that you want a random character from that text. But pass it
    a list, and it’ll know that what you want is one random item from the list.


