    \ screen needs to be turned into a graphic that can be blitted.\n\nAnd you need\
    \ to explicitly pick fonts and sizes. We'll use variables for our font details\
    \ (no hard coding!). So add these two lines to your code's variables declarations:\n\
    \n```\ntextFonts = ['comicsansms', 'arial']\ntextSize = 48\n```\n\n`textFonts`\
    \ is a list of fonts we want to use to display our text. Pygame will let you use\
    \ any fonts installed on your computer, and we'll use Comic Sans because it's\
    \ such a terrible font that it's perfect for a Crazy Driver game.\n\nBut what\
    \ will happen if someone plays our game on a computer that doesn't have `comicsansms`\
    \ installed? To address this potentiality, we specify additional fonts, including\
    \ ones that will pretty much always be present, like the safe (and boring) `arial`.\
    \ Pygame will try the fonts in the order specified, so it will prioritize `comicsansms`\
    \ and will use that if it is installed. But, if `comicsansms` is not available,\
    \ Pygame will fall back to `arial`.\n\n`textSize` is the font size we want. Duh!\n\
    \nOkay, so on to our updated `GameOver()` function. Here's the code:\n\n```\n\
    # GameOver function\n# Displays message and cleans things up\ndef GameOver():\n\
